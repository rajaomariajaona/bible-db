document_id: JOB.36,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Those Who Learn from Their Suffering
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: 'Here Elihu took a deep breath, but kept going:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stay with me a little longer. I’ll convince you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s still more to be said on God’s side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I learned all this firsthand from the Source;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything I know about justice I owe to my Maker himself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trust me, I’m giving you undiluted truth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: believe me, I know these things inside and out.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-21
    - type: text
      text: “Oh, Job, don’t you see how God’s wooing you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the jaws of danger?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How he’s drawing you into wide-open places—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: inviting you to feast at a table laden with blessings?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And here you are laden with the guilt of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'obsessed with putting the blame on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let your great riches mislead you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t think you can bribe your way out of this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did you plan to buy your way out of this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not on your life!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And don’t think that night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when people sleep off their troubles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will bring you any relief.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Above all, don’t make things worse with more evil—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s what’s behind your suffering as it is!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-25
    - type: text
      text: “Do you have any idea how powerful God is?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you ever heard of a teacher like him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has anyone ever had to tell him what to do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or correct him, saying, ‘You did that all wrong!’?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember, then, to praise his workmanship,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which is so often celebrated in song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everybody sees it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nobody is too far away to see it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No One Can Escape from God
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “Take a long, hard look. See how great he is—infinite,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: greater than anything you could ever imagine or figure out!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-33
    - type: text
      text: “He pulls water up out of the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: distills it, and fills up his rain-cloud cisterns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the skies open up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pour out soaking showers on everyone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does anyone have the slightest idea how this happens?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How he arranges the clouds, how he speaks in thunder?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just look at that lightning, his sky-filling light show
  - type: usfm
    marker: q2
    children:
    - type: text
      text: illumining the dark depths of the sea!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are the symbols of his sovereignty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his generosity, his loving care.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He hurls arrows of light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: taking sure and accurate aim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The High God roars in the thunder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: angry against evil.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-15
    - type: text
      text: “It’s true that God is all-powerful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he doesn’t bully innocent people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the wicked, though, it’s a different story—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he doesn’t give them the time of day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but champions the rights of their victims.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He never takes his eyes off the righteous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he honors them lavishly, promotes them endlessly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When things go badly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when affliction and suffering descend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God tells them where they’ve gone wrong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shows them how their pride has caused their trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He forces them to heed his warning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tells them they must repent of their bad life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they obey and serve him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll have a good, long life on easy street.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if they disobey, they’ll be cut down in their prime
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never know the first thing about life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Angry people without God pile grievance upon grievance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: always blaming others for their troubles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Living it up in sexual excesses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: virility wasted, they die young.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who learn from their suffering,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God delivers from their suffering.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Obsessed with Putting the Blame on God
    marker-yv: yv-h
