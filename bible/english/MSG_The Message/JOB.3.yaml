document_id: JOB.3
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Job Cries Out
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: What’s the Point of Life?
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Then Job broke the silence. He spoke up and cursed his fate:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-10
  - type: text
    text: “Obliterate the day I was born.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Blank out the night I was conceived!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let it be a black hole in space.
- type: usfm
  marker: q2
  children:
  - type: text
    text: May God above forget it ever happened.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Erase it from the books!
- type: usfm
  marker: q1
  children:
  - type: text
    text: May the day of my birth be buried in deep darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shrouded by the fog,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swallowed by the night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the night of my conception—the devil take it!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rip the date off the calendar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: delete it from the almanac.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, turn that night into pure nothingness—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no sounds of pleasure from that night, ever!
- type: usfm
  marker: q1
  children:
  - type: text
    text: May those who are good at cursing curse that day.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Unleash the sea beast, Leviathan, on it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May its morning stars turn to black cinders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting for a daylight that never comes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never once seeing the first light of dawn.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why? Because it released me from my mother’s womb
- type: usfm
  marker: q2
  children:
  - type: text
    text: into a life with so much trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-19
  - type: text
    text: “Why didn’t I die at birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my first breath out of the womb my last?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why were there arms to rock me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and breasts for me to drink from?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I could be resting in peace right now,
- type: usfm
  marker: q2
  children:
  - type: text
    text: asleep forever, feeling no pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the company of kings and statesmen
- type: usfm
  marker: q2
  children:
  - type: text
    text: in their royal ruins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or with princes resplendent
- type: usfm
  marker: q2
  children:
  - type: text
    text: in their gold and silver tombs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why wasn’t I stillborn and buried
- type: usfm
  marker: q2
  children:
  - type: text
    text: with all the babies who never saw light,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where the wicked no longer trouble anyone
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bone-weary people get a long-deserved rest?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prisoners sleep undisturbed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never again to wake up to the bark of the guards.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The small and the great are equals in that place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and slaves are free from their masters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: “Why does God bother giving light to the miserable,
- type: usfm
  marker: q2
  children:
  - type: text
    text: why bother keeping bitter people alive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who want in the worst way to die, and can’t,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can’t imagine anything better than death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who count the day of their death and burial
- type: usfm
  marker: q2
  children:
  - type: text
    text: the happiest day of their life?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s the point of life when it doesn’t make sense,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when God blocks all the roads to meaning?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-26
  - type: text
    text: “Instead of bread I get groans for my supper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then leave the table and vomit my anguish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The worst of my fears has come true,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what I’ve dreaded most has happened.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My repose is shattered, my peace destroyed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No rest for me, ever—death has invaded life.”
