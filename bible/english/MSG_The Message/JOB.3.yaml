document_id: JOB.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Cries Out
  - type: heading
    content: What’s the Point of Life?
  - type: text
    content: 'Then Job broke the silence. He spoke up and cursed his fate:'
  '11':
  - type: text
    content: “Why didn’t I die at birth,
  - type: text
    content: my first breath out of the womb my last?
  - type: text
    content: Why were there arms to rock me,
  - type: text
    content: and breasts for me to drink from?
  - type: text
    content: I could be resting in peace right now,
  - type: text
    content: asleep forever, feeling no pain,
  - type: text
    content: In the company of kings and statesmen
  - type: text
    content: in their royal ruins,
  - type: text
    content: Or with princes resplendent
  - type: text
    content: in their gold and silver tombs.
  - type: text
    content: Why wasn’t I stillborn and buried
  - type: text
    content: with all the babies who never saw light,
  - type: text
    content: Where the wicked no longer trouble anyone
  - type: text
    content: and bone-weary people get a long-deserved rest?
  - type: text
    content: Prisoners sleep undisturbed,
  - type: text
    content: never again to wake up to the bark of the guards.
  - type: text
    content: The small and the great are equals in that place,
  - type: text
    content: and slaves are free from their masters.
  '20':
  - type: text
    content: “Why does God bother giving light to the miserable,
  - type: text
    content: why bother keeping bitter people alive,
  - type: text
    content: Those who want in the worst way to die, and can’t,
  - type: text
    content: who can’t imagine anything better than death,
  - type: text
    content: Who count the day of their death and burial
  - type: text
    content: the happiest day of their life?
  - type: text
    content: What’s the point of life when it doesn’t make sense,
  - type: text
    content: when God blocks all the roads to meaning?
  '24':
  - type: text
    content: “Instead of bread I get groans for my supper,
  - type: text
    content: then leave the table and vomit my anguish.
  - type: text
    content: The worst of my fears has come true,
  - type: text
    content: what I’ve dreaded most has happened.
  - type: text
    content: My repose is shattered, my peace destroyed.
  - type: text
    content: No rest for me, ever—death has invaded life.”
  '3':
  - type: text
    content: “Obliterate the day I was born.
  - type: text
    content: Blank out the night I was conceived!
  - type: text
    content: Let it be a black hole in space.
  - type: text
    content: May God above forget it ever happened.
  - type: text
    content: Erase it from the books!
  - type: text
    content: May the day of my birth be buried in deep darkness,
  - type: text
    content: shrouded by the fog,
  - type: text
    content: swallowed by the night.
  - type: text
    content: And the night of my conception—the devil take it!
  - type: text
    content: Rip the date off the calendar,
  - type: text
    content: delete it from the almanac.
  - type: text
    content: Oh, turn that night into pure nothingness—
  - type: text
    content: no sounds of pleasure from that night, ever!
  - type: text
    content: May those who are good at cursing curse that day.
  - type: text
    content: Unleash the sea beast, Leviathan, on it.
  - type: text
    content: May its morning stars turn to black cinders,
  - type: text
    content: waiting for a daylight that never comes,
  - type: text
    content: never once seeing the first light of dawn.
  - type: text
    content: And why? Because it released me from my mother’s womb
  - type: text
    content: into a life with so much trouble.
