document_id: LUK.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Can’t Hide Behind a Religious Mask
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: By this time the crowd, unwieldy and stepping on each other’s toes, numbered into the thousands. But Jesus’ primary concern was his disciples. He said to them, “Watch yourselves carefully so you don’t get contaminated with Pharisee yeast, Pharisee phoniness. You can’t keep your true self hidden forever; before long you’ll be exposed. You can’t hide behind a religious mask forever; sooner or later the mask will slip and your true face will be known. You can’t whisper one thing in private and preach the opposite in public; the day’s coming when those whispers will be repeated all over town.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: '“I’m speaking to you as dear friends. Don’t be bluffed into silence or insincerity by the threats of religious bullies. True, they can kill you, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: then
  - type: text
    text: ' what can they do? There’s nothing they can do to your soul, your core being. Save your fear for God, who holds your entire life—body and soul—in his hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: “What’s the price of two or three pet canaries? Some loose change, right? But God never overlooks a single one. And he pays even greater attention to you, down to the last detail—even numbering the hairs on your head! So don’t be intimidated by all this bully talk. You’re worth more than a million canaries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: “Stand up for me among the people you meet and the Son of Man will stand up for you before all God’s angels. But if you pretend you don’t know me, do you think I’ll defend you before God’s angels?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “If you bad-mouth the Son of Man out of misunderstanding or ignorance, that can be overlooked. But if you’re knowingly attacking God himself, taking aim at the Holy Spirit, that won’t be overlooked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: “When they drag you into their meeting places, or into police courts and before judges, don’t worry about defending yourselves—what you’ll say or how you’ll say it. The right words will be there. The Holy Spirit will give you the right words when the time comes.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Story of the Greedy Farmer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Someone out of the crowd said, “Teacher, order my brother to give me a fair share of the family inheritance.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He replied, “Mister, what makes you think it’s any of my business to be a judge or mediator for you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Speaking to the people, he went on, “Take care! Protect yourself against the least bit of greed. Life is not defined by what you have, even when you have a lot.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19
  - type: text
    text: 'Then he told them this story: “The farm of a certain rich man produced a terrific crop. He talked to himself: ‘What can I do? My barn isn’t big enough for this harvest.’ Then he said, ‘Here’s what I’ll do: I’ll tear down my barns and build bigger ones. Then I’ll gather in all my grain and goods, and I’ll say to myself, Self, you’ve done well! You’ve got it made and can now retire. Take it easy and have the time of your life!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Just then God showed up and said, ‘Fool! Tonight you die. And your barnful of goods—who gets it?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “That’s what happens when you fill your barn with Self and not with God.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Steep Yourself in God-Reality
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: He continued this subject with his disciples. “Don’t fuss about what’s on the table at mealtimes or if the clothes in your closet are in fashion. There is far more to your inner life than the food you put in your stomach, more to your outer appearance than the clothes you hang on your body. Look at the ravens, free and unfettered, not tied down to a job description, carefree in the care of God. And you count far more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-28
  - type: text
    text: “Has anyone by fussing before the mirror ever gotten taller by so much as an inch? If fussing can’t even do that, why fuss at all? Walk into the fields and look at the wildflowers. They don’t fuss with their appearance—but have you ever seen color and design quite like it? The ten best-dressed men and women in the country look shabby alongside them. If God gives such attention to the wildflowers, most of them never even seen, don’t you think he’ll attend to you, take pride in you, do his best for you?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-32
  - type: text
    text: '“What I’m trying to do here is get you to relax, not be so preoccupied with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: getting
  - type: text
    text: ' so you can respond to God’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: giving
  - type: text
    text: . People who don’t know God and the way he works fuss over these things, but you know both God and how he works. Steep yourself in God-reality, God-initiative, God-provisions. You’ll find all your everyday human concerns will be met. Don’t be afraid of missing out. You’re my dearest friends! The Father wants to give you the very kingdom itself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: “Be generous. Give to the poor. Get yourselves a bank that can’t go bankrupt, a bank in heaven far from bankrobbers, safe from embezzlers, a bank you can bank on. It’s obvious, isn’t it? The place where your treasure is, is the place you will most want to be, and end up being.
- type: usfm
  marker: s1
  children:
  - type: text
    text: When the Master Shows Up
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-38
  - type: text
    text: “Keep your shirts on; keep the lights on! Be like house servants waiting for their master to come back from his honeymoon, awake and ready to open the door when he arrives and knocks. Lucky the servants whom the master finds on watch! He’ll put on an apron, sit them at the table, and serve them a meal, sharing his wedding feast with them. It doesn’t matter what time of the night he arrives; they’re awake—and so blessed!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: “You know that if the house owner had known what night the burglar was coming, he wouldn’t have stayed out late and left the place unlocked. So don’t you be lazy and careless. Just when you don’t expect him, the Son of Man will show up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Peter said, “Master, are you telling this story just for us? Or is it for everybody?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-46
  - type: text
    text: 'The Master said, “Let me ask you: Who is the dependable manager, full of common sense, that the master puts in charge of his staff to feed them well and on time? He is a blessed man if when the master shows up he’s doing his job. But if he says to himself, ‘The master is certainly taking his time,’ begins beating up on the servants and maids, throws parties for his friends, and gets drunk, the master will walk in when he least expects it, give him the thrashing of his life, and put him back in the kitchen peeling potatoes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-48
  - type: text
    text: “The servant who knows what his master wants and ignores it, or insolently does whatever he pleases, will be thoroughly thrashed. But if he does a poor job through ignorance, he’ll get off with a slap on the hand. Great gifts mean great responsibilities; greater gifts, greater responsibilities!
- type: usfm
  marker: s1
  children:
  - type: text
    text: To Start a Fire
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 49-53
  - type: text
    text: “I’ve come to start a fire on this earth—how I wish it were blazing right now! I’ve come to change everything, turn everything rightside up—how I long for it to be finished! Do you think I came to smooth things over and make everything nice? Not so. I’ve come to disrupt and confront! From now on, when you find five in a house, it will be—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Three against two,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and two against three;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Father against son,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and son against father;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mother against daughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and daughter against mother;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mother-in-law against bride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bride against mother-in-law.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 54-56
  - type: text
    text: 'Then he turned to the crowd: “When you see clouds coming in from the west, you say, ‘Storm’s coming’—and you’re right. And when the wind comes out of the south, you say, ‘This’ll be a hot one’—and you’re right. Frauds! You know how to tell a change in the weather, so don’t tell me you can’t tell a change in the season, the God-season we’re in right now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 57-59
  - type: text
    text: “You don’t have to be a genius to understand these things. Just use your common sense, the kind you’d use if, while being taken to court, you decided to settle up with your accuser on the way, knowing that if the case went to the judge you’d probably go to jail and pay every last penny of the fine. That’s the kind of decision I’m asking you to make.”
