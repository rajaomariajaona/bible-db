document_id: 1SA.23,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in Desert Hideouts
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'It was reported to David that the Philistines were raiding Keilah and looting the grain. David went in prayer to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': “Should I go after these Philistines and teach them a lesson?”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Go. Attack the Philistines and save Keilah.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “And will the head men of Keilah turn me and my men over to Saul?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “They’ll turn you over.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So David and his men got out of there. There were about six hundred of them. They left Keilah and kept moving, going here, there, wherever—always on the move.
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Saul was told that David had escaped from Keilah, he called off the raid.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: David continued to live in desert hideouts and the backcountry wilderness hills of Ziph. Saul was out looking for him day after day, but God never turned David over to him. David kept out of the way in the wilderness of Ziph, secluded at Horesh, since it was plain that Saul was determined to hunt him down.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: 'Jonathan, Saul’s son, visited David at Horesh and encouraged him in God. He said, “Don’t despair. My father, Saul, can’t lay a hand on you. You will be Israel’s king and I’ll be right at your side to help. And my father knows it.” Then the two of them made a covenant before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . David stayed at Horesh and Jonathan went home.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: Some Ziphites went to Saul at Gibeah and said, “Did you know that David is hiding out near us in the caves and canyons of Horesh? Right now he’s at Hakilah Hill just south of Jeshimon. So whenever you’re ready to come down, we’d count it an honor to hand him over to the king.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: Saul said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' bless you for thinking about me! Now go back and check everything out. Learn his routines. Observe his movements—where he goes, who he’s with. He’s very shrewd, you know. Scout out all his hiding places. Then meet me at Nacon and I’ll go with you. If he is anywhere to be found in all the thousands of Judah, I’ll track him down!”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-27
    - type: text
      text: So the Ziphites set out on their reconnaissance for Saul.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, David and his men were in the wilderness of Maon, in the desert south of Jeshimon. Saul and his men arrived and began their search. When David heard of it, he went south to Rock Mountain, camping out in the wilderness of Maon. Saul heard where he was and set off for the wilderness of Maon in pursuit. Saul was on one side of the mountain, David and his men on the other. David was in full retreat, running, with Saul and his men closing in, about to get him. Just then a messenger came to Saul and said, “Hurry! Come back! The Philistines have just attacked the country!”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: So Saul called off his pursuit of David and went back to deal with the Philistines. That’s how that place got the name Narrow Escape. David left there and camped out in the caves and canyons of En Gedi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But David’s men said, “We live in fear of our lives right here in Judah. How can you think of going to Keilah in the thick of the Philistines?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So David went back to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in prayer. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Get going. Head for Keilah. I’m placing the Philistines in your hands.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: David and his men went to Keilah and fought the Philistines. He scattered their cattle, beat them decisively, and saved the people of Keilah. After Abiathar took refuge with David, he joined David in the raid on Keilah, bringing the Ephod with him.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: Saul learned that David had gone to Keilah and thought immediately, “Good! God has handed him to me on a platter! He’s in a walled city with locked gates, trapped!” Saul mustered his troops for battle and set out for Keilah to lay siege to David and his men.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: 'But David got wind of Saul’s strategy to destroy him and said to Abiathar the priest, “Get the Ephod.” Then David prayed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': “God of Israel, I’ve just heard that Saul plans to come to Keilah and destroy the city because of me. Will the city fathers of Keilah turn me over to him? Will Saul come down and do what I’ve heard? O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', God of Israel, tell me!”'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' replied, “He’s coming down.”'
