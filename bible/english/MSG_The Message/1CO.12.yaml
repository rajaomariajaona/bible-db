document_id: 1CO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Spiritual Gifts
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: What I want to talk about now is the various ways God’s Spirit gets worked into our lives. This is complex and often misunderstood, but I want you to be informed and knowledgeable. Remember how you were when you didn’t know God, led from one phony god to another, never knowing what you were doing, just doing it because everybody else did it? It’s different in this life. God wants us to use our intelligence, to seek to understand as well as we can. For instance, by using your heads, you know perfectly well that the Spirit of God would never prompt anyone to say “Jesus be damned!” Nor would anyone be inclined to say “Jesus is Master!” without the insight of the Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-11
  - type: text
    text: 'God’s various gifts are handed out everywhere; but they all originate in God’s Spirit. God’s various ministries are carried out everywhere; but they all originate in God’s Spirit. God’s various expressions of power are in action everywhere; but God himself is behind it all. Each person is given something to do that shows who God is: Everyone gets in on it, everyone benefits. All kinds of things are handed out by the Spirit, and to all kinds of people! The variety is wonderful:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: wise counsel
- type: usfm
  marker: li1
  children:
  - type: text
    text: clear understanding
- type: usfm
  marker: li1
  children:
  - type: text
    text: simple trust
- type: usfm
  marker: li1
  children:
  - type: text
    text: healing the sick
- type: usfm
  marker: li1
  children:
  - type: text
    text: miraculous acts
- type: usfm
  marker: li1
  children:
  - type: text
    text: proclamation
- type: usfm
  marker: li1
  children:
  - type: text
    text: distinguishing between spirits
- type: usfm
  marker: li1
  children:
  - type: text
    text: tongues
- type: usfm
  marker: li1
  children:
  - type: text
    text: interpretation of tongues.
- type: usfm
  marker: m
  children:
  - type: text
    text: All these gifts have a common origin, but are handed out one by one by the one Spirit of God. He decides who gets what, and when.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'You can easily enough see how this kind of thing works by looking no further than your own body. Your body has many parts—limbs, organs, cells—but no matter how many parts you can name, you’re still one body. It’s exactly the same with Christ. By means of his one Spirit, we all said good-bye to our partial and piecemeal lives. We each used to independently call our own shots, but then we entered into a large and integrated life in which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' has the final say in everything. (This is what we proclaimed in word and action when we were baptized.) Each of us is now a part of his resurrection body, refreshed and sustained at one fountain—his Spirit—where we all come to drink. The old labels we once used to identify ourselves—labels like Jew or Greek, slave or free—are no longer useful. We need something larger, more comprehensive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-18
  - type: text
    text: I want you to think about how all this makes you more significant, not less. A body isn’t just a single part blown up into something huge. It’s all the different-but-similar parts arranged and functioning together. If Foot said, “I’m not elegant like Hand, embellished with rings; I guess I don’t belong to this body,” would that make it so? If Ear said, “I’m not beautiful like Eye, transparent and expressive; I don’t deserve a place on the head,” would you want to remove it from the body? If the body was all eye, how could it hear? If all ear, how could it smell? As it is, we see that God has carefully placed each part of the body right where he wanted it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-24
  - type: text
    text: 'But I also want you to think about how this keeps your significance from getting blown up into self-importance. For no matter how significant you are, it is only because of what you are a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: part
  - type: text
    text: ' of. An enormous eye or a gigantic hand wouldn’t be a body, but a monster. What we have is one body with many parts, each its proper size and in its proper place. No part is important on its own. Can you imagine Eye telling Hand, “Get lost; I don’t need you”? Or, Head telling Foot, “You’re fired; your job has been phased out”? As a matter of fact, in practice it works the other way—the “lower” the part, the more basic, and therefore necessary. You can live without an eye, for instance, but not without a stomach. When it’s a part of your own body you are concerned with, it makes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no
  - type: text
    text: ' difference whether the part is visible or clothed, higher or lower. You give it dignity and honor just as it is, without comparisons. If anything, you have more concern for the lower parts than the higher. If you had to choose, wouldn’t you prefer good digestion to full-bodied hair?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'The way God designed our bodies is a model for understanding our lives together as a church: every part dependent on every other part, the parts we mention and the parts we don’t, the parts we see and the parts we don’t. If one part hurts, every other part is involved in the hurt, and in the healing. If one part flourishes, every other part enters into the exuberance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-31
  - type: text
    text: 'You are Christ’s body—that’s who you are! You must never forget this. Only as you accept your part of that body does your “part” mean anything. You’re familiar with some of the parts that God has formed in his church, which is his “body”:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: apostles
- type: usfm
  marker: li1
  children:
  - type: text
    text: prophets
- type: usfm
  marker: li1
  children:
  - type: text
    text: teachers
- type: usfm
  marker: li1
  children:
  - type: text
    text: miracle workers
- type: usfm
  marker: li1
  children:
  - type: text
    text: healers
- type: usfm
  marker: li1
  children:
  - type: text
    text: helpers
- type: usfm
  marker: li1
  children:
  - type: text
    text: organizers
- type: usfm
  marker: li1
  children:
  - type: text
    text: those who pray in tongues.
- type: usfm
  marker: m
  children:
  - type: text
    text: But it’s obvious by now, isn’t it, that Christ’s church is a complete Body and not a gigantic, unidimensional Part? It’s not all Apostle, not all Prophet, not all Miracle Worker, not all Healer, not all Prayer in Tongues, not all Interpreter of Tongues. And yet some of you keep competing for so-called “important” parts.
- type: usfm
  marker: p
  children:
  - type: text
    text: But now I want to lay out a far better way for you.
