type_code: eng
verses:
  '1':
  - type: text
    content: My theme song is God’s love and justice,
  - type: text
    content: 'and I’m singing it right to you, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: I’m finding my way down the road of right living,
  - type: text
    content: but how long before you show up?
  - type: text
    content: I’m doing the very best I can,
  - type: text
    content: and I’m doing it at home, where it counts.
  - type: text
    content: I refuse to take a second look
  - type: text
    content: at corrupting people and degrading things.
  - type: text
    content: I reject made-in-Canaan gods,
  - type: text
    content: stay clear of contamination.
  - type: text
    content: The crooked in heart keep their distance;
  - type: text
    content: I refuse to shake hands with those who plan evil.
  - type: text
    content: I put a gag on the gossip
  - type: text
    content: who bad-mouths his neighbor;
  - type: text
    content: I can’t stand
  - type: text
    content: arrogance.
  - type: text
    content: But I have my eye on salt-of-the-earth people—
  - type: text
    content: they’re the ones I want working with me;
  - type: text
    content: Men and women on the straight and narrow—
  - type: text
    content: these are the ones I want at my side.
  - type: text
    content: But no one who traffics in lies
  - type: text
    content: gets a job with me; I have no patience with liars.
  - type: text
    content: I’ve rounded up all the wicked like cattle
  - type: text
    content: and herded them right out of the country.
  - type: text
    content: 'I purged '
  - type: text
    content: God
  - type: text
    content: ’s city
  - type: text
    content: of all who make a business of evil.
