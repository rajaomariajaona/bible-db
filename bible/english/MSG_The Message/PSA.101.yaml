document_id: PSA.101
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-8
  - type: text
    text: My theme song is God’s love and justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and I’m singing it right to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m finding my way down the road of right living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but how long before you show up?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m doing the very best I can,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’m doing it at home, where it counts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I refuse to take a second look
- type: usfm
  marker: q2
  children:
  - type: text
    text: at corrupting people and degrading things.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I reject made-in-Canaan gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stay clear of contamination.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The crooked in heart keep their distance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I refuse to shake hands with those who plan evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I put a gag on the gossip
- type: usfm
  marker: q2
  children:
  - type: text
    text: who bad-mouths his neighbor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I can’t stand
- type: usfm
  marker: q2
  children:
  - type: text
    text: arrogance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I have my eye on salt-of-the-earth people—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re the ones I want working with me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Men and women on the straight and narrow—
- type: usfm
  marker: q2
  children:
  - type: text
    text: these are the ones I want at my side.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But no one who traffics in lies
- type: usfm
  marker: q2
  children:
  - type: text
    text: gets a job with me; I have no patience with liars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve rounded up all the wicked like cattle
- type: usfm
  marker: q2
  children:
  - type: text
    text: and herded them right out of the country.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I purged '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s city
- type: usfm
  marker: q2
  children:
  - type: text
    text: of all who make a business of evil.
