document_id: HEB.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Melchizedek, Priest of God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Melchizedek was king of Salem and priest of the Highest God. He met Abraham, who was returning from “the royal massacre,” and gave him his blessing. Abraham in turn gave him a tenth of the spoils. “Melchizedek” means “King of Righteousness.” “Salem” means “Peace.” So, he is also “King of Peace.” Melchizedek towers out of the past—without record of family ties, no account of beginning or end. In this way he is like the Son of God, one huge priestly presence dominating the landscape always.
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-14
    - type: text
      text: If the priesthood of Levi and Aaron, which provided the framework for the giving of the law, could really make people perfect, there wouldn’t have been need for a new priesthood like that of Melchizedek. But since it didn’t get the job done, there was a change of priesthood, which brought with it a radical new kind of law. There is no way of understanding this in terms of the old Levitical priesthood, which is why there is nothing in Jesus’ family tree connecting him with that priestly line.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-19
    - type: text
      text: 'But the Melchizedek story provides a perfect analogy: Jesus, a priest like Melchizedek, not by genealogical descent but by the sheer force of resurrection life—he lives!—“priest forever in the royal order of Melchizedek.” The former way of doing things, a system of commandments that never worked out the way it was supposed to, was set aside; the law brought nothing to maturity. Another way—Jesus!—a way that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' work, that brings us right into the presence of God, is put in its place.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: 'The old priesthood of Aaron perpetuated itself automatically, father to son, without explicit confirmation by God. But then God intervened and called this new, permanent priesthood into being with an added promise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God gave his word;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he won’t take it back:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You’re the permanent priest.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: This makes Jesus the guarantee of a far better way between us and God—one that really works! A new covenant.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: Earlier there were a lot of priests, for they died and had to be replaced. But Jesus’ priesthood is permanent. He’s there from now to eternity to save everyone who comes to God through him, always on the job to speak up for them.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-28
    - type: text
      text: 'So now we have a high priest who perfectly fits our needs: completely holy, uncompromised by sin, with authority extending as high as God’s presence in heaven itself. Unlike the other high priests, he doesn’t have to offer sacrifices for his own sins every day before he can get around to us and our sins. He’s done it, once and for all: offered up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: ' as the sacrifice. The law appoints as high priests men who are never able to get the job done right. But this intervening command of God, which came later, appoints the Son, who is absolutely, eternally perfect.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-7
    - type: text
      text: You realize just how great Melchizedek is when you see that Father Abraham gave him a tenth of the captured treasure. Priests descended from Levi are commanded by law to collect tithes from the people, even though they are all more or less equals, priests and people, having a common father in Abraham. But this man, a complete outsider, collected tithes from Abraham and blessed him, the one to whom the promises had been given. In acts of blessing, the lesser is blessed by the greater.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: 'Or look at it this way: We pay our tithes to priests who die, but Abraham paid tithes to a priest who, the Scripture says, “lives.” Ultimately you could even say that since Levi descended from Abraham, who paid tithes to Melchizedek, when we pay tithes to the priestly tribe of Levi they end up with Melchizedek.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Permanent Priesthood
    marker-yv: yv-h
