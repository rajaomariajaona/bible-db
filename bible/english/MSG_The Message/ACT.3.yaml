document_id: ACT.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: One day at three o’clock in the afternoon, Peter and John were on their way into the Temple for prayer meeting. At the same time there was a man crippled from birth being carried up. Every day he was set down at the Temple gate, the one named Beautiful, to beg from those going into the Temple. When he saw Peter and John about to enter the Temple, he asked for a handout. Peter, with John at his side, looked him straight in the eye and said, “Look here.” He looked up, expecting to get something from them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8a
  - type: text
    text: ' Peter said, “I don’t have a nickel to my name, but what I do have, I give you: In the name of Jesus Christ of Nazareth, walk!” He grabbed him by the right hand and pulled him up. In an instant his feet and ankles became firm. He jumped to his feet and walked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8b-10
  - type: text
    text: ' The man went into the Temple with them, walking back and forth, dancing and praising God. Everybody there saw him walking around and praising God. They recognized him as the one who sat begging at the Temple’s Gate Beautiful and rubbed their eyes, astonished, scarcely believing what they were seeing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The man threw his arms around Peter and John, ecstatic. All the people ran up to where they were at Solomon’s Porch to see it for themselves.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Turn to Face God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-16
  - type: text
    text: 'When Peter saw he had a congregation, he addressed the people:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Oh, Israelites, why does this take you by such complete surprise, and why stare at us as if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' power or piety made him walk? The God of Abraham and Isaac and Jacob, the God of our ancestors, has glorified his Son Jesus. The very One that Pilate called innocent, you repudiated. You repudiated the Holy One, the Just One, and asked for a murderer in his place. You no sooner killed the Author of Life than God raised him from the dead—and we’re the witnesses. Faith in Jesus’ name put this man, whose condition you know so well, on his feet—yes, faith and nothing but faith put this man healed and whole right before your eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: “And now, friends, I know you had no idea what you were doing when you killed Jesus, and neither did your leaders. But God, who through the preaching of all the prophets had said all along that his Messiah would be killed, knew exactly what you were doing and used it to fulfill his plans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-23
  - type: text
    text: “Now it’s time to change your ways! Turn to face God so he can wipe away your sins, pour out showers of blessing to refresh you, and send you the Messiah he prepared for you, namely, Jesus. For the time being he must remain out of sight in heaven until everything is restored to order again just the way God, through the preaching of his holy prophets of old, said it would be. Moses, for instance, said, ‘Your God will raise up for you a prophet just like me from your family. Listen to every word he speaks to you. Every last living soul who refuses to listen to that prophet will be wiped out from the people.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-26
  - type: text
    text: '“All the prophets from Samuel on down said the same thing, said most emphatically that these days would come. These prophets, along with the covenant God made with your ancestors, are your family tree. God’s covenant-word to Abraham provides the text: ‘By your offspring all the families of the earth will be blessed.’ But you are first in line: God, having raised up his Son, sent him to bless you as you turn, one by one, from your evil ways.”'
