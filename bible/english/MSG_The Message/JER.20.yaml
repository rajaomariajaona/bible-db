document_id: JER.20,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Life’s Been Nothing but Trouble and Tears
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: 'The priest Pashur son of Immer was the senior priest in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Temple. He heard Jeremiah preach this sermon. He whipped Jeremiah the prophet and put him in the stocks at the Upper Benjamin Gate of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Temple. The next day Pashur came and let him go. Jeremiah told him, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has a new name for you: not Pashur but Danger-Everywhere, because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, ‘You’re a danger to yourself and everyone around you. All your friends are going to get killed in battle while you stand there and watch. What’s more, I’m turning all of Judah over to the king of Babylon to do whatever he likes with them—haul them off into exile, kill them at whim. Everything worth anything in this city, property and possessions along with everything in the royal treasury—I’m handing it all over to the enemy. They’ll rummage through it and take what they want back to Babylon.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', a most fierce warrior, is at my side.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Those who are after me will be sent sprawling—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Slapstick buffoons falling all over themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a spectacle of humiliation no one will ever forget.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Oh, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies, no one fools you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You see through everyone, everything.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I want to see you pay them back for what they’ve done.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I rest my case with you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Sing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! All praise to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He saves the weak from the grip of the wicked.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-18
    - type: text
      text: Curse the day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was born!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day my mother bore me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a curse on it, I say!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And curse the man who delivered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the news to my father:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You’ve got a new baby—a boy baby!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: (How happy it made him.)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let that birth notice be blacked out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deleted from the records,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the man who brought it haunted to his death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the bad news he brought.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He should have killed me before I was born,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with that womb as my tomb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My mother pregnant for the rest of her life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a baby dead in her womb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, oh why, did I ever leave that womb?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Life’s been nothing but trouble and tears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what’s coming is more of the same.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “‘And you, Pashur, you and everyone in your family will be taken prisoner into exile—that’s right, exile in Babylon. You’ll die and be buried there, you and all your cronies to whom you preached your lies.’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-10
    - type: text
      text: 'You pushed me into this, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and I let you do it.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You were too much for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now I’m a public joke.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They all poke fun at me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every time I open my mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m shouting, “Murder!” or “Rape!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And all I get for my '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -warnings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are insults and contempt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if I say, “Forget it!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'No more '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -Messages from me!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words are fire in my belly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a burning in my bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m worn out trying to hold it in.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can’t do it any longer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then I hear whispering behind my back:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “There goes old ‘Danger-Everywhere.’ Shut him up! Report him!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Old friends watch, hoping I’ll fall flat on my face:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “One misstep and we’ll have him. We’ll get rid of him for good!”
