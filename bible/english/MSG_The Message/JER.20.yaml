type_code: eng
verses:
  '1':
  - type: heading
    content: Life’s Been Nothing but Trouble and Tears
  - type: text
    content: 'The priest Pashur son of Immer was the senior priest in '
  - type: text
    content: God
  - type: text
    content: '’s Temple. He heard Jeremiah preach this sermon. He whipped Jeremiah the prophet and put him in the stocks at the Upper Benjamin Gate of '
  - type: text
    content: God
  - type: text
    content: ’s Temple. The next day Pashur came and let him go. Jeremiah told him, “
  - type: text
    content: God
  - type: text
    content: ' has a new name for you: not Pashur but Danger-Everywhere, because '
  - type: text
    content: God
  - type: text
    content: ' says, ‘You’re a danger to yourself and everyone around you. All your friends are going to get killed in battle while you stand there and watch. What’s more, I’m turning all of Judah over to the king of Babylon to do whatever he likes with them—haul them off into exile, kill them at whim. Everything worth anything in this city, property and possessions along with everything in the royal treasury—I’m handing it all over to the enemy. They’ll rummage through it and take what they want back to Babylon.'
  '11':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ', a most fierce warrior, is at my side.'
  - type: text
    content: Those who are after me will be sent sprawling—
  - type: text
    content: Slapstick buffoons falling all over themselves,
  - type: text
    content: a spectacle of humiliation no one will ever forget.
  '12':
  - type: text
    content: 'Oh, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, no one fools you.
  - type: text
    content: You see through everyone, everything.
  - type: text
    content: I want to see you pay them back for what they’ve done.
  - type: text
    content: I rest my case with you.
  '13':
  - type: text
    content: 'Sing to '
  - type: text
    content: God
  - type: text
    content: '! All praise to '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: He saves the weak from the grip of the wicked.
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: Curse the day
  - type: text
    content: I was born!
  - type: text
    content: The day my mother bore me—
  - type: text
    content: a curse on it, I say!
  - type: text
    content: And curse the man who delivered
  - type: text
    content: 'the news to my father:'
  - type: text
    content: “You’ve got a new baby—a boy baby!”
  - type: text
    content: (How happy it made him.)
  - type: text
    content: Let that birth notice be blacked out,
  - type: text
    content: deleted from the records,
  - type: text
    content: And the man who brought it haunted to his death
  - type: text
    content: with the bad news he brought.
  - type: text
    content: He should have killed me before I was born,
  - type: text
    content: with that womb as my tomb,
  - type: text
    content: My mother pregnant for the rest of her life
  - type: text
    content: with a baby dead in her womb.
  - type: text
    content: Why, oh why, did I ever leave that womb?
  - type: text
    content: Life’s been nothing but trouble and tears,
  - type: text
    content: and what’s coming is more of the same.
  '6':
  - type: text
    content: “‘And you, Pashur, you and everyone in your family will be taken prisoner into exile—that’s right, exile in Babylon. You’ll die and be buried there, you and all your cronies to whom you preached your lies.’”
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: 'You pushed me into this, '
  - type: text
    content: God
  - type: text
    content: ', and I let you do it.'
  - type: text
    content: You were too much for me.
  - type: text
    content: And now I’m a public joke.
  - type: text
    content: They all poke fun at me.
  - type: text
    content: Every time I open my mouth
  - type: text
    content: I’m shouting, “Murder!” or “Rape!”
  - type: text
    content: 'And all I get for my '
  - type: text
    content: God
  - type: text
    content: -warnings
  - type: text
    content: are insults and contempt.
  - type: text
    content: But if I say, “Forget it!
  - type: text
    content: 'No more '
  - type: text
    content: God
  - type: text
    content: -Messages from me!”
  - type: text
    content: The words are fire in my belly,
  - type: text
    content: a burning in my bones.
  - type: text
    content: I’m worn out trying to hold it in.
  - type: text
    content: I can’t do it any longer!
  - type: text
    content: 'Then I hear whispering behind my back:'
  - type: text
    content: “There goes old ‘Danger-Everywhere.’ Shut him up! Report him!”
  - type: text
    content: 'Old friends watch, hoping I’ll fall flat on my face:'
  - type: text
    content: “One misstep and we’ll have him. We’ll get rid of him for good!”
