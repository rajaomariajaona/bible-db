verses:
  '1':
  - type: text
    content: It so happened that Naomi had a relative by marriage, a man prominent and rich, connected with Elimelech’s family. His name was Boaz.
  '10':
  - type: text
    content: She dropped to her knees, then bowed her face to the ground. “How does this happen that you should pick me out and treat me so kindly—
  - type: text
    content: me
  - type: text
    content: ', a foreigner?”'
  '11':
  - type: text
    content: 'Boaz answered her, “I’ve heard all about you—heard about the way you treated your mother-in-law after the death of her husband, and how you left your father and mother and the land of your birth and have come to live among a bunch of total strangers. '
  - type: text
    content: God
  - type: text
    content: ' reward you well for what you’ve done—and with a generous bonus besides from '
  - type: text
    content: God
  - type: text
    content: ', to whom you’ve come seeking protection under his wings.”'
  '13':
  - type: text
    content: She said, “Oh sir, such grace, such kindness—I don’t deserve it. You’ve touched my heart, treated me like one of your own. And I don’t even belong here!”
  '14':
  - type: text
    content: At the lunch break, Boaz said to her, “Come over here; eat some bread. Dip it in the wine.”
  - type: text
    content: So she joined the harvesters. Boaz passed the roasted grain to her. She ate her fill and even had some left over.
  '15':
  - type: text
    content: 'When she got up to go back to work, Boaz ordered his servants: “Let her glean where there’s still plenty of grain on the ground—make it easy for her. Better yet, pull some of the good stuff out and leave it for her to glean. Give her special treatment.”'
  '17':
  - type: text
    content: Ruth gleaned in the field until evening. When she threshed out what she had gathered, she ended up with nearly a full sack of barley! She gathered up her gleanings, went back to town, and showed her mother-in-law the results of her day’s work; she also gave her the leftovers from her lunch.
  '19':
  - type: text
    content: 'Naomi asked her, “So where did you glean today? Whose field? '
  - type: text
    content: God
  - type: text
    content: ' bless whoever it was who took such good care of you!”'
  - type: text
    content: Ruth told her mother-in-law, “The man with whom I worked today? His name is Boaz.”
  '2':
  - type: text
    content: One day Ruth, the Moabite foreigner, said to Naomi, “I’m going to work; I’m going out to glean among the sheaves, following after some harvester who will treat me kindly.”
  - type: text
    content: Naomi said, “Go ahead, dear daughter.”
  '20':
  - type: text
    content: 'Naomi said to her daughter-in-law, “Why, '
  - type: text
    content: God
  - type: text
    content: ' bless that man! '
  - type: text
    content: God
  - type: text
    content: ' hasn’t quite walked out on us after all! He still loves us, in bad times as well as good!”'
  - type: text
    content: Naomi went on, “That man, Ruth, is one of our circle of covenant redeemers, a close relative of ours!”
  '21':
  - type: text
    content: 'Ruth the Moabitess said, “Well, listen to this: He also told me, ‘Stick with my workers until my harvesting is finished.’”'
  '22':
  - type: text
    content: Naomi said to Ruth, “That’s wonderful, dear daughter! Do that! You’ll be safe in the company of his young women; no danger now of being raped in some stranger’s field.”
  '23':
  - type: text
    content: So Ruth did it—she stuck close to Boaz’s young women, gleaning in the fields daily until both the barley and wheat harvesting were finished. And she continued living with her mother-in-law.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: And so she set out. She went and started gleaning in a field, following in the wake of the harvesters. Eventually she ended up in the part of the field owned by Boaz, her father-in-law Elimelech’s relative. A little later Boaz came out from Bethlehem, greeting his harvesters, “
  - type: text
    content: God
  - type: text
    content: ' be with you!” They replied, “And '
  - type: text
    content: God
  - type: text
    content: ' bless you!”'
  '5':
  - type: text
    content: Boaz asked his young servant who was foreman over the farm hands, “Who is this young woman? Where did she come from?”
  '6':
  - type: text
    content: The foreman said, “Why, that’s the Moabite girl, the one who came with Naomi from the country of Moab. She asked permission. ‘Let me glean,’ she said, ‘and gather among the sheaves following after your harvesters.’ She’s been at it steady ever since, from early morning until now, without so much as a break.”
  '8':
  - type: text
    content: 'Then Boaz spoke to Ruth: “Listen, my daughter. From now on don’t go to any other field to glean—stay right here in this one. And stay close to my young women. Watch where they are harvesting and follow them. And don’t worry about a thing; I’ve given orders to my servants not to harass you. When you get thirsty, feel free to go and drink from the water buckets that the servants have filled.”'
