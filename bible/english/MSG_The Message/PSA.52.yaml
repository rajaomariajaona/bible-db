document_id: PSA.52
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: Why do you brag of evil, “Big Man”?
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s mercy carries the day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You scheme catastrophe;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your tongue cuts razor-sharp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: artisan in lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You love evil more than good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you call black white.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You love malicious gossip,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you foul-mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God will tear you limb from limb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweep you up and throw you out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pull you up by the roots
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the land of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: Good people will watch and
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'worship. They’ll laugh in relief:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Big Man bet on the wrong horse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trusted in big money,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made his living from catastrophe.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And I’m an olive tree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: growing green in God’s house.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I trusted in the generous mercy
- type: usfm
  marker: q2
  children:
  - type: text
    text: of God then and now.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I thank you always
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you went into action.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’ll stay right here,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your good name my hope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in company with your faithful friends.
