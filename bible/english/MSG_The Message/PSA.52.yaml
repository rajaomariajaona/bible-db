document_id: PSA.52,97
type_code: eng
verses:
  '1':
  - type: text
    content: Why do you brag of evil, “Big Man”?
  - type: text
    content: God’s mercy carries the day.
  - type: text
    content: You scheme catastrophe;
  - type: text
    content: your tongue cuts razor-sharp,
  - type: text
    content: artisan in lies.
  - type: text
    content: You love evil more than good,
  - type: text
    content: you call black white.
  - type: text
    content: You love malicious gossip,
  - type: text
    content: you foul-mouth.
  '5':
  - type: text
    content: God will tear you limb from limb,
  - type: text
    content: sweep you up and throw you out,
  - type: text
    content: Pull you up by the roots
  - type: text
    content: from the land of life.
  '6':
  - type: text
    content: Good people will watch and
  - type: text
    content: 'worship. They’ll laugh in relief:'
  - type: text
    content: “Big Man bet on the wrong horse,
  - type: text
    content: trusted in big money,
  - type: text
    content: made his living from catastrophe.”
  '8':
  - type: text
    content: And I’m an olive tree,
  - type: text
    content: growing green in God’s house.
  - type: text
    content: I trusted in the generous mercy
  - type: text
    content: of God then and now.
  '9':
  - type: text
    content: I thank you always
  - type: text
    content: that you went into action.
  - type: text
    content: And I’ll stay right here,
  - type: text
    content: your good name my hope,
  - type: text
    content: in company with your faithful friends.
