document_id: 1SA.17,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Goliath
  - type: text
    content: The Philistines drew up their troops for battle. They deployed them at Socoh in Judah, and set up camp between Socoh and Azekah at Ephes Dammim. Saul and the Israelites came together, camped at Oak Valley, and spread out their troops in battle readiness for the Philistines. The Philistines were on one hill, the Israelites on the opposing hill, with the valley between them.
  '11':
  - type: text
    content: When Saul and his troops heard the Philistine’s challenge, they were terrified and lost all hope.
  '12':
  - type: text
    content: Enter David. He was the son of Jesse the Ephrathite from Bethlehem in Judah. Jesse, the father of eight sons, was himself too old to join Saul’s army. Jesse’s three oldest sons had followed Saul to war. The names of the three sons who had joined up with Saul were Eliab, the firstborn; next, Abinadab; and third, Shammah. David was the youngest son. While his three oldest brothers went to war with Saul, David went back and forth from attending to Saul to tending his father’s sheep in Bethlehem.
  '16':
  - type: text
    content: Each morning and evening for forty days, Goliath took his stand and made his speech.
  '17':
  - type: text
    content: One day, Jesse told David his son, “Take this sack of cracked wheat and these ten loaves of bread and run them down to your brothers in the camp. And take these ten wedges of cheese to the captain of their division. Check in on your brothers to see whether they are getting along all right, and let me know how they’re doing—Saul and your brothers, and all the Israelites in their war with the Philistines in the Oak Valley.”
  '20':
  - type: text
    content: David was up at the crack of dawn and, having arranged for someone to tend his flock, took the food and was on his way just as Jesse had directed him. He arrived at the camp just as the army was moving into battle formation, shouting the war cry. Israel and the Philistines moved into position, facing each other, battle-ready. David left his bundles of food in the care of a sentry, ran to the troops who were deployed, and greeted his brothers. While they were talking together, the Philistine champion, Goliath of Gath, stepped out from the front lines of the Philistines, and gave his usual challenge. David heard him.
  '24':
  - type: text
    content: The Israelites, to a man, fell back the moment they saw the giant—totally frightened. The talk among the troops was, “Have you ever seen anything like this, this man openly and defiantly challenging Israel? The man who kills the giant will have it made. The king will give him a huge reward, offer his daughter as a bride, and give his entire family a free ride.”
  - type: heading
    content: Five Smooth Stones
  '26':
  - type: text
    content: David, who was talking to the men standing around him, asked, “What’s in it for the man who kills that Philistine and gets rid of this ugly blot on Israel’s honor? Who does he think he is, anyway, this uncircumcised Philistine, taunting the armies of God-Alive?”
  '27':
  - type: text
    content: They told him what everyone was saying about what the king would do for the man who killed the Philistine.
  '28':
  - type: text
    content: 'Eliab, his older brother, heard David fraternizing with the men and lost his temper: “What are you doing here! Why aren’t you minding your own business, tending that scrawny flock of sheep? I know what you’re up to. You’ve come down here to see the sights, hoping for a ringside seat at a bloody battle!”'
  '29':
  - type: text
    content: “What is it with you?” replied David. “All I did was ask a question.” Ignoring his brother, he turned to someone else, asked the same question, and got the same answer as before.
  '31':
  - type: text
    content: The things David was saying were picked up and reported to Saul. Saul sent for him.
  '32':
  - type: text
    content: “Master,” said David, “don’t give up hope. I’m ready to go and fight this Philistine.”
  '33':
  - type: text
    content: Saul answered David, “You can’t go and fight this Philistine. You’re too young and inexperienced—and he’s been at this fighting business since before you were born.”
  '34':
  - type: text
    content: 'David said, “I’ve been a shepherd, tending sheep for my father. Whenever a lion or bear came and took a lamb from the flock, I’d go after it, knock it down, and rescue the lamb. If it turned on me, I’d grab it by the throat, wring its neck, and kill it. Lion or bear, it made no difference—I killed it. And I’ll do the same to this Philistine pig who is taunting the troops of God-Alive. '
  - type: text
    content: God
  - type: text
    content: ', who delivered me from the teeth of the lion and the claws of the bear, will deliver me from this Philistine.”'
  - type: text
    content: 'Saul said, “Go. And '
  - type: text
    content: God
  - type: text
    content: ' help you!”'
  '38':
  - type: text
    content: Then Saul outfitted David as a soldier in armor. He put his bronze helmet on his head and belted his sword on him over the armor. David tried to walk but he could hardly budge.
  - type: text
    content: David told Saul, “I can’t even move with all this stuff on me. I’m not used to this.” And he took it all off.
  '4':
  - type: text
    content: A giant nearly ten feet tall stepped out from the Philistine line into the open, Goliath from Gath. He had a bronze helmet on his head and was dressed in armor—126 pounds of it! He wore bronze shin guards and carried a bronze sword. His spear was like a fence rail—the spear tip alone weighed over fifteen pounds. His shield bearer walked ahead of him.
  '40':
  - type: text
    content: Then David took his shepherd’s staff, selected five smooth stones from the brook, and put them in the pocket of his shepherd’s pack, and with his sling in his hand approached Goliath.
  '41':
  - type: text
    content: As the Philistine paced back and forth, his shield bearer in front of him, he noticed David. He took one look down on him and sneered—a mere boy, apple-cheeked and peach-fuzzed.
  '43':
  - type: text
    content: The Philistine ridiculed David. “Am I a dog that you come after me with a stick?” And he cursed him by his gods.
  '44':
  - type: text
    content: “Come on,” said the Philistine. “I’ll make roadkill of you for the buzzards. I’ll turn you into a tasty morsel for the field mice.”
  '45':
  - type: text
    content: 'David answered, “You come at me with sword and spear and battle-ax. I come at you in the name of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, the God of Israel’s troops, whom you curse and mock. This very day '
  - type: text
    content: God
  - type: text
    content: ' is handing you over to me. I’m about to kill you, cut off your head, and serve up your body and the bodies of your Philistine buddies to the crows and coyotes. The whole earth will know that there’s an extraordinary God in Israel. And everyone gathered here will learn that '
  - type: text
    content: God
  - type: text
    content: ' doesn’t save by means of sword or spear. The battle belongs to '
  - type: text
    content: God
  - type: text
    content: —he’s handing you to us on a platter!”
  '48':
  - type: text
    content: That roused the Philistine, and he started toward David. David took off from the front line, running toward the Philistine. David reached into his pocket for a stone, slung it, and hit the Philistine hard in the forehead, embedding the stone deeply. The Philistine crashed, facedown in the dirt.
  '50':
  - type: text
    content: That’s how David beat the Philistine—with a sling and a stone. He hit him and killed him. No sword for David!
  '51':
  - type: text
    content: Then David ran up to the Philistine and stood over him, pulled the giant’s sword from its sheath, and finished the job by cutting off his head. When the Philistines saw that their great champion was dead, they scattered, running for their lives.
  '52':
  - type: text
    content: The men of Israel and Judah were up on their feet, shouting! They chased the Philistines all the way to the outskirts of Gath and the gates of Ekron. Wounded Philistines were strewn along the Shaaraim road all the way to Gath and Ekron. After chasing the Philistines, the Israelites came back and looted their camp. David took the Philistine’s head and brought it to Jerusalem. But the giant’s weapons he placed in his own tent.
  - type: text
    content: '* * *'
  '55':
  - type: text
    content: When Saul saw David go out to meet the Philistine, he said to Abner, commander of the army, “Tell me about this young man’s family.”
  - type: text
    content: Abner said, “For the life of me, O King, I don’t know.”
  '56':
  - type: text
    content: The king said, “Well, find out the lineage of this raw youth.”
  '57':
  - type: text
    content: As soon as David came back from killing the Philistine, Abner brought him, the Philistine’s head still in his hand, straight to Saul.
  '58':
  - type: text
    content: Saul asked him, “Young man, whose son are you?”
  - type: text
    content: “I’m the son of your servant Jesse,” said David, “the one who lives in Bethlehem.”
  '8':
  - type: text
    content: Goliath stood there and called out to the Israelite troops, “Why bother using your whole army? Am I not Philistine enough for you? And you’re all committed to Saul, aren’t you? So pick your best fighter and pit him against me. If he gets the upper hand and kills me, the Philistines will all become your slaves. But if I get the upper hand and kill him, you’ll all become our slaves and serve us. I challenge the troops of Israel this day. Give me a man. Let us fight it out together!”
