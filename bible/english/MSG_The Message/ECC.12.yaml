document_id: ECC.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honor and enjoy your Creator while you’re still young,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the years take their toll and your vigor wanes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before your vision dims and the world blurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the winter years keep you close to the fire.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of the wise prod us to live well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re like nails hammered home, holding life together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are given by God, the one Shepherd.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But regarding anything beyond this, dear friend, go easy. There’s no end to the publishing of books, and constant study wears you out so you’re no good for anything else. The last and final word is this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do what he tells you.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And that’s it. Eventually God will bring everything that we do out into the open and judge it according to its hidden intent, whether it’s good or evil.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In old age, your body no longer serves you so well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Muscles slacken, grip weakens, joints stiffen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The shades are pulled down on the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can’t come and go at will. Things grind to a halt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hum of the household fades away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are wakened now by bird-song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hikes to the mountains are a thing of the past.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even a stroll down the road has its terrors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hair turns apple-blossom white,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Adorning a fragile and impotent matchstick body.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, you’re well on your way to eternal rest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While your friends make plans for your funeral.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Life, lovely while it lasts, is soon over.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Life as we know it, precious and beautiful, ends.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The body is put back in the same ground it came from.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The spirit returns to God, who first breathed it.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s all smoke, nothing but smoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Quester says that everything’s smoke.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Final Word
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Besides being wise himself, the Quester also taught others knowledge. He weighed, examined, and arranged many proverbs. The Quester did his best to find the right words and write the plain truth.
