document_id: ECC.12,97
type_code: eng
verses:
  '1':
  - type: text
    content: Honor and enjoy your Creator while you’re still young,
  - type: text
    content: Before the years take their toll and your vigor wanes,
  - type: text
    content: Before your vision dims and the world blurs
  - type: text
    content: And the winter years keep you close to the fire.
  '11':
  - type: text
    content: The words of the wise prod us to live well.
  - type: text
    content: They’re like nails hammered home, holding life together.
  - type: text
    content: They are given by God, the one Shepherd.
  '12':
  - type: text
    content: 'But regarding anything beyond this, dear friend, go easy. There’s no end to the publishing of books, and constant study wears you out so you’re no good for anything else. The last and final word is this:'
  - type: text
    content: Fear God.
  - type: text
    content: Do what he tells you.
  '14':
  - type: text
    content: And that’s it. Eventually God will bring everything that we do out into the open and judge it according to its hidden intent, whether it’s good or evil.
  '3':
  - type: text
    content: In old age, your body no longer serves you so well.
  - type: text
    content: Muscles slacken, grip weakens, joints stiffen.
  - type: text
    content: The shades are pulled down on the world.
  - type: text
    content: You can’t come and go at will. Things grind to a halt.
  - type: text
    content: The hum of the household fades away.
  - type: text
    content: You are wakened now by bird-song.
  - type: text
    content: Hikes to the mountains are a thing of the past.
  - type: text
    content: Even a stroll down the road has its terrors.
  - type: text
    content: Your hair turns apple-blossom white,
  - type: text
    content: Adorning a fragile and impotent matchstick body.
  - type: text
    content: Yes, you’re well on your way to eternal rest,
  - type: text
    content: While your friends make plans for your funeral.
  '6':
  - type: text
    content: Life, lovely while it lasts, is soon over.
  - type: text
    content: Life as we know it, precious and beautiful, ends.
  - type: text
    content: The body is put back in the same ground it came from.
  - type: text
    content: The spirit returns to God, who first breathed it.
  '8':
  - type: text
    content: It’s all smoke, nothing but smoke.
  - type: text
    content: The Quester says that everything’s smoke.
  - type: heading
    content: The Final Word
  '9':
  - type: text
    content: Besides being wise himself, the Quester also taught others knowledge. He weighed, examined, and arranged many proverbs. The Quester did his best to find the right words and write the plain truth.
