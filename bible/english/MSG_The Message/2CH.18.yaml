  '23':
  - type: text
    content: 'Just then Zedekiah son of Kenaanah came up and slapped Micaiah in the face, saying, “Since when did the Spirit of '
  - type: text
    content: God
  - type: text
    content: ' leave me and take up with you?”'
  '24':
  - type: text
    content: Micaiah said, “You’ll know soon enough; you’ll know it when you’re frantically and futilely looking for a place to hide.”
  '25':
  - type: text
    content: 'The king of Israel had heard enough: “Get Micaiah out of here! Turn him over to Amon the city magistrate and to Joash the king’s son with this message: ‘King’s orders! Lock him up in jail; keep him on bread and water until I’m back in one piece.’”'
  '27':
  - type: text
    content: Micaiah said,
  - type: text
    content: If you ever get back in one piece,
  - type: text
    content: 'I’m no prophet of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: He added,
  - type: text
    content: When it happens, O people,
  - type: text
    content: remember where you heard it!
  '28':
  - type: text
    content: So the king of Israel and Jehoshaphat king of Judah went ahead and attacked Ramoth Gilead. The king of Israel said to Jehoshaphat, “Wear my kingly robe; I’m going into battle disguised.” So the king of Israel entered the battle in disguise.
  '30':
  - type: text
    content: Meanwhile, the king of Aram had ordered his chariot commanders (there were thirty-two of them), “Don’t bother with anyone whether small or great; go after the king of Israel and him only.”
  '31':
  - type: text
    content: When the chariot commanders saw Jehoshaphat, they said, “There he is! The king of Israel!” and took after him. Jehoshaphat yelled out, and the chariot commanders realized they had the wrong man—it wasn’t the king of Israel after all. God intervened and they let him go.
  '33':
  - type: text
    content: Just then someone, without aiming, shot an arrow into the crowd and hit the king of Israel in the chink of his armor. The king told his charioteer, “Turn back! Get me out of here—I’m wounded.”
  '34':
  - type: text
    content: All day the fighting continued, hot and heavy. Propped up in his chariot, the king watched from the sidelines. He died that evening.
  '4':
  - type: text
    content: 'Then Jehoshaphat said, “But before you do anything, ask '
  - type: text
    content: God
  - type: text
    content: ' for guidance.”'
  '5':
  - type: text
    content: 'The king of Israel got the prophets together—all four hundred of them—and put the question to them: “Should I attack Ramoth Gilead or should I hold back?”'
  - type: text
    content: “Go for it,” they said. “God will hand it over to the king.”
  '6':
  - type: text
    content: 'But Jehoshaphat dragged his feet, “Is there another prophet of '
  - type: text
    content: God
  - type: text
    content: ' around here we can consult? Let’s get a second opinion.”'
  '7':
  - type: text
    content: The king of Israel told Jehoshaphat, “As a matter of fact, there is another. But I hate him. He never preaches anything good to me, only doom, doom, doom—Micaiah son of Imlah.”
  - type: text
    content: “The king shouldn’t talk about a prophet like that!” said Jehoshaphat.
  '8':
  - type: text
    content: So the king of Israel ordered one of his men, “Quickly, get Micaiah son of Imlah.”
  '9':
  - type: text
    content: Meanwhile, the king of Israel and Jehoshaphat were seated on their thrones, dressed in their royal robes, resplendent in front of the Samaria city gates. All the prophets were staging a prophecy-performance for their benefit. Zedekiah son of Kenaanah had even made a set of iron horns, and brandishing them, called out, “
  - type: text
    content: God
  - type: text
    content: '’s word! With these horns you’ll gore Aram until there’s nothing left of them!” All the prophets chimed in, “Yes! Go for Ramoth Gilead! An easy victory! '
  - type: text
    content: God
  - type: text
    content: ’s gift to the king!”
