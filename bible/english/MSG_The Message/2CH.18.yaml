document_id: 2CH.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'But even though Jehoshaphat was very rich and much honored, he made a marriage alliance with Ahab of Israel. Some time later he paid a visit to Ahab at Samaria. Ahab celebrated his visit with a feast—a huge barbecue with all the lamb and beef you could eat. But Ahab had a hidden agenda; he wanted Jehoshaphat’s support in attacking Ramoth Gilead. Then Ahab brought it into the open: “Will you join me in attacking Ramoth Gilead?” Jehoshaphat said, “You bet. I’m with you all the way; you can count on me and my troops.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Jehoshaphat said, “But before you do anything, ask '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for guidance.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The king of Israel got the prophets together—all four hundred of them—and put the question to them: “Should I attack Ramoth Gilead or should I hold back?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Go for it,” they said. “God will hand it over to the king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But Jehoshaphat dragged his feet, “Is there another prophet of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' around here we can consult? Let’s get a second opinion.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The king of Israel told Jehoshaphat, “As a matter of fact, there is another. But I hate him. He never preaches anything good to me, only doom, doom, doom—Micaiah son of Imlah.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “The king shouldn’t talk about a prophet like that!” said Jehoshaphat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So the king of Israel ordered one of his men, “Quickly, get Micaiah son of Imlah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: Meanwhile, the king of Israel and Jehoshaphat were seated on their thrones, dressed in their royal robes, resplendent in front of the Samaria city gates. All the prophets were staging a prophecy-performance for their benefit. Zedekiah son of Kenaanah had even made a set of iron horns, and brandishing them, called out, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word! With these horns you’ll gore Aram until there’s nothing left of them!” All the prophets chimed in, “Yes! Go for Ramoth Gilead! An easy victory! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s gift to the king!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The messenger who went to get Micaiah told him, “The prophets have all said Yes to the king. Make it unanimous—vote Yes!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Micaiah said, “As sure as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, what God says, I’ll say.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: With Micaiah before him, the king asked him, “So, Micaiah—do we attack Ramoth Gilead? Or do we hold back?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Go ahead,” he said, “an easy victory! God’s gift to the king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Not so fast,” said the king. “How many times have I made you promise under oath to tell me the truth and nothing but the truth?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “All right,” said Micaiah, “since you insist . . .
- type: usfm
  marker: q1
  children:
  - type: text
    text: I saw all of Israel scattered over the hills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sheep with no shepherd.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke, ‘These poor people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: have no one to tell them what to do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them go home and do
- type: usfm
  marker: q2
  children:
  - type: text
    text: the best they can for themselves.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The king of Israel turned to Jehoshaphat, “See! What did I tell you? He never has a good word for me from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', only doom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: 'Micaiah kept on, “I’m not done yet; listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I saw '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' enthroned,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the Angel Armies of heaven
- type: usfm
  marker: q1
  children:
  - type: text
    text: standing at attention,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ranged on his right and his left.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “How can we seduce Ahab'
- type: usfm
  marker: q2
  children:
  - type: text
    text: into attacking Ramoth Gilead?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Some said this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and some said that.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then a bold angel stepped out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'stood before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll seduce him.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“And how will you do it?” said '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Easy,” said the angel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I’ll get all the prophets to lie.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“That should do it,” said '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: “On your way—seduce him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“And that’s what has happened. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' filled the mouths of your puppet prophets with seductive lies. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has pronounced your doom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Just then Zedekiah son of Kenaanah came up and slapped Micaiah in the face, saying, “Since when did the Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' leave me and take up with you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Micaiah said, “You’ll know soon enough; you’ll know it when you’re frantically and futilely looking for a place to hide.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'The king of Israel had heard enough: “Get Micaiah out of here! Turn him over to Amon the city magistrate and to Joash the king’s son with this message: ‘King’s orders! Lock him up in jail; keep him on bread and water until I’m back in one piece.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Micaiah said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you ever get back in one piece,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I’m no prophet of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: text
    text: He added,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When it happens, O people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: remember where you heard it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: So the king of Israel and Jehoshaphat king of Judah went ahead and attacked Ramoth Gilead. The king of Israel said to Jehoshaphat, “Wear my kingly robe; I’m going into battle disguised.” So the king of Israel entered the battle in disguise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Meanwhile, the king of Aram had ordered his chariot commanders (there were thirty-two of them), “Don’t bother with anyone whether small or great; go after the king of Israel and him only.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: When the chariot commanders saw Jehoshaphat, they said, “There he is! The king of Israel!” and took after him. Jehoshaphat yelled out, and the chariot commanders realized they had the wrong man—it wasn’t the king of Israel after all. God intervened and they let him go.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Just then someone, without aiming, shot an arrow into the crowd and hit the king of Israel in the chink of his armor. The king told his charioteer, “Turn back! Get me out of here—I’m wounded.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: All day the fighting continued, hot and heavy. Propped up in his chariot, the king watched from the sidelines. He died that evening.
