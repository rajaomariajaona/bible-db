verses:
  '1':
  - type: text
    content: 'But even though Jehoshaphat was very rich and much honored, he made a marriage alliance with Ahab of Israel. Some time later he paid a visit to Ahab at Samaria. Ahab celebrated his visit with a feast—a huge barbecue with all the lamb and beef you could eat. But Ahab had a hidden agenda; he wanted Jehoshaphat’s support in attacking Ramoth Gilead. Then Ahab brought it into the open: “Will you join me in attacking Ramoth Gilead?” Jehoshaphat said, “You bet. I’m with you all the way; you can count on me and my troops.”'
  '12':
  - type: text
    content: The messenger who went to get Micaiah told him, “The prophets have all said Yes to the king. Make it unanimous—vote Yes!”
  '13':
  - type: text
    content: 'But Micaiah said, “As sure as '
  - type: text
    content: God
  - type: text
    content: ' lives, what God says, I’ll say.”'
  '14':
  - type: text
    content: With Micaiah before him, the king asked him, “So, Micaiah—do we attack Ramoth Gilead? Or do we hold back?”
  - type: text
    content: “Go ahead,” he said, “an easy victory! God’s gift to the king.”
  '15':
  - type: text
    content: “Not so fast,” said the king. “How many times have I made you promise under oath to tell me the truth and nothing but the truth?”
  '16':
  - type: text
    content: “All right,” said Micaiah, “since you insist . . .
  - type: text
    content: I saw all of Israel scattered over the hills,
  - type: text
