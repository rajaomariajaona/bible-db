document_id: PSA.120,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m in trouble. I cry to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'desperate for an answer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Deliver me from the liars, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They smile so sweetly but lie through their teeth.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you know what’s next, can you see what’s coming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you bold-faced liars?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pointed arrows and burning coals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be your reward.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m doomed to live in Meshech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cursed with a home in Kedar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My whole life lived camping
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among quarreling neighbors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m all for peace, but the minute
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I tell them so, they go to war!
