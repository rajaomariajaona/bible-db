document_id: PSA.120,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I’m in trouble. I cry to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'desperate for an answer:'
  - type: text
    content: '“Deliver me from the liars, '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: They smile so sweetly but lie through their teeth.”
  '3':
  - type: text
    content: Do you know what’s next, can you see what’s coming,
  - type: text
    content: all you bold-faced liars?
  - type: text
    content: Pointed arrows and burning coals
  - type: text
    content: will be your reward.
  '5':
  - type: text
    content: I’m doomed to live in Meshech,
  - type: text
    content: cursed with a home in Kedar,
  - type: text
    content: My whole life lived camping
  - type: text
    content: among quarreling neighbors.
  - type: text
    content: I’m all for peace, but the minute
  - type: text
    content: I tell them so, they go to war!
