document_id: ZEP.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Seek God
  - type: text
    content: So get yourselves together. Shape up!
  - type: text
    content: You’re a nation without a clue about what it wants.
  - type: text
    content: Do it before you’re blown away
  - type: text
    content: like leaves in a windstorm,
  - type: text
    content: 'Before '
  - type: text
    content: God
  - type: text
    content: ’s Judgment-anger
  - type: text
    content: sweeps down on you,
  - type: text
    content: 'Before '
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day wrath
  - type: text
    content: descends with full force.
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' will reach into the north'
  - type: text
    content: and destroy Assyria.
  - type: text
    content: He will waste Nineveh,
  - type: text
    content: leave her dry and treeless as a desert.
  - type: text
    content: The ghost town of a city,
  - type: text
    content: the haunt of wild animals,
  - type: text
    content: Nineveh will be home to raccoons and coyotes—
  - type: text
    content: they’ll bed down in its ruins.
  - type: text
    content: Owls will hoot in the windows, ravens will croak in the doorways—
  - type: text
    content: all that fancy woodwork now a perch for birds.
  - type: text
    content: Can this be the famous Fun City
  - type: text
    content: that had it made,
  - type: text
    content: That boasted, “I’m the Number-One City!
  - type: text
    content: I’m King of the Mountain!”
  - type: text
    content: So why is the place deserted,
  - type: text
    content: a lair for wild animals?
  - type: text
    content: Passersby hardly give it a look;
  - type: text
    content: they dismiss it with a gesture.
  '3':
  - type: text
    content: 'Seek '
  - type: text
    content: God
  - type: text
    content: ', all you quietly disciplined people'
  - type: text
    content: 'who live by '
  - type: text
    content: God
  - type: text
    content: ’s justice.
  - type: text
    content: 'Seek '
  - type: text
    content: God
  - type: text
    content: ’s right ways. Seek a quiet and disciplined life.
  - type: text
    content: 'Perhaps you’ll be hidden on the Day of '
  - type: text
    content: God
  - type: text
    content: ’s anger.
  - type: heading
    content: All Earth-Made Gods Will Blow Away
  '4':
  - type: text
    content: Gaza is scheduled for demolition,
  - type: text
    content: Ashdod will be cleaned out by high noon,
  - type: text
    content: Ekron pulled out by the roots.
  - type: text
    content: Doom to the seaside people,
  - type: text
    content: the seafaring people from Crete!
  - type: text
    content: 'The Word of '
  - type: text
    content: God
  - type: text
    content: ' is bad news for you'
  - type: text
    content: 'who settled Canaan, the Philistine country:'
  - type: text
    content: “You’re slated for destruction—
  - type: text
    content: no survivors!”
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: The lands of the seafarers
  - type: text
    content: will become pastureland,
  - type: text
    content: A country for shepherds and sheep.
  - type: text
    content: What’s left of the family of Judah will get it.
  - type: text
    content: Day after day they’ll pasture by the sea,
  - type: text
    content: and go home in the evening to Ashkelon to sleep.
  - type: text
    content: 'Their very own '
  - type: text
    content: God
  - type: text
    content: ' will look out for them.'
  - type: text
    content: He’ll make things as good as before.
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: “I’ve heard the crude taunts of Moab,
  - type: text
    content: the mockeries flung by Ammon,
  - type: text
    content: The cruel talk they’ve used to put down my people,
  - type: text
    content: their self-important strutting along Israel’s borders.
  - type: text
    content: Therefore, as sure as I am the living God,” says
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: Israel’s personal God,
  - type: text
    content: “Moab will become a ruin like Sodom,
  - type: text
    content: Ammon a ghost town like Gomorrah,
  - type: text
    content: One a field of rocks, the other a sterile salt flat,
  - type: text
    content: a moonscape forever.
  - type: text
    content: What’s left of my people will finish them off,
  - type: text
    content: will pick them clean and take over.
  - type: text
    content: This is what they get for their bloated pride,
  - type: text
    content: their taunts and mockeries of the people
  - type: text
    content: 'of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: God
  - type: text
    content: ' will be seen as truly terrible—a Holy Terror.'
  - type: text
    content: All earth-made gods will shrivel up and blow away;
  - type: text
    content: And everyone, wherever they are, far or near,
  - type: text
    content: will fall to the ground and worship him.
  - type: text
    content: Also you Ethiopians,
  - type: text
    content: you, too, will die—I’ll see to it.”
  - type: text
    content: '* * *'
