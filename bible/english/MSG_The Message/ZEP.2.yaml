document_id: ZEP.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Seek '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: So get yourselves together. Shape up!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re a nation without a clue about what it wants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do it before you’re blown away
- type: usfm
  marker: q2
  children:
  - type: text
    text: like leaves in a windstorm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Judgment-anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweeps down on you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Judgment Day wrath
- type: usfm
  marker: q2
  children:
  - type: text
    text: descends with full force.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Seek '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', all you quietly disciplined people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who live by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Seek '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s right ways. Seek a quiet and disciplined life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Perhaps you’ll be hidden on the Day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anger.
- type: usfm
  marker: s1
  children:
  - type: text
    text: All Earth-Made Gods Will Blow Away
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Gaza is scheduled for demolition,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ashdod will be cleaned out by high noon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ekron pulled out by the roots.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doom to the seaside people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the seafaring people from Crete!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The Word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is bad news for you'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who settled Canaan, the Philistine country:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You’re slated for destruction—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no survivors!”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: The lands of the seafarers
- type: usfm
  marker: q2
  children:
  - type: text
    text: will become pastureland,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A country for shepherds and sheep.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What’s left of the family of Judah will get it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Day after day they’ll pasture by the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and go home in the evening to Ashkelon to sleep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their very own '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will look out for them.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll make things as good as before.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: “I’ve heard the crude taunts of Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mockeries flung by Ammon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cruel talk they’ve used to put down my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their self-important strutting along Israel’s borders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, as sure as I am the living God,” says
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel’s personal God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Moab will become a ruin like Sodom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ammon a ghost town like Gomorrah,
- type: usfm
  marker: q1
  children:
  - type: text
    text: One a field of rocks, the other a sterile salt flat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a moonscape forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s left of my people will finish them off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will pick them clean and take over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is what they get for their bloated pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their taunts and mockeries of the people
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will be seen as truly terrible—a Holy Terror.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All earth-made gods will shrivel up and blow away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And everyone, wherever they are, far or near,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall to the ground and worship him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Also you Ethiopians,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you, too, will die—I’ll see to it.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will reach into the north'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy Assyria.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will waste Nineveh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leave her dry and treeless as a desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ghost town of a city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the haunt of wild animals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nineveh will be home to raccoons and coyotes—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll bed down in its ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Owls will hoot in the windows, ravens will croak in the doorways—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all that fancy woodwork now a perch for birds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can this be the famous Fun City
- type: usfm
  marker: q2
  children:
  - type: text
    text: that had it made,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That boasted, “I’m the Number-One City!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m King of the Mountain!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: So why is the place deserted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lair for wild animals?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Passersby hardly give it a look;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they dismiss it with a gesture.
