document_id: ISA.37,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Only God There Is
  - type: text
    content: 'When King Hezekiah heard the report, he also tore his clothes and dressed in rough, penitential burlap gunnysacks, and went into the sanctuary of '
  - type: text
    content: God
  - type: text
    content: . He sent Eliakim the palace administrator, Shebna the secretary, and the senior priests, all of them also dressed in penitential burlap, to the prophet Isaiah son of Amoz.
  '14':
  - type: text
    content: 'Hezekiah took the letter from the hands of the messengers and read it. Then he went into the sanctuary of '
  - type: text
    content: God
  - type: text
    content: ' and spread the letter out before '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: 'Then Hezekiah prayed to '
  - type: text
    content: God
  - type: text
    content: ': “'
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, enthroned over the cherubim-angels, you are God, the only God there is, God of all kingdoms on earth. You '
  - type: text
    content: made
  - type: text
    content: ' heaven and earth. Listen, O '
  - type: text
    content: God
  - type: text
    content: ', and hear. Look, O '
  - type: text
    content: God
  - type: text
    content: ', and see. Mark all these words of Sennacherib that he sent to mock the living God. It’s quite true, O '
  - type: text
    content: God
  - type: text
    content: ', that the kings of Assyria have devastated all the nations and their lands. They’ve thrown their gods into the trash and burned them—no great achievement since they were no-gods anyway, gods made in workshops, carved from wood and chiseled from rock. An end to the no-gods! But now step in, O '
  - type: text
    content: God
  - type: text
    content: ', our God. Save us from him. Let all the kingdoms of earth know that you and you alone are '
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: '* * *'
  '21':
  - type: text
    content: 'Then Isaiah son of Amoz sent this word to Hezekiah: “'
  - type: text
    content: God
  - type: text
    content: '’s Message, the God of Israel: Because you brought King Sennacherib of Assyria to me in prayer, here is my answer, '
  - type: text
    content: God
  - type: text
    content: '’s answer:'
  - type: text
    content: “‘She has no use for you, Sennacherib, nothing but contempt,
  - type: text
    content: this virgin daughter Zion.
  - type: text
    content: She spits at you and turns on her heel,
  - type: text
    content: this daughter Jerusalem.
  - type: text
    content: “‘Who do you think you’ve been mocking and reviling
  - type: text
    content: all these years?
  - type: text
    content: Who do you think you’ve been jeering
  - type: text
    content: and treating with such utter contempt
  - type: text
    content: All these years?
  - type: text
    content: The Holy of Israel!
  - type: text
    content: You’ve used your servants to mock the Master.
  - type: text
    content: You’ve bragged, “With my fleet of chariots
  - type: text
    content: I’ve gone to the highest mountain ranges,
  - type: text
    content: penetrated the far reaches of Lebanon,
  - type: text
    content: Chopped down its giant cedars,
  - type: text
    content: its finest cypresses.
  - type: text
    content: I conquered its highest peak,
  - type: text
    content: explored its deepest forest.
  - type: text
    content: I dug wells
  - type: text
    content: and drank my fill.
  - type: text
    content: I emptied the famous rivers of Egypt
  - type: text
    content: with one kick of my foot.”
  '26':
  - type: text
    content: “‘Haven’t you gotten the news
  - type: text
    content: that I’ve been behind this all along?
  - type: text
    content: This is a longstanding plan of mine
  - type: text
    content: and I’m just now making it happen,
  - type: text
    content: using you to devastate strong cities,
  - type: text
    content: turning them into piles of rubble
  - type: text
    content: and leaving their citizens helpless,
  - type: text
    content: bewildered, and confused,
  - type: text
    content: drooping like unwatered plants,
  - type: text
    content: stunted like withered seedlings.
  '28':
  - type: text
    content: “‘I know all about your pretentious poses,
  - type: text
    content: your self-important comings and goings,
  - type: text
    content: and, yes, the tantrums you throw against me.
  - type: text
    content: Because of all your wild raging against me,
  - type: text
    content: your unbridled arrogance that I keep hearing of,
  - type: text
    content: I’ll put my hook in your nose
  - type: text
    content: and my bit in your mouth.
  - type: text
    content: I’ll show you who’s boss. I’ll turn you around
  - type: text
    content: and take you back to where you came from.
  '3':
  - type: text
    content: 'They said to him, “Hezekiah says, ‘This is a black day. We’re in crisis. We’re like pregnant women without even the strength to have a baby! Do you think your '
  - type: text
    content: God
  - type: text
    content: ' heard what the Rabshekah said, sent by his master the king of Assyria to mock the living God? And do you think your '
  - type: text
    content: God
  - type: text
    content: ' will do anything about it? Pray for us, Isaiah. Pray for those of us left here holding the fort!’”'
  '30':
  - type: text
    content: '“‘And this, Hezekiah, will be your confirming sign: This year’s crops will be slim pickings, and next year it won’t be much better. But in three years, farming will be back to normal, with regular sowing and reaping, planting and harvesting. What’s left of the people of Judah will put down roots and make a new start. The people left in Jerusalem will get moving again. Mount Zion survivors will take hold again. The zeal of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies will do all this.’
  - type: text
    content: '* * *'
  '33':
  - type: text
    content: '“Finally, this is '
  - type: text
    content: God
  - type: text
    content: '’s verdict on the king of Assyria:'
  - type: text
    content: “‘Don’t worry, he won’t enter this city,
  - type: text
    content: won’t let loose a single arrow,
  - type: text
    content: Won’t brandish so much as one shield,
  - type: text
    content: let alone build a siege ramp against it.
  - type: text
    content: He’ll go back the same way he came.
  - type: text
    content: He won’t set a foot in this city.
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: I’ve got my hand on this city
  - type: text
    content: to save it,
  - type: text
    content: Save it for my very own sake,
  - type: text
    content: but also for the sake of my David dynasty.’”
  '36':
  - type: text
    content: 'Then the Angel of '
  - type: text
    content: God
  - type: text
    content: ' arrived and struck the Assyrian camp—185,000 Assyrians died. By the time the sun came up, they were all dead—an army of corpses! Sennacherib, king of Assyria, got out of there fast, back home to Nineveh. As he was worshiping in the sanctuary of his god Nisroch, he was murdered by his sons Adrammelech and Sharezer. They escaped to the land of Ararat. His son Esar-haddon became the next king.'
  '5':
  - type: text
    content: Then King Hezekiah’s servants came to Isaiah. Isaiah said, “Tell your master this, ‘
  - type: text
    content: God
  - type: text
    content: '’s Message: Don’t be upset by what you’ve heard, all those words the servants of the Assyrian king have used to mock me. I personally will take care of him. I’ll arrange it so that he’ll get a rumor of bad news back home and rush home to take care of it. And he’ll die there. Killed—a violent death.’”'
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: The Rabshekah left and found the king of Assyria fighting against Libnah. (He had gotten word that the king had left Lachish.)
  '9':
  - type: text
    content: 'Just then the Assyrian king received an intelligence report on King Tirhakah of Ethiopia: “He is on his way to make war on you.”'
  - type: text
    content: 'On hearing that, he sent messengers to Hezekiah with instructions to deliver this message: “Don’t let your '
  - type: text
    content: God
  - type: text
    content: ', on whom you so naively lean, deceive you, promising that Jerusalem won’t fall to the king of Assyria. Use your head! Look around at what the kings of Assyria have done all over the world—one country after another devastated! And do you think you’re going to get off? Have any of the gods of any of these countries ever stepped in and saved them, even one of these nations my predecessors destroyed—Gozan, Haran, Rezeph, and the people of Eden who lived in Telassar? Look around. Do you see anything left of the king of Hamath, the king of Arpad, the king of the city of Sepharvaim, the king of Hena, the king of Ivvah?”'
