document_id: ISA.37,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Only God There Is
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When King Hezekiah heard the report, he also tore his clothes and dressed in rough, penitential burlap gunnysacks, and went into the sanctuary of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . He sent Eliakim the palace administrator, Shebna the secretary, and the senior priests, all of them also dressed in penitential burlap, to the prophet Isaiah son of Amoz.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah took the letter from the hands of the messengers and read it. Then he went into the sanctuary of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and spread the letter out before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hezekiah prayed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, enthroned over the cherubim-angels, you are God, the only God there is, God of all kingdoms on earth. You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: made
    - type: text
      text: ' heaven and earth. Listen, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and hear. Look, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and see. Mark all these words of Sennacherib that he sent to mock the living God. It’s quite true, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', that the kings of Assyria have devastated all the nations and their lands. They’ve thrown their gods into the trash and burned them—no great achievement since they were no-gods anyway, gods made in workshops, carved from wood and chiseled from rock. An end to the no-gods! But now step in, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God. Save us from him. Let all the kingdoms of earth know that you and you alone are '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Isaiah son of Amoz sent this word to Hezekiah: “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message, the God of Israel: Because you brought King Sennacherib of Assyria to me in prayer, here is my answer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s answer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘She has no use for you, Sennacherib, nothing but contempt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this virgin daughter Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She spits at you and turns on her heel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this daughter Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Who do you think you’ve been mocking and reviling
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all these years?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who do you think you’ve been jeering
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and treating with such utter contempt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All these years?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Holy of Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve used your servants to mock the Master.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve bragged, “With my fleet of chariots
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve gone to the highest mountain ranges,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: penetrated the far reaches of Lebanon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chopped down its giant cedars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its finest cypresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I conquered its highest peak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: explored its deepest forest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I dug wells
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drank my fill.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I emptied the famous rivers of Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with one kick of my foot.”
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Haven’t you gotten the news
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I’ve been behind this all along?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is a longstanding plan of mine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I’m just now making it happen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: using you to devastate strong cities,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turning them into piles of rubble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and leaving their citizens helpless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bewildered, and confused,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: drooping like unwatered plants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stunted like withered seedlings.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘I know all about your pretentious poses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your self-important comings and goings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and, yes, the tantrums you throw against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of all your wild raging against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your unbridled arrogance that I keep hearing of,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll put my hook in your nose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my bit in your mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll show you who’s boss. I’ll turn you around
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take you back to where you came from.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to him, “Hezekiah says, ‘This is a black day. We’re in crisis. We’re like pregnant women without even the strength to have a baby! Do you think your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' heard what the Rabshekah said, sent by his master the king of Assyria to mock the living God? And do you think your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will do anything about it? Pray for us, Isaiah. Pray for those of us left here holding the fort!’”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘And this, Hezekiah, will be your confirming sign: This year’s crops will be slim pickings, and next year it won’t be much better. But in three years, farming will be back to normal, with regular sowing and reaping, planting and harvesting. What’s left of the people of Judah will put down roots and make a new start. The people left in Jerusalem will get moving again. Mount Zion survivors will take hold again. The zeal of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies will do all this.’
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Finally, this is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s verdict on the king of Assyria:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Don’t worry, he won’t enter this city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: won’t let loose a single arrow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Won’t brandish so much as one shield,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let alone build a siege ramp against it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll go back the same way he came.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He won’t set a foot in this city.
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve got my hand on this city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to save it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save it for my very own sake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but also for the sake of my David dynasty.’”
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' arrived and struck the Assyrian camp—185,000 Assyrians died. By the time the sun came up, they were all dead—an army of corpses! Sennacherib, king of Assyria, got out of there fast, back home to Nineveh. As he was worshiping in the sanctuary of his god Nisroch, he was murdered by his sons Adrammelech and Sharezer. They escaped to the land of Ararat. His son Esar-haddon became the next king.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then King Hezekiah’s servants came to Isaiah. Isaiah said, “Tell your master this, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message: Don’t be upset by what you’ve heard, all those words the servants of the Assyrian king have used to mock me. I personally will take care of him. I’ll arrange it so that he’ll get a rumor of bad news back home and rush home to take care of it. And he’ll die there. Killed—a violent death.’”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Rabshekah left and found the king of Assyria fighting against Libnah. (He had gotten word that the king had left Lachish.)
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then the Assyrian king received an intelligence report on King Tirhakah of Ethiopia: “He is on his way to make war on you.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On hearing that, he sent messengers to Hezekiah with instructions to deliver this message: “Don’t let your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', on whom you so naively lean, deceive you, promising that Jerusalem won’t fall to the king of Assyria. Use your head! Look around at what the kings of Assyria have done all over the world—one country after another devastated! And do you think you’re going to get off? Have any of the gods of any of these countries ever stepped in and saved them, even one of these nations my predecessors destroyed—Gozan, Haran, Rezeph, and the people of Eden who lived in Telassar? Look around. Do you see anything left of the king of Hamath, the king of Arpad, the king of the city of Sepharvaim, the king of Hena, the king of Ivvah?”'
