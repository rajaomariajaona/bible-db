document_id: GEN.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Family Tree of Noah’s Sons
  - type: text
    content: 'This is the family tree of the sons of Noah: Shem, Ham, and Japheth. After the flood, they themselves had sons.'
  '13':
  - type: text
    content: Egypt was ancestor to the Ludim, the Anamim, the Lehabim, the Naphtuhim, the Pathrusim, the Casluhim (the origin of the Philistines), and the Kaphtorim.
  '15':
  - type: text
    content: Canaan had Sidon his firstborn, Heth, the Jebusites, the Amorites, the Girgashites, the Hivites, the Arkites, the Sinites, the Arvadites, the Zemarites, and the Hamathites. Later the Canaanites spread out, going from Sidon toward Gerar, as far south as Gaza, and then east all the way over to Sodom, Gomorrah, Admah, Zeboiim, and on to Lasha.
  '2':
  - type: text
    content: 'The sons of Japheth: Gomer, Magog, Madai, Javan, Tubal, Meshech, Tiras.'
  '20':
  - type: text
    content: These are the descendants of Ham by family, language, country, and nation.
  '21':
  - type: text
    content: Shem, the older brother of Japheth, also had sons. Shem was ancestor to all the children of Eber.
  '22':
  - type: text
    content: 'The sons of Shem: Elam, Asshur, Arphaxad, Lud, and Aram.'
  '23':
  - type: text
    content: 'The sons of Aram: Uz, Hul, Gether, Meshech.'
  '24':
  - type: text
    content: Arphaxad had Shelah and Shelah had Eber. Eber had two sons, Peleg (so named because in his days the human race divided) and Joktan.
  '26':
  - type: text
    content: Joktan had Almodad, Sheleph, Hazarmaveth, Jerah, Hadoram, Uzal, Diklah, Obal, Abimael, Sheba, Ophir, Havilah, and Jobab—all sons of Joktan. Their land goes from Mesha toward Sephar as far as the mountain ranges in the east.
  '3':
  - type: text
    content: 'The sons of Gomer: Ashkenaz, Riphath, Togarmah.'
  '31':
  - type: text
    content: These are the descendants of Shem by family, language, country, and nation.
  '32':
  - type: text
    content: This is the family tree of the sons of Noah as they developed into nations. From them nations developed all across the Earth after the flood.
  '4':
  - type: text
    content: 'The sons of Javan: Elishah, Tarshish, Kittim, Rodanim. The seafaring peoples developed from these, each in its own place by family, each with its own language.'
  '6':
  - type: text
    content: 'The sons of Ham: Cush, Egypt, Put, Canaan.'
  '7':
  - type: text
    content: 'The sons of Cush: Seba, Havilah, Sabtah, Raamah, Sabteca.'
  - type: text
    content: 'The sons of Raamah: Sheba, Dedan.'
  '8':
  - type: text
    content: 'Cush also had Nimrod. He was the first great warrior on Earth. He was a great hunter before '
  - type: text
    content: God
  - type: text
    content: '. There was a saying, “Like Nimrod, a great hunter before '
  - type: text
    content: God
  - type: text
    content: .” His kingdom got its start with Babel; then Erech, Akkad, and Calneh in the country of Shinar. From there he went up to Asshur and built Nineveh, Rehoboth Ir, Calah, and Resen between Nineveh and the great city Calah.
