document_id: SNG.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Chorus
  - type: text
    content: So where has this love of yours gone,
  - type: text
    content: fair one?
  - type: text
    content: Where on earth can he be?
  - type: text
    content: Can we help you look for him?
  - type: heading
    content: The Woman
  '10':
  - type: text
    content: “Has anyone ever seen anything like this—
  - type: text
    content: dawn-fresh, moon-lovely, sun-radiant,
  - type: text
    content: ravishing as the night sky with its galaxies of stars?”
  '11':
  - type: text
    content: One day I went strolling through the orchard,
  - type: text
    content: looking for signs of spring,
  - type: text
    content: Looking for buds about to burst into flower,
  - type: text
    content: anticipating readiness, ripeness.
  - type: text
    content: Before I knew it my heart was raptured,
  - type: text
    content: carried away by lofty thoughts!
  '13':
  - type: text
    content: Dance, dance, dear Shulammite, Angel-Princess!
  - type: text
    content: Dance, and we’ll feast our eyes on your grace!
  - type: text
    content: Everyone wants to see the Shulammite dance
  - type: text
    content: her victory dances of love and peace.
  '2':
  - type: text
    content: Never mind. My lover is already on his way to his garden,
  - type: text
    content: to browse among the flowers, touching the colors and forms.
  - type: text
    content: I am my lover’s and my lover is mine.
  - type: text
    content: He caresses the sweet-smelling flowers.
  - type: heading
    content: The Man
  '4':
  - type: text
    content: Dear, dear friend and lover,
  - type: text
    content: you’re as beautiful as Tirzah, city of delights,
  - type: text
    content: Lovely as Jerusalem, city of dreams,
  - type: text
    content: the ravishing visions of my ecstasy.
  - type: text
    content: Your beauty is too much for me—I’m in over my head.
  - type: text
    content: I’m not used to this! I can’t take it in.
  - type: text
    content: Your hair flows and shimmers
  - type: text
    content: like a flock of goats in the distance
  - type: text
    content: streaming down a hillside in the sunshine.
  - type: text
    content: Your smile is generous and full—
  - type: text
    content: expressive and strong and clean.
  - type: text
    content: Your veiled cheeks
  - type: text
    content: are soft and radiant.
  '8':
  - type: text
    content: There’s no one like her on earth,
  - type: text
    content: never has been, never will be.
  - type: text
    content: She’s a woman beyond compare.
  - type: text
    content: My dove is perfection,
  - type: text
    content: Pure and innocent as the day she was born,
  - type: text
    content: and cradled in joy by her mother.
  - type: text
    content: Everyone who came by to see her
  - type: text
    content: exclaimed and admired her—
  - type: text
    content: All the fathers and mothers, the neighbors and friends,
  - type: text
    content: 'blessed and praised her:'
