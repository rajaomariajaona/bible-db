document_id: SNG.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Chorus
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: So where has this love of yours gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fair one?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where on earth can he be?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can we help you look for him?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Has anyone ever seen anything like this—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dawn-fresh, moon-lovely, sun-radiant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ravishing as the night sky with its galaxies of stars?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: One day I went strolling through the orchard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: looking for signs of spring,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Looking for buds about to burst into flower,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anticipating readiness, ripeness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before I knew it my heart was raptured,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carried away by lofty thoughts!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dance, dance, dear Shulammite, Angel-Princess!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Dance, and we’ll feast our eyes on your grace!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone wants to see the Shulammite dance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her victory dances of love and peace.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: Never mind. My lover is already on his way to his garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to browse among the flowers, touching the colors and forms.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am my lover’s and my lover is mine.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He caresses the sweet-smelling flowers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Man
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-7
    - type: text
      text: Dear, dear friend and lover,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re as beautiful as Tirzah, city of delights,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lovely as Jerusalem, city of dreams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ravishing visions of my ecstasy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your beauty is too much for me—I’m in over my head.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m not used to this! I can’t take it in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hair flows and shimmers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a flock of goats in the distance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: streaming down a hillside in the sunshine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your smile is generous and full—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: expressive and strong and clean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your veiled cheeks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are soft and radiant.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: There’s no one like her on earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never has been, never will be.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’s a woman beyond compare.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My dove is perfection,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pure and innocent as the day she was born,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cradled in joy by her mother.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who came by to see her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exclaimed and admired her—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the fathers and mothers, the neighbors and friends,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'blessed and praised her:'
