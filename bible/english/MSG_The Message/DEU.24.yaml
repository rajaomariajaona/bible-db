document_id: DEU.24,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: 'If a man marries a woman and then it happens that he no longer likes her because he has found something wrong with her, he may give her divorce papers, put them in her hand, and send her off. After she leaves, if she becomes another man’s wife and he also comes to hate her and this second husband also gives her divorce papers, puts them in her hand, and sends her off, or if he should die, then the first husband who divorced her can’t marry her again. She has made herself ritually unclean, and her remarriage would be an abomination in the Presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and defile the land with sin, this land that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is giving you as an inheritance.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: 'When you make a loan of any kind to your neighbor, don’t enter his house to claim his pledge. Wait outside. Let the man to whom you made the pledge bring the pledge to you outside. And if he is destitute, don’t use his cloak as a bedroll; return it to him at nightfall so that he can sleep in his cloak and bless you. In the sight of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, that will be viewed as a righteous act.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'Don’t abuse a laborer who is destitute and needy, whether he is a fellow Israelite or foreigner living in your land and in your city. Pay him at the end of each workday; he’s living from hand to mouth and needs it now. If you hold back his pay, he’ll protest to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and you’ll have sin on your books.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Parents shall not be put to death for their children, nor children for their parents. Each person shall be put to death for his own sin.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'Make sure foreigners and orphans get their just rights. Don’t take the cloak of a widow as security for a loan. Don’t ever forget that you were once slaves in Egypt and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, got you out of there. I command you: Do what I’m telling you.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-22
    - type: text
      text: 'When you harvest your grain and forget a sheaf back in the field, don’t go back and get it; leave it for the foreigner, the orphan, and the widow so that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, will bless you in all your work. When you shake the olives off your trees, don’t go back over the branches and strip them bare—what’s left is for the foreigner, the orphan, and the widow. And when you cut the grapes in your vineyard, don’t take every last grape—leave a few for the foreigner, the orphan, and the widow. Don’t ever forget that you were a slave in Egypt. I command you: Do what I’m telling you.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: When a man takes a new wife, he is not to go out with the army or be given any business or work duties. He gets one year off simply to be at home making his wife happy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Don’t seize a handmill or an upper millstone as collateral for a loan. You’d be seizing someone’s very life.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: If a man is caught kidnapping one of his kinsmen, someone of the People of Israel, to enslave or sell him, the kidnapper must die. Purge that evil from among you.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: 'Warning! If a serious skin disease breaks out, follow exactly the rules set down by the Levitical priests. Follow them precisely as I commanded them. Don’t forget what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, did to Miriam on your way out of Egypt.'
