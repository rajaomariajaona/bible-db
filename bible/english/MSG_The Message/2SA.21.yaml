document_id: 2SA.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famine and War
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There was a famine in David’s time. It went on year after year after year—three years. David went to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' seeking the reason.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “This is because there is blood on Saul and his house, from the time he massacred the Gibeonites.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So the king called the Gibeonites together for consultation. (The Gibeonites were not part of Israel; they were what was left of the Amorites, and protected by a treaty with Israel. But Saul, a fanatic for the honor of Israel and Judah, tried to kill them off.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David addressed the Gibeonites: “What can I do for you? How can I compensate you so that you will bless '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s legacy of land and people?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The Gibeonites replied, “We don’t want any money from Saul and his family. And it’s not up to us to put anyone in Israel to death.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But David persisted: “What are you saying I should do for you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'Then they told the king, “The man who tried to get rid of us, who schemed to wipe us off the map of Israel—well, let seven of his sons be handed over to us to be executed—hanged before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at Gibeah of Saul, the holy mountain.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And David agreed, “I’ll hand them over to you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'The king spared Mephibosheth son of Jonathan, the son of Saul, because of the promise David and Jonathan had spoken before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. But the king selected Armoni and Mephibosheth, the two sons that Rizpah daughter of Aiah had borne to Saul, plus the five sons that Saul’s daughter Merab had borne to Adriel son of Barzillai the Meholathite. He turned them over to the Gibeonites who hanged them on the mountain before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —all seven died together. Harvest was just getting underway, the beginning of the barley harvest, when they were executed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rizpah daughter of Aiah took rough burlap and spread it out for herself on a rock from the beginning of the harvest until the heavy rains started. She kept the birds away from the bodies by day and the wild animals by night.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: David was told what she had done, this Rizpah daughter of Aiah and concubine of Saul. He then went and got the remains of Saul and Jonathan his son from the leaders at Jabesh Gilead (who had rescued them from the town square at Beth Shan where the Philistines had hung them after striking them down at Gilboa). He gathered up their remains and brought them together with the dead bodies of the seven who had just been hanged. The bodies were taken back to the land of Benjamin and given a decent burial in the tomb of Kish, Saul’s father.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They did everything the king ordered to be done. That cleared things up: from then on God responded to Israel’s prayers for the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: War broke out again between the Philistines and Israel. David and his men went down to fight. David became exhausted. Ishbi-Benob, a warrior descended from Rapha, with a spear weighing nearly eight pounds and outfitted in brand-new armor, announced that he’d kill David. But Abishai son of Zeruiah came to the rescue, struck the Philistine, and killed him.
- type: usfm
  marker: p
  children:
  - type: text
    text: Then David’s men swore to him, “No more fighting on the front lines for you! Don’t snuff out the lamp of Israel!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Later there was another skirmish with the Philistines at Gob. That time Sibbecai the Hushathite killed Saph, another of the warriors descended from Rapha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: At yet another battle with the Philistines at Gob, Elhanan son of Jaar, the weaver of Bethlehem, killed Goliath the Gittite whose spear was as big as a flagpole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Still another fight broke out in Gath. There was a giant there with six fingers on his hands and six toes on his feet—twenty-four fingers and toes! He was another of those descended from Rapha. He insulted Israel, and Jonathan son of Shimeah, David’s brother, killed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These four were descended from Rapha in Gath. And they all were killed by David and his soldiers.
