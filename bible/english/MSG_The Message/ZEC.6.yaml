document_id: ZEC.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Eighth Vision: Four Chariots'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Once again I looked up—another strange sight! Four chariots charging out from between two mountains. The mountains were bronze.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12b-13
    - type: text
      text: ' “‘A Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies. Be alert. We have a man here whose name is Branch. He will branch out from where he is and build the Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Yes, he’s the one. He’ll build the Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Then he’ll assume the role of royalty, take his place on the throne and rule—a priest sitting on the throne!—showing that king and priest can coexist in harmony.’
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“The other crown will be in the Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as a symbol of royalty, under the custodial care of Helem, Tobiah, Jedaiah, and Hen son of Zephaniah.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“People will come from faraway places to pitch in and rebuild the Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. This will confirm that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies did, in fact, send me to you. All this follows as you put your minds to a life of responsive obedience to the voice of your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: The first chariot was drawn by red horses, the second chariot by black horses, the third chariot by white horses, and the fourth chariot by dappled horses. All the horses were powerful.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I asked the Messenger-Angel, “Sir, what’s the meaning here?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: 'The angel answered, “These are the four winds of heaven, which originate with the Master of the whole earth. The black horses are headed north with the white ones right after them. The dappled horses are headed south.” The powerful horses galloped out, bursting with energy, eager to patrol through the earth. The Messenger-Angel commanded: “On your way! Survey the earth!” and they were off in every direction.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then he called to me and said, “Look at them go! The ones going north are conveying a sense of my Spirit, serene and secure. No more trouble from that direction.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Man Named Branch
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12a
    - type: text
      text: ' Then this Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' came to me: “Take up a collection from the exiles. Target Heldai, Tobiah, and Jedaiah. They’ve just arrived from Babylon. You’ll find them at the home of Josiah son of Zephaniah. Collect silver and gold from them and fashion crowns. Place one on the head of Joshua son of Jehozadak, the high priest, and give him this message:'
