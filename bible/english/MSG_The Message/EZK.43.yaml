document_id: EZK.43
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Meaning of the Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: The man brought me to the east gate. Oh! The bright Glory of the God of Israel rivered out of the east sounding like the roar of floodwaters, and the earth itself glowed with the bright Glory. It looked just like what I had seen when he came to destroy the city, exactly like what I had seen earlier at the Kebar River. And again I fell, face to the ground.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'The bright Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' poured into the Temple through the east gate. The Spirit put me on my feet and led me to the inside courtyard and—oh! the bright Glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' filled the Temple!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: I heard someone speaking to me from inside the Temple while the man stood beside me. He said, “Son of man, this is the place for my throne, the place I’ll plant my feet. This is the place where I’ll live with the Israelites forever. Neither the people of Israel nor their kings will ever again drag my holy name through the mud with their whoring and the no-god idols their kings set up at all the wayside shrines. When they set up their worship shrines right alongside mine with only a thin wall between them, they dragged my holy name through the mud with their obscene and vile worship. Is it any wonder that I destroyed them in anger? So let them get rid of their whoring ways and the stinking no-god idols introduced by their kings and I’ll move in and live with them forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “Son of man, tell the people of Israel all about the Temple so they’ll be dismayed by their wayward lives. Get them to go over the layout. That will bring them up short. Show them the whole plan of the Temple, its ins and outs, the proportions, the regulations, and the laws. Draw a picture so they can see the design and meaning and live by its design and intent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“This is the law of the Temple: As it radiates from the top of the mountain, everything around it becomes holy ground. Yes, this is law, the meaning, of the Temple.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14a
  - type: text
    text: ' “These are the dimensions of the altar, using the long (twenty-one-inch) ruler. The gutter at its base is twenty-one inches deep and twenty-one inches wide, with a four-inch lip around its edge.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14b-15
  - type: text
    text: ' “The height of the altar is three and a half feet from the base to the first ledge and twenty inches wide. From the first ledge to the second ledge it is seven feet high and twenty-one inches wide. The altar hearth is another seven feet high. Four horns stick upward from the hearth twenty-one inches high.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: “The top of the altar, the hearth, is square, twenty-one by twenty-one feet. The upper ledge is also square, twenty-four and a half feet on each side, with a ten-and-a-half-inch lip and a twenty-one-inch-wide gutter all the way around.
- type: usfm
  marker: p
  children:
  - type: text
    text: “The steps of the altar ascend from the east.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the man said to me, “Son of man, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: ‘These are the ordinances for conduct at the altar when it is built, for sacrificing burnt offerings and sprinkling blood on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: “‘For a sin offering, give a bull to the priests, the Levitical priests who are from the family of Zadok who come into my presence to serve me. Take some of its blood and smear it on the four horns of the altar that project from the four corners of the top ledge and all around the lip. That’s to purify the altar and make it fit for the sacrifice. Then take the bull for the sin offerings and burn it in the place set aside for this in the courtyard outside the Sanctuary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: '“‘On the second day, offer a male goat without blemish for a sin offering. Purify the altar the same as you purified it for the bull. Then, when you have purified it, offer a bull without blemish and a ram without blemish from the flock. Present them before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Sprinkle salt on them and offer them as a burnt offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: “‘For seven days, prepare a goat for a sin offering daily, and also a bull and a ram from the flock, animals without blemish. For seven days the priests are to get the altar ready for its work, purifying it. This is how you dedicate it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“‘After these seven days of dedication, from the eighth day on, the priests will present your burnt offerings and your peace offerings. And I’ll accept you with pleasure, with delight! Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’”'
