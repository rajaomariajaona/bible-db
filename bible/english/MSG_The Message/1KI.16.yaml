document_id: 1KI.16,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of '
  - type: text
    content: God
  - type: text
    content: ' came to Jehu son of Hanani with this message for Baasha: “I took you from nothing—a complete nobody—and set you up as the leader of my people Israel, but you plodded along in the rut of Jeroboam, making my people Israel sin and making me seethe over their sin. And now the consequences—I will burn Baasha and his regime to cinders, the identical fate of Jeroboam son of Nebat. Baasha’s people who die in the city will be eaten by scavenger dogs; carrion crows will eat the ones who die in the country.”'
  '11':
  - type: text
    content: 'Zimri had no sooner become king than he killed everyone connected with Baasha, got rid of them all like so many stray dogs—relatives and friends alike. Zimri totally wiped out the family of Baasha, just as '
  - type: text
    content: God
  - type: text
    content: '’s word delivered by the prophet Jehu had said—wages for the sins of Baasha and his son Elah; not only for their sins but for dragging Israel into their sins and making the '
  - type: text
    content: God
  - type: text
    content: ' of Israel angry with their stupid idols.'
  '14':
  - type: text
    content: 'The rest of Elah’s life, what he said and did, is written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: .
  - type: heading
    content: Zimri of Israel
  '15':
  - type: text
    content: 'Zimri was king in Tirzah for all of seven days during the twenty-seventh year of the reign of Asa king of Judah. The Israelite army was on maneuvers near the Philistine town of Gibbethon at the time. When they got the report, “Zimri has conspired against the king and killed him,” right there in the camp they made Omri, commander of the army, king. Omri and the army immediately left Gibbethon and attacked Tirzah. When Zimri saw that he was surrounded and as good as dead, he entered the palace citadel, set the place on fire, and died. It was a fit end for his sins, for living a flagrantly evil life before '
  - type: text
    content: God
  - type: text
    content: ', walking in the footsteps of Jeroboam, sinning and then dragging Israel into his sins.'
  '20':
  - type: text
    content: 'As for the rest of Zimri’s life, along with his infamous conspiracy, it’s all written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: .
  - type: heading
    content: Omri of Israel
  '21':
  - type: text
    content: 'After that the people of Israel were split right down the middle: Half favored Tibni son of Ginath as king, and half wanted Omri. Eventually the Omri side proved stronger than the Tibni side. Tibni ended up dead and Omri king.'
  '23':
  - type: text
    content: Omri took over as king of Israel in the thirty-first year of the reign of Asa king of Judah. He ruled for twelve years, the first six in Tirzah. He then bought the hill Samaria from Shemer for 150 pounds of silver. He developed the hill and named the city that he built Samaria, after its original owner Shemer.
  '25':
  - type: text
    content: 'But as far as '
  - type: text
    content: God
  - type: text
    content: ' was concerned, Omri lived an evil life—set new records in evil. He walked in the footsteps of Jeroboam son of Nebat, who not only sinned but dragged Israel into his sins, making '
  - type: text
    content: God
  - type: text
    content: ' angry—such an empty-headed, empty-hearted life!'
  '27':
  - type: text
    content: 'The rest of Omri’s life, the mark he made on his times, is written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: . Omri died and was buried in Samaria. His son Ahab was the next king after him.
  - type: heading
    content: Ahab of Israel
  '29':
  - type: text
    content: 'Ahab son of Omri became king of Israel in the thirty-eighth year of Asa king of Judah. Ahab son of Omri was king over Israel for twenty-two years. He ruled from Samaria. Ahab son of Omri did even more open evil before '
  - type: text
    content: God
  - type: text
    content: ' than anyone yet—a new champion in evil! It wasn’t enough for him to copy the sins of Jeroboam son of Nebat; no, he went all out, first by marrying Jezebel daughter of Ethbaal king of the Sidonians, and then by serving and worshiping the god Baal. He built a temple for Baal in Samaria, and then furnished it with an altar for Baal. Worse, he went on and built a shrine to the sacred whore Asherah. He made the '
  - type: text
    content: God
  - type: text
    content: ' of Israel angrier than all the previous kings of Israel put together.'
  '34':
  - type: text
    content: 'It was under Ahab’s rule that Hiel of Bethel refortified Jericho, but at a terrible cost: He ritually sacrificed his firstborn son Abiram at the laying of the foundation, and his youngest son Segub at the setting up of the gates. This is exactly what Joshua son of Nun said would happen.'
  '5':
  - type: text
    content: 'The rest of Baasha’s life, the record of his regime, is written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: . Baasha died and was buried with his ancestors in Tirzah. His son Elah was king after him.
  '7':
  - type: text
    content: 'That’s the way it was with Baasha: Through the prophet Jehu son of Hanani, '
  - type: text
    content: God
  - type: text
    content: '’s word came to him and his regime because of his life of open evil before '
  - type: text
    content: God
  - type: text
    content: ' and his making '
  - type: text
    content: God
  - type: text
    content: ' so angry—a chip off the block of Jeroboam, even though '
  - type: text
    content: God
  - type: text
    content: ' had destroyed him.'
  - type: heading
    content: Elah of Israel
  '8':
  - type: text
    content: In the twenty-sixth year of Asa king of Judah, Elah son of Baasha began his rule. He was king in Tirzah only two years. One day when he was at the house of Arza the palace manager, drinking himself drunk, Zimri, captain of half his chariot-force, conspired against him. Zimri slipped in, knocked Elah to the ground, and killed him. This happened in the twenty-seventh year of Asa king of Judah. Zimri then became the king.
