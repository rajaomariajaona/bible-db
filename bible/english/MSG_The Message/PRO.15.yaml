document_id: PRO.15,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Doesn’t Miss a Thing'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gentle response defuses anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a sharp tongue kindles a temper-fire.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s a school of hard knocks for those who leave God’s path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a dead-end street for those who hate God’s rules.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even hell holds no secrets from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do you think he can’t read human hearts?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Life Ascends to the Heights
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Know-it-alls don’t like being told what to do;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they avoid the company of wise men and women.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cheerful heart brings a smile to your face;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a sad heart makes it hard to get through the day.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An intelligent person is always eager to take in more truth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools feed on fast-food fads and fancies.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A miserable heart means a miserable life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a cheerful heart fills the day with song.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A simple life in the Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is better than a rich life with a ton of headaches.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better a bread crust shared in love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a slab of prime rib served in hate.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hot tempers start fights;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a calm, cool spirit keeps the peace.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The path of lazy people is overgrown with briers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the diligent walk down a smooth road.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Knowledge flows like spring water from the wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools are leaky faucets, dripping nonsense.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Intelligent children make their parents proud;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lazy students embarrass their parents.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The empty-headed treat life as a plaything;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the perceptive grasp its meaning and make a go of it.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Refuse good advice and watch your plans fail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take good counsel and watch them succeed.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Congenial conversation—what a pleasure!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The right word at the right time—beautiful!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Life ascends to the heights for the thoughtful—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s a clean about-face from descent into hell.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' smashes the pretensions of the arrogant;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he stands with those who have no standing.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' can’t stand evil scheming,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he puts words of grace and beauty on display.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A greedy and grasping person destroys community;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who refuse to exploit live and let live.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prayerful answers come from God-loyal people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked are sewers of abuse.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' keeps his distance from the wicked;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he closely attends to the prayers of God-loyal people.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' doesn’t miss a thing—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s alert to good and evil alike.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A twinkle in the eye means joy in the heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and good news makes you feel fit as a fiddle.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to good advice if you want to live well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an honored guest among wise men and women.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An undisciplined, self-willed life is puny;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an obedient, God-willed life is spacious.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is a school in skilled living—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: first you learn humility, then you experience glory.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kind words heal and help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cutting words wound and maim.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moral dropouts won’t listen to their elders;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: welcoming correction is a mark of good sense.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lives of God-loyal people flourish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a misspent life is soon bankrupt.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Perceptive words spread knowledge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools are hollow—there’s nothing to them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' can’t stand pious poses,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he delights in genuine prayers.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A life frittered away disgusts '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he loves those who run straight for the finish line.
