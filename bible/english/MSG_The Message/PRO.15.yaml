document_id: PRO.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Doesn’t Miss a Thing
  - type: text
    content: A gentle response defuses anger,
  - type: text
    content: but a sharp tongue kindles a temper-fire.
  '10':
  - type: text
    content: It’s a school of hard knocks for those who leave God’s path,
  - type: text
    content: a dead-end street for those who hate God’s rules.
  '11':
  - type: text
    content: 'Even hell holds no secrets from '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: do you think he can’t read human hearts?
  - type: heading
    content: Life Ascends to the Heights
  '12':
  - type: text
    content: Know-it-alls don’t like being told what to do;
  - type: text
    content: they avoid the company of wise men and women.
  '13':
  - type: text
    content: A cheerful heart brings a smile to your face;
  - type: text
    content: a sad heart makes it hard to get through the day.
  '14':
  - type: text
    content: An intelligent person is always eager to take in more truth;
  - type: text
    content: fools feed on fast-food fads and fancies.
  '15':
  - type: text
    content: A miserable heart means a miserable life;
  - type: text
    content: a cheerful heart fills the day with song.
  '16':
  - type: text
    content: A simple life in the Fear-of-
  - type: text
    content: God
  - type: text
    content: is better than a rich life with a ton of headaches.
  '17':
  - type: text
    content: Better a bread crust shared in love
  - type: text
    content: than a slab of prime rib served in hate.
  '18':
  - type: text
    content: Hot tempers start fights;
  - type: text
    content: a calm, cool spirit keeps the peace.
  '19':
  - type: text
    content: The path of lazy people is overgrown with briers;
  - type: text
    content: the diligent walk down a smooth road.
  '2':
  - type: text
    content: Knowledge flows like spring water from the wise;
  - type: text
    content: fools are leaky faucets, dripping nonsense.
  '20':
  - type: text
    content: Intelligent children make their parents proud;
  - type: text
    content: lazy students embarrass their parents.
  '21':
  - type: text
    content: The empty-headed treat life as a plaything;
  - type: text
    content: the perceptive grasp its meaning and make a go of it.
  '22':
  - type: text
    content: Refuse good advice and watch your plans fail;
  - type: text
    content: take good counsel and watch them succeed.
  '23':
  - type: text
    content: Congenial conversation—what a pleasure!
  - type: text
    content: The right word at the right time—beautiful!
  '24':
  - type: text
    content: Life ascends to the heights for the thoughtful—
  - type: text
    content: it’s a clean about-face from descent into hell.
  '25':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' smashes the pretensions of the arrogant;'
  - type: text
    content: he stands with those who have no standing.
  '26':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' can’t stand evil scheming,'
  - type: text
    content: but he puts words of grace and beauty on display.
  '27':
  - type: text
    content: A greedy and grasping person destroys community;
  - type: text
    content: those who refuse to exploit live and let live.
  '28':
  - type: text
    content: Prayerful answers come from God-loyal people;
  - type: text
    content: the wicked are sewers of abuse.
  '29':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' keeps his distance from the wicked;'
  - type: text
    content: he closely attends to the prayers of God-loyal people.
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' doesn’t miss a thing—'
  - type: text
    content: he’s alert to good and evil alike.
  '30':
  - type: text
    content: A twinkle in the eye means joy in the heart,
  - type: text
    content: and good news makes you feel fit as a fiddle.
  '31':
  - type: text
    content: Listen to good advice if you want to live well,
  - type: text
    content: an honored guest among wise men and women.
  '32':
  - type: text
    content: An undisciplined, self-willed life is puny;
  - type: text
    content: an obedient, God-willed life is spacious.
  '33':
  - type: text
    content: Fear-of-
  - type: text
    content: God
  - type: text
    content: ' is a school in skilled living—'
  - type: text
    content: first you learn humility, then you experience glory.
  '4':
  - type: text
    content: Kind words heal and help;
  - type: text
    content: cutting words wound and maim.
  '5':
  - type: text
    content: Moral dropouts won’t listen to their elders;
  - type: text
    content: welcoming correction is a mark of good sense.
  '6':
  - type: text
    content: The lives of God-loyal people flourish;
  - type: text
    content: a misspent life is soon bankrupt.
  '7':
  - type: text
    content: Perceptive words spread knowledge;
  - type: text
    content: fools are hollow—there’s nothing to them.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' can’t stand pious poses,'
  - type: text
    content: but he delights in genuine prayers.
  '9':
  - type: text
    content: 'A life frittered away disgusts '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: he loves those who run straight for the finish line.
