document_id: PRO.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Doesn’t Miss a Thing'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A gentle response defuses anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a sharp tongue kindles a temper-fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Knowledge flows like spring water from the wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools are leaky faucets, dripping nonsense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' doesn’t miss a thing—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’s alert to good and evil alike.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Kind words heal and help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: cutting words wound and maim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Moral dropouts won’t listen to their elders;
- type: usfm
  marker: q2
  children:
  - type: text
    text: welcoming correction is a mark of good sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The lives of God-loyal people flourish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a misspent life is soon bankrupt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Perceptive words spread knowledge;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools are hollow—there’s nothing to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' can’t stand pious poses,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he delights in genuine prayers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A life frittered away disgusts '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he loves those who run straight for the finish line.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: It’s a school of hard knocks for those who leave God’s path,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a dead-end street for those who hate God’s rules.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Even hell holds no secrets from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: do you think he can’t read human hearts?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Life Ascends to the Heights
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Know-it-alls don’t like being told what to do;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they avoid the company of wise men and women.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A cheerful heart brings a smile to your face;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sad heart makes it hard to get through the day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: An intelligent person is always eager to take in more truth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools feed on fast-food fads and fancies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A miserable heart means a miserable life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a cheerful heart fills the day with song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A simple life in the Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: is better than a rich life with a ton of headaches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Better a bread crust shared in love
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a slab of prime rib served in hate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hot tempers start fights;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a calm, cool spirit keeps the peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The path of lazy people is overgrown with briers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the diligent walk down a smooth road.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Intelligent children make their parents proud;
- type: usfm
  marker: q2
  children:
  - type: text
    text: lazy students embarrass their parents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The empty-headed treat life as a plaything;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the perceptive grasp its meaning and make a go of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Refuse good advice and watch your plans fail;
- type: usfm
  marker: q2
  children:
  - type: text
    text: take good counsel and watch them succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Congenial conversation—what a pleasure!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The right word at the right time—beautiful!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Life ascends to the heights for the thoughtful—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s a clean about-face from descent into hell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' smashes the pretensions of the arrogant;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stands with those who have no standing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' can’t stand evil scheming,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he puts words of grace and beauty on display.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A greedy and grasping person destroys community;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who refuse to exploit live and let live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Prayerful answers come from God-loyal people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked are sewers of abuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' keeps his distance from the wicked;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he closely attends to the prayers of God-loyal people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A twinkle in the eye means joy in the heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and good news makes you feel fit as a fiddle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Listen to good advice if you want to live well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an honored guest among wise men and women.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: An undisciplined, self-willed life is puny;
- type: usfm
  marker: q2
  children:
  - type: text
    text: an obedient, God-willed life is spacious.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is a school in skilled living—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: first you learn humility, then you experience glory.
