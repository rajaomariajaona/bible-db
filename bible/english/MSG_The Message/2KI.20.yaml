document_id: 2KI.20
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Some time later Hezekiah became deathly sick. The prophet Isaiah son of Amoz paid him a visit and said, “Put your affairs in order; you’re about to die—you haven’t long to live.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Hezekiah turned from Isaiah and faced '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', praying:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Remember, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', who I am, what I’ve done!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve lived an honest life before you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart’s been true and steady,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve lived to please you; lived for your approval.
- type: usfm
  marker: m
  children:
  - type: text
    text: And then the tears flowed. Hezekiah wept.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'Isaiah, leaving, was not halfway across the courtyard when the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stopped him: “Go back and tell Hezekiah, prince of my people, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word, Hezekiah! From the God of your ancestor David: I’ve listened to your prayer and I’ve observed your tears. I’m going to heal you. In three days you will walk on your own legs into The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . I’ve just added fifteen years to your life; I’m saving you from the king of Assyria, and I’m covering this city with my shield—for my sake and my servant David’s sake.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Isaiah then said, “Prepare a plaster of figs.”
- type: usfm
  marker: p
  children:
  - type: text
    text: They prepared the plaster, applied it to the boil, and Hezekiah was on his way to recovery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hezekiah said to Isaiah, “How do I know whether this is of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and not just the fig plaster? What confirming sign is there that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is healing me and that in three days I’ll walk into The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' on my own legs?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“This will be your sign from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ',” said Isaiah, “that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is doing what he said he’d do: Do you want the shadow to advance ten degrees on the sundial or go back ten degrees? You choose.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hezekiah said, “It would be easy to make the sun’s shadow advance ten degrees. Make it go back ten degrees.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Isaiah called out in prayer to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and the shadow went back ten degrees on Ahaz’s sundial.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Shortly after this, Merodach-Baladan, the son of Baladan king of Babylon, having heard that the king was sick, sent a get-well card and a gift to Hezekiah. Hezekiah was pleased and showed the messengers around the place—silver, gold, spices, aromatic oils, his stockpile of weapons—a guided tour of all his prized possessions. There wasn’t a thing in his palace or kingdom that Hezekiah didn’t show them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And then Isaiah the prophet showed up: “And just what were these men doing here? Where did they come from and why?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Hezekiah said, “They came from far away—from Babylon.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “And what did they see in your palace?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Everything,” said Hezekiah. “There isn’t anything I didn’t show them—I gave them the grand tour.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: 'Then Isaiah spoke to Hezekiah, “Listen to what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has to say about this: The day is coming when everything you own and everything your ancestors have passed down to you, right down to the last cup and saucer, will be cleaned out of here—plundered and packed off to Babylon. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s word! Worse yet, your sons, the progeny of sons you’ve begotten, will end up as eunuchs in the palace of the king of Babylon.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hezekiah said to Isaiah, “If '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says it, it must be good.” But he was thinking to himself, “It won’t happen during my lifetime—I’ll enjoy peace and security as long as I live.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'The rest of the life and times of Hezekiah, along with his projects, especially the way he engineered the Upper Pool and brought water into the city, are written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Judah
  - type: text
    text: . Hezekiah died and was buried with his ancestors. His son Manasseh became the next king.
