document_id: JDG.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Gideon
  - type: text
    content: 'Yet again the People of Israel went back to doing evil in '
  - type: text
    content: God
  - type: text
    content: '’s sight. '
  - type: text
    content: God
  - type: text
    content: ' put them under the domination of Midian for seven years. Midian overpowered Israel. Because of Midian, the People of Israel made for themselves hideouts in the mountains—caves and forts. When Israel planted its crops, Midian and Amalek, the easterners, would invade them, camp in their fields, and destroy their crops all the way down to Gaza. They left nothing for them to live on, neither sheep nor ox nor donkey. Bringing their cattle and tents, they came in and took over, like an invasion of locusts. And their camels—past counting! They marched in and devastated the country. The People of Israel, reduced to grinding poverty by Midian, cried out to '
  - type: text
    content: God
  - type: text
    content: ' for help.'
  '11':
  - type: text
    content: 'One day the angel of '
  - type: text
    content: God
  - type: text
    content: ' came and sat down under the oak in Ophrah that belonged to Joash the Abiezrite, whose son Gideon was threshing wheat in the winepress, out of sight of the Midianites. The angel of '
  - type: text
    content: God
  - type: text
    content: ' appeared to him and said, “'
  - type: text
    content: God
  - type: text
    content: ' is with you, O mighty warrior!”'
  '13':
  - type: text
    content: 'Gideon replied, “With '
  - type: text
    content: me
  - type: text
    content: ', my master? If '
  - type: text
    content: God
  - type: text
    content: ' is with us, why has all this happened to us? Where are all the miracle-wonders our parents and grandparents told us about, telling us, ‘Didn’t '
  - type: text
    content: God
  - type: text
    content: ' deliver us from Egypt?’ The fact is, '
  - type: text
    content: God
  - type: text
    content: ' has nothing to do with us—he has turned us over to Midian.”'
  '14':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' faced him directly: “Go in this strength that is yours. Save Israel from Midian. Haven’t I just sent you?”'
  '15':
  - type: text
    content: Gideon said to him, “
  - type: text
    content: Me
  - type: text
    content: ', my master? How and with what could I ever save Israel? Look at me. My clan’s the weakest in Manasseh and I’m the runt of the litter.”'
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to him, “I’ll be with you. Believe me, you’ll defeat Midian as one man.”'
  '17':
  - type: text
    content: 'Gideon said, “If you’re serious about this, do me a favor: Give me a sign to back up what you’re telling me. Don’t leave until I come back and bring you my gift.”'
  - type: text
    content: He said, “I’ll wait till you get back.”
  '19':
  - type: text
    content: Gideon went and prepared a young goat and a huge amount of unraised bread (he used over half a bushel of flour!). He put the meat in a basket and the broth in a pot and took them back under the shade of the oak tree for a sacred meal.
  '20':
  - type: text
    content: The angel of God said to him, “Take the meat and unraised bread, place them on that rock, and pour the broth on them.” Gideon did it.
  '21':
  - type: text
    content: 'The angel of '
  - type: text
    content: God
  - type: text
    content: ' stretched out the tip of the stick he was holding and touched the meat and the bread. Fire broke out of the rock and burned up the meat and bread while the angel of God slipped away out of sight. And Gideon knew it was the angel of God!'
  - type: text
    content: 'Gideon said, “Oh no! Master, '
  - type: text
    content: God
  - type: text
    content: '! I have seen the angel of God face-to-face!”'
  '23':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' reassured him, “Easy now. Don’t panic. You won’t die.”'
  '24':
  - type: text
    content: 'Then Gideon built an altar there to '
  - type: text
    content: God
  - type: text
    content: ' and named it “'
  - type: text
    content: God
  - type: text
    content: ’s Peace.” It’s still called that at Ophrah of Abiezer.
  '25':
  - type: text
    content: 'That night this happened. '
  - type: text
    content: God
  - type: text
    content: ' said to him, “Take your father’s best seven-year-old bull, the prime one. Tear down your father’s Baal altar and chop down the Asherah fertility pole beside it. Then build an altar to '
  - type: text
    content: God
  - type: text
    content: ', your God, on the top of this hill. Take the prime bull and present it as a Whole-Burnt-Offering, using firewood from the Asherah pole that you cut down.”'
  '27':
  - type: text
    content: 'Gideon selected ten men from his servants and did exactly what '
  - type: text
    content: God
  - type: text
    content: ' had told him. But because of his family and the people in the neighborhood, he was afraid to do it openly, so he did it that night.'
  '28':
  - type: text
    content: Early in the morning, the people in town were shocked to find Baal’s altar torn down, the Asherah pole beside it chopped down, and the prime bull burning away on the altar that had been built.
  '29':
  - type: text
    content: They kept asking, “Who did this?”
  - type: text
    content: 'Questions and more questions, and then the answer: “Gideon son of Joash did it.”'
  '30':
  - type: text
    content: 'The men of the town demanded of Joash: “Bring out your son! He must die! Why, he tore down the Baal altar and chopped down the Asherah tree!”'
  '31':
  - type: text
    content: But Joash stood up to the crowd pressing in on him, “Are you going to fight Baal’s battles for him? Are you going to save him? Anyone who takes Baal’s side will be dead by morning. If Baal is a god in fact, let him fight his own battles and defend his own altar.”
  '32':
  - type: text
    content: They nicknamed Gideon that day Jerub-Baal because after he had torn down the Baal altar, he had said, “Let Baal fight his own battles.”
  - type: text
    content: '* * *'
  '33':
  - type: text
    content: 'All the Midianites and Amalekites (the easterners) got together, crossed the river, and made camp in the Valley of Jezreel. '
  - type: text
    content: God
  - type: text
    content: ’s Spirit came over Gideon. He blew his ram’s horn trumpet and the Abiezrites came out, ready to follow him. He dispatched messengers all through Manasseh, calling them to the battle; also to Asher, Zebulun, and Naphtali. They all came.
  '36':
  - type: text
    content: 'Gideon said to God, “If this is right, if you are using me to save Israel as you’ve said, then look: I’m placing a fleece of wool on the threshing floor. If dew is on the fleece only, but the floor is dry, then I know that you will use me to save Israel, as you said.”'
  '38':
  - type: text
    content: That’s what happened. When he got up early the next morning, he wrung out the fleece—enough dew to fill a bowl with water!
  '39':
  - type: text
    content: Then Gideon said to God, “Don’t be impatient with me, but let me say one more thing. I want to try another time with the fleece. But this time let the fleece stay dry, while the dew drenches the ground.”
  '40':
  - type: text
    content: God made it happen that very night. Only the fleece was dry while the ground was wet with dew.
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: 'One time when the People of Israel had cried out to '
  - type: text
    content: God
  - type: text
    content: ' because of Midian, '
  - type: text
    content: God
  - type: text
    content: ' sent them a prophet with this message: “'
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, says,'
  - type: text
    content: I delivered you from Egypt,
  - type: text
    content: I freed you from a life of slavery;
  - type: text
    content: I rescued you from Egypt’s brutality
  - type: text
    content: and then from every oppressor;
  - type: text
    content: I pushed them out of your way
  - type: text
    content: and gave you their land.
  - type: text
    content: '“And I said to you, ‘I am '
  - type: text
    content: God
  - type: text
    content: ', your God. Don’t for a minute be afraid of the gods of the Amorites in whose land you are living.’ But you didn’t listen to me.”'
