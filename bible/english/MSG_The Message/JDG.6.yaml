document_id: JDG.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gideon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: 'Yet again the People of Israel went back to doing evil in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s sight. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' put them under the domination of Midian for seven years. Midian overpowered Israel. Because of Midian, the People of Israel made for themselves hideouts in the mountains—caves and forts. When Israel planted its crops, Midian and Amalek, the easterners, would invade them, camp in their fields, and destroy their crops all the way down to Gaza. They left nothing for them to live on, neither sheep nor ox nor donkey. Bringing their cattle and tents, they came in and took over, like an invasion of locusts. And their camels—past counting! They marched in and devastated the country. The People of Israel, reduced to grinding poverty by Midian, cried out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for help.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: 'One day the angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' came and sat down under the oak in Ophrah that belonged to Joash the Abiezrite, whose son Gideon was threshing wheat in the winepress, out of sight of the Midianites. The angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' appeared to him and said, “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is with you, O mighty warrior!”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Gideon replied, “With '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ', my master? If '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is with us, why has all this happened to us? Where are all the miracle-wonders our parents and grandparents told us about, telling us, ‘Didn’t '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' deliver us from Egypt?’ The fact is, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has nothing to do with us—he has turned us over to Midian.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' faced him directly: “Go in this strength that is yours. Save Israel from Midian. Haven’t I just sent you?”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Gideon said to him, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Me
    - type: text
      text: ', my master? How and with what could I ever save Israel? Look at me. My clan’s the weakest in Manasseh and I’m the runt of the litter.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to him, “I’ll be with you. Believe me, you’ll defeat Midian as one man.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'Gideon said, “If you’re serious about this, do me a favor: Give me a sign to back up what you’re telling me. Don’t leave until I come back and bring you my gift.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “I’ll wait till you get back.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Gideon went and prepared a young goat and a huge amount of unraised bread (he used over half a bushel of flour!). He put the meat in a basket and the broth in a pot and took them back under the shade of the oak tree for a sacred meal.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The angel of God said to him, “Take the meat and unraised bread, place them on that rock, and pour the broth on them.” Gideon did it.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: 'The angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' stretched out the tip of the stick he was holding and touched the meat and the bread. Fire broke out of the rock and burned up the meat and bread while the angel of God slipped away out of sight. And Gideon knew it was the angel of God!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gideon said, “Oh no! Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! I have seen the angel of God face-to-face!”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' reassured him, “Easy now. Don’t panic. You won’t die.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then Gideon built an altar there to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and named it “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Peace.” It’s still called that at Ophrah of Abiezer.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'That night this happened. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to him, “Take your father’s best seven-year-old bull, the prime one. Tear down your father’s Baal altar and chop down the Asherah fertility pole beside it. Then build an altar to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, on the top of this hill. Take the prime bull and present it as a Whole-Burnt-Offering, using firewood from the Asherah pole that you cut down.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Gideon selected ten men from his servants and did exactly what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had told him. But because of his family and the people in the neighborhood, he was afraid to do it openly, so he did it that night.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Early in the morning, the people in town were shocked to find Baal’s altar torn down, the Asherah pole beside it chopped down, and the prime bull burning away on the altar that had been built.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: They kept asking, “Who did this?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Questions and more questions, and then the answer: “Gideon son of Joash did it.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The men of the town demanded of Joash: “Bring out your son! He must die! Why, he tore down the Baal altar and chopped down the Asherah tree!”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: But Joash stood up to the crowd pressing in on him, “Are you going to fight Baal’s battles for him? Are you going to save him? Anyone who takes Baal’s side will be dead by morning. If Baal is a god in fact, let him fight his own battles and defend his own altar.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: They nicknamed Gideon that day Jerub-Baal because after he had torn down the Baal altar, he had said, “Let Baal fight his own battles.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-35
    - type: text
      text: 'All the Midianites and Amalekites (the easterners) got together, crossed the river, and made camp in the Valley of Jezreel. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Spirit came over Gideon. He blew his ram’s horn trumpet and the Abiezrites came out, ready to follow him. He dispatched messengers all through Manasseh, calling them to the battle; also to Asher, Zebulun, and Naphtali. They all came.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-37
    - type: text
      text: 'Gideon said to God, “If this is right, if you are using me to save Israel as you’ve said, then look: I’m placing a fleece of wool on the threshing floor. If dew is on the fleece only, but the floor is dry, then I know that you will use me to save Israel, as you said.”'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: That’s what happened. When he got up early the next morning, he wrung out the fleece—enough dew to fill a bowl with water!
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Then Gideon said to God, “Don’t be impatient with me, but let me say one more thing. I want to try another time with the fleece. But this time let the fleece stay dry, while the dew drenches the ground.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: God made it happen that very night. Only the fleece was dry while the ground was wet with dew.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-10
    - type: text
      text: 'One time when the People of Israel had cried out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' because of Midian, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent them a prophet with this message: “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I delivered you from Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I freed you from a life of slavery;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I rescued you from Egypt’s brutality
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then from every oppressor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I pushed them out of your way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gave you their land.
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“And I said to you, ‘I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God. Don’t for a minute be afraid of the gods of the Amorites in whose land you are living.’ But you didn’t listen to me.”'
