document_id: NUM.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Census in the Wilderness of Sinai
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses in the Wilderness of Sinai at the Tent of Meeting on the first day of the second month in the second year after they had left Egypt. He said, “Number the congregation of the People of Israel by clans and families, writing down the names of every male. You and Aaron are to register, company by company, every man who is twenty years and older who is able to fight in the army. Pick one man from each tribe who is head of his family to help you. These are the names of the men who will help you:'
  - type: text
    content: 'from Reuben: Elizur son of Shedeur'
  '10':
  - type: text
    content: from the sons of Joseph,
  - type: text
    content: 'from Ephraim: Elishama son of Ammihud'
  - type: text
    content: 'from Manasseh: Gamaliel son of Pedahzur'
  '11':
  - type: text
    content: 'from Benjamin: Abidan son of Gideoni'
  '12':
  - type: text
    content: 'from Dan: Ahiezer son of Ammishaddai'
  '13':
  - type: text
    content: 'from Asher: Pagiel son of Ocran'
  '14':
  - type: text
    content: 'from Gad: Eliasaph son of Deuel'
  '15':
  - type: text
    content: 'from Naphtali: Ahira son of Enan.”'
  '16':
  - type: text
    content: These were the men chosen from the congregation, leaders of their ancestral tribes, heads of Israel’s military divisions.
  '17':
  - type: text
    content: 'Moses and Aaron took these men who had been named to help and gathered the whole congregation together on the first day of the second month. The people registered themselves in their tribes according to their ancestral families, putting down the names of those who were twenty years old and older, just as '
  - type: text
    content: God
  - type: text
    content: ' commanded Moses. He numbered them in the Wilderness of Sinai.'
  '20':
  - type: text
    content: 'The line of Reuben, Israel’s firstborn: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by tribes according to their ancestral families. The tribe of Reuben numbered 46,500.'
  '22':
  - type: text
    content: 'The line of Simeon: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Simeon numbered 59,300.'
  '24':
  - type: text
    content: 'The line of Gad: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Gad numbered 45,650.'
  '26':
  - type: text
    content: 'The line of Judah: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Judah numbered 74,600.'
  '28':
  - type: text
    content: 'The line of Issachar: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Issachar numbered 54,400.'
  '30':
  - type: text
    content: 'The line of Zebulun: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Zebulun numbered 57,400.'
  '32':
  - type: text
    content: 'The line of Joseph: From son Ephraim the men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Ephraim numbered 40,500.'
  '34':
  - type: text
    content: And from son Manasseh the men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Manasseh numbered 32,200.
  '36':
  - type: text
    content: 'The line of Benjamin: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Benjamin numbered 35,400.'
  '38':
  - type: text
    content: 'The line of Dan: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Dan numbered 62,700.'
  '40':
  - type: text
    content: 'The line of Asher: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Asher numbered 41,500.'
  '42':
  - type: text
    content: 'The line of Naphtali: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Naphtali numbered 53,400.'
  '44':
  - type: text
    content: These are the numbers of those registered by Moses and Aaron, registered with the help of the leaders of Israel, twelve men, each representing his ancestral family. The sum total of the People of Israel twenty years old and over who were able to fight in the army, counted by ancestral family, was 603,550.
  '47':
  - type: text
    content: 'The Levites, however, were not counted by their ancestral family along with the others. '
  - type: text
    content: God
  - type: text
    content: ' had told Moses, “The tribe of Levi is an exception: Don’t register them. Don’t count the tribe of Levi; don’t include them in the general census of the People of Israel. Instead, appoint the Levites to be in charge of The Dwelling of The Testimony—over all its furnishings and everything connected with it. Their job is to carry The Dwelling and all its furnishings, maintain it, and camp around it. When it’s time to move The Dwelling, the Levites will take it down, and when it’s time to set it up, the Levites will do it. Anyone else who even goes near it will be put to death.'
  '52':
  - type: text
    content: “The rest of the People of Israel will set up their tents in companies, every man in his own camp under its own flag. But the Levites will set up camp around The Dwelling of The Testimony so that wrath will not fall on the community of Israel. The Levites are responsible for the security of The Dwelling of The Testimony.”
  '54':
  - type: text
    content: 'The People of Israel did everything that '
  - type: text
    content: God
  - type: text
    content: ' commanded Moses. They did it all.'
  '6':
  - type: text
    content: 'from Simeon: Shelumiel son of Zurishaddai'
  '7':
  - type: text
    content: 'from Judah: Nahshon son of Amminadab'
  '8':
  - type: text
    content: 'from Issachar: Nethanel son of Zuar'
  '9':
  - type: text
    content: 'from Zebulun: Eliab son of Helon'
