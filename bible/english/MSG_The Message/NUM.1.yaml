document_id: NUM.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Census in the Wilderness of Sinai
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Moses in the Wilderness of Sinai at the Tent of Meeting on the first day of the second month in the second year after they had left Egypt. He said, “Number the congregation of the People of Israel by clans and families, writing down the names of every male. You and Aaron are to register, company by company, every man who is twenty years and older who is able to fight in the army. Pick one man from each tribe who is head of his family to help you. These are the names of the men who will help you:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'from Reuben: Elizur son of Shedeur'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'from Simeon: Shelumiel son of Zurishaddai'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'from Judah: Nahshon son of Amminadab'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'from Issachar: Nethanel son of Zuar'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'from Zebulun: Eliab son of Helon'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: from the sons of Joseph,
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Ephraim: Elishama son of Ammihud'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Manasseh: Gamaliel son of Pedahzur'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'from Benjamin: Abidan son of Gideoni'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'from Dan: Ahiezer son of Ammishaddai'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'from Asher: Pagiel son of Ocran'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'from Gad: Eliasaph son of Deuel'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'from Naphtali: Ahira son of Enan.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: These were the men chosen from the congregation, leaders of their ancestral tribes, heads of Israel’s military divisions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'Moses and Aaron took these men who had been named to help and gathered the whole congregation together on the first day of the second month. The people registered themselves in their tribes according to their ancestral families, putting down the names of those who were twenty years old and older, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded Moses. He numbered them in the Wilderness of Sinai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'The line of Reuben, Israel’s firstborn: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by tribes according to their ancestral families. The tribe of Reuben numbered 46,500.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'The line of Simeon: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Simeon numbered 59,300.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'The line of Gad: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Gad numbered 45,650.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'The line of Judah: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Judah numbered 74,600.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: 'The line of Issachar: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Issachar numbered 54,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: 'The line of Zebulun: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Zebulun numbered 57,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: 'The line of Joseph: From son Ephraim the men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Ephraim numbered 40,500.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: And from son Manasseh the men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Manasseh numbered 32,200.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: 'The line of Benjamin: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Benjamin numbered 35,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: 'The line of Dan: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Dan numbered 62,700.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 40-41
  - type: text
    text: 'The line of Asher: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Asher numbered 41,500.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: 'The line of Naphtali: The men were counted off head by head, every male twenty years and older who was able to fight in the army, registered by clans and families. The tribe of Naphtali numbered 53,400.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 44-46
  - type: text
    text: These are the numbers of those registered by Moses and Aaron, registered with the help of the leaders of Israel, twelve men, each representing his ancestral family. The sum total of the People of Israel twenty years old and over who were able to fight in the army, counted by ancestral family, was 603,550.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-51
  - type: text
    text: 'The Levites, however, were not counted by their ancestral family along with the others. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had told Moses, “The tribe of Levi is an exception: Don’t register them. Don’t count the tribe of Levi; don’t include them in the general census of the People of Israel. Instead, appoint the Levites to be in charge of The Dwelling of The Testimony—over all its furnishings and everything connected with it. Their job is to carry The Dwelling and all its furnishings, maintain it, and camp around it. When it’s time to move The Dwelling, the Levites will take it down, and when it’s time to set it up, the Levites will do it. Anyone else who even goes near it will be put to death.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 52-53
  - type: text
    text: “The rest of the People of Israel will set up their tents in companies, every man in his own camp under its own flag. But the Levites will set up camp around The Dwelling of The Testimony so that wrath will not fall on the community of Israel. The Levites are responsible for the security of The Dwelling of The Testimony.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'The People of Israel did everything that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded Moses. They did it all.'
