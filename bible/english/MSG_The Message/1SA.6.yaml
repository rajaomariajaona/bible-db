document_id: 1SA.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Gold Tumors and Rats
  - type: text
    content: 'After the Chest of '
  - type: text
    content: God
  - type: text
    content: ' had been among the Philistine people for seven months, the Philistine leaders called together their religious professionals, the priests, and experts on the supernatural for consultation: “How can we get rid of this Chest of '
  - type: text
    content: God
  - type: text
    content: ', get it off our hands without making things worse? Tell us!”'
  '10':
  - type: text
    content: 'So that’s what they did: They hitched two cows to the cart, put their calves in the barn, and placed the Chest of '
  - type: text
    content: God
  - type: text
    content: ' and the sack of gold rats and tumors on the cart. The cows headed straight for home, down the road to Beth Shemesh, straying neither right nor left, mooing all the way. The Philistine leaders followed them to the outskirts of Beth Shemesh.'
  '13':
  - type: text
    content: 'The people of Beth Shemesh were harvesting wheat in the valley. They looked up and saw the Chest. Elated, they ran to meet it. The cart came into the field of Joshua, a Beth Shemeshite, and stopped there beside a huge boulder. The harvesters tore the cart to pieces, then chopped up the wood and sacrificed the cows as a burnt offering to '
  - type: text
    content: God
  - type: text
    content: '. The Levites took charge of the Chest of '
  - type: text
    content: God
  - type: text
    content: ' and the sack containing the gold offerings, placing them on the boulder. Offering the sacrifices, everyone in Beth Shemesh worshiped '
  - type: text
    content: God
  - type: text
    content: ' most heartily that day.'
  '16':
  - type: text
    content: When the five Philistine leaders saw what they came to see, they returned the same day to Ekron.
  '17':
  - type: text
    content: 'The five gold replicas of the tumors were offered by the Philistines in compensation for the cities of Ashdod, Gaza, Ashkelon, Gath, and Ekron. The five gold rats matched the number of Philistine towns, both large and small, ruled by the five leaders. The big boulder on which they placed the Chest of '
  - type: text
    content: God
  - type: text
    content: ' is still there in the field of Joshua of Beth Shemesh, a landmark.'
  - type: heading
    content: If You Are Serious About Coming Back to God
  '19':
  - type: text
    content: 'God struck some of the men of Beth Shemesh who, out of curiosity, irreverently peeked into the Chest of '
  - type: text
    content: God
  - type: text
    content: '. Seventy died. The whole town was in mourning, reeling under the hard blow from '
  - type: text
    content: God
  - type: text
    content: ', and questioning, “Who can stand before '
  - type: text
    content: God
  - type: text
    content: ', this holy God? And who can we get to take this Chest off our hands?”'
  '21':
  - type: text
    content: 'They sent emissaries to Kiriath Jearim, saying, “The Philistines have returned the Chest of '
  - type: text
    content: God
  - type: text
    content: . Come down and get it.”
  '3':
  - type: text
    content: They said, “If you’re going to send the Chest of the God of Israel back, don’t just dump it on them. Pay compensation. Then you will be healed. After you’re in the clear again, God will let up on you. Why wouldn’t he?”
  '4':
  - type: text
    content: “And what exactly would make for adequate compensation?”
  - type: text
    content: “Five gold tumors and five gold rats,” they said, “to match the number of Philistine leaders. Since all of you—leaders and people—suffered the same plague, make replicas of the tumors and rats that are devastating the country and present them as an offering to the glory of the God of Israel. Then maybe he’ll ease up and not be so hard on you and your gods, and on your country. Why be stubborn like the Egyptians and Pharaoh? God didn’t quit pounding on them until they let the people go. Only then did he let up.
  '7':
  - type: text
    content: '“So here’s what you do: Take a brand-new oxcart and two cows that have never been in harness. Hitch the cows to the oxcart and send their calves back to the barn. Put the Chest of '
  - type: text
    content: God
  - type: text
    content: ' on the cart. Secure the gold replicas of the tumors and rats that you are offering as compensation in a sack and set them next to the Chest. Then send it off. But keep your eyes on it. If it heads straight back home to where it came from, toward Beth Shemesh, it is clear that this catastrophe is a divine judgment, but if not, we’ll know that God had nothing to do with it—it was just an accident.”'
