document_id: JER.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Same Fate Will Fall upon All
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: 'The Message that Jeremiah received for all the Judeans who lived in the land of Egypt, who had their homes in Migdol, Tahpanhes, Noph, and the land of Pathros: “This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, the God of Israel, says: ‘You saw with your own eyes the terrible doom that I brought down on Jerusalem and the Judean cities. Look at what’s left: ghost towns of rubble and smoking ruins, and all because they took up with evil ways, making me angry by going off to offer sacrifices and worship the latest in gods—no-gods that neither they nor you nor your ancestors knew the first thing about. Morning after morning and long into the night I kept after you, sending you all those prophets, my servants, begging you, “Please, please—don’t do this, don’t fool around in this loathsome gutter of gods that I hate with a passion.” But do you think anyone paid the least bit of attention or repented of evil or quit offering sacrifices to the no-gods? Not one. So I let loose with my anger, a firestorm of wrath in the cities of Judah and the streets of Jerusalem, and left them in ruins and wasted. And they’re '
  - type: usfm
    marker: it
    children:
    - type: text
      text: still
  - type: text
    text: ' in ruins and wasted.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: '“This is the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, the God of Israel: ‘So why are you ruining your lives by amputating yourselves—man, woman, child, and baby—from the life of Judah, leaving yourselves isolated, unconnected? And why do you deliberately make me angry by what you do, offering sacrifices to these no-gods in the land of Egypt where you’ve come to live? You’ll only destroy yourselves and make yourselves an example used in curses and an object of ridicule among all the nations of the earth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11a
  - type: text
    text: ' “‘Have you so soon forgotten the evil lives of your ancestors, the evil lives of the kings of Judah and their wives, to say nothing of your own evil lives, you and your wives, the evil you flaunted in the land of Judah and the streets of Jerusalem? And to this day, there’s not a trace of remorse, not a sign of reverence, nobody caring about living by what I tell them or following my instructions that I’ve set out so plainly before you and your parents! So this is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies decrees:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11b-14
  - type: text
    text: ' “‘Watch out! I’ve decided to bring doom on you and get rid of everyone connected with Judah. I’m going to take what’s left of Judah, those who have decided to go to Egypt and live there, and finish them off. In Egypt they will either be killed or starve to death. The same fate will fall upon both the obscure and the important. Regardless of their status, they will either be killed or starve. You’ll end up cursed, reviled, ridiculed, and mocked. I’ll give those who are in Egypt the same medicine I gave those in Jerusalem: massacre, starvation, and disease. None of those who managed to get out of Judah alive and get away to Egypt are going to make it back to the Judah for which they’re so homesick. None will make it back, except maybe a few fugitives.’”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Making Goddess Cakes
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: 'The men who knew that their wives had been burning sacrifices to the no-gods, joined by a large crowd of women, along with virtually everyone living in Pathros of Egypt, answered Jeremiah: “We’re having nothing to do with what you tell us is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message. We’re going to go right on offering sacrifices to the Queen of Heaven and pouring out drink offerings to her, keeping up the traditions set by our ancestors, our kings and government leaders in the cities of Judah and the streets of Jerusalem in the good old days. We had a good life then—lots of food, rising standard of living, and no bad luck. But the moment we quit sacrificing to the Queen of Heaven and pouring out offerings to her, everything fell apart. We’ve had nothing but massacres and starvation ever since.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And then the women chimed in: “Yes! Absolutely! We’re going to keep at it, offering sacrifices to the Queen of Heaven and pouring out offerings to her. Aren’t our husbands behind us? They like it that we make goddess cakes and pour out our offerings to her.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: 'Then Jeremiah spoke up, confronting the men and the women, all the people who had answered so insolently. He said, “The sacrifices that you and your parents, your kings, your government officials, and the common people of the land offered up in the cities of Judah and the streets of Jerusalem—don’t you think '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' noticed? He noticed, all right. And he got fed up. Finally, he couldn’t take your evil behavior and your disgusting acts any longer. Your land became a wasteland, a death valley, a horror story, a ghost town. And it continues to be just that. This doom has come upon you because you kept offering all those sacrifices, and you sinned against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! You refused to listen to him, wouldn’t live the way he directed, ignored the covenant conditions.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25a
  - type: text
    text: ' Jeremiah kept going, but now zeroed in on the women: “Listen, all you who are from Judah and living in Egypt—please, listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Word. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, the God of Israel, says: ‘You women! You said it and then you did it. You said, “We’re going to keep the vows we made to sacrifice to the Queen of Heaven and pour out offerings to her, and nobody’s going to stop us!”’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25b-27a
  - type: text
    text: ' “Well, go ahead. Keep your vows. Do it up big. But also listen to what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has to say about it, all you who are from Judah but live in Egypt: ‘I swear by my great name, backed by everything I am—this is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' speaking!—that never again shall my name be used in vows, such as “As sure as the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', lives!” by anyone in the whole country of Egypt. I’ve targeted each one of you for doom. The good is gone for good.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27b-28
  - type: text
    text: ' “‘All the Judeans in Egypt will die off by massacre or starvation until they’re wiped out. The few who get out of Egypt alive and back to Judah will be '
  - type: usfm
    marker: it
    children:
    - type: text
      text: very
  - type: text
    text: ' few, hardly worth counting. Then that ragtag bunch that left Judah to live in Egypt will know who had the last word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: '“‘And this will be the evidence: I will bring punishment right here, and by this you’ll know that the decrees of doom against you are the real thing. Watch for this sign of doom: I will give Pharaoh Hophra king of Egypt over to his enemies, those who are out to kill him, exactly as I gave Zedekiah king of Judah to his enemy Nebuchadnezzar, who was after him.’”'
