document_id: AMO.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: You Who Give Little and Take Much
  - type: text
    content: 'My Master '
  - type: text
    content: God
  - type: text
    content: ' showed me this vision: A bowl of fresh fruit.'
  '11':
  - type: text
    content: “Oh yes, Judgment Day is coming!”
  - type: text
    content: 'These are the words of my Master '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: “I’ll send a famine through the whole country.
  - type: text
    content: It won’t be food or water that’s lacking, but my Word.
  - type: text
    content: People will drift from one end of the country to the other,
  - type: text
    content: roam to the north, wander to the east.
  - type: text
    content: They’ll go anywhere, listen to anyone,
  - type: text
    content: 'hoping to hear '
  - type: text
    content: God
  - type: text
    content: ’s Word—but they won’t hear it.
  '13':
  - type: text
    content: “On Judgment Day,
  - type: text
    content: lovely young girls will faint of Word-thirst,
  - type: text
    content: robust young men will faint of God-thirst,
  - type: text
    content: Along with those who take oaths at the Samaria Sin-and-Sex Center,
  - type: text
    content: saying, ‘As the lord god of Dan is my witness!’
  - type: text
    content: and ‘The lady goddess of Beer-sheba bless you!’
  - type: text
    content: Their lives will fall to pieces.
  - type: text
    content: They’ll never put it together again.”
  '2':
  - type: text
    content: He said, “What do you see, Amos?”
  - type: text
    content: I said, “A bowl of fresh, ripe fruit.”
  - type: text
    content: God
  - type: text
    content: ' said, “Right. So, I’m calling it quits with my people Israel. I’m no longer acting as if everything is just fine.”'
  '3':
  - type: text
    content: “The royal singers will wail when it happens.”
  - type: text
    content: 'My Master '
  - type: text
    content: God
  - type: text
    content: ' said so.'
  - type: text
    content: “Corpses will be strewn here, there, and everywhere.
  - type: text
    content: Hush!”
  '4':
  - type: text
    content: Listen to this, you who walk all over the weak,
  - type: text
    content: you who treat poor people as less than nothing,
  - type: text
    content: Who say, “When’s my next paycheck coming
  - type: text
    content: so I can go out and live it up?
  - type: text
    content: How long till the weekend
  - type: text
    content: when I can go out and have a good time?”
  - type: text
    content: Who give little and take much,
  - type: text
    content: and never do an honest day’s work.
  - type: text
    content: You exploit the poor, using them—
  - type: text
    content: and then, when they’re used up, you discard them.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' swears against the arrogance of Jacob:'
  - type: text
    content: “I’m keeping track of their every last sin.”
  - type: text
    content: God’s oath will shake earth’s foundations,
  - type: text
    content: dissolve the whole world into tears.
  - type: text
    content: God’s oath will sweep in like a river that rises,
  - type: text
    content: flooding houses and lands,
  - type: text
    content: And then recedes,
  - type: text
    content: leaving behind a sea of mud.
  '9':
  - type: text
    content: “On Judgment Day, watch out!”
  - type: text
    content: 'These are the words of '
  - type: text
    content: God
  - type: text
    content: ', my Master.'
  - type: text
    content: “I’ll turn off the sun at noon.
  - type: text
    content: In the middle of the day the earth will go black.
  - type: text
    content: I’ll turn your parties into funerals
  - type: text
    content: and make every song you sing a dirge.
  - type: text
    content: Everyone will walk around in rags,
  - type: text
    content: with sunken eyes and bald heads.
  - type: text
    content: Think of the worst that could happen
  - type: text
    content: —your only son, say, murdered.
  - type: text
    content: That’s a hint of Judgment Day
  - type: text
    content: —that and much more.
