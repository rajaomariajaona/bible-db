document_id: AMO.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You Who Give Little and Take Much
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'My Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' showed me this vision: A bowl of fresh fruit.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: “Oh yes, Judgment Day is coming!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'These are the words of my Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ll send a famine through the whole country.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It won’t be food or water that’s lacking, but my Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will drift from one end of the country to the other,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roam to the north, wander to the east.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll go anywhere, listen to anyone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'hoping to hear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Word—but they won’t hear it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: “On Judgment Day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lovely young girls will faint of Word-thirst,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: robust young men will faint of God-thirst,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Along with those who take oaths at the Samaria Sin-and-Sex Center,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saying, ‘As the lord god of Dan is my witness!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ‘The lady goddess of Beer-sheba bless you!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their lives will fall to pieces.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ll never put it together again.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He said, “What do you see, Amos?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: I said, “A bowl of fresh, ripe fruit.”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “Right. So, I’m calling it quits with my people Israel. I’m no longer acting as if everything is just fine.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “The royal singers will wail when it happens.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said so.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Corpses will be strewn here, there, and everywhere.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Hush!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: Listen to this, you who walk all over the weak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who treat poor people as less than nothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who say, “When’s my next paycheck coming
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I can go out and live it up?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long till the weekend
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I can go out and have a good time?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who give little and take much,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never do an honest day’s work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You exploit the poor, using them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then, when they’re used up, you discard them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' swears against the arrogance of Jacob:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I’m keeping track of their every last sin.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s oath will shake earth’s foundations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dissolve the whole world into tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s oath will sweep in like a river that rises,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flooding houses and lands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then recedes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving behind a sea of mud.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: “On Judgment Day, watch out!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'These are the words of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my Master.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ll turn off the sun at noon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the middle of the day the earth will go black.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll turn your parties into funerals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make every song you sing a dirge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone will walk around in rags,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with sunken eyes and bald heads.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Think of the worst that could happen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —your only son, say, murdered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s a hint of Judgment Day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —that and much more.
