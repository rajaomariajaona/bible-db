document_id: TIT.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A God-Filled Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: Your job is to speak out on the things that make for solid doctrine. Guide older men into lives of temperance, dignity, and wisdom, into healthy faith, love, and endurance. Guide older women into lives of reverence so they end up as neither gossips nor drunks, but models of goodness. By looking at them, the younger women will know how to love their husbands and children, be virtuous and pure, keep a good house, be good wives. We don’t want anyone looking down on God’s Message because of their behavior. Also, guide the young men to live disciplined lives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: But mostly, show them all this by doing it yourself, trustworthy in your teaching, your words solid and sane. Then anyone who is dead set against us, when he finds nothing weird or misguided, might eventually come around.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Guide slaves into being loyal workers, a bonus to their masters—no back talk, no petty thievery. Then their good character will shine through their actions, adding luster to the teaching of our Savior God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: God’s readiness to give and forgive is now public. Salvation’s available for everyone! We’re being shown how to turn our backs on a godless, indulgent life, and how to take on a God-filled, God-honoring life. This new life is starting right now, and is whetting our appetites for the glorious day when our great God and Savior, Jesus Christ, appears. He offered himself as a sacrifice to free us from a dark, rebellious life into this good, pure life, making us a people he can be proud of, energetic in goodness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tell them all this. Build up their courage, and discipline them if they get out of line. You’re in charge. Don’t let anyone put you down.
