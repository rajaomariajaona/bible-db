document_id: JUD.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I, Jude, am a slave to Jesus Christ and brother to James, writing to those loved by God the Father, called and kept safe by Jesus Christ. Relax, everything’s going to be all right; rest, everything’s coming together; open your hearts, love is on the way!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fight with All You Have in You
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Dear friends, I’ve dropped everything to write you about this life of salvation that we have in common. I have to write insisting—begging!—that you fight with everything you have in you for this faith entrusted to us as a gift to guard and cherish. What has happened is that some people have infiltrated our ranks (our Scriptures warned us this would happen), who beneath their pious skin are shameless scoundrels. Their design is to replace the sheer grace of our God with sheer license—which means doing away with Jesus Christ, our one and only Master.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lost Stars in Outer Space
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: 'I’m laying this out as clearly as I can, even though you once knew all this well enough and shouldn’t need reminding. Here it is in brief: The Master saved a people out of the land of Egypt. Later he destroyed those who defected. And you know the story of the angels who didn’t stick to their post, abandoning it for other, darker missions. But they are now chained and jailed in a black hole until the great Judgment Day. Sodom and Gomorrah, which went to sexual rack and ruin along with the surrounding cities that acted just like them, are another example. Burning and burning and never burning up, they serve still as a stock warning.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This is exactly the same program of these latest infiltrators: dirty sex, rule and rulers thrown out, glory dragged in the mud.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: 'The Archangel Michael, who went to the mat with the Devil as they fought over the body of Moses, wouldn’t have dared level him with a blasphemous curse, but said simply, “No you don’t. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' will take care of you!” But these people sneer at anything they can’t understand, and by doing whatever they feel like doing—living by animal instinct only—they participate in their own destruction. I’m fed up with them! They’ve gone down Cain’s road; they’ve been sucked into Balaam’s error by greed; they’re canceled out in Korah’s rebellion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: These people are eyesores at your love feasts as you worship and eat together. They’re giving you a black eye—carousing shamelessly, grabbing anything that isn’t nailed down. They’re—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puffs of smoke pushed by gusts of wind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: late autumn trees stripped clean of leaf and fruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doubly dead, pulled up by the roots;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wild ocean waves leaving nothing on the beach
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the foam of their shame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lost stars in outer space
- type: usfm
  marker: q2
  children:
  - type: text
    text: on their way to the black hole.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: 'Enoch, the seventh after Adam, prophesied of them: “Look! The Master comes with thousands of holy angels to bring judgment against them all, convicting each person of every defiling act of shameless sacrilege, of every dirty word they have spewed of their pious filth.” These are the complainers, the bellyachers, grabbing for the biggest piece of the pie, talking big, saying anything they think will get them ahead.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'But remember, dear friends, that the apostles of our Master, Jesus Christ, told us this would happen: “In the last days there will be people who don’t take these things seriously anymore. They’ll treat them like a joke, and make a religion of their own whims and lusts.” These are the ones who split churches, thinking only of themselves. There’s nothing to them, no sign of the Spirit!'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'But you, dear friends, carefully build yourselves up in this most holy faith by praying in the Holy Spirit, staying right at the center of God’s love, keeping your arms open and outstretched, ready for the mercy of our Master, Jesus Christ. This is the unending life, the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: real
  - type: text
    text: ' life!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: Go easy on those who hesitate in the faith. Go after those who take the wrong way. Be tender with sinners, but not soft on sin. The sin itself stinks to high heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: And now to him who can keep you on your feet, standing tall in his bright presence, fresh and celebrating—to our one God, our only Savior, through Jesus Christ, our Master, be glory, majesty, strength, and rule before all time, and now, and to the end of all time. Yes.
