document_id: ISA.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Green Shoot from Jesse’s Stump
  - type: text
    content: A green Shoot will sprout from Jesse’s stump,
  - type: text
    content: from his roots a budding Branch.
  - type: text
    content: 'The life-giving Spirit of '
  - type: text
    content: God
  - type: text
    content: ' will hover over him,'
  - type: text
    content: the Spirit that brings wisdom and understanding,
  - type: text
    content: The Spirit that gives direction and builds strength,
  - type: text
    content: the Spirit that instills knowledge and Fear-of-
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Fear-of-
  - type: text
    content: God
  - type: text
    content: will be all his joy and delight.
  - type: text
    content: He won’t judge by appearances,
  - type: text
    content: won’t decide on the basis of hearsay.
  - type: text
    content: He’ll judge the needy by what is right,
  - type: text
    content: render decisions on earth’s poor with justice.
  - type: text
    content: His words will bring everyone to awed attention.
  - type: text
    content: A mere breath from his lips will topple the wicked.
  - type: text
    content: Each morning he’ll pull on sturdy work clothes and boots,
  - type: text
    content: and build righteousness and faithfulness in the land.
  - type: heading
    content: A Living Knowledge of God
  '10':
  - type: text
    content: On that day, Jesse’s Root will be raised high, posted as a rallying banner for the peoples. The nations will all come to him. His headquarters will be glorious.
  '11':
  - type: text
    content: Also on that day, the Master for the second time will reach out to bring back what’s left of his scattered people. He’ll bring them back from Assyria, Egypt, Pathros, Ethiopia, Elam, Sinar, Hamath, and the ocean islands.
  '12':
  - type: text
    content: And he’ll raise that rallying banner high, visible to all nations,
  - type: text
    content: gather in all the scattered exiles of Israel,
  - type: text
    content: Pull in all the dispersed refugees of Judah
  - type: text
    content: from the four winds and the seven seas.
  - type: text
    content: The jealousy of Ephraim will dissolve,
  - type: text
    content: the hostility of Judah will vanish—
  - type: text
    content: Ephraim no longer the jealous rival of Judah,
  - type: text
    content: Judah no longer the hostile rival of Ephraim!
  - type: text
    content: Blood brothers united, they’ll pounce on the Philistines in the west,
  - type: text
    content: join forces to plunder the people in the east.
  - type: text
    content: They’ll attack Edom and Moab.
  - type: text
    content: The Ammonites will fall into line.
  - type: text
    content: God
  - type: text
    content: ' will once again dry up Egypt’s Red Sea,'
  - type: text
    content: making for an easy crossing.
  - type: text
    content: He’ll send a blistering wind
  - type: text
    content: down on the great River Euphrates,
  - type: text
    content: Reduce it to seven mere trickles.
  - type: text
    content: None even need get their feet wet!
  - type: text
    content: In the end there’ll be a highway all the way from Assyria,
  - type: text
    content: easy traveling for what’s left of God’s people—
  - type: text
    content: A highway just like the one Israel had
  - type: text
    content: when he marched up out of Egypt.
  '6':
  - type: text
    content: The wolf will romp with the lamb,
  - type: text
    content: the leopard sleep with the kid.
  - type: text
    content: Calf and lion will eat from the same trough,
  - type: text
    content: and a little child will tend them.
  - type: text
    content: Cow and bear will graze the same pasture,
  - type: text
    content: their calves and cubs grow up together,
  - type: text
    content: and the lion eat straw like the ox.
  - type: text
    content: The nursing child will crawl over rattlesnake dens,
  - type: text
    content: the toddler stick his hand down the hole of a serpent.
  - type: text
    content: Neither animal nor human will hurt or kill
  - type: text
    content: on my holy mountain.
  - type: text
    content: The whole earth will be brimming with knowing God-Alive,
  - type: text
    content: a living knowledge of God ocean-deep, ocean-wide.
  - type: text
    content: '* * *'
