document_id: ISA.11,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Green Shoot from Jesse’s Stump
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A green Shoot will sprout from Jesse’s stump,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from his roots a budding Branch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The life-giving Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will hover over him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Spirit that brings wisdom and understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Spirit that gives direction and builds strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Spirit that instills knowledge and Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be all his joy and delight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He won’t judge by appearances,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: won’t decide on the basis of hearsay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll judge the needy by what is right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: render decisions on earth’s poor with justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His words will bring everyone to awed attention.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A mere breath from his lips will topple the wicked.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each morning he’ll pull on sturdy work clothes and boots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and build righteousness and faithfulness in the land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Living Knowledge of God
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On that day, Jesse’s Root will be raised high, posted as a rallying banner for the peoples. The nations will all come to him. His headquarters will be glorious.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also on that day, the Master for the second time will reach out to bring back what’s left of his scattered people. He’ll bring them back from Assyria, Egypt, Pathros, Ethiopia, Elam, Sinar, Hamath, and the ocean islands.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he’ll raise that rallying banner high, visible to all nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gather in all the scattered exiles of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pull in all the dispersed refugees of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the four winds and the seven seas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The jealousy of Ephraim will dissolve,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hostility of Judah will vanish—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim no longer the jealous rival of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah no longer the hostile rival of Ephraim!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blood brothers united, they’ll pounce on the Philistines in the west,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: join forces to plunder the people in the east.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll attack Edom and Moab.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Ammonites will fall into line.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will once again dry up Egypt’s Red Sea,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making for an easy crossing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll send a blistering wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down on the great River Euphrates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reduce it to seven mere trickles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: None even need get their feet wet!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the end there’ll be a highway all the way from Assyria,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: easy traveling for what’s left of God’s people—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A highway just like the one Israel had
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he marched up out of Egypt.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wolf will romp with the lamb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the leopard sleep with the kid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calf and lion will eat from the same trough,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a little child will tend them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cow and bear will graze the same pasture,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their calves and cubs grow up together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the lion eat straw like the ox.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nursing child will crawl over rattlesnake dens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the toddler stick his hand down the hole of a serpent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Neither animal nor human will hurt or kill
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on my holy mountain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole earth will be brimming with knowing God-Alive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a living knowledge of God ocean-deep, ocean-wide.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
