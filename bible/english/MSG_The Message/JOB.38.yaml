document_id: JOB.38,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Confronts Job
  - type: heading
    content: Have You Gotten to the Bottom of Things?
  - type: text
    content: 'And now, finally, '
  - type: text
    content: God
  - type: text
    content: ' answered Job from the eye of a violent storm. He said:'
  - type: text
    content: “Why do you confuse the issue?
  - type: text
    content: Why do you talk without knowing what you’re talking about?
  - type: text
    content: Pull yourself together, Job!
  - type: text
    content: Up on your feet! Stand tall!
  - type: text
    content: I have some questions for you,
  - type: text
    content: and I want some straight answers.
  - type: text
    content: Where were you when I created the earth?
  - type: text
    content: Tell me, since you know so much!
  - type: text
    content: Who decided on its size? Certainly you’ll know that!
  - type: text
    content: Who came up with the blueprints and measurements?
  - type: text
    content: How was its foundation poured,
  - type: text
    content: and who set the cornerstone,
  - type: text
    content: While the morning stars sang in chorus
  - type: text
    content: and all the angels shouted praise?
  - type: text
    content: And who took charge of the ocean
  - type: text
    content: when it gushed forth like a baby from the womb?
  - type: text
    content: That was me! I wrapped it in soft clouds,
  - type: text
    content: and tucked it in safely at night.
  - type: text
    content: Then I made a playpen for it,
  - type: text
    content: a strong playpen so it couldn’t run loose,
  - type: text
    content: And said, ‘Stay here, this is your place.
  - type: text
    content: Your wild tantrums are confined to this place.’
  '12':
  - type: text
    content: “And have you ever ordered Morning, ‘Get up!’
  - type: text
    content: told Dawn, ‘Get to work!’
  - type: text
    content: So you could seize Earth like a blanket
  - type: text
    content: and shake out the wicked like cockroaches?
  - type: text
    content: As the sun brings everything to light,
  - type: text
    content: brings out all the colors and shapes,
  - type: text
    content: The cover of darkness is snatched from the wicked—
  - type: text
    content: they’re caught in the very act!
  '16':
  - type: text
    content: “Have you ever gotten to the true bottom of things,
  - type: text
    content: explored the labyrinthine caves of deep ocean?
  - type: text
    content: Do you know the first thing about death?
  - type: text
    content: Do you have one clue regarding death’s dark mysteries?
  - type: text
    content: And do you have any idea how large this earth is?
  - type: text
    content: Speak up if you have even the beginning of an answer.
  '19':
  - type: text
    content: “Do you know where Light comes from
  - type: text
    content: and where Darkness lives
  - type: text
    content: So you can take them by the hand
  - type: text
    content: and lead them home when they get lost?
  - type: text
    content: 'Why, of '
  - type: text
    content: course
  - type: text
    content: ' you know that.'
  - type: text
    content: You’ve known them all your life,
  - type: text
    content: grown up in the same neighborhood with them!
  '22':
  - type: text
    content: “Have you ever traveled to where snow is made,
  - type: text
    content: seen the vault where hail is stockpiled,
  - type: text
    content: The arsenals of hail and snow that I keep in readiness
  - type: text
    content: for times of trouble and battle and war?
  - type: text
    content: Can you find your way to where lightning is launched,
  - type: text
    content: or to the place from which the wind blows?
  - type: text
    content: Who do you suppose carves canyons
  - type: text
    content: for the downpours of rain, and charts
  - type: text
    content: the route of thunderstorms
  - type: text
    content: That bring water to unvisited fields,
  - type: text
    content: deserts no one ever lays eyes on,
  - type: text
    content: Drenching the useless wastelands
  - type: text
    content: so they’re carpeted with wildflowers and grass?
  - type: text
    content: And who do you think is the father of rain and dew,
  - type: text
    content: the mother of ice and frost?
  - type: text
    content: You don’t for a minute imagine
  - type: text
    content: these marvels of weather just happen, do you?
  '31':
  - type: text
    content: “Can you catch the eye of the beautiful Pleiades sisters,
  - type: text
    content: or distract Orion from his hunt?
  - type: text
    content: Can you get Venus to look your way,
  - type: text
    content: or get the Great Bear and her cubs to come out and play?
  - type: text
    content: Do you know the first thing about the sky’s constellations
  - type: text
    content: and how they affect things on Earth?
  '34':
  - type: text
    content: “Can you get the attention of the clouds,
  - type: text
    content: and commission a shower of rain?
  - type: text
    content: Can you take charge of the lightning bolts
  - type: text
    content: and have them report to you for orders?
  - type: heading
    content: What Do You Have to Say for Yourself?
  '36':
  - type: text
    content: “Who do you think gave weather-wisdom to the ibis,
  - type: text
    content: and storm-savvy to the rooster?
  - type: text
    content: Does anyone know enough to number all the clouds
  - type: text
    content: or tip over the rain barrels of heaven
  - type: text
    content: When the earth is cracked and dry,
  - type: text
    content: the ground baked hard as a brick?
  '39':
  - type: text
    content: “Can you teach the lioness to stalk her prey
  - type: text
    content: and satisfy the appetite of her cubs
  - type: text
    content: As they crouch in their den,
  - type: text
    content: waiting hungrily in their cave?
  - type: text
    content: And who sets out food for the ravens
  - type: text
    content: when their young cry to God,
  - type: text
    content: fluttering about because they have no food?”
