document_id: JOB.38,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: God Confronts Job
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Have You Gotten to the Bottom of Things?
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-11
    - type: text
      text: 'And now, finally, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' answered Job from the eye of a violent storm. He said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why do you confuse the issue?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you talk without knowing what you’re talking about?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pull yourself together, Job!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Up on your feet! Stand tall!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have some questions for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I want some straight answers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where were you when I created the earth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell me, since you know so much!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who decided on its size? Certainly you’ll know that!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who came up with the blueprints and measurements?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How was its foundation poured,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who set the cornerstone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While the morning stars sang in chorus
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the angels shouted praise?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who took charge of the ocean
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when it gushed forth like a baby from the womb?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That was me! I wrapped it in soft clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tucked it in safely at night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I made a playpen for it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a strong playpen so it couldn’t run loose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And said, ‘Stay here, this is your place.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wild tantrums are confined to this place.’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-15
    - type: text
      text: “And have you ever ordered Morning, ‘Get up!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: told Dawn, ‘Get to work!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you could seize Earth like a blanket
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shake out the wicked like cockroaches?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the sun brings everything to light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brings out all the colors and shapes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cover of darkness is snatched from the wicked—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re caught in the very act!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: “Have you ever gotten to the true bottom of things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: explored the labyrinthine caves of deep ocean?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you know the first thing about death?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you have one clue regarding death’s dark mysteries?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And do you have any idea how large this earth is?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Speak up if you have even the beginning of an answer.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-21
    - type: text
      text: “Do you know where Light comes from
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and where Darkness lives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you can take them by the hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lead them home when they get lost?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why, of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: course
    - type: text
      text: ' you know that.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve known them all your life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grown up in the same neighborhood with them!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-30
    - type: text
      text: “Have you ever traveled to where snow is made,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: seen the vault where hail is stockpiled,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The arsenals of hail and snow that I keep in readiness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for times of trouble and battle and war?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you find your way to where lightning is launched,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or to the place from which the wind blows?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who do you suppose carves canyons
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the downpours of rain, and charts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the route of thunderstorms
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That bring water to unvisited fields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deserts no one ever lays eyes on,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drenching the useless wastelands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they’re carpeted with wildflowers and grass?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who do you think is the father of rain and dew,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mother of ice and frost?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You don’t for a minute imagine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these marvels of weather just happen, do you?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-33
    - type: text
      text: “Can you catch the eye of the beautiful Pleiades sisters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or distract Orion from his hunt?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you get Venus to look your way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or get the Great Bear and her cubs to come out and play?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you know the first thing about the sky’s constellations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how they affect things on Earth?
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-35
    - type: text
      text: “Can you get the attention of the clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and commission a shower of rain?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can you take charge of the lightning bolts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have them report to you for orders?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What Do You Have to Say for Yourself?
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-38
    - type: text
      text: “Who do you think gave weather-wisdom to the ibis,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and storm-savvy to the rooster?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does anyone know enough to number all the clouds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or tip over the rain barrels of heaven
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the earth is cracked and dry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ground baked hard as a brick?
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-41
    - type: text
      text: “Can you teach the lioness to stalk her prey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and satisfy the appetite of her cubs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As they crouch in their den,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: waiting hungrily in their cave?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who sets out food for the ravens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when their young cry to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fluttering about because they have no food?”
