document_id: JDG.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Samson went down to Timnah. There in Timnah a woman caught his eye, a Philistine girl. He came back and told his father and mother, “I saw a woman in Timnah, a Philistine girl; get her for me as my wife.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: His parents said to him, “Isn’t there a woman among the girls in the neighborhood of our people? Do you have to go get a wife from the uncircumcised Philistines?”
- type: usfm
  marker: p
  children:
  - type: text
    text: But Samson said to his father, “Get her for me. She’s the one I want—she’s the right one.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '(His father and mother had no idea that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was behind this, that he was arranging an opportunity against the Philistines. At the time the Philistines lorded it over Israel.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'Samson went down to Timnah with his father and mother. When he got to the vineyards of Timnah, a young lion came at him, roaring. The Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came on him powerfully and he ripped it open barehanded, like tearing a young goat. But he didn’t tell his parents what he had done.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then he went on down and spoke to the woman. In Samson’s eyes, she was the one.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Some days later when he came back to get her, he made a little detour to look at what was left of the lion. And there a wonder: a swarm of bees in the lion’s carcass—and honey! He scooped it up in his hands and kept going, eating as he went. He rejoined his father and mother and gave some to them and they ate. But he didn’t tell them that he had scooped out the honey from the lion’s carcass.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: His father went on down to make arrangements with the woman, while Samson prepared a feast there. That’s what the young men did in those days. Because the people were wary of him, they arranged for thirty friends to mingle with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13a
  - type: text
    text: ' Samson said to them: “Let me put a riddle to you. If you can figure it out during the seven days of the feast, I’ll give you thirty linen garments and thirty changes of fine clothing. But if you can’t figure it out then you’ll give me thirty linen garments and thirty changes of fine clothing.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13b-14a
  - type: text
    text: ' They said, “Put your riddle. Let’s hear it.” So he said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the eater came something to eat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the strong came something sweet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14b-15
  - type: text
    text: ' They couldn’t figure it out. After three days they were still stumped. On the fourth day they said to Samson’s bride, “Worm the answer out of your husband or we’ll burn you and your father’s household. Have you invited us here to bankrupt us?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Samson’s bride turned on the tears, saying to him, “You hate me. You don’t love me. You’ve told a riddle to my people but you won’t even tell me the answer.”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “I haven’t told my own parents—why would I tell you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But she turned on the tears all the seven days of the feast. On the seventh day, worn out by her nagging, he told her. Then she went and told it to her people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The men of the town came to him on the seventh day, just before sunset and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is sweeter than honey?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is stronger than a lion?
- type: usfm
  marker: m
  children:
  - type: text
    text: And Samson said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you hadn’t plowed with my heifer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You wouldn’t have found out my riddle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: 'Then the Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came powerfully on him. He went down to Ashkelon and killed thirty of their men, stripped them, and gave their clothing to those who had solved the riddle. Stalking out, smoking with anger, he went home to his father’s house. Samson’s bride became the wife of the best man at his wedding.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
