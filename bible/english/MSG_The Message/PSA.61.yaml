document_id: PSA.61
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: God, listen to me shout,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bend an ear to my prayer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I’m far from anywhere,
- type: usfm
  marker: q2
  children:
  - type: text
    text: down to my last gasp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I call out, “Guide me
- type: usfm
  marker: q2
  children:
  - type: text
    text: up High Rock Mountain!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: You’ve always given me breathing room,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place to get away from it all,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A lifetime pass to your safe-house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an open invitation as your guest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve always taken me seriously, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made me welcome among those who know and love you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: Let the days of the king add up
- type: usfm
  marker: q2
  children:
  - type: text
    text: to years and years of good rule.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Set his throne in the full light of God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: post Steady Love and Good Faith as lookouts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’ll be the poet who sings your glory—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and live what I sing every day.
