document_id: PSA.61,97
type_code: eng
verses:
  '1':
  - type: text
    content: God, listen to me shout,
  - type: text
    content: bend an ear to my prayer.
  - type: text
    content: When I’m far from anywhere,
  - type: text
    content: down to my last gasp,
  - type: text
    content: I call out, “Guide me
  - type: text
    content: up High Rock Mountain!”
  '3':
  - type: text
    content: You’ve always given me breathing room,
  - type: text
    content: a place to get away from it all,
  - type: text
    content: A lifetime pass to your safe-house,
  - type: text
    content: an open invitation as your guest.
  - type: text
    content: You’ve always taken me seriously, God,
  - type: text
    content: made me welcome among those who know and love you.
  '6':
  - type: text
    content: Let the days of the king add up
  - type: text
    content: to years and years of good rule.
  - type: text
    content: Set his throne in the full light of God;
  - type: text
    content: post Steady Love and Good Faith as lookouts,
  - type: text
    content: And I’ll be the poet who sings your glory—
  - type: text
    content: and live what I sing every day.
