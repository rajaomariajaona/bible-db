document_id: AMO.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: All Show, No Substance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen to this, family of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'this Message I’m sending in bold print, this tragic warning:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Virgin Israel has fallen flat on her face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: She’ll never stand up again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s been left where she’s fallen.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one offers to help her up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is the Message, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Word:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The city that marches out with a thousand
- type: usfm
  marker: q2
  children:
  - type: text
    text: will end up with a hundred.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city that marches out with a hundred
- type: usfm
  marker: q2
  children:
  - type: text
    text: will end up with ten. Oh, family of Israel!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to the family of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Seek me and live.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t fool around at those shrines of Bethel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t waste time taking trips to Gilgal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and don’t bother going down to Beer-sheba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gilgal is here today and gone tomorrow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Bethel is all show, no substance.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So seek '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and live! You don’t want to end up'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with nothing to show for your life
- type: usfm
  marker: q1
  children:
  - type: text
    text: But a pile of ashes, a house burned to the ground.
- type: usfm
  marker: q2
  children:
  - type: text
    text: For God will send just such a fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the firefighters will show up too late.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Raw Truth Is Never Popular
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: Woe to you who turn justice to vinegar
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stomp righteousness into the mud.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you realize where you are? You’re in a cosmos
- type: usfm
  marker: q2
  children:
  - type: text
    text: star-flung with constellations by God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A world God wakes up each morning
- type: usfm
  marker: q2
  children:
  - type: text
    text: and puts to bed each night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God dips water from the ocean
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gives the land a drink.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God-revealed, does all this.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he can destroy it as easily as make it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He can turn this vast wonder into total waste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: People hate this kind of talk.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Raw truth is never popular.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But here it is, bluntly spoken:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because you run roughshod over the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take the bread right out of their mouths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re never going to move into
- type: usfm
  marker: q2
  children:
  - type: text
    text: the luxury homes you have built.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re never going to drink wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the expensive vineyards you’ve planted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know precisely the extent of your violations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the enormity of your sins. Appalling!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You bully right-living people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking bribes right and left and kicking the poor when they’re down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Justice is a lost cause. Evil is epidemic.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Decent people throw up their hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protest and rebuke are useless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a waste of breath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Seek good and not evil—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and live!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You talk about '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God-of-the-Angel-Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: being your best friend.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Well, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: live
  - type: text
    text: ' like it,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and maybe it will happen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hate evil and love good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then work it out in the public square.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Maybe '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God-of-the-Angel-Armies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will notice your remnant and be gracious.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'Now again, my Master’s Message, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God-of-the-Angel-Armies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Go out into the streets and lament loudly!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fill the malls and shops with cries of doom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep loudly, ‘Not me! Not us, Not now!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: Empty offices, stores, factories, workplaces.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enlist everyone in the general lament.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I want to hear it loud and clear when I make my visit.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Time to Face Hard Reality, Not Fantasy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: 'Woe to all of you who want '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Judgment Day!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Why would you want to see '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', want him to come?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' comes, it will be bad news before it’s good news,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the worst of times, not the best of times.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Here’s what it’s like: A man runs from a lion'
- type: usfm
  marker: q2
  children:
  - type: text
    text: right into the jaws of a bear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A woman goes home after a hard day’s work
- type: usfm
  marker: q2
  children:
  - type: text
    text: and is raped by a neighbor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'At '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s coming we face hard reality, not fantasy—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a black cloud with no silver lining.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: “I can’t stand your religious meetings.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m fed up with your conferences and conventions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I want nothing to do with your religion projects,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your pretentious slogans and goals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m sick of your fund-raising schemes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your public relations and image making.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve had all I can take of your noisy ego-music.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'When was the last time you sang to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you know what I want?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I want justice—oceans of it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I want fairness—rivers of it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'That’s what I want. That’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all
  - type: text
    text: ' I want.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: '“Didn’t you, dear family of Israel, worship me faithfully for forty years in the wilderness, bringing the sacrifices and offerings I commanded? How is it you’ve stooped to dragging gimcrack statues of your so-called rulers around, hauling the cheap images of all your star-gods here and there? Since you like them so much, you can take them with you when I drive you into exile beyond Damascus.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message, God-of-the-Angel-Armies.
