document_id: AMO.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: All Show, No Substance
  - type: text
    content: Listen to this, family of Israel,
  - type: text
    content: 'this Message I’m sending in bold print, this tragic warning:'
  '10':
  - type: text
    content: People hate this kind of talk.
  - type: text
    content: Raw truth is never popular.
  - type: text
    content: 'But here it is, bluntly spoken:'
  - type: text
    content: Because you run roughshod over the poor
  - type: text
    content: and take the bread right out of their mouths,
  - type: text
    content: You’re never going to move into
  - type: text
    content: the luxury homes you have built.
  - type: text
    content: You’re never going to drink wine
  - type: text
    content: from the expensive vineyards you’ve planted.
  - type: text
    content: I know precisely the extent of your violations,
  - type: text
    content: the enormity of your sins. Appalling!
  - type: text
    content: You bully right-living people,
  - type: text
    content: taking bribes right and left and kicking the poor when they’re down.
  '13':
  - type: text
    content: Justice is a lost cause. Evil is epidemic.
  - type: text
    content: Decent people throw up their hands.
  - type: text
    content: Protest and rebuke are useless,
  - type: text
    content: a waste of breath.
  '14':
  - type: text
    content: Seek good and not evil—
  - type: text
    content: and live!
  - type: text
    content: 'You talk about '
  - type: text
    content: God
  - type: text
    content: ', the God-of-the-Angel-Armies,'
  - type: text
    content: being your best friend.
  - type: text
    content: 'Well, '
  - type: text
    content: live
  - type: text
    content: ' like it,'
  - type: text
    content: and maybe it will happen.
  '15':
  - type: text
    content: Hate evil and love good,
  - type: text
    content: then work it out in the public square.
  - type: text
    content: 'Maybe '
  - type: text
    content: God
  - type: text
    content: ', the God-of-the-Angel-Armies,'
  - type: text
    content: will notice your remnant and be gracious.
  '16':
  - type: text
    content: 'Now again, my Master’s Message, '
  - type: text
    content: God
  - type: text
    content: ', God-of-the-Angel-Armies:'
  - type: text
    content: “Go out into the streets and lament loudly!
  - type: text
    content: Fill the malls and shops with cries of doom!
  - type: text
    content: Weep loudly, ‘Not me! Not us, Not now!’
  - type: text
    content: Empty offices, stores, factories, workplaces.
  - type: text
    content: Enlist everyone in the general lament.
  - type: text
    content: I want to hear it loud and clear when I make my visit.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: heading
    content: Time to Face Hard Reality, Not Fantasy
  '18':
  - type: text
    content: 'Woe to all of you who want '
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day!
  - type: text
    content: 'Why would you want to see '
  - type: text
    content: God
  - type: text
    content: ', want him to come?'
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' comes, it will be bad news before it’s good news,'
  - type: text
    content: the worst of times, not the best of times.
  - type: text
    content: 'Here’s what it’s like: A man runs from a lion'
  - type: text
    content: right into the jaws of a bear.
  - type: text
    content: A woman goes home after a hard day’s work
  - type: text
    content: and is raped by a neighbor.
  - type: text
    content: 'At '
  - type: text
    content: God
  - type: text
    content: ’s coming we face hard reality, not fantasy—
  - type: text
    content: a black cloud with no silver lining.
  '2':
  - type: text
    content: “Virgin Israel has fallen flat on her face.
  - type: text
    content: She’ll never stand up again.
  - type: text
    content: She’s been left where she’s fallen.
  - type: text
    content: No one offers to help her up.”
  '21':
  - type: text
    content: “I can’t stand your religious meetings.
  - type: text
    content: I’m fed up with your conferences and conventions.
  - type: text
    content: I want nothing to do with your religion projects,
  - type: text
    content: your pretentious slogans and goals.
  - type: text
    content: I’m sick of your fund-raising schemes,
  - type: text
    content: your public relations and image making.
  - type: text
    content: I’ve had all I can take of your noisy ego-music.
  - type: text
    content: 'When was the last time you sang to '
  - type: text
    content: me
  - type: text
    content: '?'
  - type: text
    content: Do you know what I want?
  - type: text
    content: I want justice—oceans of it.
  - type: text
    content: I want fairness—rivers of it.
  - type: text
    content: 'That’s what I want. That’s '
  - type: text
    content: all
  - type: text
    content: ' I want.'
  '25':
  - type: text
    content: '“Didn’t you, dear family of Israel, worship me faithfully for forty years in the wilderness, bringing the sacrifices and offerings I commanded? How is it you’ve stooped to dragging gimcrack statues of your so-called rulers around, hauling the cheap images of all your star-gods here and there? Since you like them so much, you can take them with you when I drive you into exile beyond Damascus.” '
  - type: text
    content: God
  - type: text
    content: ’s Message, God-of-the-Angel-Armies.
  '3':
  - type: text
    content: 'This is the Message, '
  - type: text
    content: God
  - type: text
    content: '’s Word:'
  - type: text
    content: “The city that marches out with a thousand
  - type: text
    content: will end up with a hundred.
  - type: text
    content: The city that marches out with a hundred
  - type: text
    content: will end up with ten. Oh, family of Israel!”
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to the family of Israel:'
  - type: text
    content: “Seek me and live.
  - type: text
    content: Don’t fool around at those shrines of Bethel,
  - type: text
    content: Don’t waste time taking trips to Gilgal,
  - type: text
    content: and don’t bother going down to Beer-sheba.
  - type: text
    content: Gilgal is here today and gone tomorrow
  - type: text
    content: and Bethel is all show, no substance.”
  '6':
  - type: text
    content: 'So seek '
  - type: text
    content: God
  - type: text
    content: ' and live! You don’t want to end up'
  - type: text
    content: with nothing to show for your life
  - type: text
    content: But a pile of ashes, a house burned to the ground.
  - type: text
    content: For God will send just such a fire,
  - type: text
    content: and the firefighters will show up too late.
  - type: heading
    content: Raw Truth Is Never Popular
  '7':
  - type: text
    content: Woe to you who turn justice to vinegar
  - type: text
    content: and stomp righteousness into the mud.
  - type: text
    content: Do you realize where you are? You’re in a cosmos
  - type: text
    content: star-flung with constellations by God,
  - type: text
    content: A world God wakes up each morning
  - type: text
    content: and puts to bed each night.
  - type: text
    content: God dips water from the ocean
  - type: text
    content: and gives the land a drink.
  - type: text
    content: God
  - type: text
    content: ', God-revealed, does all this.'
  - type: text
    content: And he can destroy it as easily as make it.
  - type: text
    content: He can turn this vast wonder into total waste.
