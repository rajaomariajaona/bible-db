document_id: PSA.132,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'O '
  - type: text
    content: God
  - type: text
    content: ', remember David,'
  - type: text
    content: remember all his troubles!
  - type: text
    content: 'And remember how he promised '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: made a vow to the Strong God of Jacob,
  - type: text
    content: “I’m not going home,
  - type: text
    content: and I’m not going to bed,
  - type: text
    content: I’m not going to sleep,
  - type: text
    content: not even take time to rest,
  - type: text
    content: 'Until I find a home for '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: a house for the Strong God of Jacob.”
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' gave David his word,'
  - type: text
    content: 'he won’t back out on this promise:'
  - type: text
    content: “One of your sons
  - type: text
    content: I will set on your throne;
  - type: text
    content: If your sons stay true to my Covenant
  - type: text
    content: and learn to live the way I teach them,
  - type: text
    content: Their sons will continue the line—
  - type: text
    content: always a son to sit on your throne.
  - type: text
    content: 'Yes—I, '
  - type: text
    content: God
  - type: text
    content: ', chose Zion,'
  - type: text
    content: the place I wanted for my shrine;
  - type: text
    content: This will always be my home;
  - type: text
    content: this is what I want, and I’m here for good.
  - type: text
    content: I’ll shower blessings on the pilgrims who come here,
  - type: text
    content: and give supper to those who arrive hungry;
  - type: text
    content: I’ll dress my priests in salvation clothes;
  - type: text
    content: the holy people will sing their hearts out!
  - type: text
    content: Oh, I’ll make the place radiant for David!
  - type: text
    content: I’ll fill it with light for my anointed!
  - type: text
    content: I’ll dress his enemies in dirty rags,
  - type: text
    content: but I’ll make his crown sparkle with splendor.”
  '6':
  - type: text
    content: Remember how we got the news in Ephrathah,
  - type: text
    content: learned all about it at Jaar Meadows?
  - type: text
    content: We shouted, “Let’s go to the shrine dedication!
  - type: text
    content: Let’s worship at God’s own footstool!”
  '8':
  - type: text
    content: 'Up, '
  - type: text
    content: God
  - type: text
    content: ', enjoy your new place of quiet repose,'
  - type: text
    content: you and your mighty covenant ark;
  - type: text
    content: Get your priests all dressed up in justice;
  - type: text
    content: 'prompt your worshipers to sing this prayer:'
  - type: text
    content: “Honor your servant David;
  - type: text
    content: don’t disdain your anointed one.”
