  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', remember David,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: remember all his troubles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And remember how he promised '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: made a vow to the Strong God of Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’m not going home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’m not going to bed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m not going to sleep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even take time to rest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Until I find a home for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: a house for the Strong God of Jacob.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: Remember how we got the news in Ephrathah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: learned all about it at Jaar Meadows?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We shouted, “Let’s go to the shrine dedication!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let’s worship at God’s own footstool!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'Up, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', enjoy your new place of quiet repose,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you and your mighty covenant ark;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get your priests all dressed up in justice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'prompt your worshipers to sing this prayer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Honor your servant David;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t disdain your anointed one.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-18
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gave David his word,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'he won’t back out on this promise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “One of your sons
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will set on your throne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: If your sons stay true to my Covenant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and learn to live the way I teach them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their sons will continue the line—
- type: usfm
  marker: q2
  children:
  - type: text
    text: always a son to sit on your throne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes—I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', chose Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the place I wanted for my shrine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: This will always be my home;
- type: usfm
  marker: q2
  children:
  - type: text
    text: this is what I want, and I’m here for good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll shower blessings on the pilgrims who come here,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give supper to those who arrive hungry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll dress my priests in salvation clothes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the holy people will sing their hearts out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, I’ll make the place radiant for David!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll fill it with light for my anointed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll dress his enemies in dirty rags,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I’ll make his crown sparkle with splendor.”
