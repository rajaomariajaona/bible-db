document_id: OBA.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Your World Will Collapse
  - type: text
    content: Obadiah’s Message to Edom
  - type: text
    content: 'from '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  - type: text
    content: 'We got the news straight from '
  - type: text
    content: God
  - type: text
    content: 'by a special messenger sent out to the godless nations:'
  - type: text
    content: “On your feet, prepare for battle;
  - type: text
    content: get ready to make war on Edom!
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day is near
  - type: text
    content: for all the godless nations.
  - type: text
    content: As you have done, it will be done to you.
  - type: text
    content: What you did will boomerang back
  - type: text
    content: and hit your own head.
  - type: text
    content: Just as you partied on my holy mountain,
  - type: text
    content: all the godless nations will drink God’s wrath.
  - type: text
    content: They’ll drink and drink and drink—
  - type: text
    content: they’ll drink themselves to death.
  - type: text
    content: But not so on Mount Zion—there’s respite there!
  - type: text
    content: a safe and holy place!
  - type: text
    content: The family of Jacob will take back their possessions
  - type: text
    content: from those who took them from them.
  - type: text
    content: That’s when the family of Jacob will catch fire,
  - type: text
    content: the family of Joseph become fierce flame,
  - type: text
    content: while the family of Esau will be straw.
  - type: text
    content: Esau will go up in flames,
  - type: text
    content: nothing left of Esau but a pile of ashes.”
  - type: text
    content: God
  - type: text
    content: ' said it, and it is so.'
  - type: text
    content: '* * *'
  '19':
  - type: text
    content: People from the south will take over the Esau mountains;
  - type: text
    content: people from the foothills will overrun the Philistines.
  - type: text
    content: They’ll take the farms of Ephraim and Samaria,
  - type: text
    content: and Benjamin will take Gilead.
  - type: text
    content: Earlier, Israelite exiles will come back
  - type: text
    content: and take Canaanite land to the north at Zarephath.
  - type: text
    content: Jerusalem exiles from the far northwest in Sepharad
  - type: text
    content: will come back and take the cities in the south.
  - type: text
    content: The remnant of the saved in Mount Zion
  - type: text
    content: will go into the mountains of Esau
  - type: text
    content: And rule justly and fairly,
  - type: text
    content: 'a rule that honors '
  - type: text
    content: God
  - type: text
    content: ’s kingdom.
  '2':
  - type: text
    content: '“Listen to this, Edom:'
  - type: text
    content: I’m turning you to a no-account,
  - type: text
    content: the runt of the godless nations, despised.
  - type: text
    content: You thought you were so great,
  - type: text
    content: perched high among the rocks, king of the mountain,
  - type: text
    content: Thinking to yourself,
  - type: text
    content: ‘Nobody can get to me! Nobody can touch me!’
  - type: text
    content: Think again. Even if, like an eagle,
  - type: text
    content: you hang out on a high cliff-face,
  - type: text
    content: Even if you build your nest in the stars,
  - type: text
    content: I’ll bring you down to earth.”
  - type: text
    content: God
  - type: text
    content: ’s sure Word.
  '5':
  - type: text
    content: “If thieves crept up on you,
  - type: text
    content: they’d rob you blind—isn’t that so?
  - type: text
    content: If they mugged you on the streets at night,
  - type: text
    content: they’d pick you clean—isn’t that so?
  - type: text
    content: Oh, they’ll take Esau apart, piece by piece,
  - type: text
    content: empty his purse and pockets.
  - type: text
    content: All your old partners will drive you to the edge.
  - type: text
    content: Your old friends will lie to your face.
  - type: text
    content: Your old drinking buddies will stab you in the back.
  - type: text
    content: Your world will collapse. You won’t know what hit you.
  - type: text
    content: 'So don’t be surprised”—it’s '
  - type: text
    content: God
  - type: text
    content: ’s sure Word!—
  - type: text
    content: “when I wipe out all sages from Edom
  - type: text
    content: and rid the Esau mountains of its famous wise men.
  - type: text
    content: Your great heroes will desert you, Teman.
  - type: text
    content: There’ll be nobody left in Esau’s mountains.
  - type: text
    content: Because of the murderous history compiled
  - type: text
    content: against your brother Jacob,
  - type: text
    content: You will be looked down on by everyone.
  - type: text
    content: You’ll lose your place in history.
  - type: text
    content: On that day you stood there and didn’t do anything.
  - type: text
    content: Strangers took your brother’s army into exile.
  - type: text
    content: Godless foreigners invaded and pillaged Jerusalem.
  - type: text
    content: You stood there and watched.
  - type: text
    content: You were as bad as they were.
  - type: text
    content: You shouldn’t have gloated over your brother
  - type: text
    content: when he was down-and-out.
  - type: text
    content: You shouldn’t have laughed and joked at Judah’s sons
  - type: text
    content: when they were facedown in the mud.
  - type: text
    content: You shouldn’t have talked so big
  - type: text
    content: when everything was so bad.
  - type: text
    content: You shouldn’t have taken advantage of my people
  - type: text
    content: when their lives had fallen apart.
  - type: text
    content: You of all people should not have been amused
  - type: text
    content: by their troubles, their wrecked nation.
  - type: text
    content: You shouldn’t have taken the shirt off their back
  - type: text
    content: when they were knocked flat, defenseless.
  - type: text
    content: And you shouldn’t have stood waiting at the outskirts
  - type: text
    content: and cut off refugees,
  - type: text
    content: And traitorously turned in helpless survivors
  - type: text
    content: who had lost everything.
  - type: text
    content: '* * *'
