document_id: OBA.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Your World Will Collapse
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Obadiah’s Message to Edom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We got the news straight from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by a special messenger sent out to the godless nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “On your feet, prepare for battle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get ready to make war on Edom!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Judgment Day is near
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all the godless nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As you have done, it will be done to you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What you did will boomerang back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hit your own head.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as you partied on my holy mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the godless nations will drink God’s wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll drink and drink and drink—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll drink themselves to death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But not so on Mount Zion—there’s respite there!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a safe and holy place!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The family of Jacob will take back their possessions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from those who took them from them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s when the family of Jacob will catch fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the family of Joseph become fierce flame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the family of Esau will be straw.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esau will go up in flames,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing left of Esau but a pile of ashes.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said it, and it is so.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People from the south will take over the Esau mountains;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people from the foothills will overrun the Philistines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll take the farms of Ephraim and Samaria,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Benjamin will take Gilead.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earlier, Israelite exiles will come back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take Canaanite land to the north at Zarephath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem exiles from the far northwest in Sepharad
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come back and take the cities in the south.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The remnant of the saved in Mount Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will go into the mountains of Esau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And rule justly and fairly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a rule that honors '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s kingdom.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Listen to this, Edom:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m turning you to a no-account,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the runt of the godless nations, despised.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You thought you were so great,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: perched high among the rocks, king of the mountain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thinking to yourself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Nobody can get to me! Nobody can touch me!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Think again. Even if, like an eagle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you hang out on a high cliff-face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if you build your nest in the stars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll bring you down to earth.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s sure Word.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If thieves crept up on you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’d rob you blind—isn’t that so?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they mugged you on the streets at night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’d pick you clean—isn’t that so?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, they’ll take Esau apart, piece by piece,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: empty his purse and pockets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your old partners will drive you to the edge.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your old friends will lie to your face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your old drinking buddies will stab you in the back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your world will collapse. You won’t know what hit you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So don’t be surprised”—it’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s sure Word!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “when I wipe out all sages from Edom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rid the Esau mountains of its famous wise men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your great heroes will desert you, Teman.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’ll be nobody left in Esau’s mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the murderous history compiled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against your brother Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be looked down on by everyone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll lose your place in history.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On that day you stood there and didn’t do anything.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Strangers took your brother’s army into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Godless foreigners invaded and pillaged Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You stood there and watched.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You were as bad as they were.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shouldn’t have gloated over your brother
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he was down-and-out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shouldn’t have laughed and joked at Judah’s sons
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they were facedown in the mud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shouldn’t have talked so big
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when everything was so bad.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shouldn’t have taken advantage of my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when their lives had fallen apart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You of all people should not have been amused
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by their troubles, their wrecked nation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shouldn’t have taken the shirt off their back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they were knocked flat, defenseless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you shouldn’t have stood waiting at the outskirts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cut off refugees,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And traitorously turned in helpless survivors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who had lost everything.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
