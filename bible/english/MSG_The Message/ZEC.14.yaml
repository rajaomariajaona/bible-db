document_id: ZEC.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Day Is Coming
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Note well: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Judgment Day is on the way:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Plunder will be piled high and handed out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m bringing all the godless nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to war against Jerusalem—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Houses plundered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: women raped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Half the city taken into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the other half left behind.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The land will stretch out spaciously around Jerusalem—to Geba in the north and Rimmon in the south, with Jerusalem towering at the center, and the commanding city gates—Gate of Benjamin to First Gate to Corner Gate to Hananel Tower to the Royal Winery—ringing the city full of people. Never again will Jerusalem be totally destroyed. From now on it will be a safe city.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' But this is what will happen to all who fought against Jerusalem: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will visit them with a terrible plague. People’s flesh will rot off their bones while they are walking around; their eyes will rot in their sockets and their tongues in their mouths; people will be dying on their feet! Mass hysteria when that happens—total panic! Fellow soldiers fighting and killing each other—holy terror! And then Judah will jump into the fray!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Treasures from all the nations will be piled high—gold, silver, the latest fashions. The plague will also hit the animals—horses, mules, camels, donkeys. Everything alive in the military camps will be hit by the plague.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the survivors from the godless nations that fought against Jerusalem will travel to Jerusalem every year to worship the King, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, and celebrate the Feast of Booths. If any of these survivors fail to make the annual pilgrimage to Jerusalem to worship the King, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies, there will be no rain. If the Egyptians don’t make the pilgrimage and worship, there will be no rain for them. Every nation that does not go up to celebrate the Feast of Booths will be hit with the plague. Egypt and any other nation that does not make pilgrimage to celebrate the Feast of Booths gets punished.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that Day, the Big Day, all the horses’ harness bells will be inscribed “Holy to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '.” The cooking pots in the Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will be as sacred as chalices and plates on the altar. In fact, all the pots and pans in all the kitchens of Jerusalem and Judah will be holy to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies. People who come to worship, preparing meals and sacrifices, will use them. On that Big Day there will be no buying or selling in the Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will march out against the godless nations and fight—a great war! That’s the Day he’ll take his stand on the Mount of Olives, facing Jerusalem from the east. The Mount of Olives will be split right down the middle, from east to west, leaving a wide valley. Half the mountain will shift north, the other half south. Then you will run for your lives down the valley, your escape route that will take you all the way to Azal. You’ll run for your lives, just as you ran on the day of the great earthquake in the days of Uzziah, king of Judah. Then my '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: will arrive and all the holy angels with him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What a Day that will be! No more cold nights—in fact, no more nights! The Day is coming—the timing is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s—when it will be continuous day. Every evening will be a fresh morning.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What a Day that will be! Fresh flowing rivers out of Jerusalem, half to the eastern sea, half to the western sea, flowing year-round, summer and winter!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will be king over all the earth, one '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and only one. What a Day that will be!'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
