document_id: EZK.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: This Is What Sin Does
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: '“Now, son of man, take a brick and place it before you. Draw a picture of the city Jerusalem on it. Then make a model of a military siege against the brick: Build siege walls, construct a ramp, set up army camps, lay in battering rams around it. Then get an iron skillet and place it upright between you and the city—an iron wall. Face the model: The city shall be under siege and you shall be the besieger. This is a sign to the family of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: “Next lie on your left side and place the sin of the family of Israel on yourself. You will bear their sin for as many days as you lie on your side. The number of days you bear their sin will match the number of years of their sin, namely, 390. For 390 days you will bear the sin of the family of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: “Then, after you have done this, turn over and lie down on your right side and bear the sin of the family of Judah. Your assignment this time is to lie there for forty days, a day for each year of their sin. Look straight at the siege of Jerusalem. Roll up your sleeve, shake your bare arm, and preach against her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I will tie you up with ropes, tie you so you can’t move or turn over until you have finished the days of the siege.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-12
  - type: text
    text: “Next I want you to take wheat and barley, beans and lentils, dried millet and spelt, and mix them in a bowl to make a flat bread. This is your food ration for the 390 days you lie on your side. Measure out about half a pound for each day and eat it on schedule. Also measure out your daily ration of about a pint of water and drink it on schedule. Eat the bread as you would a muffin. Bake the muffins out in the open where everyone can see you, using dried human dung for fuel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “This is what the people of Israel are going to do: Among the pagan nations where I will drive them, they will eat foods that are strictly taboo to a holy people.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my Master! Never! I’ve never contaminated myself with food like that. Since my youth I’ve never eaten anything forbidden by law, nothing found dead or violated by wild animals. I’ve never taken a single bite of forbidden food.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “All right,” he said. “I’ll let you bake your bread over cow dung instead of human dung.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: Then he said to me, “Son of man, I’m going to cut off all food from Jerusalem. The people will live on starvation rations, worrying where the next meal’s coming from, scrounging for the next drink of water. Famine conditions. People will look at one another, see nothing but skin and bones, and shake their heads. This is what sin does.”
