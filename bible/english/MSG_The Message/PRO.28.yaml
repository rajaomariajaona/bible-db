document_id: PRO.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: If You Desert God’s Law
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The wicked are edgy with guilt, ready to run off
- type: usfm
  marker: q2
  children:
  - type: text
    text: even when no one’s after them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Honest people are relaxed and confident,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bold as lions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When the country is in chaos,
- type: usfm
  marker: q2
  children:
  - type: text
    text: everybody has a plan to fix it—
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it takes a leader of real understanding
- type: usfm
  marker: q2
  children:
  - type: text
    text: to straighten things out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The wicked who oppress the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: are like a hailstorm that beats down the harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: If you desert God’s law, you’re free to embrace depravity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you love God’s law, you fight for it tooth and nail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Justice makes no sense to the evilminded;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'those who seek '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' know it inside and out.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: It’s better to be poor and direct
- type: usfm
  marker: q2
  children:
  - type: text
    text: than rich and crooked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Practice God’s law—get a reputation for wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hang out with a loose crowd—embarrass your family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Get as rich as you want
- type: usfm
  marker: q2
  children:
  - type: text
    text: through cheating and extortion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But eventually some friend of the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: is going to give it all back to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: God has no use for the prayers
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the people who won’t listen to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lead good people down a wrong path
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you’ll come to a bad end;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do good and you’ll be rewarded for it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The rich think they know it all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the poor can see right through them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When good people are promoted, everything is great,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when the bad are in charge, watch out!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You can’t whitewash your sins and get by with it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you find mercy by admitting and leaving them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A tenderhearted person lives a blessed life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a hardhearted person lives a hard life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lions roar and bears charge—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wicked lord it over the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Among leaders who lack insight, abuse abounds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but for one who hates corruption, the future is bright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A murderer haunted by guilt
- type: usfm
  marker: q2
  children:
  - type: text
    text: is doomed—there’s no helping him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Walk straight—live well and be saved;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a devious life is a doomed life.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Doing Great Harm in Seemingly Harmless Ways
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Work your garden—you’ll end up with plenty of food;
- type: usfm
  marker: q2
  children:
  - type: text
    text: play and party—you’ll end up with an empty plate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Committed and persistent work pays off;
- type: usfm
  marker: q2
  children:
  - type: text
    text: get-rich-quick schemes are ripoffs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Playing favorites is always a bad thing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you can do great harm in seemingly harmless ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A miser in a hurry to get rich
- type: usfm
  marker: q2
  children:
  - type: text
    text: doesn’t know that he’ll end up broke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: In the end, serious reprimand is appreciated
- type: usfm
  marker: q2
  children:
  - type: text
    text: far more than bootlicking flattery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Anyone who robs father and mother
- type: usfm
  marker: q2
  children:
  - type: text
    text: and says, “So, what’s wrong with that?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: is worse than a pirate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A grasping person stirs up trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but trust in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brings a sense of well-being.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: If you think you know it all, you’re a fool for sure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: real survivors learn wisdom from others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Be generous to the poor—you’ll never go hungry;
- type: usfm
  marker: q2
  children:
  - type: text
    text: shut your eyes to their needs, and run a gauntlet of curses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When corruption takes over, good people go underground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when the crooks are thrown out, it’s safe to come out.
