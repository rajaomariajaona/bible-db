document_id: PRO.28,97
type_code: eng
verses:
  '1':
  - type: heading
    content: If You Desert God’s Law
  - type: text
    content: The wicked are edgy with guilt, ready to run off
  - type: text
    content: even when no one’s after them;
  - type: text
    content: Honest people are relaxed and confident,
  - type: text
    content: bold as lions.
  '10':
  - type: text
    content: Lead good people down a wrong path
  - type: text
    content: and you’ll come to a bad end;
  - type: text
    content: do good and you’ll be rewarded for it.
  '11':
  - type: text
    content: The rich think they know it all,
  - type: text
    content: but the poor can see right through them.
  '12':
  - type: text
    content: When good people are promoted, everything is great,
  - type: text
    content: but when the bad are in charge, watch out!
  '13':
  - type: text
    content: You can’t whitewash your sins and get by with it;
  - type: text
    content: you find mercy by admitting and leaving them.
  '14':
  - type: text
    content: A tenderhearted person lives a blessed life;
  - type: text
    content: a hardhearted person lives a hard life.
  '15':
  - type: text
    content: Lions roar and bears charge—
  - type: text
    content: and the wicked lord it over the poor.
  '16':
  - type: text
    content: Among leaders who lack insight, abuse abounds,
  - type: text
    content: but for one who hates corruption, the future is bright.
  '17':
  - type: text
    content: A murderer haunted by guilt
  - type: text
    content: is doomed—there’s no helping him.
  '18':
  - type: text
    content: Walk straight—live well and be saved;
  - type: text
    content: a devious life is a doomed life.
  - type: heading
    content: Doing Great Harm in Seemingly Harmless Ways
  '19':
  - type: text
    content: Work your garden—you’ll end up with plenty of food;
  - type: text
    content: play and party—you’ll end up with an empty plate.
  '2':
  - type: text
    content: When the country is in chaos,
  - type: text
    content: everybody has a plan to fix it—
  - type: text
    content: But it takes a leader of real understanding
  - type: text
    content: to straighten things out.
  '20':
  - type: text
    content: Committed and persistent work pays off;
  - type: text
    content: get-rich-quick schemes are ripoffs.
  '21':
  - type: text
    content: Playing favorites is always a bad thing;
  - type: text
    content: you can do great harm in seemingly harmless ways.
  '22':
  - type: text
    content: A miser in a hurry to get rich
  - type: text
    content: doesn’t know that he’ll end up broke.
  '23':
  - type: text
    content: In the end, serious reprimand is appreciated
  - type: text
    content: far more than bootlicking flattery.
  '24':
  - type: text
    content: Anyone who robs father and mother
  - type: text
    content: and says, “So, what’s wrong with that?”
  - type: text
    content: is worse than a pirate.
  '25':
  - type: text
    content: A grasping person stirs up trouble,
  - type: text
    content: 'but trust in '
  - type: text
    content: God
  - type: text
    content: ' brings a sense of well-being.'
  '26':
  - type: text
    content: If you think you know it all, you’re a fool for sure;
  - type: text
    content: real survivors learn wisdom from others.
  '27':
  - type: text
    content: Be generous to the poor—you’ll never go hungry;
  - type: text
    content: shut your eyes to their needs, and run a gauntlet of curses.
  '28':
  - type: text
    content: When corruption takes over, good people go underground,
  - type: text
    content: but when the crooks are thrown out, it’s safe to come out.
  '3':
  - type: text
    content: The wicked who oppress the poor
  - type: text
    content: are like a hailstorm that beats down the harvest.
  '4':
  - type: text
    content: If you desert God’s law, you’re free to embrace depravity;
  - type: text
    content: if you love God’s law, you fight for it tooth and nail.
  '5':
  - type: text
    content: Justice makes no sense to the evilminded;
  - type: text
    content: 'those who seek '
  - type: text
    content: God
  - type: text
    content: ' know it inside and out.'
  '6':
  - type: text
    content: It’s better to be poor and direct
  - type: text
    content: than rich and crooked.
  '7':
  - type: text
    content: Practice God’s law—get a reputation for wisdom;
  - type: text
    content: hang out with a loose crowd—embarrass your family.
  '8':
  - type: text
    content: Get as rich as you want
  - type: text
    content: through cheating and extortion,
  - type: text
    content: But eventually some friend of the poor
  - type: text
    content: is going to give it all back to them.
  '9':
  - type: text
    content: God has no use for the prayers
  - type: text
    content: of the people who won’t listen to him.
