document_id: PSA.51
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Generous in love—God, give grace!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Huge in mercy—wipe out my bad record.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Scrub away my guilt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: soak out my sins in your laundry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know how bad I’ve been;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my sins are staring me down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: You’re the One I’ve violated, and you’ve seen
- type: usfm
  marker: q2
  children:
  - type: text
    text: it all, seen the full extent of my evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have all the facts before you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whatever you decide about me is fair.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve been out of step with you for a long time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the wrong since before I was born.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What you’re after is truth from the inside out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Enter me, then; conceive a new, true life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-15
  - type: text
    text: Soak me in your laundry and I’ll come out clean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: scrub me and I’ll have a snow-white life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tune me in to foot-tapping songs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: set these once-broken bones to dancing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t look too close for blemishes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: give me a clean bill of health.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God, make a fresh start in me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shape a Genesis week from the chaos of my life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t throw me out with the trash,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or fail to breathe holiness in me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring me back from gray exile,
- type: usfm
  marker: q2
  children:
  - type: text
    text: put a fresh wind in my sails!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give me a job teaching rebels your ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the lost can find their way home.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Commute my death sentence, God, my salvation God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’ll sing anthems to your life-giving ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Unbutton my lips, dear God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll let loose with your praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: Going through the motions doesn’t please you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a flawless performance is nothing to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I learned God-worship
- type: usfm
  marker: q2
  children:
  - type: text
    text: when my pride was shattered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heart-shattered lives ready for love
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t for a moment escape God’s notice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: Make Zion the place you delight in,
- type: usfm
  marker: q2
  children:
  - type: text
    text: repair Jerusalem’s broken-down walls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you’ll get real worship from us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: acts of worship small and large,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Including all the bulls
- type: usfm
  marker: q2
  children:
  - type: text
    text: they can heave onto your altar!
