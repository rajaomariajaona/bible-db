document_id: PSA.51,97
type_code: eng
verses:
  '1':
  - type: text
    content: Generous in love—God, give grace!
  - type: text
    content: Huge in mercy—wipe out my bad record.
  - type: text
    content: Scrub away my guilt,
  - type: text
    content: soak out my sins in your laundry.
  - type: text
    content: I know how bad I’ve been;
  - type: text
    content: my sins are staring me down.
  '16':
  - type: text
    content: Going through the motions doesn’t please you,
  - type: text
    content: a flawless performance is nothing to you.
  - type: text
    content: I learned God-worship
  - type: text
    content: when my pride was shattered.
  - type: text
    content: Heart-shattered lives ready for love
  - type: text
    content: don’t for a moment escape God’s notice.
  '18':
  - type: text
    content: Make Zion the place you delight in,
  - type: text
    content: repair Jerusalem’s broken-down walls.
  - type: text
    content: Then you’ll get real worship from us,
  - type: text
    content: acts of worship small and large,
  - type: text
    content: Including all the bulls
  - type: text
    content: they can heave onto your altar!
  '4':
  - type: text
    content: You’re the One I’ve violated, and you’ve seen
  - type: text
    content: it all, seen the full extent of my evil.
  - type: text
    content: You have all the facts before you;
  - type: text
    content: whatever you decide about me is fair.
  - type: text
    content: I’ve been out of step with you for a long time,
  - type: text
    content: in the wrong since before I was born.
  - type: text
    content: What you’re after is truth from the inside out.
  - type: text
    content: Enter me, then; conceive a new, true life.
  '7':
  - type: text
    content: Soak me in your laundry and I’ll come out clean,
  - type: text
    content: scrub me and I’ll have a snow-white life.
  - type: text
    content: Tune me in to foot-tapping songs,
  - type: text
    content: set these once-broken bones to dancing.
  - type: text
    content: Don’t look too close for blemishes,
  - type: text
    content: give me a clean bill of health.
  - type: text
    content: God, make a fresh start in me,
  - type: text
    content: shape a Genesis week from the chaos of my life.
  - type: text
    content: Don’t throw me out with the trash,
  - type: text
    content: or fail to breathe holiness in me.
  - type: text
    content: Bring me back from gray exile,
  - type: text
    content: put a fresh wind in my sails!
  - type: text
    content: Give me a job teaching rebels your ways
  - type: text
    content: so the lost can find their way home.
  - type: text
    content: Commute my death sentence, God, my salvation God,
  - type: text
    content: and I’ll sing anthems to your life-giving ways.
  - type: text
    content: Unbutton my lips, dear God;
  - type: text
    content: I’ll let loose with your praise.
