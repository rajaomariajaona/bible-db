document_id: PSA.148,97
type_code: eng
verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'Praise '
  - type: text
    content: God
  - type: text
    content: ' from heaven,'
  - type: text
    content: praise him from the mountaintops;
  - type: text
    content: Praise him, all you his angels,
  - type: text
    content: praise him, all you his warriors,
  - type: text
    content: Praise him, sun and moon,
  - type: text
    content: praise him, you morning stars;
  - type: text
    content: Praise him, high heaven,
  - type: text
    content: praise him, heavenly rain clouds;
  - type: text
    content: 'Praise, oh let them praise the name of '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: he spoke the word, and there they were!
  '13':
  - type: text
    content: 'Let them praise the name of '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: it’s the only Name worth praising.
  - type: text
    content: His radiance exceeds anything in earth and sky;
  - type: text
    content: he’s built a monument—his very own people!
  - type: text
    content: 'Praise from all who love '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: 'Israel’s children, intimate friends of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Hallelujah!
  '6':
  - type: text
    content: He set them in place
  - type: text
    content: from all time to eternity;
  - type: text
    content: He gave his orders,
  - type: text
    content: and that’s it!
  '7':
  - type: text
    content: 'Praise '
  - type: text
    content: God
  - type: text
    content: ' from earth,'
  - type: text
    content: you sea dragons, you fathomless ocean deeps;
  - type: text
    content: Fire and hail, snow and ice,
  - type: text
    content: hurricanes obeying his orders;
  - type: text
    content: Mountains and all hills,
  - type: text
    content: apple orchards and cedar forests;
  - type: text
    content: Wild beasts and herds of cattle,
  - type: text
    content: snakes, and birds in flight;
  - type: text
    content: Earth’s kings and all races,
  - type: text
    content: leaders and important people,
  - type: text
    content: Robust men and women in their prime,
  - type: text
    content: and yes, graybeards and little children.
