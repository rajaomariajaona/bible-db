  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-9
    - type: text
      text: Moses took the wagons and oxen and gave them to the Levites. He gave two wagons and four oxen to the Gershonites for their work and four wagons and eight oxen to the Merarites for their work. They were all under the direction of Ithamar son of Aaron the priest. Moses didn’t give any to the Kohathites because they had to carry the holy things for which they were responsible on their shoulders.
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 60-65
    - type: text
      text: 'On the ninth day, Abidan son of Gideoni, the leader of the people of Benjamin, brought his offering. His offering was:'
  - type: usfm
    marker: p
    children:
    - type: text
