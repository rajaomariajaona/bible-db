document_id: NUM.7,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Offerings for the Dedication
  - type: text
    content: When Moses finished setting up The Dwelling, he anointed it and consecrated it along with all that went with it. At the same time he anointed and consecrated the Altar and its accessories.
  '10':
  - type: text
    content: 'When the Altar was anointed, the leaders brought their offerings for its dedication and presented them before the Altar because '
  - type: text
    content: God
  - type: text
    content: ' had instructed Moses, “Each day one leader is to present his offering for the dedication of the Altar.”'
  '12':
  - type: text
    content: 'On the first day, Nahshon son of Amminadab, of the tribe of Judah, brought his offering. His offering was:'
  - type: text
    content: a silver plate weighing three and a quarter pounds and a silver bowl weighing one and three-quarter pounds (according to the standard Sanctuary weights), each filled with fine flour mixed with oil as a Grain-Offering;
  '14':
  - type: text
    content: a gold vessel weighing four ounces, filled with incense;
  '15':
  - type: text
    content: a young bull, a ram, and a yearling lamb for a Whole-Burnt-Offering;
  '16':
  - type: text
    content: a he-goat for an Absolution-Offering;
  - type: text
    content: two oxen, five rams, five he-goats, and five yearling lambs to be sacrificed as a Peace-Offering.
  '17':
  - type: text
    content: This was the offering of Nahshon son of Amminadab.
  '18':
  - type: text
    content: 'On the second day, Nethanel son of Zuar, the leader of Issachar, brought his offering. His offering was:'
  - type: text
    content: a silver plate weighing three and a quarter pounds and a silver bowl weighing one and three-quarter pounds (according to the standard Sanctuary weights), each filled with fine flour mixed with oil as a Grain-Offering;
  - type: text
    content: a gold vessel weighing four ounces, filled with incense;
  - type: text
    content: a young bull, a ram, and a yearling lamb for a Whole-Burnt-Offering;
  - type: text
    content: a he-goat for an Absolution-Offering;
  - type: text
    content: two oxen, five rams, five he-goats, and five yearling lambs to be sacrificed as a Peace-Offering.
  - type: text
    content: This was the offering of Nethanel son of Zuar.
  '2':
  - type: text
    content: 'The leaders of Israel, the heads of the ancestral tribes who had carried out the census, brought offerings. They presented before '
  - type: text
    content: God
  - type: text
    content: ' six covered wagons and twelve oxen, a wagon from each pair of leaders and an ox from each leader.'
  '24':
