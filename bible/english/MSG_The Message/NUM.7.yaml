  '84':
  - type: text
    content: 'These were the dedication offerings of the leaders of Israel for the anointing of the Altar:'
  - type: text
    content: twelve silver plates,
  - type: text
    content: twelve silver bowls,
  - type: text
    content: twelve gold vessels.
  '85':
  - type: text
    content: Each plate weighed three and a quarter pounds and each bowl one and three-quarter pounds. All the plates and bowls together weighed about sixty pounds (using the official Sanctuary weight). The twelve gold vessels filled with incense weighed four ounces each (using the official Sanctuary weight). Altogether the gold vessels weighed about three pounds.
  '87':
  - type: text
    content: 'The sum total of animals used for the Whole-Burnt-Offering together with the Grain-Offering:'
  - type: text
    content: twelve bulls,
  - type: text
    content: twelve rams,
  - type: text
    content: twelve yearling lambs.
  - type: text
    content: 'For the Absolution-Offering:'
  - type: text
    content: twelve he-goats.
  '88':
  - type: text
    content: 'The sum total of animals used for the sacrifice of the Peace-Offering:'
  - type: text
    content: twenty-four bulls,
  - type: text
    content: sixty rams,
  - type: text
    content: sixty he-goats,
  - type: text
    content: sixty yearling lambs.
  - type: text
    content: These were the offerings for the dedication of the Altar after it was anointed.
  '89':
  - type: text
    content: 'When Moses entered the Tent of Meeting to speak with '
  - type: text
    content: God
  - type: text
    content: ', he heard the Voice speaking to him from between the two angel-cherubim above the Atonement-Cover on the Chest of The Testimony. He spoke with him.'
