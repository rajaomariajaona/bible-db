    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 78-83
    - type: text
      text: 'On the twelfth day, Ahira son of Enan, the leader of the people of Naphtali, brought his offering. His offering was:'
  - type: usfm
    marker: p
    children:
    - type: text
