  '84':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '84'
    - type: text
      text: 'These were the dedication offerings of the leaders of Israel for the anointing of the Altar:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twelve silver plates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twelve silver bowls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twelve gold vessels.
  '85':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 85-86
    - type: text
      text: Each plate weighed three and a quarter pounds and each bowl one and three-quarter pounds. All the plates and bowls together weighed about sixty pounds (using the official Sanctuary weight). The twelve gold vessels filled with incense weighed four ounces each (using the official Sanctuary weight). Altogether the gold vessels weighed about three pounds.
  '87':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '87'
    - type: text
      text: 'The sum total of animals used for the Whole-Burnt-Offering together with the Grain-Offering:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twelve bulls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twelve rams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twelve yearling lambs.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Absolution-Offering:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twelve he-goats.
  '88':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '88'
    - type: text
      text: 'The sum total of animals used for the sacrifice of the Peace-Offering:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twenty-four bulls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sixty rams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sixty he-goats,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sixty yearling lambs.
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were the offerings for the dedication of the Altar after it was anointed.
  '89':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '89'
    - type: text
      text: 'When Moses entered the Tent of Meeting to speak with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', he heard the Voice speaking to him from between the two angel-cherubim above the Atonement-Cover on the Chest of The Testimony. He spoke with him.'
