  '6':
  - type: text
    content: Moses took the wagons and oxen and gave them to the Levites. He gave two wagons and four oxen to the Gershonites for their work and four wagons and eight oxen to the Merarites for their work. They were all under the direction of Ithamar son of Aaron the priest. Moses didn’t give any to the Kohathites because they had to carry the holy things for which they were responsible on their shoulders.
  '60':
