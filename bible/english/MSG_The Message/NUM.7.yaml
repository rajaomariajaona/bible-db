  - type: usfm
    marker: p
    children:
    - type: text
      text: This was the offering of Nethanel son of Zuar.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: 'The leaders of Israel, the heads of the ancestral tribes who had carried out the census, brought offerings. They presented before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' six covered wagons and twelve oxen, a wagon from each pair of leaders and an ox from each leader.'
