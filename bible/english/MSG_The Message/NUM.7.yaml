  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: ‘‘Receive these so that they can be used to transport the Tent of Meeting. Give them to the Levites according to what they need for their work.”'
  '42':
