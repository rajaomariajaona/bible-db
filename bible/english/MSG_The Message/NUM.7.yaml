document_id: NUM.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offerings for the Dedication
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Moses finished setting up The Dwelling, he anointed it and consecrated it along with all that went with it. At the same time he anointed and consecrated the Altar and its accessories.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: 'When the Altar was anointed, the leaders brought their offerings for its dedication and presented them before the Altar because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had instructed Moses, “Each day one leader is to present his offering for the dedication of the Altar.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: 'On the first day, Nahshon son of Amminadab, of the tribe of Judah, brought his offering. His offering was:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: a silver plate weighing three and a quarter pounds and a silver bowl weighing one and three-quarter pounds (according to the standard Sanctuary weights), each filled with fine flour mixed with oil as a Grain-Offering;
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: a gold vessel weighing four ounces, filled with incense;
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: a young bull, a ram, and a yearling lamb for a Whole-Burnt-Offering;
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: a he-goat for an Absolution-Offering;
  - type: usfm
    marker: p
    children:
    - type: text
      text: two oxen, five rams, five he-goats, and five yearling lambs to be sacrificed as a Peace-Offering.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: This was the offering of Nahshon son of Amminadab.
