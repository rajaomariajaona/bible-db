verses:
  '1':
  - type: heading
    content: Walking Out on the Covenant of God
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s orders: “Go to the royal palace and deliver this Message. Say, ‘Listen to what '
  - type: text
    content: God
  - type: text
    content: ' says, O King of Judah, you who sit on David’s throne—you and your officials and all the people who go in and out of these palace gates. This is '
  - type: text
    content: God
  - type: text
    content: '’s Message: Attend to matters of justice. Set things right between people. Rescue victims from their exploiters. Don’t take advantage of the homeless, the orphans, the widows. Stop the murdering!'
  '10':
  - type: text
    content: Don’t weep over dead King Josiah.
  - type: text
    content: Don’t waste your tears.
  - type: text
    content: 'Weep for his exiled son:'
  - type: text
    content: He’s gone for good.
  - type: text
    content: He’ll never see home again.
  '11':
  - type: text
    content: 'For this is '
  - type: text
    content: God
  - type: text
    content: '’s Word on Shallum son of Josiah, who succeeded his father as king of Judah: “He’s gone from here, gone for good. He’ll die in the place they’ve taken him to. He’ll never see home again.”'
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: “Doom to him who builds palaces but bullies people,
  - type: text
    content: who makes a fine house but destroys lives,
  - type: text
    content: Who cheats his workers
  - type: text
    content: and won’t pay them for their work,
  - type: text
    content: Who says, ‘I’ll build me an elaborate mansion
  - type: text
    content: with spacious rooms and fancy windows.
  - type: text
    content: I’ll bring in rare and expensive woods
  - type: text
    content: and the latest in interior decor.’
  - type: text
    content: So, that makes you a king—
  - type: text
    content: living in a fancy palace?
  - type: text
    content: Your father got along just fine, didn’t he?
  - type: text
    content: He did what was right and treated people fairly,
  - type: text
    content: And things went well with him.
  - type: text
    content: He stuck up for the down-and-out,
  - type: text
    content: And things went well for Judah.
  - type: text
    content: Isn’t this what it means to know me?”
  - type: text
    content: God
  - type: text
    content: ’s Decree!
  - type: text
    content: “But you’re blind and brainless.
  - type: text
    content: All you think about is yourself,
  - type: text
    content: Taking advantage of the weak,
  - type: text
    content: bulldozing your way, bullying victims.”
  '18':
  - type: text
    content: 'This is God’s epitaph on Jehoiakim son of Josiah king of Judah:'
  - type: text
    content: “Doom to this man!
  - type: text
    content: Nobody will shed tears over him,
  - type: text
    content: ‘Poor, poor brother!’
  - type: text
    content: Nobody will shed tears over him,
  - type: text
    content: ‘Poor, poor master!’
  - type: text
    content: They’ll give him a donkey’s funeral,
  - type: text
    content: drag him out of the city and dump him.
  - type: heading
    content: You’ve Made a Total Mess of Your Life
  '20':
  - type: text
    content: “People of Jerusalem, climb a Lebanon peak and weep,
  - type: text
    content: climb a Bashan mountain and wail,
  - type: text
    content: Climb the Abarim ridge and cry—
  - type: text
    content: you’ve made a total mess of your life.
  - type: text
    content: I spoke to you when everything was going your way.
  - type: text
    content: You said, ‘I’m not interested.’
  - type: text
    content: You’ve been that way as long as I’ve known you,
  - type: text
    content: never listened to a thing I said.
  - type: text
    content: All your leaders will be blown away,
  - type: text
    content: all your friends end up in exile,
  - type: text
    content: And you’ll find yourself in the gutter,
  - type: text
    content: disgraced by your evil life.
  - type: text
    content: You big-city people thought you were so important,
  - type: text
    content: thought you were ‘king of the mountain’!
  - type: text
    content: You’re soon going to be doubled up in pain,
  - type: text
    content: pain worse than the pangs of childbirth.
  - type: text
    content: '* * *'
  '24':
  - type: text
    content: “As sure as I am the living God”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—“even if you, Jehoiachin son of Jehoiakim king of Judah, were the signet ring on my right hand, I’d pull you off and give you to those who are out to kill you, to Nebuchadnezzar king of Babylon and the Chaldeans, and then throw you, both you and your mother, into a foreign country, far from your place of birth. There you’ll both die.
  '27':
  - type: text
    content: “You’ll be homesick, desperately homesick, but you’ll never get home again.”
  '28':
  - type: text
    content: Is Jehoiachin a leaky bucket,
  - type: text
    content: a rusted-out pail good for nothing?
  - type: text
    content: Why else would he be thrown away, he and his children,
  - type: text
    content: thrown away to a foreign place?
  - type: text
    content: O land, land, land,
  - type: text
    content: 'listen to '
  - type: text
    content: God
  - type: text
    content: ’s Message!
  - type: text
    content: 'This is '
  - type: text
    content: God
  - type: text
    content: '’s verdict:'
  - type: text
    content: “Write this man off as if he were childless,
  - type: text
    content: a man who will never amount to anything.
  - type: text
    content: Nothing will ever come of his life.
  - type: text
    content: He’s the end of the line, the last of the kings.”
  '4':
  - type: text
    content: “‘If you obey these commands, then kings who follow in the line of David will continue to go in and out of these palace gates mounted on horses and riding in chariots—they and their officials and the citizens of Judah. But if you don’t obey these commands, then I swear—
  - type: text
    content: God
  - type: text
    content: ’s Decree!—this palace will end up a heap of rubble.’”
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: 'This is '
  - type: text
    content: God
  - type: text
    content: '’s verdict on Judah’s royal palace:'
  - type: text
    content: “I number you among my favorite places—
  - type: text
    content: like the lovely hills of Gilead,
  - type: text
    content: like the soaring peaks of Lebanon.
  - type: text
    content: Yet I swear I’ll turn you into a wasteland,
  - type: text
    content: as empty as a ghost town.
  - type: text
    content: I’ll hire a demolition crew,
  - type: text
    content: well-equipped with sledgehammers and wrecking bars,
  - type: text
    content: Pound the country to a pulp
  - type: text
    content: and burn it all up.
  '8':
  - type: text
    content: '“Travelers from all over will come through here and say to one another, ‘Why would '
  - type: text
    content: God
  - type: text
    content: ' do such a thing to this wonderful city?’ They’ll be told, ‘Because they walked out on the covenant of their '
  - type: text
    content: God
  - type: text
    content: ', took up with other gods and worshiped them.’”'
  - type: heading
    content: Building a Fine House but Destroying Lives
