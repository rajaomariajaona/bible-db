document_id: JER.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Walking Out on the Covenant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s orders: “Go to the royal palace and deliver this Message. Say, ‘Listen to what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, O King of Judah, you who sit on David’s throne—you and your officials and all the people who go in and out of these palace gates. This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message: Attend to matters of justice. Set things right between people. Rescue victims from their exploiters. Don’t take advantage of the homeless, the orphans, the widows. Stop the murdering!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t weep over dead King Josiah.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t waste your tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Weep for his exiled son:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s gone for good.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll never see home again.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Word on Shallum son of Josiah, who succeeded his father as king of Judah: “He’s gone from here, gone for good. He’ll die in the place they’ve taken him to. He’ll never see home again.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Doom to him who builds palaces but bullies people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who makes a fine house but destroys lives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who cheats his workers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and won’t pay them for their work,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who says, ‘I’ll build me an elaborate mansion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with spacious rooms and fancy windows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll bring in rare and expensive woods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the latest in interior decor.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So, that makes you a king—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: living in a fancy palace?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your father got along just fine, didn’t he?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He did what was right and treated people fairly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And things went well with him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He stuck up for the down-and-out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And things went well for Judah.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Isn’t this what it means to know me?”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you’re blind and brainless.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All you think about is yourself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taking advantage of the weak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bulldozing your way, bullying victims.”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is God’s epitaph on Jehoiakim son of Josiah king of Judah:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Doom to this man!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobody will shed tears over him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Poor, poor brother!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobody will shed tears over him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Poor, poor master!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll give him a donkey’s funeral,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drag him out of the city and dump him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You’ve Made a Total Mess of Your Life
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “People of Jerusalem, climb a Lebanon peak and weep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: climb a Bashan mountain and wail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Climb the Abarim ridge and cry—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ve made a total mess of your life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I spoke to you when everything was going your way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You said, ‘I’m not interested.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve been that way as long as I’ve known you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never listened to a thing I said.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your leaders will be blown away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all your friends end up in exile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you’ll find yourself in the gutter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: disgraced by your evil life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You big-city people thought you were so important,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thought you were ‘king of the mountain’!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re soon going to be doubled up in pain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pain worse than the pangs of childbirth.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “As sure as I am the living God”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—“even if you, Jehoiachin son of Jehoiakim king of Judah, were the signet ring on my right hand, I’d pull you off and give you to those who are out to kill you, to Nebuchadnezzar king of Babylon and the Chaldeans, and then throw you, both you and your mother, into a foreign country, far from your place of birth. There you’ll both die.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You’ll be homesick, desperately homesick, but you’ll never get home again.”
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is Jehoiachin a leaky bucket,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a rusted-out pail good for nothing?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why else would he be thrown away, he and his children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thrown away to a foreign place?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O land, land, land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'listen to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s verdict:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Write this man off as if he were childless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a man who will never amount to anything.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing will ever come of his life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s the end of the line, the last of the kings.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘If you obey these commands, then kings who follow in the line of David will continue to go in and out of these palace gates mounted on horses and riding in chariots—they and their officials and the citizens of Judah. But if you don’t obey these commands, then I swear—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree!—this palace will end up a heap of rubble.’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s verdict on Judah’s royal palace:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I number you among my favorite places—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the lovely hills of Gilead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the soaring peaks of Lebanon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I swear I’ll turn you into a wasteland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as empty as a ghost town.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll hire a demolition crew,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: well-equipped with sledgehammers and wrecking bars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pound the country to a pulp
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burn it all up.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Travelers from all over will come through here and say to one another, ‘Why would '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' do such a thing to this wonderful city?’ They’ll be told, ‘Because they walked out on the covenant of their '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', took up with other gods and worshiped them.’”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Building a Fine House but Destroying Lives
    marker-yv: yv-h
