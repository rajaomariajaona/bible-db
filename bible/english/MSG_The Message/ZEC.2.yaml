document_id: ZEC.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Third Vision: The Man with the Tape Measure'
  - type: text
    content: I looked up and was surprised to see
  - type: text
    content: a man holding a tape measure in his hand.
  - type: text
    content: I said, “What are you up to?”
  - type: text
    content: “I’m on my way,” he said, “to survey Jerusalem,
  - type: text
    content: to measure its width and length.”
  - type: text
    content: Just then the Messenger-Angel on his way out
  - type: text
    content: met another angel coming in and said,
  - type: text
    content: “Run! Tell the Surveyor, ‘Jerusalem will burst its walls—
  - type: text
    content: bursting with people, bursting with animals.
  - type: text
    content: And I’ll be right there with her’—
  - type: text
    content: God
  - type: text
    content: ’s Decree—‘a wall of fire
  - type: text
    content: around unwalled Jerusalem and a radiant presence within.’”
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: “Shout and celebrate, Daughter of Zion!
  - type: text
    content: I’m on my way. I’m moving into your neighborhood!”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: 'Many godless nations will be linked up with '
  - type: text
    content: God
  - type: text
    content: ' at that time. (“They will become my family! I’ll live in their homes!”) And then you’ll know for sure that '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies sent me on this mission. '
  - type: text
    content: God
  - type: text
    content: ' will reclaim his Judah inheritance in the Holy Land. He’ll again make clear that Jerusalem is his choice.'
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: 'Quiet, everyone! Shh! Silence before '
  - type: text
    content: God
  - type: text
    content: . Something’s afoot in his holy house. He’s on the move!
  '6':
  - type: text
    content: '“Up on your feet! Get out of there—and now!” '
  - type: text
    content: God
  - type: text
    content: ' says so.'
  - type: text
    content: “Return from your far exile.
  - type: text
    content: 'I scattered you to the four winds.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Escape from Babylon, Zion, and come home—now!”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, the One of Glory who sent me on my mission, commenting on the godless nations who stripped you and left you homeless, said, “Anyone who hits you, hits me—bloodies my nose, blackens my eye. Yes, and at the right time I’ll give the signal and they’ll be stripped and thrown out by their own servants.” Then you’ll know for sure that '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies sent me on this mission.
  - type: text
    content: '* * *'
