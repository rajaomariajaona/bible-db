document_id: ZEC.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Third Vision: The Man with the Tape Measure'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: I looked up and was surprised to see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a man holding a tape measure in his hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “What are you up to?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I’m on my way,” he said, “to survey Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to measure its width and length.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just then the Messenger-Angel on his way out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: met another angel coming in and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Run! Tell the Surveyor, ‘Jerusalem will burst its walls—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bursting with people, bursting with animals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I’ll be right there with her’—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—‘a wall of fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: around unwalled Jerusalem and a radiant presence within.’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Shout and celebrate, Daughter of Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m on my way. I’m moving into your neighborhood!”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: 'Many godless nations will be linked up with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' at that time. (“They will become my family! I’ll live in their homes!”) And then you’ll know for sure that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies sent me on this mission. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will reclaim his Judah inheritance in the Holy Land. He’ll again make clear that Jerusalem is his choice.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Quiet, everyone! Shh! Silence before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Something’s afoot in his holy house. He’s on the move!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: '“Up on your feet! Get out of there—and now!” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Return from your far exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I scattered you to the four winds.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Escape from Babylon, Zion, and come home—now!”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, the One of Glory who sent me on my mission, commenting on the godless nations who stripped you and left you homeless, said, “Anyone who hits you, hits me—bloodies my nose, blackens my eye. Yes, and at the right time I’ll give the signal and they’ll be stripped and thrown out by their own servants.” Then you’ll know for sure that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies sent me on this mission.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
