document_id: PRO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Assume You Know It All
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Good friend, don’t forget all I’ve taught you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: take to heart my commands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll help you live a long, long time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a long life lived full and well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Don’t lose your grip on Love and Loyalty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tie them around your neck; carve their initials on your heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earn a reputation for living well
- type: usfm
  marker: q2
  children:
  - type: text
    text: in God’s eyes and the eyes of the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-12
  - type: text
    text: 'Trust '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' from the bottom of your heart;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t try to figure out everything on your own.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Listen for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s voice in everything you do, everywhere you go;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’s the one who will keep you on track.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t assume that you know it all.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Run to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Run from evil!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your body will glow with health,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your very bones will vibrate with life!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Honor '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' with everything you own;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: give him the first and the best.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your barns will burst,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your wine vats will brim over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But don’t, dear friend, resent '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s discipline;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t sulk under his loving correction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It’s the child he loves that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' corrects;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a father’s delight is behind all this.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Very Tree of Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-18
  - type: text
    text: You’re blessed when you meet Lady Wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you make friends with Madame Insight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s worth far more than money in the bank;
- type: usfm
  marker: q2
  children:
  - type: text
    text: her friendship is better than a big salary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her value exceeds all the trappings of wealth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing you could wish for holds a candle to her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With one hand she gives long life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the other she confers recognition.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her manner is beautiful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her life wonderfully complete.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s the very Tree of Life to those who embrace her.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hold her tight—and be blessed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: 'With Lady Wisdom, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' formed Earth;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with Madame Insight, he raised Heaven.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They knew when to signal rivers and springs to the surface,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dew to descend from the night skies.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Never Walk Away
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-26
  - type: text
    text: Dear friend, guard Clear Thinking and Common Sense with your life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t for a minute lose sight of them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll keep your soul alive and well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll keep you fit and attractive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll travel safely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll neither tire nor trip.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll take afternoon naps without a worry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll enjoy a good night’s sleep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No need to panic over alarms or surprises,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or predictions that doomsday’s just around the corner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God '
  - type: text
    text: will be right there with you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll keep you safe and sound.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: Never walk away from someone who deserves help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your hand is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' hand for that person.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t tell your neighbor “Maybe some other time”
- type: usfm
  marker: q2
  children:
  - type: text
    text: or “Try me tomorrow”
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the money’s right there in your pocket.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t figure ways of taking advantage of your neighbor
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he’s sitting there trusting and unsuspecting.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-32
  - type: text
    text: Don’t walk around with a chip on your shoulder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always spoiling for a fight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t try to be like those who shoulder their way through life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why be a bully?
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Why not?” you say. Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' can’t stand twisted souls.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s the straightforward who get his respect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-35
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s curse blights the house of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he blesses the home of the righteous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gives proud skeptics a cold shoulder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but if you’re down on your luck, he’s right there to help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wise living gets rewarded with honor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: stupid living gets the booby prize.
