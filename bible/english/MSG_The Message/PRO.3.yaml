document_id: PRO.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Don’t Assume You Know It All
  - type: text
    content: Good friend, don’t forget all I’ve taught you;
  - type: text
    content: take to heart my commands.
  - type: text
    content: They’ll help you live a long, long time,
  - type: text
    content: a long life lived full and well.
  '13':
  - type: text
    content: You’re blessed when you meet Lady Wisdom,
  - type: text
    content: when you make friends with Madame Insight.
  - type: text
    content: She’s worth far more than money in the bank;
  - type: text
    content: her friendship is better than a big salary.
  - type: text
    content: Her value exceeds all the trappings of wealth;
  - type: text
    content: nothing you could wish for holds a candle to her.
  - type: text
    content: With one hand she gives long life,
  - type: text
    content: with the other she confers recognition.
  - type: text
    content: Her manner is beautiful,
  - type: text
    content: her life wonderfully complete.
  - type: text
    content: She’s the very Tree of Life to those who embrace her.
  - type: text
    content: Hold her tight—and be blessed!
  '19':
  - type: text
    content: 'With Lady Wisdom, '
  - type: text
    content: God
  - type: text
    content: ' formed Earth;'
  - type: text
    content: with Madame Insight, he raised Heaven.
  - type: text
    content: They knew when to signal rivers and springs to the surface,
  - type: text
    content: and dew to descend from the night skies.
  - type: heading
    content: Never Walk Away
  '21':
  - type: text
    content: Dear friend, guard Clear Thinking and Common Sense with your life;
  - type: text
    content: don’t for a minute lose sight of them.
  - type: text
    content: They’ll keep your soul alive and well,
  - type: text
    content: they’ll keep you fit and attractive.
  - type: text
    content: You’ll travel safely,
  - type: text
    content: you’ll neither tire nor trip.
  - type: text
    content: You’ll take afternoon naps without a worry,
  - type: text
    content: you’ll enjoy a good night’s sleep.
  - type: text
    content: No need to panic over alarms or surprises,
  - type: text
    content: or predictions that doomsday’s just around the corner,
  - type: text
    content: 'Because '
  - type: text
    content: 'God '
  - type: text
    content: will be right there with you;
  - type: text
    content: he’ll keep you safe and sound.
  '27':
  - type: text
    content: Never walk away from someone who deserves help;
  - type: text
    content: 'your hand is '
  - type: text
    content: God’s
  - type: text
    content: ' hand for that person.'
  - type: text
    content: Don’t tell your neighbor “Maybe some other time”
  - type: text
    content: or “Try me tomorrow”
  - type: text
    content: when the money’s right there in your pocket.
  - type: text
    content: Don’t figure ways of taking advantage of your neighbor
  - type: text
    content: when he’s sitting there trusting and unsuspecting.
  '3':
  - type: text
    content: Don’t lose your grip on Love and Loyalty.
  - type: text
    content: Tie them around your neck; carve their initials on your heart.
  - type: text
    content: Earn a reputation for living well
  - type: text
    content: in God’s eyes and the eyes of the people.
  '30':
  - type: text
    content: Don’t walk around with a chip on your shoulder,
  - type: text
    content: always spoiling for a fight.
  - type: text
    content: Don’t try to be like those who shoulder their way through life.
  - type: text
    content: Why be a bully?
  - type: text
    content: '“Why not?” you say. Because '
  - type: text
    content: God
  - type: text
    content: ' can’t stand twisted souls.'
  - type: text
    content: It’s the straightforward who get his respect.
  '33':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s curse blights the house of the wicked,
  - type: text
    content: but he blesses the home of the righteous.
  - type: text
    content: He gives proud skeptics a cold shoulder,
  - type: text
    content: but if you’re down on your luck, he’s right there to help.
  - type: text
    content: Wise living gets rewarded with honor;
  - type: text
    content: stupid living gets the booby prize.
  '5':
  - type: text
    content: 'Trust '
  - type: text
    content: God
  - type: text
    content: ' from the bottom of your heart;'
  - type: text
    content: don’t try to figure out everything on your own.
  - type: text
    content: 'Listen for '
  - type: text
    content: God
  - type: text
    content: ’s voice in everything you do, everywhere you go;
  - type: text
    content: he’s the one who will keep you on track.
  - type: text
    content: Don’t assume that you know it all.
  - type: text
    content: 'Run to '
  - type: text
    content: God
  - type: text
    content: '! Run from evil!'
  - type: text
    content: Your body will glow with health,
  - type: text
    content: your very bones will vibrate with life!
  - type: text
    content: 'Honor '
  - type: text
    content: God
  - type: text
    content: ' with everything you own;'
  - type: text
    content: give him the first and the best.
  - type: text
    content: Your barns will burst,
  - type: text
    content: your wine vats will brim over.
  - type: text
    content: 'But don’t, dear friend, resent '
  - type: text
    content: God
  - type: text
    content: ’s discipline;
  - type: text
    content: don’t sulk under his loving correction.
  - type: text
    content: 'It’s the child he loves that '
  - type: text
    content: God
  - type: text
    content: ' corrects;'
  - type: text
    content: a father’s delight is behind all this.
  - type: heading
    content: The Very Tree of Life
