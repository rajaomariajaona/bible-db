document_id: ZEC.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fifth Vision: A Lampstand and Two Olive Trees'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The Messenger-Angel again called me to attention. It was like being wakened out of deep sleep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: He said, “What do you see?”
- type: usfm
  marker: p
  children:
  - type: text
    text: I answered, “I see a lampstand of solid gold with a bowl on top. Seven lamps, each with seven spouts, are set on the bowl. And there are two olive trees, one on either side of the bowl.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then I asked the Messenger-Angel, “What does this mean, sir?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: The Messenger-Angel said, “Can’t you tell?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No, sir,” I said.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then he said, “This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to Zerubbabel: ‘You can’t force these things. They only come about through my Spirit,’ says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies. ‘So, big mountain, who do you think you are? Next to Zerubbabel you’re nothing but a molehill. He’ll proceed to set the Cornerstone in place, accompanied by cheers: Yes! Yes! Do it!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'After that, the Word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came to me: “Zerubbabel started rebuilding this Temple and he will complete it. That will be your confirmation that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies sent me to you. Does anyone dare despise this day of small beginnings? They’ll change their tune when they see Zerubbabel setting the last stone in place!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Going back to the vision, the Messenger-Angel said, “The seven lamps are the eyes of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' probing the dark corners of the world like searchlights.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: “And the two olive trees on either side of the lampstand?” I asked. “What’s the meaning of them? And while you’re at it, the two branches of the olive trees that feed oil to the lamps—what do they mean?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He said, “You haven’t figured that out?”
- type: usfm
  marker: p
  children:
  - type: text
    text: I said, “No, sir.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He said, “These are the two who stand beside the Master of the whole earth and supply golden lamp oil worldwide.”
