document_id: JOB.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Bildad’s Response
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Does God Mess Up?
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: 'Bildad from Shuhah was next to speak:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How can you keep on talking like this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re talking nonsense, and noisy nonsense at that.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does God mess up?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does God Almighty ever get things backward?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s plain that your children sinned against him—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: otherwise, why would God have punished them?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Here’s what you must do—and don’t put it off any longer:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get down on your knees before God Almighty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’re as innocent and upright as you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s not too late—he’ll come running;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’ll set everything right again, reestablish your fortunes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though you’re not much right now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll end up better than ever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To Hang Your Life from One Thin Thread
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: “There’s no way that God will reject a good person,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no way he’ll help a bad one.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will let you laugh again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll raise the roof with shouts of joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your enemies thoroughly discredited,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their house of cards collapsed.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-19
    - type: text
      text: “Put the question to our ancestors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: study what they learned from their ancestors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For we’re newcomers at this, with a lot to learn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not too long to learn it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why not let the ancients teach you, tell you what’s what,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instruct you in what they knew from experience?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can mighty pine trees grow tall without soil?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can luscious tomatoes flourish without water?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blossoming flowers look beautiful before they’re cut or picked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but without soil or water they wither more quickly than grass.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s what happens to all who forget God—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all their hopes come to nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They hang their life from one thin thread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they hitch their fate to a spider web.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One jiggle and the thread breaks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one jab and the web collapses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or they’re like weeds springing up in the sunshine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: invading the garden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spreading everywhere, overtaking the flowers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: getting a foothold even in the rocks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when the gardener rips them out by the roots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the garden doesn’t miss them one bit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sooner the godless are gone, the better;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then good plants can grow in their place.
