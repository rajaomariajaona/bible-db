document_id: JOB.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad’s Response
  - type: heading
    content: Does God Mess Up?
  - type: text
    content: 'Bildad from Shuhah was next to speak:'
  - type: text
    content: “How can you keep on talking like this?
  - type: text
    content: You’re talking nonsense, and noisy nonsense at that.
  - type: text
    content: Does God mess up?
  - type: text
    content: Does God Almighty ever get things backward?
  - type: text
    content: It’s plain that your children sinned against him—
  - type: text
    content: otherwise, why would God have punished them?
  - type: text
    content: 'Here’s what you must do—and don’t put it off any longer:'
  - type: text
    content: Get down on your knees before God Almighty.
  - type: text
    content: If you’re as innocent and upright as you say,
  - type: text
    content: it’s not too late—he’ll come running;
  - type: text
    content: he’ll set everything right again, reestablish your fortunes.
  - type: text
    content: Even though you’re not much right now,
  - type: text
    content: you’ll end up better than ever.
  - type: heading
    content: To Hang Your Life from One Thin Thread
  '20':
  - type: text
    content: “There’s no way that God will reject a good person,
  - type: text
    content: and there is no way he’ll help a bad one.
  - type: text
    content: God will let you laugh again;
  - type: text
    content: you’ll raise the roof with shouts of joy,
  - type: text
    content: With your enemies thoroughly discredited,
  - type: text
    content: their house of cards collapsed.”
  '8':
  - type: text
    content: “Put the question to our ancestors,
  - type: text
    content: study what they learned from their ancestors.
  - type: text
    content: For we’re newcomers at this, with a lot to learn,
  - type: text
    content: and not too long to learn it.
  - type: text
    content: So why not let the ancients teach you, tell you what’s what,
  - type: text
    content: instruct you in what they knew from experience?
  - type: text
    content: Can mighty pine trees grow tall without soil?
  - type: text
    content: Can luscious tomatoes flourish without water?
  - type: text
    content: Blossoming flowers look beautiful before they’re cut or picked,
  - type: text
    content: but without soil or water they wither more quickly than grass.
  - type: text
    content: That’s what happens to all who forget God—
  - type: text
    content: all their hopes come to nothing.
  - type: text
    content: They hang their life from one thin thread,
  - type: text
    content: they hitch their fate to a spider web.
  - type: text
    content: One jiggle and the thread breaks,
  - type: text
    content: one jab and the web collapses.
  - type: text
    content: Or they’re like weeds springing up in the sunshine,
  - type: text
    content: invading the garden,
  - type: text
    content: Spreading everywhere, overtaking the flowers,
  - type: text
    content: getting a foothold even in the rocks.
  - type: text
    content: But when the gardener rips them out by the roots,
  - type: text
    content: the garden doesn’t miss them one bit.
  - type: text
    content: The sooner the godless are gone, the better;
  - type: text
    content: then good plants can grow in their place.
