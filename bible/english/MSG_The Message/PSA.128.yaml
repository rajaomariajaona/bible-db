document_id: PSA.128,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'All you who fear '
  - type: text
    content: God
  - type: text
    content: ', how blessed you are!'
  - type: text
    content: how happily you walk on his smooth straight road!
  - type: text
    content: You worked hard and deserve all you’ve got coming.
  - type: text
    content: Enjoy the blessing! Soak in the goodness!
  '3':
  - type: text
    content: Your wife will bear children as a vine bears grapes,
  - type: text
    content: your household lush as a vineyard,
  - type: text
    content: The children around your table
  - type: text
    content: as fresh and promising as young olive shoots.
  - type: text
    content: Stand in awe of God’s Yes.
  - type: text
    content: 'Oh, how he blesses the one who fears '
  - type: text
    content: God
  - type: text
    content: '!'
  '5':
  - type: text
    content: Enjoy the good life in Jerusalem
  - type: text
    content: every day of your life.
  - type: text
    content: And enjoy your grandchildren.
  - type: text
    content: Peace to Israel!
