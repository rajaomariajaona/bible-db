type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', don’t shut me out;'
  - type: text
    content: don’t give me the silent treatment, O God.
  - type: text
    content: Your enemies are out there whooping it up,
  - type: text
    content: the God-haters are living it up;
  - type: text
    content: They’re plotting to do your people in,
  - type: text
    content: conspiring to rob you of your precious ones.
  - type: text
    content: “Let’s wipe this nation from the face of the earth,”
  - type: text
    content: they say; “scratch Israel’s name off the books.”
  - type: text
    content: And now they’re putting their heads together,
  - type: text
    content: making plans to get rid of you.
  '13':
  - type: text
    content: My God! I’ve had it with them!
  - type: text
    content: Blow them away!
  - type: text
    content: Tumbleweeds in the desert waste,
  - type: text
    content: charred sticks in the burned-over ground.
  - type: text
    content: Knock the breath right out of them, so they’re gasping
  - type: text
    content: for breath, gasping, “
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: Bring them to the end of their rope,
  - type: text
    content: and leave them there dangling, helpless.
  - type: text
    content: 'Then they’ll learn your name: “'
  - type: text
    content: God
  - type: text
    content: ',”'
  - type: text
    content: the one and only High God on earth.
  '6':
  - type: text
    content: Edom and the Ishmaelites,
  - type: text
    content: Moab and the Hagrites,
  - type: text
    content: Gebal and Ammon and Amalek,
  - type: text
    content: Philistia and the Tyrians,
  - type: text
    content: And now Assyria has joined up,
  - type: text
    content: Giving muscle to the gang of Lot.
  '9':
  - type: text
    content: Do to them what you did to Midian,
  - type: text
    content: to Sisera and Jabin at Kishon Brook;
  - type: text
    content: They came to a bad end at Endor,
  - type: text
    content: nothing but dung for the garden.
  - type: text
    content: Cut down their leaders as you did Oreb and Zeeb,
  - type: text
    content: their princes to nothings like Zebah and Zalmunna,
  - type: text
    content: With their empty brags, “We’re grabbing it all,
  - type: text
    content: grabbing God’s gardens for ourselves.”
