document_id: PSA.83,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', don’t shut me out;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t give me the silent treatment, O God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your enemies are out there whooping it up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God-haters are living it up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re plotting to do your people in,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: conspiring to rob you of your precious ones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let’s wipe this nation from the face of the earth,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they say; “scratch Israel’s name off the books.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now they’re putting their heads together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making plans to get rid of you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God! I’ve had it with them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Blow them away!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tumbleweeds in the desert waste,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: charred sticks in the burned-over ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Knock the breath right out of them, so they’re gasping
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for breath, gasping, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring them to the end of their rope,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leave them there dangling, helpless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they’ll learn your name: “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ',”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one and only High God on earth.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Edom and the Ishmaelites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Moab and the Hagrites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gebal and Ammon and Amalek,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Philistia and the Tyrians,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And now Assyria has joined up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Giving muscle to the gang of Lot.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do to them what you did to Midian,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Sisera and Jabin at Kishon Brook;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They came to a bad end at Endor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing but dung for the garden.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cut down their leaders as you did Oreb and Zeeb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their princes to nothings like Zebah and Zalmunna,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With their empty brags, “We’re grabbing it all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grabbing God’s gardens for ourselves.”
