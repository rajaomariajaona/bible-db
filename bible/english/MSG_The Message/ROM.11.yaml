document_id: ROM.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Loyal Minority
  - type: text
    content: ' Does this mean, then, that God is so fed up with Israel that he’ll have nothing more to do with them? Hardly. Remember that I, the one writing these things, am an Israelite, a descendant of Abraham out of the tribe of Benjamin. You can’t get much more Semitic than that! So we’re not talking about repudiation. God has been too long involved with Israel, has too much invested, to simply wash his hands of them.'
  '11':
  - type: text
    content: 'The next question is, “Are they down for the count? Are they out of this for good?” And the answer is a clear-cut '
  - type: text
    content: No
  - type: text
    content: . Ironically when they walked out, they left the door open and the outsiders walked in. But the next thing you know, the Jews were starting to wonder if perhaps they had walked out on a good thing. Now, if their leaving triggered this worldwide coming of non-Jewish outsiders to God’s kingdom, just imagine the effect of their coming back! What a homecoming!
  '13':
  - type: text
    content: 'But I don’t want to go on about them. It’s you, the outsiders, that I’m concerned with now. Because my personal assignment is focused on the so-called outsiders, I make as much of this as I can when I’m among my Israelite kin, the so-called '
  - type: text
    content: insiders
  - type: text
    content: ', hoping they’ll realize what they’re missing and want to get in on what God is doing. If their falling out initiated this worldwide coming together, their recovery is going to set off something even better: mass homecoming! If the first thing the Jews did, even though it was wrong for them, turned out for your good, just think what’s going to happen when they get it right!'
  '16':
  - type: text
    content: Behind and underneath all this there is a holy, God-planted, God-tended root. If the primary root of the tree is holy, there’s bound to be some holy fruit. Some of the tree’s branches were pruned and you wild olive shoots were grafted in. Yet the fact that you are now fed by that rich and holy root gives you no cause to gloat over the pruned branches. Remember, you aren’t feeding the root; the root is feeding you.
  '19':
  - type: text
    content: 'It’s certainly possible to say, “Other branches were pruned so that '
  - type: text
    content: I
  - type: text
    content: ' could be grafted in!” Well and good. But they were pruned because they were deadwood, no longer connected by belief and commitment to the root. The only reason you’re on the tree is because your graft “took” when you believed, and because you’re connected to that belief-nurturing root. So don’t get cocky and strut your branch. Be humbly mindful of the root that keeps you lithe and green.'
  '2':
  - type: text
    content: ' Do you remember that time Elijah was agonizing over this same Israel and cried out in prayer?'
  - type: text
    content: God, they murdered your prophets,
  - type: text
    content: They trashed your altars;
  - type: text
    content: I’m the only one left and now they’re after me!
  - type: text
    content: And do you remember God’s answer?
  - type: text
    content: I still have seven thousand who haven’t quit,
  - type: text
    content: Seven thousand who are loyal to the finish.
  - type: text
    content: It’s the same today. There’s a fiercely loyal minority still—not many, perhaps, but probably more than you think. They’re holding on, not because of what they think they’re going to get out of it, but because they’re convinced of God’s grace and purpose in choosing them. If they were only thinking of their own immediate self-interest, they would have left long ago.
  '21':
  - type: text
    content: If God didn’t think twice about taking pruning shears to the natural branches, why would he hesitate over you? He wouldn’t give it a second thought. Make sure you stay alert to these qualities of gentle kindness and ruthless severity that exist side by side in God—ruthless with the deadwood, gentle with the grafted shoot. But don’t presume on this gentleness. The moment you become deadwood, it’s game over.
  '23':
  - type: text
    content: 'And don’t get to feeling superior to those pruned branches down on the ground. If they don’t persist in remaining deadwood, they could very well get grafted back in. God can do that. He can perform miracle grafts. Why, if he could graft '
  - type: text
    content: you
  - type: text
    content: —branches cut from a tree out in the wild—into an orchard tree, he certainly isn’t going to have any trouble grafting branches back into the tree they grew from in the first place. Just be glad you’re in the tree, and hope for the best for the others.
  - type: heading
    content: A Complete Israel
  '25':
  - type: text
    content: I want to lay all this out on the table as clearly as I can, friends. This is complicated. It would be easy to misinterpret what’s going on and arrogantly assume that you’re royalty and they’re just rabble, out on their ears for good. But that’s not it at all. This hardness on the part of insider Israel toward God is temporary. Its effect is to open things up to all the outsiders so that we end up with a full house. Before it’s all over, there will be a complete Israel. As it is written,
  - type: text
    content: A champion will stride down from the mountain of Zion;
  - type: text
    content: he’ll clean house in Jacob.
  - type: text
    content: 'And this is my commitment to my people:'
  - type: text
    content: removal of their sins.
  - type: text
    content: From your point of view as you hear and embrace the good news of the Message, it looks like the Jews are God’s enemies. But looked at from the long-range perspective of God’s overall purpose, they remain God’s oldest friends. God’s gifts and God’s call are under full warranty—never canceled, never rescinded.
  '30':
  - type: text
    content: 'There was a time not so long ago when you were on the outs with God. But then the Jews slammed the door on him and things opened up for you. Now '
  - type: text
    content: they
  - type: text
    content: ' are on the outs. But with the door held wide open for you, they have a way back in. In one way or another, God makes sure that we all experience what it means to be outside so that he can personally open the door and welcome us back in.'
  '33':
  - type: text
    content: Have you ever come on anything quite like this extravagant generosity of God, this deep, deep wisdom? It’s way over our heads. We’ll never figure it out.
  - type: text
    content: Is there anyone around who can explain God?
  - type: text
    content: Anyone smart enough to tell him what to do?
  - type: text
    content: Anyone who has done him such a huge favor
  - type: text
    content: that God has to ask his advice?
  - type: text
    content: Everything comes from him;
  - type: text
    content: Everything happens through him;
  - type: text
    content: Everything ends up in him.
  - type: text
    content: Always glory! Always praise!
  - type: text
    content: Yes. Yes. Yes.
  '7':
  - type: text
    content: 'And then what happened? Well, when Israel tried to be right with God on her own, pursuing her own self-interest, she didn’t succeed. The chosen ones of God were those who let God pursue his interest in them, and as a result received his stamp of legitimacy. The “self-interest Israel” became thick-skinned toward God. Moses and Isaiah both commented on this:'
  - type: text
    content: Fed up with their quarrelsome, self-centered ways,
  - type: text
    content: God blurred their eyes and dulled their ears,
  - type: text
    content: Shut them in on themselves in a hall of mirrors,
  - type: text
    content: and they’re there to this day.
  - type: text
    content: 'David was upset about the same thing:'
  - type: text
    content: I hope they get sick eating self-serving meals,
  - type: text
    content: break a leg walking their self-serving ways.
  - type: text
    content: I hope they go blind staring in their mirrors,
  - type: text
    content: get ulcers from playing at god.
  - type: heading
    content: Pruning and Grafting Branches
