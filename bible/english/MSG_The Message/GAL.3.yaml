document_id: GAL.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trust in Christ, Not the Law
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: You crazy Galatians! Did someone put a spell on you? Have you taken leave of your senses? Something crazy has happened, for it’s obvious that you no longer have the crucified Jesus in clear focus in your lives. His sacrifice on the cross was certainly set before you clearly enough.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: 'The obvious impossibility of carrying out such a moral program should make it plain that no one can sustain a relationship with God that way. The person who lives in right relationship with God does it by embracing what God arranges for him. Doing things for God is the opposite of entering into what God does for you. Habakkuk had it right: “The person who believes God, is set right by God—and that’s the real life.” Rule-keeping does not naturally evolve into living by faith, but only perpetuates itself in more and more rule-keeping, a fact observed in Scripture: “The one who does these things [rule-keeping] continues to live by them.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: 'Christ redeemed us from that self-defeating, cursed life by absorbing it completely into himself. Do you remember the Scripture that says, “Cursed is everyone who hangs on a tree”? That is what happened when Jesus was nailed to the cross: He became a curse, and at the same time dissolved the curse. And now, because of that, the air is cleared and we can see that Abraham’s blessing is present and available for non-Jews, too. We are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' able to receive God’s life, his Spirit, in and with us by believing—just the way Abraham received it.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-18a
    - type: text
      text: ' Friends, let me give you an example from everyday affairs of the free life I am talking about. Once a person’s will has been signed, no one else can annul it or add to it. Now, the promises were made to Abraham and to his descendant. You will observe that Scripture, in the careful language of a legal document, does not say “to descendants,” referring to everybody in general, but “to your descendant” (the noun, note, is singular), referring to Christ. This is the way I interpret this: A will, earlier signed by God, is not annulled by an addendum attached 430 years later, thereby negating the promise of the will. No, this addendum, with its instructions and regulations, has nothing to do with the promised inheritance in the will.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18b-20
    - type: text
      text: ' What is the point, then, of the law, the attached addendum? It was a thoughtful addition to the original covenant promises made to Abraham. The purpose of the law was to keep a sinful people in the way of salvation until Christ (the descendant) came, inheriting the promises and distributing them to us. Obviously this law was not a firsthand encounter with God. It was arranged by angelic messengers through a middleman, Moses. But if there is a middleman as there was at Sinai, then the people are not dealing directly with God, are they? But the original promise is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: direct
    - type: text
      text: ' blessing of God, received by faith.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4
    - type: text
      text: 'Let me put this question to you: How did your new life begin? Was it by working your heads off to please God? Or was it by responding to God’s Message to you? Are you going to continue this craziness? For only crazy people would think they could complete by their own efforts what was begun by God. If you weren’t smart enough or strong enough to begin it, how do you suppose you could perfect it? Did you go through this whole painful learning process for nothing? It is not yet a total loss, but it certainly will be if you keep this up!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: If such is the case, is the law, then, an anti-promise, a negation of God’s will for us? Not at all. Its purpose was to make obvious to everyone that we are, in ourselves, out of right relationship with God, and therefore to show us the futility of devising some religious system for getting by our own efforts what we can only get by waiting in faith for God to complete his promise. For if any kind of rule-keeping had power to create life in us, we would certainly have gotten it by this time.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: Until the time when we were mature enough to respond freely in faith to the living God, we were carefully surrounded and protected by the Mosaic law. The law was like those Greek tutors, with which you are familiar, who escort children to school and protect them from danger or distraction, making sure the children will really get to the place they set out for.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-27
    - type: text
      text: 'But now you have arrived at your destination: By faith in Christ you are in direct relationship with God. Your baptism in Christ was not just washing you up for a fresh start. It also involved dressing you in an adult faith wardrobe—Christ’s life, the fulfillment of God’s original promise.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In Christ’s Family
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: In Christ’s family there can be no division into Jew and non-Jew, slave and free, male and female. Among us you are all equal. That is, we are all in a common relationship with Jesus Christ. Also, since you are Christ’s family, then you are Abraham’s famous “descendant,” heirs according to the covenant promises.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'Answer this question: Does the God who lavishly provides you with his own presence, his Holy Spirit, working things in your lives you could never do for yourselves, does he do these things because of your strenuous moral striving '
    - type: usfm
      marker: it
      children:
      - type: text
        text: or
    - type: text
      text: ' because you trust him to do them in you? Don’t these things happen among you just as they happened with Abraham? He believed God, and that act of belief was turned into a life that was right with God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'Is it not obvious to you that persons who put their trust in Christ (not persons who put their trust in the law!) are like Abraham: children of faith? It was all laid out beforehand in Scripture that God would set things right with non-Jews by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faith
    - type: text
      text: '. Scripture anticipated this in the promise to Abraham: “All nations will be blessed in you.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'So those now who live by faith are blessed along with Abraham, who lived by faith—this is no new doctrine! And that means that anyone who tries to live by his own effort, independent of God, is doomed to failure. Scripture backs this up: “Utterly cursed is every person who fails to carry out every detail written in the Book of the law.”'
