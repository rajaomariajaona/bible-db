    - type: text
      text: 1-3
  - type: text
    text: Every high priest selected to represent men and women before God and offer sacrifices for their sins should be able to deal gently with their failings, since he knows what it’s like from his own experience. But that also means that he has to offer sacrifices for his own sins as well as the peoples’.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: No one elects himself to this honored position. He’s called to it by God, as Aaron was. Neither did Christ presume to set himself up as high priest, but was set apart by the One who said to him, “You’re my Son; today I celebrate you!” In another place God declares, “You’re a priest forever in the royal order of Melchizedek.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: While he lived on earth, anticipating death, Jesus cried out in pain and wept in sorrow as he offered up priestly prayers to God. Because he honored God, God answered him. Though he was God’s Son, he learned trusting-obedience by what he suffered, just as we do. Then, having arrived at the full stature of his maturity and having been announced by God as high priest in the order of Melchizedek, he became the source of eternal salvation to all who believingly obey him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Re-Crucifying Jesus
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: I have a lot more to say about this, but it is hard to get it across to you since you’ve picked up this bad habit of not listening. By this time you ought to be teachers yourselves, yet here I find you need someone to sit down with you and go over the basics on God again, starting from square one—baby’s milk, when you should have been on solid food long ago! Milk is for beginners, inexperienced in God’s ways; solid food is for the mature, who have some practice in telling right from wrong.
