document_id: 1CO.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Coming to See You
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: Regarding the relief offering for poor Christians that is being collected, you get the same instructions I gave the churches in Galatia. Every Sunday each of you make an offering and put it in safekeeping. Be as generous as you can. When I get there you’ll have it ready, and I won’t have to make a special appeal. Then after I arrive, I’ll write letters authorizing whomever you delegate, and send them off to Jerusalem to deliver your gift. If you think it best that I go along, I’ll be glad to travel with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-9
  - type: text
    text: I plan to visit you after passing through northern Greece. I won’t be staying long there, but maybe I can stay awhile with you—maybe even spend the winter? Then you could give me a good send-off, wherever I may be headed next. I don’t want to just drop by in between other “primary” destinations. I want a good, long, leisurely visit. If the Master agrees, we’ll have it! For the present, I’m staying right here in Ephesus. A huge door of opportunity for good work has opened up here. (There is also mushrooming opposition.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: If Timothy shows up, take good care of him. Make him feel completely at home among you. He works so hard for the Master, just as I do. Don’t let anyone disparage him. After a while, send him on to me with your blessing. Tell him I’m expecting him, and any friends he has with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: About our friend Apollos, I’ve done my best to get him to pay you a visit, but haven’t talked him into it yet. He doesn’t think this is the right time. But there will be a “right time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Keep your eyes open, hold tight to your convictions, give it all you’ve got, be resolute, and love without stopping.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'Would you do me a favor, friends, and give special recognition to the family of Stephanas? You know, they were among the first converts in Greece, and they’ve put themselves out, serving Christians ever since then. I want you to honor and look up to people like that: companions and workers who show us how to do it, giving us something to aspire to.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: I want you to know how delighted I am to have Stephanas, Fortunatus, and Achaicus here with me. They partially make up for your absence! They’ve refreshed me by keeping me in touch with you. Be proud that you have people like this among you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The churches here in western Asia send greetings.
- type: usfm
  marker: p
  children:
  - type: text
    text: Aquila, Priscilla, and the church that meets in their house say hello.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All the friends here say hello.
- type: usfm
  marker: p
  children:
  - type: text
    text: Pass the greetings around with holy hugs!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And I, Paul—in my own handwriting!—send you my regards.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: If anyone won’t love the Master, throw him out. Make room for the Master!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Our Master Jesus has his arms wide open for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And I love all of you in the Messiah, in Jesus.
