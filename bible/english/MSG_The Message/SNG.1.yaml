document_id: SNG.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: The Song—best of all songs—Solomon’s song!
  - type: heading
    content: The Woman
  '12':
  - type: text
    content: When my King-Lover lay down beside me,
  - type: text
    content: my fragrance filled the room.
  - type: text
    content: His head resting between my breasts—
  - type: text
    content: the head of my lover was a sachet of sweet myrrh.
  - type: text
    content: My beloved is a bouquet of wildflowers
  - type: text
    content: picked just for me from the fields of En Gedi.
  - type: heading
    content: The Man
  '15':
  - type: text
    content: Oh, my dear friend! You’re so beautiful!
  - type: text
    content: And your eyes so beautiful—like doves!
  - type: heading
    content: The Woman
  '16':
  - type: text
    content: And you, my dear lover—you’re so handsome!
  - type: text
    content: And the bed we share is like a forest glen.
  - type: text
    content: We enjoy a canopy of cedars
  - type: text
    content: enclosed by cypresses, fragrant and green.
  '2':
  - type: text
    content: Kiss me—full on the mouth!
  - type: text
    content: Yes! For your love is better than wine,
  - type: text
    content: headier than your aromatic oils.
  - type: text
    content: The syllables of your name murmur like a meadow brook.
  - type: text
    content: No wonder everyone loves to say your name!
  '4':
  - type: text
    content: Take me away with you! Let’s run off together!
  - type: text
    content: An elopement with my King-Lover!
  - type: text
    content: We’ll celebrate, we’ll sing,
  - type: text
    content: we’ll make great music.
  - type: text
    content: Yes! For your love is better than vintage wine.
  - type: text
    content: Everyone loves you—of course! And why not?
  '5':
  - type: text
    content: I am weathered but still elegant,
  - type: text
    content: oh, dear sisters in Jerusalem,
  - type: text
    content: Weather-darkened like Kedar desert tents,
  - type: text
    content: time-softened like Solomon’s Temple hangings.
  - type: text
    content: Don’t look down on me because I’m dark,
  - type: text
    content: darkened by the sun’s harsh rays.
  - type: text
    content: My brothers ridiculed me and sent me to work in the fields.
  - type: text
    content: They made me care for the face of the earth,
  - type: text
    content: but I had no time to care for my own face.
  '7':
  - type: text
    content: Tell me where you’re working
  - type: text
    content: —I love you so much—
  - type: text
    content: Tell me where you’re tending your flocks,
  - type: text
    content: where you let them rest at noontime.
  - type: text
    content: Why should I be the one left out,
  - type: text
    content: outside the orbit of your tender care?
  - type: heading
    content: The Man
  '8':
  - type: text
    content: If you can’t find me, loveliest of all women,
  - type: text
    content: it’s all right. Stay with your flocks.
  - type: text
    content: Lead your lambs to good pasture.
  - type: text
    content: Stay with your shepherd neighbors.
  '9':
  - type: text
    content: You remind me of Pharaoh’s
  - type: text
    content: well-groomed and satiny mares.
  - type: text
    content: Pendant earrings line the elegance of your cheeks;
  - type: text
    content: strands of jewels illumine the curve of your throat.
  - type: text
    content: I’m making jewelry for you, gold and silver jewelry
  - type: text
    content: that will mark and accent your beauty.
  - type: heading
    content: The Woman
