segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The Song—best of all songs—Solomon’s song!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Kiss me—full on the mouth!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes! For your love is better than wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: headier than your aromatic oils.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The syllables of your name murmur like a meadow brook.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No wonder everyone loves to say your name!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Take me away with you! Let’s run off together!
- type: usfm
  marker: q2
  children:
  - type: text
    text: An elopement with my King-Lover!
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ll celebrate, we’ll sing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ll make great music.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes! For your love is better than vintage wine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everyone loves you—of course! And why not?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: I am weathered but still elegant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oh, dear sisters in Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weather-darkened like Kedar desert tents,
- type: usfm
  marker: q2
  children:
  - type: text
    text: time-softened like Solomon’s Temple hangings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t look down on me because I’m dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: darkened by the sun’s harsh rays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My brothers ridiculed me and sent me to work in the fields.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They made me care for the face of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I had no time to care for my own face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tell me where you’re working
- type: usfm
  marker: q2
  children:
  - type: text
    text: —I love you so much—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell me where you’re tending your flocks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where you let them rest at noontime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why should I be the one left out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: outside the orbit of your tender care?
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Man
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If you can’t find me, loveliest of all women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s all right. Stay with your flocks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lead your lambs to good pasture.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Stay with your shepherd neighbors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: You remind me of Pharaoh’s
- type: usfm
  marker: q2
  children:
  - type: text
    text: well-groomed and satiny mares.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pendant earrings line the elegance of your cheeks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: strands of jewels illumine the curve of your throat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m making jewelry for you, gold and silver jewelry
- type: usfm
  marker: q2
  children:
  - type: text
    text: that will mark and accent your beauty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: When my King-Lover lay down beside me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my fragrance filled the room.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His head resting between my breasts—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the head of my lover was a sachet of sweet myrrh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My beloved is a bouquet of wildflowers
- type: usfm
  marker: q2
  children:
  - type: text
    text: picked just for me from the fields of En Gedi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Man
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Oh, my dear friend! You’re so beautiful!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And your eyes so beautiful—like doves!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: And you, my dear lover—you’re so handsome!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the bed we share is like a forest glen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We enjoy a canopy of cedars
- type: usfm
  marker: q2
  children:
  - type: text
    text: enclosed by cypresses, fragrant and green.
