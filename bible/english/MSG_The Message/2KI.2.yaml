document_id: 2KI.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' took Elijah to heaven in a whirlwind, Elijah and Elisha were on a walk out of Gilgal. Elijah said to Elisha, “Stay here. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has sent me on an errand to Bethel.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “Not on your life! I’m not letting you out of my sight!” So they both went to Bethel.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “That’s a hard one!” said Elijah. “But if you’re watching when I’m taken from you, you’ll get what you’ve asked for. But only if you’re watching.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so it happened. They were walking along and talking. Suddenly a chariot and horses of fire came between them and Elijah went up in a whirlwind to heaven. Elisha saw it all and shouted, “My father, my father! You—the chariot and cavalry of Israel!” When he could no longer see anything, he grabbed his robe and ripped it to pieces. Then he picked up Elijah’s cloak that had fallen from him, returned to the shore of the Jordan, and stood there. He took Elijah’s cloak—all that was left of Elijah!—and hit the river with it, saying, “Now where is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of Elijah? Where is he?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he struck the water, the river divided and Elisha walked through.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The guild of prophets from Jericho saw the whole thing from where they were standing. They said, “The spirit of Elijah lives in Elisha!” They welcomed and honored him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They then said, “We’re at your service. We have fifty reliable men here; let’s send them out to look for your master. Maybe '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s spirit has swept him off to some mountain or dropped him into a remote ravine.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “No. Don’t send them.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they pestered him until he caved in: “Go ahead then. Send them.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they sent the fifty men off. For three days they looked, searching high and low. Nothing.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finally, they returned to Elisha in Jericho. He told them, “So there—didn’t I tell you?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day the men of the city said to Elisha, “You can see for yourself, master, how well our city is located. But the water is polluted and nothing grows.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Bring me a brand-new bowl and put some salt in it.” They brought it to him.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He then went to the spring, sprinkled the salt into it, and proclaimed, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s word: I’ve healed this water. It will no longer kill you or poison your land.” And sure enough, the water was healed—and remains so to this day, just as Elisha said.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Another time, Elisha was on his way to Bethel and some little kids came out from the town and taunted him, “What’s up, old baldhead! Out of our way, skinhead!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha turned, took one look at them, and cursed them in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Two bears charged out of the underbrush and knocked them about, ripping them limb from limb—forty-two children in all!
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha went on to Mount Carmel, and then returned to Samaria.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The guild of prophets at Bethel met Elisha and said, “Did you know that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is going to take your master away from you today?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” he said, “I know it. But keep it quiet.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elijah said to Elisha, “Stay here. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has sent me on an errand to Jericho.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “Not on your life! I’m not letting you out of my sight!” So they both went to Jericho.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The guild of prophets at Jericho came to Elisha and said, “Did you know that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is going to take your master away from you today?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” he said, “I know it. But keep it quiet.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elijah said to Elisha, “Stay here. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has sent me on an errand to the Jordan.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “Not on your life! I’m not letting you out of my sight!” And so the two of them went their way together.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, fifty men from the guild of prophets gathered some distance away while the two of them stood at the Jordan.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elijah took his cloak, rolled it up, and hit the water with it. The river divided and the two men walked through on dry land.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they reached the other side, Elijah said to Elisha, “What can I do for you before I’m taken from you? Ask anything.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “Your life repeated in my life. I want to be a holy man just like you.”
