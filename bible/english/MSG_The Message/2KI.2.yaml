verses:
  '1':
  - type: text
    content: 'Just before '
  - type: text
    content: God
  - type: text
    content: ' took Elijah to heaven in a whirlwind, Elijah and Elisha were on a walk out of Gilgal. Elijah said to Elisha, “Stay here. '
  - type: text
    content: God
  - type: text
    content: ' has sent me on an errand to Bethel.”'
  - type: text
    content: Elisha said, “Not on your life! I’m not letting you out of my sight!” So they both went to Bethel.
  '10':
  - type: text
    content: “That’s a hard one!” said Elijah. “But if you’re watching when I’m taken from you, you’ll get what you’ve asked for. But only if you’re watching.”
  '11':
  - type: text
    content: 'And so it happened. They were walking along and talking. Suddenly a chariot and horses of fire came between them and Elijah went up in a whirlwind to heaven. Elisha saw it all and shouted, “My father, my father! You—the chariot and cavalry of Israel!” When he could no longer see anything, he grabbed his robe and ripped it to pieces. Then he picked up Elijah’s cloak that had fallen from him, returned to the shore of the Jordan, and stood there. He took Elijah’s cloak—all that was left of Elijah!—and hit the river with it, saying, “Now where is the '
  - type: text
    content: God
  - type: text
    content: ' of Elijah? Where is he?”'
  - type: text
    content: When he struck the water, the river divided and Elisha walked through.
  '15':
  - type: text
    content: The guild of prophets from Jericho saw the whole thing from where they were standing. They said, “The spirit of Elijah lives in Elisha!” They welcomed and honored him.
  '16':
  - type: text
    content: 'They then said, “We’re at your service. We have fifty reliable men here; let’s send them out to look for your master. Maybe '
  - type: text
    content: God
  - type: text
    content: ’s spirit has swept him off to some mountain or dropped him into a remote ravine.”
  - type: text
    content: Elisha said, “No. Don’t send them.”
  '17':
  - type: text
    content: 'But they pestered him until he caved in: “Go ahead then. Send them.”'
  - type: text
    content: So they sent the fifty men off. For three days they looked, searching high and low. Nothing.
  '18':
  - type: text
    content: Finally, they returned to Elisha in Jericho. He told them, “So there—didn’t I tell you?”
  '19':
  - type: text
    content: One day the men of the city said to Elisha, “You can see for yourself, master, how well our city is located. But the water is polluted and nothing grows.”
  '20':
  - type: text
    content: He said, “Bring me a brand-new bowl and put some salt in it.” They brought it to him.
  '21':
  - type: text
    content: He then went to the spring, sprinkled the salt into it, and proclaimed, “
  - type: text
    content: God
  - type: text
    content: '’s word: I’ve healed this water. It will no longer kill you or poison your land.” And sure enough, the water was healed—and remains so to this day, just as Elisha said.'
  '23':
  - type: text
    content: Another time, Elisha was on his way to Bethel and some little kids came out from the town and taunted him, “What’s up, old baldhead! Out of our way, skinhead!”
  '24':
  - type: text
    content: 'Elisha turned, took one look at them, and cursed them in the name of '
  - type: text
    content: God
  - type: text
    content: . Two bears charged out of the underbrush and knocked them about, ripping them limb from limb—forty-two children in all!
  '25':
  - type: text
    content: Elisha went on to Mount Carmel, and then returned to Samaria.
  '3':
  - type: text
    content: 'The guild of prophets at Bethel met Elisha and said, “Did you know that '
  - type: text
    content: God
  - type: text
    content: ' is going to take your master away from you today?”'
  - type: text
    content: “Yes,” he said, “I know it. But keep it quiet.”
  '4':
  - type: text
    content: 'Then Elijah said to Elisha, “Stay here. '
  - type: text
    content: God
  - type: text
    content: ' has sent me on an errand to Jericho.”'
  - type: text
    content: Elisha said, “Not on your life! I’m not letting you out of my sight!” So they both went to Jericho.
  '5':
  - type: text
    content: 'The guild of prophets at Jericho came to Elisha and said, “Did you know that '
  - type: text
    content: God
  - type: text
    content: ' is going to take your master away from you today?”'
  - type: text
    content: “Yes,” he said, “I know it. But keep it quiet.”
  '6':
  - type: text
    content: 'Then Elijah said to Elisha, “Stay here. '
  - type: text
    content: God
  - type: text
    content: ' has sent me on an errand to the Jordan.”'
  - type: text
    content: Elisha said, “Not on your life! I’m not letting you out of my sight!” And so the two of them went their way together.
  '7':
  - type: text
    content: Meanwhile, fifty men from the guild of prophets gathered some distance away while the two of them stood at the Jordan.
  '8':
  - type: text
    content: Elijah took his cloak, rolled it up, and hit the water with it. The river divided and the two men walked through on dry land.
  '9':
  - type: text
    content: When they reached the other side, Elijah said to Elisha, “What can I do for you before I’m taken from you? Ask anything.”
  - type: text
    content: Elisha said, “Your life repeated in my life. I want to be a holy man just like you.”
