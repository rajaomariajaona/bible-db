document_id: NUM.26,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Census on the Plains of Moab
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'After the plague '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses and Eleazar son of Aaron the priest, “Number the entire community of Israel by families—count every person who is twenty years and older who is able to serve in the army of Israel.”'
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: 'The sons of Simeon by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Nemuel and the Nemuelite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jamin and the Jaminite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jakin and the Jakinite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zerah and the Zerahite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shaul and the Shaulite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Simeon. They numbered 22,200 men.
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-18
    - type: text
      text: 'The sons of Gad by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zephon and the Zephonite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Haggi and the Haggite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shuni and the Shunite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ozni and the Oznite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eri and the Erite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Arodi and the Arodite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Areli and the Arelite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Gad. They numbered 40,500 men.
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-22
    - type: text
      text: 'Er and Onan were sons of Judah who died early on in Canaan. The sons of Judah by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shelah and the Shelanite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Perez and the Perezite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zerah and the Zerahite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The sons of Perez:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hezron and the Hezronite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hamul and the Hamulite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Judah. They numbered 76,500.
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: 'The sons of Issachar by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Tola and the Tolaite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Puah and the Puite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jashub and the Jashubite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shimron and the Shimronite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Issachar. They numbered 64,300.
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: 'The sons of Zebulun by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Sered and the Seredite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Elon and the Elonite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jahleel and the Jahleelite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Zebulun. They numbered 60,500.
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-34
    - type: text
      text: 'The sons of Joseph by clans through Manasseh and Ephraim. Through Manasseh:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Makir and the Makirite clan
  - type: usfm
    marker: li1
    children:
    - type: text
      text: (now Makir was the father of Gilead),
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Gilead and the Gileadite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The sons of Gilead:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Iezer and the Iezerite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Helek and the Helekite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Asriel and the Asrielite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shechem and the Shechemite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shemida and the Shemidaite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hepher and the Hepherite clan.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zelophehad son of Hepher had no sons, only daughters.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Their names were Mahlah, Noah, Hoglah, Milcah, and Tirzah.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Manasseh. They numbered 52,700.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4a
    - type: text
      text: ' Obeying '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s command, Moses and Eleazar the priest addressed them on the Plains of Moab at Jordan-Jericho: “Count off from age twenty and older.”'
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-37
    - type: text
      text: 'The sons of Ephraim by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shuthelah and the Shuthelahite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Beker and the Bekerite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Tahan and the Tahanite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The sons of Shuthelah:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eran and the Eranite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Ephraim. They numbered 32,500.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are all the sons of Joseph by their clans.
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 38-41
    - type: text
      text: 'The sons of Benjamin by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Bela and the Belaite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ashbel and the Ashbelite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahiram and the Ahiramite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shupham and the Shuphamite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hupham and the Huphamite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The sons of Bela through Ard and Naaman:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ard and the Ardite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Naaman and the Naamite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Benjamin. They numbered 45,600.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4b-7
    - type: text
      text: ' The People of Israel who came out of the land of Egypt:'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Reuben, Israel’s firstborn. The sons of Reuben were:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hanoch and the Hanochite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Pallu and the Palluite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hezron and the Hezronite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Carmi and the Carmite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These made up the Reubenite clans. They numbered 43,730.
  '42':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 42-43
    - type: text
      text: 'The sons of Dan by clan:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shuham and the Shuhamite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These are the clans of Dan, all Shuhamite clans. They numbered 64,400.
  '44':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 44-47
    - type: text
      text: 'The sons of Asher by clan:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Imnah and the Imnite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ishvi and the Ishvite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Beriah and the Beriite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The sons of Beriah:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Heber and the Heberite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Malkiel and the Malkielite clan.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Asher also had a daughter, Serah.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Asher. They numbered 53,400.
  '48':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 48-50
    - type: text
      text: 'The sons of Naphtali by clans:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jahzeel and the Jahzeelite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Guni and the Gunite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jezer and the Jezerite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shillem and the Shillemite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the clans of Naphtali. They numbered 45,400.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'The total number of the People of Israel: 601,730.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 52-54
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Divide up the inheritance of the land based on population. A larger group gets a larger inheritance; a smaller group gets a smaller inheritance—each gets its inheritance based on the population count.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 55-56
    - type: text
      text: “Make sure that the land is assigned by lot.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Each group’s inheritance is based on population, the number of names listed in its ancestral tribe, divided among the many and the few by lot.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 57-58a
    - type: text
      text: ' These are the numberings of the Levites by clan:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Gershon and the Gershonite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kohath and the Kohathite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Merari and the Merarite clan.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Levite clans also included:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Libnite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Hebronite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Mahlite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Mushite clan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Korahite clan.
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 58b-61
    - type: text
      text: ' Kohath was the father of Amram. Amram’s wife was Jochebed, a descendant of Levi, born into the Levite family during the Egyptian years. Jochebed bore Aaron, Moses, and their sister Miriam to Amram. Aaron was the father of Nadab and Abihu, Eleazar and Ithamar; however, Nadab and Abihu died when they offered unauthorized sacrifice in the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: The numbering of Levite males one month and older came to 23,000. They hadn’t been counted in with the rest of the People of Israel because they didn’t inherit any land.
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 63-65
    - type: text
      text: 'These are the ones numbered by Moses and Eleazar the priest, the People of Israel counted in the Plains of Moab at Jordan-Jericho. Not one of them had been among those counted by Moses and Aaron the priest in the census of the People of Israel taken in the Wilderness of Sinai. For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had said of them, “They’ll die, die in the wilderness—not one of them will be left except for Caleb son of Jephunneh, and Joshua son of Nun.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The son of Pallu: Eliab.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: 'The sons of Eliab: Nemuel, Dathan, and Abiram. (These were the same Dathan and Abiram, community leaders from Korah’s gang, who rebelled against Moses and Aaron in the Korah Rebellion against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . The Earth opened its jaws and swallowed them along with Korah’s gang who died when the fire ate them up, all 250 of them. After all these years, they’re still a warning sign. But the line of Korah did not die out.)
