document_id: NUM.26,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Census on the Plains of Moab
  - type: text
    content: 'After the plague '
  - type: text
    content: God
  - type: text
    content: ' said to Moses and Eleazar son of Aaron the priest, “Number the entire community of Israel by families—count every person who is twenty years and older who is able to serve in the army of Israel.”'
  '12':
  - type: text
    content: 'The sons of Simeon by clans:'
  - type: text
    content: Nemuel and the Nemuelite clan,
  - type: text
    content: Jamin and the Jaminite clan,
  - type: text
    content: Jakin and the Jakinite clan,
  - type: text
    content: Zerah and the Zerahite clan,
  - type: text
    content: Shaul and the Shaulite clan.
  - type: text
    content: These were the clans of Simeon. They numbered 22,200 men.
  '15':
  - type: text
    content: 'The sons of Gad by clans:'
  - type: text
    content: Zephon and the Zephonite clan,
  - type: text
    content: Haggi and the Haggite clan,
  - type: text
    content: Shuni and the Shunite clan,
  - type: text
    content: Ozni and the Oznite clan,
  - type: text
    content: Eri and the Erite clan,
  - type: text
    content: Arodi and the Arodite clan,
  - type: text
    content: Areli and the Arelite clan.
  - type: text
    content: These were the clans of Gad. They numbered 40,500 men.
  '19':
  - type: text
    content: 'Er and Onan were sons of Judah who died early on in Canaan. The sons of Judah by clans:'
  - type: text
    content: Shelah and the Shelanite clan,
  - type: text
    content: Perez and the Perezite clan,
  - type: text
    content: Zerah and the Zerahite clan.
  - type: text
    content: 'The sons of Perez:'
  - type: text
    content: Hezron and the Hezronite clan,
  - type: text
    content: Hamul and the Hamulite clan.
  - type: text
    content: These were the clans of Judah. They numbered 76,500.
  '23':
  - type: text
    content: 'The sons of Issachar by clans:'
  - type: text
    content: Tola and the Tolaite clan,
  - type: text
    content: Puah and the Puite clan,
  - type: text
    content: Jashub and the Jashubite clan,
  - type: text
    content: Shimron and the Shimronite clan.
  - type: text
    content: These were the clans of Issachar. They numbered 64,300.
  '26':
  - type: text
    content: 'The sons of Zebulun by clans:'
  - type: text
    content: Sered and the Seredite clan,
  - type: text
    content: Elon and the Elonite clan,
  - type: text
    content: Jahleel and the Jahleelite clan.
  - type: text
    content: These were the clans of Zebulun. They numbered 60,500.
  '28':
  - type: text
    content: 'The sons of Joseph by clans through Manasseh and Ephraim. Through Manasseh:'
  - type: text
    content: Makir and the Makirite clan
  - type: text
    content: (now Makir was the father of Gilead),
  - type: text
    content: Gilead and the Gileadite clan.
  - type: text
    content: 'The sons of Gilead:'
  - type: text
    content: Iezer and the Iezerite clan,
  - type: text
    content: Helek and the Helekite clan,
  - type: text
    content: Asriel and the Asrielite clan,
  - type: text
    content: Shechem and the Shechemite clan,
  - type: text
    content: Shemida and the Shemidaite clan,
  - type: text
    content: Hepher and the Hepherite clan.
  - type: text
    content: Zelophehad son of Hepher had no sons, only daughters.
  - type: text
    content: Their names were Mahlah, Noah, Hoglah, Milcah, and Tirzah.
  - type: text
    content: These were the clans of Manasseh. They numbered 52,700.
  '3':
  - type: text
    content: ' Obeying '
  - type: text
    content: God
  - type: text
    content: '’s command, Moses and Eleazar the priest addressed them on the Plains of Moab at Jordan-Jericho: “Count off from age twenty and older.”'
  '35':
  - type: text
    content: 'The sons of Ephraim by clans:'
  - type: text
    content: Shuthelah and the Shuthelahite clan,
  - type: text
    content: Beker and the Bekerite clan,
  - type: text
    content: Tahan and the Tahanite clan.
  - type: text
    content: 'The sons of Shuthelah:'
  - type: text
    content: Eran and the Eranite clan.
  - type: text
    content: These were the clans of Ephraim. They numbered 32,500.
  - type: text
    content: These are all the sons of Joseph by their clans.
  '38':
  - type: text
    content: 'The sons of Benjamin by clans:'
  - type: text
    content: Bela and the Belaite clan,
  - type: text
    content: Ashbel and the Ashbelite clan,
  - type: text
    content: Ahiram and the Ahiramite clan,
  - type: text
    content: Shupham and the Shuphamite clan,
  - type: text
    content: Hupham and the Huphamite clan.
  - type: text
    content: 'The sons of Bela through Ard and Naaman:'
  - type: text
    content: Ard and the Ardite clan,
  - type: text
    content: Naaman and the Naamite clan.
  - type: text
    content: These were the clans of Benjamin. They numbered 45,600.
  '4':
  - type: text
    content: ' The People of Israel who came out of the land of Egypt:'
  - type: text
    content: 'Reuben, Israel’s firstborn. The sons of Reuben were:'
  - type: text
    content: Hanoch and the Hanochite clan,
  - type: text
    content: Pallu and the Palluite clan,
  - type: text
    content: Hezron and the Hezronite clan,
  - type: text
    content: Carmi and the Carmite clan.
  - type: text
    content: These made up the Reubenite clans. They numbered 43,730.
  '42':
  - type: text
    content: 'The sons of Dan by clan:'
  - type: text
    content: Shuham and the Shuhamite clan.
  - type: text
    content: These are the clans of Dan, all Shuhamite clans. They numbered 64,400.
  '44':
  - type: text
    content: 'The sons of Asher by clan:'
  - type: text
    content: Imnah and the Imnite clan,
  - type: text
    content: Ishvi and the Ishvite clan,
  - type: text
    content: Beriah and the Beriite clan.
  - type: text
    content: 'The sons of Beriah:'
  - type: text
    content: Heber and the Heberite clan,
  - type: text
    content: Malkiel and the Malkielite clan.
  - type: text
    content: Asher also had a daughter, Serah.
  - type: text
    content: These were the clans of Asher. They numbered 53,400.
  '48':
  - type: text
    content: 'The sons of Naphtali by clans:'
  - type: text
    content: Jahzeel and the Jahzeelite clan,
  - type: text
    content: Guni and the Gunite clan,
  - type: text
    content: Jezer and the Jezerite clan,
  - type: text
    content: Shillem and the Shillemite clan.
  - type: text
    content: These were the clans of Naphtali. They numbered 45,400.
  '51':
  - type: text
    content: 'The total number of the People of Israel: 601,730.'
  - type: text
    content: '* * *'
  '52':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Divide up the inheritance of the land based on population. A larger group gets a larger inheritance; a smaller group gets a smaller inheritance—each gets its inheritance based on the population count.'
  '55':
  - type: text
    content: “Make sure that the land is assigned by lot.
  - type: text
    content: “Each group’s inheritance is based on population, the number of names listed in its ancestral tribe, divided among the many and the few by lot.”
  - type: text
    content: '* * *'
  '57':
  - type: text
    content: ' These are the numberings of the Levites by clan:'
  - type: text
    content: Gershon and the Gershonite clan,
  - type: text
    content: Kohath and the Kohathite clan,
  - type: text
    content: Merari and the Merarite clan.
  - type: text
    content: 'The Levite clans also included:'
  - type: text
    content: the Libnite clan,
  - type: text
    content: the Hebronite clan,
  - type: text
    content: the Mahlite clan,
  - type: text
    content: the Mushite clan,
  - type: text
    content: the Korahite clan.
  '58':
  - type: text
    content: ' Kohath was the father of Amram. Amram’s wife was Jochebed, a descendant of Levi, born into the Levite family during the Egyptian years. Jochebed bore Aaron, Moses, and their sister Miriam to Amram. Aaron was the father of Nadab and Abihu, Eleazar and Ithamar; however, Nadab and Abihu died when they offered unauthorized sacrifice in the presence of '
  - type: text
    content: God
  - type: text
    content: .
  '62':
  - type: text
    content: The numbering of Levite males one month and older came to 23,000. They hadn’t been counted in with the rest of the People of Israel because they didn’t inherit any land.
  '63':
  - type: text
    content: 'These are the ones numbered by Moses and Eleazar the priest, the People of Israel counted in the Plains of Moab at Jordan-Jericho. Not one of them had been among those counted by Moses and Aaron the priest in the census of the People of Israel taken in the Wilderness of Sinai. For '
  - type: text
    content: God
  - type: text
    content: ' had said of them, “They’ll die, die in the wilderness—not one of them will be left except for Caleb son of Jephunneh, and Joshua son of Nun.”'
  '8':
  - type: text
    content: 'The son of Pallu: Eliab.'
  '9':
  - type: text
    content: 'The sons of Eliab: Nemuel, Dathan, and Abiram. (These were the same Dathan and Abiram, community leaders from Korah’s gang, who rebelled against Moses and Aaron in the Korah Rebellion against '
  - type: text
    content: God
  - type: text
    content: . The Earth opened its jaws and swallowed them along with Korah’s gang who died when the fire ate them up, all 250 of them. After all these years, they’re still a warning sign. But the line of Korah did not die out.)
