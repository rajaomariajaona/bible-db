verses:
  '1':
  - type: heading
    content: The Lion Has Roared
  - type: text
    content: 'Listen to this, Israel. '
  - type: text
    content: God
  - type: text
    content: ' is calling you to account—and I mean '
  - type: text
    content: all
  - type: text
    content: ' of you, everyone connected with the family that he delivered out of Egypt. Listen!'
  '12':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “In the same way that a shepherd
  - type: text
    content: trying to save a lamb from a lion
  - type: text
    content: Manages to recover
  - type: text
    content: just a pair of legs or the scrap of an ear,
  - type: text
    content: So will little be saved of the Israelites
  - type: text
    content: who live in Samaria—
  - type: text
    content: A couple of old chairs at most,
  - type: text
    content: the broken leg of a table.
  '13':
  - type: text
    content: “Listen and bring witness against Jacob’s family”—
  - type: text
    content: 'this is God’s Word, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: text
    content: “Note well! The day I make Israel pay for its sins,
  - type: text
    content: pay for the sin-altars of worship at Bethel,
  - type: text
    content: The horned altars will all be dehorned
  - type: text
    content: and scattered around.
  - type: text
    content: I’ll tear down the winter palace,
  - type: text
    content: smash the summer palace—all your fancy buildings.
  - type: text
    content: The luxury homes will be demolished,
  - type: text
    content: all those pretentious houses.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '2':
  - type: text
    content: “Out of all the families on earth,
  - type: text
    content: 'I picked '
  - type: text
    content: you.
  - type: text
    content: Therefore, because of your special calling,
  - type: text
    content: I’m holding you responsible for all your sins.”
  '3':
  - type: text
    content: Do two people walk hand in hand
  - type: text
    content: if they aren’t going to the same place?
  - type: text
    content: Does a lion roar in the forest
  - type: text
    content: if there’s no carcass to devour?
  - type: text
    content: Does a young lion growl with pleasure
  - type: text
    content: if he hasn’t caught his supper?
  - type: text
    content: Does a bird fall to the ground
  - type: text
    content: if it hasn’t been hit with a stone?
  - type: text
    content: Does a trap spring shut
  - type: text
    content: if nothing trips it?
  - type: text
    content: When the alarm goes off in the city,
  - type: text
    content: aren’t people alarmed?
  - type: text
    content: And when disaster strikes the city,
  - type: text
    content: 'doesn’t '
  - type: text
    content: God
  - type: text
    content: ' stand behind it?'
  - type: text
    content: 'The fact is, '
  - type: text
    content: God
  - type: text
    content: ', the Master, does nothing'
  - type: text
    content: without first telling his prophets the whole story.
  '8':
  - type: text
    content: The lion has roared—
  - type: text
    content: who isn’t frightened?
  - type: text
    content: God
  - type: text
    content: ' has spoken—'
  - type: text
    content: what prophet can keep quiet?
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: Announce to the forts of Assyria,
  - type: text
    content: announce to the forts of Egypt—
  - type: text
    content: 'Tell them, “Gather on the Samaritan mountains, take a good, hard look:'
  - type: text
    content: what a snake pit of brutality and terror!
  - type: text
    content: 'They can’t—or won’t—do one thing right.” '
  - type: text
    content: God
  - type: text
    content: ' said so.'
  - type: text
    content: “They stockpile violence and blight.
  - type: text
    content: 'Therefore”—this is '
  - type: text
    content: God
  - type: text
    content: ’s Word—“an enemy will surround the country.
  - type: text
    content: He’ll strip you of your power and plunder your forts.”
