document_id: AMO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lion Has Roared
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Listen to this, Israel. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is calling you to account—and I mean '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all
  - type: text
    text: ' of you, everyone connected with the family that he delivered out of Egypt. Listen!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Out of all the families on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I picked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, because of your special calling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m holding you responsible for all your sins.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-7
  - type: text
    text: Do two people walk hand in hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: if they aren’t going to the same place?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a lion roar in the forest
- type: usfm
  marker: q2
  children:
  - type: text
    text: if there’s no carcass to devour?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a young lion growl with pleasure
- type: usfm
  marker: q2
  children:
  - type: text
    text: if he hasn’t caught his supper?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a bird fall to the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: if it hasn’t been hit with a stone?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a trap spring shut
- type: usfm
  marker: q2
  children:
  - type: text
    text: if nothing trips it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the alarm goes off in the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: aren’t people alarmed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when disaster strikes the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'doesn’t '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stand behind it?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The fact is, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, does nothing'
- type: usfm
  marker: q2
  children:
  - type: text
    text: without first telling his prophets the whole story.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The lion has roared—
- type: usfm
  marker: q2
  children:
  - type: text
    text: who isn’t frightened?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has spoken—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: what prophet can keep quiet?
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: Announce to the forts of Assyria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: announce to the forts of Egypt—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tell them, “Gather on the Samaritan mountains, take a good, hard look:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: what a snake pit of brutality and terror!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They can’t—or won’t—do one thing right.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said so.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “They stockpile violence and blight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Therefore”—this is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Word—“an enemy will surround the country.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll strip you of your power and plunder your forts.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In the same way that a shepherd
- type: usfm
  marker: q2
  children:
  - type: text
    text: trying to save a lamb from a lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manages to recover
- type: usfm
  marker: q2
  children:
  - type: text
    text: just a pair of legs or the scrap of an ear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So will little be saved of the Israelites
- type: usfm
  marker: q2
  children:
  - type: text
    text: who live in Samaria—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A couple of old chairs at most,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the broken leg of a table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: “Listen and bring witness against Jacob’s family”—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'this is God’s Word, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Note well! The day I make Israel pay for its sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay for the sin-altars of worship at Bethel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The horned altars will all be dehorned
- type: usfm
  marker: q2
  children:
  - type: text
    text: and scattered around.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll tear down the winter palace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: smash the summer palace—all your fancy buildings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The luxury homes will be demolished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all those pretentious houses.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
