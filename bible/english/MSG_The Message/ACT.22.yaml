document_id: ACT.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “My dear brothers and fathers, listen carefully to what I have to say before you jump to conclusions about me.” When they heard him speaking Hebrew, they grew even quieter. No one wanted to miss a word of this.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then I said, ‘What do I do now, Master?’
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He said, ‘Get to your feet and enter Damascus. There you’ll be told everything that’s been set out for you to do.’ And so we entered Damascus, but nothing like the entrance I had planned—I was blind as a bat and my companions had to lead me in by the hand.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And that’s when I met Ananias, a man with a sterling reputation in observing our laws—the Jewish community in Damascus is unanimous on that score. He came and put his arm on my shoulder. ‘Look up,’ he said. I looked, and found myself looking right into his eyes—I could see again!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then he said, ‘The God of our ancestors has handpicked you to be briefed on his plan of action. You’ve actually seen the Righteous Innocent and heard him speak. You are to be a key witness to everyone you meet of what you’ve seen and heard. So what are you waiting for? Get up and get yourself baptized, scrubbed clean of those sins and personally acquainted with God.’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Well, it happened just as Ananias said. After I was back in Jerusalem and praying one day in the Temple, lost in the presence of God, I saw him, saw God’s Righteous Innocent, and heard him say to me, ‘Hurry up! Get out of here as quickly as you can. None of the Jews here in Jerusalem are going to accept what you say about me.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“At first I objected: ‘Who has better credentials? They all know how obsessed I was with hunting out those who believed in you, beating them up in the meeting places and throwing them in jail. And when your witness Stephen was murdered, I was right there, holding the coats of the murderers and cheering them on. And now they see me totally converted. What better qualification could I have?’'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He continued, “I am a good Jew, born in Tarsus in the province of Cilicia, but educated here in Jerusalem under the exacting eye of Rabbi Gamaliel, thoroughly instructed in our religious traditions. And I’ve always been passionately on God’s side, just as you are right now.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But he said, ‘Don’t argue. Go. I’m sending you on a long journey to outsider non-Jews.’”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Roman Citizen
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The people in the crowd had listened attentively up to this point, but now they broke loose, shouting out, “Kill him! He’s an insect! Stomp on him!” They shook their fists. They filled the air with curses. That’s when the captain intervened and ordered Paul taken into the barracks. By now the captain was thoroughly exasperated. He decided to interrogate Paul under torture in order to get to the bottom of this, to find out what he had done that provoked this outraged violence. As they spread-eagled him with strips of leather, getting him ready for the whip, Paul said to the centurion standing there, “Is this legal: torturing a Roman citizen without a fair trial?”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the centurion heard that, he went directly to the captain. “Do you realize what you’ve done? This man is a Roman citizen!”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The captain came back and took charge. “Is what I hear right? You’re a Roman citizen?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul said, “I certainly am.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The captain was impressed. “I paid a huge sum for my citizenship. How much did it cost you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Nothing,” said Paul. “It cost me nothing. I was free from the day of my birth.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That put a stop to the interrogation. And it put the fear of God into the captain. He had put a Roman citizen in chains and come within a whisker of putting him under torture!
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next day, determined to get to the root of the trouble and know for sure what was behind the Jewish accusation, the captain released Paul and ordered a meeting of the high priests and the High Council to see what they could make of it. Paul was led in and took his place before them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I went after anyone connected with this ‘Way,’ went at them with all my might, ready to kill for God. I rounded up men and women right and left and had them thrown in prison. You can ask the Chief Priest or anyone in the High Council to verify this; they all knew me well. Then I went off to our brothers in Damascus, armed with official documents authorizing me to hunt down the followers of Jesus there, arrest them, and bring them back to Jerusalem for sentencing.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As I arrived on the outskirts of Damascus about noon, a blinding light blazed out of the skies and I fell to the ground, dazed. I heard a voice: ‘Saul, Saul, why are you out to get me?’'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘Who are you, Master?’ I asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He said, ‘I am Jesus the Nazarene, the One you’re hunting down.’ My companions saw the light, but they didn’t hear the conversation.
