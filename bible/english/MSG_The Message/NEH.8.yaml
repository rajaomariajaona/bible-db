document_id: NEH.8
type_code: eng
segments:
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'By the time the seventh month arrived, the People of Israel were settled in their towns. Then all the people gathered as one person in the town square in front of the Water Gate and asked the scholar Ezra to bring the Book of The Revelation of Moses that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded for Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: So Ezra the priest brought The Revelation to the congregation, which was made up of both men and women—everyone capable of understanding. It was the first day of the seventh month. He read it facing the town square at the Water Gate from early dawn until noon in the hearing of the men and women, all who could understand it. And all the people listened—they were all ears—to the Book of The Revelation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The scholar Ezra stood on a wooden platform constructed for the occasion. He was flanked on the right by Mattithiah, Shema, Anaiah, Uriah, Hilkiah, and Maaseiah, and on the left by Pedaiah, Mishael, Malkijah, Hashum, Hashbaddanah, Zechariah, and Meshullam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'Ezra opened the book. Every eye was on him (he was standing on the raised platform) and as he opened the book everyone stood. Then Ezra praised '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the great God, and all the people responded, “Oh Yes! Yes!” with hands raised high. And then they fell to their knees in worship of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', their faces to the ground.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan, and Pelaiah, all Levites, explained The Revelation while people stood, listening respectfully. They translated the Book of The Revelation of God so the people could understand it and then explained the reading.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nehemiah the governor, along with Ezra the priest and scholar and the Levites who were teaching the people, said to all the people, “This day is holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Don’t weep and carry on.” They said this because all the people were weeping as they heard the words of The Revelation.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He continued, “Go home and prepare a feast, holiday food and drink; and share it with those who don’t have anything: This day is holy to God. Don’t feel bad. The joy of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is your strength!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The Levites calmed the people, “Quiet now. This is a holy day. Don’t be upset.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So the people went off to feast, eating and drinking and including the poor in a great celebration. Now they got it; they understood the reading that had been given to them.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: 'On the second day of the month the family heads of all the people, the priests, and the Levites gathered around Ezra the scholar to get a deeper understanding of the words of The Revelation. They found written in The Revelation that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded through Moses that the People of Israel are to live in booths during the festival of the seventh month. So they published this decree and had it posted in all their cities and in Jerusalem: “Go into the hills and collect olive branches, pine branches, myrtle branches, palm branches, and any other leafy branches to make booths, as it is written.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: So the people went out, brought in branches, and made themselves booths on their roofs, courtyards, the courtyards of The Temple of God, the Water Gate plaza, and the Ephraim Gate plaza. The entire congregation that had come back from exile made booths and lived in them. The People of Israel hadn’t done this from the time of Joshua son of Nun until that very day—a terrific day! Great joy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ezra read from the Book of The Revelation of God each day, from the first to the last day—they celebrated the feast for seven days. On the eighth day they held a solemn assembly in accordance with the decree.
