document_id: PSA.59,97
type_code: eng
verses:
  '1':
  - type: text
    content: My God! Rescue me from my enemies,
  - type: text
    content: defend me from these mutineers.
  - type: text
    content: Rescue me from their dirty tricks,
  - type: text
    content: save me from their hit men.
  '11':
  - type: text
    content: 'Don’t make quick work of them, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: lest my people forget.
  - type: text
    content: Bring them down in slow motion,
  - type: text
    content: take them apart piece by piece.
  - type: text
    content: Let all their mean-mouthed arrogance
  - type: text
    content: catch up with them,
  - type: text
    content: Catch them out and bring them down
  - type: text
    content: —every muttered curse
  - type: text
    content: —every barefaced lie.
  - type: text
    content: Finish them off in fine style!
  - type: text
    content: Finish them off for good!
  - type: text
    content: Then all the world will see
  - type: text
    content: that God rules well in Jacob,
  - type: text
    content: everywhere that God’s in charge.
  '14':
  - type: text
    content: They return when the sun goes down,
  - type: text
    content: They howl like coyotes, ringing the city.
  - type: text
    content: They scavenge for bones,
  - type: text
    content: And bite the hand that feeds them.
  '16':
  - type: text
    content: And me? I’m singing your prowess,
  - type: text
    content: shouting at dawn your largesse,
  - type: text
    content: For you’ve been a safe place for me,
  - type: text
    content: a good place to hide.
  - type: text
    content: Strong God, I’m watching you do it,
  - type: text
    content: I can always count on you—
  - type: text
    content: God, my dependable love.
  '3':
  - type: text
    content: ' Desperadoes have ganged up on me,'
  - type: text
    content: they’re hiding in ambush for me.
  - type: text
    content: 'I did nothing to deserve this, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: crossed no one, wronged no one.
  - type: text
    content: All the same, they’re after me,
  - type: text
    content: determined to get me.
  '4':
  - type: text
    content: ' Wake up and see for yourself! You’re '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: God
  - type: text
    content: -of-Angel-Armies, Israel’s God!
  - type: text
    content: Get on the job and take care of these pagans,
  - type: text
    content: don’t be soft on these hard cases.
  '6':
  - type: text
    content: They return when the sun goes down,
  - type: text
    content: They howl like coyotes, ringing the city.
  - type: text
    content: Then suddenly they’re all at the gate,
  - type: text
    content: Snarling invective, drawn daggers in their teeth.
  - type: text
    content: They think they’ll never get caught.
  '8':
  - type: text
    content: 'But you, '
  - type: text
    content: God
  - type: text
    content: ', break out laughing;'
  - type: text
    content: you treat the godless nations like jokes.
  - type: text
    content: Strong God, I’m watching you do it,
  - type: text
    content: I can always count on you.
  - type: text
    content: God in dependable love shows up on time,
  - type: text
    content: shows me my enemies in ruin.
