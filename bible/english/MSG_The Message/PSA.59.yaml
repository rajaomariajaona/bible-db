document_id: PSA.59,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: My God! Rescue me from my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: defend me from these mutineers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from their dirty tricks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save me from their hit men.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13
    - type: text
      text: 'Don’t make quick work of them, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lest my people forget.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring them down in slow motion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take them apart piece by piece.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all their mean-mouthed arrogance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: catch up with them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Catch them out and bring them down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —every muttered curse
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —every barefaced lie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Finish them off in fine style!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Finish them off for good!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then all the world will see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God rules well in Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everywhere that God’s in charge.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: They return when the sun goes down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They howl like coyotes, ringing the city.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They scavenge for bones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And bite the hand that feeds them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: And me? I’m singing your prowess,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shouting at dawn your largesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you’ve been a safe place for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a good place to hide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strong God, I’m watching you do it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can always count on you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God, my dependable love.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4a
    - type: text
      text: ' Desperadoes have ganged up on me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re hiding in ambush for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I did nothing to deserve this, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crossed no one, wronged no one.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the same, they’re after me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: determined to get me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4b-5
    - type: text
      text: ' Wake up and see for yourself! You’re '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-Angel-Armies, Israel’s God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get on the job and take care of these pagans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t be soft on these hard cases.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: They return when the sun goes down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They howl like coyotes, ringing the city.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then suddenly they’re all at the gate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Snarling invective, drawn daggers in their teeth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They think they’ll never get caught.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: 'But you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', break out laughing;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you treat the godless nations like jokes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strong God, I’m watching you do it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can always count on you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God in dependable love shows up on time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shows me my enemies in ruin.
