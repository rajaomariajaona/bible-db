document_id: EZK.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: When the Sheep Get Scattered
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, prophesy against the shepherd-leaders of Israel. Yes, prophesy! Tell those shepherds, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: Doom to you shepherds of Israel, feeding your own mouths! Aren’t shepherds supposed to feed sheep? You drink the milk, you make clothes from the wool, you roast the lambs, but you don’t feed the sheep. You don’t build up the weak ones, don’t heal the sick, don’t doctor the injured, don’t go after the strays, don’t look for the lost. You bully and badger them. And now they’re scattered every which way because there was no shepherd—scattered and easy pickings for wolves and coyotes. Scattered—'
  - type: usfm
    marker: it
    children:
    - type: text
      text: my sheep
  - type: text
    text: '!—exposed and vulnerable across mountains and hills. My sheep scattered all over the world, and no one out looking for them!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: '“‘Therefore, shepherds, listen to the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': As sure as I am the living God—Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master—because my sheep have been turned into mere prey, into easy meals for wolves because you shepherds ignored them and only fed yourselves, listen to what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has to say:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “‘Watch out! I’m coming down on the shepherds and taking my sheep back. They’re fired as shepherds of my sheep. No more shepherds who just feed themselves! I’ll rescue my sheep from their greed. They’re not going to feed off my sheep any longer!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-16
  - type: text
    text: “‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: From now on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I myself
  - type: text
    text: ' am the shepherd. I’m going looking for them. As shepherds go after their flocks when they get scattered, I’m going after my sheep. I’ll rescue them from all the places they’ve been scattered to in the storms. I’ll bring them back from foreign peoples, gather them from foreign countries, and bring them back to their home country. I’ll feed them on the mountains of Israel, along the streams, among their own people. I’ll lead them into lush pasture so they can roam the mountain pastures of Israel, graze at leisure, feed in the rich pastures on the mountains of Israel. And I myself will be the shepherd of my sheep. I myself will make sure they get plenty of rest. I’ll go after the lost, I’ll collect the strays, I’ll doctor the injured, I’ll build up the weak ones and oversee the strong ones so they’re not exploited.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: “‘And as for you, my dear flock, I’m stepping in and judging between one sheep and another, between rams and goats. Aren’t you satisfied to feed in good pasture without taking over the whole place? Can’t you be satisfied to drink from the clear stream without muddying the water with your feet? Why do the rest of my sheep have to make do with grass that’s trampled down and water that’s been muddied?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: '“‘Therefore, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: I myself am stepping in and making things right between the plump sheep and the skinny sheep. Because you forced your way with shoulder and rump and butted at all the weaker animals with your horns till you scattered them all over the hills, I’ll come in and save my dear flock, no longer let them be pushed around. I’ll step in and set things right between one sheep and another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: '“‘I’ll appoint one shepherd over them all: my servant David. He’ll feed them. He’ll be their shepherd. And I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', will be their God. My servant David will be their prince. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: '“‘I’ll make a covenant of peace with them. I’ll banish fierce animals from the country so the sheep can live safely in the wilderness and sleep in the forest. I’ll make them and everything around my hill a blessing. I’ll send down plenty of rain in season—showers of blessing! The trees in the orchards will bear fruit, the ground will produce, they’ll feel content and safe on their land, and they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' when I break them out of their slavery and rescue them from their slave masters.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: “‘No longer will they be exploited by outsiders and ravaged by fierce beasts. They’ll live safe and sound, fearless and free. I’ll give them rich gardens, lavish in vegetables—no more living half-starved, no longer taunted by outsiders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: '“‘They’ll know, beyond doubting, that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', am their God, that I’m with them and that they, the people Israel, are my people. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are my dear flock,
- type: usfm
  marker: q3
  children:
  - type: text
    text: the flock of my pasture, my human flock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I am your God.
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’”'
