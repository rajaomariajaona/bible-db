document_id: HOS.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Altars for Sinning
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: “Blow the trumpet! Sound the alarm!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Vultures are circling over God’s people
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who have broken my covenant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and defied my revelation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Predictably, Israel cries out, ‘My God! We know you!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: But they don’t act like it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel will have nothing to do with what’s good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now the enemy is after them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-10
  - type: text
    text: “They crown kings, but without asking me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They set up princes but don’t let me in on it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead, they make idols, using silver and gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: idols that will be their ruin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Throw that gold calf-god on the trash heap, Samaria!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m seething with anger against that rubbish!
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long before they shape up?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And they’re Israelites!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A sculptor made that thing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s not God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That Samaritan calf
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be broken to bits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at them! Planting wind-seeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll harvest tornadoes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wheat with no head
- type: usfm
  marker: q2
  children:
  - type: text
    text: produces no flour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And even if it did,
- type: usfm
  marker: q2
  children:
  - type: text
    text: strangers would gulp it down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel is swallowed up and spit out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Among the pagans they’re a piece of junk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They trotted off to Assyria:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why, even wild donkeys stick to their own kind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but donkey-Ephraim goes out and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pays
  - type: text
    text: ' to get lovers.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now, because of their whoring life among the pagans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m going to gather them together and confront them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re going to reap the consequences soon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: feel what it’s like to be oppressed by the big king.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: “Ephraim has built a lot of altars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then uses them for sinning.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you believe it? Altars for sinning!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I write out my revelation for them in detail
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they pretend they can’t read it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They offer sacrifices to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then they feast on the meat.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is not pleased!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m fed up—I’ll keep remembering their guilt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll punish their sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and send them back to Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel has forgotten his Maker
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gotten busy making palaces.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Judah has gone in for a lot of fortress cities.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m sending fire on their cities
- type: usfm
  marker: q2
  children:
  - type: text
    text: to burn down their fortifications.”
