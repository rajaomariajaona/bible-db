document_id: HOS.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Altars for Sinning
  - type: text
    content: “Blow the trumpet! Sound the alarm!
  - type: text
    content: Vultures are circling over God’s people
  - type: text
    content: Who have broken my covenant
  - type: text
    content: and defied my revelation.
  - type: text
    content: Predictably, Israel cries out, ‘My God! We know you!’
  - type: text
    content: But they don’t act like it.
  - type: text
    content: Israel will have nothing to do with what’s good,
  - type: text
    content: and now the enemy is after them.
  '11':
  - type: text
    content: “Ephraim has built a lot of altars,
  - type: text
    content: and then uses them for sinning.
  - type: text
    content: Can you believe it? Altars for sinning!
  - type: text
    content: I write out my revelation for them in detail
  - type: text
    content: and they pretend they can’t read it.
  - type: text
    content: They offer sacrifices to me
  - type: text
    content: and then they feast on the meat.
  - type: text
    content: God
  - type: text
    content: ' is not pleased!'
  - type: text
    content: I’m fed up—I’ll keep remembering their guilt.
  - type: text
    content: I’ll punish their sins
  - type: text
    content: and send them back to Egypt.
  - type: text
    content: Israel has forgotten his Maker
  - type: text
    content: and gotten busy making palaces.
  - type: text
    content: Judah has gone in for a lot of fortress cities.
  - type: text
    content: I’m sending fire on their cities
  - type: text
    content: to burn down their fortifications.”
  '4':
  - type: text
    content: “They crown kings, but without asking me.
  - type: text
    content: They set up princes but don’t let me in on it.
  - type: text
    content: Instead, they make idols, using silver and gold,
  - type: text
    content: idols that will be their ruin.
  - type: text
    content: Throw that gold calf-god on the trash heap, Samaria!
  - type: text
    content: I’m seething with anger against that rubbish!
  - type: text
    content: How long before they shape up?
  - type: text
    content: And they’re Israelites!
  - type: text
    content: A sculptor made that thing—
  - type: text
    content: it’s not God.
  - type: text
    content: That Samaritan calf
  - type: text
    content: will be broken to bits.
  - type: text
    content: Look at them! Planting wind-seeds,
  - type: text
    content: they’ll harvest tornadoes.
  - type: text
    content: Wheat with no head
  - type: text
    content: produces no flour.
  - type: text
    content: And even if it did,
  - type: text
    content: strangers would gulp it down.
  - type: text
    content: Israel is swallowed up and spit out.
  - type: text
    content: Among the pagans they’re a piece of junk.
  - type: text
    content: 'They trotted off to Assyria:'
  - type: text
    content: Why, even wild donkeys stick to their own kind,
  - type: text
    content: 'but donkey-Ephraim goes out and '
  - type: text
    content: pays
  - type: text
    content: ' to get lovers.'
  - type: text
    content: Now, because of their whoring life among the pagans,
  - type: text
    content: I’m going to gather them together and confront them.
  - type: text
    content: They’re going to reap the consequences soon,
  - type: text
    content: feel what it’s like to be oppressed by the big king.
