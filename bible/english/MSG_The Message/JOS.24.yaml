document_id: JOS.24,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant at Shechem
  - type: text
    content: ' Joshua called together all the tribes of Israel at Shechem. He called in the elders, chiefs, judges, and officers. They presented themselves before God. Then Joshua addressed all the people:'
  '11':
  - type: text
    content: “You then crossed the Jordan and came to Jericho. The Jericho leaders ganged up on you as well as the Amorites, Perizzites, Canaanites, Hittites, Girgashites, Hivites, and Jebusites, but I turned them over to you.
  '12':
  - type: text
    content: “I sent the Hornet ahead of you. It drove out the two Amorite kings—did your work for you. You didn’t have to do a thing, not so much as raise a finger.
  '13':
  - type: text
    content: “I handed you a land for which you did not work, towns you did not build. And here you are now living in them and eating from vineyards and olive groves you did not plant.
  '14':
  - type: text
    content: '“So now: Fear '
  - type: text
    content: God
  - type: text
    content: '. Worship him in total commitment. Get rid of the gods your ancestors worshiped on the far side of The River (the Euphrates) and in Egypt. You, worship '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: '“If you decide that it’s a bad thing to worship '
  - type: text
    content: God
  - type: text
    content: ', then choose a god you’d rather serve—and do it today. Choose one of the gods your ancestors worshiped from the country beyond The River, or one of the gods of the Amorites, on whose land you’re now living. As for me and my family, we’ll worship '
  - type: text
    content: God
  - type: text
    content: .”
  '16':
  - type: text
    content: 'The people answered, “We’d never forsake '
  - type: text
    content: God
  - type: text
    content: '! Never! We’d never leave '
  - type: text
    content: God
  - type: text
    content: ' to worship other gods.'
  '17':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' is our God! He brought up our ancestors from Egypt and from slave conditions. He did all those great signs while we watched. He has kept his eye on us all along the roads we’ve traveled and among the nations we’ve passed through. Just for us he drove out all the nations, Amorites and all, who lived in the land.'
  - type: text
    content: '“Count us in: We too are going to worship '
  - type: text
    content: God
  - type: text
    content: . He’s our God.”
  '19':
  - type: text
    content: 'Then Joshua told the people: “You can’t do it; you’re not able to worship '
  - type: text
    content: God
  - type: text
    content: '. He is a holy God. He is a jealous God. He won’t put up with your fooling around and sinning. When you leave '
  - type: text
    content: God
  - type: text
    content: ' and take up the worship of foreign gods, he’ll turn right around and come down on you hard. He’ll put an end to you—and after all the good he has done for you!”'
  '2':
  - type: text
    content: ' “This is what '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, says: A long time ago your ancestors, Terah and his sons Abraham and Nahor, lived to the east of the River Euphrates. They worshiped other gods. I took your ancestor Abraham from the far side of The River. I led him all over the land of Canaan and multiplied his descendants. I gave him Isaac. Then I gave Isaac Jacob and Esau. I let Esau have the mountains of Seir as home, but Jacob and his sons ended up in Egypt. I sent Moses and Aaron. I hit Egypt hard with plagues and then led you out of there. I brought your ancestors out of Egypt. You came to the sea, the Egyptians in hot pursuit with chariots and cavalry, to the very edge of the Red Sea!'
  '21':
  - type: text
    content: 'But the people told Joshua: “No! No! We worship '
  - type: text
    content: God
  - type: text
    content: '!”'
  '22':
  - type: text
    content: 'And so Joshua addressed the people: “You are witnesses against yourselves that you have chosen '
  - type: text
    content: God
  - type: text
    content: ' for yourselves—to worship him.”'
  - type: text
    content: And they said, “We are witnesses.”
  '23':
  - type: text
    content: 'Joshua said, “Now get rid of all the foreign gods you have with you. Say an unqualified Yes to '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel.”'
  '24':
  - type: text
    content: 'The people answered Joshua, “We will worship '
  - type: text
    content: God
  - type: text
    content: . What he says, we’ll do.”
  '25':
  - type: text
    content: 'Joshua completed a Covenant for the people that day there at Shechem. He made it official, spelling it out in detail. Joshua wrote out all the directions and regulations into the Book of The Revelation of God. Then he took a large stone and set it up under the oak that was in the holy place of '
  - type: text
    content: God
  - type: text
    content: .
  '27':
  - type: text
    content: 'Joshua spoke to all the people: “This stone is a witness against us. It has heard every word that '
  - type: text
    content: God
  - type: text
    content: ' has said to us. It is a standing witness against you lest you cheat on your God.”'
  '28':
  - type: text
    content: Then Joshua dismissed the people, each to his own place of inheritance.
  - type: text
    content: '* * *'
  '29':
  - type: text
    content: 'After all this, Joshua son of Nun, the servant of '
  - type: text
    content: God
  - type: text
    content: ', died. He was 110 years old. They buried him in the land of his inheritance at Timnath Serah in the mountains of Ephraim, north of Mount Gaash.'
  '31':
  - type: text
    content: 'Israel served '
  - type: text
    content: God
  - type: text
    content: ' through the lifetime of Joshua and of the elders who outlived him, who had themselves experienced all that '
  - type: text
    content: God
  - type: text
    content: ' had done for Israel.'
  '32':
  - type: text
    content: Joseph’s bones, which the People of Israel had brought from Egypt, they buried in Shechem in the plot of ground that Jacob had purchased from the sons of Hamor (who was the father of Shechem). He paid a hundred silver coins for it. It belongs to the inheritance of the family of Joseph.
  '33':
  - type: text
    content: Eleazar son of Aaron died. They buried him at Gibeah, which had been allotted to his son Phinehas in the mountains of Ephraim.
  '7':
  - type: text
    content: '“Then they cried out for help to '
  - type: text
    content: God
  - type: text
    content: . He put a cloud between you and the Egyptians and then let the sea loose on them. It drowned them.
  - type: text
    content: “You watched the whole thing with your own eyes, what I did to Egypt. And then you lived in the wilderness for a long time. I brought you to the country of the Amorites, who lived east of the Jordan, and they fought you. But I fought for you and you took their land. I destroyed them for you. Then Balak son of Zippor made his appearance. He was the king of Moab. He got ready to fight Israel by sending for Balaam son of Beor to come and curse you. But I wouldn’t listen to Balaam—he ended up blessing you over and over! I saved you from him.
