      text: Doomsday Deceivers
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: As he walked away from the Temple, one of his disciples said, “Teacher, look at that stonework! Those buildings!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “When they bring you, betrayed, into court, don’t worry about what you’ll say. When the time comes, say what’s on your heart—the Holy Spirit will make his witness in and through you.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “It’s going to be brother killing brother, father killing child, children killing parents. There’s no telling who will hate you because of me.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Stay with it—that’s what is required. Stay with it to the end. You won’t be sorry; you’ll be saved.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Run for the Hills
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“But be ready to run for it when you see the monster of desecration set up where it should '
    - type: usfm
      marker: it
      children:
      - type: text
        text: never
    - type: text
      text: ' be. You who can read, make sure you understand what I’m talking about. If you’re living in Judea at the time, run for the hills; if you’re working in the yard, don’t go back to the house to get anything; if you’re out in the field, don’t go back to get your coat. Pregnant and nursing mothers will have it especially hard. Hope and pray this won’t happen in the middle of winter.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “These are going to be hard days—nothing like it from the time God made the world right up to the present. And there’ll be nothing like it again. If he let the days of trouble run their course, nobody would make it. But because of God’s chosen people, those he personally chose, he has already intervened.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No One Knows the Day or Hour
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus said, “You’re impressed by this grandiose architecture? There’s not a stone in the whole works that is not going to end up in a heap of rubble.”
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “If anyone tries to flag you down, calling out, ‘Here’s the Messiah!’ or points, ‘There he is!’ don’t fall for it. Fake Messiahs and lying preachers are going to pop up everywhere. Their impressive credentials and bewitching performances will pull the wool over the eyes of even those who ought to know better. So watch out. I’ve given you fair warning.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Following those hard times,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sun will fade out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: moon cloud over,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stars fall out of the sky,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cosmic powers tremble.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And then they’ll see the Son of Man enter in grand style, his Arrival filling the sky—no one will miss it! He’ll dispatch the angels; they will pull in the chosen from the four winds, from pole to pole.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Take a lesson from the fig tree. From the moment you notice its buds form, the merest hint of green, you know summer’s just around the corner. And so it is with you. When you see all these things, you know he is at the door. Don’t take this lightly. I’m not just saying this for some future generation, but for this one, too—these things will happen. Sky and earth will wear out; my words won’t wear out.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Later, as he was sitting on Mount Olives in full view of the Temple, Peter, James, John, and Andrew got him off by himself and asked, “Tell us, when is this going to happen? What sign will we get that things are coming to a head?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But the exact day and hour? No one knows that, not even heaven’s angels, not even the Son. Only the Father. So keep a sharp lookout, for you don’t know the timetable. It’s like a man who takes a trip, leaving home and putting his servants in charge, each assigned a task, and commanding the gatekeeper to stand watch. So, stay at your post, watching. You have no idea when the homeowner is returning, whether evening, midnight, cockcrow, or morning. You don’t want him showing up unannounced, with you asleep on the job. I say it to you, and I’m saying it to all: Stay at your post. Keep watch.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus began, “Watch out for doomsday deceivers. Many leaders are going to show up with forged identities claiming, ‘I’m the One.’ They will deceive a lot of people. When you hear of wars and rumored wars, keep your head and don’t panic. This is routine history, and no sign of the end. Nation will fight nation and ruler fight ruler, over and over. Earthquakes will occur in various places. There will be famines. But these things are nothing compared to what’s coming.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And watch out! They’re going to drag you into court. And then it will go from bad to worse, dog-eat-dog, everyone at your throat because you carry my name. You’re placed there as sentinels to truth. The Message has to be preached all across the world.
