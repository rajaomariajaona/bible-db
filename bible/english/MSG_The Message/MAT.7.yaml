verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Simple Guide for Behavior
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: “Don’t pick on people, jump on their failures, criticize their faults—unless, of course, you want the same treatment. That critical spirit has a way of boomeranging. It’s easy to see a smudge on your neighbor’s face and be oblivious to the ugly sneer on your own. Do you have the nerve to say, ‘Let me wash your face for you,’ when your own face is distorted by contempt? It’s this whole traveling road-show mentality all over again, playing a holier-than-thou part instead of just living your part. Wipe that ugly sneer off your own face, and you might be fit to offer a washcloth to your neighbor.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Here is a simple, rule-of-thumb guide for behavior: Ask yourself what you want people to do for you, then grab the initiative and do it for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: . Add up God’s Law and Prophets and this is what you get.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Being and Doing
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: “Don’t look for shortcuts to God. The market is flooded with surefire, easygoing formulas for a successful life that can be practiced in your spare time. Don’t fall for that stuff, even though crowds of people do. The way to life—to God!—is vigorous and requires total attention.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-20
    - type: text
      text: '“Be wary of false preachers who smile a lot, dripping with practiced sincerity. Chances are they are out to rip you off some way or other. Don’t be impressed with charisma; look for character. Who preachers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' is the main thing, not what they say. A genuine leader will never exploit your emotions or your pocketbook. These diseased trees with their bad apples are going to be chopped down and burned.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: “Knowing the correct password—saying ‘Master, Master,’ for instance—isn’t going to get you anywhere with me. What is required is serious obedience—
    - type: usfm
      marker: it
      children:
      - type: text
        text: doing
    - type: text
      text: ' what my Father wills. I can see it now—at the Final Judgment thousands strutting up to me and saying, ‘Master, we preached the Message, we bashed the demons, our super-spiritual projects had everyone talking.’ And do you know what I am going to say? ‘You missed the boat. All you did was use me to make yourselves important. You don’t impress me one bit. You’re out of here.’'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: “These words I speak to you are not incidental additions to your life, homeowner improvements to your standard of living. They are foundational words, words to build a life on. If you work these words into your life, you are like a smart carpenter who built his house on solid rock. Rain poured down, the river flooded, a tornado hit—but nothing moved that house. It was fixed to the rock.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: “But if you just use my words in Bible studies and don’t work them into your life, you are like a stupid carpenter who built his house on the sandy beach. When a storm rolled in and the waves came up, it collapsed like a house of cards.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: When Jesus concluded his address, the crowd burst into applause. They had never heard teaching like this. It was apparent that he was living everything he was saying—quite a contrast to their religion teachers! This was the best teaching they had ever heard.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Don’t be flip with the sacred. Banter and silliness give no honor to God. Don’t reduce holy mysteries to slogans. In trying to be relevant, you’re only being cute and inviting sacrilege.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-11
    - type: text
      text: “Don’t bargain with God. Be direct. Ask for what you need. This isn’t a cat-and-mouse, hide-and-seek game we’re in. If your child asks for bread, do you trick him with sawdust? If he asks for fish, do you scare him with a live snake on his plate? As bad as you are, you wouldn’t think of such a thing. You’re at least decent to your own children. So don’t you think the God who conceived you in love will be even better?
