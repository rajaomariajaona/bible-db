- type: usfm
  marker: s1
  children:
  - type: text
    text: Leadership in the Church
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: 'If anyone wants to provide leadership in the church, good! But there are preconditions: A leader must be well-thought-of, committed to his wife, cool and collected, accessible, and hospitable. He must know what he’s talking about, not be overfond of wine, not pushy but gentle, not thin-skinned, not money-hungry. He must handle his own affairs well, attentive to his own children and having their respect. For if someone is unable to handle his own affairs, how can he take care of God’s church? He must not be a new believer, lest the position go to his head and the Devil trip him up. Outsiders must think well of him, or else the Devil will figure out a way to lure him into his trap.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-13
  - type: text
    text: 'The same goes for those who want to be servants in the church: serious, not deceitful, not too free with the bottle, not in it for what they can get out of it. They must be reverent before the mystery of the faith, not using their position to try to run things. Let them prove themselves first. If they show they can do it, take them on. No exceptions are to be made for women—same qualifications: serious, dependable, not sharp-tongued, not overfond of wine. Servants in the church are to be committed to their spouses, attentive to their own children, and diligent in looking after their own affairs. Those who do this servant work will come to be highly respected, a real credit to this Jesus-faith.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: 'I hope to visit you soon, but just in case I’m delayed, I’m writing this letter so you’ll know how things ought to go in God’s household, this God-alive church, bastion of truth. This Christian life is a great mystery, far exceeding our understanding, but some things are clear enough:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He appeared in a human body,
- type: usfm
  marker: q2
  children:
  - type: text
    text: was proved right by the invisible Spirit,
- type: usfm
  marker: q3
  children:
  - type: text
    text: was seen by angels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was proclaimed among all kinds of peoples,
- type: usfm
  marker: q2
  children:
  - type: text
    text: believed in all over the world,
- type: usfm
  marker: q3
  children:
  - type: text
    text: taken up into heavenly glory.
