document_id: JOS.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gibeon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: All the kings west of the Jordan in the hills and foothills and along the Mediterranean seacoast north toward Lebanon—the Hittites, Amorites, Canaanites, Perizzites, Hivites, Girgashites, and Jebusites—got the news. They came together in a coalition to fight against Joshua and Israel under a single command.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: 'The people of Gibeon heard what Joshua had done to Jericho and Ai and cooked up a ruse. They posed as travelers: their donkeys loaded with patched sacks and mended wineskins, threadbare sandals on their feet, tattered clothes on their bodies, nothing but dry crusts and crumbs for food. They came to Joshua at Gilgal and spoke to the men of Israel, “We’ve come from a far-off country; make a covenant with us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The men of Israel said to these Hivites, “How do we know you aren’t local people? How could we then make a covenant with you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They said to Joshua, “We’ll be your servants.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Joshua said, “Who are you now? Where did you come from?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: 'They said, “From a far-off country, very far away. Your servants came because we’d heard such great things about '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God—all those things he did in Egypt! And the two Amorite kings across the Jordan, King Sihon of Heshbon and King Og of Bashan, who ruled in Ashtaroth! Our leaders and everybody else in our country told us, ‘Pack up some food for the road and go meet them. Tell them, We’re your servants; make a covenant with us.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: “This bread was warm from the oven when we packed it and left to come and see you. Now look at it—crusts and crumbs. And our cracked and mended wineskins, good as new when we filled them. And our clothes and sandals, in tatters from the long, hard traveling.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The men of Israel looked them over and accepted the evidence. But they didn’t ask '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' about it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So Joshua made peace with them and formalized it with a covenant to guarantee their lives. The leaders of the congregation swore to it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: 'And then, three days after making this covenant, they learned that they were next-door neighbors who had been living there all along! The People of Israel broke camp and set out; three days later they reached their towns—Gibeon, Kephirah, Beeroth, and Kiriath Jearim. But the People of Israel didn’t attack them; the leaders of the congregation had given their word before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel. But the congregation was up in arms over their leaders.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'The leaders were united in their response to the congregation: “We promised them in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel. We can’t lay a hand on them now. But we can do this: We will let them live so we don’t get blamed for breaking our promise.” Then the leaders continued, “We’ll let them live, but they will be woodcutters and water carriers for the entire congregation.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And that’s what happened; the leaders’ promise was kept.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: But Joshua called the Gibeonites together and said, “Why did you lie to us, telling us, ‘We live far, far away from you,’ when you’re our next-door neighbors? For that you are cursed. From now on it’s menial labor for you—woodcutters and water carriers for the house of my God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'They answered Joshua, “We got the message loud and clear that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, commanded through his servant Moses: to give you the whole country and destroy everyone living in it. We were terrified because of you; that’s why we did this. That’s it. We’re at your mercy. Whatever you decide is right for us, do it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'And that’s what they did. Joshua delivered them from the power of the People of Israel so they didn’t kill them. But he made them woodcutters and water carriers for the congregation and for the Altar of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at the place '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' chooses. They still are.'
