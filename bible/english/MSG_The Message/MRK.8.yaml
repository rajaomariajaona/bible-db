document_id: MRK.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Meal for Four Thousand
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: At about this same time he again found himself with a hungry crowd on his hands. He called his disciples together and said, “This crowd is breaking my heart. They have stuck with me for three days, and now they have nothing to eat. If I send them home hungry, they’ll faint along the way—some of them have come a long distance.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: When they arrived, the Pharisees came out and started in on him, badgering him to prove himself, pushing him up against the wall. Provoked, he said, “Why does this generation clamor for miraculous guarantees? If I have anything to say about it, you’ll not get so much as a hint of a guarantee.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contaminating Yeast
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: He then left them, got back in the boat, and headed for the other side. But the disciples forgot to pack a lunch. Except for a single loaf of bread, there wasn’t a crumb in the boat. Jesus warned, “Be very careful. Keep a sharp eye out for the contaminating yeast of Pharisees and the followers of Herod.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-19
    - type: text
      text: Meanwhile, the disciples were finding fault with each other because they had forgotten to bring bread. Jesus overheard and said, “Why are you fussing because you forgot bread? Don’t you see the point of all this? Don’t you get it at all? Remember the five loaves I broke for the five thousand? How many baskets of leftovers did you pick up?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “Twelve.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “And the seven loaves for the four thousand—how many bags full of leftovers did you get?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He said, “Do you still not get it?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: They arrived at Bethsaida. Some people brought a sightless man and begged Jesus to give him a healing touch. Taking him by the hand, he led him out of the village. He put spit in the man’s eyes, laid hands on him, and asked, “Do you see anything?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-26
    - type: text
      text: He looked up. “I see men. They look like walking trees.” So Jesus laid hands on his eyes again. The man looked hard and realized that he had recovered perfect sight, saw everything in bright, twenty-twenty focus. Jesus sent him straight home, telling him, “Don’t enter the village.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Messiah
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Jesus and his disciples headed out for the villages around Caesarea Philippi. As they walked, he asked, “Who do the people say I am?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “Some say ‘John the Baptizer,’” they said. “Others say ‘Elijah.’ Still others say ‘one of the prophets.’”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: He then asked, “And you—what are you saying about me? Who am I?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter gave the answer: “You are the Christ, the Messiah.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-32a
    - type: text
      text: ' Jesus warned them to keep it quiet, not to breathe a word of it to anyone. He then began explaining things to them: “It is necessary that the Son of Man proceed to an ordeal of suffering, be tried and found guilty by the elders, high priests, and religion scholars, be killed, and after three days rise up alive.” He said this simply and clearly so they couldn’t miss it.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32b-33
    - type: text
      text: ' But Peter grabbed him in protest. Turning and seeing his disciples wavering, wondering what to believe, Jesus confronted Peter. “Peter, get out of my way! Satan, get lost! You have no idea how God works.”'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-37
    - type: text
      text: 'Calling the crowd to join his disciples, he said, “Anyone who intends to come with me has to let me lead. You’re not in the driver’s seat; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' am. Don’t run from suffering; embrace it. Follow me and I’ll show you how. Self-help is no help at all. Self-sacrifice is the way, my way, to saving yourself, your true self. What good would it do to get everything you want and lose you, the real you? What could you ever trade your soul for?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: “If any of you are embarrassed over me and the way I’m leading you when you get around your fickle and unfocused friends, know that you’ll be an even greater embarrassment to the Son of Man when he arrives in all the splendor of God, his Father, with an army of the holy angels.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: His disciples responded, “What do you expect us to do about it? Buy food out here in the desert?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He asked, “How much bread do you have?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven loaves,” they said.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-10
    - type: text
      text: So Jesus told the crowd to sit down on the ground. After giving thanks, he took the seven bread loaves, broke them into pieces, and gave them to his disciples so they could hand them out to the crowd. They also had a few fish. He pronounced a blessing over the fish and told his disciples to hand them out as well. The crowd ate its fill. Seven sacks of leftovers were collected. There were well over four thousand at the meal. Then he sent them home. He himself went straight to the boat with his disciples and set out for Dalmanoutha.
