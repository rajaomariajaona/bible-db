document_id: 2CH.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: King Asa
  - type: text
    content: Abijah died and was buried with his ancestors in the City of David. His son Asa became the next king.
  - type: text
    content: For ten years into Asa’s reign the country was at peace.
  '12':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' defeated the Ethiopians before Asa and Judah; the Ethiopians ran for their lives. Asa and his men chased them as far as Gerar; so many of the Ethiopians were killed that there was no fight left in them—a massacre before '
  - type: text
    content: God
  - type: text
    content: ' and his troops; Judah carted off loads of plunder. They devastated all the towns around Gerar whose people were helpless, paralyzed by the fear of '
  - type: text
    content: God
  - type: text
    content: ', and looted the country. They also attacked herdsmen and brought back a lot of sheep and camels to Jerusalem.'
  '2':
  - type: text
    content: 'Asa was a good king. He did things right in '
  - type: text
    content: God
  - type: text
    content: '’s eyes. He cleaned house: got rid of the pagan altars and shrines, smashed the sacred stone pillars, and chopped down the sex-and-religion groves (Asherim). He told Judah to center their lives in '
  - type: text
    content: God
  - type: text
    content: ', the God of their fathers, to do what the law said, and to follow the commandments. Because he got rid of all the pagan shrines and altars in the cities of Judah, his kingdom was at peace. Because the land was quiet and there was no war, he was able to build up a good defense system in Judah. '
  - type: text
    content: God
  - type: text
    content: ' kept the peace.'
  '7':
  - type: text
    content: 'Asa said to his people, “While we have the chance and the land is quiet, let’s build a solid defense system, fortifying our cities with walls, towers, gates, and bars. We have this peaceful land because we sought '
  - type: text
    content: God
  - type: text
    content: ; he has given us rest from all troubles.” So they built and enjoyed prosperity.
  '8':
  - type: text
    content: Asa had an army of 300,000 Judeans, equipped with shields and spears, and another 280,000 Benjaminites who were shield bearers and archers. They were all courageous warriors.
  '9':
  - type: text
    content: 'Zerah the Ethiopian went to war against Asa with an army of a million plus three hundred chariots and got as far as Mareshah. Asa met him there and prepared to fight from the Valley of Zephathah near Mareshah. Then Asa prayed to '
  - type: text
    content: God
  - type: text
    content: ', “O '
  - type: text
    content: God
  - type: text
    content: ', you aren’t impressed by numbers or intimidated by a show of force once you decide to help: Help us, O '
  - type: text
    content: God
  - type: text
    content: ; we have come out to meet this huge army because we trust in you and who you are. Don’t let mere mortals stand against you!”
