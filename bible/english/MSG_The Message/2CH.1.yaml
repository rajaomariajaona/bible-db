- type: usfm
  marker: s1
  children:
  - type: text
    text: King Solomon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: 'Solomon son of David took a firm grip on the reins of his kingdom. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was with him and gave him much help. Solomon addressed all Israel—the commanders and captains, the judges, every leader, and all the heads of families. Then Solomon and the entire company went to the worship center at Gibeon—that’s where the Tent of Meeting of God was, the one that Moses the servant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had made in the wilderness. The Chest of God, though, was in Jerusalem—David had brought it up from Kiriath Jearim, prepared a special place for it, and pitched a tent for it. But the Bronze Altar that Bezalel son of Uri, the son of Hur, had made was in Gibeon, in its place before the Tabernacle of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '; and that is where Solomon and the congregation gathered to pray. Solomon worshiped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at the Bronze Altar in front of the Tent of Meeting; he sacrificed a thousand Whole-Burnt-Offerings on it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That night God appeared to Solomon. God said, “What do you want from me? Ask.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'Solomon answered, “You were extravagantly generous with David my father, and now you have made me king in his place. Establish, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the words you spoke to my father, for you’ve given me a staggering task, ruling this mob of people. Yes, give me wisdom and knowledge as I come and go among this people—for who on his own is capable of leading these, your glorious people?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'God answered Solomon, “This is what has come out of your heart: You didn’t grasp for money, wealth, fame, and the doom of your enemies; you didn’t even ask for a long life. You asked for wisdom and knowledge so you could govern well my people over whom I’ve made you king. Because of this, you get what you asked for—wisdom and knowledge. And I’m presenting you the rest as a bonus—money, wealth, and fame beyond anything the kings before or after you had or will have.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then Solomon left the worship center at Gibeon and the Tent of Meeting and went to Jerusalem. He set to work as king of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-17
  - type: text
    text: 'Solomon collected chariots and horses: fourteen hundred chariots and twelve thousand horses! He stabled them in the special chariot-cities as well as in Jerusalem. The king made silver and gold as common as rocks, and cedar as common as the fig trees in the lowland hills. His horses were brought in from Egypt and Cilicia, specially acquired by the king’s agents. Chariots from Egypt went for fifteen pounds of silver and a horse for about three and three-quarters of a pound of silver. Solomon carried on a brisk horse-trading business with the Hittite and Aramean royal houses.'
