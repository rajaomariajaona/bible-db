document_id: PSA.129,97
type_code: eng
verses:
  '1':
  - type: text
    content: “They’ve kicked me around ever since I was young”
  - type: text
    content: —this is how Israel tells it—
  - type: text
    content: “They’ve kicked me around ever since I was young,
  - type: text
    content: but they never could keep me down.
  - type: text
    content: Their plowmen plowed long furrows
  - type: text
    content: up and down my back;
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' wouldn’t put up with it,'
  - type: text
    content: he sticks with us.
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' ripped the harnesses'
  - type: text
    content: of the evil plowmen to shreds.”
  '5':
  - type: text
    content: Oh, let all those who hate Zion
  - type: text
    content: grovel in humiliation;
  - type: text
    content: Let them be like grass in shallow ground
  - type: text
    content: that withers before the harvest,
  - type: text
    content: Before the farmhands can gather it in,
  - type: text
    content: the harvesters get in the crop,
  - type: text
    content: Before the neighbors have a chance to call out,
  - type: text
    content: “Congratulations on your wonderful crop!
  - type: text
    content: 'We bless you in '
  - type: text
    content: God
  - type: text
    content: ’s name!”
