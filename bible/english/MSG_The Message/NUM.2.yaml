document_id: NUM.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Marching Orders
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses and Aaron. He said, “The People of Israel are to set up camp circling the Tent of Meeting and facing it. Each company is to camp under its distinctive tribal flag.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To the south are the companies of the camp of Reuben under its flag, led by Elizur son of Shedeur. His troops number 46,500.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The tribe of Simeon will camp next to them, led by Shelumiel son of Zurishaddai. His troops number 59,300.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the tribe of Gad is next to them, led by Eliasaph son of Deuel. His troops number 45,650.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total number of men assigned to Reuben, troop by troop, is 151,450. They are second in the order of the march.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Tent of Meeting with the camp of the Levites takes its place in the middle of the march. Each tribe will march in the same order in which they camped, each under its own flag.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To the west are the companies of the camp of Ephraim under its flag, led by Elishama son of Ammihud. His troops number 40,500.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The tribe of Manasseh will set up camp next to them, led by Gamaliel son of Pedahzur. His troops number 32,200.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And next to him is the camp of Benjamin, led by Abidan son of Gideoni. His troops number 35,400.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total number of men assigned to the camp of Ephraim, troop by troop, is 108,100. They are third in the order of the march.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To the north are the companies of the camp of Dan under its flag, led by Ahiezer son of Ammishaddai. His troops number 62,700.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The tribe of Asher will camp next to them, led by Pagiel son of Ocran. His troops number 41,500.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And next to them is the tribe of Naphtali, led by Ahira son of Enan. His troops number 53,400.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To the east toward the sunrise are the companies of the camp of Judah under its flag, led by Nahshon son of Amminadab. His troops number 74,600.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total number of men assigned to the camp of Dan number 157,600. They will set out, under their flags, last in the line of the march.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the People of Israel, counted according to their ancestral families. The total number in the camps, counted troop by troop, comes to 603,550. Following '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s command to Moses, the Levites were not counted in with the rest of Israel.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The People of Israel did everything the way '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded Moses: They camped under their respective flags; they marched by tribe with their ancestral families.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The tribe of Issachar will camp next to them, led by Nethanel son of Zuar. His troops number 54,400.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the tribe of Zebulun is next to them, led by Eliab son of Helon. His troops number 57,400.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total number of men assigned to Judah, troop by troop, is 186,400. They will lead the march.
