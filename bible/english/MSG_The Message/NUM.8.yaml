document_id: NUM.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lights
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Tell Aaron, Install the seven lamps so they will throw light in front of the Lampstand.”'
  '12':
  - type: text
    content: '“Have the Levites place their hands on the heads of the bulls, selecting one for the Absolution-Offering and another for the Whole-Burnt-Offering to '
  - type: text
    content: God
  - type: text
    content: ' to make atonement for the Levites. Then have the Levites stand in front of Aaron and his sons and present them as a Wave-Offering to '
  - type: text
    content: God
  - type: text
    content: . This is the procedure for setting apart the Levites from the rest of the People of Israel; the Levites are exclusively for my use.
  '15':
  - type: text
    content: '“After you have purified the Levites and presented them as a Wave-Offering to '
  - type: text
    content: God
  - type: text
    content: ', they can go to work in the Tent of Meeting. The Levites have been selected out of the People of Israel for my exclusive use; they function in place of every firstborn male born to an Israelite woman. Every firstborn male in Israel, animal or human, is set apart for my use. When I struck down all the firstborn of Egypt, I consecrated them for my holy uses. But now I take the Levites as stand-ins in place of every firstborn son in Israel, selected out of the People of Israel, and I have given the Levites to Aaron and his sons to do all the work involved in the Tent of Meeting on behalf of all the People of Israel and to make atonement for them so that nothing bad will happen to them when they approach the Sanctuary.”'
  '20':
  - type: text
    content: 'Moses, Aaron, and the entire community of the People of Israel carried out these procedures with the Levites, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses. The Levites purified themselves and scrubbed their clothes. Then Aaron presented them as a Wave-Offering before '
  - type: text
    content: God
  - type: text
    content: ' and made atonement for them to purify them. Only then did the Levites go to work at the Tent of Meeting. Aaron and his sons supervised them following the directions '
  - type: text
    content: God
  - type: text
    content: ' had given.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “These are your instructions regarding the Levites: At the age of twenty-five they will join the workforce in the Tent of Meeting; at the age of fifty they must retire from the work. They can assist their brothers in the tasks in the Tent of Meeting, but they are not permitted to do the actual work themselves. These are the ground rules for the work of the Levites.”'
  '3':
  - type: text
    content: 'Aaron did just that. He installed the lamps so they threw light in front of the Lampstand, as '
  - type: text
    content: God
  - type: text
    content: ' had instructed Moses. The Lampstand was made of hammered gold from its stem to its petals. It was made precisely to the design '
  - type: text
    content: God
  - type: text
    content: ' had shown Moses.'
  - type: heading
    content: Purifying the Levites
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Take the Levites from the midst of the People of Israel and purify them for doing '
  - type: text
    content: God
  - type: text
    content: '’s work. This is the way you will do it: Sprinkle water of absolution on them; have them shave their entire bodies; have them scrub their clothes. Then they will have purified themselves.'
  '8':
  - type: text
    content: '“Have them take a young bull with its accompanying Grain-Offering of fine flour mixed with oil, plus a second young bull for an Absolution-Offering. Bring the Levites to the front of the Tent of Meeting and gather the entire community of Israel. Present the Levites before '
  - type: text
    content: God
  - type: text
    content: ' as the People of Israel lay their hands on them. Aaron will present the Levites before '
  - type: text
    content: God
  - type: text
    content: ' as a Wave-Offering from the People of Israel so that they will be ready to do '
  - type: text
    content: God
  - type: text
    content: ’s work.
