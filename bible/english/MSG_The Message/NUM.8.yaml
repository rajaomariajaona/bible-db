document_id: NUM.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lights
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell Aaron, Install the seven lamps so they will throw light in front of the Lampstand.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: '“Have the Levites place their hands on the heads of the bulls, selecting one for the Absolution-Offering and another for the Whole-Burnt-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' to make atonement for the Levites. Then have the Levites stand in front of Aaron and his sons and present them as a Wave-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . This is the procedure for setting apart the Levites from the rest of the People of Israel; the Levites are exclusively for my use.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-19
    - type: text
      text: '“After you have purified the Levites and presented them as a Wave-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', they can go to work in the Tent of Meeting. The Levites have been selected out of the People of Israel for my exclusive use; they function in place of every firstborn male born to an Israelite woman. Every firstborn male in Israel, animal or human, is set apart for my use. When I struck down all the firstborn of Egypt, I consecrated them for my holy uses. But now I take the Levites as stand-ins in place of every firstborn son in Israel, selected out of the People of Israel, and I have given the Levites to Aaron and his sons to do all the work involved in the Tent of Meeting on behalf of all the People of Israel and to make atonement for them so that nothing bad will happen to them when they approach the Sanctuary.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: 'Moses, Aaron, and the entire community of the People of Israel carried out these procedures with the Levites, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded Moses. The Levites purified themselves and scrubbed their clothes. Then Aaron presented them as a Wave-Offering before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and made atonement for them to purify them. Only then did the Levites go to work at the Tent of Meeting. Aaron and his sons supervised them following the directions '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had given.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-26
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “These are your instructions regarding the Levites: At the age of twenty-five they will join the workforce in the Tent of Meeting; at the age of fifty they must retire from the work. They can assist their brothers in the tasks in the Tent of Meeting, but they are not permitted to do the actual work themselves. These are the ground rules for the work of the Levites.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Aaron did just that. He installed the lamps so they threw light in front of the Lampstand, as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had instructed Moses. The Lampstand was made of hammered gold from its stem to its petals. It was made precisely to the design '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had shown Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Purifying the Levites
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Take the Levites from the midst of the People of Israel and purify them for doing '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s work. This is the way you will do it: Sprinkle water of absolution on them; have them shave their entire bodies; have them scrub their clothes. Then they will have purified themselves.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-11
    - type: text
      text: '“Have them take a young bull with its accompanying Grain-Offering of fine flour mixed with oil, plus a second young bull for an Absolution-Offering. Bring the Levites to the front of the Tent of Meeting and gather the entire community of Israel. Present the Levites before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as the People of Israel lay their hands on them. Aaron will present the Levites before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as a Wave-Offering from the People of Israel so that they will be ready to do '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s work.
