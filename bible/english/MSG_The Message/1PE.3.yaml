document_id: 1PE.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cultivate Inner Beauty
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4a
  - type: text
    text: ' The same goes for you wives: Be good wives to your husbands, responsive to their needs. There are husbands who, indifferent as they are to any words about God, will be captivated by your life of holy beauty. What matters is not your outer appearance—the styling of your hair, the jewelry you wear, the cut of your clothes—but your inner disposition.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4b-6
  - type: text
    text: ' Cultivate inner beauty, the gentle, gracious kind that God delights in. The holy women of old were beautiful before God that way, and were good, loyal wives to their husbands. Sarah, for instance, taking care of Abraham, would address him as “my dear husband.” You’ll be true daughters of Sarah if you do the same, unanxious and unintimidated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The same goes for you husbands: Be good husbands to your wives. Honor them, delight in them. As women they lack some of your advantages. But in the new life of God’s grace, you’re equals. Treat your wives, then, as equals so your prayers don’t run aground.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Suffering for Doing Good
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: 'Summing up: Be agreeable, be sympathetic, be loving, be compassionate, be humble. That goes for all of you, no exceptions. No retaliation. No sharp-tongued sarcasm. Instead, bless—that’s your job, to bless. You’ll be a blessing and also get a blessing.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whoever wants to embrace life
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see the day fill up with good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Here’s what you do:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Say nothing evil or hurtful;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Snub evil and cultivate good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: run after peace for all you’re worth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God looks on all this with approval,
- type: usfm
  marker: q2
  children:
  - type: text
    text: listening and responding well to what he’s asked;
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he turns his back
- type: usfm
  marker: q2
  children:
  - type: text
    text: on those who do evil things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-18
  - type: text
    text: 'If with heart and soul you’re doing good, do you think you can be stopped? Even if you suffer for it, you’re still better off. Don’t give the opposition a second thought. Through thick and thin, keep your hearts at attention, in adoration before Christ, your Master. Be ready to speak up and tell anyone who asks why you’re living the way you are, and always with the utmost courtesy. Keep a clear conscience before God so that when people throw mud at you, none of it will stick. They’ll end up realizing that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they’re
  - type: text
    text: ' the ones who need a bath. It’s better to suffer for doing good, if that’s what God wants, than to be punished for doing bad. That’s what Christ did definitively: suffered because of others’ sins, the Righteous One for the unrighteous ones. He went through it all—was put to death and then made alive—to bring us to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: 'He went and proclaimed God’s salvation to earlier generations who ended up in the prison of judgment because they wouldn’t listen. You know, even though God waited patiently all the days that Noah built his ship, only a few were saved then, eight to be exact—saved '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' the water '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by
  - type: text
    text: ' the water. The waters of baptism do that for you, not by washing away dirt from your skin but by presenting you through Jesus’ resurrection before God with a clear conscience. Jesus has the last word on everything and everyone, from angels to armies. He’s standing right alongside God, and what he says goes.'
