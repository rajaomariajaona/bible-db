type_code: eng
verses:
  '1':
  - type: heading
    content: Cultivate Inner Beauty
  - type: text
    content: ' The same goes for you wives: Be good wives to your husbands, responsive to their needs. There are husbands who, indifferent as they are to any words about God, will be captivated by your life of holy beauty. What matters is not your outer appearance—the styling of your hair, the jewelry you wear, the cut of your clothes—but your inner disposition.'
  '13':
  - type: text
    content: 'If with heart and soul you’re doing good, do you think you can be stopped? Even if you suffer for it, you’re still better off. Don’t give the opposition a second thought. Through thick and thin, keep your hearts at attention, in adoration before Christ, your Master. Be ready to speak up and tell anyone who asks why you’re living the way you are, and always with the utmost courtesy. Keep a clear conscience before God so that when people throw mud at you, none of it will stick. They’ll end up realizing that '
  - type: text
    content: they’re
  - type: text
    content: ' the ones who need a bath. It’s better to suffer for doing good, if that’s what God wants, than to be punished for doing bad. That’s what Christ did definitively: suffered because of others’ sins, the Righteous One for the unrighteous ones. He went through it all—was put to death and then made alive—to bring us to God.'
  '19':
  - type: text
    content: 'He went and proclaimed God’s salvation to earlier generations who ended up in the prison of judgment because they wouldn’t listen. You know, even though God waited patiently all the days that Noah built his ship, only a few were saved then, eight to be exact—saved '
  - type: text
    content: from
  - type: text
    content: ' the water '
  - type: text
    content: by
  - type: text
    content: ' the water. The waters of baptism do that for you, not by washing away dirt from your skin but by presenting you through Jesus’ resurrection before God with a clear conscience. Jesus has the last word on everything and everyone, from angels to armies. He’s standing right alongside God, and what he says goes.'
  '4':
  - type: text
    content: ' Cultivate inner beauty, the gentle, gracious kind that God delights in. The holy women of old were beautiful before God that way, and were good, loyal wives to their husbands. Sarah, for instance, taking care of Abraham, would address him as “my dear husband.” You’ll be true daughters of Sarah if you do the same, unanxious and unintimidated.'
  '7':
  - type: text
    content: 'The same goes for you husbands: Be good husbands to your wives. Honor them, delight in them. As women they lack some of your advantages. But in the new life of God’s grace, you’re equals. Treat your wives, then, as equals so your prayers don’t run aground.'
  - type: heading
    content: Suffering for Doing Good
  '8':
  - type: text
    content: 'Summing up: Be agreeable, be sympathetic, be loving, be compassionate, be humble. That goes for all of you, no exceptions. No retaliation. No sharp-tongued sarcasm. Instead, bless—that’s your job, to bless. You’ll be a blessing and also get a blessing.'
  - type: text
    content: Whoever wants to embrace life
  - type: text
    content: and see the day fill up with good,
  - type: text
    content: 'Here’s what you do:'
  - type: text
    content: Say nothing evil or hurtful;
  - type: text
    content: Snub evil and cultivate good;
  - type: text
    content: run after peace for all you’re worth.
  - type: text
    content: God looks on all this with approval,
  - type: text
    content: listening and responding well to what he’s asked;
  - type: text
    content: But he turns his back
  - type: text
    content: on those who do evil things.
