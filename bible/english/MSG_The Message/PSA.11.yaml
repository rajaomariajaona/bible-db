type_code: eng
verses:
  '1':
  - type: text
    content: I’ve already run for dear life
  - type: text
    content: 'straight to the arms of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: So why would I run away now
  - type: text
    content: when you say,
  - type: text
    content: “Run to the mountains; the evil
  - type: text
    content: bows are bent, the wicked arrows
  - type: text
    content: Aimed to shoot under cover of darkness
  - type: text
    content: at every heart open to God.
  - type: text
    content: The bottom’s dropped out of the country;
  - type: text
    content: good people don’t have a chance”?
  '4':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' hasn’t moved to the mountains;'
  - type: text
    content: his holy address hasn’t changed.
  - type: text
    content: He’s in charge, as always, his eyes
  - type: text
    content: taking everything in, his eyelids
  - type: text
    content: Unblinking, examining Adam’s flesh and blood
  - type: text
    content: inside and out, not missing a thing.
  - type: text
    content: He tests the good and the bad alike;
  - type: text
    content: if anyone cheats, God’s outraged.
  - type: text
    content: Fail the test and you’re out,
  - type: text
    content: out in a hail of firestones,
  - type: text
    content: Drinking from a canteen
  - type: text
    content: filled with hot desert wind.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s business is putting things right;
  - type: text
    content: he loves getting the lines straight,
  - type: text
    content: Setting us straight. Once we’re standing tall,
  - type: text
    content: we can look him straight in the eye.
