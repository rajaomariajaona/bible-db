document_id: EXO.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-10
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses and Aaron while still in Egypt, “This month is to be the first month of the year for you. Address the whole community of Israel; tell them that on the tenth of this month each man is to take a lamb for his family, one lamb to a house. If the family is too small for a lamb, then share it with a close neighbor, depending on the number of persons involved. Be mindful of how much each person will eat. Your lamb must be a healthy male, one year old; you can select it from either the sheep or the goats. Keep it penned until the fourteenth day of this month and then slaughter it—the entire community of Israel will do this—at dusk. Then take some of the blood and smear it on the two doorposts and the lintel of the houses in which you will eat it. You are to eat the meat, roasted in the fire, that night, along with bread, made without yeast, and bitter herbs. Don’t eat any of it raw or boiled in water; make sure it’s roasted—the whole animal, head, legs, and innards. Don’t leave any of it until morning; if there are leftovers, burn them in the fire.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“And here is how you are to eat it: Be fully dressed with your sandals on and your stick in your hand. Eat in a hurry; it’s the Passover to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: '“I will go through the land of Egypt on this night and strike down every firstborn in the land of Egypt, whether human or animal, and bring judgment on all the gods of Egypt. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . The blood will serve as a sign on the houses where you live. When I see the blood I will pass over you—no disaster will touch you when I strike the land of Egypt.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-16
    - type: text
      text: '“This will be a memorial day for you; you will celebrate it as a festival to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' down through the generations, a fixed festival celebration to be observed always. You will eat unraised bread (matzoth) for seven days: On the first day get rid of all yeast from your houses—anyone who eats anything with yeast from the first day to the seventh day will be cut off from Israel. The first and the seventh days are set aside as holy; do no work on those days. Only what you have to do for meals; each person can do that.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-20
    - type: text
      text: “Keep the Festival of Unraised Bread! This marks the exact day I brought you out in force from the land of Egypt. Honor the day down through your generations, a fixed festival to be observed always. In the first month, beginning on the fourteenth day at evening until the twenty-first day at evening, you are to eat unraised bread. For those seven days not a trace of yeast is to be found in your houses. Anyone, whether a visitor or a native of the land, who eats anything raised shall be cut off from the community of Israel. Don’t eat anything raised. Only matzoth.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: 'Moses assembled all the elders of Israel. He said, “Select a lamb for your families and slaughter the Passover lamb. Take a bunch of hyssop and dip it in the bowl of blood and smear it on the lintel and on the two doorposts. No one is to leave the house until morning. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will pass through to strike Egypt down. When he sees the blood on the lintel and the two doorposts, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will pass over the doorway; he won’t let the destroyer enter your house to strike you down with ruin.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-27
    - type: text
      text: '“Keep this word. It’s the law for you and your children, forever. When you enter the land which '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will give you as he promised, keep doing this. And when your children say to you, ‘Why are we doing this?’ tell them: ‘It’s the Passover-sacrifice to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who passed over the homes of the Israelites in Egypt when he hit Egypt with death but rescued us.’”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people bowed and worshiped.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'The Israelites then went and did what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded Moses and Aaron. They did it all.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'At midnight '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' struck every firstborn in the land of Egypt, from the firstborn of Pharaoh, who sits on his throne, right down to the firstborn of the prisoner locked up in jail. Also the firstborn of the animals.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Pharaoh got up that night, he and all his servants and everyone else in Egypt—what wild wailing and lament in Egypt! There wasn’t a house in which someone wasn’t dead.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: 'Pharaoh called in Moses and Aaron that very night and said, “Get out of here and be done with you—you and your Israelites! Go worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' on your own terms. And yes, take your sheep and cattle as you’ve insisted, but go. And bless me.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The Egyptians couldn’t wait to get rid of them; they pushed them to hurry up, saying, “We’re all as good as dead.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-36
    - type: text
      text: 'The people grabbed their bread dough before it had risen, bundled their bread bowls in their cloaks and threw them over their shoulders. The Israelites had already done what Moses had told them; they had asked the Egyptians for silver and gold things and clothing. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' saw to it that the Egyptians liked the people and so readily gave them what they asked for. Oh yes! They picked those Egyptians clean.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 37-39
    - type: text
      text: The Israelites moved on from Rameses to Succoth, about 600,000 on foot, besides their dependents. Hebrews and non-Hebrews alike set out, not to mention the large flocks and herds of livestock. They baked unraised cakes with the bread dough they had brought out of Egypt; it hadn’t raised—they’d been rushed out of Egypt and hadn’t time to fix food for the journey.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Passover
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40-42
    - type: text
      text: 'The Israelites had lived in Egypt 430 years. At the end of the 430 years, to the very day, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s entire army left Egypt. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' kept watch all night, watching over the Israelites as he brought them out of Egypt. Because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' kept watch, all Israel for all generations will honor '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' by keeping watch this night—a watchnight.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 43-47
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses and Aaron, “These are the rules for the Passover:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: No foreigners are to eat it.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Any slave, if he’s paid for and circumcised, can eat it.
  - type: usfm
    marker: p
    children:
    - type: text
      text: No casual visitor or hired hand can eat it.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eat it in one house—don’t take the meat outside the house.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t break any of the bones.
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole community of Israel is to be included in the meal.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: '“If an immigrant is staying with you and wants to keep the Passover to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', every male in his family must be circumcised, then he can participate in the Meal—he will then be treated as a native son. But no uncircumcised person can eat it.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: “The same law applies both to the native and the immigrant who is staying with you.”
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 50-51
    - type: text
      text: 'All the Israelites did exactly as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded Moses and Aaron. That very day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' brought the Israelites out of the land of Egypt, tribe by tribe.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
