document_id: PSA.50,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The God of gods—it’s '
  - type: text
    content: God
  - type: text
    content: '!—speaks out, shouts, “Earth!”'
  - type: text
    content: welcomes the sun in the east,
  - type: text
    content: farewells the disappearing sun in the west.
  - type: text
    content: From the dazzle of Zion,
  - type: text
    content: God blazes into view.
  - type: text
    content: Our God makes his entrance,
  - type: text
    content: he’s not shy in his coming.
  - type: text
    content: Starbursts of fireworks precede him.
  '16':
  - type: text
    content: 'Next, God calls up the wicked:'
  - type: text
    content: “What are you up to, quoting my laws,
  - type: text
    content: talking like we are good friends?
  - type: text
    content: You never answer the door when I call;
  - type: text
    content: you treat my words like garbage.
  - type: text
    content: If you find a thief, you make him your buddy;
  - type: text
    content: adulterers are your friends of choice.
  - type: text
    content: Your mouth drools filth;
  - type: text
    content: lying is a serious art form with you.
  - type: text
    content: You stab your own brother in the back,
  - type: text
    content: rip off your little sister.
  - type: text
    content: I kept a quiet patience while you did these things;
  - type: text
    content: you thought I went along with your game.
  - type: text
    content: 'I’m calling you on the carpet, '
  - type: text
    content: now
  - type: text
    content: ','
  - type: text
    content: laying your wickedness out in plain sight.
  '22':
  - type: text
    content: “Time’s up for playing fast and
  - type: text
    content: loose with me.
  - type: text
    content: I’m ready to pass sentence,
  - type: text
    content: and there’s no help in sight!
  - type: text
    content: It’s the praising life that honors me.
  - type: text
    content: As soon as you set your foot on the Way,
  - type: text
    content: I’ll show you my salvation.”
  '4':
  - type: text
    content: He summons heaven and earth as a jury,
  - type: text
    content: 'he’s taking his people to court:'
  - type: text
    content: “Round up my saints who swore
  - type: text
    content: on the Bible their loyalty to me.”
  '6':
  - type: text
    content: The whole cosmos attests to the fairness of this court,
  - type: text
    content: 'that here '
  - type: text
    content: God
  - type: text
    content: ' is judge.'
  '7':
  - type: text
    content: “Are you listening, dear people? I’m getting ready to speak;
  - type: text
    content: Israel, I’m about ready to bring you to trial.
  - type: text
    content: This is God, your God,
  - type: text
    content: speaking to you.
  - type: text
    content: I don’t find fault with your acts of worship,
  - type: text
    content: the frequent burnt sacrifices you offer.
  - type: text
    content: But why should I want your blue-ribbon bull,
  - type: text
    content: or more and more goats from your herds?
  - type: text
    content: Every creature in the forest is mine,
  - type: text
    content: the wild animals on all the mountains.
  - type: text
    content: I know every mountain bird by name;
  - type: text
    content: the scampering field mice are my friends.
  - type: text
    content: If I get hungry, do you think I’d tell you?
  - type: text
    content: All creation and its bounty are mine.
  - type: text
    content: Do you think I feast on venison?
  - type: text
    content: or drink drafts of goats’ blood?
  - type: text
    content: Spread for me a banquet of praise,
  - type: text
    content: serve High God a feast of kept promises,
  - type: text
    content: And call for help when you’re in trouble—
  - type: text
    content: I’ll help you, and you’ll honor me.”
