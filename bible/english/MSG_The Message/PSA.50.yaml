document_id: PSA.50
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'The God of gods—it’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!—speaks out, shouts, “Earth!”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: welcomes the sun in the east,
- type: usfm
  marker: q2
  children:
  - type: text
    text: farewells the disappearing sun in the west.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the dazzle of Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God blazes into view.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our God makes his entrance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’s not shy in his coming.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Starbursts of fireworks precede him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: He summons heaven and earth as a jury,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'he’s taking his people to court:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Round up my saints who swore
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the Bible their loyalty to me.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The whole cosmos attests to the fairness of this court,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that here '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' is judge.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-15
  - type: text
    text: “Are you listening, dear people? I’m getting ready to speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel, I’m about ready to bring you to trial.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is God, your God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: speaking to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I don’t find fault with your acts of worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the frequent burnt sacrifices you offer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But why should I want your blue-ribbon bull,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or more and more goats from your herds?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every creature in the forest is mine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wild animals on all the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know every mountain bird by name;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the scampering field mice are my friends.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I get hungry, do you think I’d tell you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: All creation and its bounty are mine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think I feast on venison?
- type: usfm
  marker: q2
  children:
  - type: text
    text: or drink drafts of goats’ blood?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spread for me a banquet of praise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: serve High God a feast of kept promises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And call for help when you’re in trouble—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll help you, and you’ll honor me.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-21
  - type: text
    text: 'Next, God calls up the wicked:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What are you up to, quoting my laws,
- type: usfm
  marker: q2
  children:
  - type: text
    text: talking like we are good friends?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You never answer the door when I call;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you treat my words like garbage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you find a thief, you make him your buddy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: adulterers are your friends of choice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your mouth drools filth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: lying is a serious art form with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You stab your own brother in the back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rip off your little sister.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I kept a quiet patience while you did these things;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you thought I went along with your game.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I’m calling you on the carpet, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: now
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: laying your wickedness out in plain sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: “Time’s up for playing fast and
- type: usfm
  marker: q2
  children:
  - type: text
    text: loose with me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m ready to pass sentence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there’s no help in sight!
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s the praising life that honors me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: As soon as you set your foot on the Way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll show you my salvation.”
