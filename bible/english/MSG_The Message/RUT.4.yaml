document_id: RUT.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Boaz went straight to the public square and took his place there. Before long the “closer relative,” the one mentioned earlier by Boaz, strolled by.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Step aside, old friend,” said Boaz. “Take a seat.” The man sat down.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: 'All the people in the town square that day, backing up the elders, said, “Yes, we are witnesses. May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' make this woman who is coming into your household like Rachel and Leah, the two women who built the family of Israel. May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' make you a pillar in Ephrathah and famous in Bethlehem! With the children '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gives you from this young woman, may your family rival the family of Perez, the son Tamar bore to Judah.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Boaz married Ruth. She became his wife. Boaz slept with her. By '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s gracious gift she conceived and had a son.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'The town women said to Naomi, “Blessed be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! He didn’t leave you without family to carry on your life. May this baby grow up to be famous in Israel! He’ll make you young again! He’ll take care of you in old age. And this daughter-in-law who has brought him into the world and loves you so much, why, she’s worth more to you than seven sons!”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Naomi took the baby and held him in her arms, cuddling him, cooing over him, waiting on him hand and foot.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The neighborhood women started calling him “Naomi’s baby boy!” But his real name was Obed. Obed was the father of Jesse, and Jesse the father of David.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-22
    - type: text
      text: 'This is the family tree of Perez:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Perez had Hezron,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hezron had Ram,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ram had Amminadab,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amminadab had Nahshon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Nahshon had Salmon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Salmon had Boaz,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Boaz had Obed,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Obed had Jesse,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and Jesse had David.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Boaz then gathered ten of the town elders together and said, “Sit down here with us; we’ve got some business to take care of.” And they sat down.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: Boaz then said to his relative, “The piece of property that belonged to our relative Elimelech is being sold by his widow Naomi, who has just returned from the country of Moab. I thought you ought to know about it. Buy it back if you want it—you can make it official in the presence of those sitting here and before the town elders. You have first redeemer rights. If you don’t want it, tell me so I’ll know where I stand. You’re first in line to do this and I’m next after you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “I’ll buy it.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then Boaz added, “You realize, don’t you, that when you buy the field from Naomi, you also get Ruth the Moabite, the widow of our dead relative, along with the redeemer responsibility to have children with her to carry on the family inheritance.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then the relative said, “Oh, I can’t do that—I’d jeopardize my own family’s inheritance. You go ahead and buy it—you can have my rights—I can’t do it.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In the olden times in Israel, this is how they handled official business regarding matters of property and inheritance: a man would take off his shoe and give it to the other person. This was the same as an official seal or personal signature in Israel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So when Boaz’s “redeemer” relative said, “Go ahead and buy it,” he signed the deal by pulling off his shoe.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'Boaz then addressed the elders and all the people in the town square that day: “You are witnesses today that I have bought from Naomi everything that belonged to Elimelech and Kilion and Mahlon, including responsibility for Ruth the foreigner, the widow of Mahlon—I’ll take her as my wife and keep the name of the deceased alive along with his inheritance. The memory and reputation of the deceased is not going to disappear out of this family or from his hometown. To all this you are witnesses this very day.”'
