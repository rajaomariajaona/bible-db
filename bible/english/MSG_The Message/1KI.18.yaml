document_id: 1KI.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'A long time passed. Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word came to Elijah. The drought was now in its third year. The message: “Go and present yourself to Ahab; I’m about to make it rain on the country.” Elijah set out to present himself to Ahab. The drought in Samaria at the time was most severe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'Ahab called for Obadiah, who was in charge of the palace. Obadiah feared '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—he was very devout. Earlier, when Jezebel had tried to kill off all the prophets of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', Obadiah had hidden away a hundred of them in two caves, fifty in a cave, and then supplied them with food and water.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: Ahab ordered Obadiah, “Go through the country; locate every spring and every stream. Let’s see if we can find enough grass to keep our horses and mules from dying.” So they divided the country between them for the search—Ahab went one way, Obadiah the other.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Obadiah went his way and suddenly there he was—Elijah! Obadiah fell on his knees, bowing in reverence, and exclaimed, “Is it really you—my master Elijah?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Yes,” said Elijah, “the real me. Now go and tell your boss, ‘I’ve seen Elijah.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-14
  - type: text
    text: 'Obadiah said, “But what have I done to deserve this? Ahab will kill me. As surely as your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, there isn’t a country or kingdom where my master hasn’t sent out search parties looking for you. And if they said, ‘We can’t find him; we’ve looked high and low,’ he would make that country or kingdom swear that you were not to be found. And now you’re telling me, ‘Go and tell your master Elijah’s found!’ The minute I leave you the Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will whisk you away to who knows where. Then when I report to Ahab, you’ll have disappeared and Ahab will kill me. And I’ve served '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' devoutly since I was a boy! Hasn’t anyone told you what I did when Jezebel was out to kill the prophets of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', how I risked my life by hiding a hundred of them, fifty to a cave, and made sure they got food and water? And now you’re telling me to draw attention to myself by announcing to my master, ‘Elijah’s been found.’ Why, he’ll kill me for sure.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elijah said, “As surely as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies lives, and before whom I take my stand, I’ll meet with your master face-to-face this very day.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Obadiah went straight to Ahab and told him. And Ahab went out to meet Elijah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: The moment Ahab saw Elijah he said, “So it’s you, old troublemaker!”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“It’s not I who has caused trouble in Israel,” said Elijah, “but you and your government—you’ve dumped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s ways and commands and run off after the local gods, the Baals. Here’s what I want you to do: Assemble everyone in Israel at Mount Carmel. And make sure that the special pets of Jezebel, the four hundred and fifty prophets of the local gods, the Baals, and the four hundred prophets of the whore goddess Asherah, are there.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So Ahab summoned everyone in Israel, particularly the prophets, to Mount Carmel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elijah challenged the people: “How long are you going to sit on the fence? If '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is the real God, follow him; if it’s Baal, follow him. Make up your minds!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Nobody said a word; nobody made a move.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: 'Then Elijah said, “I’m the only prophet of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' left in Israel; and there are 450 prophets of Baal. Let the Baal prophets bring up two oxen; let them pick one, butcher it, and lay it out on an altar on firewood—but don’t ignite it. I’ll take the other ox, cut it up, and lay it on the wood. But neither will I light the fire. Then you pray to your gods and I’ll pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . The god who answers with fire will prove to be, in fact, God.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'All the people agreed: “A good plan—do it!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Elijah told the Baal prophets, “Choose your ox and prepare it. You go first, you’re the majority. Then pray to your god, but don’t light the fire.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So they took the ox he had given them, prepared it for the altar, then prayed to Baal. They prayed all morning long, “O Baal, answer us!” But nothing happened—not so much as a whisper of breeze. Desperate, they jumped and stomped on the altar they had made.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: By noon, Elijah had started making fun of them, taunting, “Call a little louder—he is a god, after all. Maybe he’s off meditating somewhere or other, or maybe he’s gotten involved in a project, or maybe he’s on vacation. You don’t suppose he’s overslept, do you, and needs to be waked up?” They prayed louder and louder, cutting themselves with swords and knives—a ritual common to them—until they were covered with blood.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: This went on until well past noon. They used every religious trick and strategy they knew to make something happen on the altar, but nothing happened—not so much as a whisper, not a flicker of response.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-35
  - type: text
    text: 'Then Elijah told the people, “Enough of that—it’s my turn. Gather around.” And they gathered. He then put the altar back together for by now it was in ruins. Elijah took twelve stones, one for each of the tribes of Jacob, the same Jacob to whom '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had said, “From now on your name is Israel.” He built the stones into the altar in honor of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Then Elijah dug a fairly wide trench around the altar. He laid firewood on the altar, cut up the ox, put it on the wood, and said, “Fill four buckets with water and drench both the ox and the firewood.” Then he said, “Do it again,” and they did it. Then he said, “Do it a third time,” and they did it a third time. The altar was drenched and the trench was filled with water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: 'When it was time for the sacrifice to be offered, Elijah the prophet came up and prayed, “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God of Abraham, Isaac, and Israel, make it known right now that you are God in Israel, that I am your servant, and that I’m doing what I’m doing under your orders. Answer me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '; O answer me and reveal to this people that you are '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the true God, and that you are giving these people another chance at repentance.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Immediately the fire of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' fell and burned up the offering, the wood, the stones, the dirt, and even the water in the trench.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: All the people saw it happen and fell on their faces in awed worship, exclaiming, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is the true God! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is the true God!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Elijah told them, “Grab the Baal prophets! Don’t let one get away!”
- type: usfm
  marker: p
  children:
  - type: text
    text: They grabbed them. Elijah had them taken down to the Brook Kishon and they massacred the lot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Elijah said to Ahab, “Up on your feet! Eat and drink—celebrate! Rain is on the way; I hear it coming.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: 'Ahab did it: got up and ate and drank. Meanwhile, Elijah climbed to the top of Carmel, bowed deeply in prayer, his face between his knees. Then he said to his young servant, “On your feet now! Look toward the sea.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: He went, looked, and reported back, “I don’t see a thing.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Keep looking,” said Elijah, “seven times if necessary.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And sure enough, the seventh time he said, “Oh yes, a cloud! But very small, no bigger than someone’s hand, rising out of the sea.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Quickly then, on your way. Tell Ahab, ‘Saddle up and get down from the mountain before the rain stops you.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-46
  - type: text
    text: 'Things happened fast. The sky grew black with wind-driven clouds, and then a huge cloudburst of rain, with Ahab hightailing it in his chariot for Jezreel. And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' strengthened Elijah mightily. Pulling up his robe and tying it around his waist, Elijah ran in front of Ahab’s chariot until they reached Jezreel.'
