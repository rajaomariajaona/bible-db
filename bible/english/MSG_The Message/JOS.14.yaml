document_id: JOS.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Land West of the Jordan
  - type: text
    content: 'Here are the inheritance allotments that the People of Israel received in the land of Canaan. Eleazar the priest, Joshua son of Nun, and the heads of the family clans made the allotments. Each inheritance was assigned by lot to the nine and a half tribes, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '13':
  - type: text
    content: 'Joshua blessed him. He gave Hebron to Caleb son of Jephunneh as an inheritance. Hebron belongs to Caleb son of Jephunneh the Kenizzite still today, because he gave himself totally to '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel.'
  '15':
  - type: text
    content: The name of Hebron used to be Kiriath Arba, named after Arba, the greatest man among the Anakim.
  - type: text
    content: And the land had rest from war.
  '3':
  - type: text
    content: Moses had given the two and a half tribes their inheritance east of the Jordan, but hadn’t given an inheritance to the Levites, as he had to the others. Because the sons of Joseph had become two tribes, Manasseh and Ephraim, they gave no allotment to the Levites; but they did give them cities to live in with pasture rights for their flocks and herds.
  '5':
  - type: text
    content: 'The People of Israel followed through exactly as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses. They apportioned the land.'
  - type: heading
    content: Caleb
  '6':
  - type: text
    content: 'The people of Judah came to Joshua at Gilgal. Caleb son of Jephunneh the Kenizzite spoke: “You’ll remember what '
  - type: text
    content: God
  - type: text
    content: ' said to Moses the man of God concerning you and me back at Kadesh Barnea. I was forty years old when Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' sent me from Kadesh Barnea to spy out the land. And I brought back an honest and accurate report. My companions who went with me discouraged the people, but I stuck to my guns, totally with '
  - type: text
    content: God
  - type: text
    content: ', my God. That was the day that Moses solemnly promised, ‘The land on which your feet have walked will be your inheritance, you and your children’s, forever. Yes, you have lived totally for '
  - type: text
    content: God
  - type: text
    content: '.’ Now look at me: '
  - type: text
    content: God
  - type: text
    content: ' has kept me alive, as he promised. It is now forty-five years since '
  - type: text
    content: God
  - type: text
    content: ' spoke this word to Moses, years in which Israel wandered in the wilderness. And here I am today, eighty-five years old! I’m as strong as I was the day Moses sent me out. I’m as strong as ever in battle, whether coming or going. So give me this hill country that '
  - type: text
    content: God
  - type: text
    content: ' promised me. You yourself heard the report, that the Anakim were there with their great fortress cities. If '
  - type: text
    content: God
  - type: text
    content: ' goes with me, I will drive them out, just as '
  - type: text
    content: God
  - type: text
    content: ' said.”'
