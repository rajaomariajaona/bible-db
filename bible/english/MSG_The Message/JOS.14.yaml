document_id: JOS.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Land West of the Jordan
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'Here are the inheritance allotments that the People of Israel received in the land of Canaan. Eleazar the priest, Joshua son of Nun, and the heads of the family clans made the allotments. Each inheritance was assigned by lot to the nine and a half tribes, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded Moses.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: 'Joshua blessed him. He gave Hebron to Caleb son of Jephunneh as an inheritance. Hebron belongs to Caleb son of Jephunneh the Kenizzite still today, because he gave himself totally to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The name of Hebron used to be Kiriath Arba, named after Arba, the greatest man among the Anakim.
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the land had rest from war.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: Moses had given the two and a half tribes their inheritance east of the Jordan, but hadn’t given an inheritance to the Levites, as he had to the others. Because the sons of Joseph had become two tribes, Manasseh and Ephraim, they gave no allotment to the Levites; but they did give them cities to live in with pasture rights for their flocks and herds.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The People of Israel followed through exactly as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded Moses. They apportioned the land.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Caleb
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-12
    - type: text
      text: 'The people of Judah came to Joshua at Gilgal. Caleb son of Jephunneh the Kenizzite spoke: “You’ll remember what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses the man of God concerning you and me back at Kadesh Barnea. I was forty years old when Moses the servant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent me from Kadesh Barnea to spy out the land. And I brought back an honest and accurate report. My companions who went with me discouraged the people, but I stuck to my guns, totally with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my God. That was the day that Moses solemnly promised, ‘The land on which your feet have walked will be your inheritance, you and your children’s, forever. Yes, you have lived totally for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '.’ Now look at me: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has kept me alive, as he promised. It is now forty-five years since '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke this word to Moses, years in which Israel wandered in the wilderness. And here I am today, eighty-five years old! I’m as strong as I was the day Moses sent me out. I’m as strong as ever in battle, whether coming or going. So give me this hill country that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' promised me. You yourself heard the report, that the Anakim were there with their great fortress cities. If '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' goes with me, I will drive them out, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said.”'
