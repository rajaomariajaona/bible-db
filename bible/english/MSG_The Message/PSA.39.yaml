document_id: PSA.39
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: I’m determined to watch steps and tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: so they won’t land me in trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I decided to hold my tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: as long as Wicked is in the room.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Mum’s the word,” I said, and kept quiet.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But the longer I kept silence
- type: usfm
  marker: q1
  children:
  - type: text
    text: The worse it got—
- type: usfm
  marker: q2
  children:
  - type: text
    text: my insides got hotter and hotter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My thoughts boiled over;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I spilled my guts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: '“Tell me, what’s going on, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long do I have to live?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give me the bad news!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve kept me on pretty short rations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my life is a string too short to be saved.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh! we’re all puffs of air.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh! we’re all shadows in a campfire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh! we’re just spit in the wind.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We make our pile, and then we leave it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-11
  - type: text
    text: “What am I doing in the meantime, Lord?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hoping
  - type: text
    text: ', that’s what I’m doing—hoping'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll save me from a rebel life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: save me from the contempt of idiots.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll say no more, I’ll shut my mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since you, Lord, are behind all this.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But I can’t take it much longer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you put us through the fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: to purge us from our sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our dearest idols go up in smoke.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are we also nothing but smoke?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: '“Ah, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', listen to my prayer, my'
- type: usfm
  marker: q2
  children:
  - type: text
    text: cry—open your ears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t be callous;
- type: usfm
  marker: q2
  children:
  - type: text
    text: just look at these tears of mine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m a stranger here. I don’t know my way—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a migrant like my whole family.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give me a break, cut me some slack
- type: usfm
  marker: q2
  children:
  - type: text
    text: before it’s too late and I’m out of here.”
