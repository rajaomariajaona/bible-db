document_id: PSA.39,97
type_code: eng
verses:
  '1':
  - type: text
    content: I’m determined to watch steps and tongue
  - type: text
    content: so they won’t land me in trouble.
  - type: text
    content: I decided to hold my tongue
  - type: text
    content: as long as Wicked is in the room.
  - type: text
    content: “Mum’s the word,” I said, and kept quiet.
  - type: text
    content: But the longer I kept silence
  - type: text
    content: The worse it got—
  - type: text
    content: my insides got hotter and hotter.
  - type: text
    content: My thoughts boiled over;
  - type: text
    content: I spilled my guts.
  '12':
  - type: text
    content: '“Ah, '
  - type: text
    content: God
  - type: text
    content: ', listen to my prayer, my'
  - type: text
    content: cry—open your ears.
  - type: text
    content: Don’t be callous;
  - type: text
    content: just look at these tears of mine.
  - type: text
    content: I’m a stranger here. I don’t know my way—
  - type: text
    content: a migrant like my whole family.
  - type: text
    content: Give me a break, cut me some slack
  - type: text
    content: before it’s too late and I’m out of here.”
  '4':
  - type: text
    content: '“Tell me, what’s going on, '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: How long do I have to live?
  - type: text
    content: Give me the bad news!
  - type: text
    content: You’ve kept me on pretty short rations;
  - type: text
    content: my life is a string too short to be saved.
  - type: text
    content: Oh! we’re all puffs of air.
  - type: text
    content: Oh! we’re all shadows in a campfire.
  - type: text
    content: Oh! we’re just spit in the wind.
  - type: text
    content: We make our pile, and then we leave it.
  '7':
  - type: text
    content: “What am I doing in the meantime, Lord?
  - type: text
    content: Hoping
  - type: text
    content: ', that’s what I’m doing—hoping'
  - type: text
    content: You’ll save me from a rebel life,
  - type: text
    content: save me from the contempt of idiots.
  - type: text
    content: I’ll say no more, I’ll shut my mouth,
  - type: text
    content: since you, Lord, are behind all this.
  - type: text
    content: But I can’t take it much longer.
  - type: text
    content: When you put us through the fire
  - type: text
    content: to purge us from our sin,
  - type: text
    content: our dearest idols go up in smoke.
  - type: text
    content: Are we also nothing but smoke?
