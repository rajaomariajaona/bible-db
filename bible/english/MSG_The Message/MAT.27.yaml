document_id: MAT.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Thirty Silver Coins
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: In the first light of dawn, all the high priests and religious leaders met and put the finishing touches on their plot to kill Jesus. Then they tied him up and paraded him to Pilate, the governor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Judas, the one who betrayed him, realized that Jesus was doomed. Overcome with remorse, he gave back the thirty silver coins to the high priests, saying, “I’ve sinned. I’ve betrayed an innocent man.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They said, “What do we care? That’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' problem!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Judas threw the silver coins into the Temple and left. Then he went out and hung himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-10
  - type: text
    text: 'The high priests picked up the silver pieces, but then didn’t know what to do with them. “It wouldn’t be right to give this—a payment for murder!—as an offering in the Temple.” They decided to get rid of it by buying the “Potter’s Field” and use it as a burial place for the homeless. That’s how the field got called “Murder Meadow,” a name that has stuck to this day. Then Jeremiah’s words became history:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They took the thirty silver pieces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The price of the one priced by some sons of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they purchased the potter’s field.
- type: usfm
  marker: m
  children:
  - type: text
    text: And so they unwittingly followed the divine instructions to the letter.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pilate
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jesus was placed before the governor, who questioned him: “Are you the ‘King of the Jews’?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Jesus said, “If you say so.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: But when the accusations rained down hot and heavy from the high priests and religious leaders, he said nothing. Pilate asked him, “Do you hear that long list of accusations? Aren’t you going to say something?” Jesus kept silence—not a word from his mouth. The governor was impressed, really impressed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: 'It was an old custom during the Feast for the governor to pardon a single prisoner named by the crowd. At the time, they had the infamous Jesus Barabbas in prison. With the crowd before him, Pilate said, “Which prisoner do you want me to pardon: Jesus Barabbas, or Jesus the so-called Christ?” He knew it was through sheer spite that they had turned Jesus over to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'While court was still in session, Pilate’s wife sent him a message: “Don’t get mixed up in judging this noble man. I’ve just been through a long and troubled night because of a dream about him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Meanwhile, the high priests and religious leaders had talked the crowd into asking for the pardon of Barabbas and the execution of Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The governor asked, “Which of the two do you want me to pardon?”
- type: usfm
  marker: p
  children:
  - type: text
    text: They said, “Barabbas!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Then what do I do with Jesus, the so-called Christ?”
- type: usfm
  marker: p
  children:
  - type: text
    text: They all shouted, “Nail him to a cross!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He objected, “But for what crime?”
- type: usfm
  marker: p
  children:
  - type: text
    text: But they yelled all the louder, “Nail him to a cross!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When Pilate saw that he was getting nowhere and that a riot was imminent, he took a basin of water and washed his hands in full sight of the crowd, saying, “I’m washing my hands of responsibility for this man’s death. From now on, it’s in your hands. You’re judge and jury.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The crowd answered, “We’ll take the blame, we and our children after us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then he pardoned Barabbas. But he had Jesus whipped, and then handed over for crucifixion.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-31
  - type: text
    text: 'The soldiers assigned to the governor took Jesus into the governor’s palace and got the entire brigade together for some fun. They stripped him and dressed him in a red robe. They plaited a crown from branches of a thornbush and set it on his head. They put a stick in his right hand for a scepter. Then they knelt before him in mocking reverence: “Bravo, King of the Jews!” they said. “Bravo!” Then they spit on him and hit him on the head with the stick. When they had had their fun, they took off the robe and put his own clothes back on him. Then they proceeded out to the crucifixion.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-34
  - type: text
    text: Along the way they came on a man from Cyrene named Simon and made him carry Jesus’ cross. Arriving at Golgotha, the place they call “Skull Hill,” they offered him a mild painkiller (a mixture of wine and myrrh), but when he tasted it he wouldn’t drink it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-40
  - type: text
    text: 'After they had finished nailing him to the cross and were waiting for him to die, they killed time by throwing dice for his clothes. Above his head they had posted the criminal charge against him: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: this is jesus, the king of the jews
  - type: text
    text: '. Along with him, they also crucified two criminals, one to his right, the other to his left. People passing along the road jeered, shaking their heads in mock lament: “You bragged that you could tear down the Temple and then rebuild it in three days—so show us your stuff! Save yourself! If you’re really God’s Son, come down from that cross!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-44
  - type: text
    text: 'The high priests, along with the religion scholars and leaders, were right there mixing it up with the rest of them, having a great time poking fun at him: “He saved others—he can’t save himself! King of Israel, is he? Then let him get down from that cross. We’ll '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all
  - type: text
    text: ' become believers then! He was so sure of God—well, let him rescue his ‘Son’ now—if he wants him! He did claim to be God’s Son, didn’t he?” Even the two criminals crucified next to him joined in the mockery.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-46
  - type: text
    text: From noon to three, the whole earth was dark. Around mid-afternoon Jesus groaned out of the depths, crying loudly, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Eli, Eli, lama sabachthani?
  - type: text
    text: ” which means, “My God, my God, why have you abandoned me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-49
  - type: text
    text: Some bystanders who heard him said, “He’s calling for Elijah.” One of them ran and got a sponge soaked in sour wine and lifted it on a stick so he could drink. The others joked, “Don’t be in such a hurry. Let’s see if Elijah comes and saves him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: But Jesus, again crying out loudly, breathed his last.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 51-53
  - type: text
    text: At that moment, the Temple curtain was ripped in two, top to bottom. There was an earthquake, and rocks were split in pieces. What’s more, tombs were opened up, and many bodies of believers asleep in their graves were raised. (After Jesus’ resurrection, they left the tombs, entered the holy city, and appeared to many.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: The captain of the guard and those with him, when they saw the earthquake and everything else that was happening, were scared to death. They said, “This has to be the Son of God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 55-56
  - type: text
    text: There were also quite a few women watching from a distance, women who had followed Jesus from Galilee in order to serve him. Among them were Mary Magdalene, Mary the mother of James and Joseph, and the mother of the Zebedee brothers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tomb
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 57-61
  - type: text
    text: Late in the afternoon a wealthy man from Arimathea, a disciple of Jesus, arrived. His name was Joseph. He went to Pilate and asked for Jesus’ body. Pilate granted his request. Joseph took the body and wrapped it in clean linens, put it in his own tomb, a new tomb only recently cut into the rock, and rolled a large stone across the entrance. Then he went off. But Mary Magdalene and the other Mary stayed, sitting in plain view of the tomb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 62-64
  - type: text
    text: After sundown, the high priests and Pharisees arranged a meeting with Pilate. They said, “Sir, we just remembered that that liar announced while he was still alive, ‘After three days I will be raised.’ We’ve got to get that tomb sealed until the third day. There’s a good chance his disciples will come and steal the corpse and then go around saying, ‘He’s risen from the dead.’ Then we’ll be worse off than before, the final deceit surpassing the first.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 65-66
  - type: text
    text: Pilate told them, “You will have a guard. Go ahead and secure it the best you can.” So they went out and secured the tomb, sealing the stone and posting guards.
