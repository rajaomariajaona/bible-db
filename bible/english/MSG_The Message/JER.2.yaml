  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me. It went like this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Get out in the streets and call to Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I remember your youthful loyalty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our love as newlyweds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You stayed with me through the wilderness years,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stuck with me through all the hard places.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Israel was '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s holy choice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pick of the crop.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anyone who laid a hand on her
- type: usfm
  marker: q2
  children:
  - type: text
    text: would soon wish he hadn’t!’”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
