- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'Hear '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message, House of Jacob!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, you—House of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: “What did your ancestors find fault with in me'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they drifted so far from me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Took up with Sir Windbag
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turned into windbags themselves?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It never occurred to them to say, ‘Where’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God who got us out of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who took care of us through thick and thin, those rough-and-tumble
- type: usfm
  marker: q2
  children:
  - type: text
    text: wilderness years of parched deserts and death valleys,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A land that no one who enters comes out of,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a cruel, inhospitable land?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: “I brought you to a garden land
- type: usfm
  marker: q2
  children:
  - type: text
    text: where you could eat lush fruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you barged in and polluted my land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trashed and defiled my dear land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The priests never thought to ask, ‘Where’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ?’
- type: usfm
  marker: q2
  children:
  - type: text
    text: The religion experts knew nothing of me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rulers defied me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The prophets preached god Baal
- type: usfm
  marker: q1
  children:
  - type: text
    text: And chased empty god-dreams and silly god-schemes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: “Because of all this, I’m bringing charges against you”
- type: usfm
  marker: q3
  children:
  - type: text
    text: —
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—
- type: usfm
  marker: q2
  children:
  - type: text
    text: “charging you and your children and your grandchildren.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look around. Have you ever seen anything quite like this?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sail to the western islands and look.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Travel to the Kedar wilderness and look.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look closely. Has this ever happened before,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That a nation has traded in its gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: for gods that aren’t even close to gods?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my people have traded my Glory
- type: usfm
  marker: q2
  children:
  - type: text
    text: for empty god-dreams and silly god-schemes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: “Stand in shock, heavens, at what you see!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Throw up your hands in disbelief—this can’t be!”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“My people have committed a compound sin:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ve walked out on me, the fountain
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of fresh flowing waters, and then dug cisterns—
- type: usfm
  marker: q2
  children:
  - type: text
    text: cisterns that leak, cisterns that are no better than sieves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-17
  - type: text
    text: “Isn’t Israel a valued servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: born into a family with place and position?
- type: usfm
  marker: q1
  children:
  - type: text
    text: So how did she end up a piece of meat
- type: usfm
  marker: q2
  children:
  - type: text
    text: fought over by snarling and roaring lions?
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s nothing left of her but a few old bones,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her towns trashed and deserted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Egyptians from the cities of Memphis and Tahpanhes
- type: usfm
  marker: q2
  children:
  - type: text
    text: have broken your skulls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And why do you think all this has happened?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Isn’t it because you walked out on your God
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as he was beginning to lead you in the right way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: “And now, what do you think you’ll get by going off to Egypt?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Maybe a cool drink of Nile River water?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or what do you think you’ll get by going off to Assyria?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Maybe a long drink of Euphrates River water?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your evil ways will get you a sound thrashing, that’s what you’ll get.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ll pay dearly for your disloyal ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take a long, hard look at what you’ve done and its bitter results.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Was it worth it to have walked out on your God?”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Decree, Master '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Addicted to Alien Gods
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: “A long time ago you broke out of the harness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You shook off all restraints.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You said, ‘I will not serve!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and off you went,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Visiting every sex-and-religion shrine on the way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a common whore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were a select vine when I planted you
- type: usfm
  marker: q2
  children:
  - type: text
    text: from completely reliable stock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And look how you’ve turned out—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a tangle of rancid growth, a poor excuse for a vine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Scrub, using the strongest soaps.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Scour your skin raw.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sin-grease won’t come out. I can’t stand to even look at you!”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree, the Master’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: “How dare you tell me, ‘I’m not stained by sin.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve never chased after the Baal sex gods’!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, look at the tracks you’ve left behind in the valley.
- type: usfm
  marker: q2
  children:
  - type: text
    text: How do you account for what is written in the desert dust—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tracks of a camel in heat, running this way and that,
- type: usfm
  marker: q2
  children:
  - type: text
    text: tracks of a wild donkey in rut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sniffing the wind for the slightest scent of sex.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who could possibly corral her!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the hunt for sex, sex, and more sex—
- type: usfm
  marker: q2
  children:
  - type: text
    text: insatiable, indiscriminate, promiscuous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Slow down. Take a deep breath. What’s the hurry?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why wear yourself out? Just what are you after anyway?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you say, ‘I can’t help it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m addicted to alien gods. I can’t quit.’
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: “Just as a thief is chagrined, but only when caught,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the people of Israel are chagrined,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Caught along with their kings and princes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their priests and prophets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They walk up to a tree and say, ‘My father!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: They pick up a stone and say, ‘My mother! You bore me!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: All I ever see of them is their backsides.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They never look me in the face.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when things go badly, they don’t hesitate to come running,
- type: usfm
  marker: q2
  children:
  - type: text
    text: calling out, ‘Get a move on! Save us!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why not go to your handcrafted gods you’re so fond of?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rouse them. Let them save you from your bad times.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve got more gods, Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: than you know what to do with.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Trying Out Another Sin-Project
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: “What do you have against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: running off to assert your ‘independence’?”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ve wasted my time trying to train your children.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ve paid no attention to me, ignored my discipline.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you’ve gotten rid of your God-messengers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: treating them like dirt and sweeping them away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: “What a generation you turned out to be!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Didn’t I tell you? Didn’t I warn you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have I let you down, Israel?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Am I nothing but a dead-end street?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do my people say, ‘Good riddance!
- type: usfm
  marker: q2
  children:
  - type: text
    text: From now on we’re on our own’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Young women don’t forget their jewelry, do they?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Brides don’t show up without their veils, do they?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my people forget me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Day after day after day they never give me a thought.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-35
  - type: text
    text: “What an impressive start you made
- type: usfm
  marker: q2
  children:
  - type: text
    text: to get the most out of life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You founded schools of sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taught graduate courses in evil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now you’re sending out graduates, resplendent in cap and gown—
- type: usfm
  marker: q2
  children:
  - type: text
    text: except the gowns are stained with the blood of your victims!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All that blood convicts you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You cut and hurt a lot of people to get where you are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And yet you have the nerve to say, ‘I’ve done nothing wrong.
- type: usfm
  marker: q2
  children:
  - type: text
    text: God doesn’t mind. He hasn’t punished me, has he?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t look now, but judgment’s on the way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: aimed at you who say, ‘I’ve done nothing wrong.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: “You think it’s just a small thing, don’t you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to try out another sin-project when the first one fails?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But Egypt will leave you in the lurch
- type: usfm
  marker: q2
  children:
  - type: text
    text: the same way that Assyria did.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re going to walk away from there
- type: usfm
  marker: q2
  children:
  - type: text
    text: wringing your hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have blacklisted those you trusted.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ll get not a lick of help from them.”
