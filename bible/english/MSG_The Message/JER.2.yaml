type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Was God’s Holy Choice
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me. It went like this:'
  - type: text
    content: “Get out in the streets and call to Jerusalem,
  - type: text
    content: ‘
  - type: text
    content: God
  - type: text
    content: ’s Message!
  - type: text
    content: I remember your youthful loyalty,
  - type: text
    content: our love as newlyweds.
  - type: text
    content: You stayed with me through the wilderness years,
  - type: text
    content: stuck with me through all the hard places.
  - type: text
    content: 'Israel was '
  - type: text
    content: God
  - type: text
    content: ’s holy choice,
  - type: text
    content: the pick of the crop.
  - type: text
    content: Anyone who laid a hand on her
  - type: text
    content: would soon wish he hadn’t!’”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: “Stand in shock, heavens, at what you see!
  - type: text
    content: Throw up your hands in disbelief—this can’t be!”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '“My people have committed a compound sin:'
  - type: text
    content: they’ve walked out on me, the fountain
  - type: text
    content: Of fresh flowing waters, and then dug cisterns—
  - type: text
    content: cisterns that leak, cisterns that are no better than sieves.
  '14':
  - type: text
    content: “Isn’t Israel a valued servant,
  - type: text
    content: born into a family with place and position?
  - type: text
    content: So how did she end up a piece of meat
  - type: text
    content: fought over by snarling and roaring lions?
  - type: text
    content: There’s nothing left of her but a few old bones,
  - type: text
    content: her towns trashed and deserted.
  - type: text
    content: Egyptians from the cities of Memphis and Tahpanhes
  - type: text
    content: have broken your skulls.
  - type: text
    content: And why do you think all this has happened?
  - type: text
    content: Isn’t it because you walked out on your God
  - type: text
    content: just as he was beginning to lead you in the right way?
  '18':
  - type: text
    content: “And now, what do you think you’ll get by going off to Egypt?
  - type: text
    content: Maybe a cool drink of Nile River water?
  - type: text
    content: Or what do you think you’ll get by going off to Assyria?
  - type: text
    content: Maybe a long drink of Euphrates River water?
  - type: text
    content: Your evil ways will get you a sound thrashing, that’s what you’ll get.
  - type: text
    content: You’ll pay dearly for your disloyal ways.
  - type: text
    content: Take a long, hard look at what you’ve done and its bitter results.
  - type: text
    content: Was it worth it to have walked out on your God?”
  - type: text
    content: God
  - type: text
    content: '’s Decree, Master '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: heading
    content: Addicted to Alien Gods
  '20':
  - type: text
    content: “A long time ago you broke out of the harness.
  - type: text
    content: You shook off all restraints.
  - type: text
    content: You said, ‘I will not serve!’
  - type: text
    content: and off you went,
  - type: text
    content: Visiting every sex-and-religion shrine on the way,
  - type: text
    content: like a common whore.
  - type: text
    content: You were a select vine when I planted you
  - type: text
    content: from completely reliable stock.
  - type: text
    content: And look how you’ve turned out—
  - type: text
    content: a tangle of rancid growth, a poor excuse for a vine.
  - type: text
    content: Scrub, using the strongest soaps.
  - type: text
    content: Scour your skin raw.
  - type: text
    content: The sin-grease won’t come out. I can’t stand to even look at you!”
  - type: text
    content: God
  - type: text
    content: ’s Decree, the Master’s Decree.
  '23':
  - type: text
    content: “How dare you tell me, ‘I’m not stained by sin.
  - type: text
    content: I’ve never chased after the Baal sex gods’!
  - type: text
    content: Well, look at the tracks you’ve left behind in the valley.
  - type: text
    content: How do you account for what is written in the desert dust—
  - type: text
    content: Tracks of a camel in heat, running this way and that,
  - type: text
    content: tracks of a wild donkey in rut,
  - type: text
    content: Sniffing the wind for the slightest scent of sex.
  - type: text
    content: Who could possibly corral her!
  - type: text
    content: On the hunt for sex, sex, and more sex—
  - type: text
    content: insatiable, indiscriminate, promiscuous.
  '25':
  - type: text
    content: “Slow down. Take a deep breath. What’s the hurry?
  - type: text
    content: Why wear yourself out? Just what are you after anyway?
  - type: text
    content: But you say, ‘I can’t help it.
  - type: text
    content: I’m addicted to alien gods. I can’t quit.’
  - type: text
    content: '* * *'
  '26':
  - type: text
    content: “Just as a thief is chagrined, but only when caught,
  - type: text
    content: so the people of Israel are chagrined,
  - type: text
    content: Caught along with their kings and princes,
  - type: text
    content: their priests and prophets.
  - type: text
    content: They walk up to a tree and say, ‘My father!’
  - type: text
    content: They pick up a stone and say, ‘My mother! You bore me!’
  - type: text
    content: All I ever see of them is their backsides.
  - type: text
    content: They never look me in the face.
  - type: text
    content: But when things go badly, they don’t hesitate to come running,
  - type: text
    content: calling out, ‘Get a move on! Save us!’
  - type: text
    content: Why not go to your handcrafted gods you’re so fond of?
  - type: text
    content: Rouse them. Let them save you from your bad times.
  - type: text
    content: You’ve got more gods, Judah,
  - type: text
    content: than you know what to do with.
  - type: heading
    content: Trying Out Another Sin-Project
  '29':
  - type: text
    content: “What do you have against me,
  - type: text
    content: running off to assert your ‘independence’?”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “I’ve wasted my time trying to train your children.
  - type: text
    content: They’ve paid no attention to me, ignored my discipline.
  - type: text
    content: And you’ve gotten rid of your God-messengers,
  - type: text
    content: treating them like dirt and sweeping them away.
  '31':
  - type: text
    content: “What a generation you turned out to be!
  - type: text
    content: Didn’t I tell you? Didn’t I warn you?
  - type: text
    content: Have I let you down, Israel?
  - type: text
    content: Am I nothing but a dead-end street?
  - type: text
    content: Why do my people say, ‘Good riddance!
  - type: text
    content: From now on we’re on our own’?
  - type: text
    content: Young women don’t forget their jewelry, do they?
  - type: text
    content: Brides don’t show up without their veils, do they?
  - type: text
    content: But my people forget me.
  - type: text
    content: Day after day after day they never give me a thought.
  - type: text
    content: '* * *'
  '33':
  - type: text
    content: “What an impressive start you made
  - type: text
    content: to get the most out of life.
  - type: text
    content: You founded schools of sin,
  - type: text
    content: taught graduate courses in evil!
  - type: text
    content: And now you’re sending out graduates, resplendent in cap and gown—
  - type: text
    content: except the gowns are stained with the blood of your victims!
  - type: text
    content: All that blood convicts you.
  - type: text
    content: You cut and hurt a lot of people to get where you are.
  - type: text
    content: And yet you have the nerve to say, ‘I’ve done nothing wrong.
  - type: text
    content: God doesn’t mind. He hasn’t punished me, has he?’
  - type: text
    content: Don’t look now, but judgment’s on the way,
  - type: text
    content: aimed at you who say, ‘I’ve done nothing wrong.’
  '36':
  - type: text
    content: “You think it’s just a small thing, don’t you,
  - type: text
    content: to try out another sin-project when the first one fails?
  - type: text
    content: But Egypt will leave you in the lurch
  - type: text
    content: the same way that Assyria did.
  - type: text
    content: You’re going to walk away from there
  - type: text
    content: wringing your hands.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', have blacklisted those you trusted.'
  - type: text
    content: You’ll get not a lick of help from them.”
  '4':
  - type: text
    content: 'Hear '
  - type: text
    content: God
  - type: text
    content: ’s Message, House of Jacob!
  - type: text
    content: Yes, you—House of Israel!
  - type: text
    content: God
  - type: text
    content: '’s Message: “What did your ancestors find fault with in me'
  - type: text
    content: that they drifted so far from me,
  - type: text
    content: Took up with Sir Windbag
  - type: text
    content: and turned into windbags themselves?
  - type: text
    content: 'It never occurred to them to say, ‘Where’s '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the God who got us out of Egypt,
  - type: text
    content: Who took care of us through thick and thin, those rough-and-tumble
  - type: text
    content: wilderness years of parched deserts and death valleys,
  - type: text
    content: A land that no one who enters comes out of,
  - type: text
    content: a cruel, inhospitable land?’
  '7':
  - type: text
    content: “I brought you to a garden land
  - type: text
    content: where you could eat lush fruit.
  - type: text
    content: But you barged in and polluted my land,
  - type: text
    content: trashed and defiled my dear land.
  - type: text
    content: 'The priests never thought to ask, ‘Where’s '
  - type: text
    content: God
  - type: text
    content: ?’
  - type: text
    content: The religion experts knew nothing of me.
  - type: text
    content: The rulers defied me.
  - type: text
    content: The prophets preached god Baal
  - type: text
    content: And chased empty god-dreams and silly god-schemes.
  '9':
  - type: text
    content: “Because of all this, I’m bringing charges against you”
  - type: text
    content: —
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “charging you and your children and your grandchildren.
  - type: text
    content: Look around. Have you ever seen anything quite like this?
  - type: text
    content: Sail to the western islands and look.
  - type: text
    content: Travel to the Kedar wilderness and look.
  - type: text
    content: Look closely. Has this ever happened before,
  - type: text
    content: That a nation has traded in its gods
  - type: text
    content: for gods that aren’t even close to gods?
  - type: text
    content: But my people have traded my Glory
  - type: text
    content: for empty god-dreams and silly god-schemes.
