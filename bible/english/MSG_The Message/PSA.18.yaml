document_id: PSA.18,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I love you, '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: you make me strong.
  - type: text
    content: God
  - type: text
    content: ' is bedrock under my feet,'
  - type: text
    content: the castle in which I live,
  - type: text
    content: my rescuing knight.
  - type: text
    content: My God—the high crag
  - type: text
    content: where I run for dear life,
  - type: text
    content: hiding behind the boulders,
  - type: text
    content: safe in the granite hideout.
  '16':
  - type: text
    content: But me he caught—reached all the way
  - type: text
    content: from sky to sea; he pulled me out
  - type: text
    content: Of that ocean of hate, that enemy chaos,
  - type: text
    content: the void in which I was drowning.
  - type: text
    content: They hit me when I was down,
  - type: text
    content: 'but '
  - type: text
    content: God
  - type: text
    content: ' stuck by me.'
  - type: text
    content: He stood me up on a wide-open field;
  - type: text
    content: I stood there saved—surprised to be loved!
  '20':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' made my life complete'
  - type: text
    content: when I placed all the pieces before him.
  - type: text
    content: When I got my act together,
  - type: text
    content: he gave me a fresh start.
  - type: text
    content: 'Now I’m alert to '
  - type: text
    content: God
  - type: text
    content: ’s ways;
  - type: text
    content: I don’t take God for granted.
  - type: text
    content: Every day I review the ways he works;
  - type: text
    content: I try not to miss a trick.
  - type: text
    content: I feel put back together,
  - type: text
    content: and I’m watching my step.
  - type: text
    content: God
  - type: text
    content: ' rewrote the text of my life'
  - type: text
    content: when I opened the book of my heart to his eyes.
  '25':
  - type: text
    content: The good people taste your goodness,
  - type: text
    content: The whole people taste your health,
  - type: text
    content: The true people taste your truth,
  - type: text
    content: The bad ones can’t figure you out.
  - type: text
    content: You take the side of the down-and-out,
  - type: text
    content: But the stuck-up you take down a notch.
  '28':
  - type: text
    content: 'Suddenly, '
  - type: text
    content: God
  - type: text
    content: ', you floodlight my life;'
  - type: text
    content: I’m blazing with glory, God’s glory!
  - type: text
    content: I smash the bands of marauders,
  - type: text
    content: I vault the highest fences.
  '3':
  - type: text
    content: 'I sing to '
  - type: text
    content: God
  - type: text
    content: ', the Praise-Lofty,'
  - type: text
    content: and find myself safe and saved.
  '30':
  - type: text
    content: What a God! His road
  - type: text
    content: stretches straight and smooth.
  - type: text
    content: 'Every '
  - type: text
    content: God
  - type: text
    content: -direction is road-tested.
  - type: text
    content: Everyone who runs toward him
  - type: text
    content: Makes it.
  '31':
  - type: text
    content: 'Is there any god like '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: Are we not at bedrock?
  - type: text
    content: Is not this the God who armed me,
  - type: text
    content: then aimed me in the right direction?
  - type: text
    content: Now I run like a deer;
  - type: text
    content: I’m king of the mountain.
  - type: text
    content: He shows me how to fight;
  - type: text
    content: I can bend a bronze bow!
  - type: text
    content: You protect me with salvation-armor;
  - type: text
    content: you hold me up with a firm hand,
  - type: text
    content: caress me with your gentle ways.
  - type: text
    content: You cleared the ground under me
  - type: text
    content: so my footing was firm.
  - type: text
    content: When I chased my enemies I caught them;
  - type: text
    content: I didn’t let go till they were dead men.
  - type: text
    content: I nailed them; they were down for good;
  - type: text
    content: then I walked all over them.
  - type: text
    content: You armed me well for this fight,
  - type: text
    content: you smashed the upstarts.
  - type: text
    content: You made my enemies turn tail,
  - type: text
    content: and I wiped out the haters.
  - type: text
    content: They cried “uncle”
  - type: text
    content: but Uncle didn’t come;
  - type: text
    content: 'They yelled for '
  - type: text
    content: God
  - type: text
    content: and got no for an answer.
  - type: text
    content: I ground them to dust; they gusted in the wind.
  - type: text
    content: I threw them out, like garbage in the gutter.
  '4':
  - type: text
    content: The hangman’s noose was tight at my throat;
  - type: text
    content: devil waters rushed over me.
  - type: text
    content: Hell’s ropes cinched me tight;
  - type: text
    content: death traps barred every exit.
  '43':
  - type: text
    content: You rescued me from a squabbling people;
  - type: text
    content: you made me a leader of nations.
  - type: text
    content: People I’d never heard of served me;
  - type: text
    content: the moment they got wind of me they listened.
  - type: text
    content: The foreign devils gave up; they came
  - type: text
    content: on their bellies, crawling from their hideouts.
  '46':
  - type: text
    content: 'Live, '
  - type: text
    content: God
  - type: text
    content: '! Blessings from my Rock,'
  - type: text
    content: my free and freeing God, towering!
  - type: text
    content: This God set things right for me
  - type: text
    content: and shut up the people who talked back.
  - type: text
    content: He rescued me from enemy anger,
  - type: text
    content: he pulled me from the grip of upstarts,
  - type: text
    content: He saved me from the bullies.
  '49':
  - type: text
    content: 'That’s why I’m thanking you, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: all over the world.
  - type: text
    content: That’s why I’m singing songs
  - type: text
    content: that rhyme your name.
  - type: text
    content: God’s king takes the trophy;
  - type: text
    content: God’s chosen is beloved.
  - type: text
    content: I mean David and all his children—
  - type: text
    content: always.
  '6':
  - type: text
    content: 'A hostile world! I call to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I cry to God to help me.
  - type: text
    content: From his palace he hears my call;
  - type: text
    content: my cry brings me right into his presence—
  - type: text
    content: a private audience!
  '7':
  - type: text
    content: Earth wobbles and lurches;
  - type: text
    content: huge mountains shake like leaves,
  - type: text
    content: Quake like aspen leaves
  - type: text
    content: because of his rage.
  - type: text
    content: His nostrils flare, bellowing smoke;
  - type: text
    content: his mouth spits fire.
  - type: text
    content: Tongues of fire dart in and out;
  - type: text
    content: he lowers the sky.
  - type: text
    content: He steps down;
  - type: text
    content: under his feet an abyss opens up.
  - type: text
    content: He’s riding a winged creature,
  - type: text
    content: swift on wind-wings.
  - type: text
    content: Now he’s wrapped himself
  - type: text
    content: in a trenchcoat of black-cloud darkness.
  - type: text
    content: But his cloud-brightness bursts through,
  - type: text
    content: spraying hailstones and fireballs.
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' thundered out of heaven;'
  - type: text
    content: the High God gave a great shout,
  - type: text
    content: spraying hailstones and fireballs.
  - type: text
    content: God shoots his arrows—pandemonium!
  - type: text
    content: He hurls his lightnings—a rout!
  - type: text
    content: The secret sources of ocean are exposed,
  - type: text
    content: the hidden depths of earth lie uncovered
  - type: text
    content: The moment you roar in protest,
  - type: text
    content: let loose your hurricane anger.
