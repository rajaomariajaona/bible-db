document_id: PSA.18
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'I love you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: you make me strong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is bedrock under my feet,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the castle in which I live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my rescuing knight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My God—the high crag
- type: usfm
  marker: q2
  children:
  - type: text
    text: where I run for dear life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hiding behind the boulders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: safe in the granite hideout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I sing to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Praise-Lofty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find myself safe and saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: The hangman’s noose was tight at my throat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: devil waters rushed over me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hell’s ropes cinched me tight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: death traps barred every exit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A hostile world! I call to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cry to God to help me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From his palace he hears my call;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my cry brings me right into his presence—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a private audience!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-15
  - type: text
    text: Earth wobbles and lurches;
- type: usfm
  marker: q2
  children:
  - type: text
    text: huge mountains shake like leaves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quake like aspen leaves
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of his rage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His nostrils flare, bellowing smoke;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his mouth spits fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tongues of fire dart in and out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he lowers the sky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He steps down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: under his feet an abyss opens up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s riding a winged creature,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swift on wind-wings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now he’s wrapped himself
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a trenchcoat of black-cloud darkness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But his cloud-brightness bursts through,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spraying hailstones and fireballs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' thundered out of heaven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the High God gave a great shout,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spraying hailstones and fireballs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God shoots his arrows—pandemonium!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He hurls his lightnings—a rout!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The secret sources of ocean are exposed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the hidden depths of earth lie uncovered
- type: usfm
  marker: q1
  children:
  - type: text
    text: The moment you roar in protest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let loose your hurricane anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19
  - type: text
    text: But me he caught—reached all the way
- type: usfm
  marker: q2
  children:
  - type: text
    text: from sky to sea; he pulled me out
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of that ocean of hate, that enemy chaos,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the void in which I was drowning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hit me when I was down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stuck by me.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He stood me up on a wide-open field;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stood there saved—surprised to be loved!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-24
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made my life complete'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I placed all the pieces before him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I got my act together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he gave me a fresh start.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Now I’m alert to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s ways;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I don’t take God for granted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every day I review the ways he works;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I try not to miss a trick.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I feel put back together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’m watching my step.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' rewrote the text of my life'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I opened the book of my heart to his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: The good people taste your goodness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole people taste your health,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The true people taste your truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The bad ones can’t figure you out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You take the side of the down-and-out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the stuck-up you take down a notch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: 'Suddenly, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you floodlight my life;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m blazing with glory, God’s glory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I smash the bands of marauders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I vault the highest fences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: What a God! His road
- type: usfm
  marker: q2
  children:
  - type: text
    text: stretches straight and smooth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Every '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -direction is road-tested.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everyone who runs toward him
- type: usfm
  marker: q1
  children:
  - type: text
    text: Makes it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-42
  - type: text
    text: 'Is there any god like '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Are we not at bedrock?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is not this the God who armed me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then aimed me in the right direction?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I run like a deer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m king of the mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shows me how to fight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can bend a bronze bow!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You protect me with salvation-armor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you hold me up with a firm hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: caress me with your gentle ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You cleared the ground under me
- type: usfm
  marker: q2
  children:
  - type: text
    text: so my footing was firm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I chased my enemies I caught them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I didn’t let go till they were dead men.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I nailed them; they were down for good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I walked all over them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You armed me well for this fight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you smashed the upstarts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You made my enemies turn tail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I wiped out the haters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cried “uncle”
- type: usfm
  marker: q2
  children:
  - type: text
    text: but Uncle didn’t come;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They yelled for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and got no for an answer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I ground them to dust; they gusted in the wind.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I threw them out, like garbage in the gutter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-45
  - type: text
    text: You rescued me from a squabbling people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you made me a leader of nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People I’d never heard of served me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the moment they got wind of me they listened.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The foreign devils gave up; they came
- type: usfm
  marker: q2
  children:
  - type: text
    text: on their bellies, crawling from their hideouts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 46-48
  - type: text
    text: 'Live, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Blessings from my Rock,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my free and freeing God, towering!
- type: usfm
  marker: q1
  children:
  - type: text
    text: This God set things right for me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shut up the people who talked back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rescued me from enemy anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he pulled me from the grip of upstarts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He saved me from the bullies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 49-50
  - type: text
    text: 'That’s why I’m thanking you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: all over the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s why I’m singing songs
- type: usfm
  marker: q2
  children:
  - type: text
    text: that rhyme your name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God’s king takes the trophy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God’s chosen is beloved.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I mean David and all his children—
- type: usfm
  marker: q2
  children:
  - type: text
    text: always.
