verses:
  '1':
  - type: heading
    content: A Baptism of Life-Change
  - type: text
    content: 'In the fifteenth year of the rule of Caesar Tiberius—it was while Pontius Pilate was governor of Judea; Herod, ruler of Galilee; his brother Philip, ruler of Iturea and Trachonitis; Lysanias, ruler of Abilene; during the Chief-Priesthood of Annas and Caiaphas—John, Zachariah’s son, out in the desert at the time, received a message from God. He went all through the country around the Jordan River preaching a baptism of life-change leading to forgiveness of sins, as described in the words of Isaiah the prophet:'
  - type: text
    content: Thunder in the desert!
  - type: text
    content: “Prepare God’s arrival!
  - type: text
    content: Make the road smooth and straight!
  - type: text
    content: Every ditch will be filled in,
  - type: text
    content: Every bump smoothed out,
  - type: text
    content: The detours straightened out,
  - type: text
    content: All the ruts paved over.
  - type: text
    content: Everyone will be there to see
  - type: text
    content: The parade of God’s salvation.”
  '10':
  - type: text
    content: The crowd asked him, “Then what are we supposed to do?”
  '11':
  - type: text
    content: “If you have two coats, give one away,” he said. “Do the same with your food.”
  '12':
  - type: text
    content: Tax men also came to be baptized and said, “Teacher, what should we do?”
  '13':
  - type: text
    content: He told them, “No more extortion—collect only what is required by law.”
  '14':
  - type: text
    content: Soldiers asked him, “And what should we do?”
  - type: text
    content: He told them, “No harassment, no blackmail—and be content with your rations.”
  '15':
  - type: text
    content: The interest of the people by now was building. They were all beginning to wonder, “Could this John be the Messiah?”
  '16':
  - type: text
    content: 'But John intervened: “I’m baptizing you here in the river. The main character in this drama, to whom I’m a mere stagehand, will ignite the kingdom life, a fire, the Holy Spirit within you, changing you from the inside out. He’s going to clean house—make a clean sweep of your lives. He’ll place everything true in its proper place before God; everything false he’ll put out with the trash to be burned.”'
  '18':
  - type: text
    content: 'There was a lot more of this—words that gave strength to the people, words that put heart in them. The Message! But Herod, the ruler, stung by John’s rebuke in the matter of Herodias, his brother Philip’s wife, capped his long string of evil deeds with this outrage: He put John in jail.'
  '21':
  - type: text
    content: 'After all the people were baptized, Jesus was baptized. As he was praying, the sky opened up and the Holy Spirit, like a dove descending, came down on him. And along with the Spirit, a voice: “You are my Son, chosen and marked by my love, pride of my life.”'
  - type: heading
    content: Son of Adam, Son of God
