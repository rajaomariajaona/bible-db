  '7':
  - type: text
    content: 'When crowds of people came out for baptism because it was the popular thing to do, John exploded: “Brood of snakes! What do you think you’re doing slithering down here to the river? Do you think a little water on your snakeskins is going to deflect God’s judgment? It’s your '
  - type: text
    content: life
  - type: text
    content: ' that must change, not your skin. And don’t think you can pull rank by claiming Abraham as ‘father.’ Being a child of Abraham is neither here nor there—children of Abraham are a dime a dozen. God can make children from stones if he wants. What counts is your life. Is it green and flourishing? Because if it’s deadwood, it goes on the fire.”'
