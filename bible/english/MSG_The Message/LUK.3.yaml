document_id: LUK.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Baptism of Life-Change
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: 'In the fifteenth year of the rule of Caesar Tiberius—it was while Pontius Pilate was governor of Judea; Herod, ruler of Galilee; his brother Philip, ruler of Iturea and Trachonitis; Lysanias, ruler of Abilene; during the Chief-Priesthood of Annas and Caiaphas—John, Zachariah’s son, out in the desert at the time, received a message from God. He went all through the country around the Jordan River preaching a baptism of life-change leading to forgiveness of sins, as described in the words of Isaiah the prophet:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thunder in the desert!
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Prepare God’s arrival!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make the road smooth and straight!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every ditch will be filled in,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every bump smoothed out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The detours straightened out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the ruts paved over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone will be there to see
- type: usfm
  marker: q1
  children:
  - type: text
    text: The parade of God’s salvation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'When crowds of people came out for baptism because it was the popular thing to do, John exploded: “Brood of snakes! What do you think you’re doing slithering down here to the river? Do you think a little water on your snakeskins is going to deflect God’s judgment? It’s your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: life
  - type: text
    text: ' that must change, not your skin. And don’t think you can pull rank by claiming Abraham as ‘father.’ Being a child of Abraham is neither here nor there—children of Abraham are a dime a dozen. God can make children from stones if he wants. What counts is your life. Is it green and flourishing? Because if it’s deadwood, it goes on the fire.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The crowd asked him, “Then what are we supposed to do?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “If you have two coats, give one away,” he said. “Do the same with your food.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tax men also came to be baptized and said, “Teacher, what should we do?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He told them, “No more extortion—collect only what is required by law.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Soldiers asked him, “And what should we do?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He told them, “No harassment, no blackmail—and be content with your rations.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The interest of the people by now was building. They were all beginning to wonder, “Could this John be the Messiah?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'But John intervened: “I’m baptizing you here in the river. The main character in this drama, to whom I’m a mere stagehand, will ignite the kingdom life, a fire, the Holy Spirit within you, changing you from the inside out. He’s going to clean house—make a clean sweep of your lives. He’ll place everything true in its proper place before God; everything false he’ll put out with the trash to be burned.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: 'There was a lot more of this—words that gave strength to the people, words that put heart in them. The Message! But Herod, the ruler, stung by John’s rebuke in the matter of Herodias, his brother Philip’s wife, capped his long string of evil deeds with this outrage: He put John in jail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'After all the people were baptized, Jesus was baptized. As he was praying, the sky opened up and the Holy Spirit, like a dove descending, came down on him. And along with the Spirit, a voice: “You are my Son, chosen and marked by my love, pride of my life.”'
- type: usfm
