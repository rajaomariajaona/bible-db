document_id: NUM.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rebels
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'Getting on his high horse one day, Korah son of Izhar, the son of Kohath, the son of Levi, along with a few Reubenites—Dathan and Abiram sons of Eliab, and On son of Peleth—rebelled against Moses. He had with him 250 leaders of the congregation of Israel, prominent men with positions in the Council. They came as a group and confronted Moses and Aaron, saying, “You’ve overstepped yourself. This entire community is holy and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is in their midst. So why do you act like you’re running the whole show?”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: 'Moses then ordered Dathan and Abiram, sons of Eliab, to appear, but they said, “We’re not coming. Isn’t it enough that you yanked us out of a land flowing with milk and honey to kill us in the wilderness? And now you keep trying to boss us around! Face it, you haven’t produced: You haven’t brought us into a land flowing with milk and honey, you haven’t given us the promised inheritance of fields and vineyards. You’d have to poke our eyes out to keep us from seeing what’s going on. Forget it, we’re not coming.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moses’ temper blazed white-hot. He said to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', “Don’t accept their Grain-Offering. I haven’t taken so much as a single donkey from them; I haven’t hurt a single hair of their heads.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: 'Moses said to Korah, “Bring your people before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' tomorrow. Appear there with them and Aaron. Have each man bring his censer filled with incense and present it to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —all 250 censers. And you and Aaron do the same, bring your censers.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: So they all did it. They brought their censers filled with fire and incense and stood at the entrance of the Tent of Meeting. Moses and Aaron did the same.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'It was Korah and his gang against Moses and Aaron at the entrance of the Tent of Meeting. The entire community could see the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses and Aaron, “Separate yourselves from this congregation so that I can finish them off and be done with them.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: They threw themselves on their faces and said, “O God, God of everything living, when one man sins are you going to take it out on the whole community?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Speak to the community. Tell them, Back off from the tents of Korah, Dathan, and Abiram.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'Moses got up and went to Dathan and Abiram. The leaders of Israel followed him. He then spoke to the community: “Back off from the tents of these bad men; don’t touch a thing that belongs to them lest you be carried off on the flood of their sins.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: So they all backed away from the tents of Korah, Dathan, and Abiram. Dathan and Abiram by now had come out and were standing at the entrance to their tents with their wives, children, and babies.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-30
    - type: text
      text: 'Moses continued to address the community: “This is how you’ll know that it was '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who sent me to do all these things and that it wasn’t anything I cooked up on my own. If these men die a natural death like all the rest of us, you’ll know that it wasn’t '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who sent me. But if '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' does something unprecedented—if the ground opens up and swallows the lot of them and they are pitched alive into Sheol—then you’ll know that these men have been insolent with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-33
    - type: text
      text: The words were hardly out of his mouth when the Earth split open. Earth opened its mouth and in one gulp swallowed them down, the men and their families, all the human beings connected with Korah, along with everything they owned. And that was the end of them, pitched alive into Sheol. The Earth closed up over them and that was the last the community heard of them.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: At the sound of their cries everyone around ran for dear life, shouting, “We’re about to be swallowed up alive!”
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent lightning. The fire cremated the 250 men who were offering the incense.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-38
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell Eleazar son of Aaron the priest, Gather up the censers from the smoldering cinders and scatter the coals a distance away for these censers have become holy. Take the censers of the men who have sinned and are now dead and hammer them into thin sheets for covering the Altar. They have been offered to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and are holy to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Let them serve as a sign to Israel, evidence of what happened this day.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-40
    - type: text
      text: 'So Eleazar gathered all the bronze censers that belonged to those who had been burned up and had them hammered flat and used to overlay the Altar, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had instructed him by Moses. This was to serve as a sign to Israel that only descendants of Aaron were allowed to burn incense before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ; anyone else trying it would end up like Korah and his gang.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: On hearing this, Moses threw himself facedown on the ground.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Grumbling broke out the next day in the community of Israel, grumbling against Moses and Aaron: “You have killed '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s people!”
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'But it so happened that when the community got together against Moses and Aaron, they looked over at the Tent of Meeting and there was the Cloud—the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for all to see.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 43-45
    - type: text
      text: 'Moses and Aaron stood at the front of the Tent of Meeting. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Back away from this congregation so that I can do away with them this very minute.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: They threw themselves facedown on the ground.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Moses said to Aaron, “Take your censer and fill it with incense, along with fire from the Altar. Get to the congregation as fast as you can: make atonement for them. Anger is pouring out from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —the plague has started!”
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 47-48
    - type: text
      text: Aaron grabbed the censer, as directed by Moses, and ran into the midst of the congregation. The plague had already begun. He put burning incense into the censer and atoned for the people. He stood there between the living and the dead and stopped the plague.
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 49-50
    - type: text
      text: Fourteen thousand seven hundred people died from the plague, not counting those who died in the affair of Korah. Aaron then went back to join Moses at the entrance to the Tent of Meeting. The plague was stopped.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then he addressed Korah and his gang: “In the morning '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will make clear who is on his side, who is holy. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will take his stand with the one he chooses.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: '“Now, Korah, here’s what I want you, you and your gang, to do: Tomorrow, take censers. In the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', put fire in them and then incense. Then we’ll see who is holy, see whom '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' chooses. Sons of Levi, you’ve overstepped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yourselves
    - type: text
      text: '!”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-11
    - type: text
      text: 'Moses continued with Korah, “Listen well now, sons of Levi. Isn’t it enough for you that the God of Israel has selected you out of the congregation of Israel to bring you near him to serve in the ministries of The Dwelling of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and to stand before the congregation to minister to them? He has brought you and all your brother Levites into his inner circle, and now you’re grasping for the priesthood, too. It’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' you’ve ganged up against, not us. What do you have against Aaron that you’re bad-mouthing him?”'
