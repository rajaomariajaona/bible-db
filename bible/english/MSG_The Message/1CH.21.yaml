document_id: 1CH.21,97
type_code: eng
verses:
  '1':
  - type: heading
    content: David, Satan, and Araunah
  - type: text
    content: Now Satan entered the scene and seduced David into taking a census of Israel. David gave orders to Joab and the army officers under him, “Canvass all the tribes of Israel, from Dan to Beersheba, and get a count of the population. I want to know the number.”
  '11':
  - type: text
    content: 'Gad delivered the message to David: “Do you want three years of famine, three months of running from your enemies while they chase you down, or three days of the sword of '
  - type: text
    content: God
  - type: text
    content: '—an epidemic unleashed on the country by an angel of '
  - type: text
    content: God
  - type: text
    content: '? Think it over and make up your mind. What shall I tell the One who sent me?”'
  '13':
  - type: text
    content: 'David told Gad, “They’re all terrible! But I’d rather be punished by '
  - type: text
    content: God
  - type: text
    content: ' whose mercy is great, than fall into human hands.”'
  '14':
  - type: text
    content: ' So '
  - type: text
    content: God
  - type: text
    content: ' unleashed an epidemic in Israel—seventy thousand Israelites died. God then sent the angel to Jerusalem but when he saw the destruction about to begin, he compassionately changed his mind and ordered the death angel, “Enough’s enough! Pull back!”'
  '15':
  - type: text
    content: ' The angel of '
  - type: text
    content: God
  - type: text
    content: ' had just reached the threshing floor of Araunah the Jebusite. David looked up and saw the angel hovering between earth and sky, sword drawn and about to strike Jerusalem. David and the elders bowed in prayer and covered themselves with rough burlap.'
  '17':
  - type: text
    content: David prayed, “Please! I’m the one who sinned; I’m the one at fault. But these sheep, what did they do wrong? Punish me, not them, me and my family; don’t take it out on them.”
  '18':
  - type: text
    content: 'The angel of '
  - type: text
    content: God
  - type: text
    content: ' ordered Gad to tell David to go and build an altar to '
  - type: text
    content: God
  - type: text
    content: ' on the threshing floor of Araunah the Jebusite. David did what Gad told him in obedience to '
  - type: text
    content: God
  - type: text
    content: ’s command.
  '20':
  - type: text
    content: Meanwhile Araunah had quit threshing the wheat and was watching the angel; his four sons took cover and hid. David came up to Araunah. When Araunah saw David, he left the threshing floor and bowed deeply before David, honoring the king.
  '22':
  - type: text
    content: 'David said to Araunah, “Give me the site of the threshing floor so I can build an altar to '
  - type: text
    content: God
  - type: text
    content: . Charge me the market price; we’re going to put an end to this disaster.”
  '23':
  - type: text
    content: “O Master, my king,” said Araunah, “just take it; do whatever you want with it! Look, here’s an ox for the burnt offering and threshing paddles for the fuel and wheat for the meal offering—it’s all yours!”
  '24':
  - type: text
    content: 'David replied to Araunah, “No. I’m '
  - type: text
    content: buying
  - type: text
    content: ' it from you, and at the full market price. I’m not going to offer '
  - type: text
    content: God
  - type: text
    content: ' sacrifices that are no sacrifice.” So David bought the place from Araunah for six hundred shekels of gold. He built an altar to '
  - type: text
    content: God
  - type: text
    content: ' there and sacrificed Whole-Burnt-Offerings and Peace-Offerings. He called out to '
  - type: text
    content: God
  - type: text
    content: ' and '
  - type: text
    content: God
  - type: text
    content: ' answered by striking the altar of Whole-Burnt-Offering with lightning. Then '
  - type: text
    content: God
  - type: text
    content: ' told the angel to put his sword back into its scabbard.'
  '28':
  - type: text
    content: ' And that’s the story of what happened when David saw that '
  - type: text
    content: God
  - type: text
    content: ' answered him on the threshing floor of Araunah the Jebusite at the time he offered the sacrifice.'
  - type: text
    content: '* * *'
  '29':
  - type: text
    content: ' At this time the Tabernacle that Moses had constructed in the desert, and with it the Altar of Burnt Offering, were set up at the worship center at Gibeon. But David, terrified by the angel’s sword, wouldn’t go there to pray to God anymore. So David declared, “From now on, '
  - type: text
    content: this
  - type: text
    content: ' is the site for the worship of '
  - type: text
    content: God
  - type: text
    content: '; '
  - type: text
    content: this
  - type: text
    content: ' is the place for Israel’s Altar of Burnt Offering.”'
  '3':
  - type: text
    content: 'Joab resisted: “May '
  - type: text
    content: God
  - type: text
    content: ' multiply his people by hundreds! Don’t they all belong to my master the king? But why on earth would you do a thing like this—why risk getting Israel into trouble with God?”'
  '4':
  - type: text
    content: 'But David wouldn’t take no for an answer, so Joab went off and did it—canvassed the country and then came back to Jerusalem and reported the results of the census: There were 1,100,000 fighting men; of that total, Judah accounted for 470,000. Joab, disgusted by the command—it, in fact, turned his stomach!—protested by leaving Levi and Benjamin out of the census-taking. And God, offended by the whole thing, punished Israel.'
  '8':
  - type: text
    content: Then David prayed, “I have sinned badly in what I have just done, substituting statistics for trust; forgive my sin—I’ve been really stupid.”
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' answered by speaking to Gad, David’s pastor: “Go and give David this message: ‘'
  - type: text
    content: God
  - type: text
    content: '’s word: You have your choice of three punishments; choose one and I’ll do the rest.’”'
