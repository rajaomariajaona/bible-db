document_id: 1CH.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David, Satan, and Araunah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Now Satan entered the scene and seduced David into taking a census of Israel. David gave orders to Joab and the army officers under him, “Canvass all the tribes of Israel, from Dan to Beersheba, and get a count of the population. I want to know the number.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Joab resisted: “May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' multiply his people by hundreds! Don’t they all belong to my master the king? But why on earth would you do a thing like this—why risk getting Israel into trouble with God?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: 'But David wouldn’t take no for an answer, so Joab went off and did it—canvassed the country and then came back to Jerusalem and reported the results of the census: There were 1,100,000 fighting men; of that total, Judah accounted for 470,000. Joab, disgusted by the command—it, in fact, turned his stomach!—protested by leaving Levi and Benjamin out of the census-taking. And God, offended by the whole thing, punished Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then David prayed, “I have sinned badly in what I have just done, substituting statistics for trust; forgive my sin—I’ve been really stupid.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered by speaking to Gad, David’s pastor: “Go and give David this message: ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word: You have your choice of three punishments; choose one and I’ll do the rest.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'Gad delivered the message to David: “Do you want three years of famine, three months of running from your enemies while they chase you down, or three days of the sword of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—an epidemic unleashed on the country by an angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '? Think it over and make up your mind. What shall I tell the One who sent me?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David told Gad, “They’re all terrible! But I’d rather be punished by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' whose mercy is great, than fall into human hands.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15a
  - type: text
    text: ' So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' unleashed an epidemic in Israel—seventy thousand Israelites died. God then sent the angel to Jerusalem but when he saw the destruction about to begin, he compassionately changed his mind and ordered the death angel, “Enough’s enough! Pull back!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-16
  - type: text
    text: ' The angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had just reached the threshing floor of Araunah the Jebusite. David looked up and saw the angel hovering between earth and sky, sword drawn and about to strike Jerusalem. David and the elders bowed in prayer and covered themselves with rough burlap.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: David prayed, “Please! I’m the one who sinned; I’m the one at fault. But these sheep, what did they do wrong? Punish me, not them, me and my family; don’t take it out on them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'The angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' ordered Gad to tell David to go and build an altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' on the threshing floor of Araunah the Jebusite. David did what Gad told him in obedience to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s command.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Meanwhile Araunah had quit threshing the wheat and was watching the angel; his four sons took cover and hid. David came up to Araunah. When Araunah saw David, he left the threshing floor and bowed deeply before David, honoring the king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David said to Araunah, “Give me the site of the threshing floor so I can build an altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Charge me the market price; we’re going to put an end to this disaster.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “O Master, my king,” said Araunah, “just take it; do whatever you want with it! Look, here’s an ox for the burnt offering and threshing paddles for the fuel and wheat for the meal offering—it’s all yours!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-27
  - type: text
    text: 'David replied to Araunah, “No. I’m '
  - type: usfm
    marker: it
    children:
    - type: text
      text: buying
  - type: text
    text: ' it from you, and at the full market price. I’m not going to offer '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sacrifices that are no sacrifice.” So David bought the place from Araunah for six hundred shekels of gold. He built an altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' there and sacrificed Whole-Burnt-Offerings and Peace-Offerings. He called out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered by striking the altar of Whole-Burnt-Offering with lightning. Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told the angel to put his sword back into its scabbard.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29a
  - type: text
    text: ' And that’s the story of what happened when David saw that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered him on the threshing floor of Araunah the Jebusite at the time he offered the sacrifice.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29b
  - type: text
    text: ' At this time the Tabernacle that Moses had constructed in the desert, and with it the Altar of Burnt Offering, were set up at the worship center at Gibeon. But David, terrified by the angel’s sword, wouldn’t go there to pray to God anymore. So David declared, “From now on, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' is the site for the worship of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' is the place for Israel’s Altar of Burnt Offering.”'
