document_id: 1CH.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Charges Solomon to Build The Temple
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: David ordered all the resident aliens in the land to come together; he sent them to the stone quarries to cut dressed stone to build The Temple of God. He also stockpiled a huge quantity of iron for nails and bracings for the doors of the gates, more bronze than could be weighed, and cedar logs past counting (the Sidonians and Tyrians shipped in huge loads of cedar logs for David).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'David was thinking, “My son Solomon is too young to plan ahead for this. But the sanctuary that is to be built for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has to be the greatest, the talk of all the nations; so I’ll get the construction materials together.” That’s why David prepared this huge stockpile of building materials before he died. Then he called in Solomon his son and commanded him to build a sanctuary for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: 'David said to Solomon, “I wanted in the worst way to build a sanctuary to honor my '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' prevented me, saying, ‘You’ve killed too many people, fought too many wars. You are not the one to honor me by building a sanctuary—you’ve been responsible for too much killing, too much bloodshed. But you are going to have a son and he will be a quiet and peaceful man, and I will calm his enemies down on all sides. His very name will speak peace—that is, Solomon, which means Peace—and I’ll give peace and rest under his rule. He will be the one to build a sanctuary in my honor. He’ll be my royal adopted son and I’ll be his father; and I’ll make sure that the authority of his kingdom over Israel lasts forever.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-16
  - type: text
    text: '“So now, son, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' be with you. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-speed as you build the sanctuary for your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the job God has given you. And may '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' also give you discernment and understanding when he puts you in charge of Israel so that you will rule in reverent obedience under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Revelation. That’s what will make you successful, following the directions and doing the things that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded Moses for Israel. Courage! Take charge! Don’t be timid; don’t hold back. Look at this—I’ve gone to a lot of trouble to stockpile materials for the sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': a hundred thousand talents (3,775 tons) of gold, a million talents (37,750 tons) of silver, tons of bronze and iron—too much to weigh—and all this timber and stone. And you’re free to add more. And workers both plentiful and prepared: stonecutters, masons, carpenters, artisans in gold and silver, bronze and iron. You’re all set—get to work! And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -speed!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'David gave orders to all of Israel’s leaders to help his son Solomon, saying, “Isn’t it obvious that your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is present with you; that he has given you peaceful relations with everyone around? My part in this was to put down the enemies, subdue the land to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and his people; your part is to give yourselves, heart and soul, to praying to your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. So get moving—build the sacred house of worship to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Then bring the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and all the holy furnishings for the worship of God into the sanctuary built in honor of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
