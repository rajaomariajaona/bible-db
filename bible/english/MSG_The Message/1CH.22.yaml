document_id: 1CH.22,97
type_code: eng
verses:
  '1':
  - type: heading
    content: David Charges Solomon to Build The Temple
  - type: text
    content: David ordered all the resident aliens in the land to come together; he sent them to the stone quarries to cut dressed stone to build The Temple of God. He also stockpiled a huge quantity of iron for nails and bracings for the doors of the gates, more bronze than could be weighed, and cedar logs past counting (the Sidonians and Tyrians shipped in huge loads of cedar logs for David).
  '11':
  - type: text
    content: '“So now, son, '
  - type: text
    content: God
  - type: text
    content: ' be with you. '
  - type: text
    content: God
  - type: text
    content: '-speed as you build the sanctuary for your '
  - type: text
    content: God
  - type: text
    content: ', the job God has given you. And may '
  - type: text
    content: God
  - type: text
    content: ' also give you discernment and understanding when he puts you in charge of Israel so that you will rule in reverent obedience under '
  - type: text
    content: God
  - type: text
    content: '’s Revelation. That’s what will make you successful, following the directions and doing the things that '
  - type: text
    content: God
  - type: text
    content: ' commanded Moses for Israel. Courage! Take charge! Don’t be timid; don’t hold back. Look at this—I’ve gone to a lot of trouble to stockpile materials for the sanctuary of '
  - type: text
    content: God
  - type: text
    content: ': a hundred thousand talents (3,775 tons) of gold, a million talents (37,750 tons) of silver, tons of bronze and iron—too much to weigh—and all this timber and stone. And you’re free to add more. And workers both plentiful and prepared: stonecutters, masons, carpenters, artisans in gold and silver, bronze and iron. You’re all set—get to work! And '
  - type: text
    content: God
  - type: text
    content: -speed!”
  '17':
  - type: text
    content: 'David gave orders to all of Israel’s leaders to help his son Solomon, saying, “Isn’t it obvious that your '
  - type: text
    content: God
  - type: text
    content: ' is present with you; that he has given you peaceful relations with everyone around? My part in this was to put down the enemies, subdue the land to '
  - type: text
    content: God
  - type: text
    content: ' and his people; your part is to give yourselves, heart and soul, to praying to your '
  - type: text
    content: God
  - type: text
    content: '. So get moving—build the sacred house of worship to '
  - type: text
    content: God
  - type: text
    content: '! Then bring the Chest of the Covenant of '
  - type: text
    content: God
  - type: text
    content: ' and all the holy furnishings for the worship of God into the sanctuary built in honor of '
  - type: text
    content: God
  - type: text
    content: .”
  '5':
  - type: text
    content: 'David was thinking, “My son Solomon is too young to plan ahead for this. But the sanctuary that is to be built for '
  - type: text
    content: God
  - type: text
    content: ' has to be the greatest, the talk of all the nations; so I’ll get the construction materials together.” That’s why David prepared this huge stockpile of building materials before he died. Then he called in Solomon his son and commanded him to build a sanctuary for the '
  - type: text
    content: God
  - type: text
    content: ' of Israel.'
  '7':
  - type: text
    content: 'David said to Solomon, “I wanted in the worst way to build a sanctuary to honor my '
  - type: text
    content: God
  - type: text
    content: '. But '
  - type: text
    content: God
  - type: text
    content: ' prevented me, saying, ‘You’ve killed too many people, fought too many wars. You are not the one to honor me by building a sanctuary—you’ve been responsible for too much killing, too much bloodshed. But you are going to have a son and he will be a quiet and peaceful man, and I will calm his enemies down on all sides. His very name will speak peace—that is, Solomon, which means Peace—and I’ll give peace and rest under his rule. He will be the one to build a sanctuary in my honor. He’ll be my royal adopted son and I’ll be his father; and I’ll make sure that the authority of his kingdom over Israel lasts forever.’'
