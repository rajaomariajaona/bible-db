document_id: EZK.45
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Sacred Space for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: '“When you divide up the inheritance of the land, you must set aside part of the land as sacred space for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': approximately seven miles long by six miles wide, all of it holy ground. Within this rectangle, reserve a seven-hundred-fifty-foot square for the Sanctuary with a seventy-five-foot buffer zone surrounding it. Mark off within the sacred reserve a section seven miles long by three miles wide. The Sanctuary with its Holy of Holies will be placed there. This is where the priests will live, those who lead worship in the Sanctuary and serve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' there. Their houses will be there along with The Holy Place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “To the north of the sacred reserve, an area roughly seven miles long and two and a quarter miles wide will be set aside as land for the villages of the Levites who administer the affairs of worship in the Sanctuary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “To the south of the sacred reserve, measure off a section seven miles long and about a mile and a half wide for the city itself, an area held in common by the whole family of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: “The prince gets the land abutting the seven-mile east and west borders of the central sacred square, extending eastward toward the Jordan and westward toward the Mediterranean. This is the prince’s possession in Israel. My princes will no longer bully my people, running roughshod over them. They’ll respect the land as it has been allotted to the tribes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-12
  - type: text
    text: '“This is the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: ‘I’ve put up with you long enough, princes of Israel! Quit bullying and taking advantage of my people. Do what’s just and right for a change. Use honest scales—honest weights and honest measures. Every pound must have sixteen ounces. Every gallon must measure four quarts. The ounce is the basic measure for both. And your coins must be honest—no wooden nickels!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Everyone in the Land Must Contribute
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: '“‘These are the prescribed offerings you are to supply: one-sixtieth part of your wheat, one-sixtieth part of your barley, one-hundredth part of your oil, one sheep out of every two hundred from the lush pastures of Israel. These will be used for the grain offerings, burnt offerings, and peace offerings for making the atonement sacrifices for the people. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: “‘Everyone in the land must contribute to these special offerings that the prince in Israel will administer. It’s the prince’s job to provide the burnt offerings, grain offerings, and drink offerings at the Holy Festivals, the New Moons, and the Sabbaths—all the commanded feasts among the people of Israel. Sin offerings, grain offerings, burnt offerings, and peace offerings for making atonement for the people of Israel are his responsibility.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: '“‘This is the Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: On the first day of the first month, take an unblemished bull calf and purify the Sanctuary. The priest is to take blood from the sin offerings and rub it on the doorposts of the Temple, on the four corners of the ledge of the altar, and on the gate entrance to the inside courtyard. Repeat this ritual on the seventh day of the month for anyone who sins without knowing it. In this way you make atonement for the Temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “‘On the fourteenth day of the first month, you will observe the Passover, a feast of seven days. During the feast you will eat bread made without yeast.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: '“‘On Passover, the prince supplies a bull as a sin offering for himself and all the people of the country. Each day for each of the seven days of the feast, he will supply seven bulls and seven rams unblemished as a burnt offering to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and also each day a male goat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “‘He will supply about five and a half gallons of grain offering and a gallon of oil for each bull and each ram.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “‘On the fifteenth day of the seventh month, and on each of the seven days of the feast, he is to supply the same materials for sin offerings, burnt offerings, grain offerings, and oil.’”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
