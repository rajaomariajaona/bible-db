document_id: PSA.68
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: Up with God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Down with his enemies!
- type: usfm
  marker: q3
  children:
  - type: text
    text: Adversaries, run for the hills!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gone like a puff of smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a blob of wax in the fire—
- type: usfm
  marker: q3
  children:
  - type: text
    text: one look at God and the wicked vanish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the righteous see God in action
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll laugh, they’ll sing,
- type: usfm
  marker: q3
  children:
  - type: text
    text: they’ll laugh and sing for joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sing hymns to God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all heaven, sing out;
- type: usfm
  marker: q3
  children:
  - type: text
    text: clear the way for the coming of Cloud-Rider.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Enjoy '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: cheer when you see him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: Father of orphans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: champion of widows,
- type: usfm
  marker: q3
  children:
  - type: text
    text: is God in his holy house.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God makes homes for the homeless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leads prisoners to freedom,
- type: usfm
  marker: q3
  children:
  - type: text
    text: but leaves rebels to rot in hell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: God, when you took the lead with your people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you marched out into the wild,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth shook, sky broke out in a sweat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God was on the march.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even Sinai trembled at the sight of God on the move,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the sight of Israel’s God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You pour out rain in buckets, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: thorn and cactus become an oasis
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your people to camp in and enjoy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You set them up in business;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they went from rags to riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: The Lord gave the word;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'thousands called out the good news:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Kings of the armies
- type: usfm
  marker: q2
  children:
  - type: text
    text: are on the run, on the run!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: While housewives, safe and sound back home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: divide up the plunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the plunder of Canaanite silver and gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On that day that Shaddai scattered the kings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: snow fell on Black Mountain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: You huge mountains, Bashan mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mighty mountains, dragon mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All you mountains not chosen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sulk now, and feel sorry for yourselves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For this is the mountain God has chosen to live on;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll rule from this mountain forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: The chariots of God, twice ten thousand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thousands more besides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord in the lead, riding down Sinai—
- type: usfm
  marker: q2
  children:
  - type: text
    text: straight to the Holy Place!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You climbed to the High Place, captives in tow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your arms full of plunder from rebels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now you sit there in state,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-23
  - type: text
    text: Blessed be the Lord—
- type: usfm
  marker: q2
  children:
  - type: text
    text: day after day he carries us along.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s our Savior, our God, oh yes!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s God-for-us, he’s God-who-saves-us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' knows all'
- type: usfm
  marker: q2
  children:
  - type: text
    text: death’s ins and outs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s more, he made heads roll,
- type: usfm
  marker: q2
  children:
  - type: text
    text: split the skulls of the enemy
- type: usfm
  marker: q1
  children:
  - type: text
    text: As he marched out of heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying, “I tied up the Dragon in knots,
- type: usfm
  marker: q2
  children:
  - type: text
    text: put a muzzle on the Deep Blue Sea.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can wade through your enemies’ blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your dogs taste of your enemies from your boots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-31
  - type: text
    text: See God on parade
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the sanctuary, my God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my King on the march!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Singers out front, the band behind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: maidens in the middle with castanets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole choir blesses God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Like a fountain of praise, Israel blesses '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look—little Benjamin’s out
- type: usfm
  marker: q2
  children:
  - type: text
    text: front and leading
- type: usfm
  marker: q1
  children:
  - type: text
    text: Princes of Judah in their royal robes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: princes of Zebulun, princes of Naphtali.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parade your power, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the power, O God, that made us what we are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your temple, High God, is Jerusalem;
- type: usfm
  marker: q2
  children:
  - type: text
    text: kings bring gifts to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rebuke that old crocodile, Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with her herd of wild bulls and calves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rapacious in her lust for silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crushing peoples, spoiling for a fight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let Egyptian traders bring blue cloth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Cush come running to God, her hands outstretched.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-34
  - type: text
    text: Sing, O kings of the earth!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sing praises to the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'There he is: Sky-Rider,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: striding the ancient skies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen—he’s calling in thunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rumbling, rolling thunder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Call out “Bravo!” to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the High God of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His splendor and strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: rise huge as thunderheads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: A terrible beauty, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: streams from your sanctuary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s Israel’s strong God! He gives
- type: usfm
  marker: q2
  children:
  - type: text
    text: power and might to his people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: O you, his people—bless God!
