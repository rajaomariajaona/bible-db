document_id: PSA.68,97
type_code: eng
verses:
  '1':
  - type: text
    content: Up with God!
  - type: text
    content: Down with his enemies!
  - type: text
    content: Adversaries, run for the hills!
  - type: text
    content: Gone like a puff of smoke,
  - type: text
    content: like a blob of wax in the fire—
  - type: text
    content: one look at God and the wicked vanish.
  - type: text
    content: When the righteous see God in action
  - type: text
    content: they’ll laugh, they’ll sing,
  - type: text
    content: they’ll laugh and sing for joy.
  - type: text
    content: Sing hymns to God;
  - type: text
    content: all heaven, sing out;
  - type: text
    content: clear the way for the coming of Cloud-Rider.
  - type: text
    content: 'Enjoy '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: cheer when you see him!
  '11':
  - type: text
    content: The Lord gave the word;
  - type: text
    content: 'thousands called out the good news:'
  - type: text
    content: “Kings of the armies
  - type: text
    content: are on the run, on the run!”
  - type: text
    content: While housewives, safe and sound back home,
  - type: text
    content: divide up the plunder,
  - type: text
    content: the plunder of Canaanite silver and gold.
  - type: text
    content: On that day that Shaddai scattered the kings,
  - type: text
    content: snow fell on Black Mountain.
  '15':
  - type: text
    content: You huge mountains, Bashan mountains,
  - type: text
    content: mighty mountains, dragon mountains.
  - type: text
    content: All you mountains not chosen,
  - type: text
    content: sulk now, and feel sorry for yourselves,
  - type: text
    content: For this is the mountain God has chosen to live on;
  - type: text
    content: he’ll rule from this mountain forever.
  '17':
  - type: text
    content: The chariots of God, twice ten thousand,
  - type: text
    content: and thousands more besides,
  - type: text
    content: The Lord in the lead, riding down Sinai—
  - type: text
    content: straight to the Holy Place!
  - type: text
    content: You climbed to the High Place, captives in tow,
  - type: text
    content: your arms full of plunder from rebels,
  - type: text
    content: And now you sit there in state,
  - type: text
    content: God
  - type: text
    content: ', sovereign '
  - type: text
    content: God
  - type: text
    content: '!'
  '19':
  - type: text
    content: Blessed be the Lord—
  - type: text
    content: day after day he carries us along.
  - type: text
    content: He’s our Savior, our God, oh yes!
  - type: text
    content: He’s God-for-us, he’s God-who-saves-us.
  - type: text
    content: 'Lord '
  - type: text
    content: God
  - type: text
    content: ' knows all'
  - type: text
    content: death’s ins and outs.
  - type: text
    content: What’s more, he made heads roll,
  - type: text
    content: split the skulls of the enemy
  - type: text
    content: As he marched out of heaven,
  - type: text
    content: saying, “I tied up the Dragon in knots,
  - type: text
    content: put a muzzle on the Deep Blue Sea.”
  - type: text
    content: You can wade through your enemies’ blood,
  - type: text
    content: and your dogs taste of your enemies from your boots.
  '24':
  - type: text
    content: See God on parade
  - type: text
    content: to the sanctuary, my God,
  - type: text
    content: my King on the march!
  - type: text
    content: Singers out front, the band behind,
  - type: text
    content: maidens in the middle with castanets.
  - type: text
    content: The whole choir blesses God.
  - type: text
    content: 'Like a fountain of praise, Israel blesses '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Look—little Benjamin’s out
  - type: text
    content: front and leading
  - type: text
    content: Princes of Judah in their royal robes,
  - type: text
    content: princes of Zebulun, princes of Naphtali.
  - type: text
    content: Parade your power, O God,
  - type: text
    content: the power, O God, that made us what we are.
  - type: text
    content: Your temple, High God, is Jerusalem;
  - type: text
    content: kings bring gifts to you.
  - type: text
    content: Rebuke that old crocodile, Egypt,
  - type: text
    content: with her herd of wild bulls and calves,
  - type: text
    content: Rapacious in her lust for silver,
  - type: text
    content: crushing peoples, spoiling for a fight.
  - type: text
    content: Let Egyptian traders bring blue cloth
  - type: text
    content: and Cush come running to God, her hands outstretched.
  '32':
  - type: text
    content: Sing, O kings of the earth!
  - type: text
    content: Sing praises to the Lord!
  - type: text
    content: 'There he is: Sky-Rider,'
  - type: text
    content: striding the ancient skies.
  - type: text
    content: Listen—he’s calling in thunder,
  - type: text
    content: rumbling, rolling thunder.
  - type: text
    content: Call out “Bravo!” to God,
  - type: text
    content: the High God of Israel.
  - type: text
    content: His splendor and strength
  - type: text
    content: rise huge as thunderheads.
  '35':
  - type: text
    content: A terrible beauty, O God,
  - type: text
    content: streams from your sanctuary.
  - type: text
    content: It’s Israel’s strong God! He gives
  - type: text
    content: power and might to his people!
  - type: text
    content: O you, his people—bless God!
  '5':
  - type: text
    content: Father of orphans,
  - type: text
    content: champion of widows,
  - type: text
    content: is God in his holy house.
  - type: text
    content: God makes homes for the homeless,
  - type: text
    content: leads prisoners to freedom,
  - type: text
    content: but leaves rebels to rot in hell.
  '7':
  - type: text
    content: God, when you took the lead with your people,
  - type: text
    content: when you marched out into the wild,
  - type: text
    content: Earth shook, sky broke out in a sweat;
  - type: text
    content: God was on the march.
  - type: text
    content: Even Sinai trembled at the sight of God on the move,
  - type: text
    content: at the sight of Israel’s God.
  - type: text
    content: You pour out rain in buckets, O God;
  - type: text
    content: thorn and cactus become an oasis
  - type: text
    content: For your people to camp in and enjoy.
  - type: text
    content: You set them up in business;
  - type: text
    content: they went from rags to riches.
