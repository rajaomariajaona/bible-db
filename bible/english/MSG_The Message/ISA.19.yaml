document_id: ISA.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anarchy and Chaos and Killing!
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A Message concerning Egypt:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Watch this! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' riding on a fast-moving cloud,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: moving in on Egypt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The god-idols of Egypt shudder and shake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Egyptians paralyzed by panic.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-15
    - type: text
      text: The princes of Zoan are fools,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the advisors of Pharaoh stupid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How could any of you dare tell Pharaoh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Trust me: I’m wise. I know what’s going on.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why, I’m descended from the old wisdom of Egypt”?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s not a wise man or woman left in the country.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If there were, one of them would tell you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies has in mind for Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As it is, the princes of Zoan are all fools
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the princes of Memphis, idiots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The honored pillars of your society
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have led Egypt into detours and dead ends.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has scrambled their brains,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Egypt’s become a falling-down-in-his-own-vomit drunk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt’s hopeless, past helping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a senile, doddering old fool.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: 'On that Day, Egyptians will be like hysterical schoolgirls, screaming at the first hint of action from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies. Little Judah will strike terror in Egyptians! Say “Judah” to an Egyptian and see panic. The word triggers fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies’ plan against Egypt.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'On that Day, more than one city in Egypt will learn to speak the language of faith and promise to follow '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies. One of these cities will be honored with the title “City of the Sun.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-22
    - type: text
      text: 'On that Day, there will be a place of worship to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in the center of Egypt and a monument to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' at its border. It will show how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies has helped the Egyptians. When they cry out in prayer to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' because of oppressors, he’ll send them help, a savior who will keep them safe and take care of them. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will openly show himself to the Egyptians and they’ll get to know him on that Day. They’ll worship him seriously with sacrifices and burnt offerings. They’ll make vows and keep them. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will wound Egypt, first hit and then heal. Egypt will come back to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will listen to their prayers and heal them, heal them from head to toe.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4
    - type: text
      text: God says, “I’ll make Egyptian fight Egyptian,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brother fight brother, neighbor fight neighbor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: City fight city, kingdom fight kingdom—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anarchy and chaos and killing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll knock the wind out of the Egyptians.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They won’t know coming from going.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll go to their god-idols for answers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll conjure ghosts and hold séances, desperate for answers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I’ll turn the Egyptians
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over to a tyrant most cruel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll put them under the rule of a mean, merciless king.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Decree of the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'On that Day, there will be a highway all the way from Egypt to Assyria: Assyrians will have free range in Egypt and Egyptians in Assyria. No longer rivals, they’ll worship together, Egyptians and Assyrians!'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: 'On that Day, Israel will take its place alongside Egypt and Assyria, sharing the blessing from the center. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, who blessed Israel, will generously bless them all: “Blessed be Egypt, my people! . . . Blessed be Assyria, work of my hands! . . . Blessed be Israel, my heritage!”'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-10
    - type: text
      text: The River Nile will dry up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the riverbed baked dry in the sun.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The canals will become stagnant and stink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every stream touching the Nile dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: River vegetation will rot away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the banks of the Nile-baked clay,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The riverbed hard and smooth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: river grasses dried up and gone with the wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fishermen will complain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the fishing’s been ruined.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Textile workers will be out of work, all weavers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and workers in linen and cotton and wool
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dispirited, depressed in their forced idleness—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone who works for a living, jobless.
