document_id: ISA.19,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Anarchy and Chaos and Killing!
  - type: text
    content: 'A Message concerning Egypt:'
  - type: text
    content: 'Watch this! '
  - type: text
    content: God
  - type: text
    content: ' riding on a fast-moving cloud,'
  - type: text
    content: moving in on Egypt!
  - type: text
    content: The god-idols of Egypt shudder and shake,
  - type: text
    content: Egyptians paralyzed by panic.
  '11':
  - type: text
    content: The princes of Zoan are fools,
  - type: text
    content: the advisors of Pharaoh stupid.
  - type: text
    content: How could any of you dare tell Pharaoh,
  - type: text
    content: '“Trust me: I’m wise. I know what’s going on.'
  - type: text
    content: Why, I’m descended from the old wisdom of Egypt”?
  - type: text
    content: There’s not a wise man or woman left in the country.
  - type: text
    content: If there were, one of them would tell you
  - type: text
    content: 'what '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies has in mind for Egypt.
  - type: text
    content: As it is, the princes of Zoan are all fools
  - type: text
    content: and the princes of Memphis, idiots.
  - type: text
    content: The honored pillars of your society
  - type: text
    content: have led Egypt into detours and dead ends.
  - type: text
    content: God
  - type: text
    content: ' has scrambled their brains,'
  - type: text
    content: Egypt’s become a falling-down-in-his-own-vomit drunk.
  - type: text
    content: Egypt’s hopeless, past helping,
  - type: text
    content: a senile, doddering old fool.
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: 'On that Day, Egyptians will be like hysterical schoolgirls, screaming at the first hint of action from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies. Little Judah will strike terror in Egyptians! Say “Judah” to an Egyptian and see panic. The word triggers fear of the '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies’ plan against Egypt.
  '18':
  - type: text
    content: 'On that Day, more than one city in Egypt will learn to speak the language of faith and promise to follow '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies. One of these cities will be honored with the title “City of the Sun.”
  '19':
  - type: text
    content: 'On that Day, there will be a place of worship to '
  - type: text
    content: God
  - type: text
    content: ' in the center of Egypt and a monument to '
  - type: text
    content: God
  - type: text
    content: ' at its border. It will show how the '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies has helped the Egyptians. When they cry out in prayer to '
  - type: text
    content: God
  - type: text
    content: ' because of oppressors, he’ll send them help, a savior who will keep them safe and take care of them. '
  - type: text
    content: God
  - type: text
    content: ' will openly show himself to the Egyptians and they’ll get to know him on that Day. They’ll worship him seriously with sacrifices and burnt offerings. They’ll make vows and keep them. '
  - type: text
    content: God
  - type: text
    content: ' will wound Egypt, first hit and then heal. Egypt will come back to '
  - type: text
    content: God
  - type: text
    content: ', and '
  - type: text
    content: God
  - type: text
    content: ' will listen to their prayers and heal them, heal them from head to toe.'
  '2':
  - type: text
    content: God says, “I’ll make Egyptian fight Egyptian,
  - type: text
    content: brother fight brother, neighbor fight neighbor,
  - type: text
    content: City fight city, kingdom fight kingdom—
  - type: text
    content: anarchy and chaos and killing!
  - type: text
    content: I’ll knock the wind out of the Egyptians.
  - type: text
    content: They won’t know coming from going.
  - type: text
    content: They’ll go to their god-idols for answers;
  - type: text
    content: they’ll conjure ghosts and hold séances, desperate for answers.
  - type: text
    content: But I’ll turn the Egyptians
  - type: text
    content: over to a tyrant most cruel.
  - type: text
    content: I’ll put them under the rule of a mean, merciless king.”
  - type: text
    content: 'Decree of the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  '23':
  - type: text
    content: 'On that Day, there will be a highway all the way from Egypt to Assyria: Assyrians will have free range in Egypt and Egyptians in Assyria. No longer rivals, they’ll worship together, Egyptians and Assyrians!'
  '24':
  - type: text
    content: 'On that Day, Israel will take its place alongside Egypt and Assyria, sharing the blessing from the center. '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, who blessed Israel, will generously bless them all: “Blessed be Egypt, my people! . . . Blessed be Assyria, work of my hands! . . . Blessed be Israel, my heritage!”'
  '5':
  - type: text
    content: The River Nile will dry up,
  - type: text
    content: the riverbed baked dry in the sun.
  - type: text
    content: The canals will become stagnant and stink,
  - type: text
    content: every stream touching the Nile dry up.
  - type: text
    content: River vegetation will rot away
  - type: text
    content: the banks of the Nile-baked clay,
  - type: text
    content: The riverbed hard and smooth,
  - type: text
    content: river grasses dried up and gone with the wind.
  - type: text
    content: Fishermen will complain
  - type: text
    content: that the fishing’s been ruined.
  - type: text
    content: Textile workers will be out of work, all weavers
  - type: text
    content: and workers in linen and cotton and wool
  - type: text
    content: Dispirited, depressed in their forced idleness—
  - type: text
    content: everyone who works for a living, jobless.
