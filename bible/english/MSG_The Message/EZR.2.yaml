      children:
      - type: text
        text: 1-58
    - type: text
      text: These are the people from the province who now returned from the captivity, exiles whom Nebuchadnezzar king of Babylon had carried off captive. They returned to Jerusalem and Judah, each to his hometown. They came in company with Zerubbabel, Jeshua, Nehemiah, Seraiah, Reelaiah, Mordecai, Bilshan, Mispar, Bigvai, Rehum, and Baanah.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The numbers of the returning Israelites by families of origin were as follows:'
