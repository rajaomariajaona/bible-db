  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 59-60
    - type: text
      text: 'These are those who came from Tel Melah, Tel Harsha, Kerub, Addon, and Immer. They weren’t able to prove their ancestry, whether they were true Israelites or not:'
  '61':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Delaiah, Tobiah, and Nekoda, 652 in all.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Likewise with these priestly families:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hobaiah, Hakkoz, and Barzillai, who had married a daughter of Barzillai the Gileadite and took that name.
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 62-63
    - type: text
      text: They had thoroughly searched for their family records but couldn’t find them. And so they were barred from priestly work as ritually unclean. The governor ruled that they could not eat from the holy food until a priest could determine their status with the Urim and Thummim.
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 64-67
    - type: text
      text: The total count for the congregation was 42,360. That did not include the male and female slaves, which numbered 7,337. There were also 200 male and female singers, and they had 736 horses, 245 mules, 435 camels, and 6,720 donkeys.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 68-69
    - type: text
      text: 'Some of the heads of families, on arriving at The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in Jerusalem, made Freewill-Offerings toward the rebuilding of The Temple of God on its site. They gave to the building fund as they were able, about 1,100 pounds of gold, about three tons of silver, and 100 priestly robes.'
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: The priests, Levites, and some of the people lived in Jerusalem. The singers, security guards, and temple support staff found places in their hometowns. All the Israelites found a place to live.
