document_id: EZR.2,97
type_code: eng
verses:
  '1':
  - type: text
    content: These are the people from the province who now returned from the captivity, exiles whom Nebuchadnezzar king of Babylon had carried off captive. They returned to Jerusalem and Judah, each to his hometown. They came in company with Zerubbabel, Jeshua, Nehemiah, Seraiah, Reelaiah, Mordecai, Bilshan, Mispar, Bigvai, Rehum, and Baanah.
  - type: text
    content: 'The numbers of the returning Israelites by families of origin were as follows:'
  - type: text
    content: Parosh, 2,172
  - type: text
    content: Shephatiah, 372
  - type: text
    content: Arah, 775
  - type: text
    content: Pahath-Moab (sons of Jeshua and Joab), 2,812
  - type: text
    content: Elam, 1,254
  - type: text
    content: Zattu, 945
  - type: text
    content: Zaccai, 760
  - type: text
    content: Bani, 642
  - type: text
    content: Bebai, 623
  - type: text
    content: Azgad, 1,222
  - type: text
    content: Adonikam, 666
  - type: text
    content: Bigvai, 2,056
  - type: text
    content: Adin, 454
  - type: text
    content: Ater (sons of Hezekiah), 98
  - type: text
    content: Bezai, 323
  - type: text
    content: Jorah, 112
  - type: text
    content: Hashum, 223
  - type: text
    content: Gibbar, 95.
  - type: text
    content: 'Israelites identified by place of origin were as follows:'
  - type: text
    content: Bethlehem, 123
  - type: text
    content: Netophah, 56
  - type: text
    content: Anathoth, 128
  - type: text
    content: Azmaveth, 42
  - type: text
    content: Kiriath Jearim, Kephirah, and Beeroth, 743
  - type: text
    content: Ramah and Geba, 621
  - type: text
    content: Micmash, 122
  - type: text
    content: Bethel and Ai, 223
  - type: text
    content: Nebo, 52
  - type: text
    content: Magbish, 156
  - type: text
    content: Elam (the other one), 1,254
  - type: text
    content: Harim, 320
  - type: text
    content: Lod, Hadid, and Ono, 725
  - type: text
    content: Jericho, 345
  - type: text
    content: Senaah, 3,630.
  - type: text
    content: 'Priestly families:'
  - type: text
    content: Jedaiah (sons of Jeshua), 973
  - type: text
    content: Immer, 1,052
  - type: text
    content: Pashhur, 1,247
  - type: text
    content: Harim, 1,017.
  - type: text
    content: 'Levitical families:'
  - type: text
    content: Jeshua and Kadmiel (sons of Hodaviah), 74.
  - type: text
    content: 'Singers:'
  - type: text
    content: Asaph’s family line, 128.
  - type: text
    content: 'Security guard families:'
  - type: text
    content: Shallum, Ater, Talmon, Akkub, Hatita, and Shobai, 139.
  - type: text
    content: 'Families of temple support staff:'
  - type: text
    content: Ziha, Hasupha, Tabbaoth,
  - type: text
    content: Keros, Siaha, Padon,
  - type: text
    content: Lebanah, Hagabah, Akkub,
  - type: text
    content: Hagab, Shalmai, Hanan,
  - type: text
    content: Giddel, Gahar, Reaiah,
  - type: text
    content: Rezin, Nekoda, Gazzam,
  - type: text
    content: Uzza, Paseah, Besai,
  - type: text
    content: Asnah, Meunim, Nephussim,
  - type: text
    content: Bakbuk, Hakupha, Harhur,
  - type: text
    content: Bazluth, Mehida, Harsha,
  - type: text
    content: Barkos, Sisera, Temah,
  - type: text
    content: Neziah, and Hatipha.
  - type: text
    content: 'Families of Solomon’s servants:'
  - type: text
    content: Sotai, Hassophereth, Peruda,
  - type: text
    content: Jaala, Darkon, Giddel,
  - type: text
    content: Shephatiah, Hattil, Pokereth-Hazzebaim, and Ami.
  - type: text
    content: Temple support staff and Solomon’s servants added up to 392.
  '59':
  - type: text
    content: 'These are those who came from Tel Melah, Tel Harsha, Kerub, Addon, and Immer. They weren’t able to prove their ancestry, whether they were true Israelites or not:'
  '61':
  - type: text
    content: Delaiah, Tobiah, and Nekoda, 652 in all.
  - type: text
    content: 'Likewise with these priestly families:'
  - type: text
    content: Hobaiah, Hakkoz, and Barzillai, who had married a daughter of Barzillai the Gileadite and took that name.
  '62':
  - type: text
    content: They had thoroughly searched for their family records but couldn’t find them. And so they were barred from priestly work as ritually unclean. The governor ruled that they could not eat from the holy food until a priest could determine their status with the Urim and Thummim.
  '64':
  - type: text
    content: The total count for the congregation was 42,360. That did not include the male and female slaves, which numbered 7,337. There were also 200 male and female singers, and they had 736 horses, 245 mules, 435 camels, and 6,720 donkeys.
  - type: text
    content: '* * *'
  '68':
  - type: text
    content: 'Some of the heads of families, on arriving at The Temple of '
  - type: text
    content: God
  - type: text
    content: ' in Jerusalem, made Freewill-Offerings toward the rebuilding of The Temple of God on its site. They gave to the building fund as they were able, about 1,100 pounds of gold, about three tons of silver, and 100 priestly robes.'
  '70':
  - type: text
    content: The priests, Levites, and some of the people lived in Jerusalem. The singers, security guards, and temple support staff found places in their hometowns. All the Israelites found a place to live.
