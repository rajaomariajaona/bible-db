document_id: ISA.17,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Damascus: A Pile of Dust and Rubble'
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'A Message concerning Damascus:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Watch this: Damascus undone as a city,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a pile of dust and rubble!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her towns emptied of people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The sheep and goats will move in
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And take over the towns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as if they owned them—which they will!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a sign of a fort is left in Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a trace of government left in Damascus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What’s left of Aram?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The same as what’s left of Israel—not much.”
  - type: usfm
    marker: q3
    children:
    - type: text
      text: 'Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Day Is Coming
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: And why? Because you have forgotten God-Your-Salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not remembered your Rock-of-Refuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And so, even though you are very religious,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planting all sorts of bushes and herbs and trees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to honor and influence your fertility gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And even though you make them grow so well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bursting with buds and sprouts and blossoms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing will come of them. Instead of a harvest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll get nothing but grief and pain, pain, pain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: Oh my! Thunder! A thundering herd of people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thunder like the crashing of ocean waves!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations roaring, roaring,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the roar of a massive waterfall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Roaring like a deafening Niagara!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But God will silence them with a word,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then he’ll blow them away like dead leaves off a tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like down from a thistle.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: At bedtime, terror fills the air.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By morning it’s gone—not a sign of it anywhere!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is what happens to those who would ruin us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this is the fate of those out to get us.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: “The Day is coming when Jacob’s robust splendor goes pale
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his well-fed body turns skinny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The country will be left empty, picked clean
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a field harvested by field hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’ll be like a few stalks of barley left standing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the lush Valley of Rephaim after harvest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or like the couple of ripe olives overlooked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the top of the olive tree,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or the four or five apples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the pickers couldn’t reach in the orchard.”
  - type: usfm
    marker: q3
    children:
    - type: text
      text: 'Decree of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' of Israel.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: Yes, the Day is coming when people will notice The One Who Made Them, take a long hard look at The Holy of Israel. They’ll lose interest in all the stuff they’ve made—altars and monuments and rituals, their homemade, handmade religion—however impressive it is.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: And yes, the Day is coming when their fortress cities will be abandoned—the very same cities that the Hivites and Amorites abandoned when Israel invaded! And the country will be empty, desolate.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You Have Forgotten God
    marker-yv: yv-h
