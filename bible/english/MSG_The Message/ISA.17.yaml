document_id: ISA.17,97
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Damascus: A Pile of Dust and Rubble'
  - type: text
    content: 'A Message concerning Damascus:'
  - type: text
    content: '“Watch this: Damascus undone as a city,'
  - type: text
    content: a pile of dust and rubble!
  - type: text
    content: Her towns emptied of people.
  - type: text
    content: The sheep and goats will move in
  - type: text
    content: And take over the towns
  - type: text
    content: as if they owned them—which they will!
  - type: text
    content: Not a sign of a fort is left in Ephraim,
  - type: text
    content: not a trace of government left in Damascus.
  - type: text
    content: What’s left of Aram?
  - type: text
    content: The same as what’s left of Israel—not much.”
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: heading
    content: The Day Is Coming
  '10':
  - type: text
    content: And why? Because you have forgotten God-Your-Salvation,
  - type: text
    content: not remembered your Rock-of-Refuge.
  - type: text
    content: And so, even though you are very religious,
  - type: text
    content: planting all sorts of bushes and herbs and trees
  - type: text
    content: to honor and influence your fertility gods,
  - type: text
    content: And even though you make them grow so well,
  - type: text
    content: bursting with buds and sprouts and blossoms,
  - type: text
    content: Nothing will come of them. Instead of a harvest
  - type: text
    content: you’ll get nothing but grief and pain, pain, pain.
  '12':
  - type: text
    content: Oh my! Thunder! A thundering herd of people!
  - type: text
    content: Thunder like the crashing of ocean waves!
  - type: text
    content: Nations roaring, roaring,
  - type: text
    content: like the roar of a massive waterfall,
  - type: text
    content: Roaring like a deafening Niagara!
  - type: text
    content: But God will silence them with a word,
  - type: text
    content: And then he’ll blow them away like dead leaves off a tree,
  - type: text
    content: like down from a thistle.
  '14':
  - type: text
    content: At bedtime, terror fills the air.
  - type: text
    content: By morning it’s gone—not a sign of it anywhere!
  - type: text
    content: This is what happens to those who would ruin us,
  - type: text
    content: this is the fate of those out to get us.
  '4':
  - type: text
    content: “The Day is coming when Jacob’s robust splendor goes pale
  - type: text
    content: and his well-fed body turns skinny.
  - type: text
    content: The country will be left empty, picked clean
  - type: text
    content: as a field harvested by field hands.
  - type: text
    content: She’ll be like a few stalks of barley left standing
  - type: text
    content: in the lush Valley of Rephaim after harvest,
  - type: text
    content: Or like the couple of ripe olives overlooked
  - type: text
    content: in the top of the olive tree,
  - type: text
    content: Or the four or five apples
  - type: text
    content: that the pickers couldn’t reach in the orchard.”
  - type: text
    content: 'Decree of the '
  - type: text
    content: God
  - type: text
    content: ' of Israel.'
  '7':
  - type: text
    content: Yes, the Day is coming when people will notice The One Who Made Them, take a long hard look at The Holy of Israel. They’ll lose interest in all the stuff they’ve made—altars and monuments and rituals, their homemade, handmade religion—however impressive it is.
  '9':
  - type: text
    content: And yes, the Day is coming when their fortress cities will be abandoned—the very same cities that the Hivites and Amorites abandoned when Israel invaded! And the country will be empty, desolate.
  - type: heading
    content: You Have Forgotten God
