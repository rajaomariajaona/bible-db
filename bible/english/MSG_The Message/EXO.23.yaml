document_id: EXO.23
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: “Don’t pass on malicious gossip.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t link up with a wicked person and give corrupt testimony. Don’t go along with the crowd in doing evil and don’t mess up your testimony in a case just to please the crowd. And just because someone is poor, don’t show favoritism in a dispute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: “If you find your enemy’s ox or donkey loose, take it back to him. If you see the donkey of someone who hates you lying helpless under its load, don’t walk off and leave it. Help it up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “When there is a dispute concerning your poor, don’t tamper with the justice due them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Stay clear of false accusations. Don’t contribute to the death of innocent and good people. I don’t let the wicked off the hook.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Don’t take bribes. Bribes blind perfectly good eyes and twist the speech of good people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Don’t take advantage of a stranger. You know what it’s like to be a stranger; you were strangers in Egypt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “Sow your land for six years and gather in its crops, but in the seventh year leave it alone and give it a rest so that your poor may eat from it. What they leave, let the wildlife have. Do the same with your vineyards and olive groves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Work for six days and rest the seventh so your ox and donkey may rest and your servant and migrant workers may have time to get their needed rest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Listen carefully to everything I tell you. Don’t pay attention to other gods—don’t so much as mention their names.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Three times a year you are to hold a festival for me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Hold the spring Festival of Unraised Bread when you eat unraised bread for seven days at the time set for the month of Abib, as I commanded you. That was the month you came out of Egypt. No one should show up before me empty-handed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Hold the summer Festival of Harvest when you bring in the firstfruits of all your work in the fields.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Hold the autumn Festival of Ingathering at the end of the season when you bring in the year’s crops.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Three times a year all your males are to appear before the Master, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Don’t offer the blood of a sacrifice to me with anything that has yeast in it.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t leave the fat from my festival offering out overnight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Bring the choice first produce of the year to the house of your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: “Don’t boil a kid in its mother’s milk.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-24
  - type: text
    text: “Now get yourselves ready. I’m sending my Angel ahead of you to guard you in your travels, to lead you to the place that I’ve prepared. Pay close attention to him. Obey him. Don’t go against him. He won’t put up with your rebellions because he’s acting on my authority. But if you obey him and do everything I tell you, I’ll be an enemy to your enemies, I’ll fight those who fight you. When my Angel goes ahead of you and leads you to the land of the Amorites, the Hittites, the Perizzites, the Canaanites, the Hivites, and the Jebusites, I’ll clear the country of them. So don’t worship or serve their gods; don’t do anything they do because I’m going to wipe them right off the face of the Earth and smash their sacred phallic pillars to bits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: '“But you—you serve your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and he’ll bless your food and your water. I’ll get rid of the sickness among you; there won’t be any miscarriages nor barren women in your land. I’ll make sure you live full and complete lives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “I’ll send my Terror on ahead of you and throw those peoples you’re approaching into a panic. All you’ll see of your enemies is the backs of their necks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-31
  - type: text
    text: “And I’ll send Despair on ahead of you. It will push the Hivites, the Canaanites, and the Hittites out of your way. I won’t get rid of them all at once lest the land grow up in weeds and the wild animals take over. Little by little I’ll get them out of there while you have a chance to get your crops going and make the land your own. I will make your borders stretch from the Red Sea to the Mediterranean Sea and from the Wilderness to the Euphrates River. I’m turning everyone living in that land over to you; go ahead and drive them out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: “Don’t make any deals with them or their gods. They are not to stay in the same country with you lest they get you to sin by worshiping their gods. Beware. That’s a huge danger.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
