document_id: JOB.11,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Zophar’s Counsel
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: How Wisdom Looks from the Inside
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: 'Now it was the turn of Zophar from Naamath:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What a flood of words! Shouldn’t we put a stop to it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Should this kind of loose talk be permitted?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Job, do you think you can carry on like this and we’ll say nothing?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That we’ll let you rail and mock and not step in?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You claim, ‘My doctrine is sound
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my conduct impeccable.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How I wish God would give you a piece of his mind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tell you what’s what!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wish he’d show you how wisdom looks from the inside,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for true wisdom is mostly ‘inside.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you can be sure of this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you haven’t gotten half of what you deserve.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-20
    - type: text
      text: “Still, if you set your heart on God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reach out to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you scrub your hands of sin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and refuse to entertain evil in your home,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll be able to face the world unashamed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keep a firm grip on life, guiltless and fearless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll forget your troubles;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll be like old, faded photographs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your world will be washed in sunshine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every shadow dispersed by dawn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Full of hope, you’ll relax, confident again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll look around, sit back, and take it easy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Expansive, without a care in the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll be hunted out by many for your blessing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked will see none of this.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re headed down a dead-end road
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with nothing to look forward to—nothing.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-12
    - type: text
      text: “Do you think you can explain the mystery of God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you think you can diagram God Almighty?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is far higher than you can imagine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far deeper than you can comprehend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stretching farther than earth’s horizons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far wider than the endless ocean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If he happens along, throws you in jail
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then hauls you into court, can you do anything about it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sees through vain pretensions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spots evil a long way off—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'no one pulls the wool over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' eyes!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hollow men, hollow women, will wise up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: about the same time mules learn to talk.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reach Out to God
    marker-yv: yv-h
