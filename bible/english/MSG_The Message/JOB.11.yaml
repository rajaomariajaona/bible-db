document_id: JOB.11,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Zophar’s Counsel
  - type: heading
    content: How Wisdom Looks from the Inside
  - type: text
    content: 'Now it was the turn of Zophar from Naamath:'
  - type: text
    content: “What a flood of words! Shouldn’t we put a stop to it?
  - type: text
    content: Should this kind of loose talk be permitted?
  - type: text
    content: Job, do you think you can carry on like this and we’ll say nothing?
  - type: text
    content: That we’ll let you rail and mock and not step in?
  - type: text
    content: You claim, ‘My doctrine is sound
  - type: text
    content: and my conduct impeccable.’
  - type: text
    content: How I wish God would give you a piece of his mind,
  - type: text
    content: tell you what’s what!
  - type: text
    content: I wish he’d show you how wisdom looks from the inside,
  - type: text
    content: for true wisdom is mostly ‘inside.’
  - type: text
    content: But you can be sure of this,
  - type: text
    content: you haven’t gotten half of what you deserve.
  '13':
  - type: text
    content: “Still, if you set your heart on God
  - type: text
    content: and reach out to him,
  - type: text
    content: If you scrub your hands of sin
  - type: text
    content: and refuse to entertain evil in your home,
  - type: text
    content: You’ll be able to face the world unashamed
  - type: text
    content: and keep a firm grip on life, guiltless and fearless.
  - type: text
    content: You’ll forget your troubles;
  - type: text
    content: they’ll be like old, faded photographs.
  - type: text
    content: Your world will be washed in sunshine,
  - type: text
    content: every shadow dispersed by dawn.
  - type: text
    content: Full of hope, you’ll relax, confident again;
  - type: text
    content: you’ll look around, sit back, and take it easy.
  - type: text
    content: Expansive, without a care in the world,
  - type: text
    content: you’ll be hunted out by many for your blessing.
  - type: text
    content: But the wicked will see none of this.
  - type: text
    content: They’re headed down a dead-end road
  - type: text
    content: with nothing to look forward to—nothing.”
  '7':
  - type: text
    content: “Do you think you can explain the mystery of God?
  - type: text
    content: Do you think you can diagram God Almighty?
  - type: text
    content: God is far higher than you can imagine,
  - type: text
    content: far deeper than you can comprehend,
  - type: text
    content: Stretching farther than earth’s horizons,
  - type: text
    content: far wider than the endless ocean.
  - type: text
    content: If he happens along, throws you in jail
  - type: text
    content: then hauls you into court, can you do anything about it?
  - type: text
    content: He sees through vain pretensions,
  - type: text
    content: spots evil a long way off—
  - type: text
    content: 'no one pulls the wool over '
  - type: text
    content: his
  - type: text
    content: ' eyes!'
  - type: text
    content: Hollow men, hollow women, will wise up
  - type: text
    content: about the same time mules learn to talk.
  - type: heading
    content: Reach Out to God
