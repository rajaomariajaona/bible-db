document_id: 1KI.14,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At about this time Jeroboam’s son Abijah came down sick. Jeroboam said to his wife, “Do something. Disguise yourself so no one will know you are the queen and go to Shiloh. Ahijah the prophet lives there, the same Ahijah who told me I’d be king over this people. Take along ten loaves of bread, some sweet rolls, and a jug of honey. Make a visit to him and he’ll tell you what’s going on with our boy.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And I’ll not put up with it: I’m bringing doom on the household of Jeroboam, killing the lot of them right down to the last male wretch in Israel, whether slave or free. They’ve become nothing but garbage and I’m getting rid of them. The ones who die in the city will be eaten by stray dogs; the ones who die out in the country will be eaten by carrion crows. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s decree!
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And that’s it. Go on home—the minute you step foot in town, the boy will die. Everyone will come to his burial, mourning his death. He is the only one in Jeroboam’s family who will get a decent burial; he’s the only one for whom '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, has a good word to say.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will appoint a king over Israel who will wipe out Jeroboam’s family, wipe them right off the map—doomsday for Jeroboam! He will hit Israel hard, as a storm slaps reeds about; he’ll pull them up by the roots from this good land of their inheritance, weeding them out, and then scatter them to the four winds. And why? Because they made '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' so angry with Asherah sex-and-religion shrines. He’ll wash his hands of Israel because of Jeroboam’s sins, which have led Israel into a life of sin.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeroboam’s wife left and went home to Tirzah. The moment she stepped through the door, the boy died. They buried him and everyone mourned his death, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had said through his servant the prophet Ahijah.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of Jeroboam’s life, the wars he fought and the way he ruled, is written in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Chronicles of the Kings of Israel
    - type: text
      text: . He ruled for twenty-two years. He died and was buried with his ancestors. Nadab his son was king after him.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam son of Solomon was king in Judah. He was forty-one years old when he took the throne and was king for seventeen years in Jerusalem, the city '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' selected from all the tribes of Israel for the worship of his Name. Rehoboam’s mother was Naamah, an Ammonite. Judah was openly wicked before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', making him very angry. They set new records in sin, surpassing anything their ancestors had done. They built Asherah sex-and-religion shrines and set up sacred stones all over the place—on hills, under trees, wherever you looked. Worse, they had male sacred prostitutes, polluting the country outrageously—all the stuff that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had gotten rid of when he brought Israel into the land.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fifth year of King Rehoboam’s rule, Shishak king of Egypt made war against Jerusalem. He plundered The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and the royal palace of their treasures, cleaned them out—even the gold shields that Solomon had made. King Rehoboam replaced them with bronze shields and outfitted the royal palace guards with them. Whenever the king went to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Temple, the guards carried the shields but always returned them to the guardroom.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of Rehoboam’s life, what he said and did, is all written in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Chronicles of the Kings of Judah
    - type: text
      text: . There was war between Rehoboam and Jeroboam the whole time. Rehoboam died and was buried with his ancestors in the City of David. His mother was Naamah, an Ammonite. His son Abijah ruled after him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jeroboam’s wife did as she was told; she went straight to Shiloh and to Ahijah’s house. Ahijah was an old man at this time, and blind, but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had warned Ahijah, “Jeroboam’s wife is on her way to consult with you regarding her sick son; tell her this and this and this.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' When she came in she was disguised. Ahijah heard her come through the door and said, “Welcome, wife of Jeroboam! But why the deception? I’ve got bad news for you. Go and deliver this message I received firsthand from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, to Jeroboam: I raised you up from obscurity and made you the leader of my people Israel. I ripped the kingdom from the hands of David’s family and gave it to you, but you weren’t at all like my servant David who did what I told him and lived from his undivided heart, pleasing me. Instead you’ve set a new record in works of evil by making alien gods—tin gods! Pushing me aside and turning your back—you’ve made me mighty angry.'
