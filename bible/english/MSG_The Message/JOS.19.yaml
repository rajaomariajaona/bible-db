document_id: JOS.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Simeon
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-8a
    - type: text
      text: ' The second lot went to Simeon for its clans. Their inheritance was within the territory of Judah. In their inheritance they had:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Beersheba (or Sheba), Moladah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hazar Shual, Balah, Ezem,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eltolad, Bethul, Hormah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ziklag, Beth Marcaboth, Hazar Susah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Beth Lebaoth, and Sharuhen—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: thirteen towns and their villages.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ain, Rimmon, Ether, and Ashan—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: four towns and their villages—plus all the villages around these towns as far as Baalath Beer, the Ramah of the Negev.
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-15
    - type: text
      text: 'The third lot went to Zebulun, clan by clan:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: The border of their inheritance went all the way to Sarid. It ran west to Maralah, met Dabbesheth, and then went to the brook opposite Jokneam. In the other direction from Sarid, the border ran east; it followed the sunrise to the border of Kisloth Tabor, on to Daberath and up to Japhia. It continued east to Gath Hepher and Eth Kazin, came out at Rimmon, and turned toward Neah. There the border went around on the north to Hannathon and ran out into the Valley of Iphtah El. It included Kattath, Nahalal, Shimron, Idalah, and Bethlehem—twelve cities with their villages.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: This is the inheritance of the people of Zebulun for their clans—these towns and their villages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Issachar
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-21
    - type: text
      text: 'The fourth lot went to Issachar, clan by clan. Their territory included:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jezreel, Kesulloth, Shunem,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hapharaim, Shion, Anaharath,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Rabbith, Kishion, Ebez,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Remeth, En Gannim, En Haddah, and Beth Pazzez.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The boundary touched Tabor, Shahazumah, and Beth Shemesh and ended at the Jordan—sixteen towns and their villages.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: These towns with their villages were the inheritance of the tribe of Issachar, clan by clan.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asher
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The fifth lot went to the tribe of Asher, clan by clan:'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-30
    - type: text
      text: Their territory included Helkath, Hali, Beten, Acshaph, Allammelech, Amad, and Mishal. The western border touched Carmel and Shihor Libnath, then turned east toward Beth Dagon, touched Zebulun and the Valley of Iphtah El, and went north to Beth Emek and Neiel, skirting Cabul on the left. It went on to Abdon, Rehob, Hammon, and Kanah, all the way to Greater Sidon. The border circled back toward Ramah, extended to the fort city of Tyre, turned toward Hosah, and came out at the Sea in the region of Aczib, Ummah, Aphek, and Rehob—twenty-two towns and their villages.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: These towns and villages were the inheritance of the tribe of Asher, clan by clan.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naphtali
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The sixth lot came to Naphtali and its clans.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Their border ran from Heleph, from the oak at Zaanannim, passing Adami Nekeb and Jabneel to Lakkum and ending at the Jordan.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: The border returned on the west at Aznoth Tabor and came out at Hukkok, meeting Zebulun on the south, Asher on the west, and the Jordan on the east.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fort cities were:'
  '35':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-38
    - type: text
      text: Ziddim, Zer, Hammath, Rakkath, Kinnereth,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Adamah, Ramah, Hazor,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Kedesh, Edrei, En Hazor,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Iron, Migdal El, Horem, Beth Anath, and Beth Shemesh—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: nineteen towns and their villages.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: This is the inheritance of the tribe of Naphtali, the cities and their villages, clan by clan.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dan
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40-46
    - type: text
      text: 'The seventh lot fell to Dan. The territory of their inheritance included:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zorah, Eshtaol, Ir Shemesh,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shaalabbin, Aijalon, Ithlah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Elon, Timnah, Ekron,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eltekeh, Gibbethon, Baalath,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehud, Bene Berak, Gath Rimmon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Me Jarkon, and Rakkon, with the region facing Joppa.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: But the people of Dan failed to get rid of the Westerners (Amorites), who pushed them back into the hills. The Westerners kept them out of the plain and they didn’t have enough room. So the people of Dan marched up and attacked Leshem. They took it, killed the inhabitants, and settled in. They renamed it Leshem Dan after the name of Dan their ancestor.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: This is the inheritance of the tribe of Dan, according to its clans, these towns with their villages.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 49-50
    - type: text
      text: 'They completed the dividing of the land as inheritance and the setting of its boundaries. The People of Israel then gave an inheritance among them to Joshua son of Nun. In obedience to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s word, they gave him the city which he had requested, Timnath Serah in the hill country of Ephraim. He rebuilt the city and settled there.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'These are the inheritances which Eleazar the priest and Joshua son of Nun and the ancestral leaders assigned by lot to the tribes of Israel at Shiloh in the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' at the entrance of the Tent of Meeting. They completed the dividing of the land.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8b-9
    - type: text
      text: ' This is the inheritance of the tribe of Simeon according to its clans. The inheritance of Simeon came out of the share of Judah, because Judah’s portion turned out to be more than they needed. That’s how the people of Simeon came to get their lot from within Judah’s portion.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zebulun
    marker-yv: yv-h
