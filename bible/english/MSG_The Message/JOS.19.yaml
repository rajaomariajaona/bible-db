document_id: JOS.19,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Simeon
  - type: text
    content: ' The second lot went to Simeon for its clans. Their inheritance was within the territory of Judah. In their inheritance they had:'
  - type: text
    content: Beersheba (or Sheba), Moladah,
  - type: text
    content: Hazar Shual, Balah, Ezem,
  - type: text
    content: Eltolad, Bethul, Hormah,
  - type: text
    content: Ziklag, Beth Marcaboth, Hazar Susah,
  - type: text
    content: Beth Lebaoth, and Sharuhen—
  - type: text
    content: thirteen towns and their villages.
  - type: text
    content: Ain, Rimmon, Ether, and Ashan—
  - type: text
    content: four towns and their villages—plus all the villages around these towns as far as Baalath Beer, the Ramah of the Negev.
  '10':
  - type: text
    content: 'The third lot went to Zebulun, clan by clan:'
  - type: text
    content: The border of their inheritance went all the way to Sarid. It ran west to Maralah, met Dabbesheth, and then went to the brook opposite Jokneam. In the other direction from Sarid, the border ran east; it followed the sunrise to the border of Kisloth Tabor, on to Daberath and up to Japhia. It continued east to Gath Hepher and Eth Kazin, came out at Rimmon, and turned toward Neah. There the border went around on the north to Hannathon and ran out into the Valley of Iphtah El. It included Kattath, Nahalal, Shimron, Idalah, and Bethlehem—twelve cities with their villages.
  '16':
  - type: text
    content: This is the inheritance of the people of Zebulun for their clans—these towns and their villages.
  - type: heading
    content: Issachar
  '17':
  - type: text
    content: 'The fourth lot went to Issachar, clan by clan. Their territory included:'
  - type: text
    content: Jezreel, Kesulloth, Shunem,
  - type: text
    content: Hapharaim, Shion, Anaharath,
  - type: text
    content: Rabbith, Kishion, Ebez,
  - type: text
    content: Remeth, En Gannim, En Haddah, and Beth Pazzez.
  '22':
  - type: text
    content: The boundary touched Tabor, Shahazumah, and Beth Shemesh and ended at the Jordan—sixteen towns and their villages.
  '23':
  - type: text
    content: These towns with their villages were the inheritance of the tribe of Issachar, clan by clan.
  - type: heading
    content: Asher
  '24':
  - type: text
    content: 'The fifth lot went to the tribe of Asher, clan by clan:'
  '25':
  - type: text
    content: Their territory included Helkath, Hali, Beten, Acshaph, Allammelech, Amad, and Mishal. The western border touched Carmel and Shihor Libnath, then turned east toward Beth Dagon, touched Zebulun and the Valley of Iphtah El, and went north to Beth Emek and Neiel, skirting Cabul on the left. It went on to Abdon, Rehob, Hammon, and Kanah, all the way to Greater Sidon. The border circled back toward Ramah, extended to the fort city of Tyre, turned toward Hosah, and came out at the Sea in the region of Aczib, Ummah, Aphek, and Rehob—twenty-two towns and their villages.
  '31':
  - type: text
    content: These towns and villages were the inheritance of the tribe of Asher, clan by clan.
  - type: heading
    content: Naphtali
  '32':
  - type: text
    content: The sixth lot came to Naphtali and its clans.
  '33':
  - type: text
    content: Their border ran from Heleph, from the oak at Zaanannim, passing Adami Nekeb and Jabneel to Lakkum and ending at the Jordan.
  '34':
  - type: text
    content: The border returned on the west at Aznoth Tabor and came out at Hukkok, meeting Zebulun on the south, Asher on the west, and the Jordan on the east.
  - type: text
    content: 'The fort cities were:'
  '35':
  - type: text
    content: Ziddim, Zer, Hammath, Rakkath, Kinnereth,
  - type: text
    content: Adamah, Ramah, Hazor,
  - type: text
    content: Kedesh, Edrei, En Hazor,
  - type: text
    content: Iron, Migdal El, Horem, Beth Anath, and Beth Shemesh—
  - type: text
    content: nineteen towns and their villages.
  '39':
  - type: text
    content: This is the inheritance of the tribe of Naphtali, the cities and their villages, clan by clan.
  - type: heading
    content: Dan
  '40':
  - type: text
    content: 'The seventh lot fell to Dan. The territory of their inheritance included:'
  - type: text
    content: Zorah, Eshtaol, Ir Shemesh,
  - type: text
    content: Shaalabbin, Aijalon, Ithlah,
  - type: text
    content: Elon, Timnah, Ekron,
  - type: text
    content: Eltekeh, Gibbethon, Baalath,
  - type: text
    content: Jehud, Bene Berak, Gath Rimmon,
  - type: text
    content: Me Jarkon, and Rakkon, with the region facing Joppa.
  '47':
  - type: text
    content: But the people of Dan failed to get rid of the Westerners (Amorites), who pushed them back into the hills. The Westerners kept them out of the plain and they didn’t have enough room. So the people of Dan marched up and attacked Leshem. They took it, killed the inhabitants, and settled in. They renamed it Leshem Dan after the name of Dan their ancestor.
  '48':
  - type: text
    content: This is the inheritance of the tribe of Dan, according to its clans, these towns with their villages.
  - type: text
    content: '* * *'
  '49':
  - type: text
    content: 'They completed the dividing of the land as inheritance and the setting of its boundaries. The People of Israel then gave an inheritance among them to Joshua son of Nun. In obedience to '
  - type: text
    content: God
  - type: text
    content: ’s word, they gave him the city which he had requested, Timnath Serah in the hill country of Ephraim. He rebuilt the city and settled there.
  '51':
  - type: text
    content: 'These are the inheritances which Eleazar the priest and Joshua son of Nun and the ancestral leaders assigned by lot to the tribes of Israel at Shiloh in the presence of '
  - type: text
    content: God
  - type: text
    content: ' at the entrance of the Tent of Meeting. They completed the dividing of the land.'
  '8':
  - type: text
    content: ' This is the inheritance of the tribe of Simeon according to its clans. The inheritance of Simeon came out of the share of Judah, because Judah’s portion turned out to be more than they needed. That’s how the people of Simeon came to get their lot from within Judah’s portion.'
  - type: heading
    content: Zebulun
