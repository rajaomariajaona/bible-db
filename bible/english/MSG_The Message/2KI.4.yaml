document_id: 2KI.4,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'One day the wife of a man from the guild of prophets called out to Elisha, “Your servant my husband is dead. You well know what a good man he was, devoted to '
  - type: text
    content: God
  - type: text
    content: . And now the man to whom he was in debt is on his way to collect by taking my two children as slaves.”
  '11':
  - type: text
    content: And so it happened that the next time Elisha came by he went to the room and lay down for a nap.
  '12':
  - type: text
    content: Then he said to his servant Gehazi, “Tell the Shunammite woman I want to see her.” He called her and she came to him.
  '13':
  - type: text
    content: Through Gehazi Elisha said, “You’ve gone far beyond the call of duty in taking care of us; what can we do for you? Do you have a request we can bring to the king or to the commander of the army?”
  - type: text
    content: She replied, “Nothing. I’m secure and satisfied in my family.”
  '14':
  - type: text
    content: 'Elisha conferred with Gehazi: “There’s got to be something we can do for her. But what?”'
  - type: text
    content: Gehazi said, “Well, she has no son, and her husband is an old man.”
  '15':
  - type: text
    content: “Call her in,” said Elisha. He called her and she stood at the open door.
  '16':
  - type: text
    content: Elisha said to her, “This time next year you’re going to be nursing an infant son.”
  - type: text
    content: “O my master, O Holy Man,” she said, “don’t play games with me, teasing me with such fantasies!”
  '17':
  - type: text
    content: The woman conceived. A year later, just as Elisha had said, she had a son.
  '18':
  - type: text
    content: The child grew up. One day he went to his father, who was working with the harvest hands, complaining, “My head, my head!”
  - type: text
    content: His father ordered a servant, “Carry him to his mother.”
  '2':
  - type: text
    content: Elisha said, “I wonder how I can be of help. Tell me, what do you have in your house?”
  - type: text
    content: “Nothing,” she said. “Well, I do have a little oil.”
  '20':
  - type: text
    content: The servant took him in his arms and carried him to his mother. He lay on her lap until noon and died.
  '21':
  - type: text
    content: She took him up and laid him on the bed of the man of God, shut him in alone, and left.
  '22':
  - type: text
    content: She then called her husband, “Get me a servant and a donkey so I can go to the Holy Man; I’ll be back as soon as I can.”
  '23':
  - type: text
    content: “But why today? This isn’t a holy day—it’s neither New Moon nor Sabbath.”
  - type: text
    content: She said, “Don’t ask questions; I need to go right now. Trust me.”
  '24':
  - type: text
    content: ' She went ahead and saddled the donkey, ordering her servant, “Take the lead—and go as fast as you can; I’ll tell you if you’re going too fast.” And so off she went. She came to the Holy Man at Mount Carmel.'
  '25':
  - type: text
    content: ' The Holy Man, spotting her while she was still a long way off, said to his servant Gehazi, “Look out there; why, it’s the Shunammite woman! Quickly now. Ask her, ‘Is something wrong? Are you all right? Your husband? Your child?’”'
  - type: text
    content: She said, “Everything’s fine.”
  '27':
  - type: text
    content: But when she reached the Holy Man at the mountain, she threw herself at his feet and held tightly to him.
  - type: text
    content: 'Gehazi came up to pull her away, but the Holy Man said, “Leave her alone—can’t you see that she’s in distress? But '
  - type: text
    content: God
  - type: text
    content: ' hasn’t let me in on why; I’m completely in the dark.”'
  '28':
  - type: text
    content: 'Then she spoke up: “Did I ask for a son, master? Didn’t I tell you, ‘Don’t tease me with false hopes’?”'
  '29':
  - type: text
    content: He ordered Gehazi, “Don’t lose a minute—grab my staff and run as fast as you can. If you meet anyone, don’t even take time to greet him, and if anyone greets you, don’t even answer. Lay my staff across the boy’s face.”
  '3':
  - type: text
    content: “Here’s what you do,” said Elisha. “Go up and down the street and borrow jugs and bowls from all your neighbors. And not just a few—all you can get. Then come home and lock the door behind you, you and your sons. Pour oil into each container; when each is full, set it aside.”
  '30':
  - type: text
    content: 'The boy’s mother said, “As sure as '
  - type: text
    content: God
  - type: text
    content: ' lives and you live, you’re not leaving me behind.” And so Gehazi let her take the lead, and followed behind.'
  '31':
  - type: text
    content: But Gehazi arrived first and laid the staff across the boy’s face. But there was no sound—no sign of life. Gehazi went back to meet Elisha and said, “The boy hasn’t stirred.”
  '32':
  - type: text
    content: 'Elisha entered the house and found the boy stretched out on the bed dead. He went into the room and locked the door—just the two of them in the room—and prayed to '
  - type: text
    content: God
  - type: text
    content: . He then got into bed with the boy and covered him with his body, mouth on mouth, eyes on eyes, hands on hands. As he was stretched out over him like that, the boy’s body became warm. Elisha got up and paced back and forth in the room. Then he went back and stretched himself upon the boy again. The boy started sneezing—seven times he sneezed!—and opened his eyes.
  '36':
  - type: text
    content: He called Gehazi and said, “Get the Shunammite woman in here!” He called her and she came in.
  - type: text
    content: Elisha said, “Embrace your son!”
  '37':
  - type: text
    content: She fell at Elisha’s feet, face to the ground in reverent awe. Then she embraced her son and went out with him.
  '38':
  - type: text
    content: Elisha went back down to Gilgal. There was a famine there. While he was consulting with the guild of prophets, he told his servant, “Put a large pot on the fire and cook up some stew for the prophets.”
  '39':
  - type: text
    content: One of the men went out into the field to get some herbs; he came across a wild vine and picked gourds from it, filling his gunnysack. He brought them back, sliced them up, and put them in the stew, even though no one knew what kind of plant it was. The stew was then served up for the men to eat. They started to eat, and then exclaimed, “Death in the pot, O man of God! Death in the pot!” Nobody could eat it.
  - type: text
    content: Elisha ordered, “Get me some meal.” Then he sprinkled it into the stew pot.
  '41':
  - type: text
    content: '“Now serve it up to the men,” he said. They ate it, and it was just fine—nothing wrong with '
  - type: text
    content: that
  - type: text
    content: ' stew!'
  '42':
  - type: text
    content: One day a man arrived from Baal Shalishah. He brought the man of God twenty loaves of fresh-baked bread from the early harvest, along with a few apples from the orchard.
  - type: text
    content: Elisha said, “Pass it around to the people to eat.”
  '43':
  - type: text
    content: His servant said, “For a hundred men? There’s not nearly enough!”
  - type: text
    content: 'Elisha said, “Just go ahead and do it. '
  - type: text
    content: God
  - type: text
    content: ' says there’s plenty.”'
  '44':
  - type: text
    content: And sure enough, there was. He passed around what he had—they not only ate, but had leftovers.
  '5':
  - type: text
    content: She did what he said. She locked the door behind her and her sons; as they brought the containers to her, she filled them. When all the jugs and bowls were full, she said to one of her sons, “Another jug, please.”
  - type: text
    content: He said, “That’s it. There are no more jugs.”
  - type: text
    content: Then the oil stopped.
  '7':
  - type: text
    content: She went and told the story to the man of God. He said, “Go sell the oil and make good on your debts. Live, both you and your sons, on what’s left.”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: 'One day Elisha passed through Shunem. A leading lady of the town talked him into stopping for a meal. And then it became his custom: Whenever he passed through, he stopped by for a meal.'
  '9':
  - type: text
    content: “I’m certain,” said the woman to her husband, “that this man who stops by with us all the time is a holy man of God. Why don’t we add on a small room upstairs and furnish it with a bed and desk, chair and lamp, so that when he comes by he can stay with us?”
