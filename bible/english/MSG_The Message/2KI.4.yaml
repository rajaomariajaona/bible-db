document_id: 2KI.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One day the wife of a man from the guild of prophets called out to Elisha, “Your servant my husband is dead. You well know what a good man he was, devoted to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . And now the man to whom he was in debt is on his way to collect by taking my two children as slaves.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elisha said, “I wonder how I can be of help. Tell me, what do you have in your house?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Nothing,” she said. “Well, I do have a little oil.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: “Here’s what you do,” said Elisha. “Go up and down the street and borrow jugs and bowls from all your neighbors. And not just a few—all you can get. Then come home and lock the door behind you, you and your sons. Pour oil into each container; when each is full, set it aside.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: She did what he said. She locked the door behind her and her sons; as they brought the containers to her, she filled them. When all the jugs and bowls were full, she said to one of her sons, “Another jug, please.”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “That’s it. There are no more jugs.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Then the oil stopped.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: She went and told the story to the man of God. He said, “Go sell the oil and make good on your debts. Live, both you and your sons, on what’s left.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'One day Elisha passed through Shunem. A leading lady of the town talked him into stopping for a meal. And then it became his custom: Whenever he passed through, he stopped by for a meal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: “I’m certain,” said the woman to her husband, “that this man who stops by with us all the time is a holy man of God. Why don’t we add on a small room upstairs and furnish it with a bed and desk, chair and lamp, so that when he comes by he can stay with us?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And so it happened that the next time Elisha came by he went to the room and lay down for a nap.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then he said to his servant Gehazi, “Tell the Shunammite woman I want to see her.” He called her and she came to him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Through Gehazi Elisha said, “You’ve gone far beyond the call of duty in taking care of us; what can we do for you? Do you have a request we can bring to the king or to the commander of the army?”
- type: usfm
  marker: p
  children:
  - type: text
    text: She replied, “Nothing. I’m secure and satisfied in my family.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elisha conferred with Gehazi: “There’s got to be something we can do for her. But what?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Gehazi said, “Well, she has no son, and her husband is an old man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Call her in,” said Elisha. He called her and she stood at the open door.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elisha said to her, “This time next year you’re going to be nursing an infant son.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “O my master, O Holy Man,” she said, “don’t play games with me, teasing me with such fantasies!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The woman conceived. A year later, just as Elisha had said, she had a son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: The child grew up. One day he went to his father, who was working with the harvest hands, complaining, “My head, my head!”
- type: usfm
  marker: p
  children:
  - type: text
    text: His father ordered a servant, “Carry him to his mother.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The servant took him in his arms and carried him to his mother. He lay on her lap until noon and died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: She took him up and laid him on the bed of the man of God, shut him in alone, and left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: She then called her husband, “Get me a servant and a donkey so I can go to the Holy Man; I’ll be back as soon as I can.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “But why today? This isn’t a holy day—it’s neither New Moon nor Sabbath.”
- type: usfm
  marker: p
  children:
  - type: text
    text: She said, “Don’t ask questions; I need to go right now. Trust me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25a
  - type: text
    text: ' She went ahead and saddled the donkey, ordering her servant, “Take the lead—and go as fast as you can; I’ll tell you if you’re going too fast.” And so off she went. She came to the Holy Man at Mount Carmel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25b-26
  - type: text
    text: ' The Holy Man, spotting her while she was still a long way off, said to his servant Gehazi, “Look out there; why, it’s the Shunammite woman! Quickly now. Ask her, ‘Is something wrong? Are you all right? Your husband? Your child?’”'
- type: usfm
  marker: p
  children:
  - type: text
    text: She said, “Everything’s fine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But when she reached the Holy Man at the mountain, she threw herself at his feet and held tightly to him.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Gehazi came up to pull her away, but the Holy Man said, “Leave her alone—can’t you see that she’s in distress? But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hasn’t let me in on why; I’m completely in the dark.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then she spoke up: “Did I ask for a son, master? Didn’t I tell you, ‘Don’t tease me with false hopes’?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He ordered Gehazi, “Don’t lose a minute—grab my staff and run as fast as you can. If you meet anyone, don’t even take time to greet him, and if anyone greets you, don’t even answer. Lay my staff across the boy’s face.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The boy’s mother said, “As sure as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives and you live, you’re not leaving me behind.” And so Gehazi let her take the lead, and followed behind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But Gehazi arrived first and laid the staff across the boy’s face. But there was no sound—no sign of life. Gehazi went back to meet Elisha and said, “The boy hasn’t stirred.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-35
  - type: text
    text: 'Elisha entered the house and found the boy stretched out on the bed dead. He went into the room and locked the door—just the two of them in the room—and prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . He then got into bed with the boy and covered him with his body, mouth on mouth, eyes on eyes, hands on hands. As he was stretched out over him like that, the boy’s body became warm. Elisha got up and paced back and forth in the room. Then he went back and stretched himself upon the boy again. The boy started sneezing—seven times he sneezed!—and opened his eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: He called Gehazi and said, “Get the Shunammite woman in here!” He called her and she came in.
- type: usfm
  marker: p
  children:
  - type: text
    text: Elisha said, “Embrace your son!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: She fell at Elisha’s feet, face to the ground in reverent awe. Then she embraced her son and went out with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Elisha went back down to Gilgal. There was a famine there. While he was consulting with the guild of prophets, he told his servant, “Put a large pot on the fire and cook up some stew for the prophets.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: One of the men went out into the field to get some herbs; he came across a wild vine and picked gourds from it, filling his gunnysack. He brought them back, sliced them up, and put them in the stew, even though no one knew what kind of plant it was. The stew was then served up for the men to eat. They started to eat, and then exclaimed, “Death in the pot, O man of God! Death in the pot!” Nobody could eat it.
- type: usfm
  marker: p
  children:
  - type: text
    text: Elisha ordered, “Get me some meal.” Then he sprinkled it into the stew pot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '“Now serve it up to the men,” he said. They ate it, and it was just fine—nothing wrong with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' stew!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: One day a man arrived from Baal Shalishah. He brought the man of God twenty loaves of fresh-baked bread from the early harvest, along with a few apples from the orchard.
- type: usfm
  marker: p
  children:
  - type: text
    text: Elisha said, “Pass it around to the people to eat.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: His servant said, “For a hundred men? There’s not nearly enough!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elisha said, “Just go ahead and do it. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says there’s plenty.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And sure enough, there was. He passed around what he had—they not only ate, but had leftovers.
