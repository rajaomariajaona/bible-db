document_id: MRK.15,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Standing Before Pilate
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: At dawn’s first light, the high priests, with the religious leaders and scholars, arranged a conference with the entire Jewish Council. After tying Jesus securely, they took him out and presented him to Pilate.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: But the high priests by then had worked up the crowd to ask for the release of Barabbas. Pilate came back, “So what do I do with this man you call King of the Jews?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They yelled, “Nail him to a cross!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pilate objected, “But for what crime?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they yelled all the louder, “Nail him to a cross!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pilate gave the crowd what it wanted, set Barabbas free and turned Jesus over for whipping and crucifixion.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-20
    - type: text
      text: 'The soldiers took Jesus into the palace (called Praetorium) and called together the entire brigade. They dressed him up in purple and put a crown plaited from a thornbush on his head. Then they began their mockery: “Bravo, King of the Jews!” They banged on his head with a club, spit on him, and knelt down in mock worship. After they had had their fun, they took off the purple cape and put his own clothes back on him. Then they marched out to nail him to the cross.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Crucifixion
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: Pilate asked him, “Are you the ‘King of the Jews’?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered, “If you say so.” The high priests let loose a barrage of accusations.
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: There was a man walking by, coming from work, Simon from Cyrene, the father of Alexander and Rufus. They made him carry Jesus’ cross.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-24
    - type: text
      text: The soldiers brought Jesus to Golgotha, meaning “Skull Hill.” They offered him a mild painkiller (wine mixed with myrrh), but he wouldn’t take it. And they nailed him to the cross. They divided up his clothes and threw dice to see who would get them.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-30
    - type: text
      text: They nailed him up at nine o’clock in the morning. The charge against him—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: the king of the jews
    - type: text
      text: '—was scrawled across a sign. Along with him, they crucified two criminals, one to his right, the other to his left. People passing along the road jeered, shaking their heads in mock lament: “You bragged that you could tear down the Temple and then rebuild it in three days—so show us your stuff! Save yourself! If you’re really God’s Son, come down from that cross!”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: 'The high priests, along with the religion scholars, were right there mixing it up with the rest of them, having a great time poking fun at him: “He saved others—but he can’t save himself! Messiah, is he? King of Israel? Then let him climb down from that cross. We’ll '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' become believers then!” Even the men crucified alongside him joined in the mockery.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-34
    - type: text
      text: At noon the sky became extremely dark. The darkness lasted three hours. At three o’clock, Jesus groaned out of the depths, crying loudly, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Eloi, Eloi, lama sabachthani?
    - type: text
      text: ” which means, “My God, my God, why have you abandoned me?”
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-36
    - type: text
      text: Some of the bystanders who heard him said, “Listen, he’s calling for Elijah.” Someone ran off, soaked a sponge in sour wine, put it on a stick, and gave it to him to drink, saying, “Let’s see if Elijah comes to take him down.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 37-39
    - type: text
      text: But Jesus, with a loud cry, gave his last breath. At that moment the Temple curtain ripped right down the middle. When the Roman captain standing guard in front of him saw that he had quit breathing, he said, “This has to be the Son of God!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Taken to a Tomb
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: Pilate asked again, “Aren’t you going to answer anything? That’s quite a list of accusations.” Still, he said nothing. Pilate was impressed, really impressed.
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 40-41
    - type: text
      text: There were women watching from a distance, among them Mary Magdalene, Mary the mother of the younger James and Joses, and Salome. When Jesus was in Galilee, these women followed and served him, and had come up with him to Jerusalem.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 42-45
    - type: text
      text: Late in the afternoon, since it was the Day of Preparation (that is, Sabbath eve), Joseph of Arimathea, a highly respected member of the Jewish Council, came. He was one who lived expectantly, on the lookout for the kingdom of God. Working up his courage, he went to Pilate and asked for Jesus’ body. Pilate questioned whether he could be dead that soon and called for the captain to verify that he was really dead. Assured by the captain, he gave Joseph the corpse.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 46-47
    - type: text
      text: Having already purchased a linen shroud, Joseph took him down, wrapped him in the shroud, placed him in a tomb that had been cut into the rock, and rolled a large stone across the opening. Mary Magdalene and Mary, mother of Joses, watched the burial.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-10
    - type: text
      text: 'It was a custom at the Feast to release a prisoner, anyone the people asked for. There was one prisoner called Barabbas, locked up with the insurrectionists who had committed murder during the uprising against Rome. As the crowd came up and began to present its petition for him to release a prisoner, Pilate anticipated them: “Do you want me to release the King of the Jews to you?” Pilate knew by this time that it was through sheer spite that the high priests had turned Jesus over to him.'
