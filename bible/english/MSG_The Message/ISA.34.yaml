document_id: ISA.34,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fires Burning Day and Night
  - type: text
    content: Draw in close now, nations. Listen carefully,
  - type: text
    content: you people. Pay attention!
  - type: text
    content: Earth, you, too, and everything in you.
  - type: text
    content: World, and all that comes from you.
  '16':
  - type: text
    content: 'Get and read '
  - type: text
    content: God
  - type: text
    content: '’s book:'
  - type: text
    content: None of this is going away,
  - type: text
    content: this breeding, brooding evil.
  - type: text
    content: God
  - type: text
    content: ' has personally commanded it all.'
  - type: text
    content: His Spirit set it in motion.
  - type: text
    content: God
  - type: text
    content: ' has assigned them their place,'
  - type: text
    content: decreed their fate in detail.
  - type: text
    content: This is permanent—
  - type: text
    content: generation after generation, the same old thing.
  '2':
  - type: text
    content: 'And here’s why: '
  - type: text
    content: God
  - type: text
    content: ' is angry,'
  - type: text
    content: good and angry with all the nations,
  - type: text
    content: So blazingly angry at their arms and armies
  - type: text
    content: that he’s going to rid earth of them, wipe them out.
  - type: text
    content: The corpses, thrown in a heap,
  - type: text
    content: will stink like the town dump in midsummer,
  - type: text
    content: Their blood flowing off the mountains
  - type: text
    content: like creeks in spring runoff.
  - type: text
    content: Stars will fall out of the sky
  - type: text
    content: like overripe, rotting fruit in the orchard,
  - type: text
    content: And the sky itself will be folded up like a blanket
  - type: text
    content: and put away in a closet.
  - type: text
    content: All that army of stars, shriveled to nothing,
  - type: text
    content: like leaves and fruit in autumn, dropping and rotting!
  '5':
  - type: text
    content: “Once I’ve finished with earth and sky,
  - type: text
    content: I’ll start in on Edom.
  - type: text
    content: I’ll come down hard on Edom,
  - type: text
    content: a people I’ve slated for total termination.”
  - type: text
    content: God
  - type: text
    content: ' has a sword, thirsty for blood and more blood,'
  - type: text
    content: a sword hungry for well-fed flesh,
  - type: text
    content: Lamb and goat blood,
  - type: text
    content: the suet-rich kidneys of rams.
  - type: text
    content: 'Yes, '
  - type: text
    content: God
  - type: text
    content: ' has scheduled a sacrifice in Bozrah, the capital,'
  - type: text
    content: the whole country of Edom a slaughterhouse.
  - type: text
    content: A wholesale slaughter, wild animals
  - type: text
    content: and farm animals alike slaughtered.
  - type: text
    content: The whole country soaked with blood,
  - type: text
    content: all the ground greasy with fat.
  '8':
  - type: text
    content: 'It’s '
  - type: text
    content: God
  - type: text
    content: ’s scheduled time for vengeance,
  - type: text
    content: the year all Zion’s accounts are settled.
  - type: text
    content: Edom’s streams will flow sluggish, thick with pollution,
  - type: text
    content: the soil sterile, poisoned with waste,
  - type: text
    content: The whole country
  - type: text
    content: a smoking, stinking garbage dump—
  - type: text
    content: The fires burning day and night,
  - type: text
    content: the skies black with endless smoke.
  - type: text
    content: Generation after generation of wasteland—
  - type: text
    content: no more travelers through this country!
  - type: text
    content: Vultures and skunks will police the streets;
  - type: text
    content: owls and crows will feel at home there.
  - type: text
    content: God will reverse creation. Chaos!
  - type: text
    content: He will cancel fertility. Emptiness!
  - type: text
    content: Leaders will have no one to lead.
  - type: text
    content: They’ll name it No Kingdom There,
  - type: text
    content: A country where all kings
  - type: text
    content: and princes are unemployed.
  - type: text
    content: Thistles will take over, covering the castles,
  - type: text
    content: fortresses conquered by weeds and thornbushes.
  - type: text
    content: Wild dogs will prowl the ruins,
  - type: text
    content: ostriches have the run of the place.
  - type: text
    content: Wildcats and hyenas will hunt together,
  - type: text
    content: demons and devils dance through the night.
  - type: text
    content: The night-demon Lilith, evil and rapacious,
  - type: text
    content: will establish permanent quarters.
  - type: text
    content: Scavenging carrion birds will breed and brood,
  - type: text
    content: infestations of ominous evil.
