document_id: ISA.34,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fires Burning Day and Night
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Draw in close now, nations. Listen carefully,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you people. Pay attention!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth, you, too, and everything in you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: World, and all that comes from you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Get and read '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s book:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: None of this is going away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this breeding, brooding evil.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has personally commanded it all.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His Spirit set it in motion.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has assigned them their place,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: decreed their fate in detail.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is permanent—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: generation after generation, the same old thing.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And here’s why: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is angry,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good and angry with all the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So blazingly angry at their arms and armies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he’s going to rid earth of them, wipe them out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The corpses, thrown in a heap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will stink like the town dump in midsummer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their blood flowing off the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like creeks in spring runoff.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stars will fall out of the sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like overripe, rotting fruit in the orchard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the sky itself will be folded up like a blanket
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put away in a closet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All that army of stars, shriveled to nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like leaves and fruit in autumn, dropping and rotting!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Once I’ve finished with earth and sky,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll start in on Edom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll come down hard on Edom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a people I’ve slated for total termination.”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has a sword, thirsty for blood and more blood,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a sword hungry for well-fed flesh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lamb and goat blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the suet-rich kidneys of rams.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has scheduled a sacrifice in Bozrah, the capital,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the whole country of Edom a slaughterhouse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wholesale slaughter, wild animals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and farm animals alike slaughtered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole country soaked with blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the ground greasy with fat.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s scheduled time for vengeance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the year all Zion’s accounts are settled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Edom’s streams will flow sluggish, thick with pollution,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the soil sterile, poisoned with waste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole country
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a smoking, stinking garbage dump—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fires burning day and night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the skies black with endless smoke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Generation after generation of wasteland—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no more travelers through this country!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vultures and skunks will police the streets;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: owls and crows will feel at home there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will reverse creation. Chaos!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will cancel fertility. Emptiness!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leaders will have no one to lead.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’ll name it No Kingdom There,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A country where all kings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and princes are unemployed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thistles will take over, covering the castles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fortresses conquered by weeds and thornbushes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wild dogs will prowl the ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ostriches have the run of the place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wildcats and hyenas will hunt together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: demons and devils dance through the night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The night-demon Lilith, evil and rapacious,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will establish permanent quarters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scavenging carrion birds will breed and brood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: infestations of ominous evil.
