document_id: EZK.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wheels Within Wheels, Like a Gyroscope
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When I was thirty years of age, I was living with the exiles on the Kebar River. On the fifth day of the fourth month, the sky opened up and I saw visions of God.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: 'Their faces looked like this: In front a human face, on the right side the face of a lion, on the left the face of an ox, and in back the face of an eagle. So much for the faces. The wings were spread out with the tips of one pair touching the creature on either side; the other pair of wings covered its body. Each creature went straight ahead. Wherever the spirit went, they went. They didn’t turn as they went.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: The four creatures looked like a blazing fire, or like fiery torches. Tongues of fire shot back and forth between the creatures, and out of the fire, bolts of lightning. The creatures flashed back and forth like strikes of lightning.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: 'As I watched the four creatures, I saw something that looked like a wheel on the ground beside each of the four-faced creatures. This is what the wheels looked like: They were identical wheels, sparkling like diamonds in the sun. It looked like they were wheels within wheels, like a gyroscope.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-21
    - type: text
      text: They went in any one of the four directions they faced, but straight, not veering off. The rims were immense, circled with eyes. When the living creatures went, the wheels went; when the living creatures lifted off, the wheels lifted off. Wherever the spirit went, they went, the wheels sticking right with them, for the spirit of the living creatures was in the wheels. When the creatures went, the wheels went; when the creatures stopped, the wheels stopped; when the creatures lifted off, the wheels lifted off, because the spirit of the living creatures was in the wheels.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: '(It was the fifth day of the month in the fifth year of the exile of King Jehoiachin that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Word came to Ezekiel the priest, the son of Buzi, on the banks of the Kebar River in the country of Babylon. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s hand came upon him that day.)
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-24
    - type: text
      text: Over the heads of the living creatures was something like a dome, shimmering like a sky full of cut glass, vaulted over their heads. Under the dome one set of wings was extended toward the others, with another set of wings covering their bodies. When they moved I heard their wings—it was like the roar of a great waterfall, like the voice of The Strong God, like the noise of a battlefield. When they stopped, they folded their wings.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-28
    - type: text
      text: 'And then, as they stood with folded wings, there was a voice from above the dome over their heads. Above the dome there was something that looked like a throne, sky-blue like a sapphire, with a humanlike figure towering above the throne. From what I could see, from the waist up he looked like burnished bronze and from the waist down like a blazing fire. Brightness everywhere! The way a rainbow springs out of the sky on a rainy day—that’s what it was like. It turned out to be the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: When I saw all this, I fell to my knees, my face to the ground. Then I heard a voice.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-9
    - type: text
      text: 'I looked: I saw an immense dust storm come from the north, an immense cloud with lightning flashing from it, a huge ball of fire glowing like bronze. Within the fire were what looked like four creatures vibrant with life. Each had the form of a human being, but each also had four faces and four wings. Their legs were as sturdy and straight as columns, but their feet were hoofed like those of a calf and sparkled from the fire like burnished bronze. On all four sides under their wings they had human hands. All four had both faces and wings, with the wings touching one another. They turned neither one way nor the other; they went straight forward.'
