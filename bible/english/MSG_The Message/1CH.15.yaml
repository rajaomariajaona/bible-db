document_id: 1CH.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Worships
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'After David built houses for himself in the City of David, he cleared a place for the Chest and pitched a tent for it. Then David gave orders: “No one carries the Chest of God except the Levites; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' designated them and them only to carry the Chest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and be available full time for service in the work of worship.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-10
  - type: text
    text: 'David then called everyone in Israel to assemble in Jerusalem to bring up the Chest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to its specially prepared place. David also called in the family of Aaron and the Levites. From the family of Kohath, Uriel the head with 120 relatives; from the family of Merari, Asaiah the head with 220 relatives; from the family of Gershon, Joel the head with 130 relatives; from the family of Elizaphan, Shemaiah the head with 200 relatives; from the family of Hebron, Eliel the head with 80 relatives; from the family of Uzziel, Amminadab the head with 112 relatives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: 'Then David called in Zadok and Abiathar the priests, and Uriel, Asaiah, Joel, Shemaiah, Eliel, and Amminadab the Levites. He said, “You are responsible for the Levitical families; now consecrate yourselves, both you and your relatives, and bring up the Chest of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel to the place I have set aside for it. The first time we did this, you Levites did not carry it properly, and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' exploded in anger at us because we didn’t make proper preparation and follow instructions.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'So the priests and Levites consecrated themselves to bring up the Chest of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel. The Levites carried the Chest of God exactly as Moses, instructed by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', commanded—carried it with poles on their shoulders, careful not to touch it with their hands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: David ordered the heads of the Levites to assign their relatives to sing in the choir, accompanied by a well-equipped marching band, and fill the air with joyful sound.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: The Levites assigned Heman son of Joel, and from his family, Asaph son of Berekiah, then Ethan son of Kushaiah from the family of Merari, and after them in the second rank their brothers Zechariah, Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, Mikneiah, Obed-Edom, and Jeiel as security guards.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: 'The members of the choir and marching band were: Heman, Asaph, and Ethan with bronze cymbals; Zechariah, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaseiah, and Benaiah with lyres carrying the melody; Mattithiah, Eliphelehu, Mikneiah, Obed-Edom, Jeiel, and Azaziah with harps filling in the harmony; Kenaniah, the Levite in charge of music, a very gifted musician, was music director.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: Berekiah and Elkanah were porters for the Chest. The priests Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer blew the trumpets before the Chest of God. Obed-Edom and Jehiah were also porters for the Chest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-28
  - type: text
    text: 'Now they were ready. David, the elders of Israel, and the commanders of thousands started out to get the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and bring it up from the house of Obed-Edom. And they went rejoicing. Because God helped the Levites, strengthening them as they carried the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', they paused to worship by sacrificing seven bulls and seven rams. They were all dressed in elegant linen—David, the Levites carrying the Chest, the choir and band, and Kenaniah who was directing the music. David also wore a linen prayer shawl (called an ephod). On they came, all Israel on parade bringing up the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', shouting and cheering, playing every kind of brass and percussion and string instrument.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'When the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' entered the City of David, Michal, Saul’s daughter, was watching from a window. When she saw King David dancing ecstatically she was filled with contempt.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
