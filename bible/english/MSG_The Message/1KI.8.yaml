document_id: 1KI.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Bringing all this to a climax, King Solomon called in the leaders of Israel, all the heads of the tribes and the family patriarchs, to bring up the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' from Zion, the City of David. And they came, all Israel before King Solomon in the month of Ethanim, the seventh month, for the great autumn festival.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: 'With all Israel’s leaders present, the priests took up the Chest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and carried up the Chest and the Tent of Meeting and all the holy vessels that went with the Tent. King Solomon and the entire congregation of Israel were there at the Chest worshiping and sacrificing huge numbers of sheep and cattle—so many that no one could keep track.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: 'Then the priests brought the Chest of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to its place in the Inner Sanctuary, the Holy of Holies, under the wings of the cherubim. The outspread wings of the cherubim stretched over the Chest and its poles. The poles were so long that their ends could be seen from the entrance to the Inner Sanctuary, but were not noticeable farther out. They’re still there today. There was nothing in the Chest but the two stone tablets that Moses had placed in it at Horeb where '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made a covenant with Israel after bringing them up from Egypt.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Temple Finished, Dedicated, Filled
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'When the priests left the Holy Place, a cloud filled The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. The priests couldn’t carry out their priestly duties because of the cloud—the glory of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' filled The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'Then Solomon spoke:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has told us that he lives in the dark'
- type: usfm
  marker: q2
  children:
  - type: text
    text: where no one can see him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve built this splendid Temple, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to mark your invisible presence forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The king then turned to face the congregation and blessed them:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: '“Blessed be '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, who spoke personally to my father David. Now he has kept the promise he made when he said, ‘From the day I brought my people Israel from Egypt, I haven’t set apart one city among the tribes of Israel to build a Temple to fix my Name there. But I did choose David to rule my people Israel.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: '“My father David had it in his heart to build a Temple honoring the Name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel. But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told him ‘It was good that you wanted to build a Temple in my honor—most commendable! But you are not the one to do it—your son will build it to honor my Name.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done what he said he would do: I have succeeded David my father and ruled over Israel just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promised; and now I’ve built a Temple to honor '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, and I’ve secured a place for the Chest that holds the covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the covenant that he made with our ancestors when he brought them up from the land of Egypt.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-25
  - type: text
    text: Before the entire congregation of Israel, Solomon took a position before the Altar, spread his hands out before heaven, and prayed,
- type: usfm
  marker: pmo
  children:
  - type: text
    text: 'O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God of Israel, there is no God like you in the skies above or on the earth below who unswervingly keeps covenant with his servants and relentlessly loves them as they sincerely live in obedience to your way. You kept your word to David my father, your personal word. You did exactly what you promised—every detail. The proof is before us today!'
- type: usfm
  marker: pm
  children:
  - type: text
    text: 'Keep it up, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', O God of Israel! Continue to keep the promises you made to David my father when you said, “You’ll always have a descendant to represent my rule on Israel’s throne, on the condition that your sons are as careful to live obediently in my presence as you have.”'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: O God of Israel, let this all happen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: confirm and establish it!
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-32
  - type: text
    text: 'Can it be that God will actually move into our neighborhood? Why, the cosmos itself isn’t large enough to give you breathing room, let alone this Temple I’ve built. Even so, I’m bold to ask: Pay attention to these my prayers, both intercessory and personal, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God. Listen to my prayers, energetic and devout, that I’m setting before you right now. Keep your eyes open to this Temple night and day, this place of which you said, “My Name will be honored there,” and listen to the prayers that I pray at this place.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when you hear, forgive.
- type: usfm
  marker: pmo
  children:
  - type: text
    text: 'When someone hurts a neighbor and promises to make things right, and then comes and repeats the promise before your Altar in this Temple, listen from heaven and act accordingly: Judge your servants, making the offender pay for his offense and setting the offended free of any charges.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: When your people Israel are beaten by an enemy because they’ve sinned against you, but then turn to you and acknowledge your rule in prayers desperate and devout in this Temple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: forgive the sin of your people Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: return them to the land you gave their ancestors.
- type: usfm
  marker: pmo
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: text
    text: When the skies shrivel up and there is no rain because your people have sinned against you, but then they pray at this place, acknowledging your rule and quitting their sins because you have scourged them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: forgive the sins of your servants, your people Israel.
- type: usfm
  marker: pmo
  children:
  - type: text
    text: 'Then start over with them: Train them to live right and well; send rain on the land you gave your people as an inheritance.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-40
  - type: text
    text: When disasters strike, famine or catastrophe, crop failure or disease, locust or beetle, or when an enemy attacks their defenses—calamity of any sort—any prayer that’s prayed from anyone at all among your people Israel, hearts penetrated by the disaster, hands and arms thrown out to this Temple for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven.
- type: usfm
  marker: pmo
  children:
  - type: text
    text: Forgive and go to work on us. Give what each deserves, for you know each life from the inside (you’re the only one with such “inside knowledge”!) so that they’ll live before you in lifelong reverent and believing obedience on this land you gave our ancestors.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-43
  - type: text
    text: 'And don’t forget the foreigner who is not a member of your people Israel but has come from a far country because of your reputation. People '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' going to be attracted here by your great reputation, your wonder-working power, who come to pray at this Temple.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven.
- type: usfm
  marker: pmo
  children:
  - type: text
    text: Honor the prayers of the foreigner so that people all over the world will know who you are and what you’re like and will live in reverent obedience before you, just as your own people Israel do; so they’ll know that you personally make this Temple that I’ve built what it is.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 44-51
  - type: text
    text: 'When your people go to war against their enemies at the time and place you send them and they pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' toward the city you chose and this Temple I’ve built to honor your Name,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from heaven to what they pray and ask for,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do what’s right for them.
- type: usfm
  marker: pmo
  children:
  - type: text
    text: When they sin against you—and they certainly will; there’s no one without sin!—and in anger you turn them over to the enemy and they are taken captive to the enemy’s land, whether far or near, but repent in the country of their captivity and pray with changed hearts in their exile, “We’ve sinned; we’ve done wrong; we’ve been most wicked,” and turn back to you heart and soul in the land of the enemy who conquered them, and pray to you toward their homeland, the land you gave their ancestors, toward the city you chose, and this Temple I have built to the honor of your Name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen from your home in heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: to their prayers desperate and devout
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do what is best for them.
- type: usfm
  marker: pmo
  children:
  - type: text
    text: Forgive your people who have sinned against you; forgive their gross rebellions and move their captors to treat them with compassion. They are, after all, your people and your precious inheritance whom you rescued from the heart of that iron-smelting furnace, Egypt!
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 52-53
  - type: text
    text: 'O be alert and attentive to the needy prayers of me, your servant, and your dear people Israel; listen every time they cry out to you! You handpicked them from all the peoples on earth to be your very own people, as you announced through your servant Moses when you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', in your masterful rule, delivered our ancestors from Egypt.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 54-55
  - type: text
    text: 'Having finished praying to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—all these bold and passionate prayers—Solomon stood up before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Altar where he had been kneeling all this time, his arms stretched upward to heaven. Standing, he blessed the whole congregation of Israel, blessing them at the top of his lungs:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 56-58
  - type: text
    text: '“Blessed be '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', who has given peace to his people Israel just as he said he’d do. Not one of all those good and wonderful words that he spoke through Moses has misfired. May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our very own God, continue to be with us just as he was with our ancestors—may he never give up and walk out on us. May he keep us centered and devoted to him, following the life path he has cleared, watching the signposts, walking at the pace and rhythms he laid down for our ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 59-61
  - type: text
    text: '“And let these words that I’ve prayed in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' be always right there before him, day and night, so that he’ll do what is right for me, to guarantee justice for his people Israel day after day after day. Then all the people on earth will know '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is the true God; there is no other God. And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ', your lives must be totally obedient to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our personal God, following the life path he has cleared, alert and attentive to everything he has made plain this day.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 62-63
  - type: text
    text: 'The king and all Israel with him then worshiped, offering sacrifices to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. Solomon offered Peace-Offerings, sacrificing to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' 22,000 cattle and 120,000 sheep. This is how the king and all Israel dedicated The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'That same day, the king set apart the central area of the Courtyard in front of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Temple for sacred use and there sacrificed the Whole-Burnt-Offerings, Grain-Offerings, and fat from the Peace-Offerings—the bronze Altar was too small to handle all these offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 65-66
  - type: text
    text: 'This is how Solomon kept the great autumn feast, and all Israel with him, people there all the way from the far northeast (the Entrance to Hamath) to the far southwest (the Brook of Egypt)—a huge congregation. They started out celebrating for seven days—and then did it another seven days! Two solid weeks of celebration! Then he dismissed them. They blessed the king and went home, exuberant with heartfelt gratitude for all the good '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had done for his servant David and for his people Israel.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
