document_id: PSA.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Please, pay attention!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you make sense of these ramblings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my groans and cries?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: King-God, I need your help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll hear me at it again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I lay out the pieces of my life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on your altar
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and watch for fire to descend.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you’ll welcome us with open arms
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when we run for cover to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the party last all night!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stand guard over our celebration.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You are famous, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', for welcoming God-seekers,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for decking us out in delight.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You don’t socialize with Wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or invite Evil over as your houseguest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hot-Air-Boaster collapses in front of you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you shake your head over Mischief-Maker.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' destroys Lie-Speaker;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Blood-Thirsty and Truth-Bender disgust you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And here I am, your invited guest—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s incredible!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I enter your house; here I am,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prostrate in your inner sanctum,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Waiting for directions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to get me safely through enemy lines.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every word they speak is a land mine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their lungs breathe out poison gas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their throats are gaping graves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their tongues slick as mudslides.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pile on the guilt, God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let their so-called wisdom wreck them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kick them out! They’ve had their chance.
