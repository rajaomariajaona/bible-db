document_id: PSA.5,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Listen, '
  - type: text
    content: God
  - type: text
    content: '! Please, pay attention!'
  - type: text
    content: Can you make sense of these ramblings,
  - type: text
    content: my groans and cries?
  - type: text
    content: King-God, I need your help.
  - type: text
    content: Every morning
  - type: text
    content: you’ll hear me at it again.
  - type: text
    content: Every morning
  - type: text
    content: I lay out the pieces of my life
  - type: text
    content: on your altar
  - type: text
    content: and watch for fire to descend.
  '11':
  - type: text
    content: But you’ll welcome us with open arms
  - type: text
    content: when we run for cover to you.
  - type: text
    content: Let the party last all night!
  - type: text
    content: Stand guard over our celebration.
  - type: text
    content: 'You are famous, '
  - type: text
    content: God
  - type: text
    content: ', for welcoming God-seekers,'
  - type: text
    content: for decking us out in delight.
  '4':
  - type: text
    content: You don’t socialize with Wicked,
  - type: text
    content: or invite Evil over as your houseguest.
  - type: text
    content: Hot-Air-Boaster collapses in front of you;
  - type: text
    content: you shake your head over Mischief-Maker.
  - type: text
    content: God
  - type: text
    content: ' destroys Lie-Speaker;'
  - type: text
    content: Blood-Thirsty and Truth-Bender disgust you.
  '7':
  - type: text
    content: And here I am, your invited guest—
  - type: text
    content: it’s incredible!
  - type: text
    content: I enter your house; here I am,
  - type: text
    content: prostrate in your inner sanctum,
  - type: text
    content: Waiting for directions
  - type: text
    content: to get me safely through enemy lines.
  '9':
  - type: text
    content: Every word they speak is a land mine;
  - type: text
    content: their lungs breathe out poison gas.
  - type: text
    content: Their throats are gaping graves,
  - type: text
    content: their tongues slick as mudslides.
  - type: text
    content: Pile on the guilt, God!
  - type: text
    content: Let their so-called wisdom wreck them.
  - type: text
    content: Kick them out! They’ve had their chance.
