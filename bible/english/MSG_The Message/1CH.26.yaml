document_id: 1CH.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Security Guards
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-11
  - type: text
    text: 'The teams of security guards were from the family of Korah: Meshelemiah son of Kore (one of the sons of Asaph). Meshelemiah’s sons were Zechariah, the firstborn, followed by Jediael, Zebadiah, Jathniel, Elam, Jehohanan, and Eliehoenai—seven sons. Obed-Edom’s sons were Shemaiah, the firstborn, followed by Jehozabad, Joah, Sacar, Nethanel, Ammiel, Issachar, and Peullethai—God blessed him with eight sons. His son Shemaiah had sons who provided outstanding leadership in the family: Othni, Rephael, Obed, and Elzabad; his relatives Elihu and Semakiah were also exceptional. These all came from the line of Obed-Edom—all of them outstanding and strong. There were sixty-two of them. Meshelemiah had eighteen sons and relatives who were outstanding. The sons of Hosah the Merarite were Shimri (he was not the firstborn but his father made him first), then Hilkiah, followed by Tabaliah and Zechariah. Hosah accounted for thirteen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-16a
  - type: text
    text: ' These teams of security guards, supervised by their leaders, kept order in The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', keeping up the traditions of their ancestors. They were all assigned to their posts by the same method regardless of the prominence of their families—each picked his gate assignment from a hat. Shelemiah was assigned to the East Gate; his son Zechariah, a shrewd counselor, got the North Gate. Obed-Edom got the South Gate; and his sons pulled duty at the storehouse. Shuppim and Hosah were posted to the West Gate and the Shalleketh Gate on the high road.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16b-18
  - type: text
    text: ' The guards stood shoulder to shoulder: six Levites per day on the east, four per day on the north and on the south, and two at a time at the storehouse. At the open court to the west, four guards were posted on the road and two at the court.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: These are the teams of security guards from the sons of Korah and Merari.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Financial Affairs: Accountants and Bookkeepers'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'Other Levites were put in charge of the financial affairs of The Temple of God. From the family of Ladan (all Gershonites) came Jehieli, and the sons of Jehieli, Zetham and his brother Joel. They supervised the finances of the sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-28
  - type: text
    text: 'From the Amramites, the Izharites, the Hebronites, and the Uzzielites: Shubael, descended from Gershom the son of Moses, was the chief financial officer. His relatives through Eliezer: his son Rehabiah, his son Jeshaiah, his son Joram, his son Zicri, and his son Shelomith. Shelomith and his relatives were in charge of valuables consecrated by David the king, family heads, and various generals and commanders from the army. They dedicated the plunder that they had gotten in war to the work of the worship of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . In addition, everything that had been dedicated by Samuel the seer, Saul son of Kish, Abner son of Ner, and Joab son of Zeruiah—anything that had been dedicated, ever, was the responsibility of Shelomith and his family.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'From the family of the Izharites, Kenaniah and sons were appointed as officials and judges responsible for affairs outside the work of worship and sanctuary. From the family of the Hebronites, Hashabiah and his relatives—1,700 well-qualified men—were responsible for administration of matters related to the worship of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and the king’s work in the territory west of the Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: 'According to the family tree of the Hebronites, Jeriah held pride of place. In the fortieth year of David’s reign (his last), the Hebron family tree was researched and outstanding men were found at Jazer in Gilead, namely, Jeriah and 2,700 men of his extended family: David the king made them responsible for administration of matters related to the worship of God and the work of the king in the territory east of the Jordan—the Reubenites, the Gadites, and the half-tribe of Manasseh.'
