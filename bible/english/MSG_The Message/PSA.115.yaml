document_id: PSA.115,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Not for our sake, '
  - type: text
    content: God
  - type: text
    content: ', no, not for our sake,'
  - type: text
    content: but for your name’s sake, show your glory.
  - type: text
    content: Do it on account of your merciful love,
  - type: text
    content: do it on account of your faithful ways.
  - type: text
    content: Do it so none of the nations can say,
  - type: text
    content: “Where now, oh where is their God?”
  '12':
  - type: text
    content: 'O '
  - type: text
    content: God
  - type: text
    content: ', remember us and bless us,'
  - type: text
    content: bless the families of Israel and Aaron.
  - type: text
    content: 'And let '
  - type: text
    content: God
  - type: text
    content: ' bless all who fear '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: bless the small, bless the great.
  - type: text
    content: 'Oh, let '
  - type: text
    content: God
  - type: text
    content: ' enlarge your families—'
  - type: text
    content: giving growth to you, growth to your children.
  - type: text
    content: 'May you be blessed by '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'by '
  - type: text
    content: God
  - type: text
    content: ', who made heaven and earth.'
  - type: text
    content: 'The heaven of heavens is for '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: but he put us in charge of the earth.
  '17':
  - type: text
    content: 'Dead people can’t praise '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: not a word to be heard from those buried in the ground.
  - type: text
    content: 'But we bless '
  - type: text
    content: God
  - type: text
    content: ', oh yes—'
  - type: text
    content: we bless him now, we bless him always!
  - type: text
    content: Hallelujah!
  '3':
  - type: text
    content: Our God is in heaven
  - type: text
    content: doing whatever he wants to do.
  - type: text
    content: Their gods are metal and wood,
  - type: text
    content: 'handmade in a basement shop:'
  - type: text
    content: Carved mouths that can’t talk,
  - type: text
    content: painted eyes that can’t see,
  - type: text
    content: Tin ears that can’t hear,
  - type: text
    content: molded noses that can’t smell,
  - type: text
    content: Hands that can’t grasp, feet that can’t walk or run,
  - type: text
    content: throats that never utter a sound.
  - type: text
    content: Those who make them have become just like them,
  - type: text
    content: have become just like the gods they trust.
  '9':
  - type: text
    content: 'But you, Israel: put your trust in '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: —trust your Helper! trust your Ruler!
  - type: text
    content: 'Clan of Aaron, trust in '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: —trust your Helper! trust your Ruler!
  - type: text
    content: 'You who fear '
  - type: text
    content: God
  - type: text
    content: ', trust in '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: —trust your Helper! trust your Ruler!
