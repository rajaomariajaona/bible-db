document_id: PSA.115,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Not for our sake, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', no, not for our sake,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but for your name’s sake, show your glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do it on account of your merciful love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do it on account of your faithful ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do it so none of the nations can say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where now, oh where is their God?”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', remember us and bless us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bless the families of Israel and Aaron.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' bless all who fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bless the small, bless the great.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh, let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' enlarge your families—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: giving growth to you, growth to your children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May you be blessed by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', who made heaven and earth.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The heaven of heavens is for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he put us in charge of the earth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dead people can’t praise '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a word to be heard from those buried in the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But we bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', oh yes—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we bless him now, we bless him always!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our God is in heaven
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doing whatever he wants to do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their gods are metal and wood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'handmade in a basement shop:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Carved mouths that can’t talk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: painted eyes that can’t see,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tin ears that can’t hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: molded noses that can’t smell,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hands that can’t grasp, feet that can’t walk or run,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throats that never utter a sound.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who make them have become just like them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have become just like the gods they trust.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you, Israel: put your trust in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —trust your Helper! trust your Ruler!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Clan of Aaron, trust in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —trust your Helper! trust your Ruler!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You who fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', trust in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —trust your Helper! trust your Ruler!
