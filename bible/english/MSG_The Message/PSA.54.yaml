  - type: text
    text: God, for your sake, help me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Use your influence to clear me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen, God—I’m desperate.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t be too busy to hear me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Outlaws are out to get me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hit men are trying to kill me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing will stop them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God means nothing to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Oh, look! God’s right here helping!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s on my side,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Evil is looping back on my enemies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let up! Finish them off!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: I’m ready now to worship, so ready.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I thank you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —you’re so good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You got me out of every scrape,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I saw my enemies get it.
