document_id: PSA.21
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: 'Your strength, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', is the king’s strength.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Helped, he’s hollering Hosannas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You gave him exactly what he wanted;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you didn’t hold back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You filled his arms with gifts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you gave him a right royal welcome.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He wanted a good life; you gave it to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and then made it a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: long
  - type: text
    text: ' life as a bonus.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You lifted him high and bright as a cumulus cloud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then dressed him in rainbow colors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You pile blessings on him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you make him glad when you smile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Is it any wonder the king loves '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that he’s sticking with the Best?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: With a fistful of enemies in one hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a fistful of haters in the other,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You radiate with such brilliance
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they cringe as before a furnace.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now the furnace swallows them whole,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fire eats them alive!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You purge the earth of their progeny,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you wipe the slate clean.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All their evil schemes, the plots they cook up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: have fizzled—every one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You sent them packing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they couldn’t face you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Show your strength, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', so no one can miss it.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: We are out singing the good news!
