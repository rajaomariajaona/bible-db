document_id: PSA.21,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Your strength, '
  - type: text
    content: God
  - type: text
    content: ', is the king’s strength.'
  - type: text
    content: Helped, he’s hollering Hosannas.
  - type: text
    content: You gave him exactly what he wanted;
  - type: text
    content: you didn’t hold back.
  - type: text
    content: You filled his arms with gifts;
  - type: text
    content: you gave him a right royal welcome.
  - type: text
    content: He wanted a good life; you gave it to him,
  - type: text
    content: 'and then made it a '
  - type: text
    content: long
  - type: text
    content: ' life as a bonus.'
  - type: text
    content: You lifted him high and bright as a cumulus cloud,
  - type: text
    content: then dressed him in rainbow colors.
  - type: text
    content: You pile blessings on him;
  - type: text
    content: you make him glad when you smile.
  - type: text
    content: 'Is it any wonder the king loves '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: that he’s sticking with the Best?
  '13':
  - type: text
    content: 'Show your strength, '
  - type: text
    content: God
  - type: text
    content: ', so no one can miss it.'
  - type: text
    content: We are out singing the good news!
  '8':
  - type: text
    content: With a fistful of enemies in one hand
  - type: text
    content: and a fistful of haters in the other,
  - type: text
    content: You radiate with such brilliance
  - type: text
    content: that they cringe as before a furnace.
  - type: text
    content: Now the furnace swallows them whole,
  - type: text
    content: the fire eats them alive!
  - type: text
    content: You purge the earth of their progeny,
  - type: text
    content: you wipe the slate clean.
  - type: text
    content: All their evil schemes, the plots they cook up,
  - type: text
    content: have fizzled—every one.
  - type: text
    content: You sent them packing;
  - type: text
    content: they couldn’t face you.
