document_id: GEN.49,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob called his sons and said, “Gather around. I want to tell you what you can expect in the days to come.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zebulun settles down on the seashore;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s a safe harbor for ships,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: right alongside Sidon.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Issachar is one tough donkey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: crouching between the corrals;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he saw how good the place was,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how pleasant the country,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave up his freedom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and went to work as a slave.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan will handle matters of justice for his people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will hold his own just fine among the tribes of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan is only a small snake in the grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a lethal serpent in ambush by the road
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he strikes a horse in the heel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings its huge rider crashing down.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wait in hope
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for your salvation, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gad will be attacked by bandits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he will trip them up.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come together, listen sons of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to Israel your father.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asher will become famous for rich foods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: candies and sweets fit for kings.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Naphtali is a deer running free
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that gives birth to lovely fawns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joseph is a wild donkey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wild donkey by a spring,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spirited donkeys on a hill.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The archers with malice attacked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shooting their hate-tipped arrows;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he held steady under fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his bow firm, his arms limber,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the backing of the Champion of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Shepherd, the Rock of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God of your father—may he help you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And may The Strong God—may he give you his blessings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessings tumbling out of the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessings bursting up from the Earth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessings of breasts and womb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the blessings of your father
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exceed the blessings of the ancient mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surpass the delights of the eternal hills;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they rest on the head of Joseph,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the brow of the one consecrated among his brothers.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Benjamin is a ravenous wolf;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all morning he gorges on his kill,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at evening divides up what’s left over.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All these are the tribes of Israel, the twelve tribes. And this is what their father said to them as he blessed them, blessing each one with his own special farewell blessing.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he instructed them: “I am about to be gathered to my people. Bury me with my fathers in the cave which is in the field of Ephron the Hittite, the cave in the field of Machpelah facing Mamre in the land of Canaan, the field Abraham bought from Ephron the Hittite for a burial plot. Abraham and his wife Sarah were buried there; Isaac and his wife Rebekah were buried there; I also buried Leah there. The field and the cave were bought from the Hittites.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reuben, you’re my firstborn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my strength, first proof of my manhood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the top in honor and at the top in power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But like a bucket of water spilled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll be at the top no more,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you climbed into your father’s marriage bed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mounting that couch, and you defiled it.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob finished instructing his sons, pulled his feet into bed, breathed his last, and was gathered to his people.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Simeon and Levi are two of a kind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ready to fight at the drop of a hat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I don’t want anything to do with their vendettas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: want no part in their bitter feuds;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They kill men in fits of temper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slash oxen on a whim.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A curse on their uncontrolled anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on their indiscriminate wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll throw them out with the trash;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll shred and scatter them like confetti throughout Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You, Judah, your brothers will praise you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your fingers on your enemies’ throat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while your brothers honor you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re a lion’s cub, Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: home fresh from the kill, my son.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at him, crouched like a lion, king of beasts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who dares mess with him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The scepter shall not leave Judah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’ll keep a firm grip on the command staff
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until the ultimate ruler comes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the nations obey him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll tie up his donkey to the grapevine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his purebred prize to a sturdy branch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will wash his shirt in wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his cloak in the blood of grapes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His eyes will be darker than wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his teeth whiter than milk.
