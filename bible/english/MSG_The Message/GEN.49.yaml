document_id: GEN.49,97
type_code: eng
verses:
  '1':
  - type: text
    content: Jacob called his sons and said, “Gather around. I want to tell you what you can expect in the days to come.”
  '13':
  - type: text
    content: Zebulun settles down on the seashore;
  - type: text
    content: he’s a safe harbor for ships,
  - type: text
    content: right alongside Sidon.
  '14':
  - type: text
    content: Issachar is one tough donkey
  - type: text
    content: crouching between the corrals;
  - type: text
    content: When he saw how good the place was,
  - type: text
    content: how pleasant the country,
  - type: text
    content: He gave up his freedom
  - type: text
    content: and went to work as a slave.
  '16':
  - type: text
    content: Dan will handle matters of justice for his people;
  - type: text
    content: he will hold his own just fine among the tribes of Israel.
  - type: text
    content: Dan is only a small snake in the grass,
  - type: text
    content: a lethal serpent in ambush by the road
  - type: text
    content: When he strikes a horse in the heel,
  - type: text
    content: and brings its huge rider crashing down.
  '18':
  - type: text
    content: I wait in hope
  - type: text
    content: 'for your salvation, '
  - type: text
    content: God
  - type: text
    content: .
  '19':
  - type: text
    content: Gad will be attacked by bandits,
  - type: text
    content: but he will trip them up.
  '2':
  - type: text
    content: Come together, listen sons of Jacob,
  - type: text
    content: listen to Israel your father.
  '20':
  - type: text
    content: Asher will become famous for rich foods,
  - type: text
    content: candies and sweets fit for kings.
  '21':
  - type: text
    content: Naphtali is a deer running free
  - type: text
    content: that gives birth to lovely fawns.
  - type: text
    content: Joseph is a wild donkey,
  - type: text
    content: a wild donkey by a spring,
  - type: text
    content: spirited donkeys on a hill.
  - type: text
    content: The archers with malice attacked,
  - type: text
    content: shooting their hate-tipped arrows;
  - type: text
    content: But he held steady under fire,
  - type: text
    content: his bow firm, his arms limber,
  - type: text
    content: With the backing of the Champion of Jacob,
  - type: text
    content: the Shepherd, the Rock of Israel.
  - type: text
    content: The God of your father—may he help you!
  - type: text
    content: And may The Strong God—may he give you his blessings,
  - type: text
    content: Blessings tumbling out of the skies,
  - type: text
    content: blessings bursting up from the Earth—
  - type: text
    content: blessings of breasts and womb.
  - type: text
    content: May the blessings of your father
  - type: text
    content: exceed the blessings of the ancient mountains,
  - type: text
    content: surpass the delights of the eternal hills;
  - type: text
    content: May they rest on the head of Joseph,
  - type: text
    content: on the brow of the one consecrated among his brothers.
  '27':
  - type: text
    content: Benjamin is a ravenous wolf;
  - type: text
    content: all morning he gorges on his kill,
  - type: text
    content: at evening divides up what’s left over.
  '28':
  - type: text
    content: All these are the tribes of Israel, the twelve tribes. And this is what their father said to them as he blessed them, blessing each one with his own special farewell blessing.
  - type: text
    content: '* * *'
  '29':
  - type: text
    content: 'Then he instructed them: “I am about to be gathered to my people. Bury me with my fathers in the cave which is in the field of Ephron the Hittite, the cave in the field of Machpelah facing Mamre in the land of Canaan, the field Abraham bought from Ephron the Hittite for a burial plot. Abraham and his wife Sarah were buried there; Isaac and his wife Rebekah were buried there; I also buried Leah there. The field and the cave were bought from the Hittites.”'
  '3':
  - type: text
    content: Reuben, you’re my firstborn,
  - type: text
    content: my strength, first proof of my manhood,
  - type: text
    content: at the top in honor and at the top in power,
  - type: text
    content: But like a bucket of water spilled,
  - type: text
    content: you’ll be at the top no more,
  - type: text
    content: Because you climbed into your father’s marriage bed,
  - type: text
    content: mounting that couch, and you defiled it.
  '33':
  - type: text
    content: Jacob finished instructing his sons, pulled his feet into bed, breathed his last, and was gathered to his people.
  '5':
  - type: text
    content: Simeon and Levi are two of a kind,
  - type: text
    content: ready to fight at the drop of a hat.
  - type: text
    content: I don’t want anything to do with their vendettas,
  - type: text
    content: want no part in their bitter feuds;
  - type: text
    content: They kill men in fits of temper,
  - type: text
    content: slash oxen on a whim.
  '7':
  - type: text
    content: A curse on their uncontrolled anger,
  - type: text
    content: on their indiscriminate wrath.
  - type: text
    content: I’ll throw them out with the trash;
  - type: text
    content: I’ll shred and scatter them like confetti throughout Israel.
  '8':
  - type: text
    content: 'You, Judah, your brothers will praise you:'
  - type: text
    content: Your fingers on your enemies’ throat,
  - type: text
    content: while your brothers honor you.
  - type: text
    content: You’re a lion’s cub, Judah,
  - type: text
    content: home fresh from the kill, my son.
  - type: text
    content: Look at him, crouched like a lion, king of beasts;
  - type: text
    content: who dares mess with him?
  - type: text
    content: The scepter shall not leave Judah;
  - type: text
    content: he’ll keep a firm grip on the command staff
  - type: text
    content: Until the ultimate ruler comes
  - type: text
    content: and the nations obey him.
  - type: text
    content: He’ll tie up his donkey to the grapevine,
  - type: text
    content: his purebred prize to a sturdy branch.
  - type: text
    content: He will wash his shirt in wine
  - type: text
    content: and his cloak in the blood of grapes,
  - type: text
    content: His eyes will be darker than wine,
  - type: text
    content: his teeth whiter than milk.
