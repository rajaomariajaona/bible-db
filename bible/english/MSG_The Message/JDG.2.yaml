document_id: JDG.2,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s angel went up from Gilgal to Bokim and said, “I brought you out of Egypt; I led you to the land that I promised to your fathers; and I said, I’ll never break my covenant with you—never! And you’re never to make a covenant with the people who live in this land. Tear down their altars! But you haven’t obeyed me! What’s this that you’re doing?
  '10':
  - type: text
    content: 'Eventually that entire generation died and was buried. Then another generation grew up that didn’t know anything of '
  - type: text
    content: God
  - type: text
    content: ' or the work he had done for Israel.'
  - type: text
    content: '* * *'
  '11':
  - type: text
    content: 'The People of Israel did evil in '
  - type: text
    content: God
  - type: text
    content: '’s sight: they served Baal-gods; they deserted '
  - type: text
    content: God
  - type: text
    content: ', the God of their parents who had led them out of Egypt; they took up with other gods, gods of the peoples around them. They actually worshiped them! And oh, how they angered '
  - type: text
    content: God
  - type: text
    content: ' as they worshiped god Baal and goddess Astarte! '
  - type: text
    content: God
  - type: text
    content: '’s anger was hot against Israel: He handed them off to plunderers who stripped them; he sold them cheap to enemies on all sides. They were helpless before their enemies. Every time they walked out the door '
  - type: text
    content: God
  - type: text
    content: ' was with them—but for evil, just as '
  - type: text
    content: God
  - type: text
    content: ' had said, just as he had sworn he would do. They were in a bad way.'
  '16':
  - type: text
    content: 'But then '
  - type: text
    content: God
  - type: text
    content: ' raised up judges who saved them from their plunderers. But they wouldn’t listen to their judges; they prostituted themselves to other gods—worshiped them! They lost no time leaving the road walked by their parents, the road of obedience to '
  - type: text
    content: God
  - type: text
    content: ’s commands. They refused to have anything to do with it.
  '18':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' was setting up judges for them, he would be right there with the judge: He would save them from their enemies’ oppression as long as the judge was alive, for '
  - type: text
    content: God
  - type: text
    content: ' was moved to compassion when he heard their groaning because of those who afflicted and beat them. But when the judge died, the people went right back to their old ways—but even worse than their parents!—running after other gods, serving and worshiping them. Stubborn as mules, they didn’t drop a single evil practice.'
  '20':
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: '’s anger blazed against Israel. He said, “Because these people have thrown out my covenant that I commanded their parents and haven’t listened to me, I’m not driving out one more person from the nations that Joshua left behind when he died. I’ll use them to test Israel and see whether they stay on '
  - type: text
    content: God
  - type: text
    content: ’s road and walk down it as their parents did.”
  '23':
  - type: text
    content: 'That’s why '
  - type: text
    content: God
  - type: text
    content: ' let those nations remain. He didn’t drive them out or let Joshua get rid of them.'
  '3':
  - type: text
    content: “So now I’m telling you that I won’t drive them out before you. They’ll trip you up and their gods will become a trap.”
  '4':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: '’s angel had spoken these words to all the People of Israel, they cried out—oh! how they wept! They named the place Bokim (Weepers). And there they sacrificed to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: 'After Joshua had dismissed them, the People of Israel went off to claim their allotted territories and take possession of the land. The people worshiped '
  - type: text
    content: God
  - type: text
    content: ' throughout the lifetime of Joshua and the time of the leaders who survived him, leaders who had been in on all of '
  - type: text
    content: God
  - type: text
    content: '’s great work that he had done for Israel. Then Joshua son of Nun, the servant of '
  - type: text
    content: God
  - type: text
    content: ', died. He was 110 years old. They buried him in his allotted inheritance at Timnath Heres in the hills of Ephraim north of Mount Gaash.'
