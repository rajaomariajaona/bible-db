document_id: JDG.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel went up from Gilgal to Bokim and said, “I brought you out of Egypt; I led you to the land that I promised to your fathers; and I said, I’ll never break my covenant with you—never! And you’re never to make a covenant with the people who live in this land. Tear down their altars! But you haven’t obeyed me! What’s this that you’re doing?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “So now I’m telling you that I won’t drive them out before you. They’ll trip you up and their gods will become a trap.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s angel had spoken these words to all the People of Israel, they cried out—oh! how they wept! They named the place Bokim (Weepers). And there they sacrificed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: 'After Joshua had dismissed them, the People of Israel went off to claim their allotted territories and take possession of the land. The people worshiped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' throughout the lifetime of Joshua and the time of the leaders who survived him, leaders who had been in on all of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s great work that he had done for Israel. Then Joshua son of Nun, the servant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', died. He was 110 years old. They buried him in his allotted inheritance at Timnath Heres in the hills of Ephraim north of Mount Gaash.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eventually that entire generation died and was buried. Then another generation grew up that didn’t know anything of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' or the work he had done for Israel.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: 'The People of Israel did evil in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s sight: they served Baal-gods; they deserted '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of their parents who had led them out of Egypt; they took up with other gods, gods of the peoples around them. They actually worshiped them! And oh, how they angered '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' as they worshiped god Baal and goddess Astarte! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s anger was hot against Israel: He handed them off to plunderers who stripped them; he sold them cheap to enemies on all sides. They were helpless before their enemies. Every time they walked out the door '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was with them—but for evil, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had said, just as he had sworn he would do. They were in a bad way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'But then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' raised up judges who saved them from their plunderers. But they wouldn’t listen to their judges; they prostituted themselves to other gods—worshiped them! They lost no time leaving the road walked by their parents, the road of obedience to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s commands. They refused to have anything to do with it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was setting up judges for them, he would be right there with the judge: He would save them from their enemies’ oppression as long as the judge was alive, for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was moved to compassion when he heard their groaning because of those who afflicted and beat them. But when the judge died, the people went right back to their old ways—but even worse than their parents!—running after other gods, serving and worshiping them. Stubborn as mules, they didn’t drop a single evil practice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s anger blazed against Israel. He said, “Because these people have thrown out my covenant that I commanded their parents and haven’t listened to me, I’m not driving out one more person from the nations that Joshua left behind when he died. I’ll use them to test Israel and see whether they stay on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s road and walk down it as their parents did.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'That’s why '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' let those nations remain. He didn’t drive them out or let Joshua get rid of them.'
