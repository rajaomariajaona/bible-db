document_id: ISA.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Country of Cowards
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A Message concerning the Valley of Vision:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What’s going on here anyway?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All this partying and noisemaking,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shouting and cheering in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the city noisy with celebrations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have no brave soldiers to honor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no combat heroes to be proud of.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your leaders were all cowards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: captured without even lifting a sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A country of cowards
  - type: usfm
    marker: q2
    children:
    - type: text
      text: captured escaping the battle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You Looked, but You Never Looked to Him
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: called out on that Day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Called for a day of repentant tears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: called you to dress in somber clothes of mourning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But what do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' do? You throw a party!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Eating and drinking and dancing in the streets!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You barbecue bulls and sheep, and throw a huge feast—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slabs of meat, kegs of beer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Seize the day! Eat and drink!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tomorrow we die!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies whispered to me his verdict on this frivolity: “You’ll pay for this outrage until the day you die.” The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies, says so.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Key of the Davidic Heritage
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, spoke: “Come. Go to this steward, Shebna, who is in charge of all the king’s affairs, and tell him: What’s going on here? You’re an outsider here and yet you act like you own the place, make a big, fancy tomb for yourself where everyone can see it, making sure everyone will think you’re important. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is about to sack you, to throw you to the dogs. He’ll grab you by the hair, swing you round and round dizzyingly, and then let you go, sailing through the air like a ball, until you’re out of sight. Where you’ll land, nobody knows. And there you’ll die, and all the stuff you’ve collected heaped on your grave. You’ve disgraced your master’s house! You’re fired—and good riddance!'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “On that Day I’ll replace Shebna. I will call my servant Eliakim son of Hilkiah. I’ll dress him in your robe. I’ll put your belt on him. I’ll give him your authority. He’ll be a father-leader to Jerusalem and the government of Judah. I’ll give him the key of the Davidic heritage. He’ll have the run of the place—open any door and keep it open, lock any door and keep it locked. I’ll pound him like a nail into a solid wall. He’ll secure the Davidic tradition. Everything will hang on him—not only the fate of Davidic descendants but also the detailed daily operations of the house, including cups and cutlery.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And then the Day will come,” says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, “when that nail will come loose and fall out, break loose from that solid wall—and everything hanging on it will go with it.” That’s what will happen. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' In the midst of the shouting, I said, “Let me alone.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me grieve by myself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t tell me it’s going to be all right.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'These people are doomed. It’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' all right.”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is bringing a day noisy with mobs of people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jostling and stampeding in the Valley of Vision,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knocking down walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hollering to the mountains, “Attack! Attack!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Old enemies Elam and Kir arrive armed to the teeth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: weapons and chariots and cavalry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your fine valleys are noisy with war,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: chariots and cavalry charging this way and that.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God has left Judah exposed and defenseless.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' You assessed your defenses that Day, inspected your arsenal of weapons in the Forest Armory. You found the weak places in the city walls that needed repair. You secured the water supply at the Lower Pool. You took an inventory of the houses in Jerusalem and tore down some to get bricks to fortify the city wall. You built a large cistern to ensure plenty of water.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: You looked and looked and looked, but you never looked to him who gave you this city, never once consulted the One who has long had plans for this city.
