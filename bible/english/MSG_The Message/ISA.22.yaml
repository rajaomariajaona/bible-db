document_id: ISA.22,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Country of Cowards
  - type: text
    content: 'A Message concerning the Valley of Vision:'
  - type: text
    content: What’s going on here anyway?
  - type: text
    content: All this partying and noisemaking,
  - type: text
    content: Shouting and cheering in the streets,
  - type: text
    content: the city noisy with celebrations!
  - type: text
    content: You have no brave soldiers to honor,
  - type: text
    content: no combat heroes to be proud of.
  - type: text
    content: Your leaders were all cowards,
  - type: text
    content: captured without even lifting a sword,
  - type: text
    content: A country of cowards
  - type: text
    content: captured escaping the battle.
  - type: heading
    content: You Looked, but You Never Looked to Him
  '12':
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: called out on that Day,
  - type: text
    content: Called for a day of repentant tears,
  - type: text
    content: called you to dress in somber clothes of mourning.
  - type: text
    content: 'But what do '
  - type: text
    content: you
  - type: text
    content: ' do? You throw a party!'
  - type: text
    content: Eating and drinking and dancing in the streets!
  - type: text
    content: You barbecue bulls and sheep, and throw a huge feast—
  - type: text
    content: slabs of meat, kegs of beer.
  - type: text
    content: “Seize the day! Eat and drink!
  - type: text
    content: Tomorrow we die!”
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies whispered to me his verdict on this frivolity: “You’ll pay for this outrage until the day you die.” The Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, says so.
  - type: heading
    content: The Key of the Davidic Heritage
  '15':
  - type: text
    content: 'The Master, '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, spoke: “Come. Go to this steward, Shebna, who is in charge of all the king’s affairs, and tell him: What’s going on here? You’re an outsider here and yet you act like you own the place, make a big, fancy tomb for yourself where everyone can see it, making sure everyone will think you’re important. '
  - type: text
    content: God
  - type: text
    content: ' is about to sack you, to throw you to the dogs. He’ll grab you by the hair, swing you round and round dizzyingly, and then let you go, sailing through the air like a ball, until you’re out of sight. Where you’ll land, nobody knows. And there you’ll die, and all the stuff you’ve collected heaped on your grave. You’ve disgraced your master’s house! You’re fired—and good riddance!'
  '20':
  - type: text
    content: “On that Day I’ll replace Shebna. I will call my servant Eliakim son of Hilkiah. I’ll dress him in your robe. I’ll put your belt on him. I’ll give him your authority. He’ll be a father-leader to Jerusalem and the government of Judah. I’ll give him the key of the Davidic heritage. He’ll have the run of the place—open any door and keep it open, lock any door and keep it locked. I’ll pound him like a nail into a solid wall. He’ll secure the Davidic tradition. Everything will hang on him—not only the fate of Davidic descendants but also the detailed daily operations of the house, including cups and cutlery.
  '25':
  - type: text
    content: '“And then the Day will come,” says '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, “when that nail will come loose and fall out, break loose from that solid wall—and everything hanging on it will go with it.” That’s what will happen. '
  - type: text
    content: God
  - type: text
    content: ' says so.'
  '4':
  - type: text
    content: ' In the midst of the shouting, I said, “Let me alone.'
  - type: text
    content: Let me grieve by myself.
  - type: text
    content: Don’t tell me it’s going to be all right.
  - type: text
    content: 'These people are doomed. It’s '
  - type: text
    content: not
  - type: text
    content: ' all right.”'
  - type: text
    content: 'For the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: is bringing a day noisy with mobs of people,
  - type: text
    content: Jostling and stampeding in the Valley of Vision,
  - type: text
    content: knocking down walls
  - type: text
    content: and hollering to the mountains, “Attack! Attack!”
  - type: text
    content: Old enemies Elam and Kir arrive armed to the teeth—
  - type: text
    content: weapons and chariots and cavalry.
  - type: text
    content: Your fine valleys are noisy with war,
  - type: text
    content: chariots and cavalry charging this way and that.
  - type: text
    content: God has left Judah exposed and defenseless.
  '8':
  - type: text
    content: ' You assessed your defenses that Day, inspected your arsenal of weapons in the Forest Armory. You found the weak places in the city walls that needed repair. You secured the water supply at the Lower Pool. You took an inventory of the houses in Jerusalem and tore down some to get bricks to fortify the city wall. You built a large cistern to ensure plenty of water.'
  - type: text
    content: You looked and looked and looked, but you never looked to him who gave you this city, never once consulted the One who has long had plans for this city.
