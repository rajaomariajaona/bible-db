document_id: PSA.45,97
type_code: eng
verses:
  '1':
  - type: text
    content: My heart bursts its banks,
  - type: text
    content: spilling beauty and goodness.
  - type: text
    content: I pour it out in a poem to the king,
  - type: text
    content: 'shaping the river into words:'
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: '“Now listen, daughter, don’t miss a word:'
  - type: text
    content: forget your country, put your home behind you.
  - type: text
    content: 'Be '
  - type: text
    content: here
  - type: text
    content: —the king is wild for you.
  - type: text
    content: Since he’s your lord, adore him.
  - type: text
    content: Wedding gifts pour in from Tyre;
  - type: text
    content: rich guests shower you with presents.”
  '13':
  - type: text
    content: (Her wedding dress is dazzling,
  - type: text
    content: lined with gold by the weavers;
  - type: text
    content: All her dresses and robes
  - type: text
    content: are woven with gold.
  - type: text
    content: She is led to the king,
  - type: text
    content: followed by her virgin companions.
  - type: text
    content: A procession of joy and laughter!
  - type: text
    content: a grand entrance to the king’s palace!)
  '16':
  - type: text
    content: “Set your mind now on sons—
  - type: text
    content: don’t dote on father and grandfather.
  - type: text
    content: You’ll set your sons up as princes
  - type: text
    content: all over the earth.
  - type: text
    content: I’ll make you famous for generations;
  - type: text
    content: you’ll be the talk of the town
  - type: text
    content: for a long, long time.”
  '2':
  - type: text
    content: ' “You’re the handsomest of men;'
  - type: text
    content: every word from your lips is sheer grace,
  - type: text
    content: and God has blessed you, blessed you so much.
  - type: text
    content: Strap your sword to your side, warrior!
  - type: text
    content: Accept praise! Accept due honor!
  - type: text
    content: Ride majestically! Ride triumphantly!
  - type: text
    content: Ride on the side of truth!
  - type: text
    content: Ride for the righteous meek!
  '4':
  - type: text
    content: ' “Your instructions are glow-in-the-dark;'
  - type: text
    content: you shoot sharp arrows
  - type: text
    content: Into enemy hearts; the king’s
  - type: text
    content: foes lie down in the dust, beaten.
  '6':
  - type: text
    content: “Your throne is God’s throne,
  - type: text
    content: ever and always;
  - type: text
    content: The scepter of your royal rule
  - type: text
    content: measures right living.
  - type: text
    content: You love the right
  - type: text
    content: and hate the wrong.
  - type: text
    content: And that is why God, your very own God,
  - type: text
    content: poured fragrant oil on your head,
  - type: text
    content: Marking you out as king
  - type: text
    content: from among your dear companions.
  '8':
  - type: text
    content: “Your forest-drenched garments
  - type: text
    content: are fragrant with mountain breeze.
  - type: text
    content: Chamber music—from the throne room—
  - type: text
    content: makes you want to dance.
  - type: text
    content: Kings’ daughters are maids in your court,
  - type: text
    content: the Bride glittering with golden jewelry.
  - type: text
    content: '* * *'
