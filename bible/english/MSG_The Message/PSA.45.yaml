document_id: PSA.45,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My heart bursts its banks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spilling beauty and goodness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I pour it out in a poem to the king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'shaping the river into words:'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: '“Now listen, daughter, don’t miss a word:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forget your country, put your home behind you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: here
    - type: text
      text: —the king is wild for you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Since he’s your lord, adore him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wedding gifts pour in from Tyre;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rich guests shower you with presents.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: (Her wedding dress is dazzling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lined with gold by the weavers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her dresses and robes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are woven with gold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is led to the king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: followed by her virgin companions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A procession of joy and laughter!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a grand entrance to the king’s palace!)
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: “Set your mind now on sons—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t dote on father and grandfather.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll set your sons up as princes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all over the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make you famous for generations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll be the talk of the town
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for a long, long time.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4a
    - type: text
      text: ' “You’re the handsomest of men;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every word from your lips is sheer grace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and God has blessed you, blessed you so much.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strap your sword to your side, warrior!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Accept praise! Accept due honor!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ride majestically! Ride triumphantly!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ride on the side of truth!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ride for the righteous meek!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4b-5
    - type: text
      text: ' “Your instructions are glow-in-the-dark;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you shoot sharp arrows
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Into enemy hearts; the king’s
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foes lie down in the dust, beaten.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: “Your throne is God’s throne,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever and always;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The scepter of your royal rule
  - type: usfm
    marker: q2
    children:
    - type: text
      text: measures right living.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You love the right
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hate the wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And that is why God, your very own God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poured fragrant oil on your head,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marking you out as king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from among your dear companions.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: “Your forest-drenched garments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are fragrant with mountain breeze.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chamber music—from the throne room—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: makes you want to dance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kings’ daughters are maids in your court,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Bride glittering with golden jewelry.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
