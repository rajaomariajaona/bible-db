document_id: ZEP.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: No Longer Giving God a Thought or a Prayer
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to Zephaniah son of Cushi, son of Gedaliah, son of Amariah, son of Hezekiah. It came during the reign of Josiah son of Amon, who was king of Judah:'
  '14':
  - type: text
    content: '“The Great Judgment Day of '
  - type: text
    content: God
  - type: text
    content: ' is almost here.'
  - type: text
    content: 'It’s countdown time: . . . seven, six, five, four . . . '
  - type: text
    content: Bitter and noisy cries on my Judgment Day,
  - type: text
    content: even strong men screaming for help.
  - type: text
    content: 'Judgment Day is payday—my anger paid out:'
  - type: text
    content: a day of distress and anguish,
  - type: text
    content: a day of catastrophic doom,
  - type: text
    content: a day of darkness at noon,
  - type: text
    content: a day of black storm clouds,
  - type: text
    content: a day of bloodcurdling war cries,
  - type: text
    content: as forts are assaulted,
  - type: text
    content: as defenses are smashed.
  - type: text
    content: I’ll make things so bad they won’t know what hit them.
  - type: text
    content: They’ll walk around groping like the blind.
  - type: text
    content: 'They’ve sinned against '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Their blood will be poured out like old dishwater,
  - type: text
    content: their guts shoveled into slop buckets.
  - type: text
    content: Don’t plan on buying your way out.
  - type: text
    content: Your money is worthless for this.
  - type: text
    content: 'This is the Day of '
  - type: text
    content: God
  - type: text
    content: '’s Judgment—my '
  - type: text
    content: wrath
  - type: text
    content: '!'
  - type: text
    content: 'I '
  - type: text
    content: care
  - type: text
    content: ' about sin with fiery passion—'
  - type: text
    content: A fire to burn up the corrupted world,
  - type: text
    content: a wildfire finish to the corrupting people.”
  '2':
  - type: text
    content: “I’m going to make a clean sweep of the earth,
  - type: text
    content: 'a thorough housecleaning.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '3':
  - type: text
    content: “Men and women and animals,
  - type: text
    content: including birds and fish—
  - type: text
    content: Anything and everything that causes sin—will go,
  - type: text
    content: but especially people.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: “I’ll start with Judah
  - type: text
    content: and everybody who lives in Jerusalem.
  - type: text
    content: I’ll sweep the place clean of every trace
  - type: text
    content: of the sex-and-religion Baal shrines and their priests.
  - type: text
    content: I’ll get rid of the people who sneak up to their rooftops at night
  - type: text
    content: to worship the star gods and goddesses;
  - type: text
    content: 'Also those who continue to worship '
  - type: text
    content: God
  - type: text
    content: but cover their bases by worshiping other king-gods as well;
  - type: text
    content: 'Not to mention those who’ve dumped '
  - type: text
    content: God
  - type: text
    content: ' altogether,'
  - type: text
    content: no longer giving him a thought or offering a prayer.
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: “Quiet now!
  - type: text
    content: 'Reverent silence before me, '
  - type: text
    content: God
  - type: text
    content: ', the Master!'
  - type: text
    content: 'Time’s up. My Judgment Day is near:'
  - type: text
    content: The Holy Day is all set, the invited guests made holy.
  - type: text
    content: 'On the Holy Day, '
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day,
  - type: text
    content: I will punish the leaders and the royal sons;
  - type: text
    content: I will punish those who dress up like foreign priests and priestesses,
  - type: text
    content: Who introduce pagan prayers and practices;
  - type: text
    content: And I’ll punish all who import pagan superstitions
  - type: text
    content: that turn holy places into hellholes.
  - type: text
    content: 'Judgment Day!” '
  - type: text
    content: God
  - type: text
    content: ’s Decree!
  - type: text
    content: “Cries of panic from the city’s Fish Gate,
  - type: text
    content: Cries of terror from the city’s Second Quarter,
  - type: text
    content: sounds of great crashing from the hills!
  - type: text
    content: Wail, you shopkeepers on Market Street!
  - type: text
    content: Moneymaking has had its day. The god Money is dead.
  - type: text
    content: On Judgment Day,
  - type: text
    content: I’ll search through every closet and alley in Jerusalem.
  - type: text
    content: I’ll find and punish those who are sitting it out, fat and lazy,
  - type: text
    content: amusing themselves and taking it easy,
  - type: text
    content: Who think, ‘
  - type: text
    content: God
  - type: text
    content: ' doesn’t do anything, good or bad.'
  - type: text
    content: He isn’t involved, so neither are we.’
  - type: text
    content: But just wait. They’ll lose everything they have,
  - type: text
    content: money and house and land.
  - type: text
    content: They’ll build a house and never move in.
  - type: text
    content: They’ll plant vineyards and never taste the wine.
  - type: heading
    content: A Day of Darkness at Noon
