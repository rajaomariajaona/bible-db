document_id: ZEP.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'No Longer Giving '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' a Thought or a Prayer'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to Zephaniah son of Cushi, son of Gedaliah, son of Amariah, son of Hezekiah. It came during the reign of Josiah son of Amon, who was king of Judah:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I’m going to make a clean sweep of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a thorough housecleaning.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Men and women and animals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: including birds and fish—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anything and everything that causes sin—will go,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but especially people.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: “I’ll start with Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everybody who lives in Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll sweep the place clean of every trace
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the sex-and-religion Baal shrines and their priests.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll get rid of the people who sneak up to their rooftops at night
- type: usfm
  marker: q2
  children:
  - type: text
    text: to worship the star gods and goddesses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Also those who continue to worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q2
  children:
  - type: text
    text: but cover their bases by worshiping other king-gods as well;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Not to mention those who’ve dumped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' altogether,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: no longer giving him a thought or offering a prayer.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-13
  - type: text
    text: “Quiet now!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Reverent silence before me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Time’s up. My Judgment Day is near:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Holy Day is all set, the invited guests made holy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On the Holy Day, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Judgment Day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will punish the leaders and the royal sons;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will punish those who dress up like foreign priests and priestesses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who introduce pagan prayers and practices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’ll punish all who import pagan superstitions
- type: usfm
  marker: q2
  children:
  - type: text
    text: that turn holy places into hellholes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Judgment Day!” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree!
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Cries of panic from the city’s Fish Gate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cries of terror from the city’s Second Quarter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sounds of great crashing from the hills!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wail, you shopkeepers on Market Street!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Moneymaking has had its day. The god Money is dead.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On Judgment Day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll search through every closet and alley in Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll find and punish those who are sitting it out, fat and lazy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: amusing themselves and taking it easy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who think, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' doesn’t do anything, good or bad.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He isn’t involved, so neither are we.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But just wait. They’ll lose everything they have,
- type: usfm
  marker: q2
  children:
  - type: text
    text: money and house and land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll build a house and never move in.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll plant vineyards and never taste the wine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Day of Darkness at Noon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-18
  - type: text
    text: '“The Great Judgment Day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is almost here.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'It’s countdown time: . . . seven, six, five, four . . . '
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bitter and noisy cries on my Judgment Day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even strong men screaming for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Judgment Day is payday—my anger paid out:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a day of distress and anguish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a day of catastrophic doom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a day of darkness at noon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a day of black storm clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a day of bloodcurdling war cries,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as forts are assaulted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as defenses are smashed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll make things so bad they won’t know what hit them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll walk around groping like the blind.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They’ve sinned against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their blood will be poured out like old dishwater,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their guts shoveled into slop buckets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t plan on buying your way out.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your money is worthless for this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This is the Day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Judgment—my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wrath
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: care
  - type: text
    text: ' about sin with fiery passion—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A fire to burn up the corrupted world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a wildfire finish to the corrupting people.”
