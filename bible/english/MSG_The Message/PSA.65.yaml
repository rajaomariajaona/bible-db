document_id: PSA.65,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' Silence is praise to you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Zion-dwelling God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And also obedience.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You hear the prayer in it all.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' We all arrive at your doorstep sooner'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or later, loaded with guilt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our sins too much for us—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you get rid of them once and for all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are the chosen! Blessed the guest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at home in your place!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We expect our fill of good things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your house, your heavenly manse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your salvation wonders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are on display in your trophy room.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth-Tamer, Ocean-Pourer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mountain-Maker, Hill-Dresser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Muzzler of sea storm and wave crash,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of mobs in noisy riot—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Far and wide they’ll come to a stop,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll stare in awe, in wonder.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dawn and dusk take turns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: calling, “Come and worship.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, visit the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ask her to join the dance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deck her out in spring showers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fill the God-River with living water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Paint the wheat fields golden.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Creation was made for this!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drench the plowed fields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soak the dirt clods
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With rainfall as harrow and rake
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring her to blossom and fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Snow-crown the peaks with splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scatter rose petals down your paths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All through the wild meadows, rose petals.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Set the hills to dancing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dress the canyon walls with live sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a drape of flax across the valleys.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them shout, and shout, and shout!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, oh, let them sing!
