document_id: PSA.65,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Silence is praise to you,'
  - type: text
    content: Zion-dwelling God,
  - type: text
    content: And also obedience.
  - type: text
    content: You hear the prayer in it all.
  '2':
  - type: text
    content: ' We all arrive at your doorstep sooner'
  - type: text
    content: or later, loaded with guilt,
  - type: text
    content: Our sins too much for us—
  - type: text
    content: but you get rid of them once and for all.
  - type: text
    content: Blessed are the chosen! Blessed the guest
  - type: text
    content: at home in your place!
  - type: text
    content: We expect our fill of good things
  - type: text
    content: in your house, your heavenly manse.
  - type: text
    content: All your salvation wonders
  - type: text
    content: are on display in your trophy room.
  - type: text
    content: Earth-Tamer, Ocean-Pourer,
  - type: text
    content: Mountain-Maker, Hill-Dresser,
  - type: text
    content: Muzzler of sea storm and wave crash,
  - type: text
    content: of mobs in noisy riot—
  - type: text
    content: Far and wide they’ll come to a stop,
  - type: text
    content: they’ll stare in awe, in wonder.
  - type: text
    content: Dawn and dusk take turns
  - type: text
    content: calling, “Come and worship.”
  '9':
  - type: text
    content: Oh, visit the earth,
  - type: text
    content: ask her to join the dance!
  - type: text
    content: Deck her out in spring showers,
  - type: text
    content: fill the God-River with living water.
  - type: text
    content: Paint the wheat fields golden.
  - type: text
    content: Creation was made for this!
  - type: text
    content: Drench the plowed fields,
  - type: text
    content: soak the dirt clods
  - type: text
    content: With rainfall as harrow and rake
  - type: text
    content: bring her to blossom and fruit.
  - type: text
    content: Snow-crown the peaks with splendor,
  - type: text
    content: scatter rose petals down your paths,
  - type: text
    content: All through the wild meadows, rose petals.
  - type: text
    content: Set the hills to dancing,
  - type: text
    content: Dress the canyon walls with live sheep,
  - type: text
    content: a drape of flax across the valleys.
  - type: text
    content: Let them shout, and shout, and shout!
  - type: text
    content: Oh, oh, let them sing!
