document_id: JAS.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I, James, am a slave of God and the Master Jesus, writing to the twelve tribes scattered to Kingdom Come: Hello!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faith Under Pressure
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: Consider it a sheer gift, friends, when tests and challenges come at you from all sides. You know that under pressure, your faith-life is forced into the open and shows its true colors. So don’t try to get out of anything prematurely. Let it do its work so you become mature and well-developed, not deficient in any way.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: If you don’t know what you’re doing, pray to the Father. He loves to help. You’ll get his help, and won’t be condescended to when you ask for it. Ask boldly, believingly, without a second thought. People who “worry their prayers” are like wind-whipped waves. Don’t think you’re going to get anything from the Master that way, adrift at sea, keeping all your options open.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: When down-and-outers get a break, cheer! And when the arrogant rich are brought down to size, cheer! Prosperity is as short-lived as a wildflower, so don’t ever count on it. You know that as soon as the sun rises, pouring down its scorching heat, the flower withers. Its petals wilt and, before you know it, that beautiful face is a barren stem. Well, that’s a picture of the “prosperous life.” At the very moment everyone is looking on in admiration, it fades away to nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Anyone who meets a testing challenge head-on and manages to stick it out is mighty fortunate. For such persons loyally in love with God, the reward is life and more life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: 'Don’t let anyone under pressure to give in to evil say, “God is trying to trip me up.” God is impervious to evil, and puts evil in no one’s way. The temptation to give in to evil comes from us and only us. We have no one to blame but the leering, seducing flare-up of our own lust. Lust gets pregnant, and has a baby: sin! Sin grows up to adulthood, and becomes a real killer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: So, my very dear friends, don’t get thrown off course. Every desirable and beneficial gift comes out of heaven. The gifts are rivers of light cascading down from the Father of Light. There is nothing deceitful in God, nothing two-faced, nothing fickle. He brought us to life using the true Word, showing us off as the crown of all his creatures.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Act on What You Hear
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'Post this at all the intersections, dear friends: Lead with your ears, follow up with your tongue, and let anger straggle along in the rear. God’s righteousness doesn’t grow from human anger. So throw all spoiled virtue and cancerous evil in the garbage. In simple humility, let our gardener, God, landscape you with the Word, making a salvation-garden of your life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: 'Don’t fool yourself into thinking that you are a listener when you are anything but, letting the Word go in one ear and out the other. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Act
  - type: text
    text: ' on what you hear! Those who hear and don’t act are like those who glance in the mirror, walk away, and two minutes later have no idea who they are, what they look like.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But whoever catches a glimpse of the revealed counsel of God—the free life!—even out of the corner of his eye, and sticks with it, is no distracted scatterbrain but a man or woman of action. That person will find delight and affirmation in the action.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'Anyone who sets himself up as “religious” by talking a good game is self-deceived. This kind of religion is hot air and only hot air. Real religion, the kind that passes muster before God the Father, is this: Reach out to the homeless and loveless in their plight, and guard against corruption from the godless world.'
