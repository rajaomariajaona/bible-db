document_id: PSA.42,97
type_code: eng
verses:
  '1':
  - type: text
    content: A white-tailed deer drinks
  - type: text
    content: from the creek;
  - type: text
    content: I want to drink God,
  - type: text
    content: deep drafts of God.
  - type: text
    content: I’m thirsty for God-alive.
  - type: text
    content: I wonder, “Will I ever make it—
  - type: text
    content: arrive and drink in God’s presence?”
  - type: text
    content: I’m on a diet of tears—
  - type: text
    content: tears for breakfast, tears for supper.
  - type: text
    content: All day long
  - type: text
    content: people knock at my door,
  - type: text
    content: Pestering,
  - type: text
    content: “Where is this God of yours?”
  '11':
  - type: text
    content: Why are you down in the dumps, dear soul?
  - type: text
    content: Why are you crying the blues?
  - type: text
    content: Fix my eyes on God—
  - type: text
    content: soon I’ll be praising again.
  - type: text
    content: He puts a smile on my face.
  - type: text
    content: He’s my God.
  '4':
  - type: text
    content: These are the things I go over and over,
  - type: text
    content: emptying out the pockets of my life.
  - type: text
    content: I was always at the head of the worshiping crowd,
  - type: text
    content: right out in front,
  - type: text
    content: Leading them all,
  - type: text
    content: eager to arrive and worship,
  - type: text
    content: Shouting praises, singing thanksgiving—
  - type: text
    content: celebrating, all of us, God’s feast!
  '5':
  - type: text
    content: Why are you down in the dumps, dear soul?
  - type: text
    content: Why are you crying the blues?
  - type: text
    content: Fix my eyes on God—
  - type: text
    content: soon I’ll be praising again.
  - type: text
    content: He puts a smile on my face.
  - type: text
    content: He’s my God.
  '6':
  - type: text
    content: When my soul is in the dumps, I rehearse
  - type: text
    content: everything I know of you,
  - type: text
    content: From Jordan depths to Hermon heights,
  - type: text
    content: including Mount Mizar.
  - type: text
    content: Chaos calls to chaos,
  - type: text
    content: to the tune of whitewater rapids.
  - type: text
    content: Your breaking surf, your thundering breakers
  - type: text
    content: crash and crush me.
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' promises to love me all day,'
  - type: text
    content: sing songs all through the night!
  - type: text
    content: My life is God’s prayer.
  '9':
  - type: text
    content: Sometimes I ask God, my rock-solid God,
  - type: text
    content: “Why did you let me down?
  - type: text
    content: Why am I walking around in tears,
  - type: text
    content: harassed by enemies?”
  - type: text
    content: They’re out for the kill, these
  - type: text
    content: tormentors with their obscenities,
  - type: text
    content: Taunting day after day,
  - type: text
    content: “Where is this God of yours?”
