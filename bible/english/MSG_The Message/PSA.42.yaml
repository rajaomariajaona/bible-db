document_id: PSA.42
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: A white-tailed deer drinks
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the creek;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I want to drink God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: deep drafts of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m thirsty for God-alive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I wonder, “Will I ever make it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: arrive and drink in God’s presence?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m on a diet of tears—
- type: usfm
  marker: q2
  children:
  - type: text
    text: tears for breakfast, tears for supper.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All day long
- type: usfm
  marker: q2
  children:
  - type: text
    text: people knock at my door,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pestering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Where is this God of yours?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: These are the things I go over and over,
- type: usfm
  marker: q2
  children:
  - type: text
    text: emptying out the pockets of my life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was always at the head of the worshiping crowd,
- type: usfm
  marker: q2
  children:
  - type: text
    text: right out in front,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leading them all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: eager to arrive and worship,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shouting praises, singing thanksgiving—
- type: usfm
  marker: q2
  children:
  - type: text
    text: celebrating, all of us, God’s feast!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Why are you down in the dumps, dear soul?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why are you crying the blues?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fix my eyes on God—
- type: usfm
  marker: q2
  children:
  - type: text
    text: soon I’ll be praising again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He puts a smile on my face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: When my soul is in the dumps, I rehearse
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything I know of you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: From Jordan depths to Hermon heights,
- type: usfm
  marker: q2
  children:
  - type: text
    text: including Mount Mizar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chaos calls to chaos,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the tune of whitewater rapids.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your breaking surf, your thundering breakers
- type: usfm
  marker: q2
  children:
  - type: text
    text: crash and crush me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promises to love me all day,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: sing songs all through the night!
- type: usfm
  marker: q2
  children:
  - type: text
    text: My life is God’s prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Sometimes I ask God, my rock-solid God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Why did you let me down?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why am I walking around in tears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: harassed by enemies?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re out for the kill, these
- type: usfm
  marker: q2
  children:
  - type: text
    text: tormentors with their obscenities,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Taunting day after day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Where is this God of yours?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why are you down in the dumps, dear soul?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why are you crying the blues?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fix my eyes on God—
- type: usfm
  marker: q2
  children:
  - type: text
    text: soon I’ll be praising again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He puts a smile on my face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s my God.
