  '1':
  - type: text
    content: It seemed like a dream, too good to be true,
  - type: text
    content: 'when '
  - type: text
    content: God
  - type: text
    content: ' returned Zion’s exiles.'
  - type: text
    content: We laughed, we sang,
  - type: text
    content: we couldn’t believe our good fortune.
  - type: text
    content: We were the talk of the nations—
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' was wonderful to them!”'
  - type: text
    content: 'God '
  - type: text
    content: was
  - type: text
    content: ' wonderful to us;'
  - type: text
    content: we are one happy people.
  '4':
  - type: text
    content: 'And now, '
  - type: text
    content: God
  - type: text
    content: ', do it again—'
  - type: text
    content: bring rains to our drought-stricken lives
  - type: text
    content: So those who planted their crops in despair
  - type: text
    content: will shout “Yes!” at the harvest,
  - type: text
    content: So those who went off with heavy hearts
  - type: text
    content: will come home laughing, with armloads of blessing.
