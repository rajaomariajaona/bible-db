document_id: 1SA.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Is Out Looking for Your Replacement”'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Saul was a young man when he began as king. He was king over Israel for many years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Saul conscripted enough men for three companies of soldiers. He kept two companies under his command at Micmash and in the Bethel hills. The other company was under Jonathan at Gibeah in Benjamin. He sent the rest of the men home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'Jonathan attacked and killed the Philistine governor stationed at Geba (Gibeah). When the Philistines heard the news, they raised the alarm: “The Hebrews are in revolt!” Saul ordered the reveille trumpets blown throughout the land. The word went out all over Israel, “Saul has killed the Philistine governor—drawn first blood! The Philistines are stirred up and mad as hornets!” Summoned, the army came to Saul at Gilgal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The Philistines rallied their forces to fight Israel: three companies of chariots, six companies of cavalry, and so many infantry they looked like sand on the seashore. They went up into the hills and set up camp at Micmash, east of Beth Aven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: When the Israelites saw that they were way outnumbered and in deep trouble, they ran for cover, hiding in caves and pits, ravines and brambles and cisterns—wherever. They retreated across the Jordan River, refugees fleeing to the country of Gad and Gilead. But Saul held his ground in Gilgal, his soldiers still with him but scared to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He waited seven days, the time set by Samuel. Samuel failed to show up at Gilgal, and the soldiers were slipping away, right and left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'So Saul took charge: “Bring me the burnt offering and the peace offerings!” He went ahead and sacrificed the burnt offering. No sooner had he done it than Samuel showed up! Saul greeted him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Samuel said, “What on earth are you doing?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saul answered, “When I saw I was losing my army from under me, and that you hadn’t come when you said you would, and that the Philistines were poised at Micmash, I said, ‘The Philistines are about to come down on me in Gilgal, and I haven’t yet come before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' asking for his help.’ So I took things into my own hands, and sacrificed the burnt offering.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: '“That was a fool thing to do,” Samuel said to Saul. “If you had kept the appointment that your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded, by now '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' would have set a firm and lasting foundation under your kingly rule over Israel. As it is, your kingly rule is already falling to pieces. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is out looking for your replacement right now. This time he’ll do the choosing. When he finds him, he’ll appoint him leader of his people. And all because you didn’t keep your appointment with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: At that, Samuel got up and left Gilgal. What army there was left followed Saul into battle. They went into the hills from Gilgal toward Gibeah in Benjamin. Saul looked over and assessed the soldiers still with him—a mere six hundred!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonathan and His Armor Bearer
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: Saul, his son Jonathan, and the soldiers who had remained made camp at Geba (Gibeah) of Benjamin. The Philistines were camped at Micmash. Three squads of raiding parties were regularly sent out from the Philistine camp. One squadron was assigned to the Ophrah road going toward Shual country; another was assigned to the Beth Horon road; the third took the border road that rimmed the Valley of Hyenas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: There wasn’t a blacksmith to be found anywhere in Israel. The Philistines made sure of that—“Lest those Hebrews start making swords and spears.” That meant that the Israelites had to go down among the Philistines to keep their farm tools—plowshares and mattocks, axes and sickles—sharp and in good repair. They charged a silver coin for the plowshares and mattocks, and half that for the rest. So when the battle of Micmash was joined, there wasn’t a sword or spear to be found anywhere in Israel—except for Saul and his son Jonathan; they were both well-armed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A patrol of Philistines took up a position at Micmash Pass.
