document_id: JER.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Get Out While You Can!
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-10
  - type: text
    text: 'The Message on Moab from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, the God of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Doom to Nebo! Leveled to the ground!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Kiriathaim demeaned and defeated,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The mighty fortress reduced to a molehill,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Moab’s glory—dust and ashes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Conspirators plot Heshbon’s doom:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Come, let’s wipe Moab off the map.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city of Madmen will be struck mute,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as killing follows killing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Listen! A cry out of Horonaim:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Disaster—doom and more doom!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab will be shattered.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her cries will be heard clear down in Zoar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Up the ascent of Luhith
- type: usfm
  marker: q2
  children:
  - type: text
    text: climbers weep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And down the descent from Horonaim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cries of loss and devastation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, run for your lives! Get out while you can!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Survive by your wits in the wild!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You trusted in thick walls and big money, yes?
- type: usfm
  marker: q2
  children:
  - type: text
    text: But it won’t help you now.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your big god Chemosh will be hauled off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his priests and managers with him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A wrecker will wreck every city.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not a city will survive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The valley fields will be ruined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the plateau pastures destroyed, just as I told you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cover the land of Moab with salt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make sure nothing ever grows here again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her towns will all be ghost towns.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nobody will ever live here again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sloppy work in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s name is cursed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cursed all halfhearted use of the sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-17
  - type: text
    text: “Moab has always taken it easy—
- type: usfm
  marker: q2
  children:
  - type: text
    text: lazy as a dog in the sun,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never had to work for a living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never faced any trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never had to grow up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never once worked up a sweat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But those days are a thing of the past.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll put him to work at hard labor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That will wake him up to the world of hard knocks.
- type: usfm
  marker: q2
  children:
  - type: text
    text: That will smash his illusions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab will be as ashamed of god Chemosh
- type: usfm
  marker: q2
  children:
  - type: text
    text: as Israel was ashamed of her Bethel calf-gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the calf-gods she thought were so great.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For how long do you think you’ll be saying, ‘We’re tough.
- type: usfm
  marker: q2
  children:
  - type: text
    text: We can beat anyone anywhere’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: The destruction of Moab has already begun.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Her choice young soldiers are lying dead right now.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: The King’s Decree—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'his full name, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Yes. Moab’s doom is on countdown,
- type: usfm
  marker: q2
  children:
  - type: text
    text: disaster targeted and launched.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep for Moab, friends and neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who know how famous he’s been.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lament, ‘His mighty scepter snapped in two like a toothpick,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that magnificent royal staff!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: “Come down from your high horse, pampered beauty of Dibon.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sit in dog dung.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The destroyer of Moab will come against you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll wreck your safe, secure houses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stand on the roadside,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pampered women of Aroer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Interview the refugees who are running away.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ask them, ‘What’s happened? And why?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab will be an embarrassing memory, nothing left of the place.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wail and weep your eyes out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell the bad news along the Arnon river.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell the world that Moab is no more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: '“My judgment will come to the plateau cities: on Holon, Jahzah, and Mephaath; on Dibon, Nebo, and Beth-diblathaim; on Kiriathaim, Beth-gamul, and Beth-meon; on Kerioth, Bozrah, and all the cities of Moab, far and near.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Moab’s link to power is severed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Moab’s arm is broken.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sheer Nothingness of Moab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: “Turn Moab into a drunken lush, drunk on the wine of my wrath, a dung-faced drunk, filling the country with vomit—Moab a falling-down drunk, a joke in bad taste. Wasn’t it you, Moab, who made crude jokes over Israel? And when they were caught in bad company, didn’t you cluck and gossip and snicker?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Leave town! Leave! Look for a home in the cliffs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who grew up in Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Try living like a dove
- type: usfm
  marker: q2
  children:
  - type: text
    text: who nests high in the river gorge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-33
  - type: text
    text: “We’ve all heard of Moab’s pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that legendary pride,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The strutting, bullying, puffed-up pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the insufferable arrogance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know”—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—“his rooster-crowing pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the inflated claims, the sheer nothingness of Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I will weep for Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, I will mourn for the people of Moab.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will even mourn for the people of Kir-heres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll weep for the grapevines of Sibmah
- type: usfm
  marker: q2
  children:
  - type: text
    text: and join Jazer in her weeping—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grapevines that once reached the Dead Sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: with tendrils as far as Jazer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your summer fruit and your bursting grapes
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be looted by brutal plunderers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lush Moab stripped
- type: usfm
  marker: q2
  children:
  - type: text
    text: of song and laughter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And yes, I’ll shut down the winepresses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stop all the shouts and hurrahs of harvest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Heshbon and Elealeh will cry out, and the people in Jahaz will hear the cries. They will hear them all the way from Zoar to Horonaim and Eglath-shelishiyah. Even the waters of Nimrim will be dried up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “I will put a stop in Moab”—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—“to all hiking to the high places to offer burnt sacrifices to the gods.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “My heart moans for Moab, for the men of Kir-heres, like soft flute sounds carried by the wind. They’ve lost it all. They’ve got nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '“Everywhere you look are signs of mourning:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: heads shaved, beards cut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hands scratched and bleeding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: clothes ripped and torn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '“In every house in Moab there’ll be loud lamentation, on every street in Moab, loud lamentation. As with a pottery jug that no one wants, I’ll smash Moab to bits.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: “Moab ruined!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Moab shamed and ashamed to be seen!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab a cruel joke!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The stark horror of Moab!”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 40-42
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s verdict on Moab. Indeed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look! An eagle is about to swoop down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spread its wings over Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The towns will be captured,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fortresses taken.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Brave warriors will double up in pain, helpless to fight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a woman giving birth to a baby.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’ll be nothing left of Moab, nothing at all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of his defiant arrogance against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-44
  - type: text
    text: “Terror and pit and trap
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'are what you have facing you, Moab.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “A man running in terror
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall into a trap.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A man climbing out of a pit
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be caught in a trap.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is my agenda for Moab
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'on doomsday.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-47
  - type: text
    text: “On the outskirts of Heshbon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: refugees will pull up short, worn out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fire will flame high from Heshbon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a firestorm raging from the capital of Sihon’s kingdom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will burn off Moab’s eyebrows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will scorch the skull of the braggarts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s all for you, Moab!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You worshipers of Chemosh will be finished off!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons will be trucked off to prison camps;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your daughters will be herded into exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But yet there’s a day that’s coming
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I’ll put things right in Moab.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “For now, that’s the judgment on Moab.”
