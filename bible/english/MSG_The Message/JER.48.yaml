document_id: JER.48,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Get Out While You Can!
  - type: text
    content: 'The Message on Moab from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, the God of Israel:'
  - type: text
    content: “Doom to Nebo! Leveled to the ground!
  - type: text
    content: Kiriathaim demeaned and defeated,
  - type: text
    content: The mighty fortress reduced to a molehill,
  - type: text
    content: Moab’s glory—dust and ashes.
  - type: text
    content: 'Conspirators plot Heshbon’s doom:'
  - type: text
    content: ‘Come, let’s wipe Moab off the map.’
  - type: text
    content: The city of Madmen will be struck mute,
  - type: text
    content: as killing follows killing.
  - type: text
    content: 'Listen! A cry out of Horonaim:'
  - type: text
    content: ‘Disaster—doom and more doom!’
  - type: text
    content: Moab will be shattered.
  - type: text
    content: Her cries will be heard clear down in Zoar.
  - type: text
    content: Up the ascent of Luhith
  - type: text
    content: climbers weep,
  - type: text
    content: And down the descent from Horonaim,
  - type: text
    content: cries of loss and devastation.
  - type: text
    content: Oh, run for your lives! Get out while you can!
  - type: text
    content: Survive by your wits in the wild!
  - type: text
    content: You trusted in thick walls and big money, yes?
  - type: text
    content: But it won’t help you now.
  - type: text
    content: Your big god Chemosh will be hauled off,
  - type: text
    content: his priests and managers with him.
  - type: text
    content: A wrecker will wreck every city.
  - type: text
    content: Not a city will survive.
  - type: text
    content: The valley fields will be ruined,
  - type: text
    content: the plateau pastures destroyed, just as I told you.
  - type: text
    content: Cover the land of Moab with salt.
  - type: text
    content: Make sure nothing ever grows here again.
  - type: text
    content: Her towns will all be ghost towns.
  - type: text
    content: Nobody will ever live here again.
  - type: text
    content: 'Sloppy work in '
  - type: text
    content: God
  - type: text
    content: ’s name is cursed,
  - type: text
    content: and cursed all halfhearted use of the sword.
  '11':
  - type: text
    content: “Moab has always taken it easy—
  - type: text
    content: lazy as a dog in the sun,
  - type: text
    content: Never had to work for a living,
  - type: text
    content: never faced any trouble,
  - type: text
    content: Never had to grow up,
  - type: text
    content: never once worked up a sweat.
  - type: text
    content: But those days are a thing of the past.
  - type: text
    content: I’ll put him to work at hard labor.
  - type: text
    content: That will wake him up to the world of hard knocks.
  - type: text
    content: That will smash his illusions.
  - type: text
    content: Moab will be as ashamed of god Chemosh
  - type: text
    content: as Israel was ashamed of her Bethel calf-gods,
  - type: text
    content: the calf-gods she thought were so great.
  - type: text
    content: For how long do you think you’ll be saying, ‘We’re tough.
  - type: text
    content: We can beat anyone anywhere’?
  - type: text
    content: The destruction of Moab has already begun.
  - type: text
    content: Her choice young soldiers are lying dead right now.”
  - type: text
    content: The King’s Decree—
  - type: text
    content: 'his full name, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  - type: text
    content: “Yes. Moab’s doom is on countdown,
  - type: text
    content: disaster targeted and launched.
  - type: text
    content: Weep for Moab, friends and neighbors,
  - type: text
    content: all who know how famous he’s been.
  - type: text
    content: Lament, ‘His mighty scepter snapped in two like a toothpick,
  - type: text
    content: that magnificent royal staff!’
  '18':
  - type: text
    content: “Come down from your high horse, pampered beauty of Dibon.
  - type: text
    content: Sit in dog dung.
  - type: text
    content: The destroyer of Moab will come against you.
  - type: text
    content: He’ll wreck your safe, secure houses.
  - type: text
    content: Stand on the roadside,
  - type: text
    content: pampered women of Aroer.
  - type: text
    content: Interview the refugees who are running away.
  - type: text
    content: Ask them, ‘What’s happened? And why?’
  - type: text
    content: Moab will be an embarrassing memory, nothing left of the place.
  - type: text
    content: Wail and weep your eyes out!
  - type: text
    content: Tell the bad news along the Arnon river.
  - type: text
    content: Tell the world that Moab is no more.
  '21':
  - type: text
    content: '“My judgment will come to the plateau cities: on Holon, Jahzah, and Mephaath; on Dibon, Nebo, and Beth-diblathaim; on Kiriathaim, Beth-gamul, and Beth-meon; on Kerioth, Bozrah, and all the cities of Moab, far and near.'
  '25':
  - type: text
    content: “Moab’s link to power is severed.
  - type: text
    content: 'Moab’s arm is broken.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: heading
    content: The Sheer Nothingness of Moab
  '26':
  - type: text
    content: “Turn Moab into a drunken lush, drunk on the wine of my wrath, a dung-faced drunk, filling the country with vomit—Moab a falling-down drunk, a joke in bad taste. Wasn’t it you, Moab, who made crude jokes over Israel? And when they were caught in bad company, didn’t you cluck and gossip and snicker?
  '28':
  - type: text
    content: “Leave town! Leave! Look for a home in the cliffs,
  - type: text
    content: you who grew up in Moab.
  - type: text
    content: Try living like a dove
  - type: text
    content: who nests high in the river gorge.
  '29':
  - type: text
    content: “We’ve all heard of Moab’s pride,
  - type: text
    content: that legendary pride,
  - type: text
    content: The strutting, bullying, puffed-up pride,
  - type: text
    content: the insufferable arrogance.
  - type: text
    content: I know”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—“his rooster-crowing pride,
  - type: text
    content: the inflated claims, the sheer nothingness of Moab.
  - type: text
    content: But I will weep for Moab,
  - type: text
    content: yes, I will mourn for the people of Moab.
  - type: text
    content: I will even mourn for the people of Kir-heres.
  - type: text
    content: I’ll weep for the grapevines of Sibmah
  - type: text
    content: and join Jazer in her weeping—
  - type: text
    content: Grapevines that once reached the Dead Sea
  - type: text
    content: with tendrils as far as Jazer.
  - type: text
    content: Your summer fruit and your bursting grapes
  - type: text
    content: will be looted by brutal plunderers,
  - type: text
    content: Lush Moab stripped
  - type: text
    content: of song and laughter.
  - type: text
    content: And yes, I’ll shut down the winepresses,
  - type: text
    content: stop all the shouts and hurrahs of harvest.
  '34':
  - type: text
    content: “Heshbon and Elealeh will cry out, and the people in Jahaz will hear the cries. They will hear them all the way from Zoar to Horonaim and Eglath-shelishiyah. Even the waters of Nimrim will be dried up.
  '35':
  - type: text
    content: “I will put a stop in Moab”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—“to all hiking to the high places to offer burnt sacrifices to the gods.
  '36':
  - type: text
    content: “My heart moans for Moab, for the men of Kir-heres, like soft flute sounds carried by the wind. They’ve lost it all. They’ve got nothing.
  '37':
  - type: text
    content: '“Everywhere you look are signs of mourning:'
  - type: text
    content: heads shaved, beards cut,
  - type: text
    content: Hands scratched and bleeding,
  - type: text
    content: clothes ripped and torn.
  '38':
  - type: text
    content: '“In every house in Moab there’ll be loud lamentation, on every street in Moab, loud lamentation. As with a pottery jug that no one wants, I’ll smash Moab to bits.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '39':
  - type: text
    content: “Moab ruined!
  - type: text
    content: Moab shamed and ashamed to be seen!
  - type: text
    content: Moab a cruel joke!
  - type: text
    content: The stark horror of Moab!”
  - type: text
    content: '* * *'
  '40':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s verdict on Moab. Indeed!
  - type: text
    content: “Look! An eagle is about to swoop down
  - type: text
    content: and spread its wings over Moab.
  - type: text
    content: The towns will be captured,
  - type: text
    content: the fortresses taken.
  - type: text
    content: Brave warriors will double up in pain, helpless to fight,
  - type: text
    content: like a woman giving birth to a baby.
  - type: text
    content: There’ll be nothing left of Moab, nothing at all,
  - type: text
    content: because of his defiant arrogance against me.
  '43':
  - type: text
    content: “Terror and pit and trap
  - type: text
    content: 'are what you have facing you, Moab.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “A man running in terror
  - type: text
    content: will fall into a trap.
  - type: text
    content: A man climbing out of a pit
  - type: text
    content: will be caught in a trap.
  - type: text
    content: This is my agenda for Moab
  - type: text
    content: 'on doomsday.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '45':
  - type: text
    content: “On the outskirts of Heshbon,
  - type: text
    content: refugees will pull up short, worn out.
  - type: text
    content: Fire will flame high from Heshbon,
  - type: text
    content: a firestorm raging from the capital of Sihon’s kingdom.
  - type: text
    content: It will burn off Moab’s eyebrows,
  - type: text
    content: will scorch the skull of the braggarts.
  - type: text
    content: That’s all for you, Moab!
  - type: text
    content: You worshipers of Chemosh will be finished off!
  - type: text
    content: Your sons will be trucked off to prison camps;
  - type: text
    content: your daughters will be herded into exile.
  - type: text
    content: But yet there’s a day that’s coming
  - type: text
    content: when I’ll put things right in Moab.
  - type: text
    content: “For now, that’s the judgment on Moab.”
