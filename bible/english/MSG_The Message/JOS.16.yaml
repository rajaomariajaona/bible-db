document_id: JOS.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: The lot for the people of Joseph went from the Jordan near Jericho, east of the spring of Jericho, north through the desert mountains to Bethel. It went on from Bethel (that is, Luz) to the territory of the Arkites in Ataroth. It then descended westward to the territory of the Japhletites to the region of Lower Beth Horon and on to Gezer, ending at the Sea.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But they didn’t get rid of the Canaanites who were living in Gezer. Canaanites are still living among the people of Ephraim, but they are made to do forced labor.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: This is the region from which the people of Joseph—Manasseh and Ephraim—got their inheritance.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: 'Ephraim’s territory by clans:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: The boundary of their inheritance went from Ataroth Addar in the east to Upper Beth Horon and then west to the Sea. From Micmethath on the north it turned eastward to Taanath Shiloh and passed along, still eastward, to Janoah. The border then descended from Janoah to Ataroth and Naarah; it touched Jericho and came out at the Jordan. From Tappuah the border went westward to the Brook Kanah and ended at the Sea. This was the inheritance of the tribe of Ephraim by clans, including the cities set aside for Ephraim within the inheritance of Manasseh—all those towns and their villages.
