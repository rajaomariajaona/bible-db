document_id: PRO.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Deep Water in the Heart
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Wine makes you mean, beer makes you quarrelsome—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a staggering drunk is not much fun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quick-tempered leaders are like mad dogs—
- type: usfm
  marker: q2
  children:
  - type: text
    text: cross them and they bite your head off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It’s a mark of good character to avert quarrels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools love to pick fights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A farmer too lazy to plant in the spring
- type: usfm
  marker: q2
  children:
  - type: text
    text: has nothing to harvest in the fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Knowing what is right is like deep water in the heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a wise person draws from the well within.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lots of people claim to be loyal and loving,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but where on earth can you find one?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God-loyal people, living honest lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make it much easier for their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: Leaders who know their business and care
- type: usfm
  marker: q2
  children:
  - type: text
    text: keep a sharp eye out for the shoddy and cheap,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For who among us can be trusted
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be always diligent and honest?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Switching price tags and padding the expense account
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'are two things '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hates.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Young people eventually reveal by their actions
- type: usfm
  marker: q2
  children:
  - type: text
    text: if their motives are on the up and up.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Drinking from the Chalice of Knowledge
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ears that hear and eyes that see—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'we get our basic equipment from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Don’t be too fond of sleep; you’ll end up in the poorhouse.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wake up and get up; then there’ll be food on the table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The shopper says, “That’s junk—I’ll take it off your hands,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: then goes off boasting of the bargain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Drinking from the beautiful chalice of knowledge
- type: usfm
  marker: q2
  children:
  - type: text
    text: is better than adorning oneself with gold and rare gems.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hold tight to collateral on any loan to a stranger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: beware of accepting what a transient has pawned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Stolen bread tastes sweet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but soon your mouth is full of gravel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Form your purpose by asking for counsel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then carry it out using all the help you can get.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Gossips can’t keep secrets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so never confide in blabbermouths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Anyone who curses father and mother
- type: usfm
  marker: q2
  children:
  - type: text
    text: extinguishes light and exists benighted.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Very Steps We Take
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: A bonanza at the beginning
- type: usfm
  marker: q2
  children:
  - type: text
    text: is no guarantee of blessing at the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Don’t ever say, “I’ll get you for that!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Wait for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ; he’ll settle the score.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hates cheating in the marketplace;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: rigged scales are an outrage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The very steps we take come from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: otherwise how would we know where we’re going?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: An impulsive vow is a trap;
- type: usfm
  marker: q2
  children:
  - type: text
    text: later you’ll wish you could get out of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: After careful scrutiny, a wise leader
- type: usfm
  marker: q2
  children:
  - type: text
    text: makes a clean sweep of rebels and dolts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is in charge of human life,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: watching and examining us inside and out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Love and truth form a good leader;
- type: usfm
  marker: q2
  children:
  - type: text
    text: sound leadership is founded on loving integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Youth may be admired for vigor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but gray hair gives prestige to old age.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A good thrashing purges evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: punishment goes deep within us.
