document_id: PRO.20,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Deep Water in the Heart
  - type: text
    content: Wine makes you mean, beer makes you quarrelsome—
  - type: text
    content: a staggering drunk is not much fun.
  '10':
  - type: text
    content: Switching price tags and padding the expense account
  - type: text
    content: 'are two things '
  - type: text
    content: God
  - type: text
    content: ' hates.'
  '11':
  - type: text
    content: Young people eventually reveal by their actions
  - type: text
    content: if their motives are on the up and up.
  - type: heading
    content: Drinking from the Chalice of Knowledge
  '12':
  - type: text
    content: Ears that hear and eyes that see—
  - type: text
    content: 'we get our basic equipment from '
  - type: text
    content: God
  - type: text
    content: '!'
  '13':
  - type: text
    content: Don’t be too fond of sleep; you’ll end up in the poorhouse.
  - type: text
    content: Wake up and get up; then there’ll be food on the table.
  '14':
  - type: text
    content: The shopper says, “That’s junk—I’ll take it off your hands,”
  - type: text
    content: then goes off boasting of the bargain.
  '15':
  - type: text
    content: Drinking from the beautiful chalice of knowledge
  - type: text
    content: is better than adorning oneself with gold and rare gems.
  '16':
  - type: text
    content: Hold tight to collateral on any loan to a stranger;
  - type: text
    content: beware of accepting what a transient has pawned.
  '17':
  - type: text
    content: Stolen bread tastes sweet,
  - type: text
    content: but soon your mouth is full of gravel.
  '18':
  - type: text
    content: Form your purpose by asking for counsel,
  - type: text
    content: then carry it out using all the help you can get.
  '19':
  - type: text
    content: Gossips can’t keep secrets,
  - type: text
    content: so never confide in blabbermouths.
  '2':
  - type: text
    content: Quick-tempered leaders are like mad dogs—
  - type: text
    content: cross them and they bite your head off.
  '20':
  - type: text
    content: Anyone who curses father and mother
  - type: text
    content: extinguishes light and exists benighted.
  - type: heading
    content: The Very Steps We Take
  '21':
  - type: text
    content: A bonanza at the beginning
  - type: text
    content: is no guarantee of blessing at the end.
  '22':
  - type: text
    content: Don’t ever say, “I’ll get you for that!”
  - type: text
    content: 'Wait for '
  - type: text
    content: God
  - type: text
    content: ; he’ll settle the score.
  '23':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' hates cheating in the marketplace;'
  - type: text
    content: rigged scales are an outrage.
  '24':
  - type: text
    content: 'The very steps we take come from '
  - type: text
    content: God;
  - type: text
    content: otherwise how would we know where we’re going?
  '25':
  - type: text
    content: An impulsive vow is a trap;
  - type: text
    content: later you’ll wish you could get out of it.
  '26':
  - type: text
    content: After careful scrutiny, a wise leader
  - type: text
    content: makes a clean sweep of rebels and dolts.
  '27':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is in charge of human life,'
  - type: text
    content: watching and examining us inside and out.
  '28':
  - type: text
    content: Love and truth form a good leader;
  - type: text
    content: sound leadership is founded on loving integrity.
  '29':
  - type: text
    content: Youth may be admired for vigor,
  - type: text
    content: but gray hair gives prestige to old age.
  '3':
  - type: text
    content: It’s a mark of good character to avert quarrels,
  - type: text
    content: but fools love to pick fights.
  '30':
  - type: text
    content: A good thrashing purges evil;
  - type: text
    content: punishment goes deep within us.
  '4':
  - type: text
    content: A farmer too lazy to plant in the spring
  - type: text
    content: has nothing to harvest in the fall.
  '5':
  - type: text
    content: Knowing what is right is like deep water in the heart;
  - type: text
    content: a wise person draws from the well within.
  '6':
  - type: text
    content: Lots of people claim to be loyal and loving,
  - type: text
    content: but where on earth can you find one?
  '7':
  - type: text
    content: God-loyal people, living honest lives,
  - type: text
    content: make it much easier for their children.
  '8':
  - type: text
    content: Leaders who know their business and care
  - type: text
    content: keep a sharp eye out for the shoddy and cheap,
  - type: text
    content: For who among us can be trusted
  - type: text
    content: to be always diligent and honest?
