document_id: ISA.55,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Buy Without Money
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hey there! All who are thirsty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come to the water!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you penniless?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come anyway—buy and eat!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, buy your drinks, buy wine and milk.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Buy without money—everything’s free!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you spend your money on junk food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your hard-earned cash on cotton candy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to me, listen well: Eat only the best,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fill yourself with only the finest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay attention, come close now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen carefully to my life-giving, life-nourishing words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m making a lasting covenant commitment with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the same that I made with David: sure, solid, enduring love.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I set him up as a witness to the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made him a prince and leader of the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now I’m doing it to you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll summon nations you’ve never heard of,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and nations who’ve never heard of you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come running to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of me, your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because The Holy of Israel has honored you.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So you’ll go out in joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll be led into a whole and complete life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains and hills will lead the parade,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bursting with song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the trees of the forest will join the procession,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exuberant with applause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No more thistles, but giant sequoias,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no more thornbushes, but stately pines—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Monuments to me, to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'living and lasting evidence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Seek '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' while he’s here to be found,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pray to him while he’s close at hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the wicked abandon their way of life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the evil their way of thinking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them come back to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', who is merciful,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come back to our God, who is lavish with forgiveness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I don’t think the way you think.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The way you work isn’t the way I work.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For as the sky soars high above earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the way I work surpasses the way you work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the way I think is beyond the way you think.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as rain and snow descend from the skies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and don’t go back until they’ve watered the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doing their work of making things grow and blossom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: producing seed for farmers and food for the hungry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So will the words that come out of my mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not come back empty-handed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll do the work I sent them to do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll complete the assignment I gave them.
