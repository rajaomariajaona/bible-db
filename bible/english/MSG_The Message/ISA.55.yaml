document_id: ISA.55,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Buy Without Money
  - type: text
    content: “Hey there! All who are thirsty,
  - type: text
    content: come to the water!
  - type: text
    content: Are you penniless?
  - type: text
    content: Come anyway—buy and eat!
  - type: text
    content: Come, buy your drinks, buy wine and milk.
  - type: text
    content: Buy without money—everything’s free!
  - type: text
    content: Why do you spend your money on junk food,
  - type: text
    content: your hard-earned cash on cotton candy?
  - type: text
    content: 'Listen to me, listen well: Eat only the best,'
  - type: text
    content: fill yourself with only the finest.
  - type: text
    content: Pay attention, come close now,
  - type: text
    content: listen carefully to my life-giving, life-nourishing words.
  - type: text
    content: I’m making a lasting covenant commitment with you,
  - type: text
    content: 'the same that I made with David: sure, solid, enduring love.'
  - type: text
    content: I set him up as a witness to the nations,
  - type: text
    content: made him a prince and leader of the nations,
  - type: text
    content: 'And now I’m doing it to you:'
  - type: text
    content: You’ll summon nations you’ve never heard of,
  - type: text
    content: and nations who’ve never heard of you
  - type: text
    content: will come running to you
  - type: text
    content: 'Because of me, your '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: because The Holy of Israel has honored you.”
  '12':
  - type: text
    content: “So you’ll go out in joy,
  - type: text
    content: you’ll be led into a whole and complete life.
  - type: text
    content: The mountains and hills will lead the parade,
  - type: text
    content: bursting with song.
  - type: text
    content: All the trees of the forest will join the procession,
  - type: text
    content: exuberant with applause.
  - type: text
    content: No more thistles, but giant sequoias,
  - type: text
    content: no more thornbushes, but stately pines—
  - type: text
    content: 'Monuments to me, to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'living and lasting evidence of '
  - type: text
    content: God
  - type: text
    content: .”
  '6':
  - type: text
    content: 'Seek '
  - type: text
    content: God
  - type: text
    content: ' while he’s here to be found,'
  - type: text
    content: pray to him while he’s close at hand.
  - type: text
    content: Let the wicked abandon their way of life
  - type: text
    content: and the evil their way of thinking.
  - type: text
    content: 'Let them come back to '
  - type: text
    content: God
  - type: text
    content: ', who is merciful,'
  - type: text
    content: come back to our God, who is lavish with forgiveness.
  '8':
  - type: text
    content: “I don’t think the way you think.
  - type: text
    content: The way you work isn’t the way I work.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “For as the sky soars high above earth,
  - type: text
    content: so the way I work surpasses the way you work,
  - type: text
    content: and the way I think is beyond the way you think.
  - type: text
    content: Just as rain and snow descend from the skies
  - type: text
    content: and don’t go back until they’ve watered the earth,
  - type: text
    content: Doing their work of making things grow and blossom,
  - type: text
    content: producing seed for farmers and food for the hungry,
  - type: text
    content: So will the words that come out of my mouth
  - type: text
    content: not come back empty-handed.
  - type: text
    content: They’ll do the work I sent them to do,
  - type: text
    content: they’ll complete the assignment I gave them.
