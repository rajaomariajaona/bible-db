document_id: ISA.24,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Landscape Will Be a Moonscape
  - type: text
    content: 'Danger ahead! '
  - type: text
    content: God
  - type: text
    content: ’s about to ravish the earth
  - type: text
    content: and leave it in ruins,
  - type: text
    content: Rip everything out by the roots
  - type: text
    content: 'and send everyone scurrying:'
  - type: text
    content: priests and laypeople alike,
  - type: text
    content: owners and workers alike,
  - type: text
    content: celebrities and nobodies alike,
  - type: text
    content: buyers and sellers alike,
  - type: text
    content: bankers and beggars alike,
  - type: text
    content: the haves and have-nots alike.
  - type: text
    content: The landscape will be a moonscape,
  - type: text
    content: totally wasted.
  - type: text
    content: 'And why? Because '
  - type: text
    content: God
  - type: text
    content: ' says so.'
  - type: text
    content: He’s issued the orders.
  '14':
  - type: text
    content: ' But there are some who will break into glad song.'
  - type: text
    content: 'Out of the west they’ll shout of '
  - type: text
    content: God
  - type: text
    content: ’s majesty.
  - type: text
    content: 'Yes, from the east '
  - type: text
    content: God
  - type: text
    content: ’s glory will ascend.
  - type: text
    content: Every island of the sea
  - type: text
    content: 'Will broadcast '
  - type: text
    content: God
  - type: text
    content: ’s fame,
  - type: text
    content: the fame of the God of Israel.
  - type: text
    content: 'From the four winds and the seven seas we hear the singing:'
  - type: text
    content: “All praise to the Righteous One!”
  '16':
  - type: text
    content: ' But I said, “That’s all well and good for somebody,'
  - type: text
    content: but all I can see is doom, doom, and more doom.”
  - type: text
    content: All of them at one another’s throats,
  - type: text
    content: yes, all of them at one another’s throats.
  - type: text
    content: Terror and pits and booby traps
  - type: text
    content: are everywhere, whoever you are.
  - type: text
    content: If you run from the terror,
  - type: text
    content: you’ll fall into the pit.
  - type: text
    content: If you climb out of the pit,
  - type: text
    content: you’ll get caught in the trap.
  - type: text
    content: Chaos pours out of the skies.
  - type: text
    content: The foundations of earth are crumbling.
  - type: text
    content: Earth is smashed to pieces,
  - type: text
    content: earth is ripped to shreds,
  - type: text
    content: earth is wobbling out of control,
  - type: text
    content: Earth staggers like a drunk,
  - type: text
    content: sways like a shack in a high wind.
  - type: text
    content: Its piled-up sins are too much for it.
  - type: text
    content: It collapses and won’t get up again.
  '21':
  - type: text
    content: 'That’s when '
  - type: text
    content: God
  - type: text
    content: ' will call on the carpet'
  - type: text
    content: rebel powers in the skies and
  - type: text
    content: Rebel kings on earth.
  - type: text
    content: They’ll be rounded up like prisoners in a jail,
  - type: text
    content: Corralled and locked up in a jail,
  - type: text
    content: and then sentenced and put to hard labor.
  - type: text
    content: Shamefaced moon will cower, humiliated,
  - type: text
    content: red-faced sun will skulk, disgraced,
  - type: text
    content: 'Because '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies will take over,
  - type: text
    content: ruling from Mount Zion and Jerusalem,
  - type: text
    content: Splendid and glorious
  - type: text
    content: before all his leaders.
  '4':
  - type: text
    content: The earth turns gaunt and gray,
  - type: text
    content: the world silent and sad,
  - type: text
    content: sky and land lifeless, colorless.
  - type: heading
    content: Earth Polluted by Its Very Own People
  '5':
  - type: text
    content: Earth is polluted by its very own people,
  - type: text
    content: who have broken its laws,
  - type: text
    content: Disrupted its order,
  - type: text
    content: violated the sacred and eternal covenant.
  - type: text
    content: Therefore a curse, like a cancer,
  - type: text
    content: ravages the earth.
  - type: text
    content: Its people pay the price of their sacrilege.
  - type: text
    content: They dwindle away, dying out one by one.
  - type: text
    content: No more wine, no more vineyards,
  - type: text
    content: no more songs or singers.
  - type: text
    content: The laughter of castanets is gone,
  - type: text
    content: the shouts of celebrants, gone,
  - type: text
    content: the laughter of fiddles, gone.
  - type: text
    content: No more parties with toasts of champagne.
  - type: text
    content: Serious drinkers gag on their drinks.
  - type: text
    content: The chaotic cities are unlivable. Anarchy reigns.
  - type: text
    content: Every house is boarded up, condemned.
  - type: text
    content: People riot in the streets for wine,
  - type: text
    content: but the good times are gone forever—
  - type: text
    content: no more joy for this old world.
  - type: text
    content: The city is dead and deserted,
  - type: text
    content: bulldozed into piles of rubble.
  - type: text
    content: That’s the way it will be on this earth.
  - type: text
    content: 'This is the fate of all nations:'
  - type: text
    content: An olive tree shaken clean of its olives,
  - type: text
    content: a grapevine picked clean of its grapes.
