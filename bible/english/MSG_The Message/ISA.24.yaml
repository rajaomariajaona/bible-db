document_id: ISA.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Landscape Will Be a Moonscape
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Danger ahead! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s about to ravish the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leave it in ruins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rip everything out by the roots
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and send everyone scurrying:'
- type: usfm
  marker: q3
  children:
  - type: text
    text: priests and laypeople alike,
- type: usfm
  marker: q3
  children:
  - type: text
    text: owners and workers alike,
- type: usfm
  marker: q3
  children:
  - type: text
    text: celebrities and nobodies alike,
- type: usfm
  marker: q3
  children:
  - type: text
    text: buyers and sellers alike,
- type: usfm
  marker: q3
  children:
  - type: text
    text: bankers and beggars alike,
- type: usfm
  marker: q3
  children:
  - type: text
    text: the haves and have-nots alike.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The landscape will be a moonscape,
- type: usfm
  marker: q2
  children:
  - type: text
    text: totally wasted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And why? Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says so.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s issued the orders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The earth turns gaunt and gray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the world silent and sad,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sky and land lifeless, colorless.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Earth Polluted by Its Very Own People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-13
  - type: text
    text: Earth is polluted by its very own people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have broken its laws,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Disrupted its order,
- type: usfm
  marker: q2
  children:
  - type: text
    text: violated the sacred and eternal covenant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore a curse, like a cancer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ravages the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its people pay the price of their sacrilege.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They dwindle away, dying out one by one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more wine, no more vineyards,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more songs or singers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The laughter of castanets is gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the shouts of celebrants, gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the laughter of fiddles, gone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more parties with toasts of champagne.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Serious drinkers gag on their drinks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The chaotic cities are unlivable. Anarchy reigns.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every house is boarded up, condemned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People riot in the streets for wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the good times are gone forever—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more joy for this old world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The city is dead and deserted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bulldozed into piles of rubble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s the way it will be on this earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'This is the fate of all nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: An olive tree shaken clean of its olives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a grapevine picked clean of its grapes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16a
  - type: text
    text: ' But there are some who will break into glad song.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Out of the west they’ll shout of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s majesty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yes, from the east '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s glory will ascend.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every island of the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Will broadcast '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s fame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fame of the God of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From the four winds and the seven seas we hear the singing:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “All praise to the Righteous One!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16b-20
  - type: text
    text: ' But I said, “That’s all well and good for somebody,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but all I can see is doom, doom, and more doom.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: All of them at one another’s throats,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, all of them at one another’s throats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terror and pits and booby traps
- type: usfm
  marker: q2
  children:
  - type: text
    text: are everywhere, whoever you are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you run from the terror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll fall into the pit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you climb out of the pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll get caught in the trap.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chaos pours out of the skies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The foundations of earth are crumbling.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth is smashed to pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: earth is ripped to shreds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: earth is wobbling out of control,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth staggers like a drunk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sways like a shack in a high wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its piled-up sins are too much for it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It collapses and won’t get up again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: 'That’s when '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will call on the carpet'
- type: usfm
  marker: q2
  children:
  - type: text
    text: rebel powers in the skies and
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rebel kings on earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll be rounded up like prisoners in a jail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Corralled and locked up in a jail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then sentenced and put to hard labor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shamefaced moon will cower, humiliated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: red-faced sun will skulk, disgraced,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies will take over,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ruling from Mount Zion and Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Splendid and glorious
- type: usfm
  marker: q2
  children:
  - type: text
    text: before all his leaders.
