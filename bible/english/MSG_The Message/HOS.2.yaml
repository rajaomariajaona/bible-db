type_code: eng
verses:
  '1':
  - type: text
    content: '* * *'
  - type: text
    content: “Rename your brothers ‘God’s Somebody.’
  - type: text
    content: Rename your sisters ‘All Mercy.’
  - type: heading
    content: Wild Weekends and Unholy Holidays
  '14':
  - type: text
    content: '“And now, here’s what I’m going to do:'
  - type: text
    content: I’m going to start all over again.
  - type: text
    content: I’m taking her back out into the wilderness
  - type: text
    content: where we had our first date, and I’ll court her.
  - type: text
    content: I’ll give her bouquets of roses.
  - type: text
    content: I’ll turn Heartbreak Valley into Acres of Hope.
  - type: text
    content: She’ll respond like she did as a young girl,
  - type: text
    content: those days when she was fresh out of Egypt.
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: '“At that time”—this is '
  - type: text
    content: God
  - type: text
    content: ’s Message still—
  - type: text
    content: “you’ll address me, ‘Dear husband!’
  - type: text
    content: Never again will you address me,
  - type: text
    content: ‘My slave-master!’
  - type: text
    content: I’ll wash your mouth out with soap,
  - type: text
    content: get rid of all the dirty false-god names,
  - type: text
    content: not so much as a whisper of those names again.
  - type: text
    content: At the same time I’ll make a peace treaty between you
  - type: text
    content: and wild animals and birds and reptiles,
  - type: text
    content: And get rid of all weapons of war.
  - type: text
    content: Think of it! Safe from beasts and bullies!
  - type: text
    content: And then I’ll marry you for good—forever!
  - type: text
    content: I’ll marry you true and proper, in love and tenderness.
  - type: text
    content: Yes, I’ll marry you and neither leave you nor let you go.
  - type: text
    content: 'You’ll know me, '
  - type: text
    content: God
  - type: text
    content: ', for who I really am.'
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: “Haul your mother into court. Accuse her!
  - type: text
    content: She’s no longer my wife.
  - type: text
    content: I’m no longer her husband.
  - type: text
    content: Tell her to quit dressing like a whore,
  - type: text
    content: displaying her breasts for sale.
  - type: text
    content: If she refuses, I’ll rip off her clothes
  - type: text
    content: and expose her, naked as a newborn.
  - type: text
    content: I’ll turn her skin into dried-out leather,
  - type: text
    content: her body into a badlands landscape,
  - type: text
    content: a rack of bones in the desert.
  - type: text
    content: I’ll have nothing to do with her children,
  - type: text
    content: born one and all in a whorehouse.
  - type: text
    content: 'Face it: Your mother’s been a whore,'
  - type: text
    content: bringing bastard children into the world.
  - type: text
    content: She said, ‘I’m off to see my lovers!
  - type: text
    content: They’ll wine and dine me,
  - type: text
    content: Dress and caress me,
  - type: text
    content: perfume and adorn me!’
  - type: text
    content: 'But I’ll fix her: I’ll dump her in a field of thistles,'
  - type: text
    content: then lose her in a dead-end alley.
  - type: text
    content: She’ll go on the hunt for her lovers
  - type: text
    content: but not bring down a single one.
  - type: text
    content: She’ll look high and low
  - type: text
    content: but won’t find a one. Then she’ll say,
  - type: text
    content: ‘I’m going back to my husband, the one I started out with.
  - type: text
    content: That was a better life by far than this one.’
  - type: text
    content: She didn’t know that it was I all along
  - type: text
    content: who wined and dined and adorned her,
  - type: text
    content: That I was the one who dressed her up
  - type: text
    content: in the big-city fashions and jewelry
  - type: text
    content: that she wasted on wild Baal-orgies.
  - type: text
    content: 'I’m about to bring her up short: No more wining and dining!'
  - type: text
    content: Silk lingerie and gowns are a thing of the past.
  - type: text
    content: I’ll expose her genitals to the public.
  - type: text
    content: All her fly-by-night lovers will be helpless to help her.
  - type: text
    content: Party time is over. I’m calling a halt to the whole business,
  - type: text
    content: her wild weekends and unholy holidays.
  - type: text
    content: I’ll wreck her sumptuous gardens and ornamental fountains,
  - type: text
    content: of which she bragged, ‘Whoring paid for all this!’
  - type: text
    content: They will soon be dumping grounds for garbage,
  - type: text
    content: feeding grounds for stray dogs and cats.
  - type: text
    content: I’ll make her pay for her indulgence in promiscuous religion—
  - type: text
    content: all that sensuous Baal worship
  - type: text
    content: And all the promiscuous sex that went with it,
  - type: text
    content: stalking her lovers, dressed to kill,
  - type: text
    content: And not a thought for me.”
  - type: text
    content: God
  - type: text
    content: ’s Message!
  - type: heading
    content: To Start All Over Again
  '21':
  - type: text
    content: '“On the very same day, I’ll answer”—this is '
  - type: text
    content: God
  - type: text
    content: ’s Message—
  - type: text
    content: “I’ll answer the sky, sky will answer earth,
  - type: text
    content: Earth will answer grain and wine and olive oil,
  - type: text
    content: and they’ll all answer Jezreel.
  - type: text
    content: I’ll plant her in the good earth.
  - type: text
    content: I’ll have mercy on No-Mercy.
  - type: text
    content: I’ll say to Nobody, ‘You’re my dear Somebody,’
  - type: text
    content: and he’ll say ‘You’re my God!’”
