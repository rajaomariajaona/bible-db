document_id: PSA.98,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' a brand-new song.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s made a world of wonders!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rolled up his sleeves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He set things right.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made history with salvation,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He showed the world what he could do.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He remembered to love us, a bonus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To his dear family, Israel—indefatigable love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole earth comes to attention.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look—God’s work of salvation!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shout your praises to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', everybody!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let loose and sing! Strike up the band!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Round up an orchestra to play for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Add on a hundred-voice choir.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Feature trumpets and big trombones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fill the air with praises to King '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the sea and its fish give a round of applause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With everything living on earth joining in.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let ocean breakers call out, “Encore!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And mountains harmonize the finale—
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A tribute to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' when he comes,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he comes to set the earth right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll straighten out the whole world,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll put the world right, and everyone in it.
