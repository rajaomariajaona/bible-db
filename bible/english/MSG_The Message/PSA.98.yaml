  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He remembered to love us, a bonus
- type: usfm
  marker: q1
  children:
  - type: text
    text: To his dear family, Israel—indefatigable love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The whole earth comes to attention.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look—God’s work of salvation!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Shout your praises to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', everybody!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let loose and sing! Strike up the band!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Round up an orchestra to play for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Add on a hundred-voice choir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Feature trumpets and big trombones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Fill the air with praises to King '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let the sea and its fish give a round of applause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: With everything living on earth joining in.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let ocean breakers call out, “Encore!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: And mountains harmonize the finale—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A tribute to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' when he comes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he comes to set the earth right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll straighten out the whole world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll put the world right, and everyone in it.
