  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' made history with salvation,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He showed the world what he could do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
