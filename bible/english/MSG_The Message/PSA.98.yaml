  - type: text
    text: ' a brand-new song.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s made a world of wonders!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rolled up his sleeves,
- type: usfm
  marker: q1
  children:
  - type: text
