document_id: JOB.33,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So please, Job, hear me out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: honor me by listening to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What I’m about to say
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has been carefully thought out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have no ulterior motives in this;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m speaking honestly from my heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Spirit of God made me what I am,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the breath of God Almighty gave me life!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Always Answers, One Way or Another
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But let me tell you, Job, you’re wrong, dead wrong!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God is far greater than any human.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So how dare you haul him into court,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then complain that he won’t answer your charges?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God always answers, one way or another,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even when people don’t recognize his presence.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In a dream, for instance, a vision at night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when men and women are deep in sleep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fast asleep in their beds—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God opens their ears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and impresses them with warnings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To turn them back from something bad they’re planning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from some reckless choice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And keep them from an early grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the river of no return.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Or, God might get their attention through pain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by throwing them on a bed of suffering,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So they can’t stand the sight of food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have no appetite for their favorite treats.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lose weight, wasting away to nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reduced to a bag of bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They hang on the cliff-edge of death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knowing the next breath may be their last.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But even then an angel could come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a champion—there are thousands of them!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to take up your cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A messenger who would mercifully intervene,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'canceling the death sentence with the words:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘I’ve come up with the ransom!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before you know it, you’re healed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the very picture of health!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Or, you may fall on your knees and pray—to God’s delight!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ll see God’s smile and celebrate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: finding yourself set right with God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll sing God’s praises to everyone you meet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: testifying, ‘I messed up my life—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let me tell you, it wasn’t worth it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God stepped in and saved me from certain death.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m alive again! Once more I see the light!’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is the way God works.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Over and over again
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He pulls our souls back from certain destruction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so we’ll see the light—and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'live '
    - type: text
      text: in the light!
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Keep listening, Job.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t interrupt—I’m not finished yet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you think of anything I should know, tell me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s nothing I’d like better than to see your name cleared.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meanwhile, keep listening. Don’t distract me with interruptions.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m going to teach you the basics of wisdom.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And if you think you can prove me wrong, do it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lay out your arguments. Stand up for yourself!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, I’m human—no better than you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we’re both made of the same kind of mud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So let’s work this through together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t let my aggressiveness overwhelm you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here’s what you said.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I heard you say it with my own ears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You said, ‘I’m pure—I’ve done nothing wrong.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Believe me, I’m clean—my conscience is clear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God keeps picking on me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he treats me like I’m his enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s thrown me in jail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he keeps me under constant surveillance.’
