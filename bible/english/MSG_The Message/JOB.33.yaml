document_id: JOB.33,97
type_code: eng
verses:
  '1':
  - type: text
    content: “So please, Job, hear me out,
  - type: text
    content: honor me by listening to me.
  - type: text
    content: What I’m about to say
  - type: text
    content: has been carefully thought out.
  - type: text
    content: I have no ulterior motives in this;
  - type: text
    content: I’m speaking honestly from my heart.
  - type: text
    content: The Spirit of God made me what I am,
  - type: text
    content: the breath of God Almighty gave me life!
  - type: heading
    content: God Always Answers, One Way or Another
  '12':
  - type: text
    content: “But let me tell you, Job, you’re wrong, dead wrong!
  - type: text
    content: God is far greater than any human.
  - type: text
    content: So how dare you haul him into court,
  - type: text
    content: and then complain that he won’t answer your charges?
  - type: text
    content: God always answers, one way or another,
  - type: text
    content: even when people don’t recognize his presence.
  '15':
  - type: text
    content: “In a dream, for instance, a vision at night,
  - type: text
    content: when men and women are deep in sleep,
  - type: text
    content: fast asleep in their beds—
  - type: text
    content: God opens their ears
  - type: text
    content: and impresses them with warnings
  - type: text
    content: To turn them back from something bad they’re planning,
  - type: text
    content: from some reckless choice,
  - type: text
    content: And keep them from an early grave,
  - type: text
    content: from the river of no return.
  '19':
  - type: text
    content: “Or, God might get their attention through pain,
  - type: text
    content: by throwing them on a bed of suffering,
  - type: text
    content: So they can’t stand the sight of food,
  - type: text
    content: have no appetite for their favorite treats.
  - type: text
    content: They lose weight, wasting away to nothing,
  - type: text
    content: reduced to a bag of bones.
  - type: text
    content: They hang on the cliff-edge of death,
  - type: text
    content: knowing the next breath may be their last.
  '23':
  - type: text
    content: “But even then an angel could come,
  - type: text
    content: a champion—there are thousands of them!—
  - type: text
    content: to take up your cause,
  - type: text
    content: A messenger who would mercifully intervene,
  - type: text
    content: 'canceling the death sentence with the words:'
  - type: text
    content: ‘I’ve come up with the ransom!’
  - type: text
    content: Before you know it, you’re healed,
  - type: text
    content: the very picture of health!
  '26':
  - type: text
    content: “Or, you may fall on your knees and pray—to God’s delight!
  - type: text
    content: You’ll see God’s smile and celebrate,
  - type: text
    content: finding yourself set right with God.
  - type: text
    content: You’ll sing God’s praises to everyone you meet,
  - type: text
    content: testifying, ‘I messed up my life—
  - type: text
    content: and let me tell you, it wasn’t worth it.
  - type: text
    content: But God stepped in and saved me from certain death.
  - type: text
    content: I’m alive again! Once more I see the light!’
  '29':
  - type: text
    content: “This is the way God works.
  - type: text
    content: Over and over again
  - type: text
    content: He pulls our souls back from certain destruction
  - type: text
    content: 'so we’ll see the light—and '
  - type: text
    content: 'live '
  - type: text
    content: in the light!
  '31':
  - type: text
    content: “Keep listening, Job.
  - type: text
    content: Don’t interrupt—I’m not finished yet.
  - type: text
    content: But if you think of anything I should know, tell me.
  - type: text
    content: There’s nothing I’d like better than to see your name cleared.
  - type: text
    content: Meanwhile, keep listening. Don’t distract me with interruptions.
  - type: text
    content: I’m going to teach you the basics of wisdom.”
  '5':
  - type: text
    content: “And if you think you can prove me wrong, do it.
  - type: text
    content: Lay out your arguments. Stand up for yourself!
  - type: text
    content: Look, I’m human—no better than you;
  - type: text
    content: we’re both made of the same kind of mud.
  - type: text
    content: So let’s work this through together;
  - type: text
    content: don’t let my aggressiveness overwhelm you.
  '8':
  - type: text
    content: “Here’s what you said.
  - type: text
    content: I heard you say it with my own ears.
  - type: text
    content: You said, ‘I’m pure—I’ve done nothing wrong.
  - type: text
    content: Believe me, I’m clean—my conscience is clear.
  - type: text
    content: But God keeps picking on me;
  - type: text
    content: he treats me like I’m his enemy.
  - type: text
    content: He’s thrown me in jail;
  - type: text
    content: he keeps me under constant surveillance.’
