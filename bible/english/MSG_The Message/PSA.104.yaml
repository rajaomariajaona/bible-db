document_id: PSA.104,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-14a
    - type: text
      text: ' O my soul, bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my God, how great you are!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beautifully, gloriously robed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dressed up in sunshine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all heaven stretched out for your tent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You built your palace on the ocean deeps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made a chariot out of clouds and took off on wind-wings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You commandeered winds as messengers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: appointed fire and flame as ambassadors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set earth on a firm foundation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that nothing can shake it, ever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You blanketed earth with ocean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: covered the mountains with deep waters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you roared and the water ran away—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your thunder crash put it to flight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountains pushed up, valleys spread out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the places you assigned them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set boundaries between earth and sea;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again will earth be flooded.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You started the springs and rivers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sent them flowing among the hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the wild animals now drink their fill,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wild donkeys quench their thirst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Along the riverbanks the birds build nests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ravens make their voices heard.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You water the mountains from your heavenly reservoirs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: earth is supplied with plenty of water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make grass grow for the livestock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hay for the animals that plow the ground.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14b-23
    - type: text
      text: ' Oh yes, God brings grain from the land,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wine to make people happy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their faces glowing with health,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a people well-fed and hearty.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s trees are well-watered—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lebanon cedars he planted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Birds build their nests in those trees;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look—the stork at home in the treetop.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountain goats climb about the cliffs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: badgers burrow among the rocks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The moon keeps track of the seasons,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sun is in charge of each day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When it’s dark and night takes over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the forest creatures come out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young lions roar for their prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clamoring to God for their supper.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the sun comes up, they vanish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lazily stretched out in their dens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Meanwhile, men and women go out to work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: busy at their jobs until evening.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-30
    - type: text
      text: 'What a wildly wonderful world, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You made it all, with Wisdom at your side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made earth overflow with your wonderful creations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, look—the deep, wide sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brimming with fish past counting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sardines and sharks and salmon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ships plow those waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Leviathan, your pet dragon, romps in them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the creatures look expectantly to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to give them their meals on time.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You come, and they gather around;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you open your hand and they eat from it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you turned your back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’d die in a minute—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take back your Spirit and they die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: revert to original mud;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send out your Spirit and they spring to life—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the whole countryside in bloom and blossom.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 31-32
    - type: text
      text: 'The glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —let it last forever!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' enjoy his creation!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He takes one look at earth and triggers an earthquake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: points a finger at the mountains, and volcanoes erupt.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-35
    - type: text
      text: 'Oh, let me sing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' all my life long,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sing hymns to my God as long as I live!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, let my song please him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’m so pleased to be singing to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But clear the ground of sinners—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no more godless men and women!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O my soul, bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
