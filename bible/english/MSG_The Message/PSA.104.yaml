document_id: PSA.104,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' O my soul, bless '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: God
  - type: text
    content: ', my God, how great you are!'
  - type: text
    content: beautifully, gloriously robed,
  - type: text
    content: Dressed up in sunshine,
  - type: text
    content: and all heaven stretched out for your tent.
  - type: text
    content: You built your palace on the ocean deeps,
  - type: text
    content: made a chariot out of clouds and took off on wind-wings.
  - type: text
    content: You commandeered winds as messengers,
  - type: text
    content: appointed fire and flame as ambassadors.
  - type: text
    content: You set earth on a firm foundation
  - type: text
    content: so that nothing can shake it, ever.
  - type: text
    content: You blanketed earth with ocean,
  - type: text
    content: covered the mountains with deep waters;
  - type: text
    content: Then you roared and the water ran away—
  - type: text
    content: your thunder crash put it to flight.
  - type: text
    content: Mountains pushed up, valleys spread out
  - type: text
    content: in the places you assigned them.
  - type: text
    content: You set boundaries between earth and sea;
  - type: text
    content: never again will earth be flooded.
  - type: text
    content: You started the springs and rivers,
  - type: text
    content: sent them flowing among the hills.
  - type: text
    content: All the wild animals now drink their fill,
  - type: text
    content: wild donkeys quench their thirst.
  - type: text
    content: Along the riverbanks the birds build nests,
  - type: text
    content: ravens make their voices heard.
  - type: text
    content: You water the mountains from your heavenly reservoirs;
  - type: text
    content: earth is supplied with plenty of water.
  - type: text
    content: You make grass grow for the livestock,
  - type: text
    content: hay for the animals that plow the ground.
  '14':
  - type: text
    content: ' Oh yes, God brings grain from the land,'
  - type: text
    content: wine to make people happy,
  - type: text
    content: Their faces glowing with health,
  - type: text
    content: a people well-fed and hearty.
  - type: text
    content: God
  - type: text
    content: ’s trees are well-watered—
  - type: text
    content: the Lebanon cedars he planted.
  - type: text
    content: Birds build their nests in those trees;
  - type: text
    content: look—the stork at home in the treetop.
  - type: text
    content: Mountain goats climb about the cliffs;
  - type: text
    content: badgers burrow among the rocks.
  - type: text
    content: The moon keeps track of the seasons,
  - type: text
    content: the sun is in charge of each day.
  - type: text
    content: When it’s dark and night takes over,
  - type: text
    content: all the forest creatures come out.
  - type: text
    content: The young lions roar for their prey,
  - type: text
    content: clamoring to God for their supper.
  - type: text
    content: When the sun comes up, they vanish,
  - type: text
    content: lazily stretched out in their dens.
  - type: text
    content: Meanwhile, men and women go out to work,
  - type: text
    content: busy at their jobs until evening.
  '24':
  - type: text
    content: 'What a wildly wonderful world, '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: You made it all, with Wisdom at your side,
  - type: text
    content: made earth overflow with your wonderful creations.
  - type: text
    content: Oh, look—the deep, wide sea,
  - type: text
    content: brimming with fish past counting,
  - type: text
    content: sardines and sharks and salmon.
  - type: text
    content: Ships plow those waters,
  - type: text
    content: and Leviathan, your pet dragon, romps in them.
  - type: text
    content: All the creatures look expectantly to you
  - type: text
    content: to give them their meals on time.
  - type: text
    content: You come, and they gather around;
  - type: text
    content: you open your hand and they eat from it.
  - type: text
    content: If you turned your back,
  - type: text
    content: they’d die in a minute—
  - type: text
    content: Take back your Spirit and they die,
  - type: text
    content: revert to original mud;
  - type: text
    content: Send out your Spirit and they spring to life—
  - type: text
    content: the whole countryside in bloom and blossom.
  '31':
  - type: text
    content: 'The glory of '
  - type: text
    content: God
  - type: text
    content: —let it last forever!
  - type: text
    content: 'Let '
  - type: text
    content: God
  - type: text
    content: ' enjoy his creation!'
  - type: text
    content: He takes one look at earth and triggers an earthquake,
  - type: text
    content: points a finger at the mountains, and volcanoes erupt.
  '33':
  - type: text
    content: 'Oh, let me sing to '
  - type: text
    content: God
  - type: text
    content: ' all my life long,'
  - type: text
    content: sing hymns to my God as long as I live!
  - type: text
    content: Oh, let my song please him;
  - type: text
    content: 'I’m so pleased to be singing to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: But clear the ground of sinners—
  - type: text
    content: no more godless men and women!
  - type: text
    content: 'O my soul, bless '
  - type: text
    content: God
  - type: text
    content: '!'
