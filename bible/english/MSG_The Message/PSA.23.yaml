verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my shepherd!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I don’t need a thing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have bedded me down in lush meadows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you find me quiet pools to drink from.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: True to your word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you let me catch my breath
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and send me in the right direction.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even when the way goes through
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Death Valley,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m not afraid
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you walk at my side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your trusty shepherd’s crook
  - type: usfm
    marker: q2
    children:
    - type: text
      text: makes me feel secure.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You serve me a six-course dinner
  - type: usfm
    marker: q2
    children:
    - type: text
      text: right in front of my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You revive my drooping head;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my cup brims with blessing.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your beauty and love chase after me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every day of my life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m back home in the house of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the rest of my life.
