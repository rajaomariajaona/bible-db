document_id: PSA.23,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', my shepherd!'
  - type: text
    content: I don’t need a thing.
  - type: text
    content: You have bedded me down in lush meadows,
  - type: text
    content: you find me quiet pools to drink from.
  - type: text
    content: True to your word,
  - type: text
    content: you let me catch my breath
  - type: text
    content: and send me in the right direction.
  '4':
  - type: text
    content: Even when the way goes through
  - type: text
    content: Death Valley,
  - type: text
    content: I’m not afraid
  - type: text
    content: when you walk at my side.
  - type: text
    content: Your trusty shepherd’s crook
  - type: text
    content: makes me feel secure.
  '5':
  - type: text
    content: You serve me a six-course dinner
  - type: text
    content: right in front of my enemies.
  - type: text
    content: You revive my drooping head;
  - type: text
    content: my cup brims with blessing.
  '6':
  - type: text
    content: Your beauty and love chase after me
  - type: text
    content: every day of my life.
  - type: text
    content: 'I’m back home in the house of '
  - type: text
    content: God
  - type: text
    content: for the rest of my life.
