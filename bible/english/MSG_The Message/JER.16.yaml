  - type: text
    content: Can mortals manufacture gods?
  - type: text
    content: Their factories turn out no-gods!
  '2':
  - type: text
    content: “Jeremiah, don’t get married. Don’t raise a family here. I have signed the death warrant on all the children born in this country, the mothers who bear them and the fathers who beget them—an epidemic of death. Death unlamented, the dead unburied, dead bodies decomposing and stinking like dung, all the killed and starved corpses served up as meals for carrion crows and mongrel dogs!”
  '21':
  - type: text
    content: “Watch closely now. I’m going to teach these wrongheaded people.
  - type: text
