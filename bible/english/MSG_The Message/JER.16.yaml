document_id: JER.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Can Mortals Manufacture Gods?
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to me:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: “Jeremiah, don’t get married. Don’t raise a family here. I have signed the death warrant on all the children born in this country, the mothers who bear them and the fathers who beget them—an epidemic of death. Death unlamented, the dead unburied, dead bodies decomposing and stinking like dung, all the killed and starved corpses served up as meals for carrion crows and mongrel dogs!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' continued: “Don’t enter a house where there’s mourning. Don’t go to the funeral. Don’t sympathize. I’ve quit caring about what happens to this people.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree. “No more loyal love on my part, no more compassion. The famous and obscure will die alike here, unlamented and unburied. No funerals will be conducted, no one will give them a second thought, no one will care, no one will say, ‘I’m sorry,’ no one will so much as offer a cup of tea, not even for the mother or father.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “And if there happens to be a feast celebrated, don’t go there either to enjoy the festivities.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies, the God of Israel, says, “Watch this! I’m about to banish smiles and laughter from this place. No more brides and bridegrooms celebrating. And I’m doing it in your lifetime, before your very eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-13
  - type: text
    text: '“When you tell this to the people and they ask, ‘Why is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' talking this way, threatening us with all these calamities? We’re not criminals, after all. What have we done to our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to be treated like this?’ tell them this: ‘It’s because your ancestors left me, walked off and never looked back. They took up with the no-gods, worshiped and doted on them, and ignored me and wouldn’t do a thing I told them. And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you’re
  - type: text
    text: ' even '
  - type: usfm
    marker: it
    children:
    - type: text
      text: worse
  - type: text
    text: '! Take a good look in the mirror—each of you doing whatever you want, whenever you want, refusing to pay attention to me. And for this I’m getting rid of you, throwing you out in the cold, into a far and strange country. You can worship your precious no-gods there to your heart’s content. Rest assured, I won’t bother you anymore.’'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: '“On the other hand, don’t miss this: The time is coming when no one will say any longer, ‘As sure as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, the God who delivered Israel from Egypt.’ What they’ll say is, ‘As sure as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, the God who brought Israel back from the land of the north, brought them back from all the places where he’d scattered them.’ That’s right, I’m going to bring them back to the land I first gave to their ancestors.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: '“Now, watch for what comes next: I’m going to assemble a bunch of fishermen.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree! “They’ll go fishing for my people and pull them in for judgment. Then I’ll send out a party of hunters, and they’ll hunt them out in all the mountains, hills, and caves. I’m watching their every move. I haven’t lost track of a single one of them, neither them nor their sins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “They won’t get by with a thing. They’ll pay double for everything they did wrong. They’ve made a complete mess of things, littering their lives with their obscene no-gods, leaving piles of stinking god-junk all over the place.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my strength, my stronghold,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'my safe retreat when trouble descends:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The godless nations will come
- type: usfm
  marker: q2
  children:
  - type: text
    text: from earth’s four corners, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our ancestors lived on lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: useless illusions, all smoke.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can mortals manufacture gods?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their factories turn out no-gods!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Watch closely now. I’m going to teach these wrongheaded people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Starting right now, I’m going to teach them
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who I am and what I do,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'teach them the meaning of my name, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—‘I '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Am
  - type: text
    text: .’”
