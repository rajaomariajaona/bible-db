  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' continued: “Don’t enter a house where there’s mourning. Don’t go to the funeral. Don’t sympathize. I’ve quit caring about what happens to this people.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree. “No more loyal love on my part, no more compassion. The famous and obscure will die alike here, unlamented and unburied. No funerals will be conducted, no one will give them a second thought, no one will care, no one will say, ‘I’m sorry,’ no one will so much as offer a cup of tea, not even for the mother or father.
  '8':
  - type: text
    content: “And if there happens to be a feast celebrated, don’t go there either to enjoy the festivities.”
