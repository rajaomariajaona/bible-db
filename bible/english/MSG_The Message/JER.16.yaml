  '10':
  - type: text
    content: '“When you tell this to the people and they ask, ‘Why is '
  - type: text
    content: God
  - type: text
    content: ' talking this way, threatening us with all these calamities? We’re not criminals, after all. What have we done to our '
  - type: text
    content: God
  - type: text
    content: ' to be treated like this?’ tell them this: ‘It’s because your ancestors left me, walked off and never looked back. They took up with the no-gods, worshiped and doted on them, and ignored me and wouldn’t do a thing I told them. And '
  - type: text
    content: you’re
  - type: text
    content: ' even '
  - type: text
    content: worse
  - type: text
    content: '! Take a good look in the mirror—each of you doing whatever you want, whenever you want, refusing to pay attention to me. And for this I’m getting rid of you, throwing you out in the cold, into a far and strange country. You can worship your precious no-gods there to your heart’s content. Rest assured, I won’t bother you anymore.’'
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: '“On the other hand, don’t miss this: The time is coming when no one will say any longer, ‘As sure as '
  - type: text
    content: God
  - type: text
    content: ' lives, the God who delivered Israel from Egypt.’ What they’ll say is, ‘As sure as '
  - type: text
    content: God
  - type: text
    content: ' lives, the God who brought Israel back from the land of the north, brought them back from all the places where he’d scattered them.’ That’s right, I’m going to bring them back to the land I first gave to their ancestors.'
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: '“Now, watch for what comes next: I’m going to assemble a bunch of fishermen.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree! “They’ll go fishing for my people and pull them in for judgment. Then I’ll send out a party of hunters, and they’ll hunt them out in all the mountains, hills, and caves. I’m watching their every move. I haven’t lost track of a single one of them, neither them nor their sins.
  '18':
  - type: text
    content: “They won’t get by with a thing. They’ll pay double for everything they did wrong. They’ve made a complete mess of things, littering their lives with their obscene no-gods, leaving piles of stinking god-junk all over the place.”
