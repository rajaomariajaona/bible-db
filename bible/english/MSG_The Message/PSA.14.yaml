document_id: PSA.14,97
type_code: eng
verses:
  '1':
  - type: text
    content: Bilious and bloated, they gas,
  - type: text
    content: “God is gone.”
  - type: text
    content: Their words are poison gas,
  - type: text
    content: fouling the air; they poison
  - type: text
    content: Rivers and skies;
  - type: text
    content: thistles are their cash crop.
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' sticks his head out of heaven.'
  - type: text
    content: He looks around.
  - type: text
    content: He’s looking for someone not stupid—
  - type: text
    content: one man, even, God-expectant,
  - type: text
    content: just one God-ready woman.
  '3':
  - type: text
    content: He comes up empty. A string
  - type: text
    content: of zeros. Useless, unshepherded
  - type: text
    content: Sheep, taking turns pretending
  - type: text
    content: to be Shepherd.
  - type: text
    content: The ninety and nine
  - type: text
    content: follow their fellow.
  '4':
  - type: text
    content: Don’t they know anything,
  - type: text
    content: all these predators?
  - type: text
    content: Don’t they know
  - type: text
    content: they can’t get away with this—
  - type: text
    content: Treating people like a fast-food meal
  - type: text
    content: over which they’re too busy to pray?
  '5':
  - type: text
    content: Night is coming for them, and nightmares,
  - type: text
    content: for God takes the side of victims.
  - type: text
    content: Do you think you can mess
  - type: text
    content: with the dreams of the poor?
  - type: text
    content: You can’t, for God
  - type: text
    content: makes their dreams come true.
  '7':
  - type: text
    content: Is there anyone around to save Israel?
  - type: text
    content: 'Yes. God is around; '
  - type: text
    content: God
  - type: text
    content: ' turns life around.'
  - type: text
    content: Turned-around Jacob skips rope,
  - type: text
    content: turned-around Israel sings laughter.
