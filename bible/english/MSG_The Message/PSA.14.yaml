document_id: PSA.14
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Bilious and bloated, they gas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “God is gone.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their words are poison gas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fouling the air; they poison
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rivers and skies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: thistles are their cash crop.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sticks his head out of heaven.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He looks around.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s looking for someone not stupid—
- type: usfm
  marker: q2
  children:
  - type: text
    text: one man, even, God-expectant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just one God-ready woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He comes up empty. A string
- type: usfm
  marker: q2
  children:
  - type: text
    text: of zeros. Useless, unshepherded
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sheep, taking turns pretending
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be Shepherd.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The ninety and nine
- type: usfm
  marker: q2
  children:
  - type: text
    text: follow their fellow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t they know anything,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all these predators?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t they know
- type: usfm
  marker: q2
  children:
  - type: text
    text: they can’t get away with this—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Treating people like a fast-food meal
- type: usfm
  marker: q2
  children:
  - type: text
    text: over which they’re too busy to pray?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: Night is coming for them, and nightmares,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for God takes the side of victims.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think you can mess
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the dreams of the poor?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can’t, for God
- type: usfm
  marker: q2
  children:
  - type: text
    text: makes their dreams come true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Is there anyone around to save Israel?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Yes. God is around; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' turns life around.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turned-around Jacob skips rope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turned-around Israel sings laughter.
