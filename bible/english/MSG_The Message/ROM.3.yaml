document_id: ROM.3,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' So what difference does it make who’s a Jew and who isn’t, who has been trained in God’s ways and who hasn’t? As it turns out, it makes a lot of difference—but not the difference so many have assumed.'
  '2':
  - type: text
    content: ' First, there’s the matter of being put in charge of writing down and caring for God’s revelation, these Holy Scriptures. So, what if, in the course of doing that, some of those Jews abandoned their post? God didn’t abandon them. Do you think their faithlessness cancels out his faithfulness? Not on your life! Depend on it: God keeps his word even when the whole world is lying through its teeth. Scripture says the same:'
  - type: text
    content: Your words stand fast and true;
  - type: text
    content: Rejection doesn’t faze you.
  - type: text
    content: 'But if our wrongdoing only underlines and confirms God’s rightdoing, shouldn’t we be commended for helping out? Since our lies don’t even make a dent in his truth, isn’t it wrong of God to back us to the wall and hold us to our word? These questions come up. The answer to such questions is '
  - type: text
    content: no
  - type: text
    content: ', a most emphatic '
  - type: text
    content: No!
  - type: text
    content: ' How else would things ever get straightened out if '
  - type: text
    content: God
  - type: text
    content: ' didn’t do the straightening?'
  '21':
  - type: text
    content: But in our time something new has been added. What Moses and the prophets witnessed to all those years has happened. The God-setting-things-right that we read about has become Jesus-setting-things-right for us. And not only for us, but for everyone who believes in him. For there is no difference between us and them in this. Since we’ve compiled this long and sorry record as sinners (both us and them) and proved that we are utterly incapable of living the glorious lives God wills for us, God did it for us. Out of sheer generosity he put us in right standing with himself. A pure gift. He got us out of the mess we’re in and restored us to where he always wanted us to be. And he did it by means of Jesus Christ.
  '25':
  - type: text
    content: 'God sacrificed Jesus on the altar of the world to clear that world of sin. Having faith in him sets us in the clear. God decided on this course of action in full view of the public—to set the world in the clear with himself through the sacrifice of Jesus, finally taking care of the sins he had so patiently endured. This is not only clear, but it’s '
  - type: text
    content: now
  - type: text
    content: —this is current history! God sets things right. He also makes it possible for us to live in his rightness.
  '27':
  - type: text
    content: 'So where does that leave our proud Jewish insider claims and counterclaims? Canceled? Yes, canceled. What we’ve learned is this: God does not respond to what '
  - type: text
    content: we
  - type: text
    content: ' do; we respond to what '
  - type: text
    content: God
  - type: text
    content: ' does. We’ve finally figured it out. Our lives get in step with God and all others by letting him set the pace, not by proudly or anxiously trying to run the parade.'
  '29':
  - type: text
    content: And where does that leave our proud Jewish claim of having a corner on God? Also canceled. God is the God of outsider non-Jews as well as insider Jews. How could it be otherwise since there is only one God? God sets right all who welcome his action and enter into it, both those who follow our religious system and those who have never heard of our religion.
  '31':
  - type: text
    content: 'But by shifting our focus from what '
  - type: text
    content: we
  - type: text
    content: ' do to what '
  - type: text
    content: God
  - type: text
    content: ' does, don’t we cancel out all our careful keeping of the rules and ways God commanded? Not at all. What happens, in fact, is that by putting that entire way of life in its proper place, we confirm it.'
  '7':
  - type: text
    content: It’s simply perverse to say, “If my lies serve to show off God’s truth all the more gloriously, why blame me? I’m doing God a favor.” Some people are actually trying to put such words in our mouths, claiming that we go around saying, “The more evil we do, the more good God does, so let’s just do it!” That’s pure slander, as I’m sure you’ll agree.
  - type: heading
    content: We’re All in the Same Sinking Boat
  '9':
  - type: text
    content: 'So where does that put us? Do we Jews get a better break than the others? Not really. Basically, all of us, whether insiders or outsiders, start out in identical conditions, which is to say that we all start out as sinners. Scripture leaves no doubt about it:'
  - type: text
    content: There’s nobody living right, not even one,
  - type: text
    content: nobody who knows the score, nobody alert for God.
  - type: text
    content: They’ve all taken the wrong turn;
  - type: text
    content: they’ve all wandered down blind alleys.
  - type: text
    content: No one’s living right;
  - type: text
    content: I can’t find a single one.
  - type: text
    content: Their throats are gaping graves,
  - type: text
    content: their tongues slick as mudslides.
  - type: text
    content: Every word they speak is tinged with poison.
  - type: text
    content: They open their mouths and pollute the air.
  - type: text
    content: They race for the honor of sinner-of-the-year,
  - type: text
    content: litter the land with heartbreak and ruin,
  - type: text
    content: Don’t know the first thing about living with others.
  - type: text
    content: They never give God the time of day.
  - type: text
    content: 'This makes it clear, doesn’t it, that whatever is written in these Scriptures is not what God says '
  - type: text
    content: about others
  - type: text
    content: ' but '
  - type: text
    content: to us
  - type: text
    content: ' to whom these Scriptures were addressed in the first place! And it’s clear enough, isn’t it, that we’re sinners, every one of us, in the same sinking boat with everybody else? Our involvement with God’s revelation doesn’t put us right with God. What it does is force us to face our complicity in everyone else’s sin.'
  - type: heading
    content: God Has Set Things Right
