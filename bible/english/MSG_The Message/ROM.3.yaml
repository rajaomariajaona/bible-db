document_id: ROM.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' So what difference does it make who’s a Jew and who isn’t, who has been trained in God’s ways and who hasn’t? As it turns out, it makes a lot of difference—but not the difference so many have assumed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-6
  - type: text
    text: ' First, there’s the matter of being put in charge of writing down and caring for God’s revelation, these Holy Scriptures. So, what if, in the course of doing that, some of those Jews abandoned their post? God didn’t abandon them. Do you think their faithlessness cancels out his faithfulness? Not on your life! Depend on it: God keeps his word even when the whole world is lying through its teeth. Scripture says the same:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your words stand fast and true;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rejection doesn’t faze you.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'But if our wrongdoing only underlines and confirms God’s rightdoing, shouldn’t we be commended for helping out? Since our lies don’t even make a dent in his truth, isn’t it wrong of God to back us to the wall and hold us to our word? These questions come up. The answer to such questions is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no
  - type: text
    text: ', a most emphatic '
  - type: usfm
    marker: it
    children:
    - type: text
      text: No!
  - type: text
    text: ' How else would things ever get straightened out if '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' didn’t do the straightening?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: It’s simply perverse to say, “If my lies serve to show off God’s truth all the more gloriously, why blame me? I’m doing God a favor.” Some people are actually trying to put such words in our mouths, claiming that we go around saying, “The more evil we do, the more good God does, so let’s just do it!” That’s pure slander, as I’m sure you’ll agree.
- type: usfm
  marker: s1
  children:
  - type: text
    text: We’re All in the Same Sinking Boat
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-20
  - type: text
    text: 'So where does that put us? Do we Jews get a better break than the others? Not really. Basically, all of us, whether insiders or outsiders, start out in identical conditions, which is to say that we all start out as sinners. Scripture leaves no doubt about it:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s nobody living right, not even one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nobody who knows the score, nobody alert for God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ve all taken the wrong turn;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ve all wandered down blind alleys.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one’s living right;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t find a single one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their throats are gaping graves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their tongues slick as mudslides.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every word they speak is tinged with poison.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They open their mouths and pollute the air.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They race for the honor of sinner-of-the-year,
- type: usfm
  marker: q2
  children:
  - type: text
    text: litter the land with heartbreak and ruin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t know the first thing about living with others.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They never give God the time of day.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'This makes it clear, doesn’t it, that whatever is written in these Scriptures is not what God says '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about others
  - type: text
    text: ' but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to us
  - type: text
    text: ' to whom these Scriptures were addressed in the first place! And it’s clear enough, isn’t it, that we’re sinners, every one of us, in the same sinking boat with everybody else? Our involvement with God’s revelation doesn’t put us right with God. What it does is force us to face our complicity in everyone else’s sin.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Has Set Things Right
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: But in our time something new has been added. What Moses and the prophets witnessed to all those years has happened. The God-setting-things-right that we read about has become Jesus-setting-things-right for us. And not only for us, but for everyone who believes in him. For there is no difference between us and them in this. Since we’ve compiled this long and sorry record as sinners (both us and them) and proved that we are utterly incapable of living the glorious lives God wills for us, God did it for us. Out of sheer generosity he put us in right standing with himself. A pure gift. He got us out of the mess we’re in and restored us to where he always wanted us to be. And he did it by means of Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'God sacrificed Jesus on the altar of the world to clear that world of sin. Having faith in him sets us in the clear. God decided on this course of action in full view of the public—to set the world in the clear with himself through the sacrifice of Jesus, finally taking care of the sins he had so patiently endured. This is not only clear, but it’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: now
  - type: text
    text: —this is current history! God sets things right. He also makes it possible for us to live in his rightness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: 'So where does that leave our proud Jewish insider claims and counterclaims? Canceled? Yes, canceled. What we’ve learned is this: God does not respond to what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we
  - type: text
    text: ' do; we respond to what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' does. We’ve finally figured it out. Our lives get in step with God and all others by letting him set the pace, not by proudly or anxiously trying to run the parade.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: And where does that leave our proud Jewish claim of having a corner on God? Also canceled. God is the God of outsider non-Jews as well as insider Jews. How could it be otherwise since there is only one God? God sets right all who welcome his action and enter into it, both those who follow our religious system and those who have never heard of our religion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But by shifting our focus from what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we
  - type: text
    text: ' do to what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' does, don’t we cancel out all our careful keeping of the rules and ways God commanded? Not at all. What happens, in fact, is that by putting that entire way of life in its proper place, we confirm it.'
