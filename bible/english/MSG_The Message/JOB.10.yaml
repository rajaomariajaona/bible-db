document_id: JOB.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: To Find Some Skeleton in My Closet
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “I can’t stand my life—I hate it!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m putting it all out on the table,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the bitterness of my life—I’m holding back nothing.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-7
  - type: text
    text: 'Job prayed:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Here’s what I want to say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t, God, bring in a verdict of guilty
- type: usfm
  marker: q2
  children:
  - type: text
    text: without letting me know the charges you’re bringing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How does this fit into what you once called ‘good’—
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving me a hard time, spurning me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a life you shaped by your very own hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then blessing the plots of the wicked?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You don’t look at things the way we mortals do.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re not taken in by appearances, are you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Unlike us, you’re not working against a deadline.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have all eternity to work things out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So what’s this all about, anyway—this compulsion
- type: usfm
  marker: q2
  children:
  - type: text
    text: to dig up some dirt, to find some skeleton in my closet?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You know good and well I’m not guilty.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You also know no one can help me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: “You made me like a handcrafted piece of pottery—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now are you going to smash me to pieces?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t you remember how beautifully you worked my clay?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you reduce me now to a mud pie?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, that marvel of conception as you stirred together
- type: usfm
  marker: q2
  children:
  - type: text
    text: semen and ovum—
- type: usfm
  marker: q1
  children:
  - type: text
    text: What a miracle of skin and bone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: muscle and brain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You gave me life itself, and incredible love.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You watched and guarded every breath I took.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: “But you never told me about this part.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I should have known that there was more to it—
- type: usfm
  marker: q1
  children:
  - type: text
    text: That if I so much as missed a step, you’d notice and pounce,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wouldn’t let me get by with a thing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I’m truly guilty, I’m doomed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But if I’m innocent, it’s no better—I’m still doomed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My belly is full of bitterness.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m up to my ears in a swamp of affliction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I try to make the best of it, try to brave it out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you’re too much for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: relentless, like a lion on the prowl.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You line up fresh witnesses against me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You compound your anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pile on the grief and pain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-22
  - type: text
    text: “So why did you have me born?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I wish no one had ever laid eyes on me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I wish I’d never lived—a stillborn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: buried without ever having breathed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isn’t it time to call it quits on my life?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can’t you let up, and let me smile just once
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before I die and am buried,
- type: usfm
  marker: q2
  children:
  - type: text
    text: before I’m nailed into my coffin, sealed in the ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And banished for good to the land of the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blind in the final dark?”
