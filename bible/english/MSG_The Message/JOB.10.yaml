document_id: JOB.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: To Find Some Skeleton in My Closet
  - type: text
    content: “I can’t stand my life—I hate it!
  - type: text
    content: I’m putting it all out on the table,
  - type: text
    content: all the bitterness of my life—I’m holding back nothing.”
  '13':
  - type: text
    content: “But you never told me about this part.
  - type: text
    content: I should have known that there was more to it—
  - type: text
    content: That if I so much as missed a step, you’d notice and pounce,
  - type: text
    content: wouldn’t let me get by with a thing.
  - type: text
    content: If I’m truly guilty, I’m doomed.
  - type: text
    content: But if I’m innocent, it’s no better—I’m still doomed.
  - type: text
    content: My belly is full of bitterness.
  - type: text
    content: I’m up to my ears in a swamp of affliction.
  - type: text
    content: I try to make the best of it, try to brave it out,
  - type: text
    content: but you’re too much for me,
  - type: text
    content: relentless, like a lion on the prowl.
  - type: text
    content: You line up fresh witnesses against me.
  - type: text
    content: You compound your anger
  - type: text
    content: and pile on the grief and pain!
  '18':
  - type: text
    content: “So why did you have me born?
  - type: text
    content: I wish no one had ever laid eyes on me!
  - type: text
    content: I wish I’d never lived—a stillborn,
  - type: text
    content: buried without ever having breathed.
  - type: text
    content: Isn’t it time to call it quits on my life?
  - type: text
    content: Can’t you let up, and let me smile just once
  - type: text
    content: Before I die and am buried,
  - type: text
    content: before I’m nailed into my coffin, sealed in the ground,
  - type: text
    content: And banished for good to the land of the dead,
  - type: text
    content: blind in the final dark?”
  '2':
  - type: text
    content: 'Job prayed:'
  - type: text
    content: '“Here’s what I want to say:'
  - type: text
    content: Don’t, God, bring in a verdict of guilty
  - type: text
    content: without letting me know the charges you’re bringing.
  - type: text
    content: How does this fit into what you once called ‘good’—
  - type: text
    content: giving me a hard time, spurning me,
  - type: text
    content: a life you shaped by your very own hands,
  - type: text
    content: and then blessing the plots of the wicked?
  - type: text
    content: You don’t look at things the way we mortals do.
  - type: text
    content: You’re not taken in by appearances, are you?
  - type: text
    content: Unlike us, you’re not working against a deadline.
  - type: text
    content: You have all eternity to work things out.
  - type: text
    content: So what’s this all about, anyway—this compulsion
  - type: text
    content: to dig up some dirt, to find some skeleton in my closet?
  - type: text
    content: You know good and well I’m not guilty.
  - type: text
    content: You also know no one can help me.
  '8':
  - type: text
    content: “You made me like a handcrafted piece of pottery—
  - type: text
    content: and now are you going to smash me to pieces?
  - type: text
    content: Don’t you remember how beautifully you worked my clay?
  - type: text
    content: Will you reduce me now to a mud pie?
  - type: text
    content: Oh, that marvel of conception as you stirred together
  - type: text
    content: semen and ovum—
  - type: text
    content: What a miracle of skin and bone,
  - type: text
    content: muscle and brain!
  - type: text
    content: You gave me life itself, and incredible love.
  - type: text
    content: You watched and guarded every breath I took.
