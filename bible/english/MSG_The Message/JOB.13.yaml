document_id: JOB.13,97
type_code: eng
verses:
  '1':
  - type: heading
    content: I’m Taking My Case to God
  - type: text
    content: “Yes, I’ve seen all this with my own eyes,
  - type: text
    content: heard and understood it with my very own ears.
  - type: text
    content: Everything you know, I know,
  - type: text
    content: so I’m not taking a backseat to any of you.
  - type: text
    content: I’m taking my case straight to God Almighty;
  - type: text
    content: I’ve had it with you—I’m going directly to God.
  - type: text
    content: You graffiti my life with lies.
  - type: text
    content: You’re a bunch of pompous quacks!
  - type: text
    content: I wish you’d shut your mouths—
  - type: text
    content: silence is your only claim to wisdom.
  '13':
  - type: text
    content: “So hold your tongue while I have my say,
  - type: text
    content: then I’ll take whatever I have coming to me.
  - type: text
    content: Why do I go out on a limb like this
  - type: text
    content: and take my life in my hands?
  - type: text
    content: Because even if he killed me, I’d keep on hoping.
  - type: text
    content: I’d defend my innocence to the very end.
  - type: text
    content: Just wait, this is going to work out for the best—my salvation!
  - type: text
    content: If I were guilt-stricken do you think I’d be doing this—
  - type: text
    content: laying myself on the line before God?
  - type: text
    content: You’d better pay attention to what I’m telling you,
  - type: text
    content: listen carefully with both ears.
  - type: text
    content: Now that I’ve laid out my defense,
  - type: text
    content: I’m sure that I’ll be acquitted.
  - type: text
    content: Can anyone prove charges against me?
  - type: text
    content: I’ve said my piece. I rest my case.
  - type: heading
    content: Why Does God Stay Hidden and Silent?
  '20':
  - type: text
    content: “Please, God, I have two requests;
  - type: text
    content: 'grant them so I’ll know I count with you:'
  - type: text
    content: First, lay off the afflictions;
  - type: text
    content: the terror is too much for me.
  - type: text
    content: Second, address me directly so I can answer you,
  - type: text
    content: or let me speak and then you answer me.
  - type: text
    content: How many sins have been charged against me?
  - type: text
    content: Show me the list—how bad is it?
  - type: text
    content: Why do you stay hidden and silent?
  - type: text
    content: Why treat me like I’m your enemy?
  - type: text
    content: Why kick me around like an old tin can?
  - type: text
    content: Why beat a dead horse?
  - type: text
    content: You compile a long list of mean things about me,
  - type: text
    content: even hold me accountable for the sins of my youth.
  - type: text
    content: You hobble me so I can’t move about.
  - type: text
    content: You watch every move I make,
  - type: text
    content: and brand me as a dangerous character.
  '28':
  - type: text
    content: “Like something rotten, human life fast decomposes,
  - type: text
    content: like a moth-eaten shirt or a mildewed blouse.”
  '6':
  - type: text
    content: “Listen now while I make my case,
  - type: text
    content: consider my side of things for a change.
  - type: text
    content: Or are you going to keep on lying ‘to do God a service’?
  - type: text
    content: to make up stories ‘to get him off the hook’?
  - type: text
    content: Why do you always take his side?
  - type: text
    content: Do you think he needs a lawyer to defend himself?
  - type: text
    content: How would you fare if you were in the witness stand?
  - type: text
    content: 'Your lies might convince a jury—but would they convince '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: He’d reprimand you on the spot
  - type: text
    content: if he detected a bias in your witness.
  - type: text
    content: Doesn’t his splendor put you in awe?
  - type: text
    content: Aren’t you afraid to speak cheap lies before him?
  - type: text
    content: Your wise sayings are knickknack wisdom,
  - type: text
    content: good for nothing but gathering dust.
