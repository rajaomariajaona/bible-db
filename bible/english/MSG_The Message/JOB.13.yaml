document_id: JOB.13,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I’m Taking My Case to God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: “Yes, I’ve seen all this with my own eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: heard and understood it with my very own ears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything you know, I know,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I’m not taking a backseat to any of you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m taking my case straight to God Almighty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve had it with you—I’m going directly to God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You graffiti my life with lies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re a bunch of pompous quacks!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wish you’d shut your mouths—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: silence is your only claim to wisdom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-19
    - type: text
      text: “So hold your tongue while I have my say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I’ll take whatever I have coming to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do I go out on a limb like this
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take my life in my hands?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because even if he killed me, I’d keep on hoping.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’d defend my innocence to the very end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just wait, this is going to work out for the best—my salvation!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If I were guilt-stricken do you think I’d be doing this—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: laying myself on the line before God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’d better pay attention to what I’m telling you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen carefully with both ears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now that I’ve laid out my defense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m sure that I’ll be acquitted.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can anyone prove charges against me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve said my piece. I rest my case.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Why Does God Stay Hidden and Silent?
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-27
    - type: text
      text: “Please, God, I have two requests;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'grant them so I’ll know I count with you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: First, lay off the afflictions;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the terror is too much for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Second, address me directly so I can answer you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let me speak and then you answer me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How many sins have been charged against me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Show me the list—how bad is it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you stay hidden and silent?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why treat me like I’m your enemy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why kick me around like an old tin can?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why beat a dead horse?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You compile a long list of mean things about me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even hold me accountable for the sins of my youth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You hobble me so I can’t move about.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You watch every move I make,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brand me as a dangerous character.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “Like something rotten, human life fast decomposes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a moth-eaten shirt or a mildewed blouse.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-12
    - type: text
      text: “Listen now while I make my case,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consider my side of things for a change.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or are you going to keep on lying ‘to do God a service’?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to make up stories ‘to get him off the hook’?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you always take his side?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you think he needs a lawyer to defend himself?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How would you fare if you were in the witness stand?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Your lies might convince a jury—but would they convince '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’d reprimand you on the spot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if he detected a bias in your witness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doesn’t his splendor put you in awe?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Aren’t you afraid to speak cheap lies before him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wise sayings are knickknack wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good for nothing but gathering dust.
