document_id: 1KI.21
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'And then, to top it off, came this: Naboth the Jezreelite owned a vineyard in Jezreel that bordered the palace of Ahab king of Samaria. One day Ahab spoke to Naboth, saying, “Give me your vineyard so I can use it as a kitchen garden; it’s right next to my house—so convenient. In exchange I’ll give you a far better vineyard, or if you’d prefer I’ll pay you money for it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'But Naboth told Ahab, “Not on your life! So help me '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', I’d never sell the family farm to you!” Ahab went home in a black mood, sulking over Naboth the Jezreelite’s words, “I’ll never turn over my family inheritance to you.” He went to bed, stuffed his face in his pillow, and refused to eat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jezebel his wife came to him. She said, “What’s going on? Why are you so out of sorts and refusing to eat?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He told her, “Because I spoke to Naboth the Jezreelite. I said, ‘Give me your vineyard—I’ll pay you for it or, if you’d rather, I’ll give you another vineyard in exchange.’ And he said, ‘I’ll never give you my vineyard.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jezebel said, “Is this any way for a king of Israel to act? Aren’t you the boss? On your feet! Eat! Cheer up! I’ll take care of this; I’ll get the vineyard of this Naboth the Jezreelite for you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: She wrote letters over Ahab’s signature, stamped them with his official seal, and sent them to the elders in Naboth’s city and to the civic leaders. She wrote “Call for a fast day and put Naboth at the head table. Then seat a couple of stool pigeons across from him who, in front of everybody will say, ‘You! You blasphemed God and the king!’ Then they’ll throw him out and stone him to death.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: And they did it. The men of the city—the elders and civic leaders—followed Jezebel’s instructions that she wrote in the letters sent to them. They called for a fast day and seated Naboth at the head table. Then they brought in two stool pigeons and seated them opposite Naboth. In front of everybody the two degenerates accused him, “He blasphemed God and the king!” The company threw him out in the street, stoned him mercilessly, and he died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When Jezebel got word that Naboth had been stoned to death, she told Ahab, “Go for it, Ahab—take the vineyard of Naboth the Jezreelite for your own, the vineyard he refused to sell you. Naboth is no more; Naboth is dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The minute Ahab heard that Naboth was dead, he set out for the vineyard of Naboth the Jezreelite and claimed it for his own.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-19
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stepped in and spoke to Elijah the Tishbite, “On your feet; go down and confront Ahab of Samaria, king of Israel. You’ll find him in the vineyard of Naboth; he’s gone there to claim it as his own. Say this to him: ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s word: What’s going on here? First murder, then theft?’ Then tell him, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s verdict: The very spot where the dogs lapped up Naboth’s blood, they’ll lap up your blood—that’s right, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' blood.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: Ahab answered Elijah, “My enemy! So, you’ve run me down!”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Yes, I’ve found you out,” said Elijah. “And because you’ve bought into the business of evil, defying '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. ‘I will most certainly bring doom upon you, make mincemeat of your descendants, kill off every sorry male wretch who’s even remotely connected with the name Ahab. And I’ll bring down on you the same fate that fell on Jeroboam son of Nebat and Baasha son of Ahijah—you’ve made me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' angry by making Israel sin.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'As for Jezebel, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “Dogs will fight over the flesh of Jezebel all over Jezreel. Anyone tainted by Ahab who dies in the city will be eaten by stray dogs; corpses in the country will be eaten by carrion crows.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'Ahab, pushed by his wife Jezebel and in open defiance of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', set an all-time record in making big business of evil. He indulged in outrageous obscenities in the world of idols, copying the Amorites whom '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had earlier kicked out of Israelite territory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: When Ahab heard what Elijah had to say, he ripped his clothes to shreds, dressed in penitential rough burlap, and fasted. He even slept in coarse burlap pajamas. He tiptoed around, quiet as a mouse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke to Elijah the Tishbite: “Do you see how penitently submissive Ahab has become to me? Because of his repentance I’ll not bring the doom during his lifetime; Ahab’s son, though, will get it.”'
