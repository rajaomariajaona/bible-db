document_id: 1KI.21,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'And then, to top it off, came this: Naboth the Jezreelite owned a vineyard in Jezreel that bordered the palace of Ahab king of Samaria. One day Ahab spoke to Naboth, saying, “Give me your vineyard so I can use it as a kitchen garden; it’s right next to my house—so convenient. In exchange I’ll give you a far better vineyard, or if you’d prefer I’ll pay you money for it.”'
  '11':
  - type: text
    content: And they did it. The men of the city—the elders and civic leaders—followed Jezebel’s instructions that she wrote in the letters sent to them. They called for a fast day and seated Naboth at the head table. Then they brought in two stool pigeons and seated them opposite Naboth. In front of everybody the two degenerates accused him, “He blasphemed God and the king!” The company threw him out in the street, stoned him mercilessly, and he died.
  '15':
  - type: text
    content: When Jezebel got word that Naboth had been stoned to death, she told Ahab, “Go for it, Ahab—take the vineyard of Naboth the Jezreelite for your own, the vineyard he refused to sell you. Naboth is no more; Naboth is dead.”
  '16':
  - type: text
    content: The minute Ahab heard that Naboth was dead, he set out for the vineyard of Naboth the Jezreelite and claimed it for his own.
  '17':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' stepped in and spoke to Elijah the Tishbite, “On your feet; go down and confront Ahab of Samaria, king of Israel. You’ll find him in the vineyard of Naboth; he’s gone there to claim it as his own. Say this to him: ‘'
  - type: text
    content: God
  - type: text
    content: '’s word: What’s going on here? First murder, then theft?’ Then tell him, ‘'
  - type: text
    content: God
  - type: text
    content: '’s verdict: The very spot where the dogs lapped up Naboth’s blood, they’ll lap up your blood—that’s right, '
  - type: text
    content: your
  - type: text
    content: ' blood.’”'
  '20':
  - type: text
    content: Ahab answered Elijah, “My enemy! So, you’ve run me down!”
  - type: text
    content: '“Yes, I’ve found you out,” said Elijah. “And because you’ve bought into the business of evil, defying '
  - type: text
    content: God
  - type: text
    content: '. ‘I will most certainly bring doom upon you, make mincemeat of your descendants, kill off every sorry male wretch who’s even remotely connected with the name Ahab. And I’ll bring down on you the same fate that fell on Jeroboam son of Nebat and Baasha son of Ahijah—you’ve made me '
  - type: text
    content: that
  - type: text
    content: ' angry by making Israel sin.’”'
  '23':
  - type: text
    content: 'As for Jezebel, '
  - type: text
    content: God
  - type: text
    content: ' said, “Dogs will fight over the flesh of Jezebel all over Jezreel. Anyone tainted by Ahab who dies in the city will be eaten by stray dogs; corpses in the country will be eaten by carrion crows.”'
  '25':
  - type: text
    content: 'Ahab, pushed by his wife Jezebel and in open defiance of '
  - type: text
    content: God
  - type: text
    content: ', set an all-time record in making big business of evil. He indulged in outrageous obscenities in the world of idols, copying the Amorites whom '
  - type: text
    content: God
  - type: text
    content: ' had earlier kicked out of Israelite territory.'
  '27':
  - type: text
    content: When Ahab heard what Elijah had to say, he ripped his clothes to shreds, dressed in penitential rough burlap, and fasted. He even slept in coarse burlap pajamas. He tiptoed around, quiet as a mouse.
  '28':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' spoke to Elijah the Tishbite: “Do you see how penitently submissive Ahab has become to me? Because of his repentance I’ll not bring the doom during his lifetime; Ahab’s son, though, will get it.”'
  '3':
  - type: text
    content: 'But Naboth told Ahab, “Not on your life! So help me '
  - type: text
    content: God
  - type: text
    content: ', I’d never sell the family farm to you!” Ahab went home in a black mood, sulking over Naboth the Jezreelite’s words, “I’ll never turn over my family inheritance to you.” He went to bed, stuffed his face in his pillow, and refused to eat.'
  '5':
  - type: text
    content: Jezebel his wife came to him. She said, “What’s going on? Why are you so out of sorts and refusing to eat?”
  '6':
  - type: text
    content: He told her, “Because I spoke to Naboth the Jezreelite. I said, ‘Give me your vineyard—I’ll pay you for it or, if you’d rather, I’ll give you another vineyard in exchange.’ And he said, ‘I’ll never give you my vineyard.’”
  '7':
  - type: text
    content: Jezebel said, “Is this any way for a king of Israel to act? Aren’t you the boss? On your feet! Eat! Cheer up! I’ll take care of this; I’ll get the vineyard of this Naboth the Jezreelite for you.”
  '8':
  - type: text
    content: She wrote letters over Ahab’s signature, stamped them with his official seal, and sent them to the elders in Naboth’s city and to the civic leaders. She wrote “Call for a fast day and put Naboth at the head table. Then seat a couple of stool pigeons across from him who, in front of everybody will say, ‘You! You blasphemed God and the king!’ Then they’ll throw him out and stone him to death.”
