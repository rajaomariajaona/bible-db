  - type: text
    text: 'What a beautiful home, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve always longed to live in a place like this,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Always dreamed of a room in your house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where I could sing for joy to God-alive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Birds find nooks and crannies in your house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sparrows and swallows make nests there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They lay their eggs and raise their young,
- type: usfm
  marker: q2
  children:
  - type: text
    text: singing their songs in the place where we worship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies! King! God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How blessed they are to live and sing there!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: And how blessed all those in whom you live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose lives become roads you travel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They wind through lonesome valleys, come upon brooks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: discover cool springs and pools brimming with rain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God-traveled, these roads curve up the mountain, and
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the last turn—Zion! God in full view!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, listen:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God of Jacob, open your ears—I’m praying!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at our shields, glistening in the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our faces, shining with your gracious anointing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: One day spent in your house, this beautiful place of worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: beats thousands spent on Greek island beaches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’d rather scrub floors in the house of my God
- type: usfm
  marker: q2
  children:
  - type: text
    text: than be honored as a guest in the palace of sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All sunshine and sovereign is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: generous in gifts and glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He doesn’t scrimp with his traveling companions.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'It’s smooth sailing all the way with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies.
