document_id: PSA.84,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'What a beautiful home, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: text
    content: I’ve always longed to live in a place like this,
  - type: text
    content: Always dreamed of a room in your house,
  - type: text
    content: where I could sing for joy to God-alive!
  '10':
  - type: text
    content: One day spent in your house, this beautiful place of worship,
  - type: text
    content: beats thousands spent on Greek island beaches.
  - type: text
    content: I’d rather scrub floors in the house of my God
  - type: text
    content: than be honored as a guest in the palace of sin.
  - type: text
    content: 'All sunshine and sovereign is '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: generous in gifts and glory.
  - type: text
    content: He doesn’t scrimp with his traveling companions.
  - type: text
    content: 'It’s smooth sailing all the way with '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.
  '3':
  - type: text
    content: Birds find nooks and crannies in your house,
  - type: text
    content: sparrows and swallows make nests there.
  - type: text
    content: They lay their eggs and raise their young,
  - type: text
    content: singing their songs in the place where we worship.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies! King! God!
  - type: text
    content: How blessed they are to live and sing there!
  '5':
  - type: text
    content: And how blessed all those in whom you live,
  - type: text
    content: whose lives become roads you travel;
  - type: text
    content: They wind through lonesome valleys, come upon brooks,
  - type: text
    content: discover cool springs and pools brimming with rain!
  - type: text
    content: God-traveled, these roads curve up the mountain, and
  - type: text
    content: at the last turn—Zion! God in full view!
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, listen:'
  - type: text
    content: O God of Jacob, open your ears—I’m praying!
  - type: text
    content: Look at our shields, glistening in the sun,
  - type: text
    content: our faces, shining with your gracious anointing.
