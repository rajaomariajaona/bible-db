document_id: 1KI.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'After Solomon had completed building The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and his own palace, all the projects he had set his heart on doing, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' appeared to Solomon again, just as he had appeared to him at Gibeon.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: 'At the end of twenty years, having built the two buildings, The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and his personal palace, Solomon rewarded Hiram king of Tyre with a gift of twenty villages in the district of Galilee. Hiram had provided him with all the cedar and cypress and gold that he had wanted. But when Hiram left Tyre to look over the villages that Solomon had given him, he didn’t like what he saw.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: He said, “What kind of reward is this, my friend? Twenty backwoods hick towns!” People still refer to them that way. This is all Hiram got from Solomon in exchange for four and a half tons of gold!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is the work record of the labor force that King Solomon raised to build The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', his palace, the defense complex (the Millo), the Jerusalem wall, and the fortified cities of Hazor, Megiddo, and Gezer.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17a
    - type: text
      text: ' Pharaoh king of Egypt had come up and captured Gezer, torched it, and killed all the Canaanites who lived there. He gave it as a wedding present to his daughter, Solomon’s wife. So Solomon rebuilt Gezer.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17b-19
    - type: text
      text: ' He also built Lower Beth Horon, Baalath, and Tamar in the desert, back-country storehouse villages, and villages for chariots and horses. Solomon built widely and extravagantly in Jerusalem, in Lebanon, and wherever he fancied.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-23
    - type: text
      text: The remnants from the original inhabitants of the land (Amorites, Hittites, Perizzites, Hivites, and Jebusites—all non-Israelites), survivors of the holy wars, were rounded up by Solomon for his gangs of slave labor, a policy still in effect. But true Israelites were not treated this way; they were used in his army and administration—government leaders and commanders of his chariots and charioteers. They were also the project managers responsible for Solomon’s building operations—550 of them in charge of the workforce.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: It was after Pharaoh’s daughter ceremonially ascended from the City of David and took up residence in the house built especially for her that Solomon built the defense complex (the Millo).
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Three times a year Solomon worshiped at the Altar of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', sacrificing Whole-Burnt-Offerings and Peace-Offerings, and burning incense in the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Everything that had to do with The Temple he did generously and well; he didn’t skimp.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-28
    - type: text
      text: And ships! King Solomon also built ships at Ezion Geber, located near Elath in Edom on the Red Sea. Hiram sent seaworthy sailors to assist Solomon’s men with the fleet. They embarked for Ophir, brought back sixteen tons of gold, and presented it to King Solomon.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to him, “I’ve listened to and received all your prayers, your ever-so-passionate prayers. I’ve sanctified this Temple that you have built: My Name is stamped on it forever; my eyes are on it and my heart in it always. As for you, if you live in my presence as your father David lived, pure in heart and action, living the life I’ve set out for you, attentively obedient to my guidance and judgments, then I’ll back your kingly rule over Israel, make it a sure thing on a solid foundation. The same guarantee I gave David your father I’m giving you: ‘You can count on always having a descendant on Israel’s throne.’'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-9
    - type: text
      text: '“But if you or your sons betray me, ignoring my guidance and judgments, taking up with alien gods by serving and worshiping them, then the guarantee is off: I’ll wipe Israel right off the map and repudiate this Temple I’ve just sanctified to honor my Name. And Israel will become nothing but a bad joke among the peoples of the world. And this Temple, splendid as it now is, will become an object of contempt; visitors will shake their heads, saying, ‘Whatever happened here? What’s the story behind these ruins?’ Then they’ll be told, ‘The people who used to live here betrayed their '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the very God who rescued their ancestors from Egypt; they took up with alien gods, worshiping and serving them. That’s what’s behind this '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -visited devastation.’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
