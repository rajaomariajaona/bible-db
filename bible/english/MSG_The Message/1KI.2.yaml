document_id: 1KI.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: 'When David’s time to die approached, he charged his son Solomon, saying, “I’m about to go the way of all the earth, but you—be strong; show what you’re made of! Do what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' tells you. Walk in the paths he shows you: Follow the life-map absolutely, keep an eye out for the signposts, his course for life set out in the revelation to Moses; then you’ll get on well in whatever you do and wherever you go. Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will confirm what he promised me when he said, ‘If your sons watch their step, staying true to me heart and soul, you’ll always have a successor on Israel’s throne.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: “And don’t forget what Joab son of Zeruiah did to the two commanders of Israel’s army, to Abner son of Ner and to Amasa son of Jether. He murdered them in cold blood, acting in peacetime as if he were at war, and has been stained with that blood ever since. Do what you think best with him, but by no means let him get off scot-free—make him pay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “But be generous to the sons of Barzillai the Gileadite—extend every hospitality to them; that’s the way they treated me when I was running for my life from Absalom your brother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: '“You also will have to deal with Shimei son of Gera the Benjaminite from Bahurim, the one who cursed me so viciously when I was on my way to Mahanaim. Later, when he welcomed me back at the Jordan, I promised him under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', ‘I won’t put you to death.’ But neither should you treat him as if nothing ever happened. You’re wise, you know how to handle these things. You’ll know what to do to make him pay before he dies.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: Then David joined his ancestors. He was buried in the City of David. David ruled Israel for forty years—seven years in Hebron and another thirty-three in Jerusalem. Solomon took over on the throne of his father David; he had a firm grip on the kingdom.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Adonijah son of Haggith came to Bathsheba, Solomon’s mother. She said, “Do you come in peace?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “In peace.” And then, “May I say something to you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Go ahead,” she said, “speak.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: “You know that I had the kingdom right in my hands and everyone expected me to be king, and then the whole thing backfired and the kingdom landed in my brother’s lap—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s doing. So now I have one request to ask of you; please don’t refuse me.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Go ahead, ask,” she said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Ask King Solomon—he won’t turn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' down—to give me Abishag the Shunammite as my wife.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Certainly,” said Bathsheba. “I’ll speak to the king for you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Bathsheba went to King Solomon to present Adonijah’s request. The king got up and welcomed her, bowing respectfully, and returned to his throne. Then he had a throne put in place for his mother, and she sat at his right hand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: She said, “I have a small favor to ask of you. Don’t refuse me.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The king replied, “Go ahead, Mother; of course I won’t refuse you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: She said, “Give Abishag the Shunammite to your brother Adonijah as his wife.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: King Solomon answered his mother, “What kind of favor is this, asking that Abishag the Shunammite be given to Adonijah? Why don’t you just ask me to hand over the whole kingdom to him on a platter since he is my older brother and has Abiathar the priest and Joab son of Zeruiah on his side!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'Then King Solomon swore under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', “May God do his worst to me if Adonijah doesn’t pay for this with his life! As surely as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, the God who has set me firmly on the throne of my father David and has put me in charge of the kingdom just as he promised, Adonijah will die for this—today!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: King Solomon dispatched Benaiah son of Jehoiada; he struck Adonijah and he died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The king then told Abiathar the priest, “You’re exiled to your place in Anathoth. You deserve death but I’m not going to kill you—for now anyway—because you were in charge of the Chest of our ruling '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in the company of David my father, and because you shared all the hard times with my father.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Solomon stripped Abiathar of his priesthood, fulfilling '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s word at Shiloh regarding the family of Eli.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: 'When this news reached Joab, this Joab who had conspired with Adonijah (although he had remained loyal in the Absalom affair), he took refuge in the sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', seizing the horns of the Altar and holding on for dear life. King Solomon was told that Joab had escaped to the sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and was clinging to the Altar; he immediately sent Benaiah son of Jehoiada with orders, “Kill him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Benaiah went to the sanctuary of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and said, “King’s orders: Come out.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “No—I’ll die right here.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Benaiah went back to the king and reported, “This was Joab’s answer.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-33
  - type: text
    text: 'The king said, “Go ahead then, do what he says: Kill him and bury him. Absolve me and my father’s family of the guilt from Joab’s senseless murders. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is avenging those bloody murders on Joab’s head. Two men he murdered, men better by far than he ever was: Behind my father’s back he brutally murdered Abner son of Ner, commander of Israel’s army, and Amasa son of Jether, commander of Judah’s army. Responsibility for their murders is forever fixed on Joab and his descendants; but for David and his descendants, his family and kingdom, the final verdict is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s peace.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: So Benaiah son of Jehoiada went back, struck Joab, and killed him. He was buried in his family plot out in the desert. The king appointed Benaiah son of Jehoiada over the army in place of Joab, and replaced Abiathar with Zadok the priest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: The king next called in Shimei and told him, “Build yourself a house in Jerusalem and live there, but you are not to leave the area. If you so much as cross the Brook Kidron, you’re as good as dead—you will have decreed your own death sentence.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Shimei answered the king, “Oh, thank you! Your servant will do exactly as my master the king says.” Shimei lived in Jerusalem a long time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: But it so happened that three years later, two of Shimei’s slaves ran away to Achish son of Maacah, king of Gath. Shimei was told, “Your slaves are in Gath.” Shimei sprang into action, saddled his donkey, and went to Achish in Gath looking for his slaves. And then he came back, bringing his slaves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Solomon was told, “Shimei left Jerusalem for Gath, and now he’s back.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: 'Solomon then called for Shimei and said, “Didn’t I make you promise me under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and give you a good warning besides, that you would not leave this area? That if you left you would have decreed your own death sentence? And didn’t you say, ‘Oh, thank you—I’ll do exactly as you say’? So why didn’t you keep your sacred promise and do what I ordered?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 44-45
  - type: text
    text: 'Then the king told Shimei, “Deep in your heart you know all the evil that you did to my father David; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will now avenge that evil on you. But King Solomon will be blessed and the rule of David will be a sure thing under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' forever.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: The king then gave orders to Benaiah son of Jehoiada; he went out and struck Shimei dead.
- type: usfm
  marker: p
  children:
  - type: text
    text: The kingdom was now securely in Solomon’s grasp.
