document_id: PSA.63,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God—you’re my God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can’t get enough of you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve worked up such hunger and thirst for God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: traveling across dry and weary deserts.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So here I am in the place of worship, eyes open,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drinking in your strength and glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your generous love I am really living at last!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My lips brim praises like fountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I bless you every time I take a breath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My arms wave like banners of praise to you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I eat my fill of prime rib and gravy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I smack my lips. It’s time to shout praises!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I’m sleepless at midnight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I spend the hours in grateful reflection.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you’ve always stood up for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m free to run and play.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hold on to you for dear life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you hold me steady as a post.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who are out to get me are marked for doom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: marked for death, bound for hell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll die violent deaths;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: jackals will tear them limb from limb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the king is glad in God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his true friends spread the joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While small-minded gossips
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are gagged for good.
