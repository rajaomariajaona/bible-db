document_id: PSA.63,97
type_code: eng
verses:
  '1':
  - type: text
    content: God—you’re my God!
  - type: text
    content: I can’t get enough of you!
  - type: text
    content: I’ve worked up such hunger and thirst for God,
  - type: text
    content: traveling across dry and weary deserts.
  '2':
  - type: text
    content: So here I am in the place of worship, eyes open,
  - type: text
    content: drinking in your strength and glory.
  - type: text
    content: In your generous love I am really living at last!
  - type: text
    content: My lips brim praises like fountains.
  - type: text
    content: I bless you every time I take a breath;
  - type: text
    content: My arms wave like banners of praise to you.
  '5':
  - type: text
    content: I eat my fill of prime rib and gravy;
  - type: text
    content: I smack my lips. It’s time to shout praises!
  - type: text
    content: If I’m sleepless at midnight,
  - type: text
    content: I spend the hours in grateful reflection.
  - type: text
    content: Because you’ve always stood up for me,
  - type: text
    content: I’m free to run and play.
  - type: text
    content: I hold on to you for dear life,
  - type: text
    content: and you hold me steady as a post.
  '9':
  - type: text
    content: Those who are out to get me are marked for doom,
  - type: text
    content: marked for death, bound for hell.
  - type: text
    content: They’ll die violent deaths;
  - type: text
    content: jackals will tear them limb from limb.
  - type: text
    content: But the king is glad in God;
  - type: text
    content: his true friends spread the joy,
  - type: text
    content: While small-minded gossips
  - type: text
    content: are gagged for good.
