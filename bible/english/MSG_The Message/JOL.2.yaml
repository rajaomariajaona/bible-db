document_id: JOL.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Locust Army
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Blow the ram’s horn trumpet in Zion!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Trumpet the alarm on my holy mountain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shake the country up!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Judgment’s on its way—the Day’s almost here!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A black day! A Doomsday!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Clouds with no silver lining!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like dawn light moving over the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a huge army is coming.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s never been anything like it
- type: usfm
  marker: q2
  children:
  - type: text
    text: and never will be again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wildfire burns everything before this army
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fire licks up everything in its wake.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before it arrives, the country is like the Garden of Eden.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When it leaves, it is Death Valley.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nothing escapes unscathed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: The locust army seems all horses—
- type: usfm
  marker: q2
  children:
  - type: text
    text: galloping horses, an army of horses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It sounds like thunder
- type: usfm
  marker: q2
  children:
  - type: text
    text: leaping on mountain ridges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or like the roar of wildfire
- type: usfm
  marker: q2
  children:
  - type: text
    text: through grass and brush,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or like an invincible army shouting for blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready to fight, straining at the bit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At the sight of this army,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people panic, faces white with terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-11
  - type: text
    text: The invaders charge.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They climb barricades. Nothing stops them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each soldier does what he’s told,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so disciplined, so determined.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They don’t get in each other’s way.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Each one knows his job and does it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Undaunted and fearless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: unswerving, unstoppable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They storm the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: swarm its defenses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loot the houses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: breaking down doors, smashing windows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They arrive like an earthquake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweep through like a tornado.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sun and moon turn out their lights,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stars black out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' himself bellows in thunder'
- type: usfm
  marker: q2
  children:
  - type: text
    text: as he commands his forces.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at the size of that army!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the strength of those who obey him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Judgment Day—great and terrible.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can possibly survive this?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Change Your Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But there’s also this, it’s not too late—
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s personal Message!—
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come back to me and really mean it!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come fasting and weeping, sorry for your sins!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Change your life, not just your clothes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Come back to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' God.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And here’s why: God is kind and merciful.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He takes a deep breath, puts up with a lot,
- type: usfm
  marker: q1
  children:
  - type: text
    text: This most patient God, extravagant in love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always ready to cancel catastrophe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who knows? Maybe he’ll do it now,
- type: usfm
  marker: q2
  children:
  - type: text
    text: maybe he’ll turn around and show pity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maybe, when all’s said and done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'there’ll be blessings full and robust for your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: Blow the ram’s horn trumpet in Zion!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Declare a day of repentance, a holy fast day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Call a public meeting.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Get everyone there. Consecrate the congregation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make sure the elders come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but bring in the children, too, even the nursing babies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even men and women on their honeymoon—
- type: usfm
  marker: q2
  children:
  - type: text
    text: interrupt them and get them there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Between Sanctuary entrance and altar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'let the priests, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s servants, weep tears of repentance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let them intercede: “Have mercy, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', on your people!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t abandon your heritage to contempt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let the pagans take over and rule them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sneer, ‘And so where is this God of theirs?’”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: 'At that, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' went into action to get his land back.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He took pity on his people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered and spoke to his people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“Look, listen—I’m sending a gift:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grain and wine and olive oil.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The fast is over—eat your fill!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I won’t expose you any longer
- type: usfm
  marker: q2
  children:
  - type: text
    text: to contempt among the pagans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll head off the final enemy coming out of the north
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dump them in a wasteland.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Half of them will end up in the Dead Sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the other half in the Mediterranean.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There they’ll rot, a stench to high heaven.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The bigger the enemy, the stronger the stench!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Trees Are Bearing Fruit Again
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: Fear not, Earth! Be glad and celebrate!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done great things.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fear not, wild animals!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The fields and meadows are greening up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The trees are bearing fruit again:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a bumper crop of fig trees and vines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Children of Zion, celebrate!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Be glad in your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s giving you a teacher
- type: usfm
  marker: q2
  children:
  - type: text
    text: to train you how to live right—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teaching, like rain out of heaven, showers of words
- type: usfm
  marker: q2
  children:
  - type: text
    text: to refresh and nourish your soul, just as he used to do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And plenty of food for your body—silos full of grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: casks of wine and barrels of olive oil.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: “I’ll make up for the years of the locust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the great locust devastation—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Locusts savage, locusts deadly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fierce locusts, locusts of doom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That great locust invasion
- type: usfm
  marker: q2
  children:
  - type: text
    text: I sent your way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll eat your fill of good food.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You’ll be full of praises to your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: The God who has set you back on your heels in wonder.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Never again will my people be despised.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll know without question
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I’m in the thick of life with Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'That I’m your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', yes, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one and only real God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never again will my people be despised.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sun Turning Black and the Moon Blood-Red
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-32
  - type: text
    text: '“And that’s just the beginning: After that—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will pour out my Spirit
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'on every kind of people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons will prophesy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: also your daughters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your old men will dream,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your young men will see visions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll even pour out my Spirit on the servants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: men and women both.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll set wonders in the sky above
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and signs on the earth below:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blood and fire and billowing smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sun turning black and the moon blood-red,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Before the Judgment Day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Day tremendous and awesome.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Whoever calls, ‘Help, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!’'
- type: usfm
  marker: q2
  children:
  - type: text
    text: gets help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On Mount Zion and in Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'there will be a great rescue—just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Included in the survivors
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'are those that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' calls.”'
