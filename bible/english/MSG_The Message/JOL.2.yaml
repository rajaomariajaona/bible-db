document_id: JOL.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Locust Army
  - type: text
    content: Blow the ram’s horn trumpet in Zion!
  - type: text
    content: Trumpet the alarm on my holy mountain!
  - type: text
    content: Shake the country up!
  - type: text
    content: God
  - type: text
    content: ’s Judgment’s on its way—the Day’s almost here!
  - type: text
    content: A black day! A Doomsday!
  - type: text
    content: Clouds with no silver lining!
  - type: text
    content: Like dawn light moving over the mountains,
  - type: text
    content: a huge army is coming.
  - type: text
    content: There’s never been anything like it
  - type: text
    content: and never will be again.
  - type: text
    content: Wildfire burns everything before this army
  - type: text
    content: and fire licks up everything in its wake.
  - type: text
    content: Before it arrives, the country is like the Garden of Eden.
  - type: text
    content: When it leaves, it is Death Valley.
  - type: text
    content: Nothing escapes unscathed.
  '12':
  - type: text
    content: But there’s also this, it’s not too late—
  - type: text
    content: God
  - type: text
    content: ’s personal Message!—
  - type: text
    content: “Come back to me and really mean it!
  - type: text
    content: Come fasting and weeping, sorry for your sins!”
  '13':
  - type: text
    content: Change your life, not just your clothes.
  - type: text
    content: 'Come back to '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: text
    content: your
  - type: text
    content: ' God.'
  - type: text
    content: 'And here’s why: God is kind and merciful.'
  - type: text
    content: He takes a deep breath, puts up with a lot,
  - type: text
    content: This most patient God, extravagant in love,
  - type: text
    content: always ready to cancel catastrophe.
  - type: text
    content: Who knows? Maybe he’ll do it now,
  - type: text
    content: maybe he’ll turn around and show pity.
  - type: text
    content: Maybe, when all’s said and done,
  - type: text
    content: 'there’ll be blessings full and robust for your '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: Blow the ram’s horn trumpet in Zion!
  - type: text
    content: Declare a day of repentance, a holy fast day.
  - type: text
    content: Call a public meeting.
  - type: text
    content: Get everyone there. Consecrate the congregation.
  - type: text
    content: Make sure the elders come,
  - type: text
    content: but bring in the children, too, even the nursing babies,
  - type: text
    content: Even men and women on their honeymoon—
  - type: text
    content: interrupt them and get them there.
  - type: text
    content: Between Sanctuary entrance and altar,
  - type: text
    content: 'let the priests, '
  - type: text
    content: God
  - type: text
    content: ’s servants, weep tears of repentance.
  - type: text
    content: 'Let them intercede: “Have mercy, '
  - type: text
    content: God
  - type: text
    content: ', on your people!'
  - type: text
    content: Don’t abandon your heritage to contempt.
  - type: text
    content: Don’t let the pagans take over and rule them
  - type: text
    content: and sneer, ‘And so where is this God of theirs?’”
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: 'At that, '
  - type: text
    content: God
  - type: text
    content: ' went into action to get his land back.'
  - type: text
    content: He took pity on his people.
  - type: text
    content: God
  - type: text
    content: ' answered and spoke to his people,'
  - type: text
    content: '“Look, listen—I’m sending a gift:'
  - type: text
    content: Grain and wine and olive oil.
  - type: text
    content: The fast is over—eat your fill!
  - type: text
    content: I won’t expose you any longer
  - type: text
    content: to contempt among the pagans.
  - type: text
    content: I’ll head off the final enemy coming out of the north
  - type: text
    content: and dump them in a wasteland.
  - type: text
    content: Half of them will end up in the Dead Sea,
  - type: text
    content: the other half in the Mediterranean.
  - type: text
    content: There they’ll rot, a stench to high heaven.
  - type: text
    content: The bigger the enemy, the stronger the stench!”
  - type: heading
    content: The Trees Are Bearing Fruit Again
  '21':
  - type: text
    content: Fear not, Earth! Be glad and celebrate!
  - type: text
    content: God
  - type: text
    content: ' has done great things.'
  - type: text
    content: Fear not, wild animals!
  - type: text
    content: The fields and meadows are greening up.
  - type: text
    content: 'The trees are bearing fruit again:'
  - type: text
    content: a bumper crop of fig trees and vines!
  - type: text
    content: Children of Zion, celebrate!
  - type: text
    content: 'Be glad in your '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: He’s giving you a teacher
  - type: text
    content: to train you how to live right—
  - type: text
    content: Teaching, like rain out of heaven, showers of words
  - type: text
    content: to refresh and nourish your soul, just as he used to do.
  - type: text
    content: And plenty of food for your body—silos full of grain,
  - type: text
    content: casks of wine and barrels of olive oil.
  - type: text
    content: '* * *'
  '25':
  - type: text
    content: “I’ll make up for the years of the locust,
  - type: text
    content: the great locust devastation—
  - type: text
    content: Locusts savage, locusts deadly,
  - type: text
    content: fierce locusts, locusts of doom,
  - type: text
    content: That great locust invasion
  - type: text
    content: I sent your way.
  - type: text
    content: You’ll eat your fill of good food.
  - type: text
    content: 'You’ll be full of praises to your '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: The God who has set you back on your heels in wonder.
  - type: text
    content: Never again will my people be despised.
  - type: text
    content: You’ll know without question
  - type: text
    content: that I’m in the thick of life with Israel,
  - type: text
    content: 'That I’m your '
  - type: text
    content: God
  - type: text
    content: ', yes, '
  - type: text
    content: 'your '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the one and only real God.
  - type: text
    content: Never again will my people be despised.
  - type: heading
    content: The Sun Turning Black and the Moon Blood-Red
  '28':
  - type: text
    content: '“And that’s just the beginning: After that—'
  - type: text
    content: “I will pour out my Spirit
  - type: text
    content: 'on every kind of people:'
  - type: text
    content: Your sons will prophesy,
  - type: text
    content: also your daughters.
  - type: text
    content: Your old men will dream,
  - type: text
    content: your young men will see visions.
  - type: text
    content: I’ll even pour out my Spirit on the servants,
  - type: text
    content: men and women both.
  - type: text
    content: I’ll set wonders in the sky above
  - type: text
    content: 'and signs on the earth below:'
  - type: text
    content: Blood and fire and billowing smoke,
  - type: text
    content: the sun turning black and the moon blood-red,
  - type: text
    content: 'Before the Judgment Day of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: the Day tremendous and awesome.
  - type: text
    content: 'Whoever calls, ‘Help, '
  - type: text
    content: God
  - type: text
    content: '!’'
  - type: text
    content: gets help.
  - type: text
    content: On Mount Zion and in Jerusalem
  - type: text
    content: 'there will be a great rescue—just as '
  - type: text
    content: God
  - type: text
    content: ' said.'
  - type: text
    content: Included in the survivors
  - type: text
    content: 'are those that '
  - type: text
    content: God
  - type: text
    content: ' calls.”'
  '4':
  - type: text
    content: The locust army seems all horses—
  - type: text
    content: galloping horses, an army of horses.
  - type: text
    content: It sounds like thunder
  - type: text
    content: leaping on mountain ridges,
  - type: text
    content: Or like the roar of wildfire
  - type: text
    content: through grass and brush,
  - type: text
    content: Or like an invincible army shouting for blood,
  - type: text
    content: ready to fight, straining at the bit.
  - type: text
    content: At the sight of this army,
  - type: text
    content: the people panic, faces white with terror.
  '7':
  - type: text
    content: The invaders charge.
  - type: text
    content: They climb barricades. Nothing stops them.
  - type: text
    content: Each soldier does what he’s told,
  - type: text
    content: so disciplined, so determined.
  - type: text
    content: They don’t get in each other’s way.
  - type: text
    content: Each one knows his job and does it.
  - type: text
    content: Undaunted and fearless,
  - type: text
    content: unswerving, unstoppable.
  - type: text
    content: They storm the city,
  - type: text
    content: swarm its defenses,
  - type: text
    content: Loot the houses,
  - type: text
    content: breaking down doors, smashing windows.
  - type: text
    content: They arrive like an earthquake,
  - type: text
    content: sweep through like a tornado.
  - type: text
    content: Sun and moon turn out their lights,
  - type: text
    content: stars black out.
  - type: text
    content: God
  - type: text
    content: ' himself bellows in thunder'
  - type: text
    content: as he commands his forces.
  - type: text
    content: Look at the size of that army!
  - type: text
    content: And the strength of those who obey him!
  - type: text
    content: God
  - type: text
    content: ’s Judgment Day—great and terrible.
  - type: text
    content: Who can possibly survive this?
  - type: heading
    content: Change Your Life
