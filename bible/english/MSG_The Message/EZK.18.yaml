    content: Judged According to the Way You Live
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to me: “What do you people mean by going around the country repeating the saying,'
  - type: text
    content: The parents ate green apples,
  - type: text
    content: The children got the stomachache?
  '10':
  - type: text
    content: “But if this person has a child who turns violent and murders and goes off and does any of these things, even though the parent has done none of them—
  - type: text
    content: eats at the pagan shrines,
  - type: text
    content: seduces his neighbor’s spouse,
  - type: text
    content: bullies the weak,
  - type: text
    content: steals,
  - type: text
    content: piles up bad debts,
  - type: text
    content: admires idols,
  - type: text
    content: commits outrageous obscenities,
  - type: text
    content: exploits the poor
  - type: text
    content: “—do you think this person, the child, will live? Not a chance! Because he’s done all these vile things, he’ll die. And his death will be his own fault.
  '14':
  - type: text
    content: ' “Now look: Suppose that this child has a child who sees all the sins done by his parent. The child sees them, but doesn’t follow in the parent’s footsteps—'
  - type: text
    content: doesn’t eat at the pagan shrines,
  - type: text
    content: doesn’t worship the popular idols of Israel,
  - type: text
    content: doesn’t seduce his neighbor’s spouse,
  - type: text
    content: doesn’t bully anyone,
  - type: text
    content: doesn’t refuse to loan money,
  - type: text
    content: doesn’t steal,
  - type: text
    content: doesn’t refuse food to the hungry,
  - type: text
    content: doesn’t refuse to give clothes to the ill-clad,
  - type: text
    content: doesn’t live by impulse and greed,
  - type: text
    content: doesn’t exploit the poor.
  - type: text
    content: He does what I say;
  - type: text
    content: he performs my laws and lives by my statutes.
  '17':
  - type: text
    content: ' “This person will not die for the sins of the parent; he will live truly and well. But the parent will die for what the parent did, for the sins of—'
  - type: text
    content: oppressing the weak,
  - type: text
    content: robbing brothers and sisters,
  - type: text
    content: doing what is dead wrong in the community.
  '19':
  - type: text
    content: “Do you need to ask, ‘So why does the child not share the guilt of the parent?’
  - type: text
    content: “Isn’t it plain? It’s because the child did what is fair and right. Since the child was careful to do what is lawful and right, the child will live truly and well. The soul that sins is the soul that dies. The child does not share the guilt of the parent, nor the parent the guilt of the child. If you live upright and well, you get the credit; if you live a wicked life, you’re guilty as charged.
  '21':
  - type: text
    content: “But a wicked person who turns his back on that life of sin and keeps all my statutes, living a just and righteous life, he’ll live, really live. He won’t die. I won’t keep a list of all the things he did wrong. He will live. Do you think I take any pleasure in the death of wicked men and women? Isn’t it my pleasure that they turn around, no longer living wrong but living right—really living?
  '24':
  - type: text
    content: “The same thing goes for a good person who turns his back on an upright life and starts sinning, plunging into the same vile obscenities that the wicked person practices. Will this person live? I don’t keep a list of all the things this person did right, like money in the bank he can draw on. Because of his defection, because he accumulates sin, he’ll die.
  '25':
  - type: text
    content: “Do I hear you saying, ‘That’s not fair! God’s not fair!’?
  - type: text
    content: “Listen, Israel. I’m not fair? You’re the ones who aren’t fair! If a good person turns away from his good life and takes up sinning, he’ll die for it. He’ll die for his own sin. Likewise, if a bad person turns away from his bad life and starts living a good life, a fair life, he will save his life. Because he faces up to all the wrongs he’s committed and puts them behind him, he will live, really live. He won’t die.
  '29':
  - type: text
    content: “And yet Israel keeps on whining, ‘That’s not fair! God’s not fair.’
  - type: text
    content: “I’m not fair, Israel? You’re the ones who aren’t fair.
  '3':
  - type: text
    content: “As sure as I’m the living God, you’re not going to repeat this saying in Israel any longer. Every soul—man, woman, child—belongs to me, parent and child alike. You die for your own sin, not another’s.
  '30':
  - type: text
    content: '“The upshot is this, Israel: I’ll judge each of you according to the way you live. So turn around! Turn your backs on your rebellious living so that sin won’t drag you down. Clean house. No more rebellions, please. Get a new heart! Get a new spirit! Why would you choose to die, Israel? I take no pleasure in anyone’s death. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  - type: text
    content: “Make a clean break! Live!”
  '5':
  - type: text
    content: “Imagine a person who lives well, treating others fairly, keeping good relationships—
  - type: text
    content: doesn’t eat at the pagan shrines,
  - type: text
    content: doesn’t worship the idols so popular in Israel,
  - type: text
    content: doesn’t seduce a neighbor’s spouse,
  - type: text
    content: doesn’t indulge in casual sex,
  - type: text
    content: doesn’t bully anyone,
  - type: text
    content: doesn’t pile up bad debts,
  - type: text
    content: doesn’t steal,
  - type: text
    content: doesn’t refuse food to the hungry,
  - type: text
    content: doesn’t refuse clothing to the ill-clad,
  - type: text
    content: doesn’t exploit the poor,
  - type: text
    content: doesn’t live by impulse and greed,
  - type: text
    content: doesn’t treat one person better than another,
  - type: text
    content: But lives by my statutes and faithfully
  - type: text
    content: honors and obeys my laws.
  - type: text
    content: This person who lives upright and well
  - type: text
