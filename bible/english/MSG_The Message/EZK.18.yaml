document_id: EZK.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judged According to the Way You Live
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message to me: “What do you people mean by going around the country repeating the saying,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The parents ate green apples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The children got the stomachache?
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: “But if this person has a child who turns violent and murders and goes off and does any of these things, even though the parent has done none of them—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: eats at the pagan shrines,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: seduces his neighbor’s spouse,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: bullies the weak,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: steals,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: piles up bad debts,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: admires idols,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: commits outrageous obscenities,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: exploits the poor
  - type: usfm
    marker: m
    children:
    - type: text
      text: “—do you think this person, the child, will live? Not a chance! Because he’s done all these vile things, he’ll die. And his death will be his own fault.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-17a
    - type: text
      text: ' “Now look: Suppose that this child has a child who sees all the sins done by his parent. The child sees them, but doesn’t follow in the parent’s footsteps—'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t eat at the pagan shrines,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t worship the popular idols of Israel,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t seduce his neighbor’s spouse,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t bully anyone,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t refuse to loan money,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t steal,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t refuse food to the hungry,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t refuse to give clothes to the ill-clad,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t live by impulse and greed,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t exploit the poor.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: He does what I say;
  - type: usfm
    marker: li2
    children:
    - type: text
      text: he performs my laws and lives by my statutes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17b-18
    - type: text
      text: ' “This person will not die for the sins of the parent; he will live truly and well. But the parent will die for what the parent did, for the sins of—'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: oppressing the weak,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: robbing brothers and sisters,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doing what is dead wrong in the community.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: “Do you need to ask, ‘So why does the child not share the guilt of the parent?’
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Isn’t it plain? It’s because the child did what is fair and right. Since the child was careful to do what is lawful and right, the child will live truly and well. The soul that sins is the soul that dies. The child does not share the guilt of the parent, nor the parent the guilt of the child. If you live upright and well, you get the credit; if you live a wicked life, you’re guilty as charged.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: “But a wicked person who turns his back on that life of sin and keeps all my statutes, living a just and righteous life, he’ll live, really live. He won’t die. I won’t keep a list of all the things he did wrong. He will live. Do you think I take any pleasure in the death of wicked men and women? Isn’t it my pleasure that they turn around, no longer living wrong but living right—really living?
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “The same thing goes for a good person who turns his back on an upright life and starts sinning, plunging into the same vile obscenities that the wicked person practices. Will this person live? I don’t keep a list of all the things this person did right, like money in the bank he can draw on. Because of his defection, because he accumulates sin, he’ll die.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-28
    - type: text
      text: “Do I hear you saying, ‘That’s not fair! God’s not fair!’?
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Listen, Israel. I’m not fair? You’re the ones who aren’t fair! If a good person turns away from his good life and takes up sinning, he’ll die for it. He’ll die for his own sin. Likewise, if a bad person turns away from his bad life and starts living a good life, a fair life, he will save his life. Because he faces up to all the wrongs he’s committed and puts them behind him, he will live, really live. He won’t die.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “And yet Israel keeps on whining, ‘That’s not fair! God’s not fair.’
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’m not fair, Israel? You’re the ones who aren’t fair.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: “As sure as I’m the living God, you’re not going to repeat this saying in Israel any longer. Every soul—man, woman, child—belongs to me, parent and child alike. You die for your own sin, not another’s.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-32
    - type: text
      text: '“The upshot is this, Israel: I’ll judge each of you according to the way you live. So turn around! Turn your backs on your rebellious living so that sin won’t drag you down. Clean house. No more rebellions, please. Get a new heart! Get a new spirit! Why would you choose to die, Israel? I take no pleasure in anyone’s death. Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Make a clean break! Live!”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: “Imagine a person who lives well, treating others fairly, keeping good relationships—
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t eat at the pagan shrines,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t worship the idols so popular in Israel,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t seduce a neighbor’s spouse,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t indulge in casual sex,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t bully anyone,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t pile up bad debts,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t steal,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t refuse food to the hungry,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t refuse clothing to the ill-clad,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t exploit the poor,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t live by impulse and greed,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: doesn’t treat one person better than another,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: But lives by my statutes and faithfully
  - type: usfm
    marker: li2
    children:
    - type: text
      text: honors and obeys my laws.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: This person who lives upright and well
  - type: usfm
    marker: li2
    children:
    - type: text
      text: shall live a full and true life.
  - type: usfm
    marker: li3
    children:
    - type: text
      text: 'Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.'
