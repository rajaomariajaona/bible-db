document_id: AMO.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: The Message of Amos, one of the shepherds of Tekoa, that he received on behalf of Israel. It came to him in visions during the time that Uzziah was king of Judah and Jeroboam II son of Joash was king of Israel, two years before the big earthquake.
  - type: heading
    content: Swallowing the Same Old Lies
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Edom
  - type: text
    content: —make that four—I’m not putting up with her any longer.
  - type: text
    content: She hunts down her brother to murder him.
  - type: text
    content: She has no pity, she has no heart.
  - type: text
    content: Her anger rampages day and night.
  - type: text
    content: Her meanness never takes a timeout.
  - type: text
    content: For that, I’m burning down her capital, Teman,
  - type: text
    content: burning up the forts of Bozrah.”
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Ammon
  - type: text
    content: —make that four—I’m not putting up with her any longer.
  - type: text
    content: She ripped open pregnant women in Gilead
  - type: text
    content: to get more land for herself.
  - type: text
    content: For that, I’m burning down the walls of her capital, Rabbah,
  - type: text
    content: burning up her forts.
  - type: text
    content: Battle shouts! War whoops!
  - type: text
    content: with a tornado to finish things off!
  - type: text
    content: The king has been carted off to exile,
  - type: text
    content: the king and his princes with him.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: 'The Message:'
  - type: text
    content: God
  - type: text
    content: ' roars from Zion,'
  - type: text
    content: shouts from Jerusalem!
  - type: text
    content: The thunderclap voice withers the pastures tended by shepherds,
  - type: text
    content: shrivels Mount Carmel’s proud peak.
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Damascus
  - type: text
    content: —make that four—I’m not putting up with her any longer.
  - type: text
    content: She pounded Gilead to a pulp, pounded her senseless
  - type: text
    content: with iron hammers and mauls.
  - type: text
    content: For that, I’m setting the palace of Hazael on fire.
  - type: text
    content: I’m torching Ben-hadad’s forts.
  - type: text
    content: I’m going to smash the Damascus gates
  - type: text
    content: and banish the crime king who lives in Sin Valley,
  - type: text
    content: the vice boss who gives orders from Paradise Palace.
  - type: text
    content: The people of the land will be sent back
  - type: text
    content: to where they came from—to Kir.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Gaza
  - type: text
    content: —make that four—I’m not putting up with her any longer.
  - type: text
    content: She deported whole towns
  - type: text
    content: and then sold the people to Edom.
  - type: text
    content: For that, I’m burning down the walls of Gaza,
  - type: text
    content: burning up all her forts.
  - type: text
    content: I’ll banish the crime king from Ashdod,
  - type: text
    content: the vice boss from Ashkelon.
  - type: text
    content: I’ll raise my fist against Ekron,
  - type: text
    content: and what’s left of the Philistines will die.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Tyre
  - type: text
    content: —make that four—I’m not putting up with her any longer.
  - type: text
    content: She deported whole towns to Edom,
  - type: text
    content: breaking the treaty she had with her kin.
  - type: text
    content: For that, I’m burning down the walls of Tyre,
  - type: text
    content: burning up all her forts.”
