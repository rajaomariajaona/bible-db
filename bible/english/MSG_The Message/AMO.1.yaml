document_id: AMO.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Message of Amos, one of the shepherds of Tekoa, that he received on behalf of Israel. It came to him in visions during the time that Uzziah was king of Judah and Jeroboam II son of Joash was king of Israel, two years before the big earthquake.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Swallowing the Same Old Lies
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Edom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with her any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She hunts down her brother to murder him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She has no pity, she has no heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her anger rampages day and night.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her meanness never takes a timeout.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that, I’m burning down her capital, Teman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning up the forts of Bozrah.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Ammon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with her any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She ripped open pregnant women in Gilead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to get more land for herself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that, I’m burning down the walls of her capital, Rabbah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning up her forts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Battle shouts! War whoops!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a tornado to finish things off!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king has been carted off to exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the king and his princes with him.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Message:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' roars from Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shouts from Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The thunderclap voice withers the pastures tended by shepherds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shrivels Mount Carmel’s proud peak.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Damascus
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with her any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She pounded Gilead to a pulp, pounded her senseless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with iron hammers and mauls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that, I’m setting the palace of Hazael on fire.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m torching Ben-hadad’s forts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m going to smash the Damascus gates
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and banish the crime king who lives in Sin Valley,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the vice boss who gives orders from Paradise Palace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of the land will be sent back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to where they came from—to Kir.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Gaza
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with her any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She deported whole towns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then sold the people to Edom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that, I’m burning down the walls of Gaza,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning up all her forts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll banish the crime king from Ashdod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the vice boss from Ashkelon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll raise my fist against Ekron,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what’s left of the Philistines will die.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Tyre
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with her any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She deported whole towns to Edom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: breaking the treaty she had with her kin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that, I’m burning down the walls of Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning up all her forts.”
