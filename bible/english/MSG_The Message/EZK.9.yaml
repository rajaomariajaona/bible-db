document_id: EZK.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Mark on the Forehead
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then I heard him call out loudly, “Executioners, come! And bring your deadly weapons with you.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Just then, the man dressed in linen and carrying the writing case came back and reported, “I’ve done what you told me.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Six men came down the road from the upper gate that faces north, each carrying his lethal weapon. With them was a man dressed in linen with a writing case slung from his shoulder. They entered and stood by the bronze altar.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'The Glory of the God of Israel ascended from his usual place above the cherubim-angels, moved to the threshold of the Temple, and called to the man with the writing case who was dressed in linen: “Go through the streets of Jerusalem and put a mark on the forehead of everyone who is in anguish over the outrageous obscenities being done in the city.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'I listened as he went on to address the executioners: “Follow him through the city and kill. Feel sorry for no one. Show no compassion. Kill old men and women, young men and women, mothers and children. But don’t lay a hand on anyone with the mark. Start at my Temple.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: They started with the leaders in front of the Temple.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: He told the executioners, “Desecrate the Temple. Fill it with corpses. Then go out and continue the killing.” So they went out and struck the city.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While the massacre went forward, I was left alone. I fell on my face in prayer: “Oh, oh, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my Master! Are you going to kill everyone left in Israel in this pouring out of your anger on Jerusalem?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: He said, “The guilt of Israel and Judah is enormous. The land is swollen with murder. The city is bloated with injustice. They all say, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has forsaken the country. He doesn’t see anything we do.’ Well, I do see, and I’m not feeling sorry for any of them. They’re going to pay for what they’ve done.”'
