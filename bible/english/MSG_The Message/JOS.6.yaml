document_id: JOS.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Jericho
  - type: text
    content: 'Jericho was shut up tight as a drum because of the People of Israel: no one going in, no one coming out.'
  '10':
  - type: text
    content: Joshua had given orders to the people, “Don’t shout. In fact, don’t even speak—not so much as a whisper until you hear me say, ‘Shout!’—then shout away!”
  '11':
  - type: text
    content: 'He sent the Chest of '
  - type: text
    content: God
  - type: text
    content: ' on its way around the city. It circled once, came back to camp, and stayed for the night. Joshua was up early the next morning and the priests took up the Chest of '
  - type: text
    content: God
  - type: text
    content: '. The seven priests carrying the seven ram’s horn trumpets marched before the Chest of '
  - type: text
    content: God
  - type: text
    content: ', marching and blowing the trumpets, with the armed guard marching before and the rear guard marching after. Marching and blowing of trumpets!'
  '14':
  - type: text
    content: On the second day they again circled the city once and returned to camp. They did this six days.
  '15':
  - type: text
    content: When the seventh day came, they got up early and marched around the city this same way but seven times—yes, this day they circled the city seven times. On the seventh time around the priests blew the trumpets and Joshua signaled the people, “Shout!—
  - type: text
    content: God
  - type: text
    content: ' has given you the city! The city and everything in it is under a holy curse and offered up to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: “Except for Rahab the harlot—she is to live, she and everyone in her house with her, because she hid the agents we sent.
  '18':
  - type: text
    content: '“As for you, watch yourselves in the city under holy curse. Be careful that you don’t covet anything in it and take something that’s cursed, endangering the camp of Israel with the curse and making trouble for everyone. All silver and gold, all vessels of bronze and iron are holy to '
  - type: text
    content: God
  - type: text
    content: '. Put them in '
  - type: text
    content: God
  - type: text
    content: ’s treasury.”
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Joshua, “Look sharp now. I’ve already given Jericho to you, along with its king and its elite forces. Here’s what you are to do: March around the city, all your soldiers. Circle the city once. Repeat this for six days. Have seven priests carry seven ram’s horn trumpets in front of the Chest. On the seventh day march around the city seven times, the priests blowing away on the trumpets. And then, a long blast on the ram’s horn—when you hear that, all the people are to shout at the top of their lungs. The city wall will collapse at once. All the people are to enter, every man straight on in.”'
  '20':
  - type: text
    content: The priests blew the trumpets.
  - type: text
    content: When the people heard the blast of the trumpets, they gave a thunderclap shout. The wall fell at once. The people rushed straight into the city and took it.
  '21':
  - type: text
    content: They put everything in the city under the holy curse, killing man and woman, young and old, ox and sheep and donkey.
  '22':
  - type: text
    content: 'Joshua ordered the two men who had spied out the land, “Enter the house of the harlot and rescue the woman and everyone connected with her, just as you promised her.” So the young spies went in and brought out Rahab, her father, mother, and brothers—everyone connected with her. They got the whole family out and gave them a place outside the camp of Israel. But they burned down the city and everything in it, except for the gold and silver and the bronze and iron vessels—all that they put in the treasury of '
  - type: text
    content: God
  - type: text
    content: ’s house.
  '25':
  - type: text
    content: But Joshua let Rahab the harlot live—Rahab and her father’s household and everyone connected to her. She is still alive and well in Israel because she hid the agents whom Joshua sent to spy out Jericho.
  '26':
  - type: text
    content: 'Joshua swore a solemn oath at that time:'
  - type: text
    content: 'Cursed before '
  - type: text
    content: God
  - type: text
    content: ' is the man'
  - type: text
    content: who sets out to rebuild this city Jericho.
  - type: text
    content: He’ll pay for the foundation with his firstborn son,
  - type: text
    content: he’ll pay for the gates with his youngest son.
  '27':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' was with Joshua. He became famous all over the land.'
  '6':
  - type: text
    content: 'So Joshua son of Nun called the priests and told them, “Take up the Chest of the Covenant. Seven priests are to carry seven ram’s horn trumpets leading '
  - type: text
    content: God
  - type: text
    content: ’s Chest.”
  '7':
  - type: text
    content: 'Then he told the people, “Set out! March around the city. Have the armed guard march before the Chest of '
  - type: text
    content: God
  - type: text
    content: .”
  '8':
  - type: text
    content: 'And it happened. Joshua spoke, the people moved: Seven priests with their seven ram’s horn trumpets set out before '
  - type: text
    content: God
  - type: text
    content: '. They blew the trumpets, leading '
  - type: text
    content: God
  - type: text
    content: ’s Chest of the Covenant. The armed guard marched ahead of the trumpet-blowing priests; the rear guard was marching after the Chest, marching and blowing their trumpets.
