document_id: JOS.22,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Joshua called together the Reubenites, Gadites, and the half-tribe of Manasseh. He said: “You have carried out everything Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' commanded you, and you have obediently done everything I have commanded you. All this time and right down to this very day you have not abandoned your brothers; you’ve shouldered the task laid on you by '
  - type: text
    content: God
  - type: text
    content: ', your God. And now '
  - type: text
    content: God
  - type: text
    content: ', your God, has given rest to your brothers just as he promised them. You’re now free to go back to your homes, the country of your inheritance that Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' gave you on the other side of the Jordan. Only this: Be vigilant in keeping the Commandment and The Revelation that Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' laid on you: Love '
  - type: text
    content: God
  - type: text
    content: ', your God, walk in all his ways, do what he’s commanded, embrace him, serve him with everything you are and have.”'
  '10':
  - type: text
    content: They arrived at Geliloth on the Jordan (touching on Canaanite land). There the Reubenites, Gadites, and the half-tribe of Manasseh built an altar on the banks of the Jordan—a huge altar!
  '11':
  - type: text
    content: 'The People of Israel heard of it: “What’s this? The Reubenites, Gadites, and the half-tribe of Manasseh have built an altar facing the land of Canaan at Geliloth on the Jordan, across from the People of Israel!”'
  '12':
  - type: text
    content: When the People of Israel heard this, the entire congregation mustered at Shiloh to go to war against them. They sent Phinehas son of Eleazar the priest to the Reubenites, Gadites, and the half-tribe of Manasseh (that is, to the land of Gilead). Accompanying him were ten chiefs, one chief for each of the ten tribes, each the head of his ancestral family. They represented the military divisions of Israel.
  '15':
  - type: text
    content: 'They went to the Reubenites, Gadites, and the half-tribe of Manasseh and spoke to them: “The entire congregation of '
  - type: text
    content: God
  - type: text
    content: ' wants to know: What is this violation against the God of Israel that you have committed, turning your back on '
  - type: text
    content: God
  - type: text
    content: ' and building your own altar—a blatant act of rebellion against '
  - type: text
    content: God
  - type: text
    content: '? Wasn’t the crime of Peor enough for us? Why, to this day we aren’t rid of it, still living with the fallout of the plague on the congregation of '
  - type: text
    content: God
  - type: text
    content: '! Look at you—turning your back on '
  - type: text
    content: God
  - type: text
    content: '! If you rebel against '
  - type: text
    content: God
  - type: text
    content: ' today, tomorrow he’ll vent his anger on all of us, the entire congregation of Israel.'
  '19':
  - type: text
    content: '“If you think the land of your possession isn’t holy enough but somehow contaminated, come back over to '
  - type: text
    content: God
  - type: text
    content: '’s possession, where '
  - type: text
    content: God
  - type: text
    content: '’s Dwelling is set up, and take your land there, but don’t rebel against '
  - type: text
    content: God
  - type: text
    content: '. And don’t rebel against us by building your own altar apart from the Altar of our '
  - type: text
    content: God
  - type: text
    content: . When Achan son of Zerah violated the holy curse, didn’t anger fall on the whole congregation of Israel? He wasn’t the only one to die for his sin.”
  '21':
  - type: text
    content: ' The Reubenites, Gadites, and the half-tribe of Manasseh replied to the heads of the tribes of Israel:'
  - type: text
    content: 'The God of Gods is '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'The God of Gods is '
  - type: text
    content: God
  - type: text
    content: '!'
  '22':
  - type: text
    content: ' “He knows and he’ll let Israel know if this is a rebellious betrayal of '
  - type: text
    content: God
  - type: text
    content: '. And if it is, don’t bother saving us. If we built ourselves an altar in rebellion against '
  - type: text
    content: God
  - type: text
    content: ', if we did it to present on it Whole-Burnt-Offerings or Grain-Offerings or to enact there sacrificial Peace-Offerings, let '
  - type: text
    content: God
  - type: text
    content: ' decide.'
  '24':
  - type: text
    content: '“But that’s not it. We did it because we cared. We were anxious lest someday your children should say to our children, ‘You’re not connected with '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel! '
  - type: text
    content: God
  - type: text
    content: ' made the Jordan a boundary between us and you. You Reubenites and Gadites have no part in '
  - type: text
    content: God
  - type: text
    content: '.’ And then your children might cause our children to quit worshiping '
  - type: text
    content: God
  - type: text
    content: .
  '26':
  - type: text
    content: “So we said to ourselves, ‘Let’s do something. Let’s build an altar—but not for Whole-Burnt-Offerings, not for sacrifices.’
  '27':
  - type: text
    content: '“We built this altar as a witness between us and you and our children coming after us, a witness to the Altar where we worship '
  - type: text
    content: God
  - type: text
    content: ' in his Sacred Dwelling with our Whole-Burnt-Offerings and our sacrifices and our Peace-Offerings.'
  - type: text
    content: '“This way, your children won’t be able to say to our children in the future, ‘You have no part in '
  - type: text
    content: God
  - type: text
    content: .’
  '28':
  - type: text
    content: '“We said to ourselves, ‘If anyone speaks disparagingly to us or to our children in the future, we’ll say: Look at this model of '
  - type: text
    content: God
  - type: text
    content: ’s Altar which our ancestors made. It’s not for Whole-Burnt-Offerings, not for sacrifices. It’s a witness connecting us with you.’
  '29':
  - type: text
    content: '“Rebelling against or turning our backs on '
  - type: text
    content: God
  - type: text
    content: ' is the last thing on our minds right now. We never dreamed of building an altar for Whole-Burnt-Offerings or Grain-Offerings to rival the Altar of our '
  - type: text
    content: God
  - type: text
    content: ' in front of his Sacred Dwelling.”'
  '30':
  - type: text
    content: Phinehas the priest, all the heads of the congregation, and the heads of the military divisions of Israel who were also with him heard what the Reubenites, Gadites, and the half-tribe of Manasseh had to say. They were satisfied.
  '31':
  - type: text
    content: 'Priest Phinehas son of Eleazar said to Reuben, Gad, and Manasseh, “Now we’re convinced that '
  - type: text
    content: God
  - type: text
    content: ' is present with us since you haven’t been disloyal to '
  - type: text
    content: God
  - type: text
    content: ' in this matter. You saved the People of Israel from '
  - type: text
    content: God
  - type: text
    content: ’s discipline.”
  '32':
  - type: text
    content: Then Priest Phinehas son of Eleazar left the Reubenites, Gadites, and the half-tribe of Manasseh (from Gilead) and, with the chiefs, returned to the land of Canaan to the People of Israel and gave a full report. They were pleased with the report. The People of Israel blessed God—there was no more talk of attacking and destroying the land in which the Reubenites and Gadites were living.
  '34':
  - type: text
    content: 'Reuben and Gad named the altar:'
  - type: text
    content: A Witness Between Us.
  - type: text
    content: God
  - type: text
    content: ' Alone Is God.'
  '6':
  - type: text
    content: ' Then Joshua blessed them and sent them on their way. They went home. (To the half-tribe of Manasseh, Moses had assigned a share in Bashan. To the other half, Joshua assigned land with their brothers west of the Jordan.)'
  '7':
  - type: text
    content: ' When Joshua sent them off to their homes, he blessed them. He said: “Go home. You’re going home rich—great herds of cattle, silver and gold, bronze and iron, huge piles of clothing. Share the wealth with your friends and families—all this plunder from your enemies!”'
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: 'The Reubenites, Gadites, and the half-tribe of Manasseh left the People of Israel at Shiloh in the land of Canaan to return to Gilead, the land of their possession, which they had taken under the command of Moses as ordered by '
  - type: text
    content: God
  - type: text
    content: .
