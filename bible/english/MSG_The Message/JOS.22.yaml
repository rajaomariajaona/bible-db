document_id: JOS.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: 'Then Joshua called together the Reubenites, Gadites, and the half-tribe of Manasseh. He said: “You have carried out everything Moses the servant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded you, and you have obediently done everything I have commanded you. All this time and right down to this very day you have not abandoned your brothers; you’ve shouldered the task laid on you by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God. And now '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, has given rest to your brothers just as he promised them. You’re now free to go back to your homes, the country of your inheritance that Moses the servant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave you on the other side of the Jordan. Only this: Be vigilant in keeping the Commandment and The Revelation that Moses the servant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' laid on you: Love '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, walk in all his ways, do what he’s commanded, embrace him, serve him with everything you are and have.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They arrived at Geliloth on the Jordan (touching on Canaanite land). There the Reubenites, Gadites, and the half-tribe of Manasseh built an altar on the banks of the Jordan—a huge altar!
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The People of Israel heard of it: “What’s this? The Reubenites, Gadites, and the half-tribe of Manasseh have built an altar facing the land of Canaan at Geliloth on the Jordan, across from the People of Israel!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: When the People of Israel heard this, the entire congregation mustered at Shiloh to go to war against them. They sent Phinehas son of Eleazar the priest to the Reubenites, Gadites, and the half-tribe of Manasseh (that is, to the land of Gilead). Accompanying him were ten chiefs, one chief for each of the ten tribes, each the head of his ancestral family. They represented the military divisions of Israel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-18
    - type: text
      text: 'They went to the Reubenites, Gadites, and the half-tribe of Manasseh and spoke to them: “The entire congregation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' wants to know: What is this violation against the God of Israel that you have committed, turning your back on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and building your own altar—a blatant act of rebellion against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '? Wasn’t the crime of Peor enough for us? Why, to this day we aren’t rid of it, still living with the fallout of the plague on the congregation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Look at you—turning your back on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! If you rebel against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' today, tomorrow he’ll vent his anger on all of us, the entire congregation of Israel.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: '“If you think the land of your possession isn’t holy enough but somehow contaminated, come back over to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s possession, where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Dwelling is set up, and take your land there, but don’t rebel against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. And don’t rebel against us by building your own altar apart from the Altar of our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . When Achan son of Zerah violated the holy curse, didn’t anger fall on the whole congregation of Israel? He wasn’t the only one to die for his sin.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22a
    - type: text
      text: ' The Reubenites, Gadites, and the half-tribe of Manasseh replied to the heads of the tribes of Israel:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The God of Gods is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q3
    children:
    - type: text
      text: 'The God of Gods is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22b-23
    - type: text
      text: ' “He knows and he’ll let Israel know if this is a rebellious betrayal of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. And if it is, don’t bother saving us. If we built ourselves an altar in rebellion against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', if we did it to present on it Whole-Burnt-Offerings or Grain-Offerings or to enact there sacrificial Peace-Offerings, let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' decide.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: '“But that’s not it. We did it because we cared. We were anxious lest someday your children should say to our children, ‘You’re not connected with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made the Jordan a boundary between us and you. You Reubenites and Gadites have no part in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '.’ And then your children might cause our children to quit worshiping '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “So we said to ourselves, ‘Let’s do something. Let’s build an altar—but not for Whole-Burnt-Offerings, not for sacrifices.’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“We built this altar as a witness between us and you and our children coming after us, a witness to the Altar where we worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in his Sacred Dwelling with our Whole-Burnt-Offerings and our sacrifices and our Peace-Offerings.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This way, your children won’t be able to say to our children in the future, ‘You have no part in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .’
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“We said to ourselves, ‘If anyone speaks disparagingly to us or to our children in the future, we’ll say: Look at this model of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Altar which our ancestors made. It’s not for Whole-Burnt-Offerings, not for sacrifices. It’s a witness connecting us with you.’
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“Rebelling against or turning our backs on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is the last thing on our minds right now. We never dreamed of building an altar for Whole-Burnt-Offerings or Grain-Offerings to rival the Altar of our '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in front of his Sacred Dwelling.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Phinehas the priest, all the heads of the congregation, and the heads of the military divisions of Israel who were also with him heard what the Reubenites, Gadites, and the half-tribe of Manasseh had to say. They were satisfied.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Priest Phinehas son of Eleazar said to Reuben, Gad, and Manasseh, “Now we’re convinced that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is present with us since you haven’t been disloyal to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in this matter. You saved the People of Israel from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s discipline.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-33
    - type: text
      text: Then Priest Phinehas son of Eleazar left the Reubenites, Gadites, and the half-tribe of Manasseh (from Gilead) and, with the chiefs, returned to the land of Canaan to the People of Israel and gave a full report. They were pleased with the report. The People of Israel blessed God—there was no more talk of attacking and destroying the land in which the Reubenites and Gadites were living.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Reuben and Gad named the altar:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A Witness Between Us.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Alone Is God.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7a
    - type: text
      text: ' Then Joshua blessed them and sent them on their way. They went home. (To the half-tribe of Manasseh, Moses had assigned a share in Bashan. To the other half, Joshua assigned land with their brothers west of the Jordan.)'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7b-8
    - type: text
      text: ' When Joshua sent them off to their homes, he blessed them. He said: “Go home. You’re going home rich—great herds of cattle, silver and gold, bronze and iron, huge piles of clothing. Share the wealth with your friends and families—all this plunder from your enemies!”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The Reubenites, Gadites, and the half-tribe of Manasseh left the People of Israel at Shiloh in the land of Canaan to return to Gilead, the land of their possession, which they had taken under the command of Moses as ordered by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
