document_id: AMO.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Moab
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with her any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She violated the corpse of Edom’s king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning it to cinders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that, I’m burning down Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning down the forts of Kerioth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab will die in the shouting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: go out in the blare of war trumpets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll remove the king from the center
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and kill all his princes with him.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you made the youth-in-training break training,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you told the young prophets, ‘Don’t prophesy!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re too much for me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m hard-pressed—to the breaking point.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m like a wagon piled high and overloaded,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: creaking and groaning.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When I go into action, what will you do?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s no place to run no matter how fast you run.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The strength of the strong won’t count.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fighters won’t make it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Skilled archers won’t make it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fast runners won’t make it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chariot drivers won’t make it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the bravest of all your warriors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Won’t make it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll run off for dear life, stripped naked.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with them any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They rejected '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s revelation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refused to keep my commands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they swallowed the same old lies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that got their ancestors onto dead-end roads.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For that, I’m burning down Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning down all the forts of Jerusalem.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Destroyed from the Roots Up
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of the three great sins of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —make that four—I’m not putting up with them any longer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They buy and sell upstanding people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'People for them are only '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: —ways of making money.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’d sell a poor man for a pair of shoes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’d sell their own grandmother!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They grind the penniless into the dirt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shove the luckless into the ditch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone and his brother sleeps with the ‘sacred whore’—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a sacrilege against my Holy Name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stuff they’ve extorted from the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is piled up at the shrine of their god,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While they sit around drinking wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ve conned from their victims.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In contrast, I was always on your side.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I destroyed the Amorites who confronted you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amorites with the stature of great cedars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tough as thick oaks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I destroyed them from the top branches down.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I destroyed them from the roots up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And yes, I’m the One who delivered you from Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: led you safely through the wilderness for forty years
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then handed you the country of the Amorites
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a piece of cake on a platter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I raised up some of your young men to be prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set aside your best youth for training in holiness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Isn’t this so, Israel?”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
