document_id: AMO.2,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Moab
  - type: text
    content: —make that four—I’m not putting up with her any longer.
  - type: text
    content: She violated the corpse of Edom’s king,
  - type: text
    content: burning it to cinders.
  - type: text
    content: For that, I’m burning down Moab,
  - type: text
    content: burning down the forts of Kerioth.
  - type: text
    content: Moab will die in the shouting,
  - type: text
    content: go out in the blare of war trumpets.
  - type: text
    content: I’ll remove the king from the center
  - type: text
    content: and kill all his princes with him.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '12':
  - type: text
    content: “But you made the youth-in-training break training,
  - type: text
    content: and you told the young prophets, ‘Don’t prophesy!’
  - type: text
    content: You’re too much for me.
  - type: text
    content: I’m hard-pressed—to the breaking point.
  - type: text
    content: I’m like a wagon piled high and overloaded,
  - type: text
    content: creaking and groaning.
  '14':
  - type: text
    content: “When I go into action, what will you do?
  - type: text
    content: There’s no place to run no matter how fast you run.
  - type: text
    content: The strength of the strong won’t count.
  - type: text
    content: Fighters won’t make it.
  - type: text
    content: Skilled archers won’t make it.
  - type: text
    content: Fast runners won’t make it.
  - type: text
    content: Chariot drivers won’t make it.
  - type: text
    content: Even the bravest of all your warriors
  - type: text
    content: Won’t make it.
  - type: text
    content: He’ll run off for dear life, stripped naked.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Judah
  - type: text
    content: —make that four—I’m not putting up with them any longer.
  - type: text
    content: 'They rejected '
  - type: text
    content: God
  - type: text
    content: ’s revelation,
  - type: text
    content: refused to keep my commands.
  - type: text
    content: But they swallowed the same old lies
  - type: text
    content: that got their ancestors onto dead-end roads.
  - type: text
    content: For that, I’m burning down Judah,
  - type: text
    content: burning down all the forts of Jerusalem.”
  - type: heading
    content: Destroyed from the Roots Up
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Because of the three great sins of Israel
  - type: text
    content: —make that four—I’m not putting up with them any longer.
  - type: text
    content: They buy and sell upstanding people.
  - type: text
    content: 'People for them are only '
  - type: text
    content: things
  - type: text
    content: —ways of making money.
  - type: text
    content: They’d sell a poor man for a pair of shoes.
  - type: text
    content: They’d sell their own grandmother!
  - type: text
    content: They grind the penniless into the dirt,
  - type: text
    content: shove the luckless into the ditch.
  - type: text
    content: Everyone and his brother sleeps with the ‘sacred whore’—
  - type: text
    content: a sacrilege against my Holy Name.
  - type: text
    content: Stuff they’ve extorted from the poor
  - type: text
    content: is piled up at the shrine of their god,
  - type: text
    content: While they sit around drinking wine
  - type: text
    content: they’ve conned from their victims.
  '9':
  - type: text
    content: “In contrast, I was always on your side.
  - type: text
    content: I destroyed the Amorites who confronted you,
  - type: text
    content: Amorites with the stature of great cedars,
  - type: text
    content: tough as thick oaks.
  - type: text
    content: I destroyed them from the top branches down.
  - type: text
    content: I destroyed them from the roots up.
  - type: text
    content: And yes, I’m the One who delivered you from Egypt,
  - type: text
    content: led you safely through the wilderness for forty years
  - type: text
    content: And then handed you the country of the Amorites
  - type: text
    content: like a piece of cake on a platter.
  - type: text
    content: I raised up some of your young men to be prophets,
  - type: text
    content: set aside your best youth for training in holiness.
  - type: text
    content: Isn’t this so, Israel?”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
