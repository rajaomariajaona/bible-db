document_id: JON.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Running Away from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'One day long ago, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Word came to Jonah, Amittai’s son: “Up on your feet and on your way to the big city of Nineveh! Preach to them. They’re in a bad way and I can’t ignore it any longer.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Jonah got up and went the other direction to Tarshish, running away from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. He went down to the port of Joppa and found a ship headed for Tarshish. He paid the fare and went on board, joining those going to Tarshish—as far away from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' as he could get.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sent a huge storm at sea, the waves towering.'
- type: usfm
  marker: p
  children:
  - type: text
    text: The ship was about to break into pieces. The sailors were terrified. They called out in desperation to their gods. They threw everything they were carrying overboard to lighten the ship. Meanwhile, Jonah had gone down into the hold of the ship to take a nap. He was sound asleep. The captain came to him and said, “What’s this? Sleeping! Get up! Pray to your god! Maybe your god will see we’re in trouble and rescue us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then the sailors said to one another, “Let’s get to the bottom of this. Let’s draw straws to identify the culprit on this ship who’s responsible for this disaster.”
- type: usfm
  marker: p
  children:
  - type: text
    text: So they drew straws. Jonah got the short straw.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then they grilled him: “Confess. Why this disaster? What is your work? Where do you come from? What country? What family?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He told them, “I’m a Hebrew. I worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of heaven who made sea and land.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'At that, the men were frightened, really frightened, and said, “What on earth have you done!” As Jonah talked, the sailors realized that he was running away from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They said to him, “What are we going to do with you—to get rid of this storm?” By this time the sea was wild, totally out of control.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jonah said, “Throw me overboard, into the sea. Then the storm will stop. It’s all my fault. I’m the cause of the storm. Get rid of me and you’ll get rid of the storm.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But no. The men tried rowing back to shore. They made no headway. The storm only got worse and worse, wild and raging.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then they prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', “O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God!
  - type: text
    text: ' Don’t let us drown because of this man’s life, and don’t blame us for his death. You are '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Do what you think is best.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They took Jonah and threw him overboard. Immediately the sea was quieted down.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sailors were impressed, no longer terrified by the sea, but in awe of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. They worshiped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', offered a sacrifice, and made vows.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' assigned a huge fish to swallow Jonah. Jonah was in the fish’s belly three days and nights.'
