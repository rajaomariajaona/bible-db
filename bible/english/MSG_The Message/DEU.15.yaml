document_id: DEU.15,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the end of every seventh year, cancel all debts. This is the procedure: Everyone who has lent money to a neighbor writes it off. You must not press your neighbor or his brother for payment: All-Debts-Are-Canceled—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says so. You may collect payment from foreigners, but whatever you have lent to your fellow Israelite you must write off.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give freely and spontaneously. Don’t have a stingy heart. The way you handle matters like this triggers '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God’s, blessing in everything you do, all your work and ventures. There are always going to be poor and needy people among you. So I command you: Always be generous, open purse and hands, give to your neighbors in trouble, your poor and hurting neighbors.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a Hebrew man or Hebrew woman was sold to you and has served you for six years, in the seventh year you must set him or her free, released into a free life. And when you set them free don’t send them off empty-handed. Provide them with some animals, plenty of bread and wine and oil. Load them with provisions from all the blessings with which '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, has blessed you. Don’t for a minute forget that you were once slaves in Egypt and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, redeemed you from that slave world.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: For that reason, this day I command you to do this.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if your slave, because he loves you and your family and has a good life with you, says, “I don’t want to leave you,” then take an awl and pierce through his earlobe into the doorpost, marking him as your slave forever. Do the same with your women slaves who want to stay with you.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t consider this an unreasonable hardship, this setting your slave free. After all, he’s worked six years for you at half the cost of a hired hand.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Believe me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, will bless you in everything you do.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Set apart to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, all the firstborn males in your herds and flocks. Don’t use the firstborn from your herds as work animals; don’t shear the firstborn from your flocks. These are for you to eat every year, you and your family, in the Presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, at the place that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' designates for worship. If the animal is defective, lame, say, or blind—anything wrong with it—don’t slaughter it as a sacrifice to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God. Stay at home and eat it there. Both the ritually clean and unclean may eat it, the same as with a gazelle or a deer. Only you must not eat its blood. Pour the blood out on the ground like water.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There must be no poor people among you because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is going to bless you lavishly in this land that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is giving you as an inheritance, your very own land. But only if you listen obediently to the Voice of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, diligently observing every commandment that I command you today. Oh yes—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, will bless you just as he promised. You will lend to many nations but won’t borrow from any; you’ll rule over many nations but none will rule over you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you happen on someone who’s in trouble or needs help among your people with whom you live in this land that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is giving you, don’t look the other way pretending you don’t see him. Don’t keep a tight grip on your purse. No. Look at him, open your purse, lend whatever and as much as he needs. Don’t count the cost. Don’t listen to that selfish voice saying, “It’s almost the seventh year, the year of All-Debts-Are-Canceled,” and turn aside and leave your needy neighbor in the lurch, refusing to help him. He’ll call '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s attention to you and your blatant sin.
