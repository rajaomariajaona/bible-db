document_id: ACT.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nothing to Hide
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: While Peter and John were addressing the people, the priests, the chief of the Temple police, and some Sadducees came up, indignant that these upstart apostles were instructing the people and proclaiming that the resurrection from the dead had taken place in Jesus. They arrested them and threw them in jail until morning, for by now it was late in the evening. But many of those who listened had already believed the Message—in round numbers about five thousand!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: 'The next day a meeting was called in Jerusalem. The rulers, religious leaders, religion scholars, Annas the Chief Priest, Caiaphas, John, Alexander—everybody who was anybody was there. They stood Peter and John in the middle of the room and grilled them: “Who put you in charge here? What business do you have doing this?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: 'With that, Peter, full of the Holy Spirit, let loose: “Rulers and leaders of the people, if we have been brought to trial today for helping a sick man, put under investigation regarding this healing, I’ll be completely frank with you—we have nothing to hide. By the name of Jesus Christ of Nazareth, the One you killed on a cross, the One God raised from the dead, by means of his name this man stands before you healthy and whole. Jesus is ‘the stone you masons threw out, which is now the cornerstone.’ Salvation comes no other way; no other name has been or will be given to us by which we can be saved, only this one.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: They couldn’t take their eyes off them—Peter and John standing there so confident, so sure of themselves! Their fascination deepened when they realized these two were laymen with no training in Scripture or formal education. They recognized them as companions of Jesus, but with the man right before them, seeing him standing there so upright—so healed!—what could they say against that?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: 'They sent them out of the room so they could work out a plan. They talked it over: “What can we do with these men? By now it’s known all over town that a miracle has occurred, and that they are behind it. There is no way we can refute that. But so that it doesn’t go any further, let’s silence them with threats so they won’t dare to use Jesus’ name ever again with anyone.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: They called them back and warned them that they were on no account ever again to speak or teach in the name of Jesus. But Peter and John spoke right back, “Whether it’s right in God’s eyes to listen to you rather than to God, you decide. As for us, there’s no question—we can’t keep quiet about what we’ve seen and heard.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: The religious leaders renewed their threats, but then released them. They couldn’t come up with a charge that would stick, that would keep them in jail. The people wouldn’t have stood for it—they were all praising God over what had happened. The man who had been miraculously healed was over forty years old.
- type: usfm
  marker: s1
  children:
  - type: text
    text: One Heart, One Mind
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: 'As soon as Peter and John were let go, they went to their friends and told them what the high priests and religious leaders had said. Hearing the report, they lifted their voices in a wonderful harmony in prayer: “Strong God, you made heaven and earth and sea and everything in them. By the Holy Spirit you spoke through the mouth of your servant and our father, David:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why the big noise, nations?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why the mean plots, peoples?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth’s leaders push for position,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Potentates meet for summit talks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The God-deniers, the Messiah-defiers!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: “For in fact they did meet—Herod and Pontius Pilate with nations and peoples, even Israel itself!—met in this very city to plot against your holy Son Jesus, the One you made Messiah, to carry out the plans you long ago set in motion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: “And now they’re at it again! Take care of their threats and give your servants fearless confidence in preaching your Message, as you stretch out your hand to us in healings and miracles and wonders done in the name of your holy servant Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: While they were praying, the place where they were meeting trembled and shook. They were all filled with the Holy Spirit and continued to speak God’s Word with fearless confidence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: The whole congregation of believers was united as one—one heart, one mind! They didn’t even claim ownership of their own possessions. No one said, “That’s mine; you can’t have it.” They shared everything. The apostles gave powerful witness to the resurrection of the Master Jesus, and grace was on all of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: And so it turned out that not a person among them was needy. Those who owned fields or houses sold them and brought the price of the sale to the apostles and made an offering of it. The apostles then distributed it according to each person’s need.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: Joseph, called by the apostles “Barnabas” (which means “Son of Comfort”), a Levite born in Cyprus, sold a field that he owned, brought the money, and made an offering of it to the apostles.
