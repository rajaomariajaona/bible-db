type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Defense
  - type: heading
    content: I’m Completely in the Dark
  - type: text
    content: 'Job replied:'
  - type: text
    content: “I’m not letting up—I’m standing my ground.
  - type: text
    content: My complaint is legitimate.
  - type: text
    content: God has no right to treat me like this—
  - type: text
    content: it isn’t fair!
  - type: text
    content: If I knew where on earth to find him,
  - type: text
    content: I’d go straight to him.
  - type: text
    content: I’d lay my case before him face-to-face,
  - type: text
    content: give him all my arguments firsthand.
  - type: text
    content: I’d find out exactly what he’s thinking,
  - type: text
    content: discover what’s going on in his head.
  - type: text
    content: Do you think he’d dismiss me or bully me?
  - type: text
    content: No, he’d take me seriously.
  - type: text
    content: He’d see a straight-living man standing before him;
  - type: text
    content: my Judge would acquit me for good of all charges.
  '10':
  - type: text
    content: “But he knows where I am and what I’ve done.
  - type: text
    content: He can cross-examine me all he wants, and I’ll pass the test with honors.
  - type: text
    content: I’ve followed him closely, my feet in his footprints,
  - type: text
    content: not once swerving from his way.
  - type: text
    content: I’ve obeyed every word he’s spoken,
  - type: text
    content: 'and not just obeyed his advice—I’ve '
  - type: text
    content: treasured
  - type: text
    content: ' it.'
  '13':
  - type: text
    content: “But he is singular and sovereign. Who can argue with him?
  - type: text
    content: He does what he wants, when he wants to.
  - type: text
    content: He’ll complete in detail what he’s decided about me,
  - type: text
    content: and whatever else he determines to do.
  - type: text
    content: Is it any wonder that I dread meeting him?
  - type: text
    content: Whenever I think about it, I get scared all over again.
  - type: text
    content: God makes my heart sink!
  - type: text
    content: God Almighty gives me the shudders!
  - type: text
    content: I’m completely in the dark,
  - type: text
    content: I can’t see my hand in front of my face.”
  '8':
  - type: text
    content: “I travel East looking for him—I find no one;
  - type: text
    content: then West, but not a trace;
  - type: text
    content: I go North, but he’s hidden his tracks;
  - type: text
    content: then South, but not even a glimpse.
