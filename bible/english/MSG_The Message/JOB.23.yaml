document_id: JOB.23
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Job’s Defense
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: I’m Completely in the Dark
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-7
  - type: text
    text: 'Job replied:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’m not letting up—I’m standing my ground.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My complaint is legitimate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God has no right to treat me like this—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it isn’t fair!
- type: usfm
  marker: q1
  children:
  - type: text
    text: If I knew where on earth to find him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’d go straight to him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’d lay my case before him face-to-face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: give him all my arguments firsthand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’d find out exactly what he’s thinking,
- type: usfm
  marker: q2
  children:
  - type: text
    text: discover what’s going on in his head.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think he’d dismiss me or bully me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No, he’d take me seriously.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’d see a straight-living man standing before him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my Judge would acquit me for good of all charges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: “I travel East looking for him—I find no one;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then West, but not a trace;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I go North, but he’s hidden his tracks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then South, but not even a glimpse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: “But he knows where I am and what I’ve done.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He can cross-examine me all he wants, and I’ll pass the test with honors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve followed him closely, my feet in his footprints,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not once swerving from his way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve obeyed every word he’s spoken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and not just obeyed his advice—I’ve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: treasured
  - type: text
    text: ' it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: “But he is singular and sovereign. Who can argue with him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: He does what he wants, when he wants to.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll complete in detail what he’s decided about me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whatever else he determines to do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is it any wonder that I dread meeting him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whenever I think about it, I get scared all over again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God makes my heart sink!
- type: usfm
  marker: q2
  children:
  - type: text
    text: God Almighty gives me the shudders!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m completely in the dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t see my hand in front of my face.”
