document_id: ECC.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s in Charge, Not You
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch your step when you enter God’s house.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Enter to learn. That’s far better than mindlessly offering
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a sacrifice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Doing more harm than good.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who loves money is never satisfied with money,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor the one who loves wealth with big profits. More smoke.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The more loot you get, the more looters show up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what fun is that—to be robbed in broad daylight?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hard and honest work earns a good night’s sleep,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whether supper is beans or steak.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a rich man’s belly gives him insomnia.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Here’s a piece of bad luck I’ve seen happen:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man hoards far more wealth than is good for him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then loses it all in a bad business deal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He fathered a child but hasn’t a cent left to give him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He arrived naked from the womb of his mother;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll leave in the same condition—with nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is bad luck, for sure—naked he came, naked he went.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So what was the point of working for a salary of smoke?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All for a miserable life spent in the dark?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Make the Most of What God Gives
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'After looking at the way things are on this earth, here’s what I’ve decided is the best way to live: Take care of yourself, have a good time, and make the most of whatever job you have for as long as God gives you life. And that’s about it. That’s the human lot. Yes, we should make the most of what God gives, both the bounty and the capacity to enjoy it, accepting what’s given and delighting in the work. It’s God’s gift! God deals out joy in the present, the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now.
    - type: text
      text: ' It’s useless to brood over how long we might live.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t shoot off your mouth, or speak before you think.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t be too quick to tell God what you think he wants to hear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s in charge, not you—the less you speak, the better.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Overwork makes for restless sleep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Overtalk shows you up as a fool.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you tell God you’ll do something, do it—now.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God takes no pleasure in foolish drivel. Vow it, then do it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Far better not to vow in the first place than to vow and not pay up.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let your mouth make a total sinner of you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When called to account, you won’t get by with
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Sorry, I didn’t mean it.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why risk provoking God to angry retaliation?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But against all illusion and fantasy and empty talk
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There’s always this rock foundation: Fear God!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Salary of Smoke
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Don’t be too upset when you see the poor kicked around, and justice and right violated all over the place. Exploitation filters down from one petty official to another. There’s no end to it, and nothing can be done about it. But the good earth doesn’t cheat anyone—even a bad king is honestly served by a field.
