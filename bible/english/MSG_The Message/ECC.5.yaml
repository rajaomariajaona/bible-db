document_id: ECC.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s in Charge, Not You
  - type: text
    content: Watch your step when you enter God’s house.
  - type: text
    content: Enter to learn. That’s far better than mindlessly offering
  - type: text
    content: a sacrifice,
  - type: text
    content: Doing more harm than good.
  '10':
  - type: text
    content: The one who loves money is never satisfied with money,
  - type: text
    content: Nor the one who loves wealth with big profits. More smoke.
  '11':
  - type: text
    content: The more loot you get, the more looters show up.
  - type: text
    content: And what fun is that—to be robbed in broad daylight?
  '12':
  - type: text
    content: Hard and honest work earns a good night’s sleep,
  - type: text
    content: Whether supper is beans or steak.
  - type: text
    content: But a rich man’s belly gives him insomnia.
  '13':
  - type: text
    content: 'Here’s a piece of bad luck I’ve seen happen:'
  - type: text
    content: A man hoards far more wealth than is good for him
  - type: text
    content: And then loses it all in a bad business deal.
  - type: text
    content: He fathered a child but hasn’t a cent left to give him.
  - type: text
    content: He arrived naked from the womb of his mother;
  - type: text
    content: He’ll leave in the same condition—with nothing.
  - type: text
    content: This is bad luck, for sure—naked he came, naked he went.
  - type: text
    content: So what was the point of working for a salary of smoke?
  - type: text
    content: All for a miserable life spent in the dark?
  - type: heading
    content: Make the Most of What God Gives
  '18':
  - type: text
    content: 'After looking at the way things are on this earth, here’s what I’ve decided is the best way to live: Take care of yourself, have a good time, and make the most of whatever job you have for as long as God gives you life. And that’s about it. That’s the human lot. Yes, we should make the most of what God gives, both the bounty and the capacity to enjoy it, accepting what’s given and delighting in the work. It’s God’s gift! God deals out joy in the present, the '
  - type: text
    content: now.
  - type: text
    content: ' It’s useless to brood over how long we might live.'
  '2':
  - type: text
    content: Don’t shoot off your mouth, or speak before you think.
  - type: text
    content: Don’t be too quick to tell God what you think he wants to hear.
  - type: text
    content: God’s in charge, not you—the less you speak, the better.
  '3':
  - type: text
    content: Overwork makes for restless sleep.
  - type: text
    content: Overtalk shows you up as a fool.
  '4':
  - type: text
    content: When you tell God you’ll do something, do it—now.
  - type: text
    content: God takes no pleasure in foolish drivel. Vow it, then do it.
  - type: text
    content: Far better not to vow in the first place than to vow and not pay up.
  '6':
  - type: text
    content: Don’t let your mouth make a total sinner of you.
  - type: text
    content: When called to account, you won’t get by with
  - type: text
    content: “Sorry, I didn’t mean it.”
  - type: text
    content: Why risk provoking God to angry retaliation?
  '7':
  - type: text
    content: But against all illusion and fantasy and empty talk
  - type: text
    content: 'There’s always this rock foundation: Fear God!'
  - type: heading
    content: A Salary of Smoke
  '8':
  - type: text
    content: Don’t be too upset when you see the poor kicked around, and justice and right violated all over the place. Exploitation filters down from one petty official to another. There’s no end to it, and nothing can be done about it. But the good earth doesn’t cheat anyone—even a bad king is honestly served by a field.
