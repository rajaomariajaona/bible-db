document_id: PSA.107,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Oh, thank '
  - type: text
    content: God
  - type: text
    content: —he’s so good!
  - type: text
    content: His love never runs out.
  - type: text
    content: 'All of you set free by '
  - type: text
    content: God
  - type: text
    content: ', tell the world!'
  - type: text
    content: Tell how he freed you from oppression,
  - type: text
    content: Then rounded you up from all over the place,
  - type: text
    content: from the four winds, from the seven seas.
  '10':
  - type: text
    content: Some of you were locked in a dark cell,
  - type: text
    content: cruelly confined behind bars,
  - type: text
    content: Punished for defying God’s Word,
  - type: text
    content: for turning your back on the High God’s counsel—
  - type: text
    content: A hard sentence, and your hearts so heavy,
  - type: text
    content: and not a soul in sight to help.
  - type: text
    content: 'Then you called out to '
  - type: text
    content: God
  - type: text
    content: ' in your desperate condition;'
  - type: text
    content: he got you out in the nick of time.
  - type: text
    content: He led you out of your dark, dark cell,
  - type: text
    content: broke open the jail and led you out.
  - type: text
    content: 'So thank '
  - type: text
    content: God
  - type: text
    content: ' for his marvelous love,'
  - type: text
    content: for his miracle mercy to the children he loves;
  - type: text
    content: He shattered the heavy jailhouse doors,
  - type: text
    content: he snapped the prison bars like matchsticks!
  '17':
  - type: text
    content: Some of you were sick because you’d lived a bad life,
  - type: text
    content: your bodies feeling the effects of your sin;
  - type: text
    content: You couldn’t stand the sight of food,
  - type: text
    content: so miserable you thought you’d be better off dead.
  - type: text
    content: 'Then you called out to '
  - type: text
    content: God
  - type: text
    content: ' in your desperate condition;'
  - type: text
    content: he got you out in the nick of time.
  - type: text
    content: He spoke the word that healed you,
  - type: text
    content: that pulled you back from the brink of death.
  - type: text
    content: 'So thank '
  - type: text
    content: God
  - type: text
    content: ' for his marvelous love,'
  - type: text
    content: for his miracle mercy to the children he loves;
  - type: text
    content: Offer thanksgiving sacrifices,
  - type: text
    content: tell the world what he’s done—sing it out!
  '23':
  - type: text
    content: Some of you set sail in big ships;
  - type: text
    content: you put to sea to do business in faraway ports.
  - type: text
    content: 'Out at sea you saw '
  - type: text
    content: God
  - type: text
    content: ' in action,'
  - type: text
    content: 'saw his breathtaking ways with the ocean:'
  - type: text
    content: With a word he called up the wind—
  - type: text
    content: an ocean storm, towering waves!
  - type: text
    content: You shot high in the sky, then the bottom dropped out;
  - type: text
    content: your hearts were stuck in your throats.
  - type: text
    content: You were spun like a top, you reeled like a drunk,
  - type: text
    content: you didn’t know which end was up.
  - type: text
    content: 'Then you called out to '
  - type: text
    content: God
  - type: text
    content: ' in your desperate condition;'
  - type: text
    content: he got you out in the nick of time.
  - type: text
    content: He quieted the wind down to a whisper,
  - type: text
    content: put a muzzle on all the big waves.
  - type: text
    content: And you were so glad when the storm died down,
  - type: text
    content: and he led you safely back to harbor.
  - type: text
    content: 'So thank '
  - type: text
    content: God
  - type: text
    content: ' for his marvelous love,'
  - type: text
    content: for his miracle mercy to the children he loves.
  - type: text
    content: Lift high your praises when the people assemble,
  - type: text
    content: shout Hallelujah when the elders meet!
  '33':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' turned rivers into wasteland,'
  - type: text
    content: springs of water into sunbaked mud;
  - type: text
    content: Luscious orchards became alkali flats
  - type: text
    content: because of the evil of the people who lived there.
  - type: text
    content: Then he changed wasteland into fresh pools of water,
  - type: text
    content: arid earth into springs of water,
  - type: text
    content: Brought in the hungry and settled them there;
  - type: text
    content: they moved in—what a great place to live!
  - type: text
    content: They sowed the fields, they planted vineyards,
  - type: text
    content: they reaped a bountiful harvest.
  - type: text
    content: He blessed them and they prospered greatly;
  - type: text
    content: their herds of cattle never decreased.
  - type: text
    content: But abuse and evil and trouble declined
  - type: text
    content: as he heaped scorn on princes and sent them away.
  - type: text
    content: He gave the poor a safe place to live,
  - type: text
    content: treated their clans like well-cared-for sheep.
  '4':
  - type: text
    content: Some of you wandered for years in the desert,
  - type: text
    content: looking but not finding a good place to live,
  - type: text
    content: Half-starved and parched with thirst,
  - type: text
    content: staggering and stumbling, on the brink of exhaustion.
  - type: text
    content: 'Then, in your desperate condition, you called out to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: He got you out in the nick of time;
  - type: text
    content: He put your feet on a wonderful road
  - type: text
    content: that took you straight to a good place to live.
  - type: text
    content: 'So thank '
  - type: text
    content: God
  - type: text
    content: ' for his marvelous love,'
  - type: text
    content: for his miracle mercy to the children he loves.
  - type: text
    content: He poured great drafts of water down parched throats;
  - type: text
    content: the starved and hungry got plenty to eat.
  '42':
  - type: text
    content: Good people see this and are glad;
  - type: text
    content: bad people are speechless, stopped in their tracks.
  - type: text
    content: If you are really wise, you’ll think this over—
  - type: text
    content: 'it’s time you appreciated '
  - type: text
    content: God
  - type: text
    content: ’s deep love.
