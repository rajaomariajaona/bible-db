document_id: PSA.107
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Oh, thank '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —he’s so good!
- type: usfm
  marker: q2
  children:
  - type: text
    text: His love never runs out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All of you set free by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', tell the world!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell how he freed you from oppression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then rounded you up from all over the place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the four winds, from the seven seas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-9
  - type: text
    text: Some of you wandered for years in the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking but not finding a good place to live,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Half-starved and parched with thirst,
- type: usfm
  marker: q2
  children:
  - type: text
    text: staggering and stumbling, on the brink of exhaustion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then, in your desperate condition, you called out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: He got you out in the nick of time;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He put your feet on a wonderful road
- type: usfm
  marker: q2
  children:
  - type: text
    text: that took you straight to a good place to live.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So thank '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for his marvelous love,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for his miracle mercy to the children he loves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He poured great drafts of water down parched throats;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the starved and hungry got plenty to eat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-16
  - type: text
    text: Some of you were locked in a dark cell,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cruelly confined behind bars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Punished for defying God’s Word,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for turning your back on the High God’s counsel—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A hard sentence, and your hearts so heavy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not a soul in sight to help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you called out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in your desperate condition;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he got you out in the nick of time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He led you out of your dark, dark cell,
- type: usfm
  marker: q2
  children:
  - type: text
    text: broke open the jail and led you out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So thank '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for his marvelous love,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for his miracle mercy to the children he loves;
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shattered the heavy jailhouse doors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he snapped the prison bars like matchsticks!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-22
  - type: text
    text: Some of you were sick because you’d lived a bad life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your bodies feeling the effects of your sin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: You couldn’t stand the sight of food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so miserable you thought you’d be better off dead.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you called out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in your desperate condition;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he got you out in the nick of time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He spoke the word that healed you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that pulled you back from the brink of death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So thank '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for his marvelous love,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for his miracle mercy to the children he loves;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Offer thanksgiving sacrifices,
- type: usfm
  marker: q2
  children:
  - type: text
    text: tell the world what he’s done—sing it out!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-32
  - type: text
    text: Some of you set sail in big ships;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you put to sea to do business in faraway ports.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Out at sea you saw '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in action,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'saw his breathtaking ways with the ocean:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: With a word he called up the wind—
- type: usfm
  marker: q2
  children:
  - type: text
    text: an ocean storm, towering waves!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You shot high in the sky, then the bottom dropped out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your hearts were stuck in your throats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were spun like a top, you reeled like a drunk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you didn’t know which end was up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you called out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in your desperate condition;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he got you out in the nick of time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He quieted the wind down to a whisper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: put a muzzle on all the big waves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you were so glad when the storm died down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he led you safely back to harbor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So thank '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for his marvelous love,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for his miracle mercy to the children he loves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lift high your praises when the people assemble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shout Hallelujah when the elders meet!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-41
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' turned rivers into wasteland,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: springs of water into sunbaked mud;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Luscious orchards became alkali flats
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the evil of the people who lived there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then he changed wasteland into fresh pools of water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: arid earth into springs of water,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Brought in the hungry and settled them there;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they moved in—what a great place to live!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sowed the fields, they planted vineyards,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they reaped a bountiful harvest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He blessed them and they prospered greatly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their herds of cattle never decreased.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But abuse and evil and trouble declined
- type: usfm
  marker: q2
  children:
  - type: text
    text: as he heaped scorn on princes and sent them away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gave the poor a safe place to live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: treated their clans like well-cared-for sheep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: Good people see this and are glad;
- type: usfm
  marker: q2
  children:
  - type: text
    text: bad people are speechless, stopped in their tracks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you are really wise, you’ll think this over—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'it’s time you appreciated '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s deep love.
