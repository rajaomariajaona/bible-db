document_id: HOS.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: This is God’s Message to Hosea son of Beeri. It came to him during the royal reigns of Judah’s kings Uzziah, Jotham, Ahaz, and Hezekiah. This was also the time that Jeroboam son of Joash was king over Israel.
  - type: heading
    content: This Whole Country Has Become a Whorehouse
  '10':
  - type: text
    content: “But down the road the population of Israel is going to explode past counting, like sand on the ocean beaches. In the very place where they were once named Nobody, they will be named God’s Somebody. Everybody in Judah and everybody in Israel will be assembled as one people. They’ll choose a single leader. There’ll be no stopping them—a great day in Jezreel!”
  '2':
  - type: text
    content: 'The first time '
  - type: text
    content: God
  - type: text
    content: ' spoke to Hosea he said:'
  - type: text
    content: “Find a whore and marry her.
  - type: text
    content: Make this whore the mother of your children.
  - type: text
    content: 'And here’s why: This whole country'
  - type: text
    content: 'has become a whorehouse, unfaithful to me, '
  - type: text
    content: God
  - type: text
    content: .”
  '3':
  - type: text
    content: Hosea did it. He picked Gomer daughter of Diblaim. She got pregnant and gave him a son.
  '4':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' told him:'
  - type: text
    content: “Name him Jezreel. It won’t be long now before
  - type: text
    content: I’ll make the people of Israel pay for the massacre at Jezreel.
  - type: text
    content: I’m calling it quits on the kingdom of Israel.
  - type: text
    content: Payday is coming! I’m going to chop Israel’s bows and arrows
  - type: text
    content: into kindling in the valley of Jezreel.”
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: 'Gomer got pregnant again. This time she had a daughter. '
  - type: text
    content: God
  - type: text
    content: ' told Hosea:'
  - type: text
    content: “Name this one No-Mercy. I’m fed up with Israel.
  - type: text
    content: I’ve run out of mercy. There’s no more forgiveness.
  - type: text
    content: Judah’s another story. I’ll continue having mercy on them.
  - type: text
    content: 'I’ll save them. It will be their '
  - type: text
    content: God
  - type: text
    content: ' who saves them,'
  - type: text
    content: Not their armaments and armies,
  - type: text
    content: not their horsepower and manpower.”
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: 'After Gomer had weaned No-Mercy, she got pregnant yet again and had a son. '
  - type: text
    content: God
  - type: text
    content: ' said:'
  - type: text
    content: “Name him Nobody. You’ve become nobodies to me,
  - type: text
    content: 'and I, '
  - type: text
    content: God
  - type: text
    content: ', am a nobody to you.'
