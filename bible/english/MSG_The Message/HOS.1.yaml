document_id: HOS.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is God’s Message to Hosea son of Beeri. It came to him during the royal reigns of Judah’s kings Uzziah, Jotham, Ahaz, and Hezekiah. This was also the time that Jeroboam son of Joash was king over Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: This Whole Country Has Become a Whorehouse
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But down the road the population of Israel is going to explode past counting, like sand on the ocean beaches. In the very place where they were once named Nobody, they will be named God’s Somebody. Everybody in Judah and everybody in Israel will be assembled as one people. They’ll choose a single leader. There’ll be no stopping them—a great day in Jezreel!”
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The first time '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Hosea he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Find a whore and marry her.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Make this whore the mother of your children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And here’s why: This whole country'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'has become a whorehouse, unfaithful to me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hosea did it. He picked Gomer daughter of Diblaim. She got pregnant and gave him a son.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Name him Jezreel. It won’t be long now before
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll make the people of Israel pay for the massacre at Jezreel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m calling it quits on the kingdom of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Payday is coming! I’m going to chop Israel’s bows and arrows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into kindling in the valley of Jezreel.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gomer got pregnant again. This time she had a daughter. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told Hosea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Name this one No-Mercy. I’m fed up with Israel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve run out of mercy. There’s no more forgiveness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judah’s another story. I’ll continue having mercy on them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I’ll save them. It will be their '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who saves them,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not their armaments and armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not their horsepower and manpower.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Gomer had weaned No-Mercy, she got pregnant yet again and had a son. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Name him Nobody. You’ve become nobodies to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', am a nobody to you.'
