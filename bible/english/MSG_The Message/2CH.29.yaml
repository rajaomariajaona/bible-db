document_id: 2CH.29,97
type_code: eng
verses:
  '1':
  - type: heading
    content: King Hezekiah
  - type: text
    content: 'Hezekiah became king when he was twenty-five years old and was king in Jerusalem for twenty-nine years. His mother was Abijah daughter of Zechariah. In '
  - type: text
    content: God
  - type: text
    content: ’s opinion he was a good king; he kept to the standards of his ancestor David.
  '10':
  - type: text
    content: '“I have decided to make a covenant with the '
  - type: text
    content: God
  - type: text
    content: ' of Israel and turn history around so that '
  - type: text
    content: God
  - type: text
    content: ' will no longer be angry with us. Children, don’t drag your feet in this! '
  - type: text
    content: God
  - type: text
    content: ' has chosen you to take your place before him to serve in conducting and leading worship—'
  - type: text
    content: this
  - type: text
    content: ' is your life work; make sure you do it and do it well.”'
  '12':
  - type: text
    content: 'The Levites stood at attention: Mahath son of Amasai and Joel son of Azariah from the Kohathites; Kish son of Abdi and Azariah son of Jehallelel from the Merarites; Joah son of Zimmah and Eden son of Joah from the Gershonites; Shimri and Jeiel sons of Elizaphan; Zechariah and Mattaniah sons of Asaph; Jehiel and Shimei of the family of Heman; Shemaiah and Uzziel of the family of Jeduthun. They presented themselves and their brothers, consecrated themselves, and set to work cleaning up The Temple of '
  - type: text
    content: God
  - type: text
    content: ' as the king had directed—as '
  - type: text
    content: God
  - type: text
    content: ' directed! The priests started from the inside and worked out; they emptied the place of the accumulation of defiling junk—pagan rubbish that had no business in that holy place—and the Levites hauled it off to the Kidron Valley. They began the Temple cleaning on the first day of the first month and by the eighth day they had worked their way out to the porch—eight days it took them to clean and consecrate The Temple itself, and in eight more days they had finished with the entire Temple complex.'
  '18':
  - type: text
    content: 'Then they reported to Hezekiah the king, “We have cleaned up the entire Temple of '
  - type: text
    content: God
  - type: text
    content: ', including the Altar of Whole-Burnt-Offering and the Table of the Bread of the Presence with their furnishings. We have also cleaned up and consecrated all the vessels which King Ahaz had gotten rid of during his misrule. Take a look; we have repaired them. They’re all there in front of the Altar of '
  - type: text
    content: God
  - type: text
    content: .”
  '20':
  - type: text
    content: 'Then Hezekiah the king went to work: He got all the leaders of the city together and marched to The Temple of '
  - type: text
    content: God
  - type: text
    content: '. They brought with them seven bulls, seven rams, seven lambs, and seven he-goats to sacrifice as an Absolution-Offering for the royal family, for the Sanctuary, and for Judah as a whole; he directed the Aaronite priests to sacrifice them on the Altar of '
  - type: text
    content: God
  - type: text
    content: . The priests butchered the bulls and then took the blood and sprinkled it on the Altar, and then the same with the rams and lambs. Finally they brought the goats up; the king and congregation laid their hands upon them. The priests butchered them and made an Absolution-Offering with their blood at the Altar to atone for the sin of all Israel—the king had ordered that the Whole-Burnt-Offering and the Absolution-Offering be for all Israel.
  '25':
  - type: text
    content: 'The king ordered the Levites to take their places in The Temple of '
  - type: text
    content: God
  - type: text
    content: ' with their musical instruments—cymbals, harps, zithers—following the original instructions of David, Gad the king’s seer, and Nathan the prophet; this was '
  - type: text
    content: God
  - type: text
    content: ’s command conveyed by his prophets. The Levites formed the orchestra of David, while the priests took up the trumpets.
  '27':
  - type: text
    content: 'Then Hezekiah gave the signal to begin: The Whole-Burnt-Offering was offered on the Altar; at the same time the sacred choir began singing, backed up by the trumpets and the David orchestra while the entire congregation worshiped. The singers sang and the trumpeters played all during the sacrifice of the Whole-Burnt-Offering. When the offering of the sacrifice was completed, the king and everyone there knelt to the ground and worshiped. Then Hezekiah the king and the leaders told the Levites to finish things off with anthems of praise to '
  - type: text
    content: God
  - type: text
    content: ' using lyrics by David and Asaph the seer. They sang their praises with joy and reverence, kneeling in worship.'
  '3':
  - type: text
    content: 'In the first month of the first year of his reign, Hezekiah, having first repaired the doors of The Temple of '
  - type: text
    content: God
  - type: text
    content: ', threw them open to the public. He assembled the priests and Levites in the court on the east side and said, “Levites, listen! Consecrate yourselves and consecrate The Temple of '
  - type: text
    content: God
  - type: text
    content: '—give this much-defiled place a good housecleaning. Our ancestors went wrong and lived badly before '
  - type: text
    content: God
  - type: text
    content: '—they discarded him, turned away from this house where we meet with '
  - type: text
    content: God
  - type: text
    content: ', and walked off. They boarded up the doors, turned out the lights, and canceled all the acts of worship of the '
  - type: text
    content: God
  - type: text
    content: ' of Israel in the holy Temple. And because of that, '
  - type: text
    content: God
  - type: text
    content: ’s anger flared up and he turned those people into a public exhibit of disaster, a moral history lesson—look and read! This is why our ancestors were killed, and this is why our wives and sons and daughters were taken prisoner and made slaves.
  '31':
  - type: text
    content: 'Hezekiah then made this response: “The dedication is complete—you’re consecrated to '
  - type: text
    content: God
  - type: text
    content: '. Now you’re ready: Come forward and bring your sacrifices and Thank-Offerings to The Temple of '
  - type: text
    content: God
  - type: text
    content: .”
  - type: text
    content: 'And come they did. Everyone in the congregation brought sacrifices and Thank-Offerings and some, overflowing with generosity, even brought Whole-Burnt-Offerings, a generosity expressed in seventy bulls, a hundred rams, and two hundred lambs—all for Whole-Burnt-Offerings for '
  - type: text
    content: God
  - type: text
    content: '! The total number of animals consecrated for sacrifice that day amounted to six hundred bulls and three thousand sheep. They ran out of priests qualified to slaughter all the Whole-Burnt-Offerings so their brother Levites stepped in and helped out while other priests consecrated themselves for the work. It turned out that the Levites had been more responsible in making sure they were properly consecrated than the priests had been. Besides the overflow of Whole-Burnt-Offerings there were also choice pieces for the Peace-Offerings and lavish libations that went with the Whole-Burnt-Offerings. The worship in The Temple of '
  - type: text
    content: God
  - type: text
    content: ' was on a firm footing again!'
  '36':
  - type: text
    content: 'Hezekiah and the congregation celebrated: God had established a firm foundation for the lives of the people—and so quickly!'
  - type: text
    content: '* * *'
