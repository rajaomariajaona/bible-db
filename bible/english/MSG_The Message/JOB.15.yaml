document_id: JOB.15
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Eliphaz Attacks Again
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: You Trivialize Religion
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-16
  - type: text
    text: 'Eliphaz of Teman spoke a second time:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “If you were truly wise, would you sound so much like a
- type: usfm
  marker: q2
  children:
  - type: text
    text: windbag, belching hot air?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Would you talk nonsense in the middle of a serious argument,
- type: usfm
  marker: q2
  children:
  - type: text
    text: babbling baloney?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at you! You trivialize religion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn spiritual conversation into empty gossip.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s your sin that taught you to talk this way.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You chose an education in fraud.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your own words have exposed your guilt.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s nothing I’ve said—you’ve incriminated yourself!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think you’re the first person to have to deal with these things?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you been around as long as the hills?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Were you listening in when God planned all this?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you think you’re the only one who knows anything?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What do you know that we don’t know?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What insights do you have that we’ve missed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gray beards and white hair back us up—
- type: usfm
  marker: q2
  children:
  - type: text
    text: old folks who’ve been around a lot longer than you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are God’s promises not enough for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spoken so gently and tenderly?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do you let your emotions take over,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lashing out and spitting fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pitting your whole being against God
- type: usfm
  marker: q2
  children:
  - type: text
    text: by letting words like this come out of your mouth?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think it’s possible for any mere mortal to be sinless in God’s sight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for anyone born of a human mother to get it all together?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why, God can’t even trust his holy angels.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He sees the flaws in the very heavens themselves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So how much less we humans, smelly and foul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who lap up evil like water?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Always at Odds with God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-26
  - type: text
    text: “I’ve a thing or two to tell you, so listen up!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m letting you in on my views;
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s what wise men and women have always taught,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'holding nothing back from what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they
  - type: text
    text: ' were taught'
- type: usfm
  marker: q1
  children:
  - type: text
    text: By their parents, back in the days
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when they had this land all to themselves:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who live by their own rules, not God’s, can expect nothing but trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the longer they live, the worse it gets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every little sound terrifies them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Just when they think they have it made, disaster strikes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They despair of things ever getting better—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re on the list of people for whom things always turn out for the worst.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They wander here and there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never knowing where the next meal is coming from—
- type: usfm
  marker: q2
  children:
  - type: text
    text: every day is doomsday!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They live in constant terror,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always with their backs up against the wall
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they insist on shaking their fists at God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: defying God Almighty to his face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Always and ever at odds with God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: always on the defensive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-35
  - type: text
    text: “Even if they’re the picture of health,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trim and fit and youthful,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll end up living in a ghost town
- type: usfm
  marker: q2
  children:
  - type: text
    text: sleeping in a hovel not fit for a dog,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a ramshackle shack.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll never get ahead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never amount to much of anything.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then death—don’t think they’ll escape that!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ll end up shriveled weeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: brought down by a puff of God’s breath.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'There’s a lesson here: Whoever invests in lies,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: gets lies for interest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Paid in full before the due date.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Some investment!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll be like fruit frost-killed before it ripens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like buds sheared off before they bloom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The godless are fruitless—a barren crew;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a life built on bribes goes up in smoke.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have sex with sin and give birth to evil.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their lives are wombs for breeding deceit.”
