document_id: JOB.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz Attacks Again
  - type: heading
    content: You Trivialize Religion
  - type: text
    content: 'Eliphaz of Teman spoke a second time:'
  - type: text
    content: “If you were truly wise, would you sound so much like a
  - type: text
    content: windbag, belching hot air?
  - type: text
    content: Would you talk nonsense in the middle of a serious argument,
  - type: text
    content: babbling baloney?
  - type: text
    content: Look at you! You trivialize religion,
  - type: text
    content: turn spiritual conversation into empty gossip.
  - type: text
    content: It’s your sin that taught you to talk this way.
  - type: text
    content: You chose an education in fraud.
  - type: text
    content: Your own words have exposed your guilt.
  - type: text
    content: It’s nothing I’ve said—you’ve incriminated yourself!
  - type: text
    content: Do you think you’re the first person to have to deal with these things?
  - type: text
    content: Have you been around as long as the hills?
  - type: text
    content: Were you listening in when God planned all this?
  - type: text
    content: Do you think you’re the only one who knows anything?
  - type: text
    content: What do you know that we don’t know?
  - type: text
    content: What insights do you have that we’ve missed?
  - type: text
    content: Gray beards and white hair back us up—
  - type: text
    content: old folks who’ve been around a lot longer than you.
  - type: text
    content: Are God’s promises not enough for you,
  - type: text
    content: spoken so gently and tenderly?
  - type: text
    content: Why do you let your emotions take over,
  - type: text
    content: lashing out and spitting fire,
  - type: text
    content: Pitting your whole being against God
  - type: text
    content: by letting words like this come out of your mouth?
  - type: text
    content: Do you think it’s possible for any mere mortal to be sinless in God’s sight,
  - type: text
    content: for anyone born of a human mother to get it all together?
  - type: text
    content: Why, God can’t even trust his holy angels.
  - type: text
    content: He sees the flaws in the very heavens themselves,
  - type: text
    content: So how much less we humans, smelly and foul,
  - type: text
    content: who lap up evil like water?
  - type: heading
    content: Always at Odds with God
  '17':
  - type: text
    content: “I’ve a thing or two to tell you, so listen up!
  - type: text
    content: I’m letting you in on my views;
  - type: text
    content: It’s what wise men and women have always taught,
  - type: text
    content: 'holding nothing back from what '
  - type: text
    content: they
  - type: text
    content: ' were taught'
  - type: text
    content: By their parents, back in the days
  - type: text
    content: 'when they had this land all to themselves:'
  - type: text
    content: Those who live by their own rules, not God’s, can expect nothing but trouble,
  - type: text
    content: and the longer they live, the worse it gets.
  - type: text
    content: Every little sound terrifies them.
  - type: text
    content: Just when they think they have it made, disaster strikes.
  - type: text
    content: They despair of things ever getting better—
  - type: text
    content: they’re on the list of people for whom things always turn out for the worst.
  - type: text
    content: They wander here and there,
  - type: text
    content: never knowing where the next meal is coming from—
  - type: text
    content: every day is doomsday!
  - type: text
    content: They live in constant terror,
  - type: text
    content: always with their backs up against the wall
  - type: text
    content: Because they insist on shaking their fists at God,
  - type: text
    content: defying God Almighty to his face,
  - type: text
    content: Always and ever at odds with God,
  - type: text
    content: always on the defensive.
  '27':
  - type: text
    content: “Even if they’re the picture of health,
  - type: text
    content: trim and fit and youthful,
  - type: text
    content: They’ll end up living in a ghost town
  - type: text
    content: sleeping in a hovel not fit for a dog,
  - type: text
    content: a ramshackle shack.
  - type: text
    content: They’ll never get ahead,
  - type: text
    content: never amount to much of anything.
  - type: text
    content: And then death—don’t think they’ll escape that!
  - type: text
    content: They’ll end up shriveled weeds,
  - type: text
    content: brought down by a puff of God’s breath.
  - type: text
    content: 'There’s a lesson here: Whoever invests in lies,'
  - type: text
    content: gets lies for interest,
  - type: text
    content: Paid in full before the due date.
  - type: text
    content: Some investment!
  - type: text
    content: They’ll be like fruit frost-killed before it ripens,
  - type: text
    content: like buds sheared off before they bloom.
  - type: text
    content: The godless are fruitless—a barren crew;
  - type: text
    content: a life built on bribes goes up in smoke.
  - type: text
    content: They have sex with sin and give birth to evil.
  - type: text
    content: Their lives are wombs for breeding deceit.”
