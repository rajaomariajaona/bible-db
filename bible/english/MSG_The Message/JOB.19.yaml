document_id: JOB.19,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Answers Bildad
  - type: heading
    content: I Call for Help and No One Bothers
  - type: text
    content: 'Job answered:'
  - type: text
    content: “How long are you going to keep battering away at me,
  - type: text
    content: pounding me with these harangues?
  - type: text
    content: Time after time after time you jump all over me.
  - type: text
    content: Do you have no conscience, abusing me like this?
  - type: text
    content: Even if I have, somehow or other, gotten off the track,
  - type: text
    content: what business is that of yours?
  - type: text
    content: Why do you insist on putting me down,
  - type: text
    content: using my troubles as a stick to beat me?
  - type: text
    content: Tell it to God—he’s the one behind all this,
  - type: text
    content: he’s the one who dragged me into this mess.
  '13':
  - type: text
    content: “God alienated my family from me;
  - type: text
    content: everyone who knows me avoids me.
  - type: text
    content: My relatives and friends have all left;
  - type: text
    content: houseguests forget I ever existed.
  - type: text
    content: The servant girls treat me like a deadbeat off the street,
  - type: text
    content: look at me like they’ve never seen me before.
  - type: text
    content: I call my attendant and he ignores me,
  - type: text
    content: ignores me even though I plead with him.
  - type: text
    content: My wife can’t stand to be around me anymore.
  - type: text
    content: I’m repulsive to my family.
  - type: text
    content: Even street urchins despise me;
  - type: text
    content: when I come out, they taunt and jeer.
  - type: text
    content: Everyone I’ve ever been close to abhors me;
  - type: text
    content: my dearest loved ones reject me.
  - type: text
    content: I’m nothing but a bag of bones;
  - type: text
    content: my life hangs by a thread.
  '21':
  - type: text
    content: “Oh, friends, dear friends, take pity on me.
  - type: text
    content: God has come down hard on me!
  - type: text
    content: Do you have to be hard on me, too?
  - type: text
    content: Don’t you ever tire of abusing me?
  '23':
  - type: text
    content: “If only my words were written in a book—
  - type: text
    content: better yet, chiseled in stone!
  - type: text
    content: Still, I know that God lives—the One who gives me back my life—
  - type: text
    content: and eventually he’ll take his stand on earth.
  - type: text
    content: And I’ll see him—even though I get skinned alive!—
  - type: text
    content: see God myself, with my very own eyes.
  - type: text
    content: Oh, how I long for that day!
  '28':
  - type: text
    content: “If you’re thinking, ‘How can we get through to him,
  - type: text
    content: get him to see that his trouble is all his own fault?’
  - type: text
    content: 'Forget it. Start worrying about '
  - type: text
    content: yourselves.
  - type: text
    content: Worry about your own sins and God’s coming judgment,
  - type: text
    content: for judgment is most certainly on the way.”
  '7':
  - type: text
    content: “Look at me—I shout ‘Murder!’ and I’m ignored;
  - type: text
    content: I call for help and no one bothers to stop.
  - type: text
    content: God threw a barricade across my path—I’m stymied;
  - type: text
    content: he turned out all the lights—I’m stuck in the dark.
  - type: text
    content: He destroyed my reputation,
  - type: text
    content: robbed me of all self-respect.
  - type: text
    content: He tore me apart piece by piece—I’m ruined!
  - type: text
    content: Then he yanked out hope by the roots.
  - type: text
    content: He’s angry with me—oh, how he’s angry!
  - type: text
    content: He treats me like his worst enemy.
  - type: text
    content: He has launched a major campaign against me,
  - type: text
    content: using every weapon he can think of,
  - type: text
    content: coming at me from all sides at once.
  - type: heading
    content: I Know That God Lives
