document_id: JOB.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Job Answers Bildad
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: I Call for Help and No One Bothers
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: 'Job answered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How long are you going to keep battering away at me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pounding me with these harangues?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Time after time after time you jump all over me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you have no conscience, abusing me like this?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if I have, somehow or other, gotten off the track,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what business is that of yours?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you insist on putting me down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: using my troubles as a stick to beat me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell it to God—he’s the one behind all this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s the one who dragged me into this mess.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-20
    - type: text
      text: “God alienated my family from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone who knows me avoids me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My relatives and friends have all left;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: houseguests forget I ever existed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The servant girls treat me like a deadbeat off the street,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look at me like they’ve never seen me before.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I call my attendant and he ignores me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ignores me even though I plead with him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My wife can’t stand to be around me anymore.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m repulsive to my family.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even street urchins despise me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I come out, they taunt and jeer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone I’ve ever been close to abhors me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my dearest loved ones reject me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m nothing but a bag of bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my life hangs by a thread.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: “Oh, friends, dear friends, take pity on me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God has come down hard on me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you have to be hard on me, too?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t you ever tire of abusing me?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-27
    - type: text
      text: “If only my words were written in a book—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: better yet, chiseled in stone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Still, I know that God lives—the One who gives me back my life—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and eventually he’ll take his stand on earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I’ll see him—even though I get skinned alive!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: see God myself, with my very own eyes.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, how I long for that day!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: “If you’re thinking, ‘How can we get through to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get him to see that his trouble is all his own fault?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Forget it. Start worrying about '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yourselves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Worry about your own sins and God’s coming judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for judgment is most certainly on the way.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-12
    - type: text
      text: “Look at me—I shout ‘Murder!’ and I’m ignored;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I call for help and no one bothers to stop.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God threw a barricade across my path—I’m stymied;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he turned out all the lights—I’m stuck in the dark.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He destroyed my reputation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: robbed me of all self-respect.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He tore me apart piece by piece—I’m ruined!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then he yanked out hope by the roots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s angry with me—oh, how he’s angry!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He treats me like his worst enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has launched a major campaign against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: using every weapon he can think of,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: coming at me from all sides at once.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Know That God Lives
    marker-yv: yv-h
