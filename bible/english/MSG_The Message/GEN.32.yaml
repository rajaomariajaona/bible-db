document_id: GEN.32,97
type_code: eng
verses:
  '1':
  - type: text
    content: And Jacob went his way. Angels of God met him. When Jacob saw them he said, “Oh! God’s Camp!” And he named the place Mahanaim (Campground).
  '13':
  - type: text
    content: 'He slept the night there. Then he prepared a present for his brother Esau from his possessions: two hundred female goats, twenty male goats, two hundred ewes and twenty rams, thirty camels with their nursing young, forty cows and ten bulls, twenty female donkeys and ten male donkeys. He put a servant in charge of each herd and said, “Go ahead of me and keep a healthy space between each herd.”'
  '17':
  - type: text
    content: 'Then he instructed the first one out: “When my brother Esau comes close and asks, ‘Who is your master? Where are you going? Who owns these?’—answer him like this, ‘Your servant Jacob. They are a gift to my master Esau. He’s on his way.’”'
  '19':
  - type: text
    content: 'He gave the same instructions to the second servant and to the third—to each in turn as they set out with their herds: “Say ‘Your servant Jacob is on his way behind us.’” He thought, “I will soften him up with the succession of gifts. Then when he sees me face-to-face, maybe he’ll be glad to welcome me.”'
  '21':
  - type: text
    content: So his gifts went before him while he settled down for the night in the camp.
  '22':
  - type: text
    content: But during the night he got up and took his two wives, his two maidservants, and his eleven children and crossed the ford of the Jabbok. He got them safely across the brook along with all his possessions.
  '24':
  - type: text
    content: But Jacob stayed behind by himself, and a man wrestled with him until daybreak. When the man saw that he couldn’t get the best of Jacob as they wrestled, he deliberately threw Jacob’s hip out of joint.
  '26':
  - type: text
    content: The man said, “Let me go; it’s daybreak.”
  - type: text
    content: Jacob said, “I’m not letting you go ’til you bless me.”
  '27':
  - type: text
    content: The man said, “What’s your name?”
  - type: text
    content: He answered, “Jacob.”
  '28':
  - type: text
    content: The man said, “But no longer. Your name is no longer Jacob. From now on it’s Israel (God-Wrestler); you’ve wrestled with God and you’ve come through.”
  '29':
  - type: text
    content: Jacob asked, “And what’s your name?”
  - type: text
    content: The man said, “Why do you want to know my name?” And then, right then and there, he blessed him.
  '3':
  - type: text
    content: 'Then Jacob sent messengers on ahead to his brother Esau in the land of Seir in Edom. He instructed them: “Tell my master Esau this, ‘A message from your servant Jacob: I’ve been staying with Laban and couldn’t get away until now. I’ve acquired cattle and donkeys and sheep; also men and women servants. I’m telling you all this, my master, hoping for your approval.’”'
  '30':
  - type: text
    content: Jacob named the place Peniel (God’s Face) because, he said, “I saw God face-to-face and lived to tell the story!”
  '31':
  - type: text
    content: The sun came up as he left Peniel, limping because of his hip. (This is why Israelites to this day don’t eat the hip muscle; because Jacob’s hip was thrown out of joint.)
  '6':
  - type: text
    content: The messengers came back to Jacob and said, “We talked to your brother Esau and he’s on his way to meet you. But he has four hundred men with him.”
  '7':
  - type: text
    content: Jacob was scared. Very scared. Panicked, he divided his people, sheep, cattle, and camels into two camps. He thought, “If Esau comes on the first camp and attacks it, the other camp has a chance to get away.”
  '9':
  - type: text
    content: 'And then Jacob prayed, “God of my father Abraham, God of my father Isaac, '
  - type: text
    content: God
  - type: text
    content: ' who told me, ‘Go back to your parents’ homeland and I’ll treat you well.’ I don’t deserve all the love and loyalty you’ve shown me. When I left here and crossed the Jordan I only had the clothes on my back, and now look at me—two camps! Save me, please, from the violence of my brother, my angry brother! I’m afraid he’ll come and attack us all, me, the mothers and the children. You yourself said, ‘I will treat you well; I’ll make your descendants like the sands of the sea, far too many to count.’”'
