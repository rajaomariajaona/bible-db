document_id: 1TH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: You’re God-Taught
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: One final word, friends. We ask you—
  - type: usfm
    marker: it
    children:
    - type: text
      text: urge
  - type: text
    text: ' is more like it—that you keep on doing what we told you to do to please God, not in a dogged religious plod, but in a living, spirited dance. You know the guidelines we laid out for you from the Master Jesus. God wants you to live a pure life.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Keep yourselves from sexual promiscuity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Learn to appreciate and give dignity to your body, not abusing it, as is so common among those who know nothing of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Don’t run roughshod over the concerns of your brothers and sisters. Their concerns are God’s concerns, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' will take care of them. We’ve warned you about this before. God hasn’t invited us into a disorderly, grungy life but into something holy and beautiful—as beautiful on the inside as the outside.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If you disregard this advice, you’re not offending your neighbors; you’re rejecting God, who is making you a gift of his Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Regarding life together and getting along with each other, you don’t need me to tell you what to do. You’re '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: -taught in these matters. Just love one another! You’re already good at it; your friends all over the province of Macedonia are the evidence. Keep it up; get better and better at it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Stay calm; mind your own business; do your own job. You’ve heard all this from us before, but a reminder never hurts. We want you living in a way that will command the respect of outsiders, not lying around sponging off your friends.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Master’s Coming
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: And regarding the question, friends, that has come up about what happens to those already dead and buried, we don’t want you in the dark any longer. First off, you must not carry on over them like people who have nothing to look forward to, as if the grave were the last word. Since Jesus died and broke loose from the grave, God will most certainly bring back to life those who died in Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-18
  - type: text
    text: 'And then this: We can tell you with complete confidence—we have the Master’s word on it—that when the Master comes again to get us, those of us who are still alive will not get a jump on the dead and leave them behind. In actual fact, they’ll be ahead of us. The Master himself will give the command. Archangel thunder! God’s trumpet blast! He’ll come down from heaven and the dead in Christ will rise—they’ll go first. Then the rest of us who are still alive at the time will be caught up with them into the clouds to meet the Master. Oh, we’ll be walking on air! And then there will be one huge family reunion with the Master. So reassure one another with these words.'
