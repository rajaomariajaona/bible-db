document_id: ISA.64,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Can We Be Saved?
  - type: text
    content: Oh, that you would rip open the heavens and descend,
  - type: text
    content: make the mountains shudder at your presence—
  - type: text
    content: As when a forest catches fire,
  - type: text
    content: as when fire makes a pot to boil—
  - type: text
    content: To shock your enemies into facing you,
  - type: text
    content: make the nations shake in their boots!
  - type: text
    content: You did terrible things we never expected,
  - type: text
    content: descended and made the mountains shudder at your presence.
  - type: text
    content: Since before time began
  - type: text
    content: no one has ever imagined,
  - type: text
    content: No ear heard, no eye seen, a God like you
  - type: text
    content: who works for those who wait for him.
  - type: text
    content: You meet those who happily do what is right,
  - type: text
    content: who keep a good memory of the way you work.
  - type: text
    content: But how angry you’ve been with us!
  - type: text
    content: We’ve sinned and kept at it so long!
  - type: text
    content: Is there any hope for us? Can we be saved?
  - type: text
    content: We’re all sin-infected, sin-contaminated.
  - type: text
    content: Our best efforts are grease-stained rags.
  - type: text
    content: We dry up like autumn leaves—
  - type: text
    content: sin-dried, we’re blown off by the wind.
  - type: text
    content: No one prays to you
  - type: text
    content: or makes the effort to reach out to you
  - type: text
    content: Because you’ve turned away from us,
  - type: text
    content: left us to stew in our sins.
  '8':
  - type: text
    content: 'Still, '
  - type: text
    content: God
  - type: text
    content: ', you are our Father.'
  - type: text
    content: 'We’re the clay and you’re our potter:'
  - type: text
    content: All of us are what you made us.
  - type: text
    content: 'Don’t be too angry with us, O '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Don’t keep a permanent account of wrongdoing.
  - type: text
    content: 'Keep in mind, please, we '
  - type: text
    content: are
  - type: text
    content: ' your people—all of us.'
  - type: text
    content: 'Your holy cities are all ghost towns:'
  - type: text
    content: Zion’s a ghost town,
  - type: text
    content: Jerusalem’s a field of weeds.
  - type: text
    content: Our holy and beautiful Temple,
  - type: text
    content: which our ancestors filled with your praises,
  - type: text
    content: Was burned down by fire,
  - type: text
    content: all our lovely parks and gardens in ruins.
  - type: text
    content: In the face of all this,
  - type: text
    content: 'are you going to sit there unmoved, '
  - type: text
    content: God
  - type: text
    content: '?'
  - type: text
    content: Aren’t you going to say something?
  - type: text
    content: Haven’t you made us miserable long enough?
