document_id: ISA.64,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Can We Be Saved?
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: Oh, that you would rip open the heavens and descend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make the mountains shudder at your presence—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As when a forest catches fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as when fire makes a pot to boil—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To shock your enemies into facing you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make the nations shake in their boots!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You did terrible things we never expected,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: descended and made the mountains shudder at your presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since before time began
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one has ever imagined,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No ear heard, no eye seen, a God like you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who works for those who wait for him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You meet those who happily do what is right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who keep a good memory of the way you work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But how angry you’ve been with us!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’ve sinned and kept at it so long!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is there any hope for us? Can we be saved?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’re all sin-infected, sin-contaminated.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our best efforts are grease-stained rags.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We dry up like autumn leaves—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sin-dried, we’re blown off by the wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one prays to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or makes the effort to reach out to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you’ve turned away from us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: left us to stew in our sins.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-12
    - type: text
      text: 'Still, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you are our Father.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'We’re the clay and you’re our potter:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All of us are what you made us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Don’t be too angry with us, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t keep a permanent account of wrongdoing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Keep in mind, please, we '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' your people—all of us.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your holy cities are all ghost towns:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Zion’s a ghost town,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem’s a field of weeds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our holy and beautiful Temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which our ancestors filled with your praises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was burned down by fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all our lovely parks and gardens in ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the face of all this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'are you going to sit there unmoved, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aren’t you going to say something?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Haven’t you made us miserable long enough?
