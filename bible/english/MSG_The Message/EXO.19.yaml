document_id: EXO.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mount Sinai
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Three months after leaving Egypt the Israelites entered the Wilderness of Sinai. They followed the route from Rephidim, arrived at the Wilderness of Sinai, and set up camp. Israel camped there facing the mountain.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Go to the people. For the next two days get these people ready to meet the Holy '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Have them scrub their clothes so that on the third day they’ll be fully prepared, because on the third day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will come down on Mount Sinai and make his presence known to all the people. Post boundaries for the people all around, telling them, ‘Warning! Don’t climb the mountain. Don’t even touch its edge. Whoever touches the mountain dies—a certain death. And no one is to touch that person, he’s to be stoned. That’s right—stoned. Or shot with arrows, shot to death. Animal or man, whichever—put to death.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “A long blast from the horn will signal that it’s safe to climb the mountain.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'Moses went down the mountain to the people and prepared them for the holy meeting. They gave their clothes a good scrubbing. Then he addressed the people: “Be ready in three days. Don’t sleep with a woman.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: On the third day at daybreak, there were loud claps of thunder, flashes of lightning, a thick cloud covering the mountain, and an ear-piercing trumpet blast. Everyone in the camp shuddered in fear.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Moses led the people out of the camp to meet God. They stood at attention at the base of the mountain.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: 'Mount Sinai was all smoke because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had come down on it as fire. Smoke poured from it like smoke from a furnace. The whole mountain shuddered and heaved. The trumpet blasts grew louder and louder. Moses spoke and God answered in thunder. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' descended to the peak of Mount Sinai. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' called Moses up to the peak and Moses climbed up.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Go down. Warn the people not to break through the barricades to get a look at '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' lest many of them die. And the priests also, warn them to prepare themselves for the holy meeting, lest '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' break out against them.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Moses said to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', “But the people can’t climb Mount Sinai. You’ve already warned us well telling us: ‘Post boundaries around the mountain. Respect the holy mountain.’”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told him, “Go down and then bring Aaron back up with you. But make sure that the priests and the people don’t break through and come up to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', lest he break out against them.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So Moses went down to the people. He said to them:'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-6
    - type: text
      text: 'As Moses went up to meet God, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' called down to him from the mountain: “Speak to the House of Jacob, tell the People of Israel: ‘You have seen what I did to Egypt and how I carried you on eagles’ wings and brought you to me. If you will listen obediently to what I say and keep my covenant, out of all peoples you’ll be my special treasure. The whole Earth is mine to choose from, but you’re special: a kingdom of priests, a holy nation.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “This is what I want you to tell the People of Israel.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Moses came back and called the elders of Israel together and set before them all these words which '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The people were unanimous in their response: “Everything '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, we will do.” Moses took the people’s answer back to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Get ready. I’m about to come to you in a thick cloud so that the people can listen in and trust you completely when I speak with you.” Again Moses reported the people’s answer to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
