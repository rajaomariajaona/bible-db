document_id: ISA.63,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Who Goes There?
  - type: text
    content: The watchmen call out,
  - type: text
    content: “Who goes there, marching out of Edom,
  - type: text
    content: out of Bozrah in clothes dyed red?
  - type: text
    content: Name yourself, so splendidly dressed,
  - type: text
    content: advancing, bristling with power!”
  - type: text
    content: '“It is I: I speak what is right,'
  - type: text
    content: I, mighty to save!”
  '10':
  - type: text
    content: But they turned on him;
  - type: text
    content: they grieved his Holy Spirit.
  - type: text
    content: So he turned on them,
  - type: text
    content: became their enemy and fought them.
  '11':
  - type: text
    content: ' Then they remembered the old days,'
  - type: text
    content: 'the days of Moses, God’s servant:'
  - type: text
    content: “Where is he who brought the shepherds of his flock
  - type: text
    content: up and out of the sea?
  - type: text
    content: And what happened to the One who set
  - type: text
    content: his Holy Spirit within them?
  - type: text
    content: Who linked his arm with Moses’ right arm,
  - type: text
    content: divided the waters before them,
  - type: text
    content: Making him famous ever after,
  - type: text
    content: and led them through the muddy abyss
  - type: text
    content: as surefooted as horses on hard, level ground?
  - type: text
    content: Like a herd of cattle led to pasture,
  - type: text
    content: 'the Spirit of '
  - type: text
    content: God
  - type: text
    content: ' gave them rest.”'
  '14':
  - type: text
    content: ' '
  - type: text
    content: That’s
  - type: text
    content: ' how you led your people!'
  - type: text
    content: That’s
  - type: text
    content: ' how you became so famous!'
  - type: text
    content: Look down from heaven, look at us!
  - type: text
    content: Look out the window of your holy and magnificent house!
  - type: text
    content: Whatever happened to your passion,
  - type: text
    content: your famous mighty acts,
  - type: text
    content: Your heartfelt pity, your compassion?
  - type: text
    content: Why are you holding back?
  - type: text
    content: You are our Father.
  - type: text
    content: Abraham and Israel are long dead.
  - type: text
    content: They wouldn’t know us from Adam.
  - type: text
    content: 'But you’re our '
  - type: text
    content: living
  - type: text
    content: ' Father,'
  - type: text
    content: our Redeemer, famous from eternity!
  - type: text
    content: 'Why, '
  - type: text
    content: God
  - type: text
    content: ', did you make us wander from your ways?'
  - type: text
    content: Why did you make us cold and stubborn
  - type: text
    content: so that we no longer worshiped you in awe?
  - type: text
    content: Turn back for the sake of your servants.
  - type: text
    content: You own us! We belong to you!
  - type: text
    content: For a while your holy people had it good,
  - type: text
    content: but now our enemies have wrecked your holy place.
  - type: text
    content: For a long time now, you’ve paid no attention to us.
  - type: text
    content: It’s like you never knew us.
  '2':
  - type: text
    content: “And why are your robes so red,
  - type: text
    content: your clothes dyed red like those who tread grapes?”
  '3':
  - type: text
    content: “I’ve been treading the winepress alone.
  - type: text
    content: No one was there to help me.
  - type: text
    content: Angrily, I stomped the grapes;
  - type: text
    content: raging, I trampled the people.
  - type: text
    content: Their blood spurted all over me—
  - type: text
    content: all my clothes were soaked with blood.
  - type: text
    content: I was set on vengeance.
  - type: text
    content: The time for redemption had arrived.
  - type: text
    content: I looked around for someone to help
  - type: text
    content: —no one.
  - type: text
    content: I couldn’t believe it
  - type: text
    content: —not one volunteer.
  - type: text
    content: So I went ahead and did it myself,
  - type: text
    content: fed and fueled by my rage.
  - type: text
    content: I trampled the people in my anger,
  - type: text
    content: crushed them under foot in my wrath,
  - type: text
    content: soaked the earth with their lifeblood.”
  - type: heading
    content: All the Things God Has Done That Need Praising
  '7':
  - type: text
    content: 'I’ll make a list of '
  - type: text
    content: God
  - type: text
    content: ’s gracious dealings,
  - type: text
    content: 'all the things '
  - type: text
    content: God
  - type: text
    content: ' has done that need praising,'
  - type: text
    content: 'All the generous bounties of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: his great goodness to the family of Israel—
  - type: text
    content: Compassion lavished,
  - type: text
    content: love extravagant.
  - type: text
    content: He said, “Without question these are my people,
  - type: text
    content: children who would never betray me.”
  - type: text
    content: So he became their Savior.
  - type: text
    content: In all their troubles,
  - type: text
    content: he was troubled, too.
  - type: text
    content: He didn’t send someone else to help them.
  - type: text
    content: He did it himself, in person.
  - type: text
    content: Out of his own love and pity
  - type: text
    content: he redeemed them.
  - type: text
    content: He rescued them and carried them along
  - type: text
    content: for a long, long time.
