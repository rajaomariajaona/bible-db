document_id: ISA.63
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Who Goes There?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The watchmen call out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Who goes there, marching out of Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: out of Bozrah in clothes dyed red?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Name yourself, so splendidly dressed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: advancing, bristling with power!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“It is I: I speak what is right,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I, mighty to save!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “And why are your robes so red,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your clothes dyed red like those who tread grapes?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: “I’ve been treading the winepress alone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: No one was there to help me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Angrily, I stomped the grapes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: raging, I trampled the people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their blood spurted all over me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all my clothes were soaked with blood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was set on vengeance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The time for redemption had arrived.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I looked around for someone to help
- type: usfm
  marker: q2
  children:
  - type: text
    text: —no one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I couldn’t believe it
- type: usfm
  marker: q2
  children:
  - type: text
    text: —not one volunteer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I went ahead and did it myself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fed and fueled by my rage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I trampled the people in my anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crushed them under foot in my wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: soaked the earth with their lifeblood.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'All the Things '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Has Done That Need Praising'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'I’ll make a list of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s gracious dealings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'all the things '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done that need praising,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All the generous bounties of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: his great goodness to the family of Israel—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Compassion lavished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: love extravagant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He said, “Without question these are my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: children who would never betray me.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he became their Savior.
- type: usfm
  marker: q2
  children:
  - type: text
    text: In all their troubles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he was troubled, too.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He didn’t send someone else to help them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He did it himself, in person.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Out of his own love and pity
- type: usfm
  marker: q2
  children:
  - type: text
    text: he redeemed them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rescued them and carried them along
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a long, long time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But they turned on him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they grieved his Holy Spirit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he turned on them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: became their enemy and fought them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14a
  - type: text
    text: ' Then they remembered the old days,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the days of Moses, God’s servant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Where is he who brought the shepherds of his flock
- type: usfm
  marker: q2
  children:
  - type: text
    text: up and out of the sea?
- type: usfm
  marker: q1
  children:
  - type: text
    text: And what happened to the One who set
- type: usfm
  marker: q2
  children:
  - type: text
    text: his Holy Spirit within them?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who linked his arm with Moses’ right arm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: divided the waters before them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Making him famous ever after,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and led them through the muddy abyss
- type: usfm
  marker: q2
  children:
  - type: text
    text: as surefooted as horses on hard, level ground?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a herd of cattle led to pasture,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gave them rest.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14b-19
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: That’s
  - type: text
    text: ' how you led your people!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: That’s
  - type: text
    text: ' how you became so famous!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look down from heaven, look at us!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look out the window of your holy and magnificent house!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whatever happened to your passion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your famous mighty acts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your heartfelt pity, your compassion?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why are you holding back?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are our Father.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Abraham and Israel are long dead.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They wouldn’t know us from Adam.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But you’re our '
  - type: usfm
    marker: it
    children:
    - type: text
      text: living
  - type: text
    text: ' Father,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: our Redeemer, famous from eternity!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Why, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', did you make us wander from your ways?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why did you make us cold and stubborn
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we no longer worshiped you in awe?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turn back for the sake of your servants.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You own us! We belong to you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For a while your holy people had it good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but now our enemies have wrecked your holy place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For a long time now, you’ve paid no attention to us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s like you never knew us.
