document_id: EZK.27,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Tyre, Gateway to the Sea
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “You, son of man, raise a funeral song over Tyre. Tell Tyre, gateway to the sea, merchant to the world, trader among the far-off islands, ‘This is what '
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: '“‘You boast, Tyre:'
  - type: text
    content: “I’m the perfect ship—stately, handsome.”
  - type: text
    content: You ruled the high seas from
  - type: text
    content: a real beauty, crafted to perfection.
  - type: text
    content: Your planking came from
  - type: text
    content: Mount Hermon junipers.
  - type: text
    content: A Lebanon cedar
  - type: text
    content: supplied your mast.
  - type: text
    content: They made your oars
  - type: text
    content: from sturdy Bashan oaks.
  - type: text
    content: Cypress from Cyprus inlaid with ivory
  - type: text
    content: was used for the decks.
  - type: text
    content: Your sail and flag were of colorful
  - type: text
    content: embroidered linen from Egypt.
  - type: text
    content: Your purple deck awnings
  - type: text
    content: also came from Cyprus.
  - type: text
    content: Men of Sidon and Arvad pulled the oars.
  - type: text
    content: Your seasoned seamen, O Tyre, were the crew.
  - type: text
    content: Ship’s carpenters
  - type: text
    content: were old salts from Byblos.
  - type: text
    content: All the ships of the sea and their sailors
  - type: text
    content: clustered around you to barter for your goods.
  '10':
  - type: text
    content: “‘Your army was composed of soldiers
  - type: text
    content: from Paras, Lud, and Put,
  - type: text
    content: Elite troops in uniformed splendor.
  - type: text
    content: They put you on the map!
  - type: text
    content: Your city police were imported from
  - type: text
    content: Arvad, Helech, and Gammad.
  - type: text
    content: They hung their shields from the city walls,
  - type: text
    content: a final, perfect touch to your beauty.
  '12':
  - type: text
    content: “‘Tarshish carried on business with you because of your great wealth. They worked for you, trading in silver, iron, tin, and lead for your products.
  '13':
  - type: text
    content: “‘Greece, Tubal, and Meshech did business with you, trading slaves and bronze for your products.
  '14':
  - type: text
    content: “‘Beth-togarmah traded work horses, war horses, and mules for your products.
  '15':
  - type: text
    content: “‘The people of Rhodes did business with you. Many far-off islands traded with you in ivory and ebony.
  '16':
  - type: text
    content: “‘Edom did business with you because of all your goods. They traded for your products with agate, purple textiles, embroidered cloth, fine linen, coral, and rubies.
  '17':
  - type: text
    content: “‘Judah and Israel did business with you. They traded for your products with premium wheat, millet, honey, oil, and balm.
  '18':
  - type: text
    content: “‘Damascus, attracted by your vast array of products and well-stocked warehouses, carried on business with you, trading in wine from Helbon and wool from Zahar.
  '19':
  - type: text
    content: “‘Danites and Greeks from Uzal traded with you, using wrought iron, cinnamon, and spices.
  '20':
  - type: text
    content: “‘Dedan traded with you for saddle blankets.
  '21':
  - type: text
    content: “‘Arabia and all the Bedouin sheiks of Kedar traded lambs, rams, and goats with you.
  '22':
  - type: text
    content: “‘Traders from Sheba and Raamah in South Arabia carried on business with you in premium spices, precious stones, and gold.
  '23':
  - type: text
    content: “‘Haran, Canneh, and Eden from the east in Assyria and Media traded with you, bringing elegant clothes, dyed textiles, and elaborate carpets to your bazaars.
  '25':
  - type: text
    content: “‘The great Tarshish ships were your freighters, importing and exporting. Oh, it was big business for you, trafficking the seaways!
  '26':
  - type: text
    content: “‘Your sailors row mightily,
  - type: text
    content: taking you into the high seas.
  - type: text
    content: Then a storm out of the east
  - type: text
    content: shatters your ship in the ocean deep.
  - type: text
    content: Everything sinks—your rich goods and products,
  - type: text
    content: sailors and crew, ship’s carpenters and soldiers,
  - type: text
    content: Sink to the bottom of the sea.
  - type: text
    content: Total shipwreck.
  - type: text
    content: The cries of your sailors
  - type: text
    content: reverberate on shore.
  - type: text
    content: Sailors everywhere abandon ship.
  - type: text
    content: Veteran seamen swim for dry land.
  - type: text
    content: They cry out in grief,
  - type: text
    content: a choir of bitter lament over you.
  - type: text
    content: They smear their faces with ashes,
  - type: text
    content: shave their heads,
  - type: text
    content: Wear rough burlap,
  - type: text
    content: wildly keening their loss.
  - type: text
    content: 'They raise their funeral song:'
  - type: text
    content: “Who on the high seas is like Tyre!”
  '33':
  - type: text
    content: “‘As you crisscrossed the seas with your products,
  - type: text
    content: you satisfied many peoples.
  - type: text
    content: Your worldwide trade
  - type: text
    content: made earth’s kings rich.
  - type: text
    content: And now you’re battered to bits by the waves,
  - type: text
    content: sunk to the bottom of the sea,
  - type: text
    content: And everything you’ve bought and sold
  - type: text
    content: has sunk to the bottom with you.
  - type: text
    content: Everyone on shore looks on in terror.
  - type: text
    content: The hair of kings stands on end,
  - type: text
    content: their faces drawn and haggard!
  - type: text
    content: The buyers and sellers of the world
  - type: text
    content: 'throw up their hands:'
  - type: text
    content: This horror can’t happen!
  - type: text
    content: 'Oh, this '
  - type: text
    content: has
  - type: text
    content: ' happened!’”'
