document_id: EZK.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tyre, Gateway to the Sea
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-9
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “You, son of man, raise a funeral song over Tyre. Tell Tyre, gateway to the sea, merchant to the world, trader among the far-off islands, ‘This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“‘You boast, Tyre:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I’m the perfect ship—stately, handsome.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: You ruled the high seas from
- type: usfm
  marker: q2
  children:
  - type: text
    text: a real beauty, crafted to perfection.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your planking came from
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mount Hermon junipers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A Lebanon cedar
- type: usfm
  marker: q2
  children:
  - type: text
    text: supplied your mast.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They made your oars
- type: usfm
  marker: q2
  children:
  - type: text
    text: from sturdy Bashan oaks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cypress from Cyprus inlaid with ivory
- type: usfm
  marker: q2
  children:
  - type: text
    text: was used for the decks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sail and flag were of colorful
- type: usfm
  marker: q2
  children:
  - type: text
    text: embroidered linen from Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your purple deck awnings
- type: usfm
  marker: q2
  children:
  - type: text
    text: also came from Cyprus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Men of Sidon and Arvad pulled the oars.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your seasoned seamen, O Tyre, were the crew.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ship’s carpenters
- type: usfm
  marker: q2
  children:
  - type: text
    text: were old salts from Byblos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the ships of the sea and their sailors
- type: usfm
  marker: q2
  children:
  - type: text
    text: clustered around you to barter for your goods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “‘Your army was composed of soldiers
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Paras, Lud, and Put,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elite troops in uniformed splendor.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They put you on the map!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your city police were imported from
- type: usfm
  marker: q2
  children:
  - type: text
    text: Arvad, Helech, and Gammad.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hung their shields from the city walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a final, perfect touch to your beauty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “‘Tarshish carried on business with you because of your great wealth. They worked for you, trading in silver, iron, tin, and lead for your products.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “‘Greece, Tubal, and Meshech did business with you, trading slaves and bronze for your products.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “‘Beth-togarmah traded work horses, war horses, and mules for your products.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “‘The people of Rhodes did business with you. Many far-off islands traded with you in ivory and ebony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “‘Edom did business with you because of all your goods. They traded for your products with agate, purple textiles, embroidered cloth, fine linen, coral, and rubies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “‘Judah and Israel did business with you. They traded for your products with premium wheat, millet, honey, oil, and balm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “‘Damascus, attracted by your vast array of products and well-stocked warehouses, carried on business with you, trading in wine from Helbon and wool from Zahar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “‘Danites and Greeks from Uzal traded with you, using wrought iron, cinnamon, and spices.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “‘Dedan traded with you for saddle blankets.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “‘Arabia and all the Bedouin sheiks of Kedar traded lambs, rams, and goats with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “‘Traders from Sheba and Raamah in South Arabia carried on business with you in premium spices, precious stones, and gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: “‘Haran, Canneh, and Eden from the east in Assyria and Media traded with you, bringing elegant clothes, dyed textiles, and elaborate carpets to your bazaars.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “‘The great Tarshish ships were your freighters, importing and exporting. Oh, it was big business for you, trafficking the seaways!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-32
  - type: text
    text: “‘Your sailors row mightily,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking you into the high seas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then a storm out of the east
- type: usfm
  marker: q2
  children:
  - type: text
    text: shatters your ship in the ocean deep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everything sinks—your rich goods and products,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sailors and crew, ship’s carpenters and soldiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sink to the bottom of the sea.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Total shipwreck.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cries of your sailors
- type: usfm
  marker: q2
  children:
  - type: text
    text: reverberate on shore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sailors everywhere abandon ship.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Veteran seamen swim for dry land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cry out in grief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a choir of bitter lament over you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They smear their faces with ashes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shave their heads,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wear rough burlap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wildly keening their loss.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They raise their funeral song:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Who on the high seas is like Tyre!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-36
  - type: text
    text: “‘As you crisscrossed the seas with your products,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you satisfied many peoples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your worldwide trade
- type: usfm
  marker: q2
  children:
  - type: text
    text: made earth’s kings rich.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now you’re battered to bits by the waves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sunk to the bottom of the sea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And everything you’ve bought and sold
- type: usfm
  marker: q2
  children:
  - type: text
    text: has sunk to the bottom with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone on shore looks on in terror.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The hair of kings stands on end,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their faces drawn and haggard!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The buyers and sellers of the world
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'throw up their hands:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: This horror can’t happen!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Oh, this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has
  - type: text
    text: ' happened!’”'
