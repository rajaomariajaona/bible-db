document_id: JHN.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Prayer for His Followers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'Jesus said these things. Then, raising his eyes in prayer, he said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Father, it’s time.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Display the bright splendor of your Son
- type: usfm
  marker: q1
  children:
  - type: text
    text: So the Son in turn may show your bright splendor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You put him in charge of everything human
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he might give real and eternal life to all in his care.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And this is the real and eternal life:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: That they know you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one and only true God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Jesus Christ, whom you sent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I glorified you on earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: By completing down to the last detail
- type: usfm
  marker: q1
  children:
  - type: text
    text: What you assigned me to do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now, Father, glorify me with your very own splendor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The very splendor I had in your presence
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before there was a world.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-12
  - type: text
    text: I spelled out your character in detail
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the men and women you gave me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were yours in the first place;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you gave them to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they have now done what you said.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They know now, beyond the shadow of a doubt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That everything you gave me is firsthand from you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the message you gave me, I gave them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they took it, and were convinced
- type: usfm
  marker: q1
  children:
  - type: text
    text: That I came from you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They believed that you sent me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I pray for them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m not praying for the God-rejecting world
- type: usfm
  marker: q1
  children:
  - type: text
    text: But for those you gave me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they are yours by right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everything mine is yours, and yours mine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And my life is on display in them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I’m no longer going to be visible in the world;
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll continue in the world
- type: usfm
  marker: q1
  children:
  - type: text
    text: While I return to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Holy Father, guard them as they pursue this life
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you conferred as a gift through me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they can be one heart and mind
- type: usfm
  marker: q1
  children:
  - type: text
    text: As we are one heart and mind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As long as I was with them, I guarded them
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the pursuit of the life you gave through me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I even posted a lookout.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And not one of them got away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Except for the rebel bent on destruction
- type: usfm
  marker: q1
  children:
  - type: text
    text: (the exception that proved the rule of Scripture).
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-19
  - type: text
    text: Now I’m returning to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m saying these things in the world’s hearing
- type: usfm
  marker: q1
  children:
  - type: text
    text: So my people can experience
- type: usfm
  marker: q1
  children:
  - type: text
    text: My joy completed in them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I gave them your word;
- type: usfm
  marker: q1
  children:
  - type: text
    text: The godless world hated them because of it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they didn’t join the world’s ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just as I didn’t join the world’s ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m not asking that you take them out of the world
- type: usfm
  marker: q1
  children:
  - type: text
    text: But that you guard them from the Evil One.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are no more defined by the world
- type: usfm
  marker: q1
  children:
  - type: text
    text: Than I am defined by the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make them holy—consecrated—with the truth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your word is consecrating truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the same way that you gave me a mission in the world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I give them a mission in the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m consecrating myself for their sakes
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they’ll be truth-consecrated in their mission.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: I’m praying not only for them
- type: usfm
  marker: q1
  children:
  - type: text
    text: But also for those who will believe in me
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of them and their witness about me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The goal is for all of them to become one heart and mind—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just as you, Father, are in me and I in you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they might be one heart and mind with us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the world might believe that you, in fact, sent me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The same glory you gave me, I gave them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they’ll be as unified and together as we are—
- type: usfm
  marker: q1
  children:
  - type: text
    text: I in them and you in me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they’ll be mature in this oneness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And give the godless world evidence
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you’ve sent me and loved them
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the same way you’ve loved me.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-26
  - type: text
    text: Father, I want those you gave me
- type: usfm
  marker: q1
  children:
  - type: text
    text: To be with me, right where I am,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they can see my glory, the splendor you gave me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Having loved me
- type: usfm
  marker: q1
  children:
  - type: text
    text: Long before there ever was a world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Righteous Father, the world has never known you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I have known you, and these disciples know
- type: usfm
  marker: q1
  children:
  - type: text
    text: That you sent me on this mission.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have made your very being known to them—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who you are and what you do—
- type: usfm
  marker: q1
  children:
  - type: text
    text: And continue to make it known,
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that your love for me
- type: usfm
  marker: q1
  children:
  - type: text
    text: Might be in them
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exactly as I am in them.
