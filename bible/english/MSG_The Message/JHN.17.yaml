document_id: JHN.17,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Prayer for His Followers
  - type: text
    content: 'Jesus said these things. Then, raising his eyes in prayer, he said:'
  - type: text
    content: Father, it’s time.
  - type: text
    content: Display the bright splendor of your Son
  - type: text
    content: So the Son in turn may show your bright splendor.
  - type: text
    content: You put him in charge of everything human
  - type: text
    content: So he might give real and eternal life to all in his care.
  - type: text
    content: 'And this is the real and eternal life:'
  - type: text
    content: That they know you,
  - type: text
    content: The one and only true God,
  - type: text
    content: And Jesus Christ, whom you sent.
  - type: text
    content: I glorified you on earth
  - type: text
    content: By completing down to the last detail
  - type: text
    content: What you assigned me to do.
  - type: text
    content: And now, Father, glorify me with your very own splendor,
  - type: text
    content: The very splendor I had in your presence
  - type: text
    content: Before there was a world.
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: Now I’m returning to you.
  - type: text
    content: I’m saying these things in the world’s hearing
  - type: text
    content: So my people can experience
  - type: text
    content: My joy completed in them.
  - type: text
    content: I gave them your word;
  - type: text
    content: The godless world hated them because of it,
  - type: text
    content: Because they didn’t join the world’s ways,
  - type: text
    content: Just as I didn’t join the world’s ways.
  - type: text
    content: I’m not asking that you take them out of the world
  - type: text
    content: But that you guard them from the Evil One.
  - type: text
    content: They are no more defined by the world
  - type: text
    content: Than I am defined by the world.
  - type: text
    content: Make them holy—consecrated—with the truth;
  - type: text
    content: Your word is consecrating truth.
  - type: text
    content: In the same way that you gave me a mission in the world,
  - type: text
    content: I give them a mission in the world.
  - type: text
    content: I’m consecrating myself for their sakes
  - type: text
    content: So they’ll be truth-consecrated in their mission.
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: I’m praying not only for them
  - type: text
    content: But also for those who will believe in me
  - type: text
    content: Because of them and their witness about me.
  - type: text
    content: The goal is for all of them to become one heart and mind—
  - type: text
    content: Just as you, Father, are in me and I in you,
  - type: text
    content: So they might be one heart and mind with us.
  - type: text
    content: Then the world might believe that you, in fact, sent me.
  - type: text
    content: The same glory you gave me, I gave them,
  - type: text
    content: So they’ll be as unified and together as we are—
  - type: text
    content: I in them and you in me.
  - type: text
    content: Then they’ll be mature in this oneness,
  - type: text
    content: And give the godless world evidence
  - type: text
    content: That you’ve sent me and loved them
  - type: text
    content: In the same way you’ve loved me.
  - type: text
    content: '* * *'
  '24':
  - type: text
    content: Father, I want those you gave me
  - type: text
    content: To be with me, right where I am,
  - type: text
    content: So they can see my glory, the splendor you gave me,
  - type: text
    content: Having loved me
  - type: text
    content: Long before there ever was a world.
  - type: text
    content: Righteous Father, the world has never known you,
  - type: text
    content: But I have known you, and these disciples know
  - type: text
    content: That you sent me on this mission.
  - type: text
    content: I have made your very being known to them—
  - type: text
    content: Who you are and what you do—
  - type: text
    content: And continue to make it known,
  - type: text
    content: So that your love for me
  - type: text
    content: Might be in them
  - type: text
    content: Exactly as I am in them.
  '6':
  - type: text
    content: I spelled out your character in detail
  - type: text
    content: To the men and women you gave me.
  - type: text
    content: They were yours in the first place;
  - type: text
    content: Then you gave them to me,
  - type: text
    content: And they have now done what you said.
  - type: text
    content: They know now, beyond the shadow of a doubt,
  - type: text
    content: That everything you gave me is firsthand from you,
  - type: text
    content: For the message you gave me, I gave them;
  - type: text
    content: And they took it, and were convinced
  - type: text
    content: That I came from you.
  - type: text
    content: They believed that you sent me.
  - type: text
    content: I pray for them.
  - type: text
    content: I’m not praying for the God-rejecting world
  - type: text
    content: But for those you gave me,
  - type: text
    content: For they are yours by right.
  - type: text
    content: Everything mine is yours, and yours mine,
  - type: text
    content: And my life is on display in them.
  - type: text
    content: For I’m no longer going to be visible in the world;
  - type: text
    content: They’ll continue in the world
  - type: text
    content: While I return to you.
  - type: text
    content: Holy Father, guard them as they pursue this life
  - type: text
    content: That you conferred as a gift through me,
  - type: text
    content: So they can be one heart and mind
  - type: text
    content: As we are one heart and mind.
  - type: text
    content: As long as I was with them, I guarded them
  - type: text
    content: In the pursuit of the life you gave through me;
  - type: text
    content: I even posted a lookout.
  - type: text
    content: And not one of them got away,
  - type: text
    content: Except for the rebel bent on destruction
  - type: text
    content: (the exception that proved the rule of Scripture).
  - type: text
    content: '* * *'
