document_id: PSA.37,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Don’t bother your head with braggarts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or wish you could succeed like the wicked.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In no time they’ll shrivel like grass clippings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wilt like cut flowers in the sun.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: Before you know it, the wicked will have had it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll stare at his once famous place and—nothing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Down-to-earth people will move in and take over,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: relishing a huge bonanza.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: Bad guys have it in for the good guys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: obsessed with doing them in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' isn’t losing any sleep; to him'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re a joke with no punch line.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: Bullies brandish their swords,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pull back on their bows with a flourish.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re out to beat up on the harmless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or mug that nice man out walking his dog.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A banana peel lands them flat on their faces—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slapstick figures in a moral circus.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: Less is more and more is less.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: One righteous will outclass fifty wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the wicked are moral weaklings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the righteous are '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -strong.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' keeps track of the decent folk;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what they do won’t soon be forgotten.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In hard times, they’ll hold their heads high;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the shelves are bare, they’ll be full.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: God-despisers have had it;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s enemies are finished—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stripped bare like vineyards at harvest time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vanished like smoke in thin air.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: Wicked borrows and never returns;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Righteous gives and gives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Generous gets it all in the end;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stingy is cut off at the pass.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'Stalwart walks in step with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'his path blazed by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', he’s happy.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If he stumbles, he’s not down for long;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has a grip on his hand.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: I once was young, now I’m a graybeard—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not once have I seen an abandoned believer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or his kids out roaming the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every day he’s out giving and lending,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his children making him proud.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28a
    - type: text
      text: ' Turn your back on evil,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: work for the good and don’t quit.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' loves this kind of thing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never turns away from his friends.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28b-29
    - type: text
      text: ' Live this way and you’ve got it made,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but bad eggs will be tossed out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The good get planted on good land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put down healthy roots.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Get insurance with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and do a good deed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: settle down and stick to your last.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Keep company with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get in on the best.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-31
    - type: text
      text: Righteous chews on wisdom like a dog on a bone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rolls virtue around on his tongue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His heart pumps God’s Word like blood through his veins;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his feet are as sure as a cat’s.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-33
    - type: text
      text: Wicked sets a watch for Righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s out for the kill.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', alert, is also on watch—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wicked won’t hurt a hair of his head.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Wait passionately for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t leave the path.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll give you your place in the sun
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while you watch the wicked lose it.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-36
    - type: text
      text: I saw Wicked bloated like a toad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: croaking pretentious nonsense.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The next time I looked there was nothing—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a punctured bladder, vapid and limp.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 37-38
    - type: text
      text: Keep your eye on the healthy soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scrutinize the straight life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s a future
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in strenuous wholeness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the willful will soon be discarded;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: insolent souls are on a dead-end street.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-40
    - type: text
      text: 'The spacious, free life is from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s also protected and safe.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -strengthened, we’re delivered from evil—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when we run to him, he saves us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'Open up before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', keep nothing back;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he’ll do whatever needs to be done:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll validate your life in the clear light of day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stamp you with approval at high noon.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quiet down before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be prayerful before him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t bother with those who climb the ladder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who elbow their way to the top.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: Bridle your anger, trash your wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cool your pipes—it only makes things worse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before long the crooks will be bankrupt;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -investors will soon own the store.
