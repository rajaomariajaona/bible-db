document_id: PSA.37,97
type_code: eng
verses:
  '1':
  - type: text
    content: Don’t bother your head with braggarts
  - type: text
    content: or wish you could succeed like the wicked.
  - type: text
    content: In no time they’ll shrivel like grass clippings
  - type: text
    content: and wilt like cut flowers in the sun.
  '10':
  - type: text
    content: Before you know it, the wicked will have had it;
  - type: text
    content: you’ll stare at his once famous place and—nothing!
  - type: text
    content: Down-to-earth people will move in and take over,
  - type: text
    content: relishing a huge bonanza.
  '12':
  - type: text
    content: Bad guys have it in for the good guys,
  - type: text
    content: obsessed with doing them in.
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' isn’t losing any sleep; to him'
  - type: text
    content: they’re a joke with no punch line.
  '14':
  - type: text
    content: Bullies brandish their swords,
  - type: text
    content: pull back on their bows with a flourish.
  - type: text
    content: They’re out to beat up on the harmless,
  - type: text
    content: or mug that nice man out walking his dog.
  - type: text
    content: A banana peel lands them flat on their faces—
  - type: text
    content: slapstick figures in a moral circus.
  '16':
  - type: text
    content: Less is more and more is less.
  - type: text
    content: One righteous will outclass fifty wicked,
  - type: text
    content: For the wicked are moral weaklings
  - type: text
    content: 'but the righteous are '
  - type: text
    content: God
  - type: text
    content: -strong.
  '18':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' keeps track of the decent folk;'
  - type: text
    content: what they do won’t soon be forgotten.
  - type: text
    content: In hard times, they’ll hold their heads high;
  - type: text
    content: when the shelves are bare, they’ll be full.
  '20':
  - type: text
    content: God-despisers have had it;
  - type: text
    content: God
  - type: text
    content: ’s enemies are finished—
  - type: text
    content: Stripped bare like vineyards at harvest time,
  - type: text
    content: vanished like smoke in thin air.
  '21':
  - type: text
    content: Wicked borrows and never returns;
  - type: text
    content: Righteous gives and gives.
  - type: text
    content: Generous gets it all in the end;
  - type: text
    content: Stingy is cut off at the pass.
  '23':
  - type: text
    content: 'Stalwart walks in step with '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: 'his path blazed by '
  - type: text
    content: God
  - type: text
    content: ', he’s happy.'
  - type: text
    content: If he stumbles, he’s not down for long;
  - type: text
    content: God
  - type: text
    content: ' has a grip on his hand.'
  '25':
  - type: text
    content: I once was young, now I’m a graybeard—
  - type: text
    content: not once have I seen an abandoned believer,
  - type: text
    content: or his kids out roaming the streets.
  - type: text
    content: Every day he’s out giving and lending,
  - type: text
    content: his children making him proud.
  '27':
  - type: text
    content: ' Turn your back on evil,'
  - type: text
    content: work for the good and don’t quit.
  - type: text
    content: God
  - type: text
    content: ' loves this kind of thing,'
  - type: text
    content: never turns away from his friends.
  '28':
  - type: text
    content: ' Live this way and you’ve got it made,'
  - type: text
    content: but bad eggs will be tossed out.
  - type: text
    content: The good get planted on good land
  - type: text
    content: and put down healthy roots.
  '3':
  - type: text
    content: 'Get insurance with '
  - type: text
    content: God
  - type: text
    content: ' and do a good deed,'
  - type: text
    content: settle down and stick to your last.
  - type: text
    content: 'Keep company with '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: get in on the best.
  '30':
  - type: text
    content: Righteous chews on wisdom like a dog on a bone,
  - type: text
    content: rolls virtue around on his tongue.
  - type: text
    content: His heart pumps God’s Word like blood through his veins;
  - type: text
    content: his feet are as sure as a cat’s.
  '32':
  - type: text
    content: Wicked sets a watch for Righteous,
  - type: text
    content: he’s out for the kill.
  - type: text
    content: God
  - type: text
    content: ', alert, is also on watch—'
  - type: text
    content: Wicked won’t hurt a hair of his head.
  '34':
  - type: text
    content: 'Wait passionately for '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: don’t leave the path.
  - type: text
    content: He’ll give you your place in the sun
  - type: text
    content: while you watch the wicked lose it.
  '35':
  - type: text
    content: I saw Wicked bloated like a toad,
  - type: text
    content: croaking pretentious nonsense.
  - type: text
    content: The next time I looked there was nothing—
  - type: text
    content: a punctured bladder, vapid and limp.
  '37':
  - type: text
    content: Keep your eye on the healthy soul,
  - type: text
    content: scrutinize the straight life;
  - type: text
    content: There’s a future
  - type: text
    content: in strenuous wholeness.
  - type: text
    content: But the willful will soon be discarded;
  - type: text
    content: insolent souls are on a dead-end street.
  '39':
  - type: text
    content: 'The spacious, free life is from '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: it’s also protected and safe.
  - type: text
    content: God
  - type: text
    content: -strengthened, we’re delivered from evil—
  - type: text
    content: when we run to him, he saves us.
  '5':
  - type: text
    content: 'Open up before '
  - type: text
    content: God
  - type: text
    content: ', keep nothing back;'
  - type: text
    content: 'he’ll do whatever needs to be done:'
  - type: text
    content: He’ll validate your life in the clear light of day
  - type: text
    content: and stamp you with approval at high noon.
  '7':
  - type: text
    content: 'Quiet down before '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: be prayerful before him.
  - type: text
    content: Don’t bother with those who climb the ladder,
  - type: text
    content: who elbow their way to the top.
  '8':
  - type: text
    content: Bridle your anger, trash your wrath,
  - type: text
    content: cool your pipes—it only makes things worse.
  - type: text
    content: Before long the crooks will be bankrupt;
  - type: text
    content: God
  - type: text
    content: -investors will soon own the store.
