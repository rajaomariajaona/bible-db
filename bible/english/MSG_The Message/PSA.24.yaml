    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' claims Earth and everything in it,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' claims World and all who live on it.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He built it on Ocean foundations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: laid it out on River girders.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Who is this King-Glory?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is King-Glory.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: 'Who can climb Mount '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can scale the holy north-face?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Only the clean-handed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only the pure-hearted;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Men who won’t cheat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: women who won’t seduce.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is at their side;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s help they make it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This, Jacob, is what happens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to God-seekers, God-questers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Wake up, you sleepyhead city!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wake up, you sleepyhead people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: King-Glory is ready to enter.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
