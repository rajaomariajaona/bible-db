  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answer you on the day you crash,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The name God-of-Jacob put you out of harm’s reach,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Send reinforcements from Holy Hill,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dispatch from Zion fresh supplies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exclaim over your offerings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celebrate your sacrifices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give you what your heart desires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accomplish your plans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When you win, we plan to raise the roof
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lead the parade with our banners.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May all your wishes come true!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: That clinches it—help’s coming,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an answer’s on the way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything’s going to work out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: See those people polishing their chariots,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those others grooming their horses?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'But we’re making garlands for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' our God.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The chariots will rust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those horses pull up lame—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we’ll be on our feet, standing tall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Make the king a winner, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the day we call, give us your answer.
