  - type: text
    content: God
  - type: text
    content: ' answer you on the day you crash,'
  - type: text
    content: The name God-of-Jacob put you out of harm’s reach,
  - type: text
    content: Send reinforcements from Holy Hill,
  - type: text
    content: Dispatch from Zion fresh supplies,
  - type: text
    content: Exclaim over your offerings,
  - type: text
    content: Celebrate your sacrifices,
  - type: text
    content: Give you what your heart desires,
  - type: text
    content: Accomplish your plans.
  '5':
  - type: text
    content: When you win, we plan to raise the roof
  - type: text
    content: and lead the parade with our banners.
  - type: text
    content: May all your wishes come true!
  '6':
  - type: text
    content: That clinches it—help’s coming,
  - type: text
    content: an answer’s on the way,
  - type: text
    content: everything’s going to work out.
  '7':
  - type: text
    content: See those people polishing their chariots,
  - type: text
    content: and those others grooming their horses?
  - type: text
    content: 'But we’re making garlands for '
  - type: text
    content: God
  - type: text
    content: ' our God.'
  - type: text
    content: The chariots will rust,
  - type: text
    content: those horses pull up lame—
  - type: text
    content: and we’ll be on our feet, standing tall.
  '9':
  - type: text
    content: 'Make the king a winner, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
