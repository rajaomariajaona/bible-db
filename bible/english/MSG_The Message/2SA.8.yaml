document_id: 2SA.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the days that followed, David struck hard at the Philistines—brought them to their knees and took control of the countryside.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: David built a victory monument on his return from defeating the Arameans.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abishai son of Zeruiah fought and defeated the Edomites in the Salt Valley. Eighteen thousand of them were killed. David set up a puppet government in Edom, and the Edomites became subjects under David.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave David victory wherever he marched.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Thus David ruled over all of Israel. He ruled well—fair and evenhanded in all his duties and relationships.
  '16':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Joab son of Zeruiah was head of the army;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehoshaphat son of Ahilud was clerk;
  '17':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Zadok son of Ahitub and Ahimelech son of Abiathar were priests;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Seraiah was secretary;
  '18':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Benaiah son of Jehoiada was over the Kerethites and Pelethites;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: And David’s sons were priests.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He also fought and defeated Moab. He chose two-thirds of them randomly and executed them. The other third he spared. So the Moabites fell under David’s rule and were forced to bring tribute.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: On his way to restore his sovereignty at the River Euphrates, David next defeated Hadadezer son of Rehob the king of Zobah. He captured from him a thousand chariots, seven thousand cavalry, and twenty thousand infantry. He hamstrung all the chariot horses, but saved back a hundred.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'When the Arameans from Damascus came to the aid of Hadadezer king of Zobah, David killed twenty-two thousand of them. David set up a puppet government in Aram-Damascus. The Arameans became subjects of David and were forced to bring tribute. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave victory to David wherever he marched.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: David plundered the gold shields that belonged to the servants of Hadadezer and brought them to Jerusalem. He also looted a great quantity of bronze from Tebah and Berothai, cities of Hadadezer.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-12
    - type: text
      text: Toi, king of Hamath, heard that David had struck down the entire army of Hadadezer. So he sent his son Joram to King David to greet and congratulate him for fighting and defeating them, for Toi and Hadadezer were old enemies. He brought with him gifts of silver, gold, and bronze. King David consecrated these along with the silver and gold from all the nations he had conquered—from Aram, Moab, the Ammonites, the Philistines, and from Amalek, along with the plunder from Hadadezer son of Rehob king of Zobah.
