document_id: 1TH.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: I don’t think, friends, that I need to deal with the question of when all this is going to happen. You know as well as I that the day of the Master’s coming can’t be posted on our calendars. He won’t call ahead and make an appointment any more than a burglar would. About the time everybody’s walking around complacently, congratulating each other—“We’ve sure got it made! Now we can take it easy!”—suddenly everything will fall apart. It’s going to come as suddenly and inescapably as birth pangs to a pregnant woman.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-8
  - type: text
    text: But friends, you’re not in the dark, so how could you be taken off guard by any of this? You’re sons of Light, daughters of Day. We live under wide open skies and know where we stand. So let’s not sleepwalk through life like those others. Let’s keep our eyes open and be smart. People sleep at night and get drunk at night. But not us! Since we’re creatures of Day, let’s act like it. Walk out into the daylight sober, dressed up in faith, love, and the hope of salvation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: 'God didn’t set us up for an angry rejection but for salvation by our Master, Jesus Christ. He died for us, a death that triggered life. Whether we’re awake with the living or asleep with the dead, we’re '
  - type: usfm
    marker: it
    children:
    - type: text
      text: alive
  - type: text
    text: ' with him! So speak encouraging words to one another. Build up hope so you’ll all be together in this, no one left out, no one left behind. I know you’re already doing this; just keep on doing it.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Way He Wants You to Live
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13a
  - type: text
    text: ' And now, friends, we ask you to honor those leaders who work so hard for you, who have been given the responsibility of urging and guiding you along in your obedience. Overwhelm them with appreciation and love!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13b-15
  - type: text
    text: ' Get along among yourselves, each of you doing your part. Our counsel is that you warn the freeloaders to get a move on. Gently encourage the stragglers, and reach out for the exhausted, pulling them to their feet. Be patient with each person, attentive to individual needs. And be careful that when you get on each other’s nerves you don’t snap at each other. Look for the best in each other, and always do your best to bring it out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: Be cheerful no matter what; pray all the time; thank God no matter what happens. This is the way God wants you who belong to Christ Jesus to live.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: Don’t suppress the Spirit, and don’t stifle those who have a word from the Master. On the other hand, don’t be gullible. Check out everything, and keep only what’s good. Throw out anything tainted with evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: May God himself, the God who makes everything holy and whole, make you holy and whole, put you together—spirit, soul, and body—and keep you fit for the coming of our Master, Jesus Christ. The One who called you is completely dependable. If he said it, he’ll do it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: Friends, keep up your prayers for us. Greet all the followers of Jesus there with a holy embrace. And make sure this letter gets read to all the brothers and sisters. Don’t leave anyone out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The amazing grace of Jesus Christ be with you!
