document_id: MAT.21,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Royal Welcome
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When they neared Jerusalem, having arrived at Bethphage on Mount Olives, Jesus sent two disciples with these instructions: “Go over to the village across from you. You’ll find a donkey tethered there, her colt with her. Untie her and bring them to me. If anyone asks what you’re doing, say, ‘The Master needs them!’ He will send them with you.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As he made his entrance into Jerusalem, the whole city was shaken. Unnerved, people were asking, “What’s going on here? Who is this?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The parade crowd answered, “This is the prophet Jesus, the one from Nazareth in Galilee.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: He Kicked Over the Tables
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus went straight to the Temple and threw out everyone who had set up shop, buying and selling. He kicked over the tables of loan sharks and the stalls of dove merchants. He quoted this text:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My house was designated a house of prayer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made it a hangout for thieves.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Now there was room for the blind and crippled to get in. They came to Jesus and he healed them.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the religious leaders saw the outrageous things he was doing, and heard all the children running and shouting through the Temple, “Hosanna to David’s Son!” they were up in arms and took him to task. “Do you hear what these children are saying?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus said, “Yes, I hear them. And haven’t you read in God’s Word, ‘From the mouths of children and babies I’ll furnish a place of praise’?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fed up, Jesus spun around and left the city for Bethany, where he spent the night.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Withered Fig Tree
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Early the next morning Jesus was returning to the city. He was hungry. Seeing a lone fig tree alongside the road, he approached it anticipating a breakfast of figs. When he got to the tree, there was nothing but fig leaves. He said, “No more figs from this tree—ever!” The fig tree withered on the spot, a dry stick. The disciples saw it happen. They rubbed their eyes, saying, “Did we really see this? A leafy tree one minute, a dry stick the next?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus was matter-of-fact: “Yes—and if you embrace this kingdom life and don’t doubt God, you’ll not only do minor feats like I did to the fig tree, but also triumph over huge obstacles. This mountain, for instance, you’ll tell, ‘Go jump in the lake,’ and it will jump. Absolutely everything, ranging from small to large, as you make it a part of your believing prayer, gets included as you lay hold of God.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: True Authority
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Then he was back in the Temple, teaching. The high priests and leaders of the people came up and demanded, “Show us your credentials. Who authorized you to teach here?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Jesus responded, “First let me ask you a question. You answer my question and I’ll answer yours. About the baptism of John—who authorized it: heaven or humans?”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' They were on the spot and knew it. They pulled back into a huddle and whispered, “If we say ‘heaven,’ he’ll ask us why we didn’t believe him; if we say ‘humans,’ we’re up against it with the people because they all hold John up as a prophet.” They decided to concede that round to Jesus. “We don’t know,” they answered.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus said, “Then neither will I answer your question.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Story of Two Sons
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Tell me what you think of this story: A man had two sons. He went up to the first and said, ‘Son, go out for the day and work in the vineyard.’'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The son answered, ‘I don’t want to.’ Later on he thought better of it and went.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The father gave the same command to the second son. He answered, ‘Sure, glad to.’ But he never went.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Which of the two sons did what the father asked?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “The first.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus said, “Yes, and I tell you that crooks and whores are going to precede you into God’s kingdom. John came to you showing you the right road. You turned up your noses at him, but the crooks and whores believed him. Even when you saw their changed lives, you didn’t care enough to change and believe him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Story of the Greedy Farmhands
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: “Here’s another story. Listen closely. There was once a man, a wealthy farmer, who planted a vineyard. He fenced it, dug a winepress, put up a watchtower, then turned it over to the farmhands and went off on a trip. When it was time to harvest the grapes, he sent his servants back to collect his profits.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The farmhands grabbed the first servant and beat him up. The next one they murdered. They threw stones at the third but he got away. The owner tried again, sending more servants. They got the same treatment. The owner was at the end of his rope. He decided to send his son. ‘Surely,’ he thought, ‘they will respect my son.’
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But when the farmhands saw the son arrive, they rubbed their hands in greed. ‘This is the heir! Let’s kill him and have it all for ourselves.’ They grabbed him, threw him out, and killed him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the full story of what was sketched earlier by the prophet:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell Zion’s daughter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look, your king’s on his way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poised and ready, mounted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a donkey, on a colt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foal of a pack animal.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Now, when the owner of the vineyard arrives home from his trip, what do you think he will do to the farmhands?”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He’ll kill them—a rotten bunch, and good riddance,” they answered. “Then he’ll assign the vineyard to farmhands who will hand over the profits when it’s time.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, “Right—and you can read it for yourselves in your Bibles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stone the masons threw out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is now the cornerstone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is God’s work;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we rub our eyes, we can hardly believe it!
  - type: usfm
    marker: m
    children:
    - type: text
      text: “This is the way it is with you. God’s kingdom will be taken back from you and handed over to a people who will live out a kingdom life. Whoever stumbles on this Stone gets shattered; whoever the Stone falls on gets smashed.”
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the religious leaders heard this story, they knew it was aimed at them. They wanted to arrest Jesus and put him in jail, but, intimidated by public opinion, they held back. Most people held him to be a prophet of God.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples went and did exactly what Jesus told them to do. They led the donkey and colt out, laid some of their clothes on them, and Jesus mounted. Nearly all the people in the crowd threw their garments down on the road, giving him a royal welcome. Others cut branches from the trees and threw them down as a welcome mat. Crowds went ahead and crowds followed, all of them calling out, “Hosanna to David’s son!” “Blessed is he who comes in God’s name!” “Hosanna in highest heaven!”
