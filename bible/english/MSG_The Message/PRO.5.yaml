document_id: PRO.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Nothing but Sin and Bones
  - type: text
    content: Dear friend, pay close attention to this, my wisdom;
  - type: text
    content: listen very closely to the way I see it.
  - type: text
    content: Then you’ll acquire a taste for good sense;
  - type: text
    content: what I tell you will keep you out of trouble.
  '15':
  - type: text
    content: Do you know the saying, “Drink from your own rain barrel,
  - type: text
    content: draw water from your own spring-fed well”?
  - type: text
    content: It’s true. Otherwise, you may one day come home
  - type: text
    content: and find your barrel empty and your well polluted.
  '17':
  - type: text
    content: Your spring water is for you and you only,
  - type: text
    content: not to be passed around among strangers.
  - type: text
    content: Bless your fresh-flowing fountain!
  - type: text
    content: Enjoy the wife you married as a young man!
  - type: text
    content: Lovely as an angel, beautiful as a rose—
  - type: text
    content: don’t ever quit taking delight in her body.
  - type: text
    content: Never take her love for granted!
  - type: text
    content: Why would you trade enduring intimacies for cheap thrills with a prostitute?
  - type: text
    content: for dalliance with a promiscuous stranger?
  '21':
  - type: text
    content: 'Mark well that '
  - type: text
    content: God
  - type: text
    content: ' doesn’t miss a move you make;'
  - type: text
    content: he’s aware of every step you take.
  - type: text
    content: The shadow of your sin will overtake you;
  - type: text
    content: you’ll find yourself stumbling all over yourself in the dark.
  - type: text
    content: Death is the reward of an undisciplined life;
  - type: text
    content: your foolish decisions trap you in a dead end.
  '3':
  - type: text
    content: The lips of a seductive woman are oh so sweet,
  - type: text
    content: her soft words are oh so smooth.
  - type: text
    content: But it won’t be long before she’s gravel in your mouth,
  - type: text
    content: a pain in your gut, a wound in your heart.
  - type: text
    content: She’s dancing down the perfumed path to Death;
  - type: text
    content: she’s headed straight for Hell and taking you with her.
  - type: text
    content: She hasn’t a clue about Real Life,
  - type: text
    content: about who she is or where she’s going.
  '7':
  - type: text
    content: So, my friend, listen closely;
  - type: text
    content: don’t treat my words casually.
  - type: text
    content: Keep your distance from such a woman;
  - type: text
    content: absolutely stay out of her neighborhood.
  - type: text
    content: You don’t want to squander your wonderful life,
  - type: text
    content: to waste your precious life among the hardhearted.
  - type: text
    content: Why should you allow strangers to take advantage of you?
  - type: text
    content: Why be exploited by those who care nothing for you?
  - type: text
    content: You don’t want to end your life full of regrets,
  - type: text
    content: nothing but sin and bones,
  - type: text
    content: Saying, “Oh, why didn’t I do what they told me?
  - type: text
    content: Why did I reject a disciplined life?
  - type: text
    content: Why didn’t I listen to my mentors,
  - type: text
    content: or take my teachers seriously?
  - type: text
    content: My life is ruined!
  - type: text
    content: I haven’t one blessed thing to show for my life!”
  - type: heading
    content: Never Take Love for Granted
