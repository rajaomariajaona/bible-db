document_id: PRO.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nothing but Sin and Bones
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Dear friend, pay close attention to this, my wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen very closely to the way I see it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you’ll acquire a taste for good sense;
- type: usfm
  marker: q2
  children:
  - type: text
    text: what I tell you will keep you out of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: The lips of a seductive woman are oh so sweet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her soft words are oh so smooth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it won’t be long before she’s gravel in your mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a pain in your gut, a wound in your heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She’s dancing down the perfumed path to Death;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she’s headed straight for Hell and taking you with her.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She hasn’t a clue about Real Life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: about who she is or where she’s going.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-14
  - type: text
    text: So, my friend, listen closely;
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t treat my words casually.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep your distance from such a woman;
- type: usfm
  marker: q2
  children:
  - type: text
    text: absolutely stay out of her neighborhood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You don’t want to squander your wonderful life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to waste your precious life among the hardhearted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why should you allow strangers to take advantage of you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why be exploited by those who care nothing for you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You don’t want to end your life full of regrets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing but sin and bones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saying, “Oh, why didn’t I do what they told me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why did I reject a disciplined life?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why didn’t I listen to my mentors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or take my teachers seriously?
- type: usfm
  marker: q1
  children:
  - type: text
    text: My life is ruined!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t one blessed thing to show for my life!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Never Take Love for Granted
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: Do you know the saying, “Drink from your own rain barrel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: draw water from your own spring-fed well”?
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s true. Otherwise, you may one day come home
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find your barrel empty and your well polluted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: Your spring water is for you and you only,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not to be passed around among strangers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bless your fresh-flowing fountain!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Enjoy the wife you married as a young man!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lovely as an angel, beautiful as a rose—
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t ever quit taking delight in her body.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Never take her love for granted!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why would you trade enduring intimacies for cheap thrills with a prostitute?
- type: usfm
  marker: q2
  children:
  - type: text
    text: for dalliance with a promiscuous stranger?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: 'Mark well that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' doesn’t miss a move you make;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’s aware of every step you take.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The shadow of your sin will overtake you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll find yourself stumbling all over yourself in the dark.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Death is the reward of an undisciplined life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your foolish decisions trap you in a dead end.
