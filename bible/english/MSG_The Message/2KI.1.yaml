document_id: 2KI.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: After Ahab died, Moab rebelled against Israel.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Elijah answered the captain of the fifty, “If it’s true that I’m a ‘holy man,’ lightning strike you and your fifty men!” Out of the blue lightning struck and incinerated the captain and his fifty.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The king sent another captain with his fifty men, “O Holy Man! King’s orders: Come down. And right now!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Elijah answered, “If it’s true that I’m a ‘holy man,’ lightning strike you and your fifty men!” Immediately a divine lightning bolt struck and incinerated the captain and his fifty.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: 'The king then sent a third captain with his fifty men. For a third time, a captain with his fifty approached Elijah. This one fell on his knees in supplication: “O Holy Man, have respect for my life and the souls of these fifty men! Twice now lightning from out of the blue has struck and incinerated captains with their fifty men; please, I beg you, respect my life!”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told Elijah, “Go ahead; and don’t be afraid.” Elijah got up and went down with him to the king.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Elijah told him, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s word: Because you sent messengers to consult Baal-Zebub the god of Ekron, as if there were no God in Israel to whom you could pray, you’ll never get out of that bed alive—already you’re as good as dead.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And he died, exactly as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s word spoken by Elijah had said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because Ahaziah had no son, his brother Joram became the next king. The succession took place in the second year of the reign of Jehoram son of Jehoshaphat king of Judah.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The rest of Ahaziah’s life is recorded in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Chronicles of the Kings of Israel
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: One day Ahaziah fell through the balcony railing on the rooftop of his house in Samaria and was injured. He sent messengers off to consult Baal-Zebub, the god of Ekron, “Am I going to recover from this accident?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s angel spoke to Elijah the Tishbite: “Up on your feet! Go out and meet the messengers of the king of Samaria with this word, ‘Is it because there’s no God in Israel that you’re running off to consult Baal-Zebub god of Ekron?’ Here’s a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' you’ve tried to bypass: ‘You’re not going to get out of that bed you’re in—you’re as good as dead already.’” Elijah delivered the message and was gone.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The messengers went back. The king said, “So why are you back so soon—what’s going on?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They told him, “A man met us and said, ‘Turn around and go back to the king who sent you; tell him, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s message: Is it because there’s no God in Israel that you’re running off to consult Baal-Zebub god of Ekron? You needn’t bother. You’re not going to get out of that bed you’re in—you’re as good as dead already.’”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The king said, “Tell me more about this man who met you and said these things to you. What was he like?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Shaggy,” they said, “and wearing a leather belt.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “That has to be Elijah the Tishbite!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The king sent a captain with fifty men to Elijah. Meanwhile Elijah was sitting, big as life, on top of a hill. The captain said, “O Holy Man! King’s orders: Come down!”'
