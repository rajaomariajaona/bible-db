document_id: PSA.138,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thank you! Everything in me says “Thank you!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Angels listen as I sing my thanks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I kneel in worship facing your holy temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and say it again: “Thank you!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thank you for your love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thank you for your faithfulness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Most holy is your name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: most holy is your Word.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The moment I called out, you stepped in;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you made my life large with strength.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When they hear what you have to say, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all earth’s kings will say “Thank you.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They’ll sing of what you’ve done:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“How great the glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And here’s why: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', high above, sees far below;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no matter the distance, he knows everything about us.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I walk into the thick of trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep me alive in the angry turmoil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With one hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strike my foes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your other hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Finish what you started in me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your love is eternal—don’t quit on me now.
