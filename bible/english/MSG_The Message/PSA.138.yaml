document_id: PSA.138,97
type_code: eng
verses:
  '1':
  - type: text
    content: Thank you! Everything in me says “Thank you!”
  - type: text
    content: Angels listen as I sing my thanks.
  - type: text
    content: I kneel in worship facing your holy temple
  - type: text
    content: 'and say it again: “Thank you!”'
  - type: text
    content: Thank you for your love,
  - type: text
    content: thank you for your faithfulness;
  - type: text
    content: Most holy is your name,
  - type: text
    content: most holy is your Word.
  - type: text
    content: The moment I called out, you stepped in;
  - type: text
    content: you made my life large with strength.
  '4':
  - type: text
    content: 'When they hear what you have to say, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: all earth’s kings will say “Thank you.”
  - type: text
    content: 'They’ll sing of what you’ve done:'
  - type: text
    content: '“How great the glory of '
  - type: text
    content: God
  - type: text
    content: '!”'
  - type: text
    content: 'And here’s why: '
  - type: text
    content: God
  - type: text
    content: ', high above, sees far below;'
  - type: text
    content: no matter the distance, he knows everything about us.
  '7':
  - type: text
    content: When I walk into the thick of trouble,
  - type: text
    content: keep me alive in the angry turmoil.
  - type: text
    content: With one hand
  - type: text
    content: strike my foes,
  - type: text
    content: With your other hand
  - type: text
    content: save me.
  - type: text
    content: 'Finish what you started in me, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Your love is eternal—don’t quit on me now.
