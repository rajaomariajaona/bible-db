document_id: JER.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What Makes You Think You Can Race Against Horses?
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: 'You are right, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and you set things right.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I can’t argue with that. But I do have some questions:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do bad people have it so good?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do con artists make it big?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You planted them and they put down roots.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They flourished and produced fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They talk as if they’re old friends with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they couldn’t care less about you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Meanwhile, you know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' inside and out.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You don’t let me get by with a thing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them pay for the way they live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay with their lives, like sheep marked for slaughter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long do we have to put up with this—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the country depressed, the farms in ruin—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all because of wickedness, these wicked lives?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even animals and birds are dying off
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because they’ll have nothing to do with God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and think God has nothing to do with them.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: “The barbarians will invade,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swarm over hills and plains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The judgment sword of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will take its toll'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from one end of the land to the other.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing living will be safe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will plant wheat and reap weeds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing they do will work out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will look at their meager crops and wring their hands.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All this the result of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s fierce anger!”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-17
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message: “Regarding all the bad neighbors who abused the land I gave to Israel as their inheritance: I’m going to pluck them out of their lands, and then pluck Judah out from among them. Once I’ve pulled the bad neighbors out, I will relent and take them tenderly to my heart and put them back where they belong, put each of them back in their home country, on their family farms. Then if they will get serious about living my way and pray to me as well as they taught my people to pray to that god Baal, everything will go well for them. But if they won’t listen, then I’ll pull them out of their land by the roots and cart them off to the dump. Total destruction!” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: “So, Jeremiah, if you’re worn out in this footrace with men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what makes you think you can race against horses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if you can’t keep your wits during times of calm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what’s going to happen when troubles break loose
  - type: usfm
    marker: q3
    children:
    - type: text
      text: like the Jordan in flood?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those closest to you, your own brothers and cousins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are working against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re out to get you. They’ll stop at nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t trust them, especially when they’re smiling.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-11
    - type: text
      text: “I will abandon the House of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walk away from my beloved people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn over those I most love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to those who are her enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’s been, this one I held dear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a snarling lion in the jungle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Growling and baring her teeth at me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I can’t take it anymore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has this one I hold dear become a preening peacock?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But isn’t she under attack by vultures?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then invite all the hungry animals at large,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: invite them in for a free meal!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foreign, scavenging shepherds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will loot and trample my fields,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn my beautiful, well-cared-for fields
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into vacant lots of tin cans and thistles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They leave them littered with junk—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a ruined land, a land in lament.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole countryside is a wasteland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will really care.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
