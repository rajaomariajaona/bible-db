document_id: JER.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: What Makes You Think You Can Race Against Horses?
  - type: text
    content: 'You are right, O '
  - type: text
    content: God
  - type: text
    content: ', and you set things right.'
  - type: text
    content: 'I can’t argue with that. But I do have some questions:'
  - type: text
    content: Why do bad people have it so good?
  - type: text
    content: Why do con artists make it big?
  - type: text
    content: You planted them and they put down roots.
  - type: text
    content: They flourished and produced fruit.
  - type: text
    content: They talk as if they’re old friends with you,
  - type: text
    content: but they couldn’t care less about you.
  - type: text
    content: 'Meanwhile, you know '
  - type: text
    content: me
  - type: text
    content: ' inside and out.'
  - type: text
    content: You don’t let me get by with a thing!
  - type: text
    content: Make them pay for the way they live,
  - type: text
    content: pay with their lives, like sheep marked for slaughter.
  - type: text
    content: How long do we have to put up with this—
  - type: text
    content: the country depressed, the farms in ruin—
  - type: text
    content: And all because of wickedness, these wicked lives?
  - type: text
    content: Even animals and birds are dying off
  - type: text
    content: Because they’ll have nothing to do with God
  - type: text
    content: and think God has nothing to do with them.
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: “The barbarians will invade,
  - type: text
    content: swarm over hills and plains.
  - type: text
    content: 'The judgment sword of '
  - type: text
    content: God
  - type: text
    content: ' will take its toll'
  - type: text
    content: from one end of the land to the other.
  - type: text
    content: Nothing living will be safe.
  - type: text
    content: They will plant wheat and reap weeds.
  - type: text
    content: Nothing they do will work out.
  - type: text
    content: They will look at their meager crops and wring their hands.
  - type: text
    content: 'All this the result of '
  - type: text
    content: God
  - type: text
    content: ’s fierce anger!”
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message: “Regarding all the bad neighbors who abused the land I gave to Israel as their inheritance: I’m going to pluck them out of their lands, and then pluck Judah out from among them. Once I’ve pulled the bad neighbors out, I will relent and take them tenderly to my heart and put them back where they belong, put each of them back in their home country, on their family farms. Then if they will get serious about living my way and pray to me as well as they taught my people to pray to that god Baal, everything will go well for them. But if they won’t listen, then I’ll pull them out of their land by the roots and cart them off to the dump. Total destruction!” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '5':
  - type: text
    content: “So, Jeremiah, if you’re worn out in this footrace with men,
  - type: text
    content: what makes you think you can race against horses?
  - type: text
    content: And if you can’t keep your wits during times of calm,
  - type: text
    content: what’s going to happen when troubles break loose
  - type: text
    content: like the Jordan in flood?
  - type: text
    content: Those closest to you, your own brothers and cousins,
  - type: text
    content: are working against you.
  - type: text
    content: They’re out to get you. They’ll stop at nothing.
  - type: text
    content: Don’t trust them, especially when they’re smiling.
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: “I will abandon the House of Israel,
  - type: text
    content: walk away from my beloved people.
  - type: text
    content: I will turn over those I most love
  - type: text
    content: to those who are her enemies.
  - type: text
    content: She’s been, this one I held dear,
  - type: text
    content: like a snarling lion in the jungle,
  - type: text
    content: Growling and baring her teeth at me—
  - type: text
    content: and I can’t take it anymore.
  - type: text
    content: Has this one I hold dear become a preening peacock?
  - type: text
    content: But isn’t she under attack by vultures?
  - type: text
    content: Then invite all the hungry animals at large,
  - type: text
    content: invite them in for a free meal!
  - type: text
    content: Foreign, scavenging shepherds
  - type: text
    content: will loot and trample my fields,
  - type: text
    content: Turn my beautiful, well-cared-for fields
  - type: text
    content: into vacant lots of tin cans and thistles.
  - type: text
    content: They leave them littered with junk—
  - type: text
    content: a ruined land, a land in lament.
  - type: text
    content: The whole countryside is a wasteland,
  - type: text
    content: and no one will really care.
  - type: text
    content: '* * *'
