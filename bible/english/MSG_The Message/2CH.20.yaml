document_id: 2CH.20,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Some time later the Moabites and Ammonites, accompanied by Meunites, joined forces to make war on Jehoshaphat. Jehoshaphat received this intelligence report: “A huge force is on its way from beyond the Dead Sea to fight you. There’s no time to waste—they’re already at Hazazon Tamar, the oasis of En Gedi.”'
  '10':
  - type: text
    content: '“And now it’s happened: men from Ammon, Moab, and Mount Seir have shown up. You didn’t let Israel touch them when we got here at first—we detoured around them and didn’t lay a hand on them. And now they’ve come to kick us out of the country you gave us. O dear God, won’t you take care of them? We’re helpless before this vandal horde ready to attack us. We don’t know what to do; we’re looking to you.”'
  '13':
  - type: text
    content: 'Everyone in Judah was there—little children, wives, sons—all present and attentive to '
  - type: text
    content: God
  - type: text
    content: .
  '14':
  - type: text
    content: 'Then Jahaziel was moved by the Spirit of '
  - type: text
    content: God
  - type: text
    content: ' to speak from the midst of the congregation. (Jahaziel was the son of Zechariah, the son of Benaiah, the son of Jeiel, the son of Mattaniah the Levite of the Asaph clan.) He said, “Attention everyone—all of you from out of town, all you from Jerusalem, and you King Jehoshaphat—'
  - type: text
    content: God
  - type: text
    content: '’s word: Don’t be afraid; don’t pay any mind to this vandal horde. This is God’s war, not yours. Tomorrow you’ll go after them; see, they’re already on their way up the slopes of Ziz; you’ll meet them at the end of the ravine near the wilderness of Jeruel. You won’t have to lift a hand in this battle; just stand firm, Judah and Jerusalem, and watch '
  - type: text
    content: God
  - type: text
    content: ’s saving work for you take shape. Don’t be afraid, don’t waver. March out boldly tomorrow—
  - type: text
    content: God
  - type: text
    content: ' is with you.”'
  '18':
  - type: text
    content: 'Then Jehoshaphat knelt down, bowing with his face to the ground. All Judah and Jerusalem did the same, worshiping '
  - type: text
    content: God
  - type: text
    content: '. The Levites (both Kohathites and Korahites) stood to their feet to praise '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel; they praised at the top of their lungs!'
  '20':
  - type: text
    content: 'They were up early in the morning, ready to march into the wilderness of Tekoa. As they were leaving, Jehoshaphat stood up and said, “Listen Judah and Jerusalem! Listen to what I have to say! Believe firmly in '
  - type: text
    content: God
  - type: text
    content: ', your God, and your lives will be firm! Believe in your prophets and you’ll come out on top!”'
  '21':
  - type: text
    content: 'After talking it over with the people, Jehoshaphat appointed a choir for '
  - type: text
    content: God
  - type: text
    content: ; dressed in holy robes, they were to march ahead of the troops, singing,
  - type: text
    content: 'Give thanks to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: His love never quits.
  '22':
  - type: text
    content: 'As soon as they started shouting and praising, '
  - type: text
    content: God
  - type: text
    content: ' set ambushes against the men of Ammon, Moab, and Mount Seir as they were attacking Judah, and they all ended up dead. The Ammonites and Moabites mistakenly attacked those from Mount Seir and massacred them. Then, further confused, they went at each other, and all ended up killed.'
  '24':
  - type: text
    content: As Judah came up over the rise, looking into the wilderness for the horde of barbarians, they looked on a killing field of dead bodies—not a living soul among them.
  '25':
  - type: text
    content: 'When Jehoshaphat and his people came to carry off the plunder they found more loot than they could carry off—equipment, clothing, valuables. It took three days to cart it away! On the fourth day they came together at the Valley of Blessing (Beracah) and blessed '
  - type: text
    content: God
  - type: text
    content: ' (that’s how it got the name, Valley of Blessing).'
  '27':
  - type: text
    content: 'Jehoshaphat then led all the men of Judah and Jerusalem back to Jerusalem—an exuberant parade. '
  - type: text
    content: God
  - type: text
    content: ' had given them joyful relief from their enemies! They entered Jerusalem and came to The Temple of '
  - type: text
    content: God
  - type: text
    content: ' with all the instruments of the band playing.'
  '29':
  - type: text
    content: 'When the surrounding kingdoms got word that '
  - type: text
    content: God
  - type: text
    content: ' had fought Israel’s enemies, the fear of God descended on them. Jehoshaphat heard no more from them; as long as Jehoshaphat reigned, peace reigned.'
  '3':
  - type: text
    content: 'Shaken, Jehoshaphat prayed. He went to '
  - type: text
    content: God
  - type: text
    content: ' for help and ordered a nationwide fast. The country of Judah united in seeking '
  - type: text
    content: God
  - type: text
    content: '’s help—they came from all the cities of Judah to pray to '
  - type: text
    content: God
  - type: text
    content: .
  '31':
  - type: text
    content: 'That about sums up Jehoshaphat’s reign over Judah. He was thirty-five years old when he became king and ruled as king in Jerusalem for twenty-five years. His mother was Azubah daughter of Shilhi. He continued the kind of life characteristic of his father Asa—no detours, no dead-ends—pleasing '
  - type: text
    content: God
  - type: text
    content: ' with his life. But he failed to get rid of the neighborhood sex-and-religion shrines—people continued to pray and worship at these idolatrous god shops.'
  '34':
  - type: text
    content: 'The rest of Jehoshaphat’s life, from start to finish, is written in the memoirs of Jehu son of Hanani, which are included in the '
  - type: text
    content: Royal Annals of Israel’s Kings
  - type: text
    content: .
  '35':
  - type: text
    content: 'Late in life Jehoshaphat formed a trading syndicate with Ahaziah king of Israel—which was very wrong of him to do. He went in as partner with him to build ocean-going ships at Ezion Geber to trade with Tarshish. Eliezer son of Dodavahu of Mareshah preached against Jehoshaphat’s venture: “Because you joined forces with Ahaziah, '
  - type: text
    content: God
  - type: text
    content: ' has shipwrecked your work.” The ships were smashed and nothing ever came of the trade partnership.'
  '5':
  - type: text
    content: 'Then Jehoshaphat took a position before the assembled people of Judah and Jerusalem at The Temple of '
  - type: text
    content: God
  - type: text
    content: ' in front of the new courtyard and said, “O '
  - type: text
    content: God
  - type: text
    content: ', God of our ancestors, are you not God in heaven above and ruler of all kingdoms below? You hold all power and might in your fist—no one stands a chance against you! And didn’t you make the natives of this land leave as you brought your people Israel in, turning it over permanently to your people Israel, the descendants of Abraham your friend? They have lived here and built a holy house of worship to honor you, saying, ‘When the worst happens—whether war or flood or disease or famine—and we take our place before this Temple (we know you are personally present in this place!) and pray out our pain and trouble, we know that you will listen and give victory.’'
