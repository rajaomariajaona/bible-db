document_id: 2CH.25,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: King Amaziah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: 'Amaziah was twenty-five years old when he became king and reigned twenty-nine years in Jerusalem. His mother was Jehoaddin from Jerusalem. He lived well before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', doing the right thing for the most part. But he wasn’t wholeheartedly devoted to God. When he had the affairs of the kingdom well in hand, he executed the palace guard who had assassinated his father the king. But he didn’t kill the sons of the assassins—he was mindful of what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded in The Revelation of Moses, that parents shouldn’t be executed for their children’s sins, nor children for their parents’. We each pay personally for our sins.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So Amaziah fired the soldiers he had hired from the north and sent them home. They were very angry at losing their jobs and went home seething.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: But Amaziah was optimistic. He led his troops into the Valley of Salt and killed ten thousand men of Seir. They took another ten thousand as prisoners, led them to the top of the Rock, and pushed them off a cliff. They all died in the fall, smashed on the rocks.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But the troops Amaziah had dismissed from his army, angry over their lost opportunity for plunder, rampaged through the towns of Judah all the way from Samaria to Beth Horon, killing three thousand people and taking much plunder.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'On his return from the destruction of the Edomites, Amaziah brought back the gods of the men of Seir and installed them as his own gods, worshiping them and burning incense to them. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' ignited '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s anger; a fiery blast of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s wrath put into words by a God-sent prophet: “What is this? Why on earth would you pray to inferior gods who couldn’t so much as help their own people from you—gods weaker than Amaziah?”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Amaziah interrupted him, “Did I ask for your opinion? Shut up or get thrown out!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The prophet quit speaking, but not before he got in one last word: “I have it on good authority: God has made up his mind to throw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' out because of what you’ve done, and because you wouldn’t listen to me.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'One day Amaziah sent envoys to Jehoash son of Jehoahaz, the son of Jehu, king of Israel, challenging him to a fight: “Come and meet with me, I dare you. Let’s have it out face-to-face!”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: Jehoash king of Israel replied to Amaziah king of Judah, “One day a thistle in Lebanon sent word to a cedar in Lebanon, ‘Give your daughter to my son in marriage.’ But then a wild animal of Lebanon passed by and stepped on the thistle, crushing it. Just because you’ve defeated Edom in battle, you now think you’re a big shot. Go ahead and be proud, but stay home. Why press your luck? Why bring defeat on yourself and Judah?”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-22
    - type: text
      text: Amaziah wouldn’t take no for an answer—God had already decided to let Jehoash defeat him because he had defected to the gods of Edom. So Jehoash king of Israel came on ahead and confronted Amaziah king of Judah. They met at Beth Shemesh, a town of Judah. Judah was thoroughly beaten by Israel—all the soldiers straggled home in defeat.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: Jehoash king of Israel captured Amaziah king of Judah, the son of Joash, the son of Ahaziah, at Beth Shemesh. But Jehoash didn’t stop at that; he went on to attack Jerusalem. He demolished the Wall of Jerusalem all the way from the Ephraim Gate to the Corner Gate—a stretch of about six hundred feet. He looted the gold, silver, and furnishings—anything he found that was worth taking—from both the palace and The Temple of God—and, for good measure, he took hostages. Then he returned to Samaria.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'Amaziah son of Joash king of Judah continued as king fifteen years after the death of Jehoash son of Jehoahaz king of Israel. The rest of the life and times of Amaziah from start to finish is written in the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Royal Annals of the Kings of Judah and Israel.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: 'During those last days, after Amaziah had defected from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', they cooked up a plot against Amaziah in Jerusalem, and he had to flee to Lachish. But they tracked him down in Lachish and killed him there. They brought him back on horseback and buried him in Jerusalem with his ancestors in the City of David.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: Amaziah organized Judah and sorted out Judah and Benjamin by families and by military units. Men twenty years and older had to register—they ended up with 300,000 judged capable of military service. In addition he hired 100,000 soldiers from Israel in the north at a cost of about four and a half tons of silver.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'A holy man showed up and said, “No, O King—don’t let those northern Israelite soldiers into your army; '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is not on their side, nor with any of the Ephraimites. Instead, you go by yourself and be strong. God and God only has the power to help or hurt your cause.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But Amaziah said to the holy man, “But what about all this money—these tons of silver I have already paid out to hire these men?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s help is worth far more to you than that,” said the holy man.
