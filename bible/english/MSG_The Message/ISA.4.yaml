document_id: ISA.4,97
type_code: eng
verses:
  '1':
  - type: text
    content: That will be the day when seven women
  - type: text
    content: will gang up on one man, saying,
  - type: text
    content: “We’ll take care of ourselves,
  - type: text
    content: get our own food and clothes.
  - type: text
    content: Just give us a child. Make us pregnant
  - type: text
    content: so we’ll have something to live for!”
  - type: heading
    content: God’s Branch
  '2':
  - type: text
    content: 'And that’s when '
  - type: text
    content: God
  - type: text
    content: '’s Branch will sprout green and lush. The produce of the country will give Israel’s survivors something to be proud of again. Oh, they’ll hold their heads high! Everyone left behind in Zion, all the discards and rejects in Jerusalem, will be reclassified as “holy”—alive and therefore precious. '
  - type: text
    content: God
  - type: text
    content: ' will give Zion’s women a good bath. He’ll scrub the bloodstained city of its violence and brutality, purge the place with a firestorm of judgment.'
  '5':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' will bring back the ancient pillar of cloud by day and the pillar of fire by night and mark Mount Zion and everyone in it with his glorious presence, his immense, protective presence, shade from the burning sun and shelter from the driving rain.'
