document_id: ISA.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: That will be the day when seven women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will gang up on one man, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We’ll take care of ourselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get our own food and clothes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just give us a child. Make us pregnant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so we’ll have something to live for!”
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Branch
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4
    - type: text
      text: 'And that’s when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Branch will sprout green and lush. The produce of the country will give Israel’s survivors something to be proud of again. Oh, they’ll hold their heads high! Everyone left behind in Zion, all the discards and rejects in Jerusalem, will be reclassified as “holy”—alive and therefore precious. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will give Zion’s women a good bath. He’ll scrub the bloodstained city of its violence and brutality, purge the place with a firestorm of judgment.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will bring back the ancient pillar of cloud by day and the pillar of fire by night and mark Mount Zion and everyone in it with his glorious presence, his immense, protective presence, shade from the burning sun and shelter from the driving rain.'
