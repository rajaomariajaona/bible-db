document_id: 1CO.8,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Freedom with Responsibility
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The question keeps coming up regarding meat that has been offered up to an idol: Should you attend meals where such meat is served, or not? We sometimes tend to think we know all we need to know to answer these kinds of questions—'
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' sometimes our humble hearts can help us more than our proud minds. We never really know enough until we recognize that God alone knows it all.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For instance, say you flaunt your freedom by going to a banquet thrown in honor of idols, where the main course is meat sacrificed to idols. Isn’t there great danger if someone still struggling over this issue, someone who looks up to you as knowledgeable and mature, sees you go into that banquet? The danger is that he will become terribly confused—maybe even to the point of getting mixed up himself in what his conscience tells him is wrong.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Christ gave up his life for that person. Wouldn’t you at least be willing to give up going to dinner for him—because, as you say, it doesn’t really make any difference? But it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' make a difference if you hurt your friend terribly, risking his eternal ruin! When you hurt your friend, you hurt Christ. A free meal here and there isn’t worth it at the cost of even one of these “weak ones.” So, never go to these idol-tainted meals if there’s any chance it will trip up one of your brothers or sisters.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some people say, quite rightly, that idols have no actual existence, that there’s nothing to them, that there is no God other than our one God, that no matter how many of these so-called gods are named and worshiped they still don’t add up to anything but a tall story. They say—again, quite rightly—that there is only one God the Father, that everything comes from him, and that he wants us to live for him. Also, they say that there is only one Master—Jesus the Messiah—and that everything is for his sake, including us. Yes. It’s true.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In strict logic, then, nothing happened to the meat when it was offered up to an idol. It’s just like any other meat. I know that, and you know that. But knowing isn’t everything. If it becomes everything, some people end up as know-it-alls who treat others as know-nothings. Real knowledge isn’t that insensitive.
  - type: usfm
    marker: p
    children:
    - type: text
      text: We need to be sensitive to the fact that we’re not all at the same level of understanding in this. Some of you have spent your entire lives eating “idol meat,” and are sure that there’s something bad in the meat that then becomes something bad inside of you. An imagination and conscience shaped under those conditions isn’t going to change overnight.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But fortunately God doesn’t grade us on our diet. We’re neither commended when we clean our plate nor reprimanded when we just can’t stomach it. But God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' care when you use your freedom carelessly in a way that leads a fellow believer still vulnerable to those old associations to be thrown off track.'
