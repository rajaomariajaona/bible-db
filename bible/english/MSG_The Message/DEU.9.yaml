document_id: DEU.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Attention, Israel!
  - type: usfm
    marker: p
    children:
    - type: text
      text: This very day you are crossing the Jordan to enter the land and oust nations that are much bigger and stronger than you are. You’re going to find huge cities with sky-high fortress-walls and gigantic people, descendants of the Anakites—you’ve heard all about them; you’ve heard the saying, “No one can stand up to an Anakite.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: 'It was at the end of the forty days and nights that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave me the two slabs of stone, the tablets of the covenant. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to me, “Get going, and quickly. Get down there, because your people whom you led out of Egypt have ruined everything. In almost no time at all they have left the road that I laid out for them and gone off and made for themselves a cast god.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “I look at this people and all I see are hardheaded, hardhearted rebels. Get out of my way now so I can destroy them. I’m going to wipe them off the face of the map. Then I’ll start over with you to make a nation far better and bigger than they could ever be.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-17
    - type: text
      text: 'I turned around and started down the mountain—by now the mountain was blazing with fire—carrying the two tablets of the covenant in my two arms. That’s when I saw it: There you were, sinning against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God—you had made yourselves a cast god in the shape of a calf! So soon you had left the road that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded you to walk on. I held the two stone slabs high and threw them down, smashing them to bits as you watched.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: 'Then I flung myself down before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', just as I had at the beginning of the forty days and nights. I ate no food; I drank no water. I did this because of you, all your sins, sinning against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', doing what is evil in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s eyes and making him angry. I was terrified of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s furious anger, his blazing anger. I was sure he would destroy you. But once again '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' listened to me. And Aaron! How furious he was with Aaron—ready to destroy him. But I prayed also for Aaron at that same time.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But that sin-thing that you made, that calf-god, I took and burned in the fire, pounded and ground it until it was crushed into a fine powder, then threw it into the stream that comes down the mountain.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And then there was Camp Taberah (Blaze), Massah (Testing-Place), and Camp Kibroth Hattaavah (Graves-of-the-Craving)—more occasions when you made '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' furious with you.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'The most recent was when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sent you out from Kadesh Barnea, ordering you: “Go. Possess the land that I’m giving you.” And what did you do? You rebelled. Rebelled against the clear orders of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God. Refused to trust him. Wouldn’t obey him. You’ve been rebels against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' from the first day I knew you.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'When I was on my face, stretched out before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' those forty days and nights after '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said he would destroy you, I prayed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' for you, “My Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', don’t destroy your people, your inheritance whom, in your immense generosity, you redeemed, using your enormous strength to get them out of Egypt.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: “Remember your servants Abraham, Isaac, and Jacob; don’t make too much of the stubbornness of this people, their evil and their sin, lest the Egyptians from whom you rescued them say, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' couldn’t do it; he got tired and wasn’t able to take them to the land he promised them. He ended up hating them and dumped them in the wilderness to die.’'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “They are your people still, your inheritance whom you powerfully and sovereignly rescued.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Today know this: '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is crossing the river ahead of you—he’s a consuming fire. He will destroy the nations, he will put them under your power. You will oust them and very quickly wipe them out, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' promised you would.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: 'But when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' pushes them out ahead of you, don’t start thinking to yourselves, “It’s because of all the good I’ve done that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has brought me in here to dispossess these nations.” Actually it’s because of all the evil these nations have done. No, it’s nothing good that you’ve done, no record for decency that you’ve built up, that got you here; it’s because of the vile wickedness of these nations that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, is dispossessing them before you so that he can keep his promised word to your ancestors, to Abraham, Isaac, and Jacob.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-10
    - type: text
      text: 'Know this and don’t ever forget it: It’s not because of any good that you’ve done that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is giving you this good land to own. Anything but! You’re stubborn as mules. Keep in mind and don’t ever forget how angry you made '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, in the wilderness. You’ve kicked and screamed against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' from the day you left Egypt until you got to this place, rebels all the way. You made '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' angry at Horeb, made him so angry that he wanted to destroy you. When I climbed the mountain to receive the slabs of stone, the tablets of the covenant that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made with you, I stayed there on the mountain forty days and nights: I ate no food; I drank no water. Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave me the two slabs of stone, engraved with the finger of God. They contained word for word everything that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to you on the mountain out of the fire, on the day of the assembly.'
