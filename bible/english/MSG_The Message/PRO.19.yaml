document_id: PRO.19,97
type_code: eng
verses:
  '1':
  - type: heading
    content: If You Quit Listening
  - type: text
    content: Better to be poor and honest
  - type: text
    content: than a rich person no one can trust.
  '10':
  - type: text
    content: Blockheads shouldn’t live on easy street
  - type: text
    content: any more than workers should give orders to their boss.
  '11':
  - type: text
    content: Smart people know how to hold their tongue;
  - type: text
    content: their grandeur is to forgive and forget.
  '12':
  - type: text
    content: Mean-tempered leaders are like mad dogs;
  - type: text
    content: the good-natured are like fresh morning dew.
  '13':
  - type: text
    content: A parent is worn to a frazzle by an irresponsible child;
  - type: text
    content: a nagging spouse is a leaky faucet.
  '14':
  - type: text
    content: House and land are handed down from parents,
  - type: text
    content: 'but a congenial spouse comes straight from '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: Life collapses on loafers;
  - type: text
    content: lazybones go hungry.
  '16':
  - type: text
    content: Keep the rules and keep your life;
  - type: text
    content: careless living kills.
  '17':
  - type: text
    content: 'Mercy to the needy is a loan to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'and '
  - type: text
    content: God
  - type: text
    content: ' pays back those loans in full.'
  '18':
  - type: text
    content: Discipline your children while you still have the chance;
  - type: text
    content: indulging them destroys them.
  '19':
  - type: text
    content: Let angry people endure the backlash of their own anger;
  - type: text
    content: if you try to make it better, you’ll only make it worse.
  '2':
  - type: text
    content: Ignorant zeal is worthless;
  - type: text
    content: haste makes waste.
  '20':
  - type: text
    content: Take good counsel and accept correction—
  - type: text
    content: that’s the way to live wisely and well.
  '21':
  - type: text
    content: We humans keep brainstorming options and plans,
  - type: text
    content: 'but '
  - type: text
    content: God
  - type: text
    content: ’s purpose prevails.
  '22':
  - type: text
    content: It’s only human to want to make a buck,
  - type: text
    content: but it’s better to be poor than a liar.
  '23':
  - type: text
    content: Fear-of-
  - type: text
    content: God
  - type: text
    content: ' is life itself,'
  - type: text
    content: a full life, and serene—no nasty surprises.
  '24':
  - type: text
    content: Some people dig a fork into the pie
  - type: text
    content: but are too lazy to raise it to their mouth.
  '25':
  - type: text
    content: Punish the insolent—make an example of them.
  - type: text
    content: Who knows? Somebody might learn a good lesson.
  '26':
  - type: text
    content: Kids who lash out against their parents
  - type: text
    content: are an embarrassment and disgrace.
  '27':
  - type: text
    content: If you quit listening, dear child, and strike off on your own,
  - type: text
    content: you’ll soon be out of your depth.
  '28':
  - type: text
    content: An unprincipled witness desecrates justice;
  - type: text
    content: the mouths of the wicked spew malice.
  '29':
  - type: text
    content: The irreverent have to learn reverence the hard way;
  - type: text
    content: only a slap in the face brings fools to attention.
  '3':
  - type: text
    content: People ruin their lives by their own stupidity,
  - type: text
    content: 'so why does '
  - type: text
    content: God
  - type: text
    content: ' always get blamed?'
  '4':
  - type: text
    content: Wealth attracts friends as honey draws flies,
  - type: text
    content: but poor people are avoided like a plague.
  '5':
  - type: text
    content: Perjury won’t go unpunished.
  - type: text
    content: Would you let a liar go free?
  '6':
  - type: text
    content: Lots of people flock around a generous person;
  - type: text
    content: everyone’s a friend to the philanthropist.
  '7':
  - type: text
    content: When you’re down on your luck, even your family avoids you—
  - type: text
    content: yes, even your best friends wish you’d get lost.
  - type: text
    content: If they see you coming, they look the other way—
  - type: text
    content: out of sight, out of mind.
  '8':
  - type: text
    content: Grow a wise heart—you’ll do yourself a favor;
  - type: text
    content: keep a clear head—you’ll find a good life.
  '9':
  - type: text
    content: The person who tells lies gets caught;
  - type: text
    content: the person who spreads rumors is ruined.
