document_id: PRO.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: If You Quit Listening
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Better to be poor and honest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a rich person no one can trust.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Blockheads shouldn’t live on easy street
  - type: usfm
    marker: q2
    children:
    - type: text
      text: any more than workers should give orders to their boss.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Smart people know how to hold their tongue;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their grandeur is to forgive and forget.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mean-tempered leaders are like mad dogs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the good-natured are like fresh morning dew.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A parent is worn to a frazzle by an irresponsible child;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a nagging spouse is a leaky faucet.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: House and land are handed down from parents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but a congenial spouse comes straight from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Life collapses on loafers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lazybones go hungry.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Keep the rules and keep your life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: careless living kills.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mercy to the needy is a loan to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' pays back those loans in full.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Discipline your children while you still have the chance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: indulging them destroys them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Let angry people endure the backlash of their own anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you try to make it better, you’ll only make it worse.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ignorant zeal is worthless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: haste makes waste.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Take good counsel and accept correction—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s the way to live wisely and well.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: We humans keep brainstorming options and plans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s purpose prevails.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: It’s only human to want to make a buck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it’s better to be poor than a liar.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is life itself,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a full life, and serene—no nasty surprises.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Some people dig a fork into the pie
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but are too lazy to raise it to their mouth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Punish the insolent—make an example of them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who knows? Somebody might learn a good lesson.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Kids who lash out against their parents
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are an embarrassment and disgrace.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: If you quit listening, dear child, and strike off on your own,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll soon be out of your depth.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: An unprincipled witness desecrates justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mouths of the wicked spew malice.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The irreverent have to learn reverence the hard way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only a slap in the face brings fools to attention.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: People ruin their lives by their own stupidity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so why does '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' always get blamed?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Wealth attracts friends as honey draws flies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but poor people are avoided like a plague.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Perjury won’t go unpunished.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Would you let a liar go free?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Lots of people flock around a generous person;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone’s a friend to the philanthropist.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When you’re down on your luck, even your family avoids you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, even your best friends wish you’d get lost.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If they see you coming, they look the other way—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of sight, out of mind.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Grow a wise heart—you’ll do yourself a favor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep a clear head—you’ll find a good life.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The person who tells lies gets caught;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the person who spreads rumors is ruined.
