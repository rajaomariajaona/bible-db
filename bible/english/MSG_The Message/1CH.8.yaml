type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of Benjamin (Continued)
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Benjamin’s firstborn son was Bela, followed by Ashbel, Aharah, Nohah, and Rapha—five in all. Bela’s sons were Addar, Gera, Abihud, Abishua, Naaman, Ahoah, Gera, Shephuphan, and Huram.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beriah and Shema were family chiefs who lived at Aijalon. They drove out the citizens of Gath. Their brothers were Shashak and Jeremoth. The sons of Beriah were Zebadiah, Arad, Eder, Michael, Ishpah, and Joha. The sons of Elpaal were Zebadiah, Meshullam, Hizki, Heber, Ishmerai, Izliah, and Jobab. The sons of Shimei were Jakim, Zicri, Zabdi, Elienai, Zillethai, Eliel, Adaiah, Beraiah, and Shimrath. The sons of Shashak were Ishpan, Eber, Eliel, Abdon, Zicri, Hanan, Hananiah, Elam, Anthothijah, Iphdeiah, and Penuel. The sons of Jeroham were Shamsherai, Shehariah, Athaliah, Jaareshiah, Elijah, and Zicri. These were the chiefs of the families as listed in their family tree. They lived in Jerusalem.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jeiel the father of Gibeon lived in Gibeon. His wife’s name was Maacah. Abdon was his firstborn son, followed by Zur, Kish, Baal, Nadab, Gedor, Ahio, Zeker, and Mikloth. Mikloth had Shimeah. They lived in the neighborhood of their extended families in Jerusalem.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ner had Kish, Kish had Saul, and Saul had Jonathan, Malki-Shua, Abinadab, and Esh-Baal. Jonathan had Merib-Baal, and Merib-Baal had Micah. Micah’s sons were Pithon, Melech, Tarea, and Ahaz. Ahaz had Jehoaddah and Jehoaddah had Alemeth, Azmaveth, and Zimri. Zimri had Moza and Moza had Binea. Raphah was his son, Eleasah his son, and Azel his son. Azel had six sons named Azrikam, Bokeru, Ishmael, Sheariah, Obadiah, and Hanan. His brother Eshek’s sons were Ulam his firstborn, followed by Jeush and Eliphelet. Ulam’s sons were warriors well known as archers. They had lots of sons and grandsons—at least 150. These were all in Benjamin’s family tree.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the families of Ehud that lived in Geba and were exiled to Manahath: Naaman, Ahijah, and Gera, who led them to exile and had Uzza and Ahihud.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the land of Moab, Shaharaim had children after he divorced his wives Hushim and Baara. From his new wife Hodesh he had Jobab, Zibia, Mesha, Malcam, Jeuz, Sakia, and Mirmah—sons who became heads of families. From his earlier wife Hushim he had Abitub and Elpaal. Elpaal’s sons were Eber, Misham, and Shemed, who built Ono and Lod with all their villages.
