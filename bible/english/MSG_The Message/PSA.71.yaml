document_id: PSA.71,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I run for dear life to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I’ll never live to regret it.
  - type: text
    content: 'Do what you do so well:'
  - type: text
    content: get me out of this mess and up on my feet.
  - type: text
    content: Put your ear to the ground and listen,
  - type: text
    content: give me space for salvation.
  - type: text
    content: Be a guest room where I can retreat;
  - type: text
    content: you said your door was always open!
  - type: text
    content: You’re my salvation—my vast, granite fortress.
  '12':
  - type: text
    content: God, don’t just watch from the sidelines.
  - type: text
    content: Come on! Run to my side!
  - type: text
    content: My accusers—make them lose face.
  - type: text
    content: Those out to get me—make them look
  - type: text
    content: Like idiots, while I stretch out, reaching for you,
  - type: text
    content: and daily add praise to praise.
  - type: text
    content: I’ll write the book on your righteousness,
  - type: text
    content: talk up your salvation all the day long,
  - type: text
    content: never run out of good things to write or say.
  - type: text
    content: 'I come in the power of the Lord '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I post signs marking his right-of-way.
  '17':
  - type: text
    content: You got me when I was an unformed youth,
  - type: text
    content: God, and taught me everything I know.
  - type: text
    content: Now I’m telling the world your wonders;
  - type: text
    content: I’ll keep at it until I’m old and gray.
  - type: text
    content: God, don’t walk off and leave me
  - type: text
    content: until I get out the news
  - type: text
    content: Of your strong right arm to this world,
  - type: text
    content: news of your power to the world yet to come,
  - type: text
    content: Your famous and righteous
  - type: text
    content: ways, O God.
  - type: text
    content: God, you’ve done it all!
  - type: text
    content: Who is quite like you?
  - type: text
    content: You, who made me stare trouble in the face,
  - type: text
    content: Turn me around;
  - type: text
    content: Now let me look life in the face.
  - type: text
    content: I’ve been to the bottom;
  - type: text
    content: Bring me up, streaming with honors;
  - type: text
    content: turn to me, be tender to me,
  - type: text
    content: And I’ll take up the lute and thank you
  - type: text
    content: to the tune of your faithfulness, God.
  - type: text
    content: I’ll make music for you on a harp,
  - type: text
    content: Holy One of Israel.
  - type: text
    content: When I open up in song to you,
  - type: text
    content: I let out lungsful of praise,
  - type: text
    content: my rescued life a song.
  - type: text
    content: All day long I’m chanting
  - type: text
    content: about you and your righteous ways,
  - type: text
    content: While those who tried to do me in
  - type: text
    content: slink off looking ashamed.
  '4':
  - type: text
    content: My God, free me from the grip of Wicked,
  - type: text
    content: from the clutch of Bad and Bully.
  - type: text
    content: You keep me going when times are tough—
  - type: text
    content: 'my bedrock, '
  - type: text
    content: God
  - type: text
    content: ', since my childhood.'
  - type: text
    content: I’ve hung on you from the day of my birth,
  - type: text
    content: the day you took me from the cradle;
  - type: text
    content: I’ll never run out of praise.
  - type: text
    content: Many gasp in alarm when they see me,
  - type: text
    content: but you take me in stride.
  '8':
  - type: text
    content: Just as each day brims with your beauty,
  - type: text
    content: my mouth brims with praise.
  - type: text
    content: But don’t turn me out to pasture when I’m old
  - type: text
    content: or put me on the shelf when I can’t pull my weight.
  - type: text
    content: My enemies are talking behind my back,
  - type: text
    content: watching for their chance to knife me.
  - type: text
    content: 'The gossip is: “God has abandoned him.'
  - type: text
    content: Pounce on him now; no one will help him.”
