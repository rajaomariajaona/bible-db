document_id: PSA.71
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'I run for dear life to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll never live to regret it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Do what you do so well:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: get me out of this mess and up on my feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put your ear to the ground and listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: give me space for salvation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be a guest room where I can retreat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you said your door was always open!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re my salvation—my vast, granite fortress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: My God, free me from the grip of Wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the clutch of Bad and Bully.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You keep me going when times are tough—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'my bedrock, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', since my childhood.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve hung on you from the day of my birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the day you took me from the cradle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll never run out of praise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many gasp in alarm when they see me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you take me in stride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: Just as each day brims with your beauty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my mouth brims with praise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But don’t turn me out to pasture when I’m old
- type: usfm
  marker: q2
  children:
  - type: text
    text: or put me on the shelf when I can’t pull my weight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My enemies are talking behind my back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: watching for their chance to knife me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The gossip is: “God has abandoned him.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pounce on him now; no one will help him.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-16
  - type: text
    text: God, don’t just watch from the sidelines.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Come on! Run to my side!
- type: usfm
  marker: q1
  children:
  - type: text
    text: My accusers—make them lose face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those out to get me—make them look
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like idiots, while I stretch out, reaching for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and daily add praise to praise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll write the book on your righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: talk up your salvation all the day long,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never run out of good things to write or say.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I come in the power of the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: I post signs marking his right-of-way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-24
  - type: text
    text: You got me when I was an unformed youth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God, and taught me everything I know.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I’m telling the world your wonders;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll keep at it until I’m old and gray.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God, don’t walk off and leave me
- type: usfm
  marker: q2
  children:
  - type: text
    text: until I get out the news
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of your strong right arm to this world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: news of your power to the world yet to come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your famous and righteous
- type: usfm
  marker: q2
  children:
  - type: text
    text: ways, O God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God, you’ve done it all!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is quite like you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You, who made me stare trouble in the face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Turn me around;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now let me look life in the face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve been to the bottom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring me up, streaming with honors;
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn to me, be tender to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I’ll take up the lute and thank you
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the tune of your faithfulness, God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll make music for you on a harp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I open up in song to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I let out lungsful of praise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my rescued life a song.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All day long I’m chanting
- type: usfm
  marker: q2
  children:
  - type: text
    text: about you and your righteous ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: While those who tried to do me in
- type: usfm
  marker: q2
  children:
  - type: text
    text: slink off looking ashamed.
