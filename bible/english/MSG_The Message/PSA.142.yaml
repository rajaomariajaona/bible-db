type_code: eng
verses:
  '1':
  - type: text
    content: 'I cry out loudly to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'loudly I plead with '
  - type: text
    content: God
  - type: text
    content: ' for mercy.'
  - type: text
    content: I spill out all my complaints before him,
  - type: text
    content: 'and spell out my troubles in detail:'
  '3':
  - type: text
    content: “As I sink in despair, my spirit ebbing away,
  - type: text
    content: you know how I’m feeling,
  - type: text
    content: Know the danger I’m in,
  - type: text
    content: the traps hidden in my path.
  - type: text
    content: Look right, look left—
  - type: text
    content: there’s not a soul who cares what happens!
  - type: text
    content: I’m up against the wall, with no exit—
  - type: text
    content: it’s just me, all alone.
  - type: text
    content: 'I cry out, '
  - type: text
    content: God
  - type: text
    content: ', call out:'
  - type: text
    content: ‘You’re my last chance, my only hope for life!’
  - type: text
    content: Oh listen, please listen;
  - type: text
    content: I’ve never been this low.
  - type: text
    content: Rescue me from those who are hunting me down;
  - type: text
    content: I’m no match for them.
  - type: text
    content: Get me out of this dungeon
  - type: text
    content: so I can thank you in public.
  - type: text
    content: Your people will form a circle around me
  - type: text
    content: and you’ll bring me showers of blessing!”
