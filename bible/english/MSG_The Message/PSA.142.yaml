    - type: text
      text: 1-2
  - type: text
    text: 'I cry out loudly to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'loudly I plead with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for mercy.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I spill out all my complaints before him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and spell out my troubles in detail:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-7
  - type: text
    text: “As I sink in despair, my spirit ebbing away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you know how I’m feeling,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Know the danger I’m in,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the traps hidden in my path.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look right, look left—
- type: usfm
  marker: q2
  children:
  - type: text
    text: there’s not a soul who cares what happens!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m up against the wall, with no exit—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s just me, all alone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I cry out, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', call out:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You’re my last chance, my only hope for life!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh listen, please listen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve never been this low.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rescue me from those who are hunting me down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m no match for them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get me out of this dungeon
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I can thank you in public.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your people will form a circle around me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you’ll bring me showers of blessing!”
