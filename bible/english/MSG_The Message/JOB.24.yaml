document_id: JOB.24,97
type_code: eng
verses:
  '1':
  - type: heading
    content: An Illusion of Security
  - type: text
    content: “But if Judgment Day isn’t hidden from the Almighty,
  - type: text
    content: why are we kept in the dark?
  - type: text
    content: There are people out there getting by with murder—
  - type: text
    content: stealing and lying and cheating.
  - type: text
    content: They rip off the poor
  - type: text
    content: and exploit the unfortunate,
  - type: text
    content: Push the helpless into the ditch,
  - type: text
    content: bully the weak so that they fear for their lives.
  - type: text
    content: The poor, like stray dogs and cats,
  - type: text
    content: scavenge for food in back alleys.
  - type: text
    content: They sort through the garbage of the rich,
  - type: text
    content: eke out survival on handouts.
  - type: text
    content: Homeless, they shiver through cold nights on the street;
  - type: text
    content: they’ve no place to lay their heads.
  - type: text
    content: Exposed to the weather, wet and frozen,
  - type: text
    content: they huddle in makeshift shelters.
  - type: text
    content: Nursing mothers have their babies snatched from them;
  - type: text
    content: the infants of the poor are kidnapped and sold.
  - type: text
    content: They go about patched and threadbare;
  - type: text
    content: even the hard workers go hungry.
  - type: text
    content: No matter how backbreaking their labor,
  - type: text
    content: they can never make ends meet.
  - type: text
    content: People are dying right and left, groaning in torment.
  - type: text
    content: The wretched cry out for help
  - type: text
    content: and God does nothing, acts like nothing’s wrong!
  '13':
  - type: text
    content: “Then there are those who avoid light at all costs,
  - type: text
    content: who scorn the light-filled path.
  - type: text
    content: When the sun goes down, the murderer gets up—
  - type: text
    content: kills the poor and robs the defenseless.
  - type: text
    content: Sexual predators can’t wait for nightfall,
  - type: text
    content: thinking, ‘No one can see us now.’
  - type: text
    content: Burglars do their work at night,
  - type: text
    content: but keep well out of sight through the day.
  - type: text
    content: They want nothing to do with light.
  - type: text
    content: Deep darkness is morning for that bunch;
  - type: text
    content: they make the terrors of darkness their companions in crime.
  '18':
  - type: text
    content: “They are scraps of wood floating on the water—
  - type: text
    content: useless, cursed junk, good for nothing.
  - type: text
    content: As surely as snow melts under the hot, summer sun,
  - type: text
    content: sinners disappear in the grave.
  - type: text
    content: The womb has forgotten them, worms have relished them—
  - type: text
    content: nothing that is evil lasts.
  - type: text
    content: Unscrupulous,
  - type: text
    content: they prey on those less fortunate.
  - type: text
    content: However much they strut and flex their muscles,
  - type: text
    content: there’s nothing to them. They’re hollow.
  - type: text
    content: They may have an illusion of security,
  - type: text
    content: but God has his eye on them.
  - type: text
    content: They may get their brief successes,
  - type: text
    content: but then it’s over, nothing to show for it.
  - type: text
    content: Like yesterday’s newspaper,
  - type: text
    content: they’re used to wrap up the garbage.
  - type: text
    content: You’re free to try to prove me a liar,
  - type: text
    content: but you won’t be able to do it.”
