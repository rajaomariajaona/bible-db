document_id: JOB.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Illusion of Security
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-12
  - type: text
    text: “But if Judgment Day isn’t hidden from the Almighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: why are we kept in the dark?
- type: usfm
  marker: q1
  children:
  - type: text
    text: There are people out there getting by with murder—
- type: usfm
  marker: q2
  children:
  - type: text
    text: stealing and lying and cheating.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They rip off the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and exploit the unfortunate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Push the helpless into the ditch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bully the weak so that they fear for their lives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The poor, like stray dogs and cats,
- type: usfm
  marker: q2
  children:
  - type: text
    text: scavenge for food in back alleys.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sort through the garbage of the rich,
- type: usfm
  marker: q2
  children:
  - type: text
    text: eke out survival on handouts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Homeless, they shiver through cold nights on the street;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ve no place to lay their heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exposed to the weather, wet and frozen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they huddle in makeshift shelters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nursing mothers have their babies snatched from them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the infants of the poor are kidnapped and sold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They go about patched and threadbare;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the hard workers go hungry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No matter how backbreaking their labor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they can never make ends meet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People are dying right and left, groaning in torment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The wretched cry out for help
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God does nothing, acts like nothing’s wrong!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: “Then there are those who avoid light at all costs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who scorn the light-filled path.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the sun goes down, the murderer gets up—
- type: usfm
  marker: q2
  children:
  - type: text
    text: kills the poor and robs the defenseless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sexual predators can’t wait for nightfall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thinking, ‘No one can see us now.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Burglars do their work at night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but keep well out of sight through the day.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They want nothing to do with light.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deep darkness is morning for that bunch;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they make the terrors of darkness their companions in crime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-25
  - type: text
    text: “They are scraps of wood floating on the water—
- type: usfm
  marker: q2
  children:
  - type: text
    text: useless, cursed junk, good for nothing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As surely as snow melts under the hot, summer sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sinners disappear in the grave.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The womb has forgotten them, worms have relished them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing that is evil lasts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Unscrupulous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they prey on those less fortunate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: However much they strut and flex their muscles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: there’s nothing to them. They’re hollow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They may have an illusion of security,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God has his eye on them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They may get their brief successes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but then it’s over, nothing to show for it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like yesterday’s newspaper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re used to wrap up the garbage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re free to try to prove me a liar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you won’t be able to do it.”
