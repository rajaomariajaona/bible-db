document_id: JOB.40,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' then confronted Job directly:'
  - type: text
    content: “Now what do you have to say for yourself?
  - type: text
    content: Are you going to haul me, the Mighty One, into court and press charges?”
  - type: heading
    content: Job Answers God
  - type: heading
    content: I’m Ready to Shut Up and Listen
  '15':
  - type: text
    content: “Look at the land beast, Behemoth. I created him as well as you.
  - type: text
    content: Grazing on grass, docile as a cow—
  - type: text
    content: Just look at the strength of his back,
  - type: text
    content: the powerful muscles of his belly.
  - type: text
    content: His tail sways like a cedar in the wind;
  - type: text
    content: his huge legs are like beech trees.
  - type: text
    content: His skeleton is made of steel,
  - type: text
    content: every bone in his body hard as steel.
  - type: text
    content: Most magnificent of all my creatures,
  - type: text
    content: but I still lead him around like a lamb!
  - type: text
    content: The grass-covered hills serve him meals,
  - type: text
    content: while field mice frolic in his shadow.
  - type: text
    content: He takes afternoon naps under shade trees,
  - type: text
    content: cools himself in the reedy swamps,
  - type: text
    content: Lazily cool in the leafy shadows
  - type: text
    content: as the breeze moves through the willows.
  - type: text
    content: And when the river rages he doesn’t budge,
  - type: text
    content: stolid and unperturbed even when the Jordan goes wild.
  - type: text
    content: But you’d never want him for a pet—
  - type: text
    content: you’d never be able to housebreak him!”
  '3':
  - type: text
    content: 'Job answered:'
  - type: text
    content: “I’m speechless, in awe—words fail me.
  - type: text
    content: I should never have opened my mouth!
  - type: text
    content: I’ve talked too much, way too much.
  - type: text
    content: I’m ready to shut up and listen.”
  - type: heading
    content: God’s Second Set of Questions
  - type: heading
    content: I Want Straight Answers
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' addressed Job next from the eye of the storm, and this is what he said:'
  - type: text
    content: “I have some more questions for you,
  - type: text
    content: and I want straight answers.
  '8':
  - type: text
    content: “Do you presume to tell me what I’m doing wrong?
  - type: text
    content: Are you calling me a sinner so you can be a saint?
  - type: text
    content: Do you have an arm like my arm?
  - type: text
    content: Can you shout in thunder the way I can?
  - type: text
    content: Go ahead, show your stuff.
  - type: text
    content: Let’s see what you’re made of, what you can do.
  - type: text
    content: Unleash your outrage.
  - type: text
    content: Target the arrogant and lay them flat.
  - type: text
    content: Target the arrogant and bring them to their knees.
  - type: text
    content: Stop the wicked in their tracks—make mincemeat of them!
  - type: text
    content: Dig a mass grave and dump them in it—
  - type: text
    content: faceless corpses in an unmarked grave.
  - type: text
    content: I’ll gladly step aside and hand things over to you—
  - type: text
    content: you can surely save yourself with no help from me!
