document_id: JOB.40,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' then confronted Job directly:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Now what do you have to say for yourself?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are you going to haul me, the Mighty One, into court and press charges?”
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Job Answers God
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: I’m Ready to Shut Up and Listen
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look at the land beast, Behemoth. I created him as well as you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Grazing on grass, docile as a cow—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just look at the strength of his back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the powerful muscles of his belly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His tail sways like a cedar in the wind;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his huge legs are like beech trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His skeleton is made of steel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every bone in his body hard as steel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Most magnificent of all my creatures,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I still lead him around like a lamb!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grass-covered hills serve him meals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while field mice frolic in his shadow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He takes afternoon naps under shade trees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cools himself in the reedy swamps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lazily cool in the leafy shadows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the breeze moves through the willows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when the river rages he doesn’t budge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stolid and unperturbed even when the Jordan goes wild.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you’d never want him for a pet—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’d never be able to housebreak him!”
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Job answered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’m speechless, in awe—words fail me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I should never have opened my mouth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve talked too much, way too much.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m ready to shut up and listen.”
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: God’s Second Set of Questions
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: I Want Straight Answers
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' addressed Job next from the eye of the storm, and this is what he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have some more questions for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I want straight answers.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do you presume to tell me what I’m doing wrong?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are you calling me a sinner so you can be a saint?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you have an arm like my arm?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you shout in thunder the way I can?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead, show your stuff.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s see what you’re made of, what you can do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unleash your outrage.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Target the arrogant and lay them flat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Target the arrogant and bring them to their knees.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Stop the wicked in their tracks—make mincemeat of them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dig a mass grave and dump them in it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: faceless corpses in an unmarked grave.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll gladly step aside and hand things over to you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you can surely save yourself with no help from me!
