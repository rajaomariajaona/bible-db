  - type: text
    content: God
  - type: text
    content: ', you smiled on your good earth!'
  - type: text
    content: You brought good times back to Jacob!
  - type: text
    content: You lifted the cloud of guilt from your people,
  - type: text
    content: you put their sins far out of sight.
  - type: text
    content: You took back your sin-provoked threats,
  - type: text
    content: you cooled your hot, righteous anger.
  '10':
  - type: text
    content: Love and Truth meet in the street,
  - type: text
    content: Right Living and Whole Living embrace and kiss!
  - type: text
    content: Truth sprouts green from the ground,
  - type: text
    content: Right Living pours down from the skies!
  - type: text
    content: 'Oh yes! '
  - type: text
    content: God
  - type: text
    content: ' gives Goodness and Beauty;'
  - type: text
    content: our land responds with Bounty and Blessing.
  - type: text
    content: Right Living strides out before him,
  - type: text
    content: and clears a path for his passage.
  '4':
  - type: text
    content: Help us again, God of our help;
  - type: text
    content: don’t hold a grudge against us forever.
  - type: text
    content: You aren’t going to keep this up, are you?
  - type: text
    content: scowling and angry, year after year?
  - type: text
    content: Why not help us make a fresh start—a resurrection life?
  - type: text
    content: Then
  - type: text
    content: ' your people will laugh and sing!'
  - type: text
    content: 'Show us how much you love us, '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Give us the salvation we need!
  '8':
  - type: text
    content: I can’t wait to hear what he’ll say.
  - type: text
    content: God
  - type: text
    content: ’s about to pronounce his people well,
  - type: text
    content: The holy people he loves so much,
  - type: text
    content: so they’ll never again live like fools.
  - type: text
    content: See how close his salvation is to those who fear him?
  - type: text
    content: Our country is home base for Glory!
