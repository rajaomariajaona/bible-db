document_id: PSA.85,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you smiled on your good earth!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You brought good times back to Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You lifted the cloud of guilt from your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you put their sins far out of sight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You took back your sin-provoked threats,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you cooled your hot, righteous anger.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: Love and Truth meet in the street,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Right Living and Whole Living embrace and kiss!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truth sprouts green from the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Right Living pours down from the skies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh yes! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gives Goodness and Beauty;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our land responds with Bounty and Blessing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Right Living strides out before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and clears a path for his passage.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-7
    - type: text
      text: Help us again, God of our help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t hold a grudge against us forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You aren’t going to keep this up, are you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scowling and angry, year after year?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why not help us make a fresh start—a resurrection life?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' your people will laugh and sing!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Show us how much you love us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give us the salvation we need!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: I can’t wait to hear what he’ll say.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s about to pronounce his people well,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The holy people he loves so much,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they’ll never again live like fools.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how close his salvation is to those who fear him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our country is home base for Glory!
