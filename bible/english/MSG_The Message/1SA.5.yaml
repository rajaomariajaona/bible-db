type_code: eng
verses:
  '1':
  - type: heading
    content: Threatened with Mass Death
  - type: text
    content: Once the Philistines had seized the Chest of God, they took it from Ebenezer to Ashdod, brought it into the shrine of Dagon, and placed it alongside the idol of Dagon.
  '10':
  - type: text
    content: So they sent the Chest of God on to Ekron, but as the Chest was being brought into town, the people shouted in protest, “You’ll kill us all by bringing in this Chest of the God of Israel!” They called the Philistine leaders together and demanded, “Get it out of here, this Chest of the God of Israel. Send it back where it came from. We’re threatened with mass death!” For everyone was scared to death when the Chest of God showed up. God was already coming down very hard on the place. Those who didn’t die were hit with tumors. All over the city cries of pain and lament filled the air.
  '3':
  - type: text
    content: 'Next morning when the citizens of Ashdod got up, they were shocked to find Dagon toppled from his place, flat on his face before the Chest of '
  - type: text
    content: God
  - type: text
    content: '. They picked him up and put him back where he belonged. First thing the next morning they found him again, toppled and flat on his face before the Chest of '
  - type: text
    content: God
  - type: text
    content: . Dagon’s head and arms were broken off, strewn across the entrance. Only his torso was in one piece. (That’s why even today, the priests of Dagon and visitors to the Dagon shrine in Ashdod avoid stepping on the threshold.)
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' was hard on the citizens of Ashdod. He devastated them by hitting them with tumors. This happened in both the town and the surrounding neighborhoods. He let loose rats among them. Jumping from ships there, rats swarmed all over the city! And everyone was deathly afraid.'
  '7':
  - type: text
    content: 'When the leaders of Ashdod saw what was going on, they decided, “The chest of the god of Israel has got to go. We can’t handle this, and neither can our god Dagon.” They called together all the Philistine leaders and put it to them: “How can we get rid of the chest of the god of Israel?”'
  - type: text
    content: 'The leaders agreed: “Move it to Gath.” So they moved the Chest of the God of Israel to Gath.'
  '9':
  - type: text
    content: 'But as soon as they moved it there, '
  - type: text
    content: God
  - type: text
    content: ' came down hard on that city, too. It was mass hysteria! He hit them with tumors. Tumors broke out on everyone in town, young and old.'
