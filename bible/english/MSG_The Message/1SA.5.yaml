segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Threatened with Mass Death
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Once the Philistines had seized the Chest of God, they took it from Ebenezer to Ashdod, brought it into the shrine of Dagon, and placed it alongside the idol of Dagon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: 'Next morning when the citizens of Ashdod got up, they were shocked to find Dagon toppled from his place, flat on his face before the Chest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. They picked him up and put him back where he belonged. First thing the next morning they found him again, toppled and flat on his face before the Chest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Dagon’s head and arms were broken off, strewn across the entrance. Only his torso was in one piece. (That’s why even today, the priests of Dagon and visitors to the Dagon shrine in Ashdod avoid stepping on the threshold.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was hard on the citizens of Ashdod. He devastated them by hitting them with tumors. This happened in both the town and the surrounding neighborhoods. He let loose rats among them. Jumping from ships there, rats swarmed all over the city! And everyone was deathly afraid.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'When the leaders of Ashdod saw what was going on, they decided, “The chest of the god of Israel has got to go. We can’t handle this, and neither can our god Dagon.” They called together all the Philistine leaders and put it to them: “How can we get rid of the chest of the god of Israel?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The leaders agreed: “Move it to Gath.” So they moved the Chest of the God of Israel to Gath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But as soon as they moved it there, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came down hard on that city, too. It was mass hysteria! He hit them with tumors. Tumors broke out on everyone in town, young and old.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: So they sent the Chest of God on to Ekron, but as the Chest was being brought into town, the people shouted in protest, “You’ll kill us all by bringing in this Chest of the God of Israel!” They called the Philistine leaders together and demanded, “Get it out of here, this Chest of the God of Israel. Send it back where it came from. We’re threatened with mass death!” For everyone was scared to death when the Chest of God showed up. God was already coming down very hard on the place. Those who didn’t die were hit with tumors. All over the city cries of pain and lament filled the air.
