document_id: GEN.44,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'Joseph ordered his house steward: “Fill the men’s bags with food—all they can carry—and replace each one’s money at the top of the bag. Then put my chalice, my silver chalice, in the top of the bag of the youngest, along with the money for his food.” He did as Joseph ordered.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The steward said, “Very well then, but we won’t go that far. Whoever is found with the chalice will be my slave; the rest of you can go free.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: They outdid each other in putting their bags on the ground and opening them up for inspection. The steward searched their bags, going from oldest to youngest. The chalice showed up in Benjamin’s bag.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They ripped their clothes in despair, loaded up their donkeys, and went back to the city.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Joseph was still at home when Judah and his brothers got back. They threw themselves down on the ground in front of him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Joseph accused them: “How can you have done this? You have to know that a man in my position would have discovered this.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Judah as spokesman for the brothers said, “What can we say, master? What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' there to say? How can we prove our innocence? God is behind this, exposing how bad we are. We stand guilty before you and ready to be your slaves—we’re all in this together, the rest of us as guilty as the one with the chalice.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “I’d never do that to you,” said Joseph. “Only the one involved with the chalice will be my slave. The rest of you are free to go back to your father.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: Judah came forward. He said, “Please, master; can I say just one thing to you? Don’t get angry. Don’t think I’m presumptuous—you’re the same as Pharaoh as far as I’m concerned. You, master, asked us, ‘Do you have a father and a brother?’ And we answered honestly, ‘We have a father who is old and a younger brother who was born to him in his old age. His brother is dead and he is the only son left from that mother. And his father loves him more than anything.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: '“Then you told us, ‘Bring him down here so I can see him.’ We told you, master, that it was impossible: ‘The boy can’t leave his father; if he leaves, his father will die.’'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “And then you said, ‘If your youngest brother doesn’t come with you, you won’t be allowed to see me.’
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-26
    - type: text
      text: “When we returned to our father, we told him everything you said to us. So when our father said, ‘Go back and buy some more food,’ we told him flatly, ‘We can’t. The only way we can go back is if our youngest brother is with us. We aren’t allowed to even see the man if our youngest brother doesn’t come with us.’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-29
    - type: text
      text: “Your servant, my father, told us, ‘You know very well that my wife gave me two sons. One turned up missing. I concluded that he’d been ripped to pieces. I’ve never seen him since. If you now go and take this one and something bad happens to him, you’ll put my old gray, grieving head in the grave for sure.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: At break of day the men were sent off with their donkeys. They were barely out of the city when Joseph said to his house steward, “Run after them. When you catch up with them, say, ‘Why did you pay me back evil for good? This is the chalice my master drinks from; he also uses it for divination. This is outrageous!’”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-32
    - type: text
      text: “And now, can’t you see that if I show up before your servant, my father, without the boy, this son with whom his life is so bound up, the moment he realizes the boy is gone, he’ll die on the spot. He’ll die of grief and we, your servants who are standing here before you, will have killed him. And that’s not all. I got my father to release the boy to show him to you by promising, ‘If I don’t bring him back, I’ll stand condemned before you, Father, all my life.’
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-34
    - type: text
      text: “So let me stay here as your slave, not this boy. Let the boy go back with his brothers. How can I go back to my father if the boy is not with me? Oh, don’t make me go back and watch my father die in grief!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He caught up with them and repeated all this word for word.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: They said, “What is my master talking about? We would never do anything like that! Why, the money we found in our bags earlier, we brought back all the way from Canaan—do you think we’d turn right around and steal it back from your master? If that chalice is found on any of us, he’ll die; and the rest of us will be your master’s slaves.”
