document_id: LEV.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-6
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “When anyone sins by betraying trust with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' by deceiving his neighbor regarding something entrusted to him, or by robbing or cheating or threatening him; or if he has found something lost and lies about it and swears falsely regarding any of these sins that people commonly commit—when he sins and is found guilty, he must return what he stole or extorted, restore what was entrusted to him, return the lost thing he found, or anything else about which he swore falsely. He must make full compensation, add twenty percent to it, and hand it over to the owner on the same day he brings his Compensation-Offering. He must present to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as his Compensation-Offering a ram without any defect from the flock, assessed at the value of a Compensation-Offering.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-18
    - type: text
      text: '“These are the instructions for the Grain-Offering. Aaron’s sons are to present it to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in front of the Altar. The priest takes a handful of the fine flour of the Grain-Offering with its oil and all its incense and burns this as a memorial on the Altar, a pleasing fragrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Aaron and his sons eat the rest of it. It is unraised bread and so eaten in a holy place—in the Courtyard of the Tent of Meeting. They must not bake it with yeast. I have designated it as their share of the gifts presented to me. It is very holy, like the Absolution-Offering and the Compensation-Offering. Any male descendant among Aaron’s sons may eat it. This is a fixed rule regarding '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s gifts, stretching down the generations. Anyone who touches these offerings must be holy.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-23
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “This is the offering which Aaron and his sons each are to present to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' on the day he is anointed: two quarts of fine flour as a regular Grain-Offering, half in the morning and half in the evening. Prepare it with oil on a griddle. Bring it well-mixed and then present it crumbled in pieces as a pleasing fragrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Aaron’s son who is anointed to succeed him offers it to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —this is a fixed rule. The whole thing is burned. Every Grain-Offering of a priest is burned completely; it must not be eaten.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-30
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell Aaron and his sons, These are the instructions for the Absolution-Offering. Slaughter the Absolution-Offering in the place where the Whole-Burnt-Offering is slaughtered before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: —the offering is most holy. The priest in charge eats it in a holy place, the Courtyard of the Tent of Meeting. Anyone who touches any of the meat must be holy. A garment that gets blood spattered on it must be washed in a holy place. Break the clay pot in which the meat was cooked. If it was cooked in a bronze pot, scour it and rinse it with water. Any male among the priestly families may eat it; it is most holy. But any Absolution-Offering whose blood is brought into the Tent of Meeting to make atonement in the Sanctuary must not be eaten, it has to be burned.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Thus the priest will make atonement for him before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and he’s forgiven of any of the things that one does that bring guilt.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Further Instructions
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-13
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Command Aaron and his sons. Tell them, These are the instructions for the Whole-Burnt-Offering. Leave the Whole-Burnt-Offering on the Altar hearth through the night until morning, with the fire kept burning on the Altar. Then dress in your linen clothes with linen underwear next to your body. Remove the ashes remaining from the Whole-Burnt-Offering and place them beside the Altar. Then change clothes and carry the ashes outside the camp to a clean place. Meanwhile keep the fire on the Altar burning; it must not go out. Replenish the wood for the fire every morning, arrange the Whole-Burnt-Offering on it, and burn the fat of the Peace-Offering on top of it all. Keep the fire burning on the Altar continuously. It must not go out.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
