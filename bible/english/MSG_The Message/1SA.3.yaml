    children:
    - type: text
      text: 1-3
  - type: text
    text: 'The boy Samuel was serving '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' under Eli’s direction. This was at a time when the revelation of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was rarely heard or seen. One night Eli was sound asleep (his eyesight was very bad—he could hardly see). It was well before dawn; the sanctuary lamp was still burning. Samuel was still in bed in the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', where the Chest of God rested.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' called out, “Samuel, Samuel!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Samuel answered, “Yes? I’m here.” Then he ran to Eli saying, “I heard you call. Here I am.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Eli said, “I didn’t call you. Go back to bed.” And so he did.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' called again, “Samuel, Samuel!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Samuel got up and went to Eli, “I heard you call. Here I am.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Again Eli said, “Son, I didn’t call you. Go back to bed.” (This all happened before Samuel knew '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for himself. It was before the revelation of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had been given to him personally.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' called again, “Samuel!”—the third time! Yet again Samuel got up and went to Eli, “Yes? I heard you call me. Here I am.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'That’s when it dawned on Eli that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was calling the boy. So Eli directed Samuel, “Go back and lie down. If the voice calls again, say, ‘Speak, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . I’m your servant, ready to listen.’” Samuel returned to his bed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' came and stood before him exactly as before, calling out, “Samuel! Samuel!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Samuel answered, “Speak. I’m your servant, ready to listen.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Samuel, “Listen carefully. I’m getting ready to do something in Israel that is going to shake everyone up and get their attention. The time has come for me to bring down on Eli’s family everything I warned him of, every last word of it. I’m letting him know that the time’s up. I’m bringing judgment on his family for good. He knew what was going on, that his sons were desecrating God’s name and God’s place, and he did nothing to stop them. This is my sentence on the family of Eli: The evil of Eli’s family can never be wiped out by sacrifice or offering.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Samuel stayed in bed until morning, then rose early and went about his duties, opening the doors of the sanctuary, but he dreaded having to tell the vision to Eli.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But then Eli summoned Samuel: “Samuel, my son!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Samuel came running: “Yes? What can I do for you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “What did he say? Tell it to me, all of it. Don’t suppress or soften one word, as God is your judge! I want it all, word for word as he said it to you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So Samuel told him, word for word. He held back nothing.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Eli said, “He is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Let him do whatever he thinks best.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'Samuel grew up. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was with him, and Samuel’s prophetic record was flawless. Everyone in Israel, from Dan in the north to Beersheba in the south, recognized that Samuel was the real thing—a true prophet of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' continued to show up at Shiloh, revealed through his word to Samuel at Shiloh.'
