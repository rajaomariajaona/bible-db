document_id: 1SA.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: “Speak, God. I’m Ready to Listen”
  - type: text
    content: 'The boy Samuel was serving '
  - type: text
    content: God
  - type: text
    content: ' under Eli’s direction. This was at a time when the revelation of '
  - type: text
    content: God
  - type: text
    content: ' was rarely heard or seen. One night Eli was sound asleep (his eyesight was very bad—he could hardly see). It was well before dawn; the sanctuary lamp was still burning. Samuel was still in bed in the Temple of '
  - type: text
    content: God
  - type: text
    content: ', where the Chest of God rested.'
  '10':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' came and stood before him exactly as before, calling out, “Samuel! Samuel!”'
  - type: text
    content: Samuel answered, “Speak. I’m your servant, ready to listen.”
  '11':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Samuel, “Listen carefully. I’m getting ready to do something in Israel that is going to shake everyone up and get their attention. The time has come for me to bring down on Eli’s family everything I warned him of, every last word of it. I’m letting him know that the time’s up. I’m bringing judgment on his family for good. He knew what was going on, that his sons were desecrating God’s name and God’s place, and he did nothing to stop them. This is my sentence on the family of Eli: The evil of Eli’s family can never be wiped out by sacrifice or offering.”'
  '15':
  - type: text
    content: Samuel stayed in bed until morning, then rose early and went about his duties, opening the doors of the sanctuary, but he dreaded having to tell the vision to Eli.
  '16':
  - type: text
    content: 'But then Eli summoned Samuel: “Samuel, my son!”'
  - type: text
    content: 'Samuel came running: “Yes? What can I do for you?”'
  '17':
  - type: text
    content: “What did he say? Tell it to me, all of it. Don’t suppress or soften one word, as God is your judge! I want it all, word for word as he said it to you.”
  '18':
  - type: text
    content: So Samuel told him, word for word. He held back nothing.
  - type: text
    content: 'Eli said, “He is '
  - type: text
    content: God
  - type: text
    content: . Let him do whatever he thinks best.”
  '19':
  - type: text
    content: 'Samuel grew up. '
  - type: text
    content: God
  - type: text
    content: ' was with him, and Samuel’s prophetic record was flawless. Everyone in Israel, from Dan in the north to Beersheba in the south, recognized that Samuel was the real thing—a true prophet of '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: text
    content: God
  - type: text
    content: ' continued to show up at Shiloh, revealed through his word to Samuel at Shiloh.'
  '4':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' called out, “Samuel, Samuel!”'
  - type: text
    content: Samuel answered, “Yes? I’m here.” Then he ran to Eli saying, “I heard you call. Here I am.”
  - type: text
    content: Eli said, “I didn’t call you. Go back to bed.” And so he did.
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' called again, “Samuel, Samuel!”'
  - type: text
    content: Samuel got up and went to Eli, “I heard you call. Here I am.”
  - type: text
    content: 'Again Eli said, “Son, I didn’t call you. Go back to bed.” (This all happened before Samuel knew '
  - type: text
    content: God
  - type: text
    content: ' for himself. It was before the revelation of '
  - type: text
    content: God
  - type: text
    content: ' had been given to him personally.)'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' called again, “Samuel!”—the third time! Yet again Samuel got up and went to Eli, “Yes? I heard you call me. Here I am.”'
  - type: text
    content: 'That’s when it dawned on Eli that '
  - type: text
    content: God
  - type: text
    content: ' was calling the boy. So Eli directed Samuel, “Go back and lie down. If the voice calls again, say, ‘Speak, '
  - type: text
    content: God
  - type: text
    content: . I’m your servant, ready to listen.’” Samuel returned to his bed.
