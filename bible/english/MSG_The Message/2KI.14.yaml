document_id: 2KI.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amaziah of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: In the second year of Jehoash son of Jehoahaz king of Israel, Amaziah son of Joash became king of Judah. He was twenty-five years old when he became king and he reigned for twenty-nine years in Jerusalem. His mother’s name was Jehoaddin. She was from Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'He lived the way '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wanted and did the right thing. But he didn’t come up to the standards of his ancestor David; instead he lived pretty much as his father Joash had; the local sex-and-religion shrines continued to stay in business with people frequenting them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'When he had the affairs of the kingdom well in hand, he executed the palace guard that had assassinated his father the king. But he didn’t kill the sons of the assassins. He was obedient to what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded, written in the Word revealed to Moses, that parents shouldn’t be executed for their children’s sins, nor children for those of their parents. We each pay personally for our sins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amaziah roundly defeated Edom in the Valley of Salt to the tune of ten thousand dead. In another battle he took The Rock and renamed it Joktheel, the name it still bears.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'One day Amaziah sent envoys to Jehoash son of Jehoahaz, the son of Jehu, king of Israel, challenging him to a fight: “Come and meet with me—dare you. Let’s have it out face-to-face!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: Jehoash king of Israel replied to Amaziah king of Judah, “One day a thistle in Lebanon sent word to a cedar in Lebanon, ‘Give your daughter to my son in marriage.’ But then a wild animal of Lebanon passed by and stepped on the thistle, crushing it. Just because you’ve defeated Edom in battle, you now think you’re a big shot. Go ahead and be proud, but stay home. Why press your luck? Why bring defeat on yourself and Judah?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Amaziah wouldn’t take No for an answer. So Jehoash king of Israel gave in and agreed to a battle between him and Amaziah king of Judah. They met at Beth Shemesh, a town of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Judah was thoroughly beaten by Israel—all their soldiers ran home in defeat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Jehoash king of Israel captured Amaziah king of Judah, the son of Joash, the son of Ahaziah, at Beth Shemesh. But Jehoash didn’t stop there; he went on to attack Jerusalem. He demolished the wall of Jerusalem all the way from the Ephraim Gate to the Corner Gate—a stretch of about six hundred feet. He looted the gold, silver, and furnishings—anything he found that was worth taking—from both the palace and The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . And, for good measure, he took hostages. Then he returned to Samaria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'The rest of the life and times of Jehoash, his significant accomplishments and the fight with Amaziah king of Judah, are all written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: . Jehoash died and was buried in Samaria in the cemetery of the kings of Israel. His son Jeroboam became the next king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'Amaziah son of Joash king of Judah continued as king fifteen years after the death of Jehoash son of Jehoahaz king of Israel. The rest of the life and times of Amaziah is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Judah
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: At the last they cooked up a plot against Amaziah in Jerusalem and he had to flee to Lachish. But they tracked him down in Lachish and killed him there. They brought him back on horseback and buried him in Jerusalem, with his ancestors in the City of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: Azariah—he was only sixteen years old at the time—was the unanimous choice of the people of Judah to succeed his father Amaziah as king. Following his father’s death, he rebuilt and restored Elath to Judah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeroboam II of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: 'In the fifteenth year of Amaziah son of Joash king of Judah, Jeroboam son of Jehoash became king of Israel in Samaria. He ruled for forty-one years. As far as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was concerned he lived an evil life, never deviating an inch from all the sin of Jeroboam son of Nebat, who led Israel into a life of sin. But he did restore the borders of Israel to Lebo Hamath in the far north and to the Dead Sea in the south, matching what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, had pronounced through his servant Jonah son of Amittai, the prophet from Gath Hepher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was fully aware of the trouble in Israel, its bitterly hard times. No one was exempt, whether slave or citizen, and no hope of help anywhere was in sight. But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' wasn’t yet ready to blot out the name of Israel from history, so he used Jeroboam son of Jehoash to save them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: 'The rest of the life and times of Jeroboam, his victories in battle and how he recovered for Israel both Damascus and Hamath which had belonged to Judah, these are all written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: . Jeroboam died and was buried with his ancestors in the royal cemetery. His son Zechariah became the next king.
