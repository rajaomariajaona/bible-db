  '1':
  - type: heading
    content: Lady Wisdom Gives a Dinner Party
  - type: text
    content: Lady Wisdom has built and furnished her home;
  - type: text
    content: it’s supported by seven hewn timbers.
  - type: text
    content: 'The banquet meal is ready to be served: lamb roasted,'
  - type: text
    content: wine poured out, table set with silver and flowers.
  - type: text
    content: Having dismissed her serving maids,
  - type: text
    content: Lady Wisdom goes to town, stands in a prominent place,
  - type: text
    content: 'and invites everyone within sound of her voice:'
  - type: text
    content: “Are you confused about life, don’t know what’s going on?
  - type: text
    content: Come with me, oh come, have dinner with me!
  - type: text
    content: I’ve prepared a wonderful spread—fresh-baked bread,
  - type: text
    content: roast lamb, carefully selected wines.
  - type: text
    content: 'Leave your impoverished confusion and '
  - type: text
    content: live
  - type: text
    content: '!'
  - type: text
    content: Walk up the street to a life with meaning.”
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: Then there’s this other woman, Madame Prostitute—
  - type: text
    content: brazen, empty-headed, frivolous.
  - type: text
    content: She sits on the front porch
  - type: text
    content: of her house on Main Street,
  - type: text
    content: And as people walk by minding
  - type: text
    content: their own business, calls out,
  - type: text
    content: “Are you confused about life, don’t know what’s going on?
  - type: text
    content: Steal off with me, I’ll show you a good time!
  - type: text
    content: No one will ever know—I’ll give you the time of your life.”
  - type: text
    content: But they don’t know about all the skeletons in her closet,
  - type: text
    content: that all her guests end up in hell.
  '7':
  - type: text
    content: If you reason with an arrogant cynic, you’ll get slapped in the face;
  - type: text
    content: confront bad behavior and get a kick in the shins.
  - type: text
    content: So don’t waste your time on a scoffer;
  - type: text
    content: all you’ll get for your pains is abuse.
  - type: text
    content: But if you correct those who care about life,
  - type: text
    content: that’s different—they’ll love you for it!
  - type: text
    content: Save your breath for the wise—they’ll be wiser for it;
  - type: text
    content: tell good people what you know—they’ll profit from it.
  - type: text
    content: Skilled living gets its start in the Fear-of-
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: insight into life from knowing a Holy God.
  - type: text
    content: It’s through me, Lady Wisdom, that your life deepens,
  - type: text
    content: and the years of your life ripen.
  - type: text
    content: Live wisely and wisdom will permeate your life;
  - type: text
    content: mock life and life will mock you.
  - type: heading
    content: Madame Prostitute Calls Out, Too
