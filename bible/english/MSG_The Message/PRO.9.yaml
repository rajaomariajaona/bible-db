document_id: PRO.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lady Wisdom Gives a Dinner Party
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lady Wisdom has built and furnished her home;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s supported by seven hewn timbers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The banquet meal is ready to be served: lamb roasted,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wine poured out, table set with silver and flowers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Having dismissed her serving maids,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lady Wisdom goes to town, stands in a prominent place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and invites everyone within sound of her voice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Are you confused about life, don’t know what’s going on?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Come with me, oh come, have dinner with me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve prepared a wonderful spread—fresh-baked bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roast lamb, carefully selected wines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leave your impoverished confusion and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: live
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Walk up the street to a life with meaning.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then there’s this other woman, Madame Prostitute—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brazen, empty-headed, frivolous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She sits on the front porch
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of her house on Main Street,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And as people walk by minding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their own business, calls out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Are you confused about life, don’t know what’s going on?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Steal off with me, I’ll show you a good time!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one will ever know—I’ll give you the time of your life.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they don’t know about all the skeletons in her closet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that all her guests end up in hell.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you reason with an arrogant cynic, you’ll get slapped in the face;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: confront bad behavior and get a kick in the shins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So don’t waste your time on a scoffer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you’ll get for your pains is abuse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you correct those who care about life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s different—they’ll love you for it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save your breath for the wise—they’ll be wiser for it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tell good people what you know—they’ll profit from it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Skilled living gets its start in the Fear-of-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: insight into life from knowing a Holy God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s through me, Lady Wisdom, that your life deepens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the years of your life ripen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Live wisely and wisdom will permeate your life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mock life and life will mock you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Madame Prostitute Calls Out, Too
    marker-yv: yv-h
