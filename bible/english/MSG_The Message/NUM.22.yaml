document_id: NUM.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The People of Israel marched on and camped on the Plains of Moab at Jordan-Jericho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Balak son of Zippor learned of all that Israel had done to the Amorites. The people of Moab were in a total panic because of Israel. There were so many of them! They were terrorized.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5a
  - type: text
    text: ' Moab spoke to the leaders of Midian: “Look, this mob is going to clean us out—a bunch of crows picking a carcass clean.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Balak son of Zippor, who was king of Moab at that time, sent emissaries to get Balaam son of Beor, who lived at Pethor on the banks of the Euphrates River, his homeland.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5b-6
  - type: text
    text: ' Balak’s emissaries said, “Look. A people has come up out of Egypt, and they’re all over the place! And they’re pressing hard on me. Come and curse them for me—they’re too much for me. Maybe then I can beat them; we’ll attack and drive them out of the country. You have a reputation: Those you bless stay blessed; those you curse stay cursed.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: The leaders of Moab and Midian were soon on their way, with the fee for the cursing tucked safely in their wallets. When they got to Balaam, they gave him Balak’s message.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Stay here for the night,” Balaam said. “In the morning I’ll deliver the answer that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gives me.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: The Moabite nobles stayed with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then God came to Balaam. He asked, “So who are these men here with you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'Balaam answered, “Balak son of Zippor, king of Moab, sent them with a message: ‘Look, the people that came up out of Egypt are all over the place! Come and curse them for me. Maybe then I’ll be able to attack and drive them out of the country.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: God said to Balaam, “Don’t go with them. And don’t curse the others—they are a blessed people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The next morning Balaam got up and told Balak’s nobles, “Go back home; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' refuses to give me permission to go with you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So the Moabite nobles left, came back to Balak, and said, “Balaam wouldn’t come with us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: Balak sent another group of nobles, higher ranking and more distinguished. They came to Balaam and said, “Balak son of Zippor says, ‘Please, don’t refuse to come to me. I will honor and reward you lavishly—anything you tell me to do, I’ll do; I’ll pay anything—only come and curse this people.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'Balaam answered Balak’s servants: “Even if Balak gave me his house stuffed with silver and gold, I wouldn’t be able to defy the orders of my '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to do anything, whether big or little. But come along and stay with me tonight as the others did; I’ll see what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will say to me this time.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: God came to Balaam that night and said, “Since these men have come all this way to see you, go ahead and go with them. But make sure you do absolutely nothing other than what I tell you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-23
  - type: text
    text: 'Balaam got up in the morning, saddled his donkey, and went off with the noblemen from Moab. As he was going, though, God’s anger flared. The angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' stood in the road to block his way. Balaam was riding his donkey, accompanied by his two servants. When the donkey saw the angel blocking the road and brandishing a sword, she veered off the road into the ditch. Balaam beat the donkey and got her back on the road.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'But as they were going through a vineyard, with a fence on either side, the donkey again saw '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel blocking the way and veered into the fence, crushing Balaam’s foot against the fence. Balaam hit her again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel blocked the way yet again—a very narrow passage this time; there was no getting through on the right or left. Seeing the angel, Balaam’s donkey sat down under him. Balaam lost his temper; he beat the donkey with his stick.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gave speech to the donkey. She said to Balaam: “What have I ever done to you that you have beat me these three times?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Balaam said, “Because you’ve been playing games with me! If I had a sword I would have killed you by now.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The donkey said to Balaam, “Am I not your trusty donkey on whom you’ve ridden for years right up until now? Have I ever done anything like this to you before? Have I?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “No.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' helped Balaam see what was going on: He saw '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel blocking the way, brandishing a sword. Balaam fell to the ground, his face in the dirt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s angel said to him: “Why have you beaten your poor donkey these three times? I have come here to block your way because you’re getting way ahead of yourself. The donkey saw me and turned away from me these three times. If she hadn’t, I would have killed you by this time, but not the donkey. I would have let her off.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Balaam said to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel, “I have sinned. I had no idea you were standing in the road blocking my way. If you don’t like what I’m doing, I’ll head back.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel said to Balaam, “Go ahead and go with them. But only say what I tell you to say—absolutely no other word.”
- type: usfm
  marker: p
  children:
  - type: text
    text: And so Balaam continued to go with Balak’s nobles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When Balak heard that Balaam was coming, he went out to meet him in the Moabite town that was on the banks of the Arnon, right on the boundary of his land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Balak said to Balaam, “Didn’t I send an urgent message for help? Why didn’t you come when I called? Do you think I can’t pay you enough?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Balaam said to Balak, “Well, I’m here now. But I can’t tell you just anything. I can speak only words that God gives me—no others.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: Balaam then accompanied Balak to Kiriath Huzoth (Street-Town). Balak slaughtered cattle and sheep for sacrifices and presented them to Balaam and the nobles who were with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: At daybreak Balak took Balaam up to Bamoth Baal (The Heights of Baal) so that he could get a good view of some of the people.
