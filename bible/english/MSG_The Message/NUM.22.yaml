document_id: NUM.22,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Balaam
  - type: text
    content: The People of Israel marched on and camped on the Plains of Moab at Jordan-Jericho.
  '10':
  - type: text
    content: 'Balaam answered, “Balak son of Zippor, king of Moab, sent them with a message: ‘Look, the people that came up out of Egypt are all over the place! Come and curse them for me. Maybe then I’ll be able to attack and drive them out of the country.’”'
  '12':
  - type: text
    content: God said to Balaam, “Don’t go with them. And don’t curse the others—they are a blessed people.”
  '13':
  - type: text
    content: 'The next morning Balaam got up and told Balak’s nobles, “Go back home; '
  - type: text
    content: God
  - type: text
    content: ' refuses to give me permission to go with you.”'
  '14':
  - type: text
    content: So the Moabite nobles left, came back to Balak, and said, “Balaam wouldn’t come with us.”
  '15':
  - type: text
    content: Balak sent another group of nobles, higher ranking and more distinguished. They came to Balaam and said, “Balak son of Zippor says, ‘Please, don’t refuse to come to me. I will honor and reward you lavishly—anything you tell me to do, I’ll do; I’ll pay anything—only come and curse this people.’”
  '18':
  - type: text
    content: 'Balaam answered Balak’s servants: “Even if Balak gave me his house stuffed with silver and gold, I wouldn’t be able to defy the orders of my '
  - type: text
    content: God
  - type: text
    content: ' to do anything, whether big or little. But come along and stay with me tonight as the others did; I’ll see what '
  - type: text
    content: God
  - type: text
    content: ' will say to me this time.”'
  '2':
  - type: text
    content: Balak son of Zippor learned of all that Israel had done to the Amorites. The people of Moab were in a total panic because of Israel. There were so many of them! They were terrorized.
  '20':
  - type: text
    content: God came to Balaam that night and said, “Since these men have come all this way to see you, go ahead and go with them. But make sure you do absolutely nothing other than what I tell you.”
  '21':
  - type: text
    content: 'Balaam got up in the morning, saddled his donkey, and went off with the noblemen from Moab. As he was going, though, God’s anger flared. The angel of '
  - type: text
    content: God
  - type: text
    content: ' stood in the road to block his way. Balaam was riding his donkey, accompanied by his two servants. When the donkey saw the angel blocking the road and brandishing a sword, she veered off the road into the ditch. Balaam beat the donkey and got her back on the road.'
  '24':
  - type: text
    content: 'But as they were going through a vineyard, with a fence on either side, the donkey again saw '
  - type: text
    content: God
  - type: text
    content: ’s angel blocking the way and veered into the fence, crushing Balaam’s foot against the fence. Balaam hit her again.
  '26':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s angel blocked the way yet again—a very narrow passage this time; there was no getting through on the right or left. Seeing the angel, Balaam’s donkey sat down under him. Balaam lost his temper; he beat the donkey with his stick.
  '28':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' gave speech to the donkey. She said to Balaam: “What have I ever done to you that you have beat me these three times?”'
  '29':
  - type: text
    content: Balaam said, “Because you’ve been playing games with me! If I had a sword I would have killed you by now.”
  '30':
  - type: text
    content: The donkey said to Balaam, “Am I not your trusty donkey on whom you’ve ridden for years right up until now? Have I ever done anything like this to you before? Have I?”
  - type: text
    content: He said, “No.”
  '31':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' helped Balaam see what was going on: He saw '
  - type: text
    content: God
  - type: text
    content: ’s angel blocking the way, brandishing a sword. Balaam fell to the ground, his face in the dirt.
  '32':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s angel said to him: “Why have you beaten your poor donkey these three times? I have come here to block your way because you’re getting way ahead of yourself. The donkey saw me and turned away from me these three times. If she hadn’t, I would have killed you by this time, but not the donkey. I would have let her off.”'
  '34':
  - type: text
    content: 'Balaam said to '
  - type: text
    content: God
  - type: text
    content: ’s angel, “I have sinned. I had no idea you were standing in the road blocking my way. If you don’t like what I’m doing, I’ll head back.”
  '35':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ’s angel said to Balaam, “Go ahead and go with them. But only say what I tell you to say—absolutely no other word.”
  - type: text
    content: And so Balaam continued to go with Balak’s nobles.
  '36':
  - type: text
    content: When Balak heard that Balaam was coming, he went out to meet him in the Moabite town that was on the banks of the Arnon, right on the boundary of his land.
  '37':
  - type: text
    content: Balak said to Balaam, “Didn’t I send an urgent message for help? Why didn’t you come when I called? Do you think I can’t pay you enough?”
  '38':
  - type: text
    content: Balaam said to Balak, “Well, I’m here now. But I can’t tell you just anything. I can speak only words that God gives me—no others.”
  '39':
  - type: text
    content: Balaam then accompanied Balak to Kiriath Huzoth (Street-Town). Balak slaughtered cattle and sheep for sacrifices and presented them to Balaam and the nobles who were with him.
  '4':
  - type: text
    content: ' Moab spoke to the leaders of Midian: “Look, this mob is going to clean us out—a bunch of crows picking a carcass clean.”'
  - type: text
    content: Balak son of Zippor, who was king of Moab at that time, sent emissaries to get Balaam son of Beor, who lived at Pethor on the banks of the Euphrates River, his homeland.
  '41':
  - type: text
    content: At daybreak Balak took Balaam up to Bamoth Baal (The Heights of Baal) so that he could get a good view of some of the people.
  '5':
  - type: text
    content: ' Balak’s emissaries said, “Look. A people has come up out of Egypt, and they’re all over the place! And they’re pressing hard on me. Come and curse them for me—they’re too much for me. Maybe then I can beat them; we’ll attack and drive them out of the country. You have a reputation: Those you bless stay blessed; those you curse stay cursed.”'
  '7':
  - type: text
    content: The leaders of Moab and Midian were soon on their way, with the fee for the cursing tucked safely in their wallets. When they got to Balaam, they gave him Balak’s message.
  - type: text
    content: '“Stay here for the night,” Balaam said. “In the morning I’ll deliver the answer that '
  - type: text
    content: God
  - type: text
    content: ' gives me.”'
  - type: text
    content: The Moabite nobles stayed with him.
  '9':
  - type: text
    content: Then God came to Balaam. He asked, “So who are these men here with you?”
