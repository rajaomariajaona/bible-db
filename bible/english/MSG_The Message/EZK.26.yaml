document_id: EZK.26,97
type_code: eng
verses:
  '1':
  - type: heading
    content: As the Waves of the Sea, Surging Against the Shore
  - type: text
    content: 'In the eleventh year, on the first day of the month, '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, Tyre cheered when they got the news of Jerusalem, exclaiming,'
  - type: text
    content: “‘Good! The gateway city is smashed!
  - type: text
    content: Now all her business comes my way.
  - type: text
    content: She’s in ruins
  - type: text
    content: and I’m in clover.’
  '15':
  - type: text
    content: '“This is the Message of '
  - type: text
    content: God
  - type: text
    content: ', the Master, to Tyre: Won’t the ocean islands shake at the crash of your collapse, at the groans of your wounded, at your mayhem and massacre?'
  '16':
  - type: text
    content: '“All up and down the coast, the princes will come down from their thrones, take off their royal robes and fancy clothes, and wrap themselves in sheer terror. They’ll sit on the ground, shaken to the core, horrified at you. Then they’ll begin chanting a funeral song over you:'
  - type: text
    content: “‘Sunk! Sunk to the bottom of the sea,
  - type: text
    content: famous city on the sea!
  - type: text
    content: Power of the seas,
  - type: text
    content: you and your people,
  - type: text
    content: Intimidating everyone
  - type: text
    content: who lived in your shadows.
  - type: text
    content: But now the islands are shaking
  - type: text
    content: at the sound of your crash,
  - type: text
    content: Ocean islands in tremors
  - type: text
    content: from the impact of your fall.’
  '19':
  - type: text
    content: '“The Message of '
  - type: text
    content: God
  - type: text
    content: ', the Master: ‘When I turn you into a wasted city, a city empty of people, a ghost town, and when I bring up the great ocean deeps and cover you, then I’ll push you down among those who go to the grave, the long, long dead. I’ll make you live there, in the grave in old ruins, with the buried dead. You’ll never see the land of the living again. I’ll introduce you to the terrors of death and that’ll be the end of you. They’ll send out search parties for you, but you’ll never be found. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.’”'
  '3':
  - type: text
    content: '“Therefore, '
  - type: text
    content: God
  - type: text
    content: ', the Master, has this to say:'
  - type: text
    content: “‘I’m against you, Tyre,
  - type: text
    content: and I’ll bring many nations surging against you,
  - type: text
    content: as the waves of the sea surging against the shore.
  - type: text
    content: They’ll smash the city walls of Tyre
  - type: text
    content: and break down her towers.
  - type: text
    content: I’ll wash away the soil
  - type: text
    content: and leave nothing but bare rock.
  - type: text
    content: She’ll be an island of bare rock in the ocean,
  - type: text
    content: good for nothing but drying fishnets.
  - type: text
    content: 'Yes, I’ve said so.’ Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  - type: text
    content: ‘She’ll be loot, free pickings for the nations!
  - type: text
    content: Her surrounding villages will be butchered.
  - type: text
    content: 'Then they’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: .’
  '7':
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ', the Master, says: Look! Out of the north I’m bringing Nebuchadnezzar king of Babylon, a king’s king, down on Tyre. He’ll come with chariots and horses and riders—a huge army. He’ll massacre your surrounding villages and lay siege to you. He’ll build siege ramps against your walls. A forest of shields will advance against you! He’ll pummel your walls with his battering rams and shatter your towers with his iron weapons. You’ll be covered with dust from his horde of horses—a thundering herd of war horses pouring through the breaches, pulling chariots. Oh, it will be an earthquake of an army and a city in shock! Horses will stampede through the streets. Your people will be slaughtered and your huge pillars strewn like matchsticks. The invaders will steal and loot—all that wealth, all that stuff! They’ll knock down your fine houses and dump the stone and timber rubble into the sea. And your parties, your famous good-time parties, will be no more. No more songs, no more lutes. I’ll reduce you to an island of bare rock, good for nothing but drying fishnets. You’ll never be rebuilt. I, '
  - type: text
    content: God
  - type: text
    content: ', have said so. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  - type: heading
    content: Introduced to the Terrors of Death
