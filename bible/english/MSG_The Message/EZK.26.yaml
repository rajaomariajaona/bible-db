document_id: EZK.26,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: As the Waves of the Sea, Surging Against the Shore
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In the eleventh year, on the first day of the month, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Son of man, Tyre cheered when they got the news of Jerusalem, exclaiming,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Good! The gateway city is smashed!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now all her business comes my way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’s in ruins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I’m in clover.’
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“This is the Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, to Tyre: Won’t the ocean islands shake at the crash of your collapse, at the groans of your wounded, at your mayhem and massacre?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All up and down the coast, the princes will come down from their thrones, take off their royal robes and fancy clothes, and wrap themselves in sheer terror. They’ll sit on the ground, shaken to the core, horrified at you. Then they’ll begin chanting a funeral song over you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Sunk! Sunk to the bottom of the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: famous city on the sea!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Power of the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you and your people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Intimidating everyone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lived in your shadows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now the islands are shaking
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the sound of your crash,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ocean islands in tremors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the impact of your fall.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master: ‘When I turn you into a wasted city, a city empty of people, a ghost town, and when I bring up the great ocean deeps and cover you, then I’ll push you down among those who go to the grave, the long, long dead. I’ll make you live there, in the grave in old ruins, with the buried dead. You’ll never see the land of the living again. I’ll introduce you to the terrors of death and that’ll be the end of you. They’ll send out search parties for you, but you’ll never be found. Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.’”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, has this to say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘I’m against you, Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I’ll bring many nations surging against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the waves of the sea surging against the shore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll smash the city walls of Tyre
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and break down her towers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll wash away the soil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leave nothing but bare rock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’ll be an island of bare rock in the ocean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good for nothing but drying fishnets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, I’ve said so.’ Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘She’ll be loot, free pickings for the nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her surrounding villages will be butchered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Then they’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .’
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says: Look! Out of the north I’m bringing Nebuchadnezzar king of Babylon, a king’s king, down on Tyre. He’ll come with chariots and horses and riders—a huge army. He’ll massacre your surrounding villages and lay siege to you. He’ll build siege ramps against your walls. A forest of shields will advance against you! He’ll pummel your walls with his battering rams and shatter your towers with his iron weapons. You’ll be covered with dust from his horde of horses—a thundering herd of war horses pouring through the breaches, pulling chariots. Oh, it will be an earthquake of an army and a city in shock! Horses will stampede through the streets. Your people will be slaughtered and your huge pillars strewn like matchsticks. The invaders will steal and loot—all that wealth, all that stuff! They’ll knock down your fine houses and dump the stone and timber rubble into the sea. And your parties, your famous good-time parties, will be no more. No more songs, no more lutes. I’ll reduce you to an island of bare rock, good for nothing but drying fishnets. You’ll never be rebuilt. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', have said so. Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduced to the Terrors of Death
    marker-yv: yv-h
