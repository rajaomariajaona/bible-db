document_id: EXO.38,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Altar of Whole-Burnt-Offering
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-7
    - type: text
      text: 'He made the Altar of Whole-Burnt-Offering from acacia wood. He made it seven and a half feet square and four and a half feet high. He made horns at each of the four corners. The horns were made of one piece with the Altar and covered with a veneer of bronze. He made from bronze all the utensils for the Altar: the buckets for removing the ashes, shovels, basins, forks, and fire pans. He made a grate of bronze mesh under the ledge halfway up the Altar. He cast four rings at each of the four corners of the bronze grating to hold the poles. He made the poles of acacia wood and covered them with a veneer of bronze. He inserted the poles through the rings on the two sides of the Altar for carrying it. The Altar was made out of boards; it was hollow.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Washbasin
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-20
    - type: text
      text: The west end of the Courtyard had seventy-five feet of hangings with ten posts and bases, and fastening hooks and bands of silver. Across the seventy-five feet at the front, or east end, were twenty-two and a half feet of hangings, with their three posts and bases on one side and the same for the other side. All the hangings around the Courtyard were of fine twisted linen. The bases for the posts were bronze and the fastening hooks and bands on the posts were of silver. The posts of the Courtyard were both capped and banded with silver. The screen at the door of the Courtyard was embroidered in blue, purple, and scarlet fabric with fine twisted linen. It was thirty feet long and seven and a half feet high, matching the hangings of the Courtyard. There were four posts with bases of bronze and fastening hooks of silver; they were capped and banded in silver. All the pegs for The Dwelling and the Courtyard were made of bronze.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: 'This is an inventory of The Dwelling that housed The Testimony drawn up by order of Moses for the work of the Levites under Ithamar, son of Aaron the priest. Bezalel, the son of Uri, son of Hur, of the tribe of Judah, made everything that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had commanded Moses. Working with Bezalel was Oholiab, the son of Ahisamach, of the tribe of Dan, an artisan, designer, and embroiderer in blue, purple, and scarlet fabrics and fine linen.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Gold. The total amount of gold used in construction of the Sanctuary, all of it contributed freely, weighed out at 1,900 pounds according to the Sanctuary standard.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-28
    - type: text
      text: 'Silver. The silver from those in the community who were registered in the census came to 6,437 pounds according to the Sanctuary standard—that amounted to a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: beka
    - type: text
      text: ', or half-shekel, for every registered person aged twenty and over, a total of 603,550 men. They used the three and one-quarter tons of silver to cast the bases for the Sanctuary and for the hangings, one hundred bases at sixty-four pounds each. They used the remaining thirty-seven pounds to make the connecting hooks on the posts, and the caps and bands for the posts.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 29-31
    - type: text
      text: Bronze. The bronze that was brought in weighed 4,522 pounds. It was used to make the door of the Tent of Meeting, the Bronze Altar with its bronze grating, all the utensils of the Altar, the bases around the Courtyard, the bases for the gate of the Courtyard, and all the pegs for The Dwelling and the Courtyard.
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He made the Bronze Washbasin and its bronze stand from the mirrors of the women’s work group who were assigned to serve at the entrance to the Tent of Meeting.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Courtyard
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: And he made the Courtyard. On the south side the hangings for the Courtyard, woven from fine twisted linen, were 150 feet long, with their twenty posts and twenty bronze bases, and fastening hooks and bands of silver. The north side was exactly the same.
