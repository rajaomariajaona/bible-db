type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Grief for Absalom
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: Joab was told that David was weeping and lamenting over Absalom. The day’s victory turned into a day of mourning as word passed through the army, “David is grieving over his son.” The army straggled back to the city that day demoralized, dragging their tails. And the king held his face in his hands and lamented loudly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O my son Absalom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Absalom my dear, dear son!
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When David heard what was being said, he sent word to Zadok and Abiathar, the priests, “Ask the elders of Judah, ‘Why are you so laggard in bringing the king back home? You’re my brothers! You’re my own flesh and blood! So why are you the last ones to bring the king back home?’ And tell Amasa, ‘You, too, are my flesh and blood. As God is my witness, I’m making you the permanent commander of the army in place of Joab.’”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He captured the hearts of everyone in Judah. They were unanimous in sending for the king: “Come back, you and all your servants.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' So the king returned. He arrived at the Jordan just as Judah reached Gilgal on their way to welcome the king and escort him across the Jordan. Even Shimei son of Gera, the Benjaminite from Bahurim, hurried down to join the men of Judah so he could welcome the king, a thousand Benjaminites with him. And Ziba, Saul’s steward, with his fifteen sons and twenty servants, waded across the Jordan to meet the king and brought his entourage across, doing whatever they could to make the king comfortable.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Shimei son of Gera bowed deeply in homage to the king as soon as he was across the Jordan and said, “Don’t think badly of me, my master! Overlook my irresponsible outburst on the day my master the king left Jerusalem—don’t hold it against me! I know I sinned, but look at me now—the first of all the tribe of Joseph to come down and welcome back my master the king!”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishai son of Zeruiah interrupted, “Enough of this! Shouldn’t we kill him outright? Why, he cursed '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s anointed!”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But David said, “What is it with you sons of Zeruiah? Why do you insist on being so contentious? Nobody is going to be killed today. I am again king over Israel!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the king turned to Shimei, “You’re not going to die.” And the king gave him his word.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next Mephibosheth grandson of Saul arrived from Jerusalem to welcome the king. He hadn’t combed his hair or trimmed his beard or washed his clothes from the day the king left until the day he returned safe and sound. The king said, “And why didn’t you come with me, Mephibosheth?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“My master the king,” he said, “my servant betrayed me. I told him to saddle my donkey so I could ride it and go with the king, for, as you know, I am lame. And then he lied to you about me. But my master the king has been like one of God’s angels: he knew what was right and did it. Wasn’t everyone in my father’s house doomed? But you took me in and gave me a place at your table. What more could I ever expect or ask?”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“That’s enough,” said the king. “Say no more. Here’s my decision: You and Ziba divide the property between you.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mephibosheth said, “Oh, let him have it all! All I care about is that my master the king is home safe and sound!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Barzillai the Gileadite had come down from Rogelim. He crossed the Jordan with the king to give him a good send-off. Barzillai was a very old man—eighty years old! He had supplied the king’s needs all the while he was in Mahanaim since he was very wealthy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Join me in Jerusalem,” the king said to Barzillai. “Let me take care of you.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Barzillai declined the offer, “How long do you think I’d live if I went with the king to Jerusalem? I’m eighty years old and not much good anymore to anyone. Can’t taste food; can’t hear music. So why add to the burdens of my master the king? I’ll just go a little way across the Jordan with the king. But why would the king need to make a great thing of that? Let me go back and die in my hometown and be buried with my father and mother. But my servant Kimham here; let him go with you in my place. But treat him well!”
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king said, “That’s settled; Kimham goes with me. And I will treat him well! If you think of anything else, I’ll do that for you, too.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The army crossed the Jordan but the king stayed. The king kissed and blessed Barzillai, who then returned home. Then the king, Kimham with him, crossed over at Gilgal.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' The whole army of Judah and half the army of Israel processed with the king. The men of Israel came to the king and said, “Why have our brothers, the men of Judah, taken over as if they owned the king, escorting the king and his family and close associates across the Jordan?”'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of Judah retorted, “Because the king is related to us, that’s why! But why make a scene? You don’t see us getting treated special because of it, do you?”
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of Israel shot back, “We have ten shares in the king to your one. Besides we’re the firstborn—so why are we having to play second fiddle? It was our idea to bring him back.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the men of Judah took a harder line than the men of Israel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But in private Joab rebuked the king: “Now you’ve done it—knocked the wind out of your loyal servants who have just saved your life, to say nothing of the lives of your sons and daughters, wives and concubines. What is this—loving those who hate you and hating those who love you? Your actions give a clear message: officers and soldiers mean nothing to you. You know that if Absalom were alive right now, we’d all be dead—would that make you happy? Get hold of yourself; get out there and put some heart into your servants! I swear to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' that if you don’t go to them they’ll desert; not a soldier will be left here by nightfall. And that will be the worst thing that has happened yet.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king came out and took his place at the city gate. Soon everyone knew: “Oh, look! The king has come out to receive us.” And his whole army came and presented itself to the king. But the Israelites had fled the field of battle and gone home.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, the whole populace was now complaining to its leaders, “Wasn’t it the king who saved us time and again from our enemies, and rescued us from the Philistines? And now he has had to flee the country on account of Absalom. And now this Absalom whom we made king is dead in battle. So what are you waiting for? Why don’t you bring the king back?”
