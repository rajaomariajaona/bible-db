    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', get me out of here, away from this evil;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: protect me from these vicious people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All they do is think up new ways to be bad;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they spend their days plotting war games.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They practice the sharp rhetoric of hate and hurt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: speak venomous words that maim and kill.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', keep me out of the clutch of these wicked ones,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: protect me from these vicious people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: All boast and swagger, they plot ways to trip me up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: determined to bring me down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These crooks invent traps to catch me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do their best to incriminate me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: I prayed, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you’re my God!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Listen, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '! Mercy!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my Lord, Strong Savior,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: protect me when the fighting breaks out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Don’t let the wicked have their way, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t give them an inch!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: These troublemakers all around me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them drown in their own verbal poison.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let God pile hellfire on them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let him bury them alive in crevasses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: These loudmouths—
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t let them be taken seriously;
- type: usfm
  marker: q1
  children:
  - type: text
    text: These savages—
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the Devil hunt them down!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'I know that you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', are on the side of victims,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you care for the rights of the poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I know that the righteous personally thank you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that good people are secure in your presence.
