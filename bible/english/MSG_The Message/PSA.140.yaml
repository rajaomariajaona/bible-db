document_id: PSA.140,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', get me out of here, away from this evil;'
  - type: text
    content: protect me from these vicious people.
  - type: text
    content: All they do is think up new ways to be bad;
  - type: text
    content: they spend their days plotting war games.
  - type: text
    content: They practice the sharp rhetoric of hate and hurt,
  - type: text
    content: speak venomous words that maim and kill.
  - type: text
    content: God
  - type: text
    content: ', keep me out of the clutch of these wicked ones,'
  - type: text
    content: protect me from these vicious people;
  - type: text
    content: All boast and swagger, they plot ways to trip me up,
  - type: text
    content: determined to bring me down.
  - type: text
    content: These crooks invent traps to catch me
  - type: text
    content: and do their best to incriminate me.
  '12':
  - type: text
    content: 'I know that you, '
  - type: text
    content: God
  - type: text
    content: ', are on the side of victims,'
  - type: text
    content: that you care for the rights of the poor.
  - type: text
    content: And I know that the righteous personally thank you,
  - type: text
    content: that good people are secure in your presence.
  '6':
  - type: text
    content: I prayed, “
  - type: text
    content: God
  - type: text
    content: ', you’re my God!'
  - type: text
    content: 'Listen, '
  - type: text
    content: God
  - type: text
    content: '! Mercy!'
  - type: text
    content: God
  - type: text
    content: ', my Lord, Strong Savior,'
  - type: text
    content: protect me when the fighting breaks out!
  - type: text
    content: 'Don’t let the wicked have their way, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: don’t give them an inch!”
  '9':
  - type: text
    content: These troublemakers all around me—
  - type: text
    content: let them drown in their own verbal poison.
  - type: text
    content: Let God pile hellfire on them,
  - type: text
    content: let him bury them alive in crevasses!
  - type: text
    content: These loudmouths—
  - type: text
    content: don’t let them be taken seriously;
  - type: text
    content: These savages—
  - type: text
    content: let the Devil hunt them down!
