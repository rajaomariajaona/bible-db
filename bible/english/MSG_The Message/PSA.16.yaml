document_id: PSA.16,97
type_code: eng
verses:
  '1':
  - type: text
    content: Keep me safe, O God,
  - type: text
    content: I’ve run for dear life to you.
  - type: text
    content: 'I say to '
  - type: text
    content: God
  - type: text
    content: ', “Be my Lord!”'
  - type: text
    content: Without you, nothing makes sense.
  '11':
  - type: text
    content: Now you’ve got my feet on the life path,
  - type: text
    content: all radiant from the shining of your face.
  - type: text
    content: Ever since you took my hand,
  - type: text
    content: I’m on the right way.
  '3':
  - type: text
    content: And these God-chosen lives all around—
  - type: text
    content: what splendid friends they make!
  '4':
  - type: text
    content: Don’t just go shopping for a god.
  - type: text
    content: Gods are not for sale.
  - type: text
    content: I swear I’ll never treat god-names
  - type: text
    content: like brand-names.
  '5':
  - type: text
    content: 'My choice is you, '
  - type: text
    content: God
  - type: text
    content: ', first and only.'
  - type: text
    content: 'And now I find I’m '
  - type: text
    content: your
  - type: text
    content: ' choice!'
  - type: text
    content: You set me up with a house and yard.
  - type: text
    content: And then you made me your heir!
  '7':
  - type: text
    content: 'The wise counsel '
  - type: text
    content: God
  - type: text
    content: ' gives when I’m awake'
  - type: text
    content: is confirmed by my sleeping heart.
  - type: text
    content: 'Day and night I’ll stick with '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: I’ve got a good thing going and I’m not letting go.
  '9':
  - type: text
    content: I’m happy from the inside out,
  - type: text
    content: and from the outside in, I’m firmly formed.
  - type: text
    content: You canceled my ticket to hell—
  - type: text
    content: that’s not my destination!
