document_id: PSA.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Keep me safe, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve run for dear life to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I say to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', “Be my Lord!”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Without you, nothing makes sense.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Now you’ve got my feet on the life path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all radiant from the shining of your face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ever since you took my hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m on the right way.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And these God-chosen lives all around—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what splendid friends they make!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Don’t just go shopping for a god.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gods are not for sale.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I swear I’ll never treat god-names
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like brand-names.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: 'My choice is you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', first and only.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And now I find I’m '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' choice!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set me up with a house and yard.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And then you made me your heir!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'The wise counsel '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gives when I’m awake'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is confirmed by my sleeping heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Day and night I’ll stick with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve got a good thing going and I’m not letting go.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: I’m happy from the inside out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the outside in, I’m firmly formed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You canceled my ticket to hell—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that’s not my destination!
