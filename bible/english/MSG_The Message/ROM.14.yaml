document_id: ROM.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cultivating Good Relationships
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Welcome with open arms fellow believers who don’t see things the way you do. And don’t jump all over them every time they do or say something you don’t agree with—even when it seems that they are strong on opinions but weak in the faith department. Remember, they have their own history to deal with. Treat them gently.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: For instance, a person who has been around for a while might well be convinced that he can eat anything on the table, while another, with a different background, might assume he should only be a vegetarian and eat accordingly. But since both are guests at Christ’s table, wouldn’t it be terribly rude if they fell to criticizing what the other ate or didn’t eat? God, after all, invited them both to the table. Do you have any business crossing people off the guest list or interfering with God’s welcome? If there are corrections to be made or manners to be learned, God can handle that without your help.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Or, say, one person thinks that some days should be set aside as holy and another thinks that each day is pretty much like any other. There are good reasons either way. So, each person is free to follow the convictions of conscience.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: 'What’s important in all this is that if you keep a holy day, keep it for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' sake; if you eat meat, eat it to the glory of God and thank God for prime rib; if you’re a vegetarian, eat vegetables to the glory of God and thank God for broccoli. None of us are permitted to insist on our own way in these matters. It’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' we are answerable to—all the way from life to death and everything in between—not each other. That’s why Jesus lived and died and then lived again: so that he could be our Master across the entire range of life and death, and free us from the petty tyrannies of each other.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: 'So where does that leave you when you criticize a brother? And where does that leave you when you condescend to a sister? I’d say it leaves you looking pretty silly—or worse. Eventually, we’re all going to end up kneeling side by side in the place of judgment, facing God. Your critical and condescending ways aren’t going to improve your position there one bit. Read it for yourself in Scripture:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “As I live and breathe,” God says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “every knee will bow before me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every tongue will tell the honest truth
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I and only I am God.”
- type: usfm
  marker: m
  children:
  - type: text
    text: So mind your own business. You’ve got your hands full just taking care of your own life before God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Forget about deciding what’s right for each other. Here’s what you need to be concerned about: that you don’t get in the way of someone else, making life more difficult than it already is. I’m convinced—Jesus convinced me!—that everything as it is in itself is holy. We, of course, by the way we treat it or talk about it, can contaminate it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: If you confuse others by making a big issue over what they eat or don’t eat, you’re no longer a companion with them in love, are you? These, remember, are persons for whom Christ died. Would you risk sending them to hell over an item in their diet? Don’t you dare let a piece of God-blessed food become an occasion of soul-poisoning!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'God’s kingdom isn’t a matter of what you put in your stomach, for goodness’ sake. It’s what God does with your life as he sets it right, puts it together, and completes it with joy. Your task is to single-mindedly serve Christ. Do that and you’ll kill two birds with one stone: pleasing the God above you and proving your worth to the people around you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'So let’s agree to use all our energy in getting along with each other. Help others with encouraging words; don’t drag them down by finding fault. You’re certainly not going to permit an argument over what is served or not served at supper to wreck God’s work among you, are you? I said it before and I’ll say it again: All food is good, but it can turn bad if you use it badly, if you use it to trip others up and send them sprawling. When you sit down to a meal, your primary concern should not be to feed your own face but to share the life of Jesus. So be sensitive and courteous to the others who are eating. Don’t eat or say or do things that might interfere with the free exchange of love.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: Cultivate your own relationship with God, but don’t impose it on others. You’re fortunate if your behavior and your belief are coherent. But if you’re not sure, if you notice that you are acting in ways inconsistent with what you believe—some days trying to impose your opinions on others, other days just trying to please them—then you know that you’re out of line. If the way you live isn’t consistent with what you believe, then it’s wrong.
