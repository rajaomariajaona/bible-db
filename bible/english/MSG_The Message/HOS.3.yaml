document_id: HOS.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: In Time They’ll Come Back
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' ordered me, “Start all over: Love your wife again,'
  - type: text
    content: your wife who’s in bed with her latest boyfriend, your cheating wife.
  - type: text
    content: 'Love her the way I, '
  - type: text
    content: God
  - type: text
    content: ', love the Israelite people,'
  - type: text
    content: even as they flirt and party with every god that takes their fancy.”
  '2':
  - type: text
    content: I did it. I paid good money to get her back.
  - type: text
    content: It cost me the price of a slave.
  - type: text
    content: Then I told her, “From now on you’re living with me.
  - type: text
    content: No more whoring, no more sleeping around.
  - type: text
    content: You’re living with me and I’m living with you.”
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: The people of Israel are going to live a long time
  - type: text
    content: stripped of security and protection,
  - type: text
    content: without religion and comfort,
  - type: text
    content: godless and prayerless.
  - type: text
    content: But in time they’ll come back, these Israelites,
  - type: text
    content: 'come back looking for their '
  - type: text
    content: God
  - type: text
    content: ' and their David-King.'
  - type: text
    content: They’ll come back chastened to reverence
  - type: text
    content: 'before '
  - type: text
    content: God
  - type: text
    content: ' and his good gifts, ready for the End of the story of his love.'
