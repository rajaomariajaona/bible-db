document_id: PSA.137,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Alongside Babylon’s rivers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we sat on the banks; we cried and cried,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: remembering the good old days in Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alongside the quaking aspens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we stacked our unplayed harps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s where our captors demanded songs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'sarcastic and mocking:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Sing us a happy Zion song!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: 'Oh, how could we ever sing '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s song
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in this wasteland?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I ever forget you, Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let my fingers wither and fall off like leaves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my tongue swell and turn black
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if I fail to remember you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I fail, O dear Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to honor you as my greatest.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', remember those Edomites,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and remember the ruin of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That day they yelled out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Wreck it, smash it to bits!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you, Babylonians—ravagers!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A reward to whoever gets back at you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all you’ve done to us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, a reward to the one who grabs your babies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and smashes their heads on the rocks!
