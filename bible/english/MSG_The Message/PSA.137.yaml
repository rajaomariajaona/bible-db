document_id: PSA.137,97
type_code: eng
verses:
  '1':
  - type: text
    content: Alongside Babylon’s rivers
  - type: text
    content: we sat on the banks; we cried and cried,
  - type: text
    content: remembering the good old days in Zion.
  - type: text
    content: Alongside the quaking aspens
  - type: text
    content: we stacked our unplayed harps;
  - type: text
    content: That’s where our captors demanded songs,
  - type: text
    content: 'sarcastic and mocking:'
  - type: text
    content: “Sing us a happy Zion song!”
  '4':
  - type: text
    content: 'Oh, how could we ever sing '
  - type: text
    content: God
  - type: text
    content: ’s song
  - type: text
    content: in this wasteland?
  - type: text
    content: If I ever forget you, Jerusalem,
  - type: text
    content: let my fingers wither and fall off like leaves.
  - type: text
    content: Let my tongue swell and turn black
  - type: text
    content: if I fail to remember you,
  - type: text
    content: If I fail, O dear Jerusalem,
  - type: text
    content: to honor you as my greatest.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', remember those Edomites,'
  - type: text
    content: and remember the ruin of Jerusalem,
  - type: text
    content: That day they yelled out,
  - type: text
    content: “Wreck it, smash it to bits!”
  - type: text
    content: And you, Babylonians—ravagers!
  - type: text
    content: A reward to whoever gets back at you
  - type: text
    content: for all you’ve done to us;
  - type: text
    content: Yes, a reward to the one who grabs your babies
  - type: text
    content: and smashes their heads on the rocks!
