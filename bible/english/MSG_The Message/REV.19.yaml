document_id: REV.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sound of Hallelujahs
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: I heard a sound like massed choirs in Heaven singing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The salvation and glory and power are God’s—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his judgments true, his judgments just.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He judged the great Whore
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who corrupted the earth with her lust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He avenged on her the blood of his servants.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then, more singing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The smoke from her burning billows up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to high Heaven forever and ever and ever.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I fell at his feet to worship him, but he wouldn’t let me. “Don’t do that,” he said. “I’m a servant just like you, and like your brothers and sisters who hold to the witness of Jesus. The witness of Jesus is the spirit of prophecy.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A White Horse and Its Rider
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-16
    - type: text
      text: 'Then I saw Heaven open wide—and oh! a white horse and its Rider. The Rider, named Faithful and True, judges and makes war in pure righteousness. His eyes are a blaze of fire, on his head many crowns. He has a Name inscribed that’s known only to himself. He is dressed in a robe soaked with blood, and he is addressed as “Word of God.” The armies of Heaven, mounted on white horses and dressed in dazzling white linen, follow him. A sharp sword comes out of his mouth so he can subdue the nations, then rule them with a rod of iron. He treads the winepress of the raging wrath of God, the Sovereign-Strong. On his robe and thigh is written, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: King of kings, Lord of lords.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: I saw an Angel standing in the sun, shouting to all flying birds in Middle-Heaven, “Come to the Great Supper of God! Feast on the flesh of kings and captains and champions, horses and their riders. Eat your fill of them all—free and slave, small and great!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-21
    - type: text
      text: I saw the Beast and, assembled with him, earth’s kings and their armies, ready to make war against the One on the horse and his army. The Beast was taken, and with him, his puppet, the False Prophet, who used signs to dazzle and deceive those who had taken the mark of the Beast and worshiped his image. They were thrown alive, those two, into Lake Fire and Brimstone. The rest were killed by the sword of the One on the horse, the sword that comes from his mouth. All the birds held a feast on their flesh.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The Twenty-four Elders and the Four Animals fell to their knees and worshiped God on his Throne, praising,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen! Yes! Hallelujah!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'From the Throne came a shout, a command:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise our God, all you his servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All you who fear him, small and great!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: 'Then I heard the sound of massed choirs, the sound of mighty rapids, the sound of strong thunder:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Master reigns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our God, the Sovereign-Strong!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us celebrate, let us rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us give him the glory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Marriage of the Lamb has come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his Wife has made herself ready.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She was given a bridal gown
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of bright and shining linen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The linen is the righteousness of the saints.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The Angel said to me, “Write this: ‘Blessed are those invited to the Wedding Supper of the Lamb.’” He added, “These are the true words of God!”'
