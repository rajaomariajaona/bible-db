document_id: REV.19,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sound of Hallelujahs
  - type: text
    content: I heard a sound like massed choirs in Heaven singing,
  - type: text
    content: Hallelujah!
  - type: text
    content: The salvation and glory and power are God’s—
  - type: text
    content: his judgments true, his judgments just.
  - type: text
    content: He judged the great Whore
  - type: text
    content: who corrupted the earth with her lust.
  - type: text
    content: He avenged on her the blood of his servants.
  - type: text
    content: 'Then, more singing:'
  - type: text
    content: Hallelujah!
  - type: text
    content: The smoke from her burning billows up
  - type: text
    content: to high Heaven forever and ever and ever.
  '10':
  - type: text
    content: I fell at his feet to worship him, but he wouldn’t let me. “Don’t do that,” he said. “I’m a servant just like you, and like your brothers and sisters who hold to the witness of Jesus. The witness of Jesus is the spirit of prophecy.”
  - type: heading
    content: A White Horse and Its Rider
  '11':
  - type: text
    content: 'Then I saw Heaven open wide—and oh! a white horse and its Rider. The Rider, named Faithful and True, judges and makes war in pure righteousness. His eyes are a blaze of fire, on his head many crowns. He has a Name inscribed that’s known only to himself. He is dressed in a robe soaked with blood, and he is addressed as “Word of God.” The armies of Heaven, mounted on white horses and dressed in dazzling white linen, follow him. A sharp sword comes out of his mouth so he can subdue the nations, then rule them with a rod of iron. He treads the winepress of the raging wrath of God, the Sovereign-Strong. On his robe and thigh is written, '
  - type: text
    content: King of kings, Lord of lords.
  '17':
  - type: text
    content: I saw an Angel standing in the sun, shouting to all flying birds in Middle-Heaven, “Come to the Great Supper of God! Feast on the flesh of kings and captains and champions, horses and their riders. Eat your fill of them all—free and slave, small and great!”
  '19':
  - type: text
    content: I saw the Beast and, assembled with him, earth’s kings and their armies, ready to make war against the One on the horse and his army. The Beast was taken, and with him, his puppet, the False Prophet, who used signs to dazzle and deceive those who had taken the mark of the Beast and worshiped his image. They were thrown alive, those two, into Lake Fire and Brimstone. The rest were killed by the sword of the One on the horse, the sword that comes from his mouth. All the birds held a feast on their flesh.
  '4':
  - type: text
    content: The Twenty-four Elders and the Four Animals fell to their knees and worshiped God on his Throne, praising,
  - type: text
    content: Amen! Yes! Hallelujah!
  '5':
  - type: text
    content: 'From the Throne came a shout, a command:'
  - type: text
    content: Praise our God, all you his servants,
  - type: text
    content: All you who fear him, small and great!
  '6':
  - type: text
    content: 'Then I heard the sound of massed choirs, the sound of mighty rapids, the sound of strong thunder:'
  - type: text
    content: Hallelujah!
  - type: text
    content: The Master reigns,
  - type: text
    content: our God, the Sovereign-Strong!
  - type: text
    content: Let us celebrate, let us rejoice,
  - type: text
    content: let us give him the glory!
  - type: text
    content: The Marriage of the Lamb has come;
  - type: text
    content: his Wife has made herself ready.
  - type: text
    content: She was given a bridal gown
  - type: text
    content: of bright and shining linen.
  - type: text
    content: The linen is the righteousness of the saints.
  '9':
  - type: text
    content: 'The Angel said to me, “Write this: ‘Blessed are those invited to the Wedding Supper of the Lamb.’” He added, “These are the true words of God!”'
