document_id: DEU.3
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then we turned north and took the road to Bashan. Og king of Bashan, he and all his people, came out to meet us in battle at Edrei.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to me, “Don’t be afraid of him; I’m turning him over to you, along with his whole army and his land. Treat him the way you treated Sihon king of the Amorites who ruled from Heshbon.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-7
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, also handed Og king of Bashan over to us—Og and all his people—and we utterly crushed them. Again, no survivors. At the same time we took all his cities. There wasn’t one of the sixty cities that we didn’t take—the whole region of Argob, Og’s kingdom in Bashan. All these cities were fortress cities with high walls and barred gates. There were also numerous unwalled villages. We totally destroyed them—a holy destruction. It was the same treatment we gave to Sihon king of Heshbon, a holy destruction of every city, man, woman, and child. But all the livestock and plunder from the cities we took for ourselves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: Throughout that time we took the land from under the control of the two kings of the Amorites who ruled the country east of the Jordan, all the way from the Brook Arnon to Mount Hermon. (Sirion is the name given Hermon by the Sidonians; the Amorites call it Senir.) We took all the towns of the plateau, everything in Gilead, everything in Bashan, as far as Salecah and Edrei, the border towns of Bashan, Og’s kingdom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Og king of Bashan was the last remaining Rephaite. His bed, made of iron, was over thirteen feet long and six wide. You can still see it on display in Rabbah of the People of Ammon.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Of the land that we possessed at that time, I gave the Reubenites and the Gadites the territory north of Aroer along the Brook Arnon and half the hill country of Gilead with its towns.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I gave the half-tribe of Manasseh the rest of Gilead and all of Bashan, Og’s kingdom—all the region of Argob, which takes in all of Bashan. This used to be known as the Land of the Rephaites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jair, a son of Manasseh, got the region of Argob to the borders of the Geshurites and Maacathites. He named the Bashan villages after himself, Havvoth Jair (Jair’s Tent-Villages). They’re still called that.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I gave Gilead to Makir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: I gave the Reubenites and Gadites the land from Gilead down to the Brook Arnon, whose middle was the boundary, and as far as the Jabbok River, the boundary line of the People of Ammon. The western boundary was the Jordan River in the Arabah all the way from the Kinnereth (the Sea of Galilee) to the Sea of the Arabah (the Salt Sea or Dead Sea) at the base of the slopes of Mount Pisgah on the east.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: I commanded you at that time, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has given you this land to possess. Your men, fit and armed for the fight, are to cross the river in advance of their brothers, the People of Israel. Only your wives, children, and livestock (I know you have much livestock) may go ahead and settle down in the towns I have already given you until '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' secures living space for your brothers as he has for you and they have taken possession of the country west of the Jordan that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is giving them. After that, each man may return to the land I’ve given you here.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'I commanded Joshua at that time, “You’ve seen with your own two eyes everything '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has done to these two kings. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is going to do the same thing to all the kingdoms over there across the river where you’re headed. Don’t be afraid of them. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God—he’s fighting for you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: 'At that same time, I begged '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my Master, you let me in on the beginnings, you let me see your greatness, you let me see your might—what god in Heaven or Earth can do anything like what you’ve done! Please, let me in also on the endings, let me cross the river and see the good land over the Jordan, the lush hills, the Lebanon mountains.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was still angry with me because of you. He wouldn’t listen. He said, “Enough of that. Not another word from you on this. Climb to the top of Mount Pisgah and look around: look west, north, south, east. Take in the land with your own eyes. Take a good look because you’re not going to cross this Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“Then command Joshua: Give him courage. Give him strength. Single-handed he will lead this people across the river. Single-handed he’ll cause them to inherit the land at which you can only look.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: That’s why we have stayed in this valley near Beth Peor.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
