document_id: DEU.3,97
type_code: eng
verses:
  '1':
  - type: text
    content: Then we turned north and took the road to Bashan. Og king of Bashan, he and all his people, came out to meet us in battle at Edrei.
  '11':
  - type: text
    content: Og king of Bashan was the last remaining Rephaite. His bed, made of iron, was over thirteen feet long and six wide. You can still see it on display in Rabbah of the People of Ammon.
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: Of the land that we possessed at that time, I gave the Reubenites and the Gadites the territory north of Aroer along the Brook Arnon and half the hill country of Gilead with its towns.
  '13':
  - type: text
    content: I gave the half-tribe of Manasseh the rest of Gilead and all of Bashan, Og’s kingdom—all the region of Argob, which takes in all of Bashan. This used to be known as the Land of the Rephaites.
  '14':
  - type: text
    content: Jair, a son of Manasseh, got the region of Argob to the borders of the Geshurites and Maacathites. He named the Bashan villages after himself, Havvoth Jair (Jair’s Tent-Villages). They’re still called that.
  '15':
  - type: text
    content: I gave Gilead to Makir.
  '16':
  - type: text
    content: I gave the Reubenites and Gadites the land from Gilead down to the Brook Arnon, whose middle was the boundary, and as far as the Jabbok River, the boundary line of the People of Ammon. The western boundary was the Jordan River in the Arabah all the way from the Kinnereth (the Sea of Galilee) to the Sea of the Arabah (the Salt Sea or Dead Sea) at the base of the slopes of Mount Pisgah on the east.
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: I commanded you at that time, “
  - type: text
    content: God
  - type: text
    content: ', your God, has given you this land to possess. Your men, fit and armed for the fight, are to cross the river in advance of their brothers, the People of Israel. Only your wives, children, and livestock (I know you have much livestock) may go ahead and settle down in the towns I have already given you until '
  - type: text
    content: God
  - type: text
    content: ' secures living space for your brothers as he has for you and they have taken possession of the country west of the Jordan that '
  - type: text
    content: God
  - type: text
    content: ', your God, is giving them. After that, each man may return to the land I’ve given you here.”'
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to me, “Don’t be afraid of him; I’m turning him over to you, along with his whole army and his land. Treat him the way you treated Sihon king of the Amorites who ruled from Heshbon.”'
  '21':
  - type: text
    content: 'I commanded Joshua at that time, “You’ve seen with your own two eyes everything '
  - type: text
    content: God
  - type: text
    content: ', your God, has done to these two kings. '
  - type: text
    content: God
  - type: text
    content: ' is going to do the same thing to all the kingdoms over there across the river where you’re headed. Don’t be afraid of them. '
  - type: text
    content: God
  - type: text
    content: ', your God—he’s fighting for you.”'
  '23':
  - type: text
    content: 'At that same time, I begged '
  - type: text
    content: God
  - type: text
    content: ': “'
  - type: text
    content: God
  - type: text
    content: ', my Master, you let me in on the beginnings, you let me see your greatness, you let me see your might—what god in Heaven or Earth can do anything like what you’ve done! Please, let me in also on the endings, let me cross the river and see the good land over the Jordan, the lush hills, the Lebanon mountains.”'
  '26':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' was still angry with me because of you. He wouldn’t listen. He said, “Enough of that. Not another word from you on this. Climb to the top of Mount Pisgah and look around: look west, north, south, east. Take in the land with your own eyes. Take a good look because you’re not going to cross this Jordan.'
  '28':
  - type: text
    content: '“Then command Joshua: Give him courage. Give him strength. Single-handed he will lead this people across the river. Single-handed he’ll cause them to inherit the land at which you can only look.”'
  '29':
  - type: text
    content: That’s why we have stayed in this valley near Beth Peor.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'So '
  - type: text
    content: God
  - type: text
    content: ', our God, also handed Og king of Bashan over to us—Og and all his people—and we utterly crushed them. Again, no survivors. At the same time we took all his cities. There wasn’t one of the sixty cities that we didn’t take—the whole region of Argob, Og’s kingdom in Bashan. All these cities were fortress cities with high walls and barred gates. There were also numerous unwalled villages. We totally destroyed them—a holy destruction. It was the same treatment we gave to Sihon king of Heshbon, a holy destruction of every city, man, woman, and child. But all the livestock and plunder from the cities we took for ourselves.'
  '8':
  - type: text
    content: Throughout that time we took the land from under the control of the two kings of the Amorites who ruled the country east of the Jordan, all the way from the Brook Arnon to Mount Hermon. (Sirion is the name given Hermon by the Sidonians; the Amorites call it Senir.) We took all the towns of the plateau, everything in Gilead, everything in Bashan, as far as Salecah and Edrei, the border towns of Bashan, Og’s kingdom.
