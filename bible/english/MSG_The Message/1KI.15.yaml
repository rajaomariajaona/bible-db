document_id: 1KI.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijah of Judah
  - type: text
    content: 'In the eighteenth year of the rule of Jeroboam son of Nebat, Abijah took over the throne of Judah. He ruled in Jerusalem three years. His mother was Maacah daughter of Absalom. He continued to sin just like his father before him. He was not truehearted to '
  - type: text
    content: God
  - type: text
    content: ' as his great-grandfather David had been. But despite that, out of respect for David, his '
  - type: text
    content: God
  - type: text
    content: ' graciously gave him a lamp, a son to follow him and keep Jerusalem secure. For David had lived an exemplary life before '
  - type: text
    content: God
  - type: text
    content: ' all his days, not going off on his own in willful defiance of '
  - type: text
    content: God
  - type: text
    content: ’s clear directions (except for that time with Uriah the Hittite). But war continued between Abijah and Jeroboam the whole time.
  '11':
  - type: text
    content: 'Asa conducted himself well before '
  - type: text
    content: God
  - type: text
    content: ', reviving the ways of his ancestor David. He cleaned house: He got rid of the sacred prostitutes and threw out all the idols his predecessors had made. Asa spared nothing and no one; he went so far as to remove Queen Maacah from her position because she had built a shockingly obscene memorial to the whore goddess Asherah. Asa tore it down and burned it up in the Kidron Valley. Unfortunately, he didn’t get rid of the local sex-and-religion shrines. But he was well-intentioned—his heart was in the right place, in tune with '
  - type: text
    content: God
  - type: text
    content: . All the gold and silver vessels and artifacts that he and his father had consecrated for holy use he installed in The Temple.
  '16':
  - type: text
    content: But through much of his reign there was war between Asa and Baasha king of Israel. Baasha king of Israel started it by building a fort at Ramah and closing the border between Israel and Judah so no one could enter or leave Judah.
  '18':
  - type: text
    content: 'Asa took all the silver and gold that was left in the treasuries of The Temple of '
  - type: text
    content: God
  - type: text
    content: ' and the royal palace, gave it to his servants, and sent them to Ben-Hadad son of Tabrimmon, the son of Hezion king of Aram, who was ruling in Damascus, with this message: “Let’s make a treaty like the one between our fathers. I’m showing my good faith with this gift of silver and gold. Break your deal with Baasha king of Israel so he’ll quit fighting against me.”'
  '20':
  - type: text
    content: Ben-Hadad went along with King Asa and sent out his troops against the towns of Israel. He attacked Ijon, Dan, Abel Beth Maacah, and the entire region of Kinnereth, including Naphtali. When Baasha got the report he quit fortifying Ramah and pulled back to Tirzah.
  '22':
  - type: text
    content: Then King Asa issued orders to everyone in Judah—no exemptions—to haul away the logs and stones Baasha had used in the fortification of Ramah and use them to fortify Geba in Benjamin and Mizpah.
  '23':
  - type: text
    content: 'A full account of Asa’s life, all the great things he did and the fortifications he constructed, is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: . In his old age he developed severe gout. Then Asa died and was buried with his ancestors in the City of David. His son Jehoshaphat became king after him.
  - type: heading
    content: Nadab of Israel
  '25':
  - type: text
    content: 'Nadab son of Jeroboam became king over Israel in the second year of Asa’s rule in Judah. He was king of Israel two years. He was openly evil before '
  - type: text
    content: God
  - type: text
    content: —he followed in the footsteps of his father who both sinned and made Israel sin.
  '27':
  - type: text
    content: Baasha son of Ahijah of the tribe of Issachar ganged up on him and attacked him at the Philistine town of Gibbethon while Nadab and the Israelites were doing battle there. Baasha killed Nadab in the third year of Asa king of Judah and became Israel’s next king.
  '29':
  - type: text
    content: 'As soon as he was king he killed everyone in Jeroboam’s family. There wasn’t a living soul left to the name of Jeroboam; Baasha wiped them out totally, just as '
  - type: text
    content: God
  - type: text
    content: '’s servant Ahijah of Shiloh had prophesied—punishment for Jeroboam’s sins and for making Israel sin, for making the '
  - type: text
    content: God
  - type: text
    content: ' of Israel thoroughly angry.'
  '31':
  - type: text
    content: 'The rest of Nadab’s life, everything else he did, is written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: . There was continuous war between Asa and Baasha king of Israel.
  - type: heading
    content: Baasha of Israel
  '33':
  - type: text
    content: 'In the third year of Asa king of Judah, Baasha son of Ahijah became king in Tirzah over all Israel. He ruled twenty-four years. He was openly evil before '
  - type: text
    content: God
  - type: text
    content: ', walking in the footsteps of Jeroboam, who both sinned and made Israel sin.'
  '7':
  - type: text
    content: 'The rest of Abijah’s life, everything he did, is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: . But the war with Jeroboam was the dominant theme. Abijah died and was buried with his ancestors in the City of David. His son Asa was king after him.
  - type: heading
    content: Asa of Judah
  '9':
  - type: text
    content: In the twentieth year of Jeroboam king of Israel, Asa began his rule over Judah. He ruled for forty-one years in Jerusalem. His grandmother’s name was Maacah.
