verses:
  '1':
  - type: heading
    content: You Vainly Collect Medicines
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s Messages through the prophet Jeremiah regarding the godless nations.
  '10':
  - type: text
    content: '“But it’s not your day. It’s the Master’s, me, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies—
  - type: text
    content: the day when I have it out with my enemies,
  - type: text
    content: The day when Sword puts an end to my enemies,
  - type: text
    content: when Sword exacts vengeance.
  - type: text
    content: 'I, the Master, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies,
  - type: text
    content: will pile them on an altar—a huge sacrifice!—
  - type: text
    content: In the great north country,
  - type: text
    content: along the mighty Euphrates.
  '11':
  - type: text
    content: “Oh, virgin Daughter Egypt,
  - type: text
    content: climb into the mountains of Gilead, get healing balm.
  - type: text
    content: You will vainly collect medicines,
  - type: text
    content: for nothing will be able to cure what ails you.
  - type: text
    content: The whole world will hear your anguished cries.
  - type: text
    content: Your wails fill the earth,
  - type: text
    content: As soldier falls against soldier
  - type: text
    content: and they all go down in a heap.”
  - type: heading
    content: Egypt’s Army Slithers Like a Snake
  '13':
  - type: text
    content: 'The Message that '
  - type: text
    content: God
  - type: text
    content: ' gave to the prophet Jeremiah when Nebuchadnezzar king of Babylon was on his way to attack Egypt:'
  '14':
  - type: text
    content: “Tell Egypt, alert Migdol,
  - type: text
    content: 'post warnings in Noph and Tahpanhes:'
  - type: text
    content: ‘Wake up! Be prepared!
  - type: text
    content: War’s coming!’
  '15':
  - type: text
    content: “Why will your bull-god Apis run off?
  - type: text
    content: 'Because '
  - type: text
    content: God
  - type: text
    content: ' will drive him off.'
  - type: text
    content: Your ragtag army will fall to pieces.
  - type: text
    content: The word is passing through the ranks,
  - type: text
    content: ‘Let’s get out of here while we still can.
  - type: text
    content: Let’s head for home and save our skins.’
  - type: text
    content: When they get home they’ll nickname Pharaoh
  - type: text
    content: ‘Big-Talk-Bad-Luck.’
  - type: text
    content: As sure as I am the living God”
  - type: text
    content: '—the King’s Decree, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies is his name—
  - type: text
    content: '“A conqueror is coming: like Tabor, singular among mountains;'
  - type: text
    content: like Carmel, jutting up from the sea!
  - type: text
    content: So pack your bags for exile,
  - type: text
    content: you coddled daughters of Egypt,
  - type: text
    content: For Memphis will soon be nothing,
  - type: text
    content: a vacant lot grown over with weeds.
  '2':
  - type: text
    content: 'The Message to Egypt and the army of Pharaoh Neco king of Egypt at the time it was defeated by Nebuchadnezzar king of Babylon while camped at Carchemish on the Euphrates River in the fourth year of the reign of Jehoiakim king of Judah:'
  - type: text
    content: “‘Present arms!
  - type: text
    content: March to the front!
  - type: text
    content: Harness the horses!
  - type: text
    content: Up in the saddles!
  - type: text
    content: Battle formation! Helmets on,
  - type: text
    content: spears sharpened, armor in place!’
  - type: text
    content: But what’s this I see?
  - type: text
    content: They’re scared out of their wits!
  - type: text
    content: They break ranks and run for cover.
  - type: text
    content: Their soldiers panic.
  - type: text
    content: They run this way and that,
  - type: text
    content: stampeding blindly.
  - type: text
    content: It’s total chaos, total confusion, danger everywhere!”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '20':
  - type: text
    content: “Too bad, Egypt, a beautiful sleek heifer
  - type: text
    content: attacked by a horsefly from the north!
  - type: text
    content: All her hired soldiers are stationed to defend her—
  - type: text
    content: like well-fed calves they are.
  - type: text
    content: But when their lives are on the line, they’ll run off,
  - type: text
    content: cowards every one.
  - type: text
    content: When the going gets tough,
  - type: text
    content: they’ll take the easy way out.
  '22':
  - type: text
    content: “Egypt will slither and hiss like a snake
  - type: text
    content: as the enemy army comes in force.
  - type: text
    content: They will rush in, swinging axes
  - type: text
    content: like lumberjacks cutting down trees.
  - type: text
    content: They’ll level the country”—
  - type: text
    content: God
  - type: text
    content: ’s Decree—“nothing
  - type: text
    content: and no one standing for as far as you can see.
  - type: text
    content: The invaders will be a swarm of locusts,
  - type: text
    content: innumerable, past counting.
  - type: text
    content: Daughter Egypt will be ravished,
  - type: text
    content: raped by vandals from the north.”
  '25':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, the God of Israel, says, “Watch out when I visit doom on the god Amon of Thebes, Egypt and its gods and kings, Pharaoh and those who trust in him. I’ll turn them over to those who are out to kill them, to Nebuchadnezzar and his military. Egypt will be set back a thousand years. Eventually people will live there again.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: “But you, dear Jacob my servant, you have nothing to fear.
  - type: text
    content: Israel, there’s no need to worry.
  - type: text
    content: Look up! I’ll save you from that far country,
  - type: text
    content: I’ll get your children out of the land of exile.
  - type: text
    content: Things are going to be normal again for Jacob,
  - type: text
    content: safe and secure, smooth sailing.
  - type: text
    content: Yes, dear Jacob my servant, you have nothing to fear.
  - type: text
    content: Depend on it, I’m on your side.
  - type: text
    content: I’ll finish off all the godless nations
  - type: text
    content: among which I’ve scattered you,
  - type: text
    content: But I won’t finish you off.
  - type: text
    content: I have more work left to do on you.
  - type: text
    content: I’ll punish you, but fairly.
  - type: text
    content: No, I’m not finished with you yet.”
  '6':
  - type: text
    content: “The swiftest runners won’t get away,
  - type: text
    content: the strongest soldiers won’t escape.
  - type: text
    content: In the north country, along the River Euphrates,
  - type: text
    content: they’ll stagger, stumble, and fall.
  '7':
  - type: text
    content: “Who is this like the Nile in flood?
  - type: text
    content: like its streams torrential?
  - type: text
    content: Why, it’s Egypt like the Nile in flood,
  - type: text
    content: like its streams torrential,
  - type: text
    content: Saying, ‘I’ll take over the world.
  - type: text
    content: I’ll wipe out cities and peoples.’
  - type: text
    content: Run, horses!
  - type: text
    content: Roll, chariots!
  - type: text
    content: Advance, soldiers
  - type: text
    content: from Cush and Put with your shields,
  - type: text
    content: Soldiers from Lud,
  - type: text
    content: experts with bow and arrow.
