document_id: JER.46,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You Vainly Collect Medicines
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Messages through the prophet Jeremiah regarding the godless nations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But it’s not your day. It’s the Master’s, me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the day when I have it out with my enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day when Sword puts an end to my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when Sword exacts vengeance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will pile them on an altar—a huge sacrifice!—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the great north country,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along the mighty Euphrates.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, virgin Daughter Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: climb into the mountains of Gilead, get healing balm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will vainly collect medicines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for nothing will be able to cure what ails you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole world will hear your anguished cries.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wails fill the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As soldier falls against soldier
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they all go down in a heap.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Egypt’s Army Slithers Like a Snake
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The Message that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave to the prophet Jeremiah when Nebuchadnezzar king of Babylon was on his way to attack Egypt:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Tell Egypt, alert Migdol,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'post warnings in Noph and Tahpanhes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Wake up! Be prepared!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: War’s coming!’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why will your bull-god Apis run off?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will drive him off.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your ragtag army will fall to pieces.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The word is passing through the ranks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Let’s get out of here while we still can.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s head for home and save our skins.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they get home they’ll nickname Pharaoh
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Big-Talk-Bad-Luck.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As sure as I am the living God”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '—the King’s Decree, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies is his name—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“A conqueror is coming: like Tabor, singular among mountains;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like Carmel, jutting up from the sea!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So pack your bags for exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you coddled daughters of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Memphis will soon be nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a vacant lot grown over with weeds.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Message to Egypt and the army of Pharaoh Neco king of Egypt at the time it was defeated by Nebuchadnezzar king of Babylon while camped at Carchemish on the Euphrates River in the fourth year of the reign of Jehoiakim king of Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Present arms!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: March to the front!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harness the horses!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Up in the saddles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Battle formation! Helmets on,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spears sharpened, armor in place!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But what’s this I see?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re scared out of their wits!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They break ranks and run for cover.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their soldiers panic.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They run this way and that,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stampeding blindly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s total chaos, total confusion, danger everywhere!”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Too bad, Egypt, a beautiful sleek heifer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: attacked by a horsefly from the north!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her hired soldiers are stationed to defend her—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like well-fed calves they are.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when their lives are on the line, they’ll run off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cowards every one.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the going gets tough,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll take the easy way out.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Egypt will slither and hiss like a snake
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the enemy army comes in force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will rush in, swinging axes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like lumberjacks cutting down trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll level the country”—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—“nothing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one standing for as far as you can see.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The invaders will be a swarm of locusts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: innumerable, past counting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daughter Egypt will be ravished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raped by vandals from the north.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, the God of Israel, says, “Watch out when I visit doom on the god Amon of Thebes, Egypt and its gods and kings, Pharaoh and those who trust in him. I’ll turn them over to those who are out to kill them, to Nebuchadnezzar and his military. Egypt will be set back a thousand years. Eventually people will live there again.” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But you, dear Jacob my servant, you have nothing to fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel, there’s no need to worry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look up! I’ll save you from that far country,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll get your children out of the land of exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Things are going to be normal again for Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: safe and secure, smooth sailing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, dear Jacob my servant, you have nothing to fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Depend on it, I’m on your side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll finish off all the godless nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among which I’ve scattered you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I won’t finish you off.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have more work left to do on you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll punish you, but fairly.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No, I’m not finished with you yet.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The swiftest runners won’t get away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the strongest soldiers won’t escape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the north country, along the River Euphrates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll stagger, stumble, and fall.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who is this like the Nile in flood?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like its streams torrential?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, it’s Egypt like the Nile in flood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like its streams torrential,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saying, ‘I’ll take over the world.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll wipe out cities and peoples.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Run, horses!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Roll, chariots!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Advance, soldiers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from Cush and Put with your shields,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soldiers from Lud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: experts with bow and arrow.
