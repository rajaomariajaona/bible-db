document_id: NUM.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Nazirite Vows
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Speak to the People of Israel; tell them, If any of you, man or woman, wants to make a special Nazirite vow, consecrating yourself totally to '
  - type: text
    content: God
  - type: text
    content: ', you must not drink any wine or beer, no intoxicating drink of any kind, not even the juice of grapes—in fact, you must not even eat grapes or raisins. For the duration of the consecration, nothing from the grapevine—not even the seeds, not even the skin—may be eaten.'
  '13':
  - type: text
    content: '“These are the instructions for the time set when your special consecration to '
  - type: text
    content: God
  - type: text
    content: ' is up. First, you are to be brought to the entrance to the Tent of Meeting. Then you will present your offerings to '
  - type: text
    content: God
  - type: text
    content: ': a healthy yearling lamb for the Whole-Burnt-Offering, a healthy yearling ewe for an Absolution-Offering, a healthy ram for a Peace-Offering, a basket of unraised bread made of fine flour, loaves mixed with oil, and crackers spread with oil, along with your Grain-Offerings and Drink-Offerings. The priest will approach '
  - type: text
    content: God
  - type: text
    content: ' and offer up your Absolution-Offering and Whole-Burnt-Offering. He will sacrifice the ram as a Peace-Offering to '
  - type: text
    content: God
  - type: text
    content: ' with the basket of unraised bread, and, last of all, the Grain-Offering and Drink-Offering.'
  '18':
  - type: text
    content: “At the entrance to the Tent of Meeting, shave off the hair you consecrated and put it in the fire that is burning under the Peace-Offering.
  '19':
  - type: text
    content: '“After you have shaved the hair of your consecration, the priest will take a shoulder from the ram, boiled, and a piece of unraised bread and a cracker from the basket and place them in your hands. The priest will then wave them before '
  - type: text
    content: God
  - type: text
    content: ', a Wave-Offering. They are holy and belong to the priest, along with the breast that was waved and the thigh that was offered.'
  - type: text
    content: “Now you are free to drink wine.
  '21':
  - type: text
    content: '“These are the instructions for Nazirites as they bring offerings to '
  - type: text
    content: God
  - type: text
    content: ' in their vow of consecration, beyond their other offerings. They must carry out the vow they have vowed following the instructions for the Nazirite.”'
  - type: heading
    content: The Aaronic Blessing
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' spoke to Moses: “Tell Aaron and his sons, This is how you are to bless the People of Israel. Say to them,'
  '24':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' bless you and keep you,'
  '25':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' smile on you and gift you,'
  '26':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' look you full in the face'
  - type: text
    content: and make you prosper.
  '27':
  - type: text
    content: In so doing, they will place my name on the People of Israel—
  - type: text
    content: I will confirm it by blessing them.”
  '5':
  - type: text
    content: '“Also, for the duration of the consecration you must not have your hair cut. Your long hair will be a continuing sign of holy separation to '
  - type: text
    content: God
  - type: text
    content: .
  '6':
  - type: text
    content: '“Also, for the duration of the consecration to '
  - type: text
    content: God
  - type: text
    content: ', you must not go near a corpse. Even if it’s the body of your father or mother, brother or sister, you must not ritually defile yourself because the sign of consecration to God is on your head.'
  '8':
  - type: text
    content: '“For the entire duration of your consecration you are holy to '
  - type: text
    content: God
  - type: text
    content: .
  '9':
  - type: text
    content: '“If someone should die suddenly in your presence, so that your consecrated head is ritually defiled, you must shave your head on the day of your purifying, that is, the seventh day. Then on the eighth day bring two doves or two pigeons to the priest at the entrance to the Tent of Meeting. The priest will offer one for the Absolution-Offering and one for the Whole-Burnt-Offering, purifying you from the ritual contamination of the corpse. You resanctify your hair on that day and reconsecrate your Nazirite consecration to '
  - type: text
    content: God
  - type: text
    content: ' by bringing a yearling lamb for a Compensation-Offering. You start over; the previous days don’t count because your consecration was ritually defiled.'
