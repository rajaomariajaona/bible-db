document_id: NUM.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nazirite Vows
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Speak to the People of Israel; tell them, If any of you, man or woman, wants to make a special Nazirite vow, consecrating yourself totally to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you must not drink any wine or beer, no intoxicating drink of any kind, not even the juice of grapes—in fact, you must not even eat grapes or raisins. For the duration of the consecration, nothing from the grapevine—not even the seeds, not even the skin—may be eaten.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These are the instructions for the time set when your special consecration to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is up. First, you are to be brought to the entrance to the Tent of Meeting. Then you will present your offerings to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': a healthy yearling lamb for the Whole-Burnt-Offering, a healthy yearling ewe for an Absolution-Offering, a healthy ram for a Peace-Offering, a basket of unraised bread made of fine flour, loaves mixed with oil, and crackers spread with oil, along with your Grain-Offerings and Drink-Offerings. The priest will approach '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and offer up your Absolution-Offering and Whole-Burnt-Offering. He will sacrifice the ram as a Peace-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' with the basket of unraised bread, and, last of all, the Grain-Offering and Drink-Offering.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “At the entrance to the Tent of Meeting, shave off the hair you consecrated and put it in the fire that is burning under the Peace-Offering.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“After you have shaved the hair of your consecration, the priest will take a shoulder from the ram, boiled, and a piece of unraised bread and a cracker from the basket and place them in your hands. The priest will then wave them before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', a Wave-Offering. They are holy and belong to the priest, along with the breast that was waved and the thigh that was offered.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Now you are free to drink wine.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These are the instructions for Nazirites as they bring offerings to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in their vow of consecration, beyond their other offerings. They must carry out the vow they have vowed following the instructions for the Nazirite.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Aaronic Blessing
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell Aaron and his sons, This is how you are to bless the People of Israel. Say to them,'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' bless you and keep you,'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' smile on you and gift you,'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' look you full in the face'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make you prosper.
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: In so doing, they will place my name on the People of Israel—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will confirm it by blessing them.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Also, for the duration of the consecration you must not have your hair cut. Your long hair will be a continuing sign of holy separation to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Also, for the duration of the consecration to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you must not go near a corpse. Even if it’s the body of your father or mother, brother or sister, you must not ritually defile yourself because the sign of consecration to God is on your head.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For the entire duration of your consecration you are holy to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If someone should die suddenly in your presence, so that your consecrated head is ritually defiled, you must shave your head on the day of your purifying, that is, the seventh day. Then on the eighth day bring two doves or two pigeons to the priest at the entrance to the Tent of Meeting. The priest will offer one for the Absolution-Offering and one for the Whole-Burnt-Offering, purifying you from the ritual contamination of the corpse. You resanctify your hair on that day and reconsecrate your Nazirite consecration to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' by bringing a yearling lamb for a Compensation-Offering. You start over; the previous days don’t count because your consecration was ritually defiled.'
