document_id: JER.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Stick Gods
  - type: text
    content: 'Listen to the Message that '
  - type: text
    content: God
  - type: text
    content: ' is sending your way, House of Israel. Listen most carefully:'
  - type: text
    content: “Don’t take the godless nations as your models.
  - type: text
    content: Don’t be impressed by their glamour and glitz,
  - type: text
    content: no matter how much they’re impressed.
  - type: text
    content: The religion of these peoples
  - type: text
    content: is nothing but smoke.
  - type: text
    content: An idol is nothing but a tree chopped down,
  - type: text
    content: then shaped by a woodsman’s ax.
  - type: text
    content: They trim it with tinsel and balls,
  - type: text
    content: use hammer and nails to keep it upright.
  - type: text
    content: It’s like a scarecrow in a cabbage patch—can’t talk!
  - type: text
    content: Deadwood that has to be carried—can’t walk!
  - type: text
    content: Don’t be impressed by such stuff.
  - type: text
    content: It’s useless for either good or evil.”
  '10':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ' is the real thing—'
  - type: text
    content: the living God, the eternal King.
  - type: text
    content: When he’s angry, Earth shakes.
  - type: text
    content: Yes, and the godless nations quake.
  '11':
  - type: text
    content: “Tell them this, ‘The stick gods
  - type: text
    content: who made nothing, neither sky nor earth,
  - type: text
    content: Will come to nothing
  - type: text
    content: on the earth and under the sky.’”
  - type: text
    content: But it is God whose power made the earth,
  - type: text
    content: whose wisdom gave shape to the world,
  - type: text
    content: who crafted the cosmos.
  - type: text
    content: He thunders, and rain pours down.
  - type: text
    content: He sends the clouds soaring.
  - type: text
    content: He embellishes the storm with lightnings,
  - type: text
    content: launches wind from his warehouse.
  - type: text
    content: Stick-god worshipers looking mighty foolish,
  - type: text
    content: god-makers embarrassed by their handmade gods!
  - type: text
    content: Their gods are frauds—dead sticks,
  - type: text
    content: deadwood gods, tasteless jokes.
  - type: text
    content: When the fires of judgment come, they’ll be ashes.
  '16':
  - type: text
    content: But the Portion-of-Jacob is the real thing.
  - type: text
    content: He put the whole universe together
  - type: text
    content: And pays special attention to Israel.
  - type: text
    content: 'His name? '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: text
    content: '* * *'
  '17':
  - type: text
    content: Grab your bags,
  - type: text
    content: all you who are under attack.
  - type: text
    content: God
  - type: text
    content: ' has given notice:'
  - type: text
    content: “Attention! I’m evicting
  - type: text
    content: Everyone who lives here,
  - type: text
    content: And right now—yes, right now!
  - type: text
    content: I’m going to press them to the limit,
  - type: text
    content: squeeze the life right out of them.”
  - type: text
    content: '* * *'
  '19':
  - type: text
    content: But it’s a black day for me!
  - type: text
    content: Hopelessly wounded,
  - type: text
    content: I said, “Why, oh why
  - type: text
    content: did I think I could bear it?”
  - type: text
    content: My house is ruined—
  - type: text
    content: the roof caved in.
  - type: text
    content: Our children are gone—
  - type: text
    content: we’ll never see them again.
  - type: text
    content: No one left to help in rebuilding,
  - type: text
    content: no one to make a new start!
  '21':
  - type: text
    content: It’s because our leaders are stupid.
  - type: text
    content: 'They never asked '
  - type: text
    content: God
  - type: text
    content: ' for counsel,'
  - type: text
    content: And so nothing worked right.
  - type: text
    content: The people are scattered all over.
  '22':
  - type: text
    content: But listen! Something’s coming!
  - type: text
    content: A big commotion from the northern borders!
  - type: text
    content: Judah’s towns about to be smashed,
  - type: text
    content: left to all the stray dogs and cats!
  '23':
  - type: text
    content: 'I know, '
  - type: text
    content: God
  - type: text
    content: ', that mere mortals'
  - type: text
    content: can’t run their own lives,
  - type: text
    content: That men and women
  - type: text
    content: don’t have what it takes to take charge of life.
  - type: text
    content: 'So correct us, '
  - type: text
    content: God
  - type: text
    content: ', as you see best.'
  - type: text
    content: Don’t lose your temper. That would be the end of us.
  - type: text
    content: Vent your anger on the godless nations,
  - type: text
    content: who refuse to acknowledge you,
  - type: text
    content: And on the people
  - type: text
    content: who won’t pray to you—
  - type: text
    content: The very ones who’ve made a meal out of Jacob,
  - type: text
    content: yes, made a meal
  - type: text
    content: And devoured him whole,
  - type: text
    content: people and pastures alike.
  '6':
  - type: text
    content: 'All this is nothing compared to you, O '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: You’re wondrously great, famously great.
  - type: text
    content: Who can fail to be impressed by you, King of the nations?
  - type: text
    content: It’s your very nature to be worshiped!
  - type: text
    content: Look far and wide among the elite of the nations.
  - type: text
    content: The best they can come up with is nothing compared to you.
  - type: text
    content: Stupidly, they line them up—a lineup of sticks,
  - type: text
    content: good for nothing but making smoke.
  - type: text
    content: Gilded with silver foil from Tarshish,
  - type: text
    content: covered with gold from Uphaz,
  - type: text
    content: Hung with violet and purple fabrics—
  - type: text
    content: no matter how fancy the sticks, they’re still sticks.
