document_id: JER.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Stick Gods
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'Listen to the Message that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is sending your way, House of Israel. Listen most carefully:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t take the godless nations as your models.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t be impressed by their glamour and glitz,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no matter how much they’re impressed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The religion of these peoples
- type: usfm
  marker: q2
  children:
  - type: text
    text: is nothing but smoke.
- type: usfm
  marker: q1
  children:
  - type: text
    text: An idol is nothing but a tree chopped down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then shaped by a woodsman’s ax.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They trim it with tinsel and balls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: use hammer and nails to keep it upright.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s like a scarecrow in a cabbage patch—can’t talk!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Deadwood that has to be carried—can’t walk!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t be impressed by such stuff.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s useless for either good or evil.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: 'All this is nothing compared to you, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re wondrously great, famously great.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can fail to be impressed by you, King of the nations?
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s your very nature to be worshiped!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look far and wide among the elite of the nations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The best they can come up with is nothing compared to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stupidly, they line them up—a lineup of sticks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: good for nothing but making smoke.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gilded with silver foil from Tarshish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: covered with gold from Uphaz,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hung with violet and purple fabrics—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no matter how fancy the sticks, they’re still sticks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is the real thing—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the living God, the eternal King.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he’s angry, Earth shakes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, and the godless nations quake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: “Tell them this, ‘The stick gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: who made nothing, neither sky nor earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will come to nothing
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the earth and under the sky.’”
- type: usfm
  marker: q1
  children:
  - type: text
    text: But it is God whose power made the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose wisdom gave shape to the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who crafted the cosmos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He thunders, and rain pours down.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He sends the clouds soaring.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He embellishes the storm with lightnings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: launches wind from his warehouse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stick-god worshipers looking mighty foolish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: god-makers embarrassed by their handmade gods!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their gods are frauds—dead sticks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: deadwood gods, tasteless jokes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When the fires of judgment come, they’ll be ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But the Portion-of-Jacob is the real thing.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He put the whole universe together
- type: usfm
  marker: q1
  children:
  - type: text
    text: And pays special attention to Israel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'His name? '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Grab your bags,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all you who are under attack.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has given notice:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Attention! I’m evicting
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone who lives here,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And right now—yes, right now!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m going to press them to the limit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: squeeze the life right out of them.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: But it’s a black day for me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hopelessly wounded,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said, “Why, oh why
- type: usfm
  marker: q2
  children:
  - type: text
    text: did I think I could bear it?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: My house is ruined—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the roof caved in.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our children are gone—
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ll never see them again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one left to help in rebuilding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one to make a new start!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It’s because our leaders are stupid.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'They never asked '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for counsel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And so nothing worked right.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The people are scattered all over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But listen! Something’s coming!
- type: usfm
  marker: q2
  children:
  - type: text
    text: A big commotion from the northern borders!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Judah’s towns about to be smashed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: left to all the stray dogs and cats!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: 'I know, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', that mere mortals'
- type: usfm
  marker: q2
  children:
  - type: text
    text: can’t run their own lives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: That men and women
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t have what it takes to take charge of life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So correct us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', as you see best.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t lose your temper. That would be the end of us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vent your anger on the godless nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who refuse to acknowledge you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And on the people
- type: usfm
  marker: q2
  children:
  - type: text
    text: who won’t pray to you—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The very ones who’ve made a meal out of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, made a meal
- type: usfm
  marker: q1
  children:
  - type: text
    text: And devoured him whole,
- type: usfm
  marker: q2
  children:
  - type: text
    text: people and pastures alike.
