document_id: NAM.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Let the Nations Get Their Fill of the Ugly Truth
  - type: text
    content: Doom to Murder City—
  - type: text
    content: full of lies, bursting with loot, addicted to violence!
  - type: text
    content: Horns blaring, wheels clattering,
  - type: text
    content: horses rearing, chariots lurching,
  - type: text
    content: Horsemen galloping,
  - type: text
    content: brandishing swords and spears,
  - type: text
    content: Dead bodies rotting in the street,
  - type: text
    content: corpses stacked like cordwood,
  - type: text
    content: Bodies in every gutter and alley,
  - type: text
    content: clogging every intersection!
  - type: text
    content: And whores! Whores without end!
  - type: text
    content: Whore City,
  - type: text
    content: Fatally seductive, you’re the Witch of Seduction,
  - type: text
    content: luring nations to their ruin with your evil spells.
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: ' Store up water for the siege.'
  - type: text
    content: Shore up your defenses.
  - type: text
    content: 'Get down to basics: Work the clay'
  - type: text
    content: and make bricks.
  - type: text
    content: Sorry. Too late.
  - type: text
    content: Enemy fire will burn you up.
  - type: text
    content: Swords will cut you to pieces.
  - type: text
    content: You’ll be chewed up as if by locusts.
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: ' Yes, as if by locusts—a fitting fate,'
  - type: text
    content: for you yourselves are a locust plague.
  - type: text
    content: You’ve multiplied shops and shopkeepers—
  - type: text
    content: more buyers and sellers than stars in the sky!
  - type: text
    content: A plague of locusts, cleaning out the neighborhood
  - type: text
    content: and then flying off.
  - type: text
    content: Your bureaucrats are locusts,
  - type: text
    content: your brokers and bankers are locusts.
  - type: text
    content: Early on, they’re all at your service,
  - type: text
    content: full of smiles and promises,
  - type: text
    content: But later when you return with questions or complaints,
  - type: text
    content: you’ll find they’ve flown off and are nowhere to be found.
  '18':
  - type: text
    content: King of Assyria! Your shepherd-leaders,
  - type: text
    content: in charge of caring for your people,
  - type: text
    content: Are busy doing everything else but.
  - type: text
    content: They’re not doing their job,
  - type: text
    content: And your people are scattered and lost.
  - type: text
    content: There’s no one to look after them.
  - type: text
    content: You’re past the point of no return.
  - type: text
    content: Your wound is fatal.
  - type: text
    content: When the story of your fate gets out,
  - type: text
    content: the whole world will applaud and cry “Encore!”
  - type: text
    content: Your cruel evil has seeped
  - type: text
    content: into every nook and cranny of the world.
  - type: text
    content: Everyone has felt it and suffered.
  '5':
  - type: text
    content: “I’m your enemy, Whore Nineveh—
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: text
    content: I’ll strip you of your seductive silk robes
  - type: text
    content: and expose you on the world stage.
  - type: text
    content: I’ll let the nations get their fill of the ugly truth
  - type: text
    content: of who you really are and have been all along.
  - type: text
    content: I’ll pelt you with dog dung
  - type: text
    content: 'and place you on a pedestal: ‘Slut on Exhibit.’'
  - type: text
    content: Everyone who sees you will gag and say,
  - type: text
    content: '‘Nineveh’s a pigsty:'
  - type: text
    content: What on earth did we ever see in her?
  - type: text
    content: Who would give her a second look? Ugh!’”
  - type: heading
    content: Past the Point of No Return
  '8':
  - type: text
    content: Do you think you’re superior to Egyptian Thebes,
  - type: text
    content: proudly invincible on the River Nile,
  - type: text
    content: Protected by the great River,
  - type: text
    content: walled in by the River, secure?
  - type: text
    content: Ethiopia stood guard to the south,
  - type: text
    content: Egypt to the north.
  - type: text
    content: Put and Libya, strong friends,
  - type: text
    content: were ready to step in and help.
  - type: text
    content: 'But you know what happened to her:'
  - type: text
    content: The whole city was marched off to a refugee camp,
  - type: text
    content: Her babies smashed to death
  - type: text
    content: in public view on the streets,
  - type: text
    content: Her prize leaders auctioned off,
  - type: text
    content: her celebrities put in chain gangs.
  - type: text
    content: Expect the same treatment, Nineveh.
  - type: text
    content: You’ll soon be staggering like a bunch of drunks,
  - type: text
    content: Wondering what hit you,
  - type: text
    content: looking for a place to sleep it off.
  - type: text
    content: All your forts are like peach trees,
  - type: text
    content: the lush peaches ripe, ready for the picking.
  - type: text
    content: One shake of the tree and they fall
  - type: text
    content: straight into hungry mouths.
  - type: text
    content: 'Face it: Your warriors are wimps.'
  - type: text
    content: You’re sitting ducks.
  - type: text
    content: Your borders are gaping doors, inviting
  - type: text
    content: your enemies in. And who’s to stop them?
  - type: text
    content: '* * *'
