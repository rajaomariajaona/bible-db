document_id: NAM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Let the Nations Get Their Fill of the Ugly Truth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: Doom to Murder City—
- type: usfm
  marker: q2
  children:
  - type: text
    text: full of lies, bursting with loot, addicted to violence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horns blaring, wheels clattering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: horses rearing, chariots lurching,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horsemen galloping,
- type: usfm
  marker: q2
  children:
  - type: text
    text: brandishing swords and spears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dead bodies rotting in the street,
- type: usfm
  marker: q2
  children:
  - type: text
    text: corpses stacked like cordwood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bodies in every gutter and alley,
- type: usfm
  marker: q2
  children:
  - type: text
    text: clogging every intersection!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And whores! Whores without end!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whore City,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fatally seductive, you’re the Witch of Seduction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: luring nations to their ruin with your evil spells.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: “I’m your enemy, Whore Nineveh—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll strip you of your seductive silk robes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and expose you on the world stage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll let the nations get their fill of the ugly truth
- type: usfm
  marker: q2
  children:
  - type: text
    text: of who you really are and have been all along.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll pelt you with dog dung
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and place you on a pedestal: ‘Slut on Exhibit.’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone who sees you will gag and say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘Nineveh’s a pigsty:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What on earth did we ever see in her?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who would give her a second look? Ugh!’”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Past the Point of No Return
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-13
  - type: text
    text: Do you think you’re superior to Egyptian Thebes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: proudly invincible on the River Nile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protected by the great River,
- type: usfm
  marker: q2
  children:
  - type: text
    text: walled in by the River, secure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ethiopia stood guard to the south,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Egypt to the north.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put and Libya, strong friends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: were ready to step in and help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But you know what happened to her:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The whole city was marched off to a refugee camp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her babies smashed to death
- type: usfm
  marker: q2
  children:
  - type: text
    text: in public view on the streets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her prize leaders auctioned off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her celebrities put in chain gangs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Expect the same treatment, Nineveh.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ll soon be staggering like a bunch of drunks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wondering what hit you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking for a place to sleep it off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All your forts are like peach trees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lush peaches ripe, ready for the picking.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One shake of the tree and they fall
- type: usfm
  marker: q2
  children:
  - type: text
    text: straight into hungry mouths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Face it: Your warriors are wimps.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’re sitting ducks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your borders are gaping doors, inviting
- type: usfm
  marker: q2
  children:
  - type: text
    text: your enemies in. And who’s to stop them?
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15a
  - type: text
    text: ' Store up water for the siege.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shore up your defenses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Get down to basics: Work the clay'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make bricks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sorry. Too late.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Enemy fire will burn you up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Swords will cut you to pieces.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ll be chewed up as if by locusts.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15b-17
  - type: text
    text: ' Yes, as if by locusts—a fitting fate,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you yourselves are a locust plague.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve multiplied shops and shopkeepers—
- type: usfm
  marker: q2
  children:
  - type: text
    text: more buyers and sellers than stars in the sky!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A plague of locusts, cleaning out the neighborhood
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then flying off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your bureaucrats are locusts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your brokers and bankers are locusts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Early on, they’re all at your service,
- type: usfm
  marker: q2
  children:
  - type: text
    text: full of smiles and promises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But later when you return with questions or complaints,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll find they’ve flown off and are nowhere to be found.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: King of Assyria! Your shepherd-leaders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in charge of caring for your people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are busy doing everything else but.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’re not doing their job,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And your people are scattered and lost.
- type: usfm
  marker: q2
  children:
  - type: text
    text: There’s no one to look after them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re past the point of no return.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your wound is fatal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the story of your fate gets out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the whole world will applaud and cry “Encore!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your cruel evil has seeped
- type: usfm
  marker: q2
  children:
  - type: text
    text: into every nook and cranny of the world.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everyone has felt it and suffered.
