document_id: EZK.21,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Sword! A Sword!
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, now face Jerusalem and let the Message roll out against the Sanctuary. Prophesy against the land of Israel. Say, ‘'
  - type: text
    content: God
  - type: text
    content: '’s Message: I’m against you. I’m pulling my sword from its sheath and killing both the wicked and the righteous. Because I’m treating everyone the same, good and bad, everyone from south to north is going to feel my sword! Everyone will know that I mean business.’'
  '11':
  - type: text
    content: “‘The sword is made to glisten,
  - type: text
    content: to be held and brandished.
  - type: text
    content: It’s sharpened and polished,
  - type: text
    content: ready to be brandished by the killer.’
  '12':
  - type: text
    content: “Yell out and wail, son of man.
  - type: text
    content: The sword is against my people!
  - type: text
    content: The princes of Israel
  - type: text
    content: and my people—abandoned to the sword!
  - type: text
    content: Wring your hands!
  - type: text
    content: Tear out your hair!
  '13':
  - type: text
    content: “‘Testing comes.
  - type: text
    content: Why have you despised discipline?
  - type: text
    content: You can’t get around it.
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.’'
  '14':
  - type: text
    content: “So, prophesy, son of man!
  - type: text
    content: Clap your hands. Get their attention.
  - type: text
    content: Tell them that the sword’s coming down
  - type: text
    content: once, twice, three times.
  - type: text
    content: It’s a sword to kill,
  - type: text
    content: a sword for a massacre,
  - type: text
    content: A sword relentless,
  - type: text
    content: a sword inescapable—
  - type: text
    content: People collapsing right and left,
  - type: text
    content: going down like dominoes.
  - type: text
    content: I’ve stationed a murderous sword
  - type: text
    content: at every gate in the city,
  - type: text
    content: Flashing like lightning,
  - type: text
    content: brandished murderously.
  - type: text
    content: Cut to the right, thrust to the left,
  - type: text
    content: murderous, sharp-edged sword!
  - type: text
    content: Then I’ll clap my hands,
  - type: text
    content: a signal that my anger is spent.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', have spoken.”'
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Son of man, lay out two roads for the sword of the king of Babylon to take. Start them from the same place. Place a signpost at the beginning of each road. Post one sign to mark the road of the sword to Rabbah of the Ammonites. Post the other to mark the road to Judah and Fort Jerusalem. The king of Babylon stands at the fork in the road and he decides by divination which of the two roads to take. He draws straws, he throws god-dice, he examines a goat liver. He opens his right hand: The omen says, ‘Head for Jerusalem!’ So he’s on his way with battering rams, roused to kill, sounding the battle cry, pounding down city gates, building siege works.'
  '23':
  - type: text
    content: “To the Judah leaders, who themselves have sworn oaths, it will seem like a false divination, but he will remind them of their guilt, and so they’ll be captured.
  '24':
  - type: text
    content: '“So this is what '
  - type: text
    content: God
  - type: text
    content: ', the Master, says: ‘Because your sin is now out in the open so everyone can see what you’ve been doing, you’ll be taken captive.'
  '25':
  - type: text
    content: '“‘O Zedekiah, blasphemous and evil prince of Israel: Time’s up. It’s “punishment payday.” '
  - type: text
    content: God
  - type: text
    content: ' says, Take your royal crown off your head. No more “business as usual.” The underdog will be promoted and the top dog will be demoted. Ruins, ruins, ruins! I’ll turn the whole place into ruins. And ruins it will remain until the one comes who has a right to it. Then I’ll give it to him.’'
  '28':
  - type: text
    content: '“But, son of man, your job is to prophesy. Tell them, ‘This is the Message from '
  - type: text
    content: God
  - type: text
    content: ', the Master, against the Ammonites and against their cruel taunts:'
  - type: text
    content: “‘A sword! A sword!
  - type: text
    content: Bared to kill,
  - type: text
    content: Sharp as a razor,
  - type: text
    content: flashing like lightning.
  - type: text
    content: Despite false sword propaganda
  - type: text
    content: circulated in Ammon,
  - type: text
    content: The sword will sever Ammonite necks,
  - type: text
    content: for whom it’s punishment payday.
  - type: text
    content: Return the sword to the sheath! I’ll judge you in your home country,
  - type: text
    content: in the land where you grew up.
  - type: text
    content: I’ll empty out my wrath on you,
  - type: text
    content: breathe hot anger down your neck.
  - type: text
    content: I’ll give you to vicious men
  - type: text
    content: skilled in torture.
  - type: text
    content: You’ll end up as stove-wood.
  - type: text
    content: Corpses will litter your land.
  - type: text
    content: Not so much as a memory will be left of you.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', have said so.’”'
  '6':
  - type: text
    content: “So, son of man, groan! Double up in pain. Make a scene!
  '7':
  - type: text
    content: '“When they ask you, ‘Why all this groaning, this carrying on?’ say, ‘Because of the news that’s coming. It’ll knock the breath out of everyone. Hearts will stop cold, knees turn to rubber. Yes, it’s coming. No stopping it. Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.’”'
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message to me: “Son of man, prophesy. Tell them, ‘The Master says:'
  - type: text
    content: “‘A sword! A sword!
  - type: text
    content: razor-sharp and polished,
  - type: text
    content: Sharpened to kill,
  - type: text
    content: polished to flash like lightning!
  - type: text
    content: “‘My child, you’ve despised the scepter of Judah
  - type: text
    content: by worshiping every tree-idol.
