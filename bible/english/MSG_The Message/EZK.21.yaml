document_id: EZK.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Sword! A Sword!
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, now face Jerusalem and let the Message roll out against the Sanctuary. Prophesy against the land of Israel. Say, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: I’m against you. I’m pulling my sword from its sheath and killing both the wicked and the righteous. Because I’m treating everyone the same, good and bad, everyone from south to north is going to feel my sword! Everyone will know that I mean business.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “So, son of man, groan! Double up in pain. Make a scene!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“When they ask you, ‘Why all this groaning, this carrying on?’ say, ‘Because of the news that’s coming. It’ll knock the breath out of everyone. Hearts will stop cold, knees turn to rubber. Yes, it’s coming. No stopping it. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message to me: “Son of man, prophesy. Tell them, ‘The Master says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘A sword! A sword!
- type: usfm
  marker: q2
  children:
  - type: text
    text: razor-sharp and polished,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sharpened to kill,
- type: usfm
  marker: q2
  children:
  - type: text
    text: polished to flash like lightning!
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘My child, you’ve despised the scepter of Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: by worshiping every tree-idol.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “‘The sword is made to glisten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be held and brandished.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s sharpened and polished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready to be brandished by the killer.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Yell out and wail, son of man.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The sword is against my people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The princes of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my people—abandoned to the sword!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wring your hands!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tear out your hair!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “‘Testing comes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why have you despised discipline?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can’t get around it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-17
  - type: text
    text: “So, prophesy, son of man!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Clap your hands. Get their attention.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell them that the sword’s coming down
- type: usfm
  marker: q2
  children:
  - type: text
    text: once, twice, three times.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s a sword to kill,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sword for a massacre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A sword relentless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sword inescapable—
- type: usfm
  marker: q1
  children:
  - type: text
    text: People collapsing right and left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: going down like dominoes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve stationed a murderous sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: at every gate in the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Flashing like lightning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: brandished murderously.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cut to the right, thrust to the left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: murderous, sharp-edged sword!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I’ll clap my hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a signal that my anger is spent.
- type: usfm
  marker: q3
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have spoken.”'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-22
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, lay out two roads for the sword of the king of Babylon to take. Start them from the same place. Place a signpost at the beginning of each road. Post one sign to mark the road of the sword to Rabbah of the Ammonites. Post the other to mark the road to Judah and Fort Jerusalem. The king of Babylon stands at the fork in the road and he decides by divination which of the two roads to take. He draws straws, he throws god-dice, he examines a goat liver. He opens his right hand: The omen says, ‘Head for Jerusalem!’ So he’s on his way with battering rams, roused to kill, sounding the battle cry, pounding down city gates, building siege works.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “To the Judah leaders, who themselves have sworn oaths, it will seem like a false divination, but he will remind them of their guilt, and so they’ll be captured.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“So this is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: ‘Because your sin is now out in the open so everyone can see what you’ve been doing, you’ll be taken captive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: '“‘O Zedekiah, blasphemous and evil prince of Israel: Time’s up. It’s “punishment payday.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says, Take your royal crown off your head. No more “business as usual.” The underdog will be promoted and the top dog will be demoted. Ruins, ruins, ruins! I’ll turn the whole place into ruins. And ruins it will remain until the one comes who has a right to it. Then I’ll give it to him.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-32
  - type: text
    text: '“But, son of man, your job is to prophesy. Tell them, ‘This is the Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, against the Ammonites and against their cruel taunts:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘A sword! A sword!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Bared to kill,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sharp as a razor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flashing like lightning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Despite false sword propaganda
- type: usfm
  marker: q2
  children:
  - type: text
    text: circulated in Ammon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sword will sever Ammonite necks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for whom it’s punishment payday.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return the sword to the sheath! I’ll judge you in your home country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the land where you grew up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll empty out my wrath on you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: breathe hot anger down your neck.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll give you to vicious men
- type: usfm
  marker: q2
  children:
  - type: text
    text: skilled in torture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll end up as stove-wood.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Corpses will litter your land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not so much as a memory will be left of you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', have said so.’”'
