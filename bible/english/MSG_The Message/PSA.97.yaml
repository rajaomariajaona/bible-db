document_id: PSA.97,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' rules: '
  - type: text
    content: 'there’s '
  - type: text
    content: something to shout over!
  - type: text
    content: On the double, mainlands and islands—celebrate!
  '10':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' loves all who hate evil,'
  - type: text
    content: And those who love him he keeps safe,
  - type: text
    content: Snatches them from the grip of the wicked.
  '11':
  - type: text
    content: Light-seeds are planted in the souls of God’s people,
  - type: text
    content: Joy-seeds are planted in good heart-soil.
  '12':
  - type: text
    content: 'So, God’s people, shout praise to '
  - type: text
    content: God,
  - type: text
    content: Give thanks to our Holy God!
  '2':
  - type: text
    content: Bright clouds and storm clouds circle ’round him;
  - type: text
    content: Right and justice anchor his rule.
  '3':
  - type: text
    content: Fire blazes out before him,
  - type: text
    content: Flaming high up the craggy mountains.
  '4':
  - type: text
    content: His lightnings light up the world;
  - type: text
    content: Earth, wide-eyed, trembles in fear.
  '5':
  - type: text
    content: 'The mountains take one look at '
  - type: text
    content: God
  - type: text
    content: And melt, melt like wax before earth’s Lord.
  '6':
  - type: text
    content: The heavens announce that he’ll set everything right,
  - type: text
    content: And everyone will see it happen—glorious!
  '7':
  - type: text
    content: All who serve handcrafted gods will be sorry—
  - type: text
    content: And they were so proud of their ragamuffin gods!
  - type: text
    content: On your knees, all you gods—worship him!
  - type: text
    content: And Zion, you listen and take heart!
  - type: text
    content: 'Daughters of Zion, sing your hearts out:'
  - type: text
    content: God
  - type: text
    content: ' has done it all, has set everything right.'
  '9':
  - type: text
    content: 'You, '
  - type: text
    content: God
  - type: text
    content: ', are High God of the cosmos,'
  - type: text
    content: Far, far higher than any of the gods.
