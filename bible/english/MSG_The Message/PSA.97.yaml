document_id: PSA.97
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' rules: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'there’s '
  - type: text
    text: something to shout over!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the double, mainlands and islands—celebrate!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Bright clouds and storm clouds circle ’round him;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Right and justice anchor his rule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fire blazes out before him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Flaming high up the craggy mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His lightnings light up the world;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth, wide-eyed, trembles in fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The mountains take one look at '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
- type: usfm
  marker: q1
  children:
  - type: text
    text: And melt, melt like wax before earth’s Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The heavens announce that he’ll set everything right,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And everyone will see it happen—glorious!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: All who serve handcrafted gods will be sorry—
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they were so proud of their ragamuffin gods!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On your knees, all you gods—worship him!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Zion, you listen and take heart!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Daughters of Zion, sing your hearts out:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done it all, has set everything right.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', are High God of the cosmos,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Far, far higher than any of the gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' loves all who hate evil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: And those who love him he keeps safe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Snatches them from the grip of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Light-seeds are planted in the souls of God’s people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joy-seeds are planted in good heart-soil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So, God’s people, shout praise to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give thanks to our Holy God!
