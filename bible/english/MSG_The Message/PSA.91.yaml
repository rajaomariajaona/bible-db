document_id: PSA.91,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who sit down in the High God’s presence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spend the night in Shaddai’s shadow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Say this: “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you’re my refuge.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I trust in you and I’m safe!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s right—he rescues you from hidden traps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shields you from deadly hazards.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His huge outstretched arms protect you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: under them you’re perfectly safe;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his arms fend off all harm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear nothing—not wild wolves in the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not flying arrows in the day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not disease that prowls through the darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not disaster that erupts at high noon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though others succumb all around,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: drop like flies right and left,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no harm will even graze you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll stand untouched, watch it all from a distance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: watch the wicked turn into corpses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s your refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the High God your very own home,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil can’t get close to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: harm can’t get through the door.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He ordered his angels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to guard you wherever you go.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you stumble, they’ll catch you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their job is to keep you from falling.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll walk unharmed among lions and snakes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and kick young lions and serpents from the path.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“If you’ll hold on to me for dear life,” says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I’ll get you out of any trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll give you the best of care
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you’ll only get to know and trust me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call me and I’ll answer, be at your side in bad times;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll rescue you, then throw you a party.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll give you a long life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give you a long drink of salvation!”
