document_id: PSA.91,97
type_code: eng
verses:
  '1':
  - type: text
    content: You who sit down in the High God’s presence,
  - type: text
    content: spend the night in Shaddai’s shadow,
  - type: text
    content: 'Say this: “'
  - type: text
    content: God
  - type: text
    content: ', you’re my refuge.'
  - type: text
    content: I trust in you and I’m safe!”
  - type: text
    content: That’s right—he rescues you from hidden traps,
  - type: text
    content: shields you from deadly hazards.
  - type: text
    content: His huge outstretched arms protect you—
  - type: text
    content: under them you’re perfectly safe;
  - type: text
    content: his arms fend off all harm.
  - type: text
    content: Fear nothing—not wild wolves in the night,
  - type: text
    content: not flying arrows in the day,
  - type: text
    content: Not disease that prowls through the darkness,
  - type: text
    content: not disaster that erupts at high noon.
  - type: text
    content: Even though others succumb all around,
  - type: text
    content: drop like flies right and left,
  - type: text
    content: no harm will even graze you.
  - type: text
    content: You’ll stand untouched, watch it all from a distance,
  - type: text
    content: watch the wicked turn into corpses.
  - type: text
    content: 'Yes, because '
  - type: text
    content: God
  - type: text
    content: ’s your refuge,
  - type: text
    content: the High God your very own home,
  - type: text
    content: Evil can’t get close to you,
  - type: text
    content: harm can’t get through the door.
  - type: text
    content: He ordered his angels
  - type: text
    content: to guard you wherever you go.
  - type: text
    content: If you stumble, they’ll catch you;
  - type: text
    content: their job is to keep you from falling.
  - type: text
    content: You’ll walk unharmed among lions and snakes,
  - type: text
    content: and kick young lions and serpents from the path.
  '14':
  - type: text
    content: '“If you’ll hold on to me for dear life,” says '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: “I’ll get you out of any trouble.
  - type: text
    content: I’ll give you the best of care
  - type: text
    content: if you’ll only get to know and trust me.
  - type: text
    content: Call me and I’ll answer, be at your side in bad times;
  - type: text
    content: I’ll rescue you, then throw you a party.
  - type: text
    content: I’ll give you a long life,
  - type: text
    content: give you a long drink of salvation!”
