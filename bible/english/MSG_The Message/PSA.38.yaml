document_id: PSA.38,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Take a deep breath, '
  - type: text
    content: God
  - type: text
    content: ; calm down—
  - type: text
    content: don’t be so hasty with your punishing rod.
  - type: text
    content: Your sharp-pointed arrows of rebuke draw blood;
  - type: text
    content: my backside stings from your discipline.
  '17':
  - type: text
    content: I’m on the edge of losing it—
  - type: text
    content: the pain in my gut keeps burning.
  - type: text
    content: I’m ready to tell my story of failure,
  - type: text
    content: I’m no longer smug in my sin.
  - type: text
    content: My enemies are alive and in action,
  - type: text
    content: a lynch mob after my neck.
  - type: text
    content: I give out good and get back evil
  - type: text
    content: from God-haters who can’t stand a God-lover.
  '21':
  - type: text
    content: 'Don’t dump me, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: my God, don’t stand me up.
  - type: text
    content: Hurry and help me;
  - type: text
    content: I want some wide-open space in my life!
  '3':
  - type: text
    content: I’ve lost twenty pounds in two months
  - type: text
    content: because of your accusation.
  - type: text
    content: My bones are brittle as dry sticks
  - type: text
    content: because of my sin.
  - type: text
    content: I’m swamped by my bad behavior,
  - type: text
    content: collapsed under an avalanche of guilt.
  '5':
  - type: text
    content: The cuts in my flesh stink and grow maggots
  - type: text
    content: because I’ve lived so badly.
  - type: text
    content: And now I’m flat on my face
  - type: text
    content: feeling sorry for myself morning to night.
  - type: text
    content: All my insides are on fire,
  - type: text
    content: my body is a wreck.
  - type: text
    content: I’m on my last legs; I’ve had it—
  - type: text
    content: my life is a vomit of groans.
  '9':
  - type: text
    content: Lord, my longings are sitting in plain sight,
  - type: text
    content: my groans an old story to you.
  - type: text
    content: My heart’s about to break;
  - type: text
    content: I’m a burned-out case.
  - type: text
    content: Cataracts blind me to God and good;
  - type: text
    content: old friends avoid me like the plague.
  - type: text
    content: My cousins never visit,
  - type: text
    content: my neighbors stab me in the back.
  - type: text
    content: My competitors blacken my name,
  - type: text
    content: devoutly they pray for my ruin.
  - type: text
    content: But I’m deaf and mute to it all,
  - type: text
    content: ears shut, mouth shut.
  - type: text
    content: I don’t hear a word they say,
  - type: text
    content: don’t speak a word in response.
  - type: text
    content: 'What I do, '
  - type: text
    content: God
  - type: text
    content: ', is wait for you,'
  - type: text
    content: 'wait for my Lord, my God—you '
  - type: text
    content: will
  - type: text
    content: ' answer!'
  - type: text
    content: I wait and pray so they won’t laugh me off,
  - type: text
    content: won’t smugly strut off when I stumble.
