  - type: text
    text: 'Take a deep breath, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ; calm down—
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t be so hasty with your punishing rod.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sharp-pointed arrows of rebuke draw blood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my backside stings from your discipline.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: I’ve lost twenty pounds in two months
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of your accusation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My bones are brittle as dry sticks
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of my sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m swamped by my bad behavior,
- type: usfm
  marker: q2
  children:
  - type: text
    text: collapsed under an avalanche of guilt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: The cuts in my flesh stink and grow maggots
- type: usfm
  marker: q2
  children:
  - type: text
    text: because I’ve lived so badly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now I’m flat on my face
- type: usfm
  marker: q2
  children:
  - type: text
    text: feeling sorry for myself morning to night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All my insides are on fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body is a wreck.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m on my last legs; I’ve had it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: my life is a vomit of groans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-16
  - type: text
    text: Lord, my longings are sitting in plain sight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my groans an old story to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart’s about to break;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m a burned-out case.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cataracts blind me to God and good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: old friends avoid me like the plague.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My cousins never visit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my neighbors stab me in the back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My competitors blacken my name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: devoutly they pray for my ruin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I’m deaf and mute to it all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ears shut, mouth shut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I don’t hear a word they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t speak a word in response.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'What I do, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', is wait for you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'wait for my Lord, my God—you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' answer!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I wait and pray so they won’t laugh me off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: won’t smugly strut off when I stumble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-20
  - type: text
    text: I’m on the edge of losing it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pain in my gut keeps burning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m ready to tell my story of failure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m no longer smug in my sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My enemies are alive and in action,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lynch mob after my neck.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I give out good and get back evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: from God-haters who can’t stand a God-lover.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'Don’t dump me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God, don’t stand me up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hurry and help me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I want some wide-open space in my life!
