document_id: JER.34,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Freedom to the Slaves
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message to Jeremiah at the time King Nebuchadnezzar of Babylon mounted an all-out attack on Jerusalem and all the towns around it with his armies and allies and everyone he could muster:'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But a little while later, they reneged on the covenant, broke their promise and forced their former slaves to become slaves again.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: 'Then Jeremiah received this Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, says, ‘I made a covenant with your ancestors when I delivered them out of their slavery in Egypt. At the time I made it clear: “At the end of seven years, each of you must free any fellow Hebrew who has had to sell himself to you. After he has served six years, set him free.” But your ancestors totally ignored me.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: '“‘And now, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: —what have you done? First you turned back to the right way and did the right thing, decreeing freedom for your brothers and sisters—and you made it official in a solemn covenant in my Temple. And then you turned right around and broke your word, making a mockery of both me and the covenant, and made them all slaves again, these men and women you’d just set free. You forced them back into slavery.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-20
    - type: text
      text: '“‘So here is what I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', have to say: You have not obeyed me and set your brothers and sisters free. Here is what I’m going to do: I’m going to set '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' free—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree—free to get killed in war or by disease or by starvation. I’ll make you a spectacle of horror. People all over the world will take one look at you and shudder. Everyone who violated my covenant, who didn’t do what was solemnly promised in the covenant ceremony when they split the young bull into two halves and walked between them, all those people that day who walked between the two halves of the bull—leaders of Judah and Jerusalem, palace officials, priests, and all the rest of the people—I’m handing the lot of them over to their enemies who are out to kill them. Their dead bodies will be carrion food for vultures and stray dogs.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, direct you to go and tell Zedekiah king of Judah: ‘This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Message. Listen to me. I am going to hand this city over to the king of Babylon, and he is going to burn it to the ground. And don’t think you’ll get away. You’ll be captured and be his prisoner. You will have a personal confrontation with the king of Babylon and be taken off with him, captive, to Babylon.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: '“‘As for Zedekiah king of Judah and his palace staff, I’ll also hand them over to their enemies, who are out to kill them. The army of the king of Babylon has pulled back for a time, but not for long, for I’m going to issue orders that will bring them back to this city. They’ll attack and take it and burn it to the ground. The surrounding cities of Judah will fare no better. I’ll turn them into ghost towns, unlivable and unlived in.’” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: '“‘But listen, O Zedekiah king of Judah, to the rest of the Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. You won’t be killed. You’ll die a peaceful death. They will honor you with funeral rites as they honored your ancestors, the kings who preceded you. They will properly mourn your death, weeping, “Master, master!” This is a solemn promise. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.’”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: The prophet Jeremiah gave this Message to Zedekiah king of Judah in Jerusalem, gave it to him word for word. It was at the very time that the king of Babylon was mounting his all-out attack on Jerusalem and whatever cities in Judah that were still standing—only Lachish and Azekah, as it turned out (they were the only fortified cities left in Judah).
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' delivered a Message to Jeremiah after King Zedekiah made a covenant with the people of Jerusalem to decree freedom to the slaves who were Hebrews, both men and women. The covenant stipulated that no one in Judah would own a fellow Jew as a slave. All the leaders and people who had signed the covenant set free the slaves, men and women alike.'
