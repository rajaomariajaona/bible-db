document_id: GEN.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'When Abram was ninety-nine years old, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' showed up and said to him, “I am The Strong God, live entirely before me, live to the hilt! I’ll make a covenant between us and I’ll give you a huge family.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-8
  - type: text
    text: Overwhelmed, Abram fell flat on his face.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then God said to him, “This is my covenant with you: You’ll be the father of many nations. Your name will no longer be Abram, but Abraham, meaning that ‘I’m making you the father of many nations.’ I’ll make you a father of fathers—I’ll make nations from you, kings will issue from you. I’m establishing my covenant between me and you, a covenant that includes your descendants, a covenant that goes on and on and on, a covenant that commits me to be your God and the God of your descendants. And I’m giving you and your descendants this land where you’re now just camping, this whole country of Canaan, to own forever. And I’ll be their God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-14
  - type: text
    text: 'God continued to Abraham, “And you: You will honor my covenant, you and your descendants, generation after generation. This is the covenant that you are to honor, the covenant that pulls in all your descendants: Circumcise every male. Circumcise by cutting off the foreskin of the penis; it will be the sign of the covenant between us. Every male baby will be circumcised when he is eight days old, generation after generation—this includes house-born slaves and slaves bought from outsiders who are not blood kin. Make sure you circumcise both your own children and anyone brought in from the outside. That way my covenant will be cut into your body, a permanent mark of my permanent covenant. An uncircumcised male, one who has not had the foreskin of his penis cut off, will be cut off from his people—he has broken my covenant.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'God continued speaking to Abraham, “And Sarai your wife: Don’t call her Sarai any longer; call her Sarah. I’ll bless her—yes! I’ll give you a son by her! Oh, how I’ll bless her! Nations will come from her; kings of nations will come from her.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Abraham fell flat on his face. And then he laughed, thinking, “Can a hundred-year-old man father a son? And can Sarah, at ninety years, have a baby?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Recovering, Abraham said to God, “Oh, keep Ishmael alive and well before you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But God said, “That’s not what I mean. Your wife, Sarah, will have a baby, a son. Name him Isaac (Laughter). I’ll establish my covenant with him and his descendants, a covenant that lasts forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: “And Ishmael? Yes, I heard your prayer for him. I’ll also bless him; I’ll make sure he has plenty of children—a huge family. He’ll father twelve princes; I’ll make him a great nation. But I’ll establish my covenant with Isaac whom Sarah will give you about this time next year.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: God finished speaking with Abraham and left.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Abraham took his son Ishmael and all his servants, whether houseborn or purchased—every male in his household—and circumcised them, cutting off their foreskins that very day, just as God had told him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-27
  - type: text
    text: Abraham was ninety-nine years old when he was circumcised. His son Ishmael was thirteen years old when he was circumcised. Abraham and Ishmael were circumcised the same day together with all the servants of his household, those born there and those purchased from outsiders—all were circumcised with him.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
