document_id: PSA.145
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I lift you high in praise, my God, O my King!
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I’ll bless your name into eternity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I’ll bless you every day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep it up from now to eternity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is magnificent; he can never be praised enough.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: There are no boundaries to his greatness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Generation after generation stands in awe of your work;
- type: usfm
  marker: q2
  children:
  - type: text
    text: each one tells stories of your mighty acts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Your beauty and splendor have everyone talking;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I compose songs on your wonders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Your marvelous doings are headline news;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could write a book full of the details of your greatness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The fame of your goodness spreads across the country;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your righteousness is on everyone’s lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is all mercy and grace—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: not quick to anger, is rich in love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is good to one and all;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything he does is soaked through with grace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'Creation and creatures applaud you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your holy people bless you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They talk about the glories of your rule,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they exclaim over your splendor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Letting the world know of your power for good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the lavish splendor of your kingdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your kingdom is a kingdom eternal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you never get voted out of office.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' always does what he says,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and is gracious in everything he does.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gives a hand to those down on their luck,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: gives a fresh start to those ready to quit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: All eyes are on you, expectant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you give them their meals on time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Generous to a fault,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you lavish your favor on all creatures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Everything '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God '
  - type: text
    text: does is right—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the trademark on all his works is love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s there, listening for all who pray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all who pray and mean it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He does what’s best for those who fear him—
- type: usfm
  marker: q2
  children:
  - type: text
    text: hears them call out, and saves them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' sticks by all who love him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it’s all over for those who don’t.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'My mouth is filled with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s praise.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let everything living bless him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bless his holy name from now to eternity!
