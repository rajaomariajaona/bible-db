document_id: PSA.145,97
type_code: eng
verses:
  '1':
  - type: text
    content: I lift you high in praise, my God, O my King!
  - type: text
    content: and I’ll bless your name into eternity.
  '10':
  - type: text
    content: 'Creation and creatures applaud you, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: your holy people bless you.
  - type: text
    content: They talk about the glories of your rule,
  - type: text
    content: they exclaim over your splendor,
  '12':
  - type: text
    content: Letting the world know of your power for good,
  - type: text
    content: the lavish splendor of your kingdom.
  '13':
  - type: text
    content: Your kingdom is a kingdom eternal;
  - type: text
    content: you never get voted out of office.
  - type: text
    content: God
  - type: text
    content: ' always does what he says,'
  - type: text
    content: and is gracious in everything he does.
  '14':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' gives a hand to those down on their luck,'
  - type: text
    content: gives a fresh start to those ready to quit.
  '15':
  - type: text
    content: All eyes are on you, expectant;
  - type: text
    content: you give them their meals on time.
  '16':
  - type: text
    content: Generous to a fault,
  - type: text
    content: you lavish your favor on all creatures.
  '17':
  - type: text
    content: 'Everything '
  - type: text
    content: 'God '
  - type: text
    content: does is right—
  - type: text
    content: the trademark on all his works is love.
  '18':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s there, listening for all who pray,
  - type: text
    content: for all who pray and mean it.
  '19':
  - type: text
    content: He does what’s best for those who fear him—
  - type: text
    content: hears them call out, and saves them.
  '2':
  - type: text
    content: I’ll bless you every day,
  - type: text
    content: and keep it up from now to eternity.
  '20':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' sticks by all who love him,'
  - type: text
    content: but it’s all over for those who don’t.
  '21':
  - type: text
    content: 'My mouth is filled with '
  - type: text
    content: God
  - type: text
    content: ’s praise.
  - type: text
    content: Let everything living bless him,
  - type: text
    content: bless his holy name from now to eternity!
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is magnificent; he can never be praised enough.'
  - type: text
    content: There are no boundaries to his greatness.
  '4':
  - type: text
    content: Generation after generation stands in awe of your work;
  - type: text
    content: each one tells stories of your mighty acts.
  '5':
  - type: text
    content: Your beauty and splendor have everyone talking;
  - type: text
    content: I compose songs on your wonders.
  '6':
  - type: text
    content: Your marvelous doings are headline news;
  - type: text
    content: I could write a book full of the details of your greatness.
  '7':
  - type: text
    content: The fame of your goodness spreads across the country;
  - type: text
    content: your righteousness is on everyone’s lips.
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is all mercy and grace—'
  - type: text
    content: not quick to anger, is rich in love.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is good to one and all;'
  - type: text
    content: everything he does is soaked through with grace.
