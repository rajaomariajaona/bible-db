  - type: text
    text: God! Please hurry to my rescue!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', come quickly to my side!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who are out to get me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them fall all over themselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who relish my downfall—
- type: usfm
  marker: q2
  children:
  - type: text
    text: send them down a blind alley.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give them a taste of their own medicine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those gossips off clucking their tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let those on the hunt for you
- type: usfm
  marker: q2
  children:
  - type: text
    text: sing and celebrate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all who love your saving way
- type: usfm
  marker: q2
  children:
  - type: text
    text: say over and over, “God is mighty!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But I’ve lost it. I’m wasted.
- type: usfm
  marker: q2
  children:
  - type: text
    text: God—quickly, quickly!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quick to my side, quick to my rescue!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', don’t lose a minute.'
