document_id: PSA.70,97
type_code: eng
verses:
  '1':
  - type: text
    content: God! Please hurry to my rescue!
  - type: text
    content: God
  - type: text
    content: ', come quickly to my side!'
  - type: text
    content: Those who are out to get me—
  - type: text
    content: let them fall all over themselves.
  - type: text
    content: Those who relish my downfall—
  - type: text
    content: send them down a blind alley.
  - type: text
    content: Give them a taste of their own medicine,
  - type: text
    content: those gossips off clucking their tongues.
  '4':
  - type: text
    content: Let those on the hunt for you
  - type: text
    content: sing and celebrate.
  - type: text
    content: Let all who love your saving way
  - type: text
    content: say over and over, “God is mighty!”
  '5':
  - type: text
    content: But I’ve lost it. I’m wasted.
  - type: text
    content: God—quickly, quickly!
  - type: text
    content: Quick to my side, quick to my rescue!
  - type: text
    content: God
  - type: text
    content: ', don’t lose a minute.'
