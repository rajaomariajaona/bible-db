document_id: JHN.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Thorn Crown of the King
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: So Pilate took Jesus and had him whipped. The soldiers, having braided a crown from thorns, set it on his head, threw a purple robe over him, and approached him with, “Hail, King of the Jews!” Then they greeted him with slaps in the face.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Pilate went back out again and said to them, “I present him to you, but I want you to know that I do not find him guilty of any crime.” Just then Jesus came out wearing the thorn crown and purple robe.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Pilate announced, “Here he is: the Man.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When the high priests and police saw him, they shouted in a frenzy, “Crucify! Crucify!”
- type: usfm
  marker: p
  children:
  - type: text
    text: Pilate told them, “You take him. You crucify him. I find nothing wrong with him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The Jews answered, “We have a law, and by that law he must die because he claimed to be the Son of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: When Pilate heard this, he became even more scared. He went back into the palace and said to Jesus, “Where did you come from?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Jesus gave no answer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pilate said, “You won’t talk? Don’t you know that I have the authority to pardon you, and the authority to—crucify you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jesus said, “You haven’t a shred of authority over me except what has been given you from heaven. That’s why the one who betrayed me to you has committed a far greater fault.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'At this, Pilate tried his best to pardon him, but the Jews shouted him down: “If you pardon this man, you’re no friend of Caesar’s. Anyone setting himself up as ‘king’ defies Caesar.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'When Pilate heard those words, he led Jesus outside. He sat down at the judgment seat in the area designated Stone Court (in Hebrew, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Gabbatha
  - type: text
    text: ). It was the preparation day for Passover. The hour was noon. Pilate said to the Jews, “Here is your king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They shouted back, “Kill him! Kill him! Crucify him!”
- type: usfm
  marker: p
  children:
  - type: text
    text: Pilate said, “I am to crucify your king?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The high priests answered, “We have no king except Caesar.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19
  - type: text
    text: Pilate caved in to their demand. He turned him over to be crucified.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: text
    text: 'They took Jesus away. Carrying his cross, Jesus went out to the place called Skull Hill (the name in Hebrew is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Golgotha
  - type: text
    text: '), where they crucified him, and with him two others, one on each side, Jesus in the middle. Pilate wrote a sign and had it placed on the cross. It read:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'jesus the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: nazarene
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'king of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: jews.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Many of the Jews read the sign because the place where Jesus was crucified was right next to the city. It was written in Hebrew, Latin, and Greek. The Jewish high priests objected. “Don’t write,” they said to Pilate, “‘The King of the Jews.’ Make it, ‘This man said, “I am the King of the Jews.”’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pilate said, “What I’ve written, I’ve written.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24a
  - type: text
    text: ' When they crucified him, the Roman soldiers took his clothes and divided them up four ways, to each soldier a fourth. But his robe was seamless, a single piece of weaving, so they said to each other, “Let’s not tear it up. Let’s throw dice to see who gets it.” This confirmed the Scripture that said, “They divided up my clothes among them and threw dice for my coat.” (The soldiers validated the Scriptures!)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24b-27
  - type: text
    text: ' While the soldiers were looking after themselves, Jesus’ mother, his aunt, Mary the wife of Clopas, and Mary Magdalene stood at the foot of the cross. Jesus saw his mother and the disciple he loved standing near her. He said to his mother, “Woman, here is your son.” Then to the disciple, “Here is your mother.” From that moment the disciple accepted her as his own mother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Jesus, seeing that everything had been completed so that the Scripture record might also be complete, then said, “I’m thirsty.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: A jug of sour wine was standing by. Someone put a sponge soaked with the wine on a javelin and lifted it to his mouth. After he took the wine, Jesus said, “It’s done . . . complete.” Bowing his head, he offered up his spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-34
  - type: text
    text: Then the Jews, since it was the day of Sabbath preparation, and so the bodies wouldn’t stay on the crosses over the Sabbath (it was a high holy day that year), petitioned Pilate that their legs be broken to speed death, and the bodies taken down. So the soldiers came and broke the legs of the first man crucified with Jesus, and then the other. When they got to Jesus, they saw that he was already dead, so they didn’t break his legs. One of the soldiers stabbed him in the side with his spear. Blood and water gushed out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The eyewitness to these things has presented an accurate report. He saw it himself and is telling the truth so that you, also, will believe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: These things that happened confirmed the Scripture, “Not a bone in his body was broken,” and the other Scripture that reads, “They will stare at the one they pierced.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: After all this, Joseph of Arimathea (he was a disciple of Jesus, but secretly, because he was intimidated by the Jews) petitioned Pilate to take the body of Jesus. Pilate gave permission. So Joseph came and took the body.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-42
  - type: text
    text: Nicodemus, who had first come to Jesus at night, came now in broad daylight carrying a mixture of myrrh and aloes, about seventy-five pounds. They took Jesus’ body and, following the Jewish burial custom, wrapped it in linen with the spices. There was a garden near the place he was crucified, and in the garden a new tomb in which no one had yet been placed. So, because it was Sabbath preparation for the Jews and the tomb was convenient, they placed Jesus in it.
