type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day Dinah, the daughter Leah had given Jacob, went to visit some of the women in that country. Shechem, the son of Hamor the Hivite who was chieftain there, saw her and raped her. Then he felt a strong attraction to Dinah, Jacob’s daughter, fell in love with her, and wooed her. Shechem went to his father Hamor, “Get me this girl for my wife.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shechem then spoke for himself, addressing Dinah’s father and brothers: “Please, say yes. I’ll pay anything. Set the bridal price as high as you will—the sky’s the limit! Only give me this girl for my wife.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob’s sons answered Shechem and his father with cunning. Their sister, after all, had been raped. They said, “This is impossible. We could never give our sister to a man who was uncircumcised. Why, we’d be disgraced. The only condition on which we can talk business is if all your men become circumcised like us. Then we will freely exchange daughters in marriage and make ourselves at home among you and become one big, happy family. But if this is not an acceptable condition, we will take our sister and leave.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That seemed fair enough to Hamor and his son Shechem.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The young man was so smitten with Jacob’s daughter that he proceeded to do what had been asked. He was also the most admired son in his father’s family.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Hamor and his son Shechem went to the public square and spoke to the town council: “These men like us; they are our friends. Let them settle down here and make themselves at home; there’s plenty of room in the country for them. And, just think, we can even exchange our daughters in marriage. But these men will only accept our invitation to live with us and become one big family on one condition, that all our males become circumcised just as they themselves are. This is a very good deal for us—these people are very wealthy with great herds of livestock and we’re going to get our hands on it. So let’s do what they ask and have them settle down with us.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone who was anyone in the city agreed with Hamor and his son, Shechem; every male was circumcised.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Three days after the circumcision, while all the men were still very sore, two of Jacob’s sons, Simeon and Levi, Dinah’s brothers, each with his sword in hand, walked into the city as if they owned the place and murdered every man there. They also killed Hamor and his son Shechem, rescued Dinah from Shechem’s house, and left. When the rest of Jacob’s sons came on the scene of slaughter, they looted the entire city in retaliation for Dinah’s rape. Flocks, herds, donkeys, belongings—everything, whether in the city or the fields—they took. And then they took all the wives and children captive and ransacked their homes for anything valuable.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob said to Simeon and Levi, “You’ve made my name repulsive to the people here, these Canaanites and Perizzites. If they decided to gang up on us and attack, as few as we are we wouldn’t stand a chance; they’d wipe me and my people right off the map.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “Nobody is going to treat our sister like a whore and get by with it.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob heard that Shechem had raped his daughter Dinah, but his sons were out in the fields with the livestock so he didn’t say anything until they got home. Hamor, Shechem’s father, went to Jacob to work out marriage arrangements. Meanwhile Jacob’s sons on their way back from the fields heard what had happened. They were outraged, explosive with anger. Shechem’s rape of Jacob’s daughter was intolerable in Israel and not to be put up with.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hamor spoke with Jacob and his sons, “My son Shechem is head over heels in love with your daughter—give her to him as his wife. Intermarry with us. Give your daughters to us and we’ll give our daughters to you. Live together with us as one family. Settle down among us and make yourselves at home. Prosper among us.”
