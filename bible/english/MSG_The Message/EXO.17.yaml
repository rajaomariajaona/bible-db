  - type: text
    content: ', the whole company of Israel moved on by stages from the Wilderness of Sin. They set camp at Rephidim. And there wasn’t a drop of water for the people to drink. The people took Moses to task: “Give us water to drink.” But Moses said, “Why pester me? Why are you testing '
  - type: text
