document_id: EXO.17,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Directed by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the whole company of Israel moved on by stages from the Wilderness of Sin. They set camp at Rephidim. And there wasn’t a drop of water for the people to drink. The people took Moses to task: “Give us water to drink.” But Moses said, “Why pester me? Why are you testing '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joshua did what Moses ordered in order to fight Amalek. And Moses, Aaron, and Hur went to the top of the hill. It turned out that whenever Moses raised his hands, Israel was winning, but whenever he lowered his hands, Amalek was winning. But Moses’ hands got tired. So they got a stone and set it under him. He sat on it and Aaron and Hur held up his hands, one on each side. So his hands remained steady until the sun went down. Joshua defeated Amalek and its army in battle.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Write this up as a reminder to Joshua, to keep it before him, because I will most certainly wipe the very memory of Amalek off the face of the Earth.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses built an altar and named it “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' My Banner.” He said,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Salute '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s rule!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' at war with Amalek'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Always and forever!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people were thirsty for water there. They complained to Moses, “Why did you take us from Egypt and drag us out here with our children and animals to die of thirst?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses cried out in prayer to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', “What can I do with these people? Any minute now they’ll kill me!”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Go on out ahead of the people, taking with you some of the elders of Israel. Take the staff you used to strike the Nile. And go. I’m going to be present before you there on the rock at Horeb. You are to strike the rock. Water will gush out of it and the people will drink.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' Moses did what he said, with the elders of Israel right there watching. He named the place Massah (Testing-Place) and Meribah (Quarreling) because of the quarreling of the Israelites and because of their testing of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' when they said, “Is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' here with us, or not?”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amalek came and fought Israel at Rephidim. Moses ordered Joshua: “Select some men for us and go out and fight Amalek. Tomorrow I will take my stand on top of the hill holding God’s staff.”'
