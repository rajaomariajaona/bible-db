  '3':
  - type: text
    content: But the people were thirsty for water there. They complained to Moses, “Why did you take us from Egypt and drag us out here with our children and animals to die of thirst?”
  '4':
  - type: text
    content: 'Moses cried out in prayer to '
  - type: text
    content: God
  - type: text
    content: ', “What can I do with these people? Any minute now they’ll kill me!”'
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Go on out ahead of the people, taking with you some of the elders of Israel. Take the staff you used to strike the Nile. And go. I’m going to be present before you there on the rock at Horeb. You are to strike the rock. Water will gush out of it and the people will drink.”'
  '6':
  - type: text
    content: ' Moses did what he said, with the elders of Israel right there watching. He named the place Massah (Testing-Place) and Meribah (Quarreling) because of the quarreling of the Israelites and because of their testing of '
  - type: text
    content: God
  - type: text
    content: ' when they said, “Is '
  - type: text
    content: God
  - type: text
    content: ' here with us, or not?”'
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: 'Amalek came and fought Israel at Rephidim. Moses ordered Joshua: “Select some men for us and go out and fight Amalek. Tomorrow I will take my stand on top of the hill holding God’s staff.”'
