document_id: PRO.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Way That Leads to Hell
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lady Wisdom builds a lovely home;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sir Fool comes along and tears it down brick by brick.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'An honest life shows respect for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a degenerate life is a slap in his face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Frivolous talk provokes a derisive smile;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wise speech evokes nothing but respect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: No cattle, no crops;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a good harvest requires a strong ox for the plow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A true witness never lies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a false witness makes a business of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cynics look high and low for wisdom—and never find it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the open-minded find it right on their doorstep!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Escape quickly from the company of fools;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’re a waste of your time, a waste of your words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The wisdom of the wise keeps life on track;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the foolishness of fools lands them in the ditch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The stupid ridicule right and wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a moral life is a favored life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The person who shuns the bitter moments of friends
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be an outsider at their celebrations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lives of careless wrongdoing are run-down shacks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: holy living builds soaring cathedrals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: There’s a way of life that looks harmless enough;
- type: usfm
  marker: q2
  children:
  - type: text
    text: look again—it leads straight to hell.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sure, those people appear to be having a good time,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but all that laughter will end in heartbreak.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sift and Weigh Every Word
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A mean person gets paid back in meanness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a gracious person in grace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The gullible believe anything they’re told;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the prudent sift and weigh every word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The wise watch their steps and avoid evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools are headstrong and reckless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The hotheaded do things they’ll later regret;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the coldhearted get the cold shoulder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Foolish dreamers live in a world of illusion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wise realists plant their feet on the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eventually, evil will pay tribute to good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked will respect God-loyal people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: An unlucky loser is shunned by all,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but everyone loves a winner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It’s criminal to ignore a neighbor in need,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but compassion for the poor—what a blessing!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Isn’t it obvious that conspirators lose out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while the thoughtful win love and trust?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hard work always pays off;
- type: usfm
  marker: q2
  children:
  - type: text
    text: mere talk puts no bread on the table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The wise accumulate wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools get stupider by the day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Souls are saved by truthful witness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and betrayed by the spread of lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' builds up confidence,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes a world safe for your children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The Fear-of-
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is a spring of living water'
- type: usfm
  marker: q2
  children:
  - type: text
    text: so you won’t go off drinking from poisoned wells.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The mark of a good leader is loyal followers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: leadership is nothing without a following.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Slowness to anger makes for deep understanding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a quick-tempered person stockpiles stupidity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A sound mind makes for a robust body,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but runaway emotions corrode the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: You insult your Maker when you exploit the powerless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you’re kind to the poor, you honor God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The evil of bad people leaves them out in the cold;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the integrity of good people creates a safe place for living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Lady Wisdom is at home in an understanding heart—
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools never even get to say hello.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: God-devotion makes a country strong;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God-avoidance leaves people weak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Diligent work gets a warm commendation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: shiftless work earns an angry rebuke.
