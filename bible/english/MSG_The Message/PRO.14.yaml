document_id: PRO.14,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A Way That Leads to Hell
  - type: text
    content: Lady Wisdom builds a lovely home;
  - type: text
    content: Sir Fool comes along and tears it down brick by brick.
  '10':
  - type: text
    content: The person who shuns the bitter moments of friends
  - type: text
    content: will be an outsider at their celebrations.
  '11':
  - type: text
    content: Lives of careless wrongdoing are run-down shacks;
  - type: text
    content: holy living builds soaring cathedrals.
  '12':
  - type: text
    content: There’s a way of life that looks harmless enough;
  - type: text
    content: look again—it leads straight to hell.
  - type: text
    content: Sure, those people appear to be having a good time,
  - type: text
    content: but all that laughter will end in heartbreak.
  - type: heading
    content: Sift and Weigh Every Word
  '14':
  - type: text
    content: A mean person gets paid back in meanness,
  - type: text
    content: a gracious person in grace.
  '15':
  - type: text
    content: The gullible believe anything they’re told;
  - type: text
    content: the prudent sift and weigh every word.
  '16':
  - type: text
    content: The wise watch their steps and avoid evil;
  - type: text
    content: fools are headstrong and reckless.
  '17':
  - type: text
    content: The hotheaded do things they’ll later regret;
  - type: text
    content: the coldhearted get the cold shoulder.
  '18':
  - type: text
    content: Foolish dreamers live in a world of illusion;
  - type: text
    content: wise realists plant their feet on the ground.
  '19':
  - type: text
    content: Eventually, evil will pay tribute to good;
  - type: text
    content: the wicked will respect God-loyal people.
  '2':
  - type: text
    content: 'An honest life shows respect for '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: a degenerate life is a slap in his face.
  '20':
  - type: text
    content: An unlucky loser is shunned by all,
  - type: text
    content: but everyone loves a winner.
  '21':
  - type: text
    content: It’s criminal to ignore a neighbor in need,
  - type: text
    content: but compassion for the poor—what a blessing!
  '22':
  - type: text
    content: Isn’t it obvious that conspirators lose out,
  - type: text
    content: while the thoughtful win love and trust?
  '23':
  - type: text
    content: Hard work always pays off;
  - type: text
    content: mere talk puts no bread on the table.
  '24':
  - type: text
    content: The wise accumulate wisdom;
  - type: text
    content: fools get stupider by the day.
  '25':
  - type: text
    content: Souls are saved by truthful witness
  - type: text
    content: and betrayed by the spread of lies.
  '26':
  - type: text
    content: The Fear-of-
  - type: text
    content: God
  - type: text
    content: ' builds up confidence,'
  - type: text
    content: and makes a world safe for your children.
  '27':
  - type: text
    content: The Fear-of-
  - type: text
    content: God
  - type: text
    content: ' is a spring of living water'
  - type: text
    content: so you won’t go off drinking from poisoned wells.
  '28':
  - type: text
    content: The mark of a good leader is loyal followers;
  - type: text
    content: leadership is nothing without a following.
  '29':
  - type: text
    content: Slowness to anger makes for deep understanding;
  - type: text
    content: a quick-tempered person stockpiles stupidity.
  '3':
  - type: text
    content: Frivolous talk provokes a derisive smile;
  - type: text
    content: wise speech evokes nothing but respect.
  '30':
  - type: text
    content: A sound mind makes for a robust body,
  - type: text
    content: but runaway emotions corrode the bones.
  '31':
  - type: text
    content: You insult your Maker when you exploit the powerless;
  - type: text
    content: when you’re kind to the poor, you honor God.
  '32':
  - type: text
    content: The evil of bad people leaves them out in the cold;
  - type: text
    content: the integrity of good people creates a safe place for living.
  '33':
  - type: text
    content: Lady Wisdom is at home in an understanding heart—
  - type: text
    content: fools never even get to say hello.
  '34':
  - type: text
    content: God-devotion makes a country strong;
  - type: text
    content: God-avoidance leaves people weak.
  '35':
  - type: text
    content: Diligent work gets a warm commendation;
  - type: text
    content: shiftless work earns an angry rebuke.
  '4':
  - type: text
    content: No cattle, no crops;
  - type: text
    content: a good harvest requires a strong ox for the plow.
  '5':
  - type: text
    content: A true witness never lies;
  - type: text
    content: a false witness makes a business of it.
  '6':
  - type: text
    content: Cynics look high and low for wisdom—and never find it;
  - type: text
    content: the open-minded find it right on their doorstep!
  '7':
  - type: text
    content: Escape quickly from the company of fools;
  - type: text
    content: they’re a waste of your time, a waste of your words.
  '8':
  - type: text
    content: The wisdom of the wise keeps life on track;
  - type: text
    content: the foolishness of fools lands them in the ditch.
  '9':
  - type: text
    content: The stupid ridicule right and wrong,
  - type: text
    content: but a moral life is a favored life.
