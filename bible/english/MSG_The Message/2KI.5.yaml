document_id: 2KI.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman was general of the army under the king of Aram. He was important to his master, who held him in the highest esteem because it was by him that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had given victory to Aram: a truly great man, but afflicted with a grievous skin disease. It so happened that Aram, on one of its raiding expeditions against Israel, captured a young girl who became a maid to Naaman’s wife. One day she said to her mistress, “Oh, if only my master could meet the prophet of Samaria, he would be healed of his skin disease.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha sent out a servant to meet him with this message: “Go to the River Jordan and immerse yourself seven times. Your skin will be healed and you’ll be as good as new.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman lost his temper. He spun around saying, “I thought he’d personally come out and meet me, call on the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', wave his hand over the diseased spot, and get rid of the disease. The Damascus rivers, Abana and Pharpar, are cleaner by far than any of the rivers in Israel. Why not bathe in them? I’d at least get clean.” He stomped off, mad as a hornet.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But his servants caught up with him and said, “Father, if the prophet had asked you to do something hard and heroic, wouldn’t you have done it? So why not this simple ‘wash and be clean’?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he did it. He went down and immersed himself in the Jordan seven times, following the orders of the Holy Man. His skin was healed; it was like the skin of a little baby. He was as good as new.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He then went back to the Holy Man, he and his entourage, stood before him, and said, “I now know beyond a shadow of a doubt that there is no God anywhere on earth other than the God of Israel. In gratitude let me give you a gift.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' lives,” Elisha replied, “the God whom I serve, I’ll take nothing from you.” Naaman tried his best to get him to take something, but he wouldn’t do it.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you won’t take anything,” said Naaman, “let me ask you for something: Give me a load of dirt, as much as a team of donkeys can carry, because I’m never again going to worship any god other than '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. But there’s one thing for which I need '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s pardon: When my master, leaning on my arm, enters the shrine of Rimmon and worships there, and I’m with him there, worshiping Rimmon, may you see to it that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' forgive me for this.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “Everything will be all right. Go in peace.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he hadn’t gone far when Gehazi, servant to Elisha the Holy Man, said to himself, “My master has let this Aramean Naaman slip through his fingers without so much as a thank-you. By the living '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', I’m going after him to get something or other from him!” And Gehazi took off after Naaman.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naaman saw him running after him and jumped down from his chariot to greet him, “Is something wrong?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Nothing’s wrong, but something’s come up. My master sent me to tell you: ‘Two young men just showed up from the hill country of Ephraim, brothers from the guild of the prophets. Supply their needs with a gift of 75 pounds of silver and a couple of sets of clothes.’”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naaman said, “Of course, how about 150 pounds?” Naaman insisted. He tied up the money in two sacks and gave him the two sets of clothes; he even gave him two servants to carry the gifts back with him.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they got to the fort on the hill, Gehazi took the gifts from the servants, stored them inside, then sent the servants back.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He returned and stood before his master. Elisha said, “So what have you been up to, Gehazi?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Nothing much,” he said.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said, “Didn’t you know I was with you in spirit when that man stepped down from his chariot to greet you? Tell me, is this a time to look after yourself, lining your pockets with gifts? Naaman’s skin disease will now infect you and your family, with no relief in sight.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gehazi walked away, his skin flaky and white like snow.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naaman went straight to his master and reported what the girl from Israel had said.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Well then, go,” said the king of Aram. “And I’ll send a letter of introduction to the king of Israel.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he went off, taking with him about 750 pounds of silver, 150 pounds of gold, and ten sets of clothes.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naaman delivered the letter to the king of Israel. The letter read, “When you get this letter, you’ll know that I’ve personally sent my servant Naaman to you; heal him of his skin disease.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the king of Israel read the letter, he was terribly upset, ripping his robe to pieces. He said, “Am I a god with the power to bring death or life that I get orders to heal this man from his disease? What’s going on here? That king’s trying to pick a fight, that’s what!”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha the man of God heard what had happened, that the king of Israel was so distressed that he’d ripped his robe to shreds. He sent word to the king, “Why are you so upset, ripping your robe like this? Send him to me so he’ll learn that there’s a prophet in Israel.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Naaman with his horses and chariots arrived in style and stopped at Elisha’s door.
