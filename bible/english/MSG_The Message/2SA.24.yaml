document_id: 2SA.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Once again '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anger blazed out against Israel. He tested David by telling him, “Go and take a census of Israel and Judah.” So David gave orders to Joab and the army officers under him, “Canvass all the tribes of Israel, from Dan to Beersheba, and get a count of the population. I want to know the number.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Joab resisted the king: “May your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' multiply people by the hundreds right before the eyes of my master the king, but why on earth would you do a thing like this?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-9
  - type: text
    text: 'Nevertheless, the king insisted, and so Joab and the army officers left the king to take a census of Israel. They crossed the Jordan and began with Aroer and the town in the canyon of the Gadites near Jazer, proceeded through Gilead, passed Hermon, then on to Dan, but detoured Sidon. They covered Fort Tyre and all the Hivite and Canaanite cities, and finally reached the Negev of Judah at Beersheba. They canvassed the whole country and after nine months and twenty days arrived back in Jerusalem. Joab gave the results of the census to the king: 800,000 able-bodied fighting men in Israel; in Judah 500,000.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But when it was all done, David was overwhelmed with guilt because he had counted the people, replacing trust with statistics. And David prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', “I have sinned badly in what I have just done. But now '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' forgive my guilt—I’ve been really stupid.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'When David got up the next morning, the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had already come to Gad the prophet, David’s spiritual advisor, “Go and give David this message: ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has spoken thus: There are three things I can do to you; choose one out of the three and I’ll see that it’s done.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Gad came to deliver the message: “Do you want three years of famine in the land, or three months of running from your enemies while they chase you down, or three days of an epidemic on the country? Think it over and make up your mind. What shall I tell the one who sent me?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David told Gad, “They’re all terrible! But I’d rather be punished by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', whose mercy is great, than fall into human hands.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' let loose an epidemic from morning until suppertime. From Dan to Beersheba seventy thousand people died. But when the angel reached out over Jerusalem to destroy it, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' felt the pain of the terror and told the angel who was spreading death among the people, “Enough’s enough! Pull back!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The angel of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had just reached the threshing floor of Araunah the Jebusite. David looked up and saw the angel hovering between earth and sky, sword drawn and about to strike Jerusalem. David and the elders bowed in prayer and covered themselves with rough burlap.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When David saw the angel about to destroy the people, he prayed, “Please! I’m the one who sinned; I, the shepherd, did the wrong. But these sheep, what did they do wrong? Punish me and my family, not them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'That same day Gad came to David and said, “Go and build an altar on the threshing floor of Araunah the Jebusite.” David did what Gad told him, what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: Araunah looked up and saw David and his men coming his way; he met them, bowing deeply, honoring the king and saying, “Why has my master the king come to see me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“To buy your threshing floor,” said David, “so I can build an altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' here and put an end to this disaster.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: '“Oh,” said Araunah, “let my master the king take and sacrifice whatever he wants. Look, here’s an ox for the burnt offering and threshing paddles and ox-yokes for fuel—Araunah gives it all to the king! And may '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, act in your favor.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'But the king said to Araunah, “No. I’ve got to buy it from you for a good price; I’m not going to offer '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God, sacrifices that are no sacrifice.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So David bought the threshing floor and the ox, paying out fifty shekels of silver. He built an altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' there and sacrificed burnt offerings and peace offerings. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was moved by the prayers and that was the end of the disaster.'
