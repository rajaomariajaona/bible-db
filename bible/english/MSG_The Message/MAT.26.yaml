document_id: MAT.26,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Anointed for Burial
  - type: text
    content: When Jesus finished saying these things, he told his disciples, “You know that Passover comes in two days. That’s when the Son of Man will be betrayed and handed over for crucifixion.”
  '10':
  - type: text
    content: When Jesus realized what was going on, he intervened. “Why are you giving this woman a hard time? She has just done something wonderfully significant for me. You will have the poor with you every day for the rest of your lives, but not me. When she poured this perfume on my body, what she really did was anoint me for burial. You can be sure that wherever in the whole world the Message is preached, what she has just done is going to be remembered and admired.”
  '14':
  - type: text
    content: That is when one of the Twelve, the one named Judas Iscariot, went to the cabal of high priests and said, “What will you give me if I hand him over to you?” They settled on thirty silver pieces. He began looking for just the right moment to hand him over.
  - type: heading
    content: The Traitor
  '17':
  - type: text
    content: On the first of the Days of Unleavened Bread, the disciples came to Jesus and said, “Where do you want us to prepare your Passover meal?”
  '18':
  - type: text
    content: He said, “Enter the city. Go up to a certain man and say, ‘The Teacher says, My time is near. I and my disciples plan to celebrate the Passover meal at your house.’” The disciples followed Jesus’ instructions to the letter, and prepared the Passover meal.
  '20':
  - type: text
    content: 'After sunset, he and the Twelve were sitting around the table. During the meal, he said, “I have something hard but important to say to you: One of you is going to hand me over to the conspirators.”'
  '22':
  - type: text
    content: They were stunned, and then began to ask, one after another, “It isn’t me, is it, Master?”
  '23':
  - type: text
    content: Jesus answered, “The one who hands me over is someone I eat with daily, one who passes me food at the table. In one sense the Son of Man is entering into a way of treachery well-marked by the Scriptures—no surprises here. In another sense that man who turns him in, turns traitor to the Son of Man—better never to have been born than do this!”
  '25':
  - type: text
    content: Then Judas, already turned traitor, said, “It isn’t me, is it, Rabbi?”
  - type: text
    content: Jesus said, “Don’t play games with me, Judas.”
  - type: heading
    content: The Bread and the Cup
  '26':
  - type: text
    content: 'During the meal, Jesus took and blessed the bread, broke it, and gave it to his disciples:'
  - type: text
    content: Take, eat.
  - type: text
    content: This is my body.
  - type: text
    content: 'Taking the cup and thanking God, he gave it to them:'
  - type: text
    content: Drink this, all of you.
  - type: text
    content: This is my blood,
  - type: text
    content: God’s new covenant poured out for many people
  - type: text
    content: for the forgiveness of sins.
  - type: text
    content: “I’ll not be drinking wine from this cup again until that new day when I’ll drink with you in the kingdom of my Father.”
  '3':
  - type: text
    content: At that very moment, the party of high priests and religious leaders was meeting in the chambers of the Chief Priest named Caiaphas, conspiring to seize Jesus by stealth and kill him. They agreed that it should not be done during Passover Week. “We don’t want a riot on our hands,” they said.
  '30':
  - type: text
    content: They sang a hymn and went directly to Mount Olives.
  - type: heading
    content: Gethsemane
  '31':
  - type: text
    content: Then Jesus told them, “Before the night’s over, you’re going to fall to pieces because of what happens to me. There is a Scripture that says,
  - type: text
    content: I’ll strike the shepherd;
  - type: text
    content: dazed and confused, the sheep will be scattered.
  - type: text
    content: But after I am raised up, I, your Shepherd, will go ahead of you, leading the way to Galilee.”
  '33':
  - type: text
    content: Peter broke in, “Even if everyone else falls to pieces on account of you, I won’t.”
  '34':
  - type: text
    content: “Don’t be so sure,” Jesus said. “This very night, before the rooster crows up the dawn, you will deny me three times.”
  '35':
  - type: text
    content: Peter protested, “Even if I had to die with you, I would never deny you.” All the others said the same thing.
  '36':
  - type: text
    content: Then Jesus went with them to a garden called Gethsemane and told his disciples, “Stay here while I go over there and pray.” Taking along Peter and the two sons of Zebedee, he plunged into an agonizing sorrow. Then he said, “This sorrow is crushing my life out. Stay here and keep vigil with me.”
  '39':
  - type: text
    content: 'Going a little ahead, he fell on his face, praying, “My Father, if there is any way, get me out of this. But please, not what I want. You, what do '
  - type: text
    content: you
  - type: text
    content: ' want?”'
  '40':
  - type: text
    content: When he came back to his disciples, he found them sound asleep. He said to Peter, “Can’t you stick it out with me a single hour? Stay alert; be in prayer so you don’t wander into temptation without even knowing you’re in danger. There is a part of you that is eager, ready for anything in God. But there’s another part that’s as lazy as an old dog sleeping by the fire.”
  '42':
  - type: text
    content: He then left them a second time. Again he prayed, “My Father, if there is no other way than this, drinking this cup to the dregs, I’m ready. Do it your way.”
  '43':
  - type: text
    content: When he came back, he again found them sound asleep. They simply couldn’t keep their eyes open. This time he let them sleep on, and went back a third time to pray, going over the same ground one last time.
  '45':
  - type: text
    content: When he came back the next time, he said, “Are you going to sleep on and make a night of it? My time is up, the Son of Man is about to be handed over to the hands of sinners. Get up! Let’s get going! My betrayer is here.”
  - type: heading
    content: With Swords and Clubs
  '47':
  - type: text
    content: 'The words were barely out of his mouth when Judas (the one from the Twelve) showed up, and with him a gang from the high priests and religious leaders brandishing swords and clubs. The betrayer had worked out a sign with them: “The one I kiss, that’s the one—seize him.” He went straight to Jesus, greeted him, “How are you, Rabbi?” and kissed him.'
  '50':
  - type: text
    content: Jesus said, “Friend, why this charade?”
  - type: text
    content: Then they came on him—grabbed him and roughed him up. One of those with Jesus pulled his sword and, taking a swing at the Chief Priest’s servant, cut off his ear.
  '52':
  - type: text
    content: Jesus said, “Put your sword back where it belongs. All who use swords are destroyed by swords. Don’t you realize that I am able right now to call to my Father, and twelve companies—more, if I want them—of fighting angels would be here, battle-ready? But if I did that, how would the Scriptures come true that say this is the way it has to be?”
  '55':
  - type: text
    content: 'Then Jesus addressed the mob: “What is this—coming out after me with swords and clubs as if I were a dangerous criminal? Day after day I have been sitting in the Temple teaching, and you never so much as lifted a hand against me. You’ve done it this way to confirm and fulfill the prophetic writings.”'
  - type: text
    content: Then all the disciples cut and ran.
  - type: heading
    content: False Charges
  '57':
  - type: text
    content: The gang that had seized Jesus led him before Caiaphas the Chief Priest, where the religion scholars and leaders had assembled. Peter followed at a safe distance until they got to the Chief Priest’s courtyard. Then he slipped in and mingled with the servants, watching to see how things would turn out.
  '59':
  - type: text
    content: ' The high priests, conspiring with the Jewish Council, tried to cook up charges against Jesus in order to sentence him to death. But even though many stepped up, making up one false accusation after another, nothing was believable.'
  '6':
  - type: text
    content: When Jesus was at Bethany, a guest of Simon the Leper, a woman came up to him as he was eating dinner and anointed him with a bottle of very expensive perfume. When the disciples saw what was happening, they were furious. “That’s criminal! This could have been sold for a lot and the money handed out to the poor.”
  '60':
  - type: text
    content: ' Finally two men came forward with this: “He said, ‘I can tear down this Temple of God and after three days rebuild it.’”'
  '62':
  - type: text
    content: The Chief Priest stood up and said, “What do you have to say to the accusation?”
  '63':
  - type: text
    content: Jesus kept silent.
  - type: text
    content: Then the Chief Priest said, “I command you by the authority of the living God to say if you are the Messiah, the Son of God.”
  '64':
  - type: text
    content: 'Jesus was curt: “You yourself said it. And that’s not all. Soon you’ll see it for yourself:'
  - type: text
    content: The Son of Man seated at the right hand of the Mighty One,
  - type: text
    content: Arriving on the clouds of heaven.”
  '65':
  - type: text
    content: At that, the Chief Priest lost his temper, ripping his robes, yelling, “He blasphemed! Why do we need witnesses to accuse him? You all heard him blaspheme! Are you going to stand for such blasphemy?”
  - type: text
    content: They all said, “Death! That seals his death sentence.”
  '67':
  - type: text
    content: 'Then they were spitting in his face and knocking him around. They jeered as they slapped him: “Prophesy, Messiah: Who hit you that time?”'
  - type: heading
    content: Denial in the Courtyard
  '69':
  - type: text
    content: All this time, Peter was sitting out in the courtyard. One servant girl came up to him and said, “You were with Jesus the Galilean.”
  '70':
  - type: text
    content: In front of everybody there, he denied it. “I don’t know what you’re talking about.”
  '71':
  - type: text
    content: As he moved over toward the gate, someone else said to the people there, “This man was with Jesus the Nazarene.”
  '72':
  - type: text
    content: 'Again he denied it, salting his denial with an oath: “I swear, I never laid eyes on the man.”'
  '73':
  - type: text
    content: Shortly after that, some bystanders approached Peter. “You’ve got to be one of them. Your accent gives you away.”
  '74':
  - type: text
    content: Then he got really nervous and swore. “I don’t know the man!”
  - type: text
    content: 'Just then a rooster crowed. Peter remembered what Jesus had said: “Before the rooster crows, you will deny me three times.” He went out and cried and cried and cried.'
