document_id: 2KI.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Azariah (Uzziah) of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'In the twenty-seventh year of Jeroboam king of Israel, Azariah son of Amaziah became king in Judah. He was sixteen years old when he began his rule and he was king for fifty-two years in Jerusalem. His mother’s name was Jecoliah. She was from Jerusalem. He did well in the eyes of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', following in the footsteps of his father Amaziah. But he also failed to get rid of the local sex-and-religion shrines; they continued to be popular with the people. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' afflicted the king with a bad skin disease until the day of his death. He lived in the palace but no longer acted as king; his son Jotham ran the government and ruled the country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'The rest of the life and times of Azariah, everything he accomplished, is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Judah
  - type: text
    text: . Azariah died and was buried with his ancestors in the City of David. Jotham his son was king after him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zechariah of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'In the thirty-eighth year of Azariah king of Judah, Zechariah son of Jeroboam became king over Israel in Samaria. He lasted only six months. He lived a bad life before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', no different from his ancestors. He continued in the line of Jeroboam son of Nebat who led Israel into a life of sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Shallum son of Jabesh conspired against him, assassinated him in public view, and took over as king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'The rest of the life and times of Zechariah is written plainly in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: '. That completed the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' that was given to Jehu, namely, “For four generations your sons will sit on the throne of Israel.” Zechariah was the fourth.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Shallum of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Shallum son of Jabesh became king in the thirty-ninth year of Azariah king of Judah. He was king in Samaria for only a month.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Menahem son of Gadi came up from Tirzah to Samaria. He attacked Shallum son of Jabesh and killed him. He then became king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The rest of the life and times of Shallum and the account of the conspiracy are written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Menahem of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Using Tirzah as his base, Menahem opened his reign by smashing Tiphsah, devastating both the town and its suburbs because they didn’t welcome him with open arms. He savagely ripped open all the pregnant women.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'In the thirty-ninth year of Azariah king of Judah, Menahem son of Gadi became king over Israel. He ruled from Samaria for ten years. As far as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was concerned he lived an evil life. Sin for sin, he repeated the sins of Jeroboam son of Nebat, who led Israel into a life of sin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: 'Then Tiglath-Pileser III king of Assyria showed up and attacked the country. But Menahem made a deal with him: He bought his support by handing over about thirty-seven tons of silver. He raised the money by making every landowner in Israel pay fifty shekels to the king of Assyria. That satisfied the king of Assyria, and he left the country.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'The rest of the life and times of Menahem, everything he did, is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: . Menahem died and joined his ancestors. His son Pekahiah became the next king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pekahiah of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'In the fiftieth year of Azariah king of Judah, Pekahiah son of Menahem became king of Israel. He ruled in Samaria for two years. In '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s eyes he lived an evil life. He stuck to the old sin tracks of Jeroboam son of Nebat, who led Israel into a life of sin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: And then his military aide Pekah son of Remaliah conspired against him—killed him in cold blood while he was in his private quarters in the royal palace in Samaria. He also killed Argob and Arieh. Fifty Gadites were in on the conspiracy with him. After the murder he became the next king.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The rest of the life and times of Pekahiah, everything he did, is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pekah of Israel
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: 'In the fifty-second year of Azariah king of Judah, Pekah son of Remaliah became king of Israel in Samaria. He ruled for twenty years. In '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s view he lived an evil life; he didn’t deviate so much as a hair’s breadth from the path laid down by Jeroboam son of Nebat, who led Israel into a life of sin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: During the reign of Pekah king of Israel, Tiglath-Pileser III king of Assyria invaded the country. He captured Ijon, Abel Beth Maacah, Janoah, Kedesh, Hazor, Gilead, Galilee—the whole country of Naphtali—and took everyone captive to Assyria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But then Hoshea son of Elah mounted a conspiracy against Pekah son of Remaliah. He assassinated him and took over as king. This was in the twentieth year of Jotham son of Uzziah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The rest of the life and times of Pekah, everything he did, is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Israel
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jotham of Judah
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-35
  - type: text
    text: 'In the second year of Pekah son of Remaliah king of Israel, Jotham son of Uzziah became king in Judah. He was twenty-five years old when he became king and reigned sixteen years in Jerusalem. His mother’s name was Jerusha daughter of Zadok. He acted well in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s eyes, following in the steps of his father Uzziah. But he didn’t interfere with the traffic to the neighborhood sex-and-religion shrines; they continued, as popular as ever. The construction of the High Gate to The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was his work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-38
  - type: text
    text: 'The rest of the life and times of Jotham, the record of his work, is written in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The Chronicles of the Kings of Judah
  - type: text
    text: '. It was during these years that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' began sending Rezin king of Aram and Pekah son of Remaliah to attack Judah. Jotham died and joined his ancestors. They buried him in the family cemetery in the City of David. His son Ahaz was the next king.'
