document_id: 2KI.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Azariah (Uzziah) of Judah
  - type: text
    content: 'In the twenty-seventh year of Jeroboam king of Israel, Azariah son of Amaziah became king in Judah. He was sixteen years old when he began his rule and he was king for fifty-two years in Jerusalem. His mother’s name was Jecoliah. She was from Jerusalem. He did well in the eyes of '
  - type: text
    content: God
  - type: text
    content: ', following in the footsteps of his father Amaziah. But he also failed to get rid of the local sex-and-religion shrines; they continued to be popular with the people. '
  - type: text
    content: God
  - type: text
    content: ' afflicted the king with a bad skin disease until the day of his death. He lived in the palace but no longer acted as king; his son Jotham ran the government and ruled the country.'
  '10':
  - type: text
    content: Shallum son of Jabesh conspired against him, assassinated him in public view, and took over as king.
  '11':
  - type: text
    content: 'The rest of the life and times of Zechariah is written plainly in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: '. That completed the word of '
  - type: text
    content: God
  - type: text
    content: ' that was given to Jehu, namely, “For four generations your sons will sit on the throne of Israel.” Zechariah was the fourth.'
  - type: heading
    content: Shallum of Israel
  '13':
  - type: text
    content: Shallum son of Jabesh became king in the thirty-ninth year of Azariah king of Judah. He was king in Samaria for only a month.
  '14':
  - type: text
    content: Menahem son of Gadi came up from Tirzah to Samaria. He attacked Shallum son of Jabesh and killed him. He then became king.
  '15':
  - type: text
    content: 'The rest of the life and times of Shallum and the account of the conspiracy are written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: .
  - type: heading
    content: Menahem of Israel
  '16':
  - type: text
    content: Using Tirzah as his base, Menahem opened his reign by smashing Tiphsah, devastating both the town and its suburbs because they didn’t welcome him with open arms. He savagely ripped open all the pregnant women.
  '17':
  - type: text
    content: 'In the thirty-ninth year of Azariah king of Judah, Menahem son of Gadi became king over Israel. He ruled from Samaria for ten years. As far as '
  - type: text
    content: God
  - type: text
    content: ' was concerned he lived an evil life. Sin for sin, he repeated the sins of Jeroboam son of Nebat, who led Israel into a life of sin.'
  '19':
  - type: text
    content: 'Then Tiglath-Pileser III king of Assyria showed up and attacked the country. But Menahem made a deal with him: He bought his support by handing over about thirty-seven tons of silver. He raised the money by making every landowner in Israel pay fifty shekels to the king of Assyria. That satisfied the king of Assyria, and he left the country.'
  '21':
  - type: text
    content: 'The rest of the life and times of Menahem, everything he did, is written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: . Menahem died and joined his ancestors. His son Pekahiah became the next king.
  - type: heading
    content: Pekahiah of Israel
  '23':
  - type: text
    content: 'In the fiftieth year of Azariah king of Judah, Pekahiah son of Menahem became king of Israel. He ruled in Samaria for two years. In '
  - type: text
    content: God
  - type: text
    content: ’s eyes he lived an evil life. He stuck to the old sin tracks of Jeroboam son of Nebat, who led Israel into a life of sin.
  '25':
  - type: text
    content: And then his military aide Pekah son of Remaliah conspired against him—killed him in cold blood while he was in his private quarters in the royal palace in Samaria. He also killed Argob and Arieh. Fifty Gadites were in on the conspiracy with him. After the murder he became the next king.
  '26':
  - type: text
    content: 'The rest of the life and times of Pekahiah, everything he did, is written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: .
  - type: heading
    content: Pekah of Israel
  '27':
  - type: text
    content: 'In the fifty-second year of Azariah king of Judah, Pekah son of Remaliah became king of Israel in Samaria. He ruled for twenty years. In '
  - type: text
    content: God
  - type: text
    content: ’s view he lived an evil life; he didn’t deviate so much as a hair’s breadth from the path laid down by Jeroboam son of Nebat, who led Israel into a life of sin.
  '29':
  - type: text
    content: During the reign of Pekah king of Israel, Tiglath-Pileser III king of Assyria invaded the country. He captured Ijon, Abel Beth Maacah, Janoah, Kedesh, Hazor, Gilead, Galilee—the whole country of Naphtali—and took everyone captive to Assyria.
  '30':
  - type: text
    content: But then Hoshea son of Elah mounted a conspiracy against Pekah son of Remaliah. He assassinated him and took over as king. This was in the twentieth year of Jotham son of Uzziah.
  '31':
  - type: text
    content: 'The rest of the life and times of Pekah, everything he did, is written in '
  - type: text
    content: The Chronicles of the Kings of Israel
  - type: text
    content: .
  - type: heading
    content: Jotham of Judah
  '32':
  - type: text
    content: 'In the second year of Pekah son of Remaliah king of Israel, Jotham son of Uzziah became king in Judah. He was twenty-five years old when he became king and reigned sixteen years in Jerusalem. His mother’s name was Jerusha daughter of Zadok. He acted well in '
  - type: text
    content: God
  - type: text
    content: '’s eyes, following in the steps of his father Uzziah. But he didn’t interfere with the traffic to the neighborhood sex-and-religion shrines; they continued, as popular as ever. The construction of the High Gate to The Temple of '
  - type: text
    content: God
  - type: text
    content: ' was his work.'
  '36':
  - type: text
    content: 'The rest of the life and times of Jotham, the record of his work, is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: '. It was during these years that '
  - type: text
    content: God
  - type: text
    content: ' began sending Rezin king of Aram and Pekah son of Remaliah to attack Judah. Jotham died and joined his ancestors. They buried him in the family cemetery in the City of David. His son Ahaz was the next king.'
  '6':
  - type: text
    content: 'The rest of the life and times of Azariah, everything he accomplished, is written in '
  - type: text
    content: The Chronicles of the Kings of Judah
  - type: text
    content: . Azariah died and was buried with his ancestors in the City of David. Jotham his son was king after him.
  - type: heading
    content: Zechariah of Israel
  '8':
  - type: text
    content: 'In the thirty-eighth year of Azariah king of Judah, Zechariah son of Jeroboam became king over Israel in Samaria. He lasted only six months. He lived a bad life before '
  - type: text
    content: God
  - type: text
    content: ', no different from his ancestors. He continued in the line of Jeroboam son of Nebat who led Israel into a life of sin.'
