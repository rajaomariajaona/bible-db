  - type: text
    text: When Samuel got to be an old man, he set his sons up as judges in Israel. His firstborn son was named Joel, the name of his second, Abijah. They were assigned duty in Beersheba. But his sons didn’t take after him; they were out for what they could get for themselves, taking bribes, corrupting justice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'Fed up, all the elders of Israel got together and confronted Samuel at Ramah. They presented their case: “Look, you’re an old man, and your sons aren’t following in your footsteps. Here’s what we want you to do: Appoint a king to rule us, just like everybody else.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Samuel heard their demand—“Give us a king to rule us!”—he was crushed. How awful! Samuel prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' answered Samuel, “Go ahead and do what they’re asking. They are not rejecting you. They’ve rejected me as their King. From the day I brought them out of Egypt until this very day they’ve been behaving like this, leaving me for other gods. And now they’re doing it to you. So let them have their own way. But warn them of what they’re in for. Tell them the way kings operate, just what they’re likely to get from a king.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-18
  - type: text
    text: 'So Samuel told them, delivered '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s warning to the people who were asking him to give them a king. He said, “This is the way the kind of king you’re talking about operates. He’ll take your sons and make soldiers of them—chariotry, cavalry, infantry, regimented in battalions and squadrons. He’ll put some to forced labor on his farms, plowing and harvesting, and others to making either weapons of war or chariots in which he can ride in luxury. He’ll put your daughters to work as beauticians and waitresses and cooks. He’ll conscript your best fields, vineyards, and orchards and hand them over to his special friends. He’ll tax your harvests and vintage to support his extensive bureaucracy. Your prize workers and best animals he’ll take for his own use. He’ll lay a tax on your flocks and you’ll end up no better than slaves. The day will come when you will cry in desperation because of this king you so much want for yourselves. But don’t expect '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to answer.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: But the people wouldn’t listen to Samuel. “No!” they said. “We will have a king to rule us! Then we’ll be just like all the other nations. Our king will rule us and lead us and fight our battles.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: 'Samuel took in what they said and rehearsed it with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told Samuel, “Do what they say. Make them a king.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Samuel dismissed the men of Israel: “Go home, each of you to your own city.”'
