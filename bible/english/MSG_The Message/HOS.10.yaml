document_id: HOS.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: You Thought You Could Do It All on Your Own
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Israel was once a lush vine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bountiful in grapes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The more lavish the harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more promiscuous the worship.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The more money they got,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more they squandered on gods-in-their-own-image.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their sweet smiles are sheer lies.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’re guilty as sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God will smash their worship shrines,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pulverize their god-images.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: They go around saying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Who needs a king?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We couldn’t care less about '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: so why bother with a king?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What difference would he make?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: They talk big,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lie through their teeth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make deals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But their high-sounding words
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn out to be empty words, litter in the gutters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: The people of Samaria travel over to Crime City
- type: usfm
  marker: q2
  children:
  - type: text
    text: to worship the golden calf-god.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They go all out, prancing and hollering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taken in by their showmen priests.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They act so important around the calf-god,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but are oblivious to the sham, the shame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have plans to take it to Assyria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: present it as a gift to the great king.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And so Ephraim makes a fool of himself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: disgraces Israel with his stupid idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: Samaria is history. Its king
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a dead branch floating down the river.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel’s favorite sin centers
- type: usfm
  marker: q2
  children:
  - type: text
    text: will all be torn down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thistles and crabgrass
- type: usfm
  marker: q2
  children:
  - type: text
    text: will decorate their ruined altars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they’ll say to the mountains, “Bury us!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the hills, “Fall on us!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: You got your start in sin at Gibeah—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that ancient, unspeakable, shocking sin—
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you’ve been at it ever since.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And Gibeah will mark the end of it
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a war to end all the sinning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll come to teach them a lesson.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nations will gang up on them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Making them learn the hard way
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sum of Gibeah plus Gibeah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-15
  - type: text
    text: Ephraim was a trained heifer
- type: usfm
  marker: q2
  children:
  - type: text
    text: that loved to thresh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Passing by and seeing her strong, sleek neck,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I wanted to harness Ephraim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put Ephraim to work in the fields—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Judah plowing, Jacob harrowing:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sow righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: reap love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s time to till the ready earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'it’s time to dig in with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Until he arrives
- type: usfm
  marker: q2
  children:
  - type: text
    text: with righteousness ripe for harvest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But instead you plowed wicked ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: reaped a crop of evil and ate a salad of lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You thought you could do it all on your own,
- type: usfm
  marker: q2
  children:
  - type: text
    text: flush with weapons and manpower.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the volcano of war will erupt among your people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: All your defense posts will be leveled
- type: usfm
  marker: q1
  children:
  - type: text
    text: As viciously as king Shalman
- type: usfm
  marker: q2
  children:
  - type: text
    text: leveled the town of Beth-arba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When mothers and their babies
- type: usfm
  marker: q2
  children:
  - type: text
    text: were smashed on the rocks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s what’s ahead for you, you so-called people of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of your off-the-charts evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Some morning you’re going to wake up
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find Israel, king and kingdom, a blank—nothing.
