document_id: HOS.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: You Thought You Could Do It All on Your Own
  - type: text
    content: Israel was once a lush vine,
  - type: text
    content: bountiful in grapes.
  - type: text
    content: The more lavish the harvest,
  - type: text
    content: the more promiscuous the worship.
  - type: text
    content: The more money they got,
  - type: text
    content: the more they squandered on gods-in-their-own-image.
  - type: text
    content: Their sweet smiles are sheer lies.
  - type: text
    content: They’re guilty as sin.
  - type: text
    content: God will smash their worship shrines,
  - type: text
    content: pulverize their god-images.
  '11':
  - type: text
    content: Ephraim was a trained heifer
  - type: text
    content: that loved to thresh.
  - type: text
    content: Passing by and seeing her strong, sleek neck,
  - type: text
    content: I wanted to harness Ephraim,
  - type: text
    content: Put Ephraim to work in the fields—
  - type: text
    content: 'Judah plowing, Jacob harrowing:'
  - type: text
    content: Sow righteousness,
  - type: text
    content: reap love.
  - type: text
    content: It’s time to till the ready earth,
  - type: text
    content: 'it’s time to dig in with '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Until he arrives
  - type: text
    content: with righteousness ripe for harvest.
  - type: text
    content: But instead you plowed wicked ways,
  - type: text
    content: reaped a crop of evil and ate a salad of lies.
  - type: text
    content: You thought you could do it all on your own,
  - type: text
    content: flush with weapons and manpower.
  - type: text
    content: But the volcano of war will erupt among your people.
  - type: text
    content: All your defense posts will be leveled
  - type: text
    content: As viciously as king Shalman
  - type: text
    content: leveled the town of Beth-arba,
  - type: text
    content: When mothers and their babies
  - type: text
    content: were smashed on the rocks.
  - type: text
    content: That’s what’s ahead for you, you so-called people of God,
  - type: text
    content: because of your off-the-charts evil.
  - type: text
    content: Some morning you’re going to wake up
  - type: text
    content: and find Israel, king and kingdom, a blank—nothing.
  '3':
  - type: text
    content: They go around saying,
  - type: text
    content: “Who needs a king?
  - type: text
    content: 'We couldn’t care less about '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: so why bother with a king?
  - type: text
    content: What difference would he make?”
  - type: text
    content: They talk big,
  - type: text
    content: lie through their teeth,
  - type: text
    content: make deals.
  - type: text
    content: But their high-sounding words
  - type: text
    content: turn out to be empty words, litter in the gutters.
  '5':
  - type: text
    content: The people of Samaria travel over to Crime City
  - type: text
    content: to worship the golden calf-god.
  - type: text
    content: They go all out, prancing and hollering,
  - type: text
    content: taken in by their showmen priests.
  - type: text
    content: They act so important around the calf-god,
  - type: text
    content: but are oblivious to the sham, the shame.
  - type: text
    content: They have plans to take it to Assyria,
  - type: text
    content: present it as a gift to the great king.
  - type: text
    content: And so Ephraim makes a fool of himself,
  - type: text
    content: disgraces Israel with his stupid idols.
  '7':
  - type: text
    content: Samaria is history. Its king
  - type: text
    content: is a dead branch floating down the river.
  - type: text
    content: Israel’s favorite sin centers
  - type: text
    content: will all be torn down.
  - type: text
    content: Thistles and crabgrass
  - type: text
    content: will decorate their ruined altars.
  - type: text
    content: Then they’ll say to the mountains, “Bury us!”
  - type: text
    content: and to the hills, “Fall on us!”
  '9':
  - type: text
    content: You got your start in sin at Gibeah—
  - type: text
    content: that ancient, unspeakable, shocking sin—
  - type: text
    content: And you’ve been at it ever since.
  - type: text
    content: And Gibeah will mark the end of it
  - type: text
    content: in a war to end all the sinning.
  - type: text
    content: I’ll come to teach them a lesson.
  - type: text
    content: Nations will gang up on them,
  - type: text
    content: Making them learn the hard way
  - type: text
    content: the sum of Gibeah plus Gibeah.
