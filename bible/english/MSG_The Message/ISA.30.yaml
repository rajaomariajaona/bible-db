document_id: ISA.30,97
type_code: eng
verses:
  '1':
  - type: heading
    content: All Show, No Substance
  - type: text
    content: “Doom, rebel children!”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “You make plans, but not mine.
  - type: text
    content: You make deals, but not in my Spirit.
  - type: text
    content: You pile sin on sin,
  - type: text
    content: one sin on top of another,
  - type: text
    content: Going off to Egypt
  - type: text
    content: without so much as asking me,
  - type: text
    content: Running off to Pharaoh for protection,
  - type: text
    content: expecting to hide out in Egypt.
  - type: text
    content: Well, some protection Pharaoh will be!
  - type: text
    content: Some hideout, Egypt!
  - type: text
    content: They look big and important, true,
  - type: text
    content: with officials strategically established in
  - type: text
    content: Zoan in the north and Hanes in the south,
  - type: text
    content: but there’s nothing to them.
  - type: text
    content: Anyone stupid enough to trust them
  - type: text
    content: will end up looking stupid—
  - type: text
    content: All show, no substance,
  - type: text
    content: an embarrassing farce.”
  '12':
  - type: text
    content: 'Therefore, The Holy of Israel says this:'
  - type: text
    content: “Because you scorn this Message,
  - type: text
    content: Preferring to live by injustice
  - type: text
    content: and shape your lives on lies,
  - type: text
    content: This perverse way of life
  - type: text
    content: will be like a towering, badly built wall
  - type: text
    content: That slowly, slowly tilts and shifts,
  - type: text
    content: and then one day, without warning, collapses—
  - type: text
    content: Smashed to bits like a piece of pottery,
  - type: text
    content: smashed beyond recognition or repair,
  - type: text
    content: Useless, a pile of debris
  - type: text
    content: to be swept up and thrown in the trash.”
  - type: heading
    content: God Takes the Time to Do Everything Right
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', the Master, The Holy of Israel,'
  - type: text
    content: 'has this solemn counsel:'
  - type: text
    content: “Your salvation requires you to turn back to me
  - type: text
    content: and stop your silly efforts to save yourselves.
  - type: text
    content: Your strength will come from settling down
  - type: text
    content: in complete dependence on me—
  - type: text
    content: The very thing
  - type: text
    content: you’ve been unwilling to do.
  - type: text
    content: You’ve said, ‘No way! We’ll rush off on horseback!’
  - type: text
    content: You’ll rush off, all right! Just not far enough!
  - type: text
    content: You’ve said, ‘We’ll ride off on fast horses!’
  - type: text
    content: Do you think your pursuers ride old nags?
  - type: text
    content: 'Think again: A thousand of you will scatter before one attacker.'
  - type: text
    content: Before a mere five you’ll all run off.
  - type: text
    content: There’ll be nothing left of you—
  - type: text
    content: a flagpole on a hill with no flag,
  - type: text
    content: a signpost on a roadside with the sign torn off.”
  '18':
  - type: text
    content: 'But '
  - type: text
    content: God
  - type: text
    content: ’s not finished. He’s waiting around to be gracious to you.
  - type: text
    content: He’s gathering strength to show mercy to you.
  - type: text
    content: God
  - type: text
    content: ' takes the time to do everything right—everything.'
  - type: text
    content: Those who wait around for him are the lucky ones.
  '19':
  - type: text
    content: 'Oh yes, people of Zion, citizens of Jerusalem, your time of tears is over. Cry for help and you’ll find it’s grace and more grace. The moment he hears, he’ll answer. Just as the Master kept you alive during the hard times, he’ll keep your teacher alive and present among you. Your teacher will be right there, local and on the job, urging you on whenever you wander left or right: “This is the right road. Walk down this road.” You’ll scrap your expensive and fashionable god-images. You’ll throw them in the trash as so much garbage, saying, “Good riddance!”'
  '23':
  - type: text
    content: 'God will provide rain for the seeds you sow. The grain that grows will be abundant. Your cattle will range far and wide. Oblivious to war and earthquake, the oxen and donkeys you use for hauling and plowing will be fed well near running brooks that flow freely from mountains and hills. Better yet, on the Day '
  - type: text
    content: God
  - type: text
    content: ' heals his people of the wounds and bruises from the time of punishment, moonlight will flare into sunlight, and sunlight, like a whole week of sunshine at once, will flood the land.'
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: 'Look, '
  - type: text
    content: God
  - type: text
    content: ’s on his way,
  - type: text
    content: and from a long way off!
  - type: text
    content: Smoking with anger,
  - type: text
    content: immense as he comes into view,
  - type: text
    content: Words steaming from his mouth,
  - type: text
    content: searing, indicting words!
  - type: text
    content: A torrent of words, a flash flood of words
  - type: text
    content: sweeping everyone into the vortex of his words.
  - type: text
    content: He’ll shake down the nations in a sieve of destruction,
  - type: text
    content: herd them into a dead end.
  '29':
  - type: text
    content: 'But '
  - type: text
    content: you
  - type: text
    content: ' will sing,'
  - type: text
    content: sing through an all-night holy feast!
  - type: text
    content: Your hearts will burst with song,
  - type: text
    content: make music like the sound of flutes on parade,
  - type: text
    content: 'En route to the mountain of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: on the way to the Rock of Israel.
  - type: text
    content: God
  - type: text
    content: ' will sound out in grandiose thunder,'
  - type: text
    content: display his hammering arm,
  - type: text
    content: Furiously angry, showering sparks—
  - type: text
    content: cloudburst, storm, hail!
  - type: text
    content: 'Oh yes, at '
  - type: text
    content: God
  - type: text
    content: ’s thunder
  - type: text
    content: Assyria will cower under the clubbing.
  - type: text
    content: 'Every blow '
  - type: text
    content: God
  - type: text
    content: ' lands on them with his club'
  - type: text
    content: is in time to the music of drums and pipes,
  - type: text
    content: God
  - type: text
    content: ' in all-out, two-fisted battle,'
  - type: text
    content: fighting against them.
  - type: text
    content: Topheth’s fierce fires are well prepared,
  - type: text
    content: ready for the Assyrian king.
  - type: text
    content: The Topheth furnace is deep and wide,
  - type: text
    content: well stoked with hot-burning wood.
  - type: text
    content: God
  - type: text
    content: ’s breath, like a river of burning pitch,
  - type: text
    content: starts the fire.
  '6':
  - type: text
    content: And this note on the animals of the Negev
  - type: text
    content: 'encountered on the road to Egypt:'
  - type: text
    content: A most dangerous, treacherous route,
  - type: text
    content: menaced by lions and deadly snakes.
  - type: text
    content: 'And you’re going to lug all your stuff down '
  - type: text
    content: there
  - type: text
    content: ','
  - type: text
    content: your donkeys and camels loaded down with bribes,
  - type: text
    content: Thinking you can buy protection
  - type: text
    content: from that hollow farce of a nation?
  - type: text
    content: Egypt is all show, no substance.
  - type: text
    content: My name for her is Toothless Dragon.
  - type: heading
    content: This Is a Rebel Generation
  '8':
  - type: text
    content: So, go now and write all this down.
  - type: text
    content: Put it in a book
  - type: text
    content: So that the record will be there
  - type: text
    content: to instruct the coming generations,
  - type: text
    content: Because this is a rebel generation,
  - type: text
    content: a people who lie,
  - type: text
    content: A people unwilling to listen
  - type: text
    content: 'to anything '
  - type: text
    content: God
  - type: text
    content: ' tells them.'
  - type: text
    content: They tell their spiritual leaders,
  - type: text
    content: “Don’t bother us with irrelevancies.”
  - type: text
    content: They tell their preachers,
  - type: text
    content: “Don’t waste our time on impracticalities.
  - type: text
    content: Tell us what makes us feel better.
  - type: text
    content: Don’t bore us with obsolete religion.
  - type: text
    content: That stuff means nothing to us.
  - type: text
    content: Quit hounding us with The Holy of Israel.”
