document_id: ISA.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: All Show, No Substance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: “Doom, rebel children!”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You make plans, but not mine.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You make deals, but not in my Spirit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You pile sin on sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: one sin on top of another,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Going off to Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: without so much as asking me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Running off to Pharaoh for protection,
- type: usfm
  marker: q2
  children:
  - type: text
    text: expecting to hide out in Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, some protection Pharaoh will be!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Some hideout, Egypt!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They look big and important, true,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with officials strategically established in
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zoan in the north and Hanes in the south,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there’s nothing to them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anyone stupid enough to trust them
- type: usfm
  marker: q2
  children:
  - type: text
    text: will end up looking stupid—
- type: usfm
  marker: q1
  children:
  - type: text
    text: All show, no substance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an embarrassing farce.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: And this note on the animals of the Negev
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'encountered on the road to Egypt:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A most dangerous, treacherous route,
- type: usfm
  marker: q2
  children:
  - type: text
    text: menaced by lions and deadly snakes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And you’re going to lug all your stuff down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: your donkeys and camels loaded down with bribes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Thinking you can buy protection
- type: usfm
  marker: q2
  children:
  - type: text
    text: from that hollow farce of a nation?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Egypt is all show, no substance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My name for her is Toothless Dragon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: This Is a Rebel Generation
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: So, go now and write all this down.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Put it in a book
- type: usfm
  marker: q1
  children:
  - type: text
    text: So that the record will be there
- type: usfm
  marker: q2
  children:
  - type: text
    text: to instruct the coming generations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because this is a rebel generation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a people who lie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A people unwilling to listen
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to anything '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' tells them.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They tell their spiritual leaders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Don’t bother us with irrelevancies.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: They tell their preachers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Don’t waste our time on impracticalities.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell us what makes us feel better.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t bore us with obsolete religion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That stuff means nothing to us.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Quit hounding us with The Holy of Israel.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: 'Therefore, The Holy of Israel says this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Because you scorn this Message,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Preferring to live by injustice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shape your lives on lies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: This perverse way of life
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be like a towering, badly built wall
- type: usfm
  marker: q1
  children:
  - type: text
    text: That slowly, slowly tilts and shifts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then one day, without warning, collapses—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Smashed to bits like a piece of pottery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: smashed beyond recognition or repair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Useless, a pile of debris
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be swept up and thrown in the trash.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Takes the Time to Do Everything Right'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, The Holy of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'has this solemn counsel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your salvation requires you to turn back to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stop your silly efforts to save yourselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your strength will come from settling down
- type: usfm
  marker: q2
  children:
  - type: text
    text: in complete dependence on me—
- type: usfm
  marker: q1
  children:
  - type: text
    text: The very thing
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ve been unwilling to do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve said, ‘No way! We’ll rush off on horseback!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ll rush off, all right! Just not far enough!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve said, ‘We’ll ride off on fast horses!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you think your pursuers ride old nags?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Think again: A thousand of you will scatter before one attacker.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Before a mere five you’ll all run off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’ll be nothing left of you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a flagpole on a hill with no flag,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a signpost on a roadside with the sign torn off.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s not finished. He’s waiting around to be gracious to you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s gathering strength to show mercy to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' takes the time to do everything right—everything.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Those who wait around for him are the lucky ones.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: 'Oh yes, people of Zion, citizens of Jerusalem, your time of tears is over. Cry for help and you’ll find it’s grace and more grace. The moment he hears, he’ll answer. Just as the Master kept you alive during the hard times, he’ll keep your teacher alive and present among you. Your teacher will be right there, local and on the job, urging you on whenever you wander left or right: “This is the right road. Walk down this road.” You’ll scrap your expensive and fashionable god-images. You’ll throw them in the trash as so much garbage, saying, “Good riddance!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: 'God will provide rain for the seeds you sow. The grain that grows will be abundant. Your cattle will range far and wide. Oblivious to war and earthquake, the oxen and donkeys you use for hauling and plowing will be fed well near running brooks that flow freely from mountains and hills. Better yet, on the Day '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' heals his people of the wounds and bruises from the time of punishment, moonlight will flare into sunlight, and sunlight, like a whole week of sunshine at once, will flood the land.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: 'Look, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s on his way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from a long way off!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Smoking with anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: immense as he comes into view,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Words steaming from his mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: searing, indicting words!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A torrent of words, a flash flood of words
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweeping everyone into the vortex of his words.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll shake down the nations in a sieve of destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: herd them into a dead end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-33
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' will sing,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: sing through an all-night holy feast!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your hearts will burst with song,
- type: usfm
  marker: q2
  children:
  - type: text
    text: make music like the sound of flutes on parade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En route to the mountain of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the way to the Rock of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will sound out in grandiose thunder,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: display his hammering arm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Furiously angry, showering sparks—
- type: usfm
  marker: q2
  children:
  - type: text
    text: cloudburst, storm, hail!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oh yes, at '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s thunder
- type: usfm
  marker: q2
  children:
  - type: text
    text: Assyria will cower under the clubbing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Every blow '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lands on them with his club'
- type: usfm
  marker: q2
  children:
  - type: text
    text: is in time to the music of drums and pipes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in all-out, two-fisted battle,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: fighting against them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Topheth’s fierce fires are well prepared,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready for the Assyrian king.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Topheth furnace is deep and wide,
- type: usfm
  marker: q2
  children:
  - type: text
    text: well stoked with hot-burning wood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s breath, like a river of burning pitch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: starts the fire.
