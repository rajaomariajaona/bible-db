document_id: GEN.5,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Family Tree of the Human Race
  - type: text
    content: 'This is the family tree of the human race: When God created the human race, he made it godlike, with a nature akin to God. He created both male and female and blessed them, the whole human race.'
  '12':
  - type: text
    content: When Kenan was seventy years old, he had Mahalalel. After he had Mahalalel, he lived another 840 years, having more sons and daughters. Kenan lived a total of 910 years. And he died.
  '15':
  - type: text
    content: When Mahalalel was sixty-five years old, he had Jared. After he had Jared, he lived another 830 years, having more sons and daughters. Mahalalel lived a total of 895 years. And he died.
  '18':
  - type: text
    content: When Jared was 162 years old, he had Enoch. After he had Enoch, he lived another 800 years, having more sons and daughters. Jared lived a total of 962 years. And he died.
  '21':
  - type: text
    content: When Enoch was sixty-five years old, he had Methuselah. Enoch walked steadily with God. After he had Methuselah, he lived another 300 years, having more sons and daughters. Enoch lived a total of 365 years.
  '24':
  - type: text
    content: 'Enoch walked steadily with God. And then one day he was simply gone: God took him.'
  '25':
  - type: text
    content: When Methuselah was 187 years old, he had Lamech. After he had Lamech, he lived another 782 years. Methuselah lived a total of 969 years. And he died.
  '28':
  - type: text
    content: 'When Lamech was 182 years old, he had a son. He named him Noah, saying, “This one will give us a break from the hard work of farming the ground that '
  - type: text
    content: God
  - type: text
    content: ' cursed.” After Lamech had Noah, he lived another 595 years, having more sons and daughters. Lamech lived a total of 777 years. And he died.'
  '3':
  - type: text
    content: When Adam was 130 years old, he had a son who was just like him, his very spirit and image, and named him Seth. After the birth of Seth, Adam lived another 800 years, having more sons and daughters. Adam lived a total of 930 years. And he died.
  '32':
  - type: text
    content: When Noah was 500 years old, he had Shem, Ham, and Japheth.
  '6':
  - type: text
    content: When Seth was 105 years old, he had Enosh. After Seth had Enosh, he lived another 807 years, having more sons and daughters. Seth lived a total of 912 years. And he died.
  '9':
  - type: text
    content: When Enosh was ninety years old, he had Kenan. After he had Kenan, he lived another 815 years, having more sons and daughters. Enosh lived a total of 905 years. And he died.
