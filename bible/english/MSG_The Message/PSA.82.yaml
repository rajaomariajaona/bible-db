document_id: PSA.82
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God calls the judges into his courtroom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he puts all the judges in the dock.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: “Enough! You’ve corrupted justice long enough,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ve let the wicked get away with murder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re here to defend the defenseless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to make sure that underdogs get a fair break;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your job is to stand up for the powerless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and prosecute all those who exploit them.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ignorant judges! Head-in-the-sand judges!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They haven’t a clue to what’s going on.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And now everything’s falling apart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the world’s coming unglued.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: “I appointed you judges, each one of you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: deputies of the High God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you’ve betrayed your commission
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now you’re stripped of your rank, busted.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O God, give them what they’ve got coming!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You’ve got the whole world in your hands!
