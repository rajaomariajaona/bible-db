document_id: PSA.82,97
type_code: eng
verses:
  '1':
  - type: text
    content: God calls the judges into his courtroom,
  - type: text
    content: he puts all the judges in the dock.
  '2':
  - type: text
    content: “Enough! You’ve corrupted justice long enough,
  - type: text
    content: you’ve let the wicked get away with murder.
  - type: text
    content: You’re here to defend the defenseless,
  - type: text
    content: to make sure that underdogs get a fair break;
  - type: text
    content: Your job is to stand up for the powerless,
  - type: text
    content: and prosecute all those who exploit them.”
  '5':
  - type: text
    content: Ignorant judges! Head-in-the-sand judges!
  - type: text
    content: They haven’t a clue to what’s going on.
  - type: text
    content: And now everything’s falling apart,
  - type: text
    content: the world’s coming unglued.
  '6':
  - type: text
    content: “I appointed you judges, each one of you,
  - type: text
    content: deputies of the High God,
  - type: text
    content: But you’ve betrayed your commission
  - type: text
    content: and now you’re stripped of your rank, busted.”
  '8':
  - type: text
    content: O God, give them what they’ve got coming!
  - type: text
    content: You’ve got the whole world in your hands!
