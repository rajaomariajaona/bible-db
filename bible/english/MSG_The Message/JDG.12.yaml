document_id: JDG.12,97
type_code: eng
verses:
  '1':
  - type: text
    content: The men of Ephraim mustered their troops, crossed to Zaphon, and said to Jephthah, “Why did you go out to fight the Ammonites without letting us go with you? We’re going to burn your house down on you!”
  '10':
  - type: text
    content: He judged Israel seven years. Ibzan died and was buried in Bethlehem.
  - type: heading
    content: Elon
  '11':
  - type: text
    content: After him, Elon the Zebulunite judged Israel. He judged Israel ten years. Elon the Zebulunite died and was buried at Aijalon in the land of Zebulun.
  - type: heading
    content: Abdon
  '13':
  - type: text
    content: After him, Abdon son of Hillel the Pirathonite judged Israel. He had forty sons and thirty grandsons who rode on seventy donkeys. He judged Israel eight years. Abdon son of Hillel the Pirathonite died and was buried at Pirathon in the land of Ephraim in the Amalekite hill country.
  '2':
  - type: text
    content: 'Jephthah said, “I and my people had our hands full negotiating with the Ammonites. And I did call to you for help but you ignored me. When I saw that you weren’t coming, I took my life in my hands and confronted the Ammonites myself. And '
  - type: text
    content: God
  - type: text
    content: ' gave them to me! So why did you show up here today? Are you spoiling for a fight with me?”'
  '4':
  - type: text
    content: So Jephthah got his Gilead troops together and fought Ephraim. And the men of Gilead hit them hard because they were saying, “Gileadites are nothing but half breeds and rejects from Ephraim and Manasseh.”
  '5':
  - type: text
    content: Gilead captured the fords of the Jordan at the crossing to Ephraim. If an Ephraimite fugitive said, “Let me cross,” the men of Gilead would ask, “Are you an Ephraimite?” and he would say, “No.” And they would say, “Say, ‘Shibboleth.’” But he would always say, “Sibboleth”—he couldn’t say it right. Then they would grab him and kill him there at the fords of the Jordan. Forty-two Ephraimite divisions were killed on that occasion.
  '7':
  - type: text
    content: Jephthah judged Israel six years. Jephthah the Gileadite died and was buried in his city, Mizpah of Gilead.
  - type: heading
    content: Ibzan
  '8':
  - type: text
    content: After him, Ibzan of Bethlehem judged Israel. He had thirty sons and thirty daughters. He gave his daughters in marriage outside his clan and brought in thirty daughters-in-law from the outside for his sons.
