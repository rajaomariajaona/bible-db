document_id: JDG.12,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The men of Ephraim mustered their troops, crossed to Zaphon, and said to Jephthah, “Why did you go out to fight the Ammonites without letting us go with you? We’re going to burn your house down on you!”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He judged Israel seven years. Ibzan died and was buried in Bethlehem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elon
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: After him, Elon the Zebulunite judged Israel. He judged Israel ten years. Elon the Zebulunite died and was buried at Aijalon in the land of Zebulun.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abdon
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: After him, Abdon son of Hillel the Pirathonite judged Israel. He had forty sons and thirty grandsons who rode on seventy donkeys. He judged Israel eight years. Abdon son of Hillel the Pirathonite died and was buried at Pirathon in the land of Ephraim in the Amalekite hill country.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: 'Jephthah said, “I and my people had our hands full negotiating with the Ammonites. And I did call to you for help but you ignored me. When I saw that you weren’t coming, I took my life in my hands and confronted the Ammonites myself. And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave them to me! So why did you show up here today? Are you spoiling for a fight with me?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So Jephthah got his Gilead troops together and fought Ephraim. And the men of Gilead hit them hard because they were saying, “Gileadites are nothing but half breeds and rejects from Ephraim and Manasseh.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: Gilead captured the fords of the Jordan at the crossing to Ephraim. If an Ephraimite fugitive said, “Let me cross,” the men of Gilead would ask, “Are you an Ephraimite?” and he would say, “No.” And they would say, “Say, ‘Shibboleth.’” But he would always say, “Sibboleth”—he couldn’t say it right. Then they would grab him and kill him there at the fords of the Jordan. Forty-two Ephraimite divisions were killed on that occasion.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jephthah judged Israel six years. Jephthah the Gileadite died and was buried in his city, Mizpah of Gilead.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ibzan
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: After him, Ibzan of Bethlehem judged Israel. He had thirty sons and thirty daughters. He gave his daughters in marriage outside his clan and brought in thirty daughters-in-law from the outside for his sons.
