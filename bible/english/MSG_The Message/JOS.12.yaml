document_id: JOS.12,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Defeated Kings
  - type: text
    content: These are the kings that the People of Israel defeated and whose land they took on the east of the Jordan, from the Arnon Gorge to Mount Hermon, with the whole eastern side of the Arabah Valley.
  '2':
  - type: text
    content: 'Sihon king of the Amorites, who reigned from Heshbon: His rule extended from Aroer, which sits at the edge of the Arnon Gorge, from the middle of the gorge and over half of Gilead to the Gorge of the Jabbok River, which is the border of the Ammonites. His rule included the eastern Arabah Valley from the Sea of Kinnereth to the Arabah Sea (the Salt Sea), eastward toward Beth Jeshimoth and southward to the slopes of Pisgah.'
  '4':
  - type: text
    content: 'And Og king of Bashan, one of the last of the Rephaim who reigned from Ashtaroth and Edrei: His rule extended from Mount Hermon and Salecah over the whole of Bashan to the border of the Geshurites and the Maacathites (the other half of Gilead) to the border of Sihon king of Heshbon.'
  '6':
  - type: text
    content: 'Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' and the People of Israel defeated them. And Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' gave this land as an inheritance to the Reubenites, the Gadites, and half of the tribe of Manasseh.'
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: 'And these are the kings of the land that Joshua and the People of Israel defeated in the country west of the Jordan, from Baal Gad in the Valley of Lebanon south to Mount Halak, which towers over Seir. Joshua gave this land to the tribes of Israel as a possession, according to their divisions: lands in the mountains, the western foothills, and the Arabah Valley, on the slopes, and in the wilderness and the Negev desert (lands on which Hittites, Amorites and Canaanites, Perizzites, Hivites, and Jebusites had lived). The kings were:'
