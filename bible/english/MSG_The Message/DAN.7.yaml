document_id: DAN.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Vision of Four Animals
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'In the first year of the reign of King Belshazzar of Babylon, Daniel had a dream. What he saw as he slept in his bed terrified him—a real nightmare. Then he wrote out his dream:'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “I kept watching. The little horn was speaking arrogantly. Then, as I watched, the monster was killed and its body cremated in a roaring fire. The other animals lived on for a limited time, but they didn’t really do anything, had no power to rule. My dream continued.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “I saw a human form, a son of man,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: arriving in a whirl of clouds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He came to The Old One
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and was presented to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was given power to rule—all the glory of royalty.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everyone—race, color, and creed—had to serve him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His rule would be forever, never ending.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His kingly rule would never be replaced.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But as for me, Daniel, I was disturbed. All these dream-visions had me agitated. So I went up to one of those standing by and asked him the meaning of all this. And he told me, interpreting the dream for me:'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘These four huge animals,’ he said, ‘mean that four kingdoms will appear on earth. But eventually the holy people of the High God will be given the kingdom and have it ever after—yes, forever and ever.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But I wanted to know more. I was curious about the fourth animal, the one so different from the others, the hideous monster with the iron teeth and the bronze claws, gulping down what it ripped to pieces and trampling the leftovers into the dirt. And I wanted to know about the ten horns on its head and the other horn that sprouted up while three of the original horns were removed. This new horn had eyes and a big mouth and spoke arrogantly, dominating the other horns. I watched as this horn was making war on God’s holy people and getting the best of them. But then The Old One intervened and decided things in favor of the people of the High God. In the end, God’s holy people took over the kingdom.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “In my dream that night I saw the four winds of heaven whipping up a great storm on the sea. Four huge animals, each different from the others, ascended out of the sea.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The bystander continued, telling me this: ‘The fourth animal is a fourth kingdom that will appear on earth. It will be different from the first three kingdoms, a monster kingdom that will chew up everyone in sight and spit them out. The ten horns are ten kings, one after another, that will come from this kingdom. But then another king will arrive. He will be different from the earlier kings. He will begin by toppling three kings. Then he will blaspheme the High God, persecute the followers of the High God, and try to get rid of sacred worship and moral practice. God’s holy people will be persecuted by him for a time, two times, half a time.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘But when the court comes to order, the horn will be stripped of its power and totally destroyed. Then the royal rule and the authority and the glory of all the kingdoms under heaven will be handed over to the people of the High God. Their royal rule will last forever. All other rulers will serve and obey them.’
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And there it ended. I, Daniel, was in shock. I was like a man who had seen a ghost. But I kept it all to myself.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The first animal looked like a lion, but it had the wings of an eagle. While I watched, its wings were pulled off. It was then pulled erect so that it was standing on two feet like a man. Then a human heart was placed in it.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Then I saw a second animal that looked like a bear. It lurched from side to side, holding three ribs in its jaws. It was told, ‘Attack! Devour! Fill your belly!’
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Next I saw another animal. This one looked like a panther. It had four birdlike wings on its back. This animal had four heads and was made to rule.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “After that, a fourth animal appeared in my dream. This one was a grisly horror—hideous. It had huge iron teeth. It crunched and swallowed its victims. Anything left over, it trampled into the ground. It was different from the other animals—this one was a real monster. It had ten horns.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “As I was staring at the horns and trying to figure out what they meant, another horn sprouted up, a little horn. Three of the original horns were pulled out to make room for it. There were human eyes in this little horn, and a big mouth speaking arrogantly.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “As I was watching all this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Thrones were set in place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and The Old One sat down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His robes were white as snow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his hair was white like wool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His throne was flaming with fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its wheels blazing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A river of fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poured out of the throne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thousands upon thousands served him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tens of thousands attended him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The courtroom was called to order,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the books were opened.
