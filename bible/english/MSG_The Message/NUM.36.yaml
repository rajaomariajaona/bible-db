document_id: NUM.36,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Daughters of Zelophehad
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The heads of the ancestral clan of Gilead son of Makir, the son of Manasseh—they were from the clans of the descendants of Joseph—approached Moses and the leaders who were heads of the families in the People of Israel.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: 'Zelophehad’s daughters did just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded Moses. Mahlah, Tirzah, Hoglah, Milcah, and Noah, Zelophehad’s daughters, all married their cousins on their father’s side. They married within the families of Manasseh son of Joseph and their inheritance-lands stayed in their father’s family.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'These are the commands and regulations that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded through the authority of Moses to the People of Israel on the Plains of Moab at Jordan-Jericho.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4
    - type: text
      text: 'They said, “When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded my master to hand over the inheritance-lands by lot to the People of Israel, my master was also commanded by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' to hand over the inheritance-land of Zelophehad our brother to his daughters. But what happens if they marry into another tribe in the People of Israel? Their inheritance-land will be taken out of our ancestral tribe and get added into the tribe into which they married. And then when the year of Jubilee comes for the People of Israel their inheritance will be lumped in with the inheritance of the tribe into which they married—their land will be removed from our ancestors’ inheritance!”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: 'Moses, at '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s command, issued this order to the People of Israel: “What the tribe of the sons of Joseph says is right. This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s command to Zelophehad’s daughters: They are free to marry anyone they choose as long as they marry within their ancestral clan. The inheritance-land of the People of Israel must not get passed around from tribe to tribe. No, keep the tribal inheritance-land in the family. Every daughter who inherits land, regardless of the tribe she is in, must marry a man from within her father’s tribal clan. Every Israelite is responsible for making sure the inheritance stays within the ancestral tribe. No inheritance-land may be passed from tribe to tribe; each tribe of the People of Israel must hold tight to its own land.”'
