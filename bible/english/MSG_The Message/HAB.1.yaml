document_id: HAB.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Justice Is a Joke
  - type: text
    content: 'The problem as God gave Habakkuk to see it:'
  - type: text
    content: God
  - type: text
    content: ', how long do I have to cry out for help'
  - type: text
    content: before you listen?
  - type: text
    content: How many times do I have to yell, “Help! Murder! Police!”
  - type: text
    content: before you come to the rescue?
  - type: text
    content: Why do you force me to look at evil,
  - type: text
    content: stare trouble in the face day after day?
  - type: text
    content: Anarchy and violence break out,
  - type: text
    content: quarrels and fights all over the place.
  - type: text
    content: Law and order fall to pieces.
  - type: text
    content: Justice is a joke.
  - type: text
    content: The wicked have the righteous hamstrung
  - type: text
    content: and stand justice on its head.
  - type: heading
    content: God Says, “Look!”
  '12':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', you’re from eternity, aren’t you?'
  - type: text
    content: Holy God, we aren’t going to die, are we?
  - type: text
    content: God
  - type: text
    content: ', you chose '
  - type: text
    content: Babylonians
  - type: text
    content: ' for your judgment work?'
  - type: text
    content: 'Rock-Solid God, you gave '
  - type: text
    content: them
  - type: text
    content: ' the job of discipline?'
  - type: text
    content: But you can’t be serious!
  - type: text
    content: You
  - type: text
    content: ' can’t condone evil!'
  - type: text
    content: So why don’t you do something about this?
  - type: text
    content: 'Why are you silent '
  - type: text
    content: now
  - type: text
    content: '?'
  - type: text
    content: This outrage! Evil men swallow up the righteous
  - type: text
    content: 'and you stand around and '
  - type: text
    content: watch
  - type: text
    content: '!'
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: You’re treating men and women
  - type: text
    content: as so many fish in the ocean,
  - type: text
    content: Swimming without direction,
  - type: text
    content: swimming but not getting anywhere.
  - type: text
    content: Then this evil Babylonian arrives and goes fishing.
  - type: text
    content: He pulls in a good catch.
  - type: text
    content: He catches his limit and fills his bucket—
  - type: text
    content: a good day of fishing! He’s happy!
  - type: text
    content: He praises his rod and reel,
  - type: text
    content: piles his fishing gear on an altar and worships it!
  - type: text
    content: It’s made his day,
  - type: text
    content: and he’s going to eat well tonight!
  - type: text
    content: '* * *'
  '17':
  - type: text
    content: Are you going to let this go on and on?
  - type: text
    content: Will you let this Babylonian fisherman
  - type: text
    content: Fish like a weekend angler,
  - type: text
    content: killing people as if they’re nothing but fish?
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: “Look around at the godless nations.
  - type: text
    content: Look long and hard. Brace yourself for a shock.
  - type: text
    content: Something’s about to take place
  - type: text
    content: and you’re going to find it hard to believe.
  - type: text
    content: I’m about to raise up Babylonians to punish you,
  - type: text
    content: Babylonians, fierce and ferocious—
  - type: text
    content: World-conquering Babylon,
  - type: text
    content: grabbing up nations right and left,
  - type: text
    content: A dreadful and terrible people,
  - type: text
    content: making up its own rules as it goes.
  - type: text
    content: Their horses run like the wind,
  - type: text
    content: attack like bloodthirsty wolves.
  - type: text
    content: A stampede of galloping horses
  - type: text
    content: thunders out of nowhere.
  - type: text
    content: They descend like vultures
  - type: text
    content: circling in on carrion.
  - type: text
    content: They’re out to kill. Death is on their minds.
  - type: text
    content: They collect victims like squirrels gathering nuts.
  - type: text
    content: They mock kings,
  - type: text
    content: poke fun at generals,
  - type: text
    content: Spit on forts,
  - type: text
    content: and leave them in the dust.
  - type: text
    content: They’ll all be blown away by the wind.
  - type: text
    content: Brazen in sin, they call strength their god.”
  - type: heading
    content: Why Is God Silent Now?
