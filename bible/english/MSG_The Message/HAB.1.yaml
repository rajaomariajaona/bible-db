document_id: HAB.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Justice Is a Joke
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The problem as God gave Habakkuk to see it:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', how long do I have to cry out for help'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before you listen?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How many times do I have to yell, “Help! Murder! Police!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before you come to the rescue?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you force me to look at evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stare trouble in the face day after day?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anarchy and violence break out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quarrels and fights all over the place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Law and order fall to pieces.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Justice is a joke.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked have the righteous hamstrung
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stand justice on its head.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Says, “Look!”
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you’re from eternity, aren’t you?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Holy God, we aren’t going to die, are we?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you chose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylonians
    - type: text
      text: ' for your judgment work?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Rock-Solid God, you gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' the job of discipline?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you can’t be serious!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You
    - type: text
      text: ' can’t condone evil!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why don’t you do something about this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Why are you silent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This outrage! Evil men swallow up the righteous
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and you stand around and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: watch
    - type: text
      text: '!'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re treating men and women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as so many fish in the ocean,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swimming without direction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swimming but not getting anywhere.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then this evil Babylonian arrives and goes fishing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He pulls in a good catch.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He catches his limit and fills his bucket—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a good day of fishing! He’s happy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He praises his rod and reel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: piles his fishing gear on an altar and worships it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s made his day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he’s going to eat well tonight!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you going to let this go on and on?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you let this Babylonian fisherman
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fish like a weekend angler,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: killing people as if they’re nothing but fish?
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look around at the godless nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look long and hard. Brace yourself for a shock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Something’s about to take place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you’re going to find it hard to believe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m about to raise up Babylonians to punish you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Babylonians, fierce and ferocious—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: World-conquering Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grabbing up nations right and left,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A dreadful and terrible people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: making up its own rules as it goes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their horses run like the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: attack like bloodthirsty wolves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A stampede of galloping horses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thunders out of nowhere.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They descend like vultures
  - type: usfm
    marker: q2
    children:
    - type: text
      text: circling in on carrion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re out to kill. Death is on their minds.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They collect victims like squirrels gathering nuts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They mock kings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: poke fun at generals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spit on forts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leave them in the dust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll all be blown away by the wind.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Brazen in sin, they call strength their god.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Why Is God Silent Now?
    marker-yv: yv-h
