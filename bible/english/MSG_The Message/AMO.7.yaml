verses:
  '1':
  - type: heading
    content: To Die Homeless and Friendless
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', my Master, showed me this vision: He was preparing a locust swarm. The first cutting, which went to the king, was complete, and the second crop was just sprouting. The locusts ate everything green. Not even a blade of grass was left.'
  - type: text
    content: I called out, “
  - type: text
    content: God
  - type: text
    content: ', my Master! Excuse me, but what’s going to come of Jacob? He’s so small.”'
  '10':
  - type: text
    content: 'Amaziah, priest at the shrine at Bethel, sent a message to Jeroboam, king of Israel:'
  - type: text
    content: “Amos is plotting to get rid of you; and he’s doing it as an insider, working from within Israel. His talk will destroy the country. He’s got to be silenced. Do you know what Amos is saying?
  '11':
  - type: text
    content: ‘Jeroboam will be killed.
  - type: text
    content: Israel is headed for exile.’”
  '12':
  - type: text
    content: 'Then Amaziah confronted Amos: “Seer, be on your way! Get out of here and go back to Judah where you came from! Hang out there. Do your preaching there. But no more preaching at Bethel! Don’t show your face here again. This is the king’s chapel. This is a royal shrine.”'
  '14':
  - type: text
    content: 'But Amos stood up to Amaziah: “I never set up to be a preacher, never had plans to be a preacher. I raised cattle and I pruned trees. Then '
  - type: text
    content: God
  - type: text
    content: ' took me off the farm and said, ‘Go preach to my people Israel.’'
  '16':
  - type: text
    content: '“So listen to '
  - type: text
    content: God
  - type: text
    content: '’s Word. You tell me, ‘Don’t preach to Israel. Don’t say anything against the family of Isaac.’ But here’s what '
  - type: text
    content: God
  - type: text
    content: ' is telling you:'
  - type: text
    content: Your wife will become a whore in town.
  - type: text
    content: Your children will get killed.
  - type: text
    content: Your land will be auctioned off.
  - type: text
    content: You will die homeless and friendless.
  - type: text
    content: 'And Israel will be hauled off to exile, far from '
  - type: text
    content: home.
  - type: text
    content: ”
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' gave in.'
  - type: text
    content: “It won’t happen,” he said.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' showed me this vision: Oh! '
  - type: text
    content: God
  - type: text
    content: ', my Master '
  - type: text
    content: God
  - type: text
    content: ' was calling up a firestorm. It burned up the ocean. Then it burned up the Promised Land.'
  '5':
  - type: text
    content: I said, “
  - type: text
    content: God
  - type: text
    content: ', my Master! Hold it—please! What’s going to come of Jacob? He’s so small.”'
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' gave in.'
  - type: text
    content: '“All right, this won’t happen either,” '
  - type: text
    content: God
  - type: text
    content: ', my Master, said.'
  - type: text
    content: '* * *'
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' showed me this vision: My Master was standing beside a wall. In his hand he held a plumb line.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to me, “What do you see, Amos?”'
  - type: text
    content: I said, “A plumb line.”
  - type: text
    content: Then my Master said, “Look what I’ve done. I’ve hung a plumb line in the midst of my people Israel. I’ve spared them for the last time. This is it!
  - type: text
    content: “Isaac’s sex-and-religion shrines will be smashed,
  - type: text
    content: Israel’s unholy shrines will be knocked to pieces.
  - type: text
    content: I’m raising my sword against the royal family of Jeroboam.”
