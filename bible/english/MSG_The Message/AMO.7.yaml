document_id: AMO.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To Die Homeless and Friendless
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my Master, showed me this vision: He was preparing a locust swarm. The first cutting, which went to the king, was complete, and the second crop was just sprouting. The locusts ate everything green. Not even a blade of grass was left.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: I called out, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my Master! Excuse me, but what’s going to come of Jacob? He’s so small.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amaziah, priest at the shrine at Bethel, sent a message to Jeroboam, king of Israel:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Amos is plotting to get rid of you; and he’s doing it as an insider, working from within Israel. His talk will destroy the country. He’s got to be silenced. Do you know what Amos is saying?
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Jeroboam will be killed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel is headed for exile.’”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Amaziah confronted Amos: “Seer, be on your way! Get out of here and go back to Judah where you came from! Hang out there. Do your preaching there. But no more preaching at Bethel! Don’t show your face here again. This is the king’s chapel. This is a royal shrine.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Amos stood up to Amaziah: “I never set up to be a preacher, never had plans to be a preacher. I raised cattle and I pruned trees. Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' took me off the farm and said, ‘Go preach to my people Israel.’'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So listen to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Word. You tell me, ‘Don’t preach to Israel. Don’t say anything against the family of Isaac.’ But here’s what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is telling you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wife will become a whore in town.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your children will get killed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your land will be auctioned off.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will die homeless and friendless.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And Israel will be hauled off to exile, far from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: home.
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave in.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “It won’t happen,” he said.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' showed me this vision: Oh! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was calling up a firestorm. It burned up the ocean. Then it burned up the Promised Land.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my Master! Hold it—please! What’s going to come of Jacob? He’s so small.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave in.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All right, this won’t happen either,” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', my Master, said.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' showed me this vision: My Master was standing beside a wall. In his hand he held a plumb line.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to me, “What do you see, Amos?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: I said, “A plumb line.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then my Master said, “Look what I’ve done. I’ve hung a plumb line in the midst of my people Israel. I’ve spared them for the last time. This is it!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Isaac’s sex-and-religion shrines will be smashed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel’s unholy shrines will be knocked to pieces.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m raising my sword against the royal family of Jeroboam.”
