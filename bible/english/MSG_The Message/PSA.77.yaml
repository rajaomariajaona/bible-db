document_id: PSA.77
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I yell out to my God, I yell with all my might,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I yell at the top of my lungs. He listens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-6
  - type: text
    text: I found myself in trouble and went looking for my Lord;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my life was an open wound that wouldn’t heal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When friends said, “Everything will turn out all right,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: I didn’t believe a word they said.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I remember God—and shake my head.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I bow my head—then wring my hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m awake all night—not a wink of sleep;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t even say what’s bothering me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I go over the days one by one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I ponder the years gone by.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I strum my lute all through the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wondering how to get my life together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: Will the Lord walk off and leave us for good?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will he never smile again?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is his love worn threadbare?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has his salvation promise burned out?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has God forgotten his manners?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has he angrily stomped off and left us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Just my luck,” I said. “The High God retires
- type: usfm
  marker: q2
  children:
  - type: text
    text: just the moment I need him.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'Once again I’ll go over what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: lay out on the table the ancient wonders;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll ponder all the things you’ve accomplished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give a long, loving look at your acts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: O God! Your way is holy!
- type: usfm
  marker: q2
  children:
  - type: text
    text: No god is great like God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re the God who makes things happen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you showed everyone what you can do—
- type: usfm
  marker: q1
  children:
  - type: text
    text: You pulled your people out of the worst kind of trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rescued the children of Jacob and Joseph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-19
  - type: text
    text: Ocean saw you in action, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saw you and trembled with fear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Deep Ocean was scared to death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Clouds belched buckets of rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Sky exploded with thunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your arrows flashing this way and that.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From Whirlwind came your thundering voice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lightning exposed the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Earth reeled and rocked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You strode right through Ocean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: walked straight through roaring Ocean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but nobody saw you come or go.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hidden in the hands of Moses and Aaron,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You led your people like a flock of sheep.
