document_id: PSA.77,97
type_code: eng
verses:
  '1':
  - type: text
    content: I yell out to my God, I yell with all my might,
  - type: text
    content: I yell at the top of my lungs. He listens.
  '11':
  - type: text
    content: 'Once again I’ll go over what '
  - type: text
    content: God
  - type: text
    content: ' has done,'
  - type: text
    content: lay out on the table the ancient wonders;
  - type: text
    content: I’ll ponder all the things you’ve accomplished,
  - type: text
    content: and give a long, loving look at your acts.
  '13':
  - type: text
    content: O God! Your way is holy!
  - type: text
    content: No god is great like God!
  - type: text
    content: You’re the God who makes things happen;
  - type: text
    content: you showed everyone what you can do—
  - type: text
    content: You pulled your people out of the worst kind of trouble,
  - type: text
    content: rescued the children of Jacob and Joseph.
  '16':
  - type: text
    content: Ocean saw you in action, God,
  - type: text
    content: saw you and trembled with fear;
  - type: text
    content: Deep Ocean was scared to death.
  - type: text
    content: Clouds belched buckets of rain,
  - type: text
    content: Sky exploded with thunder,
  - type: text
    content: your arrows flashing this way and that.
  - type: text
    content: From Whirlwind came your thundering voice,
  - type: text
    content: Lightning exposed the world,
  - type: text
    content: Earth reeled and rocked.
  - type: text
    content: You strode right through Ocean,
  - type: text
    content: walked straight through roaring Ocean,
  - type: text
    content: but nobody saw you come or go.
  '2':
  - type: text
    content: I found myself in trouble and went looking for my Lord;
  - type: text
    content: my life was an open wound that wouldn’t heal.
  - type: text
    content: When friends said, “Everything will turn out all right,”
  - type: text
    content: I didn’t believe a word they said.
  - type: text
    content: I remember God—and shake my head.
  - type: text
    content: I bow my head—then wring my hands.
  - type: text
    content: I’m awake all night—not a wink of sleep;
  - type: text
    content: I can’t even say what’s bothering me.
  - type: text
    content: I go over the days one by one,
  - type: text
    content: I ponder the years gone by.
  - type: text
    content: I strum my lute all through the night,
  - type: text
    content: wondering how to get my life together.
  '20':
  - type: text
    content: Hidden in the hands of Moses and Aaron,
  - type: text
    content: You led your people like a flock of sheep.
  '7':
  - type: text
    content: Will the Lord walk off and leave us for good?
  - type: text
    content: Will he never smile again?
  - type: text
    content: Is his love worn threadbare?
  - type: text
    content: Has his salvation promise burned out?
  - type: text
    content: Has God forgotten his manners?
  - type: text
    content: Has he angrily stomped off and left us?
  - type: text
    content: “Just my luck,” I said. “The High God retires
  - type: text
    content: just the moment I need him.”
