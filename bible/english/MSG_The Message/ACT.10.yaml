document_id: ACT.10,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Vision
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: There was a man named Cornelius who lived in Caesarea, captain of the Italian Guard stationed there. He was a thoroughly good man. He had led everyone in his house to live worshipfully before God, was always helping people in need, and had the habit of prayer. One day about three o’clock in the afternoon he had a vision. An angel of God, as real as his next-door neighbor, came in and said, “Cornelius.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Peter said, “Oh, no, Lord. I’ve never so much as tasted food that was not kosher.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The voice came a second time: “If God says it’s okay, it’s okay.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: This happened three times, and then the blanket was pulled back up into the skies.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-20
    - type: text
      text: As Peter, puzzled, sat there trying to figure out what it all meant, the men sent by Cornelius showed up at Simon’s front door. They called in, asking if there was a Simon, also called Peter, staying there. Peter, lost in thought, didn’t hear them, so the Spirit whispered to him, “Three men are knocking at the door looking for you. Get down there and go with them. Don’t ask any questions. I sent them to get you.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Peter went down and said to the men, “I think I’m the man you’re looking for. What’s up?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23a
    - type: text
      text: ' They said, “Captain Cornelius, a God-fearing man well-known for his fair play—ask any Jew in this part of the country—was commanded by a holy angel to get you and bring you to his house so he could hear what you had to say.” Peter invited them in and made them feel at home.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Plays No Favorites
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23b-26
    - type: text
      text: ' The next morning he got up and went with them. Some of his friends from Joppa went along. A day later they entered Caesarea. Cornelius was expecting them and had his relatives and close friends waiting with him. The minute Peter came through the door, Cornelius was up on his feet greeting him—and then down on his face worshiping him! Peter pulled him up and said, “None of that—I’m a man and only a man, no different from you.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-29
    - type: text
      text: Talking things over, they went on into the house, where Cornelius introduced Peter to everyone who had come. Peter addressed them, “You know, I’m sure that this is highly irregular. Jews just don’t do this—visit and relax with people of another race. But God has just shown me that no race is better than any other. So the minute I was sent for, I came, no questions asked. But now I’d like to know why you sent for me.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-32
    - type: text
      text: Cornelius said, “Four days ago at about this time, midafternoon, I was home praying. Suddenly there was a man right in front of me, flooding the room with light. He said, ‘Cornelius, your daily prayers and neighborly acts have brought you to God’s attention. I want you to send to Joppa to get Simon, the one they call Peter. He’s staying with Simon the Tanner down by the sea.’
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “So I did it—I sent for you. And you’ve been good enough to come. And now we’re all here in God’s presence, ready to listen to whatever the Master put in your heart to tell us.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-36
    - type: text
      text: 'Peter fairly exploded with his good news: “It’s God’s own truth, nothing could be plainer: God plays no favorites! It makes no difference who you are or where you’re from—if you want God and are ready to do as he says, the door is open. The Message he sent to the children of Israel—that through Jesus Christ everything is being put together again—well, he’s doing it everywhere, among everyone.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 37-38
    - type: text
      text: “You know the story of what happened in Judea. It began in Galilee after John preached a total life-change. Then Jesus arrived from Nazareth, anointed by God with the Holy Spirit, ready for action. He went through the country helping people and healing everyone who was beaten down by the Devil. He was able to do all this because God was with him.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-43
    - type: text
      text: “And we saw it, saw it all, everything he did in the land of the Jews and in Jerusalem where they killed him, hung him from a cross. But in three days God had him up, alive, and out where he could be seen. Not everyone saw him—he wasn’t put on public display. Witnesses had been carefully handpicked by God beforehand—us! We were the ones, there to eat and drink with him after he came back from the dead. He commissioned us to announce this in public, to bear solemn witness that he is in fact the One whom God destined as Judge of the living and dead. But we’re not alone in this. Our witness that he is the means to forgiveness of sins is backed up by the witness of all the prophets.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: Cornelius stared hard, wondering if he was seeing things. Then he said, “What do you want, sir?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The angel said, “Your prayers and neighborly acts have brought you to God’s attention. Here’s what you are to do. Send men to Joppa to get Simon, the one everyone calls Peter. He is staying with Simon the Tanner, whose house is down by the sea.”
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 44-46a
    - type: text
      text: ' No sooner were these words out of Peter’s mouth than the Holy Spirit came on the listeners. The believing Jews who had come with Peter couldn’t believe it, couldn’t believe that the gift of the Holy Spirit was poured out on “outsider” non-Jews, but there it was—they heard them speaking in tongues, heard them praising God.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 46b-48
    - type: text
      text: ' Then Peter said, “Do I hear any objections to baptizing these friends with water? They’ve received the Holy Spirit exactly as we did.” Hearing no objections, he ordered that they be baptized in the name of Jesus Christ.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they asked Peter to stay on for a few days.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: As soon as the angel was gone, Cornelius called two servants and one particularly devout soldier from the guard. He went over with them in great detail everything that had just happened, and then sent them off to Joppa.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-13
    - type: text
      text: 'The next day as the three travelers were approaching the town, Peter went out on the balcony to pray. It was about noon. Peter got hungry and started thinking about lunch. While lunch was being prepared, he fell into a trance. He saw the skies open up. Something that looked like a huge blanket lowered by ropes at its four corners settled on the ground. Every kind of animal and reptile and bird you could think of was on it. Then a voice came: “Go to it, Peter—kill and eat.”'
