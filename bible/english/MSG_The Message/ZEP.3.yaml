document_id: ZEP.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sewer City
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: Doom to the rebellious city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the home of oppressors—Sewer City!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city that wouldn’t take advice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wouldn’t accept correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wouldn’t trust '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wouldn’t even get close to her own god!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her very own leaders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are rapacious lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her judges are rapacious timber wolves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out every morning prowling for a fresh kill.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her prophets are out for what they can get.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re opportunists—you can’t trust them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her priests desecrate the Sanctuary.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They use God’s law as a weapon to maim and kill souls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' remains righteous in her midst,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: untouched by the evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stays at it, day after day, meting out justice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At evening he’s still at it, strong as ever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But evil men and women, without conscience
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and without shame, persist in evil.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: So sing, Daughter Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Raise your voices, Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daughter Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be happy! celebrate!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has reversed his judgments against you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sent your enemies off chasing their tails.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From now on, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is Israel’s king,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in charge at the center.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing to fear from evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever again!
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Is Present Among You'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: 'Jerusalem will be told:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Don’t be afraid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dear Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t despair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is present among you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a strong Warrior there to save you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Happy to have you back, he’ll calm you with his love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and delight you with his songs.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: “The accumulated sorrows of your exile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will dissipate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, your God, will get rid of them for you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve carried those burdens long enough.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the same time, I’ll get rid of all those
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who’ve made your life miserable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll heal the maimed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll bring home the homeless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the very countries where they were hated
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be venerated.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On Judgment Day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll bring you back home—a great family gathering!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll be famous and honored
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all over the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll see it with your own eyes—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all those painful partings turned into reunions!”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Promise.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “So I cut off the godless nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I knocked down their defense posts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filled her roads with rubble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so no one could get through.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her cities were bombed-out ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unlivable and unlived in.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “I thought, ‘Surely she’ll honor me now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: accept my discipline and correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Find a way of escape from the trouble she’s in,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: find relief from the punishment I’m bringing.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it didn’t faze her. Bright and early
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she was up at it again, doing the same old things.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Well, if that’s what you want, stick around.”
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your day in court is coming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but remember I’ll be there to bring evidence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll bring all the nations to the courtroom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: round up all the kingdoms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let them feel the brunt of my anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my raging wrath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My zeal is a fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will purge and purify the earth.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Is in Charge at the Center'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-13
    - type: text
      text: “In the end I will turn things around for the people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll give them a language undistorted, unpolluted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Words to address '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in worship'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and, united, to serve me with their shoulders to the wheel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll come from beyond the Ethiopian rivers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll come praying—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my scattered, exiled people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come home with offerings for worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll no longer have to be ashamed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of all those acts of rebellion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll have gotten rid of your arrogant leaders.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No more pious strutting on my holy hill!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll leave a core of people among you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are poor in spirit—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What’s left of Israel that’s really Israel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They’ll make their home in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This core holy people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will not do wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They won’t lie,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: won’t use words to flatter or seduce.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Content with who they are and where they are,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unanxious, they’ll live at peace.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
