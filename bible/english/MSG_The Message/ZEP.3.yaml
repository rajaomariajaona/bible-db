document_id: ZEP.3,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Sewer City
  - type: text
    content: Doom to the rebellious city,
  - type: text
    content: the home of oppressors—Sewer City!
  - type: text
    content: The city that wouldn’t take advice,
  - type: text
    content: wouldn’t accept correction,
  - type: text
    content: 'Wouldn’t trust '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: wouldn’t even get close to her own god!
  - type: text
    content: Her very own leaders
  - type: text
    content: are rapacious lions,
  - type: text
    content: Her judges are rapacious timber wolves
  - type: text
    content: out every morning prowling for a fresh kill.
  - type: text
    content: Her prophets are out for what they can get.
  - type: text
    content: They’re opportunists—you can’t trust them.
  - type: text
    content: Her priests desecrate the Sanctuary.
  - type: text
    content: They use God’s law as a weapon to maim and kill souls.
  - type: text
    content: 'Yet '
  - type: text
    content: God
  - type: text
    content: ' remains righteous in her midst,'
  - type: text
    content: untouched by the evil.
  - type: text
    content: He stays at it, day after day, meting out justice.
  - type: text
    content: At evening he’s still at it, strong as ever.
  - type: text
    content: But evil men and women, without conscience
  - type: text
    content: and without shame, persist in evil.
  - type: text
    content: '* * *'
  '14':
  - type: text
    content: So sing, Daughter Zion!
  - type: text
    content: Raise your voices, Israel!
  - type: text
    content: Daughter Jerusalem,
  - type: text
    content: be happy! celebrate!
  - type: text
    content: God
  - type: text
    content: ' has reversed his judgments against you'
  - type: text
    content: and sent your enemies off chasing their tails.
  - type: text
    content: 'From now on, '
  - type: text
    content: God
  - type: text
    content: ' is Israel’s king,'
  - type: text
    content: in charge at the center.
  - type: text
    content: There’s nothing to fear from evil
  - type: text
    content: ever again!
  - type: heading
    content: God Is Present Among You
  '16':
  - type: text
    content: 'Jerusalem will be told:'
  - type: text
    content: “Don’t be afraid.
  - type: text
    content: Dear Zion,
  - type: text
    content: don’t despair.
  - type: text
    content: 'Your '
  - type: text
    content: God
  - type: text
    content: ' is present among you,'
  - type: text
    content: a strong Warrior there to save you.
  - type: text
    content: Happy to have you back, he’ll calm you with his love
  - type: text
    content: and delight you with his songs.
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: “The accumulated sorrows of your exile
  - type: text
    content: will dissipate.
  - type: text
    content: I, your God, will get rid of them for you.
  - type: text
    content: You’ve carried those burdens long enough.
  - type: text
    content: At the same time, I’ll get rid of all those
  - type: text
    content: who’ve made your life miserable.
  - type: text
    content: I’ll heal the maimed;
  - type: text
    content: I’ll bring home the homeless.
  - type: text
    content: In the very countries where they were hated
  - type: text
    content: they will be venerated.
  - type: text
    content: On Judgment Day
  - type: text
    content: I’ll bring you back home—a great family gathering!
  - type: text
    content: You’ll be famous and honored
  - type: text
    content: all over the world.
  - type: text
    content: You’ll see it with your own eyes—
  - type: text
    content: all those painful partings turned into reunions!”
  - type: text
    content: God
  - type: text
    content: ’s Promise.
  '6':
  - type: text
    content: “So I cut off the godless nations.
  - type: text
    content: I knocked down their defense posts,
  - type: text
    content: Filled her roads with rubble
  - type: text
    content: so no one could get through.
  - type: text
    content: Her cities were bombed-out ruins,
  - type: text
    content: unlivable and unlived in.
  '7':
  - type: text
    content: “I thought, ‘Surely she’ll honor me now,
  - type: text
    content: accept my discipline and correction,
  - type: text
    content: Find a way of escape from the trouble she’s in,
  - type: text
    content: find relief from the punishment I’m bringing.’
  - type: text
    content: But it didn’t faze her. Bright and early
  - type: text
    content: she was up at it again, doing the same old things.
  '8':
  - type: text
    content: “Well, if that’s what you want, stick around.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: “Your day in court is coming,
  - type: text
    content: but remember I’ll be there to bring evidence.
  - type: text
    content: I’ll bring all the nations to the courtroom,
  - type: text
    content: round up all the kingdoms,
  - type: text
    content: And let them feel the brunt of my anger,
  - type: text
    content: my raging wrath.
  - type: text
    content: My zeal is a fire
  - type: text
    content: that will purge and purify the earth.
  - type: heading
    content: God Is in Charge at the Center
  '9':
  - type: text
    content: “In the end I will turn things around for the people.
  - type: text
    content: I’ll give them a language undistorted, unpolluted,
  - type: text
    content: 'Words to address '
  - type: text
    content: God
  - type: text
    content: ' in worship'
  - type: text
    content: and, united, to serve me with their shoulders to the wheel.
  - type: text
    content: They’ll come from beyond the Ethiopian rivers,
  - type: text
    content: they’ll come praying—
  - type: text
    content: All my scattered, exiled people
  - type: text
    content: will come home with offerings for worship.
  - type: text
    content: You’ll no longer have to be ashamed
  - type: text
    content: of all those acts of rebellion.
  - type: text
    content: I’ll have gotten rid of your arrogant leaders.
  - type: text
    content: No more pious strutting on my holy hill!
  - type: text
    content: I’ll leave a core of people among you
  - type: text
    content: who are poor in spirit—
  - type: text
    content: What’s left of Israel that’s really Israel.
  - type: text
    content: 'They’ll make their home in '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: This core holy people
  - type: text
    content: will not do wrong.
  - type: text
    content: They won’t lie,
  - type: text
    content: won’t use words to flatter or seduce.
  - type: text
    content: Content with who they are and where they are,
  - type: text
    content: unanxious, they’ll live at peace.”
  - type: text
    content: '* * *'
