document_id: PRO.21,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Examines Our Motives
  - type: text
    content: 'Good leadership is a channel of water controlled by '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: he directs it to whatever ends he chooses.
  '10':
  - type: text
    content: Wicked souls love to make trouble;
  - type: text
    content: they feel nothing for friends and neighbors.
  '11':
  - type: text
    content: Simpletons only learn the hard way,
  - type: text
    content: but the wise learn by listening.
  '12':
  - type: text
    content: A God-loyal person will see right through the wicked
  - type: text
    content: and undo the evil they’ve planned.
  '13':
  - type: text
    content: If you stop your ears to the cries of the poor,
  - type: text
    content: your cries will go unheard, unanswered.
  '14':
  - type: text
    content: A quietly given gift soothes an irritable person;
  - type: text
    content: a heartfelt present cools a hot temper.
  '15':
  - type: text
    content: Good people celebrate when justice triumphs,
  - type: text
    content: but for the workers of evil it’s a bad day.
  '16':
  - type: text
    content: Whoever wanders off the straight and narrow
  - type: text
    content: ends up in a congregation of ghosts.
  '17':
  - type: text
    content: You’re addicted to thrills? What an empty life!
  - type: text
    content: The pursuit of pleasure is never satisfied.
  '18':
  - type: text
    content: What a bad person plots against the good, boomerangs;
  - type: text
    content: the plotter gets it in the end.
  '19':
  - type: text
    content: Better to live in a tent in the wild
  - type: text
    content: than with a cross and petulant spouse.
  '2':
  - type: text
    content: We justify our actions by appearances;
  - type: text
    content: God
  - type: text
    content: ' examines our motives.'
  '20':
  - type: text
    content: Valuables are safe in a wise person’s home;
  - type: text
    content: fools put it all out for yard sales.
  '21':
  - type: text
    content: Whoever goes hunting for what is right and kind
  - type: text
    content: finds life itself—
  - type: text
    content: glorious
  - type: text
    content: ' life!'
  '22':
  - type: text
    content: One sage entered a whole city of armed soldiers—
  - type: text
    content: their trusted defenses fell to pieces!
  '23':
  - type: text
    content: Watch your words and hold your tongue;
  - type: text
    content: you’ll save yourself a lot of grief.
  '24':
  - type: text
    content: You know their names—Brash, Impudent, Blasphemer—
  - type: text
    content: intemperate hotheads, every one.
  '25':
  - type: text
    content: Lazy people finally die of hunger
  - type: text
    content: because they won’t get up and go to work.
  '26':
  - type: text
    content: Sinners are always wanting what they don’t have;
  - type: text
    content: the God-loyal are always giving what they do have.
  '27':
  - type: text
    content: Religious performance by the wicked stinks;
  - type: text
    content: it’s even worse when they use it to get ahead.
  '28':
  - type: text
    content: A lying witness is unconvincing;
  - type: text
    content: a person who speaks truth is respected.
  '29':
  - type: text
    content: Unscrupulous people fake it a lot;
  - type: text
    content: honest people are sure of their steps.
  '3':
  - type: text
    content: Clean living before God and justice with our neighbors
  - type: text
    content: 'mean far more to '
  - type: text
    content: God
  - type: text
    content: ' than religious performance.'
  '30':
  - type: text
    content: Nothing clever, nothing conceived, nothing contrived,
  - type: text
    content: 'can get the better of '
  - type: text
    content: God
  - type: text
    content: .
  '31':
  - type: text
    content: Do your best, prepare for the worst—
  - type: text
    content: 'then trust '
  - type: text
    content: 'God '
  - type: text
    content: to bring victory.
  '4':
  - type: text
    content: Arrogance and pride—distinguishing marks in the wicked—
  - type: text
    content: are just plain sin.
  '5':
  - type: text
    content: Careful planning puts you ahead in the long run;
  - type: text
    content: hurry and scurry puts you further behind.
  '6':
  - type: text
    content: Make it to the top by lying and cheating;
  - type: text
    content: get paid with smoke and a promotion—to death!
  '7':
  - type: text
    content: The wicked get buried alive by their loot
  - type: text
    content: because they refuse to use it to help others.
  '8':
  - type: text
    content: Mixed motives twist life into tangles;
  - type: text
    content: pure motives take you straight down the road.
  - type: heading
    content: Do Your Best, Prepare for the Worst
  '9':
  - type: text
    content: Better to live alone in a tumbledown shack
  - type: text
    content: than share a mansion with a nagging spouse.
