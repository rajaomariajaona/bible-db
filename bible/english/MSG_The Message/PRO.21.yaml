document_id: PRO.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Examines Our Motives'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Good leadership is a channel of water controlled by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he directs it to whatever ends he chooses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: We justify our actions by appearances;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' examines our motives.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Clean living before God and justice with our neighbors
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'mean far more to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' than religious performance.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Arrogance and pride—distinguishing marks in the wicked—
- type: usfm
  marker: q2
  children:
  - type: text
    text: are just plain sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Careful planning puts you ahead in the long run;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hurry and scurry puts you further behind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Make it to the top by lying and cheating;
- type: usfm
  marker: q2
  children:
  - type: text
    text: get paid with smoke and a promotion—to death!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The wicked get buried alive by their loot
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they refuse to use it to help others.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mixed motives twist life into tangles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pure motives take you straight down the road.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Do Your Best, Prepare for the Worst
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Better to live alone in a tumbledown shack
- type: usfm
  marker: q2
  children:
  - type: text
    text: than share a mansion with a nagging spouse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Wicked souls love to make trouble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they feel nothing for friends and neighbors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Simpletons only learn the hard way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wise learn by listening.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A God-loyal person will see right through the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and undo the evil they’ve planned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If you stop your ears to the cries of the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your cries will go unheard, unanswered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A quietly given gift soothes an irritable person;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a heartfelt present cools a hot temper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Good people celebrate when justice triumphs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but for the workers of evil it’s a bad day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Whoever wanders off the straight and narrow
- type: usfm
  marker: q2
  children:
  - type: text
    text: ends up in a congregation of ghosts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You’re addicted to thrills? What an empty life!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The pursuit of pleasure is never satisfied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: What a bad person plots against the good, boomerangs;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the plotter gets it in the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Better to live in a tent in the wild
- type: usfm
  marker: q2
  children:
  - type: text
    text: than with a cross and petulant spouse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Valuables are safe in a wise person’s home;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools put it all out for yard sales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Whoever goes hunting for what is right and kind
- type: usfm
  marker: q2
  children:
  - type: text
    text: finds life itself—
  - type: usfm
    marker: it
    children:
    - type: text
      text: glorious
  - type: text
    text: ' life!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: One sage entered a whole city of armed soldiers—
- type: usfm
  marker: q2
  children:
  - type: text
    text: their trusted defenses fell to pieces!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Watch your words and hold your tongue;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll save yourself a lot of grief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You know their names—Brash, Impudent, Blasphemer—
- type: usfm
  marker: q2
  children:
  - type: text
    text: intemperate hotheads, every one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Lazy people finally die of hunger
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they won’t get up and go to work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Sinners are always wanting what they don’t have;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God-loyal are always giving what they do have.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Religious performance by the wicked stinks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it’s even worse when they use it to get ahead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A lying witness is unconvincing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a person who speaks truth is respected.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Unscrupulous people fake it a lot;
- type: usfm
  marker: q2
  children:
  - type: text
    text: honest people are sure of their steps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nothing clever, nothing conceived, nothing contrived,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'can get the better of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Do your best, prepare for the worst—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'then trust '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God '
  - type: text
    text: to bring victory.
