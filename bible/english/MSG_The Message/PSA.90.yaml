document_id: PSA.90
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: God, it seems you’ve been our home forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: long before the mountains were born,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Long before you brought earth itself to birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from “once upon a time” to “kingdom come”—you are God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-11
  - type: text
    text: So don’t return us to mud, saying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Back to where you came from!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Patience! You’ve got all the time in the world—whether
- type: usfm
  marker: q2
  children:
  - type: text
    text: a thousand years or a day, it’s all the same to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are we no more to you than a wispy dream,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more than a blade of grass
- type: usfm
  marker: q1
  children:
  - type: text
    text: That springs up gloriously with the rising sun
- type: usfm
  marker: q2
  children:
  - type: text
    text: and is cut down without a second thought?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your anger is far and away too much for us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’re at the end of our rope.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You keep track of all our sins; every misdeed
- type: usfm
  marker: q2
  children:
  - type: text
    text: since we were children is entered in your books.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All we can remember is that frown on your face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is that all we’re ever going to get?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We live for seventy years or so
- type: usfm
  marker: q2
  children:
  - type: text
    text: (with luck we might make it to eighty),
- type: usfm
  marker: q1
  children:
  - type: text
    text: And what do we have to show for it? Trouble.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Toil and trouble and a marker in the graveyard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can make sense of such rage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: such anger against the very ones who fear you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-17
  - type: text
    text: Oh! Teach us to live well!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Teach us to live wisely and well!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Come back, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —how long do we have to wait?—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and treat your servants with kindness for a change.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surprise us with love at daybreak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then we’ll skip and dance all the day long.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make up for the bad times with some good times;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’ve seen enough evil to last a lifetime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let your servants see what you’re best at—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ways you rule and bless your children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And let the loveliness of our Lord, our God, rest on us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: confirming the work that we do.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, yes. Affirm the work that we do!
