document_id: PSA.90,97
type_code: eng
verses:
  '1':
  - type: text
    content: God, it seems you’ve been our home forever;
  - type: text
    content: long before the mountains were born,
  - type: text
    content: Long before you brought earth itself to birth,
  - type: text
    content: from “once upon a time” to “kingdom come”—you are God.
  '12':
  - type: text
    content: Oh! Teach us to live well!
  - type: text
    content: Teach us to live wisely and well!
  - type: text
    content: 'Come back, '
  - type: text
    content: God
  - type: text
    content: —how long do we have to wait?—
  - type: text
    content: and treat your servants with kindness for a change.
  - type: text
    content: Surprise us with love at daybreak;
  - type: text
    content: then we’ll skip and dance all the day long.
  - type: text
    content: Make up for the bad times with some good times;
  - type: text
    content: we’ve seen enough evil to last a lifetime.
  - type: text
    content: Let your servants see what you’re best at—
  - type: text
    content: the ways you rule and bless your children.
  - type: text
    content: And let the loveliness of our Lord, our God, rest on us,
  - type: text
    content: confirming the work that we do.
  - type: text
    content: Oh, yes. Affirm the work that we do!
  '3':
  - type: text
    content: So don’t return us to mud, saying,
  - type: text
    content: “Back to where you came from!”
  - type: text
    content: Patience! You’ve got all the time in the world—whether
  - type: text
    content: a thousand years or a day, it’s all the same to you.
  - type: text
    content: Are we no more to you than a wispy dream,
  - type: text
    content: no more than a blade of grass
  - type: text
    content: That springs up gloriously with the rising sun
  - type: text
    content: and is cut down without a second thought?
  - type: text
    content: Your anger is far and away too much for us;
  - type: text
    content: we’re at the end of our rope.
  - type: text
    content: You keep track of all our sins; every misdeed
  - type: text
    content: since we were children is entered in your books.
  - type: text
    content: All we can remember is that frown on your face.
  - type: text
    content: Is that all we’re ever going to get?
  - type: text
    content: We live for seventy years or so
  - type: text
    content: (with luck we might make it to eighty),
  - type: text
    content: And what do we have to show for it? Trouble.
  - type: text
    content: Toil and trouble and a marker in the graveyard.
  - type: text
    content: Who can make sense of such rage,
  - type: text
    content: such anger against the very ones who fear you?
