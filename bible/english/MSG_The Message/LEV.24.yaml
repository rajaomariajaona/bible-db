document_id: LEV.24,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Light and Bread
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Order the People of Israel to bring you virgin olive oil for light so that the lamps may be kept burning continually. Aaron is in charge of keeping these lamps burning in front of the curtain that screens The Testimony in the Tent of Meeting from evening to morning continually before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. This is a perpetual decree down through the generations. Aaron is responsible for keeping the lamps burning continually on the Lampstand of pure gold before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: 'One day the son of an Israelite mother and an Egyptian father went out among the Israelites. A fight broke out in the camp between him and an Israelite. The son of the Israelite woman blasphemed the Name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and cursed. They brought him to Moses. His mother’s name was Shelomith, daughter of Dibri of the tribe of Dan. They put him in custody waiting for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s will to be revealed to them.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-16
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Take the blasphemer outside the camp. Have all those who heard him place their hands on his head; then have the entire congregation stone him. Then tell the Israelites, Anyone who curses God will be held accountable; anyone who blasphemes the Name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' must be put to death. The entire congregation must stone him. It makes no difference whether he is a foreigner or a native, if he blasphemes the Name, he will be put to death.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-22
    - type: text
      text: '“Anyone who hits and kills a fellow human must be put to death. Anyone who kills someone’s animal must make it good—a life for a life. Anyone who injures his neighbor will get back the same as he gave: fracture for fracture, eye for eye, tooth for tooth. What he did to hurt that person will be done to him. Anyone who hits and kills an animal must make it good, but whoever hits and kills a fellow human will be put to death. And no double standards: the same rule goes for foreigners and natives. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' God.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Moses then spoke to the People of Israel. They brought the blasphemer outside the camp and stoned him. The People of Israel followed the orders '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had given Moses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-9
    - type: text
      text: '“Take fine flour and bake twelve loaves of bread, using about four quarts of flour to a loaf. Arrange them in two rows of six each on the Table of pure gold before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Along each row spread pure incense, marking the bread as a memorial; it is a gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Regularly, every Sabbath, this bread is to be set before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', a perpetual covenantal response from Israel. The bread then goes to Aaron and his sons, who are to eat it in a Holy Place. It is their most holy share from the gifts to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . This is a perpetual decree.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
