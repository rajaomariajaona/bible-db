document_id: ISA.35,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Voiceless Break into Song
  - type: text
    content: Wilderness and desert will sing joyously,
  - type: text
    content: the badlands will celebrate and flower—
  - type: text
    content: Like the crocus in spring, bursting into blossom,
  - type: text
    content: a symphony of song and color.
  - type: text
    content: Mountain glories of Lebanon—a gift.
  - type: text
    content: Awesome Carmel, stunning Sharon—gifts.
  - type: text
    content: God
  - type: text
    content: ’s resplendent glory, fully on display.
  - type: text
    content: God
  - type: text
    content: ' awesome, '
  - type: text
    content: God
  - type: text
    content: ' majestic.'
  '3':
  - type: text
    content: Energize the limp hands,
  - type: text
    content: strengthen the rubbery knees.
  - type: text
    content: Tell fearful souls,
  - type: text
    content: “Courage! Take heart!
  - type: text
    content: God
  - type: text
    content: ' is here, right here,'
  - type: text
    content: on his way to put things right
  - type: text
    content: And redress all wrongs.
  - type: text
    content: He’s on his way! He’ll save you!”
  '5':
  - type: text
    content: Blind eyes will be opened,
  - type: text
    content: deaf ears unstopped,
  - type: text
    content: Lame men and women will leap like deer,
  - type: text
    content: the voiceless break into song.
  - type: text
    content: Springs of water will burst out in the wilderness,
  - type: text
    content: streams flow in the desert.
  - type: text
    content: Hot sands will become a cool oasis,
  - type: text
    content: thirsty ground a splashing fountain.
  - type: text
    content: Even lowly jackals will have water to drink,
  - type: text
    content: and barren grasslands flourish richly.
  '8':
  - type: text
    content: There will be a highway
  - type: text
    content: called the Holy Road.
  - type: text
    content: No one rude or rebellious
  - type: text
    content: is permitted on this road.
  - type: text
    content: 'It’s for '
  - type: text
    content: God
  - type: text
    content: ’s people exclusively—
  - type: text
    content: impossible to get lost on this road.
  - type: text
    content: Not even fools can get lost on it.
  - type: text
    content: No lions on this road,
  - type: text
    content: no dangerous wild animals—
  - type: text
    content: Nothing and no one dangerous or threatening.
  - type: text
    content: Only the redeemed will walk on it.
  - type: text
    content: 'The people '
  - type: text
    content: God
  - type: text
    content: ' has ransomed'
  - type: text
    content: will come back on this road.
  - type: text
    content: They’ll sing as they make their way home to Zion,
  - type: text
    content: unfading halos of joy encircling their heads,
  - type: text
    content: Welcomed home with gifts of joy and gladness
  - type: text
    content: as all sorrows and sighs scurry into the night.
