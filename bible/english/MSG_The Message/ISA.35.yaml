document_id: ISA.35,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Voiceless Break into Song
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wilderness and desert will sing joyously,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the badlands will celebrate and flower—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the crocus in spring, bursting into blossom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a symphony of song and color.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountain glories of Lebanon—a gift.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Awesome Carmel, stunning Sharon—gifts.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s resplendent glory, fully on display.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' awesome, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' majestic.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Energize the limp hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strengthen the rubbery knees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell fearful souls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Courage! Take heart!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is here, right here,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on his way to put things right
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And redress all wrongs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s on his way! He’ll save you!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blind eyes will be opened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deaf ears unstopped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lame men and women will leap like deer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the voiceless break into song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Springs of water will burst out in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: streams flow in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hot sands will become a cool oasis,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thirsty ground a splashing fountain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even lowly jackals will have water to drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and barren grasslands flourish richly.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be a highway
  - type: usfm
    marker: q2
    children:
    - type: text
      text: called the Holy Road.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one rude or rebellious
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is permitted on this road.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It’s for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s people exclusively—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: impossible to get lost on this road.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not even fools can get lost on it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No lions on this road,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no dangerous wild animals—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing and no one dangerous or threatening.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Only the redeemed will walk on it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The people '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has ransomed'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come back on this road.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll sing as they make their way home to Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unfading halos of joy encircling their heads,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Welcomed home with gifts of joy and gladness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as all sorrows and sighs scurry into the night.
