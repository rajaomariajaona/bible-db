document_id: ISA.47,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Party’s Over
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: “Get off your high horse and sit in the dirt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: virgin daughter of Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No more throne for you—sit on the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: daughter of the Chaldeans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nobody will be calling you ‘charming’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ‘alluring’ anymore. Get used to it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Get a job, any old job:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Clean gutters, scrub toilets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pawn your gowns and scarves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: put on your working pants—the party’s over.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your nude body will be on public display,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: exposed to vulgar taunts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s vengeance time, and I’m taking vengeance.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one gets let off the hook.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: You’re Acting Like the Center of the Universe
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: “Fat chance. You’d be grasping at straws
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that are already in the fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fire that is even now raging.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your ‘experts’ are in it and won’t get out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s not a fire for cooking venison stew,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a fire to warm you on a winter night!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s the fate of your friends in sorcery, your magician cronies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ve been colluding with all your life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They reel, confused, bumping into one another.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: None of them bother to help you.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-13
    - type: text
      text: Our Redeemer speaks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'named '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, The Holy of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Shut up and get out of the way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: daughter of Chaldeans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll no longer be called
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘First Lady of the Kingdoms.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was fed up with my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thoroughly disgusted with my progeny.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I turned them over to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you had no compassion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You put old men and women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to cruel, hard labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You said, ‘I’m the First Lady.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll always be the pampered darling.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You took nothing seriously, took nothing to heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never gave tomorrow a thought.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, start thinking, party girl.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re acting like the center of the universe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smugly saying to yourself, ‘I’m Number One. There’s nobody but me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll never be a widow, I’ll never lose my children.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those two things are going to hit you both at once,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'suddenly, on the same day:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spouse and children gone, a total loss,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: despite your many enchantments and charms.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were so confident and comfortable in your evil life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saying, ‘No one sees me.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You thought you knew so much, had everything figured out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What delusion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Smugly telling yourself, ‘I’m Number One. There’s nobody but me.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ruin descends—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you can’t charm it away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster strikes—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you can’t cast it off with spells.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Catastrophe, sudden and total—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you’re totally at sea, totally bewildered!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But don’t give up. From your great repertoire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of enchantments there must be one you haven’t yet tried.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve been at this a long time.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Surely '
    - type: usfm
      marker: it
      children:
      - type: text
        text: something
    - type: text
      text: ' will work.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know you’re exhausted trying out remedies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but don’t give up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call in the astrologers and stargazers.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They’re good at this. Surely they can work up something!
