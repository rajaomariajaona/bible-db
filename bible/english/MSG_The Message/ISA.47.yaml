document_id: ISA.47,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Party’s Over
  - type: text
    content: “Get off your high horse and sit in the dirt,
  - type: text
    content: virgin daughter of Babylon.
  - type: text
    content: No more throne for you—sit on the ground,
  - type: text
    content: daughter of the Chaldeans.
  - type: text
    content: Nobody will be calling you ‘charming’
  - type: text
    content: and ‘alluring’ anymore. Get used to it.
  - type: text
    content: 'Get a job, any old job:'
  - type: text
    content: Clean gutters, scrub toilets.
  - type: text
    content: Pawn your gowns and scarves,
  - type: text
    content: put on your working pants—the party’s over.
  - type: text
    content: Your nude body will be on public display,
  - type: text
    content: exposed to vulgar taunts.
  - type: text
    content: It’s vengeance time, and I’m taking vengeance.
  - type: text
    content: No one gets let off the hook.”
  - type: heading
    content: You’re Acting Like the Center of the Universe
  '14':
  - type: text
    content: “Fat chance. You’d be grasping at straws
  - type: text
    content: that are already in the fire,
  - type: text
    content: A fire that is even now raging.
  - type: text
    content: Your ‘experts’ are in it and won’t get out.
  - type: text
    content: It’s not a fire for cooking venison stew,
  - type: text
    content: not a fire to warm you on a winter night!
  - type: text
    content: That’s the fate of your friends in sorcery, your magician cronies
  - type: text
    content: you’ve been colluding with all your life.
  - type: text
    content: They reel, confused, bumping into one another.
  - type: text
    content: None of them bother to help you.”
  '4':
  - type: text
    content: Our Redeemer speaks,
  - type: text
    content: 'named '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, The Holy of Israel:'
  - type: text
    content: “Shut up and get out of the way,
  - type: text
    content: daughter of Chaldeans.
  - type: text
    content: You’ll no longer be called
  - type: text
    content: ‘First Lady of the Kingdoms.’
  - type: text
    content: I was fed up with my people,
  - type: text
    content: thoroughly disgusted with my progeny.
  - type: text
    content: I turned them over to you,
  - type: text
    content: but you had no compassion.
  - type: text
    content: You put old men and women
  - type: text
    content: to cruel, hard labor.
  - type: text
    content: You said, ‘I’m the First Lady.
  - type: text
    content: I’ll always be the pampered darling.’
  - type: text
    content: You took nothing seriously, took nothing to heart,
  - type: text
    content: never gave tomorrow a thought.
  - type: text
    content: Well, start thinking, party girl.
  - type: text
    content: You’re acting like the center of the universe,
  - type: text
    content: Smugly saying to yourself, ‘I’m Number One. There’s nobody but me.
  - type: text
    content: I’ll never be a widow, I’ll never lose my children.’
  - type: text
    content: Those two things are going to hit you both at once,
  - type: text
    content: 'suddenly, on the same day:'
  - type: text
    content: Spouse and children gone, a total loss,
  - type: text
    content: despite your many enchantments and charms.
  - type: text
    content: You were so confident and comfortable in your evil life,
  - type: text
    content: saying, ‘No one sees me.’
  - type: text
    content: You thought you knew so much, had everything figured out.
  - type: text
    content: What delusion!
  - type: text
    content: Smugly telling yourself, ‘I’m Number One. There’s nobody but me.’
  - type: text
    content: Ruin descends—
  - type: text
    content: you can’t charm it away.
  - type: text
    content: Disaster strikes—
  - type: text
    content: you can’t cast it off with spells.
  - type: text
    content: Catastrophe, sudden and total—
  - type: text
    content: and you’re totally at sea, totally bewildered!
  - type: text
    content: But don’t give up. From your great repertoire
  - type: text
    content: of enchantments there must be one you haven’t yet tried.
  - type: text
    content: You’ve been at this a long time.
  - type: text
    content: 'Surely '
  - type: text
    content: something
  - type: text
    content: ' will work.'
  - type: text
    content: I know you’re exhausted trying out remedies,
  - type: text
    content: but don’t give up.
  - type: text
    content: Call in the astrologers and stargazers.
  - type: text
    content: They’re good at this. Surely they can work up something!
