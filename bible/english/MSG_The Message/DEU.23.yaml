document_id: DEU.23,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'No eunuch is to enter the congregation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-14
    - type: text
      text: 'Mark out an area outside the camp where you can go to relieve yourselves. Along with your weapons have a stick with you. After you relieve yourself, dig a hole with the stick and cover your excrement. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, strolls through your camp; he’s present to deliver you and give you victory over your enemies. Keep your camp holy; don’t permit anything indecent or offensive in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s eyes.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: Don’t return a runaway slave to his master; he’s come to you for refuge. Let him live wherever he wishes within the protective gates of your city. Don’t take advantage of him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'No daughter of Israel is to become a sacred prostitute; and no son of Israel is to become a sacred prostitute. And don’t bring the fee of a sacred whore or the earnings of a priest-pimp to the house of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, to pay for any vow—they are both an abomination to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: 'Don’t charge interest to your kinsmen on any loan: not for money or food or clothing or anything else that could earn interest. You may charge foreigners interest, but you may not charge your brothers interest; that way '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, will bless all the work that you take up and the land that you are entering to possess.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'No bastard is to enter the congregation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', even to the tenth generation, nor any of his children.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23
    - type: text
      text: 'When you make a vow to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, don’t put off keeping it; '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, expects you to keep it and if you don’t you’re guilty. But if you don’t make a vow in the first place, there’s no sin. If you say you’re going to do something, do it. Keep the vow you willingly vowed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God. You promised it, so do it.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: When you enter your neighbor’s vineyard, you may eat all the grapes you want until you’re full, but you may not put any in your bucket or bag. And when you walk through the ripe grain of your neighbor, you may pick the heads of grain, but you may not swing your sickle there.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-6
    - type: text
      text: 'No Ammonite or Moabite is to enter the congregation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', even to the tenth generation, nor any of his children, ever. Those nations didn’t treat you with hospitality on your travels out of Egypt, and on top of that they also hired Balaam son of Beor from Pethor in Mesopotamia to curse you. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, refused to listen to Balaam but turned the curse into a blessing—how '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, loves you! Don’t even try to get along with them or do anything for them, ever.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But don’t spurn an Edomite; he’s your kin.
  - type: usfm
    marker: p
    children:
    - type: text
      text: And don’t spurn an Egyptian; you were a foreigner in his land.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Children born to Edomites and Egyptians may enter the congregation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in the third generation.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-11
    - type: text
      text: When you are camped out, at war with your enemies, be careful to keep yourself from anything ritually defiling. If one of your men has become ritually unclean because of a nocturnal emission, he must go outside the camp and stay there until evening when he can wash himself, returning to the camp at sunset.
