document_id: PSA.9,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m thanking you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', from a full heart,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m writing the book on your wonders.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m whistling, laughing, and jumping for joy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m singing your song, High God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing your songs to Zion-dwelling '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'tell his stories to everyone you meet:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How he tracks down killers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet keeps his eye on us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: registers every whimper and moan.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be kind to me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve been kicked around long enough.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once you’ve pulled me back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the gates of death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll write the book on Hallelujahs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the corner of Main and First
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll hold a street meeting;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll be the song leader; we’ll fill the air
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with salvation songs.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re trapped, those godless countries,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the very snares they set,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their feet all tangled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the net they spread.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have no excuse;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the way God works is well-known.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The shrewd machinery made by the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has maimed their own hands.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked bought a one-way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ticket to hell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No longer will the poor be nameless—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no more humiliation for the humble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Aren’t you fed up with their empty strutting?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Expose these grand pretensions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shake them up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Show them how silly they look.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day my enemies turned tail and ran,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumbled on you and fell on their faces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You took over and set everything right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I needed you, you were there, taking charge.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You blow the whistle on godless nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you throw dirty players out of the game,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wipe their names right off the roster.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enemies disappear from the sidelines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their reputation trashed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their names erased from the halls of fame.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' holds the high center,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sees and sets the world’s mess right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He decides what is right for us earthlings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gives people their just deserts.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s a safe-house for the battered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a sanctuary during bad times.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The moment you arrive, you relax;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’re never sorry you knocked.
