document_id: PSA.9,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I’m thanking you, '
  - type: text
    content: God
  - type: text
    content: ', from a full heart,'
  - type: text
    content: I’m writing the book on your wonders.
  - type: text
    content: I’m whistling, laughing, and jumping for joy;
  - type: text
    content: I’m singing your song, High God.
  '11':
  - type: text
    content: 'Sing your songs to Zion-dwelling '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: 'tell his stories to everyone you meet:'
  - type: text
    content: How he tracks down killers
  - type: text
    content: yet keeps his eye on us,
  - type: text
    content: registers every whimper and moan.
  '13':
  - type: text
    content: 'Be kind to me, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: I’ve been kicked around long enough.
  - type: text
    content: Once you’ve pulled me back
  - type: text
    content: from the gates of death,
  - type: text
    content: I’ll write the book on Hallelujahs;
  - type: text
    content: on the corner of Main and First
  - type: text
    content: I’ll hold a street meeting;
  - type: text
    content: I’ll be the song leader; we’ll fill the air
  - type: text
    content: with salvation songs.
  '15':
  - type: text
    content: They’re trapped, those godless countries,
  - type: text
    content: in the very snares they set,
  - type: text
    content: Their feet all tangled
  - type: text
    content: in the net they spread.
  - type: text
    content: They have no excuse;
  - type: text
    content: the way God works is well-known.
  - type: text
    content: The shrewd machinery made by the wicked
  - type: text
    content: has maimed their own hands.
  '17':
  - type: text
    content: The wicked bought a one-way
  - type: text
    content: ticket to hell.
  - type: text
    content: No longer will the poor be nameless—
  - type: text
    content: no more humiliation for the humble.
  - type: text
    content: 'Up, '
  - type: text
    content: God
  - type: text
    content: '! Aren’t you fed up with their empty strutting?'
  - type: text
    content: Expose these grand pretensions!
  - type: text
    content: 'Shake them up, '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: Show them how silly they look.
  '3':
  - type: text
    content: The day my enemies turned tail and ran,
  - type: text
    content: they stumbled on you and fell on their faces.
  - type: text
    content: You took over and set everything right;
  - type: text
    content: when I needed you, you were there, taking charge.
  '5':
  - type: text
    content: You blow the whistle on godless nations;
  - type: text
    content: you throw dirty players out of the game,
  - type: text
    content: wipe their names right off the roster.
  - type: text
    content: Enemies disappear from the sidelines,
  - type: text
    content: their reputation trashed,
  - type: text
    content: their names erased from the halls of fame.
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' holds the high center,'
  - type: text
    content: he sees and sets the world’s mess right.
  - type: text
    content: He decides what is right for us earthlings,
  - type: text
    content: gives people their just deserts.
  '9':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s a safe-house for the battered,
  - type: text
    content: a sanctuary during bad times.
  - type: text
    content: The moment you arrive, you relax;
  - type: text
    content: you’re never sorry you knocked.
