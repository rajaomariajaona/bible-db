type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: If I wrote any more on this relief offering for the poor Christians, I’d be repeating myself. I know you’re on board and ready to go. I’ve been bragging about you all through Macedonia province, telling them, “Achaia province has been ready to go on this since last year.” Your enthusiasm by now has spread to most of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: Now I’m sending the brothers to make sure you’re ready, as I said you would be, so my bragging won’t turn out to be just so much hot air. If some Macedonians and I happened to drop in on you and found you weren’t prepared, we’d all be pretty red-faced—you and us—for acting so sure of ourselves. So to make sure there will be no slipup, I’ve recruited these brothers as an advance team to get you and your promised offering all ready before I get there. I want you to have all the time you need to make this offering in your own way. I don’t want anything forced or hurried at the last minute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Remember: A stingy planter gets a stingy crop; a lavish planter gets a lavish crop. I want each of you to take plenty of time to think it over, and make up your own mind what you will give. That will protect you against sob stories and arm-twisting. God loves it when the giver delights in the giving.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: God can pour on the blessings in astonishing ways so that you’re ready for anything and everything, more than just ready to do what needs to be done. As one psalmist puts it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: He throws caution to the winds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving to the needy in reckless abandon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His right-living, right-giving ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: never run out, never wear out.
- type: usfm
  marker: m
  children:
  - type: text
    text: This most generous God who gives seed to the farmer that becomes bread for your meals is more than extravagant with you. He gives you something you can then give away, which grows into full-formed lives, robust in God, wealthy in every way, so that you can be generous in every way, producing with us great praise to God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: Carrying out this social relief work involves far more than helping meet the bare needs of poor Christians. It also produces abundant and bountiful thanksgivings to God. This relief offering is a prod to live at your very best, showing your gratitude to God by being openly obedient to the plain meaning of the Message of Christ. You show your gratitude through your generous offerings to your needy brothers and sisters, and really toward everyone. Meanwhile, moved by the extravagance of God in your lives, they’ll respond by praying for you in passionate intercession for whatever you need. Thank God for this gift, his gift. No language can praise it enough!
