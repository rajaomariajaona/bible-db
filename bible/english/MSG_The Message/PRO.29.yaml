document_id: PRO.29,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: If People Can’t See What God Is Doing
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For people who hate discipline
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and only get more stubborn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’ll come a day when life tumbles in and they break,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but by then it’ll be too late to help them.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Murderers hate honest people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: moral folks encourage them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fool lets it all hang out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a sage quietly mulls it over.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When a leader listens to malicious gossip,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the workers get infected with evil.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The poor and their abusers have at least something in common:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they can both '
    - type: usfm
      marker: it
      children:
      - type: text
        text: see
    - type: text
      text: '—their sight, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s gift!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leadership gains authority and respect
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the voiceless poor are treated fairly.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wise discipline imparts wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spoiled adolescents embarrass their parents.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When degenerates take charge, crime runs wild,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the righteous will eventually observe their collapse.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Discipline your children; you’ll be glad you did—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’ll turn out delightful to live with.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If people can’t see what God is doing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumble all over themselves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when they attend to what he reveals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are most blessed.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It takes more than talk to keep workers in line;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mere words go in one ear and out the other.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When good people run things, everyone is glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but when the ruler is bad, everyone groans.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Observe the people who always talk before they think—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even simpletons are better off than they are.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you let people treat you like a doormat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll be quite forgotten in the end.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Angry people stir up a lot of discord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the intemperate stir up trouble.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pride lands you flat on your face;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: humility prepares you for honors.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Befriend an outlaw
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and become an enemy to yourself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the victims cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll be included in their curses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you’re a coward to their cause in court.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fear of human opinion disables;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'trusting in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' protects you from that.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone tries to get help from the leader,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but only '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will give us justice.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good people can’t stand the sight of deliberate evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked can’t stand the sight of well-chosen goodness.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you love wisdom, you’ll delight your parents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you’ll destroy their trust if you run with prostitutes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A leader of good judgment gives stability;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an exploiting leader leaves a trail of waste.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A flattering neighbor is up to no good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he’s probably planning to take advantage of you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil people fall into their own traps;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: good people run the other way, glad to escape.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The good-hearted understand what it’s like to be poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hardhearted haven’t the faintest idea.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gang of cynics can upset a whole city;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a group of sages can calm everyone down.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sage trying to work things out with a fool
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gets only scorn and sarcasm for his trouble.
