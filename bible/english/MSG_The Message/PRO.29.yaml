document_id: PRO.29,97
type_code: eng
verses:
  '1':
  - type: heading
    content: If People Can’t See What God Is Doing
  - type: text
    content: For people who hate discipline
  - type: text
    content: and only get more stubborn,
  - type: text
    content: There’ll come a day when life tumbles in and they break,
  - type: text
    content: but by then it’ll be too late to help them.
  '10':
  - type: text
    content: Murderers hate honest people;
  - type: text
    content: moral folks encourage them.
  '11':
  - type: text
    content: A fool lets it all hang out;
  - type: text
    content: a sage quietly mulls it over.
  '12':
  - type: text
    content: When a leader listens to malicious gossip,
  - type: text
    content: all the workers get infected with evil.
  '13':
  - type: text
    content: 'The poor and their abusers have at least something in common:'
  - type: text
    content: 'they can both '
  - type: text
    content: see
  - type: text
    content: '—their sight, '
  - type: text
    content: God
  - type: text
    content: ’s gift!
  '14':
  - type: text
    content: Leadership gains authority and respect
  - type: text
    content: when the voiceless poor are treated fairly.
  '15':
  - type: text
    content: Wise discipline imparts wisdom;
  - type: text
    content: spoiled adolescents embarrass their parents.
  '16':
  - type: text
    content: When degenerates take charge, crime runs wild,
  - type: text
    content: but the righteous will eventually observe their collapse.
  '17':
  - type: text
    content: Discipline your children; you’ll be glad you did—
  - type: text
    content: they’ll turn out delightful to live with.
  '18':
  - type: text
    content: If people can’t see what God is doing,
  - type: text
    content: they stumble all over themselves;
  - type: text
    content: But when they attend to what he reveals,
  - type: text
    content: they are most blessed.
  '19':
  - type: text
    content: It takes more than talk to keep workers in line;
  - type: text
    content: mere words go in one ear and out the other.
  '2':
  - type: text
    content: When good people run things, everyone is glad,
  - type: text
    content: but when the ruler is bad, everyone groans.
  '20':
  - type: text
    content: Observe the people who always talk before they think—
  - type: text
    content: even simpletons are better off than they are.
  '21':
  - type: text
    content: If you let people treat you like a doormat,
  - type: text
    content: you’ll be quite forgotten in the end.
  '22':
  - type: text
    content: Angry people stir up a lot of discord;
  - type: text
    content: the intemperate stir up trouble.
  '23':
  - type: text
    content: Pride lands you flat on your face;
  - type: text
    content: humility prepares you for honors.
  '24':
  - type: text
    content: Befriend an outlaw
  - type: text
    content: and become an enemy to yourself.
  - type: text
    content: When the victims cry out,
  - type: text
    content: you’ll be included in their curses
  - type: text
    content: if you’re a coward to their cause in court.
  '25':
  - type: text
    content: The fear of human opinion disables;
  - type: text
    content: 'trusting in '
  - type: text
    content: God
  - type: text
    content: ' protects you from that.'
  '26':
  - type: text
    content: Everyone tries to get help from the leader,
  - type: text
    content: 'but only '
  - type: text
    content: God
  - type: text
    content: ' will give us justice.'
  '27':
  - type: text
    content: Good people can’t stand the sight of deliberate evil;
  - type: text
    content: the wicked can’t stand the sight of well-chosen goodness.
  '3':
  - type: text
    content: If you love wisdom, you’ll delight your parents,
  - type: text
    content: but you’ll destroy their trust if you run with prostitutes.
  '4':
  - type: text
    content: A leader of good judgment gives stability;
  - type: text
    content: an exploiting leader leaves a trail of waste.
  '5':
  - type: text
    content: A flattering neighbor is up to no good;
  - type: text
    content: he’s probably planning to take advantage of you.
  '6':
  - type: text
    content: Evil people fall into their own traps;
  - type: text
    content: good people run the other way, glad to escape.
  '7':
  - type: text
    content: The good-hearted understand what it’s like to be poor;
  - type: text
    content: the hardhearted haven’t the faintest idea.
  '8':
  - type: text
    content: A gang of cynics can upset a whole city;
  - type: text
    content: a group of sages can calm everyone down.
  '9':
  - type: text
    content: A sage trying to work things out with a fool
  - type: text
    content: gets only scorn and sarcasm for his trouble.
