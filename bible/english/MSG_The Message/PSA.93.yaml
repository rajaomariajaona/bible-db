document_id: PSA.93,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is King, robed and ruling,'
  - type: text
    content: God
  - type: text
    content: ' is robed and surging with strength.'
  - type: text
    content: And yes, the world is firm, immovable,
  - type: text
    content: Your throne ever firm—you’re Eternal!
  '3':
  - type: text
    content: 'Sea storms are up, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: Sea storms wild and roaring,
  - type: text
    content: Sea storms with thunderous breakers.
  - type: text
    content: Stronger than wild sea storms,
  - type: text
    content: Mightier than sea-storm breakers,
  - type: text
    content: 'Mighty '
  - type: text
    content: 'God '
  - type: text
    content: rules from High Heaven.
  '5':
  - type: text
    content: What you say goes—it always has.
  - type: text
    content: “Beauty” and “Holy” mark your palace rule,
  - type: text
    content: God
  - type: text
    content: ', to the very end of time.'
