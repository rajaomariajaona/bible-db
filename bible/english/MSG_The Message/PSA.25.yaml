document_id: PSA.25,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'My head is high, '
  - type: text
    content: God
  - type: text
    content: ', held high;'
  - type: text
    content: 'I’m looking to you, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: No hangdog skulking for me.
  '10':
  - type: text
    content: From now on every road you travel
  - type: text
    content: 'Will take you to '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: Follow the Covenant signs;
  - type: text
    content: Read the charted directions.
  '11':
  - type: text
    content: 'Keep up your reputation, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: Forgive my bad life;
  - type: text
    content: It’s been a very bad life.
  '12':
  - type: text
    content: 'My question: What are God-worshipers like?'
  - type: text
    content: 'Your answer: Arrows aimed at God’s bull’s-eye.'
  '13':
  - type: text
    content: They settle down in a promising place;
  - type: text
    content: Their kids inherit a prosperous farm.
  '14':
  - type: text
    content: God-friendship is for God-worshipers;
  - type: text
    content: They are the ones he confides in.
  '15':
  - type: text
    content: 'If I keep my eyes on '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: I won’t trip over my own feet.
  '16':
  - type: text
    content: Look at me and help me!
  - type: text
    content: I’m all alone and in big trouble.
  '17':
  - type: text
    content: My heart and mind are fighting each other;
  - type: text
    content: Call a truce to this civil war.
  '18':
  - type: text
    content: Take a hard look at my life of hard labor,
  - type: text
    content: Then lift this ton of sin.
  '19':
  - type: text
    content: Do you see how many people
  - type: text
    content: Have it in for me?
  - type: text
    content: How viciously they hate me?
  '20':
  - type: text
    content: Keep watch over me and keep me out of trouble;
  - type: text
    content: Don’t let me down when I run to you.
  '21':
  - type: text
    content: Use all your skill to put me together;
  - type: text
    content: I wait to see your finished product.
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', give your people a break'
  - type: text
    content: From this run of bad luck.
  '3':
  - type: text
    content: I’ve thrown in my lot with you;
  - type: text
    content: You won’t embarrass me, will you?
  - type: text
    content: Or let my enemies get the best of me?
  - type: text
    content: Don’t embarrass any of us
  - type: text
    content: Who went out on a limb for you.
  - type: text
    content: It’s the traitors who should be humiliated.
  '4':
  - type: text
    content: 'Show me how you work, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: School me in your ways.
  '5':
  - type: text
    content: Take me by the hand;
  - type: text
    content: Lead me down the path of truth.
  - type: text
    content: You are my Savior, aren’t you?
  '6':
  - type: text
    content: 'Mark the milestones of your mercy and love, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: Rebuild the ancient landmarks!
  '7':
  - type: text
    content: Forget that I sowed wild oats;
  - type: text
    content: Mark me with your sign of love.
  - type: text
    content: 'Plan only the best for me, '
  - type: text
    content: God
  - type: text
    content: '!'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' is fair and just;'
  - type: text
    content: He corrects the misdirected,
  - type: text
    content: Sends them in the right direction.
  '9':
  - type: text
    content: He gives the rejects his hand,
  - type: text
    content: And leads them step-by-step.
