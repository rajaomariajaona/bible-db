document_id: PSA.25,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'My head is high, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', held high;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m looking to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No hangdog skulking for me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: From now on every road you travel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will take you to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Follow the Covenant signs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Read the charted directions.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Keep up your reputation, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forgive my bad life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s been a very bad life.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'My question: What are God-worshipers like?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your answer: Arrows aimed at God’s bull’s-eye.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They settle down in a promising place;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their kids inherit a prosperous farm.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: God-friendship is for God-worshipers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are the ones he confides in.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'If I keep my eyes on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I won’t trip over my own feet.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Look at me and help me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m all alone and in big trouble.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: My heart and mind are fighting each other;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Call a truce to this civil war.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Take a hard look at my life of hard labor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then lift this ton of sin.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Do you see how many people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have it in for me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How viciously they hate me?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Keep watch over me and keep me out of trouble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let me down when I run to you.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Use all your skill to put me together;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wait to see your finished product.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', give your people a break'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From this run of bad luck.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I’ve thrown in my lot with you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You won’t embarrass me, will you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or let my enemies get the best of me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t embarrass any of us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who went out on a limb for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s the traitors who should be humiliated.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Show me how you work, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: School me in your ways.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Take me by the hand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lead me down the path of truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my Savior, aren’t you?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mark the milestones of your mercy and love, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rebuild the ancient landmarks!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Forget that I sowed wild oats;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mark me with your sign of love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Plan only the best for me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is fair and just;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He corrects the misdirected,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sends them in the right direction.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He gives the rejects his hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And leads them step-by-step.
