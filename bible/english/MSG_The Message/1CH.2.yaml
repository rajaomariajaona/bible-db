document_id: 1CH.2,97
type_code: eng
verses:
  '1':
  - type: heading
    content: The Family of Israel (Jacob)
  - type: text
    content: 'Israel’s (that is, Jacob’s) sons: Reuben, Simeon, Levi, Judah, Issachar, Zebulun, Dan, Joseph, Benjamin, Naphtali, Gad, and Asher.'
  '10':
  - type: text
    content: 'Ram had Amminadab and Amminadab had Nahshon, a prominent leader in the Judah family. Nahshon had Salmon and Salmon had Boaz. Boaz had Obed and Obed had Jesse. Jesse’s firstborn was Eliab, followed by Abinadab, Shimea, Nethanel, Raddai, Ozem, and finally David; David was the seventh. Their sisters were Zeruiah and Abigail. Zeruiah gave birth to three sons: Abishai, Joab, and Asahel; Abigail was the mother of Amasa (the father was Jether the Ishmaelite).'
  - type: heading
    content: The Family of Caleb
  '18':
  - type: text
    content: Caleb son of Hezron had children by his wife Azubah and also by Jerioth. Azubah’s sons were Jesher, Shobab, and Ardon. After Azubah died, Caleb married Ephrath, who gave birth to Hur. Hur had Uri and Uri had Bezalel. Some time later Hezron married the daughter of Makir the father of Gilead; he was sixty years old when he married her; she gave birth to Segub. Then Segub had Jair who owned twenty-three cities in the land of Gilead. Geshur and Aram captured the nomadic villages of Jair and Kenath and their satellite settlements—sixty towns. These all belonged to Makir the father of Gilead. After the death of Hezron, Caleb married Ephrathah the wife of his father Hezron; she then gave birth to Ashhur the father of Tekoa.
  - type: heading
    content: The Family of Jerahmeel
  '25':
  - type: text
    content: 'The sons of Jerahmeel, Hezron’s firstborn: Ram his firstborn, followed by Bunah, Oren, Ozem, and Ahijah. Jerahmeel had another wife whose name was Atarah; she gave birth to Onam.'
  '27':
  - type: text
    content: 'The sons of Ram, Jerahmeel’s firstborn: Maaz, Jamin, and Eker.'
  '28':
  - type: text
    content: 'The sons of Onam: Shammai and Jada.'
  - type: text
    content: 'The sons of Shammai: Nadab and Abishur. Abishur’s wife was Abihail; she gave birth to Ahban and Molid.'
  '3':
  - type: text
    content: 'Judah had Er, Onan, and Shelah; their mother was Bathshua the Canaanite. Er, Judah’s firstborn, was so bad before '
  - type: text
    content: God
  - type: text
    content: ' that '
  - type: text
    content: God
  - type: text
    content: ' killed him. Judah also had Perez and Zerah by his daughter-in-law Tamar—a total of five sons. Perez had Hezron and Hamul; Zerah had Zimri, Ethan, Heman, Calcol, and Darda—five sons. Carmi had Achar, who brought doom on Israel when he violated a holy ban. Ethan’s son was Azariah. And Hezron had Jerahmeel, Ram, and Chelubai.'
  '30':
  - type: text
    content: Nadab had Seled and Appaim. Seled died leaving no sons.
  '31':
  - type: text
    content: Appaim had Ishi; Ishi had Sheshan; and Sheshan had Ahlai.
  '32':
  - type: text
    content: Jada, Shammai’s brother, had Jether and Jonathan. Jether died leaving no sons.
  '33':
  - type: text
    content: Jonathan had Peleth and Zaza.
  - type: text
    content: This is the family tree of the sons of Jerahmeel.
  - type: text
    content: '* * *'
  '34':
  - type: text
    content: Sheshan had no sons, only daughters. But Sheshan had an Egyptian servant, Jarha. Sheshan married his daughter to Jarha and she gave birth to Attai. Attai had Nathan, Nathan had Zabad, Zabad had Ephlal, Ephlal had Obed, Obed had Jehu, Jehu had Azariah, Azariah had Helez, Helez had Eleasah, Eleasah had Sismai, Sismai had Shallum, Shallum had Jekamiah, and Jekamiah had Elishama.
  - type: text
    content: '* * *'
  '42':
  - type: text
    content: Jerahmeel’s brother Caleb had a son, his firstborn, named Mesha; Mesha had Ziph; Ziph’s son was Mareshah the father of Hebron.
  '43':
  - type: text
    content: 'The sons of Hebron: Korah, Tappuah, Rekem, and Shema. Shema had Raham the father of Jorkeam; Rekem had Shammai.'
  '45':
  - type: text
    content: Shammai’s son was Maon and Maon was the father of Beth Zur.
  '46':
  - type: text
    content: Caleb’s concubine Ephah gave birth to Haran, Moza, and Gazez; Haran had Gazez.
  '47':
  - type: text
    content: 'The sons of Jahdai: Regem, Jotham, Geshan, Pelet, Ephah, and Shaaph.'
  '48':
  - type: text
    content: ' Another concubine of Caleb, Maacah, gave birth to Sheber and Tirhanah. She also bore Shaaph the father of Madmannah and Sheva the father of Macbenah and Gibea. Caleb’s daughter was Acsah. These made up the Caleb branch of the family tree.'
  '50':
  - type: text
    content: ' The sons of Hur, Ephrathah’s firstborn: Shobal who had Kiriath Jearim, Salma who had Bethlehem, and Hareph father of Beth Gader.'
  '52':
  - type: text
    content: 'The family of Shobal, father of Kiriath Jearim: Haroeh, half of the population of Manahath, the families of Kiriath Jearim, the Ithrites, the Puthites, the Shumathites, and the Mishraites. The Zorathites and Eshtaolites also came from this line.'
  '54':
  - type: text
    content: 'The sons of Salma: Bethlehem, the Netophathites, Atroth Beth Joab, half of the Manahathites, the Zorites, and the families of Sopherim who lived at Jabez—the Tirathites, the Shimeathites, and the Sucathites. They made up the Kenites who came from Hammath the father of the house of Recab.'
