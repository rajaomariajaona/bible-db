document_id: PSA.95,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Come, let’s shout praises to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: raise the roof for the Rock who saved us!
  - type: text
    content: Let’s march into his presence singing praises,
  - type: text
    content: lifting the rafters with our hymns!
  '3':
  - type: text
    content: 'And why? Because '
  - type: text
    content: 'God '
  - type: text
    content: is the best,
  - type: text
    content: High King over all the gods.
  - type: text
    content: In one hand he holds deep caves and caverns,
  - type: text
    content: in the other hand grasps the high mountains.
  - type: text
    content: He made Ocean—he owns it!
  - type: text
    content: His hands sculpted Earth!
  '6':
  - type: text
    content: ' So come, let us worship: bow before him,'
  - type: text
    content: 'on your knees before '
  - type: text
    content: God
  - type: text
    content: ', who made us!'
  - type: text
    content: Oh yes, he’s our God,
  - type: text
    content: and we’re the people he pastures, the flock he feeds.
  '7':
  - type: text
    content: ' Drop everything and listen, listen as he speaks:'
  - type: text
    content: “Don’t turn a deaf ear as in the Bitter Uprising,
  - type: text
    content: As on the day of the Wilderness Test,
  - type: text
    content: 'when your ancestors turned and put '
  - type: text
    content: me
  - type: text
    content: ' to the test.'
  - type: text
    content: For forty years they watched me at work among them,
  - type: text
    content: as over and over they tried my patience.
  - type: text
    content: And I was provoked—oh, was I provoked!
  - type: text
    content: ‘Can’t they keep their minds on God for five minutes?
  - type: text
    content: Do they simply refuse to walk down my road?’
  - type: text
    content: Exasperated, I exploded,
  - type: text
    content: ‘They’ll never get where they’re headed,
  - type: text
    content: never be able to sit down and rest.’”
