document_id: PSA.95,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'Come, let’s shout praises to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raise the roof for the Rock who saved us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s march into his presence singing praises,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lifting the rafters with our hymns!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: 'And why? Because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: is the best,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: High King over all the gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In one hand he holds deep caves and caverns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the other hand grasps the high mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made Ocean—he owns it!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His hands sculpted Earth!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7a
    - type: text
      text: ' So come, let us worship: bow before him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'on your knees before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', who made us!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh yes, he’s our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we’re the people he pastures, the flock he feeds.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7b-11
    - type: text
      text: ' Drop everything and listen, listen as he speaks:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Don’t turn a deaf ear as in the Bitter Uprising,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As on the day of the Wilderness Test,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'when your ancestors turned and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' to the test.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For forty years they watched me at work among them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as over and over they tried my patience.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I was provoked—oh, was I provoked!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Can’t they keep their minds on God for five minutes?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do they simply refuse to walk down my road?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exasperated, I exploded,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘They’ll never get where they’re headed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never be able to sit down and rest.’”
