document_id: JER.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A City Full of Lies
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-5
    - type: text
      text: “Run for your lives, children of Benjamin!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Get out of Jerusalem, and now!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give a blast on the ram’s horn in Blastville.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Send up smoke signals from Smoketown.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom pours out of the north—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: massive terror!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have likened my dear daughter Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to a lovely meadow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, now ‘shepherds’ from the north have discovered her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brought in their flocks of soldiers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve pitched camp all around her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plan where they’ll ‘graze.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then, ‘Prepare to attack! The fight is on!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To arms! We’ll strike at noon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, it’s too late? Day is dying?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Evening shadows are upon us?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, up anyway! We’ll attack by night
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tear apart her defenses stone by stone.’”
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11a
    - type: text
      text: ' “I’ve got something to say. Is anybody listening?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve a warning to post. Will anyone notice?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s hopeless! Their ears are stuffed with wax—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deaf as a post, blind as a bat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It’s hopeless! They’ve tuned out '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They don’t want to hear from me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I’m bursting with the wrath of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I can’t hold it in much longer.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11b-12
    - type: text
      text: ' “So dump it on the children in the streets.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let it loose on the gangs of youth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For no one’s exempt: Husbands and wives will be taken,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the old and those ready to die;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their homes will be given away—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all they own, even their loved ones—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I give the signal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against all who live in this country.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: “Everyone’s after the dishonest dollar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: little people and big people alike.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophets and priests and everyone in between
  - type: usfm
    marker: q2
    children:
    - type: text
      text: twist words and doctor truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My people are broken—shattered!—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they put on Band-Aids,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saying, ‘It’s not so bad. You’ll be just fine.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But things are not ‘just fine’!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you suppose they are embarrassed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over this outrage?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No, they have no shame.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They don’t even know how to blush.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no hope for them. They’ve hit bottom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there’s no getting up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As far as I’m concerned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re finished.”
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has spoken.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death Is on the Prowl
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-20
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message yet again:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go stand at the crossroads and look around.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ask for directions to the old road,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The tried-and-true road. Then take it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Discover the right route for your souls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they said, ‘Nothing doing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We aren’t going that way.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I even provided watchmen for them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to warn them, to set off the alarm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the people said, ‘It’s a false alarm.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It doesn’t concern us.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And so I’m calling in the nations as witnesses:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Watch, witnesses, what happens to them!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And, ‘Pay attention, Earth!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t miss these bulletins.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m visiting catastrophe on this people, the end result
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the games they’ve been playing with me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve ignored everything I’ve said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: had nothing but contempt for my teaching.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What would I want with incense brought in from Sheba,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rare spices from exotic places?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your burnt sacrifices in worship give me no pleasure.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your religious rituals mean nothing to me.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So listen to this. Here’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s verdict on your way of life:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Watch out! I’m putting roadblocks and barriers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the road you’re taking.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll send you sprawling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: parents and children, neighbors and friends—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and that will be the end of the lot of you.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 22-23
    - type: text
      text: 'And listen to this verdict from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look out! An invasion from the north,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a mighty power on the move from a faraway place:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Armed to the teeth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vicious and pitiless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Booming like sea storm and thunder—tramp, tramp, tramp—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: riding hard on war horses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In battle formation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against you, dear Daughter Zion!”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: We’ve heard the news,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we’re as limp as wet dishrags.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’re paralyzed with fear.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Terror has a death grip on our throats.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t dare go outdoors!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t leave the house!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Death is on the prowl.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Danger everywhere!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“Dear Daughter Zion: Dress in black.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Blacken your face with ashes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep most bitterly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as for an only child.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The countdown has begun . . . 
  - type: usfm
    marker: q2
    children:
    - type: text
      text: six, five, four, three . . . 
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Terror is on us!”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-30
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave me this task:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have made you the examiner of my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to examine and weigh their lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re a thickheaded, hard-nosed bunch,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rotten to the core, the lot of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Refining fires are cranked up to white heat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the ore stays a lump, unchanged.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s useless to keep trying any longer.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing can refine evil out of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Men will give up and call them ‘slag,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'thrown on the slag heap by me, their '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-8
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies gave the orders:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Chop down her trees.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Build a siege ramp against Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A city full of brutality,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bursting with violence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as a well holds a good supply of water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she supplies wickedness nonstop.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The streets echo the cries: ‘Violence! Rape!’'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Victims, bleeding and moaning, lie all over the place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re in deep trouble, Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’ve pushed me to the limit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re on the brink of being wiped out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: being turned into a ghost town.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'More orders from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Time’s up! Harvest the grapes for judgment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Salvage what’s left of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go back over the vines.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pick them clean, every last grape.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Is Anybody Listening?
    marker-yv: yv-h
