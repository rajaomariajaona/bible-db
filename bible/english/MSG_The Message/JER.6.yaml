document_id: JER.6,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A City Full of Lies
  - type: text
    content: “Run for your lives, children of Benjamin!
  - type: text
    content: Get out of Jerusalem, and now!
  - type: text
    content: Give a blast on the ram’s horn in Blastville.
  - type: text
    content: Send up smoke signals from Smoketown.
  - type: text
    content: Doom pours out of the north—
  - type: text
    content: massive terror!
  - type: text
    content: I have likened my dear daughter Zion
  - type: text
    content: to a lovely meadow.
  - type: text
    content: Well, now ‘shepherds’ from the north have discovered her
  - type: text
    content: and brought in their flocks of soldiers.
  - type: text
    content: They’ve pitched camp all around her,
  - type: text
    content: and plan where they’ll ‘graze.’
  - type: text
    content: And then, ‘Prepare to attack! The fight is on!
  - type: text
    content: To arms! We’ll strike at noon!
  - type: text
    content: Oh, it’s too late? Day is dying?
  - type: text
    content: Evening shadows are upon us?
  - type: text
    content: Well, up anyway! We’ll attack by night
  - type: text
    content: and tear apart her defenses stone by stone.’”
  '10':
  - type: text
    content: ' “I’ve got something to say. Is anybody listening?'
  - type: text
    content: I’ve a warning to post. Will anyone notice?
  - type: text
    content: It’s hopeless! Their ears are stuffed with wax—
  - type: text
    content: deaf as a post, blind as a bat.
  - type: text
    content: 'It’s hopeless! They’ve tuned out '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: They don’t want to hear from me.
  - type: text
    content: 'But I’m bursting with the wrath of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: I can’t hold it in much longer.
  '11':
  - type: text
    content: ' “So dump it on the children in the streets.'
  - type: text
    content: Let it loose on the gangs of youth.
  - type: text
    content: 'For no one’s exempt: Husbands and wives will be taken,'
  - type: text
    content: the old and those ready to die;
  - type: text
    content: Their homes will be given away—
  - type: text
    content: all they own, even their loved ones—
  - type: text
    content: When I give the signal
  - type: text
    content: against all who live in this country.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '13':
  - type: text
    content: “Everyone’s after the dishonest dollar,
  - type: text
    content: little people and big people alike.
  - type: text
    content: Prophets and priests and everyone in between
  - type: text
    content: twist words and doctor truth.
  - type: text
    content: My people are broken—shattered!—
  - type: text
    content: and they put on Band-Aids,
  - type: text
    content: Saying, ‘It’s not so bad. You’ll be just fine.’
  - type: text
    content: But things are not ‘just fine’!
  - type: text
    content: Do you suppose they are embarrassed
  - type: text
    content: over this outrage?
  - type: text
    content: No, they have no shame.
  - type: text
    content: They don’t even know how to blush.
  - type: text
    content: There’s no hope for them. They’ve hit bottom
  - type: text
    content: and there’s no getting up.
  - type: text
    content: As far as I’m concerned,
  - type: text
    content: they’re finished.”
  - type: text
    content: God
  - type: text
    content: ' has spoken.'
  - type: heading
    content: Death Is on the Prowl
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message yet again:'
  - type: text
    content: “Go stand at the crossroads and look around.
  - type: text
    content: Ask for directions to the old road,
  - type: text
    content: The tried-and-true road. Then take it.
  - type: text
    content: Discover the right route for your souls.
  - type: text
    content: But they said, ‘Nothing doing.
  - type: text
    content: We aren’t going that way.’
  - type: text
    content: I even provided watchmen for them
  - type: text
    content: to warn them, to set off the alarm.
  - type: text
    content: But the people said, ‘It’s a false alarm.
  - type: text
    content: It doesn’t concern us.’
  - type: text
    content: 'And so I’m calling in the nations as witnesses:'
  - type: text
    content: ‘Watch, witnesses, what happens to them!’
  - type: text
    content: And, ‘Pay attention, Earth!
  - type: text
    content: Don’t miss these bulletins.’
  - type: text
    content: I’m visiting catastrophe on this people, the end result
  - type: text
    content: of the games they’ve been playing with me.
  - type: text
    content: They’ve ignored everything I’ve said,
  - type: text
    content: had nothing but contempt for my teaching.
  - type: text
    content: What would I want with incense brought in from Sheba,
  - type: text
    content: rare spices from exotic places?
  - type: text
    content: Your burnt sacrifices in worship give me no pleasure.
  - type: text
    content: Your religious rituals mean nothing to me.”
  '21':
  - type: text
    content: 'So listen to this. Here’s '
  - type: text
    content: God
  - type: text
    content: '’s verdict on your way of life:'
  - type: text
    content: “Watch out! I’m putting roadblocks and barriers
  - type: text
    content: on the road you’re taking.
  - type: text
    content: They’ll send you sprawling,
  - type: text
    content: parents and children, neighbors and friends—
  - type: text
    content: and that will be the end of the lot of you.”
  '22':
  - type: text
    content: 'And listen to this verdict from '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “Look out! An invasion from the north,
  - type: text
    content: 'a mighty power on the move from a faraway place:'
  - type: text
    content: Armed to the teeth,
  - type: text
    content: vicious and pitiless,
  - type: text
    content: Booming like sea storm and thunder—tramp, tramp, tramp—
  - type: text
    content: riding hard on war horses,
  - type: text
    content: In battle formation
  - type: text
    content: against you, dear Daughter Zion!”
  '24':
  - type: text
    content: We’ve heard the news,
  - type: text
    content: and we’re as limp as wet dishrags.
  - type: text
    content: We’re paralyzed with fear.
  - type: text
    content: Terror has a death grip on our throats.
  - type: text
    content: Don’t dare go outdoors!
  - type: text
    content: Don’t leave the house!
  - type: text
    content: Death is on the prowl.
  - type: text
    content: Danger everywhere!
  '26':
  - type: text
    content: '“Dear Daughter Zion: Dress in black.'
  - type: text
    content: Blacken your face with ashes.
  - type: text
    content: Weep most bitterly,
  - type: text
    content: as for an only child.
  - type: text
    content: The countdown has begun . . . 
  - type: text
    content: six, five, four, three . . . 
  - type: text
    content: The Terror is on us!”
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' gave me this task:'
  - type: text
    content: “I have made you the examiner of my people,
  - type: text
    content: to examine and weigh their lives.
  - type: text
    content: They’re a thickheaded, hard-nosed bunch,
  - type: text
    content: rotten to the core, the lot of them.
  - type: text
    content: Refining fires are cranked up to white heat,
  - type: text
    content: but the ore stays a lump, unchanged.
  - type: text
    content: It’s useless to keep trying any longer.
  - type: text
    content: Nothing can refine evil out of them.
  - type: text
    content: Men will give up and call them ‘slag,’
  - type: text
    content: 'thrown on the slag heap by me, their '
  - type: text
    content: God
  - type: text
    content: .”
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies gave the orders:'
  - type: text
    content: “Chop down her trees.
  - type: text
    content: Build a siege ramp against Jerusalem,
  - type: text
    content: A city full of brutality,
  - type: text
    content: bursting with violence.
  - type: text
    content: Just as a well holds a good supply of water,
  - type: text
    content: she supplies wickedness nonstop.
  - type: text
    content: 'The streets echo the cries: ‘Violence! Rape!’'
  - type: text
    content: Victims, bleeding and moaning, lie all over the place.
  - type: text
    content: You’re in deep trouble, Jerusalem.
  - type: text
    content: You’ve pushed me to the limit.
  - type: text
    content: You’re on the brink of being wiped out,
  - type: text
    content: being turned into a ghost town.”
  '9':
  - type: text
    content: 'More orders from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: “Time’s up! Harvest the grapes for judgment.
  - type: text
    content: Salvage what’s left of Israel.
  - type: text
    content: Go back over the vines.
  - type: text
    content: Pick them clean, every last grape.
  - type: heading
    content: Is Anybody Listening?
