document_id: 2CO.6,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Staying at Our Post
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-10
    - type: text
      text: Companions as we are in this work with you, we beg you, please don’t squander one bit of this marvelous life God has given us. God reminds us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I heard your call in the nick of time;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The day you needed me, I was there to help.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Well, now is the right time to listen, the day to be helped. Don’t put it off; don’t frustrate God’s work by showing up late, throwing a question mark over everything we’re doing. Our work as God’s servants gets validated—or not—in the details. People are watching us as we stay at our post, alertly, unswervingly . . . in hard times, tough times, bad times; when we’re beaten up, jailed, and mobbed; working hard, working late, working without eating; with pure heart, clear head, steady hand; in gentleness, holiness, and honest love; when we’re telling the truth, and when God’s showing his power; when we’re doing our best setting things right; when we’re praised, and when we’re blamed; slandered, and honored; true to our word, though distrusted; ignored by the world, but recognized by God; terrifically alive, though rumored to be dead; beaten within an inch of our lives, but refusing to die; immersed in tears, yet always filled with deep joy; living on handouts, yet enriching many; having nothing, having it all.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13
    - type: text
      text: Dear, dear Corinthians, I can’t tell you how much I long for you to enter this wide-open, spacious life. We didn’t fence you in. The smallness you feel comes from within you. Your lives aren’t small, but you’re living them in a small way. I’m speaking as plainly as I can and with great affection. Open up your lives. Live openly and expansively!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-18
    - type: text
      text: 'Don’t become partners with those who reject God. How can you make a partnership out of right and wrong? That’s not partnership; that’s war. Is light best friends with dark? Does Christ go strolling with the Devil? Do trust and mistrust hold hands? Who would think of setting up pagan idols in God’s holy Temple? But that is exactly what we are, each of us a temple in whom God lives. God himself put it this way:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ll live in them, move into them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll be their God and they’ll be my people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So leave the corruption and compromise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leave it for good,” says God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t link up with those who will pollute you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want you all for myself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll be a Father to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll be sons and daughters to me.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Word of the Master, God.
