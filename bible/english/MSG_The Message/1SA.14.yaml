document_id: 1SA.14
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Later that day, Jonathan, Saul’s son, said to his armor bearer, “Come on, let’s go over to the Philistine garrison patrol on the other side of the pass.” But he didn’t tell his father. Meanwhile, Saul was taking it easy under the pomegranate tree at the threshing floor on the edge of town at Geba (Gibeah). There were about six hundred men with him. Ahijah, wearing the priestly Ephod, was also there. (Ahijah was the son of Ahitub, brother of Ichabod, son of Phinehas, who was the son of Eli the priest of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at Shiloh.) No one there knew that Jonathan had gone off.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: The pass that Jonathan was planning to cross over to the Philistine garrison was flanked on either side by sharp rock outcroppings, cliffs named Bozez and Seneh. The cliff to the north faced Micmash; the cliff to the south faced Geba (Gibeah).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jonathan said to his armor bearer, “Come on now, let’s go across to these uncircumcised pagans. Maybe '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will work for us. There’s no rule that says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' can only deliver by using a big army. No one can stop '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' from saving when he sets his mind to it.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: His armor bearer said, “Go ahead. Do what you think best. I’m with you all the way.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'Jonathan said, “Here’s what we’ll do. We’ll cross over the pass and let the men see we’re there. If they say, ‘Halt! Don’t move until we check you out,’ we’ll stay put and not go up. But if they say, ‘Come on up,’ we’ll go right up—and we’ll know '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has given them to us. That will be our sign.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So they did it, the two of them. They stepped into the open where they could be seen by the Philistine garrison. The Philistines shouted out, “Look at that! The Hebrews are crawling out of their holes!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then they yelled down to Jonathan and his armor bearer, “Come on up here! We’ve got a thing or two to show you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jonathan shouted to his armor bearer, “Up! Follow me! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has turned them over to Israel!” Jonathan scrambled up on all fours, his armor bearer right on his heels. When the Philistines came running up to them, he knocked them flat, his armor bearer right behind finishing them off, bashing their heads in with stones.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: In this first bloody encounter, Jonathan and his armor bearer killed about twenty men. That set off a terrific upheaval in both camp and field, the soldiers in the garrison and the raiding squad badly shaken up, the ground itself shuddering—panic like you’ve never seen before!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Straight to the Battle
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18a
  - type: text
    text: ' Saul’s sentries posted back at Geba (Gibeah) in Benjamin saw the confusion and turmoil raging in the camp. Saul commanded, “Line up and take the roll. See who’s here and who’s missing.” When they called the roll, Jonathan and his armor bearer turned up missing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18b-19
  - type: text
    text: ' Saul ordered Ahijah, “Bring the priestly Ephod. Let’s see what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has to say here.” (Ahijah was responsible for the Ephod in those days.) While Saul was in conversation with the priest, the upheaval in the Philistine camp became greater and louder. Then Saul interrupted Ahijah: “Put the Ephod away.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: 'Saul immediately called his army together and they went straight to the battle. When they got there they found total confusion—Philistines swinging their swords wildly, killing each other. Hebrews who had earlier defected to the Philistine camp came back. They now wanted to be with Israel under Saul and Jonathan. Not only that, but when all the Israelites who had been hiding out in the backwoods of Ephraim heard that the Philistines were running for their lives, they came out and joined the chase. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' saved Israel! What a day!'
- type: usfm
  marker: p
  children:
  - type: text
    text: The fighting moved on to Beth Aven. The whole army was behind Saul now—ten thousand strong!—with the fighting scattering into all the towns throughout the hills of Ephraim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Saul did something really foolish that day. He addressed the army: “A curse on the man who eats anything before evening, before I’ve wreaked vengeance on my enemies!” None of them ate a thing all day.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: There were honeycombs here and there in the fields. But no one so much as put his finger in the honey to taste it, for the soldiers to a man feared the curse. But Jonathan hadn’t heard his father put the army under oath. He stuck the tip of his staff into some honey and ate it. Refreshed, his eyes lit up with renewed vigor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A soldier spoke up, “Your father has put the army under solemn oath, saying, ‘A curse on the man who eats anything before evening!’ No wonder the soldiers are drooping!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: Jonathan said, “My father has imperiled the country. Just look how quickly my energy has returned since I ate a little of this honey! It would have been a lot better, believe me, if the soldiers had eaten their fill of whatever they took from the enemy. Who knows how much worse we could have whipped them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: They killed Philistines that day all the way from Micmash to Aijalon, but the soldiers ended up totally exhausted. Then they started plundering. They grabbed anything in sight—sheep, cattle, calves—and butchered it where they found it. Then they glutted themselves—meat, blood, the works.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: 'Saul was told, “Do something! The soldiers are sinning against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . They’re eating meat with the blood still in it!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saul said, “You’re biting the hand that feeds you! Roll a big rock over here—now!” He continued, “Disperse among the troops and tell them, ‘Bring your oxen and sheep to me and butcher them properly here. Then you can feast to your heart’s content. Please don’t sin against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' by eating meat with the blood still in it.’”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And so they did. That night each soldier, one after another, led his animal there to be butchered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'That’s the story behind Saul’s building an altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. It’s the first altar to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' that he built.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Find Out What God Thinks
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Saul said, “Let’s go after the Philistines tonight! We can spend the night looting and plundering. We won’t leave a single live Philistine!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Sounds good to us,” said the troops. “Let’s do it!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But the priest slowed them down: “Let’s find out what God thinks about this.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: So Saul prayed to God, “Shall I go after the Philistines? Will you put them in Israel’s hand?” God didn’t answer him on that occasion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: 'Saul then said, “All army officers, step forward. Some sin has been committed this day. We’re going to find out what it is and who did it! As '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, Israel’s Savior God, whoever sinned will die, even if it should turn out to be Jonathan, my son!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: Nobody said a word.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Saul said to the Israelites, “You line up over on that side, and I and Jonathan my son will stand on this side.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The army agreed, “Fine. Whatever you say.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then Saul prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', “O God of Israel, why haven’t you answered me today? Show me the truth. If the sin is in me or Jonathan, then, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', give the sign Urim. But if the sin is in the army of Israel, give the sign Thummim.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: The Urim sign turned up and pointed to Saul and Jonathan. That cleared the army.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Next Saul said, “Cast the lots between me and Jonathan—and death to the one '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' points to!”'
- type: usfm
  marker: p
  children:
  - type: text
    text: The soldiers protested, “No—this is not right. Stop this!” But Saul pushed on anyway. They cast the lots, Urim and Thummim, and the lot fell to Jonathan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Saul confronted Jonathan. “What did you do? Tell me!”
- type: usfm
  marker: p
  children:
  - type: text
    text: Jonathan said, “I licked a bit of honey off the tip of the staff I was carrying. That’s it—and for that I’m to die?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Saul said, “Yes. Jonathan most certainly will die. It’s out of my hands—I can’t go against God, can I?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'The soldiers rose up: “Jonathan—die? Never! He’s just carried out this stunning salvation victory for Israel. As surely as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' lives, not a hair on his head is going to be harmed. Why, he’s been working hand-in-hand with God all day!” The soldiers rescued Jonathan and he didn’t die.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Saul pulled back from chasing the Philistines, and the Philistines went home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-48
  - type: text
    text: Saul extended his rule, capturing neighboring kingdoms. He fought enemies on every front—Moab, Ammon, Edom, the king of Zobah, the Philistines. Wherever he turned, he came up with a victory. He became invincible! He smashed Amalek, freeing Israel from the savagery and looting.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 49-51
  - type: text
    text: Saul’s sons were Jonathan, Ishvi, and Malki-Shua. His daughters were Merab, the firstborn, and Michal, the younger. Saul’s wife was Ahinoam, daughter of Ahimaaz. Abner son of Ner was commander of Saul’s army (Ner was Saul’s uncle). Kish, Saul’s father, and Ner, Abner’s father, were the sons of Abiel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: All through Saul’s life there was war, bitter and relentless, with the Philistines. Saul conscripted every strong and brave man he laid eyes on.
