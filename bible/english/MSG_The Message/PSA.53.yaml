document_id: PSA.53,97
type_code: eng
verses:
  '1':
  - type: text
    content: Bilious and bloated, they gas,
  - type: text
    content: “God is gone.”
  - type: text
    content: It’s poison gas—
  - type: text
    content: they foul themselves, they poison
  - type: text
    content: Rivers and skies;
  - type: text
    content: thistles are their cash crop.
  - type: text
    content: God sticks his head out of heaven.
  - type: text
    content: He looks around.
  - type: text
    content: He’s looking for someone not stupid—
  - type: text
    content: one man, even, God-expectant,
  - type: text
    content: just one God-ready woman.
  '3':
  - type: text
    content: He comes up empty. A string
  - type: text
    content: of zeros. Useless, unshepherded
  - type: text
    content: Sheep, taking turns pretending
  - type: text
    content: to be Shepherd.
  - type: text
    content: The ninety and nine
  - type: text
    content: follow the one.
  '4':
  - type: text
    content: Don’t they know anything,
  - type: text
    content: all these predators?
  - type: text
    content: Don’t they know
  - type: text
    content: they can’t get away with this,
  - type: text
    content: Treating people like a fast-food meal
  - type: text
    content: over which they’re too busy to pray?
  '5':
  - type: text
    content: Night is coming for them, and nightmare—
  - type: text
    content: a nightmare they’ll never wake up from.
  - type: text
    content: God will make hash of these squatters,
  - type: text
    content: send them packing for good.
  '6':
  - type: text
    content: Is there anyone around to save Israel?
  - type: text
    content: God turns life around.
  - type: text
    content: Turned-around Jacob skips rope,
  - type: text
    content: turned-around Israel sings laughter.
