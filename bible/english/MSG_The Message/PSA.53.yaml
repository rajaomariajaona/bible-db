document_id: PSA.53,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Bilious and bloated, they gas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “God is gone.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s poison gas—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they foul themselves, they poison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rivers and skies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thistles are their cash crop.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God sticks his head out of heaven.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He looks around.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s looking for someone not stupid—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one man, even, God-expectant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just one God-ready woman.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He comes up empty. A string
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of zeros. Useless, unshepherded
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sheep, taking turns pretending
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be Shepherd.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ninety and nine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: follow the one.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Don’t they know anything,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all these predators?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t they know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they can’t get away with this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Treating people like a fast-food meal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over which they’re too busy to pray?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Night is coming for them, and nightmare—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a nightmare they’ll never wake up from.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will make hash of these squatters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: send them packing for good.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Is there anyone around to save Israel?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God turns life around.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turned-around Jacob skips rope,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turned-around Israel sings laughter.
