document_id: 2KI.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Hezekiah heard it all, he too ripped his robes apart and dressed himself in rough burlap. Then he went into The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. He sent Eliakim, who was in charge of the palace, Shebna the secretary, and the senior priests, all of them dressed in rough burlap, to the prophet Isaiah son of Amoz. They said to him, “A message from Hezekiah: ‘This is a black day, a terrible day—doomsday!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Babies poised to be born,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No strength to birth them.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah took the letter from the envoy and read it. He went to The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and spread it out before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . And Hezekiah prayed—oh, how he prayed!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', God of Israel, seated'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in majesty on the cherubim-throne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the one and only God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sovereign over all kingdoms on earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maker of heaven,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: maker of earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Open your ears, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and listen,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: open your eyes and look.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at this letter Sennacherib has sent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a brazen insult to the living God!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The facts are true, O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': The kings of Assyria'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have laid waste countries and kingdoms.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Huge bonfires they made of their gods, their
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no-gods hand-made from wood and stone.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But now O '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save us from raw Assyrian power;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make all the kingdoms on earth know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that you are '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the one and only God.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It wasn’t long before Isaiah son of Amoz sent word to Hezekiah:'
  - type: usfm
    marker: pmo
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s word: You’ve prayed to me regarding Sennacherib king of Assyria; I’ve heard your prayer. This is my response to him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Virgin Daughter of Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: holds you in utter contempt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daughter Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thinks you’re nothing but scum.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who do you think it is you’ve insulted?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who do you think you’ve been bad-mouthing?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before whom do you suppose you’ve been strutting?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The Holy One of Israel, that’s who!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You dispatched your errand boys
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to humiliate the Master.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You bragged, “With my army of chariots
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve climbed the highest mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: snow-peaked alpine Lebanon mountains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve cut down its giant cedars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: chopped down its prize pine trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve traveled the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: visited the finest forest retreats.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve dug wells in faraway places
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drunk their exotic waters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve waded and splashed barefoot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the rivers of Egypt.”
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did it never occur to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I’m behind all this?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long, long ago I drew up the plans,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now I’ve gone into action,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Using you as a doomsday weapon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reducing proud cities to piles of rubble,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leaving their people dispirited,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slumped shoulders, limp souls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Useless as weeds, fragile as grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: insubstantial as wind-blown chaff.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know when you sit down, when you come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and when you go;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And, yes, I’ve marked every one
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of your temper tantrums against me.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s because of your temper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your blasphemous foul temper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That I’m putting my hook in your nose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my bit in your mouth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And turning you back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to where you came from.
  '29':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'And this, Hezekiah, will be for you the confirming sign:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This year you’ll eat the gleanings, next year
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whatever you can beg, borrow, or steal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the third year you’ll sow and harvest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plant vineyards and eat grapes.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A remnant of the family of Judah yet again
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will sink down roots and raise up fruit.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The remnant will come from Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the survivors from Mount Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Zeal of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will make it happen.
  '32':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'To sum up, this is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says regarding the king of Assyria:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He won’t enter this city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor shoot so much as a single arrow there;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Won’t brandish a shield,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: won’t even begin to set siege;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll go home by the same road he came;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he won’t enter this city. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s word!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll shield this city, I’ll save this city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my sake and for David’s sake.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it so happened that that very night an angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' came and massacred 185,000 Assyrians. When the people of Jerusalem got up next morning, there it was—a whole camp of corpses!'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sennacherib king of Assyria got out of there fast, headed straight home for Nineveh, and stayed put. One day when he was worshiping in the temple of his god Nisroch, his sons Adrammelech and Sharezer murdered him and then escaped to the land of Ararat. His son Esarhaddon became the next king.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘Maybe '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, has been listening to the blasphemous speech of the Rabshakeh who was sent by the king of Assyria, his master, to humiliate the living God; maybe '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your God, won’t let him get by with such talk; and you, maybe you will lift up prayers for what’s left of these people.’”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That’s the message King Hezekiah’s servants delivered to Isaiah.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaiah answered them, “Tell your master, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s word: Don’t be at all concerned about what you’ve heard from the king of Assyria’s bootlicking errand boys—these outrageous blasphemies. Here’s what I’m going to do: Afflict him with self-doubt. He’s going to hear a rumor and, frightened for his life, retreat to his own country. Once there, I’ll see to it that he gets killed.’”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Rabshakeh left and found that the king of Assyria had pulled up stakes from Lachish and was now fighting against Libnah. Then Sennacherib heard that Tirhakah king of Cush was on his way to fight against him. So he sent another envoy with orders to deliver this message to Hezekiah king of Judah: “Don’t let that god that you think so much of keep stringing you along with the line, ‘Jerusalem will never fall to the king of Assyria.’ That’s a barefaced lie. You know the track record of the kings of Assyria—country after country laid waste, devastated. And what makes you think you’ll be an exception? Take a good look at these wasted nations, destroyed by my ancestors; did their gods do them any good? Look at Gozan, Haran, Rezeph, the people of Eden at Tel Assar. Ruins. And what’s left of the king of Hamath, the king of Arpad, the king of Sepharvaim, of Hena, of Ivvah? Bones.”'
