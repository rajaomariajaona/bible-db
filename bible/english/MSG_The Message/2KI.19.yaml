document_id: 2KI.19,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'When Hezekiah heard it all, he too ripped his robes apart and dressed himself in rough burlap. Then he went into The Temple of '
  - type: text
    content: God
  - type: text
    content: '. He sent Eliakim, who was in charge of the palace, Shebna the secretary, and the senior priests, all of them dressed in rough burlap, to the prophet Isaiah son of Amoz. They said to him, “A message from Hezekiah: ‘This is a black day, a terrible day—doomsday!'
  - type: text
    content: Babies poised to be born,
  - type: text
    content: No strength to birth them.
  '14':
  - type: text
    content: 'Hezekiah took the letter from the envoy and read it. He went to The Temple of '
  - type: text
    content: God
  - type: text
    content: ' and spread it out before '
  - type: text
    content: God
  - type: text
    content: . And Hezekiah prayed—oh, how he prayed!
  - type: text
    content: God
  - type: text
    content: ', God of Israel, seated'
  - type: text
    content: in majesty on the cherubim-throne.
  - type: text
    content: You are the one and only God,
  - type: text
    content: sovereign over all kingdoms on earth,
  - type: text
    content: Maker of heaven,
  - type: text
    content: maker of earth.
  '16':
  - type: text
    content: 'Open your ears, '
  - type: text
    content: God
  - type: text
    content: ', and listen,'
  - type: text
    content: open your eyes and look.
  - type: text
    content: Look at this letter Sennacherib has sent,
  - type: text
    content: a brazen insult to the living God!
  '17':
  - type: text
    content: 'The facts are true, O '
  - type: text
    content: God
  - type: text
    content: ': The kings of Assyria'
  - type: text
    content: have laid waste countries and kingdoms.
  '18':
  - type: text
    content: Huge bonfires they made of their gods, their
  - type: text
    content: no-gods hand-made from wood and stone.
  '19':
  - type: text
    content: 'But now O '
  - type: text
    content: God
  - type: text
    content: ', '
  - type: text
    content: our
  - type: text
    content: ' God,'
  - type: text
    content: save us from raw Assyrian power;
  - type: text
    content: Make all the kingdoms on earth know
  - type: text
    content: 'that you are '
  - type: text
    content: God
  - type: text
    content: ', the one and only God.'
  '20':
  - type: text
    content: 'It wasn’t long before Isaiah son of Amoz sent word to Hezekiah:'
  - type: text
    content: God
  - type: text
    content: '’s word: You’ve prayed to me regarding Sennacherib king of Assyria; I’ve heard your prayer. This is my response to him:'
  - type: text
    content: The Virgin Daughter of Zion
  - type: text
    content: holds you in utter contempt;
  - type: text
    content: Daughter Jerusalem
  - type: text
    content: thinks you’re nothing but scum.
  '22':
  - type: text
    content: Who do you think it is you’ve insulted?
  - type: text
    content: Who do you think you’ve been bad-mouthing?
  - type: text
    content: Before whom do you suppose you’ve been strutting?
  - type: text
    content: The Holy One of Israel, that’s who!
  '23':
  - type: text
    content: You dispatched your errand boys
  - type: text
    content: to humiliate the Master.
  - type: text
    content: You bragged, “With my army of chariots
  - type: text
    content: I’ve climbed the highest mountains,
  - type: text
    content: snow-peaked alpine Lebanon mountains!
  - type: text
    content: I’ve cut down its giant cedars,
  - type: text
    content: chopped down its prize pine trees.
  - type: text
    content: I’ve traveled the world,
  - type: text
    content: visited the finest forest retreats.
  '24':
  - type: text
    content: I’ve dug wells in faraway places
  - type: text
    content: and drunk their exotic waters;
  - type: text
    content: I’ve waded and splashed barefoot
  - type: text
    content: in the rivers of Egypt.”
  '25':
  - type: text
    content: Did it never occur to you
  - type: text
    content: that I’m behind all this?
  - type: text
    content: Long, long ago I drew up the plans,
  - type: text
    content: and now I’ve gone into action,
  - type: text
    content: Using you as a doomsday weapon,
  - type: text
    content: reducing proud cities to piles of rubble,
  '26':
  - type: text
    content: Leaving their people dispirited,
  - type: text
    content: slumped shoulders, limp souls.
  - type: text
    content: Useless as weeds, fragile as grass,
  - type: text
    content: insubstantial as wind-blown chaff.
  '27':
  - type: text
    content: I know when you sit down, when you come
  - type: text
    content: and when you go;
  - type: text
    content: And, yes, I’ve marked every one
  - type: text
    content: of your temper tantrums against me.
  '28':
  - type: text
    content: It’s because of your temper,
  - type: text
    content: your blasphemous foul temper,
  - type: text
    content: That I’m putting my hook in your nose
  - type: text
    content: and my bit in your mouth
  - type: text
    content: And turning you back
  - type: text
    content: to where you came from.
  '29':
  - type: text
    content: 'And this, Hezekiah, will be for you the confirming sign:'
  - type: text
    content: This year you’ll eat the gleanings, next year
  - type: text
    content: whatever you can beg, borrow, or steal;
  - type: text
    content: But the third year you’ll sow and harvest,
  - type: text
    content: plant vineyards and eat grapes.
  '30':
  - type: text
    content: A remnant of the family of Judah yet again
  - type: text
    content: will sink down roots and raise up fruit.
  '31':
  - type: text
    content: The remnant will come from Jerusalem,
  - type: text
    content: the survivors from Mount Zion.
  - type: text
    content: 'The Zeal of '
  - type: text
    content: God
  - type: text
    content: will make it happen.
  '32':
  - type: text
    content: 'To sum up, this is what '
  - type: text
    content: God
  - type: text
    content: ' says regarding the king of Assyria:'
  - type: text
    content: He won’t enter this city,
  - type: text
    content: nor shoot so much as a single arrow there;
  - type: text
    content: Won’t brandish a shield,
  - type: text
    content: won’t even begin to set siege;
  '33':
  - type: text
    content: He’ll go home by the same road he came;
  - type: text
    content: 'he won’t enter this city. '
  - type: text
    content: God
  - type: text
    content: ’s word!
  '34':
  - type: text
    content: I’ll shield this city, I’ll save this city,
  - type: text
    content: for my sake and for David’s sake.
  '35':
  - type: text
    content: 'And it so happened that that very night an angel of '
  - type: text
    content: God
  - type: text
    content: ' came and massacred 185,000 Assyrians. When the people of Jerusalem got up next morning, there it was—a whole camp of corpses!'
  '36':
  - type: text
    content: Sennacherib king of Assyria got out of there fast, headed straight home for Nineveh, and stayed put. One day when he was worshiping in the temple of his god Nisroch, his sons Adrammelech and Sharezer murdered him and then escaped to the land of Ararat. His son Esarhaddon became the next king.
  '4':
  - type: text
    content: '“‘Maybe '
  - type: text
    content: God
  - type: text
    content: ', your God, has been listening to the blasphemous speech of the Rabshakeh who was sent by the king of Assyria, his master, to humiliate the living God; maybe '
  - type: text
    content: God
  - type: text
    content: ', your God, won’t let him get by with such talk; and you, maybe you will lift up prayers for what’s left of these people.’”'
  '5':
  - type: text
    content: That’s the message King Hezekiah’s servants delivered to Isaiah.
  '6':
  - type: text
    content: Isaiah answered them, “Tell your master, ‘
  - type: text
    content: God
  - type: text
    content: '’s word: Don’t be at all concerned about what you’ve heard from the king of Assyria’s bootlicking errand boys—these outrageous blasphemies. Here’s what I’m going to do: Afflict him with self-doubt. He’s going to hear a rumor and, frightened for his life, retreat to his own country. Once there, I’ll see to it that he gets killed.’”'
  '8':
  - type: text
    content: 'The Rabshakeh left and found that the king of Assyria had pulled up stakes from Lachish and was now fighting against Libnah. Then Sennacherib heard that Tirhakah king of Cush was on his way to fight against him. So he sent another envoy with orders to deliver this message to Hezekiah king of Judah: “Don’t let that god that you think so much of keep stringing you along with the line, ‘Jerusalem will never fall to the king of Assyria.’ That’s a barefaced lie. You know the track record of the kings of Assyria—country after country laid waste, devastated. And what makes you think you’ll be an exception? Take a good look at these wasted nations, destroyed by my ancestors; did their gods do them any good? Look at Gozan, Haran, Rezeph, the people of Eden at Tel Assar. Ruins. And what’s left of the king of Hamath, the king of Arpad, the king of Sepharvaim, of Hena, of Ivvah? Bones.”'
