document_id: MAL.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: No More of This So-Called Worship!
  - type: text
    content: 'A Message. '
  - type: text
    content: God
  - type: text
    content: '’s Word to Israel through Malachi:'
  '10':
  - type: text
    content: '“Why doesn’t one of you just shut the Temple doors and lock them? Then none of you can get in and play at religion with this silly, empty-headed worship. I am not pleased. The '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies is not pleased. And I don’t want any more of this so-called worship!
  - type: heading
    content: Offering God Something Hand-Me-Down, Broken, or Useless
  '11':
  - type: text
    content: '“I am honored all over the world. And there are people who know how to worship me all over the world, who honor me by bringing their best to me. They’re saying it everywhere: ‘God is greater, this '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies.’
  '12':
  - type: text
    content: '“All except you. Instead of honoring me, you profane me. You profane me when you say, ‘Worship is not important, and what we bring to worship is of no account,’ and when you say, ‘I’m bored—this doesn’t do anything for me.’ You act so superior, sticking your noses in the air—act superior to '
  - type: text
    content: me
  - type: text
    content: ', '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies! And when you do offer something to me, it’s a hand-me-down, or broken, or useless. Do you think I’m going to accept it? This is '
  - type: text
    content: God
  - type: text
    content: ' speaking to you!'
  '14':
  - type: text
    content: '“A curse on the person who makes a big show of doing something great for me—an expensive sacrifice, say—and then at the last minute brings in something puny and worthless! I’m a great king, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies, honored far and wide, and I’ll not put up with it!”
  '2':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said, “I love you.”'
  - type: text
    content: You replied, “Really? How have you loved us?”
  - type: text
    content: '“Look at history” (this is '
  - type: text
    content: God
  - type: text
    content: '’s answer). “Look at how differently I’ve treated you, Jacob, from Esau: I loved Jacob and hated Esau. I reduced pretentious Esau to a molehill, turned his whole country into a ghost town.”'
  '4':
  - type: text
    content: 'When Edom (Esau) said, “We’ve been knocked down, but we’ll get up and start over, good as new,” '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies said, “Just try it and see how far you get. When I knock you down, you stay down. People will take one look at you and say, ‘Land of Evil!’ and ‘the '
  - type: text
    content: God
  - type: text
    content: -cursed tribe!’
  '5':
  - type: text
    content: '“Yes, take a good look. Then you’ll see how faithfully I’ve loved you and you’ll want even more, saying, ‘May '
  - type: text
    content: God
  - type: text
    content: ' be even greater, beyond the borders of Israel!’'
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: '“Isn’t it true that a son honors his father and a worker his master? So if I’m your Father, where’s the honor? If I’m your Master, where’s the respect?” '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies is calling you on the carpet: “You priests despise me!'
  - type: text
    content: “You say, ‘Not so! How do we despise you?’
  - type: text
    content: “By your shoddy, sloppy, defiling worship.
  - type: text
    content: “You ask, ‘What do you mean, “defiling”? What’s defiling about it?’
  '7':
  - type: text
    content: '“When you say, ‘The altar of '
  - type: text
    content: God
  - type: text
    content: ' is not important anymore; worship of '
  - type: text
    content: God
  - type: text
    content: ' is no longer a priority,’ that’s defiling. And when you offer worthless animals for sacrifices in worship, animals that you’re trying to get rid of—blind and sick and crippled animals—isn’t that defiling? Try a trick like that with your banker or your senator—how far do you think it will get you?” '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies asks you.
  '9':
  - type: text
    content: '“Get on your knees and pray that I will be gracious to you. You priests have gotten everyone in trouble. With this kind of conduct, do you think I’ll pay attention to you?” '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies asks you.
