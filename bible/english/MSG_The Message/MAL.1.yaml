document_id: MAL.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No More of This So-Called Worship!
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A Message. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Word to Israel through Malachi:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Why doesn’t one of you just shut the Temple doors and lock them? Then none of you can get in and play at religion with this silly, empty-headed worship. I am not pleased. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies is not pleased. And I don’t want any more of this so-called worship!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Offering '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Something Hand-Me-Down, Broken, or Useless'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“I am honored all over the world. And there are people who know how to worship me all over the world, who honor me by bringing their best to me. They’re saying it everywhere: ‘God is greater, this '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies.’
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: '“All except you. Instead of honoring me, you profane me. You profane me when you say, ‘Worship is not important, and what we bring to worship is of no account,’ and when you say, ‘I’m bored—this doesn’t do anything for me.’ You act so superior, sticking your noses in the air—act superior to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies! And when you do offer something to me, it’s a hand-me-down, or broken, or useless. Do you think I’m going to accept it? This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' speaking to you!'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“A curse on the person who makes a big show of doing something great for me—an expensive sacrifice, say—and then at the last minute brings in something puny and worthless! I’m a great king, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies, honored far and wide, and I’ll not put up with it!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “I love you.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: You replied, “Really? How have you loved us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Look at history” (this is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s answer). “Look at how differently I’ve treated you, Jacob, from Esau: I loved Jacob and hated Esau. I reduced pretentious Esau to a molehill, turned his whole country into a ghost town.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When Edom (Esau) said, “We’ve been knocked down, but we’ll get up and start over, good as new,” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies said, “Just try it and see how far you get. When I knock you down, you stay down. People will take one look at you and say, ‘Land of Evil!’ and ‘the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -cursed tribe!’
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Yes, take a good look. Then you’ll see how faithfully I’ve loved you and you’ll want even more, saying, ‘May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' be even greater, beyond the borders of Israel!’'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Isn’t it true that a son honors his father and a worker his master? So if I’m your Father, where’s the honor? If I’m your Master, where’s the respect?” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies is calling you on the carpet: “You priests despise me!'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You say, ‘Not so! How do we despise you?’
  - type: usfm
    marker: p
    children:
    - type: text
      text: “By your shoddy, sloppy, defiling worship.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You ask, ‘What do you mean, “defiling”? What’s defiling about it?’
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: '“When you say, ‘The altar of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is not important anymore; worship of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is no longer a priority,’ that’s defiling. And when you offer worthless animals for sacrifices in worship, animals that you’re trying to get rid of—blind and sick and crippled animals—isn’t that defiling? Try a trick like that with your banker or your senator—how far do you think it will get you?” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies asks you.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Get on your knees and pray that I will be gracious to you. You priests have gotten everyone in trouble. With this kind of conduct, do you think I’ll pay attention to you?” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies asks you.
