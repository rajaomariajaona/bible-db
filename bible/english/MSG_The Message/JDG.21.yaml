document_id: JDG.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wives
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Back at Mizpah the men of Israel had taken an oath: “No man among us will give his daughter to a Benjaminite in marriage.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Now, back in Bethel, the people sat in the presence of God until evening. They cried loudly; there was widespread lamentation. They said, “Why, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', God of Israel, has this happened? Why do we find ourselves today missing one whole tribe from Israel?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Early the next morning, the people got busy and built an altar. They sacrificed Whole-Burnt-Offerings and Peace-Offerings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the Israelites said, “Who from all the tribes of Israel didn’t show up as we gathered in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '?” For they had all taken a sacred oath that anyone who had not gathered in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at Mizpah had to be put to death.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'But the People of Israel were feeling sorry for Benjamin, their brothers. They said, “Today, one tribe is cut off from Israel. How can we get wives for those who are left? We have sworn by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' not to give any of our daughters to them in marriage.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'They said, “Which one of the tribes of Israel didn’t gather before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' at Mizpah?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: It turned out that no one had come to the gathering from Jabesh Gilead. When they took a roll call of the people, not a single person from Jabesh Gilead was there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'So the congregation sent twelve divisions of their top men there with the command, “Kill everyone of Jabesh Gilead, including women and children. These are your instructions: Every man and woman who has had sexual intercourse you must kill. But keep the virgins alive.” And that’s what they did.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And they found four hundred virgins among those who lived in Jabesh Gilead; they had never had sexual intercourse with a man. And they brought them to the camp at Shiloh, which is in the land of Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Then the congregation sent word to the Benjaminites who were at the Rimmon Rock and offered them peace. And Benjamin came. They gave them the women they had let live at Jabesh Gilead. But even then, there weren’t enough for all the men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The people felt bad for Benjamin; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had left out Benjamin—the missing piece from the Israelite tribes.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: 'The elders of the congregation said, “How can we get wives for the rest of the men, since all the Benjaminite women have been killed? How can we keep the inheritance alive for the Benjaminite survivors? How can we prevent an entire tribe from extinction? We certainly can’t give our own daughters to them as wives.” (Remember, the Israelites had taken the oath: “Cursed is anyone who provides a wife to Benjamin.”)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then they said, “There is that festival of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' held every year in Shiloh. It’s north of Bethel, just east of the main road that goes up from Bethel to Shechem and a little south of Lebonah.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: So they told the Benjaminites, “Go and hide in the vineyards. Stay alert—when you see the Shiloh girls come out to dance the dances, run out of the vineyards, grab one of the Shiloh girls for your wife, and then hightail it back to the country of Benjamin. When their fathers or brothers come to lay charges against us, we’ll tell them, ‘We did them a favor. After all we didn’t go to war and kill to get wives for men. And it wasn’t as if you were in on it by giving consent. But if you keep this up, you will incur blame.’”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And that’s what the Benjaminites did: They carried off girls from the dance, wives enough for their number, got away, and went home to their inheritance. They rebuilt their towns and settled down.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: From there the People of Israel dispersed, each man heading back to his own tribe and clan, each to his own plot of land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: At that time there was no king in Israel. People did whatever they felt like doing.
