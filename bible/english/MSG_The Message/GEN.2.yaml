document_id: GEN.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Heaven and Earth were finished,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down to the last detail.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-14
    - type: text
      text: A river flows out of Eden to water the garden and from there divides into four rivers. The first is named Pishon; it flows through Havilah where there is gold. The gold of this land is good. The land is also known for a sweet-scented resin and the onyx stone. The second river is named Gihon; it flows through the land of Cush. The third river is named Hiddekel and flows east of Assyria. The fourth river is the Euphrates.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' took the Man and set him down in the Garden of Eden to work the ground and keep it in order.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded the Man, “You can eat from any tree in the garden, except from the Tree-of-Knowledge-of-Good-and-Evil. Don’t eat from it. The moment you eat from that tree, you’re dead.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-20
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “It’s not good for the Man to be alone; I’ll make him a helper, a companion.” So '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' formed from the dirt of the ground all the animals of the field and all the birds of the air. He brought them to the Man to see what he would name them. Whatever the Man called each living creature, that was its name. The Man named the cattle, named the birds of the air, named the wild animals; but he didn’t find a suitable companion.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-4
    - type: text
      text: By the seventh day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God had finished his work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the seventh day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he rested from all his work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God blessed the seventh day.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He made it a Holy Day
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because on that day he rested from his work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the creating God had done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the story of how it all started,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of Heaven and Earth when they were created.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adam and Eve
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' put the Man into a deep sleep. As he slept he removed one of his ribs and replaced it with flesh. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' then used the rib that he had taken from the Man to make Woman and presented her to the Man.'
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-25
    - type: text
      text: The Man said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Finally! Bone of my bone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flesh of my flesh!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Name her Woman
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for she was made from Man.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore a man leaves his father and mother and embraces his wife. They become one flesh.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The two of them, the Man and his Wife, were naked, but they felt no shame.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: 'At the time '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made Earth and Heaven, before any grasses or shrubs had sprouted from the ground—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' hadn’t yet sent rain on Earth, nor was there anyone around to work the ground (the whole Earth was watered by underground springs)—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: formed Man out of dirt from the ground and blew into his nostrils the breath of life. The Man came alive—a living soul!
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' planted a garden in Eden, in the east. He put the Man he had just made in it. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' made all kinds of trees grow from the ground, trees beautiful to look at and good to eat. The Tree-of-Life was in the middle of the garden, also the Tree-of-Knowledge-of-Good-and-Evil.'
