document_id: GEN.2,97
type_code: eng
verses:
  '1':
  - type: text
    content: Heaven and Earth were finished,
  - type: text
    content: down to the last detail.
  '10':
  - type: text
    content: A river flows out of Eden to water the garden and from there divides into four rivers. The first is named Pishon; it flows through Havilah where there is gold. The gold of this land is good. The land is also known for a sweet-scented resin and the onyx stone. The second river is named Gihon; it flows through the land of Cush. The third river is named Hiddekel and flows east of Assyria. The fourth river is the Euphrates.
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' took the Man and set him down in the Garden of Eden to work the ground and keep it in order.'
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' commanded the Man, “You can eat from any tree in the garden, except from the Tree-of-Knowledge-of-Good-and-Evil. Don’t eat from it. The moment you eat from that tree, you’re dead.”'
  '18':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said, “It’s not good for the Man to be alone; I’ll make him a helper, a companion.” So '
  - type: text
    content: God
  - type: text
    content: ' formed from the dirt of the ground all the animals of the field and all the birds of the air. He brought them to the Man to see what he would name them. Whatever the Man called each living creature, that was its name. The Man named the cattle, named the birds of the air, named the wild animals; but he didn’t find a suitable companion.'
  '2':
  - type: text
    content: By the seventh day
  - type: text
    content: God had finished his work.
  - type: text
    content: On the seventh day
  - type: text
    content: he rested from all his work.
  - type: text
    content: God blessed the seventh day.
  - type: text
    content: He made it a Holy Day
  - type: text
    content: Because on that day he rested from his work,
  - type: text
    content: all the creating God had done.
  - type: text
    content: This is the story of how it all started,
  - type: text
    content: of Heaven and Earth when they were created.
  - type: heading
    content: Adam and Eve
  '21':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' put the Man into a deep sleep. As he slept he removed one of his ribs and replaced it with flesh. '
  - type: text
    content: God
  - type: text
    content: ' then used the rib that he had taken from the Man to make Woman and presented her to the Man.'
  '23':
  - type: text
    content: The Man said,
  - type: text
    content: “Finally! Bone of my bone,
  - type: text
    content: flesh of my flesh!
  - type: text
    content: Name her Woman
  - type: text
    content: for she was made from Man.”
  - type: text
    content: Therefore a man leaves his father and mother and embraces his wife. They become one flesh.
  - type: text
    content: The two of them, the Man and his Wife, were naked, but they felt no shame.
  '5':
  - type: text
    content: 'At the time '
  - type: text
    content: God
  - type: text
    content: ' made Earth and Heaven, before any grasses or shrubs had sprouted from the ground—'
  - type: text
    content: God
  - type: text
    content: ' hadn’t yet sent rain on Earth, nor was there anyone around to work the ground (the whole Earth was watered by underground springs)—'
  - type: text
    content: 'God '
  - type: text
    content: formed Man out of dirt from the ground and blew into his nostrils the breath of life. The Man came alive—a living soul!
  '8':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' planted a garden in Eden, in the east. He put the Man he had just made in it. '
  - type: text
    content: God
  - type: text
    content: ' made all kinds of trees grow from the ground, trees beautiful to look at and good to eat. The Tree-of-Life was in the middle of the garden, also the Tree-of-Knowledge-of-Good-and-Evil.'
