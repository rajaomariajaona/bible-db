document_id: EXO.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Strike Two: Frogs'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Go to Pharaoh and tell him, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: Release my people so they can worship me. If you refuse to release them, I’m warning you, I’ll hit the whole country with frogs. The Nile will swarm with frogs—they’ll come up into your houses, into your bedrooms and into your beds, into your servants’ quarters, among the people, into your ovens and pots and pans. They’ll be all over you, all over everyone—frogs everywhere, on and in everything!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Tell Aaron, ‘Wave your staff over the rivers and canals and ponds. Bring up frogs on the land of Egypt.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aaron stretched his staff over the waters of Egypt and a mob of frogs came up and covered the country.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But again the magicians did the same thing using their incantations—they also produced frogs in Egypt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pharaoh called in Moses and Aaron and said, “Pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to rid us of these frogs. I’ll release the people so that they can make their sacrifices and worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moses said to Pharaoh, “Certainly. Set the time. When do you want the frogs out of here, away from your servants and people and out of your houses? You’ll be rid of frogs except for those in the Nile.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “Make it tomorrow.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Moses said, “Tomorrow it is—so you’ll realize that there is no God like our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . The frogs will be gone. You and your houses and your servants and your people, free of frogs. The only frogs left will be the ones in the Nile.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: 'Moses and Aaron left Pharaoh, and Moses prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' about the frogs he had brought on Pharaoh. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' responded to Moses’ prayer: The frogs died off—houses, courtyards, fields, all free of frogs. They piled the frogs in heaps. The country reeked of dead frogs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when Pharaoh saw that he had some breathing room, he got stubborn again and wouldn’t listen to Moses and Aaron. Just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had said.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Strike Three: Gnats'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Tell Aaron, ‘Take your staff and strike the dust. The dust will turn into gnats all over Egypt.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He did it. Aaron grabbed his staff and struck the dust of the Earth; it turned into gnats, gnats all over people and animals. All the dust of the Earth turned into gnats, gnats everywhere in Egypt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The magicians tried to produce gnats with their spells but this time they couldn’t do it. There were gnats everywhere, all over people and animals.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The magicians said to Pharaoh, “This is God’s doing.” But Pharaoh was stubborn and wouldn’t listen. Just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had said.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Strike Four: Flies'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-23
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to Moses, “Get up early in the morning and confront Pharaoh as he goes down to the water. Tell him, ‘'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message: Release my people so they can worship me. If you don’t release my people, I’ll release swarms of flies on you, your servants, your people, and your homes. The houses of the Egyptians and even the ground under their feet will be thick with flies. But when it happens, I’ll set Goshen where my people live aside as a sanctuary—no flies in Goshen. That will show you that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in this land. I’ll make a sharp distinction between your people and mine. This sign will occur tomorrow.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' did just that. Thick swarms of flies in Pharaoh’s palace and the houses of his servants. All over Egypt, the country ruined by flies.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Pharaoh called in Moses and Aaron and said, “Go ahead. Sacrifice to your God—but do it here in this country.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: 'Moses said, “That would not be wise. What we sacrifice to our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' would give great offense to Egyptians. If we openly sacrifice what is so deeply offensive to Egyptians, they’ll kill us. Let us go three days’ journey into the wilderness and sacrifice to our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', just as he instructed us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pharaoh said, “All right. I’ll release you to go and sacrifice to your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in the wilderness. Only don’t go too far. Now pray for me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moses said, “As soon as I leave here, I will pray to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' that tomorrow the flies will leave Pharaoh, his servants, and his people. But don’t play games with us and change your mind about releasing us to sacrifice to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-32
  - type: text
    text: 'Moses left Pharaoh and prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' did what Moses asked. He got rid of the flies from Pharaoh and his servants and his people. There wasn’t a fly left. But Pharaoh became stubborn once again and wouldn’t release the people.'
