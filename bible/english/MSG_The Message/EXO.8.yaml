document_id: EXO.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Strike Two: Frogs'
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Go to Pharaoh and tell him, ‘'
  - type: text
    content: God
  - type: text
    content: '’s Message: Release my people so they can worship me. If you refuse to release them, I’m warning you, I’ll hit the whole country with frogs. The Nile will swarm with frogs—they’ll come up into your houses, into your bedrooms and into your beds, into your servants’ quarters, among the people, into your ovens and pots and pans. They’ll be all over you, all over everyone—frogs everywhere, on and in everything!’”'
  '10':
  - type: text
    content: “Make it tomorrow.”
  - type: text
    content: 'Moses said, “Tomorrow it is—so you’ll realize that there is no God like our '
  - type: text
    content: God
  - type: text
    content: . The frogs will be gone. You and your houses and your servants and your people, free of frogs. The only frogs left will be the ones in the Nile.”
  '12':
  - type: text
    content: 'Moses and Aaron left Pharaoh, and Moses prayed to '
  - type: text
    content: God
  - type: text
    content: ' about the frogs he had brought on Pharaoh. '
  - type: text
    content: God
  - type: text
    content: ' responded to Moses’ prayer: The frogs died off—houses, courtyards, fields, all free of frogs. They piled the frogs in heaps. The country reeked of dead frogs.'
  '15':
  - type: text
    content: 'But when Pharaoh saw that he had some breathing room, he got stubborn again and wouldn’t listen to Moses and Aaron. Just as '
  - type: text
    content: God
  - type: text
    content: ' had said.'
  - type: heading
    content: 'Strike Three: Gnats'
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Tell Aaron, ‘Take your staff and strike the dust. The dust will turn into gnats all over Egypt.’”'
  '17':
  - type: text
    content: He did it. Aaron grabbed his staff and struck the dust of the Earth; it turned into gnats, gnats all over people and animals. All the dust of the Earth turned into gnats, gnats everywhere in Egypt.
  '18':
  - type: text
    content: The magicians tried to produce gnats with their spells but this time they couldn’t do it. There were gnats everywhere, all over people and animals.
  '19':
  - type: text
    content: 'The magicians said to Pharaoh, “This is God’s doing.” But Pharaoh was stubborn and wouldn’t listen. Just as '
  - type: text
    content: God
  - type: text
    content: ' had said.'
  - type: heading
    content: 'Strike Four: Flies'
  '20':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Get up early in the morning and confront Pharaoh as he goes down to the water. Tell him, ‘'
  - type: text
    content: God
  - type: text
    content: '’s Message: Release my people so they can worship me. If you don’t release my people, I’ll release swarms of flies on you, your servants, your people, and your homes. The houses of the Egyptians and even the ground under their feet will be thick with flies. But when it happens, I’ll set Goshen where my people live aside as a sanctuary—no flies in Goshen. That will show you that I am '
  - type: text
    content: God
  - type: text
    content: ' in this land. I’ll make a sharp distinction between your people and mine. This sign will occur tomorrow.’”'
  '24':
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' did just that. Thick swarms of flies in Pharaoh’s palace and the houses of his servants. All over Egypt, the country ruined by flies.'
  '25':
  - type: text
    content: Pharaoh called in Moses and Aaron and said, “Go ahead. Sacrifice to your God—but do it here in this country.”
  '26':
  - type: text
    content: 'Moses said, “That would not be wise. What we sacrifice to our '
  - type: text
    content: God
  - type: text
    content: ' would give great offense to Egyptians. If we openly sacrifice what is so deeply offensive to Egyptians, they’ll kill us. Let us go three days’ journey into the wilderness and sacrifice to our '
  - type: text
    content: God
  - type: text
    content: ', just as he instructed us.”'
  '28':
  - type: text
    content: 'Pharaoh said, “All right. I’ll release you to go and sacrifice to your '
  - type: text
    content: God
  - type: text
    content: ' in the wilderness. Only don’t go too far. Now pray for me.”'
  '29':
  - type: text
    content: 'Moses said, “As soon as I leave here, I will pray to '
  - type: text
    content: God
  - type: text
    content: ' that tomorrow the flies will leave Pharaoh, his servants, and his people. But don’t play games with us and change your mind about releasing us to sacrifice to '
  - type: text
    content: God
  - type: text
    content: .”
  '30':
  - type: text
    content: 'Moses left Pharaoh and prayed to '
  - type: text
    content: God
  - type: text
    content: '. '
  - type: text
    content: God
  - type: text
    content: ' did what Moses asked. He got rid of the flies from Pharaoh and his servants and his people. There wasn’t a fly left. But Pharaoh became stubborn once again and wouldn’t release the people.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Moses, “Tell Aaron, ‘Wave your staff over the rivers and canals and ponds. Bring up frogs on the land of Egypt.’”'
  '6':
  - type: text
    content: Aaron stretched his staff over the waters of Egypt and a mob of frogs came up and covered the country.
  '7':
  - type: text
    content: But again the magicians did the same thing using their incantations—they also produced frogs in Egypt.
  '8':
  - type: text
    content: 'Pharaoh called in Moses and Aaron and said, “Pray to '
  - type: text
    content: God
  - type: text
    content: ' to rid us of these frogs. I’ll release the people so that they can make their sacrifices and worship '
  - type: text
    content: God
  - type: text
    content: .”
  '9':
  - type: text
    content: Moses said to Pharaoh, “Certainly. Set the time. When do you want the frogs out of here, away from your servants and people and out of your houses? You’ll be rid of frogs except for those in the Nile.”
