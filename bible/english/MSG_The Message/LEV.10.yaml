document_id: LEV.10,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Nadab and Abihu
  - type: text
    content: 'That same day Nadab and Abihu, Aaron’s sons, took their censers, put hot coals and incense in them, and offered “strange” fire to '
  - type: text
    content: God
  - type: text
    content: '—something '
  - type: text
    content: God
  - type: text
    content: ' had not commanded. Fire blazed out from '
  - type: text
    content: God
  - type: text
    content: ' and consumed them—they died in '
  - type: text
    content: God
  - type: text
    content: ’s presence.
  '12':
  - type: text
    content: 'Moses spoke to Aaron and his surviving sons, Eleazar and Ithamar, “Take the leftovers of the Grain-Offering from the Fire-Gifts for '
  - type: text
    content: God
  - type: text
    content: ' and eat beside the Altar that which has been prepared without yeast, for it is most holy. Eat it in the Holy Place because it is your portion and the portion of your sons from the Fire-Gifts for '
  - type: text
    content: God
  - type: text
    content: '. This is what '
  - type: text
    content: God
  - type: text
    content: ' commanded me. Also, you and your sons and daughters are to eat the breast of the Wave-Offering and the thigh of the Contribution-Offering in a clean place. They are provided as your portion and the portion of your children from the Peace-Offerings presented by the People of Israel. Bring the thigh of the Contribution-Offering and the breast of the Wave-Offering and the fat pieces of the Fire-Gifts and lift them up as a Wave-Offering. This will be the regular share for you and your children as ordered by '
  - type: text
    content: God
  - type: text
    content: .”
  '16':
  - type: text
    content: 'When Moses looked into the matter of the goat of the Absolution-Offering, he found that it had been burned up. He became angry with Eleazar and Ithamar, Aaron’s remaining sons, and asked, “Why didn’t you eat the Absolution-Offering in the Holy Place since it is most holy? The offering was given to you for taking away the guilt of the community by making atonement for them before '
  - type: text
    content: God
  - type: text
    content: . Since its blood was not taken into the Holy Place, you should have eaten the goat in the Sanctuary as I commanded.”
  '19':
  - type: text
    content: 'Aaron replied to Moses, “Look. They sacrificed their Absolution-Offering and Whole-Burnt-Offering before '
  - type: text
    content: God
  - type: text
    content: ' today, and you see what has happened to me—I’ve lost two sons. Do you think '
  - type: text
    content: God
  - type: text
    content: ' would have been pleased if I had gone ahead and eaten the Absolution-Offering today?”'
  '20':
  - type: text
    content: When Moses heard this response, he accepted it.
  '3':
  - type: text
    content: 'Moses said to Aaron, “This is what '
  - type: text
    content: God
  - type: text
    content: ' meant when he said,'
  - type: text
    content: To the one who comes near me,
  - type: text
    content: I will show myself holy;
  - type: text
    content: Before all the people,
  - type: text
    content: I will show my glory.”
  - type: text
    content: Aaron was silent.
  '4':
  - type: text
    content: Moses called for Mishael and Elzaphan, sons of Uzziel, Aaron’s uncle. He said, “Come. Carry your dead cousins outside the camp, away from the Sanctuary.” They came and carried them off, outside the camp, just as Moses had directed.
  '6':
  - type: text
    content: 'Moses then said to Aaron and his remaining sons, Eleazar and Ithamar, “No mourning rituals for you—unkempt hair, torn clothes—or you’ll also die and '
  - type: text
    content: God
  - type: text
    content: ' will be angry with the whole congregation. Your relatives—all the People of Israel, in fact—will do the mourning over those '
  - type: text
    content: God
  - type: text
    content: ' has destroyed by fire. And don’t leave the entrance to the Tent of Meeting lest you die, because '
  - type: text
    content: God
  - type: text
    content: ’s anointing oil is on you.”
  - type: text
    content: They did just as Moses said.
  - type: text
    content: '* * *'
  '8':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' instructed Aaron: “When you enter the Tent of Meeting, don’t drink wine or strong drink, neither you nor your sons, lest you die. This is a fixed rule down through the generations. Distinguish between the holy and the common, between the ritually clean and unclean. Teach the People of Israel all the decrees that '
  - type: text
    content: God
  - type: text
    content: ' has spoken to them through Moses.”'
