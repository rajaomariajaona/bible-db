document_id: LEV.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nadab and Abihu
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'That same day Nadab and Abihu, Aaron’s sons, took their censers, put hot coals and incense in them, and offered “strange” fire to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '—something '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had not commanded. Fire blazed out from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and consumed them—they died in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s presence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moses said to Aaron, “This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' meant when he said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the one who comes near me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will show myself holy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before all the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will show my glory.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Aaron was silent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: Moses called for Mishael and Elzaphan, sons of Uzziel, Aaron’s uncle. He said, “Come. Carry your dead cousins outside the camp, away from the Sanctuary.” They came and carried them off, outside the camp, just as Moses had directed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Moses then said to Aaron and his remaining sons, Eleazar and Ithamar, “No mourning rituals for you—unkempt hair, torn clothes—or you’ll also die and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will be angry with the whole congregation. Your relatives—all the People of Israel, in fact—will do the mourning over those '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has destroyed by fire. And don’t leave the entrance to the Tent of Meeting lest you die, because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anointing oil is on you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: They did just as Moses said.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' instructed Aaron: “When you enter the Tent of Meeting, don’t drink wine or strong drink, neither you nor your sons, lest you die. This is a fixed rule down through the generations. Distinguish between the holy and the common, between the ritually clean and unclean. Teach the People of Israel all the decrees that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has spoken to them through Moses.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-15
  - type: text
    text: 'Moses spoke to Aaron and his surviving sons, Eleazar and Ithamar, “Take the leftovers of the Grain-Offering from the Fire-Gifts for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' and eat beside the Altar that which has been prepared without yeast, for it is most holy. Eat it in the Holy Place because it is your portion and the portion of your sons from the Fire-Gifts for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded me. Also, you and your sons and daughters are to eat the breast of the Wave-Offering and the thigh of the Contribution-Offering in a clean place. They are provided as your portion and the portion of your children from the Peace-Offerings presented by the People of Israel. Bring the thigh of the Contribution-Offering and the breast of the Wave-Offering and the fat pieces of the Fire-Gifts and lift them up as a Wave-Offering. This will be the regular share for you and your children as ordered by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: 'When Moses looked into the matter of the goat of the Absolution-Offering, he found that it had been burned up. He became angry with Eleazar and Ithamar, Aaron’s remaining sons, and asked, “Why didn’t you eat the Absolution-Offering in the Holy Place since it is most holy? The offering was given to you for taking away the guilt of the community by making atonement for them before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Since its blood was not taken into the Holy Place, you should have eaten the goat in the Sanctuary as I commanded.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aaron replied to Moses, “Look. They sacrificed their Absolution-Offering and Whole-Burnt-Offering before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' today, and you see what has happened to me—I’ve lost two sons. Do you think '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' would have been pleased if I had gone ahead and eaten the Absolution-Offering today?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When Moses heard this response, he accepted it.
