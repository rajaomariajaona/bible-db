document_id: DEU.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: These are the sermons Moses preached to all Israel when they were east of the Jordan River in the Arabah Wilderness, opposite Suph, in the vicinity of Paran, Tophel, Laban, Hazeroth, and Dizahab. It takes eleven days to travel from Horeb to Kadesh Barnea following the Mount Seir route.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'It was on the first day of the eleventh month of the fortieth year when Moses addressed the People of Israel, telling them everything '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded him concerning them. This came after he had defeated Sihon king of the Amorites, who ruled from Heshbon, and Og king of Bashan, who ruled from Ashtaroth in Edrei. It was east of the Jordan in the land of Moab that Moses set out to explain this Revelation.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Preaches to Israel on the Plains of Moab
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He said:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'Back at Horeb, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, spoke to us: “You’ve stayed long enough at this mountain. On your way now. Get moving. Head for the Amorite hills, wherever people are living in the Arabah, the mountains, the foothills, the Negev, the seashore—the Canaanite country and the Lebanon all the way to the big river, the Euphrates. Look, I’ve given you this land. Now go in and take it. It’s the land '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promised to give your ancestors Abraham, Isaac, and Jacob and their children after them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-13
  - type: text
    text: 'At the time I told you, “I can’t do this, can’t carry you all by myself. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has multiplied your numbers. Why, look at you—you rival the stars in the sky! And may '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God-of-Your-Fathers, keep it up and multiply you another thousand times, bless you just as he promised. But how can I carry, all by myself, your troubles and burdens and quarrels? So select some wise, understanding, and seasoned men from your tribes, and I will commission them as your leaders.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You answered me, “Good! A good solution.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So I went ahead and took the top men of your tribes, wise and seasoned, and made them your leaders—leaders of thousands, of hundreds, of fifties, and of tens, officials adequate for each of your tribes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'At the same time I gave orders to your judges: “Listen carefully to complaints and accusations between your fellow Israelites. Judge fairly between each person and his fellow or foreigner. Don’t play favorites; treat the little and the big alike; listen carefully to each. Don’t be impressed by big names. This is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God’s
  - type: text
    text: ' judgment you’re dealing with. Hard cases you can bring to me; I’ll deal with them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I issued orders to you at that time regarding everything you would have to deal with.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-21
  - type: text
    text: 'Then we set out from Horeb and headed for the Amorite hill country, going through that huge and frightening wilderness that you’ve had more than an eyeful of by now—all under the command of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God—and finally arrived at Kadesh Barnea. There I told you, “You’ve made it to the Amorite hill country that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, is giving us. Look, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has placed this land as a gift before you. Go ahead and take it now. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God-of-Your-Fathers, promised it to you. Don’t be afraid. Don’t lose heart.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But then you all came to me and said, “Let’s send some men on ahead to scout out the land for us and bring back a report on the best route to take and the kinds of towns we can expect to find.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: 'That seemed like a good idea to me, so I picked twelve men, one from each tribe. They set out, climbing through the hills. They came to the Eshcol Valley and looked it over. They took samples of the produce of the land and brought them back to us, saying, “It’s a good land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, is giving us!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-28
  - type: text
    text: 'But then you weren’t willing to go up. You rebelled against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God’s plain word. You complained in your tents: “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' hates us. He hauled us out of Egypt in order to dump us among the Amorites—a death sentence for sure! How can we go up? We’re trapped in a dead end. Our brothers took all the wind out of our sails, telling us, ‘The people are bigger and stronger than we are; their cities are huge, their defenses massive—we even saw Anakite giants there!’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-33
  - type: text
    text: 'I tried to relieve your fears: “Don’t be terrified of them. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is leading the way; he’s fighting for you. You saw with your own eyes what he did for you in Egypt; you saw what he did in the wilderness, how '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, carried you as a father carries his child, carried you the whole way until you arrived here. But now that you’re here, you won’t trust '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God—this same '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who goes ahead of you in your travels to scout out a place to pitch camp, a fire by night and a cloud by day to show you the way to go.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-36
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' heard what you said, he exploded in anger. He swore, “Not a single person of this evil generation is going to get so much as a look at the good land that I promised to give to your parents. Not one—except for Caleb son of Jephunneh. He’ll see it. I’ll give him and his descendants the land he walked on because he was all for following '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', heart and soul.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-40
  - type: text
    text: 'But I also got it. Because of you '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anger spilled over onto me. He said, “You aren’t getting in either. Your assistant, Joshua son of Nun, will go in. Build up his courage. He’s the one who will claim the inheritance for Israel. And your babies of whom you said, ‘They’ll be grabbed for plunder,’ and all these little kids who right now don’t even know right from wrong—they’ll get in. I’ll give it to them. Yes, they’ll be the new owners. But not you. Turn around and head back into the wilderness following the route to the Red Sea.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'You spoke up, “We’ve sinned against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. We’ll go up and fight, following all the orders that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', our God, has commanded.” You took your weapons and dressed for battle—you thought it would be so easy going into those hills!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told me, “Tell them, ‘Don’t do it; don’t go up to fight—I’m not with you in this. Your enemies will waste you.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 43-46
  - type: text
    text: 'I told you but you wouldn’t listen. You rebelled at the plain word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. You threw out your chests and strutted into the hills. And those Amorites, who had lived in those hills all their lives, swarmed all over you like a hive of bees, chasing you from Seir all the way to Hormah, a stinging defeat. You came back and wept in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', but he didn’t pay a bit of attention to you; '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' didn’t give you the time of day. You stayed there in Kadesh a long time, about as long as you had stayed there earlier.'
