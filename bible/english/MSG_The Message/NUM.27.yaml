document_id: NUM.27,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Daughters of Zelophehad
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: The daughters of Zelophehad showed up. Their father was the son of Hepher son of Gilead son of Makir son of Manasseh, belonging to the clans of Manasseh son of Joseph. The daughters were Mahlah, Noah, Hoglah, Milcah, and Tirzah.
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Climb up into the Abarim Mountains and look over at the land that I am giving to the People of Israel. When you’ve had a good look you’ll be joined to your ancestors in the grave—yes, you also along with Aaron your brother. This goes back to the day when the congregation quarreled in the Wilderness of Zin and you didn’t honor me in holy reverence before them in the matter of the waters, the Waters of Meribah (Quarreling) at Kadesh in the Wilderness of Zin.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses responded to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ': “Let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of the spirits of everyone living, set a man over this community to lead them, to show the way ahead and bring them back home so '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s community will not be like sheep without a shepherd.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “Take Joshua the son of Nun—the Spirit is in him!—and place your hand on him. Stand him before Eleazar the priest in front of the entire congregation and commission him with everyone watching. Pass your magisterial authority over to him so that the whole congregation of the People of Israel will listen obediently to him. He is to consult with Eleazar the priest who, using the oracle-Urim, will prayerfully advise him in the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . He will command the People of Israel, the entire community, in all their comings and goings.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They came to the entrance of the Tent of Meeting. They stood before Moses and Eleazar the priest and before the leaders and the congregation and said, “Our father died in the wilderness. He wasn’t part of Korah’s rebel anti-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gang. He died for his own sins. And he left no sons. But why should our father’s name die out from his clan just because he had no sons? So give us an inheritance among our father’s relatives.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses followed '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s orders. He took Joshua and stood him before Eleazar the priest in front of the entire community. He laid his hands on him and commissioned him, following the procedures '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had given Moses.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses brought their case to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' ruled: “Zelophehad’s daughters are right. Give them land as an inheritance among their father’s relatives. Give them their father’s inheritance.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then tell the People of Israel, If a man dies and leaves no son, give his inheritance to his daughter. If he has no daughter, give it to his brothers. If he has no brothers, give it to his father’s brothers. If his father had no brothers, give it to the nearest relative so that the inheritance stays in the family. This is the standard procedure for the People of Israel, as commanded by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' through Moses.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua
    marker-yv: yv-h
