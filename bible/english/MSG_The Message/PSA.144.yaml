document_id: PSA.144
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Blessed be '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my mountain,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who trains me to fight fair and well.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s the bedrock on which I stand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the castle in which I live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my rescuing knight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The high crag where I run for dear life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: while he lays my enemies low.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'I wonder why you care, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: why do you bother with us at all?
- type: usfm
  marker: q1
  children:
  - type: text
    text: All we are is a puff of air;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we’re like shadows in a campfire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: 'Step down out of heaven, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: ignite volcanoes in the hearts of the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hurl your lightnings in every direction;
- type: usfm
  marker: q2
  children:
  - type: text
    text: shoot your arrows this way and that.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Reach all the way from sky to sea:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: pull me out of the ocean of hate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: out of the grip of those barbarians
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who lie through their teeth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who shake your hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: then knife you in the back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: O God, let me sing a new song to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me play it on a twelve-string guitar—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A song to the God who saved the king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God who rescued David, his servant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rescue me from the enemy sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: release me from the grip of those barbarians
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who lie through their teeth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who shake your hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: then knife you in the back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: Make our sons in their prime
- type: usfm
  marker: q2
  children:
  - type: text
    text: like sturdy oak trees,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our daughters as shapely and bright
- type: usfm
  marker: q2
  children:
  - type: text
    text: as fields of wildflowers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fill our barns with great harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fill our fields with huge flocks;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protect us from invasion and exile—
- type: usfm
  marker: q2
  children:
  - type: text
    text: eliminate the crime in our streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: How blessed the people who have all this!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'How blessed the people who have '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for God!'
