document_id: PSA.144,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Blessed be '
  - type: text
    content: God
  - type: text
    content: ', my mountain,'
  - type: text
    content: who trains me to fight fair and well.
  - type: text
    content: He’s the bedrock on which I stand,
  - type: text
    content: the castle in which I live,
  - type: text
    content: my rescuing knight,
  - type: text
    content: The high crag where I run for dear life,
  - type: text
    content: while he lays my enemies low.
  '11':
  - type: text
    content: Rescue me from the enemy sword,
  - type: text
    content: release me from the grip of those barbarians
  - type: text
    content: Who lie through their teeth,
  - type: text
    content: who shake your hand
  - type: text
    content: then knife you in the back.
  '12':
  - type: text
    content: Make our sons in their prime
  - type: text
    content: like sturdy oak trees,
  - type: text
    content: Our daughters as shapely and bright
  - type: text
    content: as fields of wildflowers.
  - type: text
    content: Fill our barns with great harvest,
  - type: text
    content: fill our fields with huge flocks;
  - type: text
    content: Protect us from invasion and exile—
  - type: text
    content: eliminate the crime in our streets.
  '15':
  - type: text
    content: How blessed the people who have all this!
  - type: text
    content: 'How blessed the people who have '
  - type: text
    content: God
  - type: text
    content: ' for God!'
  '3':
  - type: text
    content: 'I wonder why you care, '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: why do you bother with us at all?
  - type: text
    content: All we are is a puff of air;
  - type: text
    content: we’re like shadows in a campfire.
  '5':
  - type: text
    content: 'Step down out of heaven, '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: ignite volcanoes in the hearts of the mountains.
  - type: text
    content: Hurl your lightnings in every direction;
  - type: text
    content: shoot your arrows this way and that.
  - type: text
    content: 'Reach all the way from sky to sea:'
  - type: text
    content: pull me out of the ocean of hate,
  - type: text
    content: out of the grip of those barbarians
  - type: text
    content: Who lie through their teeth,
  - type: text
    content: who shake your hand
  - type: text
    content: then knife you in the back.
  '9':
  - type: text
    content: O God, let me sing a new song to you,
  - type: text
    content: let me play it on a twelve-string guitar—
  - type: text
    content: A song to the God who saved the king,
  - type: text
    content: the God who rescued David, his servant.
