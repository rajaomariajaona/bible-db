document_id: 2SA.5,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Before long all the tribes of Israel approached David in Hebron and said, “Look at us—your own flesh and blood! In time past when Saul was our king, you were the one who really ran the country. Even then '
  - type: text
    content: God
  - type: text
    content: ' said to you, ‘You will shepherd my people Israel and you’ll be the prince.’”'
  '11':
  - type: text
    content: 'It was at this time that Hiram, king of Tyre, sent messengers to David, along with timbers of cedar. He also sent carpenters and masons to build a house for David. David took this as a sign that '
  - type: text
    content: God
  - type: text
    content: ' had confirmed him as king of Israel, giving his kingship world prominence for the sake of Israel, his people.'
  '13':
  - type: text
    content: 'David took on more concubines and wives from Jerusalem after he left Hebron. And more sons and daughters were born to him. These are the names of those born to him in Jerusalem:'
  - type: text
    content: Shammua,
  - type: text
    content: Shobab,
  - type: text
    content: Nathan,
  - type: text
    content: Solomon,
  - type: text
    content: Ibhar,
  - type: text
    content: Elishua,
  - type: text
    content: Nepheg,
  - type: text
    content: Japhia,
  - type: text
    content: Elishama,
  - type: text
    content: Eliada,
  - type: text
    content: Eliphelet.
  '17':
  - type: text
    content: When the Philistines got word that David had been made king over all Israel, they came on the hunt for him. David heard of it and went down to the stronghold. When the Philistines arrived, they deployed their forces in Rephaim Valley.
  '19':
  - type: text
    content: 'Then David prayed to '
  - type: text
    content: God
  - type: text
    content: ': “Shall I go up and fight the Philistines? Will you help me beat them?”'
  '20':
  - type: text
    content: '“Go up,” '
  - type: text
    content: God
  - type: text
    content: ' replied. “Count on me. I’ll help you beat them.”'
  - type: text
    content: David then went straight to Baal Perazim, and smashed them to pieces. Afterward David said, “
  - type: text
    content: God
  - type: text
    content: ' exploded on my enemies like a gush of water.” That’s why David named the place Baal Perazim (The-Master-Who-Explodes). The retreating Philistines dumped their idols, and David and his soldiers took them away.'
  '22':
  - type: text
    content: ' Later there was a repeat performance. The Philistines came up again and deployed their troops in the Rephaim Valley. David again prayed to '
  - type: text
    content: God
  - type: text
    content: .
  '23':
  - type: text
    content: ' This time '
  - type: text
    content: God
  - type: text
    content: ' said, “Don’t attack them head-on. Instead, circle around behind them and ambush them from the grove of sacred trees. When you hear the sound of shuffling in the trees, get ready to move out. It’s a signal that '
  - type: text
    content: God
  - type: text
    content: ' is going ahead of you to smash the Philistine camp.”'
  '25':
  - type: text
    content: 'David did exactly what '
  - type: text
    content: God
  - type: text
    content: ' told him. He routed the Philistines all the way from Gibeon to Gezer.'
  '3':
  - type: text
    content: 'All the leaders of Israel met with King David at Hebron, and the king made a treaty with them in the presence of '
  - type: text
    content: God
  - type: text
    content: . And so they anointed David king over Israel.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: David was thirty years old when he became king, and ruled for forty years. In Hebron he ruled Judah for seven and a half years. In Jerusalem he ruled all Israel and Judah for thirty-three years.
  '6':
  - type: text
    content: David and his men immediately set out for Jerusalem to take on the Jebusites, who lived in that country. But they said, “You might as well go home! Even the blind and the lame could keep you out. You can’t get in here!” They had convinced themselves that David couldn’t break through.
  '7':
  - type: text
    content: But David went right ahead and captured the fortress of Zion, known ever since as the City of David. That day David said, “To get the best of these Jebusites, one must target the water system, not to mention this so-called lame and blind bunch that David hates.” (In fact, he was so sick and tired of it, people coined the expression, “No lame and blind allowed in the palace.”)
  '9':
  - type: text
    content: 'David made the fortress city his home and named it “City of David.” He developed the city from the outside terraces inward. David proceeded with a longer stride, a larger embrace since the '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies was with him.
