document_id: 2SA.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Before long all the tribes of Israel approached David in Hebron and said, “Look at us—your own flesh and blood! In time past when Saul was our king, you were the one who really ran the country. Even then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said to you, ‘You will shepherd my people Israel and you’ll be the prince.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All the leaders of Israel met with King David at Hebron, and the king made a treaty with them in the presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . And so they anointed David king over Israel.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: David was thirty years old when he became king, and ruled for forty years. In Hebron he ruled Judah for seven and a half years. In Jerusalem he ruled all Israel and Judah for thirty-three years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: David and his men immediately set out for Jerusalem to take on the Jebusites, who lived in that country. But they said, “You might as well go home! Even the blind and the lame could keep you out. You can’t get in here!” They had convinced themselves that David couldn’t break through.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: But David went right ahead and captured the fortress of Zion, known ever since as the City of David. That day David said, “To get the best of these Jebusites, one must target the water system, not to mention this so-called lame and blind bunch that David hates.” (In fact, he was so sick and tired of it, people coined the expression, “No lame and blind allowed in the palace.”)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'David made the fortress city his home and named it “City of David.” He developed the city from the outside terraces inward. David proceeded with a longer stride, a larger embrace since the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies was with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: 'It was at this time that Hiram, king of Tyre, sent messengers to David, along with timbers of cedar. He also sent carpenters and masons to build a house for David. David took this as a sign that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had confirmed him as king of Israel, giving his kingship world prominence for the sake of Israel, his people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-16
  - type: text
    text: 'David took on more concubines and wives from Jerusalem after he left Hebron. And more sons and daughters were born to him. These are the names of those born to him in Jerusalem:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shammua,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Shobab,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Nathan,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Solomon,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ibhar,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Elishua,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Nepheg,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Japhia,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Elishama,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliada,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Eliphelet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: When the Philistines got word that David had been made king over all Israel, they came on the hunt for him. David heard of it and went down to the stronghold. When the Philistines arrived, they deployed their forces in Rephaim Valley.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then David prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ': “Shall I go up and fight the Philistines? Will you help me beat them?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: '“Go up,” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' replied. “Count on me. I’ll help you beat them.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: David then went straight to Baal Perazim, and smashed them to pieces. Afterward David said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' exploded on my enemies like a gush of water.” That’s why David named the place Baal Perazim (The-Master-Who-Explodes). The retreating Philistines dumped their idols, and David and his soldiers took them away.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23a
  - type: text
    text: ' Later there was a repeat performance. The Philistines came up again and deployed their troops in the Rephaim Valley. David again prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23b-24
  - type: text
    text: ' This time '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “Don’t attack them head-on. Instead, circle around behind them and ambush them from the grove of sacred trees. When you hear the sound of shuffling in the trees, get ready to move out. It’s a signal that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is going ahead of you to smash the Philistine camp.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David did exactly what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told him. He routed the Philistines all the way from Gibeon to Gezer.'
