    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Good people, cheer '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Right-living people sound best when praising.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Use guitars to reinforce your Hallelujahs!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Play his praise on a grand piano!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Compose your own new song to him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give him a trumpet fanfare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Word is solid to the core;
- type: usfm
  marker: q2
  children:
  - type: text
    text: everything he makes is sound inside and out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He loves it when everything fits,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when his world is in plumb-line true.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Earth is drenched
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s affectionate satisfaction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'The skies were made by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s command;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he breathed the word and the stars popped out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He scooped Sea into his jug,
- type: usfm
  marker: q2
  children:
  - type: text
    text: put Ocean in his keg.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Earth-creatures, bow before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: world-dwellers—down on your knees!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Here’s why: he spoke and there it was,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in place the moment he said so.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' takes the wind out of Babel pretense,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shoots down the world’s power-schemes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s plan for the world stands up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all his designs are made to last.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Blessed is the country with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for God;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: blessed are the people he’s put in his will.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: 'From high in the skies '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' looks around,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he sees all Adam’s brood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From where he sits
- type: usfm
  marker: q2
  children:
  - type: text
    text: he overlooks all us earth-dwellers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has shaped each person in turn;
- type: usfm
  marker: q2
  children:
  - type: text
    text: now he watches everything we do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: No king succeeds with a big army alone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no warrior wins by brute strength.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Horsepower is not the answer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one gets by on muscle alone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'Watch this: God’s eye is on those who respect him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ones who are looking for his love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s ready to come to their rescue in bad times;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in lean times he keeps body and soul together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'We’re depending on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’s everything we need.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What’s more, our hearts brim with joy
- type: usfm
  marker: q2
  children:
  - type: text
    text: since we’ve taken for our own his holy name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Love us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', with all you’ve got—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that’s what we’re depending on.
