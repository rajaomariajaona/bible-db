document_id: PSA.108,97
type_code: eng
verses:
  '1':
  - type: text
    content: I’m ready, God, so ready,
  - type: text
    content: ready from head to toe.
  - type: text
    content: Ready to sing,
  - type: text
    content: 'ready to raise a God-song:'
  - type: text
    content: “Wake, soul! Wake, lute!
  - type: text
    content: Wake up, you sleepyhead sun!”
  '10':
  - type: text
    content: Who will take me to the thick of the fight?
  - type: text
    content: Who’ll show me the road to Edom?
  - type: text
    content: You aren’t giving up on us, are you, God?
  - type: text
    content: refusing to go out with our troops?
  '12':
  - type: text
    content: Give us help for the hard task;
  - type: text
    content: human help is worthless.
  - type: text
    content: In God we’ll do our very best;
  - type: text
    content: he’ll flatten the opposition for good.
  '3':
  - type: text
    content: 'I’m thanking you, '
  - type: text
    content: God
  - type: text
    content: ', out in the streets,'
  - type: text
    content: singing your praises in town and country.
  - type: text
    content: The deeper your love, the higher it goes;
  - type: text
    content: every cloud’s a flag to your faithfulness.
  - type: text
    content: Soar high in the skies, O God!
  - type: text
    content: Cover the whole earth with your glory!
  - type: text
    content: And for the sake of the one you love so much,
  - type: text
    content: reach down and help me—answer me!
  '7':
  - type: text
    content: 'That’s when God spoke in holy splendor:'
  - type: text
    content: “Brimming over with joy,
  - type: text
    content: I make a present of Shechem,
  - type: text
    content: I hand out Succoth Valley as a gift.
  - type: text
    content: Gilead’s in my pocket,
  - type: text
    content: to say nothing of Manasseh.
  - type: text
    content: Ephraim’s my hard hat,
  - type: text
    content: Judah my hammer.
  - type: text
    content: Moab’s a scrub bucket—
  - type: text
    content: I mop the floor with Moab,
  - type: text
    content: Spit on Edom,
  - type: text
    content: rain fireworks all over Philistia.”
