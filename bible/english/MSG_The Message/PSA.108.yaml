document_id: PSA.108
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I’m ready, God, so ready,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready from head to toe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ready to sing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'ready to raise a God-song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Wake, soul! Wake, lute!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wake up, you sleepyhead sun!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: 'I’m thanking you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', out in the streets,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: singing your praises in town and country.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The deeper your love, the higher it goes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every cloud’s a flag to your faithfulness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soar high in the skies, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cover the whole earth with your glory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And for the sake of the one you love so much,
- type: usfm
  marker: q2
  children:
  - type: text
    text: reach down and help me—answer me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'That’s when God spoke in holy splendor:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Brimming over with joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I make a present of Shechem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I hand out Succoth Valley as a gift.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gilead’s in my pocket,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to say nothing of Manasseh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim’s my hard hat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Judah my hammer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab’s a scrub bucket—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I mop the floor with Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spit on Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rain fireworks all over Philistia.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Who will take me to the thick of the fight?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who’ll show me the road to Edom?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You aren’t giving up on us, are you, God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: refusing to go out with our troops?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Give us help for the hard task;
- type: usfm
  marker: q2
  children:
  - type: text
    text: human help is worthless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In God we’ll do our very best;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he’ll flatten the opposition for good.
