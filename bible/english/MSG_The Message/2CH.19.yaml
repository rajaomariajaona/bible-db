document_id: 2CH.19,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'But Jehoshaphat king of Judah got home safe and sound. Jehu, son of Hanani the seer, confronted King Jehoshaphat: “You have no business helping evil, cozying up to '
  - type: text
    content: God
  - type: text
    content: '-haters. Because you did this, '
  - type: text
    content: God
  - type: text
    content: ' is good and angry with you. But you’re not all bad—you made a clean sweep of the polluting sex-and-religion shrines; and you were single-minded in seeking God.”'
  '11':
  - type: text
    content: '“Amariah the chief priest is in charge of all cases regarding the worship of '
  - type: text
    content: God
  - type: text
    content: '; Zebadiah son of Ishmael, the leader of the tribe of Judah, is in charge of all civil cases; the Levites will keep order in the courts. Be bold and diligent. And '
  - type: text
    content: God
  - type: text
    content: ' be with you as you do your best.”'
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: 'Jehoshaphat kept his residence in Jerusalem but made a regular round of visits among the people, from Beersheba in the south to Mount Ephraim in the north, urging them to return to '
  - type: text
    content: God
  - type: text
    content: ', the God of their ancestors.'
  '5':
  - type: text
    content: 'And he was diligent in appointing judges in the land—each of the fortress cities had its judge. He charged the judges: “This is serious work; do it carefully. You are not merely judging between men and women; these are '
  - type: text
    content: God
  - type: text
    content: '’s judgments that you are passing on. Live in the fear of '
  - type: text
    content: God
  - type: text
    content: '—be most careful, for '
  - type: text
    content: God
  - type: text
    content: ' hates dishonesty, partiality, and bribery.”'
  '8':
  - type: text
    content: 'In Jerusalem Jehoshaphat also appointed Levites, priests, and family heads to decide on matters that had to do with worship and mediating local differences. He charged them: “Do your work in the fear of '
  - type: text
    content: God
  - type: text
    content: '; be dependable and honest in your duties. When a case comes before you involving any of your fellow citizens, whether it seems large (like murder) or small (like matters of interpretation of the law), you are responsible for warning them that they are dealing with '
  - type: text
    content: God
  - type: text
    content: '. Make that explicit, otherwise both you and they are going to be dealing with '
  - type: text
    content: God
  - type: text
    content: ’s wrath. Do your work well or you’ll end up being as guilty as they are.
