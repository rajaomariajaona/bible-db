document_id: 2CH.19,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'But Jehoshaphat king of Judah got home safe and sound. Jehu, son of Hanani the seer, confronted King Jehoshaphat: “You have no business helping evil, cozying up to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-haters. Because you did this, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is good and angry with you. But you’re not all bad—you made a clean sweep of the polluting sex-and-religion shrines; and you were single-minded in seeking God.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Amariah the chief priest is in charge of all cases regarding the worship of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '; Zebadiah son of Ishmael, the leader of the tribe of Judah, is in charge of all civil cases; the Levites will keep order in the courts. Be bold and diligent. And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' be with you as you do your best.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jehoshaphat kept his residence in Jerusalem but made a regular round of visits among the people, from Beersheba in the south to Mount Ephraim in the north, urging them to return to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of their ancestors.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-7
    - type: text
      text: 'And he was diligent in appointing judges in the land—each of the fortress cities had its judge. He charged the judges: “This is serious work; do it carefully. You are not merely judging between men and women; these are '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s judgments that you are passing on. Live in the fear of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '—be most careful, for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' hates dishonesty, partiality, and bribery.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: 'In Jerusalem Jehoshaphat also appointed Levites, priests, and family heads to decide on matters that had to do with worship and mediating local differences. He charged them: “Do your work in the fear of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '; be dependable and honest in your duties. When a case comes before you involving any of your fellow citizens, whether it seems large (like murder) or small (like matters of interpretation of the law), you are responsible for warning them that they are dealing with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Make that explicit, otherwise both you and they are going to be dealing with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s wrath. Do your work well or you’ll end up being as guilty as they are.
