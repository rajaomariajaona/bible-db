document_id: EXO.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'On the fifteenth day of the second month after they had left Egypt, the whole company of Israel moved on from Elim to the Wilderness of Sin which is between Elim and Sinai. The whole company of Israel complained against Moses and Aaron there in the wilderness. The Israelites said, “Why didn’t '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' let us die in comfort in Egypt where we had lamb stew and all the bread we could eat? You’ve brought us out into this wilderness to starve us to death, the whole company of Israel!”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When Aaron gave out the instructions to the whole company of Israel, they turned to face the wilderness. And there it was: the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' visible in the Cloud.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses, “I’ve listened to the complaints of the Israelites. Now tell them: ‘At dusk you will eat meat and at dawn you’ll eat your fill of bread; and you’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' God.’”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15a
    - type: text
      text: ' That evening quail flew in and covered the camp and in the morning there was a layer of dew all over the camp. When the layer of dew had lifted, there on the wilderness ground was a fine flaky something, fine as frost on the ground. The Israelites took one look and said to one another, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man-hu
    - type: text
      text: ' (What is it?). They had no idea what it was.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15b-16
    - type: text
      text: ' So Moses told them, “It’s the bread '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has given you to eat. And these are '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s instructions: ‘Gather enough for each person, about two quarts per person; gather enough for everyone in your tent.’”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: The People of Israel went to work and started gathering, some more, some less, but when they measured out what they had gathered, those who gathered more had no extra and those who gathered less weren’t short—each person had gathered as much as was needed.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Moses said to them, “Don’t leave any of it until morning.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But they didn’t listen to Moses. A few of the men kept back some of it until morning. It got wormy and smelled bad. And Moses lost his temper with them.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: They gathered it every morning, each person according to need. Then the sun heated up and it melted. On the sixth day they gathered twice as much bread, about four quarts per person.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the leaders of the company came to Moses and reported.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'Moses said, “This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was talking about: Tomorrow is a day of rest, a holy Sabbath to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . Whatever you plan to bake, bake today; and whatever you plan to boil, boil today. Then set aside the leftovers until morning.” They set aside what was left until morning, as Moses had commanded. It didn’t smell bad and there were no worms in it.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'Moses said, “Now eat it; this is the day, a Sabbath for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . You won’t find any of it on the ground today. Gather it every day for six days, but the seventh day is Sabbath; there won’t be any of it on the ground.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: On the seventh day, some of the people went out to gather anyway but they didn’t find anything.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-29
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “How long are you going to disobey my commands and not follow my instructions? Don’t you see that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has given you the Sabbath? So on the sixth day he gives you bread for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: two
    - type: text
      text: ' days. So, each of you, stay home. Don’t leave home on the seventh day.”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: So the people quit working on the seventh day.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The Israelites named it manna (What is it?). It looked like coriander seed, whitish. And it tasted like a cracker with honey.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Moses said, “This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s command: ‘Keep a two-quart jar of it, an omer, for future generations so they can see the bread that I fed you in the wilderness after I brought you out of Egypt.’”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Moses told Aaron, “Take a jar and fill it with two quarts of manna. Place it before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', keeping it safe for future generations.”'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Aaron did what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commanded Moses. He set it aside before The Testimony to preserve it.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: The Israelites ate the manna for forty years until they arrived at the land where they would settle down. They ate manna until they reached the border into Canaan.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: According to ancient measurements, an omer is one-tenth of an ephah.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses, “I’m going to rain bread down from the skies for you. The people will go out and gather each day’s ration. I’m going to test them to see if they’ll live according to my Teaching or not. On the sixth day, when they prepare what they have gathered, it will turn out to be twice as much as their daily ration.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'Moses and Aaron told the People of Israel, “This evening you will know that it is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who brought you out of Egypt; and in the morning you will see the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Yes, he’s listened to your complaints against him. You haven’t been complaining against us, you know, but against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moses said, “Since it will be '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who gives you meat for your meal in the evening and your fill of bread in the morning, it’s '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who will have listened to your complaints against him. Who are we in all this? You haven’t been complaining to us—you’ve been complaining to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '!”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Moses instructed Aaron: “Tell the whole company of Israel: ‘Come near to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . He’s heard your complaints.’”
