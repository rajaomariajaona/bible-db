document_id: MRK.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Story of the Scattered Seed
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: He went back to teaching by the sea. A crowd built up to such a great size that he had to get into an offshore boat, using the boat as a pulpit as the people pushed to the water’s edge. He taught by using stories, many stories.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-12
    - type: text
      text: When they were off by themselves, those who were close to him, along with the Twelve, asked about the stories. He told them, “You’ve been given insight into God’s kingdom—you know how it works. But to those who can’t see it yet, everything comes in stories, creating readiness, nudging them toward a welcome awakening. These are people—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose eyes are open but don’t see a thing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whose ears are open but don’t understand a word,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who avoid making an about-face and getting forgiven.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: He continued, “Do you see how this story works? All my stories work this way.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: “The farmer plants the Word. Some people are like the seed that falls on the hardened soil of the road. No sooner do they hear the Word than Satan snatches away what has been planted in them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: “And some are like the seed that lands in the gravel. When they first hear the Word, they respond with great enthusiasm. But there is such shallow soil of character that when the emotions wear off and some difficulty arrives, there is nothing to show for it.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: “The seed cast in the weeds represents the ones who hear the kingdom news but are overwhelmed with worries about all the things they have to do and all the things they want to get. The stress strangles what they heard, and nothing comes of it.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “But the seed planted in the good earth represents those who hear the Word, embrace it, and produce a harvest beyond their wildest dreams.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Giving, Not Getting
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: 'Jesus went on: “Does anyone bring a lamp home and put it under a bucket or beneath the bed? Don’t you put it up on a table or on the mantel? We’re not keeping secrets, we’re telling them; we’re not hiding things, we’re bringing them out into the open.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “Are you listening to this? Really listening?
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: “Listen carefully to what I am saying—and be wary of the shrewd advice that tells you how to get ahead in the world on your own. Giving, not getting, is the way. Generosity begets generosity. Stinginess impoverishes.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Never Without a Story
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-29
    - type: text
      text: 'Then Jesus said, “God’s kingdom is like seed thrown on a field by a man who then goes to bed and forgets about it. The seed sprouts and grows—he has no idea how it happens. The earth does it all without his help: first a green stem of grass, then a bud, then the ripened grain. When the grain is fully formed, he reaps—harvest time!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-8
    - type: text
      text: “Listen. What do you make of this? A farmer planted seed. As he scattered the seed, some of it fell on the road and birds ate it. Some fell in the gravel; it sprouted quickly but didn’t put down roots, so when the sun came up it withered just as quickly. Some fell in the weeds; as it came up, it was strangled among the weeds and nothing came of it. Some fell on good earth and came up with a flourish, producing a harvest exceeding his wildest dreams.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-32
    - type: text
      text: “How can we picture God’s kingdom? What kind of story can we use? It’s like an acorn. When it lands on the ground it is quite small as seeds go, yet once it is planted it grows into a huge oak tree with thick branches. Eagles nest in it.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 33-34
    - type: text
      text: With many stories like these, he presented his message to them, fitting the stories to their experience and maturity. He was never without a story when he spoke. When he was alone with his disciples, he went over everything, sorting out the tangles, untying the knots.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Wind Ran Out of Breath
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-38
    - type: text
      text: Late that day he said to them, “Let’s go across to the other side.” They took him in the boat as he was. Other boats came along. A huge storm came up. Waves poured into the boat, threatening to sink it. And Jesus was in the stern, head on a pillow, sleeping! They roused him, saying, “Teacher, is it nothing to you that we’re going down?”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-40
    - type: text
      text: 'Awake now, he told the wind to pipe down and said to the sea, “Quiet! Settle down!” The wind ran out of breath; the sea became smooth as glass. Jesus reprimanded the disciples: “Why are you such cowards? Don’t you have any faith at all?”'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: They were in absolute awe, staggered. “Who is this, anyway?” they asked. “Wind and sea at his beck and call!”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Are you listening to this? Really listening?”
