document_id: EXO.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “If someone steals an ox or a lamb and slaughters or sells it, the thief must pay five cattle in place of the ox and four sheep in place of the lamb. If the thief is caught while breaking in and is hit hard and dies, there is no bloodguilt. But if it happens after daybreak, there is bloodguilt.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If someone gives a donkey or ox or lamb or any kind of animal to another for safekeeping and it dies or is injured or lost and there is no witness, an oath before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' must be made between them to decide whether one has laid hands on the property of the other. The owner must accept this and no damages are assessed. But if it turns out it was stolen, the owner must be compensated. If it has been torn by wild beasts, the torn animal must be brought in as evidence; no damages have to be paid.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If someone borrows an animal from a neighbor and it gets injured or dies while the owner is not present, he must pay for it. But if the owner was with it, he doesn’t have to pay. If the animal was hired, the payment covers the loss.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If a man seduces a virgin who is not engaged to be married and sleeps with her, he must pay the marriage price and marry her. If her father absolutely refuses to give her away, the man must still pay the marriage price for virgins.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t let a sorceress live.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Anyone who has sex with an animal gets the death penalty.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Anyone who sacrifices to a god other than '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' alone must be put to death.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t abuse or take advantage of strangers; you, remember, were once strangers in Egypt.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t mistreat widows or orphans. If you do and they cry out to me, you can be sure I’ll take them most seriously; I’ll show my anger and come raging among you with the sword, and your wives will end up widows and your children orphans.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If you lend money to my people, to any of the down-and-out among you, don’t come down hard on them and gouge them with interest.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If you take your neighbor’s coat as security, give it back before nightfall; it may be your neighbor’s only covering—what else does the person have to sleep in? And if I hear the neighbor crying out from the cold, I’ll step in—I’m compassionate.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t curse God; and don’t damn your leaders.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t be stingy as your wine vats fill up.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Dedicate your firstborn sons to me. The same with your cattle and sheep—they are to stay for seven days with their mother, then give them to me.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “A thief must make full restitution for what is stolen. The thief who is unable to pay is to be sold for his thieving. If caught red-handed with the stolen goods, and the ox or donkey or lamb is still alive, the thief pays double.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Be holy for my sake.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t eat mutilated flesh you find in the fields; throw it to the dogs.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If someone grazes livestock in a field or vineyard but lets them loose so they graze in someone else’s field, restitution must be made from the best of the owner’s field or vineyard.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If fire breaks out and spreads to the brush so that the sheaves of grain or the standing grain or even the whole field is burned up, whoever started the fire must pay for the damages.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If someone gives a neighbor money or things for safekeeping and they are stolen from the neighbor’s house, the thief, if caught, must pay back double. If the thief is not caught, the owner must be brought before God to determine whether the owner was the one who took the neighbor’s goods.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “In all cases of stolen goods, whether oxen, donkeys, sheep, clothing, anything in fact missing of which someone says, ‘That’s mine,’ both parties must come before the judges. The one the judges pronounce guilty must pay double to the other.
