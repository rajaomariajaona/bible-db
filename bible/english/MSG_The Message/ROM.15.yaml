document_id: ROM.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: Those of us who are strong and able in the faith need to step in and lend a hand to those who falter, and not just do what is most convenient for us. Strength is for service, not status. Each one of us needs to look after the good of the people around us, asking ourselves, “How can I help?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: 'That’s exactly what Jesus did. He didn’t make it easy for himself by avoiding people’s troubles, but waded right in and helped out. “I took on the troubles of the troubled,” is the way Scripture puts it. Even if it was written in Scripture long ago, you can be sure it’s written for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us
  - type: text
    text: '. God wants the combination of his steady, constant calling and warm, personal counsel in Scripture to come to characterize '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us
  - type: text
    text: ', keeping us alert for whatever he will do next. May our dependably steady and warmly personal God develop maturity in you so that you get along with each other as well as Jesus gets along with us all. Then we’ll be a choir—not our voices only, but our very lives singing in harmony in a stunning anthem to the God and Father of our Master Jesus!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-13
  - type: text
    text: 'So reach out and welcome one another to God’s glory. Jesus did it; now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' do it! Jesus, staying true to God’s purposes, reached out in a special way to the Jewish insiders so that the old ancestral promises would come true for them. As a result, the non-Jewish outsiders have been able to experience mercy and to show appreciation to God. Just think of all the Scriptures that will come true in what we do! For instance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I’ll join outsiders in a hymn-sing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll sing to your name!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'And this one:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Outsiders and insiders, rejoice together!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'And again:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: People of all nations, celebrate God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All colors and races, give hearty praise!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'And Isaiah’s word:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s the root of our ancestor Jesse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: breaking through the earth and growing tree tall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tall enough for everyone everywhere to see and take hope!
- type: usfm
  marker: m
  children:
  - type: text
    text: Oh! May the God of green hope fill you up with joy, fill you up with peace, so that your believing lives, filled with the life-giving energy of the Holy Spirit, will brim over with hope!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: Personally, I’ve been completely satisfied with who you are and what you are doing. You seem to me to be well-motivated and well-instructed, quite capable of guiding and advising one another. So, my dear friends, don’t take my rather bold and blunt language as criticism. It’s not criticism. I’m simply underlining how very much I need your help in carrying out this highly focused assignment God gave me, this priestly and gospel work of serving the spiritual needs of the non-Jewish outsiders so they can be presented as an acceptable offering to God, made whole and holy by God’s Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-21
  - type: text
    text: 'Looking back over what has been accomplished and what I have observed, I must say I am most pleased—in the context of Jesus, I’d even say '
  - type: usfm
    marker: it
    children:
    - type: text
      text: proud
  - type: text
    text: ', but only in that context. I have no interest in giving you a chatty account of my adventures, only the wondrously powerful and transformingly present words and deeds of Christ in me that triggered a believing response among the outsiders. In such ways I have trailblazed a preaching of the Message of Jesus all the way from Jerusalem far into northwestern Greece. This has all been pioneer work, bringing the Message only into those places where Jesus was not yet known and worshiped. My text has been,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who were never told of him—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll see him!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who’ve never heard of him—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they’ll get the message!
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-24
  - type: text
    text: And that’s why it has taken me so long to finally get around to coming to you. But now that there is no more pioneering work to be done in these parts, and since I have looked forward to seeing you for many years, I’m planning my visit. I’m headed for Spain, and expect to stop off on the way to enjoy a good visit with you, and eventually have you send me off with God’s blessing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-29
  - type: text
    text: First, though, I’m going to Jerusalem to deliver a relief offering to the followers of Jesus there. The Greeks—all the way from the Macedonians in the north to the Achaians in the south—decided they wanted to take up a collection for the poor among the believers in Jerusalem. They were happy to do this, but it was also their duty. Seeing that they got in on all the spiritual gifts that flowed out of the Jerusalem community so generously, it is only right that they do what they can to relieve their poverty. As soon as I have done this—personally handed over this “fruit basket”—I’m off to Spain, with a stopover with you in Rome. My hope is that my visit with you is going to be one of Christ’s more extravagant blessings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-33
  - type: text
    text: 'I have one request, dear friends: Pray for me. Pray strenuously with and for me—to God the Father, through the power of our Master Jesus, through the love of the Spirit—that I will be delivered from the lions’ den of unbelievers in Judea. Pray also that my relief offering to the Jerusalem believers will be accepted in the spirit in which it is given. Then, God willing, I’ll be on my way to you with a light and eager heart, looking forward to being refreshed by your company. God’s peace be with all of you. Oh, yes!'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
