document_id: EXO.39
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vestments. Using the blue, purple, and scarlet fabrics, they made the woven vestments for ministering in the Sanctuary. Also they made the sacred vestments for Aaron, as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-5
  - type: text
    text: 'Ephod. They made the Ephod using gold and blue, purple, and scarlet fabrics and finely twisted linen. They hammered out gold leaf and sliced it into threads that were then worked into designs in the blue, purple, and scarlet fabric and fine linen. They made shoulder pieces fastened at the two ends. The decorated band was made of the same material—gold, blue, purple, and scarlet material, and of fine twisted linen—and of one piece with it, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'They mounted the onyx stones in a setting of filigreed gold and engraved the names of the sons of Israel on them, then fastened them on the shoulder pieces of the Ephod as memorial stones for the Israelites, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: Breastpiece. They made a Breastpiece designed like the Ephod from gold, blue, purple, and scarlet material, and fine twisted linen. Doubled, the Breastpiece was nine inches square. They mounted four rows of precious gemstones on it.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'First row: carnelian, topaz, emerald.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Second row: ruby, sapphire, crystal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Third row: jacinth, agate, amethyst.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Fourth row: beryl, onyx, jasper.'
- type: usfm
  marker: p
  children:
  - type: text
    text: The stones were mounted in a gold filigree. The twelve stones corresponded to the names of the sons of Israel, twelve names engraved as on a seal, one for each of the twelve tribes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-21
  - type: text
    text: 'They made braided chains of pure gold for the Breastpiece, like cords. They made two settings of gold filigree and two rings of gold, put the two rings at the two ends of the Breastpiece, and fastened the two ends of the cords to the two rings at the end of the Breastpiece. Then they fastened the cords to the settings of filigree, attaching them to the shoulder pieces of the Ephod in front. Then they made two rings of gold and fastened them to the two ends of the Breastpiece on its inside edge facing the Ephod. They made two more rings of gold and fastened them in the front of the Ephod to the lower part of the two shoulder pieces, near the seam above the decorated band of the Ephod. The Breastpiece was fastened by running a cord of blue through its rings to the rings of the Ephod so that it rested secure on the decorated band of the Ephod and wouldn’t come loose, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-26
  - type: text
    text: 'Robe. They made the robe for the Ephod entirely of blue. The opening of the robe at the center was like a collar, the edge hemmed so that it wouldn’t tear. On the hem of the robe they made pomegranates of blue, purple, and scarlet material and fine twisted linen. They also made bells of pure gold and alternated the bells and pomegranates—a bell and a pomegranate, a bell and a pomegranate—all around the hem of the robe that was worn for ministering, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-29
  - type: text
    text: 'They also made the tunics of fine linen, the work of a weaver, for Aaron and his sons, the turban of fine linen, the linen hats, the linen underwear made of fine twisted linen, and sashes of fine twisted linen, blue, purple, and scarlet material and embroidered, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: 'They made the plate, the sacred crown, of pure gold and engraved on it as on a seal: “Holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '.” They attached a blue cord to it and fastened it to the turban, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'That completed the work of The Dwelling, the Tent of Meeting. The People of Israel did what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded Moses. They did it all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-41
  - type: text
