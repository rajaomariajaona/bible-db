- type: usfm
  marker: li1
  children:
  - type: text
    text: bases
- type: usfm
  marker: li1
  children:
  - type: text
    text: tenting of tanned ram skins
- type: usfm
  marker: li1
  children:
  - type: text
    text: tenting of dolphin skins
- type: usfm
  marker: li1
  children:
  - type: text
