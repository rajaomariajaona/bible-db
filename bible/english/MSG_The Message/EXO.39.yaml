document_id: EXO.39,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Vestments. Using the blue, purple, and scarlet fabrics, they made the woven vestments for ministering in the Sanctuary. Also they made the sacred vestments for Aaron, as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '11':
  - type: text
    content: 'Second row: ruby, sapphire, crystal.'
  '12':
  - type: text
    content: 'Third row: jacinth, agate, amethyst.'
  '13':
  - type: text
    content: 'Fourth row: beryl, onyx, jasper.'
  - type: text
    content: The stones were mounted in a gold filigree. The twelve stones corresponded to the names of the sons of Israel, twelve names engraved as on a seal, one for each of the twelve tribes.
  '15':
  - type: text
    content: 'They made braided chains of pure gold for the Breastpiece, like cords. They made two settings of gold filigree and two rings of gold, put the two rings at the two ends of the Breastpiece, and fastened the two ends of the cords to the two rings at the end of the Breastpiece. Then they fastened the cords to the settings of filigree, attaching them to the shoulder pieces of the Ephod in front. Then they made two rings of gold and fastened them to the two ends of the Breastpiece on its inside edge facing the Ephod. They made two more rings of gold and fastened them in the front of the Ephod to the lower part of the two shoulder pieces, near the seam above the decorated band of the Ephod. The Breastpiece was fastened by running a cord of blue through its rings to the rings of the Ephod so that it rested secure on the decorated band of the Ephod and wouldn’t come loose, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '2':
  - type: text
    content: 'Ephod. They made the Ephod using gold and blue, purple, and scarlet fabrics and finely twisted linen. They hammered out gold leaf and sliced it into threads that were then worked into designs in the blue, purple, and scarlet fabric and fine linen. They made shoulder pieces fastened at the two ends. The decorated band was made of the same material—gold, blue, purple, and scarlet material, and of fine twisted linen—and of one piece with it, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '22':
  - type: text
    content: 'Robe. They made the robe for the Ephod entirely of blue. The opening of the robe at the center was like a collar, the edge hemmed so that it wouldn’t tear. On the hem of the robe they made pomegranates of blue, purple, and scarlet material and fine twisted linen. They also made bells of pure gold and alternated the bells and pomegranates—a bell and a pomegranate, a bell and a pomegranate—all around the hem of the robe that was worn for ministering, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '27':
  - type: text
    content: 'They also made the tunics of fine linen, the work of a weaver, for Aaron and his sons, the turban of fine linen, the linen hats, the linen underwear made of fine twisted linen, and sashes of fine twisted linen, blue, purple, and scarlet material and embroidered, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '30':
  - type: text
    content: 'They made the plate, the sacred crown, of pure gold and engraved on it as on a seal: “Holy to '
  - type: text
    content: God
  - type: text
    content: '.” They attached a blue cord to it and fastened it to the turban, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '32':
  - type: text
    content: 'That completed the work of The Dwelling, the Tent of Meeting. The People of Israel did what '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses. They did it all.'
  '33':
  - type: text
    content: 'They presented The Dwelling to Moses, the Tent and all its furnishings:'
  - type: text
    content: fastening hooks
  - type: text
