  '42':
  - type: text
    content: 'The Israelites completed all the work, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded. Moses saw that they had done all the work and done it exactly as '
  - type: text
    content: God
  - type: text
    content: ' had commanded. Moses blessed them.'
  '6':
  - type: text
    content: 'They mounted the onyx stones in a setting of filigreed gold and engraved the names of the sons of Israel on them, then fastened them on the shoulder pieces of the Ephod as memorial stones for the Israelites, just as '
  - type: text
    content: God
  - type: text
    content: ' had commanded Moses.'
  '8':
  - type: text
    content: Breastpiece. They made a Breastpiece designed like the Ephod from gold, blue, purple, and scarlet material, and fine twisted linen. Doubled, the Breastpiece was nine inches square. They mounted four rows of precious gemstones on it.
  - type: text
    content: 'First row: carnelian, topaz, emerald.'
