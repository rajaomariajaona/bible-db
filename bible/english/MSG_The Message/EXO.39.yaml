- type: usfm
  marker: li2
  children:
  - type: text
    text: and the Bread of the Presence
- type: usfm
  marker: li1
  children:
  - type: text
    text: Lampstand of pure gold
- type: usfm
  marker: li2
  children:
  - type: text
    text: and its lamps all fitted out
- type: usfm
  marker: li2
  children:
  - type: text
    text: and all its utensils
- type: usfm
  marker: li2
  children:
  - type: text
    text: and the oil for the light
- type: usfm
  marker: li1
  children:
  - type: text
    text: Gold Altar
- type: usfm
  marker: li1
  children:
  - type: text
    text: anointing oil
- type: usfm
  marker: li1
  children:
  - type: text
    text: fragrant incense
- type: usfm
  marker: li1
  children:
  - type: text
    text: screen for the entrance to the Tent
- type: usfm
  marker: li1
  children:
  - type: text
    text: Bronze Altar
- type: usfm
  marker: li2
  children:
  - type: text
    text: with its bronze grate
- type: usfm
  marker: li2
  children:
  - type: text
    text: its poles and all its utensils
- type: usfm
  marker: li1
  children:
  - type: text
    text: Washbasin
- type: usfm
  marker: li2
  children:
  - type: text
    text: and its base
- type: usfm
  marker: li1
  children:
  - type: text
    text: hangings for the Courtyard
- type: usfm
  marker: li2
  children:
  - type: text
    text: its posts and bases
- type: usfm
  marker: li1
  children:
  - type: text
    text: screen for the gate of the Courtyard
- type: usfm
  marker: li2
  children:
  - type: text
    text: its cords and its pegs
- type: usfm
  marker: li1
  children:
  - type: text
    text: utensils for ministry in The Dwelling, the Tent of Meeting
- type: usfm
  marker: li2
  children:
  - type: text
    text: woven vestments for ministering in the Sanctuary
- type: usfm
  marker: li1
  children:
  - type: text
    text: sacred vestments for Aaron the priest,
- type: usfm
  marker: li2
  children:
  - type: text
    text: and his sons when serving as priests
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 42-43
  - type: text
    text: 'The Israelites completed all the work, just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded. Moses saw that they had done all the work and done it exactly as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had commanded. Moses blessed them.'
