document_id: EZK.3,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warn These People
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: He told me, “Son of man, eat what you see. Eat this book. Then go and speak to the family of Israel.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: 'Then he said, “Son of man, get all these words that I’m giving you inside you. Listen to them obediently. Make them your own. And now go. Go to the exiles, your people, and speak. Tell them, ‘This is the Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.’ Speak your piece, whether they listen or not.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: 'Then the Spirit picked me up. Behind me I heard a great commotion—“Blessed be the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' in his Sanctuary!”—the wings of the living creatures beating against each other, the whirling wheels, the rumble of a great earthquake.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: 'The Spirit lifted me and took me away. I went bitterly and angrily. I didn’t want to go. But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had me in his grip. I arrived among the exiles who lived near the Kebar River at Tel Aviv. I came to where they were living and sat there for seven days, appalled.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'At the end of the seven days, I received this Message from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-19
    - type: text
      text: '“Son of man, I’ve made you a watchman for the family of Israel. Whenever you hear me say something, warn them for me. If I say to the wicked, ‘You are going to die,’ and you don’t sound the alarm warning them that it’s a matter of life or death, they will die and it will be your fault. I’ll hold you responsible. But if you warn the wicked and they keep right on sinning anyway, they’ll most certainly die for their sin, but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' won’t die. You’ll have saved your life.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: As I opened my mouth, he gave me the scroll to eat, saying, “Son of man, eat this book that I am giving you. Make a full meal of it!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I ate it. It tasted so good—just like honey.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: “And if the righteous turn back from living righteously and take up with evil when I step in and put them in a hard place, they’ll die. If you haven’t warned them, they’ll die because of their sins, and none of the right things they’ve done will count for anything—and I’ll hold you responsible. But if you warn these righteous people not to sin and they listen to you, they’ll live because they took the warning—and again, you’ll have saved your life.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' grabbed me by the shoulder and said, “Get up. Go out on the plain. I want to talk with you.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So I got up and went out on the plain. I couldn’t believe my eyes: the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '! Right there! It was like the Glory I had seen at the Kebar River. I fell to the ground, prostrate.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-26
    - type: text
      text: 'Then the Spirit entered me and put me on my feet. He said, “Go home and shut the door behind you.” And then something odd: “Son of man: They’ll tie you hand and foot with ropes so you can’t leave the house. I’ll make your tongue stick to the roof of your mouth so you won’t be able to talk and tell the people what they’re doing wrong, even though they are a bunch of rebels.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“But then when the time is ripe, I’ll free your tongue and you’ll say, ‘This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says: . . .’ From then on it’s up to them. They can listen or not listen, whichever they like. They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a bunch of rebels!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: Then he told me, “Son of man, go to the family of Israel and speak my Message. Look, I’m not sending you to a people who speak a hard-to-learn language with words you can hardly pronounce. If I had sent you to such people, their ears would have perked up and they would have listened immediately.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-9
    - type: text
      text: “But it won’t work that way with the family of Israel. They won’t listen to you because they won’t listen to me. They are, as I said, a hard case, hardened in their sin. But I’ll make you as hard in your way as they are in theirs. I’ll make your face as hard as rock, harder than granite. Don’t let them intimidate you. Don’t be afraid of them, even though they’re a bunch of rebels.”
