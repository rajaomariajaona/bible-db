type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Defense
  - type: heading
    content: God Sets a Boundary Between Light and Darkness
  - type: text
    content: 'Job answered:'
  - type: text
    content: “Well, you’ve certainly been a great help to a helpless man!
  - type: text
    content: You came to the rescue just in the nick of time!
  - type: text
    content: What wonderful advice you’ve given to a mixed-up man!
  - type: text
    content: What amazing insights you’ve provided!
  - type: text
    content: Where in the world did you learn all this?
  - type: text
    content: How did you become so inspired?
  '5':
  - type: text
    content: “All the buried dead are in torment,
  - type: text
    content: and all who’ve been drowned in the deep, deep sea.
  - type: text
    content: Hell is ripped open before God,
  - type: text
    content: graveyards dug up and exposed.
  - type: text
    content: He spreads the skies over unformed space,
  - type: text
    content: hangs the earth out in empty space.
  - type: text
    content: He pours water into cumulus cloud-bags
  - type: text
    content: and the bags don’t burst.
  - type: text
    content: He makes the moon wax and wane,
  - type: text
    content: putting it through its phases.
  - type: text
    content: He draws the horizon out over the ocean,
  - type: text
    content: sets a boundary between light and darkness.
  - type: text
    content: Thunder crashes and rumbles in the skies.
  - type: text
    content: Listen! It’s God raising his voice!
  - type: text
    content: By his power he stills sea storms,
  - type: text
    content: by his wisdom he tames sea monsters.
  - type: text
    content: With one breath he clears the sky,
  - type: text
    content: with one finger he crushes the sea serpent.
  - type: text
    content: And this is only the beginning,
  - type: text
    content: a mere whisper of his rule.
  - type: text
    content: 'Whatever would we do if he '
  - type: text
    content: really
  - type: text
    content: ' raised his voice!”'
