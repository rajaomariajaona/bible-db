document_id: JOB.26,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Job’s Defense
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: God Sets a Boundary Between Light and Darkness
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Job answered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Well, you’ve certainly been a great help to a helpless man!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You came to the rescue just in the nick of time!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What wonderful advice you’ve given to a mixed-up man!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What amazing insights you’ve provided!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where in the world did you learn all this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How did you become so inspired?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All the buried dead are in torment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all who’ve been drowned in the deep, deep sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hell is ripped open before God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: graveyards dug up and exposed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spreads the skies over unformed space,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hangs the earth out in empty space.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He pours water into cumulus cloud-bags
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the bags don’t burst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes the moon wax and wane,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: putting it through its phases.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He draws the horizon out over the ocean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sets a boundary between light and darkness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thunder crashes and rumbles in the skies.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen! It’s God raising his voice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By his power he stills sea storms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by his wisdom he tames sea monsters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With one breath he clears the sky,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with one finger he crushes the sea serpent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And this is only the beginning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mere whisper of his rule.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whatever would we do if he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: really
    - type: text
      text: ' raised his voice!”'
