document_id: PSA.125,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Those who trust in '
  - type: text
    content: God
  - type: text
    content: 'are like Zion Mountain:'
  - type: text
    content: Nothing can move it, a rock-solid mountain
  - type: text
    content: you can always depend on.
  - type: text
    content: Mountains encircle Jerusalem,
  - type: text
    content: 'and '
  - type: text
    content: God
  - type: text
    content: ' encircles his people—'
  - type: text
    content: always has and always will.
  - type: text
    content: The fist of the wicked
  - type: text
    content: will never violate
  - type: text
    content: What is due the righteous,
  - type: text
    content: provoking wrongful violence.
  - type: text
    content: 'Be good to your good people, '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: to those whose hearts are right!
  - type: text
    content: God
  - type: text
    content: ' will round up the backsliders,'
  - type: text
    content: corral them with the incorrigibles.
  - type: text
    content: Peace over Israel!
