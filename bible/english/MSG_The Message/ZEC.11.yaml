document_id: ZEC.11,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Open your borders to the immigrants, proud Lebanon!'
  - type: text
    content: Your sentinel trees will burn.
  - type: text
    content: Weep, great pine trees! Mourn, you sister cedars!
  - type: text
    content: Your towering trees are cordwood.
  - type: text
    content: Weep Bashan oak trees!
  - type: text
    content: Your thick forest is now a field of stumps.
  - type: text
    content: Do you hear the wailing of shepherds?
  - type: text
    content: They’ve lost everything they once owned.
  - type: text
    content: Do you hear the outrage of the lions?
  - type: text
    content: The mighty jungle of the Jordan is wasted.
  - type: text
    content: Make room for the returning exiles!
  - type: heading
    content: Breaking the Beautiful Covenant
  '10':
  - type: text
    content: 'Then I took the staff named Lovely and broke it across my knee, breaking the beautiful covenant I had made with all the peoples. In one stroke, both staff and covenant were broken. The money-hungry owners saw me do it and knew '
  - type: text
    content: God
  - type: text
    content: ' was behind it.'
  '12':
  - type: text
    content: 'Then I addressed them: “Pay me what you think I’m worth.” They paid me an insulting sum, counting out thirty silver coins.'
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told me, “Throw it in the poor box.” This stingy wage was all they thought of me and my work! So I took the thirty silver coins and threw them into the poor box in '
  - type: text
    content: God
  - type: text
    content: ’s Temple.
  '14':
  - type: text
    content: Then I broke the other staff, Harmony, across my knee, breaking the family ties between Judah and Israel.
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' then said, “Dress up like a stupid shepherd. I’m going to install just such a shepherd in this land—a shepherd indifferent to victims, who ignores the lost, abandons the injured, and disdains decent citizens. He’ll only be in it for what he can get out of it, using and abusing any and all.'
  '17':
  - type: text
    content: “Doom to you, useless shepherd,
  - type: text
    content: walking off and leaving the sheep!
  - type: text
    content: A curse on your arm!
  - type: text
    content: A curse on your right eye!
  - type: text
    content: Your arm will hang limp and useless.
  - type: text
    content: Your right eye will go stone blind.”
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' commanded me, “Shepherd the sheep that are soon to be slaughtered. The people who buy them will butcher them for quick and easy money. What’s worse, they’ll get away with it. The people who sell them will say, ‘Lucky me! God’s on my side; I’ve got it made!’ They have shepherds who couldn’t care less about them.”'
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Decree: “I’m washing my hands of the people of this land. From now on they’re all on their own. It’s dog-eat-dog, survival of the fittest, and every person for themselves. Don’t look for help from me.”'
  '7':
  - type: text
    content: So I took over from the crass, money-grubbing owners, and shepherded the sheep marked for slaughter. I got myself two shepherd staffs. I named one Lovely and the other Harmony. Then I went to work shepherding the sheep. Within a month I got rid of the corrupt shepherds. I got tired of putting up with them—and they couldn’t stand me.
  '9':
  - type: text
    content: And then I got tired of the sheep and said, “I’ve had it with you—no more shepherding from me. If you die, you die; if you’re attacked, you’re attacked. Whoever survives can eat what’s left.”
