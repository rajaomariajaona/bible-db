document_id: ZEC.11
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4a
  - type: text
    text: ' Open your borders to the immigrants, proud Lebanon!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your sentinel trees will burn.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep, great pine trees! Mourn, you sister cedars!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your towering trees are cordwood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Weep Bashan oak trees!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your thick forest is now a field of stumps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you hear the wailing of shepherds?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They’ve lost everything they once owned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you hear the outrage of the lions?
- type: usfm
  marker: q2
  children:
  - type: text
    text: The mighty jungle of the Jordan is wasted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make room for the returning exiles!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Breaking the Beautiful Covenant
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4b-5
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' commanded me, “Shepherd the sheep that are soon to be slaughtered. The people who buy them will butcher them for quick and easy money. What’s worse, they’ll get away with it. The people who sell them will say, ‘Lucky me! God’s on my side; I’ve got it made!’ They have shepherds who couldn’t care less about them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Decree: “I’m washing my hands of the people of this land. From now on they’re all on their own. It’s dog-eat-dog, survival of the fittest, and every person for themselves. Don’t look for help from me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: So I took over from the crass, money-grubbing owners, and shepherded the sheep marked for slaughter. I got myself two shepherd staffs. I named one Lovely and the other Harmony. Then I went to work shepherding the sheep. Within a month I got rid of the corrupt shepherds. I got tired of putting up with them—and they couldn’t stand me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And then I got tired of the sheep and said, “I’ve had it with you—no more shepherding from me. If you die, you die; if you’re attacked, you’re attacked. Whoever survives can eat what’s left.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'Then I took the staff named Lovely and broke it across my knee, breaking the beautiful covenant I had made with all the peoples. In one stroke, both staff and covenant were broken. The money-hungry owners saw me do it and knew '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was behind it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then I addressed them: “Pay me what you think I’m worth.” They paid me an insulting sum, counting out thirty silver coins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told me, “Throw it in the poor box.” This stingy wage was all they thought of me and my work! So I took the thirty silver coins and threw them into the poor box in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then I broke the other staff, Harmony, across my knee, breaking the family ties between Judah and Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' then said, “Dress up like a stupid shepherd. I’m going to install just such a shepherd in this land—a shepherd indifferent to victims, who ignores the lost, abandons the injured, and disdains decent citizens. He’ll only be in it for what he can get out of it, using and abusing any and all.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Doom to you, useless shepherd,
- type: usfm
  marker: q2
  children:
  - type: text
    text: walking off and leaving the sheep!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A curse on your arm!
- type: usfm
  marker: q2
  children:
  - type: text
    text: A curse on your right eye!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your arm will hang limp and useless.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your right eye will go stone blind.”
