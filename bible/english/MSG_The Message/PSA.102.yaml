document_id: PSA.102,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', listen! Listen to my prayer,'
  - type: text
    content: listen to the pain in my cries.
  - type: text
    content: Don’t turn your back on me
  - type: text
    content: just when I need you so desperately.
  - type: text
    content: 'Pay attention! This is a cry for '
  - type: text
    content: help
  - type: text
    content: '!'
  - type: text
    content: And hurry—this can’t wait!
  '12':
  - type: text
    content: 'Yet you, '
  - type: text
    content: God
  - type: text
    content: ', are sovereign still,'
  - type: text
    content: always and ever sovereign.
  - type: text
    content: You’ll get up from your throne and help Zion—
  - type: text
    content: it’s time for compassionate help.
  - type: text
    content: Oh, how your servants love this city’s rubble
  - type: text
    content: and weep with compassion over its dust!
  - type: text
    content: The godless nations will sit up and take notice
  - type: text
    content: —see your glory, worship your name—
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' rebuilds Zion,'
  - type: text
    content: when he shows up in all his glory,
  - type: text
    content: When he attends to the prayer of the wretched.
  - type: text
    content: He won’t dismiss their prayer.
  '18':
  - type: text
    content: Write this down for the next generation
  - type: text
    content: 'so people not yet born will praise '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' looked out from his high holy place;'
  - type: text
    content: from heaven he surveyed the earth.
  - type: text
    content: He listened to the groans of the doomed,
  - type: text
    content: he opened the doors of their death cells.”
  - type: text
    content: Write it so the story can be told in Zion,
  - type: text
    content: 'so '
  - type: text
    content: God
  - type: text
    content: ’s praise will be sung in Jerusalem’s streets
  - type: text
    content: And wherever people gather together
  - type: text
    content: along with their rulers to worship him.
  '23':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' sovereignly brought me to my knees,'
  - type: text
    content: he cut me down in my prime.
  - type: text
    content: “Oh, don’t,” I prayed, “please don’t let me die.
  - type: text
    content: You have more years than you know what to do with!
  - type: text
    content: You laid earth’s foundations a long time ago,
  - type: text
    content: and handcrafted the very heavens;
  - type: text
    content: You’ll still be around when they’re long gone,
  - type: text
    content: threadbare and discarded like an old suit of clothes.
  - type: text
    content: You’ll throw them away like a worn-out coat,
  - type: text
    content: but year after year you’re as good as new.
  - type: text
    content: Your servants’ children will have a good place to live
  - type: text
    content: and their children will be at home with you.”
  '3':
  - type: text
    content: I’m wasting away to nothing,
  - type: text
    content: I’m burning up with fever.
  - type: text
    content: I’m a ghost of my former self,
  - type: text
    content: half-consumed already by terminal illness.
  - type: text
    content: My jaws ache from gritting my teeth;
  - type: text
    content: I’m nothing but skin and bones.
  - type: text
    content: I’m like a buzzard in the desert,
  - type: text
    content: a crow perched on the rubble.
  - type: text
    content: Insomniac, I twitter away,
  - type: text
    content: mournful as a sparrow in the gutter.
  - type: text
    content: All day long my enemies taunt me,
  - type: text
    content: while others just curse.
  - type: text
    content: They bring in meals—casseroles of ashes!
  - type: text
    content: I draw drink from a barrel of my tears.
  - type: text
    content: And all because of your furious anger;
  - type: text
    content: you swept me up and threw me out.
  - type: text
    content: There’s nothing left of me—
  - type: text
    content: a withered weed, swept clean from the path.
