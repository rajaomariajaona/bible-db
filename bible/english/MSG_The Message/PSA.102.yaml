document_id: PSA.102,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', listen! Listen to my prayer,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to the pain in my cries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t turn your back on me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just when I need you so desperately.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pay attention! This is a cry for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: help
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hurry—this can’t wait!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', are sovereign still,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: always and ever sovereign.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll get up from your throne and help Zion—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it’s time for compassionate help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, how your servants love this city’s rubble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and weep with compassion over its dust!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godless nations will sit up and take notice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —see your glory, worship your name—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' rebuilds Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he shows up in all his glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he attends to the prayer of the wretched.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He won’t dismiss their prayer.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Write this down for the next generation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so people not yet born will praise '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' looked out from his high holy place;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from heaven he surveyed the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He listened to the groans of the doomed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he opened the doors of their death cells.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Write it so the story can be told in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s praise will be sung in Jerusalem’s streets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And wherever people gather together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with their rulers to worship him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sovereignly brought me to my knees,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he cut me down in my prime.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, don’t,” I prayed, “please don’t let me die.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have more years than you know what to do with!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You laid earth’s foundations a long time ago,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and handcrafted the very heavens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll still be around when they’re long gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: threadbare and discarded like an old suit of clothes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll throw them away like a worn-out coat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but year after year you’re as good as new.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your servants’ children will have a good place to live
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their children will be at home with you.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m wasting away to nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m burning up with fever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m a ghost of my former self,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: half-consumed already by terminal illness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My jaws ache from gritting my teeth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m nothing but skin and bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m like a buzzard in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a crow perched on the rubble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Insomniac, I twitter away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mournful as a sparrow in the gutter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All day long my enemies taunt me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while others just curse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They bring in meals—casseroles of ashes!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I draw drink from a barrel of my tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all because of your furious anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you swept me up and threw me out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing left of me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a withered weed, swept clean from the path.
