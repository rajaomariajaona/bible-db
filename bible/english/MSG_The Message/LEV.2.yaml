document_id: LEV.2,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Grain-Offering
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: '“When you present a Grain-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', use fine flour. Pour oil on it, put incense on it, and bring it to Aaron’s sons, the priests. One of them will take a handful of the fine flour and oil, with all the incense, and burn it on the Altar for a memorial: a Fire-Gift, a pleasing fragrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. The rest of the Grain-Offering is for Aaron and his sons—a most holy part of the Fire-Gifts to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13
    - type: text
      text: '“All the Grain-Offerings that you present to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' must be made without yeast; you must never burn any yeast or honey as a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. You may offer them to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as an offering of firstfruits but not on the Altar as a pleasing fragrance. Season every presentation of your Grain-Offering with salt. Don’t leave the salt of the covenant with your God out of your Grain-Offerings. Present all your offerings with salt.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-16
    - type: text
      text: '“If you present a Grain-Offering of firstfruits to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', bring crushed heads of the new grain roasted. Put oil and incense on it—it’s a Grain-Offering. The priest will burn some of the mixed grain and oil with all the incense as a memorial—a Fire-Gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “When you present a Grain-Offering of oven-baked loaves, use fine flour, mixed with oil but no yeast. Or present wafers made without yeast and spread with oil.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-6
    - type: text
      text: “If you bring a Grain-Offering cooked on a griddle, use fine flour mixed with oil but without yeast. Crumble it and pour oil on it—it’s a Grain-Offering.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “If you bring a Grain-Offering deep-fried in a pan, make it of fine flour with oil.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: '“Bring the Grain-Offering you make from these ingredients and present it to the priest. He will bring it to the Altar, break off a memorial piece from the Grain-Offering, and burn it on the Altar: a Fire-Gift, a pleasing fragrance to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. The rest of the Grain-Offering is for Aaron and his sons—a most holy part of the gifts to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
