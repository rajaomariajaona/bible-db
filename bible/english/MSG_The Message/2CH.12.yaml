document_id: 2CH.12,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'By the time Rehoboam had secured his kingdom and was strong again, he, and all Israel with him, had virtually abandoned '
  - type: text
    content: God
  - type: text
    content: ' and his ways.'
  - type: text
    content: '* * *'
  '10':
  - type: text
    content: 'King Rehoboam replaced the gold shields with bronze shields and gave them to the guards who were posted at the entrance to the royal palace. Whenever the king went to '
  - type: text
    content: God
  - type: text
    content: ’s Temple, the guards went with him carrying the shields, but they always returned them to the guardroom.
  '12':
  - type: text
    content: 'Because Rehoboam was repentant, '
  - type: text
    content: God
  - type: text
    content: ’s anger was blunted, so he wasn’t totally destroyed. The picture wasn’t entirely bleak—there were some good things going on in Judah.
  '13':
  - type: text
    content: 'King Rehoboam regrouped and reestablished his rule in Jerusalem. He was forty-one years old when he became king and continued as king for seventeen years in Jerusalem, the city '
  - type: text
    content: God
  - type: text
    content: ' chose out of all the tribes of Israel as the special presence of his Name. His mother was Naamah from Ammon. But the final verdict on Rehoboam was that he was a bad king—'
  - type: text
    content: God
  - type: text
    content: ' was not important to him; his heart neither cared for nor sought after '
  - type: text
    content: God
  - type: text
    content: .
  '15':
  - type: text
    content: The history of Rehoboam, from start to finish, is written in the memoirs of Shemaiah the prophet and Iddo the seer that contain the family trees. There was war between Rehoboam and Jeroboam the whole time. Rehoboam died and was buried with his ancestors in the City of David. His son Abijah ruled after him.
  '2':
  - type: text
    content: 'In Rehoboam’s fifth year, because he and the people were unfaithful to '
  - type: text
    content: God
  - type: text
    content: ', Shishak king of Egypt invaded as far as Jerusalem. He came with twelve hundred chariots and sixty thousand cavalry, and soldiers from all over—the Egyptian army included Libyans, Sukkites, and Ethiopians. They took the fortress cities of Judah and advanced as far as Jerusalem itself.'
  '5':
  - type: text
    content: Then the prophet Shemaiah, accompanied by the leaders of Judah who had retreated to Jerusalem before Shishak, came to Rehoboam and said, “
  - type: text
    content: God
  - type: text
    content: '’s word: You abandoned me; now I abandon you to Shishak.”'
  '6':
  - type: text
    content: The leaders of Israel and the king were repentant and said, “
  - type: text
    content: God
  - type: text
    content: ' is right.”'
  '7':
  - type: text
    content: 'When '
  - type: text
    content: God
  - type: text
    content: ' saw that they were humbly repentant, the word of '
  - type: text
    content: God
  - type: text
    content: ' came to Shemaiah: “Because they are humble, I’ll not destroy them—I’ll give them a break; I won’t use Shishak to express my wrath against Jerusalem. What I will do, though, is make them Shishak’s subjects—they’ll learn the difference between serving me and serving human kings.”'
  '9':
  - type: text
    content: 'Then Shishak king of Egypt attacked Jerusalem. He plundered the treasury of The Temple of '
  - type: text
    content: God
  - type: text
    content: ' and the treasury of the royal palace—he took everything he could lay his hands on. He even took the gold shields that Solomon had made.'
