  - type: text
    content: 'Thank '
  - type: text
    content: God
  - type: text
    content: '! He deserves your thanks.'
  - type: text
    content: His love never quits.
  - type: text
    content: Thank the God of all gods,
  - type: text
    content: His love never quits.
  - type: text
    content: Thank the Lord of all lords.
  - type: text
    content: His love never quits.
  '23':
  - type: text
    content: God remembered us when we were down,
  - type: text
    content: His love never quits.
  - type: text
    content: Rescued us from the trampling boot,
  - type: text
    content: His love never quits.
  - type: text
    content: Takes care of everyone in time of need.
  - type: text
    content: His love never quits.
  - type: text
    content: Thank God, who did it all!
  - type: text
    content: His love never quits!
  '4':
  - type: text
    content: Thank the miracle-working God,
  - type: text
    content: His love never quits.
  - type: text
    content: The God whose skill formed the cosmos,
  - type: text
    content: His love never quits.
  - type: text
    content: The God who laid out earth on ocean foundations,
  - type: text
    content: His love never quits.
  - type: text
    content: The God who filled the skies with light,
  - type: text
    content: His love never quits.
  - type: text
    content: The sun to watch over the day,
  - type: text
    content: His love never quits.
  - type: text
    content: Moon and stars as guardians of the night,
  - type: text
    content: His love never quits.
  - type: text
    content: The God who struck down the Egyptian firstborn,
  - type: text
    content: His love never quits.
  - type: text
    content: And rescued Israel from Egypt’s oppression,
  - type: text
    content: His love never quits.
  - type: text
    content: Took Israel in hand with his powerful hand,
  - type: text
    content: His love never quits.
  - type: text
    content: Split the Red Sea right in half,
  - type: text
    content: His love never quits.
  - type: text
    content: Led Israel right through the middle,
  - type: text
    content: His love never quits.
  - type: text
    content: Dumped Pharaoh and his army in the sea,
  - type: text
    content: His love never quits.
  - type: text
    content: The God who marched his people through the desert,
  - type: text
    content: His love never quits.
  - type: text
    content: Smashed huge kingdoms right and left,
  - type: text
    content: His love never quits.
  - type: text
    content: Struck down the famous kings,
  - type: text
    content: His love never quits.
  - type: text
    content: Struck Sihon the Amorite king,
  - type: text
    content: His love never quits.
  - type: text
    content: Struck Og the Bashanite king,
  - type: text
    content: His love never quits.
  - type: text
    content: Then distributed their land as booty,
  - type: text
    content: His love never quits.
  - type: text
    content: Handed the land over to Israel.
  - type: text
    content: His love never quits.
