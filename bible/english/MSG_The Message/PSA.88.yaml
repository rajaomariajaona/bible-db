document_id: PSA.88,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', you’re my last chance of the day.'
  - type: text
    content: I spend the night on my knees before you.
  - type: text
    content: Put me on your salvation agenda;
  - type: text
    content: take notes on the trouble I’m in.
  - type: text
    content: I’ve had my fill of trouble;
  - type: text
    content: I’m camped on the edge of hell.
  - type: text
    content: I’m written off as a lost cause,
  - type: text
    content: one more statistic, a hopeless case.
  - type: text
    content: Abandoned as already dead,
  - type: text
    content: one more body in a stack of corpses,
  - type: text
    content: And not so much as a gravestone—
  - type: text
    content: I’m a black hole in oblivion.
  - type: text
    content: You’ve dropped me into a bottomless pit,
  - type: text
    content: sunk me in a pitch-black abyss.
  - type: text
    content: I’m battered senseless by your rage,
  - type: text
    content: relentlessly pounded by your waves of anger.
  - type: text
    content: You turned my friends against me,
  - type: text
    content: made me horrible to them.
  - type: text
    content: I’m caught in a maze and can’t find my way out,
  - type: text
    content: blinded by tears of pain and frustration.
  '13':
  - type: text
    content: 'I’m standing my ground, '
  - type: text
    content: God
  - type: text
    content: ', shouting for help,'
  - type: text
    content: at my prayers every morning, on my knees each daybreak.
  - type: text
    content: 'Why, '
  - type: text
    content: God
  - type: text
    content: ', do you turn a deaf ear?'
  - type: text
    content: Why do you make yourself scarce?
  - type: text
    content: For as long as I remember I’ve been hurting;
  - type: text
    content: I’ve taken the worst you can hand out, and I’ve had it.
  - type: text
    content: Your wildfire anger has blazed through my life;
  - type: text
    content: I’m bleeding, black-and-blue.
  - type: text
    content: You’ve attacked me fiercely from every side,
  - type: text
    content: raining down blows till I’m nearly dead.
  - type: text
    content: You made lover and neighbor alike dump me;
  - type: text
    content: the only friend I have left is Darkness.
  '9':
  - type: text
    content: ' I call to you, '
  - type: text
    content: God
  - type: text
    content: ; all day I call.
  - type: text
    content: I wring my hands, I plead for help.
  - type: text
    content: Are the dead a live audience for your miracles?
  - type: text
    content: Do ghosts ever join the choirs that praise you?
  - type: text
    content: Does your love make any difference in a graveyard?
  - type: text
    content: Is your faithful presence noticed in the corridors of hell?
  - type: text
    content: Are your marvelous wonders ever seen in the dark,
  - type: text
    content: your righteous ways noticed in the Land of No Memory?
