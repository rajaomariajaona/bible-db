document_id: PSA.88,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', you’re my last chance of the day.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I spend the night on my knees before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put me on your salvation agenda;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take notes on the trouble I’m in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve had my fill of trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m camped on the edge of hell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m written off as a lost cause,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one more statistic, a hopeless case.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abandoned as already dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one more body in a stack of corpses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And not so much as a gravestone—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m a black hole in oblivion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve dropped me into a bottomless pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sunk me in a pitch-black abyss.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m battered senseless by your rage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: relentlessly pounded by your waves of anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You turned my friends against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made me horrible to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m caught in a maze and can’t find my way out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blinded by tears of pain and frustration.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’m standing my ground, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', shouting for help,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at my prayers every morning, on my knees each daybreak.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', do you turn a deaf ear?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you make yourself scarce?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For as long as I remember I’ve been hurting;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve taken the worst you can hand out, and I’ve had it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wildfire anger has blazed through my life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m bleeding, black-and-blue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve attacked me fiercely from every side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raining down blows till I’m nearly dead.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made lover and neighbor alike dump me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the only friend I have left is Darkness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' I call to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ; all day I call.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wring my hands, I plead for help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are the dead a live audience for your miracles?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do ghosts ever join the choirs that praise you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does your love make any difference in a graveyard?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is your faithful presence noticed in the corridors of hell?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are your marvelous wonders ever seen in the dark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your righteous ways noticed in the Land of No Memory?
