document_id: DEU.30,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'Here’s what will happen. While you’re out among the nations where '
  - type: text
    content: God
  - type: text
    content: ' has dispersed you and the blessings and curses come in just the way I have set them before you, and you and your children take them seriously and come back to '
  - type: text
    content: God
  - type: text
    content: ', your God, and obey him with your whole heart and soul according to everything that I command you today, '
  - type: text
    content: God
  - type: text
    content: ', your God, will restore everything you lost; he’ll have compassion on you; he’ll come back and pick up the pieces from all the places where you were scattered. No matter how far away you end up, '
  - type: text
    content: God
  - type: text
    content: ', your God, will get you out of there and bring you back to the land your ancestors once possessed. It will be yours again. He will give you a good life and make you more numerous than your ancestors.'
  '10':
  - type: text
    content: 'But only if you listen obediently to '
  - type: text
    content: God
  - type: text
    content: ', your God, and keep the commandments and regulations written in this Book of Revelation. Nothing halfhearted here; you must return to '
  - type: text
    content: God
  - type: text
    content: ', your God, totally, heart and soul, holding nothing back.'
  '11':
  - type: text
    content: This commandment that I’m commanding you today isn’t too much for you, it’s not out of your reach. It’s not on a high mountain—you don’t have to get mountaineers to climb the peak and bring it down to your level and explain it before you can live it. And it’s not across the ocean—you don’t have to send sailors out to get it, bring it back, and then explain it before you can live it. No. The word is right here and now—as near as the tongue in your mouth, as near as the heart in your chest. Just do it!
  '15':
  - type: text
    content: 'Look at what I’ve done for you today: I’ve placed in front of you'
  - type: text
    content: Life and Good
  - type: text
    content: Death and Evil.
  '16':
  - type: text
    content: 'And I command you today: Love '
  - type: text
    content: God
  - type: text
    content: ', your God. Walk in his ways. Keep his commandments, regulations, and rules so that you will live, really live, live exuberantly, blessed by '
  - type: text
    content: God
  - type: text
    content: ', your God, in the land you are about to enter and possess.'
  '17':
  - type: text
    content: 'But I warn you: If you have a change of heart, refuse to listen obediently, and willfully go off to serve and worship other gods, you will most certainly die. You won’t last long in the land that you are crossing the Jordan to enter and possess.'
  '19':
  - type: text
    content: 'I call Heaven and Earth to witness against you today: I place before you Life and Death, Blessing and Curse. Choose life so that you and your children will live. And love '
  - type: text
    content: God
  - type: text
    content: ', your God, listening obediently to him, firmly embracing him. Oh yes, he is life itself, a long life settled on the soil that '
  - type: text
    content: God
  - type: text
    content: ', your God, promised to give your ancestors, Abraham, Isaac, and Jacob.'
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', your God, will cut away the thick calluses on your heart and your children’s hearts, freeing you to love '
  - type: text
    content: God
  - type: text
    content: ', your God, with your whole heart and soul and live, really live. '
  - type: text
    content: God
  - type: text
    content: ', your God, will put all these curses on your enemies who hated you and were out to get you.'
  '8':
  - type: text
    content: 'And you will make a new start, listening obediently to '
  - type: text
    content: God
  - type: text
    content: ', keeping all his commandments that I’m commanding you today. '
  - type: text
    content: God
  - type: text
    content: ', your God, will outdo himself in making things go well for you: you’ll have babies, get calves, grow crops, and enjoy an all-around good life. Yes, '
  - type: text
    content: God
  - type: text
    content: ' will start enjoying you again, making things go well for you just as he enjoyed doing it for your ancestors.'
