document_id: DEU.30
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'Here’s what will happen. While you’re out among the nations where '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has dispersed you and the blessings and curses come in just the way I have set them before you, and you and your children take them seriously and come back to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and obey him with your whole heart and soul according to everything that I command you today, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will restore everything you lost; he’ll have compassion on you; he’ll come back and pick up the pieces from all the places where you were scattered. No matter how far away you end up, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will get you out of there and bring you back to the land your ancestors once possessed. It will be yours again. He will give you a good life and make you more numerous than your ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will cut away the thick calluses on your heart and your children’s hearts, freeing you to love '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, with your whole heart and soul and live, really live. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will put all these curses on your enemies who hated you and were out to get you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'And you will make a new start, listening obediently to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', keeping all his commandments that I’m commanding you today. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will outdo himself in making things go well for you: you’ll have babies, get calves, grow crops, and enjoy an all-around good life. Yes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will start enjoying you again, making things go well for you just as he enjoyed doing it for your ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But only if you listen obediently to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, and keep the commandments and regulations written in this Book of Revelation. Nothing halfhearted here; you must return to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, totally, heart and soul, holding nothing back.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-14
  - type: text
    text: This commandment that I’m commanding you today isn’t too much for you, it’s not out of your reach. It’s not on a high mountain—you don’t have to get mountaineers to climb the peak and bring it down to your level and explain it before you can live it. And it’s not across the ocean—you don’t have to send sailors out to get it, bring it back, and then explain it before you can live it. No. The word is right here and now—as near as the tongue in your mouth, as near as the heart in your chest. Just do it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Look at what I’ve done for you today: I’ve placed in front of you'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Life and Good
- type: usfm
  marker: q2
  children:
  - type: text
    text: Death and Evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And I command you today: Love '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Walk in his ways. Keep his commandments, regulations, and rules so that you will live, really live, live exuberantly, blessed by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, in the land you are about to enter and possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'But I warn you: If you have a change of heart, refuse to listen obediently, and willfully go off to serve and worship other gods, you will most certainly die. You won’t last long in the land that you are crossing the Jordan to enter and possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: 'I call Heaven and Earth to witness against you today: I place before you Life and Death, Blessing and Curse. Choose life so that you and your children will live. And love '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, listening obediently to him, firmly embracing him. Oh yes, he is life itself, a long life settled on the soil that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, promised to give your ancestors, Abraham, Isaac, and Jacob.'
