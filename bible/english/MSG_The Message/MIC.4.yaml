verses:
  '1':
  - type: heading
    content: The Making of God’s People
  - type: text
    content: But when all is said and done,
  - type: text
    content: God
  - type: text
    content: ’s Temple on the mountain,
  - type: text
    content: Firmly fixed, will dominate all mountains,
  - type: text
    content: towering above surrounding hills.
  - type: text
    content: People will stream to it
  - type: text
    content: and many nations set out for it,
  - type: text
    content: 'Saying, “Come, let’s climb '
  - type: text
    content: God
  - type: text
    content: ’s mountain.
  - type: text
    content: Let’s go to the Temple of Jacob’s God.
  - type: text
    content: He will teach us how to live.
  - type: text
    content: We’ll know how to live God’s way.”
  - type: text
    content: True teaching will issue from Zion,
  - type: text
    content: God
  - type: text
    content: ’s revelation from Jerusalem.
  - type: text
    content: He’ll establish justice in the rabble of nations
  - type: text
    content: and settle disputes in faraway places.
  - type: text
    content: They’ll trade in their swords for shovels,
  - type: text
    content: their spears for rakes and hoes.
  - type: text
    content: Nations will quit fighting each other,
  - type: text
    content: quit learning how to kill one another.
  - type: text
    content: Each man will sit under his own shade tree,
  - type: text
    content: each woman in safety will tend her own garden.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies says so,
  - type: text
    content: and he means what he says.
  '11':
  - type: text
    content: But for right now, they’re ganged up against you,
  - type: text
    content: many godless peoples, saying,
  - type: text
    content: “Kick her when she’s down! Violate her!
  - type: text
    content: We want to see Zion grovel in the dirt.”
  - type: text
    content: These blasphemers have no idea
  - type: text
    content: 'what '
  - type: text
    content: God
  - type: text
    content: ' is thinking and doing in this.'
  - type: text
    content: 'They don’t know that this is the making of '
  - type: text
    content: God
  - type: text
    content: ’s people,
  - type: text
    content: that they are wheat being threshed, gold being refined.
  '13':
  - type: text
    content: On your feet, Daughter of Zion! Be threshed of chaff,
  - type: text
    content: be refined of dross.
  - type: text
    content: I’m remaking you into a people invincible,
  - type: text
    content: into God’s juggernaut to crush the godless peoples.
  - type: text
    content: 'You’ll bring their plunder as holy offerings to '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: their wealth to the Master of the earth.
  '5':
  - type: text
    content: Meanwhile, all the other people live however they wish,
  - type: text
    content: picking and choosing their gods.
  - type: text
    content: 'But we live honoring '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: and we’re loyal to our God forever and ever.
  '6':
  - type: text
    content: '“On that great day,” '
  - type: text
    content: God
  - type: text
    content: ' says,'
  - type: text
    content: “I will round up all the hurt and homeless,
  - type: text
    content: everyone I have bruised or banished.
  - type: text
    content: I will transform the battered into a company of the elite.
  - type: text
    content: I will make a strong nation out of the long lost,
  - type: text
    content: 'A showcase exhibit of '
  - type: text
    content: God
  - type: text
    content: ’s rule in action,
  - type: text
    content: as I rule from Mount Zion, from here to eternity.
  '8':
  - type: text
    content: “And you stragglers around Jerusalem,
  - type: text
    content: 'eking out a living in shantytowns:'
  - type: text
    content: The glory that once was will be again.
  - type: text
    content: Jerusalem’s daughter will be the kingdom center.”
  - type: text
    content: '* * *'
  '9':
  - type: text
    content: So why the doomsday hysterics?
  - type: text
    content: You still have a king, don’t you?
  - type: text
    content: But maybe he’s not doing his job
  - type: text
    content: and you’re panicked like a woman in labor.
  - type: text
    content: Well, go ahead—twist and scream, Daughter Jerusalem.
  - type: text
    content: 'You '
  - type: text
    content: are
  - type: text
    content: ' like a woman in childbirth.'
  - type: text
    content: You’ll soon be out of the city, on your way
  - type: text
    content: and camping in the open country.
  - type: text
    content: And then you’ll arrive in Babylon.
  - type: text
    content: What you lost in Jerusalem will be found in Babylon.
  - type: text
    content: God
  - type: text
    content: ' will give you new life again.'
  - type: text
    content: He’ll redeem you from your enemies.
