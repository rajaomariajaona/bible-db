document_id: MIC.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Making of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s People
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: But when all is said and done,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Temple on the mountain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Firmly fixed, will dominate all mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: towering above surrounding hills.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will stream to it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and many nations set out for it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Saying, “Come, let’s climb '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s mountain.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let’s go to the Temple of Jacob’s God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will teach us how to live.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We’ll know how to live God’s way.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: True teaching will issue from Zion,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s revelation from Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’ll establish justice in the rabble of nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and settle disputes in faraway places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll trade in their swords for shovels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their spears for rakes and hoes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations will quit fighting each other,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quit learning how to kill one another.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each man will sit under his own shade tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each woman in safety will tend her own garden.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies says so,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he means what he says.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: But for right now, they’re ganged up against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: many godless peoples, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Kick her when she’s down! Violate her!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We want to see Zion grovel in the dirt.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These blasphemers have no idea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is thinking and doing in this.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They don’t know that this is the making of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they are wheat being threshed, gold being refined.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: On your feet, Daughter of Zion! Be threshed of chaff,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be refined of dross.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m remaking you into a people invincible,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into God’s juggernaut to crush the godless peoples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You’ll bring their plunder as holy offerings to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their wealth to the Master of the earth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Meanwhile, all the other people live however they wish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: picking and choosing their gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But we live honoring '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we’re loyal to our God forever and ever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: '“On that great day,” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will round up all the hurt and homeless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone I have bruised or banished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will transform the battered into a company of the elite.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make a strong nation out of the long lost,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A showcase exhibit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s rule in action,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I rule from Mount Zion, from here to eternity.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “And you stragglers around Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'eking out a living in shantytowns:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The glory that once was will be again.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem’s daughter will be the kingdom center.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: So why the doomsday hysterics?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You still have a king, don’t you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But maybe he’s not doing his job
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you’re panicked like a woman in labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well, go ahead—twist and scream, Daughter Jerusalem.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' like a woman in childbirth.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ll soon be out of the city, on your way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and camping in the open country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then you’ll arrive in Babylon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What you lost in Jerusalem will be found in Babylon.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will give you new life again.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’ll redeem you from your enemies.
