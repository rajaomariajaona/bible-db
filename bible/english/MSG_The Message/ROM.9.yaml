type_code: eng
verses:
  '1':
  - type: heading
    content: God Is Calling His People
  - type: text
    content: At the same time, you need to know that I carry with me at all times a huge sorrow. It’s an enormous pain deep within me, and I’m never free of it. I’m not exaggerating—Christ and the Holy Spirit are my witnesses. It’s the Israelites . . . If there were any way I could be cursed by the Messiah so they could be blessed by him, I’d do it in a minute. They’re my family. I grew up with them. They had everything going for them—family, glory, covenants, revelation, worship, promises, to say nothing of being the race that produced the Messiah, the Christ, who is God over everything, always. Oh, yes!
  '10':
  - type: text
    content: 'And that’s not the only time. To Rebecca, also, a promise was made that took priority over genetics. When she became pregnant by our one-of-a-kind ancestor, Isaac, and her babies were still innocent in the womb—incapable of good or bad—she received a special assurance from God. What God did in this case made it perfectly plain that his purpose is not a hit-or-miss thing dependent on what we do or don’t do, but a sure thing determined by his decision, flowing steadily from his initiative. God told Rebecca, “The firstborn of your twins will take second place.” Later that was turned into a stark epigram: “I loved Jacob; I hated Esau.”'
  '14':
  - type: text
    content: Is that grounds for complaining that God is unfair? Not so fast, please. God told Moses, “
  - type: text
    content: I’m
  - type: text
    content: ' in charge of mercy. '
  - type: text
    content: I’m
  - type: text
    content: ' in charge of compassion.” Compassion doesn’t originate in our bleeding hearts or moral sweat, but in God’s mercy. The same point was made when God said to Pharaoh, “I picked you as a bit player in this drama of my salvation power.” All we’re saying is that God has the first word, initiating the action in which we play our part for better or worse.'
  '19':
  - type: text
    content: Are you going to object, “So how can God blame us for anything since he’s in charge of everything? If the big decisions are already made, what say do we have in it?”
  '20':
  - type: text
    content: 'Who in the world do you think you are to second-guess God? Do you for one moment suppose any of us knows enough to call God into question? Clay doesn’t talk back to the fingers that mold it, saying, “Why did you shape me like this?” Isn’t it obvious that a potter has a perfect right to shape one lump of clay into a vase for holding flowers and another into a pot for cooking beans? If God needs one style of pottery especially designed to show his angry displeasure and another style carefully crafted to show his glorious goodness, isn’t that all right? Either or both happens to Jews, but it also happens to the other people. Hosea put it well:'
  - type: text
    content: I’ll call nobodies and make them somebodies;
  - type: text
    content: I’ll call the unloved and make them beloved.
  - type: text
    content: In the place where they yelled out, “You’re nobody!”
  - type: text
    content: they’re calling you “God’s living children.”
  - type: text
    content: 'Isaiah maintained this same emphasis:'
  - type: text
    content: If each grain of sand on the seashore were numbered
  - type: text
    content: and the sum labeled “chosen of God,”
  - type: text
    content: They’d be numbers still, not names;
  - type: text
    content: salvation comes by personal selection.
  - type: text
    content: God doesn’t count us; he calls us by name.
  - type: text
    content: Arithmetic is not his focus.
  - type: text
    content: 'Isaiah had looked ahead and spoken the truth:'
  - type: text
    content: If our powerful God
  - type: text
    content: had not provided us a legacy of living children,
  - type: text
    content: We would have ended up like ghost towns,
  - type: text
    content: like Sodom and Gomorrah.
  - type: text
    content: 'How can we sum this up? All those people who didn’t seem interested in what God was doing actually '
  - type: text
    content: embraced
  - type: text
    content: ' what God was doing as he straightened out their lives. And Israel, who seemed so interested in reading and talking about what God was doing, missed it. How could they miss it? Because instead of trusting God, '
  - type: text
    content: they
  - type: text
    content: ' took over. They were absorbed in what they themselves were doing. They were so absorbed in their “God projects” that they didn’t notice God right in front of them, like a huge rock in the middle of the road. And so they stumbled into him and went sprawling. Isaiah (again!) gives us the metaphor for pulling this together:'
  - type: text
    content: Careful! I’ve put a huge stone on the road to Mount Zion,
  - type: text
    content: a stone you can’t get around.
  - type: text
    content: But the stone is me! If you’re looking for me,
  - type: text
    content: you’ll find me on the way, not in the way.
  '6':
  - type: text
    content: 'Don’t suppose for a moment, though, that God’s Word has malfunctioned in some way or other. The problem goes back a long way. From the outset, not all Israelites of the flesh were Israelites of the spirit. It wasn’t Abraham’s sperm that gave identity here, but God’s '
  - type: text
    content: promise.
  - type: text
    content: ' Remember how it was put: “Your family will be defined by Isaac”? That means that Israelite identity was never racially determined by sexual transmission, but it was '
  - type: text
    content: God
  - type: text
    content: -determined by promise. Remember that promise, “When I come back next year at this time, Sarah will have a son”?
