document_id: NUM.23,97
type_code: eng
verses:
  '1':
  - type: text
    content: Balaam said, “Build me seven altars here, and then prepare seven bulls and seven rams.”
  '11':
  - type: text
    content: Balak said to Balaam, “What’s this? I brought you here to curse my enemies, and all you’ve done is bless them.”
  '12':
  - type: text
    content: 'Balaam answered, “Don’t I have to be careful to say what '
  - type: text
    content: God
  - type: text
    content: ' gives me to say?”'
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: Balak said to him, “Go with me to another place from which you can only see the outskirts of their camp—you won’t be able to see the whole camp. From there, curse them for my sake.”
  '14':
  - type: text
    content: So he took him to Watchmen’s Meadow at the top of Pisgah. He built seven altars there and offered a bull and a ram on each altar.
  '15':
  - type: text
    content: Balaam said to Balak, “Take up your station here beside your Whole-Burnt-Offering while I meet with him over there.”
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' met with Balaam and gave him a message. He said, “Return to Balak and give him the message.”'
  '17':
  - type: text
    content: 'Balaam returned and found him stationed beside his Whole-Burnt-Offering and the nobles of Moab with him. Balak said to him, “What did '
  - type: text
    content: God
  - type: text
    content: ' say?” Then Balaam spoke his message-oracle:'
  - type: text
    content: On your feet, Balak. Listen,
  - type: text
    content: 'listen carefully son of Zippor:'
  - type: text
    content: God is not man, one given to lies,
  - type: text
    content: and not a son of man changing his mind.
  - type: text
    content: Does he speak and not do what he says?
  - type: text
    content: Does he promise and not come through?
  - type: text
    content: I was brought here to bless;
  - type: text
    content: and now he’s blessed—how can I change that?
  - type: text
    content: He has no bone to pick with Jacob,
  - type: text
    content: he sees nothing wrong with Israel.
  - type: text
    content: God
  - type: text
    content: ' is with them,'
  - type: text
    content: and they’re with him, shouting praises to their King.
  - type: text
    content: God brought them out of Egypt,
  - type: text
    content: rampaging like a wild ox.
  - type: text
    content: No magic spells can bind Jacob,
  - type: text
    content: no incantations can hold back Israel.
  - type: text
    content: People will look at Jacob and Israel and say,
  - type: text
    content: “What a great thing has God done!”
  - type: text
    content: Look, a people rising to its feet, stretching like a lion,
  - type: text
    content: a king-of-the-beasts, aroused,
  - type: text
    content: Unsleeping, unresting until its hunt is over
  - type: text
    content: and it’s eaten and drunk its fill.
  '2':
  - type: text
    content: Balak did it. Then Balaam and Balak sacrificed a bull and a ram on each of the altars.
  '25':
  - type: text
    content: Balak said to Balaam, “Well, if you can’t curse them, at least don’t bless them.”
  '26':
  - type: text
    content: 'Balaam replied to Balak, “Didn’t I tell you earlier: ‘All God speaks, and only what he speaks, I speak’?”'
  - type: text
    content: '* * *'
  '27':
  - type: text
    content: Balak said to Balaam, “Please, let me take you to another place; maybe we can find the right place in God’s eyes where you’ll be able to curse them for me.” So Balak took Balaam to the top of Peor, with a vista over the Jeshimon (Wasteland).
  '29':
  - type: text
    content: Balaam said to Balak, “Build seven altars for me here and prepare seven bulls and seven rams for sacrifice.”
  '3':
  - type: text
    content: 'Balaam instructed Balak: “Stand watch here beside your Whole-Burnt-Offering while I go off by myself. Maybe '
  - type: text
    content: God
  - type: text
    content: ' will come and meet with me. Whatever he shows or tells me, I’ll report to you.” Then he went off by himself.'
  '30':
  - type: text
    content: Balak did it and presented an offering of a bull and a ram on each of the altars.
  '4':
  - type: text
    content: God did meet with Balaam. Balaam said, “I’ve set up seven altars and offered a bull and a ram on each altar.”
  '5':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' gave Balaam a message: “Return to Balak and give him this message.”'
  '6':
  - type: text
    content: 'He went back and found him stationed beside his Whole-Burnt-Offering and with him all the nobles of Moab. Then Balaam spoke his message-oracle:'
  - type: text
    content: Balak led me here from Aram,
  - type: text
    content: the king of Moab all the way from the eastern mountains.
  - type: text
    content: “Go, curse Jacob for me;
  - type: text
    content: go, damn Israel.”
  - type: text
    content: How can I curse whom God has not cursed?
  - type: text
    content: 'How can I damn whom '
  - type: text
    content: God
  - type: text
    content: ' has not damned?'
  - type: text
    content: From rock pinnacles I see them,
  - type: text
    content: 'from hilltops I survey them:'
  - type: text
    content: Look! a people camping off by themselves,
  - type: text
    content: thinking themselves outsiders among nations.
  - type: text
    content: But who could ever count the dust of Jacob
  - type: text
    content: or take a census of cloud-of-dust Israel?
  - type: text
    content: I want to die like these right-living people!
  - type: text
    content: I want an end just like theirs!
