document_id: NUM.23,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Balaam said, “Build me seven altars here, and then prepare seven bulls and seven rams.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Balak said to Balaam, “What’s this? I brought you here to curse my enemies, and all you’ve done is bless them.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Balaam answered, “Don’t I have to be careful to say what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gives me to say?”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Balak said to him, “Go with me to another place from which you can only see the outskirts of their camp—you won’t be able to see the whole camp. From there, curse them for my sake.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So he took him to Watchmen’s Meadow at the top of Pisgah. He built seven altars there and offered a bull and a ram on each altar.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Balaam said to Balak, “Take up your station here beside your Whole-Burnt-Offering while I meet with him over there.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' met with Balaam and gave him a message. He said, “Return to Balak and give him the message.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-24
    - type: text
      text: 'Balaam returned and found him stationed beside his Whole-Burnt-Offering and the nobles of Moab with him. Balak said to him, “What did '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' say?” Then Balaam spoke his message-oracle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On your feet, Balak. Listen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'listen carefully son of Zippor:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is not man, one given to lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not a son of man changing his mind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does he speak and not do what he says?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does he promise and not come through?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was brought here to bless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now he’s blessed—how can I change that?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has no bone to pick with Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sees nothing wrong with Israel.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is with them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they’re with him, shouting praises to their King.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God brought them out of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rampaging like a wild ox.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No magic spells can bind Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no incantations can hold back Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will look at Jacob and Israel and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “What a great thing has God done!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, a people rising to its feet, stretching like a lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a king-of-the-beasts, aroused,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Unsleeping, unresting until its hunt is over
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it’s eaten and drunk its fill.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Balak did it. Then Balaam and Balak sacrificed a bull and a ram on each of the altars.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Balak said to Balaam, “Well, if you can’t curse them, at least don’t bless them.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Balaam replied to Balak, “Didn’t I tell you earlier: ‘All God speaks, and only what he speaks, I speak’?”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: Balak said to Balaam, “Please, let me take you to another place; maybe we can find the right place in God’s eyes where you’ll be able to curse them for me.” So Balak took Balaam to the top of Peor, with a vista over the Jeshimon (Wasteland).
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Balaam said to Balak, “Build seven altars for me here and prepare seven bulls and seven rams for sacrifice.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Balaam instructed Balak: “Stand watch here beside your Whole-Burnt-Offering while I go off by myself. Maybe '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will come and meet with me. Whatever he shows or tells me, I’ll report to you.” Then he went off by himself.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Balak did it and presented an offering of a bull and a ram on each of the altars.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: God did meet with Balaam. Balaam said, “I’ve set up seven altars and offered a bull and a ram on each altar.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' gave Balaam a message: “Return to Balak and give him this message.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-10
    - type: text
      text: 'He went back and found him stationed beside his Whole-Burnt-Offering and with him all the nobles of Moab. Then Balaam spoke his message-oracle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Balak led me here from Aram,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the king of Moab all the way from the eastern mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go, curse Jacob for me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: go, damn Israel.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can I curse whom God has not cursed?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How can I damn whom '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has not damned?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From rock pinnacles I see them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from hilltops I survey them:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look! a people camping off by themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thinking themselves outsiders among nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But who could ever count the dust of Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or take a census of cloud-of-dust Israel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I want to die like these right-living people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I want an end just like theirs!
