document_id: COL.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: He Is Your Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'So if you’re serious about living this new resurrection life with Christ, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: act
  - type: text
    text: ' like it. Pursue the things over which Christ presides. Don’t shuffle along, eyes to the ground, absorbed with the things right in front of you. Look up, and be alert to what is going on around Christ—that’s where the action is. See things from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' perspective.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: 'Your old life is dead. Your new life, which is your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: real
  - type: text
    text: ' life—even though invisible to spectators—is with Christ in God. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He
  - type: text
    text: ' is your life. When Christ (your real life, remember) shows up again on this earth, you’ll show up, too—the real you, the glorious you. Meanwhile, be content with obscurity, like Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: 'And that means killing off everything connected with that way of death: sexual promiscuity, impurity, lust, doing whatever you feel like whenever you feel like it, and grabbing whatever attracts your fancy. That’s a life shaped by things and feelings instead of by God. It’s because of this kind of thing that God is about to explode in anger. It wasn’t long ago that you were doing all that stuff and not knowing any better. But you know better now, so make sure it’s all gone for good: bad temper, irritability, meanness, profanity, dirty talk.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-11
  - type: text
    text: Don’t lie to one another. You’re done with that old life. It’s like a filthy set of ill-fitting clothes you’ve stripped off and put in the fire. Now you’re dressed in a new wardrobe. Every item of your new way of life is custom-made by the Creator, with his label on it. All the old fashions are now obsolete. Words like Jewish and non-Jewish, religious and irreligious, insider and outsider, uncivilized and uncouth, slave and free, mean nothing. From now on everyone is defined by Christ, everyone is included in Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: 'So, chosen by God for this new life of love, dress in the wardrobe God picked out for you: compassion, kindness, humility, quiet strength, discipline. Be even-tempered, content with second place, quick to forgive an offense. Forgive as quickly and completely as the Master forgave you. And regardless of what else you put on, wear love. It’s your basic, all-purpose garment. Never be without it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-17
  - type: text
    text: Let the peace of Christ keep you in tune with each other, in step with each other. None of this going off and doing your own thing. And cultivate thankfulness. Let the Word of Christ—the Message—have the run of the house. Give it plenty of room in your lives. Instruct and direct one another using good common sense. And sing, sing your hearts out to God! Let every detail in your lives—words, actions, whatever—be done in the name of the Master, Jesus, thanking God the Father every step of the way.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Wives, understand and support your husbands by submitting to them in ways that honor the Master.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Husbands, go all out in love for your wives. Don’t take advantage of them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Children, do what your parents tell you. This delights the Master no end.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Parents, don’t come down too hard on your children or you’ll crush their spirits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-25
  - type: text
    text: Servants, do what you’re told by your earthly masters. And don’t just do the minimum that will get you by. Do your best. Work from the heart for your real Master, for God, confident that you’ll get paid in full when you come into your inheritance. Keep in mind always that the ultimate Master you’re serving is Christ. The sullen servant who does shoddy work will be held responsible. Being a follower of Jesus doesn’t cover up bad work.
