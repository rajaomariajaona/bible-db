document_id: JOB.34,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu’s Second Speech
  - type: heading
    content: It’s Impossible for God to Do Evil
  - type: text
    content: 'Elihu continued:'
  - type: text
    content: “So, my fine friends—listen to me,
  - type: text
    content: and see what you think of this.
  - type: text
    content: Isn’t it just common sense—
  - type: text
    content: as common as the sense of taste—
  - type: text
    content: To put our heads together
  - type: text
    content: and figure out what’s going on here?
  '10':
  - type: text
    content: “You’re veterans in dealing with these matters;
  - type: text
    content: certainly we’re of one mind on this.
  - type: text
    content: It’s impossible for God to do anything evil;
  - type: text
    content: no way can the Mighty One do wrong.
  - type: text
    content: He makes us pay for exactly what we’ve done—no more, no less.
  - type: text
    content: Our chickens always come home to roost.
  - type: text
    content: It’s impossible for God to do anything wicked,
  - type: text
    content: for the Mighty One to subvert justice.
  - type: text
    content: He’s the one who runs the earth!
  - type: text
    content: He cradles the whole world in his hand!
  - type: text
    content: If he decided to hold his breath,
  - type: text
    content: every man, woman, and child would die for lack of air.
  - type: heading
    content: God Is Working Behind the Scenes
  '16':
  - type: text
    content: “So, Job, use your head;
  - type: text
    content: this is all pretty obvious.
  - type: text
    content: Can someone who hates order, keep order?
  - type: text
    content: Do you dare condemn the righteous, mighty God?
  - type: text
    content: Doesn’t God always tell it like it is,
  - type: text
    content: exposing corrupt rulers as scoundrels and criminals?
  - type: text
    content: Does he play favorites with the rich and famous and slight the poor?
  - type: text
    content: Isn’t he equally responsible to everybody?
  - type: text
    content: Don’t people who deserve it die without notice?
  - type: text
    content: Don’t wicked rulers tumble to their doom?
  - type: text
    content: When the so-called great ones are wiped out,
  - type: text
    content: we know God is working behind the scenes.
  '21':
  - type: text
    content: “He has his eyes on every man and woman.
  - type: text
    content: He doesn’t miss a trick.
  - type: text
    content: There is no night dark enough, no shadow deep enough,
  - type: text
    content: to hide those who do evil.
  - type: text
    content: God doesn’t need to gather any more evidence;
  - type: text
    content: their sin is an open-and-shut case.
  - type: text
    content: He deposes the so-called high and mighty without asking questions,
  - type: text
    content: and replaces them at once with others.
  - type: text
    content: Nobody gets by with anything; overnight,
  - type: text
    content: judgment is signed, sealed, and delivered.
  - type: text
    content: He punishes the wicked for their wickedness
  - type: text
    content: out in the open where everyone can see it,
  - type: text
    content: Because they quit following him,
  - type: text
    content: no longer even thought about him or his ways.
  - type: text
    content: Their apostasy was announced by the cry of the poor;
  - type: text
    content: the cry of the afflicted got God’s attention.
  - type: heading
    content: Because You Refuse to Live on God’s Terms
  '29':
  - type: text
    content: “If God is silent, what’s that to you?
  - type: text
    content: If he turns his face away, what can you do about it?
  - type: text
    content: But whether silent or hidden, he’s there, ruling,
  - type: text
    content: so that those who hate God won’t take over
  - type: text
    content: and ruin people’s lives.
  '31':
  - type: text
    content: “So why don’t you simply confess to God?
  - type: text
    content: Say, ‘I sinned, but I’ll sin no more.
  - type: text
    content: Teach me to see what I still don’t see.
  - type: text
    content: Whatever evil I’ve done, I’ll do it no more.’
  - type: text
    content: Just because you refuse to live on God’s terms,
  - type: text
    content: do you think he should start living on yours?
  - type: text
    content: You choose. I can’t do it for you.
  - type: text
    content: Tell me what you decide.
  '34':
  - type: text
    content: “All right-thinking people say—
  - type: text
    content: and the wise who have listened to me concur—
  - type: text
    content: ‘Job is an ignoramus.
  - type: text
    content: He talks utter nonsense.’
  - type: text
    content: Job, you need to be pushed to the wall and called to account
  - type: text
    content: for wickedly talking back to God the way you have.
  - type: text
    content: You’ve compounded your original sin
  - type: text
    content: by rebelling against God’s discipline,
  - type: text
    content: Defiantly shaking your fist at God,
  - type: text
    content: piling up indictments against the Almighty One.”
  '5':
  - type: text
    content: “We’ve all heard Job say, ‘I’m in the right,
  - type: text
    content: but God won’t give me a fair trial.
  - type: text
    content: When I defend myself, I’m called a liar to my face.
  - type: text
    content: I’ve done nothing wrong, and I get punished anyway.’
  - type: text
    content: Have you ever heard anything to beat this?
  - type: text
    content: Does nothing faze this man Job?
  - type: text
    content: Do you think he’s spent too much time in bad company,
  - type: text
    content: hanging out with the wrong crowd,
  - type: text
    content: 'So that now he’s parroting their line:'
  - type: text
    content: ‘It doesn’t pay to try to please God’?
