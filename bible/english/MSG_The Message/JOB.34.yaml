document_id: JOB.34
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Elihu’s Second Speech
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: It’s Impossible for God to Do Evil
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: 'Elihu continued:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “So, my fine friends—listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see what you think of this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Isn’t it just common sense—
- type: usfm
  marker: q2
  children:
  - type: text
    text: as common as the sense of taste—
- type: usfm
  marker: q1
  children:
  - type: text
    text: To put our heads together
- type: usfm
  marker: q2
  children:
  - type: text
    text: and figure out what’s going on here?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-9
  - type: text
    text: “We’ve all heard Job say, ‘I’m in the right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God won’t give me a fair trial.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I defend myself, I’m called a liar to my face.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve done nothing wrong, and I get punished anyway.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have you ever heard anything to beat this?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does nothing faze this man Job?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think he’s spent too much time in bad company,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hanging out with the wrong crowd,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So that now he’s parroting their line:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘It doesn’t pay to try to please God’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-15
  - type: text
    text: “You’re veterans in dealing with these matters;
- type: usfm
  marker: q2
  children:
  - type: text
    text: certainly we’re of one mind on this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s impossible for God to do anything evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no way can the Mighty One do wrong.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He makes us pay for exactly what we’ve done—no more, no less.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Our chickens always come home to roost.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s impossible for God to do anything wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the Mighty One to subvert justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s the one who runs the earth!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He cradles the whole world in his hand!
- type: usfm
  marker: q1
  children:
  - type: text
    text: If he decided to hold his breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: every man, woman, and child would die for lack of air.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Is Working Behind the Scenes
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-20
  - type: text
    text: “So, Job, use your head;
- type: usfm
  marker: q2
  children:
  - type: text
    text: this is all pretty obvious.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can someone who hates order, keep order?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you dare condemn the righteous, mighty God?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doesn’t God always tell it like it is,
- type: usfm
  marker: q2
  children:
  - type: text
    text: exposing corrupt rulers as scoundrels and criminals?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does he play favorites with the rich and famous and slight the poor?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Isn’t he equally responsible to everybody?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t people who deserve it die without notice?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t wicked rulers tumble to their doom?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the so-called great ones are wiped out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we know God is working behind the scenes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-28
  - type: text
    text: “He has his eyes on every man and woman.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He doesn’t miss a trick.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no night dark enough, no shadow deep enough,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to hide those who do evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God doesn’t need to gather any more evidence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their sin is an open-and-shut case.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He deposes the so-called high and mighty without asking questions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and replaces them at once with others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nobody gets by with anything; overnight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: judgment is signed, sealed, and delivered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He punishes the wicked for their wickedness
- type: usfm
  marker: q2
  children:
  - type: text
    text: out in the open where everyone can see it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because they quit following him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no longer even thought about him or his ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their apostasy was announced by the cry of the poor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cry of the afflicted got God’s attention.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Because You Refuse to Live on God’s Terms
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: “If God is silent, what’s that to you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: If he turns his face away, what can you do about it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But whether silent or hidden, he’s there, ruling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that those who hate God won’t take over
- type: usfm
  marker: q2
  children:
  - type: text
    text: and ruin people’s lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-33
  - type: text
    text: “So why don’t you simply confess to God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Say, ‘I sinned, but I’ll sin no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teach me to see what I still don’t see.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whatever evil I’ve done, I’ll do it no more.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Just because you refuse to live on God’s terms,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do you think he should start living on yours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You choose. I can’t do it for you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell me what you decide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-37
  - type: text
    text: “All right-thinking people say—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wise who have listened to me concur—
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Job is an ignoramus.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He talks utter nonsense.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Job, you need to be pushed to the wall and called to account
- type: usfm
  marker: q2
  children:
  - type: text
    text: for wickedly talking back to God the way you have.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve compounded your original sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: by rebelling against God’s discipline,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Defiantly shaking your fist at God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: piling up indictments against the Almighty One.”
