document_id: JHN.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman at the Well
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: Jesus realized that the Pharisees were keeping count of the baptisms that he and John performed (although his disciples, not Jesus, did the actual baptizing). They had posted the score that Jesus was ahead, turning him and John into rivals in the eyes of the people. So Jesus left the Judean countryside and went back to Galilee.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jesus answered, “If you knew the generosity of God and who I am, you would be asking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' for a drink, and I would give you fresh, living water.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: The woman said, “Sir, you don’t even have a bucket to draw with, and this well is deep. So how are you going to get this ‘living water’? Are you a better man than our ancestor Jacob, who dug this well and drank from it, he and his sons and livestock, and passed it down to us?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-14
    - type: text
      text: Jesus said, “Everyone who drinks this water will get thirsty again and again. Anyone who drinks the water I give will never thirst—not ever. The water I give will be an artesian spring within, gushing fountains of endless life.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The woman said, “Sir, give me this water so I won’t ever get thirsty, won’t ever have to come back to this well again!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He said, “Go call your husband and then come back.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: “I have no husband,” she said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“That’s nicely put: ‘I have no husband.’ You’ve had five husbands, and the man you’re living with now isn’t even your husband. You spoke the truth there, sure enough.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: '“Oh, so you’re a prophet! Well, tell me this: Our ancestors worshiped God at this mountain, but you Jews insist that Jerusalem is the only place for worship, right?”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-23a
    - type: text
      text: ' “Believe me, woman, the time is coming when you Samaritans will worship the Father neither here at this mountain nor there in Jerusalem. You worship guessing in the dark; we Jews worship in the clear light of day. God’s way of salvation is made available through the Jews. But the time is coming—it has, in fact, come—when what you’re called will not matter and where you go to worship will not matter.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23b-24
    - type: text
      text: ' “It’s who you are and the way you live that count before God. Your worship must engage your spirit in the pursuit of truth. That’s the kind of people the Father is out looking for: those who are simply and honestly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: themselves
    - type: text
      text: ' before him in their worship. God is sheer being itself—Spirit. Those who worship him must do it out of their very being, their spirits, their true selves, in adoration.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The woman said, “I don’t know about that. I do know that the Messiah is coming. When he arrives, we’ll get the whole story.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “I am he,” said Jesus. “You don’t have to wait any longer or look any further.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Just then his disciples came back. They were shocked. They couldn’t believe he was talking with that kind of a woman. No one said what they were all thinking, but their faces showed it.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 28-30
    - type: text
      text: The woman took the hint and left. In her confusion she left her water pot. Back in the village she told the people, “Come see a man who knew all about the things I did, who knows me inside and out. Do you think this could be the Messiah?” And they went out to see for themselves.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: It’s Harvest Time
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: In the meantime, the disciples pressed him, “Rabbi, eat. Aren’t you going to eat?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: He told them, “I have food to eat you know nothing about.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The disciples were puzzled. “Who could have brought him food?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 34-35
    - type: text
      text: Jesus said, “The food that keeps me going is that I do the will of the One who sent me, finishing the work he started. As you look around right now, wouldn’t you say that in about four months it will be time to harvest? Well, I’m telling you to open your eyes and take a good look at what’s right in front of you. These Samaritan fields are ripe. It’s harvest time!
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-38
    - type: text
      text: “The Harvester isn’t waiting. He’s taking his pay, gathering in this grain that’s ripe for eternal life. Now the Sower is arm in arm with the Harvester, triumphant. That’s the truth of the saying, ‘This one sows, that one harvests.’ I sent you to harvest a field you never worked. Without lifting a finger, you have walked in on a field worked long and hard by others.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 39-42
    - type: text
      text: 'Many of the Samaritans from that village committed themselves to him because of the woman’s witness: “He knew all about the things I did. He knows me inside and out!” They asked him to stay on, so Jesus stayed two days. A lot more people entrusted their lives to him when they heard what he had to say. They said to the woman, “We’re no longer taking this on your say-so. We’ve heard it for ourselves and know it for sure. He’s the Savior of the world!”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-6
    - type: text
      text: To get there, he had to pass through Samaria. He came into Sychar, a Samaritan village that bordered the field Jacob had given his son Joseph. Jacob’s well was still there. Jesus, worn out by the trip, sat down at the well. It was noon.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 43-45
    - type: text
      text: After the two days he left for Galilee. Now, Jesus knew well from experience that a prophet is not respected in the place where he grew up. So when he arrived in Galilee, the Galileans welcomed him, but only because they were impressed with what he had done in Jerusalem during the Passover Feast, not that they really had a clue about who he was or what he was up to.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 46-48
    - type: text
      text: 'Now he was back in Cana of Galilee, the place where he made the water into wine. Meanwhile in Capernaum, there was a certain official from the king’s court whose son was sick. When he heard that Jesus had come from Judea to Galilee, he went and asked that he come down and heal his son, who was on the brink of death. Jesus put him off: “Unless you people are dazzled by a miracle, you refuse to believe.”'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: But the court official wouldn’t be put off. “Come down! It’s life or death for my son.”
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 50-51
    - type: text
      text: Jesus simply replied, “Go home. Your son lives.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man believed the bare word Jesus spoke and headed home. On his way back, his servants intercepted him and announced, “Your son lives!”
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 52-53a
    - type: text
      text: ' He asked them what time he began to get better. They said, “The fever broke yesterday afternoon at one o’clock.” The father knew that that was the very moment Jesus had said, “Your son lives.”'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 53b-54
    - type: text
      text: ' That settled it. Not only he but his entire household believed. This was now the second sign Jesus gave after having come from Judea into Galilee.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: A woman, a Samaritan, came to draw water. Jesus said, “Would you give me a drink of water?” (His disciples had gone to the village to buy food for lunch.)
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The Samaritan woman, taken aback, asked, “How come you, a Jew, are asking me, a Samaritan woman, for a drink?” (Jews in those days wouldn’t be caught dead talking to Samaritans.)
