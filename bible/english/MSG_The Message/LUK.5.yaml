document_id: LUK.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Push Out into Deep Water
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Once when he was standing on the shore of Lake Gennesaret, the crowd was pushing in on him to better hear the Word of God. He noticed two boats tied up. The fishermen had just left them and were out scrubbing their nets. He climbed into the boat that was Simon’s and asked him to put out a little from the shore. Sitting there, using the boat for a pulpit, he taught the crowd.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When he finished teaching, he said to Simon, “Push out into deep water and let your nets out for a catch.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: Simon said, “Master, we’ve been fishing hard all night and haven’t caught even a minnow. But if you say so, I’ll let out the nets.” It was no sooner said than done—a huge haul of fish, straining the nets past capacity. They waved to their partners in the other boat to come help them. They filled both boats, nearly swamping them with the catch.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10a
  - type: text
    text: ' Simon Peter, when he saw it, fell to his knees before Jesus. “Master, leave. I’m a sinner and can’t handle this holiness. Leave me to myself.” When they pulled in that catch of fish, awe overwhelmed Simon and everyone with him. It was the same with James and John, Zebedee’s sons, coworkers with Simon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10b-11
  - type: text
    text: ' Jesus said to Simon, “There is nothing to fear. From now on you’ll be fishing for men and women.” They pulled their boats up on the beach, left them, nets and all, and followed him.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Invitation to a Changed Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: One day in one of the villages there was a man covered with leprosy. When he saw Jesus he fell down before him in prayer and said, “If you want to, you can cleanse me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jesus put out his hand, touched him, and said, “I want to. Be clean.” Then and there his skin was smooth, the leprosy gone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: Jesus instructed him, “Don’t talk about this all over town. Just quietly present your healed self to the priest, along with the offering ordered by Moses. Your cleansed and obedient life, not your words, will bear witness to what I have done.” But the man couldn’t keep it to himself, and the word got out. Soon a large crowd of people had gathered to listen and be healed of their sicknesses. As often as possible Jesus withdrew to out-of-the-way places for prayer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: One day as he was teaching, Pharisees and religion teachers were sitting around. They had come from nearly every village in Galilee and Judea, even as far away as Jerusalem, to be there. The healing power of God was on him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-20
  - type: text
    text: Some men arrived carrying a paraplegic on a stretcher. They were looking for a way to get into the house and set him before Jesus. When they couldn’t find a way in because of the crowd, they went up on the roof, removed some tiles, and let him down in the middle of everyone, right in front of Jesus. Impressed by their bold belief, he said, “Friend, I forgive your sins.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: That set the religion scholars and Pharisees buzzing. “Who does he think he is? That’s blasphemous talk! God and only God can forgive sins.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-26
  - type: text
    text: 'Jesus knew exactly what they were thinking and said, “Why all this gossipy whispering? Which is simpler: to say ‘I forgive your sins,’ or to say ‘Get up and start walking’? Well, just so it’s clear that I’m the Son of Man and authorized to do either, or both. . . .” He now spoke directly to the paraplegic: “Get up. Take your bedroll and go home.” Without a moment’s hesitation, he did it—got up, took his blanket, and left for home, giving glory to God all the way. The people rubbed their eyes, stunned—and then also gave glory to God. Awestruck, they said, “We’ve never seen anything like that!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: After this he went out and saw a man named Levi at his work collecting taxes. Jesus said, “Come along with me.” And he did—walked away from everything and went with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: Levi gave a large dinner at his home for Jesus. Everybody was there, tax men and other disreputable characters as guests at the dinner. The Pharisees and their religion scholars came to his disciples greatly offended. “What is he doing eating and drinking with misfits and ‘sinners’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: 'Jesus heard about it and spoke up, “Who needs a doctor: the healthy or the sick? I’m here inviting outsiders, not insiders—an invitation to a changed life, changed inside and out.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: They asked him, “John’s disciples are well-known for keeping fasts and saying prayers. Also the Pharisees. But you seem to spend most of your time at parties. Why?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: Jesus said, “When you’re celebrating a wedding, you don’t skimp on the cake and wine. You feast. Later you may need to exercise moderation, but this isn’t the time. As long as the bride and groom are with you, you have a good time. When the groom is gone, the fasting can begin. No one throws cold water on a friendly bonfire. This is Kingdom Come!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-39
  - type: text
    text: “No one cuts up a fine silk scarf to patch old work clothes; you want fabrics that match. And you don’t put wine in old, cracked bottles; you get strong, clean bottles for your fresh vintage wine. And no one who has ever tasted fine aged wine prefers unaged wine.”
