document_id: PSA.87,97
type_code: eng
verses:
  '1':
  - type: text
    content: He founded Zion on the Holy Mountain—
  - type: text
    content: 'and oh, how '
  - type: text
    content: 'God '
  - type: text
    content: loves his home!
  - type: text
    content: Loves it far better than all
  - type: text
    content: the homes of Jacob put together!
  - type: text
    content: God’s hometown—oh!
  - type: text
    content: everyone there is talking about you!
  '4':
  - type: text
    content: 'I name them off, those among whom I’m famous:'
  - type: text
    content: Egypt and Babylon,
  - type: text
    content: also Philistia,
  - type: text
    content: even Tyre, along with Cush.
  - type: text
    content: 'Word’s getting around; they point them out:'
  - type: text
    content: “This one was born again here!”
  '5':
  - type: text
    content: 'The word’s getting out on Zion:'
  - type: text
    content: “Men and women, right and left,
  - type: text
    content: get born again in her!”
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' registers their names in his book:'
  - type: text
    content: “This one, this one, and this one—
  - type: text
    content: born again, right here.”
  '7':
  - type: text
    content: 'Singers and dancers give credit to Zion:'
  - type: text
    content: “All my springs are in you!”
