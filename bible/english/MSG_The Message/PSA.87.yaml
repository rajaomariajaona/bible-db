      text: 1-3
  - type: text
    text: He founded Zion on the Holy Mountain—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and oh, how '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: 'God '
  - type: text
    text: loves his home!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loves it far better than all
- type: usfm
  marker: q2
  children:
  - type: text
    text: the homes of Jacob put together!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God’s hometown—oh!
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone there is talking about you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I name them off, those among whom I’m famous:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Egypt and Babylon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: also Philistia,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even Tyre, along with Cush.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Word’s getting around; they point them out:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “This one was born again here!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The word’s getting out on Zion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Men and women, right and left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: get born again in her!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' registers their names in his book:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “This one, this one, and this one—
- type: usfm
  marker: q2
  children:
  - type: text
    text: born again, right here.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Singers and dancers give credit to Zion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “All my springs are in you!”
