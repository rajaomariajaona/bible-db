document_id: PSA.87,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He founded Zion on the Holy Mountain—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and oh, how '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: 'God '
    - type: text
      text: loves his home!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loves it far better than all
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the homes of Jacob put together!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s hometown—oh!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone there is talking about you!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I name them off, those among whom I’m famous:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Egypt and Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: also Philistia,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even Tyre, along with Cush.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Word’s getting around; they point them out:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “This one was born again here!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The word’s getting out on Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Men and women, right and left,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get born again in her!”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' registers their names in his book:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “This one, this one, and this one—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: born again, right here.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Singers and dancers give credit to Zion:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “All my springs are in you!”
