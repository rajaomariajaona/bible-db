document_id: PSA.149,97
type_code: eng
verses:
  '1':
  - type: text
    content: Hallelujah!
  - type: text
    content: 'Sing to '
  - type: text
    content: God
  - type: text
    content: ' a brand-new song,'
  - type: text
    content: praise him in the company of all who love him.
  - type: text
    content: Let all Israel celebrate their Sovereign Creator,
  - type: text
    content: Zion’s children exult in their King.
  - type: text
    content: Let them praise his name in dance;
  - type: text
    content: strike up the band and make great music!
  - type: text
    content: 'And why? Because '
  - type: text
    content: God
  - type: text
    content: ' delights in his people,'
  - type: text
    content: adorns plain folk with salvation garlands!
  '5':
  - type: text
    content: Let true lovers break out in praise,
  - type: text
    content: sing out from wherever they’re sitting,
  - type: text
    content: Shout the high praises of God,
  - type: text
    content: brandish their swords in the wild sword-dance—
  - type: text
    content: A portent of vengeance on the God-defying nations,
  - type: text
    content: a signal that punishment’s coming,
  - type: text
    content: Their kings chained and hauled off to jail,
  - type: text
    content: their leaders behind bars for good,
  - type: text
    content: The judgment on them carried out to the letter
  - type: text
    content: —and all who love God in the seat of honor!
  - type: text
    content: Hallelujah!
