  children:
  - type: text
    text: 'Sing to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' a brand-new song,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: praise him in the company of all who love him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all Israel celebrate their Sovereign Creator,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Zion’s children exult in their King.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them praise his name in dance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: strike up the band and make great music!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And why? Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' delights in his people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: adorns plain folk with salvation garlands!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-9
  - type: text
    text: Let true lovers break out in praise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sing out from wherever they’re sitting,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shout the high praises of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: brandish their swords in the wild sword-dance—
- type: usfm
  marker: q1
  children:
  - type: text
    text: A portent of vengeance on the God-defying nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a signal that punishment’s coming,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their kings chained and hauled off to jail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their leaders behind bars for good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: The judgment on them carried out to the letter
- type: usfm
  marker: q2
  children:
  - type: text
    text: —and all who love God in the seat of honor!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah!
