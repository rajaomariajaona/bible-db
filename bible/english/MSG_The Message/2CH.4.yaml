document_id: 2CH.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Temple Furnishings
  - type: text
    content: He made the Bronze Altar thirty feet long, thirty feet wide, and ten feet high.
  '10':
  - type: text
    content: He placed the Sea on the right side of The Temple at the southeast corner.
  '11':
  - type: text
    content: ' He also made ash buckets, shovels, and bowls.'
  - type: text
    content: 'And that about wrapped it up: Huram completed the work he had contracted to do for King Solomon:'
  - type: text
    content: two pillars;
  - type: text
    content: two bowl-shaped capitals for the tops of the pillars;
  - type: text
    content: two decorative filigrees for the capitals;
  - type: text
    content: four hundred pomegranates for the filigrees (a double row of pomegranates for each filigree);
  - type: text
    content: ten washstands with their basins;
  - type: text
    content: one Sea and the twelve bulls under it;
  - type: text
    content: miscellaneous buckets, forks, shovels, and bowls.
  '16':
  - type: text
    content: ' All these artifacts that Huram-Abi made for King Solomon for The Temple of '
  - type: text
    content: God
  - type: text
    content: ' were made of burnished bronze. The king had them cast in clay in a foundry on the Jordan plain between Succoth and Zarethan. These artifacts were never weighed—there were far too many! Nobody has any idea how much bronze was used.'
  '19':
  - type: text
    content: 'Solomon was also responsible for the furniture and accessories in The Temple of God:'
  - type: text
    content: the gold Altar;
  - type: text
    content: the tables that held the Bread of the Presence;
  - type: text
    content: the Lampstands of pure gold with their lamps, to be lighted before the Inner Sanctuary, the Holy of Holies;
  - type: text
    content: the gold flowers, lamps, and tongs (all solid gold);
  - type: text
    content: the gold wick trimmers, bowls, ladles, and censers;
  - type: text
    content: the gold doors of The Temple, doors to the Holy of Holies, and the doors to the main sanctuary.
  '2':
  - type: text
    content: He made a Sea—an immense round basin of cast metal fifteen feet in diameter, seven and a half feet high, and forty-five feet in circumference. Just under the rim, there were two parallel bands of something like bulls, ten to each foot and a half. The figures were cast in one piece with the Sea. The Sea was set on twelve bulls, three facing north, three facing west, three facing south, and three facing east. All the bulls faced outward and supported the Sea on their hindquarters. The Sea was three inches thick and flared at the rim like a cup, or a lily. It held about 18,000 gallons.
  '6':
  - type: text
    content: He made ten Washbasins, five set on the right and five on the left, for rinsing the things used for the Whole-Burnt-Offerings. The priests washed themselves in the Sea.
  '7':
  - type: text
    content: He made ten gold Lampstands, following the specified pattern, and placed five on the right and five on the left.
  '8':
  - type: text
    content: He made ten tables and set five on the right and five on the left. He also made a hundred gold bowls.
  '9':
  - type: text
    content: He built a Courtyard especially for the priests and then the great court and doors for the court. The doors were covered with bronze.
