document_id: 2CH.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Temple Furnishings
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: He made the Bronze Altar thirty feet long, thirty feet wide, and ten feet high.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He placed the Sea on the right side of The Temple at the southeast corner.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' He also made ash buckets, shovels, and bowls.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And that about wrapped it up: Huram completed the work he had contracted to do for King Solomon:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: two pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: two bowl-shaped capitals for the tops of the pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: two decorative filigrees for the capitals;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: four hundred pomegranates for the filigrees (a double row of pomegranates for each filigree);
  - type: usfm
    marker: li1
    children:
    - type: text
      text: ten washstands with their basins;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: one Sea and the twelve bulls under it;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: miscellaneous buckets, forks, shovels, and bowls.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' All these artifacts that Huram-Abi made for King Solomon for The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' were made of burnished bronze. The king had them cast in clay in a foundry on the Jordan plain between Succoth and Zarethan. These artifacts were never weighed—there were far too many! Nobody has any idea how much bronze was used.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon was also responsible for the furniture and accessories in The Temple of God:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold Altar;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the tables that held the Bread of the Presence;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Lampstands of pure gold with their lamps, to be lighted before the Inner Sanctuary, the Holy of Holies;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold flowers, lamps, and tongs (all solid gold);
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold wick trimmers, bowls, ladles, and censers;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold doors of The Temple, doors to the Holy of Holies, and the doors to the main sanctuary.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made a Sea—an immense round basin of cast metal fifteen feet in diameter, seven and a half feet high, and forty-five feet in circumference. Just under the rim, there were two parallel bands of something like bulls, ten to each foot and a half. The figures were cast in one piece with the Sea. The Sea was set on twelve bulls, three facing north, three facing west, three facing south, and three facing east. All the bulls faced outward and supported the Sea on their hindquarters. The Sea was three inches thick and flared at the rim like a cup, or a lily. It held about 18,000 gallons.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made ten Washbasins, five set on the right and five on the left, for rinsing the things used for the Whole-Burnt-Offerings. The priests washed themselves in the Sea.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made ten gold Lampstands, following the specified pattern, and placed five on the right and five on the left.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made ten tables and set five on the right and five on the left. He also made a hundred gold bowls.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He built a Courtyard especially for the priests and then the great court and doors for the court. The doors were covered with bronze.
