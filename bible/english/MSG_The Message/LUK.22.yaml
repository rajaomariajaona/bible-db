document_id: LUK.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Passover Meal
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: The Feast of Unleavened Bread, also called Passover, drew near. The high priests and religion scholars were looking for a way to do away with Jesus but, fearful of the people, they were also looking for a way to cover their tracks.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: That’s when Satan entered Judas, the one called Iscariot. He was one of the Twelve. Leaving the others, he conferred with the high priests and the Temple guards about how he might betray Jesus to them. They couldn’t believe their good luck and agreed to pay him well. He gave them his word and started looking for a way to betray Jesus, but out of sight of the crowd.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: The Day of Unleavened Bread came, the day the Passover lamb was butchered. Jesus sent Peter and John off, saying, “Go prepare the Passover for us so we can eat it together.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They said, “Where do you want us to do this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: 'He said, “Keep your eyes open as you enter the city. A man carrying a water jug will meet you. Follow him home. Then speak with the owner of the house: The Teacher wants to know, ‘Where is the guest room where I can eat the Passover meal with my disciples?’ He will show you a spacious second-story room, swept and ready. Prepare the meal there.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They left, found everything just as he told them, and prepared the Passover meal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: When it was time, he sat down, all the apostles with him, and said, “You’ve no idea how much I have looked forward to eating this Passover meal with you before I enter my time of suffering. It’s the last one I’ll eat until we all eat it together in the kingdom of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Taking the cup, he blessed it, then said, “Take this and pass it among you. As for me, I’ll not drink wine again until the kingdom of God arrives.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Taking bread, he blessed it, broke it, and gave it to them, saying, “This is my body, given for you. Eat it in my memory.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He did the same with the cup after supper, saying, “This cup is the new covenant written in my blood, blood poured out for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: “Do you realize that the hand of the one who is betraying me is at this moment on this table? It’s true that the Son of Man is going down a path already marked out—no surprises there. But for the one who turns him in, turns traitor to the Son of Man, this is doomsday.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They immediately became suspicious of each other and began quizzing one another, wondering who might be about to do this.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Get Ready for Trouble
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-26
  - type: text
    text: 'Within minutes they were bickering over who of them would end up the greatest. But Jesus intervened: “Kings like to throw their weight around and people in authority like to give themselves fancy titles. It’s not going to be that way with you. Let the senior among you become like the junior; let the leader act the part of the servant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-30
  - type: text
    text: '“Who would you rather be: the one who eats the dinner or the one who serves the dinner? You’d rather eat and be served, right? But I’ve taken my place among you as the one who serves. And you’ve stuck with me through thick and thin. Now I confer on you the royal authority my Father conferred on me so you can eat and drink at my table in my kingdom and be strengthened as you take up responsibilities among the congregations of God’s people.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 31-32
  - type: text
    text: “Simon, stay on your toes. Satan has tried his best to separate all of you from me, like chaff from wheat. Simon, I’ve prayed for you in particular that you not give in or give out. When you have come through the time of testing, turn to your companions and give them a fresh start.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Peter said, “Master, I’m ready for anything with you. I’d go to jail for you. I’d '
  - type: usfm
    marker: it
    children:
    - type: text
      text: die
  - type: text
    text: ' for you!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Jesus said, “I’m sorry to have to tell you this, Peter, but before the rooster crows you will have three times denied that you know me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then Jesus said, “When I sent you out and told you to travel light, to take only the bare necessities, did you get along all right?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Certainly,” they said, “we got along just fine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: text
    text: He said, “This is different. Get ready for trouble. Look to what you’ll need; there are difficult times ahead. Pawn your coat and get a sword. What was written in Scripture, ‘He was lumped in with the criminals,’ gets its final meaning in me. Everything written about me is now coming to a conclusion.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: They said, “Look, Master, two swords!”
- type: usfm
  marker: p
  children:
  - type: text
    text: But he said, “Enough of that; no more sword talk!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Dark Night
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: Leaving there, he went, as he so often did, to Mount Olives. The disciples followed him. When they arrived at the place, he said, “Pray that you don’t give in to temptation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-44
  - type: text
    text: 'He pulled away from them about a stone’s throw, knelt down, and prayed, “Father, remove this cup from me. But please, not what I want. What do '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' want?” At once an angel from heaven was at his side, strengthening him. He prayed on all the harder. Sweat, wrung from him like drops of blood, poured off his face.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 45-46
  - type: text
    text: He got up from prayer, went back to the disciples and found them asleep, drugged by grief. He said, “What business do you have sleeping? Get up. Pray so you won’t give in to temptation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 47-48
  - type: text
    text: No sooner were the words out of his mouth than a crowd showed up, Judas, the one from the Twelve, in the lead. He came right up to Jesus to kiss him. Jesus said, “Judas, you would betray the Son of Man with a kiss?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 49-50
  - type: text
    text: When those with him saw what was happening, they said, “Master, shall we fight?” One of them took a swing at the Chief Priest’s servant and cut off his right ear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Jesus said, “Let them be. Even in this.” Then, touching the servant’s ear, he healed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 52-53
  - type: text
    text: 'Jesus spoke to those who had come—high priests, Temple police, religion leaders: “What is this, jumping me with swords and clubs as if I were a dangerous criminal? Day after day I’ve been with you in the Temple and you’ve not so much as lifted a hand against me. But do it your way—it’s a dark night, a dark hour.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Rooster Crowed
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 54-56
  - type: text
    text: Arresting Jesus, they marched him off and took him into the house of the Chief Priest. Peter followed, but at a safe distance. In the middle of the courtyard some people had started a fire and were sitting around it, trying to keep warm. One of the serving maids sitting at the fire noticed him, then took a second look and said, “This man was with him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: He denied it, “Woman, I don’t even know him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: A short time later, someone else noticed him and said, “You’re one of them.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But Peter denied it: “Man, I am not.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'About an hour later, someone else spoke up, really adamant: “He’s got to have been with him! He’s got ‘Galilean’ written all over him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 60-62
  - type: text
    text: 'Peter said, “Man, I don’t know what you’re talking about.” At that very moment, the last word hardly off his lips, a rooster crowed. Just then, the Master turned and looked at Peter. Peter remembered what the Master had said to him: “Before the rooster crows, you will deny me three times.” He went out and cried and cried and cried.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Slapping Him Around
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 63-65
  - type: text
    text: The men in charge of Jesus began poking fun at him, slapping him around. They put a blindfold on him and taunted, “Who hit you that time?” They were having a grand time with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 66-67a
  - type: text
    text: ' When it was morning, the religious leaders of the people and the high priests and scholars all got together and brought him before their High Council. They said, “Are you the Messiah?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 67b-69
  - type: text
    text: ' He answered, “If I said yes, you wouldn’t believe me. If I asked what you meant by your question, you wouldn’t answer me. So here’s what I have to say: From here on the Son of Man takes his place at God’s right hand, the place of power.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: They all said, “So you admit your claim to be the Son of God?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “You’re the ones who keep saying it,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: But they had made up their minds, “Why do we need any more evidence? We’ve all heard him as good as say it himself.”
