document_id: EZK.30,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Egypt on Fire
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', the Master, spoke to me: “Son of man, preach. Give them the Message of '
  - type: text
    content: God
  - type: text
    content: ', the Master. Wail:'
  - type: text
    content: “‘Doomsday!’
  - type: text
    content: Time’s up!
  - type: text
    content: God
  - type: text
    content: ’s big day of judgment is near.
  - type: text
    content: Thick clouds are rolling in.
  - type: text
    content: It’s doomsday for the nations.
  - type: text
    content: Death will rain down on Egypt.
  - type: text
    content: Terror will paralyze Ethiopia
  - type: text
    content: When they see the Egyptians killed,
  - type: text
    content: their wealth hauled off,
  - type: text
    content: their foundations demolished,
  - type: text
    content: And Ethiopia, Put, Lud, Arabia, Libya
  - type: text
    content: —all of Egypt’s old allies—
  - type: text
    content: killed right along with them.
  '10':
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘I’ll put a stop to Egypt’s arrogance.
  - type: text
    content: I’ll use Nebuchadnezzar king of Babylon to do it.
  - type: text
    content: He and his army, the most brutal of nations,
  - type: text
    content: shall be used to destroy the country.
  - type: text
    content: They’ll brandish their swords
  - type: text
    content: and fill Egypt with corpses.
  - type: text
    content: I’ll dry up the Nile
  - type: text
    content: and sell off the land to a bunch of crooks.
  - type: text
    content: I’ll hire outsiders to come in
  - type: text
    content: and waste the country, strip it clean.
  - type: text
    content: 'I, '
  - type: text
    content: God
  - type: text
    content: ', have said so.'
  '13':
  - type: text
    content: '“‘And now this is what '
  - type: text
    content: God
  - type: text
    content: ', the Master, says:'
  - type: text
    content: “‘I’ll smash all the no-god idols;
  - type: text
    content: I’ll topple all those huge statues in Memphis.
  - type: text
    content: The prince of Egypt will be gone for good,
  - type: text
    content: 'and in his place I’ll put '
  - type: text
    content: fear
  - type: text
    content: —fear throughout Egypt!
  - type: text
    content: I’ll demolish Pathros,
  - type: text
    content: burn Zoan to the ground, and punish Thebes,
  - type: text
    content: Pour my wrath on Pelusium, Egypt’s fort,
  - type: text
    content: and knock Thebes off its proud pedestal.
  - type: text
    content: 'I’ll set Egypt on fire:'
  - type: text
    content: Pelusium will writhe in pain,
  - type: text
    content: Thebes blown away,
  - type: text
    content: Memphis raped.
  - type: text
    content: The young warriors of On and Pi-beseth
  - type: text
    content: will be killed and the cities exiled.
  - type: text
    content: A dark day for Tahpanhes
  - type: text
    content: when I shatter Egypt,
  - type: text
    content: When I break Egyptian power
  - type: text
    content: and put an end to her arrogant oppression!
  - type: text
    content: She’ll disappear in a cloud of dust,
  - type: text
    content: her cities hauled off as exiles.
  - type: text
    content: That’s how I’ll punish Egypt,
  - type: text
    content: 'and that’s how she’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: .’”
  - type: text
    content: '* * *'
  '20':
  - type: text
    content: 'In the eleventh year, on the seventh day of the first month, '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me:'
  '21':
  - type: text
    content: “Son of man, I’ve broken the arm of Pharaoh king of Egypt. And look! It hasn’t been set. No splint has been put on it so the bones can knit and heal, so he can use a sword again.
  '22':
  - type: text
    content: '“Therefore, '
  - type: text
    content: God
  - type: text
    content: ', the Master, says, I am dead set against Pharaoh king of Egypt and will go ahead and break his other arm—both arms broken! There’s no way he’ll ever swing a sword again. I’ll scatter Egyptians all over the world. I’ll make the arms of the king of Babylon strong and put my sword in his hand, but I’ll break the arms of Pharaoh and he’ll groan like one who is mortally wounded. I’ll make the arms of the king of Babylon strong, but the arms of Pharaoh shall go limp. The Egyptians will realize that I am '
  - type: text
    content: God
  - type: text
    content: ' when I place my sword in the hand of the king of Babylon. He’ll wield it against Egypt and I’ll scatter Egyptians all over the world. Then they’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: .”
  '6':
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ' says:'
  - type: text
    content: “‘Egypt’s allies will fall
  - type: text
    content: and her proud strength will collapse—
  - type: text
    content: From Migdol in the north to Syene in the south,
  - type: text
    content: a great slaughter in Egypt!
  - type: text
    content: 'Decree of '
  - type: text
    content: God
  - type: text
    content: ', the Master.'
  - type: text
    content: Egypt, most desolate of the desolate,
  - type: text
    content: her cities wasted beyond wasting,
  - type: text
    content: 'Will realize that I am '
  - type: text
    content: God
  - type: text
    content: when I burn her down
  - type: text
    content: and her helpers are knocked flat.
  '9':
  - type: text
    content: “‘When that happens, I’ll send out messengers by ship to sound the alarm among the easygoing Ethiopians. They’ll be terrorized. Egypt’s doomed! Judgment’s coming!
