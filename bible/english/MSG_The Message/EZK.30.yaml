document_id: EZK.30,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Egypt on Fire
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, spoke to me: “Son of man, preach. Give them the Message of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master. Wail:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Doomsday!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Time’s up!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s big day of judgment is near.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thick clouds are rolling in.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s doomsday for the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Death will rain down on Egypt.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Terror will paralyze Ethiopia
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they see the Egyptians killed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their wealth hauled off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their foundations demolished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Ethiopia, Put, Lud, Arabia, Libya
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —all of Egypt’s old allies—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: killed right along with them.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘I’ll put a stop to Egypt’s arrogance.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll use Nebuchadnezzar king of Babylon to do it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He and his army, the most brutal of nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shall be used to destroy the country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll brandish their swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill Egypt with corpses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll dry up the Nile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sell off the land to a bunch of crooks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll hire outsiders to come in
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and waste the country, strip it clean.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', have said so.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“‘And now this is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘I’ll smash all the no-god idols;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll topple all those huge statues in Memphis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prince of Egypt will be gone for good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and in his place I’ll put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fear
    - type: text
      text: —fear throughout Egypt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll demolish Pathros,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burn Zoan to the ground, and punish Thebes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour my wrath on Pelusium, Egypt’s fort,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and knock Thebes off its proud pedestal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ll set Egypt on fire:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pelusium will writhe in pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thebes blown away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Memphis raped.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young warriors of On and Pi-beseth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be killed and the cities exiled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A dark day for Tahpanhes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I shatter Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I break Egyptian power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put an end to her arrogant oppression!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’ll disappear in a cloud of dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her cities hauled off as exiles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s how I’ll punish Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and that’s how she’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eleventh year, on the seventh day of the first month, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me:'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Son of man, I’ve broken the arm of Pharaoh king of Egypt. And look! It hasn’t been set. No splint has been put on it so the bones can knit and heal, so he can use a sword again.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, says, I am dead set against Pharaoh king of Egypt and will go ahead and break his other arm—both arms broken! There’s no way he’ll ever swing a sword again. I’ll scatter Egyptians all over the world. I’ll make the arms of the king of Babylon strong and put my sword in his hand, but I’ll break the arms of Pharaoh and he’ll groan like one who is mortally wounded. I’ll make the arms of the king of Babylon strong, but the arms of Pharaoh shall go limp. The Egyptians will realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' when I place my sword in the hand of the king of Babylon. He’ll wield it against Egypt and I’ll scatter Egyptians all over the world. Then they’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Egypt’s allies will fall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her proud strength will collapse—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Migdol in the north to Syene in the south,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a great slaughter in Egypt!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Decree of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt, most desolate of the desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her cities wasted beyond wasting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I burn her down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her helpers are knocked flat.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “‘When that happens, I’ll send out messengers by ship to sound the alarm among the easygoing Ethiopians. They’ll be terrorized. Egypt’s doomed! Judgment’s coming!
