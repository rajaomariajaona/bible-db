document_id: PSA.31,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I run to you, '
  - type: text
    content: God
  - type: text
    content: ; I run for dear life.
  - type: text
    content: Don’t let me down!
  - type: text
    content: Take me seriously this time!
  - type: text
    content: Get down on my level and listen,
  - type: text
    content: and please—no procrastination!
  - type: text
    content: Your granite cave a hiding place,
  - type: text
    content: your high cliff nest a place of safety.
  '14':
  - type: text
    content: 'Desperate, I throw myself on you:'
  - type: text
    content: you
  - type: text
    content: ' are my God!'
  - type: text
    content: Hour by hour I place my days in your hand,
  - type: text
    content: safe from the hands out to get me.
  - type: text
    content: Warm me, your servant, with a smile;
  - type: text
    content: save me because you love me.
  - type: text
    content: Don’t embarrass me by not showing up;
  - type: text
    content: I’ve given you plenty of notice.
  - type: text
    content: Embarrass the wicked, stand them up,
  - type: text
    content: leave them stupidly shaking their heads
  - type: text
    content: as they drift down to hell.
  - type: text
    content: Gag those loudmouthed liars
  - type: text
    content: who heckle me, your follower,
  - type: text
    content: with jeers and catcalls.
  '19':
  - type: text
    content: What a stack of blessing you have piled up
  - type: text
    content: for those who worship you,
  - type: text
    content: Ready and waiting for all who run to you
  - type: text
    content: to escape an unkind world.
  - type: text
    content: You hide them safely away
  - type: text
    content: from the opposition.
  - type: text
    content: As you slam the door on those oily, mocking faces,
  - type: text
    content: you silence the poisonous gossip.
  - type: text
    content: 'Blessed '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: His love is the wonder of the world.
  - type: text
    content: Trapped by a siege, I panicked.
  - type: text
    content: “Out of sight, out of mind,” I said.
  - type: text
    content: But you heard me say it,
  - type: text
    content: you heard and listened.
  '23':
  - type: text
    content: 'Love '
  - type: text
    content: God
  - type: text
    content: ', all you saints;'
  - type: text
    content: God
  - type: text
    content: ' takes care of all who stay close to him,'
  - type: text
    content: But he pays back in full
  - type: text
    content: those arrogant enough to go it alone.
  '24':
  - type: text
    content: Be brave. Be strong. Don’t give up.
  - type: text
    content: 'Expect '
  - type: text
    content: God
  - type: text
    content: ' to get here soon.'
  '3':
  - type: text
    content: You’re my cave to hide in,
  - type: text
    content: my cliff to climb.
  - type: text
    content: Be my safe leader,
  - type: text
    content: be my true mountain guide.
  - type: text
    content: Free me from hidden traps;
  - type: text
    content: I want to hide in you.
  - type: text
    content: I’ve put my life in your hands.
  - type: text
    content: You won’t drop me,
  - type: text
    content: you’ll never let me down.
  '6':
  - type: text
    content: I hate all this silly religion,
  - type: text
    content: 'but you, '
  - type: text
    content: God
  - type: text
    content: ', I trust.'
  - type: text
    content: I’m leaping and singing in the circle of your love;
  - type: text
    content: you saw my pain,
  - type: text
    content: you disarmed my tormentors,
  - type: text
    content: You didn’t leave me in their clutches
  - type: text
    content: but gave me room to breathe.
  - type: text
    content: 'Be kind to me, '
  - type: text
    content: God
  - type: text
    content: —
  - type: text
    content: I’m in deep, deep trouble again.
  - type: text
    content: I’ve cried my eyes out;
  - type: text
    content: I feel hollow inside.
  - type: text
    content: My life leaks away, groan by groan;
  - type: text
    content: my years fade out in sighs.
  - type: text
    content: My troubles have worn me out,
  - type: text
    content: turned my bones to powder.
  - type: text
    content: To my enemies I’m a monster;
  - type: text
    content: I’m ridiculed by the neighbors.
  - type: text
    content: My friends are horrified;
  - type: text
    content: they cross the street to avoid me.
  - type: text
    content: They want to blot me from memory,
  - type: text
    content: forget me like a corpse in a grave,
  - type: text
    content: discard me like a broken dish in the trash.
  - type: text
    content: The street-talk gossip has me
  - type: text
    content: “criminally insane”!
  - type: text
    content: Behind locked doors they plot
  - type: text
    content: how to ruin me for good.
