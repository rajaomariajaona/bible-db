document_id: PSA.31
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'I run to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ; I run for dear life.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t let me down!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take me seriously this time!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get down on my level and listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and please—no procrastination!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your granite cave a hiding place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your high cliff nest a place of safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-5
  - type: text
    text: You’re my cave to hide in,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my cliff to climb.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be my safe leader,
- type: usfm
  marker: q2
  children:
  - type: text
    text: be my true mountain guide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Free me from hidden traps;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I want to hide in you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve put my life in your hands.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You won’t drop me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ll never let me down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-13
  - type: text
    text: I hate all this silly religion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', I trust.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m leaping and singing in the circle of your love;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you saw my pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you disarmed my tormentors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You didn’t leave me in their clutches
- type: usfm
  marker: q2
  children:
  - type: text
    text: but gave me room to breathe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Be kind to me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m in deep, deep trouble again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve cried my eyes out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I feel hollow inside.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My life leaks away, groan by groan;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my years fade out in sighs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My troubles have worn me out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turned my bones to powder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: To my enemies I’m a monster;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m ridiculed by the neighbors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My friends are horrified;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they cross the street to avoid me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They want to blot me from memory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: forget me like a corpse in a grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: discard me like a broken dish in the trash.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The street-talk gossip has me
- type: usfm
  marker: q2
  children:
  - type: text
    text: “criminally insane”!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Behind locked doors they plot
- type: usfm
  marker: q2
  children:
  - type: text
    text: how to ruin me for good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-18
  - type: text
    text: 'Desperate, I throw myself on you:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' are my God!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hour by hour I place my days in your hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: safe from the hands out to get me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Warm me, your servant, with a smile;
- type: usfm
  marker: q2
  children:
  - type: text
    text: save me because you love me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t embarrass me by not showing up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve given you plenty of notice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Embarrass the wicked, stand them up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: leave them stupidly shaking their heads
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they drift down to hell.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gag those loudmouthed liars
- type: usfm
  marker: q2
  children:
  - type: text
    text: who heckle me, your follower,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with jeers and catcalls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: What a stack of blessing you have piled up
- type: usfm
  marker: q2
  children:
  - type: text
    text: for those who worship you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ready and waiting for all who run to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: to escape an unkind world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You hide them safely away
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the opposition.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As you slam the door on those oily, mocking faces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you silence the poisonous gossip.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Blessed '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His love is the wonder of the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trapped by a siege, I panicked.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Out of sight, out of mind,” I said.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you heard me say it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you heard and listened.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Love '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', all you saints;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' takes care of all who stay close to him,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he pays back in full
- type: usfm
  marker: q2
  children:
  - type: text
    text: those arrogant enough to go it alone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Be brave. Be strong. Don’t give up.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Expect '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' to get here soon.'
