    children:
    - type: text
      text: 1-3
  - type: text
    text: God is a safe place to hide,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ready to help when we need him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We stand fearless at the cliff-edge of doom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: courageous in seastorm and earthquake,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before the rush and roar of oceans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tremors that shift mountains.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jacob-wrestling God fights for us,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-Angel-Armies protects us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: River fountains splash joy, cooling God’s city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: this sacred haunt of the Most High.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God lives here, the streets are safe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God at your service from crack of dawn.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Godless nations rant and rave, kings and kingdoms threaten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but Earth does anything he says.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
