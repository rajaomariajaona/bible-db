verses:
  '1':
  - type: text
    content: God is a safe place to hide,
  - type: text
    content: ready to help when we need him.
  - type: text
    content: We stand fearless at the cliff-edge of doom,
  - type: text
    content: courageous in seastorm and earthquake,
  - type: text
    content: Before the rush and roar of oceans,
  - type: text
    content: the tremors that shift mountains.
  - type: text
    content: Jacob-wrestling God fights for us,
  - type: text
    content: God
  - type: text
    content: -of-Angel-Armies protects us.
