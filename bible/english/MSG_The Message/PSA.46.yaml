  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: 'Attention, all! See the marvels of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He plants flowers and trees all over the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bans war from pole to pole,
- type: usfm
  marker: q2
  children:
  - type: text
    text: breaks all the weapons across his knee.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Step out of the traffic! Take a long,
- type: usfm
  marker: q2
  children:
  - type: text
    text: loving look at me, your High God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: above politics, above everything.”
