  '4':
  - type: text
    content: River fountains splash joy, cooling God’s city,
  - type: text
    content: this sacred haunt of the Most High.
  - type: text
    content: God lives here, the streets are safe,
  - type: text
    content: God at your service from crack of dawn.
  - type: text
    content: Godless nations rant and rave, kings and kingdoms threaten,
  - type: text
    content: but Earth does anything he says.
  '7':
  - type: text
    content: Jacob-wrestling God fights for us,
  - type: text
    content: God
  - type: text
    content: -of-Angel-Armies protects us.
  '8':
  - type: text
    content: 'Attention, all! See the marvels of '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: He plants flowers and trees all over the earth,
  - type: text
    content: Bans war from pole to pole,
  - type: text
    content: breaks all the weapons across his knee.
  - type: text
    content: “Step out of the traffic! Take a long,
  - type: text
    content: loving look at me, your High God,
  - type: text
    content: above politics, above everything.”
