document_id: NEH.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Wall Rebuilt: Names and Numbers'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: After the wall was rebuilt and I had installed the doors, and the security guards, the singers, and the Levites were appointed, I put my brother Hanani, along with Hananiah the captain of the citadel, in charge of Jerusalem because he was an honest man and feared God more than most men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I gave them this order: “Don’t open the gates of Jerusalem until the sun is up. And shut and bar the gates while the guards are still on duty. Appoint the guards from the citizens of Jerusalem and assign them to posts in front of their own homes.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The city was large and spacious with only a few people in it and the houses not yet rebuilt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'God put it in my heart to gather the nobles, the officials, and the people in general to be registered. I found the genealogical record of those who were in the first return from exile. This is the record I found:'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-60
  - type: text
    text: These are the people of the province who returned from the captivity of the Exile, the ones Nebuchadnezzar king of Babylon had carried off captive; they came back to Jerusalem and Judah, each going to his own town. They came back in the company of Zerubbabel, Jeshua, Nehemiah, Azariah, Raamiah, Nahamani, Mordecai, Bilshan, Mispereth, Bigvai, Nehum, and Baanah.
