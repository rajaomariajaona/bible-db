  '61':
  - type: text
    content: 'These are those who came from Tel Melah, Tel Harsha, Kerub, Addon, and Immer. They weren’t able to prove their ancestry, whether they were true Israelites or not:'
  - type: text
    content: The sons of Delaiah, Tobiah, and Nekoda, 642.
  - type: text
    content: 'Likewise with these priestly families:'
  - type: text
    content: The sons of Hobaiah, Hakkoz, and Barzillai, who had married a daughter of Barzillai the Gileadite and took that name.
  '64':
  - type: text
    content: They looked high and low for their family records but couldn’t find them. And so they were barred from priestly work as ritually unclean. The governor ruled that they could not eat from the holy food until a priest could determine their status by using the Urim and Thummim.
  '66':
  - type: text
    content: The total count for the congregation was 42,360. That did not include the male and female slaves who numbered 7,337. There were also 245 male and female singers. And there were 736 horses, 245 mules, 435 camels, and 6,720 donkeys.
  '70':
  - type: text
    content: Some of the heads of families made voluntary offerings for the work. The governor made a gift to the treasury of 1,000 drachmas of gold (about nineteen pounds), 50 bowls, and 530 garments for the priests. Some of the heads of the families made gifts to the treasury for the work; it came to 20,000 drachmas of gold and 2,200 minas of silver (about one and a third tons). Gifts from the rest of the people totaled 20,000 drachmas of gold (about 375 pounds), 2,000 minas of silver, and 67 garments for the priests.
  - type: heading
    content: Ezra and The Revelation
  '73':
  - type: text
    content: The priests, Levites, security guards, singers, and Temple support staff, along with some others, and the rest of the People of Israel, all found a place to live in their own towns.
