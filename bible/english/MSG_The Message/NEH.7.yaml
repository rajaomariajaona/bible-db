- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 61-63
  - type: text
    text: 'These are those who came from Tel Melah, Tel Harsha, Kerub, Addon, and Immer. They weren’t able to prove their ancestry, whether they were true Israelites or not:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: The sons of Delaiah, Tobiah, and Nekoda, 642.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Likewise with these priestly families:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: The sons of Hobaiah, Hakkoz, and Barzillai, who had married a daughter of Barzillai the Gileadite and took that name.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 64-65
  - type: text
    text: They looked high and low for their family records but couldn’t find them. And so they were barred from priestly work as ritually unclean. The governor ruled that they could not eat from the holy food until a priest could determine their status by using the Urim and Thummim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 66-69
  - type: text
    text: The total count for the congregation was 42,360. That did not include the male and female slaves who numbered 7,337. There were also 245 male and female singers. And there were 736 horses, 245 mules, 435 camels, and 6,720 donkeys.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 70-72
  - type: text
    text: Some of the heads of families made voluntary offerings for the work. The governor made a gift to the treasury of 1,000 drachmas of gold (about nineteen pounds), 50 bowls, and 530 garments for the priests. Some of the heads of the families made gifts to the treasury for the work; it came to 20,000 drachmas of gold and 2,200 minas of silver (about one and a third tons). Gifts from the rest of the people totaled 20,000 drachmas of gold (about 375 pounds), 2,000 minas of silver, and 67 garments for the priests.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezra and The Revelation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: The priests, Levites, security guards, singers, and Temple support staff, along with some others, and the rest of the People of Israel, all found a place to live in their own towns.
