type_code: eng
verses:
  '1':
  - type: heading
    content: 'The Wall Rebuilt: Names and Numbers'
  - type: text
    content: After the wall was rebuilt and I had installed the doors, and the security guards, the singers, and the Levites were appointed, I put my brother Hanani, along with Hananiah the captain of the citadel, in charge of Jerusalem because he was an honest man and feared God more than most men.
  '3':
  - type: text
    content: 'I gave them this order: “Don’t open the gates of Jerusalem until the sun is up. And shut and bar the gates while the guards are still on duty. Appoint the guards from the citizens of Jerusalem and assign them to posts in front of their own homes.”'
  '4':
  - type: text
    content: The city was large and spacious with only a few people in it and the houses not yet rebuilt.
  '5':
  - type: text
    content: 'God put it in my heart to gather the nobles, the officials, and the people in general to be registered. I found the genealogical record of those who were in the first return from exile. This is the record I found:'
  '6':
  - type: text
    content: These are the people of the province who returned from the captivity of the Exile, the ones Nebuchadnezzar king of Babylon had carried off captive; they came back to Jerusalem and Judah, each going to his own town. They came back in the company of Zerubbabel, Jeshua, Nehemiah, Azariah, Raamiah, Nahamani, Mordecai, Bilshan, Mispereth, Bigvai, Nehum, and Baanah.
