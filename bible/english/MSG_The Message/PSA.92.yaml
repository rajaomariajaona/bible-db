document_id: PSA.92,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'What a beautiful thing, '
  - type: text
    content: God
  - type: text
    content: ', to give thanks,'
  - type: text
    content: to sing an anthem to you, the High God!
  - type: text
    content: To announce your love each daybreak,
  - type: text
    content: sing your faithful presence all through the night,
  - type: text
    content: Accompanied by dulcimer and harp,
  - type: text
    content: the full-bodied music of strings.
  '10':
  - type: text
    content: But you’ve made me strong as a charging bison,
  - type: text
    content: you’ve honored me with a festive parade.
  - type: text
    content: The sight of my critics going down is still fresh,
  - type: text
    content: the rout of my malicious detractors.
  - type: text
    content: 'My ears are filled with the sounds of promise:'
  - type: text
    content: “Good people will prosper like palm trees,
  - type: text
    content: Grow tall like Lebanon cedars;
  - type: text
    content: 'transplanted to '
  - type: text
    content: God
  - type: text
    content: ’s courtyard,
  - type: text
    content: They’ll grow tall in the presence of God,
  - type: text
    content: lithe and green, virile still in old age.”
  '15':
  - type: text
    content: 'Such witnesses to upright '
  - type: text
    content: God!
  - type: text
    content: My Mountain, my huge, holy Mountain!
  '4':
  - type: text
    content: 'You made me so happy, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: I saw your work and I shouted for joy.
  - type: text
    content: 'How magnificent your work, '
  - type: text
    content: God
  - type: text
    content: '!'
  - type: text
    content: How profound your thoughts!
  - type: text
    content: Dullards never notice what you do;
  - type: text
    content: fools never do get it.
  - type: text
    content: When the wicked popped up like weeds
  - type: text
    content: and all the evil men and women took over,
  - type: text
    content: You mowed them down,
  - type: text
    content: finished them off once and for all.
  - type: text
    content: 'You, '
  - type: text
    content: God
  - type: text
    content: ', are High and Eternal.'
  - type: text
    content: 'Look at your enemies, '
  - type: text
    content: God!
  - type: text
    content: Look at your enemies—ruined!
  - type: text
    content: Scattered to the winds, all those hirelings of evil!
