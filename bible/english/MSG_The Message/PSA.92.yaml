document_id: PSA.92
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'What a beautiful thing, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', to give thanks,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to sing an anthem to you, the High God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: To announce your love each daybreak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sing your faithful presence all through the night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accompanied by dulcimer and harp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the full-bodied music of strings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-9
  - type: text
    text: 'You made me so happy, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: I saw your work and I shouted for joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'How magnificent your work, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How profound your thoughts!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dullards never notice what you do;
- type: usfm
  marker: q2
  children:
  - type: text
    text: fools never do get it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When the wicked popped up like weeds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the evil men and women took over,
- type: usfm
  marker: q1
  children:
  - type: text
    text: You mowed them down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: finished them off once and for all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', are High and Eternal.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Look at your enemies, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at your enemies—ruined!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Scattered to the winds, all those hirelings of evil!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-14
  - type: text
    text: But you’ve made me strong as a charging bison,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’ve honored me with a festive parade.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sight of my critics going down is still fresh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rout of my malicious detractors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'My ears are filled with the sounds of promise:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Good people will prosper like palm trees,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grow tall like Lebanon cedars;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'transplanted to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s courtyard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll grow tall in the presence of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lithe and green, virile still in old age.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Such witnesses to upright '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: My Mountain, my huge, holy Mountain!
