document_id: JOS.8,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Ai
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' said to Joshua, “Don’t be timid and don’t so much as hesitate. Take all your soldiers with you and go back to Ai. I have turned the king of Ai over to you—his people, his city, and his land.'
  '10':
  - type: text
    content: Joshua was up early in the morning and mustered his army. He and the leaders of Israel led the troops to Ai. The whole army, fighting men all, marched right up within sight of the city and set camp on the north side of Ai. There was a valley between them and Ai. He had taken about five thousand men and put them in ambush between Bethel and Ai, west of the city. They were all deployed, the main army to the north of the city and the ambush to the west. Joshua spent the night in the valley.
  '14':
  - type: text
    content: So it happened that when the king of Ai saw all this, the men of the city lost no time; they were out of there at the crack of dawn to join Israel in battle, the king and his troops, at a field en route to the Arabah. The king didn’t know of the ambush set against him behind the city.
  '15':
  - type: text
    content: Joshua and all Israel let themselves be chased; they ran toward the wilderness. Everybody in the city was called to the chase. They pursued Joshua and were led away from the city. There wasn’t a soul left in Ai or Bethel who wasn’t out there chasing after Israel. The city was left empty and undefended as they were chasing Israel down.
  '18':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: ' spoke to Joshua: “Stretch out the javelin in your hand toward Ai—I’m giving it to you.” Joshua stretched out the javelin in his hand toward Ai. At the signal the men in ambush sprang to their feet, ran to the city, took it, and quickly had it up in flames.'
  '2':
  - type: text
    content: “Do to Ai and its king what you did to Jericho and its king. Only this time you may plunder its stuff and cattle to your heart’s content. Set an ambush behind the city.”
  '20':
  - type: text
    content: The men of Ai looked back and, oh! saw the city going up in smoke. They found themselves trapped with nowhere to run. The army on the run toward the wilderness did an about-face—Joshua and all Israel, seeing that the ambush had taken the city, saw it going up in smoke, turned and attacked the men of Ai.
  '22':
  - type: text
    content: Then the men in the ambush poured out of the city. The men of Ai were caught in the middle with Israelites on both sides—a real massacre. And not a single survivor. Except for the king of Ai; they took him alive and brought him to Joshua.
  '24':
  - type: text
    content: When it was all over, Israel had killed everyone in Ai, whether in the fields or in the wilderness where they had chased them. When the killing was complete, the Israelites returned to Ai and completed the devastation. The death toll that day came to twelve thousand men and women—everyone in Ai.
  '26':
  - type: text
    content: 'Joshua didn’t lower his outstretched javelin until the sacred destruction of Ai and all its people was completed. Israel did get to take the livestock and loot left in the city; '
  - type: text
    content: God
  - type: text
    content: ’s instructions to Joshua allowed for that.
  '28':
  - type: text
    content: Joshua burned Ai to the ground. A “heap” of nothing forever, a “no-place”—go see for yourself. He hanged the king of Ai from a tree. At evening, with the sun going down, Joshua ordered the corpse cut down. They dumped it at the entrance to the city and piled it high with stones—you can go see that also.
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: 'Joshua and all his soldiers got ready to march on Ai. Joshua chose thirty thousand men, tough, seasoned fighters, and sent them off at night with these orders: “Pay me all of your attention now. Lie in ambush behind the city. Get as close as you can. Stay alert. I and the troops with me will approach the city head-on. When they come out to meet us just as before, we’ll turn and run. They’ll come after us, leaving the city. As we are off and running, they’ll say, ‘They’re running away just like the first time.’ That’s your signal to spring from your ambush and take the city. '
  - type: text
    content: God
  - type: text
    content: ', your God, will hand it to you on a platter. Once you have the city, burn it down. '
  - type: text
    content: God
  - type: text
    content: ' says it, you do it. Go to it. I’ve given you your orders.”'
  '30':
  - type: text
    content: 'Then Joshua built an altar to the '
  - type: text
    content: God
  - type: text
    content: ' of Israel on Mount Ebal. He built it following the instructions of Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' to the People of Israel and written in the Book of The Revelation of Moses, an altar of whole stones that hadn’t been chiseled or shaped by an iron tool. On it they offered to '
  - type: text
    content: God
  - type: text
    content: ' Whole-Burnt-Offerings and sacrificed Peace-Offerings. He also wrote out a copy of The Revelation of Moses on the stones. He wrote it with the People of Israel looking on.'
  '33':
  - type: text
    content: 'All Israel was there, foreigners and citizens alike, with their elders, officers, and judges, standing on opposite sides of the Chest, facing the Levitical priests who carry '
  - type: text
    content: God
  - type: text
    content: '’s Covenant Chest. Half of the people stood with their backs to Mount Gerizim and half with their backs to Mount Ebal to bless the People of Israel, just as Moses the servant of '
  - type: text
    content: God
  - type: text
    content: ' had instructed earlier.'
  '34':
  - type: text
    content: After that, he read out everything written in The Revelation, the Blessing and the Curse, everything in the Book of The Revelation. There wasn’t a word of all that Moses commanded that Joshua didn’t read to the entire congregation—men, women, children, and foreigners who had been with them on the journey.
  '9':
  - type: text
    content: Joshua sent them off. They set their ambush and waited between Bethel and Ai, just west of Ai. Joshua spent the night with the people.
