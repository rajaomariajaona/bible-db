document_id: ISA.44,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proud to Be Called Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But for now, dear servant Jacob, listen—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, you, Israel, my personal choice.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who made you has something to say to you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God who formed you in the womb wants to help you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t be afraid, dear servant Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jeshurun, the one I chose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will pour water on the thirsty ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and send streams coursing through the parched earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pour my Spirit into your descendants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my blessing on your children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shall sprout like grass on the prairie,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like willows alongside creeks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This one will say, ‘I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and another will go by the name Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That one will write on his hand ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s property’—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be proud to be called Israel.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The blacksmith makes his no-god, works it over in his forge, hammering it on his anvil—such hard work! He works away, fatigued with hunger and thirst.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The woodworker draws up plans for his no-god, traces it on a block of wood. He shapes it with chisels and planes into human shape—a beautiful woman, a handsome man, ready to be placed in a chapel. He first cuts down a cedar, or maybe picks out a pine or oak, and lets it grow strong in the forest, nourished by the rain. Then it can serve a double purpose: Part he uses as firewood for keeping warm and baking bread; from the other part he makes a god that he worships—carves it into a god shape and prays before it. With half he makes a fire to warm himself and barbecue his supper. He eats his fill and sits back satisfied with his stomach full and his feet warmed by the fire: “Ah, this is the life.” And he still has half left for a god, made to his personal design—a handy, convenient no-god to worship whenever so inclined. Whenever the need strikes him he prays to it, “Save me. You’re my god.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pretty stupid, wouldn’t you say? Don’t they have eyes in their heads? Are their brains working at all? Doesn’t it occur to them to say, “Half of this tree I used for firewood: I baked bread, roasted meat, and enjoyed a good meal. And now I’ve used the rest to make a repulsive no-god. Here I am praying to a stick of wood!”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This lover of emptiness, of nothing, is so out of touch with reality, so far gone, that he can’t even look at what he’s doing, can’t even look at the no-god stick of wood in his hand and say, “This is crazy.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Remember these things, O Jacob.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take it seriously, Israel, that you’re my servant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I made you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shaped
    - type: text
      text: ' you: You’re my servant.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Israel, I’ll never forget you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve wiped the slate of all your wrongdoings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s nothing left of your sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come back to me, come back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve redeemed you.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: High heavens, sing!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has done it.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deep earth, shout!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you mountains, sing!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A forest choir of oaks and pines and cedars!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has redeemed Jacob.'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s glory is on display in Israel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', your Redeemer,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who shaped your life in your mother’s womb, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: . I made all that is.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With no help from you I spread out the skies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and laid out the earth.”
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes the magicians look ridiculous
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turns fortunetellers into jokes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes the experts look trivial
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their latest knowledge look silly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he backs the word of his servant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and confirms the counsel of his messengers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says to Jerusalem, “Be inhabited,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the cities of Judah, “Be rebuilt,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the ruins, “I raise you up.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says to Ocean, “Dry up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m drying up your rivers.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says to Cyrus, “My shepherd—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything I want, you’ll do it.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says to Jerusalem, “Be built,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the Temple, “Be established.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', King of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your Redeemer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-of-the-Angel-Armies, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’m first, I’m last, and everything in between.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’m the only God there is.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who compares with me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Speak up. See if you measure up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the beginning, who else has always announced what’s coming?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So what is coming next? Anybody want to venture a try?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Don’t be afraid, and don’t worry:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Haven’t I always kept you informed, told you what was going on?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You’re my eyewitnesses:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you ever come across a God, a real God, other than me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There’s no Rock like me that I know of.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lover of Emptiness
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'All those who make no-god idols don’t amount to a thing, and what they work so hard at making is nothing. Their little puppet-gods see nothing and know nothing—they’re total embarrassments! Who would bother making gods that can’t do anything, that can’t '
    - type: usfm
      marker: it
      children:
      - type: text
        text: “god”
    - type: text
      text: '? Watch all the no-god worshipers hide their faces in shame. Watch the no-god makers slink off humiliated when their idols fail them. Get them out here in the open. Make them face God-reality.'
