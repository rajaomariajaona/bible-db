  '1':
  - type: heading
    content: Proud to Be Called Israel
  - type: text
    content: “But for now, dear servant Jacob, listen—
  - type: text
    content: yes, you, Israel, my personal choice.
  - type: text
    content: God
  - type: text
    content: ' who made you has something to say to you;'
  - type: text
    content: the God who formed you in the womb wants to help you.
  - type: text
    content: Don’t be afraid, dear servant Jacob,
  - type: text
    content: Jeshurun, the one I chose.
  - type: text
    content: For I will pour water on the thirsty ground
  - type: text
    content: and send streams coursing through the parched earth.
  - type: text
    content: I will pour my Spirit into your descendants
  - type: text
    content: and my blessing on your children.
  - type: text
    content: They shall sprout like grass on the prairie,
  - type: text
    content: like willows alongside creeks.
  - type: text
    content: 'This one will say, ‘I am '
  - type: text
    content: God
  - type: text
    content: ’s,’
  - type: text
    content: and another will go by the name Jacob;
  - type: text
    content: That one will write on his hand ‘
  - type: text
    content: God
  - type: text
    content: ’s property’—
  - type: text
    content: and be proud to be called Israel.”
  '12':
  - type: text
    content: The blacksmith makes his no-god, works it over in his forge, hammering it on his anvil—such hard work! He works away, fatigued with hunger and thirst.
  '13':
  - type: text
    content: 'The woodworker draws up plans for his no-god, traces it on a block of wood. He shapes it with chisels and planes into human shape—a beautiful woman, a handsome man, ready to be placed in a chapel. He first cuts down a cedar, or maybe picks out a pine or oak, and lets it grow strong in the forest, nourished by the rain. Then it can serve a double purpose: Part he uses as firewood for keeping warm and baking bread; from the other part he makes a god that he worships—carves it into a god shape and prays before it. With half he makes a fire to warm himself and barbecue his supper. He eats his fill and sits back satisfied with his stomach full and his feet warmed by the fire: “Ah, this is the life.” And he still has half left for a god, made to his personal design—a handy, convenient no-god to worship whenever so inclined. Whenever the need strikes him he prays to it, “Save me. You’re my god.”'
  '18':
  - type: text
    content: 'Pretty stupid, wouldn’t you say? Don’t they have eyes in their heads? Are their brains working at all? Doesn’t it occur to them to say, “Half of this tree I used for firewood: I baked bread, roasted meat, and enjoyed a good meal. And now I’ve used the rest to make a repulsive no-god. Here I am praying to a stick of wood!”'
  '20':
  - type: text
    content: This lover of emptiness, of nothing, is so out of touch with reality, so far gone, that he can’t even look at what he’s doing, can’t even look at the no-god stick of wood in his hand and say, “This is crazy.”
  - type: text
    content: '* * *'
  '21':
  - type: text
    content: “Remember these things, O Jacob.
  - type: text
    content: Take it seriously, Israel, that you’re my servant.
  - type: text
    content: 'I made you, '
  - type: text
    content: shaped
  - type: text
    content: ' you: You’re my servant.'
  - type: text
    content: O Israel, I’ll never forget you.
  - type: text
    content: I’ve wiped the slate of all your wrongdoings.
  - type: text
    content: There’s nothing left of your sins.
  - type: text
    content: Come back to me, come back.
  - type: text
    content: I’ve redeemed you.”
  '23':
  - type: text
    content: High heavens, sing!
  - type: text
    content: God
  - type: text
    content: ' has done it.'
  - type: text
    content: Deep earth, shout!
  - type: text
    content: And you mountains, sing!
  - type: text
    content: A forest choir of oaks and pines and cedars!
  - type: text
    content: God
  - type: text
    content: ' has redeemed Jacob.'
  - type: text
    content: God
  - type: text
    content: ’s glory is on display in Israel.
  '24':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', your Redeemer,'
  - type: text
    content: 'who shaped your life in your mother’s womb, says:'
  - type: text
    content: '“I am '
  - type: text
    content: God
  - type: text
    content: . I made all that is.
  - type: text
    content: With no help from you I spread out the skies
  - type: text
    content: and laid out the earth.”
  '25':
  - type: text
    content: He makes the magicians look ridiculous
  - type: text
    content: and turns fortunetellers into jokes.
  - type: text
    content: He makes the experts look trivial
  - type: text
    content: and their latest knowledge look silly.
  - type: text
    content: But he backs the word of his servant
  - type: text
    content: and confirms the counsel of his messengers.
  - type: text
    content: He says to Jerusalem, “Be inhabited,”
  - type: text
    content: and to the cities of Judah, “Be rebuilt,”
  - type: text
    content: and to the ruins, “I raise you up.”
  - type: text
    content: He says to Ocean, “Dry up.
  - type: text
    content: I’m drying up your rivers.”
  - type: text
    content: He says to Cyrus, “My shepherd—
  - type: text
    content: everything I want, you’ll do it.”
  - type: text
    content: He says to Jerusalem, “Be built,”
  - type: text
    content: and to the Temple, “Be established.”
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', King of Israel,'
  - type: text
    content: 'your Redeemer, '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, says:'
  - type: text
    content: “I’m first, I’m last, and everything in between.
  - type: text
    content: I’m the only God there is.
  - type: text
    content: Who compares with me?
  - type: text
    content: Speak up. See if you measure up.
  - type: text
    content: From the beginning, who else has always announced what’s coming?
  - type: text
    content: So what is coming next? Anybody want to venture a try?
  - type: text
    content: 'Don’t be afraid, and don’t worry:'
  - type: text
    content: Haven’t I always kept you informed, told you what was going on?
  - type: text
    content: 'You’re my eyewitnesses:'
  - type: text
    content: Have you ever come across a God, a real God, other than me?
  - type: text
    content: There’s no Rock like me that I know of.”
  - type: heading
    content: Lover of Emptiness
  '9':
  - type: text
    content: 'All those who make no-god idols don’t amount to a thing, and what they work so hard at making is nothing. Their little puppet-gods see nothing and know nothing—they’re total embarrassments! Who would bother making gods that can’t do anything, that can’t '
  - type: text
    content: “god”
  - type: text
    content: '? Watch all the no-god worshipers hide their faces in shame. Watch the no-god makers slink off humiliated when their idols fail them. Get them out here in the open. Make them face God-reality.'
