document_id: 1CH.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Military Organization
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Here is the listing of the sons of Israel by family heads, commanders and captains, and other officers who served the king in everything military. Army divisions were on duty a month at a time for the twelve months of the year. Each division comprised 24,000 men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'First division, first month: Jashobeam son of Zabdiel was in charge with 24,000 men. He came from the line of Perez. He was over all the army officers during the first month.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The division for the second month: Dodai the Ahohite was in charge: 24,000 men; Mikloth was the leader of his division.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'Commander for the third month: Benaiah son of Jehoiada the priest with 24,000 men. This was the same Benaiah who was a Mighty Man among the Thirty and their chief. His son Ammizabad was in charge of the division.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fourth division for the fourth month: Asahel brother of Joab; his son Zebadiah succeeded him: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fifth division, fifth month: commander Shamhuth the Izrahite: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sixth division, sixth month: Ira son of Ikkesh the Tekoite: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Seventh division, seventh month: Helez the Pelonite, an Ephraimite: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eighth division, eighth month: Sibbecai the Hushathite, a Zerahite: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ninth division, ninth month: Abiezer the Anathothite, a Benjaminite: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tenth division, tenth month: Maharai the Netophathite, a Zerahite: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eleventh division, eleventh month: Benaiah the Pirathomite, an Ephraimite: 24,000 men.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Twelfth division, twelfth month: Heldai the Netophathite from the family of Othniel: 24,000 men.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tribal Administrators
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-22
  - type: text
    text: 'Administrators of the affairs of the tribes:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Reuben: Eliezer son of Zicri;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Simeon: Shephatiah son of Maacah;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Levi: Hashabiah son of Kemuel;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Aaron: Zadok;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Judah: Elihu, David’s brother;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Issachar: Omri son of Michael;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Zebulun: Ishmaiah son of Obadiah;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Naphtali: Jerimoth son of Azriel;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Ephraim: Hoshea son of Azaziah;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for one half-tribe of Manasseh: Joel son of Pedaiah;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for the half-tribe of Manasseh in Gilead: Iddo son of Zechariah;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Benjamin: Jaasiel son of Abner;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'for Dan: Azarel son of Jeroham.'
- type: usfm
  marker: p
  children:
  - type: text
    text: These are the administrative officers assigned to the tribes of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'David didn’t keep a count of men under the age of twenty, because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had promised to give Israel a population as numerous as the stars in the sky. Joab son of Zeruiah started out counting the men, but he never finished. God’s anger broke out on Israel because of the counting. As it turned out, the numbers were never entered into the court records of King David.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Supply Officers
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The king’s storage facilities were supervised by Azmaveth son of Adiel. Jonathan son of Uzziah was responsible for the warehouses in the outlying areas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ezri son of Kelub was in charge of the field workers on the farms.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Shimei the Ramathite was in charge of the vineyards and Zabdi the Shiphmite was in charge of grapes for the wine vats.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Baal-Hanan the Gederite was in charge of the olive and sycamore-fig trees in the western hills, and Joash was in charge of the olive oil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Shitrai the Sharonite was in charge of herds grazing in Sharon and Shaphat son of Adlai was in charge of herds in the valley.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: Obil the Ishmaelite was in charge of the camels, Jehdeiah the Meronothite was in charge of the donkeys, and Jaziz the Hagrite was in charge of the flocks.
- type: usfm
  marker: p
  children:
  - type: text
    text: These were the ones responsible for taking care of King David’s property.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Counselors
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Jonathan, David’s uncle, a wise and literate counselor, and Jehiel son of Hacmoni, were responsible for raising the king’s sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-34
  - type: text
    text: Ahithophel was the king’s counselor; Hushai the Arkite was the king’s friend. Ahithophel was later replaced by Jehoiada son of Benaiah and by Abiathar.
- type: usfm
  marker: p
  children:
  - type: text
    text: Joab was commander of the king’s army.
