document_id: 1CH.27,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Military Organization
  - type: text
    content: Here is the listing of the sons of Israel by family heads, commanders and captains, and other officers who served the king in everything military. Army divisions were on duty a month at a time for the twelve months of the year. Each division comprised 24,000 men.
  '10':
  - type: text
    content: 'Seventh division, seventh month: Helez the Pelonite, an Ephraimite: 24,000 men.'
  '11':
  - type: text
    content: 'Eighth division, eighth month: Sibbecai the Hushathite, a Zerahite: 24,000 men.'
  '12':
  - type: text
    content: 'Ninth division, ninth month: Abiezer the Anathothite, a Benjaminite: 24,000 men.'
  '13':
  - type: text
    content: 'Tenth division, tenth month: Maharai the Netophathite, a Zerahite: 24,000 men.'
  '14':
  - type: text
    content: 'Eleventh division, eleventh month: Benaiah the Pirathomite, an Ephraimite: 24,000 men.'
  '15':
  - type: text
    content: 'Twelfth division, twelfth month: Heldai the Netophathite from the family of Othniel: 24,000 men.'
  - type: heading
    content: Tribal Administrators
  '16':
  - type: text
    content: 'Administrators of the affairs of the tribes:'
  - type: text
    content: 'for Reuben: Eliezer son of Zicri;'
  - type: text
    content: 'for Simeon: Shephatiah son of Maacah;'
  - type: text
    content: 'for Levi: Hashabiah son of Kemuel;'
  - type: text
    content: 'for Aaron: Zadok;'
  - type: text
    content: 'for Judah: Elihu, David’s brother;'
  - type: text
    content: 'for Issachar: Omri son of Michael;'
  - type: text
    content: 'for Zebulun: Ishmaiah son of Obadiah;'
  - type: text
    content: 'for Naphtali: Jerimoth son of Azriel;'
  - type: text
    content: 'for Ephraim: Hoshea son of Azaziah;'
  - type: text
    content: 'for one half-tribe of Manasseh: Joel son of Pedaiah;'
  - type: text
    content: 'for the half-tribe of Manasseh in Gilead: Iddo son of Zechariah;'
  - type: text
    content: 'for Benjamin: Jaasiel son of Abner;'
  - type: text
    content: 'for Dan: Azarel son of Jeroham.'
  - type: text
    content: These are the administrative officers assigned to the tribes of Israel.
  '2':
  - type: text
    content: 'First division, first month: Jashobeam son of Zabdiel was in charge with 24,000 men. He came from the line of Perez. He was over all the army officers during the first month.'
  '23':
  - type: text
    content: 'David didn’t keep a count of men under the age of twenty, because '
  - type: text
    content: God
  - type: text
    content: ' had promised to give Israel a population as numerous as the stars in the sky. Joab son of Zeruiah started out counting the men, but he never finished. God’s anger broke out on Israel because of the counting. As it turned out, the numbers were never entered into the court records of King David.'
  - type: heading
    content: Supply Officers
  '25':
  - type: text
    content: The king’s storage facilities were supervised by Azmaveth son of Adiel. Jonathan son of Uzziah was responsible for the warehouses in the outlying areas.
  '26':
  - type: text
    content: Ezri son of Kelub was in charge of the field workers on the farms.
  '27':
  - type: text
    content: Shimei the Ramathite was in charge of the vineyards and Zabdi the Shiphmite was in charge of grapes for the wine vats.
  '28':
  - type: text
    content: Baal-Hanan the Gederite was in charge of the olive and sycamore-fig trees in the western hills, and Joash was in charge of the olive oil.
  '29':
  - type: text
    content: Shitrai the Sharonite was in charge of herds grazing in Sharon and Shaphat son of Adlai was in charge of herds in the valley.
  '30':
  - type: text
    content: Obil the Ishmaelite was in charge of the camels, Jehdeiah the Meronothite was in charge of the donkeys, and Jaziz the Hagrite was in charge of the flocks.
  - type: text
    content: These were the ones responsible for taking care of King David’s property.
  - type: heading
    content: David’s Counselors
  '32':
  - type: text
    content: Jonathan, David’s uncle, a wise and literate counselor, and Jehiel son of Hacmoni, were responsible for raising the king’s sons.
  '33':
  - type: text
    content: Ahithophel was the king’s counselor; Hushai the Arkite was the king’s friend. Ahithophel was later replaced by Jehoiada son of Benaiah and by Abiathar.
  - type: text
    content: Joab was commander of the king’s army.
  '4':
  - type: text
    content: 'The division for the second month: Dodai the Ahohite was in charge: 24,000 men; Mikloth was the leader of his division.'
  '5':
  - type: text
    content: 'Commander for the third month: Benaiah son of Jehoiada the priest with 24,000 men. This was the same Benaiah who was a Mighty Man among the Thirty and their chief. His son Ammizabad was in charge of the division.'
  '7':
  - type: text
    content: 'Fourth division for the fourth month: Asahel brother of Joab; his son Zebadiah succeeded him: 24,000 men.'
  '8':
  - type: text
    content: 'Fifth division, fifth month: commander Shamhuth the Izrahite: 24,000 men.'
  '9':
  - type: text
    content: 'Sixth division, sixth month: Ira son of Ikkesh the Tekoite: 24,000 men.'
