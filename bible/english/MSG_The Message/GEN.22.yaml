document_id: GEN.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After all this, God tested Abraham. God said, “Abraham!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes?” answered Abraham. “I’m listening.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then an angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' called to him out of Heaven, “Abraham! Abraham!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, I’m listening.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t lay a hand on that boy! Don’t touch him! Now I know how fearlessly you fear God; you didn’t hesitate to place your son, your dear son, on the altar for me.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham looked up. He saw a ram caught by its horns in the thicket. Abraham took the ram and sacrificed it as a burnt offering instead of his son.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham named that place '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -Yireh (
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-Sees-to-It). That’s where we get the saying, “On the mountain of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', he sees to it.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke from Heaven a second time to Abraham: “I swear—'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s sure word!—because you have gone through with this, and have not refused to give me your son, your dear, dear son, I’ll bless you—oh, how I’ll bless you! And I’ll make sure that your children flourish—like stars in the sky! like sand on the beaches! And your descendants will defeat their enemies. All nations on Earth will find themselves blessed through your descendants because you obeyed me.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abraham went back to his young servants. They got things together and returned to Beersheba. Abraham settled down in Beersheba.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Take your dear son Isaac whom you love and go to the land of Moriah. Sacrifice him there as a burnt offering on one of the mountains that I’ll point out to you.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After all this, Abraham got the news: “Your brother Nahor is a father! Milcah has given him children: Uz, his firstborn, his brother Buz, Kemuel (he was the father of Aram), Kesed, Hazo, Pildash, Jidlaph, and Bethuel.” (Bethuel was the father of Rebekah.) Milcah gave these eight sons to Nahor, Abraham’s brother.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His concubine, Reumah, gave him four more children: Tebah, Gaham, Tahash, and Maacah.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham got up early in the morning and saddled his donkey. He took two of his young servants and his son Isaac. He had split wood for the burnt offering. He set out for the place God had directed him. On the third day he looked up and saw the place in the distance. Abraham told his two young servants, “Stay here with the donkey. The boy and I are going over there to worship; then we’ll come back to you.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham took the wood for the burnt offering and gave it to Isaac his son to carry. He carried the flint and the knife. The two of them went off together.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaac said to Abraham his father, “Father?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, my son.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We have flint and wood, but where’s the sheep for the burnt offering?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham said, “Son, God will see to it that there’s a sheep for the burnt offering.” And they kept on walking together.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They arrived at the place to which God had directed him. Abraham built an altar. He laid out the wood. Then he tied up Isaac and laid him on the wood. Abraham reached out and took the knife to kill his son.
