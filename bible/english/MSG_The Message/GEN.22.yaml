document_id: GEN.22,97
type_code: eng
verses:
  '1':
  - type: text
    content: After all this, God tested Abraham. God said, “Abraham!”
  - type: text
    content: “Yes?” answered Abraham. “I’m listening.”
  '11':
  - type: text
    content: 'Just then an angel of '
  - type: text
    content: God
  - type: text
    content: ' called to him out of Heaven, “Abraham! Abraham!”'
  - type: text
    content: “Yes, I’m listening.”
  '12':
  - type: text
    content: “Don’t lay a hand on that boy! Don’t touch him! Now I know how fearlessly you fear God; you didn’t hesitate to place your son, your dear son, on the altar for me.”
  '13':
  - type: text
    content: Abraham looked up. He saw a ram caught by its horns in the thicket. Abraham took the ram and sacrificed it as a burnt offering instead of his son.
  '14':
  - type: text
    content: 'Abraham named that place '
  - type: text
    content: God
  - type: text
    content: -Yireh (
  - type: text
    content: God
  - type: text
    content: '-Sees-to-It). That’s where we get the saying, “On the mountain of '
  - type: text
    content: God
  - type: text
    content: ', he sees to it.”'
  '15':
  - type: text
    content: 'The angel of '
  - type: text
    content: God
  - type: text
    content: ' spoke from Heaven a second time to Abraham: “I swear—'
  - type: text
    content: God
  - type: text
    content: ’s sure word!—because you have gone through with this, and have not refused to give me your son, your dear, dear son, I’ll bless you—oh, how I’ll bless you! And I’ll make sure that your children flourish—like stars in the sky! like sand on the beaches! And your descendants will defeat their enemies. All nations on Earth will find themselves blessed through your descendants because you obeyed me.”
  '19':
  - type: text
    content: Then Abraham went back to his young servants. They got things together and returned to Beersheba. Abraham settled down in Beersheba.
  - type: text
    content: '* * *'
  '2':
  - type: text
    content: He said, “Take your dear son Isaac whom you love and go to the land of Moriah. Sacrifice him there as a burnt offering on one of the mountains that I’ll point out to you.”
  '20':
  - type: text
    content: 'After all this, Abraham got the news: “Your brother Nahor is a father! Milcah has given him children: Uz, his firstborn, his brother Buz, Kemuel (he was the father of Aram), Kesed, Hazo, Pildash, Jidlaph, and Bethuel.” (Bethuel was the father of Rebekah.) Milcah gave these eight sons to Nahor, Abraham’s brother.'
  '24':
  - type: text
    content: 'His concubine, Reumah, gave him four more children: Tebah, Gaham, Tahash, and Maacah.'
  - type: text
    content: '* * *'
  '3':
  - type: text
    content: Abraham got up early in the morning and saddled his donkey. He took two of his young servants and his son Isaac. He had split wood for the burnt offering. He set out for the place God had directed him. On the third day he looked up and saw the place in the distance. Abraham told his two young servants, “Stay here with the donkey. The boy and I are going over there to worship; then we’ll come back to you.”
  '6':
  - type: text
    content: Abraham took the wood for the burnt offering and gave it to Isaac his son to carry. He carried the flint and the knife. The two of them went off together.
  '7':
  - type: text
    content: Isaac said to Abraham his father, “Father?”
  - type: text
    content: “Yes, my son.”
  - type: text
    content: “We have flint and wood, but where’s the sheep for the burnt offering?”
  '8':
  - type: text
    content: Abraham said, “Son, God will see to it that there’s a sheep for the burnt offering.” And they kept on walking together.
  '9':
  - type: text
    content: They arrived at the place to which God had directed him. Abraham built an altar. He laid out the wood. Then he tied up Isaac and laid him on the wood. Abraham reached out and took the knife to kill his son.
