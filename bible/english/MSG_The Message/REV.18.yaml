document_id: REV.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Doom to the City of Darkness
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Following this I saw another Angel descend from Heaven. His authority was immense, his glory flooded earth with brightness, his voice thunderous:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ruined, ruined, Great Babylon, ruined!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A ghost town for demons is all that’s left!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A garrison of carrion spirits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: garrison of loathsome, carrion birds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All nations drank the wild wine of her whoring;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: kings of the earth went whoring with her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: entrepreneurs made millions exploiting her.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Just then I heard another shout out of Heaven:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get out, my people, as fast as you can,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you don’t get mixed up in her sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you don’t get caught in her doom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her sins stink to high Heaven;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God has remembered every evil she’s done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give her back what she’s given,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: double what she’s doubled in her works,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: double the recipe in the cup she mixed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring her flaunting and wild ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to torment and tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because she gloated, “I’m queen over all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no widow, never a tear on my face,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In one day, disasters will crush her—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: death, heartbreak, and famine—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then she’ll be burned by fire, because God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Strong God who judges her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has had enough.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “The traders will cry and carry on because the bottom dropped out of business, no more market for their goods: gold, silver, precious gems, pearls; fabrics of fine linen, purple, silk, scarlet; perfumed wood and vessels of ivory, precious woods, bronze, iron, and marble; cinnamon and spice, incense, myrrh, and frankincense; wine and oil, flour and wheat; cattle, sheep, horses, and chariots. And slaves—their terrible traffic in human lives.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything you’ve lived for, gone!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All delicate and delectable luxury, lost!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Not a scrap, not a thread to be found!
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“The traders who made millions off her kept their distance for fear of getting burned, and cried and carried on all the more:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom, doom, the great city doomed!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Dressed in the latest fashions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: adorned with the finest jewels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in one hour such wealth wiped out!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' “All the ship captains and travelers by sea, sailors and toilers of the sea, stood off at a distance and cried their lament when they saw the smoke from her burning: ‘Oh, what a city! There was never a city like her!’ They threw dust on their heads and cried as if the world had come to an end:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom, doom, the great city doomed!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All who owned ships or did business by sea
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Got rich on her getting and spending.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And now it’s over—wiped out in one hour!
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “O Heaven, celebrate! And join in, saints, apostles, and prophets! God has judged her; every wrong you suffered from her has been judged.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A strong Angel reached for a boulder—huge, like a millstone—and heaved it into the sea, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heaved and sunk, the great city Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sunk in the sea, not a sign of her ever again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Silent the music of harpists and singers—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll never hear flutes and trumpets again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Artisans of every kind—gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll never see their likes again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The voice of a millstone grinding falls dumb;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you’ll never hear that sound again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The light from lamps, never again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again laughter of bride and groom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her traders robbed the whole earth blind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by black-magic arts deceived the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The only thing left of Babylon is blood—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blood of saints and prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the murdered and the martyred.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The kings of the earth will see the smoke of her burning, and they’ll cry and carry on, the kings who went night after night to her brothel. They’ll keep their distance for fear they’ll get burned, and they’ll cry their lament:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom, doom, the great city doomed!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: City of Babylon, strong city!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In one hour it’s over, your judgment come!
