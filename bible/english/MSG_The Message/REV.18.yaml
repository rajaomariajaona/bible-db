document_id: REV.18,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Doom to the City of Darkness
  - type: text
    content: 'Following this I saw another Angel descend from Heaven. His authority was immense, his glory flooded earth with brightness, his voice thunderous:'
  - type: text
    content: Ruined, ruined, Great Babylon, ruined!
  - type: text
    content: A ghost town for demons is all that’s left!
  - type: text
    content: A garrison of carrion spirits,
  - type: text
    content: garrison of loathsome, carrion birds.
  - type: text
    content: All nations drank the wild wine of her whoring;
  - type: text
    content: kings of the earth went whoring with her;
  - type: text
    content: entrepreneurs made millions exploiting her.
  - type: text
    content: 'Just then I heard another shout out of Heaven:'
  - type: text
    content: Get out, my people, as fast as you can,
  - type: text
    content: so you don’t get mixed up in her sins,
  - type: text
    content: so you don’t get caught in her doom.
  - type: text
    content: Her sins stink to high Heaven;
  - type: text
    content: God has remembered every evil she’s done.
  - type: text
    content: Give her back what she’s given,
  - type: text
    content: double what she’s doubled in her works,
  - type: text
    content: double the recipe in the cup she mixed;
  - type: text
    content: Bring her flaunting and wild ways
  - type: text
    content: to torment and tears.
  - type: text
    content: Because she gloated, “I’m queen over all,
  - type: text
    content: and no widow, never a tear on my face,”
  - type: text
    content: In one day, disasters will crush her—
  - type: text
    content: death, heartbreak, and famine—
  - type: text
    content: Then she’ll be burned by fire, because God,
  - type: text
    content: the Strong God who judges her,
  - type: text
    content: has had enough.
  '11':
  - type: text
    content: ' “The traders will cry and carry on because the bottom dropped out of business, no more market for their goods: gold, silver, precious gems, pearls; fabrics of fine linen, purple, silk, scarlet; perfumed wood and vessels of ivory, precious woods, bronze, iron, and marble; cinnamon and spice, incense, myrrh, and frankincense; wine and oil, flour and wheat; cattle, sheep, horses, and chariots. And slaves—their terrible traffic in human lives.'
  - type: text
    content: Everything you’ve lived for, gone!
  - type: text
    content: All delicate and delectable luxury, lost!
  - type: text
    content: Not a scrap, not a thread to be found!
  - type: text
    content: '“The traders who made millions off her kept their distance for fear of getting burned, and cried and carried on all the more:'
  - type: text
    content: Doom, doom, the great city doomed!
  - type: text
    content: Dressed in the latest fashions,
  - type: text
    content: adorned with the finest jewels,
  - type: text
    content: in one hour such wealth wiped out!
  '17':
  - type: text
    content: ' “All the ship captains and travelers by sea, sailors and toilers of the sea, stood off at a distance and cried their lament when they saw the smoke from her burning: ‘Oh, what a city! There was never a city like her!’ They threw dust on their heads and cried as if the world had come to an end:'
  - type: text
    content: Doom, doom, the great city doomed!
  - type: text
    content: All who owned ships or did business by sea
  - type: text
    content: Got rich on her getting and spending.
  - type: text
    content: And now it’s over—wiped out in one hour!
  '20':
  - type: text
    content: “O Heaven, celebrate! And join in, saints, apostles, and prophets! God has judged her; every wrong you suffered from her has been judged.”
  '21':
  - type: text
    content: A strong Angel reached for a boulder—huge, like a millstone—and heaved it into the sea, saying,
  - type: text
    content: Heaved and sunk, the great city Babylon,
  - type: text
    content: sunk in the sea, not a sign of her ever again.
  - type: text
    content: Silent the music of harpists and singers—
  - type: text
    content: you’ll never hear flutes and trumpets again.
  - type: text
    content: Artisans of every kind—gone;
  - type: text
    content: you’ll never see their likes again.
  - type: text
    content: The voice of a millstone grinding falls dumb;
  - type: text
    content: you’ll never hear that sound again.
  - type: text
    content: The light from lamps, never again;
  - type: text
    content: never again laughter of bride and groom.
  - type: text
    content: Her traders robbed the whole earth blind,
  - type: text
    content: and by black-magic arts deceived the nations.
  - type: text
    content: The only thing left of Babylon is blood—
  - type: text
    content: the blood of saints and prophets,
  - type: text
    content: the murdered and the martyred.
  '9':
  - type: text
    content: '“The kings of the earth will see the smoke of her burning, and they’ll cry and carry on, the kings who went night after night to her brothel. They’ll keep their distance for fear they’ll get burned, and they’ll cry their lament:'
  - type: text
    content: Doom, doom, the great city doomed!
  - type: text
    content: City of Babylon, strong city!
  - type: text
    content: In one hour it’s over, your judgment come!
