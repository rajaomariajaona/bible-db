document_id: PSA.99,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' rules. On your toes, everybody!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rules from his angel throne—take notice!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' looms majestic in Zion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He towers in splendor over all the big names.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Great and terrible your beauty: let everyone praise you!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Holy. Yes, holy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strong King, lover of justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You laid things out fair and square;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set down the foundations in Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foundation stones of just and right ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Honor '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God; worship his rule!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Holy. Yes, holy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moses and Aaron were his priests,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Samuel among those who prayed to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They prayed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' and he answered them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spoke from the pillar of cloud.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they did what he said; they kept the law he gave them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God, answered them'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (But you were never soft on their sins).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lift high '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', our God; worship at his holy mountain.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Holy. Yes, holy is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' our God.'
