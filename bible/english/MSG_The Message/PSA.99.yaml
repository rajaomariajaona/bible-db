document_id: PSA.99,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' rules. On your toes, everybody!'
  - type: text
    content: He rules from his angel throne—take notice!
  - type: text
    content: God
  - type: text
    content: ' looms majestic in Zion,'
  - type: text
    content: He towers in splendor over all the big names.
  - type: text
    content: 'Great and terrible your beauty: let everyone praise you!'
  - type: text
    content: Holy. Yes, holy.
  '4':
  - type: text
    content: Strong King, lover of justice,
  - type: text
    content: You laid things out fair and square;
  - type: text
    content: You set down the foundations in Jacob,
  - type: text
    content: Foundation stones of just and right ways.
  - type: text
    content: 'Honor '
  - type: text
    content: God
  - type: text
    content: ', our God; worship his rule!'
  - type: text
    content: Holy. Yes, holy.
  '6':
  - type: text
    content: Moses and Aaron were his priests,
  - type: text
    content: Samuel among those who prayed to him.
  - type: text
    content: 'They prayed to '
  - type: text
    content: God
  - type: text
    content: ' and he answered them;'
  - type: text
    content: He spoke from the pillar of cloud.
  - type: text
    content: And they did what he said; they kept the law he gave them.
  - type: text
    content: 'And then '
  - type: text
    content: God
  - type: text
    content: ', our God, answered them'
  - type: text
    content: (But you were never soft on their sins).
  - type: text
    content: 'Lift high '
  - type: text
    content: God
  - type: text
    content: ', our God; worship at his holy mountain.'
  - type: text
    content: 'Holy. Yes, holy is '
  - type: text
    content: God
  - type: text
    content: ' our God.'
