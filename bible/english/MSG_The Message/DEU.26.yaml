document_id: DEU.26,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Once you enter the land that '
  - type: text
    content: God
  - type: text
    content: ', your God, is giving you as an inheritance and take it over and settle down, you are to take some of all the firstfruits of what you grow in the land that '
  - type: text
    content: God
  - type: text
    content: ', your God, is giving you, put them in a basket and go to the place '
  - type: text
    content: God
  - type: text
    content: ', your God, sets apart for you to worship him. At that time, go to the priest who is there and say, “I announce to '
  - type: text
    content: God
  - type: text
    content: ', your God, today that I have entered the land that '
  - type: text
    content: God
  - type: text
    content: ' promised our ancestors that he’d give to us.” The priest will take the basket from you and place it on the Altar of '
  - type: text
    content: God
  - type: text
    content: ', your God. And there in the Presence of '
  - type: text
    content: God
  - type: text
    content: ', your God, you will recite:'
  '10':
  - type: text
    content: ' Then place it in the Presence of '
  - type: text
    content: God
  - type: text
    content: ', your God. Bow low in the Presence of '
  - type: text
    content: God
  - type: text
    content: ', your God. And rejoice! Celebrate all the good things that '
  - type: text
    content: God
  - type: text
    content: ', your God, has given you and your family; you and the Levite and the foreigner who lives with you.'
  - type: text
    content: '* * *'
  '12':
  - type: text
    content: 'Every third year, the year of the tithe, give a tenth of your produce to the Levite, the foreigner, the orphan, and the widow so that they may eat their fill in your cities. And then, in the Presence of '
  - type: text
    content: God
  - type: text
    content: ', your God, say this:'
  - type: text
    content: I have brought the sacred share,
  - type: text
    content: I’ve given it to the Levite, foreigner, orphan, and widow.
  - type: text
    content: What you commanded, I’ve done.
  - type: text
    content: I haven’t detoured around your commands,
  - type: text
    content: I haven’t forgotten a single one.
  - type: text
    content: I haven’t eaten from the sacred share while mourning,
  - type: text
    content: I haven’t removed any of it while ritually unclean,
  - type: text
    content: I haven’t used it in funeral feasts.
  - type: text
    content: 'I have listened obediently to the Voice of '
  - type: text
    content: God
  - type: text
    content: ', my God,'
  - type: text
    content: I have lived the way you commanded me.
  '15':
  - type: text
    content: Look down from your holy house in Heaven!
  - type: text
    content: Bless your people Israel and the ground you gave us,
  - type: text
    content: just as you promised our ancestors you would,
  - type: text
    content: this land flowing with milk and honey.
  - type: text
    content: '* * *'
  '16':
  - type: text
    content: 'This very day '
  - type: text
    content: God
  - type: text
    content: ', your God, commands you to follow these rules and regulations, to live them out with everything you have in you. You’ve renewed your vows today that '
  - type: text
    content: God
  - type: text
    content: ' is your God, that you’ll live the way he shows you; do what he tells you in the rules, regulations, and commandments; and listen obediently to him.'
  '18':
  - type: text
    content: 'And today '
  - type: text
    content: God
  - type: text
    content: ' has reaffirmed that you are dearly held treasure just as he promised, a people entrusted with keeping his commandments, a people set high above all other nations that he’s made, high in praise, fame, and honor: you’re a people holy to '
  - type: text
    content: God
  - type: text
    content: ', your God. That’s what he has promised.'
  - type: text
    content: '* * *'
  '5':
  - type: text
    content: ' A wandering Aramean was my father,'
  - type: text
    content: he went down to Egypt and sojourned there,
  - type: text
    content: he and just a handful of his brothers at first, but soon
  - type: text
    content: they became a great nation, mighty and many.
  - type: text
    content: The Egyptians abused and battered us,
  - type: text
    content: in a cruel and savage slavery.
  - type: text
    content: 'We cried out to '
  - type: text
    content: God
  - type: text
    content: ', the God-of-Our-Fathers:'
  - type: text
    content: He listened to our voice, he saw
  - type: text
    content: our destitution, our trouble, our cruel plight.
  - type: text
    content: 'And '
  - type: text
    content: God
  - type: text
    content: ' took us out of Egypt'
  - type: text
    content: with his strong hand and long arm, terrible and great,
  - type: text
    content: with signs and miracle-wonders.
  - type: text
    content: And he brought us to this place,
  - type: text
    content: gave us this land flowing with milk and honey.
  - type: text
    content: So here I am. I’ve brought the firstfruits
  - type: text
    content: 'of what I’ve grown on this ground you gave me, O '
  - type: text
    content: God
  - type: text
    content: .
