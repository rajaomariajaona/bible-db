document_id: DEU.26
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5a
  - type: text
    text: ' Once you enter the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is giving you as an inheritance and take it over and settle down, you are to take some of all the firstfruits of what you grow in the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, is giving you, put them in a basket and go to the place '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, sets apart for you to worship him. At that time, go to the priest who is there and say, “I announce to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, today that I have entered the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' promised our ancestors that he’d give to us.” The priest will take the basket from you and place it on the Altar of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. And there in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, you will recite:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5b-10a
  - type: text
    text: ' A wandering Aramean was my father,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he went down to Egypt and sojourned there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he and just a handful of his brothers at first, but soon
- type: usfm
  marker: q2
  children:
  - type: text
    text: they became a great nation, mighty and many.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The Egyptians abused and battered us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a cruel and savage slavery.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'We cried out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God-of-Our-Fathers:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He listened to our voice, he saw
- type: usfm
  marker: q2
  children:
  - type: text
    text: our destitution, our trouble, our cruel plight.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' took us out of Egypt'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with his strong hand and long arm, terrible and great,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with signs and miracle-wonders.
- type: usfm
  marker: q2
  children:
  - type: text
    text: And he brought us to this place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gave us this land flowing with milk and honey.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So here I am. I’ve brought the firstfruits
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'of what I’ve grown on this ground you gave me, O '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10b-11
  - type: text
    text: ' Then place it in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Bow low in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. And rejoice! Celebrate all the good things that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has given you and your family; you and the Levite and the foreigner who lives with you.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: 'Every third year, the year of the tithe, give a tenth of your produce to the Levite, the foreigner, the orphan, and the widow so that they may eat their fill in your cities. And then, in the Presence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, say this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have brought the sacred share,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ve given it to the Levite, foreigner, orphan, and widow.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What you commanded, I’ve done.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t detoured around your commands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t forgotten a single one.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t eaten from the sacred share while mourning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t removed any of it while ritually unclean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I haven’t used it in funeral feasts.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I have listened obediently to the Voice of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', my God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have lived the way you commanded me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Look down from your holy house in Heaven!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Bless your people Israel and the ground you gave us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as you promised our ancestors you would,
- type: usfm
  marker: q2
  children:
  - type: text
    text: this land flowing with milk and honey.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: 'This very day '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, commands you to follow these rules and regulations, to live them out with everything you have in you. You’ve renewed your vows today that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is your God, that you’ll live the way he shows you; do what he tells you in the rules, regulations, and commandments; and listen obediently to him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'And today '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has reaffirmed that you are dearly held treasure just as he promised, a people entrusted with keeping his commandments, a people set high above all other nations that he’s made, high in praise, fame, and honor: you’re a people holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. That’s what he has promised.'
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
