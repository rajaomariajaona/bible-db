document_id: PRO.24,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Intelligence Outranks Muscle
  - type: heading
    content: '19'
  - type: text
    content: Don’t envy bad people;
  - type: text
    content: don’t even want to be around them.
  - type: text
    content: All they think about is causing a disturbance;
  - type: text
    content: all they talk about is making trouble.
  - type: heading
    content: '20'
  '10':
  - type: text
    content: If you fall to pieces in a crisis,
  - type: text
    content: there wasn’t much to you in the first place.
  - type: heading
    content: '25'
  '11':
  - type: text
    content: Rescue the perishing;
  - type: text
    content: don’t hesitate to step in and help.
  - type: text
    content: If you say, “Hey, that’s none of my business,”
  - type: text
    content: will that get you off the hook?
  - type: text
    content: Someone is watching you closely, you know—
  - type: text
    content: Someone not impressed with weak excuses.
  - type: heading
    content: '26'
  '13':
  - type: text
    content: Eat honey, dear child—it’s good for you—
  - type: text
    content: and delicacies that melt in your mouth.
  - type: text
    content: Likewise knowledge,
  - type: text
    content: and wisdom for your soul—
  - type: text
    content: Get that and your future’s secured,
  - type: text
    content: your hope is on solid rock.
  - type: heading
    content: '27'
  '15':
  - type: text
    content: Don’t interfere with good people’s lives;
  - type: text
    content: don’t try to get the best of them.
  - type: text
    content: No matter how many times you trip them up,
  - type: text
    content: God-loyal people don’t stay down long;
  - type: text
    content: Soon they’re up on their feet,
  - type: text
    content: while the wicked end up flat on their faces.
  - type: heading
    content: '28'
  '17':
  - type: text
    content: Don’t laugh when your enemy falls;
  - type: text
    content: don’t gloat over his collapse.
  - type: text
    content: God
  - type: text
    content: ' might see, and become very provoked,'
  - type: text
    content: and then take pity on his plight.
  - type: heading
    content: '29'
  '19':
  - type: text
    content: Don’t bother your head with braggarts
  - type: text
    content: or wish you could succeed like the wicked.
  - type: text
    content: Those people have no future at all;
  - type: text
    content: they’re headed down a dead-end street.
  - type: heading
    content: '30'
  '21':
  - type: text
    content: 'Fear '
  - type: text
    content: God
  - type: text
    content: ', dear child—respect your leaders;'
  - type: text
    content: don’t be defiant or mutinous.
  - type: text
    content: Without warning your life can turn upside down,
  - type: text
    content: and who knows how or when it might happen?
  - type: heading
    content: More Sayings of the Wise
  - type: heading
    content: An Honest Answer
  '23':
  - type: text
    content: It’s wrong, very wrong,
  - type: text
    content: to go along with injustice.
  '24':
  - type: text
    content: Whoever whitewashes the wicked
  - type: text
    content: gets a black mark in the history books,
  - type: text
    content: But whoever exposes the wicked
  - type: text
    content: will be thanked and rewarded.
  '26':
  - type: text
    content: An honest answer
  - type: text
    content: is like a warm hug.
  '27':
  - type: text
    content: First plant your fields;
  - type: text
    content: then
  - type: text
    content: ' build your barn.'
  '28':
  - type: text
    content: Don’t talk about your neighbors behind their backs—
  - type: text
    content: no slander or gossip, please.
  - type: text
    content: Don’t say to anyone, “I’ll get back at you for what you did to me.
  - type: text
    content: I’ll make you pay for what you did!”
  '3':
  - type: text
    content: It takes wisdom to build a house,
  - type: text
    content: and understanding to set it on a firm foundation;
  - type: text
    content: It takes knowledge to furnish its rooms
  - type: text
    content: with fine furniture and beautiful draperies.
  - type: heading
    content: '21'
  '30':
  - type: text
    content: One day I walked by the field of an old lazybones,
  - type: text
    content: and then passed the vineyard of a slob;
  - type: text
    content: They were overgrown with weeds,
  - type: text
    content: thick with thistles, all the fences broken down.
  - type: text
    content: I took a long look and pondered what I saw;
  - type: text
    content: 'the fields preached me a sermon and I listened:'
  - type: text
    content: “A nap here, a nap there, a day off here, a day off there,
  - type: text
    content: sit back, take it easy—do you know what comes next?
  - type: text
    content: 'Just this: You can look forward to a dirt-poor life,'
  - type: text
    content: with poverty as your permanent houseguest!”
  '5':
  - type: text
    content: It’s better to be wise than strong;
  - type: text
    content: intelligence outranks muscle any day.
  - type: text
    content: Strategic planning is the key to warfare;
  - type: text
    content: to win, you need a lot of good counsel.
  - type: heading
    content: '22'
  '7':
  - type: text
    content: Wise conversation is way over the head of fools;
  - type: text
    content: in a serious discussion they haven’t a clue.
  - type: heading
    content: '23'
  '8':
  - type: text
    content: The person who’s always cooking up some evil
  - type: text
    content: soon gets a reputation as prince of rogues.
  - type: text
    content: Fools incubate sin;
  - type: text
    content: cynics desecrate beauty.
  - type: heading
    content: Rescue the Perishing
  - type: heading
    content: '24'
