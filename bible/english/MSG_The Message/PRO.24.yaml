document_id: PRO.24,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intelligence Outranks Muscle
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '19'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t envy bad people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t even want to be around them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All they think about is causing a disturbance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all they talk about is making trouble.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '20'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you fall to pieces in a crisis,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there wasn’t much to you in the first place.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '25'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue the perishing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t hesitate to step in and help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you say, “Hey, that’s none of my business,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will that get you off the hook?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Someone is watching you closely, you know—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Someone not impressed with weak excuses.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '26'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eat honey, dear child—it’s good for you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and delicacies that melt in your mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Likewise knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wisdom for your soul—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get that and your future’s secured,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your hope is on solid rock.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '27'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t interfere with good people’s lives;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t try to get the best of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No matter how many times you trip them up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God-loyal people don’t stay down long;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soon they’re up on their feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the wicked end up flat on their faces.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '28'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t laugh when your enemy falls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t gloat over his collapse.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' might see, and become very provoked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then take pity on his plight.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '29'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t bother your head with braggarts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or wish you could succeed like the wicked.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those people have no future at all;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they’re headed down a dead-end street.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '30'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', dear child—respect your leaders;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t be defiant or mutinous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without warning your life can turn upside down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who knows how or when it might happen?
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: More Sayings of the Wise
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: An Honest Answer
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s wrong, very wrong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to go along with injustice.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever whitewashes the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gets a black mark in the history books,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But whoever exposes the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be thanked and rewarded.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An honest answer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a warm hug.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: First plant your fields;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' build your barn.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t talk about your neighbors behind their backs—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no slander or gossip, please.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t say to anyone, “I’ll get back at you for what you did to me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll make you pay for what you did!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It takes wisdom to build a house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and understanding to set it on a firm foundation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It takes knowledge to furnish its rooms
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with fine furniture and beautiful draperies.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '21'
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One day I walked by the field of an old lazybones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then passed the vineyard of a slob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were overgrown with weeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: thick with thistles, all the fences broken down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I took a long look and pondered what I saw;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the fields preached me a sermon and I listened:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A nap here, a nap there, a day off here, a day off there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sit back, take it easy—do you know what comes next?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Just this: You can look forward to a dirt-poor life,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with poverty as your permanent houseguest!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s better to be wise than strong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: intelligence outranks muscle any day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strategic planning is the key to warfare;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to win, you need a lot of good counsel.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '22'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wise conversation is way over the head of fools;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a serious discussion they haven’t a clue.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '23'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The person who’s always cooking up some evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: soon gets a reputation as prince of rogues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools incubate sin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cynics desecrate beauty.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rescue the Perishing
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: '24'
    marker-yv: yv-h
