document_id: ISA.52,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' Is Leading You Out of Here'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wake up, wake up! Pull on your boots, Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Dress up in your Sunday best, Jerusalem, holy city!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who want no part of God have been culled out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They won’t be coming along.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brush off the dust and get to your feet, captive Jerusalem!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Throw off your chains, captive daughter of Zion!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of here! Out of here! Leave this place!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t look back. Don’t contaminate yourselves with plunder.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just leave, but leave clean. Purify yourselves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the process of worship, carrying the holy vessels of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you don’t have to be in a hurry.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You’re not running from anybody!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is leading you out of here,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the God of Israel is also your rear guard.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: It Was Our Pains He Carried
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Just watch my servant blossom!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Exalted, tall, head and shoulders above the crowd!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he didn’t begin that way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At first everyone was appalled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He didn’t even look human—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a ruined face, disfigured past recognition.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations all over the world will be in awe, taken aback,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: kings shocked into silence when they see him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For what was unheard of they’ll see with their own eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what was unthinkable they’ll have right before them.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' says, “You were sold for nothing. You’re being bought back for nothing.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again, the Master, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', says, “Early on, my people went to Egypt and lived, strangers in the land. At the other end, Assyria oppressed them. And now, what have I here?” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree. “My people are hauled off again for no reason at all. Tyrants on the warpath, whooping it up, and day after day, incessantly, my reputation blackened. Now it’s time that my people know who I am, what I’m made of—yes, that I have something to say. Here I am!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How beautiful on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are the feet of the messenger bringing good news,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Breaking the news that all’s well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: proclaiming good times, announcing salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: telling Zion, “Your God reigns!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voices! Listen! Your scouts are shouting, thunderclap shouts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shouting in joyful unison.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They see with their own eyes
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' coming back to Zion.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Break into song! Boom it out, ruins of Jerusalem:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has comforted his people!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He’s redeemed Jerusalem!”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has rolled up his sleeves.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the nations can see his holy, muscled arm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone, from one end of the earth to the other,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sees him at work, doing his salvation work.
