document_id: ISA.52,97
type_code: eng
verses:
  '1':
  - type: heading
    content: God Is Leading You Out of Here
  - type: text
    content: Wake up, wake up! Pull on your boots, Zion!
  - type: text
    content: Dress up in your Sunday best, Jerusalem, holy city!
  - type: text
    content: Those who want no part of God have been culled out.
  - type: text
    content: They won’t be coming along.
  - type: text
    content: Brush off the dust and get to your feet, captive Jerusalem!
  - type: text
    content: Throw off your chains, captive daughter of Zion!
  '11':
  - type: text
    content: Out of here! Out of here! Leave this place!
  - type: text
    content: Don’t look back. Don’t contaminate yourselves with plunder.
  - type: text
    content: Just leave, but leave clean. Purify yourselves
  - type: text
    content: 'in the process of worship, carrying the holy vessels of '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: But you don’t have to be in a hurry.
  - type: text
    content: You’re not running from anybody!
  - type: text
    content: God
  - type: text
    content: ' is leading you out of here,'
  - type: text
    content: and the God of Israel is also your rear guard.
  - type: heading
    content: It Was Our Pains He Carried
  '13':
  - type: text
    content: “Just watch my servant blossom!
  - type: text
    content: Exalted, tall, head and shoulders above the crowd!
  - type: text
    content: But he didn’t begin that way.
  - type: text
    content: At first everyone was appalled.
  - type: text
    content: He didn’t even look human—
  - type: text
    content: a ruined face, disfigured past recognition.
  - type: text
    content: Nations all over the world will be in awe, taken aback,
  - type: text
    content: kings shocked into silence when they see him.
  - type: text
    content: For what was unheard of they’ll see with their own eyes,
  - type: text
    content: what was unthinkable they’ll have right before them.”
  '3':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' says, “You were sold for nothing. You’re being bought back for nothing.”'
  '4':
  - type: text
    content: 'Again, the Master, '
  - type: text
    content: God
  - type: text
    content: ', says, “Early on, my people went to Egypt and lived, strangers in the land. At the other end, Assyria oppressed them. And now, what have I here?” '
  - type: text
    content: God
  - type: text
    content: ’s Decree. “My people are hauled off again for no reason at all. Tyrants on the warpath, whooping it up, and day after day, incessantly, my reputation blackened. Now it’s time that my people know who I am, what I’m made of—yes, that I have something to say. Here I am!”
  '7':
  - type: text
    content: How beautiful on the mountains
  - type: text
    content: are the feet of the messenger bringing good news,
  - type: text
    content: Breaking the news that all’s well,
  - type: text
    content: proclaiming good times, announcing salvation,
  - type: text
    content: telling Zion, “Your God reigns!”
  - type: text
    content: Voices! Listen! Your scouts are shouting, thunderclap shouts,
  - type: text
    content: shouting in joyful unison.
  - type: text
    content: They see with their own eyes
  - type: text
    content: God
  - type: text
    content: ' coming back to Zion.'
  - type: text
    content: 'Break into song! Boom it out, ruins of Jerusalem:'
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ' has comforted his people!'
  - type: text
    content: He’s redeemed Jerusalem!”
  - type: text
    content: God
  - type: text
    content: ' has rolled up his sleeves.'
  - type: text
    content: All the nations can see his holy, muscled arm.
  - type: text
    content: Everyone, from one end of the earth to the other,
  - type: text
    content: sees him at work, doing his salvation work.
