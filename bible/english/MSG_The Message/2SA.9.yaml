document_id: 2SA.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Open Table for Mephibosheth
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: One day David asked, “Is there anyone left of Saul’s family? If so, I’d like to show him some kindness in honor of Jonathan.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It happened that a servant from Saul’s household named Ziba was there. They called him into David’s presence. The king asked him, “Are you Ziba?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes sir,” he replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The king asked, “Is there anyone left from the family of Saul to whom I can show some godly kindness?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Ziba told the king, “Yes, there is Jonathan’s son, lame in both feet.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Where is he?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “He’s living at the home of Makir son of Ammiel in Lo Debar.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: King David didn’t lose a minute. He sent and got him from the home of Makir son of Ammiel in Lo Debar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When Mephibosheth son of Jonathan (who was the son of Saul), came before David, he bowed deeply, abasing himself, honoring David.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'David spoke his name: “Mephibosheth.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes sir?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Don’t be frightened,” said David. “I’d like to do something special for you in memory of your father Jonathan. To begin with, I’m returning to you all the properties of your grandfather Saul. Furthermore, from now on you’ll take all your meals at my table.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Shuffling and stammering, not looking him in the eye, Mephibosheth said, “Who am I that you pay attention to a stray dog like me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: David then called in Ziba, Saul’s right-hand man, and told him, “Everything that belonged to Saul and his family, I’ve handed over to your master’s grandson. You and your sons and your servants will work his land and bring in the produce, provisions for your master’s grandson. Mephibosheth himself, your master’s grandson, from now on will take all his meals at my table.” Ziba had fifteen sons and twenty servants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: “All that my master the king has ordered his servant,” answered Ziba, “your servant will surely do.”
- type: usfm
  marker: p
  children:
  - type: text
    text: And Mephibosheth ate at David’s table, just like one of the royal family. Mephibosheth also had a small son named Mica. All who were part of Ziba’s household were now the servants of Mephibosheth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mephibosheth lived in Jerusalem, taking all his meals at the king’s table. He was lame in both feet.
