document_id: ROM.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: Be sure to welcome our friend Phoebe in the way of the Master, with all the generous hospitality we Christians are famous for. I heartily endorse both her and her work. She’s a key representative of the church at Cenchrea. Help her out in whatever she asks. She deserves anything you can do for her. She’s helped many a person, including me.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hello to Apelles, a tried-and-true veteran in following Christ.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hello to the family of Aristobulus.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hello to my cousin Herodion.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hello to those who belong to the Lord from the family of Narcissus.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hello to Tryphena and Tryphosa—such diligent women in serving the Master.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hello to Persis, a dear friend and hard worker in Christ.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Hello to Rufus—a good choice by the Master!—and his mother. She has also been a dear mother to me.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Hello to Asyncritus, Phlegon, Hermes, Patrobas, Hermas, and also to all of their families.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hello to Philologus, Julia, Nereus and his sister, and Olympas—and all the followers of Jesus who live with them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Holy hugs all around! All the churches of Christ send their warmest greetings!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: One final word of counsel, friends. Keep a sharp eye out for those who take bits and pieces of the teaching that you learned and then use them to make trouble. Give these people a wide berth. They have no intention of living for our Master Christ. They’re only in this for what they can get out of it, and aren’t above using pious sweet talk to dupe unsuspecting innocents.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: 'And so while there has never been any question about your honesty in these matters—I couldn’t be more proud of you!—I want you also to be smart, making sure every “good” thing is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: real
    - type: text
      text: ' thing. Don’t be gullible in regard to smooth-talking evil. Stay alert like this, and before you know it the God of peace will come down on Satan with both feet, stomping him into the dirt. Enjoy the best of Jesus!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: And here are some more greetings from our end. Timothy, my partner in this work, Lucius, and my cousins Jason and Sosipater all said to tell you hello.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I, Tertius, who wrote this letter at Paul’s dictation, send you my personal greetings.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Gaius, who is host here to both me and the whole church, wants to be remembered to you.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Erastus, the city treasurer, and our good friend Quartus send their greetings.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: 'All of our praise rises to the One who is strong enough to make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: text
      text: ' strong, exactly as preached in Jesus Christ, precisely as revealed in the mystery kept secret for so long but now an open book through the prophetic Scriptures. All the nations of the world can now know the truth and be brought into obedient belief, carrying out the orders of God, who got all this started, down to the final detail.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: All our praise is focused through Jesus on this incomparably wise God! Yes!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-5
    - type: text
      text: Say hello to Priscilla and Aquila, who have worked hand in hand with me in serving Jesus. They once put their lives on the line for me. And I’m not the only one grateful to them. All the non-Jewish gatherings of believers also owe them plenty, to say nothing of the church that meets in their house.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hello to my dear friend Epenetus. He was the very first follower of Jesus in the province of Asia.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hello to Mary. What a worker she has turned out to be!
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hello to my cousins Andronicus and Junias. We once shared a jail cell. They were believers in Christ before I was. Both of them are outstanding leaders.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hello to Ampliatus, my good friend in the family of God.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Hello to Urbanus, our companion in Christ’s work, and my good friend Stachys.
