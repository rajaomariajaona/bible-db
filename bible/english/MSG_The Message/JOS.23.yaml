document_id: JOS.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joshua’s Charge
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' A long time later, after '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' had given Israel rest from all their surrounding enemies, and Joshua was a venerable old man, Joshua called all Israel together—elders, chiefs, judges, and officers. Then he spoke to them:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-3
  - type: text
    text: ' “I’m an old man. I’ve lived a long time. You have seen everything that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has done to these nations because of you. He did it because he’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. He fought for you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: '“Stay alert: I have assigned to you by lot these nations that remain as an inheritance to your tribes—these in addition to the nations I have already cut down—from the Jordan to the Great Sea in the west. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will drive them out of your path until there’s nothing left of them and you’ll take over their land just as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, promised you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: '“Now, stay strong and steady. Obediently do everything written in the Book of The Revelation of Moses—don’t miss a detail. Don’t get mixed up with the nations that are still around. Don’t so much as speak the names of their gods or swear by them. And by all means don’t worship or pray to them. Hold tight to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, just as you’ve done up to now.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has driven out superpower nations before you. And up to now, no one has been able to stand up to you. Think of it—one of you, single-handedly, putting a thousand on the run! Because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Because he fights for you, just as he promised you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-13
  - type: text
    text: '“Now, vigilantly guard your souls: Love '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God. Because if you wander off and start taking up with these remaining nations still among you (intermarry, say, and have other dealings with them), know for certain that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, will not get rid of these nations for you. They’ll be nothing but trouble to you—horsewhips on your backs and sand in your eyes—until you’re the ones who will be driven out of this good land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has given you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“As you can see, I’m about to go the way we all end up going. Know this with all your heart, with everything in you, that not one detail has failed of all the good things '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, promised you. It has all happened. Nothing’s left undone—not so much as a word.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: '“But just as sure as everything good that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, has promised has come true, so also '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will bring to pass every bad thing until there’s nothing left of you in this good land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has given you. If you leave the path of the Covenant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', your God, that he commanded you, go off and serve and worship other gods, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s anger will blaze out against you. In no time at all there’ll be nothing left of you, no sign that you’ve ever been in this good land he gave you.”
