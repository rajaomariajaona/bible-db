  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' majestic,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: praise abounds in our God-city!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His sacred mountain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: breathtaking in its heights—earth’s joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zion Mountain looms in the North,
- type: usfm
  marker: q2
  children:
  - type: text
    text: city of the world-King.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God in his citadel peaks
- type: usfm
  marker: q2
  children:
  - type: text
    text: undefeatable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: The kings got together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they united and came.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They took one look and shook their heads,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they scattered and ran away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They doubled up in pain
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a woman having a baby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: You smashed the ships of Tarshish
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a storm out of the East.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We heard about it, then we saw it
- type: usfm
  marker: q2
  children:
  - type: text
    text: with our eyes—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'In '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s city of Angel Armies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the city our God
- type: usfm
  marker: q1
  children:
  - type: text
    text: Set on firm foundations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: firm forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: We pondered your love-in-action, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'waiting in your temple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your name, God, evokes a train
- type: usfm
  marker: q2
  children:
  - type: text
    text: of Hallelujahs wherever
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is spoken, near and far;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your arms are heaped with goodness-in-action.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Be glad, Zion Mountain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Dance, Judah’s daughters!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He does what he said he’d do!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: Circle Zion, take her measure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: count her fortress peaks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gaze long at her sloping bulwark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: climb her citadel heights—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then you can tell the next generation
- type: usfm
  marker: q2
  children:
  - type: text
    text: detail by detail the story of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our God forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who guides us till the end of time.
