verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' majestic,'
  - type: text
    content: praise abounds in our God-city!
  - type: text
    content: His sacred mountain,
  - type: text
    content: breathtaking in its heights—earth’s joy.
  - type: text
    content: Zion Mountain looms in the North,
  - type: text
    content: city of the world-King.
  - type: text
    content: God in his citadel peaks
  - type: text
    content: undefeatable.
  '11':
  - type: text
    content: Be glad, Zion Mountain;
  - type: text
    content: Dance, Judah’s daughters!
  - type: text
    content: He does what he said he’d do!
  '12':
  - type: text
    content: Circle Zion, take her measure,
  - type: text
    content: count her fortress peaks,
  - type: text
    content: Gaze long at her sloping bulwark,
  - type: text
    content: climb her citadel heights—
  - type: text
    content: Then you can tell the next generation
  - type: text
    content: detail by detail the story of God,
  - type: text
    content: Our God forever,
  - type: text
    content: who guides us till the end of time.
  '4':
  - type: text
    content: The kings got together,
  - type: text
    content: they united and came.
  - type: text
    content: They took one look and shook their heads,
  - type: text
    content: they scattered and ran away.
  - type: text
    content: They doubled up in pain
  - type: text
    content: like a woman having a baby.
  '7':
  - type: text
    content: You smashed the ships of Tarshish
  - type: text
    content: with a storm out of the East.
  - type: text
    content: We heard about it, then we saw it
  - type: text
    content: with our eyes—
  - type: text
    content: 'In '
  - type: text
    content: God
  - type: text
    content: ’s city of Angel Armies,
  - type: text
    content: in the city our God
  - type: text
    content: Set on firm foundations,
  - type: text
    content: firm forever.
  '9':
  - type: text
    content: We pondered your love-in-action, God,
  - type: text
    content: 'waiting in your temple:'
  - type: text
    content: Your name, God, evokes a train
  - type: text
    content: of Hallelujahs wherever
  - type: text
    content: It is spoken, near and far;
  - type: text
    content: your arms are heaped with goodness-in-action.
