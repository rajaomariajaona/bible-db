document_id: ISA.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Virgin Will Bear a Son
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: During the time that Ahaz son of Jotham, son of Uzziah, was king of Judah, King Rezin of Aram and King Pekah son of Remaliah of Israel attacked Jerusalem, but the attack sputtered out. When the Davidic government learned that Aram had joined forces with Ephraim (that is, Israel), Ahaz and his people were badly shaken. They shook like trees in the wind.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-6
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' told Isaiah, “Go and meet Ahaz. Take your son Shear-jashub (A-Remnant-Will-Return) with you. Meet him south of the city at the end of the aqueduct where it empties into the upper pool on the road to the public laundry. Tell him, Listen, calm down. Don’t be afraid. And don’t panic over these two burnt-out cases, Rezin of Aram and the son of Remaliah. They talk big but there’s nothing to them. Aram, along with Ephraim’s son of Remaliah, have plotted to do you harm. They’ve conspired against you, saying, ‘Let’s go to war against Judah, dismember it, take it for ourselves, and set the son of Tabeel up as a puppet king over it.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: 'But '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “It won’t happen.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Nothing will come of it
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because the capital of Aram is Damascus
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the king of Damascus is a mere man, Rezin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As for Ephraim, in sixty-five years
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be rubble, nothing left of it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The capital of Ephraim is Samaria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the king of Samaria is the mere son of Remaliah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you don’t take your stand in faith,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you won’t have a leg to stand on.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' spoke again to Ahaz. This time he said, “Ask for a sign from your '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . Ask anything. Be extravagant. Ask for the moon!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But Ahaz said, “I’d never do that. I’d never make demands like that on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-17
  - type: text
    text: 'So Isaiah told him, “Then listen to this, government of David! It’s bad enough that you make people tired with your pious, timid hypocrisies, but now you’re making God tired. So the Master is going to give you a sign anyway. Watch for this: A girl who is presently a virgin will get pregnant. She’ll bear a son and name him Immanuel (God-With-Us). By the time the child is twelve years old, able to make moral decisions, the threat of war will be over. Relax, those two kings that have you so worried will be out of the picture. But also be warned: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will bring on you and your people and your government a judgment worse than anything since the time the kingdom split, when Ephraim left Judah. The king of Assyria is coming!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'That’s when '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' will whistle for the flies at the headwaters of Egypt’s Nile, and whistle for the bees in the land of Assyria. They’ll come and infest every nook and cranny of this country. There’ll be no getting away from them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And that’s when the Master will take the razor rented from across the Euphrates—the king of Assyria no less!—and shave the hair off your heads and genitals, leaving you shamed, exposed, and denuded. He’ll shave off your beards while he’s at it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: It will be a time when survivors will count themselves lucky to have a cow and a couple of sheep. At least they’ll have plenty of milk! Whoever’s left in the land will learn to make do with the simplest foods—curds, whey, and honey.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-25
  - type: text
    text: But that’s not the end of it. This country that used to be covered with fine vineyards—thousands of them, worth millions!—will revert to a weed patch. Weeds and thornbushes everywhere! Good for nothing except, perhaps, hunting rabbits. Cattle and sheep will forage as best they can in the fields of weeds—but there won’t be a trace of all those fertile and well-tended gardens and fields.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
