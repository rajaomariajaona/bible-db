document_id: NUM.20,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Camp Kadesh
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the first month, the entire company of the People of Israel arrived in the Wilderness of Zin. The people stayed in Kadesh.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miriam died there, and she was buried.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: With that Moses raised his arm and slammed his staff against the rock—once, twice. Water poured out. Congregation and cattle drank.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses and Aaron, “Because you didn’t trust me, didn’t treat me with holy reverence in front of the People of Israel, you two aren’t going to lead this company into the land that I am giving them.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'These were the Waters of Meribah (Bickering) where the People of Israel bickered with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', and he revealed himself as holy.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-16
    - type: text
      text: 'Moses sent emissaries from Kadesh to the king of Edom with this message: “A message from your brother Israel: You are familiar with all the trouble we’ve run into. Our ancestors went down to Egypt and lived there a long time. The Egyptians viciously abused both us and our ancestors. But when we cried out for help to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', he heard our cry. He sent an angel and got us out of Egypt. And now here we are at Kadesh, a town at the border of your land.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Will you give us permission to cut across your land? We won’t trespass through your fields or orchards and we won’t drink out of your wells; we’ll keep to the main road, the King’s Road, straying neither right nor left until we’ve crossed your border.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The king of Edom answered, “Not on your life. If you so much as set a foot on my land, I’ll kill you.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The People of Israel said, “Look, we’ll stay on the main road. If we or our animals drink any water, we’ll pay you for it. We’re harmless—just a company of footsore travelers.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-5
    - type: text
      text: 'There was no water there for the community, so they ganged up on Moses and Aaron. They attacked Moses: “We wish we’d died when the rest of our brothers died before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Why did you haul this congregation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' out here into this wilderness to die, people and cattle alike? And why did you take us out of Egypt in the first place, dragging us into this miserable country? No grain, no figs, no grapevines, no pomegranates—and now not even any water!”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: 'He answered again: “No. You may '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' come through.” And Edom came out and blocked the way with a crowd of people brandishing weapons. Edom refused to let them cross through his land. So Israel had to detour around him.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Camp Hor
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The People of Israel, the entire company, set out from Kadesh and traveled to Mount Hor.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-26
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Moses and Aaron at Mount Hor at the border of Edom, “It’s time for Aaron to be gathered into the company of his ancestors. He will not enter the land I am giving to the People of Israel because you both rebelled against my orders at the Waters of Meribah. So take Aaron and his son Eleazar and lead them up Mount Hor. Remove Aaron’s clothes from him and put them on his son Eleazar. Aaron will be gathered there; Aaron will die.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-29
    - type: text
      text: 'Moses obeyed '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s command. They climbed Mount Hor as the whole congregation watched. Moses took off Aaron’s clothes and put them on his son Eleazar. Aaron died on top of the mountain. Then Moses and Eleazar came down from the mountain. The whole congregation, getting the news that Aaron had died, went into thirty days of mourning for him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moses and Aaron walked from the assembled congregation to the Tent of Meeting and threw themselves facedown on the ground. And they saw the Glory of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Take the staff. Assemble the community, you and your brother Aaron. Speak to that rock that’s right in front of them and it will give water. You will bring water out of the rock for them; congregation and cattle will both drink.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'Moses took the staff away from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s presence, as commanded. He and Aaron rounded up the whole congregation in front of the rock. Moses spoke: “Listen, rebels! Do we have to bring water out of this rock for you?”'
