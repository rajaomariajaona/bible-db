document_id: EZK.7,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fate Has Caught Up with You
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Word came to me, saying, “You, son of man—
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, has this Message for the land of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Endtime.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The end of business as usual for everyone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s all over. The end is upon you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ve launched my anger against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve issued my verdict on the way you live.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll make you pay for your disgusting obscenities.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I won’t look the other way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I won’t feel sorry for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ll make you pay for the way you’ve lived:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your disgusting obscenities will boomerang on you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and you’ll realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .’
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Judgment Day!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Fate has caught up with you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The scepter outsized and pretentious,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pride bursting all bounds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Violence strutting,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brandishing the evil scepter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But there’s nothing to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nothing will be left of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Time’s up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Countdown: five, four, three, two . . . '
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Buyer, don’t boast; seller, don’t worry:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judgment wrath has turned the world topsy-turvy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bottom has dropped out of buying and selling.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will never be the same again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But don’t fantasize an upturn in the market.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The country is bankrupt because of its sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it’s not going to get any better.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“‘The trumpet signals the call to battle:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Present arms!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But no one marches into battle.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My wrath has them paralyzed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the open roads you’re killed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or else you go home and die of hunger and disease.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Either get murdered out in the country
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or die of sickness or hunger in town.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Survivors run for the hills.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They moan like doves in the valleys,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each one moaning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for his own sins.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘Every hand hangs limp,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every knee turns to rubber.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They dress in rough burlap—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sorry scarecrows,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shifty and shamefaced,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with their heads shaved bald.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “‘They throw their money into the gutters.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their hard-earned cash stinks like garbage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They find that it won’t buy a thing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they either want or need on Judgment Day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They tripped on money
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fell into sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proud and pretentious with their jewels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they deck out their vile and vulgar no-gods in finery.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll make those god-obscenities a stench in their nostrils.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll give away their religious junk—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strangers will pick it up for free,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the godless spit on it and make jokes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll turn my face so I won’t have to look
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as my treasured place and people are violated,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As violent strangers walk in
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and desecrate place and people—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A bloody massacre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as crime and violence fill the city.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll bring in the dregs of humanity
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to move into their houses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll put a stop to the boasting and strutting
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the high-and-mighty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And see to it that there’ll be nothing holy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: left in their holy places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Catastrophe descends. They look for peace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but there’s no peace to be found—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster on the heels of disaster,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one rumor after another.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They clamor for the prophet to tell them what’s up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but nobody knows anything.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Priests don’t have a clue;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the elders don’t know what to say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king holds his head in despair;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the prince is devastated.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The common people are paralyzed.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gripped by fear, they can’t move.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll deal with them where they are,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: judge them on their terms.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They’ll know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .’”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the Master, say:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Disaster after disaster! Look, it comes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Endtime—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the end comes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The end is ripe. Watch out, it’s coming!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is your fate, you who live in this land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Time’s up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It’s zero hour.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No dragging of feet now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no bargaining for more time.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soon now I’ll pour my wrath on you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay out my anger against you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Render my verdict on the way you’ve lived,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make you pay for your disgusting obscenities.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I won’t look the other way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I won’t feel sorry for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll make you pay for the way you’ve lived.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your disgusting obscenities will boomerang on you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you’ll realize
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that it is I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', who have hit you.'
