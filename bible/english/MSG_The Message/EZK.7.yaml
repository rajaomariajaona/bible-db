document_id: EZK.7,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Fate Has Caught Up with You
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s Word came to me, saying, “You, son of man—
  - type: text
    content: God
  - type: text
    content: ', the Master, has this Message for the land of Israel:'
  - type: text
    content: “‘Endtime.
  - type: text
    content: The end of business as usual for everyone.
  - type: text
    content: It’s all over. The end is upon you.
  - type: text
    content: I’ve launched my anger against you.
  - type: text
    content: I’ve issued my verdict on the way you live.
  - type: text
    content: I’ll make you pay for your disgusting obscenities.
  - type: text
    content: I won’t look the other way,
  - type: text
    content: I won’t feel sorry for you.
  - type: text
    content: 'I’ll make you pay for the way you’ve lived:'
  - type: text
    content: Your disgusting obscenities will boomerang on you,
  - type: text
    content: 'and you’ll realize that I am '
  - type: text
    content: God
  - type: text
    content: .’
  '10':
  - type: text
    content: “‘Judgment Day!
  - type: text
    content: Fate has caught up with you.
  - type: text
    content: The scepter outsized and pretentious,
  - type: text
    content: pride bursting all bounds,
  - type: text
    content: Violence strutting,
  - type: text
    content: brandishing the evil scepter.
  - type: text
    content: But there’s nothing to them,
  - type: text
    content: and nothing will be left of them.
  - type: text
    content: Time’s up.
  - type: text
    content: 'Countdown: five, four, three, two . . . '
  - type: text
    content: 'Buyer, don’t boast; seller, don’t worry:'
  - type: text
    content: Judgment wrath has turned the world topsy-turvy.
  - type: text
    content: The bottom has dropped out of buying and selling.
  - type: text
    content: It will never be the same again.
  - type: text
    content: But don’t fantasize an upturn in the market.
  - type: text
    content: The country is bankrupt because of its sins,
  - type: text
    content: and it’s not going to get any better.
  '14':
  - type: text
    content: '“‘The trumpet signals the call to battle:'
  - type: text
    content: “Present arms!”
  - type: text
    content: But no one marches into battle.
  - type: text
    content: My wrath has them paralyzed!
  - type: text
    content: On the open roads you’re killed,
  - type: text
    content: or else you go home and die of hunger and disease.
  - type: text
    content: Either get murdered out in the country
  - type: text
    content: or die of sickness or hunger in town.
  - type: text
    content: Survivors run for the hills.
  - type: text
    content: They moan like doves in the valleys,
  - type: text
    content: Each one moaning
  - type: text
    content: for his own sins.
  '17':
  - type: text
    content: “‘Every hand hangs limp,
  - type: text
    content: every knee turns to rubber.
  - type: text
    content: They dress in rough burlap—
  - type: text
    content: sorry scarecrows,
  - type: text
    content: Shifty and shamefaced,
  - type: text
    content: with their heads shaved bald.
  '19':
  - type: text
    content: “‘They throw their money into the gutters.
  - type: text
    content: Their hard-earned cash stinks like garbage.
  - type: text
    content: They find that it won’t buy a thing
  - type: text
    content: they either want or need on Judgment Day.
  - type: text
    content: They tripped on money
  - type: text
    content: and fell into sin.
  - type: text
    content: Proud and pretentious with their jewels,
  - type: text
    content: they deck out their vile and vulgar no-gods in finery.
  - type: text
    content: I’ll make those god-obscenities a stench in their nostrils.
  - type: text
    content: I’ll give away their religious junk—
  - type: text
    content: strangers will pick it up for free,
  - type: text
    content: the godless spit on it and make jokes.
  - type: text
    content: I’ll turn my face so I won’t have to look
  - type: text
    content: as my treasured place and people are violated,
  - type: text
    content: As violent strangers walk in
  - type: text
    content: and desecrate place and people—
  - type: text
    content: A bloody massacre,
  - type: text
    content: as crime and violence fill the city.
  - type: text
    content: I’ll bring in the dregs of humanity
  - type: text
    content: to move into their houses.
  - type: text
    content: I’ll put a stop to the boasting and strutting
  - type: text
    content: of the high-and-mighty,
  - type: text
    content: And see to it that there’ll be nothing holy
  - type: text
    content: left in their holy places.
  - type: text
    content: Catastrophe descends. They look for peace,
  - type: text
    content: but there’s no peace to be found—
  - type: text
    content: Disaster on the heels of disaster,
  - type: text
    content: one rumor after another.
  - type: text
    content: They clamor for the prophet to tell them what’s up,
  - type: text
    content: but nobody knows anything.
  - type: text
    content: Priests don’t have a clue;
  - type: text
    content: the elders don’t know what to say.
  - type: text
    content: The king holds his head in despair;
  - type: text
    content: the prince is devastated.
  - type: text
    content: The common people are paralyzed.
  - type: text
    content: Gripped by fear, they can’t move.
  - type: text
    content: I’ll deal with them where they are,
  - type: text
    content: judge them on their terms.
  - type: text
    content: 'They’ll know that I am '
  - type: text
    content: God
  - type: text
    content: .’”
  '5':
  - type: text
    content: '“I, '
  - type: text
    content: God
  - type: text
    content: ', the Master, say:'
  - type: text
    content: ‘Disaster after disaster! Look, it comes!
  - type: text
    content: Endtime—
  - type: text
    content: the end comes.
  - type: text
    content: The end is ripe. Watch out, it’s coming!
  - type: text
    content: This is your fate, you who live in this land.
  - type: text
    content: Time’s up.
  - type: text
    content: It’s zero hour.
  - type: text
    content: No dragging of feet now,
  - type: text
    content: no bargaining for more time.
  - type: text
    content: Soon now I’ll pour my wrath on you,
  - type: text
    content: pay out my anger against you,
  - type: text
    content: Render my verdict on the way you’ve lived,
  - type: text
    content: make you pay for your disgusting obscenities.
  - type: text
    content: I won’t look the other way,
  - type: text
    content: I won’t feel sorry for you.
  - type: text
    content: I’ll make you pay for the way you’ve lived.
  - type: text
    content: Your disgusting obscenities will boomerang on you.
  - type: text
    content: Then you’ll realize
  - type: text
    content: 'that it is I, '
  - type: text
    content: God
  - type: text
    content: ', who have hit you.'
