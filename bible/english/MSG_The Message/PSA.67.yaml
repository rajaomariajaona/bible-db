document_id: PSA.67,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, mark us with grace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and blessing! Smile!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole country will see how you work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the godless nations see how you save.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God! Let people thank and enjoy you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all people thank and enjoy you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all far-flung people become happy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shout their happiness because
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You judge them fair and square,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you tend the far-flung peoples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God! Let people thank and enjoy you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all people thank and enjoy you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Earth, display your exuberance!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You mark us with blessing, O God, our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You mark us with blessing, O God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Earth’s four corners—honor him!
