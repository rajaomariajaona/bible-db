document_id: PSA.67,97
type_code: eng
verses:
  '1':
  - type: text
    content: God, mark us with grace
  - type: text
    content: and blessing! Smile!
  - type: text
    content: The whole country will see how you work,
  - type: text
    content: all the godless nations see how you save.
  - type: text
    content: God! Let people thank and enjoy you.
  - type: text
    content: Let all people thank and enjoy you.
  - type: text
    content: Let all far-flung people become happy
  - type: text
    content: and shout their happiness because
  - type: text
    content: You judge them fair and square,
  - type: text
    content: you tend the far-flung peoples.
  - type: text
    content: God! Let people thank and enjoy you.
  - type: text
    content: Let all people thank and enjoy you.
  - type: text
    content: Earth, display your exuberance!
  - type: text
    content: You mark us with blessing, O God, our God.
  - type: text
    content: You mark us with blessing, O God.
  - type: text
    content: Earth’s four corners—honor him!
