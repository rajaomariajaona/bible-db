document_id: LEV.22,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell Aaron and his sons to treat the holy offerings that the Israelites consecrate to me with reverence so they won’t desecrate my holy name. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-13
    - type: text
      text: “No layperson may eat anything set apart as holy. Nor may a priest’s guest or his hired hand eat anything holy. But if a priest buys a slave, the slave may eat of it; also the slaves born in his house may eat his food. If a priest’s daughter marries a layperson, she may no longer eat from the holy contributions. But if the priest’s daughter is widowed or divorced and without children and returns to her father’s household as before, she may eat of her father’s food. But no layperson may eat of it.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “If anyone eats from a holy offering accidentally, he must give back the holy offering to the priest and add twenty percent to it.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: '“The priests must not treat with irreverence the holy offerings of the Israelites that they contribute to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' lest they desecrate themselves and make themselves guilty when they eat the holy offerings. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who makes them holy.”'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-25
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “Tell Aaron and his sons and all the People of Israel, Each and every one of you, whether native born or foreigner, who presents a Whole-Burnt-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' to fulfill a vow or as a Freewill-Offering, must make sure that it is a male without defect from cattle, sheep, or goats for it to be acceptable. Don’t try slipping in some creature that has a defect—it won’t be accepted. Whenever anyone brings an offering from cattle or sheep as a Peace-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' to fulfill a vow or as a Freewill-Offering, it has to be perfect, without defect, to be acceptable. Don’t try giving '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' an animal that is blind, crippled, mutilated, an animal with running sores, a rash, or mange. Don’t place any of these on the Altar as a gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. You may, though, offer an ox or sheep that is deformed or stunted as a Freewill-Offering, but it is not acceptable in fulfilling a vow. Don’t offer to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' an animal with bruised, crushed, torn, or cut-off testicles. Don’t do this in your own land but don’t accept them from foreigners and present them as food for your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' either. Because of deformities and defects they will not be acceptable.”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-30
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses: “When a calf or lamb or goat is born, it is to stay with its mother for seven days. After the eighth day, it is acceptable as an offering, a gift to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. Don’t slaughter both a cow or ewe and its young on the same day. When you sacrifice a Thanksgiving-Offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', do it right so it will be acceptable. Eat it on the same day; don’t leave any leftovers until morning. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Tell them, From now on, if any of your descendants approaches in a state of ritual uncleanness the holy offerings that the Israelites consecrate to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', he will be cut off from my presence. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“Do what I tell you; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: live
    - type: text
      text: ' what I tell you. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 32-33
    - type: text
      text: '“Don’t desecrate my holy name. I insist on being treated with holy reverence among the People of Israel. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who makes you holy and brought you out of Egypt to be your God. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-8
    - type: text
      text: '“Each and every one of Aaron’s descendants who has an infectious skin disease or a discharge may not eat any of the holy offerings until he is clean. Also, if he touches anything defiled by a corpse, or has an emission of semen, or is contaminated by touching a crawling creature, or touches a person who is contaminated for whatever reason—a person who touches any such thing will be ritually unclean until evening and may not eat any of the holy offerings unless he has washed well with water. After the sun goes down he is clean and may go ahead and eat the holy offerings; they are his food. But he must not contaminate himself by eating anything found dead or torn by wild animals. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“The priests must observe my instructions lest they become guilty and die by treating the offerings with irreverence. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who makes them holy.'
