document_id: JOB.35,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Elihu’s Third Speech
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: When God Makes Creation a Classroom
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Elihu lit into Job again:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Does this kind of thing make any sense?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: First you say, ‘I’m perfectly innocent before God.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And then you say, ‘It doesn’t make a bit of difference
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whether I’ve sinned or not.’
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Job, you talk sheer nonsense—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nonstop nonsense!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Well, I’m going to show you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you don’t know what you’re talking about,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neither you nor your friends.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look up at the sky. Take a long hard look.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: See those clouds towering above you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you sin, what difference could that make to God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No matter how much you sin, will it matter to him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if you’re good, what would God get out of that?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you think he’s dependent on your accomplishments?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The only ones who care whether you’re good or bad
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are your family and friends and neighbors.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God’s not dependent on your behavior.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When times get bad, people cry out for help.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They cry for relief from being kicked around,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But never give God a thought when things go well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when God puts spontaneous songs in their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When God sets out the entire creation as a science classroom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: using birds and beasts to teach wisdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People are arrogantly indifferent to God—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until, of course, they’re in trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then God is indifferent to them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s nothing behind such prayers except panic;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Almighty pays them no mind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So why would he notice you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just because you say you’re tired of waiting to be heard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or waiting for him to get good and angry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do something about the world’s problems?
