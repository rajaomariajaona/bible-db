document_id: JOB.35,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu’s Third Speech
  - type: heading
    content: When God Makes Creation a Classroom
  - type: text
    content: 'Elihu lit into Job again:'
  - type: text
    content: “Does this kind of thing make any sense?
  - type: text
    content: First you say, ‘I’m perfectly innocent before God.’
  - type: text
    content: And then you say, ‘It doesn’t make a bit of difference
  - type: text
    content: whether I’ve sinned or not.’
  '16':
  - type: text
    content: “Job, you talk sheer nonsense—
  - type: text
    content: nonstop nonsense!”
  '4':
  - type: text
    content: “Well, I’m going to show you
  - type: text
    content: that you don’t know what you’re talking about,
  - type: text
    content: neither you nor your friends.
  - type: text
    content: Look up at the sky. Take a long hard look.
  - type: text
    content: See those clouds towering above you?
  - type: text
    content: If you sin, what difference could that make to God?
  - type: text
    content: No matter how much you sin, will it matter to him?
  - type: text
    content: Even if you’re good, what would God get out of that?
  - type: text
    content: Do you think he’s dependent on your accomplishments?
  - type: text
    content: The only ones who care whether you’re good or bad
  - type: text
    content: are your family and friends and neighbors.
  - type: text
    content: God’s not dependent on your behavior.
  '9':
  - type: text
    content: “When times get bad, people cry out for help.
  - type: text
    content: They cry for relief from being kicked around,
  - type: text
    content: But never give God a thought when things go well,
  - type: text
    content: when God puts spontaneous songs in their hearts,
  - type: text
    content: When God sets out the entire creation as a science classroom,
  - type: text
    content: using birds and beasts to teach wisdom.
  - type: text
    content: People are arrogantly indifferent to God—
  - type: text
    content: until, of course, they’re in trouble,
  - type: text
    content: and then God is indifferent to them.
  - type: text
    content: There’s nothing behind such prayers except panic;
  - type: text
    content: the Almighty pays them no mind.
  - type: text
    content: So why would he notice you
  - type: text
    content: just because you say you’re tired of waiting to be heard,
  - type: text
    content: Or waiting for him to get good and angry
  - type: text
    content: and do something about the world’s problems?
