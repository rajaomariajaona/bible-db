document_id: EZR.1,97
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Cyrus King of Persia: “Build The Temple of God!”'
  - type: text
    content: 'In the first year of Cyrus king of Persia—this fulfilled the Message of '
  - type: text
    content: God
  - type: text
    content: ' preached by Jeremiah—'
  - type: text
    content: God
  - type: text
    content: ' prodded Cyrus king of Persia to make an official announcement throughout his kingdom. He wrote it out as follows:'
  - type: text
    content: 'From Cyrus king of Persia, a Proclamation: '
  - type: text
    content: God
  - type: text
    content: ', the God of the heavens, has given me all the kingdoms of the earth. He has also assigned me to build him a Temple of worship in Jerusalem, Judah. Who among you belongs to his people? God be with you! Go to Jerusalem which is in Judah and build The Temple of '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, Jerusalem’s God. Those who stay behind, wherever they happen to live, will support them with silver, gold, tools, and pack animals, along with Freewill-Offerings for The Temple of God in Jerusalem.'
  '11':
  - type: text
    content: All told, there were 5,400 gold and silver articles that Sheshbazzar took with him when he brought the exiles back from Babylon to Jerusalem.
  '5':
  - type: text
    content: 'The heads of the families of Judah and Benjamin, along with the priests and Levites—everyone, in fact, God prodded—set out to build The Temple of '
  - type: text
    content: God
  - type: text
    content: ' in Jerusalem. Their neighbors rallied behind them enthusiastically with silver, gold, tools, pack animals, expensive gifts, and, over and above these, Freewill-Offerings.'
  '7':
  - type: text
    content: 'Also, King Cyrus turned over to them all the vessels and utensils from The Temple of '
  - type: text
    content: God
  - type: text
    content: ' that Nebuchadnezzar had hauled from Jerusalem and put in the temple of his gods. Cyrus king of Persia put Mithredath the treasurer in charge of the transfer; he provided a full inventory for Sheshbazzar the prince of Judah, including the following:'
  - type: text
    content: 30 gold dishes
  - type: text
    content: 1,000 silver dishes
  - type: text
    content: 29 silver pans
  - type: text
    content: 30 gold bowls
  - type: text
    content: 410 duplicate silver bowls
  - type: text
    content: 1,000 miscellaneous items.
