document_id: EZR.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Cyrus King of Persia: “Build The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '!”'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-4
  - type: text
    text: 'In the first year of Cyrus king of Persia—this fulfilled the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' preached by Jeremiah—'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' prodded Cyrus king of Persia to make an official announcement throughout his kingdom. He wrote it out as follows:'
- type: usfm
  marker: pmo
  children:
  - type: text
    text: 'From Cyrus king of Persia, a Proclamation: '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of the heavens, has given me all the kingdoms of the earth. He has also assigned me to build him a Temple of worship in Jerusalem, Judah. Who among you belongs to his people? God be with you! Go to Jerusalem which is in Judah and build The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the God of Israel, Jerusalem’s God. Those who stay behind, wherever they happen to live, will support them with silver, gold, tools, and pack animals, along with Freewill-Offerings for The Temple of God in Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: 'The heads of the families of Judah and Benjamin, along with the priests and Levites—everyone, in fact, God prodded—set out to build The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' in Jerusalem. Their neighbors rallied behind them enthusiastically with silver, gold, tools, pack animals, expensive gifts, and, over and above these, Freewill-Offerings.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-10
  - type: text
    text: 'Also, King Cyrus turned over to them all the vessels and utensils from The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' that Nebuchadnezzar had hauled from Jerusalem and put in the temple of his gods. Cyrus king of Persia put Mithredath the treasurer in charge of the transfer; he provided a full inventory for Sheshbazzar the prince of Judah, including the following:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 30 gold dishes
- type: usfm
  marker: li1
  children:
  - type: text
    text: 1,000 silver dishes
- type: usfm
  marker: li1
  children:
  - type: text
    text: 29 silver pans
- type: usfm
  marker: li1
  children:
  - type: text
    text: 30 gold bowls
- type: usfm
  marker: li1
  children:
  - type: text
    text: 410 duplicate silver bowls
- type: usfm
  marker: li1
  children:
  - type: text
    text: 1,000 miscellaneous items.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All told, there were 5,400 gold and silver articles that Sheshbazzar took with him when he brought the exiles back from Babylon to Jerusalem.
