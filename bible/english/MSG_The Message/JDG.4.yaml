document_id: JDG.4,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Deborah
  - type: text
    content: 'The People of Israel kept right on doing evil in '
  - type: text
    content: God
  - type: text
    content: '’s sight. With Ehud dead, '
  - type: text
    content: God
  - type: text
    content: ' sold them off to Jabin king of Canaan who ruled from Hazor. Sisera, who lived in Harosheth Haggoyim, was the commander of his army. The People of Israel cried out to '
  - type: text
    content: God
  - type: text
    content: ' because he had cruelly oppressed them with his nine hundred iron chariots for twenty years.'
  '11':
  - type: text
    content: It happened that Heber the Kenite had parted company with the other Kenites, the descendants of Hobab, Moses’ in-law. He was now living at Zaanannim Oak near Kedesh. They told Sisera that Barak son of Abinoam had gone up to Mount Tabor. Sisera immediately called up all his chariots to the Kishon River—nine hundred iron chariots!—along with all his troops who were with him at Harosheth Haggoyim.
  '14':
  - type: text
    content: 'Deborah said to Barak, “Charge! This very day '
  - type: text
    content: God
  - type: text
    content: ' has given you victory over Sisera. Isn’t '
  - type: text
    content: God
  - type: text
    content: ' marching before you?”'
  - type: text
    content: Barak charged down the slopes of Mount Tabor, his ten companies following him.
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' routed Sisera—all those chariots, all those troops!—before Barak. Sisera jumped out of his chariot and ran. Barak chased the chariots and troops all the way to Harosheth Haggoyim. Sisera’s entire fighting force was killed—not one man left.'
  '17':
  - type: text
    content: Meanwhile Sisera, running for his life, headed for the tent of Jael, wife of Heber the Kenite. Jabin king of Hazor and Heber the Kenite were on good terms with one another. Jael stepped out to meet Sisera and said, “Come in, sir. Stay here with me. Don’t be afraid.”
  - type: text
    content: So he went with her into her tent. She covered him with a blanket.
  '19':
  - type: text
    content: He said to her, “Please, a little water. I’m thirsty.”
  - type: text
    content: She opened a bottle of milk, gave him a drink, and then covered him up again.
  '20':
  - type: text
    content: He then said, “Stand at the tent flap. If anyone comes by and asks you, ‘Is there anyone here?’ tell him, ‘No, not a soul.’”
  '21':
  - type: text
    content: Then while he was fast asleep from exhaustion, Jael wife of Heber took a tent peg and hammer, tiptoed toward him, and drove the tent peg through his temple and all the way into the ground. He convulsed and died.
  '22':
  - type: text
    content: Barak arrived in pursuit of Sisera. Jael went out to greet him. She said, “Come, I’ll show you the man you’re looking for.” He went with her and there he was—Sisera, stretched out, dead, with a tent peg through his temple.
  '23':
  - type: text
    content: On that day God subdued Jabin king of Canaan before the People of Israel. The People of Israel pressed harder and harder on Jabin king of Canaan until there was nothing left of him.
  - type: text
    content: '* * *'
  '4':
  - type: text
    content: Deborah was a prophet, the wife of Lappidoth. She was judge over Israel at that time. She held court under Deborah’s Palm between Ramah and Bethel in the hills of Ephraim. The People of Israel went to her in matters of justice.
  '6':
  - type: text
    content: 'She sent for Barak son of Abinoam from Kedesh in Naphtali and said to him, “It has become clear that '
  - type: text
    content: God
  - type: text
    content: ', the God of Israel, commands you: Go to Mount Tabor and prepare for battle. Take ten companies of soldiers from Naphtali and Zebulun. I’ll take care of getting Sisera, the leader of Jabin’s army, to the Kishon River with all his chariots and troops. And I’ll make sure you win the battle.”'
  '8':
  - type: text
    content: Barak said, “If you go with me, I’ll go. But if you don’t go with me, I won’t go.”
  '9':
  - type: text
    content: 'She said, “Of course I’ll go with you. But understand that with an attitude like that, there’ll be no glory in it for you. '
  - type: text
    content: God
  - type: text
    content: ' will use a woman’s hand to take care of Sisera.”'
  - type: text
    content: Deborah got ready and went with Barak to Kedesh. Barak called Zebulun and Naphtali together at Kedesh. Ten companies of men followed him. And Deborah was with him.
