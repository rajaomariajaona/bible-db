document_id: JDG.4,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deborah
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-3
    - type: text
      text: 'The People of Israel kept right on doing evil in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s sight. With Ehud dead, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' sold them off to Jabin king of Canaan who ruled from Hazor. Sisera, who lived in Harosheth Haggoyim, was the commander of his army. The People of Israel cried out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' because he had cruelly oppressed them with his nine hundred iron chariots for twenty years.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-13
    - type: text
      text: It happened that Heber the Kenite had parted company with the other Kenites, the descendants of Hobab, Moses’ in-law. He was now living at Zaanannim Oak near Kedesh. They told Sisera that Barak son of Abinoam had gone up to Mount Tabor. Sisera immediately called up all his chariots to the Kishon River—nine hundred iron chariots!—along with all his troops who were with him at Harosheth Haggoyim.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Deborah said to Barak, “Charge! This very day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' has given you victory over Sisera. Isn’t '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' marching before you?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Barak charged down the slopes of Mount Tabor, his ten companies following him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' routed Sisera—all those chariots, all those troops!—before Barak. Sisera jumped out of his chariot and ran. Barak chased the chariots and troops all the way to Harosheth Haggoyim. Sisera’s entire fighting force was killed—not one man left.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: Meanwhile Sisera, running for his life, headed for the tent of Jael, wife of Heber the Kenite. Jabin king of Hazor and Heber the Kenite were on good terms with one another. Jael stepped out to meet Sisera and said, “Come in, sir. Stay here with me. Don’t be afraid.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he went with her into her tent. She covered him with a blanket.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He said to her, “Please, a little water. I’m thirsty.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: She opened a bottle of milk, gave him a drink, and then covered him up again.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He then said, “Stand at the tent flap. If anyone comes by and asks you, ‘Is there anyone here?’ tell him, ‘No, not a soul.’”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then while he was fast asleep from exhaustion, Jael wife of Heber took a tent peg and hammer, tiptoed toward him, and drove the tent peg through his temple and all the way into the ground. He convulsed and died.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Barak arrived in pursuit of Sisera. Jael went out to greet him. She said, “Come, I’ll show you the man you’re looking for.” He went with her and there he was—Sisera, stretched out, dead, with a tent peg through his temple.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: On that day God subdued Jabin king of Canaan before the People of Israel. The People of Israel pressed harder and harder on Jabin king of Canaan until there was nothing left of him.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: Deborah was a prophet, the wife of Lappidoth. She was judge over Israel at that time. She held court under Deborah’s Palm between Ramah and Bethel in the hills of Ephraim. The People of Israel went to her in matters of justice.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'She sent for Barak son of Abinoam from Kedesh in Naphtali and said to him, “It has become clear that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel, commands you: Go to Mount Tabor and prepare for battle. Take ten companies of soldiers from Naphtali and Zebulun. I’ll take care of getting Sisera, the leader of Jabin’s army, to the Kishon River with all his chariots and troops. And I’ll make sure you win the battle.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Barak said, “If you go with me, I’ll go. But if you don’t go with me, I won’t go.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'She said, “Of course I’ll go with you. But understand that with an attitude like that, there’ll be no glory in it for you. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will use a woman’s hand to take care of Sisera.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Deborah got ready and went with Barak to Kedesh. Barak called Zebulun and Naphtali together at Kedesh. Ten companies of men followed him. And Deborah was with him.
