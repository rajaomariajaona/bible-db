segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When the Lamb ripped off the seventh seal, Heaven fell quiet—complete silence for about half an hour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Blowing the Trumpets
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: text
    text: I saw the Seven Angels who are always in readiness before God handed seven trumpets. Then another Angel, carrying a gold censer, came and stood at the Altar. He was given a great quantity of incense so that he could offer up the prayers of all the holy people of God on the Golden Altar before the Throne. Smoke billowed up from the incense-laced prayers of the holy ones, rose before God from the hand of the Angel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then the Angel filled the censer with fire from the Altar and heaved it to earth. It set off thunders, voices, lightnings, and an earthquake.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: The Seven Angels with the trumpets got ready to blow them. At the first trumpet blast, hail and fire mixed with blood were dumped on earth. A third of the earth was scorched, a third of the trees, and every blade of green grass—burned to a crisp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: The second Angel trumpeted. Something like a huge mountain blazing with fire was flung into the sea. A third of the sea turned to blood, a third of the living sea creatures died, and a third of the ships sank.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: The third Angel trumpeted. A huge Star, blazing like a torch, fell from Heaven, wiping out a third of the rivers and a third of the springs. The Star’s name was Wormwood. A third of the water turned bitter, and many people died from the poisoned water.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The fourth Angel trumpeted. A third of the sun, a third of the moon, and a third of the stars were hit, blacked out by a third, both day and night in one-third blackout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I looked hard; I heard a lone eagle, flying through Middle-Heaven, crying out ominously, “Doom! Doom! Doom to everyone left on earth! There are three more Angels about to blow their trumpets. Doom is on its way!”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
