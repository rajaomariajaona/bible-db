document_id: EZK.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Back to Your Own Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: '“And now, son of man, prophesy to the mountains of Israel. Say, ‘Mountains of Israel, listen to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says, Because the enemy crowed over you, “Good! Those old hills are now ours!” now here is a prophecy in the name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: Because nations came at you from all sides, ripping and plundering, hauling pieces of you off every which way, and you’ve become the butt of cheap gossip and jokes, therefore, Mountains of Israel, listen to the Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master. My Message to mountains and hills, to ditches and valleys, to the heaps of rubble and the emptied towns that are looted for plunder and turned into jokes by all the surrounding nations: Therefore, says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, now I’m speaking in a fiery rage against the rest of the nations, but especially against Edom, who in an orgy of violence and shameless insolence robbed me of my land, grabbed it for themselves.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: '“Therefore prophesy over the land of Israel, preach to the mountains and hills, to every ditch and valley: ‘The Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: Look! Listen! I’m angry—and I care. I’m speaking to you because you’ve been humiliated among the nations. Therefore I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, am telling you that I’ve solemnly sworn that the nations around you are next. It’s their turn to be humiliated.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-12
  - type: text
    text: '“‘But you, Mountains of Israel, will burst with new growth, putting out branches and bearing fruit for my people Israel. My people are coming home! Do you see? I’m back again. I’m on your side. You’ll be plowed and planted as before! I’ll see to it that your population grows all over Israel, that the towns fill up with people, that the ruins are rebuilt. I’ll make this place teem with life—human and animal. The country will burst into life, life, and more life, your towns and villages full of people just as in the old days. I’ll treat you better than I ever have. And you’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: . I’ll put people over you—my own people Israel! They’ll take care of you and you’ll be their inheritance. Never again will you be a harsh and unforgiving land to them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-15
  - type: text
    text: “‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master, says: Because you have a reputation of being a land that eats people alive and makes women barren, I’m now telling you that you’ll never eat people alive again nor make women barren. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master. And I’ll never again let the taunts of outsiders be heard over you nor permit nations to look down on you. You’ll no longer be a land that makes women barren. Decree of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master.’”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-21
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message came to me: “Son of man, when the people of Israel lived in their land, they polluted it by the way they lived. I poured out my anger on them because of the polluted blood they poured out on the ground. And so I got thoroughly angry with them polluting the country with their wanton murders and dirty gods. I kicked them out, exiled them to other countries. I sentenced them according to how they had lived. Wherever they went, they gave me a bad name. People said, ‘These are '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s people, but they got kicked off his land.’ I suffered much pain over my holy reputation, which the people of Israel blackened in every country they entered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: '“Therefore, tell Israel, ‘Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: I’m not doing this for you, Israel. I’m doing it for me, to save my character, my holy name, which you’ve blackened in every country where you’ve gone. I’m going to put my great and holy name on display, the name that has been ruined in so many countries, the name that you blackened wherever you went. Then the nations will realize who I really am, that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', when I show my holiness through you so that they can see it with their own eyes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-28
  - type: text
    text: '“‘For here’s what I’m going to do: I’m going to take you out of these countries, gather you from all over, and bring you back to your own land. I’ll pour pure water over you and scrub you clean. I’ll give you a new heart, put a new spirit in you. I’ll remove the stone heart from your body and replace it with a heart that’s God-willed, not self-willed. I’ll put my Spirit in you and make it possible for you to do what I tell you and live by my commands. You’ll once again live in the land I gave your ancestors. You’ll be my people! I’ll be your God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: “‘I’ll pull you out of that stinking pollution. I’ll give personal orders to the wheat fields, telling them to grow bumper crops. I’ll send no more famines. I’ll make sure your fruit trees and field crops flourish. Other nations won’t be able to hold you in contempt again because of famine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “‘And then you’ll think back over your terrible lives—the evil, the shame—and be thoroughly disgusted with yourselves, realizing how badly you’ve lived—all those obscenities you’ve carried out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “‘I’m not doing this for you. Get this through your thick heads! Shame on you. What a mess you made of things, Israel!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 33-36
  - type: text
    text: '“‘Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: On the day I scrub you clean from all your filthy living, I’ll also make your cities livable. The ruins will be rebuilt. The neglected land will be worked again, no longer overgrown with weeds and thistles, worthless in the eyes of passersby. People will exclaim, “Why, this weed patch has been turned into a Garden of Eden! And the ruined cities, smashed into oblivion, are now thriving!” The nations around you that are still in existence will realize that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', rebuild ruins and replant empty waste places. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', said so, and I’ll do it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-38
  - type: text
    text: '“‘Message of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', the Master: Yet again I’m going to do what Israel asks. I’ll increase their population as with a flock of sheep. Like the milling flocks of sheep brought for sacrifices in Jerusalem during the appointed feasts, the ruined cities will be filled with flocks of people. And they’ll realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .’”
