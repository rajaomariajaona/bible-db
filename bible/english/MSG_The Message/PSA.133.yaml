document_id: PSA.133,97
type_code: eng
verses:
  '1':
  - type: text
    content: How wonderful, how beautiful,
  - type: text
    content: when brothers and sisters get along!
  - type: text
    content: It’s like costly anointing oil
  - type: text
    content: flowing down head and beard,
  - type: text
    content: Flowing down Aaron’s beard,
  - type: text
    content: flowing down the collar of his priestly robes.
  - type: text
    content: It’s like the dew on Mount Hermon
  - type: text
    content: flowing down the slopes of Zion.
  - type: text
    content: 'Yes, that’s where '
  - type: text
    content: God
  - type: text
    content: ' commands the blessing,'
  - type: text
    content: ordains eternal life.
