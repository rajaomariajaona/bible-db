verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How wonderful, how beautiful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when brothers and sisters get along!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s like costly anointing oil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flowing down head and beard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Flowing down Aaron’s beard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flowing down the collar of his priestly robes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s like the dew on Mount Hermon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flowing down the slopes of Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, that’s where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' commands the blessing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ordains eternal life.
