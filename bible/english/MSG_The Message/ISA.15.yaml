document_id: ISA.15,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Poignant Cries Reverberate Through Moab
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A Message concerning Moab:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Village Ar of Moab is in ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroyed in a night raid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Village Kir of Moab is in ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroyed in a night raid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Village Dibon climbs to its chapel in the hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: goes up to lament.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab weeps and wails
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over Nebo and Medba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every head is shaved bald,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every beard shaved clean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pour into the streets wearing black,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: go up on the roofs, take to the town square,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone in tears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone in grief.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Towns Heshbon and Elealeh cry long and loud.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The sound carries as far as Jahaz.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab sobs, shaking in grief.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The soul of Moab trembles.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, how I grieve for Moab!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Refugees stream to Zoar
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then on to Eglath-shelishiyah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Up the slopes of Luhith they weep;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the road to Horonaim they cry their loss.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The springs of Nimrim are dried up—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grass brown, buds stunted, nothing grows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They leave, carrying all their possessions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on their backs, everything they own,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Making their way as best they can
  - type: usfm
    marker: q2
    children:
    - type: text
      text: across Willow Creek to safety.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poignant cries reverberate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all through Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gut-wrenching sobs as far as Eglaim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: heart-racking sobs all the way to Beer-elim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The banks of the Dibon crest with blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but God has worse in store for Dibon:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A lion—a lion to finish off the fugitives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to clean up whoever’s left in the land.
