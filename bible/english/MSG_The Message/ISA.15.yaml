document_id: ISA.15,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Poignant Cries Reverberate Through Moab
  - type: text
    content: 'A Message concerning Moab:'
  - type: text
    content: Village Ar of Moab is in ruins,
  - type: text
    content: destroyed in a night raid.
  - type: text
    content: Village Kir of Moab is in ruins,
  - type: text
    content: destroyed in a night raid.
  - type: text
    content: Village Dibon climbs to its chapel in the hills,
  - type: text
    content: goes up to lament.
  - type: text
    content: Moab weeps and wails
  - type: text
    content: over Nebo and Medba.
  - type: text
    content: Every head is shaved bald,
  - type: text
    content: every beard shaved clean.
  - type: text
    content: They pour into the streets wearing black,
  - type: text
    content: go up on the roofs, take to the town square,
  - type: text
    content: Everyone in tears,
  - type: text
    content: everyone in grief.
  - type: text
    content: Towns Heshbon and Elealeh cry long and loud.
  - type: text
    content: The sound carries as far as Jahaz.
  - type: text
    content: Moab sobs, shaking in grief.
  - type: text
    content: The soul of Moab trembles.
  '5':
  - type: text
    content: Oh, how I grieve for Moab!
  - type: text
    content: Refugees stream to Zoar
  - type: text
    content: and then on to Eglath-shelishiyah.
  - type: text
    content: Up the slopes of Luhith they weep;
  - type: text
    content: on the road to Horonaim they cry their loss.
  - type: text
    content: The springs of Nimrim are dried up—
  - type: text
    content: grass brown, buds stunted, nothing grows.
  - type: text
    content: They leave, carrying all their possessions
  - type: text
    content: on their backs, everything they own,
  - type: text
    content: Making their way as best they can
  - type: text
    content: across Willow Creek to safety.
  - type: text
    content: Poignant cries reverberate
  - type: text
    content: all through Moab,
  - type: text
    content: Gut-wrenching sobs as far as Eglaim,
  - type: text
    content: heart-racking sobs all the way to Beer-elim.
  - type: text
    content: The banks of the Dibon crest with blood,
  - type: text
    content: 'but God has worse in store for Dibon:'
  - type: text
    content: A lion—a lion to finish off the fugitives,
  - type: text
    content: to clean up whoever’s left in the land.
