document_id: 2CH.33,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: King Manasseh
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Manasseh was twelve years old when he became king. He ruled for fifty-five years in Jerusalem. In '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s opinion he was a bad king—an evil king. He reintroduced all the moral rot and spiritual corruption that had been scoured from the country when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' dispossessed the pagan nations in favor of the children of Israel. He rebuilt the sex-and-religion shrines that his father Hezekiah had torn down, he built altars and phallic images for the sex god Baal and the sex goddess Asherah and worshiped the cosmic powers, taking orders from the constellations. He built shrines to the cosmic powers and placed them in both courtyards of The Temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the very Jerusalem Temple dedicated exclusively by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s decree to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Name (“in Jerusalem I place my Name”). He burned his own sons in a sacrificial rite in the Valley of Ben Hinnom. He practiced witchcraft and fortunetelling. He held séances and consulted spirits from the underworld. Much evil—in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s view a career in evil. And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was angry.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' directed the leaders of the troops of the king of Assyria to come after Manasseh. They put a hook in his nose, shackles on his feet, and took him off to Babylon. Now that he was in trouble, he dropped to his knees in prayer asking for help—total repentance before the God of his ancestors. As he prayed, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was touched; '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' listened and brought him back to Jerusalem as king. That convinced Manasseh that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' was in control.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After that Manasseh rebuilt the outside defensive wall of the City of David to the west of the Gihon spring in the valley. It went from the Fish Gate and around the hill of Ophel. He also increased its height. He tightened up the defense system by posting army captains in all the fortress cities of Judah. He also did a good spring cleaning on The Temple, carting out the pagan idols and the goddess statue. He took all the altars he had set up on The Temple hill and throughout Jerusalem and dumped them outside the city. He put the Altar of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' back in working order and restored worship, sacrificing Peace-Offerings and Thank-Offerings. He issued orders to the people: “You shall serve and worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel.” But the people didn’t take him seriously—they used the name “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ” but kept on going to the old pagan neighborhood shrines and doing the same old things.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The rest of the history of Manasseh—his prayer to his God, and the sermons the prophets personally delivered by authority of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', the God of Israel—this is all written in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Chronicles of the Kings of Israel
    - type: text
      text: . His prayer and how God was touched by his prayer, a list of all his sins and the things he did wrong, the actual places where he built the pagan shrines, the installation of the sex-goddess Asherah sites, and the idolatrous images that he worshiped previous to his conversion—this is all described in the records of the prophets.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Manasseh died, they buried him in the palace garden. His son Amon was the next king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: King Amon
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Amon was twenty-two years old when he became king. He was king for two years in Jerusalem. In '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s opinion he lived an evil life, just like his father Manasseh, but he never did repent to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' as Manasseh repented. He just kept at it, going from one thing to another.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the end Amon’s servants revolted and assassinated him—killed the king right in his own palace. The citizens in their turn then killed the king’s assassins. The citizens then crowned Josiah, Amon’s son, as king.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As a last straw he placed a carved image of the sex goddess Asherah that he had commissioned in The Temple of God, a flagrant and provocative violation of God’s well-known command to both David and Solomon, “In this Temple and in this city Jerusalem, my choice out of all the tribes of Israel, I place my Name—exclusively and forever.” He had promised, “Never again will I let my people Israel wander off from this land I’ve given to their ancestors. But on this condition, that they keep everything I’ve commanded in the instructions my servant Moses passed on to them.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Manasseh led Judah and the citizens of Jerusalem off the beaten path into practices of evil exceeding even the evil of the pagan nations that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had earlier destroyed. When '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Manasseh and his people about this, they ignored him.'
