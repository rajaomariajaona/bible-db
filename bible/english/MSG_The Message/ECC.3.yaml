document_id: ECC.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: There’s a Right Time for Everything
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'There’s an opportune time to do things, a right time for everything on the earth:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-8
  - type: text
    text: A right time for birth and another for death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to plant and another to reap,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to kill and another to heal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to destroy and another to construct,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to cry and another to laugh,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to lament and another to cheer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to make love and another to abstain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to embrace and another to part,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to search and another to count your losses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to hold on and another to let go,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to rip out and another to mend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to shut up and another to speak up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to love and another to hate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A right time to wage war and another to make peace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-13
  - type: text
    text: But in the end, does it really make a difference what anyone does? I’ve had a good look at what God has given us to do—busywork, mostly. True, God made everything beautiful in itself and in its time—but he’s left us in the dark, so we can never know what God is up to, whether he’s coming or going. I’ve decided that there’s nothing better to do than go ahead and have a good time and get the most we can out of life. That’s it—eat, drink, and make the most of your job. It’s God’s gift.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I’ve also concluded that whatever God does, that’s the way it’s going to be, always. No addition, no subtraction. God’s done it and that’s it. That’s so we’ll quit asking questions and simply worship in holy fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Whatever was, is.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whatever will be, is.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s how it always is with God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Testing Us
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-18
  - type: text
    text: 'I took another good look at what’s going on: The very place of judgment—corrupt! The place of righteousness—corrupt! I said to myself, “God will judge righteous and wicked.” There’s a right time for every thing, every deed—and there’s no getting around it. I said to myself regarding the human race, “God’s testing the lot of us, showing us up as nothing but animals.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-22
  - type: text
    text: Humans and animals come to the same end—humans die, animals die. We all breathe the same air. So there’s really no advantage in being human. None. Everything’s smoke. We all end up in the same place—we all came from dust, we all end up as dust. Nobody knows for sure that the human spirit rises to heaven or that the animal spirit sinks into the earth. So I made up my mind that there’s nothing better for us men and women than to have a good time in whatever we do—that’s our lot. Who knows if there’s anything else to life?
