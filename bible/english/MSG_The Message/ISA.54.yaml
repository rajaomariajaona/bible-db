document_id: ISA.54,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Spread Out! Think Big!
  - type: text
    content: “Sing, barren woman, who has never had a baby.
  - type: text
    content: Fill the air with song, you who’ve never experienced childbirth!
  - type: text
    content: You’re ending up with far more children
  - type: text
    content: 'than all those childbearing women.” '
  - type: text
    content: God
  - type: text
    content: ' says so!'
  - type: text
    content: “Clear lots of ground for your tents!
  - type: text
    content: Make your tents large. Spread out! Think big!
  - type: text
    content: Use plenty of rope,
  - type: text
    content: drive the tent pegs deep.
  - type: text
    content: You’re going to need lots of elbow room
  - type: text
    content: for your growing family.
  - type: text
    content: You’re going to take over whole nations;
  - type: text
    content: you’re going to resettle abandoned cities.
  - type: text
    content: Don’t be afraid—you’re not going to be embarrassed.
  - type: text
    content: Don’t hold back—you’re not going to come up short.
  - type: text
    content: You’ll forget all about the humiliations of your youth,
  - type: text
    content: and the indignities of being a widow will fade from memory.
  - type: text
    content: For your Maker is your bridegroom,
  - type: text
    content: 'his name, '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies!
  - type: text
    content: Your Redeemer is The Holy of Israel,
  - type: text
    content: known as God of the whole earth.
  - type: text
    content: You were like an abandoned wife, devastated with grief,
  - type: text
    content: 'and '
  - type: text
    content: God
  - type: text
    content: ' welcomed you back,'
  - type: text
    content: Like a woman married young
  - type: text
    content: and then left,” says your God.
  '11':
  - type: text
    content: '“Afflicted city, storm-battered, unpitied:'
  - type: text
    content: I’m about to rebuild you with stones of turquoise,
  - type: text
    content: Lay your foundations with sapphires,
  - type: text
    content: construct your towers with rubies,
  - type: text
    content: Your gates with jewels,
  - type: text
    content: and all your walls with precious stones.
  - type: text
    content: 'All your children will have '
  - type: text
    content: God
  - type: text
    content: ' for their teacher—'
  - type: text
    content: what a mentor for your children!
  - type: text
    content: You’ll be built solid, grounded in righteousness,
  - type: text
    content: far from any trouble—nothing to fear!
  - type: text
    content: far from terror—it won’t even come close!
  - type: text
    content: If anyone attacks you,
  - type: text
    content: don’t for a moment suppose that I sent them,
  - type: text
    content: And if any should attack,
  - type: text
    content: nothing will come of it.
  - type: text
    content: I create the blacksmith
  - type: text
    content: who fires up his forge
  - type: text
    content: and makes a weapon designed to kill.
  - type: text
    content: I also create the destroyer—
  - type: text
    content: but no weapon that can hurt you has ever been forged.
  - type: text
    content: Any accuser who takes you to court
  - type: text
    content: will be dismissed as a liar.
  - type: text
    content: 'This is what '
  - type: text
    content: God
  - type: text
    content: ’s servants can expect.
  - type: text
    content: I’ll see to it that everything works out for the best.”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '7':
  - type: text
    content: 'Your Redeemer '
  - type: text
    content: God
  - type: text
    content: ' says:'
  - type: text
    content: “I left you, but only for a moment.
  - type: text
    content: Now, with enormous compassion, I’m bringing you back.
  - type: text
    content: In an outburst of anger I turned my back on you—
  - type: text
    content: but only for a moment.
  - type: text
    content: It’s with lasting love
  - type: text
    content: that I’m tenderly caring for you.
  '9':
  - type: text
    content: '“This exile is just like the days of Noah for me:'
  - type: text
    content: I promised then that the waters of Noah
  - type: text
    content: would never again flood the earth.
  - type: text
    content: I’m promising now no more anger,
  - type: text
    content: no more dressing you down.
  - type: text
    content: For even if the mountains walk away
  - type: text
    content: and the hills fall to pieces,
  - type: text
    content: My love won’t walk away from you,
  - type: text
    content: my covenant commitment of peace won’t fall apart.”
  - type: text
    content: 'The '
  - type: text
    content: God
  - type: text
    content: ' who has compassion on you says so.'
