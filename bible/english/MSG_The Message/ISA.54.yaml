document_id: ISA.54
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Spread Out! Think Big!
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-6
  - type: text
    text: “Sing, barren woman, who has never had a baby.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fill the air with song, you who’ve never experienced childbirth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re ending up with far more children
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'than all those childbearing women.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says so!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Clear lots of ground for your tents!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make your tents large. Spread out! Think big!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Use plenty of rope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: drive the tent pegs deep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re going to need lots of elbow room
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your growing family.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re going to take over whole nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you’re going to resettle abandoned cities.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t be afraid—you’re not going to be embarrassed.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t hold back—you’re not going to come up short.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll forget all about the humiliations of your youth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the indignities of being a widow will fade from memory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your Maker is your bridegroom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'his name, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your Redeemer is The Holy of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: known as God of the whole earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were like an abandoned wife, devastated with grief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' welcomed you back,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a woman married young
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then left,” says your God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'Your Redeemer '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I left you, but only for a moment.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now, with enormous compassion, I’m bringing you back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In an outburst of anger I turned my back on you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: but only for a moment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s with lasting love
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I’m tenderly caring for you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: '“This exile is just like the days of Noah for me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I promised then that the waters of Noah
- type: usfm
  marker: q2
  children:
  - type: text
    text: would never again flood the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m promising now no more anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more dressing you down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For even if the mountains walk away
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the hills fall to pieces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: My love won’t walk away from you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my covenant commitment of peace won’t fall apart.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' who has compassion on you says so.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-17
  - type: text
    text: '“Afflicted city, storm-battered, unpitied:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m about to rebuild you with stones of turquoise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lay your foundations with sapphires,
- type: usfm
  marker: q2
  children:
  - type: text
    text: construct your towers with rubies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your gates with jewels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all your walls with precious stones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All your children will have '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' for their teacher—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: what a mentor for your children!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll be built solid, grounded in righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: far from any trouble—nothing to fear!
- type: usfm
  marker: q2
  children:
  - type: text
    text: far from terror—it won’t even come close!
- type: usfm
  marker: q1
  children:
  - type: text
    text: If anyone attacks you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: don’t for a moment suppose that I sent them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if any should attack,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing will come of it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I create the blacksmith
- type: usfm
  marker: q2
  children:
  - type: text
    text: who fires up his forge
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes a weapon designed to kill.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I also create the destroyer—
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no weapon that can hurt you has ever been forged.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Any accuser who takes you to court
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be dismissed as a liar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s servants can expect.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’ll see to it that everything works out for the best.”
- type: usfm
  marker: q3
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
