  - type: text
    text: Climb God’s Mountain
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-5
  - type: text
    text: 'The Message Isaiah got regarding Judah and Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s a day coming
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when the mountain of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s House
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will be The Mountain—
- type: usfm
  marker: q2
  children:
  - type: text
    text: solid, towering over all mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All nations will river toward it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: people from all over set out for it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll say, “Come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'let’s climb '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Mountain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: go to the House of the God of Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll show us the way he works
- type: usfm
  marker: q2
  children:
  - type: text
    text: so we can live the way we’re made.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zion’s the source of the revelation.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Message comes from Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll settle things fairly between nations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’ll make things right between many peoples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll turn their swords into shovels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their spears into hoes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more will nation fight nation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they won’t play war anymore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come, family of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'let’s live in the light of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-9
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', you’ve walked out on your family Jacob'
- type: usfm
  marker: q2
  children:
  - type: text
    text: because their world is full of hokey religion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Philistine witchcraft, and pagan hocus-pocus,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a world rolling in wealth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Stuffed with things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no end to its machines and gadgets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gods—gods of all sorts and sizes.
- type: usfm
  marker: q2
  children:
  - type: text
    text: These people make their own gods and worship what they make.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A degenerate race, facedown in the gutter.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Don’t bother with them! They’re not worth forgiving!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pretentious Egos Brought Down to Earth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Head for the hills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hide in the caves
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'From the terror of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: from his dazzling presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-17
  - type: text
    text: People with a big head are headed for a fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pretentious egos brought down a peg.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It’s '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' alone at front-and-center'
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the Day we’re talking about,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The Day that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies
- type: usfm
  marker: q2
  children:
  - type: text
    text: is matched against all big-talking rivals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: against all swaggering big names;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against all giant sequoias
- type: usfm
  marker: q2
  children:
  - type: text
    text: hugely towering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and against the expansive chestnut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against Kilimanjaro and Annapurna,
- type: usfm
  marker: q2
  children:
  - type: text
    text: against the ranges of Alps and Andes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against every soaring skyscraper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: against all proud obelisks and statues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Against ocean-going luxury liners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: against elegant three-masted schooners.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The swelled big heads will be punctured bladders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the pretentious egos brought down to earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leaving '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' alone at front-and-center'
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the Day we’re talking about.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And all those sticks and stones
- type: usfm
  marker: q2
  children:
  - type: text
    text: dressed up to look like gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be gone for good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Clamber into caves in the cliffs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: duck into any hole you can find.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Hide from the terror of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: from his dazzling presence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he assumes his full stature on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: towering and terrifying.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: On that Day men and women will take
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sticks and stones
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ve decked out in gold and silver
- type: usfm
  marker: q2
  children:
  - type: text
    text: to look like gods and then worshiped,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And they will dump them
- type: usfm
  marker: q2
  children:
  - type: text
    text: in any ditch or gully,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then run for rock caves
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cliff hideouts
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'To hide from the terror of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: from his dazzling presence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he assumes his full stature on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: towering and terrifying.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quit scraping and fawning over mere humans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so full of themselves, so full of hot air!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can’t you see there’s nothing to them?
