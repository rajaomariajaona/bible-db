  '1':
  - type: heading
    content: Climb God’s Mountain
  - type: text
    content: 'The Message Isaiah got regarding Judah and Jerusalem:'
  - type: text
    content: There’s a day coming
  - type: text
    content: 'when the mountain of '
  - type: text
    content: God
  - type: text
    content: ’s House
  - type: text
    content: Will be The Mountain—
  - type: text
    content: solid, towering over all mountains.
  - type: text
    content: All nations will river toward it,
  - type: text
    content: people from all over set out for it.
  - type: text
    content: They’ll say, “Come,
  - type: text
    content: 'let’s climb '
  - type: text
    content: God
  - type: text
    content: ’s Mountain,
  - type: text
    content: go to the House of the God of Jacob.
  - type: text
    content: He’ll show us the way he works
  - type: text
    content: so we can live the way we’re made.”
  - type: text
    content: Zion’s the source of the revelation.
  - type: text
    content: God
  - type: text
    content: ’s Message comes from Jerusalem.
  - type: text
    content: He’ll settle things fairly between nations.
  - type: text
    content: He’ll make things right between many peoples.
  - type: text
    content: They’ll turn their swords into shovels,
  - type: text
    content: their spears into hoes.
  - type: text
    content: No more will nation fight nation;
  - type: text
    content: they won’t play war anymore.
  - type: text
    content: Come, family of Jacob,
  - type: text
    content: 'let’s live in the light of '
  - type: text
    content: God
  - type: text
    content: .
  '10':
  - type: text
    content: Head for the hills,
  - type: text
    content: hide in the caves
  - type: text
    content: 'From the terror of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: from his dazzling presence.
  '11':
  - type: text
    content: People with a big head are headed for a fall,
  - type: text
    content: pretentious egos brought down a peg.
  - type: text
    content: 'It’s '
  - type: text
    content: God
  - type: text
    content: ' alone at front-and-center'
  - type: text
    content: on the Day we’re talking about,
  - type: text
    content: 'The Day that '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies
  - type: text
    content: is matched against all big-talking rivals,
  - type: text
    content: against all swaggering big names;
  - type: text
    content: Against all giant sequoias
  - type: text
    content: hugely towering,
  - type: text
    content: and against the expansive chestnut;
  - type: text
    content: Against Kilimanjaro and Annapurna,
  - type: text
    content: against the ranges of Alps and Andes;
  - type: text
    content: Against every soaring skyscraper,
  - type: text
    content: against all proud obelisks and statues;
  - type: text
    content: Against ocean-going luxury liners,
  - type: text
    content: against elegant three-masted schooners.
  - type: text
    content: The swelled big heads will be punctured bladders,
  - type: text
    content: the pretentious egos brought down to earth,
  - type: text
    content: 'Leaving '
  - type: text
    content: God
  - type: text
    content: ' alone at front-and-center'
  - type: text
    content: on the Day we’re talking about.
  '18':
  - type: text
    content: And all those sticks and stones
  - type: text
    content: dressed up to look like gods
  - type: text
    content: will be gone for good.
  '19':
  - type: text
    content: Clamber into caves in the cliffs,
  - type: text
    content: duck into any hole you can find.
  - type: text
    content: 'Hide from the terror of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: from his dazzling presence,
  - type: text
    content: When he assumes his full stature on earth,
  - type: text
    content: towering and terrifying.
  '20':
  - type: text
    content: On that Day men and women will take
  - type: text
    content: the sticks and stones
  - type: text
    content: They’ve decked out in gold and silver
  - type: text
    content: to look like gods and then worshiped,
  - type: text
    content: And they will dump them
  - type: text
    content: in any ditch or gully,
  - type: text
    content: Then run for rock caves
  - type: text
    content: and cliff hideouts
  - type: text
    content: 'To hide from the terror of '
  - type: text
    content: God
  - type: text
    content: ','
  - type: text
    content: from his dazzling presence,
  - type: text
    content: When he assumes his full stature on earth,
  - type: text
    content: towering and terrifying.
  '22':
  - type: text
    content: Quit scraping and fawning over mere humans,
  - type: text
    content: so full of themselves, so full of hot air!
  - type: text
    content: Can’t you see there’s nothing to them?
  '6':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ', you’ve walked out on your family Jacob'
  - type: text
    content: because their world is full of hokey religion,
  - type: text
    content: Philistine witchcraft, and pagan hocus-pocus,
  - type: text
    content: a world rolling in wealth,
  - type: text
    content: Stuffed with things,
  - type: text
    content: no end to its machines and gadgets,
  - type: text
    content: And gods—gods of all sorts and sizes.
  - type: text
    content: These people make their own gods and worship what they make.
  - type: text
    content: A degenerate race, facedown in the gutter.
  - type: text
    content: Don’t bother with them! They’re not worth forgiving!
  - type: heading
    content: Pretentious Egos Brought Down to Earth
