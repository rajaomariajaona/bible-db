document_id: NEH.10,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The sealed document bore these signatures:'
  - type: text
    content: Nehemiah the governor, son of Hacaliah,
  - type: text
    content: Zedekiah, Seraiah, Azariah, Jeremiah,
  - type: text
    content: Pashhur, Amariah, Malkijah,
  - type: text
    content: Hattush, Shebaniah, Malluch,
  - type: text
    content: Harim, Meremoth, Obadiah,
  - type: text
    content: Daniel, Ginnethon, Baruch,
  - type: text
    content: Meshullam, Abijah, Mijamin,
  - type: text
    content: Maaziah, Bilgai, and Shemaiah.
  - type: text
    content: These were the priests.
  '14':
  - type: text
    content: 'The heads of the people:'
  - type: text
    content: Parosh, Pahath-Moab, Elam, Zattu, Bani,
  - type: text
    content: Bunni, Azgad, Bebai,
  - type: text
    content: Adonijah, Bigvai, Adin,
  - type: text
    content: Ater, Hezekiah, Azzur,
  - type: text
    content: Hodiah, Hashum, Bezai,
  - type: text
    content: Hariph, Anathoth, Nebai,
  - type: text
    content: Magpiash, Meshullam, Hezir,
  - type: text
    content: Meshezabel, Zadok, Jaddua,
  - type: text
    content: Pelatiah, Hanan, Anaiah,
  - type: text
    content: Hoshea, Hananiah, Hasshub,
  - type: text
    content: Hallohesh, Pilha, Shobek,
  - type: text
    content: Rehum, Hashabnah, Maaseiah,
  - type: text
    content: Ahiah, Hanan, Anan,
  - type: text
    content: Malluch, Harim, and Baanah.
  '28':
  - type: text
    content: 'The rest of the people, priests, Levites, security guards, singers, Temple staff, and all who separated themselves from the foreign neighbors to keep The Revelation of God, together with their wives, sons, daughters—everyone old enough to understand—all joined their noble kinsmen in a binding oath to follow The Revelation of God given through Moses the servant of God, to keep and carry out all the commandments of '
  - type: text
    content: God
  - type: text
    content: ' our Master, all his decisions and standards. Thus:'
  - type: text
    content: We will not marry our daughters to our foreign neighbors nor let our sons marry their daughters.
  '31':
  - type: text
    content: When the foreign neighbors bring goods or grain to sell on the Sabbath we won’t trade with them—not on the Sabbath or any other holy day.
  - type: text
    content: Every seventh year we will leave the land fallow and cancel all debts.
  '32':
  - type: text
    content: We accept the responsibility for paying an annual tax of one-third of a shekel (about an eighth ounce) for providing The Temple of our God with
  - type: text
    content: bread for the Table
  - type: text
    content: regular Grain-Offerings
  - type: text
    content: regular Whole-Burnt-Offerings
  - type: text
    content: offerings for the Sabbaths, New Moons, and appointed feasts
  - type: text
    content: Dedication-Offerings
  - type: text
    content: Absolution-Offerings to atone for Israel
  - type: text
    content: maintenance of The Temple of our God.
  '34':
  - type: text
    content: 'We—priests, Levites, and the people—have cast lots to see when each of our families will bring wood for burning on the Altar of our '
  - type: text
    content: God
  - type: text
    content: ', following the yearly schedule set down in The Revelation.'
  '35':
  - type: text
    content: 'We take responsibility for delivering annually to The Temple of '
  - type: text
    content: God
  - type: text
    content: ' the firstfruits of our crops and our orchards, our firstborn sons and cattle, and the firstborn from our herds and flocks for the priests who serve in The Temple of our God—just as it is set down in The Revelation.'
  '37':
  - type: text
    content: We will bring the best of our grain, of our contributions, of the fruit of every tree, of wine, and of oil to the priests in the storerooms of The Temple of our God.
  - type: text
    content: We will bring the tithes from our fields to the Levites, since the Levites are appointed to collect the tithes in the towns where we work. We’ll see to it that a priest descended from Aaron will supervise the Levites as they collect the tithes and make sure that they take a tenth of the tithes to the treasury in The Temple of our God. We’ll see to it that the People of Israel and Levites bring the grain, wine, and oil to the storage rooms where the vessels of the Sanctuary are kept and where the priests who serve, the security guards, and the choir meet.
  - type: text
    content: We will not neglect The Temple of our God.
  '9':
  - type: text
    content: 'The Levites:'
  - type: text
    content: Jeshua son of Azaniah, Binnui of the sons of Henadad, Kadmiel,
  - type: text
    content: 'and their kinsmen: Shebaniah, Hodiah, Kelita, Pelaiah, Hanan,'
  - type: text
    content: Mica, Rehob, Hashabiah,
  - type: text
    content: Zaccur, Sherebiah, Shebaniah,
  - type: text
    content: Hodiah, Bani, and Beninu.
