- type: usfm
  marker: li1
  children:
  - type: text
    text: Zedekiah, Seraiah, Azariah, Jeremiah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Pashhur, Amariah, Malkijah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hattush, Shebaniah, Malluch,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Harim, Meremoth, Obadiah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Daniel, Ginnethon, Baruch,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Meshullam, Abijah, Mijamin,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Maaziah, Bilgai, and Shemaiah.
- type: usfm
  marker: m
  children:
  - type: text
    text: These were the priests.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-13
  - type: text
    text: 'The Levites:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Jeshua son of Azaniah, Binnui of the sons of Henadad, Kadmiel,
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'and their kinsmen: Shebaniah, Hodiah, Kelita, Pelaiah, Hanan,'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Mica, Rehob, Hashabiah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Zaccur, Sherebiah, Shebaniah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hodiah, Bani, and Beninu.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-27
  - type: text
    text: 'The heads of the people:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Parosh, Pahath-Moab, Elam, Zattu, Bani,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Bunni, Azgad, Bebai,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Adonijah, Bigvai, Adin,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ater, Hezekiah, Azzur,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hodiah, Hashum, Bezai,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hariph, Anathoth, Nebai,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Magpiash, Meshullam, Hezir,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Meshezabel, Zadok, Jaddua,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Pelatiah, Hanan, Anaiah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hoshea, Hananiah, Hasshub,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Hallohesh, Pilha, Shobek,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Rehum, Hashabnah, Maaseiah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Ahiah, Hanan, Anan,
- type: usfm
  marker: li1
  children:
  - type: text
    text: Malluch, Harim, and Baanah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-30
  - type: text
    text: 'The rest of the people, priests, Levites, security guards, singers, Temple staff, and all who separated themselves from the foreign neighbors to keep The Revelation of God, together with their wives, sons, daughters—everyone old enough to understand—all joined their noble kinsmen in a binding oath to follow The Revelation of God given through Moses the servant of God, to keep and carry out all the commandments of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' our Master, all his decisions and standards. Thus:'
- type: usfm
  marker: pm
  children:
  - type: text
    text: We will not marry our daughters to our foreign neighbors nor let our sons marry their daughters.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: When the foreign neighbors bring goods or grain to sell on the Sabbath we won’t trade with them—not on the Sabbath or any other holy day.
- type: usfm
  marker: pm
  children:
  - type: text
    text: Every seventh year we will leave the land fallow and cancel all debts.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: We accept the responsibility for paying an annual tax of one-third of a shekel (about an eighth ounce) for providing The Temple of our God with
- type: usfm
  marker: lim1
  children:
  - type: text
    text: bread for the Table
- type: usfm
  marker: lim1
  children:
  - type: text
    text: regular Grain-Offerings
- type: usfm
  marker: lim1
  children:
  - type: text
    text: regular Whole-Burnt-Offerings
- type: usfm
  marker: lim1
  children:
  - type: text
    text: offerings for the Sabbaths, New Moons, and appointed feasts
- type: usfm
  marker: lim1
  children:
  - type: text
    text: Dedication-Offerings
- type: usfm
  marker: lim1
  children:
  - type: text
    text: Absolution-Offerings to atone for Israel
- type: usfm
  marker: lim1
  children:
  - type: text
    text: maintenance of The Temple of our God.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'We—priests, Levites, and the people—have cast lots to see when each of our families will bring wood for burning on the Altar of our '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', following the yearly schedule set down in The Revelation.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-36
  - type: text
    text: 'We take responsibility for delivering annually to The Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' the firstfruits of our crops and our orchards, our firstborn sons and cattle, and the firstborn from our herds and flocks for the priests who serve in The Temple of our God—just as it is set down in The Revelation.'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-39
  - type: text
    text: We will bring the best of our grain, of our contributions, of the fruit of every tree, of wine, and of oil to the priests in the storerooms of The Temple of our God.
- type: usfm
  marker: pm
  children:
  - type: text
    text: We will bring the tithes from our fields to the Levites, since the Levites are appointed to collect the tithes in the towns where we work. We’ll see to it that a priest descended from Aaron will supervise the Levites as they collect the tithes and make sure that they take a tenth of the tithes to the treasury in The Temple of our God. We’ll see to it that the People of Israel and Levites bring the grain, wine, and oil to the storage rooms where the vessels of the Sanctuary are kept and where the priests who serve, the security guards, and the choir meet.
- type: usfm
  marker: pm
  children:
  - type: text
    text: We will not neglect The Temple of our God.
