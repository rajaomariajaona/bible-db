document_id: MAT.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: What Pollutes Your Life
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: After that, Pharisees and religion scholars came to Jesus all the way from Jerusalem, criticizing, “Why do your disciples play fast and loose with the rules?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-9
  - type: text
    text: 'But Jesus put it right back on them. “Why do you use your rules to play fast and loose with God’s commands? God clearly says, ‘Respect your father and mother,’ and, ‘Anyone denouncing father or mother should be killed.’ But you weasel around that by saying, ‘Whoever wants to, can say to father and mother, What I owed to you I’ve given to God.’ That can hardly be called respecting a parent. You cancel God’s command by your rules. Frauds! Isaiah’s prophecy of you hit the bull’s-eye:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: These people make a big show of saying the right thing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but their heart isn’t in it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They act like they’re worshiping me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they don’t mean it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They just use me as a cover
- type: usfm
  marker: q2
  children:
  - type: text
    text: for teaching whatever suits their fancy.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: He then called the crowd together and said, “Listen, and take this to heart. It’s not what you swallow that pollutes your life, but what you vomit up.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Later his disciples came and told him, “Did you know how upset the Pharisees were when they heard what you said?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: Jesus shrugged it off. “Every tree that wasn’t planted by my Father in heaven will be pulled up by its roots. Forget them. They are blind men leading blind men. When a blind man leads a blind man, they both end up in the ditch.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Peter said, “I don’t get it. Put it in plain language.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-20
  - type: text
    text: Jesus replied, “You, too? Are you being willfully stupid? Don’t you know that anything that is swallowed works its way through the intestines and is finally defecated? But what comes out of the mouth gets its start in the heart. It’s from the heart that we vomit up evil arguments, murders, adulteries, fornications, thefts, lies, and cussing. That’s what pollutes. Eating or not eating certain foods, washing or not washing your hands—that’s neither here nor there.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Healing the People
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: From there Jesus took a trip to Tyre and Sidon. They had hardly arrived when a Canaanite woman came down from the hills and pleaded, “Mercy, Master, Son of David! My daughter is cruelly afflicted by an evil spirit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jesus ignored her. The disciples came and complained, “Now she’s bothering us. Would you please take care of her? She’s driving us crazy.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jesus refused, telling them, “I’ve got my hands full dealing with the lost sheep of Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then the woman came back to Jesus, dropped to her knees, and begged. “Master, help me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He said, “It’s not right to take bread out of children’s mouths and throw it to dogs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'She was quick: “You’re right, Master, but beggar dogs do get scraps from the master’s table.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Jesus gave in. “Oh, woman, your faith is something else. What you want is what you get!” Right then her daughter became well.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-31
  - type: text
    text: After Jesus returned, he walked along Lake Galilee and then climbed a mountain and took his place, ready to receive visitors. They came, tons of them, bringing along the paraplegic, the blind, the maimed, the mute—all sorts of people in need—and more or less threw them down at Jesus’ feet to see what he would do with them. He healed them. When the people saw the mutes speaking, the maimed healthy, the paraplegics walking around, the blind looking around, they were astonished and let everyone know that God was blazingly alive among them.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: But Jesus wasn’t finished with them. He called his disciples and said, “I hurt for these people. For three days now they’ve been with me, and now they have nothing to eat. I can’t send them away without a meal—they’d probably collapse on the road.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: His disciples said, “But where in this deserted place are you going to dig up enough food for a meal?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-39
  - type: text
    text: Jesus asked, “How much bread do you have?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Seven loaves,” they said, “plus a few fish.” At that, Jesus directed the people to sit down. He took the seven loaves and the fish. After giving thanks, he divided it up and gave it to the people. Everyone ate. They had all they wanted. It took seven large baskets to collect the leftovers. Over four thousand people ate their fill at that meal. After Jesus sent them away, he climbed in the boat and crossed over to the Magadan hills.
