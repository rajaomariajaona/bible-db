document_id: JOS.5,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the Amorite kings west of the Jordan and the Canaanite kings along the seacoast heard how '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had stopped the Jordan River before the People of Israel until they had crossed over, their hearts sank; the courage drained out of them just thinking about the People of Israel.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The People of Israel continued to camp at The Gilgal. They celebrated the Passover on the evening of the fourteenth day of the month on the plains of Jericho.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Right away, the day after the Passover, they started eating the produce of that country, unraised bread and roasted grain. And then no more manna; the manna stopped. As soon as they started eating food grown in the land, there was no more manna for the People of Israel. That year they ate from the crops of Canaan.
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And then this, while Joshua was there near Jericho: He looked up and saw right in front of him a man standing, holding his drawn sword. Joshua stepped up to him and said, “Whose side are you on—ours or our enemies’?”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “Neither. I’m commander of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s army. I’ve just arrived.” Joshua fell, face to the ground, and worshiped. He asked, “What orders does my Master have for his servant?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s army commander ordered Joshua, “Take your sandals off your feet. The place you are standing is holy.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joshua did it.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Joshua, “Make stone knives and circumcise the People of Israel a second time.” So Joshua made stone knives and circumcised the People of Israel at Foreskins Hill.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is why Joshua conducted the circumcision. All the males who had left Egypt, the soldiers, had died in the wilderness on the journey out of Egypt. All the people who had come out of Egypt, of course, had been circumcised, but all those born in the wilderness along the way since leaving Egypt had not been. The fact is that the People of Israel had walked through that wilderness for forty years until the entire nation died out, all the men of military age who had come out of Egypt but had disobeyed the call of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' vowed that these would never lay eyes on the land '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' had solemnly promised their ancestors to give us, a land flowing with milk and honey. But their children had replaced them. These are the ones Joshua circumcised. They had never been circumcised; no one had circumcised them along the way.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they had completed the circumcising of the whole nation, they stayed where they were in camp until they were healed.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said to Joshua, “Today I have rolled away the reproach of Egypt.” That’s why the place is called The Gilgal. It’s still called that.'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
