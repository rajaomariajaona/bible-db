document_id: ISA.16,97
type_code: eng
verses:
  '1':
  - type: heading
    content: A New Government in the David Tradition
  - type: text
    content: ' “Dispatch a gift of lambs,” says Moab,'
  - type: text
    content: “to the leaders in Jerusalem—
  - type: text
    content: Lambs from Sela sent across the desert
  - type: text
    content: to buy the goodwill of Jerusalem.
  - type: text
    content: The towns and people of Moab
  - type: text
    content: are at a loss,
  - type: text
    content: New-hatched birds knocked from the nest,
  - type: text
    content: fluttering helplessly
  - type: text
    content: At the banks of the Arnon River,
  - type: text
    content: 'unable to cross:'
  - type: text
    content: ‘Tell us what to do,
  - type: text
    content: help us out!
  - type: text
    content: Protect us,
  - type: text
    content: hide us!
  - type: text
    content: Give the refugees from Moab
  - type: text
    content: sanctuary with you.
  - type: text
    content: Be a safe place for those on the run
  - type: text
    content: from the killing fields.’”
  '13':
  - type: text
    content: 'This is '
  - type: text
    content: God
  - type: text
    content: '’s earlier Message on Moab. '
  - type: text
    content: God
  - type: text
    content: ’s updated Message is, “In three years, no longer than the term of an enlisted soldier, Moab’s impressive presence will be gone, that splendid hot-air balloon will be punctured, and instead of a vigorous population, just a few shuffling bums panhandling handouts.”
  '4':
  - type: text
    content: ' “When this is all over,” Judah answers,'
  - type: text
    content: “the tyrant toppled,
  - type: text
    content: The killing at an end,
  - type: text
    content: all signs of these cruelties long gone,
  - type: text
    content: A new government of love will be established
  - type: text
    content: in the venerable David tradition.
  - type: text
    content: A Ruler you can depend upon
  - type: text
    content: will head this government,
  - type: text
    content: A Ruler passionate for justice,
  - type: text
    content: a Ruler quick to set things right.”
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: We’ve heard—everyone’s heard!—of Moab’s pride,
  - type: text
    content: world-famous for pride—
  - type: text
    content: Arrogant, self-important, insufferable,
  - type: text
    content: full of hot air.
  - type: text
    content: So now let Moab lament for a change,
  - type: text
    content: with antiphonal mock-laments from the neighbors!
  - type: text
    content: What a shame! How terrible!
  - type: text
    content: No more fine fruitcakes and Kir-hareseth candies!
  - type: text
    content: All those lush Heshbon fields dried up,
  - type: text
    content: the rich Sibmah vineyards withered!
  - type: text
    content: Foreign thugs have crushed and torn out
  - type: text
    content: the famous grapevines
  - type: text
    content: That once reached all the way to Jazer,
  - type: text
    content: right to the edge of the desert,
  - type: text
    content: Ripped out the crops in every direction
  - type: text
    content: as far as the eye can see.
  - type: text
    content: I’ll join the weeping. I’ll weep right along with Jazer,
  - type: text
    content: weep for the Sibmah vineyards.
  - type: text
    content: And yes, Heshbon and Elealeh,
  - type: text
    content: I’ll mingle my tears with your tears!
  - type: text
    content: The joyful shouting at harvest is gone.
  - type: text
    content: Instead of song and celebration, dead silence.
  - type: text
    content: No more boisterous laughter in the orchards,
  - type: text
    content: no more hearty work songs in the vineyards.
  - type: text
    content: Instead of the bustle and sound of good work in the fields,
  - type: text
    content: silence—deathly and deadening silence.
  - type: text
    content: My heartstrings throb like harp strings for Moab,
  - type: text
    content: my soul in sympathy for sad Kir-heres.
  - type: text
    content: When Moab trudges to the shrine to pray,
  - type: text
    content: he wastes both time and energy.
  - type: text
    content: Going to the sanctuary and praying for relief
  - type: text
    content: is useless. Nothing ever happens.
