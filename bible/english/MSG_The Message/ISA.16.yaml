document_id: ISA.16,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A New Government in the David Tradition
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “Dispatch a gift of lambs,” says Moab,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “to the leaders in Jerusalem—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lambs from Sela sent across the desert
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to buy the goodwill of Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The towns and people of Moab
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are at a loss,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: New-hatched birds knocked from the nest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fluttering helplessly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the banks of the Arnon River,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'unable to cross:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Tell us what to do,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: help us out!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hide us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give the refugees from Moab
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sanctuary with you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be a safe place for those on the run
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the killing fields.’”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s earlier Message on Moab. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s updated Message is, “In three years, no longer than the term of an enlisted soldier, Moab’s impressive presence will be gone, that splendid hot-air balloon will be punctured, and instead of a vigorous population, just a few shuffling bums panhandling handouts.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' “When this is all over,” Judah answers,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “the tyrant toppled,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The killing at an end,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all signs of these cruelties long gone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A new government of love will be established
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the venerable David tradition.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Ruler you can depend upon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will head this government,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Ruler passionate for justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a Ruler quick to set things right.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ve heard—everyone’s heard!—of Moab’s pride,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: world-famous for pride—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arrogant, self-important, insufferable,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: full of hot air.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now let Moab lament for a change,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with antiphonal mock-laments from the neighbors!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a shame! How terrible!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No more fine fruitcakes and Kir-hareseth candies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All those lush Heshbon fields dried up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rich Sibmah vineyards withered!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Foreign thugs have crushed and torn out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the famous grapevines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That once reached all the way to Jazer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: right to the edge of the desert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ripped out the crops in every direction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as far as the eye can see.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll join the weeping. I’ll weep right along with Jazer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: weep for the Sibmah vineyards.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And yes, Heshbon and Elealeh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll mingle my tears with your tears!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The joyful shouting at harvest is gone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Instead of song and celebration, dead silence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No more boisterous laughter in the orchards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no more hearty work songs in the vineyards.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of the bustle and sound of good work in the fields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: silence—deathly and deadening silence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heartstrings throb like harp strings for Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my soul in sympathy for sad Kir-heres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When Moab trudges to the shrine to pray,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he wastes both time and energy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Going to the sanctuary and praying for relief
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is useless. Nothing ever happens.
