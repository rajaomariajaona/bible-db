document_id: MAT.1,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The family tree of Jesus Christ, David’s son, Abraham’s son:'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-16
    - type: text
      text: When the Babylonian exile ended,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jeconiah had Shealtiel,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shealtiel had Zerubbabel,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zerubbabel had Abiud,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Abiud had Eliakim,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliakim had Azor,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Azor had Zadok,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zadok had Achim,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Achim had Eliud,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eliud had Eleazar,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Eleazar had Matthan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Matthan had Jacob,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jacob had Joseph, Mary’s husband,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the Mary who gave birth to Jesus,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the Jesus who was called Christ.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: There were fourteen generations from Abraham to David,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: another fourteen from David to the Babylonian exile,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and yet another fourteen from the Babylonian exile to Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Jesus
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: The birth of Jesus took place like this. His mother, Mary, was engaged to be married to Joseph. Before they enjoyed their wedding night, Joseph discovered she was pregnant. (It was by the Holy Spirit, but he didn’t know that.) Joseph, chagrined but noble, determined to take care of things quietly so Mary would not be disgraced.
  '2':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-6a
    - type: text
      text: ' Abraham had Isaac,'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Isaac had Jacob,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jacob had Judah and his brothers,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Judah had Perez and Zerah (the mother was Tamar),
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Perez had Hezron,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hezron had Aram,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Aram had Amminadab,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amminadab had Nahshon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Nahshon had Salmon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Salmon had Boaz (his mother was Rahab),
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Boaz had Obed (Ruth was the mother),
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Obed had Jesse,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jesse had David,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and David became king.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-23
    - type: text
      text: 'While he was trying to figure a way out, he had a dream. God’s angel spoke in the dream: “Joseph, son of David, don’t hesitate to get married. Mary’s pregnancy is Spirit-conceived. God’s Holy Spirit has made her pregnant. She will bring a son to birth, and when she does, you, Joseph, will name him Jesus—‘God saves’—because he will save his people from their sins.” This would bring the prophet’s embryonic revelation to full term:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch for this—a virgin will get pregnant and bear a son;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will name him Immanuel (Hebrew for “God is with us”).
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: 'Then Joseph woke up. He did exactly what God’s angel commanded in the dream: He married Mary. But he did not consummate the marriage until she had the baby. He named the baby Jesus.'
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6b-11
    - type: text
      text: ' David had Solomon (Uriah’s wife was the mother),'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Solomon had Rehoboam,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Rehoboam had Abijah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Abijah had Asa,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Asa had Jehoshaphat,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehoshaphat had Joram,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joram had Uzziah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Uzziah had Jotham,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jotham had Ahaz,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahaz had Hezekiah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hezekiah had Manasseh,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Manasseh had Amon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amon had Josiah,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Josiah had Jehoiachin and his brothers,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and then the people were taken into the Babylonian exile.
