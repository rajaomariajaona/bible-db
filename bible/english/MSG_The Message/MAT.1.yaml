document_id: MAT.1,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'The family tree of Jesus Christ, David’s son, Abraham’s son:'
  '12':
  - type: text
    content: When the Babylonian exile ended,
  - type: text
    content: Jeconiah had Shealtiel,
  - type: text
    content: Shealtiel had Zerubbabel,
  - type: text
    content: Zerubbabel had Abiud,
  - type: text
    content: Abiud had Eliakim,
  - type: text
    content: Eliakim had Azor,
  - type: text
    content: Azor had Zadok,
  - type: text
    content: Zadok had Achim,
  - type: text
    content: Achim had Eliud,
  - type: text
    content: Eliud had Eleazar,
  - type: text
    content: Eleazar had Matthan,
  - type: text
    content: Matthan had Jacob,
  - type: text
    content: Jacob had Joseph, Mary’s husband,
  - type: text
    content: the Mary who gave birth to Jesus,
  - type: text
    content: the Jesus who was called Christ.
  '17':
  - type: text
    content: There were fourteen generations from Abraham to David,
  - type: text
    content: another fourteen from David to the Babylonian exile,
  - type: text
    content: and yet another fourteen from the Babylonian exile to Christ.
  - type: heading
    content: The Birth of Jesus
  '18':
  - type: text
    content: The birth of Jesus took place like this. His mother, Mary, was engaged to be married to Joseph. Before they enjoyed their wedding night, Joseph discovered she was pregnant. (It was by the Holy Spirit, but he didn’t know that.) Joseph, chagrined but noble, determined to take care of things quietly so Mary would not be disgraced.
  '2':
  - type: text
    content: ' Abraham had Isaac,'
  - type: text
    content: Isaac had Jacob,
  - type: text
    content: Jacob had Judah and his brothers,
  - type: text
    content: Judah had Perez and Zerah (the mother was Tamar),
  - type: text
    content: Perez had Hezron,
  - type: text
    content: Hezron had Aram,
  - type: text
    content: Aram had Amminadab,
  - type: text
    content: Amminadab had Nahshon,
  - type: text
    content: Nahshon had Salmon,
  - type: text
    content: Salmon had Boaz (his mother was Rahab),
  - type: text
    content: Boaz had Obed (Ruth was the mother),
  - type: text
    content: Obed had Jesse,
  - type: text
    content: Jesse had David,
  - type: text
    content: and David became king.
  '20':
  - type: text
    content: 'While he was trying to figure a way out, he had a dream. God’s angel spoke in the dream: “Joseph, son of David, don’t hesitate to get married. Mary’s pregnancy is Spirit-conceived. God’s Holy Spirit has made her pregnant. She will bring a son to birth, and when she does, you, Joseph, will name him Jesus—‘God saves’—because he will save his people from their sins.” This would bring the prophet’s embryonic revelation to full term:'
  - type: text
    content: Watch for this—a virgin will get pregnant and bear a son;
  - type: text
    content: They will name him Immanuel (Hebrew for “God is with us”).
  '24':
  - type: text
    content: 'Then Joseph woke up. He did exactly what God’s angel commanded in the dream: He married Mary. But he did not consummate the marriage until she had the baby. He named the baby Jesus.'
  '6':
  - type: text
    content: ' David had Solomon (Uriah’s wife was the mother),'
  - type: text
    content: Solomon had Rehoboam,
  - type: text
    content: Rehoboam had Abijah,
  - type: text
    content: Abijah had Asa,
  - type: text
    content: Asa had Jehoshaphat,
  - type: text
    content: Jehoshaphat had Joram,
  - type: text
    content: Joram had Uzziah,
  - type: text
    content: Uzziah had Jotham,
  - type: text
    content: Jotham had Ahaz,
  - type: text
    content: Ahaz had Hezekiah,
  - type: text
    content: Hezekiah had Manasseh,
  - type: text
    content: Manasseh had Amon,
  - type: text
    content: Amon had Josiah,
  - type: text
    content: Josiah had Jehoiachin and his brothers,
  - type: text
    content: and then the people were taken into the Babylonian exile.
