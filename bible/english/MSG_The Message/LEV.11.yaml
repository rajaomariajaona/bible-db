      text: Foods
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' spoke to Moses and Aaron: “Speak to the People of Israel. Tell them, Of all the animals on Earth, these are the animals that you may eat:'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These are the birds you are to detest. Don’t eat them. They are detestable: eagle, vulture, osprey, kite, all falcons, all ravens, ostrich, nighthawk, sea gull, all hawks, owl, cormorant, ibis, water hen, pelican, Egyptian vulture, stork, all herons, hoopoe, bat.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“All flying insects that walk on all fours are detestable to you. But you can eat some of these, namely, those that have jointed legs for hopping on the ground: all locusts, katydids, crickets, and grasshoppers. But all the other flying insects that have four legs you are to detest.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You will make yourselves ritually unclean until evening if you touch their carcasses. If you pick up one of their carcasses you must wash your clothes and you’ll be unclean until evening.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Every animal that has a split hoof that’s not completely divided, or that doesn’t chew the cud is unclean for you; if you touch the carcass of any of them you become unclean.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Every four-footed animal that goes on its paws is unclean for you; if you touch its carcass you are unclean until evening. If you pick up its carcass you must wash your clothes and are unclean until evening. They are unclean for you.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Among the creatures that crawl on the ground, the following are unclean for you: weasel, rat, all lizards, gecko, monitor lizard, wall lizard, skink, chameleon. Among the crawling creatures, these are unclean for you. If you touch them when they are dead, you are ritually unclean until evening. When one of them dies and falls on something, that becomes unclean no matter what it’s used for, whether it’s made of wood, cloth, hide, or sackcloth. Put it in the water—it’s unclean until evening, and then it’s clean. If one of these dead creatures falls into a clay pot, everything in the pot is unclean and you must break the pot. Any food that could be eaten but has water on it from such a pot is unclean, and any liquid that could be drunk from it is unclean. Anything that one of these carcasses falls on is unclean—an oven or cooking pot must be broken up; they’re unclean and must be treated as unclean. A spring, though, or a cistern for collecting water remains clean, but if you touch one of these carcasses you’re ritually unclean. If a carcass falls on any seeds that are to be planted, they remain clean. But if water has been put on the seed and a carcass falls on it, you must treat it as unclean.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You may eat any animal that has a split hoof, divided in two, and that chews the cud, but not an animal that only chews the cud or only has a split hoof. For instance, the camel chews the cud but doesn’t have a split hoof, so it’s unclean. The rock badger chews the cud but doesn’t have a split hoof and so it’s unclean. The rabbit chews the cud but doesn’t have a split hoof so is unclean. The pig has a split hoof, divided in two, but doesn’t chew the cud and so is unclean. You may not eat their meat nor touch their carcasses; they are unclean to you.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If an animal that you are permitted to eat dies, anyone who touches the carcass is ritually unclean until evening. If you eat some of the carcass you must wash your clothes and you are unclean until evening. If you pick up the carcass you must wash your clothes and are unclean until evening.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Creatures that crawl on the ground are detestable and not to be eaten. Don’t eat creatures that crawl on the ground, whether on their belly or on all fours or on many feet—they are detestable. Don’t make yourselves unclean or be defiled by them, because I am your '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Make yourselves holy for I am holy. Don’t make yourselves ritually unclean by any creature that crawls on the ground. I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' who brought you up out of the land of Egypt. Be holy because I am holy.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “These are the instructions on animals, birds, fish, and creatures that crawl on the ground. You have to distinguish between the ritually unclean and the clean, between living creatures that can be eaten and those that cannot be eaten.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Among the creatures that live in the water of the seas and streams, you may eat any that have fins and scales. But anything that doesn’t have fins and scales, whether in seas or streams, whether small creatures in the shallows or huge creatures in the deeps, you are to detest. Yes, detest them. Don’t eat their meat; detest their carcasses. Anything living in the water that doesn’t have fins and scales is detestable to you.
