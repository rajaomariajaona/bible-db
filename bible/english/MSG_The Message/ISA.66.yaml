  children:
  - type: text
    text: 'Living Worship to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Heaven’s my throne,
- type: usfm
  marker: q2
  children:
  - type: text
    text: earth is my footstool.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What sort of house could you build for me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What holiday spot reserve for me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I made all this! I own all this!”
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“But there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' something I’m looking for:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a person simple and plain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: reverently responsive to what I say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: “Your acts of worship
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'are acts of sin:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sacrificial slaughter of the ox
- type: usfm
  marker: q2
  children:
  - type: text
    text: is no different from murdering the neighbor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your offerings for worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no different from dumping pig’s blood on the altar;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your presentation of memorial gifts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no different from honoring a no-god idol.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You choose self-serving worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you delight in self-centered worship—disgusting!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Well, I choose to expose your nonsense
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let you realize your worst fears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because when I invited you, you ignored me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I spoke to you, you brushed me off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You did the very things I exposed as evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you chose what I hate.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But listen to what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has to say'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to you who reverently respond to his Word:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your own families hate you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turn you out because of me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They taunt you, ‘Let us see '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s glory!
- type: usfm
  marker: q2
  children:
  - type: text
    text: If God’s so great, why aren’t you happy?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they’re the ones
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are going to end up shamed.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Rumbles of thunder from the city!
- type: usfm
  marker: q2
  children:
  - type: text
    text: A voice out of the Temple!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s voice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'handing out judgment to his enemies:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: “Before she went into labor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she had the baby.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before the birth pangs hit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she delivered a son.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has anyone ever heard of such a thing?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has anyone seen anything like this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A country born in a day?
- type: usfm
  marker: q2
  children:
  - type: text
    text: A nation born in a flash?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But Zion was barely in labor
- type: usfm
  marker: q2
  children:
  - type: text
    text: when she had her babies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do I open the womb
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not deliver the baby?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do I, the One who delivers babies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shut the womb?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: “Rejoice, Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all who love her, celebrate!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all you who have shed tears over her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: join in the happy singing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You newborns can satisfy yourselves
- type: usfm
  marker: q2
  children:
  - type: text
    text: at her nurturing breasts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, delight yourselves and drink your fill
- type: usfm
  marker: q2
  children:
  - type: text
    text: at her ample bosom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s Message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I’ll pour robust well-being into her like a river,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the glory of nations like a river in flood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll nurse at her breasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nestle in her bosom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be bounced on her knees.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As a mother comforts her child,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I’ll comfort you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: You will be comforted in Jerusalem.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: You’ll see all this and burst with joy
- type: usfm
  marker: q2
  children:
  - type: text
    text: —you’ll feel ten feet tall—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As it becomes apparent that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is on your side'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and against his enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' arrives like wildfire'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his chariots like a tornado,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A furious outburst of anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a rebuke fierce and fiery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For it’s by fire that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' brings judgment,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a death sentence on the human race.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many, oh so many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'are under '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s sentence of death:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“All who enter the sacred groves for initiation in those unholy rituals that climaxed in that foul and obscene meal of pigs and mice will eat together and then die together.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: '“I know everything they’ve ever done or thought. I’m going to come and then gather everyone—all nations, all languages. They’ll come and see my glory. I’ll set up a station at the center. I’ll send the survivors of judgment all over the world: Spain and Africa, Turkey and Greece, and the far-off islands that have never heard of me, who know nothing of what I’ve done nor who I am. I’ll send them out as missionaries to preach my glory among the nations. They’ll return with all your long-lost brothers and sisters from all over the world. They’ll bring them back and offer them in living worship to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. They’ll bring them on horses and wagons and carts, on mules and camels, straight to my holy mountain Jerusalem,” says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. “They’ll present them just as Israelites present their offerings in a ceremonial vessel in the Temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '. I’ll even take some of them and make them priests and Levites,” says '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: “For just as the new heavens and new earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I am making will stand firm before me”
- type: usfm
  marker: q3
  children:
  - type: text
    text: —
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree—
- type: usfm
  marker: q1
  children:
  - type: text
    text: “So will your children
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your reputation stand firm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Month after month and week by week,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'everyone will come to worship me,” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' says.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “And then they’ll go out and look at what happened
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who rebelled against me. Corpses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maggots endlessly eating away on them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an endless supply of fuel for fires.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone who sees what’s happened
- type: usfm
  marker: q2
  children:
  - type: text
    text: and smells the stench retches.”
