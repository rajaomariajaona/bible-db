type_code: eng
verses:
  '1':
  - type: heading
    content: Living Worship to God
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Heaven’s my throne,
  - type: text
    content: earth is my footstool.
  - type: text
    content: What sort of house could you build for me?
  - type: text
    content: What holiday spot reserve for me?
  - type: text
    content: I made all this! I own all this!”
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '“But there '
  - type: text
    content: is
  - type: text
    content: ' something I’m looking for:'
  - type: text
    content: a person simple and plain,
  - type: text
    content: reverently responsive to what I say.
  '10':
  - type: text
    content: “Rejoice, Jerusalem,
  - type: text
    content: and all who love her, celebrate!
  - type: text
    content: And all you who have shed tears over her,
  - type: text
    content: join in the happy singing.
  - type: text
    content: You newborns can satisfy yourselves
  - type: text
    content: at her nurturing breasts.
  - type: text
    content: Yes, delight yourselves and drink your fill
  - type: text
    content: at her ample bosom.”
  '12':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “I’ll pour robust well-being into her like a river,
  - type: text
    content: the glory of nations like a river in flood.
  - type: text
    content: You’ll nurse at her breasts,
  - type: text
    content: nestle in her bosom,
  - type: text
    content: and be bounced on her knees.
  - type: text
    content: As a mother comforts her child,
  - type: text
    content: so I’ll comfort you.
  - type: text
    content: You will be comforted in Jerusalem.”
  '14':
  - type: text
    content: You’ll see all this and burst with joy
  - type: text
    content: —you’ll feel ten feet tall—
  - type: text
    content: 'As it becomes apparent that '
  - type: text
    content: God
  - type: text
    content: ' is on your side'
  - type: text
    content: and against his enemies.
  - type: text
    content: 'For '
  - type: text
    content: God
  - type: text
    content: ' arrives like wildfire'
  - type: text
    content: and his chariots like a tornado,
  - type: text
    content: A furious outburst of anger,
  - type: text
    content: a rebuke fierce and fiery.
  - type: text
    content: 'For it’s by fire that '
  - type: text
    content: God
  - type: text
    content: ' brings judgment,'
  - type: text
    content: a death sentence on the human race.
  - type: text
    content: Many, oh so many,
  - type: text
    content: 'are under '
  - type: text
    content: God
  - type: text
    content: '’s sentence of death:'
  '17':
  - type: text
    content: '“All who enter the sacred groves for initiation in those unholy rituals that climaxed in that foul and obscene meal of pigs and mice will eat together and then die together.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  '18':
  - type: text
    content: '“I know everything they’ve ever done or thought. I’m going to come and then gather everyone—all nations, all languages. They’ll come and see my glory. I’ll set up a station at the center. I’ll send the survivors of judgment all over the world: Spain and Africa, Turkey and Greece, and the far-off islands that have never heard of me, who know nothing of what I’ve done nor who I am. I’ll send them out as missionaries to preach my glory among the nations. They’ll return with all your long-lost brothers and sisters from all over the world. They’ll bring them back and offer them in living worship to '
  - type: text
    content: God
  - type: text
    content: '. They’ll bring them on horses and wagons and carts, on mules and camels, straight to my holy mountain Jerusalem,” says '
  - type: text
    content: God
  - type: text
    content: '. “They’ll present them just as Israelites present their offerings in a ceremonial vessel in the Temple of '
  - type: text
    content: God
  - type: text
    content: '. I’ll even take some of them and make them priests and Levites,” says '
  - type: text
    content: God
  - type: text
    content: .
  '22':
  - type: text
    content: “For just as the new heavens and new earth
  - type: text
    content: that I am making will stand firm before me”
  - type: text
    content: —
  - type: text
    content: God
  - type: text
    content: ’s Decree—
  - type: text
    content: “So will your children
  - type: text
    content: and your reputation stand firm.
  - type: text
    content: Month after month and week by week,
  - type: text
    content: 'everyone will come to worship me,” '
  - type: text
    content: God
  - type: text
    content: ' says.'
  '24':
  - type: text
    content: “And then they’ll go out and look at what happened
  - type: text
    content: to those who rebelled against me. Corpses!
  - type: text
    content: Maggots endlessly eating away on them,
  - type: text
    content: an endless supply of fuel for fires.
  - type: text
    content: Everyone who sees what’s happened
  - type: text
    content: and smells the stench retches.”
  '3':
  - type: text
    content: “Your acts of worship
  - type: text
    content: 'are acts of sin:'
  - type: text
    content: Your sacrificial slaughter of the ox
  - type: text
    content: is no different from murdering the neighbor;
  - type: text
    content: Your offerings for worship,
  - type: text
    content: no different from dumping pig’s blood on the altar;
  - type: text
    content: Your presentation of memorial gifts,
  - type: text
    content: no different from honoring a no-god idol.
  - type: text
    content: You choose self-serving worship,
  - type: text
    content: you delight in self-centered worship—disgusting!
  - type: text
    content: Well, I choose to expose your nonsense
  - type: text
    content: and let you realize your worst fears,
  - type: text
    content: Because when I invited you, you ignored me;
  - type: text
    content: when I spoke to you, you brushed me off.
  - type: text
    content: You did the very things I exposed as evil,
  - type: text
    content: you chose what I hate.”
  '5':
  - type: text
    content: 'But listen to what '
  - type: text
    content: God
  - type: text
    content: ' has to say'
  - type: text
    content: 'to you who reverently respond to his Word:'
  - type: text
    content: “Your own families hate you
  - type: text
    content: and turn you out because of me.
  - type: text
    content: 'They taunt you, ‘Let us see '
  - type: text
    content: God
  - type: text
    content: ’s glory!
  - type: text
    content: If God’s so great, why aren’t you happy?’
  - type: text
    content: But they’re the ones
  - type: text
    content: who are going to end up shamed.”
  - type: text
    content: '* * *'
  '6':
  - type: text
    content: Rumbles of thunder from the city!
  - type: text
    content: A voice out of the Temple!
  - type: text
    content: God
  - type: text
    content: ’s voice,
  - type: text
    content: 'handing out judgment to his enemies:'
  '7':
  - type: text
    content: “Before she went into labor,
  - type: text
    content: she had the baby.
  - type: text
    content: Before the birth pangs hit,
  - type: text
    content: she delivered a son.
  - type: text
    content: Has anyone ever heard of such a thing?
  - type: text
    content: Has anyone seen anything like this?
  - type: text
    content: A country born in a day?
  - type: text
    content: A nation born in a flash?
  - type: text
    content: But Zion was barely in labor
  - type: text
    content: when she had her babies!
  - type: text
    content: Do I open the womb
  - type: text
    content: and not deliver the baby?
  - type: text
    content: Do I, the One who delivers babies,
  - type: text
    content: shut the womb?
