document_id: PSA.6
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2a
  - type: text
    text: ' Please, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', no more yelling,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: no more trips to the woodshed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Treat me nice for a change;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I’m so starved for affection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2b-3
  - type: text
    text: ' Can’t you see I’m black-and-blue,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: beaten up badly in bones and soul?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', how long will it take'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you to let up?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'Break in, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ', and break up this fight;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you love me at all, get me out of here.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m no good to you dead, am I?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I can’t sing in your choir if I’m buried in some tomb!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: I’m tired of all this—so tired. My bed
- type: usfm
  marker: q2
  children:
  - type: text
    text: has been floating forty days and nights
- type: usfm
  marker: q1
  children:
  - type: text
    text: On the flood of my tears.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My mattress is soaked, soggy with tears.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sockets of my eyes are black holes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nearly blind, I squint and grope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'Get out of here, you Devil’s crew:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'at last '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' has heard my sobs.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My requests have all been granted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my prayers are answered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cowards, my enemies disappear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Disgraced, they turn tail and run.
