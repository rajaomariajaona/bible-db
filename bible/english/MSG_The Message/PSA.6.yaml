document_id: PSA.6,97
type_code: eng
verses:
  '1':
  - type: text
    content: ' Please, '
  - type: text
    content: God
  - type: text
    content: ', no more yelling,'
  - type: text
    content: no more trips to the woodshed.
  - type: text
    content: Treat me nice for a change;
  - type: text
    content: I’m so starved for affection.
  '10':
  - type: text
    content: Cowards, my enemies disappear.
  - type: text
    content: Disgraced, they turn tail and run.
  '2':
  - type: text
    content: ' Can’t you see I’m black-and-blue,'
  - type: text
    content: beaten up badly in bones and soul?
  - type: text
    content: God
  - type: text
    content: ', how long will it take'
  - type: text
    content: for you to let up?
  '4':
  - type: text
    content: 'Break in, '
  - type: text
    content: God
  - type: text
    content: ', and break up this fight;'
  - type: text
    content: if you love me at all, get me out of here.
  - type: text
    content: I’m no good to you dead, am I?
  - type: text
    content: I can’t sing in your choir if I’m buried in some tomb!
  '6':
  - type: text
    content: I’m tired of all this—so tired. My bed
  - type: text
    content: has been floating forty days and nights
  - type: text
    content: On the flood of my tears.
  - type: text
    content: My mattress is soaked, soggy with tears.
  - type: text
    content: The sockets of my eyes are black holes;
  - type: text
    content: nearly blind, I squint and grope.
  '8':
  - type: text
    content: 'Get out of here, you Devil’s crew:'
  - type: text
    content: 'at last '
  - type: text
    content: God
  - type: text
    content: ' has heard my sobs.'
  - type: text
    content: My requests have all been granted,
  - type: text
    content: my prayers are answered.
