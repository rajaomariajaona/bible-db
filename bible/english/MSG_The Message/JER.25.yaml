document_id: JER.25,97
type_code: eng
verses:
  '1':
  - type: heading
    content: Don’t Follow the God-Fads of the Day
  - type: text
    content: This is the Message given to Jeremiah for all the people of Judah. It came in the fourth year of Jehoiakim son of Josiah king of Judah. It was the first year of Nebuchadnezzar king of Babylon.
  '12':
  - type: text
    content: '“Once the seventy years is up, I’ll punish the king of Babylon and the whole nation of Babylon for their sin. Then '
  - type: text
    content: they’ll
  - type: text
    content: ' be the wasteland. Everything that I said I’d do to that country, I’ll do—everything that’s written in this book, everything Jeremiah preached against all the godless nations. Many nations and great kings will make slaves of the Babylonians, paying them back for everything they’ve done to others. They won’t get by with anything.” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: heading
    content: God Puts the Human Race on Trial
  '15':
  - type: text
    content: 'This is a Message that the '
  - type: text
    content: God
  - type: text
    content: ' of Israel gave me: “Take this cup filled with the wine of my wrath that I’m handing to you. Make all the nations where I send you drink it down. They’ll drink it and get drunk, staggering in delirium because of the killing that I’m going to unleash among them.”'
  '17':
  - type: text
    content: 'I took the cup from '
  - type: text
    content: God
  - type: text
    content: '’s hand and made them drink it, all the nations to which he sent me:'
  - type: text
    content: Jerusalem and the towns of Judah, along with their kings and leaders, turning them into a vast wasteland, a horror to look at, a cussword—which, in fact, they now are;
  - type: text
    content: Pharaoh king of Egypt with his attendants and leaders, plus all his people and the melting pot of foreigners collected there;
  - type: text
    content: All the kings of Uz;
  - type: text
    content: All the kings of the Philistines from Ashkelon, Gaza, Ekron, and what’s left of Ashdod;
  - type: text
    content: Edom, Moab, and the Ammonites;
  - type: text
    content: All the kings of Tyre, Sidon, and the coastlands across the sea;
  - type: text
    content: Dedan, Tema, Buz, and the nomads on the fringe of the desert;
  - type: text
    content: All the kings of Arabia and the various Bedouin sheiks and chieftains wandering about in the desert;
  - type: text
    content: All the kings of Zimri, Elam, and the Medes;
  - type: text
    content: All the kings from the north countries near and far, one by one;
  - type: text
    content: All the kingdoms on planet Earth . . . 
  - type: text
    content: And the king of Sheshak (that is, Babylon) will be the last to drink.
  '2':
  - type: text
    content: 'Jeremiah the prophet delivered the Message to all the people of Judah and citizens of Jerusalem:'
  '27':
  - type: text
    content: '“Tell them, ‘These are orders from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies, the God of Israel: Drink and get drunk and vomit. Fall on your faces and don’t get up again. You’re slated for a massacre.’'
  '28':
  - type: text
    content: “If any of them refuse to take the cup from you and drink it, say to them, ‘
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies has ordered you to drink. So drink!
  '29':
  - type: text
    content: '“‘Prepare for the worst! I’m starting off the catastrophe in the city that I claim as my own, so don’t think you are going to get out of it. No, you’re not getting out of anything. It’s the sword and nothing but the sword against everyone everywhere!’” The '
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies’ Decree.
  '3':
  - type: text
    content: From the thirteenth year of Josiah son of Amon king of Judah right up to the present day—twenty-three years it’s been!—
  - type: text
    content: God
  - type: text
    content: ’s Word has come to me, and from early each morning to late every night I’ve passed it on to you. And you haven’t listened to a word of it!
  '30':
  - type: text
    content: '“Preach it all, Jeremiah. Preach the entire Message to them. Say:'
  - type: text
    content: “‘
  - type: text
    content: God
  - type: text
    content: ' roars like a lion from high heaven;'
  - type: text
    content: thunder rolls out from his holy dwelling—
  - type: text
    content: Ear-splitting bellows against his people,
  - type: text
    content: shouting hurrahs like workers in harvest.
  - type: text
    content: The noise reverberates all over the earth;
  - type: text
    content: everyone everywhere hears it.
  - type: text
    content: God
  - type: text
    content: ' makes his case against the godless nations.'
  - type: text
    content: He’s about to put the human race on trial.
  - type: text
    content: 'For the wicked the verdict is clear-cut:'
  - type: text
    content: 'death by the sword.’” '
  - type: text
    content: God
  - type: text
    content: ’s Decree.
  - type: text
    content: '* * *'
  '32':
  - type: text
    content: 'A Message from '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies:'
  - type: text
    content: “Prepare for the worst! Doomsday!
  - type: text
    content: Disaster is spreading from nation to nation.
  - type: text
    content: A huge storm is about to rage
  - type: text
    content: all across planet Earth.”
  - type: text
    content: '* * *'
  '33':
  - type: text
    content: 'Laid end to end, those killed in '
  - type: text
    content: God
  - type: text
    content: ’s judgment that day will stretch from one end of the earth to the other. No tears will be shed and no burials conducted. The bodies will be left where they fall, like so much horse dung fertilizing the fields.
  - type: text
    content: '* * *'
  '34':
  - type: text
    content: Wail, shepherds! Cry out for help!
  - type: text
    content: Grovel in the dirt, you masters of flocks!
  - type: text
    content: Time’s up—you’re slated for the slaughterhouse,
  - type: text
    content: like a choice ram with its throat cut.
  - type: text
    content: There’s no way out for the rulers,
  - type: text
    content: no escape for those shepherds.
  - type: text
    content: Hear that? Rulers crying for help,
  - type: text
    content: shepherds of the flock wailing!
  - type: text
    content: God
  - type: text
    content: ' is about to ravage their fine pastures.'
  - type: text
    content: The peaceful sheepfolds will be silent with death,
  - type: text
    content: 'silenced by '
  - type: text
    content: God
  - type: text
    content: ’s deadly anger.
  - type: text
    content: God will come out into the open
  - type: text
    content: like a lion leaping from its cover,
  - type: text
    content: And the country will be torn to pieces,
  - type: text
    content: ripped and ravaged by his anger.
  '4':
  - type: text
    content: 'Not only that but '
  - type: text
    content: God
  - type: text
    content: ' also sent a steady stream of prophets to you who were just as persistent as me, and you never listened. They told you, “Turn back—right now, each one of you!—from your evil way of life and bad behavior, and live in the land '
  - type: text
    content: God
  - type: text
    content: ' gave you and your ancestors, the land he intended to give you forever. Don’t follow the god-fads of the day, taking up and worshiping these no-gods. Don’t make me angry with your god-businesses, making and selling gods—a dangerous business!'
  '7':
  - type: text
    content: “You refused to listen to any of this, and now I am really angry. These god-making businesses of yours are your doom.”
  '8':
  - type: text
    content: 'The verdict of '
  - type: text
    content: God
  - type: text
    content: '-of-the-Angel-Armies on all this: “Because you have refused to listen to what I’ve said, I’m stepping in. I’m sending for the armies out of the north headed by Nebuchadnezzar king of Babylon, my servant in this, and I’m setting them on this land and people and even the surrounding countries. I’m devoting the whole works to total destruction—a horror to top all the horrors in history. And I’ll banish every sound of joy—singing, laughter, marriage festivities, genial workmen, candlelit suppers. The whole landscape will be one vast wasteland. These countries will be in subjection to the king of Babylon for seventy years.'
