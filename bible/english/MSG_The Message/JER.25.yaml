document_id: JER.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Follow the God-Fads of the Day
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is the Message given to Jeremiah for all the people of Judah. It came in the fourth year of Jehoiakim son of Josiah king of Judah. It was the first year of Nebuchadnezzar king of Babylon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jeremiah the prophet delivered the Message to all the people of Judah and citizens of Jerusalem:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: From the thirteenth year of Josiah son of Amon king of Judah right up to the present day—twenty-three years it’s been!—
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Word has come to me, and from early each morning to late every night I’ve passed it on to you. And you haven’t listened to a word of it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: 'Not only that but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' also sent a steady stream of prophets to you who were just as persistent as me, and you never listened. They told you, “Turn back—right now, each one of you!—from your evil way of life and bad behavior, and live in the land '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' gave you and your ancestors, the land he intended to give you forever. Don’t follow the god-fads of the day, taking up and worshiping these no-gods. Don’t make me angry with your god-businesses, making and selling gods—a dangerous business!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “You refused to listen to any of this, and now I am really angry. These god-making businesses of yours are your doom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-11
  - type: text
    text: 'The verdict of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies on all this: “Because you have refused to listen to what I’ve said, I’m stepping in. I’m sending for the armies out of the north headed by Nebuchadnezzar king of Babylon, my servant in this, and I’m setting them on this land and people and even the surrounding countries. I’m devoting the whole works to total destruction—a horror to top all the horrors in history. And I’ll banish every sound of joy—singing, laughter, marriage festivities, genial workmen, candlelit suppers. The whole landscape will be one vast wasteland. These countries will be in subjection to the king of Babylon for seventy years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-14
  - type: text
    text: '“Once the seventy years is up, I’ll punish the king of Babylon and the whole nation of Babylon for their sin. Then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they’ll
  - type: text
    text: ' be the wasteland. Everything that I said I’d do to that country, I’ll do—everything that’s written in this book, everything Jeremiah preached against all the godless nations. Many nations and great kings will make slaves of the Babylonians, paying them back for everything they’ve done to others. They won’t get by with anything.” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' Puts the Human Race on Trial'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'This is a Message that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' of Israel gave me: “Take this cup filled with the wine of my wrath that I’m handing to you. Make all the nations where I send you drink it down. They’ll drink it and get drunk, staggering in delirium because of the killing that I’m going to unleash among them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-26
  - type: text
    text: 'I took the cup from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '’s hand and made them drink it, all the nations to which he sent me:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Jerusalem and the towns of Judah, along with their kings and leaders, turning them into a vast wasteland, a horror to look at, a cussword—which, in fact, they now are;
- type: usfm
  marker: p
  children:
  - type: text
    text: Pharaoh king of Egypt with his attendants and leaders, plus all his people and the melting pot of foreigners collected there;
- type: usfm
  marker: p
  children:
  - type: text
    text: All the kings of Uz;
- type: usfm
  marker: p
  children:
  - type: text
    text: All the kings of the Philistines from Ashkelon, Gaza, Ekron, and what’s left of Ashdod;
- type: usfm
  marker: p
  children:
  - type: text
    text: Edom, Moab, and the Ammonites;
- type: usfm
  marker: p
  children:
  - type: text
    text: All the kings of Tyre, Sidon, and the coastlands across the sea;
- type: usfm
  marker: p
  children:
  - type: text
    text: Dedan, Tema, Buz, and the nomads on the fringe of the desert;
- type: usfm
  marker: p
  children:
  - type: text
    text: All the kings of Arabia and the various Bedouin sheiks and chieftains wandering about in the desert;
- type: usfm
  marker: p
  children:
  - type: text
    text: All the kings of Zimri, Elam, and the Medes;
- type: usfm
  marker: p
  children:
  - type: text
    text: All the kings from the north countries near and far, one by one;
- type: usfm
  marker: p
  children:
  - type: text
    text: All the kingdoms on planet Earth . . . 
- type: usfm
  marker: p
  children:
  - type: text
    text: And the king of Sheshak (that is, Babylon) will be the last to drink.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '“Tell them, ‘These are orders from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies, the God of Israel: Drink and get drunk and vomit. Fall on your faces and don’t get up again. You’re slated for a massacre.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “If any of them refuse to take the cup from you and drink it, say to them, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies has ordered you to drink. So drink!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“‘Prepare for the worst! I’m starting off the catastrophe in the city that I claim as my own, so don’t think you are going to get out of it. No, you’re not getting out of anything. It’s the sword and nothing but the sword against everyone everywhere!’” The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -of-the-Angel-Armies’ Decree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: text
    text: '“Preach it all, Jeremiah. Preach the entire Message to them. Say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' roars like a lion from high heaven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: thunder rolls out from his holy dwelling—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ear-splitting bellows against his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shouting hurrahs like workers in harvest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The noise reverberates all over the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone everywhere hears it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' makes his case against the godless nations.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s about to put the human race on trial.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the wicked the verdict is clear-cut:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'death by the sword.’” '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s Decree.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'A Message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: '-of-the-Angel-Armies:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Prepare for the worst! Doomsday!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Disaster is spreading from nation to nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A huge storm is about to rage
- type: usfm
  marker: q2
  children:
  - type: text
    text: all across planet Earth.”
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Laid end to end, those killed in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s judgment that day will stretch from one end of the earth to the other. No tears will be shed and no burials conducted. The bodies will be left where they fall, like so much horse dung fertilizing the fields.
- type: usfm
  marker: pc
  children:
  - type: text
    text: '* * *'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-38
  - type: text
    text: Wail, shepherds! Cry out for help!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Grovel in the dirt, you masters of flocks!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Time’s up—you’re slated for the slaughterhouse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a choice ram with its throat cut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s no way out for the rulers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no escape for those shepherds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hear that? Rulers crying for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shepherds of the flock wailing!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is about to ravage their fine pastures.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The peaceful sheepfolds will be silent with death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'silenced by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s deadly anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God will come out into the open
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a lion leaping from its cover,
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the country will be torn to pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ripped and ravaged by his anger.
