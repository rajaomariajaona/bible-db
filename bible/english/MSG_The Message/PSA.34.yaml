document_id: PSA.34,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I bless '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' every chance I get;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my lungs expand with his praise.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Young lions on the prowl get hungry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -seekers are full of God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, children, listen closely;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I’ll give you a lesson in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' worship.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who out there has a lust for life?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can’t wait each day to come upon beauty?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard your tongue from profanity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and no more lying through your teeth.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn your back on sin; do something good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Embrace peace—don’t let it get away!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' keeps an eye on his friends,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his ears pick up every moan and groan.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' won’t put up with rebels;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he’ll cull them from the pack.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is anyone crying for help? '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is listening,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready to rescue you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If your heart is broken, you’ll find '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' right there;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if you’re kicked in the gut, he’ll help you catch your breath.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disciples so often get into trouble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'still, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is there every time.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I live and breathe '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'if things aren’t going well, hear this and be happy:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s your bodyguard, shielding every bone;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not even a finger gets broken.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked commit slow suicide;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they waste their lives hating the good.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' pays for each slave’s freedom;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no one who runs to him loses out.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Join me in spreading the news;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: together let’s get the word out.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' met me more than halfway,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he freed me from my anxious fears.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at him; give him your warmest smile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never hide your feelings from him.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I was desperate, I called out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' got me out of a tight spot.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s angel sets up a circle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of protection around us while we pray.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open your mouth and taste, open your eyes and see—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'how good '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' is.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are you who run to him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' if you want the best;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: worship opens doors to all his goodness.
