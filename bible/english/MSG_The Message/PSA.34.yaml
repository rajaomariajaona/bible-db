document_id: PSA.34
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I bless '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' every chance I get;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: my lungs expand with his praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I live and breathe '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'if things aren’t going well, hear this and be happy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Join me in spreading the news;
- type: usfm
  marker: q1
  children:
  - type: text
    text: together let’s get the word out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' met me more than halfway,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: he freed me from my anxious fears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Look at him; give him your warmest smile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Never hide your feelings from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When I was desperate, I called out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' got me out of a tight spot.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ’s angel sets up a circle
- type: usfm
  marker: q1
  children:
  - type: text
    text: of protection around us while we pray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Open your mouth and taste, open your eyes and see—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'how good '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessed are you who run to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' if you want the best;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: worship opens doors to all his goodness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Young lions on the prowl get hungry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: -seekers are full of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Come, children, listen closely;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I’ll give you a lesson in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' worship.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Who out there has a lust for life?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can’t wait each day to come upon beauty?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Guard your tongue from profanity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and no more lying through your teeth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Turn your back on sin; do something good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Embrace peace—don’t let it get away!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' keeps an eye on his friends,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: his ears pick up every moan and groan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' won’t put up with rebels;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: he’ll cull them from the pack.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Is anyone crying for help? '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is listening,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ready to rescue you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'If your heart is broken, you’ll find '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' right there;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: if you’re kicked in the gut, he’ll help you catch your breath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Disciples so often get into trouble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'still, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' is there every time.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He’s your bodyguard, shielding every bone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: not even a finger gets broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The wicked commit slow suicide;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they waste their lives hating the good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' pays for each slave’s freedom;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no one who runs to him loses out.
