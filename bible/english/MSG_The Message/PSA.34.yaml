document_id: PSA.34,97
type_code: eng
verses:
  '1':
  - type: text
    content: 'I bless '
  - type: text
    content: God
  - type: text
    content: ' every chance I get;'
  - type: text
    content: my lungs expand with his praise.
  '10':
  - type: text
    content: Young lions on the prowl get hungry,
  - type: text
    content: 'but '
  - type: text
    content: God
  - type: text
    content: -seekers are full of God.
  '11':
  - type: text
    content: Come, children, listen closely;
  - type: text
    content: 'I’ll give you a lesson in '
  - type: text
    content: God
  - type: text
    content: ' worship.'
  '12':
  - type: text
    content: Who out there has a lust for life?
  - type: text
    content: Can’t wait each day to come upon beauty?
  '13':
  - type: text
    content: Guard your tongue from profanity,
  - type: text
    content: and no more lying through your teeth.
  '14':
  - type: text
    content: Turn your back on sin; do something good.
  - type: text
    content: Embrace peace—don’t let it get away!
  '15':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' keeps an eye on his friends,'
  - type: text
    content: his ears pick up every moan and groan.
  '16':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' won’t put up with rebels;'
  - type: text
    content: he’ll cull them from the pack.
  '17':
  - type: text
    content: 'Is anyone crying for help? '
  - type: text
    content: God
  - type: text
    content: ' is listening,'
  - type: text
    content: ready to rescue you.
  '18':
  - type: text
    content: 'If your heart is broken, you’ll find '
  - type: text
    content: God
  - type: text
    content: ' right there;'
  - type: text
    content: if you’re kicked in the gut, he’ll help you catch your breath.
  '19':
  - type: text
    content: Disciples so often get into trouble;
  - type: text
    content: 'still, '
  - type: text
    content: God
  - type: text
    content: ' is there every time.'
  '2':
  - type: text
    content: 'I live and breathe '
  - type: text
    content: God
  - type: text
    content: ;
  - type: text
    content: 'if things aren’t going well, hear this and be happy:'
  '20':
  - type: text
    content: He’s your bodyguard, shielding every bone;
  - type: text
    content: not even a finger gets broken.
  '21':
  - type: text
    content: The wicked commit slow suicide;
  - type: text
    content: they waste their lives hating the good.
  '22':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' pays for each slave’s freedom;'
  - type: text
    content: no one who runs to him loses out.
  '3':
  - type: text
    content: Join me in spreading the news;
  - type: text
    content: together let’s get the word out.
  '4':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' met me more than halfway,'
  - type: text
    content: he freed me from my anxious fears.
  '5':
  - type: text
    content: Look at him; give him your warmest smile.
  - type: text
    content: Never hide your feelings from him.
  '6':
  - type: text
    content: When I was desperate, I called out,
  - type: text
    content: 'and '
  - type: text
    content: God
  - type: text
    content: ' got me out of a tight spot.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ’s angel sets up a circle
  - type: text
    content: of protection around us while we pray.
  '8':
  - type: text
    content: Open your mouth and taste, open your eyes and see—
  - type: text
    content: 'how good '
  - type: text
    content: God
  - type: text
    content: ' is.'
  - type: text
    content: Blessed are you who run to him.
  '9':
  - type: text
    content: 'Worship '
  - type: text
    content: God
  - type: text
    content: ' if you want the best;'
  - type: text
    content: worship opens doors to all his goodness.
