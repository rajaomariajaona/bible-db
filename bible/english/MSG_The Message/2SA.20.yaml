document_id: 2SA.20,97
type_code: eng
verses:
  '1':
  - type: text
    content: Just then a good-for-nothing named Sheba son of Bicri the Benjaminite blew a blast on the ram’s horn trumpet, calling out,
  - type: text
    content: We’ve got nothing to do with David,
  - type: text
    content: there’s no future for us with the son of Jesse!
  - type: text
    content: Let’s get out of here, Israel—head for your tents!
  '11':
  - type: text
    content: One of Joab’s soldiers took up his post over the body and called out, “Everyone who sides with Joab and supports David, follow Joab!” Amasa was lying in a pool of blood in the middle of the road; the man realized that the whole army was going to stop and take a look, so he pulled Amasa’s corpse off the road into the field and threw a blanket over him so it wouldn’t collect spectators. As soon as he’d gotten him off the road, the traffic flowed normally, following Joab in the chase after Sheba son of Bicri. Sheba passed through all the tribes of Israel as far as Abel Beth Maacah; all the Bicrites clustered and followed him into the city.
  '15':
  - type: text
    content: Joab’s army arrived and laid siege to Sheba in Abel Beth Maacah. They built a siege-ramp up against the city’s fortification. The plan was to knock down the wall.
  '16':
  - type: text
    content: But a shrewd woman called out from the city, “Listen, everybody! Please tell Joab to come close so I can talk to him.” When he had come, the woman said, “Are you Joab?”
  - type: text
    content: He said, “I am.”
  - type: text
    content: “Then,” she said, “listen to what I have to say.”
  - type: text
    content: He said, “I’m listening.”
  '18':
  - type: text
    content: '“There’s an old saying in these parts: ‘If it’s answers you want, come to Abel and get it straight.’ We’re a peaceful people here, and reliable. And here you are, trying to tear down one of Israel’s mother cities. Why would you want to mess with '
  - type: text
    content: God
  - type: text
    content: ’s legacy like that?”
  '2':
  - type: text
    content: So all the men of Israel deserted David and followed Sheba son of Bicri. But the men of Judah stayed committed, sticking with their king all the way from the Jordan to Jerusalem. When David arrived home in Jerusalem, the king took the ten concubines he had left to watch the palace and placed them in seclusion, under guard. He provided for their needs but didn’t visit them. They were virtual prisoners until they died, widows as long as they lived.
  '20':
  - type: text
    content: Joab protested, “Believe me, you’ve got me all wrong. I’m not here to hurt anyone or destroy anything—not on your life! But a man from the hill country of Ephraim, Sheba son of Bicri by name, revolted against King David; hand him over, him only, and we’ll get out of here.”
  - type: text
    content: The woman told Joab, “Sounds good. His head will be tossed to you from the wall.”
  '22':
  - type: text
    content: 'The woman presented her strategy to the whole city and they did it: They cut off the head of Sheba son of Bicri and tossed it down to Joab. He then blew a blast on the ram’s horn trumpet and the soldiers all went home. Joab returned to the king in Jerusalem.'
  '23':
  - type: text
    content: Joab was again commander of the whole army of Israel. Benaiah son of Jehoiada was over the Kerethites and Pelethites; Adoniram over the work crews; Jehoshaphat son of Ahilud was clerk; Sheva was historian; Zadok and Abiathar were priests; Ira the Jairite was David’s chaplain.
  '4':
  - type: text
    content: The king ordered Amasa, “Muster the men of Judah for me in three days; then report in.” Amasa went to carry out his orders, but he was late reporting back. So David told Abishai, “Sheba son of Bicri is going to hurt us even worse than Absalom did. Take your master’s servants and hunt him down before he gets holed up in some fortress city where we can’t get to him.” So under Abishai’s command, all the best men—Joab’s men and the Kerethites and Pelethites—left Jerusalem to hunt down Sheba son of Bicri. They were near the boulder at Gibeon when Amasa came their way. Joab was wearing a tunic with a sheathed sword strapped on his waist, but the sword slipped out and fell to the ground. Joab greeted Amasa, “How are you, brother?” and took Amasa’s beard in his right hand as if to kiss him. Amasa didn’t notice the sword in Joab’s other hand. Joab stuck him in the belly and his guts spilled to the ground. A second blow wasn’t needed; he was dead. Then Joab and his brother Abishai continued to chase Sheba son of Bicri.
