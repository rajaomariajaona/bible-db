document_id: GEN.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Giants in the Land
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: When the human race began to increase, with more and more daughters being born, the sons of God noticed that the daughters of men were beautiful. They looked them over and picked out wives for themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “I’m not going to breathe life into men and women endlessly. Eventually they’re going to die; from now on they can expect a life span of 120 years.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: This was back in the days (and also later) when there were giants in the land. The giants came from the union of the sons of God and the daughters of men. These were the mighty men of ancient lore, the famous ones.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noah and His Sons
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-7
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' saw that human evil was out of control. People thought evil, imagined evil—evil, evil, evil from morning to night. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' was sorry that he had made the human race in the first place; it broke his heart. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' said, “I’ll get rid of my ruined creation, make a clean sweep: people, animals, snakes and bugs, birds—the works. I’m sorry I made them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But Noah was different. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: God
  - type: text
    text: ' liked what he saw in Noah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'This is the story of Noah: Noah was a good man, a man of integrity in his community. Noah walked with God. Noah had three sons: Shem, Ham, and Japheth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: As far as God was concerned, the Earth had become a sewer; there was violence everywhere. God took one look and saw how bad it was, everyone corrupt and corrupting—life itself corrupt to the core.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: God said to Noah, “It’s all over. It’s the end of the human race. The violence is everywhere; I’m making a clean sweep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-16
  - type: text
    text: “Build yourself a ship from teakwood. Make rooms in it. Coat it with pitch inside and out. Make it 450 feet long, seventy-five feet wide, and forty-five feet high. Build a roof for it and put in a window eighteen inches from the top; put in a door on the side of the ship; and make three decks, lower, middle, and upper.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “I’m going to bring a flood on the Earth that will destroy everything alive under Heaven. Total destruction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-21
  - type: text
    text: '“But I’m going to establish a covenant with you: You’ll board the ship, and your sons, your wife and your sons’ wives will come on board with you. You are also to take two of each living creature, a male and a female, on board the ship, to preserve their lives with you: two of every species of bird, mammal, and reptile—two of everything so as to preserve their lives along with yours. Also get all the food you’ll need and store it up for you and them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Noah did everything God commanded him to do.
