document_id: JER.18,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To Worship the Big Lie
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' told Jeremiah, “Up on your feet! Go to the potter’s house. When you get there, I’ll tell you what I have to say.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“So, tell the people of Judah and citizens of Jerusalem my Message: ‘Danger! I’m shaping doom against you, laying plans against you. Turn back from your doomed way of life. Straighten out your lives.’'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “But they’ll just say, ‘Why should we? What’s the point? We’ll live just the way we’ve always lived, doom or no doom.’”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-17
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ask around.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Survey the godless nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has anyone heard the likes of this?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Virgin Israel has become a slut!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does snow disappear from the Lebanon peaks?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do alpine streams run dry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my people have left me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to worship the Big Lie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve gotten off the track,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the old, well-worn trail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now bushwhack through underbrush
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a tangle of roots and vines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their land’s going to end up a mess—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a fool’s memorial to be spit on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Travelers passing through
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will shake their heads in disbelief.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll scatter my people before their enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like autumn leaves in a high wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On their day of doom, they’ll stare at my back as I walk away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: catching not so much as a glimpse of my face.”
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Some of the people said, “Come on, let’s cook up a plot against Jeremiah. We’ll still have the priests to teach us the law, wise counselors to give us advice, and prophets to tell us what God has to say. Come on, let’s discredit him so we don’t have to put up with him any longer.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-23
    - type: text
      text: 'And I said to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ', listen to me!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Just listen to what my enemies are saying.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should I get paid evil for good?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That’s what they’re doing. They’ve made plans to kill me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember all the times I stood up for them before you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: speaking up for them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trying to soften your anger?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But enough! Let their children starve!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them be massacred in battle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their wives be childless and widowed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their friends die and their proud young men be killed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let cries of panic sound from their homes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you surprise them with war parties!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re all set to lynch me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The noose is practically around my neck!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you know all this, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You know they’re determined to kill me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t whitewash their crimes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: don’t overlook a single sin!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Round the bunch of them up before you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Strike while the iron of your anger is hot!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: So I went to the potter’s house, and sure enough, the potter was there, working away at his wheel. Whenever the pot the potter was working on turned out badly, as sometimes happens when you are working with clay, the potter would simply start over and use the same clay to make another pot.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 5-10
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '’s Message came to me: “Can’t I do just as this potter does, people of Israel?” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ’s Decree! “Watch this potter. In the same way that this potter works his clay, I work on you, people of Israel. At any moment I may decide to pull up a people or a country by the roots and get rid of them. But if they repent of their wicked lives, I will think twice and start over with them. At another time I might decide to plant a people or country, but if they don’t cooperate and won’t listen to me, I will think again and give up on the plans I had for them.
