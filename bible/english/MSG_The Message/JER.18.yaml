document_id: JER.18,97
type_code: eng
verses:
  '1':
  - type: heading
    content: To Worship the Big Lie
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: ' told Jeremiah, “Up on your feet! Go to the potter’s house. When you get there, I’ll tell you what I have to say.”'
  '11':
  - type: text
    content: '“So, tell the people of Judah and citizens of Jerusalem my Message: ‘Danger! I’m shaping doom against you, laying plans against you. Turn back from your doomed way of life. Straighten out your lives.’'
  '12':
  - type: text
    content: “But they’ll just say, ‘Why should we? What’s the point? We’ll live just the way we’ve always lived, doom or no doom.’”
  - type: text
    content: '* * *'
  '13':
  - type: text
    content: ' '
  - type: text
    content: God
  - type: text
    content: '’s Message:'
  - type: text
    content: “Ask around.
  - type: text
    content: Survey the godless nations.
  - type: text
    content: Has anyone heard the likes of this?
  - type: text
    content: Virgin Israel has become a slut!
  - type: text
    content: Does snow disappear from the Lebanon peaks?
  - type: text
    content: Do alpine streams run dry?
  - type: text
    content: But my people have left me
  - type: text
    content: to worship the Big Lie.
  - type: text
    content: They’ve gotten off the track,
  - type: text
    content: the old, well-worn trail,
  - type: text
    content: And now bushwhack through underbrush
  - type: text
    content: in a tangle of roots and vines.
  - type: text
    content: Their land’s going to end up a mess—
  - type: text
    content: a fool’s memorial to be spit on.
  - type: text
    content: Travelers passing through
  - type: text
    content: will shake their heads in disbelief.
  - type: text
    content: I’ll scatter my people before their enemies,
  - type: text
    content: like autumn leaves in a high wind.
  - type: text
    content: On their day of doom, they’ll stare at my back as I walk away,
  - type: text
    content: catching not so much as a glimpse of my face.”
  - type: text
    content: '* * *'
  '18':
  - type: text
    content: Some of the people said, “Come on, let’s cook up a plot against Jeremiah. We’ll still have the priests to teach us the law, wise counselors to give us advice, and prophets to tell us what God has to say. Come on, let’s discredit him so we don’t have to put up with him any longer.”
  '19':
  - type: text
    content: 'And I said to '
  - type: text
    content: God
  - type: text
    content: ':'
  - type: text
    content: “
  - type: text
    content: God
  - type: text
    content: ', listen to me!'
  - type: text
    content: Just listen to what my enemies are saying.
  - type: text
    content: Should I get paid evil for good?
  - type: text
    content: That’s what they’re doing. They’ve made plans to kill me!
  - type: text
    content: Remember all the times I stood up for them before you,
  - type: text
    content: speaking up for them,
  - type: text
    content: trying to soften your anger?
  - type: text
    content: But enough! Let their children starve!
  - type: text
    content: Let them be massacred in battle!
  - type: text
    content: Let their wives be childless and widowed,
  - type: text
    content: their friends die and their proud young men be killed.
  - type: text
    content: Let cries of panic sound from their homes
  - type: text
    content: as you surprise them with war parties!
  - type: text
    content: They’re all set to lynch me.
  - type: text
    content: The noose is practically around my neck!
  - type: text
    content: 'But you know all this, '
  - type: text
    content: God
  - type: text
    content: .
  - type: text
    content: You know they’re determined to kill me.
  - type: text
    content: Don’t whitewash their crimes,
  - type: text
    content: don’t overlook a single sin!
  - type: text
    content: Round the bunch of them up before you.
  - type: text
    content: Strike while the iron of your anger is hot!”
  '3':
  - type: text
    content: So I went to the potter’s house, and sure enough, the potter was there, working away at his wheel. Whenever the pot the potter was working on turned out badly, as sometimes happens when you are working with clay, the potter would simply start over and use the same clay to make another pot.
  '5':
  - type: text
    content: 'Then '
  - type: text
    content: God
  - type: text
    content: '’s Message came to me: “Can’t I do just as this potter does, people of Israel?” '
  - type: text
    content: God
  - type: text
    content: ’s Decree! “Watch this potter. In the same way that this potter works his clay, I work on you, people of Israel. At any moment I may decide to pull up a people or a country by the roots and get rid of them. But if they repent of their wicked lives, I will think twice and start over with them. At another time I might decide to plant a people or country, but if they don’t cooperate and won’t listen to me, I will think again and give up on the plans I had for them.
