document_id: MAT.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Who Needs a Doctor?
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: Back in the boat, Jesus and the disciples recrossed the sea to Jesus’ hometown. They were hardly out of the boat when some men carried a paraplegic on a stretcher and set him down in front of them. Jesus, impressed by their bold belief, said to the paraplegic, “Cheer up, son. I forgive your sins.” Some religion scholars whispered, “Why, that’s blasphemy!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-8
  - type: text
    text: 'Jesus knew what they were thinking, and said, “Why this gossipy whispering? Which do you think is simpler: to say, ‘I forgive your sins,’ or, ‘Get up and walk’? Well, just so it’s clear that I’m the Son of Man and authorized to do either, or both. . . .” At this he turned to the paraplegic and said, “Get up. Take your bed and go home.” And the man did it. The crowd was awestruck, amazed and pleased that God had authorized Jesus to work among them this way.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Passing along, Jesus saw a man at his work collecting taxes. His name was Matthew. Jesus said, “Come along with me.” Matthew stood up and followed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Later when Jesus was eating supper at Matthew’s house with his close followers, a lot of disreputable characters came and joined them. When the Pharisees saw him keeping this kind of company, they had a fit, and lit into Jesus’ followers. “What kind of example is this from your Teacher, acting cozy with crooks and misfits?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'Jesus, overhearing, shot back, “Who needs a doctor: the healthy or the sick? Go figure out what this Scripture means: ‘I’m after mercy, not religion.’ I’m here to invite outsiders, not coddle insiders.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Kingdom Come
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A little later John’s followers approached, asking, “Why is it that we and the Pharisees rigorously discipline body and spirit by fasting, but your followers don’t?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jesus told them, “When you’re celebrating a wedding, you don’t skimp on the cake and wine. You feast. Later you may need to exercise moderation, but not now. No one throws cold water on a friendly bonfire. This is Kingdom Come!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 16-17
  - type: text
    text: He went on, “No one cuts up a fine silk scarf to patch old work clothes; you want fabrics that match. And you don’t put your wine in cracked bottles.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Just a Touch
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: As he finished saying this, a local official appeared, bowed politely, and said, “My daughter has just now died. If you come and touch her, she will live.” Jesus got up and went with him, his disciples following along.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: 'Just then a woman who had hemorrhaged for twelve years slipped in from behind and lightly touched his robe. She was thinking to herself, “If I can just put a finger on his robe, I’ll get well.” Jesus turned—caught her at it. Then he reassured her: “Courage, daughter. You took a risk of faith, and now you’re well.” The woman was well from then on.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-26
  - type: text
    text: 'By now they had arrived at the house of the town official, and pushed their way through the gossips looking for a story and the neighbors bringing in casseroles. Jesus was abrupt: “Clear out! This girl isn’t dead. She’s sleeping.” They told him he didn’t know what he was talking about. But when Jesus had gotten rid of the crowd, he went in, took the girl’s hand, and pulled her to her feet—alive. The news was soon out, and traveled throughout the region.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Become What You Believe
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-28
  - type: text
    text: As Jesus left the house, he was followed by two blind men crying out, “Mercy, Son of David! Mercy on us!” When Jesus got home, the blind men went in with him. Jesus said to them, “Do you really believe I can do this?” They said, “Why, yes, Master!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-31
  - type: text
    text: He touched their eyes and said, “Become what you believe.” It happened. They saw. Then Jesus became very stern. “Don’t let a soul know how this happened.” But they were hardly out the door before they started blabbing it to everyone they met.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 32-33
  - type: text
    text: 'Right after that, as the blind men were leaving, a man who had been struck speechless by an evil spirit was brought to Jesus. As soon as Jesus threw the evil tormenting spirit out, the man talked away just as if he’d been talking all his life. The people were up on their feet applauding: “There’s never been anything like this in Israel!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The Pharisees were left sputtering, “Smoke and mirrors. It’s nothing but smoke and mirrors. He’s probably made a pact with the Devil.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 35-38
  - type: text
    text: Then Jesus made a circuit of all the towns and villages. He taught in their meeting places, reported kingdom news, and healed their diseased bodies, healed their bruised and hurt lives. When he looked out over the crowds, his heart broke. So confused and aimless they were, like sheep with no shepherd. “What a huge harvest!” he said to his disciples. “How few workers! On your knees and pray for harvest hands!”
