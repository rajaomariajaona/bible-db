document_id: ISA.23,97
type_code: eng
verses:
  '1':
  - type: heading
    content: It Was All Numbers, Dead Numbers, Profit and Loss
  - type: text
    content: Wail, ships of Tarshish,
  - type: text
    content: your strong seaports all in ruins!
  - type: text
    content: When the ships returned from Cyprus,
  - type: text
    content: they saw the destruction.
  - type: text
    content: Hold your tongue, you who live on the seacoast,
  - type: text
    content: merchants of Sidon.
  - type: text
    content: Your people sailed the deep seas,
  - type: text
    content: buying and selling,
  - type: text
    content: Making money on wheat from Shihor,
  - type: text
    content: grown along the Nile—
  - type: text
    content: multinational broker in grains!
  - type: text
    content: Hang your head in shame, Sidon. The Sea speaks up,
  - type: text
    content: the powerhouse of the ocean says,
  - type: text
    content: “I’ve never had labor pains, never had a baby,
  - type: text
    content: never reared children to adulthood,
  - type: text
    content: Never gave life, never worked with life.
  - type: text
    content: It was all numbers, dead numbers, profit and loss.”
  '13':
  - type: text
    content: 'Look at what happened to Babylon: There’s nothing left of it. Assyria turned it into a desert, into a refuge for wild dogs and stray cats. They brought in their big siege engines, tore down the buildings, and left nothing behind but rubble.'
  '14':
  - type: text
    content: Wail, ships of Tarshish,
  - type: text
    content: your strong seaports all in ruins!
  - type: text
    content: '* * *'
  '15':
  - type: text
    content: 'For the next seventy years, a king’s lifetime, Tyre will be forgotten. At the end of the seventy years, Tyre will stage a comeback, but it will be the comeback of a worn-out whore, as in the song:'
  - type: text
    content: “Take a harp, circle the city,
  - type: text
    content: unremembered whore.
  - type: text
    content: Sing your old songs, your many old songs.
  - type: text
    content: Maybe someone will remember.”
  '17':
  - type: text
    content: 'At the end of the seventy years, '
  - type: text
    content: God
  - type: text
    content: ' will look in on Tyre. She’ll go back to her old whoring trade, selling herself to the highest bidder, doing anything with anyone—promiscuous with all the kingdoms of earth—for a fee. But everything she gets, all the money she takes in, will be turned over to '
  - type: text
    content: God
  - type: text
    content: '. It will not be put in banks. Her profits will be put to the use of '
  - type: text
    content: God
  - type: text
    content: '-Aware, '
  - type: text
    content: God
  - type: text
    content: -Serving-People, providing plenty of food and the best of clothing.
  '5':
  - type: text
    content: When Egypt gets the report on Tyre,
  - type: text
    content: what wailing! what wringing of hands!
  - type: heading
    content: Nothing Left Here to Be Proud Of
  '6':
  - type: text
    content: Visit Tarshish, you who live on the seacoast.
  - type: text
    content: Take a good, long look and wail—yes, cry buckets of tears!
  - type: text
    content: Is this the city you remember as energetic and alive,
  - type: text
    content: bustling with activity, this historic old city,
  - type: text
    content: Expanding throughout the globe,
  - type: text
    content: buying and selling all over the world?
  - type: text
    content: And who is behind the collapse of Tyre,
  - type: text
    content: the Tyre that controlled the world markets?
  - type: text
    content: Tyre’s merchants were the business tycoons.
  - type: text
    content: Tyre’s traders called all the shots.
  - type: text
    content: God
  - type: text
    content: -of-the-Angel-Armies ordered the crash
  - type: text
    content: to show the sordid backside of pride
  - type: text
    content: and puncture the inflated reputations.
  - type: text
    content: Sail for home, O ships of Tarshish.
  - type: text
    content: There are no docks left in this harbor.
  - type: text
    content: God
  - type: text
    content: ' reached out to the sea and sea traders,'
  - type: text
    content: threw the sea kingdoms into turmoil.
  - type: text
    content: God
  - type: text
    content: ' ordered the destruction'
  - type: text
    content: of the seacoast cities, the centers of commerce.
  - type: text
    content: God
  - type: text
    content: ' said, “There’s nothing left here to be proud of,'
  - type: text
    content: bankrupt and bereft Sidon.
  - type: text
    content: Do you want to make a new start in Cyprus?
  - type: text
    content: Don’t count on it. Nothing there will work out for you either.”
