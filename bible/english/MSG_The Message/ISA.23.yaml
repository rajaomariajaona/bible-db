document_id: ISA.23,97
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: It Was All Numbers, Dead Numbers, Profit and Loss
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-4
    - type: text
      text: Wail, ships of Tarshish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your strong seaports all in ruins!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the ships returned from Cyprus,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they saw the destruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hold your tongue, you who live on the seacoast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: merchants of Sidon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people sailed the deep seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: buying and selling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Making money on wheat from Shihor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grown along the Nile—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: multinational broker in grains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hang your head in shame, Sidon. The Sea speaks up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the powerhouse of the ocean says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ve never had labor pains, never had a baby,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never reared children to adulthood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never gave life, never worked with life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It was all numbers, dead numbers, profit and loss.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Look at what happened to Babylon: There’s nothing left of it. Assyria turned it into a desert, into a refuge for wild dogs and stray cats. They brought in their big siege engines, tore down the buildings, and left nothing behind but rubble.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Wail, ships of Tarshish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your strong seaports all in ruins!
  - type: usfm
    marker: pc
    children:
    - type: text
      text: '* * *'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: 'For the next seventy years, a king’s lifetime, Tyre will be forgotten. At the end of the seventy years, Tyre will stage a comeback, but it will be the comeback of a worn-out whore, as in the song:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take a harp, circle the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unremembered whore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing your old songs, your many old songs.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Maybe someone will remember.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'At the end of the seventy years, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' will look in on Tyre. She’ll go back to her old whoring trade, selling herself to the highest bidder, doing anything with anyone—promiscuous with all the kingdoms of earth—for a fee. But everything she gets, all the money she takes in, will be turned over to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '. It will not be put in banks. Her profits will be put to the use of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: '-Aware, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -Serving-People, providing plenty of food and the best of clothing.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: When Egypt gets the report on Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what wailing! what wringing of hands!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nothing Left Here to Be Proud Of
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-12
    - type: text
      text: Visit Tarshish, you who live on the seacoast.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take a good, long look and wail—yes, cry buckets of tears!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is this the city you remember as energetic and alive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bustling with activity, this historic old city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Expanding throughout the globe,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: buying and selling all over the world?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who is behind the collapse of Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Tyre that controlled the world markets?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tyre’s merchants were the business tycoons.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tyre’s traders called all the shots.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: -of-the-Angel-Armies ordered the crash
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to show the sordid backside of pride
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and puncture the inflated reputations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sail for home, O ships of Tarshish.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There are no docks left in this harbor.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' reached out to the sea and sea traders,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: threw the sea kingdoms into turmoil.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' ordered the destruction'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the seacoast cities, the centers of commerce.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: God
    - type: text
      text: ' said, “There’s nothing left here to be proud of,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bankrupt and bereft Sidon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you want to make a new start in Cyprus?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Don’t count on it. Nothing there will work out for you either.”
