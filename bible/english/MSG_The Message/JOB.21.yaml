document_id: JOB.21
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Job’s Response
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Why Do the Wicked Have It So Good?
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Job replied:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now listen to me carefully, please listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at least do me the favor of listening.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put up with me while I have my say—
- type: usfm
  marker: q2
  children:
  - type: text
    text: then you can mock me later to your heart’s content.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-16
  - type: text
    text: '“It’s not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' I’m complaining to—it’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is it any wonder I’m getting fed up with his silence?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take a good look at me. Aren’t you appalled by what’s happened?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No! Don’t say anything. I can do without your comments.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I look back, I go into shock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body is racked with spasms.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why do the wicked have it so good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: live to a ripe old age and get rich?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They get to see their children succeed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: get to watch and enjoy their grandchildren.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their homes are peaceful and free from fear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they never experience God’s disciplining rod.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their bulls breed with great vigor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their cows calve without fail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They send their children out to play
- type: usfm
  marker: q2
  children:
  - type: text
    text: and watch them frolic like spring lambs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They make music with fiddles and flutes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: have good times singing and dancing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have a long life on easy street,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and die painlessly in their sleep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They say to God, ‘Get lost!
- type: usfm
  marker: q2
  children:
  - type: text
    text: We’ve no interest in you or your ways.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why should we have dealings with God Almighty?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What’s there in it for us?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But they’re wrong, dead wrong—they’re not gods.
- type: usfm
  marker: q2
  children:
  - type: text
    text: It’s beyond me how they can carry on like this!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-21
  - type: text
    text: “Still, how often does it happen that the wicked fail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or disaster strikes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or they get their just deserts?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How often are they blown away by bad luck?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Not very often.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You might say, ‘God is saving up the punishment for their children.’
- type: usfm
  marker: q2
  children:
  - type: text
    text: I say, ‘Give it to them right now so they’ll know what they’ve done!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: They deserve to experience the effects of their evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: feel the full force of God’s wrath firsthand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What do they care what happens to their families
- type: usfm
  marker: q2
  children:
  - type: text
    text: after they’re safely tucked away in the grave?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fancy Funerals with All the Trimmings
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-26
  - type: text
    text: “But who are we to tell God how to run his affairs?
- type: usfm
  marker: q2
  children:
  - type: text
    text: He’s dealing with matters that are way over our heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Some people die in the prime of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with everything going for them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: fat and sassy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Others die bitter and bereft,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never getting a taste of happiness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re laid out side by side in the cemetery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the worms can’t tell one from the other.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 27-33
  - type: text
    text: “I’m not deceived. I know what you’re up to,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the plans you’re cooking up to bring me down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Naively you claim that the castles of tyrants fall to pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the achievements of the wicked collapse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Have you ever asked world travelers how they see it?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you not listened to their stories
- type: usfm
  marker: q1
  children:
  - type: text
    text: Of evil men and women who got off scot-free,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who never had to pay for their wickedness?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Did anyone ever confront them with their crimes?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Did they ever have to face the music?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not likely—they’re given fancy funerals
- type: usfm
  marker: q2
  children:
  - type: text
    text: with all the trimmings,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gently lowered into expensive graves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with everyone telling lies about how wonderful they were.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “So how do you expect me to get any comfort from your nonsense?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your so-called comfort is a tissue of lies.”
