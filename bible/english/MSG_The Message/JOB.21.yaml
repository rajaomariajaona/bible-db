type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Response
  - type: heading
    content: Why Do the Wicked Have It So Good?
  - type: text
    content: 'Job replied:'
  - type: text
    content: “Now listen to me carefully, please listen,
  - type: text
    content: at least do me the favor of listening.
  - type: text
    content: Put up with me while I have my say—
  - type: text
    content: then you can mock me later to your heart’s content.
  '17':
  - type: text
    content: “Still, how often does it happen that the wicked fail,
  - type: text
    content: or disaster strikes,
  - type: text
    content: or they get their just deserts?
  - type: text
    content: How often are they blown away by bad luck?
  - type: text
    content: Not very often.
  - type: text
    content: You might say, ‘God is saving up the punishment for their children.’
  - type: text
    content: I say, ‘Give it to them right now so they’ll know what they’ve done!’
  - type: text
    content: They deserve to experience the effects of their evil,
  - type: text
    content: feel the full force of God’s wrath firsthand.
  - type: text
    content: What do they care what happens to their families
  - type: text
    content: after they’re safely tucked away in the grave?
  - type: heading
    content: Fancy Funerals with All the Trimmings
  '22':
  - type: text
    content: “But who are we to tell God how to run his affairs?
  - type: text
    content: He’s dealing with matters that are way over our heads.
  - type: text
    content: Some people die in the prime of life,
  - type: text
    content: with everything going for them—
  - type: text
    content: fat and sassy.
  - type: text
    content: Others die bitter and bereft,
  - type: text
    content: never getting a taste of happiness.
  - type: text
    content: They’re laid out side by side in the cemetery,
  - type: text
    content: where the worms can’t tell one from the other.
  '27':
  - type: text
    content: “I’m not deceived. I know what you’re up to,
  - type: text
    content: the plans you’re cooking up to bring me down.
  - type: text
    content: Naively you claim that the castles of tyrants fall to pieces,
  - type: text
    content: that the achievements of the wicked collapse.
  - type: text
    content: Have you ever asked world travelers how they see it?
  - type: text
    content: Have you not listened to their stories
  - type: text
    content: Of evil men and women who got off scot-free,
  - type: text
    content: who never had to pay for their wickedness?
  - type: text
    content: Did anyone ever confront them with their crimes?
  - type: text
    content: Did they ever have to face the music?
  - type: text
    content: Not likely—they’re given fancy funerals
  - type: text
    content: with all the trimmings,
  - type: text
    content: Gently lowered into expensive graves,
  - type: text
    content: with everyone telling lies about how wonderful they were.
  '34':
  - type: text
    content: “So how do you expect me to get any comfort from your nonsense?
  - type: text
    content: Your so-called comfort is a tissue of lies.”
  '4':
  - type: text
    content: '“It’s not '
  - type: text
    content: you
  - type: text
    content: ' I’m complaining to—it’s '
  - type: text
    content: God.
  - type: text
    content: Is it any wonder I’m getting fed up with his silence?
  - type: text
    content: Take a good look at me. Aren’t you appalled by what’s happened?
  - type: text
    content: No! Don’t say anything. I can do without your comments.
  - type: text
    content: When I look back, I go into shock,
  - type: text
    content: my body is racked with spasms.
  - type: text
    content: Why do the wicked have it so good,
  - type: text
    content: live to a ripe old age and get rich?
  - type: text
    content: They get to see their children succeed,
  - type: text
    content: get to watch and enjoy their grandchildren.
  - type: text
    content: Their homes are peaceful and free from fear;
  - type: text
    content: they never experience God’s disciplining rod.
  - type: text
    content: Their bulls breed with great vigor
  - type: text
    content: and their cows calve without fail.
  - type: text
    content: They send their children out to play
  - type: text
    content: and watch them frolic like spring lambs.
  - type: text
    content: They make music with fiddles and flutes,
  - type: text
    content: have good times singing and dancing.
  - type: text
    content: They have a long life on easy street,
  - type: text
    content: and die painlessly in their sleep.
  - type: text
    content: They say to God, ‘Get lost!
  - type: text
    content: We’ve no interest in you or your ways.
  - type: text
    content: Why should we have dealings with God Almighty?
  - type: text
    content: What’s there in it for us?’
  - type: text
    content: But they’re wrong, dead wrong—they’re not gods.
  - type: text
    content: It’s beyond me how they can carry on like this!
