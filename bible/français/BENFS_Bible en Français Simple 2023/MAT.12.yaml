document_id: MAT.12
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 12
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' regardent ce que Jésus fait le jour de repos'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus traversait des champs de blé. C’était le jour de repos. Ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' avaient faim. Alors ils ont commencé à cueillir les épis de blé. Ils mangeaient les grains. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' étaient avec eux. Et ils ont vu cela. Ils ont dit à Jésus : Regarde ce que tes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' font. Ils sont contre la loi de Dieu. Ils font cela le jour où nous nous reposons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '  : Le roi David et ses amis avaient faim une fois. Rappelez‑vous ce qu’ils avaient fait. Vous avez lu à ce sujet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David est entré dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Et il a mangé les pains que le peuple avait offerts à Dieu. Il en a donné à ses compagnons. Or la loi permettait seulement aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' de les manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En plus, vous devez savoir ce que dit la loi de Dieu. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' travaillent dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' le jour de repos. Mais la loi de Dieu ne dit pas qu’ils ont mal agi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je vous dis la vérité : Il y a quelqu’un ici qui est plus grand que le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il y a longtemps, un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' a écrit : Dieu veut que les gens soient gentils les uns envers les autres. Il ne veut pas seulement que vous lui donniez des offrandes. Vous ne comprenez pas ce que cela signifie vraiment. Si vous aviez compris cela, alors vous ne pourriez pas me dire : Tes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' font quelque chose de mal. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le Fils de l’homme a le pouvoir sur le jour de repos.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus a quitté cet endroit. Il est entré dans le bâtiment de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un homme était là, il avait une petite main. Elle était très faible. Cet homme ne pouvait pas l’utiliser. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' voulaient trouver une raison d’accuser Jésus. Alors ils lui ont demandé : Est‑il juste de guérir quelqu’un le jour de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabbat
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus leur a répondu : L’un de vous peut avoir une brebis. Cette brebis peut tomber dans un trou profond le jour de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabbat
  - type: text
    text: . Il ne va pas la laisser dans ce trou profond. Il va la faire sortir de là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un homme est beaucoup plus important qu’une brebis. Donc, notre loi dit que nous pouvons faire de bonnes choses le jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sabbat
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Jésus a dit à l’homme avec la main faible : Tends ta main. Donc, l’homme a tendu sa main. Elle était maintenant bien. C’était la même chose que l’autre main. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont quitté le bâtiment de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Ils pensaient comment tuer Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu a choisi Jésus pour faire un travail important
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus savait que les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' voulaient le tuer. Donc, il a quitté cet endroit. Beaucoup de gens le suivaient et il guérissait tous les malades. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il a dit à tous ces gens : Ne parlez de moi à personne. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors c’était l’accomplissement de ce que le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' Ésaïe avait dit :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Voici mon serviteur.
- type: usfm
  marker: p
  children:
  - type: text
    text: Je l’ai choisi afin de travailler pour moi. 
- type: usfm
  marker: p
  children:
  - type: text
    text: Je l’aime et il me rend très heureux.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je vais lui donner mon  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ', afin qu’il soit puissant.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il dira aux gens partout que je vais les juger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il ne discutera pas, il ne criera pas sur les gens.
- type: usfm
  marker: p
  children:
  - type: text
    text: Les gens ne l’entendront pas crier dans les rues.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il ne fera pas mal aux gens faibles.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il sera bon envers les gens qui ne sont pas forts.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il le fera jusqu’à ce qu’il y ait la justice partout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et tout le monde, partout, va croire qu’il peut les sauver.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle de Satan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après cela, certaines personnes ont amené un homme auprès de Jésus. L’homme ne pouvait pas voir. Il ne pouvait pas non plus parler. C’était à cause d’un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' qui était en lui. Jésus a guéri l’homme. Alors l’homme pouvait voir et parler. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tous les gens étaient très surpris de ce que Jésus a fait. Ils se sont demandé ceci : Jésus peut vraiment être la personne que Dieu a envoyée pour nous sauver ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont aussi entendu cela. Alors ils ont dit ceci : Cet homme chasse les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' des gens. C’est Belzébul qui l’aide à le faire. Belzébul est le maître de tous les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus savait ce que les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' pensaient. Alors il leur a dit : Les gens d’un même pays peuvent se battre. Les gens d’une ville ou d’une famille peuvent aussi se battre. Mais ils vont détruire leur propre ville ou famille. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors, Satan ne peut pas lutter contre lui‑même. Si Satan se bat contre lui‑même, il va bientôt détruire son propre royaume. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Certains d’entre vous, les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' peuvent également chasser de mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' de personnes. Certainement, vous ne dites pas que Belzébul (Satan) les aide. Donc, votre propre peuple vous montre que vous avez tort à ce sujet. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je chasse les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' des personnes. J’utilise le pouvoir de l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu pour le faire. Si je fais cela, donc Dieu a le pouvoir sur vous. Et certainement, vous devez savoir cela. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Personne ne peut entrer dans la maison d’un homme fort facilement et voler. Pour ce faire, il doit d’abord lier l’homme fort. Puis il peut enlever toutes les choses précieuses de cet homme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus a dit : Si quelqu’un n’est pas de mon côté, il est contre moi. Quelqu’un qui ne m’aide pas à rassembler les gens, les disperse. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Et je vous dis ceci : Dieu peut pardonner tout péché ou toute insulte que les gens disent contre lui.  '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dieu peut pardonner à toute personne qui dit de mauvaises choses contre le Fils de l’homme. Mais maintenant ou dans le futur, Dieu ne pardonnera pas à toute personne qui dit de mauvaises choses contre le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle d’un arbre et de ses fruits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors Jésus a dit : Pour avoir de bons fruits, vous devez avoir un bon arbre. Si vous avez un mauvais arbre, alors vous obtiendrez de mauvais fruits. Vous pouvez tout savoir sur tout arbre par le fruit qu’il fait. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vous êtes comme les enfants des serpents dangereux. Vous ne pouvez pas dire de bonnes choses quand vos pensées sont mauvaises. Lorsque vous parlez, vos paroles montrent ce qui est dans vos cœurs. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’homme bon dit de bonnes choses, parce qu’il a de bonnes pensées dans son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. L’homme mauvais dit de mauvaises choses. La raison est qu’il a de mauvaises pensées dans son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Je vous dis la vérité : Un jour, Dieu jugera tout le monde. Ce jour‑là, vous devrez dire à Dieu pourquoi vous avez dit de mauvaises paroles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dieu vous dira alors : Les paroles que vous avez dites, sont bonnes. Je ne vais pas vous punir. Ou Dieu pourra vous dire : les paroles que vous avez dites, sont mauvaises. Donc, je dois vous punir.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' veulent voir Jésus faire un miracle'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors certains enseignants de la loi et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont dit à Jésus : Maître, nous voulons te voir faire un miracle. Cela va nous prouver que Dieu t’a réellement envoyé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus a répondu : Les gens qui sont encore en vie aujourd’hui sont très mauvais. Ils ne respectent pas Dieu. Mais ils veulent que Dieu leur montre un miracle. Mais Dieu ne le fera pas. Mais, ils verront seulement le miracle que Dieu avait fait à Jonas. Il était un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jonas est resté dans un grand poisson 3 jours et 3 nuits. De la même manière, le Fils de l’homme restera dans le sol pendant 3 jours et 3 nuits. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Dieu jugera tout le monde un jour. Alors les gens qui vivaient à Ninive seront là. Ils parleront également contre vous qui êtes encore en vie aujourd’hui. Ils diront que vous êtes mauvais. Jonas leur parlait. Après cela, ils ont décidé de laisser le mal. Puis ils ont obéi à Dieu. Écoutez ! Maintenant, il y a quelqu’un ici qui est plus important que Jonas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus a dit alors : Il y a plusieurs années, la reine du Midi a fait un long voyage pour voir le roi Salomon. Elle voulait entendre tout ce que Salomon savait. Donc, quand Dieu jugera tous les peuples, la reine se tiendra devant lui. Et elle va parler contre vous qui êtes encore en vie aujourd’hui. Elle dira que vous êtes mauvais. Elle écoutait Salomon. Mais il y a quelqu’un ici aujourd’hui. Et cette personne comprend les choses beaucoup mieux que Salomon. Et vous ne voulez pas écouter cette personne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Et Jésus a dit : Quand un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' quitte une personne, il se déplace dans des lieux déserts. Il est à la recherche d’un nouvel endroit pour vivre. Mais il ne trouve nulle part. Ainsi, il se dit : Je vais retourner à l’endroit où je vivais avant. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ensuite, il revient à cette personne. Il constate que l’endroit est vide. C’est propre et net. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Alors le mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' s’en va. Il prend 7 autres mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' plus méchants que lui. Ils vont tous entrer dans la personne. Ils vont vivre en elle. Maintenant, l’état de cette personne deviendra pire qu’auparavant. La même chose arrivera aux mauvaises personnes qui sont en vie aujourd’hui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mère et les frères de Jésus viennent le voir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus parlait encore à la foule. Alors, la mère et les frères de Jésus sont arrivés. Et ils se tenaient à l’extérieur de la maison. Ils ont envoyé quelqu’un à l’intérieur avec un message. Ils disaient : Dites à Jésus que nous voulons lui parler. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Une foule était assise là avec Jésus. Quelqu’un a dit à Jésus : Ta mère et tes frères sont en dehors de la maison. Ils veulent te parler.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus lui a répondu : Je vais vous dire qui sont ma mère et mes frères. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Alors Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Regardez ! Voici ma mère et mes frères. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jésus a dit : Mon frère, ma sœur et ma mère sont ceux qui obéissent à Dieu, mon Père. Il est dans les cieux.'
