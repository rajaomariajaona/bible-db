document_id: MAT.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: Les  Pharisiens regardent ce que Jésus fait le jour de repos
  - type: text
    content: 'Jésus traversait des champs de blé. C’était le jour de repos. Ses  '
  - type: text
    content: disciples
  - type: text
    content: ' avaient faim. Alors ils ont commencé à cueillir les épis de blé. Ils mangeaient les grains. '
  '10':
  - type: text
    content: 'Un homme était là, il avait une petite main. Elle était très faible. Cet homme ne pouvait pas l’utiliser. Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' voulaient trouver une raison d’accuser Jésus. Alors ils lui ont demandé : Est‑il juste de guérir quelqu’un le jour de  '
  - type: text
    content: Sabbat
  - type: text
    content: '  ?'
  '11':
  - type: text
    content: 'Jésus leur a répondu : L’un de vous peut avoir une brebis. Cette brebis peut tomber dans un trou profond le jour de  '
  - type: text
    content: Sabbat
  - type: text
    content: . Il ne va pas la laisser dans ce trou profond. Il va la faire sortir de là.
  '12':
  - type: text
    content: 'Un homme est beaucoup plus important qu’une brebis. Donc, notre loi dit que nous pouvons faire de bonnes choses le jour du '
  - type: text
    content: Sabbat
  - type: text
    content: .
  '13':
  - type: text
    content: 'Alors Jésus a dit à l’homme avec la main faible : Tends ta main. Donc, l’homme a tendu sa main. Elle était maintenant bien. C’était la même chose que l’autre main. '
  '14':
  - type: text
    content: 'Alors les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont quitté le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Ils pensaient comment tuer Jésus.
  - type: heading
    content: Dieu a choisi Jésus pour faire un travail important
  '15':
  - type: text
    content: 'Jésus savait que les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' voulaient le tuer. Donc, il a quitté cet endroit. Beaucoup de gens le suivaient et il guérissait tous les malades. '
  '16':
  - type: text
    content: 'Il a dit à tous ces gens : Ne parlez de moi à personne. '
  '17':
  - type: text
    content: 'Alors c’était l’accomplissement de ce que le  '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe avait dit :'
  '18':
  - type: text
    content: Voici mon serviteur.
  - type: text
    content: Je l’ai choisi afin de travailler pour moi. 
  - type: text
    content: Je l’aime et il me rend très heureux.
  - type: text
    content: 'Je vais lui donner mon  '
  - type: text
    content: esprit
  - type: text
    content: ', afin qu’il soit puissant.'
  - type: text
    content: Il dira aux gens partout que je vais les juger.
  '19':
  - type: text
    content: Il ne discutera pas, il ne criera pas sur les gens.
  - type: text
    content: Les gens ne l’entendront pas crier dans les rues.
  '2':
  - type: text
    content: 'Quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' étaient avec eux. Et ils ont vu cela. Ils ont dit à Jésus : Regarde ce que tes  '
  - type: text
    content: disciples
  - type: text
    content: ' font. Ils sont contre la loi de Dieu. Ils font cela le jour où nous nous reposons.'
  '20':
  - type: text
    content: Il ne fera pas mal aux gens faibles.
  - type: text
    content: Il sera bon envers les gens qui ne sont pas forts.
  - type: text
    content: Il le fera jusqu’à ce qu’il y ait la justice partout.
  '21':
  - type: text
    content: Et tout le monde, partout, va croire qu’il peut les sauver.
  - type: heading
    content: Jésus parle de Satan
  '22':
  - type: text
    content: 'Après cela, certaines personnes ont amené un homme auprès de Jésus. L’homme ne pouvait pas voir. Il ne pouvait pas non plus parler. C’était à cause d’un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' qui était en lui. Jésus a guéri l’homme. Alors l’homme pouvait voir et parler. '
  '23':
  - type: text
    content: 'Tous les gens étaient très surpris de ce que Jésus a fait. Ils se sont demandé ceci : Jésus peut vraiment être la personne que Dieu a envoyée pour nous sauver ?'
  '24':
  - type: text
    content: 'Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont aussi entendu cela. Alors ils ont dit ceci : Cet homme chasse les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens. C’est Belzébul qui l’aide à le faire. Belzébul est le maître de tous les mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Jésus savait ce que les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' pensaient. Alors il leur a dit : Les gens d’un même pays peuvent se battre. Les gens d’une ville ou d’une famille peuvent aussi se battre. Mais ils vont détruire leur propre ville ou famille. '
  '26':
  - type: text
    content: 'Alors, Satan ne peut pas lutter contre lui‑même. Si Satan se bat contre lui‑même, il va bientôt détruire son propre royaume. '
  '27':
  - type: text
    content: 'Certains d’entre vous, les  '
  - type: text
    content: Juifs
  - type: text
    content: ' peuvent également chasser de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' de personnes. Certainement, vous ne dites pas que Belzébul (Satan) les aide. Donc, votre propre peuple vous montre que vous avez tort à ce sujet. '
  '28':
  - type: text
    content: 'Je chasse les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des personnes. J’utilise le pouvoir de l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu pour le faire. Si je fais cela, donc Dieu a le pouvoir sur vous. Et certainement, vous devez savoir cela. '
  '29':
  - type: text
    content: Personne ne peut entrer dans la maison d’un homme fort facilement et voler. Pour ce faire, il doit d’abord lier l’homme fort. Puis il peut enlever toutes les choses précieuses de cet homme.
  '3':
  - type: text
    content: 'Jésus a dit aux '
  - type: text
    content: Pharisiens
  - type: text
    content: '  : Le roi David et ses amis avaient faim une fois. Rappelez‑vous ce qu’ils avaient fait. Vous avez lu à ce sujet.'
  '30':
  - type: text
    content: 'Jésus a dit : Si quelqu’un n’est pas de mon côté, il est contre moi. Quelqu’un qui ne m’aide pas à rassembler les gens, les disperse. '
  '31':
  - type: text
    content: 'Et je vous dis ceci : Dieu peut pardonner tout péché ou toute insulte que les gens disent contre lui.  '
  '32':
  - type: text
    content: 'Dieu peut pardonner à toute personne qui dit de mauvaises choses contre le Fils de l’homme. Mais maintenant ou dans le futur, Dieu ne pardonnera pas à toute personne qui dit de mauvaises choses contre le  '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: .
  - type: heading
    content: Jésus parle d’un arbre et de ses fruits
  '33':
  - type: text
    content: 'Alors Jésus a dit : Pour avoir de bons fruits, vous devez avoir un bon arbre. Si vous avez un mauvais arbre, alors vous obtiendrez de mauvais fruits. Vous pouvez tout savoir sur tout arbre par le fruit qu’il fait. '
  '34':
  - type: text
    content: 'Vous êtes comme les enfants des serpents dangereux. Vous ne pouvez pas dire de bonnes choses quand vos pensées sont mauvaises. Lorsque vous parlez, vos paroles montrent ce qui est dans vos cœurs. '
  '35':
  - type: text
    content: 'L’homme bon dit de bonnes choses, parce qu’il a de bonnes pensées dans son  '
  - type: text
    content: esprit
  - type: text
    content: '. L’homme mauvais dit de mauvaises choses. La raison est qu’il a de mauvaises pensées dans son  '
  - type: text
    content: esprit
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Je vous dis la vérité : Un jour, Dieu jugera tout le monde. Ce jour‑là, vous devrez dire à Dieu pourquoi vous avez dit de mauvaises paroles.'
  '37':
  - type: text
    content: 'Dieu vous dira alors : Les paroles que vous avez dites, sont bonnes. Je ne vais pas vous punir. Ou Dieu pourra vous dire : les paroles que vous avez dites, sont mauvaises. Donc, je dois vous punir.'
  - type: heading
    content: Les  Pharisiens veulent voir Jésus faire un miracle
  '38':
  - type: text
    content: 'Alors certains enseignants de la loi et les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont dit à Jésus : Maître, nous voulons te voir faire un miracle. Cela va nous prouver que Dieu t’a réellement envoyé.'
  '39':
  - type: text
    content: 'Jésus a répondu : Les gens qui sont encore en vie aujourd’hui sont très mauvais. Ils ne respectent pas Dieu. Mais ils veulent que Dieu leur montre un miracle. Mais Dieu ne le fera pas. Mais, ils verront seulement le miracle que Dieu avait fait à Jonas. Il était un  '
  - type: text
    content: prophète
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'David est entré dans le  '
  - type: text
    content: Temple
  - type: text
    content: '. Et il a mangé les pains que le peuple avait offerts à Dieu. Il en a donné à ses compagnons. Or la loi permettait seulement aux '
  - type: text
    content: prêtres
  - type: text
    content: ' de les manger.'
  '40':
  - type: text
    content: 'Jonas est resté dans un grand poisson 3 jours et 3 nuits. De la même manière, le Fils de l’homme restera dans le sol pendant 3 jours et 3 nuits. '
  '41':
  - type: text
    content: Dieu jugera tout le monde un jour. Alors les gens qui vivaient à Ninive seront là. Ils parleront également contre vous qui êtes encore en vie aujourd’hui. Ils diront que vous êtes mauvais. Jonas leur parlait. Après cela, ils ont décidé de laisser le mal. Puis ils ont obéi à Dieu. Écoutez ! Maintenant, il y a quelqu’un ici qui est plus important que Jonas.
  '42':
  - type: text
    content: 'Jésus a dit alors : Il y a plusieurs années, la reine du Midi a fait un long voyage pour voir le roi Salomon. Elle voulait entendre tout ce que Salomon savait. Donc, quand Dieu jugera tous les peuples, la reine se tiendra devant lui. Et elle va parler contre vous qui êtes encore en vie aujourd’hui. Elle dira que vous êtes mauvais. Elle écoutait Salomon. Mais il y a quelqu’un ici aujourd’hui. Et cette personne comprend les choses beaucoup mieux que Salomon. Et vous ne voulez pas écouter cette personne.'
  '43':
  - type: text
    content: 'Et Jésus a dit : Quand un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' quitte une personne, il se déplace dans des lieux déserts. Il est à la recherche d’un nouvel endroit pour vivre. Mais il ne trouve nulle part. Ainsi, il se dit : Je vais retourner à l’endroit où je vivais avant. '
  '44':
  - type: text
    content: 'Ensuite, il revient à cette personne. Il constate que l’endroit est vide. C’est propre et net. '
  '45':
  - type: text
    content: 'Alors le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' s’en va. Il prend 7 autres mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' plus méchants que lui. Ils vont tous entrer dans la personne. Ils vont vivre en elle. Maintenant, l’état de cette personne deviendra pire qu’auparavant. La même chose arrivera aux mauvaises personnes qui sont en vie aujourd’hui.'
  - type: heading
    content: La mère et les frères de Jésus viennent le voir
  '46':
  - type: text
    content: 'Jésus parlait encore à la foule. Alors, la mère et les frères de Jésus sont arrivés. Et ils se tenaient à l’extérieur de la maison. Ils ont envoyé quelqu’un à l’intérieur avec un message. Ils disaient : Dites à Jésus que nous voulons lui parler. '
  '47':
  - type: text
    content: 'Une foule était assise là avec Jésus. Quelqu’un a dit à Jésus : Ta mère et tes frères sont en dehors de la maison. Ils veulent te parler.'
  '48':
  - type: text
    content: 'Jésus lui a répondu : Je vais vous dire qui sont ma mère et mes frères. '
  '49':
  - type: text
    content: 'Alors Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Regardez ! Voici ma mère et mes frères. '
  '5':
  - type: text
    content: 'En plus, vous devez savoir ce que dit la loi de Dieu. Les  '
  - type: text
    content: prêtres
  - type: text
    content: ' travaillent dans le  '
  - type: text
    content: Temple
  - type: text
    content: ' le jour de repos. Mais la loi de Dieu ne dit pas qu’ils ont mal agi. '
  '50':
  - type: text
    content: 'Jésus a dit : Mon frère, ma sœur et ma mère sont ceux qui obéissent à Dieu, mon Père. Il est dans les cieux.'
  '6':
  - type: text
    content: 'Je vous dis la vérité : Il y a quelqu’un ici qui est plus grand que le  '
  - type: text
    content: Temple
  - type: text
    content: .
  '7':
  - type: text
    content: 'Il y a longtemps, un  '
  - type: text
    content: prophète
  - type: text
    content: ' a écrit : Dieu veut que les gens soient gentils les uns envers les autres. Il ne veut pas seulement que vous lui donniez des offrandes. Vous ne comprenez pas ce que cela signifie vraiment. Si vous aviez compris cela, alors vous ne pourriez pas me dire : Tes  '
  - type: text
    content: disciples
  - type: text
    content: ' font quelque chose de mal. '
  '8':
  - type: text
    content: Le Fils de l’homme a le pouvoir sur le jour de repos.
  '9':
  - type: text
    content: 'Jésus a quitté cet endroit. Il est entré dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
