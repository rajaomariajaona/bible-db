document_id: LUK.21,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 21
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de gens qui donnent des choses à Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors Jésus regardait ce qui se passait dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu. Il y avait une boîte pour l’argent. Beaucoup de gens riches mettaient leurs offrandes d’argent en elle.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus leur a dit : Oui, les gens d’un pays vont se battre contre les gens d’un autre pays. Et les rois vont envoyer leur peuple pour combattre d’autres rois et leur peuple. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le sol tremblera tellement. Alors les gens auront peur. Dans de nombreux endroits différents, les plantes pour la nourriture ne pousseront pas. Donc, beaucoup de gens vont souffrir de la faim. Les maladies iront d’une personne à une autre. Donc, beaucoup de gens vont mourir. Beaucoup de choses vont également se produire dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Elles feront peur aux gens. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais avant tout cela, ces choses vont se produire : Les gens qui me haïssent vous attraperont. Ils vont vous faire de mauvaises choses, parce que vous m’obéissez. Ils vous emmèneront dans leurs lieux de réunion. Ils vous emmèneront devant des autorités ou chefs. Et ils vont leur demander de vous mettre en prison ou de vous tuer. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ce sera le moment de leur dire la Bonne Nouvelle à propos de moi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors préparez vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Ne pensez pas à la façon de répondre aux questions aux autorités (rois, gouverneurs). '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Après tout, je vais vous donner ce que vous direz. Alors personne ne pourra discuter avec vous. Ils vont tout simplement être tranquilles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Même vos parents et d’autres personnes dans vos familles vous feront ce mal : ils vous livreront aux autorités. Ils vont tuer certains d’entre vous.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tout le monde va vous détester, parce que vous m’obéissez. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais votre vie sera en sécurité avec moi. Vous ne perdrez même pas un seul cheveu de vos têtes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Oui, vous allez vraiment vivre, si vous n’arrêtez pas de m’obéir.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Puis Jésus a vu une femme. Son mari était mort. Elle était très pauvre. Elle a mis 2 petites pièces de peu de valeur dans la boîte. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Un jour, vous verrez Jérusalem investie par des armées tout autour d’elle. Ensuite, vous saurez que les ennemis vont bientôt détruire Jérusalem. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Des personnes en Judée devront alors courir vers les collines et se cacher. Les gens qui sont à l’intérieur de la ville devront quitter. D’autres seront en dehors de la ville. Ils ne pourront plus entrer là. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ce sera quand Dieu punira le peuple d’Israël. Ensuite, toutes les choses vont arriver. Ce sera comme les serviteurs de Dieu avaient parlé.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ce temps sera très mauvais pour les femmes qui auront des bébés en elles ! Il sera très mauvais pour les femmes qui auront de petits bébés ! Oui, de très mauvaises choses vont se produire à tous les gens de ce pays. Dieu sera très en colère contre eux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'À ce moment‑là, les ennemis vont tuer beaucoup de gens avec des couteaux tranchants. Ils prendront certaines personnes et ils vont les amener à quitter leur pays. Ils vivront dans de nombreux autres pays et ils ne seront pas libres de retourner dans ce pays. Les gens qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' vont détruire Jérusalem. Ils régneront ici jusqu’à ce qu’il soit temps pour eux d’arrêter.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Vous allez voir des choses étranges se produire au soleil, à la lune et aux étoiles. Sur la terre, des choses arriveront. Elles donneront une grande peur aux gens dans de nombreux pays. La mer fera beaucoup de bruit et il y aura de grandes tempêtes en mer. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Cela causera des problèmes. Et cela fera très peur aux gens, parce qu’ils ne comprendront pas ces choses. Les choses puissantes dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' vont se déplacer de leurs lieux habituels. Ensuite, les gens auront peur de ce qui va se passer dans le monde. Ils auront tellement peur qu’ils vont devenir très faibles.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'C’est alors que l’on verra le Fils de l’homme. Je viendrai dans un nuage avec beaucoup de puissance. Je serai très important et très beau. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Quand ces choses commenceront à arriver, levez‑vous. Et regardez. Dieu va bientôt vous sauver. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Alors Jésus leur a expliqué comment ce temps sera. Pensez au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: figuier
    - type: text
      text: ' ou tout autre arbre.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus a dit : Laissez‑moi vous dire ceci : Cette pauvre femme a mis plus d’argent dans la boîte que tout le monde. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Vous voyez de nouvelles feuilles sur l’arbre. Ensuite, vous savez que l’été viendra bientôt. Personne n’a besoin de vous dire cela. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ce sera la même chose quand vous verrez toutes ces choses se passer. Vous saurez alors que Dieu va bientôt commencer à gouverner.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Permettez‑moi de vous dire ceci : Certaines des personnes vivantes ne mourront pas jusqu’à ce que tout cela arrive. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et la terre vont disparaître. Mais mon message est vrai. Ce que je dis, va arriver.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Mais attention. Et regardez comment vous vivez. Ne mangez pas ou ne buvez pas trop. Ne perdez pas votre temps comme ça. N’ayez pas de soucis de la vie dans vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Si vous le faites, ce jour‑là va vous surprendre. Il viendra quand vous ne veillerez pas. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Et il va surprendre tout le monde qui vit sur la terre.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Donc, regardez tout le temps ! Continuez de prier pour pouvoir sortir de toutes ces choses ! Alors vous vous tiendrez devant moi. Et vous n’aurez pas peur de moi. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Jésus enseignait tous les jours dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu. Chaque soir, il sortait de la ville et il restait sur la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: montagne des Oliviers
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Il revenait au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu chaque matin. Tous les gens allaient là tôt pour l’entendre.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les gens riches ont mis de l’argent dont ils n’avaient pas besoin. Ils ont beaucoup d’argent. Cette femme avait moins d’argent par rapport à ses besoins. Elle avait besoin d’argent pour acheter du pain à manger. Mais elle a mis tout son argent dans la boîte.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle des choses qui se produiront
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Certains '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus parlaient du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu. Ils admiraient le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu. Il y avait de belles et précieuses pierres dans les murs. Il y avait aussi des objets que les gens offraient à Dieu. C’était beau à voir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jésus a dit : Vous voyez toutes ces belles choses maintenant. Mais un jour viendra où les ennemis vont tout détruire. Ils jetteront chaque pierre. Aucune pierre ne restera sur une autre.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils lui ont demandé : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', cela se produira quand ? Que verrons‑nous juste avant que cela arrive ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il a répondu : Attention, ne croyez pas aux choses qui ne sont pas vraies. Après tout, beaucoup de gens vont venir et ils vont dire : Je suis Jésus. Ils diront que le bon moment pour Dieu est bientôt. Ne suivez pas ces gens.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Et quand vous entendez parler des guerres, n’ayez pas peur. En outre, n’ayez pas peur quand les gens se battront contre leurs gouvernements. Ces choses doivent arriver d’abord. Mais la fin n’arrivera pas immédiatement.
