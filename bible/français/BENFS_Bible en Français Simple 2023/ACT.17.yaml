document_id: ACT.17,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 17
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ce qui est arrivé à Paul à Thessalonique
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, Silas et Timothée ont continué leur voyage. Ils sont passés par les 2 villes appelées Amphipolis et Apollonie dans le pays appelé Grèce. Alors ils sont arrivés dans une ville appelée Thessalonique. Il y avait une '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' pour les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' dans cette ville. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il faisait sombre, les croyants de Thessalonique ont envoyé Paul et Silas à Bérée. Quand ils sont arrivés dans cette ville, ils sont allés à la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' d’ici étaient mieux que ceux de Thessalonique. Ils étaient rapides à écouter le message de Paul. Ils cherchaient à comprendre le message davantage que les personnes de Thessalonique. Ils voulaient beaucoup entendre le message. Chaque jour, le peuple lisait la Parole dans le livre de Dieu. Ils voulaient voir si le message de Paul était réellement vrai. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plusieurs personnes dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' ont cru à la Bonne Nouvelle au sujet de Jésus. Beaucoup de femmes et d’hommes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grecs
    - type: text
      text: ' importants ont également cru au message.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' de Thessalonique ont entendu que Paul était à Bérée. Et ils ont entendu qu’il enseignait le peuple au sujet de Jésus. Ainsi ils sont venus à Bérée. Ils ont parlé à une partie du peuple là et ils ont fait fâcher la foule.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immédiatement, les croyants de Bérée ont envoyé Paul avec quelques autres hommes à la côte. Mais Silas et Timothée sont restés à Bérée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Paul a quitté Bérée, quelques hommes sont allés par bateau avec lui. Ils sont allés avec lui dans la ville appelée Athènes. Avant que ces hommes reviennent à Bérée, Paul leur a donné un message pour Silas et Timothée. Il a dit : Venez rapidement me rencontrer ici à Athènes.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul visite Athènes
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul attendait Silas et Timothée à Athènes. Il était triste et fâché. Il a vu que les personnes dans la ville avaient beaucoup de dieux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Paul allait à la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' chaque jour et il parlait ainsi aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' là. Et il parlait également avec des étrangers ou non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui priaient Dieu. Il est également allé au marché dans la ville et il a parlé avec le peuple là. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait aussi certains enseignants là. Ils parlaient avec Paul. Ils enseignaient ce à quoi les gens devraient croire. Certains parmi eux étaient appelés Épicuriens. D’autres étaient appelés Stoïciens. Ils se disaient : Qui est cet homme insensé ? Il ne sait rien. Il parle beaucoup. Mais certains de ces enseignants ont dit : Nous pensons qu’il parle des dieux des personnes étrangères. Ils ont dit ceci parce que Paul parlait de Jésus. Il avait aussi parlé du moment où Dieu ressuscitera les morts. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi ces hommes ont demandé à Paul d’aller avec eux. Ils lui ont demandé de se tenir devant les hommes importants de la ville sur la colline appelée Aréopage. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul est allé à cette '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ', comme il le faisait habituellement. Pendant 3 jours de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ', il parlait aux personnes dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: '. Il parlait avec elles au sujet de toutes les choses que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' avaient écrites. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes importants ont dit : Nous n’avons jusqu’ici jamais entendu au sujet des choses que tu nous enseignes. Explique‑les‑nous. Alors nous les comprendrons. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (Les gens qui habitaient à Athènes parlaient de beaucoup de différentes choses. Ils parlaient avec les personnes qui ont visité la ville. Ils disaient tous et écoutaient de nouvelles idées. Ils semblaient avoir du temps pour rien d’autre.)
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Paul s’est levé. Il était au milieu de l’Aréopage. Il a dit : Gens d’Athènes, je vois que vous avez beaucoup de dieux. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai marché dans votre ville. Et j’ai vu que vous avez établi beaucoup d’endroits spéciaux. C’est là que vous adorez vos dieux. J’ai vu un autel. Il y avait ces écrits dessus : Au dieu que nous ne connaissons pas. Ceci montre que vous voulez '
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: ' un dieu que vous ne connaissez pas. Maintenant, je vais vous parler clairement de ce Dieu. Vous pouvez alors le connaître.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le vrai Dieu a fait la terre, toutes les plantes et les animaux sur elle. Il règne sur la terre et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il ne vit pas dans les maisons que les hommes ont construites pour lui. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes font des choses pour Dieu. Mais Dieu n’a aucun besoin de ce que les hommes ont fait. Dieu lui‑même fait vivre tout. Il donne aux choses vivantes tout ce dont elles ont besoin. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a fait tous les hommes dans le monde à partir d’un homme. Alors il a fait vivre des personnes dans différents endroits sur la terre. Il a décidé de faire toutes ces choses avant de créer l’homme. Il a déterminé les limites de leurs places dans la vie. Il a également déterminé leur durée de vie. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a fait tout ceci de sorte que les gens le recherchent. Qu’ils tentent de le chercher. Il veut que les gens le trouvent. Réellement, Dieu est près de nous tous. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un a dit : Puisque Dieu nous a donné la vie, nous sommes vivants. À cause de lui, nous pouvons nous déplacer. À cause de lui, nous sommes des êtres. Un de vos auteurs a également dit : Nous sommes tous les enfants de Dieu.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et parce que nous sommes les enfants de Dieu, nous devrions également savoir ceci : les hommes sont intelligents et ils peuvent couper des pierres. Ils peuvent transformer les métaux valables en différentes formes. Mais Dieu n’est pas comme ces formes. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur expliquait au sujet de toutes ces choses. Il disait : Je peux vous montrer que toutes ces choses sont vraies. Dieu a décidé de vous envoyer le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' avaient écrit qu’il mourra. Après cela, Dieu le fera vivre encore. Je vous ai maintenant tout dit au sujet de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Il est l’homme que Dieu vous a envoyé. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans les temps passés, les gens ne connaissaient pas Dieu vraiment. À cause de cela, Dieu ne les avait pas punis. Mais maintenant, Dieu a dit au peuple partout : Cessez de faire de mauvaises choses ! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a déjà un jour spécial. Ce jour‑là, il jugera chacun sur la terre. Il jugera de sorte que personne ne puisse dire : Dieu a tort. Il a choisi un homme. Cet homme fera cela pour lui. Dieu a clairement montré à chacun qui est cet homme. Le peuple l’a tué. Mais Dieu l’a fait vivre encore.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul a dit : Dieu a encore fait vivre cet homme. Les gens ont entendu cela. Mais alors, certains parmi eux se sont moqués de lui. Mais d’autres ont dit à Paul : Nous voulons que tu nous dises davantage à ce sujet un autre jour.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Paul a quitté la réunion.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et certains se sont joints à son groupe quand il est parti. Ils ont cru à la Bonne Nouvelle et ils sont devenus des croyants. Une de ces personnes était un homme appelé Denys l’aréopagite. Une femme appelée Damaris est également devenue une croyante.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Et quelques autres ont également cru au message de Paul au sujet de Jésus.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques personnes ont cru au message et elles se sont jointes à Paul et à Silas. Beaucoup de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Grecs
    - type: text
      text: ' ont également joint ce groupe. Ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Grecs
    - type: text
      text: ' n’étaient pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Mais ils avaient déjà su que Dieu est très puissant. Beaucoup de femmes importantes dans la ville ont également joint le groupe.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' dans la ville étaient fâchés, parce que beaucoup de gens ont joint le groupe avec Paul et Silas. Ainsi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont trouvé certains qui causaient souvent le trouble dans la ville. Ils ont demandé à ces mauvaises personnes de venir ensemble. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et la foule ont fait beaucoup de bruits dans les rues de la ville. Ils ont brisé la porte de la maison de Jason, parce qu’ils ont voulu attraper Paul et Silas. Ils ont voulu les amener dehors à la foule. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et la foule n’ont pas trouvé Paul et Silas. Ainsi ils ont amené Jason et quelques autres croyants devant des autorités de la ville. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' criaient : Ces hommes faisaient des troubles partout. Et maintenant ils sont venus dans notre ville. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là Jason les a laissés rester dans sa maison. Ils parlent contre les lois que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' nous a données. Et ils disent qu’il y a un autre roi. Cet autre Roi s’appelle Jésus. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' criaient comme ceci, la foule criait fortement. Les magistrats sont également devenus très fâchés en ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ont dit que Jason et les autres croyants devaient leur donner une certaine somme d’argent. Et alors ils pourront tous aller. Ils ont payé l’argent. Après cela, les magistrats les ont laissés partir.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Beaucoup de gens de Berée croient au message de Paul
    marker-yv: yv-h
