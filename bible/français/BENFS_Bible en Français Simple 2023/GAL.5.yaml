document_id: GAL.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Continuez d’être libres en Christ
  - type: text
    content: ' '
  - type: text
    content: Christ
  - type: text
    content: ' nous a libérés, parce qu’il veut que nous soyons libres. Donc, soyez forts et continuez d’être libres. Ne vous laissez pas être encore esclaves.'
  '10':
  - type: text
    content: 'Mais je me sens encore sûr de vous, parce que nous sommes unis dans le '
  - type: text
    content: Seigneur
  - type: text
    content: . Je suis sûr que vous ne penserez pas différemment de moi. Mais Dieu punira l’homme qui vous trouble. L’homme quel qu’il soit, Dieu le punira.
  '11':
  - type: text
    content: 'Mes frères, je peux parler encore de '
  - type: text
    content: circoncire
  - type: text
    content: ' les gens. Alors pourquoi cela me cause encore des problèmes ? Alors, ce que j’ai enseigné au sujet de la croix de '
  - type: text
    content: Christ
  - type: text
    content: ' n’allait mettre personne en colère. '
  '12':
  - type: text
    content: Les gens vous troublent. Ils doivent couper leurs propres corps. Voilà ce que je veux qu’ils fassent !
  - type: heading
    content: Vivre par l’Esprit de Dieu
  '13':
  - type: text
    content: 'Mes frères, Dieu vous a demandé de venir à lui pour que vous puissiez être libres. Mais vous devez être libres dans le droit chemin. Vous n’êtes pas libres de faire des choses selon vos désirs humains. Au lieu de cela, vous devez être comme des serviteurs les uns des autres, parce que vous vous aimez les uns les autres. '
  '14':
  - type: text
    content: 'Une règle rassemble toutes les règles que Dieu avait données aux Juifs. Cette règle dit : Aime toute autre personne comme tu t’aimes toi‑même.'
  '15':
  - type: text
    content: Mais ne soyez pas comme des animaux sauvages. Les animaux sauvages se battent et se mangent les uns les autres.
  - type: text
    content: Si vous êtes comme ça, soyez prudents. Veillez à ce que vous ne détruisiez pas l’autre complètement.
  '16':
  - type: text
    content: Alors, voilà ce que je vous dis. Vivez par la puissance que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu donne. Et laissez‑le vous guider. Ainsi, vous ne ferez pas de mauvaises choses. '
  '17':
  - type: text
    content: 'Votre '
  - type: text
    content: esprit
  - type: text
    content: ' humain veut les choses complètement opposées à ce que l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu veut. Il se bat contre ce que l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu veut. Et donc, vous ne pouvez pas faire les choses que vous voulez vraiment faire. '
  '18':
  - type: text
    content: Mais si l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous conduit, les règles juives n’ont aucune autorité sur vous.'
  '19':
  - type: text
    content: 'Tout le monde connaît les sortes de mauvaises choses que les gens peuvent faire par leurs propres esprits humains. Ils ont des relations sexuelles avec des personnes qui ne sont pas leurs propres femmes ou maris. Ils pensent et ils font des choses sales. Ils font des choses que les gens devraient avoir très honte de faire. '
  '2':
  - type: text
    content: 'Écoutez attentivement ! Moi, Paul, je vous dis ceci : Si vous laissez quelqu’un vous '
  - type: text
    content: circoncire
  - type: text
    content: ', '
  - type: text
    content: Christ
  - type: text
    content: ' ne vaudra plus rien pour vous.'
  '20':
  - type: text
    content: Ils adorent de faux dieux. Ils demandent de mauvais esprits de les aider. Ils deviennent des ennemis et ils se battent.
  - type: text
    content: Ils détestent les autres, parce qu’ils veulent être comme ces gens. Ils deviennent très en colère sans aucune bonne raison. Ils veulent être plus importants que d’autres personnes. Ils refusent de se mettre d’accord. Ils appartiennent à des groupes séparés.
  '21':
  - type: text
    content: Ils veulent des choses qui appartiennent à d’autres personnes. Ils sont des ivrognes. Ils mangent trop. Je vous ai dit avant combien il est dangereux de faire ces choses. Et maintenant, je vous dis encore une fois. Les gens qui font de telles choses ne seront pas le peuple de Dieu. Ils n’appartiendront pas au peuple que Dieu dirige. Ils ne recevront pas des choses que Dieu avait préparées pour son peuple.
  '22':
  - type: text
    content: Mais l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu est en nous. Il nous pousse à aimer Dieu et les autres. Il fait que nous soyons heureux et en paix dans nos cœurs. Il nous amène à être patients, gentils et bons. Il nous amène à croire que Dieu continuera de nous aider. '
  '23':
  - type: text
    content: Il ne nous amène pas à penser que nous sommes meilleurs que les autres. Il nous amène à nous gouverner correctement. Et il n’y a pas de règles contre ces choses.
  '24':
  - type: text
    content: Les personnes qui appartiennent à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' ont tué leur propre corps à la croix. Elles les ont tués. Ainsi cela ne leur fait plus sentir de mauvaises choses. Elles n’ont plus envie de faire de mauvaises choses.'
  '25':
  - type: text
    content: Nous vivons par l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Donc, nous devons obéir à l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Nous devons le laisser nous conduire. '
  '26':
  - type: text
    content: Nous ne devons pas vouloir que les gens pensent que nous sommes mieux que d’autres. Nous ne devons pas nous fâchés les uns contre les autres. Il ne faut pas vouloir les choses des autres. Nous risquons donc de nous détester les uns les autres.
  '3':
  - type: text
    content: 'Je le répète. Tout homme qui laisse quelqu’un le '
  - type: text
    content: circoncire
  - type: text
    content: ' doit alors obéir à toutes les règles juives. '
  '4':
  - type: text
    content: 'Vous essayez de devenir justes avec Dieu par les règles Juives. Alors vous allez vous séparer vous‑mêmes de '
  - type: text
    content: Christ
  - type: text
    content: '. Vous ne croyez plus que seul le '
  - type: text
    content: Christ
  - type: text
    content: ' peut vous faire justes avec Dieu. Vous ne croyez plus combien Dieu est très gentil envers nous.'
  '5':
  - type: text
    content: Mais l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu nous fait espérer ceci : Nous allons certainement devenir justes avec Dieu. Nous allons être justes avec lui, parce que nous croyons en lui. Nous attendons cela. Nous souhaitons beaucoup que cela se produise.'
  '6':
  - type: text
    content: Nous sommes unis avec Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Et donc, ce n’est pas important si quelqu’un nous a circoncis ou non.
  - type: text
    content: 'La seule chose importante est : Nous croyons en Dieu. Et ceux qui croient en lui doivent l’aimer. Ils doivent aimer aussi les autres. Et puis ils vont montrer qu’ils croient en lui (réellement).'
  '7':
  - type: text
    content: Comme de bons coureurs, vous faisiez très bien ! Vous ne devriez laisser personne vous arrêter. Vous ne devriez pas laisser d’obéir à ce qui est vrai.
  '8':
  - type: text
    content: 'Ce n’est pas Dieu qui vous a fait arrêter. Non, parce que Dieu vous demande de venir à lui. '
  '9':
  - type: text
    content: 'Seulement une petite quantité de levure peut causer toute la pâte à se lever, comme on dit. '
