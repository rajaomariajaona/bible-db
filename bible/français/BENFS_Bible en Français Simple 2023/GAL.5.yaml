document_id: GAL.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Continuez d’être libres en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' nous a libérés, parce qu’il veut que nous soyons libres. Donc, soyez forts et continuez d’être libres. Ne vous laissez pas être encore esclaves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Écoutez attentivement ! Moi, Paul, je vous dis ceci : Si vous laissez quelqu’un vous '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: ', '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' ne vaudra plus rien pour vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je le répète. Tout homme qui laisse quelqu’un le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: ' doit alors obéir à toutes les règles juives. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous essayez de devenir justes avec Dieu par les règles Juives. Alors vous allez vous séparer vous‑mêmes de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Vous ne croyez plus que seul le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' peut vous faire justes avec Dieu. Vous ne croyez plus combien Dieu est très gentil envers nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu nous fait espérer ceci : Nous allons certainement devenir justes avec Dieu. Nous allons être justes avec lui, parce que nous croyons en lui. Nous attendons cela. Nous souhaitons beaucoup que cela se produise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nous sommes unis avec Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Et donc, ce n’est pas important si quelqu’un nous a circoncis ou non.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'La seule chose importante est : Nous croyons en Dieu. Et ceux qui croient en lui doivent l’aimer. Ils doivent aimer aussi les autres. Et puis ils vont montrer qu’ils croient en lui (réellement).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comme de bons coureurs, vous faisiez très bien ! Vous ne devriez laisser personne vous arrêter. Vous ne devriez pas laisser d’obéir à ce qui est vrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ce n’est pas Dieu qui vous a fait arrêter. Non, parce que Dieu vous demande de venir à lui. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Seulement une petite quantité de levure peut causer toute la pâte à se lever, comme on dit. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais je me sens encore sûr de vous, parce que nous sommes unis dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Je suis sûr que vous ne penserez pas différemment de moi. Mais Dieu punira l’homme qui vous trouble. L’homme quel qu’il soit, Dieu le punira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mes frères, je peux parler encore de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: ' les gens. Alors pourquoi cela me cause encore des problèmes ? Alors, ce que j’ai enseigné au sujet de la croix de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' n’allait mettre personne en colère. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les gens vous troublent. Ils doivent couper leurs propres corps. Voilà ce que je veux qu’ils fassent !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vivre par l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mes frères, Dieu vous a demandé de venir à lui pour que vous puissiez être libres. Mais vous devez être libres dans le droit chemin. Vous n’êtes pas libres de faire des choses selon vos désirs humains. Au lieu de cela, vous devez être comme des serviteurs les uns des autres, parce que vous vous aimez les uns les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Une règle rassemble toutes les règles que Dieu avait données aux Juifs. Cette règle dit : Aime toute autre personne comme tu t’aimes toi‑même.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais ne soyez pas comme des animaux sauvages. Les animaux sauvages se battent et se mangent les uns les autres.
- type: usfm
  marker: m
  children:
  - type: text
    text: Si vous êtes comme ça, soyez prudents. Veillez à ce que vous ne détruisiez pas l’autre complètement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors, voilà ce que je vous dis. Vivez par la puissance que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu donne. Et laissez‑le vous guider. Ainsi, vous ne ferez pas de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Votre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' humain veut les choses complètement opposées à ce que l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu veut. Il se bat contre ce que l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu veut. Et donc, vous ne pouvez pas faire les choses que vous voulez vraiment faire. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais si l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous conduit, les règles juives n’ont aucune autorité sur vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tout le monde connaît les sortes de mauvaises choses que les gens peuvent faire par leurs propres esprits humains. Ils ont des relations sexuelles avec des personnes qui ne sont pas leurs propres femmes ou maris. Ils pensent et ils font des choses sales. Ils font des choses que les gens devraient avoir très honte de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils adorent de faux dieux. Ils demandent de mauvais esprits de les aider. Ils deviennent des ennemis et ils se battent.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils détestent les autres, parce qu’ils veulent être comme ces gens. Ils deviennent très en colère sans aucune bonne raison. Ils veulent être plus importants que d’autres personnes. Ils refusent de se mettre d’accord. Ils appartiennent à des groupes séparés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils veulent des choses qui appartiennent à d’autres personnes. Ils sont des ivrognes. Ils mangent trop. Je vous ai dit avant combien il est dangereux de faire ces choses. Et maintenant, je vous dis encore une fois. Les gens qui font de telles choses ne seront pas le peuple de Dieu. Ils n’appartiendront pas au peuple que Dieu dirige. Ils ne recevront pas des choses que Dieu avait préparées pour son peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu est en nous. Il nous pousse à aimer Dieu et les autres. Il fait que nous soyons heureux et en paix dans nos cœurs. Il nous amène à être patients, gentils et bons. Il nous amène à croire que Dieu continuera de nous aider. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il ne nous amène pas à penser que nous sommes meilleurs que les autres. Il nous amène à nous gouverner correctement. Et il n’y a pas de règles contre ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les personnes qui appartiennent à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' ont tué leur propre corps à la croix. Elles les ont tués. Ainsi cela ne leur fait plus sentir de mauvaises choses. Elles n’ont plus envie de faire de mauvaises choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nous vivons par l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. Donc, nous devons obéir à l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. Nous devons le laisser nous conduire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nous ne devons pas vouloir que les gens pensent que nous sommes mieux que d’autres. Nous ne devons pas nous fâchés les uns contre les autres. Il ne faut pas vouloir les choses des autres. Nous risquons donc de nous détester les uns les autres.
