document_id: MAT.27,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 27
  - type: heading
    content: Jésus devant Pilate
  - type: text
    content: 'Tôt le matin, tous les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: anciens
  - type: text
    content: ' ont parlé ensemble. Ils ont décidé de demander aux dirigeants '
  - type: text
    content: romains
  - type: text
    content: ' de tuer Jésus sur une croix. '
  '10':
  - type: text
    content: Ils ont utilisé cet argent pour acheter le champ du potier. Le Seigneur Dieu m’a dit de faire cela. 
  - type: heading
    content: Pilate pose à Jésus quelques questions
  '11':
  - type: text
    content: 'À ce moment‑là, Jésus se tenait devant le gouverneur '
  - type: text
    content: romain
  - type: text
    content: '. Pilate a demandé à Jésus : Es‑tu le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ? Jésus a répondu : Oui, c’est comme tu le dis.'
  '12':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: anciens
  - type: text
    content: ' ont dit à Pilate que Jésus avait fait beaucoup de mauvaises choses. Jésus ne leur a rien répondu.'
  '13':
  - type: text
    content: 'Alors, Pilate a dit à Jésus : Ces hommes disent que tu as fait beaucoup de mauvaises choses. Tu peux entendre ce qu’ils disent. '
  '14':
  - type: text
    content: Mais Jésus ne répondait rien à Pilate. Il n’a rien dit de toutes ces accusations. Pilate était très surpris à ce sujet.
  '15':
  - type: text
    content: 'Chaque année, au moment du repas de  '
  - type: text
    content: Pâque
  - type: text
    content: ', Pilate libérait une personne de la prison. Les gens pouvaient choisir la personne à libérer. '
  '16':
  - type: text
    content: À ce moment‑là, il y avait un homme nommé Barabbas. Il était en prison. Tout le monde savait ce qu’il avait fait.
  '17':
  - type: text
    content: 'Puis beaucoup de gens se sont réunis au palais de Pilate. Pilate leur a dit : Voulez‑vous que je libère Barabbas de la prison ? Ou voulez‑vous que je libère Jésus ? Jésus est appelé le  '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Pilate savait très bien pourquoi les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' lui avaient emmené Jésus. Ils n’aimaient pas la façon dont les gens écoutaient Jésus. Beaucoup de gens écoutaient Jésus plus que leurs dirigeants.'
  '19':
  - type: text
    content: 'Pilate cherchait quoi décider. Alors sa femme lui a envoyé un message. Elle a dit : Ne fais rien à cet homme. Il est un homme bon et il n’a rien fait de mal. Hier soir, quand je dormais, j’ai fait un rêve sur lui. Le rêve m’a fait très peur.'
  '2':
  - type: text
    content: Ils ont lié Jésus, puis ils l’ont emmené à la maison de Pilate. Les soldats ont mis Jésus sous le pouvoir de Pilate, le gouverneur.
  - type: heading
    content: Judas meurt
  '20':
  - type: text
    content: 'Mais les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: anciens
  - type: text
    content: ' ont parlé aux gens. Ils disaient : Demandez à Pilate de libérer Barabbas de la prison. Demandez à Pilate de faire tuer Jésus sur une croix.'
  '21':
  - type: text
    content: 'Pilate a demandé aux gens de nouveau : Lequel de ces 2 hommes voulez‑vous que je libère ? Le peuple a répondu : Barabbas. '
  '22':
  - type: text
    content: 'Alors Pilate a demandé aux gens : Que devrais‑je donc faire avec Jésus, qui est appelé le  '
  - type: text
    content: Christ
  - type: text
    content: '  ? Les gens criaient tous : Nous voulons tuer Jésus sur une croix.'
  '23':
  - type: text
    content: 'Alors Pilate dit : Pourquoi devrais‑je le faire tuer ? Quel mal a‑t‑il fait ? Mais les gens criaient à plusieurs reprises encore plus fort : Tuez‑le sur une croix ! Tuez‑le sur une croix !'
  '24':
  - type: text
    content: 'Alors Pilate ne pouvait plus rien faire pour les calmer. Alors, Pilate a pris de l’eau et il a lavé ses mains devant le peuple. Il dit : Ce n’est pas à cause de moi que cet homme va mourir. C’est vous qui êtes à la base de cela. '
  '25':
  - type: text
    content: 'Toutes les personnes ont répondu à Pilate : Nos enfants et nous, nous répondrons à Dieu. Il peut nous punir, si nous avons fait une mauvaise chose. '
  '26':
  - type: text
    content: 'Alors Pilate a libéré Barabbas de la prison. Pilate a dit aux soldats : Frappez Jésus avec un fouet. Ensuite, tuez‑le sur une croix.'
  '27':
  - type: text
    content: 'Alors les soldats de Pilate ont amené Jésus dans une grande salle du palais de Pilate. Tous les autres soldats de leur groupe étaient là. '
  '28':
  - type: text
    content: 'Ils ont enlevé les vêtements de Jésus, et ils ont mis un  '
  - type: text
    content: manteau
  - type: text
    content: ' rouge foncé sur lui à la place. '
  '29':
  - type: text
    content: 'Ils ont arrangé des épines. Ils ont fait une couronne d’épines pour lui. Puis ils l’ont mise sur sa tête. Et ils ont mis un long bâton dans sa main droite. Ils allaient à genoux devant lui. Ils se moquaient de lui et ils disaient : '
  - type: text
    content: salut
  - type: text
    content: ', toi Roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ! Nous nous agenouillons en face de toi. '
  '3':
  - type: text
    content: 'Judas a entendu que les  '
  - type: text
    content: Juifs
  - type: text
    content: ' avaient demandé aux dirigeants '
  - type: text
    content: romains
  - type: text
    content: ' de tuer Jésus sur une croix. Judas a livré Jésus. Maintenant, il était très triste de ce qu’il avait fait. Donc, il a retourné les 30 pièces d’argent aux chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et aux '
  - type: text
    content: anciens
  - type: text
    content: .
  '30':
  - type: text
    content: 'Alors les soldats ont craché au visage de Jésus. Ils ont pris le bâton et ils ont frappé Jésus sur sa tête. '
  '31':
  - type: text
    content: 'Après qu’ils ont fini de se moquer de lui, ils ont enlevé le  '
  - type: text
    content: manteau
  - type: text
    content: ' rouge foncé. Et ils ont remis les vêtements de Jésus sur lui. Ensuite, ils l’ont conduit à l’endroit où ils iront le tuer. Ils l’ont mis à une croix en bois.'
  - type: heading
    content: Les soldats tuent Jésus sur une croix
  '32':
  - type: text
    content: 'Sur le chemin de cet endroit, ils ont arrêté un homme. Son nom était Simon. Il allait devant Jésus et les soldats. Il était de la ville appelée Cyrène. Les soldats '
  - type: text
    content: romains
  - type: text
    content: ' ont dit à Simon : Porte cette croix ! Ensuite, ils l’ont poussé à porter la croix de Jésus. '
  '33':
  - type: text
    content: 'Les soldats ont conduit Jésus au lieu appelé '
  - type: text
    content: Golgotha
  - type: text
    content: . (
  - type: text
    content: Golgotha
  - type: text
    content: ' signifie le lieu du crâne.)'
  '34':
  - type: text
    content: 'Les soldats ont essayé de donner à Jésus du vin à boire. Ils ont mis quelque chose comme des médicaments dans cela. Jésus a goûté, mais il n’a pas voulu boire. '
  '35':
  - type: text
    content: 'Alors les soldats '
  - type: text
    content: romains
  - type: text
    content: ' ont mis Jésus sur la croix et ils ont pris ses vêtements. Ils ont fait un jeu entre eux. Ils ont fait cela pour savoir qui recevrait une partie de ses vêtements. '
  '36':
  - type: text
    content: 'Alors les soldats se sont assis. Ils regardaient attentivement Jésus. '
  '37':
  - type: text
    content: 'Ils ont mis ces écrits au‑dessus de la tête de Jésus : Cet homme est Jésus, le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '. C’était la raison pour laquelle ils ont condamné Jésus à mort. '
  '38':
  - type: text
    content: 'Alors les soldats ont également mis 2 autres hommes à ses côtés sur des croix. Ces hommes étaient des bandits. Un homme était à côté droit de Jésus, et un homme était à son côté gauche. '
  '39':
  - type: text
    content: 'Les gens qui passaient devant Jésus disaient de mauvaises choses contre lui. Ils bougeaient leurs têtes d’un côté à l’autre côté pendant qu’ils regardaient. '
  '4':
  - type: text
    content: 'Judas leur a dit : J’ai fait une mauvaise chose. Je vous ai aidés à attraper un homme qui n’a rien fait de mal. Ils ont répondu à Judas : Ce n’est pas important pour nous. C’est ton problème.'
  '40':
  - type: text
    content: 'Et ils disaient : Tu avais dit que tu pourras détruire le  '
  - type: text
    content: Temple
  - type: text
    content: . Tu avais dit que dans 3 jours, tu pourras le construire à nouveau. Si tu es vraiment le Fils de Dieu, sauve‑toi. Descends de la croix.
  '41':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi et les  '
  - type: text
    content: anciens
  - type: text
    content: ' se moquaient tous de lui aussi. '
  '42':
  - type: text
    content: 'Cet homme a sauvé les autres, mais il ne peut pas se sauver. Il disait qu’il est le roi d’Israël. S’il descend de la croix, alors nous croirons en lui.  '
  '43':
  - type: text
    content: 'Il croit en Dieu. Donc, si Dieu l’aime vraiment, que Dieu le sauve maintenant. Il a dit qu’il est le Fils de Dieu. '
  '44':
  - type: text
    content: Puis les 2 hommes sur des croix à côté de Jésus disaient les mêmes mauvaises choses contre lui. 
  - type: heading
    content: Jésus meurt
  '45':
  - type: text
    content: 'Il était environ midi. Le pays tout entier est devenu noir jusqu’à 15 heures. '
  '46':
  - type: text
    content: 'À environ 15 heures, Jésus a crié d’une voix forte. Il a dit : Éli, Éli, lama sabachthani ? Cela signifie : Mon Dieu, mon Dieu, pourquoi m’as‑tu laissé seul ?'
  '47':
  - type: text
    content: 'Certaines personnes se tenaient debout près de Jésus. Elles ont entendu ce qu’il a crié. Et elles se disaient ceci : Il crie à Élie, le  '
  - type: text
    content: prophète
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Un homme a couru rapidement et il a apporté un morceau d’un matériau mou. Il a versé du vin qui n’était pas doux sur cela. Et puis il l’a mis sur le bout d’un bâton. Il l’a soulevé à Jésus pour qu’il puisse boire. '
  '49':
  - type: text
    content: 'Les autres personnes disaient : Attendez un instant et regardez. Nous verrons si Élie viendra. Peut‑être qu’il va le sauver.'
  '5':
  - type: text
    content: 'Judas a jeté l’argent sur le sol dans le  '
  - type: text
    content: Temple
  - type: text
    content: . Puis il est parti. Il est allé se pendre à une corde et il est mort.
  '50':
  - type: text
    content: 'Alors Jésus a crié à nouveau d’une voix forte. Et après cela, il est mort. '
  '51':
  - type: text
    content: 'À ce moment‑là, le rideau du '
  - type: text
    content: Temple
  - type: text
    content: ' s’est déchiré complètement en 2 parties. Il s’est déchiré à partir du haut à l’autre extrémité. La terre a tremblé et les roches se sont brisées. '
  '52':
  - type: text
    content: 'Dieu a ouvert les endroits où les gens avaient enterré les morts. Beaucoup des gens de Dieu étaient morts. Ils sont redevenus vivants. '
  '53':
  - type: text
    content: Ils sont sortis des tombeaux. C’était après la résurrection de Jésus. Ils sont entrés dans la ville de Jérusalem et beaucoup de gens les ont vus.
  '54':
  - type: text
    content: L’
  - type: text
    content: officier
  - type: text
    content: ' et les soldats regardaient encore Jésus. Ils ont tous vu le sol trembler. Et ils ont vu les roches se briser. Ils avaient très peur et ils ont dit : Il est vrai que cet homme était le Fils de Dieu.'
  '55':
  - type: text
    content: 'Il y avait aussi beaucoup de femmes là‑bas. Elles regardaient un court chemin de la croix et elles ont vu toutes ces choses arriver. Elles venaient de Galilée avec Jésus. '
  '56':
  - type: text
    content: Marie de Magdala était là. Marie, la mère de Jacques et de Joseph, et Marie, la mère des fils de Zébédée étaient également là.
  - type: heading
    content: Joseph d’Arimathée enterre le corps de Jésus
  '57':
  - type: text
    content: 'Ce soir‑là, un homme riche qui venait d’une ville appelée Arimathée est allé auprès de Pilate. Le nom de l’homme était Joseph, et il était devenu un  '
  - type: text
    content: disciple
  - type: text
    content: ' de Jésus. '
  '58':
  - type: text
    content: 'Joseph a dit à Pilate : Je voudrais prendre le corps de Jésus. Pilate a dit à un soldat : Donne le corps mort de Jésus à Joseph. '
  '59':
  - type: text
    content: 'Alors Joseph a pris le corps de Jésus. Il a mis un morceau de tissu propre blanc autour du corps. '
  '6':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont ramassé les pièces d’argent. Ils ont dit : Nous avons utilisé cet argent pour attraper et tuer un homme. C’est donc contre notre loi d’utiliser maintenant ce même argent pour le  '
  - type: text
    content: Temple
  - type: text
    content: '. '
  '60':
  - type: text
    content: 'Et il a enterré le corps dans un grand trou d’une roche. Il avait fait le trou pour qu’on enterre son propre corps quand il mourra. Il a enterré le corps de Jésus. Après cela, il a mis une très grosse pierre devant l’entrée du trou pour le fermer. Puis il est parti. '
  '61':
  - type: text
    content: 'Marie de Magdala et Marie, mère de Jacques, étaient là et elles regardaient. Elles étaient assises à l’extérieur du trou dans la  '
  - type: text
    content: roche
  - type: text
    content: ' où Joseph avait enterré Jésus.'
  - type: heading
    content: Les soldats gardent le lieu où Joseph avait enterré Jésus
  '62':
  - type: text
    content: 'Le lendemain était le jour du '
  - type: text
    content: sabbat
  - type: text
    content: '. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' se sont réunis avec Pilate. '
  '63':
  - type: text
    content: 'Ils ont dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Jésus disait aux gens de fausses choses. Il a dit : Je reviendrai 3 jours après ma mort. Il a dit qu’il sera de nouveau vivant. Nous nous souvenons de cela.  '
  '64':
  - type: text
    content: 'Il est mieux de placer des gardes en dehors de la  '
  - type: text
    content: roche
  - type: text
    content: ' où Joseph l’a enterré. Les gardes attendront là pendant les 3 prochains jours. Alors ses  '
  - type: text
    content: disciples
  - type: text
    content: ' ne pourront pas enlever son corps du trou. S’ils enlèvent le corps, alors ils pourront dire au peuple : Dieu a ressuscité Jésus. Ce sera la deuxième chose fausse. Et ce sera pire que la première chose.'
  '65':
  - type: text
    content: 'Pilate leur a dit : Vous pouvez prendre un groupe des soldats pour garder l’endroit. Qu’ils placent la  '
  - type: text
    content: roche
  - type: text
    content: ' bien, de sorte que personne ne puisse l’ouvrir. '
  '66':
  - type: text
    content: 'Alors les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' sont allés à la roche. Ils ont dit au groupe de soldats : Surveillez ce trou dans la  '
  - type: text
    content: roche
  - type: text
    content: ' bien. Ne laissez personne entrer là. Puis ils ont mis une marque sur la grande pierre. Ils pourront alors savoir si quelqu’un l’a déplacée.'
  '7':
  - type: text
    content: Ils ont parlé ensemble. Et ils ont décidé d’utiliser cet argent pour acheter un champ. C’était pour enterrer là‑bas les étrangers. L’homme qui avait ce champ, avait fait des pots et bocaux.
  '8':
  - type: text
    content: 'Après cela, le champ a été appelé champ du sang. Et il est encore appelé comme cela jusqu’aujourd’hui. '
  '9':
  - type: text
    content: 'Donc, les paroles du '
  - type: text
    content: prophète
  - type: text
    content: ' Jérémie se sont accomplies. Il avait dit longtemps avant : Ils ont pris les 30 pièces d’argent. C’était avec ce montant que le peuple d’Israël avait estimé sa valeur. '
