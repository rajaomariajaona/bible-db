document_id: MAT.27,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 27
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant Pilate
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tôt le matin, tous les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' ont parlé ensemble. Ils ont décidé de demander aux dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romains
    - type: text
      text: ' de tuer Jésus sur une croix. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils ont utilisé cet argent pour acheter le champ du potier. Le Seigneur Dieu m’a dit de faire cela. 
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pilate pose à Jésus quelques questions
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'À ce moment‑là, Jésus se tenait devant le gouverneur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: '. Pilate a demandé à Jésus : Es‑tu le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  ? Jésus a répondu : Oui, c’est comme tu le dis.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' ont dit à Pilate que Jésus avait fait beaucoup de mauvaises choses. Jésus ne leur a rien répondu.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors, Pilate a dit à Jésus : Ces hommes disent que tu as fait beaucoup de mauvaises choses. Tu peux entendre ce qu’ils disent. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais Jésus ne répondait rien à Pilate. Il n’a rien dit de toutes ces accusations. Pilate était très surpris à ce sujet.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Chaque année, au moment du repas de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: ', Pilate libérait une personne de la prison. Les gens pouvaient choisir la personne à libérer. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: À ce moment‑là, il y avait un homme nommé Barabbas. Il était en prison. Tout le monde savait ce qu’il avait fait.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Puis beaucoup de gens se sont réunis au palais de Pilate. Pilate leur a dit : Voulez‑vous que je libère Barabbas de la prison ? Ou voulez‑vous que je libère Jésus ? Jésus est appelé le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Pilate savait très bien pourquoi les dirigeants des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' lui avaient emmené Jésus. Ils n’aimaient pas la façon dont les gens écoutaient Jésus. Beaucoup de gens écoutaient Jésus plus que leurs dirigeants.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pilate cherchait quoi décider. Alors sa femme lui a envoyé un message. Elle a dit : Ne fais rien à cet homme. Il est un homme bon et il n’a rien fait de mal. Hier soir, quand je dormais, j’ai fait un rêve sur lui. Le rêve m’a fait très peur.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ils ont lié Jésus, puis ils l’ont emmené à la maison de Pilate. Les soldats ont mis Jésus sous le pouvoir de Pilate, le gouverneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judas meurt
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' ont parlé aux gens. Ils disaient : Demandez à Pilate de libérer Barabbas de la prison. Demandez à Pilate de faire tuer Jésus sur une croix.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Pilate a demandé aux gens de nouveau : Lequel de ces 2 hommes voulez‑vous que je libère ? Le peuple a répondu : Barabbas. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Alors Pilate a demandé aux gens : Que devrais‑je donc faire avec Jésus, qui est appelé le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '  ? Les gens criaient tous : Nous voulons tuer Jésus sur une croix.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors Pilate dit : Pourquoi devrais‑je le faire tuer ? Quel mal a‑t‑il fait ? Mais les gens criaient à plusieurs reprises encore plus fort : Tuez‑le sur une croix ! Tuez‑le sur une croix !'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors Pilate ne pouvait plus rien faire pour les calmer. Alors, Pilate a pris de l’eau et il a lavé ses mains devant le peuple. Il dit : Ce n’est pas à cause de moi que cet homme va mourir. C’est vous qui êtes à la base de cela. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Toutes les personnes ont répondu à Pilate : Nos enfants et nous, nous répondrons à Dieu. Il peut nous punir, si nous avons fait une mauvaise chose. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Alors Pilate a libéré Barabbas de la prison. Pilate a dit aux soldats : Frappez Jésus avec un fouet. Ensuite, tuez‑le sur une croix.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Alors les soldats de Pilate ont amené Jésus dans une grande salle du palais de Pilate. Tous les autres soldats de leur groupe étaient là. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils ont enlevé les vêtements de Jésus, et ils ont mis un  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: ' rouge foncé sur lui à la place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils ont arrangé des épines. Ils ont fait une couronne d’épines pour lui. Puis ils l’ont mise sur sa tête. Et ils ont mis un long bâton dans sa main droite. Ils allaient à genoux devant lui. Ils se moquaient de lui et ils disaient : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: salut
    - type: text
      text: ', toi Roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  ! Nous nous agenouillons en face de toi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Judas a entendu que les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' avaient demandé aux dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romains
    - type: text
      text: ' de tuer Jésus sur une croix. Judas a livré Jésus. Maintenant, il était très triste de ce qu’il avait fait. Donc, il a retourné les 30 pièces d’argent aux chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Alors les soldats ont craché au visage de Jésus. Ils ont pris le bâton et ils ont frappé Jésus sur sa tête. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Après qu’ils ont fini de se moquer de lui, ils ont enlevé le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: ' rouge foncé. Et ils ont remis les vêtements de Jésus sur lui. Ensuite, ils l’ont conduit à l’endroit où ils iront le tuer. Ils l’ont mis à une croix en bois.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les soldats tuent Jésus sur une croix
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Sur le chemin de cet endroit, ils ont arrêté un homme. Son nom était Simon. Il allait devant Jésus et les soldats. Il était de la ville appelée Cyrène. Les soldats '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romains
    - type: text
      text: ' ont dit à Simon : Porte cette croix ! Ensuite, ils l’ont poussé à porter la croix de Jésus. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Les soldats ont conduit Jésus au lieu appelé '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Golgotha
    - type: text
      text: . (
    - type: usfm
      marker: w
      children:
      - type: text
        text: Golgotha
    - type: text
      text: ' signifie le lieu du crâne.)'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Les soldats ont essayé de donner à Jésus du vin à boire. Ils ont mis quelque chose comme des médicaments dans cela. Jésus a goûté, mais il n’a pas voulu boire. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Alors les soldats '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romains
    - type: text
      text: ' ont mis Jésus sur la croix et ils ont pris ses vêtements. Ils ont fait un jeu entre eux. Ils ont fait cela pour savoir qui recevrait une partie de ses vêtements. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Alors les soldats se sont assis. Ils regardaient attentivement Jésus. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ils ont mis ces écrits au‑dessus de la tête de Jésus : Cet homme est Jésus, le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. C’était la raison pour laquelle ils ont condamné Jésus à mort. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Alors les soldats ont également mis 2 autres hommes à ses côtés sur des croix. Ces hommes étaient des bandits. Un homme était à côté droit de Jésus, et un homme était à son côté gauche. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Les gens qui passaient devant Jésus disaient de mauvaises choses contre lui. Ils bougeaient leurs têtes d’un côté à l’autre côté pendant qu’ils regardaient. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Judas leur a dit : J’ai fait une mauvaise chose. Je vous ai aidés à attraper un homme qui n’a rien fait de mal. Ils ont répondu à Judas : Ce n’est pas important pour nous. C’est ton problème.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Et ils disaient : Tu avais dit que tu pourras détruire le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: . Tu avais dit que dans 3 jours, tu pourras le construire à nouveau. Si tu es vraiment le Fils de Dieu, sauve‑toi. Descends de la croix.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les enseignants de la loi et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' se moquaient tous de lui aussi. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Cet homme a sauvé les autres, mais il ne peut pas se sauver. Il disait qu’il est le roi d’Israël. S’il descend de la croix, alors nous croirons en lui.  '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Il croit en Dieu. Donc, si Dieu l’aime vraiment, que Dieu le sauve maintenant. Il a dit qu’il est le Fils de Dieu. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Puis les 2 hommes sur des croix à côté de Jésus disaient les mêmes mauvaises choses contre lui. 
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus meurt
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Il était environ midi. Le pays tout entier est devenu noir jusqu’à 15 heures. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'À environ 15 heures, Jésus a crié d’une voix forte. Il a dit : Éli, Éli, lama sabachthani ? Cela signifie : Mon Dieu, mon Dieu, pourquoi m’as‑tu laissé seul ?'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Certaines personnes se tenaient debout près de Jésus. Elles ont entendu ce qu’il a crié. Et elles se disaient ceci : Il crie à Élie, le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: '. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Un homme a couru rapidement et il a apporté un morceau d’un matériau mou. Il a versé du vin qui n’était pas doux sur cela. Et puis il l’a mis sur le bout d’un bâton. Il l’a soulevé à Jésus pour qu’il puisse boire. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Les autres personnes disaient : Attendez un instant et regardez. Nous verrons si Élie viendra. Peut‑être qu’il va le sauver.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Judas a jeté l’argent sur le sol dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: . Puis il est parti. Il est allé se pendre à une corde et il est mort.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Alors Jésus a crié à nouveau d’une voix forte. Et après cela, il est mort. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'À ce moment‑là, le rideau du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' s’est déchiré complètement en 2 parties. Il s’est déchiré à partir du haut à l’autre extrémité. La terre a tremblé et les roches se sont brisées. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Dieu a ouvert les endroits où les gens avaient enterré les morts. Beaucoup des gens de Dieu étaient morts. Ils sont redevenus vivants. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Ils sont sortis des tombeaux. C’était après la résurrection de Jésus. Ils sont entrés dans la ville de Jérusalem et beaucoup de gens les ont vus.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' et les soldats regardaient encore Jésus. Ils ont tous vu le sol trembler. Et ils ont vu les roches se briser. Ils avaient très peur et ils ont dit : Il est vrai que cet homme était le Fils de Dieu.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Il y avait aussi beaucoup de femmes là‑bas. Elles regardaient un court chemin de la croix et elles ont vu toutes ces choses arriver. Elles venaient de Galilée avec Jésus. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Marie de Magdala était là. Marie, la mère de Jacques et de Joseph, et Marie, la mère des fils de Zébédée étaient également là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph d’Arimathée enterre le corps de Jésus
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Ce soir‑là, un homme riche qui venait d’une ville appelée Arimathée est allé auprès de Pilate. Le nom de l’homme était Joseph, et il était devenu un  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' de Jésus. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Joseph a dit à Pilate : Je voudrais prendre le corps de Jésus. Pilate a dit à un soldat : Donne le corps mort de Jésus à Joseph. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Alors Joseph a pris le corps de Jésus. Il a mis un morceau de tissu propre blanc autour du corps. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont ramassé les pièces d’argent. Ils ont dit : Nous avons utilisé cet argent pour attraper et tuer un homme. C’est donc contre notre loi d’utiliser maintenant ce même argent pour le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Et il a enterré le corps dans un grand trou d’une roche. Il avait fait le trou pour qu’on enterre son propre corps quand il mourra. Il a enterré le corps de Jésus. Après cela, il a mis une très grosse pierre devant l’entrée du trou pour le fermer. Puis il est parti. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Marie de Magdala et Marie, mère de Jacques, étaient là et elles regardaient. Elles étaient assises à l’extérieur du trou dans la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: roche
    - type: text
      text: ' où Joseph avait enterré Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les soldats gardent le lieu où Joseph avait enterré Jésus
    marker-yv: yv-h
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Le lendemain était le jour du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: '. Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' se sont réunis avec Pilate. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Ils ont dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Jésus disait aux gens de fausses choses. Il a dit : Je reviendrai 3 jours après ma mort. Il a dit qu’il sera de nouveau vivant. Nous nous souvenons de cela.  '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'Il est mieux de placer des gardes en dehors de la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: roche
    - type: text
      text: ' où Joseph l’a enterré. Les gardes attendront là pendant les 3 prochains jours. Alors ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ne pourront pas enlever son corps du trou. S’ils enlèvent le corps, alors ils pourront dire au peuple : Dieu a ressuscité Jésus. Ce sera la deuxième chose fausse. Et ce sera pire que la première chose.'
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Pilate leur a dit : Vous pouvez prendre un groupe des soldats pour garder l’endroit. Qu’ils placent la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: roche
    - type: text
      text: ' bien, de sorte que personne ne puisse l’ouvrir. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'Alors les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' sont allés à la roche. Ils ont dit au groupe de soldats : Surveillez ce trou dans la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: roche
    - type: text
      text: ' bien. Ne laissez personne entrer là. Puis ils ont mis une marque sur la grande pierre. Ils pourront alors savoir si quelqu’un l’a déplacée.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils ont parlé ensemble. Et ils ont décidé d’utiliser cet argent pour acheter un champ. C’était pour enterrer là‑bas les étrangers. L’homme qui avait ce champ, avait fait des pots et bocaux.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Après cela, le champ a été appelé champ du sang. Et il est encore appelé comme cela jusqu’aujourd’hui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Donc, les paroles du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Jérémie se sont accomplies. Il avait dit longtemps avant : Ils ont pris les 30 pièces d’argent. C’était avec ce montant que le peuple d’Israël avait estimé sa valeur. '
