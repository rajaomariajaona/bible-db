document_id: 1CO.8
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 8
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: À propos de la nourriture que les gens offrent aux idoles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous m’avez posé une question sur la nourriture que les gens ont offerte aux idoles. Vous dites : Nous connaissons toutes ces choses. Nous savons que c’est vrai. Mais quand vous savez quelque chose, cela peut vous rendre orgueilleux. L’amour est la meilleure chose. L’amour aide les gens à devenir forts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certaines personnes peuvent penser qu’elles savent tout. Des gens comme ça ne savent pas comme ils devraient savoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais si quelqu’un aime Dieu, il est l’ami de Dieu. Dieu connaît cette personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pensez donc à la nourriture que les gens ont offerte aux idoles. Vous demandez : Les chrétiens peuvent‑ils manger cette nourriture ? Nous savons qu’aucune idole n’est vraiment vivante. Nous savons également qu’il n’y a qu’un seul Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il est vrai que les gens appellent beaucoup de choses leurs dieux. Ces choses sont à la fois au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et sur la terre. Ces gens ont de nombreux dieux et de nombreux seigneurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais pour nous, il n’y a qu’un seul Dieu, qui est le Père. Tout vient de lui. Nous vivons pour le servir. Pour nous, il n’y a qu’un seul '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui est Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Tout est là à cause de lui. Et nous vivons nous‑mêmes grâce à lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais tout le monde ne comprend pas bien les idoles. Avant de croire en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', certaines personnes adoraient les idoles pendant de nombreuses années. Donc, si ces gens mangent de la nourriture que les gens ont offerte à une idole, ils ont peur. Ils pensent que la nourriture appartient à un vrai dieu. Leurs pensées sont faibles. Ils pensent qu’ils font quelque chose de mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais la nourriture que nous mangeons ne nous aidera pas à plaire à Dieu. Si nous ne mangeons pas certains aliments, cela ne nous rendra pas pires. Si nous mangeons certains aliments, cela ne nous rendra pas meilleurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous êtes libres de manger tout type de nourriture. Vous comprenez cela. Mais d’autres chrétiens ne comprennent pas très bien. Vous devez donc être prudents. Ne les amenez pas à faire quelque chose qu’ils pensent être mauvais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu manges peut‑être de la nourriture dans un endroit où les gens adorent les idoles. Puis un autre chrétien te voit là. Tu sais que les idoles ne sont pas de vrais dieux. Mais l’autre chrétien peut avoir des pensées faibles à ce sujet. Donc, parce qu’il te voit, il peut penser qu’il peut aussi manger cette nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Parce que tu comprends bien, tu fais du mal à quelqu’un qui ne comprend pas très bien. De cette façon, la vie de ton ami chrétien est complètement détruite. N’oublie pas que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort pour sauver cet ami. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si vous faites ce genre de mauvaise chose pour faire du mal à vos amis chrétiens, vous faites du mal à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même. Vous les amenez à faire quelque chose qu’ils pensent être mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je ne veux faire du mal à aucun de mes amis chrétiens. Donc, si la nourriture que je mange leur fait faire quelque chose de mal, je ne mangerai plus jamais de la viande.
