document_id: 1CO.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: heading
    content: À propos de la nourriture que les gens offrent aux idoles
  - type: text
    content: 'Vous m’avez posé une question sur la nourriture que les gens ont offerte aux idoles. Vous dites : Nous connaissons toutes ces choses. Nous savons que c’est vrai. Mais quand vous savez quelque chose, cela peut vous rendre orgueilleux. L’amour est la meilleure chose. L’amour aide les gens à devenir forts. '
  '10':
  - type: text
    content: 'Tu manges peut‑être de la nourriture dans un endroit où les gens adorent les idoles. Puis un autre chrétien te voit là. Tu sais que les idoles ne sont pas de vrais dieux. Mais l’autre chrétien peut avoir des pensées faibles à ce sujet. Donc, parce qu’il te voit, il peut penser qu’il peut aussi manger cette nourriture. '
  '11':
  - type: text
    content: Parce que tu comprends bien, tu fais du mal à quelqu’un qui ne comprend pas très bien. De cette façon, la vie de ton ami chrétien est complètement détruite. N’oublie pas que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort pour sauver cet ami. '
  '12':
  - type: text
    content: Si vous faites ce genre de mauvaise chose pour faire du mal à vos amis chrétiens, vous faites du mal à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même. Vous les amenez à faire quelque chose qu’ils pensent être mal. '
  '13':
  - type: text
    content: Je ne veux faire du mal à aucun de mes amis chrétiens. Donc, si la nourriture que je mange leur fait faire quelque chose de mal, je ne mangerai plus jamais de la viande.
  '2':
  - type: text
    content: 'Certaines personnes peuvent penser qu’elles savent tout. Des gens comme ça ne savent pas comme ils devraient savoir. '
  '3':
  - type: text
    content: Mais si quelqu’un aime Dieu, il est l’ami de Dieu. Dieu connaît cette personne.
  '4':
  - type: text
    content: 'Pensez donc à la nourriture que les gens ont offerte aux idoles. Vous demandez : Les chrétiens peuvent‑ils manger cette nourriture ? Nous savons qu’aucune idole n’est vraiment vivante. Nous savons également qu’il n’y a qu’un seul Dieu. '
  '5':
  - type: text
    content: 'Il est vrai que les gens appellent beaucoup de choses leurs dieux. Ces choses sont à la fois au '
  - type: text
    content: ciel
  - type: text
    content: ' et sur la terre. Ces gens ont de nombreux dieux et de nombreux seigneurs. '
  '6':
  - type: text
    content: 'Mais pour nous, il n’y a qu’un seul Dieu, qui est le Père. Tout vient de lui. Nous vivons pour le servir. Pour nous, il n’y a qu’un seul '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui est Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Tout est là à cause de lui. Et nous vivons nous‑mêmes grâce à lui.
  '7':
  - type: text
    content: Mais tout le monde ne comprend pas bien les idoles. Avant de croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', certaines personnes adoraient les idoles pendant de nombreuses années. Donc, si ces gens mangent de la nourriture que les gens ont offerte à une idole, ils ont peur. Ils pensent que la nourriture appartient à un vrai dieu. Leurs pensées sont faibles. Ils pensent qu’ils font quelque chose de mal. '
  '8':
  - type: text
    content: Mais la nourriture que nous mangeons ne nous aidera pas à plaire à Dieu. Si nous ne mangeons pas certains aliments, cela ne nous rendra pas pires. Si nous mangeons certains aliments, cela ne nous rendra pas meilleurs.
  '9':
  - type: text
    content: 'Vous êtes libres de manger tout type de nourriture. Vous comprenez cela. Mais d’autres chrétiens ne comprennent pas très bien. Vous devez donc être prudents. Ne les amenez pas à faire quelque chose qu’ils pensent être mauvais. '
