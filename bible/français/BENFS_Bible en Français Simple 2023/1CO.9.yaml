document_id: 1CO.9,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 9
  - type: heading
    content: Le travail de Paul en tant qu’apôtre
  - type: text
    content: 'Je suis un homme libre. Je suis '
  - type: text
    content: apôtre
  - type: text
    content: '. J’ai vu Jésus, notre '
  - type: text
    content: Seigneur
  - type: text
    content: '. Vous êtes vous‑mêmes le résultat du travail que je fais pour servir le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Vous savez que c’est vrai. '
  '10':
  - type: text
    content: 'Non, Dieu voulait aussi nous aider. C’est pourquoi il a donné cette règle à Moïse pour son peuple. Tout agriculteur qui travaille dur pour cultiver de la nourriture doit en avoir pour lui‑même. Il laboure ses champs et prépare les graines, parce qu’il espère manger une partie de la nourriture. '
  '11':
  - type: text
    content: 'Notre travail spirituel parmi vous est comme si nous avions planté des graines. En retour, vous devez nous donner la nourriture et les vêtements dont nous avons besoin pour vivre. C’est comme la récolte que nous devons recevoir de notre travail. '
  '12':
  - type: text
    content: Vous acceptez d’aider d’autres gens qui vous enseignent le message de Dieu. Nous devrions donc sûrement recevoir encore plus d’aide de votre part !
  - type: text
    content: Mais Barnabas et moi n’avons pas utilisé notre droit sur vous de nous aider comme ça. Au lieu de cela, nous acceptons patiemment toutes ces choses difficiles. Nous voulons que la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' aille partout. Nous ne voulons rien faire qui puisse l’arrêter.'
  '13':
  - type: text
    content: 'Réfléchissez à ceci : Les gens qui travaillent dans la maison de Dieu (temple) tirent leur nourriture de cet endroit. Les '
  - type: text
    content: prêtres
  - type: text
    content: ' qui offrent des '
  - type: text
    content: sacrifices
  - type: text
    content: ' sur l’autel reçoivent une partie des animaux à manger. '
  '14':
  - type: text
    content: De la même manière, les gens qui disent la Bonne Nouvelle de Dieu aux autres devraient recevoir ce dont ils ont besoin pour vivre. Ils ont le droit de recevoir cela des personnes qui entendent la Bonne Nouvelle de leur part.
  '15':
  - type: text
    content: Mais je n’ai pas utilisé mon droit d’
  - type: text
    content: apôtre
  - type: text
    content: ' pour vous demander ces choses. Et je n’écris pas cette lettre pour vous demander de m’aider maintenant. Non ! Il serait préférable pour moi de mourir que de changer ma façon de vivre. Je peux me glorifier de cela et personne ne doit m’arrêter. '
  '16':
  - type: text
    content: Je dis la Bonne Nouvelle de Dieu aux gens. Mais je n’ai aucune raison de me glorifier à cause de cela. C’est quelque chose que je dois faire. Si je ne disais pas la Bonne Nouvelle, cela allait me causer de grands problèmes.
  '17':
  - type: text
    content: 'Si je fais ce travail parce que j’ai choisi de le faire, je pourrai avoir mon salaire. Mais moi, je n’ai pas choisi de le faire. Dieu m’a donné ce travail, donc je dois le faire. '
  '18':
  - type: text
    content: 'Alors, quel genre de salaire dois‑je recevoir ? C’est ceci : Je ne prends pas de l’argent aux gens quand je leur dis la Bonne Nouvelle de Dieu. Je n’utilise pas tout mon droit que je pourrais utiliser quand je dis la Bonne Nouvelle de Dieu aux gens.'
  '19':
  - type: text
    content: Oui, je suis un homme libre. Je ne suis l’esclave de personne. Mais je choisis de servir tout le monde comme un esclave. Je le fais pour pouvoir aider beaucoup plus de gens à croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'D’autres gens peuvent ne pas m’accepter comme un vrai '
  - type: text
    content: apôtre
  - type: text
    content: '. Mais vous devez sûrement m’accepter. Grâce à mon travail, vous appartenez maintenant au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Cela montre que je suis vraiment son '
  - type: text
    content: apôtre
  - type: text
    content: .
  '20':
  - type: text
    content: 'Quand j’étais parmi les '
  - type: text
    content: Juifs
  - type: text
    content: ', je vivais comme eux, parce que je voulais amener les '
  - type: text
    content: Juifs
  - type: text
    content: ' à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. La loi que Dieu avait donnée à Moïse n’a plus de pouvoir sur moi. Mais j’ai choisi d’obéir à cette loi quand j’étais parmi les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui la mettent en pratique. Je l’ai fait pour pouvoir les aider à croire en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
  '21':
  - type: text
    content: Avec les païens, qui n’ont pas la loi de Moïse, j’ai vécu comme eux. J’ai continué de respecter la loi de Dieu. Oui, j’obéis à la loi de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Mais j’ai vécu comme un païen, afin de pouvoir aider les païens à croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '22':
  - type: text
    content: Avec des gens faibles, je suis devenu comme quelqu’un de faible aussi. Je l’ai fait pour que je puisse amener des gens faibles à croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Quelle que soit la vie des gens, je vis comme eux. Je veux faire tout ce que je peux pour en sauver certains.
  '23':
  - type: text
    content: Je veux aider les gens à accepter la Bonne Nouvelle de Dieu. Voilà pourquoi je fais toutes ces choses. Je veux partager les bonnes choses que la Bonne Nouvelle donne aux croyants.
  '24':
  - type: text
    content: 'Pensez à la façon dont les gens courent dans une course. Tous les coureurs courent, mais un seul d’entre eux reçoit le prix. Il faut courir comme ça pour gagner la course. '
  '25':
  - type: text
    content: Les gens qui courent en course préparent bien leurs corps. Ils travaillent très dur. Ils le font pour gagner un prix qui va vite s’abîmer. Mais nous travaillons dur pour recevoir un prix qui ne sera jamais abîmé.
  '26':
  - type: text
    content: 'Pour cette raison, je ne cours pas sans but. Je ne me bats pas comme quelqu’un qui ne fait que battre l’air. '
  '27':
  - type: text
    content: Je fais agir mon corps à faire ce que je veux qu’il fasse. Je le fais comme mon esclave. J’ai dit le message de Dieu à d’autres gens. Je ne veux pas perdre le prix moi‑même. Donc, j’essaie beaucoup d’obéir aux règles de la course.
  '3':
  - type: text
    content: 'Certaines personnes n’aiment pas ce que je fais. Voici ma réponse à ce que ces personnes disent contre moi : '
  '4':
  - type: text
    content: 'Comme '
  - type: text
    content: apôtres
  - type: text
    content: ', Barnabas et moi, nous avons le droit de recevoir de la nourriture et des boissons des gens que nous aidons. '
  '5':
  - type: text
    content: 'Si nous avons une épouse chrétienne, nous devons l’emmener avec nous lorsque nous voyageons. Les autres '
  - type: text
    content: apôtres
  - type: text
    content: ' font cela. Il en va de même pour les frères du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et aussi pour Pierre. Nous avons le même droit qu’eux. '
  '6':
  - type: text
    content: Barnabas et moi semblons être les seuls à devoir faire d’autres travaux pour notre nourriture. Nous ne devrions pas faire ça !
  '7':
  - type: text
    content: 'Réfléchissez à ces exemples : Un soldat ne doit jamais payer pour sa propre nourriture et ses vêtements. Un agriculteur qui plante des '
  - type: text
    content: vignes
  - type: text
    content: ' mangera une partie des raisins. Une personne qui s’occupe des moutons ou des chèvres va boire une partie du lait de ces animaux. Vous savez que c’est ce qui arrive toujours.'
  '8':
  - type: text
    content: 'Je ne vous dis pas seulement des idées humaines. La loi de Dieu enseigne la même chose. '
  '9':
  - type: text
    content: 'La loi de Dieu qu’il a donnée à Moïse dit ceci : Ne ferme pas la bouche de ton taureau pendant qu’il marche sur tes grains de blé.'
  - type: text
    content: 'Mais la loi de Dieu n’enseigne pas cela uniquement pour aider les taureaux. '
