document_id: 1CO.9
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 9
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le travail de Paul en tant qu’
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je suis un homme libre. Je suis '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: '. J’ai vu Jésus, notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Vous êtes vous‑mêmes le résultat du travail que je fais pour servir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Vous savez que c’est vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'D’autres gens peuvent ne pas m’accepter comme un vrai '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: '. Mais vous devez sûrement m’accepter. Grâce à mon travail, vous appartenez maintenant au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Cela montre que je suis vraiment son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Certaines personnes n’aiment pas ce que je fais. Voici ma réponse à ce que ces personnes disent contre moi : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ', Barnabas et moi, nous avons le droit de recevoir de la nourriture et des boissons des gens que nous aidons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si nous avons une épouse chrétienne, nous devons l’emmener avec nous lorsque nous voyageons. Les autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' font cela. Il en va de même pour les frères du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et aussi pour Pierre. Nous avons le même droit qu’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Barnabas et moi semblons être les seuls à devoir faire d’autres travaux pour notre nourriture. Nous ne devrions pas faire ça !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Réfléchissez à ces exemples : Un soldat ne doit jamais payer pour sa propre nourriture et ses vêtements. Un agriculteur qui plante des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vignes
  - type: text
    text: ' mangera une partie des raisins. Une personne qui s’occupe des moutons ou des chèvres va boire une partie du lait de ces animaux. Vous savez que c’est ce qui arrive toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je ne vous dis pas seulement des idées humaines. La loi de Dieu enseigne la même chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La loi de Dieu qu’il a donnée à Moïse dit ceci : Ne ferme pas la bouche de ton taureau pendant qu’il marche sur tes grains de blé.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais la loi de Dieu n’enseigne pas cela uniquement pour aider les taureaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Non, Dieu voulait aussi nous aider. C’est pourquoi il a donné cette règle à Moïse pour son peuple. Tout agriculteur qui travaille dur pour cultiver de la nourriture doit en avoir pour lui‑même. Il laboure ses champs et prépare les graines, parce qu’il espère manger une partie de la nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Notre travail spirituel parmi vous est comme si nous avions planté des graines. En retour, vous devez nous donner la nourriture et les vêtements dont nous avons besoin pour vivre. C’est comme la récolte que nous devons recevoir de notre travail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous acceptez d’aider d’autres gens qui vous enseignent le message de Dieu. Nous devrions donc sûrement recevoir encore plus d’aide de votre part !
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais Barnabas et moi n’avons pas utilisé notre droit sur vous de nous aider comme ça. Au lieu de cela, nous acceptons patiemment toutes ces choses difficiles. Nous voulons que la Bonne Nouvelle de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' aille partout. Nous ne voulons rien faire qui puisse l’arrêter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Réfléchissez à ceci : Les gens qui travaillent dans la maison de Dieu (temple) tirent leur nourriture de cet endroit. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' qui offrent des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' sur l’autel reçoivent une partie des animaux à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: De la même manière, les gens qui disent la Bonne Nouvelle de Dieu aux autres devraient recevoir ce dont ils ont besoin pour vivre. Ils ont le droit de recevoir cela des personnes qui entendent la Bonne Nouvelle de leur part.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais je n’ai pas utilisé mon droit d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: ' pour vous demander ces choses. Et je n’écris pas cette lettre pour vous demander de m’aider maintenant. Non ! Il serait préférable pour moi de mourir que de changer ma façon de vivre. Je peux me glorifier de cela et personne ne doit m’arrêter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je dis la Bonne Nouvelle de Dieu aux gens. Mais je n’ai aucune raison de me glorifier à cause de cela. C’est quelque chose que je dois faire. Si je ne disais pas la Bonne Nouvelle, cela allait me causer de grands problèmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si je fais ce travail parce que j’ai choisi de le faire, je pourrai avoir mon salaire. Mais moi, je n’ai pas choisi de le faire. Dieu m’a donné ce travail, donc je dois le faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors, quel genre de salaire dois‑je recevoir ? C’est ceci : Je ne prends pas de l’argent aux gens quand je leur dis la Bonne Nouvelle de Dieu. Je n’utilise pas tout mon droit que je pourrais utiliser quand je dis la Bonne Nouvelle de Dieu aux gens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, je suis un homme libre. Je ne suis l’esclave de personne. Mais je choisis de servir tout le monde comme un esclave. Je le fais pour pouvoir aider beaucoup plus de gens à croire en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quand j’étais parmi les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', je vivais comme eux, parce que je voulais amener les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. La loi que Dieu avait donnée à Moïse n’a plus de pouvoir sur moi. Mais j’ai choisi d’obéir à cette loi quand j’étais parmi les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui la mettent en pratique. Je l’ai fait pour pouvoir les aider à croire en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Avec les païens, qui n’ont pas la loi de Moïse, j’ai vécu comme eux. J’ai continué de respecter la loi de Dieu. Oui, j’obéis à la loi de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Mais j’ai vécu comme un païen, afin de pouvoir aider les païens à croire en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Avec des gens faibles, je suis devenu comme quelqu’un de faible aussi. Je l’ai fait pour que je puisse amener des gens faibles à croire en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Quelle que soit la vie des gens, je vis comme eux. Je veux faire tout ce que je peux pour en sauver certains.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je veux aider les gens à accepter la Bonne Nouvelle de Dieu. Voilà pourquoi je fais toutes ces choses. Je veux partager les bonnes choses que la Bonne Nouvelle donne aux croyants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pensez à la façon dont les gens courent dans une course. Tous les coureurs courent, mais un seul d’entre eux reçoit le prix. Il faut courir comme ça pour gagner la course. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Les gens qui courent en course préparent bien leurs corps. Ils travaillent très dur. Ils le font pour gagner un prix qui va vite s’abîmer. Mais nous travaillons dur pour recevoir un prix qui ne sera jamais abîmé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Pour cette raison, je ne cours pas sans but. Je ne me bats pas comme quelqu’un qui ne fait que battre l’air. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je fais agir mon corps à faire ce que je veux qu’il fasse. Je le fais comme mon esclave. J’ai dit le message de Dieu à d’autres gens. Je ne veux pas perdre le prix moi‑même. Donc, j’essaie beaucoup d’obéir aux règles de la course.
