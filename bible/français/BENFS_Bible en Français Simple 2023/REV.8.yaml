document_id: REV.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: heading
    content: L’Agneau ouvre le dernier sceau
  - type: text
    content: 'L’Agneau a ouvert le septième sceau. Ensuite, il est devenu complètement silencieux dans le '
  - type: text
    content: ciel
  - type: text
    content: ' pendant environ une demi‑heure. '
  '10':
  - type: text
    content: 'Le troisième '
  - type: text
    content: ange
  - type: text
    content: ' a fait un son avec sa trompette. J’ai vu une très grosse étoile qui brûlait d’une lumière vive. Elle est tombée du '
  - type: text
    content: ciel
  - type: text
    content: ' sur un tiers des fleuves. Elle est également tombée sur les endroits où l’eau sort du sol. '
  '11':
  - type: text
    content: Le nom de l’étoile signifie « ça a un mauvais goût ». Ainsi, un tiers de l’eau sur la terre est devenu mauvais. Beaucoup de gens sont morts parce qu’ils buvaient cette mauvaise eau.
  '12':
  - type: text
    content: 'Le quatrième '
  - type: text
    content: ange
  - type: text
    content: ' a fait un son avec sa trompette. Un tiers du soleil est devenu sombre. Un tiers de la lune et un tiers des étoiles sont également devenus sombres. Alors, le jour a perdu un tiers de sa lumière. La nuit a aussi perdu un tiers de sa lumière.'
  '13':
  - type: text
    content: 'J’ai levé les yeux et j’ai vu un aigle. Il volait haut dans le '
  - type: text
    content: ciel
  - type: text
    content: ' au‑dessus de moi. Je l’ai entendu dire d’une voix forte :'
  - type: text
    content: 'De grandes souffrances, de grandes souffrances, de grandes souffrances arrivent aux gens qui vivent sur la terre ! De très mauvaises choses se produiront lorsque les 3 autres '
  - type: text
    content: anges
  - type: text
    content: ' sonneront leurs trompettes !'
  '2':
  - type: text
    content: 'Puis j’ai vu les 7 '
  - type: text
    content: anges
  - type: text
    content: ' qui se tiennent devant Dieu. Quelqu’un leur a donné 7 trompettes.'
  '3':
  - type: text
    content: 'Puis un autre '
  - type: text
    content: ange
  - type: text
    content: ' est venu. Il se tenait à l’autel où les gens offraient des cadeaux à Dieu. Il avait un bol en or pour y mettre de l’'
  - type: text
    content: encens
  - type: text
    content: ' et le brûler. Il a reçu beaucoup d’'
  - type: text
    content: encens
  - type: text
    content: ' et il l’a brûlé comme un cadeau à Dieu. Cela dégageait une odeur agréable et se mélangeait aux prières du peuple de Dieu. L’'
  - type: text
    content: ange
  - type: text
    content: ' a offert tout cela sur l’autel d’or qui était devant le trône de Dieu. '
  '4':
  - type: text
    content: Lorsqu’il a fait cela, la fumée de l’
  - type: text
    content: encens
  - type: text
    content: ' est montée devant Dieu. Les prières du peuple de Dieu sont également allées jusqu’à Dieu. '
  '5':
  - type: text
    content: Alors l’
  - type: text
    content: ange
  - type: text
    content: ' a pris le bol d’or et il l’a rempli de feu de l’autel. Puis il a tout jeté sur terre. Il y avait des bruits forts et un bruit de '
  - type: text
    content: tonnerre
  - type: text
    content: . Il y avait un éclair brillant, comme une très mauvaise tempête. La terre bougeait très fortement.
  - type: heading
    content: Les 4 premières trompettes
  '6':
  - type: text
    content: 'Alors les 7 '
  - type: text
    content: anges
  - type: text
    content: ' avec les 7 trompettes se sont préparés à faire du bruit avec leurs trompettes. '
  '7':
  - type: text
    content: 'Le premier '
  - type: text
    content: ange
  - type: text
    content: ' a sonné avec sa trompette. De fortes pluies avec des pierres de glace sont tombées sur la terre. La pluie était mêlée de feu et de sang et elle tombait. Elle a brûlé un tiers de la terre. Elle a détruit un tiers des arbres et toute l’herbe verte. '
  '8':
  - type: text
    content: 'Le second '
  - type: text
    content: ange
  - type: text
    content: ' a fait un son avec sa trompette. J’ai vu quelque chose comme une très grande montagne qui brûlait de feu. Cette montagne est tombée dans la mer. Un tiers de la mer est devenu du sang. '
  '9':
  - type: text
    content: Un tiers des animaux qui vivaient dans la mer sont morts. Il a également détruit un tiers des navires en mer.
