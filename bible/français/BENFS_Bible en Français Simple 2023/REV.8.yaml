document_id: REV.8,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 8
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Agneau ouvre le dernier sceau
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Agneau a ouvert le septième sceau. Ensuite, il est devenu complètement silencieux dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' pendant environ une demi‑heure. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le troisième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a fait un son avec sa trompette. J’ai vu une très grosse étoile qui brûlait d’une lumière vive. Elle est tombée du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' sur un tiers des fleuves. Elle est également tombée sur les endroits où l’eau sort du sol. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le nom de l’étoile signifie « ça a un mauvais goût ». Ainsi, un tiers de l’eau sur la terre est devenu mauvais. Beaucoup de gens sont morts parce qu’ils buvaient cette mauvaise eau.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le quatrième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a fait un son avec sa trompette. Un tiers du soleil est devenu sombre. Un tiers de la lune et un tiers des étoiles sont également devenus sombres. Alors, le jour a perdu un tiers de sa lumière. La nuit a aussi perdu un tiers de sa lumière.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'J’ai levé les yeux et j’ai vu un aigle. Il volait haut dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' au‑dessus de moi. Je l’ai entendu dire d’une voix forte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De grandes souffrances, de grandes souffrances, de grandes souffrances arrivent aux gens qui vivent sur la terre ! De très mauvaises choses se produiront lorsque les 3 autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' sonneront leurs trompettes !'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Puis j’ai vu les 7 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' qui se tiennent devant Dieu. Quelqu’un leur a donné 7 trompettes.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Puis un autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' est venu. Il se tenait à l’autel où les gens offraient des cadeaux à Dieu. Il avait un bol en or pour y mettre de l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: encens
    - type: text
      text: ' et le brûler. Il a reçu beaucoup d’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: encens
    - type: text
      text: ' et il l’a brûlé comme un cadeau à Dieu. Cela dégageait une odeur agréable et se mélangeait aux prières du peuple de Dieu. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a offert tout cela sur l’autel d’or qui était devant le trône de Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Lorsqu’il a fait cela, la fumée de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: encens
    - type: text
      text: ' est montée devant Dieu. Les prières du peuple de Dieu sont également allées jusqu’à Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Alors l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a pris le bol d’or et il l’a rempli de feu de l’autel. Puis il a tout jeté sur terre. Il y avait des bruits forts et un bruit de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tonnerre
    - type: text
      text: . Il y avait un éclair brillant, comme une très mauvaise tempête. La terre bougeait très fortement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les 4 premières trompettes
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alors les 7 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' avec les 7 trompettes se sont préparés à faire du bruit avec leurs trompettes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le premier '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a sonné avec sa trompette. De fortes pluies avec des pierres de glace sont tombées sur la terre. La pluie était mêlée de feu et de sang et elle tombait. Elle a brûlé un tiers de la terre. Elle a détruit un tiers des arbres et toute l’herbe verte. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le second '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a fait un son avec sa trompette. J’ai vu quelque chose comme une très grande montagne qui brûlait de feu. Cette montagne est tombée dans la mer. Un tiers de la mer est devenu du sang. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Un tiers des animaux qui vivaient dans la mer sont morts. Il a également détruit un tiers des navires en mer.
