document_id: 1CO.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Les dirigeants de l’Église sont les serviteurs de Dieu
  - type: text
    content: Voici comment vous devez penser sur nous, qui sommes des dirigeants dans l’Église. Nous sommes les serviteurs de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Dieu nous a également confié un travail spécial. Nous devons expliquer son message aux gens pour qu’ils le comprennent. '
  '10':
  - type: text
    content: Nous sommes devenus comme des fous pour pouvoir servir Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Mais vous pensez que vous êtes sages parce que vous appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Nous semblons être des gens faibles, mais vous semblez être forts ! Les gens vous respectent, mais ils nous insultent !
  '11':
  - type: text
    content: 'Jusqu’à présent, nous avons toujours faim et soif. Nos vêtements sont devenus vieux. Parfois, les gens nous frappent sans raison. Nous n’avons pas nos propres maisons. '
  '12':
  - type: text
    content: 'Nous travaillons dur de nos propres mains, et nous devenons très fatigués. Lorsque les gens nous insultent, nous demandons à Dieu de les bénir. Lorsque les gens nous causent des problèmes, nous sommes patients et courageux. '
  '13':
  - type: text
    content: Lorsque les gens disent de mauvaises choses contre nous, nous répondons par des paroles aimables. Nous sommes devenus comme des choses sales que les gens jettent. C’est toujours vrai, même aujourd’hui.
  '14':
  - type: text
    content: Je n’écris pas ces choses pour vous faire honte. Vous êtes comme mes propres enfants que j’aime. Donc, je veux vous apprendre ce qui est bien.
  '15':
  - type: text
    content: Quand je vous ai annoncé la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', je suis devenu comme un père pour vous. Vous pouvez avoir 10 000 enseignants pour vous aider à comprendre le message concernant Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Mais je suis la seule personne qui soit comme un père pour vous. '
  '16':
  - type: text
    content: Voilà pourquoi je veux que vous puissiez copier mon exemple.
  '17':
  - type: text
    content: 'Pour vous aider à faire cela, j’ai envoyé Timothée vous rendre visite. Il est comme un fils pour moi et je l’aime beaucoup. Il continue de bien servir le '
  - type: text
    content: Seigneur
  - type: text
    content: . Il vous aidera à vous rappeler comment je vis en tant que chrétien. J’enseigne les mêmes choses à tous les groupes de chrétiens partout dans le monde.
  '18':
  - type: text
    content: 'Certaines personnes parmi vous sont devenues orgueilleuses. Elles pensent que je ne reviendrai jamais les avertir. '
  '19':
  - type: text
    content: 'Mais je reviendrai bientôt vous rendre visite, si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le veut. Ensuite, je verrai ce cas des gens orgueilleux. Ce ne sont pas seulement les mots qu’ils disent. Je vais découvrir s’ils ont la puissance de Dieu. '
  '2':
  - type: text
    content: Toute personne qui a ce genre de travail doit faire ce que son maître veut. C’est cela la chose importante.
  '20':
  - type: text
    content: 'Lorsque les gens servent Dieu comme roi, ils ont la puissance de Dieu. Ils ne disent pas seulement des paroles. '
  '21':
  - type: text
    content: Je viendrai et je découvrirai ce qui est vraiment vrai. Vous devez donc choisir. Faut‑il que je sois en colère et que je vous punisse ? Ou vais‑je dire des mots gentils pour montrer que je vous aime ? Que voulez‑vous que je fasse ?
  '3':
  - type: text
    content: 'Donc, ce que vous pensez de moi n’a pas d’importance pour moi. Ce que vous décidez, ou ce que tout chef humain décide, n’est pas important. Je n’essaie même pas de décider de moi‑même. '
  '4':
  - type: text
    content: 'Je suis sûr dans mon '
  - type: text
    content: esprit
  - type: text
    content: ' que je n’ai rien fait de mal. Mais cela ne me rend pas juste. Seul le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui‑même peut me juger. '
  '5':
  - type: text
    content: 'Donc, vous ne devez pas décider des choses avant que le moment vienne. Attendez que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' revienne. Il montrera tout clairement. Il montrera les mauvaises choses que les gens ont faites secrètement. Il montrera le but secret des pensées des gens. Alors Dieu glorifiera chaque personne d’une manière qui leur convient.'
  '6':
  - type: text
    content: 'Mes amis chrétiens, je veux vous aider à comprendre ces choses. C’est pourquoi j’ai utilisé Apollos et moi‑même comme exemples. Vous devez apprendre de nous ce que cela signifie : Obéissez à ce qui est écrit dans la Bible. Aucun de vous ne doit être fier d’un dirigeant et ne pas respecter un autre dirigeant. '
  '7':
  - type: text
    content: Ne pensez pas que vous êtes meilleurs que d’autres personnes. Vous avez reçu de Dieu tout ce que vous avez. Donc, vous n’avez aucune raison de vous vanter de ce que vous avez. Tout est don de Dieu !
  '8':
  - type: text
    content: Vous avez déjà tout ce dont vous avez besoin, n’est‑ce pas ? Vous pensez que vous êtes déjà très riches ! Vous êtes prêts à régner en tant que rois. Vous n’avez plus besoin de nous pour vous aider. Je pense que ce serait bien si vous étiez vraiment devenus rois. Ensuite, nous pourrions également régner avec vous !
  '9':
  - type: text
    content: 'Voici ce que je pense : En tant qu’'
  - type: text
    content: apôtres
  - type: text
    content: ', Dieu nous a mis au dernier rang de tous. Les gens nous voient comme si nous étions des prisonniers. Ils nous ont emmenés à mourir dans un lieu public. Tout le monde dans le monde est venu nous regarder, les gens comme les '
  - type: text
    content: anges
  - type: text
    content: .
