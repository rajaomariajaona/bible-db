document_id: MRK.10,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 10
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus enseigne sur les hommes qui renvoient leurs épouses du mariage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors Jésus a quitté cet endroit et il est allé en Judée. Et il est allé à l’Est du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: '. Beaucoup de gens sont encore venus à lui. Donc, il les enseignait comme il le faisait auparavant. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quand Jésus est entré dans la maison, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' lui ont encore demandé cela. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors Jésus leur a dit : Il peut arriver qu’un homme divorce d’avec sa femme. Mais s’il épouse une autre femme, il fait le péché d’adultère. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Et il peut arriver qu’une femme divorce d’avec son mari. Mais si elle épouse un autre homme, elle fait le péché d’adultère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus prie pour certains enfants
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les gens amenaient des enfants à Jésus. Ils voulaient que Jésus mette ses mains sur la tête de chaque enfant. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' les empêchaient. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais Jésus a vu cela, il était en colère. Jésus leur a dit : N’arrêtez pas les enfants. Qu’ils viennent à moi. Les gens doivent être comme ces enfants, afin que Dieu puisse régner dans leurs vies. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je vous dis la vérité. Quelqu’un peut vouloir Dieu diriger sa vie. Alors il doit être comme un enfant. Sinon, Dieu ne dirigera pas sa vie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Jésus a embrassé les enfants. Puis il a posé ses mains sur chacun d’eux et il a prié pour eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus rencontre un homme riche
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quand Jésus est allé, un homme a couru vers lui. Il s’est mis à genoux devant Jésus. Il a dit à Jésus : Bon Maître, que dois‑je faire pour que je puisse toujours vivre ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jésus lui a dit : Je voudrais savoir pourquoi tu m’appelles bon. Dieu Seul est bon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Et tu sais les commandements de Dieu. Ne tue pas quelqu’un. Ne couche pas avec une femme qui n’est pas ton épouse. Ne vole pas. Ne dis pas de choses qui ne sont pas vraies. Ne prends pas les choses d’autrui. Aime ton père et ta mère et obéis‑leur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' sont venus auprès de Jésus. Ils voulaient voir comment Jésus pourrait répondre à leur question. Ils ont demandé : Un homme peut renvoyer sa femme du mariage, et pour ne plus être sa femme ? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L’homme a répondu : Maître, j’ai fait toutes ces choses depuis que j’étais un jeune garçon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus a regardé l’homme et Jésus l’a aimé. Il lui a dit : Il y a encore autre chose que tu dois faire. Va, tu dois vendre tout ce que tu as. Donne l’argent aux pauvres. Ensuite, tu auras des choses précieuses dans la maison de Dieu (ciel). Et alors viens à moi. Sois mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: .
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Quand l’homme a entendu cela, il était triste. Il est parti tristement parce qu’il était un homme très riche. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus s’est retourné et il a dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Il est très difficile aux riches de laisser Dieu diriger leurs vies. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient très surpris par les paroles de Jésus. Alors Jésus leur a parlé de nouveau : Mes enfants, il est très difficile pour une personne riche de laisser Dieu diriger sa vie.'
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le trou dans une aiguille est très faible. Le gros animal appelé '
    - type: usfm
      marker: w
      children:
      - type: text
        text: chameau
    - type: text
      text: ' ne peut pas facilement passer par là. Mais il est encore plus difficile à une personne riche de laisser Dieu diriger sa vie. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Quand les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont entendu Jésus, ils étaient encore plus surpris. Et ils se disaient les uns aux autres : Peut‑être que Dieu ne sauvera personne ! '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jésus les a regardés et il a répondu : Il est impossible aux gens de le faire. Mais Dieu peut le faire. Dieu peut tout faire. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Pierre a dit à Jésus : Regarde ! Nous avons tout laissé pour devenir tes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus a dit :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis la vérité. Des gens ont laissé leurs maisons. Des gens ont laissé leurs frères ou sœurs. Des gens ont laissé leurs mères ou leurs pères. Des gens ont laissé leurs enfants ou leurs champs. Ils l’ont fait à cause de moi. Et ils l’ont fait à cause de la Bonne Nouvelle de Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus leur a répondu par une question. Qu’est‑ce que les règles que Moïse a écrites, disent à ce sujet ? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais Dieu donnera à ces gens beaucoup de choses à la place. Il les paiera 100 fois. Ils recevront des maisons, des frères et sœurs. Ils recevront des mères, des enfants et des champs. Mais dans ce monde, les gens seront contre eux. Dans le monde futur, ils vivront toujours. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Mais beaucoup de gens qui sont premiers (de grande importance) maintenant seront derniers (sans importance). Et les gens qui sont derniers maintenant seront les premiers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle encore de sa mort
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' marchaient le long de la route vers Jérusalem. Jésus marchait devant eux tous, et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient très surpris. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' qui suivaient derrière eux, avaient peur. Jésus a demandé à ses 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de se rapprocher de lui. Et il s’est mis à leur dire ce qui lui arrivera bientôt.'
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il leur a dit : Regardez ! Nous allons à Jérusalem. Là, quelqu’un va livrer le Fils de l’homme aux chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et aux enseignants de la loi de Dieu. Ces hommes vont décider de le faire mourir. Ensuite, ils le livreront aux gens qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ils se moqueront de lui. Ils cracheront sur lui. Ils le frapperont avec des bâtons. Ensuite, ils le tueront. Après 3 jours, il deviendra de nouveau vivant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacques et Jean demandent à Jésus de faire quelque chose pour eux
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jacques et Jean, qui étaient les fils de Zébédée, sont venus auprès de Jésus. Ils ont dit : Maître, nous voulons demander quelque chose. S’il te plaît, fais‑le pour nous. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Jésus leur a demandé : Que voulez‑vous que je fasse pour vous ? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ils lui ont dit : Quand tu seras dans ta gloire (Roi), nous voulons nous asseoir sur ton côté droit et sur ton côté gauche. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jésus leur a dit : Vous ne comprenez pas ce que vous demandez. Les gens vont me causer des souffrances. Elles seront comme une coupe avec un mauvais vin. Pouvez‑vous en boire aussi ? Elles seront aussi comme le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême
    - type: text
      text: ' que j’aurai à subir. Pouvez‑vous le subir aussi ? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Jacques et Jean ont dit : Oui, nous pouvons faire tout cela. Jésus leur a dit : Vous connaîtrez les mêmes souffrances que moi. Vous boirez la même coupe que moi. Vous subirez le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême
    - type: text
      text: ' que moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont dit : Moïse a dit qu’un homme pouvait écrire une lettre à sa femme. La lettre montrait que l’homme et la femme étaient maintenant séparés. Alors, l’homme pouvait renvoyer la femme du mariage. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Mais je ne peux pas vous donner les sièges sur mon côté droit ou mon côté gauche. Dieu a choisi ceux qui vont s’asseoir là. Il a préparé ces sièges pour eux. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Lorsque les 10 autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont su cela, ils étaient en colère contre Jacques et Jean. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Mais Jésus a demandé aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de venir. Jésus a dit : Vous savez les choses que les chefs des nations font. Ils exercent leur pouvoir sur les gens. Les grandes personnalités les dominent. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Mais vous ne devriez pas être comme ça. Celui qui veut être grand parmi vous sera votre serviteur. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Tout celui qui veut être la personne la plus importante doit travailler pour vous tous. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Même le Fils de l’homme est venu sur terre pour être un serviteur. Il n’est pas venu ici pour avoir des serviteurs qui doivent travailler pour lui. Il est venu mourir pour que beaucoup de gens puissent être libres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus aide un homme aveugle à voir
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Alors Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont arrivés à Jéricho. Après un temps, ils ont quitté Jéricho. Pendant ce temps, une grande foule les suivait. Un homme aveugle appelé Bartimée était assis au bord de la route. Il demandait aux gens de lui donner de l’argent. Il était le fils de Timée. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Bartimée a entendu que c’était Jésus de Nazareth qui passait. Alors, Bartimée criait : Jésus, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: '. S’il te plaît, aie pitié de moi ! '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Beaucoup de gens disaient à Bartimée d’être calme. Mais il criait encore plus fort qu’avant : Jésus, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: ', s’il te plaît, aie pitié de moi ! '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Jésus a arrêté de marcher et il a dit au peuple : Demandez à l’homme de venir ici. Alors le peuple a dit à l’aveugle : Sois courageux. Lève‑toi. Jésus te demande d’aller auprès de lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus leur a dit : Vous ne voulez pas obéir à Dieu. Voilà pourquoi Moïse vous a donné cette règle. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Alors, Bartimée a jeté son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: '. Il s’est levé et est venu auprès de Jésus. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'A cause de cela, Jésus a dit à Bartimée : Que veux‑tu que je fasse pour toi ? L’aveugle a dit à Jésus : Maître, je veux voir. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Jésus lui a dit : Va, tu es bien parce que tu as cru. Immédiatement, Bartimée pouvait voir et il suivait Jésus le long de la route.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais au début du monde, Dieu a fait l’homme et la femme. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ceci est la raison pour laquelle l’homme quitte son père et sa mère. Alors Dieu a uni l’homme et sa femme. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L’homme et sa femme deviennent comme une seule personne. Ils ne sont pas séparés, ils sont ensemble comme une seule personne. '
  '9':
  - type: usfm
    marker: p
    children:
