document_id: LUK.9,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 9
  - type: heading
    content: Jésus envoie les 12 disciples
  - type: text
    content: 'Jésus a demandé aux 12 '
  - type: text
    content: disciples
  - type: text
    content: ' de venir à lui. Puis il leur a donné le pouvoir de guérir des malades. Il leur a donné le pouvoir de chasser les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des personnes. '
  '10':
  - type: text
    content: 'Les 12 hommes que Jésus avait envoyés sont revenus de leurs voyages. Ils lui ont dit ce qu’ils avaient fait. Puis il les a emmenés loin de la foule, afin qu’il puisse être seul avec eux. Ils sont allés dans une ville appelée '
  - type: text
    content: Bethsaïda
  - type: text
    content: '. '
  '11':
  - type: text
    content: Mais les foules de gens ont découvert l’endroit où ils allaient. Alors ils sont allés pour voir Jésus. Quand Jésus a vu les foules venir, il les a bien reçues. Il leur a dit comment Dieu règne dans la vie de son peuple. Certaines personnes malades étaient là et il les a guéries.
  '12':
  - type: text
    content: 'Quand il était presque le soir, les 12 '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont venus auprès de lui. Ils disaient : Il n’y a pas de maisons en ce lieu. Renvoie la foule des gens maintenant, afin qu’ils puissent acheter de la nourriture. Il y a quelques villages et des fermes près d’ici. Peut‑être qu’ils peuvent dormir là. '
  '13':
  - type: text
    content: 'Jésus a dit : Donnez‑leur quelque chose à manger. Ils ont répondu : Mais nous avons seulement 5 pains et 2 poissons. Veux‑tu que nous allions acheter de la nourriture pour tous ces gens ? '
  '14':
  - type: text
    content: Il y avait environ 5 000 hommes dans la foule.
  - type: text
    content: 'Jésus a répondu : Dites‑leur de s’asseoir sur le sol par groupes. Il devrait y avoir environ 50 personnes dans chaque groupe.'
  '15':
  - type: text
    content: 'Alors ils ont fait cela. Lorsque les gens étaient assis, '
  '16':
  - type: text
    content: 'Jésus a pris les 5 pains et les 2 poissons. Puis il a levé les yeux vers le '
  - type: text
    content: ciel
  - type: text
    content: ' et il a remercié Dieu pour la nourriture. Jésus a coupé les pains en morceaux. Et il les a donnés aux 12 '
  - type: text
    content: disciples
  - type: text
    content: '. Il a dit : Donnez‑les à tout le peuple. '
  '17':
  - type: text
    content: Tout le monde a mangé et ils avaient tous assez. Ensuite, ils ont ramassé tous les aliments qui sont restés. Ils ont rempli 12 paniers avec cela.
  - type: heading
    content: Pierre dit qui est Jésus
  '18':
  - type: text
    content: 'Jésus était seul et il était en prière. Les 12 '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont venus auprès de lui. Jésus leur a demandé : Qu’est‑ce que les gens disent de moi ? Qui suis‑je selon eux ?'
  '19':
  - type: text
    content: 'Ils ont répondu : Beaucoup de gens disent que tu es Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: . Certaines personnes disent que tu es Élie. D’autres personnes disent que tu es l’un des serviteurs de Dieu, d’il y a longtemps. Ils disent qu’il est redevenu vivant.
  '2':
  - type: text
    content: 'Puis il les a envoyés dire la Parole de Dieu à d’autres personnes. Il leur a dit aussi de guérir des malades. '
  '20':
  - type: text
    content: 'Jésus leur a ensuite demandé : Que pensez‑vous ? Qui suis‑je selon vous ? Pierre a répondu : Tu es le '
  - type: text
    content: Messie
  - type: text
    content: . Dieu t’a envoyé.
  '21':
  - type: text
    content: 'Jésus leur a dit : Ecoutez ! Ne dites à personne que je suis le '
  - type: text
    content: Messie
  - type: text
    content: . Il a dit cela très fortement.
  '22':
  - type: text
    content: 'Jésus a continué à dire : le Fils de l’homme va beaucoup souffrir. Les '
  - type: text
    content: anciens
  - type: text
    content: ' seront contre lui. Les '
  - type: text
    content: prêtres
  - type: text
    content: ' importants et les enseignants de la loi de Dieu ne vont pas non plus l’accepter. Ils vont le tuer, mais 3 jours plus tard, Dieu le fera vivre à nouveau.'
  '23':
  - type: text
    content: 'Alors Jésus a parlé à tous les gens qui étaient là. Il leur a dit : Peut‑être que quelqu’un veut m’obéir. Cette personne doit dire non à ce qu’elle veut pour elle‑même dans cette vie. Elle doit vivre chaque jour comme une personne qui n’a qu’un seul jour à vivre. Elle doit m’obéir et elle doit devenir comme moi.'
  '24':
  - type: text
    content: 'Après tout, celui qui veut garder sa vie la perdra. Mais celui qui donne sa vie pour moi la sauvera. '
  '25':
  - type: text
    content: 'Peut‑être que vous voulez obtenir le monde entier et tout ce qui est en lui. Vous pouvez le faire, mais vous vous perdrez vous‑mêmes. Ensuite, vous n’aurez rien du tout. Vous serez vous‑mêmes détruits à la fin. '
  '26':
  - type: text
    content: 'Peut‑être que vous avez maintenant honte de moi et de mes paroles. Si vous avez honte, j’aurai aussi honte de vous. Je vais avoir honte de vous quand je reviendrai. Quand je viendrai encore, tout le monde va me voir. Je serai avec une grande puissance et beauté comme mon Père Dieu est. Les bons '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu seront avec moi, aussi. Ils seront aussi puissants et beaux.'
  - type: heading
    content: Jésus change sa forme et il rencontre Moïse et Élie
  '27':
  - type: text
    content: 'Jésus a dit : Ecoutez ! Certaines gens qui sont debout ici vont bientôt voir comment Dieu règne. Ils verront cela avant qu’ils ne meurent. Ils verront cela vraiment.'
  '28':
  - type: text
    content: 'Jésus a dit ces paroles il y a environ 8 jours. Après cela, Jésus est monté sur la montagne pour prier. Et il a pris Pierre, Jean et Jacques avec lui. '
  '29':
  - type: text
    content: 'Pendant qu’il priait, son visage a changé. Ses vêtements sont également devenus très blancs et brillants. '
  '3':
  - type: text
    content: 'Il a dit : Quand vous allez, ne prenez rien pour votre voyage. Ne prenez pas un bâton, ni un sac ni de la nourriture. Ne prenez pas de l’argent ou 2 vêtements.'
  '30':
  - type: text
    content: Alors 2 hommes sont apparus et ils parlaient avec lui. C’étaient Moïse et Élie.
  '31':
  - type: text
    content: Moïse et Élie avaient l’air très grand et beau. Ils parlaient avec Jésus sur la façon dont il mourra bientôt à Jérusalem.
  '32':
  - type: text
    content: 'Pendant que cela se passait, Pierre était très fatigué à cause du sommeil. Et ceux qui étaient avec lui étaient très fatigués aussi. Ensuite, ils se sont vraiment réveillés et ils ont vu Jésus. Jésus avait l’air très grand et beau. Ils ont également vu les 2 hommes qui se tenaient près de lui. '
  '33':
  - type: text
    content: 'Alors les 2 hommes ont commencé à quitter. Ainsi, Pierre a parlé à Jésus. Il a dit : Maître, il est très bon que nous soyons ici. Nous devrions construire 3 tentes. Une tente sera pour toi, une tente pour Moïse et une tente pour Élie. Il ne savait pas vraiment ce qu’il disait.'
  '34':
  - type: text
    content: 'Pendant que Pierre parlait, un nuage est apparu. Et les a tous couverts. Quand le nuage les couvrait, ils avaient peur. '
  '35':
  - type: text
    content: 'Puis ils ont entendu une voix du nuage. La voix disait : Celui‑ci est mon Fils. Je l’ai choisi. Alors écoutez‑le.'
  '36':
  - type: text
    content: La voix a cessé de parler. Ensuite, les 3 hommes ont vu qu’ils étaient seuls avec Jésus. Ils n’ont dit à personne ce qu’ils avaient vu.
  - type: heading
    content: Jésus guérit un garçon
  '37':
  - type: text
    content: 'Le lendemain, Jésus et les 3 hommes qui étaient avec lui sont descendus de la montagne. Une grande foule l’a rencontré. '
  '38':
  - type: text
    content: 'Puis un homme de la foule a crié à Jésus : Maître, s’il te plaît, je te demande d’être gentil envers mon enfant. Il est mon seul enfant. '
  '39':
  - type: text
    content: 'Parfois, un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' le tient rapidement et il crie. L’'
  - type: text
    content: esprit
  - type: text
    content: ' l’agite avec force d’une façon ou d’une autre. Pendant ce temps, la salive sort aussi de sa bouche. Quand l’'
  - type: text
    content: esprit
  - type: text
    content: ' le quitte à la fin, il le laisse sans force.'
  '4':
  - type: text
    content: 'Trouvez une maison où les gens dedans sont heureux de vous recevoir. Restez dans cette maison tout le temps que vous visitez les gens dans cette ville. '
  '40':
  - type: text
    content: 'J’ai demandé à ceux qui te suivent de chasser le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' de lui. Mais ils ne pouvaient pas le faire.'
  '41':
  - type: text
    content: 'Jésus a dit à la foule : Vous les gens d’aujourd’hui, vous ne croyez pas en Dieu, vous vous êtes détournés de lui. J’ai déjà été avec vous depuis longtemps. Mais vous ne croyez toujours pas en lui. Il est difficile d’être patient avec vous. Puis il a dit à l’homme : Amène ton fils ici.'
  '42':
  - type: text
    content: 'Quand il lui a emmené le garçon, le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' l’a jeté au sol. Il a fait bouger le garçon fortement. Jésus a dit à l’'
  - type: text
    content: esprit
  - type: text
    content: '  : Arrête ! Il a ensuite guéri le garçon. Et puis, il l’a rendu à son père.'
  '43':
  - type: text
    content: Tous les gens étaient très surpris de ce qu’ils ont vu. Ils savaient que Dieu est très puissant.
  - type: heading
    content: Jésus parle de nouveau de sa mort
  - type: text
    content: 'Les gens pensaient encore à tout ce que Jésus faisait. Puis Jésus a commencé à parler à ses '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '44':
  - type: text
    content: 'Il disait : Soyez prudents. Et n’oubliez pas ce que je vous dis. Quelqu’un va livrer le fils de l’homme à des hommes puissants pour le tuer. '
  '45':
  - type: text
    content: 'Mais ils ne comprenaient pas ce qu’il leur disait. C’était encore un secret, donc ils ne pouvaient pas comprendre ses paroles. Mais ils avaient peur de lui demander : Que veux‑tu dire ?'
  - type: heading
    content: Qui sera le plus important ?
  '46':
  - type: text
    content: 'Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus commençaient à discuter les uns avec les autres : Qui de nous est le plus important ?'
  '47':
  - type: text
    content: 'Jésus savait ce qu’ils pensaient. Donc, il a pris un petit enfant. Il a mis l’enfant debout à côté de lui. '
  '48':
  - type: text
    content: 'Il a dit : Si quelqu’un accepte cet enfant à cause de moi, il m’accepte. Et il accepte aussi celui qui m’a envoyé. Après tout, celui qui se fait le moins important est vraiment le plus grand.'
  '49':
  - type: text
    content: 'Jean a alors dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous avons vu un homme. Il parlait à des gens qui avaient de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' en eux. Il disait : Sortez au nom de Jésus. Nous avons dit à l’homme qu’il ne doit pas le faire. Nous avons dit cela, parce qu’il n’est pas de notre groupe.'
  '5':
  - type: text
    content: Dans certaines villes, les gens ne seront pas heureux de vous voir. Ils n’ont pas cru au message que Dieu leur avait envoyé. Lorsque vous les quittez, nettoyez la saleté de cette ville de vos pieds. Cela leur montre qu’ils n’ont pas cru au message.
  '50':
  - type: text
    content: 'Jésus lui a dit : Ne l’arrêtez pas. Si quelqu’un n’est pas contre vous, il travaille avec vous.'
  - type: heading
    content: Les gens dans un village de Samarie n’acceptent pas Jésus
  '51':
  - type: text
    content: 'Le temps passait et bientôt Jésus retournera à Dieu. Il le savait, alors il a commencé à aller à Jérusalem. '
  '52':
  - type: text
    content: Il est arrivé près d’un village de Samarie. Puis il a envoyé des gens au village avec un message. Ils sont allés demander un endroit pour passer la nuit.
  '53':
  - type: text
    content: 'Mais les gens du village ne leur ont pas permis de rester là‑bas. Ceci parce qu’il allait à Jérusalem. '
  '54':
  - type: text
    content: 'Alors Jacques et Jean ont entendu ce qui était arrivé. Ils ont demandé : Jésus, veux‑tu que nous demandions à Dieu d’envoyer le feu du '
  - type: text
    content: ciel
  - type: text
    content: '  ? Veux‑tu que nous tuons ces gens ?'
  '55':
  - type: text
    content: 'Jésus s’est retourné. Il a dit : Non ! Ne le faites pas. Ce serait très mauvais. '
  '56':
  - type: text
    content: Alors ils sont tous allés à un autre village.
  - type: heading
    content: Ce qu’il coûte pour obéir à Jésus
  '57':
  - type: text
    content: 'Quand ils ont continué leur voyage, un homme a parlé à Jésus : Je te suivrai. Et je vais aller là où tu vas.'
  '58':
  - type: text
    content: 'Jésus a répondu : Les animaux sauvages ont un endroit pour dormir. Les oiseaux sauvages ont également leurs propres lieux de vie. Mais moi, le Fils de l’homme, je n’ai aucune place fixe pour me coucher et me reposer.'
  '59':
  - type: text
    content: 'Jésus a alors dit à un autre homme : Suis‑moi ! L’homme a répondu : D’abord, laisse‑moi rentrer à la maison et enterrer mon père. Ensuite, je vais te suivre.'
  '6':
  - type: text
    content: 'Ensuite, les 12 '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont allés. Pendant qu’ils allaient d’un village à un autre, ils parlaient à tout le peuple. Ils leur disaient la Bonne Nouvelle au sujet de Jésus, et ils guérissaient beaucoup de malades.'
  - type: heading
    content: Un chef entend parler de Jésus
  '60':
  - type: text
    content: 'Jésus lui a dit : Non ! Laisse les morts enterrer leurs morts. Toi, vas. Et dis aux autres sur le '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: .
  '61':
  - type: text
    content: 'Un autre homme a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je vais te suivre. Mais s’il te plaît, laisse‑moi aller d’abord dire au revoir à ma famille.'
  '62':
  - type: text
    content: 'Jésus a répondu : Un homme qui laboure un champ doit continuer à regarder devant lui. S’il regarde derrière lui, il ne peut pas labourer bien. Tu es comme un homme qui veut regarder derrière lui. Des gens comme ça ne peuvent pas montrer aux autres comment Dieu vraiment les dirige.'
  '7':
  - type: text
    content: 'Le Roi Hérode a entendu des rapports sur tout ce qui se passait. Il n’était plus tranquille, parce que les gens disaient des choses différentes à propos de Jésus. Certains disaient :'
  - type: text
    content: Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' est revenu à la vie.'
  '8':
  - type: text
    content: 'D’autres disaient : C’est Élie qui est revenu. D’autres encore disaient : Il est l’un des serviteurs de Dieu qui sont morts, il y a longtemps. Il est vivant de nouveau et il dit les messages du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: .
  '9':
  - type: text
    content: 'Hérode a dit : Mes soldats avaient tué Jean. Ils avaient coupé la tête de Jean. Alors, qui est cet homme ? J’entends des histoires étranges sur lui. Donc, il a essayé de rencontrer Jésus.'
  - type: heading
    content: Jésus nourrit 5 000 hommes et leurs familles
