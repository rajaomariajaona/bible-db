document_id: LUK.9,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 9
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus envoie les 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus a demandé aux 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de venir à lui. Puis il leur a donné le pouvoir de guérir des malades. Il leur a donné le pouvoir de chasser les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des personnes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les 12 hommes que Jésus avait envoyés sont revenus de leurs voyages. Ils lui ont dit ce qu’ils avaient fait. Puis il les a emmenés loin de la foule, afin qu’il puisse être seul avec eux. Ils sont allés dans une ville appelée '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bethsaïda
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais les foules de gens ont découvert l’endroit où ils allaient. Alors ils sont allés pour voir Jésus. Quand Jésus a vu les foules venir, il les a bien reçues. Il leur a dit comment Dieu règne dans la vie de son peuple. Certaines personnes malades étaient là et il les a guéries.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Quand il était presque le soir, les 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus sont venus auprès de lui. Ils disaient : Il n’y a pas de maisons en ce lieu. Renvoie la foule des gens maintenant, afin qu’ils puissent acheter de la nourriture. Il y a quelques villages et des fermes près d’ici. Peut‑être qu’ils peuvent dormir là. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jésus a dit : Donnez‑leur quelque chose à manger. Ils ont répondu : Mais nous avons seulement 5 pains et 2 poissons. Veux‑tu que nous allions acheter de la nourriture pour tous ces gens ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il y avait environ 5 000 hommes dans la foule.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Dites‑leur de s’asseoir sur le sol par groupes. Il devrait y avoir environ 50 personnes dans chaque groupe.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors ils ont fait cela. Lorsque les gens étaient assis, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jésus a pris les 5 pains et les 2 poissons. Puis il a levé les yeux vers le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et il a remercié Dieu pour la nourriture. Jésus a coupé les pains en morceaux. Et il les a donnés aux 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Il a dit : Donnez‑les à tout le peuple. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tout le monde a mangé et ils avaient tous assez. Ensuite, ils ont ramassé tous les aliments qui sont restés. Ils ont rempli 12 paniers avec cela.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre dit qui est Jésus
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jésus était seul et il était en prière. Les 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus sont venus auprès de lui. Jésus leur a demandé : Qu’est‑ce que les gens disent de moi ? Qui suis‑je selon eux ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils ont répondu : Beaucoup de gens disent que tu es Jean‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: . Certaines personnes disent que tu es Élie. D’autres personnes disent que tu es l’un des serviteurs de Dieu, d’il y a longtemps. Ils disent qu’il est redevenu vivant.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Puis il les a envoyés dire la Parole de Dieu à d’autres personnes. Il leur a dit aussi de guérir des malades. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jésus leur a ensuite demandé : Que pensez‑vous ? Qui suis‑je selon vous ? Pierre a répondu : Tu es le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: . Dieu t’a envoyé.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus leur a dit : Ecoutez ! Ne dites à personne que je suis le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: . Il a dit cela très fortement.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus a continué à dire : le Fils de l’homme va beaucoup souffrir. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' seront contre lui. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' importants et les enseignants de la loi de Dieu ne vont pas non plus l’accepter. Ils vont le tuer, mais 3 jours plus tard, Dieu le fera vivre à nouveau.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors Jésus a parlé à tous les gens qui étaient là. Il leur a dit : Peut‑être que quelqu’un veut m’obéir. Cette personne doit dire non à ce qu’elle veut pour elle‑même dans cette vie. Elle doit vivre chaque jour comme une personne qui n’a qu’un seul jour à vivre. Elle doit m’obéir et elle doit devenir comme moi.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Après tout, celui qui veut garder sa vie la perdra. Mais celui qui donne sa vie pour moi la sauvera. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Peut‑être que vous voulez obtenir le monde entier et tout ce qui est en lui. Vous pouvez le faire, mais vous vous perdrez vous‑mêmes. Ensuite, vous n’aurez rien du tout. Vous serez vous‑mêmes détruits à la fin. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Peut‑être que vous avez maintenant honte de moi et de mes paroles. Si vous avez honte, j’aurai aussi honte de vous. Je vais avoir honte de vous quand je reviendrai. Quand je viendrai encore, tout le monde va me voir. Je serai avec une grande puissance et beauté comme mon Père Dieu est. Les bons '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu seront avec moi, aussi. Ils seront aussi puissants et beaux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus change sa forme et il rencontre Moïse et Élie
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jésus a dit : Ecoutez ! Certaines gens qui sont debout ici vont bientôt voir comment Dieu règne. Ils verront cela avant qu’ils ne meurent. Ils verront cela vraiment.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jésus a dit ces paroles il y a environ 8 jours. Après cela, Jésus est monté sur la montagne pour prier. Et il a pris Pierre, Jean et Jacques avec lui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Pendant qu’il priait, son visage a changé. Ses vêtements sont également devenus très blancs et brillants. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il a dit : Quand vous allez, ne prenez rien pour votre voyage. Ne prenez pas un bâton, ni un sac ni de la nourriture. Ne prenez pas de l’argent ou 2 vêtements.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Alors 2 hommes sont apparus et ils parlaient avec lui. C’étaient Moïse et Élie.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Moïse et Élie avaient l’air très grand et beau. Ils parlaient avec Jésus sur la façon dont il mourra bientôt à Jérusalem.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Pendant que cela se passait, Pierre était très fatigué à cause du sommeil. Et ceux qui étaient avec lui étaient très fatigués aussi. Ensuite, ils se sont vraiment réveillés et ils ont vu Jésus. Jésus avait l’air très grand et beau. Ils ont également vu les 2 hommes qui se tenaient près de lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Alors les 2 hommes ont commencé à quitter. Ainsi, Pierre a parlé à Jésus. Il a dit : Maître, il est très bon que nous soyons ici. Nous devrions construire 3 tentes. Une tente sera pour toi, une tente pour Moïse et une tente pour Élie. Il ne savait pas vraiment ce qu’il disait.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Pendant que Pierre parlait, un nuage est apparu. Et les a tous couverts. Quand le nuage les couvrait, ils avaient peur. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Puis ils ont entendu une voix du nuage. La voix disait : Celui‑ci est mon Fils. Je l’ai choisi. Alors écoutez‑le.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: La voix a cessé de parler. Ensuite, les 3 hommes ont vu qu’ils étaient seuls avec Jésus. Ils n’ont dit à personne ce qu’ils avaient vu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit un garçon
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Le lendemain, Jésus et les 3 hommes qui étaient avec lui sont descendus de la montagne. Une grande foule l’a rencontré. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Puis un homme de la foule a crié à Jésus : Maître, s’il te plaît, je te demande d’être gentil envers mon enfant. Il est mon seul enfant. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Parfois, un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' le tient rapidement et il crie. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' l’agite avec force d’une façon ou d’une autre. Pendant ce temps, la salive sort aussi de sa bouche. Quand l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' le quitte à la fin, il le laisse sans force.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Trouvez une maison où les gens dedans sont heureux de vous recevoir. Restez dans cette maison tout le temps que vous visitez les gens dans cette ville. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'J’ai demandé à ceux qui te suivent de chasser le mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' de lui. Mais ils ne pouvaient pas le faire.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jésus a dit à la foule : Vous les gens d’aujourd’hui, vous ne croyez pas en Dieu, vous vous êtes détournés de lui. J’ai déjà été avec vous depuis longtemps. Mais vous ne croyez toujours pas en lui. Il est difficile d’être patient avec vous. Puis il a dit à l’homme : Amène ton fils ici.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Quand il lui a emmené le garçon, le mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' l’a jeté au sol. Il a fait bouger le garçon fortement. Jésus a dit à l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: '  : Arrête ! Il a ensuite guéri le garçon. Et puis, il l’a rendu à son père.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Tous les gens étaient très surpris de ce qu’ils ont vu. Ils savaient que Dieu est très puissant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de nouveau de sa mort
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens pensaient encore à tout ce que Jésus faisait. Puis Jésus a commencé à parler à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Il disait : Soyez prudents. Et n’oubliez pas ce que je vous dis. Quelqu’un va livrer le fils de l’homme à des hommes puissants pour le tuer. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Mais ils ne comprenaient pas ce qu’il leur disait. C’était encore un secret, donc ils ne pouvaient pas comprendre ses paroles. Mais ils avaient peur de lui demander : Que veux‑tu dire ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qui sera le plus important ?
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus commençaient à discuter les uns avec les autres : Qui de nous est le plus important ?'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Jésus savait ce qu’ils pensaient. Donc, il a pris un petit enfant. Il a mis l’enfant debout à côté de lui. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Il a dit : Si quelqu’un accepte cet enfant à cause de moi, il m’accepte. Et il accepte aussi celui qui m’a envoyé. Après tout, celui qui se fait le moins important est vraiment le plus grand.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Jean a alors dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', nous avons vu un homme. Il parlait à des gens qui avaient de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' en eux. Il disait : Sortez au nom de Jésus. Nous avons dit à l’homme qu’il ne doit pas le faire. Nous avons dit cela, parce qu’il n’est pas de notre groupe.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dans certaines villes, les gens ne seront pas heureux de vous voir. Ils n’ont pas cru au message que Dieu leur avait envoyé. Lorsque vous les quittez, nettoyez la saleté de cette ville de vos pieds. Cela leur montre qu’ils n’ont pas cru au message.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Jésus lui a dit : Ne l’arrêtez pas. Si quelqu’un n’est pas contre vous, il travaille avec vous.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les gens dans un village de Samarie n’acceptent pas Jésus
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Le temps passait et bientôt Jésus retournera à Dieu. Il le savait, alors il a commencé à aller à Jérusalem. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Il est arrivé près d’un village de Samarie. Puis il a envoyé des gens au village avec un message. Ils sont allés demander un endroit pour passer la nuit.
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Mais les gens du village ne leur ont pas permis de rester là‑bas. Ceci parce qu’il allait à Jérusalem. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Alors Jacques et Jean ont entendu ce qui était arrivé. Ils ont demandé : Jésus, veux‑tu que nous demandions à Dieu d’envoyer le feu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '  ? Veux‑tu que nous tuons ces gens ?'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Jésus s’est retourné. Il a dit : Non ! Ne le faites pas. Ce serait très mauvais. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Alors ils sont tous allés à un autre village.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ce qu’il coûte pour obéir à Jésus
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Quand ils ont continué leur voyage, un homme a parlé à Jésus : Je te suivrai. Et je vais aller là où tu vas.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Jésus a répondu : Les animaux sauvages ont un endroit pour dormir. Les oiseaux sauvages ont également leurs propres lieux de vie. Mais moi, le Fils de l’homme, je n’ai aucune place fixe pour me coucher et me reposer.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Jésus a alors dit à un autre homme : Suis‑moi ! L’homme a répondu : D’abord, laisse‑moi rentrer à la maison et enterrer mon père. Ensuite, je vais te suivre.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ensuite, les 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus sont allés. Pendant qu’ils allaient d’un village à un autre, ils parlaient à tout le peuple. Ils leur disaient la Bonne Nouvelle au sujet de Jésus, et ils guérissaient beaucoup de malades.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un chef entend parler de Jésus
    marker-yv: yv-h
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Jésus lui a dit : Non ! Laisse les morts enterrer leurs morts. Toi, vas. Et dis aux autres sur le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: .
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Un autre homme a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je vais te suivre. Mais s’il te plaît, laisse‑moi aller d’abord dire au revoir à ma famille.'
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Jésus a répondu : Un homme qui laboure un champ doit continuer à regarder devant lui. S’il regarde derrière lui, il ne peut pas labourer bien. Tu es comme un homme qui veut regarder derrière lui. Des gens comme ça ne peuvent pas montrer aux autres comment Dieu vraiment les dirige.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le Roi Hérode a entendu des rapports sur tout ce qui se passait. Il n’était plus tranquille, parce que les gens disaient des choses différentes à propos de Jésus. Certains disaient :'
  - type: usfm
    marker: m
    children:
    - type: text
      text: Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' est revenu à la vie.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'D’autres disaient : C’est Élie qui est revenu. D’autres encore disaient : Il est l’un des serviteurs de Dieu qui sont morts, il y a longtemps. Il est vivant de nouveau et il dit les messages du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hérode a dit : Mes soldats avaient tué Jean. Ils avaient coupé la tête de Jean. Alors, qui est cet homme ? J’entends des histoires étranges sur lui. Donc, il a essayé de rencontrer Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus nourrit 5 000 hommes et leurs familles
    marker-yv: yv-h
