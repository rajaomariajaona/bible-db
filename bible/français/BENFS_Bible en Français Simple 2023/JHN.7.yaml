document_id: JHN.7,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 7
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus et ses frères
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Jésus a visité de nombreux endroits en Galilée. Il ne voulait pas se rendre en Judée : les dirigeants des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' voulaient le tuer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelque temps après, ses frères sont partis. Jésus est allé à la fête aussi. Mais il n’a pas fait savoir cela aux gens. Il est allé secrètement. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' le cherchaient à la fête. Ils ont demandé : Où est cet homme ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De différentes personnes parlaient dans la foule. Certaines personnes disaient : Jésus est un homme bon. Mais d’autres personnes disaient : Non, il dit des choses qui perdent les gens. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais personne ne parlait fortement autour de lui. Ils avaient peur des dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au milieu de la fête, Jésus est allé au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Il a commencé à y enseigner. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' étaient très surpris. Ils ont demandé : Comment cet homme connaît tellement les Écritures ? Il n’a pas appris dans nos écoles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Ce que j’enseigne ne vient pas de moi. Non, ça vient de celui qui m’a envoyé. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le monde peut choisir de faire ce que Dieu veut. Ces gens vont savoir ce que j’enseigne. Ils sauront si ça vient de Dieu. Et ils sauront si ça vient de mes propres pensées. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une personne qui enseigne ses propres idées veut que les gens pensent de grandes choses sur elle. Mais une personne qui veut montrer de grandes choses à propos de quelqu’un d’autre est différente. Une pareille personne veut que les gens pensent de grandes choses au sujet de celui qui l’a envoyé. Une telle personne est honnête. Il n’y a rien de faux en elle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse vous a donné les règles de Dieu. Mais pas un d’entre vous n’obéit à ces règles. Pourquoi essayez‑vous de me tuer ?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était presque temps pour la fête des Tabernacles des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule a répondu : Tu as un démon. Qui essaie de te tuer ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : J’ai fait un miracle le jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: '. Vous êtes tous surpris. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous allez '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: ' un garçon le jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: '. Moïse vous a dit que vous devez '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: ' vos fils. Voilà pourquoi vous le ferez. Vos ancêtres l’ont fait avant même la naissance de Moïse. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous allez '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: ' un garçon le jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ', afin que vous obéissiez aux règles de Moïse. Donc, vous ne devriez pas être en colère contre moi, parce que j’ai guéri un homme le jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne jugez pas sur les choses à cause de ce qu’elles semblent être. Au lieu de cela, jugez les choses à cause de ce qui est juste.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les gens cherchent à savoir si Jésus est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines personnes à Jérusalem ont commencé à dire : Voilà l’homme que les dirigeants veulent tuer. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais regardez ! Il parle à la foule. Et les dirigeants ne lui disent rien ! Peut‑être qu’ils pensent qu’il est vraiment le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '  ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais nous savons d’où il est venu. Quand le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' viendra, personne ne saura. Personne ne saura d’où il est venu.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus enseignait dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Il criait : Oui, vous me connaissez. Et vous savez d’où je viens. Je ne suis pas venu parce que je me suis décidé de venir. Celui qui m’a envoyé est vrai. Vous ne le connaissez pas. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais je le connais, parce que je suis venu de lui. Il m’a envoyé. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les frères de Jésus lui ont dit : Tu dois quitter cet endroit et aller en Judée. Ensuite, tes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' pourront voir les grandes choses que tu fais. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont entendu cela. Ils voulaient l’attraper. Mais personne ne l’a attrapé. Ce n’était pas le bon moment. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais beaucoup de gens dans la foule ont cru en lui. Ils disaient : Cet homme a fait beaucoup de miracles. Nous ne savons pas si le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' fera de même quand il viendra !'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont entendu ce que la foule disait au sujet de Jésus. Ensuite, les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont envoyé des soldats l’attraper. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Je serai avec vous pour seulement une courte période. Ensuite, je vais aller à celui qui m’a envoyé. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous me chercherez, mais vous ne me trouverez pas. Vous ne pouvez pas aller à l’endroit où je serai. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' se demandaient : Qu’est‑ce qu’il essaie de nous dire ? Où peut‑il aller pour que nous ne puissions pas le trouver ? Peut‑être qu’il ira parmi nos gens qui vivent chez les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Grecs
    - type: text
      text: '. Peut‑être qu’il ira enseigner les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Grecs
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit : Vous me chercherez, mais vous ne me trouverez pas. Et il a dit : Vous ne pouvez pas aller à l’endroit où je serai. Que veut‑il dire ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les cours d’eau qui font vivre les gens
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le dernier jour de la fête a été le jour le plus important. Ce jour‑là, Jésus s’est levé. Il a parlé d’une voix forte. Il a dit : Si quelqu’un a soif, qu’il vienne à moi pour boire. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il est dit dans l’Ancien Testament : Les cours d’eau sortiront de l’intérieur des gens qui croient en moi. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus parlait de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu, qui viendra aux gens un peu de temps après. Ces gens qui ont cru en Jésus recevront alors l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Mais Dieu n’a pas encore donné son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ', parce qu’il n’a pas encore ressuscité Jésus. Il ne l’a pas encore ressuscité, afin qu’il puisse être au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' avec lui.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les gens se disputent
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne ne fait les choses en secret s’il veut que tout le monde le connaisse. Tu fais ces choses, tu dois donc te montrer à tout le monde. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines des personnes dans la foule ont entendu Jésus dire ces paroles. Puis ces gens ont dit : Cet homme est vraiment le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' que nous attendions ! '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres personnes disaient : Cet homme est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Mais certaines personnes disaient : le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' ne viendra pas de Galilée ! '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Ancien Testament dit que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' viendra de la famille du roi David. Il viendra de Bethléem, la ville où David a vécu. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, la foule n’a pas pu se mettre d’accord au sujet de Jésus. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines personnes voulaient l’attraper. Mais personne ne l’a attrapé. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats sont revenus aux chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: '. Ils ont demandé aux soldats : Pourquoi ne l’avez‑vous pas amené ici ? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats ont répondu : Personne n’a jamais parlé comme cet homme parle. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont répondu : Vous semblez croire aussi à ces fausses choses ! '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ou des dirigeants ne croit en lui. Assurément, vous le savez ! '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais cette foule ne connaît pas les règles de Moïse. Donc, Dieu permettra que de très mauvaises choses leur arrivent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Même ses propres frères ne croyaient pas en lui. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nicodème était l’un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: '. Il était l’homme qui était allé voir Jésus avant. Il a dit aux autres personnes : '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nos règles disent que nous devons écouter un homme d’abord. Nous devons savoir d’abord ce qu’il a fait. Alors seulement nous pouvons le juger. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont répondu : Peut‑être que tu viens de la Galilée aussi ! Vois les Écritures (Ancien Testament). Tu comprendras qu’aucun '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' ne peut venir de Galilée. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors tout le monde est allé à sa propre maison.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a répondu : Ce n’est pas encore le bon moment pour moi. Mais tout moment est bon pour vous. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens qui appartiennent à ce monde ne peuvent pas vous haïr. Mais ils me haïssent. Les choses qu’ils font, sont fausses. Et je montre que ces choses sont fausses. Voilà pourquoi ils me haïssent. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous allez à la fête. Je ne vais pas là, ce n’est pas le bon moment pour moi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus a dit cela, puis il est resté en Galilée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus va à la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fête des Tabernacles
    marker-yv: yv-h
