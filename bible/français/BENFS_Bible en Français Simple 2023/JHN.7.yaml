document_id: JHN.7,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 7
  - type: heading
    content: Jésus et ses frères
  - type: text
    content: 'Après cela, Jésus a visité de nombreux endroits en Galilée. Il ne voulait pas se rendre en Judée : les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' voulaient le tuer. '
  '10':
  - type: text
    content: 'Quelque temps après, ses frères sont partis. Jésus est allé à la fête aussi. Mais il n’a pas fait savoir cela aux gens. Il est allé secrètement. '
  '11':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' le cherchaient à la fête. Ils ont demandé : Où est cet homme ? '
  '12':
  - type: text
    content: 'De différentes personnes parlaient dans la foule. Certaines personnes disaient : Jésus est un homme bon. Mais d’autres personnes disaient : Non, il dit des choses qui perdent les gens. '
  '13':
  - type: text
    content: 'Mais personne ne parlait fortement autour de lui. Ils avaient peur des dirigeants '
  - type: text
    content: juifs
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Au milieu de la fête, Jésus est allé au '
  - type: text
    content: Temple
  - type: text
    content: '. Il a commencé à y enseigner. '
  '15':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' étaient très surpris. Ils ont demandé : Comment cet homme connaît tellement les Écritures ? Il n’a pas appris dans nos écoles. '
  '16':
  - type: text
    content: 'Jésus a répondu : Ce que j’enseigne ne vient pas de moi. Non, ça vient de celui qui m’a envoyé. '
  '17':
  - type: text
    content: 'Tout le monde peut choisir de faire ce que Dieu veut. Ces gens vont savoir ce que j’enseigne. Ils sauront si ça vient de Dieu. Et ils sauront si ça vient de mes propres pensées. '
  '18':
  - type: text
    content: 'Une personne qui enseigne ses propres idées veut que les gens pensent de grandes choses sur elle. Mais une personne qui veut montrer de grandes choses à propos de quelqu’un d’autre est différente. Une pareille personne veut que les gens pensent de grandes choses au sujet de celui qui l’a envoyé. Une telle personne est honnête. Il n’y a rien de faux en elle. '
  '19':
  - type: text
    content: Moïse vous a donné les règles de Dieu. Mais pas un d’entre vous n’obéit à ces règles. Pourquoi essayez‑vous de me tuer ?
  '2':
  - type: text
    content: 'C’était presque temps pour la fête des Tabernacles des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'La foule a répondu : Tu as un démon. Qui essaie de te tuer ? '
  '21':
  - type: text
    content: 'Jésus a répondu : J’ai fait un miracle le jour de '
  - type: text
    content: sabbat
  - type: text
    content: '. Vous êtes tous surpris. '
  '22':
  - type: text
    content: 'Mais vous allez '
  - type: text
    content: circoncire
  - type: text
    content: ' un garçon le jour de '
  - type: text
    content: sabbat
  - type: text
    content: '. Moïse vous a dit que vous devez '
  - type: text
    content: circoncire
  - type: text
    content: ' vos fils. Voilà pourquoi vous le ferez. Vos ancêtres l’ont fait avant même la naissance de Moïse. '
  '23':
  - type: text
    content: 'Vous allez '
  - type: text
    content: circoncire
  - type: text
    content: ' un garçon le jour de '
  - type: text
    content: sabbat
  - type: text
    content: ', afin que vous obéissiez aux règles de Moïse. Donc, vous ne devriez pas être en colère contre moi, parce que j’ai guéri un homme le jour de '
  - type: text
    content: sabbat
  - type: text
    content: '. '
  '24':
  - type: text
    content: Ne jugez pas sur les choses à cause de ce qu’elles semblent être. Au lieu de cela, jugez les choses à cause de ce qui est juste.
  - type: heading
    content: Les gens cherchent à savoir si Jésus est le Messie
  '25':
  - type: text
    content: 'Certaines personnes à Jérusalem ont commencé à dire : Voilà l’homme que les dirigeants veulent tuer. '
  '26':
  - type: text
    content: 'Mais regardez ! Il parle à la foule. Et les dirigeants ne lui disent rien ! Peut‑être qu’ils pensent qu’il est vraiment le '
  - type: text
    content: Christ
  - type: text
    content: '  ! '
  '27':
  - type: text
    content: 'Mais nous savons d’où il est venu. Quand le '
  - type: text
    content: Christ
  - type: text
    content: ' viendra, personne ne saura. Personne ne saura d’où il est venu.'
  '28':
  - type: text
    content: 'Jésus enseignait dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Il criait : Oui, vous me connaissez. Et vous savez d’où je viens. Je ne suis pas venu parce que je me suis décidé de venir. Celui qui m’a envoyé est vrai. Vous ne le connaissez pas. '
  '29':
  - type: text
    content: 'Mais je le connais, parce que je suis venu de lui. Il m’a envoyé. '
  '3':
  - type: text
    content: 'Alors les frères de Jésus lui ont dit : Tu dois quitter cet endroit et aller en Judée. Ensuite, tes '
  - type: text
    content: disciples
  - type: text
    content: ' pourront voir les grandes choses que tu fais. '
  '30':
  - type: text
    content: 'Ils ont entendu cela. Ils voulaient l’attraper. Mais personne ne l’a attrapé. Ce n’était pas le bon moment. '
  '31':
  - type: text
    content: 'Mais beaucoup de gens dans la foule ont cru en lui. Ils disaient : Cet homme a fait beaucoup de miracles. Nous ne savons pas si le '
  - type: text
    content: Christ
  - type: text
    content: ' fera de même quand il viendra !'
  '32':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont entendu ce que la foule disait au sujet de Jésus. Ensuite, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont envoyé des soldats l’attraper. '
  '33':
  - type: text
    content: 'Jésus a dit : Je serai avec vous pour seulement une courte période. Ensuite, je vais aller à celui qui m’a envoyé. '
  '34':
  - type: text
    content: 'Vous me chercherez, mais vous ne me trouverez pas. Vous ne pouvez pas aller à l’endroit où je serai. '
  '35':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' se demandaient : Qu’est‑ce qu’il essaie de nous dire ? Où peut‑il aller pour que nous ne puissions pas le trouver ? Peut‑être qu’il ira parmi nos gens qui vivent chez les '
  - type: text
    content: Grecs
  - type: text
    content: '. Peut‑être qu’il ira enseigner les '
  - type: text
    content: Grecs
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Il a dit : Vous me chercherez, mais vous ne me trouverez pas. Et il a dit : Vous ne pouvez pas aller à l’endroit où je serai. Que veut‑il dire ?'
  - type: heading
    content: Les cours d’eau qui font vivre les gens
  '37':
  - type: text
    content: 'Le dernier jour de la fête a été le jour le plus important. Ce jour‑là, Jésus s’est levé. Il a parlé d’une voix forte. Il a dit : Si quelqu’un a soif, qu’il vienne à moi pour boire. '
  '38':
  - type: text
    content: 'Comme il est dit dans l’Ancien Testament : Les cours d’eau sortiront de l’intérieur des gens qui croient en moi. '
  '39':
  - type: text
    content: Jésus parlait de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu, qui viendra aux gens un peu de temps après. Ces gens qui ont cru en Jésus recevront alors l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Mais Dieu n’a pas encore donné son '
  - type: text
    content: Esprit
  - type: text
    content: ', parce qu’il n’a pas encore ressuscité Jésus. Il ne l’a pas encore ressuscité, afin qu’il puisse être au '
  - type: text
    content: ciel
  - type: text
    content: ' avec lui.'
  - type: heading
    content: Les gens se disputent
  '4':
  - type: text
    content: 'Personne ne fait les choses en secret s’il veut que tout le monde le connaisse. Tu fais ces choses, tu dois donc te montrer à tout le monde. '
  '40':
  - type: text
    content: 'Certaines des personnes dans la foule ont entendu Jésus dire ces paroles. Puis ces gens ont dit : Cet homme est vraiment le '
  - type: text
    content: prophète
  - type: text
    content: ' que nous attendions ! '
  '41':
  - type: text
    content: 'D’autres personnes disaient : Cet homme est le '
  - type: text
    content: Christ
  - type: text
    content: '. Mais certaines personnes disaient : le '
  - type: text
    content: prophète
  - type: text
    content: ' ne viendra pas de Galilée ! '
  '42':
  - type: text
    content: 'L’Ancien Testament dit que le '
  - type: text
    content: Christ
  - type: text
    content: ' viendra de la famille du roi David. Il viendra de Bethléem, la ville où David a vécu. '
  '43':
  - type: text
    content: 'Ainsi, la foule n’a pas pu se mettre d’accord au sujet de Jésus. '
  '44':
  - type: text
    content: 'Certaines personnes voulaient l’attraper. Mais personne ne l’a attrapé. '
  '45':
  - type: text
    content: 'Les soldats sont revenus aux chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et aux '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Ils ont demandé aux soldats : Pourquoi ne l’avez‑vous pas amené ici ? '
  '46':
  - type: text
    content: 'Les soldats ont répondu : Personne n’a jamais parlé comme cet homme parle. '
  '47':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont répondu : Vous semblez croire aussi à ces fausses choses ! '
  '48':
  - type: text
    content: 'Aucun des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ou des dirigeants ne croit en lui. Assurément, vous le savez ! '
  '49':
  - type: text
    content: 'Mais cette foule ne connaît pas les règles de Moïse. Donc, Dieu permettra que de très mauvaises choses leur arrivent. '
  '5':
  - type: text
    content: 'Même ses propres frères ne croyaient pas en lui. '
  '50':
  - type: text
    content: 'Nicodème était l’un des '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Il était l’homme qui était allé voir Jésus avant. Il a dit aux autres personnes : '
  '51':
  - type: text
    content: 'Nos règles disent que nous devons écouter un homme d’abord. Nous devons savoir d’abord ce qu’il a fait. Alors seulement nous pouvons le juger. '
  '52':
  - type: text
    content: 'Ils ont répondu : Peut‑être que tu viens de la Galilée aussi ! Vois les Écritures (Ancien Testament). Tu comprendras qu’aucun '
  - type: text
    content: prophète
  - type: text
    content: ' ne peut venir de Galilée. '
  '53':
  - type: text
    content: Alors tout le monde est allé à sa propre maison.
  '6':
  - type: text
    content: 'Alors Jésus a répondu : Ce n’est pas encore le bon moment pour moi. Mais tout moment est bon pour vous. '
  '7':
  - type: text
    content: 'Les gens qui appartiennent à ce monde ne peuvent pas vous haïr. Mais ils me haïssent. Les choses qu’ils font, sont fausses. Et je montre que ces choses sont fausses. Voilà pourquoi ils me haïssent. '
  '8':
  - type: text
    content: 'Vous allez à la fête. Je ne vais pas là, ce n’est pas le bon moment pour moi. '
  '9':
  - type: text
    content: Jésus a dit cela, puis il est resté en Galilée.
  - type: heading
    content: Jésus va à la fête des Tabernacles
