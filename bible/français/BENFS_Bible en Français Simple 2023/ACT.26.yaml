document_id: ACT.26
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 26
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul parle à Agrippa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Agrippa a dit à Paul : Tu peux maintenant parler de toi‑même.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Paul a levé sa main pendant qu’il parlait. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le Roi Agrippa : Je te prie de m’écouter. Il a dit : Je suis heureux, parce que je peux te parler aujourd’hui. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' disent que j’ai fait quelque chose de mauvais. Ainsi je t’expliquerai tout au sujet des choses qu’ils disent contre moi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je peux faire ceci, parce que tu sais tout au sujet des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Tu sais comment nous vivons. Tu sais également très bien nos discussions. Sois patient et écoute‑moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’ai vécu parmi les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et à Jérusalem depuis que j’étais jeune. Tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' savent comment je vivais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils m’ont connu pendant longtemps. Et ainsi ils savent que j’étais un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisien
  - type: text
    text: '. J’ai vécu comme '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisien
  - type: text
    text: '. Je faisais attention à obéir à la loi de Dieu, comme ils font. Ils peuvent te dire que ceci est vrai. Ils peuvent, s’ils veulent te dire. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Maintenant je me tiens ici pour que les hommes me jugent. Je fais ceci, parce que je crois à la promesse de Dieu à nos ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il l’a promise aux 12 familles d’Israël. Elles parlent à Dieu jour et nuit. Et elles disent qu’il est très puissant et important. Et ainsi elles espèrent recevoir ce qu’il a promis. J’espère également le recevoir. Roi puissant, c’est la raison pour laquelle les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' eux‑mêmes disent toutes ces choses au sujet de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu a fait que les personnes deviennent encore vivantes après leur mort. Toi qui m’entends, tu penses que ce n’est pas possible. Mais je ne vois pas pourquoi tu devrais penser cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J’ai moi‑même pensé que je devais faire beaucoup de choses contre le pouvoir de Jésus de Nazareth. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est ce que j’ai fait à Jérusalem. Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' m’ont donné le pouvoir de mettre plusieurs des personnes de Dieu en prison. Et j’étais d’accord avec nos chefs quand ils disaient : Ces personnes doivent mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Souvent, je disais que mes hommes devaient punir ces gens dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: synagogues
  - type: text
    text: . J’ai essayé de leur faire dire de mauvaises choses au sujet de Dieu. Puisque j’étais très fâché contre eux, je voyageais dans d’autres villes et dans d’autres pays. Alors je pouvais également faire du mal à ceux qui croyaient en Jésus là.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit à Agrippa et Bérénice quand il a d’abord cru en Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pour cette raison, je voyageais vers Damas. Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' m’avaient donné une lettre. Ils avaient écrit : Il y a là des gens à Damas qui croient en Jésus. Et nous avons donné le pouvoir à Paul pour les attraper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Roi puissant, je voyageais le long de la route à midi. Et j’ai vu une grande lumière qui était beaucoup plus brillante que celle du soleil. Cette grande lumière brillait autour de moi et de tous les hommes qui étaient avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tous sont tombés à terre. J’ai entendu une voix qui me parlait dans la langue hébraïque. Elle disait : Saul, Saul, tu me fais souffrir. Tu es comme un bœuf qui donne un coup de pied contre un bâton pointu. Et ainsi tu te blesses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'J’ai demandé : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui es‑tu ? Il a dit : Je suis Jésus. Et tu me fais souffrir. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant, lève‑toi. Je suis apparu à toi parce que je t’ai choisi. Je veux que tu travailles pour moi. Tu m’as vu aujourd’hui. Je veux que tu dises à d’autres à ce sujet. Après cela, je te montrerai d’autres choses au sujet de moi, que tu devrais dire à d’autres personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je t’enverrai parler aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et à ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Certains d’entre eux voudront te faire du mal. Mais je te sauverai d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu les aideras à comprendre qui je suis. Ils sont comme des personnes qui vivent dans l’obscurité. Et ainsi ils ne peuvent pas voir. Enseigne‑leur au sujet de moi. Alors ils seront comme des gens qui vivent dans la lumière. Maintenant ils sont dans le royaume de Satan. Il a la puissance au‑dessus d’eux. Fais‑les sortir de là et mets‑les dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: . Puisqu’ils croient en moi, je leur pardonnerai. Je leur pardonnerai toutes les mauvaises choses qu’ils faisaient. Je leur donnerai un endroit parmi toutes les personnes que Dieu a choisies.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit à Agrippa et Bérénice au sujet de son travail pour Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et ainsi, Roi Agrippa, j’ai obéi aux choses que j’ai entendues du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'D’abord, j’ai enseigné aux habitants de Damas et de Jérusalem ce qu’ils devraient faire. Je leur ai dit : Vous avez fait de mauvaises choses. Vous devez dire à Dieu que vous êtes tristes. Et alors, vous devez obéir à Dieu. J’ai également enseigné ceci aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et aux étrangers ou non‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' dans beaucoup de différents pays. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C’est la raison pour laquelle les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' m’ont tenu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. C’est également la raison pour laquelle ils ont voulu me tuer. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Dieu m’aidait chaque jour. Maintenant, je peux me tenir ici. Je peux te dire ce qui est vrai. Je peux parler aux gens qui sont très importants. Et je peux également parler aux gens qui ne sont pas importants. Moïse et d’autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu nous ont dit que toutes ces choses se passeront. Et je vous dis ces mêmes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Des gens tueront le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' que Dieu a choisi. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' deviendra alors encore vivant après la mort. De cette façon, il montrera à chacun que Dieu sauve des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et étrangers ou non‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' de la mort. C’est cela que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' et Moïse avaient dit.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Agrippa répond à Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quand Paul disait à Agrippa toutes ces choses, Festus criait à Paul : Tu es fou. Tu as appris beaucoup de choses. Tu ne raisonnes plus bien à cause de toutes ces choses !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Paul a dit : Grand chef, mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' n’est pas troublé. Tout ce que j’ai dit est vrai. Et je suis complètement bien dans mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Roi Agrippa, je n’ai pas peur de te parler. Je suis sûr que tu sais déjà ces choses. Je suis sûr que tu as déjà entendu tout. Personne n’a caché ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Roi Agrippa, tu crois à ce que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' ont dit ? Je suis sûr que tu les crois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Agrippa a dit à Paul : Que penses‑tu ? Peux‑tu me faire devenir un chrétien dans ce temps court ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Paul a répondu : Il n’est pas important si cela prend un bon moment ou peu de temps. Je prie Dieu pour toi et pour chaque personne qui m’écoutent aujourd’hui. Je prie que vous deveniez tous comme moi. Mais je ne voudrais pas que vous portiez ces mêmes chaînes !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Puis le Roi Agrippa, Festus et Bérénice et tous les autres se sont levés. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils ont quitté la salle. Après, ils se sont dit ceci : Cet homme n’a rien fait de mal. Nous ne devrions pas le tuer, ou le mettre en prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Agrippa a dit à Festus : Nous pouvions libérer cet homme de la prison. Mais il a demandé d’aller chez '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: . Ainsi nous ne pouvons pas le libérer de la prison.
