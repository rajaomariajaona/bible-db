document_id: ACT.26,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 26
  - type: heading
    content: Paul parle à Agrippa
  - type: text
    content: 'Agrippa a dit à Paul : Tu peux maintenant parler de toi‑même.'
  - type: text
    content: 'Paul a levé sa main pendant qu’il parlait. '
  '10':
  - type: text
    content: 'C’est ce que j’ai fait à Jérusalem. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' m’ont donné le pouvoir de mettre plusieurs des personnes de Dieu en prison. Et j’étais d’accord avec nos chefs quand ils disaient : Ces personnes doivent mourir. '
  '11':
  - type: text
    content: 'Souvent, je disais que mes hommes devaient punir ces gens dans leurs '
  - type: text
    content: synagogues
  - type: text
    content: . J’ai essayé de leur faire dire de mauvaises choses au sujet de Dieu. Puisque j’étais très fâché contre eux, je voyageais dans d’autres villes et dans d’autres pays. Alors je pouvais également faire du mal à ceux qui croyaient en Jésus là.
  - type: heading
    content: Paul dit à Agrippa et Bérénice quand il a d’abord cru en Jésus
  '12':
  - type: text
    content: 'Pour cette raison, je voyageais vers Damas. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' m’avaient donné une lettre. Ils avaient écrit : Il y a là des gens à Damas qui croient en Jésus. Et nous avons donné le pouvoir à Paul pour les attraper.'
  '13':
  - type: text
    content: 'Roi puissant, je voyageais le long de la route à midi. Et j’ai vu une grande lumière qui était beaucoup plus brillante que celle du soleil. Cette grande lumière brillait autour de moi et de tous les hommes qui étaient avec moi. '
  '14':
  - type: text
    content: 'Tous sont tombés à terre. J’ai entendu une voix qui me parlait dans la langue hébraïque. Elle disait : Saul, Saul, tu me fais souffrir. Tu es comme un bœuf qui donne un coup de pied contre un bâton pointu. Et ainsi tu te blesses.'
  '15':
  - type: text
    content: 'J’ai demandé : '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui es‑tu ? Il a dit : Je suis Jésus. Et tu me fais souffrir. '
  '16':
  - type: text
    content: 'Maintenant, lève‑toi. Je suis apparu à toi parce que je t’ai choisi. Je veux que tu travailles pour moi. Tu m’as vu aujourd’hui. Je veux que tu dises à d’autres à ce sujet. Après cela, je te montrerai d’autres choses au sujet de moi, que tu devrais dire à d’autres personnes. '
  '17':
  - type: text
    content: 'Je t’enverrai parler aux '
  - type: text
    content: Juifs
  - type: text
    content: ' et à ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: '. Certains d’entre eux voudront te faire du mal. Mais je te sauverai d’eux. '
  '18':
  - type: text
    content: 'Tu les aideras à comprendre qui je suis. Ils sont comme des personnes qui vivent dans l’obscurité. Et ainsi ils ne peuvent pas voir. Enseigne‑leur au sujet de moi. Alors ils seront comme des gens qui vivent dans la lumière. Maintenant ils sont dans le royaume de Satan. Il a la puissance au‑dessus d’eux. Fais‑les sortir de là et mets‑les dans le '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: . Puisqu’ils croient en moi, je leur pardonnerai. Je leur pardonnerai toutes les mauvaises choses qu’ils faisaient. Je leur donnerai un endroit parmi toutes les personnes que Dieu a choisies.
  - type: heading
    content: Paul dit à Agrippa et Bérénice au sujet de son travail pour Dieu
  '19':
  - type: text
    content: 'Et ainsi, Roi Agrippa, j’ai obéi aux choses que j’ai entendues du '
  - type: text
    content: ciel
  - type: text
    content: ' ce jour. '
  '2':
  - type: text
    content: 'Le Roi Agrippa : Je te prie de m’écouter. Il a dit : Je suis heureux, parce que je peux te parler aujourd’hui. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' disent que j’ai fait quelque chose de mauvais. Ainsi je t’expliquerai tout au sujet des choses qu’ils disent contre moi. '
  '20':
  - type: text
    content: 'D’abord, j’ai enseigné aux habitants de Damas et de Jérusalem ce qu’ils devraient faire. Je leur ai dit : Vous avez fait de mauvaises choses. Vous devez dire à Dieu que vous êtes tristes. Et alors, vous devez obéir à Dieu. J’ai également enseigné ceci aux '
  - type: text
    content: Juifs
  - type: text
    content: ' et aux étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: ' dans beaucoup de différents pays. '
  '21':
  - type: text
    content: 'C’est la raison pour laquelle les '
  - type: text
    content: Juifs
  - type: text
    content: ' m’ont tenu dans le '
  - type: text
    content: Temple
  - type: text
    content: '. C’est également la raison pour laquelle ils ont voulu me tuer. '
  '22':
  - type: text
    content: 'Mais Dieu m’aidait chaque jour. Maintenant, je peux me tenir ici. Je peux te dire ce qui est vrai. Je peux parler aux gens qui sont très importants. Et je peux également parler aux gens qui ne sont pas importants. Moïse et d’autres '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu nous ont dit que toutes ces choses se passeront. Et je vous dis ces mêmes choses. '
  '23':
  - type: text
    content: 'Des gens tueront le '
  - type: text
    content: Christ
  - type: text
    content: ' que Dieu a choisi. Le '
  - type: text
    content: Christ
  - type: text
    content: ' deviendra alors encore vivant après la mort. De cette façon, il montrera à chacun que Dieu sauve des '
  - type: text
    content: Juifs
  - type: text
    content: ' et étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: ' de la mort. C’est cela que les '
  - type: text
    content: prophètes
  - type: text
    content: ' et Moïse avaient dit.'
  - type: heading
    content: Agrippa répond à Paul
  '24':
  - type: text
    content: 'Quand Paul disait à Agrippa toutes ces choses, Festus criait à Paul : Tu es fou. Tu as appris beaucoup de choses. Tu ne raisonnes plus bien à cause de toutes ces choses !'
  '25':
  - type: text
    content: 'Paul a dit : Grand chef, mon '
  - type: text
    content: esprit
  - type: text
    content: ' n’est pas troublé. Tout ce que j’ai dit est vrai. Et je suis complètement bien dans mon '
  - type: text
    content: esprit
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Roi Agrippa, je n’ai pas peur de te parler. Je suis sûr que tu sais déjà ces choses. Je suis sûr que tu as déjà entendu tout. Personne n’a caché ces choses. '
  '27':
  - type: text
    content: 'Roi Agrippa, tu crois à ce que les '
  - type: text
    content: prophètes
  - type: text
    content: ' ont dit ? Je suis sûr que tu les crois.'
  '28':
  - type: text
    content: 'Alors Agrippa a dit à Paul : Que penses‑tu ? Peux‑tu me faire devenir un chrétien dans ce temps court ?'
  '29':
  - type: text
    content: 'Paul a répondu : Il n’est pas important si cela prend un bon moment ou peu de temps. Je prie Dieu pour toi et pour chaque personne qui m’écoutent aujourd’hui. Je prie que vous deveniez tous comme moi. Mais je ne voudrais pas que vous portiez ces mêmes chaînes !'
  '3':
  - type: text
    content: 'Je peux faire ceci, parce que tu sais tout au sujet des '
  - type: text
    content: Juifs
  - type: text
    content: . Tu sais comment nous vivons. Tu sais également très bien nos discussions. Sois patient et écoute‑moi.
  '30':
  - type: text
    content: 'Puis le Roi Agrippa, Festus et Bérénice et tous les autres se sont levés. '
  '31':
  - type: text
    content: 'Ils ont quitté la salle. Après, ils se sont dit ceci : Cet homme n’a rien fait de mal. Nous ne devrions pas le tuer, ou le mettre en prison.'
  '32':
  - type: text
    content: 'Agrippa a dit à Festus : Nous pouvions libérer cet homme de la prison. Mais il a demandé d’aller chez '
  - type: text
    content: César
  - type: text
    content: . Ainsi nous ne pouvons pas le libérer de la prison.
  '4':
  - type: text
    content: 'J’ai vécu parmi les '
  - type: text
    content: Juifs
  - type: text
    content: ' et à Jérusalem depuis que j’étais jeune. Tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' savent comment je vivais.'
  '5':
  - type: text
    content: 'Ils m’ont connu pendant longtemps. Et ainsi ils savent que j’étais un '
  - type: text
    content: Pharisien
  - type: text
    content: '. J’ai vécu comme '
  - type: text
    content: Pharisien
  - type: text
    content: '. Je faisais attention à obéir à la loi de Dieu, comme ils font. Ils peuvent te dire que ceci est vrai. Ils peuvent, s’ils veulent te dire. '
  '6':
  - type: text
    content: Maintenant je me tiens ici pour que les hommes me jugent. Je fais ceci, parce que je crois à la promesse de Dieu à nos ancêtres.
  '7':
  - type: text
    content: 'Il l’a promise aux 12 familles d’Israël. Elles parlent à Dieu jour et nuit. Et elles disent qu’il est très puissant et important. Et ainsi elles espèrent recevoir ce qu’il a promis. J’espère également le recevoir. Roi puissant, c’est la raison pour laquelle les '
  - type: text
    content: Juifs
  - type: text
    content: ' eux‑mêmes disent toutes ces choses au sujet de moi. '
  '8':
  - type: text
    content: Dieu a fait que les personnes deviennent encore vivantes après leur mort. Toi qui m’entends, tu penses que ce n’est pas possible. Mais je ne vois pas pourquoi tu devrais penser cela.
  '9':
  - type: text
    content: 'J’ai moi‑même pensé que je devais faire beaucoup de choses contre le pouvoir de Jésus de Nazareth. '
