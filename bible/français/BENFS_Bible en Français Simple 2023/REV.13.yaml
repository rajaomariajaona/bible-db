document_id: REV.13
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’animal de la mer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis j’ai vu un animal qui sortait de la mer. Il avait 10 cornes et il y avait une couronne sur chaque corne. L’animal avait également 7 têtes. Sur chaque tête, il y avait un mauvais nom qui insultait Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’animal que j’ai vu, était comme un léopard. Mais ses pieds étaient comme les pieds d’un ours et sa bouche était comme la bouche d’un lion. Le dragon a donné sa propre puissance et son grand pouvoir à l’animal. L’animal est devenu roi à la place du dragon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quelqu’un avait mal coupé une tête d’animal. Il semblait qu’il mourrait. Mais la tête de l’animal s’était rétablie. Cela a surpris tous les gens qui vivaient sur la terre. En conséquence, ils étaient prêts à obéir à ce que disait l’animal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les gens adoraient le dragon, parce qu’il avait donné son pouvoir à l’animal. Ils ont également adoré l’animal.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils ont dit : Personne n’est comme cet animal ! Personne n’est assez fort pour lutter contre lui !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’animal a reçu l’autorisation de faire mal aux personnes pendant 42 mois. Il disait qu’il avait une grande puissance. Il disait aussi de mauvaises choses contre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’animal a commencé donc à insulter Dieu et à parler contre le nom de Dieu. Il a parlé contre l’endroit où Dieu vit et contre tous les gens qui vivent là au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il a reçu le pouvoir de mener une guerre contre le propre peuple de Dieu. Il a reçu le pouvoir de gagner contre eux. Il a aussi reçu le pouvoir sur toute tribu. Il l’avait aussi sur tout peuple, toute langue et toute nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Presque tous les gens qui vivent sur la terre adoreront l’animal. Mais ces gens dont les noms sont dans le livre de vie de l’Agneau ne l’adoreront pas. L’Agneau a écrit les noms de ces croyants dans son livre depuis le début du monde. C’est l’Agneau que les gens ont tué en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quiconque peut comprendre doit écouter attentivement ces mots :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: S’il est juste que l’ennemi de quelqu’un l’attrape, c’est ce qui se passera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il est juste que l’ennemi de quelqu’un le tue avec une épée, c’est ce qui se passera.
- type: usfm
  marker: p
  children:
  - type: text
    text: Cela signifie que le peuple de Dieu doit être patient et fort. Il doit continuer à faire confiance en Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’animal de la terre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis j’ai vu un second animal. Celui‑ci sortait du sol. Il avait 2 cornes comme des cornes d’agneau. Mais il parlait comme un dragon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ce second animal a travaillé pour le premier animal et il a utilisé le pouvoir du premier animal. Cela a fait que tous les gens sur terre ont adoré le premier animal. Ce premier animal était celui que quelqu’un avait très mal blessé. Il semblait qu’il allait mourir, mais il s’était rétabli.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le second animal a fait de grands miracles qui ont surpris les gens. Cela a même fait descendre le feu du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' sur la terre. Et tous ceux qui vivaient sur la terre ont vu le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ce second animal a reçu le pouvoir de travailler pour le premier animal et de faire de grandes choses. En conséquence, les gens qui vivaient sur la terre ont cru à ses mensonges. Il leur a dit de faire une idole et de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: '. Cette idole ressemblait au premier animal. C’était celui que l’épée avait mal blessé, mais il était toujours vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le second animal a reçu le pouvoir de donner vie à l’idole. En conséquence, l’idole qui ressemblait au premier animal a parlé. Elle a dit : Toute personne qui refuse de m’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' doit mourir !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le second animal a également amené tout le monde à recevoir un signe. On a mis un signe sur la main droite de chaque personne ou sur le devant de sa tête. Il a fait cela à tout le monde. Il l’a fait aux petits et aux grands. Il l’a aussi fait aux pauvres et aux riches. Il a fait cela également aux gens libres et aux esclaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Personne ne pouvait rien acheter sans avoir ce signe sur lui. Personne ne pouvait pas non plus vendre quoi que ce soit. Cette marque indique le nom de l’animal ou le nombre de son nom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu dois bien réfléchir pour comprendre ce nombre. Toute personne qui est sage doit essayer de comprendre ce que signifie le nombre de l’animal. C’est un nombre humain. Le nombre est 666.
