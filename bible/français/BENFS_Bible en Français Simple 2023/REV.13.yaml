document_id: REV.13,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 13
  - type: heading
    content: L’animal de la mer
  - type: text
    content: 'Puis j’ai vu un animal qui sortait de la mer. Il avait 10 cornes et il y avait une couronne sur chaque corne. L’animal avait également 7 têtes. Sur chaque tête, il y avait un mauvais nom qui insultait Dieu. '
  '10':
  - type: text
    content: S’il est juste que l’ennemi de quelqu’un l’attrape, c’est ce qui se passera.
  - type: text
    content: S’il est juste que l’ennemi de quelqu’un le tue avec une épée, c’est ce qui se passera.
  - type: text
    content: Cela signifie que le peuple de Dieu doit être patient et fort. Il doit continuer à faire confiance en Dieu.
  - type: heading
    content: L’animal de la terre
  '11':
  - type: text
    content: 'Puis j’ai vu un second animal. Celui‑ci sortait du sol. Il avait 2 cornes comme des cornes d’agneau. Mais il parlait comme un dragon. '
  '12':
  - type: text
    content: Ce second animal a travaillé pour le premier animal et il a utilisé le pouvoir du premier animal. Cela a fait que tous les gens sur terre ont adoré le premier animal. Ce premier animal était celui que quelqu’un avait très mal blessé. Il semblait qu’il allait mourir, mais il s’était rétabli.
  '13':
  - type: text
    content: 'Le second animal a fait de grands miracles qui ont surpris les gens. Cela a même fait descendre le feu du '
  - type: text
    content: ciel
  - type: text
    content: ' sur la terre. Et tous ceux qui vivaient sur la terre ont vu le feu. '
  '14':
  - type: text
    content: Ce second animal a reçu le pouvoir de travailler pour le premier animal et de faire de grandes choses. En conséquence, les gens qui vivaient sur la terre ont cru à ses mensonges. Il leur a dit de faire une idole et de l’
  - type: text
    content: adorer
  - type: text
    content: '. Cette idole ressemblait au premier animal. C’était celui que l’épée avait mal blessé, mais il était toujours vivant. '
  '15':
  - type: text
    content: 'Le second animal a reçu le pouvoir de donner vie à l’idole. En conséquence, l’idole qui ressemblait au premier animal a parlé. Elle a dit : Toute personne qui refuse de m’'
  - type: text
    content: adorer
  - type: text
    content: ' doit mourir !'
  '16':
  - type: text
    content: 'Le second animal a également amené tout le monde à recevoir un signe. On a mis un signe sur la main droite de chaque personne ou sur le devant de sa tête. Il a fait cela à tout le monde. Il l’a fait aux petits et aux grands. Il l’a aussi fait aux pauvres et aux riches. Il a fait cela également aux gens libres et aux esclaves. '
  '17':
  - type: text
    content: Personne ne pouvait rien acheter sans avoir ce signe sur lui. Personne ne pouvait pas non plus vendre quoi que ce soit. Cette marque indique le nom de l’animal ou le nombre de son nom.
  '18':
  - type: text
    content: Tu dois bien réfléchir pour comprendre ce nombre. Toute personne qui est sage doit essayer de comprendre ce que signifie le nombre de l’animal. C’est un nombre humain. Le nombre est 666.
  '2':
  - type: text
    content: L’animal que j’ai vu, était comme un léopard. Mais ses pieds étaient comme les pieds d’un ours et sa bouche était comme la bouche d’un lion. Le dragon a donné sa propre puissance et son grand pouvoir à l’animal. L’animal est devenu roi à la place du dragon.
  '3':
  - type: text
    content: 'Quelqu’un avait mal coupé une tête d’animal. Il semblait qu’il mourrait. Mais la tête de l’animal s’était rétablie. Cela a surpris tous les gens qui vivaient sur la terre. En conséquence, ils étaient prêts à obéir à ce que disait l’animal. '
  '4':
  - type: text
    content: Les gens adoraient le dragon, parce qu’il avait donné son pouvoir à l’animal. Ils ont également adoré l’animal.
  - type: text
    content: 'Ils ont dit : Personne n’est comme cet animal ! Personne n’est assez fort pour lutter contre lui !'
  '5':
  - type: text
    content: 'L’animal a reçu l’autorisation de faire mal aux personnes pendant 42 mois. Il disait qu’il avait une grande puissance. Il disait aussi de mauvaises choses contre Dieu. '
  '6':
  - type: text
    content: 'L’animal a commencé donc à insulter Dieu et à parler contre le nom de Dieu. Il a parlé contre l’endroit où Dieu vit et contre tous les gens qui vivent là au '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Il a reçu le pouvoir de mener une guerre contre le propre peuple de Dieu. Il a reçu le pouvoir de gagner contre eux. Il a aussi reçu le pouvoir sur toute tribu. Il l’avait aussi sur tout peuple, toute langue et toute nation. '
  '8':
  - type: text
    content: 'Presque tous les gens qui vivent sur la terre adoreront l’animal. Mais ces gens dont les noms sont dans le livre de vie de l’Agneau ne l’adoreront pas. L’Agneau a écrit les noms de ces croyants dans son livre depuis le début du monde. C’est l’Agneau que les gens ont tué en '
  - type: text
    content: sacrifice
  - type: text
    content: .
  '9':
  - type: text
    content: 'Quiconque peut comprendre doit écouter attentivement ces mots :'
