document_id: JHN.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: Jésus à Béthanie
  - type: text
    content: '6 jours avant la '
  - type: text
    content: Pâque
  - type: text
    content: ', Jésus s’est rendu à '
  - type: text
    content: Béthanie
  - type: text
    content: '. C’était le village où vivait Lazare. C’était l’homme qui était mort. Mais Jésus l’avait fait revivre. '
  '10':
  - type: text
    content: 'Alors les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' avaient déjà décidé de tuer Jésus. Ils ont décidé de tuer aussi Lazare. '
  '11':
  - type: text
    content: 'Ils ont décidé de faire cela, parce que beaucoup de '
  - type: text
    content: Juifs
  - type: text
    content: ' refusaient de leur obéir. Au lieu de cela, ces '
  - type: text
    content: Juifs
  - type: text
    content: ' croyaient en Jésus à cause de ce qu’il avait fait pour Lazare.'
  - type: heading
    content: Jésus va à Jérusalem comme Messie
  '12':
  - type: text
    content: 'Le lendemain, beaucoup de gens sont venus à Jérusalem pour la fête. Ils ont entendu que Jésus était sur le chemin. '
  '13':
  - type: text
    content: 'Ainsi, ils ont pris des branches de palmiers, et ils sont allés à la rencontre de Jésus. Ils criaient : Sauve‑nous maintenant ! Dieu est bon pour l’homme qui vient au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Dieu est bon pour le roi d’Israël ! '
  '14':
  - type: text
    content: 'Jésus a trouvé un jeune '
  - type: text
    content: âne
  - type: text
    content: '. Et il était assis dessus, comme il est dit dans l’Ancien Testament : '
  '15':
  - type: text
    content: 'N’aie pas peur, fille de '
  - type: text
    content: Sion
  - type: text
    content: '. Regarde ! Ton roi vient. Il est assis sur un jeune '
  - type: text
    content: âne
  - type: text
    content: .
  '16':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ne comprenaient pas tout cela à ce moment‑là. Ils ont compris cela seulement après le retour de Jésus au '
  - type: text
    content: ciel
  - type: text
    content: '. Puis ils se souvenaient que l’Ancien Testament a dit ces choses sur lui. Et ils se souvenaient des choses qui lui étaient arrivées. '
  '17':
  - type: text
    content: 'La foule qui avait été avec Jésus avant, a continué à parler aux gens de Lazare. Jésus avait dit à Lazare de sortir du tombeau. Jésus avait fait Lazare à nouveau vivant après qu’il était mort. La foule a continué à parler aux gens à ce sujet. '
  '18':
  - type: text
    content: 'Voilà pourquoi tous les gens venaient à la rencontre de Jésus. Ils ont appris qu’il avait fait ce miracle. '
  '19':
  - type: text
    content: 'Ainsi, les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' se sont dit ceci : Ce n’est pas ce que nous voulions. Regardez ! Tous les gens courent vers lui !'
  - type: heading
    content: Jésus dit qu’il va bientôt mourir
  '2':
  - type: text
    content: 'Des amis ont préparé un repas spécial là‑bas pour Jésus. Marthe servait la nourriture. Lazare était assis parmi les visiteurs, avec Jésus. '
  '20':
  - type: text
    content: 'Il y avait quelques '
  - type: text
    content: Grecs
  - type: text
    content: ' parmi les gens qui étaient venus pour '
  - type: text
    content: adorer
  - type: text
    content: ' Dieu à la fête. '
  '21':
  - type: text
    content: 'Ces '
  - type: text
    content: Grecs
  - type: text
    content: ' sont venus auprès de Philippe. Il était de la ville de '
  - type: text
    content: Bethsaïda
  - type: text
    content: ' en Galilée. Ils lui ont dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous voulons parler avec Jésus. '
  '22':
  - type: text
    content: 'Philippe est allé auprès d’André et il lui a dit cela. Ensuite, Philippe et André sont allés auprès de Jésus et ils le lui ont dit. '
  '23':
  - type: text
    content: 'Jésus leur a dit : Dieu montrera à quel point le Fils de l’homme est bon et grand. Il est maintenant temps pour que cela se produise. '
  '24':
  - type: text
    content: Je vous dis la vérité. Une graine de blé continue d’être seulement une seule graine à moins qu’il ne meure. Elle doit tomber dans le sol et elle doit mourir. Mais si elle meurt, elle pousse et donne beaucoup de fruits.
  '25':
  - type: text
    content: 'Celui qui aime sa vie la perdra. Mais celui qui hait sa vie dans ce monde vivra toujours. '
  '26':
  - type: text
    content: 'Celui qui veut être mon serviteur, qu’il me suive. Puis il sera avec moi, là où je suis. Mon Père fera de grandes choses pour quelqu’un qui est mon serviteur. '
  '27':
  - type: text
    content: 'Maintenant, je me sens très triste. Et j’ai du mal dans mon '
  - type: text
    content: esprit
  - type: text
    content: '. Je pourrais dire : Père, sauve‑moi de cette période très difficile ! Mais je suis venu au monde pour cela. Je suis venu pour que je puisse traverser cette période difficile. '
  '28':
  - type: text
    content: 'Père, montre à quel point tu es grand et bon. Puis quelqu’un a parlé du '
  - type: text
    content: ciel
  - type: text
    content: '  : j’ai montré à quel point je suis grand et bon. Et je vais le faire à nouveau. '
  '29':
  - type: text
    content: 'Beaucoup de gens étaient là. Ils ont entendu le son de cette voix. Et ces gens ont dit que c’était comme le bruit d’un '
  - type: text
    content: tonnerre
  - type: text
    content: '. Mais d’autres personnes ont dit : Un '
  - type: text
    content: ange
  - type: text
    content: ' lui a parlé.'
  '3':
  - type: text
    content: Alors Marie a apporté du parfum très cher. Elle l’a versé sur les pieds de Jésus. Puis elle a essuyé ses pieds avec ses cheveux. L’odeur du parfum a rempli toute la maison.
  '30':
  - type: text
    content: 'Jésus a dit : Cette voix ne parlait pas pour m’aider. Non, elle parlait pour vous aider. '
  '31':
  - type: text
    content: 'Il est maintenant temps pour Dieu de juger les gens dans ce monde. Maintenant, il va jeter le prince de ce monde. '
  '32':
  - type: text
    content: 'Mais quand les gens m’élèvent de la terre, alors je vais attirer tout le monde vers moi‑même. '
  '33':
  - type: text
    content: Il a dit cela pour montrer comment il mourra bientôt.
  '34':
  - type: text
    content: 'La foule a dit : Les Écritures (Ancien Testament) nous disent que le '
  - type: text
    content: Christ
  - type: text
    content: ' continuera toujours. Alors, pourquoi dites‑vous : Les gens doivent élever le Fils de l’homme ? Qui est ce Fils de l’homme ? '
  '35':
  - type: text
    content: 'Jésus a répondu : La lumière sera avec vous pour seulement un court temps. Donc, continuez de marcher pendant que vous avez encore la lumière. Puis l’obscurité ne viendra pas sur vous. Toute personne qui marche dans les ténèbres ne sait pas le chemin. Cette personne ne sait pas où elle va. '
  '36':
  - type: text
    content: Croyez en la lumière, pendant que vous avez la lumière. Alors vous deviendrez fils de la lumière. Jésus a dit cela, après il est parti.
  - type: text
    content: Et il s’est caché d’eux.
  - type: heading
    content: Les Juifs ne croient toujours pas en Jésus
  '37':
  - type: text
    content: 'Jésus avait fait tant de miracles que les gens eux‑mêmes avaient vus. Mais même alors, ils ne croyaient pas encore. '
  '38':
  - type: text
    content: 'Cela montre que le '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe avait dit de vraies paroles. Ésaïe avait dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', personne n’a cru à notre message. Personne n’a compris la puissance du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Ésaïe a aussi parlé des raisons pour lesquelles les gens ne pouvaient pas croire. '
  '4':
  - type: text
    content: 'Judas Iscariote était l’un des disciples de Jésus. C’est lui qui devra livrer Jésus aux ennemis. Il a dit ceci : '
  '40':
  - type: text
    content: 'Il a dit : Dieu a fait leurs yeux incapables de voir. Il a fermé leurs '
  - type: text
    content: esprits
  - type: text
    content: '. Donc, ils ne peuvent pas voir de leurs yeux, et ils ne peuvent pas comprendre avec leurs '
  - type: text
    content: esprits
  - type: text
    content: '. Ils ne vont pas se tourner vers moi, afin que je puisse les guérir. '
  '41':
  - type: text
    content: 'Ésaïe avait vu à quel point '
  - type: text
    content: Christ
  - type: text
    content: ' est grand. Voilà pourquoi il a dit ces choses. '
  '42':
  - type: text
    content: 'Mais de nombreux dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' ont cru en Jésus. Mais ils ne disaient pas aux gens qu’ils croyaient. Ils ne parlaient pas de cela parce qu’ils avaient peur des '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Ils avaient peur que les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' allaient les renvoyer de la '
  - type: text
    content: synagogue
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Ils voulaient que les gens les glorifient au lieu de plaire à Dieu. '
  '44':
  - type: text
    content: 'Jésus a dit à haute voix : Quiconque croit en moi, ne croit pas seulement en moi. Cette personne croit aussi en celui qui m’a envoyé.'
  - type: heading
    content: Les paroles de Jésus vont juger les gens
  '45':
  - type: text
    content: 'Toute personne qui me regarde ne me voit pas seulement. Cette personne voit aussi celui qui m’a envoyé. '
  '46':
  - type: text
    content: 'Je suis venu dans le monde pour être une lumière. Tous ceux qui croient en moi ne resteront pas dans l’obscurité. Voilà pourquoi je suis venu. '
  '47':
  - type: text
    content: 'Certaines personnes peuvent entendre mes paroles, mais n’y obéissent pas. Je ne vais pas juger quelqu’un qui fait cela. Je ne suis pas venu pour juger les personnes dans le monde. Je suis venu pour les sauver. '
  '48':
  - type: text
    content: 'Quelque chose d’autre va juger quelqu’un qui me refuse. Quelque chose d’autre va juger quelqu’un qui ne veut pas écouter mes paroles. Le message que je vous ai dit le jugera au dernier jour. '
  '49':
  - type: text
    content: 'Les paroles que je vous ai dites, ne viennent pas de moi‑même. Elles viennent du Père, qui m’a envoyé. Il m’a dit ce qu’il faut dire. Et il m’a dit comment le dire. '
  '5':
  - type: text
    content: 'Nous pouvions vendre ce parfum à 300 pièces d’argent. Nous pourrions alors donner cet argent aux pauvres. Ça vaut un an de salaire d’un travailleur. '
  '50':
  - type: text
    content: Ce que le Père dit, fait vivre les gens pour toujours. Je le sais. Donc, je dis seulement les choses que le Père m’a dites.
  '6':
  - type: text
    content: 'Il n’a pas dit cela parce qu’il voulait vraiment aider les gens pauvres. Non, il a dit cela parce qu’il enviait l’argent. Il gardait le sac d’argent, et parfois il en prenait l’argent pour lui‑même. '
  '7':
  - type: text
    content: 'Mais Jésus a dit : Ne l’arrêtez pas ! Elle a gardé ce parfum pour le jour où ils enterreront mon corps mort. '
  '8':
  - type: text
    content: 'Les pauvres seront toujours avec vous, mais je ne vais pas être toujours avec vous. '
  '9':
  - type: text
    content: 'En ce temps‑là, beaucoup de '
  - type: text
    content: Juifs
  - type: text
    content: ' ont entendu que Jésus était à '
  - type: text
    content: Béthanie
  - type: text
    content: . Alors, ils sont venus là pour le voir. Ils sont venus aussi pour voir Lazare, parce que Jésus l’avait fait à nouveau vivant.
