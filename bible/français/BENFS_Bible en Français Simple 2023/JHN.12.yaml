document_id: JHN.12
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 12
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '6 jours avant la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ', Jésus s’est rendu à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. C’était le village où vivait Lazare. C’était l’homme qui était mort. Mais Jésus l’avait fait revivre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des amis ont préparé un repas spécial là‑bas pour Jésus. Marthe servait la nourriture. Lazare était assis parmi les visiteurs, avec Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alors Marie a apporté du parfum très cher. Elle l’a versé sur les pieds de Jésus. Puis elle a essuyé ses pieds avec ses cheveux. L’odeur du parfum a rempli toute la maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Judas Iscariote était l’un des disciples de Jésus. C’est lui qui devra livrer Jésus aux ennemis. Il a dit ceci : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous pouvions vendre ce parfum à 300 pièces d’argent. Nous pourrions alors donner cet argent aux pauvres. Ça vaut un an de salaire d’un travailleur. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il n’a pas dit cela parce qu’il voulait vraiment aider les gens pauvres. Non, il a dit cela parce qu’il enviait l’argent. Il gardait le sac d’argent, et parfois il en prenait l’argent pour lui‑même. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Jésus a dit : Ne l’arrêtez pas ! Elle a gardé ce parfum pour le jour où ils enterreront mon corps mort. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les pauvres seront toujours avec vous, mais je ne vais pas être toujours avec vous. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En ce temps‑là, beaucoup de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont entendu que Jésus était à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: . Alors, ils sont venus là pour le voir. Ils sont venus aussi pour voir Lazare, parce que Jésus l’avait fait à nouveau vivant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' avaient déjà décidé de tuer Jésus. Ils ont décidé de tuer aussi Lazare. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils ont décidé de faire cela, parce que beaucoup de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' refusaient de leur obéir. Au lieu de cela, ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' croyaient en Jésus à cause de ce qu’il avait fait pour Lazare.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus va à Jérusalem comme '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le lendemain, beaucoup de gens sont venus à Jérusalem pour la fête. Ils ont entendu que Jésus était sur le chemin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ainsi, ils ont pris des branches de palmiers, et ils sont allés à la rencontre de Jésus. Ils criaient : Sauve‑nous maintenant ! Dieu est bon pour l’homme qui vient au nom du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Dieu est bon pour le roi d’Israël ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus a trouvé un jeune '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: '. Et il était assis dessus, comme il est dit dans l’Ancien Testament : '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'N’aie pas peur, fille de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sion
  - type: text
    text: '. Regarde ! Ton roi vient. Il est assis sur un jeune '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus ne comprenaient pas tout cela à ce moment‑là. Ils ont compris cela seulement après le retour de Jésus au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Puis ils se souvenaient que l’Ancien Testament a dit ces choses sur lui. Et ils se souvenaient des choses qui lui étaient arrivées. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La foule qui avait été avec Jésus avant, a continué à parler aux gens de Lazare. Jésus avait dit à Lazare de sortir du tombeau. Jésus avait fait Lazare à nouveau vivant après qu’il était mort. La foule a continué à parler aux gens à ce sujet. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voilà pourquoi tous les gens venaient à la rencontre de Jésus. Ils ont appris qu’il avait fait ce miracle. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' se sont dit ceci : Ce n’est pas ce que nous voulions. Regardez ! Tous les gens courent vers lui !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus dit qu’il va bientôt mourir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il y avait quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Grecs
  - type: text
    text: ' parmi les gens qui étaient venus pour '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' Dieu à la fête. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Grecs
  - type: text
    text: ' sont venus auprès de Philippe. Il était de la ville de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: ' en Galilée. Ils lui ont dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', nous voulons parler avec Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Philippe est allé auprès d’André et il lui a dit cela. Ensuite, Philippe et André sont allés auprès de Jésus et ils le lui ont dit. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus leur a dit : Dieu montrera à quel point le Fils de l’homme est bon et grand. Il est maintenant temps pour que cela se produise. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je vous dis la vérité. Une graine de blé continue d’être seulement une seule graine à moins qu’il ne meure. Elle doit tomber dans le sol et elle doit mourir. Mais si elle meurt, elle pousse et donne beaucoup de fruits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Celui qui aime sa vie la perdra. Mais celui qui hait sa vie dans ce monde vivra toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Celui qui veut être mon serviteur, qu’il me suive. Puis il sera avec moi, là où je suis. Mon Père fera de grandes choses pour quelqu’un qui est mon serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Maintenant, je me sens très triste. Et j’ai du mal dans mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Je pourrais dire : Père, sauve‑moi de cette période très difficile ! Mais je suis venu au monde pour cela. Je suis venu pour que je puisse traverser cette période difficile. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Père, montre à quel point tu es grand et bon. Puis quelqu’un a parlé du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '  : j’ai montré à quel point je suis grand et bon. Et je vais le faire à nouveau. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Beaucoup de gens étaient là. Ils ont entendu le son de cette voix. Et ces gens ont dit que c’était comme le bruit d’un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tonnerre
  - type: text
    text: '. Mais d’autres personnes ont dit : Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' lui a parlé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus a dit : Cette voix ne parlait pas pour m’aider. Non, elle parlait pour vous aider. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il est maintenant temps pour Dieu de juger les gens dans ce monde. Maintenant, il va jeter le prince de ce monde. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais quand les gens m’élèvent de la terre, alors je vais attirer tout le monde vers moi‑même. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il a dit cela pour montrer comment il mourra bientôt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'La foule a dit : Les Écritures (Ancien Testament) nous disent que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continuera toujours. Alors, pourquoi dites‑vous : Les gens doivent élever le Fils de l’homme ? Qui est ce Fils de l’homme ? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus a répondu : La lumière sera avec vous pour seulement un court temps. Donc, continuez de marcher pendant que vous avez encore la lumière. Puis l’obscurité ne viendra pas sur vous. Toute personne qui marche dans les ténèbres ne sait pas le chemin. Cette personne ne sait pas où elle va. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Croyez en la lumière, pendant que vous avez la lumière. Alors vous deviendrez fils de la lumière. Jésus a dit cela, après il est parti.
- type: usfm
  marker: m
  children:
  - type: text
    text: Et il s’est caché d’eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne croient toujours pas en Jésus'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus avait fait tant de miracles que les gens eux‑mêmes avaient vus. Mais même alors, ils ne croyaient pas encore. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Cela montre que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' Ésaïe avait dit de vraies paroles. Ésaïe avait dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', personne n’a cru à notre message. Personne n’a compris la puissance du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ésaïe a aussi parlé des raisons pour lesquelles les gens ne pouvaient pas croire. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il a dit : Dieu a fait leurs yeux incapables de voir. Il a fermé leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Donc, ils ne peuvent pas voir de leurs yeux, et ils ne peuvent pas comprendre avec leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Ils ne vont pas se tourner vers moi, afin que je puisse les guérir. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ésaïe avait vu à quel point '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est grand. Voilà pourquoi il a dit ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mais de nombreux dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont cru en Jésus. Mais ils ne disaient pas aux gens qu’ils croyaient. Ils ne parlaient pas de cela parce qu’ils avaient peur des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Ils avaient peur que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' allaient les renvoyer de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: synagogue
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ils voulaient que les gens les glorifient au lieu de plaire à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Jésus a dit à haute voix : Quiconque croit en moi, ne croit pas seulement en moi. Cette personne croit aussi en celui qui m’a envoyé.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les paroles de Jésus vont juger les gens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Toute personne qui me regarde ne me voit pas seulement. Cette personne voit aussi celui qui m’a envoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Je suis venu dans le monde pour être une lumière. Tous ceux qui croient en moi ne resteront pas dans l’obscurité. Voilà pourquoi je suis venu. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Certaines personnes peuvent entendre mes paroles, mais n’y obéissent pas. Je ne vais pas juger quelqu’un qui fait cela. Je ne suis pas venu pour juger les personnes dans le monde. Je suis venu pour les sauver. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Quelque chose d’autre va juger quelqu’un qui me refuse. Quelque chose d’autre va juger quelqu’un qui ne veut pas écouter mes paroles. Le message que je vous ai dit le jugera au dernier jour. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Les paroles que je vous ai dites, ne viennent pas de moi‑même. Elles viennent du Père, qui m’a envoyé. Il m’a dit ce qu’il faut dire. Et il m’a dit comment le dire. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Ce que le Père dit, fait vivre les gens pour toujours. Je le sais. Donc, je dis seulement les choses que le Père m’a dites.
