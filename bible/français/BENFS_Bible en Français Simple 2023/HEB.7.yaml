document_id: HEB.7,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 7
  - type: heading
    content: À propos de Melchisédek
  - type: text
    content: 'Melchisédek était le roi d’une ville appelée Salem. Il était aussi un '
  - type: text
    content: prêtre
  - type: text
    content: ' de Dieu qui règne sur tout. Melchisédek a rencontré Abraham à son retour d’une guerre. Les hommes d’Abraham venaient de gagner contre 4 rois avec leurs armées. À ce moment‑là, Melchisédek a demandé à Dieu de bénir Abraham. '
  '11':
  - type: text
    content: 'Les '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: ' étaient une partie nécessaire dans la loi de Dieu pour le peuple d’Israël. Mais ces '
  - type: text
    content: prêtres
  - type: text
    content: ' ne pouvaient pas rendre le peuple complètement en accord avec Dieu. Si cela était possible, les '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: ' pouvaient continuer leur travail. Mais nous voyons que Dieu a choisi un autre type de '
  - type: text
    content: prêtre
  - type: text
    content: ' pour le servir. Ce '
  - type: text
    content: prêtre
  - type: text
    content: ' n’est pas quelqu’un de la famille d’Aaron, comme les '
  - type: text
    content: Lévites
  - type: text
    content: '. Au lieu de cela, il est un '
  - type: text
    content: prêtre
  - type: text
    content: ' de la même manière que Melchisédek était le '
  - type: text
    content: prêtre
  - type: text
    content: ' de Dieu. '
  '12':
  - type: text
    content: 'Quand il y a un changement dans le genre de '
  - type: text
    content: prêtre
  - type: text
    content: ' comme ça, il doit aussi y avoir un changement dans la loi.'
  '13':
  - type: text
    content: 'C’est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' dont la Bible parle ainsi, en tant que '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial de Dieu. Mais il appartient à un groupe familial différent. Ce n’est pas un '
  - type: text
    content: Lévite
  - type: text
    content: '. Personne d’autre de son groupe familial n’a jamais servi Dieu comme '
  - type: text
    content: prêtre
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Nous savons que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' est venu du groupe familial de Juda. Moïse n’a jamais dit que les '
  - type: text
    content: prêtres
  - type: text
    content: ' pouvaient provenir de la famille de Juda. On voit donc que l’ancienne loi a changé.'
  - type: heading
    content: Jésus est un autre type de prêtre
  '15':
  - type: text
    content: 'Ce que nous avons dit devient encore plus clair maintenant. Un autre type de '
  - type: text
    content: prêtre
  - type: text
    content: ' est venu, qui est un '
  - type: text
    content: prêtre
  - type: text
    content: ' comme Melchisédek. '
  '16':
  - type: text
    content: 'Jésus n’est pas devenu '
  - type: text
    content: prêtre
  - type: text
    content: ' à cause d’une loi humaine. Il est devenu '
  - type: text
    content: prêtre
  - type: text
    content: ' de Dieu à cause de sa vie puissante que rien ne peut jamais détruire. '
  '17':
  - type: text
    content: 'La Bible parle de lui comme d’un '
  - type: text
    content: prêtre
  - type: text
    content: ' comme ceci :'
  - type: text
    content: 'Tu seras '
  - type: text
    content: prêtre
  - type: text
    content: ' pour toujours,'
  - type: text
    content: 'De la même manière que Melchisédek était le '
  - type: text
    content: prêtre
  - type: text
    content: ' de Dieu.'
  '18':
  - type: text
    content: 'L’ancienne loi sur les '
  - type: text
    content: prêtres
  - type: text
    content: ' n’a donc plus de pouvoir. C’était faible et ça ne pouvait pas aider les gens. '
  '19':
  - type: text
    content: Les lois de Dieu qu’il a données à Moïse ne pouvaient rien arranger complètement. Mais maintenant, Dieu nous a apporté quelque chose de mieux à espérer. Et de cette façon, nous pouvons nous approcher de Dieu.
  '2':
  - type: text
    content: 'De plus, Abraham a donné à Melchisédek une dixième partie de tout ce qu’il avait gagné dans le combat. Le nom Melchisédek signifie roi de tout ce qui est juste. Son autre nom, roi de Salem, signifie roi de paix. '
  '20':
  - type: text
    content: 'De plus, quand Dieu a dit que Jésus sera son '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial, il a fait une forte promesse. Lorsque les '
  - type: text
    content: Lévites
  - type: text
    content: ' sont devenus '
  - type: text
    content: prêtres
  - type: text
    content: ', il n’a pas fait une telle promesse. '
  '21':
  - type: text
    content: 'Mais quand Jésus est devenu '
  - type: text
    content: prêtre
  - type: text
    content: ' de Dieu, Dieu a fait une promesse forte. Dieu a dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu l’a promis fortement.'
  - type: text
    content: Il ne changera pas d’avis.
  - type: text
    content: 'Tu seras '
  - type: text
    content: prêtre
  - type: text
    content: ' pour toujours.'
  '22':
  - type: text
    content: Parce que Dieu a promis cela à Jésus, nous savons que son nouvel accord avec son peuple est très fort. C’est un bien meilleur accord que l’ancien.
  '23':
  - type: text
    content: 'Alors, il y avait beaucoup de '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: '. Chacun d’eux est mort, de sorte qu’ils ne pouvaient pas continuer à servir Dieu comme '
  - type: text
    content: prêtres
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Mais Jésus vit pour toujours, donc il ne laissera jamais d’être '
  - type: text
    content: prêtre
  - type: text
    content: '. '
  '25':
  - type: text
    content: Jésus est toujours vivant et il demande à Dieu d’aider son peuple. Ainsi, il peut sauver complètement tous ceux qui croient en lui. Il les conduira à Dieu.
  '26':
  - type: text
    content: 'Jésus est le genre de '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial dont nous avons besoin. Il appartient complètement à Dieu. Il n’a jamais rien fait de mal. Il est complètement bon et saint. Il est séparé de tous ceux qui font de mauvaises choses. Dieu l’a élevé à l’endroit le plus important du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Jésus n’est pas comme les '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: '. Ils doivent offrir des '
  - type: text
    content: sacrifices
  - type: text
    content: ' à Dieu chaque jour. Premièrement, ils offrent des '
  - type: text
    content: sacrifices
  - type: text
    content: ' pour que Dieu pardonne leurs propres péchés. Ensuite, ils offrent des '
  - type: text
    content: sacrifices
  - type: text
    content: ' au nom des autres personnes, afin que Dieu pardonne aussi leurs péchés. Mais Jésus a offert son '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour toujours. Ce '
  - type: text
    content: sacrifice
  - type: text
    content: ' était lui‑même. '
  '28':
  - type: text
    content: 'Dans l’ancien accord, la loi décidait qui deviendra '
  - type: text
    content: prêtres
  - type: text
    content: ' spéciaux. Parce que ces hommes sont faibles, ils font souvent de mauvaises choses. Mais la très grande promesse de Dieu est venue après la loi qu’il a donnée à Moïse. Avec cette promesse, Dieu a choisi son Fils pour être son '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial. Et son Fils est devenu tout ce que Dieu veut qu’il soit, complètement et pour toujours.'
  '3':
  - type: text
    content: 'Personne n’a écrit que Melchisédek avait un père ou une mère. Personne n’a écrit qu’il avait des ancêtres. Personne n’a écrit sur sa naissance ou sa mort. De cette façon, il semble que Melchisédek a toujours été '
  - type: text
    content: prêtre
  - type: text
    content: '. Il est comme le Fils de Dieu qui continue d’être '
  - type: text
    content: prêtre
  - type: text
    content: ' pour toujours.'
  '4':
  - type: text
    content: 'Alors, pensez à quel point cet homme, Melchisédek, était grand ! Même Abraham, l’ancêtre de tout le peuple d’Israël, a donné des cadeaux à Melchisédek. Abraham lui a donné une dixième partie de tout ce qu’il avait gagné dans le combat. '
  '5':
  - type: text
    content: 'Les hommes du groupe familial de Lévi qui deviennent '
  - type: text
    content: prêtres
  - type: text
    content: ' reçoivent des cadeaux de leur propre peuple. La loi de Dieu dit que le peuple doit donner aux '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: ' une dixième partie de ce qu’ils ont. Mais les '
  - type: text
    content: prêtres
  - type: text
    content: ' et les autres peuples sont tous des '
  - type: text
    content: Israélites
  - type: text
    content: '. Ils viennent tous de la famille d’Abraham. '
  '6':
  - type: text
    content: Pour ce qui est Melchisédek, il ne vient pas de la famille de Lévi. Mais il a quand même reçu une dixième partie de ce qu’Abraham avait. Il a également demandé à Dieu de bénir Abraham. Mais Abraham était celui qui avait déjà reçu les promesses de Dieu.
  '7':
  - type: text
    content: C’est toujours la personne la plus importante qui demande à Dieu de bénir une personne moins importante. Nous le savons certainement !
  '8':
  - type: text
    content: 'Les '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: ' reçoivent des dons, et ce sont des gens qui mourront un jour. Melchisédek a également reçu des cadeaux, mais on nous dit qu’il continue de vivre. '
  '9':
  - type: text
    content: 'Les '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: ' reçoivent leurs dons du peuple. Mais on pourrait dire que Lévi lui‑même a donné une dixième partie de ce qu’il avait à Melchisédek. Quand Abraham a donné sa dixième partie à Melchisédek, c’était comme si Lévi était là en lui. En ce temp‑là, Lévi n’était pas encore né, mais Abraham était son ancêtre.'
