document_id: HEB.7,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 7
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: À propos de Melchisédek
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Melchisédek était le roi d’une ville appelée Salem. Il était aussi un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' de Dieu qui règne sur tout. Melchisédek a rencontré Abraham à son retour d’une guerre. Les hommes d’Abraham venaient de gagner contre 4 rois avec leurs armées. À ce moment‑là, Melchisédek a demandé à Dieu de bénir Abraham. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: ' étaient une partie nécessaire dans la loi de Dieu pour le peuple d’Israël. Mais ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ne pouvaient pas rendre le peuple complètement en accord avec Dieu. Si cela était possible, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: ' pouvaient continuer leur travail. Mais nous voyons que Dieu a choisi un autre type de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' pour le servir. Ce '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' n’est pas quelqu’un de la famille d’Aaron, comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Lévites
    - type: text
      text: '. Au lieu de cela, il est un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' de la même manière que Melchisédek était le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' de Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il y a un changement dans le genre de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' comme ça, il doit aussi y avoir un changement dans la loi.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' dont la Bible parle ainsi, en tant que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial de Dieu. Mais il appartient à un groupe familial différent. Ce n’est pas un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Lévite
    - type: text
      text: '. Personne d’autre de son groupe familial n’a jamais servi Dieu comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons que notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est venu du groupe familial de Juda. Moïse n’a jamais dit que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' pouvaient provenir de la famille de Juda. On voit donc que l’ancienne loi a changé.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus est un autre type de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce que nous avons dit devient encore plus clair maintenant. Un autre type de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' est venu, qui est un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' comme Melchisédek. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus n’est pas devenu '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' à cause d’une loi humaine. Il est devenu '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' de Dieu à cause de sa vie puissante que rien ne peut jamais détruire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La Bible parle de lui comme d’un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' comme ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu seras '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' pour toujours,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De la même manière que Melchisédek était le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' de Dieu.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ancienne loi sur les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' n’a donc plus de pouvoir. C’était faible et ça ne pouvait pas aider les gens. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les lois de Dieu qu’il a données à Moïse ne pouvaient rien arranger complètement. Mais maintenant, Dieu nous a apporté quelque chose de mieux à espérer. Et de cette façon, nous pouvons nous approcher de Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, Abraham a donné à Melchisédek une dixième partie de tout ce qu’il avait gagné dans le combat. Le nom Melchisédek signifie roi de tout ce qui est juste. Son autre nom, roi de Salem, signifie roi de paix. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, quand Dieu a dit que Jésus sera son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial, il a fait une forte promesse. Lorsque les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Lévites
    - type: text
      text: ' sont devenus '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ', il n’a pas fait une telle promesse. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais quand Jésus est devenu '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' de Dieu, Dieu a fait une promesse forte. Dieu a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu l’a promis fortement.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne changera pas d’avis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu seras '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' pour toujours.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parce que Dieu a promis cela à Jésus, nous savons que son nouvel accord avec son peuple est très fort. C’est un bien meilleur accord que l’ancien.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, il y avait beaucoup de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: '. Chacun d’eux est mort, de sorte qu’ils ne pouvaient pas continuer à servir Dieu comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus vit pour toujours, donc il ne laissera jamais d’être '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus est toujours vivant et il demande à Dieu d’aider son peuple. Ainsi, il peut sauver complètement tous ceux qui croient en lui. Il les conduira à Dieu.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus est le genre de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial dont nous avons besoin. Il appartient complètement à Dieu. Il n’a jamais rien fait de mal. Il est complètement bon et saint. Il est séparé de tous ceux qui font de mauvaises choses. Dieu l’a élevé à l’endroit le plus important du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus n’est pas comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: '. Ils doivent offrir des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' à Dieu chaque jour. Premièrement, ils offrent des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' pour que Dieu pardonne leurs propres péchés. Ensuite, ils offrent des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' au nom des autres personnes, afin que Dieu pardonne aussi leurs péchés. Mais Jésus a offert son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour toujours. Ce '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' était lui‑même. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans l’ancien accord, la loi décidait qui deviendra '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' spéciaux. Parce que ces hommes sont faibles, ils font souvent de mauvaises choses. Mais la très grande promesse de Dieu est venue après la loi qu’il a donnée à Moïse. Avec cette promesse, Dieu a choisi son Fils pour être son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial. Et son Fils est devenu tout ce que Dieu veut qu’il soit, complètement et pour toujours.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne n’a écrit que Melchisédek avait un père ou une mère. Personne n’a écrit qu’il avait des ancêtres. Personne n’a écrit sur sa naissance ou sa mort. De cette façon, il semble que Melchisédek a toujours été '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: '. Il est comme le Fils de Dieu qui continue d’être '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' pour toujours.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, pensez à quel point cet homme, Melchisédek, était grand ! Même Abraham, l’ancêtre de tout le peuple d’Israël, a donné des cadeaux à Melchisédek. Abraham lui a donné une dixième partie de tout ce qu’il avait gagné dans le combat. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes du groupe familial de Lévi qui deviennent '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' reçoivent des cadeaux de leur propre peuple. La loi de Dieu dit que le peuple doit donner aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: ' une dixième partie de ce qu’ils ont. Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les autres peuples sont tous des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélites
    - type: text
      text: '. Ils viennent tous de la famille d’Abraham. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour ce qui est Melchisédek, il ne vient pas de la famille de Lévi. Mais il a quand même reçu une dixième partie de ce qu’Abraham avait. Il a également demandé à Dieu de bénir Abraham. Mais Abraham était celui qui avait déjà reçu les promesses de Dieu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est toujours la personne la plus importante qui demande à Dieu de bénir une personne moins importante. Nous le savons certainement !
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: ' reçoivent des dons, et ce sont des gens qui mourront un jour. Melchisédek a également reçu des cadeaux, mais on nous dit qu’il continue de vivre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: ' reçoivent leurs dons du peuple. Mais on pourrait dire que Lévi lui‑même a donné une dixième partie de ce qu’il avait à Melchisédek. Quand Abraham a donné sa dixième partie à Melchisédek, c’était comme si Lévi était là en lui. En ce temp‑là, Lévi n’était pas encore né, mais Abraham était son ancêtre.'
