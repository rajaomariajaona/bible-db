document_id: ACT.16
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 16
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Timothée voyage avec Paul et Silas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi Paul a voyagé à Derbe et à Lystre. Un homme appelé Timothée habitait à Lystre. Timothée était un croyant. Sa mère était une Juive croyante. Mais son père était grec. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tous ceux qui ont cru en Jésus à Lystre et Icone disaient de bonnes choses au sujet de Timothée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul a voulu que Timothée voyage avec lui. Tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à Lystre et Icone ont su que le père de Timothée était un Grec. Ainsi Paul a circoncis Timothée. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Paul, Silas et Timothée ont voyagé vers beaucoup de villes. Et ils ont lu aux croyants la lettre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' et des autres croyants en Jésus à Jérusalem. Ils ont dit : Cette lettre vous dit ce que vous devez faire. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' de Jérusalem se sont entendus au sujet de ces règles. Vous devez obéir à ces règles. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ainsi Paul aidait les groupes de croyants dans ces villes à croire et obéir à Jésus. Beaucoup plus de gens croyaient en Jésus chaque jour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul fait un rêve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le Saint‑Esprit n’a pas permis à Paul et ses compagnons d’enseigner en Asie. Ainsi Paul, Silas et Timothée ont voyagé à travers le pays entre les régions appelées Phrygie et Galatie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils sont arrivés dans la région appelée Mysie. Alors ils ont voulu entrer dans la région appelée Bithynie. Mais le Saint‑Esprit ne les a pas laissés partir là. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ainsi ils n’ont pas cessé de voyager et ils sont passés par la Mysie. Ils sont descendus à la ville appelée Troas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Paul a fait un rêve pendant la nuit où ils sont arrivés à Troas. Dans le rêve, il a vu un homme du pays appelé Macédoine. L’homme se tenait à côté de lui.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Cet homme disait : Je t’en prie, viens en Macédoine nous aider.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Après cette vision de Paul, nous nous sommes préparés pour le voyage en Macédoine. Nous avons compris que Dieu a voulu que nous allions en Macédoine. Il a voulu que nous disions au peuple là la Bonne Nouvelle au sujet de Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lydie devient une croyante
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous avons navigué de Troas. Le bateau nous a amené à travers la mer à une ville appelée Samothrace. Et puis, le jour suivant, nous sommes allés à un port appelé Néapolis. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous avons alors marché loin de la côte à Philippes. Cette ville est la ville la plus importante dans le pays appelé Macédoine. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' régnaient sur le peuple qui habitait à Philippes. Et nous sommes restés quelques jours dans cette ville. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le jour de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabbat
  - type: text
    text: ', nous sommes sortis de la porte de la ville. Nous sommes allés vers une rivière. Nous avons pensé que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' avaient un endroit spécial là. Nous avons pensé qu’ils se réunissaient là pour prier. Nous avons vu un groupe de femmes. Ainsi nous nous sommes assis et nous leur avons parlé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’une des femmes s’appelait Lydie. Elle nous écoutait. Elle était de la ville appelée Thyatire. Et elle a vendu le tissu rouge foncé cher. Lydie a su que Dieu est très puissant et important. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l’a aidée à comprendre le message de Paul. Ainsi elle a cru aux choses qu’il disait. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis Paul et ses amis ont baptisé Lydie et toutes les personnes qui vivaient dans sa maison. Après ceci, Lydie nous a parlé. Elle a dit : Si vous pensez que je crois vraiment au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', restez alors dans ma maison. Et ainsi nous sommes allés et nous sommes restés là avec elle.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: ' ont ordonné de mettre Paul et Silas en prison à Philippes'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Un jour, nous allions à l’endroit où les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' priaient Dieu. Sur le chemin là, une fille esclave nous a vus. Un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' vivait à l’intérieur d’elle. Ce mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' lui disait ce qui va se produire bientôt. Les gens donnaient beaucoup d’argent à ses maîtres quand elle leur disait ces futures choses. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle suivait Paul et nous, et elle criait : Ces hommes sont des serviteurs du plus grand Dieu ! Ils vous disent comment Dieu peut vous sauver ! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La fille esclave nous suivait et elle faisait cela pendant beaucoup de jours. Mais Paul n’était pas content de cela. Ainsi il s’est retourné et il a parlé au mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '  : Je t’ordonne au nom de Jésus. Laisse cette fille. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' l’a laissée immédiatement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ses maîtres ont compris que la fille ne pouvait plus obtenir de l’argent pour eux maintenant. Ainsi ils ont attrapé Paul et Silas. Ils les ont traînés sur la place publique en ville. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils les ont présentés devant les magistrats '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: '. C’était pour les juger. Ils disaient : Ces hommes sont des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et ils posent des problèmes dans notre ville. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils nous enseignent à faire de mauvaises choses. Ces choses sont contre les règles de notre ville. Nous sommes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' et ainsi nous ne pouvons pas les faire. Et nous ne pouvons pas accepter que ces choses soient exactes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les gens parlaient aussi contre Paul et Silas. Alors les magistrats ont dit aux soldats : Enlevez les vêtements de Paul et de Silas. Frappez‑les alors avec des bâtons !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les magistrats ont dit au gardien de la prison de les garder sérieusement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le gardien de la prison a entendu ceci. Ainsi il a mis Paul et Silas dans une chambre profondément à l’intérieur de la prison. Et il a mis leurs pieds entre de grands morceaux lourds en bois. C’était pour qu’ils ne puissent pas déplacer leurs jambes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Au milieu de la nuit, Paul et Silas priaient et chantaient des chansons à Dieu. Les autres personnes dans la prison les écoutaient. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: La terre a fortement et soudainement tremblé. Ainsi, les fondements de la prison étaient détruits. Immédiatement, toutes les portes de la prison se sont ouvertes. Les chaînes de tous les prisonniers sont tombées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le gardien de la prison s’est réveillé. Il a vu que les portes de la prison étaient ouvertes. Ainsi il a pensé que toutes les personnes de la prison étaient allées dehors. Il a décidé de se tuer. Ainsi il a retiré son long couteau pointu. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Paul lui a dit fortement : Ne te fais pas de mal ! Nous sommes toujours tous ici !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le gardien a dit : Apportez‐moi une lumière. Alors il a couru dans la salle où Paul et Silas étaient. Il avait très peur et il s’est mis à genoux devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Alors Le gardien a conduit Paul et Silas hors de la salle. Il leur a dit : Que dois‑je faire pour que Dieu me sauve ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Paul et Silas ont dit : Crois au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus et alors Dieu te sauvera. Il te sauvera toi et ta famille. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Paul et Silas ont dit la Parole de Dieu à l’homme et à tous les gens de sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ainsi, la même heure de la nuit, l’homme les a pris. Il les a menés dans une autre salle et il était gentil avec eux. Il a lavé les parties de leurs corps que les soldats avaient blessés. Alors juste après ceci, Paul et Silas ont baptisé l’homme et sa famille. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: L’homme a emmené Paul et Silas dans sa maison. Alors il leur a donné de la nourriture. L’homme et sa famille étaient très heureux, parce qu’ils ont maintenant tous cru en Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le matin suivant, les magistrats ont envoyé leurs huissiers à la prison avec un message. Ces huissiers ont dit au gardien de la prison : Laissez ces hommes partir. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Le gardien a dit à Paul : Les magistrats m’ont envoyé un message. Ils ont dit : Laissez Paul et Silas sortir de la prison. Maintenant vous pouvez quitter la prison. Personne ne vous fera de mal désormais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais Paul a parlé aux huissiers qui avaient apporté le message. Il a dit que les magistrats n’ont pas dit que nous avions fait quelque chose de mal. Mais ils ont commandé à leurs soldats de nous frapper avec des bâtons. Toutes les personnes les observaient quand ils nous faisaient cela. Nous sommes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ', mais ils nous ont mis en prison. Maintenant ils veulent que nous quittions la prison. Ils veulent que ceci soit un secret. Mais nous n’acceptons pas cela. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: ' ont le pouvoir. Ils doivent venir ici à la prison nous libérer eux‑mêmes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ainsi les huissiers sont retournés à leurs maîtres avec le message de Paul et de Silas. Les magistrats ont entendu que Paul et Silas étaient les personnes spéciales de Rome. Et alors ils avaient peur. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ainsi ils sont allés voir Paul et Silas en prison. Ils leur ont dit : Nous sommes tristes de ce que nous vous avons fait. Alors ils ont conduit Paul et Silas hors de la prison. Les magistrats leur ont alors dit : Quittez la ville maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Paul et Silas ont quitté la prison. Ils sont allés à la maison de Lydie. Là ils ont rencontré beaucoup de croyants. Paul et Silas leur disaient la Bonne Nouvelle. Puis Paul et Silas sont partis de la ville.
