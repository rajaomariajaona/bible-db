document_id: MAT.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Jean‑Baptiste prépare un chemin pour Jésus
  - type: text
    content: Durant ces jours‑là, Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' est apparu dans le  '
  - type: text
    content: désert
  - type: text
    content: ' de Judée. Il disait la Parole de Dieu aux gens.'
  '10':
  - type: text
    content: Vous êtes comme des arbres. Dieu a une hache prête à la partie la plus basse des arbres. Il permettra de couper tout arbre qui ne donne pas de bons fruits. Il va jeter ces arbres dans le feu.
  '11':
  - type: text
    content: 'Je vous baptise avec de l’eau. Cela montre à Dieu que vous regrettez les mauvaises choses que vous avez faites. Vous lui montrez que vous voulez maintenant obéir à sa loi. Mais un homme arrive bientôt. Il est plus grand que moi. Il est plus puissant que moi. Je ne mérite même pas de porter ses souliers. Il vous baptisera avec le  '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' et le feu. '
  '12':
  - type: text
    content: Il est comme un agriculteur avec un outil spécial dans sa main.
  - type: text
    content: Cet agriculteur lance le blé en l’air avec cet outil. Il fait cela pour enlever la partie dure et sèche qui est en dehors de la graine. Il ne peut pas utiliser cette partie difficile. Alors il la brûle dans un feu. Personne ne peut éteindre ce feu. Mais il va mettre les graines dans un endroit pour assurer leur sécurité.
  - type: heading
    content: Jean baptise Jésus
  '13':
  - type: text
    content: 'Alors Jésus est venu de la Galilée au '
  - type: text
    content: Jourdain
  - type: text
    content: '. Il voulait que Jean le baptise. '
  '14':
  - type: text
    content: 'Mais Jean ne voulait pas baptiser Jésus. Jean a dit à Jésus : Je devrais venir à toi pour me baptiser, mais tu me demandes de te baptiser.'
  '15':
  - type: text
    content: 'Jésus a répondu : Cette fois, fais ce que je te demande. Dieu veut que tu me baptises. Et nous devons faire tout ce qui est juste. Alors Jean a fait ce que Jésus lui a demandé de faire.'
  '16':
  - type: text
    content: 'Jean a baptisé Jésus. Après, Jésus est sorti des eaux. Alors Dieu a ouvert le  '
  - type: text
    content: ciel
  - type: text
    content: ' et Jésus a vu l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu qui descendait. Il descendait comme un oiseau (colombe). Cet oiseau s’est assis sur Jésus. '
  '17':
  - type: text
    content: 'Alors une voix venant du '
  - type: text
    content: ciel
  - type: text
    content: ' disait ceci :'
  - type: text
    content: Celui‑ci est mon Fils. Je l’aime beaucoup et il me rend très heureux.
  '2':
  - type: text
    content: 'Jean enseignait les gens qui allaient auprès de lui. Il leur disait : Arrêtez de faire de mauvaises choses. Le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: ' est proche.'
  '3':
  - type: text
    content: Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' est l’homme dont le  '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe avait parlé en ces termes : Une voix crie dans le  '
  - type: text
    content: désert
  - type: text
    content: .
  - type: text
    content: 'Le  '
  - type: text
    content: Seigneur
  - type: text
    content: ' vient. Donc, préparez le chemin sur lequel il va passer. Arrangez bien ses sentiers.'
  '4':
  - type: text
    content: 'Jean portait un vêtement fait des poils de  '
  - type: text
    content: chameau
  - type: text
    content: '. Il portait également une ceinture de cuir à sa hanche. Il mangeait des sauterelles et du miel sauvage (du '
  - type: text
    content: désert
  - type: text
    content: ).
  '5':
  - type: text
    content: 'Les gens qui vivaient à Jérusalem allaient voir Jean. Les gens de toute la Judée aussi allaient là. Les gens de tout le pays aux environs du '
  - type: text
    content: Jourdain
  - type: text
    content: ' allaient aussi le voir. '
  '6':
  - type: text
    content: 'Les gens confessaient leurs péchés. '
  '7':
  - type: text
    content: 'Beaucoup de  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et de  '
  - type: text
    content: Sadducéens
  - type: text
    content: ' venaient auprès de Jean. Ils voulaient que Jean les baptise. Jean leur a dit : Vous êtes comme des serpents dangereux. Vous essayez de fuir Dieu, parce qu’il est en colère contre vous. Il punira bientôt les gens qui font de mauvaises choses. '
  '8':
  - type: text
    content: 'Arrêtez de faire des choses que Dieu n’aime pas. Faites des choses qui montrent à Dieu que vous êtes tristes. '
  '9':
  - type: text
    content: 'Ne dites pas en vous‑mêmes : Abraham est notre ancêtre. Donc Dieu ne nous punira pas. Ecoutez ! Dieu peut faire de ces pierres des enfants pour Abraham ! '
