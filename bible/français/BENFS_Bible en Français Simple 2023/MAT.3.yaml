document_id: MAT.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' prépare un chemin pour Jésus'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Durant ces jours‑là, Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' est apparu dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' de Judée. Il disait la Parole de Dieu aux gens.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Vous êtes comme des arbres. Dieu a une hache prête à la partie la plus basse des arbres. Il permettra de couper tout arbre qui ne donne pas de bons fruits. Il va jeter ces arbres dans le feu.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je vous baptise avec de l’eau. Cela montre à Dieu que vous regrettez les mauvaises choses que vous avez faites. Vous lui montrez que vous voulez maintenant obéir à sa loi. Mais un homme arrive bientôt. Il est plus grand que moi. Il est plus puissant que moi. Je ne mérite même pas de porter ses souliers. Il vous baptisera avec le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' et le feu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il est comme un agriculteur avec un outil spécial dans sa main.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cet agriculteur lance le blé en l’air avec cet outil. Il fait cela pour enlever la partie dure et sèche qui est en dehors de la graine. Il ne peut pas utiliser cette partie difficile. Alors il la brûle dans un feu. Personne ne peut éteindre ce feu. Mais il va mettre les graines dans un endroit pour assurer leur sécurité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jean baptise Jésus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors Jésus est venu de la Galilée au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: '. Il voulait que Jean le baptise. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais Jean ne voulait pas baptiser Jésus. Jean a dit à Jésus : Je devrais venir à toi pour me baptiser, mais tu me demandes de te baptiser.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jésus a répondu : Cette fois, fais ce que je te demande. Dieu veut que tu me baptises. Et nous devons faire tout ce qui est juste. Alors Jean a fait ce que Jésus lui a demandé de faire.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jean a baptisé Jésus. Après, Jésus est sorti des eaux. Alors Dieu a ouvert le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et Jésus a vu l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu qui descendait. Il descendait comme un oiseau (colombe). Cet oiseau s’est assis sur Jésus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors une voix venant du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' disait ceci :'
  - type: usfm
    marker: m
    children:
    - type: text
      text: Celui‑ci est mon Fils. Je l’aime beaucoup et il me rend très heureux.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jean enseignait les gens qui allaient auprès de lui. Il leur disait : Arrêtez de faire de mauvaises choses. Le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' est proche.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' est l’homme dont le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Ésaïe avait parlé en ces termes : Une voix crie dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vient. Donc, préparez le chemin sur lequel il va passer. Arrangez bien ses sentiers.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jean portait un vêtement fait des poils de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: chameau
    - type: text
      text: '. Il portait également une ceinture de cuir à sa hanche. Il mangeait des sauterelles et du miel sauvage (du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ).
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les gens qui vivaient à Jérusalem allaient voir Jean. Les gens de toute la Judée aussi allaient là. Les gens de tout le pays aux environs du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: ' allaient aussi le voir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les gens confessaient leurs péchés. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Beaucoup de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' et de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' venaient auprès de Jean. Ils voulaient que Jean les baptise. Jean leur a dit : Vous êtes comme des serpents dangereux. Vous essayez de fuir Dieu, parce qu’il est en colère contre vous. Il punira bientôt les gens qui font de mauvaises choses. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Arrêtez de faire des choses que Dieu n’aime pas. Faites des choses qui montrent à Dieu que vous êtes tristes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ne dites pas en vous‑mêmes : Abraham est notre ancêtre. Donc Dieu ne nous punira pas. Ecoutez ! Dieu peut faire de ces pierres des enfants pour Abraham ! '
