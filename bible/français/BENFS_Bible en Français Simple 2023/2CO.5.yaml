document_id: 2CO.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Dieu a préparé un nouveau corps pour nous
  - type: text
    content: 'Nos corps sont comme une tente dans laquelle nous vivons ici sur terre. Un jour, cette maison prendra fin. Mais nous savons que Dieu nous donnera une nouvelle maison. Ce n’est pas une maison qu’un constructeur humain a construite. Dieu l’a construite pour nous dans le '
  - type: text
    content: ciel
  - type: text
    content: ' et nous y vivrons pour toujours. '
  '10':
  - type: text
    content: C’est parce que nous devons tous aller nous tenir devant Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' comme notre '
  - type: text
    content: juge
  - type: text
    content: . Il décidera des choses que nous avons faites au cours de nos vies ici sur terre. Si nous avons fait de bonnes ou de mauvaises choses, nous recevrons chacun ce qui lui convient.
  - type: heading
    content: Dieu fait de nous de nouvelles personnes en Jésus‑Christ
  '11':
  - type: text
    content: 'Nous savons que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous jugera, alors nous veillons à lui obéir. Pour cette raison, nous communiquons le message de Dieu aux gens. Nous voulons qu’ils croient en Dieu. Et Dieu lui‑même sait que nous essayons de faire ce qui est bien. J’espère que vous le savez aussi, quand vous pensez à cela.'
  '12':
  - type: text
    content: 'Nous n’essayons pas à nouveau de vous faire croire que notre travail est bon. Mais nous voulons vous donner l’occasion d’être fiers de nous. Ensuite, vous pourrez montrer aux faux enseignants qu’ils ont tort. Ils sont fiers de ce à quoi ils ressemblent à l’extérieur. Ils ne pensent pas à ce qu’ils sont vraiment en eux‑mêmes. '
  '13':
  - type: text
    content: Pour certaines personnes, nous pouvons sembler être fous. C’est parce que nous voulons servir Dieu. Mais si nous semblons être sages, c’est pour vous aider.
  '14':
  - type: text
    content: Quoi que nous fassions, nous le faisons parce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' nous aime. Nous savons qu’un seul homme, Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', est mort au nom de tous. Nous savons donc aussi que nous sommes tous morts avec lui. '
  '15':
  - type: text
    content: Il est mort pour nous tous. Ainsi, tant que nous vivons, nous ne vivons plus pour nous faire plaisir. Mais, nous vivons pour plaire à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . C’est lui qui est mort pour nous. Il est celui que Dieu a réveillé de la mort pour revivre.
  '16':
  - type: text
    content: Donc, cela change notre façon de penser sur les gens. Nous n’utilisons plus les idées humaines pour connaître les gens. Il y a un temps où nous pensions de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' comme les humains pensent. Mais maintenant, nous pensons sur lui très différemment ! '
  '17':
  - type: text
    content: Quand quelqu’un appartient à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', il devient une nouvelle personne. Son ancien mode de vie a disparu. Sa nouvelle vie a commencé !'
  '18':
  - type: text
    content: Tout cela, c’est ce que Dieu fait pour nous. À cause de ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait, Dieu nous a ramenés à lui, comme ses amis. Maintenant, il veut que nous amenions d’autres gens à devenir ses amis aussi. C’est le travail qu’il nous a confié. '
  '19':
  - type: text
    content: 'Le message de Dieu est le suivant : Par la mort de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', Dieu a ramené les gens du monde à lui‑même, comme ses amis. Il ne gardera plus leurs péchés dans ses pensées. C’est le message que Dieu veut que nous disions aux gens.'
  '2':
  - type: text
    content: 'Maintenant, pendant que nous sommes dans nos corps ici sur terre, nous pleurons à l’intérieur de nous‑mêmes. Nous voulons aller vivre dans notre maison qui est au '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '20':
  - type: text
    content: Ainsi, nous parlons aux gens au nom de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Cela se passe comme ceci : Quand nous parlons, Dieu lui‑même vous parle. Au nom de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', nous vous disons : S’il vous plaît, revenez à Dieu, comme ses amis !'
  '21':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' n’a jamais rien fait de mal. Mais Dieu l’a laissé souffrir comme s’il avait fait du mal. Il est mort comme une punition pour nos péchés. En conséquence, nous devenons justes avec Dieu lorsque nous appartenons à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Nous devenons justes, car il est juste.
  '3':
  - type: text
    content: Ce sera comme de nouveaux vêtements que nous porterons. Quand nous irons vivre là, nous ne serons pas sans vêtements et honteux.
  '4':
  - type: text
    content: 'Pendant que nous vivons encore dans nos corps ici sur terre, nous pleurons à l’intérieur de nous‑mêmes. Beaucoup de choses difficiles nous arrivent. Nous ne voulons pas vraiment enlever nos anciens corps. Mais nous voulons mettre nos nouveaux corps, comme de nouveaux vêtements. Lorsque cela se produira, nous n’aurons plus besoin de nos anciens corps morts. Mais, nous aurons de nouveaux corps qui vivront pour toujours. '
  '5':
  - type: text
    content: 'Dieu est celui qui nous a préparés à avoir une nouvelle vie au '
  - type: text
    content: ciel
  - type: text
    content: ' un jour. Il a donné son '
  - type: text
    content: Esprit
  - type: text
    content: ' pour être avec nous maintenant. Pour cette raison, nous savons que nous recevrons un jour toutes les bonnes choses de Dieu.'
  '6':
  - type: text
    content: Parce que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu est avec nous, nous continuons d’être courageux. Alors que nous vivons encore ici sur terre, nous savons que nous ne sommes pas encore chez nous avec le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Comme nous vivons ici, nous devons faire confiance en Dieu. Nous ne voyons pas encore les choses qui appartiennent au '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Nous sommes courageux, parce que nous faisons confiance en Dieu. Nous aimerions nous éloigner de nos corps ici sur terre. Ensuite, nous serons chez nous avec le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Et ce sera mieux ! '
  '9':
  - type: text
    content: 'Mais tout le temps, nous voulons plaire au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Nous voulons le faire pendant que nous sommes encore chez nous dans nos corps ici sur terre. Nous voulons aussi lui plaire quand nous nous éloignons de ces corps. '
