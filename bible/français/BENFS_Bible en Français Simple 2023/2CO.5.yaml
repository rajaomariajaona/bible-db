document_id: 2CO.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu a préparé un nouveau corps pour nous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nos corps sont comme une tente dans laquelle nous vivons ici sur terre. Un jour, cette maison prendra fin. Mais nous savons que Dieu nous donnera une nouvelle maison. Ce n’est pas une maison qu’un constructeur humain a construite. Dieu l’a construite pour nous dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et nous y vivrons pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maintenant, pendant que nous sommes dans nos corps ici sur terre, nous pleurons à l’intérieur de nous‑mêmes. Nous voulons aller vivre dans notre maison qui est au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce sera comme de nouveaux vêtements que nous porterons. Quand nous irons vivre là, nous ne serons pas sans vêtements et honteux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant que nous vivons encore dans nos corps ici sur terre, nous pleurons à l’intérieur de nous‑mêmes. Beaucoup de choses difficiles nous arrivent. Nous ne voulons pas vraiment enlever nos anciens corps. Mais nous voulons mettre nos nouveaux corps, comme de nouveaux vêtements. Lorsque cela se produira, nous n’aurons plus besoin de nos anciens corps morts. Mais, nous aurons de nouveaux corps qui vivront pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dieu est celui qui nous a préparés à avoir une nouvelle vie au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' un jour. Il a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' pour être avec nous maintenant. Pour cette raison, nous savons que nous recevrons un jour toutes les bonnes choses de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Parce que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu est avec nous, nous continuons d’être courageux. Alors que nous vivons encore ici sur terre, nous savons que nous ne sommes pas encore chez nous avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comme nous vivons ici, nous devons faire confiance en Dieu. Nous ne voyons pas encore les choses qui appartiennent au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous sommes courageux, parce que nous faisons confiance en Dieu. Nous aimerions nous éloigner de nos corps ici sur terre. Ensuite, nous serons chez nous avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Et ce sera mieux ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais tout le temps, nous voulons plaire au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Nous voulons le faire pendant que nous sommes encore chez nous dans nos corps ici sur terre. Nous voulons aussi lui plaire quand nous nous éloignons de ces corps. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est parce que nous devons tous aller nous tenir devant Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' comme notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: . Il décidera des choses que nous avons faites au cours de nos vies ici sur terre. Si nous avons fait de bonnes ou de mauvaises choses, nous recevrons chacun ce qui lui convient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu fait de nous de nouvelles personnes en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous savons que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous jugera, alors nous veillons à lui obéir. Pour cette raison, nous communiquons le message de Dieu aux gens. Nous voulons qu’ils croient en Dieu. Et Dieu lui‑même sait que nous essayons de faire ce qui est bien. J’espère que vous le savez aussi, quand vous pensez à cela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous n’essayons pas à nouveau de vous faire croire que notre travail est bon. Mais nous voulons vous donner l’occasion d’être fiers de nous. Ensuite, vous pourrez montrer aux faux enseignants qu’ils ont tort. Ils sont fiers de ce à quoi ils ressemblent à l’extérieur. Ils ne pensent pas à ce qu’ils sont vraiment en eux‑mêmes. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pour certaines personnes, nous pouvons sembler être fous. C’est parce que nous voulons servir Dieu. Mais si nous semblons être sages, c’est pour vous aider.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Quoi que nous fassions, nous le faisons parce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' nous aime. Nous savons qu’un seul homme, Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', est mort au nom de tous. Nous savons donc aussi que nous sommes tous morts avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il est mort pour nous tous. Ainsi, tant que nous vivons, nous ne vivons plus pour nous faire plaisir. Mais, nous vivons pour plaire à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . C’est lui qui est mort pour nous. Il est celui que Dieu a réveillé de la mort pour revivre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Donc, cela change notre façon de penser sur les gens. Nous n’utilisons plus les idées humaines pour connaître les gens. Il y a un temps où nous pensions de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' comme les humains pensent. Mais maintenant, nous pensons sur lui très différemment ! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quand quelqu’un appartient à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', il devient une nouvelle personne. Son ancien mode de vie a disparu. Sa nouvelle vie a commencé !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tout cela, c’est ce que Dieu fait pour nous. À cause de ce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait, Dieu nous a ramenés à lui, comme ses amis. Maintenant, il veut que nous amenions d’autres gens à devenir ses amis aussi. C’est le travail qu’il nous a confié. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le message de Dieu est le suivant : Par la mort de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', Dieu a ramené les gens du monde à lui‑même, comme ses amis. Il ne gardera plus leurs péchés dans ses pensées. C’est le message que Dieu veut que nous disions aux gens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ainsi, nous parlons aux gens au nom de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Cela se passe comme ceci : Quand nous parlons, Dieu lui‑même vous parle. Au nom de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', nous vous disons : S’il vous plaît, revenez à Dieu, comme ses amis !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' n’a jamais rien fait de mal. Mais Dieu l’a laissé souffrir comme s’il avait fait du mal. Il est mort comme une punition pour nos péchés. En conséquence, nous devenons justes avec Dieu lorsque nous appartenons à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Nous devenons justes, car il est juste.
