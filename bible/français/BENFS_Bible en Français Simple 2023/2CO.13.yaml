document_id: 2CO.13,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 13
  - type: heading
    content: Troisième visite de Paul à Corinthe
  - type: text
    content: 'C’est la troisième fois que je viens vous rendre visite. Rappelez‑vous ceci : Il doit y avoir 2 ou 3 personnes pour dire certainement qu’une autre personne a fait quelque chose de mal. 2 ou 3 personnes doivent s’entendre sur ce qui s’est passé. '
  '10':
  - type: text
    content: 'C’est pourquoi je vous écris ces choses maintenant, pendant que je suis loin de vous. Ensuite, quand j’arriverai, je n’aurai pas besoin d’être en colère contre vous. Je n’aurai pas à utiliser mon pouvoir pour vous punir. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m’a donné ce pouvoir pour vous aider à devenir plus forts en tant que croyants. Il ne me l’a pas donné pour que je puisse vous détruire.'
  - type: heading
    content: Paul termine sa lettre
  '11':
  - type: text
    content: 'Maintenant, je vous dis au revoir, mes amis chrétiens. Faites seulement ce qui est bien. Que mon message vous rende forts. Entendez‑vous les uns les autres. Vivez ensemble en paix. Je prie pour que Dieu soit avec vous. Il est celui qui nous aime et nous donne la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Lorsque vous vous rencontrez, embrassez‑vous en frères et sœurs chrétiens. '
  '13':
  - type: text
    content: 'Le peuple entier de Dieu ici vous dit bonjour. '
  '14':
  - type: text
    content: 'Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continue d’être très gentil avec vous tous. Je prie pour que l’amour de Dieu soit avec vous.'
  - type: text
    content: 'Et je prie pour que le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' vous aide à vous servir mutuellement comme amis.'
  '2':
  - type: text
    content: 'J’ai déjà averti ces personnes qui ont fait de mauvaises choses auparavant. Je l’ai fait lors de ma deuxième visite. Maintenant je les préviens encore, alors que je suis loin de vous. Alors, quand je viendrai auprès de vous la prochaine fois, personne ne sera libre. Je punirai ces gens et tous ceux qui ont fait de mauvaises choses. '
  '3':
  - type: text
    content: Cela vous montrera ce que vous voulez savoir sur moi. Vous saurez sûrement que je parle avec le pouvoir de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même. Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' n’est pas faible quand il travaille en vous. Il montre sa puissance parmi vous. '
  '4':
  - type: text
    content: Les gens ont tué Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' sur la croix comme une personne faible. Mais il vit maintenant par la puissance de Dieu. Nous sommes également faibles lorsque nous servons Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', comme il était faible. Mais nous vivons, car il vit maintenant. Ainsi, lorsque nous viendrons à vous, nous montrerons la puissance de Dieu parmi vous.'
  '5':
  - type: text
    content: Réfléchissez bien à la façon dont vous vivez. Croyez‑vous vraiment au message concernant Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '  ? J’espère que vous savez que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est en vous. Vous devez le savoir, sauf si vous avez complètement échoué. '
  '6':
  - type: text
    content: J’espère que vous saurez que nous n’avons pas échoué. Nous appartenons à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', comme vous.'
  '7':
  - type: text
    content: 'Maintenant, nous prions Dieu que vous ne fassiez rien de mal. Nous ne prions pas cela pour montrer que Dieu nous a acceptés comme bons. Nous prions comme cela, parce que nous voulons que vous fassiez ce qui est bien. Nous le voulons, même si nous semblons avoir échoué. '
  '8':
  - type: text
    content: 'Nous pouvons travailler pour montrer seulement ce qui est vrai. Nous ne pouvons rien faire contre ce qui est vrai. '
  '9':
  - type: text
    content: Nous sommes heureux lorsque nous sommes faibles. Mais vous, vous devenez forts. Nous prions pour que vous deveniez meilleurs.
