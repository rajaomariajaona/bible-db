document_id: 2CO.13,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Troisième visite de Paul à Corinthe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est la troisième fois que je viens vous rendre visite. Rappelez‑vous ceci : Il doit y avoir 2 ou 3 personnes pour dire certainement qu’une autre personne a fait quelque chose de mal. 2 ou 3 personnes doivent s’entendre sur ce qui s’est passé. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi je vous écris ces choses maintenant, pendant que je suis loin de vous. Ensuite, quand j’arriverai, je n’aurai pas besoin d’être en colère contre vous. Je n’aurai pas à utiliser mon pouvoir pour vous punir. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m’a donné ce pouvoir pour vous aider à devenir plus forts en tant que croyants. Il ne me l’a pas donné pour que je puisse vous détruire.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul termine sa lettre
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je vous dis au revoir, mes amis chrétiens. Faites seulement ce qui est bien. Que mon message vous rende forts. Entendez‑vous les uns les autres. Vivez ensemble en paix. Je prie pour que Dieu soit avec vous. Il est celui qui nous aime et nous donne la paix dans nos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous vous rencontrez, embrassez‑vous en frères et sœurs chrétiens. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple entier de Dieu ici vous dit bonjour. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prie pour que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' continue d’être très gentil avec vous tous. Je prie pour que l’amour de Dieu soit avec vous.'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et je prie pour que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' vous aide à vous servir mutuellement comme amis.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai déjà averti ces personnes qui ont fait de mauvaises choses auparavant. Je l’ai fait lors de ma deuxième visite. Maintenant je les préviens encore, alors que je suis loin de vous. Alors, quand je viendrai auprès de vous la prochaine fois, personne ne sera libre. Je punirai ces gens et tous ceux qui ont fait de mauvaises choses. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cela vous montrera ce que vous voulez savoir sur moi. Vous saurez sûrement que je parle avec le pouvoir de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même. Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' n’est pas faible quand il travaille en vous. Il montre sa puissance parmi vous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les gens ont tué Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' sur la croix comme une personne faible. Mais il vit maintenant par la puissance de Dieu. Nous sommes également faibles lorsque nous servons Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', comme il était faible. Mais nous vivons, car il vit maintenant. Ainsi, lorsque nous viendrons à vous, nous montrerons la puissance de Dieu parmi vous.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Réfléchissez bien à la façon dont vous vivez. Croyez‑vous vraiment au message concernant Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '  ? J’espère que vous savez que Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est en vous. Vous devez le savoir, sauf si vous avez complètement échoué. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’espère que vous saurez que nous n’avons pas échoué. Nous appartenons à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', comme vous.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, nous prions Dieu que vous ne fassiez rien de mal. Nous ne prions pas cela pour montrer que Dieu nous a acceptés comme bons. Nous prions comme cela, parce que nous voulons que vous fassiez ce qui est bien. Nous le voulons, même si nous semblons avoir échoué. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous pouvons travailler pour montrer seulement ce qui est vrai. Nous ne pouvons rien faire contre ce qui est vrai. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous sommes heureux lorsque nous sommes faibles. Mais vous, vous devenez forts. Nous prions pour que vous deveniez meilleurs.
