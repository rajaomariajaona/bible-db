document_id: EPH.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Dieu nous a donné beaucoup de choses en Christ
  - type: text
    content: 'C’est moi Paul qui écris cette lettre. Dieu m’a choisi d’être un '
  - type: text
    content: apôtre
  - type: text
    content: ' au nom de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  - type: text
    content: Je m’adresse à vous, les gens de Dieu à Éphèse. Vous continuez de croire et d’obéir à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Dieu terminera son but quand le temps finira complètement. Puis il rassemblera les choses dans les cieux. Il rassemblera aussi les choses sur la terre. Dieu rassemblera tout en '
  - type: text
    content: Christ
  - type: text
    content: ', avec '
  - type: text
    content: Christ
  - type: text
    content: ' comme la tête (le chef).'
  '11':
  - type: text
    content: 'En '
  - type: text
    content: Christ
  - type: text
    content: ', Dieu nous a choisis d’être son propre peuple. Dieu avait déjà décidé que c’était son but. Et il fait toutes les choses selon ce qu’il avait lui‑même décidé de faire. '
  '12':
  - type: text
    content: 'Dieu voulait que nous montrions combien il est très grand et bon. Nous montrons cela après. Nous avons d’abord certainement espéré cela à cause de '
  - type: text
    content: Christ
  - type: text
    content: .
  '13':
  - type: text
    content: 'Et vous êtes devenus aussi unis avec le '
  - type: text
    content: Christ
  - type: text
    content: '. Cela est arrivé après que vous avez entendu le vrai message. Vous avez entendu la Bonne Nouvelle sur la façon dont Dieu vous sauve. Puis, quand vous avez cru, Dieu vous a donné son '
  - type: text
    content: Esprit
  - type: text
    content: '. Il vous a donné son '
  - type: text
    content: Esprit
  - type: text
    content: ', comme il avait promis. Il vous a donné son '
  - type: text
    content: Esprit
  - type: text
    content: . C’était pour vous montrer certainement que vous lui appartenez.
  '14':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu est ce que Dieu va nous donner d’abord. Dieu nous a rachetés pour être son propre peuple. Dieu nous donne son '
  - type: text
    content: Esprit
  - type: text
    content: ' jusqu’à ce qu’il nous rende complètement libres. Et puis nous allons remercier Dieu. Nous allons montrer comment il est très grand et bon.'
  - type: heading
    content: Christ est le chef de son corps
  '15':
  - type: text
    content: 'Les gens m’ont dit comment vous continuez à croire en Jésus. Ils m’ont dit que vous aimez tous les gens de Dieu. Donc, depuis que j’ai entendu ces choses sur vous, '
  '16':
  - type: text
    content: 'je ne cesse de remercier Dieu à cause de vous. Et quand je prie, je me souviens de prier pour vous. '
  '17':
  - type: text
    content: 'Je prie le très grand et bon Père, qui est le Dieu de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Je prie qu’il vous amène à comprendre les choses par son '
  - type: text
    content: Esprit
  - type: text
    content: .
  - type: text
    content: 'Je demande à Dieu de vous montrer des choses par son '
  - type: text
    content: Esprit
  - type: text
    content: '. Ainsi, vous pouvez vraiment le connaître. '
  '18':
  - type: text
    content: 'Je prie pour que Dieu ouvre vos '
  - type: text
    content: esprits
  - type: text
    content: . Alors vous comprendrez ce qu’il avait choisi de vous donner. Vous saurez les bonnes choses. Il vous a fait espérer certainement ces bonnes choses. Vous saurez de très grandes et riches choses. Il les avait préparées pour son peuple.
  '19':
  - type: text
    content: 'Et vous saurez comment Dieu est très puissant pour nous. Il est plus puissant que quelqu’un ou quelque chose d’autre que nous qui croyons en lui. Dieu travaille en nous par la même puissance forte. '
  '2':
  - type: text
    content: 'Je prie pour que Dieu, notre Père, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continuent d’être très gentils avec vous. Je prie pour qu’ils vous donnent la paix dans votre cœur.'
  - type: text
    content: 'Dieu nous a donné beaucoup de choses en '
  - type: text
    content: Christ
  - type: text
    content: .
  '20':
  - type: text
    content: 'C’est comme il le faisait en '
  - type: text
    content: Christ
  - type: text
    content: '. Il a travaillé puissamment à élever '
  - type: text
    content: Christ
  - type: text
    content: '. Ainsi il est devenu de nouveau vivant après sa mort. Dieu a puissamment travaillé. Il a fait asseoir '
  - type: text
    content: Christ
  - type: text
    content: ' à son côté droit dans le '
  - type: text
    content: ciel
  - type: text
    content: .
  '21':
  - type: text
    content: 'Là, '
  - type: text
    content: Christ
  - type: text
    content: ' règne sur tout autre chef et sur tout ce qui a autorité. '
  - type: text
    content: Christ
  - type: text
    content: ' est beaucoup plus grand que toute autre puissance ou tout autre maître. Il règne sur tous les noms que toute personne ou l’'
  - type: text
    content: esprit
  - type: text
    content: ' utilise pour avoir l’autorité. '
  - type: text
    content: Christ
  - type: text
    content: ' règne sur eux maintenant, dans ce monde. Et il dominera sur eux dans le monde qui va venir.'
  '22':
  - type: text
    content: 'Dieu a mis toutes choses sous les pieds de '
  - type: text
    content: Christ
  - type: text
    content: ' (l’autorité). Dieu a fait '
  - type: text
    content: Christ
  - type: text
    content: ', le chef, la tête sur toutes choses de l’Église, '
  '23':
  - type: text
    content: 'qui est le corps de '
  - type: text
    content: Christ
  - type: text
    content: '. L’Église est pleine de '
  - type: text
    content: Christ
  - type: text
    content: ', qui remplit toutes choses partout.'
  '3':
  - type: text
    content: 'Nous devons remercier Dieu, le Père de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', très bien ! Il a été aussi très bon à nous ! Il nous a donné toute bonne chose spirituelle au '
  - type: text
    content: ciel
  - type: text
    content: ', parce que nous sommes unis avec le '
  - type: text
    content: Christ
  - type: text
    content: '  ! '
  '4':
  - type: text
    content: 'Cela est vrai, parce qu’il nous a choisis d’appartenir à '
  - type: text
    content: Christ
  - type: text
    content: '. Dieu nous a choisis en '
  - type: text
    content: Christ
  - type: text
    content: ' avant de faire le monde. Il nous a choisis en '
  - type: text
    content: Christ
  - type: text
    content: ' pour être complètement bons. Alors maintenant, Dieu pense qu’il n’y a rien de mal avec nous. Dieu nous a aimés. '
  '5':
  - type: text
    content: Donc, il avait déjà décidé de nous amener à lui‑même pour être ses fils par Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Il a décidé de le faire, parce que cela le rendait très heureux. '
  '6':
  - type: text
    content: 'Nous devons donc le remercier très bien. La raison est parce qu’il est très grand et gentil avec nous. Dieu a été très gentil avec nous par son fils, qu’il aime beaucoup. '
  '7':
  - type: text
    content: Christ
  - type: text
    content: ' nous a rachetés par son sang, pour nous libérer. En '
  - type: text
    content: Christ
  - type: text
    content: ', Dieu a pardonné toutes les mauvaises choses que nous faisons. Dieu a fait ces grandes choses, parce qu’il est très gentil envers nous. '
  '8':
  - type: text
    content: 'Il a fait beaucoup pour nous, parce qu’il savait tout sur nous. Il comprenait vraiment nos besoins. '
  '9':
  - type: text
    content: 'Dieu nous a montré les choses secrètes que lui‑même voulait faire. Il a montré son propre but secret qui le rend très heureux. '
