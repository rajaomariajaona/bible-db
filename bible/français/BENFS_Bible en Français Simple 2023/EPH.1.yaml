document_id: EPH.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Dieu nous a donné beaucoup de choses en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est moi Paul qui écris cette lettre. Dieu m’a choisi d’être un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: ' au nom de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Je m’adresse à vous, les gens de Dieu à Éphèse. Vous continuez de croire et d’obéir à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je prie pour que Dieu, notre Père, et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continuent d’être très gentils avec vous. Je prie pour qu’ils vous donnent la paix dans votre cœur.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dieu nous a donné beaucoup de choses en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous devons remercier Dieu, le Père de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', très bien ! Il a été aussi très bon à nous ! Il nous a donné toute bonne chose spirituelle au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ', parce que nous sommes unis avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '  ! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cela est vrai, parce qu’il nous a choisis d’appartenir à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dieu nous a choisis en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' avant de faire le monde. Il nous a choisis en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' pour être complètement bons. Alors maintenant, Dieu pense qu’il n’y a rien de mal avec nous. Dieu nous a aimés. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Donc, il avait déjà décidé de nous amener à lui‑même pour être ses fils par Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il a décidé de le faire, parce que cela le rendait très heureux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous devons donc le remercier très bien. La raison est parce qu’il est très grand et gentil avec nous. Dieu a été très gentil avec nous par son fils, qu’il aime beaucoup. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' nous a rachetés par son sang, pour nous libérer. En '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', Dieu a pardonné toutes les mauvaises choses que nous faisons. Dieu a fait ces grandes choses, parce qu’il est très gentil envers nous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il a fait beaucoup pour nous, parce qu’il savait tout sur nous. Il comprenait vraiment nos besoins. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu nous a montré les choses secrètes que lui‑même voulait faire. Il a montré son propre but secret qui le rend très heureux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu terminera son but quand le temps finira complètement. Puis il rassemblera les choses dans les cieux. Il rassemblera aussi les choses sur la terre. Dieu rassemblera tout en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', avec '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' comme la tête (le chef).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', Dieu nous a choisis d’être son propre peuple. Dieu avait déjà décidé que c’était son but. Et il fait toutes les choses selon ce qu’il avait lui‑même décidé de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu voulait que nous montrions combien il est très grand et bon. Nous montrons cela après. Nous avons d’abord certainement espéré cela à cause de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et vous êtes devenus aussi unis avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Cela est arrivé après que vous avez entendu le vrai message. Vous avez entendu la Bonne Nouvelle sur la façon dont Dieu vous sauve. Puis, quand vous avez cru, Dieu vous a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: '. Il vous a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ', comme il avait promis. Il vous a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: . C’était pour vous montrer certainement que vous lui appartenez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu est ce que Dieu va nous donner d’abord. Dieu nous a rachetés pour être son propre peuple. Dieu nous donne son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' jusqu’à ce qu’il nous rende complètement libres. Et puis nous allons remercier Dieu. Nous allons montrer comment il est très grand et bon.'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est le chef de son corps'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les gens m’ont dit comment vous continuez à croire en Jésus. Ils m’ont dit que vous aimez tous les gens de Dieu. Donc, depuis que j’ai entendu ces choses sur vous, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'je ne cesse de remercier Dieu à cause de vous. Et quand je prie, je me souviens de prier pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je prie le très grand et bon Père, qui est le Dieu de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Je prie qu’il vous amène à comprendre les choses par son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je demande à Dieu de vous montrer des choses par son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: '. Ainsi, vous pouvez vraiment le connaître. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je prie pour que Dieu ouvre vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Alors vous comprendrez ce qu’il avait choisi de vous donner. Vous saurez les bonnes choses. Il vous a fait espérer certainement ces bonnes choses. Vous saurez de très grandes et riches choses. Il les avait préparées pour son peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et vous saurez comment Dieu est très puissant pour nous. Il est plus puissant que quelqu’un ou quelque chose d’autre que nous qui croyons en lui. Dieu travaille en nous par la même puissance forte. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est comme il le faisait en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il a travaillé puissamment à élever '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Ainsi il est devenu de nouveau vivant après sa mort. Dieu a puissamment travaillé. Il a fait asseoir '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à son côté droit dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Là, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' règne sur tout autre chef et sur tout ce qui a autorité. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est beaucoup plus grand que toute autre puissance ou tout autre maître. Il règne sur tous les noms que toute personne ou l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' utilise pour avoir l’autorité. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' règne sur eux maintenant, dans ce monde. Et il dominera sur eux dans le monde qui va venir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dieu a mis toutes choses sous les pieds de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' (l’autorité). Dieu a fait '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', le chef, la tête sur toutes choses de l’Église, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'qui est le corps de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. L’Église est pleine de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui remplit toutes choses partout.'
