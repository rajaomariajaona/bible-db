document_id: MAT.23,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 23
  - type: heading
    content: Jésus parle des enseignants dangereux
  - type: text
    content: 'Après cela, Jésus a parlé à la foule et à ses  '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ne vous faites pas appeler chefs. Vous avez un seul Chef. Et c’est le  '
  - type: text
    content: Christ
  - type: text
    content: .
  '11':
  - type: text
    content: 'Celui qui est le plus important parmi vous, sera votre serviteur. '
  '12':
  - type: text
    content: Quelqu’un peut penser qu’il est lui‑même très important. Mais Dieu rendra cette personne moins importante. Quelqu’un peut penser qu’il est moins important. Mais Dieu rendra cette personne plus importante.
  - type: heading
    content: Jésus a dit aux enseignants de la loi de Dieu et aux Pharisiens qu’ils sont hypocrites
  '13':
  - type: text
    content: 'Jésus a parlé aux enseignants de la loi de Dieu et aux '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Il a dit : Vous êtes malheureux. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '. Vous fermez aux gens la porte du '
  - type: text
    content: Royaume des cieux
  - type: text
    content: '. Ils veulent aller et savoir comment Dieu règne. Vous n’irez pas vous‑mêmes dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: . Et vous ne laissez pas entrer là d’autres personnes qui veulent y entrer.
  '14':
  - type: text
    content: 'Vous êtes malheureux, enseignants de la loi de Dieu et  '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '  ! Vous prenez les choses des femmes, dont les maris sont morts. Vous voulez que les gens pensent de bonnes choses sur vous. Alors vous priez pendant un long moment. Dieu vous punira plus que des gens qui n’ont pas fait ces choses.'
  '15':
  - type: text
    content: 'Vous êtes malheureux, enseignants de la loi de Dieu et  '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: . Vous voyagez à travers la terre et sur la mer. Vous faites cela pour amener quelqu’un à croire à ce que vous croyez. Puis, quand il croit, il devient pire que vous. Il fait plus de mauvaises choses que vous. Donc, vous le ferez aller en enfer.
  '16':
  - type: text
    content: 'Vous êtes malheureux, vous guides aveugles. Vous dites : Quelqu’un peut faire une promesse prenant le  '
  - type: text
    content: Temple
  - type: text
    content: ' comme témoin. Mais cette promesse ne signifie rien. Quelqu’un peut faire une promesse prenant l’or qui est dans le  '
  - type: text
    content: Temple
  - type: text
    content: ' comme témoin. Alors cette personne doit accomplir cette promesse. '
  '17':
  - type: text
    content: 'Vous êtes comme des aveugles. Et vous êtes comme des fous. Sachez que le  '
  - type: text
    content: Temple
  - type: text
    content: ' est plus important que l’or. L’or est sanctifié parce qu’il est dans le  '
  - type: text
    content: Temple
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Vous enseignez aussi aux gens ceci : Quelqu’un peut faire une promesse avec l’autel comme témoin. Mais cette promesse ne signifie rien. Quelqu’un peut faire une promesse avec l’offrande sur l’autel comme témoin. Alors il doit accomplir cette promesse. '
  '19':
  - type: text
    content: Vous êtes comme des aveugles. Sachez que l’autel est plus important que l’offrande. L’offrande est sanctifiée parce qu’elle est sur l’autel.
  '2':
  - type: text
    content: 'Les enseignants de la loi de Dieu et les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' enseignent la loi que Dieu avait donnée à Moïse. '
  '20':
  - type: text
    content: 'Quelqu’un peut faire une promesse prenant l’autel comme témoin. Alors tout ce qui est sur l’autel est aussi témoin. '
  '21':
  - type: text
    content: 'Quelqu’un peut faire une promesse prenant le  '
  - type: text
    content: Temple
  - type: text
    content: ' comme témoin. Alors Dieu, qui vit dans le  '
  - type: text
    content: Temple
  - type: text
    content: ' est aussi témoin. '
  '22':
  - type: text
    content: 'Quelqu’un peut faire une promesse avec le  '
  - type: text
    content: ciel
  - type: text
    content: ' comme témoin. Si cette personne fait cela, elle inclut le trône de Dieu. Et le trône de Dieu inclut Dieu qui s’assied sur son trône. '
  '23':
  - type: text
    content: 'Vous êtes malheureux, enseignants de la loi et  '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '  ! Vous obéissez seulement aux très petites choses dans la loi. Vous donnez à Dieu une dixième partie de vos choses comme la menthe, l’aneth et le cumin. Ceci est une petite chose dans la loi à laquelle vous obéissez. Mais vous n’obéissez pas aux parties les plus importantes de la loi. C’est important d’être bon et gentil à d’autres personnes. C’est également important de croire et d’obéir à Dieu. Faites ces choses importantes. Faites aussi d’autres choses moins importantes. '
  '24':
  - type: text
    content: 'Vous êtes comme un homme qui ne peut pas voir. Mais vous montrez à d’autres personnes le chemin. Vous filtrez vos boissons. Vous en éliminez une petite mouche. Mais vous avalez un  '
  - type: text
    content: chameau
  - type: text
    content: .
  '25':
  - type: text
    content: 'Vous êtes malheureux, enseignants de la loi et  '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '  ! Vous êtes comme quelqu’un qui prend soin de laver l’extérieur d’une coupe et d’un plat. L’intérieur de la coupe et du plat sont également sales. Mais vous ne les lavez pas. La saleté est comme les choses que vous faites. Vous voulez avoir beaucoup plus de choses. Vous faites du mal aux gens pour obtenir ce que vous voulez.'
  '26':
  - type: text
    content: 'Vous êtes aveugles, '
  - type: text
    content: Pharisiens
  - type: text
    content: . Vous devez d’abord nettoyer l’intérieur de la coupe et du plat. Ensuite, l’extérieur sera également propre.
  '27':
  - type: text
    content: 'Vous êtes malheureux, enseignants de la loi et  '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '  ! Vous êtes comme des tombeaux. Ces tombeaux ont la couleur blanche à l’extérieur. Ils sont beaux à voir. Mais ces tombeaux sont pleins d’ossements des morts à l’intérieur. Il y a aussi toutes sortes de choses sales à l’intérieur là. '
  '28':
  - type: text
    content: 'Vous êtes comme ces tombeaux. D’autres personnes vous regardent. Elles pensent que vous obéissez à Dieu. Mais vraiment, vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: ' et vous faites beaucoup de très mauvaises choses.'
  '29':
  - type: text
    content: 'Enseignants de la loi et  '
  - type: text
    content: Pharisiens
  - type: text
    content: ', les choses vont être mauvaises pour vous. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '  ! Vous construisez de beaux endroits. Vous enterrez les  '
  - type: text
    content: prophètes
  - type: text
    content: ' dans ces lieux après leur mort. Vous faites beaux des endroits où vous avez enterré de bonnes personnes.'
  '3':
  - type: text
    content: 'Ecoutez donc tout ce qu’ils vous enseignent. Obéissez à cela. Mais ne faites pas ce qu’ils font. Ils ne font pas ce qu’ils enseignent. '
  '30':
  - type: text
    content: 'Vous dites : Nos ancêtres avaient tué les  '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu. Si nous avions vécu à cette époque, nous ne pourrions pas les aider à tuer les  '
  - type: text
    content: prophètes
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Donc, vous parlez contre vous‑mêmes. Vous dites que vous êtes les fils de ces personnes. Ces gens avaient tué les  '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu. '
  '32':
  - type: text
    content: Accomplissez les péchés que vos ancêtres avaient faits !
  '33':
  - type: text
    content: 'Vous êtes comme de serpents et comme une famille de serpents dangereux. Vous ne serez pas en mesure de fuir. Je suis sûr que Dieu vous jugera. Et il vous enverra en enfer. '
  '34':
  - type: text
    content: 'Donc, je vous envoie des '
  - type: text
    content: prophètes
  - type: text
    content: '. Je vous envoie aussi des gens qui savent beaucoup de choses. Et je vous envoie aussi des gens pour vous enseigner. Mais vous allez tuer certaines de ces personnes. Vous tuerez certaines d’entre elles sur une croix. Dans les endroits où vous vous rencontrez pour prier, vous frapperez certaines de ces personnes avec des fouets. Elles iront d’une ville à une autre ville, mais vous les suivrez. '
  '35':
  - type: text
    content: 'Ainsi, vous serez responsables de la mort des innocents sur la terre. Cela, à partir de la mort de l’innocent Abel jusqu’à Zacharie. Vous avez également tué Zacharie, fils de Barachie. Il était aussi un homme bon, mais vos dirigeants l’avaient tué. Il est mort entre le  '
  - type: text
    content: Temple
  - type: text
    content: ' et l’autel. '
  '36':
  - type: text
    content: 'Je vous dis la vérité : Toutes ces choses arriveront à ces gens qui vivent maintenant. Il fera cela à cause de toutes les mauvaises choses que vos ancêtres avaient faites.'
  '37':
  - type: text
    content: 'Oh, vous les gens qui vivez à Jérusalem ! Oh, vous les gens qui vivez à Jérusalem ! Dieu vous envoie des '
  - type: text
    content: prophètes
  - type: text
    content: '. Mais vous leur jetez des pierres. Et vous les tuez. Plusieurs fois, je voulais vous amener tous près de moi. La poule rassemble tous ses petits oiseaux et elle les couvre de son corps. Mais vous ne voulez pas que je prenne soin de vous comme cela.  '
  '38':
  - type: text
    content: 'Alors écoutez ! Bientôt personne ne restera pour vivre à cet endroit. C’est vrai. '
  '39':
  - type: text
    content: 'Un jour, vous direz : Heureux l’homme que Dieu envoie ici avec son pouvoir. Mais vous ne me verrez plus jusqu’à ce que vous disiez cela. '
  '4':
  - type: text
    content: Les règles qu’ils vous donnent sont difficiles à obéir. Elles sont comme des bagages lourds. Ils les mettent sur vos épaules. Mais ils ne vous aident pas à porter ces charges.
  '5':
  - type: text
    content: 'Ils font tout pour que les gens les voient. Ils portent de larges coffrets contenant les Saintes Écritures. Les bordures de leurs vêtements sont plus longues. '
  '6':
  - type: text
    content: 'Et ils aiment les meilleures places pendant les fêtes. Ils aiment aussi les meilleures places dans leurs bâtiments de rencontre. '
  '7':
  - type: text
    content: Ils aiment que les gens les appellent maîtres sur les places publiques. Ils aiment que les gens les saluent avec honneur sur les places publiques.
  '8':
  - type: text
    content: Vous croyez tous en Dieu. Vous avez un seul Maître (Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ). Donc, personne ne devrait appeler quelqu’un maître. Vous êtes tous frères.
  '9':
  - type: text
    content: 'N’appelez pas une autre personne dans le monde Père. Vous avez un seul Père, et il vit dans le  '
  - type: text
    content: ciel
  - type: text
    content: '. '
