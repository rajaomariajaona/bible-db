document_id: MAT.23
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 23
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle des enseignants dangereux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus a parlé à la foule et à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les enseignants de la loi de Dieu et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' enseignent la loi que Dieu avait donnée à Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ecoutez donc tout ce qu’ils vous enseignent. Obéissez à cela. Mais ne faites pas ce qu’ils font. Ils ne font pas ce qu’ils enseignent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les règles qu’ils vous donnent sont difficiles à obéir. Elles sont comme des bagages lourds. Ils les mettent sur vos épaules. Mais ils ne vous aident pas à porter ces charges.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils font tout pour que les gens les voient. Ils portent de larges coffrets contenant les Saintes Écritures. Les bordures de leurs vêtements sont plus longues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et ils aiment les meilleures places pendant les fêtes. Ils aiment aussi les meilleures places dans leurs bâtiments de rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils aiment que les gens les appellent maîtres sur les places publiques. Ils aiment que les gens les saluent avec honneur sur les places publiques.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous croyez tous en Dieu. Vous avez un seul Maître (Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ). Donc, personne ne devrait appeler quelqu’un maître. Vous êtes tous frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'N’appelez pas une autre personne dans le monde Père. Vous avez un seul Père, et il vit dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ne vous faites pas appeler chefs. Vous avez un seul Chef. Et c’est le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Celui qui est le plus important parmi vous, sera votre serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quelqu’un peut penser qu’il est lui‑même très important. Mais Dieu rendra cette personne moins importante. Quelqu’un peut penser qu’il est moins important. Mais Dieu rendra cette personne plus importante.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus a dit aux enseignants de la loi de Dieu et aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' qu’ils sont '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus a parlé aux enseignants de la loi de Dieu et aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Il a dit : Vous êtes malheureux. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '. Vous fermez aux gens la porte du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: '. Ils veulent aller et savoir comment Dieu règne. Vous n’irez pas vous‑mêmes dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: . Et vous ne laissez pas entrer là d’autres personnes qui veulent y entrer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous êtes malheureux, enseignants de la loi de Dieu et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '  ! Vous prenez les choses des femmes, dont les maris sont morts. Vous voulez que les gens pensent de bonnes choses sur vous. Alors vous priez pendant un long moment. Dieu vous punira plus que des gens qui n’ont pas fait ces choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous êtes malheureux, enseignants de la loi de Dieu et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: . Vous voyagez à travers la terre et sur la mer. Vous faites cela pour amener quelqu’un à croire à ce que vous croyez. Puis, quand il croit, il devient pire que vous. Il fait plus de mauvaises choses que vous. Donc, vous le ferez aller en enfer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous êtes malheureux, vous guides aveugles. Vous dites : Quelqu’un peut faire une promesse prenant le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' comme témoin. Mais cette promesse ne signifie rien. Quelqu’un peut faire une promesse prenant l’or qui est dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' comme témoin. Alors cette personne doit accomplir cette promesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous êtes comme des aveugles. Et vous êtes comme des fous. Sachez que le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' est plus important que l’or. L’or est sanctifié parce qu’il est dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous enseignez aussi aux gens ceci : Quelqu’un peut faire une promesse avec l’autel comme témoin. Mais cette promesse ne signifie rien. Quelqu’un peut faire une promesse avec l’offrande sur l’autel comme témoin. Alors il doit accomplir cette promesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous êtes comme des aveugles. Sachez que l’autel est plus important que l’offrande. L’offrande est sanctifiée parce qu’elle est sur l’autel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quelqu’un peut faire une promesse prenant l’autel comme témoin. Alors tout ce qui est sur l’autel est aussi témoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quelqu’un peut faire une promesse prenant le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' comme témoin. Alors Dieu, qui vit dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' est aussi témoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quelqu’un peut faire une promesse avec le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' comme témoin. Si cette personne fait cela, elle inclut le trône de Dieu. Et le trône de Dieu inclut Dieu qui s’assied sur son trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous êtes malheureux, enseignants de la loi et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '  ! Vous obéissez seulement aux très petites choses dans la loi. Vous donnez à Dieu une dixième partie de vos choses comme la menthe, l’aneth et le cumin. Ceci est une petite chose dans la loi à laquelle vous obéissez. Mais vous n’obéissez pas aux parties les plus importantes de la loi. C’est important d’être bon et gentil à d’autres personnes. C’est également important de croire et d’obéir à Dieu. Faites ces choses importantes. Faites aussi d’autres choses moins importantes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous êtes comme un homme qui ne peut pas voir. Mais vous montrez à d’autres personnes le chemin. Vous filtrez vos boissons. Vous en éliminez une petite mouche. Mais vous avalez un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: chameau
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous êtes malheureux, enseignants de la loi et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '  ! Vous êtes comme quelqu’un qui prend soin de laver l’extérieur d’une coupe et d’un plat. L’intérieur de la coupe et du plat sont également sales. Mais vous ne les lavez pas. La saleté est comme les choses que vous faites. Vous voulez avoir beaucoup plus de choses. Vous faites du mal aux gens pour obtenir ce que vous voulez.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous êtes aveugles, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: . Vous devez d’abord nettoyer l’intérieur de la coupe et du plat. Ensuite, l’extérieur sera également propre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous êtes malheureux, enseignants de la loi et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '  ! Vous êtes comme des tombeaux. Ces tombeaux ont la couleur blanche à l’extérieur. Ils sont beaux à voir. Mais ces tombeaux sont pleins d’ossements des morts à l’intérieur. Il y a aussi toutes sortes de choses sales à l’intérieur là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous êtes comme ces tombeaux. D’autres personnes vous regardent. Elles pensent que vous obéissez à Dieu. Mais vraiment, vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: ' et vous faites beaucoup de très mauvaises choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Enseignants de la loi et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ', les choses vont être mauvaises pour vous. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '  ! Vous construisez de beaux endroits. Vous enterrez les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' dans ces lieux après leur mort. Vous faites beaux des endroits où vous avez enterré de bonnes personnes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Vous dites : Nos ancêtres avaient tué les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu. Si nous avions vécu à cette époque, nous ne pourrions pas les aider à tuer les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Donc, vous parlez contre vous‑mêmes. Vous dites que vous êtes les fils de ces personnes. Ces gens avaient tué les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Accomplissez les péchés que vos ancêtres avaient faits !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Vous êtes comme de serpents et comme une famille de serpents dangereux. Vous ne serez pas en mesure de fuir. Je suis sûr que Dieu vous jugera. Et il vous enverra en enfer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Donc, je vous envoie des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. Je vous envoie aussi des gens qui savent beaucoup de choses. Et je vous envoie aussi des gens pour vous enseigner. Mais vous allez tuer certaines de ces personnes. Vous tuerez certaines d’entre elles sur une croix. Dans les endroits où vous vous rencontrez pour prier, vous frapperez certaines de ces personnes avec des fouets. Elles iront d’une ville à une autre ville, mais vous les suivrez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ainsi, vous serez responsables de la mort des innocents sur la terre. Cela, à partir de la mort de l’innocent Abel jusqu’à Zacharie. Vous avez également tué Zacharie, fils de Barachie. Il était aussi un homme bon, mais vos dirigeants l’avaient tué. Il est mort entre le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' et l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Je vous dis la vérité : Toutes ces choses arriveront à ces gens qui vivent maintenant. Il fera cela à cause de toutes les mauvaises choses que vos ancêtres avaient faites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Oh, vous les gens qui vivez à Jérusalem ! Oh, vous les gens qui vivez à Jérusalem ! Dieu vous envoie des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. Mais vous leur jetez des pierres. Et vous les tuez. Plusieurs fois, je voulais vous amener tous près de moi. La poule rassemble tous ses petits oiseaux et elle les couvre de son corps. Mais vous ne voulez pas que je prenne soin de vous comme cela.  '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors écoutez ! Bientôt personne ne restera pour vivre à cet endroit. C’est vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Un jour, vous direz : Heureux l’homme que Dieu envoie ici avec son pouvoir. Mais vous ne me verrez plus jusqu’à ce que vous disiez cela. '
