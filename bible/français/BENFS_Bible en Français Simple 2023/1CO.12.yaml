document_id: 1CO.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: Dons de l’Esprit de Dieu
  - type: text
    content: 'Mes amis chrétiens, je veux que vous compreniez clairement les dons spirituels. '
  '10':
  - type: text
    content: 'Le même Esprit donne aux autres la puissance de faire des choses extraordinaires. D’autres personnes peuvent dire des messages de Dieu. D’autres personnes encore peuvent reconnaître si les esprits sont bons ou mauvais. D’autres personnes encore peuvent parler dans différents types de langues. Et d’autres personnes peuvent expliquer ce que ces langues signifient. '
  '11':
  - type: text
    content: 'Il n’y a qu’un seul '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Le même '
  - type: text
    content: Esprit
  - type: text
    content: ' aide les gens à faire toutes ces choses différentes. Il décide quels dons offrir à chacun.'
  - type: heading
    content: Un corps en plusieurs parties
  '12':
  - type: text
    content: Chaque personne n’a qu’un seul corps, mais ce corps a plusieurs parties. Toutes ces différentes parties ne font qu’un seul corps. C’est comme ça avec Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' aussi. '
  '13':
  - type: text
    content: 'Quand les gens nous ont baptisés, nous sommes tous devenus les parties d’un seul corps. C’est le seul '
  - type: text
    content: Esprit
  - type: text
    content: ' qui nous a réunis. Ce n’est pas important que nous soyons '
  - type: text
    content: Juifs
  - type: text
    content: ' ou païens. Ce n’est pas important que nous soyons esclaves ou libres. Dieu a versé son seul '
  - type: text
    content: Esprit
  - type: text
    content: ' en chacun de nous.'
  '14':
  - type: text
    content: 'Le corps d’une personne n’a pas qu’une seule partie. Il comporte de nombreuses parties. '
  '15':
  - type: text
    content: 'Si le pied pouvait parler, il pourrait dire : Je ne suis pas une main, donc je n’appartiens pas à ce corps. Mais ce qu’il dit ne change rien. C’est toujours une partie du corps. '
  '16':
  - type: text
    content: 'Si l’oreille pouvait parler, elle pourrait dire : Je ne suis pas un œil, donc je n’appartiens pas à ce corps. Mais ce qu’elle dit ne change rien. Elle appartient toujours au corps. '
  '17':
  - type: text
    content: 'Si tout le corps était un œil, le corps n’entendrait rien. Si tout le corps était une oreille, il ne reconnaîtrait pas différentes odeurs. '
  '18':
  - type: text
    content: Mais Dieu a décidé où chaque partie différente de notre corps doit être.
  '19':
  - type: text
    content: 'Si l’ensemble de notre corps était une seule partie, ce ne serait pas un corps convenable. '
  '2':
  - type: text
    content: 'Vous savez comment vous avez vécu avant de connaître Dieu. Vous laissiez les idoles vous conduire de beaucoup de façons. Et ces idoles ne peuvent même pas parler ! '
  '20':
  - type: text
    content: 'Mais tel qu’il est, un corps a plusieurs parties. Ces parties forment un seul corps. '
  '21':
  - type: text
    content: 'C’est pourquoi l’œil ne peut pas dire à la main : Je n’ai pas besoin de toi. Et la tête ne peut pas dire aux pieds : Je n’ai pas besoin de vous. '
  '22':
  - type: text
    content: 'Non. Même les parties d’un corps qui semblent plus faibles sont très nécessaires. '
  '23':
  - type: text
    content: 'Pensez aux parties de notre corps qui ne sont pas très spéciales. Nous les habillons soigneusement ! Et nous prenons un soin particulier aux parties que nous ne voulons pas que les gens voient. '
  '24':
  - type: text
    content: Mais nous ne pouvons pas faire cela avec les belles parties de notre corps.
  - type: text
    content: 'Dieu a rassemblé toutes ces parties en un seul corps. Certaines parties ne semblent pas très spéciales. Mais Dieu a montré que ces parties sont très importantes. '
  '25':
  - type: text
    content: 'Il a fait cela pour rassembler toutes les parties en un seul corps. Toutes les parties travaillent ensemble pour s’entraider. '
  '26':
  - type: text
    content: Alors, si une partie du corps a mal, toutes les autres parties ont aussi mal. Si les gens louent une partie, chaque partie du corps est également heureuse.
  '27':
  - type: text
    content: Vous êtes tous ensemble le corps de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Et chacun de vous fait partie de ce corps. '
  '28':
  - type: text
    content: 'Comme les parties d’un corps, Dieu a placé les gens à différents endroits de son Église. Tout d’abord, il y a les '
  - type: text
    content: apôtres
  - type: text
    content: . Deuxièmement, il y a les gens qui disent les messages de Dieu. Troisièmement, il y a des enseignants. Après cela, il y a des gens qui font des choses extraordinaires. Il y a des gens qui ont des dons pour guérir les malades. Il y a des gens qui aident les autres de manière spéciale. Il y a des gens qui peuvent diriger les autres. Et il y a des gens qui peuvent parler différents types de langues.
  '29':
  - type: text
    content: 'Tout le monde dans l’Église n’est pas '
  - type: text
    content: apôtre
  - type: text
    content: '. Tout le monde ne dit pas les messages de Dieu. Tout le monde n’est pas enseignant. Tout le monde ne peut pas faire de choses extraordinaires. '
  '3':
  - type: text
    content: C’est ce que je veux que vous compreniez maintenant. L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu ne conduira jamais personne à dire : Dieu a maudit Jésus. Et ce n’est que l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu qui amènera quelqu’un à dire : Jésus est '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '30':
  - type: text
    content: 'Tout le monde n’a pas les dons pour guérir les malades. Tout le monde ne peut pas parler dans différents types de langues. Tout le monde ne peut pas non plus expliquer ce que les messages signifient dans ces langues. Vous le savez. '
  '31':
  - type: text
    content: Mais c’est bien si vous voulez vraiment les dons les plus précieux de Dieu.
  - type: text
    content: Maintenant, je vais vous montrer une voie qui est meilleure que toute autre chose.
  '4':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' nous aide avec différents types de dons. Mais c’est le même '
  - type: text
    content: Esprit
  - type: text
    content: ' qui les donne. '
  '5':
  - type: text
    content: 'Nous servons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de différentes manières, mais nous servons tous le même '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: text
    content: Nous effectuons différents types de travaux. Mais c’est le même Dieu qui nous aide tous à travailler de différentes manières.
  '7':
  - type: text
    content: 'Dieu aide chacun de nous avec un don de son '
  - type: text
    content: Esprit
  - type: text
    content: . Il le fait pour que nous puissions aider les autres.
  '8':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' aide certaines personnes à dire des messages sages. D’autres personnes peuvent dire des messages qui aident les gens à savoir ce qui est vrai. C’est le même '
  - type: text
    content: Esprit
  - type: text
    content: ' qui les aide à le faire. '
  '9':
  - type: text
    content: 'Le même '
  - type: text
    content: Esprit
  - type: text
    content: ' amène les autres à beaucoup croire en Dieu. Il offre à d’autres personnes des dons pour guérir les malades. '
