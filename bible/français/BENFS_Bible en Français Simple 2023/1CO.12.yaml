document_id: 1CO.12,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 12
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dons de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mes amis chrétiens, je veux que vous compreniez clairement les dons spirituels. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le même Esprit donne aux autres la puissance de faire des choses extraordinaires. D’autres personnes peuvent dire des messages de Dieu. D’autres personnes encore peuvent reconnaître si les esprits sont bons ou mauvais. D’autres personnes encore peuvent parler dans différents types de langues. Et d’autres personnes peuvent expliquer ce que ces langues signifient. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il n’y a qu’un seul '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: '. Le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' aide les gens à faire toutes ces choses différentes. Il décide quels dons offrir à chacun.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un corps en plusieurs parties
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Chaque personne n’a qu’un seul corps, mais ce corps a plusieurs parties. Toutes ces différentes parties ne font qu’un seul corps. C’est comme ça avec Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' aussi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Quand les gens nous ont baptisés, nous sommes tous devenus les parties d’un seul corps. C’est le seul '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' qui nous a réunis. Ce n’est pas important que nous soyons '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ou païens. Ce n’est pas important que nous soyons esclaves ou libres. Dieu a versé son seul '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' en chacun de nous.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le corps d’une personne n’a pas qu’une seule partie. Il comporte de nombreuses parties. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Si le pied pouvait parler, il pourrait dire : Je ne suis pas une main, donc je n’appartiens pas à ce corps. Mais ce qu’il dit ne change rien. C’est toujours une partie du corps. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Si l’oreille pouvait parler, elle pourrait dire : Je ne suis pas un œil, donc je n’appartiens pas à ce corps. Mais ce qu’elle dit ne change rien. Elle appartient toujours au corps. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Si tout le corps était un œil, le corps n’entendrait rien. Si tout le corps était une oreille, il ne reconnaîtrait pas différentes odeurs. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Mais Dieu a décidé où chaque partie différente de notre corps doit être.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si l’ensemble de notre corps était une seule partie, ce ne serait pas un corps convenable. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Vous savez comment vous avez vécu avant de connaître Dieu. Vous laissiez les idoles vous conduire de beaucoup de façons. Et ces idoles ne peuvent même pas parler ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais tel qu’il est, un corps a plusieurs parties. Ces parties forment un seul corps. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'C’est pourquoi l’œil ne peut pas dire à la main : Je n’ai pas besoin de toi. Et la tête ne peut pas dire aux pieds : Je n’ai pas besoin de vous. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Non. Même les parties d’un corps qui semblent plus faibles sont très nécessaires. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pensez aux parties de notre corps qui ne sont pas très spéciales. Nous les habillons soigneusement ! Et nous prenons un soin particulier aux parties que nous ne voulons pas que les gens voient. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mais nous ne pouvons pas faire cela avec les belles parties de notre corps.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a rassemblé toutes ces parties en un seul corps. Certaines parties ne semblent pas très spéciales. Mais Dieu a montré que ces parties sont très importantes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il a fait cela pour rassembler toutes les parties en un seul corps. Toutes les parties travaillent ensemble pour s’entraider. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Alors, si une partie du corps a mal, toutes les autres parties ont aussi mal. Si les gens louent une partie, chaque partie du corps est également heureuse.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Vous êtes tous ensemble le corps de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Et chacun de vous fait partie de ce corps. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Comme les parties d’un corps, Dieu a placé les gens à différents endroits de son Église. Tout d’abord, il y a les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: . Deuxièmement, il y a les gens qui disent les messages de Dieu. Troisièmement, il y a des enseignants. Après cela, il y a des gens qui font des choses extraordinaires. Il y a des gens qui ont des dons pour guérir les malades. Il y a des gens qui aident les autres de manière spéciale. Il y a des gens qui peuvent diriger les autres. Et il y a des gens qui peuvent parler différents types de langues.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Tout le monde dans l’Église n’est pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: '. Tout le monde ne dit pas les messages de Dieu. Tout le monde n’est pas enseignant. Tout le monde ne peut pas faire de choses extraordinaires. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est ce que je veux que vous compreniez maintenant. L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu ne conduira jamais personne à dire : Dieu a maudit Jésus. Et ce n’est que l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu qui amènera quelqu’un à dire : Jésus est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Tout le monde n’a pas les dons pour guérir les malades. Tout le monde ne peut pas parler dans différents types de langues. Tout le monde ne peut pas non plus expliquer ce que les messages signifient dans ces langues. Vous le savez. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Mais c’est bien si vous voulez vraiment les dons les plus précieux de Dieu.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, je vais vous montrer une voie qui est meilleure que toute autre chose.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' nous aide avec différents types de dons. Mais c’est le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' qui les donne. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nous servons le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' de différentes manières, mais nous servons tous le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nous effectuons différents types de travaux. Mais c’est le même Dieu qui nous aide tous à travailler de différentes manières.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dieu aide chacun de nous avec un don de son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: . Il le fait pour que nous puissions aider les autres.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' aide certaines personnes à dire des messages sages. D’autres personnes peuvent dire des messages qui aident les gens à savoir ce qui est vrai. C’est le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' qui les aide à le faire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' amène les autres à beaucoup croire en Dieu. Il offre à d’autres personnes des dons pour guérir les malades. '
