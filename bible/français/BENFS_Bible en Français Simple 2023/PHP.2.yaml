document_id: PHP.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Soyez comme Christ
  - type: text
    content: 'Vous êtes unis avec '
  - type: text
    content: Christ
  - type: text
    content: ', afin qu’il puisse vous rendre forts et courageux. Il peut vous aider à ne pas être tristes. Vous pouvez savoir qu’il vous aime beaucoup. Chacun d’entre vous peut connaître son '
  - type: text
    content: esprit
  - type: text
    content: '. Vous pouvez vous aimer les uns les autres comme le '
  - type: text
    content: Christ
  - type: text
    content: ' vous aime. '
  '10':
  - type: text
    content: Ainsi, quand tout le monde entend le nom de Jésus, il doit se baisser.
  - type: text
    content: 'Tout ce qui est vivant dans le '
  - type: text
    content: ciel
  - type: text
    content: ' doit se baisser.'
  - type: text
    content: Tout ce qui est vivant sur la terre ou sous la terre, doit se baisser.
  - type: text
    content: Ils doivent plier les genoux pour montrer qu’il est très grand.
  '11':
  - type: text
    content: 'Et tout ce qui est vivant doit dire à haute voix :'
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Cela montrera que Dieu le Père est très grand et très bon.
  - type: heading
    content: Les chrétiens doivent être comme des lumières dans le monde
  '12':
  - type: text
    content: 'Ainsi, mes frères que j’aime, vous aussi, vous devez obéir à Dieu. Quand j’étais avec vous, vous avez toujours obéi. Et beaucoup plus, vous devez toujours obéir quand je ne suis pas avec vous. Vous êtes des gens que Dieu a travaillés pour sauver des conséquences du péché. Et vous devez vivre comme des gens comme ça devraient vivre. Vous devez être très prudents d’obéir toujours à Dieu. Vous devrez avoir peur de ne pas le faire. Vous devez vous rappeler qu’il est très grand et très puissant. '
  '13':
  - type: text
    content: Obéissez à Dieu, parce qu’il travaille en vous. Il vous change de sorte que vous puissiez lui obéir. Et il vous rend capables de faire les choses qui le rendent heureux.
  '14':
  - type: text
    content: 'Quand vous faites quoi que ce soit, ne devenez pas en colère. Et ne discutez pas de cela. '
  '15':
  - type: text
    content: 'Ensuite, vous serez propres dans vos cœurs. Vous n’aurez aucun mal en vous, comme les enfants de Dieu devraient être. Et personne ne sera en mesure de dire que vous avez fait quelque chose de mal. Dans ce monde, vous vivez avec des gens mauvais qui vous entourent. Ils sont devenus très mauvais. Et ils veulent faire de mauvaises choses. Mais vous devez être comme des lumières parmi eux, comme les étoiles brillantes. Elles brillent dans le '
  - type: text
    content: ciel
  - type: text
    content: ' sombre la nuit. '
  '16':
  - type: text
    content: 'Vous serez comme des lumières à ces gens pendant que vous leur direz le message de '
  - type: text
    content: Christ
  - type: text
    content: '. Ce message peut les amener à devenir vraiment vivants. Si vous êtes comme ça, je peux être heureux à cause de vous. Je serai heureux le jour où le '
  - type: text
    content: Christ
  - type: text
    content: ' reviendra. Alors je sais que tout mon travail parmi vous a eu de bons résultats. Je sais que je ne perds pas mon temps.'
  '17':
  - type: text
    content: 'Vous croyez en '
  - type: text
    content: Christ
  - type: text
    content: ', donc vous êtes ses serviteurs. Donnez‑vous à Dieu, comme un '
  - type: text
    content: sacrifice
  - type: text
    content: ', de travailler pour lui. Je vais peut‑être mourir. Je dois peut‑être devenir comme une partie de votre '
  - type: text
    content: sacrifice
  - type: text
    content: '. Je dois peut‑être devenir comme la boisson que les gens versent à leur '
  - type: text
    content: sacrifice
  - type: text
    content: '. Mais si je meurs, je serai heureux. Et je veux que vous soyez aussi heureux. '
  '18':
  - type: text
    content: Il est vrai que vous devez être heureux aussi. Vous devez être heureux, comme je serai heureux.
  - type: heading
    content: Paul envoie Timothée et Epaphrodite à Philippes
  '19':
  - type: text
    content: 'Mais je souhaite que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus me permette de vous envoyer Timothée bientôt. Puis, quand il retourne à moi, il peut me dire des nouvelles de vous. Et cela me fera plaisir. '
  '2':
  - type: text
    content: Alors vous vous me rendez complètement heureux, parce que vous êtes tous d’accord. Aimez‑vous les uns les autres de la même manière. Vous devriez tous être comme une personne, parce que vous avez le même but.
  '20':
  - type: text
    content: 'Timothée vous aime vraiment, comme je le fais. Il a vraiment un intérêt pour vous. Je n’ai personne d’autre comme lui. '
  '21':
  - type: text
    content: Tous les gens pensent au sujet des choses qui sont importantes pour eux‑mêmes. Ils n’ont aucun intérêt aux choses qui sont importantes à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '22':
  - type: text
    content: 'Mais vous savez que Timothée est un homme bon. Il a travaillé avec moi comme un fils travaille avec son père. Vous le savez. Il m’a aidé à dire aux gens la Bonne Nouvelle. '
  '23':
  - type: text
    content: 'Voilà pourquoi j’espère l’envoyer. Je suis en attente de découvrir ce qui se passera pour moi. Puis, quand je sais, je vous l’enverrai. '
  '24':
  - type: text
    content: 'Mais je crois que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me permettra de venir là bientôt moi‑même.'
  '25':
  - type: text
    content: 'Épaphrodite est mon frère chrétien, qui travaille avec moi. Nous sommes tous 2 comme des soldats de l’armée de '
  - type: text
    content: Christ
  - type: text
    content: '. Quand j’avais besoin d’aide, vous me l’avez envoyé. Et il m’a apporté votre message. Mais maintenant, je pense que je dois le renvoyer à vous. '
  '26':
  - type: text
    content: 'Il veut beaucoup vous rencontrer tous à nouveau. Vous savez qu’il était malade. Donc, il n’a pas été heureux que vous sachiez cela. Il ne veut pas que vous soyez tristes à son sujet. '
  '27':
  - type: text
    content: 'Il était vraiment très malade. Il était près de mourir. Mais Dieu était bon pour lui. Dieu était aussi bon pour moi, afin que je ne sois pas encore plus triste. '
  '28':
  - type: text
    content: Donc, je veux encore l’envoyer à vous. Lorsque vous le voyez, vous pouvez être heureux. Et je ne me sentirai pas si triste.
  '29':
  - type: text
    content: 'Comme vous, il appartient au peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Donc, vous devez lui dire Bienvenue. Vous devez être très heureux quand il vient vous rendre visite. Des gens comme Épaphrodite ont fait de grandes choses. Donc, vous devez vous rappeler qu’ils sont vraiment importants. '
  '3':
  - type: text
    content: Vous ne devez pas faire seulement les choses que vous voulez. Vous ne devez pas faire quoi que ce soit pour la seule raison qu’il vous fait paraître plus important que d’autres personnes. Au lieu de cela, pensez toujours à ce dont les autres ont besoin. Ne pensez pas que vous êtes meilleurs que les autres. Mais pensez que d’autres gens sont meilleurs que vous.
  '30':
  - type: text
    content: 'Épaphrodite était près de mourir. La raison est parce qu’il a travaillé pour le '
  - type: text
    content: Christ
  - type: text
    content: . Il allait mourir, parce qu’il a voulu m’aider. Il m’a aidé, parce que vous ne pouviez pas m’aider.
  '4':
  - type: text
    content: 'Ne pensez pas seulement aux choses qui sont importantes pour vous‑mêmes. Mais chacun de vous doit aussi penser aux choses qui sont importantes pour d’autres personnes. '
  '5':
  - type: text
    content: Vous devez penser de la même manière que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' pensait :'
  '6':
  - type: text
    content: ' '
  - type: text
    content: Christ
  - type: text
    content: ' avait complètement la même nature que Dieu.'
  - type: text
    content: Il était aussi important que Dieu.
  - type: text
    content: 'Mais le '
  - type: text
    content: Christ
  - type: text
    content: ' n’a pas demandé de continuer d’être important comme ça.'
  '7':
  - type: text
    content: Au lieu de cela, il s’est fait beaucoup moins important.
  - type: text
    content: Il a pris pour lui‑même la forme de serviteur.
  - type: text
    content: Il est devenu comme des hommes.
  '8':
  - type: text
    content: Et quand il était un homme,
  - type: text
    content: Il s’est fait encore moins important.
  - type: text
    content: Il a obéi à Dieu complètement jusqu’à mourir.
  - type: text
    content: Il est même mort sur une croix !
  '9':
  - type: text
    content: Voilà pourquoi Dieu a mis Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' à l’endroit le plus important.'
  - type: text
    content: Dieu lui a donné le nom qui est plus grand que tout autre nom.
