document_id: PHP.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Soyez comme '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous êtes unis avec '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', afin qu’il puisse vous rendre forts et courageux. Il peut vous aider à ne pas être tristes. Vous pouvez savoir qu’il vous aime beaucoup. Chacun d’entre vous peut connaître son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Vous pouvez vous aimer les uns les autres comme le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vous aime. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors vous vous me rendez complètement heureux, parce que vous êtes tous d’accord. Aimez‑vous les uns les autres de la même manière. Vous devriez tous être comme une personne, parce que vous avez le même but.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous ne devez pas faire seulement les choses que vous voulez. Vous ne devez pas faire quoi que ce soit pour la seule raison qu’il vous fait paraître plus important que d’autres personnes. Au lieu de cela, pensez toujours à ce dont les autres ont besoin. Ne pensez pas que vous êtes meilleurs que les autres. Mais pensez que d’autres gens sont meilleurs que vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ne pensez pas seulement aux choses qui sont importantes pour vous‑mêmes. Mais chacun de vous doit aussi penser aux choses qui sont importantes pour d’autres personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vous devez penser de la même manière que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' pensait :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' avait complètement la même nature que Dieu.'
- type: usfm
  marker: m
  children:
  - type: text
    text: Il était aussi important que Dieu.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Mais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' n’a pas demandé de continuer d’être important comme ça.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Au lieu de cela, il s’est fait beaucoup moins important.
- type: usfm
  marker: m
  children:
  - type: text
    text: Il a pris pour lui‑même la forme de serviteur.
- type: usfm
  marker: m
  children:
  - type: text
    text: Il est devenu comme des hommes.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et quand il était un homme,
- type: usfm
  marker: m
  children:
  - type: text
    text: Il s’est fait encore moins important.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il a obéi à Dieu complètement jusqu’à mourir.
- type: usfm
  marker: m
  children:
  - type: text
    text: Il est même mort sur une croix !
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voilà pourquoi Dieu a mis Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à l’endroit le plus important.'
- type: usfm
  marker: m
  children:
  - type: text
    text: Dieu lui a donné le nom qui est plus grand que tout autre nom.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ainsi, quand tout le monde entend le nom de Jésus, il doit se baisser.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Tout ce qui est vivant dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' doit se baisser.'
- type: usfm
  marker: m
  children:
  - type: text
    text: Tout ce qui est vivant sur la terre ou sous la terre, doit se baisser.
- type: usfm
  marker: m
  children:
  - type: text
    text: Ils doivent plier les genoux pour montrer qu’il est très grand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et tout ce qui est vivant doit dire à haute voix :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Cela montrera que Dieu le Père est très grand et très bon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens doivent être comme des lumières dans le monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi, mes frères que j’aime, vous aussi, vous devez obéir à Dieu. Quand j’étais avec vous, vous avez toujours obéi. Et beaucoup plus, vous devez toujours obéir quand je ne suis pas avec vous. Vous êtes des gens que Dieu a travaillés pour sauver des conséquences du péché. Et vous devez vivre comme des gens comme ça devraient vivre. Vous devez être très prudents d’obéir toujours à Dieu. Vous devrez avoir peur de ne pas le faire. Vous devez vous rappeler qu’il est très grand et très puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Obéissez à Dieu, parce qu’il travaille en vous. Il vous change de sorte que vous puissiez lui obéir. Et il vous rend capables de faire les choses qui le rendent heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand vous faites quoi que ce soit, ne devenez pas en colère. Et ne discutez pas de cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ensuite, vous serez propres dans vos cœurs. Vous n’aurez aucun mal en vous, comme les enfants de Dieu devraient être. Et personne ne sera en mesure de dire que vous avez fait quelque chose de mal. Dans ce monde, vous vivez avec des gens mauvais qui vous entourent. Ils sont devenus très mauvais. Et ils veulent faire de mauvaises choses. Mais vous devez être comme des lumières parmi eux, comme les étoiles brillantes. Elles brillent dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' sombre la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous serez comme des lumières à ces gens pendant que vous leur direz le message de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Ce message peut les amener à devenir vraiment vivants. Si vous êtes comme ça, je peux être heureux à cause de vous. Je serai heureux le jour où le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' reviendra. Alors je sais que tout mon travail parmi vous a eu de bons résultats. Je sais que je ne perds pas mon temps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous croyez en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', donc vous êtes ses serviteurs. Donnez‑vous à Dieu, comme un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ', de travailler pour lui. Je vais peut‑être mourir. Je dois peut‑être devenir comme une partie de votre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: '. Je dois peut‑être devenir comme la boisson que les gens versent à leur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: '. Mais si je meurs, je serai heureux. Et je veux que vous soyez aussi heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il est vrai que vous devez être heureux aussi. Vous devez être heureux, comme je serai heureux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul envoie Timothée et Epaphrodite à Philippes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais je souhaite que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus me permette de vous envoyer Timothée bientôt. Puis, quand il retourne à moi, il peut me dire des nouvelles de vous. Et cela me fera plaisir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Timothée vous aime vraiment, comme je le fais. Il a vraiment un intérêt pour vous. Je n’ai personne d’autre comme lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tous les gens pensent au sujet des choses qui sont importantes pour eux‑mêmes. Ils n’ont aucun intérêt aux choses qui sont importantes à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais vous savez que Timothée est un homme bon. Il a travaillé avec moi comme un fils travaille avec son père. Vous le savez. Il m’a aidé à dire aux gens la Bonne Nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voilà pourquoi j’espère l’envoyer. Je suis en attente de découvrir ce qui se passera pour moi. Puis, quand je sais, je vous l’enverrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais je crois que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me permettra de venir là bientôt moi‑même.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Épaphrodite est mon frère chrétien, qui travaille avec moi. Nous sommes tous 2 comme des soldats de l’armée de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Quand j’avais besoin d’aide, vous me l’avez envoyé. Et il m’a apporté votre message. Mais maintenant, je pense que je dois le renvoyer à vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il veut beaucoup vous rencontrer tous à nouveau. Vous savez qu’il était malade. Donc, il n’a pas été heureux que vous sachiez cela. Il ne veut pas que vous soyez tristes à son sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il était vraiment très malade. Il était près de mourir. Mais Dieu était bon pour lui. Dieu était aussi bon pour moi, afin que je ne sois pas encore plus triste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Donc, je veux encore l’envoyer à vous. Lorsque vous le voyez, vous pouvez être heureux. Et je ne me sentirai pas si triste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Comme vous, il appartient au peuple du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Donc, vous devez lui dire Bienvenue. Vous devez être très heureux quand il vient vous rendre visite. Des gens comme Épaphrodite ont fait de grandes choses. Donc, vous devez vous rappeler qu’ils sont vraiment importants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Épaphrodite était près de mourir. La raison est parce qu’il a travaillé pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il allait mourir, parce qu’il a voulu m’aider. Il m’a aidé, parce que vous ne pouviez pas m’aider.
