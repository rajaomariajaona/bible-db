document_id: COL.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: text
    content: 'Maîtres, accordez à vos serviteurs ce qui est correct et juste. Rappelez‑vous que vous avez un maître aussi, dans le '
  - type: text
    content: ciel
  - type: text
    content: .
  - type: heading
    content: Paul dit aux croyants qu’ils doivent prier
  '10':
  - type: text
    content: Aristarque, qui est avec moi dans la prison, vous dit bonjour. Marc vous dit aussi bonjour. Il est le cousin de Barnabas. Marc peut venir vous rendre visite. Dites‑lui bienvenue s’il vient. Je vous l’ai déjà présenté. Je vous ai dit que vous devez être gentils envers lui.
  '11':
  - type: text
    content: 'Jésus, qui est appelé Justus, vous dit aussi bonjour. Ces 3 hommes sont les seuls '
  - type: text
    content: Juifs
  - type: text
    content: ' qui travaillent avec moi. Nous travaillons pour que plus de gens croient en '
  - type: text
    content: Christ
  - type: text
    content: . Alors ils vont appartenir au peuple de Dieu, le peuple qu’il gouverne. Ces hommes m’ont aidé beaucoup. Et ils m’ont rendu heureux.
  '12':
  - type: text
    content: Épaphras vous dit bonjour. Il appartient également à votre groupe, et il est le serviteur de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Il prie toujours beaucoup pour vous. Il prie comme quelqu’un qui se bat pour vous. Il prie pour que vous continuiez d’obéir à Dieu. Ainsi, vous ferez toujours tout ce que Dieu veut.
  - type: text
    content: 'Il prie Dieu de vous donner une grande '
  - type: text
    content: foi
  - type: text
    content: '. Ainsi vous pourrez faire pleinement ce que Dieu veut. '
  '13':
  - type: text
    content: Je vous dis ce qui est vrai à propos d’Épaphras. Il travaille beaucoup pour vous, et pour les gens de Laodicée et d’Hiérapolis.
  '14':
  - type: text
    content: Notre bon ami Luc, le médecin, et Démas vous disent bonjour.
  '15':
  - type: text
    content: Dites bonjour pour moi aux croyants de Laodicée. Dites aussi bonjour pour moi à Nymphas et aux chrétiens qui se réunissent dans sa maison.
  '16':
  - type: text
    content: Quelqu’un lira cette lettre pour vous tous. Quand il termine de la lire, envoyez‑la à l’Église de Laodicée. Dites‑leur qu’ils doivent également la lire à haute voix. Les chrétiens de Laodicée vont vous envoyer une lettre, que vous devez lire aussi.
  '17':
  - type: text
    content: 'Dites à Archippe ceci : Rappelle‑toi le travail que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t’a donné à faire. Termine‑le complètement.'
  '18':
  - type: text
    content: Moi, Paul, j’écris ces mots ici avec ma propre main. Rappelez‑vous que je suis dans une prison. Je prie pour que Dieu continue d’être très gentil avec vous.
  '2':
  - type: text
    content: 'Continuez de prier. Ne laissez rien vous arrêter de prier. Soyez comme des gens qui regardent attentivement. Ils regardent attentivement pour voir ce qui se passe. Et remerciez Dieu quand vous priez. '
  '3':
  - type: text
    content: 'Priez pour nous, aussi. Demandez à Dieu de nous aider à dire son message aux gens. Nous voulons dire aux gens les choses secrètes sur '
  - type: text
    content: Christ
  - type: text
    content: . C’est Dieu qui nous a fait savoir cela. Je suis dans une prison, parce que je disais aux gens ces choses.
  '4':
  - type: text
    content: Je veux dire aux gens ce message clairement, comme je dois le faire. Priez pour que je sois en mesure de le faire.
  '5':
  - type: text
    content: 'Parfois, vous êtes avec des gens qui ne croient pas en '
  - type: text
    content: Christ
  - type: text
    content: '. Soyez prudents lorsque vous êtes avec ces gens. Faites attention à ce que vous dites. Faites attention à ce que vous faites. Utilisez votre temps avec eux aussi bien que possible. Faites tout ce que vous pouvez pour les aider à croire en '
  - type: text
    content: Christ
  - type: text
    content: .
  '6':
  - type: text
    content: Dites toujours des mots qui sont gentils et bons. Dites des mots qui vont être bons pour ceux qui vous entendent. Quand quelqu’un vous pose une question, vous devez savoir quoi dire. Vous devez savoir comment vous devez répondre à chaque personne.
  - type: heading
    content: Paul termine sa lettre
  '7':
  - type: text
    content: 'Tychique vous dira toutes les nouvelles sur moi. Il est un frère chrétien que nous aimons. Il continue de bien travailler pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Comme moi, il est le serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Je l’envoie à vous pour ce but. Il vous dira toutes les nouvelles sur nous. Et il vous aidera à être plus courageux et plus forts pour '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Onésime, qui appartient à votre groupe, se déplace avec lui. Onésime est un autre frère chrétien que nous aimons. Il continue de croire et d’obéir à '
  - type: text
    content: Christ
  - type: text
    content: . Ces hommes vous diront tout ce qui se passe ici.
