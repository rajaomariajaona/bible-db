document_id: COL.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Maîtres, accordez à vos serviteurs ce qui est correct et juste. Rappelez‑vous que vous avez un maître aussi, dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit aux croyants qu’ils doivent prier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Continuez de prier. Ne laissez rien vous arrêter de prier. Soyez comme des gens qui regardent attentivement. Ils regardent attentivement pour voir ce qui se passe. Et remerciez Dieu quand vous priez. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Priez pour nous, aussi. Demandez à Dieu de nous aider à dire son message aux gens. Nous voulons dire aux gens les choses secrètes sur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . C’est Dieu qui nous a fait savoir cela. Je suis dans une prison, parce que je disais aux gens ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je veux dire aux gens ce message clairement, comme je dois le faire. Priez pour que je sois en mesure de le faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Parfois, vous êtes avec des gens qui ne croient pas en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Soyez prudents lorsque vous êtes avec ces gens. Faites attention à ce que vous dites. Faites attention à ce que vous faites. Utilisez votre temps avec eux aussi bien que possible. Faites tout ce que vous pouvez pour les aider à croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dites toujours des mots qui sont gentils et bons. Dites des mots qui vont être bons pour ceux qui vous entendent. Quand quelqu’un vous pose une question, vous devez savoir quoi dire. Vous devez savoir comment vous devez répondre à chaque personne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul termine sa lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tychique vous dira toutes les nouvelles sur moi. Il est un frère chrétien que nous aimons. Il continue de bien travailler pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Comme moi, il est le serviteur du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je l’envoie à vous pour ce but. Il vous dira toutes les nouvelles sur nous. Et il vous aidera à être plus courageux et plus forts pour '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Onésime, qui appartient à votre groupe, se déplace avec lui. Onésime est un autre frère chrétien que nous aimons. Il continue de croire et d’obéir à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Ces hommes vous diront tout ce qui se passe ici.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aristarque, qui est avec moi dans la prison, vous dit bonjour. Marc vous dit aussi bonjour. Il est le cousin de Barnabas. Marc peut venir vous rendre visite. Dites‑lui bienvenue s’il vient. Je vous l’ai déjà présenté. Je vous ai dit que vous devez être gentils envers lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus, qui est appelé Justus, vous dit aussi bonjour. Ces 3 hommes sont les seuls '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui travaillent avec moi. Nous travaillons pour que plus de gens croient en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Alors ils vont appartenir au peuple de Dieu, le peuple qu’il gouverne. Ces hommes m’ont aidé beaucoup. Et ils m’ont rendu heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Épaphras vous dit bonjour. Il appartient également à votre groupe, et il est le serviteur de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il prie toujours beaucoup pour vous. Il prie comme quelqu’un qui se bat pour vous. Il prie pour que vous continuiez d’obéir à Dieu. Ainsi, vous ferez toujours tout ce que Dieu veut.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il prie Dieu de vous donner une grande '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: '. Ainsi vous pourrez faire pleinement ce que Dieu veut. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je vous dis ce qui est vrai à propos d’Épaphras. Il travaille beaucoup pour vous, et pour les gens de Laodicée et d’Hiérapolis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Notre bon ami Luc, le médecin, et Démas vous disent bonjour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dites bonjour pour moi aux croyants de Laodicée. Dites aussi bonjour pour moi à Nymphas et aux chrétiens qui se réunissent dans sa maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quelqu’un lira cette lettre pour vous tous. Quand il termine de la lire, envoyez‑la à l’Église de Laodicée. Dites‑leur qu’ils doivent également la lire à haute voix. Les chrétiens de Laodicée vont vous envoyer une lettre, que vous devez lire aussi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dites à Archippe ceci : Rappelle‑toi le travail que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t’a donné à faire. Termine‑le complètement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moi, Paul, j’écris ces mots ici avec ma propre main. Rappelez‑vous que je suis dans une prison. Je prie pour que Dieu continue d’être très gentil avec vous.
