document_id: REV.16
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 16
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les 7 coupes avec les 7 derniers malheurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis j’ai entendu une voix forte parler de la maison de Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Elle a dit aux 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '  : Prenez vos 7 coupes pleines de colère de Dieu. Allez les déverser sur la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le premier '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' est allé et a versé sa coupe sur la terre. En conséquence, des plaies très mauvaises et douloureuses sont apparues sur la peau des gens. Les plaies faisaient mal à tous ceux qui avaient le signe de l’animal sur eux et qui adoraient l’idole de l’animal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors le deuxième '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a versé sa coupe sur la mer. En conséquence, la mer est devenue comme le sang d’un mort. Tout ce qui vivait dans la mer est alors mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors le troisième '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a versé sa coupe sur les fleuves et sur les sources d’eau. En conséquence, toute l’eau est devenue du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors j’ai entendu l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' qui avait le pouvoir sur les eaux. Il a dit à Dieu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Saint, tu es vivant maintenant et tu as toujours été vivant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es juste dans tout ce que tu décides.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, tu as jugé ces gens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils ont tué ton peuple et tes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont fait saigner et mourir tes serviteurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors maintenant, tu as donné à ces méchants du sang à boire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà ce qui devrait leur arriver. C’est vrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis j’ai entendu une voix de l’autel dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Elle disait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oui, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu, tu as tout pouvoir.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand tu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juges
  - type: text
    text: ' les gens, c’est bon et juste !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors le quatrième '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a versé sa coupe sur le soleil. Dieu a donné le pouvoir au soleil pour qu’il brûle les gens avec le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La forte chaleur a brûlé les gens et cela leur a fait très mal. En conséquence, ils ont dit de mauvaises choses contre le nom de Dieu, car il avait le pouvoir de causer ces troubles. Mais ils ont refusé de changer leur façon de vivre. Ils ont refusé d’accepter que Dieu est grand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le cinquième '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a versé sa coupe sur le trône de l’animal. En conséquence, tout le royaume où régnait l’animal est devenu sombre. Les gens se mordaient les langues. C’était à cause de leur grande douleur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils ont insulté le Dieu du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' à cause de leur douleur et des plaies sur leurs peaux. Mais ils n’ont pas cessé de faire de mauvaises choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors le sixième '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a versé sa coupe sur le grand fleuve Euphrate. En conséquence, le fleuve est devenu sec. Cela a permis aux rois de l’est de le traverser, avec leurs armées. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis j’ai vu 3 mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' qui ressemblaient à des grenouilles. Un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' est sorti de la bouche du dragon. Un autre est sorti de la bouche du premier animal. Le troisième est sorti de la bouche du faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ces mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' sont les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' des démons. Ils avaient le pouvoir de faire des miracles. Ils sont allés voir tous les dirigeants du monde entier pour les rassembler. C’était pour combattre dans une grande guerre. Cette guerre aura lieu le grand jour de Dieu, qui a toute puissance et tout pouvoir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit : Écoutez ! Je viendrai secrètement, comme quelqu’un qui vole les gens. Si vous continuez de regarder attentivement, vous serez heureux. Gardez vos vêtements avec vous tout le temps. Ensuite, quand je viendrai, vous n’aurez pas honte parce que vous n’avez pas de vêtements.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Puis les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' ont réuni les dirigeants pour combattre dans la grande guerre. Ils sont venus à l’endroit appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Harmaguédon
  - type: text
    text: ' en langue hébraïque.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors le septième '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a versé sa coupe dans l’air. Une voix a parlé fort du trône dans la maison de Dieu. La voix a dit : Maintenant, c’est arrivé ! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il y a eu une grande tempête, avec des éclairs brillants et de forts bruits de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tonnerre
  - type: text
    text: '. Le sol s’est déplacé très fortement. Le sol n’a jamais bougé aussi fortement pendant tout le temps que les gens ont vécu sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: En conséquence, la grande ville appelée Babylone s’est divisée en 3 parties. Lorsque le sol a bougé, il a également détruit les grandes villes d’autres pays du monde. Dieu n’a pas oublié les mauvaises choses que les habitants de la grande ville de Babylone avaient faites. Il était très en colère contre eux et il les a beaucoup punis. Ils seront comme des gens qui doivent boire du vin fort de Dieu. Ils devront tout boire et leur douleur sera très grande.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsque le sol a bougé, chaque île de la mer s’en est allée. Il n’y avait plus de montagnes nulle part. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'De fortes pluies avec de grosses pierres de glace sont tombées du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Les pierres ont frappé les gens et leur ont fait mal. Le poids de chaque pierre était d’environ 50 kilos. Les gens ont insulté Dieu, parce que la forte pluie et les pierres de glace leur ont fait beaucoup de mal.
