document_id: REV.16,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 16
  - type: heading
    content: Les 7 coupes avec les 7 derniers malheurs
  - type: text
    content: 'Puis j’ai entendu une voix forte parler de la maison de Dieu dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Elle a dit aux 7 '
  - type: text
    content: anges
  - type: text
    content: '  : Prenez vos 7 coupes pleines de colère de Dieu. Allez les déverser sur la terre.'
  '10':
  - type: text
    content: 'Alors le cinquième '
  - type: text
    content: ange
  - type: text
    content: ' a versé sa coupe sur le trône de l’animal. En conséquence, tout le royaume où régnait l’animal est devenu sombre. Les gens se mordaient les langues. C’était à cause de leur grande douleur. '
  '11':
  - type: text
    content: 'Ils ont insulté le Dieu du '
  - type: text
    content: ciel
  - type: text
    content: ' à cause de leur douleur et des plaies sur leurs peaux. Mais ils n’ont pas cessé de faire de mauvaises choses.'
  '12':
  - type: text
    content: 'Alors le sixième '
  - type: text
    content: ange
  - type: text
    content: ' a versé sa coupe sur le grand fleuve Euphrate. En conséquence, le fleuve est devenu sec. Cela a permis aux rois de l’est de le traverser, avec leurs armées. '
  '13':
  - type: text
    content: 'Puis j’ai vu 3 mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' qui ressemblaient à des grenouilles. Un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' est sorti de la bouche du dragon. Un autre est sorti de la bouche du premier animal. Le troisième est sorti de la bouche du faux '
  - type: text
    content: prophète
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Ces mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' sont les '
  - type: text
    content: esprits
  - type: text
    content: ' des démons. Ils avaient le pouvoir de faire des miracles. Ils sont allés voir tous les dirigeants du monde entier pour les rassembler. C’était pour combattre dans une grande guerre. Cette guerre aura lieu le grand jour de Dieu, qui a toute puissance et tout pouvoir.'
  '15':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit : Écoutez ! Je viendrai secrètement, comme quelqu’un qui vole les gens. Si vous continuez de regarder attentivement, vous serez heureux. Gardez vos vêtements avec vous tout le temps. Ensuite, quand je viendrai, vous n’aurez pas honte parce que vous n’avez pas de vêtements.'
  '16':
  - type: text
    content: 'Puis les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' ont réuni les dirigeants pour combattre dans la grande guerre. Ils sont venus à l’endroit appelé '
  - type: text
    content: Harmaguédon
  - type: text
    content: ' en langue hébraïque.'
  '17':
  - type: text
    content: 'Alors le septième '
  - type: text
    content: ange
  - type: text
    content: ' a versé sa coupe dans l’air. Une voix a parlé fort du trône dans la maison de Dieu. La voix a dit : Maintenant, c’est arrivé ! '
  '18':
  - type: text
    content: 'Il y a eu une grande tempête, avec des éclairs brillants et de forts bruits de '
  - type: text
    content: tonnerre
  - type: text
    content: '. Le sol s’est déplacé très fortement. Le sol n’a jamais bougé aussi fortement pendant tout le temps que les gens ont vécu sur la terre. '
  '19':
  - type: text
    content: En conséquence, la grande ville appelée Babylone s’est divisée en 3 parties. Lorsque le sol a bougé, il a également détruit les grandes villes d’autres pays du monde. Dieu n’a pas oublié les mauvaises choses que les habitants de la grande ville de Babylone avaient faites. Il était très en colère contre eux et il les a beaucoup punis. Ils seront comme des gens qui doivent boire du vin fort de Dieu. Ils devront tout boire et leur douleur sera très grande.
  '2':
  - type: text
    content: 'Le premier '
  - type: text
    content: ange
  - type: text
    content: ' est allé et a versé sa coupe sur la terre. En conséquence, des plaies très mauvaises et douloureuses sont apparues sur la peau des gens. Les plaies faisaient mal à tous ceux qui avaient le signe de l’animal sur eux et qui adoraient l’idole de l’animal.'
  '20':
  - type: text
    content: 'Lorsque le sol a bougé, chaque île de la mer s’en est allée. Il n’y avait plus de montagnes nulle part. '
  '21':
  - type: text
    content: 'De fortes pluies avec de grosses pierres de glace sont tombées du '
  - type: text
    content: ciel
  - type: text
    content: . Les pierres ont frappé les gens et leur ont fait mal. Le poids de chaque pierre était d’environ 50 kilos. Les gens ont insulté Dieu, parce que la forte pluie et les pierres de glace leur ont fait beaucoup de mal.
  '3':
  - type: text
    content: 'Alors le deuxième '
  - type: text
    content: ange
  - type: text
    content: ' a versé sa coupe sur la mer. En conséquence, la mer est devenue comme le sang d’un mort. Tout ce qui vivait dans la mer est alors mort.'
  '4':
  - type: text
    content: 'Alors le troisième '
  - type: text
    content: ange
  - type: text
    content: ' a versé sa coupe sur les fleuves et sur les sources d’eau. En conséquence, toute l’eau est devenue du sang. '
  '5':
  - type: text
    content: Alors j’ai entendu l’
  - type: text
    content: ange
  - type: text
    content: ' qui avait le pouvoir sur les eaux. Il a dit à Dieu :'
  - type: text
    content: Saint, tu es vivant maintenant et tu as toujours été vivant.
  - type: text
    content: Tu es juste dans tout ce que tu décides.
  - type: text
    content: Maintenant, tu as jugé ces gens.
  '6':
  - type: text
    content: 'Ils ont tué ton peuple et tes '
  - type: text
    content: prophètes
  - type: text
    content: .
  - type: text
    content: Ils ont fait saigner et mourir tes serviteurs.
  - type: text
    content: Alors maintenant, tu as donné à ces méchants du sang à boire.
  - type: text
    content: Voilà ce qui devrait leur arriver. C’est vrai.
  '7':
  - type: text
    content: 'Puis j’ai entendu une voix de l’autel dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Elle disait :'
  - type: text
    content: 'Oui, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, tu as tout pouvoir.'
  - type: text
    content: 'Quand tu '
  - type: text
    content: juges
  - type: text
    content: ' les gens, c’est bon et juste !'
  '8':
  - type: text
    content: 'Alors le quatrième '
  - type: text
    content: ange
  - type: text
    content: ' a versé sa coupe sur le soleil. Dieu a donné le pouvoir au soleil pour qu’il brûle les gens avec le feu. '
  '9':
  - type: text
    content: La forte chaleur a brûlé les gens et cela leur a fait très mal. En conséquence, ils ont dit de mauvaises choses contre le nom de Dieu, car il avait le pouvoir de causer ces troubles. Mais ils ont refusé de changer leur façon de vivre. Ils ont refusé d’accepter que Dieu est grand.
