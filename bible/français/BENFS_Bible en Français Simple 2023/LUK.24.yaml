document_id: LUK.24
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 24
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devient vivant à nouveau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Très tôt le dimanche matin, les femmes sont allées à l’endroit où Joseph avait enterré Jésus. Elles ont pris avec elles de l’huile et des graines qu’elles avaient préparées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elles sont arrivées là. Et elles ont constaté que quelqu’un avait enlevé la pierre de devant le trou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ensuite, elles sont allées à l’intérieur du trou dans la roche, mais elles n’ont pas trouvé le corps du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elles ne comprenaient pas du tout. Mais, alors qu’elles pensaient à ce sujet, 2 hommes leur sont apparus. Ces hommes portaient des vêtements brillants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ainsi, les femmes avaient très peur. Alors elles ont baissé leur visage au sol.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les 2 hommes ont dit aux femmes : Vous ne devriez pas chercher ici quelqu’un qui est vivant. Ici, c’est un endroit pour enterrer les morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jésus n’est pas ici. Il est devenu de nouveau vivant. Rappelez‑vous ce qu’il vous avait dit. Il avait dit cela pendant qu’il était encore en Galilée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il avait dit : Il est nécessaire que quelqu’un me livre aux mauvais hommes. Ils vont me tuer sur une croix. 3 jours plus tard, je vais devenir vivant encore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors les femmes se sont rappelé ce que Jésus avait dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Elles ont quitté le trou vide. Elles sont allées auprès des 11 hommes que Jésus avait choisis. Elles leur ont ensuite dit ce qui était arrivé. Elles ont également dit cela à toutes les autres personnes qui suivaient Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il y avait Marie de Magdala et Jeanne qui disaient les nouvelles au sujet de Jésus. Marie, la mère de Jacques, et les autres femmes étaient avec elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais ils ne croyaient pas à ce que les femmes disaient. Ils pensaient que c’était juste de simples imaginations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais Pierre s’est levé. Il a couru vers le trou dans la roche. Il s’est penché et il a regardé à l’intérieur. Il a vu seulement le tissu qu’ils avaient mis autour du corps de Jésus. Il n’y avait rien d’autre. Donc, il est rentré chez lui. Il pensait à ce qui était arrivé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus se montre à 2 personnes qui le suivaient toujours
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Plus tard ce même jour, 2 de ceux qui suivaient Jésus allaient à un village. Le nom de ce village était Emmaüs. Ce village était à environ 12 kilomètres de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils parlaient entre eux de toutes les choses qui étaient arrivées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pendant qu’ils parlaient, Jésus lui‑même est venu près d’eux. Il a commencé à marcher avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais ils ne l’ont pas reconnu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il leur a demandé : De quoi parlez‑vous pendant que vous marchez le long de la route ? Ils sont restés tranquilles et ils semblaient tristes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et puis, l’un d’eux s’appelait Cléopas. Il lui a répondu : Beaucoup de choses se sont passées à Jérusalem au cours de ces derniers jours. Es‑tu le seul visiteur ici qui ne sache rien à ce sujet ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus lui a demandé : Quelles sont les choses qui se sont passées ? L’homme a répondu : Ce qui est arrivé à Jésus qui était de Nazareth. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' lui donnait des messages pour parler. Il faisait beaucoup de très grandes choses et il parlait des messages puissants. Dieu montrait que son message était vrai. Tous les gens croyaient en Lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et nos chefs l’avaient attrapé. Ils l’avaient amené au chef '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romain
  - type: text
    text: '. Ils disaient au chef que Jésus avait fait de mauvaises choses. Ils disaient qu’il devait mourir. Alors, ils l’ont tué sur une croix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais nous espérions que Dieu l’utilisait pour sauver Israël.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Oui, il y a d’autres choses aussi. Aujourd’hui, c’est le troisième jour depuis qu’il est mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après tout cela, quelques femmes de notre groupe nous ont surpris aujourd’hui. Tôt ce matin, elles étaient à l’endroit où on avait enterré Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elles n’ont pas trouvé son corps là. Et elles sont revenues à nous avec un rapport. Elles disaient : Certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' nous sont apparus. Ils nous ont dit que Jésus est vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ainsi, certaines personnes de notre groupe sont allées à l’endroit où on l’avait enterré. Elles ont tout trouvé comme les femmes avaient dit. Mais ils n’ont pas vu Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors Jésus leur a dit : Oh, vous ne raisonnez pas bien ! Vous ne comprenez pas grand‑chose. Vous êtes très lents à croire à tout ce que Dieu disait par ses serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous devriez savoir que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' devait mourir. Alors seulement, il pouvait montrer comment il est vraiment grand et puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il a ensuite commencé à expliquer ce que Moïse avait enseigné. Puis il parlait des autres hommes qui avaient reçu des messages du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: . Il leur expliquait tout ce que les autres hommes avaient écrit sur lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils sont arrivés près du village où ils allaient. Il semblait que Jésus allait continuer son voyage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais ils l’ont arrêté de continuer. Ils lui ont dit : S’il te plaît, reste dans notre maison avec nous. Il fait tard et il sera bientôt nuit.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors, Jésus est entré dans leur maison pour rester avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il s’est mis à table avec eux. Puis il a pris le pain et il a remercié Dieu pour cela. Il a rompu le pain. Et puis il leur a donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors, leurs yeux sont alors devenus clairs et ils l’ont reconnu. Puis, aussitôt, ils ne pouvaient plus le voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils parlaient entre eux ceci : C’était comme un feu qui brûlait en nous. Nous sentions cela pendant que nous marchions le long de la route. Nous sentions aussi cela quand il nous parlait sur le livre de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils se sont immédiatement levés et ils sont retournés à Jérusalem. Là, ils ont trouvé les 11 hommes que Jésus avait choisis. D’autres personnes étaient ensemble avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tous les gens leur donnaient des nouvelles : C’est vrai ! Le Maître est de nouveau vivant. Il est apparu à Simon !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Puis les 2 qui avaient vu Jésus parlaient à tout le groupe. Ils leur disaient ce qui leur était arrivé sur la route. Ils racontaient également comment ils avaient reconnu Jésus. Ils l’ont reconnu quand il avait rompu le pain.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus apparaît au groupe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Pendant qu’ils parlaient encore, Jésus s’est tenu au milieu d’eux. Il leur a dit : Ne vous troublez pas dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais tout le groupe était très surpris et peureux. Ils pensaient qu’ils voyaient un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus leur a dit : Vous ne devriez pas avoir si peur. Pourquoi vous n’êtes pas sûrs dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '  ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mais regardez mes mains et mes pieds. C’est moi. Touchez‑moi. Donc, vous savez que je ne suis pas un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' n’a pas de corps avec la peau et les os comme je le suis. Vous pouvez voir que c’est moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Quand il a dit cela, il leur a montré ses mains et ses pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'C’était tellement une Bonne Nouvelle à laquelle ils ne pouvaient pas croire. Ils étaient très heureux. Jésus leur a demandé : Avez‑vous quelque chose que je pourrais manger ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Alors ils lui ont donné un morceau de poisson qu’ils avaient préparé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus alors a pris le poisson et il en a mangé. Et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' étaient avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Jésus leur a alors dit : Je vous ai dit ces choses pendant que j’étais toujours avec vous. Moïse avait écrit sur moi dans son livre de règles. D’autres serviteurs de Dieu recevaient des messages à propos de moi. Ils écrivaient ensuite dans les livres ce qu’ils entendaient. Le livre intitulé Psaumes parle aussi de moi. Tout ce qu’ils avaient écrit devait arriver. Et c’est devenu vrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Puis Jésus les a aidés à comprendre les messages dans le livre de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Voilà ce qu’il a dit : Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' devait mourir. Puis, au bout de 3 jours, il devait redevenir vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Maintenant, vous devez commencer à dire à tous la Bonne Nouvelle au sujet de moi. Commencez à Jérusalem et allez vers les gens dans tous les pays du monde. Dites‑leur qu’ils doivent se détourner de mauvaises choses. Dites‑leur qu’ils doivent se tourner vers Dieu. Quand ils font cela, Dieu leur pardonnera. Il pardonnera toutes les mauvaises choses qu’ils ont faites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Vous devez dire aux gens sur tout ce que vous avez vu. Et dites aux gens sur tout ce que vous avez entendu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Maintenant, écoutez ! Je vais descendre sur vous le don que Dieu mon Père vous avait promis. Donc, vous devez rester dans la ville jusqu’à ce que cela arrive. Ensuite, la puissance de Dieu vous couvrira.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus monte là où Dieu vit au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Puis Jésus a conduit ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' hors de la ville. Ils sont tous allés à un endroit près de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. Jésus a levé les mains sur eux tous. Il a demandé à Dieu d’être bon et gentil avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Pendant que Jésus priait pour eux, il montait loin d’eux. Dieu l’a élevé à son domicile au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ils ont tous courbé vers le bas sur leurs genoux. Ils disaient tous à Jésus : Tu es grand et puissant. Ton pouvoir est grand. Tu es très beau et important. Puis ils sont retournés à Jérusalem et ils étaient tous très heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ils ont passé tout leur temps dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Ils remerciaient Dieu. Et ils lui disaient combien il est bon.'
