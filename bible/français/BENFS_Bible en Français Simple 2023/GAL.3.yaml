document_id: GAL.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Nous devenons justes avec Dieu seulement parce que nous croyons en lui.
  - type: text
    content: Vous les chrétiens de Galatie, vous êtes des imbéciles ! Quelqu’un vous a appris à croire aux idées folles ! Je vous ai montré très clairement comment et pourquoi Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort sur la croix. '
  '10':
  - type: text
    content: Mais Dieu punira tous ceux qui croient seulement aux règles juives. Ces gens pensent que, par ces règles, ils peuvent devenir justes avec Dieu. Mais ces gens devront être séparés de Dieu.
  - type: text
    content: 'Il est dit dans l’Ancien Testament : Dieu punira toute personne qui n’obéit pas toujours à toutes les règles. Tout le monde doit toujours veiller à faire tout ce qui est dans le livre des lois juives.'
  '11':
  - type: text
    content: 'Il est clair que personne ne peut devenir juste avec Dieu par les règles juives. Car il est dit dans l’Ancien Testament : La personne que j’ai acceptée vivra. Ces gens vont vivre parce qu’ils croient en moi.'
  '12':
  - type: text
    content: 'Mais les règles des Juifs ne permettent pas vraiment de croire en Dieu. Au contraire, il est dit dans l’Ancien Testament :'
  - type: text
    content: La personne qui obéit à toutes ces règles vivra complètement par elles.
  '13':
  - type: text
    content: 'La conséquence des règles juives est : Dieu allait nous punir. Dieu allait se séparer de nous. Mais le '
  - type: text
    content: Christ
  - type: text
    content: ' nous a rachetés, pour nous libérer. Dieu l’a laissé souffrir pour nous. Il est dit dans l’Ancien Testament : Quand des personnes accrochent quelqu’un sur un arbre pour le tuer, cette personne doit être séparée de Dieu.'
  '14':
  - type: text
    content: ' '
  - type: text
    content: Christ
  - type: text
    content: ' a fait cela pour que les païens reçoivent de bonnes choses de Dieu. Ils pourraient recevoir par Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' ce que Dieu avait promis à Abraham. Alors, si nous croyons en '
  - type: text
    content: Christ
  - type: text
    content: ', nous pouvons recevoir l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Nous pouvons recevoir l’'
  - type: text
    content: Esprit
  - type: text
    content: ' que Dieu avait promis.'
  - type: heading
    content: La différence entre les règles juives et ce que Dieu a promis
  '15':
  - type: text
    content: 'Mes frères, je vais utiliser un exemple de ce que les gens font. Lorsque 2 personnes font un bon accord dans le bon sens, personne ne peut changer cet accord. Personne ne peut enlever le pouvoir de cet accord. Personne ne peut y inclure d’autres mots. '
  '16':
  - type: text
    content: 'De la même façon, Dieu a promis des choses à Abraham et à celui qui allait naître d’Abraham. Il n’est pas dit dans l’Ancien Testament à ceux qui allaient naître de lui. Autrement dit, cela ne signifie pas à beaucoup de gens. Non, au contraire, il dit à celui qui allait naître. Autrement dit, cela signifie à une personne seulement. Dieu a promis ces choses à une personne. Et c’est '
  - type: text
    content: Christ
  - type: text
    content: ' qui est cette personne.'
  '17':
  - type: text
    content: 'Ce que je veux dire est ceci : Dieu avait fait un accord. Il a promis de faire ce qu’il avait dit. Puis, 430 ans plus tard, Dieu a donné ses règles aux gens d’Israël. Mais ces règles ne pouvaient pas terminer le pouvoir de l’accord de Dieu. Ces règles ne pouvaient pas arrêter ce que Dieu avait déjà promis.'
  '18':
  - type: text
    content: Nous pouvons recevoir ce que Dieu donne à ses enfants. Mais nous ne le recevons pas à cause des règles juives. Si cela était vrai, alors nous n’allions pas le recevoir à cause de la promesse de Dieu. Mais Dieu l’a donné à Abraham parce qu’il avait promis de le lui donner.
  '19':
  - type: text
    content: 'Donc, nous pourrions demander : Pourquoi Dieu a donné ses règles à son peuple ? Il a donné ces règles pour lui montrer les choses fausses. Dieu a donné ces règles jusqu’à ce que le descendant spécial d’Abraham vienne. C’était celui à qui Dieu avait donné sa promesse. Dieu avait utilisé des anges pour donner ses règles à un homme (Moïse). Il était là au nom de toutes les personnes. Cet homme était entre Dieu et le peuple.'
  '2':
  - type: text
    content: Je veux que vous pensiez à la raison pour laquelle vous avez reçu l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Vous ne l’avez pas reçu parce que vous essayiez d’obéir aux règles des Juifs. Non, vous l’avez reçu parce que vous avez cru à la Bonne Nouvelle. Vous avez entendu la Bonne Nouvelle, et vous y avez cru. '
  '20':
  - type: text
    content: Mais parfois, une seule personne fait quelque chose par elle‑même. Et puis, il n’est pas nécessaire d’avoir un homme au milieu comme ça. Et Dieu a donné sa promesse par lui seul.
  - type: heading
    content: Le but des règles que Dieu a données au peuple d’Israël
  '21':
  - type: text
    content: Alors, peut‑être que quelqu’un pourrait dire que les règles juives travaillent contre les promesses de Dieu. Non, ce n’est pas vrai ! Si toutes leurs règles rendaient les gens vivants en Dieu, alors Dieu allait les donner aux gens. Ensuite, ces règles allaient vraiment rendre les gens justes avec Dieu.
  '22':
  - type: text
    content: Mais il est dit dans l’Ancien Testament que tous les gens dans le monde sont comme en prison. Le péché garde tous les gens en prison. Alors, nous pouvons recevoir ce que Dieu avait promis par Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Dieu donne ce qu’il avait promis à tous les croyants par '
  - type: text
    content: Christ
  - type: text
    content: .
  '23':
  - type: text
    content: 'Mais avant que nous croyions en '
  - type: text
    content: Christ
  - type: text
    content: ', nous suivions les règles juives sans problème. Ces règles nous gardaient comme prisonniers, jusqu’à ce que Dieu nous montre que nous devons croire en '
  - type: text
    content: Christ
  - type: text
    content: .
  '24':
  - type: text
    content: 'Ainsi, les règles juives étaient comme notre enseignant. Ces règles nous ont amenés à '
  - type: text
    content: Christ
  - type: text
    content: '. Alors nous pouvons devenir justes avec Dieu, parce que nous croyons en '
  - type: text
    content: Christ
  - type: text
    content: .
  '25':
  - type: text
    content: 'Mais maintenant, nous croyons en '
  - type: text
    content: Christ
  - type: text
    content: . Alors les règles juives n’ont plus d’autorité comme notre enseignant.
  - type: heading
    content: Fils de Dieu
  '26':
  - type: text
    content: Vous êtes tous fils de Dieu, parce que vous croyez en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '27':
  - type: text
    content: 'Tous d’entre vous que Dieu a baptisés en '
  - type: text
    content: Christ
  - type: text
    content: ' ont revêtu le '
  - type: text
    content: Christ
  - type: text
    content: '. Vous avez porté '
  - type: text
    content: Christ
  - type: text
    content: '. C’est comme quelqu’un qui porte de nouveaux vêtements. '
  '28':
  - type: text
    content: Vous n’êtes plus différents les uns des autres.
  - type: text
    content: La raison est que vous êtes tous unis ensemble en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Que vous soyez Juifs ou païens, hommes ou femmes, esclaves ou hommes libres, vous êtes tous unis en lui. '
  '29':
  - type: text
    content: 'Et si vous appartenez à '
  - type: text
    content: Christ
  - type: text
    content: ', alors vous êtes des descendants d’Abraham. Ainsi, vous recevrez tout ce que Dieu avait promis à Abraham.'
  '3':
  - type: text
    content: Vous avez commencé avec l’aide de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Donc, vous ne devriez pas finir par vous conduire vous‑mêmes. Vous ne devriez pas être si bêtes ! '
  '4':
  - type: text
    content: Vous avez eu beaucoup de problèmes. Ils vous ont appris tellement beaucoup. Vous ne devez pas jeter ce que vous avez appris à la suite de tous ces troubles.
  '5':
  - type: text
    content: 'Dieu vous donne son '
  - type: text
    content: Esprit
  - type: text
    content: . Et il fait des choses spéciales parmi vous. Ces choses surprennent les gens. Mais il ne fait pas ces choses parce que vous obéissez aux règles juives. Non, il les fait parce que vous croyez à la Bonne Nouvelle. Vous croyez à la Bonne Nouvelle que vous avez entendue.
  '6':
  - type: text
    content: Pensez à Abraham. Abraham a cru en Dieu et, par conséquent, Dieu a accepté Abraham comme juste avec lui‑même. Donc, les gens qui croient en Dieu, sont les enfants d’Abraham. Voici ce que vous devez comprendre.
  '8':
  - type: text
    content: 'Dans l’Ancien Testament, il est dit que, à un moment futur, Dieu a voulu faire les païens justes avec lui‑même. Il les fera justes avec lui‑même s’ils croient en lui. Et donc, l’Ancien Testament a parlé de cette Bonne Nouvelle future à Abraham. Dieu a dit : Je serai bon à tous les gens de tous les pays à cause de toi. '
  '9':
  - type: text
    content: Alors, Dieu sera bon à tous ceux qui croient en lui, comme Abraham.
