document_id: GAL.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nous devenons justes avec Dieu seulement parce que nous croyons en lui.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous les chrétiens de Galatie, vous êtes des imbéciles ! Quelqu’un vous a appris à croire aux idées folles ! Je vous ai montré très clairement comment et pourquoi Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort sur la croix. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Dieu punira tous ceux qui croient seulement aux règles juives. Ces gens pensent que, par ces règles, ils peuvent devenir justes avec Dieu. Mais ces gens devront être séparés de Dieu.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il est dit dans l’Ancien Testament : Dieu punira toute personne qui n’obéit pas toujours à toutes les règles. Tout le monde doit toujours veiller à faire tout ce qui est dans le livre des lois juives.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est clair que personne ne peut devenir juste avec Dieu par les règles juives. Car il est dit dans l’Ancien Testament : La personne que j’ai acceptée vivra. Ces gens vont vivre parce qu’ils croient en moi.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les règles des Juifs ne permettent pas vraiment de croire en Dieu. Au contraire, il est dit dans l’Ancien Testament :'
  - type: usfm
    marker: m
    children:
    - type: text
      text: La personne qui obéit à toutes ces règles vivra complètement par elles.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La conséquence des règles juives est : Dieu allait nous punir. Dieu allait se séparer de nous. Mais le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' nous a rachetés, pour nous libérer. Dieu l’a laissé souffrir pour nous. Il est dit dans l’Ancien Testament : Quand des personnes accrochent quelqu’un sur un arbre pour le tuer, cette personne doit être séparée de Dieu.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a fait cela pour que les païens reçoivent de bonnes choses de Dieu. Ils pourraient recevoir par Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' ce que Dieu avait promis à Abraham. Alors, si nous croyons en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', nous pouvons recevoir l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Nous pouvons recevoir l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' que Dieu avait promis.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La différence entre les règles juives et ce que Dieu a promis
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mes frères, je vais utiliser un exemple de ce que les gens font. Lorsque 2 personnes font un bon accord dans le bon sens, personne ne peut changer cet accord. Personne ne peut enlever le pouvoir de cet accord. Personne ne peut y inclure d’autres mots. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De la même façon, Dieu a promis des choses à Abraham et à celui qui allait naître d’Abraham. Il n’est pas dit dans l’Ancien Testament à ceux qui allaient naître de lui. Autrement dit, cela ne signifie pas à beaucoup de gens. Non, au contraire, il dit à celui qui allait naître. Autrement dit, cela signifie à une personne seulement. Dieu a promis ces choses à une personne. Et c’est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' qui est cette personne.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce que je veux dire est ceci : Dieu avait fait un accord. Il a promis de faire ce qu’il avait dit. Puis, 430 ans plus tard, Dieu a donné ses règles aux gens d’Israël. Mais ces règles ne pouvaient pas terminer le pouvoir de l’accord de Dieu. Ces règles ne pouvaient pas arrêter ce que Dieu avait déjà promis.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous pouvons recevoir ce que Dieu donne à ses enfants. Mais nous ne le recevons pas à cause des règles juives. Si cela était vrai, alors nous n’allions pas le recevoir à cause de la promesse de Dieu. Mais Dieu l’a donné à Abraham parce qu’il avait promis de le lui donner.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donc, nous pourrions demander : Pourquoi Dieu a donné ses règles à son peuple ? Il a donné ces règles pour lui montrer les choses fausses. Dieu a donné ces règles jusqu’à ce que le descendant spécial d’Abraham vienne. C’était celui à qui Dieu avait donné sa promesse. Dieu avait utilisé des anges pour donner ses règles à un homme (Moïse). Il était là au nom de toutes les personnes. Cet homme était entre Dieu et le peuple.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je veux que vous pensiez à la raison pour laquelle vous avez reçu l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Vous ne l’avez pas reçu parce que vous essayiez d’obéir aux règles des Juifs. Non, vous l’avez reçu parce que vous avez cru à la Bonne Nouvelle. Vous avez entendu la Bonne Nouvelle, et vous y avez cru. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais parfois, une seule personne fait quelque chose par elle‑même. Et puis, il n’est pas nécessaire d’avoir un homme au milieu comme ça. Et Dieu a donné sa promesse par lui seul.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le but des règles que Dieu a données au peuple d’Israël
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, peut‑être que quelqu’un pourrait dire que les règles juives travaillent contre les promesses de Dieu. Non, ce n’est pas vrai ! Si toutes leurs règles rendaient les gens vivants en Dieu, alors Dieu allait les donner aux gens. Ensuite, ces règles allaient vraiment rendre les gens justes avec Dieu.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il est dit dans l’Ancien Testament que tous les gens dans le monde sont comme en prison. Le péché garde tous les gens en prison. Alors, nous pouvons recevoir ce que Dieu avait promis par Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Dieu donne ce qu’il avait promis à tous les croyants par '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais avant que nous croyions en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', nous suivions les règles juives sans problème. Ces règles nous gardaient comme prisonniers, jusqu’à ce que Dieu nous montre que nous devons croire en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, les règles juives étaient comme notre enseignant. Ces règles nous ont amenés à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Alors nous pouvons devenir justes avec Dieu, parce que nous croyons en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais maintenant, nous croyons en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Alors les règles juives n’ont plus d’autorité comme notre enseignant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fils de Dieu
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous êtes tous fils de Dieu, parce que vous croyez en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous d’entre vous que Dieu a baptisés en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' ont revêtu le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Vous avez porté '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. C’est comme quelqu’un qui porte de nouveaux vêtements. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous n’êtes plus différents les uns des autres.
  - type: usfm
    marker: p
    children:
    - type: text
      text: La raison est que vous êtes tous unis ensemble en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Que vous soyez Juifs ou païens, hommes ou femmes, esclaves ou hommes libres, vous êtes tous unis en lui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si vous appartenez à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', alors vous êtes des descendants d’Abraham. Ainsi, vous recevrez tout ce que Dieu avait promis à Abraham.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous avez commencé avec l’aide de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Donc, vous ne devriez pas finir par vous conduire vous‑mêmes. Vous ne devriez pas être si bêtes ! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous avez eu beaucoup de problèmes. Ils vous ont appris tellement beaucoup. Vous ne devez pas jeter ce que vous avez appris à la suite de tous ces troubles.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu vous donne son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: . Et il fait des choses spéciales parmi vous. Ces choses surprennent les gens. Mais il ne fait pas ces choses parce que vous obéissez aux règles juives. Non, il les fait parce que vous croyez à la Bonne Nouvelle. Vous croyez à la Bonne Nouvelle que vous avez entendue.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pensez à Abraham. Abraham a cru en Dieu et, par conséquent, Dieu a accepté Abraham comme juste avec lui‑même. Donc, les gens qui croient en Dieu, sont les enfants d’Abraham. Voici ce que vous devez comprendre.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans l’Ancien Testament, il est dit que, à un moment futur, Dieu a voulu faire les païens justes avec lui‑même. Il les fera justes avec lui‑même s’ils croient en lui. Et donc, l’Ancien Testament a parlé de cette Bonne Nouvelle future à Abraham. Dieu a dit : Je serai bon à tous les gens de tous les pays à cause de toi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, Dieu sera bon à tous ceux qui croient en lui, comme Abraham.
