document_id: 2TI.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Timothée doit continuer de faire son travail pour Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Timothée, je te dis ceci sérieusement, car Dieu et Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' savent tout ce que nous faisons. Lorsque Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' viendra pour régner en tant que roi, il jugera tout le monde. Il jugera les gens vivants ainsi que ceux qui sont déjà morts. Lorsqu’il apparaîtra, il décidera de ce qui devrait leur arriver à tous. Donc, je te dis ceci maintenant :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dis le message de Dieu aux gens. Sois toujours prêt à dire clairement le message de Dieu aux gens, qu’ils t’écoutent ou non. Avertis les gens lorsqu’ils font quelque chose de mal.
- type: usfm
  marker: m
  children:
  - type: text
    text: Dis‑leur d’arrêter de faire de mauvaises choses et explique‑leur ce qu’ils doivent faire. Mais sois très patient pendant que tu leur apprends ce qui est vrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fais cela, car un temps viendra où les gens n’écouteront pas le vrai message de Dieu. Mais, ils voudront entendre toutes sortes de nouveaux messages qui les rendront heureux. Ils trouveront donc pour eux‑mêmes de nombreux enseignants qui leur diront ce qu’ils veulent entendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les gens refuseront d’écouter le vrai message de Dieu. Par contre, ils voudront écouter de mauvaises et fausses histoires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais tu dois toi‑même continuer de penser sérieusement et clairement. Sois patient et courageux lorsque des problèmes surviennent. Continue d’annoncer la Bonne Nouvelle de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' aux gens. Fais tout le travail que Dieu t’a donné à faire comme son serviteur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quant à moi, il est presque temps pour moi de mourir. Ma mort sera comme une boisson qu’ils verseront à Dieu. Ma vie de serviteur de Dieu prendra fin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’ai travaillé pour bien servir '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. J’ai fini tout ce que Dieu voulait que je fasse, comme un coureur qui a couru jusqu’à la fin de la course. J’ai continué de croire au vrai message de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors maintenant, un cadeau m’attend. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me rendra complètement juste et heureux. Ce sera comme une couronne que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me donnera en ce grand jour où il jugera les gens. C’est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' qui est juste. Il ne donnera pas ce cadeau à moi seul. Il le donnera aussi à tous ceux qui l’aiment. Ils seront heureux de le revoir quand il reviendra.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les derniers mots de Paul à Timothée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Timothée, viens me voir dès que possible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Démas m’a quitté et il est parti pour la ville de Thessalonique. Il voulait trop apprécier les choses de ce monde. Crescens est allé dans la région de Galatie. Tite s’est rendu dans la région de la Dalmatie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Seul Luc est avec moi maintenant. Emmène aussi Marc lorsque tu viendras. Il peut m’aider beaucoup dans le travail pour Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: J’ai maintenant envoyé Tychique à Éphèse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J’ai laissé un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: ' chez Carpus à Troas. Apporte‑le‑moi quand tu viens. Apporte également les livres pour moi. Si tu ne peux pas les amener tous, assure‑toi d’amener mes papiers spéciaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alexandre, l’homme qui fabrique des objets en métal, m’a causé beaucoup de problèmes. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' le punira à cause de mauvaises choses qu’il a faites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu dois également veiller à ce qu’il ne te cause aucun problème. Il s’est durement opposé à notre message.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J’ai dû expliquer à un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' que je n’avais rien fait de mal. La première fois que j’ai fait ça, personne ne m’a aidé. Tous mes amis sont restés à l’écart. Je prie que Dieu leur pardonne cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' était là pour m’aider. Il m’a rendu fort pour que je puisse dire clairement son message. Les païens de nombreux pays ont pu entendre ce que j’ai dit. De cette façon, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m’a sauvé du danger de mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Oui, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' continuera de me sauver de toute mauvaise chose. Et il m’amènera en toute sécurité au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' où il règne. Il est très grand et nous devons le louer pour toujours ! Amen ! C’est vrai !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dis bonjour de ma part à Prisca et Aquilas, et à la famille d’Onésiphore.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Éraste est resté à Corinthe. J’ai laissé Trophime à Milet, parce qu’il était malade.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Essaie de venir avant l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: hiver
  - type: text
    text: . Eubulus, Pudens, Linus et Claudia te disent bonjour. Tous les autres croyants ici te disent également bonjour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je prie pour que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' continue de te fortifier dans ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Je prie pour qu’il soit gentil avec vous tous.
