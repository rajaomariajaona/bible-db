document_id: 2TI.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Timothée doit continuer de faire son travail pour Dieu
  - type: text
    content: Timothée, je te dis ceci sérieusement, car Dieu et Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' savent tout ce que nous faisons. Lorsque Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' viendra pour régner en tant que roi, il jugera tout le monde. Il jugera les gens vivants ainsi que ceux qui sont déjà morts. Lorsqu’il apparaîtra, il décidera de ce qui devrait leur arriver à tous. Donc, je te dis ceci maintenant :'
  '10':
  - type: text
    content: Démas m’a quitté et il est parti pour la ville de Thessalonique. Il voulait trop apprécier les choses de ce monde. Crescens est allé dans la région de Galatie. Tite s’est rendu dans la région de la Dalmatie.
  '11':
  - type: text
    content: 'Seul Luc est avec moi maintenant. Emmène aussi Marc lorsque tu viendras. Il peut m’aider beaucoup dans le travail pour Dieu. '
  '12':
  - type: text
    content: J’ai maintenant envoyé Tychique à Éphèse.
  '13':
  - type: text
    content: 'J’ai laissé un '
  - type: text
    content: manteau
  - type: text
    content: ' chez Carpus à Troas. Apporte‑le‑moi quand tu viens. Apporte également les livres pour moi. Si tu ne peux pas les amener tous, assure‑toi d’amener mes papiers spéciaux.'
  '14':
  - type: text
    content: 'Alexandre, l’homme qui fabrique des objets en métal, m’a causé beaucoup de problèmes. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le punira à cause de mauvaises choses qu’il a faites. '
  '15':
  - type: text
    content: Tu dois également veiller à ce qu’il ne te cause aucun problème. Il s’est durement opposé à notre message.
  '16':
  - type: text
    content: 'J’ai dû expliquer à un '
  - type: text
    content: juge
  - type: text
    content: ' que je n’avais rien fait de mal. La première fois que j’ai fait ça, personne ne m’a aidé. Tous mes amis sont restés à l’écart. Je prie que Dieu leur pardonne cela. '
  '17':
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était là pour m’aider. Il m’a rendu fort pour que je puisse dire clairement son message. Les païens de nombreux pays ont pu entendre ce que j’ai dit. De cette façon, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m’a sauvé du danger de mort. '
  '18':
  - type: text
    content: 'Oui, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' continuera de me sauver de toute mauvaise chose. Et il m’amènera en toute sécurité au '
  - type: text
    content: ciel
  - type: text
    content: ' où il règne. Il est très grand et nous devons le louer pour toujours ! Amen ! C’est vrai !'
  '19':
  - type: text
    content: Dis bonjour de ma part à Prisca et Aquilas, et à la famille d’Onésiphore.
  '2':
  - type: text
    content: Dis le message de Dieu aux gens. Sois toujours prêt à dire clairement le message de Dieu aux gens, qu’ils t’écoutent ou non. Avertis les gens lorsqu’ils font quelque chose de mal.
  - type: text
    content: Dis‑leur d’arrêter de faire de mauvaises choses et explique‑leur ce qu’ils doivent faire. Mais sois très patient pendant que tu leur apprends ce qui est vrai.
  '20':
  - type: text
    content: Éraste est resté à Corinthe. J’ai laissé Trophime à Milet, parce qu’il était malade.
  '21':
  - type: text
    content: Essaie de venir avant l’
  - type: text
    content: hiver
  - type: text
    content: . Eubulus, Pudens, Linus et Claudia te disent bonjour. Tous les autres croyants ici te disent également bonjour.
  '22':
  - type: text
    content: 'Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' continue de te fortifier dans ton '
  - type: text
    content: esprit
  - type: text
    content: . Je prie pour qu’il soit gentil avec vous tous.
  '3':
  - type: text
    content: 'Fais cela, car un temps viendra où les gens n’écouteront pas le vrai message de Dieu. Mais, ils voudront entendre toutes sortes de nouveaux messages qui les rendront heureux. Ils trouveront donc pour eux‑mêmes de nombreux enseignants qui leur diront ce qu’ils veulent entendre. '
  '4':
  - type: text
    content: 'Les gens refuseront d’écouter le vrai message de Dieu. Par contre, ils voudront écouter de mauvaises et fausses histoires. '
  '5':
  - type: text
    content: 'Mais tu dois toi‑même continuer de penser sérieusement et clairement. Sois patient et courageux lorsque des problèmes surviennent. Continue d’annoncer la Bonne Nouvelle de '
  - type: text
    content: Christ
  - type: text
    content: ' aux gens. Fais tout le travail que Dieu t’a donné à faire comme son serviteur.'
  '6':
  - type: text
    content: 'Quant à moi, il est presque temps pour moi de mourir. Ma mort sera comme une boisson qu’ils verseront à Dieu. Ma vie de serviteur de Dieu prendra fin. '
  '7':
  - type: text
    content: 'J’ai travaillé pour bien servir '
  - type: text
    content: Christ
  - type: text
    content: '. J’ai fini tout ce que Dieu voulait que je fasse, comme un coureur qui a couru jusqu’à la fin de la course. J’ai continué de croire au vrai message de Dieu. '
  '8':
  - type: text
    content: 'Alors maintenant, un cadeau m’attend. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me rendra complètement juste et heureux. Ce sera comme une couronne que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me donnera en ce grand jour où il jugera les gens. C’est le '
  - type: text
    content: juge
  - type: text
    content: ' qui est juste. Il ne donnera pas ce cadeau à moi seul. Il le donnera aussi à tous ceux qui l’aiment. Ils seront heureux de le revoir quand il reviendra.'
  - type: heading
    content: Les derniers mots de Paul à Timothée
  '9':
  - type: text
    content: 'Timothée, viens me voir dès que possible. '
