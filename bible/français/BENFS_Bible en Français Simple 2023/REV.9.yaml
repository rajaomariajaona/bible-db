document_id: REV.9,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 9
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La cinquième trompette
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le cinquième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a sonné la trompette. Puis j’ai vu une étoile qui était tombée du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' vers la terre. Quelqu’un a donné une clé à cette étoile. La clé a pu ouvrir la voie qui descend dans le trou profond. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elles avaient du poison dans la queue, comme des scorpions. Elles avaient le pouvoir d’attaquer les gens avec leurs queues et de les faire souffrir pendant 5 mois. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le roi qui les dirigeait était l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' du trou profond. Son nom est Abaddon en hébreu. En grec, son nom est Apollyon.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le premier grand problème est maintenant terminé. Mais après toutes ces choses, il y a encore 2 grands problèmes à venir.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La sixième trompette
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le sixième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a fait un son avec sa trompette. J’ai entendu une voix qui lui parlait aux 4 coins de l’autel d’or. Cet autel est proche de Dieu lui‑même. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'La voix disait au sixième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: '  : Il y a 4 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' au grand fleuve Euphrate. Quelqu’un les a attachés pour qu’ils ne puissent pas bouger. Tu dois aller les délier ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il est parti donc et il a fait libérer ces 4 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '. Dieu les avait tenus prêts pour ce moment spécial, pour l’heure, le jour, le mois et l’année. Ils étaient maintenant prêts à tuer un tiers des personnes partout dans le monde. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: J’ai entendu le nombre des soldats dans leur grande armée. Il y avait 200 millions de soldats qui montaient sur des chevaux.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'C’était comme une vision quand j’ai vu les soldats et leurs chevaux. Les soldats avaient des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: boucliers
    - type: text
      text: ' sur le devant de leurs corps. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: boucliers
    - type: text
      text: ' avaient de nombreuses couleurs. Ils étaient rouges vifs comme le feu, bleus vifs et jaunes vifs comme le soufre. Les têtes des chevaux ressemblaient à des têtes de lions. Du feu, de la fumée et du soufre sortaient de leurs bouches. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le feu, la fumée et le soufre ont tué des gens. Ces 3 mauvaises choses ont tué un tiers des personnes partout dans le monde. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les chevaux avaient une grande puissance dans leurs bouches et dans les queues. Leurs queues étaient comme des serpents, avec des têtes qui pouvaient faire beaucoup de mal aux gens.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’étoile a ouvert la voie dans le trou profond. De la fumée est sortie du trou. C’était comme la fumée d’un très grand feu chaud. La fumée a provoqué l’obscurité du soleil et de l’air.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais tous les gens que le feu, la fumée et le soufre n’ont pas tués, continuaient de faire de mauvaises choses. Ils n’ont pas changé leur façon de vivre. Ils ont continué d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: ' les choses qu’ils avaient faites de leurs propres mains. Ils n’ont pas laissé d’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: ' des démons et des idoles. Ces idoles étaient faites d’or, ou d’argent, ou de bronze, ou de pierre, ou de bois. Elles ne pouvaient rien voir et elles n’entendaient rien. Elles ne pouvaient pas non plus marcher n’importe où. Mais les gens les adoraient toujours. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ils n’étaient pas tristes d’avoir tué d’autres personnes. Ils n’étaient pas tristes d’avoir utilisé la magie pour faire du mal aux gens. Ils ont continué à avoir des relations sexuelles avec des personnes qui n’étaient ni leurs maris ni leurs femmes. Ils ont continué à voler d’autres personnes. Ils n’étaient pas du tout tristes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ensuite des sauterelles sont sorties de la fumée et elles sont descendues sur la terre. Elles ont reçu le pouvoir de causer beaucoup de douleur, comme le pouvoir des scorpions. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Elles savaient qu’elles ne devaient rien faire de mal à l’herbe de la terre. Elles ne devaient attaquer aucune plante verte, ni aucun arbre ni l’herbe. Elles ne pouvaient attaquer que des gens qui n’avaient pas le sceau de Dieu sur les fronts.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les sauterelles n’avaient pas le pouvoir de tuer ces personnes. Mais elles pouvaient leur causer de très fortes douleurs pendant 5 mois. Leur douleur était comme la grande douleur d’un scorpion quand elle fait mal à quelqu’un. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Pendant cette période de grande douleur, les gens voudront se tuer. Ils voudront mourir, mais ils ne trouveront aucun moyen de mourir.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les sauterelles étaient comme des chevaux prêts à combattre dans une guerre. Elles portaient quelque chose sur leurs têtes qui semblait être des couronnes d’or. Leurs visages ressemblaient à des visages humains. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Leurs cheveux étaient comme les cheveux des femmes. Leurs dents étaient comme des dents de lions. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Elles avaient des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: boucliers
    - type: text
      text: ' sur le devant de leurs corps, comme des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: boucliers
    - type: text
      text: ' en fer. Leurs ailes faisaient un bruit très fort. Le son était comme beaucoup de chevaux qui tirent des charrettes pour aller combattre. '
