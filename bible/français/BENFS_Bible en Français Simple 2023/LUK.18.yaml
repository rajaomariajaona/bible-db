document_id: LUK.18,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 18
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de la façon de prier
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors Jésus a dit une histoire à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Il leur a enseigné qu’il ne faut pas se fatiguer. Mais ils doivent continuer à prier. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Un jour, 2 hommes sont entrés dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu pour prier. Un homme était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: '. L’autre homme avait le travail de percevoir les taxes pour l’État. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: ' était debout. Et il priait là où d’autres personnes pouvaient le voir : Merci, mon Dieu, je suis différent de tous ces autres gens. Ils volent. Ils sont mauvais. Ils ont des rapports sexuels en dehors du mariage. Merci aussi que je suis différent de cet homme. Il a le travail de percevoir l’argent des taxes pour l’État.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: J’arrête de manger pendant 2 jours chaque semaine. Je te donne un dixième de tout ce que je reçois.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais l’autre homme se tenait très loin. Il ne pouvait même pas lever les yeux vers le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il frappait son corps avec ses mains pour montrer combien il était triste. Il disait : S’il te plaît, Dieu, aie pitié de moi. J’ai fait beaucoup de mauvaises choses.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je vous dis ceci : L’homme qui percevait les taxes pour l’État est rentré chez lui. Dieu l’a considéré juste. Mais Dieu n’a pas considéré le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: ' juste. Si quelqu’un pense qu’il est important, Dieu va l’abaisser. Si quelqu’un s’abaisse, Dieu va l’élever.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus est avec les petits enfants
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les gens emmenaient même de petits enfants auprès de Jésus. Ils faisaient cela pour qu’il puisse toucher les enfants. Mais ceux qui suivaient toujours Jésus, ont vu cela. Ils leur ont dit : Arrêtez d’emmener tous ces enfants ici.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors Jésus a crié vers eux : Laissez les enfants venir à moi. N’essayez pas de les arrêter. Dieu règne dans la vie des gens qui sont comme ces enfants. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Permettez‑moi de vous dire quelque chose d’important. Vous devez recevoir le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: ' comme un enfant. Si vous ne le faites pas, Dieu ne régnera jamais dans votre vie.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus rencontre un homme riche
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Un chef '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juif
    - type: text
      text: ' est venu auprès de Jésus. Il lui a demandé : Bon maître, que dois‑je faire pour que je puisse vivre pour tous les temps ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jésus a dit : Pourquoi dis‑tu que je suis bon ? Personne n’est bon, sauf Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il a dit : Dans une certaine ville, il y avait un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: . Il ne pensait pas que Dieu ou les gens étaient importants.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu connais les règles de Dieu. Ne couche pas avec une personne qui n’est pas ton épouse. Ne tue pas une personne. Ne vole pas les choses de quelqu’un. Dis seulement les vraies choses sur des gens. Aime ton père et ta mère.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il a répondu : J’ai obéi à toutes ces règles depuis l’âge de 12 ans.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus a entendu ce qu’il a dit. Il a dit : Tu dois encore faire une chose. Tu dois vendre tout ce que tu as. Donne l’argent aux pauvres. Donc, alors tu auras beaucoup de choses précieuses au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' là où Dieu habite. Ensuite, reviens et obéis‑moi.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Lorsque le chef '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juif
    - type: text
      text: ' a entendu cela, il est devenu très triste. Il était très riche.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Jésus a vu que ce chef '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juif
    - type: text
      text: ' était devenu triste. Il a dit : Il est très difficile aux gens riches de demander à Dieu de régner dans leurs vies. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Après tout, il est plus facile à un grand animal (
    - type: usfm
      marker: w
      children:
      - type: text
        text: chameau
    - type: text
      text: ) de passer à travers le trou d’une aiguille. Mais il est encore plus difficile à un homme riche de demander à Dieu de régner dans sa vie.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Les gens qui écoutaient Jésus ont alors demandé : Alors, qui est‑ce que Dieu va sauver ?'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il a répondu : Dieu peut faire des choses que personne ne peut faire.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Pierre a dit : Ecoute ! Nous avons tout quitté pour t’obéir.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus a répondu : Permets‑moi de te dire quelque chose d’important. Il y a des gens qui quittent leurs maisons pour obéir à Dieu. Ils veulent que Dieu dirigent leurs vies. Ils peuvent quitter leurs femmes, leurs frères, leurs parents et leurs enfants. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Une femme vivait dans cette même ville. Son mari était mort. Elle a continué à venir auprès du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' avec un problème. Elle disait : S’il te plaît, tiens‑moi à l’abri de la personne qui est contre moi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ces gens recevront dans cette vie beaucoup plus que ce qu’ils ont laissé. Et après leur mort, ils auront quelque chose d’autre. Ils auront une vie pour toujours.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jésus a pris les 12 hommes qu’il avait choisis loin des autres personnes. Il leur a dit : Écoutez ! Nous allons à Jérusalem. Quand nous serons là, beaucoup de mauvaises choses vont se produire contre moi. Il y a longtemps que les serviteurs de Dieu avaient écrit des messages du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: '. Tout ce qu’il leur avait dit au sujet du Fils de l’homme va maintenant m’arriver. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Voici ce qu’il avait dit : Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' me livreront à ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Ils vont se moquer de moi. Ils vont faire de mauvaises choses contre moi. Ils vont cracher sur moi. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ils vont me frapper avec un fouet et puis ils vont me tuer. Mais au bout de 3 jours, je vais devenir de nouveau vivant.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Les 12 hommes que Jésus avait choisis ne comprenaient aucune de ces choses. Quelque chose cachait ces choses d’eux. Donc, ils ne savaient pas de quoi Jésus parlait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit un aveugle
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Quand Jésus approchait de Jéricho, un homme était assis au bord de la route. Cet homme ne pouvait pas voir et il demandait aux gens de lui donner de l’argent. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Puis il a entendu une grande foule de gens qui passaient. Ainsi, il a demandé aux gens près de lui ce qui se passait.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ils ont répondu : C’est Jésus de Nazareth qui passe.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'L’homme a commencé à crier : Jésus, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: ', s’il te plaît, aie pitié de moi '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Les gens qui marchaient devant la foule tentaient de l’arrêter. Ils lui disaient : Sois calme ! Mais il criait encore plus fort : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de David
    - type: text
      text: ', s’il te plaît, aie pitié de moi !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Pour un temps, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' ne voulait rien faire pour elle. Plus tard, il a réfléchi. Il a dit en lui‑même ceci : Je ne pense pas que Dieu ou les gens soient importants. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Alors Jésus s’est arrêté. Il a dit : Emmenez‑moi cet homme. Puis, quand l’homme est venu tout près, Jésus lui a parlé.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Que veux‑tu que je fasse pour toi ? Il a répondu : Maître, s’il te plaît, aide‑moi à voir.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Jésus a dit : Vois. Tu es maintenant bien, parce que tu as cru en moi.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Aussitôt l’homme a pu voir. Il a commencé à suivre Jésus. Il disait : Dieu, Tu es très grand et puissant. Beaucoup de gens ont vu ce qui était arrivé. Ils disaient : Dieu, Tu es très grand et puissant.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mais cette femme me dérange. Si je ne fais rien pour elle, elle va continuer à venir à moi encore et encore. Elle me fera beaucoup fatiguer. Donc, je vais l’aider. Je dirai qu’elle a raison.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jésus a dit : Ce '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' n’a pas été un homme bon. Mais vous devriez penser à ce qu’il s’est dit lui‑même. Il aidera seulement parce que la femme le dérange. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais Dieu aide toujours ceux qu’il a choisis pour être ses enfants. Quand ils continuent de lui demander de l’aide, il leur répondra immédiatement. Il ne va pas attendre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Je vous dis ceci : Il dira qu’ils ont raison. Il les aidera rapidement. Je reviendrai sur terre. Mais je ne vais pas trouver beaucoup de gens qui croient encore en moi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire sur 2 hommes qui priaient
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Jésus a aussi dit une autre histoire. C’était pour enseigner les gens. Certaines personnes pensaient qu’elles étaient très bonnes. Elles pensaient aussi qu’elles étaient mieux que d’autres.
