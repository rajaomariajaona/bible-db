document_id: LUK.18,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 18
  - type: heading
    content: Jésus parle de la façon de prier
  - type: text
    content: 'Alors Jésus a dit une histoire à ses '
  - type: text
    content: disciples
  - type: text
    content: '. Il leur a enseigné qu’il ne faut pas se fatiguer. Mais ils doivent continuer à prier. '
  '10':
  - type: text
    content: 'Un jour, 2 hommes sont entrés dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu pour prier. Un homme était un '
  - type: text
    content: Pharisien
  - type: text
    content: '. L’autre homme avait le travail de percevoir les taxes pour l’État. '
  '11':
  - type: text
    content: 'Le '
  - type: text
    content: Pharisien
  - type: text
    content: ' était debout. Et il priait là où d’autres personnes pouvaient le voir : Merci, mon Dieu, je suis différent de tous ces autres gens. Ils volent. Ils sont mauvais. Ils ont des rapports sexuels en dehors du mariage. Merci aussi que je suis différent de cet homme. Il a le travail de percevoir l’argent des taxes pour l’État.'
  '12':
  - type: text
    content: J’arrête de manger pendant 2 jours chaque semaine. Je te donne un dixième de tout ce que je reçois.
  '13':
  - type: text
    content: 'Mais l’autre homme se tenait très loin. Il ne pouvait même pas lever les yeux vers le '
  - type: text
    content: ciel
  - type: text
    content: '. Il frappait son corps avec ses mains pour montrer combien il était triste. Il disait : S’il te plaît, Dieu, aie pitié de moi. J’ai fait beaucoup de mauvaises choses.'
  '14':
  - type: text
    content: 'Je vous dis ceci : L’homme qui percevait les taxes pour l’État est rentré chez lui. Dieu l’a considéré juste. Mais Dieu n’a pas considéré le '
  - type: text
    content: Pharisien
  - type: text
    content: ' juste. Si quelqu’un pense qu’il est important, Dieu va l’abaisser. Si quelqu’un s’abaisse, Dieu va l’élever.'
  - type: heading
    content: Jésus est avec les petits enfants
  '15':
  - type: text
    content: 'Les gens emmenaient même de petits enfants auprès de Jésus. Ils faisaient cela pour qu’il puisse toucher les enfants. Mais ceux qui suivaient toujours Jésus, ont vu cela. Ils leur ont dit : Arrêtez d’emmener tous ces enfants ici.'
  '16':
  - type: text
    content: 'Alors Jésus a crié vers eux : Laissez les enfants venir à moi. N’essayez pas de les arrêter. Dieu règne dans la vie des gens qui sont comme ces enfants. '
  '17':
  - type: text
    content: 'Permettez‑moi de vous dire quelque chose d’important. Vous devez recevoir le '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: ' comme un enfant. Si vous ne le faites pas, Dieu ne régnera jamais dans votre vie.'
  - type: heading
    content: Jésus rencontre un homme riche
  '18':
  - type: text
    content: 'Un chef '
  - type: text
    content: juif
  - type: text
    content: ' est venu auprès de Jésus. Il lui a demandé : Bon maître, que dois‑je faire pour que je puisse vivre pour tous les temps ?'
  '19':
  - type: text
    content: 'Jésus a dit : Pourquoi dis‑tu que je suis bon ? Personne n’est bon, sauf Dieu. '
  '2':
  - type: text
    content: 'Il a dit : Dans une certaine ville, il y avait un '
  - type: text
    content: juge
  - type: text
    content: . Il ne pensait pas que Dieu ou les gens étaient importants.
  '20':
  - type: text
    content: Tu connais les règles de Dieu. Ne couche pas avec une personne qui n’est pas ton épouse. Ne tue pas une personne. Ne vole pas les choses de quelqu’un. Dis seulement les vraies choses sur des gens. Aime ton père et ta mère.
  '21':
  - type: text
    content: 'Il a répondu : J’ai obéi à toutes ces règles depuis l’âge de 12 ans.'
  '22':
  - type: text
    content: 'Jésus a entendu ce qu’il a dit. Il a dit : Tu dois encore faire une chose. Tu dois vendre tout ce que tu as. Donne l’argent aux pauvres. Donc, alors tu auras beaucoup de choses précieuses au '
  - type: text
    content: ciel
  - type: text
    content: ' là où Dieu habite. Ensuite, reviens et obéis‑moi.'
  '23':
  - type: text
    content: 'Lorsque le chef '
  - type: text
    content: juif
  - type: text
    content: ' a entendu cela, il est devenu très triste. Il était très riche.'
  '24':
  - type: text
    content: 'Jésus a vu que ce chef '
  - type: text
    content: juif
  - type: text
    content: ' était devenu triste. Il a dit : Il est très difficile aux gens riches de demander à Dieu de régner dans leurs vies. '
  '25':
  - type: text
    content: Après tout, il est plus facile à un grand animal (
  - type: text
    content: chameau
  - type: text
    content: ) de passer à travers le trou d’une aiguille. Mais il est encore plus difficile à un homme riche de demander à Dieu de régner dans sa vie.
  '26':
  - type: text
    content: 'Les gens qui écoutaient Jésus ont alors demandé : Alors, qui est‑ce que Dieu va sauver ?'
  '27':
  - type: text
    content: 'Il a répondu : Dieu peut faire des choses que personne ne peut faire.'
  '28':
  - type: text
    content: 'Pierre a dit : Ecoute ! Nous avons tout quitté pour t’obéir.'
  '29':
  - type: text
    content: 'Jésus a répondu : Permets‑moi de te dire quelque chose d’important. Il y a des gens qui quittent leurs maisons pour obéir à Dieu. Ils veulent que Dieu dirigent leurs vies. Ils peuvent quitter leurs femmes, leurs frères, leurs parents et leurs enfants. '
  '3':
  - type: text
    content: 'Une femme vivait dans cette même ville. Son mari était mort. Elle a continué à venir auprès du '
  - type: text
    content: juge
  - type: text
    content: ' avec un problème. Elle disait : S’il te plaît, tiens‑moi à l’abri de la personne qui est contre moi. '
  '30':
  - type: text
    content: Ces gens recevront dans cette vie beaucoup plus que ce qu’ils ont laissé. Et après leur mort, ils auront quelque chose d’autre. Ils auront une vie pour toujours.
  '31':
  - type: text
    content: 'Jésus a pris les 12 hommes qu’il avait choisis loin des autres personnes. Il leur a dit : Écoutez ! Nous allons à Jérusalem. Quand nous serons là, beaucoup de mauvaises choses vont se produire contre moi. Il y a longtemps que les serviteurs de Dieu avaient écrit des messages du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Tout ce qu’il leur avait dit au sujet du Fils de l’homme va maintenant m’arriver. '
  '32':
  - type: text
    content: 'Voici ce qu’il avait dit : Les '
  - type: text
    content: Juifs
  - type: text
    content: ' me livreront à ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: '. Ils vont se moquer de moi. Ils vont faire de mauvaises choses contre moi. Ils vont cracher sur moi. '
  '33':
  - type: text
    content: Ils vont me frapper avec un fouet et puis ils vont me tuer. Mais au bout de 3 jours, je vais devenir de nouveau vivant.
  '34':
  - type: text
    content: Les 12 hommes que Jésus avait choisis ne comprenaient aucune de ces choses. Quelque chose cachait ces choses d’eux. Donc, ils ne savaient pas de quoi Jésus parlait.
  - type: heading
    content: Jésus guérit un aveugle
  '35':
  - type: text
    content: 'Quand Jésus approchait de Jéricho, un homme était assis au bord de la route. Cet homme ne pouvait pas voir et il demandait aux gens de lui donner de l’argent. '
  '36':
  - type: text
    content: Puis il a entendu une grande foule de gens qui passaient. Ainsi, il a demandé aux gens près de lui ce qui se passait.
  '37':
  - type: text
    content: 'Ils ont répondu : C’est Jésus de Nazareth qui passe.'
  '38':
  - type: text
    content: 'L’homme a commencé à crier : Jésus, '
  - type: text
    content: fils de David
  - type: text
    content: ', s’il te plaît, aie pitié de moi '
  '39':
  - type: text
    content: 'Les gens qui marchaient devant la foule tentaient de l’arrêter. Ils lui disaient : Sois calme ! Mais il criait encore plus fort : '
  - type: text
    content: Fils de David
  - type: text
    content: ', s’il te plaît, aie pitié de moi !'
  '4':
  - type: text
    content: 'Pour un temps, le '
  - type: text
    content: juge
  - type: text
    content: ' ne voulait rien faire pour elle. Plus tard, il a réfléchi. Il a dit en lui‑même ceci : Je ne pense pas que Dieu ou les gens soient importants. '
  '40':
  - type: text
    content: 'Alors Jésus s’est arrêté. Il a dit : Emmenez‑moi cet homme. Puis, quand l’homme est venu tout près, Jésus lui a parlé.'
  '41':
  - type: text
    content: 'Que veux‑tu que je fasse pour toi ? Il a répondu : Maître, s’il te plaît, aide‑moi à voir.'
  '42':
  - type: text
    content: 'Jésus a dit : Vois. Tu es maintenant bien, parce que tu as cru en moi.'
  '43':
  - type: text
    content: 'Aussitôt l’homme a pu voir. Il a commencé à suivre Jésus. Il disait : Dieu, Tu es très grand et puissant. Beaucoup de gens ont vu ce qui était arrivé. Ils disaient : Dieu, Tu es très grand et puissant.'
  '5':
  - type: text
    content: Mais cette femme me dérange. Si je ne fais rien pour elle, elle va continuer à venir à moi encore et encore. Elle me fera beaucoup fatiguer. Donc, je vais l’aider. Je dirai qu’elle a raison.
  '6':
  - type: text
    content: 'Jésus a dit : Ce '
  - type: text
    content: juge
  - type: text
    content: ' n’a pas été un homme bon. Mais vous devriez penser à ce qu’il s’est dit lui‑même. Il aidera seulement parce que la femme le dérange. '
  '7':
  - type: text
    content: 'Mais Dieu aide toujours ceux qu’il a choisis pour être ses enfants. Quand ils continuent de lui demander de l’aide, il leur répondra immédiatement. Il ne va pas attendre. '
  '8':
  - type: text
    content: 'Je vous dis ceci : Il dira qu’ils ont raison. Il les aidera rapidement. Je reviendrai sur terre. Mais je ne vais pas trouver beaucoup de gens qui croient encore en moi.'
  - type: heading
    content: Jésus raconte une histoire sur 2 hommes qui priaient
  '9':
  - type: text
    content: Jésus a aussi dit une autre histoire. C’était pour enseigner les gens. Certaines personnes pensaient qu’elles étaient très bonnes. Elles pensaient aussi qu’elles étaient mieux que d’autres.
