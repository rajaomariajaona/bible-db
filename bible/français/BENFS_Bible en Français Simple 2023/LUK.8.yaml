document_id: LUK.8
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 8
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les femmes qui aidaient Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus a commencé à se déplacer d’un endroit à l’autre. Dans chaque ville ou village, il parlait de la Bonne Nouvelle aux gens. Il leur disait : Dieu veut régner dans votre vie. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus allaient avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certaines femmes voyageaient également avec eux. Ces femmes étaient malades, mais Jésus les a guéries. L’une des femmes était Marie‑Madeleine. Jésus avait chassé 7 mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' d’elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Une autre des femmes était Jeanne, la femme de Chouza. Chouza avait le pouvoir sur tous les gens qui travaillaient dans la maison du roi Hérode. Une autre des femmes était Suzanne. Celle‑ci et d’autres femmes aidaient Jésus et les 12 hommes qu’il avait choisis. Elles utilisaient leur propre argent pour le faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’histoire d’un agriculteur qui a semé les graines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: De grandes foules de gens venaient de nombreuses villes. Ces gens allaient voir Jésus. Un grand nombre était déjà ensemble quand Jésus racontait cette histoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Un semeur est sorti. Il est allé au champ pour semer des graines. Il jetait alors des graines. Mais certaines graines sont tombées sur le chemin. Ensuite, les gens marchaient sur elles et les oiseaux les mangeaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Certaines graines sont tombées sur le sol avec des pierres en lui. Ces graines ont commencé à croître, mais les jeunes plantes n’avaient pas de racines. Parce qu’il n’y avait pas d’eau dans le sol, elles sont mortes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Certaines graines sont tombées parmi les épines. Ensuite, les épines ont grandi avec les jeunes plantes. Elles ont bloqué les jeunes plantes à grandir. Ainsi elles sont mortes rapidement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais d’autres graines sont tombées dans la bonne terre. Des plantes fortes ont grandi d’elles. Chacune de ces plantes a fait une centaine de grains.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Quand Jésus a terminé l’histoire, il a dit : Vous avez des oreilles. Alors, écoutez bien ce que je dis.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus explique pourquoi il raconte des histoires
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus lui ont demandé sur cette histoire. Ils lui ont demandé ce que cela signifiait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il a répondu : Dieu vous aide à comprendre ce que ces histoires signifient. Mais elles sont secrètes à d’autres gens. Ils ne comprennent pas comment Dieu règne dans la vie de son peuple. Donc, je donne des exemples pour les enseigner. Ils ont les yeux grands ouverts, mais ils ne voient pas vraiment. Ils entendent les paroles, mais ils ne comprennent pas.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus explique l’histoire des semences
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jésus a commencé à expliquer l’histoire des semences. La semence est comme le message de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Certaines graines sont tombées sur le chemin. Certaines gens entendent le message de Dieu, mais ils ne pensent pas à cela. Ils sont comme le chemin. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' vient et il prend le message d’eux. Parce qu’il l’enlève, ils ne peuvent pas croire. Parce qu’ils ne croient pas, Dieu ne peut pas les sauver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Certaines graines sont tombées sur le sol avec des pierres en lui. Les gens qui sont heureux d’entendre le message de Dieu sont comme ce sol. Mais le message ne change pas leurs vies et leurs pensées. Ils croient en Dieu pour un temps. Mais quand ils ont des difficultés, ils laissent de croire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Certaines graines sont tombées parmi les épines. Certaines gens entendent le message et ils croient pour un temps. Ils sont comme le sol avec les épines. Ils commencent à penser aux choses de ce monde. Ils veulent obtenir de l’argent et les choses qui les rendent heureux dans cette vie. Ces choses bloquent le message de Dieu dans leurs vies. Ils vont donc laisser de croire au message de Dieu. Ils sont comme une plante qui n’a pas de fruits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Une autre partie est tombée dans la bonne terre. Certaines gens qui entendent le message de Dieu sont comme ce sol. Ils se souviennent de la Parole de Dieu et ils y obéissent. Ils sont bons et honnêtes. Ils continuent à croire et ils font beaucoup de bonnes choses. Ils sont comme une plante qui a beaucoup de bons fruits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus a poursuivi en disant : Les gens n’allument pas une lampe, puis la couvrent. Ils ne la mettent pas non plus dans un bocal ou sous le lit. Au lieu de cela, ils la mettent sur un haut lieu. Ensuite, d’autres personnes qui viennent dans la salle peuvent voir la lumière de la lampe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le message de Dieu est le même. Il est un secret pour certaines personnes. Mais un jour, tout le monde va voir tout ce qui a été un secret. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Donc, vous devriez être prudents lorsque vous écoutez. La personne qui a vraiment entendu un message entendra plus. Certains n’ont pas écouté, ils n’ont donc rien. Ils pensent qu’ils ont un peu. Mais ils vont perdre encore ça.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mère et les frères de Jésus viennent le voir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors la mère et les frères de Jésus sont venus le voir. Mais ils ne pouvaient pas l’atteindre à cause de la grande foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quelqu’un a dit à Jésus : Ta mère et tes frères sont debout à l’extérieur. Ils veulent te voir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus a répondu : Je vais vous dire qui sont ma mère et mes frères. Certaines personnes entendent le message de Dieu. Elles y obéissent aussi. Ces gens sont donc ma mère et mes frères.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus arrête un vent fort
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Un jour, Jésus est monté dans un petit bateau. Il était avec ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il a dit : Je veux que nous allions de l’autre côté du lac. Alors, ils ont commencé à traverser le lac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Pendant qu’ils allaient, Jésus a commencé à dormir. Ensuite, un vent fort a commencé à souffler sur le lac. L’eau a commencé à remplir le petit bateau et ils étaient en danger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi, ceux qui étaient dans le petit bateau avec Jésus le réveillaient. Ils disaient : Maître, Maître, nous allons mourir !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Jésus s’est levé et il a parlé au vent et à l’eau. Il a dit : Arrêtez. Soyez calmes. Le vent s’est immédiatement arrêté et l’eau est devenue calme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus a alors dit : Vous ne croyez pas en moi, et vous devriez croire.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils avaient très peur. Ils étaient aussi très surpris de voir cela. Alors, ils se demandaient ceci : Qui est cet homme ? Il a même l’autorité sur le vent et l’eau. Il parle juste et ils lui obéissent.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit un homme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus et ses 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont arrivés à Gadara. Les personnes appelées Géraséniens vivaient à Gadara, en face de la Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus est descendu du petit bateau. Alors un homme de la ville est venu auprès de lui. Il avait beaucoup de mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' vivaient en lui. Il ne portait pas de vêtements pendant une longue période. Il ne vivait pas dans une maison. Au lieu de cela, il vivait dans un endroit où les gens enterrent les morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand il a vu Jésus, il a crié. Puis il est tombé au sol devant lui. Il a dit d’une voix forte : Que veux‑tu faire de moi, Jésus ? Tu es le Fils du Dieu puissant qui est au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Ne me fais pas de mal, s’il te plaît.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il a dit cela parce que Jésus avait parlé au mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '  : Sors de cet homme. Les gens continuaient généralement de lier cet homme. Ils lui liaient les mains et les pieds avec des chaînes. Mais quand les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' se saisissaient de lui, il brisait les chaînes. Puis les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' le faisaient entrer dans des endroits où les gens ne vivent pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus lui a alors demandé : Quel est ton nom ? Il a répondu : Mon nom est Légion. C’était parce qu’il avait beaucoup de mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' ont encore et encore demandé à Jésus de ne pas les envoyer en enfer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il y avait un grand groupe de porcs. Ils mangeaient leur nourriture sur la colline. Les mauvais esprits ont demandé à Jésus : Allons dans les porcs. Jésus a répondu : Vous pouvez aller dans les porcs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' sont sortis de l’homme et ils sont entrés dans les porcs. Tous les porcs se sont précipités ensemble du haut de la pente. Ils ont couru dans le lac et sont tous morts dans l’eau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les hommes qui prenaient soin des porcs ont vu ce qui s’est passé. Ils se sont enfuis parler de cela aux autres personnes. Ils sont allés dans toutes les villes et tous les villages qui se trouvaient près de là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ainsi, les gens sortaient de tous ces endroits pour voir ce qui était arrivé. Quand ils sont arrivés, ils ont trouvé l’homme. Il était assis aux pieds de Jésus. Les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' étaient sortis de lui. Il était maintenant calme et son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' était bien à nouveau. Il portait aussi des vêtements. Lorsque les gens ont vu cela, ils avaient peur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Certaines personnes ont vu Jésus guérir cet homme. Elles disaient aux autres comment Jésus avait fait cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et tous les habitants du pays des Géraséniens ont parlé à Jésus. Ils lui ont dit : S’il te plaît, quitte‑nous. Ils ont dit cela parce qu’ils avaient très peur. Donc, Jésus est rentré dans le petit bateau. Il était prêt à retourner de l’autre côté de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors, l’homme qui avait les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' a parlé. Il a dit à Jésus : S’il te plaît, laisse‑moi aller avec toi. Jésus a répondu : Non. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Tu dois retourner à ton domicile. Va et dis à tous les gens tout ce que Dieu a fait pour toi.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Donc, l’homme est parti. Il est allé partout dans la ville. Il a continué à dire à tous les gens : Jésus a fait de très bonnes choses pour moi.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit la fille de Jaïrus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Lorsque Jésus est retourné de l’autre côté de la mer, la foule était très heureuse de le voir. Ils attendaient tous son retour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Puis un homme appelé Jaïrus est venu le voir. Il était responsable du lieu de réunion.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il s’est mis à genoux aux pieds de Jésus. Il a dit : S’il te plaît, viens à ma maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'J’ai une fille. Elle a 12 ans et elle est très malade. Elle va mourir très bientôt. C’est ma seule fille. Alors, Jésus a commencé à aller voir sa fille. Beaucoup de gens allaient avec lui et se rapprochaient trop de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Il y avait une femme dans la foule. Du sang sortait de son corps. Et cela, pendant 12 ans. Elle avait dépensé tout son argent aux médecins et elle n’avait plus d’argent. Mais personne ne pouvait arrêter le sang de couler d’elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Elle est venue derrière Jésus dans la foule. Puis elle a touché le bord de ses vêtements. Immédiatement, le sang s’est arrêté de couler.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jésus a demandé : Qui m’a touché ? Tout le monde autour de lui a dit : Ce n’était pas moi. Je ne t’ai pas touché. Pierre a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', les gens sont dans une foule autour de toi. Beaucoup de gens te touchent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus a dit : Quelqu’un m’a touché. J’ai senti cela quand la puissance est sortie de moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'La femme savait qu’elle ne pouvait pas le cacher. Alors, elle avait très peur quand elle est venue auprès de Jésus. Elle s’est jetée au sol devant lui. Elle a parlé de telle sorte que tous les gens puissent l’entendre. Elle a dit : Je voulais être bien, donc j’ai touché le bord de son vêtement. Dès que je l’ai touché, je suis devenue bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus lui a dit : Ma fille, tu es bien de nouveau, parce que tu as cru en moi. Ne te trouble plus dans ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Pendant que Jésus parlait encore à la femme, quelqu’un est arrivé de la maison de Jaïrus. Il lui a dit : Ta fille est morte. Ne demande plus au Maître de venir maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jésus a appris ce que l’homme venait de dire. Donc, il a parlé à Jaïrus : N’aie pas peur. Crois juste que je peux la guérir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Quand ils sont arrivés à la maison, Jésus n’a pas laissé tout le monde aller avec lui. Il a seulement pris Pierre, Jacques et Jean. Il a également laissé la mère et le père de la jeune fille venir dans la maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Tous les gens là‑bas pleuraient à haute voix. Ils étaient très tristes. Jésus leur a dit : Ne pleurez pas, elle n’est pas morte. Elle est seulement endormie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ils savaient qu’elle était morte. Ainsi, ils se moquaient de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Mais Jésus a tenu sa main. Puis il lui a dit d’une voix forte : Mon enfant, lève‑toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Elle est devenue vivante de nouveau et elle s’est levée immédiatement. Il a dit à ses parents : Donnez‑lui quelque chose à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ils étaient très surpris. Il leur a dit : Vous ne devez dire à personne ce qui est arrivé.'
