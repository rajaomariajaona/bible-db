document_id: MRK.9,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 9
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: '3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' voient le visage de Jésus briller'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus leur a dit : Je vous dis la vérité. Bientôt Dieu commencera à diriger son peuple avec une grande puissance. Et certaines personnes qui sont ici, vont voir cela. Elles ne vont certainement pas mourir avant que cela arrive. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont gardé cette parole. Mais ils se demandaient la signification ‘après ma résurrection’. Ils voulaient comprendre ces mots. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les 3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont demandé à Jésus : Pourquoi les enseignants de la loi de Dieu disent qu’Élie doit venir d’abord ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a dit : Élie viendra d’abord. Il rétablira toute chose. Mais la Bible dit que les gens vont faire beaucoup de troubles contre le Fils de l’homme. Les gens vont lui faire de mauvaises choses. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais je vous dis qu’Élie est déjà venu. Les gens lui ont fait toutes les choses qu’ils voulaient. La Bible dit que ces choses devaient lui arriver.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus aide un garçon qui a un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont atteint l’endroit où les autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient. Ils ont vu qu’il y avait beaucoup de gens autour des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Certains enseignants de la loi de Dieu discutaient avec eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens dans la foule ont vu Jésus. Et aussitôt, ils ont été très surpris. Ils ont couru pour dire bonjour à Jésus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a demandé à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : De quoi discutiez‑vous avec les enseignants de la loi de Dieu ?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un homme dans la foule a répondu. Il a dit à Jésus : Maître, je t’ai amené mon fils. Il ne peut pas parler, parce qu’il a un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' le saisit, il le jette à terre. La salive sort de sa bouche et il grince ses dents ensemble. Puis son corps semble mort. J’ai demandé à tes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de le chasser de lui. Mais ils n’ont pas pu le faire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a dit : Vous les gens d’aujourd’hui, vous ne croyez toujours pas. Je ne sais pas combien de temps je vais être avec vous. Combien de temps je vais vous attendre pour croire en moi ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '6 jours après, Jésus a demandé à Pierre, Jacques et Jean d’aller avec lui. Jésus les a conduits sur une haute montagne, où ils étaient seuls. Et ils ont vu Jésus comme ils ne l’avaient jamais vu auparavant. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors on a amené le garçon à Jésus. Dès que l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' a vu Jésus, il a secoué le garçon durement. Il est tombé sur la terre. Il se roulait par terre et l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: écume
    - type: text
      text: ' lui sortait de la bouche. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a demandé au père du garçon : Combien de temps a‑t‑il été comme ça ? Le père a répondu : Il a été comme ça depuis qu’il était un petit garçon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Souvent l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' le fait tomber dans le feu ou dans l’eau. Il essaie de le tuer. Mais si tu peux faire quelque chose, aie pitié de nous. Aide‑nous ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit au père de l’enfant : Tu ne devrais pas dire : Si tu peux faire quelque chose. Tout est possible aux gens qui croient. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immédiatement, le père du garçon a crié : Je crois ! Aide‑moi à croire plus ! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a vu que les gens venaient encore en grand nombre vers lui. Donc, il a dit au mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' de quitter le garçon. Jésus lui a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ', je te dis que tu dois laisser ce garçon. Il ne peut pas entendre ni parler à cause de toi. Mais tu dois le quitter et il ne faut plus jamais aller dans lui. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' a poussé un grand cri. Il a fait tomber le garçon plusieurs fois. Puis il est sorti de lui. Le garçon semblait être mort. Donc, beaucoup de gens disaient : Il est mort. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus a tenu la main du garçon et il a aidé le garçon à se lever. Alors le garçon s’est levé. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus est entré dans une maison, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient seuls avec lui. Ils lui ont demandé : Pourquoi n’avons‑nous pas fait quitter le mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' du garçon ? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Vous devez prier pour chasser d’une personne ce genre d’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses vêtements sont devenus très blancs, ils brillaient. Ils étaient plus blancs que personne sur terre ne peut les laver ainsi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont quitté cet endroit. Ils ont traversé la Galilée. Jésus ne voulait pas qu’on sache où il était. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était parce qu’il enseignait ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Il leur a dit : Bientôt, quelqu’un va livrer le Fils de l’homme à un groupe d’hommes. Ils vont l’attraper. Et ils vont le tuer. Et 3 jours après, il deviendra de nouveau vivant. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ne comprenaient pas ce que Jésus voulait dire. Et ils avaient peur de lui demander.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus explique qui est la personne la plus importante
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont arrivés à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. Quand ils étaient dans la maison, Jésus leur a demandé : De quoi discutiez‑vous en chemin ? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils n’ont rien dit. Ils ne voulaient pas dire à Jésus de quoi ils discutaient. Sur le chemin, ils discutaient à propos de qui était le plus grand. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus était assis. Il a demandé aux 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de venir. Puis il leur a dit : Si un homme veut être le premier, il doit être le dernier de tous. Il doit être le serviteur de tous. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Jésus a pris un petit enfant. Il a mis cet enfant au milieu des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Jésus tenait l’enfant, il leur a dit : '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un accepte cet enfant à cause de moi, il m’accepte. S’il m’accepte, alors il ne m’accepte pas moi seulement. Il accepte aussi Dieu, qui m’a envoyé. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean a dit à Jésus : Maître, nous avons vu un homme qui n’est pas de notre groupe. Il chassait les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des gens. Et il utilisait ton pouvoir pour faire cela. Il n’est pas de notre groupe. Alors nous lui avons dit ne pas le faire. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a dit : Ne l’arrêtez pas. Cet homme a l’aide de mon pouvoir de faire quelque chose de puissant. Quelqu’un qui fait cela ne peut pas bientôt dire du mal contre moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les 3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont vu Élie avec Moïse, qui leur sont apparus. Élie et Moïse parlaient avec Jésus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un n’est pas contre nous, il nous aide. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un peut vous donner un verre d’eau, parce que vous êtes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Dieu sera bon envers cette personne, il ne décevra pas cette personne. Je vous dis la vérité. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une personne qui croit, peut ne pas sembler importante. Mais ne provoquez pas cette personne à faire de mauvaises choses. Si quelqu’un fait cela, il serait mieux de lui mettre une grosse pierre autour du cou. Il serait mieux qu’on le jette ainsi dans la mer ! '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ta main te fait faire de mauvaises choses, tu dois la couper. Une personne avec une seule main peut aller à l’endroit appelé '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Cela vaut mieux que d’aller à l’endroit appelé l’enfer avec 2 mains. Là, le feu brûle toujours. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ton pied te fait faire de mauvaises choses, tu dois le couper. Une personne avec un seul pied peut aller à l’endroit où Dieu règne. Cela vaut mieux que d’aller à l’endroit appelé l’enfer avec 2 pieds. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ton œil te fait faire de mauvaises choses, tu dois alors l’enlever. Une personne avec un seul œil peut aller à l’endroit où Dieu règne. Cela vaut mieux que d’aller à l’endroit appelé l’enfer avec 2 yeux. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En enfer, les vers ne meurent pas et le feu ne s’éteint jamais. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu mettra du feu sur tout le monde comme les gens mettent du sel dans la nourriture. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre a dit à Jésus : Maître, il est bon que nous soyons ici. S’il te plaît, laisse‑moi construire 3 tentes. Une tente pour toi. Une tente pour Moïse. Et une tente pour Élie.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le sel est une bonne chose. Mais si le sel n’a plus de goût, comment est‑ce que vous pouvez encore lui donner son goût ? (Il ne sera plus utile dans les aliments.) Soyez bons comme du sel. Ne vous faites pas de problèmes entre vous.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre ne savait pas vraiment quoi dire : Les 3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' avaient très peur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis un nuage est venu. Il les a tous couverts. Une voix a parlé du nuage. Cette voix a dit : Celui‑ci est mon fils, et je l’aime. Écoutez‑le. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment‑là, les 3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' regardaient autour d’eux. Ils n’ont vu personne d’autre. Seul Jésus était avec eux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils descendaient alors de la montagne. Jésus a dit aux 3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ceci : Vous ne devez dire à personne les choses que vous avez vues. Dites cela aux gens seulement après ma résurrection. '
