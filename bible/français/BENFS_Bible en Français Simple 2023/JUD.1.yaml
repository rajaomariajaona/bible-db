document_id: JUD.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Les faux enseignants tentent de détourner les gens de Dieu
  - type: text
    content: C’est moi, Jude qui écris cette lettre. Je suis le serviteur de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' et je suis le frère de Jacques. Je vous écris, gens que Dieu, le Père aime. Dieu vous a choisis pour être son propre peuple. Il vous protège jusqu’au moment où Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' reviendra.'
  '10':
  - type: text
    content: Mais ces faux enseignants disent du mal de tout ce qu’ils ne comprennent pas. Ils sont comme des animaux qui ne peuvent pas penser correctement. Ils font juste les choses que leur nature leur fait faire. Ce sont ces choses qui les détruisent.
  '11':
  - type: text
    content: Ce sera très mauvais pour eux ! Ils ont vécu comme Caïn avait vécu. Ils ont fait la même erreur que Balaam, car ils voulaient obtenir de l’argent pour eux‑mêmes. Comme Koré, ils ont refusé d’obéir à Dieu. Alors Dieu les détruira.
  - type: heading
    content: Les faux enseignants sont très dangereux
  '12':
  - type: text
    content: 'Lorsque vous vous rencontrez en tant que croyants pour manger ensemble des repas spéciaux, ces faux enseignants vous rencontrent. Mais ils sont dangereux et vous empêcheront de montrer votre amour l’un pour l’autre. Ils viennent seulement parce qu’ils veulent trop manger. Ils ne respectent ni Dieu ni les autres. Ils ne pensent qu’à eux et n’ont pas honte. Ils sont comme des nuages qui, selon vous, apporteront de la pluie. Mais le vent souffle sur ces nuages et il n’y a pas de pluie. Ils sont comme des arbres sans fruits, même au moment de la récolte. Les gens déracinent les arbres du sol. Ils sont complètement morts et ne peuvent donner aucun fruit. '
  '13':
  - type: text
    content: 'Ces faux docteurs sont comme l’eau dans la mer où le vent souffle lors d’une tempête. La saleté qui remonte au‑dessus des eaux est comme les choses sales que font ces gens. Ils sont comme des étoiles qui se sont éloignées de leur place dans le '
  - type: text
    content: ciel
  - type: text
    content: . Dieu leur a préparé un endroit complètement noir et sombre. Dieu les gardera là pour toujours.
  '14':
  - type: text
    content: 'Il y a longtemps, Hénoc a également parlé de ces faux enseignants. Hénoc appartenait à la septième famille qui est née, à commencer par Adam. Il a dit : Regardez, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' viendra avec plusieurs milliers de ses propres '
  - type: text
    content: anges
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Il jugera tout le monde. Il punira tous ceux qui se sont retournés contre lui. Il les punira à cause de toutes les mauvaises choses qu’ils ont faites contre lui. Il les punira à cause de toutes les mauvaises paroles qu’ils ont prononcées contre lui. Oui, il punira tous ceux qui vivent d’une manière qui ne lui plaît pas. '
  '16':
  - type: text
    content: Ces gens se plaignent toujours. Ils ne sont jamais contents des autres. Ils font juste de mauvaises choses qui feront leur bonheur. Ils parlent beaucoup d’eux‑mêmes, pour montrer à quel point ils sont importants. Ils font l’éloge des autres seulement pour obtenir quelque chose de bon pour eux‑mêmes.
  - type: heading
    content: Les chrétiens doivent continuer de croire en Dieu
  '17':
  - type: text
    content: 'Mais vous, mes amis, souvenez‑vous du message que les '
  - type: text
    content: apôtres
  - type: text
    content: ' de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' vous ont enseigné. Ils ont parlé de ce qui se passera à l’avenir. '
  '18':
  - type: text
    content: 'Ils vous ont dit : Dans les derniers jours de ce monde, certains se moqueront du message de Dieu. Ils diront qu’il est idiot d’obéir à Dieu. Au contraire, ils feront de mauvaises choses qu’ils veulent faire. Ces choses ne plaisent pas à Dieu.'
  '19':
  - type: text
    content: Ce sont des gens comme ceux‑ci qui vous opposent les uns contre les autres. Ils vous font appartenir à des groupes séparés. Leurs pensées appartiennent à ce monde. Ils n’ont pas l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu en eux.'
  '2':
  - type: text
    content: 'Je prie pour que Dieu soit bon envers vous et qu’il vous donne de plus en plus la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: . Je veux que vous sachiez de plus en plus combien Dieu vous aime.
  '20':
  - type: text
    content: 'Mais vous, mes amis, vous avez cru au message qui vient de Dieu lui‑même. Vous devez donc vous entraider à faire de plus en plus confiance en Dieu. Priez Dieu avec l’aide du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Continuez de vivre d’une manière qui montre l’amour de Dieu. Rappelez‑vous toujours que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est très gentil. À cause de cela, vous aurez la vie avec Dieu pour toujours.'
  '22':
  - type: text
    content: 'Aidez ceux qui ne savent pas s’ils doivent croire en Dieu. Soyez gentils avec eux. '
  '23':
  - type: text
    content: Certaines personnes sont en grand danger. Vous devez les sauver du feu de la punition de Dieu. Il y a d’autres personnes que vous devez également aider.
  - type: text
    content: Mais soyez très prudents ! Ces gens ont fait des choses très mauvaises. Ces mauvaises choses ont détruit leur vie, comme si elles portaient des vêtements sales. Éloignez‑vous de ces mauvaises choses et ne les laissez pas détruire vos vies aussi.
  - type: heading
    content: Jude remercie Dieu
  '24':
  - type: text
    content: 'Dieu peut vous garder en sécurité, afin que vous continuiez de croire en lui. Un jour, vous vous tiendrez devant lui et vous serez très heureux. Dieu vous amènera à cet endroit et vous serez complètement bons. À cause de cela, vous pourrez vous tenir près de Dieu, qui brille d’une belle lumière. '
  '25':
  - type: text
    content: 'Il est le seul Dieu. Il est celui qui nous sauve à cause de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Nous le félicitons donc ! Nous disons qu’il est très grand ! Il dirige avec puissance et autorité. Cela a toujours été vrai. C’est vrai maintenant, et ce sera vrai pour toujours.
  - type: text
    content: Amen !
  '3':
  - type: text
    content: Mes amis, je voulais beaucoup vous écrire sur la façon dont Dieu nous a sauvés du péché. C’est ce qu’il a fait pour vous et pour nous. Mais, je sais maintenant que je dois vous écrire sur autre chose. Je dois vous dire d’être forts et courageux. Vous devez faire tout ce que vous pouvez pour garder le vrai message de Dieu en sécurité. Dieu a donné ce message à son peuple spécial, et son message ne changera jamais. Ne laissez personne vous enseigner un message différent.
  '4':
  - type: text
    content: Je dis cela parce que certaines mauvaises personnes sont venues secrètement parmi vous. Ce ne sont pas de serviteurs de Dieu. Ces gens essaient de changer le vrai message de Dieu. Ils enseignent que nous pouvons faire toutes les mauvaises choses que nous voulons faire. Ils disent que Dieu sera bon et qu’il nous pardonnera toutes ces mauvaises choses. De cette façon, ils n’acceptent pas l’autorité de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', qui est notre seul Maître et notre '
  - type: text
    content: Seigneur
  - type: text
    content: . Dieu punira certainement ces mauvaises personnes. Il y a longtemps, la Bible a déjà dit que Dieu punira des gens comme eux.
  - type: heading
    content: Dieu punira toutes les mauvaises personnes
  '5':
  - type: text
    content: 'Je veux que vous vous souveniez de ces choses importantes. Vous les savez vraiment déjà, mais vous ne devez jamais les oublier. N’oubliez pas que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait sortir le peuple d’Israël du pays appelé l’Égypte. Il les a sauvés pour qu’ils n’y soient plus esclaves. Mais plus tard, il a détruit toutes ces mêmes personnes qui ne croyaient pas en lui. '
  '6':
  - type: text
    content: 'Rappelez‑vous également que certains '
  - type: text
    content: anges
  - type: text
    content: ' refusaient d’obéir à Dieu. Ils ont pris plus d’autorité que ce que Dieu ne leur avait donnée. Ils ont laissé leur propre place avec Dieu dans le '
  - type: text
    content: ciel
  - type: text
    content: . Donc, Dieu les a attachés comme prisonniers à jamais dans l’endroit sombre sur terre. Il les gardera là jusqu’au grand jour où il jugera tout le monde.
  '7':
  - type: text
    content: 'Souvenez‑vous également de ce qui est arrivé aux villes appelées Sodome et Gomorrhe, et aux autres villes qui étaient près d’elles. Les gens qui vivaient dans ces endroits faisaient aussi de mauvaises choses. Ils vivaient comme ces mauvais '
  - type: text
    content: anges
  - type: text
    content: . Ils avaient des relations sexuelles avec des gens qui n’étaient ni leurs maris ni leurs femmes. Ils aimaient avoir des relations sexuelles de mauvaises façons. Dieu a détruit leurs villes. Il les a punis d’un feu qui ne cesse de brûler. Cela nous montre un exemple de ce qui arrivera aux mauvaises personnes comme elles.
  '8':
  - type: text
    content: 'Ces faux enseignants qui sont venus parmi vous font le même genre de mauvaises choses. Leurs rêves les trompent, alors ils utilisent mal leurs corps. Ils refusent d’obéir à l’autorité de Dieu. Ils disent de mauvaises choses contre les '
  - type: text
    content: anges
  - type: text
    content: ' puissants. '
  '9':
  - type: text
    content: 'Même le chef des '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu, Michel, n’a pas prononcé de mauvaises paroles comme celle‑là contre le '
  - type: text
    content: diable
  - type: text
    content: '. Il y a longtemps, Michel s’est disputé avec le '
  - type: text
    content: diable
  - type: text
    content: ' pour savoir qui devrait avoir le cadavre de Moïse. Mais même lorsque le '
  - type: text
    content: diable
  - type: text
    content: ' a dit de mauvaises paroles contre Dieu, Michel lui‑même n’a pas parlé contre le '
  - type: text
    content: diable
  - type: text
    content: '. Il ne pensait pas qu’il devrait faire cela. Par contre, Michel a dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui‑même montrera que tu as tort. '
