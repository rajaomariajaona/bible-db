document_id: JUD.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les faux enseignants tentent de détourner les gens de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C’est moi, Jude qui écris cette lettre. Je suis le serviteur de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' et je suis le frère de Jacques. Je vous écris, gens que Dieu, le Père aime. Dieu vous a choisis pour être son propre peuple. Il vous protège jusqu’au moment où Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' reviendra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je prie pour que Dieu soit bon envers vous et qu’il vous donne de plus en plus la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Je veux que vous sachiez de plus en plus combien Dieu vous aime.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mes amis, je voulais beaucoup vous écrire sur la façon dont Dieu nous a sauvés du péché. C’est ce qu’il a fait pour vous et pour nous. Mais, je sais maintenant que je dois vous écrire sur autre chose. Je dois vous dire d’être forts et courageux. Vous devez faire tout ce que vous pouvez pour garder le vrai message de Dieu en sécurité. Dieu a donné ce message à son peuple spécial, et son message ne changera jamais. Ne laissez personne vous enseigner un message différent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je dis cela parce que certaines mauvaises personnes sont venues secrètement parmi vous. Ce ne sont pas de serviteurs de Dieu. Ces gens essaient de changer le vrai message de Dieu. Ils enseignent que nous pouvons faire toutes les mauvaises choses que nous voulons faire. Ils disent que Dieu sera bon et qu’il nous pardonnera toutes ces mauvaises choses. De cette façon, ils n’acceptent pas l’autorité de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui est notre seul Maître et notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Dieu punira certainement ces mauvaises personnes. Il y a longtemps, la Bible a déjà dit que Dieu punira des gens comme eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu punira toutes les mauvaises personnes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je veux que vous vous souveniez de ces choses importantes. Vous les savez vraiment déjà, mais vous ne devez jamais les oublier. N’oubliez pas que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a fait sortir le peuple d’Israël du pays appelé l’Égypte. Il les a sauvés pour qu’ils n’y soient plus esclaves. Mais plus tard, il a détruit toutes ces mêmes personnes qui ne croyaient pas en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rappelez‑vous également que certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' refusaient d’obéir à Dieu. Ils ont pris plus d’autorité que ce que Dieu ne leur avait donnée. Ils ont laissé leur propre place avec Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Donc, Dieu les a attachés comme prisonniers à jamais dans l’endroit sombre sur terre. Il les gardera là jusqu’au grand jour où il jugera tout le monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Souvenez‑vous également de ce qui est arrivé aux villes appelées Sodome et Gomorrhe, et aux autres villes qui étaient près d’elles. Les gens qui vivaient dans ces endroits faisaient aussi de mauvaises choses. Ils vivaient comme ces mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: . Ils avaient des relations sexuelles avec des gens qui n’étaient ni leurs maris ni leurs femmes. Ils aimaient avoir des relations sexuelles de mauvaises façons. Dieu a détruit leurs villes. Il les a punis d’un feu qui ne cesse de brûler. Cela nous montre un exemple de ce qui arrivera aux mauvaises personnes comme elles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ces faux enseignants qui sont venus parmi vous font le même genre de mauvaises choses. Leurs rêves les trompent, alors ils utilisent mal leurs corps. Ils refusent d’obéir à l’autorité de Dieu. Ils disent de mauvaises choses contre les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' puissants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Même le chef des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' de Dieu, Michel, n’a pas prononcé de mauvaises paroles comme celle‑là contre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: '. Il y a longtemps, Michel s’est disputé avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' pour savoir qui devrait avoir le cadavre de Moïse. Mais même lorsque le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' a dit de mauvaises paroles contre Dieu, Michel lui‑même n’a pas parlé contre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: '. Il ne pensait pas qu’il devrait faire cela. Par contre, Michel a dit : Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui‑même montrera que tu as tort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais ces faux enseignants disent du mal de tout ce qu’ils ne comprennent pas. Ils sont comme des animaux qui ne peuvent pas penser correctement. Ils font juste les choses que leur nature leur fait faire. Ce sont ces choses qui les détruisent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ce sera très mauvais pour eux ! Ils ont vécu comme Caïn avait vécu. Ils ont fait la même erreur que Balaam, car ils voulaient obtenir de l’argent pour eux‑mêmes. Comme Koré, ils ont refusé d’obéir à Dieu. Alors Dieu les détruira.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les faux enseignants sont très dangereux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque vous vous rencontrez en tant que croyants pour manger ensemble des repas spéciaux, ces faux enseignants vous rencontrent. Mais ils sont dangereux et vous empêcheront de montrer votre amour l’un pour l’autre. Ils viennent seulement parce qu’ils veulent trop manger. Ils ne respectent ni Dieu ni les autres. Ils ne pensent qu’à eux et n’ont pas honte. Ils sont comme des nuages qui, selon vous, apporteront de la pluie. Mais le vent souffle sur ces nuages et il n’y a pas de pluie. Ils sont comme des arbres sans fruits, même au moment de la récolte. Les gens déracinent les arbres du sol. Ils sont complètement morts et ne peuvent donner aucun fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ces faux docteurs sont comme l’eau dans la mer où le vent souffle lors d’une tempête. La saleté qui remonte au‑dessus des eaux est comme les choses sales que font ces gens. Ils sont comme des étoiles qui se sont éloignées de leur place dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Dieu leur a préparé un endroit complètement noir et sombre. Dieu les gardera là pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y a longtemps, Hénoc a également parlé de ces faux enseignants. Hénoc appartenait à la septième famille qui est née, à commencer par Adam. Il a dit : Regardez, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' viendra avec plusieurs milliers de ses propres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il jugera tout le monde. Il punira tous ceux qui se sont retournés contre lui. Il les punira à cause de toutes les mauvaises choses qu’ils ont faites contre lui. Il les punira à cause de toutes les mauvaises paroles qu’ils ont prononcées contre lui. Oui, il punira tous ceux qui vivent d’une manière qui ne lui plaît pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ces gens se plaignent toujours. Ils ne sont jamais contents des autres. Ils font juste de mauvaises choses qui feront leur bonheur. Ils parlent beaucoup d’eux‑mêmes, pour montrer à quel point ils sont importants. Ils font l’éloge des autres seulement pour obtenir quelque chose de bon pour eux‑mêmes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens doivent continuer de croire en Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais vous, mes amis, souvenez‑vous du message que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vous ont enseigné. Ils ont parlé de ce qui se passera à l’avenir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils vous ont dit : Dans les derniers jours de ce monde, certains se moqueront du message de Dieu. Ils diront qu’il est idiot d’obéir à Dieu. Au contraire, ils feront de mauvaises choses qu’ils veulent faire. Ces choses ne plaisent pas à Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce sont des gens comme ceux‑ci qui vous opposent les uns contre les autres. Ils vous font appartenir à des groupes séparés. Leurs pensées appartiennent à ce monde. Ils n’ont pas l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu en eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais vous, mes amis, vous avez cru au message qui vient de Dieu lui‑même. Vous devez donc vous entraider à faire de plus en plus confiance en Dieu. Priez Dieu avec l’aide du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Continuez de vivre d’une manière qui montre l’amour de Dieu. Rappelez‑vous toujours que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est très gentil. À cause de cela, vous aurez la vie avec Dieu pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aidez ceux qui ne savent pas s’ils doivent croire en Dieu. Soyez gentils avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Certaines personnes sont en grand danger. Vous devez les sauver du feu de la punition de Dieu. Il y a d’autres personnes que vous devez également aider.
- type: usfm
  marker: m
  children:
  - type: text
    text: Mais soyez très prudents ! Ces gens ont fait des choses très mauvaises. Ces mauvaises choses ont détruit leur vie, comme si elles portaient des vêtements sales. Éloignez‑vous de ces mauvaises choses et ne les laissez pas détruire vos vies aussi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jude remercie Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dieu peut vous garder en sécurité, afin que vous continuiez de croire en lui. Un jour, vous vous tiendrez devant lui et vous serez très heureux. Dieu vous amènera à cet endroit et vous serez complètement bons. À cause de cela, vous pourrez vous tenir près de Dieu, qui brille d’une belle lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il est le seul Dieu. Il est celui qui nous sauve à cause de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Nous le félicitons donc ! Nous disons qu’il est très grand ! Il dirige avec puissance et autorité. Cela a toujours été vrai. C’est vrai maintenant, et ce sera vrai pour toujours.
- type: usfm
  marker: m
  children:
  - type: text
    text: Amen !
