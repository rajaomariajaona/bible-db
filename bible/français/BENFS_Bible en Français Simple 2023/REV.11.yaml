document_id: REV.11
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 11
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les 2 serviteurs de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelqu’un m’a donné un bâton. C’est comme les bâtons que les gens utilisent pour mesurer des choses. Il m’a dit : Va mesurer la taille de la maison de Dieu (temple). Mesure également l’autel où les gens offrent des cadeaux à Dieu. Compte également le nombre de personnes qui adorent Dieu là‑bas. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais ne mesure pas la cour qui est à l’extérieur de la maison de Dieu (temple). Ne la mesure pas, car Dieu a donné cette cour aux païens qui ne croient pas en lui. Ils iront partout dans la ville de Dieu et la détruiront pendant 42 mois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je donnerai le pouvoir à mes 2 serviteurs qui disent clairement mon message. Comme les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ', ils diront aux gens mon message pendant 1 260 jours. Ils porteront des vêtements faits de poils de chèvre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ces serviteurs sont les 2 oliviers et les 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: chandeliers
  - type: text
    text: '. Ils se tiennent devant Dieu qui est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si quelqu’un essaie de leur faire du mal, le feu sort de la bouche des serviteurs. Ce feu détruit leurs ennemis. Quiconque veut faire du mal aux 2 serviteurs doit mourir de cette façon. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ces serviteurs de Dieu ont le pouvoir de fermer le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Ensuite, il n’y aura pas de pluie pendant le temps qu’ils diront leurs messages de Dieu. Ils ont également le pouvoir de faire en sorte que l’eau sur terre devienne du sang. Ils peuvent également provoquer des maladies de nombreux types. Ils le feront aussi souvent qu’ils le voudront.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsque ces 2 serviteurs de Dieu finiront de dire les messages de Dieu, un animal les attaquera. C’est l’animal qui vit dans le trou profond. Il sortira du trou. Ce sera plus fort que les 2 serviteurs et ça les tuera. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Leurs corps morts se trouveront sur la rue de la grande ville où les gens ont tué leur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sur une croix. Cette ville qu’on appelle Sodome ou l’Égypte, car elle est aussi mauvaise que ces endroits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Des gens de partout dans le monde regarderont les cadavres des serviteurs pendant 3 jours et demi. Ce sont des gens de tous les pays, de tous les groupes familiaux et de toutes les langues. Ils refuseront de laisser quiconque enterrer les corps morts. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les gens qui vivent sur la terre seront très heureux, parce que les 2 serviteurs de Dieu sont maintenant morts. Ils enverront des cadeaux, parce qu’ils sont très heureux. Ces 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu leur avaient causé de graves problèmes, mais maintenant ils sont morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais après 3 jours et demi, Dieu a mis son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' dans ces cadavres. Il les a fait revivre. Ils se sont levés. Les gens qui les voyaient avaient très peur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les 2 serviteurs de Dieu ont entendu alors une voix forte venir du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. La voix a dit : Monte ici. Ils sont montés au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' dans un nuage, tandis que leurs ennemis les observaient.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En même temps, le sol a fortement tremblé. Il a tellement bougé qu’un bâtiment sur 10 de la ville est tombé. Et 7 000 personnes y sont mortes à cause du tremblement du sol. Les autres personnes encore en vie ont eu très peur. Elles ont loué le Dieu du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et ont dit qu’il était très puissant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est le deuxième grand problème et il est maintenant terminé. Mais le troisième grand problème viendra bientôt.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La septième trompette
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le septième '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a sonné de la trompette. Puis il y a eu le son de voix fortes dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Elles ont crié :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu et son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' spécial ont maintenant tout pouvoir !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le monde entier est devenu leur Royaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu les dirigera pour toujours !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les 24 anciens étaient assis sur leurs trônes devant Dieu. Maintenant, ils se sont jetés sur le visage et adoraient Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils disaient :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous te remercions, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu, parce que tu as tout pouvoir !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es vivant maintenant et tu as toujours été vivant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as un grand pouvoir et maintenant tu as commencé à diriger le monde entier !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les pays du monde étaient très en colère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais maintenant tu es devenu très en colère contre eux, car ils ne croient pas en toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, tu jugeras toutes les personnes décédées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu donneras de bonnes choses à tes serviteurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ce sont tes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' et tout ton peuple qui t’adorent.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Certains d’entre eux sont des personnes importantes et d’autres non.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu donneras de bonnes choses à tes serviteurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tu détruiras tous ces gens qui détruisent la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le moment est maintenant venu pour que tout cela se réalise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors j’ai pu voir la maison de Dieu (temple) au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. À l’intérieur, j’ai vu la boîte d’accord spéciale de Dieu. Il y a eu une grande tempête avec des éclairs brillants et un fort bruit de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tonnerre
  - type: text
    text: '. Le sol bougeait fortement et une forte pluie de pierres de glace tombait du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
