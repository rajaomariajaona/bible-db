document_id: REV.11,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 11
  - type: heading
    content: Les 2 serviteurs de Dieu
  - type: text
    content: 'Quelqu’un m’a donné un bâton. C’est comme les bâtons que les gens utilisent pour mesurer des choses. Il m’a dit : Va mesurer la taille de la maison de Dieu (temple). Mesure également l’autel où les gens offrent des cadeaux à Dieu. Compte également le nombre de personnes qui adorent Dieu là‑bas. '
  '10':
  - type: text
    content: 'Les gens qui vivent sur la terre seront très heureux, parce que les 2 serviteurs de Dieu sont maintenant morts. Ils enverront des cadeaux, parce qu’ils sont très heureux. Ces 2 '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu leur avaient causé de graves problèmes, mais maintenant ils sont morts.'
  '11':
  - type: text
    content: 'Mais après 3 jours et demi, Dieu a mis son '
  - type: text
    content: Esprit
  - type: text
    content: ' dans ces cadavres. Il les a fait revivre. Ils se sont levés. Les gens qui les voyaient avaient très peur. '
  '12':
  - type: text
    content: 'Les 2 serviteurs de Dieu ont entendu alors une voix forte venir du '
  - type: text
    content: ciel
  - type: text
    content: '. La voix a dit : Monte ici. Ils sont montés au '
  - type: text
    content: ciel
  - type: text
    content: ' dans un nuage, tandis que leurs ennemis les observaient.'
  '13':
  - type: text
    content: 'En même temps, le sol a fortement tremblé. Il a tellement bougé qu’un bâtiment sur 10 de la ville est tombé. Et 7 000 personnes y sont mortes à cause du tremblement du sol. Les autres personnes encore en vie ont eu très peur. Elles ont loué le Dieu du '
  - type: text
    content: ciel
  - type: text
    content: ' et ont dit qu’il était très puissant.'
  '14':
  - type: text
    content: C’est le deuxième grand problème et il est maintenant terminé. Mais le troisième grand problème viendra bientôt.
  - type: heading
    content: La septième trompette
  '15':
  - type: text
    content: 'Le septième '
  - type: text
    content: ange
  - type: text
    content: ' a sonné de la trompette. Puis il y a eu le son de voix fortes dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Elles ont crié :'
  - type: text
    content: 'Notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu et son '
  - type: text
    content: Messie
  - type: text
    content: ' spécial ont maintenant tout pouvoir !'
  - type: text
    content: Le monde entier est devenu leur Royaume.
  - type: text
    content: Dieu les dirigera pour toujours !
  '16':
  - type: text
    content: Les 24 anciens étaient assis sur leurs trônes devant Dieu. Maintenant, ils se sont jetés sur le visage et adoraient Dieu.
  '17':
  - type: text
    content: 'Ils disaient :'
  - type: text
    content: 'Nous te remercions, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, parce que tu as tout pouvoir !'
  - type: text
    content: Tu es vivant maintenant et tu as toujours été vivant.
  - type: text
    content: Tu as un grand pouvoir et maintenant tu as commencé à diriger le monde entier !
  '18':
  - type: text
    content: Les pays du monde étaient très en colère.
  - type: text
    content: Mais maintenant tu es devenu très en colère contre eux, car ils ne croient pas en toi.
  - type: text
    content: Maintenant, tu jugeras toutes les personnes décédées.
  - type: text
    content: Tu donneras de bonnes choses à tes serviteurs.
  - type: text
    content: 'Ce sont tes '
  - type: text
    content: prophètes
  - type: text
    content: ' et tout ton peuple qui t’adorent.'
  - type: text
    content: Certains d’entre eux sont des personnes importantes et d’autres non.
  - type: text
    content: Tu donneras de bonnes choses à tes serviteurs.
  - type: text
    content: Mais tu détruiras tous ces gens qui détruisent la terre.
  - type: text
    content: Le moment est maintenant venu pour que tout cela se réalise.
  '19':
  - type: text
    content: 'Alors j’ai pu voir la maison de Dieu (temple) au '
  - type: text
    content: ciel
  - type: text
    content: '. À l’intérieur, j’ai vu la boîte d’accord spéciale de Dieu. Il y a eu une grande tempête avec des éclairs brillants et un fort bruit de '
  - type: text
    content: tonnerre
  - type: text
    content: '. Le sol bougeait fortement et une forte pluie de pierres de glace tombait du '
  - type: text
    content: ciel
  - type: text
    content: .
  '2':
  - type: text
    content: Mais ne mesure pas la cour qui est à l’extérieur de la maison de Dieu (temple). Ne la mesure pas, car Dieu a donné cette cour aux païens qui ne croient pas en lui. Ils iront partout dans la ville de Dieu et la détruiront pendant 42 mois.
  '3':
  - type: text
    content: 'Je donnerai le pouvoir à mes 2 serviteurs qui disent clairement mon message. Comme les '
  - type: text
    content: prophètes
  - type: text
    content: ', ils diront aux gens mon message pendant 1 260 jours. Ils porteront des vêtements faits de poils de chèvre.'
  '4':
  - type: text
    content: 'Ces serviteurs sont les 2 oliviers et les 2 '
  - type: text
    content: chandeliers
  - type: text
    content: '. Ils se tiennent devant Dieu qui est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de la terre. '
  '5':
  - type: text
    content: 'Si quelqu’un essaie de leur faire du mal, le feu sort de la bouche des serviteurs. Ce feu détruit leurs ennemis. Quiconque veut faire du mal aux 2 serviteurs doit mourir de cette façon. '
  '6':
  - type: text
    content: 'Ces serviteurs de Dieu ont le pouvoir de fermer le '
  - type: text
    content: ciel
  - type: text
    content: . Ensuite, il n’y aura pas de pluie pendant le temps qu’ils diront leurs messages de Dieu. Ils ont également le pouvoir de faire en sorte que l’eau sur terre devienne du sang. Ils peuvent également provoquer des maladies de nombreux types. Ils le feront aussi souvent qu’ils le voudront.
  '7':
  - type: text
    content: 'Lorsque ces 2 serviteurs de Dieu finiront de dire les messages de Dieu, un animal les attaquera. C’est l’animal qui vit dans le trou profond. Il sortira du trou. Ce sera plus fort que les 2 serviteurs et ça les tuera. '
  '8':
  - type: text
    content: 'Leurs corps morts se trouveront sur la rue de la grande ville où les gens ont tué leur '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur une croix. Cette ville qu’on appelle Sodome ou l’Égypte, car elle est aussi mauvaise que ces endroits.'
  '9':
  - type: text
    content: 'Des gens de partout dans le monde regarderont les cadavres des serviteurs pendant 3 jours et demi. Ce sont des gens de tous les pays, de tous les groupes familiaux et de toutes les langues. Ils refuseront de laisser quiconque enterrer les corps morts. '
