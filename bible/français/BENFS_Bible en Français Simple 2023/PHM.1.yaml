document_id: PHM.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit bonjour à Philémon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C’est moi Paul qui écris cette lettre. Je suis en prison, parce que je sers Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Notre ami chrétien Timothée est ici avec moi.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nous t’écrivons, Philémon. Tu es notre ami et nous t’aimons. Tu travailles au nom de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', comme nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous saluons également Apphia, qui est comme une sœur pour nous. Et nous disons bonjour à Archippe, qui sert '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' comme un soldat, comme nous. Nous disons également bonjour au groupe de chrétiens qui se réunissent chez toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je prie pour que Dieu, notre Père, et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continueront à vous aider. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul remercie Dieu à cause de Philémon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand je prie pour toi, je remercie toujours Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je remercie Dieu, parce que les gens me disent de bonnes choses sur toi. Tu aimes tout le peuple de Dieu et tu as la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous avons chacun la même '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' que nous servons. Je prie donc pour que tu deviennes fort. Je prie pour que tu comprennes mieux chaque bonne chose qui est la nôtre à cause de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mon ami, tu as aidé le peuple de Dieu à se sentir plus fort. Ton amour pour eux m’a fait très plaisir. Ça me fait sentir plus fort aussi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul demande à Philémon d’aider Onésime
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je veux te demander de faire quelque chose. Je suis sûr que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' m’a donné le pouvoir. Je peux donc te dire avec force ce que tu dois faire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A cause de l’amour, je te demande une chose : Fais‑la, je t’en prie. Moi, Paul, je suis un vieil homme. De plus, je suis en prison maintenant, parce que je sers Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je te demande donc d’aider Onésime, qui est comme mon propre enfant. Je lui ai parlé de Jésus pendant que j’étais en prison. Pour cette raison, il vit maintenant avec Dieu. Je suis comme son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Avant de croire en Jésus, Onésime ne t’a vraiment pas aidé. Mais maintenant, il peut nous aider, toi et moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je te le renvoie donc maintenant. Parce que je l’aime, c’est comme si je t’envoyais mon propre cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je voulais le garder ici avec moi, pour m’aider à ta place. Je suis en prison ici, parce que j’ai enseigné aux gens la Bonne Nouvelle de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais je ne voulais rien faire sans ton accord. Je voulais que tu m’aides, parce que tu veux vraiment aider. Je ne voulais pas te pousser à le faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Onésime s’est enfui de chez toi, peut‑être que Dieu a voulu que cela arrive. Onésime t’a quitté pour une courte période, afin que tu puisses maintenant le récupérer pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu peux le faire revenir non seulement comme ton esclave. Il sera bien mieux qu’un esclave pour toi. Il sera comme un frère que tu aimes. Je l’aime beaucoup. Mais maintenant, tu l’aimeras encore plus. Il te servira d’esclave, mais il servira aussi le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', comme toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je suis ton ami. Ensemble, nous servons Dieu. Si tu es d’accord avec cela, sois gentil avec Onésime. Accepte‑le comme si c’était moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Si Onésime t’a fait du mal, je le réparerai encore. S’il t’a pris de l’argent, je le rembourserai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moi, Paul, j’écris moi‑même ceci : Je vais te rembourser l’argent. Mais tu dois te souvenir de ce que je t’ai déjà donné. Tu vis avec Dieu, parce que je t’ai annoncé la Bonne Nouvelle de Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Oui, mon ami, aide‑moi maintenant, car nous appartenons tous 2 au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. En tant qu’ami chrétien, aide‑moi à me sentir plus heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je suis sûr que tu feras ce que je te demande. C’est pourquoi je t’ai écrit cette lettre. Je sais que tu feras encore plus pour m’aider.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je voudrais te demander encore une chose. Prépare une chambre dans ta maison où je peux rester. Je sais que vous priez tous pour que Dieu me laisse libre. En conséquence, j’espère que je pourrai vous rendre visite encore.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul termine sa lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Épaphras est également ici en prison avec moi, parce qu’il sert Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il te dit bonjour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Marc, Aristarque, Démas et Luc, qui travaillent avec moi ici, te disent également bonjour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je prie pour que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continue d’être très aimable envers vous tous.'
