document_id: PHM.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul dit bonjour à Philémon
  - type: text
    content: C’est moi Paul qui écris cette lettre. Je suis en prison, parce que je sers Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Notre ami chrétien Timothée est ici avec moi.
  - type: text
    content: 'Nous t’écrivons, Philémon. Tu es notre ami et nous t’aimons. Tu travailles au nom de '
  - type: text
    content: Christ
  - type: text
    content: ', comme nous. '
  '10':
  - type: text
    content: 'Je te demande donc d’aider Onésime, qui est comme mon propre enfant. Je lui ai parlé de Jésus pendant que j’étais en prison. Pour cette raison, il vit maintenant avec Dieu. Je suis comme son père. '
  '11':
  - type: text
    content: Avant de croire en Jésus, Onésime ne t’a vraiment pas aidé. Mais maintenant, il peut nous aider, toi et moi.
  '12':
  - type: text
    content: 'Je te le renvoie donc maintenant. Parce que je l’aime, c’est comme si je t’envoyais mon propre cœur. '
  '13':
  - type: text
    content: 'Je voulais le garder ici avec moi, pour m’aider à ta place. Je suis en prison ici, parce que j’ai enseigné aux gens la Bonne Nouvelle de Jésus. '
  '14':
  - type: text
    content: Mais je ne voulais rien faire sans ton accord. Je voulais que tu m’aides, parce que tu veux vraiment aider. Je ne voulais pas te pousser à le faire.
  '15':
  - type: text
    content: 'Onésime s’est enfui de chez toi, peut‑être que Dieu a voulu que cela arrive. Onésime t’a quitté pour une courte période, afin que tu puisses maintenant le récupérer pour toujours. '
  '16':
  - type: text
    content: 'Tu peux le faire revenir non seulement comme ton esclave. Il sera bien mieux qu’un esclave pour toi. Il sera comme un frère que tu aimes. Je l’aime beaucoup. Mais maintenant, tu l’aimeras encore plus. Il te servira d’esclave, mais il servira aussi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme toi.'
  '17':
  - type: text
    content: 'Je suis ton ami. Ensemble, nous servons Dieu. Si tu es d’accord avec cela, sois gentil avec Onésime. Accepte‑le comme si c’était moi. '
  '18':
  - type: text
    content: 'Si Onésime t’a fait du mal, je le réparerai encore. S’il t’a pris de l’argent, je le rembourserai. '
  '19':
  - type: text
    content: 'Moi, Paul, j’écris moi‑même ceci : Je vais te rembourser l’argent. Mais tu dois te souvenir de ce que je t’ai déjà donné. Tu vis avec Dieu, parce que je t’ai annoncé la Bonne Nouvelle de Jésus.'
  '2':
  - type: text
    content: 'Nous saluons également Apphia, qui est comme une sœur pour nous. Et nous disons bonjour à Archippe, qui sert '
  - type: text
    content: Christ
  - type: text
    content: ' comme un soldat, comme nous. Nous disons également bonjour au groupe de chrétiens qui se réunissent chez toi.'
  '20':
  - type: text
    content: 'Oui, mon ami, aide‑moi maintenant, car nous appartenons tous 2 au '
  - type: text
    content: Seigneur
  - type: text
    content: '. En tant qu’ami chrétien, aide‑moi à me sentir plus heureux. '
  '21':
  - type: text
    content: Je suis sûr que tu feras ce que je te demande. C’est pourquoi je t’ai écrit cette lettre. Je sais que tu feras encore plus pour m’aider.
  '22':
  - type: text
    content: Je voudrais te demander encore une chose. Prépare une chambre dans ta maison où je peux rester. Je sais que vous priez tous pour que Dieu me laisse libre. En conséquence, j’espère que je pourrai vous rendre visite encore.
  - type: heading
    content: Paul termine sa lettre
  '23':
  - type: text
    content: Épaphras est également ici en prison avec moi, parce qu’il sert Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Il te dit bonjour. '
  '24':
  - type: text
    content: Marc, Aristarque, Démas et Luc, qui travaillent avec moi ici, te disent également bonjour.
  '25':
  - type: text
    content: 'Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continue d’être très aimable envers vous tous.'
  '3':
  - type: text
    content: 'Je prie pour que Dieu, notre Père, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continueront à vous aider. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: .
  - type: heading
    content: Paul remercie Dieu à cause de Philémon
  '4':
  - type: text
    content: 'Quand je prie pour toi, je remercie toujours Dieu. '
  '5':
  - type: text
    content: 'Je remercie Dieu, parce que les gens me disent de bonnes choses sur toi. Tu aimes tout le peuple de Dieu et tu as la '
  - type: text
    content: foi
  - type: text
    content: ' en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '6':
  - type: text
    content: 'Nous avons chacun la même '
  - type: text
    content: foi
  - type: text
    content: ' en '
  - type: text
    content: Christ
  - type: text
    content: ' que nous servons. Je prie donc pour que tu deviennes fort. Je prie pour que tu comprennes mieux chaque bonne chose qui est la nôtre à cause de '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '7':
  - type: text
    content: Mon ami, tu as aidé le peuple de Dieu à se sentir plus fort. Ton amour pour eux m’a fait très plaisir. Ça me fait sentir plus fort aussi.
  - type: heading
    content: Paul demande à Philémon d’aider Onésime
  '8':
  - type: text
    content: 'Je veux te demander de faire quelque chose. Je suis sûr que le '
  - type: text
    content: Christ
  - type: text
    content: ' m’a donné le pouvoir. Je peux donc te dire avec force ce que tu dois faire.'
  '9':
  - type: text
    content: 'A cause de l’amour, je te demande une chose : Fais‑la, je t’en prie. Moi, Paul, je suis un vieil homme. De plus, je suis en prison maintenant, parce que je sers Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
