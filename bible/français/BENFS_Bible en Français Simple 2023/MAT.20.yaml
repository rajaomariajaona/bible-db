document_id: MAT.20,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 20
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire à propos de certains travailleurs dans un champ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais vous dire ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Le maître de la maison est sorti tôt le matin. Il voulait trouver des gens pour travailler dans son champ. Il paiera ces travailleurs. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les travailleurs qui étaient venus d’abord travailler ont également reçu une petite pièce d’argent. Ils pensaient qu’ils allaient recevoir plus que les autres travailleurs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais quand ils ont reçu leur argent, ils n’étaient pas contents. Et ils ont dit au maître qu’ils n’étaient pas heureux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui ont dit : Certains étaient les derniers à venir. Ils ont travaillé pendant une heure seulement. Mais tu leur as donné le même montant que nous. Et nous avons travaillé toute la journée sous la forte chaleur du soleil.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le maître a dit à l’un des travailleurs : Mon ami, je suis juste envers toi. Tu as été d’accord pour travailler pendant un jour et recevoir une petite pièce d’argent. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prends ton argent et rentre à la maison. Je choisis de donner à ce dernier homme le même montant d’argent que je t’ai donné. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est mon argent. Je peux choisir quoi faire avec cela. Tu ne devrais pas regretter, j’ai fait une bonne chose. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Alors un jour, ceux qui sont les moins importants seront les plus importants. Et ceux qui sont les plus importants maintenant seront les moins importants.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle à nouveau sur la façon dont il mourra
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus allait à Jérusalem. Il marchait avec ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Puis il a conduit ses 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' à un endroit tranquille. C’était un endroit où ils pouvaient parler à eux seuls. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit : Ecoutez : Quand nous arriverons à Jérusalem, quelqu’un va aider les gens à m’arrêter, le Fils de l’homme. Ces gens sont les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les enseignants de la loi. Ils vont dire que je dois mourir. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ils vont m’attraper. Et ils vont me livrer à ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Ils vont se moquer de moi. Ils vont aussi me frapper avec un fouet. Ensuite, ils vont me tuer sur une croix. Après 3 jours, je vais revenir à la vie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La femme de Zébédée demande à Jésus quelque chose
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le maître s’est entendu avec les travailleurs pour ce paiement : une petite pièce d’argent par jour. Et il les a envoyés travailler dans le champ.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La femme de Zébédée est venue voir Jésus. Elle a emmené ses 2 fils, Jacques et Jean, avec elle. Elle s’est mise à genoux devant Jésus. Elle voulait lui demander de faire quelque chose de bon pour ses fils.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a demandé : Que veux‑tu ? Elle a dit : Un jour, tu seras Roi et tu gouverneras ton Royaume. Je veux qu’un de mes 2 fils s’asseye à ton côté droit. Je veux que l’autre fils s’asseye à ton côté gauche. S’il te plaît, vas‑tu faire ceci ?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu à Jacques et Jean. Il leur a dit : Vous ne comprenez pas ce que vous me demandez de faire. Pouvez‑vous avoir les difficultés comme celles que je vais avoir ? Jacques et Jean ont dit : Oui, nous pouvons le faire. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a dit : Oui, cela est vrai. Vous souffrirez certainement comme je vais souffrir. Mais je ne peux pas dire qui va s’asseoir à mon coté droit ou gauche dans le futur. Cela dépend de Dieu lui‑même. Il y a des gens pour lesquels il a réservé ces places.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque les 10 autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont entendu parler de cela, ils étaient en colère contre les 2 frères. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus a demandé aux 12 hommes de venir près de lui. Jésus a dit : Vous savez comment les choses se passent dans les nations. Les chefs dominent sur le peuple. Les hautes personnalités soumettent le peuple à leurs ordres. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne veux pas que vous soyez comme ça. Celui qui veut être le plus important parmi vous, doit être le serviteur des autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui veut être le plus important doit être comme le moins important serviteur de tous. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le Fils de l’homme lui‑même est venu sur terre pour être le serviteur d’autres personnes. Il n’est pas venu ici pour avoir des serviteurs qui travaillent pour lui. Il est venu mourir pour que beaucoup de gens puissent être libres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus aide 2 hommes à voir
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Jésus et ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont quitté Jéricho, une grande foule le suivait. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le maître est sorti à 9 heures. Il a vu d’autres hommes debout à la place du marché. Ils n’avaient rien à faire. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, 2 hommes étaient assis au bord de la route. Ces hommes ne pouvaient pas voir. Mais ils ont entendu que Jésus marchait le long de la route près d’eux. Alors ils criaient : Jésus, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: ', s’il te plaît, aie pitié de nous. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens leur ont dit d’arrêter de crier. Ils voulaient qu’ils se taisent. Mais les hommes criaient encore plus fort : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: ', s’il te plaît, aie pitié de nous. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a arrêté de marcher. Il a parlé aux 2 hommes. Il a demandé : Que voulez‑vous que je fasse pour vous ?'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes ont répondu : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', nous voulons voir.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Jésus s’est senti triste pour les 2 hommes. Il a touché les yeux et immédiatement les hommes pouvaient voir. Donc, ces hommes suivaient Jésus le long de la route.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le maître a dit à ces hommes : Vous aussi, allez travailler dans mon champ. Je vais vous payer un bon montant d’argent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donc, les travailleurs sont allés au champ du maître.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le maître est sorti encore vers midi. Il est encore sorti vers 15 heures. Les 2 fois, il a envoyé des hommes à son champ pour travailler. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '2 heures plus tard, il est sorti de nouveau. Et il a encore trouvé des hommes qui étaient là. Et ils ne faisaient rien. Le maître leur a demandé : Pourquoi êtes‑vous debout toute la journée et vous ne faites rien ?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes ont dit au maître : Personne ne nous a demandé de travailler pour lui. Alors le maître leur a dit : Vous aussi, allez travailler dans mon champ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le soir est venu. Alors, le maître du champ est allé voir l’homme qui regardait les travailleurs. Le maître lui a dit : Dis aux travailleurs de venir ici. Et paie leur argent. Commence par les travailleurs qui sont venus derniers. Termine avec les travailleurs qui sont venus d’abord.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les travailleurs qui étaient venus derniers pour travailler ont reçu une petite pièce de monnaie d’argent chacun. '
