document_id: 2TI.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Un bon soldat pour le Christ
  - type: text
    content: Timothée, tu es comme mon propre enfant. Laisse Dieu te rendre fort. Aie confiance en lui, il va t’aider, parce que tu appartiens à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '10':
  - type: text
    content: Je continue donc d’être patient et courageux pendant tous ces problèmes. Je le fais pour pouvoir aider les gens que Dieu a choisis de lui appartenir. Je veux que Dieu les sauve aussi, à cause de ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait pour eux. En conséquence, ils vivront avec Dieu pour toujours, dans le bel endroit où il vit.'
  '11':
  - type: text
    content: 'Nous savons tous que cela est vrai :'
  - type: text
    content: 'Si nous sommes morts avec '
  - type: text
    content: Christ
  - type: text
    content: ' dans ce monde, nous vivrons également avec lui dans le monde futur.'
  '12':
  - type: text
    content: 'Si nous continuons d’être forts pendant les troubles ici, nous régnerons aussi avec lui là‑bas au '
  - type: text
    content: ciel
  - type: text
    content: .
  - type: text
    content: 'Mais si nous disons que nous ne connaissons pas le '
  - type: text
    content: Christ
  - type: text
    content: ', il dira aussi qu’il ne nous connaît pas.'
  '13':
  - type: text
    content: Même si nous ne lui faisons plus confiance, il sera toujours quelqu’un en qui les gens peuvent avoir confiance. Il restera toujours fidèle et ne changera jamais.
  - type: heading
    content: Un bon travailleur pour Dieu
  '14':
  - type: text
    content: Continue de dire ces choses au peuple de Dieu là‑bas, afin qu’il se souvienne de cela. Utilise le pouvoir de Dieu et avertis les gens de ne pas se quereller sur les mots. Se quereller sur de petites choses n’aide personne. Mais, cela détruit ces gens qui écoutent.
  '15':
  - type: text
    content: Essaie de servir toujours beaucoup Dieu d’une manière qui le rend heureux. Ensuite, il t’acceptera comme un bon travailleur en qui il peut avoir confiance. Tu dois enseigner correctement le vrai message de Dieu. Tu n’auras alors aucune raison d’avoir honte de ton travail.
  '16':
  - type: text
    content: 'Mais éloigne‑toi des gens qui parlent de mauvaises choses qui ne sont pas importantes pour Dieu. Un tel message amène les gens à vivre de plus en plus d’une manière qui ne rend pas Dieu heureux. '
  '17':
  - type: text
    content: 'Cela rend les gens malades dans leurs '
  - type: text
    content: esprits
  - type: text
    content: '. De plus en plus de personnes tombent malades. Hyménée et Philète sont 2 des personnes qui enseignent ce genre de faux message. '
  '18':
  - type: text
    content: Ils n’enseignent plus le vrai message de Dieu. Ils disent que Dieu ne ressuscitera plus des morts, car il a déjà donné la vie à des morts. De cette façon, ils ont confondu l’
  - type: text
    content: esprit
  - type: text
    content: ' de certaines gens, de sorte qu’ils ne croient plus en '
  - type: text
    content: Christ
  - type: text
    content: .
  '19':
  - type: text
    content: 'Mais le groupe des vrais croyants reste fort, comme la fondation sous un bâtiment. Dieu y a écrit son message. Il a dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sait qui est son propre peuple. Il dit également : Quiconque dit qu’il appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: ' doit laisser de faire de mauvaises choses.'
  '2':
  - type: text
    content: Tu as entendu le message que j’ai enseigné. Beaucoup d’autres personnes l’ont également entendu. Elles ont également accepté que ce message est vrai. Maintenant, tu dois dire le même message à d’autres personnes qui pourront l’enseigner à encore plus de gens. Ils doivent être des gens honnêtes en qui tu as confiance. Ils doivent être des gens qui peuvent bien enseigner.
  '20':
  - type: text
    content: 'Dans une grande maison, il existe différents types de récipients. Il y a des récipients que les gens ont faits à partir d’or ou d’argent. Ils voient ces récipients comme des choses précieuses. Il y a aussi des récipients que les gens ont faits à partir de bois ou d’argile. Ces récipients ne sont pas des choses spéciales et peuvent se salir. '
  '21':
  - type: text
    content: C’est comme ça avec les gens qui servent Dieu comme leur Maître. Les gens qui se tiennent à l’écart de ces mauvaises choses seront comme des récipients précieux. Leur maître peut les utiliser dans un but spécial. Ils seront prêts pour lui, il pourra les utiliser pour tout type de bon travail.
  '22':
  - type: text
    content: 'Fais attention, ne fais pas le genre de mauvaises choses que les jeunes veulent souvent faire. Essaie plutôt de faire ce qui est correct et juste. Continue de faire confiance en Dieu. Aime les autres et vis en paix avec eux. Join‑toi aux gens qui sont purs à l’intérieur et qui prient le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '23':
  - type: text
    content: 'Ne t’associe pas aux gens qui veulent discuter des choses idiotes qui ne veulent rien dire. Tu sais que des choses idiotes comme ça ne font que quereller les gens. '
  '24':
  - type: text
    content: 'En tant que serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu ne dois pas te quereller. Mais, tu dois être gentil avec tout le monde. Tu dois être capable de bien les enseigner. Et tu dois être patient lorsque les gens te causent des problèmes. '
  '25':
  - type: text
    content: Lorsque les gens parlent contre le vrai message de Dieu, enseigne‑les attentivement. Aide‑les à comprendre ce qui est juste. Peut‑être que Dieu changera leur façon de penser pour croire au vrai message.
  '26':
  - type: text
    content: 'Leurs '
  - type: text
    content: esprits
  - type: text
    content: ' commenceront à penser clairement. C’est le '
  - type: text
    content: diable
  - type: text
    content: ' qui les a trompés. Ainsi, ils croient aux mauvaises choses. Ils font ce que le '
  - type: text
    content: diable
  - type: text
    content: ' veut. Mais maintenant, ils vont se libérer de la puissance du '
  - type: text
    content: diable
  - type: text
    content: .
  '3':
  - type: text
    content: Sois patient dans les problèmes que nous avons, nous les chrétiens. Sois courageux et fort, comme un bon soldat pour le Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Tout soldat qui participe à une guerre ne se préoccupe pas d’autre chose. Il veut seulement bien se battre pour faire plaisir à son commandant. '
  '5':
  - type: text
    content: 'Il en va de même pour un athlète qui fait une course. Il ne peut gagner la course que s’il respecte les règles. '
  '6':
  - type: text
    content: 'Un agriculteur travaille beaucoup pour faire pousser des plantes pour se nourrir. Donc, il doit être la première personne à recevoir une partie de cette nourriture. '
  '7':
  - type: text
    content: 'Réfléchis bien à ce que je dis. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t’aidera à comprendre toutes ces choses.'
  '8':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est venu de la famille du roi David. Dieu l’a fait revivre après sa mort sur la croix. N’oublie pas cela ! Ces faits font partie de la Bonne Nouvelle que je dis aux gens. '
  '9':
  - type: text
    content: Et j’ai beaucoup de problèmes, parce que je dis cette Bonne Nouvelle aux gens. Ils m’ont même attaché dans une prison, comme quelqu’un qui a fait quelque chose de mal. Mais personne ne peut garder le message de Dieu dans une prison !
