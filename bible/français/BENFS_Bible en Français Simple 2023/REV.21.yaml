document_id: REV.21,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 21
  - type: heading
    content: Le nouveau ciel et la nouvelle terre
  - type: text
    content: 'Puis j’ai vu un nouveau '
  - type: text
    content: ciel
  - type: text
    content: ' et une nouvelle terre. Le premier '
  - type: text
    content: ciel
  - type: text
    content: ' et la première terre n’existaient plus. La mer n’était plus là non plus. '
  '10':
  - type: text
    content: Alors l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu m’a fait voir et entendre des choses étranges. L’'
  - type: text
    content: ange
  - type: text
    content: ' m’a amené sur une grande montagne qui était très haute. Il m’a montré la ville spéciale de Dieu, Jérusalem. La ville descendait du '
  - type: text
    content: ciel
  - type: text
    content: ' de Dieu. '
  '11':
  - type: text
    content: 'Elle avait une lumière très brillante qui venait de Dieu. La ville brillait comme une pierre très précieuse appelée jaspe. Elle brillait comme un verre propre. '
  '12':
  - type: text
    content: 'Elle avait un très grand mur haut autour. Le mur avait 12 portes. 12 '
  - type: text
    content: anges
  - type: text
    content: ' se tenaient aux 12 portes. Les noms des 12 groupes familiaux du peuple d’Israël étaient inscrits sur les 12 portes. '
  '13':
  - type: text
    content: 'Il y avait 3 portes de chaque côté de la ville : 3 portes étaient du côté est, 3 portes étaient du côté nord, 3 portes étaient du côté sud, 3 portes étaient du côté ouest.'
  '14':
  - type: text
    content: 'Ils avaient construit le mur de la ville sur une fondation de 12 pierres solides. Ils avaient écrit le nom des 12 '
  - type: text
    content: apôtres
  - type: text
    content: ' de l’Agneau sur ces 12 pierres.'
  '15':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' qui m’a parlé, avait un long bâton d’or. Il l’a utilisé pour mesurer les choses. Il a mesuré la ville et ses portes et ses murs. '
  '16':
  - type: text
    content: La forme de la ville était un carré. Sa longueur et sa largeur étaient égales. L’
  - type: text
    content: ange
  - type: text
    content: ' a mesuré la ville avec son bâton. Il a trouvé 12 000 stades (2 400 kilomètres). La longueur et la largeur de cette ville étaient égales. '
  '17':
  - type: text
    content: Il a également mesuré son mur. La taille du mur était de 144 coudées (65 mètres). C’est de cette façon que les humains mesurent les choses. L’
  - type: text
    content: ange
  - type: text
    content: ' a également mesuré de la même manière.'
  '18':
  - type: text
    content: 'Le mur était en pierre appelée jaspe. La ville était faite du meilleur type d’or. La lumière brillait comme la lumière brille à travers un verre propre. '
  '19':
  - type: text
    content: 'Il y avait des pierres fortes à la fondation du mur de la ville. Elles étaient très belles. Elles avaient des pierres précieuses de différentes couleurs. Chaque grande pierre avait sa propre pierre de valeur spéciale. Elles s’appelaient :'
  - type: text
    content: 1. Jaspe ; 2. Saphir ; 3. Chalcédoine ; 4. Émeraude ; 5. Sardoine ;
  - type: text
    content: 6. Cornaline ; 7. Chrysolyte ; 8. Béryl ; 9. Topaze ; 10. Chrysoprase ; 11. Turquoise ; 12. Améthyste.
  '2':
  - type: text
    content: 'J’ai vu la ville spéciale de Dieu. Elle descendait du '
  - type: text
    content: ciel
  - type: text
    content: ' de Dieu. C’est la nouvelle ville qui s’appelle Jérusalem. Elle était très belle, comme une femme qui porte de beaux vêtements pour son mariage. Elle est alors prête à rencontrer l’homme qu’elle va épouser.'
  '21':
  - type: text
    content: Les 12 portes étaient 12 perles. Ils ont utilisé une perle distincte pour fabriquer chaque porte. La plus grande rue de la ville a été faite à partir du meilleur type d’or. Elle brillait comme la lumière brille à travers un verre propre.
  '22':
  - type: text
    content: 'Quand j’ai regardé, j’ai vu qu’il n’y avait pas de maison de Dieu dans la ville. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, qui a toute puissance et pouvoir, est là lui‑même. L’Agneau est également là. Ainsi, les gens n’ont pas besoin d’un endroit spécial pour l’'
  - type: text
    content: adorer
  - type: text
    content: ' là‑bas. '
  '23':
  - type: text
    content: De plus, la ville n’a pas besoin du soleil ni de la lune pour briller dessus. La lumière très brillante qui vient de Dieu éclaire la ville. L’Agneau est la lampe qui lui donne de la lumière.
  '24':
  - type: text
    content: 'Des gens de tous les pays du monde vivront à la lumière de la ville. Les dirigeants de la terre apporteront toutes leurs précieuses choses dans la ville. '
  '25':
  - type: text
    content: 'Personne ne fermera jamais les portes de la ville à la fin de la journée. Ce sera toujours le jour et il n’y aura pas de nuit là‑bas. '
  '26':
  - type: text
    content: 'Des gens de tous les pays du monde apporteront leurs belles et précieuses choses dans la ville. '
  '27':
  - type: text
    content: Mais rien de mauvais ou de sale ne pourra jamais y entrer. Personne qui fait quelque chose que Dieu déteste ne pourra entrer dans la ville. Personne qui dit des mensonges ne pourra entrer là. Seules les personnes dont le nom est inscrit dans le livre de vie de l’Agneau pourront y entrer.
  '3':
  - type: text
    content: 'Puis j’ai entendu une voix qui parlait fort du trône. Elle disait : La maison de Dieu est maintenant parmi les gens ! Dieu vivra avec eux. Ce sera son peuple. Dieu lui‑même sera avec eux et il sera leur Dieu. '
  '4':
  - type: text
    content: Dieu ôtera toutes les larmes de leurs yeux. Personne ne mourra plus jamais. Personne ne sera plus triste. Personne ne pleurera plus. Personne n’aura plus de douleur. Tout ce qui rendait les gens tristes a maintenant disparu. Ce vieux monde a complètement disparu.
  '5':
  - type: text
    content: 'Dieu, qui était assis sur le trône, a dit : Je fais tout nouveau ! Puis il a dit : Note ceci, parce que ces mots sont vrais. Tout le monde doit croire à cela.'
  '6':
  - type: text
    content: 'Il m’a aussi dit : Tout est maintenant fait ! J’ai tout commencé et je vais tout finir. Je suis le premier et le dernier, le commencement et la fin. Si quelqu’un a soif, je lui donnerai de l’eau à boire. Personne n’aura à payer quoi que ce soit pour cela. Cette eau provient d’une source et elle donne aux gens une vraie vie. '
  '7':
  - type: text
    content: Tous ceux qui gagneront contre Satan recevront toutes ces choses de moi. Je serai leur Dieu et ils seront mes enfants.
  '8':
  - type: text
    content: Mais je punirai toutes les autres personnes. Parmi ces gens, il y avait des peureux. Ceux qui ne croyaient pas en Dieu. Les gens qui faisaient des choses impures. Les gens qui tuaient d’autres personnes. Ceux qui avaient de mauvaises relations sexuelles. Les gens qui faisaient la magie. Les gens qui adoraient de faux dieux. Ceux qui disaient des mensonges.
  - type: text
    content: Tous ces gens iront dans l’étang de feu et de soufre. C’est la deuxième mort pour les gens.
  - type: heading
    content: Nouvelle ville de Jérusalem
  '9':
  - type: text
    content: 'Alors l’un des 7 '
  - type: text
    content: anges
  - type: text
    content: ' aux 7 coupes qui étaient pleines des 7 derniers malheurs est venu à moi. Il a dit : Viens avec moi ! Je vais te montrer la femme qui deviendra la femme de l’Agneau.'
