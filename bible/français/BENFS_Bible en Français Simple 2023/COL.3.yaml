document_id: COL.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: L’ancienne vie et la nouvelle vie
  - type: text
    content: 'Dieu vous a réveillés de la mort. Ainsi, vous êtes en vie avec le '
  - type: text
    content: Christ
  - type: text
    content: '. Vous devez vouloir de plus en plus les choses qui sont dans le '
  - type: text
    content: ciel
  - type: text
    content: ', avec le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  - type: text
    content: Christ
  - type: text
    content: ' est assis à côté de Dieu, à sa droite. '
  '10':
  - type: text
    content: 'Au lieu de cela, vous avez porté la nouvelle nature, que Dieu a faite. Et Dieu continue de vous faire de plus en plus comme lui. Ainsi donc, vous le connaîtrez de plus en plus complètement. '
  '11':
  - type: text
    content: 'Quand les gens ont cette nouvelle nature, ils ne sont pas différents les uns des autres. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ne sont pas différents des gens qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: '. Ça n’a pas d’importance si quelqu’un vous a circoncis ou non. Le pays d’où vous venez n’a pas d’importance. Ce n’est pas important si vous êtes un esclave ou une personne libre. Mais c’est '
  - type: text
    content: Christ
  - type: text
    content: ' qui est important. Il est tout, et il est dans tout.'
  '12':
  - type: text
    content: 'Dieu vous a choisis d’être son propre peuple spécial. Il vous aime beaucoup. Donc, vous devrez choisir de faire de bonnes choses, comme le peuple de Dieu doit faire. Vous devrez être bons et gentils à d’autres personnes. Vous devrez vouloir les aider. Vous ne devez pas penser que vous êtes meilleurs ou plus importants que d’autres personnes. Mais vous devez être patients avec eux. '
  '13':
  - type: text
    content: 'Ne vous fâchez pas les uns contre les autres, mais soyez patients. Quelqu’un peut vous attrister par quelque chose de mal. Mais pardonnez à cette personne. Pardonnez‑lui comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a pardonné.'
  '14':
  - type: text
    content: Et aimez‑vous les uns les autres. C’est la chose la plus importante que vous devez faire. Gardez l’amour au‑dessus de toutes ces choses. L’amour tient tout ensemble. L’amour rend toute chose comme elle doit être.
  '15':
  - type: text
    content: 'Laissez '
  - type: text
    content: Christ
  - type: text
    content: ' diriger ce que vous pensez. Laissez '
  - type: text
    content: Christ
  - type: text
    content: ' diriger ce que vous ressentez. Si vous faites cela, vous n’aurez aucun problème à l’intérieur de vous‑mêmes ou avec d’autres chrétiens. Dieu veut que vous soyez unis comme ça, parce que chacun d’entre vous appartient à un seul corps vraiment. Et remerciez toujours Dieu pour tout. '
  '16':
  - type: text
    content: 'Que le message de '
  - type: text
    content: Christ
  - type: text
    content: ' vive en vous. Laissez‑le travailler en vous. Il fera beaucoup de bonnes choses en vous. Il vous aidera à vous enseigner les uns les autres. Il vous aidera à comprendre les choses correctement. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous fera chanter différentes sortes de chansons les uns aux autres, pendant que vous adorez Dieu. Vous chanterez pour le remercier pour tout ce qu’il a fait.'
  '17':
  - type: text
    content: 'Tout ce que vous faites, doit rendre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus heureux. Tout ce que vous dites, doit le rendre heureux. Remerciez Dieu le Père par le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. Remerciez‑le donc pour toutes les choses que vous faites.'
  - type: heading
    content: Faites ce qui est juste à la maison et au travail
  '18':
  - type: text
    content: 'Femmes, obéissez à vos maris. C’est la bonne chose à faire, parce que vous appartenez au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '19':
  - type: text
    content: Maris, aimez vos femmes et soyez gentils avec elles.
  '2':
  - type: text
    content: Continuez de penser aux choses qui sont au‑dessus. Ne pensez pas aux choses qui sont sur la terre.
  '20':
  - type: text
    content: 'Enfants, obéissez à vos parents sur tout. Voilà comment vous pouvez rendre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' heureux.'
  '21':
  - type: text
    content: Pères, ne faites pas fâcher vos enfants contre vous. Ils pourraient penser qu’ils ne peuvent jamais faire quoi que ce soit pour vous rendre heureux avec eux.
  '22':
  - type: text
    content: 'Esclaves, obéissez toujours à vos maîtres dans tout. Ne travaillez pas bien seulement quand ils peuvent vous voir. Alors ils seront heureux de vous. Mais, faites toujours bien votre travail, parce que vous aimez vraiment le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Donc, vous voulez le rendre heureux. '
  '23':
  - type: text
    content: 'Quelles que soient les choses que vous faites, faites‑les pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Faites‑les aussi bien autant que vous le pouvez pour lui. Ne travaillez pas seulement pour des personnes. '
  '24':
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donnera toutes les bonnes choses qu’il vous avait promises. Vous le savez. Vous êtes les serviteurs de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '25':
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' punira toute personne qui fait de mauvaises choses. Voilà ce qui devrait arriver à des gens comme ça. Dieu utilise les mêmes règles pour décider de ce qui doit arriver à chaque personne. Il ne fait donc pas d’injustice.'
  '3':
  - type: text
    content: 'Pensez comme cela, parce que vous êtes morts. Et maintenant, vous êtes vivants avec le '
  - type: text
    content: Christ
  - type: text
    content: '. Il est uni à Dieu. Dieu garde votre vie en toute sécurité avec le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'C’est le '
  - type: text
    content: Christ
  - type: text
    content: ' qui nous amène à être en vie.'
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même se montrera un jour clairement à tout le monde. Alors tout le monde vous verra aussi avec lui. Vous serez comme lui et vous brillerez avec lui.'
  '5':
  - type: text
    content: Donc, vous devez refuser de faire de mauvaises choses qui appartiennent à cette terre. Alors ces choses vont cesser de faire partie de votre vie. N’ayez pas de relations sexuelles avec quelqu’un qui n’est pas votre mari ou votre femme. N’ayez pas de mauvaises pensées. Vous ne devez pas vouloir faire de mauvaises choses. Vous ne devez pas vouloir avoir de plus en plus de choses pour vous. Les gens qui veulent beaucoup ces choses pensent qu’elles sont plus importantes que Dieu. Donc, ils adorent vraiment ces choses.
  '6':
  - type: text
    content: Dieu sera très en colère contre les gens qui font ces mauvaises choses. Et il punira ces gens.
  '7':
  - type: text
    content: 'À un moment donné, vous faisiez ce genre de mauvaises choses. Ces choses dominaient alors vos vies. '
  '8':
  - type: text
    content: Mais maintenant, vous devez refuser de faire ce genre de choses. Il ne faut pas se mettre en colère facilement. Vous ne devez pas continuer d’être en colère contre les gens. Vous ne devez pas vouloir faire de mauvaises choses aux gens. Vous ne devez pas dire de mauvaises choses qui ne sont pas vraies sur les gens. Vous ne devez pas parler des mots mauvais et impurs.
  '9':
  - type: text
    content: Arrêtez de dire des choses qui ne sont pas vraies les uns aux autres. Vous devez être comme quelqu’un qui a enlevé les vieux vêtements. Vous avez enlevé la vieille nature. Et, avec cette vieille nature, vous avez enlevé toutes les mauvaises choses que vous avez faites avant. Voilà pourquoi vous devriez laisser de faire ces choses.
