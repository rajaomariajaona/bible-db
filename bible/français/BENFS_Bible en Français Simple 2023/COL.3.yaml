document_id: COL.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’ancienne vie et la nouvelle vie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu vous a réveillés de la mort. Ainsi, vous êtes en vie avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Vous devez vouloir de plus en plus les choses qui sont dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ', avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est assis à côté de Dieu, à sa droite. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Continuez de penser aux choses qui sont au‑dessus. Ne pensez pas aux choses qui sont sur la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pensez comme cela, parce que vous êtes morts. Et maintenant, vous êtes vivants avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il est uni à Dieu. Dieu garde votre vie en toute sécurité avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' qui nous amène à être en vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même se montrera un jour clairement à tout le monde. Alors tout le monde vous verra aussi avec lui. Vous serez comme lui et vous brillerez avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Donc, vous devez refuser de faire de mauvaises choses qui appartiennent à cette terre. Alors ces choses vont cesser de faire partie de votre vie. N’ayez pas de relations sexuelles avec quelqu’un qui n’est pas votre mari ou votre femme. N’ayez pas de mauvaises pensées. Vous ne devez pas vouloir faire de mauvaises choses. Vous ne devez pas vouloir avoir de plus en plus de choses pour vous. Les gens qui veulent beaucoup ces choses pensent qu’elles sont plus importantes que Dieu. Donc, ils adorent vraiment ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dieu sera très en colère contre les gens qui font ces mauvaises choses. Et il punira ces gens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'À un moment donné, vous faisiez ce genre de mauvaises choses. Ces choses dominaient alors vos vies. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais maintenant, vous devez refuser de faire ce genre de choses. Il ne faut pas se mettre en colère facilement. Vous ne devez pas continuer d’être en colère contre les gens. Vous ne devez pas vouloir faire de mauvaises choses aux gens. Vous ne devez pas dire de mauvaises choses qui ne sont pas vraies sur les gens. Vous ne devez pas parler des mots mauvais et impurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Arrêtez de dire des choses qui ne sont pas vraies les uns aux autres. Vous devez être comme quelqu’un qui a enlevé les vieux vêtements. Vous avez enlevé la vieille nature. Et, avec cette vieille nature, vous avez enlevé toutes les mauvaises choses que vous avez faites avant. Voilà pourquoi vous devriez laisser de faire ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Au lieu de cela, vous avez porté la nouvelle nature, que Dieu a faite. Et Dieu continue de vous faire de plus en plus comme lui. Ainsi donc, vous le connaîtrez de plus en plus complètement. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand les gens ont cette nouvelle nature, ils ne sont pas différents les uns des autres. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne sont pas différents des gens qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Ça n’a pas d’importance si quelqu’un vous a circoncis ou non. Le pays d’où vous venez n’a pas d’importance. Ce n’est pas important si vous êtes un esclave ou une personne libre. Mais c’est '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' qui est important. Il est tout, et il est dans tout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu vous a choisis d’être son propre peuple spécial. Il vous aime beaucoup. Donc, vous devrez choisir de faire de bonnes choses, comme le peuple de Dieu doit faire. Vous devrez être bons et gentils à d’autres personnes. Vous devrez vouloir les aider. Vous ne devez pas penser que vous êtes meilleurs ou plus importants que d’autres personnes. Mais vous devez être patients avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ne vous fâchez pas les uns contre les autres, mais soyez patients. Quelqu’un peut vous attrister par quelque chose de mal. Mais pardonnez à cette personne. Pardonnez‑lui comme le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous a pardonné.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et aimez‑vous les uns les autres. C’est la chose la plus importante que vous devez faire. Gardez l’amour au‑dessus de toutes ces choses. L’amour tient tout ensemble. L’amour rend toute chose comme elle doit être.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Laissez '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' diriger ce que vous pensez. Laissez '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' diriger ce que vous ressentez. Si vous faites cela, vous n’aurez aucun problème à l’intérieur de vous‑mêmes ou avec d’autres chrétiens. Dieu veut que vous soyez unis comme ça, parce que chacun d’entre vous appartient à un seul corps vraiment. Et remerciez toujours Dieu pour tout. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que le message de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vive en vous. Laissez‑le travailler en vous. Il fera beaucoup de bonnes choses en vous. Il vous aidera à vous enseigner les uns les autres. Il vous aidera à comprendre les choses correctement. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous fera chanter différentes sortes de chansons les uns aux autres, pendant que vous adorez Dieu. Vous chanterez pour le remercier pour tout ce qu’il a fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tout ce que vous faites, doit rendre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus heureux. Tout ce que vous dites, doit le rendre heureux. Remerciez Dieu le Père par le nom du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. Remerciez‑le donc pour toutes les choses que vous faites.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faites ce qui est juste à la maison et au travail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Femmes, obéissez à vos maris. C’est la bonne chose à faire, parce que vous appartenez au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Maris, aimez vos femmes et soyez gentils avec elles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Enfants, obéissez à vos parents sur tout. Voilà comment vous pouvez rendre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' heureux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pères, ne faites pas fâcher vos enfants contre vous. Ils pourraient penser qu’ils ne peuvent jamais faire quoi que ce soit pour vous rendre heureux avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Esclaves, obéissez toujours à vos maîtres dans tout. Ne travaillez pas bien seulement quand ils peuvent vous voir. Alors ils seront heureux de vous. Mais, faites toujours bien votre travail, parce que vous aimez vraiment le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Donc, vous voulez le rendre heureux. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quelles que soient les choses que vous faites, faites‑les pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Faites‑les aussi bien autant que vous le pouvez pour lui. Ne travaillez pas seulement pour des personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous donnera toutes les bonnes choses qu’il vous avait promises. Vous le savez. Vous êtes les serviteurs de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' punira toute personne qui fait de mauvaises choses. Voilà ce qui devrait arriver à des gens comme ça. Dieu utilise les mêmes règles pour décider de ce qui doit arriver à chaque personne. Il ne fait donc pas d’injustice.'
