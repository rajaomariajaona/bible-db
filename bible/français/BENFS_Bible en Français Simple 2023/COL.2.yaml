document_id: COL.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je veux que vous sachiez combien j’ai travaillé pour vous et pour les gens de Laodicée. Je travaille aussi pour tous ceux qui ne m’ont jamais rencontré. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et parce que vous êtes unis à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', Dieu vous a remplis. Il vous a donné tout ce dont vous avez besoin en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' règne sur tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' qui ont le pouvoir.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi, parce que vous êtes unis à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', Dieu vous a circoncis. Aucune personne humaine n’a utilisé ses mains pour vous '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: '. Mais Dieu vous a circoncis par '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Il vous a libérés de la puissance de votre vieille nature (le genre de personnes que vous étiez avant de devenir chrétiens). Il a enlevé votre vieille nature, qui ne pourrait jamais rendre Dieu heureux.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême
    - type: text
      text: ', Dieu vous a enterrés avec '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Et puis il vous a ressuscités avec '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Ainsi, vous êtes devenus vivants de nouveau avec lui. Dieu vous a élevés, parce que vous croyez en lui. Vous croyez qu’il est très puissant. Et vous croyez qu’il a ressuscité '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Il l’a fait revivre après sa mort.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À un moment donné, vous étiez comme des personnes mortes. C’était à cause de toutes les mauvaises choses que vous avez faites. Personne ne vous avait circoncis dans vos corps. Et Dieu ne vous avait pas circoncis dans vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Mais maintenant, Dieu vous a fait devenir vivants avec '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Dieu nous a pardonné pour toutes les mauvaises choses que nous avons faites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a choisi d’oublier que nous n’avons pas écouté toutes ses règles. Il a enlevé la liste de toutes les mauvaises choses que nous avons faites. Il allait nous punir à cause de cette liste. Mais, c’est comme s’il a mis cette liste à la croix de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Donc, il a détruit cette liste. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur la croix, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a remporté la lutte contre tous les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' qui ont le pouvoir. Il les a battus complètement. Il a arraché toutes leurs armes. Il a montré à tous qu’il est le maître sur tous ces autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' puissants.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chrétiens ne doivent pas obéir aux idées des hommes
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, ne laissez personne vous dire ce qui est bon à manger ou à boire. Ne laissez personne faire des règles sur les jours spéciaux, de nouvelles lunes ou des Sabbats (septième jour de la semaine juive).
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De telles règles ne sont que comme des ombres. Dans le passé, elles ont montré aux gens les bonnes choses qui se passeraient. Mais ces bonnes choses sont maintenant réelles à cause de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines personnes peuvent dire que Dieu leur a montré des choses spéciales. Elles peuvent vous dire que vous devez faire certaines choses à votre corps. Cela, pour devenir de meilleures personnes. Elles peuvent vous dire que vous devez '
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: ' les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '. Mais il ne faut pas croire à ces fausses choses. Si vous les écoutez, vous risquez de perdre quelque chose de vraiment important. Des gens comme ça peuvent penser qu’ils savent beaucoup de choses. Mais ils ne pensent qu’aux idées des hommes. Ils ne comprennent pas comment Dieu pense. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les faux enseignants comme ça ne sont pas d’accord d’être unis à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Ils ne respectent pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', qui est le chef de son corps. Son peuple est comme un corps. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' détient tout le corps ensemble. À travers les parties qui joignent le corps ensemble, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' alimente le corps. Il fournit ce dont le corps a besoin. Et donc, le corps se développe, parce que Dieu le fait croître.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je travaille comme ça. La raison est que je veux que vous deveniez forts dans vos cœurs pour le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Je veux que vous soyez unis parce que vous aimez le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Vous vous aimez les uns les autres. Alors vous allez vraiment être riches, parce que vous allez vraiment comprendre le secret de Dieu. Vous serez complètement sûrs de cela. Vous savez le secret, qui est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes morts avec '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Donc, vous ne devez pas obéir aux règles qui appartiennent à ce monde. Vous ne faites pas partie de ce monde maintenant. Vous ne devez pas obéir à des règles comme ceci : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne touchez pas cette chose ! Ne goûtez pas cette nourriture ! Ne prenez pas cette chose ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les règles de ce genre ne sont que sur des choses qui vont finir.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces choses sont comme des choses que les gens utilisent. Mais ils détruisent ces choses alors qu’ils les utilisent. Les règles de ce genre sont des règles que les gens enseignent. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les règles de ce genre semblent venir des gens sages. Ils enseignent comment adorer Dieu. Exemples : être discipliné en adorant Dieu. Se faire comme esclave des autres. Se blesser au corps. Donc, ces gens semblent obéir à Dieu. Mais vraiment, ils ne lui obéissent pas. Ces règles ne peuvent pas vraiment aider les gens à bien gérer les besoins de leurs corps. Ces règles n’ont pas vraiment d’importance. Par ces règles, les gens peuvent encore faire toutes les mauvaises choses qu’ils veulent faire.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' sait et comprend tout. Seul le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' peut nous amener à comprendre les choses correctement. Il peut nous amener à comprendre les choses vraiment précieuses que nous avons besoin de savoir.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis ces choses, afin que vous n’écoutiez pas les faux enseignants. Les enseignants vont essayer de vous enseigner de fausses choses. Ces choses peuvent sembler bonnes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mon corps n’est pas là avec vous, mais mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' est avec vous. Et je suis heureux de vous. Vous faites les choses que les gens de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' doivent faire. Aussi, je suis heureux que vous continuiez de croire en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' très fortement.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ce que le peuple du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' devrait faire'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez accepté Jésus comme votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Et vous êtes devenus unis à lui. Donc, vous devez continuer de faire les choses que le peuple de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' doit faire.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous devez être comme des arbres qui ont leurs racines profondes en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Continuez d’obéir à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', afin que vous deveniez de plus en plus forts comme des chrétiens. Vous devez croire de plus en plus fortement aux choses que nous vous avons apprises. Et vous devez toujours remercier Dieu beaucoup pour tout.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines personnes peuvent essayer de vous enseigner des idées fausses. Faites attention, ne les croyez pas. Ces idées peuvent sembler intelligentes, mais elles vont vous emmener loin de Dieu. Ces idées sont le résultat des choses. Ce sont des choses que les gens avaient apprises pendant de nombreuses années. Mais ces idées appartiennent à ce monde. Elles ne viennent pas de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu tout entier vit lui‑même en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', dans son corps humain. '
