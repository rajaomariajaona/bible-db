document_id: MRK.1,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 1
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le commencement de la Bonne Nouvelle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceci est le commencement de la Bonne Nouvelle au sujet de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Il est le Fils de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant que Jésus sortait des eaux, il a vu les cieux s’ouvrir. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' est descendu comme un oiseau (colombe). Il s’est posé sur Jésus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a eu une voix venant du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Elle a dit ceci : Tu es mon fils et je t’aime beaucoup. Je suis vraiment content de toi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Satan essaie de pousser Jésus à faire du mal contre Dieu
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immédiatement, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' a conduit Jésus au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus était dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' pendant 40 jours. Pendant ce temps, Satan a essayé de pousser Jésus à faire du mal contre Dieu. Il y avait des animaux sauvages près de Jésus dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. Et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu prenaient soin de Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus va en Galilée et demande à certains hommes d’être ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jean était dans une prison, Jésus est allé en Galilée. Jésus disait aux gens la Bonne Nouvelle au sujet de Dieu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus disait ceci : C’est maintenant le moment où Dieu va commencer à diriger son peuple. Vous avez fait beaucoup de mauvaises choses. Vous devez changer vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Croyez à la Bonne Nouvelle. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jésus marchait au bord de la mer de Galilée. Il a vu 2 frères. Leurs noms étaient Simon et André. Ils jetaient leurs filets dans la mer pour attraper des poissons. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a dit : Suivez‑moi. Je vais vous apprendre à pêcher des gens (les amener au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: salut
    - type: text
      text: '). '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon et André ont immédiatement laissé leurs filets et ils sont allés avec Jésus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a continué à marcher le long du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: rivage
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, il a vu 2 autres hommes qui étaient frères. Leurs noms étaient Jacques et Jean. Ils étaient les fils de Zébédée. Ils étaient dans leur petit bateau et ils réparaient leurs filets. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Ésaïe a écrit ce message de Dieu dans son livre : Je vais envoyer quelqu’un devant toi. Il parlera de mon message. Il préparera un chemin pour toi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immédiatement, Jésus leur a demandé d’être avec lui. Ils ont quitté leur père et ses travailleurs dans le petit bateau. Et ils sont allés avec Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus chasse un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' d’un homme'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont entrés à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. Jésus est entré dans le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. C’était le jour de repos des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Jésus a commencé à enseigner les gens là‑bas. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus enseignait les gens très bien. Il enseignait les gens avec autorité et les étonnait. Jésus ne ressemblait pas aux enseignants de la loi de Dieu. Ils ne parlaient pas avec autorité comme Jésus. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un homme avait un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' dans le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Ce mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' criait haut et fort dans l’homme. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il disait ceci : Jésus de Nazareth : Nous n’avons rien en commun ! Ne nous tue pas ! Je sais qui tu es. Tu es saint et tu viens de Dieu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a parlé fortement au mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' qui était dans cet homme. Il a dit ceci : Sois calme. Sors de cet homme ! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' a fait tomber l’homme. Il criait très fort, puis ce mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' est sorti de l’homme. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les gens étaient très surpris, et ils disaient entre eux : Ceci est quelque chose de nouveau. Jésus nous enseigne quelque chose de nouveau et il parle avec autorité. Il peut dire aux mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' ce qu’ils doivent faire. Et ils lui obéissent.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immédiatement, les gens commençaient à dire les nouvelles à propos de Jésus. Partout en Galilée, ils parlaient de Jésus à d’autres personnes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit beaucoup de malades
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a quitté le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il est allé avec Jacques et Jean à la maison de Simon et André. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une voix crie dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '  :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' viendra bientôt. Donc, préparez le chemin sur lequel il va passer. Arrangez bien ses sentiers.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La mère de la femme de Simon était au lit, malade. Son corps était très chaud. Immédiatement, Simon et André ont parlé d’elle à Jésus. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, Jésus est allé auprès d’elle. Il a tenu sa main. Puis il l’a fait lever et elle était immédiatement guérie. Ensuite, elle a servi de la nourriture à Jésus et à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce soir‑là, quand le soleil s’est couché, tous les gens dans la ville venaient. Ils amenaient à Jésus tous les malades. Et ils amenaient les gens avec de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' en eux. Tous ces gens étaient devant la porte de la maison (pour attendre Jésus). '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus guérissait beaucoup de malades. Ils avaient de nombreuses maladies différentes. Jésus chassait aussi beaucoup de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des gens. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' savaient qui Jésus était. Ainsi, Jésus ne les laissait pas parler.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus prie seul dans un endroit '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus s’est levé très tôt le lendemain matin, alors qu’il faisait encore nuit. Il est allé à un endroit où il pouvait être seul. Et là, il priait. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon et les autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' cherchaient Jésus. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils l’ont trouvé, ils ont dit : Tous les gens te cherchent. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Allons à un autre endroit. Nous devons aller à d’autres villages près d’ici. Je dois enseigner les gens là‑bas aussi. Je suis venu pour cette raison. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus voyageait partout en Galilée. Il enseignait les gens dans le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il faisait sortir les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des gens.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Un homme malade de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lèpre
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donc, Jean est venu à un endroit dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. Il avait le message de Dieu. Il enseignait à tous les gens ceci : Vous faites beaucoup de mauvaises choses, vous devez changer vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Ensuite, Dieu vous pardonnera et je vais vous baptiser. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, un homme malade de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lèpre
    - type: text
      text: ' est venu auprès de Jésus. Il s’est mis à genoux devant Jésus. L’homme a dit : Si tu veux, tu peux rendre ma peau bien. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus était très triste pour l’homme. Il a tendu sa main vers l’homme et il a touché l’homme. Jésus a dit : Je veux t’aider. Sois bien ! '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immédiatement, la maladie a laissé l’homme et sa peau est devenue bien. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus l’a renvoyé directement. Il lui a donné un ordre strict.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a dit : Ecoute. Ne dis à personne à ce sujet. Mais va te montrer au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: '. Apporte‑lui une offrande pour Dieu. Moïse a enseigné aux gens de donner cette offrande à Dieu après ce genre de maladie. Cela leur montrera que tu es réellement guéri. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais au lieu de faire cela, l’homme est parti et il parlait de cela à tout le monde. Il leur disait ce qui lui est arrivé. Parce que cet homme a fait cela, il est devenu difficile à Jésus d’entrer dans les villes. Tout le monde connaissait Jésus. Ainsi il restait loin des gens dans des endroits déserts. Et les gens venaient de toutes les directions pour voir Jésus.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de gens vivaient dans la ville de Jérusalem et en Judée. Ils allaient tous écouter Jean. Les gens disaient à Dieu toutes les mauvaises choses qu’ils faisaient. Puis Jean baptisait les gens dans les eaux du fleuve '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le vêtement de Jean était fait des poils de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: chameau
    - type: text
      text: '. Jean portait également une ceinture en cuir à sa hanche. Il mangeait des sauterelles et du miel sauvage (du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean disait aux gens ceci : Un homme viendra après moi. Il a plus de puissance que moi. Je ne pourrai même pas me baisser et délier ses souliers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai baptisés avec de l’eau. Mais l’homme qui vient après moi, vous baptisera du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jean baptise Jésus
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immédiatement, Jésus est venu de Nazareth, un lieu de Galilée. Jean l’a baptisé dans les eaux du fleuve '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: '. '
