document_id: MRK.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Le commencement de la Bonne Nouvelle
  - type: text
    content: Ceci est le commencement de la Bonne Nouvelle au sujet de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Il est le Fils de Dieu. '
  '10':
  - type: text
    content: 'Pendant que Jésus sortait des eaux, il a vu les cieux s’ouvrir. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' est descendu comme un oiseau (colombe). Il s’est posé sur Jésus. '
  '11':
  - type: text
    content: 'Il y a eu une voix venant du '
  - type: text
    content: ciel
  - type: text
    content: '. Elle a dit ceci : Tu es mon fils et je t’aime beaucoup. Je suis vraiment content de toi.'
  - type: heading
    content: Satan essaie de pousser Jésus à faire du mal contre Dieu
  '12':
  - type: text
    content: 'Immédiatement, le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' a conduit Jésus au '
  - type: text
    content: désert
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Jésus était dans le '
  - type: text
    content: désert
  - type: text
    content: ' pendant 40 jours. Pendant ce temps, Satan a essayé de pousser Jésus à faire du mal contre Dieu. Il y avait des animaux sauvages près de Jésus dans le '
  - type: text
    content: désert
  - type: text
    content: '. Et les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu prenaient soin de Jésus.'
  - type: heading
    content: Jésus va en Galilée et demande à certains hommes d’être ses disciples
  '14':
  - type: text
    content: 'Lorsque Jean était dans une prison, Jésus est allé en Galilée. Jésus disait aux gens la Bonne Nouvelle au sujet de Dieu. '
  '15':
  - type: text
    content: 'Jésus disait ceci : C’est maintenant le moment où Dieu va commencer à diriger son peuple. Vous avez fait beaucoup de mauvaises choses. Vous devez changer vos '
  - type: text
    content: esprits
  - type: text
    content: '. Croyez à la Bonne Nouvelle. '
  '16':
  - type: text
    content: 'Un jour, Jésus marchait au bord de la mer de Galilée. Il a vu 2 frères. Leurs noms étaient Simon et André. Ils jetaient leurs filets dans la mer pour attraper des poissons. '
  '17':
  - type: text
    content: 'Jésus leur a dit : Suivez‑moi. Je vais vous apprendre à pêcher des gens (les amener au '
  - type: text
    content: salut
  - type: text
    content: '). '
  '18':
  - type: text
    content: 'Simon et André ont immédiatement laissé leurs filets et ils sont allés avec Jésus. '
  '19':
  - type: text
    content: 'Alors Jésus a continué à marcher le long du '
  - type: text
    content: rivage
  - type: text
    content: .
  - type: text
    content: 'Alors, il a vu 2 autres hommes qui étaient frères. Leurs noms étaient Jacques et Jean. Ils étaient les fils de Zébédée. Ils étaient dans leur petit bateau et ils réparaient leurs filets. '
  '2':
  - type: text
    content: 'Le '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe a écrit ce message de Dieu dans son livre : Je vais envoyer quelqu’un devant toi. Il parlera de mon message. Il préparera un chemin pour toi. '
  '20':
  - type: text
    content: Immédiatement, Jésus leur a demandé d’être avec lui. Ils ont quitté leur père et ses travailleurs dans le petit bateau. Et ils sont allés avec Jésus.
  - type: heading
    content: Jésus chasse un mauvais esprit d’un homme
  '21':
  - type: text
    content: 'Alors Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont entrés à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Jésus est entré dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. C’était le jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: '. Jésus a commencé à enseigner les gens là‑bas. '
  '22':
  - type: text
    content: 'Jésus enseignait les gens très bien. Il enseignait les gens avec autorité et les étonnait. Jésus ne ressemblait pas aux enseignants de la loi de Dieu. Ils ne parlaient pas avec autorité comme Jésus. '
  '23':
  - type: text
    content: 'Un homme avait un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Ce mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' criait haut et fort dans l’homme. '
  '24':
  - type: text
    content: 'Il disait ceci : Jésus de Nazareth : Nous n’avons rien en commun ! Ne nous tue pas ! Je sais qui tu es. Tu es saint et tu viens de Dieu. '
  '25':
  - type: text
    content: 'Jésus a parlé fortement au mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' qui était dans cet homme. Il a dit ceci : Sois calme. Sors de cet homme ! '
  '26':
  - type: text
    content: 'Ce mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' a fait tomber l’homme. Il criait très fort, puis ce mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' est sorti de l’homme. '
  '27':
  - type: text
    content: 'Tous les gens étaient très surpris, et ils disaient entre eux : Ceci est quelque chose de nouveau. Jésus nous enseigne quelque chose de nouveau et il parle avec autorité. Il peut dire aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' ce qu’ils doivent faire. Et ils lui obéissent.'
  '28':
  - type: text
    content: Immédiatement, les gens commençaient à dire les nouvelles à propos de Jésus. Partout en Galilée, ils parlaient de Jésus à d’autres personnes.
  - type: heading
    content: Jésus guérit beaucoup de malades
  '29':
  - type: text
    content: 'Alors Jésus a quitté le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il est allé avec Jacques et Jean à la maison de Simon et André. '
  '3':
  - type: text
    content: 'Une voix crie dans le '
  - type: text
    content: désert
  - type: text
    content: '  :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' viendra bientôt. Donc, préparez le chemin sur lequel il va passer. Arrangez bien ses sentiers.'
  '30':
  - type: text
    content: 'La mère de la femme de Simon était au lit, malade. Son corps était très chaud. Immédiatement, Simon et André ont parlé d’elle à Jésus. '
  '31':
  - type: text
    content: 'Alors, Jésus est allé auprès d’elle. Il a tenu sa main. Puis il l’a fait lever et elle était immédiatement guérie. Ensuite, elle a servi de la nourriture à Jésus et à ses '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Ce soir‑là, quand le soleil s’est couché, tous les gens dans la ville venaient. Ils amenaient à Jésus tous les malades. Et ils amenaient les gens avec de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' en eux. Tous ces gens étaient devant la porte de la maison (pour attendre Jésus). '
  '34':
  - type: text
    content: 'Jésus guérissait beaucoup de malades. Ils avaient de nombreuses maladies différentes. Jésus chassait aussi beaucoup de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens. Les '
  - type: text
    content: esprits
  - type: text
    content: ' savaient qui Jésus était. Ainsi, Jésus ne les laissait pas parler.'
  - type: heading
    content: Jésus prie seul dans un endroit désert
  '35':
  - type: text
    content: 'Jésus s’est levé très tôt le lendemain matin, alors qu’il faisait encore nuit. Il est allé à un endroit où il pouvait être seul. Et là, il priait. '
  '36':
  - type: text
    content: 'Simon et les autres '
  - type: text
    content: disciples
  - type: text
    content: ' cherchaient Jésus. '
  '37':
  - type: text
    content: 'Quand ils l’ont trouvé, ils ont dit : Tous les gens te cherchent. '
  '38':
  - type: text
    content: 'Jésus a répondu : Allons à un autre endroit. Nous devons aller à d’autres villages près d’ici. Je dois enseigner les gens là‑bas aussi. Je suis venu pour cette raison. '
  '39':
  - type: text
    content: 'Alors Jésus voyageait partout en Galilée. Il enseignait les gens dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il faisait sortir les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens.'
  - type: heading
    content: Un homme malade de la lèpre
  '4':
  - type: text
    content: 'Donc, Jean est venu à un endroit dans le '
  - type: text
    content: désert
  - type: text
    content: '. Il avait le message de Dieu. Il enseignait à tous les gens ceci : Vous faites beaucoup de mauvaises choses, vous devez changer vos '
  - type: text
    content: esprits
  - type: text
    content: '. Ensuite, Dieu vous pardonnera et je vais vous baptiser. '
  '40':
  - type: text
    content: 'Un jour, un homme malade de la '
  - type: text
    content: lèpre
  - type: text
    content: ' est venu auprès de Jésus. Il s’est mis à genoux devant Jésus. L’homme a dit : Si tu veux, tu peux rendre ma peau bien. '
  '41':
  - type: text
    content: 'Jésus était très triste pour l’homme. Il a tendu sa main vers l’homme et il a touché l’homme. Jésus a dit : Je veux t’aider. Sois bien ! '
  '42':
  - type: text
    content: 'Immédiatement, la maladie a laissé l’homme et sa peau est devenue bien. '
  '43':
  - type: text
    content: Jésus l’a renvoyé directement. Il lui a donné un ordre strict.
  '44':
  - type: text
    content: 'Jésus lui a dit : Ecoute. Ne dis à personne à ce sujet. Mais va te montrer au '
  - type: text
    content: prêtre
  - type: text
    content: '. Apporte‑lui une offrande pour Dieu. Moïse a enseigné aux gens de donner cette offrande à Dieu après ce genre de maladie. Cela leur montrera que tu es réellement guéri. '
  '45':
  - type: text
    content: Mais au lieu de faire cela, l’homme est parti et il parlait de cela à tout le monde. Il leur disait ce qui lui est arrivé. Parce que cet homme a fait cela, il est devenu difficile à Jésus d’entrer dans les villes. Tout le monde connaissait Jésus. Ainsi il restait loin des gens dans des endroits déserts. Et les gens venaient de toutes les directions pour voir Jésus.
  '5':
  - type: text
    content: 'Beaucoup de gens vivaient dans la ville de Jérusalem et en Judée. Ils allaient tous écouter Jean. Les gens disaient à Dieu toutes les mauvaises choses qu’ils faisaient. Puis Jean baptisait les gens dans les eaux du fleuve '
  - type: text
    content: Jourdain
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Le vêtement de Jean était fait des poils de '
  - type: text
    content: chameau
  - type: text
    content: '. Jean portait également une ceinture en cuir à sa hanche. Il mangeait des sauterelles et du miel sauvage (du '
  - type: text
    content: désert
  - type: text
    content: '). '
  '7':
  - type: text
    content: 'Jean disait aux gens ceci : Un homme viendra après moi. Il a plus de puissance que moi. Je ne pourrai même pas me baisser et délier ses souliers. '
  '8':
  - type: text
    content: 'Je vous ai baptisés avec de l’eau. Mais l’homme qui vient après moi, vous baptisera du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: .
  - type: heading
    content: Jean baptise Jésus
  '9':
  - type: text
    content: 'Immédiatement, Jésus est venu de Nazareth, un lieu de Galilée. Jean l’a baptisé dans les eaux du fleuve '
  - type: text
    content: Jourdain
  - type: text
    content: '. '
