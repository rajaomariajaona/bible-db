document_id: HEB.13,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment vivre pour Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Continuez de vous aimer comme des frères et des sœurs. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' que nous avons en tant que croyants. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' qui obéissent aux règles juives des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' peuvent manger eux‑mêmes une partie de ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: '. Mais ils n’ont aucun pouvoir pour recevoir quoi que ce soit du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' de Jésus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dans l’ancien accord, le chef des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' apportait le sang des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' d’animaux dans la Salle Très Sainte. Il le faisait pour que Dieu pardonne les péchés du peuple. Mais il enlevait les corps de ces animaux. Il les brûlait à l’extérieur de la ville. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'De la même manière, Jésus est également mort en dehors de la ville. Il l’a fait en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour nous. Son sang a purifié son peuple de ses péchés. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jésus est mort comme cela dans un endroit où les gens l’ont insulté. Nous devons donc aller à cet endroit aussi. Nous devons être prêts à ce que les gens nous insultent, comme ils l’ont insulté. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ici sur terre, nous qui sommes croyants, nous n’avons pas de ville qui sera toujours chez nous. Mais nous attendons la ville qui viendra de Dieu.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nous devons donc toujours louer Dieu, à cause de ce que Jésus a fait pour nous. Disons clairement que nous avons confiance en Jésus. C’est comme notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' que nous offrons tout le temps à Dieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'N’oubliez pas d’être bons envers les autres. Partagez avec eux ce que vous avez. Dieu est content de tels '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Respectez vos chefs et obéissez‑leur. Ils veillent sur vos vies au nom de Dieu. Dieu vérifiera s’ils ont bien fait leur travail. Alors respectez‑les, et alors ils seront heureux en servant Dieu. Ne dites pas de mauvaises choses contre eux, car cela ne vous aidera jamais.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Priez Dieu pour nous. Nous sommes convaincus que nous n’avons rien fait de mal. Nous voulons toujours faire ce qui est juste. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'La chose la plus importante est la suivante : Priez pour que je vous revienne bientôt.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'N’oubliez jamais d’être gentils avec les étrangers. Laissez‑les rester chez vous. Ainsi, certaines personnes ont même reçu des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' comme visiteurs. Elles les ont reçus sans le savoir.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Je prie que Dieu vous aide. C’est lui qui nous donne la paix dans nos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Il a fait revivre notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' après la mort. Dieu nous pardonne à cause du sang de la mort de Jésus sur la croix. C’est le nouvel accord de Dieu avec son peuple qui sera vrai pour toujours. Jésus est notre grand berger. Il prend soin de nous comme ses brebis. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Je prie que Dieu vous donne toutes les bonnes choses dont vous avez besoin pour le servir. Ensuite, vous pouvez faire tout ce qu’il veut. Je prie pour que Dieu nous aide à le servir d’une manière qui le rendra heureux. Il le fera parce que nous appartenons à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Jésus est très grand, et nous devons le louer toujours et à jamais ! Amen. C’est vrai. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mes amis chrétiens, veuillez écouter patiemment mon message. Ce n’est qu’une courte lettre et je veux vous aider à être forts. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Je veux vous parler de Timothée, qui est comme un frère pour nous. Ils l’ont laissé sortir de prison pour qu’il soit libre maintenant. S’il arrive bientôt ici, il viendra avec moi quand je voyagerai pour vous voir.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dites bonjour en mon nom à vos dirigeants et à tout le peuple de Dieu. Les chrétiens venus d’Italie vous disent bonjour aussi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Je prie pour que Dieu soit très bon envers vous tous.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: N’oubliez pas d’aider les croyants qui sont en prison. Pensez à ce que ce serait, si vous étiez là avec eux. Souvenez‑vous de ces croyants que les gens font souffrir. Considérez‑les comme si vous ressentiez la même douleur dans vos propres corps.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Lorsqu’un homme et une femme se sont mariés, ils doivent chacun respecter le mariage. Les maris et les femmes ne doivent avoir des relations sexuelles qu’entre eux. Dieu punira toute personne qui a des relations sexuelles avec le mari ou la femme d’une autre personne. Il punira toute personne qui a des relations sexuelles d’une mauvaise manière.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dans la façon dont vous vivez, ne désirez pas beaucoup d’argent. Soyez heureux avec les choses que vous avez. Soyez heureux, car Dieu a dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne te laisserai jamais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai toujours là avec toi.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Pour cette raison, nous pouvons courageusement dire ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est celui qui m’aide,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donc je n’aurai pas peur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’aurai peur de rien que les gens puissent me faire.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rappelez‑vous vos dirigeants, qui enseignaient le message de Dieu pour vous. Pensez à la façon dont ils ont vécu et aux bonnes choses qu’ils ont faites. Ils ont fait confiance en Dieu, vous devez donc avoir la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' comme eux.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est toujours le même, hier, aujourd’hui et pour toujours. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Certaines personnes enseignent toutes sortes de nouvelles choses étranges. Ne les laissez pas vous éloigner du vrai message de Dieu. Il est bon que Dieu soit très gentil avec nous. C’est ce qui nous rend forts en nous‑mêmes. Les règles concernant les aliments que nous devons manger ne nous rendent pas forts comme ça. Ces règles n’ont jamais aidé les personnes qui tentaient d’obéir à cela.
