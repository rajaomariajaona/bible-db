document_id: HEB.13,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 13
  - type: heading
    content: Comment vivre pour Dieu
  - type: text
    content: 'Continuez de vous aimer comme des frères et des sœurs. '
  '10':
  - type: text
    content: 'Jésus est le '
  - type: text
    content: sacrifice
  - type: text
    content: ' que nous avons en tant que croyants. Les '
  - type: text
    content: prêtres
  - type: text
    content: ' qui obéissent aux règles juives des '
  - type: text
    content: sacrifices
  - type: text
    content: ' peuvent manger eux‑mêmes une partie de ces '
  - type: text
    content: sacrifices
  - type: text
    content: '. Mais ils n’ont aucun pouvoir pour recevoir quoi que ce soit du '
  - type: text
    content: sacrifice
  - type: text
    content: ' de Jésus. '
  '11':
  - type: text
    content: 'Dans l’ancien accord, le chef des '
  - type: text
    content: prêtres
  - type: text
    content: ' apportait le sang des '
  - type: text
    content: sacrifices
  - type: text
    content: ' d’animaux dans la Salle Très Sainte. Il le faisait pour que Dieu pardonne les péchés du peuple. Mais il enlevait les corps de ces animaux. Il les brûlait à l’extérieur de la ville. '
  '12':
  - type: text
    content: 'De la même manière, Jésus est également mort en dehors de la ville. Il l’a fait en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nous. Son sang a purifié son peuple de ses péchés. '
  '13':
  - type: text
    content: 'Jésus est mort comme cela dans un endroit où les gens l’ont insulté. Nous devons donc aller à cet endroit aussi. Nous devons être prêts à ce que les gens nous insultent, comme ils l’ont insulté. '
  '14':
  - type: text
    content: Ici sur terre, nous qui sommes croyants, nous n’avons pas de ville qui sera toujours chez nous. Mais nous attendons la ville qui viendra de Dieu.
  '15':
  - type: text
    content: 'Nous devons donc toujours louer Dieu, à cause de ce que Jésus a fait pour nous. Disons clairement que nous avons confiance en Jésus. C’est comme notre '
  - type: text
    content: sacrifice
  - type: text
    content: ' que nous offrons tout le temps à Dieu. '
  '16':
  - type: text
    content: 'N’oubliez pas d’être bons envers les autres. Partagez avec eux ce que vous avez. Dieu est content de tels '
  - type: text
    content: sacrifices
  - type: text
    content: .
  '17':
  - type: text
    content: Respectez vos chefs et obéissez‑leur. Ils veillent sur vos vies au nom de Dieu. Dieu vérifiera s’ils ont bien fait leur travail. Alors respectez‑les, et alors ils seront heureux en servant Dieu. Ne dites pas de mauvaises choses contre eux, car cela ne vous aidera jamais.
  '18':
  - type: text
    content: 'Priez Dieu pour nous. Nous sommes convaincus que nous n’avons rien fait de mal. Nous voulons toujours faire ce qui est juste. '
  '19':
  - type: text
    content: 'La chose la plus importante est la suivante : Priez pour que je vous revienne bientôt.'
  '2':
  - type: text
    content: 'N’oubliez jamais d’être gentils avec les étrangers. Laissez‑les rester chez vous. Ainsi, certaines personnes ont même reçu des '
  - type: text
    content: anges
  - type: text
    content: ' comme visiteurs. Elles les ont reçus sans le savoir.'
  '20':
  - type: text
    content: 'Je prie que Dieu vous aide. C’est lui qui nous donne la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: '. Il a fait revivre notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' après la mort. Dieu nous pardonne à cause du sang de la mort de Jésus sur la croix. C’est le nouvel accord de Dieu avec son peuple qui sera vrai pour toujours. Jésus est notre grand berger. Il prend soin de nous comme ses brebis. '
  '21':
  - type: text
    content: Je prie que Dieu vous donne toutes les bonnes choses dont vous avez besoin pour le servir. Ensuite, vous pouvez faire tout ce qu’il veut. Je prie pour que Dieu nous aide à le servir d’une manière qui le rendra heureux. Il le fera parce que nous appartenons à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Jésus est très grand, et nous devons le louer toujours et à jamais ! Amen. C’est vrai. '
  '22':
  - type: text
    content: 'Mes amis chrétiens, veuillez écouter patiemment mon message. Ce n’est qu’une courte lettre et je veux vous aider à être forts. '
  '23':
  - type: text
    content: Je veux vous parler de Timothée, qui est comme un frère pour nous. Ils l’ont laissé sortir de prison pour qu’il soit libre maintenant. S’il arrive bientôt ici, il viendra avec moi quand je voyagerai pour vous voir.
  '24':
  - type: text
    content: 'Dites bonjour en mon nom à vos dirigeants et à tout le peuple de Dieu. Les chrétiens venus d’Italie vous disent bonjour aussi. '
  '25':
  - type: text
    content: Je prie pour que Dieu soit très bon envers vous tous.
  '3':
  - type: text
    content: N’oubliez pas d’aider les croyants qui sont en prison. Pensez à ce que ce serait, si vous étiez là avec eux. Souvenez‑vous de ces croyants que les gens font souffrir. Considérez‑les comme si vous ressentiez la même douleur dans vos propres corps.
  '4':
  - type: text
    content: Lorsqu’un homme et une femme se sont mariés, ils doivent chacun respecter le mariage. Les maris et les femmes ne doivent avoir des relations sexuelles qu’entre eux. Dieu punira toute personne qui a des relations sexuelles avec le mari ou la femme d’une autre personne. Il punira toute personne qui a des relations sexuelles d’une mauvaise manière.
  '5':
  - type: text
    content: 'Dans la façon dont vous vivez, ne désirez pas beaucoup d’argent. Soyez heureux avec les choses que vous avez. Soyez heureux, car Dieu a dit ceci :'
  - type: text
    content: Je ne te laisserai jamais,
  - type: text
    content: Je serai toujours là avec toi.
  '6':
  - type: text
    content: 'Pour cette raison, nous pouvons courageusement dire ceci :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est celui qui m’aide,'
  - type: text
    content: Donc je n’aurai pas peur.
  - type: text
    content: Je n’aurai peur de rien que les gens puissent me faire.
  '7':
  - type: text
    content: 'Rappelez‑vous vos dirigeants, qui enseignaient le message de Dieu pour vous. Pensez à la façon dont ils ont vécu et aux bonnes choses qu’ils ont faites. Ils ont fait confiance en Dieu, vous devez donc avoir la '
  - type: text
    content: foi
  - type: text
    content: ' comme eux.'
  '8':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est toujours le même, hier, aujourd’hui et pour toujours. '
  '9':
  - type: text
    content: Certaines personnes enseignent toutes sortes de nouvelles choses étranges. Ne les laissez pas vous éloigner du vrai message de Dieu. Il est bon que Dieu soit très gentil avec nous. C’est ce qui nous rend forts en nous‑mêmes. Les règles concernant les aliments que nous devons manger ne nous rendent pas forts comme ça. Ces règles n’ont jamais aidé les personnes qui tentaient d’obéir à cela.
