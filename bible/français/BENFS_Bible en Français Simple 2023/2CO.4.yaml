document_id: 2CO.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: La Bonne Nouvelle de Dieu éclaire
  - type: text
    content: 'Dieu nous a donné ce travail pour dire son message. Parce qu’il a été très gentil avec nous, nous n’avons pas peur de continuer. '
  '10':
  - type: text
    content: 'En servant Jésus, nous savons que nous pouvons mourir comme il est mort. Pour cette raison, nos vies montrent que nous vivons parce qu’il est vivant. '
  '11':
  - type: text
    content: Oui, lorsque nous vivons, la mort est toujours très proche, parce que nous servons Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. En conséquence, les gens peuvent voir dans nos corps humains faibles que Jésus est vivant. '
  '12':
  - type: text
    content: Ainsi, la mort est proche de nous, même si nous vivons. Mais en conséquence, nous vous apportons la vie de Dieu.
  '13':
  - type: text
    content: 'Ceci est écrit dans la Bible : J’ai cru en Dieu, et donc j’ai parlé. Nous avons également le même genre de '
  - type: text
    content: foi
  - type: text
    content: ' en Dieu. Donc, nous disons aussi le message de Dieu, parce que nous croyons en lui. '
  '14':
  - type: text
    content: 'Dieu a réveillé le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus pour redevenir vivant après sa mort. Parce que nous appartenons à Jésus, nous savons que Dieu nous réveillera également après notre mort. Avec vous, Dieu nous emmènera là où il est. '
  '15':
  - type: text
    content: Dans tout ce que nous faisons, nous voulons vous aider. En conséquence, de plus en plus de gens voient à quel point Dieu est bon. Et donc, les gens remercient de plus en plus Dieu. Et cela montre à quel point Dieu est grand.
  '16':
  - type: text
    content: 'C’est pourquoi nous n’avons pas peur de continuer notre travail. Oui, nos corps vieillissent et s’affaiblissent. Mais nos '
  - type: text
    content: esprits
  - type: text
    content: ' se renforcent chaque jour ! '
  '17':
  - type: text
    content: 'Nous avons ces petits problèmes qui durent peu de temps. Mais en conséquence, nous recevrons les grandes choses que Dieu a préparées pour nous. Ces grandes choses sont beaucoup plus importantes que nos petits problèmes. Et les grandes choses de Dieu continueront pour toujours ! '
  '18':
  - type: text
    content: Ainsi, nous ne regardons pas les choses que nous pouvons voir dans ce monde. Mais, nous regardons les choses que les gens ne peuvent pas voir. Les choses que nous pouvons voir sont là seulement pour peu de temps. Mais les choses que nous ne pouvons pas voir continueront pour toujours.
  '2':
  - type: text
    content: 'Nous refusons de faire quoi que ce soit secrètement, dont nous pourrions avoir honte. Nous ne disons pas de mensonges. Nous ne changeons pas le message de Dieu pour tromper les gens. Non. Nous disons clairement le vrai message de Dieu. Dieu lui‑même voit que nous enseignons les gens de manière honnête. Chacun doit comprendre que nous faisons seulement ce qui est bien. '
  '3':
  - type: text
    content: 'Certaines personnes ne peuvent pas comprendre la Bonne Nouvelle que nous disons. Ce sont des gens qui perdent leur vie avec Dieu. '
  '4':
  - type: text
    content: 'Ces gens n’acceptent pas la Bonne Nouvelle de Dieu. Le dieu de ce monde a confondu leurs '
  - type: text
    content: esprits
  - type: text
    content: . Ils ne peuvent pas voir la lumière que la Bonne Nouvelle apporte. Ce message enseigne la grande puissance de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', qui nous montre exactement ce que Dieu est.'
  '5':
  - type: text
    content: Nous ne parlons pas de nous‑mêmes. Nous disons aux gens que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est notre '
  - type: text
    content: Seigneur
  - type: text
    content: '. Parce que nous appartenons à Jésus, nous sommes devenus vos serviteurs, pas vos maîtres. '
  '6':
  - type: text
    content: 'Dieu est celui qui a dit : Que la lumière brille dans l’obscurité. Et c’est lui qui a fait briller sa lumière dans nos cœurs. Pour cette raison, nous savons à quel point Dieu est grand et puissant. Nous voyons que sa puissance brille beaucoup sur le visage de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '7':
  - type: text
    content: 'Dieu nous a offert le don de dire son message. Mais nous sommes nous‑mêmes très faibles. C’est comme si nous gardions son précieux don dans des vases en argile. Il est donc clair que la grande puissance du message de Dieu vient de Dieu lui‑même. Cela ne vient pas de nous. '
  '8':
  - type: text
    content: 'Nous avons des problèmes tout le temps, mais cela ne nous arrête pas. Nous ne savons pas toujours quoi faire, mais nous n’avons pas peur de continuer. '
  '9':
  - type: text
    content: 'Nous avons de nombreux ennemis, mais nous avons toujours des amis. Les gens nous font mal, mais ils ne nous détruisent jamais. '
