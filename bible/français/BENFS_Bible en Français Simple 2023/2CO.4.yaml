document_id: 2CO.4,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 4
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Bonne Nouvelle de Dieu éclaire
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu nous a donné ce travail pour dire son message. Parce qu’il a été très gentil avec nous, nous n’avons pas peur de continuer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En servant Jésus, nous savons que nous pouvons mourir comme il est mort. Pour cette raison, nos vies montrent que nous vivons parce qu’il est vivant. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, lorsque nous vivons, la mort est toujours très proche, parce que nous servons Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. En conséquence, les gens peuvent voir dans nos corps humains faibles que Jésus est vivant. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, la mort est proche de nous, même si nous vivons. Mais en conséquence, nous vous apportons la vie de Dieu.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceci est écrit dans la Bible : J’ai cru en Dieu, et donc j’ai parlé. Nous avons également le même genre de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu. Donc, nous disons aussi le message de Dieu, parce que nous croyons en lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a réveillé le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus pour redevenir vivant après sa mort. Parce que nous appartenons à Jésus, nous savons que Dieu nous réveillera également après notre mort. Avec vous, Dieu nous emmènera là où il est. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans tout ce que nous faisons, nous voulons vous aider. En conséquence, de plus en plus de gens voient à quel point Dieu est bon. Et donc, les gens remercient de plus en plus Dieu. Et cela montre à quel point Dieu est grand.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi nous n’avons pas peur de continuer notre travail. Oui, nos corps vieillissent et s’affaiblissent. Mais nos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' se renforcent chaque jour ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons ces petits problèmes qui durent peu de temps. Mais en conséquence, nous recevrons les grandes choses que Dieu a préparées pour nous. Ces grandes choses sont beaucoup plus importantes que nos petits problèmes. Et les grandes choses de Dieu continueront pour toujours ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, nous ne regardons pas les choses que nous pouvons voir dans ce monde. Mais, nous regardons les choses que les gens ne peuvent pas voir. Les choses que nous pouvons voir sont là seulement pour peu de temps. Mais les choses que nous ne pouvons pas voir continueront pour toujours.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous refusons de faire quoi que ce soit secrètement, dont nous pourrions avoir honte. Nous ne disons pas de mensonges. Nous ne changeons pas le message de Dieu pour tromper les gens. Non. Nous disons clairement le vrai message de Dieu. Dieu lui‑même voit que nous enseignons les gens de manière honnête. Chacun doit comprendre que nous faisons seulement ce qui est bien. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines personnes ne peuvent pas comprendre la Bonne Nouvelle que nous disons. Ce sont des gens qui perdent leur vie avec Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces gens n’acceptent pas la Bonne Nouvelle de Dieu. Le dieu de ce monde a confondu leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: . Ils ne peuvent pas voir la lumière que la Bonne Nouvelle apporte. Ce message enseigne la grande puissance de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', qui nous montre exactement ce que Dieu est.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous ne parlons pas de nous‑mêmes. Nous disons aux gens que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Parce que nous appartenons à Jésus, nous sommes devenus vos serviteurs, pas vos maîtres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu est celui qui a dit : Que la lumière brille dans l’obscurité. Et c’est lui qui a fait briller sa lumière dans nos cœurs. Pour cette raison, nous savons à quel point Dieu est grand et puissant. Nous voyons que sa puissance brille beaucoup sur le visage de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu nous a offert le don de dire son message. Mais nous sommes nous‑mêmes très faibles. C’est comme si nous gardions son précieux don dans des vases en argile. Il est donc clair que la grande puissance du message de Dieu vient de Dieu lui‑même. Cela ne vient pas de nous. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons des problèmes tout le temps, mais cela ne nous arrête pas. Nous ne savons pas toujours quoi faire, mais nous n’avons pas peur de continuer. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons de nombreux ennemis, mais nous avons toujours des amis. Les gens nous font mal, mais ils ne nous détruisent jamais. '
