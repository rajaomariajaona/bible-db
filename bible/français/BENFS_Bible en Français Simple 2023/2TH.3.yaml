document_id: 2TH.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Paul demande aux chrétiens de prier pour lui et pour ses amis
  - type: text
    content: 'Maintenant, mes amis, nous vous demandons de prier pour nous. Priez pour que de plus en plus de gens entendent bientôt le message du '
  - type: text
    content: Seigneur
  - type: text
    content: . Priez pour que les gens reçoivent bien le message et l’acceptent comme vrai. C’est ainsi que vous l’avez reçu.
  '10':
  - type: text
    content: 'Même lorsque nous étions là avec vous, nous vous avons dit cette règle : Si quelqu’un refuse de travailler, vous ne devez pas lui donner à manger.'
  '11':
  - type: text
    content: 'Nous disons cela parce que quelqu’un nous a fait part de vos nouvelles. Il nous a dit que certaines personnes parmi vous vivent de façon paresseuse. Ces gens ne travaillent pas à leur propre travail. Mais, ils causent des problèmes aux autres personnes qui travaillent. '
  '12':
  - type: text
    content: 'Nous avons quelque chose à dire aux gens qui sont paresseux comme ça. Nous les mettons en garde avec le pouvoir que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' nous donne. Ils doivent laisser de causer des problèmes. Ils doivent travailler correctement pour pouvoir manger leur propre nourriture.'
  '13':
  - type: text
    content: 'Mais vous ne devez jamais laisser de faire ce qui est bien, nos amis chrétiens, même lorsque cela vous cause des problèmes. '
  '14':
  - type: text
    content: 'Peut‑être que quelqu’un parmi vous n’obéira pas au message que nous avons écrit dans cette lettre. Assurez‑vous que tout le monde connaît quelqu’un comme ça. Alors, ne soyez pas amis avec lui. Ainsi, il aura honte. '
  '15':
  - type: text
    content: Mais souvenez‑vous qu’il est croyant, comme vous. Alors, avertissez‑le avec douceur.
  - type: heading
    content: Paul termine sa lettre
  '16':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous aide à avoir la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: '. Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui‑même vous donne cette paix à tout moment, quoi qu’il arrive. Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit avec vous tous.'
  '17':
  - type: text
    content: Moi, Paul, j’écris ces mots à la fin de ma lettre de ma propre main. Je vous salue. C’est ainsi que j’écris dans chaque lettre qui vient de moi.
  '18':
  - type: text
    content: 'Je prie pour que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continue d’être très gentil avec vous tous.'
  '2':
  - type: text
    content: 'Priez aussi que Dieu ne laisse pas les méchants nous causer des problèmes. Tout le monde ne croit pas au message concernant notre '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait toujours ce qu’il a promis. Ainsi, il vous aidera à être forts en vous. Il vous gardera en sécurité lorsque Satan vous attaquera.'
  '4':
  - type: text
    content: 'Parce que vous appartenez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' cela nous assure à votre sujet. Nous savons que vous faites des choses que nous vous demandons de faire. Et nous savons que vous continuerez de faire ces choses. '
  '5':
  - type: text
    content: 'Nous prions pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous guide dans vos pensées. Ensuite, vous comprendrez de mieux en mieux l’amour de Dieu. Et vous serez patients et forts, comme l’est '
  - type: text
    content: Christ
  - type: text
    content: .
  - type: heading
    content: Les croyants ne doivent pas refuser de travailler
  '6':
  - type: text
    content: 'Nos amis, vous devez vous tenir à l’écart de tout croyant qui vit paresseusement. Nous vous le disons avec le pouvoir que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' nous donne. Les gens paresseux comme ça ne vivent pas comme nous vous l’avons enseigné. '
  '7':
  - type: text
    content: 'Vous savez vous‑mêmes que vous devez copier notre exemple. Vous savez que nous n’étions pas paresseux lorsque nous vivions parmi vous. '
  '8':
  - type: text
    content: Nous avons toujours payé pour la nourriture que quiconque nous a donnée. Nous travaillions beaucoup tout le temps, de jour comme de nuit. Nous le faisions pour ne causer aucun problème à aucun d’entre vous.
  '9':
  - type: text
    content: 'Nous pouvions vous dire de nous donner ce dont nous avions besoin. Nous avons le pouvoir de le faire. Mais nous voulions vous montrer comment vivre correctement. Ensuite, vous pouvez copier notre exemple. '
