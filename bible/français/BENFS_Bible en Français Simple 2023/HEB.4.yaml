document_id: HEB.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Lieu de repos spécial de Dieu
  - type: text
    content: 'Dieu a promis à son peuple qu’il ira dans son lieu de repos spécial. Cette promesse est toujours vraie pour nous aujourd’hui. Il faut donc être très prudent. Ne manquez pas d’arriver à cet endroit. Nous ne voulons certainement pas que cela se produise. '
  '10':
  - type: text
    content: Quand Dieu a créé le monde et tout, il s’est reposé après avoir terminé son travail. Il en va de même pour tous ceux qui vont au lieu de repos de Dieu. Eux aussi se reposeront. Ils n’auront plus besoin de travailler.
  '11':
  - type: text
    content: 'Nous devons donc faire tout notre possible pour arriver dans le lieu de repos spécial de Dieu. Le peuple de Dieu dans le '
  - type: text
    content: désert
  - type: text
    content: ' ne lui obéissait pas. Nous ne devons pas être comme eux. Si nous n’obéissons pas à Dieu, nous ne parviendrons pas non plus à arriver à cet endroit.'
  '12':
  - type: text
    content: 'Alors, faites attention ! Le message de Dieu pour nous est vivant et puissant. C’est comme une épée à 2 tranchants. Plus encore qu’une épée, le message de Dieu pénètre très profondément en nous. Elle coupe entre notre '
  - type: text
    content: âme
  - type: text
    content: ' et notre '
  - type: text
    content: esprit
  - type: text
    content: '. C’est comme un couteau tranchant qui peut pénétrer profondément dans nos corps entre nos os. Le message de Dieu montre ce que nous pensons vraiment. Cela montre ce que nous voulons vraiment. '
  '13':
  - type: text
    content: Il n’y a rien dans le monde entier qui puisse se cacher de Dieu. Il voit tout clairement et il sait tout. Nous devrons lui expliquer tout ce que nous avons fait au cours de nos vies.
  - type: heading
    content: Jésus est notre grand prêtre
  '14':
  - type: text
    content: 'Jésus, le Fils de Dieu, nous aide, en tant que '
  - type: text
    content: prêtre
  - type: text
    content: ' le plus important de Dieu. Il est notre '
  - type: text
    content: grand prêtre
  - type: text
    content: ' qui est monté au '
  - type: text
    content: ciel
  - type: text
    content: '. Nous disons que nous croyons en lui. Nous devons donc continuer à montrer aux gens que nous lui faisons confiance. '
  '15':
  - type: text
    content: 'Jésus, notre '
  - type: text
    content: grand prêtre
  - type: text
    content: ', nous comprend. Il sait à quel point nous sommes faibles. Il sait que nous voulons parfois faire de mauvaises choses. Le '
  - type: text
    content: diable
  - type: text
    content: ' a essayé de lui faire faire le même genre de mauvaises choses. Mais Jésus n’a jamais rien fait de mal. '
  '16':
  - type: text
    content: Ainsi, nous devons nous approcher de Dieu et nous ne devons pas avoir peur. Dieu est notre roi. Nous pouvons lui demander de nous aider lorsque nous avons besoin d’aide. Nous savons qu’il nous pardonnera et il sera gentil avec nous à nos besoins.
  '2':
  - type: text
    content: 'Nous avons entendu la Bonne Nouvelle de Dieu, tout comme le peuple de Dieu dans le '
  - type: text
    content: désert
  - type: text
    content: ' a entendu son message. Mais ce message ne les a pas aidés, car ils n’y ont pas cru. Ils ne faisaient pas confiance en Dieu, comme ceux qui lui obéissaient. '
  '3':
  - type: text
    content: 'Mais ceux d’entre nous qui ont confiance en Dieu sont contents de son lieu de repos spécial. Voici ce que Dieu a dit :'
  - type: text
    content: 'Parce que j’étais très en colère contre eux, j’ai promis ceci :'
  - type: text
    content: Ils n’arriveront jamais dans mon lieu de repos spécial.
  - type: text
    content: 'Dieu a dit cela, même s’il a terminé son travail quand il a fait le monde. '
  '4':
  - type: text
    content: 'Dans la Bible, Dieu a parlé du septième jour comme ceci :'
  - type: text
    content: Dieu s’est reposé de tout son travail le septième jour.
  '5':
  - type: text
    content: 'Comme nous l’avons déjà vu, Dieu a dit quelque chose plus tard à propos de son repos :'
  - type: text
    content: Ils n’arriveront jamais dans mon lieu spécial de repos.
  '6':
  - type: text
    content: 'Nous voyons donc qu’il y a encore une chance pour les gens d’aller au lieu de repos de Dieu. Mais ces gens qui ont entendu le premier le message de Dieu dans le '
  - type: text
    content: désert
  - type: text
    content: ' ont refusé de lui obéir. En conséquence, ils ne sont pas arrivés dans son lieu de repos spécial. '
  '7':
  - type: text
    content: 'Alors Dieu a choisi un autre moment pour que les gens aillent à son lieu de repos. Il l’a appelé Aujourd’hui. Longtemps après Moïse, David a dit le message de Dieu. Comme nous l’avons déjà vu, il a dit :'
  - type: text
    content: Ecoutez quand vous entendez Dieu parler aujourd’hui.
  - type: text
    content: Ne refusez pas de lui obéir.
  '8':
  - type: text
    content: 'Cela montre que Josué n’a pas emmené le peuple de Dieu à l’endroit où il pouvait se reposer. Plus tard, Dieu a dû parler à nouveau d’un autre jour de repos. '
  '9':
  - type: text
    content: 'Ainsi, nous voyons ceci : Dieu a encore un endroit prêt pour son peuple, où il peut se reposer. Il se reposera comme Dieu s’est reposé le septième jour. '
