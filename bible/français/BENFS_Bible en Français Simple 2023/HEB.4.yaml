document_id: HEB.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lieu de repos spécial de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu a promis à son peuple qu’il ira dans son lieu de repos spécial. Cette promesse est toujours vraie pour nous aujourd’hui. Il faut donc être très prudent. Ne manquez pas d’arriver à cet endroit. Nous ne voulons certainement pas que cela se produise. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous avons entendu la Bonne Nouvelle de Dieu, tout comme le peuple de Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: ' a entendu son message. Mais ce message ne les a pas aidés, car ils n’y ont pas cru. Ils ne faisaient pas confiance en Dieu, comme ceux qui lui obéissaient. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais ceux d’entre nous qui ont confiance en Dieu sont contents de son lieu de repos spécial. Voici ce que Dieu a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce que j’étais très en colère contre eux, j’ai promis ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’arriveront jamais dans mon lieu de repos spécial.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dieu a dit cela, même s’il a terminé son travail quand il a fait le monde. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dans la Bible, Dieu a parlé du septième jour comme ceci :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dieu s’est reposé de tout son travail le septième jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Comme nous l’avons déjà vu, Dieu a dit quelque chose plus tard à propos de son repos :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils n’arriveront jamais dans mon lieu spécial de repos.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous voyons donc qu’il y a encore une chance pour les gens d’aller au lieu de repos de Dieu. Mais ces gens qui ont entendu le premier le message de Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: ' ont refusé de lui obéir. En conséquence, ils ne sont pas arrivés dans son lieu de repos spécial. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Dieu a choisi un autre moment pour que les gens aillent à son lieu de repos. Il l’a appelé Aujourd’hui. Longtemps après Moïse, David a dit le message de Dieu. Comme nous l’avons déjà vu, il a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecoutez quand vous entendez Dieu parler aujourd’hui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne refusez pas de lui obéir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cela montre que Josué n’a pas emmené le peuple de Dieu à l’endroit où il pouvait se reposer. Plus tard, Dieu a dû parler à nouveau d’un autre jour de repos. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi, nous voyons ceci : Dieu a encore un endroit prêt pour son peuple, où il peut se reposer. Il se reposera comme Dieu s’est reposé le septième jour. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quand Dieu a créé le monde et tout, il s’est reposé après avoir terminé son travail. Il en va de même pour tous ceux qui vont au lieu de repos de Dieu. Eux aussi se reposeront. Ils n’auront plus besoin de travailler.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous devons donc faire tout notre possible pour arriver dans le lieu de repos spécial de Dieu. Le peuple de Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: ' ne lui obéissait pas. Nous ne devons pas être comme eux. Si nous n’obéissons pas à Dieu, nous ne parviendrons pas non plus à arriver à cet endroit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors, faites attention ! Le message de Dieu pour nous est vivant et puissant. C’est comme une épée à 2 tranchants. Plus encore qu’une épée, le message de Dieu pénètre très profondément en nous. Elle coupe entre notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âme
  - type: text
    text: ' et notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. C’est comme un couteau tranchant qui peut pénétrer profondément dans nos corps entre nos os. Le message de Dieu montre ce que nous pensons vraiment. Cela montre ce que nous voulons vraiment. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il n’y a rien dans le monde entier qui puisse se cacher de Dieu. Il voit tout clairement et il sait tout. Nous devrons lui expliquer tout ce que nous avons fait au cours de nos vies.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus est notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus, le Fils de Dieu, nous aide, en tant que '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' le plus important de Dieu. Il est notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' qui est monté au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Nous disons que nous croyons en lui. Nous devons donc continuer à montrer aux gens que nous lui faisons confiance. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus, notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ', nous comprend. Il sait à quel point nous sommes faibles. Il sait que nous voulons parfois faire de mauvaises choses. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' a essayé de lui faire faire le même genre de mauvaises choses. Mais Jésus n’a jamais rien fait de mal. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ainsi, nous devons nous approcher de Dieu et nous ne devons pas avoir peur. Dieu est notre roi. Nous pouvons lui demander de nous aider lorsque nous avons besoin d’aide. Nous savons qu’il nous pardonnera et il sera gentil avec nous à nos besoins.
