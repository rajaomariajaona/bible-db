document_id: REV.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le livre et l’Agneau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis j’ai regardé celui qui était assis sur le trône. J’ai vu qu’il tenait un livre dans sa main droite. Les mots étaient écrits des 2 côtés, à l’intérieur et à l’extérieur. 7 sceaux ont gardé le livre fermé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis j’ai vu un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' fort. Il a dit d’une voix forte : Qui est très bon pour briser les sceaux ? Qui peut ouvrir le livre ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais personne au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' ne pouvait ouvrir le livre. Personne sur terre ni personne sous terre ne pouvait l’ouvrir. Personne ne pouvait même regarder à l’intérieur ou le lire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’ai beaucoup pleuré, parce qu’il n’y avait personne qui était assez bon. Personne n’était si bon pour ouvrir le livre. Personne ne pouvait regarder à l’intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors l’un des anciens m’a dit : Ne pleure pas ! Regarde ! Il y a quelqu’un qui peut briser les 7 sceaux puis ouvrir le livre. Son nom est le Lion du groupe familial de Juda. Il est appelé la racine du roi David. Il a gagné tous ses ennemis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors j’ai vu un Agneau. Il se tenait au milieu du trône. Les 4 êtres vivants et les anciens étaient autour de lui. L’Agneau semblait être comme un agneau que quelqu’un avait tué. Il avait 7 cornes et 7 yeux. Ses yeux sont les 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' de Dieu, que Dieu a envoyés dans toutes les parties du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Agneau est venu et il a pris le livre. Il l’a pris de la main droite de celui qui était assis sur le trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lorsqu’il a pris le livre, les 4 êtres et les 24 anciens sont tombés par terre devant l’Agneau. Ils l’ont adoré. Chaque ancien avait une harpe pour faire de la musique. Ils tenaient également des bols en or pleins d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: '. Cette odeur agréable était comme lorsque le peuple de Dieu le prie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les êtres vivants et les anciens ont chanté une nouvelle chanson. Ils ont chanté :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es si bon !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es si bon pour prendre le livre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu peux briser ses sceaux et les ouvrir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu peux le faire parce qu’ils t’ont tué.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu es mort, tu as acheté des gens pour Dieu avec ton sang.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu les as achetés à tous les groupes familiaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De toutes les langues et de tous les pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu les as fait appartenir au Royaume de notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as fait d’eux des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’ils servent Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils régneront sur la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J''ai regardé de nouveau et j’ai entendu la voix de nombreux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. Il y en avait des milliers et des millions. Ils se tenaient autour du trône, avec les êtres vivants et les anciens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils ont tous chanté à voix haute :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Agneau qu’ils ont tué est complètement bon !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a tout pouvoir et toutes choses lui appartiennent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est sage et puissant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le monde doit accepter qu’il est grand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun doit le louer et l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis j’ai entendu tout ce qui est vivant chanter. C’était tout dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et tout sur la terre, et tout sous la terre et tout dans la mer. Ils chantaient :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous louons celui qui est assis sur le trône.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous louons celui qui est l’Agneau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous disons qu’ils sont grands ! Nous les adorons !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont le pouvoir de régner pour toujours !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les 4 êtres vivants sont d’accord. Ils ont dit : Oui, c’est vrai. Les anciens sont tombés et ils ont adoré Dieu et l’Agneau.'
