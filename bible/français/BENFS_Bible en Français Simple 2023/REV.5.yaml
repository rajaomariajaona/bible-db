document_id: REV.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Le livre et l’Agneau
  - type: text
    content: 'Puis j’ai regardé celui qui était assis sur le trône. J’ai vu qu’il tenait un livre dans sa main droite. Les mots étaient écrits des 2 côtés, à l’intérieur et à l’extérieur. 7 sceaux ont gardé le livre fermé. '
  '10':
  - type: text
    content: Tu les as fait appartenir au Royaume de notre Dieu.
  - type: text
    content: 'Tu as fait d’eux des '
  - type: text
    content: prêtres
  - type: text
    content: ','
  - type: text
    content: Afin qu’ils servent Dieu.
  - type: text
    content: Et ils régneront sur la terre.
  '11':
  - type: text
    content: 'J''ai regardé de nouveau et j’ai entendu la voix de nombreux '
  - type: text
    content: anges
  - type: text
    content: '. Il y en avait des milliers et des millions. Ils se tenaient autour du trône, avec les êtres vivants et les anciens. '
  '12':
  - type: text
    content: 'Ils ont tous chanté à voix haute :'
  - type: text
    content: L’Agneau qu’ils ont tué est complètement bon !
  - type: text
    content: Il a tout pouvoir et toutes choses lui appartiennent.
  - type: text
    content: Il est sage et puissant.
  - type: text
    content: Tout le monde doit accepter qu’il est grand.
  - type: text
    content: Chacun doit le louer et l’
  - type: text
    content: adorer
  - type: text
    content: '  !'
  '13':
  - type: text
    content: 'Puis j’ai entendu tout ce qui est vivant chanter. C’était tout dans le '
  - type: text
    content: ciel
  - type: text
    content: ' et tout sur la terre, et tout sous la terre et tout dans la mer. Ils chantaient :'
  - type: text
    content: Nous louons celui qui est assis sur le trône.
  - type: text
    content: Nous louons celui qui est l’Agneau.
  - type: text
    content: Nous disons qu’ils sont grands ! Nous les adorons !
  - type: text
    content: Ils ont le pouvoir de régner pour toujours !
  '14':
  - type: text
    content: 'Les 4 êtres vivants sont d’accord. Ils ont dit : Oui, c’est vrai. Les anciens sont tombés et ils ont adoré Dieu et l’Agneau.'
  '2':
  - type: text
    content: 'Puis j’ai vu un '
  - type: text
    content: ange
  - type: text
    content: ' fort. Il a dit d’une voix forte : Qui est très bon pour briser les sceaux ? Qui peut ouvrir le livre ? '
  '3':
  - type: text
    content: 'Mais personne au '
  - type: text
    content: ciel
  - type: text
    content: ' ne pouvait ouvrir le livre. Personne sur terre ni personne sous terre ne pouvait l’ouvrir. Personne ne pouvait même regarder à l’intérieur ou le lire.'
  '4':
  - type: text
    content: 'J’ai beaucoup pleuré, parce qu’il n’y avait personne qui était assez bon. Personne n’était si bon pour ouvrir le livre. Personne ne pouvait regarder à l’intérieur. '
  '5':
  - type: text
    content: 'Alors l’un des anciens m’a dit : Ne pleure pas ! Regarde ! Il y a quelqu’un qui peut briser les 7 sceaux puis ouvrir le livre. Son nom est le Lion du groupe familial de Juda. Il est appelé la racine du roi David. Il a gagné tous ses ennemis.'
  '6':
  - type: text
    content: 'Alors j’ai vu un Agneau. Il se tenait au milieu du trône. Les 4 êtres vivants et les anciens étaient autour de lui. L’Agneau semblait être comme un agneau que quelqu’un avait tué. Il avait 7 cornes et 7 yeux. Ses yeux sont les 7 '
  - type: text
    content: esprits
  - type: text
    content: ' de Dieu, que Dieu a envoyés dans toutes les parties du monde. '
  '7':
  - type: text
    content: 'L’Agneau est venu et il a pris le livre. Il l’a pris de la main droite de celui qui était assis sur le trône. '
  '8':
  - type: text
    content: Lorsqu’il a pris le livre, les 4 êtres et les 24 anciens sont tombés par terre devant l’Agneau. Ils l’ont adoré. Chaque ancien avait une harpe pour faire de la musique. Ils tenaient également des bols en or pleins d’
  - type: text
    content: encens
  - type: text
    content: '. Cette odeur agréable était comme lorsque le peuple de Dieu le prie. '
  '9':
  - type: text
    content: 'Les êtres vivants et les anciens ont chanté une nouvelle chanson. Ils ont chanté :'
  - type: text
    content: Tu es si bon !
  - type: text
    content: Tu es si bon pour prendre le livre.
  - type: text
    content: Tu peux briser ses sceaux et les ouvrir.
  - type: text
    content: Tu peux le faire parce qu’ils t’ont tué.
  - type: text
    content: Quand tu es mort, tu as acheté des gens pour Dieu avec ton sang.
  - type: text
    content: Tu les as achetés à tous les groupes familiaux,
  - type: text
    content: De toutes les langues et de tous les pays.
