document_id: ACT.23,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 23
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Paul parle aux hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul a regardé les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: ' et il leur a dit : Mes amis, qui sont également des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélites
    - type: text
      text: ', aujourd’hui, je n’ai rien à avoir honte devant Dieu. J’ai toujours vécu d’une manière qui rend Dieu heureux avec moi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les 2 groupes discutaient de plus en plus fortement. Et le chef des soldats pensait que quelqu’un pourrait faire du mal à Paul. Ils le tiraient dans différentes directions. Ainsi il a dit à ses soldats : Entrez dans la salle et tirez Paul d’eux. Prenez‑le de nouveau dans le bâtiment fort.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La nuit, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est venu et il s’est tenu près de Paul. Il a dit à Paul : Continue d’être courageux ! Tu as dit aux gens ici à Jérusalem les choses vraies au sujet de moi. Tu dois faire la même chose à Rome.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' à Jérusalem décident de tuer Paul'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le matin suivant, quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont parlé ensemble dans un groupe au sujet de ce qu’ils devraient faire. Et ils ont décidé de promettre quelque chose à Dieu. Ils ont décidé ceci : Ne rien manger, ne rien boire avant de tuer Paul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Plus de 40 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' étaient dans le groupe. Ils ont décidé ceci. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors ce groupe est allé auprès des chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: '. Ils ont dit : Nous avons décidé ensemble de faire une promesse sérieuse à Dieu. Nous ne mangerons rien avant que nous ayons tué Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Maintenant, nous voulons que tu envoies ce message au chef des soldats : Amène Paul aux hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: '. Nous voulons savoir plus au sujet de ce qu’il a fait. C’est le message. Nous ne voulons pas vraiment lui poser des questions. Nous attendrons Paul et nous serons prêts à le tuer. Nous ferons ceci avant qu’il arrive devant le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais le fils de la sœur de Paul a entendu ce que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont voulu faire. Ainsi il est entré dans le bâtiment fort et il a dit à Paul à son sujet.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ainsi Paul a parlé à un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officiers
    - type: text
      text: ' qui sont venus chez lui : Conduis ce jeune homme au chef des soldats. Il a quelque chose à lui dire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Alors l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' a mené le jeune homme au chef des soldats et lui a dit : Paul, qui est dans la prison, m’a parlé. Il m’a demandé de t’amener ce jeune homme. Il a quelque chose à te dire.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le chef des soldats a tenu la main du jeune homme. Alors il a mené le jeune homme à une salle où il n’y avait personne. Alors il a dit au jeune homme : Que veux‑tu me dire ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' s’appelait Ananias. Il a dit aux hommes qui étaient près de Paul : Frappez cet homme sur sa bouche ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le jeune homme a dit : Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont accepté ensemble de te demander de faire quelque chose. Ils veulent ceci : Que tu amènes Paul demain devant les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: . Ils diront qu’ils veulent lui poser plus de questions. Mais ce n’est pas vrai.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ainsi ne les écoute pas. Il y a plus de 40 hommes qui se cacheront quelque part. Ils attendent Paul. Ils ont fait une promesse sérieuse à Dieu et ne mangeront, ni ne boiront rien avant de tuer Paul. Ils sont maintenant prêts à faire ceci. Et ils attendent ta réponse.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le chef des soldats a dit : Ne dis à personne ce que tu m’as dit. Alors il a envoyé le jeune homme loin.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chef des soldats envoie Paul à Félix, le gouverneur
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors le chef des soldats a demandé à 2 de ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officiers
    - type: text
      text: ' de venir à lui. Il leur a dit : Je veux que 200 soldats se préparent. Je veux qu’ils aillent à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: '. Je veux également que 70 hommes montent sur des chevaux. Envoyez 200 hommes avec eux. Ils doivent porter chacun une lance. Ils devraient tous être prêts à partir à 9 heures ce soir. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Apprêtez quelques chevaux pour Paul à monter dessus. Gardez‑le en sécurité et amenez‑le au gouverneur Félix.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Alors le chef des soldats a écrit une lettre au gouverneur Félix. Dans la lettre, il a écrit :'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Cette lettre est à Félix, très important gouverneur. Moi, Claude Lysias, je t’envoie cette lettre, bonjour.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont attrapé cet homme et ils ont voulu le tuer. J’ai appris qu’il est un citoyen de Rome. Ainsi je suis allé avec mes soldats, et je l’ai sauvé d’eux. '
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont dit qu’il avait fait quelque chose de mauvais. J’ai voulu savoir plus au sujet de lui, ainsi je l’ai amené se présenter devant leur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'J’ai découvert ce qu’il avait fait. Mais nous ne pourrions pas le mettre en prison ou le tuer en raison de ces choses. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont dit qu’il n’avait pas obéi à leur propre loi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Paul a dit à Ananias : Il est certain que Dieu te frappera. Tu es comme un mur que quelqu’un a peint en blanc. Tu te reposes là et tu me '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juges
    - type: text
      text: '. Tu demandes si j’obéis à la loi de Dieu. Mais tu n’obéis pas toi‑même à la loi, parce que tu dis : Frappez cet homme ! '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Un groupe de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' a alors décidé de le tuer. Quelqu’un m’a dit à ce sujet. Ainsi j’ai décidé de te l’envoyer. J’ai dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui disent de mauvaises choses au sujet de lui : Vous dites que Paul a fait quelque chose de mal. Ainsi, ils vont dire au gouverneur Félix à ce sujet.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Alors les soldats ont fait ce que leur chef leur avait demandé de faire. Ils ont pris Paul de la prison. Cette nuit, ils l’ont conduit jusqu’à Antipatris. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Le jour suivant, les 200 soldats qui avaient marché avec Paul sont revenus au bâtiment fort à Jérusalem. Mais les soldats qui sont montés sur des chevaux ont continué à voyager avec Paul. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ils ont amené Paul à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: ' et ils ont donné la lettre au gouverneur Félix. Alors ils lui ont livré Paul.'
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Le gouverneur Félix a lu la lettre et il a demandé à Paul : De quel pays es‐tu ? Paul a répondu : Je suis de Cilicie. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Félix a dit : Quand les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' arriveront, ils diront tout au sujet de toi. Alors je t’écouterai également et je te jugerai. Félix a alors dit à ses soldats : Mettez cet homme dans la maison d’Hérode et gardez‑le en sécurité !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les hommes qui se tenaient près de Paul lui ont répondu : Tu dis de mauvaises choses au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Paul a continué : Mes frères, je n’ai pas su qu’il était le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: '. Je sais que les prophètes avaient écrit : Ne dis pas de mauvaises choses au sujet de l’homme qui dirige ton peuple.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alors Paul a vu qu’il y avait certains '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' et certains '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' dans le groupe. Ainsi il criait à tous les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: '  : Hommes, je suis un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: ' et mon père était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: '. Je crois que les personnes mortes vivront encore. Dieu fera produire ceci. Et vous me jugez aujourd’hui, parce que je crois à cela. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dès que Paul a dit cela, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' ont commencé à discuter les uns avec les autres.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '(Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' ne croyaient pas que les morts vivront encore. Ils ne croyaient pas qu’il y a des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' ou des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' croyaient en toutes ces choses.)'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont commencé à crier plus fortement. Il y avait quelques enseignants de la loi qui étaient dans le groupe des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: '. Ces enseignants de la loi se sont levés. Ils étaient très fâchés au sujet de ce qui se produisait. Ils ont dit : Nous ne croyons pas que cet homme a fait quelque chose de faux, ce qu’il dit peut être vrai. Un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' ou un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a pu lui avoir parlé. '
