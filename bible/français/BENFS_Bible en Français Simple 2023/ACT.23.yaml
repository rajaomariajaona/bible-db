document_id: ACT.23,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 23
  - type: heading
    content: Paul parle aux hommes du Sanhédrin
  - type: text
    content: 'Paul a regardé les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' et il leur a dit : Mes amis, qui sont également des '
  - type: text
    content: Israélites
  - type: text
    content: ', aujourd’hui, je n’ai rien à avoir honte devant Dieu. J’ai toujours vécu d’une manière qui rend Dieu heureux avec moi. '
  '10':
  - type: text
    content: 'Les 2 groupes discutaient de plus en plus fortement. Et le chef des soldats pensait que quelqu’un pourrait faire du mal à Paul. Ils le tiraient dans différentes directions. Ainsi il a dit à ses soldats : Entrez dans la salle et tirez Paul d’eux. Prenez‑le de nouveau dans le bâtiment fort.'
  '11':
  - type: text
    content: 'La nuit, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est venu et il s’est tenu près de Paul. Il a dit à Paul : Continue d’être courageux ! Tu as dit aux gens ici à Jérusalem les choses vraies au sujet de moi. Tu dois faire la même chose à Rome.'
  - type: heading
    content: Les Juifs à Jérusalem décident de tuer Paul
  '12':
  - type: text
    content: 'Le matin suivant, quelques '
  - type: text
    content: Juifs
  - type: text
    content: ' ont parlé ensemble dans un groupe au sujet de ce qu’ils devraient faire. Et ils ont décidé de promettre quelque chose à Dieu. Ils ont décidé ceci : Ne rien manger, ne rien boire avant de tuer Paul. '
  '13':
  - type: text
    content: 'Plus de 40 '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient dans le groupe. Ils ont décidé ceci. '
  '14':
  - type: text
    content: 'Alors ce groupe est allé auprès des chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et des '
  - type: text
    content: anciens
  - type: text
    content: '. Ils ont dit : Nous avons décidé ensemble de faire une promesse sérieuse à Dieu. Nous ne mangerons rien avant que nous ayons tué Paul. '
  '15':
  - type: text
    content: 'Maintenant, nous voulons que tu envoies ce message au chef des soldats : Amène Paul aux hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. Nous voulons savoir plus au sujet de ce qu’il a fait. C’est le message. Nous ne voulons pas vraiment lui poser des questions. Nous attendrons Paul et nous serons prêts à le tuer. Nous ferons ceci avant qu’il arrive devant le '
  - type: text
    content: Sanhédrin
  - type: text
    content: .
  '16':
  - type: text
    content: 'Mais le fils de la sœur de Paul a entendu ce que les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont voulu faire. Ainsi il est entré dans le bâtiment fort et il a dit à Paul à son sujet.'
  '17':
  - type: text
    content: 'Ainsi Paul a parlé à un des '
  - type: text
    content: officiers
  - type: text
    content: ' qui sont venus chez lui : Conduis ce jeune homme au chef des soldats. Il a quelque chose à lui dire. '
  '18':
  - type: text
    content: Alors l’
  - type: text
    content: officier
  - type: text
    content: ' a mené le jeune homme au chef des soldats et lui a dit : Paul, qui est dans la prison, m’a parlé. Il m’a demandé de t’amener ce jeune homme. Il a quelque chose à te dire.'
  '19':
  - type: text
    content: 'Le chef des soldats a tenu la main du jeune homme. Alors il a mené le jeune homme à une salle où il n’y avait personne. Alors il a dit au jeune homme : Que veux‑tu me dire ?'
  '2':
  - type: text
    content: 'Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' s’appelait Ananias. Il a dit aux hommes qui étaient près de Paul : Frappez cet homme sur sa bouche ! '
  '20':
  - type: text
    content: 'Le jeune homme a dit : Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont accepté ensemble de te demander de faire quelque chose. Ils veulent ceci : Que tu amènes Paul demain devant les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: . Ils diront qu’ils veulent lui poser plus de questions. Mais ce n’est pas vrai.
  '21':
  - type: text
    content: Ainsi ne les écoute pas. Il y a plus de 40 hommes qui se cacheront quelque part. Ils attendent Paul. Ils ont fait une promesse sérieuse à Dieu et ne mangeront, ni ne boiront rien avant de tuer Paul. Ils sont maintenant prêts à faire ceci. Et ils attendent ta réponse.
  '22':
  - type: text
    content: 'Le chef des soldats a dit : Ne dis à personne ce que tu m’as dit. Alors il a envoyé le jeune homme loin.'
  - type: heading
    content: Le chef des soldats envoie Paul à Félix, le gouverneur
  '23':
  - type: text
    content: 'Alors le chef des soldats a demandé à 2 de ses '
  - type: text
    content: officiers
  - type: text
    content: ' de venir à lui. Il leur a dit : Je veux que 200 soldats se préparent. Je veux qu’ils aillent à '
  - type: text
    content: Césarée
  - type: text
    content: '. Je veux également que 70 hommes montent sur des chevaux. Envoyez 200 hommes avec eux. Ils doivent porter chacun une lance. Ils devraient tous être prêts à partir à 9 heures ce soir. '
  '24':
  - type: text
    content: Apprêtez quelques chevaux pour Paul à monter dessus. Gardez‑le en sécurité et amenez‑le au gouverneur Félix.
  '25':
  - type: text
    content: 'Alors le chef des soldats a écrit une lettre au gouverneur Félix. Dans la lettre, il a écrit :'
  '26':
  - type: text
    content: Cette lettre est à Félix, très important gouverneur. Moi, Claude Lysias, je t’envoie cette lettre, bonjour.
  '27':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont attrapé cet homme et ils ont voulu le tuer. J’ai appris qu’il est un citoyen de Rome. Ainsi je suis allé avec mes soldats, et je l’ai sauvé d’eux. '
  '28':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont dit qu’il avait fait quelque chose de mauvais. J’ai voulu savoir plus au sujet de lui, ainsi je l’ai amené se présenter devant leur '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'J’ai découvert ce qu’il avait fait. Mais nous ne pourrions pas le mettre en prison ou le tuer en raison de ces choses. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont dit qu’il n’avait pas obéi à leur propre loi. '
  '3':
  - type: text
    content: 'Paul a dit à Ananias : Il est certain que Dieu te frappera. Tu es comme un mur que quelqu’un a peint en blanc. Tu te reposes là et tu me '
  - type: text
    content: juges
  - type: text
    content: '. Tu demandes si j’obéis à la loi de Dieu. Mais tu n’obéis pas toi‑même à la loi, parce que tu dis : Frappez cet homme ! '
  '30':
  - type: text
    content: 'Un groupe de '
  - type: text
    content: Juifs
  - type: text
    content: ' a alors décidé de le tuer. Quelqu’un m’a dit à ce sujet. Ainsi j’ai décidé de te l’envoyer. J’ai dit aux '
  - type: text
    content: Juifs
  - type: text
    content: ' qui disent de mauvaises choses au sujet de lui : Vous dites que Paul a fait quelque chose de mal. Ainsi, ils vont dire au gouverneur Félix à ce sujet.'
  '31':
  - type: text
    content: 'Alors les soldats ont fait ce que leur chef leur avait demandé de faire. Ils ont pris Paul de la prison. Cette nuit, ils l’ont conduit jusqu’à Antipatris. '
  '32':
  - type: text
    content: 'Le jour suivant, les 200 soldats qui avaient marché avec Paul sont revenus au bâtiment fort à Jérusalem. Mais les soldats qui sont montés sur des chevaux ont continué à voyager avec Paul. '
  '33':
  - type: text
    content: 'Ils ont amené Paul à '
  - type: text
    content: Césarée
  - type: text
    content: ' et ils ont donné la lettre au gouverneur Félix. Alors ils lui ont livré Paul.'
  '34':
  - type: text
    content: 'Le gouverneur Félix a lu la lettre et il a demandé à Paul : De quel pays es‐tu ? Paul a répondu : Je suis de Cilicie. '
  '35':
  - type: text
    content: 'Félix a dit : Quand les '
  - type: text
    content: Juifs
  - type: text
    content: ' arriveront, ils diront tout au sujet de toi. Alors je t’écouterai également et je te jugerai. Félix a alors dit à ses soldats : Mettez cet homme dans la maison d’Hérode et gardez‑le en sécurité !'
  '4':
  - type: text
    content: 'Les hommes qui se tenaient près de Paul lui ont répondu : Tu dis de mauvaises choses au '
  - type: text
    content: grand prêtre
  - type: text
    content: .
  '5':
  - type: text
    content: 'Paul a continué : Mes frères, je n’ai pas su qu’il était le '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Je sais que les prophètes avaient écrit : Ne dis pas de mauvaises choses au sujet de l’homme qui dirige ton peuple.'
  '6':
  - type: text
    content: 'Alors Paul a vu qu’il y avait certains '
  - type: text
    content: Sadducéens
  - type: text
    content: ' et certains '
  - type: text
    content: Pharisiens
  - type: text
    content: ' dans le groupe. Ainsi il criait à tous les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '  : Hommes, je suis un '
  - type: text
    content: Pharisien
  - type: text
    content: ' et mon père était un '
  - type: text
    content: Pharisien
  - type: text
    content: '. Je crois que les personnes mortes vivront encore. Dieu fera produire ceci. Et vous me jugez aujourd’hui, parce que je crois à cela. '
  '7':
  - type: text
    content: 'Dès que Paul a dit cela, les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et les '
  - type: text
    content: Sadducéens
  - type: text
    content: ' ont commencé à discuter les uns avec les autres.'
  '8':
  - type: text
    content: '(Le '
  - type: text
    content: Sadducéens
  - type: text
    content: ' ne croyaient pas que les morts vivront encore. Ils ne croyaient pas qu’il y a des '
  - type: text
    content: anges
  - type: text
    content: ' ou des '
  - type: text
    content: esprits
  - type: text
    content: '. Mais les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' croyaient en toutes ces choses.)'
  '9':
  - type: text
    content: 'Les '
  - type: text
    content: Sadducéens
  - type: text
    content: ' et les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont commencé à crier plus fortement. Il y avait quelques enseignants de la loi qui étaient dans le groupe des '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Ces enseignants de la loi se sont levés. Ils étaient très fâchés au sujet de ce qui se produisait. Ils ont dit : Nous ne croyons pas que cet homme a fait quelque chose de faux, ce qu’il dit peut être vrai. Un '
  - type: text
    content: esprit
  - type: text
    content: ' ou un '
  - type: text
    content: ange
  - type: text
    content: ' a pu lui avoir parlé. '
