document_id: MAT.10
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 10
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus choisit 12 hommes pour être ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour, Jésus a demandé à ses 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' d’aller auprès de lui. Jésus leur a donné le pouvoir. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' pouvaient alors chasser les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' mauvais des gens. Ils pouvaient guérir toutes les maladies et les infirmités.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici les noms des 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtres
  - type: text
    text: '  :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le premier '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtre
  - type: text
    text: ' était Simon. Il était aussi appelé Pierre.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ensuite, il y avait le frère de Simon Pierre appelé André.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il y avait Jacques et son frère Jean, qui étaient les fils de Zébédée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il y avait Philippe et Barthélemy.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il y avait Thomas et Matthieu.
- type: usfm
  marker: p
  children:
  - type: text
    text: Et il y avait Jacques qui était le fils d’Alphée et Thaddée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Simon qui était appelé le Cananite et Judas Iscariote.
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est lui qui a livré Jésus à ses ennemis.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus envoie ses 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus a envoyé ces 12 hommes. Il leur a dit : N’allez pas vers les gens qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. N’entrez pas dans des villes où seulement les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritains
  - type: text
    text: ' vivent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais, vous devez aller vers le peuple d’Israël. Ils sont comme des brebis perdues. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Allez et dites‑leur ce message : Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: ' est proche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Guérissez les gens malades. Ressuscitez les morts. Guérissez les malades de la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lèpre
  - type: text
    text: '. Chassez les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' des gens. Je vous ai donné le pouvoir de faire toutes ces choses. Maintenant, allez et faites toutes ces choses pour d’autres personnes. Ce pouvoir ne vous coûte rien. Donc, ne leur demandez pas de vous payer pour cela.  '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne prenez pas de l’or. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne prenez pas de sac pour le voyage. Ne prenez pas de vêtements de plus. Ne prenez pas de souliers de plus. Ne prenez pas de bâton. Les gens doivent donner aux serviteurs de Dieu ce dont ils ont besoin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Entrez dans une ville ou un village. Cherchez une bonne personne qui va prendre soin de vous. Restez dans la maison de cette personne jusqu’à ce que vous quittiez cet endroit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En entrant dans la maison, saluez les gens qui sont là. Dites : Que la paix soit avec vous.  '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si les gens de la maison vous accueillent, demandez à Dieu qu’ils soient en paix. Mais les gens dans la maison peuvent vous refuser. Alors ne demandez pas à Dieu de leur donner la paix. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Parfois, vous irez dans une maison ou une ville et les gens ne vous recevront pas. Et ils n’écouteront pas votre message. Quittez alors cette maison ou cette ville. Et dites au peuple : Il y a de la poussière de votre endroit sur nos pieds. Nous allons la secouer avant de partir. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Je vous dis la vérité, un jour Dieu punira les gens qui me refusent. Dieu les punira plus que le peuple de Sodome et Gomorrhe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ecoutez bien. Je vous envoie aux gens qui voudront vous tuer. Votre voyage sera dangereux. Vous serez comme des brebis au milieu des chiens sauvages. Attention, soyez prudents comme des serpents. Mais vous devez aussi être bons et gentils comme les oiseaux appelés colombes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Attention ! Les gens vous attraperont. Ils vous amèneront aussi aux tribunaux. Ils vous amèneront dans les bâtiments de réunion. Ensuite, ils vous frapperont avec un fouet. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les gens vous amèneront devant des autorités (rois et gouverneurs). Cela arrivera à cause de moi. Ce sera le moment de leur parler de moi. Vous parlerez de moi aussi à ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsque les gens vous amèneront devant les autorités, n’ayez pas peur. Ne pensez pas à ce que vous devez dire. N’ayez pas peur sur la façon dont vous allez dire des choses. A ce moment, Dieu vous dira les paroles justes à dire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les paroles que vous direz ne viendront pas de vous. Mais le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de votre père vous donnera les paroles à dire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les hommes vont livrer leurs propres frères. Et ces hommes diront : Tuez‑les parce qu’ils croient en Jésus. Les parents feront la même chose contre leurs propres enfants. Certains enfants seront contre leurs parents. Les enfants vont livrer leurs parents. Ils diront : Tuez nos parents parce qu’ils croient en Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Beaucoup de gens ne vous aimeront pas, parce que vous croyez en moi. Mais croyez en moi jusqu’au bout. Alors Dieu vous sauvera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les gens dans une ville pourront vous attaquer. Alors quittez cette ville immédiatement. Allez dans une autre ville. Je vous dis la vérité : Vous n’atteindrez pas toutes les villes d’Israël. La raison est que le Fils de l’homme sera déjà de retour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' n’est pas plus important que son maître. Un serviteur n’est pas plus important que son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' devrait être heureux, s’il sait autant que son maître. Un serviteur devrait être heureux, s’il est aussi important que son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Les gens ont appelé le chef de la maison Belzébul (Satan). Donc, le reste de la maison peut s’attendre à des noms encore pires.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'N’ayez peur de personne. Il y a des secrets maintenant. Mais tout le monde les saura plus tard. Les gens ne peuvent pas comprendre tout maintenant. Mais plus tard, toutes les choses deviendront claires. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je vous dis des choses secrètes. Mais dites‑les en plein jour. Quelqu’un peut vous dire quelque chose dans l’oreille. Alors, vous devez le dire à haute voix. Ainsi tout le monde entendra ces paroles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: N’ayez pas peur de gens qui peuvent tuer le corps. Mais ils ne peuvent tuer l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: âme
  - type: text
    text: . Dieu est capable de détruire le corps et l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: âme
  - type: text
    text: '. C’est lui que vous devez craindre. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les gens vendent 2 petits oiseaux (passereaux) pour une petite pièce de monnaie. Un de ces petits oiseaux peut tomber sur le sol. Mais votre père sait quand chacun d’eux tombe au sol. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dieu sait même combien de cheveux il y a sur vos têtes. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Donc, n’ayez pas peur de gens. Vous êtes plus importants que ces nombreux petits oiseaux (passereaux).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Si quelqu’un dit à tout le monde : Je crois en Jésus. Alors je vais dire à Dieu, mon Père qui est dans les cieux, ceci : Je connais cette personne. Elle est une de mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Si quelqu’un dit à tout le monde : Je ne crois pas en Jésus. Alors je vais dire à Dieu, mon Père qui est dans les cieux, ceci : Je ne connais pas cette personne. Elle n’est pas une de mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vais vous dire pourquoi je suis venu dans le monde. Je ne suis pas venu pour unir les gens. Je suis venu pour : Amener les gens à se séparer. Amener les gens à se battre les uns contre les autres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Un homme sera contre son père.
- type: usfm
  marker: p
  children:
  - type: text
    text: Une fille sera contre sa mère.
- type: usfm
  marker: p
  children:
  - type: text
    text: Une femme sera contre la mère de son mari.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: La famille d’un homme sera contre lui. 
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus a dit : Un homme doit aimer son père et sa mère moins que moi. Puis il peut être mon  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: '. Il doit aussi aimer son propre fils ou sa propre fille moins que moi. S’il ne le fait pas, alors il ne peut pas être mon  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Peut‑être, vous voulez être mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Alors ne pensez pas d’abord à vous‑mêmes. Et ne pensez pas à ce que vous voulez faire. Vous devez seulement faire ce que Dieu veut. Vous devez le faire tous les jours. Vous pourriez même mourir. Alors, vous serez réellement mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Une personne peut vouloir protéger sa vie. Alors elle la perdra. Mais une personne peut mourir, parce qu’elle croit en moi. Et alors cette personne aura la vie pour toujours.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne sur les dons de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Quelqu’un peut vous recevoir dans sa maison. Alors il me reçoit également. Toute personne qui me reçoit dans sa maison, reçoit aussi Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Quelqu’un peut recevoir un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' de Dieu dans sa maison. Il le reçoit parce qu’il est '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' de Dieu. Alors Dieu lui donnera le même cadeau qu’il donne à un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. Quelqu’un peut recevoir dans sa maison un homme bon qui obéit à Dieu. Il fait cela, parce que cet homme obéit à Dieu. Alors Dieu donnera à cette personne le même cadeau qu’il donne à cet homme bon. '
  - type: usfm
    marker: v
