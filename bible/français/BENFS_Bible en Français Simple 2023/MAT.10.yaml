document_id: MAT.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: heading
    content: Jésus choisit 12 hommes pour être ses  Apôtres
  - type: text
    content: 'Un jour, Jésus a demandé à ses 12 '
  - type: text
    content: disciples
  - type: text
    content: ' d’aller auprès de lui. Jésus leur a donné le pouvoir. Les  '
  - type: text
    content: disciples
  - type: text
    content: ' pouvaient alors chasser les  '
  - type: text
    content: esprits
  - type: text
    content: ' mauvais des gens. Ils pouvaient guérir toutes les maladies et les infirmités.'
  '10':
  - type: text
    content: Ne prenez pas de sac pour le voyage. Ne prenez pas de vêtements de plus. Ne prenez pas de souliers de plus. Ne prenez pas de bâton. Les gens doivent donner aux serviteurs de Dieu ce dont ils ont besoin.
  '11':
  - type: text
    content: 'Entrez dans une ville ou un village. Cherchez une bonne personne qui va prendre soin de vous. Restez dans la maison de cette personne jusqu’à ce que vous quittiez cet endroit. '
  '12':
  - type: text
    content: 'En entrant dans la maison, saluez les gens qui sont là. Dites : Que la paix soit avec vous.  '
  '13':
  - type: text
    content: 'Si les gens de la maison vous accueillent, demandez à Dieu qu’ils soient en paix. Mais les gens dans la maison peuvent vous refuser. Alors ne demandez pas à Dieu de leur donner la paix. '
  '14':
  - type: text
    content: 'Parfois, vous irez dans une maison ou une ville et les gens ne vous recevront pas. Et ils n’écouteront pas votre message. Quittez alors cette maison ou cette ville. Et dites au peuple : Il y a de la poussière de votre endroit sur nos pieds. Nous allons la secouer avant de partir. '
  '15':
  - type: text
    content: 'Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Je vous dis la vérité, un jour Dieu punira les gens qui me refusent. Dieu les punira plus que le peuple de Sodome et Gomorrhe.'
  '16':
  - type: text
    content: Ecoutez bien. Je vous envoie aux gens qui voudront vous tuer. Votre voyage sera dangereux. Vous serez comme des brebis au milieu des chiens sauvages. Attention, soyez prudents comme des serpents. Mais vous devez aussi être bons et gentils comme les oiseaux appelés colombes.
  '17':
  - type: text
    content: 'Attention ! Les gens vous attraperont. Ils vous amèneront aussi aux tribunaux. Ils vous amèneront dans les bâtiments de réunion. Ensuite, ils vous frapperont avec un fouet. '
  '18':
  - type: text
    content: 'Les gens vous amèneront devant des autorités (rois et gouverneurs). Cela arrivera à cause de moi. Ce sera le moment de leur parler de moi. Vous parlerez de moi aussi à ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: .
  '19':
  - type: text
    content: 'Lorsque les gens vous amèneront devant les autorités, n’ayez pas peur. Ne pensez pas à ce que vous devez dire. N’ayez pas peur sur la façon dont vous allez dire des choses. A ce moment, Dieu vous dira les paroles justes à dire. '
  '2':
  - type: text
    content: 'Voici les noms des 12 '
  - type: text
    content: Apôtres
  - type: text
    content: '  :'
  - type: text
    content: 'Le premier '
  - type: text
    content: Apôtre
  - type: text
    content: ' était Simon. Il était aussi appelé Pierre.'
  - type: text
    content: Ensuite, il y avait le frère de Simon Pierre appelé André.
  - type: text
    content: Il y avait Jacques et son frère Jean, qui étaient les fils de Zébédée.
  '20':
  - type: text
    content: 'Les paroles que vous direz ne viendront pas de vous. Mais le  '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de votre père vous donnera les paroles à dire.'
  '21':
  - type: text
    content: 'Les hommes vont livrer leurs propres frères. Et ces hommes diront : Tuez‑les parce qu’ils croient en Jésus. Les parents feront la même chose contre leurs propres enfants. Certains enfants seront contre leurs parents. Les enfants vont livrer leurs parents. Ils diront : Tuez nos parents parce qu’ils croient en Jésus. '
  '22':
  - type: text
    content: Beaucoup de gens ne vous aimeront pas, parce que vous croyez en moi. Mais croyez en moi jusqu’au bout. Alors Dieu vous sauvera.
  '23':
  - type: text
    content: 'Les gens dans une ville pourront vous attaquer. Alors quittez cette ville immédiatement. Allez dans une autre ville. Je vous dis la vérité : Vous n’atteindrez pas toutes les villes d’Israël. La raison est que le Fils de l’homme sera déjà de retour.'
  '24':
  - type: text
    content: 'Un '
  - type: text
    content: disciple
  - type: text
    content: ' n’est pas plus important que son maître. Un serviteur n’est pas plus important que son  '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Un '
  - type: text
    content: disciple
  - type: text
    content: ' devrait être heureux, s’il sait autant que son maître. Un serviteur devrait être heureux, s’il est aussi important que son  '
  - type: text
    content: Seigneur
  - type: text
    content: . Les gens ont appelé le chef de la maison Belzébul (Satan). Donc, le reste de la maison peut s’attendre à des noms encore pires.
  '26':
  - type: text
    content: 'N’ayez peur de personne. Il y a des secrets maintenant. Mais tout le monde les saura plus tard. Les gens ne peuvent pas comprendre tout maintenant. Mais plus tard, toutes les choses deviendront claires. '
  '27':
  - type: text
    content: Je vous dis des choses secrètes. Mais dites‑les en plein jour. Quelqu’un peut vous dire quelque chose dans l’oreille. Alors, vous devez le dire à haute voix. Ainsi tout le monde entendra ces paroles.
  '28':
  - type: text
    content: N’ayez pas peur de gens qui peuvent tuer le corps. Mais ils ne peuvent tuer l’
  - type: text
    content: âme
  - type: text
    content: . Dieu est capable de détruire le corps et l’
  - type: text
    content: âme
  - type: text
    content: '. C’est lui que vous devez craindre. '
  '29':
  - type: text
    content: 'Les gens vendent 2 petits oiseaux (passereaux) pour une petite pièce de monnaie. Un de ces petits oiseaux peut tomber sur le sol. Mais votre père sait quand chacun d’eux tombe au sol. '
  '3':
  - type: text
    content: Il y avait Philippe et Barthélemy.
  - type: text
    content: Il y avait Thomas et Matthieu.
  - type: text
    content: Et il y avait Jacques qui était le fils d’Alphée et Thaddée.
  '30':
  - type: text
    content: 'Dieu sait même combien de cheveux il y a sur vos têtes. '
  '31':
  - type: text
    content: Donc, n’ayez pas peur de gens. Vous êtes plus importants que ces nombreux petits oiseaux (passereaux).
  '32':
  - type: text
    content: 'Si quelqu’un dit à tout le monde : Je crois en Jésus. Alors je vais dire à Dieu, mon Père qui est dans les cieux, ceci : Je connais cette personne. Elle est une de mes  '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Si quelqu’un dit à tout le monde : Je ne crois pas en Jésus. Alors je vais dire à Dieu, mon Père qui est dans les cieux, ceci : Je ne connais pas cette personne. Elle n’est pas une de mes  '
  - type: text
    content: disciples
  - type: text
    content: .
  '34':
  - type: text
    content: 'Je vais vous dire pourquoi je suis venu dans le monde. Je ne suis pas venu pour unir les gens. Je suis venu pour : Amener les gens à se séparer. Amener les gens à se battre les uns contre les autres.'
  '35':
  - type: text
    content: Un homme sera contre son père.
  - type: text
    content: Une fille sera contre sa mère.
  - type: text
    content: Une femme sera contre la mère de son mari.
  '36':
  - type: text
    content: La famille d’un homme sera contre lui. 
  '37':
  - type: text
    content: 'Jésus a dit : Un homme doit aimer son père et sa mère moins que moi. Puis il peut être mon  '
  - type: text
    content: disciple
  - type: text
    content: '. Il doit aussi aimer son propre fils ou sa propre fille moins que moi. S’il ne le fait pas, alors il ne peut pas être mon  '
  - type: text
    content: disciple
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Peut‑être, vous voulez être mes  '
  - type: text
    content: disciples
  - type: text
    content: '. Alors ne pensez pas d’abord à vous‑mêmes. Et ne pensez pas à ce que vous voulez faire. Vous devez seulement faire ce que Dieu veut. Vous devez le faire tous les jours. Vous pourriez même mourir. Alors, vous serez réellement mes  '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '39':
  - type: text
    content: Une personne peut vouloir protéger sa vie. Alors elle la perdra. Mais une personne peut mourir, parce qu’elle croit en moi. Et alors cette personne aura la vie pour toujours.
  - type: heading
    content: Jésus enseigne sur les dons de Dieu
  '4':
  - type: text
    content: Simon qui était appelé le Cananite et Judas Iscariote.
  - type: text
    content: C’est lui qui a livré Jésus à ses ennemis.
  - type: heading
    content: Jésus envoie ses 12 Apôtres
  '40':
  - type: text
    content: 'Quelqu’un peut vous recevoir dans sa maison. Alors il me reçoit également. Toute personne qui me reçoit dans sa maison, reçoit aussi Dieu. '
  '41':
  - type: text
    content: 'Quelqu’un peut recevoir un  '
  - type: text
    content: prophète
  - type: text
    content: ' de Dieu dans sa maison. Il le reçoit parce qu’il est '
  - type: text
    content: prophète
  - type: text
    content: ' de Dieu. Alors Dieu lui donnera le même cadeau qu’il donne à un  '
  - type: text
    content: prophète
  - type: text
    content: '. Quelqu’un peut recevoir dans sa maison un homme bon qui obéit à Dieu. Il fait cela, parce que cet homme obéit à Dieu. Alors Dieu donnera à cette personne le même cadeau qu’il donne à cet homme bon. '
  '42':
  - type: text
    content: 'Quelqu’un peut donner juste un verre d’eau froide à l’un de ces petits. Il le fait parce que le petit est mon  '
  - type: text
    content: disciple
  - type: text
    content: . Alors Dieu bénira la personne qui a fait cela. 
  '5':
  - type: text
    content: 'Jésus a envoyé ces 12 hommes. Il leur a dit : N’allez pas vers les gens qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: '. N’entrez pas dans des villes où seulement les  '
  - type: text
    content: Samaritains
  - type: text
    content: ' vivent.'
  '6':
  - type: text
    content: 'Mais, vous devez aller vers le peuple d’Israël. Ils sont comme des brebis perdues. '
  '7':
  - type: text
    content: 'Allez et dites‑leur ce message : Le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: ' est proche.'
  '8':
  - type: text
    content: 'Guérissez les gens malades. Ressuscitez les morts. Guérissez les malades de la  '
  - type: text
    content: lèpre
  - type: text
    content: '. Chassez les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens. Je vous ai donné le pouvoir de faire toutes ces choses. Maintenant, allez et faites toutes ces choses pour d’autres personnes. Ce pouvoir ne vous coûte rien. Donc, ne leur demandez pas de vous payer pour cela.  '
  '9':
  - type: text
    content: 'Ne prenez pas de l’or. '
