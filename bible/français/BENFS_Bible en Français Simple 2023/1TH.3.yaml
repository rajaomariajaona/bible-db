document_id: 1TH.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Timothée a apporté des nouvelles à Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Après un long moment, nous ne pouvions plus être patients. Nous avons donc décidé d’envoyer notre ami Timothée vous rendre visite. Nous avons nous‑mêmes décidé de rester ici à Athènes. Timothée sert Dieu avec nous ici. Il annonce aux gens la Bonne Nouvelle de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Nous vous l’avons envoyé. C’était pour vous aider à croire de plus en plus en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous aurez de nombreux problèmes. Nous ne voulions pas que quiconque parmi vous abandonne '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à cause de cela. Vous savez déjà que nous sommes des croyants. Nous devons donc avoir des problèmes comme ça.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Même lorsque nous étions là avec vous, nous vous avons dit que des problèmes viendront. Nous vous avions dit avant que des problèmes surviennent. Et maintenant, c’est vraiment arrivé. Vous savez que c’est vrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est pourquoi j’ai dû envoyer Timothée chez vous. Je ne pouvais plus patienter sans avoir de vos nouvelles. Je voulais savoir si vous croyiez toujours en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. J’avais peur que Satan vous trompe. Si Satan vous avait détournés de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', notre travail parmi vous allait être pour rien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais maintenant, Timothée est revenu vers nous. Et il nous a dit de bonnes nouvelles à votre sujet. Il nous a dit que vous continuez de croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' et que vous vous aimez les uns les autres. Vous pensez toujours bien à nous. Vous voulez beaucoup nous rencontrer encore. Et nous voulons aussi vous rencontrer. Voilà les nouvelles que Timothée nous a apportées. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ainsi, nous sommes redevenus heureux grâce à vous, nos amis chrétiens. Nous avons encore beaucoup de problèmes, mais nous sommes heureux, parce que vous continuez de croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Oui, nous sommes comme des gens qui sont redevenus vivants. Nous savons que vous êtes forts en croyant au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous remercions beaucoup Dieu pour vous ! Vous nous rendez très heureux lorsque nous parlons de vous à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous prions beaucoup pour vous, de jour comme de nuit. Nous demandons à Dieu de nous donner la chance de vous rendre encore visite. Nous voulons vous aider à comprendre les choses que vous devez encore savoir. Vous pourrez alors croire encore plus en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous prions pour que notre Père Dieu lui‑même et notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus nous préparent le chemin. Nous viendrons ensuite vous rendre visite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous prions pour que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous fasse aimer de plus en plus les gens. Nous vous aimons beaucoup. Nous prions pour que vous vous aimiez les gens beaucoup plus. Nous vous aimons beaucoup. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Dieu vous rendra forts en vous‑mêmes. Vous vivrez d’une manière complètement bonne. Un jour, notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus reviendra avec tous les gens qui lui appartiennent. Alors vous vous tiendrez devant Dieu, notre Père. Il dira que vous n’avez rien fait de mal.'
