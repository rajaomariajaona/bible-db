document_id: 1TH.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Timothée a apporté des nouvelles à Paul
  - type: text
    content: 'Après un long moment, nous ne pouvions plus être patients. Nous avons donc décidé d’envoyer notre ami Timothée vous rendre visite. Nous avons nous‑mêmes décidé de rester ici à Athènes. Timothée sert Dieu avec nous ici. Il annonce aux gens la Bonne Nouvelle de '
  - type: text
    content: Christ
  - type: text
    content: '. Nous vous l’avons envoyé. C’était pour vous aider à croire de plus en plus en '
  - type: text
    content: Christ
  - type: text
    content: .
  '10':
  - type: text
    content: 'Nous prions beaucoup pour vous, de jour comme de nuit. Nous demandons à Dieu de nous donner la chance de vous rendre encore visite. Nous voulons vous aider à comprendre les choses que vous devez encore savoir. Vous pourrez alors croire encore plus en '
  - type: text
    content: Christ
  - type: text
    content: .
  '11':
  - type: text
    content: 'Nous prions pour que notre Père Dieu lui‑même et notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus nous préparent le chemin. Nous viendrons ensuite vous rendre visite.'
  '12':
  - type: text
    content: 'Nous prions pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous fasse aimer de plus en plus les gens. Nous vous aimons beaucoup. Nous prions pour que vous vous aimiez les gens beaucoup plus. Nous vous aimons beaucoup. '
  '13':
  - type: text
    content: 'Alors Dieu vous rendra forts en vous‑mêmes. Vous vivrez d’une manière complètement bonne. Un jour, notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus reviendra avec tous les gens qui lui appartiennent. Alors vous vous tiendrez devant Dieu, notre Père. Il dira que vous n’avez rien fait de mal.'
  '3':
  - type: text
    content: 'Vous aurez de nombreux problèmes. Nous ne voulions pas que quiconque parmi vous abandonne '
  - type: text
    content: Christ
  - type: text
    content: ' à cause de cela. Vous savez déjà que nous sommes des croyants. Nous devons donc avoir des problèmes comme ça.'
  '4':
  - type: text
    content: Même lorsque nous étions là avec vous, nous vous avons dit que des problèmes viendront. Nous vous avions dit avant que des problèmes surviennent. Et maintenant, c’est vraiment arrivé. Vous savez que c’est vrai.
  '5':
  - type: text
    content: 'C’est pourquoi j’ai dû envoyer Timothée chez vous. Je ne pouvais plus patienter sans avoir de vos nouvelles. Je voulais savoir si vous croyiez toujours en '
  - type: text
    content: Christ
  - type: text
    content: '. J’avais peur que Satan vous trompe. Si Satan vous avait détournés de '
  - type: text
    content: Christ
  - type: text
    content: ', notre travail parmi vous allait être pour rien.'
  '6':
  - type: text
    content: 'Mais maintenant, Timothée est revenu vers nous. Et il nous a dit de bonnes nouvelles à votre sujet. Il nous a dit que vous continuez de croire en '
  - type: text
    content: Christ
  - type: text
    content: ' et que vous vous aimez les uns les autres. Vous pensez toujours bien à nous. Vous voulez beaucoup nous rencontrer encore. Et nous voulons aussi vous rencontrer. Voilà les nouvelles que Timothée nous a apportées. '
  '7':
  - type: text
    content: 'Ainsi, nous sommes redevenus heureux grâce à vous, nos amis chrétiens. Nous avons encore beaucoup de problèmes, mais nous sommes heureux, parce que vous continuez de croire en '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Oui, nous sommes comme des gens qui sont redevenus vivants. Nous savons que vous êtes forts en croyant au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: 'Nous remercions beaucoup Dieu pour vous ! Vous nous rendez très heureux lorsque nous parlons de vous à Dieu. '
