document_id: ACT.12
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 12
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le roi Hérode maltraite les croyants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A ce moment‑là, le roi Hérode a commencé à maltraiter certains croyants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hérode a envoyé ses soldats pour tuer Jacques avec un grand couteau pointu. Jacques était le frère de Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient heureux, parce que les soldats d’Hérode avaient tué Jacques. A cause de cela, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient contents du roi Hérode. Alors le roi Hérode a envoyé ses soldats pour attraper Pierre. Ceci s’est produit pendant la semaine. C’était le moment où les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont fait leurs pains sans levain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après que les soldats ont attrapé Pierre, ils l’ont mis en prison. Quand il était en prison, 4 groupes différents de soldats le gardaient. Il y avait 4 hommes dans chaque groupe. Hérode a voulu que Pierre soit devant un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '. Il voulait le faire juger devant le peuple après la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ainsi Hérode a maintenu Pierre dans la prison. Mais quand il était en prison, les croyants priaient Dieu pour lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre marche hors de la prison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’était la nuit et Pierre était dans la prison. Hérode a voulu qu’il soit devant le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' le matin suivant. Les soldats ont lié Pierre avec des chaînes. Et alors ils ont lié ces chaînes à 2 autres soldats. Donc il y avait un soldat de chaque côté de Pierre quand il dormait. Quelques soldats gardaient la porte de la prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' de Dieu est brusquement apparu dans la prison. Il s’est tenu près de l’endroit où Pierre dormait. Une grande lumière brillait également dans la prison. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a touché l’épaule de Pierre. Il a réveillé Pierre. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a dit : Fais vite, Pierre ! Lève‑toi ! Et immédiatement les chaînes sont tombées des mains de Pierre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors, l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a dit : Mets ta ceinture autour de tes vêtements et mets tes chaussures. Ainsi Pierre a fait ce que l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' lui avait demandé de faire. Alors l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a dit : Porte ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: ' et suis‑moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ainsi Pierre suivait l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' en dehors de la prison. Pierre n’était pas sûr que toutes ces choses lui arrivaient vraiment. Il pensait que c’était une vision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pierre et l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' marchaient. Ils ont dépassé le premier groupe de soldats dans la prison. Alors ils marchaient et ils ont dépassé le second groupe de soldats. Après cela, ils sont arrivés à la grande porte en fer de la prison. La ville était en dehors de cette porte. La porte s’est ouverte d’elle‑même devant eux. Ainsi Pierre et l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' ont marché hors de la prison dans la ville. Ils marchaient ensemble le long d’une rue. Mais brusquement l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' est parti.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Pierre a compris ce qui lui était arrivé. Il s’est dit : Maintenant je sais que ces choses me sont vraiment arrivées. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m’a envoyé un de ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' voulaient que le roi Hérode me fasse de mauvaises choses. Mais l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' m’a sauvé d’Hérode.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Pierre a compris toutes ces choses, il est allé à la maison de Marie. Elle était la mère de Jean Marc. Beaucoup de gens se réunissaient ensemble dans sa maison. Ils priaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pierre frappait à la porte extérieure de la maison. Une fille de la servante appelée Rhode est venue à la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle a reconnu la voix de Pierre et elle était très heureuse. Mais elle n’a pas ouvert la porte. Mais elle a couru de nouveau dans la maison et elle a parlé à toutes les personnes là. Elle leur a dit : Pierre est debout en dehors de la porte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les personnes dans la maison disaient : Tu es folle. Mais elle leur a dit encore que Pierre était vraiment là. Alors ils ont dit : C’est son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quand tout ceci se produisait, Pierre frappait toujours à la porte. Alors quelqu’un a ouvert la porte. Et ils étaient tous très étonnés quand ils l’ont vu là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pierre a fait un signe de la main, de sorte qu’ils soient tous silencieux. Alors il leur a expliqué comment le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l’avait amené hors de la prison. Il a dit : Dites à Jacques et tous les autres croyants ce qui m’est arrivé. Ensuite, il a quitté la maison et il est parti dans un autre endroit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand c’était le matin, il y avait beaucoup de troubles à la prison. Les soldats à la prison n’ont pas compris ce qui était arrivé à Pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hérode a dit aux soldats : Allez chercher Pierre ! Mais ils ne pouvaient pas le trouver. Hérode a posé aux soldats quelques questions sur ce qu’ils avaient fait. Et alors, il a commandé à d’autres soldats de mettre à mort ces hommes qui ont laissé Pierre partir. Après cela, Hérode est allé loin de Judée. Il est resté à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' pendant un certain temps.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le roi Hérode meurt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'À ce moment‑là, Hérode était très fâché contre le peuple qui habitait à Tyr et à Sidon. Un groupe d’hommes de ces villes est allé ensemble parler à Hérode de ce problème. Un homme appelé Blaste était un serviteur important. Il était dans la maison du roi Hérode. Le groupe a dit à Blaste : Aide‑nous quand nous parlons à Hérode. Alors le groupe est allé parler à Hérode : Cesse d’être fâché contre notre peuple. Nous voulons que tu sois notre ami. Ils lui ont dit : Nous devons venir dans ton pays pour acheter notre nourriture.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hérode a fixé le jour pour parler au peuple. Ce jour‑là, il a porté ses beaux vêtements et il s’est assis sur son siège spécial. Et alors il parlait à tous les gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les gens criaient : Ce n’est pas un homme qui nous parle. C’est un dieu ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hérode n’a pas voulu montrer que seul Dieu est très grand et puissant. Immédiatement l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a rendu Hérode malade. Les vers ont mangé le corps d’Hérode et il est mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Partout où les croyants allaient, ils disaient aux gens le message de Dieu au sujet de Jésus. Ainsi les gens entendaient le message et ils croyaient en Jésus. C’était dans plusieurs endroits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Barnabas et Saul ont fini leur travail. Ils sont retournés de Jérusalem. Et Jean Marc est venu de Jérusalem avec eux.
