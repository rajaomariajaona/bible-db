document_id: ACT.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: Le roi Hérode maltraite les croyants
  - type: text
    content: 'A ce moment‑là, le roi Hérode a commencé à maltraiter certains croyants. '
  '10':
  - type: text
    content: Pierre et l’
  - type: text
    content: ange
  - type: text
    content: ' marchaient. Ils ont dépassé le premier groupe de soldats dans la prison. Alors ils marchaient et ils ont dépassé le second groupe de soldats. Après cela, ils sont arrivés à la grande porte en fer de la prison. La ville était en dehors de cette porte. La porte s’est ouverte d’elle‑même devant eux. Ainsi Pierre et l’'
  - type: text
    content: ange
  - type: text
    content: ' ont marché hors de la prison dans la ville. Ils marchaient ensemble le long d’une rue. Mais brusquement l’'
  - type: text
    content: ange
  - type: text
    content: ' est parti.'
  '11':
  - type: text
    content: 'Alors Pierre a compris ce qui lui était arrivé. Il s’est dit : Maintenant je sais que ces choses me sont vraiment arrivées. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m’a envoyé un de ses '
  - type: text
    content: anges
  - type: text
    content: '. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' voulaient que le roi Hérode me fasse de mauvaises choses. Mais l’'
  - type: text
    content: ange
  - type: text
    content: ' m’a sauvé d’Hérode.'
  '12':
  - type: text
    content: 'Quand Pierre a compris toutes ces choses, il est allé à la maison de Marie. Elle était la mère de Jean Marc. Beaucoup de gens se réunissaient ensemble dans sa maison. Ils priaient. '
  '13':
  - type: text
    content: 'Pierre frappait à la porte extérieure de la maison. Une fille de la servante appelée Rhode est venue à la porte. '
  '14':
  - type: text
    content: 'Elle a reconnu la voix de Pierre et elle était très heureuse. Mais elle n’a pas ouvert la porte. Mais elle a couru de nouveau dans la maison et elle a parlé à toutes les personnes là. Elle leur a dit : Pierre est debout en dehors de la porte.'
  '15':
  - type: text
    content: 'Les personnes dans la maison disaient : Tu es folle. Mais elle leur a dit encore que Pierre était vraiment là. Alors ils ont dit : C’est son '
  - type: text
    content: ange
  - type: text
    content: .
  '16':
  - type: text
    content: 'Quand tout ceci se produisait, Pierre frappait toujours à la porte. Alors quelqu’un a ouvert la porte. Et ils étaient tous très étonnés quand ils l’ont vu là. '
  '17':
  - type: text
    content: 'Pierre a fait un signe de la main, de sorte qu’ils soient tous silencieux. Alors il leur a expliqué comment le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l’avait amené hors de la prison. Il a dit : Dites à Jacques et tous les autres croyants ce qui m’est arrivé. Ensuite, il a quitté la maison et il est parti dans un autre endroit. '
  '18':
  - type: text
    content: Quand c’était le matin, il y avait beaucoup de troubles à la prison. Les soldats à la prison n’ont pas compris ce qui était arrivé à Pierre.
  '19':
  - type: text
    content: 'Hérode a dit aux soldats : Allez chercher Pierre ! Mais ils ne pouvaient pas le trouver. Hérode a posé aux soldats quelques questions sur ce qu’ils avaient fait. Et alors, il a commandé à d’autres soldats de mettre à mort ces hommes qui ont laissé Pierre partir. Après cela, Hérode est allé loin de Judée. Il est resté à '
  - type: text
    content: Césarée
  - type: text
    content: ' pendant un certain temps.'
  - type: heading
    content: Le roi Hérode meurt
  '2':
  - type: text
    content: 'Hérode a envoyé ses soldats pour tuer Jacques avec un grand couteau pointu. Jacques était le frère de Jean. '
  '20':
  - type: text
    content: 'À ce moment‑là, Hérode était très fâché contre le peuple qui habitait à Tyr et à Sidon. Un groupe d’hommes de ces villes est allé ensemble parler à Hérode de ce problème. Un homme appelé Blaste était un serviteur important. Il était dans la maison du roi Hérode. Le groupe a dit à Blaste : Aide‑nous quand nous parlons à Hérode. Alors le groupe est allé parler à Hérode : Cesse d’être fâché contre notre peuple. Nous voulons que tu sois notre ami. Ils lui ont dit : Nous devons venir dans ton pays pour acheter notre nourriture.'
  '21':
  - type: text
    content: 'Hérode a fixé le jour pour parler au peuple. Ce jour‑là, il a porté ses beaux vêtements et il s’est assis sur son siège spécial. Et alors il parlait à tous les gens. '
  '22':
  - type: text
    content: 'Les gens criaient : Ce n’est pas un homme qui nous parle. C’est un dieu ! '
  '23':
  - type: text
    content: Hérode n’a pas voulu montrer que seul Dieu est très grand et puissant. Immédiatement l’
  - type: text
    content: ange
  - type: text
    content: ' du '
  - type: text
    content: Seigneur
  - type: text
    content: ' a rendu Hérode malade. Les vers ont mangé le corps d’Hérode et il est mort.'
  '24':
  - type: text
    content: Partout où les croyants allaient, ils disaient aux gens le message de Dieu au sujet de Jésus. Ainsi les gens entendaient le message et ils croyaient en Jésus. C’était dans plusieurs endroits.
  '25':
  - type: text
    content: Barnabas et Saul ont fini leur travail. Ils sont retournés de Jérusalem. Et Jean Marc est venu de Jérusalem avec eux.
  '3':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient heureux, parce que les soldats d’Hérode avaient tué Jacques. A cause de cela, les '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient contents du roi Hérode. Alors le roi Hérode a envoyé ses soldats pour attraper Pierre. Ceci s’est produit pendant la semaine. C’était le moment où les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont fait leurs pains sans levain. '
  '4':
  - type: text
    content: 'Après que les soldats ont attrapé Pierre, ils l’ont mis en prison. Quand il était en prison, 4 groupes différents de soldats le gardaient. Il y avait 4 hommes dans chaque groupe. Hérode a voulu que Pierre soit devant un '
  - type: text
    content: juge
  - type: text
    content: '. Il voulait le faire juger devant le peuple après la '
  - type: text
    content: Pâque
  - type: text
    content: .
  '5':
  - type: text
    content: Ainsi Hérode a maintenu Pierre dans la prison. Mais quand il était en prison, les croyants priaient Dieu pour lui.
  - type: heading
    content: Pierre marche hors de la prison
  '6':
  - type: text
    content: 'C’était la nuit et Pierre était dans la prison. Hérode a voulu qu’il soit devant le '
  - type: text
    content: juge
  - type: text
    content: ' le matin suivant. Les soldats ont lié Pierre avec des chaînes. Et alors ils ont lié ces chaînes à 2 autres soldats. Donc il y avait un soldat de chaque côté de Pierre quand il dormait. Quelques soldats gardaient la porte de la prison. '
  '7':
  - type: text
    content: 'Un '
  - type: text
    content: ange
  - type: text
    content: ' de Dieu est brusquement apparu dans la prison. Il s’est tenu près de l’endroit où Pierre dormait. Une grande lumière brillait également dans la prison. L’'
  - type: text
    content: ange
  - type: text
    content: ' a touché l’épaule de Pierre. Il a réveillé Pierre. L’'
  - type: text
    content: ange
  - type: text
    content: ' a dit : Fais vite, Pierre ! Lève‑toi ! Et immédiatement les chaînes sont tombées des mains de Pierre.'
  '8':
  - type: text
    content: Alors, l’
  - type: text
    content: ange
  - type: text
    content: ' a dit : Mets ta ceinture autour de tes vêtements et mets tes chaussures. Ainsi Pierre a fait ce que l’'
  - type: text
    content: ange
  - type: text
    content: ' lui avait demandé de faire. Alors l’'
  - type: text
    content: ange
  - type: text
    content: ' a dit : Porte ton '
  - type: text
    content: manteau
  - type: text
    content: ' et suis‑moi. '
  '9':
  - type: text
    content: Ainsi Pierre suivait l’
  - type: text
    content: ange
  - type: text
    content: ' en dehors de la prison. Pierre n’était pas sûr que toutes ces choses lui arrivaient vraiment. Il pensait que c’était une vision. '
