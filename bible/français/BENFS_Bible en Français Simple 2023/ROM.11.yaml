document_id: ROM.11,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 11
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Certaines personnes d’Israël croient en Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je pose donc la question suivante : Dieu a‑t‑il abandonné son peuple ? Non, certainement, il n’a pas fait ça ! J’appartiens moi‑même au peuple d’Israël. Je suis un descendant d’Abraham et j’appartiens au groupe familial de Benjamin. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux que leurs yeux deviennent sombres, afin qu’ils ne puissent pas voir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux que leurs corps souffrent toujours, comme des esclaves.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors maintenant, je pose la question : Quand le peuple d’Israël n’a pas accepté Jésus comme le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' de Dieu, s’est‑il séparé de Dieu pour toujours ? Non, ce n’est pas vrai ! À cause de leur erreur, Dieu sauve maintenant les non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Dieu fait cela pour que le peuple d’Israël devienne jaloux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À cause de leur erreur, Dieu a fait de bonnes choses pour tous dans le monde. Le peuple d’Israël n’a pas reçu ce que Dieu voulait lui donner. En conséquence, les non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont reçu beaucoup de bonnes choses de Dieu. Cela était un bon résultat lorsque le peuple d’Israël a échoué. Ainsi, lorsque le nombre complet du peuple d’Israël se tournera vers Dieu, le résultat sera encore meilleur !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Paul parle aux non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je vous parle, vous qui êtes des non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Dieu m’a envoyé pour être son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: ' aux non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Je le remercie de m’avoir confié cet important travail. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’espère que mon travail parmi vous, non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', rendra mon propre peuple jaloux. En conséquence, certains d’entre eux peuvent se tourner vers Dieu pour qu’il les sauve. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque Dieu s’est détourné du peuple d’Israël, il a alors accepté d’autres gens dans le monde comme ses amis. Ainsi, lorsque Dieu acceptera le peuple d’Israël, le résultat sera encore meilleur ! Ce sera comme des morts qui sont redevenus vivants !
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous offrez le premier morceau de pain à Dieu, alors tout le pain appartiendra à Dieu. Si les racines d’un arbre appartiennent à Dieu, alors les branches seront aussi les siennes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple d’Israël est comme un olivier qu’un agriculteur a planté. Mais Dieu a coupé certaines branches de cet arbre. Puis il a pris une branche d’un olivier sauvage. Il a mis cette branche sauvage dans l’arbre de l’agriculteur pour en faire partie. Vous, les non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', vous êtes comme la branche sauvage. Maintenant, vous recevez de la nourriture de la racine de l’arbre de l’agriculteur, pour vous fortifier. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple d’Israël est comme les branches que Dieu a coupées. Mais vous ne devez pas penser que vous êtes meilleurs que ces branches. N’oubliez pas que vous n’êtes encore qu’une branche. Vous ne rendez pas la racine forte. Non, c’est la racine qui vous retient et vous rend forts.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous pourriez dire : Dieu a coupé les branches pour que je puisse faire partie de l’arbre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a choisi qui sera son peuple depuis le début. Il ne l’a pas abandonné maintenant. Rappelez‑vous ce que la Bible nous dit sur Élie. Il voulait que Dieu punisse le peuple d’Israël. Élie a dit : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est vrai. Dieu les a coupées, parce qu’elles ne croyaient pas en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Dieu vous a acceptés comme faisant partie de l’arbre, parce que vous croyez en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Alors, ne devenez pas fiers. Au lieu de cela, ayez peur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a coupé les branches appropriées et il ne les a pas laissées rester sur l’arbre. Donc, si vous ne lui faites plus confiance, il ne vous laissera pas non plus rester.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donc, vous devez penser à ce que Dieu est. Il est gentil, mais il punit aussi les gens. Il a puni le peuple d’Israël, parce qu’il s’est détourné de lui. Il a été gentil avec vous. Mais vous devez continuer d’accepter son aimable cadeau. Si vous ne le faites pas, il vous détachera également de son arbre.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu peut à nouveau accepter le peuple d’Israël. S’ils viennent à croire en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', Dieu les remettra comme faisant partie de l’arbre. Il est capable de les faire redevenir des branches de l’arbre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu vous a coupés comme des branches d’un olivier sauvage. Puis il vous a mis dans l’arbre de l’agriculteur pour que vous en fassiez partie. Il pouvait le faire même si ce n’était pas votre propre arbre auparavant. Ainsi, Dieu pourra faire cela pour le peuple d’Israël. Il peut facilement les remettre dans leur propre arbre, dont ils faisaient partie auparavant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu sauvera le peuple d’Israël
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mes amis chrétiens, je veux vous aider à comprendre le peuple d’Israël. C’est un secret que Dieu nous a montré. Si vous le comprenez vraiment, vous ne serez pas fiers d’être très intelligents. Beaucoup de gens d’Israël ont refusé de croire en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Ils continueront de le refuser jusqu’à ce que le nombre total des non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' puisse croire. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand cela arrivera, Dieu sauvera tout le peuple d’Israël. Ceci est écrit dans la Bible :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Celui qui sauvera viendra de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sion
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il détournera le peuple de Jacob de ses péchés.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai cet accord avec eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur pardonnerai leurs péchés.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple d’Israël est devenu l’ennemi de Dieu, parce qu’il a refusé de croire à la Bonne Nouvelle de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Cela est arrivé pour vous aider, vous les non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Mais Dieu aime toujours le peuple d’Israël, parce qu’il l’a choisi comme son propre peuple. C’est ce qu’il a promis à leurs ancêtres. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les pensées de Dieu sur son peuple ne peuvent pas changer. Il les a bénis avec des cadeaux et il les a choisis pour lui appartenir.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu, ils ont tué tes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: '. Ils ont détruit les autels où les gens t’ont offert des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: '. Je suis la seule personne vivante qui te sert encore. Et ils essaient de me tuer. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans les temps passés, vous les non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', vous n’avez pas obéi à Dieu. Mais maintenant, Dieu a été très gentil avec vous, parce que le peuple d’Israël a refusé de lui obéir. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils n’obéissent pas à Dieu maintenant. En conséquence, Dieu a été très gentil avec vous. Cela s’est fait, afin que Dieu soit maintenant très gentil avec eux aussi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu dit que tout le monde est fautif, parce qu’il ne lui obéit pas. Il le dit pour être gentil et pardonner à tout le monde.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une louange à Dieu
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui ! Dieu est très grand ! Il a tout ! Il sait et il comprend tout ! Personne ne peut comprendre complètement les choses qu’il décide. Personne ne peut expliquer comment il travaille. '
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La Bible dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Personne ne connaît les pensées du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne n’est en mesure de lui dire ce qu’il doit faire.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne n’a jamais rien donné à Dieu, afin que Dieu ait une dette à leur rembourser.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est Dieu qui a fait toutes choses. Il fait aussi que tout continue. Et tout est là pour montrer à quel point il est grand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous le louons ! Il est grand pour toujours ! Amen. C’est vrai !
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la réponse de Dieu à Élie : Il y a encore 7 000 hommes que j’ai gardés pour moi. Ces hommes n’ont pas adoré le faux dieu Baal.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est la même chose en ce moment aussi. Il y a un petit nombre de gens d’Israël que Dieu a choisis de croire en lui. Il les a choisis, parce qu’il est très gentil. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cela montre que Dieu ne les a pas choisis en raison de toutes les bonnes choses qu’ils ont faites. Si c’était vrai, nous ne pourrions pas dire que Dieu était vraiment gentil avec eux. Ce ne serait pas son cadeau.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, nous pouvons dire ceci : Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélites
    - type: text
      text: ' n’ont pas tous trouvé ce qu’ils cherchaient. Seuls les gens que Dieu avait choisis l’ont reçu. Mais les autres peuples d’Israël sont devenus incapables de comprendre le message de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est dit ceci dans la Bible :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu les a fait ressembler à des gens qui dorment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même jusqu’à ce jour, leurs yeux ne peuvent pas vraiment voir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs oreilles ne peuvent pas vraiment entendre.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi David dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils aiment manger beaucoup de bonne nourriture ensemble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prie que Dieu les attrape pendant qu’ils mangent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux que ces bonnes choses leur causent des problèmes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux que Dieu les punisse à cause de ce qu’ils ont fait.
