document_id: ROM.11,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 11
  - type: heading
    content: Certaines personnes d’Israël croient en Dieu
  - type: text
    content: 'Je pose donc la question suivante : Dieu a‑t‑il abandonné son peuple ? Non, certainement, il n’a pas fait ça ! J’appartiens moi‑même au peuple d’Israël. Je suis un descendant d’Abraham et j’appartiens au groupe familial de Benjamin. '
  '10':
  - type: text
    content: Je veux que leurs yeux deviennent sombres, afin qu’ils ne puissent pas voir.
  - type: text
    content: Je veux que leurs corps souffrent toujours, comme des esclaves.
  '11':
  - type: text
    content: 'Alors maintenant, je pose la question : Quand le peuple d’Israël n’a pas accepté Jésus comme le '
  - type: text
    content: Messie
  - type: text
    content: ' de Dieu, s’est‑il séparé de Dieu pour toujours ? Non, ce n’est pas vrai ! À cause de leur erreur, Dieu sauve maintenant les non '
  - type: text
    content: Juifs
  - type: text
    content: '. Dieu fait cela pour que le peuple d’Israël devienne jaloux. '
  '12':
  - type: text
    content: 'À cause de leur erreur, Dieu a fait de bonnes choses pour tous dans le monde. Le peuple d’Israël n’a pas reçu ce que Dieu voulait lui donner. En conséquence, les non '
  - type: text
    content: Juifs
  - type: text
    content: ' ont reçu beaucoup de bonnes choses de Dieu. Cela était un bon résultat lorsque le peuple d’Israël a échoué. Ainsi, lorsque le nombre complet du peuple d’Israël se tournera vers Dieu, le résultat sera encore meilleur !'
  - type: heading
    content: Paul parle aux non Juifs
  '13':
  - type: text
    content: 'Maintenant, je vous parle, vous qui êtes des non '
  - type: text
    content: Juifs
  - type: text
    content: '. Dieu m’a envoyé pour être son '
  - type: text
    content: apôtre
  - type: text
    content: ' aux non '
  - type: text
    content: Juifs
  - type: text
    content: '. Je le remercie de m’avoir confié cet important travail. '
  '14':
  - type: text
    content: 'J’espère que mon travail parmi vous, non '
  - type: text
    content: Juifs
  - type: text
    content: ', rendra mon propre peuple jaloux. En conséquence, certains d’entre eux peuvent se tourner vers Dieu pour qu’il les sauve. '
  '15':
  - type: text
    content: Lorsque Dieu s’est détourné du peuple d’Israël, il a alors accepté d’autres gens dans le monde comme ses amis. Ainsi, lorsque Dieu acceptera le peuple d’Israël, le résultat sera encore meilleur ! Ce sera comme des morts qui sont redevenus vivants !
  '16':
  - type: text
    content: Si vous offrez le premier morceau de pain à Dieu, alors tout le pain appartiendra à Dieu. Si les racines d’un arbre appartiennent à Dieu, alors les branches seront aussi les siennes.
  '17':
  - type: text
    content: 'Le peuple d’Israël est comme un olivier qu’un agriculteur a planté. Mais Dieu a coupé certaines branches de cet arbre. Puis il a pris une branche d’un olivier sauvage. Il a mis cette branche sauvage dans l’arbre de l’agriculteur pour en faire partie. Vous, les non '
  - type: text
    content: Juifs
  - type: text
    content: ', vous êtes comme la branche sauvage. Maintenant, vous recevez de la nourriture de la racine de l’arbre de l’agriculteur, pour vous fortifier. '
  '18':
  - type: text
    content: Le peuple d’Israël est comme les branches que Dieu a coupées. Mais vous ne devez pas penser que vous êtes meilleurs que ces branches. N’oubliez pas que vous n’êtes encore qu’une branche. Vous ne rendez pas la racine forte. Non, c’est la racine qui vous retient et vous rend forts.
  '19':
  - type: text
    content: 'Vous pourriez dire : Dieu a coupé les branches pour que je puisse faire partie de l’arbre. '
  '2':
  - type: text
    content: 'Dieu a choisi qui sera son peuple depuis le début. Il ne l’a pas abandonné maintenant. Rappelez‑vous ce que la Bible nous dit sur Élie. Il voulait que Dieu punisse le peuple d’Israël. Élie a dit : '
  '20':
  - type: text
    content: 'C’est vrai. Dieu les a coupées, parce qu’elles ne croyaient pas en '
  - type: text
    content: Christ
  - type: text
    content: . Dieu vous a acceptés comme faisant partie de l’arbre, parce que vous croyez en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Alors, ne devenez pas fiers. Au lieu de cela, ayez peur. '
  '21':
  - type: text
    content: Dieu a coupé les branches appropriées et il ne les a pas laissées rester sur l’arbre. Donc, si vous ne lui faites plus confiance, il ne vous laissera pas non plus rester.
  '22':
  - type: text
    content: Donc, vous devez penser à ce que Dieu est. Il est gentil, mais il punit aussi les gens. Il a puni le peuple d’Israël, parce qu’il s’est détourné de lui. Il a été gentil avec vous. Mais vous devez continuer d’accepter son aimable cadeau. Si vous ne le faites pas, il vous détachera également de son arbre.
  '23':
  - type: text
    content: Dieu peut à nouveau accepter le peuple d’Israël. S’ils viennent à croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', Dieu les remettra comme faisant partie de l’arbre. Il est capable de les faire redevenir des branches de l’arbre. '
  '24':
  - type: text
    content: Dieu vous a coupés comme des branches d’un olivier sauvage. Puis il vous a mis dans l’arbre de l’agriculteur pour que vous en fassiez partie. Il pouvait le faire même si ce n’était pas votre propre arbre auparavant. Ainsi, Dieu pourra faire cela pour le peuple d’Israël. Il peut facilement les remettre dans leur propre arbre, dont ils faisaient partie auparavant.
  - type: heading
    content: Dieu sauvera le peuple d’Israël
  '25':
  - type: text
    content: Mes amis chrétiens, je veux vous aider à comprendre le peuple d’Israël. C’est un secret que Dieu nous a montré. Si vous le comprenez vraiment, vous ne serez pas fiers d’être très intelligents. Beaucoup de gens d’Israël ont refusé de croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Ils continueront de le refuser jusqu’à ce que le nombre total des non '
  - type: text
    content: Juifs
  - type: text
    content: ' puisse croire. '
  '26':
  - type: text
    content: 'Quand cela arrivera, Dieu sauvera tout le peuple d’Israël. Ceci est écrit dans la Bible :'
  - type: text
    content: 'Celui qui sauvera viendra de '
  - type: text
    content: Sion
  - type: text
    content: .
  - type: text
    content: Il détournera le peuple de Jacob de ses péchés.
  '27':
  - type: text
    content: Et je ferai cet accord avec eux.
  - type: text
    content: Je leur pardonnerai leurs péchés.
  '28':
  - type: text
    content: Le peuple d’Israël est devenu l’ennemi de Dieu, parce qu’il a refusé de croire à la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Cela est arrivé pour vous aider, vous les non '
  - type: text
    content: Juifs
  - type: text
    content: '. Mais Dieu aime toujours le peuple d’Israël, parce qu’il l’a choisi comme son propre peuple. C’est ce qu’il a promis à leurs ancêtres. '
  '29':
  - type: text
    content: Les pensées de Dieu sur son peuple ne peuvent pas changer. Il les a bénis avec des cadeaux et il les a choisis pour lui appartenir.
  '3':
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, ils ont tué tes '
  - type: text
    content: prophètes
  - type: text
    content: '. Ils ont détruit les autels où les gens t’ont offert des '
  - type: text
    content: sacrifices
  - type: text
    content: '. Je suis la seule personne vivante qui te sert encore. Et ils essaient de me tuer. '
  '30':
  - type: text
    content: 'Dans les temps passés, vous les non '
  - type: text
    content: Juifs
  - type: text
    content: ', vous n’avez pas obéi à Dieu. Mais maintenant, Dieu a été très gentil avec vous, parce que le peuple d’Israël a refusé de lui obéir. '
  '31':
  - type: text
    content: 'Ils n’obéissent pas à Dieu maintenant. En conséquence, Dieu a été très gentil avec vous. Cela s’est fait, afin que Dieu soit maintenant très gentil avec eux aussi. '
  '32':
  - type: text
    content: Dieu dit que tout le monde est fautif, parce qu’il ne lui obéit pas. Il le dit pour être gentil et pardonner à tout le monde.
  - type: heading
    content: Une louange à Dieu
  '33':
  - type: text
    content: 'Oui ! Dieu est très grand ! Il a tout ! Il sait et il comprend tout ! Personne ne peut comprendre complètement les choses qu’il décide. Personne ne peut expliquer comment il travaille. '
  '34':
  - type: text
    content: 'La Bible dit ceci :'
  - type: text
    content: 'Personne ne connaît les pensées du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu.'
  - type: text
    content: Personne n’est en mesure de lui dire ce qu’il doit faire.
  '35':
  - type: text
    content: Personne n’a jamais rien donné à Dieu, afin que Dieu ait une dette à leur rembourser.
  '36':
  - type: text
    content: C’est Dieu qui a fait toutes choses. Il fait aussi que tout continue. Et tout est là pour montrer à quel point il est grand.
  - type: text
    content: Nous le louons ! Il est grand pour toujours ! Amen. C’est vrai !
  '4':
  - type: text
    content: 'Voici la réponse de Dieu à Élie : Il y a encore 7 000 hommes que j’ai gardés pour moi. Ces hommes n’ont pas adoré le faux dieu Baal.'
  '5':
  - type: text
    content: 'C’est la même chose en ce moment aussi. Il y a un petit nombre de gens d’Israël que Dieu a choisis de croire en lui. Il les a choisis, parce qu’il est très gentil. '
  '6':
  - type: text
    content: Cela montre que Dieu ne les a pas choisis en raison de toutes les bonnes choses qu’ils ont faites. Si c’était vrai, nous ne pourrions pas dire que Dieu était vraiment gentil avec eux. Ce ne serait pas son cadeau.
  '7':
  - type: text
    content: 'Ainsi, nous pouvons dire ceci : Les '
  - type: text
    content: Israélites
  - type: text
    content: ' n’ont pas tous trouvé ce qu’ils cherchaient. Seuls les gens que Dieu avait choisis l’ont reçu. Mais les autres peuples d’Israël sont devenus incapables de comprendre le message de Dieu. '
  '8':
  - type: text
    content: 'Il est dit ceci dans la Bible :'
  - type: text
    content: Dieu les a fait ressembler à des gens qui dorment.
  - type: text
    content: Même jusqu’à ce jour, leurs yeux ne peuvent pas vraiment voir,
  - type: text
    content: Et leurs oreilles ne peuvent pas vraiment entendre.
  '9':
  - type: text
    content: 'Le roi David dit ceci :'
  - type: text
    content: Ils aiment manger beaucoup de bonne nourriture ensemble.
  - type: text
    content: Je prie que Dieu les attrape pendant qu’ils mangent !
  - type: text
    content: Je veux que ces bonnes choses leur causent des problèmes.
  - type: text
    content: Je veux que Dieu les punisse à cause de ce qu’ils ont fait.
