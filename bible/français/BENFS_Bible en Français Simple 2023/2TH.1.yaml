document_id: 2TH.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: text
    content: Cette lettre vient de Paul, Silas et Timothée.
  - type: text
    content: 'Nous écrivons aux gens de l’Église de Thessalonique. Vous appartenez à Dieu notre Père et au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '10':
  - type: text
    content: 'Cela arrivera lorsque Jésus viendra ce jour spécial. Son propre peuple le louera pour les grandes choses qu’il a faites pour lui. Nous tous qui sommes croyants, nous serons surpris de voir sa grande puissance. Cela vous concerne aussi, parce que vous avez cru à notre message sur le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus.'
  - type: heading
    content: Paul prie pour les croyants
  '11':
  - type: text
    content: 'Ainsi, nous prions toujours pour vous. Notre Dieu vous a choisis pour être son propre peuple. Nous prions pour qu’il vous aide, afin que vous continuiez à lui plaire. Nous prions également que Dieu travaille puissamment en vous. Ensuite, vous pourrez faire toutes les bonnes choses que vous voulez faire. Vous ferez les choses que vous voulez faire, parce que vous faites confiance en Dieu. '
  '12':
  - type: text
    content: 'En conséquence, les gens loueront notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus à cause de votre façon de vivre. Vous recevrez également des louanges, car vous appartenez à Jésus. Tout cela est possible, parce que notre Dieu et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' sont très gentils.'
  '2':
  - type: text
    content: 'Nous prions pour que Dieu, le Père et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continuent de vous aider. Nous prions pour qu’ils vous donnent la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: .
  - type: heading
    content: Paul remercie Dieu à cause des croyants de Thessalonique
  '3':
  - type: text
    content: 'Nos amis chrétiens, nous devons toujours remercier Dieu à cause de vous. Il est juste que nous le fassions, car vous apprenez de plus en plus à croire en '
  - type: text
    content: Christ
  - type: text
    content: '. Vous aussi, vous vous aimez de plus en plus. '
  '4':
  - type: text
    content: En conséquence, nous sommes fiers de parler de vous aux croyants des autres Églises. Nous leur disons comment vous continuez de faire confiance en Dieu dans vos nombreux problèmes. Vous êtes patients et courageux, même lorsque les gens vous font beaucoup souffrir.
  '5':
  - type: text
    content: 'Cela nous montre que Dieu '
  - type: text
    content: juge
  - type: text
    content: ' les gens d’une manière juste. Maintenant, vous avez beaucoup de problèmes, parce que vous appartenez au '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: . Cela montre que Dieu vous accepte comme le peuple qu’il dirige.
  '6':
  - type: text
    content: 'Dieu punira ceux qui vous causent des problèmes. Il leur causera des problèmes. Cela est correct et juste. '
  '7':
  - type: text
    content: 'Dieu fera aussi ce qui est correct et juste pour vous. Vous avez des problèmes maintenant. Mais un jour, Dieu permettra de vous reposer avec nous. Cela se produira lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus descendra du '
  - type: text
    content: ciel
  - type: text
    content: '. Il viendra avec ses puissants '
  - type: text
    content: anges
  - type: text
    content: ', '
  '8':
  - type: text
    content: 'et avec un feu très chaud. Il punira ces gens qui ne connaissent pas Dieu. Oui, il punira ceux qui n’obéissent pas à la Bonne Nouvelle de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. '
  '9':
  - type: text
    content: 'Leur punition continuera éternellement, comme Dieu les détruira. Il les éloignera du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils ne verront jamais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ni sa grande puissance.'
