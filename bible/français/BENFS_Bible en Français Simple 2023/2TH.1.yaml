document_id: 2TH.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cette lettre vient de Paul, Silas et Timothée.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nous écrivons aux gens de l’Église de Thessalonique. Vous appartenez à Dieu notre Père et au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous prions pour que Dieu, le Père et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continuent de vous aider. Nous prions pour qu’ils vous donnent la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul remercie Dieu à cause des croyants de Thessalonique
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nos amis chrétiens, nous devons toujours remercier Dieu à cause de vous. Il est juste que nous le fassions, car vous apprenez de plus en plus à croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Vous aussi, vous vous aimez de plus en plus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En conséquence, nous sommes fiers de parler de vous aux croyants des autres Églises. Nous leur disons comment vous continuez de faire confiance en Dieu dans vos nombreux problèmes. Vous êtes patients et courageux, même lorsque les gens vous font beaucoup souffrir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cela nous montre que Dieu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' les gens d’une manière juste. Maintenant, vous avez beaucoup de problèmes, parce que vous appartenez au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: . Cela montre que Dieu vous accepte comme le peuple qu’il dirige.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu punira ceux qui vous causent des problèmes. Il leur causera des problèmes. Cela est correct et juste. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dieu fera aussi ce qui est correct et juste pour vous. Vous avez des problèmes maintenant. Mais un jour, Dieu permettra de vous reposer avec nous. Cela se produira lorsque le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus descendra du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Il viendra avec ses puissants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et avec un feu très chaud. Il punira ces gens qui ne connaissent pas Dieu. Oui, il punira ceux qui n’obéissent pas à la Bonne Nouvelle de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Leur punition continuera éternellement, comme Dieu les détruira. Il les éloignera du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ils ne verront jamais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ni sa grande puissance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela arrivera lorsque Jésus viendra ce jour spécial. Son propre peuple le louera pour les grandes choses qu’il a faites pour lui. Nous tous qui sommes croyants, nous serons surpris de voir sa grande puissance. Cela vous concerne aussi, parce que vous avez cru à notre message sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul prie pour les croyants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ainsi, nous prions toujours pour vous. Notre Dieu vous a choisis pour être son propre peuple. Nous prions pour qu’il vous aide, afin que vous continuiez à lui plaire. Nous prions également que Dieu travaille puissamment en vous. Ensuite, vous pourrez faire toutes les bonnes choses que vous voulez faire. Vous ferez les choses que vous voulez faire, parce que vous faites confiance en Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En conséquence, les gens loueront notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus à cause de votre façon de vivre. Vous recevrez également des louanges, car vous appartenez à Jésus. Tout cela est possible, parce que notre Dieu et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sont très gentils.'
