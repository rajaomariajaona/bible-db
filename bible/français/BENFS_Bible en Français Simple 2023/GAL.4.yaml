document_id: GAL.4,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 4
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul explique à propos des fils
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Je vais essayer de l’expliquer comme ça. Le fils aîné dans une famille recevra les choses de son père au bon âge. Mais alors qu’il est un enfant, il est tout à fait comme un esclave. Un jour, il sera le maître de toutes les choses de son père. Mais, il est tout à fait comme un esclave maintenant.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous dites que certains jours, des mois, des heures ou des années sont spéciaux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je crains à cause de vous. J’ai donc beaucoup travaillé parmi vous. C’était pour vous aider. Ma crainte est que je risque de perdre mon temps pour rien.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mes frères, je vous demande très fortement de devenir comme moi, parce que je suis devenu comme vous. Vous ne m’avez rien fait de mal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je vous ai dit la Bonne Nouvelle la première fois, parce que j’étais malade. Vous le savez.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je vous ai causé des problèmes, parce que j’étais malade. Vous étiez toujours bons envers moi. Et vous ne m’avez pas dit de mauvaises choses. Mais, vous m’avez dit : Bienvenue ! Vous étiez aussi heureux de moi. C’est comme si j’étais un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de Dieu, ou même de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais maintenant, je ne comprends pas pourquoi vous n’êtes plus heureux. Je peux dire certainement ceci : Si cela était possible, vous alliez arracher vos yeux et me les donner.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Et maintenant, je crois devenir votre ennemi à cause de ce que je vous dis ! Mais je vous dis ce qui est vrai.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ces faux enseignants veulent beaucoup ceci : Ils veulent que vous croyiez en eux. Mais ils ne veulent pas vraiment ce qui est bon pour vous. Ce qu’ils veulent est de vous faire séparer de moi. Ils veulent que vous pensiez ceci : Ils sont eux‑mêmes très intelligents et importants. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'C’est bon de vouloir d’autres gens croire à certaines choses. Mais c’est mieux si cela donne un bon résultat. Il est toujours bon d’être comme ça, non seulement quand je suis là avec vous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mes enfants, je me sens vraiment comme une mère qui vous donne naissance à nouveau. Je ressens de la douleur pour vous. Je veux que vous deveniez complètement comme le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il doit obéir aux enseignants et à d’autres personnes qui ont autorité sur lui. Il le fera jusqu’au bon moment. Il doit attendre le temps que son père a choisi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Je veux beaucoup être présent avec vous maintenant. Alors je pourrais mieux savoir ce que je dois vous dire. Parce que je ne sais pas vraiment quoi dire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hagar et Sara
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Donc, vous voulez que les règles juives aient autorité sur vous. Ensuite, vous devez savoir ce que ces règles signifient.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Il est dit dans l’Ancien Testament qu’Abraham avait 2 fils. Il avait un fils par une femme, Hagar. Celle‑ci était une esclave. Et il avait un autre fils de Sara. Celle‑ci était une femme libre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Une femme était une esclave. Et son fils est né à la suite de ce qu’Abraham lui‑même avait décidé. Mais son fils de la femme libre est né à la suite de ce que Dieu avait promis.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ces 2 femmes sont comme des images des 2 accords que Dieu avait faits avec son peuple. Hagar est comme l’accord que Dieu a fait sur la montagne de Sinaï. Cet accord pousse les gens à devenir des esclaves.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hagar est comme une image de la montagne de Sinaï en Arabie. En plus, elle est comme la ville de Jérusalem sur la terre maintenant. La raison est que cette ville et ses habitants sont des esclaves. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mais la Jérusalem d’en haut est libre. Et cette Jérusalem est notre mère. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il est dit dans l’Ancien Testament :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois heureuse, toi femme qui n’a jamais eu d’enfants !
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tu es la femme qui n’a jamais connu la douleur de la naissance d’un enfant.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Crie fort, parce que tu es si heureuse !
  - type: usfm
    marker: m
    children:
    - type: text
      text: Parce que la femme triste et solitaire a beaucoup plus d’enfants que la femme qui a un mari.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Vous, mes frères, vous êtes des enfants comme Isaac. Comme lui, vous êtes nés à la suite de ce que Dieu avait promis. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: À ce moment‑là, le fils qui est né selon ce qu’Abraham a décidé, n’était pas gentil à Isaac.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce premier fils, Ismaël, a causé des difficultés à Isaac. Isaac est le fils qui est né par l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Et c’est la même chose maintenant.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'De la même manière, nous étions aussi comme des enfants. Nous étions esclaves de mauvais esprits qui gouvernent ce monde. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais il est dit dans l’Ancien Testament : Renvoie la femme qui est esclave et son fils. Parce que le fils de cette femme ne recevra jamais ce que Dieu avait promis au fils de la femme libre.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ainsi, mes frères, nous ne sommes pas les enfants de la femme esclave. Non, nous sommes les enfants de la femme libre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais quand le temps est arrivé, Dieu a envoyé son propre Fils. Il est venu en tant que fils d’une mère humaine. Il est né '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: ', sous l’autorité des règles des Juifs.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nous étions comme des esclaves par les règles des Juifs. Mais le Fils de Dieu nous a rachetés, pour nous libérer. Donc, nous pouvons devenir les fils propres de Dieu. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Et parce que nous sommes fils, Dieu a envoyé l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de son Fils vivre au fond de nous. Son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' en nous crie à Dieu : Abba, Père.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Donc, tu n’es plus esclave, mais tu es un fils. Et à cause de cela, tu recevras tout ce que Dieu donne à ses fils.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Paul craint que les chrétiens de Galatie refusent '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Avant, vous ne connaissiez pas Dieu. Vous étiez alors esclaves d’autres esprits. Vous étiez esclaves des esprits qui ne sont pas vraiment de dieux.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais maintenant, vous connaissez Dieu. Ou bien, je dois dire que Dieu vous connaît. Donc, vous ne devriez pas retourner à ces esprits faibles et pauvres qui gouvernent ce monde. Vous ne devriez pas vouloir devenir à nouveau leurs esclaves ! '
