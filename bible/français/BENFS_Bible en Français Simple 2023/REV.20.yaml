document_id: REV.20,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 20
  - type: heading
    content: Les 1 000 ans
  - type: text
    content: 'Puis j’ai vu un '
  - type: text
    content: ange
  - type: text
    content: ' qui descendait du '
  - type: text
    content: ciel
  - type: text
    content: '. Il avait la clé du trou profond. Il tenait également une grosse chaîne à la main. '
  '10':
  - type: text
    content: 'Le '
  - type: text
    content: diable
  - type: text
    content: ' avait fait croire à ces gens ses mensonges. Alors Dieu le jettera dans l’étang de feu et de soufre. C’est le lac où il avait déjà jeté l’animal et le faux '
  - type: text
    content: prophète
  - type: text
    content: . En conséquence, ils auront beaucoup de douleur jour et nuit. Cela ne finira jamais.
  - type: heading
    content: Dieu juge toutes les personnes mortes
  '11':
  - type: text
    content: 'Alors j’ai vu un grand trône blanc, et Dieu était assis dessus. La terre et le '
  - type: text
    content: ciel
  - type: text
    content: ' se sont éloignés de là où il était. Il n’y avait plus de place pour eux. '
  '12':
  - type: text
    content: Puis j’ai vu les gens qui étaient morts. Ils se tenaient devant le grand trône. Des gens importants étaient là, et des gens sans importance étaient également là. Ensuite, quelqu’un a ouvert des livres pour voir ce qui y était écrit. Dieu avait écrit en eux toutes les choses que le peuple avait faites. Puis quelqu’un a ouvert un autre livre qui est le livre de vie de Dieu. Dieu a jugé ces gens qui sont morts. Il a regardé dans les livres pour voir ce qu’ils avaient fait.
  '13':
  - type: text
    content: 'La mer a fait monter tous les morts qui s’y trouvaient. La mort et le lieu des morts appelé '
  - type: text
    content: Hadès
  - type: text
    content: ' ont amené tous les morts qui étaient là aussi. Puis Dieu a jugé chaque personne. Dieu a vu ce qu’elles avaient fait, et il a justement décidé. '
  '14':
  - type: text
    content: 'Alors Dieu a jeté la mort et le séjour des morts dans l’étang de feu. L’étang de feu est la deuxième mort des gens. '
  '15':
  - type: text
    content: Dieu a jeté dans l’étang de feu toute personne dont le nom n’était pas écrit dans son livre de vie.
  '2':
  - type: text
    content: 'Il a attrapé le dragon. Ce dragon est vraiment le '
  - type: text
    content: diable
  - type: text
    content: ' ou Satan. C’est le serpent qui est là depuis longtemps. L’'
  - type: text
    content: ange
  - type: text
    content: ' a attaché le dragon avec la chaîne. Personne ne pouvait délier cette chaîne pendant 1 000 ans. '
  '3':
  - type: text
    content: Puis il a jeté le dragon dans le trou profond. Il a fermé la porte du trou profond et l’a verrouillée avec la clé. Il a mis un sceau sur la porte. Pendant ce temps, Satan ne pouvait plus parler aux gens de tous les pays. Mais après ces 1 000 ans, il sera libéré pendant une courte période.
  '4':
  - type: text
    content: 'Puis j’ai vu des trônes, et j’ai vu des gens qui étaient assis dessus. Ces gens avaient reçu le pouvoir de juger d’autres gens. J’ai aussi vu les '
  - type: text
    content: esprits
  - type: text
    content: ' des gens qui sont morts, parce qu’ils ont servi Jésus. Leurs têtes ont été coupées, parce qu’ils disaient le vrai message de Jésus. Ils avaient continué à croire au message de Dieu. Ces croyants n’avaient pas adoré l’animal ou son idole. Ils n’avaient pas reçu le signe de l’animal sur le devant de leurs têtes ou sur leurs mains. Maintenant, ils sont redevenus vivants. Ils ont régné en tant que rois avec Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' pendant 1 000 ans. '
  '5':
  - type: text
    content: '(Mais tous les autres morts ne sont pas revenus à la vie avant la fin des 1 000 ans.) C’est la première fois que Dieu réveillera les morts pour qu’ils revivent. '
  '6':
  - type: text
    content: 'Le peuple que Dieu réveillera pour redevenir vivant cette première fois sera un peuple très heureux ! Il sera le propre peuple de Dieu. La seconde mort n’aura aucun pouvoir sur eux. Au lieu de cela, ils seront des '
  - type: text
    content: prêtres
  - type: text
    content: ' qui servent Dieu et Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Ils régneront comme rois avec lui pendant ces 1 000 ans.
  - type: heading
    content: Dieu envoie Satan dans l’étang de feu
  '7':
  - type: text
    content: 'Une fois les 1 000 ans passés, Dieu laissera Satan sortir de sa prison. '
  '8':
  - type: text
    content: 'Satan ira ensuite dire des mensonges aux gens des pays du monde entier. Il fera que les gens croient en lui. Ces pays s’appellent Gog et Magog. Satan les réunira pour mener une guerre contre le peuple de Dieu. Beaucoup de gens seront dans l’armée de Satan. Ils seront comme les morceaux de sable au bord de la mer. '
  '9':
  - type: text
    content: 'Ils traverseront la terre entière. Ils arriveront à l’endroit où le peuple de Dieu vit. Ils se tiendront tout autour de cet endroit. C’est la ville que Dieu aime. Mais le feu descendra du '
  - type: text
    content: ciel
  - type: text
    content: ' et il les détruira tous. '
