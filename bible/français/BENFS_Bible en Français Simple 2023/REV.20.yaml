document_id: REV.20
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 20
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les 1 000 ans
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis j’ai vu un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' qui descendait du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Il avait la clé du trou profond. Il tenait également une grosse chaîne à la main. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il a attrapé le dragon. Ce dragon est vraiment le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' ou Satan. C’est le serpent qui est là depuis longtemps. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a attaché le dragon avec la chaîne. Personne ne pouvait délier cette chaîne pendant 1 000 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis il a jeté le dragon dans le trou profond. Il a fermé la porte du trou profond et l’a verrouillée avec la clé. Il a mis un sceau sur la porte. Pendant ce temps, Satan ne pouvait plus parler aux gens de tous les pays. Mais après ces 1 000 ans, il sera libéré pendant une courte période.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis j’ai vu des trônes, et j’ai vu des gens qui étaient assis dessus. Ces gens avaient reçu le pouvoir de juger d’autres gens. J’ai aussi vu les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' des gens qui sont morts, parce qu’ils ont servi Jésus. Leurs têtes ont été coupées, parce qu’ils disaient le vrai message de Jésus. Ils avaient continué à croire au message de Dieu. Ces croyants n’avaient pas adoré l’animal ou son idole. Ils n’avaient pas reçu le signe de l’animal sur le devant de leurs têtes ou sur leurs mains. Maintenant, ils sont redevenus vivants. Ils ont régné en tant que rois avec Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' pendant 1 000 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '(Mais tous les autres morts ne sont pas revenus à la vie avant la fin des 1 000 ans.) C’est la première fois que Dieu réveillera les morts pour qu’ils revivent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le peuple que Dieu réveillera pour redevenir vivant cette première fois sera un peuple très heureux ! Il sera le propre peuple de Dieu. La seconde mort n’aura aucun pouvoir sur eux. Au lieu de cela, ils seront des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' qui servent Dieu et Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Ils régneront comme rois avec lui pendant ces 1 000 ans.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu envoie Satan dans l’étang de feu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une fois les 1 000 ans passés, Dieu laissera Satan sortir de sa prison. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Satan ira ensuite dire des mensonges aux gens des pays du monde entier. Il fera que les gens croient en lui. Ces pays s’appellent Gog et Magog. Satan les réunira pour mener une guerre contre le peuple de Dieu. Beaucoup de gens seront dans l’armée de Satan. Ils seront comme les morceaux de sable au bord de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils traverseront la terre entière. Ils arriveront à l’endroit où le peuple de Dieu vit. Ils se tiendront tout autour de cet endroit. C’est la ville que Dieu aime. Mais le feu descendra du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et il les détruira tous. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' avait fait croire à ces gens ses mensonges. Alors Dieu le jettera dans l’étang de feu et de soufre. C’est le lac où il avait déjà jeté l’animal et le faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: . En conséquence, ils auront beaucoup de douleur jour et nuit. Cela ne finira jamais.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Dieu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' toutes les personnes mortes'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors j’ai vu un grand trône blanc, et Dieu était assis dessus. La terre et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' se sont éloignés de là où il était. Il n’y avait plus de place pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Puis j’ai vu les gens qui étaient morts. Ils se tenaient devant le grand trône. Des gens importants étaient là, et des gens sans importance étaient également là. Ensuite, quelqu’un a ouvert des livres pour voir ce qui y était écrit. Dieu avait écrit en eux toutes les choses que le peuple avait faites. Puis quelqu’un a ouvert un autre livre qui est le livre de vie de Dieu. Dieu a jugé ces gens qui sont morts. Il a regardé dans les livres pour voir ce qu’ils avaient fait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La mer a fait monter tous les morts qui s’y trouvaient. La mort et le lieu des morts appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hadès
  - type: text
    text: ' ont amené tous les morts qui étaient là aussi. Puis Dieu a jugé chaque personne. Dieu a vu ce qu’elles avaient fait, et il a justement décidé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Dieu a jeté la mort et le séjour des morts dans l’étang de feu. L’étang de feu est la deuxième mort des gens. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dieu a jeté dans l’étang de feu toute personne dont le nom n’était pas écrit dans son livre de vie.
