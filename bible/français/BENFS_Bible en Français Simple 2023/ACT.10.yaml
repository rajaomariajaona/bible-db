document_id: ACT.10,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 10
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Corneille demande à Pierre de venir chez lui
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un homme qui habitait à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: '. Son nom était Corneille. Il était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' et un chef de 100 hommes dans l’armée romaine. Son groupe dans l’armée s’appelait le groupe d’Italie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre s’est senti affamé, et il voulait manger de la nourriture. Quand quelqu’un préparait un repas pour lui, Pierre a eu un rêve spécial. Mais il n’était pas vraiment endormi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a vu le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' ouvert. Et quelque chose descendait. C’était comme une grande nappe. Cette chose était attachée aux 4 coins. Cela descendait et s’abaissait vers la terre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait tous les quadrupèdes, les reptiles de la terre et les oiseaux du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre a entendu une voix qui lui parlait : Pierre, regarde en haut et tue un animal. Alors tu peux le faire cuire et le manger.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre a répondu : Non, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je ne peux pas faire quelque chose comme ceci. Je n’ai jamais mangé un animal que ta loi ne me permet pas de manger.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la voix a dit à Pierre : Dieu a rendu ces animaux bons à manger. Ne dis pas que Dieu sera contre toi si tu manges l’un d’eux.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout ceci s’est produit 3 fois. Et alors immédiatement, le tissu est rentré au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les hommes de Corneille sont arrivés à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: '. Ils ont trouvé la maison de Simon. Pierre pensait toujours à son rêve quand les hommes se sont arrêtés à la porte de la maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes demandaient à haute voix dehors : Est‑ce que l’homme appelé Simon Pierre reste ici ?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre pensait toujours à son rêve. Alors le Saint‑Esprit lui a dit : Simon Pierre, 3 hommes sont là en bas. Ils te cherchent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Corneille était un homme bon. Lui et toute sa famille ont cru en Dieu et ils lui obéissaient. Corneille priait Dieu chaque jour. Et il donnait beaucoup d’argent pour aider les pauvres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lève‑toi et va en bas vers ces gens. J’ai envoyé ces hommes pour te voir. Et c’est bien que tu ailles avec eux.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre est allé en bas et a dit aux hommes : Je suis la personne que vous cherchez. Pourquoi êtes‑vous venus ici ?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes ont répondu : Nous sommes venus de l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' qui s’appelle Corneille. Il est un homme bon. Il prie Dieu et lui obéit. Et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' pensent de bonnes choses sur lui. Un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de Dieu lui a dit de nous envoyer ici. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a voulu que tu ailles avec nous à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: '. Corneille veut entendre ce que tu dois dire. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre a dit aux hommes : Venez dans la maison et restez ici avec nous cette nuit.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre va à la maison de Corneille
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant, Pierre a voyagé à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: ' avec les hommes de Corneille. Et quelques croyants qui habitaient à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: ' ont voyagé avec eux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre est arrivé à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: ' le jour suivant. Corneille savait qu’ils arriveront. Ainsi il attendait Pierre. La famille et les amis de Corneille attendaient également avec lui. Il leur avait demandé de venir à sa maison. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Pierre est arrivé, Corneille est allé à la porte pour le rencontrer. Alors Corneille s’est mis à genoux devant Pierre. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Pierre lui a dit : Lève‑toi, je suis aussi un homme.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pierre est entré dans la maison avec Corneille et il a continué à lui parler.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a alors vu que beaucoup de gens se sont réunis ensemble dans la maison. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit : Vous, peuples, sachez que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' n’entrent pas habituellement dans la maison des étrangers ou non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. La loi de Dieu ne permet pas l’amitié entre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Mais Dieu m’a maintenant montré quelque chose de différent. Dieu m’a prouvé qu’il accepte tous les hommes. Et ainsi je dois accepter tout le monde. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre a dit : Ainsi quand tu m’as demandé de venir ici, j’étais heureux de venir. J’ai su que c’était exact. Mais pourquoi tu m’as demandé de venir ?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un après‑midi, à environ 15 heures, Corneille a vu une vision. Un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu est venu chez lui. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' lui a dit : Corneille ! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Corneille a dit : Il y a 3 jours, j’étais dans ma maison. C’était à 15 heures, et je priais Dieu. Brusquement, un homme est apparu devant moi. Il portait les vêtements blancs qui brillaient. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme m’a dit : Corneille, tu priais Dieu. Tu faisais beaucoup de bonnes choses pour les pauvres. Maintenant Dieu veut te répondre. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Envoie ainsi quelques hommes à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: '. Ces hommes trouveront un homme appelé Simon Pierre. Il reste là. Tes hommes doivent lui demander de venir ici à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: '. Simon Pierre reste à la maison de Simon le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: corroyeur
    - type: text
      text: '. Sa maison est au bord de la mer. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai envoyé les hommes immédiatement et ils t’ont demandé de venir. Merci d’être venu. Maintenant nous sommes tous ici ensemble, et Dieu est ici avec nous. Nous attendons ce que tu dois dire. Tu as un message du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour nous ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre parle à Corneille et à sa famille et ses amis
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre a parlé à toutes les personnes dans la salle. Il a dit : Maintenant, je comprends que Dieu considère tous les gens de la même manière. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu accepte toutes les personnes qui lui obéissent. Il accepte toutes les personnes qui font de bonnes choses. Le pays d’où une personne vient, ne compte pas pour Dieu. Il les accepte toutes. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a envoyé ce message au peuple d’Israël. Il lui a dit la Bonne Nouvelle au sujet de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Jésus est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' de tous. A cause de Jésus, nous pouvons être près de Dieu encore. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez ce qui s’est passé partout en Judée. Cela a commencé en Galilée. C’était après que Jean a prêché son message sur le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous connaissez Jésus. Il est venu de la ville appelée Nazareth. Dieu a choisi Jésus pour effectuer le travail spécial pour lui. Il a donné à Jésus son Saint‑Esprit et l’aidait à faire des choses puissantes. Alors Jésus est allé à beaucoup d’endroits. Et il aidait beaucoup de gens que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' tenait. Mais Jésus faisait de bonnes choses et guérissait tous les malades. Il pouvait faire cela, parce que Dieu était avec lui.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons vu tout ce que Jésus faisait en Israël et à Jérusalem. Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont mis Jésus sur la croix et ils l’ont tué. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Corneille regardait l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' et il avait peur. Corneille a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qu’y a‑t‑il ? L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a dit à Corneille : Dieu t’a entendu quand tu priais. Et il a vu tout l’argent que tu donnes aux pauvres. Tu rends Dieu très heureux, et maintenant il te répond. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, 3 jours après, Dieu a fait devenir Jésus vivant encore. Il l’a fait apparaître à nous. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n’est pas tout le monde qui l’avait vu. Il est apparu seulement à nous, parce que Dieu nous a choisis pour travailler pour lui. Ainsi nous parlons aux gens de tout ce que nous avons vu. Nous avons mangé avec lui après sa résurrection. Et nous avons bu avec lui, aussi. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus nous a dit : Allez et dites aux gens la Bonne Nouvelle sur moi. Dites‑leur que Dieu m’a donné le pouvoir de juger tous les gens. Je jugerai ceux qui sont maintenant vivants. Et je jugerai ceux qui sont morts. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' parlaient de lui. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' disaient que Dieu pardonnera les péchés de tous les gens qui croient en Jésus. Et ceci, par la puissance qui est dans le nom de Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' reçoivent le Saint‑Esprit'
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Pierre parlait, le Saint‑Esprit est descendu sur tous les gens dans la salle. Ils écoutaient tous le message au sujet de Jésus. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les croyants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' qui étaient venus de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: ' avec Pierre étaient très étonnés. Ils ont vu que Dieu avait également donné son Saint‑Esprit aux étrangers ou non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: .
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les croyants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' les entendaient parler en d’autres langues dans la salle. Ils disaient également : Dieu, tu es très grand et puissant.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Pierre a dit : '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a donné son Saint‑Esprit à ces personnes comme il nous l’avait donné. Il a dit : Ainsi nous devons les baptiser avec de l’eau. C’est la bonne chose à faire. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi Pierre a demandé à ceux qui sont venus avec lui de baptiser les nouveaux croyants. Ils parlaient au nom de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' quand il les baptisait. Et alors Corneille a demandé à Pierre de rester avec eux pendant quelques jours.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Envoie quelques hommes à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: '. Ces hommes trouveront un homme qui reste là. Il s’appelle Simon Pierre. Qu’ils lui demandent de venir ici à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il reste à la maison de Simon le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: corroyeur
    - type: text
      text: . La maison de Simon est au bord de la mer.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui parlait à Corneille est parti. Corneille a dit à 2 de ses propres serviteurs, et un de ses propres soldats, de venir à lui. Le soldat était un homme bon qui obéissait à Dieu. Il aidait Corneille et il travaillait près de lui. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Corneille a dit à ces 3 hommes ce qui s’était produit. Et il leur a dit ce que l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' lui avait dit. Alors il les a envoyés à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu montre une vision à Pierre
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant, à environ midi, les hommes de Corneille étaient presque à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: '. À ce même temps, Pierre est allé dans la chambre haute de la maison. Il est allé là prier Dieu. '
