verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: heading
    content: Corneille demande à Pierre de venir chez lui
  - type: text
    content: 'Il y avait un homme qui habitait à '
  - type: text
    content: Césarée
  - type: text
    content: '. Son nom était Corneille. Il était un '
  - type: text
    content: officier
  - type: text
    content: ' et un chef de 100 hommes dans l’armée romaine. Son groupe dans l’armée s’appelait le groupe d’Italie. '
  '10':
  - type: text
    content: 'Pierre s’est senti affamé, et il voulait manger de la nourriture. Quand quelqu’un préparait un repas pour lui, Pierre a eu un rêve spécial. Mais il n’était pas vraiment endormi. '
  '11':
  - type: text
    content: 'Il a vu le '
  - type: text
    content: ciel
  - type: text
    content: ' ouvert. Et quelque chose descendait. C’était comme une grande nappe. Cette chose était attachée aux 4 coins. Cela descendait et s’abaissait vers la terre. '
  '12':
  - type: text
    content: 'Il y avait tous les quadrupèdes, les reptiles de la terre et les oiseaux du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Alors Pierre a entendu une voix qui lui parlait : Pierre, regarde en haut et tue un animal. Alors tu peux le faire cuire et le manger.'
  '14':
  - type: text
    content: 'Pierre a répondu : Non, '
  - type: text
    content: Seigneur
  - type: text
    content: ', je ne peux pas faire quelque chose comme ceci. Je n’ai jamais mangé un animal que ta loi ne me permet pas de manger.'
  '15':
  - type: text
    content: 'Alors la voix a dit à Pierre : Dieu a rendu ces animaux bons à manger. Ne dis pas que Dieu sera contre toi si tu manges l’un d’eux.'
  '16':
  - type: text
    content: 'Tout ceci s’est produit 3 fois. Et alors immédiatement, le tissu est rentré au '
  - type: text
    content: ciel
  - type: text
    content: .
  '17':
  - type: text
    content: 'Alors les hommes de Corneille sont arrivés à '
  - type: text
    content: Joppé
  - type: text
    content: '. Ils ont trouvé la maison de Simon. Pierre pensait toujours à son rêve quand les hommes se sont arrêtés à la porte de la maison. '
  '18':
  - type: text
    content: 'Les hommes demandaient à haute voix dehors : Est‑ce que l’homme appelé Simon Pierre reste ici ?'
  '19':
  - type: text
    content: 'Pierre pensait toujours à son rêve. Alors le Saint‑Esprit lui a dit : Simon Pierre, 3 hommes sont là en bas. Ils te cherchent. '
  '2':
  - type: text
    content: 'Corneille était un homme bon. Lui et toute sa famille ont cru en Dieu et ils lui obéissaient. Corneille priait Dieu chaque jour. Et il donnait beaucoup d’argent pour aider les pauvres '
  - type: text
    content: Juifs
  - type: text
    content: ' à '
  - type: text
    content: Césarée
  - type: text
    content: .
  '20':
  - type: text
    content: Lève‑toi et va en bas vers ces gens. J’ai envoyé ces hommes pour te voir. Et c’est bien que tu ailles avec eux.
  '21':
  - type: text
    content: 'Pierre est allé en bas et a dit aux hommes : Je suis la personne que vous cherchez. Pourquoi êtes‑vous venus ici ?'
  '22':
  - type: text
    content: 'Les hommes ont répondu : Nous sommes venus de l’'
  - type: text
    content: officier
  - type: text
    content: ' qui s’appelle Corneille. Il est un homme bon. Il prie Dieu et lui obéit. Et les '
  - type: text
    content: Juifs
  - type: text
    content: ' pensent de bonnes choses sur lui. Un '
  - type: text
    content: ange
  - type: text
    content: ' de Dieu lui a dit de nous envoyer ici. L’'
  - type: text
    content: ange
  - type: text
    content: ' a voulu que tu ailles avec nous à '
  - type: text
    content: Césarée
  - type: text
    content: '. Corneille veut entendre ce que tu dois dire. '
  '23':
  - type: text
    content: 'Alors Pierre a dit aux hommes : Venez dans la maison et restez ici avec nous cette nuit.'
  - type: heading
    content: Pierre va à la maison de Corneille
  - type: text
    content: 'Le jour suivant, Pierre a voyagé à '
  - type: text
    content: Césarée
  - type: text
    content: ' avec les hommes de Corneille. Et quelques croyants qui habitaient à '
  - type: text
    content: Joppé
  - type: text
    content: ' ont voyagé avec eux. '
  '24':
  - type: text
    content: 'Pierre est arrivé à '
  - type: text
    content: Césarée
  - type: text
    content: ' le jour suivant. Corneille savait qu’ils arriveront. Ainsi il attendait Pierre. La famille et les amis de Corneille attendaient également avec lui. Il leur avait demandé de venir à sa maison. '
  '25':
  - type: text
    content: 'Quand Pierre est arrivé, Corneille est allé à la porte pour le rencontrer. Alors Corneille s’est mis à genoux devant Pierre. '
  '26':
  - type: text
    content: 'Mais Pierre lui a dit : Lève‑toi, je suis aussi un homme.'
  '27':
  - type: text
    content: Pierre est entré dans la maison avec Corneille et il a continué à lui parler.
  - type: text
    content: 'Il a alors vu que beaucoup de gens se sont réunis ensemble dans la maison. '
  '28':
  - type: text
    content: 'Il a dit : Vous, peuples, sachez que les '
  - type: text
    content: Juifs
  - type: text
    content: ' n’entrent pas habituellement dans la maison des étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: '. La loi de Dieu ne permet pas l’amitié entre '
  - type: text
    content: Juifs
  - type: text
    content: ' et non‑'
  - type: text
    content: Juifs
  - type: text
    content: '. Mais Dieu m’a maintenant montré quelque chose de différent. Dieu m’a prouvé qu’il accepte tous les hommes. Et ainsi je dois accepter tout le monde. '
  '29':
  - type: text
    content: 'Alors Pierre a dit : Ainsi quand tu m’as demandé de venir ici, j’étais heureux de venir. J’ai su que c’était exact. Mais pourquoi tu m’as demandé de venir ?'
  '3':
  - type: text
    content: 'Un après‑midi, à environ 15 heures, Corneille a vu une vision. Un des '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu est venu chez lui. L’'
  - type: text
    content: ange
  - type: text
    content: ' lui a dit : Corneille ! '
  '30':
  - type: text
    content: 'Alors Corneille a dit : Il y a 3 jours, j’étais dans ma maison. C’était à 15 heures, et je priais Dieu. Brusquement, un homme est apparu devant moi. Il portait les vêtements blancs qui brillaient. '
  '31':
  - type: text
    content: 'L’homme m’a dit : Corneille, tu priais Dieu. Tu faisais beaucoup de bonnes choses pour les pauvres. Maintenant Dieu veut te répondre. '
  '32':
  - type: text
    content: 'Envoie ainsi quelques hommes à '
  - type: text
    content: Joppé
  - type: text
    content: '. Ces hommes trouveront un homme appelé Simon Pierre. Il reste là. Tes hommes doivent lui demander de venir ici à '
  - type: text
    content: Césarée
  - type: text
    content: '. Simon Pierre reste à la maison de Simon le '
  - type: text
    content: corroyeur
  - type: text
    content: '. Sa maison est au bord de la mer. '
  '33':
  - type: text
    content: 'J’ai envoyé les hommes immédiatement et ils t’ont demandé de venir. Merci d’être venu. Maintenant nous sommes tous ici ensemble, et Dieu est ici avec nous. Nous attendons ce que tu dois dire. Tu as un message du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour nous ?'
  - type: heading
    content: Pierre parle à Corneille et à sa famille et ses amis
  '34':
  - type: text
    content: 'Alors Pierre a parlé à toutes les personnes dans la salle. Il a dit : Maintenant, je comprends que Dieu considère tous les gens de la même manière. '
  '35':
  - type: text
    content: 'Dieu accepte toutes les personnes qui lui obéissent. Il accepte toutes les personnes qui font de bonnes choses. Le pays d’où une personne vient, ne compte pas pour Dieu. Il les accepte toutes. '
  '36':
  - type: text
    content: Dieu a envoyé ce message au peuple d’Israël. Il lui a dit la Bonne Nouvelle au sujet de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Jésus est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de tous. A cause de Jésus, nous pouvons être près de Dieu encore. '
  '37':
  - type: text
    content: 'Vous savez ce qui s’est passé partout en Judée. Cela a commencé en Galilée. C’était après que Jean a prêché son message sur le '
  - type: text
    content: baptême
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Vous connaissez Jésus. Il est venu de la ville appelée Nazareth. Dieu a choisi Jésus pour effectuer le travail spécial pour lui. Il a donné à Jésus son Saint‑Esprit et l’aidait à faire des choses puissantes. Alors Jésus est allé à beaucoup d’endroits. Et il aidait beaucoup de gens que le '
  - type: text
    content: diable
  - type: text
    content: ' tenait. Mais Jésus faisait de bonnes choses et guérissait tous les malades. Il pouvait faire cela, parce que Dieu était avec lui.'
  '39':
  - type: text
    content: 'Nous avons vu tout ce que Jésus faisait en Israël et à Jérusalem. Alors les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont mis Jésus sur la croix et ils l’ont tué. '
  '4':
  - type: text
    content: Corneille regardait l’
  - type: text
    content: ange
  - type: text
    content: ' et il avait peur. Corneille a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', qu’y a‑t‑il ? L’'
  - type: text
    content: ange
  - type: text
    content: ' a dit à Corneille : Dieu t’a entendu quand tu priais. Et il a vu tout l’argent que tu donnes aux pauvres. Tu rends Dieu très heureux, et maintenant il te répond. '
  '40':
  - type: text
    content: 'Mais, 3 jours après, Dieu a fait devenir Jésus vivant encore. Il l’a fait apparaître à nous. '
  '41':
  - type: text
    content: 'Ce n’est pas tout le monde qui l’avait vu. Il est apparu seulement à nous, parce que Dieu nous a choisis pour travailler pour lui. Ainsi nous parlons aux gens de tout ce que nous avons vu. Nous avons mangé avec lui après sa résurrection. Et nous avons bu avec lui, aussi. '
  '42':
  - type: text
    content: 'Jésus nous a dit : Allez et dites aux gens la Bonne Nouvelle sur moi. Dites‑leur que Dieu m’a donné le pouvoir de juger tous les gens. Je jugerai ceux qui sont maintenant vivants. Et je jugerai ceux qui sont morts. '
  '43':
  - type: text
    content: 'Tous les '
  - type: text
    content: prophètes
  - type: text
    content: ' parlaient de lui. Les '
  - type: text
    content: prophètes
  - type: text
    content: ' disaient que Dieu pardonnera les péchés de tous les gens qui croient en Jésus. Et ceci, par la puissance qui est dans le nom de Jésus.'
  - type: heading
    content: Ceux qui ne sont pas Juifs reçoivent le Saint‑Esprit
  '44':
  - type: text
    content: 'Quand Pierre parlait, le Saint‑Esprit est descendu sur tous les gens dans la salle. Ils écoutaient tous le message au sujet de Jésus. '
  '45':
  - type: text
    content: 'Les croyants '
  - type: text
    content: juifs
  - type: text
    content: ' qui étaient venus de '
  - type: text
    content: Joppé
  - type: text
    content: ' avec Pierre étaient très étonnés. Ils ont vu que Dieu avait également donné son Saint‑Esprit aux étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: .
  '46':
  - type: text
    content: 'Et les croyants '
  - type: text
    content: juifs
  - type: text
    content: ' les entendaient parler en d’autres langues dans la salle. Ils disaient également : Dieu, tu es très grand et puissant.'
  - type: text
    content: 'Puis Pierre a dit : '
  '47':
  - type: text
    content: 'Dieu a donné son Saint‑Esprit à ces personnes comme il nous l’avait donné. Il a dit : Ainsi nous devons les baptiser avec de l’eau. C’est la bonne chose à faire. '
  '48':
  - type: text
    content: Ainsi Pierre a demandé à ceux qui sont venus avec lui de baptiser les nouveaux croyants. Ils parlaient au nom de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' quand il les baptisait. Et alors Corneille a demandé à Pierre de rester avec eux pendant quelques jours.'
  '5':
  - type: text
    content: 'Envoie quelques hommes à '
  - type: text
    content: Joppé
  - type: text
    content: '. Ces hommes trouveront un homme qui reste là. Il s’appelle Simon Pierre. Qu’ils lui demandent de venir ici à '
  - type: text
    content: Césarée
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Il reste à la maison de Simon le '
  - type: text
    content: corroyeur
  - type: text
    content: . La maison de Simon est au bord de la mer.
  '7':
  - type: text
    content: Alors l’
  - type: text
    content: ange
  - type: text
    content: ' qui parlait à Corneille est parti. Corneille a dit à 2 de ses propres serviteurs, et un de ses propres soldats, de venir à lui. Le soldat était un homme bon qui obéissait à Dieu. Il aidait Corneille et il travaillait près de lui. '
  '8':
  - type: text
    content: Corneille a dit à ces 3 hommes ce qui s’était produit. Et il leur a dit ce que l’
  - type: text
    content: ange
  - type: text
    content: ' lui avait dit. Alors il les a envoyés à '
  - type: text
    content: Joppé
  - type: text
    content: .
  - type: heading
    content: Dieu montre une vision à Pierre
  '9':
  - type: text
    content: 'Le jour suivant, à environ midi, les hommes de Corneille étaient presque à '
  - type: text
    content: Joppé
  - type: text
    content: '. À ce même temps, Pierre est allé dans la chambre haute de la maison. Il est allé là prier Dieu. '
