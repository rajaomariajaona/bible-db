document_id: MAT.15
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 15
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et aux enseignants de la loi d’obéir à Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et certains enseignants de la loi de Dieu sont venus de Jérusalem. Ils sont venus pour parler à Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ces hommes ont dit à Jésus ceci : Pourquoi tes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' n’obéissent pas aux choses que nos ancêtres nous avaient apprises ? Ils ne se lavent pas les mains comme il faut avant de manger un repas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a répondu : Pourquoi n’obéissez‑vous pas aux commandements de Dieu ? Par contre, vous faites des choses que vous avez apprises des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dieu dit : Honore ton père et ta mère. Il a dit aussi ceci : Toute personne qui parle mal contre son père et sa mère doit mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais vous apprenez aux gens quelque chose de différent. Vous laissez une personne dire à son père ou sa mère : J’allais vous donner ces bons cadeaux, mais je ne peux pas. Au lieu de cela, je les ai donnés à Dieu. Alors, vous ne lui laissez rien pour donner à sa mère et à son père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quand vous laissez une personne faire cela, vous n’avez pas obéi à la loi de Dieu. Vous avez obéi aux lois de vos ancêtres à la place. Vous faites bien d’autres choses comme ceci.  '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '  ! Ce qu’Ésaïe a dit de vous est vrai. Il a écrit ces paroles de Dieu :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ces gens disent de bonnes choses sur moi, 
- type: usfm
  marker: p
  children:
  - type: text
    text: mais ils ne veulent pas vraiment m’obéir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils disent que je suis puissant et important.
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais ce qu’ils disent n’a aucun but.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils enseignent leurs propres règles, que je ne leur ai pas données.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle de mauvaises choses que les gens font
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus a demandé à tous les gens de se réunir près de lui. Il a dit : Écoutez et comprenez. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Une personne peut manger des choses. Mais ce n’est pas cela qui la rendra mauvaise. Une personne peut dire des choses. Ce sont ces choses qui peuvent la rendre mauvaise. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' se sont alors approchés de Jésus. Ils lui ont dit : Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont entendu ce que tu disais. Ils ne sont pas contents de ce que tu leur avais dit. Sais‑tu cela ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus a répondu à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' sont comme les plantes que Dieu, mon Père céleste, n’a pas mises dans le sol. Il va tirer toutes ces plantes du sol. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Laissez‑les ! Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' sont des guides aveugles. Et lorsqu’un aveugle guide un autre aveugle, ils tomberont tous 2 dans un trou profond.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pierre a dit à Jésus : Explique‑nous ce que tu viens de dire. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus a répondu : Vous ne pouvez toujours pas comprendre ce que je dis. Vous êtes comme les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et les enseignants de la loi de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La nourriture qu’une personne mange en premier va dans sa bouche. Ensuite, elle va dans son estomac, puis elle sort de son corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les paroles qu’une personne dit, viennent de ses pensées. Alors ce qu’une personne dit, peut causer Dieu lui dire : Je suis contre toi.  '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Une personne peut avoir de mauvaises pensées. Ces pensées peuvent l’amener à tuer quelqu’un. Ou elles peuvent l’amener à coucher avec la femme d’un autre homme. Cette personne peut voler quelqu’un. Elle peut dire des choses qui ne sont pas vraies sur quelqu’un d’autre. Ou elle peut dire de mauvaises choses contre quelqu’un d’autre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Toutes ces mauvaises choses amènent Dieu à dire à une personne : Je suis contre toi. Mais peut‑être un homme ne se lave pas les mains avant de manger. Cela n’amène pas Dieu à dire : Je suis contre toi. '
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit une fille
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Après cela, Jésus a quitté Génésareth. Il est allé à certains endroits près des villes appelées Tyr et Sidon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Une femme vivait dans cette partie du pays. Elle était l’une des personnes du groupe appelé Cananéens. Elle est allée voir Jésus. Elle a continué à crier d’une voix forte à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fils de David
  - type: text
    text: ', aide‑moi, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' vit à l’intérieur de ma fille. Il la fait très malade.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus n’a pas répondu à la femme. Alors ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés auprès de lui. Ils disaient : S’il te plaît, s’il te plaît, renvoie cette femme. Elle nous suit et elle fait beaucoup de bruit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus a répondu à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Dieu m’a envoyé seulement aux gens d’Israël, parce qu’ils sont comme des brebis perdues.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La femme est venue auprès de Jésus. Elle s’est mise à genoux devant lui. Elle a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', aide‑moi s’il te plaît.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus a répondu à la femme cette fois : Il ne convient pas de prendre le pain des enfants et le jeter aux chiens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La femme a répondu à Jésus : Oui, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', cela est vrai. Mais même les chiens mangent les petits morceaux de pain qui tombent de la table de leurs maîtres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus a dit : Tu es une femme qui croit très bien en moi. Alors Dieu fera ce que tu as demandé. Et tout de suite, la fille de la femme est devenue de nouveau bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus a quitté cet endroit. Et il est allé au bord de la mer de Galilée. Il est monté sur une montagne. Il s’est assis là‑bas. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Beaucoup de gens sont venus auprès de lui. Ils lui ont amené des malades. Certains de ces malades ne pouvaient pas marcher très bien. Certains d’entre eux ne pouvaient pas voir. Certains ne pouvaient pas utiliser leurs bras ou leurs jambes. Et certains parmi eux ne pouvaient pas parler. Il y avait aussi beaucoup d’autres malades avec différentes maladies. On mettait les malades devant Jésus. Et Jésus les guérissait. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Les gens ont vu ce que Jésus a fait. Ils étaient très surpris. Car les gens qui ne parlaient pas, ont pu parler. Les gens ne pouvaient pas utiliser leurs jambes ou leurs bras, étaient guéris. Les gens qui ne pouvaient pas marcher, ont pu marcher. Les gens qui ne voyaient pas, ont pu voir. Les gens ont alors tous grandement remercié le Tout‑Puissant d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus nourrit 4 000 hommes et leurs familles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Venez près de moi. Il a dit : Je suis triste pour ces gens. Ils sont restés avec moi pendant 3 jours et ils n’ont plus de nourriture. Je ne veux pas les renvoyer alors qu’ils ont faim. Ils peuvent tomber sur le chemin, parce qu’ils sont faibles et affamés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont dit à Jésus : Nous sommes dans un endroit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. Où pouvons‑nous trouver assez de pains ici pour nourrir une telle foule ? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus a demandé : Combien de pains avez‑vous ? Ils ont répondu : Nous avons 7 pains et quelques petits poissons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus a dit à la foule : Asseyez‑vous à terre. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Puis il a tenu les 7 pains et les poissons dans ses mains. Il a remercié Dieu. Puis il les a coupés. Et il les a donnés à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il a dit : Donnez cette nourriture aux gens. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tous les gens ont mangé et ils ont tous eu assez. Après le manger, il y avait des restes. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus ont rempli 7 paniers avec les morceaux restants. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '4 000 hommes ont mangé. En plus, il y avait des femmes et des enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Alors Jésus a dit à la grande foule : Maintenant, rentrez tous chez vous. Après cela, Jésus est monté dans le petit bateau. Et il est allé loin dans la partie du pays appelé Magadan.'
