document_id: MAT.15,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 15
  - type: heading
    content: Jésus dit aux Pharisiens et aux enseignants de la loi d’obéir à Dieu
  - type: text
    content: 'Après cela, certains '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et certains enseignants de la loi de Dieu sont venus de Jérusalem. Ils sont venus pour parler à Jésus. '
  '10':
  - type: text
    content: 'Jésus a demandé à tous les gens de se réunir près de lui. Il a dit : Écoutez et comprenez. '
  '11':
  - type: text
    content: 'Une personne peut manger des choses. Mais ce n’est pas cela qui la rendra mauvaise. Une personne peut dire des choses. Ce sont ces choses qui peuvent la rendre mauvaise. '
  '12':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' se sont alors approchés de Jésus. Ils lui ont dit : Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont entendu ce que tu disais. Ils ne sont pas contents de ce que tu leur avais dit. Sais‑tu cela ?'
  '13':
  - type: text
    content: 'Jésus a répondu à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Ces '
  - type: text
    content: Pharisiens
  - type: text
    content: ' sont comme les plantes que Dieu, mon Père céleste, n’a pas mises dans le sol. Il va tirer toutes ces plantes du sol. '
  '14':
  - type: text
    content: 'Laissez‑les ! Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' sont des guides aveugles. Et lorsqu’un aveugle guide un autre aveugle, ils tomberont tous 2 dans un trou profond.'
  '15':
  - type: text
    content: 'Pierre a dit à Jésus : Explique‑nous ce que tu viens de dire. '
  '16':
  - type: text
    content: 'Jésus a répondu : Vous ne pouvez toujours pas comprendre ce que je dis. Vous êtes comme les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et les enseignants de la loi de Dieu. '
  '17':
  - type: text
    content: La nourriture qu’une personne mange en premier va dans sa bouche. Ensuite, elle va dans son estomac, puis elle sort de son corps.
  '18':
  - type: text
    content: 'Les paroles qu’une personne dit, viennent de ses pensées. Alors ce qu’une personne dit, peut causer Dieu lui dire : Je suis contre toi.  '
  '19':
  - type: text
    content: Une personne peut avoir de mauvaises pensées. Ces pensées peuvent l’amener à tuer quelqu’un. Ou elles peuvent l’amener à coucher avec la femme d’un autre homme. Cette personne peut voler quelqu’un. Elle peut dire des choses qui ne sont pas vraies sur quelqu’un d’autre. Ou elle peut dire de mauvaises choses contre quelqu’un d’autre.
  '2':
  - type: text
    content: 'Ces hommes ont dit à Jésus ceci : Pourquoi tes  '
  - type: text
    content: disciples
  - type: text
    content: ' n’obéissent pas aux choses que nos ancêtres nous avaient apprises ? Ils ne se lavent pas les mains comme il faut avant de manger un repas.'
  '20':
  - type: text
    content: 'Toutes ces mauvaises choses amènent Dieu à dire à une personne : Je suis contre toi. Mais peut‑être un homme ne se lave pas les mains avant de manger. Cela n’amène pas Dieu à dire : Je suis contre toi. '
  - type: heading
    content: Jésus guérit une fille
  '21':
  - type: text
    content: Après cela, Jésus a quitté Génésareth. Il est allé à certains endroits près des villes appelées Tyr et Sidon.
  '22':
  - type: text
    content: 'Une femme vivait dans cette partie du pays. Elle était l’une des personnes du groupe appelé Cananéens. Elle est allée voir Jésus. Elle a continué à crier d’une voix forte à Jésus : '
  - type: text
    content: fils de David
  - type: text
    content: ', aide‑moi, '
  - type: text
    content: Seigneur
  - type: text
    content: '. Un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' vit à l’intérieur de ma fille. Il la fait très malade.'
  '23':
  - type: text
    content: 'Jésus n’a pas répondu à la femme. Alors ses  '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés auprès de lui. Ils disaient : S’il te plaît, s’il te plaît, renvoie cette femme. Elle nous suit et elle fait beaucoup de bruit.'
  '24':
  - type: text
    content: 'Jésus a répondu à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Dieu m’a envoyé seulement aux gens d’Israël, parce qu’ils sont comme des brebis perdues.'
  '25':
  - type: text
    content: 'La femme est venue auprès de Jésus. Elle s’est mise à genoux devant lui. Elle a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', aide‑moi s’il te plaît.'
  '26':
  - type: text
    content: 'Jésus a répondu à la femme cette fois : Il ne convient pas de prendre le pain des enfants et le jeter aux chiens.'
  '27':
  - type: text
    content: 'La femme a répondu à Jésus : Oui, '
  - type: text
    content: Seigneur
  - type: text
    content: ', cela est vrai. Mais même les chiens mangent les petits morceaux de pain qui tombent de la table de leurs maîtres.'
  '28':
  - type: text
    content: 'Jésus a dit : Tu es une femme qui croit très bien en moi. Alors Dieu fera ce que tu as demandé. Et tout de suite, la fille de la femme est devenue de nouveau bien.'
  '29':
  - type: text
    content: 'Jésus a quitté cet endroit. Et il est allé au bord de la mer de Galilée. Il est monté sur une montagne. Il s’est assis là‑bas. '
  '3':
  - type: text
    content: 'Jésus a répondu : Pourquoi n’obéissez‑vous pas aux commandements de Dieu ? Par contre, vous faites des choses que vous avez apprises des '
  - type: text
    content: anciens
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Beaucoup de gens sont venus auprès de lui. Ils lui ont amené des malades. Certains de ces malades ne pouvaient pas marcher très bien. Certains d’entre eux ne pouvaient pas voir. Certains ne pouvaient pas utiliser leurs bras ou leurs jambes. Et certains parmi eux ne pouvaient pas parler. Il y avait aussi beaucoup d’autres malades avec différentes maladies. On mettait les malades devant Jésus. Et Jésus les guérissait. '
  '31':
  - type: text
    content: Les gens ont vu ce que Jésus a fait. Ils étaient très surpris. Car les gens qui ne parlaient pas, ont pu parler. Les gens ne pouvaient pas utiliser leurs jambes ou leurs bras, étaient guéris. Les gens qui ne pouvaient pas marcher, ont pu marcher. Les gens qui ne voyaient pas, ont pu voir. Les gens ont alors tous grandement remercié le Tout‑Puissant d’Israël.
  - type: heading
    content: Jésus nourrit 4 000 hommes et leurs familles
  '32':
  - type: text
    content: 'Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Venez près de moi. Il a dit : Je suis triste pour ces gens. Ils sont restés avec moi pendant 3 jours et ils n’ont plus de nourriture. Je ne veux pas les renvoyer alors qu’ils ont faim. Ils peuvent tomber sur le chemin, parce qu’ils sont faibles et affamés.'
  '33':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont dit à Jésus : Nous sommes dans un endroit '
  - type: text
    content: désert
  - type: text
    content: '. Où pouvons‑nous trouver assez de pains ici pour nourrir une telle foule ? '
  '34':
  - type: text
    content: 'Jésus a demandé : Combien de pains avez‑vous ? Ils ont répondu : Nous avons 7 pains et quelques petits poissons.'
  '35':
  - type: text
    content: 'Jésus a dit à la foule : Asseyez‑vous à terre. '
  '36':
  - type: text
    content: 'Puis il a tenu les 7 pains et les poissons dans ses mains. Il a remercié Dieu. Puis il les a coupés. Et il les a donnés à ses  '
  - type: text
    content: disciples
  - type: text
    content: '. Il a dit : Donnez cette nourriture aux gens. '
  '37':
  - type: text
    content: 'Tous les gens ont mangé et ils ont tous eu assez. Après le manger, il y avait des restes. Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont rempli 7 paniers avec les morceaux restants. '
  '38':
  - type: text
    content: '4 000 hommes ont mangé. En plus, il y avait des femmes et des enfants. '
  '39':
  - type: text
    content: 'Alors Jésus a dit à la grande foule : Maintenant, rentrez tous chez vous. Après cela, Jésus est monté dans le petit bateau. Et il est allé loin dans la partie du pays appelé Magadan.'
  '4':
  - type: text
    content: 'Dieu dit : Honore ton père et ta mère. Il a dit aussi ceci : Toute personne qui parle mal contre son père et sa mère doit mourir. '
  '5':
  - type: text
    content: 'Mais vous apprenez aux gens quelque chose de différent. Vous laissez une personne dire à son père ou sa mère : J’allais vous donner ces bons cadeaux, mais je ne peux pas. Au lieu de cela, je les ai donnés à Dieu. Alors, vous ne lui laissez rien pour donner à sa mère et à son père.'
  '6':
  - type: text
    content: 'Quand vous laissez une personne faire cela, vous n’avez pas obéi à la loi de Dieu. Vous avez obéi aux lois de vos ancêtres à la place. Vous faites bien d’autres choses comme ceci.  '
  '7':
  - type: text
    content: 'Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '  ! Ce qu’Ésaïe a dit de vous est vrai. Il a écrit ces paroles de Dieu :'
  '8':
  - type: text
    content: Ces gens disent de bonnes choses sur moi, 
  - type: text
    content: mais ils ne veulent pas vraiment m’obéir.
  '9':
  - type: text
    content: Ils disent que je suis puissant et important.
  - type: text
    content: Mais ce qu’ils disent n’a aucun but.
  - type: text
    content: Ils enseignent leurs propres règles, que je ne leur ai pas données.
  - type: heading
    content: Jésus parle de mauvaises choses que les gens font
