document_id: 1PE.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: text
    content: 'Donc, vous devez refuser de faire toutes sortes de mauvaises choses. Ne dites aucun mensonge. Ne soyez pas '
  - type: text
    content: hypocrites
  - type: text
    content: ' en aucune façon. Ne soyez pas jaloux des autres. Ne dites pas de mauvaises choses contre les autres. '
  '10':
  - type: text
    content: Avant, vous n’étiez pas de gens qui connaissaient Dieu. Mais maintenant, vous êtes le peuple de Dieu. Avant, Dieu ne vous avait pas pardonné. Mais maintenant, il est très gentil avec vous et il vous pardonne.
  '11':
  - type: text
    content: 'Mes amis, souvenez‑vous que vous êtes vraiment des étrangers dans ce monde. Vous n’êtes pas d’ici. Je vous dis donc de ne pas faire de mauvaises choses que vos corps pourraient vouloir faire. Ces mauvaises choses luttent contre ce qui est bon pour vos âmes. Elles vous empêchent de faire de bonnes choses. '
  '12':
  - type: text
    content: Vous vivez parmi des gens qui ne connaissent pas Dieu. Faites donc très attention, vivez toujours dans le bon sens. Parfois, ces personnes peuvent dire à tort que vous faites de mauvaises choses. Mais si vous continuez de vivre dans un bon sens, elles verront que vous faites vraiment de bonnes choses. Par conséquent, le jour où Dieu viendra et se montrera aux gens, ils sauront qu’il est bon.
  - type: heading
    content: Obéissez aux personnes qui ont le pouvoir sur vous
  '13':
  - type: text
    content: 'Obéissez à tous ceux qui ont le pouvoir dans ce monde. Obéissez‑leur, car vous êtes des serviteurs du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. Tout d’abord, obéissez au roi, qui dirige tout le monde. '
  '14':
  - type: text
    content: 'Obéissez également aux '
  - type: text
    content: officiers
  - type: text
    content: ' qui servent le roi. Il les a choisis pour vous diriger en son nom. Ils punissent les gens qui font de mauvaises choses. Et ils louent les gens qui font de bonnes choses. '
  '15':
  - type: text
    content: Dieu veut que vous fassiez seulement le bien. Alors, les idiots ne pourront pas dire de mauvaises choses contre vous. Ces gens ne savent pas vraiment ce qui est vrai.
  '16':
  - type: text
    content: 'Vous êtes des gens libres. Mais vous êtes des serviteurs de Dieu. Vivez donc d’une manière qui rendra Dieu heureux. Ne pensez pas : Parce que je suis libre, je peux faire toute mauvaise chose que je veux. '
  '17':
  - type: text
    content: Vous devez respecter tout le monde. Aimez tous ces gens qui sont comme vos frères et sœurs, car ils sont aussi des croyants. Obéissez à Dieu en tant que votre maître. Respectez le roi.
  '18':
  - type: text
    content: 'Vous qui êtes esclaves, vous devez obéir à vos maîtres. Respectez‑les toujours. Faites cela à tout type de maître. Obéissez à ceux qui sont bons et gentils. Mais obéissez également à des maîtres qui ne sont pas justes envers vous. '
  '19':
  - type: text
    content: 'Cela rend Dieu heureux. Peut‑être que votre maître vous punira lorsque vous n’aurez rien fait de mal. Mais si vous savez que vous servez Dieu, vous devez continuer d’être patients et courageux. '
  '2':
  - type: text
    content: 'Mais, vous devez vouloir savoir plus sur Dieu de plus en plus. Les nouveaux bébés veulent toujours le lait de leur mère, ce qui les rend plus forts. Le vrai message de Dieu est comme de la bonne nourriture qui vous rendra forts dans vos '
  - type: text
    content: esprits
  - type: text
    content: '. Apprenez plus sur Dieu chaque jour, afin de continuer de grandir en tant que croyants. Puis à la fin, Dieu vous sauvera complètement de mauvaises choses de ce monde. '
  '20':
  - type: text
    content: 'Mais si vous faites quelque chose de mal, alors votre maître doit vous punir. C’est juste. Même si vous êtes courageux quand il vous frappe, personne ne doit vous en féliciter. Mais vous pouvez avoir des souffrances, parce que vous avez fait de bonnes choses. Alors Dieu sera heureux, si vous êtes patients et courageux. '
  '21':
  - type: text
    content: Quand Dieu vous a choisis pour être ses serviteurs, il a voulu que vous soyez courageux comme ça. Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a eu des souffrances pour vous. Il vous a montré comment vivre. Vous devez être patients et courageux comme lui.'
  '22':
  - type: text
    content: 'La Bible dit ceci :'
  - type: text
    content: Il n’a jamais rien fait de mal.
  - type: text
    content: Il n’a jamais rien dit de faux.
  '23':
  - type: text
    content: Les gens ont dit de mauvaises choses contre Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', mais il ne leur a rien dit de mal. Les gens lui ont causé des troubles, mais il n’a jamais essayé de leur faire du mal en retour. Par contre, Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' a cru en Dieu pour l’aider. Il savait que Dieu '
  - type: text
    content: juge
  - type: text
    content: ' toujours les gens d’une manière vraie.'
  '24':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort sur la croix pour nos péchés. Son propre corps a souffert pour nous. Il l’a fait pour que les mauvaises choses ne nous dominent plus. Mais, nous pouvons maintenant faire de bonnes choses que Dieu veut que nous fassions. Parce que les gens ont fait souffrir le corps de '
  - type: text
    content: Christ
  - type: text
    content: ', vous êtes maintenant guéris. '
  '25':
  - type: text
    content: 'Avant, vous étiez comme des brebis qui allaient dans le mauvais sens. Mais maintenant, vous vous êtes retournés et vous êtes venus à '
  - type: text
    content: Christ
  - type: text
    content: . Il est votre berger et il vous protège complètement.
  '3':
  - type: text
    content: 'Déjà, vous avez commencé à savoir combien le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon pour vous. Si vous le savez vraiment, vous devez chercher à le connaître de plus en plus.'
  - type: heading
    content: Jésus est comme la pierre la plus importante de la maison de Dieu
  '4':
  - type: text
    content: 'Venez donc au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. Il est comme une grosse pierre qu’un constructeur utilise pour construire une maison. Mais il est vivant. Les gens ont décidé qu’il n’était pas important. Ils l’ont donc refusé. Mais Dieu l’avait choisi. Pour Dieu, Jésus est très important. '
  '5':
  - type: text
    content: 'Vous aussi, vous êtes comme des pierres vivantes. Dieu vous utilise, comme des pierres, pour construire une maison où son '
  - type: text
    content: Esprit
  - type: text
    content: ' vit. Vous le servirez comme ses '
  - type: text
    content: prêtres
  - type: text
    content: ' spéciaux qui lui offrent des '
  - type: text
    content: sacrifices
  - type: text
    content: . Dieu sera content des dons spirituels que vous lui offrez, car vous appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '6':
  - type: text
    content: 'Dans la Bible, Dieu dit ceci :'
  - type: text
    content: Regardez, j’ai choisi une pierre qui est très précieuse.
  - type: text
    content: 'J’ai choisi cette pierre comme la pierre la plus importante, pour le coin de ma maison à '
  - type: text
    content: Sion
  - type: text
    content: .
  - type: text
    content: Toute personne qui croit en elle ne sera jamais déçue.
  '7':
  - type: text
    content: 'Cette pierre est très importante pour vous qui croyez en Jésus. Mais la Bible dit ceci à propos des gens qui ne croient pas en lui :'
  - type: text
    content: Les constructeurs ont refusé d’utiliser une certaine pierre.
  - type: text
    content: Ils pensaient que cela n’avait aucune valeur.
  - type: text
    content: Mais maintenant, cette pierre est devenue la pierre la plus importante au coin du bâtiment.
  '8':
  - type: text
    content: 'La Bible dit également ceci :'
  - type: text
    content: Cette pierre fera tomber les gens au sol.
  - type: text
    content: 'C’est un '
  - type: text
    content: rocher
  - type: text
    content: ' qui les fera tomber.'
  - type: text
    content: Ils tombent comme ça, parce qu’ils refusent d’obéir au message de Dieu. Dieu a déjà décidé que cela leur arrivera.
  '9':
  - type: text
    content: 'Mais vous n’êtes pas comme ça. Vous êtes un groupe spécial de personnes que Dieu a choisi. Vous servez Dieu comme des '
  - type: text
    content: prêtres
  - type: text
    content: '. Vous êtes des serviteurs de Dieu, le Roi. Vous êtes son propre peuple, qui lui obéit complètement. Vous appartenez à Dieu lui‑même. Il vous a fait sortir du lieu sombre du péché, et il vous a amenés dans sa grande lumière. Il a fait tout cela pour que vous puissiez dire aux gens à quel point il est grand. '
