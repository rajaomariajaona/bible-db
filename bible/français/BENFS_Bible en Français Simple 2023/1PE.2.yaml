document_id: 1PE.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Donc, vous devez refuser de faire toutes sortes de mauvaises choses. Ne dites aucun mensonge. Ne soyez pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: ' en aucune façon. Ne soyez pas jaloux des autres. Ne dites pas de mauvaises choses contre les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais, vous devez vouloir savoir plus sur Dieu de plus en plus. Les nouveaux bébés veulent toujours le lait de leur mère, ce qui les rend plus forts. Le vrai message de Dieu est comme de la bonne nourriture qui vous rendra forts dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Apprenez plus sur Dieu chaque jour, afin de continuer de grandir en tant que croyants. Puis à la fin, Dieu vous sauvera complètement de mauvaises choses de ce monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Déjà, vous avez commencé à savoir combien le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est bon pour vous. Si vous le savez vraiment, vous devez chercher à le connaître de plus en plus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est comme la pierre la plus importante de la maison de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Venez donc au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. Il est comme une grosse pierre qu’un constructeur utilise pour construire une maison. Mais il est vivant. Les gens ont décidé qu’il n’était pas important. Ils l’ont donc refusé. Mais Dieu l’avait choisi. Pour Dieu, Jésus est très important. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous aussi, vous êtes comme des pierres vivantes. Dieu vous utilise, comme des pierres, pour construire une maison où son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' vit. Vous le servirez comme ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' spéciaux qui lui offrent des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: . Dieu sera content des dons spirituels que vous lui offrez, car vous appartenez à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dans la Bible, Dieu dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regardez, j’ai choisi une pierre qui est très précieuse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’ai choisi cette pierre comme la pierre la plus importante, pour le coin de ma maison à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sion
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute personne qui croit en elle ne sera jamais déçue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cette pierre est très importante pour vous qui croyez en Jésus. Mais la Bible dit ceci à propos des gens qui ne croient pas en lui :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les constructeurs ont refusé d’utiliser une certaine pierre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils pensaient que cela n’avait aucune valeur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais maintenant, cette pierre est devenue la pierre la plus importante au coin du bâtiment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La Bible dit également ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette pierre fera tomber les gens au sol.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rocher
  - type: text
    text: ' qui les fera tomber.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tombent comme ça, parce qu’ils refusent d’obéir au message de Dieu. Dieu a déjà décidé que cela leur arrivera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais vous n’êtes pas comme ça. Vous êtes un groupe spécial de personnes que Dieu a choisi. Vous servez Dieu comme des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: '. Vous êtes des serviteurs de Dieu, le Roi. Vous êtes son propre peuple, qui lui obéit complètement. Vous appartenez à Dieu lui‑même. Il vous a fait sortir du lieu sombre du péché, et il vous a amenés dans sa grande lumière. Il a fait tout cela pour que vous puissiez dire aux gens à quel point il est grand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Avant, vous n’étiez pas de gens qui connaissaient Dieu. Mais maintenant, vous êtes le peuple de Dieu. Avant, Dieu ne vous avait pas pardonné. Mais maintenant, il est très gentil avec vous et il vous pardonne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mes amis, souvenez‑vous que vous êtes vraiment des étrangers dans ce monde. Vous n’êtes pas d’ici. Je vous dis donc de ne pas faire de mauvaises choses que vos corps pourraient vouloir faire. Ces mauvaises choses luttent contre ce qui est bon pour vos âmes. Elles vous empêchent de faire de bonnes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous vivez parmi des gens qui ne connaissent pas Dieu. Faites donc très attention, vivez toujours dans le bon sens. Parfois, ces personnes peuvent dire à tort que vous faites de mauvaises choses. Mais si vous continuez de vivre dans un bon sens, elles verront que vous faites vraiment de bonnes choses. Par conséquent, le jour où Dieu viendra et se montrera aux gens, ils sauront qu’il est bon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obéissez aux personnes qui ont le pouvoir sur vous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Obéissez à tous ceux qui ont le pouvoir dans ce monde. Obéissez‑leur, car vous êtes des serviteurs du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. Tout d’abord, obéissez au roi, qui dirige tout le monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Obéissez également aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' qui servent le roi. Il les a choisis pour vous diriger en son nom. Ils punissent les gens qui font de mauvaises choses. Et ils louent les gens qui font de bonnes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dieu veut que vous fassiez seulement le bien. Alors, les idiots ne pourront pas dire de mauvaises choses contre vous. Ces gens ne savent pas vraiment ce qui est vrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous êtes des gens libres. Mais vous êtes des serviteurs de Dieu. Vivez donc d’une manière qui rendra Dieu heureux. Ne pensez pas : Parce que je suis libre, je peux faire toute mauvaise chose que je veux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Vous devez respecter tout le monde. Aimez tous ces gens qui sont comme vos frères et sœurs, car ils sont aussi des croyants. Obéissez à Dieu en tant que votre maître. Respectez le roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous qui êtes esclaves, vous devez obéir à vos maîtres. Respectez‑les toujours. Faites cela à tout type de maître. Obéissez à ceux qui sont bons et gentils. Mais obéissez également à des maîtres qui ne sont pas justes envers vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cela rend Dieu heureux. Peut‑être que votre maître vous punira lorsque vous n’aurez rien fait de mal. Mais si vous savez que vous servez Dieu, vous devez continuer d’être patients et courageux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais si vous faites quelque chose de mal, alors votre maître doit vous punir. C’est juste. Même si vous êtes courageux quand il vous frappe, personne ne doit vous en féliciter. Mais vous pouvez avoir des souffrances, parce que vous avez fait de bonnes choses. Alors Dieu sera heureux, si vous êtes patients et courageux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quand Dieu vous a choisis pour être ses serviteurs, il a voulu que vous soyez courageux comme ça. Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a eu des souffrances pour vous. Il vous a montré comment vivre. Vous devez être patients et courageux comme lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La Bible dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’a jamais rien fait de mal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’a jamais rien dit de faux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les gens ont dit de mauvaises choses contre Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', mais il ne leur a rien dit de mal. Les gens lui ont causé des troubles, mais il n’a jamais essayé de leur faire du mal en retour. Par contre, Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a cru en Dieu pour l’aider. Il savait que Dieu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' toujours les gens d’une manière vraie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort sur la croix pour nos péchés. Son propre corps a souffert pour nous. Il l’a fait pour que les mauvaises choses ne nous dominent plus. Mais, nous pouvons maintenant faire de bonnes choses que Dieu veut que nous fassions. Parce que les gens ont fait souffrir le corps de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', vous êtes maintenant guéris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avant, vous étiez comme des brebis qui allaient dans le mauvais sens. Mais maintenant, vous vous êtes retournés et vous êtes venus à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il est votre berger et il vous protège complètement.
