document_id: 2CO.9,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 9
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je n’ai pas besoin de vous écrire sur l’argent que vous voulez envoyer au peuple de Dieu à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C’est Dieu qui fournit les semences que l’agriculteur sème. C’est Dieu qui fournit du pain pour la nourriture. Dieu vous aidera de la même manière. Il vous donnera plein de choses pour que vous puissiez aider d’autres personnes. Vous serez comme un fermier qui plante de nombreuses graines. Et Dieu fera pousser ces graines. Il y aura beaucoup de bons résultats grâce à l’aide que vous apportez à d’autres personnes. Ce sera comme une grande récolte. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dieu vous enrichira de beaucoup de bonnes choses. En conséquence, vous serez toujours en mesure de donner beaucoup à d’autres personnes. Beaucoup de gens remercieront Dieu à cause de vos dons que nous leur apporterons.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ce bon travail que vous faites aide le peuple de Dieu. Cela aide à fournir ce dont ils ont besoin. Et ce n’est pas seulement cela. Ça pousse aussi beaucoup de gens à remercier beaucoup Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Votre don d’argent montrera aux gens que vous voulez vraiment aider. Les gens diront que Dieu est grand. Ils verront que vous voulez obéir à Dieu. Ils verront que vous êtes heureux de leur donner, ainsi qu’à tout le monde. Ils verront que vous croyez vraiment à la Bonne Nouvelle de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', comme vous le dites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils voudront vous remercier. Ils prieront Dieu pour vous. Ils le feront, parce qu’ils voient à quel point Dieu a été très gentil avec vous.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Oui, nous devons tous remercier Dieu pour son très grand don. Ce don est trop grand pour le décrire avec des mots !
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je sais que vous voulez beaucoup aider. J’ai dit aux croyants de Macédoine à quel point vous êtes bons. Je leur dis que vous, les croyants d’Achaïe, vous étiez prêts à donner votre argent depuis l’année dernière. Parce que vous êtes si prêts à aider, la plupart d’entre eux veulent maintenant vous aider. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mais je ne veux pas que la façon dont je vous ai loués ne soit pas vraie. Alors, j’envoie ces hommes, nos amis chrétiens, venir vers vous. Je veux être sûr que vous serez prêts à donner votre argent. C’est ce que j’ai dit aux gens sur vous.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Peut‑être que certains croyants de Macédoine pourraient venir avec moi. Si vous n’êtes pas prêts quand nous arriverons, nous aurons honte. Nous aurons honte de vous faire confiance. Et je pense que vous aurez honte aussi ! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: J’ai donc décidé de dire à ces hommes de vous rendre visite avant de venir moi‑même. Ils vous aideront à préparer le don que vous avez promis. Ensuite, il sera prêt à mon arrivée. Tout le monde saura que vous vouliez vraiment offrir ce cadeau. Personne ne vous a fait donner cela.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Il est bon de donner autant que possible
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Rappelez‑vous ceci : Si un agriculteur sème seulement quelques graines, il n’obtiendra pas beaucoup de bons résultats. Mais s’il sème beaucoup de graines, il obtiendra une grande récolte. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Chacun de vous doit réfléchir attentivement et décider ensuite de ce que vous pouvez donner. Alors, vous ne serez pas tristes de donner cet argent. Personne ne vous a poussés à donner cela. Dieu aime quelqu’un qui est heureux d’aider les autres.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Puisque Dieu vous aime, il peut vous donner plus que ce dont vous avez besoin. Vous aurez toujours toutes les bonnes choses dont vous avez besoin. Et vous en aurez assez pour faire beaucoup de bonnes choses pour aider les autres. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'La Bible dit ceci à propos de quelqu’un qui aide les autres :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a partagé ses choses avec de nombreux pauvres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu se souviendra toujours de la gentillesse de cette personne.
