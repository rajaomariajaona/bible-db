document_id: MAT.7,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 7
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Il ne faut pas juger les autres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne dites à personne : Tu es une mauvaise personne. Alors Dieu ne vous dira pas non plus : Tu es une mauvaise personne. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Votre enfant peut vous demander un poisson. C’est sûr, vous ne lui donnerez pas un serpent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voyez, vous êtes mauvais. Mais vous savez donner de bonnes choses à vos enfants. Vous faites cela, mais Dieu est de loin meilleur que vous. Il donnera certainement de bonnes choses à ceux qui les lui demandent.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous voulez que d’autres personnes fassent des choses pour vous. Alors faites‑les aussi à d’autres personnes. C’est cela que la loi de Dieu dit. C’est aussi ce que les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' avaient dit.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus enseigne comment obtenir la vraie vie
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous devez entrer par la porte étroite. Il y a aussi une large porte et un chemin spacieux. Mais ce chemin conduit à la destruction. Beaucoup de gens passent par ce chemin. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y a une porte étroite et un chemin étroit. Ce chemin étroit conduit à la vie. Mais c’est difficile. Et peu de gens seulement passent par là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de bons et de mauvais serviteurs
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Attention aux faux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: . Ils disent qu’ils sont des serviteurs spéciaux de Dieu. Ils viennent à vous. Ils semblent être comme des brebis. Mais en réalité, ils sont comme des animaux méchants (loups) qui attaquent.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous les reconnaîtrez par ce qu’ils font. Les raisins ne viennent pas d’épines. Les figues non plus ne viennent pas de plantes appelées chardons. De la même façon, de bonnes choses ne viennent pas de mauvaises personnes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De la même façon, tout bon arbre produit de bons fruits. Mais un mauvais arbre produit de mauvais fruits. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un bon arbre ne peut pas produire de mauvais fruits. Un mauvais arbre ne peut pas faire de bons fruits. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens coupent tout arbre qui ne produit pas de bons fruits. Ils le jettent dans le feu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu vous jugera comme vous le faites aux autres. Vous appliquez des règles en jugeant les autres. Dieu appliquera les mêmes règles sur vous. 
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous pouvez reconnaître chaque arbre par son fruit. De la même façon, vous reconnaîtrez ces mauvaises personnes par ce qu’elles font.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines personnes me diront : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Mais toutes ces personnes n’entreront pas dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: '. Seules les personnes qui obéissent à Dieu, mon Père céleste, entreront. Elles font ce que Dieu veut qu’elles fassent. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour où Dieu jugera les gens, ces gens vont dire : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Tu sais que nous avons dit les messages de Dieu en ton nom. Tu sais que nous avons aussi chassé de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' en ton nom. Tu sais que nous avons fait beaucoup de miracles en ton nom. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je vais dire à ces gens : Je ne vous connais pas. Vous ne m’obéissez pas, vous êtes méchants. Donc, allez loin de moi. '
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire sur 2 hommes qui ont construit chacun une maison
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un peut entendre mes paroles. Il peut aussi pratiquer les paroles que je dis. S’il le fait, il est comme un homme qui a bâti sa maison sur le roc. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis une forte pluie est tombée. Les eaux des fleuves ont débordé. Les eaux ont frappé contre la maison. Des vents forts ont aussi soufflé contre cette maison. Mais la maison n’est pas tombée, parce que l’homme l’avait construite sur le roc. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un autre homme peut entendre mes paroles, mais il ne les met pas en pratique. Il est comme un homme qui a construit sa maison sur le sable. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis une forte pluie est tombée. Les eaux des fleuves ont débordé. Les eaux ont frappé contre la maison. Des vents forts ont aussi soufflé contre elle. La maison est tombée. La tempête a détruit complètement la maison.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a fini de parler. Tous les gens étaient très surpris des choses qu’il leur disait. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus ne les enseignait pas comme les enseignants de la loi de Dieu. Jésus avait son propre pouvoir quand il les enseignait.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne regarde pas le brin de paille qui est dans l’œil de ton frère. Regarde d’abord le gros morceau de bois qui est dans ton œil.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne peux pas dire à ton frère : S’il te plaît, laisse‑moi enlever le brin de paille de tes yeux. Mais tu n’as pas vu le gros morceau de bois qui est dans ton œil. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hypocrite
    - type: text
      text: . D’abord, enlève le gros morceau de bois de ton propre œil. Ensuite, tes yeux seront clairs et tu verras bien. Après cela, tu pourras enlever le brin de paille dans l’œil de ton frère.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne donnez pas vraiment de bonnes choses de Dieu aux chiens. Les chiens vont se tourner et vous attaquer. Ne jetez pas les choses de valeur aux porcs. Ils pourront se tenir sur ces choses et les enterrer dans la terre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu donne de bonnes choses aux personnes qui les lui demandent
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Demandez à Dieu ce dont vous avez besoin. Et puis vous recevrez. Cherchez ce dont vous avez besoin. Et puis, vous le trouverez. Frappez à la porte. Et puis Dieu ouvrira pour vous. 
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toute personne qui demande quelque chose l’aura. Tout le monde qui cherche quelque chose l’aura. Dieu ouvrira la porte à toute personne qui frappe à la porte.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains d’entre vous sont des parents. Votre enfant peut vous demander du pain. C’est sûr, vous ne lui donnerez pas une pierre. '
