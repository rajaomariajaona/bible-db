document_id: MRK.7,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 7
  - type: heading
    content: Jésus parle aux Pharisiens et certains enseignants de la loi de Dieu
  - type: text
    content: 'Un groupe de '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et certains enseignants de la loi de Dieu sont venus de Jérusalem. Ils sont venus pour parler avec Jésus. '
  '10':
  - type: text
    content: 'Par exemple, Moïse a écrit : Vous devez aimer votre père et votre mère et vous devez leur obéir. Il a dit aussi : Une personne doit mourir si elle dit de mauvaises choses contre son père ou contre sa mère. '
  '11':
  - type: text
    content: 'Mais vous permettez à un homme de dire à ses parents : Toute aide que vous pourriez recevoir de moi est corban (cela signifie que je l’ai donnée à Dieu). '
  '12':
  - type: text
    content: 'Alors, vous ne lui permettez pas de faire quelque chose pour son père ou sa mère. '
  '13':
  - type: text
    content: Donc, vous obéissez plus à vos traditions qu’aux commandements de Dieu. Et vous faites beaucoup d’autres choses comme cela.
  '14':
  - type: text
    content: 'Encore une fois, Jésus a demandé à tous les gens de venir auprès de lui. Il a dit : Écoutez‑moi, afin que vous puissiez comprendre ces choses. '
  '15':
  - type: text
    content: 'Les choses qui rendent l’homme mauvais ne viennent pas de son extérieur. Mais les choses qui le rendent mauvais viennent de son intérieur. '
  '16':
  - type: text
    content: Vous avez entendu mes paroles. Donc, faites ce que je dis.
  - type: heading
    content: Jésus explique à ses disciples ce qu’il enseignait
  '17':
  - type: text
    content: 'Jésus a quitté la foule et il est entré dans une maison. Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' ont demandé à Jésus de leur expliquer ce qu’il enseignait. '
  '18':
  - type: text
    content: 'Jésus a dit : Je suis surpris que vous non plus, vous ne puissiez pas comprendre. La nourriture entre dans le corps d’une personne de l’extérieur. Ainsi, cela ne rend pas l’homme impur. '
  '19':
  - type: text
    content: Vous savez que la nourriture ne va pas dans l’
  - type: text
    content: esprit
  - type: text
    content: ' d’une personne. Tout d’abord, elle va dans son estomac, puis elle sort de son corps. Donc, tous les aliments sont purs. '
  '2':
  - type: text
    content: 'Ils regardaient les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus. Certains '
  - type: text
    content: disciples
  - type: text
    content: ' ne se lavaient pas les mains avant un repas. Au lieu de cela, ils mangeaient leur nourriture comme les autres mangent. '
  '20':
  - type: text
    content: 'Et Jésus a dit : Le cœur de l’homme peut avoir de mauvaises pensées. Ces mauvaises pensées qui viennent de son cœur le rendent mauvais. '
  '21':
  - type: text
    content: 'Ainsi, les mauvaises pensées qui viennent du cœur de l’homme, peuvent le pousser à faire ces mauvaises choses : Il peut avoir une mauvaise conduite. Il peut voler quelqu’un. Il peut tuer quelqu’un. '
  '22':
  - type: text
    content: 'Il peut coucher avec la femme d’un autre homme. Il peut aimer trop les richesses et les avoir abondamment. Il peut être méchant à d’autres personnes. Il peut dire de fausses choses aux autres. Il peut faire des actes qui provoquent le désir sexuel. Il peut vouloir les choses d’autrui. Il peut dire tout mal contre les autres. Il peut penser qu’il est très important. Il peut agir comme quelqu’un sans intelligence. '
  '23':
  - type: text
    content: Toutes ces mauvaises choses commencent dans le cœur de l’homme. Puis, elles font l’homme mauvais.
  - type: heading
    content: Jésus quitte Israël
  '24':
  - type: text
    content: 'Après cela, Jésus s’en est allé. Il était près de la ville appelée Tyr. Il est entré dans une maison. Il ne voulait pas que les gens sachent qu’il était là. Mais ce n’était pas possible de garder le secret. '
  '25':
  - type: text
    content: 'Immédiatement, quelqu’un a parlé de Jésus à une femme. Cette femme avait une fille qui avait un mauvais '
  - type: text
    content: esprit
  - type: text
    content: '. La femme est venue et elle s’est baissée aux pieds de Jésus. '
  '26':
  - type: text
    content: 'Elle n’était pas Juive, sa famille était de Syrophénicie. Elle a demandé à Jésus de faire sortir le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' de sa fille. '
  '27':
  - type: text
    content: 'Jésus a dit à la femme : D’abord, les enfants doivent manger tout ce qu’ils veulent. Il faut laisser d’abord les enfants de la maison se rassasier de nourriture. Ce n’est pas bien de jeter la nourriture des enfants aux chiens. '
  '28':
  - type: text
    content: 'La femme a répondu. Elle lui a dit : Oui, '
  - type: text
    content: Seigneur
  - type: text
    content: '. Mais quelques morceaux de nourriture tombent quand les enfants mangent. Et les chiens sous la table, mangent ces morceaux qui tombent. '
  '29':
  - type: text
    content: 'Jésus a répondu : Parce que tu as dit cela, tu peux aller à ta maison. Maintenant, le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' a laissé ta fille. '
  '3':
  - type: text
    content: '(Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' se lavent d’abord les mains avec soin avant de manger. Ils font cela à cause d’une règle que leurs  '
  - type: text
    content: anciens
  - type: text
    content: ' dirigeants avaient faite, il y a plusieurs années. '
  '30':
  - type: text
    content: 'La femme est allée chez elle. Elle a trouvé l’enfant qui était couchée sur le lit. Le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' a quitté l’enfant. '
  '31':
  - type: text
    content: 'Alors Jésus a quitté Tyr. Il a voyagé à travers la ville appelée Sidon. Il est allé vers la mer. Il était au milieu des 10 villes là‑bas. '
  '32':
  - type: text
    content: 'Certaines personnes ont amené un homme à Jésus. Cet homme ne pouvait pas entendre ni parler clairement. Les gens ont demandé à Jésus de mettre ses mains sur l’homme. '
  '33':
  - type: text
    content: 'Jésus a conduit l’homme loin de la foule. Puis il a mis les doigts dans les oreilles de l’homme. Alors Jésus a craché de la salive dans ses mains. Il a touché la langue de l’homme avec ça. '
  '34':
  - type: text
    content: 'Jésus a levé les yeux vers le '
  - type: text
    content: ciel
  - type: text
    content: '. Il a respiré fortement et profondément exprimant la tristesse. Puis Jésus a dit à l’homme : Ephphatha ! Cela signifie, ouvre‑toi ! '
  '35':
  - type: text
    content: 'Alors l’homme a commencé à entendre. Et tout de suite, la langue de l’homme a pu bouger. Et l’homme parlait clairement. '
  '36':
  - type: text
    content: 'Jésus a dit aux gens de ne pas dire cela à une autre personne. Mais quand Jésus leur a demandé de ne rien dire, ils parlaient encore plus de cela. '
  '37':
  - type: text
    content: 'Les gens étaient très surpris de tout ce que Jésus faisait. Ils disaient : Tout ce qu’il fait, est merveilleux. Il guérit même les gens qui n’entendaient pas. Il guérit aussi les gens qui ne parlaient pas.'
  '4':
  - type: text
    content: 'Quand ils reviennent de la place du marché, ils doivent toujours se laver les mains. Ils ne peuvent pas manger sans se laver les mains. Leurs dirigeants avaient également donné les règles sur la façon de faire d’autres choses. Par exemple, il y a des règles sur la façon dont ils doivent laver les coupes, cruches et vases en métal.) '
  '5':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et les enseignants de la loi de Dieu ont dit à Jésus : Tes '
  - type: text
    content: disciples
  - type: text
    content: ' ne respectent pas les règles que nos ancêtres nous avaient enseignées. Tes '
  - type: text
    content: disciples
  - type: text
    content: ' ne se lavent pas les mains. Ils mangent leur nourriture comme les autres mangent. '
  '6':
  - type: text
    content: 'Jésus a dit aux '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et aux enseignants de la loi de Dieu : Ce qu’Ésaïe avait dit au sujet de vous, est vrai. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '. Il a écrit ces paroles de Dieu : Ces gens disent de bonnes choses sur moi, mais ils ne veulent pas vraiment m’obéir. '
  '7':
  - type: text
    content: Ils enseignent les règles que les hommes leur ont données. Donc, ils m’adressent des prières pour rien.
  '8':
  - type: text
    content: 'Jésus leur a dit : Vous n’obéissez pas aux commandements de Dieu. Vous obéissez aux règles que les hommes ont faites.'
  '9':
  - type: text
    content: 'Il leur a dit : Vous refusez les règles de Dieu, mais vous obéissez à vos propres règles anciennes ! '
