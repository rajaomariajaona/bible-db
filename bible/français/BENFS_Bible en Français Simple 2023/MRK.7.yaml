document_id: MRK.7
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 7
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus parle aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et certains enseignants de la loi de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un groupe de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et certains enseignants de la loi de Dieu sont venus de Jérusalem. Ils sont venus pour parler avec Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils regardaient les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus. Certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ne se lavaient pas les mains avant un repas. Au lieu de cela, ils mangeaient leur nourriture comme les autres mangent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '(Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' se lavent d’abord les mains avec soin avant de manger. Ils font cela à cause d’une règle que leurs  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' dirigeants avaient faite, il y a plusieurs années. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand ils reviennent de la place du marché, ils doivent toujours se laver les mains. Ils ne peuvent pas manger sans se laver les mains. Leurs dirigeants avaient également donné les règles sur la façon de faire d’autres choses. Par exemple, il y a des règles sur la façon dont ils doivent laver les coupes, cruches et vases en métal.) '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et les enseignants de la loi de Dieu ont dit à Jésus : Tes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ne respectent pas les règles que nos ancêtres nous avaient enseignées. Tes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ne se lavent pas les mains. Ils mangent leur nourriture comme les autres mangent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus a dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et aux enseignants de la loi de Dieu : Ce qu’Ésaïe avait dit au sujet de vous, est vrai. Vous êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '. Il a écrit ces paroles de Dieu : Ces gens disent de bonnes choses sur moi, mais ils ne veulent pas vraiment m’obéir. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils enseignent les règles que les hommes leur ont données. Donc, ils m’adressent des prières pour rien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus leur a dit : Vous n’obéissez pas aux commandements de Dieu. Vous obéissez aux règles que les hommes ont faites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il leur a dit : Vous refusez les règles de Dieu, mais vous obéissez à vos propres règles anciennes ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Par exemple, Moïse a écrit : Vous devez aimer votre père et votre mère et vous devez leur obéir. Il a dit aussi : Une personne doit mourir si elle dit de mauvaises choses contre son père ou contre sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais vous permettez à un homme de dire à ses parents : Toute aide que vous pourriez recevoir de moi est corban (cela signifie que je l’ai donnée à Dieu). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors, vous ne lui permettez pas de faire quelque chose pour son père ou sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Donc, vous obéissez plus à vos traditions qu’aux commandements de Dieu. Et vous faites beaucoup d’autres choses comme cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Encore une fois, Jésus a demandé à tous les gens de venir auprès de lui. Il a dit : Écoutez‑moi, afin que vous puissiez comprendre ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les choses qui rendent l’homme mauvais ne viennent pas de son extérieur. Mais les choses qui le rendent mauvais viennent de son intérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Vous avez entendu mes paroles. Donc, faites ce que je dis.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus explique à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ce qu’il enseignait'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus a quitté la foule et il est entré dans une maison. Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont demandé à Jésus de leur expliquer ce qu’il enseignait. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus a dit : Je suis surpris que vous non plus, vous ne puissiez pas comprendre. La nourriture entre dans le corps d’une personne de l’extérieur. Ainsi, cela ne rend pas l’homme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous savez que la nourriture ne va pas dans l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' d’une personne. Tout d’abord, elle va dans son estomac, puis elle sort de son corps. Donc, tous les aliments sont purs. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et Jésus a dit : Le cœur de l’homme peut avoir de mauvaises pensées. Ces mauvaises pensées qui viennent de son cœur le rendent mauvais. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi, les mauvaises pensées qui viennent du cœur de l’homme, peuvent le pousser à faire ces mauvaises choses : Il peut avoir une mauvaise conduite. Il peut voler quelqu’un. Il peut tuer quelqu’un. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il peut coucher avec la femme d’un autre homme. Il peut aimer trop les richesses et les avoir abondamment. Il peut être méchant à d’autres personnes. Il peut dire de fausses choses aux autres. Il peut faire des actes qui provoquent le désir sexuel. Il peut vouloir les choses d’autrui. Il peut dire tout mal contre les autres. Il peut penser qu’il est très important. Il peut agir comme quelqu’un sans intelligence. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toutes ces mauvaises choses commencent dans le cœur de l’homme. Puis, elles font l’homme mauvais.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus quitte Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après cela, Jésus s’en est allé. Il était près de la ville appelée Tyr. Il est entré dans une maison. Il ne voulait pas que les gens sachent qu’il était là. Mais ce n’était pas possible de garder le secret. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Immédiatement, quelqu’un a parlé de Jésus à une femme. Cette femme avait une fille qui avait un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. La femme est venue et elle s’est baissée aux pieds de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Elle n’était pas Juive, sa famille était de Syrophénicie. Elle a demandé à Jésus de faire sortir le mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' de sa fille. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus a dit à la femme : D’abord, les enfants doivent manger tout ce qu’ils veulent. Il faut laisser d’abord les enfants de la maison se rassasier de nourriture. Ce n’est pas bien de jeter la nourriture des enfants aux chiens. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La femme a répondu. Elle lui a dit : Oui, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Mais quelques morceaux de nourriture tombent quand les enfants mangent. Et les chiens sous la table, mangent ces morceaux qui tombent. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus a répondu : Parce que tu as dit cela, tu peux aller à ta maison. Maintenant, le mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' a laissé ta fille. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'La femme est allée chez elle. Elle a trouvé l’enfant qui était couchée sur le lit. Le mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' a quitté l’enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus a quitté Tyr. Il a voyagé à travers la ville appelée Sidon. Il est allé vers la mer. Il était au milieu des 10 villes là‑bas. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Certaines personnes ont amené un homme à Jésus. Cet homme ne pouvait pas entendre ni parler clairement. Les gens ont demandé à Jésus de mettre ses mains sur l’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus a conduit l’homme loin de la foule. Puis il a mis les doigts dans les oreilles de l’homme. Alors Jésus a craché de la salive dans ses mains. Il a touché la langue de l’homme avec ça. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus a levé les yeux vers le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Il a respiré fortement et profondément exprimant la tristesse. Puis Jésus a dit à l’homme : Ephphatha ! Cela signifie, ouvre‑toi ! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Alors l’homme a commencé à entendre. Et tout de suite, la langue de l’homme a pu bouger. Et l’homme parlait clairement. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jésus a dit aux gens de ne pas dire cela à une autre personne. Mais quand Jésus leur a demandé de ne rien dire, ils parlaient encore plus de cela. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les gens étaient très surpris de tout ce que Jésus faisait. Ils disaient : Tout ce qu’il fait, est merveilleux. Il guérit même les gens qui n’entendaient pas. Il guérit aussi les gens qui ne parlaient pas.'
