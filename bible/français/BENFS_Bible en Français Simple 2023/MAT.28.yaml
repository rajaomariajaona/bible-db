document_id: MAT.28,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 28
  - type: heading
    content: Jésus devient vivant à nouveau
  - type: text
    content: Le premier jour de la semaine, Marie de Magdala et Marie, mère de Jacques se sont levées tôt. Elles sont allées au trou dans la roche. C’est là que Joseph avait enterré le corps mort de Jésus.
  '10':
  - type: text
    content: 'Alors Jésus leur a dit : N’ayez pas peur. Allez parler à mes  '
  - type: text
    content: disciples
  - type: text
    content: '. Dites‑leur : Frères, Jésus vous avait dit : Allez en Galilée. Vous me verrez là‑bas.'
  - type: heading
    content: Les soldats disent aux chefs des prêtres ce qui est arrivé
  '11':
  - type: text
    content: 'Les femmes sont allées dire aux '
  - type: text
    content: disciples
  - type: text
    content: ' le message de Jésus. Certains des soldats qui avaient gardé la roche (le tombeau), sont allés en ville. Ces soldats ont dit aux chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' tout ce qui était arrivé au tombeau. '
  '12':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: anciens
  - type: text
    content: ' se sont réunis. Ils ont parlé de ce qu’ils devraient faire maintenant. Ils ont décidé de donner aux soldats beaucoup d’argent, afin qu’ils leur obéissent. '
  '13':
  - type: text
    content: 'Ils ont dit aux soldats : Vous devez dire aux gens : Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont venus dans la nuit et ils ont enlevé son corps. Nous étions endormis quand ils ont fait cela.  '
  '14':
  - type: text
    content: Si Pilate entend parler de cela, nous allons lui expliquer ces choses. Il saura que vous n’avez rien fait de mal.
  '15':
  - type: text
    content: 'Les soldats ont pris l’argent. Et ils ont dit aux gens : Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont pris le corps du trou. Les  '
  - type: text
    content: Juifs
  - type: text
    content: ' croient encore que cela est vraiment arrivé.'
  - type: heading
    content: Jésus apparaît à ses  Apôtres
  '16':
  - type: text
    content: 'Après cela, les 11 '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés en Galilée. Ils sont allés à la montagne où Jésus leur avait demandé d’aller. '
  '17':
  - type: text
    content: 'Quand ils sont arrivés à la place, ils ont vu Jésus. Puis ils se sont baissés. Ils ont dit à Jésus comment il est puissant, beau et important. Mais certains de ses  '
  - type: text
    content: disciples
  - type: text
    content: ' ne savaient pas que c’était vraiment Jésus. '
  '18':
  - type: text
    content: 'Jésus s’est rendu près d’eux. Il leur a dit : Dieu m’a donné tout le pouvoir. J’ai le pouvoir sur tout le monde et toute chose. J’ai tout le pouvoir dans le  '
  - type: text
    content: ciel
  - type: text
    content: ' et dans ce monde. '
  '19':
  - type: text
    content: 'Allez aux populations dans tous les pays. Allez leur apprendre à devenir mes  '
  - type: text
    content: disciples
  - type: text
    content: '. Allez les baptiser par le pouvoir de Dieu le Père, son Fils et le  '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'A ce moment, le sol a tremblé. L’un des '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu est venu du '
  - type: text
    content: ciel
  - type: text
    content: ' et il est allé à la roche. Il a enlevé la grosse pierre de l’extérieur du trou, puis il s’est assis au‑dessus de la grosse pierre. '
  '20':
  - type: text
    content: Enseigne‑leur à obéir à tout ce que je vous ai enseigné. Vous pouvez être sûrs que je serai toujours avec vous. Je serai avec vous jusqu’à la fin des temps.
  '3':
  - type: text
    content: 'Son visage brillait comme l’éclair. Son vêtement était très blanc comme la neige. '
  '4':
  - type: text
    content: 'Les soldats qui gardaient la pierre en face de la  '
  - type: text
    content: roche
  - type: text
    content: ' avaient très peur. Ils sont tombés sur le sol comme des hommes morts. Ils avaient tellement peur qu’ils ne pouvaient pas se déplacer. '
  '5':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' a dit aux femmes :'
  - type: text
    content: 'N’ayez pas peur. Je sais que vous cherchez Jésus. Les soldats l’ont tué sur une croix. '
  '6':
  - type: text
    content: 'Mais Jésus n’est pas ici. Il est devenu de nouveau vivant. Il a dit que cela lui arrivera. Venez ici, vous pouvez voir l’endroit où il était couché. '
  '7':
  - type: text
    content: 'Une fois que vous avez vu cela, allez vite auprès de ses  '
  - type: text
    content: disciples
  - type: text
    content: '. Dites‑leur : Jésus est vivant à nouveau, et il va en Galilée avant. Vous le verrez là‑bas. C’est cela le message que je vous ai apporté.'
  '8':
  - type: text
    content: 'Donc, les femmes ont rapidement quitté le trou dans la roche. Elles avaient très peur. Mais elles étaient aussi très heureuses. Elles ont couru dire aux '
  - type: text
    content: disciples
  - type: text
    content: ' le message de l’'
  - type: text
    content: ange
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'A ce moment, Jésus a rencontré les 2 femmes. Il a dit : Bonjour, et elles sont allées près de lui. Elles ont tenu ses pieds, et l’ont adoré. '
