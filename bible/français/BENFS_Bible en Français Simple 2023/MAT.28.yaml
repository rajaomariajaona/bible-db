document_id: MAT.28,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 28
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devient vivant à nouveau
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Le premier jour de la semaine, Marie de Magdala et Marie, mère de Jacques se sont levées tôt. Elles sont allées au trou dans la roche. C’est là que Joseph avait enterré le corps mort de Jésus.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors Jésus leur a dit : N’ayez pas peur. Allez parler à mes  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Dites‑leur : Frères, Jésus vous avait dit : Allez en Galilée. Vous me verrez là‑bas.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les soldats disent aux chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ce qui est arrivé'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les femmes sont allées dire aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' le message de Jésus. Certains des soldats qui avaient gardé la roche (le tombeau), sont allés en ville. Ces soldats ont dit aux chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' tout ce qui était arrivé au tombeau. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' se sont réunis. Ils ont parlé de ce qu’ils devraient faire maintenant. Ils ont décidé de donner aux soldats beaucoup d’argent, afin qu’ils leur obéissent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils ont dit aux soldats : Vous devez dire aux gens : Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus sont venus dans la nuit et ils ont enlevé son corps. Nous étions endormis quand ils ont fait cela.  '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Si Pilate entend parler de cela, nous allons lui expliquer ces choses. Il saura que vous n’avez rien fait de mal.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les soldats ont pris l’argent. Et ils ont dit aux gens : Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus ont pris le corps du trou. Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' croient encore que cela est vraiment arrivé.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus apparaît à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Apôtres
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Après cela, les 11 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont allés en Galilée. Ils sont allés à la montagne où Jésus leur avait demandé d’aller. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quand ils sont arrivés à la place, ils ont vu Jésus. Puis ils se sont baissés. Ils ont dit à Jésus comment il est puissant, beau et important. Mais certains de ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ne savaient pas que c’était vraiment Jésus. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jésus s’est rendu près d’eux. Il leur a dit : Dieu m’a donné tout le pouvoir. J’ai le pouvoir sur tout le monde et toute chose. J’ai tout le pouvoir dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et dans ce monde. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Allez aux populations dans tous les pays. Allez leur apprendre à devenir mes  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Allez les baptiser par le pouvoir de Dieu le Père, son Fils et le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'A ce moment, le sol a tremblé. L’un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu est venu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et il est allé à la roche. Il a enlevé la grosse pierre de l’extérieur du trou, puis il s’est assis au‑dessus de la grosse pierre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Enseigne‑leur à obéir à tout ce que je vous ai enseigné. Vous pouvez être sûrs que je serai toujours avec vous. Je serai avec vous jusqu’à la fin des temps.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Son visage brillait comme l’éclair. Son vêtement était très blanc comme la neige. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les soldats qui gardaient la pierre en face de la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: roche
    - type: text
      text: ' avaient très peur. Ils sont tombés sur le sol comme des hommes morts. Ils avaient tellement peur qu’ils ne pouvaient pas se déplacer. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a dit aux femmes :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N’ayez pas peur. Je sais que vous cherchez Jésus. Les soldats l’ont tué sur une croix. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais Jésus n’est pas ici. Il est devenu de nouveau vivant. Il a dit que cela lui arrivera. Venez ici, vous pouvez voir l’endroit où il était couché. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Une fois que vous avez vu cela, allez vite auprès de ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Dites‑leur : Jésus est vivant à nouveau, et il va en Galilée avant. Vous le verrez là‑bas. C’est cela le message que je vous ai apporté.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Donc, les femmes ont rapidement quitté le trou dans la roche. Elles avaient très peur. Mais elles étaient aussi très heureuses. Elles ont couru dire aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' le message de l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'A ce moment, Jésus a rencontré les 2 femmes. Il a dit : Bonjour, et elles sont allées près de lui. Elles ont tenu ses pieds, et l’ont adoré. '
