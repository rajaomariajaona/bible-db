document_id: REV.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Message de Jésus aux croyants de Sardes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Écris ceci à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de l’Église de Sardes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici le message important pour toi de celui qui détient les 7 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' de Dieu et les 7 étoiles.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je sais tout ce que tu fais. Je sais que les gens te louent. Ils pensent que tu es en vie. Mais ce n’est pas vrai, car tu es vraiment mort dans ton '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je t’ai dit d’être patient en ces temps difficiles. Tu as obéi à ce que je t‘ai dit. Pour cette raison, je te protégerai du temps de grandes souffrances qui viendront. Elles frapperont tous ceux qui vivent dans le monde. Cela me montrera ce que chaque personne est vraiment.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je viendrai rapidement. Continue d’obéir à mon message que tu connais déjà. Alors, personne ne peut t’enlever ta couronne qui est le cadeau de Dieu pour toi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Toute personne qui gagnera contre Satan sera en sécurité dans la maison de mon Dieu (temple). Je rendrai cette personne comme un pilier solide. Elle sera dans la maison de Dieu. Elle ne quittera plus jamais la maison de Dieu. J’écrirai sur elle le nom de mon Dieu et le nom de sa ville. Le nom de cette ville est la Nouvelle Jérusalem. Cette ville descendra du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Mon Dieu l’enverra sur terre. J’écrirai également mon nouveau nom sur cette personne. '
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu parle dans les Églises. Vous devez comprendre ce que l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' vous dit. Vous avez des oreilles, alors écoutez bien !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Message de Jésus aux croyants de Laodicée
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Écris ceci à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de l’Église de Laodicée :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici le message important que celui dont le nom est Amen t’adresse. Il dit le vrai message de Dieu et ne ment pas. Tout ce que Dieu a fait commence avec lui.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je sais tout ce que tu fais. Je sais que tu n’es ni froid ni chaud. Ce serait mieux si tu étais froid ou chaud. '
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mais tu es seulement un peu chaud un peu froid. Parce que tu n’es ni froid ni chaud, je suis prêt à te jeter complètement.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu dis : Je suis riche. Dieu m’a aidé à avoir beaucoup de choses. Je n’ai plus besoin de rien. Mais tu ne sais pas à quel point tu es vraiment pauvre ! Tu es comme des gens qui ne peuvent pas voir. Tu es comme des gens sans vêtements. Vraiment, les autres doivent être très tristes pour toi. '
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je te dis donc que tu dois m’acheter de l’or. Avec mon or, tu seras vraiment riche. Mon or est le meilleur, car il est passé au feu. Tu dois également m’acheter des vêtements blancs pour t’habiller. Ensuite, tu n’auras pas honte, parce que tu n’as pas de vêtements. Tu dois également m’acheter des médicaments à mettre sur tes yeux. Ensuite, tu pourras bien voir.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'J’aide tous ceux que j’aime. Quand ils font de mauvaises choses, je leur dis : Vous avez fait une mauvaise chose. Je leur montre la bonne chose à faire. Soyez donc sérieux sur la façon dont vous vivez. Arrêtez de faire de mauvaises choses et tournez‑vous vers moi. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Réveille‑toi ! Ta vie de croyant est presque morte ! Tu dois redevenir forte. Tu n’as pas fait correctement tout ce que mon Père Dieu voulait que tu fasses. Voilà ce que j’ai découvert sur toi. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Regardez ! Je me tiens à la porte de votre maison. Je frappe à ta porte. Lorsque vous entendez ma voix, vous devez ouvrir la porte. Ensuite, j’entrerai. Nous prendrons un repas ensemble comme des amis.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Toute personne qui gagnera contre Satan viendra s’asseoir avec moi sur mon trône où je règne. J’ai gagné contre mes ennemis. Puis je me suis assis avec mon Père sur son trône. Je ferai donc la même chose pour vous. '
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu vous parle dans les Églises. Vous avez des oreilles, écoutez‑le donc attentivement.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Souviens‑toi donc du message de Dieu que tu as entendu. Obéis à ce que Dieu a dit. Détourne‑toi de mauvaises choses que tu as faites. Change ta façon de vivre. Si tu ne veilles pas, je viendrai te punir. Je viendrai secrètement, comme quelqu’un qui vole les gens. Tu ne sauras donc pas à quelle heure je viendrai te juger.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais il y a parmi vous quelques gens à Sardes qui n’ont pas fait ces mauvaises choses. Ils sont comme des gens qui ont gardé leurs vêtements propres. Ils marcheront avec moi et porteront des vêtements blancs. Ces gens sont bons. Il est bien pour eux de porter ces vêtements blancs. '
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tous les gens qui gagneront contre Satan porteront des vêtements blancs comme ils le font. Je ne retirerai jamais leurs noms du livre de vie de Dieu. Je dirai clairement à mon Père et à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' que ces gens m’appartiennent. '
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu vous parle dans les Églises. Vous avez des oreilles, écoutez‑le donc attentivement.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Message de Jésus aux croyants de Philadelphie
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Écris ceci à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de l’Église de Philadelphie :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici le message important que celui qui est tout à fait bon t’envoie. Il est le vrai Dieu. Il a la clé du roi David en main. Avec ce pouvoir, quand il ouvre une porte, personne ne peut la fermer. Et quand il ferme une porte, personne ne peut l’ouvrir.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Je sais tout ce que tu fais. Regarde ! J’ai ouvert une porte devant toi. Personne ne peut fermer cette porte. Je sais que tu n’es pas très forte. Mais tu as obéi à ce que je t’ai dit. Tu as continué à croire en moi. '
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Certaines personnes disent qu’elles sont juives. Mais ce n’est pas vrai. Ces personnes disent des mensonges. Elles sont vraiment un groupe de gens de Satan. Je ferai venir ces gens vers toi. Ils montreront qu’ils te respectent. Ils comprendront alors que je t’aime. '
