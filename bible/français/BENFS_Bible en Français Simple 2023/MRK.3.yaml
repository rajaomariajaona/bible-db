document_id: MRK.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Jésus guérit la main d’un homme
  - type: text
    content: 'Encore une fois, Jésus est entré dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Un homme était là. Sa main était très petite et faible et il ne pouvait pas l’utiliser. '
  '10':
  - type: text
    content: 'Les malades poussaient vers l’avant, parce qu’ils essayaient de toucher Jésus. Ils savaient qu’il avait guéri de nombreuses personnes. '
  '11':
  - type: text
    content: 'Des gens avaient de mauvais '
  - type: text
    content: esprits
  - type: text
    content: . Chaque fois qu’ils voyaient Jésus, ils se baissaient au sol en face de Jésus.
  - type: text
    content: 'Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' criaient dans ces personnes comme ceci : Tu es le Fils de Dieu. '
  '12':
  - type: text
    content: 'Jésus a sérieusement dit aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' ceci :'
  - type: text
    content: Ne dites à personne qui je suis.
  - type: heading
    content: Jésus choisit 12 Apôtres
  '13':
  - type: text
    content: 'Jésus est monté sur une montagne. Il a choisi quelques hommes. Il leur a demandé d’aller avec lui là sur la montagne. Ainsi donc, ils se sont rencontrés avec lui là. '
  '14':
  - type: text
    content: 'Il a choisi un groupe de 12 hommes pour être ses '
  - type: text
    content: Apôtres
  - type: text
    content: '. Il voulait qu’ils soient avec lui. Et il les a envoyés enseigner les gens à propos de Dieu. '
  '15':
  - type: text
    content: 'Il a donné à ces hommes le pouvoir de chasser les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens. '
  '16':
  - type: text
    content: 'Voici les noms des 12 '
  - type: text
    content: Apôtres
  - type: text
    content: '  : Simon, que Jésus a appelé Pierre, '
  '17':
  - type: text
    content: Jacques et Jean étaient les fils de Zébédée. Jésus les a appelés Boanergès. Ce qui signifie les hommes qui sont comme le bruit fort d’une foudre.
  '18':
  - type: text
    content: André, Philippe, Barthélemy,
  - type: text
    content: Matthieu, Thomas, Jacques qui était le fils d’Alphée,
  - type: text
    content: 'Thaddée, Simon le '
  - type: text
    content: Zélote
  - type: text
    content: ' '
  '19':
  - type: text
    content: et Judas Iscariote.
  - type: text
    content: Il a livré Jésus aux gens qui étaient contre lui.
  - type: heading
    content: Jésus parle de Satan
  '2':
  - type: text
    content: 'Quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' observaient Jésus attentivement. Ils voulaient trouver une raison pour accuser Jésus. C’était le jour où les '
  - type: text
    content: Juifs
  - type: text
    content: ' devaient se reposer. Alors les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' regardaient pour voir si Jésus pouvait guérir cet homme ce jour‑là. '
  '20':
  - type: text
    content: 'Alors Jésus est entré dans une maison. Et encore une fois, une foule est venue à la maison. Il y avait beaucoup de gens. Alors Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' ne pouvaient même pas manger. '
  '21':
  - type: text
    content: 'Les gens ont dit à la famille de Jésus ce qui se passait. Donc, la famille de Jésus est allée pour le récupérer. Ils pensaient que Jésus ne raisonnait plus bien. '
  '22':
  - type: text
    content: 'Certains enseignants de la loi de Dieu sont venus de Jérusalem. Ils ont dit : Jésus a un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' appelé Satan. Satan dirige tous les mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. Alors c’est le chef des démons qui a donné le pouvoir à Jésus. C’est grâce à cela que Jésus chasse les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des personnes. '
  '23':
  - type: text
    content: 'Alors Jésus a parlé aux enseignants de la loi de Dieu. Il leur a dit : Venez ici et écoutez. Il a utilisé un exemple pour leur expliquer. Satan ne peut pas lutter contre lui‑même ! '
  '24':
  - type: text
    content: 'Si ses armées commencent à se battre entre elles dans le même pays, elles vont détruire leur propre pays. '
  '25':
  - type: text
    content: 'Et si les gens d’une même famille commencent à se battre les uns contre les autres, ils vont détruire leur propre famille. '
  '26':
  - type: text
    content: 'Alors, Satan ne peut pas lutter contre lui‑même. S’il le fait, il sera divisé. Cela risque d’être sa fin. '
  '27':
  - type: text
    content: 'Personne ne peut facilement entrer dans la maison d’un homme fort et lui voler ses biens. Pour ce faire, il doit d’abord lier l’homme fort. Alors, il peut enlever toutes les choses précieuses de cet homme. '
  '28':
  - type: text
    content: 'Je vous dis la vérité. Dieu peut pardonner toutes les mauvaises choses que les gens font. Il peut également pardonner aux gens qui disent de mauvaises choses sur lui. '
  '29':
  - type: text
    content: 'Mais Dieu ne pardonnera jamais aux gens qui disent de mauvaises choses contre le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Dieu ne peut jamais pardonner ce mal. '
  '3':
  - type: text
    content: 'Jésus a dit à l’homme : Tiens‑toi ici devant tout le monde. '
  '30':
  - type: text
    content: 'Jésus a dit cela aux enseignants de la loi de Dieu, parce qu’ils avaient dit : Jésus a un mauvais '
  - type: text
    content: esprit
  - type: text
    content: .
  - type: heading
    content: La mère de Jésus et ses frères viennent le chercher
  '31':
  - type: text
    content: 'Alors, la mère de Jésus et ses frères sont arrivés. Ils se sont tenus devant la maison. Ils ont demandé à quelqu’un de l’appeler. '
  '32':
  - type: text
    content: 'Une foule de gens était assise autour de Jésus. Ils lui ont dit : Regarde ! Ta mère et tes frères sont dehors. Ils te cherchent. '
  '33':
  - type: text
    content: 'Jésus a répondu : Je vais vous dire qui sont vraiment ma mère et mes frères. '
  '34':
  - type: text
    content: 'Puis Jésus a regardé les gens qui étaient assis autour de lui dans un cercle. Jésus a dit : Regardez ! Voici ma mère et mes frères ! '
  '35':
  - type: text
    content: Mon frère, ma sœur et ma mère sont ceux qui font ce que Dieu veut.
  '4':
  - type: text
    content: 'Alors Jésus a dit aux '
  - type: text
    content: Pharisiens
  - type: text
    content: '  : Que pouvons‑nous faire de notre jour de repos ? Qu’est‑ce que la loi dit ? Est‑ce qu’elle dit que nous pouvons faire de bonnes choses ? Ou elle dit que nous pouvons faire de mauvaises choses ? Faut‑il sauver la vie d’une personne ? Ou devrions‑nous la tuer ? Personne n’a rien dit. '
  '5':
  - type: text
    content: 'Jésus regardait tout le monde autour de lui. Il était en colère contre eux. Il était aussi triste, parce qu’ils ne voulaient pas changer leurs '
  - type: text
    content: esprits
  - type: text
    content: '. Puis il a dit à l’homme : Lève ta main. L’homme a levé la main et sa main est devenue bien. '
  '6':
  - type: text
    content: 'Alors les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont quitté immédiatement le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Ils ont rencontré un groupe des personnes qui voulaient obéir à Hérode. Et ils ont parlé avec ces personnes sur la façon dont ils pourraient tuer Jésus.
  - type: heading
    content: Les foules suivent Jésus
  '7':
  - type: text
    content: 'Jésus a quitté cet endroit. Il est alors allé vers la mer avec ses '
  - type: text
    content: disciples
  - type: text
    content: '. Une grande foule de Galilée suivait Jésus. '
  '8':
  - type: text
    content: 'Beaucoup de gens venaient de la Judée, de Jérusalem et une partie d’Israël appelée Idumée. Ils venaient aussi des lieux de l’autre côté du '
  - type: text
    content: Jourdain
  - type: text
    content: '. Et ils venaient aussi des villes appelées Tyr et Sidon. Ils venaient tous voir Jésus. Les gens parlaient des choses que Jésus faisait. Voilà pourquoi tous ces gens venaient à Jésus. '
  '9':
  - type: text
    content: 'La foule était très grande. Alors Jésus a demandé à ses '
  - type: text
    content: disciples
  - type: text
    content: ' de préparer un petit bateau pour lui. Ils ont fait cela pour que les gens ne poussent pas vers lui. '
