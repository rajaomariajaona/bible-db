document_id: MRK.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit la main d’un homme
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encore une fois, Jésus est entré dans le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Un homme était là. Sa main était très petite et faible et il ne pouvait pas l’utiliser. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les malades poussaient vers l’avant, parce qu’ils essayaient de toucher Jésus. Ils savaient qu’il avait guéri de nombreuses personnes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des gens avaient de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: . Chaque fois qu’ils voyaient Jésus, ils se baissaient au sol en face de Jésus.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' criaient dans ces personnes comme ceci : Tu es le Fils de Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a sérieusement dit aux mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' ceci :'
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ne dites à personne qui je suis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus choisit 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Apôtres
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus est monté sur une montagne. Il a choisi quelques hommes. Il leur a demandé d’aller avec lui là sur la montagne. Ainsi donc, ils se sont rencontrés avec lui là. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a choisi un groupe de 12 hommes pour être ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Apôtres
    - type: text
      text: '. Il voulait qu’ils soient avec lui. Et il les a envoyés enseigner les gens à propos de Dieu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a donné à ces hommes le pouvoir de chasser les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des gens. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les noms des 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Apôtres
    - type: text
      text: '  : Simon, que Jésus a appelé Pierre, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacques et Jean étaient les fils de Zébédée. Jésus les a appelés Boanergès. Ce qui signifie les hommes qui sont comme le bruit fort d’une foudre.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: André, Philippe, Barthélemy,
  - type: usfm
    marker: m
    children:
    - type: text
      text: Matthieu, Thomas, Jacques qui était le fils d’Alphée,
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Thaddée, Simon le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zélote
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: et Judas Iscariote.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Il a livré Jésus aux gens qui étaient contre lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de Satan
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' observaient Jésus attentivement. Ils voulaient trouver une raison pour accuser Jésus. C’était le jour où les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' devaient se reposer. Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' regardaient pour voir si Jésus pouvait guérir cet homme ce jour‑là. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus est entré dans une maison. Et encore une fois, une foule est venue à la maison. Il y avait beaucoup de gens. Alors Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ne pouvaient même pas manger. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens ont dit à la famille de Jésus ce qui se passait. Donc, la famille de Jésus est allée pour le récupérer. Ils pensaient que Jésus ne raisonnait plus bien. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains enseignants de la loi de Dieu sont venus de Jérusalem. Ils ont dit : Jésus a un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' appelé Satan. Satan dirige tous les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Alors c’est le chef des démons qui a donné le pouvoir à Jésus. C’est grâce à cela que Jésus chasse les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des personnes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a parlé aux enseignants de la loi de Dieu. Il leur a dit : Venez ici et écoutez. Il a utilisé un exemple pour leur expliquer. Satan ne peut pas lutter contre lui‑même ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ses armées commencent à se battre entre elles dans le même pays, elles vont détruire leur propre pays. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si les gens d’une même famille commencent à se battre les uns contre les autres, ils vont détruire leur propre famille. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, Satan ne peut pas lutter contre lui‑même. S’il le fait, il sera divisé. Cela risque d’être sa fin. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne ne peut facilement entrer dans la maison d’un homme fort et lui voler ses biens. Pour ce faire, il doit d’abord lier l’homme fort. Alors, il peut enlever toutes les choses précieuses de cet homme. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis la vérité. Dieu peut pardonner toutes les mauvaises choses que les gens font. Il peut également pardonner aux gens qui disent de mauvaises choses sur lui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Dieu ne pardonnera jamais aux gens qui disent de mauvaises choses contre le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: '. Dieu ne peut jamais pardonner ce mal. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit à l’homme : Tiens‑toi ici devant tout le monde. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit cela aux enseignants de la loi de Dieu, parce qu’ils avaient dit : Jésus a un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mère de Jésus et ses frères viennent le chercher
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, la mère de Jésus et ses frères sont arrivés. Ils se sont tenus devant la maison. Ils ont demandé à quelqu’un de l’appeler. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une foule de gens était assise autour de Jésus. Ils lui ont dit : Regarde ! Ta mère et tes frères sont dehors. Ils te cherchent. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Je vais vous dire qui sont vraiment ma mère et mes frères. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Jésus a regardé les gens qui étaient assis autour de lui dans un cercle. Jésus a dit : Regardez ! Voici ma mère et mes frères ! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mon frère, ma sœur et ma mère sont ceux qui font ce que Dieu veut.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: '  : Que pouvons‑nous faire de notre jour de repos ? Qu’est‑ce que la loi dit ? Est‑ce qu’elle dit que nous pouvons faire de bonnes choses ? Ou elle dit que nous pouvons faire de mauvaises choses ? Faut‑il sauver la vie d’une personne ? Ou devrions‑nous la tuer ? Personne n’a rien dit. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus regardait tout le monde autour de lui. Il était en colère contre eux. Il était aussi triste, parce qu’ils ne voulaient pas changer leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Puis il a dit à l’homme : Lève ta main. L’homme a levé la main et sa main est devenue bien. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont quitté immédiatement le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Ils ont rencontré un groupe des personnes qui voulaient obéir à Hérode. Et ils ont parlé avec ces personnes sur la façon dont ils pourraient tuer Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les foules suivent Jésus
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a quitté cet endroit. Il est alors allé vers la mer avec ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Une grande foule de Galilée suivait Jésus. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de gens venaient de la Judée, de Jérusalem et une partie d’Israël appelée Idumée. Ils venaient aussi des lieux de l’autre côté du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: '. Et ils venaient aussi des villes appelées Tyr et Sidon. Ils venaient tous voir Jésus. Les gens parlaient des choses que Jésus faisait. Voilà pourquoi tous ces gens venaient à Jésus. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule était très grande. Alors Jésus a demandé à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de préparer un petit bateau pour lui. Ils ont fait cela pour que les gens ne poussent pas vers lui. '
