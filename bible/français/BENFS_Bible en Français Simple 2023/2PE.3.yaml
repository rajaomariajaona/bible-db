document_id: 2PE.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus reviendra certainement sur terre'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes amis, voici la deuxième lettre que je vous écris. J’ai écrit ces 2 lettres pour vous aider à comprendre certaines choses. Vous savez déjà ces choses. Je veux bien que vous y pensiez. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je veux que vous vous souveniez des messages de Dieu que ses propres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' disaient, il y a longtemps. Aussi, je veux que vous vous souveniez de ce que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus vous a dit de faire. C’est lui qui nous sauve. Il nous a envoyés, nous qui sommes ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ', pour vous enseigner son message.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La première chose que vous devez comprendre est la suivante. Dans les derniers jours de ce monde, certaines personnes se moqueront de vous parce que vous croyez en Dieu. Ces gens feront toutes les mauvaises choses qu’ils voudront faire. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils diront : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a promis qu’il reviendra dans ce monde. Mais il n’est pas revenu ! Nos ancêtres sont déjà morts, mais tout continue toujours de la même manière. Depuis que Dieu a créé le monde au début, rien n’a changé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ces gens choisissent d’oublier des choses qu’ils connaissent vraiment. Dieu a prononcé sa parole et il a créé le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et la terre, il y a longtemps. Il a fait remonter la terre par l’eau. Il a fait que la terre soit séparée de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En plus, c’était de l’eau que Dieu avait utilisée depuis longtemps pour détruire ce même monde. Il a dit sa parole et il a couvert la terre d’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Dieu a également dit sa parole pour dire ce qui arrivera au monde dans le futur. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et la terre que nous voyons maintenant continueront pendant un certain temps. Mais Dieu les gardera jusqu’au jour où il les détruira par le feu. Ce jour‑là, il jugera tout le monde. Il détruira les personnes qui ont refusé de lui obéir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mes amis, voici une chose dont vous devez vous souvenir. Dans l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu, un jour et 1 000 ans sont les mêmes. Pour lui, 1 000 ans, c’est comme un seul jour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne tarde pas à faire ce qu’il a promis de faire. Certaines personnes peuvent penser qu’il tarde à le faire. Mais il est patient avec vous. Il ne veut détruire personne. Il veut que tous les gens arrêtent de faire du mal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le grand jour du retour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' arrivera brusquement. Cela surprendra les gens, comme quand quelqu’un vient les voler. Il y aura un bruit très fort dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Tout le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' disparaîtra. Le feu brûlera le monde entier et il détruira tout. La terre et tout ce que les gens ont fait seront détruits.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Certainement, Dieu détruira tout de cette façon un jour. Réfléchissez donc à la façon dont vous devez vivre maintenant. Vous devez être le genre de personnes dont Dieu est heureux. Vous devez montrer que vous appartenez à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Oui, vous devez continuer d’obéir à Dieu pendant que vous attendez le retour de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dieu a choisi ce jour‑là. Essayez de le faire venir rapidement par votre façon de vivre. Ce jour‑là, le feu brûlera tout le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' ne sera plus là. La chaleur détruira l’univers. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais Dieu a promis de faire un nouveau '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et une nouvelle terre. Voilà ce que nous attendons. Ce sera une maison pour tout ce qui est bien et juste.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre termine sa lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors, mes amis, vivez bien, car vous attendez que ces choses arrivent. Essayez beaucoup de faire ce qui rend Dieu heureux. Ensuite, lorsque vous rencontrerez Dieu, il verra que vous êtes purs. Il verra qu’il n’y a aucun problème dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'N’oubliez pas que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' veut sauver les gens de leurs péchés. C’est pourquoi il attend maintenant patiemment avant de revenir. Il donne aux gens une chance de se tourner vers lui. Paul vous a également écrit à propos de ces choses. Il est notre ami que nous l’aimons comme un frère. Dieu l’a aidé à comprendre ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il a écrit à leur sujet dans toutes ses lettres. Certaines choses qu’il a écrites sont difficiles à comprendre pour les gens. Certaines personnes qui ont un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' faible expliquent mal ces choses. Ces gens ne savent pas ce à quoi ils croient. Ils expliquent également à tort d’autres choses dans la Bible. En conséquence, ces gens se détruiront et Dieu les punira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mes amis, vous connaissez déjà ces faux enseignants. Alors, faites très attention, ne croyez pas à ces mauvaises personnes. Ne les laissez pas vous éloigner de Dieu. Vous savez ce qui est vrai, alors ne quittez pas cet endroit sûr. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais, vous devez grandir en tant que croyants en notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui nous sauve. Continuez de le connaître de mieux en mieux. Il sera gentil avec vous et il vous aidera de plus en plus. Nous le louons ! Il est grand maintenant et il sera grand pour toujours !'
