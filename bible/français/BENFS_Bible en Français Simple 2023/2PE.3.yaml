document_id: 2PE.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Le Seigneur Jésus reviendra certainement sur terre
  - type: text
    content: 'Mes amis, voici la deuxième lettre que je vous écris. J’ai écrit ces 2 lettres pour vous aider à comprendre certaines choses. Vous savez déjà ces choses. Je veux bien que vous y pensiez. '
  '10':
  - type: text
    content: 'Le grand jour du retour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' arrivera brusquement. Cela surprendra les gens, comme quand quelqu’un vient les voler. Il y aura un bruit très fort dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Tout le '
  - type: text
    content: ciel
  - type: text
    content: ' disparaîtra. Le feu brûlera le monde entier et il détruira tout. La terre et tout ce que les gens ont fait seront détruits.'
  '11':
  - type: text
    content: 'Certainement, Dieu détruira tout de cette façon un jour. Réfléchissez donc à la façon dont vous devez vivre maintenant. Vous devez être le genre de personnes dont Dieu est heureux. Vous devez montrer que vous appartenez à Dieu. '
  '12':
  - type: text
    content: 'Oui, vous devez continuer d’obéir à Dieu pendant que vous attendez le retour de '
  - type: text
    content: Christ
  - type: text
    content: '. Dieu a choisi ce jour‑là. Essayez de le faire venir rapidement par votre façon de vivre. Ce jour‑là, le feu brûlera tout le '
  - type: text
    content: ciel
  - type: text
    content: '. Le '
  - type: text
    content: ciel
  - type: text
    content: ' ne sera plus là. La chaleur détruira l’univers. '
  '13':
  - type: text
    content: 'Mais Dieu a promis de faire un nouveau '
  - type: text
    content: ciel
  - type: text
    content: ' et une nouvelle terre. Voilà ce que nous attendons. Ce sera une maison pour tout ce qui est bien et juste.'
  - type: heading
    content: Pierre termine sa lettre
  '14':
  - type: text
    content: 'Alors, mes amis, vivez bien, car vous attendez que ces choses arrivent. Essayez beaucoup de faire ce qui rend Dieu heureux. Ensuite, lorsque vous rencontrerez Dieu, il verra que vous êtes purs. Il verra qu’il n’y a aucun problème dans vos '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'N’oubliez pas que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' veut sauver les gens de leurs péchés. C’est pourquoi il attend maintenant patiemment avant de revenir. Il donne aux gens une chance de se tourner vers lui. Paul vous a également écrit à propos de ces choses. Il est notre ami que nous l’aimons comme un frère. Dieu l’a aidé à comprendre ces choses. '
  '16':
  - type: text
    content: 'Il a écrit à leur sujet dans toutes ses lettres. Certaines choses qu’il a écrites sont difficiles à comprendre pour les gens. Certaines personnes qui ont un '
  - type: text
    content: esprit
  - type: text
    content: ' faible expliquent mal ces choses. Ces gens ne savent pas ce à quoi ils croient. Ils expliquent également à tort d’autres choses dans la Bible. En conséquence, ces gens se détruiront et Dieu les punira.'
  '17':
  - type: text
    content: 'Mes amis, vous connaissez déjà ces faux enseignants. Alors, faites très attention, ne croyez pas à ces mauvaises personnes. Ne les laissez pas vous éloigner de Dieu. Vous savez ce qui est vrai, alors ne quittez pas cet endroit sûr. '
  '18':
  - type: text
    content: 'Mais, vous devez grandir en tant que croyants en notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', qui nous sauve. Continuez de le connaître de mieux en mieux. Il sera gentil avec vous et il vous aidera de plus en plus. Nous le louons ! Il est grand maintenant et il sera grand pour toujours !'
  '2':
  - type: text
    content: 'Je veux que vous vous souveniez des messages de Dieu que ses propres '
  - type: text
    content: prophètes
  - type: text
    content: ' disaient, il y a longtemps. Aussi, je veux que vous vous souveniez de ce que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus vous a dit de faire. C’est lui qui nous sauve. Il nous a envoyés, nous qui sommes ses '
  - type: text
    content: apôtres
  - type: text
    content: ', pour vous enseigner son message.'
  '3':
  - type: text
    content: 'La première chose que vous devez comprendre est la suivante. Dans les derniers jours de ce monde, certaines personnes se moqueront de vous parce que vous croyez en Dieu. Ces gens feront toutes les mauvaises choses qu’ils voudront faire. '
  '4':
  - type: text
    content: 'Ils diront : '
  - type: text
    content: Christ
  - type: text
    content: ' a promis qu’il reviendra dans ce monde. Mais il n’est pas revenu ! Nos ancêtres sont déjà morts, mais tout continue toujours de la même manière. Depuis que Dieu a créé le monde au début, rien n’a changé.'
  '5':
  - type: text
    content: 'Mais ces gens choisissent d’oublier des choses qu’ils connaissent vraiment. Dieu a prononcé sa parole et il a créé le '
  - type: text
    content: ciel
  - type: text
    content: ' et la terre, il y a longtemps. Il a fait remonter la terre par l’eau. Il a fait que la terre soit séparée de l’eau. '
  '6':
  - type: text
    content: 'En plus, c’était de l’eau que Dieu avait utilisée depuis longtemps pour détruire ce même monde. Il a dit sa parole et il a couvert la terre d’eau. '
  '7':
  - type: text
    content: 'Mais Dieu a également dit sa parole pour dire ce qui arrivera au monde dans le futur. Le '
  - type: text
    content: ciel
  - type: text
    content: ' et la terre que nous voyons maintenant continueront pendant un certain temps. Mais Dieu les gardera jusqu’au jour où il les détruira par le feu. Ce jour‑là, il jugera tout le monde. Il détruira les personnes qui ont refusé de lui obéir.'
  '8':
  - type: text
    content: Mes amis, voici une chose dont vous devez vous souvenir. Dans l’
  - type: text
    content: Esprit
  - type: text
    content: ' du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, un jour et 1 000 ans sont les mêmes. Pour lui, 1 000 ans, c’est comme un seul jour. '
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne tarde pas à faire ce qu’il a promis de faire. Certaines personnes peuvent penser qu’il tarde à le faire. Mais il est patient avec vous. Il ne veut détruire personne. Il veut que tous les gens arrêtent de faire du mal.'
