document_id: 1CO.14,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 14
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Messages de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Vous devez donc toujours aimer Dieu et les autres. Désirez de recevoir les dons spirituels de Dieu. Aimez surtout d’avoir ce don : celui de recevoir les messages de Dieu et de les communiquer aux gens. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il existe de nombreux types de langues dans ce monde. Elles signifient toutes quelque chose pour les gens qui les parlent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Peut‑être que quelqu’un peut me parler dans une langue que je ne comprends pas. Ensuite, nous sommes comme des étrangers les uns envers les autres. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Réfléchissez donc à ce qui vous convient le mieux. Vous voulez vraiment les dons qui viennent de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Surtout, vous devriez vouloir les dons qui aideront toute l’Église à devenir plus forte.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Donc, si vous dites un message dans une autre langue, vous devez prier Dieu à ce sujet. Priez pour que vous puissiez expliquer aux gens ce que signifie le message. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si je prie dans une autre langue, seul mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' prie. Mais je n’utilise pas mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' pendant que je prie comme cela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici ce que je dois faire : je prierai aussi dans une langue connue. Je prierai aussi avec mon intelligence. Je chanterai pour glorifier Dieu dans mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: . Et je le ferai aussi avec mon intelligence.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Si tu loues Dieu seulement dans ton '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ', tout le monde ne comprendra pas. Les croyants qui n’ont pas appris ces choses ne sauront pas ce que tu dis. Ils ne peuvent pas être d’accord et dire amen. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu pourras vraiment très bien remercier Dieu dans ton '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: . Mais tes paroles n’aideront pas les autres croyants à devenir forts.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Je remercie Dieu de parler dans différentes sortes de langues plus que vous tous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mais quand l’Église se réunit, je veux aider d’autres croyants et les enseigner. Donc, je préfère dire 5 mots que les gens comprennent que des milliers de mots dans une autre langue.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Si quelqu’un parle dans une autre langue, il ne parle qu’à Dieu. Les gens qui l’entendent ne comprennent pas son message. L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu lui fait parler des choses secrètes. Cela n’aide pas les gens. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mes amis chrétiens, ne continuez pas à penser comme les enfants pensent. Mais, pensez correctement comme les hommes et les femmes devraient penser. La seule façon d’être comme des enfants est d’éviter de mauvaises choses. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ceci est écrit dans la Bible :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’enverrai des étrangers pour parler à mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils leur diront mon message dans des langues étranges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais même quand je fais cela, mon peuple ne m’écoutera pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est ce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu a dit.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ainsi, le don de parler dans différentes langues est comme un signe. Il montre la puissance de Dieu aux gens qui ne croient pas en lui. Ce n’est pas un signe pour aider les croyants. Mais le don de dire des messages clairs de Dieu montre sa puissance aux croyants. Ce n’est pas un signe pour ceux qui ne croient pas.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Réfléchissez à ce qui se passe lorsque toute l’Église se réunit. Peut‑être que certaines personnes qui arrivent dans l’Église ne croient pas en Dieu. Ou peut‑être que ces personnes n’ont pas beaucoup appris sur Dieu. Si vous parlez tous dans des langues étranges, ces visiteurs ne comprendront pas. Ils diront que vous êtes tous fous ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais si vous dites tous les messages clairs de Dieu, un visiteur vous comprendra. Il peut ne pas croire en Dieu. Il n’a peut‑être pas beaucoup appris sur Dieu. Mais il entendra le message de Dieu. Il comprendra qu’il a fait de mauvaises choses. Il saura que Dieu le jugera. Il l’apprendra de ce que vous dites tous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Les pensées secrètes du visiteur deviendront claires. En conséquence, il s’inclinera sur le sol et il adorera Dieu. Il dira : Dieu est vraiment ici parmi vous !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réunions d’Église
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Mes amis chrétiens, voici ce que vous devez faire lorsque vous vous rencontrez. Certains d’entre vous peuvent avoir une chanson pour glorifier Dieu. Certains d’entre vous ont peut‑être une leçon à enseigner sur Dieu. D’autres personnes peuvent avoir une chose spéciale que Dieu leur a montrée. Certaines personnes peuvent avoir un message dans une langue spéciale. D’autres personnes peuvent expliquer la signification du message. Faites toutes ces choses pour aider l’Église à devenir plus forte.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Si certaines personnes parlent dans des langues spéciales, cela ne devrait être que 2 ou 3 personnes. Chaque personne devra parler à son tour. Ensuite, quelqu’un doit expliquer ce que chaque personne a dit. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mais peut‑être qu’il n’y a personne parmi vous pour expliquer cela. Ensuite, toute personne qui veut parler dans une langue spéciale doit être silencieuse lors de votre réunion. Quand cette personne est seule, elle parle à Dieu.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Lorsque vous vous rencontrez ensemble, 2 ou 3 personnes peuvent dire un message de Dieu. Ensuite, les autres personnes doivent réfléchir attentivement à chaque message. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais si quelqu’un dit un message clair de Dieu, il aide les gens qui l’entendent. Il les aide à devenir plus forts en tant que croyants. Il les aide à être heureux et forts dans leurs problèmes. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Quelqu’un qui est assis à votre réunion peut recevoir un message spécial de Dieu. Ensuite, la personne qui parle déjà doit s’arrêter. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'De cette façon, chaque personne peut dire un message de Dieu, après une autre. Alors, tous les gens apprendront quelque chose qui les aidera. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Vous tous qui dites les messages de Dieu, vous avez le pouvoir sur vos propres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Lorsque nous nous réunissons en tant que peuple de Dieu, il veut qu’il y ait la paix entre nous. Il ne veut pas créer de problèmes.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ce qui se passe dans toutes les Églises où le peuple de Dieu se réunit. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Les femmes doivent se taire pendant des réunions. Elles ne doivent pas parler. Elles doivent se rappeler qu’elles doivent rester soumises aux hommes. C’est aussi ce que la loi de Dieu enseigne. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Si une femme veut poser une question, elle doit interroger son mari à la maison. Les femmes doivent avoir honte si elles parlent à l’Église. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Souvenez‑vous que le message de Dieu n’a pas commencé avec vous à Corinthe ! Vous n’êtes pas les seuls à l’avoir entendu non plus.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Quelqu’un peut penser qu’il a le don de dire des messages de Dieu. Ou il peut penser qu’il a reçu d’autres dons spirituels. Toute personne qui pense ainsi, pourra être d’accord avec ce que je vous ai écrit. Cette personne pourra reconnaître que c’est ce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui‑même a dit à son peuple de faire. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Si quelqu’un refuse d’accepter cela, vous ne devez pas accepter cette personne.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Mes amis chrétiens, je vous dis ceci : C’est bien quand vous voulez dire des messages clairs de Dieu. Et si quelqu’un a le don de parler dans une langue spéciale, ne l’arrêtez pas.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Toute personne qui parle dans une langue différente ne fait que s’aider. Mais une personne qui dit un message de Dieu aide les croyants de l’Église à devenir forts.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Mais vous devez tout faire d’une manière convenable qui aide les gens.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: J’aimerais que vous parliez tous dans différents types de langues. Mais plus encore, je veux que vous parliez clairement du message de Dieu aux gens. Quiconque peut dire un message de Dieu est important dans l’Église. Il est plus important que quelqu’un qui parle dans différents types de langues. Cette personne aide l’Église, seulement si quelqu’un peut expliquer ce qu’il dit. Ce n’est qu’ainsi que son message aidera l’Église à devenir plus forte.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mes amis chrétiens, si je viens vous rendre visite, je veux vous aider. Mais si je vous parle dans des langues que vous ne comprenez pas, cela ne vous aidera pas du tout. Il faudrait que je vous explique ce que Dieu m’a montré. Il faudra que je vous aide à comprendre quelque chose. Je peux vous dire un message clair de Dieu ou vous apprendre quelque chose. Mais, ce sera seulement ce qui pourra vous aider. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Pensez à la façon dont les gens font de la musique avec des flûtes ou des harpes. Ces choses ne sont pas vivantes. Nous devons les utiliser pour faire des sons clairs. Si nous ne les utilisons pas correctement, personne ne peut reconnaître la musique. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les soldats ne se prépareront à combattre que s’ils entendent un son clair de la trompette. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'C’est la même chose pour vous. Vous devez utiliser votre langue pour parler clairement. Sinon, personne ne comprendra ce que vous dites. Vous ne parlerez que des mots en l’air. '
