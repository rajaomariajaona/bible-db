document_id: 1PE.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Épouses et maris
  - type: text
    content: J’ai besoin de dire la même chose à vous, les épouses. Chacune de vous doit obéir à son propre mari. Même si votre mari ne croit pas au message de Dieu sur Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', vous devez toujours le respecter. Si vous faites cela, il peut alors se tourner vers Dieu et croire à son message. Vous n’aurez pas besoin de lui dire ce qui est vrai. Il verra votre bonne façon de vivre. Il verra que vous obéissez vraiment à Dieu et que vous faites ce qui est bien.'
  '10':
  - type: text
    content: 'La Bible dit ceci :'
  - type: text
    content: Voulez‑vous profiter de votre vie ?
  - type: text
    content: Voulez‑vous être heureux ?
  - type: text
    content: Alors, vous devez faire attention à ne pas dire de mauvaises choses.
  - type: text
    content: Ne dites aucun mensonge.
  '11':
  - type: text
    content: Arrêtez de faire tout ce qui est mauvais.
  - type: text
    content: Faites plutôt ce qui est bon.
  - type: text
    content: Essayez beaucoup d’être amis avec les gens.
  - type: text
    content: Aidez les gens à vivre en paix les uns avec les autres.
  '12':
  - type: text
    content: 'Vivez ainsi, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' voit ce que tout le monde fait. Il prend soin des gens qui vivent bien.'
  - type: text
    content: Quand ils prient, il les écoute.
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se détourne des gens qui font de mauvaises choses.'
  '13':
  - type: text
    content: 'Si vous essayez toujours de faire de bonnes choses, personne ne doit vous faire de mal. '
  '14':
  - type: text
    content: 'Mais quelqu’un peut vous causer des problèmes, même si vous faites ce qui est bien. Si cela arrive, Dieu vous bénira. Alors, n’ayez pas peur de ce que les gens peuvent vous faire. Ne vous en faites pas. '
  '15':
  - type: text
    content: 'Mais, souvenez‑vous toujours que '
  - type: text
    content: Christ
  - type: text
    content: ' est votre '
  - type: text
    content: Seigneur
  - type: text
    content: '. Gardez cela dans vos cœurs. Les gens peuvent vous demander : Pourquoi croyez‑vous en Dieu pour vous aider ? Vous devez toujours être prêts à leur répondre. '
  '16':
  - type: text
    content: 'Mais quand vous leur direz, soyez gentils et polis. Faites seulement ce que vous savez être juste. Alors ces gens verront que vous vous comportez bien, parce que vous croyez en '
  - type: text
    content: Christ
  - type: text
    content: '. Quand ils disent de mauvaises choses contre vous, ils auront honte. '
  '17':
  - type: text
    content: Parfois, Dieu peut vous laisser souffrir même lorsque vous avez fait de bonnes choses. Mais cela est mieux que si vous avez des souffrances, parce que vous avez fait de mauvaises choses.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même a toujours fait ce qui était bien. Mais il a souffert pour ceux qui font le mal. Il est mort une fois pour enlever toutes ces mauvaises choses. Il a fait cela pour vous rapprocher de Dieu. Les gens ont tué le corps de '
  - type: text
    content: Christ
  - type: text
    content: ', mais l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu l’a fait revivre. '
  '19':
  - type: text
    content: 'De cette façon, il est allé vers les '
  - type: text
    content: esprits
  - type: text
    content: ' qui étaient en prison. Il leur a dit le vrai message de Dieu. '
  '20':
  - type: text
    content: 'C’étaient les '
  - type: text
    content: esprits
  - type: text
    content: ' des gens qui avaient refusé d’obéir à Dieu depuis longtemps. A ce temps, Dieu attendait patiemment qu’ils se tournent vers lui pendant que Noé construisait un grand bateau. Mais seules quelques personnes ont accepté de monter dans ce bateau. Dieu a sauvé seulement 8 personnes lorsque le bateau a navigué sur les eaux profondes. '
  '21':
  - type: text
    content: 'Cela montre comment Dieu vous sauve maintenant. C’est comme une image du '
  - type: text
    content: baptême
  - type: text
    content: '. L’eau du '
  - type: text
    content: baptême
  - type: text
    content: ' ne lave pas la saleté du corps d’une personne. Le '
  - type: text
    content: baptême
  - type: text
    content: ' montre qu’une personne a décidé d’obéir à Dieu. Elle choisit de faire ce qui est bien. Cela vous sauve, car Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est redevenu vivant après sa mort. '
  '22':
  - type: text
    content: 'Après cela, Jésus est allé au '
  - type: text
    content: ciel
  - type: text
    content: '. Maintenant, il est assis à droite de Dieu. Il règne sur les '
  - type: text
    content: anges
  - type: text
    content: ' et sur tout ce qui a autorité et puissance.'
  '3':
  - type: text
    content: 'N’essayez pas toujours de rendre vos corps agréables. La façon dont vous préparez vos cheveux ne vous rend pas vraiment belles. Vous n’avez pas besoin de porter des objets en or ou de beaux vêtements. '
  '4':
  - type: text
    content: 'Mais, pensez à ce que vous êtes vraiment en vous‑mêmes. Soyez patientes et ne vous fâchez pas facilement. Ensuite, vous serez toujours belles. Si vous êtes belles dans vos '
  - type: text
    content: esprits
  - type: text
    content: ', Dieu aime beaucoup cela. '
  '5':
  - type: text
    content: 'C’est ainsi que de bonnes femmes se sont faites, il y a de belles années. Elles croyaient en Dieu qu’il les aidait. Elles ont choisi d’obéir à leurs maris. '
  '6':
  - type: text
    content: 'Sara était une femme comme ça. Elle a obéi à son mari, Abraham. Elle l’a appelé mon '
  - type: text
    content: Seigneur
  - type: text
    content: . Donc vous, les épouses, doivent également faire ce qui est bien. Ne laissez rien vous faire peur. Vous serez alors comme de vraies filles de Sara.
  '7':
  - type: text
    content: Vous, les maris, vous devez aussi vivre bien avec vos femmes. Chacun de vous doit être gentil avec sa femme et l’aider. N’oubliez pas qu’elles ne sont pas aussi fortes que vous. N’oubliez pas que vous avez tous les 2 reçu la vraie vie de Dieu, car il est bon. Alors, respectez‑les. Alors Dieu vous répondra lorsque vous le prierez.
  - type: heading
    content: Les chrétiens doivent être prêts à avoir des problèmes, comme le Christ
  '8':
  - type: text
    content: 'Je voudrais maintenant vous dire ceci avant de terminer ma lettre. Vous devrez tous être d’accord sur ce que vous pensez. Vous devez essayer de comprendre comment les autres se sentent. Aimez‑vous comme frères et sœurs. Soyez gentils les uns envers les autres. Ne pensez pas que vous êtes plus importants que les autres. '
  '9':
  - type: text
    content: 'Si les gens vous font du mal, ne leur faites rien de mal en retour. Si les gens vous disent de mauvaises choses, ne leur dites pas de mauvaises choses. Par contre, priez pour que Dieu soit bon pour ces gens. C’est ce que Dieu veut que vous fassiez. Ensuite, vous recevrez également de bonnes choses de Dieu. '
