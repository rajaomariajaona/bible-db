document_id: 1PE.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Épouses et maris
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: J’ai besoin de dire la même chose à vous, les épouses. Chacune de vous doit obéir à son propre mari. Même si votre mari ne croit pas au message de Dieu sur Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', vous devez toujours le respecter. Si vous faites cela, il peut alors se tourner vers Dieu et croire à son message. Vous n’aurez pas besoin de lui dire ce qui est vrai. Il verra votre bonne façon de vivre. Il verra que vous obéissez vraiment à Dieu et que vous faites ce qui est bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'N’essayez pas toujours de rendre vos corps agréables. La façon dont vous préparez vos cheveux ne vous rend pas vraiment belles. Vous n’avez pas besoin de porter des objets en or ou de beaux vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais, pensez à ce que vous êtes vraiment en vous‑mêmes. Soyez patientes et ne vous fâchez pas facilement. Ensuite, vous serez toujours belles. Si vous êtes belles dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ', Dieu aime beaucoup cela. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est ainsi que de bonnes femmes se sont faites, il y a de belles années. Elles croyaient en Dieu qu’il les aidait. Elles ont choisi d’obéir à leurs maris. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sara était une femme comme ça. Elle a obéi à son mari, Abraham. Elle l’a appelé mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Donc vous, les épouses, doivent également faire ce qui est bien. Ne laissez rien vous faire peur. Vous serez alors comme de vraies filles de Sara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous, les maris, vous devez aussi vivre bien avec vos femmes. Chacun de vous doit être gentil avec sa femme et l’aider. N’oubliez pas qu’elles ne sont pas aussi fortes que vous. N’oubliez pas que vous avez tous les 2 reçu la vraie vie de Dieu, car il est bon. Alors, respectez‑les. Alors Dieu vous répondra lorsque vous le prierez.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les chrétiens doivent être prêts à avoir des problèmes, comme le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je voudrais maintenant vous dire ceci avant de terminer ma lettre. Vous devrez tous être d’accord sur ce que vous pensez. Vous devez essayer de comprendre comment les autres se sentent. Aimez‑vous comme frères et sœurs. Soyez gentils les uns envers les autres. Ne pensez pas que vous êtes plus importants que les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si les gens vous font du mal, ne leur faites rien de mal en retour. Si les gens vous disent de mauvaises choses, ne leur dites pas de mauvaises choses. Par contre, priez pour que Dieu soit bon pour ces gens. C’est ce que Dieu veut que vous fassiez. Ensuite, vous recevrez également de bonnes choses de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La Bible dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voulez‑vous profiter de votre vie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voulez‑vous être heureux ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors, vous devez faire attention à ne pas dire de mauvaises choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne dites aucun mensonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Arrêtez de faire tout ce qui est mauvais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites plutôt ce qui est bon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Essayez beaucoup d’être amis avec les gens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aidez les gens à vivre en paix les uns avec les autres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vivez ainsi, parce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' voit ce que tout le monde fait. Il prend soin des gens qui vivent bien.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils prient, il les écoute.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se détourne des gens qui font de mauvaises choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si vous essayez toujours de faire de bonnes choses, personne ne doit vous faire de mal. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais quelqu’un peut vous causer des problèmes, même si vous faites ce qui est bien. Si cela arrive, Dieu vous bénira. Alors, n’ayez pas peur de ce que les gens peuvent vous faire. Ne vous en faites pas. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais, souvenez‑vous toujours que '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est votre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Gardez cela dans vos cœurs. Les gens peuvent vous demander : Pourquoi croyez‑vous en Dieu pour vous aider ? Vous devez toujours être prêts à leur répondre. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais quand vous leur direz, soyez gentils et polis. Faites seulement ce que vous savez être juste. Alors ces gens verront que vous vous comportez bien, parce que vous croyez en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Quand ils disent de mauvaises choses contre vous, ils auront honte. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Parfois, Dieu peut vous laisser souffrir même lorsque vous avez fait de bonnes choses. Mais cela est mieux que si vous avez des souffrances, parce que vous avez fait de mauvaises choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même a toujours fait ce qui était bien. Mais il a souffert pour ceux qui font le mal. Il est mort une fois pour enlever toutes ces mauvaises choses. Il a fait cela pour vous rapprocher de Dieu. Les gens ont tué le corps de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', mais l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu l’a fait revivre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'De cette façon, il est allé vers les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' qui étaient en prison. Il leur a dit le vrai message de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’étaient les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' des gens qui avaient refusé d’obéir à Dieu depuis longtemps. A ce temps, Dieu attendait patiemment qu’ils se tournent vers lui pendant que Noé construisait un grand bateau. Mais seules quelques personnes ont accepté de monter dans ce bateau. Dieu a sauvé seulement 8 personnes lorsque le bateau a navigué sur les eaux profondes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cela montre comment Dieu vous sauve maintenant. C’est comme une image du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: baptême
  - type: text
    text: '. L’eau du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: baptême
  - type: text
    text: ' ne lave pas la saleté du corps d’une personne. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: baptême
  - type: text
    text: ' montre qu’une personne a décidé d’obéir à Dieu. Elle choisit de faire ce qui est bien. Cela vous sauve, car Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est redevenu vivant après sa mort. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après cela, Jésus est allé au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Maintenant, il est assis à droite de Dieu. Il règne sur les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' et sur tout ce qui a autorité et puissance.'
