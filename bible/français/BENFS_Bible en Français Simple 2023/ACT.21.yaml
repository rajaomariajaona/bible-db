document_id: ACT.21,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 21
  - type: heading
    content: Paul va à Jérusalem
  - type: text
    content: 'Nous avons dit au revoir aux chefs des croyants d’Éphèse. Alors nous avons navigué directement à travers la mer, et nous sommes arrivés à Cos. Le jour suivant, nous sommes arrivés à Rhodes, et de là nous avons continué vers Patara. '
  '10':
  - type: text
    content: Nous sommes restés avec Philippe pendant quelques jours. Alors un homme appelé Agabus est venu de Judée à la ville.
  - type: text
    content: 'Il était un prophète et il disait les messages de Dieu. '
  '11':
  - type: text
    content: 'Agabus nous a rendu visite. Il a pris la ceinture de Paul et il l’a attachée autour de ses propres pieds et mains. Il a dit : Ecoutez ce message du Saint‑Esprit. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' à Jérusalem lieront l’homme qui a cette ceinture. Ils le lieront de la même manière. Et alors ils livreront cet homme à ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: .
  '12':
  - type: text
    content: 'Quand nous avons entendu ceci, nous avons tous dit beaucoup de fois à Paul : Ne va pas à Jérusalem. '
  '13':
  - type: text
    content: 'Mais Paul a répondu : Arrêtez de pleurer comme ceci ! Vous me rendez très triste !'
  - type: text
    content: 'Je suis prêt que les hommes de Jérusalem me lient. Et je suis également prêt à mourir là. Je suis prêt à faire tout ceci, parce que je crois au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. '
  '14':
  - type: text
    content: 'Mais nous n’avons pas convaincu Paul. Ainsi nous avons laissé de lui dire : Tu ne devrais pas aller à Jérusalem. Et nous lui avons dit à la place : Que Dieu fasse ce qu’il veut.'
  '15':
  - type: text
    content: 'Nous sommes restés à '
  - type: text
    content: Césarée
  - type: text
    content: ' pendant un certain temps. Après cela, nous nous sommes préparés et nous avons voyagé vers Jérusalem. '
  '16':
  - type: text
    content: 'Certains croyants de '
  - type: text
    content: Césarée
  - type: text
    content: ' sont allés avec nous. Ils nous ont amenés à la maison d’un homme appelé Mnason. Nous avions décidé de rester avec lui. Sa ville natale était sur l’île appelée Chypre. Il était croyant depuis longtemps.'
  - type: heading
    content: Paul rend visite à Jacques à Jérusalem
  '17':
  - type: text
    content: 'Après cela, nous sommes arrivés à Jérusalem, où les croyants étaient très heureux de nous voir. '
  '18':
  - type: text
    content: 'Le jour suivant, Paul est allé avec nous voir Jacques. Les '
  - type: text
    content: anciens
  - type: text
    content: ' étaient également là. '
  '19':
  - type: text
    content: Paul leur a dit bonjour et alors il leur a dit tout au sujet de son travail. Dieu avait travaillé avec lui et Dieu faisait beaucoup de bonnes choses pour les étrangers ou non‑
  - type: text
    content: Juifs
  - type: text
    content: .
  '2':
  - type: text
    content: 'À Patara, nous avons trouvé un bateau qui allait en Phénicie. Ainsi nous sommes montés dans le bateau et nous avons navigué à bord. '
  '20':
  - type: text
    content: 'Après qu’ils ont entendu Paul parler, ils ont dit : Dieu est très bon et puissant. Puis les chefs ont dit : Frère Paul, tu peux voir ce qui s’est produit. Il y a maintenant beaucoup de milliers de '
  - type: text
    content: Juifs
  - type: text
    content: ' qui ont cru en Jésus. Mais ils veulent également vraiment obéir à la loi de Moïse. '
  '21':
  - type: text
    content: 'Ces '
  - type: text
    content: Juifs
  - type: text
    content: ' nous ont dit ce que tu enseignais aux gens dans d’autres pays. Ils ont dit que tu enseignais aux '
  - type: text
    content: Juifs
  - type: text
    content: ' ceci : Vous n’avez plus besoin d’obéir à la loi de Moïse. Vous n’avez pas besoin de '
  - type: text
    content: circoncire
  - type: text
    content: ' vos enfants. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' font habituellement certaines choses. Mais maintenant vous n’avez pas besoin de faire toutes ces choses. '
  '22':
  - type: text
    content: 'Ces gens entendront certainement que tu es à Jérusalem. '
  '23':
  - type: text
    content: 'Tu dois faire ce que nous disons. Dans la ville, il y a 4 hommes qui ont promis quelque chose à Dieu. '
  '24':
  - type: text
    content: 'Maintenant ils iront et ils se laveront pour être purs devant Dieu. Va avec eux. Sois avec eux quand ils font cela. Tu paies pour eux l’argent au '
  - type: text
    content: prêtre
  - type: text
    content: '. Alors les hommes peuvent couper tous les cheveux de leurs têtes. Quand tu fais cela, chacun comprendra au sujet de toi. Les gens ont dit que tu n’obéis pas à la loi de Moïse. Mais ils verront que tu fais ceci. Et puis, ils sauront que ce n’est pas vrai. Ils sauront que tu obéis toi‑même à la loi de Moïse. '
  '25':
  - type: text
    content: Mais c’est différent pour les étrangers ou non‑
  - type: text
    content: Juifs
  - type: text
    content: ' qui croient en Jésus. Nous leur avons envoyé une lettre. Nous avons écrit : Vous ne devez pas manger de la viande de ces animaux que le peuple a tués comme offrande à leurs propres dieux. Les gens mettent une corde autour du cou de quelques animaux pour les tuer. Vous ne devez pas manger de la viande de ces animaux, parce que le sang n’a pas coulé d’eux. En '
  - type: text
    content: outre
  - type: text
    content: ', vous ne devez pas manger du sang. Et vous ne devez pas coucher avec quelqu’un qui n’est pas votre mari ou votre épouse.'
  '26':
  - type: text
    content: 'Ainsi Paul est allé avec 4 hommes. Il s’est joint à eux quand ils se lavaient. Ils se sont lavés pour se rendre purs devant Dieu. Alors Paul est entré dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Il a dit au '
  - type: text
    content: prêtre
  - type: text
    content: ' combien de temps les 4 hommes devaient attendre.'
  - type: text
    content: Et après cela, chaque homme pouvait tuer un animal comme offrande pour Dieu.
  - type: heading
    content: Les Juifs arrêtent Paul au Temple
  '27':
  - type: text
    content: 'Après 7 jours, quelques '
  - type: text
    content: Juifs
  - type: text
    content: ' d’Asie ont vu Paul dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils disaient des choses contre Paul à la foule. Ainsi les personnes sont devenues fâchées et elles ont attrapé Paul. '
  '28':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' d’Asie criaient : Peuples d’Israël, venez nous aider ! Celui‑ci est l’homme qui voyage partout. Il enseigne les gens contre le peuple d’Israël. Il parle également contre la loi de Moïse et ce '
  - type: text
    content: Temple
  - type: text
    content: '. Maintenant, il a même conduit quelques hommes qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: ' dans ce '
  - type: text
    content: Temple
  - type: text
    content: '. Ainsi ce '
  - type: text
    content: Temple
  - type: text
    content: ' n’est plus maintenant pur devant Dieu. '
  '29':
  - type: text
    content: '(Les hommes disaient ceci, parce qu’ils avaient vu Paul avec un homme dans la ville. Cet homme s’appelait Trophime et il est venu d’Éphèse. Il n’était pas '
  - type: text
    content: Juif
  - type: text
    content: ' et ils pensaient que Paul avait conduit Trophime dans le '
  - type: text
    content: Temple
  - type: text
    content: .)
  '3':
  - type: text
    content: 'Nous sommes arrivés à un endroit sur la mer d’où nous pourrions voir l’île de Chypre. Nous avons navigué au sud de l’île de Chypre. Nous sommes arrivés en Syrie. Nous avons laissé le bateau à Tyr et nous avons continué à terre. Le bateau portait beaucoup de choses et à Tyr, les gens ont pris toutes ces choses du bateau. '
  '30':
  - type: text
    content: 'Beaucoup d’autres gens dans la ville ont entendu ce qui s’était passé. Ils commençaient à crier au sujet de ces choses. Ils ont tous couru ensemble et ils ont tenu Paul. Alors ils l’ont tiré hors du '
  - type: text
    content: Temple
  - type: text
    content: ', et ils ont fermé les portes immédiatement. '
  '31':
  - type: text
    content: 'La foule fâchée essayait de tuer Paul. Alors quelqu’un a envoyé un message au chef des soldats '
  - type: text
    content: romains
  - type: text
    content: .
  - type: text
    content: 'Le message était : Les gens combattent dans les rues partout en ville. '
  '32':
  - type: text
    content: 'Immédiatement, le chef de ces soldats est allé avec un '
  - type: text
    content: officier
  - type: text
    content: ' et quelques soldats. Et ils ont couru vers la foule fâchée. Le peuple a vu le chef avec ses soldats. Alors ils ont laissé de frapper Paul.'
  '33':
  - type: text
    content: 'Le chef des soldats '
  - type: text
    content: romains
  - type: text
    content: ' est allé auprès de Paul et l’a tenu. Alors le chef des soldats a dit : Liez 2 chaînes autour des bras de cet homme. Alors il a demandé aux gens dans la foule : Qui est cet homme et qu’est‑ce qu’il a fait ? '
  '34':
  - type: text
    content: 'Quelques personnes dans la foule criaient d’une façon. D’autres criaient d’une autre façon. Il y avait vraiment beaucoup de bruit. Ainsi le chef des soldats n’était pas sûr de ces faits. Il n’a pas compris ce qui s’était produit. Ainsi il a dit à ses soldats : Amenez cet homme en haut dans le bâtiment fort ! '
  '35':
  - type: text
    content: 'Les soldats ont alors mené Paul jusqu’aux escaliers du bâtiment fort. Alors ils l’ont amené, parce que la foule était très fâchée. '
  '36':
  - type: text
    content: 'La foule a couru vers Paul et elle criait : Tuez‑le !'
  - type: heading
    content: Paul se défend devant les Juifs
  '37':
  - type: text
    content: 'Quand les soldats emmenaient Paul dans le bâtiment fort, il a parlé à leur chef : Puis‑je te dire quelque chose ? Le chef des soldats a répondu : Je comprends maintenant que tu parles la langue grecque. '
  '38':
  - type: text
    content: 'N’es‑tu pas l’homme qui est venu d’Égypte, il y a quelque temps ? Cet homme a causé le peuple à combattre contre le gouvernement. Il a mené 4 000 de ses propres soldats, avec des armes dehors dans le '
  - type: text
    content: désert
  - type: text
    content: '. Ils ont voulu tuer les soldats '
  - type: text
    content: romains
  - type: text
    content: .
  '39':
  - type: text
    content: 'Paul a répondu : Je suis '
  - type: text
    content: Juif
  - type: text
    content: ' et je suis né à Tarse en Cilicie.'
  - type: text
    content: Je suis un homme d’une ville importante. Je vous prie de me laisser parler à cette foule.
  '4':
  - type: text
    content: 'Nous avons trouvé quelques croyants à Tyr. Nous sommes restés avec eux pendant une semaine. Le Saint‑Esprit parlait à travers ces croyants : Paul, tu ne devrais pas aller à Jérusalem. '
  '40':
  - type: text
    content: 'Le chef des soldats a dit à Paul : Oui, tu peux parler au peuple. Ainsi Paul s’est tenu tranquille sur les escaliers du bâtiment fort. Il a levé ses mains de sorte que les gens deviennent silencieux. Quand les gens étaient silencieux, il leur a parlé.'
  - type: text
    content: 'Il parlait dans la langue que les '
  - type: text
    content: Juifs
  - type: text
    content: ' utilisent.'
  '5':
  - type: text
    content: Nous sommes restés avec eux pendant une semaine.
  - type: text
    content: 'Et alors il était temps pour nous de les laisser. Tous les croyants, ainsi que leurs épouses et enfants, sont allés avec nous hors de la ville. À la plage, nous nous sommes tous mis à genoux et nous avons prié ensemble. '
  '6':
  - type: text
    content: Alors nous nous sommes dit au revoir. Nous sommes aussi retournés à bord du bateau. Les croyants et leurs familles sont revenus à leurs maisons.
  '7':
  - type: text
    content: 'Nous avons continué notre voyage à bord du bateau. Nous avons navigué de Tyr à Ptolemaïs. Ici, nous avons rencontré quelques croyants et nous sommes restés avec eux un jour. '
  '8':
  - type: text
    content: 'Le jour suivant, nous avons quitté Ptolemaïs et nous avons navigué vers '
  - type: text
    content: Césarée
  - type: text
    content: '. Nous avons rendu visite à Philippe vers '
  - type: text
    content: Césarée
  - type: text
    content: ' et nous sommes restés avec lui. À  '
  - type: text
    content: Césarée
  - type: text
    content: ', Philippe enseignait la Bonne Nouvelle au sujet de Jésus. Philippe était l’un des 7 hommes que les croyants avaient choisis à Jérusalem. '
  '9':
  - type: text
    content: Philippe avait 4 filles et aucune d’elles n’était mariée. Ses filles disaient les messages de Dieu.
