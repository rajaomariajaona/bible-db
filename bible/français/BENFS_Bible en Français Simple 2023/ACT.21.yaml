document_id: ACT.21
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 21
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul va à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous avons dit au revoir aux chefs des croyants d’Éphèse. Alors nous avons navigué directement à travers la mer, et nous sommes arrivés à Cos. Le jour suivant, nous sommes arrivés à Rhodes, et de là nous avons continué vers Patara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'À Patara, nous avons trouvé un bateau qui allait en Phénicie. Ainsi nous sommes montés dans le bateau et nous avons navigué à bord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous sommes arrivés à un endroit sur la mer d’où nous pourrions voir l’île de Chypre. Nous avons navigué au sud de l’île de Chypre. Nous sommes arrivés en Syrie. Nous avons laissé le bateau à Tyr et nous avons continué à terre. Le bateau portait beaucoup de choses et à Tyr, les gens ont pris toutes ces choses du bateau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nous avons trouvé quelques croyants à Tyr. Nous sommes restés avec eux pendant une semaine. Le Saint‑Esprit parlait à travers ces croyants : Paul, tu ne devrais pas aller à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nous sommes restés avec eux pendant une semaine.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Et alors il était temps pour nous de les laisser. Tous les croyants, ainsi que leurs épouses et enfants, sont allés avec nous hors de la ville. À la plage, nous nous sommes tous mis à genoux et nous avons prié ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors nous nous sommes dit au revoir. Nous sommes aussi retournés à bord du bateau. Les croyants et leurs familles sont revenus à leurs maisons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous avons continué notre voyage à bord du bateau. Nous avons navigué de Tyr à Ptolemaïs. Ici, nous avons rencontré quelques croyants et nous sommes restés avec eux un jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le jour suivant, nous avons quitté Ptolemaïs et nous avons navigué vers '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: '. Nous avons rendu visite à Philippe vers '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' et nous sommes restés avec lui. À  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ', Philippe enseignait la Bonne Nouvelle au sujet de Jésus. Philippe était l’un des 7 hommes que les croyants avaient choisis à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Philippe avait 4 filles et aucune d’elles n’était mariée. Ses filles disaient les messages de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous sommes restés avec Philippe pendant quelques jours. Alors un homme appelé Agabus est venu de Judée à la ville.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il était un prophète et il disait les messages de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Agabus nous a rendu visite. Il a pris la ceinture de Paul et il l’a attachée autour de ses propres pieds et mains. Il a dit : Ecoutez ce message du Saint‑Esprit. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à Jérusalem lieront l’homme qui a cette ceinture. Ils le lieront de la même manière. Et alors ils livreront cet homme à ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand nous avons entendu ceci, nous avons tous dit beaucoup de fois à Paul : Ne va pas à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais Paul a répondu : Arrêtez de pleurer comme ceci ! Vous me rendez très triste !'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Je suis prêt que les hommes de Jérusalem me lient. Et je suis également prêt à mourir là. Je suis prêt à faire tout ceci, parce que je crois au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais nous n’avons pas convaincu Paul. Ainsi nous avons laissé de lui dire : Tu ne devrais pas aller à Jérusalem. Et nous lui avons dit à la place : Que Dieu fasse ce qu’il veut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous sommes restés à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' pendant un certain temps. Après cela, nous nous sommes préparés et nous avons voyagé vers Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Certains croyants de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' sont allés avec nous. Ils nous ont amenés à la maison d’un homme appelé Mnason. Nous avions décidé de rester avec lui. Sa ville natale était sur l’île appelée Chypre. Il était croyant depuis longtemps.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul rend visite à Jacques à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après cela, nous sommes arrivés à Jérusalem, où les croyants étaient très heureux de nous voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le jour suivant, Paul est allé avec nous voir Jacques. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' étaient également là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Paul leur a dit bonjour et alors il leur a dit tout au sujet de son travail. Dieu avait travaillé avec lui et Dieu faisait beaucoup de bonnes choses pour les étrangers ou non‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après qu’ils ont entendu Paul parler, ils ont dit : Dieu est très bon et puissant. Puis les chefs ont dit : Frère Paul, tu peux voir ce qui s’est produit. Il y a maintenant beaucoup de milliers de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui ont cru en Jésus. Mais ils veulent également vraiment obéir à la loi de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' nous ont dit ce que tu enseignais aux gens dans d’autres pays. Ils ont dit que tu enseignais aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ceci : Vous n’avez plus besoin d’obéir à la loi de Moïse. Vous n’avez pas besoin de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: ' vos enfants. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' font habituellement certaines choses. Mais maintenant vous n’avez pas besoin de faire toutes ces choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ces gens entendront certainement que tu es à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu dois faire ce que nous disons. Dans la ville, il y a 4 hommes qui ont promis quelque chose à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Maintenant ils iront et ils se laveront pour être purs devant Dieu. Va avec eux. Sois avec eux quand ils font cela. Tu paies pour eux l’argent au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: '. Alors les hommes peuvent couper tous les cheveux de leurs têtes. Quand tu fais cela, chacun comprendra au sujet de toi. Les gens ont dit que tu n’obéis pas à la loi de Moïse. Mais ils verront que tu fais ceci. Et puis, ils sauront que ce n’est pas vrai. Ils sauront que tu obéis toi‑même à la loi de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais c’est différent pour les étrangers ou non‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui croient en Jésus. Nous leur avons envoyé une lettre. Nous avons écrit : Vous ne devez pas manger de la viande de ces animaux que le peuple a tués comme offrande à leurs propres dieux. Les gens mettent une corde autour du cou de quelques animaux pour les tuer. Vous ne devez pas manger de la viande de ces animaux, parce que le sang n’a pas coulé d’eux. En '
  - type: usfm
    marker: w
    children:
    - type: text
      text: outre
  - type: text
    text: ', vous ne devez pas manger du sang. Et vous ne devez pas coucher avec quelqu’un qui n’est pas votre mari ou votre épouse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ainsi Paul est allé avec 4 hommes. Il s’est joint à eux quand ils se lavaient. Ils se sont lavés pour se rendre purs devant Dieu. Alors Paul est entré dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Il a dit au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' combien de temps les 4 hommes devaient attendre.'
- type: usfm
  marker: m
  children:
  - type: text
    text: Et après cela, chaque homme pouvait tuer un animal comme offrande pour Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' arrêtent Paul au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Après 7 jours, quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' d’Asie ont vu Paul dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ils disaient des choses contre Paul à la foule. Ainsi les personnes sont devenues fâchées et elles ont attrapé Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' d’Asie criaient : Peuples d’Israël, venez nous aider ! Celui‑ci est l’homme qui voyage partout. Il enseigne les gens contre le peuple d’Israël. Il parle également contre la loi de Moïse et ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Maintenant, il a même conduit quelques hommes qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' dans ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ainsi ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' n’est plus maintenant pur devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '(Les hommes disaient ceci, parce qu’ils avaient vu Paul avec un homme dans la ville. Cet homme s’appelait Trophime et il est venu d’Éphèse. Il n’était pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: ' et ils pensaient que Paul avait conduit Trophime dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: .)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Beaucoup d’autres gens dans la ville ont entendu ce qui s’était passé. Ils commençaient à crier au sujet de ces choses. Ils ont tous couru ensemble et ils ont tenu Paul. Alors ils l’ont tiré hors du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ', et ils ont fermé les portes immédiatement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'La foule fâchée essayait de tuer Paul. Alors quelqu’un a envoyé un message au chef des soldats '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Le message était : Les gens combattent dans les rues partout en ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Immédiatement, le chef de ces soldats est allé avec un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officier
  - type: text
    text: ' et quelques soldats. Et ils ont couru vers la foule fâchée. Le peuple a vu le chef avec ses soldats. Alors ils ont laissé de frapper Paul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Le chef des soldats '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: ' est allé auprès de Paul et l’a tenu. Alors le chef des soldats a dit : Liez 2 chaînes autour des bras de cet homme. Alors il a demandé aux gens dans la foule : Qui est cet homme et qu’est‑ce qu’il a fait ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quelques personnes dans la foule criaient d’une façon. D’autres criaient d’une autre façon. Il y avait vraiment beaucoup de bruit. Ainsi le chef des soldats n’était pas sûr de ces faits. Il n’a pas compris ce qui s’était produit. Ainsi il a dit à ses soldats : Amenez cet homme en haut dans le bâtiment fort ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les soldats ont alors mené Paul jusqu’aux escaliers du bâtiment fort. Alors ils l’ont amené, parce que la foule était très fâchée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'La foule a couru vers Paul et elle criait : Tuez‑le !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Paul se défend devant les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Quand les soldats emmenaient Paul dans le bâtiment fort, il a parlé à leur chef : Puis‑je te dire quelque chose ? Le chef des soldats a répondu : Je comprends maintenant que tu parles la langue grecque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'N’es‑tu pas l’homme qui est venu d’Égypte, il y a quelque temps ? Cet homme a causé le peuple à combattre contre le gouvernement. Il a mené 4 000 de ses propres soldats, avec des armes dehors dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. Ils ont voulu tuer les soldats '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Paul a répondu : Je suis '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: ' et je suis né à Tarse en Cilicie.'
- type: usfm
  marker: m
  children:
  - type: text
    text: Je suis un homme d’une ville importante. Je vous prie de me laisser parler à cette foule.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Le chef des soldats a dit à Paul : Oui, tu peux parler au peuple. Ainsi Paul s’est tenu tranquille sur les escaliers du bâtiment fort. Il a levé ses mains de sorte que les gens deviennent silencieux. Quand les gens étaient silencieux, il leur a parlé.'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il parlait dans la langue que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' utilisent.'
