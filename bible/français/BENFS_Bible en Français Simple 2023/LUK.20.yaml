document_id: LUK.20,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 20
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de son pouvoir
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un jour, Jésus enseignait dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu. Il disait aux gens la Bonne Nouvelle sur la façon dont Dieu règne. Ensuite, les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les enseignants de la loi de Dieu sont venus auprès de lui. Il y avait aussi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quand il était temps de cueillir les fruits, l’homme a envoyé un serviteur aux agriculteurs. Le serviteur leur a dit : S’il vous plaît, donnez‑moi une partie du fruit de mon maître. Mais les agriculteurs l’ont frappé avec des bâtons et ils l’ont renvoyé sans rien.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le maître a alors envoyé un autre serviteur au champ. Ils l’ont également frappé avec des bâtons et ils lui ont fait d’autres mauvaises choses. Ils l’ont également renvoyé sans rien.
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le maître a envoyé un troisième serviteur au champ. Les agriculteurs lui ont aussi fait mal. Ils l’ont jeté hors du champ.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors le maître du champ s’est dit en lui‑même : Je dois penser à ce que je dois faire. Je sais ce que je vais faire. Je vais envoyer mon fils que j’aime beaucoup. Ils seront peut‑être bons envers lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais les agriculteurs l’ont vu venir. Ils disaient les uns aux autres : Celui‑ci est le fils de notre maître. Quand notre maître mourra, son fils héritera de son champ. Nous devons le tuer, puis le champ sera le nôtre.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors ils l’ont jeté hors du champ et ils l’ont tué. Jésus a dit : Voici ce que le maître va faire aux agriculteurs. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il viendra auprès de ces agriculteurs. Il les tuera et il donnera le champ à d’autres agriculteurs.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens ont entendu cela. Ils ont répondu : Cela ne doit pas se faire.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus a regardé alors le peuple. Il a dit : Vous dites que cela ne doit pas se faire. Mais ceci est ce qui est dans le livre de Dieu.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les constructeurs ont refusé d’utiliser une pierre spéciale.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais cette pierre est maintenant celle qui fait le coin de la paroi forte.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Quand une personne tombe sur cette pierre, elle va briser son corps en morceaux. Mais quand cette pierre tombe sur le dessus de quelqu’un, elle va le détruire complètement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' et les enseignants de la loi questionnent Jésus'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les enseignants de la loi de Dieu et les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' voulaient attraper Jésus immédiatement. Ils savaient que Jésus parlait contre eux dans l’histoire. Mais ils ne l’ont pas fait, parce qu’ils avaient peur du peuple.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ils sont tous venus lui parler. Ils disaient : Dis‑nous par quel pouvoir tu fais ces choses. Qui t’a donné ce pouvoir ?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Donc, voici ce qu’ils ont fait pour attraper Jésus. Ils ont donné de l’argent aux gens pour lui poser une question difficile. Ces gens semblaient être bien, mais ils n’étaient pas honnêtes. Au lieu de cela, ils voulaient entendre Jésus dire quelque chose de mal. Puis ils pourraient l’emmener au chef de la ville pour le punir. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'C’est ce que ces personnes ont demandé : Maître, tout ce que tu dis, est juste. Et tout ce que tu enseignes, est juste. Nous savons cela. Tu ne dis pas de choses pour faire plaisir à quelqu’un, qu’il soit important ou non. Au lieu de cela, tu enseignes à tout le monde le même message. Et tu dis ce que Dieu veut vraiment que les gens fassent. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Faut‑il payer les taxes aux dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romains
    - type: text
      text: ' qui nous gouvernent ? Est‑ce que les règles de Dieu disent de faire cela ou pas ?'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus savait que les hommes voulaient le tenter. Il savait qu’ils semblaient seulement être de bonnes personnes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il leur a dit : Montrez‑moi une pièce de monnaie. Il a alors dit : L’image et le nom qui sont là sont de qui ?'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils ont répondu : C’est l’image et le nom de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' (chef '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: ).
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus alors dit : Donc donnez à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' les choses qui sont les siennes. Et donnez à Dieu les choses qui sont les siennes.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ainsi les dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' n’ont pas réussi à trouver Jésus fautif par ses paroles. C’était devant le peuple. Ils ont été très surpris de sa réponse à leur question. Ils n’ont plus continué de parler.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' posent une question à Jésus'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Alors quelques‑uns des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' ont vu Jésus. Ces hommes ne croyaient pas que les morts seront de nouveau vivants.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils lui ont posé une question : Maître, Moïse avait écrit cette règle pour que nous y obéissions. Un homme peut mourir. Si sa femme n’a pas d’enfant, le frère de son mari doit l’épouser. Nous devrions appeler leurs enfants les enfants de l’homme qui est mort. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Mais une fois, il y avait 7 hommes qui étaient frères. Un des frères était marié à une femme. Puis il est mort, mais ils n’avaient pas d’enfants. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il leur a répondu : Je vais aussi vous demander quelque chose : Dites‑moi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Un autre frère a ensuite épousé cette femme, mais il est également mort. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Puis le troisième frère a épousé la femme. La même chose est arrivée à l’ensemble des 7 frères. Aucun d’entre eux n’avait d’enfants avant de mourir. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Après cela, la femme est aussi morte. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Les gens disent ceci au sujet de ceux qui sont morts. Ils disent qu’un jour, ils vont vivre de nouveau. Donc quand cela se produira, à qui sera la femme ? Après tout, elle avait été la femme de tous les 7 frères.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jésus leur a dit : Les hommes et les femmes qui sont en vie sur terre se marient. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Mais les morts qui vivront de nouveau ne se marieront plus. Dieu a choisi des gens pour vivre de nouveau avec lui. Il dit qu’ils sont bons. Ils ne se marieront plus. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Et ils ne pourront plus mourir. En effet, ils vivront comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' vivent. Ce sont des enfants de Dieu. Il les a faits de nouveau en vie.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Il est vrai que les morts vivent encore. Moïse nous a montré cela dans le récit sur le buisson ardent. Il nous a dit que notre Dieu avait dit ceci : Je suis le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Mais Dieu n’est pas un Dieu des morts. Il est le Dieu des personnes vivantes. Abraham, Isaac et Jacob sont vivants pour lui. Vraiment, il voit tous les gens comme vivants.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Certains enseignants de la loi de Dieu étaient d’accord. Ils ont dit : Maître, c’était une très bonne réponse. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jean avait le pouvoir de baptiser les gens. Est‑ce que ce pouvoir venait de Dieu ou est‑ce que quelqu’un d’autre le lui avait donné ?
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ils avaient peur de lui poser d’autres questions.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' est quelqu’un que David appelle '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jésus leur a dit : Pourquoi les gens disent ceci : Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' sera quelqu’un de la famille de David ? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Après tout, David lui‑même a dit dans le livre intitulé Psaumes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit à mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assieds‑toi à la place d’importance, à mon côté droit.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Reste là jusqu’à ce que je mette tes ennemis sous tes pieds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu reposeras tes pieds sur eux.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Alors David l’appelle '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Alors, comment peut‑il être aussi le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: '  ?'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Tous les gens écoutaient. Jésus a ensuite dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ceci :'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Attention, ne faites pas la même chose que les enseignants de la loi de Dieu. Ils aiment porter des vêtements longs pour montrer combien ils sont importants. Ils aiment que les gens leur parlent en face de beaucoup de gens, comme à une personne importante. Ils aiment avoir les meilleures places aux réunions. Ils aiment se mettre sur les premiers sièges pendant des fêtes. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Ils poussent des femmes dont les maris sont morts à leur fournir de l’argent. Ils les utilisent pour eux‑mêmes. Ils prient en face de beaucoup de gens pendant une longue période. Cela amène les gens à penser qu’ils sont bons. Parce qu’ils font ces choses, Dieu punira ces gens beaucoup. Ce sera pire pour eux que pour les personnes qui n’avaient pas fait ces choses.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils ont parlé les uns aux autres au sujet de sa question. On pourrait dire que Dieu a donné à Jean son pouvoir. Mais si nous disons cela, Jésus nous dira : Alors pourquoi n’avez‑vous pas cru en lui ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ou nous pourrions dire que quelqu’un d’autre lui a donné ce pouvoir. Alors, il y a risque que tous les gens jettent des pierres sur nous pour nous tuer. Après tout, ils sont sûrs que Jean était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors ils ont répondu : Nous ne savons pas qui a donné à Jean le pouvoir de baptiser.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jésus a répondu : Alors, je ne vous dirai pas non plus qui m’a donné le pouvoir de faire ces choses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire des agriculteurs
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors Jésus a commencé à raconter cette histoire au peuple dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu : Un homme a planté une '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vigne
    - type: text
      text: ' dans son champ. Il a laissé certains agriculteurs prendre soin des plantes ('
    - type: usfm
      marker: w
      children:
      - type: text
        text: vignes
    - type: text
      text: ). Puis il est parti dans un autre pays. Il est resté là‑bas pendant une longue période.
