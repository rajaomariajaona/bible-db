document_id: LUK.20,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 20
  - type: heading
    content: Jésus parle de son pouvoir
  - type: text
    content: 'Un jour, Jésus enseignait dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Il disait aux gens la Bonne Nouvelle sur la façon dont Dieu règne. Ensuite, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi de Dieu sont venus auprès de lui. Il y avait aussi des '
  - type: text
    content: anciens
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Quand il était temps de cueillir les fruits, l’homme a envoyé un serviteur aux agriculteurs. Le serviteur leur a dit : S’il vous plaît, donnez‑moi une partie du fruit de mon maître. Mais les agriculteurs l’ont frappé avec des bâtons et ils l’ont renvoyé sans rien.'
  '11':
  - type: text
    content: Le maître a alors envoyé un autre serviteur au champ. Ils l’ont également frappé avec des bâtons et ils lui ont fait d’autres mauvaises choses. Ils l’ont également renvoyé sans rien.
  '12':
  - type: text
    content: Le maître a envoyé un troisième serviteur au champ. Les agriculteurs lui ont aussi fait mal. Ils l’ont jeté hors du champ.
  '13':
  - type: text
    content: 'Alors le maître du champ s’est dit en lui‑même : Je dois penser à ce que je dois faire. Je sais ce que je vais faire. Je vais envoyer mon fils que j’aime beaucoup. Ils seront peut‑être bons envers lui. '
  '14':
  - type: text
    content: 'Mais les agriculteurs l’ont vu venir. Ils disaient les uns aux autres : Celui‑ci est le fils de notre maître. Quand notre maître mourra, son fils héritera de son champ. Nous devons le tuer, puis le champ sera le nôtre.'
  '15':
  - type: text
    content: 'Alors ils l’ont jeté hors du champ et ils l’ont tué. Jésus a dit : Voici ce que le maître va faire aux agriculteurs. '
  '16':
  - type: text
    content: Il viendra auprès de ces agriculteurs. Il les tuera et il donnera le champ à d’autres agriculteurs.
  - type: text
    content: 'Les gens ont entendu cela. Ils ont répondu : Cela ne doit pas se faire.'
  '17':
  - type: text
    content: 'Jésus a regardé alors le peuple. Il a dit : Vous dites que cela ne doit pas se faire. Mais ceci est ce qui est dans le livre de Dieu.'
  - type: text
    content: Les constructeurs ont refusé d’utiliser une pierre spéciale.
  - type: text
    content: Mais cette pierre est maintenant celle qui fait le coin de la paroi forte.
  '18':
  - type: text
    content: Quand une personne tombe sur cette pierre, elle va briser son corps en morceaux. Mais quand cette pierre tombe sur le dessus de quelqu’un, elle va le détruire complètement.
  - type: heading
    content: Les anciens et les enseignants de la loi questionnent Jésus
  '19':
  - type: text
    content: 'Les enseignants de la loi de Dieu et les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' voulaient attraper Jésus immédiatement. Ils savaient que Jésus parlait contre eux dans l’histoire. Mais ils ne l’ont pas fait, parce qu’ils avaient peur du peuple.'
  '2':
  - type: text
    content: 'Ils sont tous venus lui parler. Ils disaient : Dis‑nous par quel pouvoir tu fais ces choses. Qui t’a donné ce pouvoir ?'
  '20':
  - type: text
    content: 'Donc, voici ce qu’ils ont fait pour attraper Jésus. Ils ont donné de l’argent aux gens pour lui poser une question difficile. Ces gens semblaient être bien, mais ils n’étaient pas honnêtes. Au lieu de cela, ils voulaient entendre Jésus dire quelque chose de mal. Puis ils pourraient l’emmener au chef de la ville pour le punir. '
  '21':
  - type: text
    content: 'C’est ce que ces personnes ont demandé : Maître, tout ce que tu dis, est juste. Et tout ce que tu enseignes, est juste. Nous savons cela. Tu ne dis pas de choses pour faire plaisir à quelqu’un, qu’il soit important ou non. Au lieu de cela, tu enseignes à tout le monde le même message. Et tu dis ce que Dieu veut vraiment que les gens fassent. '
  '22':
  - type: text
    content: 'Faut‑il payer les taxes aux dirigeants '
  - type: text
    content: romains
  - type: text
    content: ' qui nous gouvernent ? Est‑ce que les règles de Dieu disent de faire cela ou pas ?'
  '23':
  - type: text
    content: 'Jésus savait que les hommes voulaient le tenter. Il savait qu’ils semblaient seulement être de bonnes personnes. '
  '24':
  - type: text
    content: 'Il leur a dit : Montrez‑moi une pièce de monnaie. Il a alors dit : L’image et le nom qui sont là sont de qui ?'
  '25':
  - type: text
    content: 'Ils ont répondu : C’est l’image et le nom de '
  - type: text
    content: César
  - type: text
    content: ' (chef '
  - type: text
    content: romain
  - type: text
    content: ).
  - type: text
    content: 'Jésus alors dit : Donc donnez à '
  - type: text
    content: César
  - type: text
    content: ' les choses qui sont les siennes. Et donnez à Dieu les choses qui sont les siennes.'
  '26':
  - type: text
    content: 'Ainsi les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' n’ont pas réussi à trouver Jésus fautif par ses paroles. C’était devant le peuple. Ils ont été très surpris de sa réponse à leur question. Ils n’ont plus continué de parler.'
  - type: heading
    content: Les Sadducéens posent une question à Jésus
  '27':
  - type: text
    content: 'Alors quelques‑uns des '
  - type: text
    content: Sadducéens
  - type: text
    content: ' ont vu Jésus. Ces hommes ne croyaient pas que les morts seront de nouveau vivants.'
  '28':
  - type: text
    content: 'Ils lui ont posé une question : Maître, Moïse avait écrit cette règle pour que nous y obéissions. Un homme peut mourir. Si sa femme n’a pas d’enfant, le frère de son mari doit l’épouser. Nous devrions appeler leurs enfants les enfants de l’homme qui est mort. '
  '29':
  - type: text
    content: 'Mais une fois, il y avait 7 hommes qui étaient frères. Un des frères était marié à une femme. Puis il est mort, mais ils n’avaient pas d’enfants. '
  '3':
  - type: text
    content: 'Il leur a répondu : Je vais aussi vous demander quelque chose : Dites‑moi. '
  '30':
  - type: text
    content: 'Un autre frère a ensuite épousé cette femme, mais il est également mort. '
  '31':
  - type: text
    content: 'Puis le troisième frère a épousé la femme. La même chose est arrivée à l’ensemble des 7 frères. Aucun d’entre eux n’avait d’enfants avant de mourir. '
  '32':
  - type: text
    content: 'Après cela, la femme est aussi morte. '
  '33':
  - type: text
    content: Les gens disent ceci au sujet de ceux qui sont morts. Ils disent qu’un jour, ils vont vivre de nouveau. Donc quand cela se produira, à qui sera la femme ? Après tout, elle avait été la femme de tous les 7 frères.
  '34':
  - type: text
    content: 'Jésus leur a dit : Les hommes et les femmes qui sont en vie sur terre se marient. '
  '35':
  - type: text
    content: 'Mais les morts qui vivront de nouveau ne se marieront plus. Dieu a choisi des gens pour vivre de nouveau avec lui. Il dit qu’ils sont bons. Ils ne se marieront plus. '
  '36':
  - type: text
    content: 'Et ils ne pourront plus mourir. En effet, ils vivront comme les '
  - type: text
    content: anges
  - type: text
    content: ' vivent. Ce sont des enfants de Dieu. Il les a faits de nouveau en vie.'
  '37':
  - type: text
    content: 'Il est vrai que les morts vivent encore. Moïse nous a montré cela dans le récit sur le buisson ardent. Il nous a dit que notre Dieu avait dit ceci : Je suis le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob.'
  '38':
  - type: text
    content: Mais Dieu n’est pas un Dieu des morts. Il est le Dieu des personnes vivantes. Abraham, Isaac et Jacob sont vivants pour lui. Vraiment, il voit tous les gens comme vivants.
  '39':
  - type: text
    content: 'Certains enseignants de la loi de Dieu étaient d’accord. Ils ont dit : Maître, c’était une très bonne réponse. '
  '4':
  - type: text
    content: Jean avait le pouvoir de baptiser les gens. Est‑ce que ce pouvoir venait de Dieu ou est‑ce que quelqu’un d’autre le lui avait donné ?
  '40':
  - type: text
    content: Ils avaient peur de lui poser d’autres questions.
  - type: heading
    content: Le Messie est quelqu’un que David appelle Seigneur
  '41':
  - type: text
    content: 'Jésus leur a dit : Pourquoi les gens disent ceci : Le '
  - type: text
    content: Messie
  - type: text
    content: ' sera quelqu’un de la famille de David ? '
  '42':
  - type: text
    content: 'Après tout, David lui‑même a dit dans le livre intitulé Psaumes :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit à mon '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Assieds‑toi à la place d’importance, à mon côté droit.
  '43':
  - type: text
    content: Reste là jusqu’à ce que je mette tes ennemis sous tes pieds.
  - type: text
    content: Tu reposeras tes pieds sur eux.
  '44':
  - type: text
    content: 'Alors David l’appelle '
  - type: text
    content: Seigneur
  - type: text
    content: '. Alors, comment peut‑il être aussi le '
  - type: text
    content: fils de David
  - type: text
    content: '  ?'
  '45':
  - type: text
    content: 'Tous les gens écoutaient. Jésus a ensuite dit à ses '
  - type: text
    content: disciples
  - type: text
    content: ' ceci :'
  '46':
  - type: text
    content: 'Attention, ne faites pas la même chose que les enseignants de la loi de Dieu. Ils aiment porter des vêtements longs pour montrer combien ils sont importants. Ils aiment que les gens leur parlent en face de beaucoup de gens, comme à une personne importante. Ils aiment avoir les meilleures places aux réunions. Ils aiment se mettre sur les premiers sièges pendant des fêtes. '
  '47':
  - type: text
    content: Ils poussent des femmes dont les maris sont morts à leur fournir de l’argent. Ils les utilisent pour eux‑mêmes. Ils prient en face de beaucoup de gens pendant une longue période. Cela amène les gens à penser qu’ils sont bons. Parce qu’ils font ces choses, Dieu punira ces gens beaucoup. Ce sera pire pour eux que pour les personnes qui n’avaient pas fait ces choses.
  '5':
  - type: text
    content: 'Ils ont parlé les uns aux autres au sujet de sa question. On pourrait dire que Dieu a donné à Jean son pouvoir. Mais si nous disons cela, Jésus nous dira : Alors pourquoi n’avez‑vous pas cru en lui ? '
  '6':
  - type: text
    content: 'Ou nous pourrions dire que quelqu’un d’autre lui a donné ce pouvoir. Alors, il y a risque que tous les gens jettent des pierres sur nous pour nous tuer. Après tout, ils sont sûrs que Jean était un '
  - type: text
    content: prophète
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Alors ils ont répondu : Nous ne savons pas qui a donné à Jean le pouvoir de baptiser.'
  '8':
  - type: text
    content: 'Jésus a répondu : Alors, je ne vous dirai pas non plus qui m’a donné le pouvoir de faire ces choses.'
  - type: heading
    content: Jésus raconte une histoire des agriculteurs
  '9':
  - type: text
    content: 'Alors Jésus a commencé à raconter cette histoire au peuple dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu : Un homme a planté une '
  - type: text
    content: vigne
  - type: text
    content: ' dans son champ. Il a laissé certains agriculteurs prendre soin des plantes ('
  - type: text
    content: vignes
  - type: text
    content: ). Puis il est parti dans un autre pays. Il est resté là‑bas pendant une longue période.
