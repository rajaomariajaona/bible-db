document_id: 3JN.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: La troisième lettre de Jean
  - type: text
    content: 'Cette lettre vient de moi, l’ancien. Je t’écris, mon ami Gaïus. Je t’aime parce que nous obéissons au vrai message de Dieu. '
  '10':
  - type: text
    content: Ainsi, quand j’arriverai là moi‑même, j’en parlerai aux croyants. Je vais leur parler clairement de mauvaises choses que Diotrèphe fait. Il dit à d’autres personnes de mauvaises choses sur nous. Ces choses ne sont pas vraies. Même cela ne lui suffit pas. Lui‑même refuse de recevoir les croyants en visite. Puis il arrête toute autre personne qui souhaite recevoir ces visiteurs. Si quelqu’un essaie de le faire, Diotrèphe les chasse du groupe des croyants.
  - type: heading
    content: Copie ce que les bonnes personnes font
  '11':
  - type: text
    content: Mon ami, ne copie pas ce que font les mauvaises personnes. Mais, tu dois copier les bonnes choses que les gens font. La personne qui fait de bonnes choses montre qu’elle appartient à Dieu. Mais toute personne qui fait de mauvaises choses ne connaît pas Dieu.
  '12':
  - type: text
    content: Tous les croyants disent que Démétrius est une bonne personne. Il obéit au vrai message de Dieu. Cela montre également clairement qu’il est une bonne personne. Nous disons aussi la même chose de lui. Tu sais très bien que ce que nous disons de lui, est vrai.
  - type: heading
    content: Jean termine sa lettre
  '13':
  - type: text
    content: 'Je voudrais te dire beaucoup plus de choses. Mais je ne veux pas les écrire dans une lettre. '
  '14':
  - type: text
    content: Au contraire, j’espère venir te rendre visite bientôt. Ensuite, je te verrai et nous pourrons parler ensemble.
  '15':
  - type: text
    content: Je prie que Dieu te donne la paix. Tous les amis chrétiens ici te disent bonjour. Dis bonjour pour moi à tous mes amis là‑bas, un par un.
  '2':
  - type: text
    content: 'Mon ami, je prie pour que Dieu t’aide à bien vivre. Je sais que tu es bien dans ton '
  - type: text
    content: esprit
  - type: text
    content: '. Je prie pour que ton corps se porte également bien. '
  '3':
  - type: text
    content: 'J’étais très heureux quand j’ai entendu tes nouvelles. Des amis chrétiens sont venus ici pour me parler de toi. Ils ont dit que tu vis bien. C’est de cette façon que le vrai message de Dieu nous dit de vivre. '
  '4':
  - type: text
    content: Je suis heureux quand j’entends que mes enfants vivent comme ça. Quand ils obéissent au vrai message de Dieu, cela me rend très heureux.
  - type: heading
    content: Continue d’aider les gens
  '5':
  - type: text
    content: 'Mon ami, tu fais beaucoup de choses pour aider les autres croyants. Tu les aides même lorsqu’ils te sont étrangers. Cela montre que tu sers bien Dieu. '
  '6':
  - type: text
    content: 'Ces hommes ont parlé au groupe des croyants ici de ton amour. Continue de les aider lors de leurs visites. Donne‑leur les choses dont ils ont besoin pour continuer leur voyage. Cela rendra Dieu heureux. '
  '7':
  - type: text
    content: Ils voyagent à différents endroits pour parler aux gens de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Ils n’acceptent aucun cadeau de ceux qui ne sont pas chrétiens.
  '8':
  - type: text
    content: 'C’est pourquoi nous, les chrétiens, nous devons les aider avec les choses dont ils ont besoin. De cette façon, nous travaillerons ensemble avec eux lorsqu’ils diront aux gens le vrai message sur '
  - type: text
    content: Christ
  - type: text
    content: .
  - type: heading
    content: Diotrèphe cause des problèmes
  '9':
  - type: text
    content: 'J’ai déjà écrit quelque chose au groupe des croyants là‑bas. Mais Diotrèphe refuse d’accepter notre autorité. Il veut vraiment être le seul responsable parmi eux. '
