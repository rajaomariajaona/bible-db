document_id: ACT.15,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 15
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul et Barnabas vont à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quelques hommes sont venus de Judée à Antioche. Et ils ont commencé à enseigner ces croyants là. Ils disaient : Dieu ne peut pas vous sauver à moins que quelqu’un puisse vous '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: '. Ceci est dans la loi que Dieu avait donnée à Moïse. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dieu nous a montré quoi faire. Ne faisons pas fâcher Dieu contre nous. Nous ne comprenons pas pourquoi vous voulez maintenant que nous fassions quelque chose de différent. Vous causerez des problèmes aux étrangers ou non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui croient au message de Dieu. Toutes ces mêmes lois étaient trop difficiles pour nous et pour que nos ancêtres y obéissent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Cela ne devrait pas être ainsi pour ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Nous sommes des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Et nous avons cru au message de Dieu et Jésus nous a sauvés. Jésus a fait ceci, parce qu’il était aimable avec nous. Et il sauve de la même manière ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Barnabas et Paul parlaient. Alors tous les gens étaient en silence. Ils les écoutaient. Barnabas et Paul disaient : Dieu a travaillé avec nous. Et il a fait beaucoup de choses puissantes pour ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Alors ils ont dit au groupe tout au sujet de ces choses puissantes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Quand ils ont fini de parler, Jacques a parlé au groupe : Écoutez‑moi, mes amis ! Il a dit : '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Simon Pierre nous a juste expliqué ce qui s’était produit d’abord. Il a montré comment Dieu a aimé les étrangers ou non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Dieu a choisi un groupe de personnes parmi les étrangers ou non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' pour lui‑même. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ces paroles que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' avaient écrites, conviennent complètement avec ceci. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit :'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Plus tard, je retournerai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens ont détruit le Royaume de David, mais je le rétablirai encore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le rendrai fort encore.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'D’autres personnes dans le monde rechercheront alors le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En '
    - type: usfm
      marker: w
      children:
      - type: text
        text: outre
    - type: text
      text: ', les étrangers ou non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui invoquent mon nom me rechercheront.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui fait toutes ces choses, dit cela.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jacques a alors encore parlé. Il a dit : Voici ce que je pense. Je pense que nous devrions faire ceci : Beaucoup qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' obéissent maintenant à Dieu. Nous ne devrions pas leur causer d’ennuis et nous ne devrions pas rendre cela difficile. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Paul et Barnabas discutaient pendant longtemps avec ces hommes à ce sujet. Ainsi les croyants d’Antioche ont dit : Laissez Paul, Barnabas et d’autres croyants aller à Jérusalem. Ils sont allés rencontrer les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' là. C’était pour leur parler de la circoncision des croyants non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Au lieu de cela, nous devrions leur écrire une lettre. Nous devrions leur dire : Il peut arriver que quelqu’un tue un animal. Il peut aussi arriver qu’il offre à son dieu. Alors, ne mangez pas cette viande. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit qu’il n’est pas bon pour vous d’en manger. En plus, ne couchez pas avec quelqu’un qui n’est pas votre épouse ou mari. Quelqu’un peut attacher une corde autour du cou d’un animal pour le tuer. Ne mangez pas cette viande. Le sang de l’animal est resté dans la viande. Ne mangez pas de sang.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Je dis ceci parce que, pendant beaucoup d’années, quelqu’un a lu la loi de Dieu dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: '. A chaque jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ', dans chaque ville, quelqu’un enseigne au peuple le message de Moïse.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les croyants à Jérusalem écrivent une lettre aux étrangers ou non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Puis les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ', toute l’Église et leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' ont décidé de choisir quelques hommes. Ils les ont choisis de leur groupe. Ces hommes iront à Antioche avec Paul et Barnabas. Ils ont choisi Silas et Judas, qui s’appelait également Barsabbas. Chacun pensait de bonnes choses sur ces 2 hommes.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils ont envoyé cette lettre à Antioche avec Judas, Silas, Barnabas et Paul :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nous, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ', tous les autres croyants et leurs chefs vous disons bonjour. Nous disons bonjour à tous ceux qui habitent à Antioche, en Syrie et Cilicie. Nous avons écrit cette lettre à tous nos frères croyants non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' de là.'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nous avons entendu que quelques hommes de notre groupe ont confondu vos pensées. Les choses qu’ils ont dites, n’étaient pas exactes. Ainsi vous n’étiez pas heureux de cela. Mais ils n’ont pas eu notre pouvoir pour vous dire ces choses. '
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ainsi, nous nous sommes tous rencontrés ensemble et nous avons convenu au sujet de ces choses. Nous avons choisi quelques hommes pour vous apporter ce message. Et ils voyageront avec nos bons amis Barnabas et Paul. '
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ces 2 hommes, Barnabas et Paul travaillaient pour le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. A cause de cela, d’autres gens les ont presque tués. '
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ainsi, nous vous envoyons Judas et Silas. Et ils diront les mêmes choses que nous avons écrites dans cette lettre. '
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nous avons été d’accord avec le Saint‑Esprit sur ces règles. Nous ne voulons pas vous causer de problèmes. Ainsi ce sont les seules choses que nous voulons que vous fassiez. '
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Vous ne devrez pas manger de la viande des animaux que les gens ont tués comme offrandes à leurs dieux. Ne mangez pas la nourriture que les gens ont offerte aux idoles. Ne mangez pas du sang qui s’y trouve. Ne mangez pas les animaux que les gens ont étranglés. Ne couchez pas avec quelqu’un qui n’est pas votre femme ou votre mari. Si vous ne faites aucune de ces choses, vous ferez bien. Au revoir.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les chrétiens d’Antioche ont envoyé Paul et Barnabas à Jérusalem. Ils ont voyagé par la Phénicie et la Samarie. Et ils parlaient aux croyants dans cette partie du pays. Ils disaient : Les gens qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' obéissent également à Dieu. Ils étaient tous très heureux d’entendre ces nouvelles. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ainsi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' et d’autres croyants ont envoyé ces 4 hommes à Antioche. Quand ils sont arrivés là, ils ont dit aux croyants : Venez et réunissons‑nous ensemble. Et quand ils se sont rencontrés ensemble, Silas et Judas leur ont donné la lettre. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Les croyants d’Antioche étaient très heureux quand ils ont lu la lettre. Ils ont dit : Ce message nous aide à obéir à Dieu.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Judas et Silas étaient les 2 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: '. Ils disaient aux croyants le message de Dieu à Antioche. Ils leur ont parlé pendant longtemps. Les paroles de Judas et Silas ont encouragé les gens. Les mêmes paroles ont aussi fortifié les gens. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ils sont restés à Antioche pendant un certain temps. Alors les frères d’Antioche ont envoyé Judas et Silas de nouveau à Jérusalem. Les croyants leur ont dit des paroles aimables comme ils quittaient. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '(Mais Silas a décidé de rester là.) '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Paul et Barnabas sont restés à Antioche pendant longtemps. Et ainsi avec beaucoup d’autres croyants, ils disaient aux gens le message au sujet de Jésus. Ils enseignaient aussi le peuple plus au sujet de Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul et Barnabas se séparent
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Après un certain temps, Paul a dit à Barnabas : Retournons rendre visite aux croyants dans toutes ces différentes villes. Nous pouvons aller à tous les endroits où nous avons dit la Parole de Jésus aux gens. Nous pouvons voir comment ils sont. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Barnabas a voulu prendre Jean Marc avec lui. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Mais Paul a dit à Barnabas : Jean Marc nous avait abandonnés en Pamphylie. Il n’est pas resté avec nous jusqu’à la fin de notre travail. Donc, ce n’est pas bien qu’il nous accompagne.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Paul et Barnabas ont discuté s’ils devraient prendre Jean Marc avec eux. Ils ne se sont pas entendus, ainsi ils sont allés dans différentes directions. Barnabas a pris Jean Marc avec lui et il a navigué vers Chypre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quand Paul et Barnabas sont arrivés à Jérusalem, ils ont rencontré des chrétiens. Et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ', tous les croyants et leurs chefs étaient heureux de les voir. Paul et Barnabas leur ont dit tout au sujet de la façon dont Dieu avait travaillé à côté d’eux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin de la discussion sur la circoncision des non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Et Paul a choisi Silas pour aller avec lui.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Les croyants d’Antioche ont demandé à Dieu de bien garder Paul et Silas. '
  '41':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Ils ont voyagé ensemble par la Syrie et Cilicie. Et Paul enseignait les croyants dans ces parties du pays. Il les fortifiait dans ce qu’ils ont cru en Jésus.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Certains de ceux qui ont cru en Jésus faisaient aussi partie d’un groupe des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: '. Ils se sont levés et ont dit : Nous devons '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: ' les étrangers ou non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' quand ils deviennent des croyants. Ils doivent également obéir à la loi que Dieu a donnée à Moïse.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ainsi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' et les chefs des croyants se sont réunis pour parler de ce problème.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Pierre parle aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' et aux chefs des croyants à Jérusalem'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils ont parlé pendant longtemps. Après, Pierre s’est levé. Il a dit : Frères, vous savez qu’il y a longtemps, Dieu m’a choisi parmi ce groupe. Il a voulu que j’enseigne la Bonne Nouvelle de Jésus à ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Dieu a voulu qu’ils entendent le message et croient en Jésus.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dieu sait ce que les gens croient. Il a donné son Saint‑Esprit à ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il les a envoyés comme il nous a envoyés. Ainsi il a accepté ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Et il nous montrait cela. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il n’a vu aucune différence entre eux et nous. Il les a rendus justes avec lui, parce qu’ils ont cru en lui. '
