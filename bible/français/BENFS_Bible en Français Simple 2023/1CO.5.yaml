document_id: 1CO.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Renvoyez la mauvaise personne loin de vous
  - type: text
    content: 'Nous avons entendu de mauvaises nouvelles sur ce qui se passe parmi vous. Certains d’entre vous ont de mauvaises relations sexuelles. Nous avons entendu qu’un homme a même des relations sexuelles avec la femme de son propre père ! Même les gens qui ne connaissent pas Dieu ne font pas de choses aussi mauvaises que ça ! '
  '10':
  - type: text
    content: Mais je ne parlais pas de gens qui ne connaissent pas Dieu. Ces gens ont de mauvaises relations sexuelles. Ils veulent que beaucoup de choses leur plaisent. Ils trompent les gens et les volent. Ils adorent les idoles. Vous ne pouviez pas vous tenir à l’écart de tout le monde comme ça, à moins de quitter ce monde !
  '11':
  - type: text
    content: 'Maintenant, je vous dis ceci : Je parlais de gens qui disent qu’ils sont croyants. S’ils disent cela, mais qu’ils ont des relations sexuelles d’une mauvaise manière, ne soyez pas amis avec eux. C’est pareil s’ils veulent beaucoup de choses pour eux. Ils peuvent '
  - type: text
    content: adorer
  - type: text
    content: ' des idoles. Ils peuvent insulter les gens. Ils peuvent souvent s’enivrer. Ils peuvent tromper les gens et les voler. Si un membre de votre groupe fait des choses comme ça, n’acceptez même pas de manger un repas avec lui.'
  '12':
  - type: text
    content: 'Il n’est pas juste pour moi de décider sur des personnes qui n’appartiennent pas au groupe religieux. Dieu jugera ces gens. Mais vous devez décider ce qui convient aux personnes qui appartiennent à votre groupe. Faites ce que dit la Bible :'
  - type: text
    content: Enlevez la mauvaise personne parmi vous.
  '2':
  - type: text
    content: Mais vous êtes toujours pleins d’orgueil ! Au lieu de cela, vous devriez être très tristes et avoir honte. Vous devriez renvoyer cet homme de votre groupe.
  '3':
  - type: text
    content: 'Mon corps n’est pas là avec vous, mais mon '
  - type: text
    content: esprit
  - type: text
    content: ' est avec vous. C’est comme si je suis présent avec vous. Donc, j’ai déjà décidé sur cet homme. C’est ainsi que vous devez le punir pour ce qu’il a fait. '
  '4':
  - type: text
    content: 'Vous avez le pouvoir du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus pour faire cela. Lorsque vous vous réunissez en groupe, mon '
  - type: text
    content: esprit
  - type: text
    content: ' est avec vous. La puissance de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus sera également avec vous. '
  '5':
  - type: text
    content: Lorsque vous vous rencontrerez, mettez cet homme sous le pouvoir de Satan. Satan détruira alors le corps de cet homme. Alors Dieu peut sauver l’
  - type: text
    content: esprit
  - type: text
    content: ' de l’homme le jour du retour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus.'
  '6':
  - type: text
    content: 'Vous ne devez pas vous glorifier. Pensez à ce que fait la levure dans le pain. Une très petite quantité de levure change toute la miche de pain. '
  '7':
  - type: text
    content: Cette levure dans la pâte est comme une personne qui fait de mauvaises choses. Vous devez retirer cette vieille levure d’entre vous. Vous serez alors comme une nouvelle miche de pain. Vous êtes vraiment comme un pain sans levure. Vous êtes purs, parce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nous. Il est comme l’agneau que les '
  - type: text
    content: Israélites
  - type: text
    content: ' ont tué pour leur repas de '
  - type: text
    content: Pâque
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'En conséquence, nous pouvons avoir notre propre fête de '
  - type: text
    content: Pâque
  - type: text
    content: '. Nous devons enlever de nous tout ce qui est mauvais. C’est comme si les '
  - type: text
    content: Israélites
  - type: text
    content: ' avaient enlevé toute la vieille levure de leurs maisons. Alors, nous vivons d’une manière pure et honnête. C’est comme si nous mangions du pain sans levure.'
  '9':
  - type: text
    content: 'Je vous ai déjà écrit une lettre. Je vous ai dit que vous ne devez pas être amis avec des personnes qui ont des relations sexuelles de mauvaise manière. '
