document_id: 1CO.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Renvoyez la mauvaise personne loin de vous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous avons entendu de mauvaises nouvelles sur ce qui se passe parmi vous. Certains d’entre vous ont de mauvaises relations sexuelles. Nous avons entendu qu’un homme a même des relations sexuelles avec la femme de son propre père ! Même les gens qui ne connaissent pas Dieu ne font pas de choses aussi mauvaises que ça ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais vous êtes toujours pleins d’orgueil ! Au lieu de cela, vous devriez être très tristes et avoir honte. Vous devriez renvoyer cet homme de votre groupe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mon corps n’est pas là avec vous, mais mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' est avec vous. C’est comme si je suis présent avec vous. Donc, j’ai déjà décidé sur cet homme. C’est ainsi que vous devez le punir pour ce qu’il a fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous avez le pouvoir du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus pour faire cela. Lorsque vous vous réunissez en groupe, mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' est avec vous. La puissance de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus sera également avec vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lorsque vous vous rencontrerez, mettez cet homme sous le pouvoir de Satan. Satan détruira alors le corps de cet homme. Alors Dieu peut sauver l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' de l’homme le jour du retour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous ne devez pas vous glorifier. Pensez à ce que fait la levure dans le pain. Une très petite quantité de levure change toute la miche de pain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cette levure dans la pâte est comme une personne qui fait de mauvaises choses. Vous devez retirer cette vieille levure d’entre vous. Vous serez alors comme une nouvelle miche de pain. Vous êtes vraiment comme un pain sans levure. Vous êtes purs, parce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour nous. Il est comme l’agneau que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israélites
  - type: text
    text: ' ont tué pour leur repas de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En conséquence, nous pouvons avoir notre propre fête de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. Nous devons enlever de nous tout ce qui est mauvais. C’est comme si les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israélites
  - type: text
    text: ' avaient enlevé toute la vieille levure de leurs maisons. Alors, nous vivons d’une manière pure et honnête. C’est comme si nous mangions du pain sans levure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je vous ai déjà écrit une lettre. Je vous ai dit que vous ne devez pas être amis avec des personnes qui ont des relations sexuelles de mauvaise manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais je ne parlais pas de gens qui ne connaissent pas Dieu. Ces gens ont de mauvaises relations sexuelles. Ils veulent que beaucoup de choses leur plaisent. Ils trompent les gens et les volent. Ils adorent les idoles. Vous ne pouviez pas vous tenir à l’écart de tout le monde comme ça, à moins de quitter ce monde !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant, je vous dis ceci : Je parlais de gens qui disent qu’ils sont croyants. S’ils disent cela, mais qu’ils ont des relations sexuelles d’une mauvaise manière, ne soyez pas amis avec eux. C’est pareil s’ils veulent beaucoup de choses pour eux. Ils peuvent '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' des idoles. Ils peuvent insulter les gens. Ils peuvent souvent s’enivrer. Ils peuvent tromper les gens et les voler. Si un membre de votre groupe fait des choses comme ça, n’acceptez même pas de manger un repas avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'Il n’est pas juste pour moi de décider sur des personnes qui n’appartiennent pas au groupe religieux. Dieu jugera ces gens. Mais vous devez décider ce qui convient aux personnes qui appartiennent à votre groupe. Faites ce que dit la Bible :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Enlevez la mauvaise personne parmi vous.
