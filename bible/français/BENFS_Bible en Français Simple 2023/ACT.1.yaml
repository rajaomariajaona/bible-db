document_id: ACT.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Jésus dit aux apôtres que Dieu leur enverra le Saint‑Esprit
  - type: text
    content: 'Très cher Théophile, Jésus a commencé à faire beaucoup de choses. Il a aussi commencé à enseigner beaucoup de choses. J’ai parlé de toutes ces choses dans mon premier livre. '
  '10':
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' regardaient toujours attentivement au '
  - type: text
    content: ciel
  - type: text
    content: '. 2 hommes sont apparus brusquement. Ces hommes portaient des vêtements blancs. Ils se sont tenus près des '
  - type: text
    content: apôtres
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ils ont alors dit aux '
  - type: text
    content: apôtres
  - type: text
    content: '  : Vous hommes de Galilée, vous ne devez pas vous tenir toujours debout ici. Vous ne devez pas continuer à regarder au '
  - type: text
    content: ciel
  - type: text
    content: '. Dieu a pris Jésus au '
  - type: text
    content: ciel
  - type: text
    content: '. Vous avez vu comment Jésus est allé au '
  - type: text
    content: ciel
  - type: text
    content: . Un jour, il retournera de la même manière.
  - type: heading
    content: Les apôtres choisissent Matthias pour être un apôtre
  '12':
  - type: text
    content: 'Alors les '
  - type: text
    content: apôtres
  - type: text
    content: ' sont retournés à Jérusalem. Ils venaient de la colline appelée la '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: '. La '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: ' était à environ un kilomètre de la ville. '
  '13':
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' sont arrivés à Jérusalem. Ils sont allés dans la chambre haute. C’est là qu’ils restaient. Les noms des '
  - type: text
    content: apôtres
  - type: text
    content: ' étaient Pierre, Jean, Jacques et André, Philippe et Thomas, Barthélemy et Matthieu. Les autres '
  - type: text
    content: apôtres
  - type: text
    content: ' étaient aussi là. Il y avait : Jacques, fils d’Alphée, Simon le '
  - type: text
    content: Zélote
  - type: text
    content: ' et Jude, fils de Jacques. '
  '14':
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' se réunissaient souvent ensemble dans un groupe pour prier. Ils priaient avec Marie, mère de Jésus, d’autres femmes et les frères de Jésus.'
  '15':
  - type: text
    content: 'Quelques jours après cela, environ 120 personnes se sont réunies ensemble. Ces gens ont tous cru en Jésus. Pierre s’est levé et il leur a parlé. '
  '16':
  - type: text
    content: 'Il a dit : Mes frères, le Saint‑Esprit a parlé au roi David, il y a longtemps. Il a écrit au sujet des choses que Judas fera. Ces choses devaient se réaliser. Et maintenant, elles se réalisent. Judas a montré aux ennemis comment attraper Jésus. Judas les a aidés à le faire. '
  '17':
  - type: text
    content: Judas était dans notre groupe, parce que Jésus l’avait choisi. Il avait choisi Judas pour collaborer avec nous.
  '18':
  - type: text
    content: 'Les '
  - type: text
    content: prêtres
  - type: text
    content: ' ont donné à Judas une certaine somme d’argent. C’était parce que Judas les avait aidés. Judas a acheté un champ avec cet argent. Mais il est tombé dans ce champ et il est mort. Son corps s’est coupé au milieu. Les organes internes de son corps sont sortis à l’extérieur. '
  '19':
  - type: text
    content: Tous les habitants de Jérusalem ont entendu parler de la mort de Judas. Ainsi le peuple a appelé ce champ Hakeldama en leur propre langue. Hakeldama signifie le champ du sang.
  '2':
  - type: text
    content: 'Jésus a parlé aux '
  - type: text
    content: apôtres
  - type: text
    content: ' qu’il avait choisis. Il leur a dit ce qu’il voulait qu’ils fassent. Il leur avait dit cela par le Saint‑Esprit. Ensuite, Jésus est monté au '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Pierre a continué de parler : Le roi David a écrit dans le livre des Psaumes ceci :'
  - type: text
    content: Ainsi la maison où il avait été, sera vide.
  - type: text
    content: Personne n’y vivra.
  - type: text
    content: 'Le roi David a également écrit dans le même livre :'
  - type: text
    content: Ainsi, une autre personne va effectuer son travail.
  '21':
  - type: text
    content: 'Pierre a dit : Pour cette raison, nous devons choisir un autre homme. Un homme qui était avec nous dès le commencement. Un homme qui était dans notre groupe tout le temps que Jésus était avec nous. '
  '22':
  - type: text
    content: 'Un homme qui était avec nous quand Jean baptisait des gens. Un homme qui restait avec nous quand Jésus travaillait. Celui qui était avec nous quand Jésus est allé au '
  - type: text
    content: ciel
  - type: text
    content: '. Un homme qui peut dire au peuple : Je sais que notre maître est mort. Je l’ai vu après sa résurrection.'
  '23':
  - type: text
    content: 'Ainsi le groupe a présenté les noms de 2 hommes. Un de ces hommes était Joseph. Il avait 2 autres noms. Les gens l’appelaient également Barsabbas. Parfois les gens l’appelaient aussi Justus. L’autre homme s’appelait Matthias. '
  '24':
  - type: text
    content: 'Puis le groupe entier a prié comme ceci : '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu connais ce que tout le monde pense vraiment. Montre‑nous lequel de ces hommes tu as choisi. Lequel de ces 2 hommes veux‑tu qu’il soit un '
  - type: text
    content: apôtre
  - type: text
    content: '  ? '
  '25':
  - type: text
    content: Judas a laissé son travail d’
  - type: text
    content: apôtre
  - type: text
    content: ', il est allé à sa place. '
  '26':
  - type: text
    content: 'Ils ont fait un choix. Et la chance est tombée sur Matthias. Ainsi Matthias a remplacé Judas. Il est devenu le douzième '
  - type: text
    content: apôtre
  - type: text
    content: . Il a été ajouté aux 11 autres hommes.
  '3':
  - type: text
    content: 'Jésus a souffert et il est mort. Après cela, il s’est montré à ses '
  - type: text
    content: apôtres
  - type: text
    content: '. Il s’est montré de plusieurs manières. Ceci a prouvé qu’il était vivant. Jésus est apparu à ses '
  - type: text
    content: apôtres
  - type: text
    content: ' plusieurs fois. C’était pendant 40 jours. Il leur parlait du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: .
  '4':
  - type: text
    content: 'Un jour, Jésus était avec ses '
  - type: text
    content: apôtres
  - type: text
    content: '. Il leur a dit ceci : Ne quittez pas Jérusalem. Attendez le Saint‑Esprit dont je vous ai parlé. Mon père a promis de vous l’offrir. '
  '5':
  - type: text
    content: 'Comme vous le savez, Jean baptisait les gens avec de l’eau. Mais vous recevrez le '
  - type: text
    content: baptême du Saint‑Esprit
  - type: text
    content: ' dans quelques jours.'
  - type: heading
    content: Dieu prend Jésus au ciel
  '6':
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' de Jésus étaient tous ensemble. Ils lui ont demandé ceci : '
  - type: text
    content: Seigneur
  - type: text
    content: ', vas‑tu maintenant rétablir le Royaume d’Israël ?'
  '7':
  - type: text
    content: 'Jésus a répondu : C’est mon père qui a fixé ces temps. Ils sont sous son contrôle. Vous ne pouvez pas les savoir. '
  '8':
  - type: text
    content: Mais le Saint‑Esprit viendra. Il vous rendra puissants. Alors vous pourrez parler de moi à Jérusalem. Vous parlerez de moi aussi dans toute la Judée et la Samarie. Vous parlerez aussi de moi dans tous les autres pays.
  '9':
  - type: text
    content: 'Jésus a fini de parler à ses '
  - type: text
    content: apôtres
  - type: text
    content: '. Dieu l’a pris dans sa maison (au ciel). Les '
  - type: text
    content: apôtres
  - type: text
    content: ' voyaient Jésus aller. Alors un nuage l’a caché. Ainsi, les '
  - type: text
    content: apôtres
  - type: text
    content: ' ne pouvaient plus voir Jésus. '
