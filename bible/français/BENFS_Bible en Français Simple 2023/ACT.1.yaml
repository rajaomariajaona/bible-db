document_id: ACT.1,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 1
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' que Dieu leur enverra le Saint‑Esprit'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Très cher Théophile, Jésus a commencé à faire beaucoup de choses. Il a aussi commencé à enseigner beaucoup de choses. J’ai parlé de toutes ces choses dans mon premier livre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' regardaient toujours attentivement au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. 2 hommes sont apparus brusquement. Ces hommes portaient des vêtements blancs. Ils se sont tenus près des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont alors dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '  : Vous hommes de Galilée, vous ne devez pas vous tenir toujours debout ici. Vous ne devez pas continuer à regarder au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Dieu a pris Jésus au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Vous avez vu comment Jésus est allé au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Un jour, il retournera de la même manière.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' choisissent Matthias pour être un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' sont retournés à Jérusalem. Ils venaient de la colline appelée la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: montagne des Oliviers
    - type: text
      text: '. La '
    - type: usfm
      marker: w
      children:
      - type: text
        text: montagne des Oliviers
    - type: text
      text: ' était à environ un kilomètre de la ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' sont arrivés à Jérusalem. Ils sont allés dans la chambre haute. C’est là qu’ils restaient. Les noms des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' étaient Pierre, Jean, Jacques et André, Philippe et Thomas, Barthélemy et Matthieu. Les autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' étaient aussi là. Il y avait : Jacques, fils d’Alphée, Simon le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Zélote
    - type: text
      text: ' et Jude, fils de Jacques. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' se réunissaient souvent ensemble dans un groupe pour prier. Ils priaient avec Marie, mère de Jésus, d’autres femmes et les frères de Jésus.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques jours après cela, environ 120 personnes se sont réunies ensemble. Ces gens ont tous cru en Jésus. Pierre s’est levé et il leur a parlé. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit : Mes frères, le Saint‑Esprit a parlé au roi David, il y a longtemps. Il a écrit au sujet des choses que Judas fera. Ces choses devaient se réaliser. Et maintenant, elles se réalisent. Judas a montré aux ennemis comment attraper Jésus. Judas les a aidés à le faire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Judas était dans notre groupe, parce que Jésus l’avait choisi. Il avait choisi Judas pour collaborer avec nous.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont donné à Judas une certaine somme d’argent. C’était parce que Judas les avait aidés. Judas a acheté un champ avec cet argent. Mais il est tombé dans ce champ et il est mort. Son corps s’est coupé au milieu. Les organes internes de son corps sont sortis à l’extérieur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous les habitants de Jérusalem ont entendu parler de la mort de Judas. Ainsi le peuple a appelé ce champ Hakeldama en leur propre langue. Hakeldama signifie le champ du sang.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a parlé aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' qu’il avait choisis. Il leur a dit ce qu’il voulait qu’ils fassent. Il leur avait dit cela par le Saint‑Esprit. Ensuite, Jésus est monté au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre a continué de parler : Le roi David a écrit dans le livre des Psaumes ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi la maison où il avait été, sera vide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne n’y vivra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le roi David a également écrit dans le même livre :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi, une autre personne va effectuer son travail.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre a dit : Pour cette raison, nous devons choisir un autre homme. Un homme qui était avec nous dès le commencement. Un homme qui était dans notre groupe tout le temps que Jésus était avec nous. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un homme qui était avec nous quand Jean baptisait des gens. Un homme qui restait avec nous quand Jésus travaillait. Celui qui était avec nous quand Jésus est allé au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Un homme qui peut dire au peuple : Je sais que notre maître est mort. Je l’ai vu après sa résurrection.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi le groupe a présenté les noms de 2 hommes. Un de ces hommes était Joseph. Il avait 2 autres noms. Les gens l’appelaient également Barsabbas. Parfois les gens l’appelaient aussi Justus. L’autre homme s’appelait Matthias. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le groupe entier a prié comme ceci : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tu connais ce que tout le monde pense vraiment. Montre‑nous lequel de ces hommes tu as choisi. Lequel de ces 2 hommes veux‑tu qu’il soit un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: '  ? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Judas a laissé son travail d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: ', il est allé à sa place. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont fait un choix. Et la chance est tombée sur Matthias. Ainsi Matthias a remplacé Judas. Il est devenu le douzième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: . Il a été ajouté aux 11 autres hommes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a souffert et il est mort. Après cela, il s’est montré à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Il s’est montré de plusieurs manières. Ceci a prouvé qu’il était vivant. Jésus est apparu à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' plusieurs fois. C’était pendant 40 jours. Il leur parlait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jésus était avec ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Il leur a dit ceci : Ne quittez pas Jérusalem. Attendez le Saint‑Esprit dont je vous ai parlé. Mon père a promis de vous l’offrir. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme vous le savez, Jean baptisait les gens avec de l’eau. Mais vous recevrez le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême du Saint‑Esprit
    - type: text
      text: ' dans quelques jours.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Dieu prend Jésus au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' de Jésus étaient tous ensemble. Ils lui ont demandé ceci : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', vas‑tu maintenant rétablir le Royaume d’Israël ?'
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jésus a répondu : C’est mon père qui a fixé ces temps. Ils sont sous son contrôle. Vous ne pouvez pas les savoir. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mais le Saint‑Esprit viendra. Il vous rendra puissants. Alors vous pourrez parler de moi à Jérusalem. Vous parlerez de moi aussi dans toute la Judée et la Samarie. Vous parlerez aussi de moi dans tous les autres pays.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a fini de parler à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Dieu l’a pris dans sa maison (au ciel). Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' voyaient Jésus aller. Alors un nuage l’a caché. Ainsi, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ne pouvaient plus voir Jésus. '
