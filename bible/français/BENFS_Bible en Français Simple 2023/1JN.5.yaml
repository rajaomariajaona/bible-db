document_id: 1JN.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Croire en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toute personne qui croit que Jésus est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' de Dieu, est devenue enfant de Dieu. Et si nous aimons Dieu, notre Père, nous aimerons aussi ses autres enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Comment savons‑nous que nous aimons vraiment les enfants de Dieu ? Nous le savons quand nous aimons Dieu et nous faisons ce qu’il nous dit de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Parce que, si nous aimons vraiment Dieu, nous obéirons à ses paroles. Et il nous sera facile d’obéir à ce qu’il nous dit de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Parce que nous sommes devenus les enfants de Dieu, nous pouvons vivre d’une bonne façon. Nous pouvons refuser de vivre comme des gens qui appartiennent à ce monde. Nous pouvons gagner contre le monde, parce que nous faisons confiance en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Seuls les gens qui croient que Jésus est le Fils de Dieu peuvent le faire. Il n’y a qu’eux qui peuvent refuser de vivre comme les gens qui appartiennent à ce monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est l’homme que Dieu a envoyé dans le monde. Jean a baptisé Jésus dans l’eau. Quand Jésus est mort, son sang a coulé. Dieu a montré que Jésus est son Fils. Il est venu avec l’eau et le sang. Ce n’était pas seulement avec l’eau du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: baptême
  - type: text
    text: ' de Jésus. C’était aussi avec le sang de sa mort. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu nous montre également que Jésus est le Fils de Dieu. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' dit toujours ce qui est vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il y a donc 3 choses qui nous montrent clairement que Jésus est venu de Dieu : '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ces choses sont le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ', l’eau du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: baptême
  - type: text
    text: ' de Jésus et le sang de sa mort sur la croix. Tout cela nous montre la même chose, que Jésus est venu de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nous croyons aux gens qui nous parlent de choses qu’ils savent. Donc encore plus, nous pouvons croire à ce que Dieu dit. Il nous a dit ce qui est vrai au sujet de son Fils. Nous devons donc croire à son message.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toute personne qui croit en Jésus, le Fils de Dieu, saura que ce que Dieu dit, est vrai. Mais toute personne qui ne croit pas en Dieu, dit que Dieu dit des mensonges. Cette personne ne croit pas au message que Dieu nous a clairement dit au sujet de son Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que Dieu nous a dit : Dieu nous a donné une vie avec lui qui ne finit jamais. Nous recevons cette vie lorsque nous croyons en son Fils, Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi, toute personne qui appartient au Fils a cette vraie vie. Mais toute personne qui n’appartient pas au Fils de Dieu n’a pas cette vraie vie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens ont une vraie vie avec Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je vous ai écrit ces choses, vous qui croyez que Jésus est le Fils de Dieu. Je veux que vous sachiez que vous avez une vraie vie avec Dieu pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De plus, nous pouvons vraiment faire confiance en Dieu pour nous aider lorsque nous nous tournons vers lui. Nous savons qu’il nous entendra. Quand nous demandons tout ce qu’il veut que nous ayons, il nous écoute. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puisque nous le savons, nous savons aussi que Dieu nous donnera les choses que nous demandons. C’est comme si nous avions déjà reçu ces choses de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si vous voyez qu’un autre chrétien fait quelque chose de mal, voici ce que vous devez faire. Si c’est un péché qui ne cause pas la mort, priez que Dieu l’aide. Alors Dieu aidera cette personne à vivre éternellement avec lui. Cela est pour un péché qui ne cause pas la mort. Mais il y a un péché qui cause la mort. Si un autre chrétien fait cela, je ne dis pas que vous devez prier pour que Dieu aide cette personne. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toute mauvaise chose qu’une personne fait est un péché. Mais tous les péchés ne causent pas la mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Toute personne qui est devenue enfant de Dieu ne fait pas de mauvaises choses. Par contre, le Fils de Dieu le protège. Satan ne peut rien lui faire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nous savons que nous appartenons à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nous savons que Satan dirige tous les gens qui appartiennent à ce monde. Nous savons aussi que le Fils de Dieu est venu dans le monde. Il nous a aidés à comprendre ce qui est vrai. Par conséquent, nous connaissons le seul vrai Dieu. Nous sommes unis à ce vrai Dieu, car nous appartenons à son Fils, Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il est le vrai Dieu. Il est celui qui nous donne la vie avec Dieu pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mes petits enfants, veillez à vous tenir loin des idoles.
