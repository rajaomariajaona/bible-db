document_id: 1JN.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Croire en Jésus‑Christ
  - type: text
    content: 'Toute personne qui croit que Jésus est le '
  - type: text
    content: Messie
  - type: text
    content: ' de Dieu, est devenue enfant de Dieu. Et si nous aimons Dieu, notre Père, nous aimerons aussi ses autres enfants. '
  '10':
  - type: text
    content: 'Toute personne qui croit en Jésus, le Fils de Dieu, saura que ce que Dieu dit, est vrai. Mais toute personne qui ne croit pas en Dieu, dit que Dieu dit des mensonges. Cette personne ne croit pas au message que Dieu nous a clairement dit au sujet de son Fils. '
  '11':
  - type: text
    content: 'Voici ce que Dieu nous a dit : Dieu nous a donné une vie avec lui qui ne finit jamais. Nous recevons cette vie lorsque nous croyons en son Fils, Jésus. '
  '12':
  - type: text
    content: Ainsi, toute personne qui appartient au Fils a cette vraie vie. Mais toute personne qui n’appartient pas au Fils de Dieu n’a pas cette vraie vie.
  - type: heading
    content: Les chrétiens ont une vraie vie avec Dieu
  '13':
  - type: text
    content: 'Je vous ai écrit ces choses, vous qui croyez que Jésus est le Fils de Dieu. Je veux que vous sachiez que vous avez une vraie vie avec Dieu pour toujours. '
  '14':
  - type: text
    content: 'De plus, nous pouvons vraiment faire confiance en Dieu pour nous aider lorsque nous nous tournons vers lui. Nous savons qu’il nous entendra. Quand nous demandons tout ce qu’il veut que nous ayons, il nous écoute. '
  '15':
  - type: text
    content: 'Puisque nous le savons, nous savons aussi que Dieu nous donnera les choses que nous demandons. C’est comme si nous avions déjà reçu ces choses de lui. '
  '16':
  - type: text
    content: 'Si vous voyez qu’un autre chrétien fait quelque chose de mal, voici ce que vous devez faire. Si c’est un péché qui ne cause pas la mort, priez que Dieu l’aide. Alors Dieu aidera cette personne à vivre éternellement avec lui. Cela est pour un péché qui ne cause pas la mort. Mais il y a un péché qui cause la mort. Si un autre chrétien fait cela, je ne dis pas que vous devez prier pour que Dieu aide cette personne. '
  '17':
  - type: text
    content: Toute mauvaise chose qu’une personne fait est un péché. Mais tous les péchés ne causent pas la mort.
  '18':
  - type: text
    content: 'Toute personne qui est devenue enfant de Dieu ne fait pas de mauvaises choses. Par contre, le Fils de Dieu le protège. Satan ne peut rien lui faire. '
  '19':
  - type: text
    content: 'Nous savons que nous appartenons à Dieu. '
  '2':
  - type: text
    content: 'Comment savons‑nous que nous aimons vraiment les enfants de Dieu ? Nous le savons quand nous aimons Dieu et nous faisons ce qu’il nous dit de faire. '
  '20':
  - type: text
    content: Nous savons que Satan dirige tous les gens qui appartiennent à ce monde. Nous savons aussi que le Fils de Dieu est venu dans le monde. Il nous a aidés à comprendre ce qui est vrai. Par conséquent, nous connaissons le seul vrai Dieu. Nous sommes unis à ce vrai Dieu, car nous appartenons à son Fils, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Il est le vrai Dieu. Il est celui qui nous donne la vie avec Dieu pour toujours.
  '21':
  - type: text
    content: Mes petits enfants, veillez à vous tenir loin des idoles.
  '3':
  - type: text
    content: 'Parce que, si nous aimons vraiment Dieu, nous obéirons à ses paroles. Et il nous sera facile d’obéir à ce qu’il nous dit de faire. '
  '4':
  - type: text
    content: Parce que nous sommes devenus les enfants de Dieu, nous pouvons vivre d’une bonne façon. Nous pouvons refuser de vivre comme des gens qui appartiennent à ce monde. Nous pouvons gagner contre le monde, parce que nous faisons confiance en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '5':
  - type: text
    content: Seuls les gens qui croient que Jésus est le Fils de Dieu peuvent le faire. Il n’y a qu’eux qui peuvent refuser de vivre comme les gens qui appartiennent à ce monde.
  '6':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est l’homme que Dieu a envoyé dans le monde. Jean a baptisé Jésus dans l’eau. Quand Jésus est mort, son sang a coulé. Dieu a montré que Jésus est son Fils. Il est venu avec l’eau et le sang. Ce n’était pas seulement avec l’eau du '
  - type: text
    content: baptême
  - type: text
    content: ' de Jésus. C’était aussi avec le sang de sa mort. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu nous montre également que Jésus est le Fils de Dieu. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' dit toujours ce qui est vrai. '
  '7':
  - type: text
    content: 'Il y a donc 3 choses qui nous montrent clairement que Jésus est venu de Dieu : '
  '8':
  - type: text
    content: 'Ces choses sont le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ', l’eau du '
  - type: text
    content: baptême
  - type: text
    content: ' de Jésus et le sang de sa mort sur la croix. Tout cela nous montre la même chose, que Jésus est venu de Dieu.'
  '9':
  - type: text
    content: Nous croyons aux gens qui nous parlent de choses qu’ils savent. Donc encore plus, nous pouvons croire à ce que Dieu dit. Il nous a dit ce qui est vrai au sujet de son Fils. Nous devons donc croire à son message.
