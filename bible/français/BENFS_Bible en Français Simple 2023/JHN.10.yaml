document_id: JHN.10
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 10
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’histoire du Berger
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus a dit : Je vous dis la vérité. Un berger garde ses brebis dans un endroit sûr avec un mur autour. Il y a une porte dans ce lieu sûr. Toute autre personne qui pénètre dans ce lieu par un autre chemin, non pas par la porte, n’est pas le berger. Cette personne est mauvaise. Elle vient pour enlever les brebis qui ne sont pas les siennes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le berger entre là par la porte.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La personne qui garde la porte ouvre pour le berger. Les brebis reconnaissent la voix du berger. Il appelle chacune de ses propres brebis par son nom, et il les conduit dehors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fait sortir toutes ses propres brebis dehors, il va devant elles. Et les brebis le suivent, parce qu’elles connaissent sa voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elles ne suivront pas un étranger. Elles fuiront un étranger parce qu’elles ne reconnaissent pas sa voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jésus leur a dit cette histoire qui était comme une image. Mais ils n’ont pas compris ce qu’il leur disait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est comme le bon berger
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Jésus a repris la parole : Je vous dis la vérité. Je suis comme la porte des brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les autres hommes qui venaient aux brebis avant moi, étaient mauvais. Ils voulaient enlever les brebis qui ne leur appartenaient pas. Mais les brebis ne les écoutaient pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je suis comme la porte. Toute personne qui entre par moi, sera en sécurité. Elle entrera et sortira. Et elle trouvera beaucoup de nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui qui vient enlever mes brebis ne vient que pour les tuer. Il ne vient que pour détruire. Je suis venu pour qu’elles puissent vivre. Et donc elles peuvent avoir tout ce dont elles ont besoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je suis comme le bon berger. Le bon berger peut mourir pour sauver ses brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un autre homme peut travailler pour de l’argent en gardant les brebis. Mais les brebis ne lui appartiennent pas. Un homme comme ça n’est pas le berger. Un homme comme ça fuit quand il voit un loup. Le loup vient tuer les brebis. Mais un homme comme ça abandonne les brebis et fuit. Alors, le loup attaque les brebis et les amène à courir dans toutes les directions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cet homme fuit parce que les brebis ne sont pas les siennes. Les brebis ne comptent vraiment pas pour lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je suis comme le bon berger. Je connais mes propres brebis, et elles me connaissent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je les connais de la même manière que mon Père me connaît. Et elles me connaissent de la même manière que je connais le Père. Et je vais mourir au nom de mes brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J’ai d’autres brebis, et je dois les amener aussi. Elles ne font pas partie de ce groupe de brebis. Mais elles vont écouter ma voix, et ainsi toutes les brebis iront à un groupe avec leur berger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le Père m’aime parce que je choisis de mourir. Je peux devenir encore en vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Personne ne me fait mourir. Non, j’ai choisi de mourir moi‑même. J’ai le pouvoir de choisir de mourir. J’ai aussi le pouvoir de devenir à nouveau vivant. Mon père a dit que je dois le faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Encore une fois, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne pouvaient pas se mettre d’accord sur ces choses que Jésus disait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Beaucoup d’entre eux disaient : Il a un démon et il est fou. Vous ne devriez pas l’écouter ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais d’autres personnes ont dit : Un homme avec un démon ne peut pas parler comme ça ! Un démon ne peut pas rendre les gens capables de voir !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne croient pas en Jésus'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C’était le temps pour la fête de la Dédicace à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’était l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: hiver
  - type: text
    text: '. Et Jésus se promenait dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. L’endroit a été appelé le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: portique de Salomon
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' se tenaient autour de lui. Ils lui ont dit : Nous voulons être sûrs de qui tu es. Dis‑nous clairement si tu es le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus a répondu : Je vous l’ai dit, mais vous ne croyez pas. Les choses que je fais par l’autorité de mon Père, vous montrent qui je suis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais vous refusez de croire, parce que vous ne faites pas partie de mes brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mes brebis reconnaissent ma voix. Je les connais, et elles me suivent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je les amène à vivre toujours. Elles ne mourront jamais. Personne ne peut jamais les éloigner de moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mon Père me les a données. Il est plus grand que tout. Personne ne peut jamais prendre mes brebis de la main de mon Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mon Père et moi sommes une seule personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont ramassé de nouveau des pierres pour les jeter sur Jésus. Ils voulaient le tuer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus leur a dit : J’ai fait beaucoup de bonnes choses. Le Père m’a envoyé pour les faire. Vous m’avez vu faire ces bonnes choses. Laquelle de ces bonnes choses vous pousse à jeter des pierres sur moi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' ont répondu : Nous ne voulons pas te tuer avec des pierres en raison de toutes les bonnes choses que tu as faites. Nous voulons te tuer avec des pierres, parce que tu parles contre Dieu. Tu es seulement un homme. Mais tu dis que tu es Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus a répondu : Il est dit dans votre propre loi que Dieu a dit ceci : Vous êtes des dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dieu a appelé le peuple à qui il a parlé des dieux. Et les Écritures sont toujours vraies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Le Père m’a choisi. Et il m’a envoyé dans le monde. Je dis que je suis le Fils de Dieu. Mais vous dites que je parle contre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Si je ne fais pas le travail de mon Père, ne me croyez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Mais si je fais son travail, croyez en ce travail. Même si vous ne me croyez pas, croyez en mon travail. Croyez aux choses que je fais. Ensuite, vous saurez certainement que le Père est en moi. Et vous saurez que je suis dans le Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Encore une fois, les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' ont essayé d’attraper Jésus. Mais il s’est échappé d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus est encore allé de l’autre coté du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jourdain
  - type: text
    text: '. Il est allé à l’endroit où Jean avait baptisé les gens. Et Jésus est resté là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Beaucoup de gens sont venus auprès de lui. Ils se sont dit l’un à l’autre : Jean n’a pas fait de miracles. Mais tout ce que Jean a dit de cet homme était vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Et en ce lieu, beaucoup de gens ont cru en Jésus.
