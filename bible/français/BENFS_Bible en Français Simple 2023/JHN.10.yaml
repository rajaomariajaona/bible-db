document_id: JHN.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: heading
    content: L’histoire du Berger
  - type: text
    content: 'Jésus a dit : Je vous dis la vérité. Un berger garde ses brebis dans un endroit sûr avec un mur autour. Il y a une porte dans ce lieu sûr. Toute autre personne qui pénètre dans ce lieu par un autre chemin, non pas par la porte, n’est pas le berger. Cette personne est mauvaise. Elle vient pour enlever les brebis qui ne sont pas les siennes. '
  '10':
  - type: text
    content: 'Celui qui vient enlever mes brebis ne vient que pour les tuer. Il ne vient que pour détruire. Je suis venu pour qu’elles puissent vivre. Et donc elles peuvent avoir tout ce dont elles ont besoin. '
  '11':
  - type: text
    content: 'Je suis comme le bon berger. Le bon berger peut mourir pour sauver ses brebis. '
  '12':
  - type: text
    content: 'Un autre homme peut travailler pour de l’argent en gardant les brebis. Mais les brebis ne lui appartiennent pas. Un homme comme ça n’est pas le berger. Un homme comme ça fuit quand il voit un loup. Le loup vient tuer les brebis. Mais un homme comme ça abandonne les brebis et fuit. Alors, le loup attaque les brebis et les amène à courir dans toutes les directions. '
  '13':
  - type: text
    content: 'Cet homme fuit parce que les brebis ne sont pas les siennes. Les brebis ne comptent vraiment pas pour lui. '
  '14':
  - type: text
    content: 'Je suis comme le bon berger. Je connais mes propres brebis, et elles me connaissent. '
  '15':
  - type: text
    content: 'Je les connais de la même manière que mon Père me connaît. Et elles me connaissent de la même manière que je connais le Père. Et je vais mourir au nom de mes brebis. '
  '16':
  - type: text
    content: 'J’ai d’autres brebis, et je dois les amener aussi. Elles ne font pas partie de ce groupe de brebis. Mais elles vont écouter ma voix, et ainsi toutes les brebis iront à un groupe avec leur berger. '
  '17':
  - type: text
    content: 'Le Père m’aime parce que je choisis de mourir. Je peux devenir encore en vie. '
  '18':
  - type: text
    content: Personne ne me fait mourir. Non, j’ai choisi de mourir moi‑même. J’ai le pouvoir de choisir de mourir. J’ai aussi le pouvoir de devenir à nouveau vivant. Mon père a dit que je dois le faire.
  '19':
  - type: text
    content: 'Encore une fois, les '
  - type: text
    content: Juifs
  - type: text
    content: ' ne pouvaient pas se mettre d’accord sur ces choses que Jésus disait. '
  '2':
  - type: text
    content: Le berger entre là par la porte.
  '20':
  - type: text
    content: 'Beaucoup d’entre eux disaient : Il a un démon et il est fou. Vous ne devriez pas l’écouter ! '
  '21':
  - type: text
    content: 'Mais d’autres personnes ont dit : Un homme avec un démon ne peut pas parler comme ça ! Un démon ne peut pas rendre les gens capables de voir !'
  - type: heading
    content: Les dirigeants des Juifs ne croient pas en Jésus
  '22':
  - type: text
    content: 'C’était le temps pour la fête de la Dédicace à Jérusalem. '
  '23':
  - type: text
    content: C’était l’
  - type: text
    content: hiver
  - type: text
    content: '. Et Jésus se promenait dans le '
  - type: text
    content: Temple
  - type: text
    content: '. L’endroit a été appelé le '
  - type: text
    content: portique de Salomon
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' se tenaient autour de lui. Ils lui ont dit : Nous voulons être sûrs de qui tu es. Dis‑nous clairement si tu es le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Jésus a répondu : Je vous l’ai dit, mais vous ne croyez pas. Les choses que je fais par l’autorité de mon Père, vous montrent qui je suis. '
  '26':
  - type: text
    content: 'Mais vous refusez de croire, parce que vous ne faites pas partie de mes brebis. '
  '27':
  - type: text
    content: 'Mes brebis reconnaissent ma voix. Je les connais, et elles me suivent. '
  '28':
  - type: text
    content: 'Je les amène à vivre toujours. Elles ne mourront jamais. Personne ne peut jamais les éloigner de moi. '
  '29':
  - type: text
    content: 'Mon Père me les a données. Il est plus grand que tout. Personne ne peut jamais prendre mes brebis de la main de mon Père. '
  '3':
  - type: text
    content: 'La personne qui garde la porte ouvre pour le berger. Les brebis reconnaissent la voix du berger. Il appelle chacune de ses propres brebis par son nom, et il les conduit dehors. '
  '30':
  - type: text
    content: Mon Père et moi sommes une seule personne.
  '31':
  - type: text
    content: 'Alors les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' ont ramassé de nouveau des pierres pour les jeter sur Jésus. Ils voulaient le tuer. '
  '32':
  - type: text
    content: 'Jésus leur a dit : J’ai fait beaucoup de bonnes choses. Le Père m’a envoyé pour les faire. Vous m’avez vu faire ces bonnes choses. Laquelle de ces bonnes choses vous pousse à jeter des pierres sur moi ? '
  '33':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' ont répondu : Nous ne voulons pas te tuer avec des pierres en raison de toutes les bonnes choses que tu as faites. Nous voulons te tuer avec des pierres, parce que tu parles contre Dieu. Tu es seulement un homme. Mais tu dis que tu es Dieu. '
  '34':
  - type: text
    content: 'Jésus a répondu : Il est dit dans votre propre loi que Dieu a dit ceci : Vous êtes des dieux. '
  '35':
  - type: text
    content: 'Dieu a appelé le peuple à qui il a parlé des dieux. Et les Écritures sont toujours vraies. '
  '36':
  - type: text
    content: 'Le Père m’a choisi. Et il m’a envoyé dans le monde. Je dis que je suis le Fils de Dieu. Mais vous dites que je parle contre Dieu. '
  '37':
  - type: text
    content: 'Si je ne fais pas le travail de mon Père, ne me croyez pas. '
  '38':
  - type: text
    content: Mais si je fais son travail, croyez en ce travail. Même si vous ne me croyez pas, croyez en mon travail. Croyez aux choses que je fais. Ensuite, vous saurez certainement que le Père est en moi. Et vous saurez que je suis dans le Père.
  '39':
  - type: text
    content: 'Encore une fois, les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' ont essayé d’attraper Jésus. Mais il s’est échappé d’eux. '
  '4':
  - type: text
    content: 'Il fait sortir toutes ses propres brebis dehors, il va devant elles. Et les brebis le suivent, parce qu’elles connaissent sa voix. '
  '40':
  - type: text
    content: 'Jésus est encore allé de l’autre coté du '
  - type: text
    content: Jourdain
  - type: text
    content: '. Il est allé à l’endroit où Jean avait baptisé les gens. Et Jésus est resté là. '
  '41':
  - type: text
    content: 'Beaucoup de gens sont venus auprès de lui. Ils se sont dit l’un à l’autre : Jean n’a pas fait de miracles. Mais tout ce que Jean a dit de cet homme était vrai. '
  '42':
  - type: text
    content: Et en ce lieu, beaucoup de gens ont cru en Jésus.
  '5':
  - type: text
    content: 'Elles ne suivront pas un étranger. Elles fuiront un étranger parce qu’elles ne reconnaissent pas sa voix. '
  '6':
  - type: text
    content: Jésus leur a dit cette histoire qui était comme une image. Mais ils n’ont pas compris ce qu’il leur disait.
  - type: heading
    content: Jésus est comme le bon berger
  '7':
  - type: text
    content: 'Alors Jésus a repris la parole : Je vous dis la vérité. Je suis comme la porte des brebis. '
  '8':
  - type: text
    content: 'Tous les autres hommes qui venaient aux brebis avant moi, étaient mauvais. Ils voulaient enlever les brebis qui ne leur appartenaient pas. Mais les brebis ne les écoutaient pas. '
  '9':
  - type: text
    content: 'Je suis comme la porte. Toute personne qui entre par moi, sera en sécurité. Elle entrera et sortira. Et elle trouvera beaucoup de nourriture. '
