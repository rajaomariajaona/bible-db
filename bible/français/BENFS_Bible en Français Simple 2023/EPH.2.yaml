document_id: EPH.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Dieu nous a fait revivre avec le Christ
  - type: text
    content: 'Avant, vos '
  - type: text
    content: esprits
  - type: text
    content: ' étaient morts. Vous faisiez des choses mauvaises et vous n’obéissiez pas à Dieu. '
  '10':
  - type: text
    content: C’est Dieu qui a travaillé en nous. C’est lui‑même qui a fait ce que nous sommes. Il avait déjà préparé de bonnes choses à faire pour nous. Et il nous a unis avec Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', afin que nous puissions faire de bonnes choses.'
  - type: heading
    content: Christ a mis les Juifs et les païens ensemble
  '11':
  - type: text
    content: 'Alors, rappelez‑vous ce que vous étiez avant. Vous êtes nés païens. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' les appellent des incirconcis. Mais les '
  - type: text
    content: Juifs
  - type: text
    content: ' s’appellent eux‑mêmes circoncis. Ils disent cela à cause de ce que les hommes eux‑mêmes font à leurs corps. '
  '12':
  - type: text
    content: 'Rappelez‑vous qu’à ce moment‑là, vous étiez séparés de '
  - type: text
    content: Christ
  - type: text
    content: . Vous n’apparteniez pas au peuple d’Israël. Vous n’apparteniez pas au peuple que Dieu avait choisi. Vous étiez des étrangers. Dieu n’avait fait aucun accord avec vous. Vous viviez dans ce monde avec rien de bon à espérer. Vous viviez sans Dieu.
  '13':
  - type: text
    content: Vous étiez loin de Dieu. Mais maintenant, parce que vous êtes unis avec Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', Dieu vous a amenés près de lui‑même par le sang de '
  - type: text
    content: Christ
  - type: text
    content: .
  '14':
  - type: text
    content: 'C’est '
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même qui nous a donné la paix. Il a lui‑même fait comme un seul groupe les 2 groupes distincts de personnes : les '
  - type: text
    content: Juifs
  - type: text
    content: ' et les païens. Dans son propre corps, il a détruit le mur entre eux. Le mur les séparait. Il a enlevé la chose qui les faisait des ennemis.'
  '15':
  - type: text
    content: Il a mis fin aux règles juives. Ces règles leur disaient ce qu’ils devaient faire. De cette façon, il a arrêté les 2 groupes de personnes d’être des ennemis.
  '16':
  - type: text
    content: 'Par sa mort sur la croix, le '
  - type: text
    content: Christ
  - type: text
    content: ' a fait ceci : les '
  - type: text
    content: Juifs
  - type: text
    content: ' et les païens n’étaient plus ennemis les uns avec les autres. Dans un seul corps, il a ramené les 2 groupes de personnes à Dieu. Le but était qu’ils soient tous les amis de Dieu. '
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Christ
  - type: text
    content: ' est venu et il a dit aux gens le message de Dieu. Il leur a dit comment ils pourraient être amis avec Dieu. Comment ils pourraient être amis les uns avec les autres. Il vous l’a dit, vous païens, qui étiez loin de Dieu. Il l’a dit aussi aux '
  - type: text
    content: Juifs
  - type: text
    content: ', qui étaient près de Dieu.'
  '18':
  - type: text
    content: 'Par le '
  - type: text
    content: Christ
  - type: text
    content: ', nous tous, '
  - type: text
    content: Juifs
  - type: text
    content: ' et païens, nous pouvons venir au Père par le même '
  - type: text
    content: Esprit
  - type: text
    content: .
  '19':
  - type: text
    content: 'Alors maintenant, vous les païens, vous n’êtes plus étrangers. Vous n’êtes plus les gens du dehors. Mais maintenant, vous appartenez au peuple de Dieu. Vous appartenez à la famille de Dieu. '
  '2':
  - type: text
    content: Vous faisiez les mêmes sortes de mauvaises choses que d’autres personnes dans ce monde. Vous étiez comme toutes les autres personnes dans le monde qui ne respectent pas Dieu. Vous obéissiez à l’
  - type: text
    content: esprit
  - type: text
    content: ' qui gouverne les puissances spirituelles dans l’air. Cet '
  - type: text
    content: esprit
  - type: text
    content: ' travaille maintenant dans tout le monde qui refuse d’obéir à Dieu.'
  '20':
  - type: text
    content: 'Vous appartenez au bâtiment qui est la maison de Dieu. Les '
  - type: text
    content: apôtres
  - type: text
    content: ', et les gens qui parlaient de ses messages, sont comme ceci : Ils sont des pierres solides de ce bâtiment. Ils sont comme des pierres solides qui maintiennent la construction. Et Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même est comme la pierre la plus importante dans le bâtiment.'
  '21':
  - type: text
    content: 'Jésus soutient cette construction. Et il la fait lever dans une maison qui appartient seulement au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Il vous construit lui‑même ensemble aussi dans une maison où Dieu habite par son '
  - type: text
    content: Esprit
  - type: text
    content: .
  '3':
  - type: text
    content: 'Dans le passé, nous étions tous comme ces autres personnes. Nous faisions des choses comme nos propres corps et '
  - type: text
    content: esprits
  - type: text
    content: ' voulaient. Dieu était en colère contre nous, comme il était en colère contre tout le monde. Ainsi, il allait nous punir.'
  '4':
  - type: text
    content: 'Mais Dieu est très bon et gentil ! Nos '
  - type: text
    content: esprits
  - type: text
    content: ' étaient morts et nous faisaient faire de mauvaises choses. Mais encore Dieu nous aimait beaucoup. Il nous a fait revivre avec le '
  - type: text
    content: Christ
  - type: text
    content: '. Dieu vous a sauvés seulement parce qu’il est lui‑même très gentil. '
  '6':
  - type: text
    content: 'En plus, Dieu nous a ressuscités avec le '
  - type: text
    content: Christ
  - type: text
    content: ' et il nous fait asseoir avec '
  - type: text
    content: Christ
  - type: text
    content: ' au '
  - type: text
    content: ciel
  - type: text
    content: . Dieu a fait ces choses, parce qu’il nous a unis avec Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '7':
  - type: text
    content: Dieu a fait ces choses pour montrer dans le temps futur, comment il est très bon envers nous. Il voulait montrer comment il est très grand et très aimable envers nous par Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '8':
  - type: text
    content: 'Dieu vous a sauvés seulement parce qu’il est lui‑même très gentil. Il vous a sauvés, parce que vous croyez en lui. Vous ne pourriez pas vous sauver, mais il est le don de Dieu pour vous. '
  '9':
  - type: text
    content: 'Il ne vous a pas sauvés suite à une bonne chose que vous avez faite. Donc, personne n’a aucune raison de se vanter qu’il est bon ! '
