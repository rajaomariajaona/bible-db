document_id: EPH.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Dieu nous a fait revivre avec le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant, vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' étaient morts. Vous faisiez des choses mauvaises et vous n’obéissiez pas à Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est Dieu qui a travaillé en nous. C’est lui‑même qui a fait ce que nous sommes. Il avait déjà préparé de bonnes choses à faire pour nous. Et il nous a unis avec Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', afin que nous puissions faire de bonnes choses.'
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a mis les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et les païens ensemble'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, rappelez‑vous ce que vous étiez avant. Vous êtes nés païens. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' les appellent des incirconcis. Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' s’appellent eux‑mêmes circoncis. Ils disent cela à cause de ce que les hommes eux‑mêmes font à leurs corps. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rappelez‑vous qu’à ce moment‑là, vous étiez séparés de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Vous n’apparteniez pas au peuple d’Israël. Vous n’apparteniez pas au peuple que Dieu avait choisi. Vous étiez des étrangers. Dieu n’avait fait aucun accord avec vous. Vous viviez dans ce monde avec rien de bon à espérer. Vous viviez sans Dieu.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous étiez loin de Dieu. Mais maintenant, parce que vous êtes unis avec Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', Dieu vous a amenés près de lui‑même par le sang de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même qui nous a donné la paix. Il a lui‑même fait comme un seul groupe les 2 groupes distincts de personnes : les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et les païens. Dans son propre corps, il a détruit le mur entre eux. Le mur les séparait. Il a enlevé la chose qui les faisait des ennemis.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il a mis fin aux règles juives. Ces règles leur disaient ce qu’ils devaient faire. De cette façon, il a arrêté les 2 groupes de personnes d’être des ennemis.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par sa mort sur la croix, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a fait ceci : les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et les païens n’étaient plus ennemis les uns avec les autres. Dans un seul corps, il a ramené les 2 groupes de personnes à Dieu. Le but était qu’ils soient tous les amis de Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est venu et il a dit aux gens le message de Dieu. Il leur a dit comment ils pourraient être amis avec Dieu. Comment ils pourraient être amis les uns avec les autres. Il vous l’a dit, vous païens, qui étiez loin de Dieu. Il l’a dit aussi aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', qui étaient près de Dieu.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', nous tous, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et païens, nous pouvons venir au Père par le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors maintenant, vous les païens, vous n’êtes plus étrangers. Vous n’êtes plus les gens du dehors. Mais maintenant, vous appartenez au peuple de Dieu. Vous appartenez à la famille de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous faisiez les mêmes sortes de mauvaises choses que d’autres personnes dans ce monde. Vous étiez comme toutes les autres personnes dans le monde qui ne respectent pas Dieu. Vous obéissiez à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' qui gouverne les puissances spirituelles dans l’air. Cet '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' travaille maintenant dans tout le monde qui refuse d’obéir à Dieu.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous appartenez au bâtiment qui est la maison de Dieu. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ', et les gens qui parlaient de ses messages, sont comme ceci : Ils sont des pierres solides de ce bâtiment. Ils sont comme des pierres solides qui maintiennent la construction. Et Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même est comme la pierre la plus importante dans le bâtiment.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus soutient cette construction. Et il la fait lever dans une maison qui appartient seulement au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vous construit lui‑même ensemble aussi dans une maison où Dieu habite par son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le passé, nous étions tous comme ces autres personnes. Nous faisions des choses comme nos propres corps et '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' voulaient. Dieu était en colère contre nous, comme il était en colère contre tout le monde. Ainsi, il allait nous punir.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Dieu est très bon et gentil ! Nos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' étaient morts et nous faisaient faire de mauvaises choses. Mais encore Dieu nous aimait beaucoup. Il nous a fait revivre avec le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Dieu vous a sauvés seulement parce qu’il est lui‑même très gentil. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En plus, Dieu nous a ressuscités avec le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et il nous fait asseoir avec '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Dieu a fait ces choses, parce qu’il nous a unis avec Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a fait ces choses pour montrer dans le temps futur, comment il est très bon envers nous. Il voulait montrer comment il est très grand et très aimable envers nous par Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu vous a sauvés seulement parce qu’il est lui‑même très gentil. Il vous a sauvés, parce que vous croyez en lui. Vous ne pourriez pas vous sauver, mais il est le don de Dieu pour vous. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne vous a pas sauvés suite à une bonne chose que vous avez faite. Donc, personne n’a aucune raison de se vanter qu’il est bon ! '
