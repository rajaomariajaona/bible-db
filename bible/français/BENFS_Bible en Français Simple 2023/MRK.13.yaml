document_id: MRK.13
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle des choses à venir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'À un moment, Jésus a commencé à quitter le Temple. Alors l’un de ses disciples lui a dit : Maître, regarde ces belles constructions ! Ces belles pierres dans les murs du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '  ! De belles constructions ! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus lui a dit : Regarde tous ces grands bâtiments ! Les ennemis les détruiront complètement. Ils jetteront chaque pierre qui est au‑dessus d’une autre pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Après cela, Jésus était assis sur la colline appelée la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: '. C’était en face du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Pierre, Jacques, Jean et André se sont réunis pour parler avec lui. La foule n’était pas là. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils disaient : S’il te plaît, dis‑nous quand ces choses vont arriver. Qu’est‑ce que nous allons voir juste avant que toutes ces choses se produisent ? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus leur a dit : Attention ! Certaines personnes vous diront des choses qui ne sont pas vraies. Ne croyez pas ces gens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Beaucoup de gens vous diront qu’ils sont venus en mon nom. Ils diront : Je suis ici ! Beaucoup de gens croiront aux fausses paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les gens vous parleront des guerres. Et il y aura des rapports sur les guerres. N’ayez pas peur. Ces choses se réaliseront. Mais ce ne sera pas encore la fin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le peuple d’un pays attaquera celui d’un autre pays. Les rois et leurs armées se battront contre d’autres rois et leurs armées. Le sol tremblera dans de nombreux endroits différents. Certaines personnes manqueront de nourriture. Ces choses seront comme les premières douleurs avant la naissance d’un bébé. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Donc, soyez prudents ! Les gens vous amèneront à leurs dirigeants. Les gens vous frapperont dans les bâtiments de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Les gens vous amèneront devant des rois et devant des dirigeants. Ce sera pour vous juger. Vous serez là en mon nom. Et vous leur parlerez de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et vous devez d’abord dire la Bonne Nouvelle aux personnes dans tous les pays. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les gens vous emporteront et vous amèneront à leurs dirigeants. Mais n’ayez pas peur des paroles que vous aurez à dire. Vous devrez dire les paroles que Dieu mettra dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' à ce moment‑là. Vous ne direz pas vos propres paroles. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' vous donnera les paroles à dire. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un homme fera mourir son propre frère. Un père fera mourir son propre enfant. Les enfants seront contre leurs parents. Ils les feront tuer aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tous les gens seront cruels contre vous, parce que vous êtes à moi. Mais Dieu sauvera la personne qui sera fidèle jusqu’à la fin.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y aura un moment où vous verrez une très mauvaise chose. C’est la très mauvaise chose qui détruit. Elle se manifestera là où elle ne devrait pas être (lorsque vous lisez ceci, comprenez ce que ça signifie). Quand vous verrez cette chose, les gens en Judée devront courir vers les collines pour se cacher. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Une personne qui sera sur son toit ne devra pas descendre dans sa maison. Elle ne devra pas s’arrêter pour prendre quelque chose de sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Une personne qui est dans un champ ne devra pas revenir à son domicile. Elle ne devra pas revenir ramasser son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ce temps sera mauvais pour les femmes qui seront dans l’espoir d’avoir un bébé bientôt. Et le temps sera mauvais pour les femmes qui seront en train de donner du lait maternel à leurs bébés. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous devez prier Dieu pour que ces troubles n’arrivent pas en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hiver
  - type: text
    text: ' (saison de beaucoup de froid). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'De très mauvaises choses arriveront aux gens. Ces très mauvaises choses ne sont jamais arrivées depuis que Dieu a fait le monde. Elles ne se reproduiront plus après cette date. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu diminuera ces très mauvais jours. S’il ne fait pas cela, il n’y aura plus personne encore en vie. Mais Dieu diminuera ces très mauvais jours. Il le fera pour aider le peuple qu’il a choisi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quelqu’un peut vous dire alors : Regardez, voici le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: '  ! Ou il peut dire : Regardez, il est là ! Ne le croyez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Certaines personnes vous diront : Je suis le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: '. D’autres personnes diront : Je suis un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. Mais leurs paroles seront fausses. Ils vont faire des choses extraordinaires. Ces choses surprendront beaucoup de personnes dans le monde. Si possible, elles pourraient même tromper les gens que Dieu a choisis. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Donc, soyez prudents ! Je vous ai dit toutes ces choses avant qu’elles ne surviennent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le temps où le Fils de l’homme reviendra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après ces choses, le soleil deviendra noir. Et la lune ne brillera plus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les étoiles tomberont du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Et les choses puissantes dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' quitteront leurs lieux habituels. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors les gens verront le Fils de l’homme. Il viendra dans les nuages. Il sera très puissant et très beau. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors il enverra les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. Et ils rassembleront tout le peuple que Dieu a choisi. Ils les rassembleront de toutes les directions. Et le peuple de Dieu viendra de l’extrémité de la terre jusqu’à l’extrémité du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Une leçon sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voici une leçon sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: '. Lorsque les nouvelles branches sur l’arbre commencent à pousser, les feuilles apparaissent. Alors, vous savez que le temps de chaleur va bientôt commencer. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Vous verrez ces choses se réaliser. Alors vous saurez que le Fils de l’homme viendra bientôt. Il sera comme quelqu’un qui est à la porte et prêt à entrer dans la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je vous dis la vérité. Les gens qui sont en vie maintenant, ne mourront pas tous. Certains d’entre eux ne mourront pas jusqu’à ce que toutes ces choses se passent. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'La terre et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' auront une fin. Mais mes paroles n’auront jamais de fin.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Personne ne sait quand le Fils de l’homme va retourner au monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Personne ne sait ni le jour ni l’heure où toutes ces choses vont arriver. Même les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' ne savent pas. Même le Fils ne sait pas. Dieu Seul le Père sait quand elles arriveront. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Soyez attentifs ! Vous ne savez pas quand toutes ces choses vont arriver. Alors soyez prêts.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'C’est comme quand un maître commence un voyage. Avant qu’il quitte sa maison, il donne le pouvoir à ses serviteurs. Il dit à chaque serviteur le travail qu’il doit faire. Puis il dit au serviteur à la porte d’être prêt pour le retour de son maître. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Et vous ne savez pas quand le maître de la maison sera de retour. Alors gardez‑vous prêts et regardez attentivement.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il peut arriver le soir, ou au milieu de la nuit. Ou il peut arriver tôt le matin, ou juste avant le lever du soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il peut vous surprendre et il peut vous trouver endormis. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Je vous dis cela. Et je dis aussi cela à tout le monde. Gardez‑vous prêts !
