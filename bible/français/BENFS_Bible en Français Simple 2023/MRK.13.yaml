document_id: MRK.13,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 13
  - type: heading
    content: Jésus parle des choses à venir
  - type: text
    content: 'À un moment, Jésus a commencé à quitter le Temple. Alors l’un de ses disciples lui a dit : Maître, regarde ces belles constructions ! Ces belles pierres dans les murs du '
  - type: text
    content: Temple
  - type: text
    content: '  ! De belles constructions ! '
  '10':
  - type: text
    content: 'Et vous devez d’abord dire la Bonne Nouvelle aux personnes dans tous les pays. '
  '11':
  - type: text
    content: 'Les gens vous emporteront et vous amèneront à leurs dirigeants. Mais n’ayez pas peur des paroles que vous aurez à dire. Vous devrez dire les paroles que Dieu mettra dans vos '
  - type: text
    content: esprits
  - type: text
    content: ' à ce moment‑là. Vous ne direz pas vos propres paroles. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' vous donnera les paroles à dire. '
  '12':
  - type: text
    content: 'Un homme fera mourir son propre frère. Un père fera mourir son propre enfant. Les enfants seront contre leurs parents. Ils les feront tuer aussi. '
  '13':
  - type: text
    content: Tous les gens seront cruels contre vous, parce que vous êtes à moi. Mais Dieu sauvera la personne qui sera fidèle jusqu’à la fin.
  '14':
  - type: text
    content: 'Il y aura un moment où vous verrez une très mauvaise chose. C’est la très mauvaise chose qui détruit. Elle se manifestera là où elle ne devrait pas être (lorsque vous lisez ceci, comprenez ce que ça signifie). Quand vous verrez cette chose, les gens en Judée devront courir vers les collines pour se cacher. '
  '15':
  - type: text
    content: 'Une personne qui sera sur son toit ne devra pas descendre dans sa maison. Elle ne devra pas s’arrêter pour prendre quelque chose de sa maison. '
  '16':
  - type: text
    content: 'Une personne qui est dans un champ ne devra pas revenir à son domicile. Elle ne devra pas revenir ramasser son '
  - type: text
    content: manteau
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ce temps sera mauvais pour les femmes qui seront dans l’espoir d’avoir un bébé bientôt. Et le temps sera mauvais pour les femmes qui seront en train de donner du lait maternel à leurs bébés. '
  '18':
  - type: text
    content: 'Vous devez prier Dieu pour que ces troubles n’arrivent pas en '
  - type: text
    content: hiver
  - type: text
    content: ' (saison de beaucoup de froid). '
  '19':
  - type: text
    content: 'De très mauvaises choses arriveront aux gens. Ces très mauvaises choses ne sont jamais arrivées depuis que Dieu a fait le monde. Elles ne se reproduiront plus après cette date. '
  '2':
  - type: text
    content: 'Jésus lui a dit : Regarde tous ces grands bâtiments ! Les ennemis les détruiront complètement. Ils jetteront chaque pierre qui est au‑dessus d’une autre pierre. '
  '20':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu diminuera ces très mauvais jours. S’il ne fait pas cela, il n’y aura plus personne encore en vie. Mais Dieu diminuera ces très mauvais jours. Il le fera pour aider le peuple qu’il a choisi. '
  '21':
  - type: text
    content: 'Quelqu’un peut vous dire alors : Regardez, voici le '
  - type: text
    content: Messie
  - type: text
    content: '  ! Ou il peut dire : Regardez, il est là ! Ne le croyez pas. '
  '22':
  - type: text
    content: 'Certaines personnes vous diront : Je suis le '
  - type: text
    content: Messie
  - type: text
    content: '. D’autres personnes diront : Je suis un '
  - type: text
    content: prophète
  - type: text
    content: '. Mais leurs paroles seront fausses. Ils vont faire des choses extraordinaires. Ces choses surprendront beaucoup de personnes dans le monde. Si possible, elles pourraient même tromper les gens que Dieu a choisis. '
  '23':
  - type: text
    content: Donc, soyez prudents ! Je vous ai dit toutes ces choses avant qu’elles ne surviennent.
  - type: heading
    content: Le temps où le Fils de l’homme reviendra
  '24':
  - type: text
    content: 'Après ces choses, le soleil deviendra noir. Et la lune ne brillera plus. '
  '25':
  - type: text
    content: 'Les étoiles tomberont du '
  - type: text
    content: ciel
  - type: text
    content: '. Et les choses puissantes dans le '
  - type: text
    content: ciel
  - type: text
    content: ' quitteront leurs lieux habituels. '
  '26':
  - type: text
    content: 'Alors les gens verront le Fils de l’homme. Il viendra dans les nuages. Il sera très puissant et très beau. '
  '27':
  - type: text
    content: 'Alors il enverra les '
  - type: text
    content: anges
  - type: text
    content: '. Et ils rassembleront tout le peuple que Dieu a choisi. Ils les rassembleront de toutes les directions. Et le peuple de Dieu viendra de l’extrémité de la terre jusqu’à l’extrémité du '
  - type: text
    content: ciel
  - type: text
    content: .
  - type: heading
    content: Une leçon sur le figuier
  '28':
  - type: text
    content: 'Voici une leçon sur le '
  - type: text
    content: figuier
  - type: text
    content: '. Lorsque les nouvelles branches sur l’arbre commencent à pousser, les feuilles apparaissent. Alors, vous savez que le temps de chaleur va bientôt commencer. '
  '29':
  - type: text
    content: 'Vous verrez ces choses se réaliser. Alors vous saurez que le Fils de l’homme viendra bientôt. Il sera comme quelqu’un qui est à la porte et prêt à entrer dans la maison. '
  '3':
  - type: text
    content: 'Après cela, Jésus était assis sur la colline appelée la '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: '. C’était en face du '
  - type: text
    content: Temple
  - type: text
    content: '. Pierre, Jacques, Jean et André se sont réunis pour parler avec lui. La foule n’était pas là. '
  '30':
  - type: text
    content: 'Je vous dis la vérité. Les gens qui sont en vie maintenant, ne mourront pas tous. Certains d’entre eux ne mourront pas jusqu’à ce que toutes ces choses se passent. '
  '31':
  - type: text
    content: 'La terre et le '
  - type: text
    content: ciel
  - type: text
    content: ' auront une fin. Mais mes paroles n’auront jamais de fin.'
  - type: heading
    content: Personne ne sait quand le Fils de l’homme va retourner au monde
  '32':
  - type: text
    content: 'Personne ne sait ni le jour ni l’heure où toutes ces choses vont arriver. Même les '
  - type: text
    content: anges
  - type: text
    content: ' au '
  - type: text
    content: ciel
  - type: text
    content: ' ne savent pas. Même le Fils ne sait pas. Dieu Seul le Père sait quand elles arriveront. '
  '33':
  - type: text
    content: Soyez attentifs ! Vous ne savez pas quand toutes ces choses vont arriver. Alors soyez prêts.
  '34':
  - type: text
    content: 'C’est comme quand un maître commence un voyage. Avant qu’il quitte sa maison, il donne le pouvoir à ses serviteurs. Il dit à chaque serviteur le travail qu’il doit faire. Puis il dit au serviteur à la porte d’être prêt pour le retour de son maître. '
  '35':
  - type: text
    content: Et vous ne savez pas quand le maître de la maison sera de retour. Alors gardez‑vous prêts et regardez attentivement.
  - type: text
    content: 'Il peut arriver le soir, ou au milieu de la nuit. Ou il peut arriver tôt le matin, ou juste avant le lever du soleil. '
  '36':
  - type: text
    content: 'Il peut vous surprendre et il peut vous trouver endormis. '
  '37':
  - type: text
    content: Je vous dis cela. Et je dis aussi cela à tout le monde. Gardez‑vous prêts !
  '4':
  - type: text
    content: 'Ils disaient : S’il te plaît, dis‑nous quand ces choses vont arriver. Qu’est‑ce que nous allons voir juste avant que toutes ces choses se produisent ? '
  '5':
  - type: text
    content: 'Jésus leur a dit : Attention ! Certaines personnes vous diront des choses qui ne sont pas vraies. Ne croyez pas ces gens. '
  '6':
  - type: text
    content: 'Beaucoup de gens vous diront qu’ils sont venus en mon nom. Ils diront : Je suis ici ! Beaucoup de gens croiront aux fausses paroles. '
  '7':
  - type: text
    content: Les gens vous parleront des guerres. Et il y aura des rapports sur les guerres. N’ayez pas peur. Ces choses se réaliseront. Mais ce ne sera pas encore la fin.
  '8':
  - type: text
    content: 'Le peuple d’un pays attaquera celui d’un autre pays. Les rois et leurs armées se battront contre d’autres rois et leurs armées. Le sol tremblera dans de nombreux endroits différents. Certaines personnes manqueront de nourriture. Ces choses seront comme les premières douleurs avant la naissance d’un bébé. '
  '9':
  - type: text
    content: 'Donc, soyez prudents ! Les gens vous amèneront à leurs dirigeants. Les gens vous frapperont dans les bâtiments de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Les gens vous amèneront devant des rois et devant des dirigeants. Ce sera pour vous juger. Vous serez là en mon nom. Et vous leur parlerez de moi. '
