document_id: 1TH.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le travail de Paul à Thessalonique
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nos amis chrétiens, vous savez vous‑mêmes que notre visite a eu de bons résultats. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez que nous vivions bien lorsque nous étions avec vous. Dieu le sait aussi. Nous étions complètement honnêtes avec vous, croyants. Personne ne pouvait dire que nous avions fait quelque chose de mal. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez que nous vous avons aidés, comme un père aide ses propres enfants. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous vous avons clairement enseigné ce qui est vrai. Nous vous avons fortifiés en tant que croyants. Dieu vous a choisis pour être son propre peuple. Vous appartenez à son grand Royaume, où il règne. Donc, nous vous avons dit de vivre d’une manière qui lui plaît.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y a une autre raison pour laquelle nous continuons toujours à remercier Dieu pour vous. Quand nous vous avons dit le message de Dieu, vous saviez que cela ne venait pas d’un homme. Vous l’avez accepté comme le message de Dieu, et c’est vraiment cela. Vous continuez de grandir en tant que croyants à cause du message de Dieu que vous avez entendu.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nos amis chrétiens, vous avez connu le même genre de problèmes que les gens des Églises de Judée. Les gens de votre propre pays vous ont causé des problèmes. La même chose est arrivée aux habitants de Judée qui croyaient en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Ils ont eu des problèmes de leur propre peuple '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juif
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des gens comme ça ont même tué le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus. Ils ont également tué les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' de Dieu. Ils ont également fait de mauvaises choses contre nous. Alors, nous avons dû quitter leurs villes. Ils mettent Dieu en colère. Ils sont ennemis de tout le monde, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: parce qu’ils essaient de nous empêcher de parler aux païens. Ils ne veulent pas que Dieu sauve quelqu’un d’une autre nation. De cette façon, ils continuent de faire de plus en plus de mauvaises choses. Lorsque leurs péchés sont devenus trop nombreux, Dieu les a arrêtés. Dieu s’est vraiment fâché. Alors, il les a punis complètement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul veut retourner à Thessalonique
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nos amis, nous avons dû nous éloigner de vous pendant une courte période. Mais nous pensions toujours à vous. Nous voulions beaucoup revenir vous voir. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, nous voulions vraiment vous revoir. Vraiment, moi Paul, j’ai essayé plusieurs fois de venir chez vous, mais Satan nous a bloqués.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes le peuple qui nous rend très heureux ! Nous savons que vous continuerez à croire en Dieu. Donc, lorsque notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus reviendra, nous serons fiers de vous. Vous serez comme une couronne qu’il nous donnera. Ce sera quand nous nous tiendrons devant lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous savez ce que nous avons connu avant notre arrivée chez vous. Les gens de Philippes nous avaient fait du mal. Ils nous avaient causé des problèmes. Lorsque nous sommes venus chez vous, nous étions courageux grâce à notre Dieu. Nous n’avions pas peur de vous annoncer sa Bonne Nouvelle. Beaucoup de gens ont essayé de nous arrêter, mais nous vous avons dit le message de Dieu.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous montrez les grands résultats de notre travail. Oui, c’est grâce à vous que nous sommes très heureux.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque nous disons aux gens d’obéir au message de Dieu, nous ne disons rien de faux. Nous n’avons pas un mauvais objectif. Nous n’essayons de tromper personne. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais, nous disons ce que Dieu veut que nous disions. Il nous a choisis pour annoncer sa Bonne Nouvelle aux gens. Donc, nous ne le faisons pas pour plaire aux gens. Nous le faisons pour plaire à Dieu. C’est lui qui sait à qui nous ressemblons vraiment.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque nous sommes venus chez vous, nous avons dit la vérité. Nous n’avons pas seulement dit de belles choses pour que vous vous sentiez bien. Vous le savez vous‑mêmes. Nous n’avons pas essayé de vous amener à nous donner des choses. Nous n’avons jamais eu un but secret comme ça. Dieu sait que c’est vrai. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous ne voulions pas que quiconque dise que nous sommes des gens importants. Nous ne voulions pas que vous fassiez cela, ni personne d’autre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous pouvions utiliser notre pouvoir sur vous, car nous sommes les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Mais, nous avons choisi de vous aider, comme les parents aident leurs enfants. Nous avons pris soin de vous, comme une mère s’occupe de ses petits enfants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous vous aimions beaucoup. Nous voulions donc vous annoncer la Bonne Nouvelle de Dieu. Nous vous aimions beaucoup. Alors nous avons utilisé toutes nos forces pour vous aider.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nos amis chrétiens, rappelez‑vous comment nous avons travaillé beaucoup pour vous aider. Nous travaillions le jour et même la nuit. Nous ne voulions pas vous causer de problèmes. Donc, nous vous avons enseigné la Bonne Nouvelle de Dieu. Et pourtant, nous ne vous avons pas demandé de nous donner quoi que ce soit en retour.
