document_id: ACT.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: text
    content: Saul se tenait là. Et il voyait tout ce qui se passait. Saul était d’accord pour tuer Étienne.
  - type: heading
    content: Saul met certains croyants en prison
  - type: text
    content: 'Le même jour qu’Étienne est mort, les '
  - type: text
    content: Juifs
  - type: text
    content: ' à Jérusalem ont commencé à faire de mauvaises choses aux croyants. Tous ceux qui croyaient en Jésus allaient dans différentes directions. Certains d’entre eux sont allés en Judée, certains d’entre eux sont allés en Samarie. Seulement les 12 '
  - type: text
    content: apôtres
  - type: text
    content: ' de Jésus sont restés à Jérusalem. '
  '10':
  - type: text
    content: 'Les personnes importantes dans la ville observaient Simon attentivement. Et le peuple qui n’était pas important l’observait également attentivement. Chacun disait : Dieu a fait devenir Simon puissant. Il est un dieu lui‑même. '
  '11':
  - type: text
    content: 'Simon utilisait sa magie pendant longtemps. Le peuple l’observait. Il étonnait souvent avec les choses qu’il faisait. Ainsi les gens l’écoutaient attentivement. '
  '12':
  - type: text
    content: 'Mais Philippe leur parlait du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. Il leur disait tout au sujet de Jésus. Il disait que Jésus est '
  - type: text
    content: Christ
  - type: text
    content: ', le serviteur spécial de Dieu. Beaucoup d’hommes et femmes croyaient en Jésus. Ainsi Philippe les baptisait. '
  '13':
  - type: text
    content: Simon a également cru au message et Philippe l’a baptisé. Après ceci, Simon est resté près de Philippe. Simon était étonné de nombreuses choses puissantes et spéciales que Philippe faisait.
  '14':
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' restaient toujours à Jérusalem. Ils ont entendu que les gens de Samarie avaient accepté la Parole de Dieu. Ainsi les '
  - type: text
    content: apôtres
  - type: text
    content: ' ont envoyé Pierre et Jean à Samarie pour parler au peuple. '
  '15':
  - type: text
    content: 'Philippe baptisait ceux qui croyaient. Et quand les 2 '
  - type: text
    content: apôtres
  - type: text
    content: ' sont arrivés à Samarie, ils ont prié pour ces personnes. Ils ont demandé à Dieu de donner le Saint‑'
  - type: text
    content: Esprit
  - type: text
    content: ' aux nouveaux croyants. '
  '16':
  - type: text
    content: Jusque‑là, le Saint‑
  - type: text
    content: Esprit
  - type: text
    content: ' n’était pas encore descendu sur ces personnes. Philippe les baptisait seulement. Il utilisait le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus quand il faisait ceci. '
  '17':
  - type: text
    content: Quand Pierre et Jean posaient leurs mains sur les têtes de chaque personne, elles recevaient le Saint‑
  - type: text
    content: Esprit
  - type: text
    content: .
  '18':
  - type: text
    content: 'Simon a vu que le Saint‑Esprit venait quand Pierre et Jean posaient leurs mains sur chaque personne. Ainsi il a dit à Pierre et à Jean : J’ai une certaine somme d’argent. Je veux vous la donner. '
  '19':
  - type: text
    content: Rendez‑moi également puissant. Je veux faire les mêmes choses que vous. Je veux poser mes mains sur des gens. Ainsi, ils vont recevoir le Saint‑
  - type: text
    content: Esprit
  - type: text
    content: .
  '2':
  - type: text
    content: 'Quelques bons hommes qui obéissaient à Dieu ont enterré le corps d’Étienne. Ils étaient très tristes. Ils pleuraient avec des voix fortes. '
  '20':
  - type: text
    content: 'Pierre a répondu à Simon : Que Dieu te tue toi, et ton argent. Tu penses faussement : Je peux acheter avec de l’argent ce don que Dieu offre. '
  '21':
  - type: text
    content: 'Non, tu ne peux pas travailler avec nous, parce que tes pensées sont mauvaises. Et tu n’obéis pas à Dieu. '
  '22':
  - type: text
    content: 'Dis à Dieu que tu es triste à cause de ces mauvaises pensées. Ne pense pas comme cela et aie de bonnes pensées. Dis à Dieu : Pardonne‑moi pour ces mauvaises choses. '
  '23':
  - type: text
    content: 'Je vois que tu as de mauvaises pensées. Tu n’as pas ce que les '
  - type: text
    content: apôtres
  - type: text
    content: ' ont. Et ainsi tu es fâché. Satan règne sur toi comme un esclave.'
  '24':
  - type: text
    content: 'Alors Simon a dit à Pierre et à Jean : Pouvez‑vous prier Dieu pour moi ? Alors rien de ce que vous avez dit ne m’arrivera.'
  '25':
  - type: text
    content: 'Pierre et Jean disaient au peuple ce que Jésus avait fait pour eux. Pierre et Jean disaient au peuple le message du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Après, ils sont retournés à Jérusalem. Et sur leur chemin, ils parlaient aux gens dans les villages de Samarie. Ils enseignaient au peuple la Bonne Nouvelle au sujet du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: .
  - type: heading
    content: Philippe rencontre un homme d’Éthiopie
  '26':
  - type: text
    content: 'Alors Dieu a envoyé un '
  - type: text
    content: ange
  - type: text
    content: ' pour parler à Philippe. Il a dit : Philippe, prépare‑toi et va au sud sur la route entre Jérusalem et Gaza. La route passe par le '
  - type: text
    content: désert
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Ainsi Philippe est allé et il marchait le long de cette route. Et pendant qu’il marchait, il a rencontré un homme important d’Éthiopie. Cet homme gardait l’argent de Candace. Candace était la reine d’Ethiopie. L’homme rentrait à la maison. Il était à Jérusalem pour visiter le '
  - type: text
    content: Temple
  - type: text
    content: '. Il avait remercié Dieu comme il était très bon et grand. '
  '28':
  - type: text
    content: 'Maintenant l’homme voyageait à la maison encore dans son char. Et il lisait le livre que le '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe avait écrit. '
  '29':
  - type: text
    content: 'Le Saint‑Esprit a dit à Philippe : Va à ce char et marche autour.'
  '3':
  - type: text
    content: Mais Saul faisait des troubles aux croyants à Jérusalem. Il voulait détruire tout leur groupe. Alors il allait dans toutes leurs maisons. Il attrapait les croyants et les mettait en prison. Il faisait cela aux hommes et aux femmes.
  '30':
  - type: text
    content: 'Ainsi Philippe est allé vers le char. Il marchait autour. Il a entendu l’homme. Il lisait à haute voix le livre appelé Ésaïe. Ainsi Philippe a demandé à l’homme : Tu comprends les choses que tu lis ?'
  '31':
  - type: text
    content: 'L’homme a répondu : Je ne peux pas les comprendre. J’ai besoin de quelqu’un pour me les expliquer. L’homme a dit à Philippe : Viens et monte dans le char avec moi.'
  '32':
  - type: text
    content: 'L’homme lisait ceci du livre d’Ésaïe :'
  - type: text
    content: 'Les personnes l’ont mené comme elles mènent une brebis. C’est une brebis qu’elles vont tuer. Il n’a pas fait de bruit. Il était comme un jeune mouton. Il ne fait pas de bruit. Quand un homme coupe les cheveux mous sur son dos, il était comme lui. Il n’a rien dit. '
  '33':
  - type: text
    content: Les gens se sont moqués de lui. Ils disaient de mauvaises choses au sujet de lui. Ils disaient des choses qui n’étaient pas vraies. Personne ne peut parler de ses enfants, parce qu’il ne les a pas eus. Sa vie sur terre est finie.
  '34':
  - type: text
    content: 'L’homme d’Éthiopie a dit à Philippe : Dis‑moi de qui le '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe a écrit ? A‑t‑il écrit pour lui‑même ou au sujet d’une autre personne ? '
  '35':
  - type: text
    content: Alors Philippe a expliqué à l’homme les paroles qu’Ésaïe avait écrites. Il a dit à l’homme la Bonne Nouvelle au sujet de Jésus.
  '36':
  - type: text
    content: 'Quand ils voyageaient le long de la route, ils sont arrivés à un endroit où il y avait de l’eau. L’homme a dit à Philippe : Regarde, voici un endroit où il y a de l’eau. Peux‑tu me baptiser ? Y a‑t‑il quelque chose qui te freine ? '
  '37':
  - type: text
    content: 'Philippe lui a dit : Je peux te baptiser si tu crois vraiment en Jésus. L’homme a dit à Philippe : Je crois vraiment en Jésus. Je crois qu’il est le fils de Dieu. '
  '38':
  - type: text
    content: 'L’homme d’Éthiopie a dit à l’homme qui conduisait le char : Arrête le char. Puis Philippe et l’homme d’Ethiopie sont entrés dans l’eau, et Philippe l’a baptisé. '
  '39':
  - type: text
    content: 'Tous les 2 sont sortis de l’eau, et alors le Saint‑Esprit a rapidement enlevé Philippe de cet endroit. L’homme n’a plus vu Philippe. Il a continué son voyage. Il était très heureux. '
  '4':
  - type: text
    content: 'Les croyants qui ont quitté Jérusalem sont allés dans beaucoup de différentes villes. Dans chaque ville, ils disaient au peuple le message au sujet de Jésus. '
  '40':
  - type: text
    content: 'Philippe a vu qu’il était maintenant à Azot. Ainsi il marchait vers la ville appelée '
  - type: text
    content: Césarée
  - type: text
    content: '. Pendant qu’il passait par les villes sur le chemin à '
  - type: text
    content: Césarée
  - type: text
    content: ', il parlait aux gens du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: .
  '5':
  - type: text
    content: Philippe est allé à la ville appelée Samarie. Et là, il disait au peuple le message au sujet de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Il disait : Jésus est la personne spéciale que Dieu avait envoyée. '
  '6':
  - type: text
    content: 'Beaucoup de gens venaient ensemble dans la ville pour entendre Philippe. Ils l’écoutaient attentivement. Et ils le voyaient faire beaucoup de choses spéciales. '
  '7':
  - type: text
    content: 'Quelques gens avaient de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' en eux. Philippe les chassait des gens. Et les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' quittaient les gens. Ils faisaient des bruits forts. Certains avaient des jambes faibles. Philippe rendait leurs jambes fortes encore. Certains ne pouvaient pas bouger leurs bras et jambes, mais Philippe les faisait devenir bien encore. '
  '8':
  - type: text
    content: 'Les personnes dans cette ville étaient très heureuses. '
  '9':
  - type: text
    content: 'Il y avait un homme qui s’appelait Simon. Il habitait à Samarie. Pendant longtemps, il faisait la magie pour faire beaucoup de choses qui étonnaient le peuple. Les gens qui habitaient à Samarie l’observaient. Et ils croyaient que Simon était une personne très importante. '
