document_id: ACT.8,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 8
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul se tenait là. Et il voyait tout ce qui se passait. Saul était d’accord pour tuer Étienne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul met certains croyants en prison
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le même jour qu’Étienne est mort, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' à Jérusalem ont commencé à faire de mauvaises choses aux croyants. Tous ceux qui croyaient en Jésus allaient dans différentes directions. Certains d’entre eux sont allés en Judée, certains d’entre eux sont allés en Samarie. Seulement les 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' de Jésus sont restés à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les personnes importantes dans la ville observaient Simon attentivement. Et le peuple qui n’était pas important l’observait également attentivement. Chacun disait : Dieu a fait devenir Simon puissant. Il est un dieu lui‑même. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon utilisait sa magie pendant longtemps. Le peuple l’observait. Il étonnait souvent avec les choses qu’il faisait. Ainsi les gens l’écoutaient attentivement. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Philippe leur parlait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: '. Il leur disait tout au sujet de Jésus. Il disait que Jésus est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', le serviteur spécial de Dieu. Beaucoup d’hommes et femmes croyaient en Jésus. Ainsi Philippe les baptisait. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Simon a également cru au message et Philippe l’a baptisé. Après ceci, Simon est resté près de Philippe. Simon était étonné de nombreuses choses puissantes et spéciales que Philippe faisait.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' restaient toujours à Jérusalem. Ils ont entendu que les gens de Samarie avaient accepté la Parole de Dieu. Ainsi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ont envoyé Pierre et Jean à Samarie pour parler au peuple. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philippe baptisait ceux qui croyaient. Et quand les 2 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' sont arrivés à Samarie, ils ont prié pour ces personnes. Ils ont demandé à Dieu de donner le Saint‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' aux nouveaux croyants. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jusque‑là, le Saint‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' n’était pas encore descendu sur ces personnes. Philippe les baptisait seulement. Il utilisait le nom du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus quand il faisait ceci. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand Pierre et Jean posaient leurs mains sur les têtes de chaque personne, elles recevaient le Saint‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon a vu que le Saint‑Esprit venait quand Pierre et Jean posaient leurs mains sur chaque personne. Ainsi il a dit à Pierre et à Jean : J’ai une certaine somme d’argent. Je veux vous la donner. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rendez‑moi également puissant. Je veux faire les mêmes choses que vous. Je veux poser mes mains sur des gens. Ainsi, ils vont recevoir le Saint‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques bons hommes qui obéissaient à Dieu ont enterré le corps d’Étienne. Ils étaient très tristes. Ils pleuraient avec des voix fortes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre a répondu à Simon : Que Dieu te tue toi, et ton argent. Tu penses faussement : Je peux acheter avec de l’argent ce don que Dieu offre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, tu ne peux pas travailler avec nous, parce que tes pensées sont mauvaises. Et tu n’obéis pas à Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis à Dieu que tu es triste à cause de ces mauvaises pensées. Ne pense pas comme cela et aie de bonnes pensées. Dis à Dieu : Pardonne‑moi pour ces mauvaises choses. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vois que tu as de mauvaises pensées. Tu n’as pas ce que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ont. Et ainsi tu es fâché. Satan règne sur toi comme un esclave.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Simon a dit à Pierre et à Jean : Pouvez‑vous prier Dieu pour moi ? Alors rien de ce que vous avez dit ne m’arrivera.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre et Jean disaient au peuple ce que Jésus avait fait pour eux. Pierre et Jean disaient au peuple le message du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Après, ils sont retournés à Jérusalem. Et sur leur chemin, ils parlaient aux gens dans les villages de Samarie. Ils enseignaient au peuple la Bonne Nouvelle au sujet du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philippe rencontre un homme d’Éthiopie
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Dieu a envoyé un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' pour parler à Philippe. Il a dit : Philippe, prépare‑toi et va au sud sur la route entre Jérusalem et Gaza. La route passe par le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Philippe est allé et il marchait le long de cette route. Et pendant qu’il marchait, il a rencontré un homme important d’Éthiopie. Cet homme gardait l’argent de Candace. Candace était la reine d’Ethiopie. L’homme rentrait à la maison. Il était à Jérusalem pour visiter le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Il avait remercié Dieu comme il était très bon et grand. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant l’homme voyageait à la maison encore dans son char. Et il lisait le livre que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Ésaïe avait écrit. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Saint‑Esprit a dit à Philippe : Va à ce char et marche autour.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Saul faisait des troubles aux croyants à Jérusalem. Il voulait détruire tout leur groupe. Alors il allait dans toutes leurs maisons. Il attrapait les croyants et les mettait en prison. Il faisait cela aux hommes et aux femmes.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Philippe est allé vers le char. Il marchait autour. Il a entendu l’homme. Il lisait à haute voix le livre appelé Ésaïe. Ainsi Philippe a demandé à l’homme : Tu comprends les choses que tu lis ?'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme a répondu : Je ne peux pas les comprendre. J’ai besoin de quelqu’un pour me les expliquer. L’homme a dit à Philippe : Viens et monte dans le char avec moi.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme lisait ceci du livre d’Ésaïe :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les personnes l’ont mené comme elles mènent une brebis. C’est une brebis qu’elles vont tuer. Il n’a pas fait de bruit. Il était comme un jeune mouton. Il ne fait pas de bruit. Quand un homme coupe les cheveux mous sur son dos, il était comme lui. Il n’a rien dit. '
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens se sont moqués de lui. Ils disaient de mauvaises choses au sujet de lui. Ils disaient des choses qui n’étaient pas vraies. Personne ne peut parler de ses enfants, parce qu’il ne les a pas eus. Sa vie sur terre est finie.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme d’Éthiopie a dit à Philippe : Dis‑moi de qui le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Ésaïe a écrit ? A‑t‑il écrit pour lui‑même ou au sujet d’une autre personne ? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Philippe a expliqué à l’homme les paroles qu’Ésaïe avait écrites. Il a dit à l’homme la Bonne Nouvelle au sujet de Jésus.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils voyageaient le long de la route, ils sont arrivés à un endroit où il y avait de l’eau. L’homme a dit à Philippe : Regarde, voici un endroit où il y a de l’eau. Peux‑tu me baptiser ? Y a‑t‑il quelque chose qui te freine ? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philippe lui a dit : Je peux te baptiser si tu crois vraiment en Jésus. L’homme a dit à Philippe : Je crois vraiment en Jésus. Je crois qu’il est le fils de Dieu. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme d’Éthiopie a dit à l’homme qui conduisait le char : Arrête le char. Puis Philippe et l’homme d’Ethiopie sont entrés dans l’eau, et Philippe l’a baptisé. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les 2 sont sortis de l’eau, et alors le Saint‑Esprit a rapidement enlevé Philippe de cet endroit. L’homme n’a plus vu Philippe. Il a continué son voyage. Il était très heureux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les croyants qui ont quitté Jérusalem sont allés dans beaucoup de différentes villes. Dans chaque ville, ils disaient au peuple le message au sujet de Jésus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philippe a vu qu’il était maintenant à Azot. Ainsi il marchait vers la ville appelée '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: '. Pendant qu’il passait par les villes sur le chemin à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: ', il parlait aux gens du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Philippe est allé à la ville appelée Samarie. Et là, il disait au peuple le message au sujet de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Il disait : Jésus est la personne spéciale que Dieu avait envoyée. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de gens venaient ensemble dans la ville pour entendre Philippe. Ils l’écoutaient attentivement. Et ils le voyaient faire beaucoup de choses spéciales. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques gens avaient de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' en eux. Philippe les chassait des gens. Et les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' quittaient les gens. Ils faisaient des bruits forts. Certains avaient des jambes faibles. Philippe rendait leurs jambes fortes encore. Certains ne pouvaient pas bouger leurs bras et jambes, mais Philippe les faisait devenir bien encore. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les personnes dans cette ville étaient très heureuses. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un homme qui s’appelait Simon. Il habitait à Samarie. Pendant longtemps, il faisait la magie pour faire beaucoup de choses qui étonnaient le peuple. Les gens qui habitaient à Samarie l’observaient. Et ils croyaient que Simon était une personne très importante. '
