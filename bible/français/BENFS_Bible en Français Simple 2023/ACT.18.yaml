document_id: ACT.18,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 18
  - type: heading
    content: Paul visite Corinthe
  - type: text
    content: 'Paul a fini de parler. Après cela, il a quitté la ville d’Athènes. Et de là, il a alors voyagé à la ville appelée Corinthe. '
  '10':
  - type: text
    content: 'Je suis ici avec toi, ainsi personne ne te fera aucun mal. Il y a beaucoup de gens dans cette ville qui croiront en moi. '
  '11':
  - type: text
    content: Paul est resté à Corinthe pendant 18 mois. Il disait aux gens le message de Dieu au sujet de Jésus.
  - type: heading
    content: Paul devant le chef Gallion
  '12':
  - type: text
    content: 'Gallion est devenu le chef '
  - type: text
    content: romain
  - type: text
    content: ' de l’Achaïe. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' se sont réunis ensemble. Ils ont tenu Paul et ils l’ont amené devant Gallion. C’était pour juger Paul. '
  '13':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont dit à Gallion : Cet homme enseigne aux gens des choses qui sont contre notre loi. Il nous demande de croire aux choses différentes au sujet de Dieu. Mais si nous faisons ces choses, nous nous opposerons à notre loi.'
  '14':
  - type: text
    content: 'Paul était prêt à parler, mais Gallion a parlé d’abord aux '
  - type: text
    content: Juifs
  - type: text
    content: '  : Si cet homme avait fait quelque chose de mauvais, alors je ferai quelque chose par rapport à cela. '
  '15':
  - type: text
    content: 'Mais vous vous disputez au sujet des paroles et des noms dans votre propre loi. Donc décidez vous‑mêmes quoi faire à son sujet. Je ne serai pas un '
  - type: text
    content: juge
  - type: text
    content: ' pour ces choses. '
  '16':
  - type: text
    content: 'Alors Gallion a dit à ses soldats : Faites sortir ces hommes de cette salle. '
  '17':
  - type: text
    content: 'Sosthène était le chef de la '
  - type: text
    content: synagogue
  - type: text
    content: '. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' l’ont tenu et ils l’ont frappé avec des bâtons devant Gallion. Mais Gallion n’a rien fait pour les arrêter.'
  - type: heading
    content: Paul voyage de Corinthe à Antioche
  '18':
  - type: text
    content: 'Paul est resté à Corinthe avec les croyants pendant beaucoup de jours. Alors il leur dit au revoir. Et il naviguait en bateau au pays appelé la Syrie. Priscille et Aquilas sont également allés avec lui. Avant que Paul navigue, il a promis quelque chose à Dieu. A cause de cette promesse, il a demandé à quelqu’un de couper tous les cheveux de sa tête. '
  '19':
  - type: text
    content: 'Paul, Priscille et Aquilas sont arrivés dans la ville appelée Éphèse. Paul les a laissés là, et il est entré dans la '
  - type: text
    content: synagogue
  - type: text
    content: '. Et il a parlé avec les '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'À Corinthe, il a rencontré un homme appelé Aquilas. Aquilas était un '
  - type: text
    content: Juif
  - type: text
    content: ' et il était né dans la région appelée le Pont. Il venait d’arriver à Corinthe avec son épouse Priscille. Ils venaient d’Italie pour habiter à Corinthe. À ce moment‑là, Claude '
  - type: text
    content: César
  - type: text
    content: ' avait dit que tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' devaient quitter Rome. C’était la raison de son arrivée ici. Paul est allé rendre visite à Aquilas et à Priscille. '
  '20':
  - type: text
    content: 'Certains d’entre eux ont demandé à Paul de rester à Éphèse avec eux pendant longtemps. Mais il n’a pas accepté de rester. '
  '21':
  - type: text
    content: 'Paul leur a dit : Si Dieu veut que je revienne, je reviendrai à vous. Alors Paul a navigué d’Éphèse à '
  - type: text
    content: Césarée
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Quand Paul est arrivé à '
  - type: text
    content: Césarée
  - type: text
    content: ', il a continué vers Jérusalem. Il a dit bonjour à tous les croyants là et alors il a voyagé vers Antioche en Syrie.'
  '23':
  - type: text
    content: 'Il est resté à Antioche pendant un certain temps. Puis, après cela, il a quitté Antioche. Il est alors allé à plusieurs endroits en Galatie et en Phrygie. Il disait à tous les croyants de ces endroits : Continuez d’aimer Dieu et de lui obéir plus fortement.'
  - type: heading
    content: Certaines choses qu’Apollos a faites
  '24':
  - type: text
    content: 'À Éphèse, il y avait un '
  - type: text
    content: Juif
  - type: text
    content: ' appelé Apollos. Il est né à Alexandrie en Égypte. Maintenant il avait voyagé d’Alexandrie pour habiter à Éphèse. Il a pu bien parler. Il savait très bien toutes les paroles qui ont été écrites dans le livre de Dieu. '
  '25':
  - type: text
    content: 'Quelqu’un lui avait parlé de la Bonne Nouvelle au sujet de Jésus. Il était heureux quand il parlait aux gens au sujet de Jésus. Tout ce qu’il disait, était vrai. Mais il avait seulement connu une partie du message. Il savait ce que Jean avait dit. Et il savait la façon dont Jean baptisait des personnes. '
  '26':
  - type: text
    content: 'Apollos n’avait pas peur. Alors il enseignait les gens dans la '
  - type: text
    content: synagogue
  - type: text
    content: '. Priscille et Aquilas ont entendu Apollos enseigner les gens. Ainsi ils lui ont dit : Viens avec nous à notre maison. Nous pouvons tout t’expliquer au sujet de Jésus. Nous pouvons tout te dire ce que Dieu veut. Et ainsi ils ont fait cela.'
  '27':
  - type: text
    content: 'Après cela, Apollos a décidé d’aller en Grèce. Alors les croyants d’Éphèse l’ont aidé. Ils ont écrit une lettre. C’était pour qu’il la donne aux croyants en Grèce. Ils ont écrit : Quand Apollos arrivera, veuillez l’accepter. Quand il est arrivé en Grèce, il a aidé beaucoup de croyants là. Ils ont commencé à croire en Jésus, parce que Dieu les aidait. '
  '28':
  - type: text
    content: 'Apollos se disputait fortement avec les '
  - type: text
    content: Juifs
  - type: text
    content: ' devant le peuple. Et il leur montrait à partir des paroles de Dieu que les '
  - type: text
    content: Juifs
  - type: text
    content: ' avaient tort. Il expliquait clairement. Et il utilisait les paroles des '
  - type: text
    content: prophètes
  - type: text
    content: ', pour montrer que Jésus est le '
  - type: text
    content: Christ
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ils savaient faire des tentes. Ils les vendaient. Ainsi, ils pouvaient avoir de l’argent pour acheter la nourriture. Paul pouvait effectuer le même travail. Ainsi il est resté avec eux et il travaillait avec eux. '
  '4':
  - type: text
    content: 'Chaque jour de '
  - type: text
    content: sabbat
  - type: text
    content: ', Paul enseignait les '
  - type: text
    content: Juifs
  - type: text
    content: ' et les '
  - type: text
    content: Grecs
  - type: text
    content: ' dans la '
  - type: text
    content: synagogue
  - type: text
    content: . Il voulait qu’ils croient tous à la Bonne Nouvelle au sujet de Jésus.
  '5':
  - type: text
    content: Puis Silas et Timothée sont venus du pays appelé Macédoine. Après cela, le seul travail de Paul était d’enseigner le peuple.
  - type: text
    content: 'Il disait aux '
  - type: text
    content: Juifs
  - type: text
    content: ' le message au sujet de Jésus. Il leur expliquait bien. Il disait : Dieu a envoyé Jésus pour être le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' n’étaient pas d’accord avec Paul. Ils disaient de mauvaises choses au sujet de lui. Ainsi il a nettoyé la saleté de ses vêtements et il leur a dit : Que votre sang retombe sur vos têtes. Alors ce ne sera pas à cause de moi. Ce sera à cause de vous. Ainsi j’irai maintenant vers ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: .
  '7':
  - type: text
    content: 'Ainsi Paul a laissé les '
  - type: text
    content: Juifs
  - type: text
    content: '. Il est allé rester dans la maison de Justus. Il n’était pas un '
  - type: text
    content: Juif
  - type: text
    content: '. Mais il était un homme qui priait le Dieu des '
  - type: text
    content: Juifs
  - type: text
    content: '. Sa maison était à côté de la '
  - type: text
    content: synagogue
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Un homme appelé Crispus était le chef de la '
  - type: text
    content: synagogue
  - type: text
    content: . Lui et tous les autres qui vivaient dans sa maison, ont cru en Jésus. Beaucoup d’autres gens entendaient le message de Paul au sujet de Jésus. Ils croyaient également au message et quelqu’un les baptisait.
  '9':
  - type: text
    content: 'Une nuit, quand Paul était à Corinthe, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui est apparu dans un rêve. Il lui a dit : N’aie pas peur, continue de parler au peuple ici. Ne cesse pas de leur parler. '
