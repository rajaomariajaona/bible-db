document_id: ACT.18,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 18
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul visite Corinthe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paul a fini de parler. Après cela, il a quitté la ville d’Athènes. Et de là, il a alors voyagé à la ville appelée Corinthe. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je suis ici avec toi, ainsi personne ne te fera aucun mal. Il y a beaucoup de gens dans cette ville qui croiront en moi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Paul est resté à Corinthe pendant 18 mois. Il disait aux gens le message de Dieu au sujet de Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul devant le chef Gallion
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Gallion est devenu le chef '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: ' de l’Achaïe. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' se sont réunis ensemble. Ils ont tenu Paul et ils l’ont amené devant Gallion. C’était pour juger Paul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont dit à Gallion : Cet homme enseigne aux gens des choses qui sont contre notre loi. Il nous demande de croire aux choses différentes au sujet de Dieu. Mais si nous faisons ces choses, nous nous opposerons à notre loi.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Paul était prêt à parler, mais Gallion a parlé d’abord aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  : Si cet homme avait fait quelque chose de mauvais, alors je ferai quelque chose par rapport à cela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais vous vous disputez au sujet des paroles et des noms dans votre propre loi. Donc décidez vous‑mêmes quoi faire à son sujet. Je ne serai pas un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' pour ces choses. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors Gallion a dit à ses soldats : Faites sortir ces hommes de cette salle. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Sosthène était le chef de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: '. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' l’ont tenu et ils l’ont frappé avec des bâtons devant Gallion. Mais Gallion n’a rien fait pour les arrêter.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul voyage de Corinthe à Antioche
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Paul est resté à Corinthe avec les croyants pendant beaucoup de jours. Alors il leur dit au revoir. Et il naviguait en bateau au pays appelé la Syrie. Priscille et Aquilas sont également allés avec lui. Avant que Paul navigue, il a promis quelque chose à Dieu. A cause de cette promesse, il a demandé à quelqu’un de couper tous les cheveux de sa tête. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Paul, Priscille et Aquilas sont arrivés dans la ville appelée Éphèse. Paul les a laissés là, et il est entré dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: '. Et il a parlé avec les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'À Corinthe, il a rencontré un homme appelé Aquilas. Aquilas était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: ' et il était né dans la région appelée le Pont. Il venait d’arriver à Corinthe avec son épouse Priscille. Ils venaient d’Italie pour habiter à Corinthe. À ce moment‑là, Claude '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' avait dit que tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' devaient quitter Rome. C’était la raison de son arrivée ici. Paul est allé rendre visite à Aquilas et à Priscille. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Certains d’entre eux ont demandé à Paul de rester à Éphèse avec eux pendant longtemps. Mais il n’a pas accepté de rester. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Paul leur a dit : Si Dieu veut que je revienne, je reviendrai à vous. Alors Paul a navigué d’Éphèse à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Quand Paul est arrivé à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: ', il a continué vers Jérusalem. Il a dit bonjour à tous les croyants là et alors il a voyagé vers Antioche en Syrie.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il est resté à Antioche pendant un certain temps. Puis, après cela, il a quitté Antioche. Il est alors allé à plusieurs endroits en Galatie et en Phrygie. Il disait à tous les croyants de ces endroits : Continuez d’aimer Dieu et de lui obéir plus fortement.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Certaines choses qu’Apollos a faites
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'À Éphèse, il y avait un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: ' appelé Apollos. Il est né à Alexandrie en Égypte. Maintenant il avait voyagé d’Alexandrie pour habiter à Éphèse. Il a pu bien parler. Il savait très bien toutes les paroles qui ont été écrites dans le livre de Dieu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Quelqu’un lui avait parlé de la Bonne Nouvelle au sujet de Jésus. Il était heureux quand il parlait aux gens au sujet de Jésus. Tout ce qu’il disait, était vrai. Mais il avait seulement connu une partie du message. Il savait ce que Jean avait dit. Et il savait la façon dont Jean baptisait des personnes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Apollos n’avait pas peur. Alors il enseignait les gens dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: '. Priscille et Aquilas ont entendu Apollos enseigner les gens. Ainsi ils lui ont dit : Viens avec nous à notre maison. Nous pouvons tout t’expliquer au sujet de Jésus. Nous pouvons tout te dire ce que Dieu veut. Et ainsi ils ont fait cela.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Après cela, Apollos a décidé d’aller en Grèce. Alors les croyants d’Éphèse l’ont aidé. Ils ont écrit une lettre. C’était pour qu’il la donne aux croyants en Grèce. Ils ont écrit : Quand Apollos arrivera, veuillez l’accepter. Quand il est arrivé en Grèce, il a aidé beaucoup de croyants là. Ils ont commencé à croire en Jésus, parce que Dieu les aidait. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Apollos se disputait fortement avec les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' devant le peuple. Et il leur montrait à partir des paroles de Dieu que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' avaient tort. Il expliquait clairement. Et il utilisait les paroles des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ', pour montrer que Jésus est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils savaient faire des tentes. Ils les vendaient. Ainsi, ils pouvaient avoir de l’argent pour acheter la nourriture. Paul pouvait effectuer le même travail. Ainsi il est resté avec eux et il travaillait avec eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Chaque jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ', Paul enseignait les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Grecs
    - type: text
      text: ' dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: . Il voulait qu’ils croient tous à la Bonne Nouvelle au sujet de Jésus.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Puis Silas et Timothée sont venus du pays appelé Macédoine. Après cela, le seul travail de Paul était d’enseigner le peuple.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il disait aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' le message au sujet de Jésus. Il leur expliquait bien. Il disait : Dieu a envoyé Jésus pour être le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' n’étaient pas d’accord avec Paul. Ils disaient de mauvaises choses au sujet de lui. Ainsi il a nettoyé la saleté de ses vêtements et il leur a dit : Que votre sang retombe sur vos têtes. Alors ce ne sera pas à cause de moi. Ce sera à cause de vous. Ainsi j’irai maintenant vers ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ainsi Paul a laissé les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il est allé rester dans la maison de Justus. Il n’était pas un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: '. Mais il était un homme qui priait le Dieu des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Sa maison était à côté de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Un homme appelé Crispus était le chef de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: . Lui et tous les autres qui vivaient dans sa maison, ont cru en Jésus. Beaucoup d’autres gens entendaient le message de Paul au sujet de Jésus. Ils croyaient également au message et quelqu’un les baptisait.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Une nuit, quand Paul était à Corinthe, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui est apparu dans un rêve. Il lui a dit : N’aie pas peur, continue de parler au peuple ici. Ne cesse pas de leur parler. '
