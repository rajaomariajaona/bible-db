document_id: JHN.11,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 11
  - type: heading
    content: Lazare meurt
  - type: text
    content: 'Un homme appelé Lazare est tombé malade. Lazare vivait à '
  - type: text
    content: Béthanie
  - type: text
    content: '. Marie et sa sœur Marthe vivaient aussi dans ce village. '
  '10':
  - type: text
    content: 'Mais celui qui marche pendant la nuit va tomber. Il va tomber parce qu’il n’y a pas de lumière en lui. '
  '11':
  - type: text
    content: 'Après cela, Jésus leur a dit : Notre ami Lazare dort. Mais je vais le réveiller. '
  '12':
  - type: text
    content: 'Donc les '
  - type: text
    content: disciples
  - type: text
    content: ' lui ont dit : S’il dort, '
  - type: text
    content: Seigneur
  - type: text
    content: ', il sera guéri. '
  '13':
  - type: text
    content: 'Mais Jésus voulait dire que Lazare est mort. Les '
  - type: text
    content: disciples
  - type: text
    content: ' pensaient que Jésus parlait du sommeil comme repos. '
  '14':
  - type: text
    content: 'Alors, Jésus leur a dit clairement : Lazare est mort. '
  '15':
  - type: text
    content: 'Mais je suis heureux que je n’étais pas présent à sa mort. Je suis heureux de cela, parce que maintenant vous allez croire. Nous devons aller vers lui maintenant. '
  '16':
  - type: text
    content: 'Thomas, appelé '
  - type: text
    content: Didyme
  - type: text
    content: ', a parlé aux autres '
  - type: text
    content: disciples
  - type: text
    content: '. Il a dit : Nous irons avec notre Maître, afin que nous puissions mourir avec lui.'
  - type: heading
    content: Jésus est capable de ressusciter les morts
  '17':
  - type: text
    content: 'Jésus est arrivé à '
  - type: text
    content: Béthanie
  - type: text
    content: '. Puis il a découvert qu’ils avaient enterré Lazare 4 jours plus tôt. '
  '18':
  - type: text
    content: Béthanie
  - type: text
    content: ' était à moins de 3 kilomètres de Jérusalem. '
  '19':
  - type: text
    content: 'Beaucoup de '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient venus visiter Marthe et Marie. Ces '
  - type: text
    content: Juifs
  - type: text
    content: ' voulaient être gentils envers Marthe et Marie parce que leur frère est mort.'
  '2':
  - type: text
    content: 'C’était cette Marie qui avait versé du parfum avec une belle odeur sur le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Puis elle avait nettoyé ses pieds avec ses cheveux. C’était son frère Lazare qui était malade. '
  '20':
  - type: text
    content: 'Marthe a entendu que Jésus arrivait. Donc, immédiatement, elle est allée à sa rencontre. Mais Marie est restée à la maison. '
  '21':
  - type: text
    content: 'Marthe a dit à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', si tu étais ici, mon frère n’allait pas mourir. '
  '22':
  - type: text
    content: 'Mais je sais que, maintenant encore, Dieu te répondra. Dieu fera tout ce que tu lui demandes. '
  '23':
  - type: text
    content: 'Jésus lui a dit : Ton frère deviendra à nouveau vivant. '
  '24':
  - type: text
    content: 'Marthe a répondu : Je sais qu’il va devenir encore vivant le dernier jour. '
  '25':
  - type: text
    content: 'Jésus lui a dit : C’est moi qui ressuscite les morts. Je fais vivre les gens. Toute personne qui croit en moi, vivra. Même si cette personne meurt, elle vivra. '
  '26':
  - type: text
    content: 'Certaines personnes vont vivre et croire en moi. Toute personne qui fait cela ne mourra jamais. Crois‑tu cela ? '
  '27':
  - type: text
    content: 'Elle a répondu : Oui, '
  - type: text
    content: Seigneur
  - type: text
    content: ', je crois que tu es le '
  - type: text
    content: Christ
  - type: text
    content: ', le Fils de Dieu. Tu es l’homme que Dieu a promis d’envoyer dans le monde.'
  - type: heading
    content: Jésus pleure
  '28':
  - type: text
    content: 'Après cela, Marthe est allée chez elle. Elle a parlé en secret à sa sœur, Marie. Marthe a dit : Le Maître est ici, et il te demande. '
  '29':
  - type: text
    content: 'Marie a entendu cela. Elle s’est levée. Elle a couru à la rencontre de Jésus. '
  '3':
  - type: text
    content: 'Ainsi, les 2 sœurs ont envoyé ce message à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', l’ami que tu aimes est malade. '
  '30':
  - type: text
    content: 'Jésus n’était pas encore arrivé dans le village. Il était toujours à l’endroit où Marthe l’avait rencontré. '
  '31':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient dans la maison pour les consoler. Ils ont vu Marie se lever rapidement. Ils ont vu Marie sortir et ils la suivaient. Ils pensaient qu’elle allait au tombeau pour pleurer. '
  '32':
  - type: text
    content: 'Marie est arrivée à l’endroit où était Jésus. Elle a vu Jésus, elle est tombée à ses pieds. Elle a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', si tu étais ici, mon frère n’allait pas mourir. '
  '33':
  - type: text
    content: 'Jésus a vu que Marie pleurait. Certains '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient venus avec elle. Ils pleuraient aussi. Jésus les a vus. Il se sentait très triste dans son '
  - type: text
    content: esprit
  - type: text
    content: '. Il était très triste pour eux. '
  '34':
  - type: text
    content: 'Il leur a demandé : Où avez‑vous mis son corps mort ? Ils ont répondu : Viens et vois, '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Jésus a pleuré. '
  '36':
  - type: text
    content: 'Alors les '
  - type: text
    content: Juifs
  - type: text
    content: ' se sont dit ceci : Voyez combien il aimait Lazare ! '
  '37':
  - type: text
    content: 'Mais certains d’entre eux disaient : Il a ouvert les yeux de l’homme qui ne pouvait pas voir. Alors, certes, il devait empêcher Lazare de mourir.'
  - type: heading
    content: Jésus fait revivre Lazare
  '38':
  - type: text
    content: 'Jésus se sentait très triste à nouveau. Alors il est allé au tombeau. C’était un grand trou dans la roche. Une très grosse pierre a couvert le chemin vers le trou. '
  '39':
  - type: text
    content: 'Jésus a dit : Enlevez la pierre. Marthe, la sœur du mort a dit à Jésus : Mais '
  - type: text
    content: Seigneur
  - type: text
    content: ', son corps aura une mauvaise odeur. Il est mort depuis 4 jours ! '
  '4':
  - type: text
    content: 'Jésus a entendu le message. Puis il a dit : Cette maladie ne se terminera pas avec la mort de Lazare. Non, son but est de montrer à quel point et comment Dieu est puissant. Elle montrera à quel point le Fils de Dieu est grand. '
  '40':
  - type: text
    content: 'Jésus lui a dit : Je t’ai dit que tu dois croire. Puis tu verras à quel point et comment Dieu est puissant. '
  '41':
  - type: text
    content: 'Ils ont donc enlevé la pierre. Jésus a levé les yeux vers le '
  - type: text
    content: ciel
  - type: text
    content: '. Il a dit : Père, je te remercie de ce que tu m’as écouté. '
  '42':
  - type: text
    content: 'Je sais que tu m’écoutes toujours. Mais je dis cela à cause de tous les gens qui sont ici présents. Je veux qu’ils croient que tu m’as envoyé. '
  '43':
  - type: text
    content: 'Quand Jésus a dit cela, il a crié d’une voix forte : Lazare, sors ! '
  '44':
  - type: text
    content: 'L’homme mort est sorti. Il y avait des morceaux de tissu autour de ses mains et ses pieds. Un autre morceau de tissu était autour de son visage. Jésus leur a dit : Déliez‑le et laissez‑le aller.'
  - type: heading
    content: Les Pharisiens décident comment tuer Jésus
  '45':
  - type: text
    content: 'Bon nombre des '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient venus visiter Marie. Ils ont vu ce que Jésus a fait. Donc, ils ont cru en lui. '
  '46':
  - type: text
    content: 'Mais certains d’entre eux se sont rendus auprès des '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Ils ont dit aux '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ce que Jésus avait fait. '
  '47':
  - type: text
    content: 'Alors les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont fait une réunion. Ils se sont dit ceci : Que ferons‑nous ? Cet homme fait beaucoup de miracles. '
  '48':
  - type: text
    content: 'Si nous le laissons faire plus de choses comme ça, tout le monde va croire en lui. Puis les '
  - type: text
    content: Romains
  - type: text
    content: ' viendront. Et ils vont détruire notre '
  - type: text
    content: Temple
  - type: text
    content: . Ils vont tuer notre peuple.
  '49':
  - type: text
    content: 'L’un d’eux s’appelait Caïphe. Il était le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' cette année. Il a dit : Vous ne comprenez pas le problème. '
  '5':
  - type: text
    content: Jésus aimait Marthe et sa sœur, et leur frère Lazare, aussi.
  '50':
  - type: text
    content: 'Il est préférable qu’un seul homme meure au nom du peuple. Cela vaut mieux que si tous les habitants de notre pays meurent. '
  '51':
  - type: text
    content: 'Caïphe n’a pas dit cela de lui‑même. Non, il parlait comme un '
  - type: text
    content: prophète
  - type: text
    content: ' parce qu’il était le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' cette année. Il parlait comme un '
  - type: text
    content: prophète
  - type: text
    content: ' que Jésus devra mourir au nom du peuple d’Israël. '
  '52':
  - type: text
    content: 'Et Jésus mourra non seulement pour le peuple d’Israël. En '
  - type: text
    content: outre
  - type: text
    content: ', sa mort réunira tous les saints qui ont vécu dans de nombreux endroits différents. Ils deviendront comme une grande famille.'
  '53':
  - type: text
    content: 'A partir de ce jour‑là, les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' ont décidé ensemble comment ils pourraient tuer Jésus. '
  '54':
  - type: text
    content: 'Alors, Jésus a cessé de voyager en Judée où tout le monde pouvait le voir. Au lieu de cela, il est parti secrètement dans une ville appelée Ephraïm. Elle était près du '
  - type: text
    content: désert
  - type: text
    content: '. Il est resté là avec les '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '55':
  - type: text
    content: 'C’était presque le moment pour la fête de '
  - type: text
    content: Pâque
  - type: text
    content: '. Beaucoup de gens venaient de leurs pays vers Jérusalem. Ils allaient se purifier et se mettaient prêts pour Dieu. C’était avant de se rendre à la fête. '
  '56':
  - type: text
    content: 'Ils cherchaient Jésus. Ils étaient dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils se demandaient : Pensez‑vous qu’il viendra à la fête ou non ? '
  '57':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' parlaient aux gens de Jésus. Ils leur disaient : Si quelqu’un sait là où est Jésus, il peut nous le dire. Ainsi, nous pourrons l’attraper.'
  '6':
  - type: text
    content: Il a entendu que Lazare était malade. Mais alors il est resté à l’endroit où il a été pendant 2 jours.
  '7':
  - type: text
    content: 'Après cela, Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Nous allons retourner en Judée. '
  '8':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' lui ont dit : Maître, il y a peu de temps, les '
  - type: text
    content: Juifs
  - type: text
    content: ' essayaient de te tuer avec des pierres. Tu ne devrais pas y retourner ! '
  '9':
  - type: text
    content: 'Jésus a répondu : Vous savez qu’il y a 12 heures dans la journée. Toute personne qui marche pendant le jour ne tombe pas. Elle ne tombe pas parce qu’elle voit la lumière de ce monde. '
