document_id: JHN.11
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 11
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lazare meurt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un homme appelé Lazare est tombé malade. Lazare vivait à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. Marie et sa sœur Marthe vivaient aussi dans ce village. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’était cette Marie qui avait versé du parfum avec une belle odeur sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Puis elle avait nettoyé ses pieds avec ses cheveux. C’était son frère Lazare qui était malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi, les 2 sœurs ont envoyé ce message à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', l’ami que tu aimes est malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus a entendu le message. Puis il a dit : Cette maladie ne se terminera pas avec la mort de Lazare. Non, son but est de montrer à quel point et comment Dieu est puissant. Elle montrera à quel point le Fils de Dieu est grand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jésus aimait Marthe et sa sœur, et leur frère Lazare, aussi.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il a entendu que Lazare était malade. Mais alors il est resté à l’endroit où il a été pendant 2 jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après cela, Jésus a dit à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Nous allons retourner en Judée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' lui ont dit : Maître, il y a peu de temps, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' essayaient de te tuer avec des pierres. Tu ne devrais pas y retourner ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus a répondu : Vous savez qu’il y a 12 heures dans la journée. Toute personne qui marche pendant le jour ne tombe pas. Elle ne tombe pas parce qu’elle voit la lumière de ce monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais celui qui marche pendant la nuit va tomber. Il va tomber parce qu’il n’y a pas de lumière en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après cela, Jésus leur a dit : Notre ami Lazare dort. Mais je vais le réveiller. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Donc les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' lui ont dit : S’il dort, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', il sera guéri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais Jésus voulait dire que Lazare est mort. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' pensaient que Jésus parlait du sommeil comme repos. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors, Jésus leur a dit clairement : Lazare est mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais je suis heureux que je n’étais pas présent à sa mort. Je suis heureux de cela, parce que maintenant vous allez croire. Nous devons aller vers lui maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Thomas, appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Didyme
  - type: text
    text: ', a parlé aux autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il a dit : Nous irons avec notre Maître, afin que nous puissions mourir avec lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est capable de ressusciter les morts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus est arrivé à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. Puis il a découvert qu’ils avaient enterré Lazare 4 jours plus tôt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: ' était à moins de 3 kilomètres de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Beaucoup de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient venus visiter Marthe et Marie. Ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' voulaient être gentils envers Marthe et Marie parce que leur frère est mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Marthe a entendu que Jésus arrivait. Donc, immédiatement, elle est allée à sa rencontre. Mais Marie est restée à la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Marthe a dit à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', si tu étais ici, mon frère n’allait pas mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais je sais que, maintenant encore, Dieu te répondra. Dieu fera tout ce que tu lui demandes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus lui a dit : Ton frère deviendra à nouveau vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Marthe a répondu : Je sais qu’il va devenir encore vivant le dernier jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus lui a dit : C’est moi qui ressuscite les morts. Je fais vivre les gens. Toute personne qui croit en moi, vivra. Même si cette personne meurt, elle vivra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Certaines personnes vont vivre et croire en moi. Toute personne qui fait cela ne mourra jamais. Crois‑tu cela ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Elle a répondu : Oui, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', je crois que tu es le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', le Fils de Dieu. Tu es l’homme que Dieu a promis d’envoyer dans le monde.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus pleure
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Après cela, Marthe est allée chez elle. Elle a parlé en secret à sa sœur, Marie. Marthe a dit : Le Maître est ici, et il te demande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Marie a entendu cela. Elle s’est levée. Elle a couru à la rencontre de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus n’était pas encore arrivé dans le village. Il était toujours à l’endroit où Marthe l’avait rencontré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient dans la maison pour les consoler. Ils ont vu Marie se lever rapidement. Ils ont vu Marie sortir et ils la suivaient. Ils pensaient qu’elle allait au tombeau pour pleurer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Marie est arrivée à l’endroit où était Jésus. Elle a vu Jésus, elle est tombée à ses pieds. Elle a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', si tu étais ici, mon frère n’allait pas mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus a vu que Marie pleurait. Certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient venus avec elle. Ils pleuraient aussi. Jésus les a vus. Il se sentait très triste dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Il était très triste pour eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il leur a demandé : Où avez‑vous mis son corps mort ? Ils ont répondu : Viens et vois, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus a pleuré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' se sont dit ceci : Voyez combien il aimait Lazare ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais certains d’entre eux disaient : Il a ouvert les yeux de l’homme qui ne pouvait pas voir. Alors, certes, il devait empêcher Lazare de mourir.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus fait revivre Lazare
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus se sentait très triste à nouveau. Alors il est allé au tombeau. C’était un grand trou dans la roche. Une très grosse pierre a couvert le chemin vers le trou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus a dit : Enlevez la pierre. Marthe, la sœur du mort a dit à Jésus : Mais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', son corps aura une mauvaise odeur. Il est mort depuis 4 jours ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus lui a dit : Je t’ai dit que tu dois croire. Puis tu verras à quel point et comment Dieu est puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ils ont donc enlevé la pierre. Jésus a levé les yeux vers le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Il a dit : Père, je te remercie de ce que tu m’as écouté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Je sais que tu m’écoutes toujours. Mais je dis cela à cause de tous les gens qui sont ici présents. Je veux qu’ils croient que tu m’as envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Quand Jésus a dit cela, il a crié d’une voix forte : Lazare, sors ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'L’homme mort est sorti. Il y avait des morceaux de tissu autour de ses mains et ses pieds. Un autre morceau de tissu était autour de son visage. Jésus leur a dit : Déliez‑le et laissez‑le aller.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' décident comment tuer Jésus'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Bon nombre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient venus visiter Marie. Ils ont vu ce que Jésus a fait. Donc, ils ont cru en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mais certains d’entre eux se sont rendus auprès des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Ils ont dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ce que Jésus avait fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' ont fait une réunion. Ils se sont dit ceci : Que ferons‑nous ? Cet homme fait beaucoup de miracles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Si nous le laissons faire plus de choses comme ça, tout le monde va croire en lui. Puis les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' viendront. Et ils vont détruire notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: . Ils vont tuer notre peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'L’un d’eux s’appelait Caïphe. Il était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' cette année. Il a dit : Vous ne comprenez pas le problème. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Il est préférable qu’un seul homme meure au nom du peuple. Cela vaut mieux que si tous les habitants de notre pays meurent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Caïphe n’a pas dit cela de lui‑même. Non, il parlait comme un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' parce qu’il était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' cette année. Il parlait comme un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' que Jésus devra mourir au nom du peuple d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Et Jésus mourra non seulement pour le peuple d’Israël. En '
  - type: usfm
    marker: w
    children:
    - type: text
      text: outre
  - type: text
    text: ', sa mort réunira tous les saints qui ont vécu dans de nombreux endroits différents. Ils deviendront comme une grande famille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'A partir de ce jour‑là, les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' ont décidé ensemble comment ils pourraient tuer Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Alors, Jésus a cessé de voyager en Judée où tout le monde pouvait le voir. Au lieu de cela, il est parti secrètement dans une ville appelée Ephraïm. Elle était près du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. Il est resté là avec les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'C’était presque le moment pour la fête de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. Beaucoup de gens venaient de leurs pays vers Jérusalem. Ils allaient se purifier et se mettaient prêts pour Dieu. C’était avant de se rendre à la fête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ils cherchaient Jésus. Ils étaient dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ils se demandaient : Pensez‑vous qu’il viendra à la fête ou non ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' parlaient aux gens de Jésus. Ils leur disaient : Si quelqu’un sait là où est Jésus, il peut nous le dire. Ainsi, nous pourrons l’attraper.'
