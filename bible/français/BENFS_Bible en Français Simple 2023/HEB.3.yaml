document_id: HEB.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Jésus est plus grand que Moïse
  - type: text
    content: 'Alors, mes amis chrétiens, réfléchissez bien sur ce que Jésus est. Comme nous, Dieu vous a choisis pour lui appartenir. Nous disons aux gens que nous croyons en Jésus comme le messager que Dieu a envoyé. Il nous aide en tant que '
  - type: text
    content: prêtre
  - type: text
    content: ' le plus important de Dieu. '
  '10':
  - type: text
    content: C’est pourquoi je me suis mis en colère contre eux.
  - type: text
    content: 'J’ai dit : Ils veulent toujours faire ce qui ne va pas.'
  - type: text
    content: Ils refusent de comprendre mon message.
  '11':
  - type: text
    content: C’est pourquoi, j’ai promis de les punir.
  - type: text
    content: 'Parce que j’étais en colère contre eux, j’ai dit :'
  - type: text
    content: Ils n’arriveront jamais dans mon lieu spécial de repos.
  '12':
  - type: text
    content: 'Soyez donc prudents, mes amis chrétiens. Ne refusez pas de faire confiance en Dieu. Ce sera une très mauvaise chose à faire. Ne vous détournez pas de Dieu, qui vit éternellement. '
  '13':
  - type: text
    content: 'Au lieu de cela, aidez‑vous les uns les autres à être forts chaque jour. Aujourd’hui, vous pouvez toujours entendre le message de Dieu. Bien que cela soit toujours vrai, ne refusez pas d’obéir à Dieu. Ne pensez pas que le péché ne vous fera pas de mal. C’est un mensonge. '
  '14':
  - type: text
    content: Nous devons continuer à faire très bien confiance en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', comme nous l’avons fait lorsque nous avons cru en lui pour la première fois. Nous devons continuer à lui faire confiance jusqu’à la fin de nos vies. Ensuite, nous partagerons tout ce qui lui appartient. '
  '15':
  - type: text
    content: 'Nous avons vu ce que la Bible dit :'
  - type: text
    content: Vous devez écouter quand vous entendez Dieu parler aujourd’hui.
  - type: text
    content: Ne refusez pas de lui obéir.
  - type: text
    content: Ne soyez pas comme le peuple de Dieu, il y a de nombreuses années,
  - type: text
    content: Quand il est devenu contre Dieu.
  '16':
  - type: text
    content: 'Qui étaient ces gens qui avaient entendu Dieu parler ? Tous étaient les gens que Moïse avait emmenés d’Égypte. Ils ont entendu le message de Dieu, mais ils ont refusé de lui obéir. '
  '17':
  - type: text
    content: 'Contre qui Dieu était en colère pendant 40 ans ? Il était en colère contre ces mêmes gens. Ils ont fait ce qui n’allait pas. Ils sont donc morts et leurs corps sont restés dans le '
  - type: text
    content: désert
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Dieu leur a promis de les punir, parce qu’ils refusaient de lui obéir. Il a dit : Ils n’arriveront jamais dans mon lieu de repos spécial.'
  '19':
  - type: text
    content: Nous devons donc faire attention nous‑mêmes ! Ces gens ne faisaient pas confiance à Dieu. En conséquence, ils ne sont jamais arrivés à la place spéciale de Dieu.
  '2':
  - type: text
    content: 'Dieu a envoyé Jésus pour faire cela. Jésus a fait tout ce que Dieu voulait, tout comme Moïse. Moïse a bien servi Dieu quand il était le chef du peuple de Dieu, il y a longtemps. '
  '3':
  - type: text
    content: 'Nous savons que quelqu’un qui construit une maison est plus important que la maison elle‑même. De la même manière, nous devons louer Jésus plus que Moïse. C’est puisque Jésus est plus grand que Moïse. '
  '4':
  - type: text
    content: 'Chaque maison a quelqu’un qui l’a construite. Mais Dieu est celui qui a fait toutes choses. '
  '5':
  - type: text
    content: 'Nous disons que Moïse a bien servi Dieu, comme un serviteur dans la maison de Dieu. Il a pris soin de tout le peuple de Dieu. De cette façon, Moïse a clairement montré le message que Dieu pourrait dire dans le futur. '
  '6':
  - type: text
    content: Mais Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' sert dans la maison de Dieu comme fils, non comme serviteur. Il est le chef du peuple de Dieu aujourd’hui. Et nous sommes le peuple de Dieu. Nous appartenons à sa maison si nous continuons de croire en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Nous devons être courageux. Nous devons continuer à montrer clairement aux gens que nous avons confiance en Dieu. Il fera ce qu’il a promis de faire.
  - type: heading
    content: Un endroit où le peuple de Dieu peut se reposer
  '7':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu dit ceci :'
  - type: text
    content: Vous devez écouter quand vous entendez Dieu parler aujourd’hui.
  '8':
  - type: text
    content: Ne refusez pas de lui obéir.
  - type: text
    content: Ne soyez pas comme le peuple de Dieu, il y a de nombreuses années.
  - type: text
    content: 'Quand ces gens ont voyagé dans le '
  - type: text
    content: désert
  - type: text
    content: ', ils sont devenus contre moi.'
  - type: text
    content: Ils voulaient voir si je les punirais.
  '9':
  - type: text
    content: Pendant 40 ans, vos ancêtres ont vu les grandes choses que j’ai faites.
  - type: text
    content: Mais ils ne m’obéissaient pas toujours.
