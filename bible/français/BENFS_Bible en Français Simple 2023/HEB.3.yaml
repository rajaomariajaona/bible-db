document_id: HEB.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est plus grand que Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors, mes amis chrétiens, réfléchissez bien sur ce que Jésus est. Comme nous, Dieu vous a choisis pour lui appartenir. Nous disons aux gens que nous croyons en Jésus comme le messager que Dieu a envoyé. Il nous aide en tant que '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' le plus important de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dieu a envoyé Jésus pour faire cela. Jésus a fait tout ce que Dieu voulait, tout comme Moïse. Moïse a bien servi Dieu quand il était le chef du peuple de Dieu, il y a longtemps. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous savons que quelqu’un qui construit une maison est plus important que la maison elle‑même. De la même manière, nous devons louer Jésus plus que Moïse. C’est puisque Jésus est plus grand que Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Chaque maison a quelqu’un qui l’a construite. Mais Dieu est celui qui a fait toutes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous disons que Moïse a bien servi Dieu, comme un serviteur dans la maison de Dieu. Il a pris soin de tout le peuple de Dieu. De cette façon, Moïse a clairement montré le message que Dieu pourrait dire dans le futur. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sert dans la maison de Dieu comme fils, non comme serviteur. Il est le chef du peuple de Dieu aujourd’hui. Et nous sommes le peuple de Dieu. Nous appartenons à sa maison si nous continuons de croire en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Nous devons être courageux. Nous devons continuer à montrer clairement aux gens que nous avons confiance en Dieu. Il fera ce qu’il a promis de faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un endroit où le peuple de Dieu peut se reposer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous devez écouter quand vous entendez Dieu parler aujourd’hui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne refusez pas de lui obéir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne soyez pas comme le peuple de Dieu, il y a de nombreuses années.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand ces gens ont voyagé dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: ', ils sont devenus contre moi.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils voulaient voir si je les punirais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pendant 40 ans, vos ancêtres ont vu les grandes choses que j’ai faites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils ne m’obéissaient pas toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est pourquoi je me suis mis en colère contre eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’ai dit : Ils veulent toujours faire ce qui ne va pas.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils refusent de comprendre mon message.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est pourquoi, j’ai promis de les punir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce que j’étais en colère contre eux, j’ai dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’arriveront jamais dans mon lieu spécial de repos.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Soyez donc prudents, mes amis chrétiens. Ne refusez pas de faire confiance en Dieu. Ce sera une très mauvaise chose à faire. Ne vous détournez pas de Dieu, qui vit éternellement. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au lieu de cela, aidez‑vous les uns les autres à être forts chaque jour. Aujourd’hui, vous pouvez toujours entendre le message de Dieu. Bien que cela soit toujours vrai, ne refusez pas d’obéir à Dieu. Ne pensez pas que le péché ne vous fera pas de mal. C’est un mensonge. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nous devons continuer à faire très bien confiance en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', comme nous l’avons fait lorsque nous avons cru en lui pour la première fois. Nous devons continuer à lui faire confiance jusqu’à la fin de nos vies. Ensuite, nous partagerons tout ce qui lui appartient. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous avons vu ce que la Bible dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous devez écouter quand vous entendez Dieu parler aujourd’hui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne refusez pas de lui obéir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne soyez pas comme le peuple de Dieu, il y a de nombreuses années,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il est devenu contre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Qui étaient ces gens qui avaient entendu Dieu parler ? Tous étaient les gens que Moïse avait emmenés d’Égypte. Ils ont entendu le message de Dieu, mais ils ont refusé de lui obéir. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Contre qui Dieu était en colère pendant 40 ans ? Il était en colère contre ces mêmes gens. Ils ont fait ce qui n’allait pas. Ils sont donc morts et leurs corps sont restés dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dieu leur a promis de les punir, parce qu’ils refusaient de lui obéir. Il a dit : Ils n’arriveront jamais dans mon lieu de repos spécial.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nous devons donc faire attention nous‑mêmes ! Ces gens ne faisaient pas confiance à Dieu. En conséquence, ils ne sont jamais arrivés à la place spéciale de Dieu.
