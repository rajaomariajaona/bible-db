document_id: ACT.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce qui est arrivé à Ananias et à Saphira
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mais il y avait un homme appelé Ananias. Son épouse s’appelait Saphira. Ils ont ensemble vendu un champ. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ananias a donné une partie de l’argent qu’il avait reçu aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: . Mais il a également gardé une partie de l’argent pour lui‑même. Saphira savait tout ce qu’Ananias avait fait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pierre a dit à Ananias : Satan a voulu que tu mentes. Et tu lui as obéi. Tu ne devrais pas l’écouter. Tu ne devrais pas dire au Saint‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' un mensonge. Tu as vendu ton champ, mais tu ne nous as pas donné tout l’argent. Tu as gardé une partie d’argent pour toi‑même. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avant que tu vendes le champ, il était à toi. Et après que tu as vendu le champ, l’argent était à toi. Tu ne devrais pas dire que c’était tout l’argent. Tu as non seulement dit aux hommes un mensonge. Tu as dit aussi à Dieu un mensonge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dès qu’il a entendu Pierre dire ceci, Ananias est tombé par terre immédiatement. Et il est mort. Ceci a fait peur à chacun qui a entendu parler de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quelques jeunes hommes sont venus dans la salle. Ils ont mis des tissus autour du corps mort d’Ananias. Ils l’ont amené dehors. Alors ils l’ont enterré.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Environ 3 heures après, l’épouse d’Ananias, Saphira est entrée dans la salle pour voir Pierre. Saphira n’a pas su qu’Ananias est déjà mort. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pierre a demandé à Saphira : Parle‑moi de cet argent que vous nous avez donné. Est‑ce que c’était tout l’argent que toi et ton mari avez reçu pour votre champ ? Saphira a répondu : Oui, c’était tout l’argent que nous avons reçu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pierre lui a dit : Toi et ton mari, vous avez mal fait. Vous ne devriez pas mentir à Dieu. Vous saviez que c’était faux. Les hommes qui viennent tout juste d’enterrer ton mari sont à la porte encore maintenant. Et ils t’amèneront également dehors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Immédiatement, Saphira est tombée par terre devant Pierre et elle est morte. Alors les jeunes hommes sont entrés dans la salle. Ils ont vu que Saphira est morte. Ainsi ils ont amené son corps à l’extérieur. Ils l’ont enterré à côté de son mari. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les croyants et beaucoup d’autres personnes ont entendu ce qui était arrivé à Ananias et à Saphira. Ils avaient tous peur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' font quelque chose de puissant pour que le peuple voie'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' faisaient beaucoup de choses puissantes devant le peuple. Ils se réunissaient en dehors du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. On appelait cet endroit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Portique de Salomon
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: D’autres gens n’entraient pas dans leur groupe. Ils avaient peur de faire cela. Mais beaucoup de gens disaient de bonnes choses au sujet des croyants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De plus en plus de gens devenaient croyants. Ils s’ajoutaient au groupe. De nombreux hommes et femmes croyaient en Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Des gens amenaient des malades dans les rues. Ils les mettaient sur des lits et des nattes. Ils faisaient ceci à cause de toutes les choses spéciales que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' faisaient. Certains voulaient seulement voir l’ombre de Pierre passer au‑dessus de leurs malades.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'De nombreuses personnes venaient à Jérusalem. Elles venaient des villes proches de Jérusalem. Elles amenaient également des malades avec elles. Elles emmenaient d’autres personnes aussi. Les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' étaient à l’intérieur d’elles. Ils les troublaient. Et Dieu guérissait tous les malades.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' entrent dans une prison'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tous les gens aimaient les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. Et ils aimaient ce que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' faisaient. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' et ses associés (une partie des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadducéens
  - type: text
    text: ') étaient jaloux. Ainsi ils ont décidé de faire quelque chose contre les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils ont donc attrapé les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. Ils les ont aussi mis en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais pendant la nuit, un des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' de Dieu a ouvert les portes de la prison. Il a conduit les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' dehors. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' leur a dit : '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Allez et mettez‑vous dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: . Dites aux gens tout sur cette nouvelle vie que Dieu donne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' ont entendu l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' et lui ont obéi. Tôt le matin, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' sont entrés dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ils ont commencé à enseigner le peuple. Mais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' et ses compagnons sont arrivés. Ils ont appelé les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '. Ils ont aussi appelé les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' d’Israël. C’était pour faire une réunion ensemble. Alors ils ont envoyé des gens à la prison. C’était pour amener les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' à cette réunion. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après un temps, les gens envoyés sont arrivés à la prison. Mais ils n’ont pas trouvé les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' là. Alors ces gens sont revenus donner leur rapport. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils ont dit ceci : Nous sommes arrivés à la prison. Nous avons vu que les gardes avaient bien fermé les portes. Ils se tenaient aux portes et ils gardaient la prison. Après un temps, nous avons ouvert les portes de la prison. Nous n’avons trouvé aucun de ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' à l’intérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le commandant des gardes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' a entendu cela. Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' ont aussi entendu cela. Ils ont dit : Nous ne pouvons pas comprendre ce qui est arrivé aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Alors un homme est venu. Il leur a apporté un message.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il a dit : Ecoutez‑moi. Ces hommes que vous avez mis en prison sont maintenant dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ils enseignent les gens là. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le commandant est alors allé au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ses policiers sont allés avec lui. Le commandant a dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '  : Revenez avec nous ! Les policiers n’ont pas fait de mal aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: . Ils n’ont pas lié leurs bras et jambes. Ils avaient peur du peuple. Ils pensaient que le peuple pourrait jeter des pierres sur eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les policiers ont introduit les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' dans la salle. Ils les ont amenés devant les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' a parlé aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il a dit ceci : Nous vous avons commandé de ne plus enseigner le peuple au nom de Jésus. Mais voyez maintenant ce que vous avez fait ! Maintenant les gens partout à Jérusalem vous entendaient enseigner. Et vous disiez au peuple que nous avons ordonné la mort de Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pierre et les autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' ont répondu : Nous devons obéir à Dieu plutôt qu’aux hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dieu de nos ancêtres a rendu Jésus vivant encore. Vous avez mis Jésus sur une croix et vous l’avez tué. Mais, Dieu l’a rendu vivant encore. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dieu a ressuscité Jésus et l’a placé à son plus important endroit, son côté droit. Jésus est maintenant celui qui nous guide. Il est aussi celui qui nous sauve. Il aide le peuple d’Israël à dire : Nous regrettons devant Dieu les mauvaises choses que nous faisons. Alors Dieu leur pardonne et il les aide à faire de bonnes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nous disons aux gens ce que nous avons vu et entendu. Il donne son Saint‑Esprit aux gens qui lui obéissent. Et le Saint‑Esprit dit également aux gens ce que Dieu a fait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' ont entendu ce que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' leur ont dit. Ils étaient très fâchés. Alors ils ont voulu tuer les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais un homme n’a pas accepté cela. Il s’est levé devant les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '. Son nom était Gamaliel. Il était un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisien
  - type: text
    text: ', un enseignant de la loi. Tous les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' aimaient Gamaliel. Et ils pensaient qu’il était un homme bon. Gamaliel a demandé aux policiers d’amener les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' hors de la salle. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Quand ils sont allés, Gamaliel a dit aux hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '  : Hommes d’Israël ! Il a dit : Faites attention au sujet de ce que vous voulez faire. Pensez encore avant de tuer ces hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Rappelez‑vous ce qui est arrivé à Theudas, il y a quelques années. Cet homme disait : Je suis un chef très important. Alors environ 400 hommes sont venus se joindre à son groupe. Après un temps, quelqu’un a tué Theudas. Alors ses hommes sont tous allés loin dans différentes directions. Personne n’entend plus parler d’eux maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Rappelez‑vous ce qui est arrivé à Judas de Galilée. Cet homme est apparu quand les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' comptaient le peuple. Une foule est également venue pour aider Judas, mais quelqu’un l’a tué. Les hommes qui suivaient également Judas sont allés loin dans différentes directions. Personne n’entend plus parler de l’un ou l’autre maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ce temps, cette même chose se produit encore avec ces hommes. Alors ne faites rien de mauvais à ces gens. Laissez‑les aller. Peut‑être ces hommes font ce qu’un certain homme leur a dit de faire. Si c’est vrai, alors leur travail échouera. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mais peut‑être Dieu a dit qu’ils doivent effectuer ce travail. Et si c’est vrai, alors vous ne pouvez pas les arrêter. Ne vous mettez pas en guerre contre Dieu !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ainsi les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' ont suivi le conseil de Gamaliel. Ils ont alors dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' de retourner dans la salle. Alors ils ont dit aux policiers de les frapper avec des fouets ! Alors les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' ont dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '  : Vous ne devez plus enseigner le peuple. N’utilisez plus le pouvoir de Jésus. Après cela, ils ont laissé les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: . Ils sont allés encore dans la rue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ainsi les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' ont quitté les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '. Ils étaient très heureux, parce qu’ils pensaient comme ceci : Nous sommes jugés dignes de recevoir la punition en raison de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ainsi ils continuaient d’enseigner les gens au sujet de Jésus. Ils parlaient chaque jour dans les maisons des gens et dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ils disaient au peuple que Jésus est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', le serviteur spécial de Dieu. Ainsi les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' disaient aux gens la Bonne Nouvelle au sujet de Jésus.'
