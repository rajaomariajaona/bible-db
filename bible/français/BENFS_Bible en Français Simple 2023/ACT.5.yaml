document_id: ACT.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Ce qui est arrivé à Ananias et à Saphira
  - type: text
    content: 'Mais il y avait un homme appelé Ananias. Son épouse s’appelait Saphira. Ils ont ensemble vendu un champ. '
  '10':
  - type: text
    content: 'Immédiatement, Saphira est tombée par terre devant Pierre et elle est morte. Alors les jeunes hommes sont entrés dans la salle. Ils ont vu que Saphira est morte. Ainsi ils ont amené son corps à l’extérieur. Ils l’ont enterré à côté de son mari. '
  '11':
  - type: text
    content: Tous les croyants et beaucoup d’autres personnes ont entendu ce qui était arrivé à Ananias et à Saphira. Ils avaient tous peur.
  - type: heading
    content: Les apôtres font quelque chose de puissant pour que le peuple voie
  '12':
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' faisaient beaucoup de choses puissantes devant le peuple. Ils se réunissaient en dehors du '
  - type: text
    content: Temple
  - type: text
    content: '. On appelait cet endroit '
  - type: text
    content: Portique de Salomon
  - type: text
    content: '. '
  '13':
  - type: text
    content: D’autres gens n’entraient pas dans leur groupe. Ils avaient peur de faire cela. Mais beaucoup de gens disaient de bonnes choses au sujet des croyants.
  '14':
  - type: text
    content: 'De plus en plus de gens devenaient croyants. Ils s’ajoutaient au groupe. De nombreux hommes et femmes croyaient en Jésus. '
  '15':
  - type: text
    content: 'Des gens amenaient des malades dans les rues. Ils les mettaient sur des lits et des nattes. Ils faisaient ceci à cause de toutes les choses spéciales que les '
  - type: text
    content: apôtres
  - type: text
    content: ' faisaient. Certains voulaient seulement voir l’ombre de Pierre passer au‑dessus de leurs malades.'
  '16':
  - type: text
    content: 'De nombreuses personnes venaient à Jérusalem. Elles venaient des villes proches de Jérusalem. Elles amenaient également des malades avec elles. Elles emmenaient d’autres personnes aussi. Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' étaient à l’intérieur d’elles. Ils les troublaient. Et Dieu guérissait tous les malades.'
  - type: heading
    content: Les apôtres entrent dans une prison
  '17':
  - type: text
    content: 'Tous les gens aimaient les '
  - type: text
    content: apôtres
  - type: text
    content: '. Et ils aimaient ce que les '
  - type: text
    content: apôtres
  - type: text
    content: ' faisaient. Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' et ses associés (une partie des '
  - type: text
    content: Sadducéens
  - type: text
    content: ') étaient jaloux. Ainsi ils ont décidé de faire quelque chose contre les '
  - type: text
    content: apôtres
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Ils ont donc attrapé les '
  - type: text
    content: apôtres
  - type: text
    content: '. Ils les ont aussi mis en prison. '
  '19':
  - type: text
    content: 'Mais pendant la nuit, un des '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu a ouvert les portes de la prison. Il a conduit les '
  - type: text
    content: apôtres
  - type: text
    content: ' dehors. L’'
  - type: text
    content: ange
  - type: text
    content: ' leur a dit : '
  '2':
  - type: text
    content: 'Ananias a donné une partie de l’argent qu’il avait reçu aux '
  - type: text
    content: apôtres
  - type: text
    content: . Mais il a également gardé une partie de l’argent pour lui‑même. Saphira savait tout ce qu’Ananias avait fait.
  '20':
  - type: text
    content: 'Allez et mettez‑vous dans le '
  - type: text
    content: Temple
  - type: text
    content: . Dites aux gens tout sur cette nouvelle vie que Dieu donne.
  '21':
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' ont entendu l’'
  - type: text
    content: ange
  - type: text
    content: ' et lui ont obéi. Tôt le matin, les '
  - type: text
    content: apôtres
  - type: text
    content: ' sont entrés dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils ont commencé à enseigner le peuple. Mais le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' et ses compagnons sont arrivés. Ils ont appelé les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. Ils ont aussi appelé les '
  - type: text
    content: anciens
  - type: text
    content: ' d’Israël. C’était pour faire une réunion ensemble. Alors ils ont envoyé des gens à la prison. C’était pour amener les '
  - type: text
    content: apôtres
  - type: text
    content: ' à cette réunion. '
  '22':
  - type: text
    content: 'Après un temps, les gens envoyés sont arrivés à la prison. Mais ils n’ont pas trouvé les '
  - type: text
    content: apôtres
  - type: text
    content: ' là. Alors ces gens sont revenus donner leur rapport. '
  '23':
  - type: text
    content: 'Ils ont dit ceci : Nous sommes arrivés à la prison. Nous avons vu que les gardes avaient bien fermé les portes. Ils se tenaient aux portes et ils gardaient la prison. Après un temps, nous avons ouvert les portes de la prison. Nous n’avons trouvé aucun de ces '
  - type: text
    content: apôtres
  - type: text
    content: ' à l’intérieur. '
  '24':
  - type: text
    content: 'Le commandant des gardes du '
  - type: text
    content: Temple
  - type: text
    content: ' a entendu cela. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont aussi entendu cela. Ils ont dit : Nous ne pouvons pas comprendre ce qui est arrivé aux '
  - type: text
    content: apôtres
  - type: text
    content: '. '
  '25':
  - type: text
    content: Alors un homme est venu. Il leur a apporté un message.
  - type: text
    content: 'Il a dit : Ecoutez‑moi. Ces hommes que vous avez mis en prison sont maintenant dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils enseignent les gens là. '
  '26':
  - type: text
    content: 'Le commandant est alors allé au '
  - type: text
    content: Temple
  - type: text
    content: '. Ses policiers sont allés avec lui. Le commandant a dit aux '
  - type: text
    content: apôtres
  - type: text
    content: '  : Revenez avec nous ! Les policiers n’ont pas fait de mal aux '
  - type: text
    content: apôtres
  - type: text
    content: . Ils n’ont pas lié leurs bras et jambes. Ils avaient peur du peuple. Ils pensaient que le peuple pourrait jeter des pierres sur eux.
  '27':
  - type: text
    content: 'Les policiers ont introduit les '
  - type: text
    content: apôtres
  - type: text
    content: ' dans la salle. Ils les ont amenés devant les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' a parlé aux '
  - type: text
    content: apôtres
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Il a dit ceci : Nous vous avons commandé de ne plus enseigner le peuple au nom de Jésus. Mais voyez maintenant ce que vous avez fait ! Maintenant les gens partout à Jérusalem vous entendaient enseigner. Et vous disiez au peuple que nous avons ordonné la mort de Jésus.'
  '29':
  - type: text
    content: 'Pierre et les autres '
  - type: text
    content: apôtres
  - type: text
    content: ' ont répondu : Nous devons obéir à Dieu plutôt qu’aux hommes. '
  '3':
  - type: text
    content: 'Pierre a dit à Ananias : Satan a voulu que tu mentes. Et tu lui as obéi. Tu ne devrais pas l’écouter. Tu ne devrais pas dire au Saint‑'
  - type: text
    content: Esprit
  - type: text
    content: ' un mensonge. Tu as vendu ton champ, mais tu ne nous as pas donné tout l’argent. Tu as gardé une partie d’argent pour toi‑même. '
  '30':
  - type: text
    content: 'Dieu de nos ancêtres a rendu Jésus vivant encore. Vous avez mis Jésus sur une croix et vous l’avez tué. Mais, Dieu l’a rendu vivant encore. '
  '31':
  - type: text
    content: 'Dieu a ressuscité Jésus et l’a placé à son plus important endroit, son côté droit. Jésus est maintenant celui qui nous guide. Il est aussi celui qui nous sauve. Il aide le peuple d’Israël à dire : Nous regrettons devant Dieu les mauvaises choses que nous faisons. Alors Dieu leur pardonne et il les aide à faire de bonnes choses. '
  '32':
  - type: text
    content: Nous disons aux gens ce que nous avons vu et entendu. Il donne son Saint‑Esprit aux gens qui lui obéissent. Et le Saint‑Esprit dit également aux gens ce que Dieu a fait.
  '33':
  - type: text
    content: 'Les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' ont entendu ce que les '
  - type: text
    content: apôtres
  - type: text
    content: ' leur ont dit. Ils étaient très fâchés. Alors ils ont voulu tuer les '
  - type: text
    content: apôtres
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Mais un homme n’a pas accepté cela. Il s’est levé devant les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. Son nom était Gamaliel. Il était un '
  - type: text
    content: Pharisien
  - type: text
    content: ', un enseignant de la loi. Tous les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' aimaient Gamaliel. Et ils pensaient qu’il était un homme bon. Gamaliel a demandé aux policiers d’amener les '
  - type: text
    content: apôtres
  - type: text
    content: ' hors de la salle. '
  '35':
  - type: text
    content: 'Quand ils sont allés, Gamaliel a dit aux hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '  : Hommes d’Israël ! Il a dit : Faites attention au sujet de ce que vous voulez faire. Pensez encore avant de tuer ces hommes. '
  '36':
  - type: text
    content: 'Rappelez‑vous ce qui est arrivé à Theudas, il y a quelques années. Cet homme disait : Je suis un chef très important. Alors environ 400 hommes sont venus se joindre à son groupe. Après un temps, quelqu’un a tué Theudas. Alors ses hommes sont tous allés loin dans différentes directions. Personne n’entend plus parler d’eux maintenant. '
  '37':
  - type: text
    content: 'Rappelez‑vous ce qui est arrivé à Judas de Galilée. Cet homme est apparu quand les '
  - type: text
    content: Romains
  - type: text
    content: ' comptaient le peuple. Une foule est également venue pour aider Judas, mais quelqu’un l’a tué. Les hommes qui suivaient également Judas sont allés loin dans différentes directions. Personne n’entend plus parler de l’un ou l’autre maintenant. '
  '38':
  - type: text
    content: 'Ce temps, cette même chose se produit encore avec ces hommes. Alors ne faites rien de mauvais à ces gens. Laissez‑les aller. Peut‑être ces hommes font ce qu’un certain homme leur a dit de faire. Si c’est vrai, alors leur travail échouera. '
  '39':
  - type: text
    content: Mais peut‑être Dieu a dit qu’ils doivent effectuer ce travail. Et si c’est vrai, alors vous ne pouvez pas les arrêter. Ne vous mettez pas en guerre contre Dieu !
  '4':
  - type: text
    content: Avant que tu vendes le champ, il était à toi. Et après que tu as vendu le champ, l’argent était à toi. Tu ne devrais pas dire que c’était tout l’argent. Tu as non seulement dit aux hommes un mensonge. Tu as dit aussi à Dieu un mensonge.
  '40':
  - type: text
    content: 'Ainsi les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' ont suivi le conseil de Gamaliel. Ils ont alors dit aux '
  - type: text
    content: apôtres
  - type: text
    content: ' de retourner dans la salle. Alors ils ont dit aux policiers de les frapper avec des fouets ! Alors les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' ont dit aux '
  - type: text
    content: apôtres
  - type: text
    content: '  : Vous ne devez plus enseigner le peuple. N’utilisez plus le pouvoir de Jésus. Après cela, ils ont laissé les '
  - type: text
    content: apôtres
  - type: text
    content: . Ils sont allés encore dans la rue.
  '41':
  - type: text
    content: 'Ainsi les '
  - type: text
    content: apôtres
  - type: text
    content: ' ont quitté les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. Ils étaient très heureux, parce qu’ils pensaient comme ceci : Nous sommes jugés dignes de recevoir la punition en raison de Jésus. '
  '42':
  - type: text
    content: 'Ainsi ils continuaient d’enseigner les gens au sujet de Jésus. Ils parlaient chaque jour dans les maisons des gens et dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils disaient au peuple que Jésus est le '
  - type: text
    content: Christ
  - type: text
    content: ', le serviteur spécial de Dieu. Ainsi les '
  - type: text
    content: apôtres
  - type: text
    content: ' disaient aux gens la Bonne Nouvelle au sujet de Jésus.'
  '5':
  - type: text
    content: 'Dès qu’il a entendu Pierre dire ceci, Ananias est tombé par terre immédiatement. Et il est mort. Ceci a fait peur à chacun qui a entendu parler de lui. '
  '6':
  - type: text
    content: Quelques jeunes hommes sont venus dans la salle. Ils ont mis des tissus autour du corps mort d’Ananias. Ils l’ont amené dehors. Alors ils l’ont enterré.
  '7':
  - type: text
    content: 'Environ 3 heures après, l’épouse d’Ananias, Saphira est entrée dans la salle pour voir Pierre. Saphira n’a pas su qu’Ananias est déjà mort. '
  '8':
  - type: text
    content: 'Pierre a demandé à Saphira : Parle‑moi de cet argent que vous nous avez donné. Est‑ce que c’était tout l’argent que toi et ton mari avez reçu pour votre champ ? Saphira a répondu : Oui, c’était tout l’argent que nous avons reçu.'
  '9':
  - type: text
    content: 'Pierre lui a dit : Toi et ton mari, vous avez mal fait. Vous ne devriez pas mentir à Dieu. Vous saviez que c’était faux. Les hommes qui viennent tout juste d’enterrer ton mari sont à la porte encore maintenant. Et ils t’amèneront également dehors.'
