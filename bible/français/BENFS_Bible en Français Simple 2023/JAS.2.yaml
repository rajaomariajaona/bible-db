document_id: JAS.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Chaque personne a une valeur égale
  - type: text
    content: 'Mes amis chrétiens, vous devez être gentils avec tout le monde. Vous faites confiance au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', qui est grand au '
  - type: text
    content: ciel
  - type: text
    content: . Alors, ne pensez pas que quelqu’un a plus de valeur que n’importe quelle autre personne.
  '10':
  - type: text
    content: Même si vous ne respectez pas un seul commandement de la loi de Dieu, cela signifie que vous êtes fautifs. C’est la même chose que si vous n’obéissez pas à toute la loi de Dieu.
  '11':
  - type: text
    content: 'Par exemple, Dieu a dit dans sa loi : Tu ne dois pas avoir de relations sexuelles avec quelqu’un qui n’est ni ton mari ni ta femme. Mais Dieu a également dit : Ne tue pas une autre personne. Peut‑être que tu n’as pas fait de relations sexuelles comme ça. Mais si tu tues alors quelqu’un, la loi de Dieu montre que tu as fait un mal.'
  '12':
  - type: text
    content: Souvenez‑vous que Dieu vous jugera un jour. Quand il le fera, il utilisera une loi qui nous rend libres. Alors, souvenez‑vous de cela dans tout ce que vous dites et dans tout ce que vous faites.
  '13':
  - type: text
    content: 'Dieu ne pardonnera à personne qui n’a pas pardonné aux autres. Mais Dieu est bon ! Il nous '
  - type: text
    content: juge
  - type: text
    content: ', mais plus encore, il nous pardonne !'
  - type: heading
    content: Croyez en Dieu et faites de bonnes choses
  '14':
  - type: text
    content: 'Mes frères chrétiens, vous dites que vous croyez en Dieu. Ensuite, vous devez le montrer dans les choses que vous faites. Sinon, votre '
  - type: text
    content: foi
  - type: text
    content: ' ne vous aidera pas. Cela ne vous sauvera pas.'
  '15':
  - type: text
    content: Par exemple, un croyant ou une croyante n’ont peut‑être pas assez de vêtements à porter. Ils n’ont peut-être pas assez de nourriture à manger.
  '16':
  - type: text
    content: 'Alors l’un de vous peut leur dire : Allez avec la paix de Dieu ! Je prie pour que vous ayez chaud. Je prie pour que vous mangiez bien. Mais si vous ne leur donnez pas ce dont ils ont besoin, cela ne les aide pas du tout.'
  '17':
  - type: text
    content: 'Cela montre la manière dont nous croyons en Dieu. Si notre '
  - type: text
    content: foi
  - type: text
    content: ' ne nous conduit pas à faire de bonnes choses, alors cela ne vaut rien. Elle est morte !'
  '18':
  - type: text
    content: 'Quelqu’un peut dire : Tu crois en Dieu. Mais moi, je fais de bonnes choses pour aider les gens. Je dirais alors : Montre‑moi que tu crois en Dieu sans faire de bonnes choses. Mais moi, je fais de bonnes choses, et cela montre que je crois vraiment en Dieu.'
  '19':
  - type: text
    content: Tu crois qu’il n’y a qu’un seul Dieu. Ça c’est bon ! Mais même les démons croient à cela ! Et cela leur fait très peur.
  '2':
  - type: text
    content: Lorsque vous vous réunissez en tant que croyants, peut‑être que 2 hommes viendront vous rejoindre. L’un d’eux porte de beaux vêtements et il a des bagues en or sur les mains. L’autre homme est pauvre et il porte de vieux vêtements sales.
  '20':
  - type: text
    content: 'Toi imbécile ! Si la '
  - type: text
    content: foi
  - type: text
    content: ' de quelqu’un ne le conduit pas à faire de bonnes choses, cela ne vaut rien. Dois‑je te montrer que c’est vrai ? '
  '21':
  - type: text
    content: Pense à notre ancêtre Abraham. Il a offert son fils Isaac sur l’autel comme cadeau à Dieu. Parce qu’il a fait cette bonne chose, Dieu l’a accepté comme étant juste avec lui‑même.
  '22':
  - type: text
    content: Abraham a cru en Dieu, et il a fait ce que Dieu lui avait demandé de faire. Donc, vous pouvez voir que ces 2 étaient nécessaires. Quand il a fait cette bonne chose, il a montré qu’il croyait complètement en Dieu.
  '23':
  - type: text
    content: 'Cela s’est fait comme la Bible nous dit. Elle dit : Abraham a cru en Dieu. Par conséquent, Dieu a accepté Abraham comme étant juste avec lui. Dieu a également appelé Abraham son ami.'
  '24':
  - type: text
    content: 'Ainsi, vous voyez comment Dieu accepte quelqu’un comme étant juste avec lui‑même. Cette personne ne doit pas seulement croire en Dieu. Elle doit également faire de bonnes choses pour montrer qu’elle a la '
  - type: text
    content: foi
  - type: text
    content: .
  '25':
  - type: text
    content: C’était la même chose avec Rahab, il y a longtemps. C’était une prostituée. Elle a aidé certains des gens de Dieu qui sont venus chez elle. Elle les a protégés de leurs ennemis et les a fait partir par une autre route. Parce qu’elle a fait ces bonnes choses, Dieu l’a acceptée comme étant juste avec lui‑même.
  '26':
  - type: text
    content: Si nos corps n’ont pas d’
  - type: text
    content: esprits
  - type: text
    content: ', ils sont morts. De la même manière, si notre '
  - type: text
    content: foi
  - type: text
    content: ' ne nous conduit pas à faire de bonnes choses, elle est morte.'
  '3':
  - type: text
    content: 'Vous êtes gentils avec l’homme qui porte de beaux vêtements. Vous lui dites : Assieds‑toi ici dans ce bon endroit. Mais vous dites au pauvre homme : Va te tenir là‑bas. Ou vous pouvez lui dire : Assieds‑toi par terre près de mes pieds.'
  '4':
  - type: text
    content: Si vous faites cela, vous pensez mal. Vous avez décidé qu’une personne parmi vous vaut mieux qu’une autre. Vous ne devez pas faire ça.
  '5':
  - type: text
    content: Mes amis chrétiens, écoutez‑moi. Dieu a choisi de bénir les pauvres de ce monde. Il les a aidés à lui faire confiance. Ils sont donc vraiment riches. Dieu leur donnera une place dans son Royaume. Il a promis de le faire pour tous ceux qui l’aiment.
  '6':
  - type: text
    content: 'Mais vous n’avez pas été bons envers les pauvres. Vous leur avez fait honte. Qui vous cause des problèmes ? Ce sont les riches ! Ce sont les gens qui veulent que les '
  - type: text
    content: juges
  - type: text
    content: ' vous punissent.'
  '7':
  - type: text
    content: Ce sont les riches qui disent du mal contre le bon nom de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Et vous vous appelez chrétiens, parce que vous lui appartenez.
  '8':
  - type: text
    content: 'Mais le message du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: ' est le suivant : Aime les autres comme tu t’aimes toi‑même. C’est ce que la Bible dit. Si vous faites vraiment cela, vous faites une bonne chose.'
  '9':
  - type: text
    content: Mais si vous êtes gentils avec certaines personnes et que vous n’êtes pas gentils avec d’autres, alors vous faites une mauvaise chose. La loi de Dieu montre que vous avez tort.
