document_id: JAS.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Chaque personne a une valeur égale
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes amis chrétiens, vous devez être gentils avec tout le monde. Vous faites confiance au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui est grand au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Alors, ne pensez pas que quelqu’un a plus de valeur que n’importe quelle autre personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lorsque vous vous réunissez en tant que croyants, peut‑être que 2 hommes viendront vous rejoindre. L’un d’eux porte de beaux vêtements et il a des bagues en or sur les mains. L’autre homme est pauvre et il porte de vieux vêtements sales.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous êtes gentils avec l’homme qui porte de beaux vêtements. Vous lui dites : Assieds‑toi ici dans ce bon endroit. Mais vous dites au pauvre homme : Va te tenir là‑bas. Ou vous pouvez lui dire : Assieds‑toi par terre près de mes pieds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si vous faites cela, vous pensez mal. Vous avez décidé qu’une personne parmi vous vaut mieux qu’une autre. Vous ne devez pas faire ça.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mes amis chrétiens, écoutez‑moi. Dieu a choisi de bénir les pauvres de ce monde. Il les a aidés à lui faire confiance. Ils sont donc vraiment riches. Dieu leur donnera une place dans son Royaume. Il a promis de le faire pour tous ceux qui l’aiment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais vous n’avez pas été bons envers les pauvres. Vous leur avez fait honte. Qui vous cause des problèmes ? Ce sont les riches ! Ce sont les gens qui veulent que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juges
  - type: text
    text: ' vous punissent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce sont les riches qui disent du mal contre le bon nom de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Et vous vous appelez chrétiens, parce que vous lui appartenez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais le message du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: ' est le suivant : Aime les autres comme tu t’aimes toi‑même. C’est ce que la Bible dit. Si vous faites vraiment cela, vous faites une bonne chose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais si vous êtes gentils avec certaines personnes et que vous n’êtes pas gentils avec d’autres, alors vous faites une mauvaise chose. La loi de Dieu montre que vous avez tort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Même si vous ne respectez pas un seul commandement de la loi de Dieu, cela signifie que vous êtes fautifs. C’est la même chose que si vous n’obéissez pas à toute la loi de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Par exemple, Dieu a dit dans sa loi : Tu ne dois pas avoir de relations sexuelles avec quelqu’un qui n’est ni ton mari ni ta femme. Mais Dieu a également dit : Ne tue pas une autre personne. Peut‑être que tu n’as pas fait de relations sexuelles comme ça. Mais si tu tues alors quelqu’un, la loi de Dieu montre que tu as fait un mal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Souvenez‑vous que Dieu vous jugera un jour. Quand il le fera, il utilisera une loi qui nous rend libres. Alors, souvenez‑vous de cela dans tout ce que vous dites et dans tout ce que vous faites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dieu ne pardonnera à personne qui n’a pas pardonné aux autres. Mais Dieu est bon ! Il nous '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ', mais plus encore, il nous pardonne !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Croyez en Dieu et faites de bonnes choses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mes frères chrétiens, vous dites que vous croyez en Dieu. Ensuite, vous devez le montrer dans les choses que vous faites. Sinon, votre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' ne vous aidera pas. Cela ne vous sauvera pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Par exemple, un croyant ou une croyante n’ont peut‑être pas assez de vêtements à porter. Ils n’ont peut-être pas assez de nourriture à manger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors l’un de vous peut leur dire : Allez avec la paix de Dieu ! Je prie pour que vous ayez chaud. Je prie pour que vous mangiez bien. Mais si vous ne leur donnez pas ce dont ils ont besoin, cela ne les aide pas du tout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cela montre la manière dont nous croyons en Dieu. Si notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' ne nous conduit pas à faire de bonnes choses, alors cela ne vaut rien. Elle est morte !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quelqu’un peut dire : Tu crois en Dieu. Mais moi, je fais de bonnes choses pour aider les gens. Je dirais alors : Montre‑moi que tu crois en Dieu sans faire de bonnes choses. Mais moi, je fais de bonnes choses, et cela montre que je crois vraiment en Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu crois qu’il n’y a qu’un seul Dieu. Ça c’est bon ! Mais même les démons croient à cela ! Et cela leur fait très peur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Toi imbécile ! Si la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' de quelqu’un ne le conduit pas à faire de bonnes choses, cela ne vaut rien. Dois‑je te montrer que c’est vrai ? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pense à notre ancêtre Abraham. Il a offert son fils Isaac sur l’autel comme cadeau à Dieu. Parce qu’il a fait cette bonne chose, Dieu l’a accepté comme étant juste avec lui‑même.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Abraham a cru en Dieu, et il a fait ce que Dieu lui avait demandé de faire. Donc, vous pouvez voir que ces 2 étaient nécessaires. Quand il a fait cette bonne chose, il a montré qu’il croyait complètement en Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Cela s’est fait comme la Bible nous dit. Elle dit : Abraham a cru en Dieu. Par conséquent, Dieu a accepté Abraham comme étant juste avec lui. Dieu a également appelé Abraham son ami.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi, vous voyez comment Dieu accepte quelqu’un comme étant juste avec lui‑même. Cette personne ne doit pas seulement croire en Dieu. Elle doit également faire de bonnes choses pour montrer qu’elle a la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C’était la même chose avec Rahab, il y a longtemps. C’était une prostituée. Elle a aidé certains des gens de Dieu qui sont venus chez elle. Elle les a protégés de leurs ennemis et les a fait partir par une autre route. Parce qu’elle a fait ces bonnes choses, Dieu l’a acceptée comme étant juste avec lui‑même.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Si nos corps n’ont pas d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ', ils sont morts. De la même manière, si notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' ne nous conduit pas à faire de bonnes choses, elle est morte.'
