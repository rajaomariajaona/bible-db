document_id: 1PE.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Pierre écrit aux dirigeants et aux jeunes hommes
  - type: text
    content: Maintenant, je veux vous dire quelque chose, vous qui êtes responsables des groupes de croyants. Je suis aussi un responsable comme vous. J’ai moi‑même vu comment les gens avaient beaucoup fait souffrir Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' pour qu’il meure. Un jour, les gens verront à quel point il est vraiment grand. Alors je serai parmi ces gens qui se joindront à lui dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Vous qui êtes des responsables, je vous dis donc ceci : '
  '10':
  - type: text
    content: 'Oui, vous aurez des problèmes comme ceux‑ci pendant une courte période. Mais après cela, Dieu arrangera tout. Il est complètement gentil et il vous aidera toujours. Parce que vous appartenez à '
  - type: text
    content: Christ
  - type: text
    content: ', Dieu vous a choisis pour vivre avec lui au '
  - type: text
    content: ciel
  - type: text
    content: ' pour toujours. Vous le rejoindrez dans ce bel endroit. Alors Dieu vous rétablira. Il vous rendra forts dans vos '
  - type: text
    content: esprits
  - type: text
    content: '. Vous pourrez vous tenir fermement. '
  '11':
  - type: text
    content: Oui, Dieu dirige avec puissance pour toujours ! Amen ! C’est vrai !
  - type: heading
    content: Pierre termine sa lettre
  '12':
  - type: text
    content: Silvain m’a aidé à vous écrire cette courte lettre. Je sais qu’il continue de croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Je vous ai écrit, parce que je veux que vous soyez forts. Je vous ai dit combien Dieu est bon envers nous et il nous aide. C’est le vrai message de Dieu pour vous. Alors, continuez d’y croire et soyez forts.
  '13':
  - type: text
    content: 'Les croyants ici à Babylone vous disent bonjour. Comme vous, Dieu les a choisis pour le servir. Marc, qui est comme mon fils, vous dit aussi bonjour. '
  '14':
  - type: text
    content: Lorsque vous vous rencontrez, embrassez‑vous en frères et sœurs chrétiens.
  - type: text
    content: Je prie pour vous tous qui appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Je prie pour que Dieu vous donne la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: .
  '2':
  - type: text
    content: Veillez sur le groupe de croyants que Dieu vous a donnés. Soyez comme un berger qui prend soin de ses brebis. Dirigez‑les bien parce que vous voulez le faire. Ne le faites pas simplement parce que vous devez le faire. Faites‑le comme Dieu veut. Ne soyez pas de responsables, parce que vous voulez recevoir de l’argent pour vous‑mêmes. Mais, faites‑le parce que vous voulez aider les gens.
  '3':
  - type: text
    content: 'Dieu vous a donné un groupe de croyants pour prendre soin d’eux. N’essayez pas de les dominer avec puissance. Mais, montrez‑leur comment vivre dans le bon sens, afin qu’ils puissent vous copier. '
  '4':
  - type: text
    content: 'Ensuite, notre maître, '
  - type: text
    content: Christ
  - type: text
    content: ', vous donnera un grand cadeau. Il est le berger le plus important qui nous dirige. À son retour, il vous donnera une belle couronne. C’est un grand cadeau qui ne deviendra jamais vieux ou moins beau.'
  '5':
  - type: text
    content: 'Je veux vous dire la même chose, vous qui êtes jeunes. Vous devez obéir aux croyants plus âgés qui sont des responsables. Vous tous qui êtes croyants, vous devez vous respecter les uns les autres. Ne pensez pas que vous êtes plus importants que les autres. La Bible dit :'
  - type: text
    content: Dieu est contre ces gens qui pensent qu’ils sont importants.
  - type: text
    content: Mais il est gentil avec les gens qui ne se sentent pas importants.
  '6':
  - type: text
    content: 'Rappelez‑vous que Dieu est fort et puissant. Alors, considérez‑vous comme petits devant lui. Il vous élèvera ensuite au bon moment. '
  '7':
  - type: text
    content: 'Si vous avez des problèmes dans vos '
  - type: text
    content: esprits
  - type: text
    content: ', dites‑les à Dieu. Dieu a promis de prendre soin de vous.'
  '8':
  - type: text
    content: 'Pensez sérieusement à votre façon de vivre. Faites attention au danger. N’oubliez pas que le '
  - type: text
    content: diable
  - type: text
    content: ' est votre ennemi. Il veut vous faire du mal. Il marche comme un lion affamé. Il cherche quelqu’un à tuer et ensuite à manger ! '
  '9':
  - type: text
    content: 'Mais vous devez être forts pour lutter contre lui. Croyez en Dieu complètement. Rappelez‑vous ceci : Les croyants du monde entier ont les mêmes problèmes. '
