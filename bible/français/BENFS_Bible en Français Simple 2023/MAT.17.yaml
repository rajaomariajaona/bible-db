document_id: MAT.17,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 17
  - type: heading
    content: Dieu change le visage de Jésus
  - type: text
    content: '6 jours plus tard, Jésus a pris Pierre et les frères Jacques et Jean avec lui. Il les a conduits sur une haute montagne où ils étaient seuls. '
  '10':
  - type: text
    content: 'Alors les 3 '
  - type: text
    content: disciples
  - type: text
    content: ' ont posé à Jésus une question. Les enseignants de la loi de Dieu disent : Élie reviendra sur terre d’abord. Pourquoi disent‑ils cela ? '
  '11':
  - type: text
    content: 'Jésus a dit : Oui, Élie viendra d’abord. Il mettra toute chose prête.'
  '12':
  - type: text
    content: 'Mais je vous dis qu’Élie est déjà venu. Les gens ne l’ont pas reconnu. Ils lui ont fait toutes les mauvaises choses qu’ils voulaient faire. De la même façon, ils vont aussi me faire du mal, moi le Fils de l’homme. '
  '13':
  - type: text
    content: 'Alors les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont compris qu’il parlait vraiment de Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: .
  - type: heading
    content: Jésus guérit un garçon
  '14':
  - type: text
    content: 'Après cela, ils sont arrivés près de la foule. Un homme est venu voir Jésus. Il s’est mis à genoux devant lui.  '
  '15':
  - type: text
    content: 'Il a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', s’il te plaît, aie pitié de mon fils. Il est sérieusement malade d’épilepsie. Il souffre beaucoup. Il tombe souvent dans le feu ou dans l’eau. '
  '16':
  - type: text
    content: 'Je l’ai amené auprès de tes  '
  - type: text
    content: disciples
  - type: text
    content: . Mais ils n’ont pas réussi à le guérir.
  '17':
  - type: text
    content: 'Jésus a dit : Vous les gens d’aujourd’hui, vous ne croyez toujours pas. Vous avez laissé Dieu. J’ai vécu ici parmi vous pendant une longue période. Je ne peux pas rester avec vous beaucoup plus longtemps. Maintenant, il m’est difficile d’être patient avec vous. Alors Jésus a dit à l’homme : Amène‑moi le garçon ici. '
  '18':
  - type: text
    content: 'Jésus a ordonné au mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' de quitter le garçon. Et le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' l’a quitté immédiatement. Alors le garçon est devenu bien.'
  '19':
  - type: text
    content: 'Quand les  '
  - type: text
    content: disciples
  - type: text
    content: ' étaient seuls avec Jésus, ils lui ont demandé : Pourquoi avons‑nous échoué de chasser le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' du garçon ?'
  '2':
  - type: text
    content: 'Pierre, Jacques et Jean ont regardé Jésus et ils ont vu son visage changer. Son visage était lumineux et il brillait comme le soleil. Ses vêtements sont devenus très blancs. Ils brillaient. '
  '20':
  - type: text
    content: 'Jésus a répondu : Vous ne pouviez pas le faire parce que vous ne croyez pas bien en moi. Je vous dis la vérité : Si vous croyez en Dieu, même un peu, alors vous pouvez faire de grandes choses. Vous pouvez dire à cette montagne : Déplace‑toi de cet endroit et va à l’autre endroit. Et elle va se déplacer. Vous pouvez faire n’importe quoi.  '
  '21':
  - type: text
    content: Mais vous devez prier. Vous ne devez pas manger un temps. Alors c’est de cette façon que vous pouvez chasser ce genre d’
  - type: text
    content: esprits
  - type: text
    content: .
  '22':
  - type: text
    content: 'Jésus et ses  '
  - type: text
    content: disciples
  - type: text
    content: ' se sont tous réunis en Galilée. Jésus a dit : Bientôt les gens vont livrer le Fils de l’homme aux hommes. '
  '23':
  - type: text
    content: 'Ces hommes vont le tuer. Mais après 3 jours, il sera encore vivant. Les  '
  - type: text
    content: disciples
  - type: text
    content: ' étaient très tristes.'
  '24':
  - type: text
    content: 'Après cela, Jésus et ses  '
  - type: text
    content: disciples
  - type: text
    content: ' sont arrivés à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Certains hommes qui faisaient payer les taxes sont allés parler à Pierre. Ils lui ont demandé : Est‑ce que votre Maître paie l’'
  - type: text
    content: impôt
  - type: text
    content: ' pour le  '
  - type: text
    content: Temple
  - type: text
    content: '  ? '
  '25':
  - type: text
    content: 'Pierre leur a dit : Oui, mon Maître paie l’'
  - type: text
    content: impôt
  - type: text
    content: .
  - type: text
    content: 'Alors Pierre est retourné à la maison. Il voulait dire à Jésus ce qui venait de se passer. Mais Jésus a parlé en premier. Il a dit : Voici une question pour toi, Simon : Les rois dans ce monde perçoivent les taxes et les  '
  - type: text
    content: impôts
  - type: text
    content: . Est‑ce qu’ils les perçoivent de leurs propres fils ? Ou ils les perçoivent d’autres gens ?
  '26':
  - type: text
    content: 'Simon a répondu : Ils les perçoivent d’autres gens.'
  - type: text
    content: 'Jésus lui a dit : Cela signifie que leurs fils ne doivent pas les payer. '
  '27':
  - type: text
    content: Mais nous ne voulons pas faire de mal à ces gens. Alors, va à la mer et jette ta ligne avec hameçon à l’eau. Et tire le premier poisson que tu attraperas sur ta ligne avec hameçon. Ouvre la bouche du poisson et tu trouveras une pièce d’argent à l’intérieur. Prends cette pièce d’argent. Donne‑la à ceux qui perçoivent l’
  - type: text
    content: impôt
  - type: text
    content: '. Ce sera assez d’argent pour payer mon  '
  - type: text
    content: impôt
  - type: text
    content: ' et le tien.'
  '3':
  - type: text
    content: Alors Pierre, Jacques et Jean ont vu 2 hommes apparaître devant eux. Ces 2 hommes étaient Moïse et Élie, et ils parlaient avec Jésus.
  '4':
  - type: text
    content: 'Pierre a dit à Jésus : Maître, c’est bien que nous soyons ici. Si tu le veux, je vais dresser 3 tentes ici. Une tente sera pour toi. Une tente sera pour Moïse et une tente sera pour Élie.'
  '5':
  - type: text
    content: 'Pierre parlait encore. Pendant ce temps, un nuage lumineux est apparu. Et il les a tous couverts. Ils ont entendu une voix. Cette voix sortait de ce nuage. Elle disait ceci : Celui‑ci est mon Fils. Je l’aime et il me rend très heureux. Écoutez‑le.'
  '6':
  - type: text
    content: 'Quand les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont entendu la personne qui parlait, ils se sont jetés à terre. Et leurs visages ont touché le sol. Ils avaient très peur. '
  '7':
  - type: text
    content: 'Mais Jésus est venu à eux et il les a touchés. Il a dit : Levez‑vous à nouveau. N’ayez pas peur. '
  '8':
  - type: text
    content: Quand ils ont regardé, ils n’ont vu personne d’autre. Seul Jésus était là.
  '9':
  - type: text
    content: 'Après cela, ils descendaient de la montagne, Jésus a parlé à Pierre, Jacques et Jean. Il a dit : Ne dites à personne ce que vous avez vu. Un jour, le Fils de l’homme va mourir et devenir de nouveau vivant. Alors, vous pourrez dire ce qui s’est passé ici aux gens.'
