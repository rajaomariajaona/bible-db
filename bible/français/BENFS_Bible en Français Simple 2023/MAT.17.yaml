document_id: MAT.17,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 17
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu change le visage de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '6 jours plus tard, Jésus a pris Pierre et les frères Jacques et Jean avec lui. Il les a conduits sur une haute montagne où ils étaient seuls. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors les 3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont posé à Jésus une question. Les enseignants de la loi de Dieu disent : Élie reviendra sur terre d’abord. Pourquoi disent‑ils cela ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jésus a dit : Oui, Élie viendra d’abord. Il mettra toute chose prête.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais je vous dis qu’Élie est déjà venu. Les gens ne l’ont pas reconnu. Ils lui ont fait toutes les mauvaises choses qu’ils voulaient faire. De la même façon, ils vont aussi me faire du mal, moi le Fils de l’homme. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont compris qu’il parlait vraiment de Jean‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit un garçon
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Après cela, ils sont arrivés près de la foule. Un homme est venu voir Jésus. Il s’est mis à genoux devant lui.  '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', s’il te plaît, aie pitié de mon fils. Il est sérieusement malade d’épilepsie. Il souffre beaucoup. Il tombe souvent dans le feu ou dans l’eau. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Je l’ai amené auprès de tes  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: . Mais ils n’ont pas réussi à le guérir.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus a dit : Vous les gens d’aujourd’hui, vous ne croyez toujours pas. Vous avez laissé Dieu. J’ai vécu ici parmi vous pendant une longue période. Je ne peux pas rester avec vous beaucoup plus longtemps. Maintenant, il m’est difficile d’être patient avec vous. Alors Jésus a dit à l’homme : Amène‑moi le garçon ici. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jésus a ordonné au mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' de quitter le garçon. Et le mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' l’a quitté immédiatement. Alors le garçon est devenu bien.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Quand les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient seuls avec Jésus, ils lui ont demandé : Pourquoi avons‑nous échoué de chasser le mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' du garçon ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Pierre, Jacques et Jean ont regardé Jésus et ils ont vu son visage changer. Son visage était lumineux et il brillait comme le soleil. Ses vêtements sont devenus très blancs. Ils brillaient. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jésus a répondu : Vous ne pouviez pas le faire parce que vous ne croyez pas bien en moi. Je vous dis la vérité : Si vous croyez en Dieu, même un peu, alors vous pouvez faire de grandes choses. Vous pouvez dire à cette montagne : Déplace‑toi de cet endroit et va à l’autre endroit. Et elle va se déplacer. Vous pouvez faire n’importe quoi.  '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Mais vous devez prier. Vous ne devez pas manger un temps. Alors c’est de cette façon que vous pouvez chasser ce genre d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus et ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' se sont tous réunis en Galilée. Jésus a dit : Bientôt les gens vont livrer le Fils de l’homme aux hommes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ces hommes vont le tuer. Mais après 3 jours, il sera encore vivant. Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient très tristes.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Après cela, Jésus et ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont arrivés à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. Certains hommes qui faisaient payer les taxes sont allés parler à Pierre. Ils lui ont demandé : Est‑ce que votre Maître paie l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: impôt
    - type: text
      text: ' pour le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '  ? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Pierre leur a dit : Oui, mon Maître paie l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: impôt
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre est retourné à la maison. Il voulait dire à Jésus ce qui venait de se passer. Mais Jésus a parlé en premier. Il a dit : Voici une question pour toi, Simon : Les rois dans ce monde perçoivent les taxes et les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: impôts
    - type: text
      text: . Est‑ce qu’ils les perçoivent de leurs propres fils ? Ou ils les perçoivent d’autres gens ?
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Simon a répondu : Ils les perçoivent d’autres gens.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a dit : Cela signifie que leurs fils ne doivent pas les payer. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Mais nous ne voulons pas faire de mal à ces gens. Alors, va à la mer et jette ta ligne avec hameçon à l’eau. Et tire le premier poisson que tu attraperas sur ta ligne avec hameçon. Ouvre la bouche du poisson et tu trouveras une pièce d’argent à l’intérieur. Prends cette pièce d’argent. Donne‑la à ceux qui perçoivent l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: impôt
    - type: text
      text: '. Ce sera assez d’argent pour payer mon  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: impôt
    - type: text
      text: ' et le tien.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Alors Pierre, Jacques et Jean ont vu 2 hommes apparaître devant eux. Ces 2 hommes étaient Moïse et Élie, et ils parlaient avec Jésus.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Pierre a dit à Jésus : Maître, c’est bien que nous soyons ici. Si tu le veux, je vais dresser 3 tentes ici. Une tente sera pour toi. Une tente sera pour Moïse et une tente sera pour Élie.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Pierre parlait encore. Pendant ce temps, un nuage lumineux est apparu. Et il les a tous couverts. Ils ont entendu une voix. Cette voix sortait de ce nuage. Elle disait ceci : Celui‑ci est mon Fils. Je l’aime et il me rend très heureux. Écoutez‑le.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quand les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont entendu la personne qui parlait, ils se sont jetés à terre. Et leurs visages ont touché le sol. Ils avaient très peur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais Jésus est venu à eux et il les a touchés. Il a dit : Levez‑vous à nouveau. N’ayez pas peur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Quand ils ont regardé, ils n’ont vu personne d’autre. Seul Jésus était là.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Après cela, ils descendaient de la montagne, Jésus a parlé à Pierre, Jacques et Jean. Il a dit : Ne dites à personne ce que vous avez vu. Un jour, le Fils de l’homme va mourir et devenir de nouveau vivant. Alors, vous pourrez dire ce qui s’est passé ici aux gens.'
