document_id: MAT.18,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 18
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus dit qui est la personne la plus importante
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peu après, les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont venus auprès de Jésus. Ils lui ont demandé : Qui est la personne la plus importante dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: '  ?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites attention, ne pensez pas que ces petits enfants ne sont pas importants. Je vous dis ceci : Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' qui veillent sur eux, restent toujours avec mon père dans sa maison. Et ces  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' lui parlent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le Fils de l’homme est venu sauver ce qui était perdu.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pensez à un homme qui a 100 brebis. Il les compte. Et il découvre que l’une de ses brebis n’est pas là. Donc, il va laisser toutes les autres brebis sur les collines. Puis il va chercher la brebis perdue. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis la vérité : L’homme sera très heureux s’il trouve la brebis perdue. Toutes les autres brebis sont restées en sécurité sur les collines. Il sera plus heureux de retrouver la brebis perdue que les autres. Les autres ne sont jamais perdues. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu, qui est mon Père céleste, est comme cet homme. Il ne veut pas perdre même un seul de ces petits.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Que faire quand un frère te fait de mauvaises choses
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si ton frère a fait de mauvaises choses contre toi, alors tu devras aller auprès de lui. Vous pouvez en parler ensemble quand tu es seul avec lui. Puis il peut comprendre que tu as raison. S’il comprend, alors tu peux l’appeler ton frère à nouveau.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peut‑être qu’il ne veut pas t’écouter. Alors, prends une ou 2 autres personnes. Allez le voir. Ces personnes vont savoir les mauvaises choses que ton frère a faites. Ils sauront ce que tu lui as dit. Ils sauront que cela est vrai. La parole de Dieu nous demande de faire cela.  '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si ton frère ne veut pas écouter les 2 ou 3 d’entre vous, allez à l’Église. Dites aux autres ce qui est arrivé. S’il refuse encore d’écouter l’Église, ne l’appelle plus ton frère. Il est comme quelqu’un qui refuse d’obéir à Dieu.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis la vérité : Vous pouvez décider de lier quelque chose ici sur la terre. Dieu aussi va accepter cela au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Vous pouvez décider de délier quelque chose ici sur terre. Dieu va aussi accepter cela au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '2 personnes peuvent convenir ensemble pour demander à Dieu quelque chose. Alors mon Père qui est au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ', leur donnera ce qu’elles demandent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un petit enfant là. Jésus a dit à l’enfant : Viens ici. Tiens‑toi devant tout le monde. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 2 ou plusieurs personnes peuvent se réunir pour me parler, parce qu’elles croient en moi. Je suis là parmi elles. 
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Combien de fois pardonner
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre est venu parler auprès de Jésus : Maître, si mon frère me fait du mal, combien de fois dois‑je lui pardonner ? Dois‑je lui pardonner jusqu’à 7 fois ?'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Je ne te dis pas 7 fois. Je dis, continue à lui pardonner plusieurs fois, jusqu’à 70 fois 7 fois.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' est comme un roi. Le roi voulait récupérer tout l’argent que ses serviteurs lui devaient.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors le roi a commencé à compter. Puis ses hommes lui ont présenté celui qui avait une grosse dette. Il devra rembourser beaucoup de millions d’argent.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le serviteur ne pouvait pas payer sa dette envers le roi. Alors son roi a dit à ses hommes : Vendez l’homme, sa femme, ses enfants et tous ses biens comme esclaves. Il pourra ainsi rembourser sa dette.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le serviteur s’est jeté à terre devant le roi. Il lui a dit : S’il te plaît, donne‑moi un peu plus de temps, alors je vais te payer tout. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi a eu pitié de son serviteur. Il lui a dit : Je te pardonne pour toute ta dette. Tu es libre.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ce même serviteur est allé. Il a rencontré un autre serviteur. Cet autre serviteur lui devait une dette de 100 pièces d’argent. Le premier serviteur a saisi le cou de l’autre serviteur. Il a dit : Paie‑moi mon argent.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’autre serviteur s’est mis à genoux devant le premier serviteur. Il a dit au premier serviteur : S’il te plaît, donne‑moi un peu plus de temps. Ensuite, je vais te donner l’argent.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Je vous dis la vérité. Si vous ne devenez pas comme un enfant, vous ne pouvez pas entrer dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le premier serviteur a dit : Je refuse de le faire ! Et il a mis l’autre serviteur en prison. Il est resté là jusqu’à ce qu’il paye sa dette.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses collègues de service ont vu cela. Ils étaient très tristes. Alors ils sont allés voir leur roi. Et ils lui ont parlé de tout ce qui était arrivé.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le maître a demandé au premier serviteur de le voir. Le maître a dit au serviteur : Tu es une très mauvaise personne. J’ai annulé toute ta dette. C’était parce tu m’avais supplié pour cela.  '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu devrais avoir pitié de l’autre serviteur, comme j’ai eu pitié de toi.  '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi était très en colère. Il a livré ce serviteur aux agents de la prison. Ils l’ont puni. Il est resté là jusqu’à ce qu’il paye la totalité de sa dette.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a terminé l’histoire et il a dit : Il faut pardonner à votre ami complètement. Si vous ne pardonnez pas à votre frère, mon père qui est au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ', ne vous pardonnera pas non plus.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet enfant ne pense pas qu’il est très important. Vous devez aussi être humbles comme un enfant. Une personne qui fait cela, sera la personne la plus importante dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toute personne qui reçoit un enfant comme celui‑ci à cause de moi, me reçoit également.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de ceux qui poussent les gens à faire de mauvaises choses
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces petits enfants croient en moi. Peut‑être que quelqu’un fera du mal à l’un d’eux. Alors l’un de ces petits laissera de croire en moi. Dieu punira la personne qui causera cela. Ce serait mieux de suspendre une grosse pierre de moulin autour de son cou. Ce serait mieux de jeter cette personne comme cela au fond de la mer.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Malheur aux gens sur terre. Parce qu’il y a beaucoup de choses qui les poussent à faire le mal. De telles choses doivent arriver. C’est très mauvais pour la personne qui provoque cela. 
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peut‑être que ta main ou ton pied te font faire de mauvaises choses. Alors, coupe‐les. Jette‑les. C’est mieux d’avoir une seule main ou un seul pied et d’avoir une vraie vie en Dieu. Il est bien pire de garder les 2 mains et les 2 pieds et faire de mauvaises choses. Alors Dieu te jettera dans l’enfer. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si ton œil te fait faire de mauvaises choses, alors tu devras l’enlever. Tu devras le jeter. C’est mieux d’avoir un seul oeil et avoir une vraie vie en Dieu. Il est bien pire si Dieu te jette avec tes 2 yeux en enfer. Là, le feu ne va jamais cesser de brûler.
