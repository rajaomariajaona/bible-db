document_id: LUK.11,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 11
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus enseigne à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' comment prier'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un jour, Jésus était en prière à un certain endroit. Il a terminé la prière. Puis, un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' de Jésus s’est approché de lui. Il a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Jean a enseigné à ceux qui le suivaient comment prier. S’il te plaît, enseigne‑nous comme il l’avait fait.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Après tout, tout le monde qui demande quelque chose va le recevoir. Tout le monde qui cherche quelque chose va le trouver. Dieu ouvre la porte à tout le monde qui frappe.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Certains d’entre vous sont des pères. Vous ne donnerez pas un serpent à votre fils s’il demande un poisson ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Si votre fils vous demande un œuf, vous ne lui donnerez pas un mauvais insecte appelé scorpion pour lui faire du mal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vous êtes mauvais. Mais vous savez donner de bonnes choses à vos enfants. Et votre Père qui est au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' sait beaucoup mieux que vous donner de bonnes choses. Il va donc envoyer le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' à ceux qui le lui demandent.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus enseigne les gens au sujet du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Un jour, Jésus a ordonné à un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' de sortir d’un homme. En raison du mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ', l’homme ne pouvait pas parler. Mais après, il est sorti de lui. Alors l’homme pouvait parler. Cela a surpris tous les gens qui le regardaient. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais certaines personnes dans la foule n’étaient pas contentes de Jésus. Elles disaient : Oui, cet homme peut chasser les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des gens. Mais le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' travaille avec lui, parce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' dirige tous les mauvais esprits.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'D’autres gens dans la foule ne croyaient pas en Jésus. Ils voulaient montrer que son pouvoir ne venait pas de Dieu. Ils disaient : Fais quelque chose de puissant. Si tu le fais, nous allons croire. Nous croirons que Dieu t’a envoyé.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais Jésus savait ce que ces gens voulaient. Il leur a dit : Si des groupes de personnes dans un pays se battent entre eux, ils vont détruire leur propre pays. Si les gens dans une famille se battent entre eux, ils vont détruire leur famille. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'C’est la même chose avec le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: '. Les gens qui lui obéissent ne doivent pas se battre entre eux. S’ils le font, il n’aura plus personne à diriger. Mais vous dites que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' m’aide à chasser les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des personnes. Si cela était vrai, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' se battrait contre lui‑même. Il n’aura plus personne à diriger.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous dites que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' m’aide à chasser de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Mais certains hommes obéissent à ce que vous enseignez. Et ils chassent aussi de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Alors qui leur donne le pouvoir de faire cela ? Cela montre que vous avez tort. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jésus a répondu :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand vous priez, dites ceci : Père'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous prions que les gens respectent ton nom et le gardent saint. Que ton règne vienne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nous voulons les choses que tu veux faire au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Nous voulons les choses que tu veux faire ici sur terre.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Donc quand je chasse de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des gens, j’utilise la puissance de Dieu. Cela montre que Dieu règne sur vous.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lorsqu’un homme fort a toutes ses armes pour la guerre, il peut prendre soin de sa propre maison. Rien de mauvais ne va arriver à ses choses à l’intérieur de la maison. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mais quelqu’un de plus fort que lui peut venir. Et puis l’homme le plus fort l’attaque et le bat. L'homme le plus fort va alors gagner le faible. L’homme fort prendra alors toutes les armes de guerre du faible. Ces armes lui assuraient la sécurité. L’homme le plus fort va aussi distribuer toutes les choses qu’il a prises.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Si quelqu’un ne m’aide pas, il est contre moi. Si une personne ne travaille pas avec moi pour rassembler les gens, il les écarte de moi.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Quand un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' sort d’une personne, il se déplace dans des lieux secs. Il va chercher un nouvel endroit pour vivre. S’il ne trouve nulle part, il se dit : Je vais retourner à la maison où je vivais avant.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il remonte à cette maison. Mais il estime qu’elle est propre. Tout à l’intérieur est en bonne place. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ainsi, il sort et il ramène 7 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' pires. Ils vont tous dans la maison et vivre là. Maintenant, l’homme sera pire qu’avant.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Quand Jésus disait cela, une femme dans la foule a crié : La femme qui t’a mis au monde est heureuse ! La femme qui t’a nourri de ses seins est heureuse !'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jésus a répondu : Les gens les plus heureux sont ceux qui entendent le message de Dieu et y obéissent.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de Jonas
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'La foule de gens autour de Jésus augmentait. Alors Jésus a commencé à leur parler : Les gens qui sont encore en vie aujourd’hui sont très mauvais. Ils veulent que Dieu leur montre un travail puissant. Mais Dieu ne leur montrera pas quoi que ce soit. Ils verront seulement la même chose puissante manifestée à Jonas. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Donne‑nous la nourriture dont nous avons besoin chaque jour.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Quelque chose lui était arrivé. Il a montré au peuple de Ninive que Dieu l’avait envoyé. La même chose va se passer pour moi, le Fils de l’homme. Je serai comme Jonas aux gens qui vivent aujourd’hui. Ensuite, ils sauront que Dieu m’a envoyé.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jésus a alors dit : Il y a plusieurs années, la reine d’un pays dans le sud avait fait un long voyage pour voir le roi Salomon. Elle est allée à l’écoute des idées sages qu’il enseignait. Écoutez ! Il y a quelqu’un ici aujourd’hui qui est plus grand que Salomon. Mais vous ne l’écoutez pas. Donc, quand Dieu jugera tous les peuples, la reine se tiendra devant lui. Et elle parlera contre les hommes qui sont en vie aujourd’hui. Après tout, elle avait fait un long chemin pour entendre les idées sages de Salomon.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: C’était la même chose avec Jonas. Quand il parlait aux gens de Ninive, ils ont cessé de faire de mauvaises choses. Et ils ont obéi à Dieu. Écoutez ! Il y a quelqu’un ici aujourd’hui qui est plus que Jonas. Mais vous ne lui obéissez pas. Dieu vous jugera tous. Alors ces hommes qui vivaient dans Ninive se lèveront en face de lui. Ils prendront également la parole contre les gens qui sont encore en vie aujourd’hui. Après tout, quand Jonas parlait aux gens de Ninive, ils ont cessé de faire de mauvaises choses. Et ils ont obéi à Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de la lumière
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Quand quelqu’un allume une lampe, il ne la cache pas. Il ne met pas non plus un bol au‑dessus. Au lieu de cela, il la met dans un endroit élevé. Alors les gens pourront voir la lumière. Ils la verront quand ils entreront dans la maison. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ton œil est comme la lampe de ton corps. Veille donc à ce que tes yeux soient comme une lampe en bon état. Alors ton corps entier aura une lumière. Mais si tes yeux ne sont pas en bon état, ton corps entier sera dans l’obscurité.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fais donc attention. Sois sûr que tu as réellement la lumière en toi. Sois aussi sûr que tu n’es toujours pas dans l’obscurité.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ton corps entier doit avoir totalement de lumière. Il n’y aura alors rien d’obscurité à ton corps. Ce sera comme si une lampe éclaire de sa lumière sur vous.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Quand Jésus parlait, un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: ' lui a demandé de manger un repas avec lui. Alors, il est allé à sa maison et il s’est assis à la table. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jésus ne s’est pas lavé les mains avant de manger le repas. Cela a surpris le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ainsi, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus lui a dit ceci : Vous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ', vous êtes comme quelqu’un qui nettoie uniquement l’extérieur d’une coupe et d’une assiette. Mais à l’intérieur, vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' sont pleins de très mauvaises pensées. Vous pensez prendre les choses précieuses d’autres personnes. '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Pardonne‑nous toutes les mauvaises choses que nous avons faites.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après tout, nous aussi nous pardonnons à tout le monde qui nous a fait de mauvaises choses. Ne nous laisse pas accepter de faire de mauvaises choses.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Vous ne raisonnez pas bien ! Dieu qui a fait votre extérieur a fait aussi votre intérieur. Il voit tout votre intérieur.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Donc donnez aux pauvres avec de bonnes pensées. Alors Dieu dira que tout à l’intérieur et à l’extérieur de vous est propre.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Vous '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ', donnez à Dieu un dixième de petites plantes qui ont une odeur agréable. Donnez‑lui également un dixième de petites plantes qui donnent à la nourriture un goût agréable. Vous avez raison de les donner. Vous êtes malheureux, parce que vous ne faites pas de choses les plus importantes. Vous n’aimez pas Dieu. Et vous ne faites pas ce qui est juste. Vous devriez faire ces choses. Et vous devez lui donner un dixième de ce que vous cultivez.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Vous êtes malheureux, vous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ', parce que vous voulez avoir les meilleures places dans le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Et les gens parlent de vous dans le marché comme ils parlent à une personne importante. Vous aimez cela aussi.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Oui, vous semblez bons, mais vous n’êtes pas bons. Vous êtes malheureux. Parfois, quand les gens enterrent un cadavre, ils ne mettent pas une marque là. À cause de cela, d’autres personnes marchent sur ce tombeau. Vous êtes comme ce tombeau. Vous semblez bons mais, à l’intérieur vous n’êtes pas bons.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Puis, un de ceux qui enseignaient la loi de Dieu a dit : Maître, quand tu dis ces choses, tu dis aussi de mauvaises choses sur nous.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Jésus a répondu : Le trouble viendra à vous aussi, enseignants de la loi de Dieu. Vous donnez trop de règles aux gens. Elles sont comme des choses qui sont trop lourdes à porter. Vous les mettez sur leurs dos, mais vous ne les aidez pas à les porter. Vous ne les aidez même pas avec un seul doigt !'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Oui, vous aurez des difficultés, vous les enseignants de la loi de Dieu ! Il y a longtemps, vos pères avaient tué les hommes qui parlaient pour Dieu. Maintenant, vous construisez de belles pierres pour rappeler l’endroit où ils les avaient enterrés. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Vous savez que vos pères avaient tué ces hommes. Vous construisez ces pierres. Donc, vous montrez que vous êtes d’accord avec vos pères. Vous êtes d’accord avec ce qu’ils avaient fait. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Dieu est sage. C’est la raison pour laquelle il a dit : Je vais envoyer des hommes que je choisis. Je vais aussi envoyer d’autres hommes qui reçoivent des messages de moi. Ils diront mes messages. Mais les gens vont tuer certains d’entre eux. Ils vont faire de mauvaises choses à certains d’entre eux. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il a ensuite raconté une histoire pour leur apprendre à prier. Laissez‑moi vous dire à propos de quelqu’un qui est allé chez un ami à minuit. Il a dit : Mon ami, s’il te plaît, donne‑moi 3 pains. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Les gens avaient tué ceux qui parlaient pour Dieu depuis le commencement du monde. Mais il va punir le peuple vivant aujourd’hui pour tous ces meurtres. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Abel était le premier à mourir et Zacharie était le dernier. Ils l’avaient tué entre le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' de Dieu et l’autel de Dieu. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' tuent et brûlent les animaux comme une offrande à Dieu sur l’autel. Oui, Dieu punira les personnes qui vivent aujourd’hui pour tous ces meurtres.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Vous êtes malheureux, vous les enseignants de la loi de Dieu. Vous n’avez pas enseigné à d’autres de comprendre les messages de Dieu. Ils voulaient savoir ce qui est vrai. Vous n’avez pas pu le faire vous‑mêmes. Et vous avez aussi bloqué les gens qui voulaient le savoir. Donc, ils ne pouvaient pas le savoir.
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Alors Jésus a quitté cet endroit. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' et ceux qui enseignaient les règles de Dieu ont commencé à être très contre lui. Ils lui posaient beaucoup de questions difficiles. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Ils essayaient de lui faire dire quelque chose de mal. Ils attendaient qu’il dise quelque chose de mal pour l’accuser.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Un de mes amis était en voyage et il est arrivé à ma maison. Mais je n’ai pas de nourriture à lui donner. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais son ami a répondu de l’intérieur de sa maison : Ne me cause pas de problèmes ! J’ai fermé ma porte. Mes enfants et moi nous sommes déjà au lit. Donc, je ne peux pas me lever pour te donner du pain. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je vais vous dire ce qui se passera. Peut‑être l’ami ne lui donnera pas quoi que ce soit. Mais s’il continue de frapper, il va se lever. S’il continue de demander du pain, son ami lui donnera du pain. Il va lui donner tout ce qu’il demande.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Donc, je vous le dis. Continuez de demander ce dont vous avez besoin. Et vous le recevrez. Continuez de chercher ce dont vous avez besoin. Et puis, vous le trouverez. Continuez de frapper à la porte et Dieu ouvrira pour vous. '
