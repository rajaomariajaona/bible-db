document_id: ACT.14,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 14
  - type: heading
    content: Paul et Barnabas disent la Bonne Nouvelle au sujet de Jésus aux personnes d’Icone
  - type: text
    content: 'Paul et Barnabas sont aussi entrés dans la '
  - type: text
    content: synagogue
  - type: text
    content: ' à Icône. Ils disaient au peuple le message au sujet de Jésus. Beaucoup de '
  - type: text
    content: Juifs
  - type: text
    content: ' et d’étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: ' croyaient en lui. Et ces gens sont devenus des '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus. '
  '10':
  - type: text
    content: 'Ainsi Paul a regardé l’homme. Il lui a dit fortement : Lève‑toi droit sur tes pieds ! Ainsi l’homme a sauté vers le haut et il a commencé à marcher.'
  '11':
  - type: text
    content: 'La foule a vu ce que Paul a fait. Elle a alors commencé à crier en Lycaonien (langue parlée en Lycaonie) : Les dieux sont devenus comme les hommes. Ils sont descendus du '
  - type: text
    content: ciel
  - type: text
    content: ' vers nous. '
  '12':
  - type: text
    content: 'Ils appelaient Barnabas par le nom de leur dieu Jupiter. Ils appelaient Paul par le nom de leur dieu Mercure, parce qu’il parlait habituellement au peuple. '
  '13':
  - type: text
    content: 'La maison où les gens priaient Jupiter était très près de la ville. Le '
  - type: text
    content: prêtre
  - type: text
    content: ' qui travaillait pour Jupiter a apporté des animaux à la porte de la maison. Il a également apporté quelques fleurs. Le '
  - type: text
    content: prêtre
  - type: text
    content: ' et la foule pensaient que Paul et Barnabas étaient leurs dieux. Et ainsi ils ont voulu tuer ces animaux comme offrande à Paul et à Barnabas.'
  '14':
  - type: text
    content: 'Puis Paul et Barnabas ont entendu ce que le peuple faisait. Ils ont déchiré leurs propres vêtements et ils ont couru au milieu de la foule. '
  '15':
  - type: text
    content: 'Ils criaient : Arrêtez ! Ne faites pas cela, nous sommes seulement des hommes comme vous. Nous sommes humains, nous ne sommes pas de dieux. Nous sommes venus ici pour vous dire la Bonne Nouvelle au sujet de Jésus. Dieu veut que vous laissiez de faire ceci. Vos dieux n’ont aucune valeur. Notre Dieu est vivant. Et il veut que vous lui obéissiez. Il a fait le '
  - type: text
    content: ciel
  - type: text
    content: ', la terre et la mer, et toute autre chose qui est en eux.'
  '16':
  - type: text
    content: 'Avant ce temps, Dieu a laissé toutes les personnes faire ce qu’elles voulaient faire. '
  '17':
  - type: text
    content: 'Même alors, Dieu a prouvé à tout le monde qu’il était là. Il a montré ceci à travers toutes les bonnes choses qu’il fait pour des personnes. Il fait tomber la pluie du '
  - type: text
    content: ciel
  - type: text
    content: '. Il vous donne des plantes. Elles produisent des graines et des fruits en temps favorable. Il vous donne de la nourriture et il vous rend heureux. '
  '18':
  - type: text
    content: Paul et Barnabas ont dit ceci pour arrêter le peuple. Mais le peuple voulait toujours tuer les animaux comme offrande pour Paul et Barnabas.
  '19':
  - type: text
    content: 'Quelques '
  - type: text
    content: Juifs
  - type: text
    content: ' sont venus d’Antioche et d’Icone. Et ils ont influencé les gens à les croire, au lieu de Paul. Alors ces '
  - type: text
    content: Juifs
  - type: text
    content: ' ont jeté des pierres sur Paul et ils l’ont tiré hors de la ville. Ils pensaient qu’il est mort. '
  '2':
  - type: text
    content: 'Mais certains '
  - type: text
    content: Juifs
  - type: text
    content: ' ont refusé de croire à leur message. Ces '
  - type: text
    content: Juifs
  - type: text
    content: ' poussaient certains de ceux qui n’étaient pas '
  - type: text
    content: Juifs
  - type: text
    content: ' à être contre les croyants. Ainsi ils ont commencé à dire du mal contre eux. '
  '20':
  - type: text
    content: Mais les croyants sont venus. Ils se sont tenus autour de lui. Alors Paul s’est levé. Il est allé de nouveau dans la ville. Le jour suivant, lui et Barnabas sont allés à Derbe.
  - type: heading
    content: Paul et Barnabas reviennent à Antioche en Syrie
  '21':
  - type: text
    content: 'Paul et Barnabas disaient aux gens de Derbe la Bonne Nouvelle au sujet de Jésus. Beaucoup de gens là croyaient à ce qu’ils enseignaient. Puis Paul et Barnabas sont revenus à Lystre. Et de là, ils sont allés de nouveau à Icone. Ils sont également revenus à Antioche. '
  '22':
  - type: text
    content: 'Ils enseignaient les croyants dans ces villes plus au sujet de Jésus. Ils leur disaient : Continuez de croire en Jésus ! Tous les gens qui croient, auront des moments difficiles dans leurs vies. Cela se produira jusqu’à ce que Dieu règne sur la terre. '
  '23':
  - type: text
    content: 'Paul et Barnabas ont choisi les chefs de chaque groupe des croyants. Paul et Barnabas priaient et jeûnaient. Et alors ils les ont choisis. Ainsi, Paul et Barnabas ont demandé à Jésus d’aider ces chefs et de les garder en sécurité. C’était parce que ces chefs ont cru en lui. '
  '24':
  - type: text
    content: 'Après Paul et Barnabas sont passés par la Pisidie, ils sont arrivés en Pamphylie. '
  '25':
  - type: text
    content: Là ils enseignaient aux gens de Perge le message au sujet de Jésus. Alors ils sont descendus à la ville appelée Attalie.
  '26':
  - type: text
    content: 'De là, ils ont navigué de nouveau à Antioche. C’était à Antioche où ils avaient commencé leur travail. Les croyants d’Antioche avaient demandé à Dieu de bien garder Paul et Barnabas pendant qu’ils voyageaient. Et maintenant Paul et Barnabas ont fini leur travail. '
  '27':
  - type: text
    content: 'Quand ils sont arrivés, ils ont envoyé un message à tous les croyants d’Antioche. Ils ont dit : Venez et réunissons‑nous ensemble ! Ainsi les croyants se sont tous réunis avec eux. Puis Paul et Barnabas leur ont parlé de leur voyage. Ils ont dit aux croyants ce que Dieu avait fait par eux. Ils ont dit : Dieu a aidé les non‑'
  - type: text
    content: Juifs
  - type: text
    content: ' à croire en Jésus. '
  '28':
  - type: text
    content: Paul et Barnabas sont restés pendant longtemps avec les croyants à Antioche.
  '3':
  - type: text
    content: 'Ainsi Paul et Barnabas sont restés pendant longtemps à Icone. Ils faisaient beaucoup de choses puissantes. Ils n’avaient pas peur de parler de Jésus au peuple. Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' montrait au peuple que le message était vrai. Il aidait Paul et Barnabas à faire des choses puissantes. '
  '4':
  - type: text
    content: 'Les gens dans la ville étaient dans 2 groupes. Certains d’entre eux ont cru au message de Paul et de Barnabas. Mais d’autres se sont joints aux '
  - type: text
    content: Juifs
  - type: text
    content: ' qui n’avaient pas cru.'
  '5':
  - type: text
    content: 'Puis les '
  - type: text
    content: Juifs
  - type: text
    content: ' et les étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: ' et tous leurs chefs ont voulu faire du mal à Paul et Barnabas. Ils ont voulu jeter des pierres sur eux jusqu’à ce qu’ils meurent. '
  '6':
  - type: text
    content: 'Paul et Barnabas ont entendu parler de ce que ces personnes voulaient leur faire. Ainsi ils sont partis rapidement à Lystre et à Derbe, où ils étaient sans danger. Ces endroits étaient des villes dans la partie du pays appelé Lycaonie. Ils sont également allés à d’autres endroits près de Lycaonie. '
  '7':
  - type: text
    content: Dans tous ces endroits, ils disaient aux gens la Bonne Nouvelle au sujet de Jésus.
  - type: heading
    content: Ce qui s’est produit à Lystre et à Derbe
  '8':
  - type: text
    content: 'Il y avait un homme qui habitait à Lystre. Il ne pouvait pas marcher, parce que ses pieds n’étaient pas forts. Ses pieds étaient faibles depuis sa naissance. Ainsi il n’avait jamais marché. '
  '9':
  - type: text
    content: 'Il se mettait près de Paul et il écoutait ses paroles. Paul a vu que l’homme a cru à son message. En plus, l’homme a cru qu’il guérira. Et Paul a su cela. '
