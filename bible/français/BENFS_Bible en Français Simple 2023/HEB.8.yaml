document_id: HEB.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: heading
    content: Jésus nous aide en tant que prêtre spécial de Dieu
  - type: text
    content: 'La chose la plus importante que nous disons est la suivante : En Jésus, nous avons ce genre de '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial. Il s’est maintenant assis pour régner avec Dieu dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Il est assis du côté droit de Dieu, qui règne avec tout pouvoir. '
  '10':
  - type: text
    content: 'Mais maintenant, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit ceci :'
  - type: text
    content: Après le temps de cet ancien accord,
  - type: text
    content: Je vais conclure un nouvel accord avec le peuple d’Israël.
  - type: text
    content: 'Ce sera comme ça :'
  - type: text
    content: Je mettrai mes lois dans leurs pensées.
  - type: text
    content: 'J’écrirai mes lois dans leurs '
  - type: text
    content: esprits
  - type: text
    content: .
  - type: text
    content: Je serai leur Dieu et ils seront mon peuple.
  '11':
  - type: text
    content: En conséquence, personne n’aura à parler de moi à ses amis.
  - type: text
    content: 'Personne ne dira à sa famille : Vous devez connaître le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: C’est parce que tout le monde me connaîtra.
  - type: text
    content: Les personnes les moins importantes me connaîtront,
  - type: text
    content: Et les plus grands me connaîtront aussi.
  '12':
  - type: text
    content: Je serai gentil avec eux.
  - type: text
    content: Je leur pardonnerai les mauvaises choses qu’ils font.
  - type: text
    content: Je ne continuerai pas de me souvenir de leurs péchés.
  - type: text
    content: 'C’est ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit.'
  '13':
  - type: text
    content: Nous voyons que Dieu parlait d’un nouvel accord. Cela montre qu’il a fait vieillir le premier accord. Et tout ce qui vieillit comme ça finira bientôt.
  '2':
  - type: text
    content: 'Il sert comme '
  - type: text
    content: prêtre
  - type: text
    content: ' dans le '
  - type: text
    content: ciel
  - type: text
    content: ' pour nous. Il est à la place très spéciale de Dieu, près de Dieu lui‑même. C’est comme l’endroit spécial dans le tabernacle, d’il y a longtemps. Mais ce n’est pas une tente que les gens ont faite. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui‑même a fait cet endroit spécial, et c’est le vrai.'
  '3':
  - type: text
    content: 'Chaque '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial devait présenter des offrandes et des '
  - type: text
    content: sacrifices
  - type: text
    content: ' à Dieu. Donc, Jésus, en tant que '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial, devait également avoir quelque chose à offrir. '
  '4':
  - type: text
    content: 'S’il vivait sur la terre, il ne serait pas '
  - type: text
    content: prêtre
  - type: text
    content: '. Il y a déjà des '
  - type: text
    content: prêtres
  - type: text
    content: ' sur terre qui offrent des cadeaux à Dieu. Ils le font comme la loi de Moïse leur dit. '
  '5':
  - type: text
    content: 'Mais la façon dont ces '
  - type: text
    content: prêtres
  - type: text
    content: ' '
  - type: text
    content: lévites
  - type: text
    content: ' travaillent n’est qu’une image de vraies choses dans le '
  - type: text
    content: ciel
  - type: text
    content: '. C’est comme l’ombre de ce qui se passera au '
  - type: text
    content: ciel
  - type: text
    content: '. Il y a longtemps, lorsque Moïse était prêt à faire le tabernacle, Dieu l’a prévenu à ce propos. Dieu a dit à Moïse : Attention, fais exactement tout comme le plan que je t’ai montré sur la montagne.'
  '6':
  - type: text
    content: 'Mais maintenant, Dieu a donné à Jésus une meilleure façon de le servir comme '
  - type: text
    content: prêtre
  - type: text
    content: . Le nouvel accord que Dieu fait avec son peuple est possible grâce à Jésus. Grâce au travail de Jésus pour nous, le nouvel accord est meilleur que l’ancien. C’est beaucoup mieux, car cela a commencé avec de meilleures promesses.
  '7':
  - type: text
    content: 'S’il n’y avait rien de mal avec ce premier accord, personne n’allait avoir besoin d’un deuxième accord. '
  '8':
  - type: text
    content: 'Mais Dieu y a trouvé quelque chose de mal. En conséquence, il a dit ceci à son peuple :'
  - type: text
    content: 'Écoutez ça ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit :'
  - type: text
    content: Un moment viendra où je conclurai un nouvel accord avec mon peuple.
  - type: text
    content: C’est‑à‑dire avec le peuple d’Israël et avec le peuple de Juda.
  '9':
  - type: text
    content: Ce ne sera pas comme l’accord que j’ai conclu avec leurs ancêtres.
  - type: text
    content: En ce temps‑là, j’ai conduit mon peuple hors du pays appelé l’Égypte.
  - type: text
    content: Je l’ai conduit comme un père qui prend la main de son enfant.
  - type: text
    content: Mais il n’a pas continué d’obéir à mon accord avec eux.
  - type: text
    content: Alors je me suis détourné de lui.
  - type: text
    content: 'Voilà ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
