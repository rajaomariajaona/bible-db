document_id: HEB.8,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 8
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus nous aide en tant que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial de Dieu'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La chose la plus importante que nous disons est la suivante : En Jésus, nous avons ce genre de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial. Il s’est maintenant assis pour régner avec Dieu dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il est assis du côté droit de Dieu, qui règne avec tout pouvoir. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais maintenant, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Après le temps de cet ancien accord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais conclure un nouvel accord avec le peuple d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce sera comme ça :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai mes lois dans leurs pensées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’écrirai mes lois dans leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai leur Dieu et ils seront mon peuple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: En conséquence, personne n’aura à parler de moi à ses amis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Personne ne dira à sa famille : Vous devez connaître le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est parce que tout le monde me connaîtra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les personnes les moins importantes me connaîtront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les plus grands me connaîtront aussi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je serai gentil avec eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur pardonnerai les mauvaises choses qu’ils font.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne continuerai pas de me souvenir de leurs péchés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est ce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nous voyons que Dieu parlait d’un nouvel accord. Cela montre qu’il a fait vieillir le premier accord. Et tout ce qui vieillit comme ça finira bientôt.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il sert comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' pour nous. Il est à la place très spéciale de Dieu, près de Dieu lui‑même. C’est comme l’endroit spécial dans le tabernacle, d’il y a longtemps. Mais ce n’est pas une tente que les gens ont faite. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui‑même a fait cet endroit spécial, et c’est le vrai.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Chaque '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial devait présenter des offrandes et des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifices
    - type: text
      text: ' à Dieu. Donc, Jésus, en tant que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' spécial, devait également avoir quelque chose à offrir. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'S’il vivait sur la terre, il ne serait pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: '. Il y a déjà des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' sur terre qui offrent des cadeaux à Dieu. Ils le font comme la loi de Moïse leur dit. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais la façon dont ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lévites
    - type: text
      text: ' travaillent n’est qu’une image de vraies choses dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. C’est comme l’ombre de ce qui se passera au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il y a longtemps, lorsque Moïse était prêt à faire le tabernacle, Dieu l’a prévenu à ce propos. Dieu a dit à Moïse : Attention, fais exactement tout comme le plan que je t’ai montré sur la montagne.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais maintenant, Dieu a donné à Jésus une meilleure façon de le servir comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: . Le nouvel accord que Dieu fait avec son peuple est possible grâce à Jésus. Grâce au travail de Jésus pour nous, le nouvel accord est meilleur que l’ancien. C’est beaucoup mieux, car cela a commencé avec de meilleures promesses.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'S’il n’y avait rien de mal avec ce premier accord, personne n’allait avoir besoin d’un deuxième accord. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Dieu y a trouvé quelque chose de mal. En conséquence, il a dit ceci à son peuple :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Écoutez ça ! Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un moment viendra où je conclurai un nouvel accord avec mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est‑à‑dire avec le peuple d’Israël et avec le peuple de Juda.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ce ne sera pas comme l’accord que j’ai conclu avec leurs ancêtres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce temps‑là, j’ai conduit mon peuple hors du pays appelé l’Égypte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai conduit comme un père qui prend la main de son enfant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il n’a pas continué d’obéir à mon accord avec eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je me suis détourné de lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voilà ce que dit le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
