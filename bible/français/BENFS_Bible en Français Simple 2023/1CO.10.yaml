document_id: 1CO.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: heading
    content: Les idoles
  - type: text
    content: 'Mes amis chrétiens, souvenez‑vous de ce qui est arrivé à nos ancêtres '
  - type: text
    content: israélites
  - type: text
    content: '. Moïse les a fait sortir d’Égypte, il y a longtemps. Pendant qu’ils suivaient Moïse, ils marchaient tous sous le même nuage. Tous ont traversé la mer Rouge. '
  '10':
  - type: text
    content: Ne vous plaignez pas contre Dieu. Certains de nos ancêtres ont parlé ainsi, et Dieu a envoyé l’
  - type: text
    content: ange
  - type: text
    content: ' de la mort pour les tuer.'
  '11':
  - type: text
    content: Toutes ces choses sont arrivées à nos ancêtres, afin que nous apprenions d’eux. Ces choses sont écrites dans la Bible pour nous enseigner des leçons importantes. Nous sommes des gens qui vivons à une époque où tout deviendra complet.
  '12':
  - type: text
    content: 'Si vous pensez que vous vous tenez fermement, faites attention ! Ne tombez pas ! '
  '13':
  - type: text
    content: 'Vous pouvez souvent vouloir faire de mauvaises choses. Les choses qui vous sont difficiles le sont aussi pour les autres. N’oubliez pas que Dieu est toujours là pour vous aider. Il ne laissera aucune mauvaise chose trop difficile pour vous. Il vous aidera à vous y opposer. Lorsque vous voulez faire quelque chose de mal, Dieu vous rendra forts dans vos '
  - type: text
    content: esprits
  - type: text
    content: . Il vous montrera un moyen pour que vous ne fassiez rien de mal.
  '14':
  - type: text
    content: 'Alors, mes amis, éloignez‑vous des idoles. Ne les adorez pas. '
  '15':
  - type: text
    content: 'Vous êtes des gens qui réfléchissent bien aux choses. Réfléchissez donc à ce que je vous dis. '
  '16':
  - type: text
    content: 'Lorsque nous mangeons le '
  - type: text
    content: repas du Seigneur
  - type: text
    content: ' ensemble, nous nous souvenons que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est mort en notre faveur. Nous remercions Dieu pour le vin que nous buvons dans la coupe. De cette façon, nous nous souvenons que nous appartenons tous à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' à cause de son sang. Nous rompons également le pain et le mangeons ensemble. De cette façon, nous nous souvenons que nous appartenons tous à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' à cause de son corps mort sur la croix. '
  '17':
  - type: text
    content: Nous sommes nombreux, mais nous mangeons tous une partie de la même miche de pain. Cela montre que nous sommes un groupe de personnes. Nous sommes ensemble, parce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort pour nous.'
  '18':
  - type: text
    content: 'Pensez au peuple d’Israël. Ils mangent une partie des animaux que les '
  - type: text
    content: prêtres
  - type: text
    content: ' offrent sur l’autel en '
  - type: text
    content: sacrifice
  - type: text
    content: '. Cela montre qu’ils partagent ensemble le '
  - type: text
    content: sacrifice
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Alors, pensez à la nourriture que les gens offrent aux idoles en '
  - type: text
    content: sacrifice
  - type: text
    content: '. Je ne dis pas que les idoles sont de vrais dieux. La nourriture que les gens leur offrent n’est pas une nourriture spéciale. '
  '2':
  - type: text
    content: 'C’est comme si Dieu les a tous baptisés dans le nuage et dans la mer. De cette façon, ils sont devenus des gens qui ont suivi Moïse. '
  '20':
  - type: text
    content: 'Mais les gens qui offrent de la nourriture aux idoles adorent les démons. Ils n’adorent pas Dieu quand ils font cela. Je ne veux pas que vous partagiez ce qu’ils font pour '
  - type: text
    content: adorer
  - type: text
    content: ' les démons. '
  '21':
  - type: text
    content: 'Si vous buvez quelque chose de la coupe des démons, vous ne pouvez pas boire du vin de la coupe du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Si vous partagez un repas avec des démons, vous ne pouvez pas également partager le '
  - type: text
    content: repas du Seigneur
  - type: text
    content: .
  '22':
  - type: text
    content: 'Si nous faisons des choses comme ça, nous provoquerons la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Nous ne devons '
  - type: text
    content: adorer
  - type: text
    content: ' que lui. Vous savez que nous ne sommes pas plus forts que lui !'
  '23':
  - type: text
    content: 'Certains d’entre vous peuvent dire : Nous sommes libres de faire tout ce que nous voulons ! Mais tout n’est pas bon pour vous. Vous pouvez dire : Nous sommes libres de tout faire ! Mais tout ne vous aide pas à être forts en tant que croyants. '
  '24':
  - type: text
    content: Ne pensez pas aux choses qui vous aideront. Mais, chacun de vous doit réfléchir à ce qui aidera les autres.
  '25':
  - type: text
    content: 'Vous pouvez manger n’importe quelle viande que les gens vendent sur le marché. Ne posez pas de questions sur la viande. Ne causez pas de problèmes à vos pensées. '
  '26':
  - type: text
    content: 'La Bible dit ceci : La terre et tout ce qu’elle contient appartiennent au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '27':
  - type: text
    content: Les gens qui ne croient pas en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' peuvent vous demander de prendre un repas avec eux. Acceptez d’aller chez eux, si vous le souhaitez. Ensuite, vous pouvez manger tout ce qu’ils vous donnent. Ne posez pas de questions sur la nourriture. Ne vous inquiétez pas. '
  '28':
  - type: text
    content: 'Mais quelqu’un là‑bas peut vous dire : Ils ont offert cette nourriture à une idole. Si quelqu’un vous le dit, ne mangez pas la nourriture. Cela pourrait déranger les pensées de la personne qui vous l’a dit. '
  '29':
  - type: text
    content: Cela peut ne pas causer de problèmes à vos propres pensées. Mais l’autre personne ne sait peut‑être pas s’il est juste de manger ce genre de nourriture.
  - type: text
    content: 'Peut‑être, vous direz : Pourquoi les pensées d’une autre personne devraient‑elles décider ce qui est juste pour moi ? Je suis libre de faire ce que je veux. '
  '3':
  - type: text
    content: 'Tous nos ancêtres ont mangé la même nourriture spirituelle. '
  '30':
  - type: text
    content: Je remercie Dieu pour ma nourriture avant de la manger. Si je fais cela, personne ne doit dire que c’est mauvais pour moi de la manger.
  '31':
  - type: text
    content: 'Quoi que vous fassiez, montrez que Dieu est grand. Lorsque vous mangez ou buvez quelque chose, faites tout d’une manière qui loue Dieu. '
  '32':
  - type: text
    content: 'Ne causez pas de problèmes aux autres. Qu’ils soient '
  - type: text
    content: Juifs
  - type: text
    content: ' ou païens, ou qu’ils appartiennent à l’Église de Dieu, ils vivent d’une manière qui ne leur cause aucun problème. '
  '33':
  - type: text
    content: Copiez mon exemple. Quoi que je fasse, j’essaie de rendre les autres heureux. Je n’essaie pas de faire ce qui va m’aider. Mais, je veux aider d’autres personnes. Je vis de cette façon, afin que Dieu sauve beaucoup de gens.
  '4':
  - type: text
    content: 'Ils ont tous bu la même boisson spirituelle. Ils ont bu de l’eau du '
  - type: text
    content: rocher
  - type: text
    content: ' spirituel qui les accompagnait. Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' était ce '
  - type: text
    content: rocher
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ils ont tous reçu la même aide de Dieu, mais la plupart d’entre eux n’ont pas plu à Dieu. Dieu a fait mourir la plupart d’entre eux dans le '
  - type: text
    content: désert
  - type: text
    content: .
  '6':
  - type: text
    content: 'Nous devons apprendre de ce qui est arrivé à nos ancêtres. Nous ne devons pas vouloir faire de très mauvaises choses, comme ils l’ont fait. '
  '7':
  - type: text
    content: 'N’adorons pas les idoles, comme certains d’entre eux ont fait. La Bible dit : Les gens se sont assis pour manger et boire. Après cela, ils se sont levés de leur repas et ont dansé.'
  '8':
  - type: text
    content: Nous ne devons pas non plus avoir de relations sexuelles de mauvaises manières. Certains de nos ancêtres l’ont fait, et 23 000 d’entre eux sont morts en un jour.
  '9':
  - type: text
    content: 'Nous ne devons pas non plus faire de mauvaises choses pour voir si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous punira. Certains de nos ancêtres l’ont fait, et Dieu a envoyé des serpents pour les détruire.'
