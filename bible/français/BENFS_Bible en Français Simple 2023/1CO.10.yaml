document_id: 1CO.10
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 10
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les idoles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes amis chrétiens, souvenez‑vous de ce qui est arrivé à nos ancêtres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israélites
  - type: text
    text: '. Moïse les a fait sortir d’Égypte, il y a longtemps. Pendant qu’ils suivaient Moïse, ils marchaient tous sous le même nuage. Tous ont traversé la mer Rouge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’est comme si Dieu les a tous baptisés dans le nuage et dans la mer. De cette façon, ils sont devenus des gens qui ont suivi Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous nos ancêtres ont mangé la même nourriture spirituelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils ont tous bu la même boisson spirituelle. Ils ont bu de l’eau du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rocher
  - type: text
    text: ' spirituel qui les accompagnait. Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' était ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rocher
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils ont tous reçu la même aide de Dieu, mais la plupart d’entre eux n’ont pas plu à Dieu. Dieu a fait mourir la plupart d’entre eux dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous devons apprendre de ce qui est arrivé à nos ancêtres. Nous ne devons pas vouloir faire de très mauvaises choses, comme ils l’ont fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'N’adorons pas les idoles, comme certains d’entre eux ont fait. La Bible dit : Les gens se sont assis pour manger et boire. Après cela, ils se sont levés de leur repas et ont dansé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nous ne devons pas non plus avoir de relations sexuelles de mauvaises manières. Certains de nos ancêtres l’ont fait, et 23 000 d’entre eux sont morts en un jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous ne devons pas non plus faire de mauvaises choses pour voir si le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous punira. Certains de nos ancêtres l’ont fait, et Dieu a envoyé des serpents pour les détruire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne vous plaignez pas contre Dieu. Certains de nos ancêtres ont parlé ainsi, et Dieu a envoyé l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' de la mort pour les tuer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toutes ces choses sont arrivées à nos ancêtres, afin que nous apprenions d’eux. Ces choses sont écrites dans la Bible pour nous enseigner des leçons importantes. Nous sommes des gens qui vivons à une époque où tout deviendra complet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si vous pensez que vous vous tenez fermement, faites attention ! Ne tombez pas ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous pouvez souvent vouloir faire de mauvaises choses. Les choses qui vous sont difficiles le sont aussi pour les autres. N’oubliez pas que Dieu est toujours là pour vous aider. Il ne laissera aucune mauvaise chose trop difficile pour vous. Il vous aidera à vous y opposer. Lorsque vous voulez faire quelque chose de mal, Dieu vous rendra forts dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Il vous montrera un moyen pour que vous ne fassiez rien de mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors, mes amis, éloignez‑vous des idoles. Ne les adorez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous êtes des gens qui réfléchissent bien aux choses. Réfléchissez donc à ce que je vous dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque nous mangeons le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: repas du Seigneur
  - type: text
    text: ' ensemble, nous nous souvenons que Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort en notre faveur. Nous remercions Dieu pour le vin que nous buvons dans la coupe. De cette façon, nous nous souvenons que nous appartenons tous à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à cause de son sang. Nous rompons également le pain et le mangeons ensemble. De cette façon, nous nous souvenons que nous appartenons tous à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à cause de son corps mort sur la croix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nous sommes nombreux, mais nous mangeons tous une partie de la même miche de pain. Cela montre que nous sommes un groupe de personnes. Nous sommes ensemble, parce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort pour nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pensez au peuple d’Israël. Ils mangent une partie des animaux que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' offrent sur l’autel en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: '. Cela montre qu’ils partagent ensemble le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors, pensez à la nourriture que les gens offrent aux idoles en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: '. Je ne dis pas que les idoles sont de vrais dieux. La nourriture que les gens leur offrent n’est pas une nourriture spéciale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais les gens qui offrent de la nourriture aux idoles adorent les démons. Ils n’adorent pas Dieu quand ils font cela. Je ne veux pas que vous partagiez ce qu’ils font pour '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' les démons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si vous buvez quelque chose de la coupe des démons, vous ne pouvez pas boire du vin de la coupe du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Si vous partagez un repas avec des démons, vous ne pouvez pas également partager le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: repas du Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si nous faisons des choses comme ça, nous provoquerons la colère du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Nous ne devons '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' que lui. Vous savez que nous ne sommes pas plus forts que lui !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Certains d’entre vous peuvent dire : Nous sommes libres de faire tout ce que nous voulons ! Mais tout n’est pas bon pour vous. Vous pouvez dire : Nous sommes libres de tout faire ! Mais tout ne vous aide pas à être forts en tant que croyants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ne pensez pas aux choses qui vous aideront. Mais, chacun de vous doit réfléchir à ce qui aidera les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous pouvez manger n’importe quelle viande que les gens vendent sur le marché. Ne posez pas de questions sur la viande. Ne causez pas de problèmes à vos pensées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La Bible dit ceci : La terre et tout ce qu’elle contient appartiennent au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Les gens qui ne croient pas en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' peuvent vous demander de prendre un repas avec eux. Acceptez d’aller chez eux, si vous le souhaitez. Ensuite, vous pouvez manger tout ce qu’ils vous donnent. Ne posez pas de questions sur la nourriture. Ne vous inquiétez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais quelqu’un là‑bas peut vous dire : Ils ont offert cette nourriture à une idole. Si quelqu’un vous le dit, ne mangez pas la nourriture. Cela pourrait déranger les pensées de la personne qui vous l’a dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Cela peut ne pas causer de problèmes à vos propres pensées. Mais l’autre personne ne sait peut‑être pas s’il est juste de manger ce genre de nourriture.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Peut‑être, vous direz : Pourquoi les pensées d’une autre personne devraient‑elles décider ce qui est juste pour moi ? Je suis libre de faire ce que je veux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je remercie Dieu pour ma nourriture avant de la manger. Si je fais cela, personne ne doit dire que c’est mauvais pour moi de la manger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Quoi que vous fassiez, montrez que Dieu est grand. Lorsque vous mangez ou buvez quelque chose, faites tout d’une manière qui loue Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ne causez pas de problèmes aux autres. Qu’ils soient '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ou païens, ou qu’ils appartiennent à l’Église de Dieu, ils vivent d’une manière qui ne leur cause aucun problème. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Copiez mon exemple. Quoi que je fasse, j’essaie de rendre les autres heureux. Je n’essaie pas de faire ce qui va m’aider. Mais, je veux aider d’autres personnes. Je vis de cette façon, afin que Dieu sauve beaucoup de gens.
