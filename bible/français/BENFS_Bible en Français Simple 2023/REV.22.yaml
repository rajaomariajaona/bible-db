document_id: REV.22,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 22
  - type: heading
    content: Le fleuve et l’arbre dans la ville
  - type: text
    content: Puis l’
  - type: text
    content: ange
  - type: text
    content: ' m’a montré un fleuve. Il y avait de l’eau qui fait que les gens aient la vraie vie. L’eau brillait comme un verre propre. Le fleuve est parti du trône de Dieu, qui est aussi le trône de l’Agneau. Son eau coulait de là. '
  '10':
  - type: text
    content: 'Puis il m’a dit : Ne cache pas les paroles du message de Dieu qui sont dans ce livre. Le moment est proche où ces choses se réaliseront. '
  '11':
  - type: text
    content: Que chacun continue à vivre comme bon lui semble. La personne qui fait de mauvaises choses peut continuer à faire de mauvaises choses. La personne qui est impure peut continuer d’être impure. La personne qui fait les bonnes choses peut continuer de faire les bonnes choses. La personne qui fait la volonté de Dieu continue à faire ce que Dieu veut.
  '12':
  - type: text
    content: 'Jésus a dit : Écoutez ! Je viendrai vite ! Je sais ce que chaque personne a fait. Je donnerai à chacun ce qu’il doit avoir. Je suis prêt à faire cela. '
  '13':
  - type: text
    content: Je suis le premier et je suis le dernier. Je commence et je finis toute chose. Je suis le premier et le dernier, le commencement et la fin.
  '14':
  - type: text
    content: 'Les croyants purs seront heureux. Ils sont comme des gens qui lavent toujours leurs vêtements. Je les laisserai manger le fruit de l’arbre qui donne aux gens la vraie vie. Je vais les laisser passer par les portes de la ville. '
  '15':
  - type: text
    content: 'Mais voici les gens qui resteront en dehors de la ville : Les gens qui vivaient comme des chiens. Les gens qui faisaient la magie. Ceux qui avaient de mauvaises relations sexuelles. Les gens qui tuaient d’autres personnes. Les gens qui adoraient de faux dieux. Tous ceux qui disaient des mensonges et qui aimaient faire ça.'
  '16':
  - type: text
    content: 'Je suis Jésus. J’ai envoyé mon '
  - type: text
    content: ange
  - type: text
    content: ' pour te dire ce message. Tu dois le dire à toutes les personnes dans les Églises. Je m’appelle la Racine du roi David. Je viens de sa famille. Je suis l’étoile brillante du matin.'
  '17':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu et tout le peuple de Dieu disent à Jésus :'
  - type: text
    content: Oui, viens !
  - type: text
    content: 'Le peuple de Dieu est comme une femme qui deviendra la femme de Jésus. Que celui qui entend mes paroles, dise également à Jésus ceci :'
  - type: text
    content: Viens !
  - type: text
    content: Quiconque a soif peut venir à Jésus. Il donnera l’eau de la vraie vie à tous ceux qui le voudront. Ils n’auront rien à payer pour cela.
  '18':
  - type: text
    content: 'Or Jean a dit ceci : Je dis clairement à tous ceux qui entendent le message de Dieu qui est écrit dans ce livre : Si quelqu’un ajoute quelque chose aux paroles qui sont dans ce livre, Dieu le punira. Les problèmes que ce livre décrit lui arriveront. '
  '19':
  - type: text
    content: Et si quelqu’un enlève quelque chose des paroles qui sont dans ce livre, Dieu le punira aussi. Il ne le laissera pas manger le fruit de son arbre qui donne la vraie vie. Dieu ne le laissera pas non plus vivre dans sa propre ville spéciale. Ce livre décrit toutes ces choses.
  '2':
  - type: text
    content: Elle coulait au milieu de la plus grande rue de la ville. J’ai vu un arbre qui poussait de chaque côté du fleuve. C’est l’arbre qui fait que les gens aient la vraie vie. Il a 12 types de fruits différents. Il produit de nouveaux fruits chaque mois. Les feuilles de l’arbre sont comme des médicaments. Ils rendent les gens de chaque pays à nouveau bien.
  '20':
  - type: text
    content: 'C’est Jésus qui nous dit que tous ces messages sont vrais. Il dit :'
  - type: text
    content: Oui, je viendrai vite !
  - type: text
    content: 'Amen ! Cela doit arriver ! Viens, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus !'
  '21':
  - type: text
    content: 'Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus continue d’être bon envers vous tous.'
  '3':
  - type: text
    content: 'Il n’y aura rien contre quoi Dieu parlera. Le trône de Dieu, qui est le trône de l’Agneau, sera dans la ville. Les serviteurs de Dieu l’adoreront là‑bas. '
  '4':
  - type: text
    content: 'Ils verront son visage. Son nom sera sur le devant de leurs têtes. '
  '5':
  - type: text
    content: 'Il n’y aura plus de nuit, donc personne n’aura besoin d’une lampe pour faire de la lumière. Ils n’auront pas besoin de la lumière du soleil, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu brillera sur eux. Ils régneront comme des rois pour toujours.'
  '6':
  - type: text
    content: Alors l’
  - type: text
    content: ange
  - type: text
    content: ' m’a dit : Toutes ces paroles sont vraies et chacun peut croire à cela. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu donne son message spécial à ses '
  - type: text
    content: prophètes
  - type: text
    content: '. Maintenant, il a envoyé son '
  - type: text
    content: ange
  - type: text
    content: ' pour parler à ses serviteurs. L’'
  - type: text
    content: ange
  - type: text
    content: ' leur a montré ce qui doit arriver bientôt.'
  - type: heading
    content: Jésus parle
  '7':
  - type: text
    content: 'Jésus dit : Écoutez ! Je viendrai vite. Toute personne qui obéit à mon message sera heureuse ! Ce livre décrit ce message de Dieu.'
  - type: heading
    content: Jean termine son livre
  '8':
  - type: text
    content: Je suis Jean. J’ai moi‑même entendu ces choses et je les ai vues. Quand je les ai entendues et que je les ai vues, je suis tombé aux pieds de l’
  - type: text
    content: ange
  - type: text
    content: .
  - type: text
    content: 'Je voulais '
  - type: text
    content: adorer
  - type: text
    content: ' l’'
  - type: text
    content: ange
  - type: text
    content: ' parce qu’il m’avait montré ces choses. '
  '9':
  - type: text
    content: 'Mais il m’a dit : Tu ne dois pas faire cela ! Je ne suis qu’un serviteur de Dieu, comme toi. Je suis un serviteur, comme tous les '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu, qui sont des croyants comme toi. Je suis un serviteur comme tous ceux qui obéissent au message de Dieu qui est écrit dans ce livre. Tu dois '
  - type: text
    content: adorer
  - type: text
    content: ' seulement Dieu !'
