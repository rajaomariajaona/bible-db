document_id: ROM.16
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 16
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit bonjour aux gens de Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je veux que vous sachiez que notre amie chrétienne Phoebé est une bonne personne. Elle est servante de l’Église de Cenchrées. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'S’il vous plaît, soyez gentils avec elle lorsqu’elle viendra à vous, car vous appartenez au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Aidez‑la comme le peuple de Dieu doit s’entraider. Donnez‑lui les choses dont elle a besoin. Elle a travaillé pour m’aider ainsi que de nombreuses autres personnes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dites bonjour en mon nom à Prisca et Aquilas. Ils ont travaillé avec moi en tant que serviteurs de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils étaient même prêts à mourir pour pouvoir m’aider. J’ai donc une bonne raison de les remercier. Tous les groupes des non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont également une bonne raison de les remercier. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dites également bonjour pour moi au groupe de croyants qui se réunissent dans la maison de Prisca et Aquilas.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dites bonjour à mon très bon ami Épaїnète. C’était la première personne dans la région de l’Asie à croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dites bonjour à Marie, qui a beaucoup travaillé pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dites bonjour à mes parents Andronicus et Junias. Nous étions ensemble dans une prison à un moment donné. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' les connaissent bien et les respectent. Ils sont devenus croyants en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' avant moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dites bonjour à Amplias en mon nom. Il est mon très bon ami dans la famille du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dites bonjour à Urbain, qui travaille avec nous pour servir Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dites également bonjour à mon bon ami Stachys. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dites bonjour à Apellès. Il a montré qu’il faisait très bien confiance en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dites bonjour aux personnes qui appartiennent à la famille d’Aristobule. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dites bonjour à mon parent Hérodion. Dites bonjour aux personnes de la famille de Narcisse qui appartiennent au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dites bonjour à Tryphène et Tryphose. Ils travaillent dur pour servir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Dites bonjour à ma bonne amie Perside. Elle a travaillé très dur pour servir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dites bonjour à Rufus. Il est un serviteur spécial du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Dites bonjour aussi à sa mère, qui a été gentille avec moi, comme une mère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dites bonjour à Asyncrite, Phlégon, Hermès, Patrobas et Hermas. Dites bonjour aussi à tous nos amis chrétiens qui sont là avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dites bonjour à Philologue et Julie, à Nérée et à sa sœur, et à Olympe. Dites bonjour aussi à tout le peuple de Dieu qui est là avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lorsque vous vous rencontrez, embrassez‑vous en frères et sœurs chrétiens. Les gens de toutes les églises chrétiennes ici vous disent bonjour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit aux chrétiens de Rome de faire attention aux faux enseignants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mes amis chrétiens, je veux vous dire quelque chose d’important. Faites très attention aux personnes qui enseignent de mauvaises choses. Elles enseignent des choses différentes du vrai message de Dieu que vous avez appris. Ces gens vous amènent à vous quereller les uns avec les autres. Ils poussent les gens à se détourner de Dieu. Vous devez rester loin d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les gens qui sont comme cela ne sont pas des serviteurs de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Alors, ils font des choses qui leur plaisent. Ils parlent des mots qui semblent bons et agréables. Mais ils trompent les gens qui acceptent facilement un faux message.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tout le monde sait que vous obéissez bien à Dieu. Je suis donc très heureux à cause de vous. Mais je veux que vous compreniez clairement ce qui est bien. Et je veux ceci : Évitez de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dieu nous donne la paix dans nos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Il vous aidera rapidement à gagner contre la puissance de Satan. Je prie pour que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus continue d’être gentil avec vous.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul termine sa lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Timothée, qui travaille avec moi, vous dit bonjour. Mes parents, Lucius, Jason et Sosipater, vous disent également bonjour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je suis Tertius, et j’ai écrit cette lettre pour Paul. J’appartiens également au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et je vous dis bonjour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Gaїus vous dit aussi bonjour. Moi, Paul, je reste dans sa maison. Le groupe des chrétiens ici se réunit également dans sa maison. Eraste vous dit également bonjour. C’est un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officier
  - type: text
    text: ' qui s’occupe de l’argent de la ville. Notre ami chrétien Quartus vous dit aussi bonjour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je prie pour que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continue d’être très gentil avec vous tous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nous louons Dieu parce qu’il est grand ! Il est capable de vous rendre forts dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '  ! Voilà la Bonne Nouvelle que j’enseigne. Cette Bonne Nouvelle est le message au sujet de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' que Dieu a gardé secret depuis longtemps. Mais maintenant, il nous a montré ce message. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu avaient déjà écrit que cette Bonne Nouvelle arrivera. Dieu, qui vit pour toujours, nous a dit de le dire aux gens. Il veut que les gens de tous les pays connaissent ce message. Ensuite, ils peuvent croire en Dieu et ils peuvent lui obéir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Oui, nous glorifions Dieu ! Lui seul est complètement sage. Nous le glorifions pour toujours, à cause de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '  ! C’est vrai. Amen.'
