document_id: ROM.16,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 16
  - type: heading
    content: Paul dit bonjour aux gens de Rome
  - type: text
    content: 'Je veux que vous sachiez que notre amie chrétienne Phoebé est une bonne personne. Elle est servante de l’Église de Cenchrées. '
  '10':
  - type: text
    content: Dites bonjour à Apellès. Il a montré qu’il faisait très bien confiance en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Dites bonjour aux personnes qui appartiennent à la famille d’Aristobule. '
  '11':
  - type: text
    content: 'Dites bonjour à mon parent Hérodion. Dites bonjour aux personnes de la famille de Narcisse qui appartiennent au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: 'Dites bonjour à Tryphène et Tryphose. Ils travaillent dur pour servir le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Dites bonjour à ma bonne amie Perside. Elle a travaillé très dur pour servir le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Dites bonjour à Rufus. Il est un serviteur spécial du '
  - type: text
    content: Seigneur
  - type: text
    content: . Dites bonjour aussi à sa mère, qui a été gentille avec moi, comme une mère.
  '14':
  - type: text
    content: 'Dites bonjour à Asyncrite, Phlégon, Hermès, Patrobas et Hermas. Dites bonjour aussi à tous nos amis chrétiens qui sont là avec eux. '
  '15':
  - type: text
    content: Dites bonjour à Philologue et Julie, à Nérée et à sa sœur, et à Olympe. Dites bonjour aussi à tout le peuple de Dieu qui est là avec eux.
  '16':
  - type: text
    content: Lorsque vous vous rencontrez, embrassez‑vous en frères et sœurs chrétiens. Les gens de toutes les églises chrétiennes ici vous disent bonjour.
  - type: heading
    content: Paul dit aux chrétiens de Rome de faire attention aux faux enseignants
  '17':
  - type: text
    content: 'Mes amis chrétiens, je veux vous dire quelque chose d’important. Faites très attention aux personnes qui enseignent de mauvaises choses. Elles enseignent des choses différentes du vrai message de Dieu que vous avez appris. Ces gens vous amènent à vous quereller les uns avec les autres. Ils poussent les gens à se détourner de Dieu. Vous devez rester loin d’eux. '
  '18':
  - type: text
    content: 'Les gens qui sont comme cela ne sont pas des serviteurs de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Alors, ils font des choses qui leur plaisent. Ils parlent des mots qui semblent bons et agréables. Mais ils trompent les gens qui acceptent facilement un faux message.
  '19':
  - type: text
    content: 'Tout le monde sait que vous obéissez bien à Dieu. Je suis donc très heureux à cause de vous. Mais je veux que vous compreniez clairement ce qui est bien. Et je veux ceci : Évitez de mauvaises choses. '
  '2':
  - type: text
    content: 'S’il vous plaît, soyez gentils avec elle lorsqu’elle viendra à vous, car vous appartenez au '
  - type: text
    content: Seigneur
  - type: text
    content: . Aidez‑la comme le peuple de Dieu doit s’entraider. Donnez‑lui les choses dont elle a besoin. Elle a travaillé pour m’aider ainsi que de nombreuses autres personnes.
  '20':
  - type: text
    content: 'Dieu nous donne la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: '. Il vous aidera rapidement à gagner contre la puissance de Satan. Je prie pour que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus continue d’être gentil avec vous.'
  - type: heading
    content: Paul termine sa lettre
  '21':
  - type: text
    content: Timothée, qui travaille avec moi, vous dit bonjour. Mes parents, Lucius, Jason et Sosipater, vous disent également bonjour.
  '22':
  - type: text
    content: 'Je suis Tertius, et j’ai écrit cette lettre pour Paul. J’appartiens également au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et je vous dis bonjour.'
  '23':
  - type: text
    content: 'Gaїus vous dit aussi bonjour. Moi, Paul, je reste dans sa maison. Le groupe des chrétiens ici se réunit également dans sa maison. Eraste vous dit également bonjour. C’est un '
  - type: text
    content: officier
  - type: text
    content: ' qui s’occupe de l’argent de la ville. Notre ami chrétien Quartus vous dit aussi bonjour.'
  '24':
  - type: text
    content: 'Je prie pour que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continue d’être très gentil avec vous tous.'
  '25':
  - type: text
    content: 'Nous louons Dieu parce qu’il est grand ! Il est capable de vous rendre forts dans vos '
  - type: text
    content: esprits
  - type: text
    content: '  ! Voilà la Bonne Nouvelle que j’enseigne. Cette Bonne Nouvelle est le message au sujet de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' que Dieu a gardé secret depuis longtemps. Mais maintenant, il nous a montré ce message. '
  '26':
  - type: text
    content: 'Les '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu avaient déjà écrit que cette Bonne Nouvelle arrivera. Dieu, qui vit pour toujours, nous a dit de le dire aux gens. Il veut que les gens de tous les pays connaissent ce message. Ensuite, ils peuvent croire en Dieu et ils peuvent lui obéir.'
  '27':
  - type: text
    content: Oui, nous glorifions Dieu ! Lui seul est complètement sage. Nous le glorifions pour toujours, à cause de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '  ! C’est vrai. Amen.'
  '3':
  - type: text
    content: Dites bonjour en mon nom à Prisca et Aquilas. Ils ont travaillé avec moi en tant que serviteurs de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ils étaient même prêts à mourir pour pouvoir m’aider. J’ai donc une bonne raison de les remercier. Tous les groupes des non '
  - type: text
    content: Juifs
  - type: text
    content: ' ont également une bonne raison de les remercier. '
  '5':
  - type: text
    content: Dites également bonjour pour moi au groupe de croyants qui se réunissent dans la maison de Prisca et Aquilas.
  - type: text
    content: 'Dites bonjour à mon très bon ami Épaїnète. C’était la première personne dans la région de l’Asie à croire en '
  - type: text
    content: Christ
  - type: text
    content: .
  '6':
  - type: text
    content: 'Dites bonjour à Marie, qui a beaucoup travaillé pour vous. '
  '7':
  - type: text
    content: 'Dites bonjour à mes parents Andronicus et Junias. Nous étions ensemble dans une prison à un moment donné. Les '
  - type: text
    content: apôtres
  - type: text
    content: ' les connaissent bien et les respectent. Ils sont devenus croyants en '
  - type: text
    content: Christ
  - type: text
    content: ' avant moi.'
  '8':
  - type: text
    content: 'Dites bonjour à Amplias en mon nom. Il est mon très bon ami dans la famille du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: text
    content: Dites bonjour à Urbain, qui travaille avec nous pour servir Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Dites également bonjour à mon bon ami Stachys. '
