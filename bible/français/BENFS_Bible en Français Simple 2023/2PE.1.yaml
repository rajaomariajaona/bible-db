document_id: 2PE.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu nous a donné tout ce dont nous avons besoin pour être son peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C’est moi Simon Pierre qui écris cette lettre. Je suis le serviteur de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' et son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Je vous écris, vous les gens qui croyez en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', comme nous. C’est un cadeau précieux que Dieu nous a donné à tous. Il l’a fait parce que Jésus est complètement bon et juste. Jésus est celui qui nous sauve. Il est le Dieu que nous servons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je prie pour que Dieu vous aide et vous donne de plus en plus la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Vous grandirez comme croyants, parce que vous connaissez Dieu et vous connaissez Jésus, notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dieu est très puissant, parce qu’il est Dieu. Il a utilisé cette puissance pour nous aider. Il nous a donné tout ce dont nous avons besoin pour bien vivre. Nous pouvons faire des choses qui rendent Dieu heureux. C’est possible parce que maintenant nous le connaissons. Dieu nous a choisis pour être son peuple, parce qu’il est très grand et très bon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: À cause de cela, Dieu a promis qu’il fera des choses très grandes et précieuses pour nous. Par conséquent, vous pouvez faire ce qui est bien, comme Dieu le fait. Les gens qui appartiennent à ce monde veulent faire de mauvaises choses. Ces mauvaises choses les rendent de plus en plus mauvais. Mais Dieu vous donne la puissance d’être libres de tout cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dieu a fait tout cela pour vous aider. Donc, maintenant que vous croyez en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', vous devez grandir en croyant. Essayez beaucoup de toujours faire ce qui est bon. Alors, vous allez connaître Dieu de plus en plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors, vous allez apprendre à vous diriger correctement. Ce n’est pas tout. Vous devez également apprendre à être patients et courageux. Et vous devez servir Dieu d’une bonne manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous ne devez pas seulement servir Dieu, mais vous devez être bons envers les autres croyants comme vos propres frères et sœurs. Et vous ne devez pas seulement aimer les autres chrétiens, mais vous devez aussi aimer tout le monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Comme vous êtes croyants, vous devez de plus en plus grandir dans toutes ces manières de vivre. Lorsque vous vivez de cette façon, cela montrera que vous connaissez vraiment notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Les gens verront que votre vie a de bons résultats. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais certaines gens ne vivent pas de cette bonne façon. Ils ne pensent pas que ces choses sont importantes. Ils sont comme des gens qui ne voient pas clairement. Ils ne peuvent vraiment rien voir. Ils ont oublié que Dieu les a rendus purs. Il leur a pardonné toutes les mauvaises choses qu’ils avaient faites auparavant. Mais ils l’ont oublié.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors, mes amis, essayez beaucoup de faire ces bonnes choses. Vivez bien, parce que Dieu vous a choisis pour être son propre peuple. Montrez que vous appartenez vraiment à Dieu ! Si vous faites ces choses, vous ne vous détournerez jamais de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De plus, Dieu sera très heureux. Il vous amènera dans cet endroit où Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' dirigera son peuple pour toujours. Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' nous a sauvés et vous vivrez avec lui pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous savez déjà ces choses. Vous savez qu’elles sont complètement vraies. Mais parce qu’elles sont importantes, je continuerai de vous en parler encore et encore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je veux que vous vous en souveniez. Je vais donc continuer de vous en parler. Je pense qu’il est juste de le faire. Je vais donc le faire pendant que je vis encore ici sur terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je sais que je mourrai bientôt. Notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' m’a montré que cela arrivera bientôt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je veux que vous vous souveniez toujours de ces choses après ma mort. Je vais donc essayer de vous en parler fortement maintenant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Pierre lui‑même a vu combien le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est grand'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous vous avons dit que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est puissant. Nous vous avons également dit qu’il reviendra sur terre. Nous ne vous disions pas de fausses histoires qui provenaient des idées intelligentes des gens. Mais, nous vous disions ce que nous avions nous‑mêmes vu. Nous avons nous‑mêmes vu que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus est très grand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'Nous étions avec lui sur la montagne quand son Père Dieu lui a parlé. Dieu a glorifié son Fils, Jésus, et il a dit que Jésus est grand. Nous avons nous‑mêmes entendu la voix de Dieu parler à Jésus du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' d’en haut où Dieu règne avec puissance. Il a dit : Voici mon Fils et je l’aime. Il me rend très heureux.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les messages de Dieu dans la Bible sont très importants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En plus de cela, nous avons les messages des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' d’il y a longtemps. Ils nous montrent également très clairement que ces choses sont vraies. Les paroles des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' sont comme une lumière qui brille dans un endroit sombre. Cette lumière continue de briller dans l’obscurité jusqu’à l’aube. Vous devez donc réfléchir attentivement à ces messages. Ensuite, l’étoile du matin se lèvera et apportera de la lumière au plus profond de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il est très important que vous compreniez ceci : Les messages des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' dans la Bible ne sont pas venus de leurs propres idées. Ce n’était jamais comme cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aucun des messages des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' n’est venu parce qu’une personne voulait dire quelque chose. Mais, l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' Saint de Dieu a amené les gens à prononcer des paroles qui venaient de Dieu.'
