document_id: 2PE.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Dieu nous a donné tout ce dont nous avons besoin pour être son peuple
  - type: text
    content: C’est moi Simon Pierre qui écris cette lettre. Je suis le serviteur de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' et son '
  - type: text
    content: apôtre
  - type: text
    content: .
  - type: text
    content: Je vous écris, vous les gens qui croyez en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', comme nous. C’est un cadeau précieux que Dieu nous a donné à tous. Il l’a fait parce que Jésus est complètement bon et juste. Jésus est celui qui nous sauve. Il est le Dieu que nous servons.'
  '10':
  - type: text
    content: 'Alors, mes amis, essayez beaucoup de faire ces bonnes choses. Vivez bien, parce que Dieu vous a choisis pour être son propre peuple. Montrez que vous appartenez vraiment à Dieu ! Si vous faites ces choses, vous ne vous détournerez jamais de Dieu. '
  '11':
  - type: text
    content: De plus, Dieu sera très heureux. Il vous amènera dans cet endroit où Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' dirigera son peuple pour toujours. Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' nous a sauvés et vous vivrez avec lui pour toujours.'
  '12':
  - type: text
    content: 'Vous savez déjà ces choses. Vous savez qu’elles sont complètement vraies. Mais parce qu’elles sont importantes, je continuerai de vous en parler encore et encore. '
  '13':
  - type: text
    content: 'Je veux que vous vous en souveniez. Je vais donc continuer de vous en parler. Je pense qu’il est juste de le faire. Je vais donc le faire pendant que je vis encore ici sur terre. '
  '14':
  - type: text
    content: 'Je sais que je mourrai bientôt. Notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' m’a montré que cela arrivera bientôt. '
  '15':
  - type: text
    content: Je veux que vous vous souveniez toujours de ces choses après ma mort. Je vais donc essayer de vous en parler fortement maintenant.
  - type: heading
    content: Pierre lui‑même a vu combien le Christ est grand
  '16':
  - type: text
    content: 'Nous vous avons dit que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est puissant. Nous vous avons également dit qu’il reviendra sur terre. Nous ne vous disions pas de fausses histoires qui provenaient des idées intelligentes des gens. Mais, nous vous disions ce que nous avions nous‑mêmes vu. Nous avons nous‑mêmes vu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus est très grand. '
  '17':
  - type: text
    content: 'Nous étions avec lui sur la montagne quand son Père Dieu lui a parlé. Dieu a glorifié son Fils, Jésus, et il a dit que Jésus est grand. Nous avons nous‑mêmes entendu la voix de Dieu parler à Jésus du '
  - type: text
    content: ciel
  - type: text
    content: ' d’en haut où Dieu règne avec puissance. Il a dit : Voici mon Fils et je l’aime. Il me rend très heureux.'
  - type: heading
    content: Les messages de Dieu dans la Bible sont très importants
  '19':
  - type: text
    content: 'En plus de cela, nous avons les messages des '
  - type: text
    content: prophètes
  - type: text
    content: ' d’il y a longtemps. Ils nous montrent également très clairement que ces choses sont vraies. Les paroles des '
  - type: text
    content: prophètes
  - type: text
    content: ' sont comme une lumière qui brille dans un endroit sombre. Cette lumière continue de briller dans l’obscurité jusqu’à l’aube. Vous devez donc réfléchir attentivement à ces messages. Ensuite, l’étoile du matin se lèvera et apportera de la lumière au plus profond de vous. '
  '2':
  - type: text
    content: 'Je prie pour que Dieu vous aide et vous donne de plus en plus la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: '. Vous grandirez comme croyants, parce que vous connaissez Dieu et vous connaissez Jésus, notre '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: text
    content: 'Il est très important que vous compreniez ceci : Les messages des '
  - type: text
    content: prophètes
  - type: text
    content: ' dans la Bible ne sont pas venus de leurs propres idées. Ce n’était jamais comme cela. '
  '21':
  - type: text
    content: 'Aucun des messages des '
  - type: text
    content: prophètes
  - type: text
    content: ' n’est venu parce qu’une personne voulait dire quelque chose. Mais, l’'
  - type: text
    content: Esprit
  - type: text
    content: ' Saint de Dieu a amené les gens à prononcer des paroles qui venaient de Dieu.'
  '3':
  - type: text
    content: 'Dieu est très puissant, parce qu’il est Dieu. Il a utilisé cette puissance pour nous aider. Il nous a donné tout ce dont nous avons besoin pour bien vivre. Nous pouvons faire des choses qui rendent Dieu heureux. C’est possible parce que maintenant nous le connaissons. Dieu nous a choisis pour être son peuple, parce qu’il est très grand et très bon. '
  '4':
  - type: text
    content: À cause de cela, Dieu a promis qu’il fera des choses très grandes et précieuses pour nous. Par conséquent, vous pouvez faire ce qui est bien, comme Dieu le fait. Les gens qui appartiennent à ce monde veulent faire de mauvaises choses. Ces mauvaises choses les rendent de plus en plus mauvais. Mais Dieu vous donne la puissance d’être libres de tout cela.
  '5':
  - type: text
    content: 'Dieu a fait tout cela pour vous aider. Donc, maintenant que vous croyez en '
  - type: text
    content: Christ
  - type: text
    content: ', vous devez grandir en croyant. Essayez beaucoup de toujours faire ce qui est bon. Alors, vous allez connaître Dieu de plus en plus. '
  '6':
  - type: text
    content: 'Alors, vous allez apprendre à vous diriger correctement. Ce n’est pas tout. Vous devez également apprendre à être patients et courageux. Et vous devez servir Dieu d’une bonne manière. '
  '7':
  - type: text
    content: Vous ne devez pas seulement servir Dieu, mais vous devez être bons envers les autres croyants comme vos propres frères et sœurs. Et vous ne devez pas seulement aimer les autres chrétiens, mais vous devez aussi aimer tout le monde.
  '8':
  - type: text
    content: 'Comme vous êtes croyants, vous devez de plus en plus grandir dans toutes ces manières de vivre. Lorsque vous vivez de cette façon, cela montrera que vous connaissez vraiment notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Les gens verront que votre vie a de bons résultats. '
  '9':
  - type: text
    content: Mais certaines gens ne vivent pas de cette bonne façon. Ils ne pensent pas que ces choses sont importantes. Ils sont comme des gens qui ne voient pas clairement. Ils ne peuvent vraiment rien voir. Ils ont oublié que Dieu les a rendus purs. Il leur a pardonné toutes les mauvaises choses qu’ils avaient faites auparavant. Mais ils l’ont oublié.
