document_id: JAS.1,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 1
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: J’écris aux 12 tribus du peuple de Dieu. Elles vivent dans de nombreuses parties du monde. Je vous salue toutes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Que faire en cas de problèmes
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Et les croyants riches doivent aussi être heureux. Pourquoi ? Parce que Dieu leur a montré qu’ils ne sont pas très grands. Les riches doivent se rappeler qu’ils mourront, comme une fleur sauvage meurt rapidement.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Lorsque le soleil se lève, sa chaleur fait sécher les plantes. Leurs fleurs tombent au sol. Elles ne sont plus belles. De la même manière, les riches mourront lorsqu’ils seront occupés dans leur travail. Ils n’auront alors plus rien.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Certaines personnes continuent de faire confiance en Dieu même lorsque des problèmes surviennent. Dieu bénira ces gens s’ils montrent qu’ils lui font vraiment confiance. Il leur donnera le cadeau qui est la vie avec lui. Il a promis d’offrir ce cadeau à tous ceux qui l’aiment.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsque des problèmes vous arrivent, vous voudrez peut‑être faire quelque chose de mal. Mais ne dites pas : Dieu me fait faire de mauvaises choses. Rien ne peut faire que Dieu fasse quelque chose de mal. Et Dieu n’amène personne à faire quelque chose de mal.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ce sont nos propres pensées qui nous font faire de mauvaises choses. Lorsque nous voulons faire quelque chose de mal, nos pensées nous conduisent mal.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nous pouvons accepter de faire ce que nos mauvaises pensées nous disent de faire. Lorsque nous faisons de mauvaises choses, cela devient un péché. Ensuite, nous ne pouvons pas arrêter de faire ces mauvaises choses. Si nous continuons de vivre comme ça, le résultat de nos péchés, c’est la mort.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mes amis chrétiens, ne vous trompez pas.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'N’oubliez pas que tout bon cadeau nous vient de Dieu. Il ne fait que ce qui nous aidera. Il est notre Père céleste. Il a fait dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' tout ce qui nous donne la lumière. Ces choses ne nous donnent pas toujours la même lumière. Elles changent, mais Dieu ne change pas.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il a choisi de faire de nous ses enfants. Il a utilisé son vrai message pour cela. Pour cette raison, nous sommes comme le premier cadeau spécial qui lui appartient parmi toutes les personnes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Écoutez et faites ce que Dieu veut
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Comprenez ceci, mes amis chrétiens : Nous devons tous faire attention d’écouter. Nous ne devons pas être trop rapides pour parler. Nous ne devons pas nous mettre en colère rapidement.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mes amis chrétiens, n’oubliez pas d’être heureux, même lorsque de nombreux problèmes vous arrivent. Les problèmes peuvent vous aider.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dieu veut que vous fassiez ce qui est bien. Mais quand quelqu’un est en colère, il ne fait pas de bonnes choses.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Alors, arrêtez de faire quoi que ce soit de mauvais. Éloignez‑vous de mauvaises choses qui vous entourent. Dieu a mis son message au plus profond de vous, et cela peut vous sauver. Alors, acceptez ce message.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais, faites ce que Dieu dit dans son message. Ne l’écoutez pas seulement. Ne faites pas cette erreur ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Vous devez obéir au message de Dieu. Ne ressemblez pas à un homme qui regarde rapidement son visage dans un miroir.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Cet homme se regarde, mais il s’en va. Il oublie immédiatement à quoi il ressemble vraiment.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Donc, ne vous contentez pas d’écouter le message de Dieu et de l’oublier ensuite. C’est un très bon message qui rend les gens libres. Regardez‑le attentivement et gardez‑le à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: . Faites ce qu’il vous dit de faire. Dieu bénira quiconque vit de cette façon.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Peut‑être que certains d’entre vous pensent que vous servez bien Dieu. Mais si vous dites aussi de mauvaises choses contre les gens, vous ne servez pas bien Dieu du tout. Vous faites quelque chose de mal même si vous pensez que vous faites de bonnes choses.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Si vous voulez servir Dieu d’une manière complètement bonne, faites des choses comme ceci : Prenez soin des enfants qui n’ont pas de parents. Prenez également soin des femmes dont les maris sont décédés. Aidez‑les dans leurs problèmes. Si vous servez Dieu notre Père comme ça, il sera content de vous. Ne laissez pas les méchants de ce monde vous salir aussi.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dieu veut voir si vous lui faites vraiment confiance. Votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu deviendra plus forte à la suite de ces problèmes.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vous devez donc continuer de faire confiance en Dieu jusqu’à la fin. Ensuite, vous grandirez comme croyants. Vous deviendrez complètement comme vous devriez être. Vous n’aurez plus besoin de rien.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mais peut‑être, vous avez besoin de savoir comment être sage ? Demandez ensuite à Dieu de vous aider. Il est prêt à donner à chacun ce dont il a besoin. Et il ne dit jamais que c’est mauvais de demander. Ainsi, Dieu vous aidera à être sages.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais lorsque vous demandez quelque chose à Dieu, vous devez lui faire entièrement confiance. N’ayez pas d’autres idées dans vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: . Quiconque n’est pas sûr que Dieu l’aide est comme l’eau qui est dans la mer. Le vent souffle sur l’eau dans un sens puis dans un autre sens.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'Quelqu’un qui est comme ça ne sait jamais quoi faire. Il a de nombreuses idées en tête. Il ne doit pas penser qu’il recevra quoi que ce soit du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les croyants pauvres de votre groupe doivent être heureux. Pourquoi ? Parce que Dieu dit qu’ils sont importants pour lui.
