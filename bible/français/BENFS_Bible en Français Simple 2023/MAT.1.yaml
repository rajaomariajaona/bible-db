document_id: MAT.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les ancêtres de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici les noms des ancêtres de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Jésus était de la famille du roi David. David était de la famille d’Abraham.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Abraham était le père d’Isaac.
- type: usfm
  marker: m
  children:
  - type: text
    text: Isaac était le père de Jacob.
- type: usfm
  marker: m
  children:
  - type: text
    text: Jacob était le père de Juda et ses frères.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Juda était le père de Pérets et Zara. Leur mère était Thamar.
- type: usfm
  marker: m
  children:
  - type: text
    text: Pérets était le père d’Esrom.
- type: usfm
  marker: m
  children:
  - type: text
    text: Esrom était le père d’Aram.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aram était le père d’Aminadab.
- type: usfm
  marker: m
  children:
  - type: text
    text: Aminadab était le père de Naason.
- type: usfm
  marker: m
  children:
  - type: text
    text: Naason était le père de Salmon.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Salmon était le père de Boaz. Sa mère était Rahab.
- type: usfm
  marker: m
  children:
  - type: text
    text: Boaz était le père d’Obed. Sa mère était Ruth.
- type: usfm
  marker: m
  children:
  - type: text
    text: Obed était le père d’Isaï.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Isaï était le père du roi David.
- type: usfm
  marker: m
  children:
  - type: text
    text: David était le père de Salomon. La mère de Salomon était la femme d’Urie (Bethsabée).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Salomon était le père de Roboam.
- type: usfm
  marker: m
  children:
  - type: text
    text: Roboam était le père d’Abia.
- type: usfm
  marker: m
  children:
  - type: text
    text: Abia était le père d’Asa.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Asa était le père de Josaphat.
- type: usfm
  marker: m
  children:
  - type: text
    text: Josaphat était le père de Joram.
- type: usfm
  marker: m
  children:
  - type: text
    text: Joram était le père d’Ozias.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ozias était le père de Joatham.
- type: usfm
  marker: m
  children:
  - type: text
    text: Joatham était le père d’Achaz.
- type: usfm
  marker: m
  children:
  - type: text
    text: Achaz était le père d’Ezéchias.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ezéchias était le père de Manassé.
- type: usfm
  marker: m
  children:
  - type: text
    text: Manassé était le père d’Amon.
- type: usfm
  marker: m
  children:
  - type: text
    text: Amon était le père de Josias.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Josias était le père de Jéchonias et ses frères. En ce temps‑là, les ennemis des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' les ont amenés à Babylone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après cela, voici les autres ancêtres de Jésus :'
- type: usfm
  marker: m
  children:
  - type: text
    text: Jéchonias était le père de Salathiel.
- type: usfm
  marker: m
  children:
  - type: text
    text: Salathiel était le père de Zorobabel.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Zorobabel était le père d’Abiud.
- type: usfm
  marker: m
  children:
  - type: text
    text: Abiud était le père d’Éliakim.
- type: usfm
  marker: m
  children:
  - type: text
    text: Éliakim était le père d’Azor.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Azor était le père de Sadok.
- type: usfm
  marker: m
  children:
  - type: text
    text: Sadok était le père d’Achim.
- type: usfm
  marker: m
  children:
  - type: text
    text: Achim était le père d’Éliud.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Éliud était le père d’Éléazar.
- type: usfm
  marker: m
  children:
  - type: text
    text: Éléazar était le père de Matthan.
- type: usfm
  marker: m
  children:
  - type: text
    text: Matthan était le père de Jacob.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jacob était le père de Joseph.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Joseph a épousé Marie. Marie a donné naissance à Jésus. C’est lui le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ainsi, il y avait au total 14 générations d’Abraham à David. Il y avait 14 générations de David jusqu’au temps où les ennemis des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' les ont amenés à Babylone. Il y avait 14 autres générations à partir de là jusqu’à la naissance de Jésus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance de l’enfant Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Voici comment Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est né. Sa mère Marie avait promis d’épouser un homme appelé Joseph. Ils ne vivaient pas encore ensemble. Mais Marie est devenue enceinte par la puissance du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Joseph était un homme bon. Il ne voulait pas que les gens sachent cela et déshonorent Marie. Alors il a décidé de laisser Marie secrètement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Joseph pensait à cela. Alors un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' de Dieu lui est apparu dans un rêve. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' lui a dit : Joseph, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fils de David
  - type: text
    text: ', ne crains pas de prendre Marie chez toi comme ta femme. L’enfant qui est en elle, vient du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elle donnera naissance à un enfant. Tu lui donneras le nom de Jésus. C’est puisqu’il sauvera son peuple de ses péchés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dieu avait déjà parlé de cela à l’un de ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. Maintenant, les paroles de Dieu se sont réalisées. Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' Ésaïe l’avait dit en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La vierge sera enceinte. Elle donnera naissance à un enfant. Son nom sera Emmanuel. Ce nom signifie Dieu est avec nous. 
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Alors Joseph s’est réveillé de son sommeil. Il a fait ce que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' de Dieu lui avait dit. Il a pris Marie chez lui comme sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais Joseph n’a pas connu Marie. C’était jusqu’à la naissance de l’enfant. Joseph lui a donné le nom de Jésus.
