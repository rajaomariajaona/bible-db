document_id: MAT.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Les ancêtres de Jésus
  - type: text
    content: Voici les noms des ancêtres de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Jésus était de la famille du roi David. David était de la famille d’Abraham.
  '10':
  - type: text
    content: Ezéchias était le père de Manassé.
  - type: text
    content: Manassé était le père d’Amon.
  - type: text
    content: Amon était le père de Josias.
  '11':
  - type: text
    content: 'Josias était le père de Jéchonias et ses frères. En ce temps‑là, les ennemis des '
  - type: text
    content: Juifs
  - type: text
    content: ' les ont amenés à Babylone.'
  '12':
  - type: text
    content: 'Après cela, voici les autres ancêtres de Jésus :'
  - type: text
    content: Jéchonias était le père de Salathiel.
  - type: text
    content: Salathiel était le père de Zorobabel.
  '13':
  - type: text
    content: Zorobabel était le père d’Abiud.
  - type: text
    content: Abiud était le père d’Éliakim.
  - type: text
    content: Éliakim était le père d’Azor.
  '14':
  - type: text
    content: Azor était le père de Sadok.
  - type: text
    content: Sadok était le père d’Achim.
  - type: text
    content: Achim était le père d’Éliud.
  '15':
  - type: text
    content: Éliud était le père d’Éléazar.
  - type: text
    content: Éléazar était le père de Matthan.
  - type: text
    content: Matthan était le père de Jacob.
  '16':
  - type: text
    content: Jacob était le père de Joseph.
  - type: text
    content: 'Joseph a épousé Marie. Marie a donné naissance à Jésus. C’est lui le  '
  - type: text
    content: Christ
  - type: text
    content: .
  '17':
  - type: text
    content: 'Ainsi, il y avait au total 14 générations d’Abraham à David. Il y avait 14 générations de David jusqu’au temps où les ennemis des '
  - type: text
    content: Juifs
  - type: text
    content: ' les ont amenés à Babylone. Il y avait 14 autres générations à partir de là jusqu’à la naissance de Jésus.'
  - type: heading
    content: Naissance de l’enfant Jésus
  '18':
  - type: text
    content: Voici comment Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est né. Sa mère Marie avait promis d’épouser un homme appelé Joseph. Ils ne vivaient pas encore ensemble. Mais Marie est devenue enceinte par la puissance du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. '
  '19':
  - type: text
    content: Joseph était un homme bon. Il ne voulait pas que les gens sachent cela et déshonorent Marie. Alors il a décidé de laisser Marie secrètement.
  '2':
  - type: text
    content: Abraham était le père d’Isaac.
  - type: text
    content: Isaac était le père de Jacob.
  - type: text
    content: Jacob était le père de Juda et ses frères.
  '20':
  - type: text
    content: 'Mais Joseph pensait à cela. Alors un  '
  - type: text
    content: ange
  - type: text
    content: ' de Dieu lui est apparu dans un rêve. L’'
  - type: text
    content: ange
  - type: text
    content: ' lui a dit : Joseph, '
  - type: text
    content: fils de David
  - type: text
    content: ', ne crains pas de prendre Marie chez toi comme ta femme. L’enfant qui est en elle, vient du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. '
  '21':
  - type: text
    content: Elle donnera naissance à un enfant. Tu lui donneras le nom de Jésus. C’est puisqu’il sauvera son peuple de ses péchés.
  '22':
  - type: text
    content: 'Dieu avait déjà parlé de cela à l’un de ses  '
  - type: text
    content: prophètes
  - type: text
    content: '. Maintenant, les paroles de Dieu se sont réalisées. Le  '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe l’avait dit en ces termes : '
  '23':
  - type: text
    content: La vierge sera enceinte. Elle donnera naissance à un enfant. Son nom sera Emmanuel. Ce nom signifie Dieu est avec nous. 
  '24':
  - type: text
    content: Alors Joseph s’est réveillé de son sommeil. Il a fait ce que l’
  - type: text
    content: ange
  - type: text
    content: ' de Dieu lui avait dit. Il a pris Marie chez lui comme sa femme. '
  '25':
  - type: text
    content: Mais Joseph n’a pas connu Marie. C’était jusqu’à la naissance de l’enfant. Joseph lui a donné le nom de Jésus.
  '3':
  - type: text
    content: Juda était le père de Pérets et Zara. Leur mère était Thamar.
  - type: text
    content: Pérets était le père d’Esrom.
  - type: text
    content: Esrom était le père d’Aram.
  '4':
  - type: text
    content: Aram était le père d’Aminadab.
  - type: text
    content: Aminadab était le père de Naason.
  - type: text
    content: Naason était le père de Salmon.
  '5':
  - type: text
    content: Salmon était le père de Boaz. Sa mère était Rahab.
  - type: text
    content: Boaz était le père d’Obed. Sa mère était Ruth.
  - type: text
    content: Obed était le père d’Isaï.
  '6':
  - type: text
    content: Isaï était le père du roi David.
  - type: text
    content: David était le père de Salomon. La mère de Salomon était la femme d’Urie (Bethsabée).
  '7':
  - type: text
    content: Salomon était le père de Roboam.
  - type: text
    content: Roboam était le père d’Abia.
  - type: text
    content: Abia était le père d’Asa.
  '8':
  - type: text
    content: Asa était le père de Josaphat.
  - type: text
    content: Josaphat était le père de Joram.
  - type: text
    content: Joram était le père d’Ozias.
  '9':
  - type: text
    content: Ozias était le père de Joatham.
  - type: text
    content: Joatham était le père d’Achaz.
  - type: text
    content: Achaz était le père d’Ezéchias.
