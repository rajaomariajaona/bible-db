document_id: ACT.27,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 27
  - type: heading
    content: Les soldats amènent Paul à Rome
  - type: text
    content: 'Festus a décidé que nous devrions '
  - type: text
    content: naviguer
  - type: text
    content: ' vers l’Italie. Ainsi il a commandé à Auguste, appelé Julius, pour garder Paul. Il y avait aussi quelques hommes qui étaient des prisonniers. Julius était un '
  - type: text
    content: officier
  - type: text
    content: ' dans l’armée romaine. Il dirigeait un grand groupe de soldats qui appartenaient à '
  - type: text
    content: César
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'J’ai appris que maintenant notre voyage sera dangereux. Le bateau peut se briser en morceaux et vous perdrez les choses. Et toutes les personnes peuvent également mourir dans l’eau. '
  '11':
  - type: text
    content: Mais l’
  - type: text
    content: officier
  - type: text
    content: ' de l’armée n’a pas cru ce que Paul avait dit. Au lieu de cela, il a cru ce que le propriétaire du bateau et le capitaine avaient dit. '
  '12':
  - type: text
    content: Ce port n’était pas un bon endroit pour qu’un bateau reste pendant l’
  - type: text
    content: hiver
  - type: text
    content: '. La plupart des hommes sur le bateau voulaient continuer le voyage. Ils voulaient '
  - type: text
    content: naviguer
  - type: text
    content: ' jusqu’à Phénix, s’ils pouvaient y arriver. Phénix était un meilleur port où rester pour l’'
  - type: text
    content: hiver
  - type: text
    content: . Phénix était en Crète et il était ouvert à la mer au sud‑ouest et au nord‑ouest.
  - type: heading
    content: Le bateau est face à un vent fort
  '13':
  - type: text
    content: 'Le vent a commencé à souffler du sud, mais il n’était pas fort. Ainsi les gens pensaient : Nous pouvons faire ce que nous avons voulu faire. Nous pouvons '
  - type: text
    content: naviguer
  - type: text
    content: ' vers Phénix. Ainsi ils ont tiré l’'
  - type: text
    content: ancre
  - type: text
    content: ' vers le haut. Alors ils ont navigué aussi étroitement qu’ils pouvaient à la côte. Ils sont allés le long de la côte de Crète. '
  '14':
  - type: text
    content: Mais bientôt, un vent très fort a commencé à souffler. Ce vent était du nord‑est. Il soufflait sur l’île.
  '15':
  - type: text
    content: 'Le vent soufflait sur le bateau. Il n’était pas possible que les hommes naviguent à cause du vent. Ainsi, ils n’ont plus essayé. Ils ont laissé le vent souffler sur le bateau. '
  '16':
  - type: text
    content: 'Nous avons passé l’extrémité du sud d’une petite île appelée Clauda. Ici nous avons trouvé un endroit où le vent fort ne soufflait pas autant. Il nous était difficile de contrôler le bateau. '
  '17':
  - type: text
    content: 'Ils l’ont soulevé hors de l’eau. Alors ils l’ont mis là. Ils l’ont attaché là avec des cordes. Alors ils ont attaché encore plus de cordes en‑dessous et autour du bateau. C’était pour qu’il ne se brise pas. Les hommes avaient peur de ce qui pourrait se produire. Il y avait quelques endroits le long de la côte de la Libye où l’eau n’était pas très profonde. Le bateau pourrait '
  - type: text
    content: naviguer
  - type: text
    content: ' vers un de ces endroits. Alors il pourrait se briser. Ainsi ils ont pris les voiles du bateau vers le bas. Et ils ont laissé le vent souffler sur le bateau. '
  '18':
  - type: text
    content: 'Le grand vent a continué. Le bateau portait beaucoup de choses. Ainsi le jour suivant, les hommes ont jeté certaines de ces choses hors du bateau dans la mer. '
  '19':
  - type: text
    content: 'Le jour après cela, les hommes eux‑mêmes ont jeté certaines des voiles et des cordes hors du bateau dans la mer. '
  '2':
  - type: text
    content: Nous avons continué avec un bateau qui était venu d’Adramytte. Ce bateau était prêt à partir. Il allait vers les villes de la côte de l’Asie. Nous avons tous navigué à bord de ce bateau et Aristarchus naviguait également avec nous. Il était un homme de Macédoine. Il habitait à Thessalonique.
  '20':
  - type: text
    content: 'Pendant beaucoup de jours, nous ne pourrions pas voir le soleil ni les étoiles. Le vent fort a continué à souffler. Alors nous avons pensé : Il n’est pas possible que nous restions vivants.'
  '21':
  - type: text
    content: 'Les hommes n’avaient mangé aucune nourriture pendant longtemps. Alors Paul s’est tenu devant eux. Il a dit : Hommes, écoutez‑moi ! Vous ne devriez pas '
  - type: text
    content: naviguer
  - type: text
    content: ' de Crète. Si nous n’avions pas navigué, nous n’aurions pas perdu toutes ces choses du bateau. '
  '22':
  - type: text
    content: 'Maintenant je vous demande d’être courageux. L’orage détruira complètement le bateau, mais aucun de vous ne mourra. '
  '23':
  - type: text
    content: 'Je sais ceci parce que la nuit passée, un des '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu est venu à moi. Il est venu de mon Dieu qui est très grand et puissant. '
  '24':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' a dit : Paul, n’aie pas peur. Tu te présenteras devant '
  - type: text
    content: César
  - type: text
    content: ' pour te juger. Dieu sera aimable avec toi, parce qu’il est bon. Aucun des hommes dans le bateau avec toi ne mourra.'
  '25':
  - type: text
    content: 'Et ainsi je vous dis : Mes amis, soyez courageux. Je crois en Dieu. Ainsi, tout se produira de la manière dont l’'
  - type: text
    content: ange
  - type: text
    content: ' m’a dit. '
  '26':
  - type: text
    content: Mais le vent soufflera sur le bateau vers l’île.
  '27':
  - type: text
    content: 'La tempête avait continué pendant 14 jours et nuits. Le vent fort soufflait sur le bateau à travers la mer Méditerranée. A environ minuit, les marins pensaient que nous étions près de la terre. '
  '28':
  - type: text
    content: 'Ainsi ils ont attaché un morceau de métal à une corde mince. Ils ont tenu une extrémité et ils ont laissé le métal tomber dans la mer. Ils ont vu à partir de la corde que l’eau était à peu près à 40 mètres de profondeur. Peu de temps plus tard, ils ont fait ceci encore. Cette fois, c’était à peu près à 30 mètres de profondeur. '
  '29':
  - type: text
    content: 'Les marins craignaient que le bateau puisse cogner quelques roches. Ainsi à la partie arrière du bateau, ils ont mis 4 '
  - type: text
    content: ancres
  - type: text
    content: ' sur des cordes dans la mer. Après cela, ils ont voulu que le matin arrive bientôt. '
  '3':
  - type: text
    content: 'Le jour suivant, nous sommes arrivés à Sidon. Julius était aimable avec Paul. Il a dit : Paul, tu peux aller rendre visite à tes amis ici. Ils peuvent te donner quelque chose dont tu as besoin. '
  '30':
  - type: text
    content: 'Alors les marins ont essayé de laisser le bateau. Ils ont mis le petit bateau sur la mer. Ils ont dit : Nous allons à l’avant du bateau. Nous mettrons encore plus d’'
  - type: text
    content: ancres
  - type: text
    content: ' sur les cordes vers le bas dans la mer. Mais ce n’était pas vrai. '
  '31':
  - type: text
    content: Paul a dit à l’
  - type: text
    content: officier
  - type: text
    content: ' de l’armée et aux soldats : Ces marins doivent rester sur le bateau. S’ils ne restent pas, vous ne serez pas sauvés. '
  '32':
  - type: text
    content: Ainsi les soldats ont coupé les cordes du bateau. Ils ont laissé le bateau tomber dans l’eau.
  '33':
  - type: text
    content: 'Maintenant c’était presque le matin et Paul a dit à chacun : Venez manger de la nourriture. Vous avez maintenant attendu 14 jours pour que la tempête s’arrête. Et vous n’avez rien mangé pendant tout ce temps. '
  '34':
  - type: text
    content: 'Vous devez manger de la nourriture. Alors vous serez assez forts pour arriver au '
  - type: text
    content: rivage
  - type: text
    content: '. Vous serez sains et saufs. Vous ne perdrez même pas un cheveu de vos têtes. '
  '35':
  - type: text
    content: 'Paul a fini de parler. Ensuite, il a pris du pain. Il a prié devant eux tous et il a remercié Dieu pour le pain. Alors il a coupé le pain en petits morceaux et il a commencé à le manger. '
  '36':
  - type: text
    content: 'Chacun avait maintenant moins peur. Ils ont tous mangé un peu de pain. '
  '37':
  - type: text
    content: 'Il y avait 276 personnes à bord du bateau. '
  '38':
  - type: text
    content: Après que chacun a mangé assez, les marins ont jeté le blé dans la mer. Alors le bateau n’était pas très lourd.
  - type: heading
    content: La mer détruit complètement le bateau
  '39':
  - type: text
    content: 'Le matin, le bateau était près de la terre. Mais les marins ne savaient pas quelle île c’était. Mais ils ont vu un endroit sur le '
  - type: text
    content: rivage
  - type: text
    content: ' avec du sable dessus. Ils ont voulu mettre le bateau sur le sable. '
  '4':
  - type: text
    content: 'Alors nous avons tous navigué encore de là. Mais le vent soufflait contre l’avant de notre bateau. Ainsi nous avons navigué autour de l’île appelée Chypre. Nous sommes restés du côté de l’île où le vent n’était pas fort. '
  '40':
  - type: text
    content: 'Ainsi les marins ont coupé toutes les cordes avec des '
  - type: text
    content: ancres
  - type: text
    content: ' sur elles. Les ancres sont descendues dans l’eau.'
  - type: text
    content: 'Ils ont également enlevé les cordes des '
  - type: text
    content: avirons
  - type: text
    content: '. Alors ils ont soulevé la voile à l’avant du bateau. C’était pour que le vent souffle sur le bateau. Alors le bateau a navigué directement vers le '
  - type: text
    content: rivage
  - type: text
    content: '. '
  '41':
  - type: text
    content: Mais il y avait un endroit où l’eau n’était pas très profonde. Le bateau a navigué sur du sable et il est resté là. L’avant du bateau est resté là‑dessus. Le sable n’a pas pu se déplacer. Mais les eaux fortes ont brisé la partie arrière du bateau.
  '42':
  - type: text
    content: 'Les soldats ont voulu tuer les hommes qui étaient prisonniers. Ils n’ont pas voulu que ces hommes nagent vers la terre et puis fuient. '
  '43':
  - type: text
    content: Mais l’
  - type: text
    content: officier
  - type: text
    content: ' ou le chef de l’armée a voulu sauver Paul. Ainsi il a commandé aux soldats de ne pas tuer les hommes. Au lieu de cela, il a dit : Toute personne qui peut nager, saute dans l’eau d’abord. Alors, nagez vers le '
  - type: text
    content: rivage
  - type: text
    content: .
  '44':
  - type: text
    content: 'Vous qui ne pouvez pas nager, suivez‑les. Tenez‑vous sur des morceaux de bois, ou des morceaux du bateau. C’était la manière dont nous sommes tous bien arrivés sur le '
  - type: text
    content: rivage
  - type: text
    content: .
  '5':
  - type: text
    content: 'Quand nous étions près de la Cilicie et de la Pamphylie, nous avons alors navigué directement à travers la mer. Nous sommes arrivés à Myra. C’est dans la partie du pays appelé Lycie. '
  '6':
  - type: text
    content: L’
  - type: text
    content: officier
  - type: text
    content: ' '
  - type: text
    content: romain
  - type: text
    content: ' a trouvé un autre bateau là qui avait navigué d’Alexandrie. Il allait en Italie. Ainsi l’'
  - type: text
    content: officier
  - type: text
    content: ' nous a débarqués d’un bateau et il nous a mis sur l’autre bateau.'
  '7':
  - type: text
    content: 'Le bateau naviguait lentement pendant plusieurs jours. Il était difficile de '
  - type: text
    content: naviguer
  - type: text
    content: '. Mais à la fin, nous sommes arrivés près de la ville appelée Cnide. À cause du vent fort, nous ne pouvions pas continuer de '
  - type: text
    content: naviguer
  - type: text
    content: ' dans cette direction. Ainsi nous avons navigué en bas du côté de l’île appelée Crète. Et le vent là n’était pas fort. Nous sommes passés du côté de Salmone. '
  '8':
  - type: text
    content: 'Il était difficile de '
  - type: text
    content: naviguer
  - type: text
    content: ', ainsi nous sommes restés près de la côte. Alors nous sommes venus à un autre endroit appelé Beaux Ports. Les bateaux ont pu s’arrêter ici et étaient sains et saufs. Ce port n’était pas loin de la ville appelée Lasée.'
  '9':
  - type: text
    content: 'Nous sommes restés là pendant beaucoup de jours. Alors il était devenu dangereux de continuer le voyage. Le temps du '
  - type: text
    content: jeûne
  - type: text
    content: ' était déjà passé. Ainsi Paul a parlé à l’'
  - type: text
    content: officier
  - type: text
    content: ' de l’armée et aux hommes qui ont navigué à bord du bateau. '
