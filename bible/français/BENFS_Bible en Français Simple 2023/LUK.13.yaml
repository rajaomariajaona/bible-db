document_id: LUK.13,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrêtez de faire de mauvaises choses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: A ce temps, certaines personnes se tenaient debout près de Jésus. Ces gens lui ont dit ce qui est arrivé à certaines personnes de la Galilée. Ces personnes brûlaient des animaux. C’était comme une offrande pour Dieu. Pilate a envoyé des soldats pour les tuer.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jésus enseignait dans un bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. C’était le jour de repos des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait une femme qui avait un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' en elle. Il avait vécu en elle pendant 18 ans, et il lui faisait mal. Elle devait courber son dos tout le temps. Elle ne pouvait pas se tenir debout. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus l’a vue. Il lui a dit : Femme, viens ici. Ta maladie est finie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a mis ses mains sur elle et aussitôt elle pouvait se tenir debout. Elle a dit : Tu es grand ! Tu es bon et puissant !'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le chef du bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' était en colère. Il était en colère parce que Jésus a guéri une personne malade pendant leur jour de repos. Donc, il a parlé au peuple. Il leur a dit : Il y a 6 jours par semaine où nous devrions travailler. Venez pendant l’un de ces jours et soyez bien. Mais vous ne devriez pas venir le jour de notre repos pour être guéris de la maladie.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus lui a dit : Tu as tort. Tu dis une chose et tu fais quelque chose de différent. Vous amenez chacun de vous son bœuf ou son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âne
    - type: text
      text: ' à l’extérieur le jour de repos. Vous leur donnez alors de l’eau à boire.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a continué à dire : Regardez cette femme, elle est dans la famille d’Abraham. Mais elle a un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' qui l’a lié pendant 18 ans. Donc, c’est certainement juste de la délivrer le jour de notre repos. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus parlait. Alors tous ses ennemis avaient honte. Mais tous les gens là‑bas étaient très heureux. Ils étaient heureux, parce qu’ils avaient vu Jésus faire beaucoup de bonnes choses et puissantes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus dit des histoires sur les semences et le levain
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et puis, il leur a donné cet exemple : Je vais vous parler de l’endroit où Dieu règne. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est comme par exemple une très petite graine. Un homme la prend et la sème. Il la met dans son jardin et elle grandit. Elle pousse ensuite comme un arbre. Il est si grand que les oiseaux peuvent faire un endroit pour vivre parmi les branches.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Donc, pensez à ces gens de Galilée. Peut‑être que vous pensez qu’ils avaient fait des choses plus mauvaises que d’autres personnes de la Galilée. Et c’est la raison pour laquelle ils ont dû mourir. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a continué à dire. Voici un autre exemple : le lieu où Dieu règne est comme ça. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il est comme du levain. Une femme prend un peu et elle en met dans 3 grands bols de farine. Ensuite, le levain se développe et elle passe à travers toute la farine.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’histoire sur une porte étroite
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a poursuivi son voyage à Jérusalem. Sur le chemin, il a traversé les villes et les villages. Il enseignait le peuple partout. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, quelqu’un lui a posé une question : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Dieu sauvera seulement un petit nombre de personnes ?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit au peuple : Faites de votre mieux pour entrer par la porte étroite. Je vous dis que beaucoup de gens voudront entrer. Mais ils ne seront pas en mesure d’entrer. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bientôt, le maître de la maison va se lever et il va fermer la porte. Et puis vous pouvez toujours être debout devant la porte. Vous frapperez et vous direz : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ouvre la porte pour que nous entrions. Il répondra : Je ne sais pas d’où vous venez. Je ne vous connais pas. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous allez commencer à dire : Nous avons mangé avec toi. Nous avons bu avec toi. Tu nous enseignais dans les rues.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vous dira : Non ! Je ne vous connais pas. Vous avez tous fait des choses très mauvaises, donc allez loin de moi.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors vous crierez, parce que vous serez à l’extérieur. Vous mordrez vos dents, parce que vous serez dans la douleur. Vous verrez Abraham, Isaac et Jacob dans le lieu où Dieu règne. Vous verrez également toutes les personnes qui apportaient les messages de Dieu là‑bas. Mais Dieu vous mettra dehors. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À ce moment‑là, les gens viendront de l’est et de l’ouest. Ils vont également venir du nord et du sud. Ils viendront tous à l’endroit où Dieu règne. Là, ils s’assoiront ensemble pour manger un repas spécial. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Non, ils ne sont pas pires que les autres personnes. Vous avez tous également fait beaucoup de mauvaises choses. Donc, vous devez vous détourner de toutes les mauvaises choses et vous devez vous tourner vers Dieu. Si vous ne le faites pas, je vous dis cela. Vous allez aussi mourir comme ils l’ont fait.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: À ce moment‑là, les gens qui sont maintenant les derniers seront les premiers. Les gens qui sont maintenant les premiers seront les derniers.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À ce moment‑là, quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' sont venus auprès de Jésus. Ils lui ont dit : Quitte ici. Va ailleurs parce que le Roi Hérode veut te tuer. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Hérode est un mauvais homme. Dites‑lui que je chasse toujours les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des gens. Je guéris toujours les malades. Je vais continuer à faire toutes ces choses pour un peu plus longtemps. Alors je vais finir mon travail. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais je dois continuer mon voyage un peu plus longtemps. Sûrement, aucun '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' ne peut mourir en dehors de Jérusalem.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oh, vous malheureux peuple de Jérusalem ! Vous tuez ceux qui disent les messages de Dieu. Et vous jetez des pierres pour tuer ceux que Dieu vous a envoyés. Plusieurs fois, je voulais vous amener tous près de moi. Une poule rassemble ensemble tous ses poussins et les couvre de son corps. Mais vous ne voulez pas que je vous protège du danger, comme elle garde ses bébés. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors écoutez ! L’endroit où vous vivez deviendra comme un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. Je vous dis cela. Un jour, vous direz : Heureux l’homme que Dieu envoie ici avec son pouvoir. Mais jusqu’à ce que vous disiez cela, vous ne me verrez plus.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et rappelez‑vous ce qui est arrivé à ces 18 personnes à Siloé. Un bâtiment élevé est tombé et les a tuées. Peut‑être que vous pensez qu’ils avaient fait des choses plus mauvaises que les autres personnes à Jérusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Non, ils n’avaient pas fait. Vous avez tous également fait beaucoup de mauvaises choses. Donc, vous devez vous détourner de toutes les mauvaises choses et vous devez vous tourner vers Dieu. Si vous ne le faites pas, je vous dis cela. Vous allez aussi mourir comme eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus raconte une histoire sur un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: figuier
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il a raconté cette histoire : Un homme avait un jardin où il a semé des fruits. Il avait planté un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: figuier
    - type: text
      text: ' là. Mais quand il est venu chercher du fruit, il ne pouvait pas en trouver.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a alors dit à son jardinier : Regarde. Depuis 3 ans, je suis venu chercher du fruit sur cet arbre. Mais je n’ai jamais trouvé aucun. Donc, coupe l’arbre vers le bas ! Je ne pense pas qu’il devrait être ici. Il gaspille le sol.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jardinier a répondu : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', laisse l’arbre dans le sol pendant un an. Permets‑moi de creuser autour de lui, et laisse‑moi mettre un peu de saleté des animaux là.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si je fais ça, l’année prochaine, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: figuier
    - type: text
      text: ' peut avoir des fruits sur lui. S’il ne porte pas de fruits, je vais le couper.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit une femme malade
    marker-yv: yv-h
