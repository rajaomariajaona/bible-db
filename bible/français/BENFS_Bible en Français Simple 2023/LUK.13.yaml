document_id: LUK.13,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 13
  - type: heading
    content: Arrêtez de faire de mauvaises choses
  - type: text
    content: A ce temps, certaines personnes se tenaient debout près de Jésus. Ces gens lui ont dit ce qui est arrivé à certaines personnes de la Galilée. Ces personnes brûlaient des animaux. C’était comme une offrande pour Dieu. Pilate a envoyé des soldats pour les tuer.
  '10':
  - type: text
    content: 'Un jour, Jésus enseignait dans un bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. C’était le jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: .
  '11':
  - type: text
    content: 'Il y avait une femme qui avait un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' en elle. Il avait vécu en elle pendant 18 ans, et il lui faisait mal. Elle devait courber son dos tout le temps. Elle ne pouvait pas se tenir debout. '
  '12':
  - type: text
    content: 'Jésus l’a vue. Il lui a dit : Femme, viens ici. Ta maladie est finie. '
  '13':
  - type: text
    content: 'Il a mis ses mains sur elle et aussitôt elle pouvait se tenir debout. Elle a dit : Tu es grand ! Tu es bon et puissant !'
  '14':
  - type: text
    content: 'Mais le chef du bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: ' était en colère. Il était en colère parce que Jésus a guéri une personne malade pendant leur jour de repos. Donc, il a parlé au peuple. Il leur a dit : Il y a 6 jours par semaine où nous devrions travailler. Venez pendant l’un de ces jours et soyez bien. Mais vous ne devriez pas venir le jour de notre repos pour être guéris de la maladie.'
  '15':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus lui a dit : Tu as tort. Tu dis une chose et tu fais quelque chose de différent. Vous amenez chacun de vous son bœuf ou son '
  - type: text
    content: âne
  - type: text
    content: ' à l’extérieur le jour de repos. Vous leur donnez alors de l’eau à boire.'
  '16':
  - type: text
    content: 'Il a continué à dire : Regardez cette femme, elle est dans la famille d’Abraham. Mais elle a un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' du '
  - type: text
    content: diable
  - type: text
    content: ' qui l’a lié pendant 18 ans. Donc, c’est certainement juste de la délivrer le jour de notre repos. '
  '17':
  - type: text
    content: Jésus parlait. Alors tous ses ennemis avaient honte. Mais tous les gens là‑bas étaient très heureux. Ils étaient heureux, parce qu’ils avaient vu Jésus faire beaucoup de bonnes choses et puissantes.
  - type: heading
    content: Jésus dit des histoires sur les semences et le levain
  '18':
  - type: text
    content: 'Et puis, il leur a donné cet exemple : Je vais vous parler de l’endroit où Dieu règne. '
  '19':
  - type: text
    content: C’est comme par exemple une très petite graine. Un homme la prend et la sème. Il la met dans son jardin et elle grandit. Elle pousse ensuite comme un arbre. Il est si grand que les oiseaux peuvent faire un endroit pour vivre parmi les branches.
  '2':
  - type: text
    content: 'Jésus a répondu : Donc, pensez à ces gens de Galilée. Peut‑être que vous pensez qu’ils avaient fait des choses plus mauvaises que d’autres personnes de la Galilée. Et c’est la raison pour laquelle ils ont dû mourir. '
  '20':
  - type: text
    content: 'Jésus a continué à dire. Voici un autre exemple : le lieu où Dieu règne est comme ça. '
  '21':
  - type: text
    content: Il est comme du levain. Une femme prend un peu et elle en met dans 3 grands bols de farine. Ensuite, le levain se développe et elle passe à travers toute la farine.
  - type: heading
    content: L’histoire sur une porte étroite
  '22':
  - type: text
    content: 'Jésus a poursuivi son voyage à Jérusalem. Sur le chemin, il a traversé les villes et les villages. Il enseignait le peuple partout. '
  '23':
  - type: text
    content: 'Un jour, quelqu’un lui a posé une question : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu sauvera seulement un petit nombre de personnes ?'
  '24':
  - type: text
    content: 'Jésus a dit au peuple : Faites de votre mieux pour entrer par la porte étroite. Je vous dis que beaucoup de gens voudront entrer. Mais ils ne seront pas en mesure d’entrer. '
  '25':
  - type: text
    content: 'Bientôt, le maître de la maison va se lever et il va fermer la porte. Et puis vous pouvez toujours être debout devant la porte. Vous frapperez et vous direz : '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  - type: text
    content: Seigneur
  - type: text
    content: ', ouvre la porte pour que nous entrions. Il répondra : Je ne sais pas d’où vous venez. Je ne vous connais pas. '
  '26':
  - type: text
    content: 'Vous allez commencer à dire : Nous avons mangé avec toi. Nous avons bu avec toi. Tu nous enseignais dans les rues.'
  '27':
  - type: text
    content: 'Il vous dira : Non ! Je ne vous connais pas. Vous avez tous fait des choses très mauvaises, donc allez loin de moi.'
  '28':
  - type: text
    content: 'Alors vous crierez, parce que vous serez à l’extérieur. Vous mordrez vos dents, parce que vous serez dans la douleur. Vous verrez Abraham, Isaac et Jacob dans le lieu où Dieu règne. Vous verrez également toutes les personnes qui apportaient les messages de Dieu là‑bas. Mais Dieu vous mettra dehors. '
  '29':
  - type: text
    content: 'À ce moment‑là, les gens viendront de l’est et de l’ouest. Ils vont également venir du nord et du sud. Ils viendront tous à l’endroit où Dieu règne. Là, ils s’assoiront ensemble pour manger un repas spécial. '
  '3':
  - type: text
    content: Non, ils ne sont pas pires que les autres personnes. Vous avez tous également fait beaucoup de mauvaises choses. Donc, vous devez vous détourner de toutes les mauvaises choses et vous devez vous tourner vers Dieu. Si vous ne le faites pas, je vous dis cela. Vous allez aussi mourir comme ils l’ont fait.
  '30':
  - type: text
    content: À ce moment‑là, les gens qui sont maintenant les derniers seront les premiers. Les gens qui sont maintenant les premiers seront les derniers.
  '31':
  - type: text
    content: 'À ce moment‑là, quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' sont venus auprès de Jésus. Ils lui ont dit : Quitte ici. Va ailleurs parce que le Roi Hérode veut te tuer. '
  '32':
  - type: text
    content: 'Jésus a répondu : Hérode est un mauvais homme. Dites‑lui que je chasse toujours les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens. Je guéris toujours les malades. Je vais continuer à faire toutes ces choses pour un peu plus longtemps. Alors je vais finir mon travail. '
  '33':
  - type: text
    content: 'Mais je dois continuer mon voyage un peu plus longtemps. Sûrement, aucun '
  - type: text
    content: prophète
  - type: text
    content: ' ne peut mourir en dehors de Jérusalem.'
  '34':
  - type: text
    content: 'Oh, vous malheureux peuple de Jérusalem ! Vous tuez ceux qui disent les messages de Dieu. Et vous jetez des pierres pour tuer ceux que Dieu vous a envoyés. Plusieurs fois, je voulais vous amener tous près de moi. Une poule rassemble ensemble tous ses poussins et les couvre de son corps. Mais vous ne voulez pas que je vous protège du danger, comme elle garde ses bébés. '
  '35':
  - type: text
    content: 'Alors écoutez ! L’endroit où vous vivez deviendra comme un '
  - type: text
    content: désert
  - type: text
    content: '. Je vous dis cela. Un jour, vous direz : Heureux l’homme que Dieu envoie ici avec son pouvoir. Mais jusqu’à ce que vous disiez cela, vous ne me verrez plus.'
  '4':
  - type: text
    content: 'Et rappelez‑vous ce qui est arrivé à ces 18 personnes à Siloé. Un bâtiment élevé est tombé et les a tuées. Peut‑être que vous pensez qu’ils avaient fait des choses plus mauvaises que les autres personnes à Jérusalem. '
  '5':
  - type: text
    content: Non, ils n’avaient pas fait. Vous avez tous également fait beaucoup de mauvaises choses. Donc, vous devez vous détourner de toutes les mauvaises choses et vous devez vous tourner vers Dieu. Si vous ne le faites pas, je vous dis cela. Vous allez aussi mourir comme eux.
  - type: heading
    content: Jésus raconte une histoire sur un figuier
  '6':
  - type: text
    content: 'Puis il a raconté cette histoire : Un homme avait un jardin où il a semé des fruits. Il avait planté un '
  - type: text
    content: figuier
  - type: text
    content: ' là. Mais quand il est venu chercher du fruit, il ne pouvait pas en trouver.'
  '7':
  - type: text
    content: 'Il a alors dit à son jardinier : Regarde. Depuis 3 ans, je suis venu chercher du fruit sur cet arbre. Mais je n’ai jamais trouvé aucun. Donc, coupe l’arbre vers le bas ! Je ne pense pas qu’il devrait être ici. Il gaspille le sol.'
  '8':
  - type: text
    content: 'Le jardinier a répondu : '
  - type: text
    content: Seigneur
  - type: text
    content: ', laisse l’arbre dans le sol pendant un an. Permets‑moi de creuser autour de lui, et laisse‑moi mettre un peu de saleté des animaux là.'
  '9':
  - type: text
    content: 'Si je fais ça, l’année prochaine, le '
  - type: text
    content: figuier
  - type: text
    content: ' peut avoir des fruits sur lui. S’il ne porte pas de fruits, je vais le couper.'
  - type: heading
    content: Jésus guérit une femme malade
