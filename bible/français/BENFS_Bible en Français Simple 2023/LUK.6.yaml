document_id: LUK.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: Ce que les Juifs peuvent faire le jour de repos
  - type: text
    content: 'Jésus marchait à travers les champs de blé. C’était le jour de repos. Puis, ses '
  - type: text
    content: disciples
  - type: text
    content: ' arrachaient des épis. Ils frottaient les graines avec leurs mains. Ensuite, ils mangeaient du blé qui restait. '
  '10':
  - type: text
    content: 'Personne n’a répondu. Alors Jésus a levé les yeux autour de tout le monde. Il a dit à l’homme : Allonge ta main. Quand il l’a allongée, elle est devenue bien. Il pouvait l’utiliser à nouveau.'
  '11':
  - type: text
    content: 'Alors les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et ceux qui enseignaient les règles de Dieu étaient très en colère. Ils ont commencé à parler les uns aux autres. Ils disaient : Que pouvons‑nous faire de Jésus ?'
  - type: heading
    content: Jésus choisit les 12 hommes
  '12':
  - type: text
    content: 'Un jour, Jésus est monté sur une colline pour prier. Il est resté là toute la nuit et il parlait à Dieu. '
  '13':
  - type: text
    content: 'Le matin, Jésus a appelé ses '
  - type: text
    content: disciples
  - type: text
    content: ' auprès de lui. Il a choisi 12 parmi eux. Et puis, il leur a donné le nom d’'
  - type: text
    content: Apôtres
  - type: text
    content: .
  - type: text
    content: 'Voici leurs noms :'
  '14':
  - type: text
    content: Simon. Jésus l’a appelé Pierre.
  - type: text
    content: André. Il était le frère de Simon.
  - type: text
    content: Jacques,
  - type: text
    content: Jean,
  - type: text
    content: Philippe,
  - type: text
    content: Barthélemy,
  '15':
  - type: text
    content: Matthieu,
  - type: text
    content: Thomas,
  - type: text
    content: Jacques, fils d’Alphée,
  - type: text
    content: 'Simon le '
  - type: text
    content: Zélote
  - type: text
    content: ','
  '16':
  - type: text
    content: Judas, fils de Jacques,
  - type: text
    content: Judas Iscariote. Il avait livré Jésus aux ennemis de Dieu.
  - type: heading
    content: Jésus dit un message spécial
  '17':
  - type: text
    content: 'Après que Jésus a choisi les 12 hommes, ils sont tous venus en bas de la colline. Il s’est arrêté et il se tenait sur un endroit plat. Une grande foule de ceux qui le suivaient était avec lui. Il y avait aussi beaucoup de gens de Jérusalem et des villes de Judée et de la côte de Tyr et de Sidon. '
  '18':
  - type: text
    content: 'Ces gens sont tous venus pour entendre Jésus enseigner. Les malades voulaient que Jésus les guérisse. Il guérissait aussi ceux qui avaient de mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '19':
  - type: text
    content: Tous les gens essayaient de toucher Jésus, parce qu’il guérissait toute personne par sa grande puissance.
  - type: heading
    content: Jésus enseigne ceux qui le suivent
  '2':
  - type: text
    content: 'Quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' marchaient avec eux. Ils disaient : Vous ne devriez pas faire cela. Vous savez que travailler le jour de repos, c’est contre la loi de Dieu.'
  '20':
  - type: text
    content: 'Jésus a regardé ses '
  - type: text
    content: disciples
  - type: text
    content: '. Il leur a dit ceci :'
  - type: text
    content: 'Ecoutez, vous qui êtes pauvres, soyez heureux. Le '
  - type: text
    content: Royaume des cieux
  - type: text
    content: ' vous appartient.'
  '21':
  - type: text
    content: Ecoutez, vous qui avez faim maintenant. Dieu vous nourrira, alors soyez heureux.
  - type: text
    content: Ecoutez, vous qui êtes en train de pleurer maintenant. Dieu vous fera rire, alors soyez heureux !
  '22':
  - type: text
    content: Les gens peuvent vous haïr, parce que vous m’obéissez, moi le Fils de l’homme. Ils peuvent dire que vous êtes très mauvais. Ils peuvent vous chasser. Ils peuvent vous faire d’autres mauvaises choses. Lorsque cela se produit, soyez heureux.
  '23':
  - type: text
    content: 'Après tout, Dieu vous donnera beaucoup de bonnes choses quand vous irez à sa maison au '
  - type: text
    content: ciel
  - type: text
    content: '. Alors, soyez très heureux ! Sautez vers le haut et vers le bas, parce que vous êtes si heureux. Pensez à ceux qui vous font de mauvaises choses maintenant. Leurs pères faisaient aussi les mêmes mauvaises choses depuis longtemps. Ils faisaient de mauvaises choses à ceux qui disaient des messages du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: .
  '24':
  - type: text
    content: Ecoutez, vous qui êtes riches maintenant. Et écoutez, vous qui avez une bonne vie. Le problème viendra à vous.
  '25':
  - type: text
    content: Ecoutez, vous qui êtes rassasiés. Vous aurez faim.
  - type: text
    content: Écoutez, vous qui riez maintenant. Vous serez tristes et vous allez pleurer.
  '26':
  - type: text
    content: 'Le problème va vous arriver, si les gens disent toujours de bonnes choses sur vous. Il y a longtemps, vos familles disaient les mêmes bonnes choses sur de mauvaises personnes. Ces mauvaises personnes disaient qu’elles parlaient des messages du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: . Mais ces gens ne le faisaient pas.
  - type: heading
    content: Aimez les gens qui veulent vous faire du mal
  '27':
  - type: text
    content: 'Jésus a dit : Je dis ceci à vous qui m’écoutez bien. Aimez les gens qui veulent vous faire du mal. Faites de bonnes choses aux gens qui vous haïssent. '
  '28':
  - type: text
    content: Dites de bonnes choses aux gens qui vous disent de mauvaises choses. Priez pour les gens qui vous font de mauvaises choses.
  '29':
  - type: text
    content: 'Quelqu’un veut te frapper sur un côté de ton visage. S’il le fait, qu’il frappe l’autre côté de ton visage aussi. Quelqu’un veut enlever ton '
  - type: text
    content: manteau
  - type: text
    content: '. S’il le fait, ne l’empêche pas de prendre ta chemise aussi. '
  '3':
  - type: text
    content: 'Jésus a répondu : Rappelez‑vous ce que David avait fait. Il avait fait cela quand lui et ses hommes avaient faim. Vous avez certainement lu à ce sujet. '
  '30':
  - type: text
    content: 'Donne à quiconque te demande des choses. Quelqu’un veut prendre tes choses ? S’il le fait, qu’il les garde. Ne les demande pas à nouveau. '
  '31':
  - type: text
    content: Faites à d’autres personnes les bonnes choses que vous voulez qu’elles fassent pour vous.
  '32':
  - type: text
    content: 'Aimez‑vous seulement les gens qui vous aiment ? Si vous le faites, vous ne faites pas une chose spéciale. Ne dites pas que vous faites bien si vous aimez comme cela. Après tout, même les mauvaises gens aiment les gens qui les aiment. '
  '33':
  - type: text
    content: 'Vous faites de bonnes choses seulement aux gens qui vous font de bonnes choses ? Si vous faites cela, vous ne faites pas une chose spéciale. Après tout, même de mauvaises personnes font la même chose. '
  '34':
  - type: text
    content: Est‑ce que vous prêtez des choses uniquement aux personnes qui vous les retourneront ? Si vous faites cela, vous ne faites pas une chose spéciale. Après tout, même de mauvaises personnes prêtent des choses à d’autres personnes. Elles croient qu’elles vont les récupérer à nouveau.
  '35':
  - type: text
    content: 'Non ! Je vous dis d’aimer les gens qui veulent vous faire du mal. Faites‑leur de bonnes choses. Prêtez‑leur des choses et refusez de les récupérer à nouveau. Si vous faites cela, le grand Dieu vous donnera un grand cadeau. Il est aussi gentil aux gens qui ne disent pas merci. Il est même gentil aux mauvaises personnes. Donc, vous allez vraiment être ses fils. '
  '36':
  - type: text
    content: Alors soyez gentils, comme Dieu votre Père est gentil.
  '37':
  - type: text
    content: 'Ne dites pas à quelqu’un : Tu es une mauvaise personne. Si vous ne le faites pas, Dieu ne vous dira pas : Vous êtes de mauvaises personnes. Ne dites pas aux gens, Dieu vous punira parce que vous êtes mauvais. Si vous ne le faites pas, ils ne vous le diront pas non plus. Pardonnez aux autres et Dieu vous pardonnera. '
  '38':
  - type: text
    content: Donnez à d’autres personnes et Dieu vous donnera. Il vous donnera plus que ce que vous avez donné. Il remplira vos poches jusqu’à ce que plus rien n’y entre. Ce sera si plein que cela débordera. Dieu vous donnera comme vous donnez aux autres personnes.
  '39':
  - type: text
    content: Jésus a aussi utilisé cet exemple pour enseigner le peuple. Un homme aveugle ne peut pas conduire un autre aveugle. S’il le fait, ils tomberont tous 2 dans un trou au sol.
  '4':
  - type: text
    content: 'Il est entré dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Et il a pris le pain spécial qui était là. Les règles de Dieu interdisent à toute personne de manger ce pain, sauf les '
  - type: text
    content: prêtres
  - type: text
    content: . Mais David avait mangé une partie du pain et il en avait donné aussi à ses amis.
  '40':
  - type: text
    content: Un élève est moins important que son maître. Mais quand un élève a tout appris, il sera comme son maître.
  '41':
  - type: text
    content: 'Peut‑être que tu veux dire à ton frère son erreur. Si tu fais cela, souviens‑toi d’abord de tes propres erreurs. '
  '42':
  - type: text
    content: 'Si tu le fais, tu es comme ceci : Tu es comme une personne qui a un morceau de bois dans son œil. Cette personne dit alors : Frère, tu as un peu de saleté dans l’œil. Permets‑moi de l’enlever pour toi. Ne soyez pas comme cette personne. Vous dites une chose, mais vous faites quelque chose de différent. Tout d’abord, corrigez vos propres erreurs. Alors seulement, vous pouvez savoir comment dire l’erreur d’une autre personne.'
  - type: heading
    content: Une histoire sur un arbre et son fruit
  '43':
  - type: text
    content: 'Les bons arbres ne donnent que de bons fruits. Les mauvais arbres ne donnent que de mauvais fruits. '
  '44':
  - type: text
    content: 'Donc, de cette façon, vous pouvez savoir si un arbre est bon ou mauvais. Vous pouvez le savoir par le fruit qu’il produit. Vous cueillez de bons fruits seulement de bons arbres fruitiers. Les figues ne poussent pas sur des buissons d’épines. Les raisins ne poussent pas sur des plantes appelées '
  - type: text
    content: ronces
  - type: text
    content: .
  '45':
  - type: text
    content: 'Les gens sont les mêmes. Un homme bon tire de bonnes choses de son '
  - type: text
    content: esprit
  - type: text
    content: '. Ses bonnes pensées sont très précieuses. Un mauvais homme apporte de mauvaises pensées de son '
  - type: text
    content: esprit
  - type: text
    content: '. Il valorise les mauvaises choses dans son '
  - type: text
    content: esprit
  - type: text
    content: '. Alors, quand une personne parle, ses paroles montrent quelque chose. Elles montrent si son '
  - type: text
    content: esprit
  - type: text
    content: ' est plein de bonnes pensées ou de mauvaises pensées.'
  - type: heading
    content: Une histoire sur les hommes qui construisent une maison
  '46':
  - type: text
    content: 'Jésus a dit : Vous m’appelez '
  - type: text
    content: Seigneur
  - type: text
    content: ', mais vous ne m’obéissez pas. '
  '47':
  - type: text
    content: 'Certaines personnes entendent mon message et le mettent en pratique. Permettez‑moi de vous dire à qui elles ressemblent. Elles sont comme un homme qui a bâti une maison. '
  '48':
  - type: text
    content: Cet homme a creusé dans une grosse pierre dure. Il a mis la première ligne des pierres sur cette pierre dure. Après cela, il a construit la maison au‑dessus de cette pierre dure. Puis une tempête est venue et elle a amené beaucoup d’eau. Les eaux ont frappé contre la maison. Mais l’eau n’a pas fait tomber la maison. L’eau ne pouvait faire tomber la maison, parce que l’homme avait construit très bien.
  '49':
  - type: text
    content: D’autres gens entendent mon message, mais ils ne le mettent pas en pratique. Permettez‑moi de vous parler de ces gens. Ils sont comme un autre homme qui a construit une maison. Cet homme n’a pas creusé au plus profond de la pierre dure. Au lieu de cela, il a mis la première ligne des pierres sur la terre. Il a alors construit sur la terre. Puis une tempête est venue et elle a amené beaucoup d’eau. Les eaux ont frappé contre cette maison et elle est tombée immédiatement. L’eau l’a complètement détruite.
  '5':
  - type: text
    content: 'Jésus a dit : Le Fils de l’homme a le pouvoir de dire ce que les gens peuvent faire le jour de repos.'
  - type: heading
    content: Jésus guérit un homme le jour de repos juif
  '6':
  - type: text
    content: 'Un autre jour de repos '
  - type: text
    content: juif
  - type: text
    content: ', Jésus est entré dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: ' et il enseignait. Un homme était là. Sa main droite était très petite et faible. L’homme ne pouvait pas utiliser cette main. '
  '7':
  - type: text
    content: 'Certains enseignants de la loi de Dieu et quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' regardaient Jésus attentivement. Ils voulaient trouver une raison pour dire qu’il faisait de mauvaises choses. Ils disaient : Si Jésus guérit cet homme, donc il n’obéit pas aux commandements de Dieu. Il travaille le jour de repos. '
  '8':
  - type: text
    content: 'Mais Jésus savait ce qu’ils pensaient. Donc, il a parlé à l’homme : Lève‑toi et tiens‑toi devant tout le monde. L’homme s’est levé et il est resté là. '
  '9':
  - type: text
    content: 'Jésus a dit au peuple : Permetttez‑moi de vous demander quelque chose. Que devons‑nous faire le jour de repos ? Est‑ce que les commandements de Dieu disent que nous devons faire de bonnes choses ? Ou ils disent que nous devons faire de mauvaises choses ? Faut‑il sauver la vie de quelqu’un ? Ou devrions‑nous détruire une vie ? '
