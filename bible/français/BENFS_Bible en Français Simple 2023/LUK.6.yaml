document_id: LUK.6
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 6
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ce que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' peuvent faire le jour de repos'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus marchait à travers les champs de blé. C’était le jour de repos. Puis, ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' arrachaient des épis. Ils frottaient les graines avec leurs mains. Ensuite, ils mangeaient du blé qui restait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' marchaient avec eux. Ils disaient : Vous ne devriez pas faire cela. Vous savez que travailler le jour de repos, c’est contre la loi de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a répondu : Rappelez‑vous ce que David avait fait. Il avait fait cela quand lui et ses hommes avaient faim. Vous avez certainement lu à ce sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il est entré dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Et il a pris le pain spécial qui était là. Les règles de Dieu interdisent à toute personne de manger ce pain, sauf les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: . Mais David avait mangé une partie du pain et il en avait donné aussi à ses amis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus a dit : Le Fils de l’homme a le pouvoir de dire ce que les gens peuvent faire le jour de repos.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus guérit un homme le jour de repos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Un autre jour de repos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  - type: text
    text: ', Jésus est entré dans le bâtiment de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et il enseignait. Un homme était là. Sa main droite était très petite et faible. L’homme ne pouvait pas utiliser cette main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Certains enseignants de la loi de Dieu et quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' regardaient Jésus attentivement. Ils voulaient trouver une raison pour dire qu’il faisait de mauvaises choses. Ils disaient : Si Jésus guérit cet homme, donc il n’obéit pas aux commandements de Dieu. Il travaille le jour de repos. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Jésus savait ce qu’ils pensaient. Donc, il a parlé à l’homme : Lève‑toi et tiens‑toi devant tout le monde. L’homme s’est levé et il est resté là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus a dit au peuple : Permetttez‑moi de vous demander quelque chose. Que devons‑nous faire le jour de repos ? Est‑ce que les commandements de Dieu disent que nous devons faire de bonnes choses ? Ou ils disent que nous devons faire de mauvaises choses ? Faut‑il sauver la vie de quelqu’un ? Ou devrions‑nous détruire une vie ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Personne n’a répondu. Alors Jésus a levé les yeux autour de tout le monde. Il a dit à l’homme : Allonge ta main. Quand il l’a allongée, elle est devenue bien. Il pouvait l’utiliser à nouveau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et ceux qui enseignaient les règles de Dieu étaient très en colère. Ils ont commencé à parler les uns aux autres. Ils disaient : Que pouvons‑nous faire de Jésus ?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus choisit les 12 hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un jour, Jésus est monté sur une colline pour prier. Il est resté là toute la nuit et il parlait à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le matin, Jésus a appelé ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' auprès de lui. Il a choisi 12 parmi eux. Et puis, il leur a donné le nom d’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtres
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Voici leurs noms :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Simon. Jésus l’a appelé Pierre.
- type: usfm
  marker: p
  children:
  - type: text
    text: André. Il était le frère de Simon.
- type: usfm
  marker: p
  children:
  - type: text
    text: Jacques,
- type: usfm
  marker: p
  children:
  - type: text
    text: Jean,
- type: usfm
  marker: p
  children:
  - type: text
    text: Philippe,
- type: usfm
  marker: p
  children:
  - type: text
    text: Barthélemy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Matthieu,
- type: usfm
  marker: p
  children:
  - type: text
    text: Thomas,
- type: usfm
  marker: p
  children:
  - type: text
    text: Jacques, fils d’Alphée,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Simon le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Zélote
  - type: text
    text: ','
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Judas, fils de Jacques,
- type: usfm
  marker: p
  children:
  - type: text
    text: Judas Iscariote. Il avait livré Jésus aux ennemis de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus dit un message spécial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après que Jésus a choisi les 12 hommes, ils sont tous venus en bas de la colline. Il s’est arrêté et il se tenait sur un endroit plat. Une grande foule de ceux qui le suivaient était avec lui. Il y avait aussi beaucoup de gens de Jérusalem et des villes de Judée et de la côte de Tyr et de Sidon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ces gens sont tous venus pour entendre Jésus enseigner. Les malades voulaient que Jésus les guérisse. Il guérissait aussi ceux qui avaient de mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tous les gens essayaient de toucher Jésus, parce qu’il guérissait toute personne par sa grande puissance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne ceux qui le suivent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus a regardé ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il leur a dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ecoutez, vous qui êtes pauvres, soyez heureux. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: ' vous appartient.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ecoutez, vous qui avez faim maintenant. Dieu vous nourrira, alors soyez heureux.
- type: usfm
  marker: m
  children:
  - type: text
    text: Ecoutez, vous qui êtes en train de pleurer maintenant. Dieu vous fera rire, alors soyez heureux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les gens peuvent vous haïr, parce que vous m’obéissez, moi le Fils de l’homme. Ils peuvent dire que vous êtes très mauvais. Ils peuvent vous chasser. Ils peuvent vous faire d’autres mauvaises choses. Lorsque cela se produit, soyez heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Après tout, Dieu vous donnera beaucoup de bonnes choses quand vous irez à sa maison au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Alors, soyez très heureux ! Sautez vers le haut et vers le bas, parce que vous êtes si heureux. Pensez à ceux qui vous font de mauvaises choses maintenant. Leurs pères faisaient aussi les mêmes mauvaises choses depuis longtemps. Ils faisaient de mauvaises choses à ceux qui disaient des messages du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ecoutez, vous qui êtes riches maintenant. Et écoutez, vous qui avez une bonne vie. Le problème viendra à vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ecoutez, vous qui êtes rassasiés. Vous aurez faim.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez, vous qui riez maintenant. Vous serez tristes et vous allez pleurer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le problème va vous arriver, si les gens disent toujours de bonnes choses sur vous. Il y a longtemps, vos familles disaient les mêmes bonnes choses sur de mauvaises personnes. Ces mauvaises personnes disaient qu’elles parlaient des messages du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: . Mais ces gens ne le faisaient pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aimez les gens qui veulent vous faire du mal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus a dit : Je dis ceci à vous qui m’écoutez bien. Aimez les gens qui veulent vous faire du mal. Faites de bonnes choses aux gens qui vous haïssent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dites de bonnes choses aux gens qui vous disent de mauvaises choses. Priez pour les gens qui vous font de mauvaises choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Quelqu’un veut te frapper sur un côté de ton visage. S’il le fait, qu’il frappe l’autre côté de ton visage aussi. Quelqu’un veut enlever ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: '. S’il le fait, ne l’empêche pas de prendre ta chemise aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Donne à quiconque te demande des choses. Quelqu’un veut prendre tes choses ? S’il le fait, qu’il les garde. Ne les demande pas à nouveau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Faites à d’autres personnes les bonnes choses que vous voulez qu’elles fassent pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aimez‑vous seulement les gens qui vous aiment ? Si vous le faites, vous ne faites pas une chose spéciale. Ne dites pas que vous faites bien si vous aimez comme cela. Après tout, même les mauvaises gens aiment les gens qui les aiment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Vous faites de bonnes choses seulement aux gens qui vous font de bonnes choses ? Si vous faites cela, vous ne faites pas une chose spéciale. Après tout, même de mauvaises personnes font la même chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Est‑ce que vous prêtez des choses uniquement aux personnes qui vous les retourneront ? Si vous faites cela, vous ne faites pas une chose spéciale. Après tout, même de mauvaises personnes prêtent des choses à d’autres personnes. Elles croient qu’elles vont les récupérer à nouveau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Non ! Je vous dis d’aimer les gens qui veulent vous faire du mal. Faites‑leur de bonnes choses. Prêtez‑leur des choses et refusez de les récupérer à nouveau. Si vous faites cela, le grand Dieu vous donnera un grand cadeau. Il est aussi gentil aux gens qui ne disent pas merci. Il est même gentil aux mauvaises personnes. Donc, vous allez vraiment être ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Alors soyez gentils, comme Dieu votre Père est gentil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ne dites pas à quelqu’un : Tu es une mauvaise personne. Si vous ne le faites pas, Dieu ne vous dira pas : Vous êtes de mauvaises personnes. Ne dites pas aux gens, Dieu vous punira parce que vous êtes mauvais. Si vous ne le faites pas, ils ne vous le diront pas non plus. Pardonnez aux autres et Dieu vous pardonnera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Donnez à d’autres personnes et Dieu vous donnera. Il vous donnera plus que ce que vous avez donné. Il remplira vos poches jusqu’à ce que plus rien n’y entre. Ce sera si plein que cela débordera. Dieu vous donnera comme vous donnez aux autres personnes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Jésus a aussi utilisé cet exemple pour enseigner le peuple. Un homme aveugle ne peut pas conduire un autre aveugle. S’il le fait, ils tomberont tous 2 dans un trou au sol.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Un élève est moins important que son maître. Mais quand un élève a tout appris, il sera comme son maître.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Peut‑être que tu veux dire à ton frère son erreur. Si tu fais cela, souviens‑toi d’abord de tes propres erreurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Si tu le fais, tu es comme ceci : Tu es comme une personne qui a un morceau de bois dans son œil. Cette personne dit alors : Frère, tu as un peu de saleté dans l’œil. Permets‑moi de l’enlever pour toi. Ne soyez pas comme cette personne. Vous dites une chose, mais vous faites quelque chose de différent. Tout d’abord, corrigez vos propres erreurs. Alors seulement, vous pouvez savoir comment dire l’erreur d’une autre personne.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une histoire sur un arbre et son fruit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Les bons arbres ne donnent que de bons fruits. Les mauvais arbres ne donnent que de mauvais fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Donc, de cette façon, vous pouvez savoir si un arbre est bon ou mauvais. Vous pouvez le savoir par le fruit qu’il produit. Vous cueillez de bons fruits seulement de bons arbres fruitiers. Les figues ne poussent pas sur des buissons d’épines. Les raisins ne poussent pas sur des plantes appelées '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ronces
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Les gens sont les mêmes. Un homme bon tire de bonnes choses de son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Ses bonnes pensées sont très précieuses. Un mauvais homme apporte de mauvaises pensées de son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Il valorise les mauvaises choses dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Alors, quand une personne parle, ses paroles montrent quelque chose. Elles montrent si son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' est plein de bonnes pensées ou de mauvaises pensées.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une histoire sur les hommes qui construisent une maison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus a dit : Vous m’appelez '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', mais vous ne m’obéissez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Certaines personnes entendent mon message et le mettent en pratique. Permettez‑moi de vous dire à qui elles ressemblent. Elles sont comme un homme qui a bâti une maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Cet homme a creusé dans une grosse pierre dure. Il a mis la première ligne des pierres sur cette pierre dure. Après cela, il a construit la maison au‑dessus de cette pierre dure. Puis une tempête est venue et elle a amené beaucoup d’eau. Les eaux ont frappé contre la maison. Mais l’eau n’a pas fait tomber la maison. L’eau ne pouvait faire tomber la maison, parce que l’homme avait construit très bien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: D’autres gens entendent mon message, mais ils ne le mettent pas en pratique. Permettez‑moi de vous parler de ces gens. Ils sont comme un autre homme qui a construit une maison. Cet homme n’a pas creusé au plus profond de la pierre dure. Au lieu de cela, il a mis la première ligne des pierres sur la terre. Il a alors construit sur la terre. Puis une tempête est venue et elle a amené beaucoup d’eau. Les eaux ont frappé contre cette maison et elle est tombée immédiatement. L’eau l’a complètement détruite.
