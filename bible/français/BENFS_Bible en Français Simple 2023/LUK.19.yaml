document_id: LUK.19,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 19
  - type: heading
    content: Zachée rencontre Jésus
  - type: text
    content: 'Jésus est entré à Jéricho et il marchait à travers la ville. '
  '11':
  - type: text
    content: Alors que les gens étaient encore à l’écoute, il leur a raconté une histoire. Il a fait cela parce qu’il s’approchait de Jérusalem. Il savait que les gens avaient de mauvaises pensées. Ils avaient de mauvaises pensées au sujet de ce que Jésus disait. Ils pensaient que Dieu allait commencer à gouverner son peuple immédiatement après.
  '12':
  - type: text
    content: 'Il leur a dit : Un homme important a quitté sa maison et il a parcouru un long chemin dans un autre pays. Là, il recevra le pouvoir de gouverner son propre pays. Après cela, il sera de retour en tant que roi. '
  '13':
  - type: text
    content: 'Avant son départ, il a demandé à 10 de ses serviteurs de venir auprès de lui. Il a donné à chacun d’entre eux 10 pièces d’argent. Il a dit : Utilisez cet argent pour obtenir plus d’argent pour moi pendant que je suis loin.'
  '14':
  - type: text
    content: 'Les gens qui vivaient dans son pays n’aimaient pas l’homme. Donc, ils ont envoyé un groupe de personnes auprès de lui avec un message. Ce message était : Nous ne voulons pas que cet homme règne sur nous.'
  '15':
  - type: text
    content: Lorsque le roi est revenu, il a demandé à ces 10 serviteurs de venir auprès de lui. Il voulait savoir combien d’argent ils avaient produit de son argent. Ils pouvaient acheter des choses avec cela, et puis ils pouvaient vendre ces choses à plus d’argent.
  '16':
  - type: text
    content: 'Le premier serviteur est venu. Il a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton argent a fait 10 pièces d’argent de plus.'
  '17':
  - type: text
    content: 'Le chef était heureux. Il a dit : Tu as bien fait. Tu es un bon serviteur en qui je peux faire confiance. Tu as utilisé une petite quantité d’argent bien. Donc, tu régneras sur 10 villes.'
  '18':
  - type: text
    content: 'Le second serviteur est venu. Il a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton argent a fait 5 pièces d’argent de plus.'
  '19':
  - type: text
    content: 'Le chef lui a dit : Tu régneras sur 5 villes.'
  '2':
  - type: text
    content: 'Il y avait un homme important. Son nom était Zachée. Il percevait de l’argent des taxes pour l’État et il était devenu très riche. '
  '20':
  - type: text
    content: 'Puis un autre serviteur est venu. Il a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', voici ton argent. Je l’ai mis loin dans un morceau de tissu. '
  '21':
  - type: text
    content: Je l’ai fait parce que je te craignais. Après tout, tu dis aux gens ce qu’ils doivent faire tout le temps. Tu prends les choses pour lesquelles tu n’as pas travaillé. Tu ne mets pas de graines dans le sol. Mais tu récoltes ce que tu n’as pas semé.
  '22':
  - type: text
    content: 'Le chef a répondu : Tu es un mauvais serviteur. Je vais utiliser tes propres mots pour montrer que tu as fait une mauvaise chose. Tu as dit que tu savais sur moi ceci : Que je dis aux gens ce qu’ils doivent faire tout le temps. Que je prends les choses pour lesquelles je ne travaille pas. Que je ne mets pas les graines dans le sol, mais je récolte les plantes des champs. '
  '23':
  - type: text
    content: 'Tu devrais mettre mon argent à la banque. Quand je suis arrivé chez moi, je pourrais le retirer avec l’argent de plus. '
  '24':
  - type: text
    content: 'D’autres serviteurs se tenaient près de leur maître. Il leur disait : Prenez l’argent de ce serviteur. Donnez‑le au serviteur qui a 10 pièces d’argent.'
  '25':
  - type: text
    content: 'Ils ont répondu : Mais, Maître, ce serviteur a déjà 10 pièces d’argent.'
  '26':
  - type: text
    content: 'Le Maître a dit : Laissez‑moi vous dire ceci. Certaines gens ont quelque chose. Je leur donne plus. D’autres gens n’ont rien. J’enlève de ces gens la petite chose qu’ils ont. '
  '27':
  - type: text
    content: Maintenant, je dois punir ces autres gens qui ne voulaient pas que je règne sur eux. Amenez‑les ici et tuez‑les en face de moi.
  - type: heading
    content: Jésus va à Jérusalem
  '28':
  - type: text
    content: 'Quand Jésus avait dit tout cela, il est allé en face d’eux. Il est allé à Jérusalem. '
  '29':
  - type: text
    content: 'Et il s’approchait de 2 villages appelés Bethphagé et '
  - type: text
    content: Béthanie
  - type: text
    content: '. Ils étaient à la colline appelée la '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: . Donc, il a envoyé 2 de ses disciples dans l’un des villages.
  '3':
  - type: text
    content: 'Il essayait de voir qui était Jésus. Il y avait une grande foule là‑bas, mais il était un petit homme. Donc, il ne pouvait pas le voir. '
  '30':
  - type: text
    content: 'Il leur a dit : Allez au village qui est en face de vous. Quand vous allez, vous trouverez un petit '
  - type: text
    content: âne
  - type: text
    content: '. Quelqu’un l’a attaché là‑haut. Personne n’est monté sur lui avant. Enlevez la corde et amenez‑moi ce petit '
  - type: text
    content: âne
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Quelqu’un peut vous demander : Pourquoi prenez‑vous le petit '
  - type: text
    content: âne
  - type: text
    content: '  ? S’il le fait, dites‑lui : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a besoin de l’utiliser.'
  '32':
  - type: text
    content: 'Les 2 hommes que Jésus a envoyés, sont entrés dans le village. Ils ont trouvé tout ce que Jésus leur avait dit. '
  '33':
  - type: text
    content: 'Pendant qu’ils prenaient le petit '
  - type: text
    content: âne
  - type: text
    content: ', certains hommes leur ont demandé : Pourquoi prenez‑vous le petit '
  - type: text
    content: âne
  - type: text
    content: '  ? '
  '34':
  - type: text
    content: 'Ils ont répondu : Le Maître a besoin de l’utiliser. '
  '35':
  - type: text
    content: 'Ils l’ont amené à Jésus, et ils ont mis leurs '
  - type: text
    content: manteaux
  - type: text
    content: ' au‑dessus de l’âne. Ensuite, ils ont aidé Jésus à monter sur lui. '
  '36':
  - type: text
    content: 'Pendant que Jésus allait sur le petit '
  - type: text
    content: âne
  - type: text
    content: ', les gens mettaient leurs '
  - type: text
    content: manteaux
  - type: text
    content: ' sur le chemin.'
  '37':
  - type: text
    content: 'Jésus était près de la partie la plus basse de la colline appelée la '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: '. Toute la foule des gens qui le suivait est devenue très heureuse. Ils criaient : Dieu, tu es grand et puissant. Merci pour toutes les grandes choses que nous avons vues. '
  '38':
  - type: text
    content: 'Heureux le roi qui vient avec le pouvoir de Dieu. Nous voulons que tous soient bien au '
  - type: text
    content: ciel
  - type: text
    content: ' où Dieu habite. Nous prions pour que ce soit ainsi. Il est beau. Il a tout pouvoir et toute autorité.'
  '39':
  - type: text
    content: 'Certains des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' dans la foule disaient à Jésus : Maître, arrête ces gens qui te suivent de dire ces choses.'
  '4':
  - type: text
    content: 'Il a couru en face de la foule et il a grimpé sur un arbre. Il pouvait voir Jésus plus facilement de l’arbre, parce qu’il marchait le long de cette route. '
  '40':
  - type: text
    content: 'Jésus a répondu : Permettez‑moi de vous dire ceci : Si ces gens étaient calmes, les pierres de la ville allaient crier à la place ! '
  '41':
  - type: text
    content: 'Quand Jésus était près de la ville, il a regardé en face de lui. Il a pleuré parce qu’il se sentait très triste pour les gens en elle. '
  '42':
  - type: text
    content: 'Il a dit : Vous devez savoir ce que vous devriez faire, pour vivre en paix. Vous devez être bien avec Dieu. Mais maintenant, quelque chose cache ces choses de vous. '
  '43':
  - type: text
    content: 'En conséquence, les mauvais jours viendront à vous. Vos ennemis vont construire un mur autour de vous. Ils vous arrêteront complètement, et ils ne vous laisseront pas quitter. '
  '44':
  - type: text
    content: Vous ne comprenez pas que Dieu est venu pour vous sauver. Ainsi, vos ennemis vous tueront et ils vont détruire votre ville. Ils détruiront vos murs. Ainsi, ils vous détruiront avec vos enfants et ils ne laisseront pas une pierre sur une autre pierre.
  - type: heading
    content: Jésus enseigne dans le Temple de Dieu
  '45':
  - type: text
    content: 'Jésus est entré dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Certaines gens vendaient des choses là‑bas. Jésus a commencé à les faire quitter de là. '
  '46':
  - type: text
    content: 'Jésus a dit : Voici ce que Dieu a dit dans son livre : Ma maison sera un endroit où les gens viennent pour prier. Mais vous l’avez faite comme un endroit où les gens se volent les uns les autres.'
  '47':
  - type: text
    content: 'Jésus enseignait tous les jours dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et ceux qui enseignaient les règles de Dieu voulaient le tuer. Les chefs du peuple voulaient le tuer. '
  '48':
  - type: text
    content: Mais tous les gens écoutaient. Ils voulaient entendre tout ce qu’il disait. Ainsi, les dirigeants ne savaient pas comment le tuer.
  '5':
  - type: text
    content: 'Quand Jésus est venu à l’arbre, il a levé les yeux. Il a dit : Zachée, descends vite. Aujourd’hui, je dois rester dans ta maison.'
  '6':
  - type: text
    content: 'Alors Zachée est descendu rapidement et l’a emmené dans sa maison. Il était très heureux à ce sujet. '
  '7':
  - type: text
    content: 'Les gens ont vu ce qui était arrivé. Et ils n’étaient pas heureux. Ils disaient : Jésus est allé rester dans la maison d’un homme qui fait de mauvaises choses.'
  '8':
  - type: text
    content: 'Zachée s’est levé devant tout le monde. Il a dit à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je vais donner la moitié de tout ce que je dois aux pauvres. J’ai pris trop d’argent de certaines personnes. Je vais leur donner 4 fois plus que je prenais d’elles à tort.'
  '9':
  - type: text
    content: 'Jésus a dit : Aujourd’hui, le '
  - type: text
    content: salut
  - type: text
    content: ' de Dieu est venu dans cette maison. Après tout, je suis venu chercher les gens qui sont perdus. Et je suis venu pour les sauver. Et Zachée fait également partie de la famille d’Abraham.'
  - type: heading
    content: Jésus raconte une histoire de 10 serviteurs
