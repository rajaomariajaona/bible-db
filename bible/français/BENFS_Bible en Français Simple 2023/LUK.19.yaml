document_id: LUK.19
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 19
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zachée rencontre Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus est entré à Jéricho et il marchait à travers la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y avait un homme important. Son nom était Zachée. Il percevait de l’argent des taxes pour l’État et il était devenu très riche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il essayait de voir qui était Jésus. Il y avait une grande foule là‑bas, mais il était un petit homme. Donc, il ne pouvait pas le voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il a couru en face de la foule et il a grimpé sur un arbre. Il pouvait voir Jésus plus facilement de l’arbre, parce qu’il marchait le long de cette route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand Jésus est venu à l’arbre, il a levé les yeux. Il a dit : Zachée, descends vite. Aujourd’hui, je dois rester dans ta maison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors Zachée est descendu rapidement et l’a emmené dans sa maison. Il était très heureux à ce sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les gens ont vu ce qui était arrivé. Et ils n’étaient pas heureux. Ils disaient : Jésus est allé rester dans la maison d’un homme qui fait de mauvaises choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Zachée s’est levé devant tout le monde. Il a dit à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', je vais donner la moitié de tout ce que je dois aux pauvres. J’ai pris trop d’argent de certaines personnes. Je vais leur donner 4 fois plus que je prenais d’elles à tort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Jésus a dit : Aujourd’hui, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: salut
  - type: text
    text: ' de Dieu est venu dans cette maison. Après tout, je suis venu chercher les gens qui sont perdus. Et je suis venu pour les sauver. Et Zachée fait également partie de la famille d’Abraham.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire de 10 serviteurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors que les gens étaient encore à l’écoute, il leur a raconté une histoire. Il a fait cela parce qu’il s’approchait de Jérusalem. Il savait que les gens avaient de mauvaises pensées. Ils avaient de mauvaises pensées au sujet de ce que Jésus disait. Ils pensaient que Dieu allait commencer à gouverner son peuple immédiatement après.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il leur a dit : Un homme important a quitté sa maison et il a parcouru un long chemin dans un autre pays. Là, il recevra le pouvoir de gouverner son propre pays. Après cela, il sera de retour en tant que roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Avant son départ, il a demandé à 10 de ses serviteurs de venir auprès de lui. Il a donné à chacun d’entre eux 10 pièces d’argent. Il a dit : Utilisez cet argent pour obtenir plus d’argent pour moi pendant que je suis loin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les gens qui vivaient dans son pays n’aimaient pas l’homme. Donc, ils ont envoyé un groupe de personnes auprès de lui avec un message. Ce message était : Nous ne voulons pas que cet homme règne sur nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lorsque le roi est revenu, il a demandé à ces 10 serviteurs de venir auprès de lui. Il voulait savoir combien d’argent ils avaient produit de son argent. Ils pouvaient acheter des choses avec cela, et puis ils pouvaient vendre ces choses à plus d’argent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le premier serviteur est venu. Il a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton argent a fait 10 pièces d’argent de plus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le chef était heureux. Il a dit : Tu as bien fait. Tu es un bon serviteur en qui je peux faire confiance. Tu as utilisé une petite quantité d’argent bien. Donc, tu régneras sur 10 villes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le second serviteur est venu. Il a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton argent a fait 5 pièces d’argent de plus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le chef lui a dit : Tu régneras sur 5 villes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis un autre serviteur est venu. Il a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', voici ton argent. Je l’ai mis loin dans un morceau de tissu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je l’ai fait parce que je te craignais. Après tout, tu dis aux gens ce qu’ils doivent faire tout le temps. Tu prends les choses pour lesquelles tu n’as pas travaillé. Tu ne mets pas de graines dans le sol. Mais tu récoltes ce que tu n’as pas semé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le chef a répondu : Tu es un mauvais serviteur. Je vais utiliser tes propres mots pour montrer que tu as fait une mauvaise chose. Tu as dit que tu savais sur moi ceci : Que je dis aux gens ce qu’ils doivent faire tout le temps. Que je prends les choses pour lesquelles je ne travaille pas. Que je ne mets pas les graines dans le sol, mais je récolte les plantes des champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu devrais mettre mon argent à la banque. Quand je suis arrivé chez moi, je pourrais le retirer avec l’argent de plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'D’autres serviteurs se tenaient près de leur maître. Il leur disait : Prenez l’argent de ce serviteur. Donnez‑le au serviteur qui a 10 pièces d’argent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils ont répondu : Mais, Maître, ce serviteur a déjà 10 pièces d’argent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le Maître a dit : Laissez‑moi vous dire ceci. Certaines gens ont quelque chose. Je leur donne plus. D’autres gens n’ont rien. J’enlève de ces gens la petite chose qu’ils ont. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Maintenant, je dois punir ces autres gens qui ne voulaient pas que je règne sur eux. Amenez‑les ici et tuez‑les en face de moi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus va à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand Jésus avait dit tout cela, il est allé en face d’eux. Il est allé à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et il s’approchait de 2 villages appelés Bethphagé et '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. Ils étaient à la colline appelée la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: . Donc, il a envoyé 2 de ses disciples dans l’un des villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il leur a dit : Allez au village qui est en face de vous. Quand vous allez, vous trouverez un petit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: '. Quelqu’un l’a attaché là‑haut. Personne n’est monté sur lui avant. Enlevez la corde et amenez‑moi ce petit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Quelqu’un peut vous demander : Pourquoi prenez‑vous le petit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: '  ? S’il le fait, dites‑lui : Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a besoin de l’utiliser.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les 2 hommes que Jésus a envoyés, sont entrés dans le village. Ils ont trouvé tout ce que Jésus leur avait dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Pendant qu’ils prenaient le petit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: ', certains hommes leur ont demandé : Pourquoi prenez‑vous le petit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: '  ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils ont répondu : Le Maître a besoin de l’utiliser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ils l’ont amené à Jésus, et ils ont mis leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteaux
  - type: text
    text: ' au‑dessus de l’âne. Ensuite, ils ont aidé Jésus à monter sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Pendant que Jésus allait sur le petit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: ', les gens mettaient leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteaux
  - type: text
    text: ' sur le chemin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus était près de la partie la plus basse de la colline appelée la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: '. Toute la foule des gens qui le suivait est devenue très heureuse. Ils criaient : Dieu, tu es grand et puissant. Merci pour toutes les grandes choses que nous avons vues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Heureux le roi qui vient avec le pouvoir de Dieu. Nous voulons que tous soient bien au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' où Dieu habite. Nous prions pour que ce soit ainsi. Il est beau. Il a tout pouvoir et toute autorité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Certains des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' dans la foule disaient à Jésus : Maître, arrête ces gens qui te suivent de dire ces choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus a répondu : Permettez‑moi de vous dire ceci : Si ces gens étaient calmes, les pierres de la ville allaient crier à la place ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Quand Jésus était près de la ville, il a regardé en face de lui. Il a pleuré parce qu’il se sentait très triste pour les gens en elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il a dit : Vous devez savoir ce que vous devriez faire, pour vivre en paix. Vous devez être bien avec Dieu. Mais maintenant, quelque chose cache ces choses de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'En conséquence, les mauvais jours viendront à vous. Vos ennemis vont construire un mur autour de vous. Ils vous arrêteront complètement, et ils ne vous laisseront pas quitter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Vous ne comprenez pas que Dieu est venu pour vous sauver. Ainsi, vos ennemis vous tueront et ils vont détruire votre ville. Ils détruiront vos murs. Ainsi, ils vous détruiront avec vos enfants et ils ne laisseront pas une pierre sur une autre pierre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus enseigne dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jésus est entré dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Certaines gens vendaient des choses là‑bas. Jésus a commencé à les faire quitter de là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus a dit : Voici ce que Dieu a dit dans son livre : Ma maison sera un endroit où les gens viennent pour prier. Mais vous l’avez faite comme un endroit où les gens se volent les uns les autres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Jésus enseignait tous les jours dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et ceux qui enseignaient les règles de Dieu voulaient le tuer. Les chefs du peuple voulaient le tuer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Mais tous les gens écoutaient. Ils voulaient entendre tout ce qu’il disait. Ainsi, les dirigeants ne savaient pas comment le tuer.
