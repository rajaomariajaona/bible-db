document_id: JHN.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus rend un homme capable de marcher
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelque temps après, Jésus est allé à Jérusalem. Il y avait une fête des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y avait une piscine près de la porte des brebis à Jérusalem. Dans la langue des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', cette piscine s’appelait Béthesda. Autour de la piscine, il y avait un bâtiment avec 5 endroits. Ils avaient un toit sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Beaucoup de malades étaient couchés dans ces lieux. Certains d’entre eux ne pouvaient pas voir. Certains d’entre eux ne pouvaient pas marcher. Certains d’entre eux ne pouvaient pas se déplacer correctement. Ils attendaient quand l’eau était en mouvement. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' descendait dans la piscine à certains moments. Il agitait l’eau. Ensuite, tous les malades essayaient d’entrer dans la piscine. La première personne qui entrait dans l’eau, devenait bien. C’était pour tout cas de maladie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il y avait un homme malade pendant 38 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus a vu cet homme. Jésus savait que l’homme était malade comme ça pendant longtemps. Alors, il a demandé à l’homme : Veux‑tu guérir ? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le malade a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Je n’ai personne qui va me jeter dans la piscine. Lorsque l’eau s’agite, je cherche à entrer. Mais quelqu’un d’autre se jette vite dans la piscine avant moi. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Jésus lui a dit : Lève‑toi ! Prends ton lit et marche. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’homme est devenu bien immédiatement. Il a pris son lit et il marchait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’était le jour de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabbat
  - type: text
    text: '. Ainsi, les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' ont parlé à l’homme que Jésus avait guéri. Ils lui ont dit : Tu ne dois pas porter ton lit le jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabbat
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il a répondu : Un homme m’a guéri. Cet homme m’a dit : Prends ton lit et marche. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors ils lui ont demandé : Qui est cet homme qui t’a dit : Prends ton lit et marche ? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’homme que Jésus avait guéri ne le connaissait pas. Jésus avait disparu de la foule.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quelque temps après, Jésus a trouvé l’homme dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Jésus lui a dit : Tu vois, tu es maintenant bien. Arrête de faire de mauvaises choses. Sinon, quelque chose de pire risque de t’arriver. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis l’homme est allé auprès des dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Il leur a dit : C’est Jésus qui l’avait guéri. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' étaient en colère : Jésus avait guéri un homme le jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabbat
  - type: text
    text: '. Alors, ils cherchaient à faire du mal contre Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais Jésus leur a dit : Mon Père travaille toujours et je travaille aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ainsi, parce que Jésus a dit cela, les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient encore plus en colère. Ils voulaient encore plus le tuer : Il a travaillé le jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabbat
  - type: text
    text: . Mais il se faisait aussi lui‑même égal à Dieu. Il appelait Dieu son propre père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors, Jésus leur a répondu : Je vous dis la vérité. Le Fils ne peut rien faire par lui‑même. Il voit ce que le Père fait. Et il fait les mêmes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le Père aime le Fils. Donc, il lui montre toutes les choses qu’il fait. Et le Père montrera au Fils même de plus grandes choses que celles‑ci. Ces grandes choses vont vous surprendre encore plus. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le Père ressuscite les morts, pour les fait revivre. De la même manière, le Fils ressuscite toute personne qu’il choisit. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'En plus de cela, le Père ne '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' personne. Il a donné le pouvoir au Fils complètement, afin qu’il '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' tous. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors tous les gens vont respecter le Fils comme le Père. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je vous dis la vérité. Une personne entend mes paroles et croit au Père qui m’a envoyé. Cette personne vivra pour toujours. Dieu ne la punira pas à cause de ses mauvaises choses. Cette personne est morte, mais maintenant elle est devenue vivante.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je vous dis la vérité. Un temps arrivera bientôt quand les morts entendront la voix du Fils de Dieu. Vraiment, C’est déjà le moment. Ces gens qui entendront la voix du Fils vivront.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le Père a la vie en lui‑même. De la même manière, le Père a aussi donné la vie au Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En plus, le Père a donné le pouvoir au Fils, afin qu’il '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' les gens. Le Fils dit ce qui est bon pour chaque personne. C’est parce qu’il est le Fils de l’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ne soyez pas surpris par cela. Il y aura un moment où tous les morts sous la terre entendront la voix du Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils sortiront du sol. Les gens qui ont fait de bonnes choses vivront avec Dieu toujours. Les gens qui ont fait de mauvaises choses seront dans les souffrances sans fin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les choses qui montrent ce que Jésus est vraiment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je ne peux rien faire par moi‑même. Je comprends ce que le Père me dit. Puis, je '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' sur la base de ce qu’il dit. Je ne cherche pas à faire ce que je veux. Le Père m’a envoyé. Et je veux faire ce qu’il veut. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si je disais de grandes choses sur moi‑même, mes paroles ne seraient pas vraies. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais il y a quelqu’un d’autre qui parle de moi. Ce qu’il dit de moi est vrai. Je le sais. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Vous avez envoyé votre peuple demander à Jean sur moi. Ce qu’il vous a parlé de moi est vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je n’ai pas besoin que l’homme parle en mon nom. Non, mais je vous dis ceci seulement pour que Dieu vous sauve. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Jean était comme une lumière qui brillait. Et pendant un certain temps, vous avez apprécié la lumière qu’il a donnée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mais d’autres choses montrent qui je suis. Mon Père m’a donné du travail pour que je puisse le terminer. Et ces choses que je fais, parlent de moi. Elles parlent plus que les paroles de Jean. Elles montrent que le Père m’a envoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'En '
  - type: usfm
    marker: w
    children:
    - type: text
      text: outre
  - type: text
    text: ', le Père lui‑même, qui m’a envoyé, a parlé de moi. Vous n’avez jamais entendu sa voix. Et vous n’avez jamais vu sa forme. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Sa parole ne reste pas à l’intérieur de vous. Vous ne croyez pas en la personne que le Père a envoyée. Voilà pourquoi sa parole ne demeure pas en vous. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Vous étudiez les Écritures avec soin. Vous pensez qu’elles vont vous faire vivre. Et les Écritures vous parlent de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mais vous ne voulez pas venir à moi pour que vous puissiez vraiment vivre !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Je ne veux pas que les gens parlent de grandes choses sur moi. Si les gens disent de grandes choses sur moi, ce n’est pas important pour moi. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mais je sais quel genre de personnes vous êtes. Je sais que vous n’aimez pas vraiment Dieu ou d’autres personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Je suis venu avec le pouvoir de mon Père, mais vous ne me recevez pas. Mais si quelqu’un d’autre vient en son propre nom, vous le recevrez. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Vous acceptez de vous glorifier les uns les autres. Mais vous ne voulez pas que Dieu seul dise de bonnes choses sur vous. Voilà pourquoi vous ne pouvez pas croire en moi. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Mais je ne dirai pas au Père que vous êtes mauvais. Ne pensez pas que je vais le faire. Non, parce que c’est Moïse qui le fera. Vous espérez que Moïse vous aidera. Mais il dira au Père que vous êtes mauvais. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Si vous aviez vraiment cru en Moïse, vous pourriez croire en moi aussi. C’est parce que Moïse a écrit sur moi. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Mais vous ne croyez pas à ce que Moïse a écrit. Donc, vous ne pouvez pas croire à ce que je dis.
