document_id: JHN.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Jésus rend un homme capable de marcher
  - type: text
    content: 'Quelque temps après, Jésus est allé à Jérusalem. Il y avait une fête des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'C’était le jour de '
  - type: text
    content: sabbat
  - type: text
    content: '. Ainsi, les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' ont parlé à l’homme que Jésus avait guéri. Ils lui ont dit : Tu ne dois pas porter ton lit le jour du '
  - type: text
    content: sabbat
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Il a répondu : Un homme m’a guéri. Cet homme m’a dit : Prends ton lit et marche. '
  '12':
  - type: text
    content: 'Alors ils lui ont demandé : Qui est cet homme qui t’a dit : Prends ton lit et marche ? '
  '13':
  - type: text
    content: L’homme que Jésus avait guéri ne le connaissait pas. Jésus avait disparu de la foule.
  '14':
  - type: text
    content: 'Quelque temps après, Jésus a trouvé l’homme dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Jésus lui a dit : Tu vois, tu es maintenant bien. Arrête de faire de mauvaises choses. Sinon, quelque chose de pire risque de t’arriver. '
  '15':
  - type: text
    content: 'Puis l’homme est allé auprès des dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il leur a dit : C’est Jésus qui l’avait guéri. '
  '16':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' étaient en colère : Jésus avait guéri un homme le jour du '
  - type: text
    content: sabbat
  - type: text
    content: '. Alors, ils cherchaient à faire du mal contre Jésus. '
  '17':
  - type: text
    content: 'Mais Jésus leur a dit : Mon Père travaille toujours et je travaille aussi. '
  '18':
  - type: text
    content: 'Ainsi, parce que Jésus a dit cela, les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient encore plus en colère. Ils voulaient encore plus le tuer : Il a travaillé le jour du '
  - type: text
    content: sabbat
  - type: text
    content: . Mais il se faisait aussi lui‑même égal à Dieu. Il appelait Dieu son propre père.
  '19':
  - type: text
    content: 'Alors, Jésus leur a répondu : Je vous dis la vérité. Le Fils ne peut rien faire par lui‑même. Il voit ce que le Père fait. Et il fait les mêmes choses. '
  '2':
  - type: text
    content: 'Il y avait une piscine près de la porte des brebis à Jérusalem. Dans la langue des '
  - type: text
    content: Juifs
  - type: text
    content: ', cette piscine s’appelait Béthesda. Autour de la piscine, il y avait un bâtiment avec 5 endroits. Ils avaient un toit sur eux. '
  '20':
  - type: text
    content: 'Le Père aime le Fils. Donc, il lui montre toutes les choses qu’il fait. Et le Père montrera au Fils même de plus grandes choses que celles‑ci. Ces grandes choses vont vous surprendre encore plus. '
  '21':
  - type: text
    content: 'Le Père ressuscite les morts, pour les fait revivre. De la même manière, le Fils ressuscite toute personne qu’il choisit. '
  '22':
  - type: text
    content: 'En plus de cela, le Père ne '
  - type: text
    content: juge
  - type: text
    content: ' personne. Il a donné le pouvoir au Fils complètement, afin qu’il '
  - type: text
    content: juge
  - type: text
    content: ' tous. '
  '23':
  - type: text
    content: 'Alors tous les gens vont respecter le Fils comme le Père. '
  '24':
  - type: text
    content: Je vous dis la vérité. Une personne entend mes paroles et croit au Père qui m’a envoyé. Cette personne vivra pour toujours. Dieu ne la punira pas à cause de ses mauvaises choses. Cette personne est morte, mais maintenant elle est devenue vivante.
  '25':
  - type: text
    content: Je vous dis la vérité. Un temps arrivera bientôt quand les morts entendront la voix du Fils de Dieu. Vraiment, C’est déjà le moment. Ces gens qui entendront la voix du Fils vivront.
  '26':
  - type: text
    content: 'Le Père a la vie en lui‑même. De la même manière, le Père a aussi donné la vie au Fils. '
  '27':
  - type: text
    content: 'En plus, le Père a donné le pouvoir au Fils, afin qu’il '
  - type: text
    content: juge
  - type: text
    content: ' les gens. Le Fils dit ce qui est bon pour chaque personne. C’est parce qu’il est le Fils de l’homme. '
  '28':
  - type: text
    content: 'Ne soyez pas surpris par cela. Il y aura un moment où tous les morts sous la terre entendront la voix du Fils. '
  '29':
  - type: text
    content: Ils sortiront du sol. Les gens qui ont fait de bonnes choses vivront avec Dieu toujours. Les gens qui ont fait de mauvaises choses seront dans les souffrances sans fin.
  - type: heading
    content: Les choses qui montrent ce que Jésus est vraiment
  '3':
  - type: text
    content: 'Beaucoup de malades étaient couchés dans ces lieux. Certains d’entre eux ne pouvaient pas voir. Certains d’entre eux ne pouvaient pas marcher. Certains d’entre eux ne pouvaient pas se déplacer correctement. Ils attendaient quand l’eau était en mouvement. '
  '30':
  - type: text
    content: 'Je ne peux rien faire par moi‑même. Je comprends ce que le Père me dit. Puis, je '
  - type: text
    content: juge
  - type: text
    content: ' sur la base de ce qu’il dit. Je ne cherche pas à faire ce que je veux. Le Père m’a envoyé. Et je veux faire ce qu’il veut. '
  '31':
  - type: text
    content: 'Si je disais de grandes choses sur moi‑même, mes paroles ne seraient pas vraies. '
  '32':
  - type: text
    content: 'Mais il y a quelqu’un d’autre qui parle de moi. Ce qu’il dit de moi est vrai. Je le sais. '
  '33':
  - type: text
    content: 'Vous avez envoyé votre peuple demander à Jean sur moi. Ce qu’il vous a parlé de moi est vrai. '
  '34':
  - type: text
    content: 'Je n’ai pas besoin que l’homme parle en mon nom. Non, mais je vous dis ceci seulement pour que Dieu vous sauve. '
  '35':
  - type: text
    content: Jean était comme une lumière qui brillait. Et pendant un certain temps, vous avez apprécié la lumière qu’il a donnée.
  '36':
  - type: text
    content: 'Mais d’autres choses montrent qui je suis. Mon Père m’a donné du travail pour que je puisse le terminer. Et ces choses que je fais, parlent de moi. Elles parlent plus que les paroles de Jean. Elles montrent que le Père m’a envoyé. '
  '37':
  - type: text
    content: 'En '
  - type: text
    content: outre
  - type: text
    content: ', le Père lui‑même, qui m’a envoyé, a parlé de moi. Vous n’avez jamais entendu sa voix. Et vous n’avez jamais vu sa forme. '
  '38':
  - type: text
    content: 'Sa parole ne reste pas à l’intérieur de vous. Vous ne croyez pas en la personne que le Père a envoyée. Voilà pourquoi sa parole ne demeure pas en vous. '
  '39':
  - type: text
    content: 'Vous étudiez les Écritures avec soin. Vous pensez qu’elles vont vous faire vivre. Et les Écritures vous parlent de moi. '
  '4':
  - type: text
    content: 'Un '
  - type: text
    content: ange
  - type: text
    content: ' descendait dans la piscine à certains moments. Il agitait l’eau. Ensuite, tous les malades essayaient d’entrer dans la piscine. La première personne qui entrait dans l’eau, devenait bien. C’était pour tout cas de maladie. '
  '40':
  - type: text
    content: Mais vous ne voulez pas venir à moi pour que vous puissiez vraiment vivre !
  '41':
  - type: text
    content: 'Je ne veux pas que les gens parlent de grandes choses sur moi. Si les gens disent de grandes choses sur moi, ce n’est pas important pour moi. '
  '42':
  - type: text
    content: 'Mais je sais quel genre de personnes vous êtes. Je sais que vous n’aimez pas vraiment Dieu ou d’autres personnes. '
  '43':
  - type: text
    content: 'Je suis venu avec le pouvoir de mon Père, mais vous ne me recevez pas. Mais si quelqu’un d’autre vient en son propre nom, vous le recevrez. '
  '44':
  - type: text
    content: 'Vous acceptez de vous glorifier les uns les autres. Mais vous ne voulez pas que Dieu seul dise de bonnes choses sur vous. Voilà pourquoi vous ne pouvez pas croire en moi. '
  '45':
  - type: text
    content: 'Mais je ne dirai pas au Père que vous êtes mauvais. Ne pensez pas que je vais le faire. Non, parce que c’est Moïse qui le fera. Vous espérez que Moïse vous aidera. Mais il dira au Père que vous êtes mauvais. '
  '46':
  - type: text
    content: 'Si vous aviez vraiment cru en Moïse, vous pourriez croire en moi aussi. C’est parce que Moïse a écrit sur moi. '
  '47':
  - type: text
    content: Mais vous ne croyez pas à ce que Moïse a écrit. Donc, vous ne pouvez pas croire à ce que je dis.
  '5':
  - type: text
    content: 'Il y avait un homme malade pendant 38 ans. '
  '6':
  - type: text
    content: 'Jésus a vu cet homme. Jésus savait que l’homme était malade comme ça pendant longtemps. Alors, il a demandé à l’homme : Veux‑tu guérir ? '
  '7':
  - type: text
    content: 'Le malade a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Je n’ai personne qui va me jeter dans la piscine. Lorsque l’eau s’agite, je cherche à entrer. Mais quelqu’un d’autre se jette vite dans la piscine avant moi. '
  '8':
  - type: text
    content: 'Alors Jésus lui a dit : Lève‑toi ! Prends ton lit et marche. '
  '9':
  - type: text
    content: L’homme est devenu bien immédiatement. Il a pris son lit et il marchait.
