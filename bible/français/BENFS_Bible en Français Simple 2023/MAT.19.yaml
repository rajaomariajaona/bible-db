document_id: MAT.19,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 19
  - type: heading
    content: Jésus enseigne sur le divorce
  - type: text
    content: 'Jésus a achevé toutes ces choses. Il a alors quitté la Galilée. Il est allé à la partie de la Judée qui est de l’autre côté du '
  - type: text
    content: Jourdain
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont dit : Si c’est cela la situation entre un mari et une femme, vaut mieux ne pas se marier.'
  '11':
  - type: text
    content: 'Et Jésus a répondu : Tout le monde ne peut pas être d’accord avec cette idée. Dieu n’a pas permis à tout le monde de comprendre cela.  '
  '12':
  - type: text
    content: 'Je vous dis la vérité : Il y a plusieurs raisons différentes pour lesquelles un homme ne peut pas se marier. Certains sont nés comme ça. D’autres ne peuvent pas se marier. C’est parce que les gens les ont faits ainsi. Et d’autres gens sont restés célibataires. C’est pour mieux servir Dieu.'
  - type: heading
    content: Jésus veut que les enfants viennent à lui
  '13':
  - type: text
    content: 'Alors certaines personnes ont amené leurs enfants auprès de Jésus. Ces personnes ont voulu que Jésus pose ses mains sur les têtes de leurs enfants. Ces personnes ont voulu que Jésus prie pour leurs enfants. Mais les  '
  - type: text
    content: disciples
  - type: text
    content: ' ne voulaient pas cela. Ils les empêchaient de voir Jésus.'
  '14':
  - type: text
    content: 'Mais Jésus a dit : N’arrêtez pas les enfants. Qu’ils viennent à moi. Les gens qui sont comme ces enfants peuvent entrer dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: '. '
  '15':
  - type: text
    content: Alors Jésus a posé ses mains sur chacune des têtes des enfants. Il a prié pour eux aussi. Après cela, il a quitté cet endroit.
  - type: heading
    content: Jésus rencontre un homme riche
  '16':
  - type: text
    content: 'Un jour, un homme est venu voir Jésus. Il a demandé : Maître, quelle bonne chose dois‑je faire pour que je puisse vivre pour toujours ?'
  '17':
  - type: text
    content: 'Jésus lui a répondu : Tu ne devrais pas me poser de questions sur une bonne chose ! Seul Dieu est bon. Si tu veux vivre pour toujours, alors tu dois obéir à tous les commandements de Dieu. '
  '18':
  - type: text
    content: 'L’homme a demandé à Jésus : A quels commandements dois‑je obéir ?'
  - type: text
    content: 'Alors Jésus lui a répondu : Ne tue pas une personne. Ne couche pas avec une femme qui n’est pas ton épouse. Ne vole personne. Dis des choses vraies sur les gens. '
  '19':
  - type: text
    content: Aime ton père et ta mère et dis de bonnes choses à leur sujet. Aime les autres comme tu t’aimes toi‑même.
  '2':
  - type: text
    content: De grandes foules suivaient Jésus là. Jésus guérissait les malades.
  '20':
  - type: text
    content: 'Le jeune homme a répondu : J’ai toujours obéi à ces commandements. Que dois‑je faire ? '
  '21':
  - type: text
    content: 'Jésus lui a dit : Si tu veux être complètement bon, alors tu dois faire ceci. Tu dois vendre tout ce que tu as. Donne l’argent aux pauvres et alors tu auras des choses précieuses au '
  - type: text
    content: ciel
  - type: text
    content: . Reviens quand tu as fait cela. Et suis‑moi.
  '22':
  - type: text
    content: Le jeune homme a entendu cela. Il n’était pas heureux. Alors il est parti. Il se sentait triste, parce qu’il était un homme très riche.
  '23':
  - type: text
    content: 'Alors Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Je vous dis la vérité. Il est très difficile à un homme riche d’entrer dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: '. '
  '24':
  - type: text
    content: Oui, il est plus facile à un grand animal (
  - type: text
    content: chameau
  - type: text
    content: ') de passer par le trou d’une aiguille. Mais il est beaucoup plus difficile à un homme riche d’entrer dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: .
  '25':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont entendu cela. Ils étaient encore plus surpris. Ils ont demandé : Qui alors Dieu peut‑il sauver ? '
  '26':
  - type: text
    content: 'Jésus les a regardés et il a répondu : Les hommes ne peuvent pas se sauver. Mais Dieu peut le faire. Dieu peut tout faire.'
  '27':
  - type: text
    content: 'Pierre a dit à Jésus : Ecoute ! Nous avons laissé tout ce que nous avions. Et maintenant nous sommes tes  '
  - type: text
    content: disciples
  - type: text
    content: . Qu’est‑ce que nous aurons ?
  '28':
  - type: text
    content: 'Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Je vous dis la vérité. Le Fils de l’homme dirigera dans le nouveau monde qui va commencer un jour. Vous qui êtes mes  '
  - type: text
    content: disciples
  - type: text
    content: ', vous dirigerez aussi. Vous jugerez les 12 tribus d’Israël. '
  '29':
  - type: text
    content: Certaines personnes peuvent quitter leurs maisons ou frères ou sœurs, père ou mère ou femme ou enfants ou ses terres. Elles les laissent et vont dire aux autres la Bonne Nouvelle au sujet de moi. Ces gens recevront 100 fois de tout cela. Mais après leur mort, ils vont vivre avec Dieu pour toujours.
  '3':
  - type: text
    content: 'Certains '
  - type: text
    content: Pharisiens
  - type: text
    content: ' sont venus tenter Jésus. Ils lui ont demandé : Un homme peut‑il renvoyer sa propre femme et lui dire : Tu n’es plus ma femme ? Est‑ce que la loi juive l’autorise à faire comme il veut ? '
  '30':
  - type: text
    content: Mais beaucoup de gens qui sont très importants aujourd’hui deviendront les moins importants. Beaucoup de ceux qui sont maintenant les moins importants, deviendront très importants.
  '4':
  - type: text
    content: 'Jésus a répondu : Vous avez sûrement lu à ce sujet dans le livre de Dieu au début du monde, Dieu a fait l’homme et il a également fait la femme.'
  '5':
  - type: text
    content: 'A cause de cela, l’homme quittera son père et sa mère. Dieu a uni l’homme et sa femme. Alors l’homme et la femme deviendront comme une seule personne. '
  '6':
  - type: text
    content: Ils ne sont plus 2 personnes séparées. Ils sont comme une seule personne. Dieu les a unis ensemble pour être mari et femme. Donc, personne ne doit les séparer.
  '7':
  - type: text
    content: 'Alors les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont dit à Jésus : Moïse a dit qu’un homme pouvait donner un papier à sa propre femme. Le document montrait que l’homme et la femme étaient effectivement séparés. Alors, l’homme peut renvoyer la femme du mariage. Pourquoi Moïse a dit cela ?'
  '8':
  - type: text
    content: 'Jésus leur a répondu : Moïse a dit cela, parce que vous les gens, vous ne voulez pas obéir à Dieu. Toutes ces choses étaient différentes au début, quand Dieu a fait le monde. '
  '9':
  - type: text
    content: 'Je vous dis la vérité : Un homme ne doit pas renvoyer sa femme du mariage, sauf si elle a couché avec un autre homme. Un homme ne peut pas épouser une autre femme si cela arrive. Sinon, il fait une mauvaise chose s’il se marie avec une autre femme.'
