document_id: MAT.19,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 19
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus enseigne sur le divorce
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus a achevé toutes ces choses. Il a alors quitté la Galilée. Il est allé à la partie de la Judée qui est de l’autre côté du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus ont dit : Si c’est cela la situation entre un mari et une femme, vaut mieux ne pas se marier.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et Jésus a répondu : Tout le monde ne peut pas être d’accord avec cette idée. Dieu n’a pas permis à tout le monde de comprendre cela.  '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Je vous dis la vérité : Il y a plusieurs raisons différentes pour lesquelles un homme ne peut pas se marier. Certains sont nés comme ça. D’autres ne peuvent pas se marier. C’est parce que les gens les ont faits ainsi. Et d’autres gens sont restés célibataires. C’est pour mieux servir Dieu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus veut que les enfants viennent à lui 
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors certaines personnes ont amené leurs enfants auprès de Jésus. Ces personnes ont voulu que Jésus pose ses mains sur les têtes de leurs enfants. Ces personnes ont voulu que Jésus prie pour leurs enfants. Mais les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ne voulaient pas cela. Ils les empêchaient de voir Jésus.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais Jésus a dit : N’arrêtez pas les enfants. Qu’ils viennent à moi. Les gens qui sont comme ces enfants peuvent entrer dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alors Jésus a posé ses mains sur chacune des têtes des enfants. Il a prié pour eux aussi. Après cela, il a quitté cet endroit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus rencontre un homme riche
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Un jour, un homme est venu voir Jésus. Il a demandé : Maître, quelle bonne chose dois‑je faire pour que je puisse vivre pour toujours ?'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus lui a répondu : Tu ne devrais pas me poser de questions sur une bonne chose ! Seul Dieu est bon. Si tu veux vivre pour toujours, alors tu dois obéir à tous les commandements de Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L’homme a demandé à Jésus : A quels commandements dois‑je obéir ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus lui a répondu : Ne tue pas une personne. Ne couche pas avec une femme qui n’est pas ton épouse. Ne vole personne. Dis des choses vraies sur les gens. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Aime ton père et ta mère et dis de bonnes choses à leur sujet. Aime les autres comme tu t’aimes toi‑même.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: De grandes foules suivaient Jésus là. Jésus guérissait les malades.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le jeune homme a répondu : J’ai toujours obéi à ces commandements. Que dois‑je faire ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus lui a dit : Si tu veux être complètement bon, alors tu dois faire ceci. Tu dois vendre tout ce que tu as. Donne l’argent aux pauvres et alors tu auras des choses précieuses au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Reviens quand tu as fait cela. Et suis‑moi.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Le jeune homme a entendu cela. Il n’était pas heureux. Alors il est parti. Il se sentait triste, parce qu’il était un homme très riche.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors Jésus a dit à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Je vous dis la vérité. Il est très difficile à un homme riche d’entrer dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Oui, il est plus facile à un grand animal (
    - type: usfm
      marker: w
      children:
      - type: text
        text: chameau
    - type: text
      text: ') de passer par le trou d’une aiguille. Mais il est beaucoup plus difficile à un homme riche d’entrer dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont entendu cela. Ils étaient encore plus surpris. Ils ont demandé : Qui alors Dieu peut‑il sauver ? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus les a regardés et il a répondu : Les hommes ne peuvent pas se sauver. Mais Dieu peut le faire. Dieu peut tout faire.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Pierre a dit à Jésus : Ecoute ! Nous avons laissé tout ce que nous avions. Et maintenant nous sommes tes  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: . Qu’est‑ce que nous aurons ?
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jésus a dit à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Je vous dis la vérité. Le Fils de l’homme dirigera dans le nouveau monde qui va commencer un jour. Vous qui êtes mes  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ', vous dirigerez aussi. Vous jugerez les 12 tribus d’Israël. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Certaines personnes peuvent quitter leurs maisons ou frères ou sœurs, père ou mère ou femme ou enfants ou ses terres. Elles les laissent et vont dire aux autres la Bonne Nouvelle au sujet de moi. Ces gens recevront 100 fois de tout cela. Mais après leur mort, ils vont vivre avec Dieu pour toujours.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Certains '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' sont venus tenter Jésus. Ils lui ont demandé : Un homme peut‑il renvoyer sa propre femme et lui dire : Tu n’es plus ma femme ? Est‑ce que la loi juive l’autorise à faire comme il veut ? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Mais beaucoup de gens qui sont très importants aujourd’hui deviendront les moins importants. Beaucoup de ceux qui sont maintenant les moins importants, deviendront très importants.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jésus a répondu : Vous avez sûrement lu à ce sujet dans le livre de Dieu au début du monde, Dieu a fait l’homme et il a également fait la femme.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'A cause de cela, l’homme quittera son père et sa mère. Dieu a uni l’homme et sa femme. Alors l’homme et la femme deviendront comme une seule personne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils ne sont plus 2 personnes séparées. Ils sont comme une seule personne. Dieu les a unis ensemble pour être mari et femme. Donc, personne ne doit les séparer.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont dit à Jésus : Moïse a dit qu’un homme pouvait donner un papier à sa propre femme. Le document montrait que l’homme et la femme étaient effectivement séparés. Alors, l’homme peut renvoyer la femme du mariage. Pourquoi Moïse a dit cela ?'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jésus leur a répondu : Moïse a dit cela, parce que vous les gens, vous ne voulez pas obéir à Dieu. Toutes ces choses étaient différentes au début, quand Dieu a fait le monde. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je vous dis la vérité : Un homme ne doit pas renvoyer sa femme du mariage, sauf si elle a couché avec un autre homme. Un homme ne peut pas épouser une autre femme si cela arrive. Sinon, il fait une mauvaise chose s’il se marie avec une autre femme.'
