document_id: ROM.12,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 12
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nous devons savoir comment servir Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mes amis chrétiens, Dieu a été très gentil avec nous. Pour cette raison, je veux vraiment que vous serviez Dieu toute votre vie. Offrez‑lui vos corps comme un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' qui continue de vivre. Servez‑le avec tout ce que vous avez et cela lui plaira. C’est la vraie façon d’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: ' Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aimez‑vous vraiment comme des frères et sœurs. Soyez vraiment heureux de respecter les autres chrétiens. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ne soyez pas paresseux, mais travaillez toujours dur. Servez bien le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', parce que vous l’appréciez. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Soyez heureux, car vous pouvez faire confiance en Dieu pour faire ce qu’il dit. Soyez patients lorsque vous avez des problèmes. Continuez toujours de prier. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Si l’un des membres du peuple de Dieu a besoin de quelque chose, alors aidez‑le avec ce que vous avez. Soyez toujours heureux de laisser les gens rester chez vous.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Demandez à Dieu de bénir les gens qui vous causent des problèmes. Oui, demandez‑lui d’être gentil avec eux. Ne lui demandez pas de leur faire du mal. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Si vous êtes avec quelqu’un qui est heureux, vous devez aussi être heureux. Si vous êtes avec quelqu’un qui est triste, vous devez également être tristes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Essayez toujours d’être d’accord et d’être amis les uns avec les autres. Ne soyez pas fiers. Soyez amis avec des gens qui ne sont pas importants. Ne pensez pas que vous savez tout.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Si quelqu’un a fait de mauvaises choses contre vous, ne lui faites pas de mauvaises choses. Essayez de vivre dans le bon sens, afin que les gens vous respectent. Ils verront que vous faites de bonnes choses. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Si c’est possible, essayez toujours d’être amis avec d’autres personnes.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mes amis, si quelqu’un vous a fait du mal, n’essayez pas de le punir vous‑mêmes. Au lieu de cela, laissez Dieu être en colère contre lui et le punir. Voici ce qui est écrit dans la Bible :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les gens font quelque chose de mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les punirai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais me venger contre eux.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ne devenez pas comme les gens qui appartiennent à ce monde. Mais laissez Dieu changer complètement votre façon de penser, afin de vivre différemment. Ensuite, vous comprendrez ce que Dieu veut que vous fassiez. Vous saurez ce qui est bon. Vous saurez ce qui plaît à Dieu. Vous saurez ce qui est tout à fait correct.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais la Bible dit aussi ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si ton ennemi a faim, nourris‑le.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il a soif, donne‑lui à boire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu aides tes ennemis, ils auront honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils deviendront tristes à cause de ce qu’ils t’ont fait.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ne laisse pas les mauvaises choses gagner contre toi ! Fais plutôt de bonnes choses. Ensuite, tu gagneras contre les mauvaises choses que les gens font.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dieu a été bon envers moi, afin que je puisse le servir. Pour cette raison, je dis ceci à chacun de vous : Ne pensez pas que vous êtes meilleurs que vous n’êtes pas vraiment. Au lieu de cela, réfléchissez bien à vous. Décidez combien Dieu vous a aidés à croire en lui. Vous saurez alors comment bien le servir. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Chaque partie de nos corps fonctionne de manière différente. Mais toutes les parties appartiennent à un corps unique. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: De la même manière, nous sommes plusieurs personnes, mais nous appartenons tous à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', comme un seul corps. Nous appartenons également les uns aux autres, comme les différentes parties d’un corps appartiennent les unes aux autres.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dieu a été bon envers nous. Il a donné à chacun de nous des cadeaux différents pour que nous puissions le servir. Dieu aide certaines personnes à exprimer clairement ses messages. Ces gens doivent faire confiance en Dieu pour leur dire quoi dire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dieu aide certaines personnes à servir les autres. Elles doivent bien le faire. Dieu aide certaines personnes à pouvoir enseigner les autres. Ces gens doivent bien enseigner.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Si Dieu vous a aidés à rendre les autres forts, alors vous devez le faire. Si Dieu vous a aidés à partager vos affaires avec les autres, faites‑le sérieusement. Si Dieu vous a aidés à présider, faite‑le courageusement. Si Dieu vous a aidés à être gentils avec les autres, faite‑le avec bonheur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aimez vraiment les gens et aidez‑les
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aimez vraiment les autres, pas comme un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hypocrite
    - type: text
      text: '. Détestez tout ce qui est mauvais. Continuez de faire de bonnes choses. '
