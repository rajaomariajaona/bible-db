document_id: ROM.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: Nous devons savoir comment servir Dieu
  - type: text
    content: 'Mes amis chrétiens, Dieu a été très gentil avec nous. Pour cette raison, je veux vraiment que vous serviez Dieu toute votre vie. Offrez‑lui vos corps comme un '
  - type: text
    content: sacrifice
  - type: text
    content: ' qui continue de vivre. Servez‑le avec tout ce que vous avez et cela lui plaira. C’est la vraie façon d’'
  - type: text
    content: adorer
  - type: text
    content: ' Dieu. '
  '10':
  - type: text
    content: 'Aimez‑vous vraiment comme des frères et sœurs. Soyez vraiment heureux de respecter les autres chrétiens. '
  '11':
  - type: text
    content: 'Ne soyez pas paresseux, mais travaillez toujours dur. Servez bien le '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce que vous l’appréciez. '
  '12':
  - type: text
    content: 'Soyez heureux, car vous pouvez faire confiance en Dieu pour faire ce qu’il dit. Soyez patients lorsque vous avez des problèmes. Continuez toujours de prier. '
  '13':
  - type: text
    content: Si l’un des membres du peuple de Dieu a besoin de quelque chose, alors aidez‑le avec ce que vous avez. Soyez toujours heureux de laisser les gens rester chez vous.
  '14':
  - type: text
    content: 'Demandez à Dieu de bénir les gens qui vous causent des problèmes. Oui, demandez‑lui d’être gentil avec eux. Ne lui demandez pas de leur faire du mal. '
  '15':
  - type: text
    content: 'Si vous êtes avec quelqu’un qui est heureux, vous devez aussi être heureux. Si vous êtes avec quelqu’un qui est triste, vous devez également être tristes. '
  '16':
  - type: text
    content: Essayez toujours d’être d’accord et d’être amis les uns avec les autres. Ne soyez pas fiers. Soyez amis avec des gens qui ne sont pas importants. Ne pensez pas que vous savez tout.
  '17':
  - type: text
    content: 'Si quelqu’un a fait de mauvaises choses contre vous, ne lui faites pas de mauvaises choses. Essayez de vivre dans le bon sens, afin que les gens vous respectent. Ils verront que vous faites de bonnes choses. '
  '18':
  - type: text
    content: Si c’est possible, essayez toujours d’être amis avec d’autres personnes.
  '19':
  - type: text
    content: 'Mes amis, si quelqu’un vous a fait du mal, n’essayez pas de le punir vous‑mêmes. Au lieu de cela, laissez Dieu être en colère contre lui et le punir. Voici ce qui est écrit dans la Bible :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu dit :'
  - type: text
    content: Quand les gens font quelque chose de mal,
  - type: text
    content: Je les punirai.
  - type: text
    content: Je vais me venger contre eux.
  '2':
  - type: text
    content: Ne devenez pas comme les gens qui appartiennent à ce monde. Mais laissez Dieu changer complètement votre façon de penser, afin de vivre différemment. Ensuite, vous comprendrez ce que Dieu veut que vous fassiez. Vous saurez ce qui est bon. Vous saurez ce qui plaît à Dieu. Vous saurez ce qui est tout à fait correct.
  '20':
  - type: text
    content: 'Mais la Bible dit aussi ceci :'
  - type: text
    content: Si ton ennemi a faim, nourris‑le.
  - type: text
    content: S’il a soif, donne‑lui à boire.
  - type: text
    content: Si tu aides tes ennemis, ils auront honte.
  - type: text
    content: Ils deviendront tristes à cause de ce qu’ils t’ont fait.
  '21':
  - type: text
    content: Ne laisse pas les mauvaises choses gagner contre toi ! Fais plutôt de bonnes choses. Ensuite, tu gagneras contre les mauvaises choses que les gens font.
  '3':
  - type: text
    content: 'Dieu a été bon envers moi, afin que je puisse le servir. Pour cette raison, je dis ceci à chacun de vous : Ne pensez pas que vous êtes meilleurs que vous n’êtes pas vraiment. Au lieu de cela, réfléchissez bien à vous. Décidez combien Dieu vous a aidés à croire en lui. Vous saurez alors comment bien le servir. '
  '4':
  - type: text
    content: 'Chaque partie de nos corps fonctionne de manière différente. Mais toutes les parties appartiennent à un corps unique. '
  '5':
  - type: text
    content: De la même manière, nous sommes plusieurs personnes, mais nous appartenons tous à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', comme un seul corps. Nous appartenons également les uns aux autres, comme les différentes parties d’un corps appartiennent les unes aux autres.'
  '6':
  - type: text
    content: 'Dieu a été bon envers nous. Il a donné à chacun de nous des cadeaux différents pour que nous puissions le servir. Dieu aide certaines personnes à exprimer clairement ses messages. Ces gens doivent faire confiance en Dieu pour leur dire quoi dire. '
  '7':
  - type: text
    content: Dieu aide certaines personnes à servir les autres. Elles doivent bien le faire. Dieu aide certaines personnes à pouvoir enseigner les autres. Ces gens doivent bien enseigner.
  '8':
  - type: text
    content: Si Dieu vous a aidés à rendre les autres forts, alors vous devez le faire. Si Dieu vous a aidés à partager vos affaires avec les autres, faites‑le sérieusement. Si Dieu vous a aidés à présider, faite‑le courageusement. Si Dieu vous a aidés à être gentils avec les autres, faite‑le avec bonheur.
  - type: heading
    content: Aimez vraiment les gens et aidez‑les
  '9':
  - type: text
    content: 'Aimez vraiment les autres, pas comme un '
  - type: text
    content: hypocrite
  - type: text
    content: '. Détestez tout ce qui est mauvais. Continuez de faire de bonnes choses. '
