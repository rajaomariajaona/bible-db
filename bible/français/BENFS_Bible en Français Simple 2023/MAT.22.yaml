document_id: MAT.22,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 22
  - type: heading
    content: Jésus raconte une histoire sur un repas à un mariage
  - type: text
    content: 'Jésus leur a dit d’autres histoires. '
  '10':
  - type: text
    content: Alors les serviteurs sont allés dans les rues. Et ils ont emmené à la maison du roi tous les gens qu’ils rencontraient. Certains étaient de bonnes personnes et d’autres étaient de mauvaises personnes. Beaucoup de gens sont venus pour remplir la salle.
  '11':
  - type: text
    content: 'Alors le roi est entré dans la salle pour voir tous les gens. Il a vu un homme. Il ne portait pas les vêtements appropriés pour un mariage. '
  '12':
  - type: text
    content: 'Le roi a dit à l’homme : Alors, comment es‑tu venu ici, mon ami ? Et tu ne portes pas les vêtements convenables de mariage. L’homme n’a pas répondu.'
  '13':
  - type: text
    content: 'Le roi a dit à ses serviteurs : Liez‑le, afin qu’il ne puisse pas bouger ses mains ou ses pieds. Jetez‑le dans un endroit sombre à l’extérieur. Là, les gens vont pleurer. Ils vont également grincer leurs dents les unes contre les autres, parce qu’ils seront en colère.'
  '14':
  - type: text
    content: Dieu demande à beaucoup de gens de venir sous son règne. Mais il ne choisit que quelques personnes.
  - type: heading
    content: Les  Pharisiens demandent à Jésus de payer les taxes
  '15':
  - type: text
    content: 'Après cela, les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' sont allés. Ils se sont réunis ensemble. Ils ont décidé de poser une question à Jésus. Ils voulaient le condamner par ses propres paroles. '
  '16':
  - type: text
    content: 'Alors les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont envoyé leurs propres '
  - type: text
    content: disciples
  - type: text
    content: ' à Jésus. Et ils ont également envoyé des gens qui se trouvaient dans le groupe d’Hérode. Ils ont tous dit à Jésus : Maître, nous savons que tu es un honnête homme. Les choses que tu enseignes sur la voie de Dieu sont vraies. Personne ne peut t’influencer par son apparence. Cela n’est pas important pour toi.  '
  '17':
  - type: text
    content: 'Dis‑nous ce que tu penses à ce sujet : Faut‑il payer des taxes au chef '
  - type: text
    content: romain
  - type: text
    content: ', '
  - type: text
    content: César
  - type: text
    content: '  ? Ou ne devrions‑nous pas les payer ?'
  '18':
  - type: text
    content: 'Jésus savait pourquoi ils lui ont posé cette question. C’était un piège pour l’accuser. Alors Jésus leur a dit : Vous essayez de me faire dire quelque chose de mal. Vous êtes '
  - type: text
    content: hypocrites
  - type: text
    content: '  ! '
  '19':
  - type: text
    content: Montrez‑moi la pièce de monnaie que vous utilisez pour l’
  - type: text
    content: impôt
  - type: text
    content: '. Ils lui ont apporté une pièce de monnaie. '
  '2':
  - type: text
    content: 'Il a dit : Je vais vous dire encore une fois ce à quoi le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: ' ressemble. Un roi avait organisé la fête de mariage de son fils. '
  '20':
  - type: text
    content: 'Alors Jésus leur a dit : L’image et le nom qui sont sur la pièce de monnaie sont de qui ?'
  '21':
  - type: text
    content: 'Ils ont répondu : C’est l’image de  '
  - type: text
    content: César
  - type: text
    content: ' et le nom de  '
  - type: text
    content: César
  - type: text
    content: '. Alors Jésus leur a dit : Donnez à '
  - type: text
    content: César
  - type: text
    content: ' ce qui est à '
  - type: text
    content: César
  - type: text
    content: '. Et donnez à Dieu les choses qui sont pour Dieu. '
  '22':
  - type: text
    content: Quand ils ont entendu la réponse de Jésus, ils étaient très surpris. Alors, ils l’ont quitté et ils sont partis.
  - type: heading
    content: Les  Sadducéens posent une question à Jésus
  '23':
  - type: text
    content: 'Ce jour‑là, quelques‑uns des '
  - type: text
    content: Sadducéens
  - type: text
    content: ' sont venus aussi auprès de Jésus. Ces hommes ne croyaient pas qu’une personne puisse vivre à nouveau après sa mort. Les  '
  - type: text
    content: Sadducéens
  - type: text
    content: ' ont posé à Jésus une question.'
  '24':
  - type: text
    content: 'Ils ont dit à Jésus : Maître, Moïse a écrit ces choses pour nous dans la loi. Une femme épouse un homme. Mais l’homme meurt avant que la femme ait des enfants. Le frère de cet homme devra alors l’épouser. Ils pourront avoir des enfants pour l’homme qui est mort. S’ils ont des enfants, les enfants seront appelés les enfants du premier mari. '
  '25':
  - type: text
    content: 'Une fois, il y avait 7 frères qui vivaient ici. Le frère aîné a épousé une femme. Puis il est mort avant que la femme ait des enfants. '
  '26':
  - type: text
    content: 'Le prochain frère l’a alors épousée. Et puis il est mort aussi. Donc, un troisième frère a épousé cette femme. Et la même chose à tous les frères jusqu’au septième frère. Ils sont tous morts avant que la femme ait des enfants. '
  '27':
  - type: text
    content: 'Après cela, la femme est aussi morte. '
  '28':
  - type: text
    content: Certaines personnes disent qu’un jour les morts seront de nouveau vivants. Ce jour‑là, à qui sera la femme ? Elle avait épousé tous les 7 de ces frères.
  '29':
  - type: text
    content: 'Jésus a dit aux '
  - type: text
    content: Sadducéens
  - type: text
    content: '  : Vous avez tort. Vous ne savez pas ce que Dieu a dit dans son livre. Vous ne savez pas comment Dieu est puissant. '
  '3':
  - type: text
    content: Il avait demandé à beaucoup de gens de venir. Donc, il a envoyé ses serviteurs appeler les invités au repas spécial de mariage. Mais beaucoup de gens ont refusé de venir.
  '30':
  - type: text
    content: 'Un jour, les gens qui sont morts seront à nouveau en vie. Mais les hommes et les femmes ne se marieront plus. Ils seront comme les  '
  - type: text
    content: anges
  - type: text
    content: ' dans le  '
  - type: text
    content: ciel
  - type: text
    content: '. Ils ne se marieront pas. '
  '31':
  - type: text
    content: 'Il est vrai qu’un jour les morts revivront. Vous avez lu ce que Dieu vous a dit, '
  '32':
  - type: text
    content: 'Je suis le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob. Dieu n’est pas le Dieu des gens qui sont morts. Il est le Dieu des personnes qui sont maintenant en vie. '
  '33':
  - type: text
    content: 'Les gens ont entendu cela. Ils ont été très surpris de ce que Jésus venait de dire aux '
  - type: text
    content: Sadducéens
  - type: text
    content: .
  - type: heading
    content: Jésus parle aux Pharisiens du plus grand commandement de Dieu
  '34':
  - type: text
    content: 'Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont entendu que Jésus a convaincu les  '
  - type: text
    content: Sadducéens
  - type: text
    content: '. Ils se sont alors réunis en un seul endroit. '
  '35':
  - type: text
    content: 'L’un des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' était aussi un enseignant de la loi. Il a posé à Jésus une question. Il voulait que Jésus dise quelque chose de mal. '
  '36':
  - type: text
    content: 'Il a dit à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', quel est le plus important commandement de Dieu ?'
  '37':
  - type: text
    content: 'Jésus a répondu au '
  - type: text
    content: Pharisien
  - type: text
    content: '  : Tu dois complètement aimer le  '
  - type: text
    content: Seigneur
  - type: text
    content: ' ton Dieu. L’aimer de tout ton cœur. L’aimer de toute ton  '
  - type: text
    content: âme
  - type: text
    content: '. L’aimer de toutes tes pensées. '
  '38':
  - type: text
    content: 'Ceci est le plus grand commandement de Dieu. '
  '39':
  - type: text
    content: 'Le second plus grand commandement est : Tu aimeras les autres comme tu t’aimes toi‑même. '
  '4':
  - type: text
    content: 'Le roi a alors envoyé d’autres serviteurs. Il leur a dit : S’il vous plaît, dites ce message à tous les invités au mariage de venir. Dites‑leur que le roi a dit ceci : Mes serviteurs ont préparé le repas pour la fête. Ils ont tué ma grande vache et quelques jeunes vaches grasses. Tout est prêt. Venez au repas de mariage !'
  '40':
  - type: text
    content: 'Toutes les lois de Moïse nous enseignent cela. Et aussi toutes les choses que les  '
  - type: text
    content: prophètes
  - type: text
    content: ' enseignaient au sujet de Dieu, sont dans ces 2 commandements.'
  - type: heading
    content: Jésus parle de  Christ aux gens
  '41':
  - type: text
    content: 'Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' étaient avec Jésus. Il leur a posé cette question. '
  '42':
  - type: text
    content: 'Que pensez‑vous de  '
  - type: text
    content: Christ
  - type: text
    content: ', la personne spéciale que Dieu nous enverra ? Il est le fils de qui ? Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont répondu : Il est le  '
  - type: text
    content: fils de David
  - type: text
    content: .
  '43':
  - type: text
    content: 'Jésus leur a demandé : Pouvez‑vous m’expliquer cela ? Le  '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu a dit à David que la personne spéciale de Dieu a été appelée '
  - type: text
    content: Seigneur
  - type: text
    content: '. David a dit : '
  '44':
  - type: text
    content: 'Le  '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit à mon  '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Assieds‑toi à la place importante à mon côté droit.
  - type: text
    content: Reste là jusqu’à ce que je mette tes ennemis sous tes pieds.
  '45':
  - type: text
    content: 'Ainsi, Jésus a dit : Nous savons que David appelle cette personne spéciale, '
  - type: text
    content: Seigneur
  - type: text
    content: '. Alors, comment peut‑il être son fils ? '
  '46':
  - type: text
    content: Personne ne pouvait répondre à la question que Jésus a posée. Après cela, tout le monde avait peur de poser à Jésus d’autres questions.
  '5':
  - type: text
    content: 'Mais aucune des personnes n’était intéressée par le message du roi. Ils sont partis pour faire leur travail habituel. Un homme est allé à sa ferme et un autre homme est allé à son entreprise. '
  '6':
  - type: text
    content: 'D’autres personnes ont attrapé les serviteurs du roi. Ils les ont blessés, puis ils les ont tués. '
  '7':
  - type: text
    content: 'Le roi était très en colère, et il a dit à ses soldats : Allez dans la ville où ces gens vivent. Tuez les gens qui ont tué mes serviteurs. Et brûlez leur ville !'
  '8':
  - type: text
    content: 'Alors le roi a dit à ses autres serviteurs : Le repas que mes serviteurs ont préparé pour le mariage est prêt. Mais les gens que j’ai invités n’avaient aucune valeur. '
  '9':
  - type: text
    content: 'Sortez maintenant dans les grandes rues de la ville. Demandez à tous les gens que vous allez rencontrer là de venir au repas. Le roi l’a préparé pour son fils. '
