document_id: MAT.22,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 22
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire sur un repas à un mariage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a dit d’autres histoires. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors les serviteurs sont allés dans les rues. Et ils ont emmené à la maison du roi tous les gens qu’ils rencontraient. Certains étaient de bonnes personnes et d’autres étaient de mauvaises personnes. Beaucoup de gens sont venus pour remplir la salle.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi est entré dans la salle pour voir tous les gens. Il a vu un homme. Il ne portait pas les vêtements appropriés pour un mariage. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi a dit à l’homme : Alors, comment es‑tu venu ici, mon ami ? Et tu ne portes pas les vêtements convenables de mariage. L’homme n’a pas répondu.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi a dit à ses serviteurs : Liez‑le, afin qu’il ne puisse pas bouger ses mains ou ses pieds. Jetez‑le dans un endroit sombre à l’extérieur. Là, les gens vont pleurer. Ils vont également grincer leurs dents les unes contre les autres, parce qu’ils seront en colère.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu demande à beaucoup de gens de venir sous son règne. Mais il ne choisit que quelques personnes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' demandent à Jésus de payer les taxes'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' sont allés. Ils se sont réunis ensemble. Ils ont décidé de poser une question à Jésus. Ils voulaient le condamner par ses propres paroles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont envoyé leurs propres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' à Jésus. Et ils ont également envoyé des gens qui se trouvaient dans le groupe d’Hérode. Ils ont tous dit à Jésus : Maître, nous savons que tu es un honnête homme. Les choses que tu enseignes sur la voie de Dieu sont vraies. Personne ne peut t’influencer par son apparence. Cela n’est pas important pour toi.  '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis‑nous ce que tu penses à ce sujet : Faut‑il payer des taxes au chef '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: ', '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: '  ? Ou ne devrions‑nous pas les payer ?'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus savait pourquoi ils lui ont posé cette question. C’était un piège pour l’accuser. Alors Jésus leur a dit : Vous essayez de me faire dire quelque chose de mal. Vous êtes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hypocrites
    - type: text
      text: '  ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Montrez‑moi la pièce de monnaie que vous utilisez pour l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: impôt
    - type: text
      text: '. Ils lui ont apporté une pièce de monnaie. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit : Je vais vous dire encore une fois ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Un roi avait organisé la fête de mariage de son fils. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus leur a dit : L’image et le nom qui sont sur la pièce de monnaie sont de qui ?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont répondu : C’est l’image de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' et le nom de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: '. Alors Jésus leur a dit : Donnez à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' ce qui est à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: '. Et donnez à Dieu les choses qui sont pour Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand ils ont entendu la réponse de Jésus, ils étaient très surpris. Alors, ils l’ont quitté et ils sont partis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' posent une question à Jésus'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour‑là, quelques‑uns des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' sont venus aussi auprès de Jésus. Ces hommes ne croyaient pas qu’une personne puisse vivre à nouveau après sa mort. Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' ont posé à Jésus une question.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont dit à Jésus : Maître, Moïse a écrit ces choses pour nous dans la loi. Une femme épouse un homme. Mais l’homme meurt avant que la femme ait des enfants. Le frère de cet homme devra alors l’épouser. Ils pourront avoir des enfants pour l’homme qui est mort. S’ils ont des enfants, les enfants seront appelés les enfants du premier mari. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une fois, il y avait 7 frères qui vivaient ici. Le frère aîné a épousé une femme. Puis il est mort avant que la femme ait des enfants. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prochain frère l’a alors épousée. Et puis il est mort aussi. Donc, un troisième frère a épousé cette femme. Et la même chose à tous les frères jusqu’au septième frère. Ils sont tous morts avant que la femme ait des enfants. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, la femme est aussi morte. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certaines personnes disent qu’un jour les morts seront de nouveau vivants. Ce jour‑là, à qui sera la femme ? Elle avait épousé tous les 7 de ces frères.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: '  : Vous avez tort. Vous ne savez pas ce que Dieu a dit dans son livre. Vous ne savez pas comment Dieu est puissant. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il avait demandé à beaucoup de gens de venir. Donc, il a envoyé ses serviteurs appeler les invités au repas spécial de mariage. Mais beaucoup de gens ont refusé de venir.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, les gens qui sont morts seront à nouveau en vie. Mais les hommes et les femmes ne se marieront plus. Ils seront comme les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Ils ne se marieront pas. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est vrai qu’un jour les morts revivront. Vous avez lu ce que Dieu vous a dit, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob. Dieu n’est pas le Dieu des gens qui sont morts. Il est le Dieu des personnes qui sont maintenant en vie. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens ont entendu cela. Ils ont été très surpris de ce que Jésus venait de dire aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus parle aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' du plus grand commandement de Dieu'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont entendu que Jésus a convaincu les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: '. Ils se sont alors réunis en un seul endroit. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' était aussi un enseignant de la loi. Il a posé à Jésus une question. Il voulait que Jésus dise quelque chose de mal. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit à Jésus : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', quel est le plus important commandement de Dieu ?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: '  : Tu dois complètement aimer le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ton Dieu. L’aimer de tout ton cœur. L’aimer de toute ton  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âme
    - type: text
      text: '. L’aimer de toutes tes pensées. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceci est le plus grand commandement de Dieu. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le second plus grand commandement est : Tu aimeras les autres comme tu t’aimes toi‑même. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi a alors envoyé d’autres serviteurs. Il leur a dit : S’il vous plaît, dites ce message à tous les invités au mariage de venir. Dites‑leur que le roi a dit ceci : Mes serviteurs ont préparé le repas pour la fête. Ils ont tué ma grande vache et quelques jeunes vaches grasses. Tout est prêt. Venez au repas de mariage !'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes les lois de Moïse nous enseignent cela. Et aussi toutes les choses que les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' enseignaient au sujet de Dieu, sont dans ces 2 commandements.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus parle de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' aux gens'
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' étaient avec Jésus. Il leur a posé cette question. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que pensez‑vous de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', la personne spéciale que Dieu nous enverra ? Il est le fils de qui ? Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont répondu : Il est le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: .
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a demandé : Pouvez‑vous m’expliquer cela ? Le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' de Dieu a dit à David que la personne spéciale de Dieu a été appelée '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. David a dit : '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit à mon  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Assieds‑toi à la place importante à mon côté droit.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Reste là jusqu’à ce que je mette tes ennemis sous tes pieds.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, Jésus a dit : Nous savons que David appelle cette personne spéciale, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Alors, comment peut‑il être son fils ? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne ne pouvait répondre à la question que Jésus a posée. Après cela, tout le monde avait peur de poser à Jésus d’autres questions.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais aucune des personnes n’était intéressée par le message du roi. Ils sont partis pour faire leur travail habituel. Un homme est allé à sa ferme et un autre homme est allé à son entreprise. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres personnes ont attrapé les serviteurs du roi. Ils les ont blessés, puis ils les ont tués. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi était très en colère, et il a dit à ses soldats : Allez dans la ville où ces gens vivent. Tuez les gens qui ont tué mes serviteurs. Et brûlez leur ville !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi a dit à ses autres serviteurs : Le repas que mes serviteurs ont préparé pour le mariage est prêt. Mais les gens que j’ai invités n’avaient aucune valeur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sortez maintenant dans les grandes rues de la ville. Demandez à tous les gens que vous allez rencontrer là de venir au repas. Le roi l’a préparé pour son fils. '
