document_id: 1CO.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est moi Paul qui écris cette lettre. Dieu m’a choisi pour être '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Voilà ce qu’il voulait. Notre ami chrétien Sosthène est avec moi ici pendant que je vous écris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je vous envoie cette lettre, peuple de l’Église de Dieu à Corinthe. Dieu vous a rendus saints, parce que vous appartenez à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il vous a choisis pour être son peuple spécial. Ainsi, vous êtes dans le groupe de tous les gens partout dans le monde qui adorent notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Jésus est leur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', comme il est notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je prie pour que Dieu, notre Père, et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continuent de vous aider. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: s.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul remercie Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je remercie toujours Dieu à cause de vous. Je le remercie, car il a été très gentil avec vous. Il vous a aidés comme cela, parce que vous appartenez à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Par conséquent, Dieu vous a donné toutes les choses dont vous avez besoin. Vous êtes capables de dire tout ce qu’il veut que vous disiez. Vous êtes capables de comprendre tout ce qu’il veut que vous sachiez. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: De cette façon, Dieu vous a montré que le message que nous vous avons dit sur Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Par conséquent, Dieu vous a donné tous les dons spirituels dont vous avez besoin. Dieu vous a bénis avec ces dons pendant que vous attendez le retour de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu vous gardera aussi en sécurité et forts jusqu’à la fin. Puis, le jour du retour de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', Dieu ne vous condamnera pas. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dieu fait toujours ce qu’il a promis de faire. Il vous a choisis pour être amis avec son Fils, Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui est notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens ne doivent pas se quereller
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mes amis chrétiens, je vous dis ceci avec le pouvoir de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '  : S’il vous plaît, entendez‑vous les uns avec les autres. Ne devenez pas de groupes séparés. Soyez unis et pensez aux choses de la même manière.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Certaines personnes de la maison de Chloé m’ont donné de vos nouvelles. Mes amis, ces gens disent que vous vous disputez entre vous. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cela se passe ainsi : L’un d’entre vous dit : J’appartiens au groupe de Paul. Une autre personne dit : J’appartiens au groupe d’Apollos. Une autre personne dit : J’appartiens au groupe de Pierre. Et une autre personne dit : J’appartiens au groupe de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous ne devez pas parler comme cela ! Il semble que vous divisez Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' en plusieurs parties. Moi, Paul, je ne suis pas mort sur une croix pour vous sauver. Quand les gens vous ont baptisés, ce n’était pas en mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je remercie Dieu que je n’ai moi‑même baptisé aucun d’entre vous, sauf Crispus et Gaїus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi, aucun de vous ne peut dire : J’appartiens au groupe de Paul, parce qu’il m’a baptisé. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(Maintenant, je me souviens que j’ai aussi baptisé Stéphane et sa famille. Je ne me souviens pas d’avoir baptisé quelqu’un d’autre.) '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' ne m’a pas envoyé pour baptiser les gens. Mais il m’a envoyé dire la Bonne Nouvelle de Dieu aux gens. Lorsque je dis son message, je n’utilise pas de mots sages qui montrent à quel point je suis. C’est la mort de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur la croix qui a la puissance de sauver les gens. Je ne veux pas détruire cette puissance avec des mots sages.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur la croix'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Certaines personnes pensent que le message concernant la mort de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur la croix est une folie. Ce sont des gens qui se perdent. Mais c’est différent pour nous, le peuple que Dieu sauve. Le message sur la croix nous montre la puissance de Dieu pour nous sauver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il est dit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, Dieu, je détruirai toutes les pensées intelligentes des sages.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je montrerai que leurs idées intelligentes ne valent rien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ainsi, les sages de ce monde ne sont pas vraiment importants. Les enseignants intelligents de la loi de Dieu ne sont pas vraiment importants. Les gens qui savent bien discuter ne sont pas vraiment importants. Dieu a montré que les idées sages qui appartiennent à ce monde n’ont aucune valeur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dieu lui‑même est sage. Il a décidé que les gens ne puissent pas le connaître simplement parce qu’ils étaient sages à leur manière. Au lieu de cela, Dieu utilise le message sur Jésus pour sauver les gens. Ce message peut sembler idiot à certaines personnes. Mais quand nous le disons aux gens, Dieu les sauve s’ils croient à cela. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  - type: text
    text: ' veut d’abord voir Dieu faire une chose extraordinaire. Ensuite, ils croiront. Les païens veulent écouter un message qui a des idées sages. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais quant à nous, nous disons aux gens comment Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort sur une croix. C’est un message que le peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  - type: text
    text: ' refuse d’accepter comme vrai. Les païens pensent que c’est un message idiot. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais c’est différent pour nous. Dieu nous a appelés pour venir à lui. Certains d’entre nous sont '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et certains d’entre nous sont des païens. Pour nous, Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' montre la grande puissance de Dieu. Il montre combien Dieu est sage. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La mort de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur une croix peut sembler une folie pour Dieu. Mais cela montre vraiment que Dieu est très sage. Il est plus sage que les gens avec leurs idées intelligentes. La mort de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur une croix peut sembler montrer que Dieu est faible. Mais il est vraiment plus fort que n’importe quelle puissance humaine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Chers amis chrétiens, souvenez‑vous du temps où Dieu vous a appelés pour venir à lui. Pensez à ce que vous étiez. Peu d’entre vous étaient intelligents ou puissants dans la façon dont les gens pensent que c’est bien. Peu d’entre vous appartenaient à des familles importantes. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais, Dieu a choisi d’utiliser des choses que les gens pensent être insensées. Il fait ceci pour que les gens intelligents aient honte. Oui, Dieu a choisi d’utiliser des choses que les gens pensent faibles. Il fait ceci pour que les gens puissants aient honte. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dieu a choisi d’utiliser des choses que les gens pensent inutiles. Les gens qui appartiennent à ce monde n’aiment pas ces choses. Ils pensent qu’ils n’ont aucune valeur. Dieu a fait cela pour que les choses qui semblent importantes deviennent sans importance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'À cause de tout cela, personne ne peut être fier d’eux devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: C’est à cause de l’œuvre de Dieu que vous appartenez maintenant à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Par la mort de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur la croix, nous partageons le plan sage de Dieu. Parce que nous appartenons à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', Dieu nous rend justes avec lui‑même. Il fait de nous son propre peuple. Il nous libère de la puissance du péché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Souvenez‑vous de ce qui est écrit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si vous voulez vous glorifier de quelque chose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Glorifiez‑vous de ce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a fait.'
