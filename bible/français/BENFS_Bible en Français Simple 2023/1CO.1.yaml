document_id: 1CO.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: text
    content: 'C’est moi Paul qui écris cette lettre. Dieu m’a choisi pour être '
  - type: text
    content: apôtre
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Voilà ce qu’il voulait. Notre ami chrétien Sosthène est avec moi ici pendant que je vous écris.
  '10':
  - type: text
    content: 'Mes amis chrétiens, je vous dis ceci avec le pouvoir de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '  : S’il vous plaît, entendez‑vous les uns avec les autres. Ne devenez pas de groupes séparés. Soyez unis et pensez aux choses de la même manière.'
  '11':
  - type: text
    content: 'Certaines personnes de la maison de Chloé m’ont donné de vos nouvelles. Mes amis, ces gens disent que vous vous disputez entre vous. '
  '12':
  - type: text
    content: 'Cela se passe ainsi : L’un d’entre vous dit : J’appartiens au groupe de Paul. Une autre personne dit : J’appartiens au groupe d’Apollos. Une autre personne dit : J’appartiens au groupe de Pierre. Et une autre personne dit : J’appartiens au groupe de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '13':
  - type: text
    content: Vous ne devez pas parler comme cela ! Il semble que vous divisez Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' en plusieurs parties. Moi, Paul, je ne suis pas mort sur une croix pour vous sauver. Quand les gens vous ont baptisés, ce n’était pas en mon nom. '
  '14':
  - type: text
    content: Je remercie Dieu que je n’ai moi‑même baptisé aucun d’entre vous, sauf Crispus et Gaїus.
  '15':
  - type: text
    content: 'Ainsi, aucun de vous ne peut dire : J’appartiens au groupe de Paul, parce qu’il m’a baptisé. '
  '16':
  - type: text
    content: '(Maintenant, je me souviens que j’ai aussi baptisé Stéphane et sa famille. Je ne me souviens pas d’avoir baptisé quelqu’un d’autre.) '
  '17':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' ne m’a pas envoyé pour baptiser les gens. Mais il m’a envoyé dire la Bonne Nouvelle de Dieu aux gens. Lorsque je dis son message, je n’utilise pas de mots sages qui montrent à quel point je suis. C’est la mort de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' sur la croix qui a la puissance de sauver les gens. Je ne veux pas détruire cette puissance avec des mots sages.'
  - type: heading
    content: La mort de Jésus‑Christ sur la croix
  '18':
  - type: text
    content: Certaines personnes pensent que le message concernant la mort de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' sur la croix est une folie. Ce sont des gens qui se perdent. Mais c’est différent pour nous, le peuple que Dieu sauve. Le message sur la croix nous montre la puissance de Dieu pour nous sauver.'
  '19':
  - type: text
    content: 'Il est dit dans la Bible :'
  - type: text
    content: Moi, Dieu, je détruirai toutes les pensées intelligentes des sages.
  - type: text
    content: Je montrerai que leurs idées intelligentes ne valent rien.
  '2':
  - type: text
    content: Je vous envoie cette lettre, peuple de l’Église de Dieu à Corinthe. Dieu vous a rendus saints, parce que vous appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Il vous a choisis pour être son peuple spécial. Ainsi, vous êtes dans le groupe de tous les gens partout dans le monde qui adorent notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Jésus est leur '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme il est notre '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: text
    content: Ainsi, les sages de ce monde ne sont pas vraiment importants. Les enseignants intelligents de la loi de Dieu ne sont pas vraiment importants. Les gens qui savent bien discuter ne sont pas vraiment importants. Dieu a montré que les idées sages qui appartiennent à ce monde n’ont aucune valeur.
  '21':
  - type: text
    content: 'Dieu lui‑même est sage. Il a décidé que les gens ne puissent pas le connaître simplement parce qu’ils étaient sages à leur manière. Au lieu de cela, Dieu utilise le message sur Jésus pour sauver les gens. Ce message peut sembler idiot à certaines personnes. Mais quand nous le disons aux gens, Dieu les sauve s’ils croient à cela. '
  '22':
  - type: text
    content: 'Le peuple '
  - type: text
    content: juif
  - type: text
    content: ' veut d’abord voir Dieu faire une chose extraordinaire. Ensuite, ils croiront. Les païens veulent écouter un message qui a des idées sages. '
  '23':
  - type: text
    content: Mais quant à nous, nous disons aux gens comment Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort sur une croix. C’est un message que le peuple '
  - type: text
    content: juif
  - type: text
    content: ' refuse d’accepter comme vrai. Les païens pensent que c’est un message idiot. '
  '24':
  - type: text
    content: 'Mais c’est différent pour nous. Dieu nous a appelés pour venir à lui. Certains d’entre nous sont '
  - type: text
    content: Juifs
  - type: text
    content: ' et certains d’entre nous sont des païens. Pour nous, Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' montre la grande puissance de Dieu. Il montre combien Dieu est sage. '
  '25':
  - type: text
    content: La mort de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' sur une croix peut sembler une folie pour Dieu. Mais cela montre vraiment que Dieu est très sage. Il est plus sage que les gens avec leurs idées intelligentes. La mort de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' sur une croix peut sembler montrer que Dieu est faible. Mais il est vraiment plus fort que n’importe quelle puissance humaine.'
  '26':
  - type: text
    content: 'Chers amis chrétiens, souvenez‑vous du temps où Dieu vous a appelés pour venir à lui. Pensez à ce que vous étiez. Peu d’entre vous étaient intelligents ou puissants dans la façon dont les gens pensent que c’est bien. Peu d’entre vous appartenaient à des familles importantes. '
  '27':
  - type: text
    content: 'Mais, Dieu a choisi d’utiliser des choses que les gens pensent être insensées. Il fait ceci pour que les gens intelligents aient honte. Oui, Dieu a choisi d’utiliser des choses que les gens pensent faibles. Il fait ceci pour que les gens puissants aient honte. '
  '28':
  - type: text
    content: Dieu a choisi d’utiliser des choses que les gens pensent inutiles. Les gens qui appartiennent à ce monde n’aiment pas ces choses. Ils pensent qu’ils n’ont aucune valeur. Dieu a fait cela pour que les choses qui semblent importantes deviennent sans importance.
  '29':
  - type: text
    content: 'À cause de tout cela, personne ne peut être fier d’eux devant Dieu. '
  '3':
  - type: text
    content: 'Je prie pour que Dieu, notre Père, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continuent de vous aider. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: text
    content: esprit
  - type: text
    content: s.
  - type: heading
    content: Paul remercie Dieu
  '30':
  - type: text
    content: C’est à cause de l’œuvre de Dieu que vous appartenez maintenant à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Par la mort de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' sur la croix, nous partageons le plan sage de Dieu. Parce que nous appartenons à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', Dieu nous rend justes avec lui‑même. Il fait de nous son propre peuple. Il nous libère de la puissance du péché.'
  '31':
  - type: text
    content: 'Souvenez‑vous de ce qui est écrit dans la Bible :'
  - type: text
    content: Si vous voulez vous glorifier de quelque chose,
  - type: text
    content: 'Glorifiez‑vous de ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait.'
  '4':
  - type: text
    content: Je remercie toujours Dieu à cause de vous. Je le remercie, car il a été très gentil avec vous. Il vous a aidés comme cela, parce que vous appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '5':
  - type: text
    content: 'Par conséquent, Dieu vous a donné toutes les choses dont vous avez besoin. Vous êtes capables de dire tout ce qu’il veut que vous disiez. Vous êtes capables de comprendre tout ce qu’il veut que vous sachiez. '
  '6':
  - type: text
    content: De cette façon, Dieu vous a montré que le message que nous vous avons dit sur Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est vrai. '
  '7':
  - type: text
    content: 'Par conséquent, Dieu vous a donné tous les dons spirituels dont vous avez besoin. Dieu vous a bénis avec ces dons pendant que vous attendez le retour de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Dieu vous gardera aussi en sécurité et forts jusqu’à la fin. Puis, le jour du retour de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', Dieu ne vous condamnera pas. '
  '9':
  - type: text
    content: Dieu fait toujours ce qu’il a promis de faire. Il vous a choisis pour être amis avec son Fils, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', qui est notre '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les chrétiens ne doivent pas se quereller
