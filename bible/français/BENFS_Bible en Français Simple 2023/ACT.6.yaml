document_id: ACT.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: Les croyants choisissent 7 autres hommes pour effectuer le travail spécial
  - type: text
    content: 'A ce moment‑là, de plus en plus de gens devenaient des croyants en Jésus chaque jour. Quelques '
  - type: text
    content: Juifs
  - type: text
    content: ' à Jérusalem parlaient la langue grecque. D’autres '
  - type: text
    content: Juifs
  - type: text
    content: ' à Jérusalem parlaient la langue '
  - type: text
    content: araméen
  - type: text
    content: 'ne. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui parlaient le grec avaient un problème avec les autres '
  - type: text
    content: Juifs
  - type: text
    content: '. Ceux qui parlaient le grec disaient aux autres '
  - type: text
    content: Juifs
  - type: text
    content: '  : Nous avons un problème avec vous. Les maris de certaines de vos propres femmes sont morts. Elles reçoivent l’argent des '
  - type: text
    content: apôtres
  - type: text
    content: ' chaque jour pour acheter la nourriture. Les maris de certaines femmes de notre groupe sont également morts. Mais les '
  - type: text
    content: apôtres
  - type: text
    content: ' ne donnent pas l’argent à ces femmes chaque jour.'
  '10':
  - type: text
    content: 'Le Saint‑Esprit a donné à Étienne une grande sagesse. C’est par cette sagesse qu’il parlait d’une manière très puissante. Étienne parlait aux hommes de cette '
  - type: text
    content: synagogue
  - type: text
    content: '. Et ils ne pouvaient pas dire qu’il avait tort. '
  '11':
  - type: text
    content: 'Ainsi les hommes de la '
  - type: text
    content: synagogue
  - type: text
    content: ' ont donné de l’argent à quelques mauvais hommes. Ils les ont payés pour dire de mauvaises choses au sujet d’Étienne.'
  - type: text
    content: 'Mais ces choses n’étaient pas vraies. Ainsi les hommes qui ont reçu l’argent disaient au peuple : Nous entendions cet homme, Étienne, dire de mauvaises choses contre Moïse et Dieu.'
  '12':
  - type: text
    content: 'Les gens ont entendu ce que ces hommes disaient. Et alors ils sont devenus fâchés. Les '
  - type: text
    content: anciens
  - type: text
    content: ' et les enseignants de la loi entendaient aussi ce que ces mauvais hommes disaient. Ils sont tous devenus très fâchés. Ainsi ils sont allés auprès d’Étienne. Ils l’ont attrapé. Alors ils l’ont mis debout devant les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ils ont alors fait venir là quelques hommes. C’était pour dire de mauvaises choses contre Étienne. Les choses qu’ils disaient, n’étaient pas vraies. Les hommes disaient : Cet homme, Étienne, dit toujours de mauvaises choses contre le '
  - type: text
    content: Temple
  - type: text
    content: '. Il dit également de mauvaises choses contre la loi que Dieu avait donnée à Moïse. '
  '14':
  - type: text
    content: 'Nous avons entendu Étienne parler de Jésus, qui vient de Nazareth. Il a dit que Jésus détruira le '
  - type: text
    content: Temple
  - type: text
    content: '. Il a dit : Jésus changera tout ce que Moïse a enseigné au peuple. Mais Moïse nous a expliqué la bonne manière de vivre. '
  '15':
  - type: text
    content: 'Tous les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' regardaient Étienne. Ils voyaient que son visage était très beau. Et ils pensaient qu’il était comme un '
  - type: text
    content: ange
  - type: text
    content: .
  '2':
  - type: text
    content: 'Les 12 '
  - type: text
    content: apôtres
  - type: text
    content: ' ont entendu parler du problème. Ainsi ils ont demandé à tous ceux qui ont cru en Jésus de se réunir avec eux. Les '
  - type: text
    content: apôtres
  - type: text
    content: ' ont dit : Notre travail est d’enseigner aux gens le message de Dieu. Il n’est pas juste pour nous d’arrêter d’effectuer ce travail. Mais nous donnons de l’argent à ces gens qui ont besoin des choses. Ce n’est pas bon. '
  '3':
  - type: text
    content: 'Ainsi les '
  - type: text
    content: apôtres
  - type: text
    content: ' ont dit aux croyants : Nos amis, choisissez 7 hommes parmi vous. Vous devez savoir que le Saint‑Esprit est à l’intérieur de chacun d’eux. Et ils doivent savoir les choses au sujet de Dieu très bien. Nous demanderons à ces 7 hommes d’effectuer ce travail pour nous. '
  '4':
  - type: text
    content: 'Alors nous aurons plus de temps pour prier. Nous aurons également plus de temps pour enseigner au peuple la Bonne Nouvelle au sujet de Jésus. '
  '5':
  - type: text
    content: 'Le groupe entier était content de ces paroles des '
  - type: text
    content: apôtres
  - type: text
    content: '. D’abord, ils ont choisi un homme appelé Étienne. Étienne croyait très bien en Dieu. Le Saint‑Esprit était à l’intérieur de lui. Les croyants ont également choisi 6 autres hommes. Les noms de ces autres hommes étaient Philippe, Prochore, Nicanor, Timon, Parmenas et Nicolas. Nicolas était d’Antioche. Il n’était pas né '
  - type: text
    content: Juif
  - type: text
    content: ', mais il avait cru au Dieu des '
  - type: text
    content: Juifs
  - type: text
    content: .
  '6':
  - type: text
    content: 'Le groupe a demandé à ces 7 hommes de se lever devant les '
  - type: text
    content: apôtres
  - type: text
    content: '. Alors les '
  - type: text
    content: apôtres
  - type: text
    content: ' ont posé leurs mains sur chaque homme. Ils ont demandé à Dieu d’aider les 7 hommes dans leur travail spécial. '
  '7':
  - type: text
    content: 'De plus en plus de gens entendaient la Parole de Dieu. Le nombre des croyants en Jésus à Jérusalem continuait d’augmenter de plus en plus. Et plusieurs '
  - type: text
    content: prêtres
  - type: text
    content: ' croyaient également en Jésus.'
  - type: heading
    content: Les responsables juifs attrapent Étienne
  '8':
  - type: text
    content: 'Dieu aidait Étienne de manières spéciales. Il l’aidait aussi à faire des choses puissantes. Les gens voyaient Étienne faire beaucoup de choses spéciales. '
  '9':
  - type: text
    content: 'Mais quelques hommes n’aimaient pas Étienne. Ils n’aimaient pas ce qu’Étienne enseignait au sujet de Jésus. Ces hommes étaient d’une des '
  - type: text
    content: synagogues
  - type: text
    content: ' à Jérusalem. Elle s’appelait la '
  - type: text
    content: synagogue
  - type: text
    content: ' des hommes libres.'
  - type: text
    content: 'Les hommes de cette '
  - type: text
    content: synagogue
  - type: text
    content: ' étaient les '
  - type: text
    content: Juifs
  - type: text
    content: ' des villes appelées Cyrène et Alexandrie. Et certains d’entre eux étaient des villes de Cilicie et d’Asie. Ces hommes ont commencé à discuter avec Étienne.'
