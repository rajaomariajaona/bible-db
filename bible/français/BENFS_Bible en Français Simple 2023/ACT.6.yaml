document_id: ACT.6,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 6
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les croyants choisissent 7 autres hommes pour effectuer le travail spécial
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment‑là, de plus en plus de gens devenaient des croyants en Jésus chaque jour. Quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' à Jérusalem parlaient la langue grecque. D’autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' à Jérusalem parlaient la langue '
    - type: usfm
      marker: w
      children:
      - type: text
        text: araméen
    - type: text
      text: 'ne. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui parlaient le grec avaient un problème avec les autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Ceux qui parlaient le grec disaient aux autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  : Nous avons un problème avec vous. Les maris de certaines de vos propres femmes sont morts. Elles reçoivent l’argent des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' chaque jour pour acheter la nourriture. Les maris de certaines femmes de notre groupe sont également morts. Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ne donnent pas l’argent à ces femmes chaque jour.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Saint‑Esprit a donné à Étienne une grande sagesse. C’est par cette sagesse qu’il parlait d’une manière très puissante. Étienne parlait aux hommes de cette '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: '. Et ils ne pouvaient pas dire qu’il avait tort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi les hommes de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' ont donné de l’argent à quelques mauvais hommes. Ils les ont payés pour dire de mauvaises choses au sujet d’Étienne.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ces choses n’étaient pas vraies. Ainsi les hommes qui ont reçu l’argent disaient au peuple : Nous entendions cet homme, Étienne, dire de mauvaises choses contre Moïse et Dieu.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens ont entendu ce que ces hommes disaient. Et alors ils sont devenus fâchés. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' et les enseignants de la loi entendaient aussi ce que ces mauvais hommes disaient. Ils sont tous devenus très fâchés. Ainsi ils sont allés auprès d’Étienne. Ils l’ont attrapé. Alors ils l’ont mis debout devant les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont alors fait venir là quelques hommes. C’était pour dire de mauvaises choses contre Étienne. Les choses qu’ils disaient, n’étaient pas vraies. Les hommes disaient : Cet homme, Étienne, dit toujours de mauvaises choses contre le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Il dit également de mauvaises choses contre la loi que Dieu avait donnée à Moïse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons entendu Étienne parler de Jésus, qui vient de Nazareth. Il a dit que Jésus détruira le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Il a dit : Jésus changera tout ce que Moïse a enseigné au peuple. Mais Moïse nous a expliqué la bonne manière de vivre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: ' regardaient Étienne. Ils voyaient que son visage était très beau. Et ils pensaient qu’il était comme un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ont entendu parler du problème. Ainsi ils ont demandé à tous ceux qui ont cru en Jésus de se réunir avec eux. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ont dit : Notre travail est d’enseigner aux gens le message de Dieu. Il n’est pas juste pour nous d’arrêter d’effectuer ce travail. Mais nous donnons de l’argent à ces gens qui ont besoin des choses. Ce n’est pas bon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ont dit aux croyants : Nos amis, choisissez 7 hommes parmi vous. Vous devez savoir que le Saint‑Esprit est à l’intérieur de chacun d’eux. Et ils doivent savoir les choses au sujet de Dieu très bien. Nous demanderons à ces 7 hommes d’effectuer ce travail pour nous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors nous aurons plus de temps pour prier. Nous aurons également plus de temps pour enseigner au peuple la Bonne Nouvelle au sujet de Jésus. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le groupe entier était content de ces paroles des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. D’abord, ils ont choisi un homme appelé Étienne. Étienne croyait très bien en Dieu. Le Saint‑Esprit était à l’intérieur de lui. Les croyants ont également choisi 6 autres hommes. Les noms de ces autres hommes étaient Philippe, Prochore, Nicanor, Timon, Parmenas et Nicolas. Nicolas était d’Antioche. Il n’était pas né '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: ', mais il avait cru au Dieu des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le groupe a demandé à ces 7 hommes de se lever devant les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ont posé leurs mains sur chaque homme. Ils ont demandé à Dieu d’aider les 7 hommes dans leur travail spécial. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus en plus de gens entendaient la Parole de Dieu. Le nombre des croyants en Jésus à Jérusalem continuait d’augmenter de plus en plus. Et plusieurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' croyaient également en Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les responsables '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' attrapent Étienne'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu aidait Étienne de manières spéciales. Il l’aidait aussi à faire des choses puissantes. Les gens voyaient Étienne faire beaucoup de choses spéciales. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais quelques hommes n’aimaient pas Étienne. Ils n’aimaient pas ce qu’Étienne enseignait au sujet de Jésus. Ces hommes étaient d’une des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ' à Jérusalem. Elle s’appelait la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' des hommes libres.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes de cette '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' étaient les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' des villes appelées Cyrène et Alexandrie. Et certains d’entre eux étaient des villes de Cilicie et d’Asie. Ces hommes ont commencé à discuter avec Étienne.'
