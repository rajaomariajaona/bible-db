document_id: LUK.17,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 17
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Certaines personnes vont essayer de provoquer d’autres personnes à faire de mauvaises choses. Vous pouvez être sûrs de cela. Mais Dieu punira toute personne qui tente de le faire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en est de même avec vous. Le Maître vous dit ce que vous devez faire. Et vous le faites. Nous ne sommes pas des serviteurs spéciaux, chacun de vous dira à lui‑même : Nous avons fait ce que nous devrions faire.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les 10 hommes qui avaient la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lèpre
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lors de son voyage à Jérusalem, Jésus voyageait le long de la frontière entre la Samarie et la Galilée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il allait dans un village, 10 hommes sont venus auprès de Jésus. Ces hommes avaient une maladie de la peau. Ils se sont arrêtés un peu loin de Jésus. Et ils criaient : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus, Maître, s’il te plaît, sois gentil envers nous.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus les a vus debout. Il a répondu : Allez vous montrer aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: '. Pendant qu’ils y allaient, ils sont devenus de nouveau bien. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, un de ces 10 hommes qui a vu que Jésus l’avait guéri, est retourné. Et il a commencé à crier : Dieu est très bon. Il m’a guéri.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est descendu sur ses genoux devant Jésus. Il a dit : Merci, Maître. Cet homme était de Samarie. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : J’ai guéri 10 hommes. Il devrait y avoir 9 autres hommes ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Seulement cet homme est revenu pour remercier Dieu, et il est de Samarie. Il devrait y avoir d’autres hommes qui sont venus d’Israël.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il a parlé à l’homme : Lève‑toi de nouveau et va. Tu as cru en moi, alors tu es maintenant vraiment bien.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle du temps où Dieu régnera
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, il faut cesser de le faire. Sinon, il demandera à quelqu’un d’accrocher une grosse pierre autour de son cou. Ensuite, les gens vont la jeter dans la mer avec la pierre. Donc, ce n’est pas bien que cette personne amène un de ces petits au mal.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' ont posé à Jésus une question. Quand Dieu commencera à régner ici ? Jésus a répondu : Vous ne verrez rien de spécial quand Dieu commencera à régner ici. Les gens ne le verront pas arriver. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne ne va dire : Regardez tout le monde ! Dieu est au pouvoir ici ou Regardez ! Dieu règne là‑bas. Non, il n’est pas comme ça. Dieu règne déjà dans la vie de son peuple.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Les jours viendront où vous aurez vraiment envie de me voir revenir. Mais vous ne me verrez pas. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À ce moment‑là, les gens vous diront : Il est ici ! Il est là ! Mais n’allez pas regarder avec eux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après tout, lorsque l’éclair brille, il éclaire le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' d’une extrémité à l’autre. Ce sera comme ça quand je reviendrai. Tout le monde va me voir.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant que cela arrive, les gens vivants aujourd’hui diront : Nous ne voulons pas que Jésus soit notre roi. Tuez‑le ! Et je sentirai beaucoup de douleur.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rappelez‑vous ce qui s’était passé au temps où Noé était vivant. Rappelez‑vous ce qui est arrivé. Mon retour se fera aussi rapidement. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors que Noé faisait son bateau, les gens mangeaient de la nourriture. Et ils buvaient. Les hommes et les femmes se mariaient.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils continuaient à faire tout cela jusqu’au jour où Noé est entré dans son bateau. Puis il a plu pendant une longue période et l’eau profonde avait tué tous les gens.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les mêmes choses s’étaient produites lorsque Lot était vivant. Les gens dans la ville appelée Sodome mangeaient. Et ils buvaient. Ils achetaient et vendaient des choses. Ils plantaient des semences et ils étaient en train de construire des maisons. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais alors, Lot a quitté Sodome. Le même jour, Dieu a fait pleuvoir le feu et les pierres brûlantes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Cela a tué tous les gens de Sodome. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soyez prudents lorsque vous pensez : Si ton frère fait quelque chose de mal, parle avec lui de cela. Ton frère peut dire : Je suis triste pour ce que je faisais. Je ne vais pas le faire à nouveau. S’il dit cela, tu peux lui pardonner. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les mêmes choses vont se passer le jour où je me montrerai.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour‑là, voici ce que les gens feront. S’ils sont en dehors de leurs maisons, ils ne devront pas aller à l’intérieur pour prendre leurs choses. De la même façon, les gens qui travaillent dans les champs ne devront pas retourner dans leurs maisons. Ils ne devront pas revenir en arrière pour les choses qui étaient dans la maison. Non, ils devront simplement fuir Jérusalem. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Souvenez‑vous de ce qui est arrivé à la femme de Lot.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui veut sauver sa vie la perdra. Mais s’il perd sa vie pour moi, il la sauvera. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous le dis. A cette époque, 2 hommes seront endormis au lit la nuit. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' prendront l’un d’eux et ils laisseront l’autre derrière. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '2 femmes vont travailler ensemble dans le même lieu. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' prendront l’une d’elles et ils laisseront l’autre derrière.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui suivaient Jésus lui ont demandé : Cela se produira où ? Il leur a dit : Si un corps mort est couché quelque part, les vautours se rassembleront là.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ton frère peut faire une mauvaise chose contre toi plusieurs fois dans un jour. Il peut se tourner vers toi plusieurs fois et dire : Je suis triste pour ce que je faisais. Je ne vais pas le faire à nouveau. S’il le fait, tu peux lui pardonner.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les 12 hommes que Jésus avait choisis lui ont dit : Aide‑nous à croire de plus en plus en toi.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a répondu : Votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en moi n’est même pas aussi grande que celle d’une petite graine. Si elle était aussi grande que cela, vous pourriez dire à cet arbre : Déracine‑toi du sol et plante‑toi dans la mer. Et l’arbre vous obéirait.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pensez à ce sujet : Vous avez un serviteur qui laboure. Ou vous avez un serviteur qui prend soin de vos animaux. Quand il rentre de son travail, vous ne lui direz pas : Asseyez‑vous et mangez. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, vous ne direz pas cela. Vous lui direz : Prépare le repas du soir pour moi.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prépare‑toi et apporte de la nourriture pour moi. Je vais manger et boire d’abord. Tu peux manger quand j’aurai fini. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les travailleurs devraient faire ce que leurs maîtres leur ordonnent de faire. Leurs maîtres ne les remercient pas quand ils font cela. '
