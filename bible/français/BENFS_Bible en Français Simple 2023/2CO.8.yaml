document_id: 2CO.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: heading
    content: Aide aux pauvres de Jérusalem
  - type: text
    content: 'Mes amis chrétiens, permettez‑moi de vous parler des croyants dans les Églises de Macédoine. Dieu a été très gentil avec eux. '
  '10':
  - type: text
    content: 'Selon moi, voici ce que vous devriez faire. L’année dernière, vous avez été les premiers à donner de l’argent. Vous vouliez vraiment faire cela. Donc, la meilleure chose pour vous est de terminer ce que vous avez commencé à faire. '
  '11':
  - type: text
    content: 'Maintenant, terminez le travail. Lorsque vous avez commencé, vous vouliez beaucoup le faire. Maintenant, vous devez vouloir aussi le terminer. Vous devez donner ce que vous êtes en mesure de donner. '
  '12':
  - type: text
    content: Si vous voulez vraiment donner, alors Dieu acceptera vos dons. Dieu ne veut pas que vous donniez plus que ce que vous pouvez donner. Il sera heureux de ce que vous pouvez donner.
  '13':
  - type: text
    content: 'Mon but n’est pas de vous causer des problèmes. Vous ne devez pas vous sentir mal pendant que les autres ont beaucoup de choses. Mais, vous et eux devez en avoir assez. '
  '14':
  - type: text
    content: 'En ce moment, vous en avez vous‑mêmes beaucoup. Vous pouvez donc donner à ceux qui n’en ont pas assez. Un jour, les choses pourraient changer. Ils pourront en avoir beaucoup et vous n’en aurez peut‑être pas assez. Ensuite, ils pourront donner de l’argent pour vous aider. De cette façon, vous en aurez tous assez quand vous en aurez besoin. '
  '15':
  - type: text
    content: 'Cela est dit dans la Bible :'
  - type: text
    content: La personne qui a ramassé beaucoup n’en avait pas trop.
  - type: text
    content: Et la personne qui a ramassé une petite quantité en avait aussi assez.
  - type: heading
    content: Paul envoie Tite à Corinthe
  '16':
  - type: text
    content: 'Tite veut vous aider comme nous. Nous remercions Dieu d’avoir préparé Tite à le faire. '
  '17':
  - type: text
    content: 'Il était très heureux lorsque nous lui avons demandé d’aller chez vous. Lui‑même voulait déjà vous aider. Il a donc vraiment décidé de vous rendre visite de lui‑même. '
  '18':
  - type: text
    content: Nous envoyons un autre homme avec Tite. C’est aussi un croyant. Les chrétiens de toutes les autres Églises louent cet homme. Ils disent qu’il travaille dur pour dire aux gens la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Ces chrétiens des autres Églises ont également choisi cet homme pour voyager avec nous. Ils veulent qu’il nous aide lorsque nous prenons ce don. Notre travail montrera que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand. Cela montrera également que nous sommes prêts à aider.'
  '2':
  - type: text
    content: 'Ils ont eu de grands problèmes, mais ils sont restés très heureux. En conséquence, ils ont donné beaucoup d’argent à d’autres personnes. Ils sont eux‑mêmes très pauvres, mais ils ont quand même beaucoup aidé d’autres personnes. '
  '20':
  - type: text
    content: 'Nous voulons faire très attention à ce grand don d’argent. C’est pourquoi l’autre croyant viendra avec nous. Nous ne voulons pas que quiconque dise que nous avons fait quelque chose de mal. '
  '21':
  - type: text
    content: 'Notre but est de faire seulement ce qui est bien. Nous voulons que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' voie cela, et les gens doivent aussi le voir.'
  '22':
  - type: text
    content: Nous allons aussi envoyer un autre croyant avec les autres hommes. Cet homme nous a toujours montré que nous pouvons lui faire confiance. Il a voulu aider de différentes manières. Maintenant qu’il est très sûr de vous, il veut vous aider encore plus.
  '23':
  - type: text
    content: Quant à Tite lui‑même, il travaille avec moi pour vous aider. Les autres croyants viennent au nom des Églises qui les ont envoyés. Ils veulent montrer que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est grand. '
  '24':
  - type: text
    content: Montrez donc à ces hommes que vous les aimez. Ensuite, toutes les Églises seront sûres de vous. Elles sauront que nous avons eu raison de nous glorifier de vous.
  '3':
  - type: text
    content: 'Laissez‑moi vous dire ceci. Ils ont donné autant d’argent qu’ils ont pu donner. Ensuite, ils ont donné encore plus que cela ! Ils ont donné cela, parce qu’ils le voulaient. '
  '4':
  - type: text
    content: 'Ils voulaient avoir l’occasion d’aider le peuple de Dieu. Cela pourra les rendre heureux. Ils nous ont donc demandé à plusieurs reprises de les aider à le faire. '
  '5':
  - type: text
    content: 'Ils ont fait plus que ce que nous espérions ! Premièrement, ils se sont donnés au '
  - type: text
    content: Seigneur
  - type: text
    content: . Puis ils se sont aussi donnés à nous. Ils l’ont fait parce que Dieu voulait qu’ils le fassent.
  '6':
  - type: text
    content: 'Pour cette raison, nous avons demandé à Tite de continuer de vous aider. C’est la personne qui vous a aidés à commencer à donner de l’argent. Ainsi, il vous aidera à terminer ce bon travail. '
  '7':
  - type: text
    content: Vous avez tellement beaucoup en toutes choses ! Vous faites très bien confiance en Dieu. Vous parlez bien. Vous savez tout. Vous voulez faire beaucoup de bonnes choses. Vous nous aimez encore plus que nous vous aimons ! Alors, faites de votre mieux en donnant de l’argent pour aider les autres.
  '8':
  - type: text
    content: 'Je ne vous dis pas que vous devez faire cela. Je vous ai dit combien d’autres croyants veulent donner leur argent. De cette façon, je veux voir si vous aimez vraiment les autres personnes qui ont besoin de votre aide. '
  '9':
  - type: text
    content: 'Vous savez que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est très bon. Il était riche, mais il s’est rendu pauvre pour vous aider. Alors, parce qu’il est devenu pauvre, vous pourrez devenir riches.'
