document_id: HEB.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tout grand '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' de Dieu vient du peuple. Le travail de ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' spécial est de servir Dieu au nom de son peuple. Il offre des cadeaux et des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' à Dieu, afin que Dieu pardonne les péchés du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' lui‑même peut souvent faire de mauvaises choses, parce qu’il est faible et humain. En conséquence, il comprend les autres personnes qui commettent des erreurs. Il peut être gentil avec les gens qui font de mauvaises choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais, parce qu’il fait lui‑même de mauvaises choses, il doit offrir des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' à Dieu pour lui‑même, ainsi que pour le peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Personne ne décide lui‑même de devenir grand '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: '. Dieu lui‑même doit le choisir. C’est ainsi qu’Aaron est devenu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est la même chose avec Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il ne s’est pas choisi pour être le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' spécial de Dieu. Il n’a pas choisi de se rendre important comme ça. Dieu l’a choisi. Dieu a montré que Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' était très important. Dieu lui a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es mon Fils.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aujourd’hui, je suis devenu ton Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et dans un autre endroit de la Bible, Dieu a dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu seras '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' pour toujours,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'De la même manière que Melchisédek était '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ', il y a longtemps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lorsque Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a vécu sur terre en tant qu’homme, il priait souvent Dieu. Il a demandé à Dieu de l’aider. Il a prié avec force et il a pleuré avec larmes. Il savait que Dieu pouvait le sauver de la mort. Et Dieu a écouté Jésus quand il a prié, parce que Jésus a servi Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus est le Fils de Dieu. Mais il avait toujours des souffrances. De cette façon, il a appris à obéir complètement à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En conséquence, Jésus est devenu la personne qui peut sauver tous ceux qui lui obéissent. À cause de Jésus, Dieu pardonne leurs péchés pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu a choisi Jésus pour être son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' spécial de la même manière que Melchisédek.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous devons faire attention à ne pas nous éloigner de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous avons beaucoup plus à vous dire à propos de ces choses. Mais vous tardez à les comprendre. En conséquence, il est difficile de vous expliquer plus maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après tout ce temps, vous devez être des enseignants comme vous croyez en Jésus. Mais, vous avez toujours besoin de quelqu’un pour vous enseigner les premières leçons sur le message de Dieu. Vous êtes devenus comme des bébés, qui ont besoin de lait au lieu d’une nourriture solide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toute personne qui pense toujours comme un bébé ne comprend pas encore le message de Dieu sur ce qui est juste. C’est comme s’ils ne buvaient encore que du lait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les personnes qui ont grandi mangent correctement. De la même manière, les gens qui sont croyants depuis longtemps comprendront mieux le message de Dieu. Ils apprendront sur le bien et le mal. Ils sauront la différence entre le bien et le mal.
