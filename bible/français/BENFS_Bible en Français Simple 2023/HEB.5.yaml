document_id: HEB.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: text
    content: 'Tout grand '
  - type: text
    content: prêtre
  - type: text
    content: ' de Dieu vient du peuple. Le travail de ce '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial est de servir Dieu au nom de son peuple. Il offre des cadeaux et des '
  - type: text
    content: sacrifices
  - type: text
    content: ' à Dieu, afin que Dieu pardonne les péchés du peuple. '
  '10':
  - type: text
    content: 'Dieu a choisi Jésus pour être son '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial de la même manière que Melchisédek.'
  - type: heading
    content: Nous devons faire attention à ne pas nous éloigner de Jésus‑Christ
  '11':
  - type: text
    content: 'Nous avons beaucoup plus à vous dire à propos de ces choses. Mais vous tardez à les comprendre. En conséquence, il est difficile de vous expliquer plus maintenant. '
  '12':
  - type: text
    content: 'Après tout ce temps, vous devez être des enseignants comme vous croyez en Jésus. Mais, vous avez toujours besoin de quelqu’un pour vous enseigner les premières leçons sur le message de Dieu. Vous êtes devenus comme des bébés, qui ont besoin de lait au lieu d’une nourriture solide. '
  '13':
  - type: text
    content: 'Toute personne qui pense toujours comme un bébé ne comprend pas encore le message de Dieu sur ce qui est juste. C’est comme s’ils ne buvaient encore que du lait. '
  '14':
  - type: text
    content: Les personnes qui ont grandi mangent correctement. De la même manière, les gens qui sont croyants depuis longtemps comprendront mieux le message de Dieu. Ils apprendront sur le bien et le mal. Ils sauront la différence entre le bien et le mal.
  '2':
  - type: text
    content: 'Ce '
  - type: text
    content: prêtre
  - type: text
    content: ' lui‑même peut souvent faire de mauvaises choses, parce qu’il est faible et humain. En conséquence, il comprend les autres personnes qui commettent des erreurs. Il peut être gentil avec les gens qui font de mauvaises choses. '
  '3':
  - type: text
    content: 'Mais, parce qu’il fait lui‑même de mauvaises choses, il doit offrir des '
  - type: text
    content: sacrifices
  - type: text
    content: ' à Dieu pour lui‑même, ainsi que pour le peuple.'
  '4':
  - type: text
    content: 'Personne ne décide lui‑même de devenir grand '
  - type: text
    content: prêtre
  - type: text
    content: '. Dieu lui‑même doit le choisir. C’est ainsi qu’Aaron est devenu '
  - type: text
    content: prêtre
  - type: text
    content: .
  '5':
  - type: text
    content: C’est la même chose avec Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Il ne s’est pas choisi pour être le '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial de Dieu. Il n’a pas choisi de se rendre important comme ça. Dieu l’a choisi. Dieu a montré que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' était très important. Dieu lui a dit :'
  - type: text
    content: Tu es mon Fils.
  - type: text
    content: Aujourd’hui, je suis devenu ton Père.
  '6':
  - type: text
    content: 'Et dans un autre endroit de la Bible, Dieu a dit ceci :'
  - type: text
    content: 'Tu seras '
  - type: text
    content: prêtre
  - type: text
    content: ' pour toujours,'
  - type: text
    content: 'De la même manière que Melchisédek était '
  - type: text
    content: prêtre
  - type: text
    content: ', il y a longtemps.'
  '7':
  - type: text
    content: Lorsque Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a vécu sur terre en tant qu’homme, il priait souvent Dieu. Il a demandé à Dieu de l’aider. Il a prié avec force et il a pleuré avec larmes. Il savait que Dieu pouvait le sauver de la mort. Et Dieu a écouté Jésus quand il a prié, parce que Jésus a servi Dieu.'
  '8':
  - type: text
    content: 'Jésus est le Fils de Dieu. Mais il avait toujours des souffrances. De cette façon, il a appris à obéir complètement à Dieu. '
  '9':
  - type: text
    content: 'En conséquence, Jésus est devenu la personne qui peut sauver tous ceux qui lui obéissent. À cause de Jésus, Dieu pardonne leurs péchés pour toujours. '
