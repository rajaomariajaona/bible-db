document_id: ROM.10
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes amis chrétiens, je veux que Dieu sauve le peuple d’Israël. Je le veux vraiment. Je prie Dieu pour qu’il les sauve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je peux dire ceci à leur sujet : Ils veulent vraiment bien servir Dieu. Mais ils ne comprennent pas la bonne façon de procéder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils n’ont pas compris la façon dont Dieu accepte les gens. Au lieu de cela, ils ont essayé de faire leur propre chemin pour devenir justes avec Dieu. Ils ont refusé d’accepter la voie de Dieu qui pouvait les rendre justes avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dieu a donné sa loi au peuple d’Israël dans un but. Mais Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a atteint ce but. Alors maintenant, chaque personne qui croit en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' devient juste avec Dieu.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu veut sauver tout le monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse a écrit comment la loi de Dieu pouvait aider les gens à être justes avec Dieu. Il a dit : Si une personne obéit aux règles de Dieu, alors elle vivra selon elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais la Bible parle également d’une autre manière. Cela montre comment devenir juste avec Dieu, parce que vous lui faites confiance. Il dit : Ne te dis pas : Quelqu’un devra monter au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. (Cela signifie : Quelqu’un fera descendre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de là‑haut.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne te dis pas non plus : Quelqu’un devra descendre dans le monde d’en bas. (Cela signifie : Quelqu’un devra faire monter '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de l’endroit où se trouvent les morts.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais la Bible dit : Le message de Dieu est près de vous. Vous pouvez en parler et vous pouvez y penser. C’est le même message que nous disons aux gens. Nous disons aux gens de croire en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le message est le suivant : Vous devez dire clairement que Jésus est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. De plus, vous devez croire dans votre cœur que Dieu l’a réveillé après sa mort. Alors Dieu vous sauvera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu accepte les gens comme étant justes avec lui quand ils croient dans leur cœur. Et quand les gens disent clairement que Jésus est '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu les sauve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il est dit dans la Bible :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Tous ceux qui croient en lui ne seront pas déçus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il n’y a aucune différence entre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Il y a le même '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pour chacun d’eux. Il aide tous ceux qui lui demandent de nombreuses bonnes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Comme il est dit dans la Bible : Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu sauvera tous ceux qui lui demanderont de l’aide.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais les gens ne demanderont jamais à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de les aider s’ils n’ont pas cru en lui. Et ils ne croiront jamais en lui s’ils n’ont pas entendu parler de lui. Et ils n’entendront parler de lui que si quelqu’un leur dit le message de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et personne ne peut aller dire le message de Dieu aux gens à moins que Dieu ne l’envoie. Ceci est écrit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les gens arrivent pour nous annoncer la Bonne Nouvelle, nous leur disons bienvenue !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais toute personne qui entend la Bonne Nouvelle n’obéit pas à son message. Ésaïe a dit ceci : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu, il semble que personne n’a cru à notre message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alors, les gens doivent entendre le message avant de croire en Dieu. Et les gens entendent ce message quand quelqu’un leur parle de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Permettez‑moi de vous demander ceci : Le peuple d’Israël a‑t‑il entendu ce message ? Ils l’ont certainement fait ! La Bible dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gens ont dit partout le message de Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gens ont entendu son message dans toutes les parties du monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je pose donc la question suivante : Quand le peuple d’Israël a entendu le message de Dieu, l’a‑t‑il compris ? Réfléchissez d’abord à ce que Moïse a écrit. Dieu a dit au peuple d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais vous rendre jaloux à cause de gens qui ne sont pas les miens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais vous mettre en colère à cause de gens qui ne savent rien de moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’est aussi ce qu’Ésaïe a dit très courageusement :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dieu a dit : Ces gens qui ne me cherchaient pas m’ont trouvé.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me suis montré à des gens qui ne me posaient même pas de questions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais Ésaïe dit ceci au sujet du peuple d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dieu a dit : Pendant très longtemps,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai demandé à mon peuple de revenir vers moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il a refusé de m’obéir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’est retourné contre moi.
