document_id: ROM.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: text
    content: 'Mes amis chrétiens, je veux que Dieu sauve le peuple d’Israël. Je le veux vraiment. Je prie Dieu pour qu’il les sauve. '
  '10':
  - type: text
    content: 'Dieu accepte les gens comme étant justes avec lui quand ils croient dans leur cœur. Et quand les gens disent clairement que Jésus est '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu les sauve. '
  '11':
  - type: text
    content: 'Il est dit dans la Bible :'
  - type: text
    content: Tous ceux qui croient en lui ne seront pas déçus.
  '12':
  - type: text
    content: 'Il n’y a aucune différence entre '
  - type: text
    content: Juifs
  - type: text
    content: ' et non '
  - type: text
    content: Juifs
  - type: text
    content: '. Il y a le même '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour chacun d’eux. Il aide tous ceux qui lui demandent de nombreuses bonnes choses. '
  '13':
  - type: text
    content: 'Comme il est dit dans la Bible : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu sauvera tous ceux qui lui demanderont de l’aide.'
  '14':
  - type: text
    content: Mais les gens ne demanderont jamais à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' de les aider s’ils n’ont pas cru en lui. Et ils ne croiront jamais en lui s’ils n’ont pas entendu parler de lui. Et ils n’entendront parler de lui que si quelqu’un leur dit le message de Dieu. '
  '15':
  - type: text
    content: 'Et personne ne peut aller dire le message de Dieu aux gens à moins que Dieu ne l’envoie. Ceci est écrit dans la Bible :'
  - type: text
    content: Quand les gens arrivent pour nous annoncer la Bonne Nouvelle, nous leur disons bienvenue !
  '16':
  - type: text
    content: 'Mais toute personne qui entend la Bonne Nouvelle n’obéit pas à son message. Ésaïe a dit ceci : '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, il semble que personne n’a cru à notre message. '
  '17':
  - type: text
    content: Alors, les gens doivent entendre le message avant de croire en Dieu. Et les gens entendent ce message quand quelqu’un leur parle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '18':
  - type: text
    content: 'Permettez‑moi de vous demander ceci : Le peuple d’Israël a‑t‑il entendu ce message ? Ils l’ont certainement fait ! La Bible dit :'
  - type: text
    content: Les gens ont dit partout le message de Dieu.
  - type: text
    content: Les gens ont entendu son message dans toutes les parties du monde.
  '19':
  - type: text
    content: 'Je pose donc la question suivante : Quand le peuple d’Israël a entendu le message de Dieu, l’a‑t‑il compris ? Réfléchissez d’abord à ce que Moïse a écrit. Dieu a dit au peuple d’Israël :'
  - type: text
    content: Je vais vous rendre jaloux à cause de gens qui ne sont pas les miens.
  - type: text
    content: Je vais vous mettre en colère à cause de gens qui ne savent rien de moi.
  '2':
  - type: text
    content: 'Je peux dire ceci à leur sujet : Ils veulent vraiment bien servir Dieu. Mais ils ne comprennent pas la bonne façon de procéder. '
  '20':
  - type: text
    content: 'C’est aussi ce qu’Ésaïe a dit très courageusement :'
  - type: text
    content: 'Dieu a dit : Ces gens qui ne me cherchaient pas m’ont trouvé.'
  - type: text
    content: Je me suis montré à des gens qui ne me posaient même pas de questions.
  '21':
  - type: text
    content: 'Mais Ésaïe dit ceci au sujet du peuple d’Israël :'
  - type: text
    content: 'Dieu a dit : Pendant très longtemps,'
  - type: text
    content: J’ai demandé à mon peuple de revenir vers moi.
  - type: text
    content: Mais il a refusé de m’obéir.
  - type: text
    content: Il s’est retourné contre moi.
  '3':
  - type: text
    content: 'Ils n’ont pas compris la façon dont Dieu accepte les gens. Au lieu de cela, ils ont essayé de faire leur propre chemin pour devenir justes avec Dieu. Ils ont refusé d’accepter la voie de Dieu qui pouvait les rendre justes avec lui. '
  '4':
  - type: text
    content: Dieu a donné sa loi au peuple d’Israël dans un but. Mais Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a atteint ce but. Alors maintenant, chaque personne qui croit en '
  - type: text
    content: Christ
  - type: text
    content: ' devient juste avec Dieu.'
  - type: heading
    content: Dieu veut sauver tout le monde
  '5':
  - type: text
    content: 'Moïse a écrit comment la loi de Dieu pouvait aider les gens à être justes avec Dieu. Il a dit : Si une personne obéit aux règles de Dieu, alors elle vivra selon elles. '
  '6':
  - type: text
    content: 'Mais la Bible parle également d’une autre manière. Cela montre comment devenir juste avec Dieu, parce que vous lui faites confiance. Il dit : Ne te dis pas : Quelqu’un devra monter au '
  - type: text
    content: ciel
  - type: text
    content: '. (Cela signifie : Quelqu’un fera descendre le '
  - type: text
    content: Christ
  - type: text
    content: ' de là‑haut.) '
  '7':
  - type: text
    content: 'Ne te dis pas non plus : Quelqu’un devra descendre dans le monde d’en bas. (Cela signifie : Quelqu’un devra faire monter '
  - type: text
    content: Christ
  - type: text
    content: ' de l’endroit où se trouvent les morts.) '
  '8':
  - type: text
    content: 'Mais la Bible dit : Le message de Dieu est près de vous. Vous pouvez en parler et vous pouvez y penser. C’est le même message que nous disons aux gens. Nous disons aux gens de croire en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '9':
  - type: text
    content: 'Le message est le suivant : Vous devez dire clairement que Jésus est le '
  - type: text
    content: Seigneur
  - type: text
    content: '. De plus, vous devez croire dans votre cœur que Dieu l’a réveillé après sa mort. Alors Dieu vous sauvera. '
