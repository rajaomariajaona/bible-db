document_id: 1CO.15,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 15
  - type: heading
    content: Le Christ est redevenu vivant après sa mort
  - type: text
    content: 'Mes amis chrétiens, je veux que vous vous souveniez de la Bonne Nouvelle que je vous ai enseignée. Vous l’avez reçue de moi et vous continuez de croire que c’est un vrai message. '
  '10':
  - type: text
    content: 'Mais Dieu a été très bon envers moi. Il m’a aidé à devenir une autre personne. Et parce que Dieu a été très gentil avec moi, le résultat a été formidable. J’ai travaillé plus que tous les autres '
  - type: text
    content: apôtres
  - type: text
    content: '. Mais ce n’était pas vraiment moi‑même qui pouvais faire ce travail. Non, je pouvais le faire, parce que Dieu était très gentil avec moi. '
  '11':
  - type: text
    content: 'Ainsi donc, nous tous, '
  - type: text
    content: apôtres
  - type: text
    content: ', enseignons la même Bonne Nouvelle concernant Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Voilà le message auquel vous avez cru. Ce n’est pas important de savoir qui d’entre nous vous l’a dit, que ce soit moi ou quelqu’un d’autre.
  - type: heading
    content: Les gens revivent après la mort
  '12':
  - type: text
    content: 'Nous disons tous ce message : Dieu a réveillé Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' après sa mort. Mais certains d’entre vous disent que les morts ne revivent pas. '
  '13':
  - type: text
    content: Cela est faux. Si les morts ne revivent pas, alors Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' ne s’est pas réveillé après sa mort. Il serait toujours mort. '
  '14':
  - type: text
    content: Et si Dieu n’a pas réveillé Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' de la mort, ça ne nous sert à rien d’annoncer la Bonne Nouvelle de Dieu aux gens. Vous pourriez alors croire en lui pour rien. '
  '15':
  - type: text
    content: Nous allions dire des mensonges à propos de Dieu, parce que nous vous avons dit que Dieu a réveillé Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' après sa mort. Mais si les morts ne revivent pas, cela ne serait pas vrai.'
  '16':
  - type: text
    content: Ainsi, si les morts ne se réveilleront jamais pour une nouvelle vie, alors Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même ne s’est pas réveillé après sa mort. '
  '17':
  - type: text
    content: Et si Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' ne s’est pas réveillé de la mort, alors vous avez cru à un faux message. Dieu dira toujours que vous êtes fautifs, à cause de vos péchés.'
  '18':
  - type: text
    content: Pensez aussi à ces gens qui ont cru en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', mais ils sont déjà morts. Si les morts ne se réveillent pas pour une nouvelle vie, ces gens n’auront pas de vie avec Dieu. '
  '19':
  - type: text
    content: En tant que croyants, nous avons confiance en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' pour nous conduire dans une nouvelle vie après la mort. Mais si nous lui faisons confiance uniquement pour nous aider dans cette vie, nous devons être très tristes. Tout le monde devra être très triste pour nous. Nous sommes donc les plus tristes de tous.'
  '2':
  - type: text
    content: À cause du message que je vous ai dit, Dieu vous sauvera. Il vous sauvera si vous continuez de croire à la même Bonne Nouvelle. Si vous ne le faites pas, vous avez cru à cela pour rien.
  '20':
  - type: text
    content: Mais il est vrai que Dieu a réveillé Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' après sa mort. Il s’est levé pour aller auprès de Dieu dans le '
  - type: text
    content: ciel
  - type: text
    content: . Il était le premier, nous savons donc que les croyants qui mourront se réveilleront également.
  '21':
  - type: text
    content: Tous les gens meurent à cause de ce qu’un seul homme a fait. C’était Adam. Et c’est à cause d’un autre homme que les gens peuvent se réveiller après la mort pour une nouvelle vie. Ça, c’est Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '22':
  - type: text
    content: En tant que personnes, nous appartenons tous à la famille d’Adam. Nous devons donc tous mourir. Mais toutes les personnes qui appartiennent à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' revivront après la mort. '
  '23':
  - type: text
    content: 'C’est comme ceci : Tout d’abord, Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est mort et ensuite, il est revenu à la vie. Puis, lorsque Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' reviendra, son peuple vivra à nouveau. '
  '24':
  - type: text
    content: Après cela, la fin de tout arrivera. Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' gagnera contre tout chef, tout pouvoir et toute puissance. Il donnera le Royaume à Dieu, le Père. Dieu régnera sur tout.'
  '25':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même doit régner comme Roi jusqu’à ce qu’il gagne contre tous ses ennemis. '
  '26':
  - type: text
    content: 'Le dernier ennemi qu’il doit détruire est la mort. '
  '27':
  - type: text
    content: 'Il est dit dans la Bible : Dieu a mis «toutes choses» sous son pouvoir.'
  - type: text
    content: Mais il est clair que les mots toutes choses n’incluent pas Dieu lui‑même. Non, car c’est Dieu qui a mis toutes choses sous le pouvoir de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '28':
  - type: text
    content: Dieu mettra toutes choses sous le pouvoir de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Alors le Fils de Dieu, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' se mettra sous le pouvoir de son Père. Ainsi Dieu aura un pouvoir complet sur toutes choses, partout.'
  '29':
  - type: text
    content: Certains d’entre vous ont laissé des gens les baptiser au nom des croyants qui sont déjà morts. À supposer qu’il n’y ait vraiment pas la résurrection des morts. Pourquoi alors, les gens se font baptiser pour les morts ?
  '3':
  - type: text
    content: J’ai reçu la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' et je vous ai dit ce message. Je vous ai dit les choses les plus importantes :'
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nos péchés. La Bible a déjà expliqué comment cela devait arriver. '
  '30':
  - type: text
    content: 'Pensez aussi à nous ! Tout le temps, nous sommes en grand danger. '
  '31':
  - type: text
    content: Oui, chaque jour je m’approche de la mort ! Pourquoi je vous dis ça ? C’est parce que je suis fier de vous. Je suis fier parce que nous appartenons tous à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' notre '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Dans la ville d’Éphèse, les gens m’ont attaqué comme des animaux sauvages et j’ai combattu contre eux. Mais cela n’est rien pour moi si les morts ne reprenaient pas une nouvelle vie. Si les morts ne revivent pas, nous pourrions dire :'
  - type: text
    content: Demain, nous mourrons probablement.
  - type: text
    content: Nous devons donc simplement manger et boire autant que nous voulons.
  '33':
  - type: text
    content: 'Que personne ne vous trompe. Rappelez‑vous ceci :'
  - type: text
    content: 'Si vous devenez un ami de mauvaises personnes, vous vivrez aussi mal. '
  '34':
  - type: text
    content: Alors, commencez à penser correctement ! Arrêtez de faire de mauvaises choses ! Certains d’entre vous ne connaissent pas vraiment Dieu. Je dis cela pour vous faire honte.
  - type: heading
    content: De nouveaux corps
  '35':
  - type: text
    content: 'L’un de vous peut demander : Comment Dieu réveille‑t‑il les morts pour les faire revivre ? Quel genre de corps auront‑ils ? '
  '36':
  - type: text
    content: 'Ne pensez pas comme un fou ! Lorsque vous semez une graine dans le sol, elle doit mourir d’abord. Ensuite, elle peut redevenir vivante et devenir une nouvelle plante. '
  '37':
  - type: text
    content: 'Vous mettez juste une graine dans le sol. Il peut s’agir du blé ou d’un autre type de semence. Vous ne mettez pas dans le sol la plante entière que la graine deviendra. '
  '38':
  - type: text
    content: Mais Dieu fait de cette semence une plante. Chaque plante a son propre corps spécial que Dieu a choisi pour elle.
  '39':
  - type: text
    content: 'De plus, les choses vivantes n’ont pas le même genre de corps. Les gens ont un seul corps. Les animaux ont un corps différent. Les oiseaux et les poissons ont également un corps différent. '
  '4':
  - type: text
    content: Les gens ont enterré son cadavre. Le troisième jour après cela, Dieu l’a réveillé de la mort pour revivre. Cela est écrit dans la Bible.
  '40':
  - type: text
    content: 'En plus, il y a des corps dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Il y a aussi des corps sur terre. Mais ils sont différents en beauté et aspect. '
  '41':
  - type: text
    content: Le soleil est magnifique d’une manière spéciale. La lune est également belle d’une manière spéciale, mais elle est différente du soleil. Les étoiles sont belles aussi, et chaque étoile est belle à sa manière.
  '42':
  - type: text
    content: 'C’est comme ça quand Dieu réveille un mort pour une nouvelle vie. Nous enterrons le corps du mort dans le sol et il se détruit. Mais quand Dieu le réveille de la mort, il vivra pour toujours. '
  '43':
  - type: text
    content: 'Lorsque nous enterrons le corps, ce n’est pas beau. Mais quand Dieu le réveille de la mort, il est très beau. Lorsque nous enterrons le corps, il est faible. Mais quand Dieu le réveille de la mort, il est fort. '
  '44':
  - type: text
    content: 'Ce que nous mettons dans le sol, c’est un corps humain. Mais le corps que Dieu réveille de la mort est un corps spirituel. Il y a un corps humain qui appartient à cette terre. Il doit donc aussi y avoir un corps spirituel qui appartient au '
  - type: text
    content: ciel
  - type: text
    content: .
  '45':
  - type: text
    content: 'Il est dit dans la Bible : Le premier homme, Adam est devenu une personne qui a reçu la vie. Mais Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est comme le dernier Adam. C’est un '
  - type: text
    content: esprit
  - type: text
    content: ' qui donne la vie au gens.'
  '46':
  - type: text
    content: 'Le corps spirituel n’est pas le premier. Non, il y a d’abord ce qui est humain. Et puis, après cela, vient ce qui est spirituel. '
  '47':
  - type: text
    content: 'Dieu a utilisé la terre pour créer le premier homme, Adam. Mais le second homme est venu du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '48':
  - type: text
    content: 'Les gens qui vivent sur la terre ont des corps comme celui du premier homme. C’est l’homme que Dieu avait fait de la poussière de la terre. Les gens dans le '
  - type: text
    content: ciel
  - type: text
    content: ' ont des corps comme celui de l’homme qui est venu du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '49':
  - type: text
    content: 'Maintenant, Dieu nous a donné des corps qui ressemblent au premier homme. Un jour, nous aurons des corps qui ressemblent à l’homme qui appartient au '
  - type: text
    content: ciel
  - type: text
    content: .
  '5':
  - type: text
    content: Après cela, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est apparu à Pierre. Plus tard, il est apparu à ses 12 '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '50':
  - type: text
    content: 'Je vous le dis, mes amis chrétiens. Nos corps humains faibles ne peuvent pas aller au '
  - type: text
    content: ciel
  - type: text
    content: ', pour rejoindre Dieu dans son Royaume. Nos corps humains mourront. Ils ne peuvent pas partager quelque chose qui continuera pour toujours.'
  '51':
  - type: text
    content: 'Écoutez‑moi. Je vais vous expliquer un grand secret. Nous ne mourrons pas tous, mais Dieu nous changera tous. '
  '52':
  - type: text
    content: Cela arrivera dans un court instant, lorsque la dernière trompette fera entendre un son. Lorsque cette trompette se fera entendre, Dieu réveillera les croyants morts. Il leur donnera des corps qui ne peuvent jamais mourir. De cette façon, il nous changera tous.
  '53':
  - type: text
    content: 'Cela doit arriver. Nos corps qui se détruisent vont changer. Ils vont se transformer en des corps qui ne se détruisent jamais. Nos corps qui meurent doivent se transformer en des corps qui ne mourront jamais. '
  '54':
  - type: text
    content: 'Dieu nous donnera de nouveaux corps comme ceu‑là. Lorsque cela arrive, ce qui est écrit dans la Bible s’accomplira. Voici ce qu’elle dit :'
  - type: text
    content: Dieu a gagné contre la mort. Il l’a complètement détruite !
  '55':
  - type: text
    content: Mort, tu ne peux plus gagner !
  - type: text
    content: Mort, tu n’as plus le pouvoir de nous faire du mal !
  '56':
  - type: text
    content: 'La mort a le pouvoir de nous faire du mal seulement à cause de nos péchés. C’est la loi qui donne la puissance aux péchés. '
  '57':
  - type: text
    content: 'Mais maintenant, nous remercions Dieu ! Grâce à notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', nous gagnons contre la mort et sa puissance.'
  '58':
  - type: text
    content: 'Vous devez donc continuer d’être forts dans vos '
  - type: text
    content: esprits
  - type: text
    content: ', mes amis chrétiens que j’aime. Ne laissez rien vous éloigner de votre '
  - type: text
    content: foi
  - type: text
    content: '. Continuez à travailler dur pendant que vous servez le '
  - type: text
    content: Seigneur
  - type: text
    content: . Vous savez que tout ce que vous faites pour lui ne sera pas inutile.
  '6':
  - type: text
    content: 'Et après cela, il est apparu à plus de 500 croyants en même temps. La plupart de ces 500 personnes sont encore en vie, mais certaines sont décédées. '
  '7':
  - type: text
    content: Alors Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est apparu à Jacques. Plus tard, il est apparu à tous les '
  - type: text
    content: apôtres
  - type: text
    content: .
  '8':
  - type: text
    content: Après que tous ces gens l’ont vu, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' m’est aussi apparu. J’étais comme quelqu’un qui est né au mauvais moment. '
  '9':
  - type: text
    content: 'Parmi tous les '
  - type: text
    content: apôtres
  - type: text
    content: ', je suis le moins important. J’ai causé tellement de problèmes à l’Église de Dieu. Alors les gens ne devraient pas vraiment m’appeler '
  - type: text
    content: apôtre
  - type: text
    content: '. '
