document_id: 1CO.15,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 15
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est redevenu vivant après sa mort'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mes amis chrétiens, je veux que vous vous souveniez de la Bonne Nouvelle que je vous ai enseignée. Vous l’avez reçue de moi et vous continuez de croire que c’est un vrai message. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais Dieu a été très bon envers moi. Il m’a aidé à devenir une autre personne. Et parce que Dieu a été très gentil avec moi, le résultat a été formidable. J’ai travaillé plus que tous les autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Mais ce n’était pas vraiment moi‑même qui pouvais faire ce travail. Non, je pouvais le faire, parce que Dieu était très gentil avec moi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ainsi donc, nous tous, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ', enseignons la même Bonne Nouvelle concernant Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Voilà le message auquel vous avez cru. Ce n’est pas important de savoir qui d’entre nous vous l’a dit, que ce soit moi ou quelqu’un d’autre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les gens revivent après la mort
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nous disons tous ce message : Dieu a réveillé Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' après sa mort. Mais certains d’entre vous disent que les morts ne revivent pas. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Cela est faux. Si les morts ne revivent pas, alors Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' ne s’est pas réveillé après sa mort. Il serait toujours mort. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Et si Dieu n’a pas réveillé Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' de la mort, ça ne nous sert à rien d’annoncer la Bonne Nouvelle de Dieu aux gens. Vous pourriez alors croire en lui pour rien. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nous allions dire des mensonges à propos de Dieu, parce que nous vous avons dit que Dieu a réveillé Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' après sa mort. Mais si les morts ne revivent pas, cela ne serait pas vrai.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ainsi, si les morts ne se réveilleront jamais pour une nouvelle vie, alors Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même ne s’est pas réveillé après sa mort. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Et si Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' ne s’est pas réveillé de la mort, alors vous avez cru à un faux message. Dieu dira toujours que vous êtes fautifs, à cause de vos péchés.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Pensez aussi à ces gens qui ont cru en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', mais ils sont déjà morts. Si les morts ne se réveillent pas pour une nouvelle vie, ces gens n’auront pas de vie avec Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: En tant que croyants, nous avons confiance en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' pour nous conduire dans une nouvelle vie après la mort. Mais si nous lui faisons confiance uniquement pour nous aider dans cette vie, nous devons être très tristes. Tout le monde devra être très triste pour nous. Nous sommes donc les plus tristes de tous.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: À cause du message que je vous ai dit, Dieu vous sauvera. Il vous sauvera si vous continuez de croire à la même Bonne Nouvelle. Si vous ne le faites pas, vous avez cru à cela pour rien.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais il est vrai que Dieu a réveillé Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' après sa mort. Il s’est levé pour aller auprès de Dieu dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Il était le premier, nous savons donc que les croyants qui mourront se réveilleront également.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tous les gens meurent à cause de ce qu’un seul homme a fait. C’était Adam. Et c’est à cause d’un autre homme que les gens peuvent se réveiller après la mort pour une nouvelle vie. Ça, c’est Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: En tant que personnes, nous appartenons tous à la famille d’Adam. Nous devons donc tous mourir. Mais toutes les personnes qui appartiennent à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' revivront après la mort. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'C’est comme ceci : Tout d’abord, Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort et ensuite, il est revenu à la vie. Puis, lorsque Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' reviendra, son peuple vivra à nouveau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Après cela, la fin de tout arrivera. Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' gagnera contre tout chef, tout pouvoir et toute puissance. Il donnera le Royaume à Dieu, le Père. Dieu régnera sur tout.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même doit régner comme Roi jusqu’à ce qu’il gagne contre tous ses ennemis. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le dernier ennemi qu’il doit détruire est la mort. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il est dit dans la Bible : Dieu a mis «toutes choses» sous son pouvoir.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il est clair que les mots toutes choses n’incluent pas Dieu lui‑même. Non, car c’est Dieu qui a mis toutes choses sous le pouvoir de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dieu mettra toutes choses sous le pouvoir de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Alors le Fils de Dieu, Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' se mettra sous le pouvoir de son Père. Ainsi Dieu aura un pouvoir complet sur toutes choses, partout.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Certains d’entre vous ont laissé des gens les baptiser au nom des croyants qui sont déjà morts. À supposer qu’il n’y ait vraiment pas la résurrection des morts. Pourquoi alors, les gens se font baptiser pour les morts ?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’ai reçu la Bonne Nouvelle de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et je vous ai dit ce message. Je vous ai dit les choses les plus importantes :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour nos péchés. La Bible a déjà expliqué comment cela devait arriver. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Pensez aussi à nous ! Tout le temps, nous sommes en grand danger. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Oui, chaque jour je m’approche de la mort ! Pourquoi je vous dis ça ? C’est parce que je suis fier de vous. Je suis fier parce que nous appartenons tous à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dans la ville d’Éphèse, les gens m’ont attaqué comme des animaux sauvages et j’ai combattu contre eux. Mais cela n’est rien pour moi si les morts ne reprenaient pas une nouvelle vie. Si les morts ne revivent pas, nous pourrions dire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Demain, nous mourrons probablement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous devons donc simplement manger et boire autant que nous voulons.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Que personne ne vous trompe. Rappelez‑vous ceci :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si vous devenez un ami de mauvaises personnes, vous vivrez aussi mal. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Alors, commencez à penser correctement ! Arrêtez de faire de mauvaises choses ! Certains d’entre vous ne connaissent pas vraiment Dieu. Je dis cela pour vous faire honte.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: De nouveaux corps
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'L’un de vous peut demander : Comment Dieu réveille‑t‑il les morts pour les faire revivre ? Quel genre de corps auront‑ils ? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ne pensez pas comme un fou ! Lorsque vous semez une graine dans le sol, elle doit mourir d’abord. Ensuite, elle peut redevenir vivante et devenir une nouvelle plante. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Vous mettez juste une graine dans le sol. Il peut s’agir du blé ou d’un autre type de semence. Vous ne mettez pas dans le sol la plante entière que la graine deviendra. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Mais Dieu fait de cette semence une plante. Chaque plante a son propre corps spécial que Dieu a choisi pour elle.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'De plus, les choses vivantes n’ont pas le même genre de corps. Les gens ont un seul corps. Les animaux ont un corps différent. Les oiseaux et les poissons ont également un corps différent. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les gens ont enterré son cadavre. Le troisième jour après cela, Dieu l’a réveillé de la mort pour revivre. Cela est écrit dans la Bible.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'En plus, il y a des corps dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il y a aussi des corps sur terre. Mais ils sont différents en beauté et aspect. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Le soleil est magnifique d’une manière spéciale. La lune est également belle d’une manière spéciale, mais elle est différente du soleil. Les étoiles sont belles aussi, et chaque étoile est belle à sa manière.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'C’est comme ça quand Dieu réveille un mort pour une nouvelle vie. Nous enterrons le corps du mort dans le sol et il se détruit. Mais quand Dieu le réveille de la mort, il vivra pour toujours. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Lorsque nous enterrons le corps, ce n’est pas beau. Mais quand Dieu le réveille de la mort, il est très beau. Lorsque nous enterrons le corps, il est faible. Mais quand Dieu le réveille de la mort, il est fort. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ce que nous mettons dans le sol, c’est un corps humain. Mais le corps que Dieu réveille de la mort est un corps spirituel. Il y a un corps humain qui appartient à cette terre. Il doit donc aussi y avoir un corps spirituel qui appartient au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: .
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Il est dit dans la Bible : Le premier homme, Adam est devenu une personne qui a reçu la vie. Mais Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est comme le dernier Adam. C’est un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' qui donne la vie au gens.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Le corps spirituel n’est pas le premier. Non, il y a d’abord ce qui est humain. Et puis, après cela, vient ce qui est spirituel. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Dieu a utilisé la terre pour créer le premier homme, Adam. Mais le second homme est venu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Les gens qui vivent sur la terre ont des corps comme celui du premier homme. C’est l’homme que Dieu avait fait de la poussière de la terre. Les gens dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' ont des corps comme celui de l’homme qui est venu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Maintenant, Dieu nous a donné des corps qui ressemblent au premier homme. Un jour, nous aurons des corps qui ressemblent à l’homme qui appartient au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Après cela, Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est apparu à Pierre. Plus tard, il est apparu à ses 12 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Je vous le dis, mes amis chrétiens. Nos corps humains faibles ne peuvent pas aller au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ', pour rejoindre Dieu dans son Royaume. Nos corps humains mourront. Ils ne peuvent pas partager quelque chose qui continuera pour toujours.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Écoutez‑moi. Je vais vous expliquer un grand secret. Nous ne mourrons pas tous, mais Dieu nous changera tous. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Cela arrivera dans un court instant, lorsque la dernière trompette fera entendre un son. Lorsque cette trompette se fera entendre, Dieu réveillera les croyants morts. Il leur donnera des corps qui ne peuvent jamais mourir. De cette façon, il nous changera tous.
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Cela doit arriver. Nos corps qui se détruisent vont changer. Ils vont se transformer en des corps qui ne se détruisent jamais. Nos corps qui meurent doivent se transformer en des corps qui ne mourront jamais. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Dieu nous donnera de nouveaux corps comme ceu‑là. Lorsque cela arrive, ce qui est écrit dans la Bible s’accomplira. Voici ce qu’elle dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a gagné contre la mort. Il l’a complètement détruite !
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: Mort, tu ne peux plus gagner !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mort, tu n’as plus le pouvoir de nous faire du mal !
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'La mort a le pouvoir de nous faire du mal seulement à cause de nos péchés. C’est la loi qui donne la puissance aux péchés. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Mais maintenant, nous remercions Dieu ! Grâce à notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', nous gagnons contre la mort et sa puissance.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Vous devez donc continuer d’être forts dans vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ', mes amis chrétiens que j’aime. Ne laissez rien vous éloigner de votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: '. Continuez à travailler dur pendant que vous servez le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . Vous savez que tout ce que vous faites pour lui ne sera pas inutile.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et après cela, il est apparu à plus de 500 croyants en même temps. La plupart de ces 500 personnes sont encore en vie, mais certaines sont décédées. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Alors Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est apparu à Jacques. Plus tard, il est apparu à tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Après que tous ces gens l’ont vu, Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' m’est aussi apparu. J’étais comme quelqu’un qui est né au mauvais moment. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Parmi tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ', je suis le moins important. J’ai causé tellement de problèmes à l’Église de Dieu. Alors les gens ne devraient pas vraiment m’appeler '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: '. '
