document_id: MRK.12,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 12
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire sur un champ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors, Jésus a commencé à parler encore aux dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: '. Il leur a raconté cette histoire. Il a dit : Un homme avait fait un champ. Il a planté une '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vigne
    - type: text
      text: ' là. Il a fait une clôture autour du champ. Il a préparé un endroit pour transformer les raisins en vin. Il a également fait un grand bâtiment. Alors, l’homme a trouvé des hommes, afin de travailler pour lui. Et il est parti dans un autre pays. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je suis sûr que vous avez lu ces paroles dans la Bible : Les constructeurs ne veulent pas utiliser une certaine pierre. Mais cette pierre est devenue la pierre la plus importante dans le coin. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu a fait cela. Et nous pouvons voir qu’il a fait quelque chose de grand. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils voulaient attraper Jésus. Ils savaient qu’il venait de donner cet exemple à leur sujet. Mais ils avaient peur de la foule. Ainsi, ils l’ont quitté et ils sont partis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' parlent de l’argent que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' exigeait'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors, les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont envoyé des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' auprès de Jésus. Ils ont également envoyé des hommes qui voulaient obéir au roi Hérode. Ils ont essayé d’utiliser les paroles de Jésus pour lui causer des troubles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ces hommes sont venus auprès de Jésus. Ils lui ont dit : Maître, nous savons que tu dis des choses vraies.'
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tu n’accordes pas d’importance à ce que les autres pensent.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tu ne changes pas de réponses même si quelqu’un est important. Tu nous apprends vraiment ce que Dieu veut que nous fassions. Ainsi devons‑nous payer l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: impôt
    - type: text
      text: ' à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' ou pas ? '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Faut‑il donner cet argent ou non ? Jésus savait que ces hommes n’étaient pas honnêtes. Alors il a dit : Vous ne devriez pas poser cette question pour me tester. Apportez‑moi une pièce de monnaie. Je veux la voir. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors ils l’ont apportée. Et Jésus leur a dit : Qui est représenté sur cette pièce d’argent ? Le nom qui est sur cette pièce d’argent est de qui ? Ils ont répondu : C’est l’image de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ', et le nom de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors Jésus leur a dit : Alors donnez à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' ce qui lui appartient. Et donnez à Dieu ce qui est à Dieu. Ils étaient très surpris.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' posent à Jésus une question'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'En plus, certains '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' sont venus auprès de Jésus. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: ' ne croyaient pas que si quelqu’un meurt, il peut devenir encore vivant. Ils ont demandé à Jésus à ce sujet.'
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils ont dit à Jésus : Maître, Moïse a écrit ces choses pour nous dans la loi. Si un homme meurt sans enfants, son frère doit épouser la femme de l’homme. Et puis leurs enfants seront appelés les enfants du frère qui est mort. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quand c’était le temps de la récolte, l’homme a envoyé un serviteur aux agriculteurs de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vigne
    - type: text
      text: '. L’homme voulait que les vignerons lui donnent les fruits du champ. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'À un moment donné, il y avait 7 frères. Le frère aîné a épousé une femme. Mais il est mort sans enfants. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ainsi, le deuxième frère a épousé cette femme. Il est également mort sans enfants. Puis le troisième frère a épousé cette femme. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et la même chose à tous les 7 frères. Ils n’avaient pas d’enfants. Après cela, la femme est morte aussi. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Vous enseignez qu’à un moment, les gens morts vivront encore. Ce jour‑là, à qui sera cette femme ? Elle a épousé tous les 7 frères. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Jésus a dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sadducéens
    - type: text
      text: '  : Vous êtes très mauvais. Ceci est parce que vous ne connaissez pas les Saintes Écritures. Et vous ne savez pas comment Dieu est puissant. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'À un certain temps, les gens qui sont morts, seront de nouveau en vie. Mais les hommes et les femmes ne se marieront plus. Ils ne vont pas avoir de maris ni d’épouses. Mais, ils seront comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mais Dieu ressuscitera les morts. Vous devriez avoir lu ce que Moïse avait écrit. Voir le chapitre sur le buisson qui brûlait. Là, Dieu a parlé à Moïse et Dieu a dit : Je suis le Dieu d’Abraham. Je suis le Dieu d’Isaac. Et je suis le Dieu de Jacob. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dieu n’est pas le Dieu des gens qui sont morts. Il est le Dieu des gens qui sont en vie. Donc, vous êtes très mauvais.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus enseigne le plus grand commandement de Dieu
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'L’un des enseignants de la loi de Dieu est allé près de Jésus. Il a entendu la conversation de Jésus avec ces dirigeants. L’enseignant a compris que Jésus a bien répondu. Donc, l’enseignant a demandé à Jésus : Quel est le plus grand commandement de Dieu ? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus a répondu : Voici le plus grand commandement de Dieu : Écoute, Israël. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu est le seul '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais les vignerons ont pris le serviteur et l’ont frappé avec des bâtons. Ils l’ont renvoyé sans rien. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Et tu aimeras le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu. L’aimer de tout ton cœur. L’aimer de toute ton '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âme
    - type: text
      text: '. L’aimer de tout ton '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: '. L’aimer de toute ta force. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le second plus grand commandement est : Tu aimeras les autres comme tu t’aimes toi‑même. Il n’y a pas d’autres commandements plus grands que ces 2. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'L’enseignant de la loi de Dieu a dit à Jésus : Maître, tu as bien répondu. Tu as raison de dire que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est le seul Dieu. Et il n’y a pas d’autre Dieu que lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Nous devons l’aimer de tout notre cœur. Nous devons l’aimer de toute notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âme
    - type: text
      text: '. Nous devons l’aimer de tout notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: '. Nous devons l’aimer de toute notre force. Nous devons aussi aimer les autres comme nous nous aimons nous‑mêmes. Ceci est plus important que tous les dons ou les animaux que nous offrons à Dieu. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jésus a compris que la réponse de l’homme était bien. Alors Jésus lui a dit : Tu es presque prêt pour que Dieu dirige ta vie. Après cela, tout le monde avait peur de poser d’autres questions à Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus enseigne les gens au sujet du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jésus enseignait le peuple dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: .
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il disait : Les enseignants de la loi de Dieu parlent du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: '. Et ils disent qu’il est le fils du roi David. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' a aidé David lui‑même à écrire : Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit à mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Assieds‑toi à ma droite, jusqu’à ce que je gagne tout à fait contre tes ennemis. Tu pourras même être en mesure de mettre tes pieds sur eux. '
  '37':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'David lui‑même appelle le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Donc nous ne devrions pas dire que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: fils de David
    - type: text
      text: '. Beaucoup de gens voulaient écouter ce que Jésus disait. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Quand Jésus enseignait le peuple, il disait : Soyez prudents avec les enseignants de la loi de Dieu. Ils veulent que les gens pensent qu’ils sont importants. Alors, ils se promènent en portant de longs vêtements. Ils aiment que les gens les voient à la place du marché. '
  '39':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ils ne veulent que les meilleures places dans les bâtiments de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Ils choisissent les premières places dans des fêtes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors l’homme a envoyé un autre serviteur aux agriculteurs de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vigne
    - type: text
      text: '. Ils ont frappé ce serviteur sur la tête. Et ils ont fait d’autres mauvaises choses sur lui. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ces hommes prennent tout de suite les biens des femmes après la mort de leurs maris, même leurs maisons. Ensuite, ils prient pendant un long temps, afin que d’autres personnes les entendent. Dieu punira beaucoup ces hommes à cause de ces choses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle des gens qui donnent l’offrande à Dieu
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Les gens donnaient leurs offrandes pour le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Ils mettaient leurs pièces de monnaie dans une boîte. Jésus était assis près de la boîte et il les regardait. Beaucoup de gens riches mettaient beaucoup d’argent dans la boîte. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Mais une femme est venue. Son mari est mort et cette femme était pauvre. Elle a mis dans la boîte 2 pièces de très peu de valeur. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Jésus a appelé ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' près de lui. Il leur a dit : Je vous dis la vérité. Cette pauvre femme a donné une meilleure offrande dans la boîte que toutes les autres personnes. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Tous ces gens riches ont mis seulement une partie de leur argent dans la boîte. Et ils ont beaucoup d’argent. Cette femme n’a rien. Mais elle a mis tout l’argent qu’elle avait. Elle a mis tout l’argent dont elle a besoin pour vivre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’homme a ensuite envoyé un autre serviteur, mais les vignerons ont tué ce serviteur. Il a envoyé de nombreux autres serviteurs. Les vignerons ont frappé certains serviteurs avec des bâtons. Et les vignerons ont tué d’autres serviteurs. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L’homme n’avait qu’une seule personne qu’il pouvait encore envoyer. C’était son propre fils, et l’homme l’aimait beaucoup. Après tous les autres, il a envoyé son fils aux agriculteurs de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vigne
    - type: text
      text: '. C’était parce qu’il a dit : Les vignerons vont respecter mon fils. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais ces vignerons se sont dit : Ce fils recevra en héritage le champ de son père. Nous devons tuer le fils et le champ sera le nôtre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les vignerons ont pris le fils et ils l’ont tué. Puis ils ont jeté son corps dans le champ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jésus a dit : Je vais vous dire ce que le maître du champ fera. Il viendra et il tuera les vignerons. Il donnera le champ à d’autres personnes. '
