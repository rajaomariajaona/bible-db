document_id: MRK.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: Jésus raconte une histoire sur un champ
  - type: text
    content: 'Alors, Jésus a commencé à parler encore aux dirigeants '
  - type: text
    content: juifs
  - type: text
    content: '. Il leur a raconté cette histoire. Il a dit : Un homme avait fait un champ. Il a planté une '
  - type: text
    content: vigne
  - type: text
    content: ' là. Il a fait une clôture autour du champ. Il a préparé un endroit pour transformer les raisins en vin. Il a également fait un grand bâtiment. Alors, l’homme a trouvé des hommes, afin de travailler pour lui. Et il est parti dans un autre pays. '
  '10':
  - type: text
    content: 'Je suis sûr que vous avez lu ces paroles dans la Bible : Les constructeurs ne veulent pas utiliser une certaine pierre. Mais cette pierre est devenue la pierre la plus importante dans le coin. '
  '11':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu a fait cela. Et nous pouvons voir qu’il a fait quelque chose de grand. '
  '12':
  - type: text
    content: Ils voulaient attraper Jésus. Ils savaient qu’il venait de donner cet exemple à leur sujet. Mais ils avaient peur de la foule. Ainsi, ils l’ont quitté et ils sont partis.
  - type: heading
    content: Les Pharisiens parlent de l’argent que César exigeait
  '13':
  - type: text
    content: 'Alors, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont envoyé des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' auprès de Jésus. Ils ont également envoyé des hommes qui voulaient obéir au roi Hérode. Ils ont essayé d’utiliser les paroles de Jésus pour lui causer des troubles. '
  '14':
  - type: text
    content: 'Ces hommes sont venus auprès de Jésus. Ils lui ont dit : Maître, nous savons que tu dis des choses vraies.'
  - type: text
    content: Tu n’accordes pas d’importance à ce que les autres pensent.
  - type: text
    content: Tu ne changes pas de réponses même si quelqu’un est important. Tu nous apprends vraiment ce que Dieu veut que nous fassions. Ainsi devons‑nous payer l’
  - type: text
    content: impôt
  - type: text
    content: ' à '
  - type: text
    content: César
  - type: text
    content: ' ou pas ? '
  '15':
  - type: text
    content: 'Faut‑il donner cet argent ou non ? Jésus savait que ces hommes n’étaient pas honnêtes. Alors il a dit : Vous ne devriez pas poser cette question pour me tester. Apportez‑moi une pièce de monnaie. Je veux la voir. '
  '16':
  - type: text
    content: 'Alors ils l’ont apportée. Et Jésus leur a dit : Qui est représenté sur cette pièce d’argent ? Le nom qui est sur cette pièce d’argent est de qui ? Ils ont répondu : C’est l’image de '
  - type: text
    content: César
  - type: text
    content: ', et le nom de '
  - type: text
    content: César
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Alors Jésus leur a dit : Alors donnez à '
  - type: text
    content: César
  - type: text
    content: ' ce qui lui appartient. Et donnez à Dieu ce qui est à Dieu. Ils étaient très surpris.'
  - type: heading
    content: Les Sadducéens posent à Jésus une question
  '18':
  - type: text
    content: 'En plus, certains '
  - type: text
    content: Sadducéens
  - type: text
    content: ' sont venus auprès de Jésus. Les '
  - type: text
    content: Sadducéens
  - type: text
    content: ' ne croyaient pas que si quelqu’un meurt, il peut devenir encore vivant. Ils ont demandé à Jésus à ce sujet.'
  '19':
  - type: text
    content: 'Ils ont dit à Jésus : Maître, Moïse a écrit ces choses pour nous dans la loi. Si un homme meurt sans enfants, son frère doit épouser la femme de l’homme. Et puis leurs enfants seront appelés les enfants du frère qui est mort. '
  '2':
  - type: text
    content: 'Quand c’était le temps de la récolte, l’homme a envoyé un serviteur aux agriculteurs de la '
  - type: text
    content: vigne
  - type: text
    content: '. L’homme voulait que les vignerons lui donnent les fruits du champ. '
  '20':
  - type: text
    content: 'À un moment donné, il y avait 7 frères. Le frère aîné a épousé une femme. Mais il est mort sans enfants. '
  '21':
  - type: text
    content: 'Ainsi, le deuxième frère a épousé cette femme. Il est également mort sans enfants. Puis le troisième frère a épousé cette femme. '
  '22':
  - type: text
    content: 'Et la même chose à tous les 7 frères. Ils n’avaient pas d’enfants. Après cela, la femme est morte aussi. '
  '23':
  - type: text
    content: 'Vous enseignez qu’à un moment, les gens morts vivront encore. Ce jour‑là, à qui sera cette femme ? Elle a épousé tous les 7 frères. '
  '24':
  - type: text
    content: 'Jésus a dit aux '
  - type: text
    content: Sadducéens
  - type: text
    content: '  : Vous êtes très mauvais. Ceci est parce que vous ne connaissez pas les Saintes Écritures. Et vous ne savez pas comment Dieu est puissant. '
  '25':
  - type: text
    content: 'À un certain temps, les gens qui sont morts, seront de nouveau en vie. Mais les hommes et les femmes ne se marieront plus. Ils ne vont pas avoir de maris ni d’épouses. Mais, ils seront comme les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu. '
  '26':
  - type: text
    content: 'Mais Dieu ressuscitera les morts. Vous devriez avoir lu ce que Moïse avait écrit. Voir le chapitre sur le buisson qui brûlait. Là, Dieu a parlé à Moïse et Dieu a dit : Je suis le Dieu d’Abraham. Je suis le Dieu d’Isaac. Et je suis le Dieu de Jacob. '
  '27':
  - type: text
    content: Dieu n’est pas le Dieu des gens qui sont morts. Il est le Dieu des gens qui sont en vie. Donc, vous êtes très mauvais.
  - type: heading
    content: Jésus enseigne le plus grand commandement de Dieu
  '28':
  - type: text
    content: 'L’un des enseignants de la loi de Dieu est allé près de Jésus. Il a entendu la conversation de Jésus avec ces dirigeants. L’enseignant a compris que Jésus a bien répondu. Donc, l’enseignant a demandé à Jésus : Quel est le plus grand commandement de Dieu ? '
  '29':
  - type: text
    content: 'Jésus a répondu : Voici le plus grand commandement de Dieu : Écoute, Israël. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu est le seul '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Mais les vignerons ont pris le serviteur et l’ont frappé avec des bâtons. Ils l’ont renvoyé sans rien. '
  '30':
  - type: text
    content: 'Et tu aimeras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. L’aimer de tout ton cœur. L’aimer de toute ton '
  - type: text
    content: âme
  - type: text
    content: '. L’aimer de tout ton '
  - type: text
    content: Esprit
  - type: text
    content: '. L’aimer de toute ta force. '
  '31':
  - type: text
    content: 'Le second plus grand commandement est : Tu aimeras les autres comme tu t’aimes toi‑même. Il n’y a pas d’autres commandements plus grands que ces 2. '
  '32':
  - type: text
    content: 'L’enseignant de la loi de Dieu a dit à Jésus : Maître, tu as bien répondu. Tu as raison de dire que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est le seul Dieu. Et il n’y a pas d’autre Dieu que lui. '
  '33':
  - type: text
    content: 'Nous devons l’aimer de tout notre cœur. Nous devons l’aimer de toute notre '
  - type: text
    content: âme
  - type: text
    content: '. Nous devons l’aimer de tout notre '
  - type: text
    content: esprit
  - type: text
    content: '. Nous devons l’aimer de toute notre force. Nous devons aussi aimer les autres comme nous nous aimons nous‑mêmes. Ceci est plus important que tous les dons ou les animaux que nous offrons à Dieu. '
  '34':
  - type: text
    content: 'Jésus a compris que la réponse de l’homme était bien. Alors Jésus lui a dit : Tu es presque prêt pour que Dieu dirige ta vie. Après cela, tout le monde avait peur de poser d’autres questions à Jésus.'
  - type: heading
    content: Jésus enseigne les gens au sujet du Messie
  '35':
  - type: text
    content: 'Jésus enseignait le peuple dans le '
  - type: text
    content: Temple
  - type: text
    content: .
  - type: text
    content: 'Il disait : Les enseignants de la loi de Dieu parlent du '
  - type: text
    content: Messie
  - type: text
    content: '. Et ils disent qu’il est le fils du roi David. '
  '36':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' a aidé David lui‑même à écrire : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit à mon '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Assieds‑toi à ma droite, jusqu’à ce que je gagne tout à fait contre tes ennemis. Tu pourras même être en mesure de mettre tes pieds sur eux. '
  '37':
  - type: text
    content: 'David lui‑même appelle le '
  - type: text
    content: Messie
  - type: text
    content: ' '
  - type: text
    content: Seigneur
  - type: text
    content: '. Donc nous ne devrions pas dire que le '
  - type: text
    content: Messie
  - type: text
    content: ' est '
  - type: text
    content: fils de David
  - type: text
    content: '. Beaucoup de gens voulaient écouter ce que Jésus disait. '
  '38':
  - type: text
    content: 'Quand Jésus enseignait le peuple, il disait : Soyez prudents avec les enseignants de la loi de Dieu. Ils veulent que les gens pensent qu’ils sont importants. Alors, ils se promènent en portant de longs vêtements. Ils aiment que les gens les voient à la place du marché. '
  '39':
  - type: text
    content: 'Ils ne veulent que les meilleures places dans les bâtiments de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Ils choisissent les premières places dans des fêtes. '
  '4':
  - type: text
    content: 'Alors l’homme a envoyé un autre serviteur aux agriculteurs de la '
  - type: text
    content: vigne
  - type: text
    content: '. Ils ont frappé ce serviteur sur la tête. Et ils ont fait d’autres mauvaises choses sur lui. '
  '40':
  - type: text
    content: Ces hommes prennent tout de suite les biens des femmes après la mort de leurs maris, même leurs maisons. Ensuite, ils prient pendant un long temps, afin que d’autres personnes les entendent. Dieu punira beaucoup ces hommes à cause de ces choses.
  - type: heading
    content: Jésus parle des gens qui donnent l’offrande à Dieu
  '41':
  - type: text
    content: 'Les gens donnaient leurs offrandes pour le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils mettaient leurs pièces de monnaie dans une boîte. Jésus était assis près de la boîte et il les regardait. Beaucoup de gens riches mettaient beaucoup d’argent dans la boîte. '
  '42':
  - type: text
    content: 'Mais une femme est venue. Son mari est mort et cette femme était pauvre. Elle a mis dans la boîte 2 pièces de très peu de valeur. '
  '43':
  - type: text
    content: 'Jésus a appelé ses '
  - type: text
    content: disciples
  - type: text
    content: ' près de lui. Il leur a dit : Je vous dis la vérité. Cette pauvre femme a donné une meilleure offrande dans la boîte que toutes les autres personnes. '
  '44':
  - type: text
    content: Tous ces gens riches ont mis seulement une partie de leur argent dans la boîte. Et ils ont beaucoup d’argent. Cette femme n’a rien. Mais elle a mis tout l’argent qu’elle avait. Elle a mis tout l’argent dont elle a besoin pour vivre.
  '5':
  - type: text
    content: 'L’homme a ensuite envoyé un autre serviteur, mais les vignerons ont tué ce serviteur. Il a envoyé de nombreux autres serviteurs. Les vignerons ont frappé certains serviteurs avec des bâtons. Et les vignerons ont tué d’autres serviteurs. '
  '6':
  - type: text
    content: 'L’homme n’avait qu’une seule personne qu’il pouvait encore envoyer. C’était son propre fils, et l’homme l’aimait beaucoup. Après tous les autres, il a envoyé son fils aux agriculteurs de la '
  - type: text
    content: vigne
  - type: text
    content: '. C’était parce qu’il a dit : Les vignerons vont respecter mon fils. '
  '7':
  - type: text
    content: 'Mais ces vignerons se sont dit : Ce fils recevra en héritage le champ de son père. Nous devons tuer le fils et le champ sera le nôtre. '
  '8':
  - type: text
    content: 'Les vignerons ont pris le fils et ils l’ont tué. Puis ils ont jeté son corps dans le champ. '
  '9':
  - type: text
    content: 'Jésus a dit : Je vais vous dire ce que le maître du champ fera. Il viendra et il tuera les vignerons. Il donnera le champ à d’autres personnes. '
