document_id: 2TH.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Le jour où le Seigneur Jésus reviendra
  - type: text
    content: 'Nos amis chrétiens, nous devons maintenant expliquer quelque chose au sujet du moment où notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' reviendra. C’est le moment où il nous réunira tous pour être avec lui. '
  '10':
  - type: text
    content: 'Il fera toutes sortes de mauvaises choses qui trompent les gens. Les gens qu’il trompera, sont des gens que Dieu détruira. Ces gens croient aux fausses choses, parce qu’ils ont refusé d’accepter le vrai message de Dieu. S’ils avaient aimé ce vrai message, Dieu pourrait les sauver. '
  '11':
  - type: text
    content: 'Pour cette raison, Dieu laisse leurs '
  - type: text
    content: esprits
  - type: text
    content: ' accepter quelque chose de mal. Ils croient à un faux message. '
  '12':
  - type: text
    content: En conséquence, Dieu les punira tous. Ils ont refusé de croire à ce qui est vrai. Mais, ils ont aimé de faire de très mauvaises choses.
  - type: heading
    content: Les croyants doivent continuer de croire en Dieu
  '13':
  - type: text
    content: 'Nous remercions toujours Dieu pour vous, nos amis chrétiens que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aime. Nous devons remercier Dieu, car il a choisi de vous sauver. Dieu vous a choisis pour lui appartenir, comme certaines de premières personnes qu’il sauvera. Vous avez cru au vrai message de Dieu. Et l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous sépare de mauvaises choses. '
  '14':
  - type: text
    content: 'Nous vous avons annoncé la Bonne Nouvelle de Dieu. C’est ainsi que Dieu vous a joints à lui. Il vous a sauvés, afin que vous vous joigniez à notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' dans le '
  - type: text
    content: ciel
  - type: text
    content: .
  '15':
  - type: text
    content: 'C’est pourquoi, nos amis chrétiens, vous devez continuer de croire en '
  - type: text
    content: Christ
  - type: text
    content: . Continuez de croire aux vraies choses que nous vous avons enseignées. Ce sont les choses que nous vous avons dites lorsque nous étions avec vous. Nous en avons également parlé dans notre lettre.
  '16':
  - type: text
    content: 'Nous demandons à notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même et à Dieu, notre Père, de vous aider. Dieu a montré qu’il nous aime beaucoup. Grâce à lui, nous sommes courageux et forts pour toujours. Nous continuons d’espérer les bonnes choses à venir. Oui, Dieu a été très gentil avec nous !'
  '17':
  - type: text
    content: Nous prions pour qu’il continue de vous aider et de vous fortifier. Vous pourrez alors faire et dire toujours de bonnes choses.
  '2':
  - type: text
    content: 'S’il vous plaît, ne vous embrouillez pas facilement à ce sujet. N’ayez pas peur à cause de faux messages sur le retour du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Certaines personnes vous disent que le grand jour du retour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est déjà arrivé. Certaines de ces personnes disent que l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu leur a montré un message comme ça. D’autres pourraient dire que le message vient de nous. Ou ils pourraient dire que nous l’avons écrit dans une lettre.'
  '3':
  - type: text
    content: 'Ne laissez personne vous tromper de cette façon. Ce jour n’aura pas lieu tant que d’autres choses ne se seront pas produites. Avant ce jour, il y aura un moment où beaucoup de gens se tourneront contre Dieu. Aussi, l’homme qui est complètement contre Dieu apparaîtra. Dieu le détruira sûrement à la fin. '
  '4':
  - type: text
    content: Cet homme sera le grand ennemi de Dieu. Il dira qu’il est plus grand que tout ce que les gens appellent leurs dieux. Il dira qu’il est plus grand que tout ce que les gens adorent. En conséquence, il ira même dans la maison de Dieu. Il s’assoira comme un roi. Il dira à tout le monde qu’il est lui‑même Dieu.
  '5':
  - type: text
    content: Je vous ai dit ces choses quand j’étais avec vous. Je suis sûr que vous vous en souvenez.
  '6':
  - type: text
    content: 'Quelque chose empêche encore cet homme de venir. Et vous savez ce que c’est. Mais cet homme apparaîtra au bon moment. '
  '7':
  - type: text
    content: 'Sa puissance travaille déjà en secret pour tourner les gens contre Dieu. Mais il y a quelqu’un ou quelque chose qui l’empêche de travailler librement. Ce sera jusqu’à ce que Dieu le fasse disparaître. '
  '8':
  - type: text
    content: 'Alors l’homme qui est contre Dieu apparaîtra. Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus viendra et il tuera cet homme. Jésus va le détruire avec le souffle de sa bouche. Lorsque Jésus paraîtra avec une grande puissance, cet ennemi de Dieu ne sera plus là !'
  '9':
  - type: text
    content: 'Lorsque l’ennemi de Dieu paraîtra, il accomplira l’œuvre de Satan. Satan lui donnera le pouvoir d’accomplir de grandes choses et des miracles qui sont faux. '
