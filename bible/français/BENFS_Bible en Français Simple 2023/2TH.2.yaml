document_id: 2TH.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le jour où le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus reviendra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nos amis chrétiens, nous devons maintenant expliquer quelque chose au sujet du moment où notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' reviendra. C’est le moment où il nous réunira tous pour être avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'S’il vous plaît, ne vous embrouillez pas facilement à ce sujet. N’ayez pas peur à cause de faux messages sur le retour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Certaines personnes vous disent que le grand jour du retour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est déjà arrivé. Certaines de ces personnes disent que l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu leur a montré un message comme ça. D’autres pourraient dire que le message vient de nous. Ou ils pourraient dire que nous l’avons écrit dans une lettre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne laissez personne vous tromper de cette façon. Ce jour n’aura pas lieu tant que d’autres choses ne se seront pas produites. Avant ce jour, il y aura un moment où beaucoup de gens se tourneront contre Dieu. Aussi, l’homme qui est complètement contre Dieu apparaîtra. Dieu le détruira sûrement à la fin. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cet homme sera le grand ennemi de Dieu. Il dira qu’il est plus grand que tout ce que les gens appellent leurs dieux. Il dira qu’il est plus grand que tout ce que les gens adorent. En conséquence, il ira même dans la maison de Dieu. Il s’assoira comme un roi. Il dira à tout le monde qu’il est lui‑même Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je vous ai dit ces choses quand j’étais avec vous. Je suis sûr que vous vous en souvenez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quelque chose empêche encore cet homme de venir. Et vous savez ce que c’est. Mais cet homme apparaîtra au bon moment. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sa puissance travaille déjà en secret pour tourner les gens contre Dieu. Mais il y a quelqu’un ou quelque chose qui l’empêche de travailler librement. Ce sera jusqu’à ce que Dieu le fasse disparaître. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors l’homme qui est contre Dieu apparaîtra. Mais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus viendra et il tuera cet homme. Jésus va le détruire avec le souffle de sa bouche. Lorsque Jésus paraîtra avec une grande puissance, cet ennemi de Dieu ne sera plus là !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque l’ennemi de Dieu paraîtra, il accomplira l’œuvre de Satan. Satan lui donnera le pouvoir d’accomplir de grandes choses et des miracles qui sont faux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il fera toutes sortes de mauvaises choses qui trompent les gens. Les gens qu’il trompera, sont des gens que Dieu détruira. Ces gens croient aux fausses choses, parce qu’ils ont refusé d’accepter le vrai message de Dieu. S’ils avaient aimé ce vrai message, Dieu pourrait les sauver. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pour cette raison, Dieu laisse leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' accepter quelque chose de mal. Ils croient à un faux message. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En conséquence, Dieu les punira tous. Ils ont refusé de croire à ce qui est vrai. Mais, ils ont aimé de faire de très mauvaises choses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les croyants doivent continuer de croire en Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous remercions toujours Dieu pour vous, nos amis chrétiens que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' aime. Nous devons remercier Dieu, car il a choisi de vous sauver. Dieu vous a choisis pour lui appartenir, comme certaines de premières personnes qu’il sauvera. Vous avez cru au vrai message de Dieu. Et l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous sépare de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous vous avons annoncé la Bonne Nouvelle de Dieu. C’est ainsi que Dieu vous a joints à lui. Il vous a sauvés, afin que vous vous joigniez à notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est pourquoi, nos amis chrétiens, vous devez continuer de croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Continuez de croire aux vraies choses que nous vous avons enseignées. Ce sont les choses que nous vous avons dites lorsque nous étions avec vous. Nous en avons également parlé dans notre lettre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous demandons à notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même et à Dieu, notre Père, de vous aider. Dieu a montré qu’il nous aime beaucoup. Grâce à lui, nous sommes courageux et forts pour toujours. Nous continuons d’espérer les bonnes choses à venir. Oui, Dieu a été très gentil avec nous !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nous prions pour qu’il continue de vous aider et de vous fortifier. Vous pourrez alors faire et dire toujours de bonnes choses.
