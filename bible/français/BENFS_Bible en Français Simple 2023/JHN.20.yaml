document_id: JHN.20,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 20
  - type: heading
    content: Le tombeau est vide
  - type: text
    content: 'Tôt le premier jour de la semaine, Marie de Magdala est allée au tombeau. Il faisait encore sombre. Elle a vu que quelqu’un avait enlevé la grosse pierre du tombeau. '
  '10':
  - type: text
    content: 'Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' sont rentrés chez eux. '
  '11':
  - type: text
    content: 'Mais Marie se tenait dehors près du tombeau. Elle pleurait. Pendant qu’elle pleurait, elle se baissait pour regarder à l’intérieur du tombeau. '
  '12':
  - type: text
    content: 'Elle a vu 2 '
  - type: text
    content: anges
  - type: text
    content: '. Ils portaient des vêtements blancs. Ils étaient assis là où le corps mort de Jésus avait été. Un '
  - type: text
    content: ange
  - type: text
    content: ' était assis là où la tête de Jésus avait été. L’autre '
  - type: text
    content: ange
  - type: text
    content: ' était assis où ses pieds avaient été.'
  '13':
  - type: text
    content: 'Ils lui ont demandé : Femme, pourquoi pleures‑tu ? '
  '14':
  - type: text
    content: 'Elle a répondu : Ils ont enlevé mon '
  - type: text
    content: Seigneur
  - type: text
    content: '. Et je ne sais pas où ils l’ont mis. Quand elle a dit cela, elle s’est retournée. Et elle a vu un homme qui se tenait là. C’était Jésus, mais elle ne l’a pas reconnu. '
  '15':
  - type: text
    content: 'Jésus lui a dit : Femme, pourquoi pleures‑tu ? Qui cherches‑tu ? Elle pensait que c’était le jardinier. Alors, elle a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', si tu l’as emporté, dis‑moi s’il te plaît. Dis‑moi où tu l’as mis. Ensuite, je le prendrai.'
  '16':
  - type: text
    content: 'Jésus lui a dit : Marie. Elle s’est tournée vers lui. Elle a dit dans la langue des '
  - type: text
    content: Juifs
  - type: text
    content: ' : Rabbouni ! (Cela signifie Maître.) '
  '17':
  - type: text
    content: 'Jésus a dit : Ne me touche pas, parce que je ne suis pas encore monté vers le Père. Mais va auprès de mes frères. Dites‑leur : Je monte vers mon Père. Et il est votre Père. Il est mon Dieu, et il est votre Dieu. '
  '18':
  - type: text
    content: 'Marie de Magdala est allée auprès des '
  - type: text
    content: disciples
  - type: text
    content: '. Elle leur a dit : J’ai vu le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Puis elle leur a dit ce qu’il lui avait dit.'
  - type: heading
    content: Jésus apparaît à ses disciples
  '19':
  - type: text
    content: 'Le soir de ce même jour, le premier jour de la semaine, les '
  - type: text
    content: disciples
  - type: text
    content: ' étaient tous ensemble. Ils avaient fermé les portes de la salle avec la clef. Ils avaient peur des dirigeants '
  - type: text
    content: juifs
  - type: text
    content: '. Alors Jésus est venu. Il se tenait parmi eux. Il leur a dit : Soyez tranquilles dans vos cœurs et vos '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Alors, elle a couru à l’endroit où Simon Pierre était. Il était avec l’autre '
  - type: text
    content: disciple
  - type: text
    content: ', celui que Jésus aimait. Elle leur a dit : Ils ont enlevé le '
  - type: text
    content: Seigneur
  - type: text
    content: ' du tombeau. Et nous ne savons pas où ils l’ont mis !'
  '20':
  - type: text
    content: 'Après avoir dit cela, il leur a montré ses mains et son côté. Les '
  - type: text
    content: disciples
  - type: text
    content: ' étaient très heureux quand ils ont vu le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Jésus a dit encore : Soyez tranquilles dans vos cœurs et vos '
  - type: text
    content: esprits
  - type: text
    content: '. Comme le Père m’a envoyé, je vous envoie aussi. '
  '22':
  - type: text
    content: 'Quand il a dit cela, il a sorti l’air de sa bouche pour souffler sur eux. Et il a dit : Recevez l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. '
  '23':
  - type: text
    content: Si vous pardonnez les péchés d’une personne, Dieu lui pardonnera aussi. Si vous ne pardonnez pas, Dieu ne lui pardonnera pas non plus.
  - type: heading
    content: Jésus se montre lui‑même à Thomas
  '24':
  - type: text
    content: 'Thomas était l’un de douze '
  - type: text
    content: apôtres
  - type: text
    content: '. Il n’était pas avec les autres '
  - type: text
    content: disciples
  - type: text
    content: ' quand Jésus est venu. Thomas était aussi appelé Jumeau. '
  '25':
  - type: text
    content: 'Les autres '
  - type: text
    content: disciples
  - type: text
    content: ' lui ont dit : Nous avons vu le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Mais Thomas leur a dit : Je peux croire, seulement si je le vois. Je veux voir les marques des clous dans ses mains. Je veux mettre mon doigt là où les clous étaient. Je veux mettre ma main dans le trou de son côté. Je ne veux pas croire à moins que je fasse ces choses.'
  '26':
  - type: text
    content: '8 jours après, les '
  - type: text
    content: disciples
  - type: text
    content: ' étaient dans la maison à nouveau. Thomas était avec eux. Ils avaient fermé la porte. Mais Jésus est venu. Il se tenait parmi eux. Il a dit : Soyez tranquilles dans votre cœur et dans votre '
  - type: text
    content: esprit
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Puis il a dit à Thomas : Avance ton doigt ici. Regarde mes mains. Mets ta main dans mon côté. Ne refuse pas de croire, mais au contraire, crois. '
  '28':
  - type: text
    content: 'Thomas lui a répondu : Mon '
  - type: text
    content: Seigneur
  - type: text
    content: ' et mon Dieu ! '
  '29':
  - type: text
    content: 'Jésus lui a dit : Tu crois, parce que tu m’as vu. D’autres gens ne m’ont pas vu, mais ils croient en moi. Et Dieu sera bon envers ces gens.'
  - type: heading
    content: Le but de ce livre
  '3':
  - type: text
    content: 'Alors Pierre et l’autre '
  - type: text
    content: disciple
  - type: text
    content: ' ont commencé à aller au tombeau. '
  '30':
  - type: text
    content: 'Jésus a fait beaucoup d’autres miracles. C’était quand il était avec ses '
  - type: text
    content: disciples
  - type: text
    content: '. Je ne les ai pas écrits dans ce livre. '
  '31':
  - type: text
    content: 'Mais j’ai écrit ces choses, afin que vous soyez en mesure de croire. Vous serez en mesure de croire que Jésus est le '
  - type: text
    content: Christ
  - type: text
    content: ', le Fils de Dieu. Et quand vous croyez, vous serez en mesure de vivre. Vous serez en mesure de vivre avec lui.'
  '4':
  - type: text
    content: 'Les 2 couraient. Mais l’autre '
  - type: text
    content: disciple
  - type: text
    content: ' a couru plus vite que Pierre. Donc, il a atteint d’abord le tombeau. '
  '5':
  - type: text
    content: 'Il s’est penché. Il a vu là les longs morceaux de tissu qui étaient par terre. Mais il n’est pas entré là. '
  '6':
  - type: text
    content: 'Simon Pierre a couru derrière l’autre '
  - type: text
    content: disciple
  - type: text
    content: '. Quand Pierre est arrivé, il est allé dans le tombeau. Il a vu là les longs morceaux de tissu. '
  '7':
  - type: text
    content: 'En '
  - type: text
    content: outre
  - type: text
    content: ', il a vu la pièce de tissu qui était autour de la tête de Jésus. Cela n’était pas au même endroit que les autres morceaux de tissu. Quelqu’un l’avait soigneusement mis dans un endroit séparé. '
  '8':
  - type: text
    content: 'Alors l’autre '
  - type: text
    content: disciple
  - type: text
    content: ', qui était arrivé le premier au tombeau, est allé aussi à l’intérieur. Il a vu et il a cru. '
  '9':
  - type: text
    content: Ils ne comprenaient toujours pas ce que dit l’Ancien Testament. Il dit que Jésus devait devenir de nouveau vivant. Après sa mort, il devait redevenir vivant.
  - type: heading
    content: Jésus apparaît à Marie de Magdala
