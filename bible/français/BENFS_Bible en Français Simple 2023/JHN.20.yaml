document_id: JHN.20
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 20
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le tombeau est vide
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tôt le premier jour de la semaine, Marie de Magdala est allée au tombeau. Il faisait encore sombre. Elle a vu que quelqu’un avait enlevé la grosse pierre du tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors, elle a couru à l’endroit où Simon Pierre était. Il était avec l’autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ', celui que Jésus aimait. Elle leur a dit : Ils ont enlevé le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' du tombeau. Et nous ne savons pas où ils l’ont mis !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Pierre et l’autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' ont commencé à aller au tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les 2 couraient. Mais l’autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' a couru plus vite que Pierre. Donc, il a atteint d’abord le tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il s’est penché. Il a vu là les longs morceaux de tissu qui étaient par terre. Mais il n’est pas entré là. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Simon Pierre a couru derrière l’autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: '. Quand Pierre est arrivé, il est allé dans le tombeau. Il a vu là les longs morceaux de tissu. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En '
  - type: usfm
    marker: w
    children:
    - type: text
      text: outre
  - type: text
    text: ', il a vu la pièce de tissu qui était autour de la tête de Jésus. Cela n’était pas au même endroit que les autres morceaux de tissu. Quelqu’un l’avait soigneusement mis dans un endroit séparé. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors l’autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ', qui était arrivé le premier au tombeau, est allé aussi à l’intérieur. Il a vu et il a cru. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils ne comprenaient toujours pas ce que dit l’Ancien Testament. Il dit que Jésus devait devenir de nouveau vivant. Après sa mort, il devait redevenir vivant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus apparaît à Marie de Magdala
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont rentrés chez eux. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais Marie se tenait dehors près du tombeau. Elle pleurait. Pendant qu’elle pleurait, elle se baissait pour regarder à l’intérieur du tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle a vu 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. Ils portaient des vêtements blancs. Ils étaient assis là où le corps mort de Jésus avait été. Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' était assis là où la tête de Jésus avait été. L’autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' était assis où ses pieds avaient été.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils lui ont demandé : Femme, pourquoi pleures‑tu ? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle a répondu : Ils ont enlevé mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Et je ne sais pas où ils l’ont mis. Quand elle a dit cela, elle s’est retournée. Et elle a vu un homme qui se tenait là. C’était Jésus, mais elle ne l’a pas reconnu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus lui a dit : Femme, pourquoi pleures‑tu ? Qui cherches‑tu ? Elle pensait que c’était le jardinier. Alors, elle a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', si tu l’as emporté, dis‑moi s’il te plaît. Dis‑moi où tu l’as mis. Ensuite, je le prendrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus lui a dit : Marie. Elle s’est tournée vers lui. Elle a dit dans la langue des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' : Rabbouni ! (Cela signifie Maître.) '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus a dit : Ne me touche pas, parce que je ne suis pas encore monté vers le Père. Mais va auprès de mes frères. Dites‑leur : Je monte vers mon Père. Et il est votre Père. Il est mon Dieu, et il est votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Marie de Magdala est allée auprès des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Elle leur a dit : J’ai vu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Puis elle leur a dit ce qu’il lui avait dit.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus apparaît à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le soir de ce même jour, le premier jour de la semaine, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' étaient tous ensemble. Ils avaient fermé les portes de la salle avec la clef. Ils avaient peur des dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: '. Alors Jésus est venu. Il se tenait parmi eux. Il leur a dit : Soyez tranquilles dans vos cœurs et vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après avoir dit cela, il leur a montré ses mains et son côté. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' étaient très heureux quand ils ont vu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus a dit encore : Soyez tranquilles dans vos cœurs et vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Comme le Père m’a envoyé, je vous envoie aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quand il a dit cela, il a sorti l’air de sa bouche pour souffler sur eux. Et il a dit : Recevez l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si vous pardonnez les péchés d’une personne, Dieu lui pardonnera aussi. Si vous ne pardonnez pas, Dieu ne lui pardonnera pas non plus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus se montre lui‑même à Thomas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Thomas était l’un de douze '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. Il n’était pas avec les autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' quand Jésus est venu. Thomas était aussi appelé Jumeau. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' lui ont dit : Nous avons vu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Mais Thomas leur a dit : Je peux croire, seulement si je le vois. Je veux voir les marques des clous dans ses mains. Je veux mettre mon doigt là où les clous étaient. Je veux mettre ma main dans le trou de son côté. Je ne veux pas croire à moins que je fasse ces choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '8 jours après, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' étaient dans la maison à nouveau. Thomas était avec eux. Ils avaient fermé la porte. Mais Jésus est venu. Il se tenait parmi eux. Il a dit : Soyez tranquilles dans votre cœur et dans votre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis il a dit à Thomas : Avance ton doigt ici. Regarde mes mains. Mets ta main dans mon côté. Ne refuse pas de croire, mais au contraire, crois. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Thomas lui a répondu : Mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et mon Dieu ! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus lui a dit : Tu crois, parce que tu m’as vu. D’autres gens ne m’ont pas vu, mais ils croient en moi. Et Dieu sera bon envers ces gens.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le but de ce livre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus a fait beaucoup d’autres miracles. C’était quand il était avec ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Je ne les ai pas écrits dans ce livre. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais j’ai écrit ces choses, afin que vous soyez en mesure de croire. Vous serez en mesure de croire que Jésus est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', le Fils de Dieu. Et quand vous croyez, vous serez en mesure de vivre. Vous serez en mesure de vivre avec lui.'
