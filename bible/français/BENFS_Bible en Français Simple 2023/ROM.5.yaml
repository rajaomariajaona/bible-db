document_id: ROM.5,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 5
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nous sommes devenus amis de Dieu à cause de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous voyons donc que Dieu nous a acceptés comme justes, parce que nous croyons en lui. En conséquence, nous sommes amis avec Dieu, à cause de ce que notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a fait pour nous. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant que nous étions encore les ennemis de Dieu, le Fils de Dieu est mort pour nous. En conséquence, nous sommes devenus amis de Dieu. Ainsi, maintenant que nous sommes amis de Dieu, son Fils va certainement nous sauver. Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' nous sauvera, parce qu’il est de nouveau vivant. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ce n’est pas tout ! Nous sommes très heureux maintenant à cause de ce que Dieu a fait pour nous. Notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a rendu cela possible. C’est à cause de lui que nous sommes maintenant devenus les amis de Dieu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adam et Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est à cause d’un seul homme, Adam, que le péché est venu dans le monde. La mort était le résultat du péché d’Adam. À cause de cela, la mort est venue à tout le monde, parce que tout le monde n’a pas obéi à Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant que Dieu ne donne sa loi à Moïse, les gens faisaient de mauvaises choses. Le péché était déjà là dans le monde. Mais à cette époque, Dieu n’a pas dit que les gens étaient fautifs, car il n’y avait pas de loi à obéir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais la mort régnait toujours sur tout le monde, depuis le temps où Adam a vécu jusqu’au temps où Moïse a vécu. Tout le monde est mort, même ceux qui n’ont pas échoué de la même manière qu’Adam avait échoué.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adam nous montre quelque chose sur le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' spécial de Dieu qui viendra à un moment futur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ce n’est pas la même chose. Adam était l’homme qui n’a pas obéi à ce que Dieu lui avait dit. Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est l’homme qui a apporté le don gratuit de Dieu aux gens. Adam n’était qu’une seule personne, mais de nombreuses personnes sont mortes à cause de son péché. Mais Dieu a montré d’une manière plus grande qu’il est très gentil avec les gens. Beaucoup de gens ont reçu le don de Dieu à cause d’un seul homme, Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Il a été très gentil avec beaucoup de gens !
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, le don de Dieu est différent du résultat du péché d’Adam. Adam a choisi de ne pas obéir à Dieu une fois. Par conséquent, Dieu l’a puni. Mais le résultat du don de Dieu est plus grand. Les gens ont fait beaucoup de mauvaises choses, pas seulement une mauvaise chose, mais Dieu les accepte comme étant justes avec lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un homme, Adam, n’a pas obéi à Dieu, et la mort a commencé à régner sur tout le monde en conséquence. Mais ce que l’unique homme, Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', a fait est bien plus grand !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grâce à lui, les gens peuvent devenir justes avec Dieu. Ils reçoivent ce grand don de Dieu, parce qu’il est très bon et très gentil. En raison de ce que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a fait, ces gens règnent comme des rois dans leur vie.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, la punition de Dieu est venue à tout le monde à cause d’une seule mauvaise chose qu’Adam a faite. Mais la seule chose que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a faite rend les gens libres. Dieu accepte tout le monde à cause de cette seule bonne chose que Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a faite. Ces gens reçoivent la vraie vie de Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un homme n’a pas obéi à Dieu et, par conséquent, de nombreuses personnes sont devenues fautives à cause de leurs péchés. Mais, parce qu’un seul homme a obéi à Dieu, beaucoup de gens deviendront justes avec Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De plus, parce que nous avons confiance en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', il nous a fait savoir que Dieu est très bon. Cela nous rend forts dans nos vies ici. Nous sommes également sûrs que nous vivrons avec Dieu dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Nous sommes donc heureux.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a donné sa loi à Moïse pour montrer plus clairement que les gens faisaient de mauvaises choses. Mais quand les gens faisaient de plus en plus de mauvaises choses, Dieu a continué d’être bon de plusieurs manières. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous voyons que le péché a dirigé la vie des gens et leur a causé la mort. Mais le don de Dieu rend les gens bien avec lui, et c’est ce qui dirige leur vie. Les gens reçoivent ce don, parce que Dieu est bon. En conséquence, ils auront la vie avec Dieu pour toujours, à cause de ce que notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a fait.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous sommes heureux même lorsque nous avons des souffrances. C’est parce que nous savons que ces problèmes nous aident à devenir patients et forts. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand nous restons forts, nous montrons que nous avons confiance en Dieu. Lorsque nous faisons confiance en Dieu, cela nous fait espérer l’aide de Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand nous espérons ainsi, cela ne nous décevra pas. C’est parce que nous savons que Dieu nous aime beaucoup. Dieu a donné son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' pour être avec nous. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' nous fait très bien connaître l’amour de Dieu.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À un moment donné, nous étions faibles. Puis au bon moment, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort pour nous sauver. Il est mort pour les gens qui n’ont pas obéi à Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne n’acceptera de mourir pour une autre personne, même si cette personne a fait ce qui est bien. Peut‑être que quelqu’un pourrait être assez courageux pour mourir au nom d’une personne très bonne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Dieu nous a montré combien il nous aime. Même lorsque nous n’avons toujours pas obéi à Dieu, Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort pour nous.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puisque que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort sur la croix, Dieu nous a acceptés comme justes avec lui‑même. Ainsi, nous savons certainement que Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' nous sauvera quand Dieu jugera tout le monde. À cause de Jésus, Dieu ne sera pas en colère contre nous et ne nous punira pas. '
