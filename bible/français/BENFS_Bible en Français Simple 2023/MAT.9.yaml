document_id: MAT.9
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 9
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus aide un homme qui ne peut pas marcher
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et puis, Jésus est remonté dans le petit bateau. Il est allé de l’autre côté de la mer à nouveau. Il est retourné à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Capernaüm
  - type: text
    text: ', la ville où il vivait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certains hommes de la ville sont venus voir Jésus. Ils ont amené un autre homme. Cet homme ne pouvait pas marcher. Il était couché sur un petit lit. Jésus a vu les hommes. Et Jésus savait leurs pensées. Ils croyaient que Jésus pouvait guérir l’homme qui était sur un petit lit. Jésus a dit à l’homme qui ne pouvait pas marcher : Courage, mon enfant. Dieu a pardonné tes péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ensuite, certains enseignants de la loi ont commencé à parler les uns aux autres : Cet homme ne devrait pas dire cela, il parle comme s’il était Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus savait les pensées de ces enseignants. Alors il leur a dit : Vous avez de mauvaises pensées en vous. Pourquoi cela ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Est‑il plus facile de dire : Dieu a pardonné tes péchés ? Ou est‑il plus facile de dire : Lève‑toi et marche ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je veux que vous sachiez ceci : Le Fils de l’homme a réellement le pouvoir sur la terre. Il peut pardonner les péchés. Puis Jésus a dit à l’homme qui ne pouvait pas marcher : Lève‑toi. Prends ton petit lit et rentre à la maison.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors l’homme s’est levé et il est rentré chez lui. 
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les gens ont vu cela. Ils avaient aussi peur. Ils ont vu que Dieu a donné un tel pouvoir aux hommes. Donc, ils ont dit : Dieu est grand et puissant !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus demande à Matthieu de le suivre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus est allé plus loin de cet endroit. Alors qu’il marchait, il a vu un homme appelé Matthieu. Il était assis dans un bureau. Son travail était de percevoir l’argent des taxes. Jésus lui a dit : Suis‑moi. Donc, Matthieu s’est levé et il a suivi Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Plus tard, Jésus était dans la maison de Matthieu. Jésus mangeait un repas. Beaucoup d’autres hommes qui percevaient de l’argent des taxes étaient là. Il y avait aussi beaucoup de gens qui n’obéissaient pas à la loi de Dieu. Tous ces gens sont venus pour manger un repas avec Jésus et ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont vu tous ces gens manger un repas avec Jésus. Ils ont demandé aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus : Pourquoi votre Maître mange‑t‑il avec ces gens ? Ce sont des gens qui font de mauvaises choses. Et certains d’entre eux perçoivent l’argent des taxes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus a appris ce que ces  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' disaient. Il leur a dit : Les gens qui sont bien n’ont pas besoin d’un médecin. Ce sont plutôt les malades qui ont besoin d’un médecin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Allez et apprenez ce que signifient ces paroles de Dieu : Je veux que vous ayez véritablement de l’amour envers les autres. Je ne veux pas que vous me donniez vos offrandes. Il y a des gens qui pensent qu’ils n’ont rien fait de mal. Je ne demande pas à ces gens d’être mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Mais il y a des gens qui savent qu’ils ont fait de mauvaises choses. Ce sont ces gens que je veux être mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors, quelques‑uns des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' sont venus auprès de Jésus. Ils lui ont demandé : Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et nous, nous arrêtons souvent de manger pour que nous puissions prier. Pourquoi tes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ne font jamais cela ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus leur a répondu : Les amis de l’époux ne peuvent pas être tristes quand il est encore avec eux. Le temps viendra où quelqu’un enlèvera l’époux. Ils seront alors tristes et arrêteront de manger un moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Jésus a dit : Les gens ne cousent pas une pièce d’un nouveau tissu sur un vieil habit. Quand ils lavent l’habit, la pièce du nouveau tissu emportera une partie du vieil habit. Alors le trou sera plus grand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les gens ne versent pas de vin nouveau dans de vieilles outres. S’ils le font, les outres vont éclater. Le vin va se répandre et les outres seront inutiles. Non, les gens versent du nouveau vin dans de nouvelles outres. Dans ce cas, le vin et les outres seront bien conservés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus ressuscite une jeune fille morte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus disait ces choses aux gens. Pendant ce temps, un chef est venu auprès de lui. L’homme s’est mis à genoux devant Jésus. Il lui a dit : Ma fille vient de mourir. Viens chez moi. Tu poseras les mains sur elle. Puis elle sera de nouveau bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors Jésus a commencé à aller avec l’homme. Et ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont aussi allés avec lui. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Une femme était dans la foule près de Jésus. Elle perdait du sang tous les jours pendant 12 ans. Elle s’est approchée de Jésus par derrière. Elle a alors touché le bord de son vêtement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La femme a pensé : Si je peux seulement toucher le vêtement de Jésus, je deviendrai bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus s’est retourné et il a vu la femme. Il a dit : Jeune femme, n’aie pas peur, tu es guérie parce que tu as cru en moi. Immédiatement, la femme était guérie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quand Jésus est entré dans la maison du chef, il a vu les joueurs de flûte. Les gens faisaient beaucoup de bruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus a parlé à tout le monde dans la maison : Sortez d’ici, cette fille n’est pas morte. Elle dort. Les gens se moquaient de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais la famille a envoyé la foule hors de la maison. Alors Jésus est entré dans la chambre où la jeune fille était couchée. Jésus a touché la main de la jeune fille. Elle s’est levée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Après cela, les gens ont commencé à parler de ce qui était arrivé. Ils disaient cela à d’autres personnes dans toute cette partie du pays.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit 2 hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus a quitté la maison. Alors qu’il marchait, 2 hommes ont commencé à le suivre. Ils étaient aveugles. Ils criaient à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: fils de David
  - type: text
    text: ', aie pitié et aide‑nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus est entré dans une maison. Et les aveugles sont venus auprès de Jésus. Jésus leur a demandé : Croyez‑vous que je puisse guérir vos yeux ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les hommes ont répondu : Oui, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', nous pensons que tu peux le faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors Jésus a touché les yeux des hommes et il a dit : Parce que vous avez cru en moi, vos yeux vont commencer à voir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et aussitôt, les hommes ont commencé à voir. Jésus leur a strictement dit : Ne dites à personne ce qui s’est passé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mais ils sont allés. Et puis, ils parlaient de cela dans toute la région.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus fait parler un homme qui ne parlait pas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ces 2 hommes sont allés. Pendant ce temps, certaines personnes ont amené un autre homme auprès de Jésus. Cet homme ne pouvait pas parler. C’était à cause d’un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' qui était en lui.  '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus a dit au mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '  : Quitte cet homme. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' l’a quitté, et l’homme a commencé à parler. Tous les gens étaient très surpris. Ils ont dit : Personne n’a jamais fait une telle chose en Israël avant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' disaient : C’est le prince des démons qui aide Jésus à chasser les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus est allé visiter de nombreuses villes et beaucoup de villages dans cette partie du pays. Il enseignait les gens dans les bâtiments de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Il enseignait la Bonne Nouvelle du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: . Il guérissait également tous les malades.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus veut que Dieu envoie plus de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Quand Jésus a vu la foule des gens, il avait pitié d’eux. Les gens étaient inquiets. Ils étaient aussi très faibles. Ils étaient comme des brebis sans personne pour s’en occuper. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : La récolte est abondante, mais il y a peu de travailleurs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Demandez au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' de la récolte d’envoyer des travailleurs pour la récolte.'
