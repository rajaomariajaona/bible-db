document_id: MAT.9,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 9
  - type: heading
    content: Jésus aide un homme qui ne peut pas marcher
  - type: text
    content: 'Et puis, Jésus est remonté dans le petit bateau. Il est allé de l’autre côté de la mer à nouveau. Il est retourné à '
  - type: text
    content: Capernaüm
  - type: text
    content: ', la ville où il vivait.'
  '10':
  - type: text
    content: 'Plus tard, Jésus était dans la maison de Matthieu. Jésus mangeait un repas. Beaucoup d’autres hommes qui percevaient de l’argent des taxes étaient là. Il y avait aussi beaucoup de gens qui n’obéissaient pas à la loi de Dieu. Tous ces gens sont venus pour manger un repas avec Jésus et ses  '
  - type: text
    content: disciples
  - type: text
    content: .
  '11':
  - type: text
    content: 'Quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont vu tous ces gens manger un repas avec Jésus. Ils ont demandé aux '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus : Pourquoi votre Maître mange‑t‑il avec ces gens ? Ce sont des gens qui font de mauvaises choses. Et certains d’entre eux perçoivent l’argent des taxes.'
  '12':
  - type: text
    content: 'Jésus a appris ce que ces  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' disaient. Il leur a dit : Les gens qui sont bien n’ont pas besoin d’un médecin. Ce sont plutôt les malades qui ont besoin d’un médecin. '
  '13':
  - type: text
    content: 'Allez et apprenez ce que signifient ces paroles de Dieu : Je veux que vous ayez véritablement de l’amour envers les autres. Je ne veux pas que vous me donniez vos offrandes. Il y a des gens qui pensent qu’ils n’ont rien fait de mal. Je ne demande pas à ces gens d’être mes  '
  - type: text
    content: disciples
  - type: text
    content: '. Mais il y a des gens qui savent qu’ils ont fait de mauvaises choses. Ce sont ces gens que je veux être mes  '
  - type: text
    content: disciples
  - type: text
    content: .
  '14':
  - type: text
    content: 'Alors, quelques‑uns des '
  - type: text
    content: disciples
  - type: text
    content: ' de Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' sont venus auprès de Jésus. Ils lui ont demandé : Les  '
  - type: text
    content: disciples
  - type: text
    content: ' des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et nous, nous arrêtons souvent de manger pour que nous puissions prier. Pourquoi tes  '
  - type: text
    content: disciples
  - type: text
    content: ' ne font jamais cela ?'
  '15':
  - type: text
    content: 'Jésus leur a répondu : Les amis de l’époux ne peuvent pas être tristes quand il est encore avec eux. Le temps viendra où quelqu’un enlèvera l’époux. Ils seront alors tristes et arrêteront de manger un moment.'
  '16':
  - type: text
    content: 'Alors Jésus a dit : Les gens ne cousent pas une pièce d’un nouveau tissu sur un vieil habit. Quand ils lavent l’habit, la pièce du nouveau tissu emportera une partie du vieil habit. Alors le trou sera plus grand.'
  '17':
  - type: text
    content: Les gens ne versent pas de vin nouveau dans de vieilles outres. S’ils le font, les outres vont éclater. Le vin va se répandre et les outres seront inutiles. Non, les gens versent du nouveau vin dans de nouvelles outres. Dans ce cas, le vin et les outres seront bien conservés.
  - type: heading
    content: Jésus ressuscite une jeune fille morte
  '18':
  - type: text
    content: 'Jésus disait ces choses aux gens. Pendant ce temps, un chef est venu auprès de lui. L’homme s’est mis à genoux devant Jésus. Il lui a dit : Ma fille vient de mourir. Viens chez moi. Tu poseras les mains sur elle. Puis elle sera de nouveau bien. '
  '19':
  - type: text
    content: 'Alors Jésus a commencé à aller avec l’homme. Et ses  '
  - type: text
    content: disciples
  - type: text
    content: ' sont aussi allés avec lui. '
  '2':
  - type: text
    content: 'Certains hommes de la ville sont venus voir Jésus. Ils ont amené un autre homme. Cet homme ne pouvait pas marcher. Il était couché sur un petit lit. Jésus a vu les hommes. Et Jésus savait leurs pensées. Ils croyaient que Jésus pouvait guérir l’homme qui était sur un petit lit. Jésus a dit à l’homme qui ne pouvait pas marcher : Courage, mon enfant. Dieu a pardonné tes péchés. '
  '20':
  - type: text
    content: 'Une femme était dans la foule près de Jésus. Elle perdait du sang tous les jours pendant 12 ans. Elle s’est approchée de Jésus par derrière. Elle a alors touché le bord de son vêtement. '
  '21':
  - type: text
    content: 'La femme a pensé : Si je peux seulement toucher le vêtement de Jésus, je deviendrai bien.'
  '22':
  - type: text
    content: 'Jésus s’est retourné et il a vu la femme. Il a dit : Jeune femme, n’aie pas peur, tu es guérie parce que tu as cru en moi. Immédiatement, la femme était guérie.'
  '23':
  - type: text
    content: 'Quand Jésus est entré dans la maison du chef, il a vu les joueurs de flûte. Les gens faisaient beaucoup de bruit. '
  '24':
  - type: text
    content: 'Jésus a parlé à tout le monde dans la maison : Sortez d’ici, cette fille n’est pas morte. Elle dort. Les gens se moquaient de Jésus. '
  '25':
  - type: text
    content: 'Mais la famille a envoyé la foule hors de la maison. Alors Jésus est entré dans la chambre où la jeune fille était couchée. Jésus a touché la main de la jeune fille. Elle s’est levée. '
  '26':
  - type: text
    content: Après cela, les gens ont commencé à parler de ce qui était arrivé. Ils disaient cela à d’autres personnes dans toute cette partie du pays.
  - type: heading
    content: Jésus guérit 2 hommes
  '27':
  - type: text
    content: 'Jésus a quitté la maison. Alors qu’il marchait, 2 hommes ont commencé à le suivre. Ils étaient aveugles. Ils criaient à Jésus : '
  - type: text
    content: fils de David
  - type: text
    content: ', aie pitié et aide‑nous. '
  '28':
  - type: text
    content: 'Jésus est entré dans une maison. Et les aveugles sont venus auprès de Jésus. Jésus leur a demandé : Croyez‑vous que je puisse guérir vos yeux ?'
  - type: text
    content: 'Les hommes ont répondu : Oui, '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous pensons que tu peux le faire. '
  '29':
  - type: text
    content: 'Alors Jésus a touché les yeux des hommes et il a dit : Parce que vous avez cru en moi, vos yeux vont commencer à voir.'
  '3':
  - type: text
    content: 'Ensuite, certains enseignants de la loi ont commencé à parler les uns aux autres : Cet homme ne devrait pas dire cela, il parle comme s’il était Dieu.'
  '30':
  - type: text
    content: 'Et aussitôt, les hommes ont commencé à voir. Jésus leur a strictement dit : Ne dites à personne ce qui s’est passé. '
  '31':
  - type: text
    content: Mais ils sont allés. Et puis, ils parlaient de cela dans toute la région.
  - type: heading
    content: Jésus fait parler un homme qui ne parlait pas
  '32':
  - type: text
    content: 'Ces 2 hommes sont allés. Pendant ce temps, certaines personnes ont amené un autre homme auprès de Jésus. Cet homme ne pouvait pas parler. C’était à cause d’un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' qui était en lui.  '
  '33':
  - type: text
    content: 'Jésus a dit au mauvais '
  - type: text
    content: esprit
  - type: text
    content: '  : Quitte cet homme. L’'
  - type: text
    content: esprit
  - type: text
    content: ' l’a quitté, et l’homme a commencé à parler. Tous les gens étaient très surpris. Ils ont dit : Personne n’a jamais fait une telle chose en Israël avant.'
  '34':
  - type: text
    content: 'Les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' disaient : C’est le prince des démons qui aide Jésus à chasser les mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Jésus est allé visiter de nombreuses villes et beaucoup de villages dans cette partie du pays. Il enseignait les gens dans les bâtiments de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il enseignait la Bonne Nouvelle du '
  - type: text
    content: Royaume des cieux
  - type: text
    content: . Il guérissait également tous les malades.
  - type: heading
    content: Jésus veut que Dieu envoie plus de  disciples
  '36':
  - type: text
    content: 'Quand Jésus a vu la foule des gens, il avait pitié d’eux. Les gens étaient inquiets. Ils étaient aussi très faibles. Ils étaient comme des brebis sans personne pour s’en occuper. '
  '37':
  - type: text
    content: 'Alors Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : La récolte est abondante, mais il y a peu de travailleurs.'
  '38':
  - type: text
    content: 'Demandez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' de la récolte d’envoyer des travailleurs pour la récolte.'
  '4':
  - type: text
    content: 'Jésus savait les pensées de ces enseignants. Alors il leur a dit : Vous avez de mauvaises pensées en vous. Pourquoi cela ? '
  '5':
  - type: text
    content: 'Est‑il plus facile de dire : Dieu a pardonné tes péchés ? Ou est‑il plus facile de dire : Lève‑toi et marche ? '
  '6':
  - type: text
    content: 'Je veux que vous sachiez ceci : Le Fils de l’homme a réellement le pouvoir sur la terre. Il peut pardonner les péchés. Puis Jésus a dit à l’homme qui ne pouvait pas marcher : Lève‑toi. Prends ton petit lit et rentre à la maison.'
  '7':
  - type: text
    content: Alors l’homme s’est levé et il est rentré chez lui. 
  '8':
  - type: text
    content: 'Les gens ont vu cela. Ils avaient aussi peur. Ils ont vu que Dieu a donné un tel pouvoir aux hommes. Donc, ils ont dit : Dieu est grand et puissant !'
  - type: heading
    content: Jésus demande à Matthieu de le suivre
  '9':
  - type: text
    content: 'Jésus est allé plus loin de cet endroit. Alors qu’il marchait, il a vu un homme appelé Matthieu. Il était assis dans un bureau. Son travail était de percevoir l’argent des taxes. Jésus lui a dit : Suis‑moi. Donc, Matthieu s’est levé et il a suivi Jésus.'
