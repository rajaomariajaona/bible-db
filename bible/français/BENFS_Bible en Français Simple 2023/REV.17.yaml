document_id: REV.17,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 17
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La grande prostituée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’un des 7 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' qui avaient les 7 coupes est venu vers moi. Il a dit : Viens. Je vais te montrer comment Dieu punira la grande prostituée. Elle est assise à un endroit où il y a beaucoup d’eau. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elles sont aussi une image de 7 rois. 5 de ces rois ont déjà laissé de gouverner. Un autre roi règne maintenant. Le dernier roi n’est pas encore venu. Lorsqu’il viendra, il devra régner seulement pour peu de temps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L’animal est l’image d’un huitième roi. Il était vivant une fois, mais il n’est pas vivant maintenant. Il appartient au groupe des 7 rois, mais Dieu le détruira complètement.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les 10 cornes que tu as vues sont une image de 10 autres rois. Ils n’ont encore commencé à diriger nulle part. Mais ils recevront le pouvoir de régner en tant que rois pendant une heure. Ils dirigeront les gens avec l’animal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils ont tous le même but. Ils donneront leur pouvoir à l’animal. Ils lui donneront le pouvoir de diriger les gens. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ensemble, ils mèneront une guerre contre l’Agneau. Mais l’Agneau gagnera contre eux. Il est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' au‑dessus de tous les seigneurs. C’est le roi qui règne sur tous les rois. Et le peuple de Dieu sera avec lui. Ce sont les gens que l’Agneau a choisis pour lui appartenir. Ce sont les gens qui continuent de lui faire confiance.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alors l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' m’a dit : Tu as vu les eaux où se trouve la prostituée. Ces eaux sont une image de personnes de nombreux pays. Ce sont des foules de gens de différents groupes familiaux et qui parlent de nombreuses langues différentes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L’animal et les 10 cornes que tu as vus détesteront la prostituée. Ils la détruiront. Ils la laisseront sans vêtements. Ils mangeront sa chair. Ensuite, ils la brûleront avec le feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ils décideront de le faire, parce que Dieu leur a donné ces pensées. Alors, ils feront ce qu’ils voudront. Ils donneront à l’animal leur pouvoir pour régner en tant que roi. L’animal continuera à régner jusqu’à ce que tout ce que Dieu a dit arrive réellement. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: La mauvaise femme que tu as vue est une image de la grande ville. Cette ville a le pouvoir sur tous les rois qui règnent sur la terre.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: C’est comme si les rois qui dirigent sur la terre avaient couché avec cette mauvaise femme. Elle a conduit les gens qui vivent sur la terre à faire de mauvaises choses. Ils sont devenus comme des ivrognes du vin fort qu’elle leur a donné.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Encore une fois, l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu m’a fait voir et entendre des choses étranges. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' m’a emmené dans un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. Là, j’ai vu une femme assise sur un animal rouge vif. Des noms étaient écrits partout sur cet animal. Ils insultaient Dieu. L’animal avait 7 têtes et 10 cornes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La femme portait des vêtements en tissu coûteux. Elle portait également des choses brillantes qui la rendaient belle. Elle brillait d’or, des pierres précieuses et des perles. Elle tenait une coupe d’or à la main. La coupe était pleine de mauvaises choses et sales qu’elle avait fait faire aux gens. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Un nom a été écrit sur le devant de sa tête. Seul Dieu sait ce que cela signifie. C’était :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Babylone puissante.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mère de toutes les prostituées.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Mère de tout ce que Dieu hait sur la terre.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'J’ai vu que la femme était ivre. Elle était comme quelqu’un qui avait bu le sang des gens de Dieu. Elle les avait tués, parce qu’ils avaient parlé de Jésus à d’autres personnes. Quand je l’ai vue, j’ai été très surpris. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Alors l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' m’a demandé : Pourquoi es‑tu surpris ? Je vais t’expliquer le secret de la femme. Je vais te faire savoir le secret de l’animal qui la portait. L’animal que tu as vu a 7 têtes et 10 cornes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Cet animal était vivant avant, mais il n’est pas vivant maintenant. Bientôt, il sortira à nouveau du trou profond, mais alors Dieu le détruira complètement. Cela surprendra de nombreuses personnes qui vivent sur la terre. Ce sont les gens dont les noms ne sont pas écrits dans le livre de vie de Dieu depuis le début du monde. Ils savent que l’animal était vivant une fois. Et ils savent qu’il n’est pas vivant maintenant. Donc, quand il réapparaîtra, cela les surprendra vraiment.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Si tu es sage, réfléchis bien à cela. Les 7 têtes de l’animal sont une image de 7 collines à l’endroit où la femme est assise. '
