document_id: TIT.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit bonjour à Tite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cette lettre vient de moi, Paul. Je suis le serviteur de Dieu et un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dieu m’a envoyé pour aider son peuple spécial à comprendre son vrai message et à lui faire confiance. En conséquence, son peuple vivra d’une manière qui rend Dieu heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le peuple de Dieu sera également sûr de vivre éternellement avec Dieu. Avant que le monde commence, Dieu avait promis que son peuple vivra avec lui. Et Dieu ne dit jamais de mensonges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dieu est celui qui nous sauve. Maintenant, au bon moment, il a rendu son message clair. Il m’a donné son message pour que je le dise aux gens. C’est ce qu’il m’a dit de faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je t’écris, Tite. Je t’ai dit le message de Jésus et maintenant nous croyons tous les 2 en lui. Tu es donc comme mon propre enfant. Je prie pour que Dieu, le Père, et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui nous sauve, continuent de t’aider. Je prie pour qu’ils te donnent la paix dans ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le travail de Tite en Crète
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je t’ai laissé là‑bas en Crète, afin que tu puisses terminer certaines choses. Tu dois corriger certaines choses qui ne vont pas. Et tu dois choisir les responsables des croyants dans chaque ville, comme je te l’ai dit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voici comment doit être un responsable dans l’Église. Personne ne peut trouver en lui quelque chose de mal. Il doit être le mari d’une seule femme. Il doit avoir des enfants qui le respectent. Personne ne doit dire qu’il aime de mauvaises choses ou qu’il n’obéit pas à ses parents.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Un responsable dans l’Église sert les croyants au nom de Dieu. Pour cette raison, personne ne peut dire qu’un responsable a fait quelque chose de mal. Un responsable ne doit pas être orgueilleux. Il ne doit pas se mettre facilement en colère. Il ne doit pas aimer boire trop de vin. Il ne doit pas être quelqu’un qui aime se battre. Il ne doit pas vouloir gagner beaucoup d’argent pour lui‑même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais, il doit être heureux d’avoir des visiteurs chez lui. Il doit vouloir faire de bonnes choses. Il doit être prudent dans sa façon de vivre. Il doit faire ce qui est bien. Il doit vouloir bien servir Dieu. Il doit bien se diriger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Un responsable dans l’Église doit continuer de croire très bien au vrai message. C’est cela le message que nous avons enseigné. Il pourra alors enseigner aux gens ce qui est vrai et juste. Il pourra également montrer que les gens qui s’opposent au vrai message ont tort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je dis cela parce qu’il y a beaucoup de gens qui enseignent de fausses choses qui n’ont aucune valeur. Ils n’obéissent à personne et veulent que les gens croient à leur faux message. Les gens qui veulent que les croyants obéissent à toutes les règles juives sont comme ça. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu ne dois pas laisser ces gens continuer d’enseigner de fausses choses comme ça. À cause d’eux, des familles entières croient aux mensonges. Ils enseignent des choses qu’ils ne devraient pas enseigner, car ils veulent que les gens leur donnent de l’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y a plusieurs années, un certain homme vivait en Crète. Les gens là‑bas l’appelaient leur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. Il a même dit : Les gens qui vivent en Crète sont toujours des menteurs et font de mauvaises choses. Ils sont paresseux et mangent trop de nourriture.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce que cet homme a dit, est vrai. Donc, tu dois avertir les gens là‑bas, afin qu’ils ne croient pas à ces fausses choses. Aide‑les à croire de mieux en mieux au vrai message sur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils doivent laisser d’écouter ces histoires juives. Ces choses ne sont pas vraies. Ils doivent laisser d’écouter les règles humaines. Ces choses sont les idées de personnes qui refusent d’obéir au vrai message.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si des gens sont purs et bons à l’intérieur, alors tout est pur et bon pour eux. Mais si des gens ne sont pas croyants et ont des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' impurs, alors rien n’est pur ou bon pour ces gens. Leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' sont devenus mauvais. Ils ne se sentent plus fautifs lorsqu’ils font quelque chose de mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les gens comme ça disent qu’ils connaissent Dieu. Mais ils font de mauvaises choses. Cela montre qu’ils ne le connaissent pas. Ils sont complètement mauvais. Ils refusent d’obéir à Dieu et ils ne peuvent rien faire de bien.
