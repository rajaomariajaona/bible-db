document_id: GAL.1,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 1
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est moi Paul qui écris cette lettre. Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et Dieu le Père m’ont envoyé. Dieu avait réveillé Jésus de la mort. Dieu et Jésus m’ont fait '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: '. Aucune personne ne m’a envoyé ou donné ce pouvoir. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien sûr, je ne dis pas cela pour plaire aux gens. Non, mais je fais ce que Dieu veut. Si je cherche à plaire aux gens, je ne peux plus être serviteur de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le message de Paul est de Dieu
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La Bonne Nouvelle que je vous ai enseignée n’est pas venue d’un homme. Je veux que vous le sachiez, mes frères. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aucune personne ne me l’a donnée. Aucune personne ne me l’a enseignée. Non, c’était Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même qui me l’a fait savoir.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’étais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juif
    - type: text
      text: '. Vous savez ce que je faisais. Je croyais beaucoup aux enseignements des Juifs. Et je faisais beaucoup souffrir l’Église de Dieu (les chrétiens). Je faisais tout pour la détruire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’étais un meilleur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: ' que les gens de mon âge. Je croyais en la religion de mes pères. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Dieu m’avait choisi avant même ma naissance. Il m’avait choisi pour être son serviteur, parce qu’il est très gentil. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il a décidé de me montrer son Fils. C’était pour que je parle de lui aux païens. Quand Dieu a fait cela en moi, je ne parlais à personne de cela.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne suis pas non plus allé à Jérusalem. Je pouvais voir là les apôtres de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Ces hommes étaient des apôtres avant moi. Mais je ne suis pas allé les voir. Non, au contraire, je suis allé immédiatement en Arabie. Et plus tard, je suis retourné à la ville de Damas.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis, 3 ans plus tard, je suis allé à Jérusalem. C’était pour rencontrer Pierre. Je suis resté avec lui pendant 15 jours.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n’ai pas vu d’autres apôtres. J’ai vu seulement Jacques, le frère du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y a des croyants ici avec moi. Ils s’adressent aussi à vous tous, croyants de Galatie.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce que je vous écris, est vrai. Et Dieu sait que c’est vrai !
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plus tard, je suis allé en Syrie et en Cilicie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les groupes des croyants en Judée ne m’avaient jamais rencontré.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens entendaient seulement dire des choses sur moi. Ils disaient : Cet homme faisait beaucoup de mauvaises choses avant. Il voulait empêcher les gens de croire en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Il faisait tout pour détruire notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: '. Mais maintenant, il dit aux gens de croire en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et donc, les croyants en Judée remerciaient Dieu à cause de moi. Et ils disaient combien Dieu est grand.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prie comme ceci : Que Dieu, notre Père et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' continuent d’être gentils envers vous. Qu’ils vous donnent la paix dans vos esprits. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus s’est lui‑même sacrifié pour notre mal. Nous vivons dans un mauvais monde. Il voulait donc nous sauver de ce mauvais monde. C’est cela le travail que Dieu lui avait donné au monde. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous rendons gloire à Dieu ! C’est vrai.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les croyants de Galatie écoutent des idées fausses
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous me surprenez ! Vous laissez brusquement Dieu. C’est lui qui vous a amenés à lui par '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Il vous a fait vivre par le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', parce qu’il est très gentil. Mais, vous écoutez maintenant d’autres enseignements.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vraiment, il n’y a pas d’autres enseignements. Certaines personnes vous troublent pour rien. Elles essaient de changer les enseignements au sujet de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne ne peut jamais enseigner une autre chose sur Dieu. Il n’y a que ce que nous vous avons enseigné. Ni nous, ni même un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ', nous ne pouvons jamais enseigner un autre message. Dieu punira toujours quelqu’un qui fait ça.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je répète ce que je viens de dire. Quelqu’un peut enseigner une autre chose sur Dieu. Cela est différent de ce que vous avez cru. Alors Dieu punira toujours quelqu’un qui fait cela.
