document_id: GAL.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: text
    content: C’est moi Paul qui écris cette lettre. Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' et Dieu le Père m’ont envoyé. Dieu avait réveillé Jésus de la mort. Dieu et Jésus m’ont fait '
  - type: text
    content: apôtre
  - type: text
    content: '. Aucune personne ne m’a envoyé ou donné ce pouvoir. '
  '10':
  - type: text
    content: 'Bien sûr, je ne dis pas cela pour plaire aux gens. Non, mais je fais ce que Dieu veut. Si je cherche à plaire aux gens, je ne peux plus être serviteur de '
  - type: text
    content: Christ
  - type: text
    content: .
  - type: heading
    content: Le message de Paul est de Dieu
  '11':
  - type: text
    content: 'La Bonne Nouvelle que je vous ai enseignée n’est pas venue d’un homme. Je veux que vous le sachiez, mes frères. '
  '12':
  - type: text
    content: Aucune personne ne me l’a donnée. Aucune personne ne me l’a enseignée. Non, c’était Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même qui me l’a fait savoir.'
  '13':
  - type: text
    content: 'J’étais '
  - type: text
    content: juif
  - type: text
    content: '. Vous savez ce que je faisais. Je croyais beaucoup aux enseignements des Juifs. Et je faisais beaucoup souffrir l’Église de Dieu (les chrétiens). Je faisais tout pour la détruire. '
  '14':
  - type: text
    content: 'J’étais un meilleur '
  - type: text
    content: Juif
  - type: text
    content: ' que les gens de mon âge. Je croyais en la religion de mes pères. '
  '15':
  - type: text
    content: 'Mais Dieu m’avait choisi avant même ma naissance. Il m’avait choisi pour être son serviteur, parce qu’il est très gentil. '
  '16':
  - type: text
    content: Il a décidé de me montrer son Fils. C’était pour que je parle de lui aux païens. Quand Dieu a fait cela en moi, je ne parlais à personne de cela.
  '17':
  - type: text
    content: 'Je ne suis pas non plus allé à Jérusalem. Je pouvais voir là les apôtres de '
  - type: text
    content: Christ
  - type: text
    content: . Ces hommes étaient des apôtres avant moi. Mais je ne suis pas allé les voir. Non, au contraire, je suis allé immédiatement en Arabie. Et plus tard, je suis retourné à la ville de Damas.
  '18':
  - type: text
    content: Puis, 3 ans plus tard, je suis allé à Jérusalem. C’était pour rencontrer Pierre. Je suis resté avec lui pendant 15 jours.
  '19':
  - type: text
    content: 'Je n’ai pas vu d’autres apôtres. J’ai vu seulement Jacques, le frère du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: Il y a des croyants ici avec moi. Ils s’adressent aussi à vous tous, croyants de Galatie.
  '20':
  - type: text
    content: Ce que je vous écris, est vrai. Et Dieu sait que c’est vrai !
  '21':
  - type: text
    content: 'Plus tard, je suis allé en Syrie et en Cilicie. '
  '22':
  - type: text
    content: Les groupes des croyants en Judée ne m’avaient jamais rencontré.
  '23':
  - type: text
    content: 'Les gens entendaient seulement dire des choses sur moi. Ils disaient : Cet homme faisait beaucoup de mauvaises choses avant. Il voulait empêcher les gens de croire en '
  - type: text
    content: Christ
  - type: text
    content: '. Il faisait tout pour détruire notre '
  - type: text
    content: foi
  - type: text
    content: '. Mais maintenant, il dit aux gens de croire en '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '24':
  - type: text
    content: Et donc, les croyants en Judée remerciaient Dieu à cause de moi. Et ils disaient combien Dieu est grand.
  '3':
  - type: text
    content: 'Je prie comme ceci : Que Dieu, notre Père et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continuent d’être gentils envers vous. Qu’ils vous donnent la paix dans vos esprits. '
  '4':
  - type: text
    content: 'Jésus s’est lui‑même sacrifié pour notre mal. Nous vivons dans un mauvais monde. Il voulait donc nous sauver de ce mauvais monde. C’est cela le travail que Dieu lui avait donné au monde. '
  '5':
  - type: text
    content: Nous rendons gloire à Dieu ! C’est vrai.
  - type: heading
    content: Les croyants de Galatie écoutent des idées fausses
  '6':
  - type: text
    content: 'Vous me surprenez ! Vous laissez brusquement Dieu. C’est lui qui vous a amenés à lui par '
  - type: text
    content: Christ
  - type: text
    content: '. Il vous a fait vivre par le '
  - type: text
    content: Christ
  - type: text
    content: ', parce qu’il est très gentil. Mais, vous écoutez maintenant d’autres enseignements.'
  '7':
  - type: text
    content: 'Mais vraiment, il n’y a pas d’autres enseignements. Certaines personnes vous troublent pour rien. Elles essaient de changer les enseignements au sujet de '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Personne ne peut jamais enseigner une autre chose sur Dieu. Il n’y a que ce que nous vous avons enseigné. Ni nous, ni même un '
  - type: text
    content: ange
  - type: text
    content: ' du '
  - type: text
    content: ciel
  - type: text
    content: ', nous ne pouvons jamais enseigner un autre message. Dieu punira toujours quelqu’un qui fait ça.'
  '9':
  - type: text
    content: Je répète ce que je viens de dire. Quelqu’un peut enseigner une autre chose sur Dieu. Cela est différent de ce que vous avez cru. Alors Dieu punira toujours quelqu’un qui fait cela.
