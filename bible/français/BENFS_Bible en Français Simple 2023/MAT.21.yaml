document_id: MAT.21,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 21
  - type: heading
    content: Jésus va à Jérusalem
  - type: text
    content: 'Jésus et ses 12 '
  - type: text
    content: disciples
  - type: text
    content: ' étaient près de Jérusalem. Ils sont venus d’abord au village appelé Bethphagé. C’était sur la  '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: .
  '10':
  - type: text
    content: 'Quand Jésus est entré à Jérusalem, tous les gens dans la ville étaient très heureux. Ils se demandaient : Qui est cet homme ?'
  '11':
  - type: text
    content: 'Les gens dans la foule ont répondu : C’est Jésus. Il vient de Nazareth en Galilée. Il est le  '
  - type: text
    content: prophète
  - type: text
    content: ' que Dieu avait promis d’envoyer.'
  - type: heading
    content: Jésus visite le  Temple
  '12':
  - type: text
    content: 'Jésus s’est rendu au '
  - type: text
    content: Temple
  - type: text
    content: . Les gens achetaient et vendaient des choses là‑bas. Jésus les a tous chassés de là. Il a renversé les tables des hommes qui achetaient et vendaient de l’argent. Il a renversé les sièges des hommes qui vendaient des oiseaux (pigeons).
  '13':
  - type: text
    content: 'Jésus leur a parlé tous, disant : Dieu a dit dans son livre : Ma maison sera un lieu où les gens peuvent venir prier. Mais vous tranformez cette maison en un endroit où les voleurs se cachent.'
  '14':
  - type: text
    content: 'Certaines personnes ne pouvaient pas voir. Elles sont allées vers Jésus dans le  '
  - type: text
    content: Temple
  - type: text
    content: '. Certaines personnes ne pouvaient pas marcher très bien. Elles sont allées là‑bas. Et Jésus a guéri tout le monde. '
  '15':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi ont vu tous les miracles que Jésus a faits. Ils ont également vu les enfants dans le  '
  - type: text
    content: Temple
  - type: text
    content: '. Les enfants criaient : Bienvenue ! Nous prions pour que Dieu soit bon envers toi,  '
  - type: text
    content: fils de David
  - type: text
    content: '  ! Ils étaient alors fâchés contre Jésus. '
  '16':
  - type: text
    content: 'Ils ont demandé à Jésus : Peux‑tu entendre ce que ces enfants disent ? Jésus a répondu : Je suis sûr que vous avez lu ce message de Dieu :'
  - type: text
    content: Tu as ordonné la louange des lèvres des bébés et des enfants.
  '17':
  - type: text
    content: 'Alors Jésus a quitté tout le monde. Il a quitté Jérusalem. Il est resté cette nuit à '
  - type: text
    content: Béthanie
  - type: text
    content: .
  - type: heading
    content: Jésus fait sécher un arbre fruitier
  '18':
  - type: text
    content: 'Tôt le matin, Jésus retournait à Jérusalem. Il avait faim. '
  '19':
  - type: text
    content: 'Il a vu un  '
  - type: text
    content: figuier
  - type: text
    content: ' près de la route. Il est allé chercher des fruits sur l’arbre. Mais il n’y avait que des feuilles sur l’arbre, et pas de fruits. Jésus a dit à l’arbre : Aucun fruit ne poussera plus jamais sur toi. Et tout de suite, l’arbre s’est séché.'
  '2':
  - type: text
    content: 'Jésus a envoyé 2 de ses disciples. Il leur a dit ceci : Allez au village qui est devant vous. Quand vous arriverez là, vous trouverez une ânesse attachée avec son jeune '
  - type: text
    content: âne
  - type: text
    content: . Détachez‑les des cordes, et amenez‑les‑moi ici.
  '20':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont vu cela. Ils étaient très surpris. Et ils ont demandé à Jésus : Comment l’arbre a séché très vite ?'
  '21':
  - type: text
    content: 'Jésus leur a dit : Je vous dis la vérité. Vous devez vraiment croire en Dieu. Vous devez croire à quel point Dieu est vraiment puissant. Si vous croyez à cela, alors vous pourriez faire la même chose à cet arbre. Et aussi, vous pourriez dire à cette montagne : Lève‑toi et jette‑toi dans la mer. Cela se réalisera. '
  '22':
  - type: text
    content: Si vous croyez vraiment, alors priez. Demandez‑lui de vous donner quelque chose. Et il vous donnera la chose que vous lui demandez.
  '23':
  - type: text
    content: 'Alors Jésus est retourné dans le  '
  - type: text
    content: Temple
  - type: text
    content: '. Jésus enseignait. Pendant ce temps, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: anciens
  - type: text
    content: ' du peuple sont allés auprès de lui. Ils lui ont demandé : Par quel pouvoir as‑tu fait ces choses ? Qui t’a donné le pouvoir de les faire ?'
  '24':
  - type: text
    content: 'Jésus a répondu : Je vais aussi vous demander quelque chose. Si vous me dites la bonne réponse, alors je vais répondre à votre question. Je vais vous dire d’où vient mon pouvoir. '
  '25':
  - type: text
    content: 'Jean avait le pouvoir de baptiser les gens. Est‑ce que ce pouvoir venait de Dieu ou est‑ce un homme qui lui a dit de faire cela ? Ensuite, ils se sont parlé à ce propos. Nous pouvons lui dire : C’est Dieu qui a donné à Jean ce pouvoir. Mais alors Jésus peut nous demander pourquoi nous n’avons pas cru en lui.  '
  '26':
  - type: text
    content: 'Nous pouvons lui dire : C’est un homme qui a donné à Jean ce pouvoir. Mais les gens pensaient tous que Jean était un  '
  - type: text
    content: prophète
  - type: text
    content: .
  '27':
  - type: text
    content: 'Donc ils ont répondu à Jésus : Nous ne savons pas qui a donné à Jean ce pouvoir. Jésus leur a dit : Et moi non plus, je ne vais pas vous dire qui m’a donné le pouvoir de faire ces choses.'
  - type: heading
    content: Jésus raconte une histoire sur 2 fils
  '28':
  - type: text
    content: 'Jésus a continué en disant : Dites‑moi ce que vous pensez de cette histoire. Un homme avait 2 fils. Il est allé auprès du fils aîné. Il lui a dit : Mon enfant, va travailler dans le champ aujourd’hui. '
  '29':
  - type: text
    content: 'Le fils aîné a répondu : Je ne veux pas aller travailler dans le champ aujourd’hui. Mais après avoir dit cela, il a décidé d’aller au champ. '
  '3':
  - type: text
    content: 'Quelqu’un peut vous demander : Pourquoi prenez‑vous l’'
  - type: text
    content: ânesse
  - type: text
    content: ' et l’ânon ? Dites‑lui : Le  '
  - type: text
    content: Seigneur
  - type: text
    content: ' en a besoin. Et immédiatement, le propriétaire va les envoyer ici.'
  '30':
  - type: text
    content: L’homme est allé auprès de son autre fils et il a dit la même chose.
  - type: text
    content: 'Le second fils a répondu : Oui père, je vais aller. Mais il n’est pas allé travailler dans le champ. '
  '31':
  - type: text
    content: 'Jésus leur a demandé : Maintenant, lequel de ces 2 fils a fait ce que leur père voulait ?'
  - type: text
    content: 'Ils ont répondu : Le fils aîné a fait ce que son père voulait. Jésus a dit : Je vous dis la vérité. Les hommes qui font payer les taxes entreront dans le  '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: ' avant vous. Aussi les femmes qui couchent avec des hommes pour l’argent iront dans le  '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: ' avant vous.  '
  '32':
  - type: text
    content: Je dis cela à cause de la façon dont Jean est venu à vous. Il vous a expliqué la bonne façon d’obéir à Dieu. Vous n’avez pas cru en lui. Mais les percepteurs d’
  - type: text
    content: impôts
  - type: text
    content: ' ont cru en Jean. Les prostituées aussi ont cru en Jean. Vous saviez que ces gens ont cru en lui. Même alors, vous n’aviez pas cru au message de Jean. Vous avez fait de mauvaises choses. Mais vous n’aviez pas dit à Dieu que vous étiez tristes. Et vous ne vouliez pas lui obéir.'
  - type: heading
    content: Jésus raconte l’histoire d’un agriculteur
  '33':
  - type: text
    content: 'Alors Jésus a continué : Écoutez cette autre histoire. Il y avait un homme qui avait sa propre terre. Il a planté une  '
  - type: text
    content: vigne
  - type: text
    content: . Et puis, il a construit un mur autour du champ. Il a creusé un grand trou dans le sol pour mettre les raisins. Plus tard, il les transformera en vin. Il a également fait un grand bâtiment. Du haut de ce bâtiment, un serviteur veillait sur le champ.
  - type: text
    content: 'L’homme a ensuite trouvé des vignerons pour travailler dans son champ. Il a alors voyagé. '
  '34':
  - type: text
    content: 'Le temps de la récolte est arrivé. Alors le maître a envoyé ses serviteurs auprès des vignerons. Ses serviteurs ont dit aux vignerons : S’il vous plaît, donnez‑nous les fruits de notre maître.'
  '35':
  - type: text
    content: 'Mais, les vignerons ont attrapé les serviteurs. Ils ont frappé un serviteur avec des bâtons. Ils ont tué un autre des serviteurs, et ils ont jeté des pierres sur l’autre serviteur. '
  '36':
  - type: text
    content: 'Alors le maître a envoyé encore d’autres serviteurs au champ. Il a envoyé plus de serviteurs que la première fois. Mais les vignerons ont fait la même chose à ces serviteurs aussi. '
  '37':
  - type: text
    content: Après cela, le maître a envoyé son propre fils. Il pensait que les vignerons seraient gentils envers son fils.
  '38':
  - type: text
    content: 'Les vignerons étaient dans le champ. Alors ils ont vu le fils du maître venir. Ils se disaient : Celui‑ci est le propre fils du maître. Quand notre maître mourra, son fils aura ce champ. Tuons le fils du maître et le champ sera à nous.  '
  '39':
  - type: text
    content: Alors les vignerons ont attrapé le fils. Ils l’ont poussé hors du champ, puis ils l’ont tué.
  '4':
  - type: text
    content: 'Ce qui est arrivé, a confirmé les paroles que le  '
  - type: text
    content: prophète
  - type: text
    content: ' avait dites :'
  '40':
  - type: text
    content: 'Jésus a dit : Un jour, le maître sera de retour. Que pensez‑vous de ce qu’il va faire aux vignerons ?'
  '41':
  - type: text
    content: 'Ils ont répondu : Le maître demandera à quelqu’un de tuer ces gens mauvais. Puis il va alors confier le champ à d’autres vignerons. Au temps de la récolte, ces vignerons donneront au maître le produit du champ.'
  '42':
  - type: text
    content: 'Jésus leur a dit : Je suis sûr que vous avez lu ce que les  '
  - type: text
    content: prophètes
  - type: text
    content: ' avaient écrit :'
  - type: text
    content: Les gens qui ont construit la maison ne voulaient pas utiliser une pierre spéciale.
  - type: text
    content: Ils ont pensé qu’elle n’avait pas de valeur.
  - type: text
    content: Maintenant, cette pierre est la pierre la plus importante du coin.
  - type: text
    content: Dieu a fait cela. Et nous pouvons voir qu’il a fait quelque chose de grand.
  '43':
  - type: text
    content: Je vous dis cela, parce que Dieu va vous enlever de son Royaume. Il le donnera aux gens qui lui obéissent.
  '44':
  - type: text
    content: Quand une personne tombe sur cette pierre, elle va briser son corps. Si cette pierre tombe sur quelqu’un, elle va le briser complètement.
  '45':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont entendu les paroles de Jésus. Ils ont compris que Jésus était contre eux. '
  '46':
  - type: text
    content: 'Ils voulaient attraper Jésus. Mais les gens pensaient que Jésus était un  '
  - type: text
    content: prophète
  - type: text
    content: '. Donc, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: Pharisiens
  - type: text
    content: ' avaient peur du peuple.'
  '5':
  - type: text
    content: 'Dites à la fille de  '
  - type: text
    content: Sion
  - type: text
    content: '  :'
  - type: text
    content: Regarde, ton roi vient.
  - type: text
    content: Il est gentil et humble.
  - type: text
    content: 'Il monte sur un  '
  - type: text
    content: âne
  - type: text
    content: .
  - type: text
    content: Il monte sur un ânon, le petit d’une ânesse.
  '6':
  - type: text
    content: 'Alors les 2 '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés au village. Ils ont fait tout ce que Jésus leur avait demandé de faire. '
  '7':
  - type: text
    content: 'Ils ont amené l’ânesse et l’ânon à Jésus. Ils ont mis leurs vêtements sur ces animaux. Et puis Jésus est monté et il était assis dessus. '
  '8':
  - type: text
    content: 'Beaucoup de gens dans la foule mettaient leurs '
  - type: text
    content: manteaux
  - type: text
    content: ' sur le chemin. D’autres gens coupaient certaines branches des arbres. Et ils mettaient ces branches sur la route.'
  '9':
  - type: text
    content: 'Beaucoup de gens allaient devant Jésus et beaucoup de gens le suivaient. Tous les gens criaient :'
  - type: text
    content: 'Bienvenue ! Nous prions pour que Dieu soit bon envers toi, le  '
  - type: text
    content: fils de David
  - type: text
    content: '  !'
  - type: text
    content: Heureux le roi qui vient avec le pouvoir de Dieu.
  - type: text
    content: Gloire à notre Dieu qui est aux cieux !
