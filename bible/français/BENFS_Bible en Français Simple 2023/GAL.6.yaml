document_id: GAL.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: Soyez gentils et bons les uns envers les autres
  - type: text
    content: Mes frères, si quelqu’un parmi vous ne peut pas arrêter de faire une certaine chose de mal, vous devez lui dire d’arrêter. Il y a des gens dans votre groupe qui comprennent les choses de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Ils devraient lui dire d’arrêter. Vous devriez lui dire la bonne chose à faire. Mais soyez gentils quand vous lui dites. Rappelez‑vous ceci : Vous ne pouvez pas toujours vous empêcher de faire quelque chose de mal.'
  '10':
  - type: text
    content: Ainsi donc, chaque fois que nous avons l’occasion, nous devons faire de bonnes choses à tout le monde.
  - type: text
    content: 'Certainement, nous devons plus faire de bonnes choses à ces personnes : des personnes qui, comme nous, croient en '
  - type: text
    content: Christ
  - type: text
    content: .
  - type: text
    content: 'Ces personnes appartiennent à la même famille que nous, parce que nous croyons tous en '
  - type: text
    content: Christ
  - type: text
    content: .
  - type: heading
    content: Paul termine sa lettre
  '11':
  - type: text
    content: Vous pouvez voir que j’écris avec de grandes lettres maintenant ! C’est parce que je vous écris maintenant avec ma propre main !
  '12':
  - type: text
    content: 'Ces gens qui veulent paraître intelligents et importants essaient de vous troubler. Ils vous disent que vous devriez laisser quelqu’un vous '
  - type: text
    content: circoncire
  - type: text
    content: '. Ils font cela pour cette seule raison. Les gens ne vous maltraiteront pas à cause de la croix de '
  - type: text
    content: Christ
  - type: text
    content: .
  '13':
  - type: text
    content: 'Même les hommes que quelqu’un a circoncis ne respectent pas les règles juives. Ils veulent vous '
  - type: text
    content: circoncire
  - type: text
    content: '. Ainsi, ils veulent se faire grands eux‑mêmes. Ils veulent dire qu’ils ont autorité sur vos corps. '
  '14':
  - type: text
    content: 'Mais je ne veux pas dire de grandes choses sur moi‑même. La seule chose qui me fait grand est la croix de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Par sa croix, le monde est devenu mort pour moi et je suis devenu mort au monde. '
  '15':
  - type: text
    content: 'Ça n’a pas d’importance si quelqu’un vous a circoncis ou non. L’important est que Dieu vous fasse une nouvelle personne. '
  '16':
  - type: text
    content: Je prie que Dieu soit bon à tous ceux qui vivent de cette règle. Je prie pour qu’il garde leur cœur en paix. Je prie ceci pour tous ces gens qui sont vraiment de Dieu.
  '17':
  - type: text
    content: Je ne veux plus de mal à personne après cela. Les marques sur mon corps montrent que je suis serviteur de Jésus.
  '18':
  - type: text
    content: 'Mes frères, je prie pour que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continue à être très gentil envers vous. Je prie pour qu’il soit avec vos esprits. Voilà ce que je prie.'
  '2':
  - type: text
    content: 'Comme les gens qui aident à transporter des choses lourdes, vous devez vous aider les uns les autres à être forts pendant des problèmes. Ainsi, vous allez obéir aux règles de '
  - type: text
    content: Christ
  - type: text
    content: .
  '3':
  - type: text
    content: Qu’aucun de vous ne pense qu’il est trop important. Si vous n’êtes pas vraiment très importants, alors vous croyez à quelque chose de faux.
  '4':
  - type: text
    content: 'Chaque personne doit penser aux choses qu’elle‑même a faites. Et elle doit décider si ces choses sont bonnes. Si elles sont bonnes, alors la personne peut être heureuse. Elle peut être heureuse à cause de ce qu’elle a fait. Elle n’a pas besoin de penser si elle est meilleure ou pire que quelqu’un d’autre. '
  '5':
  - type: text
    content: Chaque personne doit vivre sa propre vie et faire son propre travail.
  '6':
  - type: text
    content: Tout le monde qui apprend le message de Dieu à partir d’un enseignant devrait donner de bonnes choses à cet enseignant. Chaque apprenant devrait donner un peu de toutes les bonnes choses qu’il a à son enseignant.
  '7':
  - type: text
    content: 'Personne ne peut jamais faire de Dieu un imbécile. Personne ne peut jamais faire ça ! Si quelqu’un met une graine d’un certain type de plante dans le sol, cette semence va croître. Et le résultat sera le même genre de plante. '
  '8':
  - type: text
    content: Une personne peut faire des choses qu’elle veut elle‑même faire, en tant que personne humaine. Et le résultat est qu’elle va mourir. Ou plutôt, une personne peut faire des choses que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu veut. Et le résultat est que l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu va l’amener à vivre toujours.'
  '9':
  - type: text
    content: Donc, nous ne devrions pas arrêter de faire ce qui est bon.
  - type: text
    content: 'Il ne faut pas se fatiguer de faire le bien. Si nous ne nous fatiguons pas, alors nous allons recevoir un bon résultat au bon moment. '
