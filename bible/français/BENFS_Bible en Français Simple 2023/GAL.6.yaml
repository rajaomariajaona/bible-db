document_id: GAL.6,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 6
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Soyez gentils et bons les uns envers les autres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Mes frères, si quelqu’un parmi vous ne peut pas arrêter de faire une certaine chose de mal, vous devez lui dire d’arrêter. Il y a des gens dans votre groupe qui comprennent les choses de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Ils devraient lui dire d’arrêter. Vous devriez lui dire la bonne chose à faire. Mais soyez gentils quand vous lui dites. Rappelez‑vous ceci : Vous ne pouvez pas toujours vous empêcher de faire quelque chose de mal.'
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ainsi donc, chaque fois que nous avons l’occasion, nous devons faire de bonnes choses à tout le monde.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certainement, nous devons plus faire de bonnes choses à ces personnes : des personnes qui, comme nous, croient en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces personnes appartiennent à la même famille que nous, parce que nous croyons tous en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul termine sa lettre
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Vous pouvez voir que j’écris avec de grandes lettres maintenant ! C’est parce que je vous écris maintenant avec ma propre main !
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ces gens qui veulent paraître intelligents et importants essaient de vous troubler. Ils vous disent que vous devriez laisser quelqu’un vous '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: '. Ils font cela pour cette seule raison. Les gens ne vous maltraiteront pas à cause de la croix de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Même les hommes que quelqu’un a circoncis ne respectent pas les règles juives. Ils veulent vous '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: '. Ainsi, ils veulent se faire grands eux‑mêmes. Ils veulent dire qu’ils ont autorité sur vos corps. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais je ne veux pas dire de grandes choses sur moi‑même. La seule chose qui me fait grand est la croix de notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Par sa croix, le monde est devenu mort pour moi et je suis devenu mort au monde. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ça n’a pas d’importance si quelqu’un vous a circoncis ou non. L’important est que Dieu vous fasse une nouvelle personne. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je prie que Dieu soit bon à tous ceux qui vivent de cette règle. Je prie pour qu’il garde leur cœur en paix. Je prie ceci pour tous ces gens qui sont vraiment de Dieu.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je ne veux plus de mal à personne après cela. Les marques sur mon corps montrent que je suis serviteur de Jésus.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mes frères, je prie pour que notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' continue à être très gentil envers vous. Je prie pour qu’il soit avec vos esprits. Voilà ce que je prie.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Comme les gens qui aident à transporter des choses lourdes, vous devez vous aider les uns les autres à être forts pendant des problèmes. Ainsi, vous allez obéir aux règles de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qu’aucun de vous ne pense qu’il est trop important. Si vous n’êtes pas vraiment très importants, alors vous croyez à quelque chose de faux.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Chaque personne doit penser aux choses qu’elle‑même a faites. Et elle doit décider si ces choses sont bonnes. Si elles sont bonnes, alors la personne peut être heureuse. Elle peut être heureuse à cause de ce qu’elle a fait. Elle n’a pas besoin de penser si elle est meilleure ou pire que quelqu’un d’autre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Chaque personne doit vivre sa propre vie et faire son propre travail.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tout le monde qui apprend le message de Dieu à partir d’un enseignant devrait donner de bonnes choses à cet enseignant. Chaque apprenant devrait donner un peu de toutes les bonnes choses qu’il a à son enseignant.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Personne ne peut jamais faire de Dieu un imbécile. Personne ne peut jamais faire ça ! Si quelqu’un met une graine d’un certain type de plante dans le sol, cette semence va croître. Et le résultat sera le même genre de plante. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Une personne peut faire des choses qu’elle veut elle‑même faire, en tant que personne humaine. Et le résultat est qu’elle va mourir. Ou plutôt, une personne peut faire des choses que l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu veut. Et le résultat est que l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu va l’amener à vivre toujours.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Donc, nous ne devrions pas arrêter de faire ce qui est bon.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il ne faut pas se fatiguer de faire le bien. Si nous ne nous fatiguons pas, alors nous allons recevoir un bon résultat au bon moment. '
