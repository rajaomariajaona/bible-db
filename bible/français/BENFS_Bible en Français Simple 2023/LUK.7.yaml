document_id: LUK.7,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 7
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: ' croit que Jésus peut l’aider'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après que Jésus a fini de parler au peuple, il est allé à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les amis de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' sont retournés à sa maison. Ensuite, ils ont vu que le serviteur était de nouveau bien.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus fait revenir un mort à la vie
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, Jésus est allé dans une ville appelée Naïn. Ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' et un grand groupe d’autres personnes sont allés avec lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand il a presque atteint la porte de la ville, beaucoup de gens sortaient. Ils portaient un homme mort dans un cercueil pour l’enterrer. Sa mère n’avait pas d’autres fils et son mari est mort aussi. Une grande foule de la ville était avec elle.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus l’a vu, il se sentait très triste pour elle. Il a dit : Ne pleure pas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est allé au cercueil et l’a touché. Donc, les gens qui portaient le cercueil se sont arrêtés. Jésus a dit : Jeune homme, lève‑toi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A cela, l’homme mort s’est redressé et il a commencé à parler. Jésus l’a donné à sa mère.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les gens qui ont vu cela, avaient très peur. Ils disaient : Dieu est grand et puissant. Un important serviteur de Dieu est arrivé parmi nous. Dieu est venu sauver son peuple.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces nouvelles au sujet de Jésus sont allées à travers la Judée. Elles ont aussi atteint la population dans les pays qui étaient près de là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors certains hommes sont allés visiter Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' en prison. Ces gens obéissaient à ce qu’il leur enseignait. Ils lui ont parlé de Jésus et à propos de tout ce qu’il faisait. Ainsi, Jean a choisi 2 parmi eux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a dit : Je veux que vous alliez auprès du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus pour moi. Dites‑lui, Jean a dit que quelqu’un viendra. Jean demande si tu es cet homme. Es‑tu le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: '  ? Ou devrions‑nous attendre encore quelqu’un d’autre ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: ' avait un serviteur qu’il aimait. Le serviteur était très malade et il était en train de mourir. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, les 2 hommes sont venus auprès de Jésus. Ils ont dit : Jean‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' nous a envoyé vers toi. Il veut que nous te demandions : Es‑tu l’homme qui était promis de venir ? Ou devrions‑nous attendre encore quelqu’un d’autre ?'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À ce moment‑là, Jésus guérissait beaucoup de gens. Ils avaient de nombreuses maladies différentes. Certains avaient de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Jésus aidait aussi beaucoup d’aveugles à voir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il a répondu aux 2 hommes que Jean avait envoyés : Rentrez auprès de Jean. Dites‑lui ce que vous avez vu. Et dites‑lui ce que vous avez entendu. Les gens qui ne pouvaient pas voir peuvent voir maintenant. Les gens qui ne pouvaient pas marcher peuvent marcher maintenant. Certains avaient la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lèpre
    - type: text
      text: ', ils sont maintenant bien. Certains ne pouvaient pas entendre, mais maintenant ils peuvent entendre. Certaines personnes étaient mortes, elles vivent maintenant à nouveau. Les pauvres entendent la Bonne Nouvelle.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un continue de croire en moi, il sera heureux.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les 2 hommes qui suivaient Jean sont partis. Alors Jésus a commencé à parler à la foule de Jean. Il leur a dit : Vous êtes allés voir Jean dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: . Pensez à ce que vous êtes allés voir. Vous n’êtes certainement pas allés voir un roseau que le vent bougeait.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sinon, pensez à ce que vous êtes allés voir. Vous n’êtes certainement pas allés voir un homme qui portait des vêtements chers. Des gens comme ça ont beaucoup de belles choses et ils vivent dans de grandes maisons. Jean n’est pas comme eux. Il vit dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donc, pensez à ce que vous êtes allés voir. Vous êtes sortis voir un homme qui reçoit des messages de Dieu. Oui, et Jean est encore plus important que cela. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y a longtemps, Dieu a parlé de lui. Écoutez ! Je vais envoyer quelqu’un avec mon message. Il arrivera le premier pour préparer ton chemin.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a aussi dit au peuple : Oui, Jean est une personne très importante. Il est plus grand que tout homme qui a vécu auparavant. Mais le plus petit dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: ' est plus grand que Jean.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de gens entendaient ce que Jésus disait. Ils disaient : Ce que Dieu a dit à propos de nous est juste. Ils ont donc demandé à Jean de les baptiser. Certaines de ces personnes ont le travail de percevoir l’argent des taxes pour l’État. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' a entendu parler de Jésus. Alors il a envoyé des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' lui parler. Il leur a dit : S’il vous plaît, allez auprès de Jésus. Je voudrais qu’il guérisse mon serviteur. Demandez‑lui s’il peut venir le faire. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' et les gens qui enseignaient la loi de Dieu ne voulaient pas que Jean les baptise. Ils ne croyaient pas au message que Dieu leur donnait. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a continué à enseigner. Il disait : Je vais vous parler des gens qui sont encore en vie aujourd’hui. Je vais vous dire ce qu’ils sont. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont comme des enfants qui sont assis à la place du marché. Ils jouent. Ils crient à d’autres enfants :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons joué une joyeuse musique sur un tuyau pour vous, mais vous n’avez pas dansé. Nous avons chanté une chanson triste, mais vous n’avez pas pleuré.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous êtes comme ces enfants. Quand Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' est venu, il ne mangeait pas souvent. Il ne buvait jamais de vin. Donc, vous avez dit qu’il avait un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' en lui. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors moi, le Fils de l’homme, je suis venu. Je mange et je bois. Donc, vous dites à propos de moi : Regardez cet homme ! Il mange et boit trop. Il est un ami de ces gens qui perçoivent l’argent des taxes pour l’État.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est un ami d’autres mauvaises personnes. Voilà ce que vous dites à propos de moi. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Dieu est sage et bon. Les gens sages comprennent et ils sont d’accord avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une femme verse du parfum cher sur Jésus
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' a demandé à Jésus de manger un repas avec lui. Alors Jésus est allé à sa maison et s’est mis à manger. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait une femme dans cette ville. Elle faisait beaucoup de mauvaises choses. Elle a appris que Jésus mangeait un repas à la maison d’un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: '. Elle a donc pris un petit vase de parfum et elle est allée là‑bas. Le parfum était très cher, et il y avait une belle odeur. Quelqu’un avait fait le petit bocal en pierre blanche. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand elle est allée à l’intérieur, elle se tenait derrière Jésus. Elle pleurait et mouillait les pieds de Jésus avec ses larmes. Puis elle les essuyait avec ses cheveux, et elle les baisait. Elle a ensuite versé tout le parfum du bocal à ses pieds. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisien
    - type: text
      text: ' a vu cela. Il s’est dit : Cet homme ne peut pas être quelqu’un qui reçoit des messages de Dieu. S’il l’est réellement, il pouvait tout savoir sur cette femme. Il ne pouvait pas la laisser le toucher. Il sait qu’elle est une très mauvaise personne.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains anciens des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' se sont ensuite rendus auprès de Jésus. Ils lui ont dit : S’il te plaît, fais quelque chose pour cet '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: .
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a dit : Simon, je veux te dire quelque chose. Simon a répondu : Oui, Maître, dis‑moi. Alors il lui a raconté une histoire sur 2 hommes.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quelqu’un leur avait prêté de l’argent. Il avait prêté à l’un d’entre eux 500 pièces d’argent. Il avait prêté à l’autre 50 pièces d’argent.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun des hommes n’avait l’argent à lui rembourser. Alors, l’homme qui leur avait prêté l’argent, leur a pardonné. Il a dit à tous les 2 : Vous n’êtes pas obligés de rembourser mon argent.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a demandé : Lequel de ces 2 hommes l’aimera plus ?'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon a répondu : Je pense que c’est le premier homme. C’est l’homme qui avait besoin de rembourser le plus d’argent.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Tu as raison. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il s’est tourné vers la femme. Il a dit à Simon : Vois cette femme. Quand je suis entré dans ta maison, tu ne m’as pas donné de l’eau pour laver mes pieds. Mais elle a lavé mes pieds avec ses larmes et elle les a essuyés avec ses cheveux. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a continué à dire : Tu ne m’as pas souhaité la bienvenue avec un baiser. Mais cette femme a commencé à me baiser les pieds quand elle est venue. Et elle n’a pas cessé. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu n’as pas mis du parfum sur ma tête. Mais elle a mis du parfum cher avec une douce odeur à mes pieds.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te dis ceci : Cette femme a fait beaucoup de mauvaises choses. Mais je les ai pardonnées toutes. Elle m’aime beaucoup, parce que je lui ai pardonné beaucoup. Si je pardonne un peu, une personne m’aime seulement un peu.'
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a alors dit : Femme, je pardonne toutes les mauvaises choses que tu avais faites.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres gens qui mangeaient le repas parlaient entre eux : Qui est cet homme ? Peut‑il vraiment pardonner les mauvaises choses que les gens ont faites ?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet homme aime le peuple '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juif
    - type: text
      text: . Il a lui‑même construit un lieu de rencontre pour nous.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à la femme : Tu as cru que je pouvais te pardonner. Tu n’auras plus de problèmes dans ton '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: . Tu peux partir maintenant.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Jésus a commencé à aller avec eux. Quand il n’était pas très loin de la maison, l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' a envoyé quelques amis lui parler. Il leur a dit qu’ils devraient dire : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je ne veux pas être un problème pour toi. Je ne suis pas aussi important que toi. Donc je ne mérite pas que tu entres dans ma maison.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne suis pas venu te parler moi‑même, parce que je ne suis pas assez bon. Au lieu de cela, dis juste un mot et mon serviteur sera guéri. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parce que, quelqu’un a aussi le pouvoir sur moi. Moi aussi, j’ai le pouvoir sur d’autres soldats. Je dis à un soldat : Va ! Et il va. Je dis à l’autre : Viens ! Et il vient. Et je dis à mon serviteur : Fais ceci ! Et il le fait.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus a entendu ce message de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: '. Alors, il a été très surpris. Il s’est tourné vers la foule qui le suivait. Il a dit : Écoutez ! Je n’ai trouvé personne comme cet homme dans tout Israël. Personne ne croit en moi grandement comme lui.'
