document_id: LUK.7,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 7
  - type: heading
    content: Un officier romain croit que Jésus peut l’aider
  - type: text
    content: 'Après que Jésus a fini de parler au peuple, il est allé à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. '
  '10':
  - type: text
    content: Les amis de l’
  - type: text
    content: officier
  - type: text
    content: ' sont retournés à sa maison. Ensuite, ils ont vu que le serviteur était de nouveau bien.'
  - type: heading
    content: Jésus fait revenir un mort à la vie
  '11':
  - type: text
    content: 'Le lendemain, Jésus est allé dans une ville appelée Naïn. Ses '
  - type: text
    content: disciples
  - type: text
    content: ' et un grand groupe d’autres personnes sont allés avec lui. '
  '12':
  - type: text
    content: Quand il a presque atteint la porte de la ville, beaucoup de gens sortaient. Ils portaient un homme mort dans un cercueil pour l’enterrer. Sa mère n’avait pas d’autres fils et son mari est mort aussi. Une grande foule de la ville était avec elle.
  '13':
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus l’a vu, il se sentait très triste pour elle. Il a dit : Ne pleure pas. '
  '14':
  - type: text
    content: 'Il est allé au cercueil et l’a touché. Donc, les gens qui portaient le cercueil se sont arrêtés. Jésus a dit : Jeune homme, lève‑toi. '
  '15':
  - type: text
    content: A cela, l’homme mort s’est redressé et il a commencé à parler. Jésus l’a donné à sa mère.
  '16':
  - type: text
    content: 'Tous les gens qui ont vu cela, avaient très peur. Ils disaient : Dieu est grand et puissant. Un important serviteur de Dieu est arrivé parmi nous. Dieu est venu sauver son peuple.'
  '17':
  - type: text
    content: Ces nouvelles au sujet de Jésus sont allées à travers la Judée. Elles ont aussi atteint la population dans les pays qui étaient près de là.
  - type: heading
    content: Jésus parle de Jean‑Baptiste
  '18':
  - type: text
    content: Alors certains hommes sont allés visiter Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' en prison. Ces gens obéissaient à ce qu’il leur enseignait. Ils lui ont parlé de Jésus et à propos de tout ce qu’il faisait. Ainsi, Jean a choisi 2 parmi eux. '
  '19':
  - type: text
    content: 'Il a dit : Je veux que vous alliez auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus pour moi. Dites‑lui, Jean a dit que quelqu’un viendra. Jean demande si tu es cet homme. Es‑tu le '
  - type: text
    content: Messie
  - type: text
    content: '  ? Ou devrions‑nous attendre encore quelqu’un d’autre ? '
  '2':
  - type: text
    content: 'Un '
  - type: text
    content: officier
  - type: text
    content: ' '
  - type: text
    content: romain
  - type: text
    content: ' avait un serviteur qu’il aimait. Le serviteur était très malade et il était en train de mourir. '
  '20':
  - type: text
    content: 'Ainsi, les 2 hommes sont venus auprès de Jésus. Ils ont dit : Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' nous a envoyé vers toi. Il veut que nous te demandions : Es‑tu l’homme qui était promis de venir ? Ou devrions‑nous attendre encore quelqu’un d’autre ?'
  '21':
  - type: text
    content: 'À ce moment‑là, Jésus guérissait beaucoup de gens. Ils avaient de nombreuses maladies différentes. Certains avaient de mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. Jésus aidait aussi beaucoup d’aveugles à voir. '
  '22':
  - type: text
    content: 'Puis il a répondu aux 2 hommes que Jean avait envoyés : Rentrez auprès de Jean. Dites‑lui ce que vous avez vu. Et dites‑lui ce que vous avez entendu. Les gens qui ne pouvaient pas voir peuvent voir maintenant. Les gens qui ne pouvaient pas marcher peuvent marcher maintenant. Certains avaient la '
  - type: text
    content: lèpre
  - type: text
    content: ', ils sont maintenant bien. Certains ne pouvaient pas entendre, mais maintenant ils peuvent entendre. Certaines personnes étaient mortes, elles vivent maintenant à nouveau. Les pauvres entendent la Bonne Nouvelle.'
  '23':
  - type: text
    content: Si quelqu’un continue de croire en moi, il sera heureux.
  '24':
  - type: text
    content: 'Les 2 hommes qui suivaient Jean sont partis. Alors Jésus a commencé à parler à la foule de Jean. Il leur a dit : Vous êtes allés voir Jean dans le '
  - type: text
    content: désert
  - type: text
    content: . Pensez à ce que vous êtes allés voir. Vous n’êtes certainement pas allés voir un roseau que le vent bougeait.
  '25':
  - type: text
    content: 'Sinon, pensez à ce que vous êtes allés voir. Vous n’êtes certainement pas allés voir un homme qui portait des vêtements chers. Des gens comme ça ont beaucoup de belles choses et ils vivent dans de grandes maisons. Jean n’est pas comme eux. Il vit dans le '
  - type: text
    content: désert
  - type: text
    content: .
  '26':
  - type: text
    content: 'Donc, pensez à ce que vous êtes allés voir. Vous êtes sortis voir un homme qui reçoit des messages de Dieu. Oui, et Jean est encore plus important que cela. '
  '27':
  - type: text
    content: Il y a longtemps, Dieu a parlé de lui. Écoutez ! Je vais envoyer quelqu’un avec mon message. Il arrivera le premier pour préparer ton chemin.
  '28':
  - type: text
    content: 'Jésus a aussi dit au peuple : Oui, Jean est une personne très importante. Il est plus grand que tout homme qui a vécu auparavant. Mais le plus petit dans le '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: ' est plus grand que Jean.'
  '29':
  - type: text
    content: 'Beaucoup de gens entendaient ce que Jésus disait. Ils disaient : Ce que Dieu a dit à propos de nous est juste. Ils ont donc demandé à Jean de les baptiser. Certaines de ces personnes ont le travail de percevoir l’argent des taxes pour l’État. '
  '3':
  - type: text
    content: L’
  - type: text
    content: officier
  - type: text
    content: ' a entendu parler de Jésus. Alors il a envoyé des '
  - type: text
    content: anciens
  - type: text
    content: ' lui parler. Il leur a dit : S’il vous plaît, allez auprès de Jésus. Je voudrais qu’il guérisse mon serviteur. Demandez‑lui s’il peut venir le faire. '
  '30':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et les gens qui enseignaient la loi de Dieu ne voulaient pas que Jean les baptise. Ils ne croyaient pas au message que Dieu leur donnait. '
  '31':
  - type: text
    content: 'Alors Jésus a continué à enseigner. Il disait : Je vais vous parler des gens qui sont encore en vie aujourd’hui. Je vais vous dire ce qu’ils sont. '
  '32':
  - type: text
    content: 'Ils sont comme des enfants qui sont assis à la place du marché. Ils jouent. Ils crient à d’autres enfants :'
  - type: text
    content: Nous avons joué une joyeuse musique sur un tuyau pour vous, mais vous n’avez pas dansé. Nous avons chanté une chanson triste, mais vous n’avez pas pleuré.
  '33':
  - type: text
    content: Vous êtes comme ces enfants. Quand Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' est venu, il ne mangeait pas souvent. Il ne buvait jamais de vin. Donc, vous avez dit qu’il avait un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' en lui. '
  '34':
  - type: text
    content: 'Alors moi, le Fils de l’homme, je suis venu. Je mange et je bois. Donc, vous dites à propos de moi : Regardez cet homme ! Il mange et boit trop. Il est un ami de ces gens qui perçoivent l’argent des taxes pour l’État.'
  - type: text
    content: 'Il est un ami d’autres mauvaises personnes. Voilà ce que vous dites à propos de moi. '
  '35':
  - type: text
    content: Mais Dieu est sage et bon. Les gens sages comprennent et ils sont d’accord avec lui.
  - type: heading
    content: Une femme verse du parfum cher sur Jésus
  '36':
  - type: text
    content: 'Puis un des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' a demandé à Jésus de manger un repas avec lui. Alors Jésus est allé à sa maison et s’est mis à manger. '
  '37':
  - type: text
    content: 'Il y avait une femme dans cette ville. Elle faisait beaucoup de mauvaises choses. Elle a appris que Jésus mangeait un repas à la maison d’un '
  - type: text
    content: Pharisien
  - type: text
    content: '. Elle a donc pris un petit vase de parfum et elle est allée là‑bas. Le parfum était très cher, et il y avait une belle odeur. Quelqu’un avait fait le petit bocal en pierre blanche. '
  '38':
  - type: text
    content: 'Quand elle est allée à l’intérieur, elle se tenait derrière Jésus. Elle pleurait et mouillait les pieds de Jésus avec ses larmes. Puis elle les essuyait avec ses cheveux, et elle les baisait. Elle a ensuite versé tout le parfum du bocal à ses pieds. '
  '39':
  - type: text
    content: 'Le '
  - type: text
    content: Pharisien
  - type: text
    content: ' a vu cela. Il s’est dit : Cet homme ne peut pas être quelqu’un qui reçoit des messages de Dieu. S’il l’est réellement, il pouvait tout savoir sur cette femme. Il ne pouvait pas la laisser le toucher. Il sait qu’elle est une très mauvaise personne.'
  '4':
  - type: text
    content: 'Certains anciens des '
  - type: text
    content: Juifs
  - type: text
    content: ' se sont ensuite rendus auprès de Jésus. Ils lui ont dit : S’il te plaît, fais quelque chose pour cet '
  - type: text
    content: officier
  - type: text
    content: ' '
  - type: text
    content: romain
  - type: text
    content: .
  '40':
  - type: text
    content: 'Jésus lui a dit : Simon, je veux te dire quelque chose. Simon a répondu : Oui, Maître, dis‑moi. Alors il lui a raconté une histoire sur 2 hommes.'
  '41':
  - type: text
    content: Quelqu’un leur avait prêté de l’argent. Il avait prêté à l’un d’entre eux 500 pièces d’argent. Il avait prêté à l’autre 50 pièces d’argent.
  '42':
  - type: text
    content: 'Aucun des hommes n’avait l’argent à lui rembourser. Alors, l’homme qui leur avait prêté l’argent, leur a pardonné. Il a dit à tous les 2 : Vous n’êtes pas obligés de rembourser mon argent.'
  - type: text
    content: 'Jésus a demandé : Lequel de ces 2 hommes l’aimera plus ?'
  '43':
  - type: text
    content: 'Simon a répondu : Je pense que c’est le premier homme. C’est l’homme qui avait besoin de rembourser le plus d’argent.'
  - type: text
    content: 'Jésus a dit : Tu as raison. '
  '44':
  - type: text
    content: 'Puis il s’est tourné vers la femme. Il a dit à Simon : Vois cette femme. Quand je suis entré dans ta maison, tu ne m’as pas donné de l’eau pour laver mes pieds. Mais elle a lavé mes pieds avec ses larmes et elle les a essuyés avec ses cheveux. '
  '45':
  - type: text
    content: 'Il a continué à dire : Tu ne m’as pas souhaité la bienvenue avec un baiser. Mais cette femme a commencé à me baiser les pieds quand elle est venue. Et elle n’a pas cessé. '
  '46':
  - type: text
    content: Tu n’as pas mis du parfum sur ma tête. Mais elle a mis du parfum cher avec une douce odeur à mes pieds.
  '47':
  - type: text
    content: 'Je te dis ceci : Cette femme a fait beaucoup de mauvaises choses. Mais je les ai pardonnées toutes. Elle m’aime beaucoup, parce que je lui ai pardonné beaucoup. Si je pardonne un peu, une personne m’aime seulement un peu.'
  '48':
  - type: text
    content: 'Jésus a alors dit : Femme, je pardonne toutes les mauvaises choses que tu avais faites.'
  '49':
  - type: text
    content: 'D’autres gens qui mangeaient le repas parlaient entre eux : Qui est cet homme ? Peut‑il vraiment pardonner les mauvaises choses que les gens ont faites ?'
  '5':
  - type: text
    content: 'Cet homme aime le peuple '
  - type: text
    content: juif
  - type: text
    content: . Il a lui‑même construit un lieu de rencontre pour nous.
  '50':
  - type: text
    content: 'Jésus dit à la femme : Tu as cru que je pouvais te pardonner. Tu n’auras plus de problèmes dans ton '
  - type: text
    content: esprit
  - type: text
    content: . Tu peux partir maintenant.
  '6':
  - type: text
    content: Alors Jésus a commencé à aller avec eux. Quand il n’était pas très loin de la maison, l’
  - type: text
    content: officier
  - type: text
    content: ' a envoyé quelques amis lui parler. Il leur a dit qu’ils devraient dire : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je ne veux pas être un problème pour toi. Je ne suis pas aussi important que toi. Donc je ne mérite pas que tu entres dans ma maison.'
  '7':
  - type: text
    content: 'Je ne suis pas venu te parler moi‑même, parce que je ne suis pas assez bon. Au lieu de cela, dis juste un mot et mon serviteur sera guéri. '
  '8':
  - type: text
    content: 'Parce que, quelqu’un a aussi le pouvoir sur moi. Moi aussi, j’ai le pouvoir sur d’autres soldats. Je dis à un soldat : Va ! Et il va. Je dis à l’autre : Viens ! Et il vient. Et je dis à mon serviteur : Fais ceci ! Et il le fait.'
  '9':
  - type: text
    content: Jésus a entendu ce message de l’
  - type: text
    content: officier
  - type: text
    content: '. Alors, il a été très surpris. Il s’est tourné vers la foule qui le suivait. Il a dit : Écoutez ! Je n’ai trouvé personne comme cet homme dans tout Israël. Personne ne croit en moi grandement comme lui.'
