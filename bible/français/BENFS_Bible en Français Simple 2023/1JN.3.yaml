document_id: 1JN.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Nous sommes les enfants de Dieu
  - type: text
    content: 'Pensez combien Dieu le Père nous aime. Il nous appelle ses enfants. Il nous aime beaucoup ! Et nous sommes vraiment devenus les enfants de Dieu. Les gens qui appartiennent à ce monde ne comprennent pas qui est Dieu. Pour cette raison, ils ne comprennent pas qui nous sommes. '
  '10':
  - type: text
    content: 'Ainsi, nous pouvons voir clairement qui sont les enfants de Dieu et qui sont les enfants du '
  - type: text
    content: diable
  - type: text
    content: . Toute personne qui ne vit pas d’une manière bonne et juste n’appartient pas à Dieu. Des gens comme ça n’aiment pas les autres croyants.
  - type: heading
    content: Les chrétiens doivent s’aimer les uns les autres
  '11':
  - type: text
    content: 'Oui, nous devons nous aimer les uns les autres. C’est le message que vous avez entendu depuis le début. '
  '12':
  - type: text
    content: Nous ne devons pas être comme Caïn. Il appartenait à Satan et il a même tué son frère, Abel. Pourquoi a‑t‑il fait ça ? Caïn a fait de mauvaises choses et il a tué Abel, parce qu’Abel a fait des choses qui étaient justes.
  '13':
  - type: text
    content: Alors, mes amis chrétiens, ne soyez pas surpris quand les gens qui appartiennent à ce monde vous détestent.
  '14':
  - type: text
    content: 'Nous savons que nous avons maintenant une nouvelle vie avec Dieu. Nous avons laissé le chemin de la mort. Nous le savons parce que nous aimons nos amis chrétiens. Mais toute personne qui n’aime pas d’autres croyants, est toujours sur le point de mourir. '
  '15':
  - type: text
    content: Toute personne qui déteste d’autres croyants est comme quelqu’un qui tue d’autres personnes. Vous savez qu’une personne comme ça n’a pas la vraie vie avec Dieu.
  '16':
  - type: text
    content: 'C’est ainsi que nous savons ce que le véritable amour est : Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' a donné sa propre vie sur la croix. Il est mort pour nous. Nous devons donc aussi donner notre vie à d’autres croyants. '
  '17':
  - type: text
    content: Quand un autre croyant a des problèmes, nous devons être gentils avec lui. Vous avez peut‑être tout ce dont vous avez besoin pour vivre. Alors, si vous voyez un autre croyant qui a besoin de choses comme ça, vous devez l’aider. Si vous refusez d’être gentils avec lui, cela montre que vous n’appartenez pas à Dieu. Vous n’aimez pas les gens comme Dieu les aime.
  '18':
  - type: text
    content: 'Mes petits enfants, nous ne devons pas nous aimer les uns les autres uniquement par ce que nous disons. Nous devons également montrer notre véritable amour par ce que nous faisons pour nous entraider. '
  '19':
  - type: text
    content: 'Alors nous saurons que nous appartenons vraiment à Dieu. Nous obéirons au vrai message de Dieu. Par conséquent, nous serons sûrs dans nos cœurs devant Dieu. '
  '2':
  - type: text
    content: 'Mes amis, nous sommes déjà enfants de Dieu. Nous ne savons pas encore clairement ce que nous deviendrons. Mais nous le savons : Lorsque Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' reviendra dans ce monde, nous deviendrons comme lui. Nous serons comme lui parce que nous le verrons tel qu’il est vraiment. '
  '20':
  - type: text
    content: Même si nos cœurs nous disent que nous avons fait quelque chose de mal, nous n’aurons toujours pas peur de Dieu. Dieu est plus grand que nos pensées. Il sait déjà tout de nous.
  '21':
  - type: text
    content: 'Mes amis, si nos pensées ne nous disent pas que nous sommes fautifs, alors nous n’aurons pas peur de venir à Dieu. '
  '22':
  - type: text
    content: 'Nous pouvons prier Dieu et nous pouvons lui demander de nous aider. Il nous donnera ce que nous lui demandons. C’est parce que nous faisons ce qu’il nous dit de faire, et nous faisons les choses qui lui plaisent. '
  '23':
  - type: text
    content: 'Voici ce que Dieu nous dit de faire : Nous devons croire que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est son Fils. Et nous devons nous aimer les uns les autres, comme Jésus nous l’a dit. '
  '24':
  - type: text
    content: 'Toute personne qui obéit aux règles de Dieu est unie à Dieu. Dieu est également uni à lui. Comment savons‑nous que Dieu est uni à nous ? C’est à cause de son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' qu’il nous a donné.'
  '3':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est complètement bon. Donc, tous ceux qui espèrent le voir doivent alors éviter de pécher.'
  '4':
  - type: text
    content: 'Si une personne continue de faire de mauvaises choses, elle choisit de ne pas obéir aux règles de Dieu. Le péché, c’est quand nous n’obéissons pas aux règles de Dieu. '
  '5':
  - type: text
    content: 'Vous savez que Jésus est venu dans le monde pour enlever nos péchés. Lui‑même n’avait aucun péché en lui. '
  '6':
  - type: text
    content: Une personne qui est unie à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' ne continue pas de faire de mauvaises choses. Si quelqu’un continue de faire de mauvaises choses, cette personne ne connaît pas vraiment Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' du tout. Elle ne comprend pas qui est Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '7':
  - type: text
    content: 'Mes petits enfants, ne laissez personne vous dire des mensonges sur le péché. Les gens que Dieu accepte justes, sont ceux qui vivent comme il veut. C’est comme Jésus, il a fait seulement ce qui est bien et juste. '
  '8':
  - type: text
    content: 'Mais les gens qui continuent de faire de mauvaises choses montrent qu’ils appartiennent au '
  - type: text
    content: diable
  - type: text
    content: '. Le '
  - type: text
    content: diable
  - type: text
    content: ' a fait de mauvaises choses depuis le début. C’est pourquoi le Fils de Dieu est venu au monde. Il est venu pour détruire tout ce que le '
  - type: text
    content: diable
  - type: text
    content: ' a fait.'
  '9':
  - type: text
    content: 'Toute personne qui est enfant de Dieu ne continue pas de faire de mauvaises choses. C’est parce que Dieu lui a donné une nouvelle vie. Il l’a fait devenir son enfant. Donc, cette personne ne peut pas continuer de faire de mauvaises choses. '
