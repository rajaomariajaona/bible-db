document_id: MAT.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Le  diable tente Jésus
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu a conduit Jésus au '
  - type: text
    content: désert
  - type: text
    content: '. Ici, le  '
  - type: text
    content: diable
  - type: text
    content: ' a essayé de pousser Jésus à faire du mal.'
  '10':
  - type: text
    content: 'Jésus lui a dit : Éloigne‑toi de moi, Satan. Les Saintes Écritures disent : Tu adoreras le Seigneur, ton Dieu. Et tu le serviras lui seul.'
  '11':
  - type: text
    content: 'Alors le  '
  - type: text
    content: diable
  - type: text
    content: ' a laissé Jésus seul. Après cela, les  '
  - type: text
    content: anges
  - type: text
    content: ' sont venus auprès de Jésus. Ils prenaient soin de lui. '
  - type: heading
    content: Jésus commence son travail en Galilée
  '12':
  - type: text
    content: Un jour, Hérode a ordonné de mettre Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' en prison. Jésus a appris cela. Il est alors retourné en Galilée.'
  '13':
  - type: text
    content: 'Jésus n’est pas resté à Nazareth. Il est allé vivre dans une ville appelée '
  - type: text
    content: Capernaüm
  - type: text
    content: '. '
  - type: text
    content: Capernaüm
  - type: text
    content: ' était au bord de la mer de Galilée. '
  - type: text
    content: Capernaüm
  - type: text
    content: ' était dans la partie d’Israël appelée Zabulon et Nephthali.'
  '14':
  - type: text
    content: 'Jésus est allé vivre à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Ceci a accompli cette Parole de Dieu par le prophète Ésaïe :'
  '15':
  - type: text
    content: Gens qui habitent à Zabulon et Nephthali,
  - type: text
    content: 'route de la mer, pays au‑delà du '
  - type: text
    content: Jourdain
  - type: text
    content: '  !'
  - type: text
    content: 'Galilée, terre où vivent les gens qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: '  !'
  '16':
  - type: text
    content: Ils sont comme des gens qui vivent dans l’obscurité.
  - type: text
    content: Dieu a envoyé une lumière sur eux.
  - type: text
    content: Ils sont comme dans l’ombre que la mort apporte.
  - type: text
    content: Cette lumière a commencé à briller sur eux.
  - type: text
    content: Elle est comme le soleil quand il se lève à l’aube.
  '17':
  - type: text
    content: 'Alors Jésus a commencé à enseigner le peuple. Jésus disait : Arrêtez de faire de mauvaises choses. Dites à Dieu que vous êtes tristes et vous commencez à lui obéir. Faites tout cela, parce que le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: ' arrive bientôt.'
  - type: heading
    content: Jésus demande à certains hommes d’être ses  disciples
  '18':
  - type: text
    content: 'Un jour, Jésus marchait au bord de la mer de Galilée. Il a vu 2 hommes. Un homme s’appelait Simon. Il avait aussi le nom de Pierre. Le nom de l’autre homme était André. Il était le frère de Simon. Leur travail consistait à attraper des poissons. Ils jetaient leurs filets dans la mer pour attraper des poissons. '
  '19':
  - type: text
    content: 'Jésus leur a dit : Venez à moi et soyez mes  '
  - type: text
    content: disciples
  - type: text
    content: . Je vais vous apprendre à pêcher des gens.
  '2':
  - type: text
    content: 'Jésus n’a rien mangé pendant 40 jours et 40 nuits. Il avait très faim à la fin de ce temps. '
  '20':
  - type: text
    content: Pierre et André ont immédiatement laissé les filets. Ils ont suivi Jésus.
  '21':
  - type: text
    content: 'Alors Jésus a continué sa marche. Immédiatement, il a vu 2 autres hommes. Leur travail était également d’attraper des poissons. Leurs noms étaient Jacques et Jean. Ils étaient frères. Le nom de leur père était Zébédée. Ils étaient dans leur petit bateau. Ils réparaient leurs filets. Jésus les a appelés. '
  '22':
  - type: text
    content: Ils ont immédiatement quitté le petit bateau et leur père. Ils ont suivi Jésus.
  - type: heading
    content: Jésus parle de la Bonne Nouvelle du Royaume de Dieu et guérit des malades
  '23':
  - type: text
    content: 'Jésus allait partout en Galilée. Il entrait dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Puis il disait au peuple la Bonne Nouvelle du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. Jésus guérissait tous les malades et toutes les infirmités. '
  '24':
  - type: text
    content: 'Alors les gens de Syrie entendaient parler de Jésus. Donc, ils amenaient tous les malades à Jésus. Ils avaient de nombreuses maladies différentes et certains avaient des douleurs. Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' vivaient à l’intérieur de certains d’entre eux. Certaines personnes souffraient de l’épilepsie. D’autres personnes ne pouvaient pas marcher. Jésus guérissait tous ces gens. '
  '25':
  - type: text
    content: 'A cause de cela, beaucoup de gens suivaient Jésus. Ils venaient de la Galilée, de la  '
  - type: text
    content: Décapole
  - type: text
    content: ', de Jérusalem. Ils venaient aussi de la partie de la Judée qui est de l’autre côté du '
  - type: text
    content: Jourdain
  - type: text
    content: .
  '3':
  - type: text
    content: 'Alors le  '
  - type: text
    content: diable
  - type: text
    content: ' est venu auprès de Jésus. Il a dit à Jésus ceci : Si tu es le Fils de Dieu, dis à ces pierres qu’elles deviennent du pain.'
  '4':
  - type: text
    content: 'Mais Jésus lui a répondu. Les Saintes Écritures disent : Les gens ont besoin de plus que de pain pour vivre vraiment. Ils ont besoin d’entendre toute parole que Dieu dit. Ensuite, ils peuvent vraiment vivre.'
  '5':
  - type: text
    content: 'Alors le  '
  - type: text
    content: diable
  - type: text
    content: ' a conduit Jésus à Jérusalem. Il a amené Jésus sur le haut du '
  - type: text
    content: Temple
  - type: text
    content: .
  '6':
  - type: text
    content: 'Il a dit à Jésus : Si tu es le Fils de Dieu, jette‑toi d’ici en bas. Les Saintes Écritures disent : Dieu demandera à ses  '
  - type: text
    content: anges
  - type: text
    content: ' de prendre soin de toi. Ils te porteront sur les mains. Et ainsi tu seras en sécurité. Ton pied ne cognera pas contre une pierre.'
  '7':
  - type: text
    content: 'Jésus a répondu au '
  - type: text
    content: diable
  - type: text
    content: '. Les Saintes Écritures disent : Ne tente pas le  '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '8':
  - type: text
    content: 'Alors le  '
  - type: text
    content: diable
  - type: text
    content: ' a conduit Jésus à une très haute montagne. Il a montré à Jésus tous les pays dans le monde entier. Ils étaient tous très grands et beaux. '
  '9':
  - type: text
    content: 'Le  '
  - type: text
    content: diable
  - type: text
    content: ' lui a dit :'
  - type: text
    content: Je vais te donner tout ce que tu vois. Plie tes genoux devant moi. Dis que je suis grand et important et beau. Et je te donnerai tout.
