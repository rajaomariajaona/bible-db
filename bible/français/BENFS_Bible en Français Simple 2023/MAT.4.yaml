document_id: MAT.4,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 4
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' tente Jésus'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu a conduit Jésus au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. Ici, le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' a essayé de pousser Jésus à faire du mal.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a dit : Éloigne‑toi de moi, Satan. Les Saintes Écritures disent : Tu adoreras le Seigneur, ton Dieu. Et tu le serviras lui seul.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' a laissé Jésus seul. Après cela, les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' sont venus auprès de Jésus. Ils prenaient soin de lui. '
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus commence son travail en Galilée
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un jour, Hérode a ordonné de mettre Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' en prison. Jésus a appris cela. Il est alors retourné en Galilée.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus n’est pas resté à Nazareth. Il est allé vivre dans une ville appelée '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: ' était au bord de la mer de Galilée. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: ' était dans la partie d’Israël appelée Zabulon et Nephthali.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus est allé vivre à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. Ceci a accompli cette Parole de Dieu par le prophète Ésaïe :'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gens qui habitent à Zabulon et Nephthali,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'route de la mer, pays au‑delà du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: '  !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Galilée, terre où vivent les gens qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils sont comme des gens qui vivent dans l’obscurité.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a envoyé une lumière sur eux.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils sont comme dans l’ombre que la mort apporte.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette lumière a commencé à briller sur eux.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle est comme le soleil quand il se lève à l’aube.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a commencé à enseigner le peuple. Jésus disait : Arrêtez de faire de mauvaises choses. Dites à Dieu que vous êtes tristes et vous commencez à lui obéir. Faites tout cela, parce que le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' arrive bientôt.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus demande à certains hommes d’être ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jésus marchait au bord de la mer de Galilée. Il a vu 2 hommes. Un homme s’appelait Simon. Il avait aussi le nom de Pierre. Le nom de l’autre homme était André. Il était le frère de Simon. Leur travail consistait à attraper des poissons. Ils jetaient leurs filets dans la mer pour attraper des poissons. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a dit : Venez à moi et soyez mes  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: . Je vais vous apprendre à pêcher des gens.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus n’a rien mangé pendant 40 jours et 40 nuits. Il avait très faim à la fin de ce temps. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pierre et André ont immédiatement laissé les filets. Ils ont suivi Jésus.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a continué sa marche. Immédiatement, il a vu 2 autres hommes. Leur travail était également d’attraper des poissons. Leurs noms étaient Jacques et Jean. Ils étaient frères. Le nom de leur père était Zébédée. Ils étaient dans leur petit bateau. Ils réparaient leurs filets. Jésus les a appelés. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ont immédiatement quitté le petit bateau et leur père. Ils ont suivi Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus parle de la Bonne Nouvelle du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: ' et guérit des malades'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus allait partout en Galilée. Il entrait dans le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Puis il disait au peuple la Bonne Nouvelle du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: '. Jésus guérissait tous les malades et toutes les infirmités. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les gens de Syrie entendaient parler de Jésus. Donc, ils amenaient tous les malades à Jésus. Ils avaient de nombreuses maladies différentes et certains avaient des douleurs. Les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' vivaient à l’intérieur de certains d’entre eux. Certaines personnes souffraient de l’épilepsie. D’autres personnes ne pouvaient pas marcher. Jésus guérissait tous ces gens. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, beaucoup de gens suivaient Jésus. Ils venaient de la Galilée, de la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Décapole
    - type: text
      text: ', de Jérusalem. Ils venaient aussi de la partie de la Judée qui est de l’autre côté du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' est venu auprès de Jésus. Il a dit à Jésus ceci : Si tu es le Fils de Dieu, dis à ces pierres qu’elles deviennent du pain.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus lui a répondu. Les Saintes Écritures disent : Les gens ont besoin de plus que de pain pour vivre vraiment. Ils ont besoin d’entendre toute parole que Dieu dit. Ensuite, ils peuvent vraiment vivre.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' a conduit Jésus à Jérusalem. Il a amené Jésus sur le haut du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: .
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il a dit à Jésus : Si tu es le Fils de Dieu, jette‑toi d’ici en bas. Les Saintes Écritures disent : Dieu demandera à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de prendre soin de toi. Ils te porteront sur les mains. Et ainsi tu seras en sécurité. Ton pied ne cognera pas contre une pierre.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: '. Les Saintes Écritures disent : Ne tente pas le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' a conduit Jésus à une très haute montagne. Il a montré à Jésus tous les pays dans le monde entier. Ils étaient tous très grands et beaux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' lui a dit :'
  - type: usfm
    marker: m
    children:
    - type: text
      text: Je vais te donner tout ce que tu vois. Plie tes genoux devant moi. Dis que je suis grand et important et beau. Et je te donnerai tout.
