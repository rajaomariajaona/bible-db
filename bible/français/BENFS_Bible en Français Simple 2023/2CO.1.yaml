document_id: 2CO.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: text
    content: 'C’est moi Paul qui écris cette lettre. Dieu m’a choisi pour être '
  - type: text
    content: apôtre
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Notre ami chrétien Timothée est ici avec moi pendant que j’écris.
  - type: text
    content: Je vous envoie cette lettre, les gens de l’Église de la ville de Corinthe. Je l’envoie aussi à tout le peuple de Dieu qui vit ailleurs en Achaïe.
  '10':
  - type: text
    content: 'Nous étions près de la mort, mais Dieu nous a sauvés de ce grand danger. Nous savons que nous pouvons continuer à lui faire confiance. Il nous sauvera de tout danger futur. '
  '11':
  - type: text
    content: Nous savons également que vous continuez de nous aider pendant que vous priez pour nous. Comme beaucoup de gens prient pour nous, ils remercieront Dieu quand il répondra à leurs prières. Ils verront que Dieu est très gentil avec nous et ils le remercieront.
  - type: heading
    content: Paul explique pourquoi il n’a pas visité Corinthe plus tôt
  '12':
  - type: text
    content: 'Nous pouvons être fiers de notre façon de vivre dans ce monde. Nous avons pris soin d’être honnêtes et bons avec tout le monde. Et nous avons été comme ça avec vous encore plus. Nous sommes certains dans nos '
  - type: text
    content: esprits
  - type: text
    content: ' que cela est vrai. Nous n’avons pas essayé d’être intelligents d’une manière humaine. Mais nous avons vécu comme Dieu nous a aidés à vivre. '
  '13':
  - type: text
    content: 'Nous vous écrivons seulement sur des choses que vous pouvez vous‑mêmes lire et comprendre. Et j’espère que vous comprendrez complètement un jour. '
  '14':
  - type: text
    content: 'Vous ne nous comprenez pas encore complètement. Mais j’espère que vous comprendrez complètement le jour du retour de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Vous pouvez alors être fiers de nous, comme nous serons aussi fiers de vous.
  '15':
  - type: text
    content: 'Donc, parce que j’étais sûr que vous aviez confiance en moi, j’ai voulu vous rendre visite 2 fois. Alors, je pourrai vous apporter l’aide de Dieu 2 fois. J’ai décidé de vous rendre visite d’abord sur le chemin de la Macédoine. Alors, je vous rendrai visite à mon retour de Macédoine. Après cela, vous pourrez m’aider à m’accompagner en Judée. '
  '17':
  - type: text
    content: Je n’ai pas décidé cela d’une manière imprudente. Je voulais vraiment le faire. Je ne décide pas de faire les choses uniquement pour me plaire, comme quelqu’un qui ne connaît pas Dieu. Je ne dis pas oui, puis je dis immédiatement non.
  '18':
  - type: text
    content: 'Dieu fait toujours ce qu’il dit qu’il fera. De la même manière, ma promesse ne vous a pas été à la fois oui et non. '
  '19':
  - type: text
    content: Silas, Timothée et moi vous avons dit le message concernant le Fils de Dieu, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' n’est pas quelqu’un qui change son message entre oui et non. Mais, il dit toujours oui et il fait ce qu’il dit. '
  '2':
  - type: text
    content: 'Je prie pour que Dieu, notre Père et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continuent de vous aider. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: .
  - type: heading
    content: Dieu lui‑même nous encourage
  '20':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a dit oui à toutes les promesses de Dieu. Alors quand nous prions, nous disons oui, amen ! Parce que nous savons que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' l’a fait. Et quand nous faisons cela, nous disons que Dieu est grand.'
  '21':
  - type: text
    content: C’est Dieu qui nous aide à croire toujours en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Il le fait pour nous et pour vous, parce que nous appartenons à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Dieu nous a choisis pour le servir. '
  '22':
  - type: text
    content: 'Il a également mis un signe sur nous. C’est pour montrer que nous lui appartenons. Il nous a donné son '
  - type: text
    content: Esprit
  - type: text
    content: ' pour vivre en nous. Pour cette raison, nous savons que nous recevrons toutes les bonnes choses que Dieu a promises.'
  '23':
  - type: text
    content: 'Dieu montrera que ce que je dis est, vrai ! Il connaît mes pensées. Pourquoi ai‑je décidé de ne pas revenir à Corinthe à ce moment ? Je ne suis pas venu, parce que je ne voulais pas être en colère contre vous. '
  '24':
  - type: text
    content: 'Nous n’essayons pas de parler de votre '
  - type: text
    content: foi
  - type: text
    content: ', comme les maîtres font. Vous êtes déjà forts dans vos '
  - type: text
    content: esprits
  - type: text
    content: ', parce que vous faites confiance en Dieu. Nous voulons donc vous aider à être vraiment heureux.'
  '3':
  - type: text
    content: 'Nous remercions Dieu, le Père de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', parce qu’il est très bon envers nous. En tant que notre Père, il est très gentil envers nous. Il est notre Dieu qui nous encourage de toutes les manières. '
  '4':
  - type: text
    content: 'Chaque fois que nous avons des problèmes, il nous encourage. Pour cette raison, nous pouvons nous‑mêmes encourager les autres. Quand ils ont des problèmes, nous pouvons les encourager, de la même manière que Dieu nous a encouragés. '
  '5':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même a eu beaucoup de souffrances, et Dieu l’a encouragé. En tant que serviteurs de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', nous avons aussi le même genre de souffrances. Mais Dieu nous encourage aussi beaucoup, parce que nous appartenons à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '6':
  - type: text
    content: 'Ainsi, lorsque nous avons des problèmes, nous pouvons vous encourager. Et puis, Dieu vous sauve aussi. Quand Dieu nous encourage, cela nous aide aussi à vous encourager. Par conséquent, lorsque vous avez les mêmes types de problèmes que nous, vous apprenez à être patients et forts. '
  '7':
  - type: text
    content: Ainsi, nous continuons à être sûrs que vous resterez forts. Vous avez de nombreux problèmes, comme nous aussi. Mais nous savons que Dieu vous encouragera aussi, comme il nous encourage.
  '8':
  - type: text
    content: 'Nos amis chrétiens, nous voulons que vous connaissiez les problèmes que nous avons connus en Asie. Ces problèmes ont été très douloureux. Nous n’étions pas nous‑mêmes assez forts pour continuer. Nous pensions même que nous pourrions mourir. '
  '9':
  - type: text
    content: 'Nous sentions dans nos cœurs que nous devrons certainement mourir. Nous savions que nous ne pouvions pas faire confiance en nos propres forces. Nous devions faire confiance en Dieu. C’est lui qui réveille les morts. Nous pouvions donc lui faire confiance pour nous rendre forts. '
