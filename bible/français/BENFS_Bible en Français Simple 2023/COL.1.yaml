document_id: COL.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: text
    content: 'Nous, Paul et notre ami chrétien, Timothée, vous écrivons cette lettre. Dieu m’a choisi, moi Paul, d’être un '
  - type: text
    content: apôtre
  - type: text
    content: ' au nom de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ainsi donc, vous serez en mesure de faire ces choses que le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' doit faire. Et vous ferez toujours les choses qui rendent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' heureux.'
  - type: text
    content: 'Par conséquent, vous allez faire beaucoup de sortes de bonnes choses pendant votre vie. Et vous connaîtrez Dieu de plus en plus. '
  '11':
  - type: text
    content: Dieu vous rendra forts dans vos cœurs, parce qu’il est très grand et puissant. Donc, pour tout ce qui peut arriver, vous pouvez être patients, courageux et heureux.
  '12':
  - type: text
    content: 'Et vous pouvez remercier le Père, qui vous a permis de rejoindre son peuple. Avec eux, vous recevrez ce qu’il a préparé pour son peuple dans la lumière. '
  '13':
  - type: text
    content: 'Dieu, notre Père, nous a sauvés de la puissance des ténèbres. Il aime son Fils. Et il nous a faits être le peuple de son Fils. Et maintenant, son Fils règne sur nous. '
  '14':
  - type: text
    content: Le Fils de Dieu nous a libérés. Ainsi Dieu ne nous punira pas. Dieu nous a pardonné pour les mauvaises choses que nous avons faites, à cause de son Fils.
  - type: heading
    content: D’où vient Christ et qu’est‑ce qu’il a fait pour nous ?
  '15':
  - type: text
    content: Nous ne pouvons pas voir Dieu. Mais Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est tout à fait ce que Dieu est. Avant même que Dieu fasse quoi que ce soit, Jésus était déjà le Fils du Père. '
  '16':
  - type: text
    content: 'Dieu a fait tout ce qui est sur la terre et au '
  - type: text
    content: ciel
  - type: text
    content: ' par son Fils. Il a fait toutes les choses que nous pouvons voir. Et il a fait les choses que nous ne pouvons pas voir. Il a fait des chefs, des dirigeants. Il les a faits puissants. Et il leur a donné le pouvoir. Dieu les a faits par son Fils. Dieu a tout créé par son Fils et pour son Fils. '
  '17':
  - type: text
    content: Christ
  - type: text
    content: ' était là avant toute autre chose, et il tient toutes choses ensemble. '
  '18':
  - type: text
    content: 'Pensez au peuple de '
  - type: text
    content: Christ
  - type: text
    content: ' comme son corps. '
  - type: text
    content: Christ
  - type: text
    content: ' est la tête de ce corps, qui s’appelle l’Église. Il est le commencement. Et il est le Fils du Père. Donc, il est le chef de tout le monde qui va gagner le combat contre la mort. En conséquence, le '
  - type: text
    content: Christ
  - type: text
    content: ' est le premier et le plus important en toutes choses. '
  '19':
  - type: text
    content: 'Il a vraiment fait plaisir à Dieu. Ainsi tout ce qui est de Dieu est dans le '
  - type: text
    content: Christ
  - type: text
    content: '. Toute sa nature est en '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Nous vous écrivons à vous, le peuple de Dieu qui vivez à Colosses. Vous êtes comme nos frères et sœurs, parce que vous êtes unis à '
  - type: text
    content: Christ
  - type: text
    content: '. Et vous continuez de croire en '
  - type: text
    content: Christ
  - type: text
    content: . Nous prions pour que Dieu, notre Père, continue d’être très gentil avec vous. Nous prions aussi qu’il vous donne la paix dans vos cœurs.
  - type: heading
    content: Paul remercie Dieu pour les croyants de Colosses
  '20':
  - type: text
    content: 'En plus, il a vraiment plu à Dieu de ramener toutes choses à lui‑même. Il l’a fait par la croix. '
  - type: text
    content: Christ
  - type: text
    content: ' a saigné et est mort sur la croix. Sa mort a fait unir Dieu avec tout. Tout ce qui est sur la terre ou dans les cieux s’entend bien.'
  '21':
  - type: text
    content: 'À un moment donné, vous étiez loin de Dieu. Vous étiez ses ennemis, parce que vous pensiez de mauvaises choses. Vous étiez ses ennemis, parce que vous avez fait de mauvaises choses. '
  '22':
  - type: text
    content: 'Mais maintenant tout a changé. Cela est arrivé, parce que '
  - type: text
    content: Christ
  - type: text
    content: ' est mort comme un homme. Dieu a donc décidé de vous ramener à lui‑même. Il a décidé de vous faire complètement bons et nettoyer votre intérieur. Et personne ne pourra plus dire que vous avez fait quelque chose de mal.'
  '23':
  - type: text
    content: 'Mais vous devez continuer à croire fermement en '
  - type: text
    content: Christ
  - type: text
    content: . Vous ne devez pas laisser quoi que ce soit vous arrêter. Vous devez continuer d’espérer vivement tout ce que vous avez appris de la Bonne Nouvelle. Les gens ont dit cette Bonne Nouvelle à tout le monde dans le monde. Et Dieu a fait de moi, Paul, un serviteur qui dit aux gens cette Bonne Nouvelle.
  - type: heading
    content: Le travail de Paul pour le peuple de Jésus‑Christ
  '24':
  - type: text
    content: 'A ce moment, je souffre pour vous. Mais je suis content de ces souffrances. '
  - type: text
    content: Christ
  - type: text
    content: ' avait souffert pour son propre peuple. Et pendant que je vis, je souffre aussi dans ma chair. Je contribue ainsi à finir les souffrances de Jésus. Il continue de souffrir à cause de son corps, qui est son peuple (Église). '
  '25':
  - type: text
    content: 'Dieu a fait de moi un serviteur, qui aide son peuple. Il m’a choisi pour vous dire tout son message. '
  '26':
  - type: text
    content: Ce message est le secret que Dieu a caché à tout le monde avant. Il a caché à tous les gens qui ont vécu dans le passé. Mais maintenant, il montre ce secret à son peuple.
  '27':
  - type: text
    content: 'Dieu voulait que son peuple sache combien ce secret est très grand. Il est très bon et il aidera les gens de tous les pays très bien. Ce secret est le '
  - type: text
    content: Christ
  - type: text
    content: ' en vous. Et parce qu’il est en vous, vous espérez certainement les bonnes choses. Vous êtes sûrs que vous allez vivre avec Dieu toujours. Vous serez avec lui dans le bel endroit où il vit.'
  '28':
  - type: text
    content: 'Voilà pourquoi nous parlons de '
  - type: text
    content: Christ
  - type: text
    content: ' à tout le monde. Nous leur enseignons tout ce que nous savons. Nous leur disons ce que Dieu veut qu’ils fassent. Nous leur disons ce qu’il ne veut pas. Voici notre but pour chaque personne qui est unie à '
  - type: text
    content: Christ
  - type: text
    content: '  : Nous voulons que chaque personne devienne complètement ce qu’elle devrait être. Nous voulons amener chaque personne à Dieu comme ça. '
  '29':
  - type: text
    content: 'Voilà pourquoi je travaille très fort. '
  - type: text
    content: Christ
  - type: text
    content: ' me rend très fort pour ce travail difficile. Il travaille puissamment en moi pour me rendre fort.'
  '3':
  - type: text
    content: 'Nous remercions toujours Dieu, le Père de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', quand nous prions pour vous. '
  '4':
  - type: text
    content: Nous remercions Dieu, parce que les gens nous ont dit de bonnes choses sur vous.
  - type: text
    content: Vous continuez de croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' et vous aimez tout le peuple de Dieu. '
  '5':
  - type: text
    content: 'Vous faites ces choses, parce que vous espérez certainement les bonnes choses de Dieu. Dieu garde en toute sécurité les choses que vous espérez. Il les stocke au '
  - type: text
    content: ciel
  - type: text
    content: ' pour vous. Vous avez appris au sujet de ces choses avant. C’était quand les gens vous avaient d’abord dit le vrai message, la Bonne Nouvelle.'
  '6':
  - type: text
    content: Cette Bonne Nouvelle a donné de bons résultats parmi vous, depuis le moment où vous l’avez entendue d’abord. À ce moment‑là, vous avez compris clairement comment Dieu est vraiment très gentil et bon. Aussi, les gens partout dans le monde entendent cette Bonne Nouvelle. Et elle produit de plus en plus de bons résultats parmi eux aussi.
  '7':
  - type: text
    content: 'Vous avez entendu parler de cette Bonne Nouvelle d’Épaphras. Comme nous, il est le serviteur du '
  - type: text
    content: Christ
  - type: text
    content: '. Et nous aimons Épaphras beaucoup. Il continue de bien travailler pour le '
  - type: text
    content: Christ
  - type: text
    content: ' en notre nom. '
  '8':
  - type: text
    content: Épaphras nous a dit à quel point l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous a fait aimer d’autres personnes.'
  - type: heading
    content: Paul prie pour que le peuple connaisse Dieu de plus en plus
  '9':
  - type: text
    content: C’est à cause de ces choses que nous ne cessons de prier pour vous. Nous avons prié depuis le jour où Épaphras nous a dit des nouvelles de vous.
  - type: text
    content: 'Nous demandons à Dieu que son '
  - type: text
    content: Esprit
  - type: text
    content: ' vous aide à comprendre les choses correctement. Donc, vous saurez complètement et clairement ce que Dieu veut que vous fassiez. '
