document_id: COL.1,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 1
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nous, Paul et notre ami chrétien, Timothée, vous écrivons cette lettre. Dieu m’a choisi, moi Paul, d’être un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: ' au nom de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ainsi donc, vous serez en mesure de faire ces choses que le peuple du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' doit faire. Et vous ferez toujours les choses qui rendent le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' heureux.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par conséquent, vous allez faire beaucoup de sortes de bonnes choses pendant votre vie. Et vous connaîtrez Dieu de plus en plus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dieu vous rendra forts dans vos cœurs, parce qu’il est très grand et puissant. Donc, pour tout ce qui peut arriver, vous pouvez être patients, courageux et heureux.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et vous pouvez remercier le Père, qui vous a permis de rejoindre son peuple. Avec eux, vous recevrez ce qu’il a préparé pour son peuple dans la lumière. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dieu, notre Père, nous a sauvés de la puissance des ténèbres. Il aime son Fils. Et il nous a faits être le peuple de son Fils. Et maintenant, son Fils règne sur nous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le Fils de Dieu nous a libérés. Ainsi Dieu ne nous punira pas. Dieu nous a pardonné pour les mauvaises choses que nous avons faites, à cause de son Fils.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'D’où vient '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et qu’est‑ce qu’il a fait pour nous ?'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nous ne pouvons pas voir Dieu. Mais Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est tout à fait ce que Dieu est. Avant même que Dieu fasse quoi que ce soit, Jésus était déjà le Fils du Père. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dieu a fait tout ce qui est sur la terre et au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' par son Fils. Il a fait toutes les choses que nous pouvons voir. Et il a fait les choses que nous ne pouvons pas voir. Il a fait des chefs, des dirigeants. Il les a faits puissants. Et il leur a donné le pouvoir. Dieu les a faits par son Fils. Dieu a tout créé par son Fils et pour son Fils. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' était là avant toute autre chose, et il tient toutes choses ensemble. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Pensez au peuple de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' comme son corps. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est la tête de ce corps, qui s’appelle l’Église. Il est le commencement. Et il est le Fils du Père. Donc, il est le chef de tout le monde qui va gagner le combat contre la mort. En conséquence, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est le premier et le plus important en toutes choses. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il a vraiment fait plaisir à Dieu. Ainsi tout ce qui est de Dieu est dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Toute sa nature est en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nous vous écrivons à vous, le peuple de Dieu qui vivez à Colosses. Vous êtes comme nos frères et sœurs, parce que vous êtes unis à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Et vous continuez de croire en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Nous prions pour que Dieu, notre Père, continue d’être très gentil avec vous. Nous prions aussi qu’il vous donne la paix dans vos cœurs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul remercie Dieu pour les croyants de Colosses
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En plus, il a vraiment plu à Dieu de ramener toutes choses à lui‑même. Il l’a fait par la croix. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a saigné et est mort sur la croix. Sa mort a fait unir Dieu avec tout. Tout ce qui est sur la terre ou dans les cieux s’entend bien.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'À un moment donné, vous étiez loin de Dieu. Vous étiez ses ennemis, parce que vous pensiez de mauvaises choses. Vous étiez ses ennemis, parce que vous avez fait de mauvaises choses. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais maintenant tout a changé. Cela est arrivé, parce que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort comme un homme. Dieu a donc décidé de vous ramener à lui‑même. Il a décidé de vous faire complètement bons et nettoyer votre intérieur. Et personne ne pourra plus dire que vous avez fait quelque chose de mal.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mais vous devez continuer à croire fermement en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Vous ne devez pas laisser quoi que ce soit vous arrêter. Vous devez continuer d’espérer vivement tout ce que vous avez appris de la Bonne Nouvelle. Les gens ont dit cette Bonne Nouvelle à tout le monde dans le monde. Et Dieu a fait de moi, Paul, un serviteur qui dit aux gens cette Bonne Nouvelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le travail de Paul pour le peuple de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'A ce moment, je souffre pour vous. Mais je suis content de ces souffrances. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' avait souffert pour son propre peuple. Et pendant que je vis, je souffre aussi dans ma chair. Je contribue ainsi à finir les souffrances de Jésus. Il continue de souffrir à cause de son corps, qui est son peuple (Église). '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dieu a fait de moi un serviteur, qui aide son peuple. Il m’a choisi pour vous dire tout son message. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ce message est le secret que Dieu a caché à tout le monde avant. Il a caché à tous les gens qui ont vécu dans le passé. Mais maintenant, il montre ce secret à son peuple.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dieu voulait que son peuple sache combien ce secret est très grand. Il est très bon et il aidera les gens de tous les pays très bien. Ce secret est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' en vous. Et parce qu’il est en vous, vous espérez certainement les bonnes choses. Vous êtes sûrs que vous allez vivre avec Dieu toujours. Vous serez avec lui dans le bel endroit où il vit.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Voilà pourquoi nous parlons de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' à tout le monde. Nous leur enseignons tout ce que nous savons. Nous leur disons ce que Dieu veut qu’ils fassent. Nous leur disons ce qu’il ne veut pas. Voici notre but pour chaque personne qui est unie à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '  : Nous voulons que chaque personne devienne complètement ce qu’elle devrait être. Nous voulons amener chaque personne à Dieu comme ça. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Voilà pourquoi je travaille très fort. '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' me rend très fort pour ce travail difficile. Il travaille puissamment en moi pour me rendre fort.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nous remercions toujours Dieu, le Père de notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', quand nous prions pour vous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nous remercions Dieu, parce que les gens nous ont dit de bonnes choses sur vous.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous continuez de croire en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et vous aimez tout le peuple de Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Vous faites ces choses, parce que vous espérez certainement les bonnes choses de Dieu. Dieu garde en toute sécurité les choses que vous espérez. Il les stocke au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' pour vous. Vous avez appris au sujet de ces choses avant. C’était quand les gens vous avaient d’abord dit le vrai message, la Bonne Nouvelle.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Cette Bonne Nouvelle a donné de bons résultats parmi vous, depuis le moment où vous l’avez entendue d’abord. À ce moment‑là, vous avez compris clairement comment Dieu est vraiment très gentil et bon. Aussi, les gens partout dans le monde entendent cette Bonne Nouvelle. Et elle produit de plus en plus de bons résultats parmi eux aussi.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Vous avez entendu parler de cette Bonne Nouvelle d’Épaphras. Comme nous, il est le serviteur du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Et nous aimons Épaphras beaucoup. Il continue de bien travailler pour le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' en notre nom. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Épaphras nous a dit à quel point l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu vous a fait aimer d’autres personnes.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul prie pour que le peuple connaisse Dieu de plus en plus
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: C’est à cause de ces choses que nous ne cessons de prier pour vous. Nous avons prié depuis le jour où Épaphras nous a dit des nouvelles de vous.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous demandons à Dieu que son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' vous aide à comprendre les choses correctement. Donc, vous saurez complètement et clairement ce que Dieu veut que vous fassiez. '
