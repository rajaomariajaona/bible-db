document_id: JHN.21,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 21
  - type: heading
    content: Jésus se montre lui‑même aux disciples à nouveau
  - type: text
    content: 'Après cela, Jésus s’est montré aux '
  - type: text
    content: disciples
  - type: text
    content: ' à nouveau. Ils étaient au bord de la mer Tibériade. Voici comment cela est arrivé. '
  '10':
  - type: text
    content: 'Jésus leur a dit : Apportez des poissons que vous venez d’attraper.'
  '11':
  - type: text
    content: 'Simon Pierre est monté dans le petit bateau. Il a tiré le filet sur le '
  - type: text
    content: rivage
  - type: text
    content: . C’était plein de gros poissons. Il y avait 153 gros poissons. Il y avait tellement de poissons, mais le filet ne se déchirait pas.
  '12':
  - type: text
    content: 'Jésus leur a dit : Venez manger. Aucun des '
  - type: text
    content: disciples
  - type: text
    content: ' n’a eu le courage de lui demander : Qui es‑tu ? Ils savaient que c’était le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: text
    content: Alors Jésus est allé et il a pris le pain. Puis il leur a donné du pain. Et il a fait la même chose avec les poissons.
  '14':
  - type: text
    content: Jésus s’est alors montré à ses disciples pour la troisième fois après sa mort et sa résurrection.
  - type: heading
    content: Jésus parle à Pierre
  '15':
  - type: text
    content: 'Quand ils ont fini de manger, Jésus a parlé à Simon Pierre. Il a dit : Simon, fils de Jean, m’aimes‑tu plus que ceux‑ci ? Pierre a répondu : Oui, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu sais que je t’aime. Jésus lui a dit : Nourris mes agneaux.'
  '16':
  - type: text
    content: 'Jésus lui a demandé une seconde fois : Simon, fils de Jean, m’aimes‑tu ? Pierre a répondu : Oui, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu sais que je t’aime. Jésus lui a dit : Nourris mes brebis. '
  '17':
  - type: text
    content: 'Jésus lui a demandé une troisième fois : Simon, fils de Jean, m’aimes‑tu ? Pierre était triste parce que Jésus lui a demandé une troisième fois : Est‑ce que tu m’aimes ? Alors il a dit à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu sais tout. Tu sais que je t’aime ! Jésus lui a dit : Nourris mon troupeau. '
  '18':
  - type: text
    content: 'Je te dis la vérité. Quand tu étais jeune, tu portais toi‑même la ceinture. Et tu allais à un endroit que tu voulais visiter. Mais quand tu seras vieux, ce sera différent. Tu étendras les mains et quelqu’un d’autre va te mettre quelque chose. Ensuite, il t’emmènera là où tu ne voudras pas aller. '
  '19':
  - type: text
    content: 'Jésus parlait de la façon dont Pierre mourra pour montrer combien Dieu est grand. Alors Jésus a dit à Pierre : Suis‑moi.'
  '2':
  - type: text
    content: 'Simon Pierre, Thomas '
  - type: text
    content: Didyme
  - type: text
    content: ', et Nathanaël (qui venait de '
  - type: text
    content: Cana
  - type: text
    content: ' en Galilée) étaient ensemble. Ils étaient avec les fils de Zébédée et 2 autres '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Pierre s’est retourné. Il a vu un autre '
  - type: text
    content: disciple
  - type: text
    content: '. Il était le '
  - type: text
    content: disciple
  - type: text
    content: ' que Jésus aimait. Ce '
  - type: text
    content: disciple
  - type: text
    content: ' les suivait. Il était l’homme qui avait été très proche de Jésus au souper. Ce '
  - type: text
    content: disciple
  - type: text
    content: ' avait demandé à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui te livrera à tes ennemis ? '
  '21':
  - type: text
    content: 'Pierre a vu ce '
  - type: text
    content: disciple
  - type: text
    content: '. Il a dit à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', qu’est‑ce qui va lui arriver ? '
  '22':
  - type: text
    content: 'Jésus lui a répondu : Je pourrais le laisser vivant sur la terre jusqu’à ce que je revienne. Cela n’a pas d’importance pour toi.'
  - type: text
    content: Tu dois me suivre !
  '23':
  - type: text
    content: 'Ensuite, les gens ont commencé à dire ces paroles que Jésus venait de dire. Les gens ont cru en Jésus. Ils ont commencé à avoir une fausse idée de ce '
  - type: text
    content: disciple
  - type: text
    content: '. Ils pensaient que ce '
  - type: text
    content: disciple
  - type: text
    content: ' ne mourra pas. Mais Jésus n’a pas dit : Il ne mourra pas. Au lieu de cela, il a dit : Peut‑être que je pourrais le laisser vivre jusqu’à ce que je revienne. Mais cela n’a pas d’importance pour toi. '
  '24':
  - type: text
    content: 'C’est le '
  - type: text
    content: disciple
  - type: text
    content: ' qui avait parlé de ces choses. C’est lui le '
  - type: text
    content: disciple
  - type: text
    content: ' qui les a écrites. Et ce qu’il dit, est vrai. Nous savons cela. '
  '25':
  - type: text
    content: Jésus a fait beaucoup d’autres choses aussi. Si les gens allaient écrire toutes ces choses, il y aurait beaucoup de livres. Je ne pense pas que le monde entier pourrait contenir tous ces livres.
  '3':
  - type: text
    content: 'Simon Pierre a dit aux autres '
  - type: text
    content: disciples
  - type: text
    content: '  : Je vais pêcher des poissons. Ils ont répondu : Nous allons venir avec toi. Donc, ils sont sortis et ils sont montés dans le petit bateau. Mais ils n’ont rien pêché cette nuit. '
  '4':
  - type: text
    content: 'Tôt le matin, Jésus se tenait sur le '
  - type: text
    content: rivage
  - type: text
    content: '. Mais les '
  - type: text
    content: disciples
  - type: text
    content: ' ne savaient pas que c’était Jésus. '
  '5':
  - type: text
    content: 'Alors Jésus leur a demandé : Amis, avez‑vous pêché du poisson ? Ils ont répondu : Non ! '
  '6':
  - type: text
    content: 'Il a dit : jetez votre filet sur le côté droit du petit bateau. Si vous faites cela, vous allez attraper quelques poissons. Ils ont jeté donc le filet. Puis ils ont pris beaucoup de poissons. Ainsi, ils ne pouvaient pas tirer le filet dans le petit bateau.'
  '7':
  - type: text
    content: 'Le '
  - type: text
    content: disciple
  - type: text
    content: ' que Jésus aimait a dit à Pierre : C’est le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Quand Simon Pierre l’a entendu dire : C’est le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il a porté son vêtement. Alors Pierre s’est jeté à l’eau. '
  '8':
  - type: text
    content: 'Les autres '
  - type: text
    content: disciples
  - type: text
    content: ' l’ont suivi dans le petit bateau. Ils ont tiré le filet. Il était plein de poissons. Ils n’étaient pas loin de la terre. C’était à environ 100 mètres. '
  '9':
  - type: text
    content: 'Quand ils sont arrivés au '
  - type: text
    content: rivage
  - type: text
    content: ', ils ont vu un feu là. Certains poissons étaient mis sur le feu. Il y avait un peu de pain, là aussi. '
