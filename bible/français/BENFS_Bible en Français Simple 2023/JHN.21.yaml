document_id: JHN.21
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 21
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus se montre lui‑même aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' à nouveau'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus s’est montré aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' à nouveau. Ils étaient au bord de la mer Tibériade. Voici comment cela est arrivé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Simon Pierre, Thomas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Didyme
  - type: text
    text: ', et Nathanaël (qui venait de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Cana
  - type: text
    text: ' en Galilée) étaient ensemble. Ils étaient avec les fils de Zébédée et 2 autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Simon Pierre a dit aux autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Je vais pêcher des poissons. Ils ont répondu : Nous allons venir avec toi. Donc, ils sont sortis et ils sont montés dans le petit bateau. Mais ils n’ont rien pêché cette nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tôt le matin, Jésus se tenait sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rivage
  - type: text
    text: '. Mais les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ne savaient pas que c’était Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors Jésus leur a demandé : Amis, avez‑vous pêché du poisson ? Ils ont répondu : Non ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il a dit : jetez votre filet sur le côté droit du petit bateau. Si vous faites cela, vous allez attraper quelques poissons. Ils ont jeté donc le filet. Puis ils ont pris beaucoup de poissons. Ainsi, ils ne pouvaient pas tirer le filet dans le petit bateau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' que Jésus aimait a dit à Pierre : C’est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Quand Simon Pierre l’a entendu dire : C’est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', il a porté son vêtement. Alors Pierre s’est jeté à l’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' l’ont suivi dans le petit bateau. Ils ont tiré le filet. Il était plein de poissons. Ils n’étaient pas loin de la terre. C’était à environ 100 mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand ils sont arrivés au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rivage
  - type: text
    text: ', ils ont vu un feu là. Certains poissons étaient mis sur le feu. Il y avait un peu de pain, là aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus leur a dit : Apportez des poissons que vous venez d’attraper.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Simon Pierre est monté dans le petit bateau. Il a tiré le filet sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rivage
  - type: text
    text: . C’était plein de gros poissons. Il y avait 153 gros poissons. Il y avait tellement de poissons, mais le filet ne se déchirait pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus leur a dit : Venez manger. Aucun des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' n’a eu le courage de lui demander : Qui es‑tu ? Ils savaient que c’était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors Jésus est allé et il a pris le pain. Puis il leur a donné du pain. Et il a fait la même chose avec les poissons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Jésus s’est alors montré à ses disciples pour la troisième fois après sa mort et sa résurrection.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle à Pierre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand ils ont fini de manger, Jésus a parlé à Simon Pierre. Il a dit : Simon, fils de Jean, m’aimes‑tu plus que ceux‑ci ? Pierre a répondu : Oui, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tu sais que je t’aime. Jésus lui a dit : Nourris mes agneaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus lui a demandé une seconde fois : Simon, fils de Jean, m’aimes‑tu ? Pierre a répondu : Oui, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tu sais que je t’aime. Jésus lui a dit : Nourris mes brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus lui a demandé une troisième fois : Simon, fils de Jean, m’aimes‑tu ? Pierre était triste parce que Jésus lui a demandé une troisième fois : Est‑ce que tu m’aimes ? Alors il a dit à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tu sais tout. Tu sais que je t’aime ! Jésus lui a dit : Nourris mon troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je te dis la vérité. Quand tu étais jeune, tu portais toi‑même la ceinture. Et tu allais à un endroit que tu voulais visiter. Mais quand tu seras vieux, ce sera différent. Tu étendras les mains et quelqu’un d’autre va te mettre quelque chose. Ensuite, il t’emmènera là où tu ne voudras pas aller. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus parlait de la façon dont Pierre mourra pour montrer combien Dieu est grand. Alors Jésus a dit à Pierre : Suis‑moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pierre s’est retourné. Il a vu un autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: '. Il était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' que Jésus aimait. Ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' les suivait. Il était l’homme qui avait été très proche de Jésus au souper. Ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' avait demandé à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui te livrera à tes ennemis ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pierre a vu ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: '. Il a dit à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qu’est‑ce qui va lui arriver ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus lui a répondu : Je pourrais le laisser vivant sur la terre jusqu’à ce que je revienne. Cela n’a pas d’importance pour toi.'
- type: usfm
  marker: m
  children:
  - type: text
    text: Tu dois me suivre !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ensuite, les gens ont commencé à dire ces paroles que Jésus venait de dire. Les gens ont cru en Jésus. Ils ont commencé à avoir une fausse idée de ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: '. Ils pensaient que ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' ne mourra pas. Mais Jésus n’a pas dit : Il ne mourra pas. Au lieu de cela, il a dit : Peut‑être que je pourrais le laisser vivre jusqu’à ce que je revienne. Mais cela n’a pas d’importance pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' qui avait parlé de ces choses. C’est lui le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' qui les a écrites. Et ce qu’il dit, est vrai. Nous savons cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jésus a fait beaucoup d’autres choses aussi. Si les gens allaient écrire toutes ces choses, il y aurait beaucoup de livres. Je ne pense pas que le monde entier pourrait contenir tous ces livres.
