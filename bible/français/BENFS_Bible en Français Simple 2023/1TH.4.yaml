document_id: 1TH.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Une vie qui rend Dieu heureux
  - type: text
    content: 'Nos amis chrétiens, il y a encore quelque chose que nous devons dire. Nous vous avons déjà enseignés à vivre d’une manière qui plaît à Dieu. Et certainement, vous vivez comme ça. Maintenant, nous vous demandons de continuer de vivre comme ça encore mieux. Au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus, nous vous demandons sérieusement de le faire. '
  '10':
  - type: text
    content: 'Vraiment, vous aimez tous les croyants de toute la région de Macédoine. Et maintenant, nous vous demandons, en tant qu’amis chrétiens, de vous aimer de plus en plus. '
  '11':
  - type: text
    content: 'Essayez beaucoup de vivre en paix avec les autres. Travaillez dur à votre propre travail. Nous vous avons déjà dit que vous devez faire ces choses. '
  '12':
  - type: text
    content: Si vous vivez de cette manière, d’autres personnes qui ne sont pas croyantes vous respecteront. De plus, vous n’aurez pas à demander à quelqu’un d’autre de vous donner les choses dont vous avez besoin.
  - type: heading
    content: Le retour de Jésus
  '13':
  - type: text
    content: 'Nos amis chrétiens, nous voulons que vous compreniez bien au sujet de vos amis décédés. Alors, vous ne continuerez pas d’être tristes pour eux. Les gens qui n’espèrent pas vivre après la mort, seront tristes quand leurs amis mourront. Mais vous ne devriez pas vous troubler comme ces autres personnes. '
  '14':
  - type: text
    content: Nous croyons que Jésus est mort et qu’il est ressuscité après la mort. Ainsi, nous pensons également que les gens décédés comme chrétiens ressusciteront. Quand Dieu ramènera Jésus, il emmènera les chrétiens avec Jésus.
  '15':
  - type: text
    content: 'Nous vous racontons le message que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a dit. C’est ce qui arrivera lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' reviendra. Ceux d’entre nous qui sont encore en vie n’iront pas rencontrer le '
  - type: text
    content: Seigneur
  - type: text
    content: ' d’abord. Nous n’irons pas avant ces gens qui sont déjà morts. '
  '16':
  - type: text
    content: 'Ce jour‑là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui‑même descendra du '
  - type: text
    content: ciel
  - type: text
    content: '. Il criera avec puissance. Les gens entendront la voix du chef des '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu. Ils entendront le son de la trompette de Dieu. Ensuite, ces gens qui sont morts en tant que chrétiens redeviendront vivants. Ils seront les premiers à se lever. '
  '17':
  - type: text
    content: 'Après cela, ceux d’entre nous qui seront encore en vie se joindront à eux. Dieu nous emmènera soudain dans les nuages. De cette façon, nous rencontrerons tous le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Nous serons donc tous avec le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour toujours. '
  '18':
  - type: text
    content: Parce que ce message est vrai, dites‑le‑vous les uns aux autres. Aidez‑vous les uns les autres à être forts, pas tristes.
  '2':
  - type: text
    content: 'Vous vous souvenez sûrement de ce que nous vous avons enseigné avec le pouvoir du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus.'
  '3':
  - type: text
    content: 'Vous en tant que le propre peuple de Dieu, Dieu veut de vous ceci : Il veut que vous soyez complètement bons. Vous ne devez donc pas avoir de relations sexuelles de mauvaise manière. '
  '4':
  - type: text
    content: 'Chaque homme doit apprendre à diriger correctement son propre corps. Ensuite, vous ne ferez que ce qui est pur et juste. '
  '5':
  - type: text
    content: 'Les gens qui ne connaissent pas Dieu veulent beaucoup avoir des relations sexuelles d’une mauvaise manière. Ils ne peuvent pas se contrôler. Vous ne devez pas être comme ces gens. '
  '6':
  - type: text
    content: 'Aucun homme parmi vous ne devrait avoir de relations sexuelles avec la femme d’un ami chrétien. Ce serait comme si vous l’aviez volé. Ce serait une mauvaise chose à faire contre lui. N’oubliez pas que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' punira tous ceux qui font des choses comme ça. Nous vous l’avons déjà dit. Nous vous en avons averti très sérieusement.'
  '7':
  - type: text
    content: 'Dieu nous a choisis pour lui appartenir. Il ne veut pas que nous fassions de mauvaises choses. En tant que son peuple, il veut que nous soyons complètement bons. '
  '8':
  - type: text
    content: 'Alors, ne refusez pas ce que je dis. Sinon, ce n’est pas seulement une personne à laquelle vous refusez d’obéir. Vous refusez d’obéir à Dieu. Et Dieu est celui qui vous a donné son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: .
  '9':
  - type: text
    content: 'Mais je n’ai pas besoin de vous écrire comment vous devez aimer les autres croyants. Dieu lui‑même vous a enseignés à vous aimer. '
