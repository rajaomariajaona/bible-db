document_id: 1TH.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une vie qui rend Dieu heureux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nos amis chrétiens, il y a encore quelque chose que nous devons dire. Nous vous avons déjà enseignés à vivre d’une manière qui plaît à Dieu. Et certainement, vous vivez comme ça. Maintenant, nous vous demandons de continuer de vivre comme ça encore mieux. Au nom du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus, nous vous demandons sérieusement de le faire. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous vous souvenez sûrement de ce que nous vous avons enseigné avec le pouvoir du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous en tant que le propre peuple de Dieu, Dieu veut de vous ceci : Il veut que vous soyez complètement bons. Vous ne devez donc pas avoir de relations sexuelles de mauvaise manière. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Chaque homme doit apprendre à diriger correctement son propre corps. Ensuite, vous ne ferez que ce qui est pur et juste. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les gens qui ne connaissent pas Dieu veulent beaucoup avoir des relations sexuelles d’une mauvaise manière. Ils ne peuvent pas se contrôler. Vous ne devez pas être comme ces gens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aucun homme parmi vous ne devrait avoir de relations sexuelles avec la femme d’un ami chrétien. Ce serait comme si vous l’aviez volé. Ce serait une mauvaise chose à faire contre lui. N’oubliez pas que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' punira tous ceux qui font des choses comme ça. Nous vous l’avons déjà dit. Nous vous en avons averti très sérieusement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dieu nous a choisis pour lui appartenir. Il ne veut pas que nous fassions de mauvaises choses. En tant que son peuple, il veut que nous soyons complètement bons. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors, ne refusez pas ce que je dis. Sinon, ce n’est pas seulement une personne à laquelle vous refusez d’obéir. Vous refusez d’obéir à Dieu. Et Dieu est celui qui vous a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais je n’ai pas besoin de vous écrire comment vous devez aimer les autres croyants. Dieu lui‑même vous a enseignés à vous aimer. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vraiment, vous aimez tous les croyants de toute la région de Macédoine. Et maintenant, nous vous demandons, en tant qu’amis chrétiens, de vous aimer de plus en plus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Essayez beaucoup de vivre en paix avec les autres. Travaillez dur à votre propre travail. Nous vous avons déjà dit que vous devez faire ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si vous vivez de cette manière, d’autres personnes qui ne sont pas croyantes vous respecteront. De plus, vous n’aurez pas à demander à quelqu’un d’autre de vous donner les choses dont vous avez besoin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le retour de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nos amis chrétiens, nous voulons que vous compreniez bien au sujet de vos amis décédés. Alors, vous ne continuerez pas d’être tristes pour eux. Les gens qui n’espèrent pas vivre après la mort, seront tristes quand leurs amis mourront. Mais vous ne devriez pas vous troubler comme ces autres personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nous croyons que Jésus est mort et qu’il est ressuscité après la mort. Ainsi, nous pensons également que les gens décédés comme chrétiens ressusciteront. Quand Dieu ramènera Jésus, il emmènera les chrétiens avec Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous vous racontons le message que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a dit. C’est ce qui arrivera lorsque le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' reviendra. Ceux d’entre nous qui sont encore en vie n’iront pas rencontrer le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' d’abord. Nous n’irons pas avant ces gens qui sont déjà morts. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce jour‑là, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui‑même descendra du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Il criera avec puissance. Les gens entendront la voix du chef des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' de Dieu. Ils entendront le son de la trompette de Dieu. Ensuite, ces gens qui sont morts en tant que chrétiens redeviendront vivants. Ils seront les premiers à se lever. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après cela, ceux d’entre nous qui seront encore en vie se joindront à eux. Dieu nous emmènera soudain dans les nuages. De cette façon, nous rencontrerons tous le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Nous serons donc tous avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Parce que ce message est vrai, dites‑le‑vous les uns aux autres. Aidez‑vous les uns les autres à être forts, pas tristes.
