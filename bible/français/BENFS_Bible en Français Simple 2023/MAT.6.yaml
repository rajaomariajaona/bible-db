document_id: MAT.6
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 6
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne comment aider les pauvres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Attention. Ne faites pas de bonnes choses pour être vus par des gens. Que ce soit un secret. Si vous faites ces choses pour vous montrer aux gens, Dieu, votre Père qui est dans les cieux ne vous paiera pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quand tu donnes quelque chose à une personne pauvre, ne le dis à personne. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: ' font cela dans les bâtiments de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Ils le font aussi à l’extérieur dans les rues animées de la ville. Ils font cela pour que les autres aillent dire : Ces hommes sont bons. Je vous dis la vérité : Ils ont déjà reçu de bonnes paroles d’autres personnes. Ainsi, Dieu ne leur donnera rien de plus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Donne aux pauvres. Mais que personne ne le sache. C’est comme si ta main gauche ne sait pas ce que fait ta main droite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors ton offrande sera secrète. Dieu voit les choses qui sont secrètes. Et il te donnera de bonnes choses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne comment prier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne priez pas comme les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '. Ils aiment prier debout dans les bâtiments de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Ils aiment aussi prier aux coins des rues. Ensuite, beaucoup de gens peuvent les voir prier. Je vous dis la vérité : Ils ont déjà reçu de bonnes paroles des gens. Alors Dieu ne leur donnera plus rien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais quand tu pries, entre seul dans ta chambre. Et prie ton père qui est au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ', même si tu ne peux pas le voir. Ton père voit ce que tu fais en privé. Il te récompensera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsque vous priez, ne dites pas les mêmes paroles plusieurs fois. Et ne dites pas beaucoup de mots qui ne signifient rien. Les païens font aussi cela. Et ils pensent que Dieu les entendra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne soyez pas comme eux. Dieu votre Père sait déjà tous vos besoins. Il sait cela avant même votre prière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici donc comment vous devez prier :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Dieu notre Père qui est aux cieux, nous prions que les gens respectent ton saint nom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous voulons que ton règne vienne. Nous voulons les choses que tu veux faire au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Nous voulons les choses que tu veux faire ici sur terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Donne‑nous la nourriture dont nous avons besoin chaque jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pardonne le mal que nous avons fait.
- type: usfm
  marker: p
  children:
  - type: text
    text: D’autres gens nous ont fait du mal. Nous leur avons pardonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ne nous laisse pas accepter de faire le mal.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais sauve‑nous du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pardonnez aux gens qui vous font du mal. Alors Dieu, votre Père céleste pardonnera aussi vos fautes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais si vous ne pardonnez pas à d’autres gens, votre Père ne vous pardonnera pas non plus vos fautes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus enseigne comment se comporter quand on '
  - type: usfm
    marker: w
    children:
    - type: text
      text: jeûne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Soyez prudents lorsque vous arrêtez de manger pour prier. Ne montrez pas de visages tristes. Ainsi, les gens ne sauront pas ce que vous faites. Voilà ce que les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: ' font. Dieu ne donnera rien aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hypocrites
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais quand tu arrêtes de manger, lave‑toi le visage. Arrange proprement tes cheveux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: D’autres gens ne sauront pas que tu ne manges pas. Mais Dieu ton Père le sait. Il voit ce que tu fais dans ce lieu secret. Donc, il te donnera de bonnes choses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne sur les choses de valeur au ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ne gardez pas vos choses de valeur du monde. Les insectes et de l’eau peuvent les détruire. Des voleurs peuvent percer et entrer dans vos maisons. Ils peuvent voler ces choses là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais gardez vos choses de valeur au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Les insectes et l’eau ne peuvent pas détruire des choses de valeur là. Des voleurs ne peuvent pas percer et voler des choses là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Là où il y a tes choses de valeur, c’est là que ton cœur sera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’œil est comme une lampe pour le corps. Si ton œil est bon, ton corps entier sera dans la lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais si ton œil n’est pas bon, alors ton corps entier sera dans l’obscurité. S’il n’y a que de l’obscurité en toi, tu seras en grande obscurité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne sur Dieu et les choses que nous avons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Un esclave ne peut pas travailler pour 2 maîtres en même temps. Il n’aimera pas l’un des maîtres. Mais il aimera un maître. Il dira toujours de bonnes choses sur l’un des maîtres. Mais il dira de mauvaises choses sur l’autre maître. Vous ne pouvez pas servir Dieu et l’argent en même temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je vous dis ceci : Ne vous inquiétez pas de votre vie. Ne vous inquiétez pas de ce que vous mangerez. Ne vous inquiétez pas de ce que vous boirez. Ne soyez pas inquiets de vêtements à porter. Vos vies sont plus importantes que votre nourriture. Vos corps sont aussi plus importants que vos vêtements.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Pensez aux oiseaux sauvages. Ils ne sèment pas de graines dans le sol. Ils ne récoltent rien à manger. Et ils n’ont pas de bâtiments pour stocker la nourriture. Dieu leur donne de la nourriture. Et vous avez beaucoup plus de valeur que les oiseaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Personne ne peut augmenter sa vie même d’une heure en s’inquiétant à ce propos.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ne vous inquiétez pas de vêtements. Regardez comment les lis des champs poussent. Ils ne travaillent pas. Ils ne font pas de vêtements pour eux‑mêmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais je vous dis la vérité : Le roi Salomon portait de très beaux vêtements. Mais malgré toute sa gloire, Salomon n’était pas mieux habillé que l’un d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dieu habille l’herbe des champs. Il vous habillera mieux. L’herbe est là seulement aujourd’hui. Demain, les gens la jetteront dans le feu. Vous avez peu de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' en Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus a dit : Ne vous inquiétez pas sur ces questions : Aurons‑nous quelque chose à manger ? Aurons‑nous quelque chose à boire ? Aurons‑nous quelque chose à porter ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les païens s’inquiètent de toutes ces choses. Mais votre père est au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Et il sait vos besoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Laissez donc Dieu diriger vos vies. Obéissez d’abord à tout ce que Dieu recommande. Alors il vous donnera toutes les autres choses en plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Donc, ne vous inquiétez pas de demain. Vous vous soucierez de demain quand demain arrivera. Chaque jour a ses problèmes suffisants pour s’en soucier.
