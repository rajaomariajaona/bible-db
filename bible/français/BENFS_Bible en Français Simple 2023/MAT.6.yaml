document_id: MAT.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: Jésus enseigne comment aider les pauvres
  - type: text
    content: Attention. Ne faites pas de bonnes choses pour être vus par des gens. Que ce soit un secret. Si vous faites ces choses pour vous montrer aux gens, Dieu, votre Père qui est dans les cieux ne vous paiera pas.
  '10':
  - type: text
    content: 'Nous voulons que ton règne vienne. Nous voulons les choses que tu veux faire au '
  - type: text
    content: ciel
  - type: text
    content: . Nous voulons les choses que tu veux faire ici sur terre.
  '11':
  - type: text
    content: Donne‑nous la nourriture dont nous avons besoin chaque jour.
  '12':
  - type: text
    content: Pardonne le mal que nous avons fait.
  - type: text
    content: D’autres gens nous ont fait du mal. Nous leur avons pardonné.
  '13':
  - type: text
    content: Ne nous laisse pas accepter de faire le mal.
  - type: text
    content: 'Mais sauve‑nous du '
  - type: text
    content: diable
  - type: text
    content: .
  '14':
  - type: text
    content: 'Pardonnez aux gens qui vous font du mal. Alors Dieu, votre Père céleste pardonnera aussi vos fautes. '
  '15':
  - type: text
    content: Mais si vous ne pardonnez pas à d’autres gens, votre Père ne vous pardonnera pas non plus vos fautes.
  - type: heading
    content: Jésus enseigne comment se comporter quand on jeûne
  '16':
  - type: text
    content: 'Soyez prudents lorsque vous arrêtez de manger pour prier. Ne montrez pas de visages tristes. Ainsi, les gens ne sauront pas ce que vous faites. Voilà ce que les  '
  - type: text
    content: hypocrites
  - type: text
    content: ' font. Dieu ne donnera rien aux '
  - type: text
    content: hypocrites
  - type: text
    content: '. '
  '17':
  - type: text
    content: Mais quand tu arrêtes de manger, lave‑toi le visage. Arrange proprement tes cheveux.
  '18':
  - type: text
    content: D’autres gens ne sauront pas que tu ne manges pas. Mais Dieu ton Père le sait. Il voit ce que tu fais dans ce lieu secret. Donc, il te donnera de bonnes choses.
  - type: heading
    content: Jésus enseigne sur les choses de valeur au ciel
  '19':
  - type: text
    content: 'Ne gardez pas vos choses de valeur du monde. Les insectes et de l’eau peuvent les détruire. Des voleurs peuvent percer et entrer dans vos maisons. Ils peuvent voler ces choses là. '
  '2':
  - type: text
    content: 'Quand tu donnes quelque chose à une personne pauvre, ne le dis à personne. Les  '
  - type: text
    content: hypocrites
  - type: text
    content: ' font cela dans les bâtiments de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Ils le font aussi à l’extérieur dans les rues animées de la ville. Ils font cela pour que les autres aillent dire : Ces hommes sont bons. Je vous dis la vérité : Ils ont déjà reçu de bonnes paroles d’autres personnes. Ainsi, Dieu ne leur donnera rien de plus.'
  '20':
  - type: text
    content: 'Mais gardez vos choses de valeur au '
  - type: text
    content: ciel
  - type: text
    content: . Les insectes et l’eau ne peuvent pas détruire des choses de valeur là. Des voleurs ne peuvent pas percer et voler des choses là.
  '21':
  - type: text
    content: 'Là où il y a tes choses de valeur, c’est là que ton cœur sera. '
  '22':
  - type: text
    content: 'L’œil est comme une lampe pour le corps. Si ton œil est bon, ton corps entier sera dans la lumière. '
  '23':
  - type: text
    content: Mais si ton œil n’est pas bon, alors ton corps entier sera dans l’obscurité. S’il n’y a que de l’obscurité en toi, tu seras en grande obscurité.
  - type: heading
    content: Jésus enseigne sur Dieu et les choses que nous avons
  '24':
  - type: text
    content: Un esclave ne peut pas travailler pour 2 maîtres en même temps. Il n’aimera pas l’un des maîtres. Mais il aimera un maître. Il dira toujours de bonnes choses sur l’un des maîtres. Mais il dira de mauvaises choses sur l’autre maître. Vous ne pouvez pas servir Dieu et l’argent en même temps.
  '25':
  - type: text
    content: 'Je vous dis ceci : Ne vous inquiétez pas de votre vie. Ne vous inquiétez pas de ce que vous mangerez. Ne vous inquiétez pas de ce que vous boirez. Ne soyez pas inquiets de vêtements à porter. Vos vies sont plus importantes que votre nourriture. Vos corps sont aussi plus importants que vos vêtements.'
  '26':
  - type: text
    content: Pensez aux oiseaux sauvages. Ils ne sèment pas de graines dans le sol. Ils ne récoltent rien à manger. Et ils n’ont pas de bâtiments pour stocker la nourriture. Dieu leur donne de la nourriture. Et vous avez beaucoup plus de valeur que les oiseaux.
  '27':
  - type: text
    content: Personne ne peut augmenter sa vie même d’une heure en s’inquiétant à ce propos.
  '28':
  - type: text
    content: 'Ne vous inquiétez pas de vêtements. Regardez comment les lis des champs poussent. Ils ne travaillent pas. Ils ne font pas de vêtements pour eux‑mêmes. '
  '29':
  - type: text
    content: 'Mais je vous dis la vérité : Le roi Salomon portait de très beaux vêtements. Mais malgré toute sa gloire, Salomon n’était pas mieux habillé que l’un d’eux. '
  '3':
  - type: text
    content: 'Donne aux pauvres. Mais que personne ne le sache. C’est comme si ta main gauche ne sait pas ce que fait ta main droite. '
  '30':
  - type: text
    content: 'Dieu habille l’herbe des champs. Il vous habillera mieux. L’herbe est là seulement aujourd’hui. Demain, les gens la jetteront dans le feu. Vous avez peu de  '
  - type: text
    content: foi
  - type: text
    content: ' en Dieu !'
  '31':
  - type: text
    content: 'Alors Jésus a dit : Ne vous inquiétez pas sur ces questions : Aurons‑nous quelque chose à manger ? Aurons‑nous quelque chose à boire ? Aurons‑nous quelque chose à porter ? '
  '32':
  - type: text
    content: 'Les païens s’inquiètent de toutes ces choses. Mais votre père est au '
  - type: text
    content: ciel
  - type: text
    content: '. Et il sait vos besoins. '
  '33':
  - type: text
    content: 'Laissez donc Dieu diriger vos vies. Obéissez d’abord à tout ce que Dieu recommande. Alors il vous donnera toutes les autres choses en plus. '
  '34':
  - type: text
    content: Donc, ne vous inquiétez pas de demain. Vous vous soucierez de demain quand demain arrivera. Chaque jour a ses problèmes suffisants pour s’en soucier.
  '4':
  - type: text
    content: Alors ton offrande sera secrète. Dieu voit les choses qui sont secrètes. Et il te donnera de bonnes choses.
  - type: heading
    content: Jésus enseigne comment prier
  '5':
  - type: text
    content: 'Ne priez pas comme les  '
  - type: text
    content: hypocrites
  - type: text
    content: '. Ils aiment prier debout dans les bâtiments de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Ils aiment aussi prier aux coins des rues. Ensuite, beaucoup de gens peuvent les voir prier. Je vous dis la vérité : Ils ont déjà reçu de bonnes paroles des gens. Alors Dieu ne leur donnera plus rien.'
  '6':
  - type: text
    content: 'Mais quand tu pries, entre seul dans ta chambre. Et prie ton père qui est au '
  - type: text
    content: ciel
  - type: text
    content: ', même si tu ne peux pas le voir. Ton père voit ce que tu fais en privé. Il te récompensera. '
  '7':
  - type: text
    content: 'Lorsque vous priez, ne dites pas les mêmes paroles plusieurs fois. Et ne dites pas beaucoup de mots qui ne signifient rien. Les païens font aussi cela. Et ils pensent que Dieu les entendra. '
  '8':
  - type: text
    content: Ne soyez pas comme eux. Dieu votre Père sait déjà tous vos besoins. Il sait cela avant même votre prière.
  '9':
  - type: text
    content: 'Voici donc comment vous devez prier :'
  - type: text
    content: Dieu notre Père qui est aux cieux, nous prions que les gens respectent ton saint nom.
