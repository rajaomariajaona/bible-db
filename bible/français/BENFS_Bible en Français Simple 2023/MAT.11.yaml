document_id: MAT.11
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 11
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle de Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus a fini de raconter toutes ces choses à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: . Il a alors quitté ce lieu. Et il est allé enseigner les gens dans leurs villes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A ce temps‑là, Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' était en prison. Mais les gens lui parlaient de toutes les choses que Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' faisait. Alors Jean a envoyé ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' parler avec Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils lui ont demandé : Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' a dit que quelqu’un viendra. Es‑tu la personne dont Jean avait parlé ? Ou devrions‑nous attendre quelqu’un d’autre à venir ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus a répondu : Retournez auprès de Jean. Dites‑lui ce que vous avez vu. Dites‑lui aussi ce que vous avez entendu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Certaines personnes ne pouvaient pas voir. Elles peuvent maintenant voir. Certaines personnes ne pouvaient pas marcher. Elles peuvent maintenant marcher. Certaines personnes étaient malades de la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lèpre
  - type: text
    text: '. Elles sont maintenant guéries. Certaines personnes ne pouvaient pas entendre. Elles peuvent maintenant entendre. Certaines personnes étaient mortes. Elles vivent maintenant de nouveau. Les pauvres entendent la Bonne Nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La personne qui continue à croire en moi, sera heureuse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jean sont allés. Pendant ce temps, Jésus a parlé à la foule à propos de Jean : Vous êtes allés dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. Vous n’êtes certainement pas allés voir le vent. Ce vent agitait une petite plante (roseau). Non, vous n’êtes pas allés voir ça. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous n’êtes certainement pas allés voir un homme qui portait des vêtements chers. Non, les gens comme ça ont beaucoup de belles choses. Ils vivent aussi dans les maisons des rois. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous êtes allés voir un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. Et Jean est encore plus grand que cela.  '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il y a longtemps, Dieu a dit ceci au sujet de lui :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Je vais envoyer quelqu’un devant toi. 
- type: usfm
  marker: p
  children:
  - type: text
    text: Il dira mon message.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il préparera le chemin devant toi. 
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus a dit : Jean est un homme très important. Il est plus grand que tout être humain qui a existé au monde. Mais le plus petit dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: ' est plus grand que Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus a dit : Depuis le temps de Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' jusqu’à maintenant, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: ' est sérieusement attaqué. Les gens forts qui croient vraiment en Dieu entreront dans le Royaume. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La loi de Dieu et tous les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' ont parlé jusqu’à Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils ont dit qu’Élie devait venir. Et si vous croyez à cela, Jean est en réalité Élie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toute personne qui veut entendre, qu’elle entende.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus a dit : Je vais vous parler des gens qui sont encore en vie aujourd’hui. Ils sont comme des enfants qui sont assis à la place du marché. Ils disent à d’autres enfants ceci :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nous avons joué la musique pour vous. C’était avec un instrument appelé flûte. Mais vous n’avez pas dansé. Nous avons chanté une chanson de deuil. Mais vous n’avez pas pleuré.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' arrêtait souvent de manger. Il ne buvait jamais de vin. Donc, vous avez dit qu’un mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' vivait en lui.  '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et moi, le Fils de l’homme, je suis venu. Je mange et je bois. Donc, vous dites à propos de moi : Il mange trop et il boit trop. Il est un ami des gens qui perçoivent l’argent des taxes. Il est aussi ami d’autres mauvaises personnes. Mais vous pouvez savoir ce qui est réellement sage. Voyez seulement les résultats. Alors vous saurez. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus a commencé à se plaindre contre les gens de certaines villes. Jésus avait fait beaucoup de miracles dans ces villes. Mais les gens ne voulaient pas changer leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' et obéir à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi Jésus leur a dit : Les choses vont être mauvaises pour vous, les gens de Chorazin. Et les choses vont être mauvaises pour vous, les gens de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: '. J’ai fait des miracles dans vos villes. Je n’ai pas fait cela dans les villes appelées Tyr et Sidon. Si je les avais faits dans ces villes, les gens allaient m’écouter. Ils allaient alors porter des sacs. Ils allaient également mettre de la cendre sur leurs têtes. Cela allait montrer à Dieu qu’ils étaient tristes. Ils allaient laisser de faire de mauvaises choses. Et ils devaient commencer à obéir à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Oui, quand Dieu jugera tout le monde, il va punir les gens de Tyr et de Sidon. Mais il va punir beaucoup plus les gens de Chorazin et de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je vais vous dire ce qui se passera pour les gens de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Capernaüm
  - type: text
    text: '. Ils croyaient qu’ils seront élevés jusqu’au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Mais Dieu les jettera en enfer. Si j’avais fait ces miracles à Sodome, Sodome pourrait être encore là aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je vous dis la vérité : Dieu punira les gens de Sodome. Mais il les punira moins que le peuple de Chorazin, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: ' et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Capernaüm
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors Jésus a dit : Père, tu règnes dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et sur la terre ! Tu as enseigné les gens qui ne connaissent pas beaucoup de choses. Et donc je te remercie. Mais tu n’as pas fait savoir ces choses à d’autres gens. Ce sont des gens qui pensent qu’ils savent beaucoup. Et ils pensent qu’ils comprennent tout. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Oui, Père, tu as voulu que ce soit comme cela. 
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mon Père m’a donné toutes choses. Et mon Père seul sait qui je suis. Personne d’autre ne sait vraiment que je suis le Fils. Moi seul, je connais qui est mon Père. Personne d’autre ne le connaît. Mais je choisis de parler de lui à certaines personnes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Venez à moi vous tous qui êtes fatigués. Vous êtes comme les gens qui ont travaillé pendant un long temps. Vous êtes comme les gens qui ont porté des choses lourdes. Venez à moi et vous trouverez un endroit pour vous reposer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Faites ce que je vous enseigne. Apprenez de moi tout ce qui est vrai. Je suis très gentil et j’obéis à Dieu. Ensuite, vous aurez la vraie vie et vous ne serez pas inquiets. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je vais seulement vous demander de faire de bonnes choses. Je ne vais pas vous demander de transporter tout ce qui est trop lourd pour vous. Et je ne vais pas vous demander de faire ce qui est trop difficile.
