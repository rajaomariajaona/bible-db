document_id: MAT.11,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 11
  - type: heading
    content: Jésus parle de Jean‑Baptiste
  - type: text
    content: 'Jésus a fini de raconter toutes ces choses à ses  '
  - type: text
    content: disciples
  - type: text
    content: . Il a alors quitté ce lieu. Et il est allé enseigner les gens dans leurs villes.
  '10':
  - type: text
    content: 'Il y a longtemps, Dieu a dit ceci au sujet de lui :'
  - type: text
    content: Je vais envoyer quelqu’un devant toi. 
  - type: text
    content: Il dira mon message.
  - type: text
    content: Il préparera le chemin devant toi. 
  '11':
  - type: text
    content: 'Jésus a dit : Jean est un homme très important. Il est plus grand que tout être humain qui a existé au monde. Mais le plus petit dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: ' est plus grand que Jean. '
  '12':
  - type: text
    content: 'Jésus a dit : Depuis le temps de Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' jusqu’à maintenant, le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: ' est sérieusement attaqué. Les gens forts qui croient vraiment en Dieu entreront dans le Royaume. '
  '13':
  - type: text
    content: 'La loi de Dieu et tous les  '
  - type: text
    content: prophètes
  - type: text
    content: ' ont parlé jusqu’à Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: '. '
  '14':
  - type: text
    content: Ils ont dit qu’Élie devait venir. Et si vous croyez à cela, Jean est en réalité Élie.
  '15':
  - type: text
    content: Toute personne qui veut entendre, qu’elle entende.
  '16':
  - type: text
    content: 'Jésus a dit : Je vais vous parler des gens qui sont encore en vie aujourd’hui. Ils sont comme des enfants qui sont assis à la place du marché. Ils disent à d’autres enfants ceci :'
  '17':
  - type: text
    content: Nous avons joué la musique pour vous. C’était avec un instrument appelé flûte. Mais vous n’avez pas dansé. Nous avons chanté une chanson de deuil. Mais vous n’avez pas pleuré.
  '18':
  - type: text
    content: Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' arrêtait souvent de manger. Il ne buvait jamais de vin. Donc, vous avez dit qu’un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' vivait en lui.  '
  '19':
  - type: text
    content: 'Et moi, le Fils de l’homme, je suis venu. Je mange et je bois. Donc, vous dites à propos de moi : Il mange trop et il boit trop. Il est un ami des gens qui perçoivent l’argent des taxes. Il est aussi ami d’autres mauvaises personnes. Mais vous pouvez savoir ce qui est réellement sage. Voyez seulement les résultats. Alors vous saurez. '
  '2':
  - type: text
    content: A ce temps‑là, Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' était en prison. Mais les gens lui parlaient de toutes les choses que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' faisait. Alors Jean a envoyé ses  '
  - type: text
    content: disciples
  - type: text
    content: ' parler avec Jésus. '
  '20':
  - type: text
    content: 'Jésus a commencé à se plaindre contre les gens de certaines villes. Jésus avait fait beaucoup de miracles dans ces villes. Mais les gens ne voulaient pas changer leurs '
  - type: text
    content: esprits
  - type: text
    content: ' et obéir à Dieu. '
  '21':
  - type: text
    content: 'Ainsi Jésus leur a dit : Les choses vont être mauvaises pour vous, les gens de Chorazin. Et les choses vont être mauvaises pour vous, les gens de  '
  - type: text
    content: Bethsaïda
  - type: text
    content: '. J’ai fait des miracles dans vos villes. Je n’ai pas fait cela dans les villes appelées Tyr et Sidon. Si je les avais faits dans ces villes, les gens allaient m’écouter. Ils allaient alors porter des sacs. Ils allaient également mettre de la cendre sur leurs têtes. Cela allait montrer à Dieu qu’ils étaient tristes. Ils allaient laisser de faire de mauvaises choses. Et ils devaient commencer à obéir à Dieu. '
  '22':
  - type: text
    content: 'Oui, quand Dieu jugera tout le monde, il va punir les gens de Tyr et de Sidon. Mais il va punir beaucoup plus les gens de Chorazin et de  '
  - type: text
    content: Bethsaïda
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Je vais vous dire ce qui se passera pour les gens de  '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Ils croyaient qu’ils seront élevés jusqu’au '
  - type: text
    content: ciel
  - type: text
    content: '. Mais Dieu les jettera en enfer. Si j’avais fait ces miracles à Sodome, Sodome pourrait être encore là aujourd’hui. '
  '24':
  - type: text
    content: 'Je vous dis la vérité : Dieu punira les gens de Sodome. Mais il les punira moins que le peuple de Chorazin, '
  - type: text
    content: Bethsaïda
  - type: text
    content: ' et  '
  - type: text
    content: Capernaüm
  - type: text
    content: .
  '25':
  - type: text
    content: 'Alors Jésus a dit : Père, tu règnes dans le  '
  - type: text
    content: ciel
  - type: text
    content: ' et sur la terre ! Tu as enseigné les gens qui ne connaissent pas beaucoup de choses. Et donc je te remercie. Mais tu n’as pas fait savoir ces choses à d’autres gens. Ce sont des gens qui pensent qu’ils savent beaucoup. Et ils pensent qu’ils comprennent tout. '
  '26':
  - type: text
    content: Oui, Père, tu as voulu que ce soit comme cela. 
  '27':
  - type: text
    content: Mon Père m’a donné toutes choses. Et mon Père seul sait qui je suis. Personne d’autre ne sait vraiment que je suis le Fils. Moi seul, je connais qui est mon Père. Personne d’autre ne le connaît. Mais je choisis de parler de lui à certaines personnes.
  '28':
  - type: text
    content: Venez à moi vous tous qui êtes fatigués. Vous êtes comme les gens qui ont travaillé pendant un long temps. Vous êtes comme les gens qui ont porté des choses lourdes. Venez à moi et vous trouverez un endroit pour vous reposer.
  '29':
  - type: text
    content: 'Faites ce que je vous enseigne. Apprenez de moi tout ce qui est vrai. Je suis très gentil et j’obéis à Dieu. Ensuite, vous aurez la vraie vie et vous ne serez pas inquiets. '
  '3':
  - type: text
    content: 'Ils lui ont demandé : Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' a dit que quelqu’un viendra. Es‑tu la personne dont Jean avait parlé ? Ou devrions‑nous attendre quelqu’un d’autre à venir ?'
  '30':
  - type: text
    content: Je vais seulement vous demander de faire de bonnes choses. Je ne vais pas vous demander de transporter tout ce qui est trop lourd pour vous. Et je ne vais pas vous demander de faire ce qui est trop difficile.
  '4':
  - type: text
    content: 'Jésus a répondu : Retournez auprès de Jean. Dites‑lui ce que vous avez vu. Dites‑lui aussi ce que vous avez entendu. '
  '5':
  - type: text
    content: 'Certaines personnes ne pouvaient pas voir. Elles peuvent maintenant voir. Certaines personnes ne pouvaient pas marcher. Elles peuvent maintenant marcher. Certaines personnes étaient malades de la  '
  - type: text
    content: lèpre
  - type: text
    content: '. Elles sont maintenant guéries. Certaines personnes ne pouvaient pas entendre. Elles peuvent maintenant entendre. Certaines personnes étaient mortes. Elles vivent maintenant de nouveau. Les pauvres entendent la Bonne Nouvelle. '
  '6':
  - type: text
    content: La personne qui continue à croire en moi, sera heureuse.
  '7':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jean sont allés. Pendant ce temps, Jésus a parlé à la foule à propos de Jean : Vous êtes allés dans le  '
  - type: text
    content: désert
  - type: text
    content: '. Vous n’êtes certainement pas allés voir le vent. Ce vent agitait une petite plante (roseau). Non, vous n’êtes pas allés voir ça. '
  '8':
  - type: text
    content: 'Vous n’êtes certainement pas allés voir un homme qui portait des vêtements chers. Non, les gens comme ça ont beaucoup de belles choses. Ils vivent aussi dans les maisons des rois. '
  '9':
  - type: text
    content: 'Vous êtes allés voir un  '
  - type: text
    content: prophète
  - type: text
    content: '. Et Jean est encore plus grand que cela.  '
