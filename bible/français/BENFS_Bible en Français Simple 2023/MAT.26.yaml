document_id: MAT.26,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 26
  - type: heading
    content: Ceux qui sont contre Jésus veulent l’attraper
  - type: text
    content: 'Jésus a donc fini de parler. Après, il a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: ' ceci : '
  '10':
  - type: text
    content: 'Jésus savait ce que ses  '
  - type: text
    content: disciples
  - type: text
    content: ' se disaient. Alors il leur a dit : Ne soyez pas en colère contre elle. Arrêtez de lui parler comme ça. Elle a fait une belle chose pour moi.  '
  '11':
  - type: text
    content: 'Vous aurez toujours les pauvres avec vous. Mais je ne serai pas toujours avec vous.  '
  '12':
  - type: text
    content: 'Elle a versé du parfum sur mon corps pour le préparer. Donc, maintenant mon corps est prêt pour mon enterrement. '
  '13':
  - type: text
    content: 'Je vous dis la vérité : Partout où les gens diront cette Bonne Nouvelle, ils diront ce que cette femme a fait. Et ils se souviendront d’elle.'
  - type: heading
    content: Judas Iscariote promet de livrer Jésus pour l’argent
  '14':
  - type: text
    content: 'Judas Iscariote était l’un des 12 '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus. Il est allé voir les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Et il leur a demandé : Combien d’argent allez‑vous me donner si je vous aide à attraper Jésus ? Les  '
  - type: text
    content: prêtres
  - type: text
    content: ' ont donné 30 pièces d’argent à Judas. '
  '16':
  - type: text
    content: Judas a donc attendu le bon moment pour les aider à attraper Jésus.
  - type: heading
    content: Jésus mange son dernier repas avec ses 12 disciples
  '17':
  - type: text
    content: 'C’était alors le premier jour de  '
  - type: text
    content: Pâque
  - type: text
    content: '. Ce jour‑là, les gens mangeaient du '
  - type: text
    content: pain sans levain
  - type: text
    content: '. Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont venus pour lui parler. Ils lui ont dit : Où veux‑tu que nous préparions le repas de  '
  - type: text
    content: Pâque
  - type: text
    content: ' à manger ?'
  '18':
  - type: text
    content: 'Jésus leur a répondu : Allez chez un homme dans la ville et dites‑lui, le Maître a dit : Ceci est le moment que Dieu a préparé pour moi. Je vais manger le repas de  '
  - type: text
    content: Pâque
  - type: text
    content: ' avec mes  '
  - type: text
    content: disciples
  - type: text
    content: ' dans ta maison. '
  '19':
  - type: text
    content: 'Alors les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont fait ce qu’il leur avait demandé de faire. Et ils ont préparé le repas de  '
  - type: text
    content: Pâque
  - type: text
    content: .
  '2':
  - type: text
    content: 'Maintenant, vous savez ceci : Après 2 jours, nous allons manger le repas de  '
  - type: text
    content: Pâque
  - type: text
    content: '. Ensuite, ces gens qui sont contre moi vont me livrer aux chefs '
  - type: text
    content: juifs
  - type: text
    content: . Ils vont me tuer sur une croix.
  '20':
  - type: text
    content: 'Ce soir‑là, Jésus et les 12 '
  - type: text
    content: disciples
  - type: text
    content: ' étaient assis pour manger le repas de  '
  - type: text
    content: Pâque
  - type: text
    content: ' ensemble. '
  '21':
  - type: text
    content: 'Pendant qu’ils mangeaient, Jésus a dit : Je vous dis la vérité. L’un de vous me livrera aux ennemis.'
  '22':
  - type: text
    content: 'Ils étaient très tristes de ce que Jésus a dit. Chacun d’eux disait à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je suis sûr que tu ne parles pas de moi.  '
  '23':
  - type: text
    content: 'Jésus leur a dit : C’est l’homme qui met le bout de son pain dans le même plat que moi. Cet homme me livrera aux ennemis.'
  '24':
  - type: text
    content: 'Le Fils de l’homme va mourir comme les  '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu avaient écrit. Mais malheur à l’homme qui provoque cela. Il ne devrait pas aider les chefs '
  - type: text
    content: Juifs
  - type: text
    content: ' à m’attraper. Ce serait mieux pour cet homme de ne jamais venir dans ce monde.'
  '25':
  - type: text
    content: 'Judas qui a livré Jésus aux ennemis lui a dit : Maître, est‑ce moi qui ferai cela ? Jésus a répondu : Oui, c’est toi qui le feras. '
  '26':
  - type: text
    content: 'Alors que Jésus et ses  '
  - type: text
    content: disciples
  - type: text
    content: ' mangeaient, Jésus a pris le pain. Il a remercié Dieu pour cela, et puis il a coupé le pain. Puis il l’a donné à chacun d’entre eux, et il a dit : Prenez ce pain et mangez‑le. Ce pain est mon corps.'
  '27':
  - type: text
    content: 'Alors Jésus a pris une coupe. Il a remercié Dieu pour le vin dans la coupe. Puis il leur a donné cela, et chaque '
  - type: text
    content: disciple
  - type: text
    content: ' a bu de la coupe. '
  '28':
  - type: text
    content: 'Jésus a dit : Ce vin est mon sang. Ceci est la nouvelle promesse entre Dieu et son peuple. Quand je mourrai, mon sang va sortir. Alors Dieu pardonnera aux gens toutes les mauvaises choses qu’ils font. '
  '29':
  - type: text
    content: 'Je vous dis ceci : Je ne vais plus boire de vin de la  '
  - type: text
    content: vigne
  - type: text
    content: . Je vais en boire encore seulement dans le Royaume de mon père.
  '3':
  - type: text
    content: 'Alors les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: anciens
  - type: text
    content: ' se sont réunis dans la cour de Caïphe. Caïphe était le  '
  - type: text
    content: grand prêtre
  - type: text
    content: ' à Jérusalem. '
  '30':
  - type: text
    content: 'Alors Jésus et ses  '
  - type: text
    content: disciples
  - type: text
    content: ' ont chanté une chanson à Dieu. Ensuite, ils sont tous allés à la  '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: .
  - type: heading
    content: Jésus dit à Pierre ce qui se passera
  '31':
  - type: text
    content: 'Alors Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Ce soir, vous allez tous fuir et votre  '
  - type: text
    content: foi
  - type: text
    content: ' va diminuer. Les  '
  - type: text
    content: prophètes
  - type: text
    content: ' avaient écrit ceci :'
  - type: text
    content: Je vais tuer l’homme qui prend soin des brebis.
  - type: text
    content: Ensuite, toutes les brebis qu’il avait vont fuir à différents endroits.
  '32':
  - type: text
    content: Mais après ma mort, Dieu me fera devenir de nouveau vivant. Ensuite, je vais vous précéder en Galilée.
  '33':
  - type: text
    content: 'Pierre a dit à Jésus : Même si tout le monde fuit, je ne te laisserai pas.'
  '34':
  - type: text
    content: 'Jésus a répondu à Pierre : Je te dis la vérité. Ce soir, tu diras 3 fois que tu ne me connais pas. Cela arrivera avant le premier chant du coq le matin. '
  '35':
  - type: text
    content: 'Mais Pierre a dit : Jésus, je ne dirai jamais à personne que je ne te connais pas. Même si je dois mourir, je mourrai avec toi. Mais je ne peux pas dire que je ne te connais pas. Tous les autres '
  - type: text
    content: disciples
  - type: text
    content: ' disaient la même chose.'
  - type: heading
    content: Jésus prie dans le jardin appelé Gethsémané sur la  montagne des Oliviers
  '36':
  - type: text
    content: 'Ensuite, ils sont arrivés dans un grand jardin appelé '
  - type: text
    content: Gethsémané
  - type: text
    content: '. Jésus a dit aux '
  - type: text
    content: disciples
  - type: text
    content: ' qui étaient avec lui : Asseyez‑vous ici pendant que je vais là‑bas pour prier. '
  '37':
  - type: text
    content: 'Jésus a pris Pierre et les 2 fils de Zébédée avec lui. Il est devenu très triste et troublé dans son  '
  - type: text
    content: esprit
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Jésus leur a dit : Je suis très triste. Je pourrais mourir, parce que je me sens si triste. S’il vous plaît, patientez ici et veillez avec moi. '
  '39':
  - type: text
    content: 'Jésus est allé à une courte distance près d’eux. Il est descendu sur ses genoux avec son visage à terre. Il a prié : Père, si cela est possible, s’il te plaît, sauve‑moi de ce moment de grande douleur. Mais Père, ne me donne pas ce que je veux. Mais donne‑moi ce que tu veux pour moi. '
  '4':
  - type: text
    content: 'Ils ont discuté comment attraper Jésus en secret. Ils ont aussi discuté comment le tuer. '
  '40':
  - type: text
    content: 'Jésus est revenu et il a trouvé les  '
  - type: text
    content: disciples
  - type: text
    content: '. Ils dormaient. Il a dit à Pierre : Simon, vous dormez ! Vous ne pouviez pas rester éveillés avec moi, même pour une heure ! '
  '41':
  - type: text
    content: Vous devez rester éveillés et prier. Dieu peut vous aider, de sorte que vous ne puissiez pas faire une mauvaise chose. Vous voulez vraiment faire une bonne chose, mais vous êtes trop faibles pour rester éveillés.
  '42':
  - type: text
    content: 'Jésus est allé une deuxième fois et il a prié de nouveau : Mon Père, si tu le souhaites, tu peux m’enlever cette douleur. S’il est impossible de me sauver de ce moment de grande douleur, je vais obéir à ta volonté.'
  '43':
  - type: text
    content: 'Jésus est revenu à eux. Il a vu qu’ils étaient endormis. Ils ne pouvaient pas garder les yeux ouverts. '
  '44':
  - type: text
    content: Alors Jésus est allé de nouveau et il a prié une troisième fois. Il a dit les mêmes mots à Dieu.
  '45':
  - type: text
    content: 'Quand il est retourné à eux, il a dit : Vous ne devriez plus dormir et vous reposer. Vous avez assez dormi. Le temps est venu pour moi d’avoir beaucoup de douleurs. Regardez ! Quelqu’un va maintenant aider de mauvais hommes à m’attraper. '
  '46':
  - type: text
    content: Levez‑vous maintenant, car il est temps de les rencontrer. Regardez ! Voici l’homme qui va les aider à m’attraper.
  - type: heading
    content: Les soldats attrapent Jésus
  '47':
  - type: text
    content: 'Jésus parlait encore. Alors Judas est arrivé. Il était l’un des '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus. Il était avec beaucoup de gens. Ils étaient tous armés de longs et tranchants couteaux, de lourds bâtons. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les  '
  - type: text
    content: anciens
  - type: text
    content: ' du peuple les avaient envoyés. '
  '48':
  - type: text
    content: 'Maintenant, Judas qui a livré Jésus leur avait donné ce signe : Je vais baiser l’un des hommes. C’est lui, alors attrapez‑le. '
  '49':
  - type: text
    content: 'Quand ils sont arrivés, Judas est allé immédiatement auprès de Jésus. Il lui a dit : '
  - type: text
    content: salut
  - type: text
    content: ', Maître ! Puis il a baisé Jésus.'
  '5':
  - type: text
    content: 'Ils se sont alors dit ceci : Nous ne voulons pas l’attraper pendant la  '
  - type: text
    content: Pâque
  - type: text
    content: . Les gens peuvent se battre contre nous si nous faisons cela. 
  - type: heading
    content: Une femme verse du parfum qui a une belle odeur sur la tête de Jésus
  '50':
  - type: text
    content: 'Jésus a dit à Judas : Mon ami, accomplis ce que tu es venu faire ici. Puis beaucoup de gens sont venus, et ils ont attrapé Jésus.'
  '51':
  - type: text
    content: 'Alors l’un des '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus a étendu la main, et il a pris son long couteau bien tranchant. Il a frappé le serviteur du '
  - type: text
    content: grand prêtre
  - type: text
    content: ' avec cela. Et il a coupé l’oreille du serviteur.'
  '52':
  - type: text
    content: 'Alors Jésus a dit à l’homme : Remets ton long couteau à sa place. Certaines personnes utilisent un long couteau bien tranchant pour tuer. Elles vont mourir. Quelqu’un les tuera avec un long couteau tranchant aussi. '
  '53':
  - type: text
    content: Tu dois savoir que je pouvais demander à mon père de m’aider. Il allait m’envoyer immédiatement plus de 12 grands groupes d’
  - type: text
    content: anges
  - type: text
    content: ' se battre pour moi.  '
  '54':
  - type: text
    content: Tout cela devait arriver. Dieu avait dit cela avant.
  '55':
  - type: text
    content: 'Alors Jésus a parlé à la foule. Il a dit : Vous êtes venus ici avec des couteaux tranchants et de lourds bâtons m’attraper. Donc, vous croyez que j’ai fait de mauvaises choses. J’étais avec vous tous les jours dans le  '
  - type: text
    content: Temple
  - type: text
    content: ' quand j’enseignais. Mais vous ne m’attrapiez pas. '
  '56':
  - type: text
    content: 'Les  '
  - type: text
    content: prophètes
  - type: text
    content: ' avaient écrit que tout cela m’arrivera. Maintenant, cela s’est réalisé. Alors tous les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus se sont enfuis et l’ont laissé seul.'
  - type: heading
    content: Jésus se tient en face de tous les dirigeants juifs
  '57':
  - type: text
    content: 'Alors ces hommes qui ont attrapé Jésus, l’ont emmené à la maison de Caïphe. Caïphe était le  '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Les enseignants de la loi de Dieu et les  '
  - type: text
    content: anciens
  - type: text
    content: ' étaient réunis ensemble là avec Caïphe.'
  '58':
  - type: text
    content: 'Pierre suivait les hommes qui emmenaient Jésus à la cour du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Mais il n’était pas très près d’eux. Il est arrivé jusqu’à la cour du '
  - type: text
    content: grand prêtre
  - type: text
    content: ' Caïphe. Pierre s’est assis avec les travailleurs. Il voulait voir comment les choses se passeront. '
  '59':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' voulaient que les gens disent de fausses choses contre Jésus. Ils voulaient tuer Jésus. '
  '6':
  - type: text
    content: 'Alors Jésus s’est rendu à '
  - type: text
    content: Béthanie
  - type: text
    content: . Il a visité Simon dans sa maison. À un moment donné, Simon avait une maladie de la peau (
  - type: text
    content: lèpre
  - type: text
    content: ).
  '60':
  - type: text
    content: 'Beaucoup de gens sont venus. Et ils disaient de fausses choses contre Jésus. Mais ils n’ont pas trouvé une raison valable de tuer Jésus. Puis 2 hommes ont dit : '
  '61':
  - type: text
    content: 'Nous avons entendu cet homme dire : Je peux détruire le  '
  - type: text
    content: Temple
  - type: text
    content: ' et en 3 jours, je peux le construire à nouveau.'
  '62':
  - type: text
    content: 'Alors Caïphe s’est levé devant tout le monde. Il a dit à Jésus : Tu ne veux rien répondre ? Ces personnes ont dit que tu avais fait beaucoup de mauvaises choses. Que dis‑tu à ce sujet ? '
  '63':
  - type: text
    content: 'Mais Jésus n’a rien dit. Et Caïphe a dit :'
  - type: text
    content: 'J’utilise le pouvoir de Dieu quand je te parle : Dis‑nous ce qui est vrai. Es‑tu le  '
  - type: text
    content: Christ
  - type: text
    content: '  ? Es‑tu le Fils de Dieu ?'
  '64':
  - type: text
    content: 'Jésus a répondu : Je le suis, et vous allez tous voir le Fils de l’homme. Il sera assis à la droite de la puissance de Dieu. Vous le verrez aussi venir sur la terre. Et il sera à cheval sur les nuages.'
  '65':
  - type: text
    content: 'Caïphe a déchiré son  '
  - type: text
    content: manteau
  - type: text
    content: '. Il a dit : Jésus a parlé contre Dieu. Nous n’avons plus besoin que quelqu’un d’autre nous parle de lui. Vous l’avez entendu parler contre Dieu. '
  '66':
  - type: text
    content: 'Qu’avez‑vous décidé de faire avec lui ? Ils ont répondu : Jésus doit mourir à cause des choses qu’il a dites.'
  '67':
  - type: text
    content: 'Alors quelques hommes ont craché sur le visage de Jésus. Ils l’ont également frappé avec leurs poings, '
  '68':
  - type: text
    content: 'et ils lui ont dit : Dis‑nous qui t’a frappé ! Si tu étais un  '
  - type: text
    content: prophète
  - type: text
    content: ', tu pourrais certainement dire ça ! Ils le frappaient également avec leurs mains ouvertes.'
  - type: heading
    content: Pierre dit 3 fois qu’il ne connaît pas Jésus
  '69':
  - type: text
    content: 'Après toutes ces choses, Pierre était toujours assis à l’extérieur de la maison. L’une des filles qui travaillait pour le  '
  - type: text
    content: grand prêtre
  - type: text
    content: ' est allée lui parler. Elle a dit : Tu étais aussi avec Jésus, l’homme de Galilée.'
  '7':
  - type: text
    content: Jésus mangeait un repas. Pendant ce temps, une femme est entrée dans la maison. Elle a apporté un petit vase en pierre avec elle. Le vase contenait un parfum très cher. Il y avait une odeur très agréable. Elle a versé ce parfum sur la tête de Jésus.
  '70':
  - type: text
    content: 'Pierre a dit devant tout le monde qui était là : Ce n’est pas vrai. Je ne sais pas de quoi tu parles.'
  '71':
  - type: text
    content: 'Et puis, Pierre s’est dirigé vers la porte. Alors une autre fille l’a vu. Cette fille a dit aux gens qui étaient là : Cet homme était avec Jésus, l’homme de Nazareth.'
  '72':
  - type: text
    content: 'Pierre a encore répondu à tout le monde : Je promets que je ne connais pas cet homme de Nazareth. Je promets cela au nom de Dieu.'
  '73':
  - type: text
    content: 'Après un peu de temps, d’autres personnes qui se tenaient à la porte ont parlé à Pierre : Nous sommes sûrs que tu es l’un des amis de cet homme de Nazareth. Nous le savons, parce que tu parles aussi comme les gens qui vivent en Galilée.'
  '74':
  - type: text
    content: 'Pierre leur a dit : Je ne connais pas cet homme de Nazareth. Si cela est vrai, alors Dieu doit me punir !'
  - type: text
    content: 'Immédiatement après que Pierre a dit cela, le coq a chanté. '
  '75':
  - type: text
    content: 'Alors Pierre s’est souvenu que Jésus lui avait dit : Ce soir, avant que le coq chante, tu vas dire 3 fois que tu ne me connais pas. Alors Pierre est sorti de la cour seul. Il avait l’'
  - type: text
    content: esprit
  - type: text
    content: ' très troublé et il s’est mis à pleurer beaucoup.'
  '8':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont vu cela. Ils étaient en colère et ils ont dit : Cette femme ne devrait pas gaspiller ce parfum. '
  '9':
  - type: text
    content: On pouvait le vendre pour beaucoup d’argent. Puis on pouvait donner l’argent aux pauvres.
