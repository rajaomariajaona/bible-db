document_id: MAT.26
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 26
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ceux qui sont contre Jésus veulent l’attraper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus a donc fini de parler. Après, il a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ceci : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maintenant, vous savez ceci : Après 2 jours, nous allons manger le repas de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. Ensuite, ces gens qui sont contre moi vont me livrer aux chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: . Ils vont me tuer sur une croix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' se sont réunis dans la cour de Caïphe. Caïphe était le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils ont discuté comment attraper Jésus en secret. Ils ont aussi discuté comment le tuer. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils se sont alors dit ceci : Nous ne voulons pas l’attraper pendant la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: . Les gens peuvent se battre contre nous si nous faisons cela. 
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une femme verse du parfum qui a une belle odeur sur la tête de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors Jésus s’est rendu à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: . Il a visité Simon dans sa maison. À un moment donné, Simon avait une maladie de la peau (
  - type: usfm
    marker: w
    children:
    - type: text
      text: lèpre
  - type: text
    text: ).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jésus mangeait un repas. Pendant ce temps, une femme est entrée dans la maison. Elle a apporté un petit vase en pierre avec elle. Le vase contenait un parfum très cher. Il y avait une odeur très agréable. Elle a versé ce parfum sur la tête de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus ont vu cela. Ils étaient en colère et ils ont dit : Cette femme ne devrait pas gaspiller ce parfum. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On pouvait le vendre pour beaucoup d’argent. Puis on pouvait donner l’argent aux pauvres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus savait ce que ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' se disaient. Alors il leur a dit : Ne soyez pas en colère contre elle. Arrêtez de lui parler comme ça. Elle a fait une belle chose pour moi.  '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous aurez toujours les pauvres avec vous. Mais je ne serai pas toujours avec vous.  '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle a versé du parfum sur mon corps pour le préparer. Donc, maintenant mon corps est prêt pour mon enterrement. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je vous dis la vérité : Partout où les gens diront cette Bonne Nouvelle, ils diront ce que cette femme a fait. Et ils se souviendront d’elle.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas Iscariote promet de livrer Jésus pour l’argent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Judas Iscariote était l’un des 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus. Il est allé voir les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il leur a demandé : Combien d’argent allez‑vous me donner si je vous aide à attraper Jésus ? Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' ont donné 30 pièces d’argent à Judas. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Judas a donc attendu le bon moment pour les aider à attraper Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus mange son dernier repas avec ses 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C’était alors le premier jour de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. Ce jour‑là, les gens mangeaient du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: pain sans levain
  - type: text
    text: '. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus sont venus pour lui parler. Ils lui ont dit : Où veux‑tu que nous préparions le repas de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' à manger ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus leur a répondu : Allez chez un homme dans la ville et dites‑lui, le Maître a dit : Ceci est le moment que Dieu a préparé pour moi. Je vais manger le repas de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' avec mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' dans ta maison. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus ont fait ce qu’il leur avait demandé de faire. Et ils ont préparé le repas de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ce soir‑là, Jésus et les 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' étaient assis pour manger le repas de  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pendant qu’ils mangeaient, Jésus a dit : Je vous dis la vérité. L’un de vous me livrera aux ennemis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils étaient très tristes de ce que Jésus a dit. Chacun d’eux disait à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', je suis sûr que tu ne parles pas de moi.  '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus leur a dit : C’est l’homme qui met le bout de son pain dans le même plat que moi. Cet homme me livrera aux ennemis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le Fils de l’homme va mourir comme les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu avaient écrit. Mais malheur à l’homme qui provoque cela. Il ne devrait pas aider les chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à m’attraper. Ce serait mieux pour cet homme de ne jamais venir dans ce monde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Judas qui a livré Jésus aux ennemis lui a dit : Maître, est‑ce moi qui ferai cela ? Jésus a répondu : Oui, c’est toi qui le feras. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors que Jésus et ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' mangeaient, Jésus a pris le pain. Il a remercié Dieu pour cela, et puis il a coupé le pain. Puis il l’a donné à chacun d’entre eux, et il a dit : Prenez ce pain et mangez‑le. Ce pain est mon corps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors Jésus a pris une coupe. Il a remercié Dieu pour le vin dans la coupe. Puis il leur a donné cela, et chaque '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' a bu de la coupe. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus a dit : Ce vin est mon sang. Ceci est la nouvelle promesse entre Dieu et son peuple. Quand je mourrai, mon sang va sortir. Alors Dieu pardonnera aux gens toutes les mauvaises choses qu’ils font. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je vous dis ceci : Je ne vais plus boire de vin de la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vigne
  - type: text
    text: . Je vais en boire encore seulement dans le Royaume de mon père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Alors Jésus et ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont chanté une chanson à Dieu. Ensuite, ils sont tous allés à la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus dit à Pierre ce qui se passera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Ce soir, vous allez tous fuir et votre  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' va diminuer. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' avaient écrit ceci :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Je vais tuer l’homme qui prend soin des brebis.
- type: usfm
  marker: m
  children:
  - type: text
    text: Ensuite, toutes les brebis qu’il avait vont fuir à différents endroits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais après ma mort, Dieu me fera devenir de nouveau vivant. Ensuite, je vais vous précéder en Galilée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Pierre a dit à Jésus : Même si tout le monde fuit, je ne te laisserai pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus a répondu à Pierre : Je te dis la vérité. Ce soir, tu diras 3 fois que tu ne me connais pas. Cela arrivera avant le premier chant du coq le matin. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais Pierre a dit : Jésus, je ne dirai jamais à personne que je ne te connais pas. Même si je dois mourir, je mourrai avec toi. Mais je ne peux pas dire que je ne te connais pas. Tous les autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' disaient la même chose.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus prie dans le jardin appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Gethsémané
  - type: text
    text: ' sur la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ensuite, ils sont arrivés dans un grand jardin appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Gethsémané
  - type: text
    text: '. Jésus a dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' qui étaient avec lui : Asseyez‑vous ici pendant que je vais là‑bas pour prier. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus a pris Pierre et les 2 fils de Zébédée avec lui. Il est devenu très triste et troublé dans son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus leur a dit : Je suis très triste. Je pourrais mourir, parce que je me sens si triste. S’il vous plaît, patientez ici et veillez avec moi. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus est allé à une courte distance près d’eux. Il est descendu sur ses genoux avec son visage à terre. Il a prié : Père, si cela est possible, s’il te plaît, sauve‑moi de ce moment de grande douleur. Mais Père, ne me donne pas ce que je veux. Mais donne‑moi ce que tu veux pour moi. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus est revenu et il a trouvé les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Ils dormaient. Il a dit à Pierre : Simon, vous dormez ! Vous ne pouviez pas rester éveillés avec moi, même pour une heure ! '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Vous devez rester éveillés et prier. Dieu peut vous aider, de sorte que vous ne puissiez pas faire une mauvaise chose. Vous voulez vraiment faire une bonne chose, mais vous êtes trop faibles pour rester éveillés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus est allé une deuxième fois et il a prié de nouveau : Mon Père, si tu le souhaites, tu peux m’enlever cette douleur. S’il est impossible de me sauver de ce moment de grande douleur, je vais obéir à ta volonté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus est revenu à eux. Il a vu qu’ils étaient endormis. Ils ne pouvaient pas garder les yeux ouverts. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Alors Jésus est allé de nouveau et il a prié une troisième fois. Il a dit les mêmes mots à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Quand il est retourné à eux, il a dit : Vous ne devriez plus dormir et vous reposer. Vous avez assez dormi. Le temps est venu pour moi d’avoir beaucoup de douleurs. Regardez ! Quelqu’un va maintenant aider de mauvais hommes à m’attraper. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Levez‑vous maintenant, car il est temps de les rencontrer. Regardez ! Voici l’homme qui va les aider à m’attraper.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les soldats attrapent Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Jésus parlait encore. Alors Judas est arrivé. Il était l’un des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus. Il était avec beaucoup de gens. Ils étaient tous armés de longs et tranchants couteaux, de lourds bâtons. Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' du peuple les avaient envoyés. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Maintenant, Judas qui a livré Jésus leur avait donné ce signe : Je vais baiser l’un des hommes. C’est lui, alors attrapez‑le. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Quand ils sont arrivés, Judas est allé immédiatement auprès de Jésus. Il lui a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: salut
  - type: text
    text: ', Maître ! Puis il a baisé Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jésus a dit à Judas : Mon ami, accomplis ce que tu es venu faire ici. Puis beaucoup de gens sont venus, et ils ont attrapé Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Alors l’un des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus a étendu la main, et il a pris son long couteau bien tranchant. Il a frappé le serviteur du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' avec cela. Et il a coupé l’oreille du serviteur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Alors Jésus a dit à l’homme : Remets ton long couteau à sa place. Certaines personnes utilisent un long couteau bien tranchant pour tuer. Elles vont mourir. Quelqu’un les tuera avec un long couteau tranchant aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Tu dois savoir que je pouvais demander à mon père de m’aider. Il allait m’envoyer immédiatement plus de 12 grands groupes d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' se battre pour moi.  '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Tout cela devait arriver. Dieu avait dit cela avant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Alors Jésus a parlé à la foule. Il a dit : Vous êtes venus ici avec des couteaux tranchants et de lourds bâtons m’attraper. Donc, vous croyez que j’ai fait de mauvaises choses. J’étais avec vous tous les jours dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' quand j’enseignais. Mais vous ne m’attrapiez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' avaient écrit que tout cela m’arrivera. Maintenant, cela s’est réalisé. Alors tous les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus se sont enfuis et l’ont laissé seul.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus se tient en face de tous les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Alors ces hommes qui ont attrapé Jésus, l’ont emmené à la maison de Caïphe. Caïphe était le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: '. Les enseignants de la loi de Dieu et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' étaient réunis ensemble là avec Caïphe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Pierre suivait les hommes qui emmenaient Jésus à la cour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: '. Mais il n’était pas très près d’eux. Il est arrivé jusqu’à la cour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' Caïphe. Pierre s’est assis avec les travailleurs. Il voulait voir comment les choses se passeront. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' voulaient que les gens disent de fausses choses contre Jésus. Ils voulaient tuer Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Beaucoup de gens sont venus. Et ils disaient de fausses choses contre Jésus. Mais ils n’ont pas trouvé une raison valable de tuer Jésus. Puis 2 hommes ont dit : '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Nous avons entendu cet homme dire : Je peux détruire le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' et en 3 jours, je peux le construire à nouveau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Alors Caïphe s’est levé devant tout le monde. Il a dit à Jésus : Tu ne veux rien répondre ? Ces personnes ont dit que tu avais fait beaucoup de mauvaises choses. Que dis‑tu à ce sujet ? '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Mais Jésus n’a rien dit. Et Caïphe a dit :'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'J’utilise le pouvoir de Dieu quand je te parle : Dis‑nous ce qui est vrai. Es‑tu le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '  ? Es‑tu le Fils de Dieu ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Jésus a répondu : Je le suis, et vous allez tous voir le Fils de l’homme. Il sera assis à la droite de la puissance de Dieu. Vous le verrez aussi venir sur la terre. Et il sera à cheval sur les nuages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Caïphe a déchiré son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: '. Il a dit : Jésus a parlé contre Dieu. Nous n’avons plus besoin que quelqu’un d’autre nous parle de lui. Vous l’avez entendu parler contre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Qu’avez‑vous décidé de faire avec lui ? Ils ont répondu : Jésus doit mourir à cause des choses qu’il a dites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Alors quelques hommes ont craché sur le visage de Jésus. Ils l’ont également frappé avec leurs poings, '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'et ils lui ont dit : Dis‑nous qui t’a frappé ! Si tu étais un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ', tu pourrais certainement dire ça ! Ils le frappaient également avec leurs mains ouvertes.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre dit 3 fois qu’il ne connaît pas Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Après toutes ces choses, Pierre était toujours assis à l’extérieur de la maison. L’une des filles qui travaillait pour le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' est allée lui parler. Elle a dit : Tu étais aussi avec Jésus, l’homme de Galilée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Pierre a dit devant tout le monde qui était là : Ce n’est pas vrai. Je ne sais pas de quoi tu parles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Et puis, Pierre s’est dirigé vers la porte. Alors une autre fille l’a vu. Cette fille a dit aux gens qui étaient là : Cet homme était avec Jésus, l’homme de Nazareth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Pierre a encore répondu à tout le monde : Je promets que je ne connais pas cet homme de Nazareth. Je promets cela au nom de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Après un peu de temps, d’autres personnes qui se tenaient à la porte ont parlé à Pierre : Nous sommes sûrs que tu es l’un des amis de cet homme de Nazareth. Nous le savons, parce que tu parles aussi comme les gens qui vivent en Galilée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Pierre leur a dit : Je ne connais pas cet homme de Nazareth. Si cela est vrai, alors Dieu doit me punir !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Immédiatement après que Pierre a dit cela, le coq a chanté. '
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Alors Pierre s’est souvenu que Jésus lui avait dit : Ce soir, avant que le coq chante, tu vas dire 3 fois que tu ne me connais pas. Alors Pierre est sorti de la cour seul. Il avait l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' très troublé et il s’est mis à pleurer beaucoup.'
