document_id: LUK.14
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 14
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus va à la maison d’un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisien
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour de repos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  - type: text
    text: ', Jésus est entré dans la maison d’un chef des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Cet homme lui avait demandé de venir et de manger un repas avec lui. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' les regardaient tous attentivement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Un homme malade est venu auprès de lui. Ses bras et ses jambes étaient devenus trop grands, car ils étaient pleins d’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Jésus a parlé aux enseignants des règles de Dieu. Il a aussi parlé aux Pharisiens. Il leur a tous dit ceci : Est‑ce un péché de guérir quelqu’un le jour de repos ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais ils n’ont rien dit. Donc, il a pris le malade et l’a guéri. Puis il l’a laissé partir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus a dit : Pensez à ceci. Vous avez un fils ou un animal qui tombe dans un puits un jour de repos. Pensez à ce que vous faites. Vous tirez le fils ou l’animal hors du puits immédiatement. Vous faites cela même un jour de repos ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils étaient d’accord. Alors, ils ne pouvaient plus rien dire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jésus a alors dit une histoire à ceux qui étaient assis au repas. Il a vu comment les gens choisissaient les meilleurs endroits pour s’asseoir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus a dit : Quand quelqu’un te demande de venir à un repas, ne siège pas dans le meilleur endroit. Après tout, un homme qui est plus important que toi peut venir plus tard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ensuite, l’homme qui t’a invité au repas pourrait te dire : Donne ta place à cet homme. Alors tu auras la honte comme tu es assis là. Tu seras obligé de te déplacer vers l’endroit le plus bas et rester là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Au lieu de cela, quand quelqu’un t’invite à un repas, tu devras faire ceci. Va t’asseoir à la place la moins importante. Donc, l’homme qui t’a invité te verra là. Et il peut te dire : Mon ami, monte à un meilleur endroit. Tout le monde qui est assis à la table verra cela t’arriver. Alors ils sauront que tu es une personne importante.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ce sera pareil là où Dieu règne. Certaines personnes peuvent se mettre dans une place importante. Dieu va les envoyer toutes à un niveau bas. Mais il va envoyer l’homme qui se met dans un endroit bas à un niveau supérieur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus a également dit à l’homme qui l’avait invité au repas ceci : Quand tu donnes un repas à midi ou le soir, ne demande pas à tes amis de venir. Ne demande pas à tes frères ou ta famille de venir. Et ne demande pas aux gens riches qui vivent près de chez toi de venir. Si tu le fais, ils vont ensuite te demander de manger dans leurs maisons. Cela va te payer pour le repas que tu leur as donné.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au lieu de cela, quand tu donnes un grand repas, tu devras demander aux pauvres gens de venir. Demande aux gens qui ont perdu un bras ou une jambe. Et demande aux gens qui ne peuvent pas marcher très bien. Et demande aux gens qui ne peuvent pas voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et cela, parce qu’ils ne peuvent pas te demander plus tard de manger dans leurs maisons. Alors tu seras heureux, parce qu’ils ne peuvent pas te payer pour le repas. Au lieu de cela, Dieu va te payer. Un jour, les gens qui ont obéi à Dieu seront de nouveau en vie. Ce jour‑là, Dieu va te payer pour ce que tu avais fait pour ces pauvres gens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire sur un grand repas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les hommes à la table entendaient ce que Jésus disait. L’un des hommes a dit : Un jour, il y aura un grand repas dans le lieu où Dieu règne. Heureux sont ceux qui vont manger ensemble ce grand repas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus lui a répondu en racontant une histoire. Un jour, un homme important a fait un grand repas. Il a demandé à beaucoup de gens de venir manger dans sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand le repas était prêt, il a envoyé son serviteur leur dire. Ainsi, le serviteur est allé vers ceux que son maître voulait. Il leur a dit ceci : Venez maintenant. Le repas est prêt pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais tous avaient une raison pour laquelle ils ne pouvaient pas venir au repas. Le premier homme a dit : J’ai acheté un champ. Donc, je dois sortir pour le voir. S’il te plaît, dis‑lui que je suis triste. Dis à ton maître pourquoi je ne peux pas venir à son repas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le prochain homme a dit : J’ai acheté 5 paires de bœufs. Je vais juste voir si ces bœufs travaillent bien ensemble. S’il te plaît, dis‑lui que je suis triste. Dis à ton maître pourquoi je ne peux pas venir à son repas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le troisième homme a dit : Je viens de me marier. Voilà pourquoi je ne peux pas venir au repas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le serviteur est revenu à son maître. Il lui a dit ce que tout le monde avait dit. Alors le maître de la maison était très en colère. Il a dit à son serviteur : Va rapidement dans toutes les rues de la ville. Amène les gens pauvres ici. Amène ceux qui ont perdu un bras ou une jambe. Et amène ceux qui ne peuvent pas bien marcher. Et amène ceux qui ne peuvent pas voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le serviteur a fait cela. Puis il est revenu à son maître. Il a dit : Maître, j’ai demandé à tous ces gens de venir à ton repas. Mais il y a encore des places vides à la table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le maître a parlé à son serviteur de nouveau ceci : Va sur les routes en dehors de la ville. Recherche des personnes le long des routes. Dites‑leur tous de venir, afin que ma maison soit pleine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais je vous dis ceci : J’ai demandé à plusieurs personnes de venir au début. Aucune d’elles ne viendra manger le repas.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obéir à Jésus ressemble à quoi ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Beaucoup de gens voyageaient avec Jésus. Alors Jésus s’est tourné vers eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il a dit : Si quelqu’un veut m’obéir, il doit vivre comme ceci. Il ne doit pas aimer son père et sa mère plus que moi. Il ne doit pas aimer sa femme et ses enfants plus que moi. Il ne doit pas aimer ses frères et sœurs plus que moi. Il ne doit même pas aimer sa propre vie plus que moi. S’il ne le fait pas, il ne peut pas m’obéir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il doit vivre comme une personne qui va mourir très bientôt pour moi. Oui, s’il n’est pas prêt à mourir pour moi, il ne peut pas m’obéir. Alors, pensez à ce que signifie m’obéir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voici un exemple. L’un de vous veut construire un grand bâtiment. Avant qu’il ne commence à construire, il va s’asseoir. Il décidera combien cela va coûter. Il a besoin de savoir s’il a assez d’argent pour terminer la construction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'S’il ne le fait pas, il peut ne pas avoir assez d’argent. Il peut faire la fondation du bâtiment, mais il ne peut pas terminer le bâtiment. S’il doit alors arrêter, d’autres gens se moqueront de lui. Ils se diront les uns aux autres ceci : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Cet homme est un imbécile. Il a commencé à construire, mais il n’a pas pu terminer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus leur a donné un autre exemple. Un roi veut faire une guerre contre un autre roi. Mais avant qu’il aille se battre, il s’assied. Il pense à lui‑même et se dit : Puis‑je gagner cette guerre ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mon armée est grande, mais l’autre roi a 2 fois plus de soldats dans son armée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Non, je ne peux pas le faire. Je sais que je ne peux pas battre l’autre roi. Ainsi, pendant que le roi fort est loin, il envoie un homme avec un message. Il dit au roi qu’il ne veut pas se battre. Il veut savoir ce qu’il peut faire pour devenir un ami du roi plus fort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus a alors dit : C’est comme ça pour vous tous. Vous devez tout laisser derrière vous. Seulement alors, vous pouvez venir et m’obéir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors rappelez‑vous ceci : le sel est bon. Mais si vous mélangez le sel avec quelque chose d’autre, il n’est plus bon. Vous ne pouvez pas lui donner encore un goût de sel à nouveau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Vous ne le mettrez pas sur votre champ. Il ne peut pas rendre le sol bon. Vous allez le jeter. Vous avez des oreilles. Alors, écoutez bien ce que je dis.
