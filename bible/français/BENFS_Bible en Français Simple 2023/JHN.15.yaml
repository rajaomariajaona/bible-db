document_id: JHN.15,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 15
  - type: heading
    content: Les branches doivent rester dans la vigne
  - type: text
    content: 'Je suis la '
  - type: text
    content: vigne
  - type: text
    content: ' proprement dite, et mon Père est le '
  - type: text
    content: vigneron
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Vous devez obéir à tout ce que je vous ai enseigné. Donc, par conséquent, vous continuerez à savoir que je vous aime. De la même façon, j’ai obéi à tout ce que mon père m’a demandé de faire. Donc, par conséquent, je continue à savoir qu’il m’aime. '
  '11':
  - type: text
    content: Je vous ai dit ces choses, afin que vous puissiez être vraiment heureux. Vous pouvez être heureux comme je suis moi‑même heureux. Donc, vous serez complètement heureux.
  '12':
  - type: text
    content: 'Je vous dis que vous devez faire ceci : il faut vous aimer les uns les autres, comme je vous ai aimés. '
  '13':
  - type: text
    content: 'Une personne aime vraiment ses amis si elle meurt en leur nom. Personne ne peut aimer quelqu’un plus que cela. '
  '14':
  - type: text
    content: 'Et vous êtes mes amis, si vous m’obéissez. Vous devez faire ce que je vous demande de faire. '
  '15':
  - type: text
    content: 'Un serviteur ne sait pas ce que fait son maître. Je ne vous appelle plus serviteurs. Mais je vous ai dit tout ce que j’ai entendu de mon Père. Donc, je vous appelle amis. '
  '16':
  - type: text
    content: 'Vous ne m’avez pas choisi, mais je vous ai choisis. Je vous ai choisis pour un but. Vous devez aller et vous devez faire des fruits. Vous devez produire toujours de bonnes œuvres. Donc, par conséquent, le Père vous donnera tout ce que vous lui demandez. Si vous lui demandez en mon nom (parce que vous êtes les miens), il va vous le donner. '
  '17':
  - type: text
    content: 'Voici ce que vous devez faire : Vous devez vous aimer les uns les autres.'
  - type: heading
    content: Le monde hait les disciples
  '18':
  - type: text
    content: 'Les gens qui appartiennent à ce monde peuvent vous haïr. Mais rappelez‑vous ceci : ils me détestaient avant vous.'
  '19':
  - type: text
    content: 'Si vous apparteniez à ce monde, les gens de ce monde allaient vous aimer. Mais je vous ai choisis pour que vous soyez séparés des gens de ce monde. Vous n’appartenez pas au monde. C’est pour cela que les gens de ce monde vous détestent. '
  '2':
  - type: text
    content: 'Certaines branches qui font partie de moi ne peuvent avoir aucun fruit sur elles. Donc, mon Père enlève ces branches. Mais il arrange bien toutes les branches qui donnent des fruits. Ainsi elles feront plus de fruits. '
  '20':
  - type: text
    content: 'Rappelez‑vous ce que je vous ai dit : aucun esclave n’est plus important que son maître. S’ils m’ont causé des problèmes, ils vont les causer à vous aussi. Mais s’ils ont obéi à mes paroles, ils vont obéir à vos paroles, aussi.'
  '21':
  - type: text
    content: Ils feront toutes ces choses à cause de moi. Ils ne connaissent pas celui qui m’a envoyé. Voilà pourquoi ils vont faire ces choses.
  '22':
  - type: text
    content: 'Je suis venu et je leur ai parlé. Si je ne l’avais pas fait, ils n’allaient pas faire de mauvaises choses. Mais maintenant, ils ne peuvent pas dire : Nous n’avons rien fait de mal. '
  '23':
  - type: text
    content: 'Celui qui me déteste, déteste aussi mon Père. '
  '24':
  - type: text
    content: 'J’ai fait beaucoup de grandes choses quand j’étais avec eux. Personne d’autre n’a jamais fait de telles choses. Si je n’avais pas fait ces choses parmi eux, ils ne seraient pas fautifs. Mais ils ont vu ce que je faisais. Et ils me haïssent. Et ils ont haï aussi mon Père. '
  '25':
  - type: text
    content: 'Mais cela devait arriver. Dans leur loi, il est écrit ceci : Ils me détestaient sans aucune bonne raison. Et ce qu’il dit devait arriver. '
  '26':
  - type: text
    content: 'Mais je vais vous envoyer un consolateur qui vient du Père. Il s’agit du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' qui parle de vraies choses. Il vient du Père. Et il parlera de moi. '
  '27':
  - type: text
    content: Vous devez parler de moi aussi, parce que vous avez été avec moi depuis le début.
  '3':
  - type: text
    content: 'Les paroles que je vous ai dites, vous ont déjà purifiés. '
  '4':
  - type: text
    content: 'Continuez à vivre en moi, et je vais continuer à vivre en vous. Une branche ne peut pas donner de fruits par elle‑même. Elle ne peut donner ses fruits que si elle continue à faire partie de la '
  - type: text
    content: vigne
  - type: text
    content: . Vous êtes comme ça. Vous pouvez produire des fruits, seulement si vous continuez à vivre en moi.
  '5':
  - type: text
    content: 'Je suis la '
  - type: text
    content: vigne
  - type: text
    content: ', et vous êtes les sarments. Vous devez rester en moi et je dois rester en vous. Seulement si vous faites cela, vous ferez beaucoup de fruits. C’est parce que vous ne pouvez rien faire sans moi. '
  '6':
  - type: text
    content: 'Si quelqu’un ne demeure pas en moi, cette personne est comme une branche morte. Le jardinier va jeter cette branche loin et elle deviendra sèche. Les gens prennent ces branches sèches et ils les jettent dans le feu. Donc, ces branches sèches brûlent. '
  '7':
  - type: text
    content: 'Vous devez rester en moi, et mes paroles doivent rester en vous. Alors vous pouvez demander tout ce que vous voulez. Et Dieu le fera pour vous. '
  '8':
  - type: text
    content: 'Si vous faites beaucoup de fruits, vous serez mes '
  - type: text
    content: disciples
  - type: text
    content: . Vous montrez à quel point mon Père est bon et grand.
  '9':
  - type: text
    content: 'Je vous ai aimés, comme le Père m’a aimé. Continuez à savoir que je vous aime. '
