document_id: JHN.15
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 15
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les branches doivent rester dans la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vigne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je suis la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vigne
  - type: text
    text: ' proprement dite, et mon Père est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vigneron
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certaines branches qui font partie de moi ne peuvent avoir aucun fruit sur elles. Donc, mon Père enlève ces branches. Mais il arrange bien toutes les branches qui donnent des fruits. Ainsi elles feront plus de fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les paroles que je vous ai dites, vous ont déjà purifiés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Continuez à vivre en moi, et je vais continuer à vivre en vous. Une branche ne peut pas donner de fruits par elle‑même. Elle ne peut donner ses fruits que si elle continue à faire partie de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vigne
  - type: text
    text: . Vous êtes comme ça. Vous pouvez produire des fruits, seulement si vous continuez à vivre en moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je suis la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vigne
  - type: text
    text: ', et vous êtes les sarments. Vous devez rester en moi et je dois rester en vous. Seulement si vous faites cela, vous ferez beaucoup de fruits. C’est parce que vous ne pouvez rien faire sans moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si quelqu’un ne demeure pas en moi, cette personne est comme une branche morte. Le jardinier va jeter cette branche loin et elle deviendra sèche. Les gens prennent ces branches sèches et ils les jettent dans le feu. Donc, ces branches sèches brûlent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous devez rester en moi, et mes paroles doivent rester en vous. Alors vous pouvez demander tout ce que vous voulez. Et Dieu le fera pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si vous faites beaucoup de fruits, vous serez mes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: . Vous montrez à quel point mon Père est bon et grand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je vous ai aimés, comme le Père m’a aimé. Continuez à savoir que je vous aime. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous devez obéir à tout ce que je vous ai enseigné. Donc, par conséquent, vous continuerez à savoir que je vous aime. De la même façon, j’ai obéi à tout ce que mon père m’a demandé de faire. Donc, par conséquent, je continue à savoir qu’il m’aime. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je vous ai dit ces choses, afin que vous puissiez être vraiment heureux. Vous pouvez être heureux comme je suis moi‑même heureux. Donc, vous serez complètement heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je vous dis que vous devez faire ceci : il faut vous aimer les uns les autres, comme je vous ai aimés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Une personne aime vraiment ses amis si elle meurt en leur nom. Personne ne peut aimer quelqu’un plus que cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et vous êtes mes amis, si vous m’obéissez. Vous devez faire ce que je vous demande de faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Un serviteur ne sait pas ce que fait son maître. Je ne vous appelle plus serviteurs. Mais je vous ai dit tout ce que j’ai entendu de mon Père. Donc, je vous appelle amis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous ne m’avez pas choisi, mais je vous ai choisis. Je vous ai choisis pour un but. Vous devez aller et vous devez faire des fruits. Vous devez produire toujours de bonnes œuvres. Donc, par conséquent, le Père vous donnera tout ce que vous lui demandez. Si vous lui demandez en mon nom (parce que vous êtes les miens), il va vous le donner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici ce que vous devez faire : Vous devez vous aimer les uns les autres.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le monde hait les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les gens qui appartiennent à ce monde peuvent vous haïr. Mais rappelez‑vous ceci : ils me détestaient avant vous.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si vous apparteniez à ce monde, les gens de ce monde allaient vous aimer. Mais je vous ai choisis pour que vous soyez séparés des gens de ce monde. Vous n’appartenez pas au monde. C’est pour cela que les gens de ce monde vous détestent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rappelez‑vous ce que je vous ai dit : aucun esclave n’est plus important que son maître. S’ils m’ont causé des problèmes, ils vont les causer à vous aussi. Mais s’ils ont obéi à mes paroles, ils vont obéir à vos paroles, aussi.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils feront toutes ces choses à cause de moi. Ils ne connaissent pas celui qui m’a envoyé. Voilà pourquoi ils vont faire ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je suis venu et je leur ai parlé. Si je ne l’avais pas fait, ils n’allaient pas faire de mauvaises choses. Mais maintenant, ils ne peuvent pas dire : Nous n’avons rien fait de mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Celui qui me déteste, déteste aussi mon Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'J’ai fait beaucoup de grandes choses quand j’étais avec eux. Personne d’autre n’a jamais fait de telles choses. Si je n’avais pas fait ces choses parmi eux, ils ne seraient pas fautifs. Mais ils ont vu ce que je faisais. Et ils me haïssent. Et ils ont haï aussi mon Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais cela devait arriver. Dans leur loi, il est écrit ceci : Ils me détestaient sans aucune bonne raison. Et ce qu’il dit devait arriver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais je vais vous envoyer un consolateur qui vient du Père. Il s’agit du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' qui parle de vraies choses. Il vient du Père. Et il parlera de moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vous devez parler de moi aussi, parce que vous avez été avec moi depuis le début.
