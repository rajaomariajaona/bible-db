document_id: MRK.16,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 16
  - type: heading
    content: Jésus devient encore vivant
  - type: text
    content: 'Après la fin du jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: ', les femmes ont acheté des graines d’une bonne odeur. Elles voulaient mettre ces graines et un peu d’huile sur le corps de Jésus. Ces femmes étaient Marie de Magdala, Salomé et Marie, mère de Jacques. '
  '10':
  - type: text
    content: 'Elle est allée auprès de ceux qui étaient avec Jésus. Ils étaient tous très tristes et ils pleuraient. Marie leur a parlé. '
  '11':
  - type: text
    content: 'Elle leur a dit que Jésus était encore vivant. Et elle leur a dit qu’elle l’avait vu. Mais ils ne la croyaient pas. '
  '12':
  - type: text
    content: 'Après ces choses, Jésus est apparu à 2 autres '
  - type: text
    content: disciples
  - type: text
    content: '. Ils marchaient loin de la ville. Jésus semblait être différent d’eux. '
  '13':
  - type: text
    content: 'Ces 2 '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés, et ils ont tout dit aux autres '
  - type: text
    content: disciples
  - type: text
    content: '. Mais les autres '
  - type: text
    content: disciples
  - type: text
    content: ' ne les croyaient pas. '
  '14':
  - type: text
    content: 'Après cela, Jésus est apparu aux 11 '
  - type: text
    content: disciples
  - type: text
    content: ' pendant qu’ils étaient en train de manger. Il leur a dit qu’ils avaient tort de ne pas croire : Il est encore vivant. Mais les '
  - type: text
    content: disciples
  - type: text
    content: ' ne croyaient pas en eux. '
  '15':
  - type: text
    content: 'Et Jésus leur a dit : Allez vers tous les gens de partout dans le monde. Dites la Bonne Nouvelle à tout le monde. '
  '16':
  - type: text
    content: 'Si une personne croit, alors baptisez cette personne. Et Dieu sauvera cette personne. Mais si une personne ne croit pas, Dieu sera le '
  - type: text
    content: juge
  - type: text
    content: ' de cette personne. Et il punira cette personne. '
  '17':
  - type: text
    content: 'Voici les choses puissantes qui se passeront aux gens qui vont croire : En mon nom, ils vont chasser les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des personnes. Ils parleront de nouvelles langues. '
  '18':
  - type: text
    content: S’ils ramassent un serpent, il ne leur fera aucun mal. S’ils boivent du poison, il ne leur fera aucun mal. Ils vont poser leurs mains sur des malades, et Dieu les rendra bien.
  - type: heading
    content: Jésus monte à la maison de Dieu appelée le ciel
  '19':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus a fini de parler. Après cela, Dieu l’a placé dans sa maison (ciel). Et Jésus est assis à la droite de Dieu. '
  '2':
  - type: text
    content: 'Elles sont sorties très tôt le matin, le premier jour de la semaine. Le soleil se levait. Elles sont allées au trou dans la roche (tombeau de Jésus). C’était là que Joseph avait enterré le corps de Jésus. '
  '20':
  - type: text
    content: 'Mais les '
  - type: text
    content: disciples
  - type: text
    content: ' allaient partout. Ils disaient aux gens la Bonne Nouvelle. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' travaillait avec eux. Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' faisait des choses puissantes pour montrer que leur message était vrai.'
  '3':
  - type: text
    content: 'Les femmes se sont demandé ceci : Qui va déplacer la grande pierre devant la roche (tombeau de Jésus) ? Elle est en face du trou de la '
  - type: text
    content: roche
  - type: text
    content: ' où Jésus était enterré. '
  '4':
  - type: text
    content: 'Elles regardaient et elles ont vu la pierre. C’était une très grosse pierre. Mais quelqu’un l’avait déjà déplacée du trou. '
  '5':
  - type: text
    content: 'Quand les femmes sont allées dans le trou de la '
  - type: text
    content: roche
  - type: text
    content: ' (là où Jésus était enterré), elles ont vu un jeune homme. Il était assis sur le côté droit de la place. Il portait un long vêtement blanc. Ces femmes avaient très peur. '
  '6':
  - type: text
    content: 'Le jeune homme leur a dit : N’ayez pas peur. Vous cherchez Jésus de Nazareth.'
  - type: text
    content: 'Les soldats l’ont tué sur une croix, mais il est devenu de nouveau vivant. Il n’est pas là. Regardez ! Vous pouvez voir l’endroit où les hommes l’avaient mis. '
  '7':
  - type: text
    content: 'Mais vous devez aller dire à ses '
  - type: text
    content: disciples
  - type: text
    content: ' et à Pierre à ce sujet. Dites‑leur que Jésus va avant vous en Galilée. Vous le verrez là, comme il vous l’avait dit. '
  '8':
  - type: text
    content: Les femmes sont sorties du trou dans la roche. Elles ont quitté ce lieu. Elles ne disaient rien à personne, parce qu’elles avaient peur.
  '9':
  - type: text
    content: 'Jésus est encore devenu vivant au début du premier jour de la semaine, le dimanche. Il est apparu d’abord à Marie de Magdala. Jésus avait fait sortir 7 mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' d’elle.'
