document_id: MRK.16,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 16
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devient encore vivant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après la fin du jour de repos des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', les femmes ont acheté des graines d’une bonne odeur. Elles voulaient mettre ces graines et un peu d’huile sur le corps de Jésus. Ces femmes étaient Marie de Magdala, Salomé et Marie, mère de Jacques. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elle est allée auprès de ceux qui étaient avec Jésus. Ils étaient tous très tristes et ils pleuraient. Marie leur a parlé. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Elle leur a dit que Jésus était encore vivant. Et elle leur a dit qu’elle l’avait vu. Mais ils ne la croyaient pas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Après ces choses, Jésus est apparu à 2 autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Ils marchaient loin de la ville. Jésus semblait être différent d’eux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ces 2 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont allés, et ils ont tout dit aux autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Mais les autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ne les croyaient pas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Après cela, Jésus est apparu aux 11 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' pendant qu’ils étaient en train de manger. Il leur a dit qu’ils avaient tort de ne pas croire : Il est encore vivant. Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ne croyaient pas en eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et Jésus leur a dit : Allez vers tous les gens de partout dans le monde. Dites la Bonne Nouvelle à tout le monde. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Si une personne croit, alors baptisez cette personne. Et Dieu sauvera cette personne. Mais si une personne ne croit pas, Dieu sera le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' de cette personne. Et il punira cette personne. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici les choses puissantes qui se passeront aux gens qui vont croire : En mon nom, ils vont chasser les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' des personnes. Ils parleront de nouvelles langues. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: S’ils ramassent un serpent, il ne leur fera aucun mal. S’ils boivent du poison, il ne leur fera aucun mal. Ils vont poser leurs mains sur des malades, et Dieu les rendra bien.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus monte à la maison de Dieu appelée le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus a fini de parler. Après cela, Dieu l’a placé dans sa maison (ciel). Et Jésus est assis à la droite de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Elles sont sorties très tôt le matin, le premier jour de la semaine. Le soleil se levait. Elles sont allées au trou dans la roche (tombeau de Jésus). C’était là que Joseph avait enterré le corps de Jésus. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' allaient partout. Ils disaient aux gens la Bonne Nouvelle. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' travaillait avec eux. Et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' faisait des choses puissantes pour montrer que leur message était vrai.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les femmes se sont demandé ceci : Qui va déplacer la grande pierre devant la roche (tombeau de Jésus) ? Elle est en face du trou de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: roche
    - type: text
      text: ' où Jésus était enterré. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Elles regardaient et elles ont vu la pierre. C’était une très grosse pierre. Mais quelqu’un l’avait déjà déplacée du trou. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Quand les femmes sont allées dans le trou de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: roche
    - type: text
      text: ' (là où Jésus était enterré), elles ont vu un jeune homme. Il était assis sur le côté droit de la place. Il portait un long vêtement blanc. Ces femmes avaient très peur. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le jeune homme leur a dit : N’ayez pas peur. Vous cherchez Jésus de Nazareth.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats l’ont tué sur une croix, mais il est devenu de nouveau vivant. Il n’est pas là. Regardez ! Vous pouvez voir l’endroit où les hommes l’avaient mis. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais vous devez aller dire à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' et à Pierre à ce sujet. Dites‑leur que Jésus va avant vous en Galilée. Vous le verrez là, comme il vous l’avait dit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les femmes sont sorties du trou dans la roche. Elles ont quitté ce lieu. Elles ne disaient rien à personne, parce qu’elles avaient peur.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jésus est encore devenu vivant au début du premier jour de la semaine, le dimanche. Il est apparu d’abord à Marie de Magdala. Jésus avait fait sortir 7 mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' d’elle.'
