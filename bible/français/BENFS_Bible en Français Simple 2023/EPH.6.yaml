document_id: EPH.6
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 6
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les enfants et les parents
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Enfants, obéissez à vos parents. C’est ce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' veut. C’est une bonne chose à faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La première règle que Dieu a donnée avec promesse dit : Rappelez‑vous toujours combien votre père et votre mère sont importants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Par conséquent, vous serez heureux et vous vivrez longtemps sur la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pères, ne faites pas fâcher vos enfants. Mais, enseignez‑leur au fur et à mesure qu’ils grandissent. Apprenez‑leur la bonne façon dans laquelle le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' veut qu’ils vivent.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les esclaves et les maîtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Esclaves, obéissez à vos maîtres. Rappelez‑vous combien ils sont importants. Et ayez peur d’eux. Travaillez bien pour eux, parce que vous voulez vraiment les rendre heureux. Travaillez pour eux comme si vous travailliez pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne travaillez pas bien seulement quand ils peuvent vous voir. Ne travaillez pas seulement pour rendre les gens heureux.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Mais, travaillez toujours bien, comme les esclaves de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Travaillez parce que vous voulez vraiment obéir à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Soyez heureux de travailler aussi bien que vous pouvez pour vos maîtres. Travaillez comme si vous travailliez pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et non seulement pour les personnes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rappelez‑vous ceci : Quelqu’un qui fait quelque chose de bon va également recevoir quelque chose de bon du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en conséquence. Cela se produira si cette personne est esclave ou une personne libre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Maîtres, soyez bons envers vos esclaves de la même manière. Ne dites pas de choses qui les effraient. Ne dites pas que vous les punirez sans aucune bonne raison. Rappelez‑vous que vous et vos esclaves avez le même maître au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Et tout le monde est important pour lui. Il n’est jamais injuste.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les soldats de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La dernière chose que je veux vous dire est ceci : Soyez forts par la grande puissance du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', parce que vous êtes unis avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Revêtez l’armure que Dieu nous donne. Ainsi donc, vous continuerez d’être forts contre tous les mauvais moyens par lesquels le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' nous attaque.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous devez être forts, parce que nous ne luttons pas contre des ennemis humains. Non, mais nous nous battons contre les princes et les puissants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' qui ont autorité sur ce monde obscur. Nous luttons contre de puissants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' mauvais qui vivent dans les cieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors, prenez toutes les armes que Dieu donne. Ensuite, vous serez en mesure de lutter contre l’ennemi quand il vous attaque. Et il ne sera pas en mesure de détruire votre foi. Puis, une fois que vous avez tout fait, vous serez toujours debout fermement dans la foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi restez debout. Rappelez‑vous et obéissez toujours au vrai message de Dieu. Ce sera comme une ceinture autour de vous. Soyez toujours avec Dieu. Ce sera comme une plaque métallique forte que vous avez mise sur le devant de votre corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Souvenez‑vous de la Bonne Nouvelle de Dieu qui vous fait des amis avec Dieu et les uns avec les autres. Ce sera comme les chaussures à vos pieds, pour vous apprêter à combattre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Continuez toujours de croire en Dieu. Ce sera comme un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: bouclier
  - type: text
    text: ' que vous tenez en face de vous. Il éteindra toutes les flèches brûlantes que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' vous jette. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Rappelez‑vous que Dieu vous a sauvés. Ce sera comme un chapeau en métal solide sur la tête, pour vous garder en sécurité. Aussi, rappelez‑vous ce que Dieu a dit. Ce sera comme un couteau fort que vous pouvez utiliser, par l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu, pour combattre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pour faire tout cela, priez tout le temps comme l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous guide à prier. Priez pour toute chose. Demandez à Dieu ce dont vous avez besoin. Ainsi, continuez de prier toujours pour tout le peuple de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Priez pour moi, aussi. Priez pour que Dieu me donne les mots justes pour parler. Priez pour que je n’aie pas peur de parler aux gens du secret de la Bonne Nouvelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dieu m’a envoyé pour dire la Bonne Nouvelle aux gens. Et voilà pourquoi je suis en prison. Alors, priez pour que je n’aie pas peur de parler. Je veux dire la Bonne Nouvelle avec courage, comme je dois le faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul termine sa lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tychique, un ami chrétien que j’aime, vous dira toutes les nouvelles sur moi. Il est un bon serviteur du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il continue de bien travailler pour le compte du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il vous dira ce que je fais. Alors vous saurez comment je suis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C’est la raison pour laquelle je vous l’envoie. Je veux qu’il vous dise comment nous sommes. Et je veux qu’il vous aide, afin que vous vous sentiez plus forts et plus courageux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je prie pour que Dieu, le Père, et notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' soient bons envers vous, les croyants. Je prie pour qu’ils vous donnent la paix dans votre cœur. Je prie pour qu’ils vous aident à aimer Dieu et les autres. Que vous continuiez à croire en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je prie que Dieu soit très bon envers tout le monde qui continue d’aimer notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
