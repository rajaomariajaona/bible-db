document_id: EPH.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: Les enfants et les parents
  - type: text
    content: 'Enfants, obéissez à vos parents. C’est ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' veut. C’est une bonne chose à faire. '
  '10':
  - type: text
    content: 'La dernière chose que je veux vous dire est ceci : Soyez forts par la grande puissance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce que vous êtes unis avec lui. '
  '11':
  - type: text
    content: 'Revêtez l’armure que Dieu nous donne. Ainsi donc, vous continuerez d’être forts contre tous les mauvais moyens par lesquels le '
  - type: text
    content: diable
  - type: text
    content: ' nous attaque.'
  '12':
  - type: text
    content: 'Vous devez être forts, parce que nous ne luttons pas contre des ennemis humains. Non, mais nous nous battons contre les princes et les puissants '
  - type: text
    content: esprits
  - type: text
    content: ' qui ont autorité sur ce monde obscur. Nous luttons contre de puissants '
  - type: text
    content: esprits
  - type: text
    content: ' mauvais qui vivent dans les cieux. '
  '13':
  - type: text
    content: Alors, prenez toutes les armes que Dieu donne. Ensuite, vous serez en mesure de lutter contre l’ennemi quand il vous attaque. Et il ne sera pas en mesure de détruire votre foi. Puis, une fois que vous avez tout fait, vous serez toujours debout fermement dans la foi.
  '14':
  - type: text
    content: 'Ainsi restez debout. Rappelez‑vous et obéissez toujours au vrai message de Dieu. Ce sera comme une ceinture autour de vous. Soyez toujours avec Dieu. Ce sera comme une plaque métallique forte que vous avez mise sur le devant de votre corps. '
  '15':
  - type: text
    content: Souvenez‑vous de la Bonne Nouvelle de Dieu qui vous fait des amis avec Dieu et les uns avec les autres. Ce sera comme les chaussures à vos pieds, pour vous apprêter à combattre.
  '16':
  - type: text
    content: 'Continuez toujours de croire en Dieu. Ce sera comme un '
  - type: text
    content: bouclier
  - type: text
    content: ' que vous tenez en face de vous. Il éteindra toutes les flèches brûlantes que le '
  - type: text
    content: diable
  - type: text
    content: ' vous jette. '
  '17':
  - type: text
    content: Rappelez‑vous que Dieu vous a sauvés. Ce sera comme un chapeau en métal solide sur la tête, pour vous garder en sécurité. Aussi, rappelez‑vous ce que Dieu a dit. Ce sera comme un couteau fort que vous pouvez utiliser, par l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu, pour combattre.'
  '18':
  - type: text
    content: Pour faire tout cela, priez tout le temps comme l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous guide à prier. Priez pour toute chose. Demandez à Dieu ce dont vous avez besoin. Ainsi, continuez de prier toujours pour tout le peuple de Dieu.'
  '19':
  - type: text
    content: Priez pour moi, aussi. Priez pour que Dieu me donne les mots justes pour parler. Priez pour que je n’aie pas peur de parler aux gens du secret de la Bonne Nouvelle.
  '2':
  - type: text
    content: 'La première règle que Dieu a donnée avec promesse dit : Rappelez‑vous toujours combien votre père et votre mère sont importants. '
  '20':
  - type: text
    content: Dieu m’a envoyé pour dire la Bonne Nouvelle aux gens. Et voilà pourquoi je suis en prison. Alors, priez pour que je n’aie pas peur de parler. Je veux dire la Bonne Nouvelle avec courage, comme je dois le faire.
  - type: heading
    content: Paul termine sa lettre
  '21':
  - type: text
    content: 'Tychique, un ami chrétien que j’aime, vous dira toutes les nouvelles sur moi. Il est un bon serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il continue de bien travailler pour le compte du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il vous dira ce que je fais. Alors vous saurez comment je suis. '
  '22':
  - type: text
    content: C’est la raison pour laquelle je vous l’envoie. Je veux qu’il vous dise comment nous sommes. Et je veux qu’il vous aide, afin que vous vous sentiez plus forts et plus courageux.
  '23':
  - type: text
    content: 'Je prie pour que Dieu, le Père, et notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' soient bons envers vous, les croyants. Je prie pour qu’ils vous donnent la paix dans votre cœur. Je prie pour qu’ils vous aident à aimer Dieu et les autres. Que vous continuiez à croire en lui. '
  '24':
  - type: text
    content: 'Je prie que Dieu soit très bon envers tout le monde qui continue d’aimer notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '3':
  - type: text
    content: Par conséquent, vous serez heureux et vous vivrez longtemps sur la terre.
  '4':
  - type: text
    content: 'Pères, ne faites pas fâcher vos enfants. Mais, enseignez‑leur au fur et à mesure qu’ils grandissent. Apprenez‑leur la bonne façon dans laquelle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' veut qu’ils vivent.'
  - type: heading
    content: Les esclaves et les maîtres
  '5':
  - type: text
    content: 'Esclaves, obéissez à vos maîtres. Rappelez‑vous combien ils sont importants. Et ayez peur d’eux. Travaillez bien pour eux, parce que vous voulez vraiment les rendre heureux. Travaillez pour eux comme si vous travailliez pour le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '6':
  - type: text
    content: Ne travaillez pas bien seulement quand ils peuvent vous voir. Ne travaillez pas seulement pour rendre les gens heureux.
  - type: text
    content: 'Mais, travaillez toujours bien, comme les esclaves de '
  - type: text
    content: Christ
  - type: text
    content: '. Travaillez parce que vous voulez vraiment obéir à Dieu. '
  '7':
  - type: text
    content: 'Soyez heureux de travailler aussi bien que vous pouvez pour vos maîtres. Travaillez comme si vous travailliez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et non seulement pour les personnes.'
  '8':
  - type: text
    content: 'Rappelez‑vous ceci : Quelqu’un qui fait quelque chose de bon va également recevoir quelque chose de bon du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en conséquence. Cela se produira si cette personne est esclave ou une personne libre.'
  '9':
  - type: text
    content: 'Maîtres, soyez bons envers vos esclaves de la même manière. Ne dites pas de choses qui les effraient. Ne dites pas que vous les punirez sans aucune bonne raison. Rappelez‑vous que vous et vos esclaves avez le même maître au '
  - type: text
    content: ciel
  - type: text
    content: . Et tout le monde est important pour lui. Il n’est jamais injuste.
  - type: heading
    content: Les soldats de Dieu
