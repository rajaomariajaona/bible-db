document_id: LUK.10
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 10
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus choisit 72 hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus a encore choisi 72 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il les a envoyés devant lui 2 à 2. Ils sont allés à chaque ville et village où il devait aller bientôt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus a dit à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' avant de partir : Beaucoup de gens veulent croire au message de Dieu. Ils sont comme un champ avec de nombreuses plantes et des graines mûres. Mais il y a très peu de travailleurs pour récolter les graines mûres. Donc, vous devez prier Dieu d’envoyer des ouvriers. Ils vont aller dire son message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a poursuivi en disant : Je vous envoie. Alors allez ! Mais écoutez ! Vous serez comme de jeunes brebis au milieu des animaux sauvages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne prenez pas l’argent ni de sac. Ne prenez pas de souliers de réserve. Lorsque vous rencontrez d’autres personnes sur la route, ne perdez pas de temps avec de longues conversations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand vous entrez dans une maison, dites d’abord : Nous prions pour que tout soit bien avec vous ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quelqu’un dans la maison peut croire à ce que vous dites. S’il le fait, ce sera bien pour lui. Mais si personne n’accepte vos paroles, reprenez‑les. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pendant que vous êtes dans la ville, vous devriez rester dans la même maison. Acceptez la nourriture et la boisson que les gens de la maison vous donnent. Ceci est pour le travail que vous faites. N’allez pas d’une maison à l’autre pour obtenir de la nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les gens peuvent vous accepter quand vous allez dans une ville. Mangez ce que ces gens vous donnent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Guérissez des malades dans cette ville. Donnez ce message à tous les gens là‑bas : Dieu veut régner dans votre vie maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Parfois, quand vous allez dans une ville, les gens ne vous accepteront pas. Vous devez ensuite aller dans les rues de cette ville et vous devez dire aux gens : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il y a la saleté de votre ville sur nos pieds. Nous allons nettoyer le tout pour montrer que vous n’avez pas accepté le message de Dieu. Écoutez ! Dieu veut régner dans vos vies, mais vous l’avez refusé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un jour Dieu jugera tout le monde. À ce moment‑là, il punira vraiment les gens de cette ville. Oui, il va les punir plus que les gens qui vivaient à Sodome.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Certaines villes où les gens ne croient pas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus a continué à dire : Ce sera mauvais pour vous, les gens de Chorazin. Ce sera mauvais pour vous, les gens de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: '. J’ai fait de grandes choses dans vos villes. Si j’avais fait de grandes choses à Tyr et à Sidon, les gens là‑bas pourraient m’écouter. Ils pourraient alors porter le sac. Ils pourraient également mettre de la cendre sur leurs tête. Cela allait montrer à Dieu leur tristesse. Ils allaient laisser de faire de mauvaises choses et ils allaient commencer à lui obéir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Oui, quand Dieu jugera les gens, il punira les gens de Tyr et de Sidon. Mais il va punir plus les habitants de Chorazin et '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et les gens de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Capernaüm
  - type: text
    text: ', ils essaient de se lever jusqu’à la place de Dieu. Mais il va les jeter en enfer !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus a dit à ceux qu’il envoyait ceci : La personne qui vous écoute, m’écoute. La personne qui ne vous accepte pas, ne m’accepte pas. Et la personne qui ne m’accepte pas, n’accepte pas quelqu’un d’autre. Elle n’accepte pas celui qui m’a envoyé.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les 72 hommes reviennent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Plus tard, les 72 hommes que Jésus avait envoyés lui sont revenus. Ils étaient très heureux. Ils ont dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', même les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' nous obéissent. Nous utilisons ton nom et nous disons : Partez ! Puis ils partent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus a répondu : Je regardais et je voyais le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' tomber. Il est tombé très vite, comme la foudre du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ecoutez ! Je vous ai donné le pouvoir. Vous pourrez même vous tenir debout sur les serpents et les insectes dangereux et vous aurez le pouvoir sur toute la puissance du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: '. Rien ne vous fera de mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais ne soyez pas heureux, parce que vous avez le pouvoir sur les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Vos noms sont dans le livre là où Dieu reste. Voilà pourquoi vous devriez être heureux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est très heureux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En ce moment, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' a fait Jésus très heureux. Il a dit : Père, tu diriges toutes choses au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et sur la terre ! Je te remercie pour cela. Tu enseignes les gens qui ne savent pas beaucoup de choses. Maintenant, ils peuvent comprendre cela. Mais tu as caché toutes ces choses à d’autres personnes. Ces gens pensent qu’ils comprennent tout. Et ils pensent qu’ils sont sages. Oui, Père, tu as voulu que ceci soit ainsi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus a alors dit : Mon Père m’a donné toutes les choses. Seul le Père sait qui je suis. Personne d’autre ne sait vraiment que je suis le Fils de Dieu. Moi seulement, je sais qui est le Père. Personne d’autre ne le sait, sauf ceux que j’ai choisis de le connaître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Puis il s’est tourné. Et il parlait seulement à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Soyez heureux ! Dieu vous a aidés à voir les choses que vous voyez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ecoutez ! Il y a eu beaucoup de rois. Beaucoup d’hommes recevaient des messages de Dieu. Tous ces gens voulaient voir les choses que vous voyez. Mais ils ne les ont pas vues. Ils voulaient entendre ce que vous entendez. Mais ils ne l’ont pas entendu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Histoire d’un bon homme de Samarie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Un enseignant de la loi de Dieu s’est levé. Il voulait montrer que Jésus ne savait pas vraiment les règles bien. Donc, il lui a posé une question : Maître, que dois‑je faire pour vivre tous les temps ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus a demandé : Qu’est‑ce que la loi de Dieu dit ? Qu’est‑ce que tu comprends de la loi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il a répondu : La loi de Dieu dit que nous devons aimer le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' notre Dieu. Nous devons l’aimer totalement : l’aimer de tout notre cœur, l’aimer de toute notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âme
  - type: text
    text: ', l’aimer de toute notre force et l’aimer de tout notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Nous devons aimer aussi d’autres gens. Nous devons les aimer comme nous nous aimons nous‑mêmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus a dit : Tu as dit la bonne réponse. Si tu fais cela, tu vas vivre tout le temps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais l’homme a voulu montrer qu’il avait raison de poser une question. Alors il a demandé : Qui sont les gens qui vivent près de moi, que je dois aimer ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus a répondu en racontant cette histoire : Un homme descendait sur la route de Jérusalem à la ville de Jéricho. Sur le chemin, quelques hommes l’ont attaqué. Ils ont emporté tous ses vêtements et l’ont frappé avec des bâtons. Il était presque mort quand ils l’ont laissé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais à un moment, un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' passait sur cette route. Il a vu l’homme, qui se trouvait là. Mais il est passé devant lui de l’autre côté de la route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Lévite
  - type: text
    text: ' allait aussi sur la route. Il est venu à l’endroit où l’homme était couché. Il l’a vu. Mais il est aussi passé devant lui de l’autre côté de la route.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais un homme de Samarie passait également le long de la route. Et il est venu à l’endroit où l’homme était couché. Quand il l’a vu, il se sentait très triste pour lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il est allé vers lui. Il a versé de l’huile et du vin sur les endroits où il saignait. Puis il a attaché ces endroits avec des bandages propres. Après cela, il a mis l’homme sur son propre animal. Ils sont arrivés dans un petit hôtel. Il l’a emmené et il était gentil avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le lendemain, l’homme de Samarie a sorti 2 pièces d’argent. Il a donné l’argent à l’homme qui prenait soin de l’hôtel. Il lui a dit : Sois gentil avec cet homme pour moi. Je reviendrai. Cet argent peut ne pas suffire. Je vais te payer tout ce que tu vas dépenser de plus pour lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors Jésus a posé cette question à l’homme qui enseignait les règles de Dieu : Les 3 hommes ont trouvé l’homme qui se trouvait sur la route. Lequel d’entre eux a montré l’amour envers lui ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il a répondu : C’est l’homme qui était gentil avec lui.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Jésus lui a dit : Oui, tu as raison. Donc, va et fais la même chose à d’autres personnes.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus rend visite à la maison de Marthe et Marie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont poursuivi leur voyage. Ils sont arrivés à un certain village. Là, une femme appelée Marthe a demandé à Jésus de venir dans sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Cette femme avait une sœur appelée Marie. Marie s’asseyait près de Jésus. Elle écoutait les choses qu’il enseignait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Marthe pensait à elle‑même : Je ne peux pas faire tout ce travail seule. Elle est donc venue auprès de Jésus.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ma sœur ne m’aide pas avec le travail. Elle m’a laissée le faire seule. Tu ne peux vraiment pas croire que cela est juste ! Dis‑lui qu’elle doit m’aider !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jésus a répondu : Marthe, tu as des problèmes dans ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' au sujet de très nombreuses choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Mais une seule chose est vraiment importante. Et Marie l’a choisie. Personne ne va l’enlever d’elle.
