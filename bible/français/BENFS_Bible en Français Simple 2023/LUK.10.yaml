document_id: LUK.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: heading
    content: Jésus choisit 72 hommes
  - type: text
    content: 'Après cela, Jésus a encore choisi 72 '
  - type: text
    content: disciples
  - type: text
    content: '. Il les a envoyés devant lui 2 à 2. Ils sont allés à chaque ville et village où il devait aller bientôt. '
  '10':
  - type: text
    content: 'Parfois, quand vous allez dans une ville, les gens ne vous accepteront pas. Vous devez ensuite aller dans les rues de cette ville et vous devez dire aux gens : '
  '11':
  - type: text
    content: 'Il y a la saleté de votre ville sur nos pieds. Nous allons nettoyer le tout pour montrer que vous n’avez pas accepté le message de Dieu. Écoutez ! Dieu veut régner dans vos vies, mais vous l’avez refusé. '
  '12':
  - type: text
    content: Un jour Dieu jugera tout le monde. À ce moment‑là, il punira vraiment les gens de cette ville. Oui, il va les punir plus que les gens qui vivaient à Sodome.
  - type: heading
    content: Certaines villes où les gens ne croient pas
  '13':
  - type: text
    content: 'Jésus a continué à dire : Ce sera mauvais pour vous, les gens de Chorazin. Ce sera mauvais pour vous, les gens de '
  - type: text
    content: Bethsaïda
  - type: text
    content: '. J’ai fait de grandes choses dans vos villes. Si j’avais fait de grandes choses à Tyr et à Sidon, les gens là‑bas pourraient m’écouter. Ils pourraient alors porter le sac. Ils pourraient également mettre de la cendre sur leurs tête. Cela allait montrer à Dieu leur tristesse. Ils allaient laisser de faire de mauvaises choses et ils allaient commencer à lui obéir. '
  '14':
  - type: text
    content: 'Oui, quand Dieu jugera les gens, il punira les gens de Tyr et de Sidon. Mais il va punir plus les habitants de Chorazin et '
  - type: text
    content: Bethsaïda
  - type: text
    content: .
  '15':
  - type: text
    content: 'Et les gens de '
  - type: text
    content: Capernaüm
  - type: text
    content: ', ils essaient de se lever jusqu’à la place de Dieu. Mais il va les jeter en enfer !'
  '16':
  - type: text
    content: 'Jésus a dit à ceux qu’il envoyait ceci : La personne qui vous écoute, m’écoute. La personne qui ne vous accepte pas, ne m’accepte pas. Et la personne qui ne m’accepte pas, n’accepte pas quelqu’un d’autre. Elle n’accepte pas celui qui m’a envoyé.'
  - type: heading
    content: Les 72 hommes reviennent
  '17':
  - type: text
    content: 'Plus tard, les 72 hommes que Jésus avait envoyés lui sont revenus. Ils étaient très heureux. Ils ont dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', même les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' nous obéissent. Nous utilisons ton nom et nous disons : Partez ! Puis ils partent.'
  '18':
  - type: text
    content: 'Jésus a répondu : Je regardais et je voyais le '
  - type: text
    content: diable
  - type: text
    content: ' tomber. Il est tombé très vite, comme la foudre du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Ecoutez ! Je vous ai donné le pouvoir. Vous pourrez même vous tenir debout sur les serpents et les insectes dangereux et vous aurez le pouvoir sur toute la puissance du '
  - type: text
    content: diable
  - type: text
    content: '. Rien ne vous fera de mal. '
  '2':
  - type: text
    content: 'Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: ' avant de partir : Beaucoup de gens veulent croire au message de Dieu. Ils sont comme un champ avec de nombreuses plantes et des graines mûres. Mais il y a très peu de travailleurs pour récolter les graines mûres. Donc, vous devez prier Dieu d’envoyer des ouvriers. Ils vont aller dire son message. '
  '20':
  - type: text
    content: 'Mais ne soyez pas heureux, parce que vous avez le pouvoir sur les mauvais '
  - type: text
    content: esprits
  - type: text
    content: . Vos noms sont dans le livre là où Dieu reste. Voilà pourquoi vous devriez être heureux.
  - type: heading
    content: Jésus est très heureux
  '21':
  - type: text
    content: 'En ce moment, le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' a fait Jésus très heureux. Il a dit : Père, tu diriges toutes choses au '
  - type: text
    content: ciel
  - type: text
    content: ' et sur la terre ! Je te remercie pour cela. Tu enseignes les gens qui ne savent pas beaucoup de choses. Maintenant, ils peuvent comprendre cela. Mais tu as caché toutes ces choses à d’autres personnes. Ces gens pensent qu’ils comprennent tout. Et ils pensent qu’ils sont sages. Oui, Père, tu as voulu que ceci soit ainsi.'
  '22':
  - type: text
    content: 'Jésus a alors dit : Mon Père m’a donné toutes les choses. Seul le Père sait qui je suis. Personne d’autre ne sait vraiment que je suis le Fils de Dieu. Moi seulement, je sais qui est le Père. Personne d’autre ne le sait, sauf ceux que j’ai choisis de le connaître.'
  '23':
  - type: text
    content: 'Puis il s’est tourné. Et il parlait seulement à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Soyez heureux ! Dieu vous a aidés à voir les choses que vous voyez. '
  '24':
  - type: text
    content: Ecoutez ! Il y a eu beaucoup de rois. Beaucoup d’hommes recevaient des messages de Dieu. Tous ces gens voulaient voir les choses que vous voyez. Mais ils ne les ont pas vues. Ils voulaient entendre ce que vous entendez. Mais ils ne l’ont pas entendu.
  - type: heading
    content: Histoire d’un bon homme de Samarie
  '25':
  - type: text
    content: 'Un enseignant de la loi de Dieu s’est levé. Il voulait montrer que Jésus ne savait pas vraiment les règles bien. Donc, il lui a posé une question : Maître, que dois‑je faire pour vivre tous les temps ?'
  '26':
  - type: text
    content: 'Jésus a demandé : Qu’est‑ce que la loi de Dieu dit ? Qu’est‑ce que tu comprends de la loi ?'
  '27':
  - type: text
    content: 'Il a répondu : La loi de Dieu dit que nous devons aimer le '
  - type: text
    content: Seigneur
  - type: text
    content: ' notre Dieu. Nous devons l’aimer totalement : l’aimer de tout notre cœur, l’aimer de toute notre '
  - type: text
    content: âme
  - type: text
    content: ', l’aimer de toute notre force et l’aimer de tout notre '
  - type: text
    content: esprit
  - type: text
    content: . Nous devons aimer aussi d’autres gens. Nous devons les aimer comme nous nous aimons nous‑mêmes.
  '28':
  - type: text
    content: 'Jésus a dit : Tu as dit la bonne réponse. Si tu fais cela, tu vas vivre tout le temps.'
  '29':
  - type: text
    content: 'Mais l’homme a voulu montrer qu’il avait raison de poser une question. Alors il a demandé : Qui sont les gens qui vivent près de moi, que je dois aimer ?'
  '3':
  - type: text
    content: 'Jésus a poursuivi en disant : Je vous envoie. Alors allez ! Mais écoutez ! Vous serez comme de jeunes brebis au milieu des animaux sauvages.'
  '30':
  - type: text
    content: 'Jésus a répondu en racontant cette histoire : Un homme descendait sur la route de Jérusalem à la ville de Jéricho. Sur le chemin, quelques hommes l’ont attaqué. Ils ont emporté tous ses vêtements et l’ont frappé avec des bâtons. Il était presque mort quand ils l’ont laissé.'
  '31':
  - type: text
    content: 'Mais à un moment, un '
  - type: text
    content: prêtre
  - type: text
    content: ' passait sur cette route. Il a vu l’homme, qui se trouvait là. Mais il est passé devant lui de l’autre côté de la route. '
  '32':
  - type: text
    content: 'Un '
  - type: text
    content: Lévite
  - type: text
    content: ' allait aussi sur la route. Il est venu à l’endroit où l’homme était couché. Il l’a vu. Mais il est aussi passé devant lui de l’autre côté de la route.'
  '33':
  - type: text
    content: 'Mais un homme de Samarie passait également le long de la route. Et il est venu à l’endroit où l’homme était couché. Quand il l’a vu, il se sentait très triste pour lui. '
  '34':
  - type: text
    content: Il est allé vers lui. Il a versé de l’huile et du vin sur les endroits où il saignait. Puis il a attaché ces endroits avec des bandages propres. Après cela, il a mis l’homme sur son propre animal. Ils sont arrivés dans un petit hôtel. Il l’a emmené et il était gentil avec lui.
  '35':
  - type: text
    content: 'Le lendemain, l’homme de Samarie a sorti 2 pièces d’argent. Il a donné l’argent à l’homme qui prenait soin de l’hôtel. Il lui a dit : Sois gentil avec cet homme pour moi. Je reviendrai. Cet argent peut ne pas suffire. Je vais te payer tout ce que tu vas dépenser de plus pour lui.'
  '36':
  - type: text
    content: 'Alors Jésus a posé cette question à l’homme qui enseignait les règles de Dieu : Les 3 hommes ont trouvé l’homme qui se trouvait sur la route. Lequel d’entre eux a montré l’amour envers lui ?'
  '37':
  - type: text
    content: 'Il a répondu : C’est l’homme qui était gentil avec lui.'
  - type: text
    content: 'Alors Jésus lui a dit : Oui, tu as raison. Donc, va et fais la même chose à d’autres personnes.'
  - type: heading
    content: Jésus rend visite à la maison de Marthe et Marie
  '38':
  - type: text
    content: 'Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' ont poursuivi leur voyage. Ils sont arrivés à un certain village. Là, une femme appelée Marthe a demandé à Jésus de venir dans sa maison. '
  '39':
  - type: text
    content: 'Cette femme avait une sœur appelée Marie. Marie s’asseyait près de Jésus. Elle écoutait les choses qu’il enseignait. '
  '4':
  - type: text
    content: Ne prenez pas l’argent ni de sac. Ne prenez pas de souliers de réserve. Lorsque vous rencontrez d’autres personnes sur la route, ne perdez pas de temps avec de longues conversations.
  '40':
  - type: text
    content: 'Marthe pensait à elle‑même : Je ne peux pas faire tout ce travail seule. Elle est donc venue auprès de Jésus.'
  - type: text
    content: 'Elle a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', ma sœur ne m’aide pas avec le travail. Elle m’a laissée le faire seule. Tu ne peux vraiment pas croire que cela est juste ! Dis‑lui qu’elle doit m’aider !'
  '41':
  - type: text
    content: 'Jésus a répondu : Marthe, tu as des problèmes dans ton '
  - type: text
    content: esprit
  - type: text
    content: ' au sujet de très nombreuses choses. '
  '42':
  - type: text
    content: Mais une seule chose est vraiment importante. Et Marie l’a choisie. Personne ne va l’enlever d’elle.
  '5':
  - type: text
    content: 'Quand vous entrez dans une maison, dites d’abord : Nous prions pour que tout soit bien avec vous ! '
  '6':
  - type: text
    content: 'Quelqu’un dans la maison peut croire à ce que vous dites. S’il le fait, ce sera bien pour lui. Mais si personne n’accepte vos paroles, reprenez‑les. '
  '7':
  - type: text
    content: 'Pendant que vous êtes dans la ville, vous devriez rester dans la même maison. Acceptez la nourriture et la boisson que les gens de la maison vous donnent. Ceci est pour le travail que vous faites. N’allez pas d’une maison à l’autre pour obtenir de la nourriture. '
  '8':
  - type: text
    content: 'Les gens peuvent vous accepter quand vous allez dans une ville. Mangez ce que ces gens vous donnent. '
  '9':
  - type: text
    content: 'Guérissez des malades dans cette ville. Donnez ce message à tous les gens là‑bas : Dieu veut régner dans votre vie maintenant. '
