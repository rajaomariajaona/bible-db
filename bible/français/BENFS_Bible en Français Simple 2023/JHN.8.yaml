  '10':
  - type: text
    content: 'Jésus s’est levé. Il lui a dit : Femme, où sont‑ils ? Il n’y a plus personne pour te punir ? '
  '11':
  - type: text
    content: 'Elle a dit : Il n’y a personne, Maître. Alors Jésus a dit : Je ne veux pas te punir non plus. Va et ne fais plus les mauvaises choses.'
  - type: heading
    content: Jésus est la lumière du monde
  '12':
  - type: text
    content: 'Jésus a encore parlé au peuple. Il a dit : Je suis la lumière du monde. Toute personne qui devient mon '
  - type: text
    content: disciple
  - type: text
    content: ' ne marchera jamais dans l’obscurité. Non, elle aura la lumière qui aide les gens à vivre. '
  '13':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' se sont mis à discuter avec lui. Ils ont dit : Tu dis des choses sur toi‑même. Mais tu es un seul homme. Donc, ce que tu dis n’est certainement pas vrai.'
  '14':
  - type: text
    content: 'Jésus a répondu : Ce que je dis, est vrai. Même si je parle en mon propre nom, mes paroles sont vraies. Je sais d’où je viens. Je sais où je vais. Mais vous ne savez pas d’où je viens. Vous ne savez pas où je vais aller. '
  '15':
  - type: text
    content: 'Vous jugez de manière humaine. Je ne '
  - type: text
    content: juge
  - type: text
    content: ' personne. '
  '16':
  - type: text
    content: 'Mais quand je '
  - type: text
    content: juge
  - type: text
    content: ', je le fais correctement. C’est parce que je ne suis pas seul. Le Père, qui m’a envoyé, est avec moi. '
  '17':
  - type: text
    content: 'Vos règles disent : Il doit y avoir 2 personnes qui sont d’accord sur quelque chose. S’il y a 2 personnes, leurs paroles sont vraies. '
  '18':
  - type: text
    content: 'Je parle en mon propre nom. Le Père qui m’a envoyé, parle de moi aussi. '
  '19':
  - type: text
    content: 'Ils lui ont dit : Où est ton Père ? Jésus a répondu : Vous ne connaissez ni moi, ni mon Père. Si vous me connaissiez, vous connaîtriez aussi mon Père. '
  '2':
  - type: text
    content: 'Tôt le lendemain matin, il est revenu au '
  - type: text
    content: Temple
  - type: text
    content: '. Tous les gens sont venus auprès de lui. Il s’est assis et il s’est mis à les enseigner. '
  '20':
  - type: text
    content: 'Jésus a dit toutes ces paroles alors qu’il enseignait dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Il était près de l’endroit où ils gardaient de l’argent. Personne ne l’a attrapé : ce n’était pas encore le bon moment pour cela.'
  - type: heading
    content: Jésus dit qu’il vient d’en haut
  '21':
  - type: text
    content: 'Jésus leur a dit de nouveau : Je vais aller et vous me chercherez. Mais vous mourez dans vos péchés. Vous ne pouvez pas aller là où je vais. '
  '22':
  - type: text
    content: 'Ainsi, les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' se sont dit ceci : Peut‑être qu’il veut dire qu’il va se tuer. Il a dit : Vous ne pouvez pas aller là où je vais. C’est peut‑être pour cela qu’il a dit cela. '
  '23':
  - type: text
    content: 'Jésus a répondu : Vous appartenez aux choses d’ici. Mais je viens d’en haut. Vous appartenez à ce monde, mais je ne suis pas de ce monde. '
  '24':
  - type: text
    content: Voilà pourquoi je vous ai dit cela. Je vous ai dit que vous allez mourir pécheurs. Vous devez croire à ce que je suis. Si vous ne croyez pas, vous allez mourir pécheurs.
  '25':
  - type: text
    content: 'Ils lui ont dit : Qui es‑tu ? Jésus a répondu : Je vous ai dit qui je suis depuis le début. Voilà qui je suis. '
  '26':
  - type: text
    content: 'J’ai beaucoup de choses à dire sur vous. Je dois juger beaucoup de choses que vous faites. Mais celui qui m’a envoyé, est vrai. Je dis au monde ce que j’ai entendu de lui. '
  '27':
  - type: text
    content: 'Ils ne comprenaient pas qu’il leur parlait du Père. '
  '28':
  - type: text
    content: 'Alors Jésus a dit : Élevez le Fils de l’homme. Alors vous saurez ce que je suis. Et vous saurez que je ne fais rien par moi‑même.'
  - type: text
    content: 'Je dis ce que le Père m’a appris à dire. '
  '29':
  - type: text
    content: 'Celui qui m’a envoyé est avec moi. Il ne m’a pas laissé seul, parce que je lui obéis toujours. Je fais toujours ce qu’il veut que je fasse. '
  '3':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et les enseignants de la loi de Dieu lui ont amené une femme. Ils l’ont trouvée avec un autre homme. Elle a couché avec un homme. Il n’était pas son mari. Ils l’ont placée devant tout le peuple là‑bas. '
  '30':
  - type: text
    content: Beaucoup de gens ont entendu ces choses. Ils ont cru en lui.
  - type: heading
    content: La vérité vous rendra libres
  '31':
  - type: text
    content: 'Alors Jésus a dit aux '
  - type: text
    content: Juifs
  - type: text
    content: ' qui avaient cru en lui. Il a dit : Continuez à obéir aux paroles que je vous ai dites. Si vous continuez à le faire, vous êtes vraiment mes '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Et vous saurez la vérité. Et la vérité vous rendra libres. '
  '33':
  - type: text
    content: 'Ils lui ont répondu : Nous sommes les descenbdants d’Abraham. Nous n’avons jamais été esclaves de personne. Mais tu nous dis : Vous deviendrez libres. Que veux‑tu dire ?'
  '34':
  - type: text
    content: 'Jésus leur a répondu : Je vous dis la vérité. Tout le monde qui fait de mauvaises choses est esclave du péché. '
  '35':
  - type: text
    content: 'Un esclave ne fait pas partie d’une famille pour toujours. Mais un fils appartient à la famille pour toujours. '
  '36':
  - type: text
    content: 'Ainsi, si le Fils vous libère, vous serez vraiment libres. '
  '37':
  - type: text
    content: 'Je sais que vous êtes des descendants d’Abraham. Mais vous essayez de me tuer, parce que mes paroles ne sont pas en vous. '
  '38':
  - type: text
    content: 'Je parle de ce que mon Père m’a montré. Mais vous faites ce que vous avez entendu de votre père. '
  '39':
  - type: text
    content: 'Ils ont répondu : Abraham est notre père ! Jésus a répondu : Si vous étiez vraiment les enfants d’Abraham, vous seriez comme lui. Vous feriez les mêmes choses qu’il a faites.'
  '4':
  - type: text
    content: 'Ils ont dit à Jésus : Maître, nous avons trouvé cette femme. Elle a couché avec un homme. Il n’était pas son mari.'
  '40':
  - type: text
    content: 'Je vous ai dit des choses vraies. Je les ai entendues de Dieu. Mais vous voulez me tuer. Abraham n’a pas fait une telle chose. '
  '41':
  - type: text
    content: 'Vous faites les mêmes choses que votre père. Ils lui ont dit : Dieu lui‑même est notre seul Père, et nous sommes ses propres enfants !'
  '42':
  - type: text
    content: 'Jésus leur a dit : Si Dieu était vraiment votre Père, vous alliez m’aimer. Je suis venu de Dieu et maintenant je suis ici. Je ne suis pas venu de moi‑même. Non, mais Dieu m’a envoyé. '
  '43':
  - type: text
    content: 'Pourquoi ne comprenez‑vous pas ce que je dis ? C’est que vous ne pouvez pas vraiment entendre mon message. '
  '44':
  - type: text
    content: 'Vous êtes les enfants de votre père, le '
  - type: text
    content: diable
  - type: text
    content: '. Et vous voulez faire les choses qu’il veut. Dès le début, il était quelqu’un qui a tué des gens. Il n’a pas continué avec la vérité. Il n’y a rien de vrai en lui. Il dit des choses qui ne sont pas vraies. Et puis il montre ce qu’il est lui‑même. Il est le père de tout ce qui est faux. '
  '45':
  - type: text
    content: 'Mais je vous dis la vérité. Et voilà pourquoi vous ne me croyez pas. '
  '46':
  - type: text
    content: 'Aucun de vous ne peut montrer que je lui ai fait quelque chose de mal. Vous devez me croire, parce que je vous dis des choses vraies. '
  '47':
  - type: text
    content: Quelqu’un qui est de Dieu, écoute les paroles de Dieu. Mais vous n’êtes pas de Dieu. Voilà pourquoi vous n’écoutez pas.
  '48':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' lui ont répondu : Ce que nous disons sur toi convient ! Tu es de Samarie et tu as un démon en toi ! '
  '49':
  - type: text
    content: 'Jésus leur a répondu : Il n’y a aucun démon en moi. Mais je veux que les gens sachent ceci : mon Père est grand et bon. Et vous voulez que les gens pensent de mauvaises choses sur moi. '
  '5':
  - type: text
    content: 'Dans la loi, Moïse nous dit que nous devrions tuer avec des pierres ce genre de femme. Que dis‑tu à ce sujet ? '
  '50':
  - type: text
    content: 'Je n’aime pas que les gens pensent de grandes choses sur moi. Il y a quelqu’un qui veut que les gens pensent de grandes choses sur moi. Et il est celui qui '
  - type: text
    content: juge
  - type: text
    content: ' correctement sur moi.'
  '51':
  - type: text
    content: 'Je vous dis la vérité. Si quelqu’un obéit à mes paroles, il ne mourra jamais. '
  '52':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' criaient : Maintenant, nous savons qu’un démon vit en toi ! Abraham et tous les '
  - type: text
    content: prophètes
  - type: text
    content: ' sont morts. Mais tu dis : Quiconque obéit à mes paroles ne mourra jamais ! '
  '53':
  - type: text
    content: 'Tu n’es pas plus grand que notre père Abraham, qui est mort ! Tu n’es pas plus grand que tous les '
  - type: text
    content: prophètes
  - type: text
    content: '. Ils sont morts ! Qui es‑tu selon toi‑même ? '
  '54':
  - type: text
    content: 'Jésus a répondu : Si je voulais que les gens pensent de grandes choses sur moi, cela n’est rien. Mais c’est mon Père qui veut cela. Et vous dites qu’il est votre Dieu. '
  '55':
  - type: text
    content: 'Vous ne l’avez jamais connu, mais je le connais. Je pourrais dire : Je ne le connais pas. Mais alors j’allais dire quelque chose qui n’est pas vrai. Donc, j’allais être comme vous. Mais je le connais, et j’obéis à ses paroles. '
  '56':
  - type: text
    content: Abraham, votre père, savait que j’allais venir. Il savait qu’il allait voir ce moment. Il savait qu’il sera très heureux. Alors il a vu ce temps, et il était très heureux.
  '57':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont dit : Tu n’as pas encore 50 ans. Mais tu dis que tu as déjà vu Abraham ! '
  '58':
  - type: text
    content: 'Jésus a dit : Je vous dis la vérité. Avant la naissance d’Abraham, j’étais là. '
  '59':
  - type: text
    content: 'Alors ils ont ramassé des pierres pour les jeter sur lui. Mais Jésus s’est caché, et il est sorti du '
  - type: text
    content: Temple
  - type: text
    content: .
  '6':
  - type: text
    content: Ils ont posé cette question pour une raison. Ils voulaient que Jésus dise quelque chose contre cette femme. Mais Jésus s’est penché. Il a commencé à écrire sur le sol avec son doigt.
  '7':
  - type: text
    content: 'Ils ont continué à lui poser des questions. Puis il s’est levé. Il leur a dit : Si l’un d’entre vous n’a jamais rien fait de mal, il peut jeter la première pierre sur cette femme. '
  '8':
  - type: text
    content: 'Jésus s’est penché de nouveau et il écrivait sur la terre. '
  '9':
  - type: text
    content: 'Les gens ont entendu cela. Ils ont commencé à quitter. Ils quittaient l’un après l’autre. Les plus âgés sont allés d’abord. Alors Jésus était seul avec la femme. Elle était toujours là. '
