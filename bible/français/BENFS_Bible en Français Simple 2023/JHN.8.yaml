document_id: JHN.8
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 8
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La femme surprise avec un homme qui n’était pas son mari
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mais Jésus est allé à la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tôt le lendemain matin, il est revenu au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Tous les gens sont venus auprès de lui. Il s’est assis et il s’est mis à les enseigner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et les enseignants de la loi de Dieu lui ont amené une femme. Ils l’ont trouvée avec un autre homme. Elle a couché avec un homme. Il n’était pas son mari. Ils l’ont placée devant tout le peuple là‑bas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils ont dit à Jésus : Maître, nous avons trouvé cette femme. Elle a couché avec un homme. Il n’était pas son mari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dans la loi, Moïse nous dit que nous devrions tuer avec des pierres ce genre de femme. Que dis‑tu à ce sujet ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils ont posé cette question pour une raison. Ils voulaient que Jésus dise quelque chose contre cette femme. Mais Jésus s’est penché. Il a commencé à écrire sur le sol avec son doigt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils ont continué à lui poser des questions. Puis il s’est levé. Il leur a dit : Si l’un d’entre vous n’a jamais rien fait de mal, il peut jeter la première pierre sur cette femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus s’est penché de nouveau et il écrivait sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les gens ont entendu cela. Ils ont commencé à quitter. Ils quittaient l’un après l’autre. Les plus âgés sont allés d’abord. Alors Jésus était seul avec la femme. Elle était toujours là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus s’est levé. Il lui a dit : Femme, où sont‑ils ? Il n’y a plus personne pour te punir ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle a dit : Il n’y a personne, Maître. Alors Jésus a dit : Je ne veux pas te punir non plus. Va et ne fais plus les mauvaises choses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est la lumière du monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus a encore parlé au peuple. Il a dit : Je suis la lumière du monde. Toute personne qui devient mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' ne marchera jamais dans l’obscurité. Non, elle aura la lumière qui aide les gens à vivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' se sont mis à discuter avec lui. Ils ont dit : Tu dis des choses sur toi‑même. Mais tu es un seul homme. Donc, ce que tu dis n’est certainement pas vrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus a répondu : Ce que je dis, est vrai. Même si je parle en mon propre nom, mes paroles sont vraies. Je sais d’où je viens. Je sais où je vais. Mais vous ne savez pas d’où je viens. Vous ne savez pas où je vais aller. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous jugez de manière humaine. Je ne '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais quand je '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ', je le fais correctement. C’est parce que je ne suis pas seul. Le Père, qui m’a envoyé, est avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vos règles disent : Il doit y avoir 2 personnes qui sont d’accord sur quelque chose. S’il y a 2 personnes, leurs paroles sont vraies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je parle en mon propre nom. Le Père qui m’a envoyé, parle de moi aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils lui ont dit : Où est ton Père ? Jésus a répondu : Vous ne connaissez ni moi, ni mon Père. Si vous me connaissiez, vous connaîtriez aussi mon Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus a dit toutes ces paroles alors qu’il enseignait dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Il était près de l’endroit où ils gardaient de l’argent. Personne ne l’a attrapé : ce n’était pas encore le bon moment pour cela.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus dit qu’il vient d’en haut
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus leur a dit de nouveau : Je vais aller et vous me chercherez. Mais vous mourez dans vos péchés. Vous ne pouvez pas aller là où je vais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ainsi, les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' se sont dit ceci : Peut‑être qu’il veut dire qu’il va se tuer. Il a dit : Vous ne pouvez pas aller là où je vais. C’est peut‑être pour cela qu’il a dit cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus a répondu : Vous appartenez aux choses d’ici. Mais je viens d’en haut. Vous appartenez à ce monde, mais je ne suis pas de ce monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voilà pourquoi je vous ai dit cela. Je vous ai dit que vous allez mourir pécheurs. Vous devez croire à ce que je suis. Si vous ne croyez pas, vous allez mourir pécheurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils lui ont dit : Qui es‑tu ? Jésus a répondu : Je vous ai dit qui je suis depuis le début. Voilà qui je suis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'J’ai beaucoup de choses à dire sur vous. Je dois juger beaucoup de choses que vous faites. Mais celui qui m’a envoyé, est vrai. Je dis au monde ce que j’ai entendu de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils ne comprenaient pas qu’il leur parlait du Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Jésus a dit : Élevez le Fils de l’homme. Alors vous saurez ce que je suis. Et vous saurez que je ne fais rien par moi‑même.'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Je dis ce que le Père m’a appris à dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Celui qui m’a envoyé est avec moi. Il ne m’a pas laissé seul, parce que je lui obéis toujours. Je fais toujours ce qu’il veut que je fasse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Beaucoup de gens ont entendu ces choses. Ils ont cru en lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vérité vous rendra libres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus a dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui avaient cru en lui. Il a dit : Continuez à obéir aux paroles que je vous ai dites. Si vous continuez à le faire, vous êtes vraiment mes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et vous saurez la vérité. Et la vérité vous rendra libres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils lui ont répondu : Nous sommes les descenbdants d’Abraham. Nous n’avons jamais été esclaves de personne. Mais tu nous dis : Vous deviendrez libres. Que veux‑tu dire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur a répondu : Je vous dis la vérité. Tout le monde qui fait de mauvaises choses est esclave du péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Un esclave ne fait pas partie d’une famille pour toujours. Mais un fils appartient à la famille pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ainsi, si le Fils vous libère, vous serez vraiment libres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Je sais que vous êtes des descendants d’Abraham. Mais vous essayez de me tuer, parce que mes paroles ne sont pas en vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Je parle de ce que mon Père m’a montré. Mais vous faites ce que vous avez entendu de votre père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ils ont répondu : Abraham est notre père ! Jésus a répondu : Si vous étiez vraiment les enfants d’Abraham, vous seriez comme lui. Vous feriez les mêmes choses qu’il a faites.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Je vous ai dit des choses vraies. Je les ai entendues de Dieu. Mais vous voulez me tuer. Abraham n’a pas fait une telle chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vous faites les mêmes choses que votre père. Ils lui ont dit : Dieu lui‑même est notre seul Père, et nous sommes ses propres enfants !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus leur a dit : Si Dieu était vraiment votre Père, vous alliez m’aimer. Je suis venu de Dieu et maintenant je suis ici. Je ne suis pas venu de moi‑même. Non, mais Dieu m’a envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Pourquoi ne comprenez‑vous pas ce que je dis ? C’est que vous ne pouvez pas vraiment entendre mon message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Vous êtes les enfants de votre père, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: '. Et vous voulez faire les choses qu’il veut. Dès le début, il était quelqu’un qui a tué des gens. Il n’a pas continué avec la vérité. Il n’y a rien de vrai en lui. Il dit des choses qui ne sont pas vraies. Et puis il montre ce qu’il est lui‑même. Il est le père de tout ce qui est faux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Mais je vous dis la vérité. Et voilà pourquoi vous ne me croyez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Aucun de vous ne peut montrer que je lui ai fait quelque chose de mal. Vous devez me croire, parce que je vous dis des choses vraies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Quelqu’un qui est de Dieu, écoute les paroles de Dieu. Mais vous n’êtes pas de Dieu. Voilà pourquoi vous n’écoutez pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' lui ont répondu : Ce que nous disons sur toi convient ! Tu es de Samarie et tu as un démon en toi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jésus leur a répondu : Il n’y a aucun démon en moi. Mais je veux que les gens sachent ceci : mon Père est grand et bon. Et vous voulez que les gens pensent de mauvaises choses sur moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Je n’aime pas que les gens pensent de grandes choses sur moi. Il y a quelqu’un qui veut que les gens pensent de grandes choses sur moi. Et il est celui qui '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' correctement sur moi.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Je vous dis la vérité. Si quelqu’un obéit à mes paroles, il ne mourra jamais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' criaient : Maintenant, nous savons qu’un démon vit en toi ! Abraham et tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' sont morts. Mais tu dis : Quiconque obéit à mes paroles ne mourra jamais ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Tu n’es pas plus grand que notre père Abraham, qui est mort ! Tu n’es pas plus grand que tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. Ils sont morts ! Qui es‑tu selon toi‑même ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Jésus a répondu : Si je voulais que les gens pensent de grandes choses sur moi, cela n’est rien. Mais c’est mon Père qui veut cela. Et vous dites qu’il est votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Vous ne l’avez jamais connu, mais je le connais. Je pourrais dire : Je ne le connais pas. Mais alors j’allais dire quelque chose qui n’est pas vrai. Donc, j’allais être comme vous. Mais je le connais, et j’obéis à ses paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Abraham, votre père, savait que j’allais venir. Il savait qu’il allait voir ce moment. Il savait qu’il sera très heureux. Alors il a vu ce temps, et il était très heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont dit : Tu n’as pas encore 50 ans. Mais tu dis que tu as déjà vu Abraham ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Jésus a dit : Je vous dis la vérité. Avant la naissance d’Abraham, j’étais là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Alors ils ont ramassé des pierres pour les jeter sur lui. Mais Jésus s’est caché, et il est sorti du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: .
