document_id: MAT.14,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 14
  - type: heading
    content: Hérode fait tuer Jean‑Baptiste
  - type: text
    content: A ce moment‑là, le roi Hérode a entendu parler de Jésus.
  '10':
  - type: text
    content: 'Il a immédiatement dit à un soldat : Coupe la tête de Jean et amène‑la ici. Alors, le soldat est allé à la prison et il a coupé la tête de Jean. '
  '11':
  - type: text
    content: 'Puis il l’a amenée sur un plat et il l’a donnée à la jeune fille. Puis elle l’a donnée à sa mère. '
  '12':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jean ont entendu la nouvelle que Jean est mort. Donc, ils sont allés à la prison et ils ont pris son corps. Et puis ils l’ont enterré. Après cela, ils sont allés voir Jésus. Et ils lui ont dit ce qui était arrivé.'
  - type: heading
    content: Jésus donne la nourriture à 5 000 hommes et leurs familles
  '13':
  - type: text
    content: Jésus a entendu parler de ce qui était arrivé à Jean. Après cela, il a quitté cet endroit dans un petit bateau. Il est allé à un endroit calme. Mais beaucoup de gens ont entendu là où Jésus est allé. Donc, ils ont quitté leurs villes et ils suivaient Jésus. Ils sont allés à pied à l’endroit où Jésus se trouvait.
  '14':
  - type: text
    content: 'Jésus est sorti du petit bateau sur le  '
  - type: text
    content: rivage
  - type: text
    content: . Il a vu beaucoup de gens là‑bas. Il les a aimés et il s’est senti triste pour eux. Il a vu qu’il y avait des gens malades dans la foule. Donc, il les guérissait.
  '15':
  - type: text
    content: 'Quand il était presque le soir, les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont venus lui parler. Ils lui ont dit : Nous sommes dans un endroit où il n’y a pas de maisons. Et il sera bientôt sombre. Alors dis aux gens de partir maintenant. Ils pourront aller dans les villages près d’ici. Là, ils pourront acheter de la nourriture pour eux‑mêmes à manger.'
  '16':
  - type: text
    content: 'Jésus a répondu : Les gens ne doivent pas partir. Donnez‑leur un peu de nourriture à manger. '
  '17':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont alors dit à Jésus : Mais nous avons seulement 5 pains et 2 poissons. '
  '18':
  - type: text
    content: 'Jésus a dit : Apportez les pains et les poissons ici à moi. '
  '19':
  - type: text
    content: 'Alors Jésus a demandé aux gens de s’asseoir sur l’herbe. Jésus a reçu les 5 pains et 2 poissons de ses  '
  - type: text
    content: disciples
  - type: text
    content: '. Il a levé les yeux vers le  '
  - type: text
    content: ciel
  - type: text
    content: ' et il a remercié Dieu. Puis il a coupé les pains. Et il les a donnés à ses  '
  - type: text
    content: disciples
  - type: text
    content: ' pour distribuer à la foule.'
  '2':
  - type: text
    content: 'Hérode a dit à ses hommes : Cet homme Jésus est vraiment Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: . Jean était mort, mais il est devenu de nouveau vivant. C’est pourquoi il fait tous ces miracles.
  '20':
  - type: text
    content: 'Tous les gens ont mangé. Et ils ont tous eu assez. Alors les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont ramassé toute la nourriture que les gens ont laissée. Et ils ont rempli 12 paniers avec les morceaux restants. '
  '21':
  - type: text
    content: Environ 5 000 hommes ont mangé. Les femmes et les enfants ont aussi mangé avec eux.
  - type: heading
    content: Jésus marche sur l’eau
  '22':
  - type: text
    content: 'Immédiatement après cela, Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Venez dans le petit bateau. Allez avant moi de l’autre côté de la mer. '
  '23':
  - type: text
    content: 'Puis il a fait partir les gens. Après leur départ, il est monté sur une colline pour prier seul. Et il était toujours là seul quand il est devenu sombre. '
  '24':
  - type: text
    content: Maintenant, le petit bateau était au milieu de la mer. Le vent soufflait contre le petit bateau. L’eau frappait contre le petit bateau.
  '25':
  - type: text
    content: 'Vers la fin de la nuit, Jésus marchait sur les eaux. Il allait vers ses  '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Et les  '
  - type: text
    content: disciples
  - type: text
    content: ' le voyaient marcher sur les eaux. Ils avaient très peur. Ils disaient : C’est un  '
  - type: text
    content: esprit
  - type: text
    content: . Et ils criaient fortement parce qu’ils avaient peur.
  '27':
  - type: text
    content: 'Mais aussitôt Jésus leur a dit : Soyez courageux ! N’ayez pas peur ! Il leur a dit : C’est moi, Jésus. '
  '28':
  - type: text
    content: 'Pierre a répondu : '
  - type: text
    content: Seigneur
  - type: text
    content: ', es‑tu vraiment Jésus ? Dis‑moi alors : Viens ici ! Marche sur les eaux. '
  '29':
  - type: text
    content: 'Jésus a dit : Viens à moi. Alors Pierre est sorti du petit bateau. Il marchait sur les eaux et il allait vers Jésus. '
  '3':
  - type: text
    content: 'Hérode lui‑même avait dit à un soldat : Arrête Jean. Lie‑le et mets‑le en prison. Hérode avait fait cela à cause de sa femme Hérodias. Avant qu’Hérode l’épouse, elle était la femme de Philippe, frère d’Hérode. '
  '30':
  - type: text
    content: 'Mais Pierre a vu que le vent était fort. Il a eu peur. Alors il a commencé à descendre dans les eaux. Il a crié à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', sauve‑moi !'
  '31':
  - type: text
    content: 'Aussitôt Jésus a étendu la main, et il a saisi Pierre. Il a dit à Pierre : Pourquoi ne crois‑tu pas vraiment en moi ?'
  '32':
  - type: text
    content: 'Jésus et Pierre sont alors montés dans le petit bateau. A ce temps‑là, le vent fort a arrêté de souffler. '
  '33':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' étaient dans le petit bateau. Ils se sont mis à genoux devant Jésus. Ils disaient : C’est vrai. Tu es la personne que Dieu appelle son fils.'
  '34':
  - type: text
    content: Ils sont allés de l’autre coté de la mer. Ils étaient à bord du petit bateau. Ils sont arrivés au bord de la mer. Ils sont arrivés dans la partie du pays appelé Génésareth.
  '35':
  - type: text
    content: 'Les gens qui vivaient là ont reconnu Jésus. Ils ont donc envoyé un message sur Jésus à tous les environs. Alors les gens ont amené tous les malades auprès de Jésus. '
  '36':
  - type: text
    content: Ils ont demandé à Jésus que les malades touchent le bord de son vêtement. Et tous ceux qui le touchaient, guérissaient.
  '4':
  - type: text
    content: 'Hérode l’avait épousée. Alors Jean lui avait dit : Hérodias était la femme de ton frère. Donc, tu avais mal fait de l’épouser.'
  '5':
  - type: text
    content: 'Hérode voulait dire à ses soldats de tuer Jean. Mais les gens pensaient que Jean était un  '
  - type: text
    content: prophète
  - type: text
    content: '. Alors Hérode avait peur de le tuer. '
  '6':
  - type: text
    content: 'Le jour de l’anniversaire d’Hérode est arrivé. Alors la fille d’Hérodias a dansé devant Hérode et ses visiteurs. Sa danse a donné beaucoup de joie à Hérode. '
  '7':
  - type: text
    content: 'Hérode a dit : Demande‑moi tout ce que tu veux, et je vais te le donner. Dieu m’écoute dire cela. '
  '8':
  - type: text
    content: 'Hérodias a dit à sa fille : Demande à Hérode de te donner la tête de Jean. Donc, sa fille a demandé à Hérode de lui donner la tête de Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' sur un plat. '
  '9':
  - type: text
    content: 'Alors Hérode était triste, mais il a promis cela devant ses invités. Donc, il ne pouvait pas refuser. '
