document_id: MAT.14
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 14
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hérode fait tuer Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A ce moment‑là, le roi Hérode a entendu parler de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hérode a dit à ses hommes : Cet homme Jésus est vraiment Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: . Jean était mort, mais il est devenu de nouveau vivant. C’est pourquoi il fait tous ces miracles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hérode lui‑même avait dit à un soldat : Arrête Jean. Lie‑le et mets‑le en prison. Hérode avait fait cela à cause de sa femme Hérodias. Avant qu’Hérode l’épouse, elle était la femme de Philippe, frère d’Hérode. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hérode l’avait épousée. Alors Jean lui avait dit : Hérodias était la femme de ton frère. Donc, tu avais mal fait de l’épouser.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hérode voulait dire à ses soldats de tuer Jean. Mais les gens pensaient que Jean était un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. Alors Hérode avait peur de le tuer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le jour de l’anniversaire d’Hérode est arrivé. Alors la fille d’Hérodias a dansé devant Hérode et ses visiteurs. Sa danse a donné beaucoup de joie à Hérode. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hérode a dit : Demande‑moi tout ce que tu veux, et je vais te le donner. Dieu m’écoute dire cela. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hérodias a dit à sa fille : Demande à Hérode de te donner la tête de Jean. Donc, sa fille a demandé à Hérode de lui donner la tête de Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' sur un plat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Hérode était triste, mais il a promis cela devant ses invités. Donc, il ne pouvait pas refuser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il a immédiatement dit à un soldat : Coupe la tête de Jean et amène‑la ici. Alors, le soldat est allé à la prison et il a coupé la tête de Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis il l’a amenée sur un plat et il l’a donnée à la jeune fille. Puis elle l’a donnée à sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jean ont entendu la nouvelle que Jean est mort. Donc, ils sont allés à la prison et ils ont pris son corps. Et puis ils l’ont enterré. Après cela, ils sont allés voir Jésus. Et ils lui ont dit ce qui était arrivé.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus donne la nourriture à 5 000 hommes et leurs familles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jésus a entendu parler de ce qui était arrivé à Jean. Après cela, il a quitté cet endroit dans un petit bateau. Il est allé à un endroit calme. Mais beaucoup de gens ont entendu là où Jésus est allé. Donc, ils ont quitté leurs villes et ils suivaient Jésus. Ils sont allés à pied à l’endroit où Jésus se trouvait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus est sorti du petit bateau sur le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rivage
  - type: text
    text: . Il a vu beaucoup de gens là‑bas. Il les a aimés et il s’est senti triste pour eux. Il a vu qu’il y avait des gens malades dans la foule. Donc, il les guérissait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand il était presque le soir, les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus sont venus lui parler. Ils lui ont dit : Nous sommes dans un endroit où il n’y a pas de maisons. Et il sera bientôt sombre. Alors dis aux gens de partir maintenant. Ils pourront aller dans les villages près d’ici. Là, ils pourront acheter de la nourriture pour eux‑mêmes à manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus a répondu : Les gens ne doivent pas partir. Donnez‑leur un peu de nourriture à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont alors dit à Jésus : Mais nous avons seulement 5 pains et 2 poissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus a dit : Apportez les pains et les poissons ici à moi. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors Jésus a demandé aux gens de s’asseoir sur l’herbe. Jésus a reçu les 5 pains et 2 poissons de ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il a levé les yeux vers le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et il a remercié Dieu. Puis il a coupé les pains. Et il les a donnés à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' pour distribuer à la foule.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tous les gens ont mangé. Et ils ont tous eu assez. Alors les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont ramassé toute la nourriture que les gens ont laissée. Et ils ont rempli 12 paniers avec les morceaux restants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Environ 5 000 hommes ont mangé. Les femmes et les enfants ont aussi mangé avec eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur l’eau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Immédiatement après cela, Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Venez dans le petit bateau. Allez avant moi de l’autre côté de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Puis il a fait partir les gens. Après leur départ, il est monté sur une colline pour prier seul. Et il était toujours là seul quand il est devenu sombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Maintenant, le petit bateau était au milieu de la mer. Le vent soufflait contre le petit bateau. L’eau frappait contre le petit bateau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vers la fin de la nuit, Jésus marchait sur les eaux. Il allait vers ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' le voyaient marcher sur les eaux. Ils avaient très peur. Ils disaient : C’est un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Et ils criaient fortement parce qu’ils avaient peur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais aussitôt Jésus leur a dit : Soyez courageux ! N’ayez pas peur ! Il leur a dit : C’est moi, Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pierre a répondu : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', es‑tu vraiment Jésus ? Dis‑moi alors : Viens ici ! Marche sur les eaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus a dit : Viens à moi. Alors Pierre est sorti du petit bateau. Il marchait sur les eaux et il allait vers Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais Pierre a vu que le vent était fort. Il a eu peur. Alors il a commencé à descendre dans les eaux. Il a crié à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', sauve‑moi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aussitôt Jésus a étendu la main, et il a saisi Pierre. Il a dit à Pierre : Pourquoi ne crois‑tu pas vraiment en moi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus et Pierre sont alors montés dans le petit bateau. A ce temps‑là, le vent fort a arrêté de souffler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' étaient dans le petit bateau. Ils se sont mis à genoux devant Jésus. Ils disaient : C’est vrai. Tu es la personne que Dieu appelle son fils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ils sont allés de l’autre coté de la mer. Ils étaient à bord du petit bateau. Ils sont arrivés au bord de la mer. Ils sont arrivés dans la partie du pays appelé Génésareth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les gens qui vivaient là ont reconnu Jésus. Ils ont donc envoyé un message sur Jésus à tous les environs. Alors les gens ont amené tous les malades auprès de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ils ont demandé à Jésus que les malades touchent le bord de son vêtement. Et tous ceux qui le touchaient, guérissaient.
