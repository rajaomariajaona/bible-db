document_id: 2CO.11,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 11
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul parle de faux enseignants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soyez patients avec moi ! Je vais parler comme un fou. Je sais que vous êtes déjà patients avec moi ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le message que je dis sur Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est vrai. Je continuerai donc d’être fier de la façon dont j’ai vécu parmi vous. Personne dans toute la région d’Achaïe ne peut m’empêcher de faire cela. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous ne devez pas penser que je dis cela, parce que je ne vous aime pas. Dieu lui‑même sait que je vous aime.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, je continuerai à travailler parmi vous comme je le fais déjà. Je ne prendrai aucun salaire de votre part. Les autres enseignants n’auront alors aucune occasion de se glorifier eux‑mêmes. Ils ne pourront pas dire qu’ils travaillent de la même manière que nous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces gens sont de faux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: . Ils ne travaillent pas de manière honnête. Ils essaient de faire croire aux gens que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' les a envoyés comme ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela ne devra pas vous surprendre ! Même Satan peut se changer pour ressembler à un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui appartient à la lumière. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne soyez donc pas surpris lorsque les serviteurs de Satan font la même chose. Ils peuvent également sembler servir Dieu. Ils peuvent sembler faire de bonnes choses, mais ce qu’ils font est vraiment mauvais. Alors Dieu les punira à la fin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul parle de son propre travail
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je le redis : Personne ne doit penser que je suis un imbécile. Mais même si vous pensez à cela, écoutez‑moi quand même. Donnez‑moi une occasion de me glorifier un peu, comme le ferait un fou. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand je dis de bonnes choses sur moi comme ceci, ce n’est pas ainsi que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parlera. Non, ce sont les paroles d’un imbécile. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais beaucoup d’autres personnes utilisent les idées humaines pour se vanter. Donc, je vais aussi le faire.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous pensez que vous êtes très sages ! Donc, vous êtes heureux d’écouter les imbéciles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu veut vous garder pour lui. Et c’est ce que je veux aussi. Je vous ai amenés à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', comme une vierge qui épouse un mari. Je veux que vous soyez purs et que vous n’apparteniez qu’à lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous acceptez les gens qui font de vous comme leurs esclaves. Vous acceptez les gens qui vous trompent ou vous prennent des choses. Vous acceptez des gens orgueilleux. Même si quelqu’un vous frappe au visage, vous l’acceptez toujours. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais nous n’avons pas été assez courageux pour vous faire des choses pareilles. Dois‑je en avoir honte ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais d’autres personnes ont le courage de se vanter. Je serai donc également fier des mêmes choses. (Maintenant je parle comme un fou !) '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sont‑ils fiers d’être des Hébreux ? Moi aussi. Appartiennent‑ils au peuple d’Israël ? Moi aussi. Sont‑ils des descendants de la famille d’Abraham ? Moi aussi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sont‑ils des serviteurs de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '  ? Je le sers encore mieux qu’eux ! (Maintenant je parle comme un fou.) Je travaille beaucoup plus qu’eux. J’ai été en prison plus souvent qu’eux. Les gens m’ont frappé avec des fouets très souvent. J’étais près de mourir plusieurs fois.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À 5 moments différents, les dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' m’ont puni avec des fouets. Chaque fois, ils m’ont frappé 39 fois. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Romains
    - type: text
      text: ' m’ont puni 3 fois avec des bâtons. Les gens m’ont jeté des pierres pour me tuer une fois. 3 fois, j’ai été sur des navires qui se sont brisés en mer. Une fois, j’étais dans la mer jour et nuit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai voyagé plusieurs fois. J’ai été en danger à cause des fleuves et aussi des voleurs. J’ai été en danger par mon propre peuple et aussi des païens ? J’ai été en danger dans les villes et aussi dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. J’ai été en danger sur la mer. J’ai été en danger de faux croyants. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai travaillé très dur et j’ai souffert. Plusieurs fois, je n’ai pas dormi. J’avais souvent faim et soif. Plusieurs fois, je n’ai pas mangé. J’avais souvent froid et sans assez de vêtements.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ces problèmes me sont arrivés. Mais aussi, chaque jour, j’ai des problèmes dans ma tête. Je m’inquiète pour les croyants de toutes les Églises. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand l’un de ces croyants est faible, je me sens aussi faible. Quand quelque chose fait que l’un d’eux fasse quelque chose de mal, alors je suis très troublé.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rappelez‑vous comment le serpent a trompé Ève. Parce qu’il était intelligent, elle a cru à ses mensonges. Je crains que la même chose ne vous arrive. Les faux enseignants peuvent vous faire croire à de mauvaises choses. Alors vous n’aimerez plus Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' d’une manière pure et honnête. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si je dois me vanter, je me vanterai seulement des choses qui montrent ma faiblesse. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne dis pas de mensonges. Dieu, le Père du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus, le sait. Il est celui que nous devons glorifier pour toujours. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand j’étais à Damas, le chef de cette ville a envoyé des soldats pour m’attraper. Il était sous le pouvoir du roi Arétas. Les soldats regardaient attentivement à l’extérieur de la ville. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais mes amis m’ont mis dans un panier au bout d’une corde. Ils m’ont fait sortir par une fenêtre le long du mur de la ville. Ils m’ont alors laissé tomber par terre. C’est ainsi que je me suis éloigné du chef de la ville.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes prêts à écouter tous les faux enseignants qui viennent à vous. Ils pourraient vous parler d’un Jésus différent de Jésus dont nous vous avons parlé. Ils pourraient vouloir que vous receviez un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' différent de l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' que vous avez reçu de nous. Ils pourraient vous dire une Bonne Nouvelle différente de ce que vous avez entendue de notre part. Vous semblez accepter tout cela !'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces enseignants se disent des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' très spéciaux. Mais je pense que je suis aussi spécial qu’eux ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peut‑être que je ne parle pas aussi bien qu’ils parlent. Mais je sais de quoi je parle. Nous vous l’avons toujours expliqué très clairement dans tout ce que nous faisons.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand je vous ai annoncé la Bonne Nouvelle de Dieu, je ne vous ai jamais demandé de me payer quoi que ce soit. Je me suis rendu moins important pour que vous puissiez être plus importants. Je ne pense pas avoir eu tort de le faire.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les croyants d’autres Églises m’ont donné de l’argent pour que je puisse vous servir. C’est comme si je le volais pour que je puisse vous aider. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand j’étais là avec vous, je ne voulais jamais l’aide de personne. Même quand j’avais besoin de quelque chose, je n’ai causé de problèmes à personne. Au lieu de cela, les croyants venus de Macédoine m’ont donné tout ce dont j’avais besoin. Je faisais très attention à ne jamais vous causer de problèmes. Et je continuerai d’être prudent comme cela. '
