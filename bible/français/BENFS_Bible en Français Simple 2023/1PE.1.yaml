document_id: 1PE.1,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 1
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Dieu nous a donné une nouvelle vie à cause de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est moi Pierre qui écris cette lettre. Je suis '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: ' de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous écris, vous le peuple de Dieu qu’il a choisi. Vous vivez maintenant dans de nombreux endroits différents, dans les régions appelées Pont, Galatie, Cappadoce, Asie et Bithynie. Vous vivez dans ces lieux comme des étrangers, parce que vous vivez loin de vos vraies maisons. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a longtemps, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' de Dieu en avaient parlé. Ils avaient déjà dit que Dieu sera très gentil avec vous. Ils voulaient savoir comment Dieu sauvera les gens. Ils ont étudié attentivement pour trouver les réponses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a aidé ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' à comprendre les événements futurs. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' leur montrait que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ' spécial de Dieu aura beaucoup de douleur. Ensuite, après ce problème, Dieu fera arriver de grandes choses. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' voulaient savoir qui sera ce '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: '. Ils voulaient savoir quand il viendra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a montré à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' que ses messages sur ces choses ne les aideront pas. Par contre, Dieu a envoyé son message aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' pour vous aider. Ce message est la Bonne Nouvelle de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' que vous avez maintenant entendue. Dieu a envoyé son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' pour aider les gens à vous annoncer la Bonne Nouvelle. Même les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' aiment mieux comprendre ces choses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chrétiens doivent faire ce qui est bon
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors maintenant, préparez vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ', afin que vous soyez prêts à bien vivre. Pensez clairement à la façon dont Dieu vous aide. Rappelez‑vous toujours que Dieu sera très gentil avec vous lorsque Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' reviendra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Obéissez à Dieu, comme de bons enfants qui obéissent à leur père. Avant de connaître le vrai message sur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', vous vouliez vraiment faire de mauvaises choses. Mais maintenant, vous ne devez pas accepter de vivre de cette mauvaise façon. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu vous a choisis pour être son propre peuple. Il est complètement bon. Donc, vous devez aussi être complètement bons dans votre façon de vivre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la Bible, Dieu a dit ceci : Vous devez être complètement bons, parce que je suis complètement bon.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu sait ce que chacun a fait et il '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' chacun de cette manière. Il est toujours juste quand il décide sur des gens. Il ne fait pas d’injustice entre les gens. Lorsque vous priez Dieu, vous l’appelez Père. Alors, respectez‑le toujours pendant que vous vivez comme des étrangers ici sur terre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vos ancêtres vivaient d’une manière qui ne les rendait pas vraiment heureux. C’est ainsi que vous avez appris à vivre aussi. Mais maintenant, Dieu vous a sauvés de ce mode de vie. Vous savez qu’il vous a rachetés pour lui‑même. Il ne vous a pas rachetés avec des choses qui ne durent pas éternellement, comme l’argent ou l’or. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, il vous a rachetés avec le sang très précieux de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', qui est mort en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour nos péchés. Il est mort comme un agneau qui est complètement bon et qui n’a rien de mal en lui.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu, le Père, avait déjà décidé que vous devez être son peuple. L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu a fait de vous des gens spéciaux qui obéiront à Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Dieu vous a choisis pour que le sang de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' vous rende vraiment purs.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prie pour que Dieu vous aide et vous donne de plus en plus la paix dans vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avant que le monde commence, Dieu avait déjà choisi Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Mais maintenant, pendant ces derniers jours du monde, Dieu a montré Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' aux gens. Dieu a fait cela pour qu’il puisse vous aider. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, c’est à cause de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' que vous croyez maintenant en Dieu. Dieu a ressuscité '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', afin qu’il revienne à la vie après sa mort. Il l’a fait pour montrer à tout le monde que Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est grand. Voilà pourquoi vous croyez en Dieu. Vous croyez en lui, qu’il fera de bonnes choses pour vous.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez obéi au vrai message de Dieu. Par conséquent, vous êtes devenus propres à l’intérieur, et maintenant vous pouvez vraiment aimer les autres croyants. Alors, faites‑le très bien ! Continuez de vous aimer beaucoup. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez reçu une nouvelle vie. Ce ne sont pas les gens qui vous ont donné cette nouvelle vie. La vie des hommes ne dure pas éternellement. Mais la nouvelle vie de Dieu ne prend pas fin. Vous êtes nés de nouveau dans une nouvelle vie, parce que vous avez cru au message de Dieu. Ce message continue d’être vrai et ne change pas. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La Bible dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les êtres humains sont comme de l’herbe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils peuvent sembler beaux pendant une courte période, comme des fleurs qui poussent dans les champs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’herbe devient vite sèche et elle meurt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fleurs tombent bientôt au sol.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le message du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu continuera toujours.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce message est la Bonne Nouvelle de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', que les gens vous ont enseignée.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous louons Dieu, qui est le Père de notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '  ! Il est très gentil avec nous. Ainsi, il nous a donné une nouvelle vie. Cela est possible parce que Dieu a ressuscité Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' après sa mort. Maintenant que nous vivons, nous sommes sûrs que nous recevrons de bonnes choses de Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous attendons de recevoir toutes les bonnes choses que Dieu a préparées pour nous. Personne ne pourra jamais détruire ces choses. Rien ne peut les détruire. Elles ne deviendront jamais vieilles ou moins belles. Dieu garde ces choses au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' pour vous. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu utilise sa grande puissance pour vous garder en sécurité, parce que vous croyez en lui. Il continuera de vous garder en sécurité jusqu’au dernier jour, lorsque le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' reviendra. Alors vous saurez que Dieu vous a sauvés complètement du péché et de la mort.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour toutes ces raisons, vous êtes très heureux, même lorsque vous avez des problèmes. Depuis peu de temps, différents types de problèmes risquent de vous rendre tristes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le but de ces problèmes est de montrer si vous croyez vraiment en Dieu. Lorsque vous croyez en Jésus, cela vaut même plus que de l’or. Les gens mettent de l’or dans un feu chaud pour voir s’il est vraiment bon. Et même l’or prendra fin un jour. Mais si vous continuez de croire en Dieu dans vos problèmes, il sera très heureux. Le jour où Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' reviendra, Dieu vous louera. Il dira que vous avez bien fait. Ce sera une très bonne chose !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous n’avez jamais vu Jésus, pourtant vous l’aimez. Vous ne le voyez pas maintenant, mais vous croyez en lui. Par conséquent, vous êtes très heureux. Il n’y a pas de mots pour décrire votre bonheur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes heureux maintenant, parce que Dieu vous sauve du péché. Vous croyez en Jésus et vous savez que Dieu vous sauve à cause de cela. '
