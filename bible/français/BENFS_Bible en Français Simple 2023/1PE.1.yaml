document_id: 1PE.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Dieu nous a donné une nouvelle vie à cause de Christ
  - type: text
    content: 'C’est moi Pierre qui écris cette lettre. Je suis '
  - type: text
    content: apôtre
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  - type: text
    content: 'Je vous écris, vous le peuple de Dieu qu’il a choisi. Vous vivez maintenant dans de nombreux endroits différents, dans les régions appelées Pont, Galatie, Cappadoce, Asie et Bithynie. Vous vivez dans ces lieux comme des étrangers, parce que vous vivez loin de vos vraies maisons. '
  '10':
  - type: text
    content: 'Il y a longtemps, les '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu en avaient parlé. Ils avaient déjà dit que Dieu sera très gentil avec vous. Ils voulaient savoir comment Dieu sauvera les gens. Ils ont étudié attentivement pour trouver les réponses. '
  '11':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' de '
  - type: text
    content: Christ
  - type: text
    content: ' a aidé ces '
  - type: text
    content: prophètes
  - type: text
    content: ' à comprendre les événements futurs. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' leur montrait que le '
  - type: text
    content: Messie
  - type: text
    content: ' spécial de Dieu aura beaucoup de douleur. Ensuite, après ce problème, Dieu fera arriver de grandes choses. Les '
  - type: text
    content: prophètes
  - type: text
    content: ' voulaient savoir qui sera ce '
  - type: text
    content: Messie
  - type: text
    content: '. Ils voulaient savoir quand il viendra. '
  '12':
  - type: text
    content: 'Dieu a montré à ses '
  - type: text
    content: prophètes
  - type: text
    content: ' que ses messages sur ces choses ne les aideront pas. Par contre, Dieu a envoyé son message aux '
  - type: text
    content: prophètes
  - type: text
    content: ' pour vous aider. Ce message est la Bonne Nouvelle de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' que vous avez maintenant entendue. Dieu a envoyé son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' du '
  - type: text
    content: ciel
  - type: text
    content: ' pour aider les gens à vous annoncer la Bonne Nouvelle. Même les '
  - type: text
    content: anges
  - type: text
    content: ' aiment mieux comprendre ces choses.'
  - type: heading
    content: Les chrétiens doivent faire ce qui est bon
  '13':
  - type: text
    content: 'Alors maintenant, préparez vos '
  - type: text
    content: esprits
  - type: text
    content: ', afin que vous soyez prêts à bien vivre. Pensez clairement à la façon dont Dieu vous aide. Rappelez‑vous toujours que Dieu sera très gentil avec vous lorsque Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' reviendra. '
  '14':
  - type: text
    content: 'Obéissez à Dieu, comme de bons enfants qui obéissent à leur père. Avant de connaître le vrai message sur '
  - type: text
    content: Christ
  - type: text
    content: ', vous vouliez vraiment faire de mauvaises choses. Mais maintenant, vous ne devez pas accepter de vivre de cette mauvaise façon. '
  '15':
  - type: text
    content: 'Dieu vous a choisis pour être son propre peuple. Il est complètement bon. Donc, vous devez aussi être complètement bons dans votre façon de vivre. '
  '16':
  - type: text
    content: 'Dans la Bible, Dieu a dit ceci : Vous devez être complètement bons, parce que je suis complètement bon.'
  '17':
  - type: text
    content: 'Dieu sait ce que chacun a fait et il '
  - type: text
    content: juge
  - type: text
    content: ' chacun de cette manière. Il est toujours juste quand il décide sur des gens. Il ne fait pas d’injustice entre les gens. Lorsque vous priez Dieu, vous l’appelez Père. Alors, respectez‑le toujours pendant que vous vivez comme des étrangers ici sur terre. '
  '18':
  - type: text
    content: 'Vos ancêtres vivaient d’une manière qui ne les rendait pas vraiment heureux. C’est ainsi que vous avez appris à vivre aussi. Mais maintenant, Dieu vous a sauvés de ce mode de vie. Vous savez qu’il vous a rachetés pour lui‑même. Il ne vous a pas rachetés avec des choses qui ne durent pas éternellement, comme l’argent ou l’or. '
  '19':
  - type: text
    content: 'Mais, il vous a rachetés avec le sang très précieux de '
  - type: text
    content: Christ
  - type: text
    content: ', qui est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nos péchés. Il est mort comme un agneau qui est complètement bon et qui n’a rien de mal en lui.'
  '2':
  - type: text
    content: Dieu, le Père, avait déjà décidé que vous devez être son peuple. L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu a fait de vous des gens spéciaux qui obéiront à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Dieu vous a choisis pour que le sang de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' vous rende vraiment purs.'
  - type: text
    content: 'Je prie pour que Dieu vous aide et vous donne de plus en plus la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: .
  '20':
  - type: text
    content: Avant que le monde commence, Dieu avait déjà choisi Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Mais maintenant, pendant ces derniers jours du monde, Dieu a montré Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' aux gens. Dieu a fait cela pour qu’il puisse vous aider. '
  '21':
  - type: text
    content: Oui, c’est à cause de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' que vous croyez maintenant en Dieu. Dieu a ressuscité '
  - type: text
    content: Christ
  - type: text
    content: ', afin qu’il revienne à la vie après sa mort. Il l’a fait pour montrer à tout le monde que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est grand. Voilà pourquoi vous croyez en Dieu. Vous croyez en lui, qu’il fera de bonnes choses pour vous.'
  '22':
  - type: text
    content: 'Vous avez obéi au vrai message de Dieu. Par conséquent, vous êtes devenus propres à l’intérieur, et maintenant vous pouvez vraiment aimer les autres croyants. Alors, faites‑le très bien ! Continuez de vous aimer beaucoup. '
  '23':
  - type: text
    content: 'Vous avez reçu une nouvelle vie. Ce ne sont pas les gens qui vous ont donné cette nouvelle vie. La vie des hommes ne dure pas éternellement. Mais la nouvelle vie de Dieu ne prend pas fin. Vous êtes nés de nouveau dans une nouvelle vie, parce que vous avez cru au message de Dieu. Ce message continue d’être vrai et ne change pas. '
  '24':
  - type: text
    content: 'La Bible dit :'
  - type: text
    content: Tous les êtres humains sont comme de l’herbe.
  - type: text
    content: Ils peuvent sembler beaux pendant une courte période, comme des fleurs qui poussent dans les champs.
  - type: text
    content: Mais l’herbe devient vite sèche et elle meurt.
  - type: text
    content: Les fleurs tombent bientôt au sol.
  '25':
  - type: text
    content: 'Mais le message du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu continuera toujours.'
  - type: text
    content: Ce message est la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', que les gens vous ont enseignée.'
  '3':
  - type: text
    content: 'Nous louons Dieu, qui est le Père de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '  ! Il est très gentil avec nous. Ainsi, il nous a donné une nouvelle vie. Cela est possible parce que Dieu a ressuscité Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' après sa mort. Maintenant que nous vivons, nous sommes sûrs que nous recevrons de bonnes choses de Dieu. '
  '4':
  - type: text
    content: 'Nous attendons de recevoir toutes les bonnes choses que Dieu a préparées pour nous. Personne ne pourra jamais détruire ces choses. Rien ne peut les détruire. Elles ne deviendront jamais vieilles ou moins belles. Dieu garde ces choses au '
  - type: text
    content: ciel
  - type: text
    content: ' pour vous. '
  '5':
  - type: text
    content: 'Dieu utilise sa grande puissance pour vous garder en sécurité, parce que vous croyez en lui. Il continuera de vous garder en sécurité jusqu’au dernier jour, lorsque le '
  - type: text
    content: Christ
  - type: text
    content: ' reviendra. Alors vous saurez que Dieu vous a sauvés complètement du péché et de la mort.'
  '6':
  - type: text
    content: 'Pour toutes ces raisons, vous êtes très heureux, même lorsque vous avez des problèmes. Depuis peu de temps, différents types de problèmes risquent de vous rendre tristes. '
  '7':
  - type: text
    content: Le but de ces problèmes est de montrer si vous croyez vraiment en Dieu. Lorsque vous croyez en Jésus, cela vaut même plus que de l’or. Les gens mettent de l’or dans un feu chaud pour voir s’il est vraiment bon. Et même l’or prendra fin un jour. Mais si vous continuez de croire en Dieu dans vos problèmes, il sera très heureux. Le jour où Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' reviendra, Dieu vous louera. Il dira que vous avez bien fait. Ce sera une très bonne chose !'
  '8':
  - type: text
    content: 'Vous n’avez jamais vu Jésus, pourtant vous l’aimez. Vous ne le voyez pas maintenant, mais vous croyez en lui. Par conséquent, vous êtes très heureux. Il n’y a pas de mots pour décrire votre bonheur. '
  '9':
  - type: text
    content: 'Vous êtes heureux maintenant, parce que Dieu vous sauve du péché. Vous croyez en Jésus et vous savez que Dieu vous sauve à cause de cela. '
