document_id: TIT.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tite doit enseigner correctement tous les croyants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais toi, Tite, tu dois apprendre aux gens à faire ce qui est bien. Enseigne‑leur seulement les choses qui appartiennent au vrai message de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les esclaves ne doivent pas prendre les choses qui appartiennent à leurs maîtres. Mais, leurs maîtres doivent pouvoir leur faire entièrement confiance. Ensuite, les gens verront que notre message aide les gens à vivre très bien. Les gens aimeront notre message sur Dieu, qui nous sauve.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu donne aux croyants une nouvelle vie
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu nous a clairement montré combien il est bon. Il est venu pour sauver tout le monde. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parce que Dieu est bon, il nous enseigne à laisser de vivre mal. Nous ne faisons plus les mauvaises choses qui ne rendent pas Dieu heureux. Nous nous détournons de mauvaises choses qui appartiennent à ce monde. Dieu nous enseigne à nous diriger correctement pendant que nous vivons dans ce monde. Il nous enseigne à faire ce qui est bien. Il nous enseigne à bien le servir.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Souviens‑toi de ceci : Nous attendons le retour de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' dans ce monde. Quand il viendra, cela nous rendra très heureux. Chacun verra à quel point Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est grand. Il est notre grand Dieu. C’est lui qui nous sauve de nos péchés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’est donné en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour nous. De cette façon, il nous a libérés de toutes sortes de mauvaises choses. En conséquence, nous pouvons être complètement bons et purs à l’intérieur de nous‑mêmes. Nous pouvons devenir son propre peuple, qui veut vraiment faire de bonnes choses.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu dois enseigner ces choses aux croyants. Aide‑les à bien vivre. Avertis‑les lorsqu’ils font de mauvaises choses. Utilise tout le pouvoir dont tu disposes en tant que responsable dans l’Église. Assure‑toi que tout le monde te respecte correctement.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis aux hommes plus âgés de bien se diriger. Ils doivent réfléchir sérieusement à la façon dont ils vivent, afin que les gens les respectent. Ils doivent continuer de croire en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Ils doivent continuer d’aimer les autres. Ils doivent continuer d’être patients et forts.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis aussi aux femmes plus âgées de bien vivre. Leur vie doit montrer qu’elles respectent Dieu. Elles ne doivent pas dire du mal des autres. Elles ne doivent pas être ivres. Elles doivent enseigner ce qui est bon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De cette façon, elles peuvent enseigner aux jeunes femmes comment vivre. En conséquence, les jeunes femmes vont aimer leurs maris et leurs enfants. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les jeunes femmes doivent mener une vie modérée, afin qu’elles fassent toujours ce qui est bien. Elles doivent être de bonnes femmes au foyer et elles doivent être gentilles avec les autres. Elles doivent respecter leurs maris. Si elles vivent bien comme ça, personne ne pourra dire de mauvaises choses contre le message de Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux jeunes hommes, dis‑leur aussi de bien réfléchir à leur mode de vie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi aussi, tu dois toujours faire de bonnes choses. De cette façon, tu montreras aux jeunes hommes comment ils doivent vivre. Lorsque tu enseignes les croyants, sois honnête et sérieux. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enseigne un message qui est correct, afin que personne ne puisse s’y opposer. Nos ennemis auront alors honte, car ils ne peuvent rien dire de mal à notre sujet.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux esclaves, dis‑leur d’obéir toujours à leurs maîtres. Ils ne doivent pas discuter avec leurs maîtres, mais ils doivent bien travailler pour les rendre heureux. '
