document_id: 1CO.6,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 6
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment décider des querelles entre chrétiens ?
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Peut‑être que l’un de vous a une querelle avec un autre chrétien. Qui doit décider lequel d’entre vous a raison ? Vous ne devez jamais demander aux gens qui ne connaissent pas Dieu de décider. Non ! Au lieu de cela, vous devez aller vers le peuple de Dieu. Il doit décider. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les gens qui volent d’autres personnes. Les gens qui veulent beaucoup de choses pour eux. Des ivrognes. Des gens qui insultent les autres. Des gens qui trompent les autres pour leur prendre des choses. Aucune de ces personnes ne recevra les bonnes choses du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'À un moment donné, certains d’entre vous étaient des gens comme cela. Mais Dieu vous a maintenant rendus saints et purs, afin que vous lui apparteniez. Vous êtes devenus justes avec Dieu. Notre Dieu l’a fait avec la puissance de son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ', parce que vous croyez au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Utilisez bien votre corps
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Certains d’entre vous, croyants, peuvent dire : Je suis libre de faire tout ce que je veux. C’est peut‑être vrai, mais tout ne vous aidera pas. Je pourrais dire : Je suis libre de faire les choses que je veux faire. Oui, mais je ne laisserai rien régner sur moi.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Certains d’entre vous diront : Dieu a fait la nourriture pour nourrir nos corps. C’est pourquoi les gens ont des estomacs. Mais un jour, Dieu détruira à la fois les estomacs, et la nourriture. Oui, mais le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous a donné nos corps. Nos corps appartiennent au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Donc, vous ne devez pas utiliser vos corps pour avoir des relations sexuelles d’une mauvaise façon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dieu a réveillé le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus après sa mort. Et Dieu utilisera sa puissance pour nous faire revivre aussi.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Vous savez que vos corps font partie du corps de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Donc, vous ne devez jamais prendre vos corps et les joindre au corps d’une prostituée. C’est comme si vous l’aviez fait avec une partie du corps de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Ne laissez jamais cela se faire ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Quiconque joint son corps à une prostituée devient un seul corps avec cette prostituée. Vous devez savoir ça. Il est dit dans la Bible :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’homme et la femme deviennent comme un seul corps.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais quiconque est uni au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a le même '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' que lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors, n’ayez jamais de relations sexuelles d’une mauvaise façon ! Vous pouvez dire : Si une personne fait une mauvaise chose, ce n’est pas son corps qui fait cela. Mais si vous avez de mauvaises relations sexuelles, vous faites du tort à vos propres corps.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Rappelez‑vous ceci : Vos corps sont des maisons du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' de Dieu. Dieu vous a donné son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' et il vit en vous. Vous ne vous appartenez plus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'C’est le peuple de Dieu qui jugera tous les gens dans le monde un jour. Vous le savez sûrement. Puisque c’est vrai, vous devez pouvoir décider entre vous de petites querelles. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dieu vous a rachetés pour lui‑même. Il a payé le prix pour vous. Alors, utilisez vos corps pour montrer à quel point Dieu est grand.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Vous savez que nous allons juger les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' un jour. Nous devons donc être en mesure de décider des choses ordinaires ici sur terre.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si vous voulez décider d’une affaire ordinaire comme ça, que faites‑vous ? Parfois, vous allez voir un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' qui ne croit pas en Dieu. Vous ne devez jamais faire ça ! L’Église ne respecte pas les gens comme ça. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je dis cela pour que vous ayez honte. Il y a sûrement un sage dans votre groupe qui pourrait décider des querelles entre vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais, certains croyants parmi vous accusent les autres croyants devant les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juges
    - type: text
      text: '. Et ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juges
    - type: text
      text: ' ne sont pas croyants !'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsque vous vous accusez comme ça, cela montre que vous avez déjà échoué. Il vaudrait mieux l’accepter quand d’autres personnes vous font du mal. Même si les gens vous volent, il serait mieux d’accepter cela. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais, vous faites vous‑mêmes du mal à d’autres personnes, et vous les volez même. Et ces autres personnes sont des croyants comme vous !
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les gens qui font de telles choses mauvaises n’appartiendront jamais au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: '. Vous le savez sûrement. Ne pensez pas que des gens comme ceux‑ci recevront les bonnes choses de Dieu. Les gens qui ont des relations sexuelles de mauvaises manières. Les gens qui adorent les idoles. Les personnes qui ont des relations sexuelles avec quelqu’un avec qui elles ne sont pas mariées. Les hommes ayant des relations sexuelles avec d’autres hommes. '
