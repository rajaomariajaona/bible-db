document_id: JHN.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'La fête de mariage à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Cana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '3 jours après cela, il y avait un mariage. C’était dans la ville appelée '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Cana
  - type: text
    text: ', en Galilée. La mère de Jésus était là. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les gens avaient demandé à Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de venir à la fête aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les gens ont fini de boire tout le vin. Alors la mère de Jésus lui a dit : Ils n’ont plus de vin. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus a répondu : Femme, pourquoi me dis‑tu ceci ? Ce n’est pas encore mon temps. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sa mère a dit aux serviteurs : Faites tout ce qu’il vous dira de faire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il y avait 6 gros vases là. Des gens les avaient faits de pierre. Chaque vase contenait une centaine de litres. Ces vases contenaient de l’eau. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' se purifiaient avec cette eau. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' avaient des règles spéciales au moment de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: purification
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus a dit aux serviteurs : Remplissez les vases avec de l’eau. Donc, ils ont rempli les vases avec de l’eau jusqu’au bord. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il a dit : Maintenant, prenez une partie de l’eau des vases. Donnez‑en au maître de la fête. Ils ont donc pris de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et le maître de la fête a goûté l’eau. Mais l’eau est devenue du vin. Le maître ne savait pas d’où le vin était venu. Mais les serviteurs le savaient. Alors le maître a demandé à l’époux de venir auprès de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le maître lui a dit : Tout le monde boit d’abord le meilleur vin. Puis, quand les gens deviennent ivres, donne‑leur le moins bon vin. Vous avez gardé le meilleur vin jusqu’à maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus a fait ce premier miracle à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Cana
  - type: text
    text: ', en Galilée. De cette façon, Jésus a montré à quel point il était puissant. Ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont cru en lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus va au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: .
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après cela, Jésus est allé à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Capernaüm
  - type: text
    text: '. Sa mère, ses frères et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés avec lui. Ils sont restés là pendant quelques jours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il était presque temps pour la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Donc, Jésus est allé à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il a trouvé des gens dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ils vendaient des vaches, des brebis et des colombes. D’autres gens étaient assis à des tables. Ils achetaient et vendaient des pièces de monnaie là‑bas. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Jésus a fait un fouet de quelques morceaux de corde. Puis il a chassé tous les gens du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' avec les brebis et les vaches. Il a jeté les pièces de monnaie de tous les changeurs de monnaie sur le sol. Il a renversé leurs tables. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il a dit aux gens qui vendaient des oiseaux : Enlevez‑les d’ici ! Ne rendez pas la maison de mon père comme un marché ! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' se sont rappelé ce message : Mon amour pour ta maison brûle en moi comme un feu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont demandé à Jésus : Si tu as le pouvoir de faire cela, montre‑nous un miracle. Ensuite, nous saurons que tu as vraiment le pouvoir. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus leur a répondu : Si vous détruisez ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu, je vais le construire à nouveau en 3 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont répondu : Beaucoup d’hommes ont travaillé pendant 46 ans pour construire ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Et tu dis que tu vas le reconstruire en 3 jours ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' dont Jésus parlait, était son propre corps. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' vont se souvenir de cela. Ce sera quand Jésus va être à nouveau en vie. Et ils ont cru aux paroles que Jésus avait dites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus était à Jérusalem pour la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. Il faisait beaucoup de miracles. Beaucoup de gens croyaient en voyant ces miracles. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais Jésus lui‑même ne faisait pas confiance au peuple. Il savait ce que tous les gens étaient vraiment. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il n’avait pas besoin de personne pour lui dire ce que les gens sont. Il savait déjà ce qui était vraiment dans toutes les personnes.
