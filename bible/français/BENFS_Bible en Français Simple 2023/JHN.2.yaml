document_id: JHN.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: La fête de mariage à Cana
  - type: text
    content: '3 jours après cela, il y avait un mariage. C’était dans la ville appelée '
  - type: text
    content: Cana
  - type: text
    content: ', en Galilée. La mère de Jésus était là. '
  '10':
  - type: text
    content: 'Le maître lui a dit : Tout le monde boit d’abord le meilleur vin. Puis, quand les gens deviennent ivres, donne‑leur le moins bon vin. Vous avez gardé le meilleur vin jusqu’à maintenant. '
  '11':
  - type: text
    content: 'Jésus a fait ce premier miracle à '
  - type: text
    content: Cana
  - type: text
    content: ', en Galilée. De cette façon, Jésus a montré à quel point il était puissant. Ses '
  - type: text
    content: disciples
  - type: text
    content: ' ont cru en lui.'
  - type: heading
    content: Jésus va au Temple.
  '12':
  - type: text
    content: 'Après cela, Jésus est allé à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Sa mère, ses frères et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés avec lui. Ils sont restés là pendant quelques jours.'
  '13':
  - type: text
    content: 'Il était presque temps pour la '
  - type: text
    content: Pâque
  - type: text
    content: ' des '
  - type: text
    content: Juifs
  - type: text
    content: '. Donc, Jésus est allé à Jérusalem. '
  '14':
  - type: text
    content: 'Il a trouvé des gens dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils vendaient des vaches, des brebis et des colombes. D’autres gens étaient assis à des tables. Ils achetaient et vendaient des pièces de monnaie là‑bas. '
  '15':
  - type: text
    content: 'Alors Jésus a fait un fouet de quelques morceaux de corde. Puis il a chassé tous les gens du '
  - type: text
    content: Temple
  - type: text
    content: ' avec les brebis et les vaches. Il a jeté les pièces de monnaie de tous les changeurs de monnaie sur le sol. Il a renversé leurs tables. '
  '16':
  - type: text
    content: 'Il a dit aux gens qui vendaient des oiseaux : Enlevez‑les d’ici ! Ne rendez pas la maison de mon père comme un marché ! '
  '17':
  - type: text
    content: 'Ses '
  - type: text
    content: disciples
  - type: text
    content: ' se sont rappelé ce message : Mon amour pour ta maison brûle en moi comme un feu.'
  '18':
  - type: text
    content: 'Alors les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont demandé à Jésus : Si tu as le pouvoir de faire cela, montre‑nous un miracle. Ensuite, nous saurons que tu as vraiment le pouvoir. '
  '19':
  - type: text
    content: 'Jésus leur a répondu : Si vous détruisez ce '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu, je vais le construire à nouveau en 3 jours. '
  '2':
  - type: text
    content: 'Les gens avaient demandé à Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' de venir à la fête aussi. '
  '20':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont répondu : Beaucoup d’hommes ont travaillé pendant 46 ans pour construire ce '
  - type: text
    content: Temple
  - type: text
    content: '. Et tu dis que tu vas le reconstruire en 3 jours ! '
  '21':
  - type: text
    content: 'Mais ce '
  - type: text
    content: Temple
  - type: text
    content: ' dont Jésus parlait, était son propre corps. '
  '22':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' vont se souvenir de cela. Ce sera quand Jésus va être à nouveau en vie. Et ils ont cru aux paroles que Jésus avait dites.'
  '23':
  - type: text
    content: 'Jésus était à Jérusalem pour la '
  - type: text
    content: Pâque
  - type: text
    content: '. Il faisait beaucoup de miracles. Beaucoup de gens croyaient en voyant ces miracles. '
  '24':
  - type: text
    content: 'Mais Jésus lui‑même ne faisait pas confiance au peuple. Il savait ce que tous les gens étaient vraiment. '
  '25':
  - type: text
    content: Il n’avait pas besoin de personne pour lui dire ce que les gens sont. Il savait déjà ce qui était vraiment dans toutes les personnes.
  '3':
  - type: text
    content: 'Les gens ont fini de boire tout le vin. Alors la mère de Jésus lui a dit : Ils n’ont plus de vin. '
  '4':
  - type: text
    content: 'Jésus a répondu : Femme, pourquoi me dis‑tu ceci ? Ce n’est pas encore mon temps. '
  '5':
  - type: text
    content: 'Sa mère a dit aux serviteurs : Faites tout ce qu’il vous dira de faire.'
  '6':
  - type: text
    content: 'Il y avait 6 gros vases là. Des gens les avaient faits de pierre. Chaque vase contenait une centaine de litres. Ces vases contenaient de l’eau. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' se purifiaient avec cette eau. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' avaient des règles spéciales au moment de la '
  - type: text
    content: purification
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Jésus a dit aux serviteurs : Remplissez les vases avec de l’eau. Donc, ils ont rempli les vases avec de l’eau jusqu’au bord. '
  '8':
  - type: text
    content: 'Il a dit : Maintenant, prenez une partie de l’eau des vases. Donnez‑en au maître de la fête. Ils ont donc pris de l’eau. '
  '9':
  - type: text
    content: 'Et le maître de la fête a goûté l’eau. Mais l’eau est devenue du vin. Le maître ne savait pas d’où le vin était venu. Mais les serviteurs le savaient. Alors le maître a demandé à l’époux de venir auprès de lui. '
