document_id: JAS.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des problèmes arriveront aux riches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maintenant, écoutez‑moi, vous les riches. Pleurez et criez à haute voix, car de nombreux problèmes vous arriveront bientôt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Votre argent n’a plus aucune valeur. Les insectes ont mangé vos beaux vêtements et les ont détruits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous avez conservé des pièces d’argent et d’or à dépenser pour vous‑mêmes. Mais la saleté a abîmé ces pièces. Cette saleté montrera que vous êtes fautifs. Elle deviendra comme un feu qui brûle vos corps. Dans les derniers jours de ce monde, vous avez conservé tout cet argent pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais vous n’avez rien payé aux gens qui travaillaient dans vos champs. Ecoutez !
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Vous les avez trompés et maintenant ils parlent contre vous. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est très puisant. Il les a entendus quand ils lui ont crié au secours. Il sait que vous êtes fautifs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Comme vous vivez ici sur cette terre, vous avez eu tout ce que vous vouliez. Vous avez vécu comme des rois. Vous avez mangé autant de nourriture que vous le souhaitez. Alors maintenant, vous êtes comme de gros animaux prêts à être tués par les hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quant à celui qui n’a rien fait de mal, vous dites qu’il est fautif. Vous l’avez même tué. Il ne pouvait pas vous résister.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Soyez patients jusqu’à ce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' revienne'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors, mes amis chrétiens, soyez patients jusqu’au retour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. Pensez à la façon dont un agriculteur est patient. Il attend que le sol lui donne sa précieuse nourriture. Il attend patiemment que la pluie arrive au temps convenable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous devez également être patients, car le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' reviendra bientôt. Soyez forts alors que vous continuez à lui faire confiance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mes amis chrétiens, ne vous dites pas de mauvaises choses les uns contre les autres. Si vous le faites, Dieu vous punira. Donc soyez prudents ! Il est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' et il est maintenant prêt à juger les gens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pensez à la patience des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu. Ils disaient des messages au nom du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Beaucoup de problèmes leur sont arrivés, mais ils ont été patients. Donc, mes amis chrétiens, vous devez copier leur exemple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous savons que Dieu a béni les gens qui étaient comme ça. Ils ont continué de faire confiance en Dieu lorsque des problèmes leur sont arrivés. Vous avez entendu parler de Job. Il attendait patiemment que Dieu l’aide dans ses problèmes. Vous savez comment le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l’a aidé à la fin. Pour cette raison, nous voyons que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu est très gentil et il nous aide.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici une autre chose importante à retenir, mes amis chrétiens. Lorsque vous voulez faire une promesse forte, n’ajoutez jamais d’autres mots. Ne dites pas : Je promets par le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' ou je promets par la terre. N’ajoutez pas d’autres mots comme ça. Quand vous dites oui, cela suffit. Lorsque vous dites non, cela suffit également. Si vous dites plus que cela, Dieu dira que vous avez fait une mauvaise chose.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quelqu’un parmi vous est‑il en difficulté ? Alors, il peut prier Dieu pour cela. Ou est‑ce que quelqu’un se sent heureux ? Il peut louer Dieu avec des chansons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quelqu’un est‑il malade ? Il peut demander aux anciens de l’Église de venir prier pour lui. Les anciens vont oindre de l’huile d’olive sur le malade. Ils vont prier pour lui avec l’autorité du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'S’ils prient de cette façon et s’ils ont confiance que Dieu leur répondra, le malade se sentira bien. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' le guérira. Et Dieu lui pardonnera s’il a fait quelque chose de mal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Donc, vous devez vous parler de toutes les mauvaises choses que vous avez faites. Ensuite, vous pourrez prier les uns pour les autres, afin que Dieu vous guérisse. Quand une bonne personne prie Dieu, Dieu fait des choses puissantes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Par exemple, Élie le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' de Dieu était une personne comme nous. Une fois, il a prié Dieu qu’il ne pleuve pas. Il a continué de prier et il n’y eut pas de pluie sur la terre. C’était pendant 3 ans et 6 mois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après ce temps, il a prié Dieu d’envoyer de nouveau de la pluie. Alors, la pluie est tombée du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Les graines qui étaient dans le sol ont commencé à pousser et à donner de la nourriture.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mes amis chrétiens, si quelqu’un parmi vous se détourne du vrai message de Dieu, vous devez l’aider. Essayez de le ramener à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Comprenez ceci : Si vous aidez une personne à laisser ses mauvaises manières, vous sauverez l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: âme
  - type: text
    text: ' de cette personne de la mort. Et Dieu pardonnera à cette personne pour ses nombreux péchés.'
