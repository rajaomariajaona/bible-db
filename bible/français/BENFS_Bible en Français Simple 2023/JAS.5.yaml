document_id: JAS.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Des problèmes arriveront aux riches
  - type: text
    content: Maintenant, écoutez‑moi, vous les riches. Pleurez et criez à haute voix, car de nombreux problèmes vous arriveront bientôt.
  '10':
  - type: text
    content: 'Pensez à la patience des '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu. Ils disaient des messages au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: . Beaucoup de problèmes leur sont arrivés, mais ils ont été patients. Donc, mes amis chrétiens, vous devez copier leur exemple.
  '11':
  - type: text
    content: 'Nous savons que Dieu a béni les gens qui étaient comme ça. Ils ont continué de faire confiance en Dieu lorsque des problèmes leur sont arrivés. Vous avez entendu parler de Job. Il attendait patiemment que Dieu l’aide dans ses problèmes. Vous savez comment le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l’a aidé à la fin. Pour cette raison, nous voyons que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu est très gentil et il nous aide.'
  '12':
  - type: text
    content: 'Voici une autre chose importante à retenir, mes amis chrétiens. Lorsque vous voulez faire une promesse forte, n’ajoutez jamais d’autres mots. Ne dites pas : Je promets par le '
  - type: text
    content: ciel
  - type: text
    content: ' ou je promets par la terre. N’ajoutez pas d’autres mots comme ça. Quand vous dites oui, cela suffit. Lorsque vous dites non, cela suffit également. Si vous dites plus que cela, Dieu dira que vous avez fait une mauvaise chose.'
  - type: heading
    content: Prière
  '13':
  - type: text
    content: Quelqu’un parmi vous est‑il en difficulté ? Alors, il peut prier Dieu pour cela. Ou est‑ce que quelqu’un se sent heureux ? Il peut louer Dieu avec des chansons.
  '14':
  - type: text
    content: 'Quelqu’un est‑il malade ? Il peut demander aux anciens de l’Église de venir prier pour lui. Les anciens vont oindre de l’huile d’olive sur le malade. Ils vont prier pour lui avec l’autorité du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus.'
  '15':
  - type: text
    content: 'S’ils prient de cette façon et s’ils ont confiance que Dieu leur répondra, le malade se sentira bien. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le guérira. Et Dieu lui pardonnera s’il a fait quelque chose de mal.'
  '16':
  - type: text
    content: Donc, vous devez vous parler de toutes les mauvaises choses que vous avez faites. Ensuite, vous pourrez prier les uns pour les autres, afin que Dieu vous guérisse. Quand une bonne personne prie Dieu, Dieu fait des choses puissantes.
  '17':
  - type: text
    content: 'Par exemple, Élie le '
  - type: text
    content: prophète
  - type: text
    content: ' de Dieu était une personne comme nous. Une fois, il a prié Dieu qu’il ne pleuve pas. Il a continué de prier et il n’y eut pas de pluie sur la terre. C’était pendant 3 ans et 6 mois.'
  '18':
  - type: text
    content: 'Après ce temps, il a prié Dieu d’envoyer de nouveau de la pluie. Alors, la pluie est tombée du '
  - type: text
    content: ciel
  - type: text
    content: . Les graines qui étaient dans le sol ont commencé à pousser et à donner de la nourriture.
  '19':
  - type: text
    content: Mes amis chrétiens, si quelqu’un parmi vous se détourne du vrai message de Dieu, vous devez l’aider. Essayez de le ramener à Dieu.
  '2':
  - type: text
    content: Votre argent n’a plus aucune valeur. Les insectes ont mangé vos beaux vêtements et les ont détruits.
  '20':
  - type: text
    content: 'Comprenez ceci : Si vous aidez une personne à laisser ses mauvaises manières, vous sauverez l’'
  - type: text
    content: âme
  - type: text
    content: ' de cette personne de la mort. Et Dieu pardonnera à cette personne pour ses nombreux péchés.'
  '3':
  - type: text
    content: Vous avez conservé des pièces d’argent et d’or à dépenser pour vous‑mêmes. Mais la saleté a abîmé ces pièces. Cette saleté montrera que vous êtes fautifs. Elle deviendra comme un feu qui brûle vos corps. Dans les derniers jours de ce monde, vous avez conservé tout cet argent pour vous.
  '4':
  - type: text
    content: Mais vous n’avez rien payé aux gens qui travaillaient dans vos champs. Ecoutez !
  - type: text
    content: 'Vous les avez trompés et maintenant ils parlent contre vous. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est très puisant. Il les a entendus quand ils lui ont crié au secours. Il sait que vous êtes fautifs.'
  '5':
  - type: text
    content: Comme vous vivez ici sur cette terre, vous avez eu tout ce que vous vouliez. Vous avez vécu comme des rois. Vous avez mangé autant de nourriture que vous le souhaitez. Alors maintenant, vous êtes comme de gros animaux prêts à être tués par les hommes.
  '6':
  - type: text
    content: Quant à celui qui n’a rien fait de mal, vous dites qu’il est fautif. Vous l’avez même tué. Il ne pouvait pas vous résister.
  - type: heading
    content: Soyez patients jusqu’à ce que le Seigneur revienne
  '7':
  - type: text
    content: 'Alors, mes amis chrétiens, soyez patients jusqu’au retour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. Pensez à la façon dont un agriculteur est patient. Il attend que le sol lui donne sa précieuse nourriture. Il attend patiemment que la pluie arrive au temps convenable.'
  '8':
  - type: text
    content: 'Vous devez également être patients, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' reviendra bientôt. Soyez forts alors que vous continuez à lui faire confiance.'
  '9':
  - type: text
    content: 'Mes amis chrétiens, ne vous dites pas de mauvaises choses les uns contre les autres. Si vous le faites, Dieu vous punira. Donc soyez prudents ! Il est le '
  - type: text
    content: juge
  - type: text
    content: ' et il est maintenant prêt à juger les gens.'
