document_id: ROM.9
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 9
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le peuple d’Israël n’a pas cru en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ce que je vous dis, est vrai. Je parle comme quelqu’un qui appartient à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Je ne dis rien. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu dirige mes pensées et elles me disent que j’ai raison. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je vous dis ceci : Je suis très triste dans mon cœur. Je suis toujours très triste à cause du peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’appartiens à la même famille qu’eux. Ils sont mon propre peuple. Je veux vraiment qu’ils croient aussi en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Si cela pouvait les aider, je pourrais même demander à Dieu de me maudire. Je lui demanderais de me séparer de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ce sont des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Israélites
  - type: text
    text: . Dieu les a choisis pour lui appartenir comme ses propres enfants. Il leur a montré qu’il était très grand. Il a conclu de nombreux accords avec eux et leur a donné sa loi. Il leur a montré comment ils devaient l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: '. Il leur a promis beaucoup de bonnes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ce sont leurs ancêtres que Dieu a choisis de faire grands, il y a de nombreuses années. Et Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même, en tant qu’homme, est né dans une famille '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israélite
  - type: text
    text: . Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est Dieu, qui règne sur toutes choses. Nous devons le louer pour toujours ! C’est vrai ! Amen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu a promis de bonnes choses au peuple d’Israël. Mais je ne dis pas que ce que Dieu a promis ne s’est pas produit. Il est clair que tout le peuple d’Israël n’est pas le vrai peuple de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tous ne sont pas de vrais descendants d’Abraham. Dieu a dit à Abraham : C’est seulement ton fils Isaac que j’appellerai le père de tes descendants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cela signifie que tous les enfants d’Abraham ne sont pas vraiment les enfants de Dieu. Ce ne sont que ces enfants qui sont nés à la suite de la promesse de Dieu. Ce sont seulement les gens que Dieu appelle de vrais descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici ce que Dieu a promis à Abraham : À ce temps de l’année prochaine, je reviendrai. Alors Sara, ta femme, aura un fils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Souvenez‑vous aussi de ceci : Plus tard, la femme d’Isaac, Rebecca, a donné naissance à des jumeaux. Ces 2 fils avaient le même père, qui était notre ancêtre, Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et Dieu a parlé à Rebecca avant la naissance de ses fils. Dieu a parlé avant que les garçons ne fassent quoi que ce soit de bien ou de mal. Dieu a fait cela pour montrer clairement qu’il a choisi lui‑même un enfant. Il n’a pas choisi quelqu’un à cause de ce que cette personne avait fait. Il a lui‑même décidé qui il choisira. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu a dit à Rebecca : Le fils aîné servira le fils cadet. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ceci est écrit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai aimé Jacob, mais j’ai détesté Ésaü.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pour cette raison, quelqu’un pourrait dire que Dieu n’est pas juste. Non ! Nous ne devons jamais dire cela ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pensez à cela. Dieu a dit à Moïse : Je serai bon envers quiconque je choisirai d’être gentil. J’aurai pitié de celui que je choisirai d’avoir pitié de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ainsi donc, c’est Dieu qui décide de ces choses. Ce n’est pas à cause de ce que les gens veulent. Ce n’est pas à cause de ce que font les gens. C’est Dieu lui‑même qui fait grâce comme il veut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La Bible nous dit ce que Dieu a dit à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharaon
  - type: text
    text: '  : C’est pourquoi je t’ai fait roi d’Égypte. Mon but était de montrer à quel point je suis puissant. En conséquence, les gens partout dans le monde sauront que je suis important. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nous voyons donc ceci : Dieu est bon pour certaines personnes et il leur pardonne. Mais il fait que certaines personnes, comme '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharaon
  - type: text
    text: ', se retournent contre lui. Il choisit ce qu’il fera de chaque personne.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu lui‑même décide quand il sera en colère ou gentil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’un de vous peut me dire : Dieu fait toujours ce qu’il veut. Personne ne peut changer ce que Dieu lui fait faire. Donc, Dieu ne dira pas que les gens ont fait de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais vous n’êtes que des humains. Vous n’avez aucun pouvoir de parler contre Dieu comme cela. Dieu vous a créés. Un pot ne peut pas parler contre la personne qui l’a fait ! Il ne peut pas lui demander : Pourquoi m’as‑tu fait comme ça ? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quelqu’un qui fait des pots peut choisir de faire n’importe quel type de pot. Il peut utiliser le même morceau d’argile pour fabriquer 2 pots différents. L’un des pots peut être destiné à des fêtes spéciales. L’autre pot pour les choses sales.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Qu’est‑ce que cela nous enseigne sur Dieu ? Certaines personnes sont comme des pots prêts à être détruits par Dieu. Dieu est en colère contre des gens comme ça. Il est prêt à montrer sa puissance contre eux. Mais il a choisi d’attendre patiemment. Il garde sa colère pour plus tard. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'D’autres personnes sont comme des pots précieux que Dieu a choisis de fabriquer. Dieu veut être gentil avec les gens comme ça. Il veut les utiliser pour montrer aux gens à quel point il est grand. Il les a préparés à être avec lui pour une fête spéciale au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nous sommes ces gens ! Dieu nous a choisis pour être son peuple. Ce n’est pas seulement les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qu’il a choisis. Il a également choisi les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dieu a dit ceci dans le livre d’Osée :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais dire aux gens qui n’étaient pas mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant vous êtes mon peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je dirai aux gens que je n’aimais pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vous aime.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dieu leur avait dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous n’êtes pas mon peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au même endroit où il a dit cela.
- type: usfm
  marker: p
  children:
  - type: text
    text: Les gens vont maintenant les appeler enfants de Dieu, qui vit pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'De plus, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' de Dieu Ésaïe a dit ceci au sujet du peuple d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a tellement de gens d’Israël, personne ne peut les compter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont aussi nombreux que les morceaux de sable au bord de la mer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais Dieu n’en sauvera que quelques‑uns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu achèvera rapidement son travail.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a averti son peuple de ce qu’il allait faire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il le punira complètement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ésaïe avait déjà dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' d’une grande puissance a laissé certains de nos enfants vivre.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il ne l’avait pas fait, aucun descendant ne restera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous serions devenus comme les habitants de Sodome et Gomorrhe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Donc, nous devons réfléchir à ce que tout cela signifie. Les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' n’essayaient pas de devenir justes avec Dieu. Mais certains d’entre eux sont maintenant justes avec lui. Dieu les a acceptés comme justes, parce qu’ils ont cru en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais le peuple d’Israël a essayé de trouver une loi qui le rendra juste avec Dieu. Mais ils n’ont pas réussi à devenir justes avec Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils ont échoué parce qu’ils refusaient de croire en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Au lieu de cela, ils essayaient de faire certaines choses pour que Dieu les accepte. À cause de cela, ils sont tombés au sol. Leurs pieds ont cogné la pierre qui fait tomber les gens. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il est dit ceci dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Écoutez, je mets une pierre spéciale à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sion
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette pierre fera tomber les gens au sol.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rocher
  - type: text
    text: ' qui les fera tomber.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais quiconque croit en lui ne sera jamais déçu.
