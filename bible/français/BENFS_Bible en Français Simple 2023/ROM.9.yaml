document_id: ROM.9,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 9
  - type: heading
    content: Le peuple d’Israël n’a pas cru en Jésus‑Christ
  - type: text
    content: Ce que je vous dis, est vrai. Je parle comme quelqu’un qui appartient à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Je ne dis rien. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu dirige mes pensées et elles me disent que j’ai raison. '
  '10':
  - type: text
    content: 'Souvenez‑vous aussi de ceci : Plus tard, la femme d’Isaac, Rebecca, a donné naissance à des jumeaux. Ces 2 fils avaient le même père, qui était notre ancêtre, Isaac. '
  '11':
  - type: text
    content: 'Et Dieu a parlé à Rebecca avant la naissance de ses fils. Dieu a parlé avant que les garçons ne fassent quoi que ce soit de bien ou de mal. Dieu a fait cela pour montrer clairement qu’il a choisi lui‑même un enfant. Il n’a pas choisi quelqu’un à cause de ce que cette personne avait fait. Il a lui‑même décidé qui il choisira. '
  '12':
  - type: text
    content: 'Dieu a dit à Rebecca : Le fils aîné servira le fils cadet. '
  '13':
  - type: text
    content: 'Ceci est écrit dans la Bible :'
  - type: text
    content: J’ai aimé Jacob, mais j’ai détesté Ésaü.
  '14':
  - type: text
    content: 'Pour cette raison, quelqu’un pourrait dire que Dieu n’est pas juste. Non ! Nous ne devons jamais dire cela ! '
  '15':
  - type: text
    content: 'Pensez à cela. Dieu a dit à Moïse : Je serai bon envers quiconque je choisirai d’être gentil. J’aurai pitié de celui que je choisirai d’avoir pitié de lui. '
  '16':
  - type: text
    content: Ainsi donc, c’est Dieu qui décide de ces choses. Ce n’est pas à cause de ce que les gens veulent. Ce n’est pas à cause de ce que font les gens. C’est Dieu lui‑même qui fait grâce comme il veut.
  '17':
  - type: text
    content: 'La Bible nous dit ce que Dieu a dit à '
  - type: text
    content: Pharaon
  - type: text
    content: '  : C’est pourquoi je t’ai fait roi d’Égypte. Mon but était de montrer à quel point je suis puissant. En conséquence, les gens partout dans le monde sauront que je suis important. '
  '18':
  - type: text
    content: 'Nous voyons donc ceci : Dieu est bon pour certaines personnes et il leur pardonne. Mais il fait que certaines personnes, comme '
  - type: text
    content: Pharaon
  - type: text
    content: ', se retournent contre lui. Il choisit ce qu’il fera de chaque personne.'
  - type: heading
    content: Dieu lui‑même décide quand il sera en colère ou gentil
  '19':
  - type: text
    content: 'L’un de vous peut me dire : Dieu fait toujours ce qu’il veut. Personne ne peut changer ce que Dieu lui fait faire. Donc, Dieu ne dira pas que les gens ont fait de mauvaises choses. '
  '2':
  - type: text
    content: 'Je vous dis ceci : Je suis très triste dans mon cœur. Je suis toujours très triste à cause du peuple d’Israël. '
  '20':
  - type: text
    content: 'Mais vous n’êtes que des humains. Vous n’avez aucun pouvoir de parler contre Dieu comme cela. Dieu vous a créés. Un pot ne peut pas parler contre la personne qui l’a fait ! Il ne peut pas lui demander : Pourquoi m’as‑tu fait comme ça ? '
  '21':
  - type: text
    content: Quelqu’un qui fait des pots peut choisir de faire n’importe quel type de pot. Il peut utiliser le même morceau d’argile pour fabriquer 2 pots différents. L’un des pots peut être destiné à des fêtes spéciales. L’autre pot pour les choses sales.
  '22':
  - type: text
    content: 'Qu’est‑ce que cela nous enseigne sur Dieu ? Certaines personnes sont comme des pots prêts à être détruits par Dieu. Dieu est en colère contre des gens comme ça. Il est prêt à montrer sa puissance contre eux. Mais il a choisi d’attendre patiemment. Il garde sa colère pour plus tard. '
  '23':
  - type: text
    content: 'D’autres personnes sont comme des pots précieux que Dieu a choisis de fabriquer. Dieu veut être gentil avec les gens comme ça. Il veut les utiliser pour montrer aux gens à quel point il est grand. Il les a préparés à être avec lui pour une fête spéciale au '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Nous sommes ces gens ! Dieu nous a choisis pour être son peuple. Ce n’est pas seulement les '
  - type: text
    content: Juifs
  - type: text
    content: ' qu’il a choisis. Il a également choisi les non '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Dieu a dit ceci dans le livre d’Osée :'
  - type: text
    content: Je vais dire aux gens qui n’étaient pas mon peuple,
  - type: text
    content: Maintenant vous êtes mon peuple.
  - type: text
    content: Je dirai aux gens que je n’aimais pas,
  - type: text
    content: Je vous aime.
  '26':
  - type: text
    content: 'Dieu leur avait dit :'
  - type: text
    content: Vous n’êtes pas mon peuple.
  - type: text
    content: Au même endroit où il a dit cela.
  - type: text
    content: Les gens vont maintenant les appeler enfants de Dieu, qui vit pour toujours.
  '27':
  - type: text
    content: 'De plus, le '
  - type: text
    content: prophète
  - type: text
    content: ' de Dieu Ésaïe a dit ceci au sujet du peuple d’Israël :'
  - type: text
    content: Il y a tellement de gens d’Israël, personne ne peut les compter.
  - type: text
    content: Ils sont aussi nombreux que les morceaux de sable au bord de la mer.
  - type: text
    content: Mais Dieu n’en sauvera que quelques‑uns.
  '28':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu achèvera rapidement son travail.'
  - type: text
    content: Il a averti son peuple de ce qu’il allait faire.
  - type: text
    content: Et il le punira complètement.
  '29':
  - type: text
    content: 'Ésaïe avait déjà dit ceci :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' d’une grande puissance a laissé certains de nos enfants vivre.'
  - type: text
    content: S’il ne l’avait pas fait, aucun descendant ne restera.
  - type: text
    content: Nous serions devenus comme les habitants de Sodome et Gomorrhe.
  '3':
  - type: text
    content: J’appartiens à la même famille qu’eux. Ils sont mon propre peuple. Je veux vraiment qu’ils croient aussi en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Si cela pouvait les aider, je pourrais même demander à Dieu de me maudire. Je lui demanderais de me séparer de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '30':
  - type: text
    content: 'Donc, nous devons réfléchir à ce que tout cela signifie. Les non '
  - type: text
    content: Juifs
  - type: text
    content: ' n’essayaient pas de devenir justes avec Dieu. Mais certains d’entre eux sont maintenant justes avec lui. Dieu les a acceptés comme justes, parce qu’ils ont cru en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Mais le peuple d’Israël a essayé de trouver une loi qui le rendra juste avec Dieu. Mais ils n’ont pas réussi à devenir justes avec Dieu. '
  '32':
  - type: text
    content: Ils ont échoué parce qu’ils refusaient de croire en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Au lieu de cela, ils essayaient de faire certaines choses pour que Dieu les accepte. À cause de cela, ils sont tombés au sol. Leurs pieds ont cogné la pierre qui fait tomber les gens. '
  '33':
  - type: text
    content: 'Il est dit ceci dans la Bible :'
  - type: text
    content: 'Écoutez, je mets une pierre spéciale à '
  - type: text
    content: Sion
  - type: text
    content: .
  - type: text
    content: Cette pierre fera tomber les gens au sol.
  - type: text
    content: 'C’est un '
  - type: text
    content: rocher
  - type: text
    content: ' qui les fera tomber.'
  - type: text
    content: Mais quiconque croit en lui ne sera jamais déçu.
  '4':
  - type: text
    content: 'Ce sont des '
  - type: text
    content: Israélites
  - type: text
    content: . Dieu les a choisis pour lui appartenir comme ses propres enfants. Il leur a montré qu’il était très grand. Il a conclu de nombreux accords avec eux et leur a donné sa loi. Il leur a montré comment ils devaient l’
  - type: text
    content: adorer
  - type: text
    content: '. Il leur a promis beaucoup de bonnes choses. '
  '5':
  - type: text
    content: Ce sont leurs ancêtres que Dieu a choisis de faire grands, il y a de nombreuses années. Et Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même, en tant qu’homme, est né dans une famille '
  - type: text
    content: israélite
  - type: text
    content: . Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est Dieu, qui règne sur toutes choses. Nous devons le louer pour toujours ! C’est vrai ! Amen.'
  '6':
  - type: text
    content: 'Dieu a promis de bonnes choses au peuple d’Israël. Mais je ne dis pas que ce que Dieu a promis ne s’est pas produit. Il est clair que tout le peuple d’Israël n’est pas le vrai peuple de Dieu. '
  '7':
  - type: text
    content: 'Tous ne sont pas de vrais descendants d’Abraham. Dieu a dit à Abraham : C’est seulement ton fils Isaac que j’appellerai le père de tes descendants.'
  '8':
  - type: text
    content: 'Cela signifie que tous les enfants d’Abraham ne sont pas vraiment les enfants de Dieu. Ce ne sont que ces enfants qui sont nés à la suite de la promesse de Dieu. Ce sont seulement les gens que Dieu appelle de vrais descendants. '
  '9':
  - type: text
    content: 'Voici ce que Dieu a promis à Abraham : À ce temps de l’année prochaine, je reviendrai. Alors Sara, ta femme, aura un fils.'
