document_id: REV.15
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 15
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' aux derniers malheurs'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis j’ai vu une autre chose très surprenante dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. J’ai vu 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' avec 7 mauvais malheurs pour rendre les gens très malades. Ce sont les derniers malheurs. Quand ils auront fini, Dieu ne sera plus en colère.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis j’ai vu ce qui semblait être une mer de verre. Le feu y était mêlé. J’ai aussi vu des gens qui se tenaient au bord de la mer de verre. Ces gens avaient combattu l’animal et son idole, et le nombre qui signifie son nom. Ils s’étaient battus et avaient gagné. Dieu leur avait donné des harpes. Ils tenaient les harpes pour faire de la musique. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Maintenant, ils ont chanté le cantique du serviteur de Dieu, Moïse, et le cantique de l’Agneau. Ils ont chanté ceci :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu avec toute puissance,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que tu fais est génial et surprenant !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout ce que tu fais est complètement juste et honnête.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es le roi de tous les pays du monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tout le monde te servira, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils diront à quel point ton nom est grand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car seul tu es complètement bon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des gens de tous les pays ont vu ce que tu fais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu fais toujours ce qui est bien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors tout le monde viendra et se tiendra devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils t’adoreront.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Après cela, j’ai regardé à nouveau. J’ai vu que de la maison de Dieu (temple) au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' était ouverte. Cette maison est comme la tente de Dieu, où il vivait parmi son peuple dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' avec les 7 malheurs sont alors sortis de la maison de Dieu. Ils portaient des vêtements propres et lumineux faits de lin. Ils avaient des ceintures d’or autour de la partie supérieure de leur corps. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors l’un des 4 êtres vivants a donné 7 coupes d’or aux 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. Dieu avait versé sa colère dans ces coupes. Il est le Dieu vivant pour toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors la maison de Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' est devenue pleine de fumée. Cela montrait que Dieu était là. Cela montrait qu’il était grand et puissant. En conséquence, personne ne pouvait entrer dans la maison de Dieu avant la fin des 7 malheurs. Les 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' apportaient ces derniers malheurs.'
