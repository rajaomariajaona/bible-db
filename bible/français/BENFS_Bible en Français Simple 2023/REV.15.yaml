document_id: REV.15,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 15
  - type: heading
    content: Les 7 anges aux derniers malheurs
  - type: text
    content: 'Puis j’ai vu une autre chose très surprenante dans le '
  - type: text
    content: ciel
  - type: text
    content: '. J’ai vu 7 '
  - type: text
    content: anges
  - type: text
    content: ' avec 7 mauvais malheurs pour rendre les gens très malades. Ce sont les derniers malheurs. Quand ils auront fini, Dieu ne sera plus en colère.'
  '2':
  - type: text
    content: 'Puis j’ai vu ce qui semblait être une mer de verre. Le feu y était mêlé. J’ai aussi vu des gens qui se tenaient au bord de la mer de verre. Ces gens avaient combattu l’animal et son idole, et le nombre qui signifie son nom. Ils s’étaient battus et avaient gagné. Dieu leur avait donné des harpes. Ils tenaient les harpes pour faire de la musique. '
  '3':
  - type: text
    content: 'Maintenant, ils ont chanté le cantique du serviteur de Dieu, Moïse, et le cantique de l’Agneau. Ils ont chanté ceci :'
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu avec toute puissance,'
  - type: text
    content: Ce que tu fais est génial et surprenant !
  - type: text
    content: Tout ce que tu fais est complètement juste et honnête.
  - type: text
    content: Tu es le roi de tous les pays du monde.
  '4':
  - type: text
    content: 'Tout le monde te servira, '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ils diront à quel point ton nom est grand,
  - type: text
    content: Car seul tu es complètement bon.
  - type: text
    content: Des gens de tous les pays ont vu ce que tu fais.
  - type: text
    content: Tu fais toujours ce qui est bien.
  - type: text
    content: Alors tout le monde viendra et se tiendra devant toi,
  - type: text
    content: Et ils t’adoreront.
  '5':
  - type: text
    content: 'Après cela, j’ai regardé à nouveau. J’ai vu que de la maison de Dieu (temple) au '
  - type: text
    content: ciel
  - type: text
    content: ' était ouverte. Cette maison est comme la tente de Dieu, où il vivait parmi son peuple dans le '
  - type: text
    content: désert
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Les 7 '
  - type: text
    content: anges
  - type: text
    content: ' avec les 7 malheurs sont alors sortis de la maison de Dieu. Ils portaient des vêtements propres et lumineux faits de lin. Ils avaient des ceintures d’or autour de la partie supérieure de leur corps. '
  '7':
  - type: text
    content: 'Alors l’un des 4 êtres vivants a donné 7 coupes d’or aux 7 '
  - type: text
    content: anges
  - type: text
    content: '. Dieu avait versé sa colère dans ces coupes. Il est le Dieu vivant pour toujours. '
  '8':
  - type: text
    content: 'Alors la maison de Dieu dans le '
  - type: text
    content: ciel
  - type: text
    content: ' est devenue pleine de fumée. Cela montrait que Dieu était là. Cela montrait qu’il était grand et puissant. En conséquence, personne ne pouvait entrer dans la maison de Dieu avant la fin des 7 malheurs. Les 7 '
  - type: text
    content: anges
  - type: text
    content: ' apportaient ces derniers malheurs.'
