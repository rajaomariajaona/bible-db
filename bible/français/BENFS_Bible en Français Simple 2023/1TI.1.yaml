document_id: 1TI.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Paul dit bonjour à Timothée
  - type: text
    content: 'C’est moi Paul qui écris cette lettre. Je suis '
  - type: text
    content: apôtre
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Dieu est celui qui nous sauve. Nous croyons en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' pour prendre soin de nous. Ce sont eux qui m’ont choisi pour être '
  - type: text
    content: apôtre
  - type: text
    content: .
  '10':
  - type: text
    content: Les gens qui ont de mauvaises relations sexuelles. Les hommes qui ont des relations sexuelles avec d’autres hommes. Les gens qui attrapent d’autres personnes et les emmènent comme esclaves. Les gens qui disent des mensonges. Les gens qui promettent de dire ce qui est vrai, mais qui disent ensuite des mensonges. Les gens qui font d’autres mauvaises choses qui sont contre le vrai message de Dieu.
  '11':
  - type: text
    content: Ce vrai message est la Bonne Nouvelle qui vient de notre grand Dieu. Nous le félicitons pour cela. Il m’a choisi pour annoncer cette Bonne Nouvelle aux gens.
  - type: heading
    content: Paul remercie Jésus‑Christ
  '12':
  - type: text
    content: Je remercie Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' notre '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui m’a rendu fort pour le servir. Il a décidé de me faire confiance et il m’a choisi pour travailler en son nom. '
  '13':
  - type: text
    content: 'Avant qu’il me choisisse, je disais de mauvaises choses contre lui. Je causais beaucoup de problèmes à son peuple. J’étais un homme cruel, mais Dieu était très gentil avec moi. Il m’a pardonné, parce que je ne savais pas ce que je faisais. C’était parce que je ne croyais pas en Jésus. '
  '14':
  - type: text
    content: 'Notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' a continué d’être très bon et gentil avec moi. Il m’a fait croire en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' et l’aimer.'
  '15':
  - type: text
    content: 'Voici un vrai message auquel tout le monde devrait croire : Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est venu au monde pour sauver les gens qui font de mauvaises choses. Je suis le pire des gens comme ça ! '
  '16':
  - type: text
    content: Mais, parce que j’étais très mauvais, Dieu a été bon envers moi. Ensuite, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a pu montrer à quel point il était patient avec une personne aussi mauvaise que moi. Ce serait un exemple pour ces gens qui croiraient plus tard en lui et recevraient la vie pour toujours avec Dieu.'
  '17':
  - type: text
    content: Louez Dieu, le roi qui règne pour toujours ! Il ne peut jamais mourir. Il vit là où nous ne pouvons pas le voir. Il est le seul Dieu. Alors, tout le monde devrait glorifier et dire à quel point il est grand ! C’est vrai pour toujours ! Amen !
  - type: heading
    content: Timothée doit être un bon responsable dans l’Église
  '18':
  - type: text
    content: 'Timothée, tu es comme mon propre enfant. Alors maintenant, je te dis de bien servir Dieu. Rappelle‑toi les paroles de Dieu que les gens ont dites sur toi, lorsque tu es devenu un serviteur de Dieu. Ces paroles t’aideront à être fort. Tu seras comme un soldat qui se bat bien. '
  '19':
  - type: text
    content: Tu dois continuer de faire confiance en Dieu. Fais toujours les choses que tu sais être justes. Certaines gens ont refusé de faire ce qui est bien, même quand ils le savent. En conséquence, ils ne croient plus au vrai message de Dieu.
  '2':
  - type: text
    content: Je t’écris, Timothée. Je t’ai dit le message de Jésus et tu as cru en lui. Tu es donc comme mon propre enfant.
  - type: text
    content: Je prie pour que Dieu le Père et Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' continuent de t’aider et d’être gentils envers toi. Je prie pour qu’ils te donnent la paix dans ton '
  - type: text
    content: esprit
  - type: text
    content: .
  - type: heading
    content: Paul dit à Timothée d’arrêter les mauvais enseignants
  '20':
  - type: text
    content: Hyménée et Alexandre sont des gens comme ça. Je les ai donnés à Satan pour qu’il les punisse. Ensuite, ils peuvent apprendre à ne plus dire de mauvaises choses contre Dieu.
  '3':
  - type: text
    content: Quand j’allais en Macédoine, je t’ai demandé de rester à Éphèse. Continue de rester là. Certaines personnes à Éphèse enseignent de mauvaises choses sur Dieu. Vous devez leur dire d’arrêter de faire ça.
  '4':
  - type: text
    content: Dis aux gens de ne pas écouter de fausses histoires. Ils ne devraient pas toujours étudier de longues listes de noms de famille, d’il y a des années. Ces choses n’aident pas les gens. De telles choses créent seulement des disputes entre eux. Mais, ils doivent comprendre le plan de Dieu pour nous. Alors, les gens doivent lui faire confiance.
  '5':
  - type: text
    content: 'Nous devons enseigner aux gens de s’aimer vraiment. Alors, les gens doivent avoir de bonnes pensées. Ils ont besoin de savoir qu’ils vivent bien. Et ils ont besoin de croire entièrement en Dieu. '
  '6':
  - type: text
    content: 'Mais certaines gens n’ont pas réussi à vivre de cette façon. Ils préfèrent se disputer sur des choses qui n’aident personne. '
  '7':
  - type: text
    content: Ils veulent être des enseignants de la loi de Dieu. Ils parlent très fortement, mais ils ne comprennent pas vraiment de quoi ils parlent.
  - type: heading
    content: Le but de la loi de Dieu
  '8':
  - type: text
    content: 'Nous savons que la loi de Dieu est bonne, si les gens l’utilisent correctement. '
  '9':
  - type: text
    content: 'Nous savons aussi que Dieu n’a pas fait ces lois pour les gens qui vivent d’une manière juste. Il les a faites pour de mauvaises personnes. C’était pour leur montrer ce qui est bien. Ces gens sont, par exemple, les gens qui refusent d’obéir aux lois. Les gens qui ne veulent pas que quelqu’un les dirige. Les gens qui refusent d’obéir à Dieu. Les gens qui aiment faire de mauvaises choses. Les gens qui ne respectent pas les bonnes choses de Dieu. Les gens qui tuent leur père ou leur mère. Les gens qui choisissent de tuer d’autres personnes. '
