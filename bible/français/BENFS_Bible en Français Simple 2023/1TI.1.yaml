document_id: 1TI.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit bonjour à Timothée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est moi Paul qui écris cette lettre. Je suis '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Dieu est celui qui nous sauve. Nous croyons en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' pour prendre soin de nous. Ce sont eux qui m’ont choisi pour être '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je t’écris, Timothée. Je t’ai dit le message de Jésus et tu as cru en lui. Tu es donc comme mon propre enfant.
- type: usfm
  marker: p
  children:
  - type: text
    text: Je prie pour que Dieu le Père et Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' continuent de t’aider et d’être gentils envers toi. Je prie pour qu’ils te donnent la paix dans ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit à Timothée d’arrêter les mauvais enseignants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand j’allais en Macédoine, je t’ai demandé de rester à Éphèse. Continue de rester là. Certaines personnes à Éphèse enseignent de mauvaises choses sur Dieu. Vous devez leur dire d’arrêter de faire ça.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dis aux gens de ne pas écouter de fausses histoires. Ils ne devraient pas toujours étudier de longues listes de noms de famille, d’il y a des années. Ces choses n’aident pas les gens. De telles choses créent seulement des disputes entre eux. Mais, ils doivent comprendre le plan de Dieu pour nous. Alors, les gens doivent lui faire confiance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous devons enseigner aux gens de s’aimer vraiment. Alors, les gens doivent avoir de bonnes pensées. Ils ont besoin de savoir qu’ils vivent bien. Et ils ont besoin de croire entièrement en Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais certaines gens n’ont pas réussi à vivre de cette façon. Ils préfèrent se disputer sur des choses qui n’aident personne. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils veulent être des enseignants de la loi de Dieu. Ils parlent très fortement, mais ils ne comprennent pas vraiment de quoi ils parlent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le but de la loi de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous savons que la loi de Dieu est bonne, si les gens l’utilisent correctement. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous savons aussi que Dieu n’a pas fait ces lois pour les gens qui vivent d’une manière juste. Il les a faites pour de mauvaises personnes. C’était pour leur montrer ce qui est bien. Ces gens sont, par exemple, les gens qui refusent d’obéir aux lois. Les gens qui ne veulent pas que quelqu’un les dirige. Les gens qui refusent d’obéir à Dieu. Les gens qui aiment faire de mauvaises choses. Les gens qui ne respectent pas les bonnes choses de Dieu. Les gens qui tuent leur père ou leur mère. Les gens qui choisissent de tuer d’autres personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les gens qui ont de mauvaises relations sexuelles. Les hommes qui ont des relations sexuelles avec d’autres hommes. Les gens qui attrapent d’autres personnes et les emmènent comme esclaves. Les gens qui disent des mensonges. Les gens qui promettent de dire ce qui est vrai, mais qui disent ensuite des mensonges. Les gens qui font d’autres mauvaises choses qui sont contre le vrai message de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ce vrai message est la Bonne Nouvelle qui vient de notre grand Dieu. Nous le félicitons pour cela. Il m’a choisi pour annoncer cette Bonne Nouvelle aux gens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul remercie Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je remercie Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui m’a rendu fort pour le servir. Il a décidé de me faire confiance et il m’a choisi pour travailler en son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Avant qu’il me choisisse, je disais de mauvaises choses contre lui. Je causais beaucoup de problèmes à son peuple. J’étais un homme cruel, mais Dieu était très gentil avec moi. Il m’a pardonné, parce que je ne savais pas ce que je faisais. C’était parce que je ne croyais pas en Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a continué d’être très bon et gentil avec moi. Il m’a fait croire en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' et l’aimer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici un vrai message auquel tout le monde devrait croire : Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est venu au monde pour sauver les gens qui font de mauvaises choses. Je suis le pire des gens comme ça ! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais, parce que j’étais très mauvais, Dieu a été bon envers moi. Ensuite, Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a pu montrer à quel point il était patient avec une personne aussi mauvaise que moi. Ce serait un exemple pour ces gens qui croiraient plus tard en lui et recevraient la vie pour toujours avec Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Louez Dieu, le roi qui règne pour toujours ! Il ne peut jamais mourir. Il vit là où nous ne pouvons pas le voir. Il est le seul Dieu. Alors, tout le monde devrait glorifier et dire à quel point il est grand ! C’est vrai pour toujours ! Amen !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Timothée doit être un bon responsable dans l’Église
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Timothée, tu es comme mon propre enfant. Alors maintenant, je te dis de bien servir Dieu. Rappelle‑toi les paroles de Dieu que les gens ont dites sur toi, lorsque tu es devenu un serviteur de Dieu. Ces paroles t’aideront à être fort. Tu seras comme un soldat qui se bat bien. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu dois continuer de faire confiance en Dieu. Fais toujours les choses que tu sais être justes. Certaines gens ont refusé de faire ce qui est bien, même quand ils le savent. En conséquence, ils ne croient plus au vrai message de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hyménée et Alexandre sont des gens comme ça. Je les ai donnés à Satan pour qu’il les punisse. Ensuite, ils peuvent apprendre à ne plus dire de mauvaises choses contre Dieu.
