document_id: JHN.9
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 9
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus rend un homme capable de voir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus marchait le long de la route. Il a vu un homme. Cet homme avait été incapable de voir depuis sa naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus lui ont demandé : Maître, pourquoi cet homme est né incapable de voir ? Était‑ce parce qu’il faisait du mal ? Ou c’était parce que ses parents ont fait quelque chose de mal ? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a répondu : Non ce n’est pas parce que cet homme ou ses parents ont fait quelque chose de mal. Cela est arrivé pour que Dieu puisse montrer son travail dans cet homme. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant qu’il est encore jour, je dois continuer à travailler. Je dois faire le travail de celui qui m’a envoyé. Je dois travailler maintenant, parce que ce sera la nuit bientôt. Ensuite, personne ne peut travailler. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pendant que je suis dans le monde, je suis la lumière du monde. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus a fini de parler. Il a craché sur le sol. Il a mélangé la salive sur le sol pour faire de la boue. Puis il a mis une partie de la boue sur les yeux de l’homme qui ne voyait pas. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui a dit : Va te laver dans la piscine de Siloé. (Le nom Siloé signifie envoyé.) Donc, l’homme est allé là‑bas. Il s’est lavé. Quand il est revenu, il pouvait voir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ensuite, les gens qui connaissaient l’homme ont commencé à parler de lui. Aussi, les gens qui l’avaient vu avant parlaient de lui aux autres. Ils l’avaient vu quand il demandait de l’argent. Ils demandaient : Est‑ce l’homme qui était assis ici ? Est‑ce l’homme qui demandait de l’argent ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Certaines personnes ont dit : Oui, c’est lui. Mais d’autres personnes ont dit : Non, c’est quelqu’un qui est très semblable à lui. Donc, l’homme lui‑même a dit : Je suis cet homme. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils lui ont dit : Comment as‑tu pu voir ? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il a répondu : L’homme qu’on appelle Jésus a fait de la boue. Il a mis la boue sur mes yeux. Puis il m’a envoyé me laver à la piscine de Siloé. Alors je suis allé là‑bas et je me suis lavé. Et puis, je pouvais voir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils lui ont demandé : Où est cet homme ? Il a répondu : Je ne sais pas.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' parlent à l’homme qui avait été incapable de voir'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les gens ont amené cet homme voir les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus l’a guéri le jour de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabbat
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont encore demandé à l’homme : Comment as‑tu pu voir ? L’homme a répondu : Jésus a mis de la boue sur mes yeux. Ensuite, je me suis lavé, et maintenant je peux voir. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors quelques‑uns des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' disaient : Cet homme (Jésus) ne peut pas venir de Dieu. Il ne respecte pas la loi sur le jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sabbat
  - type: text
    text: '. Mais d’autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' disaient : Une personne qui fait du mal ne peut pas faire de grandes choses comme ça ! Donc, ils n’étaient pas d’accord les uns avec les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont parlé à nouveau à l’homme. Ils ont dit : Qu’est‑ce que tu dis toi‑même sur cet homme qui t’a fait voir ? L’homme a répondu : Il est un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne voulaient pas croire que l’homme était aveugle. Ils ne voulaient pas croire que l’homme commençait à voir. Ainsi, ils ont envoyé des gens pour demander aux parents de l’homme de venir à eux. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils ont demandé aux parents : Est‑ce votre fils ? Quand il est né, il était incapable de voir. Mais maintenant, il peut voir. Comment cela est‑il arrivé ? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les parents ont répondu : Nous savons qu’il est notre fils. Il est né sans voir. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais nous ne savons pas comment il peut voir maintenant. Et nous ne savons pas qui l’a fait capable de voir. Demandez‑lui. Il est assez grand. Il peut répondre ! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ses parents ont dit ces choses parce qu’ils avaient peur des dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: '. Les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne voulaient pas qu’on dise que Jésus était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Ils avaient déjà accepté de punir toute personne qui dit cela. Les dirigeants ne voulaient pas laisser une telle personne membre de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: synagogue
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voilà pourquoi les parents de l’homme ont dit : Demandez‑lui. Il est assez grand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi, les dirigeants ont demandé à nouveau de parler à l’homme qui était aveugle. Ils lui ont dit : Promets devant Dieu que tu vas parler des choses vraies. Nous savons que cet homme est un pécheur. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’homme a répondu : Je ne sais pas s’il est un pécheur ou non. Mais je sais une chose. Je ne pouvais pas voir et maintenant je peux voir. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils lui ont dit : Qu’est‑ce qu’il a fait ? Comment a‑t‑il fait pour que tu puisses voir ? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il leur a répondu : Je vous ai déjà dit et vous ne m’écoutez pas. Pourquoi voulez‑vous l’entendre encore ? Voulez‑vous devenir ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' aussi ? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils étaient très en colère contre lui. Ils criaient : Tu es un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' de cet homme. Mais nous, nous sommes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nous savons que Dieu a parlé à Moïse. Mais nous ne savons même pas d’où cet homme vient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L’homme a répondu : Voilà une chose très étrange ! Vous ne savez pas d’où Jésus vient. Mais c’était lui qui m’a fait capable de voir. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nous savons que Dieu n’écoute pas les pécheurs. Mais Dieu écoute certaines personnes : les gens qui le prennent avec valeur. Les gens qui font ce qu’il veut qu’ils fassent, il écoute ces personnes. Nous savons cela. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Personne n’a jamais entendu un aveugle de naissance parvenir à voir. Depuis le commencement du monde, personne n’a jamais fait cela ! '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Assurément, cet homme qui m’a fait capable de voir est venu de Dieu. Sinon, il ne pouvait rien faire. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' ont répondu : Tu as toujours été un pécheur, depuis le jour où tu es né. Tu ne peux pas essayer de nous enseigner ! Et ils l’ont jeté dehors.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est venu pour amener les gens à vraiment voir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus a appris que les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' avaient jeté l’homme dehors. Ainsi, il a trouvé l’homme. Et Jésus lui a demandé : Crois‑tu au Fils de l’homme ? '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'L’homme a répondu : S’il te plaît, qui est le Fils de l’homme ? Dis‑moi, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', pour que je puisse croire en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus lui a dit : Tu l’as vu. Il est celui qui te parle maintenant. Je le suis. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors l’homme a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', je crois. Il s’est penché sur ses genoux. Il a adoré Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Alors Jésus a dit : Je suis venu dans ce monde pour montrer ce que les gens sont vraiment. Alors, les gens qui ne voient pas pourront voir. Et les gens qui voient ne pourront plus voir. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' étaient là avec lui. Ils ont entendu cela. Ils ont demandé à Jésus : Nous ne voyons pas non plus ? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jésus leur a dit : Si vous étiez incapables de voir, vous n’alliez pas faire du mal. Mais vous dites que vous pouvez voir. Donc, cela signifie que vous continuez d’être dans le mal.'
