document_id: JHN.9,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 9
  - type: heading
    content: Jésus rend un homme capable de voir
  - type: text
    content: 'Jésus marchait le long de la route. Il a vu un homme. Cet homme avait été incapable de voir depuis sa naissance. '
  '10':
  - type: text
    content: 'Ils lui ont dit : Comment as‑tu pu voir ? '
  '11':
  - type: text
    content: 'Il a répondu : L’homme qu’on appelle Jésus a fait de la boue. Il a mis la boue sur mes yeux. Puis il m’a envoyé me laver à la piscine de Siloé. Alors je suis allé là‑bas et je me suis lavé. Et puis, je pouvais voir. '
  '12':
  - type: text
    content: 'Ils lui ont demandé : Où est cet homme ? Il a répondu : Je ne sais pas.'
  - type: heading
    content: Les Pharisiens parlent à l’homme qui avait été incapable de voir
  '13':
  - type: text
    content: 'Les gens ont amené cet homme voir les '
  - type: text
    content: Pharisiens
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Jésus l’a guéri le jour de '
  - type: text
    content: sabbat
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Alors les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont encore demandé à l’homme : Comment as‑tu pu voir ? L’homme a répondu : Jésus a mis de la boue sur mes yeux. Ensuite, je me suis lavé, et maintenant je peux voir. '
  '16':
  - type: text
    content: 'Alors quelques‑uns des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' disaient : Cet homme (Jésus) ne peut pas venir de Dieu. Il ne respecte pas la loi sur le jour du '
  - type: text
    content: sabbat
  - type: text
    content: '. Mais d’autres '
  - type: text
    content: Pharisiens
  - type: text
    content: ' disaient : Une personne qui fait du mal ne peut pas faire de grandes choses comme ça ! Donc, ils n’étaient pas d’accord les uns avec les autres. '
  '17':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont parlé à nouveau à l’homme. Ils ont dit : Qu’est‑ce que tu dis toi‑même sur cet homme qui t’a fait voir ? L’homme a répondu : Il est un '
  - type: text
    content: prophète
  - type: text
    content: .
  '18':
  - type: text
    content: 'Les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' ne voulaient pas croire que l’homme était aveugle. Ils ne voulaient pas croire que l’homme commençait à voir. Ainsi, ils ont envoyé des gens pour demander aux parents de l’homme de venir à eux. '
  '19':
  - type: text
    content: 'Ils ont demandé aux parents : Est‑ce votre fils ? Quand il est né, il était incapable de voir. Mais maintenant, il peut voir. Comment cela est‑il arrivé ? '
  '2':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus lui ont demandé : Maître, pourquoi cet homme est né incapable de voir ? Était‑ce parce qu’il faisait du mal ? Ou c’était parce que ses parents ont fait quelque chose de mal ? '
  '20':
  - type: text
    content: 'Les parents ont répondu : Nous savons qu’il est notre fils. Il est né sans voir. '
  '21':
  - type: text
    content: 'Mais nous ne savons pas comment il peut voir maintenant. Et nous ne savons pas qui l’a fait capable de voir. Demandez‑lui. Il est assez grand. Il peut répondre ! '
  '22':
  - type: text
    content: 'Ses parents ont dit ces choses parce qu’ils avaient peur des dirigeants '
  - type: text
    content: juifs
  - type: text
    content: '. Les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' ne voulaient pas qu’on dise que Jésus était le '
  - type: text
    content: Christ
  - type: text
    content: '. Ils avaient déjà accepté de punir toute personne qui dit cela. Les dirigeants ne voulaient pas laisser une telle personne membre de la '
  - type: text
    content: synagogue
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Voilà pourquoi les parents de l’homme ont dit : Demandez‑lui. Il est assez grand.'
  '24':
  - type: text
    content: 'Ainsi, les dirigeants ont demandé à nouveau de parler à l’homme qui était aveugle. Ils lui ont dit : Promets devant Dieu que tu vas parler des choses vraies. Nous savons que cet homme est un pécheur. '
  '25':
  - type: text
    content: 'L’homme a répondu : Je ne sais pas s’il est un pécheur ou non. Mais je sais une chose. Je ne pouvais pas voir et maintenant je peux voir. '
  '26':
  - type: text
    content: 'Ils lui ont dit : Qu’est‑ce qu’il a fait ? Comment a‑t‑il fait pour que tu puisses voir ? '
  '27':
  - type: text
    content: 'Il leur a répondu : Je vous ai déjà dit et vous ne m’écoutez pas. Pourquoi voulez‑vous l’entendre encore ? Voulez‑vous devenir ses '
  - type: text
    content: disciples
  - type: text
    content: ' aussi ? '
  '28':
  - type: text
    content: 'Ils étaient très en colère contre lui. Ils criaient : Tu es un '
  - type: text
    content: disciple
  - type: text
    content: ' de cet homme. Mais nous, nous sommes '
  - type: text
    content: disciples
  - type: text
    content: ' de Moïse. '
  '29':
  - type: text
    content: Nous savons que Dieu a parlé à Moïse. Mais nous ne savons même pas d’où cet homme vient.
  '3':
  - type: text
    content: 'Jésus a répondu : Non ce n’est pas parce que cet homme ou ses parents ont fait quelque chose de mal. Cela est arrivé pour que Dieu puisse montrer son travail dans cet homme. '
  '30':
  - type: text
    content: 'L’homme a répondu : Voilà une chose très étrange ! Vous ne savez pas d’où Jésus vient. Mais c’était lui qui m’a fait capable de voir. '
  '31':
  - type: text
    content: 'Nous savons que Dieu n’écoute pas les pécheurs. Mais Dieu écoute certaines personnes : les gens qui le prennent avec valeur. Les gens qui font ce qu’il veut qu’ils fassent, il écoute ces personnes. Nous savons cela. '
  '32':
  - type: text
    content: 'Personne n’a jamais entendu un aveugle de naissance parvenir à voir. Depuis le commencement du monde, personne n’a jamais fait cela ! '
  '33':
  - type: text
    content: 'Assurément, cet homme qui m’a fait capable de voir est venu de Dieu. Sinon, il ne pouvait rien faire. '
  '34':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' ont répondu : Tu as toujours été un pécheur, depuis le jour où tu es né. Tu ne peux pas essayer de nous enseigner ! Et ils l’ont jeté dehors.'
  - type: heading
    content: Jésus est venu pour amener les gens à vraiment voir
  '35':
  - type: text
    content: 'Jésus a appris que les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' avaient jeté l’homme dehors. Ainsi, il a trouvé l’homme. Et Jésus lui a demandé : Crois‑tu au Fils de l’homme ? '
  '36':
  - type: text
    content: 'L’homme a répondu : S’il te plaît, qui est le Fils de l’homme ? Dis‑moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour que je puisse croire en lui. '
  '37':
  - type: text
    content: 'Jésus lui a dit : Tu l’as vu. Il est celui qui te parle maintenant. Je le suis. '
  '38':
  - type: text
    content: 'Alors l’homme a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je crois. Il s’est penché sur ses genoux. Il a adoré Jésus. '
  '39':
  - type: text
    content: 'Alors Jésus a dit : Je suis venu dans ce monde pour montrer ce que les gens sont vraiment. Alors, les gens qui ne voient pas pourront voir. Et les gens qui voient ne pourront plus voir. '
  '4':
  - type: text
    content: 'Pendant qu’il est encore jour, je dois continuer à travailler. Je dois faire le travail de celui qui m’a envoyé. Je dois travailler maintenant, parce que ce sera la nuit bientôt. Ensuite, personne ne peut travailler. '
  '40':
  - type: text
    content: 'Certains '
  - type: text
    content: Pharisiens
  - type: text
    content: ' étaient là avec lui. Ils ont entendu cela. Ils ont demandé à Jésus : Nous ne voyons pas non plus ? '
  '41':
  - type: text
    content: 'Jésus leur a dit : Si vous étiez incapables de voir, vous n’alliez pas faire du mal. Mais vous dites que vous pouvez voir. Donc, cela signifie que vous continuez d’être dans le mal.'
  '5':
  - type: text
    content: 'Pendant que je suis dans le monde, je suis la lumière du monde. '
  '6':
  - type: text
    content: 'Jésus a fini de parler. Il a craché sur le sol. Il a mélangé la salive sur le sol pour faire de la boue. Puis il a mis une partie de la boue sur les yeux de l’homme qui ne voyait pas. '
  '7':
  - type: text
    content: 'Jésus lui a dit : Va te laver dans la piscine de Siloé. (Le nom Siloé signifie envoyé.) Donc, l’homme est allé là‑bas. Il s’est lavé. Quand il est revenu, il pouvait voir.'
  '8':
  - type: text
    content: 'Ensuite, les gens qui connaissaient l’homme ont commencé à parler de lui. Aussi, les gens qui l’avaient vu avant parlaient de lui aux autres. Ils l’avaient vu quand il demandait de l’argent. Ils demandaient : Est‑ce l’homme qui était assis ici ? Est‑ce l’homme qui demandait de l’argent ? '
  '9':
  - type: text
    content: 'Certaines personnes ont dit : Oui, c’est lui. Mais d’autres personnes ont dit : Non, c’est quelqu’un qui est très semblable à lui. Donc, l’homme lui‑même a dit : Je suis cet homme. '
