document_id: LUK.15,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 15
  - type: text
    content: 'Un jour, il y avait de mauvaises personnes. Elles sont toutes allées autour de Jésus. Parmi ces gens, certains percevaient de l’argent au nom du gouvernement. Ils voulaient tous entendre ce que Jésus disait. '
  '10':
  - type: text
    content: 'La même chose arrive quand une personne se tourne vers Dieu. Cela rend les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu très heureux.'
  - type: heading
    content: Jésus raconte une histoire sur 2 fils
  '11':
  - type: text
    content: 'Jésus a alors dit une autre histoire. Il y avait un homme qui avait 2 fils. '
  '12':
  - type: text
    content: 'Le plus jeune fils est allé auprès de son père. Il lui a dit : Père, donne‑moi maintenant, s’il te plaît, ma part de tes choses. Ainsi, le père a donné aux 2 fils leurs parts de ses choses. '
  '13':
  - type: text
    content: 'Après quelques jours, le plus jeune fils a vendu ce que son père lui avait donné. Puis il a quitté la maison. Il a pris avec lui l’argent et tout ce qu’il avait. Il a fait un long voyage dans un pays lointain. Il a perdu tout son argent là‑bas et il a fait beaucoup de mauvaises choses. '
  '14':
  - type: text
    content: 'Puis, après qu’il a tout dépensé, quelque chose de mauvais est arrivé dans ce pays. Il n’y avait presque pas de nourriture partout. Alors, le jeune homme n’avait rien à manger. '
  '15':
  - type: text
    content: Il est allé auprès d’un homme de ce pays. Il lui a demandé du travail. L’homme l’a envoyé dans ses champs pour garder ses cochons.
  '16':
  - type: text
    content: 'Personne ne lui donnait rien à manger. Donc, il voulait même manger la nourriture que les cochons mangeaient. '
  '17':
  - type: text
    content: 'Alors le fils a commencé à penser à ce qu’il avait fait. Il se disait :'
  - type: text
    content: 'Mon père a beaucoup de serviteurs, et ils ont beaucoup de nourriture à manger. Ils ont même la nourriture supplémentaire. Mais je vais mourir ici parce que je n’ai pas de nourriture. '
  '18':
  - type: text
    content: 'Donc, je vais retourner auprès de mon père. Je vais lui dire : J’ai fait de mauvaises choses contre Dieu. Et je les ai faites contre toi. '
  '19':
  - type: text
    content: 'Donc, je ne suis pas assez bon pour toi de m’appeler ton fils encore. Au lieu de cela, s’il te plaît, accepte‑moi comme l’un de tes serviteurs. '
  '2':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et ceux qui enseignaient les règles de Dieu ne voulaient pas cela. Ils pensaient qu’il était faux pour lui d’être ami avec les gens comme ça. Ils disaient : Cet homme est bon envers les gens qui font de mauvaises choses. Il mange même avec eux dans leurs maisons.'
  - type: heading
    content: Jésus raconte une histoire sur une brebis que l’homme a perdue
  '20':
  - type: text
    content: Alors il s’est levé, et il est retourné auprès de son père. Il était encore loin de la maison. Alors son père l’a vu. Il se sentait très triste pour son fils et il a couru vers lui. Puis il a mis ses bras autour de lui et il l’a embrassé.
  '21':
  - type: text
    content: 'Le fils a dit : Père, j’ai fait de mauvaises choses contre Dieu et contre toi. Donc, je ne mérite plus que tu m’appelles ton fils. '
  '22':
  - type: text
    content: 'Mais le père a crié à ses serviteurs. Il a dit : Dépêchez‑vous ! Cherchez la plus belle robe que nous avons. Mettez‑la sur lui et mettez un anneau sur l’un de ses doigts. Mettez des souliers à ses pieds.'
  '23':
  - type: text
    content: 'Prenez la jeune vache que nous gardons prête à manger pendant un jour spécial. Elle est déjà grasse. Tuez‑la et préparez‑la. Nous allons manger un grand repas et nous serons heureux ensemble. '
  '24':
  - type: text
    content: Je pensais que mon fils ici était mort. Mais maintenant, il est revenu à moi vivant. Je pensais qu’il m’a quitté pour toujours. Mais maintenant, il est venu à la maison. Puis ils ont commencé à être heureux ensemble.
  '25':
  - type: text
    content: 'Quand ces choses se passaient, le fils aîné travaillait dans les champs. Sur son chemin de retour à la maison, il a entendu de la musique. Il a entendu des gens qui dansaient. '
  '26':
  - type: text
    content: 'Alors il a demandé à l’un des serviteurs. Qu’est‑ce qui se passe ? '
  '27':
  - type: text
    content: 'Le serviteur a répondu :'
  - type: text
    content: Ton frère est revenu. Ton père a tué la jeune vache de graisse pour lui. Il a fait cela, parce que ton frère est vivant et bien.
  '28':
  - type: text
    content: 'En entendant cela, il était très en colère. Il ne voulait pas entrer dans la maison. Alors son père est sorti. Il lui a dit : S’il te plaît, entre.'
  '29':
  - type: text
    content: 'Le fils aîné a répondu : Ecoute, je travaille pour toi depuis de nombreuses années. Je t’ai toujours obéi. Mais tu n’as jamais même tué un jeune bouc pour moi. Si tu avais fait cela, je serais heureux avec mes amis. Nous pouvions manger ensemble. '
  '3':
  - type: text
    content: 'Alors Jésus leur a dit cette histoire. '
  '30':
  - type: text
    content: 'Mais maintenant, ton fils est de retour. Il a gaspillé tout l’argent que tu lui avais donné. Il l’a dépensé sur les femmes libres. Mais tu as tué la jeune grosse vache juste pour lui. '
  '31':
  - type: text
    content: 'Son père a dit : Mon fils, tu es toujours avec moi. Tout ce que j’ai, est pour toi. '
  '32':
  - type: text
    content: Nous pensions que ton frère était mort. Mais maintenant, il nous revient en vie. Nous pensions qu’il nous avait quittés pour toujours. Mais maintenant, il est venu à la maison. Donc, nous devons être heureux ensemble.
  '4':
  - type: text
    content: 'Il a dit : Pensez à un homme qui a 100 brebis. Il peut perdre l’une d’elles. Pensez à ce qu’il fait. Il laisse toutes les autres brebis dans un endroit où personne ne vit. Puis il va. Et il va chercher la brebis qu’il a perdue. Il va la chercher jusqu’à ce qu’il la trouve. '
  '5':
  - type: text
    content: 'Quand il trouve la brebis perdue, il sera très heureux. Il va la soulever et la mettre sur ses épaules. '
  '6':
  - type: text
    content: 'Puis il la retourne à la maison. Il parle à tous ses amis et aux gens qui vivent près de lui. Il leur demande de venir à sa maison. Il dit : J’ai trouvé la brebis que j’avais perdue. Alors venez ici et nous pouvons tous être heureux ensemble. '
  '7':
  - type: text
    content: 'La même chose arrive quand quelqu’un laisse de faire de mauvaises choses. Cela le rend très heureux. Ceux qui vivent au '
  - type: text
    content: ciel
  - type: text
    content: ' avec Dieu seront plus heureux pour lui, que pour les nombreuses personnes qui obéissent déjà à Dieu. '
  '8':
  - type: text
    content: 'Maintenant, pensez à une femme qui a 10 pièces de monnaie précieuses. Elle peut perdre l’une d’elles. Pensez à ce qu’elle fait. Elle allume une lampe et elle balaie l’intérieur de sa maison. Elle regarde attentivement jusqu’à ce qu’elle trouve la pièce de monnaie. '
  '9':
  - type: text
    content: 'Puis elle parle à tous ses amis et à ceux qui vivent près d’elle. Elle leur demande de venir à sa maison. Elle dit : J’ai trouvé la pièce que j’avais perdue. Alors venez ici et nous pouvons tous être heureux ensemble.'
