document_id: LUK.15
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour, il y avait de mauvaises personnes. Elles sont toutes allées autour de Jésus. Parmi ces gens, certains percevaient de l’argent au nom du gouvernement. Ils voulaient tous entendre ce que Jésus disait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et ceux qui enseignaient les règles de Dieu ne voulaient pas cela. Ils pensaient qu’il était faux pour lui d’être ami avec les gens comme ça. Ils disaient : Cet homme est bon envers les gens qui font de mauvaises choses. Il mange même avec eux dans leurs maisons.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire sur une brebis que l’homme a perdue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors Jésus leur a dit cette histoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il a dit : Pensez à un homme qui a 100 brebis. Il peut perdre l’une d’elles. Pensez à ce qu’il fait. Il laisse toutes les autres brebis dans un endroit où personne ne vit. Puis il va. Et il va chercher la brebis qu’il a perdue. Il va la chercher jusqu’à ce qu’il la trouve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand il trouve la brebis perdue, il sera très heureux. Il va la soulever et la mettre sur ses épaules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis il la retourne à la maison. Il parle à tous ses amis et aux gens qui vivent près de lui. Il leur demande de venir à sa maison. Il dit : J’ai trouvé la brebis que j’avais perdue. Alors venez ici et nous pouvons tous être heureux ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La même chose arrive quand quelqu’un laisse de faire de mauvaises choses. Cela le rend très heureux. Ceux qui vivent au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' avec Dieu seront plus heureux pour lui, que pour les nombreuses personnes qui obéissent déjà à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maintenant, pensez à une femme qui a 10 pièces de monnaie précieuses. Elle peut perdre l’une d’elles. Pensez à ce qu’elle fait. Elle allume une lampe et elle balaie l’intérieur de sa maison. Elle regarde attentivement jusqu’à ce qu’elle trouve la pièce de monnaie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis elle parle à tous ses amis et à ceux qui vivent près d’elle. Elle leur demande de venir à sa maison. Elle dit : J’ai trouvé la pièce que j’avais perdue. Alors venez ici et nous pouvons tous être heureux ensemble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La même chose arrive quand une personne se tourne vers Dieu. Cela rend les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' de Dieu très heureux.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire sur 2 fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus a alors dit une autre histoire. Il y avait un homme qui avait 2 fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le plus jeune fils est allé auprès de son père. Il lui a dit : Père, donne‑moi maintenant, s’il te plaît, ma part de tes choses. Ainsi, le père a donné aux 2 fils leurs parts de ses choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Après quelques jours, le plus jeune fils a vendu ce que son père lui avait donné. Puis il a quitté la maison. Il a pris avec lui l’argent et tout ce qu’il avait. Il a fait un long voyage dans un pays lointain. Il a perdu tout son argent là‑bas et il a fait beaucoup de mauvaises choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis, après qu’il a tout dépensé, quelque chose de mauvais est arrivé dans ce pays. Il n’y avait presque pas de nourriture partout. Alors, le jeune homme n’avait rien à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il est allé auprès d’un homme de ce pays. Il lui a demandé du travail. L’homme l’a envoyé dans ses champs pour garder ses cochons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Personne ne lui donnait rien à manger. Donc, il voulait même manger la nourriture que les cochons mangeaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors le fils a commencé à penser à ce qu’il avait fait. Il se disait :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mon père a beaucoup de serviteurs, et ils ont beaucoup de nourriture à manger. Ils ont même la nourriture supplémentaire. Mais je vais mourir ici parce que je n’ai pas de nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Donc, je vais retourner auprès de mon père. Je vais lui dire : J’ai fait de mauvaises choses contre Dieu. Et je les ai faites contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Donc, je ne suis pas assez bon pour toi de m’appeler ton fils encore. Au lieu de cela, s’il te plaît, accepte‑moi comme l’un de tes serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Alors il s’est levé, et il est retourné auprès de son père. Il était encore loin de la maison. Alors son père l’a vu. Il se sentait très triste pour son fils et il a couru vers lui. Puis il a mis ses bras autour de lui et il l’a embrassé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le fils a dit : Père, j’ai fait de mauvaises choses contre Dieu et contre toi. Donc, je ne mérite plus que tu m’appelles ton fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais le père a crié à ses serviteurs. Il a dit : Dépêchez‑vous ! Cherchez la plus belle robe que nous avons. Mettez‑la sur lui et mettez un anneau sur l’un de ses doigts. Mettez des souliers à ses pieds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Prenez la jeune vache que nous gardons prête à manger pendant un jour spécial. Elle est déjà grasse. Tuez‑la et préparez‑la. Nous allons manger un grand repas et nous serons heureux ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je pensais que mon fils ici était mort. Mais maintenant, il est revenu à moi vivant. Je pensais qu’il m’a quitté pour toujours. Mais maintenant, il est venu à la maison. Puis ils ont commencé à être heureux ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quand ces choses se passaient, le fils aîné travaillait dans les champs. Sur son chemin de retour à la maison, il a entendu de la musique. Il a entendu des gens qui dansaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors il a demandé à l’un des serviteurs. Qu’est‑ce qui se passe ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le serviteur a répondu :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ton frère est revenu. Ton père a tué la jeune vache de graisse pour lui. Il a fait cela, parce que ton frère est vivant et bien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'En entendant cela, il était très en colère. Il ne voulait pas entrer dans la maison. Alors son père est sorti. Il lui a dit : S’il te plaît, entre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le fils aîné a répondu : Ecoute, je travaille pour toi depuis de nombreuses années. Je t’ai toujours obéi. Mais tu n’as jamais même tué un jeune bouc pour moi. Si tu avais fait cela, je serais heureux avec mes amis. Nous pouvions manger ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais maintenant, ton fils est de retour. Il a gaspillé tout l’argent que tu lui avais donné. Il l’a dépensé sur les femmes libres. Mais tu as tué la jeune grosse vache juste pour lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Son père a dit : Mon fils, tu es toujours avec moi. Tout ce que j’ai, est pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nous pensions que ton frère était mort. Mais maintenant, il nous revient en vie. Nous pensions qu’il nous avait quittés pour toujours. Mais maintenant, il est venu à la maison. Donc, nous devons être heureux ensemble.
