    - type: text
      text: '50'
  - type: text
    text: 'Mais les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' parlaient aux hommes importants dans la ville. Ils parlaient aussi à beaucoup de femmes riches qui n’étaient pas Juives. Ces femmes ont cru au Dieu des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Mais les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont influencé ces femmes à être contre Paul. Ils ont aussi influencé les hautes personnalités de la ville à être contre Paul et Barnabas. Alors ils ont poussé les gens à maltraiter Paul et Barnabas. Ils les ont aussi poussés à quitter cette partie du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Paul et Barnabas ont secoué la poussière de leurs pieds. Ceci a prouvé au peuple que cette ville a refusé le message de Dieu. Alors ils ont voyagé à la ville appelée Icone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Le Saint‑Esprit a complètement rempli les '
