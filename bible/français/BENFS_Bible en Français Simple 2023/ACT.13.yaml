  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nous ferons cela parce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a donné ce message pour vous. Il nous a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je vous ai envoyés dehors pour être comme une lumière à ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Vous direz aux gens partout dans le monde comment Dieu sauve des personnes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Les étrangers ou non‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient très heureux quand ils ont entendu ceci. Et ils remerciaient le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' du message au sujet de Jésus. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait choisi certains pour avoir la vie vraie. Et ces gens ont cru en son message.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Beaucoup de gens dans cette partie du pays se disaient le message au sujet de Jésus. '
  - type: usfm
    marker: vlbl
