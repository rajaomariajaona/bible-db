document_id: ACT.13,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Barnabas et Saul reviennent à Antioche
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les croyants d’Antioche envoient Saul et Barnabas à Chypre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' parmi les croyants d’Antioche. Et il y avait également des enseignants de la Parole de Dieu. Ces hommes s’appelaient Barnabas et Siméon. Les gens appelaient également Siméon le Noir. Il y avait également Lucius qui avait vécu à Cyrène. Manahen et Saul étaient également parmi eux. Manahen avait vécu avec le Gouverneur Hérode quand ils étaient des enfants.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es comme un fils de Satan. Tu n’aimes rien de bon. Ton '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' est plein de toutes les mauvaises choses que tu fais. Tu essaies toujours de changer les bonnes choses que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit. Tu dis que ces choses ne sont pas vraies.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' touchera maintenant tes yeux et tu ne verras pas la lumière du jour pendant un certain temps.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immédiatement, quelque chose comme un nuage noir a couvert les yeux d’Elymas. Quand il marchait en tâtonnant, il avait besoin de quelqu’un pour le mener par la main. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Sergius Paulus a vu ce qui était arrivé à Elymas. Il était très étonné de toutes les choses que Barnabas et Saul l’enseignaient au sujet du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . Et ainsi il a cru en Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul et Barnabas vont à Antioche de Pisidie
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, Barnabas et Jean Marc se sont embarqués à Paphos. Ils sont venus à la côte de la ville appelée Perge. Jean Marc les a laissés là et il est revenu à Jérusalem. Perge était une ville dans la partie du pays appelé Pamphylie. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul et Barnabas sont arrivés à Perge. Et ils ont continué vers une ville appelée Antioche de Pisidie. Le jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ', ils sont entrés dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' et ils se sont assis là. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’abord, quelqu’un a lu certaines paroles de la loi que Dieu avait donnée à Moïse. Et il a également lu certaines paroles que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' avaient écrites. Après ceci, les chefs de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' ont envoyé un message à Paul et à Barnabas : Frères, nous voulons que vous parliez au peuple. Avez‑vous un message qui l’aidera ?'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Paul s’est levé et il a fait un signe de la main. Alors il a commencé à leur dire ceci : Ecoutez‑moi, vous et nous, nous sommes des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Vous, les étrangers ou non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui priez notre Dieu, écoutez‑moi attentivement.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Dieu du peuple d’Israël avait choisi nos pères. Quand ils étaient en Égypte Dieu a fait Israël devenir un grand groupe de personnes. Ils étaient des personnes étrangères en Égypte. Mais parce que Dieu est très puissant, il a conduit Israël hors d’Égypte. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu est resté avec le peuple d’Israël dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' pendant 40 années. Il les nourrissait. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a détruit 7 groupes de nations dans le pays appelé Canaan. Et Dieu a donné Canaan à son peuple, de sorte qu’il vive là.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les croyants travaillaient pour le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Ils priaient. Ils disaient comment Dieu est très grand et puissant. Ils jeûnaient également. Pendant ce moment, le Saint‑Esprit leur a parlé : J’ai choisi Barnabas et Saul pour effectuer un travail spécial pour moi. Laissez‑les aller maintenant pour moi.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple d’Israël a vécu là pendant environ 450 années. Après ce temps, Dieu a donné à Israël des chefs appelés les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juges
    - type: text
      text: '. Ils ont régné en Israël jusqu’à Samuel. Samuel était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors le peuple d’Israël a demandé à Samuel de choisir un roi pour eux. Ainsi Dieu leur a donné Saül comme leur roi. Saül était le fils de Kish et il était de la famille de Benjamin. Et il a régné sur Israël pendant 40 années.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a alors fait arrêter Saül de régner sur Israël. Et Dieu a donné à Israël David comme roi à la place de Saül. Dieu a dit ceci au sujet de David : J’ai observé David, le fils de Jessé. Il pense comme je pense. Ainsi je sais qu’il est le bon genre d’homme. Et il fera tout ce que je veux.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus était de la famille de David. C’est Jésus qui est venu sauver le peuple d’Israël. Dieu avait promis ceci aux ancêtres d’Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant que Jésus commence son travail, Jean a parlé à plusieurs du peuple d’Israël. Il a dit : Vous devez cesser de faire de fausses choses. Vous devez dire à Dieu que vous êtes tristes, et alors vous devez lui obéir. Si vous faites cela, je vais alors vous baptiser. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Jean a presque fini son travail, il a dit au peuple : Peut‑être, vous pensez que je suis l’homme spécial de Dieu. Je ne suis pas cet homme. Mais écoutez ! Il vient après moi. Et je ne suis pas assez bon pour délier ses souliers.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je m’adresse à vous peuple ici qui, comme nous, vous avez Abraham comme votre ancêtre. Je m’adresse aussi à vous, qui n’êtes pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Vous savez aussi que Dieu est puissant et important. Dieu nous a donné ce message pour vous tous. Il nous dit comment il nous sauvera. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple qui vit à Jérusalem et leurs chefs n’ont pas cru en Jésus. Il est venu pour nous sauver. Mais les habitants à Jérusalem ont dit que Jésus avait fait de mauvaises choses. Et ils ont dit qu’il devrait mourir. Ainsi les paroles des prophètes se sont accomplies. Et quelqu’un lit ces mêmes paroles chaque jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils n’ont trouvé aucune raison de tuer Jésus. Alors ils ont dit à Pilate : Jésus doit mourir. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi ils ont fait tout ce que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' avaient écrit à propos de cela. Alors certains '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus l’ont pris en bas de la croix et l’ont enterré. '
  '3':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Les hommes ont fini de parler à Dieu et de jeûner. Et puis, ils ont chacun posé leurs mains sur Barnabas et Saul. Alors ils les ont envoyés pour commencer ce nouveau travail.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ce qui s’est produit quand Barnabas et Saul étaient à Chypre
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais alors Dieu a fait vivre Jésus encore. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de jours sont passés après ceci. Alors Jésus est apparu à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: . Il s’est montré à ces gens. C’étaient des gens qui avaient voyagé avec Jésus plus tôt. Ils avaient voyagé avec lui de Galilée à Jérusalem. Ils peuvent maintenant parler de Jésus au peuple d’Israël.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous sommes venus ici pour vous dire cette Bonne Nouvelle. Dieu a promis à nos ancêtres qu’il fera ces choses pour nous. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il a aussi fait maintenant ces choses pour chacun. Il a fait vivre Jésus encore. Nous pouvons lire ceci dans le deuxième Psaume. Dieu a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon fils. Aujourd’hui, je suis devenu ton père.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a fait vivre Jésus encore, et les vers n’ont pas détruit son corps. Et il ne mourra plus. Voici ce que Dieu a dit à son sujet :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai également les bonnes choses pour toi, que j’ai promises à David.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a dit également ceci dans un autre Psaume :'
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ton serviteur qui t’aime ne restera pas mort.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Tu ne laisseras pas de vers manger son corps.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand David était roi, il a bien travaillé pour Dieu. Alors David est mort et les hommes l’ont enterré à côté de ses ancêtres. Les vers ont mangé son corps. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais Dieu a fait devenir Jésus vivant encore. Il n’est plus mort, des vers n’ont pas mangé son corps.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mes frères, je veux que vous sachiez tous ceci : Nous avons tous fait beaucoup de mauvaises choses. Je vous dis ce message sur la façon dont Dieu nous pardonne. Dieu nous pardonne à cause de ce que Jésus a fait. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu peut rendre chacun bien avec lui. Croyez en Jésus. Et alors Dieu pardonnera toutes les mauvaises choses que vous avez faites. La loi que Dieu avait donnée à Moïse ne peut pas faire ceci pour vous. Elle ne peut pas vous rendre libres. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Saint‑Esprit a envoyé Barnabas et Saul loin d’Antioche. Ils ont voyagé à la côte, à la ville appelée Séleucie. Alors ils ont navigué sur un bateau de là à une île appelée Chypre. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites attention alors ! Les prophètes parlaient de ce qui se produira. Ainsi, faites ce que je dis. Et alors ces choses ne vous arriveront pas. Voici ce que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' avaient dit :'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ecoutez‑moi ! Bon nombre d’entre vous parlent de mauvaises choses au sujet de ce que Dieu a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez étonnés de ce que je fais. Et mourez alors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je travaille maintenant, pendant que vous êtes vivants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous ne croyez toujours pas à ce que je fais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même si quelqu’un vous explique tout, vous ne croyez pas.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple parlait à Paul et à Barnabas quand ils ont quitté la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: '. Ils sont retournés le prochain jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: '. Ils ont dit : Alors vous pouvez nous parler davantage de ce que vous nous aviez déjà dit. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand la réunion dans la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' est terminée, beaucoup de gens suivaient Paul et Barnabas. Ces personnes étaient des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et également certains qui ont cru au Dieu des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Paul et Barnabas leur ont dit : Vous croyez que Dieu a fait de bonnes choses pour vous aider. Vous devriez continuer à croire que Dieu vous aidera.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul et Barnabas se tournent vers les non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ', presque chacun dans la ville est venu pour entendre le message de Dieu. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il y avait quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui ont vu la foule. Tous les gens voulaient écouter Paul et Barnabas plus que ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Ainsi ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' étaient fâchés contre le peuple. Et ils disaient de mauvaises choses au sujet de ce que Paul disait. Ils disaient d’autres mauvaises choses contre lui.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Paul et Barnabas n’avaient pas peur d’eux. Ils ont dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  : C’était juste de vous parler d’abord de la parole de Dieu. Mais vous dites que le message n’est pas vrai. Vous n’avez pas cru à la Parole de Dieu. Et vous n’avez pas cru que Dieu vous donnera la vie vraie. Ainsi nous vous laisserons maintenant. Et nous dirons le message à ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: .
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous ferons cela parce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous a donné ce message pour vous. Il nous a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je vous ai envoyés dehors pour être comme une lumière à ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Vous direz aux gens partout dans le monde comment Dieu sauve des personnes.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les étrangers ou non‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' étaient très heureux quand ils ont entendu ceci. Et ils remerciaient le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' du message au sujet de Jésus. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait choisi certains pour avoir la vie vraie. Et ces gens ont cru en son message.'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de gens dans cette partie du pays se disaient le message au sujet de Jésus. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont arrivés à une ville appelée Salamine. Alors ils sont entrés dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ' juives. Ils disaient le message de Dieu au sujet de Jésus au peuple. Jean Marc est allé avec Barnabas et Saul pour les aider dans leur travail.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' parlaient aux hommes importants dans la ville. Ils parlaient aussi à beaucoup de femmes riches qui n’étaient pas Juives. Ces femmes ont cru au Dieu des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont influencé ces femmes à être contre Paul. Ils ont aussi influencé les hautes personnalités de la ville à être contre Paul et Barnabas. Alors ils ont poussé les gens à maltraiter Paul et Barnabas. Ils les ont aussi poussés à quitter cette partie du pays. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul et Barnabas ont secoué la poussière de leurs pieds. Ceci a prouvé au peuple que cette ville a refusé le message de Dieu. Alors ils ont voyagé à la ville appelée Icone. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Saint‑Esprit a complètement rempli les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont voyagé à travers l’île à une ville appelée Paphos. Là ils ont rencontré un homme appelé Bar‑Jésus. Il était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: ' et il faisait des choses par magie. Il a dit qu’il disait des messages de Dieu. Mais ce n’était pas vrai. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le chef de Chypre s’appelait Sergius Paulus, et Bar‑Jésus était son ami. Sergius Paulus était intelligent. Ainsi il a demandé à Barnabas et à Saul de venir chez lui. Il a voulu qu’ils lui disent la parole de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans la langue grecque, Bar‑Jésus s’appelait Elymas. Il n’aimait pas ce que Barnabas et Saul disaient. Il ne voulait pas que Sergius Paulus puisse croire en Jésus. Ainsi il a essayé de l’arrêter.
