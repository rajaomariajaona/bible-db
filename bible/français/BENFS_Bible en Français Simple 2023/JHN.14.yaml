document_id: JHN.14,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 14
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus est le chemin vers le Père
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus leur a dit : N’ayez pas la tristesse ni la peur. Croyez en Dieu, et croyez en moi aussi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis dans le Père et le Père est en moi. Vous devez croire cela. Les paroles que je vous dis, ne viennent pas de moi‑même. Mais le Père, qui vit en moi, est en train de faire son travail. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis dans le Père et le Père est en moi. Croyez‑moi quand je dis cela. Ou, si vous ne croyez pas à mes paroles, croyez à cause de mon travail. Croyez à cause des choses que j’ai faites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis la vérité : Toute personne qui croit en moi, fera les mêmes choses que moi. Cette personne va faire les mêmes choses que j’ai faites. Oui, elle fera même de plus grandes choses que celles‑ci, parce que je vais au Père. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Demandez des choses en mon nom (parce que vous êtes les miens). Si vous demandez quelque chose en mon nom, je le ferai. Alors le Fils montrera à tous combien le Père est grand et bon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous demandez quelque chose en mon nom, je le ferai.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus promet l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si vous m’aimez, gardez mes commandements. Vous obéirez à ce que je vous ai demandé de faire. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais demander au Père. Et il vous donnera une autre personne qui pourra vous aider. Il s’agit du consolateur. Il restera avec vous pour toujours. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il est l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' qui vous montrera de vraies choses. Les personnes qui appartiennent à ce monde ne peuvent pas le recevoir. Cela, parce qu’elles ne peuvent pas le voir. Elles ne peuvent pas le connaître. Mais vous le connaissez, parce qu’il reste avec vous. Et il sera en vous.'
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Je ne vous laisserai pas rester seuls, comme des enfants sans parents. Je viendrai à vous.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après un peu de temps, les gens qui appartiennent à ce monde ne me verront plus. Mais vous me verrez. Et parce que je vis, vous vivrez aussi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a beaucoup de chambres dans la maison de mon Père. Je n’allais pas vous le dire, si cela n’était pas vrai. Et je vais aller maintenant pour vous préparer une place. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour‑là, vous connaîtrez que je suis en mon Père. Vous saurez que vous êtes en moi. Et vous saurez que je suis en vous. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certaines personnes vont écouter ce que je leur ai dit. Et elles vont obéir à ce que j’ai dit. Ce sont ces gens qui m’aiment. Mon Père aimera tous les gens qui m’aiment. Et je les aime et je vais me montrer à eux.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Judas (pas Judas l’Iscariote) a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', pourquoi tu te montreras seulement à nous ? Pourquoi est‑ce que tu ne te montreras pas aussi aux gens qui appartiennent à ce monde ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a répondu : Celui qui m’aime obéira à mes paroles. Mon Père l’aimera. Mon père et moi, nous viendrons à lui. Nous ferons notre demeure chez lui. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute personne qui ne m’aime pas n’obéit pas à mes paroles. Et ces paroles que vous entendez ne sont pas mes propres paroles. Non, ces paroles viennent du Père, qui m’a envoyé. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai dit ces choses à vous pendant que j’étais encore avec vous. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le Père enverra le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: . Et il est celui qui va vous aider. Il viendra en mon nom. Il vous enseignera toutes choses. Et il vous rappellera tout ce que je vous ai dit.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais aller, mais je vous donne la paix. C’est ma paix que je vous donne. Ma paix est différente de celle que ce monde donne. Ne soyez pas tristes ou n’ayez pas peur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous m’avez entendu vous dire : Je vais aller plus loin, mais je reviendrai à vous. Si vous m’aimiez, vous seriez heureux à cause de cela. Vous seriez heureux parce que je vais au Père. Et il est plus grand que moi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai dit cela maintenant, avant que cela arrive. Alors, quand cela arrive, vous croirez. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, je vais revenir. Je vous prendrai pour que vous soyez avec moi. Alors vous serez là où je suis. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne vais pas vous parler beaucoup plus, parce que le prince de ce monde va bientôt venir. Il n’a aucun pouvoir sur moi. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les gens qui appartiennent à ce monde doivent apprendre sur moi. Ils doivent savoir que j’aime le Père. Et je fais tout ce qu’il me demande de faire. Je dois leur montrer cela. Alors levons‑nous, nous devons aller.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous savez le chemin de l’endroit où je vais aller.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thomas lui a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', nous ne savons pas où tu iras. Alors, comment pouvons‑nous savoir le chemin pour y arriver ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Je suis le chemin. Je suis la vérité. Et je suis la vie. Personne ne vient au Père que par moi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous me connaissiez, vous pourriez connaître aussi mon père. A partir de ce moment, vous le connaissez, et vous l’avez vu.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philippe a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', montre‑nous le Père. Voilà tout ce dont nous avons besoin. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : J’étais avec vous pendant très longtemps. Mais encore, vous ne semblez pas me connaître, Philippe ! Celui qui m’a vu a aussi vu le Père. Alors, pourquoi dis‑tu : Montre‑nous le Père ? '
