document_id: JHN.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle à une femme de Samarie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' ont entendu ceci : beaucoup de gens s’ajoutaient au groupe des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus. Ils ont entendu que Jésus baptisait plus de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' que Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(Mais vraiment Jésus lui‑même ne baptisait personne. Seuls ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' baptisaient les gens.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a entendu cela. Il a quitté la Judée. Il est retourné en Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il devait passer par la Samarie.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il est venu dans une ville de Samarie. Son nom était Sychar. C’était près du champ de Jacob. Il l’avait donné à son fils, Joseph, de nombreuses années avant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: 'Le puits de Jacob était là. Jésus était fatigué après son voyage. Il était assis au bord du puits. C’était environ midi. Ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés acheter de la nourriture dans la ville. Une femme de Samarie est venue au puits.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle voulait obtenir de l’eau. Jésus lui a dit : Donne‑moi de l’eau à boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La femme lui a dit : Tu es un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: ' et je suis une femme de Samarie. Pourquoi me demandes‑tu de l’eau à boire ? (Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne parlaient pas habituellement aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Samaritains
  - type: text
    text: .)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus a répondu à la femme : Tu ne sais pas ce que Dieu peut te donner. Je t’ai demandé de l’eau à boire. Mais tu ne sais pas qui je suis. Si tu savais, c’est toi qui allais me demander de l’eau. Ensuite, j’allais te donner de l’eau qui a la vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La femme a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tu n’as rien avec quoi puiser et le puits est profond. Où peux‑tu obtenir cette eau qui me ferait vivre ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jacob, notre ancêtre, nous a donné ce puits. Lui, ses fils et ses troupeaux buvaient tous de ce puits. Veux‑tu dire que tu es plus grand que Jacob ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus a répondu : Toute personne qui boit de ce puits aura encore soif. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais je peux donner un autre genre d’eau. Celui qui boit ce genre d’eau n’aura plus jamais soif. L’eau que je lui donnerai deviendra une source d’eau à l’intérieur de lui. Cette source d’eau va continuer à donner de l’eau fraîche. Elle lui donnera la vie pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La femme lui a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', donne‑moi cette eau. Ensuite, je ne vais plus jamais avoir soif. Et je ne veux pas continuer à venir ici puiser de l’eau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus lui a dit : Va chercher ton mari. Puis reviens ici. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La femme a répondu : Je n’ai pas de mari. Jésus lui a dit : Tu as raison quand tu dis : Je n’ai pas de mari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu as eu 5 maris. Et maintenant, tu vis avec un homme. Il n’est pas ton mari. Ce que tu m’as dit, est tout à fait vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La femme lui a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', je vois que tu es un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nos pères ont adoré sur cette montagne. Mais vous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', vous dites que Jérusalem est le bon endroit pour '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus lui a dit : Crois‑moi, femme. Bientôt les gens n’adoreront le Père ni sur cette montagne ni à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous les gens de Samarie, vous ne savez vraiment pas ce que vous adorez. Mais nous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', nous savons ce que nous adorons. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: salut
  - type: text
    text: ' vient des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais bientôt, les gens vont vraiment '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' le Père. Vraiment, c’est déjà le temps. Ces gens qui veulent vraiment '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' le Père vont l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' de leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Le Père cherche des gens qui vont l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' comme ça. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dieu est '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: . Ces gens qui l’adorent doivent l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Ils doivent vraiment avoir envie d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La femme a dit à Jésus : Je sais que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' viendra. Il est appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Quand il viendra, il nous expliquera tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Jésus a répondu : Moi qui te parle, je le suis.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le retour des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont revenus. Ils ont été surpris par ceci : Jésus parlait à une femme. Mais aucun d’eux ne lui a demandé : Que veux‑tu ? Ou : Pourquoi parles‑tu avec elle ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors la femme a laissé sa cruche. Elle est revenue à la ville. Elle a dit aux gens là‑bas : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Venez voir un homme. Il m’a dit tout sur moi‑même. Il m’a dit tout ce que je faisais ! Il doit être le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '  ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Alors, les gens ont quitté la ville. Ils sont allés voir Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'La femme est allée. Après, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont dit à Jésus : Maître, mange quelque chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais il leur a dit : J’ai la nourriture que je peux manger. Mais vous ne savez pas cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ainsi, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' se sont demandé ceci : Quelqu’un a pu lui amener de la nourriture ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur a dit : Je dois obéir à celui qui m’a envoyé. Je dois terminer le travail qu’il m’a donné à faire. C’est cela ma nourriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Vous dites : Les plantes dans les champs des agriculteurs seront prêtes pour la récolte au bout de 4 mois de plus. Mais je dis que vous devez ouvrir vos yeux. Regardez les champs. Les plantes sont prêtes pour la récolte maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dieu paie déjà les travailleurs. Ils trouvent du fruit. Ils vivront ainsi pour toujours. La personne qui sème les graines sera très heureuse. Et la personne qui récolte le fruit sera très heureuse aussi. Les 2 d’entre elles seront heureuses pour le résultat de leur travail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ce que les gens disent, est vrai. Une personne sème les graines et une autre récolte le fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je vous ai envoyés là où vous n’aviez pas travaillé. D’autres personnes ont fait le travail. Vous récoltez là où d’autres personnes ont travaillé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Bon nombre de personnes vivaient dans cette ville de Samarie. Elles ont entendu l’histoire de la femme. Elle leur avait dit : Il m’a dit tout ce que je faisais ! Et à cause de cela, ils ont cru en Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Les gens de Samarie sont venus auprès de Jésus. Ils lui ont demandé de rester avec eux. Ainsi, Jésus est resté pendant 2 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Beaucoup plus de gens ont écouté les paroles de Jésus lui‑même. Ils ont cru en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le peuple a dit à la femme : Maintenant, nous croyons en lui, parce que nous avons entendu. Maintenant, nous ne pensons pas seulement à cause de ce que tu avais dit. Cet homme est vraiment l’homme qui sauvera le monde. Nous savons maintenant.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus guérit le fils d’un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Après 2 jours, Jésus a quitté ce lieu‑là. Il est allé en Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Jésus lui‑même avait dit plus tôt : Quand un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' visite son lieu de naissance, les gens là‑bas ne croient pas en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jésus est arrivé en Galilée. Les gens étaient heureux de le voir. Ils étaient à la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' aussi. Et ils ont vu toutes les choses qu’il avait faites à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus a visité '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Cana
  - type: text
    text: ', en Galilée, encore une fois. C’était la ville où il avait changé l’eau en vin. Un des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' du roi était là. Il avait un fils à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Capernaüm
  - type: text
    text: '. Son fils était très malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Cet homme a entendu ceci : Jésus était arrivé de Judée en Galilée. Alors, il est allé auprès de Jésus. Il a demandé à Jésus d’aller à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Capernaüm
  - type: text
    text: '. Le fils de cet homme était en train de mourir. Il a demandé à Jésus vivement de guérir son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Alors Jésus lui a dit : Vous voulez que je fasse de grands miracles qui vous surprennent. Sinon, personne d’entre vous ne va croire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: officier
  - type: text
    text: ' du roi a dit à Jésus : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', viens avec moi maintenant avant que mon enfant meure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jésus lui a répondu : Va à la maison. Ton fils vit. L’homme a cru en ce que Jésus avait dit. Et il a commencé à rentrer chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il se rendait à la maison. Ses serviteurs l’ont rencontré. Ils lui ont dit : Ton garçon va mieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Il leur a demandé : A quel moment a‑t‑il commencé à aller mieux ? Ils lui ont dit : Il a cessé d’être malade hier, à la septième heure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Alors le père s’est rappelé que c’était le moment où Jésus lui avait dit : Ton fils vit. Ainsi, l’homme et toute sa famille ont cru. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: C’était le second miracle que Jésus avait fait après son retour de Judée en Galilée.
