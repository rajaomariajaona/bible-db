document_id: JHN.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Jésus parle à une femme de Samarie
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont entendu ceci : beaucoup de gens s’ajoutaient au groupe des '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus. Ils ont entendu que Jésus baptisait plus de '
  - type: text
    content: disciples
  - type: text
    content: ' que Jean. '
  '10':
  - type: text
    content: 'Jésus a répondu à la femme : Tu ne sais pas ce que Dieu peut te donner. Je t’ai demandé de l’eau à boire. Mais tu ne sais pas qui je suis. Si tu savais, c’est toi qui allais me demander de l’eau. Ensuite, j’allais te donner de l’eau qui a la vie. '
  '11':
  - type: text
    content: 'La femme a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu n’as rien avec quoi puiser et le puits est profond. Où peux‑tu obtenir cette eau qui me ferait vivre ? '
  '12':
  - type: text
    content: Jacob, notre ancêtre, nous a donné ce puits. Lui, ses fils et ses troupeaux buvaient tous de ce puits. Veux‑tu dire que tu es plus grand que Jacob ?
  '13':
  - type: text
    content: 'Jésus a répondu : Toute personne qui boit de ce puits aura encore soif. '
  '14':
  - type: text
    content: 'Mais je peux donner un autre genre d’eau. Celui qui boit ce genre d’eau n’aura plus jamais soif. L’eau que je lui donnerai deviendra une source d’eau à l’intérieur de lui. Cette source d’eau va continuer à donner de l’eau fraîche. Elle lui donnera la vie pour toujours. '
  '15':
  - type: text
    content: 'La femme lui a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', donne‑moi cette eau. Ensuite, je ne vais plus jamais avoir soif. Et je ne veux pas continuer à venir ici puiser de l’eau.'
  '16':
  - type: text
    content: 'Jésus lui a dit : Va chercher ton mari. Puis reviens ici. '
  '17':
  - type: text
    content: 'La femme a répondu : Je n’ai pas de mari. Jésus lui a dit : Tu as raison quand tu dis : Je n’ai pas de mari. '
  '18':
  - type: text
    content: 'Tu as eu 5 maris. Et maintenant, tu vis avec un homme. Il n’est pas ton mari. Ce que tu m’as dit, est tout à fait vrai. '
  '19':
  - type: text
    content: 'La femme lui a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je vois que tu es un '
  - type: text
    content: prophète
  - type: text
    content: '. '
  '2':
  - type: text
    content: '(Mais vraiment Jésus lui‑même ne baptisait personne. Seuls ses '
  - type: text
    content: disciples
  - type: text
    content: ' baptisaient les gens.) '
  '20':
  - type: text
    content: 'Nos pères ont adoré sur cette montagne. Mais vous les '
  - type: text
    content: Juifs
  - type: text
    content: ', vous dites que Jérusalem est le bon endroit pour '
  - type: text
    content: adorer
  - type: text
    content: ' Dieu.'
  '21':
  - type: text
    content: 'Jésus lui a dit : Crois‑moi, femme. Bientôt les gens n’adoreront le Père ni sur cette montagne ni à Jérusalem. '
  '22':
  - type: text
    content: 'Vous les gens de Samarie, vous ne savez vraiment pas ce que vous adorez. Mais nous les '
  - type: text
    content: Juifs
  - type: text
    content: ', nous savons ce que nous adorons. Le '
  - type: text
    content: salut
  - type: text
    content: ' vient des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Mais bientôt, les gens vont vraiment '
  - type: text
    content: adorer
  - type: text
    content: ' le Père. Vraiment, c’est déjà le temps. Ces gens qui veulent vraiment '
  - type: text
    content: adorer
  - type: text
    content: ' le Père vont l’'
  - type: text
    content: adorer
  - type: text
    content: ' de leurs '
  - type: text
    content: esprits
  - type: text
    content: . Le Père cherche des gens qui vont l’
  - type: text
    content: adorer
  - type: text
    content: ' comme ça. '
  '24':
  - type: text
    content: 'Dieu est '
  - type: text
    content: Esprit
  - type: text
    content: . Ces gens qui l’adorent doivent l’
  - type: text
    content: adorer
  - type: text
    content: ' en '
  - type: text
    content: esprit
  - type: text
    content: . Ils doivent vraiment avoir envie d’
  - type: text
    content: adorer
  - type: text
    content: ' Dieu. '
  '25':
  - type: text
    content: 'La femme a dit à Jésus : Je sais que le '
  - type: text
    content: Messie
  - type: text
    content: ' viendra. Il est appelé '
  - type: text
    content: Christ
  - type: text
    content: '. Quand il viendra, il nous expliquera tout. '
  '26':
  - type: text
    content: 'Alors Jésus a répondu : Moi qui te parle, je le suis.'
  - type: heading
    content: Le retour des disciples
  '27':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' sont revenus. Ils ont été surpris par ceci : Jésus parlait à une femme. Mais aucun d’eux ne lui a demandé : Que veux‑tu ? Ou : Pourquoi parles‑tu avec elle ? '
  '28':
  - type: text
    content: 'Alors la femme a laissé sa cruche. Elle est revenue à la ville. Elle a dit aux gens là‑bas : '
  '29':
  - type: text
    content: 'Venez voir un homme. Il m’a dit tout sur moi‑même. Il m’a dit tout ce que je faisais ! Il doit être le '
  - type: text
    content: Christ
  - type: text
    content: '  ! '
  '3':
  - type: text
    content: 'Jésus a entendu cela. Il a quitté la Judée. Il est retourné en Galilée. '
  '30':
  - type: text
    content: Alors, les gens ont quitté la ville. Ils sont allés voir Jésus.
  '31':
  - type: text
    content: 'La femme est allée. Après, les '
  - type: text
    content: disciples
  - type: text
    content: ' ont dit à Jésus : Maître, mange quelque chose. '
  '32':
  - type: text
    content: 'Mais il leur a dit : J’ai la nourriture que je peux manger. Mais vous ne savez pas cela. '
  '33':
  - type: text
    content: 'Ainsi, les '
  - type: text
    content: disciples
  - type: text
    content: ' se sont demandé ceci : Quelqu’un a pu lui amener de la nourriture ? '
  '34':
  - type: text
    content: 'Jésus leur a dit : Je dois obéir à celui qui m’a envoyé. Je dois terminer le travail qu’il m’a donné à faire. C’est cela ma nourriture. '
  '35':
  - type: text
    content: 'Vous dites : Les plantes dans les champs des agriculteurs seront prêtes pour la récolte au bout de 4 mois de plus. Mais je dis que vous devez ouvrir vos yeux. Regardez les champs. Les plantes sont prêtes pour la récolte maintenant. '
  '36':
  - type: text
    content: 'Dieu paie déjà les travailleurs. Ils trouvent du fruit. Ils vivront ainsi pour toujours. La personne qui sème les graines sera très heureuse. Et la personne qui récolte le fruit sera très heureuse aussi. Les 2 d’entre elles seront heureuses pour le résultat de leur travail. '
  '37':
  - type: text
    content: 'Ce que les gens disent, est vrai. Une personne sème les graines et une autre récolte le fruit. '
  '38':
  - type: text
    content: Je vous ai envoyés là où vous n’aviez pas travaillé. D’autres personnes ont fait le travail. Vous récoltez là où d’autres personnes ont travaillé.
  '39':
  - type: text
    content: 'Bon nombre de personnes vivaient dans cette ville de Samarie. Elles ont entendu l’histoire de la femme. Elle leur avait dit : Il m’a dit tout ce que je faisais ! Et à cause de cela, ils ont cru en Jésus. '
  '4':
  - type: text
    content: Il devait passer par la Samarie.
  '40':
  - type: text
    content: 'Les gens de Samarie sont venus auprès de Jésus. Ils lui ont demandé de rester avec eux. Ainsi, Jésus est resté pendant 2 jours. '
  '41':
  - type: text
    content: 'Beaucoup plus de gens ont écouté les paroles de Jésus lui‑même. Ils ont cru en lui. '
  '42':
  - type: text
    content: 'Le peuple a dit à la femme : Maintenant, nous croyons en lui, parce que nous avons entendu. Maintenant, nous ne pensons pas seulement à cause de ce que tu avais dit. Cet homme est vraiment l’homme qui sauvera le monde. Nous savons maintenant.'
  - type: heading
    content: Jésus guérit le fils d’un officier
  '43':
  - type: text
    content: 'Après 2 jours, Jésus a quitté ce lieu‑là. Il est allé en Galilée. '
  '44':
  - type: text
    content: 'Jésus lui‑même avait dit plus tôt : Quand un '
  - type: text
    content: prophète
  - type: text
    content: ' visite son lieu de naissance, les gens là‑bas ne croient pas en lui. '
  '45':
  - type: text
    content: 'Jésus est arrivé en Galilée. Les gens étaient heureux de le voir. Ils étaient à la '
  - type: text
    content: Pâque
  - type: text
    content: ' aussi. Et ils ont vu toutes les choses qu’il avait faites à Jérusalem. '
  '46':
  - type: text
    content: 'Jésus a visité '
  - type: text
    content: Cana
  - type: text
    content: ', en Galilée, encore une fois. C’était la ville où il avait changé l’eau en vin. Un des '
  - type: text
    content: officiers
  - type: text
    content: ' du roi était là. Il avait un fils à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Son fils était très malade. '
  '47':
  - type: text
    content: 'Cet homme a entendu ceci : Jésus était arrivé de Judée en Galilée. Alors, il est allé auprès de Jésus. Il a demandé à Jésus d’aller à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Le fils de cet homme était en train de mourir. Il a demandé à Jésus vivement de guérir son fils. '
  '48':
  - type: text
    content: 'Alors Jésus lui a dit : Vous voulez que je fasse de grands miracles qui vous surprennent. Sinon, personne d’entre vous ne va croire. '
  '49':
  - type: text
    content: L’
  - type: text
    content: officier
  - type: text
    content: ' du roi a dit à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', viens avec moi maintenant avant que mon enfant meure. '
  '5':
  - type: text
    content: 'Il est venu dans une ville de Samarie. Son nom était Sychar. C’était près du champ de Jacob. Il l’avait donné à son fils, Joseph, de nombreuses années avant. '
  '50':
  - type: text
    content: 'Jésus lui a répondu : Va à la maison. Ton fils vit. L’homme a cru en ce que Jésus avait dit. Et il a commencé à rentrer chez lui. '
  '51':
  - type: text
    content: 'Il se rendait à la maison. Ses serviteurs l’ont rencontré. Ils lui ont dit : Ton garçon va mieux. '
  '52':
  - type: text
    content: 'Il leur a demandé : A quel moment a‑t‑il commencé à aller mieux ? Ils lui ont dit : Il a cessé d’être malade hier, à la septième heure. '
  '53':
  - type: text
    content: 'Alors le père s’est rappelé que c’était le moment où Jésus lui avait dit : Ton fils vit. Ainsi, l’homme et toute sa famille ont cru. '
  '54':
  - type: text
    content: C’était le second miracle que Jésus avait fait après son retour de Judée en Galilée.
  '6':
  - type: text
    content: 'Le puits de Jacob était là. Jésus était fatigué après son voyage. Il était assis au bord du puits. C’était environ midi. Ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés acheter de la nourriture dans la ville. Une femme de Samarie est venue au puits.'
  - type: text
    content: 'Elle voulait obtenir de l’eau. Jésus lui a dit : Donne‑moi de l’eau à boire. '
  '9':
  - type: text
    content: 'La femme lui a dit : Tu es un '
  - type: text
    content: Juif
  - type: text
    content: ' et je suis une femme de Samarie. Pourquoi me demandes‑tu de l’eau à boire ? (Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ne parlaient pas habituellement aux '
  - type: text
    content: Samaritains
  - type: text
    content: .)
