document_id: HEB.12
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 12
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Nous devons continuer à avoir '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' en Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi, nous avons entendu parler de nombreuses personnes qui avaient confiance en Dieu depuis longtemps. Ces personnes sont comme une très grande foule autour de nous et nous devons copier leur exemple. Nous devons être comme des gens qui courent dans une course. Nous devons jeter tout ce qui nous empêche de bien évoluer. Les péchés que nous commettons nous font tomber très facilement. Nous ne devons pas laisser ces péchés nous diriger. Dieu a préparé la voie qui est devant nous. Nous devons continuer d’être forts pendant que nous suivons cette voie. Nous devons choisir de bien mener cette course. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pendant que nous courons, nous devons toujours regarder vers Jésus. C’est Jésus qui a fait entièrement confiance en Dieu. Notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' commence avec lui, et il nous aidera à faire confiance en Dieu jusqu’à la fin. Jésus a accepté la punition sur la croix. Il a choisi de souffrir beaucoup. Il ne pensait pas avoir honte de mourir comme ça. Il savait que Dieu lui avait préparé quelque chose de très bon qui le rendra heureux. Maintenant, il s’est assis du côté droit de Dieu pour régner avec lui dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Réfléchissez donc bien à la façon dont Jésus a vécu sur la terre. Les mauvaises personnes ont fait de très mauvaises choses contre lui, mais il est resté fort. Pensez à lui, et alors vous ne deviendrez pas faibles en tant que chrétiens. Vous ne laisserez pas de faire confiance à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vous vous battez contre le péché dans vos vies. Vous luttez contre le péché. Mais vous n’avez pas encore résisté jusqu’a verser du sang.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dieu vous parle comme à ses enfants. N’oubliez jamais ces mots de la Bible qui vous rendront forts :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mon fils, lorsque le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' te montre ce qui est juste,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne l’oublie pas facilement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne sois pas en colère quand il te punit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fait cela à tous ceux qu’il aime.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il punit tous ceux qu’il accepte comme fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsque vous avez des problèmes dans vos vies, vous devez être patients et forts. N’oubliez pas que Dieu vous enseigne ce qui est bien, parce que vous êtes ses enfants. Il n’y a jamais eu de fils que le père ne punit pas. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu enseigne à tous ses enfants de ne pas faire du mal. Donc s’il ne vous punit pas, cela montre que vous n’êtes pas vraiment ses enfants. Au lieu de cela, vous êtes comme des enfants qui ne lui appartiennent pas vraiment. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'De plus, nous avons tous eu des pères humains qui nous ont punis. En conséquence, nous les avons respectés. Pensez donc à notre Père auquel nos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' appartiennent. Nous devons sûrement lui obéir, et alors il nous donnera la vraie vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nos pères humains nous ont punis pendant quelques années. Ils l’ont fait d’une manière qu’ils jugeaient bonne. Mais Dieu nous punit d’une manière qui nous aidera vraiment. En conséquence, nous pouvons devenir complètement bons, comme lui. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La punition ne nous rend jamais heureux au moment où nous la recevons. Non, la douleur nous rend tristes. Mais plus tard, nous savons que la punition nous a appris de bonnes choses. Elle nous aide à vivre d’une manière juste qui nous donne la paix dans nos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Soyez donc forts comme serviteurs de Dieu ! Si vos mains sont faibles, soulevez‑les !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Si vos genoux ne sont pas forts, tenez‑vous debout ! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Marchez devant vous, pas à pas ! Votre exemple aidera d’autres chrétiens à bien servir Dieu. Les gens qui ne savent pas bien marcher ne seront pas handicapés. Ils ne vont pas tomber. Mais, leurs jambes redeviendront fortes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous ne devons pas refuser de faire ce que Dieu dit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Faites tout ce que vous pouvez pour vivre en paix avec les autres. Séparez‑vous de mauvaises choses. Personne ne verra le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à moins que sa vie soit bonne et purifiée. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Souvenez‑vous que Dieu est très bon. Personne ne peut refuser que Dieu l’aide. Assurez‑vous que personne parmi vous ne cause des problèmes, de peur que les gens se tournent contre Dieu. Une personne en colère contre Dieu est comme un poison. Cette personne détruit la vie de beaucoup d’autres personnes, afin que Dieu ne les accepte pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Faites attention, évitez tous une vie de péché. Ne négligez pas les choses saintes. Ne vous comportez pas comme Ésaü. Il avait vendu son droit d’héritage de fils aîné pour un simple repas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Comme vous le savez, après cela, il voulait toujours recevoir ces bonnes choses de son père. Il voulait que son père demande à Dieu de le bénir. Mais son père a refusé de le faire. Ésaü a beaucoup pleuré en demandant à son père de lui donner de bonnes choses. Mais il n’y avait aucun moyen pour Ésaü de changer ce qu’il avait fait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une image de 2 montagnes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous vous êtes approchés de Dieu. Mais vous n’êtes pas venus dans un endroit que vous pouvez toucher, comme la montagne de Sinaï. Cette montagne a brûlé avec le feu. Mais là où les gens se tenaient, il faisait complètement noir. Ils ne pouvaient pas voir du tout. Il y avait aussi un vent très fort. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il y avait le son fort d’une trompette. Il y avait une voix puissante qui leur parlait. Lorsque les gens ont entendu cette voix, ils ont eu très peur. Ils ont donc demandé que la voix ne leur parle plus. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils avaient très peur de ce que Dieu leur avait dit. Dieu avait dit : Si même un animal touche la montagne, vous devez le tuer avec des pierres. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Même Moïse avait très peur quand il a vu la grande puissance de Dieu. Il a dit : Je suis plein de peur !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais en tant que croyants en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', vous n’êtes pas venus à Dieu de cette façon. Vous êtes venus à la montagne de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sion
  - type: text
    text: '. Vous êtes venus dans la cité de Dieu, qui est vivante. Vous êtes venus dans la ville de Jérusalem qui est dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Il y a plusieurs milliers d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' heureux tous ensemble dans cet endroit. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tout le peuple de Dieu s’y réunit. Ils sont comme ses fils les plus importants. Ils appartiennent au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' parce que Dieu a écrit leurs noms. Vous êtes venus à Dieu lui‑même, qui jugera tout le monde. Vous êtes arrivés à l’endroit où se trouvent les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' du peuple de Dieu. Ces gens sont devenus justes avec Dieu. Dieu a maintenant terminé son travail en eux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Vous êtes venus vers Jésus, qui a apporté le nouvel accord de Dieu à son peuple. Dans cet accord, le sang de la mort de Jésus nous purifie de nos péchés. Il nous dit que Dieu nous a pardonné. Lorsque Caïn a tué son frère Abel, le sang d’Abel a apporté la punition de Dieu. Nous voyons donc que le sang de Jésus nous a apporté bien mieux que cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Soyez donc prudents ! Soyez toujours prêts à écouter quand Dieu parle. Dieu a utilisé Moïse comme son serviteur sur la terre pour parler au peuple d’Israël. Quand ces gens ont refusé d’obéir, Dieu les a punis. Ils ne pouvaient pas s’échapper. Quant à nous, Dieu nous parle du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Donc, nous n’échapperons certainement pas à la punition de Dieu si nous nous détournons de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Sur la montagne de Sinaï, il y a de nombreuses années, la voix de Dieu a fait bouger fortement la terre. Mais maintenant, Dieu a promis ceci : Encore une fois, je ferai bouger la terre. Mais cette fois, je ferai également bouger le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ces mots, une fois de plus, nous montrent que Dieu retranchera les choses qu’il a faites. Toutes les choses sur la terre qu’il fait bouger finiront. Après cela, tout ce qu’il ne fera pas bouger, continuera d’être là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais nous recevons un lieu où nous régnerons avec Dieu. Nous appartenons au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: ', et personne ne pourra jamais bouger cela ! Donc, nous devons remercier Dieu. Nous devons l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' d’une manière qui le rend heureux. Il est grand et nous devons bien le servir et le respecter. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Souvenez‑vous que notre Dieu est comme un feu. Il détruit tout ce qui n’est pas bon.
