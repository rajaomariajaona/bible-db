document_id: HEB.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: Nous devons continuer à avoir foi en Dieu
  - type: text
    content: 'Ainsi, nous avons entendu parler de nombreuses personnes qui avaient confiance en Dieu depuis longtemps. Ces personnes sont comme une très grande foule autour de nous et nous devons copier leur exemple. Nous devons être comme des gens qui courent dans une course. Nous devons jeter tout ce qui nous empêche de bien évoluer. Les péchés que nous commettons nous font tomber très facilement. Nous ne devons pas laisser ces péchés nous diriger. Dieu a préparé la voie qui est devant nous. Nous devons continuer d’être forts pendant que nous suivons cette voie. Nous devons choisir de bien mener cette course. '
  '10':
  - type: text
    content: 'Nos pères humains nous ont punis pendant quelques années. Ils l’ont fait d’une manière qu’ils jugeaient bonne. Mais Dieu nous punit d’une manière qui nous aidera vraiment. En conséquence, nous pouvons devenir complètement bons, comme lui. '
  '11':
  - type: text
    content: 'La punition ne nous rend jamais heureux au moment où nous la recevons. Non, la douleur nous rend tristes. Mais plus tard, nous savons que la punition nous a appris de bonnes choses. Elle nous aide à vivre d’une manière juste qui nous donne la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '12':
  - type: text
    content: Soyez donc forts comme serviteurs de Dieu ! Si vos mains sont faibles, soulevez‑les !
  - type: text
    content: 'Si vos genoux ne sont pas forts, tenez‑vous debout ! '
  '13':
  - type: text
    content: Marchez devant vous, pas à pas ! Votre exemple aidera d’autres chrétiens à bien servir Dieu. Les gens qui ne savent pas bien marcher ne seront pas handicapés. Ils ne vont pas tomber. Mais, leurs jambes redeviendront fortes.
  - type: heading
    content: Nous ne devons pas refuser de faire ce que Dieu dit
  '14':
  - type: text
    content: 'Faites tout ce que vous pouvez pour vivre en paix avec les autres. Séparez‑vous de mauvaises choses. Personne ne verra le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à moins que sa vie soit bonne et purifiée. '
  '15':
  - type: text
    content: Souvenez‑vous que Dieu est très bon. Personne ne peut refuser que Dieu l’aide. Assurez‑vous que personne parmi vous ne cause des problèmes, de peur que les gens se tournent contre Dieu. Une personne en colère contre Dieu est comme un poison. Cette personne détruit la vie de beaucoup d’autres personnes, afin que Dieu ne les accepte pas.
  '16':
  - type: text
    content: 'Faites attention, évitez tous une vie de péché. Ne négligez pas les choses saintes. Ne vous comportez pas comme Ésaü. Il avait vendu son droit d’héritage de fils aîné pour un simple repas. '
  '17':
  - type: text
    content: Comme vous le savez, après cela, il voulait toujours recevoir ces bonnes choses de son père. Il voulait que son père demande à Dieu de le bénir. Mais son père a refusé de le faire. Ésaü a beaucoup pleuré en demandant à son père de lui donner de bonnes choses. Mais il n’y avait aucun moyen pour Ésaü de changer ce qu’il avait fait.
  - type: heading
    content: Une image de 2 montagnes
  '18':
  - type: text
    content: 'Vous vous êtes approchés de Dieu. Mais vous n’êtes pas venus dans un endroit que vous pouvez toucher, comme la montagne de Sinaï. Cette montagne a brûlé avec le feu. Mais là où les gens se tenaient, il faisait complètement noir. Ils ne pouvaient pas voir du tout. Il y avait aussi un vent très fort. '
  '19':
  - type: text
    content: 'Il y avait le son fort d’une trompette. Il y avait une voix puissante qui leur parlait. Lorsque les gens ont entendu cette voix, ils ont eu très peur. Ils ont donc demandé que la voix ne leur parle plus. '
  '2':
  - type: text
    content: 'Pendant que nous courons, nous devons toujours regarder vers Jésus. C’est Jésus qui a fait entièrement confiance en Dieu. Notre '
  - type: text
    content: foi
  - type: text
    content: ' commence avec lui, et il nous aidera à faire confiance en Dieu jusqu’à la fin. Jésus a accepté la punition sur la croix. Il a choisi de souffrir beaucoup. Il ne pensait pas avoir honte de mourir comme ça. Il savait que Dieu lui avait préparé quelque chose de très bon qui le rendra heureux. Maintenant, il s’est assis du côté droit de Dieu pour régner avec lui dans le '
  - type: text
    content: ciel
  - type: text
    content: .
  '20':
  - type: text
    content: 'Ils avaient très peur de ce que Dieu leur avait dit. Dieu avait dit : Si même un animal touche la montagne, vous devez le tuer avec des pierres. '
  '21':
  - type: text
    content: 'Même Moïse avait très peur quand il a vu la grande puissance de Dieu. Il a dit : Je suis plein de peur !'
  '22':
  - type: text
    content: Mais en tant que croyants en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', vous n’êtes pas venus à Dieu de cette façon. Vous êtes venus à la montagne de '
  - type: text
    content: Sion
  - type: text
    content: '. Vous êtes venus dans la cité de Dieu, qui est vivante. Vous êtes venus dans la ville de Jérusalem qui est dans le '
  - type: text
    content: ciel
  - type: text
    content: . Il y a plusieurs milliers d’
  - type: text
    content: anges
  - type: text
    content: ' heureux tous ensemble dans cet endroit. '
  '23':
  - type: text
    content: 'Tout le peuple de Dieu s’y réunit. Ils sont comme ses fils les plus importants. Ils appartiennent au '
  - type: text
    content: ciel
  - type: text
    content: ' parce que Dieu a écrit leurs noms. Vous êtes venus à Dieu lui‑même, qui jugera tout le monde. Vous êtes arrivés à l’endroit où se trouvent les '
  - type: text
    content: esprits
  - type: text
    content: ' du peuple de Dieu. Ces gens sont devenus justes avec Dieu. Dieu a maintenant terminé son travail en eux. '
  '24':
  - type: text
    content: Vous êtes venus vers Jésus, qui a apporté le nouvel accord de Dieu à son peuple. Dans cet accord, le sang de la mort de Jésus nous purifie de nos péchés. Il nous dit que Dieu nous a pardonné. Lorsque Caïn a tué son frère Abel, le sang d’Abel a apporté la punition de Dieu. Nous voyons donc que le sang de Jésus nous a apporté bien mieux que cela.
  '25':
  - type: text
    content: 'Soyez donc prudents ! Soyez toujours prêts à écouter quand Dieu parle. Dieu a utilisé Moïse comme son serviteur sur la terre pour parler au peuple d’Israël. Quand ces gens ont refusé d’obéir, Dieu les a punis. Ils ne pouvaient pas s’échapper. Quant à nous, Dieu nous parle du '
  - type: text
    content: ciel
  - type: text
    content: '. Donc, nous n’échapperons certainement pas à la punition de Dieu si nous nous détournons de lui. '
  '26':
  - type: text
    content: 'Sur la montagne de Sinaï, il y a de nombreuses années, la voix de Dieu a fait bouger fortement la terre. Mais maintenant, Dieu a promis ceci : Encore une fois, je ferai bouger la terre. Mais cette fois, je ferai également bouger le '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '27':
  - type: text
    content: Ces mots, une fois de plus, nous montrent que Dieu retranchera les choses qu’il a faites. Toutes les choses sur la terre qu’il fait bouger finiront. Après cela, tout ce qu’il ne fera pas bouger, continuera d’être là.
  '28':
  - type: text
    content: 'Mais nous recevons un lieu où nous régnerons avec Dieu. Nous appartenons au '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: ', et personne ne pourra jamais bouger cela ! Donc, nous devons remercier Dieu. Nous devons l’'
  - type: text
    content: adorer
  - type: text
    content: ' d’une manière qui le rend heureux. Il est grand et nous devons bien le servir et le respecter. '
  '29':
  - type: text
    content: Souvenez‑vous que notre Dieu est comme un feu. Il détruit tout ce qui n’est pas bon.
  '3':
  - type: text
    content: Réfléchissez donc bien à la façon dont Jésus a vécu sur la terre. Les mauvaises personnes ont fait de très mauvaises choses contre lui, mais il est resté fort. Pensez à lui, et alors vous ne deviendrez pas faibles en tant que chrétiens. Vous ne laisserez pas de faire confiance à Dieu.
  '4':
  - type: text
    content: Vous vous battez contre le péché dans vos vies. Vous luttez contre le péché. Mais vous n’avez pas encore résisté jusqu’a verser du sang.
  '5':
  - type: text
    content: 'Dieu vous parle comme à ses enfants. N’oubliez jamais ces mots de la Bible qui vous rendront forts :'
  - type: text
    content: 'Mon fils, lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te montre ce qui est juste,'
  - type: text
    content: Ne l’oublie pas facilement.
  - type: text
    content: Ne sois pas en colère quand il te punit.
  '6':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait cela à tous ceux qu’il aime.'
  - type: text
    content: Il punit tous ceux qu’il accepte comme fils.
  '7':
  - type: text
    content: 'Lorsque vous avez des problèmes dans vos vies, vous devez être patients et forts. N’oubliez pas que Dieu vous enseigne ce qui est bien, parce que vous êtes ses enfants. Il n’y a jamais eu de fils que le père ne punit pas. '
  '8':
  - type: text
    content: 'Dieu enseigne à tous ses enfants de ne pas faire du mal. Donc s’il ne vous punit pas, cela montre que vous n’êtes pas vraiment ses enfants. Au lieu de cela, vous êtes comme des enfants qui ne lui appartiennent pas vraiment. '
  '9':
  - type: text
    content: 'De plus, nous avons tous eu des pères humains qui nous ont punis. En conséquence, nous les avons respectés. Pensez donc à notre Père auquel nos '
  - type: text
    content: esprits
  - type: text
    content: ' appartiennent. Nous devons sûrement lui obéir, et alors il nous donnera la vraie vie.'
