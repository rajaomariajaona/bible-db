document_id: REV.14,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 14
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Agneau et les 144 000 personnes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Puis j’ai regardé de nouveau et j’ai vu l’Agneau. Il se tenait sur la montagne de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sion
    - type: text
      text: ' à Jérusalem. Il y avait 144 000 personnes avec lui. Le nom de l’Agneau et le nom de son Père étaient écrits sur les fronts de ces gens.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dieu sera très en colère contre tous ces gens. Ils seront comme des gens qui boivent du vin fort de Dieu. Quand ils boivent de la coupe de vin de Dieu, ils ressentiront une très grande douleur. Le feu et le soufre les brûleront. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu et l’Agneau veilleront pendant que Dieu les punira. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La fumée s’élèvera pour toujours pendant qu’ils brûleront. Ils n’auront pas de repos le jour ou la nuit. Cela arrivera à tous ceux qui adorent l’animal et son idole. Cela arrivera à tous ceux qui recevront le signe qui porte son nom.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Cela signifie que le peuple de Dieu doit continuer d’être patient et fort. Il doit continuer d’obéir aux règles de Dieu. Il doit continuer de faire confiance en Jésus.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Puis j’ai entendu une voix qui parlait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Elle disait : Écris ceci : A partir de ce moment, les gens qui continueront à croire au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et qui mourront, seront très heureux. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu dit : Oui, ils se reposeront de leur travail. Dieu n’oubliera pas les bonnes choses qu’ils ont faites.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La récolte sur la terre
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors j’ai regardé, et j’ai vu un nuage blanc devant moi. J’ai vu quelqu’un qui était comme un fils d’homme. Il était assis sur le nuage. Il avait une couronne d’or sur la tête et un couteau tranchant à la main. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Un autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' est sorti de la maison de Dieu (temple) au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il criait d’une voix forte à la personne qui était assise sur le nuage. Il lui a dit : Utilise ton couteau bien tranchant et commence à travailler. Il est temps d’apporter la récolte. Coupe les plantes et apporte‑les. La récolte sur la terre est maintenant prête.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: La personne assise sur le nuage a déplacé son couteau bien tranchant sur la terre. Il a coupé les plantes de la terre et a ramené la récolte.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Un autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' est sorti de la maison de Dieu (temple) au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il avait également un couteau tranchant à la main. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Encore un autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' est venu de l’autel où les gens donnaient des offrandes. Cet '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' avait le pouvoir du feu sur l’autel. Il criait d’une voix forte à l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui avait le couteau tranchant. Il lui a dit : Utilise ton couteau et coupe les raisins de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vigne
    - type: text
      text: ' terrestre. Les raisins sont maintenant prêts à faire du vin.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a donc jeté son couteau tranchant sur la terre. Il a découpé les raisins qui poussaient dans le champ des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vignes
    - type: text
      text: ' de la terre. Il a jeté les raisins dans un grand trou dans le sol. C’est là que Dieu montre qu’il est très en colère contre les mauvaises personnes. C’est le pressoir où il fait des raisins du vin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Puis j’ai entendu un bruit fort qui venait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Le bruit était comme celui de grosses eaux qui se déplaçaient très vite. C’était comme le bruit fort du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tonnerre
    - type: text
      text: '. Le son était comme des gens qui faisaient de la musique avec des harpes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Le pressoir était hors de la ville. Lorsqu’on pressait les raisins, le jus qui sortait du pressoir était du sang. Le sang était très abondant. Ce sang montait jusqu’au cou des chevaux et allait jusqu’à 300 kilomètres.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les 144 000 personnes chantaient une nouvelle chanson qu’elles avaient apprise. Ces gens chantaient devant le trône. Ils chantaient devant les 4 êtres vivants et devant les anciens. Seules ces 144 000 personnes ont pu apprendre cette nouvelle chanson. Ce sont celles que Dieu a sauvées parmi les gens qui vivaient sur la terre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ces 144 000 personnes se sont gardées pures dans leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Ces gens sont complètement purs. Ils n’ont eu aucune relation sexuelle avec des femmes. Ils suivent l’Agneau partout où il va. Dieu les a sauvés des peuples du monde et il a payé pour leurs péchés. Ils sont les premiers à devenir un don à Dieu et à l’Agneau. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils n’ont jamais dit de mensonges. Ils n’ont rien fait de mal.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les 3 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' avec des messages'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Puis j’ai vu un autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui volait haut dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' au‑dessus de moi. Il a apporté le message de la Bonne Nouvelle de Dieu qui est toujours vrai. Il est venu dire cette Bonne Nouvelle à tous ceux qui vivent sur la terre. Il le dira aux gens de tous les pays, de tous les groupes familiaux et de toutes les langues. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il a dit à haute voix : Servez Dieu et acceptez qu’il est grand ! Il est maintenant temps pour lui de juger les gens. Il a fait le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ', la terre et la mer. Il a également fait les sources d’eau. Alors adorez‑le !'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Un deuxième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a suivi le premier. Il a dit : Dieu a détruit Babylone ! Ce n’est plus une grande ville ! C’est comme une prostituée qui rend les hommes ivres. Ensuite, elle les conduit à avoir des relations sexuelles d’une mauvaise façon. Ainsi, elle a poussé les gens de tous les pays à laisser Dieu.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Un troisième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a suivi les 2 autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '. Il a dit d’une voix forte : Si quelqu’un adore l’animal et son idole, Dieu le punira. Si quelqu’un reçoit le signe de cet animal sur sa tête ou sur sa main, Dieu le punira. '
