document_id: REV.14,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 14
  - type: heading
    content: L’Agneau et les 144 000 personnes
  - type: text
    content: 'Puis j’ai regardé de nouveau et j’ai vu l’Agneau. Il se tenait sur la montagne de '
  - type: text
    content: Sion
  - type: text
    content: ' à Jérusalem. Il y avait 144 000 personnes avec lui. Le nom de l’Agneau et le nom de son Père étaient écrits sur les fronts de ces gens.'
  '10':
  - type: text
    content: 'Dieu sera très en colère contre tous ces gens. Ils seront comme des gens qui boivent du vin fort de Dieu. Quand ils boivent de la coupe de vin de Dieu, ils ressentiront une très grande douleur. Le feu et le soufre les brûleront. Les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu et l’Agneau veilleront pendant que Dieu les punira. '
  '11':
  - type: text
    content: La fumée s’élèvera pour toujours pendant qu’ils brûleront. Ils n’auront pas de repos le jour ou la nuit. Cela arrivera à tous ceux qui adorent l’animal et son idole. Cela arrivera à tous ceux qui recevront le signe qui porte son nom.
  '12':
  - type: text
    content: Cela signifie que le peuple de Dieu doit continuer d’être patient et fort. Il doit continuer d’obéir aux règles de Dieu. Il doit continuer de faire confiance en Jésus.
  '13':
  - type: text
    content: 'Puis j’ai entendu une voix qui parlait du '
  - type: text
    content: ciel
  - type: text
    content: '. Elle disait : Écris ceci : A partir de ce moment, les gens qui continueront à croire au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et qui mourront, seront très heureux. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu dit : Oui, ils se reposeront de leur travail. Dieu n’oubliera pas les bonnes choses qu’ils ont faites.'
  - type: heading
    content: La récolte sur la terre
  '14':
  - type: text
    content: 'Alors j’ai regardé, et j’ai vu un nuage blanc devant moi. J’ai vu quelqu’un qui était comme un fils d’homme. Il était assis sur le nuage. Il avait une couronne d’or sur la tête et un couteau tranchant à la main. '
  '15':
  - type: text
    content: 'Un autre '
  - type: text
    content: ange
  - type: text
    content: ' est sorti de la maison de Dieu (temple) au '
  - type: text
    content: ciel
  - type: text
    content: '. Il criait d’une voix forte à la personne qui était assise sur le nuage. Il lui a dit : Utilise ton couteau bien tranchant et commence à travailler. Il est temps d’apporter la récolte. Coupe les plantes et apporte‑les. La récolte sur la terre est maintenant prête.'
  '16':
  - type: text
    content: La personne assise sur le nuage a déplacé son couteau bien tranchant sur la terre. Il a coupé les plantes de la terre et a ramené la récolte.
  '17':
  - type: text
    content: 'Un autre '
  - type: text
    content: ange
  - type: text
    content: ' est sorti de la maison de Dieu (temple) au '
  - type: text
    content: ciel
  - type: text
    content: '. Il avait également un couteau tranchant à la main. '
  '18':
  - type: text
    content: 'Encore un autre '
  - type: text
    content: ange
  - type: text
    content: ' est venu de l’autel où les gens donnaient des offrandes. Cet '
  - type: text
    content: ange
  - type: text
    content: ' avait le pouvoir du feu sur l’autel. Il criait d’une voix forte à l’'
  - type: text
    content: ange
  - type: text
    content: ' qui avait le couteau tranchant. Il lui a dit : Utilise ton couteau et coupe les raisins de la '
  - type: text
    content: vigne
  - type: text
    content: ' terrestre. Les raisins sont maintenant prêts à faire du vin.'
  '19':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' a donc jeté son couteau tranchant sur la terre. Il a découpé les raisins qui poussaient dans le champ des '
  - type: text
    content: vignes
  - type: text
    content: ' de la terre. Il a jeté les raisins dans un grand trou dans le sol. C’est là que Dieu montre qu’il est très en colère contre les mauvaises personnes. C’est le pressoir où il fait des raisins du vin. '
  '2':
  - type: text
    content: 'Puis j’ai entendu un bruit fort qui venait du '
  - type: text
    content: ciel
  - type: text
    content: '. Le bruit était comme celui de grosses eaux qui se déplaçaient très vite. C’était comme le bruit fort du '
  - type: text
    content: tonnerre
  - type: text
    content: '. Le son était comme des gens qui faisaient de la musique avec des harpes. '
  '20':
  - type: text
    content: Le pressoir était hors de la ville. Lorsqu’on pressait les raisins, le jus qui sortait du pressoir était du sang. Le sang était très abondant. Ce sang montait jusqu’au cou des chevaux et allait jusqu’à 300 kilomètres.
  '3':
  - type: text
    content: Les 144 000 personnes chantaient une nouvelle chanson qu’elles avaient apprise. Ces gens chantaient devant le trône. Ils chantaient devant les 4 êtres vivants et devant les anciens. Seules ces 144 000 personnes ont pu apprendre cette nouvelle chanson. Ce sont celles que Dieu a sauvées parmi les gens qui vivaient sur la terre.
  '4':
  - type: text
    content: 'Ces 144 000 personnes se sont gardées pures dans leurs '
  - type: text
    content: esprits
  - type: text
    content: '. Ces gens sont complètement purs. Ils n’ont eu aucune relation sexuelle avec des femmes. Ils suivent l’Agneau partout où il va. Dieu les a sauvés des peuples du monde et il a payé pour leurs péchés. Ils sont les premiers à devenir un don à Dieu et à l’Agneau. '
  '5':
  - type: text
    content: Ils n’ont jamais dit de mensonges. Ils n’ont rien fait de mal.
  - type: heading
    content: Les 3 anges avec des messages
  '6':
  - type: text
    content: 'Puis j’ai vu un autre '
  - type: text
    content: ange
  - type: text
    content: ' qui volait haut dans le '
  - type: text
    content: ciel
  - type: text
    content: ' au‑dessus de moi. Il a apporté le message de la Bonne Nouvelle de Dieu qui est toujours vrai. Il est venu dire cette Bonne Nouvelle à tous ceux qui vivent sur la terre. Il le dira aux gens de tous les pays, de tous les groupes familiaux et de toutes les langues. '
  '7':
  - type: text
    content: 'Il a dit à haute voix : Servez Dieu et acceptez qu’il est grand ! Il est maintenant temps pour lui de juger les gens. Il a fait le '
  - type: text
    content: ciel
  - type: text
    content: ', la terre et la mer. Il a également fait les sources d’eau. Alors adorez‑le !'
  '8':
  - type: text
    content: 'Un deuxième '
  - type: text
    content: ange
  - type: text
    content: ' a suivi le premier. Il a dit : Dieu a détruit Babylone ! Ce n’est plus une grande ville ! C’est comme une prostituée qui rend les hommes ivres. Ensuite, elle les conduit à avoir des relations sexuelles d’une mauvaise façon. Ainsi, elle a poussé les gens de tous les pays à laisser Dieu.'
  '9':
  - type: text
    content: 'Un troisième '
  - type: text
    content: ange
  - type: text
    content: ' a suivi les 2 autres '
  - type: text
    content: anges
  - type: text
    content: '. Il a dit d’une voix forte : Si quelqu’un adore l’animal et son idole, Dieu le punira. Si quelqu’un reçoit le signe de cet animal sur sa tête ou sur sa main, Dieu le punira. '
