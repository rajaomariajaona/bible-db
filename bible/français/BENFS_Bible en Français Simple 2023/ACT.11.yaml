document_id: ACT.11,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 11
  - type: heading
    content: Pierre revient à Jérusalem
  - type: text
    content: 'Les '
  - type: text
    content: apôtres
  - type: text
    content: ' et les autres croyants de Judée ont entendu parler de ce qui s’était produit à '
  - type: text
    content: Césarée
  - type: text
    content: . Ils ont entendu que les étrangers ou non‑
  - type: text
    content: Juifs
  - type: text
    content: ' avaient également cru au message de Dieu. '
  '10':
  - type: text
    content: 'Tout ceci s’est produit 3 fois. Alors immédiatement le tissu est retourné au '
  - type: text
    content: ciel
  - type: text
    content: .
  '11':
  - type: text
    content: 'A ce moment, 3 hommes de '
  - type: text
    content: Césarée
  - type: text
    content: ' sont arrivés à la maison où je restais. Quelqu’un avait envoyé ces hommes pour me chercher. '
  '12':
  - type: text
    content: 'Le Saint‑Esprit m’a dit : Lève‑toi et va en bas. J’ai envoyé ces hommes pour te voir. C’est bon que tu ailles avec eux. Ces 6 croyants de '
  - type: text
    content: Joppé
  - type: text
    content: ' sont également allés avec moi à '
  - type: text
    content: Césarée
  - type: text
    content: '. Nous sommes tous entrés dans la maison de Corneille. '
  '13':
  - type: text
    content: 'Alors Corneille nous a dit ce qui lui était arrivé. Il avait vu un '
  - type: text
    content: ange
  - type: text
    content: . L’
  - type: text
    content: ange
  - type: text
    content: ' se tenait dans sa maison. Et il avait dit à Corneille : Envoie quelqu’un à '
  - type: text
    content: Joppé
  - type: text
    content: '. Il ira trouver un homme qui reste là. Son nom est Simon Pierre. '
  '14':
  - type: text
    content: Il viendra et parlera chez toi. Et son message te montrera comment Dieu peut te sauver. Le message est pour toi, ta famille et tes serviteurs.
  '15':
  - type: text
    content: 'Quand je disais le message à Corneille et sa famille, Dieu leur a tous donné son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Le Saint‑Esprit est venu sur eux, comme il était venu sur nous la première fois. '
  '16':
  - type: text
    content: 'Alors je me suis rappelé ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus nous avait dit. Jean baptisait des gens avec de l’eau, mais Dieu vous baptisera avec son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ainsi nous sommes sûrs de cela. Dieu a offert à ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: ' son don du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Il le leur a envoyé comme il nous l’avait donné. Il nous a donné le Saint‑Esprit quand nous avons cru au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Et Dieu a également voulu faire ceci pour ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: . Je ne peux pas être contre Dieu.
  '18':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont entendu ce que Pierre disait. Et ils lui ont dit qu’il avait fait de bonnes choses. Ainsi ils ont dit à Dieu : Tu es très grand et important. Tu as aidé ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: . Maintenant ils peuvent également te dire qu’ils sont tristes. Ils peuvent également laisser de faire de mauvaises choses. Ils peuvent commencer à t’obéir. Ils peuvent également avoir la vie vraie.
  - type: heading
    content: Les croyants vont à Antioche
  '19':
  - type: text
    content: 'Quand Étienne est mort, il y avait la '
  - type: text
    content: persécution
  - type: text
    content: '. Certains croyants sont allés. Ils sont allés partout. Certains sont allés jusqu’en Phénicie, à Chypre et à Antioche. Ils disaient la Parole de Dieu aux '
  - type: text
    content: Juifs
  - type: text
    content: ' seulement. '
  '2':
  - type: text
    content: 'Pierre est alors retourné à Jérusalem. Quelques '
  - type: text
    content: Juifs
  - type: text
    content: ' lui ont posé des questions pour prouver qu’il avait fait quelque chose de mal. Ces '
  - type: text
    content: Juifs
  - type: text
    content: ' pensaient que les étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: ' devaient être circoncis. '
  '20':
  - type: text
    content: 'Certains des croyants étaient de Chypre et Cyrène. Ces hommes sont allés à Antioche. Là ils disaient le message de Dieu aux '
  - type: text
    content: Juifs
  - type: text
    content: '. Mais ils le disaient également à ceux qui n’étaient pas '
  - type: text
    content: Juifs
  - type: text
    content: '. Ils disaient à chacun la Bonne Nouvelle au sujet du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. '
  '21':
  - type: text
    content: 'Dieu aidait ces hommes. Il les rendait aussi puissants. Et beaucoup de gens croyaient à la Bonne Nouvelle au sujet de Jésus. Ils demandaient à Jésus de devenir leur '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '22':
  - type: text
    content: 'Les croyants de Jérusalem entendaient parler de ce qui s’était produit à Antioche. Ainsi ils ont décidé d’envoyer Barnabas là. '
  '23':
  - type: text
    content: 'Barnabas est arrivé à Antioche. Puis, il a vu que Dieu avait fait de bonnes choses pour le peuple. Barnabas était heureux de cela. Ainsi il disait aux nouveaux croyants : Continuez à obéir au '
  - type: text
    content: Seigneur
  - type: text
    content: ' comme vous le faites. Lui obéir dans tout que vous faites et vous dites. '
  '24':
  - type: text
    content: Barnabas était un homme bon et le Saint‑
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vivait en lui. A tout moment, il croyait en Dieu en toute chose. Beaucoup de gens sont devenus des croyants.'
  '25':
  - type: text
    content: 'Alors Barnabas est allé à Tarse chercher Saul. '
  '26':
  - type: text
    content: Et quand Barnabas l’a trouvé, Saul est revenu à Antioche avec Barnabas. Pendant une année, Barnabas et Saul se réunissaient ainsi avec les croyants d’Antioche. Et ils enseignaient beaucoup de gens. Antioche était le premier endroit où les croyants étaient appelés chrétiens.
  - type: heading
    content: Les disciples envoient de l’aide aux frères de Judée
  '27':
  - type: text
    content: 'En ce temps‑là, quelques '
  - type: text
    content: prophètes
  - type: text
    content: ' voyageaient de Jérusalem à Antioche. '
  '28':
  - type: text
    content: 'L’un de ces hommes était appelé Agabus. Il s’est levé et il a dit au peuple un message de Dieu. Le Saint‑Esprit lui a dit de dire ceci : Bientôt, il y aura une grande famine pendant un certain temps partout dans le monde. Et cela s’est produit quand '
  - type: text
    content: César
  - type: text
    content: ' Claude régnait dans le monde '
  - type: text
    content: romain
  - type: text
    content: .
  '29':
  - type: text
    content: 'Tous ceux qui ont cru en Jésus voulaient aider les autres croyants de Judée. Ainsi ils ont décidé de leur envoyer une partie de leur propre argent. '
  '3':
  - type: text
    content: 'Ainsi ils ont dit à Pierre : Tu es resté dans la maison des hommes qui n’étaient pas circoncis. Tu as même mangé des repas avec eux !'
  '30':
  - type: text
    content: Les croyants d’Antioche donnaient de l’argent à Barnabas et à Saul. Ainsi Barnabas et Saul l’ont pris et ils l’ont donné aux chefs des croyants de Judée.
  '4':
  - type: text
    content: 'Pierre a dit à ces croyants '
  - type: text
    content: juifs
  - type: text
    content: ' tout ce qui s’était produit à partir du commencement. Il leur a expliqué : '
  '5':
  - type: text
    content: 'J’étais dans la ville de '
  - type: text
    content: Joppé
  - type: text
    content: '. Je priais. J’ai commencé à avoir sommeil et j’ai vu une vision. Et quelque chose descendait. C’était comme une grande nappe. Cette chose était attachée aux 4 coins. Cela descendait du '
  - type: text
    content: ciel
  - type: text
    content: ' jusqu’à moi. '
  '6':
  - type: text
    content: 'Je regardais cela. J’ai vu les quadrupèdes de la terre, les animaux sauvages, les reptiles et les oiseaux du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Alors j’ai entendu le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parler. La voix disait : Pierre, lève‑toi et tue un animal. Alors tu peux le faire cuire et le manger.'
  '8':
  - type: text
    content: 'J’ai répondu : Non, '
  - type: text
    content: Seigneur
  - type: text
    content: ', je ne peux pas faire quelque chose comme cela. Je n’ai jamais mangé un animal que ta loi ne nous permet pas de manger.'
  '9':
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m’a dit : Dieu a rendu ces animaux bons à manger. Ainsi tu ne dois pas dire que Dieu ne t’acceptera pas si tu manges l’un d’entre eux. '
