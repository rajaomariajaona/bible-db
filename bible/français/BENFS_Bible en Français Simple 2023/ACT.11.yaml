document_id: ACT.11
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 11
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre revient à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' et les autres croyants de Judée ont entendu parler de ce qui s’était produit à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: . Ils ont entendu que les étrangers ou non‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' avaient également cru au message de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pierre est alors retourné à Jérusalem. Quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' lui ont posé des questions pour prouver qu’il avait fait quelque chose de mal. Ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' pensaient que les étrangers ou non‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' devaient être circoncis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi ils ont dit à Pierre : Tu es resté dans la maison des hommes qui n’étaient pas circoncis. Tu as même mangé des repas avec eux !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pierre a dit à ces croyants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' tout ce qui s’était produit à partir du commencement. Il leur a expliqué : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J’étais dans la ville de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joppé
  - type: text
    text: '. Je priais. J’ai commencé à avoir sommeil et j’ai vu une vision. Et quelque chose descendait. C’était comme une grande nappe. Cette chose était attachée aux 4 coins. Cela descendait du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' jusqu’à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je regardais cela. J’ai vu les quadrupèdes de la terre, les animaux sauvages, les reptiles et les oiseaux du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors j’ai entendu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parler. La voix disait : Pierre, lève‑toi et tue un animal. Alors tu peux le faire cuire et le manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J’ai répondu : Non, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', je ne peux pas faire quelque chose comme cela. Je n’ai jamais mangé un animal que ta loi ne nous permet pas de manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m’a dit : Dieu a rendu ces animaux bons à manger. Ainsi tu ne dois pas dire que Dieu ne t’acceptera pas si tu manges l’un d’entre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tout ceci s’est produit 3 fois. Alors immédiatement le tissu est retourné au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'A ce moment, 3 hommes de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' sont arrivés à la maison où je restais. Quelqu’un avait envoyé ces hommes pour me chercher. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le Saint‑Esprit m’a dit : Lève‑toi et va en bas. J’ai envoyé ces hommes pour te voir. C’est bon que tu ailles avec eux. Ces 6 croyants de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joppé
  - type: text
    text: ' sont également allés avec moi à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: '. Nous sommes tous entrés dans la maison de Corneille. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Corneille nous a dit ce qui lui était arrivé. Il avait vu un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: . L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' se tenait dans sa maison. Et il avait dit à Corneille : Envoie quelqu’un à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Joppé
  - type: text
    text: '. Il ira trouver un homme qui reste là. Son nom est Simon Pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il viendra et parlera chez toi. Et son message te montrera comment Dieu peut te sauver. Le message est pour toi, ta famille et tes serviteurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand je disais le message à Corneille et sa famille, Dieu leur a tous donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: '. Le Saint‑Esprit est venu sur eux, comme il était venu sur nous la première fois. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors je me suis rappelé ce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus nous avait dit. Jean baptisait des gens avec de l’eau, mais Dieu vous baptisera avec son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ainsi nous sommes sûrs de cela. Dieu a offert à ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' son don du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: '. Il le leur a envoyé comme il nous l’avait donné. Il nous a donné le Saint‑Esprit quand nous avons cru au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Et Dieu a également voulu faire ceci pour ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Je ne peux pas être contre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont entendu ce que Pierre disait. Et ils lui ont dit qu’il avait fait de bonnes choses. Ainsi ils ont dit à Dieu : Tu es très grand et important. Tu as aidé ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Maintenant ils peuvent également te dire qu’ils sont tristes. Ils peuvent également laisser de faire de mauvaises choses. Ils peuvent commencer à t’obéir. Ils peuvent également avoir la vie vraie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les croyants vont à Antioche
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand Étienne est mort, il y avait la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: persécution
  - type: text
    text: '. Certains croyants sont allés. Ils sont allés partout. Certains sont allés jusqu’en Phénicie, à Chypre et à Antioche. Ils disaient la Parole de Dieu aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' seulement. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Certains des croyants étaient de Chypre et Cyrène. Ces hommes sont allés à Antioche. Là ils disaient le message de Dieu aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Mais ils le disaient également à ceux qui n’étaient pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Ils disaient à chacun la Bonne Nouvelle au sujet du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dieu aidait ces hommes. Il les rendait aussi puissants. Et beaucoup de gens croyaient à la Bonne Nouvelle au sujet de Jésus. Ils demandaient à Jésus de devenir leur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les croyants de Jérusalem entendaient parler de ce qui s’était produit à Antioche. Ainsi ils ont décidé d’envoyer Barnabas là. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Barnabas est arrivé à Antioche. Puis, il a vu que Dieu avait fait de bonnes choses pour le peuple. Barnabas était heureux de cela. Ainsi il disait aux nouveaux croyants : Continuez à obéir au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' comme vous le faites. Lui obéir dans tout que vous faites et vous dites. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Barnabas était un homme bon et le Saint‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vivait en lui. A tout moment, il croyait en Dieu en toute chose. Beaucoup de gens sont devenus des croyants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors Barnabas est allé à Tarse chercher Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Et quand Barnabas l’a trouvé, Saul est revenu à Antioche avec Barnabas. Pendant une année, Barnabas et Saul se réunissaient ainsi avec les croyants d’Antioche. Et ils enseignaient beaucoup de gens. Antioche était le premier endroit où les croyants étaient appelés chrétiens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' envoient de l’aide aux frères de Judée'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En ce temps‑là, quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' voyageaient de Jérusalem à Antioche. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’un de ces hommes était appelé Agabus. Il s’est levé et il a dit au peuple un message de Dieu. Le Saint‑Esprit lui a dit de dire ceci : Bientôt, il y aura une grande famine pendant un certain temps partout dans le monde. Et cela s’est produit quand '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: ' Claude régnait dans le monde '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romain
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tous ceux qui ont cru en Jésus voulaient aider les autres croyants de Judée. Ainsi ils ont décidé de leur envoyer une partie de leur propre argent. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les croyants d’Antioche donnaient de l’argent à Barnabas et à Saul. Ainsi Barnabas et Saul l’ont pris et ils l’ont donné aux chefs des croyants de Judée.
