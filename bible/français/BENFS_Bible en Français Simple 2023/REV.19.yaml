document_id: REV.19,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 19
  - type: heading
    content: Les gens louent Dieu dans le ciel
  - type: text
    content: 'Après ces choses, j’ai entendu un son comme les voix de très nombreuses personnes dans le '
  - type: text
    content: ciel
  - type: text
    content: '. La foule criait :'
  - type: text
    content: 'Nous louons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' notre Dieu !'
  - type: text
    content: Il nous a sauvés !
  - type: text
    content: Il est vraiment puissant !
  - type: text
    content: Nous disons qu’il est grand !
  '10':
  - type: text
    content: Alors je me suis incliné aux pieds de l’
  - type: text
    content: ange
  - type: text
    content: ' pour l’'
  - type: text
    content: adorer
  - type: text
    content: '. Mais il m’a dit : Tu ne dois pas faire ça ! Je suis un serviteur de Dieu comme toi. Je suis un serviteur, comme tous les croyants qui continuent à faire confiance en Jésus. Ils disent son message. Adore Dieu ! C’est l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu qui aide ces croyants à parler du message de Dieu. C’est ainsi qu’ils parlent de Jésus aux autres.'
  - type: heading
    content: Le grand roi sur un cheval blanc
  '11':
  - type: text
    content: 'J’ai vu que le '
  - type: text
    content: ciel
  - type: text
    content: ' était maintenant ouvert. J’y ai vu un cheval blanc ! Le nom de l’homme qui montait sur le cheval était le suivant : Un homme honnête en qui tu peux avoir confiance. Cet homme est toujours juste quand il '
  - type: text
    content: juge
  - type: text
    content: ' les gens. Il est toujours juste lorsqu’il fait une guerre. '
  '12':
  - type: text
    content: 'Ses yeux ressemblaient aux flammes de feu. De nombreuses couronnes étaient sur sa tête. Il avait un nom qui était écrit sur lui, mais personne ne connaît ce nom sauf lui‑même. '
  '13':
  - type: text
    content: 'Il portait une longue chemise qui avait beaucoup de sang dessus. Son nom est : La Parole de Dieu.'
  '14':
  - type: text
    content: 'Les armées du '
  - type: text
    content: ciel
  - type: text
    content: ' le suivaient. Elles montaient également sur des chevaux blancs. Elles portaient des vêtements propres et blancs. '
  '15':
  - type: text
    content: 'Une épée tranchante sortait de la bouche de cet homme. Il utilisera cette épée pour frapper le peuple de tous les pays du monde. Il les dirigera ensuite avec un bâton de fer et avec une grande puissance. Il les punira comme quelqu’un qui marche sur des raisins pour faire du vin. Cela montre que Dieu est très en colère. Il a toute puissance et tout pouvoir, et il punira ses ennemis. '
  '16':
  - type: text
    content: 'L’homme qui montait sur le cheval blanc avait un nom qui était écrit sur sa chemise. Ce nom était également écrit sur sa cuisse. Ce nom était :'
  - type: text
    content: Le roi qui règne sur tous les autres rois.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui est au‑dessus de tous les seigneurs.'
  '17':
  - type: text
    content: 'Puis j’ai vu un '
  - type: text
    content: ange
  - type: text
    content: ' qui se tenait au soleil. Il criait haut et fort à tous les oiseaux qui volaient haut dans le ciel : Venez ici ! Rassemblez‑vous pour manger le grand repas de Dieu. '
  '18':
  - type: text
    content: Mangez la chair des cadavres jusqu’à ce que vous soyez rassasiés ! Venez manger la chair des rois, la chair des chefs militaires et la chair des hommes puissants. Mangez la chair des chevaux morts et la chair de ceux qui les montent. Vous pouvez manger la chair de toutes sortes de morts. Ils peuvent être des esclaves ou des gens libres. Ils peuvent être des gens importants ou des gens sans importance.
  '19':
  - type: text
    content: 'Puis j’ai vu l’animal avec les rois de la terre et leurs armées. Ils s’étaient réunis pour mener une guerre. Ils allaient se battre contre l’homme qui montait sur le cheval blanc et son armée. '
  '2':
  - type: text
    content: Tout ce qu’il décide est bon et juste.
  - type: text
    content: Il a décidé de punir cette grande prostituée.
  - type: text
    content: Elle a conduit les gens sur terre à faire de mauvaises choses.
  - type: text
    content: Tout ce qu’il décide est vrai et juste. Il a décidé de punir cette grande prostituée (Babylone). Elle a poussé les gens sur terre à faire de mauvaises choses. Elle a tué les serviteurs de Dieu de ses propres mains.
  - type: text
    content: À cause de tout cela, Dieu l'a maintenant punie.
  - type: text
    content: Elle a tué les serviteurs de Dieu de ses propres mains.
  - type: text
    content: À cause de tout cela, Dieu l’a maintenant punie.
  - type: text
    content: Alors, nous le louons !
  '20':
  - type: text
    content: 'Mais l’homme et son armée ont attrapé l’animal et le faux '
  - type: text
    content: prophète
  - type: text
    content: '. C’est le '
  - type: text
    content: prophète
  - type: text
    content: ' qui avait fait des miracles pour aider l’animal. Avec ces miracles, il avait fait croire aux gens ses mensonges. Ce sont les gens qui avaient le signe de l’animal sur eux. Ils adoraient son idole. Maintenant, l’homme qui montait sur le cheval blanc a attrapé l’animal et le faux '
  - type: text
    content: prophète
  - type: text
    content: '. Il les a jetés dans le lac alors qu’ils étaient encore en vie. C’était l’étang de feu et de soufre. '
  '21':
  - type: text
    content: L’homme qui montait sur le cheval blanc a tué tous ses autres ennemis. Il les a tués avec l’épée qui est sortie de sa bouche. Alors, tous les oiseaux ont mangé la chair des cadavres jusqu’à ce qu’ils soient complètement rassasiés.
  '3':
  - type: text
    content: 'Alors la foule des gens dans le '
  - type: text
    content: ciel
  - type: text
    content: ' a de nouveau crié,'
  - type: text
    content: 'Nous louons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' notre Dieu !'
  - type: text
    content: La fumée du feu qui brûle cette ville va monter pour toujours.
  '4':
  - type: text
    content: 'Les 24 anciens et les 4 êtres vivants se sont alors jetés par terre. Ils adoraient Dieu, qui était assis sur le trône. Ils ont dit : C’est vrai ! Vive le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu !'
  '5':
  - type: text
    content: 'Alors une voix a parlé du trône. Elle disait :'
  - type: text
    content: Vous tous qui êtes serviteurs de Dieu,
  - type: text
    content: Louez notre Dieu !
  - type: text
    content: Vous tous qui servez Dieu, adorez‑le !
  - type: text
    content: Vous qui êtes des gens importants et vous qui n’êtes pas importants, adorez‑le !
  '6':
  - type: text
    content: 'Encore une fois, j’ai entendu un bruit semblable à celui de beaucoup de gens, et ils criaient. Le son était comme le bruit de nombreuses eaux qui se déplacent très rapidement. C’était comme le bruit du '
  - type: text
    content: tonnerre
  - type: text
    content: '. Beaucoup de gens criaient :'
  - type: text
    content: 'Nous louons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' notre Dieu !'
  - type: text
    content: Il dirige avec toute puissance et tout pouvoir !
  '7':
  - type: text
    content: Maintenant, nous sommes très heureux !
  - type: text
    content: Nous dirons à quel point Dieu est grand !
  - type: text
    content: Le moment du mariage de l’Agneau est maintenant venu.
  - type: text
    content: Sa femme qu’il épousera s’est préparée.
  '8':
  - type: text
    content: Dieu lui a donné des vêtements clairs et propres à porter.
  - type: text
    content: Ces vêtements spéciaux sont une image de bonnes choses que le peuple de Dieu a faites.
  '9':
  - type: text
    content: Alors l’
  - type: text
    content: ange
  - type: text
    content: ' m’a dit : Écris ce message : Quand l’Agneau se mariera, il y aura un repas spécial. Dieu demandera à son peuple de manger ce repas avec l’Agneau. Ces gens seront très heureux. L’'
  - type: text
    content: ange
  - type: text
    content: ' m’a aussi dit : Ceci est un vrai message de Dieu.'
