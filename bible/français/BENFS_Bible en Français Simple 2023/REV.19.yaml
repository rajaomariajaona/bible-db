document_id: REV.19
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 19
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les gens louent Dieu dans le ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces choses, j’ai entendu un son comme les voix de très nombreuses personnes dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. La foule criait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous louons le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' notre Dieu !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il nous a sauvés !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est vraiment puissant !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous disons qu’il est grand !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tout ce qu’il décide est bon et juste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a décidé de punir cette grande prostituée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a conduit les gens sur terre à faire de mauvaises choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout ce qu’il décide est vrai et juste. Il a décidé de punir cette grande prostituée (Babylone). Elle a poussé les gens sur terre à faire de mauvaises choses. Elle a tué les serviteurs de Dieu de ses propres mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: À cause de tout cela, Dieu l'a maintenant punie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a tué les serviteurs de Dieu de ses propres mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: À cause de tout cela, Dieu l’a maintenant punie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors, nous le louons !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors la foule des gens dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' a de nouveau crié,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous louons le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' notre Dieu !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La fumée du feu qui brûle cette ville va monter pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les 24 anciens et les 4 êtres vivants se sont alors jetés par terre. Ils adoraient Dieu, qui était assis sur le trône. Ils ont dit : C’est vrai ! Vive le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors une voix a parlé du trône. Elle disait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous qui êtes serviteurs de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez notre Dieu !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous qui servez Dieu, adorez‑le !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui êtes des gens importants et vous qui n’êtes pas importants, adorez‑le !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Encore une fois, j’ai entendu un bruit semblable à celui de beaucoup de gens, et ils criaient. Le son était comme le bruit de nombreuses eaux qui se déplacent très rapidement. C’était comme le bruit du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: tonnerre
  - type: text
    text: '. Beaucoup de gens criaient :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nous louons le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' notre Dieu !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il dirige avec toute puissance et tout pouvoir !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Maintenant, nous sommes très heureux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous dirons à quel point Dieu est grand !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le moment du mariage de l’Agneau est maintenant venu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa femme qu’il épousera s’est préparée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu lui a donné des vêtements clairs et propres à porter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces vêtements spéciaux sont une image de bonnes choses que le peuple de Dieu a faites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' m’a dit : Écris ce message : Quand l’Agneau se mariera, il y aura un repas spécial. Dieu demandera à son peuple de manger ce repas avec l’Agneau. Ces gens seront très heureux. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' m’a aussi dit : Ceci est un vrai message de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors je me suis incliné aux pieds de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' pour l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: '. Mais il m’a dit : Tu ne dois pas faire ça ! Je suis un serviteur de Dieu comme toi. Je suis un serviteur, comme tous les croyants qui continuent à faire confiance en Jésus. Ils disent son message. Adore Dieu ! C’est l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu qui aide ces croyants à parler du message de Dieu. C’est ainsi qu’ils parlent de Jésus aux autres.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le grand roi sur un cheval blanc
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J’ai vu que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' était maintenant ouvert. J’y ai vu un cheval blanc ! Le nom de l’homme qui montait sur le cheval était le suivant : Un homme honnête en qui tu peux avoir confiance. Cet homme est toujours juste quand il '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' les gens. Il est toujours juste lorsqu’il fait une guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ses yeux ressemblaient aux flammes de feu. De nombreuses couronnes étaient sur sa tête. Il avait un nom qui était écrit sur lui, mais personne ne connaît ce nom sauf lui‑même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il portait une longue chemise qui avait beaucoup de sang dessus. Son nom est : La Parole de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les armées du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' le suivaient. Elles montaient également sur des chevaux blancs. Elles portaient des vêtements propres et blancs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Une épée tranchante sortait de la bouche de cet homme. Il utilisera cette épée pour frapper le peuple de tous les pays du monde. Il les dirigera ensuite avec un bâton de fer et avec une grande puissance. Il les punira comme quelqu’un qui marche sur des raisins pour faire du vin. Cela montre que Dieu est très en colère. Il a toute puissance et tout pouvoir, et il punira ses ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’homme qui montait sur le cheval blanc avait un nom qui était écrit sur sa chemise. Ce nom était également écrit sur sa cuisse. Ce nom était :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi qui règne sur tous les autres rois.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' qui est au‑dessus de tous les seigneurs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis j’ai vu un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' qui se tenait au soleil. Il criait haut et fort à tous les oiseaux qui volaient haut dans le ciel : Venez ici ! Rassemblez‑vous pour manger le grand repas de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mangez la chair des cadavres jusqu’à ce que vous soyez rassasiés ! Venez manger la chair des rois, la chair des chefs militaires et la chair des hommes puissants. Mangez la chair des chevaux morts et la chair de ceux qui les montent. Vous pouvez manger la chair de toutes sortes de morts. Ils peuvent être des esclaves ou des gens libres. Ils peuvent être des gens importants ou des gens sans importance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis j’ai vu l’animal avec les rois de la terre et leurs armées. Ils s’étaient réunis pour mener une guerre. Ils allaient se battre contre l’homme qui montait sur le cheval blanc et son armée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais l’homme et son armée ont attrapé l’animal et le faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. C’est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' qui avait fait des miracles pour aider l’animal. Avec ces miracles, il avait fait croire aux gens ses mensonges. Ce sont les gens qui avaient le signe de l’animal sur eux. Ils adoraient son idole. Maintenant, l’homme qui montait sur le cheval blanc a attrapé l’animal et le faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '. Il les a jetés dans le lac alors qu’ils étaient encore en vie. C’était l’étang de feu et de soufre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L’homme qui montait sur le cheval blanc a tué tous ses autres ennemis. Il les a tués avec l’épée qui est sortie de sa bouche. Alors, tous les oiseaux ont mangé la chair des cadavres jusqu’à ce qu’ils soient complètement rassasiés.
