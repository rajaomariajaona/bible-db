document_id: ACT.7,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 7
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Étienne parle aux hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' a dit à Étienne : Ces hommes disent des choses au sujet de ce que tu enseignais. Est‑ce que ces choses sont vraies ?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu l’aidait dans toutes ses difficultés. Il lui a donné aussi une grande sagesse. À ce moment‑là, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharaon
    - type: text
      text: ' était le roi d’Égypte. Dieu aidait beaucoup Joseph. Alors '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharaon
    - type: text
      text: ' aimait Joseph. Il a vu que Joseph était très sage. Ainsi il a dit à Joseph de régner sur l’Égypte. Il lui a dit aussi de régner sur toute la maison du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharaon
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il y avait une grande faim dans toute l’Égypte et à Canaan. Beaucoup de gens souffraient et nos ancêtres n’avaient plus de nourriture. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob a entendu que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharaon
    - type: text
      text: ' avait mis beaucoup de graines de blé en réserve. Ainsi il a envoyé ses fils en Égypte pour acheter de la nourriture. C’était la première fois qu’ils sont allés en Égypte. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob a alors envoyé ses fils en Égypte une deuxième fois. Cette fois, Joseph leur a dit qu’il était leur frère. Alors '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharaon
    - type: text
      text: ' a entendu que les frères de Joseph étaient arrivés. Il a entendu parler de la famille de Joseph. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après ceci, Joseph a donné ce message à ses frères : Dites à notre père que je suis ici. Dites que je veux qu’il vienne. Dites‑lui d’emmener toute sa famille de Canaan en Égypte. Il y avait 75 personnes dans la famille de Jacob. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Jacob est allé en Égypte avec toute sa famille. Et Jacob et ses 12 fils ont vécu là jusqu’à leur mort. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélites
    - type: text
      text: ' ont quitté l’Égypte, ils ont emmené avec eux les corps morts de Joseph et de sa famille. Ils les ont transportés à Sichem. Ils les ont enterrés là dans un trou pour les morts. Abraham avait acheté cette place avec de l’argent de la famille d’un homme appelé Hamor.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait maintenant beaucoup de gens dans la famille de Jacob. Ils habitaient tous en Égypte. Et Dieu va bientôt accomplir sa promesse à Abraham. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Actuellement, un autre roi régnait en Égypte. Ce roi ne savait rien au sujet des choses que Joseph avait faites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce roi disait à nos ancêtres des choses qui n’étaient pas vraies. Il leur faisait également de très mauvaises choses. Il leur disait de laisser leurs bébés hors de leurs maisons. Il disait cela, parce qu’il voulait que les bébés meurent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Étienne a dit : Hommes d’Israël, écoutez ce que je dis. Notre Dieu est complètement très bon et puissant. Il est apparu à notre ancêtre, Abraham. Quand Abraham habitait encore en Mésopotamie. Ceci s’est produit avant qu’il aille à Haran. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était en ce temps que Moïse est né. Il était un beau bébé. Dieu était content de lui. Moïse a vécu dans la maison de son père 3 mois. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, on a mis Moïse dehors. Alors, la fille de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharaon
    - type: text
      text: ' l’a pris. Elle est allée avec lui à la maison. Elle a gardé Moïse comme son propre fils. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Égyptiens ont appris à Moïse toutes les choses qu’ils savaient. Moïse disait et faisait quelque chose de très puissant.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Moïse avait 40 ans, il est allé un jour voir son propre peuple. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse a vu qu’un Égyptien faisait du mal à un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélite
    - type: text
      text: . Alors Moïse est allé aider l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélite
    - type: text
      text: '. Il a tué l’Égyptien pour se venger. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse a voulu aider les Israélites à quitter l’Égypte. Il pensait comme ceci : Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélites
    - type: text
      text: ' sauront ce que je veux faire. Ils comprendront que Dieu m’utilise pour faire ceci. Mais ils n’ont pas compris. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant, Moïse a vu 2 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Israélites
    - type: text
      text: '. Ils se battaient. Il a voulu qu’ils cessent de se battre. Ainsi il leur a dit : Hommes, écoutez‑moi. Vous êtes de la même famille. Vous ne devez pas vous faire du mal.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme qui a fait du mal à l’autre homme, a dit à Moïse : Tu n’as aucun pouvoir de régner sur nous. Tu n’as aucun pouvoir d’être notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme a dit à Moïse : Hier tu as tué un Égyptien. Et tu veux me tuer aussi ? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse a entendu ce que l’homme lui a dit. Alors Moïse a fui. Il est allé au pays appelé Midian. Il a construit une maison là. Il est resté là. Lui et son épouse ont eu 2 fils.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a dit à Abraham : Laisse ton propre pays et ta propre famille. Va dans un autre pays que je te montrerai.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse a habité à Midian pendant 40 années. Puis un jour, il était dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' près de la colline appelée Sinaï. Il a vu un buisson là qui brûlait. Un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' lui est apparu dans le feu. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse était très étonné de ce qu’il voyait. Il est allé près du buisson. Il voulait le voir. Alors il a entendu Dieu lui parler du buisson. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a dit : Je suis le Dieu de tes ancêtres. Je suis le Dieu d’Abraham, d’Isaac et de Jacob. Moïse avait trop peur de regarder Dieu. Ainsi il a tourné son visage du buisson.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a dit à Moïse : Enlève les souliers de tes pieds, parce que tu te tiens à un endroit saint. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai vu toutes les mauvaises choses que les Égyptiens font à mon peuple. J’ai entendu mon peuple. Il pleure. Et je suis descendu ici pour le sauver. Viens ici et écoute‑moi. Et alors je vais t’envoyer de nouveau en Égypte.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Étienne a dit : Moïse est l’homme que le peuple d’Israël n’avait pas accepté. Ils lui avaient dit : Tu n’as aucun pouvoir de régner sur nous. Tu n’as aucun droit de nous juger. Mais Dieu a envoyé Moïse pour régner sur les gens d’Israël. Et il a envoyé Moïse pour les sauver des Égyptiens. Dieu a envoyé l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui lui est apparu. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' lui a parlé du buisson qui brûlait. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était Moïse qui avait conduit le peuple d’Israël hors d’Égypte. Le peuple l’a vu faire beaucoup de choses spéciales. Il a fait des choses puissantes avant que le peuple d’Israël quitte l’Égypte. Il a fait des choses plus spéciales à la mer rouge. Alors il avait conduit le peuple au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' pendant 40 années. Il faisait encore plus de choses spéciales là aussi.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était Moïse qui a dit au peuple d’Israël : Dieu va vous envoyer un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: '. Il dira les paroles de Dieu. Il sera un de votre propre famille, comme je suis aussi un de votre propre famille. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est le même Moïse qui était avec le peuple d’Israël dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: . Ils étaient près de la grande colline appelée la montagne de Sinaï. Moïse était également là avec nos ancêtres quand l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' lui parlait sur la montagne de Sinaï. Il recevait également les messages de Dieu à nous donner. Les messages de Dieu étaient vivants.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais nos ancêtres n’écoutaient pas Moïse. Ils ne lui obéissaient pas. Ils ne l’acceptaient pas. Ils voulaient rentrer en Égypte. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Abraham est parti de son pays. Les gens appelés Chaldéens vivaient également dans ce pays. Alors il s’est déplacé à Haran et il est resté là. Mais quand le père d’Abraham est mort, Dieu a dit à Abraham : Quitte cet endroit. Ainsi Dieu l’a alors envoyé pour habiter ici, à Canaan. C’est là que nous sommes maintenant. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi le peuple a dit à Aaron : Fais‑nous quelques dieux que nous pouvons porter devant nous. Moïse nous a conduits hors de l’Égypte. Mais maintenant nous ne savons pas ce qui lui est arrivé.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les gens d’Israël ont fait quelque chose. Ils l’ont fait pour être leur idole. Ils l’ont fait à partir de l’or avec la forme d’un veau. Ils ont tué quelques animaux. Ils les ont brulés comme un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' à leur idole. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Dieu s’est éloigné de ces gens. Il les a laissés parler aux étoiles à sa place. Il les a laissés aussi faire d’elles des dieux. Le peuple disait aux étoiles combien elles étaient grandes et belles. Les hommes qui disaient les paroles de Dieu, ont écrit ceci : Dieu a dit : Peuple d’Israël, écoutez !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand vous étiez dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' pendant 40 années, vous n’avez pas tué et vous n’avez pas brûlé ces animaux comme offrande pour moi. '
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous aviez porté la maison du dieu appelé Moloch. Vous aviez également porté autre chose pour mettre à l’intérieur de cette maison. C’était une plus petite copie de votre dieu. Il était comme l’étoile de votre dieu, Remphan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous aviez fait ces dieux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous leur disiez tous les 2 comment ils étaient grands et importants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant je vous enverrai loin de votre propre pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous irez habiter à Babylone.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand nos ancêtres étaient au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ', ils portaient une tente spéciale avec eux. Cela montrait que Dieu était là avec eux. Et c’est là qu’ils adoraient Dieu. Dieu avait montré à Moïse comment faire cette tente. Le peuple a fait la tente comme Dieu avait dit. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plus tard, nos ancêtres ont reçu cette tente. Et ils l’ont amenée quand ils sont venus habiter sur cette terre. Dieu a donné cette terre à notre peuple. Josué était leur chef quand ils ont pris cette terre des gens qui habitaient ici. La tente est restée à cet endroit jusqu’à ce que David soit roi. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu était content du roi David et l’aidait beaucoup. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David a demandé de construire la maison pour le Dieu de Jacob. Mais c’était plutôt Salomon qui l’a construite.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais c’est également vrai : Notre Dieu est de grande importance. Il ne vit pas dans une maison que les hommes ont faite. Ésaïe a dit ces paroles de Dieu :'
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' est comme un siège important. Je m’assieds là pour régner. La terre est comme un petit siège. Elle est comme un endroit pour mettre mes pieds dessus. Tu ne pourras pas construire une meilleure maison pour que je vive dedans.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne pourras pas faire un meilleur endroit pour que je m’y asseye.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment‑là, Dieu n’avait pas encore donné à Abraham toute la partie de Canaan pour sa propre famille. Il n’avait même encore donné à Abraham un très petit morceau de terre. Mais à ce moment‑là, Dieu a donné cette promesse à Abraham : Cette terre deviendra ton propre pays. Il a dit : Ce sera également le pays de tes enfants. Quand Dieu lui a dit ceci, Abraham n’avait encore eu aucun enfant. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a dit à son serviteur Ésaïe : J’ai déjà fait toutes ces choses moi‑même.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Étienne a dit au peuple : Vous peuple, vous ne voulez pas comprendre Dieu. Vous êtes comme le peuple qui ne croit pas au vrai Dieu, et vous ne voulez pas écouter le vrai message de Dieu. Ainsi vous êtes comme vos ancêtres. Ils n’avaient pas voulu obéir au Saint‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: .
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vos ancêtres faisaient de mauvaises choses à chaque personne qui leur disait les paroles de Dieu. Les serviteurs de Dieu parlaient de l’homme complètement bon que Dieu enverra. Mais vos ancêtres ont tué ces serviteurs. Maintenant vous avez livré aux ennemis ce vrai et spécial homme que Dieu a envoyé. Et vous l’avez tué. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez reçu la loi de Dieu que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' vous avaient donnée. Mais vous n’avez pas obéi à cela.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: ' écoutent et tuent Étienne'
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: ' écoutaient Étienne. Ils devenaient de plus en plus fâchés contre lui. Ils grinçaient leurs dents ensemble, parce qu’ils étaient très fâchés. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le Saint‑Esprit a rempli Étienne de sa puissance. Étienne a regardé au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et il a vu à quel point Dieu est beau. Dieu brillait comme une très grande lumière. Étienne a également vu Jésus. Il se tenait sur le côté droit de Dieu. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Étienne a dit : Je vois dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Il est ouvert ! Je vois le Fils de l’homme. Il se tient sur le côté droit de Dieu !
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Sanhédrin
    - type: text
      text: ' ont entendu ces choses. Ils criaient très fort à lui. Ils ont mis les mains sur leurs oreilles. Alors ensemble, ils couraient vers Étienne. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ont attrapé Étienne et ils l’ont tiré hors de la ville. Ils ont enlevé leurs vêtements. Et ils les ont donnés à un jeune homme pour les garder. Ce jeune homme s’appelait Saul. Alors ils ont commencé à jeter des pierres sur Étienne.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les hommes jetaient des pierres sur Étienne, il priait le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus. Il a dit ceci : S’il te plaît, accepte mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que Dieu lui a dit : Ta famille vivra dans un pays que d’autres personnes dirigent. Les gens de ce pays rendront ta famille esclave pendant 400 années. Ils ne seront pas aimables avec ta famille. Ils la feront trop travailler. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Étienne est tombé à genoux. Il criait fort : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', pardonne à ces hommes, parce qu’ils me font ceci. Étienne a dit cela, puis il est mort.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Dieu a dit : Dieu punira les gens qui feront trop travailler son peuple. Après que j’ai fait cela, ta famille partira de ce pays. Elle viendra à cet endroit. Et ici elle me dira comment je suis grand et important. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a alors dit au peuple d’Israël qu’il sera son peuple spécial. Ainsi, il se souviendra de la promesse spéciale de Dieu : Tu dois '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: ' tous tes bébés garçons. Abraham est devenu le père d’Isaac. Et Abraham a circoncis son fils Isaac, quand l’enfant avait 8 jours. Isaac est devenu le père de Jacob. Isaac a également circoncis son fils Jacob. Jacob a eu 12 fils. Ces fils étaient les 12 ancêtres importants d’Israël. Jacob les a tous circoncis.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un des fils de Jacob s’appelait Joseph. Jacob aimait Joseph plus que ses autres fils. Pour cette raison, certains des fils de Jacob n’aimaient pas leur frère Joseph. Un jour, ils ont pris Joseph et ils l’ont vendu comme esclave. Les hommes qui ont acheté Joseph l’ont emmené en Égypte. Là, ils l’ont vendu encore et Joseph travaillait en Égypte comme esclave. Tout ce temps, Dieu était avec Joseph. '
