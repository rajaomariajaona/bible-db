document_id: ACT.7,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 7
  - type: heading
    content: Étienne parle aux hommes du Sanhédrin
  - type: text
    content: 'Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' a dit à Étienne : Ces hommes disent des choses au sujet de ce que tu enseignais. Est‑ce que ces choses sont vraies ?'
  '10':
  - type: text
    content: 'Dieu l’aidait dans toutes ses difficultés. Il lui a donné aussi une grande sagesse. À ce moment‑là, '
  - type: text
    content: Pharaon
  - type: text
    content: ' était le roi d’Égypte. Dieu aidait beaucoup Joseph. Alors '
  - type: text
    content: Pharaon
  - type: text
    content: ' aimait Joseph. Il a vu que Joseph était très sage. Ainsi il a dit à Joseph de régner sur l’Égypte. Il lui a dit aussi de régner sur toute la maison du '
  - type: text
    content: Pharaon
  - type: text
    content: .
  '11':
  - type: text
    content: 'Alors il y avait une grande faim dans toute l’Égypte et à Canaan. Beaucoup de gens souffraient et nos ancêtres n’avaient plus de nourriture. '
  '12':
  - type: text
    content: 'Jacob a entendu que '
  - type: text
    content: Pharaon
  - type: text
    content: ' avait mis beaucoup de graines de blé en réserve. Ainsi il a envoyé ses fils en Égypte pour acheter de la nourriture. C’était la première fois qu’ils sont allés en Égypte. '
  '13':
  - type: text
    content: 'Jacob a alors envoyé ses fils en Égypte une deuxième fois. Cette fois, Joseph leur a dit qu’il était leur frère. Alors '
  - type: text
    content: Pharaon
  - type: text
    content: ' a entendu que les frères de Joseph étaient arrivés. Il a entendu parler de la famille de Joseph. '
  '14':
  - type: text
    content: 'Après ceci, Joseph a donné ce message à ses frères : Dites à notre père que je suis ici. Dites que je veux qu’il vienne. Dites‑lui d’emmener toute sa famille de Canaan en Égypte. Il y avait 75 personnes dans la famille de Jacob. '
  '15':
  - type: text
    content: 'Ainsi Jacob est allé en Égypte avec toute sa famille. Et Jacob et ses 12 fils ont vécu là jusqu’à leur mort. '
  '16':
  - type: text
    content: 'Quand les '
  - type: text
    content: Israélites
  - type: text
    content: ' ont quitté l’Égypte, ils ont emmené avec eux les corps morts de Joseph et de sa famille. Ils les ont transportés à Sichem. Ils les ont enterrés là dans un trou pour les morts. Abraham avait acheté cette place avec de l’argent de la famille d’un homme appelé Hamor.'
  '17':
  - type: text
    content: 'Il y avait maintenant beaucoup de gens dans la famille de Jacob. Ils habitaient tous en Égypte. Et Dieu va bientôt accomplir sa promesse à Abraham. '
  '18':
  - type: text
    content: 'Actuellement, un autre roi régnait en Égypte. Ce roi ne savait rien au sujet des choses que Joseph avait faites. '
  '19':
  - type: text
    content: 'Ce roi disait à nos ancêtres des choses qui n’étaient pas vraies. Il leur faisait également de très mauvaises choses. Il leur disait de laisser leurs bébés hors de leurs maisons. Il disait cela, parce qu’il voulait que les bébés meurent. '
  '2':
  - type: text
    content: 'Étienne a dit : Hommes d’Israël, écoutez ce que je dis. Notre Dieu est complètement très bon et puissant. Il est apparu à notre ancêtre, Abraham. Quand Abraham habitait encore en Mésopotamie. Ceci s’est produit avant qu’il aille à Haran. '
  '20':
  - type: text
    content: 'C’était en ce temps que Moïse est né. Il était un beau bébé. Dieu était content de lui. Moïse a vécu dans la maison de son père 3 mois. '
  '21':
  - type: text
    content: 'Après cela, on a mis Moïse dehors. Alors, la fille de '
  - type: text
    content: Pharaon
  - type: text
    content: ' l’a pris. Elle est allée avec lui à la maison. Elle a gardé Moïse comme son propre fils. '
  '22':
  - type: text
    content: Les Égyptiens ont appris à Moïse toutes les choses qu’ils savaient. Moïse disait et faisait quelque chose de très puissant.
  '23':
  - type: text
    content: 'Quand Moïse avait 40 ans, il est allé un jour voir son propre peuple. '
  '24':
  - type: text
    content: 'Moïse a vu qu’un Égyptien faisait du mal à un '
  - type: text
    content: Israélite
  - type: text
    content: . Alors Moïse est allé aider l’
  - type: text
    content: Israélite
  - type: text
    content: '. Il a tué l’Égyptien pour se venger. '
  '25':
  - type: text
    content: 'Moïse a voulu aider les Israélites à quitter l’Égypte. Il pensait comme ceci : Les '
  - type: text
    content: Israélites
  - type: text
    content: ' sauront ce que je veux faire. Ils comprendront que Dieu m’utilise pour faire ceci. Mais ils n’ont pas compris. '
  '26':
  - type: text
    content: 'Le jour suivant, Moïse a vu 2 '
  - type: text
    content: Israélites
  - type: text
    content: '. Ils se battaient. Il a voulu qu’ils cessent de se battre. Ainsi il leur a dit : Hommes, écoutez‑moi. Vous êtes de la même famille. Vous ne devez pas vous faire du mal.'
  '27':
  - type: text
    content: 'L’homme qui a fait du mal à l’autre homme, a dit à Moïse : Tu n’as aucun pouvoir de régner sur nous. Tu n’as aucun pouvoir d’être notre '
  - type: text
    content: juge
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'L’homme a dit à Moïse : Hier tu as tué un Égyptien. Et tu veux me tuer aussi ? '
  '29':
  - type: text
    content: Moïse a entendu ce que l’homme lui a dit. Alors Moïse a fui. Il est allé au pays appelé Midian. Il a construit une maison là. Il est resté là. Lui et son épouse ont eu 2 fils.
  '3':
  - type: text
    content: 'Dieu a dit à Abraham : Laisse ton propre pays et ta propre famille. Va dans un autre pays que je te montrerai.'
  '30':
  - type: text
    content: 'Moïse a habité à Midian pendant 40 années. Puis un jour, il était dans le '
  - type: text
    content: désert
  - type: text
    content: ' près de la colline appelée Sinaï. Il a vu un buisson là qui brûlait. Un '
  - type: text
    content: ange
  - type: text
    content: ' lui est apparu dans le feu. '
  '31':
  - type: text
    content: 'Moïse était très étonné de ce qu’il voyait. Il est allé près du buisson. Il voulait le voir. Alors il a entendu Dieu lui parler du buisson. '
  '32':
  - type: text
    content: 'Dieu a dit : Je suis le Dieu de tes ancêtres. Je suis le Dieu d’Abraham, d’Isaac et de Jacob. Moïse avait trop peur de regarder Dieu. Ainsi il a tourné son visage du buisson.'
  '33':
  - type: text
    content: 'Dieu a dit à Moïse : Enlève les souliers de tes pieds, parce que tu te tiens à un endroit saint. '
  '34':
  - type: text
    content: J’ai vu toutes les mauvaises choses que les Égyptiens font à mon peuple. J’ai entendu mon peuple. Il pleure. Et je suis descendu ici pour le sauver. Viens ici et écoute‑moi. Et alors je vais t’envoyer de nouveau en Égypte.
  '35':
  - type: text
    content: 'Étienne a dit : Moïse est l’homme que le peuple d’Israël n’avait pas accepté. Ils lui avaient dit : Tu n’as aucun pouvoir de régner sur nous. Tu n’as aucun droit de nous juger. Mais Dieu a envoyé Moïse pour régner sur les gens d’Israël. Et il a envoyé Moïse pour les sauver des Égyptiens. Dieu a envoyé l’'
  - type: text
    content: ange
  - type: text
    content: ' qui lui est apparu. L’'
  - type: text
    content: ange
  - type: text
    content: ' lui a parlé du buisson qui brûlait. '
  '36':
  - type: text
    content: 'C’était Moïse qui avait conduit le peuple d’Israël hors d’Égypte. Le peuple l’a vu faire beaucoup de choses spéciales. Il a fait des choses puissantes avant que le peuple d’Israël quitte l’Égypte. Il a fait des choses plus spéciales à la mer rouge. Alors il avait conduit le peuple au '
  - type: text
    content: désert
  - type: text
    content: ' pendant 40 années. Il faisait encore plus de choses spéciales là aussi.'
  '37':
  - type: text
    content: 'C’était Moïse qui a dit au peuple d’Israël : Dieu va vous envoyer un '
  - type: text
    content: prophète
  - type: text
    content: '. Il dira les paroles de Dieu. Il sera un de votre propre famille, comme je suis aussi un de votre propre famille. '
  '38':
  - type: text
    content: 'C’est le même Moïse qui était avec le peuple d’Israël dans le '
  - type: text
    content: désert
  - type: text
    content: . Ils étaient près de la grande colline appelée la montagne de Sinaï. Moïse était également là avec nos ancêtres quand l’
  - type: text
    content: ange
  - type: text
    content: ' lui parlait sur la montagne de Sinaï. Il recevait également les messages de Dieu à nous donner. Les messages de Dieu étaient vivants.'
  '39':
  - type: text
    content: 'Mais nos ancêtres n’écoutaient pas Moïse. Ils ne lui obéissaient pas. Ils ne l’acceptaient pas. Ils voulaient rentrer en Égypte. '
  '4':
  - type: text
    content: 'Ainsi Abraham est parti de son pays. Les gens appelés Chaldéens vivaient également dans ce pays. Alors il s’est déplacé à Haran et il est resté là. Mais quand le père d’Abraham est mort, Dieu a dit à Abraham : Quitte cet endroit. Ainsi Dieu l’a alors envoyé pour habiter ici, à Canaan. C’est là que nous sommes maintenant. '
  '40':
  - type: text
    content: 'Ainsi le peuple a dit à Aaron : Fais‑nous quelques dieux que nous pouvons porter devant nous. Moïse nous a conduits hors de l’Égypte. Mais maintenant nous ne savons pas ce qui lui est arrivé.'
  '41':
  - type: text
    content: 'Alors les gens d’Israël ont fait quelque chose. Ils l’ont fait pour être leur idole. Ils l’ont fait à partir de l’or avec la forme d’un veau. Ils ont tué quelques animaux. Ils les ont brulés comme un '
  - type: text
    content: sacrifice
  - type: text
    content: ' à leur idole. '
  '42':
  - type: text
    content: 'Alors Dieu s’est éloigné de ces gens. Il les a laissés parler aux étoiles à sa place. Il les a laissés aussi faire d’elles des dieux. Le peuple disait aux étoiles combien elles étaient grandes et belles. Les hommes qui disaient les paroles de Dieu, ont écrit ceci : Dieu a dit : Peuple d’Israël, écoutez !'
  - type: text
    content: 'Quand vous étiez dans le '
  - type: text
    content: désert
  - type: text
    content: ' pendant 40 années, vous n’avez pas tué et vous n’avez pas brûlé ces animaux comme offrande pour moi. '
  '43':
  - type: text
    content: Vous aviez porté la maison du dieu appelé Moloch. Vous aviez également porté autre chose pour mettre à l’intérieur de cette maison. C’était une plus petite copie de votre dieu. Il était comme l’étoile de votre dieu, Remphan.
  - type: text
    content: Vous aviez fait ces dieux.
  - type: text
    content: Et vous leur disiez tous les 2 comment ils étaient grands et importants.
  - type: text
    content: Maintenant je vous enverrai loin de votre propre pays.
  - type: text
    content: Vous irez habiter à Babylone.
  '44':
  - type: text
    content: 'Quand nos ancêtres étaient au '
  - type: text
    content: désert
  - type: text
    content: ', ils portaient une tente spéciale avec eux. Cela montrait que Dieu était là avec eux. Et c’est là qu’ils adoraient Dieu. Dieu avait montré à Moïse comment faire cette tente. Le peuple a fait la tente comme Dieu avait dit. '
  '45':
  - type: text
    content: 'Plus tard, nos ancêtres ont reçu cette tente. Et ils l’ont amenée quand ils sont venus habiter sur cette terre. Dieu a donné cette terre à notre peuple. Josué était leur chef quand ils ont pris cette terre des gens qui habitaient ici. La tente est restée à cet endroit jusqu’à ce que David soit roi. '
  '46':
  - type: text
    content: 'Dieu était content du roi David et l’aidait beaucoup. '
  '47':
  - type: text
    content: David a demandé de construire la maison pour le Dieu de Jacob. Mais c’était plutôt Salomon qui l’a construite.
  '48':
  - type: text
    content: 'Mais c’est également vrai : Notre Dieu est de grande importance. Il ne vit pas dans une maison que les hommes ont faite. Ésaïe a dit ces paroles de Dieu :'
  '49':
  - type: text
    content: 'Le '
  - type: text
    content: ciel
  - type: text
    content: ' est comme un siège important. Je m’assieds là pour régner. La terre est comme un petit siège. Elle est comme un endroit pour mettre mes pieds dessus. Tu ne pourras pas construire une meilleure maison pour que je vive dedans.'
  - type: text
    content: Tu ne pourras pas faire un meilleur endroit pour que je m’y asseye.
  '5':
  - type: text
    content: 'A ce moment‑là, Dieu n’avait pas encore donné à Abraham toute la partie de Canaan pour sa propre famille. Il n’avait même encore donné à Abraham un très petit morceau de terre. Mais à ce moment‑là, Dieu a donné cette promesse à Abraham : Cette terre deviendra ton propre pays. Il a dit : Ce sera également le pays de tes enfants. Quand Dieu lui a dit ceci, Abraham n’avait encore eu aucun enfant. '
  '50':
  - type: text
    content: 'Dieu a dit à son serviteur Ésaïe : J’ai déjà fait toutes ces choses moi‑même.'
  '51':
  - type: text
    content: 'Alors Étienne a dit au peuple : Vous peuple, vous ne voulez pas comprendre Dieu. Vous êtes comme le peuple qui ne croit pas au vrai Dieu, et vous ne voulez pas écouter le vrai message de Dieu. Ainsi vous êtes comme vos ancêtres. Ils n’avaient pas voulu obéir au Saint‑'
  - type: text
    content: Esprit
  - type: text
    content: .
  '52':
  - type: text
    content: 'Vos ancêtres faisaient de mauvaises choses à chaque personne qui leur disait les paroles de Dieu. Les serviteurs de Dieu parlaient de l’homme complètement bon que Dieu enverra. Mais vos ancêtres ont tué ces serviteurs. Maintenant vous avez livré aux ennemis ce vrai et spécial homme que Dieu a envoyé. Et vous l’avez tué. '
  '53':
  - type: text
    content: 'Vous avez reçu la loi de Dieu que les '
  - type: text
    content: anges
  - type: text
    content: ' vous avaient donnée. Mais vous n’avez pas obéi à cela.'
  - type: heading
    content: Les hommes du Sanhédrin écoutent et tuent Étienne
  '54':
  - type: text
    content: 'Les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' écoutaient Étienne. Ils devenaient de plus en plus fâchés contre lui. Ils grinçaient leurs dents ensemble, parce qu’ils étaient très fâchés. '
  '55':
  - type: text
    content: 'Alors le Saint‑Esprit a rempli Étienne de sa puissance. Étienne a regardé au '
  - type: text
    content: ciel
  - type: text
    content: ' et il a vu à quel point Dieu est beau. Dieu brillait comme une très grande lumière. Étienne a également vu Jésus. Il se tenait sur le côté droit de Dieu. '
  '56':
  - type: text
    content: 'Étienne a dit : Je vois dans le '
  - type: text
    content: ciel
  - type: text
    content: . Il est ouvert ! Je vois le Fils de l’homme. Il se tient sur le côté droit de Dieu !
  '57':
  - type: text
    content: 'Les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' ont entendu ces choses. Ils criaient très fort à lui. Ils ont mis les mains sur leurs oreilles. Alors ensemble, ils couraient vers Étienne. '
  '58':
  - type: text
    content: Ils ont attrapé Étienne et ils l’ont tiré hors de la ville. Ils ont enlevé leurs vêtements. Et ils les ont donnés à un jeune homme pour les garder. Ce jeune homme s’appelait Saul. Alors ils ont commencé à jeter des pierres sur Étienne.
  '59':
  - type: text
    content: 'Quand les hommes jetaient des pierres sur Étienne, il priait le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. Il a dit ceci : S’il te plaît, accepte mon '
  - type: text
    content: esprit
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Voici ce que Dieu lui a dit : Ta famille vivra dans un pays que d’autres personnes dirigent. Les gens de ce pays rendront ta famille esclave pendant 400 années. Ils ne seront pas aimables avec ta famille. Ils la feront trop travailler. '
  '60':
  - type: text
    content: 'Alors Étienne est tombé à genoux. Il criait fort : '
  - type: text
    content: Seigneur
  - type: text
    content: ', pardonne à ces hommes, parce qu’ils me font ceci. Étienne a dit cela, puis il est mort.'
  '7':
  - type: text
    content: 'Alors Dieu a dit : Dieu punira les gens qui feront trop travailler son peuple. Après que j’ai fait cela, ta famille partira de ce pays. Elle viendra à cet endroit. Et ici elle me dira comment je suis grand et important. '
  '8':
  - type: text
    content: 'Dieu a alors dit au peuple d’Israël qu’il sera son peuple spécial. Ainsi, il se souviendra de la promesse spéciale de Dieu : Tu dois '
  - type: text
    content: circoncire
  - type: text
    content: ' tous tes bébés garçons. Abraham est devenu le père d’Isaac. Et Abraham a circoncis son fils Isaac, quand l’enfant avait 8 jours. Isaac est devenu le père de Jacob. Isaac a également circoncis son fils Jacob. Jacob a eu 12 fils. Ces fils étaient les 12 ancêtres importants d’Israël. Jacob les a tous circoncis.'
  '9':
  - type: text
    content: 'Un des fils de Jacob s’appelait Joseph. Jacob aimait Joseph plus que ses autres fils. Pour cette raison, certains des fils de Jacob n’aimaient pas leur frère Joseph. Un jour, ils ont pris Joseph et ils l’ont vendu comme esclave. Les hommes qui ont acheté Joseph l’ont emmené en Égypte. Là, ils l’ont vendu encore et Joseph travaillait en Égypte comme esclave. Tout ce temps, Dieu était avec Joseph. '
