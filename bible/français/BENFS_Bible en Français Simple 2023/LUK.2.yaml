document_id: LUK.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est né
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le bébé de Marie grandissait en elle. Pendant ce temps, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: ' Auguste dirigeait l’ensemble du monde '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romain
  - type: text
    text: '. Il a ordonné à ses hommes ceci : Comptez tous ceux qui sont dans le monde '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romain
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’était la première fois que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' avaient compté tout le monde. Quirinius était le gouverneur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romain
  - type: text
    text: ' de la Syrie à cette époque.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Donc tout le monde est allé à sa ville natale. C’était pour que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' les comptent. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Joseph est aussi allé à sa ville natale. Il vivait dans la ville appelée Nazareth en Galilée. Il est allé à la ville appelée Bethléem en Judée. Le roi David était né là, donc Bethléem s’appelait la ville de David. Joseph appartenait à la famille de David. Voilà pourquoi il est allé à Bethléem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Joseph a pris Marie avec lui, afin que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' puissent les compter. Elle est allée, parce qu’elle avait promis de l’épouser. Elle allait bientôt avoir un bébé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant qu’ils étaient à Bethléem, son bébé est né. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’était son premier bébé, et il était un garçon. Elle a mis des linges autour de lui. Puis elle l’a mis dans une '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mangeoire
  - type: text
    text: ' des animaux. Elle a fait cela, parce qu’ils ne pouvaient pas rester à l’hôtel. Il n’y avait pas de chambres vides pour eux.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Certains hommes quittent leurs moutons pour aller voir Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Cette nuit, certains hommes vivaient dans les champs près de Bethléem. Ils gardaient leurs moutons en toute sécurité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors, un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' leur est apparu. Une lumière de Dieu a brillé tout autour d’eux. Donc, ils avaient beaucoup peur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a dit : N’ayez pas peur. Écoutez ! Je vous apporte une Bonne Nouvelle. Cette Bonne Nouvelle rendra tout le monde heureux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quelque chose est arrivé aujourd’hui dans la ville de David. Quelqu’un de spécial est né. Il est celui qui vous sauvera. Il est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: '. Il est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je vais vous dire comment vous connaîtrez ce bébé. Vous le trouverez avec des linges autour de lui. Il est couché dans une '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mangeoire
  - type: text
    text: ' des animaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En ce temps‑là, beaucoup d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' sont également apparus. Ils parlaient de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils disaient : Dieu est grand et puissant.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Il vit au plus haut lieu.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il sera bon aux gens sur la terre et les rendra heureux.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils seront tranquilles dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après cela, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' sont retournés à la maison de Dieu ('
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '). Ensuite, ces gens se sont dit ceci : Peut‑être que nous devrions laisser les animaux et aller à Bethléem immédiatement ! Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a envoyé des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' pour nous dire ce qui est arrivé. Nous voulons voir ce bébé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors ils se sont précipités à Bethléem. Là, ils ont trouvé Marie et Joseph avec le bébé. Le bébé était vraiment couché dans une '
  - type: usfm
    marker: w
    children:
    - type: text
      text: mangeoire
  - type: text
    text: ' des animaux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Après avoir vu le bébé, ils ont parlé à tout le monde qui était autour d’eux. Ils ont dit ce que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' leur avait dit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Beaucoup de gens ont entendu ce que les hommes disaient. Ils étaient très surpris. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Marie s’est souvenue de tout ce que les bergers avaient dit. Elle gardait tout cela dans son cœur. Elle pensait à cela. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les hommes sont ensuite retournés à leurs animaux. Ils disaient à Dieu : Tu es grand ! Tu es bon ! Tout ce que l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' nous avait dit, était vrai ! Nous avons entendu la Bonne Nouvelle. Nous avons vu des choses très spéciales !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Marie et Joseph emmènent Jésus au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand le bébé avait 8 jours, il était temps pour sa circoncision. C’était un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' qui devait lui faire cela. Ses parents ont donné le nom de Jésus à l’enfant. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' avait dit à Marie que le nom de l’enfant sera Jésus. Il lui avait dit cela avant d’avoir un bébé à l’intérieur d’elle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il y a longtemps, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait donné à Moïse les lois auxquelles les gens devaient obéir. Une de ces lois disait comment devenir pur après la naissance d’un enfant. Donc, ils ont emmené le bébé Jésus au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu à Jérusalem. C’était pour le présenter au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici ce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dit : Le premier bébé de sexe masculin né d’une femme ou d’un animal est le mien. Donc, vous devez l’amener à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque vous faites cela, apportez également 2 oiseaux spéciaux au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: '. Il s’agissait de 2 tourterelles ou 2 petits pigeons. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' devait les tuer. C’est ce que Marie et Joseph ont fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'À ce moment, il y avait un homme. Son nom était Siméon. Il vivait à Jérusalem. Il était bon et il obéissait toujours à Dieu. Il avait attendu longtemps pour voir la personne spéciale qui permettrait de sauver Israël. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' était avec Siméon. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' lui avait dit : Tu ne mourras pas maintenant. Tu sais que Dieu avait promis d’envoyer le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: '. Tu dois le voir avant de mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Maintenant, le jour est venu. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' a dit à Siméon d’aller au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Marie et Joseph ont emmené le bébé Jésus pour faire ce que la règle disait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Siméon est allé auprès d’eux. Il a pris Jésus des mains de Marie. Il le tenait alors dans ses bras. Puis il a remercié Dieu comme ceci :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tu as fait ce que tu avais promis à ton serviteur. Maintenant, je peux mourir sans problème.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Maintenant, j’ai vraiment vu l’homme qui va sauver les gens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Tu l’as envoyé sur terre pour que tout le monde le connaisse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il sera comme une lumière pour les gens. Il se montrera à ceux qui ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Ils vont ensuite le connaître. Et ils sauront ce que tu attends d’eux. Ensuite, ils vont savoir ce que tu veux qu’ils fassent. Il montrera également que ton peuple d’Israël est très spécial.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: C’est cela que Siméon a dit à propos de Jésus. Son message a beaucoup surpris Marie et Joseph.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors Siméon a demandé à Dieu d’être bon et gentil envers Marie et à Joseph. Après cela, il a dit à Marie, la mère de Jésus : Dieu a choisi ce bébé. Beaucoup de gens en Israël deviendront pires à cause de lui. Et beaucoup d’autres deviendront meilleurs à cause de lui. Il sera comme un signe qui causera la contradiction. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Cela montrera leurs pensées cachées. Cela te rendra très triste aussi. Ce sera comme une épée qui te transpercera le cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Une très vieille dame appelée Anne était là dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu, aussi. Elle disait souvent des messages que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' lui donnait. Elle était la fille de Phanuel. Elle appartenait à la famille d’Aser. Elle avait vécu avec son mari pendant 7 ans, puis il est mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Après cela, elle avait vécu seule jusqu’à 84 ans. Maintenant, elle ne quittait plus le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Elle restait là jour et nuit priant Dieu. Souvent, elle ne mangeait pas de nourriture pour mieux prier.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: À ce moment‑là, Anne est venue à l’endroit où Marie et Joseph étaient debout. Quand Anne a vu le bébé, elle a commencé à remercier Dieu pour lui. Puis elle a commencé à parler de lui à d’autres personnes. Beaucoup de gens attendaient que Dieu libère Jérusalem. Ce sont les gens auxquels elle parlait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lorsque Marie et Joseph ont fini d’obéir à toutes les règles, ils sont rentrés chez eux. Ils sont retournés à la ville appelée Nazareth en Galilée. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: L’enfant grandissait. Dieu était bon et gentil envers lui et Dieu le rendait fort. L’enfant pouvait alors comprendre beaucoup de choses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le garçon Jésus rend visite au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Chaque année, Marie et Joseph allaient à Jérusalem pour la semaine de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Quand Jésus avait 12 ans, ses parents l’ont emmené avec eux à Jérusalem. Ils sont allés comme d’habitude pour la semaine de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Lorsque la semaine est terminée, tout le monde rentrait chez lui. Le garçon Jésus est resté à Jérusalem, mais ses parents ne le savaient pas. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ils pensaient qu’il était dans leur groupe. Donc, ils ont voyagé pendant toute une journée. Ensuite, ils ont commencé à le chercher parmi leurs parents et amis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ils ne l’ont pas trouvé. Alors, ils sont retournés à Jérusalem. Ils le cherchaient. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Finalement, ils l’ont trouvé dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu après 3 jours de marche. Jésus était assis parmi les enseignants. Il écoutait ce qu’ils disaient. Il leur posait également des questions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Tous les gens qui écoutaient Jésus étaient très surpris. Jésus comprenait beaucoup de choses et il pouvait répondre à des questions difficiles. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Quand ses parents l’ont vu là, ils étaient aussi très surpris. Sa mère lui a dit : Mon enfant, pourquoi nous as‑tu fait cela ? Ton père et moi t’avons cherché partout. Nous n’étions pas tranquilles dans nos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jésus a répondu : Vous ne devriez pas vraiment me chercher. Je dois faire ce que mon Père veut que je fasse. Vraiment, vous devriez savoir cela. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Mais ils ne comprenaient pas vraiment ce qu’il leur disait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Jésus est revenu à Nazareth avec eux et il leur a obéi. Marie gardait toutes ces choses spéciales dans son cœur. Elle pensait beaucoup à cela. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Jésus grandissait. Il pouvait comprendre de plus en plus de choses. Tout le monde l’aimait et Dieu pensait aussi bien de lui.
