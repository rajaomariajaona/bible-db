document_id: LUK.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Jésus est né
  - type: text
    content: 'Le bébé de Marie grandissait en elle. Pendant ce temps, '
  - type: text
    content: César
  - type: text
    content: ' Auguste dirigeait l’ensemble du monde '
  - type: text
    content: romain
  - type: text
    content: '. Il a ordonné à ses hommes ceci : Comptez tous ceux qui sont dans le monde '
  - type: text
    content: romain
  - type: text
    content: '. '
  '10':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' a dit : N’ayez pas peur. Écoutez ! Je vous apporte une Bonne Nouvelle. Cette Bonne Nouvelle rendra tout le monde heureux.'
  '11':
  - type: text
    content: 'Quelque chose est arrivé aujourd’hui dans la ville de David. Quelqu’un de spécial est né. Il est celui qui vous sauvera. Il est le '
  - type: text
    content: Messie
  - type: text
    content: '. Il est le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Je vais vous dire comment vous connaîtrez ce bébé. Vous le trouverez avec des linges autour de lui. Il est couché dans une '
  - type: text
    content: mangeoire
  - type: text
    content: ' des animaux.'
  '13':
  - type: text
    content: En ce temps‑là, beaucoup d’
  - type: text
    content: anges
  - type: text
    content: ' sont également apparus. Ils parlaient de Dieu.'
  '14':
  - type: text
    content: 'Ils disaient : Dieu est grand et puissant.'
  - type: text
    content: Il vit au plus haut lieu.
  - type: text
    content: Il sera bon aux gens sur la terre et les rendra heureux.
  - type: text
    content: 'Ils seront tranquilles dans leurs '
  - type: text
    content: esprits
  - type: text
    content: .
  '15':
  - type: text
    content: 'Après cela, les '
  - type: text
    content: anges
  - type: text
    content: ' sont retournés à la maison de Dieu ('
  - type: text
    content: ciel
  - type: text
    content: '). Ensuite, ces gens se sont dit ceci : Peut‑être que nous devrions laisser les animaux et aller à Bethléem immédiatement ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a envoyé des '
  - type: text
    content: anges
  - type: text
    content: ' pour nous dire ce qui est arrivé. Nous voulons voir ce bébé.'
  '16':
  - type: text
    content: 'Alors ils se sont précipités à Bethléem. Là, ils ont trouvé Marie et Joseph avec le bébé. Le bébé était vraiment couché dans une '
  - type: text
    content: mangeoire
  - type: text
    content: ' des animaux. '
  '17':
  - type: text
    content: Après avoir vu le bébé, ils ont parlé à tout le monde qui était autour d’eux. Ils ont dit ce que l’
  - type: text
    content: ange
  - type: text
    content: ' leur avait dit.'
  '18':
  - type: text
    content: 'Beaucoup de gens ont entendu ce que les hommes disaient. Ils étaient très surpris. '
  '19':
  - type: text
    content: 'Marie s’est souvenue de tout ce que les bergers avaient dit. Elle gardait tout cela dans son cœur. Elle pensait à cela. '
  '2':
  - type: text
    content: 'C’était la première fois que les '
  - type: text
    content: Romains
  - type: text
    content: ' avaient compté tout le monde. Quirinius était le gouverneur '
  - type: text
    content: romain
  - type: text
    content: ' de la Syrie à cette époque.'
  '20':
  - type: text
    content: 'Les hommes sont ensuite retournés à leurs animaux. Ils disaient à Dieu : Tu es grand ! Tu es bon ! Tout ce que l’'
  - type: text
    content: ange
  - type: text
    content: ' nous avait dit, était vrai ! Nous avons entendu la Bonne Nouvelle. Nous avons vu des choses très spéciales !'
  - type: heading
    content: Marie et Joseph emmènent Jésus au Temple de Dieu
  '21':
  - type: text
    content: 'Quand le bébé avait 8 jours, il était temps pour sa circoncision. C’était un '
  - type: text
    content: prêtre
  - type: text
    content: ' qui devait lui faire cela. Ses parents ont donné le nom de Jésus à l’enfant. L’'
  - type: text
    content: ange
  - type: text
    content: ' avait dit à Marie que le nom de l’enfant sera Jésus. Il lui avait dit cela avant d’avoir un bébé à l’intérieur d’elle.'
  '22':
  - type: text
    content: 'Il y a longtemps, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné à Moïse les lois auxquelles les gens devaient obéir. Une de ces lois disait comment devenir pur après la naissance d’un enfant. Donc, ils ont emmené le bébé Jésus au '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu à Jérusalem. C’était pour le présenter au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '23':
  - type: text
    content: 'Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit : Le premier bébé de sexe masculin né d’une femme ou d’un animal est le mien. Donc, vous devez l’amener à moi. '
  '24':
  - type: text
    content: 'Lorsque vous faites cela, apportez également 2 oiseaux spéciaux au '
  - type: text
    content: prêtre
  - type: text
    content: '. Il s’agissait de 2 tourterelles ou 2 petits pigeons. Le '
  - type: text
    content: prêtre
  - type: text
    content: ' devait les tuer. C’est ce que Marie et Joseph ont fait.'
  '25':
  - type: text
    content: 'À ce moment, il y avait un homme. Son nom était Siméon. Il vivait à Jérusalem. Il était bon et il obéissait toujours à Dieu. Il avait attendu longtemps pour voir la personne spéciale qui permettrait de sauver Israël. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' était avec Siméon. '
  '26':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' lui avait dit : Tu ne mourras pas maintenant. Tu sais que Dieu avait promis d’envoyer le '
  - type: text
    content: Messie
  - type: text
    content: '. Tu dois le voir avant de mourir. '
  '27':
  - type: text
    content: 'Maintenant, le jour est venu. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' a dit à Siméon d’aller au '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Marie et Joseph ont emmené le bébé Jésus pour faire ce que la règle disait.'
  '28':
  - type: text
    content: 'Siméon est allé auprès d’eux. Il a pris Jésus des mains de Marie. Il le tenait alors dans ses bras. Puis il a remercié Dieu comme ceci :'
  '29':
  - type: text
    content: ' '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu as fait ce que tu avais promis à ton serviteur. Maintenant, je peux mourir sans problème.'
  '3':
  - type: text
    content: 'Donc tout le monde est allé à sa ville natale. C’était pour que les '
  - type: text
    content: Romains
  - type: text
    content: ' les comptent. '
  '30':
  - type: text
    content: Maintenant, j’ai vraiment vu l’homme qui va sauver les gens.
  '31':
  - type: text
    content: Tu l’as envoyé sur terre pour que tout le monde le connaisse.
  '32':
  - type: text
    content: 'Il sera comme une lumière pour les gens. Il se montrera à ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: . Ils vont ensuite le connaître. Et ils sauront ce que tu attends d’eux. Ensuite, ils vont savoir ce que tu veux qu’ils fassent. Il montrera également que ton peuple d’Israël est très spécial.
  '33':
  - type: text
    content: C’est cela que Siméon a dit à propos de Jésus. Son message a beaucoup surpris Marie et Joseph.
  '34':
  - type: text
    content: 'Alors Siméon a demandé à Dieu d’être bon et gentil envers Marie et à Joseph. Après cela, il a dit à Marie, la mère de Jésus : Dieu a choisi ce bébé. Beaucoup de gens en Israël deviendront pires à cause de lui. Et beaucoup d’autres deviendront meilleurs à cause de lui. Il sera comme un signe qui causera la contradiction. '
  '35':
  - type: text
    content: Cela montrera leurs pensées cachées. Cela te rendra très triste aussi. Ce sera comme une épée qui te transpercera le cœur.
  '36':
  - type: text
    content: 'Une très vieille dame appelée Anne était là dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu, aussi. Elle disait souvent des messages que le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' lui donnait. Elle était la fille de Phanuel. Elle appartenait à la famille d’Aser. Elle avait vécu avec son mari pendant 7 ans, puis il est mort.'
  '37':
  - type: text
    content: 'Après cela, elle avait vécu seule jusqu’à 84 ans. Maintenant, elle ne quittait plus le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Elle restait là jour et nuit priant Dieu. Souvent, elle ne mangeait pas de nourriture pour mieux prier.'
  '38':
  - type: text
    content: À ce moment‑là, Anne est venue à l’endroit où Marie et Joseph étaient debout. Quand Anne a vu le bébé, elle a commencé à remercier Dieu pour lui. Puis elle a commencé à parler de lui à d’autres personnes. Beaucoup de gens attendaient que Dieu libère Jérusalem. Ce sont les gens auxquels elle parlait.
  '39':
  - type: text
    content: 'Lorsque Marie et Joseph ont fini d’obéir à toutes les règles, ils sont rentrés chez eux. Ils sont retournés à la ville appelée Nazareth en Galilée. '
  '4':
  - type: text
    content: Joseph est aussi allé à sa ville natale. Il vivait dans la ville appelée Nazareth en Galilée. Il est allé à la ville appelée Bethléem en Judée. Le roi David était né là, donc Bethléem s’appelait la ville de David. Joseph appartenait à la famille de David. Voilà pourquoi il est allé à Bethléem.
  '40':
  - type: text
    content: L’enfant grandissait. Dieu était bon et gentil envers lui et Dieu le rendait fort. L’enfant pouvait alors comprendre beaucoup de choses.
  - type: heading
    content: Le garçon Jésus rend visite au Temple de Dieu
  '41':
  - type: text
    content: 'Chaque année, Marie et Joseph allaient à Jérusalem pour la semaine de '
  - type: text
    content: Pâque
  - type: text
    content: .
  '42':
  - type: text
    content: 'Quand Jésus avait 12 ans, ses parents l’ont emmené avec eux à Jérusalem. Ils sont allés comme d’habitude pour la semaine de la '
  - type: text
    content: Pâque
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Lorsque la semaine est terminée, tout le monde rentrait chez lui. Le garçon Jésus est resté à Jérusalem, mais ses parents ne le savaient pas. '
  '44':
  - type: text
    content: Ils pensaient qu’il était dans leur groupe. Donc, ils ont voyagé pendant toute une journée. Ensuite, ils ont commencé à le chercher parmi leurs parents et amis.
  '45':
  - type: text
    content: 'Ils ne l’ont pas trouvé. Alors, ils sont retournés à Jérusalem. Ils le cherchaient. '
  '46':
  - type: text
    content: 'Finalement, ils l’ont trouvé dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu après 3 jours de marche. Jésus était assis parmi les enseignants. Il écoutait ce qu’ils disaient. Il leur posait également des questions.'
  '47':
  - type: text
    content: 'Tous les gens qui écoutaient Jésus étaient très surpris. Jésus comprenait beaucoup de choses et il pouvait répondre à des questions difficiles. '
  '48':
  - type: text
    content: 'Quand ses parents l’ont vu là, ils étaient aussi très surpris. Sa mère lui a dit : Mon enfant, pourquoi nous as‑tu fait cela ? Ton père et moi t’avons cherché partout. Nous n’étions pas tranquilles dans nos '
  - type: text
    content: esprits
  - type: text
    content: .
  '49':
  - type: text
    content: 'Jésus a répondu : Vous ne devriez pas vraiment me chercher. Je dois faire ce que mon Père veut que je fasse. Vraiment, vous devriez savoir cela. '
  '5':
  - type: text
    content: 'Joseph a pris Marie avec lui, afin que les '
  - type: text
    content: Romains
  - type: text
    content: ' puissent les compter. Elle est allée, parce qu’elle avait promis de l’épouser. Elle allait bientôt avoir un bébé.'
  '50':
  - type: text
    content: Mais ils ne comprenaient pas vraiment ce qu’il leur disait.
  '51':
  - type: text
    content: 'Jésus est revenu à Nazareth avec eux et il leur a obéi. Marie gardait toutes ces choses spéciales dans son cœur. Elle pensait beaucoup à cela. '
  '52':
  - type: text
    content: Jésus grandissait. Il pouvait comprendre de plus en plus de choses. Tout le monde l’aimait et Dieu pensait aussi bien de lui.
  '6':
  - type: text
    content: 'Pendant qu’ils étaient à Bethléem, son bébé est né. '
  '7':
  - type: text
    content: 'C’était son premier bébé, et il était un garçon. Elle a mis des linges autour de lui. Puis elle l’a mis dans une '
  - type: text
    content: mangeoire
  - type: text
    content: ' des animaux. Elle a fait cela, parce qu’ils ne pouvaient pas rester à l’hôtel. Il n’y avait pas de chambres vides pour eux.'
  - type: heading
    content: Certains hommes quittent leurs moutons pour aller voir Jésus
  '8':
  - type: text
    content: Cette nuit, certains hommes vivaient dans les champs près de Bethléem. Ils gardaient leurs moutons en toute sécurité.
  '9':
  - type: text
    content: 'Alors, un '
  - type: text
    content: ange
  - type: text
    content: ' du '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur est apparu. Une lumière de Dieu a brillé tout autour d’eux. Donc, ils avaient beaucoup peur.'
