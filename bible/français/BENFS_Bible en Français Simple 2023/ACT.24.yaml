document_id: ACT.24
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 24
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' disent de mauvaises choses au sujet de Paul'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '5 jours après cela, Ananias, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' est allé à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: '. Quelques chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' sont allés avec lui. Un homme appelé Tertulle est également allé avec eux. Tertulle savait tout au sujet de la loi. Toutes ces personnes sont allées voir le gouverneur Félix. Ainsi ils ont dit à Félix le mal que Paul avait fait. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Félix a demandé à un soldat de chercher Paul. Ainsi Tertulle a commencé d’abord à parler contre Paul. Il a dit : Très important gouverneur, nous savons que tu es un bon chef. A cause de toi, notre pays n’a eu pendant longtemps aucune guerre. Tu as également fait de nouvelles lois pour nous. Celles‑ci sont toutes bonnes pour notre pays. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Partout, les personnes sont heureuses au sujet de ce que tu as fait. Et à tout temps, ils veulent te remercier beaucoup de toutes ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je ne veux pas que tu t’asseyes ici pendant longtemps. Je te prie d’être gentil avec nous et de m’écouter. Je parlerai pendant un court moment, pour nous tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nous savons que cet homme est dangereux pour le gouvernement.
- type: usfm
  marker: m
  children:
  - type: text
    text: Il provoque des problèmes parmi des personnes partout.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il provoque les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' dans chaque partie du monde à se battre les uns contre les autres. Il est le chef d’un groupe appelé les Nazaréens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il a également fait des choses dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' qui sont contre notre loi. Ainsi nous l’avons attrapé. Nous avons voulu le juger selon notre propre loi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Lysias, le chef des soldats est venu auprès de nous. Il nous a attaqués et il nous a arraché Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Lysias nous a dit : Allez auprès de Félix. Certains pensent que cet homme a fait de mauvaises choses. Ils doivent parler à Félix à ce propos. Toi, Félix, tu peux poser quelques questions à cet homme. Alors tu apprendras de lui les mauvaises choses qu’il a faites. Et il te parlera de toutes les choses dont nous parlons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui étaient avec Tertulle ont dit ensemble : Toutes ces choses que Tertulle a dites, sont vraies.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit à Félix sa propre histoire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le gouverneur Félix a levé ses mains vers Paul. Ce signe a montré que Paul pouvait alors parler. Ainsi Paul a dit à Félix : Je sais que tu as jugé des personnes dans ce pays pendant beaucoup d’années. Maintenant je suis heureux de te dire tout. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je suis allé à Jérusalem il y a environ 12 jours. Tu peux vérifier ce qui est vrai. Je suis allé là remercier Dieu, parce qu’il m’a aidé avec mon travail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et quand les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' m’ont vu, je ne discutais pas avec quiconque dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Je ne causais pas de problèmes parmi le peuple dans les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: synagogues
  - type: text
    text: '. Je ne causais pas non plus de problèmes dans d’autres endroits en ville. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ainsi ils ne peuvent pas dire que les choses qu’ils ont dites sur moi, sont vraies. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’accepte que la prochaine chose au sujet de moi est vraie. J’obéis au Dieu de nos ancêtres, mais je vis d’une manière différente. Mais ces hommes disent que ce n’est pas la bonne manière. Je crois également en toute la loi de Moïse. Et je crois également à toutes les paroles qui sont dans les livres que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' avaient écrites. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je crois également à ceci : Dieu fera devenir tous les hommes, bons et mauvais, vivants encore après qu’ils soient morts. Ces hommes ici croient également à ceci. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’essaie toujours de ne pas causer de troubles parmi des personnes. Et j’essaie toujours d’être juste avec Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je n’avais pas été à Jérusalem pendant plusieurs années. Et je suis allé là cette fois. C’était pour prendre une certaine somme d’argent. Ce sera comme offrande pour mes propres personnes. J’ai également voulu donner quelques animaux au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' à tuer. C’étaient des offrandes à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je donnais ces offrandes à Dieu dans sa maison quand ces hommes m’ont trouvé. J’avais fini de me purifier devant Dieu. Il n’y avait aucune foule avec moi. Personne n’était en train de se disputer ou de se combattre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais il y avait quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' là qui étaient venus d’Asie. Ils devraient eux‑mêmes venir ici. Ils pensaient que j’avais fait de mauvaises choses. Ainsi ils devraient venir et te parler de cela. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ou ces hommes ici devraient te dire ce que j’ai fait de mal. A cause d’eux, je me suis tenu devant les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais quand je me suis tenu là, j’ai fait une chose. J’ai crié : Je crois à ceci. Dieu fera devenir des personnes vivantes encore après leur mort. A cause de cela, tu me '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juges
  - type: text
    text: ' aujourd’hui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Félix a su tout au sujet de la nouvelle manière de vie selon Dieu. Il a dit à chacun que la réunion avait fini. Alors il a dit à Paul : Bientôt Lysias, le chef des soldats, arrivera ici. Et alors je déciderai quoi faire avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Félix a dit à l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: officier
  - type: text
    text: ' qui gardait Paul : Mets cet homme de nouveau dans la prison, mais continue de le garder. Ses amis peuvent venir le voir. Ils peuvent l’aider et ils peuvent apporter des choses pour lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Félix et Drusille écoutent Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Après quelques jours, Félix est venu avec Drusille, son épouse juive. Il a demandé à ses soldats de leur amener Paul. Paul leur a parlé. Et ils écoutaient tout ce qu’il leur disait. Paul parlait de la façon dont les gens ont cru en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Paul a continué à parler. Il parlait de comment les gens pourraient être justes avec Dieu. Il parlait également des personnes qui n’ont pas laissé le mal. Et il a dit : Un jour, Dieu jugera les gens selon leurs comportements. Quand Paul parlait de ces choses, Félix avait peur. Il a dit à Paul : Tu peux nous laisser maintenant. J’aurai peut‑être encore plus de temps pour t’écouter. Alors je te demanderai de venir ici encore.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Félix espérait aussi que Paul puisse lui donner de l’argent. C’était la raison pour laquelle il a encore rencontré Paul. Ils parlaient souvent ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ceci s’est produit pendant 2 années. Alors Porcius Festus est devenu le gouverneur et Félix n’a plus régné. Félix a voulu que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' disent : Félix était un bon gouverneur. Ainsi il a laissé Paul dans la prison.'
