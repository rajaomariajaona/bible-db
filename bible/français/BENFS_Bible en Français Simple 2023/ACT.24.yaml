document_id: ACT.24,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 24
  - type: heading
    content: Les Juifs disent de mauvaises choses au sujet de Paul
  - type: text
    content: '5 jours après cela, Ananias, le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' est allé à '
  - type: text
    content: Césarée
  - type: text
    content: '. Quelques chefs des '
  - type: text
    content: Juifs
  - type: text
    content: ' sont allés avec lui. Un homme appelé Tertulle est également allé avec eux. Tertulle savait tout au sujet de la loi. Toutes ces personnes sont allées voir le gouverneur Félix. Ainsi ils ont dit à Félix le mal que Paul avait fait. '
  '10':
  - type: text
    content: 'Alors le gouverneur Félix a levé ses mains vers Paul. Ce signe a montré que Paul pouvait alors parler. Ainsi Paul a dit à Félix : Je sais que tu as jugé des personnes dans ce pays pendant beaucoup d’années. Maintenant je suis heureux de te dire tout. '
  '11':
  - type: text
    content: Je suis allé à Jérusalem il y a environ 12 jours. Tu peux vérifier ce qui est vrai. Je suis allé là remercier Dieu, parce qu’il m’a aidé avec mon travail.
  '12':
  - type: text
    content: 'Et quand les '
  - type: text
    content: Juifs
  - type: text
    content: ' m’ont vu, je ne discutais pas avec quiconque dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Je ne causais pas de problèmes parmi le peuple dans les '
  - type: text
    content: synagogues
  - type: text
    content: '. Je ne causais pas non plus de problèmes dans d’autres endroits en ville. '
  '13':
  - type: text
    content: 'Ainsi ils ne peuvent pas dire que les choses qu’ils ont dites sur moi, sont vraies. '
  '14':
  - type: text
    content: 'J’accepte que la prochaine chose au sujet de moi est vraie. J’obéis au Dieu de nos ancêtres, mais je vis d’une manière différente. Mais ces hommes disent que ce n’est pas la bonne manière. Je crois également en toute la loi de Moïse. Et je crois également à toutes les paroles qui sont dans les livres que les '
  - type: text
    content: prophètes
  - type: text
    content: ' avaient écrites. '
  '15':
  - type: text
    content: 'Je crois également à ceci : Dieu fera devenir tous les hommes, bons et mauvais, vivants encore après qu’ils soient morts. Ces hommes ici croient également à ceci. '
  '16':
  - type: text
    content: J’essaie toujours de ne pas causer de troubles parmi des personnes. Et j’essaie toujours d’être juste avec Dieu.
  '17':
  - type: text
    content: 'Je n’avais pas été à Jérusalem pendant plusieurs années. Et je suis allé là cette fois. C’était pour prendre une certaine somme d’argent. Ce sera comme offrande pour mes propres personnes. J’ai également voulu donner quelques animaux au '
  - type: text
    content: prêtre
  - type: text
    content: ' à tuer. C’étaient des offrandes à Dieu. '
  '18':
  - type: text
    content: 'Je donnais ces offrandes à Dieu dans sa maison quand ces hommes m’ont trouvé. J’avais fini de me purifier devant Dieu. Il n’y avait aucune foule avec moi. Personne n’était en train de se disputer ou de se combattre. '
  '19':
  - type: text
    content: 'Mais il y avait quelques '
  - type: text
    content: Juifs
  - type: text
    content: ' là qui étaient venus d’Asie. Ils devraient eux‑mêmes venir ici. Ils pensaient que j’avais fait de mauvaises choses. Ainsi ils devraient venir et te parler de cela. '
  '2':
  - type: text
    content: 'Félix a demandé à un soldat de chercher Paul. Ainsi Tertulle a commencé d’abord à parler contre Paul. Il a dit : Très important gouverneur, nous savons que tu es un bon chef. A cause de toi, notre pays n’a eu pendant longtemps aucune guerre. Tu as également fait de nouvelles lois pour nous. Celles‑ci sont toutes bonnes pour notre pays. '
  '20':
  - type: text
    content: 'Ou ces hommes ici devraient te dire ce que j’ai fait de mal. A cause d’eux, je me suis tenu devant les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Mais quand je me suis tenu là, j’ai fait une chose. J’ai crié : Je crois à ceci. Dieu fera devenir des personnes vivantes encore après leur mort. A cause de cela, tu me '
  - type: text
    content: juges
  - type: text
    content: ' aujourd’hui.'
  '22':
  - type: text
    content: 'Félix a su tout au sujet de la nouvelle manière de vie selon Dieu. Il a dit à chacun que la réunion avait fini. Alors il a dit à Paul : Bientôt Lysias, le chef des soldats, arrivera ici. Et alors je déciderai quoi faire avec toi. '
  '23':
  - type: text
    content: Félix a dit à l’
  - type: text
    content: officier
  - type: text
    content: ' qui gardait Paul : Mets cet homme de nouveau dans la prison, mais continue de le garder. Ses amis peuvent venir le voir. Ils peuvent l’aider et ils peuvent apporter des choses pour lui.'
  - type: heading
    content: Félix et Drusille écoutent Paul
  '24':
  - type: text
    content: Après quelques jours, Félix est venu avec Drusille, son épouse juive. Il a demandé à ses soldats de leur amener Paul. Paul leur a parlé. Et ils écoutaient tout ce qu’il leur disait. Paul parlait de la façon dont les gens ont cru en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Paul a continué à parler. Il parlait de comment les gens pourraient être justes avec Dieu. Il parlait également des personnes qui n’ont pas laissé le mal. Et il a dit : Un jour, Dieu jugera les gens selon leurs comportements. Quand Paul parlait de ces choses, Félix avait peur. Il a dit à Paul : Tu peux nous laisser maintenant. J’aurai peut‑être encore plus de temps pour t’écouter. Alors je te demanderai de venir ici encore.'
  '26':
  - type: text
    content: Félix espérait aussi que Paul puisse lui donner de l’argent. C’était la raison pour laquelle il a encore rencontré Paul. Ils parlaient souvent ensemble.
  '27':
  - type: text
    content: 'Ceci s’est produit pendant 2 années. Alors Porcius Festus est devenu le gouverneur et Félix n’a plus régné. Félix a voulu que les '
  - type: text
    content: Juifs
  - type: text
    content: ' disent : Félix était un bon gouverneur. Ainsi il a laissé Paul dans la prison.'
  '3':
  - type: text
    content: 'Partout, les personnes sont heureuses au sujet de ce que tu as fait. Et à tout temps, ils veulent te remercier beaucoup de toutes ces choses. '
  '4':
  - type: text
    content: Je ne veux pas que tu t’asseyes ici pendant longtemps. Je te prie d’être gentil avec nous et de m’écouter. Je parlerai pendant un court moment, pour nous tous.
  '5':
  - type: text
    content: Nous savons que cet homme est dangereux pour le gouvernement.
  - type: text
    content: Il provoque des problèmes parmi des personnes partout.
  - type: text
    content: 'Il provoque les '
  - type: text
    content: Juifs
  - type: text
    content: ' dans chaque partie du monde à se battre les uns contre les autres. Il est le chef d’un groupe appelé les Nazaréens.'
  '6':
  - type: text
    content: 'Il a également fait des choses dans le '
  - type: text
    content: Temple
  - type: text
    content: ' qui sont contre notre loi. Ainsi nous l’avons attrapé. Nous avons voulu le juger selon notre propre loi. '
  '7':
  - type: text
    content: 'Mais Lysias, le chef des soldats est venu auprès de nous. Il nous a attaqués et il nous a arraché Paul. '
  '8':
  - type: text
    content: 'Alors Lysias nous a dit : Allez auprès de Félix. Certains pensent que cet homme a fait de mauvaises choses. Ils doivent parler à Félix à ce propos. Toi, Félix, tu peux poser quelques questions à cet homme. Alors tu apprendras de lui les mauvaises choses qu’il a faites. Et il te parlera de toutes les choses dont nous parlons.'
  '9':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui étaient avec Tertulle ont dit ensemble : Toutes ces choses que Tertulle a dites, sont vraies.'
  - type: heading
    content: Paul dit à Félix sa propre histoire
