document_id: LUK.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Luc s’adresse à Théophile
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Beaucoup de gens ont écrit sur les choses qui se sont passées dans notre pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certains hommes étaient présents lorsque ces choses ont commencé à se passer. Ils ont vu tout ce qui s’est passé et ils nous ont parlé de cela. Ils ont prêché la Bonne Nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J’ai profondément vérifié tous ces faits depuis leur commencement. J’ai donc décidé, très respectable Théophile, de te les écrire dans leur ordre approprié. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu as déjà entendu parler de toutes ces choses. Maintenant, tu peux être sûr qu’elles sont vraies.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce qui est arrivé avant la naissance de Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il y avait un homme qui s’appelait Zacharie. Il vivait quand Hérode était roi de Judée. Zacharie était un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: '. Il appartenait à un groupe des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' de la famille d’Abia. Le nom de sa femme était Élisabeth. Et ils étaient tous 2 de la famille du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' Aaron.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Zacharie et Élisabeth obéissaient à Dieu toujours. Ils ne faisaient pas de mauvaises choses. Dieu aimait comment ils vivaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais ils n’avaient pas d’enfants. Élisabeth ne pouvait pas avoir de bébé et ils étaient tous 2 vieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un jour, le groupe de Zacharie travaillait dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Et Zacharie avait un travail spécial à faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' choisissaient l’un de leur groupe pour aller dans une salle spéciale à l’intérieur du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Le travail de Zacharie était de brûler l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors que Zacharie brûlait de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: ', beaucoup de gens étaient en dehors de la salle spéciale. Ils priaient Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: ' brûlait sur l’autel. Alors un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' de Dieu est apparu à Zacharie. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' était debout à droite de l’autel de l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Zacharie a vu l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: . Il était très surpris. Il avait aussi très peur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' lui a dit : Zacharie, n’aie pas peur. Dieu a entendu ce que tu priais. Il te donnera ce que tu demandais. Ta femme Élisabeth aura un petit garçon. Tu l’appelleras Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: 'Il sera très important pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Donc, il va vous rendre très heureux. Beaucoup d’autres personnes seront également très heureuses à cause de la naissance de Jean. Il ne devra jamais boire de vin ni quoi que ce soit avec de l’alcool dedans. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' va vivre à l’intérieur de lui à partir de sa naissance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les gens changeront leurs vies et se tourneront vers le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu. Ils commenceront à lui obéir encore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Jean va préparer l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' du peuple à recevoir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' conduira Jean comme il avait conduit Élie. Jean sera aussi puissant qu’Élie. Jean aidera les pères à aimer leurs enfants'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jean enseignera les gens qui ne respectent pas Dieu. Ensuite, ils ne vont penser qu’aux bonnes choses. Et ils vont faire des choses que les bonnes personnes font. Jean va préparer le peuple d’Israël. Ensuite, ce peuple sera prêt quand le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' viendra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Zacharie a dit à l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: '  : Comment puis‑je être sûr de cela ? Après tout, je suis un vieil homme. Ma femme est aussi vieille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' a répondu : Mon nom est Gabriel. Ma place est en face de Dieu. Je suis toujours prêt à travailler pour Dieu. Il m’a envoyé pour te parler. Il m’a dit de te dire cette Bonne Nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Maintenant, écoute‑moi. Tu n’as pas cru à mon message. Alors tu ne parleras plus jusqu’à la naissance de ton fils. Mon message va se réaliser au bon moment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand cela se passait, les gens attendaient Zacharie à l’extérieur. Ils pensaient à ceci : Pourquoi Zacharie est resté pendant très longtemps dans la salle spéciale ? Pourquoi il n’est pas encore sorti ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Zacharie est alors sorti de la salle. Il a essayé de leur parler. Mais il ne pouvait pas parler. Donc, les gens ont compris qu’il venait de voir quelque chose de spécial dans la salle. Zacharie bougeait sa tête et ses mains. C’était pour leur dire ce qui lui est arrivé. Mais il ne pouvait plus parler.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Zacharie a terminé son travail dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu. Après cela, il est retourné à la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Bientôt, un bébé se formait de plus en plus à l’intérieur de son épouse Élisabeth. Elle est restée dans sa maison pendant 5 mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elle a dit : Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m’a maintenant donné un bébé. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a été bon envers moi. Il m’a fait du bien. À cause de cela, d’autres personnes ne peuvent plus dire de mauvaises choses sur moi.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce qui est arrivé avant la naissance de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le bébé d’Élisabeth grandissait en elle. C’était alors près de 6 mois. Dieu a envoyé l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' Gabriel à Nazareth. Nazareth est une ville de Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Gabriel est allé là. C’était pour visiter une jeune femme. Son nom était Marie. Elle n’avait jamais couché avec un homme. Elle avait promis d’épouser un homme. Son nom était Joseph. Il appartenait à la famille du roi David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' Gabriel est arrivé. Il a dit à Marie : Bonjour, Marie. Dieu t’aime beaucoup. Il est très proche de toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Marie entendait ce que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' lui disait. Elle n’était pas tranquille dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Elle ne comprenait pas pourquoi l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' Gabriel lui disait cela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' Gabriel a poursuivi en disant : N’aie pas peur, Mfarie. Dieu a été bon envers toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Écoute ! Un petit garçon sera en toi. Quand il va naître, tu l’appelleras Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il sera grand. Dieu le rendra fort. Il l’appellera son Fils. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu le fera Roi. Il régnera comme le roi David avait régné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il régnera sur la famille de Jacob pour tous les temps. Il sera Roi pour tous les temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Marie a demandé : Comment cela peut‑il arriver ?'
- type: usfm
  marker: m
  children:
  - type: text
    text: Je n’ai jamais couché avec un homme.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' lui a répondu :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' viendra à toi. La puissance de Dieu te couvrira comme une ombre. Donc, ton enfant sera complètement bon. Il ne fera jamais rien de mal. Il sera appelé Fils de Dieu.'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Une autre chose ! Ta cousine Élisabeth est très vieille. On disait qu’elle ne pouvait pas avoir de bébé. Écoute ! Elle aura également un fils. Le bébé a grandi en elle, il y a maintenant près de 6 mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Il n’y a rien que Dieu échoue de faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Marie a répondu : Je suis la servante du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Je comprends ce que tu as dit. Je demande que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' accomplisse cela sur moi. Alors l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' l’a quittée.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marie rend visite à Élisabeth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Après cela, Marie s’est préparée et elle a fait un voyage. Elle s’est précipitée dans une ville sur les collines de Judée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Quand elle est arrivée à la maison de Zacharie, elle a dit bonjour à Élisabeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Élisabeth entendait Marie parler. Alors, elle sentait son bébé bouger rapidement à l’intérieur d’elle. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' l’a remplie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Puis elle a parlé à Marie d’une voix forte : Dieu t’a rendue très heureuse. Il est plus gentil envers toi qu’envers d’autres femmes. Il est également gentil avec ton bébé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Je ne suis pas une personne importante et tu es la mère de mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ainsi, ta visite à moi est une très bonne chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Écoute ! Lorsque je t’ai entendue me dire bonjour, le bébé a bougé rapidement à l’intérieur de moi. Il était très heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t’a dit ce qui se passera. Et tu as cru à ce qu’il t’avait dit. Cela te rend une personne très heureuse.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La chanson de Marie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Alors Marie a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' veut dire au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Tu es très grand et fort !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Je suis heureuse à cause de Dieu. Il est celui qui me sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Je ne pense pas que je sois une personne importante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu sait, alors il m’a regardée avec amour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez ! A partir de maintenant tous les gens vont dire que Dieu a été très bon et gentil avec moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Après tout, Dieu a fait de grandes choses pour moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est très puissant et fort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est bon dans tout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Il est bon envers les gens qui lui obéissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est également bon envers tous leurs enfants. Il le fera pour tous les temps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Il a montré à quel point il est fort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Certaines personnes pensent qu’elles sont très importantes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il les a renvoyées seules dans des directions différentes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Certaines personnes dirigeaient le pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il les a enlevées de leurs postes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a donné un travail important aux gens qui ne se sentent pas importants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Il a nourri les gens affamés de bonnes choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a envoyé des gens riches sans rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Il a promis de ne jamais oublier son peuple, Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, il l’a aidé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Il a fait une promesse à Abraham et à nos autres pères.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il a dit : Je vais être gentil avec vous pour tous les temps. Maintenant, il a fait ce qu’il avait promis.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Marie est restée avec Élisabeth environ 3 mois. Puis elle est retournée chez elle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' est né'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ensuite, il était temps pour Élisabeth d’avoir son bébé. Elle avait un enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Sa famille et les gens qui vivaient près d’elle ont entendu parler de son bébé. Ils savaient que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' était très gentil avec elle. Ils ont vu qu’elle était heureuse. Donc, ils étaient heureux aussi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Lorsque l’enfant avait 8 jours, ils sont venus à la maison de Zacharie et Élisabeth. L’enfant devait être circoncis ce jour‑là. Les gens ont voulu appeler l’enfant Zacharie. C’était le même nom que son père avait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Elisabeth a dit : Non, son nom sera Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ils ont dit : Tu ne peux pas vraiment lui donner le nom de Jean. Il n’y a personne qui s’appelle Jean dans ta famille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Puis ils ont demandé le nom du garçon à Zacharie. Ils ont fait cela par des signes. Zacharie ne parlait pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Alors Zacharie a demandé quelque chose sur quoi écrire. Il a écrit : Son nom est Jean. Tout le monde était très surpris de ce qu’il a écrit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Immédiatement, Zacharie a pu encore parler. Il pouvait parler très bien à nouveau. Il a commencé à dire à Dieu : Tu es très grand et puissant ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Les gens qui vivaient près de Zacharie et Élisabeth étaient surpris. Ils étaient surpris de ce qui était arrivé. Ils ont vu à quel point Dieu était grand. Beaucoup de gens qui vivaient sur les collines de Judée parlaient également de toutes ces choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Les gens entendaient parler de ces choses. Ils s’étonnaient tous. Ils se demandaient : Que sera donc cet enfant ? Après tout, ils ont vu que Dieu était vraiment avec lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La chanson de Zacharie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' a rempli Zacharie, père de Jean. Puis il parlait ainsi à propos de Dieu :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu d’Israël est un grand Dieu.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est venu pour sauver son peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Il a envoyé une personne très forte qui nous sauvera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette personne est dans la famille de David. David était son serviteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Il y a longtemps, Dieu a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' aux bonnes personnes, afin qu’elles puissent nous parler à ce sujet.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce qu’elles disaient :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Dieu va nous sauver de nos ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il va nous sauver de tout le monde qui nous déteste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Il a promis d’être gentil avec nos pères.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se souviendra de faire les choses qu’il avait promises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: Oui, il se souviendra des promesses qu’il avait dites à Abraham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: Je vais vous protéger de vos ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ensuite, vous pouvez travailler pour moi et sans peur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: Vous pouvez travailler pour moi dans le droit chemin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous pouvez le faire pendant toutes vos vies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: 'Zacharie a ensuite parlé à son enfant :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toi, enfant, tu seras appelé un serviteur du grand Dieu qui est au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' te donnera des messages à parler.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu iras devant le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Ce sera pour préparer un chemin pour lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: Tu diras à son peuple comment Dieu peut le sauver.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont fait de mauvaises choses, mais Dieu leur pardonne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: Notre Dieu nous pardonne, parce qu’il est très gentil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il enverra quelqu’un de la plus haute place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette personne sera comme le lever du soleil pour nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: Comme le soleil donne la lumière à tout le monde, donc il va briller sur toutes les personnes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Certaines personnes sont comme les gens qui sont dans l’obscurité. Elles vivent sans Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Certaines personnes ont peur de mourir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il brillera sur tout le monde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il va nous montrer comment vivre sans peur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: 'L’enfant de Zacharie grandissait. Dieu le rendait fort dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Il est allé et il vivait dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: ' pendant de nombreuses années. Plus tard, Dieu l’a envoyé au peuple d’Israël pour les enseigner.'
