document_id: LUK.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Luc s’adresse à Théophile
  - type: text
    content: 'Beaucoup de gens ont écrit sur les choses qui se sont passées dans notre pays. '
  '10':
  - type: text
    content: Alors que Zacharie brûlait de l’
  - type: text
    content: encens
  - type: text
    content: ', beaucoup de gens étaient en dehors de la salle spéciale. Ils priaient Dieu.'
  '11':
  - type: text
    content: L’
  - type: text
    content: encens
  - type: text
    content: ' brûlait sur l’autel. Alors un '
  - type: text
    content: ange
  - type: text
    content: ' de Dieu est apparu à Zacharie. L’'
  - type: text
    content: ange
  - type: text
    content: ' était debout à droite de l’autel de l’'
  - type: text
    content: encens
  - type: text
    content: .
  '12':
  - type: text
    content: Zacharie a vu l’
  - type: text
    content: ange
  - type: text
    content: . Il était très surpris. Il avait aussi très peur.
  '13':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' lui a dit : Zacharie, n’aie pas peur. Dieu a entendu ce que tu priais. Il te donnera ce que tu demandais. Ta femme Élisabeth aura un petit garçon. Tu l’appelleras Jean. '
  '14':
  - type: text
    content: 'Il sera très important pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Donc, il va vous rendre très heureux. Beaucoup d’autres personnes seront également très heureuses à cause de la naissance de Jean. Il ne devra jamais boire de vin ni quoi que ce soit avec de l’alcool dedans. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' va vivre à l’intérieur de lui à partir de sa naissance.'
  '16':
  - type: text
    content: 'Les gens changeront leurs vies et se tourneront vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu. Ils commenceront à lui obéir encore. '
  '17':
  - type: text
    content: Jean va préparer l’
  - type: text
    content: esprit
  - type: text
    content: ' du peuple à recevoir le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' conduira Jean comme il avait conduit Élie. Jean sera aussi puissant qu’Élie. Jean aidera les pères à aimer leurs enfants'
  - type: text
    content: 'Jean enseignera les gens qui ne respectent pas Dieu. Ensuite, ils ne vont penser qu’aux bonnes choses. Et ils vont faire des choses que les bonnes personnes font. Jean va préparer le peuple d’Israël. Ensuite, ce peuple sera prêt quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' viendra.'
  '18':
  - type: text
    content: Zacharie a dit à l’
  - type: text
    content: ange
  - type: text
    content: '  : Comment puis‑je être sûr de cela ? Après tout, je suis un vieil homme. Ma femme est aussi vieille.'
  '19':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' a répondu : Mon nom est Gabriel. Ma place est en face de Dieu. Je suis toujours prêt à travailler pour Dieu. Il m’a envoyé pour te parler. Il m’a dit de te dire cette Bonne Nouvelle. '
  '2':
  - type: text
    content: 'Certains hommes étaient présents lorsque ces choses ont commencé à se passer. Ils ont vu tout ce qui s’est passé et ils nous ont parlé de cela. Ils ont prêché la Bonne Nouvelle. '
  '20':
  - type: text
    content: Maintenant, écoute‑moi. Tu n’as pas cru à mon message. Alors tu ne parleras plus jusqu’à la naissance de ton fils. Mon message va se réaliser au bon moment.
  '21':
  - type: text
    content: 'Quand cela se passait, les gens attendaient Zacharie à l’extérieur. Ils pensaient à ceci : Pourquoi Zacharie est resté pendant très longtemps dans la salle spéciale ? Pourquoi il n’est pas encore sorti ? '
  '22':
  - type: text
    content: Zacharie est alors sorti de la salle. Il a essayé de leur parler. Mais il ne pouvait pas parler. Donc, les gens ont compris qu’il venait de voir quelque chose de spécial dans la salle. Zacharie bougeait sa tête et ses mains. C’était pour leur dire ce qui lui est arrivé. Mais il ne pouvait plus parler.
  '23':
  - type: text
    content: 'Zacharie a terminé son travail dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Après cela, il est retourné à la maison. '
  '24':
  - type: text
    content: 'Bientôt, un bébé se formait de plus en plus à l’intérieur de son épouse Élisabeth. Elle est restée dans sa maison pendant 5 mois. '
  '25':
  - type: text
    content: 'Elle a dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m’a maintenant donné un bébé. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a été bon envers moi. Il m’a fait du bien. À cause de cela, d’autres personnes ne peuvent plus dire de mauvaises choses sur moi.'
  - type: heading
    content: Ce qui est arrivé avant la naissance de Jésus
  '26':
  - type: text
    content: Le bébé d’Élisabeth grandissait en elle. C’était alors près de 6 mois. Dieu a envoyé l’
  - type: text
    content: ange
  - type: text
    content: ' Gabriel à Nazareth. Nazareth est une ville de Galilée. '
  '27':
  - type: text
    content: Gabriel est allé là. C’était pour visiter une jeune femme. Son nom était Marie. Elle n’avait jamais couché avec un homme. Elle avait promis d’épouser un homme. Son nom était Joseph. Il appartenait à la famille du roi David.
  '28':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' Gabriel est arrivé. Il a dit à Marie : Bonjour, Marie. Dieu t’aime beaucoup. Il est très proche de toi.'
  '29':
  - type: text
    content: Marie entendait ce que l’
  - type: text
    content: ange
  - type: text
    content: ' lui disait. Elle n’était pas tranquille dans son '
  - type: text
    content: esprit
  - type: text
    content: . Elle ne comprenait pas pourquoi l’
  - type: text
    content: ange
  - type: text
    content: ' Gabriel lui disait cela.'
  '3':
  - type: text
    content: 'J’ai profondément vérifié tous ces faits depuis leur commencement. J’ai donc décidé, très respectable Théophile, de te les écrire dans leur ordre approprié. '
  '30':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' Gabriel a poursuivi en disant : N’aie pas peur, Mfarie. Dieu a été bon envers toi. '
  '31':
  - type: text
    content: 'Écoute ! Un petit garçon sera en toi. Quand il va naître, tu l’appelleras Jésus. '
  '32':
  - type: text
    content: 'Il sera grand. Dieu le rendra fort. Il l’appellera son Fils. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu le fera Roi. Il régnera comme le roi David avait régné. '
  '33':
  - type: text
    content: Il régnera sur la famille de Jacob pour tous les temps. Il sera Roi pour tous les temps.
  '34':
  - type: text
    content: 'Marie a demandé : Comment cela peut‑il arriver ?'
  - type: text
    content: Je n’ai jamais couché avec un homme.
  '35':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' lui a répondu :'
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' viendra à toi. La puissance de Dieu te couvrira comme une ombre. Donc, ton enfant sera complètement bon. Il ne fera jamais rien de mal. Il sera appelé Fils de Dieu.'
  '36':
  - type: text
    content: 'Une autre chose ! Ta cousine Élisabeth est très vieille. On disait qu’elle ne pouvait pas avoir de bébé. Écoute ! Elle aura également un fils. Le bébé a grandi en elle, il y a maintenant près de 6 mois. '
  '37':
  - type: text
    content: Il n’y a rien que Dieu échoue de faire.
  '38':
  - type: text
    content: 'Marie a répondu : Je suis la servante du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: 'Je comprends ce que tu as dit. Je demande que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' accomplisse cela sur moi. Alors l’'
  - type: text
    content: ange
  - type: text
    content: ' l’a quittée.'
  - type: heading
    content: Marie rend visite à Élisabeth
  '39':
  - type: text
    content: Après cela, Marie s’est préparée et elle a fait un voyage. Elle s’est précipitée dans une ville sur les collines de Judée.
  '4':
  - type: text
    content: Tu as déjà entendu parler de toutes ces choses. Maintenant, tu peux être sûr qu’elles sont vraies.
  - type: heading
    content: Ce qui est arrivé avant la naissance de Jean‑Baptiste
  '40':
  - type: text
    content: 'Quand elle est arrivée à la maison de Zacharie, elle a dit bonjour à Élisabeth. '
  '41':
  - type: text
    content: 'Élisabeth entendait Marie parler. Alors, elle sentait son bébé bouger rapidement à l’intérieur d’elle. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' l’a remplie. '
  '42':
  - type: text
    content: 'Puis elle a parlé à Marie d’une voix forte : Dieu t’a rendue très heureuse. Il est plus gentil envers toi qu’envers d’autres femmes. Il est également gentil avec ton bébé. '
  '43':
  - type: text
    content: 'Je ne suis pas une personne importante et tu es la mère de mon '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ainsi, ta visite à moi est une très bonne chose. '
  '44':
  - type: text
    content: 'Écoute ! Lorsque je t’ai entendue me dire bonjour, le bébé a bougé rapidement à l’intérieur de moi. Il était très heureux. '
  '45':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t’a dit ce qui se passera. Et tu as cru à ce qu’il t’avait dit. Cela te rend une personne très heureuse.'
  - type: heading
    content: La chanson de Marie
  '46':
  - type: text
    content: 'Alors Marie a dit :'
  - type: text
    content: 'Mon '
  - type: text
    content: esprit
  - type: text
    content: ' veut dire au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tu es très grand et fort !'
  '47':
  - type: text
    content: Je suis heureuse à cause de Dieu. Il est celui qui me sauve.
  '48':
  - type: text
    content: Je ne pense pas que je sois une personne importante.
  - type: text
    content: Dieu sait, alors il m’a regardée avec amour.
  - type: text
    content: Écoutez ! A partir de maintenant tous les gens vont dire que Dieu a été très bon et gentil avec moi.
  '49':
  - type: text
    content: Après tout, Dieu a fait de grandes choses pour moi.
  - type: text
    content: Il est très puissant et fort.
  - type: text
    content: Il est bon dans tout.
  '5':
  - type: text
    content: 'Il y avait un homme qui s’appelait Zacharie. Il vivait quand Hérode était roi de Judée. Zacharie était un '
  - type: text
    content: prêtre
  - type: text
    content: '. Il appartenait à un groupe des '
  - type: text
    content: prêtres
  - type: text
    content: ' de la famille d’Abia. Le nom de sa femme était Élisabeth. Et ils étaient tous 2 de la famille du '
  - type: text
    content: prêtre
  - type: text
    content: ' Aaron.'
  '50':
  - type: text
    content: Il est bon envers les gens qui lui obéissent.
  - type: text
    content: Il est également bon envers tous leurs enfants. Il le fera pour tous les temps.
  '51':
  - type: text
    content: Il a montré à quel point il est fort.
  - type: text
    content: Certaines personnes pensent qu’elles sont très importantes.
  - type: text
    content: Mais il les a renvoyées seules dans des directions différentes.
  '52':
  - type: text
    content: Certaines personnes dirigeaient le pays.
  - type: text
    content: Mais il les a enlevées de leurs postes.
  - type: text
    content: Il a donné un travail important aux gens qui ne se sentent pas importants.
  '53':
  - type: text
    content: Il a nourri les gens affamés de bonnes choses.
  - type: text
    content: Il a envoyé des gens riches sans rien.
  '54':
  - type: text
    content: Il a promis de ne jamais oublier son peuple, Israël.
  - type: text
    content: Maintenant, il l’a aidé.
  '55':
  - type: text
    content: Il a fait une promesse à Abraham et à nos autres pères.
  - type: text
    content: 'Il a dit : Je vais être gentil avec vous pour tous les temps. Maintenant, il a fait ce qu’il avait promis.'
  '56':
  - type: text
    content: Marie est restée avec Élisabeth environ 3 mois. Puis elle est retournée chez elle.
  - type: heading
    content: Jean‑Baptiste est né
  '57':
  - type: text
    content: 'Ensuite, il était temps pour Élisabeth d’avoir son bébé. Elle avait un enfant. '
  '58':
  - type: text
    content: 'Sa famille et les gens qui vivaient près d’elle ont entendu parler de son bébé. Ils savaient que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était très gentil avec elle. Ils ont vu qu’elle était heureuse. Donc, ils étaient heureux aussi.'
  '59':
  - type: text
    content: Lorsque l’enfant avait 8 jours, ils sont venus à la maison de Zacharie et Élisabeth. L’enfant devait être circoncis ce jour‑là. Les gens ont voulu appeler l’enfant Zacharie. C’était le même nom que son père avait.
  '6':
  - type: text
    content: Zacharie et Élisabeth obéissaient à Dieu toujours. Ils ne faisaient pas de mauvaises choses. Dieu aimait comment ils vivaient.
  '60':
  - type: text
    content: 'Elisabeth a dit : Non, son nom sera Jean. '
  '61':
  - type: text
    content: 'Ils ont dit : Tu ne peux pas vraiment lui donner le nom de Jean. Il n’y a personne qui s’appelle Jean dans ta famille. '
  '62':
  - type: text
    content: Puis ils ont demandé le nom du garçon à Zacharie. Ils ont fait cela par des signes. Zacharie ne parlait pas.
  '63':
  - type: text
    content: 'Alors Zacharie a demandé quelque chose sur quoi écrire. Il a écrit : Son nom est Jean. Tout le monde était très surpris de ce qu’il a écrit. '
  '64':
  - type: text
    content: 'Immédiatement, Zacharie a pu encore parler. Il pouvait parler très bien à nouveau. Il a commencé à dire à Dieu : Tu es très grand et puissant ! '
  '65':
  - type: text
    content: Les gens qui vivaient près de Zacharie et Élisabeth étaient surpris. Ils étaient surpris de ce qui était arrivé. Ils ont vu à quel point Dieu était grand. Beaucoup de gens qui vivaient sur les collines de Judée parlaient également de toutes ces choses.
  '66':
  - type: text
    content: 'Les gens entendaient parler de ces choses. Ils s’étonnaient tous. Ils se demandaient : Que sera donc cet enfant ? Après tout, ils ont vu que Dieu était vraiment avec lui.'
  - type: heading
    content: La chanson de Zacharie
  '67':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' a rempli Zacharie, père de Jean. Puis il parlait ainsi à propos de Dieu :'
  '68':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu d’Israël est un grand Dieu.'
  - type: text
    content: Il est venu pour sauver son peuple.
  '69':
  - type: text
    content: Il a envoyé une personne très forte qui nous sauvera.
  - type: text
    content: Cette personne est dans la famille de David. David était son serviteur.
  '7':
  - type: text
    content: Mais ils n’avaient pas d’enfants. Élisabeth ne pouvait pas avoir de bébé et ils étaient tous 2 vieux.
  '70':
  - type: text
    content: 'Il y a longtemps, Dieu a donné son '
  - type: text
    content: Esprit
  - type: text
    content: ' aux bonnes personnes, afin qu’elles puissent nous parler à ce sujet.'
  - type: text
    content: 'Voici ce qu’elles disaient :'
  '71':
  - type: text
    content: Dieu va nous sauver de nos ennemis.
  - type: text
    content: Il va nous sauver de tout le monde qui nous déteste.
  '72':
  - type: text
    content: Il a promis d’être gentil avec nos pères.
  - type: text
    content: Il se souviendra de faire les choses qu’il avait promises.
  '73':
  - type: text
    content: Oui, il se souviendra des promesses qu’il avait dites à Abraham.
  '74':
  - type: text
    content: Je vais vous protéger de vos ennemis.
  - type: text
    content: Ensuite, vous pouvez travailler pour moi et sans peur.
  '75':
  - type: text
    content: Vous pouvez travailler pour moi dans le droit chemin.
  - type: text
    content: Vous pouvez le faire pendant toutes vos vies.
  '76':
  - type: text
    content: 'Zacharie a ensuite parlé à son enfant :'
  - type: text
    content: 'Toi, enfant, tu seras appelé un serviteur du grand Dieu qui est au '
  - type: text
    content: ciel
  - type: text
    content: .
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' te donnera des messages à parler.'
  - type: text
    content: 'Tu iras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . Ce sera pour préparer un chemin pour lui.
  '77':
  - type: text
    content: Tu diras à son peuple comment Dieu peut le sauver.
  - type: text
    content: Ils ont fait de mauvaises choses, mais Dieu leur pardonne.
  '78':
  - type: text
    content: Notre Dieu nous pardonne, parce qu’il est très gentil.
  - type: text
    content: Il enverra quelqu’un de la plus haute place.
  - type: text
    content: Cette personne sera comme le lever du soleil pour nous.
  '79':
  - type: text
    content: Comme le soleil donne la lumière à tout le monde, donc il va briller sur toutes les personnes.
  - type: text
    content: Certaines personnes sont comme les gens qui sont dans l’obscurité. Elles vivent sans Dieu.
  - type: text
    content: Certaines personnes ont peur de mourir.
  - type: text
    content: Mais il brillera sur tout le monde.
  - type: text
    content: Il va nous montrer comment vivre sans peur.
  '8':
  - type: text
    content: 'Un jour, le groupe de Zacharie travaillait dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Et Zacharie avait un travail spécial à faire. '
  '80':
  - type: text
    content: 'L’enfant de Zacharie grandissait. Dieu le rendait fort dans son '
  - type: text
    content: esprit
  - type: text
    content: '. Il est allé et il vivait dans le '
  - type: text
    content: désert
  - type: text
    content: ' pendant de nombreuses années. Plus tard, Dieu l’a envoyé au peuple d’Israël pour les enseigner.'
  '9':
  - type: text
    content: 'Les '
  - type: text
    content: prêtres
  - type: text
    content: ' choisissaient l’un de leur groupe pour aller dans une salle spéciale à l’intérieur du '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Le travail de Zacharie était de brûler l’'
  - type: text
    content: encens
  - type: text
    content: .
