document_id: HEB.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ne laissez pas le message de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nous devons donc être très prudents. Nous devons continuer à nous souvenir du message que nous avons entendu au sujet du Fils de Dieu. Alors nous n’irons pas dans la mauvaise direction et laisser Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il était juste que Dieu ramène Jésus au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' comme roi. Toutes choses appartiennent à Dieu et il fait que toutes choses continuent. Dieu voulait que beaucoup de gens deviennent ses enfants. Il voulait qu’ils vivent avec lui au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Jésus a rendu cela possible, parce qu’il est mort avec beaucoup de douleur en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jésus est celui qui rend les gens purs devant Dieu. Jésus lui‑même et toutes les personnes qu’il sanctifie, ont le même Père. Ainsi, Jésus n’a pas honte d’appeler toutes ces personnes ses frères et sœurs. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il a dit ceci à Dieu :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dirai à mes frères et sœurs que tu es formidable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque tes gens se rencontrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je resterai avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te glorifierai avec des chansons.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il a dit également ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai entièrement confiance en Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a dit aussi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me tiens ici avec les enfants que Dieu m’a donnés.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ainsi, ces gens qui deviennent les enfants de Dieu sont humains. Ils ont des corps humains. Pour cette raison, Jésus lui‑même est devenu humain comme nous. De cette façon, quand il est mort, il a pu détruire le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: '. C’est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' qui a la puissance sur la mort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Avant, nous étions comme des esclaves toute notre vie, parce que nous avions peur de la mort. Mais maintenant, la mort de Jésus nous rend libres. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il est clair que Jésus n’est pas venu pour aider les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: . Il est venu pour aider les gens de la famille d’Abraham.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'À cause de cela, il était nécessaire que Jésus devienne complètement comme nous, ses frères et sœurs. Il est devenu le serviteur de Dieu pour nous, comme le plus important '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' de Dieu. De cette façon, il a bien servi Dieu et était gentil avec nous. Il est mort en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour que Dieu puisse nous pardonner nos péchés.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Pendant que Jésus vivait sur terre, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' a essayé de lui faire faire de mauvaises choses. Cela a causé beaucoup de problèmes à Jésus. Mais à cause de cela, il nous aide maintenant à ne pas faire de mauvaises choses.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le message que Dieu a dit par les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' était certainement puissant. Dieu a puni les gens lorsqu’ils n’obéissaient pas à la loi qu’il avait donnée à Moïse. D’une manière tout à fait juste, il a puni les gens qui ont fait quelque chose de mal.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quant à nous, Dieu nous a montré comment il nous sauvera de nos péchés. Nous ne devons donc pas oublier le message de Dieu. C’est le grand moyen qu’il a utilisé pour nous sauver. Si nous l’oublions, il nous punira certainement. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus lui‑même a d’abord dit ce message sur la façon dont Dieu sauvera les gens. Ensuite, les gens qui ont entendu Jésus nous ont dit le message. C’est ainsi que nous savons que c’est vrai. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dieu lui‑même a également montré clairement que ce que ces gens ont dit, est vrai. Il a fait beaucoup de miracles et de choses puissantes qui ont montré qu’il était avec eux. Il les a également aidés avec des dons du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ', comme il le voulait.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus est devenu humain comme nous, pour nous sauver
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nous parlons du nouveau monde qui va venir. Dieu n’a pas choisi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' pour régner sur ce monde. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Non ! Mais, quelqu’un a écrit ceci quelque part dans la Bible :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu, pourquoi penses‑tu même aux gens ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu prends soin des hommes et des femmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Même s’ils semblent être très petits. '
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Pendant peu de temps, tu les as rendus moins importants que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: . Mais ensuite, tu les as rendus grands et puissants, comme des rois.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu les as fait régner sur tout.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit que Dieu a amené les gens à régner sur tout. Cela signifie qu’il n’y a rien sur lequel les gens n’ont pas de pouvoir. Mais à l’heure actuelle, nous ne voyons pas encore que les gens règnent sur tout. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais nous voyons Jésus ! Dieu l’a rendu moins important que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' pendant une courte période. Et maintenant, Dieu a fait de lui le grand et puissant roi. Dieu a fait cela parce que Jésus est mort en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour tout le monde. Sa mort a montré que Dieu est très gentil.'
