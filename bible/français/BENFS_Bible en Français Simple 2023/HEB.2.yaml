document_id: HEB.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Ne laissez pas le message de Dieu
  - type: text
    content: 'Nous devons donc être très prudents. Nous devons continuer à nous souvenir du message que nous avons entendu au sujet du Fils de Dieu. Alors nous n’irons pas dans la mauvaise direction et laisser Dieu. '
  '10':
  - type: text
    content: 'Il était juste que Dieu ramène Jésus au '
  - type: text
    content: ciel
  - type: text
    content: ' comme roi. Toutes choses appartiennent à Dieu et il fait que toutes choses continuent. Dieu voulait que beaucoup de gens deviennent ses enfants. Il voulait qu’ils vivent avec lui au '
  - type: text
    content: ciel
  - type: text
    content: '. Jésus a rendu cela possible, parce qu’il est mort avec beaucoup de douleur en '
  - type: text
    content: sacrifice
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Jésus est celui qui rend les gens purs devant Dieu. Jésus lui‑même et toutes les personnes qu’il sanctifie, ont le même Père. Ainsi, Jésus n’a pas honte d’appeler toutes ces personnes ses frères et sœurs. '
  '12':
  - type: text
    content: 'Il a dit ceci à Dieu :'
  - type: text
    content: Je dirai à mes frères et sœurs que tu es formidable.
  - type: text
    content: Lorsque tes gens se rencontrent,
  - type: text
    content: Je resterai avec eux,
  - type: text
    content: Et je te glorifierai avec des chansons.
  '13':
  - type: text
    content: 'Il a dit également ceci :'
  - type: text
    content: Je ferai entièrement confiance en Dieu.
  - type: text
    content: 'Il a dit aussi :'
  - type: text
    content: Je me tiens ici avec les enfants que Dieu m’a donnés.
  '14':
  - type: text
    content: 'Ainsi, ces gens qui deviennent les enfants de Dieu sont humains. Ils ont des corps humains. Pour cette raison, Jésus lui‑même est devenu humain comme nous. De cette façon, quand il est mort, il a pu détruire le '
  - type: text
    content: diable
  - type: text
    content: '. C’est le '
  - type: text
    content: diable
  - type: text
    content: ' qui a la puissance sur la mort. '
  '15':
  - type: text
    content: 'Avant, nous étions comme des esclaves toute notre vie, parce que nous avions peur de la mort. Mais maintenant, la mort de Jésus nous rend libres. '
  '16':
  - type: text
    content: 'Il est clair que Jésus n’est pas venu pour aider les '
  - type: text
    content: anges
  - type: text
    content: . Il est venu pour aider les gens de la famille d’Abraham.
  '17':
  - type: text
    content: 'À cause de cela, il était nécessaire que Jésus devienne complètement comme nous, ses frères et sœurs. Il est devenu le serviteur de Dieu pour nous, comme le plus important '
  - type: text
    content: prêtre
  - type: text
    content: ' de Dieu. De cette façon, il a bien servi Dieu et était gentil avec nous. Il est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour que Dieu puisse nous pardonner nos péchés.'
  '18':
  - type: text
    content: 'Pendant que Jésus vivait sur terre, le '
  - type: text
    content: diable
  - type: text
    content: ' a essayé de lui faire faire de mauvaises choses. Cela a causé beaucoup de problèmes à Jésus. Mais à cause de cela, il nous aide maintenant à ne pas faire de mauvaises choses.'
  '2':
  - type: text
    content: 'Le message que Dieu a dit par les '
  - type: text
    content: anges
  - type: text
    content: ' était certainement puissant. Dieu a puni les gens lorsqu’ils n’obéissaient pas à la loi qu’il avait donnée à Moïse. D’une manière tout à fait juste, il a puni les gens qui ont fait quelque chose de mal.'
  '3':
  - type: text
    content: 'Quant à nous, Dieu nous a montré comment il nous sauvera de nos péchés. Nous ne devons donc pas oublier le message de Dieu. C’est le grand moyen qu’il a utilisé pour nous sauver. Si nous l’oublions, il nous punira certainement. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus lui‑même a d’abord dit ce message sur la façon dont Dieu sauvera les gens. Ensuite, les gens qui ont entendu Jésus nous ont dit le message. C’est ainsi que nous savons que c’est vrai. '
  '4':
  - type: text
    content: 'Dieu lui‑même a également montré clairement que ce que ces gens ont dit, est vrai. Il a fait beaucoup de miracles et de choses puissantes qui ont montré qu’il était avec eux. Il les a également aidés avec des dons du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ', comme il le voulait.'
  - type: heading
    content: Jésus est devenu humain comme nous, pour nous sauver
  '5':
  - type: text
    content: 'Nous parlons du nouveau monde qui va venir. Dieu n’a pas choisi des '
  - type: text
    content: anges
  - type: text
    content: ' pour régner sur ce monde. '
  '6':
  - type: text
    content: 'Non ! Mais, quelqu’un a écrit ceci quelque part dans la Bible :'
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, pourquoi penses‑tu même aux gens ?'
  - type: text
    content: Tu prends soin des hommes et des femmes,
  - type: text
    content: 'Même s’ils semblent être très petits. '
  '7':
  - type: text
    content: 'Pendant peu de temps, tu les as rendus moins importants que les '
  - type: text
    content: anges
  - type: text
    content: . Mais ensuite, tu les as rendus grands et puissants, comme des rois.
  '8':
  - type: text
    content: Tu les as fait régner sur tout.
  - type: text
    content: 'Il dit que Dieu a amené les gens à régner sur tout. Cela signifie qu’il n’y a rien sur lequel les gens n’ont pas de pouvoir. Mais à l’heure actuelle, nous ne voyons pas encore que les gens règnent sur tout. '
  '9':
  - type: text
    content: 'Mais nous voyons Jésus ! Dieu l’a rendu moins important que les '
  - type: text
    content: anges
  - type: text
    content: ' pendant une courte période. Et maintenant, Dieu a fait de lui le grand et puissant roi. Dieu a fait cela parce que Jésus est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour tout le monde. Sa mort a montré que Dieu est très gentil.'
