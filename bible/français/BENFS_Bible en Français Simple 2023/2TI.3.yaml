document_id: 2TI.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les gens se détourneront de Dieu dans les derniers jours
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je veux te faire savoir ceci : Pendant les derniers jours de ce monde, il y aura des moments de grande difficulté. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais toi, Timothée, tu as entendu mon message et tu le sais bien. Tu sais également la façon dont j’ai vécu. Tu sais mon but dans la vie. Tu sais à quel point je fais confiance en Dieu. Tu sais combien j’ai été patient. Tu sais mon amour pour Dieu et pour les autres. Tu sais que j’ai été fort pendant les problèmes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu sais aussi ce qui m’est arrivé dans les villes appelées Antioche, Icone et Lystre. Les gens m’ont causé beaucoup de problèmes à ces endroits. Mais j’étais patient et courageux dans ces problèmes ! Et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m’a gardé en sécurité dans toutes ces périodes dangereuses.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ce n’est pas seulement moi. Chaque chrétien qui veut bien servir Dieu dans sa vie problèmes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: De mauvaises personnes deviendront de plus en plus mauvaises. Certains d’entre eux enseigneront un faux message et les gens croiront à leurs mensonges. Ces faux enseignants croient même à leurs propres mensonges !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Il est important pour nous de connaître la Bible
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais tu dois continuer de croire aux choses que tu as apprises. Tu sais que ces choses sont vraies. Tu connais les enseignants qui t’ont enseigné ces choses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Même lorsque tu étais enfant, tu savais déjà le message de la Bible. La Bible t’a appris comment être vraiment sage. Tu comprends que Dieu te sauve, parce que tu crois en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tout ce qui est écrit dans la Bible vient de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Cela nous aide de plusieurs façons. La Bible nous enseigne ce qui est vrai. Elle nous avertit lorsque nous faisons de mauvaises choses. Cela nous montre ce qui est bien. Elle nous apprend à mener une bonne vie. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: En conséquence, les gens qui veulent servir Dieu peuvent savoir comment vivre correctement. Ce seront des gens qui peuvent faire toutes sortes de bonnes choses.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Les gens ne s’aimeront qu’eux‑mêmes et ils voudront beaucoup d’argent pour eux‑mêmes. Ils seront orgueilleux et ils diront à quel point ils sont grands. Ils insulteront d’autres personnes. Ils n’obéiront pas à leurs parents. Ils ne remercieront personne qui les aide. Ils ne respecteront rien de bon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ils ne seront pas gentils avec les autres, mais ils voudront se quereller. Ils diront des mensonges pour blesser d’autres personnes. Ils ne pourront pas se diriger correctement. Ils seront cruels, comme des animaux sauvages. Ils détesteront tout ce qui est bon.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les gens seront contre leurs amis. Ils feront des bêtises et n’y réfléchiront pas attentivement. Ils seront sûrs qu’ils sont très importants. Ils n’aimeront pas Dieu, mais ils ne voudront que s’amuser. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ces gens sembleront servir Dieu. Mais vraiment, ils refusent d’accepter la puissance de Dieu pour les aider. Vous devez rester loin des gens comme ça.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Parmi ces gens, il y a quelques hommes qui entrent dans les maisons des personnes. Ils envoûtent des femmes faibles. Ces femmes se sentent très coupables de leurs péchés. Elles désirent beaucoup faire de mauvaises choses et elles ne peuvent pas se maîtriser. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ces femmes essaient toujours d’apprendre de nouvelles choses. Mais elles ne peuvent jamais vraiment comprendre le vrai message de Dieu.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ces faux enseignants parlent contre le vrai message de Dieu, de la même manière que Jannes et Jambres ont parlé contre Moïse. Leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' sont devenus confus. La façon dont ils servent Dieu est fausse. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mais ils ne continueront pas de faire beaucoup plus de mauvaises choses. Tout le monde verra clairement qu’ils sont des imbéciles. C’est exactement ce qui est arrivé à Jannes et Jambres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothée doit copier l’exemple de Paul
    marker-yv: yv-h
