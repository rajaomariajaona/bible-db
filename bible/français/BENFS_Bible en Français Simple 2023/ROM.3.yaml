document_id: ROM.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi, quelqu’un peut demander : Est‑ce que cela aide une personne si elle est Juive plutôt que païenne ? Cela aide‑t‑il une personne si quelqu’un l’a circoncise ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Oui, cela aide de plusieurs façons. La première façon est que Dieu a choisi de dire ses messages au peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais vous pouvez dire : Certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne croyaient pas aux messages de Dieu comme il fallait. À cause de cela, peut‑être que Dieu ne fera pas ce qu’il a dit de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Non, cela ne veut certainement pas dire cela ! Dieu fera toujours ce qu’il dit. Il dira toujours ce qui est vrai, même si tout le monde doit mentir. Voici ce qui est écrit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton message est vrai. Cela montre que tu es juste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gens peuvent dire que tu te trompes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il sera toujours clair que tu es juste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Peut‑être que certaines personnes peuvent dire : Les mauvaises choses que nous faisons montrent plus clairement que Dieu est toujours juste. Alors, peut‑être que Dieu a tort de nous punir. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ce n’est pas vrai ! Dieu décide toujours de ce qui est bon et juste. C’est pourquoi il est capable de juger tous les gens au monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quelqu’un pourrait aussi dire : Quand je dis des mensonges, cela montre à quel point Dieu est grand et bon. Mon mensonge montre plus clairement que Dieu dit toujours ce qui est vrai. Donc, Dieu ne dira pas que je suis une mauvaise personne. Il ne me punira pas. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais si cela est vrai, vous pourriez aussi dire : Nous devons faire de plus en plus de mauvaises choses. Cela donnera alors quelque chose de bien. Certaines personnes disent même que c’est le message que j’enseigne. Mais si ces personnes disent cela, elles m’insultent. Il est juste que Dieu punisse ces gens.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Personne n’est juste envers Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors, que pouvons‑nous apprendre de cela ? Nous ne pouvons pas dire que nous, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', nous sommes meilleurs que les autres. Non, certainement, nous ne pouvons pas dire cela ! J’ai déjà dit que le péché a le pouvoir sur tout le monde. Cela est vrai pour les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ceci est écrit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a personne qui est juste envers Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a même pas une seule personne qui est comme cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Personne ne comprend ce qui est vrai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il n’y a personne qui veut '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' Dieu.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Chacun s’est détourné de Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le monde est devenu complètement mauvais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne fait ce qui est bon ou gentil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a même pas une seule personne qui est comme cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De mauvais mots sortent de leurs bouches, comme une très mauvaise odeur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils disent des mensonges tout le temps, pour que les gens fassent de mauvaises choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les choses qu’ils disent font mal aux gens, comme le poison d’un serpent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils disent toujours de mauvaises choses contre les gens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils veulent leur causer des problèmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils se dépêchent pour tuer des gens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Partout où ils vont, ils détruisent des choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne font que rendre les gens très tristes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils n’ont jamais su vivre en paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils refusent de respecter Dieu en aucune façon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi, nous savons que la loi de Dieu appartient aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Dieu leur a dit d’obéir à tout ce que sa loi enseigne. En conséquence, personne ne peut dire : Dieu ne me punira pas. Tous les gens dans le monde se tiendront devant Dieu et il les jugera tous. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La loi de Dieu montre clairement aux gens qu’ils ont fait de mauvaises choses. Personne ne peut devenir juste avec Dieu, parce qu’il obéit à cette loi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment Dieu accepte les gens comme justes avec lui‑même
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais maintenant, nous pouvons savoir comment devenir justes avec Dieu. Dieu nous a montré la façon dont il acceptera les gens comme étant bien avec lui‑même. Cette façon ne fait pas partie de la loi qu’il avait donnée à Moïse. Mais la loi de Dieu et les messages de ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' nous ont parlé de cela. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dieu accepte que les gens soient justes envers lui‑même, parce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait ce que Dieu voulait. Dieu accepte toute personne qui croit en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. C’est la même chose pour tous les gens, qu’ils soient '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ou non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tout le monde a fait de mauvaises choses. Personne ne peut être bon et grand, comme Dieu le veut. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais parce que Dieu est très bon, il nous accepte comme étant justes avec lui‑même. C’est le don de Dieu pour nous. Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a payé nos péchés pour nous rendre libres. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dieu a montré que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort sur la croix en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour nos péchés. Dieu nous pardonne si nous faisons confiance en Jésus et au sang de son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: '. Dieu a fait cela pour montrer clairement qu’il est toujours bon et juste. Dans les temps passés, Dieu n’a pas puni les gens qui ont fait de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il ne les a pas punis, parce qu’il est très patient. Il savait ce qu’il pourra faire maintenant, en ce moment. Il a maintenant montré qu’il était parfaitement bon et juste. Il accepte que les gens soient justes avec lui‑même, s’ils croient en Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Alors, personne ne doit se glorifier d’être assez bon. Personne ne devient juste avec Dieu, parce qu’il fait de bonnes choses. Non ! Dieu accepte une personne si seulement cette personne croit en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Voilà donc ce que nous disons. Une personne devient juste avec Dieu, si elle croit en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Ce n’est pas parce qu’elle fait les bonnes choses que la loi de Dieu enseigne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dieu n’est pas seulement Dieu pour le peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  - type: text
    text: '. Il est aussi Dieu pour les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Oui ! Il est le Dieu de tous les hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il n’y a qu’un seul Dieu. Il acceptera les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' comme étant justes avec lui‑même, s’ils croient en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il acceptera également que d’autres gens soient justes avec lui‑même, s’ils croient en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Qu’est‑ce que cela nous montre sur la loi de Dieu qu’il avait donnée à Moïse ? Quand nous disons que tout le monde doit croire en Jésus, cela signifie‑t‑il que les lois de Dieu n’ont aucun but ? Non ! Lorsque nous croyons en Jésus, nous montrons le véritable but des lois de Dieu.
