document_id: ROM.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: text
    content: 'Ainsi, quelqu’un peut demander : Est‑ce que cela aide une personne si elle est Juive plutôt que païenne ? Cela aide‑t‑il une personne si quelqu’un l’a circoncise ? '
  '10':
  - type: text
    content: 'Ceci est écrit dans la Bible :'
  - type: text
    content: Il n’y a personne qui est juste envers Dieu.
  - type: text
    content: Il n’y a même pas une seule personne qui est comme cela.
  '11':
  - type: text
    content: Personne ne comprend ce qui est vrai.
  - type: text
    content: 'Il n’y a personne qui veut '
  - type: text
    content: adorer
  - type: text
    content: ' Dieu.'
  '12':
  - type: text
    content: Chacun s’est détourné de Dieu.
  - type: text
    content: Tout le monde est devenu complètement mauvais.
  - type: text
    content: Personne ne fait ce qui est bon ou gentil.
  - type: text
    content: Il n’y a même pas une seule personne qui est comme cela.
  '13':
  - type: text
    content: De mauvais mots sortent de leurs bouches, comme une très mauvaise odeur.
  - type: text
    content: Ils disent des mensonges tout le temps, pour que les gens fassent de mauvaises choses.
  - type: text
    content: Les choses qu’ils disent font mal aux gens, comme le poison d’un serpent.
  '14':
  - type: text
    content: Ils disent toujours de mauvaises choses contre les gens,
  - type: text
    content: Parce qu’ils veulent leur causer des problèmes.
  '15':
  - type: text
    content: Ils se dépêchent pour tuer des gens.
  '16':
  - type: text
    content: Partout où ils vont, ils détruisent des choses.
  - type: text
    content: Ils ne font que rendre les gens très tristes.
  '17':
  - type: text
    content: Ils n’ont jamais su vivre en paix.
  '18':
  - type: text
    content: Ils refusent de respecter Dieu en aucune façon.
  '19':
  - type: text
    content: 'Ainsi, nous savons que la loi de Dieu appartient aux '
  - type: text
    content: Juifs
  - type: text
    content: '. Dieu leur a dit d’obéir à tout ce que sa loi enseigne. En conséquence, personne ne peut dire : Dieu ne me punira pas. Tous les gens dans le monde se tiendront devant Dieu et il les jugera tous. '
  '2':
  - type: text
    content: 'Oui, cela aide de plusieurs façons. La première façon est que Dieu a choisi de dire ses messages au peuple '
  - type: text
    content: juif
  - type: text
    content: '. '
  '20':
  - type: text
    content: La loi de Dieu montre clairement aux gens qu’ils ont fait de mauvaises choses. Personne ne peut devenir juste avec Dieu, parce qu’il obéit à cette loi.
  - type: heading
    content: Comment Dieu accepte les gens comme justes avec lui‑même
  '21':
  - type: text
    content: 'Mais maintenant, nous pouvons savoir comment devenir justes avec Dieu. Dieu nous a montré la façon dont il acceptera les gens comme étant bien avec lui‑même. Cette façon ne fait pas partie de la loi qu’il avait donnée à Moïse. Mais la loi de Dieu et les messages de ses '
  - type: text
    content: prophètes
  - type: text
    content: ' nous ont parlé de cela. '
  '22':
  - type: text
    content: Dieu accepte que les gens soient justes envers lui‑même, parce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait ce que Dieu voulait. Dieu accepte toute personne qui croit en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. C’est la même chose pour tous les gens, qu’ils soient '
  - type: text
    content: Juifs
  - type: text
    content: ' ou non '
  - type: text
    content: Juifs
  - type: text
    content: .
  '23':
  - type: text
    content: 'Tout le monde a fait de mauvaises choses. Personne ne peut être bon et grand, comme Dieu le veut. '
  '24':
  - type: text
    content: Mais parce que Dieu est très bon, il nous accepte comme étant justes avec lui‑même. C’est le don de Dieu pour nous. Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a payé nos péchés pour nous rendre libres. '
  '25':
  - type: text
    content: Dieu a montré que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort sur la croix en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nos péchés. Dieu nous pardonne si nous faisons confiance en Jésus et au sang de son '
  - type: text
    content: sacrifice
  - type: text
    content: '. Dieu a fait cela pour montrer clairement qu’il est toujours bon et juste. Dans les temps passés, Dieu n’a pas puni les gens qui ont fait de mauvaises choses. '
  '26':
  - type: text
    content: Il ne les a pas punis, parce qu’il est très patient. Il savait ce qu’il pourra faire maintenant, en ce moment. Il a maintenant montré qu’il était parfaitement bon et juste. Il accepte que les gens soient justes avec lui‑même, s’ils croient en Jésus.
  '27':
  - type: text
    content: Alors, personne ne doit se glorifier d’être assez bon. Personne ne devient juste avec Dieu, parce qu’il fait de bonnes choses. Non ! Dieu accepte une personne si seulement cette personne croit en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '28':
  - type: text
    content: Voilà donc ce que nous disons. Une personne devient juste avec Dieu, si elle croit en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Ce n’est pas parce qu’elle fait les bonnes choses que la loi de Dieu enseigne.
  '29':
  - type: text
    content: 'Dieu n’est pas seulement Dieu pour le peuple '
  - type: text
    content: juif
  - type: text
    content: '. Il est aussi Dieu pour les non '
  - type: text
    content: Juifs
  - type: text
    content: '. Oui ! Il est le Dieu de tous les hommes. '
  '3':
  - type: text
    content: 'Mais vous pouvez dire : Certains '
  - type: text
    content: Juifs
  - type: text
    content: ' ne croyaient pas aux messages de Dieu comme il fallait. À cause de cela, peut‑être que Dieu ne fera pas ce qu’il a dit de faire. '
  '30':
  - type: text
    content: 'Il n’y a qu’un seul Dieu. Il acceptera les '
  - type: text
    content: Juifs
  - type: text
    content: ' comme étant justes avec lui‑même, s’ils croient en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Il acceptera également que d’autres gens soient justes avec lui‑même, s’ils croient en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '31':
  - type: text
    content: Qu’est‑ce que cela nous montre sur la loi de Dieu qu’il avait donnée à Moïse ? Quand nous disons que tout le monde doit croire en Jésus, cela signifie‑t‑il que les lois de Dieu n’ont aucun but ? Non ! Lorsque nous croyons en Jésus, nous montrons le véritable but des lois de Dieu.
  '4':
  - type: text
    content: 'Non, cela ne veut certainement pas dire cela ! Dieu fera toujours ce qu’il dit. Il dira toujours ce qui est vrai, même si tout le monde doit mentir. Voici ce qui est écrit dans la Bible :'
  - type: text
    content: Ton message est vrai. Cela montre que tu es juste.
  - type: text
    content: Les gens peuvent dire que tu te trompes.
  - type: text
    content: Mais il sera toujours clair que tu es juste.
  '5':
  - type: text
    content: 'Peut‑être que certaines personnes peuvent dire : Les mauvaises choses que nous faisons montrent plus clairement que Dieu est toujours juste. Alors, peut‑être que Dieu a tort de nous punir. '
  '6':
  - type: text
    content: Ce n’est pas vrai ! Dieu décide toujours de ce qui est bon et juste. C’est pourquoi il est capable de juger tous les gens au monde.
  '7':
  - type: text
    content: 'Quelqu’un pourrait aussi dire : Quand je dis des mensonges, cela montre à quel point Dieu est grand et bon. Mon mensonge montre plus clairement que Dieu dit toujours ce qui est vrai. Donc, Dieu ne dira pas que je suis une mauvaise personne. Il ne me punira pas. '
  '8':
  - type: text
    content: 'Mais si cela est vrai, vous pourriez aussi dire : Nous devons faire de plus en plus de mauvaises choses. Cela donnera alors quelque chose de bien. Certaines personnes disent même que c’est le message que j’enseigne. Mais si ces personnes disent cela, elles m’insultent. Il est juste que Dieu punisse ces gens.'
  - type: heading
    content: Personne n’est juste envers Dieu
  '9':
  - type: text
    content: 'Alors, que pouvons‑nous apprendre de cela ? Nous ne pouvons pas dire que nous, les '
  - type: text
    content: Juifs
  - type: text
    content: ', nous sommes meilleurs que les autres. Non, certainement, nous ne pouvons pas dire cela ! J’ai déjà dit que le péché a le pouvoir sur tout le monde. Cela est vrai pour les '
  - type: text
    content: Juifs
  - type: text
    content: ' et les non '
  - type: text
    content: Juifs
  - type: text
    content: '. '
