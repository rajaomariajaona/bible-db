document_id: JHN.17,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 17
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus prie pour lui‑même
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après que Jésus a dit cela, il a levé les yeux au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il a dit : Père, c’est le temps. Montre à quel point ton Fils est grand et bon. Alors je peux montrer à quel point tu es grand et bon. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout ce qui est à moi est à toi. Et tout ce qui est à toi est à moi. Et ces gens ont montré à quel point je suis grand et bon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je ne vais plus rester dans le monde. Je viendrai à toi. Mais ils sont encore dans le monde. Saint Père, garde‑les en sécurité dans ton nom, que tu m’as donné. Alors ils peuvent être unis comme toi et moi, sommes unis. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors que j’étais avec eux, je les gardais en sécurité. J’ai gardé en sécurité les gens que tu m’as donnés. J’ai gardé en sécurité dans ton nom, les gens que tu m’as donnés.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je n’ai perdu Aucun d’entre eux, sauf un seul qui s’est perdu. Ce que l’Ancien Testament a dit, devait arriver.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je viendrai à toi. Mais je dis ces choses pendant que je suis encore dans le monde. Je les dis à ces hommes. Ainsi, ils seront complètement heureux dans leurs cœurs. Je veux qu’ils soient complètement heureux comme je suis complètement heureux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur ai donné tes paroles. Et les gens du monde entier les ont haïs, parce qu’ils ne font pas partie du monde. Ils ne font pas partie du monde, de la même manière que je ne suis pas du monde. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne te demande pas de les sortir du monde. Mais je veux que tu les gardes à l’abri de celui qui est mauvais. Donc, je te demande de le faire. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ne font pas partie du monde, comme moi, je ne suis pas du monde. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fais‑les saints par tes paroles. Tes paroles sont vraies. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je les ai envoyés dans le monde, de la même manière que tu m’as envoyé dans le monde. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je me sanctifie moi‑même en leur nom. Alors ils peuvent devenir sanctifiés par la vérité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus prie pour tous ceux qui vont croire en lui
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu m’as donné le pouvoir sur toutes les personnes, tu as fait cela pour que je puisse amener les gens à vivre toujours. Je ferai vivre toujours tous ces gens que tu m’as donnés. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne prie pas seulement pour ces gens. Je prie aussi pour les gens qui vont croire en moi à cause de leurs paroles. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prie pour qu’ils soient tous unis. Toi, Père, tu es en moi et moi en toi. Je prie pour qu’eux aussi soient unis en nous. Alors les gens du monde entier vont croire que tu m’as envoyé. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur ai donné la gloire que tu m’as donnée. Maintenant, ils peuvent être unis comme toi et moi sommes unis. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je serai en eux, et tu seras en moi. Donc, ils peuvent être complètement unis. Et maintenant les gens du monde entier sauront que tu m’as envoyé. Les gens du monde sauront que tu les aimes. Tu les aimes comme tu m’aimes.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Père, tu m’as donné ces gens. Et je veux qu’ils soient avec moi là où je suis. Tu me fais grand et puissant parce que tu m’aimes. Tu m’as aimé avant de faire le monde. Et je veux que ces gens voient comment je suis puissant. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Père, tu fais toujours ce qui est juste. Les gens du monde ne te connaissent pas, mais je te connais. Et ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' savent que tu m’as envoyé. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je leur ai montré ce que tu es. Et je vais continuer à leur montrer qui tu es. Donc, ils vont aimer d’autres personnes de la même manière que tu m’aimes. Et donc je peux être en eux.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et voici comment ils vont vivre toujours. Ils vont vivre, car ils te connaissent et ils savent que tu es vraiment Dieu. Et ils connaissent Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', que tu as envoyé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai terminé le travail que tu m’as donné à faire. Et donc, j’ai montré à la terre à quel point tu es grand et bon. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, Père, montre à quel point je suis grand et bon. J’étais avec toi avant le début du monde. J’étais grand et puissant avec toi. Montre à nouveau que je suis grand comme ça.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus prie pour ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu m’as donné des hommes du monde. Je leur ai montré qui tu es. Ils étaient à toi. Tu me les as donnés, et ils ont obéi à tes paroles. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, ils savent ceci : tout ce que tu m’as donné vient vraiment de toi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je leur ai donné les paroles que tu m’avais données. Et ils ont accepté ces paroles. Ils savent bien que je suis sorti de toi. Ils croient que tu m’as envoyé.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prie pour eux. Je ne prie pas pour les gens qui appartiennent à ce monde. Non, mais je prie pour les gens que tu m’as donnés. Je prie pour eux, car ils sont à toi. '
