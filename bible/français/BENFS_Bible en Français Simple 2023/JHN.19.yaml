document_id: JHN.19,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 19
  - type: text
    content: 'Alors Pilate a dit aux soldats d’amener Jésus dehors. Il leur a dit de frapper Jésus à plusieurs reprises avec un fouet. '
  '10':
  - type: text
    content: 'Pilate lui a dit : Est‑ce que tu refuses de me parler ? Rappelle‑toi que j’ai le pouvoir. Je peux te laisser aller libre, ou je peux les laisser te tuer sur une croix. '
  '11':
  - type: text
    content: 'Jésus a répondu : Tu ne pourrais avoir aucune autorité sur moi, si Dieu ne te l’a pas donnée. Donc, l’homme qui m’a livré a fait quelque chose de pire. Cet homme a fait une chose pire que toi. '
  '12':
  - type: text
    content: 'A partir de ce moment, Pilate a essayé de laisser Jésus aller librement. Mais les '
  - type: text
    content: Juifs
  - type: text
    content: ' criaient en arrière : Si tu le laisses aller, tu n’es pas ami de '
  - type: text
    content: César
  - type: text
    content: '. Personne ne doit se dire lui‑même roi. Celui qui dit cela est l’ennemi de '
  - type: text
    content: César
  - type: text
    content: '  !'
  '13':
  - type: text
    content: 'Pilate a entendu ces paroles. Il a amené Jésus dehors. Pilate était assis sur un siège spécial, où il jugeait. Le siège était dans un endroit appelé Gabbatha dans la langue des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il y avait de grandes pierres plates là. Elles couvraient le sol. '
  '14':
  - type: text
    content: 'C’était environ 6 heures du matin le jour où ils ont préparé le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: '. Pilate a dit aux '
  - type: text
    content: Juifs
  - type: text
    content: '  : Voici votre roi ! '
  '15':
  - type: text
    content: 'Mais ils criaient : Enlevez‑le ! Enlevez‑le ! Tuez‑le sur une croix ! Pilate leur a dit : Voulez‑vous que je fasse tuer votre roi sur une croix ? Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont répondu : '
  - type: text
    content: César
  - type: text
    content: ' est le seul dirigeant que nous appelons roi. '
  '16':
  - type: text
    content: Alors Pilate leur a donné Jésus, afin qu’ils puissent le tuer sur une croix.
  - type: heading
    content: Les écrits sur la croix de Jésus
  '17':
  - type: text
    content: 'Jésus est arrivé à l’endroit appelé lieu du crâne. Cet endroit est appelé '
  - type: text
    content: Golgotha
  - type: text
    content: ' dans la langue des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il portait sa croix. '
  '18':
  - type: text
    content: Ils l’ont mis à la croix en le bloquant avec des clous. Puis ils ont élevé la croix. Ils ont mis 2 autres hommes sur des croix avec lui. L’un à son côté droit et l’autre à son côté gauche. Jésus était entre eux.
  '19':
  - type: text
    content: 'Pilate a écrit une note. Puis ils l’ont mise sur la croix. Ces écrits étaient : Jésus de Nazareth, le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Les soldats ont fait une couronne d’épines. Ils l’ont mise sur la tête de Jésus. Puis ils ont pris un '
  - type: text
    content: manteau
  - type: text
    content: ' rouge foncé. Ils l’ont mis sur lui. '
  '20':
  - type: text
    content: 'L’endroit où ils avaient mis Jésus sur la croix était près de la ville. Donc, beaucoup de '
  - type: text
    content: Juifs
  - type: text
    content: ' lisaient ces écrits. Ils pouvaient les lire parce que Pilate avait écrit les mots 3 fois. Il avait écrit dans la langue des '
  - type: text
    content: Juifs
  - type: text
    content: ' et dans les langues dites romaine et grecque. '
  '21':
  - type: text
    content: 'Les chefs des prêtes ont dit à Pilate : N’écris pas : Le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '. Au lieu de cela, écris : Cet homme a dit : Je suis le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Pilate a répondu : Je ne vais pas changer ce que j’ai écrit.'
  '23':
  - type: text
    content: 'Après cela, les soldats ont mis Jésus sur la croix. Ils ont pris ses vêtements. Ils les ont partagés en 4 parties : une partie pour chaque soldat. En plus, ils ont pris sa tunique. Cette tunique était sans couture. Elle était faite d’un seul tissu de haut en bas. '
  '24':
  - type: text
    content: 'Alors ils se sont dit les uns aux autres : Nous n’allons pas déchirer la tunique. Au lieu de cela, nous allons faire un jeu. La personne qui gagne le jeu aura la tunique. Cela est arrivé parce que l’Ancien Testament a dit : Chacun d’eux a pris certains de mes vêtements. Ils ont fait un jeu pour gagner ce que je portais. Donc, voilà ce que les soldats ont fait.'
  '25':
  - type: text
    content: 'Certaines femmes se tenaient près de Jésus alors qu’il était sur la croix. Il y avait sa mère, la sœur de sa mère, Marie femme de Clopas et Marie‑Madeleine (Marie de Magdala). '
  '26':
  - type: text
    content: 'Jésus a vu sa mère. En '
  - type: text
    content: outre
  - type: text
    content: ', il a vu le '
  - type: text
    content: disciple
  - type: text
    content: ' qu’il aimait. Ce '
  - type: text
    content: disciple
  - type: text
    content: ' était debout près de la mère de Jésus. Alors Jésus a dit à sa mère : Femme, voici ton fils. '
  '27':
  - type: text
    content: 'Puis il a dit au '
  - type: text
    content: disciple
  - type: text
    content: '  : Voici ta mère.'
  - type: text
    content: 'A partir de ce moment, le '
  - type: text
    content: disciple
  - type: text
    content: ' l’a amenée pour vivre dans sa propre maison.'
  - type: heading
    content: Jésus meurt
  '28':
  - type: text
    content: 'Jésus a fait tout le travail que Dieu lui a dit de faire au monde. Jésus le savait. Donc, à cause de ce qui est dit dans l’Ancien Testament, il a dit : Je veux boire. Ce qui est dit dans l’Ancien Testament est arrivé. '
  '29':
  - type: text
    content: 'Il y avait un vase rempli de la boisson appelée vinaigre. Ainsi, les soldats ont mis un tissu dans le vin. Ils ont fixé le tissu à l’extrémité d’une branche. La branche était d’une plante appelée hysope. Ensuite, ils ont soulevé le tissu jusqu’à la bouche de Jésus. '
  '3':
  - type: text
    content: 'Les soldats sont venus à lui. Ils l’ont frappé avec leurs mains. Pendant qu’ils le frappaient, ils lui disaient : Bonjour, grand roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  !'
  '30':
  - type: text
    content: 'Jésus a bu le vin. Puis il a dit : J’ai tout fini. Puis il a baissé la tête vers le bas et il est mort.'
  - type: heading
    content: Un soldat introduit une lance en Jésus
  '31':
  - type: text
    content: 'C’était un vendredi, le jour où les '
  - type: text
    content: Juifs
  - type: text
    content: ' se préparaient pour le jour de '
  - type: text
    content: sabbat
  - type: text
    content: '. Et ce jour‑là de '
  - type: text
    content: sabbat
  - type: text
    content: ' était très important. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ne voulaient pas que les morts restent sur la croix le jour de '
  - type: text
    content: sabbat
  - type: text
    content: . Ils ont donc demandé à Pilate de parler aux soldats. Les soldats ont brisé les jambes des hommes qui étaient sur les croix. Ensuite, ils descendaient les morts vers le bas de la croix.
  '32':
  - type: text
    content: 'Alors les soldats sont allés là‑bas. Et ils ont cassé les jambes des 2 autres hommes. Les 2 hommes se trouvaient sur la croix aux côtés de Jésus. '
  '33':
  - type: text
    content: 'Mais quand ils sont venus auprès de Jésus, il était déjà mort. Ils ont vu qu’il était mort. Donc, ils ne lui ont pas brisé les jambes. '
  '34':
  - type: text
    content: 'Mais un des soldats a introduit une lance dans le côté de Jésus. Immédiatement, le sang et l’eau sont sortis de son corps. '
  '35':
  - type: text
    content: 'L’homme qui a vu cela en a parlé. Ce qu’il dit, est vrai. Il sait que c’est vraiment arrivé. Il dit cela pour que vous puissiez croire. '
  '36':
  - type: text
    content: 'Cela est écrit dans l’Ancien Testament. Ça se réalise : personne ne brisera aucun de ses os. '
  '37':
  - type: text
    content: 'Et, dans un autre endroit, l’Ancien Testament dit : Les gens vont regarder l’homme. Ils ont fait un trou dans son corps.'
  - type: heading
    content: Joseph enterre Jésus
  '38':
  - type: text
    content: 'Après cela, un homme a demandé à Pilate s’il pourrait prendre le corps mort de Jésus. Le nom de cet homme était Joseph. Il est venu de la ville appelée Arimathée. Il était l’un des '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus, mais cela était un secret. C’était un secret parce qu’il avait peur des dirigeants '
  - type: text
    content: juifs
  - type: text
    content: '. Pilate a dit à Joseph de prendre le corps mort. Joseph est allé là et il l’a emporté. '
  '39':
  - type: text
    content: 'Nicodème est allé avec Joseph. C’est lui qui avait visité Jésus une nuit. Nicodème avait à peu près 33 kilogrammes d’épices appelées myrrhe et aloès. '
  '4':
  - type: text
    content: 'Pilate est sorti une fois de plus. Il a dit à la foule : Regardez, je vais le faire sortir ici pour vous. Alors maintenant, vous savez que je ne trouve aucune raison de le punir. '
  '40':
  - type: text
    content: 'Les 2 hommes ont couvert le corps mort de Jésus avec ces épices. Et ils ont mis de longs morceaux de tissu autour encore et encore. Voilà comment les '
  - type: text
    content: Juifs
  - type: text
    content: ' préparent un corps mort avant de l’enterrer. '
  '41':
  - type: text
    content: 'Il y avait un jardin à l’endroit où ils ont tué Jésus sur la croix. Dans ce jardin, il y avait un tombeau neuf, où personne n’avait jamais mis une personne morte. '
  '42':
  - type: text
    content: 'Le lendemain était le '
  - type: text
    content: sabbat
  - type: text
    content: ' des '
  - type: text
    content: Juifs
  - type: text
    content: ', et ce tombeau était proche. Donc, ils ont mis Jésus là.'
  '5':
  - type: text
    content: 'Jésus est sorti. Il portait une couronne d’épines sur sa tête. Il portait le '
  - type: text
    content: manteau
  - type: text
    content: ' rouge foncé. Pilate leur a dit : Regardez. Voici l’homme ! '
  '6':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: officiers
  - type: text
    content: ' ont vu Jésus, ils criaient : Tuez‑le ! Tuez‑le sur une croix ! Pilate leur a dit : Vous, prenez‑le et tuez‑le sur une croix. Je ne trouve aucune faute en lui pour le punir. '
  '7':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont répondu : Nous avons une règle. Cette règle dit qu’il doit mourir. Il doit mourir parce qu’il a dit : Je suis le Fils de Dieu.'
  '8':
  - type: text
    content: 'Quand Pilate a entendu cela, il avait encore plus peur. '
  '9':
  - type: text
    content: 'Il est revenu dans la maison. Il a demandé à Jésus : Tu es d’où ? Mais Jésus n’a pas répondu. '
