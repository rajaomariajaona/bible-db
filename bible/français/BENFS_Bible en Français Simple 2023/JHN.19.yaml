document_id: JHN.19,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 19
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors Pilate a dit aux soldats d’amener Jésus dehors. Il leur a dit de frapper Jésus à plusieurs reprises avec un fouet. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Pilate lui a dit : Est‑ce que tu refuses de me parler ? Rappelle‑toi que j’ai le pouvoir. Je peux te laisser aller libre, ou je peux les laisser te tuer sur une croix. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jésus a répondu : Tu ne pourrais avoir aucune autorité sur moi, si Dieu ne te l’a pas donnée. Donc, l’homme qui m’a livré a fait quelque chose de pire. Cet homme a fait une chose pire que toi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A partir de ce moment, Pilate a essayé de laisser Jésus aller librement. Mais les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' criaient en arrière : Si tu le laisses aller, tu n’es pas ami de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: '. Personne ne doit se dire lui‑même roi. Celui qui dit cela est l’ennemi de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: '  !'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Pilate a entendu ces paroles. Il a amené Jésus dehors. Pilate était assis sur un siège spécial, où il jugeait. Le siège était dans un endroit appelé Gabbatha dans la langue des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il y avait de grandes pierres plates là. Elles couvraient le sol. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'C’était environ 6 heures du matin le jour où ils ont préparé le repas de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: '. Pilate a dit aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  : Voici votre roi ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais ils criaient : Enlevez‑le ! Enlevez‑le ! Tuez‑le sur une croix ! Pilate leur a dit : Voulez‑vous que je fasse tuer votre roi sur une croix ? Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont répondu : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' est le seul dirigeant que nous appelons roi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Alors Pilate leur a donné Jésus, afin qu’ils puissent le tuer sur une croix.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les écrits sur la croix de Jésus
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus est arrivé à l’endroit appelé lieu du crâne. Cet endroit est appelé '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Golgotha
    - type: text
      text: ' dans la langue des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il portait sa croix. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils l’ont mis à la croix en le bloquant avec des clous. Puis ils ont élevé la croix. Ils ont mis 2 autres hommes sur des croix avec lui. L’un à son côté droit et l’autre à son côté gauche. Jésus était entre eux.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pilate a écrit une note. Puis ils l’ont mise sur la croix. Ces écrits étaient : Jésus de Nazareth, le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Les soldats ont fait une couronne d’épines. Ils l’ont mise sur la tête de Jésus. Puis ils ont pris un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: ' rouge foncé. Ils l’ont mis sur lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L’endroit où ils avaient mis Jésus sur la croix était près de la ville. Donc, beaucoup de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' lisaient ces écrits. Ils pouvaient les lire parce que Pilate avait écrit les mots 3 fois. Il avait écrit dans la langue des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et dans les langues dites romaine et grecque. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Les chefs des prêtes ont dit à Pilate : N’écris pas : Le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Au lieu de cela, écris : Cet homme a dit : Je suis le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Pilate a répondu : Je ne vais pas changer ce que j’ai écrit.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Après cela, les soldats ont mis Jésus sur la croix. Ils ont pris ses vêtements. Ils les ont partagés en 4 parties : une partie pour chaque soldat. En plus, ils ont pris sa tunique. Cette tunique était sans couture. Elle était faite d’un seul tissu de haut en bas. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors ils se sont dit les uns aux autres : Nous n’allons pas déchirer la tunique. Au lieu de cela, nous allons faire un jeu. La personne qui gagne le jeu aura la tunique. Cela est arrivé parce que l’Ancien Testament a dit : Chacun d’eux a pris certains de mes vêtements. Ils ont fait un jeu pour gagner ce que je portais. Donc, voilà ce que les soldats ont fait.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Certaines femmes se tenaient près de Jésus alors qu’il était sur la croix. Il y avait sa mère, la sœur de sa mère, Marie femme de Clopas et Marie‑Madeleine (Marie de Magdala). '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus a vu sa mère. En '
    - type: usfm
      marker: w
      children:
      - type: text
        text: outre
    - type: text
      text: ', il a vu le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' qu’il aimait. Ce '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' était debout près de la mère de Jésus. Alors Jésus a dit à sa mère : Femme, voici ton fils. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Puis il a dit au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: '  : Voici ta mère.'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'A partir de ce moment, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' l’a amenée pour vivre dans sa propre maison.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus meurt
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jésus a fait tout le travail que Dieu lui a dit de faire au monde. Jésus le savait. Donc, à cause de ce qui est dit dans l’Ancien Testament, il a dit : Je veux boire. Ce qui est dit dans l’Ancien Testament est arrivé. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Il y avait un vase rempli de la boisson appelée vinaigre. Ainsi, les soldats ont mis un tissu dans le vin. Ils ont fixé le tissu à l’extrémité d’une branche. La branche était d’une plante appelée hysope. Ensuite, ils ont soulevé le tissu jusqu’à la bouche de Jésus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les soldats sont venus à lui. Ils l’ont frappé avec leurs mains. Pendant qu’ils le frappaient, ils lui disaient : Bonjour, grand roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  !'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jésus a bu le vin. Puis il a dit : J’ai tout fini. Puis il a baissé la tête vers le bas et il est mort.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un soldat introduit une lance en Jésus
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'C’était un vendredi, le jour où les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' se préparaient pour le jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: '. Et ce jour‑là de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ' était très important. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ne voulaient pas que les morts restent sur la croix le jour de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: . Ils ont donc demandé à Pilate de parler aux soldats. Les soldats ont brisé les jambes des hommes qui étaient sur les croix. Ensuite, ils descendaient les morts vers le bas de la croix.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Alors les soldats sont allés là‑bas. Et ils ont cassé les jambes des 2 autres hommes. Les 2 hommes se trouvaient sur la croix aux côtés de Jésus. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Mais quand ils sont venus auprès de Jésus, il était déjà mort. Ils ont vu qu’il était mort. Donc, ils ne lui ont pas brisé les jambes. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Mais un des soldats a introduit une lance dans le côté de Jésus. Immédiatement, le sang et l’eau sont sortis de son corps. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'L’homme qui a vu cela en a parlé. Ce qu’il dit, est vrai. Il sait que c’est vraiment arrivé. Il dit cela pour que vous puissiez croire. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Cela est écrit dans l’Ancien Testament. Ça se réalise : personne ne brisera aucun de ses os. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Et, dans un autre endroit, l’Ancien Testament dit : Les gens vont regarder l’homme. Ils ont fait un trou dans son corps.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph enterre Jésus
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Après cela, un homme a demandé à Pilate s’il pourrait prendre le corps mort de Jésus. Le nom de cet homme était Joseph. Il est venu de la ville appelée Arimathée. Il était l’un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus, mais cela était un secret. C’était un secret parce qu’il avait peur des dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: '. Pilate a dit à Joseph de prendre le corps mort. Joseph est allé là et il l’a emporté. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nicodème est allé avec Joseph. C’est lui qui avait visité Jésus une nuit. Nicodème avait à peu près 33 kilogrammes d’épices appelées myrrhe et aloès. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Pilate est sorti une fois de plus. Il a dit à la foule : Regardez, je vais le faire sortir ici pour vous. Alors maintenant, vous savez que je ne trouve aucune raison de le punir. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Les 2 hommes ont couvert le corps mort de Jésus avec ces épices. Et ils ont mis de longs morceaux de tissu autour encore et encore. Voilà comment les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' préparent un corps mort avant de l’enterrer. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Il y avait un jardin à l’endroit où ils ont tué Jésus sur la croix. Dans ce jardin, il y avait un tombeau neuf, où personne n’avait jamais mis une personne morte. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Le lendemain était le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sabbat
    - type: text
      text: ' des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', et ce tombeau était proche. Donc, ils ont mis Jésus là.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus est sorti. Il portait une couronne d’épines sur sa tête. Il portait le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: ' rouge foncé. Pilate leur a dit : Regardez. Voici l’homme ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officiers
    - type: text
      text: ' ont vu Jésus, ils criaient : Tuez‑le ! Tuez‑le sur une croix ! Pilate leur a dit : Vous, prenez‑le et tuez‑le sur une croix. Je ne trouve aucune faute en lui pour le punir. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont répondu : Nous avons une règle. Cette règle dit qu’il doit mourir. Il doit mourir parce qu’il a dit : Je suis le Fils de Dieu.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quand Pilate a entendu cela, il avait encore plus peur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il est revenu dans la maison. Il a demandé à Jésus : Tu es d’où ? Mais Jésus n’a pas répondu. '
