  '1':
  - type: heading
    content: Chapitre 4
  - type: text
    content: ' '
  - type: text
    content: Christ
  - type: text
    content: ' a eu des souffrances pendant qu’il vivait dans son corps. Vous devez donc vous préparer à avoir aussi des souffrances. Pensez à cela de la même manière que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' l’a fait. Ensuite, vous serez forts. Si quelqu’un a des souffrances dans son corps, il ne veut plus faire de mauvaises choses. '
  '10':
  - type: text
    content: 'Dieu a aidé chacun de vous d’une certaine manière. Vous devez bien utiliser ce don de Dieu, afin de pouvoir aider d’autres personnes. Réfléchissez bien à la façon de procéder. Rappelez‑vous que Dieu a donné de nombreux dons différents à son peuple, afin qu’il puisse le servir. '
  '11':
  - type: text
    content: Dieu vous a‑t‑il aidé à bien parler ? Ensuite, dites les messages de Dieu aux gens. Ou Dieu vous a‑t‑il aidé à servir d’autres personnes ?
  - type: text
    content: Alors laissez Dieu vous rendre forts pour faire cela. Faites tout pour que les gens louent Dieu. Ils diront que Dieu est grand, à cause de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Il est celui qui a toujours toute autorité et toute puissance. Tout le monde doit le louer ! Amen ! C’est vrai !
  - type: heading
    content: Les chrétiens doivent être prêts à avoir des souffrances
  '12':
  - type: text
    content: 'Mes amis, je sais que les gens vous causent beaucoup de problèmes. C’est comme un feu qui vous brûle. Ne vous étonnez pas de cela. Ces choses vous arrivent pour montrer si vous croyez vraiment en Dieu. Ne pensez donc pas que quelque chose d’étrange vous arrive. '
  '13':
  - type: text
    content: Remerciez plutôt Dieu lorsque vous avez des problèmes. N’oubliez pas que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a également beaucoup souffert. Si vous avez des problèmes comme lui, vous serez heureux à son retour. Quand tout le monde voit à quel point Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est vraiment grand, alors vous remercierez Dieu et vous serez très heureux. '
  '14':
  - type: text
    content: Les gens peuvent dire de mauvaises choses contre vous, parce que vous appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Mais Dieu vous bénira quand cela arrivera. Cela montre que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu est avec vous. C’est l’'
  - type: text
    content: Esprit
  - type: text
    content: ' qui montre que Dieu est vraiment grand.'
  '15':
  - type: text
    content: 'Mais si vous ressentez de la douleur parce que vous faites de mauvaises choses, c’est juste. Vous ne devez tuer personne. Vous ne devez voler personne. Vous ne devez pas faire de mal aux autres. Vous ne devez pas causer de problèmes à d’autres personnes. Si vous faites de mauvaises choses comme ça, alors ils ont raison de vous punir. '
  '16':
  - type: text
    content: 'Mais si vous avez des souffrances, parce que vous êtes chrétiens, n’ayez pas honte de cela. Mais, vous devez remercier Dieu d’appartenir à '
  - type: text
    content: Christ
  - type: text
    content: .
  '17':
  - type: text
    content: 'Le temps est venu où Dieu commencera à juger les gens. Il décidera de ce qui doit arriver à tout le monde. Il jugera d’abord les personnes qui lui appartiennent. Puisqu’il commencera avec nous, pensez à ce qui va arriver aux autres ! Ils ont refusé d’obéir à la Bonne Nouvelle de Dieu. Ce sera très mauvais pour eux à la fin. N’est‑ce pas vrai ? '
  '18':
  - type: text
    content: 'La Bible dit :'
  - type: text
    content: Quand Dieu sauvera les gens qui sont bons,
  - type: text
    content: Cela arrivera difficilement.
  - type: text
    content: Alors, pensez aux gens qui refusent d’obéir à Dieu.
  - type: text
    content: Ce sera sûrement bien pire pour ces mauvaises personnes.
  '19':
  - type: text
    content: Souvenez‑vous donc de cela. Si vous avez des problèmes, parce que c’est ce que Dieu veut, vous devez lui faire confiance. Dieu vous a créés et il fait toujours ce qu’il a promis. Vous devez donc continuer de faire ce qui est bon, et vous devez continuer de lui faire confiance.
  '2':
  - type: text
    content: Par conséquent, cette personne voudra faire ce que Dieu veut qu’elle fasse. Bien que cette personne continue de vivre dans son corps, elle ne voudra pas faire de mauvaises choses que les gens veulent souvent faire.
  '3':
  - type: text
    content: Vous avez déjà fait ce genre de mauvaises choses depuis assez longtemps. Les gens qui ne connaissent pas Dieu aiment vivre de cette façon. Dans le passé, vous avez également fait ces mauvaises choses. Vous avez fait beaucoup de mauvaises choses que vos corps voulaient faire. Vous faisiez l’amour d’une mauvaise façon. Vous étiez ivres. Vous alliez aux nombreuses fêtes sauvages où vous buviez trop d’alcool. Vous adoriez des idoles, et Dieu déteste cela.
  '4':
  - type: text
    content: 'Les gens qui ne connaissent pas Dieu sont surpris que vous ne vivez plus de cette mauvaise façon. Ils continuent de se réjouir de ces mauvaises choses tout le temps. Mais vous, ne vous joignez pas à eux. Alors ils disent de mauvaises choses contre vous. '
  '5':
  - type: text
    content: 'Mais ces gens devront expliquer à Dieu ce qu’ils ont fait. Il est prêt à juger chaque personne, qu’elle soit vivante ou décédée. '
  '6':
  - type: text
    content: C’est pourquoi même les morts avaient besoin d’entendre la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Leurs corps ont dû mourir, car tout le monde doit mourir. Mais ils ont entendu la Bonne Nouvelle pour que leurs '
  - type: text
    content: esprits
  - type: text
    content: ' puissent vivre, comme Dieu veut qu’ils vivent.'
  - type: heading
    content: Nous devons utiliser correctement les dons de Dieu
  '7':
  - type: text
    content: 'Toutes choses dans ce monde prendront bientôt fin. Donc, vous devez bien penser à cela. Alors, priez sérieusement. '
  '8':
  - type: text
    content: 'Continuez de vous aimer beaucoup. C’est plus important qu’autre chose. Si vous aimez les gens, vous leur pardonnerez tout ce qu’ils ont fait de mal. '
  '9':
  - type: text
    content: Soyez toujours heureux d’avoir d’autres croyants comme visiteurs dans vos maisons.
