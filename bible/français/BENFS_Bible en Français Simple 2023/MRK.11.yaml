document_id: MRK.11
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 11
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus entre à Jérusalem avec gloire sur un jeune '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' s’approchaient de Jérusalem. Ils étaient près des villages appelés Bethphagé et '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. Ils étaient sur la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: '. Alors Jésus a envoyé 2 de ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus a dit aux 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Allez au village qui est en face de vous. Quand vous arriverez au village, vous trouverez immédiatement un jeune '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: . Quelqu’un l’a attaché là. Personne n’est jamais monté sur lui. Détachez la corde et amenez l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: ' ici. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Une personne peut vous demander : Pourquoi faites‑vous cela ? Dites‑lui : Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a besoin du jeune '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: . Il le fera venir ici bientôt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors les 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés. Ils ont trouvé le jeune '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: '. Quelqu’un l’avait attaché à l’extérieur. C’était près d’une porte. Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont détaché la corde. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Certaines personnes étaient là. Elles ont demandé aux 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Que faites‑vous ? Pourquoi détachez‑vous la corde de l’ânon ? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' leur ont répondu. Ils ont répété ce que Jésus leur avait demandé de dire. Les gens les ont alors laissés aller avec l’ânon. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont amené le petit '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âne
  - type: text
    text: ' à Jésus. Ils ont mis leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteaux
  - type: text
    text: ' sur le dos de l’animal. Alors Jésus était assis dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Beaucoup de gens mettaient leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteaux
  - type: text
    text: ' sur la route. D’autres gens mettaient des branches sur la route. Ils coupaient les branches des arbres. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Beaucoup de gens allaient devant Jésus, et d’autres personnes le suivaient. Chacun d’entre eux criait : Nous te prions de nous sauver ! Le roi qui vient au nom du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est grand ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le futur gouvernement de notre grand roi David est grand ! Nous te prions de nous sauver puissamment ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus est arrivé à Jérusalem. Il est allé au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' et il a regardé tout ce qu’il y avait. C’était tard. Alors il est sorti de la ville pour se rendre à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. Et les 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés avec lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un arbre sans fruits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le lendemain, ils sortaient de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: '. Et Jésus a eu faim. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il a vu un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: ' qui était loin. Il y avait des feuilles sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: '. Alors il est allé voir si le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: ' avait des fruits sur lui. Quand il est arrivé, il n’a trouvé aucun fruit, sauf des feuilles : Ce n’était pas la bonne saison pour les fruits. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Jésus a dit à l’arbre : Personne ne pourra plus jamais manger de fruits de toi. Et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont entendu cela.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus va au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand ils sont arrivés à Jérusalem, Jésus est allé au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: . Les gens achetaient et vendaient des choses là‑bas. Il les a tous chassés de là. Certaines personnes échangeaient de l’argent là‑bas. Jésus poussait leurs tables.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il poussait aussi les sièges des hommes qui vendaient des pigeons. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus ne laissait personne transporter des choses par là. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors qu’il enseignait le peuple, Jésus a dit : Les Saintes Écritures disent ceci : Ma maison sera un endroit où les gens de tous les pays prient. Mais vous avez fait de ma maison un endroit où les voleurs se cachent. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les enseignants de la loi de Dieu ont entendu cela. Et ils ont planifié comment tuer Jésus. Ils avaient peur de lui. C’était parce que toute la foule l’écoutait. Et les choses qu’il enseignait, surprenaient beaucoup de gens. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le soir, Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont sortis de la ville.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: ' devient sec'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le lendemain matin, Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont vu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: '. Ils ont vu qu’il avait séché jusqu’aux racines. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pierre s’est rappelé ce que Jésus avait dit. Alors il a dit à Jésus : Maître, regarde ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: '. Tu as dit qu’il devait sécher. Et il s’est séché. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Jésus leur a dit : Vous devez croire en Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je vous dis la vérité. Une personne pourrait dire à cette montagne : Déplace‑toi et jette‑toi dans la mer. Mais cette personne ne doit pas douter dans son cœur. Elle doit croire que cette chose va arriver. Si cette personne croit, cette chose va arriver. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Donc, je vous dis ceci. Quand vous priez pour demander à Dieu quelque chose, croyez. Croyez que vous avez reçu cette chose. Si vous le faites, vous l’aurez. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-26
  - type: text
    text: 'Faites ceci quand vous vous mettez à prier : Si vous avez quelque chose contre quelqu’un, pardonnez à cette personne. Votre Père Dieu qui est dans sa maison (ciel) pardonnera les mauvaises choses que vous faites. Si vous ne pardonnez pas aux gens, Dieu ne vous pardonnera pas non plus vos mauvaises choses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle de son pouvoir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont encore arrivés à Jérusalem. Jésus marchait dans la cour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ', les enseignants de la loi de Dieu et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' sont arrivés auprès de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils lui ont demandé : Qui t’a permis de faire ces choses ? Ils lui ont encore demandé : Qui t’a donné le pouvoir de faire ces choses ? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus a répondu : Je vais vous poser une question. Dites‑moi la réponse. Si vous faites cela, je vais vous répondre. Et je vais vous dire par quel pouvoir je fais ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jean baptisait des gens. Son pouvoir venait de Dieu ou des hommes ? Dites‑moi la réponse. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors ils ont discuté entre eux. Ils se sont dit ceci : Nous pouvons dire que c’est Dieu qui a donné à Jean son pouvoir. Mais si nous disons cela, Jésus nous dira : Vous devriez croire en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nous ne voulons pas dire que ce sont les hommes qui ont donné à Jean son pouvoir. Ils ne voulaient pas dire cela, parce qu’ils avaient peur de la foule. Tous les gens croyaient que Jean était vraiment un serviteur spécial de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Donc les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' ont répondu à Jésus et ils ont dit : Nous ne savons pas qui a donné à Jean son pouvoir. Et Jésus leur a dit : Vous ne me répondez pas. Donc je ne vais pas non plus vous dire par quel pouvoir je fais ces choses.'
