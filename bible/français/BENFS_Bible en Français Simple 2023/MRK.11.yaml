document_id: MRK.11,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 11
  - type: heading
    content: Jésus entre à Jérusalem avec gloire sur un jeune âne
  - type: text
    content: 'Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' s’approchaient de Jérusalem. Ils étaient près des villages appelés Bethphagé et '
  - type: text
    content: Béthanie
  - type: text
    content: '. Ils étaient sur la '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: '. Alors Jésus a envoyé 2 de ses '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Le futur gouvernement de notre grand roi David est grand ! Nous te prions de nous sauver puissamment ! '
  '11':
  - type: text
    content: 'Jésus est arrivé à Jérusalem. Il est allé au '
  - type: text
    content: Temple
  - type: text
    content: ' et il a regardé tout ce qu’il y avait. C’était tard. Alors il est sorti de la ville pour se rendre à '
  - type: text
    content: Béthanie
  - type: text
    content: '. Et les 12 '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés avec lui.'
  - type: heading
    content: Un arbre sans fruits
  '12':
  - type: text
    content: 'Le lendemain, ils sortaient de '
  - type: text
    content: Béthanie
  - type: text
    content: '. Et Jésus a eu faim. '
  '13':
  - type: text
    content: 'Il a vu un '
  - type: text
    content: figuier
  - type: text
    content: ' qui était loin. Il y avait des feuilles sur le '
  - type: text
    content: figuier
  - type: text
    content: '. Alors il est allé voir si le '
  - type: text
    content: figuier
  - type: text
    content: ' avait des fruits sur lui. Quand il est arrivé, il n’a trouvé aucun fruit, sauf des feuilles : Ce n’était pas la bonne saison pour les fruits. '
  '14':
  - type: text
    content: 'Alors Jésus a dit à l’arbre : Personne ne pourra plus jamais manger de fruits de toi. Et ses '
  - type: text
    content: disciples
  - type: text
    content: ' ont entendu cela.'
  - type: heading
    content: Jésus va au Temple
  '15':
  - type: text
    content: 'Quand ils sont arrivés à Jérusalem, Jésus est allé au '
  - type: text
    content: Temple
  - type: text
    content: . Les gens achetaient et vendaient des choses là‑bas. Il les a tous chassés de là. Certaines personnes échangeaient de l’argent là‑bas. Jésus poussait leurs tables.
  - type: text
    content: 'Il poussait aussi les sièges des hommes qui vendaient des pigeons. '
  '16':
  - type: text
    content: 'Jésus ne laissait personne transporter des choses par là. '
  '17':
  - type: text
    content: 'Alors qu’il enseignait le peuple, Jésus a dit : Les Saintes Écritures disent ceci : Ma maison sera un endroit où les gens de tous les pays prient. Mais vous avez fait de ma maison un endroit où les voleurs se cachent. '
  '18':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi de Dieu ont entendu cela. Et ils ont planifié comment tuer Jésus. Ils avaient peur de lui. C’était parce que toute la foule l’écoutait. Et les choses qu’il enseignait, surprenaient beaucoup de gens. '
  '19':
  - type: text
    content: 'Le soir, Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont sortis de la ville.'
  - type: heading
    content: Le figuier devient sec
  '2':
  - type: text
    content: 'Jésus a dit aux 2 '
  - type: text
    content: disciples
  - type: text
    content: '  : Allez au village qui est en face de vous. Quand vous arriverez au village, vous trouverez immédiatement un jeune '
  - type: text
    content: âne
  - type: text
    content: . Quelqu’un l’a attaché là. Personne n’est jamais monté sur lui. Détachez la corde et amenez l’
  - type: text
    content: âne
  - type: text
    content: ' ici. '
  '20':
  - type: text
    content: 'Le lendemain matin, Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' ont vu le '
  - type: text
    content: figuier
  - type: text
    content: '. Ils ont vu qu’il avait séché jusqu’aux racines. '
  '21':
  - type: text
    content: 'Pierre s’est rappelé ce que Jésus avait dit. Alors il a dit à Jésus : Maître, regarde ce '
  - type: text
    content: figuier
  - type: text
    content: '. Tu as dit qu’il devait sécher. Et il s’est séché. '
  '22':
  - type: text
    content: 'Alors Jésus leur a dit : Vous devez croire en Dieu. '
  '23':
  - type: text
    content: 'Je vous dis la vérité. Une personne pourrait dire à cette montagne : Déplace‑toi et jette‑toi dans la mer. Mais cette personne ne doit pas douter dans son cœur. Elle doit croire que cette chose va arriver. Si cette personne croit, cette chose va arriver. '
  '24':
  - type: text
    content: 'Donc, je vous dis ceci. Quand vous priez pour demander à Dieu quelque chose, croyez. Croyez que vous avez reçu cette chose. Si vous le faites, vous l’aurez. '
  '25':
  - type: text
    content: 'Faites ceci quand vous vous mettez à prier : Si vous avez quelque chose contre quelqu’un, pardonnez à cette personne. Votre Père Dieu qui est dans sa maison (ciel) pardonnera les mauvaises choses que vous faites. Si vous ne pardonnez pas aux gens, Dieu ne vous pardonnera pas non plus vos mauvaises choses.'
  - type: heading
    content: Jésus parle de son pouvoir
  '27':
  - type: text
    content: 'Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont encore arrivés à Jérusalem. Jésus marchait dans la cour du '
  - type: text
    content: Temple
  - type: text
    content: '. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ', les enseignants de la loi de Dieu et les  '
  - type: text
    content: anciens
  - type: text
    content: ' sont arrivés auprès de Jésus. '
  '28':
  - type: text
    content: 'Ils lui ont demandé : Qui t’a permis de faire ces choses ? Ils lui ont encore demandé : Qui t’a donné le pouvoir de faire ces choses ? '
  '29':
  - type: text
    content: 'Jésus a répondu : Je vais vous poser une question. Dites‑moi la réponse. Si vous faites cela, je vais vous répondre. Et je vais vous dire par quel pouvoir je fais ces choses. '
  '3':
  - type: text
    content: 'Une personne peut vous demander : Pourquoi faites‑vous cela ? Dites‑lui : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a besoin du jeune '
  - type: text
    content: âne
  - type: text
    content: . Il le fera venir ici bientôt.
  '30':
  - type: text
    content: 'Jean baptisait des gens. Son pouvoir venait de Dieu ou des hommes ? Dites‑moi la réponse. '
  '31':
  - type: text
    content: 'Alors ils ont discuté entre eux. Ils se sont dit ceci : Nous pouvons dire que c’est Dieu qui a donné à Jean son pouvoir. Mais si nous disons cela, Jésus nous dira : Vous devriez croire en lui. '
  '32':
  - type: text
    content: 'Nous ne voulons pas dire que ce sont les hommes qui ont donné à Jean son pouvoir. Ils ne voulaient pas dire cela, parce qu’ils avaient peur de la foule. Tous les gens croyaient que Jean était vraiment un serviteur spécial de Dieu. '
  '33':
  - type: text
    content: 'Donc les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' ont répondu à Jésus et ils ont dit : Nous ne savons pas qui a donné à Jean son pouvoir. Et Jésus leur a dit : Vous ne me répondez pas. Donc je ne vais pas non plus vous dire par quel pouvoir je fais ces choses.'
  '4':
  - type: text
    content: 'Alors les 2 '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés. Ils ont trouvé le jeune '
  - type: text
    content: âne
  - type: text
    content: '. Quelqu’un l’avait attaché à l’extérieur. C’était près d’une porte. Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' ont détaché la corde. '
  '5':
  - type: text
    content: 'Certaines personnes étaient là. Elles ont demandé aux 2 '
  - type: text
    content: disciples
  - type: text
    content: '  : Que faites‑vous ? Pourquoi détachez‑vous la corde de l’ânon ? '
  '6':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' leur ont répondu. Ils ont répété ce que Jésus leur avait demandé de dire. Les gens les ont alors laissés aller avec l’ânon. '
  '7':
  - type: text
    content: 'Les 2 '
  - type: text
    content: disciples
  - type: text
    content: ' ont amené le petit '
  - type: text
    content: âne
  - type: text
    content: ' à Jésus. Ils ont mis leurs '
  - type: text
    content: manteaux
  - type: text
    content: ' sur le dos de l’animal. Alors Jésus était assis dessus. '
  '8':
  - type: text
    content: 'Beaucoup de gens mettaient leurs '
  - type: text
    content: manteaux
  - type: text
    content: ' sur la route. D’autres gens mettaient des branches sur la route. Ils coupaient les branches des arbres. '
  '9':
  - type: text
    content: 'Beaucoup de gens allaient devant Jésus, et d’autres personnes le suivaient. Chacun d’entre eux criait : Nous te prions de nous sauver ! Le roi qui vient au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand ! '
