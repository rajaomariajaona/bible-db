document_id: JHN.18,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 18
  - type: heading
    content: Les soldats amènent Jésus au grand prêtre
  - type: text
    content: 'Quand Jésus a fini de prier, lui et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont sortis. Ils sont allés de l’autre coté de la vallée du Cédron. D’un autre côté, il y avait un jardin. Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés là. '
  '10':
  - type: text
    content: 'Simon Pierre avait un long couteau. Il a soulevé le couteau et il a attaqué le serviteur du '
  - type: text
    content: prêtre
  - type: text
    content: ' en chef. Il a coupé l’oreille droite du serviteur. Le nom de l’esclave était Malchus. '
  '11':
  - type: text
    content: 'Alors Jésus a dit à Pierre : Mets ton couteau dans la chose qui le recouvre ! Qu’ils me prennent. Mon Père m’a dit ce qui doit arriver pour moi. Et je vais lui obéir complètement.'
  '12':
  - type: text
    content: 'Le groupe de soldats, avec leur commandant et les huissiers des '
  - type: text
    content: Juifs
  - type: text
    content: ' ont pris Jésus. Ils l’ont lié. '
  '13':
  - type: text
    content: 'Ils l’ont conduit d’abord chez Anne, qui était le père de la femme de Caïphe. Caïphe était le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' cette année. '
  '14':
  - type: text
    content: 'C’était Caïphe qui avait conseillé les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' quelque temps auparavant. Il leur avait dit : Il vaut mieux qu’un seul homme meure au nom de tout le peuple.'
  - type: heading
    content: Pierre dit qu’il ne connaît pas Jésus
  '15':
  - type: text
    content: 'Simon Pierre et un autre '
  - type: text
    content: disciple
  - type: text
    content: ' suivaient Jésus. Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' connaissait l’autre '
  - type: text
    content: disciple
  - type: text
    content: '. Donc, il est entré avec Jésus dans la cour du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Mais Pierre est resté à l’extérieur à la porte. Alors l’autre '
  - type: text
    content: disciple
  - type: text
    content: ', que le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' connaissait, est sorti de nouveau. Il a parlé à la jeune fille qui était à la porte. Puis il a fait entrer Pierre. '
  '17':
  - type: text
    content: 'La jeune fille qui était à la porte a parlé à Pierre. Elle lui a demandé : Es‑tu l’un des disciples de cet homme ? Pierre a répondu : Non, je ne le suis pas ! '
  '18':
  - type: text
    content: 'Il faisait froid. Ainsi, les fonctionnaires et les '
  - type: text
    content: officiers
  - type: text
    content: ' se tenaient autour d’un feu qu’ils avaient fait. Ils se chauffaient. Pierre est allé se tenir avec eux, afin qu’il puisse se chauffer aussi.'
  - type: heading
    content: Le grand prêtre pose quelques questions à Jésus
  '19':
  - type: text
    content: 'Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' a interrogé Jésus sur ses '
  - type: text
    content: disciples
  - type: text
    content: '. Il a également demandé à Jésus sur ce qu’il enseignait. '
  '2':
  - type: text
    content: 'Judas qui a livré Jésus aux ennemis, connaissait le jardin. Il le savait parce que Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' se rencontraient là souvent. '
  '20':
  - type: text
    content: 'Jésus lui a répondu : Je vous parlais dans les lieux publics, afin que chacun puisse entendre. J’enseignais toujours dans les '
  - type: text
    content: synagogues
  - type: text
    content: ', ou dans le '
  - type: text
    content: Temple
  - type: text
    content: ', où tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' se réunissent ensemble. Je ne disais rien en secret. '
  '21':
  - type: text
    content: 'Donc, vous ne devez pas me poser ces questions. Demandez aux gens qui m’entendaient. Demandez‑leur ce que je leur disais. Ils savent ce que je dis. '
  '22':
  - type: text
    content: 'Quand Jésus a dit cela, l’un des soldats l’a frappé au visage. Le soldat a dit : C’est comme cela que tu réponds au grand prêtre sans respect ? '
  '23':
  - type: text
    content: 'Jésus a répondu : Si je dis quelque chose de mal, dis‑moi ça clairement. Mais si je dis quelque chose de vrai, tu ne devrais pas me frapper. '
  '24':
  - type: text
    content: 'Alors Anne a envoyé Jésus à Caïphe. Jésus était lié. Caïphe était le '
  - type: text
    content: grand prêtre
  - type: text
    content: .
  - type: heading
    content: Pierre dit encore qu’il ne connaît pas Jésus
  '25':
  - type: text
    content: 'Simon Pierre était toujours là, debout autour du feu. Il se chauffait. Les autres personnes là‑bas lui ont dit : Nous pensons que tu es l’un des '
  - type: text
    content: disciples
  - type: text
    content: ' de cet homme. Mais Pierre a dit : Non, je ne le suis pas. '
  '26':
  - type: text
    content: 'Un serviteur du '
  - type: text
    content: grand prêtre
  - type: text
    content: ' appartenait à la même famille que l’homme, dont Pierre avait coupé l’oreille. Ce serviteur a dit à Pierre : Je suis sûr que je t’ai vu dans le jardin avec lui. '
  '27':
  - type: text
    content: 'Encore une fois, Pierre a dit : Non, et aussitôt le coq a chanté tôt le matin.'
  - type: heading
    content: Pilate, le gouverneur romain, pose quelques questions à Jésus
  '28':
  - type: text
    content: 'Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont conduit Jésus de chez Caïphe à la grande maison de Pilate. C’était tôt le matin. Les dirigeants '
  - type: text
    content: Juifs
  - type: text
    content: ' eux‑mêmes ne sont pas entrés dans la maison de Pilate, parce qu’ils voulaient être purs. Ils voulaient manger le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Alors Pilate est sorti dehors pour les rencontrer. Il leur a demandé : Quel mal cet homme a fait ? '
  '3':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' avaient envoyé un groupe de soldats et quelques '
  - type: text
    content: officiers
  - type: text
    content: ' à Judas. Judas a conduit ces soldats et '
  - type: text
    content: officiers
  - type: text
    content: ' au jardin. Les soldats avaient de longs couteaux. Ils portaient aussi des choses avec lumière et des armes.'
  '30':
  - type: text
    content: 'Ils ont répondu : Nous n’allions pas te l’amener s’il n’avait rien fait de mal. '
  '31':
  - type: text
    content: 'Alors Pilate leur a dit : Prenez‑le vous‑mêmes. Jugez‑le par vos propres règles. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont répondu : Nous n’avons pas le pouvoir de tuer quelqu’un. '
  '32':
  - type: text
    content: Ce qui est arrivé a confirmé la parole que Jésus avait dite avant. Jésus leur avait dit comment il mourra. Donc, ce qu’il avait dit devait arriver.
  '33':
  - type: text
    content: 'Pilate est rentré au palais de Pilate. Il a appelé Jésus d’aller auprès de lui. Pilate a demandé à Jésus : Es‑tu le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ? '
  '34':
  - type: text
    content: 'Jésus a dit : Est‑ce ta propre idée, ou d’autres personnes t’ont parlé de moi ? '
  '35':
  - type: text
    content: 'Pilate a répondu : Est‑ce que je suis un '
  - type: text
    content: Juif
  - type: text
    content: '  ! Ton propre peuple et les '
  - type: text
    content: prêtres
  - type: text
    content: ' t’ont emmené à moi. Qu’as‑tu fait ? '
  '36':
  - type: text
    content: 'Jésus a dit : Mon royaume ne fait pas partie de ce monde. Sinon, mes gens allaient combattre. Ils allaient combattre pour que les '
  - type: text
    content: Juifs
  - type: text
    content: ' ne puissent pas m’attraper. Non, mon royaume est d’un autre endroit. '
  '37':
  - type: text
    content: 'Pilate lui a dit : Alors veux‑tu dire que tu es vraiment un roi ? Jésus a répondu : C’est toi qui utilises le nom roi. Je suis né et je suis venu dans le monde pour un seul but. Je suis venu pour dire aux gens la vérité. Tout le monde qui aime toutes les choses vraies entend ma voix. '
  '38':
  - type: text
    content: 'Pilate a dit : Je ne sais pas ce que signifie la vérité. Alors Pilate est sorti de nouveau vers les '
  - type: text
    content: Juifs
  - type: text
    content: '. Il leur a dit : Cet homme ne semble avoir rien fait de mal. Je n’ai aucune raison de le punir.'
  '39':
  - type: text
    content: 'Mais chaque année, nous faisons quelque chose pour vous, les '
  - type: text
    content: Juifs
  - type: text
    content: '. Nous laissons un homme en liberté de la prison au moment de votre '
  - type: text
    content: Pâque
  - type: text
    content: '. Voulez‑vous que je laisse le roi des '
  - type: text
    content: Juifs
  - type: text
    content: ' en liberté ? '
  '4':
  - type: text
    content: 'Jésus savait tout ce qui allait bientôt lui arriver. Alors, il est allé vers eux. Il leur a demandé : Qui cherchez‑vous ? '
  '40':
  - type: text
    content: 'Ils ont crié : Non, nous ne le voulons pas ! Nous voulons Barabbas ! (Barabbas était bandit).'
  '5':
  - type: text
    content: 'Ils ont répondu : Jésus, qui vient de Nazareth. Jésus a dit : C’est moi. Judas se tenait avec les soldats. C’est lui qui a livré Jésus aux ennemis.'
  '6':
  - type: text
    content: 'Lorsque Jésus leur a dit : C’est moi, les soldats se sont écartés de lui. Ils sont tombés à terre. '
  '7':
  - type: text
    content: 'Alors Jésus leur a demandé de nouveau : Qui cherchez‑vous ? Et ils ont dit : Jésus, qui vient de Nazareth. '
  '8':
  - type: text
    content: 'Jésus a dit : Je vous ai déjà dit que je suis cette personne. Donc, si vous me cherchez, laissez ces autres hommes aller. '
  '9':
  - type: text
    content: 'Jésus a dit cela pour une raison. Plus tôt, il avait dit : Je n’ai perdu aucun de ces hommes que tu m’as donnés. Et ce qu’il avait parlé plus tôt devait arriver.'
