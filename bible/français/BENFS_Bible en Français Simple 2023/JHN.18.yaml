document_id: JHN.18,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 18
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les soldats amènent Jésus au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Jésus a fini de prier, lui et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont sortis. Ils sont allés de l’autre coté de la vallée du Cédron. D’un autre côté, il y avait un jardin. Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont allés là. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Pierre avait un long couteau. Il a soulevé le couteau et il a attaqué le serviteur du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: ' en chef. Il a coupé l’oreille droite du serviteur. Le nom de l’esclave était Malchus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a dit à Pierre : Mets ton couteau dans la chose qui le recouvre ! Qu’ils me prennent. Mon Père m’a dit ce qui doit arriver pour moi. Et je vais lui obéir complètement.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le groupe de soldats, avec leur commandant et les huissiers des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont pris Jésus. Ils l’ont lié. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils l’ont conduit d’abord chez Anne, qui était le père de la femme de Caïphe. Caïphe était le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' cette année. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était Caïphe qui avait conseillé les dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' quelque temps auparavant. Il leur avait dit : Il vaut mieux qu’un seul homme meure au nom de tout le peuple.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre dit qu’il ne connaît pas Jésus
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Pierre et un autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' suivaient Jésus. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' connaissait l’autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: '. Donc, il est entré avec Jésus dans la cour du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Pierre est resté à l’extérieur à la porte. Alors l’autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ', que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' connaissait, est sorti de nouveau. Il a parlé à la jeune fille qui était à la porte. Puis il a fait entrer Pierre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La jeune fille qui était à la porte a parlé à Pierre. Elle lui a demandé : Es‑tu l’un des disciples de cet homme ? Pierre a répondu : Non, je ne le suis pas ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il faisait froid. Ainsi, les fonctionnaires et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officiers
    - type: text
      text: ' se tenaient autour d’un feu qu’ils avaient fait. Ils se chauffaient. Pierre est allé se tenir avec eux, afin qu’il puisse se chauffer aussi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' pose quelques questions à Jésus'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' a interrogé Jésus sur ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Il a également demandé à Jésus sur ce qu’il enseignait. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judas qui a livré Jésus aux ennemis, connaissait le jardin. Il le savait parce que Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' se rencontraient là souvent. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui a répondu : Je vous parlais dans les lieux publics, afin que chacun puisse entendre. J’enseignais toujours dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ', ou dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ', où tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' se réunissent ensemble. Je ne disais rien en secret. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donc, vous ne devez pas me poser ces questions. Demandez aux gens qui m’entendaient. Demandez‑leur ce que je leur disais. Ils savent ce que je dis. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Jésus a dit cela, l’un des soldats l’a frappé au visage. Le soldat a dit : C’est comme cela que tu réponds au grand prêtre sans respect ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Si je dis quelque chose de mal, dis‑moi ça clairement. Mais si je dis quelque chose de vrai, tu ne devrais pas me frapper. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Anne a envoyé Jésus à Caïphe. Jésus était lié. Caïphe était le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre dit encore qu’il ne connaît pas Jésus
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Pierre était toujours là, debout autour du feu. Il se chauffait. Les autres personnes là‑bas lui ont dit : Nous pensons que tu es l’un des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de cet homme. Mais Pierre a dit : Non, je ne le suis pas. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un serviteur du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' appartenait à la même famille que l’homme, dont Pierre avait coupé l’oreille. Ce serviteur a dit à Pierre : Je suis sûr que je t’ai vu dans le jardin avec lui. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encore une fois, Pierre a dit : Non, et aussitôt le coq a chanté tôt le matin.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Pilate, le gouverneur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: ', pose quelques questions à Jésus'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont conduit Jésus de chez Caïphe à la grande maison de Pilate. C’était tôt le matin. Les dirigeants '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' eux‑mêmes ne sont pas entrés dans la maison de Pilate, parce qu’ils voulaient être purs. Ils voulaient manger le repas de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pilate est sorti dehors pour les rencontrer. Il leur a demandé : Quel mal cet homme a fait ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' avaient envoyé un groupe de soldats et quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officiers
    - type: text
      text: ' à Judas. Judas a conduit ces soldats et '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officiers
    - type: text
      text: ' au jardin. Les soldats avaient de longs couteaux. Ils portaient aussi des choses avec lumière et des armes.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont répondu : Nous n’allions pas te l’amener s’il n’avait rien fait de mal. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pilate leur a dit : Prenez‑le vous‑mêmes. Jugez‑le par vos propres règles. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont répondu : Nous n’avons pas le pouvoir de tuer quelqu’un. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce qui est arrivé a confirmé la parole que Jésus avait dite avant. Jésus leur avait dit comment il mourra. Donc, ce qu’il avait dit devait arriver.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate est rentré au palais de Pilate. Il a appelé Jésus d’aller auprès de lui. Pilate a demandé à Jésus : Es‑tu le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  ? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Est‑ce ta propre idée, ou d’autres personnes t’ont parlé de moi ? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate a répondu : Est‑ce que je suis un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: '  ! Ton propre peuple et les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' t’ont emmené à moi. Qu’as‑tu fait ? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Mon royaume ne fait pas partie de ce monde. Sinon, mes gens allaient combattre. Ils allaient combattre pour que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ne puissent pas m’attraper. Non, mon royaume est d’un autre endroit. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate lui a dit : Alors veux‑tu dire que tu es vraiment un roi ? Jésus a répondu : C’est toi qui utilises le nom roi. Je suis né et je suis venu dans le monde pour un seul but. Je suis venu pour dire aux gens la vérité. Tout le monde qui aime toutes les choses vraies entend ma voix. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate a dit : Je ne sais pas ce que signifie la vérité. Alors Pilate est sorti de nouveau vers les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il leur a dit : Cet homme ne semble avoir rien fait de mal. Je n’ai aucune raison de le punir.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais chaque année, nous faisons quelque chose pour vous, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Nous laissons un homme en liberté de la prison au moment de votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: '. Voulez‑vous que je laisse le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' en liberté ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus savait tout ce qui allait bientôt lui arriver. Alors, il est allé vers eux. Il leur a demandé : Qui cherchez‑vous ? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont crié : Non, nous ne le voulons pas ! Nous voulons Barabbas ! (Barabbas était bandit).'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont répondu : Jésus, qui vient de Nazareth. Jésus a dit : C’est moi. Judas se tenait avec les soldats. C’est lui qui a livré Jésus aux ennemis.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus leur a dit : C’est moi, les soldats se sont écartés de lui. Ils sont tombés à terre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus leur a demandé de nouveau : Qui cherchez‑vous ? Et ils ont dit : Jésus, qui vient de Nazareth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Je vous ai déjà dit que je suis cette personne. Donc, si vous me cherchez, laissez ces autres hommes aller. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit cela pour une raison. Plus tôt, il avait dit : Je n’ai perdu aucun de ces hommes que tu m’as donnés. Et ce qu’il avait parlé plus tôt devait arriver.'
