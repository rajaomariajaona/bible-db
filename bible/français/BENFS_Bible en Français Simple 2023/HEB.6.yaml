document_id: HEB.6
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nous devons donc continuer à partir des premières leçons que nous avons apprises sur Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Nous devons grandir en croyant pour que nous comprenions de plus en plus. Nous ne devons pas revenir encore et encore à ces premières leçons. Nous savons déjà que nous devons laisser les mauvaises choses qui mènent à la mort. Nous savons que nous devons faire confiance en Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nous avons déjà appris comment devenir purifié. Nous savons que les dirigeants mettent les mains sur d’autres chrétiens. Ils font ceci pour demander l’aide de Dieu. Nous savons que Dieu réveillera les morts pour revivre. Et nous savons que Dieu jugera chaque personne un jour, à la fin des temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, nous devons choisir d’aller au‑delà de ces premières leçons ! Dieu est prêt à nous aider à le faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous ne devons pas laisser Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nous avons déjà cru en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Alors, nous ne devons pas laisser Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Certaines personnes sont entrées dans la lumière de Dieu. Ces gens ont compris le message de Dieu. Ils ont commencé à profiter de la vraie vie que Dieu leur a donnée. Ils ont reçu le Saint-
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ', comme les autres croyants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils ont compris que le message de Dieu est bon pour eux. Ils ont vu des choses puissantes qui appartiennent à l’avenir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais après tout cela, ils sont devenus contre Dieu. Il est alors impossible pour quiconque de les aider à laisser encore leurs péchés. C’est comme s’ils tuaient à nouveau le Fils de Dieu sur la croix. Ils montrent aux autres qu’ils ne pensent pas que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est important.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pensez à un champ où la pluie est tombée plusieurs fois. Ce sol aide les plantes à bien pousser. En conséquence, l’agriculteur reçoit de bonnes choses. Cela montre que Dieu a béni ce sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais un champ où ne poussent que de mauvaises herbes et des buissons d’épines ne vaut rien. Dieu va très bientôt parler contre ce sol. À la fin, le feu brûlera tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous vous disons cela, nos bons amis, parce que nous voulons que vous continuiez bien. Nous sommes sûrs que Dieu vous a sauvés et qu’il continuera à vous bénir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu est toujours bon et juste. Il n’oubliera pas toutes les bonnes choses que vous avez faites. Vous avez montré que vous l’aimez beaucoup, car vous avez aidé d’autres croyants. Et vous continuez à les aider en tant que serviteurs de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais nous voulons vraiment que chacun de vous continue à faire confiance en Dieu jusqu’à la fin. Montrez que vous voulez vraiment le servir. Soyez sûrs qu’à la fin, vous recevrez toutes les bonnes choses que vous espérez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors vous ne tarderez pas à apprendre. Mais, vous copierez l’exemple de ces gens qui continuent de faire confiance en Dieu. Ils continuent d’être patients lorsque des problèmes leur arrivent. Des gens comme ça reçoivent ce que Dieu a promis à son peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La promesse de Dieu à Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dieu a fait une promesse à Abraham, il y a de nombreuses années. Dieu a utilisé le pouvoir de son propre nom pour montrer que sa promesse était vraie. Il l’a fait parce qu’il n’y avait personne de plus grand que Dieu lui‑même. Son nom montrait que la promesse était très sérieuse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dieu a dit à Abraham : Je te bénirai certainement. Je vais te donner beaucoup d’enfants et beaucoup de petits‑enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Abraham attendait patiemment longtemps. À la fin, il a reçu ce que Dieu avait promis de lui donner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque quelqu’un fait une grande promesse, il utilise le pouvoir d’une personne plus grande que lui‑même. Cela montre qu’il respectera certainement sa promesse. Alors personne ne peut discuter de cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dieu voulait montrer très clairement qu’il ne changera jamais son but. Il voulait que son peuple sache qu’il allait certainement le bénir. Alors, quand il a fait cette promesse, il a également utilisé son propre nom pour la rendre grande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ces 2 choses ne peuvent jamais changer. Dieu ne peut pas mentir. En conséquence, nous pouvons être courageux et forts. Nous avons fait confiance en Dieu pour nous garder en sécurité avec lui. Nous devons également nous attendre à recevoir les bonnes choses qu’il a promises de nous donner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nous pouvons être totalement sûrs de ces bonnes choses que nous espérons recevoir. Cela maintient nos pensées fortes, car nous savons que notre vie est en sécurité avec Dieu. C’est comme une '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ancre
  - type: text
    text: ' qui protège un bateau. Lorsque nous espérons ainsi, nous savons que nous arriverons un jour à la place spéciale de Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. C’est comme l’endroit spécial derrière le rideau dans le tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus est déjà entré là‑dedans. Il y est allé avant nous, pour nous. Il est devenu pour toujours notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' spécial, de la même manière que Melchisédek était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' de Dieu.'
