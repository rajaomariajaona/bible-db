document_id: MRK.6
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 6
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus va dans sa propre ville
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus est parti. Il est venu dans sa ville d’origine. Ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' le suivaient. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le jour de repos des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' est arrivé. Alors Jésus est allé au lieu de rencontre des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Il a commencé à enseigner de nombreuses personnes qui étaient là. Les gens étaient très surpris par les choses que Jésus leur disait. Les gens se disaient les uns aux autres : Nous ne savons pas comment cet homme a appris tellement de choses. Nous ne savons pas comment il sait tellement des choses. Et nous ne savons pas comment il fait toutes ces choses puissantes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous savons qui est cet homme. Il est le charpentier. Il est le fils de Marie. Il est le frère de Jacques, Joseph, Simon et Jude. Ses sœurs vivent ici dans la ville parmi nous. C’était le problème qu’ils avaient avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus leur a dit : Partout, les gens peuvent bien parler d’un homme de Dieu. Mais les gens de la même ville que l’homme de Dieu ne le feront pas. Son propre peuple et sa propre famille ne parleront pas bien de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus ne pouvait rien faire de puissant dans cette ville. Mais il a posé les mains sur quelques malades seulement, et il les a guéris. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jésus était très surpris, parce que les gens dans cette ville ne voulaient pas croire en lui. Puis il a voyagé à travers les villages qui étaient autour de là dans un cercle. Il enseignait les gens dans ces villages.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus envoie les 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' pour dire le message de Dieu aux gens'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus a demandé à ses 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de venir à lui. Il a commencé à les envoyer 2 à 2 pour dire le message de Dieu aux gens. Et il leur a donné le pouvoir sur les mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus a dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de ne rien prendre pour le voyage, sauf un bâton. Ils ne doivent pas prendre de pain, de sac ou de l’argent dans leurs ceintures. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils doivent porter des souliers (sandales). Mais ils ne doivent pas prendre de vêtements de rechange. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus leur a dit : Quand vous entrez dans une maison, restez là. Restez là jusqu’à ce que vous quittiez cet endroit. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Peut‑être que vous pourriez aller à un endroit où les gens ne vont pas vous recevoir. Ils ne vont pas vous écouter. Donc, quittez cet endroit. Secouez la poussière de vos pieds. Donc, il est clair qu’ils ont fait quelque chose de mal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont sortis. Ils disaient aux gens de changer leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils faisaient sortir de nombreux mauvais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' des gens. Ils mettaient également de l’huile sur beaucoup de malades, et les malades devenaient bien.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hérode fait tuer Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hérode a entendu parler de ceci : Le nom de Jésus était maintenant bien connu. Certaines personnes disaient : Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' est redevenu vivant. C’est par lui que Jésus fait ces grandes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'D’autres gens disaient : Il est Élie. D’autres encore disaient : Il est Élie. Il est un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' comme l’un des  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais Hérode, lui a dit : C’est Jean. J’ai envoyé un soldat pour lui couper la tête. Mais Jean est devenu de nouveau vivant ! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hérode avait donné l’ordre à un soldat d’arrêter Jean. Il lui avait dit : Lie Jean et mets‑le dans une prison. Hérode a fait cela parce qu’il avait épousé Hérodias. Elle était l’épouse de Philippe, frère d’Hérode. Mais Hérode l’avait épousée. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jean avait dit : La loi de Dieu ne te permet pas de prendre la femme de ton frère. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hérodias était toujours fâchée contre Jean. Alors, elle voulait le tuer. Mais elle ne pouvait pas faire cela. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C’était parce qu’Hérode avait peur de Jean. Hérode savait que Jean était un homme bon. Et Jean a fait ce qui est juste. Alors Hérode gardait Jean en sécurité. Hérode a entendu Jean. Il était très confus. Mais Hérode aimait écouter ce que Jean disait. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis un jour, Hérodias a eu une occasion. C’était l’anniversaire d’Hérode. Il a organisé une grande fête. Il a alors demandé à beaucoup de gens de venir. Les hommes et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' sont venus. Et les dirigeants de Galilée étaient là aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La fille d’Hérodias est entrée et elle dansait. Hérode et ses visiteurs étaient très heureux quand ils ont vu sa danse. Le roi a dit à la jeune femme : Demande‑moi tout ce que tu veux, je te le donnerai. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et il a promis : Ce que je dis, est tout à fait vrai. Je vais te donner tout ce que tu me demanderas. Je peux même te donner la moitié des choses sur lesquelles je règne. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La jeune femme est sortie et elle a dit à sa mère : Que dois‑je lui demander ? Sa mère a répondu : Demande la tête de Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La jeune femme est revenue rapidement et elle a parlé immédiatement à Hérode : Je veux la tête de Jean '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' sur une assiette maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Hérode s’est senti très triste. Mais il ne voulait pas la décevoir à cause de sa promesse. Tous ses visiteurs ont entendu cela. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors, immédiatement, le roi a envoyé un soldat. Le roi a dit au soldat d’apporter la tête de Jean. Alors, le soldat est allé à la prison et il a coupé la tête de Jean là‑bas. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis il l’a amenée sur une assiette. Il l’a donnée à la jeune femme. Et la jeune femme l’a donnée à sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les gens ont dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jean à ce sujet. Donc, ils sont allés à la prison et ils ont emmené le corps de Jean. Et puis ils l’ont enterré.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus donne la nourriture à 5 000 hommes et à leurs familles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtres
  - type: text
    text: ' se sont rassemblés autour de Jésus. Ils lui ont parlé de tout ce qu’ils avaient fait. Et ils lui ont dit ce qu’ils avaient enseigné. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors Jésus leur a dit : Venez avec moi à un endroit calme. Beaucoup de gens allaient et venaient. Jésus et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' manquaient même de temps pour manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ainsi ils sont allés dans un petit bateau. C’était pour se rendre à un endroit calme. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais beaucoup de gens ont vu qu’ils quittaient la ville. Ces gens les ont reconnus. Donc, ils couraient de toutes les villes. Et ils ont atteint la place avant que Jésus et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' arrivent. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus est sorti du petit bateau. Il a vu une grande foule de gens. Jésus a eu pitié d’eux. Il pensait : Ces gens sont comme des brebis qui n’ont personne pour les conduire. Alors, il s’est mis à leur enseigner beaucoup de choses. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Quand il était presque le soir, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus sont venus pour lui parler. Ils ont dit : Nous sommes ici dans un lieu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. Bientôt, il sera sombre. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les gens n’ont rien à manger. Alors, demande aux gens de partir maintenant. Ils peuvent aller dans les campagnes et des villages autour d’ici. C’est pour qu’ils achètent quelque chose à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus a répondu : Donnez‑leur de la nourriture. Donnez‑leur quelque chose à manger vous‑mêmes. Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont dit : Nous ne pouvons pas aller acheter du pain pour ce peuple. Un homme doit travailler pendant 8 mois pour obtenir les 200 pièces d’argent dont nous aurions besoin. Nous ne pouvons pas donner de la nourriture à ces personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus leur a demandé : Combien de pains avez‑vous ? Allez voir. Quand ils ont regardé, ils ont encore parlé à Jésus. Ils ont dit : Nous avons 5 pains et 2 poissons. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus a demandé à tous les gens de s’asseoir sur l’herbe verte. Il voulait qu’ils soient assis par groupes. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ainsi, les gens se sont assis en groupes. Chaque groupe avait 50 ou 100 personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Alors Jésus a pris les 5 pains et 2 poissons. Il a levé les yeux vers la maison de Dieu. Il a remercié Dieu. Puis il a coupé les pains. Il les a donnés aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' les ont distribués au peuple. Jésus a aussi partagé les 2 poissons entre tous les gens. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tout le monde a mangé et ils ont tous eu assez de nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus ont ramassé toute la nourriture qui était restée. Et ils ont rempli 12 paniers avec les morceaux de pain et des poissons. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Le nombre des hommes qui avaient mangé, était 5 000 hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur l’eau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Immédiatement, Jésus a dit à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' d’entrer dans le petit bateau et d’aller à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: '. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: ' était de l’autre côté de la mer. Jésus est allé là après un certain temps. Mais d’abord, il a demandé aux gens de partir. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Et il a dit au revoir à la foule. Puis il est monté sur la montagne pour prier. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ce soir‑là, le petit bateau était au milieu de la mer. Jésus était seul à terre. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Mais il pouvait voir ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: . Ils essayaient d’aller loin avec le petit bateau.
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais c’était très difficile pour eux, parce que le vent soufflait contre eux. Puis, quand c’était très tôt le matin, Jésus est allé auprès d’eux. Il marchait sur la mer. Il voulait les dépasser.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Mais ils ont vu que Jésus marchait sur les eaux. Ils pensaient : Jésus est un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Et ils criaient. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ils le voyaient tous et ils avaient peur. Mais immédiatement, Jésus leur a dit : Soyez courageux. C’est moi, Jésus. N’ayez pas peur. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Alors Jésus est monté dans le petit bateau avec eux. Le vent fort s’est arrêté. Ils étaient complètement surpris de ce qui était arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ils ne comprenaient pas ce qui était arrivé aux pains. Et ils n’étaient pas encore en mesure de comprendre de telles choses.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus aide beaucoup de malades à être bien
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ils ont traversé la mer. Ils ont atteint le bord de la mer à Génésareth. Ils ont alors arrêté le petit bateau là. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Quand ils sont sortis du petit bateau, les gens ont reconnu immédiatement Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ils parlaient de Jésus à tous ceux qui vivaient partout près de là. Les gens de ces lieux amenaient des personnes malades sur de petits lits. Ils amenaient ces gens là où Jésus était. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Jésus allait dans les villages, les villes et les campagnes. Partout où Jésus allait, les gens amenaient les malades à leurs places publiques. Les malades demandaient à Jésus de l’aide. Ils voulaient toucher même le bord de son vêtement. Et chaque personne malade qui le touchait, devenait bien.
