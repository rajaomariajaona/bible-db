document_id: MRK.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: Jésus va dans sa propre ville
  - type: text
    content: 'Jésus est parti. Il est venu dans sa ville d’origine. Ses '
  - type: text
    content: disciples
  - type: text
    content: ' le suivaient. '
  '10':
  - type: text
    content: 'Jésus leur a dit : Quand vous entrez dans une maison, restez là. Restez là jusqu’à ce que vous quittiez cet endroit. '
  '11':
  - type: text
    content: 'Peut‑être que vous pourriez aller à un endroit où les gens ne vont pas vous recevoir. Ils ne vont pas vous écouter. Donc, quittez cet endroit. Secouez la poussière de vos pieds. Donc, il est clair qu’ils ont fait quelque chose de mal. '
  '12':
  - type: text
    content: 'Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' sont sortis. Ils disaient aux gens de changer leurs '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Ils faisaient sortir de nombreux mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens. Ils mettaient également de l’huile sur beaucoup de malades, et les malades devenaient bien.'
  - type: heading
    content: Hérode fait tuer Jean‑Baptiste
  '14':
  - type: text
    content: 'Hérode a entendu parler de ceci : Le nom de Jésus était maintenant bien connu. Certaines personnes disaient : Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' est redevenu vivant. C’est par lui que Jésus fait ces grandes choses. '
  '15':
  - type: text
    content: 'D’autres gens disaient : Il est Élie. D’autres encore disaient : Il est Élie. Il est un '
  - type: text
    content: prophètes
  - type: text
    content: ' comme l’un des  '
  - type: text
    content: anciens
  - type: text
    content: ' '
  - type: text
    content: prophètes
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Mais Hérode, lui a dit : C’est Jean. J’ai envoyé un soldat pour lui couper la tête. Mais Jean est devenu de nouveau vivant ! '
  '17':
  - type: text
    content: 'Hérode avait donné l’ordre à un soldat d’arrêter Jean. Il lui avait dit : Lie Jean et mets‑le dans une prison. Hérode a fait cela parce qu’il avait épousé Hérodias. Elle était l’épouse de Philippe, frère d’Hérode. Mais Hérode l’avait épousée. '
  '18':
  - type: text
    content: 'Jean avait dit : La loi de Dieu ne te permet pas de prendre la femme de ton frère. '
  '19':
  - type: text
    content: 'Hérodias était toujours fâchée contre Jean. Alors, elle voulait le tuer. Mais elle ne pouvait pas faire cela. '
  '2':
  - type: text
    content: 'Le jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: ' est arrivé. Alors Jésus est allé au lieu de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il a commencé à enseigner de nombreuses personnes qui étaient là. Les gens étaient très surpris par les choses que Jésus leur disait. Les gens se disaient les uns aux autres : Nous ne savons pas comment cet homme a appris tellement de choses. Nous ne savons pas comment il sait tellement des choses. Et nous ne savons pas comment il fait toutes ces choses puissantes. '
  '20':
  - type: text
    content: 'C’était parce qu’Hérode avait peur de Jean. Hérode savait que Jean était un homme bon. Et Jean a fait ce qui est juste. Alors Hérode gardait Jean en sécurité. Hérode a entendu Jean. Il était très confus. Mais Hérode aimait écouter ce que Jean disait. '
  '21':
  - type: text
    content: 'Puis un jour, Hérodias a eu une occasion. C’était l’anniversaire d’Hérode. Il a organisé une grande fête. Il a alors demandé à beaucoup de gens de venir. Les hommes et les '
  - type: text
    content: officiers
  - type: text
    content: ' sont venus. Et les dirigeants de Galilée étaient là aussi. '
  '22':
  - type: text
    content: 'La fille d’Hérodias est entrée et elle dansait. Hérode et ses visiteurs étaient très heureux quand ils ont vu sa danse. Le roi a dit à la jeune femme : Demande‑moi tout ce que tu veux, je te le donnerai. '
  '23':
  - type: text
    content: 'Et il a promis : Ce que je dis, est tout à fait vrai. Je vais te donner tout ce que tu me demanderas. Je peux même te donner la moitié des choses sur lesquelles je règne. '
  '24':
  - type: text
    content: 'La jeune femme est sortie et elle a dit à sa mère : Que dois‑je lui demander ? Sa mère a répondu : Demande la tête de Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'La jeune femme est revenue rapidement et elle a parlé immédiatement à Hérode : Je veux la tête de Jean '
  - type: text
    content: Baptiste
  - type: text
    content: ' sur une assiette maintenant. '
  '26':
  - type: text
    content: 'Alors Hérode s’est senti très triste. Mais il ne voulait pas la décevoir à cause de sa promesse. Tous ses visiteurs ont entendu cela. '
  '27':
  - type: text
    content: 'Alors, immédiatement, le roi a envoyé un soldat. Le roi a dit au soldat d’apporter la tête de Jean. Alors, le soldat est allé à la prison et il a coupé la tête de Jean là‑bas. '
  '28':
  - type: text
    content: 'Puis il l’a amenée sur une assiette. Il l’a donnée à la jeune femme. Et la jeune femme l’a donnée à sa mère. '
  '29':
  - type: text
    content: 'Les gens ont dit aux '
  - type: text
    content: disciples
  - type: text
    content: ' de Jean à ce sujet. Donc, ils sont allés à la prison et ils ont emmené le corps de Jean. Et puis ils l’ont enterré.'
  - type: heading
    content: Jésus donne la nourriture à 5 000 hommes et à leurs familles
  '3':
  - type: text
    content: 'Nous savons qui est cet homme. Il est le charpentier. Il est le fils de Marie. Il est le frère de Jacques, Joseph, Simon et Jude. Ses sœurs vivent ici dans la ville parmi nous. C’était le problème qu’ils avaient avec lui. '
  '30':
  - type: text
    content: 'Les '
  - type: text
    content: Apôtres
  - type: text
    content: ' se sont rassemblés autour de Jésus. Ils lui ont parlé de tout ce qu’ils avaient fait. Et ils lui ont dit ce qu’ils avaient enseigné. '
  '31':
  - type: text
    content: 'Alors Jésus leur a dit : Venez avec moi à un endroit calme. Beaucoup de gens allaient et venaient. Jésus et les '
  - type: text
    content: disciples
  - type: text
    content: ' manquaient même de temps pour manger.'
  '32':
  - type: text
    content: 'Ainsi ils sont allés dans un petit bateau. C’était pour se rendre à un endroit calme. '
  '33':
  - type: text
    content: 'Mais beaucoup de gens ont vu qu’ils quittaient la ville. Ces gens les ont reconnus. Donc, ils couraient de toutes les villes. Et ils ont atteint la place avant que Jésus et les '
  - type: text
    content: disciples
  - type: text
    content: ' arrivent. '
  '34':
  - type: text
    content: 'Jésus est sorti du petit bateau. Il a vu une grande foule de gens. Jésus a eu pitié d’eux. Il pensait : Ces gens sont comme des brebis qui n’ont personne pour les conduire. Alors, il s’est mis à leur enseigner beaucoup de choses. '
  '35':
  - type: text
    content: 'Quand il était presque le soir, les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont venus pour lui parler. Ils ont dit : Nous sommes ici dans un lieu '
  - type: text
    content: désert
  - type: text
    content: '. Bientôt, il sera sombre. '
  '36':
  - type: text
    content: 'Les gens n’ont rien à manger. Alors, demande aux gens de partir maintenant. Ils peuvent aller dans les campagnes et des villages autour d’ici. C’est pour qu’ils achètent quelque chose à manger. '
  '37':
  - type: text
    content: 'Jésus a répondu : Donnez‑leur de la nourriture. Donnez‑leur quelque chose à manger vous‑mêmes. Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' ont dit : Nous ne pouvons pas aller acheter du pain pour ce peuple. Un homme doit travailler pendant 8 mois pour obtenir les 200 pièces d’argent dont nous aurions besoin. Nous ne pouvons pas donner de la nourriture à ces personnes. '
  '38':
  - type: text
    content: 'Jésus leur a demandé : Combien de pains avez‑vous ? Allez voir. Quand ils ont regardé, ils ont encore parlé à Jésus. Ils ont dit : Nous avons 5 pains et 2 poissons. '
  '39':
  - type: text
    content: 'Jésus a demandé à tous les gens de s’asseoir sur l’herbe verte. Il voulait qu’ils soient assis par groupes. '
  '4':
  - type: text
    content: 'Jésus leur a dit : Partout, les gens peuvent bien parler d’un homme de Dieu. Mais les gens de la même ville que l’homme de Dieu ne le feront pas. Son propre peuple et sa propre famille ne parleront pas bien de lui. '
  '40':
  - type: text
    content: 'Ainsi, les gens se sont assis en groupes. Chaque groupe avait 50 ou 100 personnes. '
  '41':
  - type: text
    content: 'Alors Jésus a pris les 5 pains et 2 poissons. Il a levé les yeux vers la maison de Dieu. Il a remercié Dieu. Puis il a coupé les pains. Il les a donnés aux '
  - type: text
    content: disciples
  - type: text
    content: '. Et les '
  - type: text
    content: disciples
  - type: text
    content: ' les ont distribués au peuple. Jésus a aussi partagé les 2 poissons entre tous les gens. '
  '42':
  - type: text
    content: 'Tout le monde a mangé et ils ont tous eu assez de nourriture. '
  '43':
  - type: text
    content: 'Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont ramassé toute la nourriture qui était restée. Et ils ont rempli 12 paniers avec les morceaux de pain et des poissons. '
  '44':
  - type: text
    content: Le nombre des hommes qui avaient mangé, était 5 000 hommes.
  - type: heading
    content: Jésus marche sur l’eau
  '45':
  - type: text
    content: 'Immédiatement, Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: ' d’entrer dans le petit bateau et d’aller à '
  - type: text
    content: Bethsaïda
  - type: text
    content: '. '
  - type: text
    content: Bethsaïda
  - type: text
    content: ' était de l’autre côté de la mer. Jésus est allé là après un certain temps. Mais d’abord, il a demandé aux gens de partir. '
  '46':
  - type: text
    content: 'Et il a dit au revoir à la foule. Puis il est monté sur la montagne pour prier. '
  '47':
  - type: text
    content: 'Ce soir‑là, le petit bateau était au milieu de la mer. Jésus était seul à terre. '
  '48':
  - type: text
    content: 'Mais il pouvait voir ses '
  - type: text
    content: disciples
  - type: text
    content: . Ils essayaient d’aller loin avec le petit bateau.
  - type: text
    content: Mais c’était très difficile pour eux, parce que le vent soufflait contre eux. Puis, quand c’était très tôt le matin, Jésus est allé auprès d’eux. Il marchait sur la mer. Il voulait les dépasser.
  '49':
  - type: text
    content: 'Mais ils ont vu que Jésus marchait sur les eaux. Ils pensaient : Jésus est un '
  - type: text
    content: esprit
  - type: text
    content: '. Et ils criaient. '
  '5':
  - type: text
    content: 'Jésus ne pouvait rien faire de puissant dans cette ville. Mais il a posé les mains sur quelques malades seulement, et il les a guéris. '
  '50':
  - type: text
    content: 'Ils le voyaient tous et ils avaient peur. Mais immédiatement, Jésus leur a dit : Soyez courageux. C’est moi, Jésus. N’ayez pas peur. '
  '51':
  - type: text
    content: 'Alors Jésus est monté dans le petit bateau avec eux. Le vent fort s’est arrêté. Ils étaient complètement surpris de ce qui était arrivé. '
  '52':
  - type: text
    content: Ils ne comprenaient pas ce qui était arrivé aux pains. Et ils n’étaient pas encore en mesure de comprendre de telles choses.
  - type: heading
    content: Jésus aide beaucoup de malades à être bien
  '53':
  - type: text
    content: 'Ils ont traversé la mer. Ils ont atteint le bord de la mer à Génésareth. Ils ont alors arrêté le petit bateau là. '
  '54':
  - type: text
    content: 'Quand ils sont sortis du petit bateau, les gens ont reconnu immédiatement Jésus. '
  '55':
  - type: text
    content: 'Ils parlaient de Jésus à tous ceux qui vivaient partout près de là. Les gens de ces lieux amenaient des personnes malades sur de petits lits. Ils amenaient ces gens là où Jésus était. '
  '56':
  - type: text
    content: Jésus allait dans les villages, les villes et les campagnes. Partout où Jésus allait, les gens amenaient les malades à leurs places publiques. Les malades demandaient à Jésus de l’aide. Ils voulaient toucher même le bord de son vêtement. Et chaque personne malade qui le touchait, devenait bien.
  '6':
  - type: text
    content: Jésus était très surpris, parce que les gens dans cette ville ne voulaient pas croire en lui. Puis il a voyagé à travers les villages qui étaient autour de là dans un cercle. Il enseignait les gens dans ces villages.
  - type: heading
    content: Jésus envoie les 12 disciples pour dire le message de Dieu aux gens
  '7':
  - type: text
    content: 'Jésus a demandé à ses 12 '
  - type: text
    content: disciples
  - type: text
    content: ' de venir à lui. Il a commencé à les envoyer 2 à 2 pour dire le message de Dieu aux gens. Et il leur a donné le pouvoir sur les mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Jésus a dit aux '
  - type: text
    content: disciples
  - type: text
    content: ' de ne rien prendre pour le voyage, sauf un bâton. Ils ne doivent pas prendre de pain, de sac ou de l’argent dans leurs ceintures. '
  '9':
  - type: text
    content: 'Ils doivent porter des souliers (sandales). Mais ils ne doivent pas prendre de vêtements de rechange. '
