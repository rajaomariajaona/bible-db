document_id: LUK.16,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 16
  - type: heading
    content: Jésus raconte une histoire d’un homme qui pensait sagement
  - type: text
    content: 'Jésus a alors dit une autre histoire à ceux qui le suivaient. Un homme riche avait un serviteur qui travaillait pour lui. Le serviteur prenait soin de l’argent que l’homme avait. Ensuite, des gens sont venus parler à l’homme riche de son serviteur. Ils ont dit qu’il perdait les choses de son maître. '
  '10':
  - type: text
    content: 'Quelqu’un peut bien gérer de petites choses qu’on lui confie. On peut alors lui confier de grandes choses aussi. Une personne peut mal agir dans de petites choses. Elle agira aussi mal dans de grandes choses. '
  '11':
  - type: text
    content: 'Quelqu’un peut mal gérer les richesses vaines de ce monde. Il sera donc difficile de lui confier les vraies richesses (spirituelles). '
  '12':
  - type: text
    content: Quelqu’un peut mal gérer les choses d’autrui. Il sera donc difficile de lui donner celles qui lui sont destinées.
  '13':
  - type: text
    content: Un esclave ne peut pas travailler pour 2 maîtres. S’il le fait, il aimera seulement l’un d’eux. Il va bien travailler pour un maître et il pensera de mauvaises choses sur l’autre. Dieu et l’argent sont comme des maîtres. Vous ne pouvez pas travailler pour les 2.
  '14':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont entendu tout cela. Ils aimaient l’argent, ils se moquaient de lui. Ils disaient à Jésus : Tu as tort. '
  '15':
  - type: text
    content: 'Jésus a répondu : Vous aimez quand les gens vous regardent. Vous voulez qu’ils pensent que vous êtes de bonnes personnes. Mais Dieu voit votre intérieur. Il sait ce que vous pensez. Les gens pensent qu’il est important pour d’autres personnes de penser du bien d’eux. Mais Dieu pense que cela est faux.'
  '16':
  - type: text
    content: 'Moïse a écrit les règles que Dieu lui avait données. D’autres hommes avaient écrit les messages que le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' leur avait donnés. Ces livres étaient les seules références jusqu’à ce que Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' a commencé à parler. Depuis le temps où Jean a commencé à leur parler à ce sujet, les gens entendaient aussi la Bonne Nouvelle. Elle concerne la façon dont Dieu règne. Depuis lors, tout le monde a vraiment essayé d’entrer là où Dieu règne.'
  '17':
  - type: text
    content: 'Un jour, Dieu détruira la terre et le '
  - type: text
    content: ciel
  - type: text
    content: '. Mais tout ce que les hommes de Dieu avaient écrit dans le livre de la loi doit se produire. '
  '18':
  - type: text
    content: Parfois, un homme renvoie sa femme du mariage. Puis il épouse une autre femme. S’il le fait, il est mauvais. Et parfois, un mari renvoie sa femme du mariage et elle épouse un autre homme. Cet autre homme est également en train de faire quelque chose de mal.
  - type: heading
    content: Jésus raconte une histoire d’un homme riche et d’un homme pauvre
  '19':
  - type: text
    content: 'A un moment, il y avait un homme riche qui avait aussi des vêtements chers. Certains des vêtements étaient violets. Et certains d’entre eux étaient doux et blancs. Cet homme avait de gros repas chaque jour. '
  '2':
  - type: text
    content: 'Alors le maître a envoyé quelqu’un pour aller chercher son serviteur. Il a dit : J’entends de mauvaises histoires sur toi. Donc, écris tout ce que tu avais fait avec mon argent et mes choses. Une fois que tu as fait cela, tu vas arrêter de travailler pour moi.'
  '20':
  - type: text
    content: Il y avait aussi un pauvre, nommé Lazare. Il avait des plaies partout dans sa peau. Il était à la porte de l’homme riche.
  '21':
  - type: text
    content: 'Il avait très faim. Les morceaux de nourriture tombaient de la table du riche. Alors le pauvre voulait même manger ces morceaux pour se rassasier. Et même les chiens venaient. Ils léchaient ses plaies. '
  '22':
  - type: text
    content: 'Le pauvre homme est mort et les '
  - type: text
    content: anges
  - type: text
    content: ' l’ont emporté. Ils l’ont mis dans le sein d’Abraham. L’homme riche est mort aussi, et sa famille l’a enterré.'
  '23':
  - type: text
    content: 'Il est allé à un mauvais endroit appelé '
  - type: text
    content: Hadès
  - type: text
    content: '. Il était dans beaucoup de difficultés là. Il a vu Abraham. Il était loin de lui. Il a également vu Lazare à côté d’Abraham. '
  '24':
  - type: text
    content: 'Alors il criait : Père Abraham, s’il te plaît, aie pitié de moi. S’il te plaît, envoie Lazare à moi. Je suis dans une grande douleur parce que je suis dans un feu. Qu’il mette le bout de son doigt dans l’eau. Alors l’eau va rendre ma langue fraîche. '
  '25':
  - type: text
    content: 'Abraham a dit :'
  - type: text
    content: 'Mon enfant, rappelle‑toi le temps où tu étais en vie sur la terre. Rappelle‑toi ce qui est arrivé. Tu avais beaucoup de bonnes choses et Lazare avait beaucoup de mauvaises choses. Maintenant, je prends soin de Lazare, et tu es dans la douleur. '
  '26':
  - type: text
    content: Mais ce n’est pas tout. Entre vous et nous, il y a un trou. Il est large, long et profond. Il y a une raison pour laquelle ce trou est là. Personne ne peut passer d’ici à l’endroit où vous êtes. Et personne ne peut traverser d’où vous êtes et venir ici.
  '27':
  - type: text
    content: 'Il a dit : Si cela est vrai, Père Abraham, s’il te plaît, envoie Lazare auprès de ma famille. '
  '28':
  - type: text
    content: J’ai 5 frères qui sont encore en vie. Il peut leur dire de ne pas faire les mêmes choses que moi. Donc, ils ne viendront pas ici quand ils mourront. Ils ne seront pas dans une grande douleur, comme je suis.
  '29':
  - type: text
    content: 'Abraham a dit : Ils ont les livres que Moïse avait écrits. Ils ont tous les messages que d’autres hommes avaient écrits. Les hommes qui recevaient les messages de Dieu, les avaient écrits. Ta famille doit les écouter.'
  '3':
  - type: text
    content: 'Le serviteur s’est dit à lui‑même : Je dois penser à ce que je peux faire. Mon maître ne me laisse plus travailler pour lui. Je ne suis pas assez fort pour creuser. Et j’aurai honte de demander à d’autres personnes de l’argent. '
  '30':
  - type: text
    content: 'Il a dit : Non, Père Abraham, ils ne vont pas écouter les messages que Moïse et les autres serviteurs de Dieu avaient écrits. Mais si quelqu’un va vers eux de parmi les morts, ils vont l’écouter. Alors ils vont laisser de faire de mauvaises choses. Et ils se tourneront vers Dieu.'
  '31':
  - type: text
    content: 'Mais Abraham lui a dit : Ils ne croient pas à ce que Moïse et les autres serviteurs de Dieu avaient dit. De même, ils ne vont pas croire en quelqu’un qui revient d’entre les morts.'
  '4':
  - type: text
    content: Je dois cesser de travailler pour mon maître. Je sais ce que je peux faire ensuite. Si je le fais, les gens vont m’accepter dans leurs maisons.
  '5':
  - type: text
    content: 'Beaucoup de gens avaient une dette qu’ils n’avaient pas payée au maître. Ainsi, le serviteur a demandé aux gens de venir à lui. Il a demandé au premier homme : Quel est le montant de ta dette à mon maître ? '
  '6':
  - type: text
    content: 'Il a répondu : Je dois lui donner 100 mesures d’huile. Le serviteur a dit : Voici le papier avec ta dette écrite. Prends le papier. Assieds‑toi et écris rapidement sur le papier 50.'
  '7':
  - type: text
    content: 'Il a demandé à l’homme à côté : Et quel est le montant de ta dette à mon maître ? Il a répondu : Je dois lui donner 100 mesures de blé. Voici le papier avec ta dette écrite. Prends le papier et écris : 80.'
  '8':
  - type: text
    content: Le serviteur n’était pas honnête. Mais son maître parlait bien de ce qu’il avait fait. Ce qu’il avait fait l’aidera plus tard. Les gens qui ne respectent pas Dieu sont plus sages. Ils savent comment traiter avec des gens comme eux‑mêmes. Mais les gens qui obéissent à Dieu sont souvent moins sages.
  '9':
  - type: text
    content: 'Je vous dis ceci : Les gens peuvent obtenir de l’argent de mauvaises façons. Mais vous devez l’utiliser pour être bons à ceux qui ont besoin d’aide. Vous allez mourir un jour. Ensuite, ces gens seront heureux de vous voir dans cet endroit où les gens vivent pour tous les temps.'
