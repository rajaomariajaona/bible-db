document_id: MAT.25,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 25
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire d’une dizaine de jeunes femmes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je vais vous dire encore une fois ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Il y avait 10 jeunes femmes qui allaient à un mariage. Elles ont pris leurs lampes avec elles. Elles sont allées à la rencontre de l’époux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Donc, ces 5 jeunes femmes sont allées acheter un peu d’huile. Pendant leur absence, l’époux est arrivé. Il va bientôt se marier. Les 5 femmes sages étaient prêtes. Elles sont allées avec lui dans la maison. Ici, les serviteurs avaient préparé le repas pour le mariage. Ensuite, les travailleurs ont fermé la porte.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Plus tard, les 5 femmes stupides sont également venues à la maison. Elles ont dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', s’il te plaît, ouvre‑nous la porte.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais il a répondu : Je vous dis la vérité. Je ne vous connais pas. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors Jésus a dit : Donc, vous devez être attentifs. Vous ne savez pas quel jour ou à quelle heure le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' viendra.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire sur 3 serviteurs
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je vais vous dire encore une fois ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Un homme se préparait à voyager. Avant de partir, il a demandé à ses serviteurs de venir à lui. Il leur a dit : Prenez soin de tout mon argent et de toutes mes choses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le maître a donné 5 pièces d’argent à un serviteur. Il a donné à un autre serviteur 2 pièces d’argent, et à un autre serviteur il a donné 1 pièce d’argent. Il a donné à chaque serviteur ce qu’il pouvait bien utiliser. Alors le maître a voyagé.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le serviteur qui avait reçu 5 pièces d’argent est sorti immédiatement. Il a acheté et vendu des choses avec l’argent. Ce serviteur a eu 5 pièces d’argent de plus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le serviteur qui avait reçu 2 pièces d’argent est aussi sorti immédiatement. Il a également acheté et vendu des choses avec l’argent. Ce serviteur a eu 2 pièces d’argent de plus. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le serviteur qui avait reçu 1 pièce d’argent a fait quelque chose de différent. Il est sorti et il a creusé un trou dans le sol. Il a enfoui l’argent que son maître lui avait donné.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Après un long moment, le maître est venu à la maison. Il a demandé aux serviteurs de venir auprès de lui. Il voulait savoir combien d’argent ils avaient maintenant. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '5 de ces jeunes femmes n’étaient pas sages. Mais les 5 autres étaient sages. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le serviteur qui avait reçu 5 pièces d’argent est venu auprès de son maître. Le serviteur lui a dit : Maître, tu m’avais donné 5 pièces d’argent. Et maintenant, j’ai 5 pièces d’argent en plus.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le maître a dit à ce serviteur : Tu es un bon serviteur, tu as vraiment bien fait. Tu étais sage avec un peu d’argent. Je vais te donner beaucoup plus d’argent à utiliser. Je suis vraiment heureux de cela. Viens partager avec moi cette joie.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le serviteur qui avait reçu 2 pièces d’argent est également venu auprès de son maître. Le serviteur lui a dit : Maître, tu m’avais donné 2 pièces d’argent. Et maintenant, j’ai 2 pièces d’argent en plus.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le maître a dit à son serviteur : Tu es un bon serviteur, tu as bien fait. Tu as été sage avec un peu d’argent. Je vais te donner beaucoup plus à utiliser. Je suis vraiment heureux de cela. Viens et sois heureux avec moi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le serviteur qui avait reçu 1 pièce d’argent est également allé auprès de son maître. Le serviteur lui a dit : Maître, je sais ce que tu es. Tu demandes aux gens de faire des choses tout le temps. Tu récoltes des graines du sol, que tu n’as pas semées. Tu récoltes les fruits des arbres que tu n’as pas semés. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: J’avais peur. Donc, j’ai enterré ton argent dans le sol. Le voici. Tu peux le reprendre.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le maître lui a dit : Tu es un mauvais et paresseux serviteur. Tu as dit que tu me connaissais. Je récolte des graines que je n’ai pas semées. Je récolte les fruits des arbres que je n’ai pas semés. Et tu savais tout cela.  '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tu devrais mettre l’argent à la banque. Puis, quand je suis rentré, je pouvais recevoir mon argent de la banque à nouveau, avec de l’argent de plus. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors le maître a dit à ses autres serviteurs : Prenez cette pièce d’argent de cet homme. Donnez‑la à l’homme qui a maintenant 10 pièces d’argent. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Alors le maître a dit : Je vous dis la vérité. Je vais donner plus à chaque personne qui a déjà quelque chose. Cette personne aura beaucoup plus. Une autre personne n’a presque rien. Je vais enlever même la petite chose qu’elle a.  '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les jeunes femmes stupides ont pris leurs lampes avec elles, mais elles n’ont pas pris l’huile de réserve avec elles.  '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ce serviteur ne peut plus travailler pour moi. Ainsi, vous pouvez le jeter dans un endroit sombre à l’extérieur. Les gens vont pleurer là. Et ils vont grincer leurs dents ensemble, parce qu’ils seront en colère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Dieu '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' tout le monde'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Quand je reviendrai sur terre, moi le Fils de l’homme, je serai puissant, grand, important et beau. Tous les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' viendront avec moi. Je vais rester sur mon siège en tant que Roi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Toutes les personnes dans le monde seront ensemble en face de moi. Je vais les mettre en 2 groupes. Je vais le faire comme un berger met ses brebis et ses boucs en 2 groupes. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il met les brebis à sa droite, et les boucs à sa gauche.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Le Roi dira à ceux qui seront à sa droite : Venez ici. Mon Père vous a donné de bonnes choses. Il a préparé une place pour vous dans son Royaume. Depuis le temps que Dieu a fait le monde, il a fait un endroit prêt pour vous.  '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Le Roi va leur dire : J’avais faim et vous m’avez donné quelque chose à manger. J’avais soif et vous m’avez donné de l’eau à boire. J’étais étranger et vous m’avez demandé de venir à votre maison. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Je n’avais pas de vêtements et vous m’avez donné des vêtements à porter. J’étais malade et vous avez pris soin de moi. J’étais en prison et vous êtes venus me rendre visite là‑bas.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Les gens qui ont fait de bonnes choses vont lui parler. Maître, quand est‑ce que nous avons vu que tu avais faim ? Et quand est‑ce que nous t’avons donné de la nourriture ? Quand est‑ce que nous avons vu que tu avais besoin de boire ? Et quand est‑ce que nous t’avons donné de l’eau à boire ? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Quand avons‑nous vu que tu étais étranger ? Et quand est‑ce que nous t’avons demandé de venir à notre maison ? Quand avons‑nous vu que tu n’avais pas de vêtements ? Et quand est‑ce que nous t’avons donné des vêtements ? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Quand est‑ce que nous avons vu que tu étais malade ? Et quand est‑ce que nous avons pris soin de toi ? Quand avons‑nous su que tu étais en prison ? Et quand est‑ce que nous sommes venus te rendre visite ?
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les 5 autres jeunes femmes ont pris des récipients d’huile avec elles.  '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Le roi leur répondra : Je vous dis la vérité. Vous avez fait toutes ces choses pour aider les gens. Ces gens ne sont pas importants, mais ils sont mes amis. Si vous les avez aidés, alors vous m’avez aussi aidé.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Alors le Roi dira à ceux qui seront à sa gauche : Allez loin de moi. Dieu a dit que les mauvaises choses vont vous arriver. Dieu a préparé un feu qui brûlera pour toujours. Il l’a préparé pour Satan et ceux qui l’aident. Vous pourrez également aller dans ce feu. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Alors le Roi leur a dit : J’avais faim, mais vous ne m’avez pas donné de la nourriture à manger. J’avais soif, mais vous ne m’avez pas donné à boire. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: J’étais étranger, mais vous ne m’avez pas demandé de venir à votre maison. Je n’avais pas de vêtements, mais vous ne m’avez rien donné à porter. J’étais malade, mais vous n’avez pas pris soin de moi. J’étais en prison, mais vous n’êtes pas venus me rendre visite.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Alors ces autres gens vont parler au Roi : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', quand est‑ce que nous avons vu que tu avais faim ou besoin de quelque chose à boire ? Ou quand t’avons‑nous vu étranger, ou sans vêtements ? Ou quand est‑ce que nous t’avons vu malade ou en prison et nous ne t’avons donné aucune aide ?'
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Alors le roi leur répondra : Je vous dis la vérité. Vous n’avez pas fait ces choses aux gens moins importants. Mais quand vous ne les avez pas aidés, vous ne m’avez pas non plus aidé.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Dieu punira pour toujours ces mauvaises personnes. Mais ces bonnes gens qui obéissent à Dieu vivront pour toujours.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le marié traînait à venir. Donc, toutes les jeunes femmes sont devenues fatiguées, et elles sont allées dormir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Au milieu de la nuit, quelqu’un a crié : Le marié vient. Venez à sa rencontre.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les 10 jeunes femmes se sont réveillées. Ensuite, elles se sont levées et elles ont regardé leurs lampes. Elles ont préparé leurs lampes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les 5 jeunes femmes stupides ont dit aux 5 autres jeunes femmes : Donnez‑nous un peu de votre huile, car nos lampes ne s’allument pas bien.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les sages jeunes femmes qui avaient de l’huile ont répondu : Si nous faisons cela, alors il n’y aura pas assez d’huile pour nous toutes. Allez là où les gens vendent de l’huile. Achetez de l’huile pour vos lampes.'
