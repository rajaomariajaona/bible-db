document_id: 1CO.13,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’amour est la chose la plus importante
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je peux être capable de parler de nombreuses langues différentes que parlent les gens ou les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '. Mais cela ne vaut rien si je n’aime pas Dieu et les autres. Je ne ferais qu’un bruit fort, comme quelqu’un qui frappe un morceau de métal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais un temps viendra où tout deviendra complet. Quand Dieu fait cela, nous n’aurons pas besoin de petites parties que nous avons maintenant.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand j’étais enfant, je parlais comme un enfant. Mes pensées étaient celles d’un enfant. Je comprenais les choses d’une manière qu’un enfant comprend. Mais maintenant que je suis devenu un homme, j’ai cessé d’être comme un enfant.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En ce moment, nous voyons les choses comme si nous les regardions dans un miroir. Ce que nous voyons maintenant n’est pas clair. Mais le temps viendra où nous n’aurons pas besoin d’un miroir. Nous verrons tout clairement. Maintenant, nous ne savons qu’une partie de ce qui est vrai. Mais alors nous saurons tout complètement. Nous comprendrons complètement, tout comme Dieu nous comprend complètement.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: À l’heure actuelle, 3 choses continuent. Nous continuons à faire confiance en Dieu. Nous continuons d’espérer ses bonnes choses. Nous continuons d’aimer les autres. Mais la plus importante de ces choses est l’amour.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je peux peut‑être dire les messages de Dieu. Je peux comprendre toutes les choses secrètes de Dieu et connaître tous les faits. J’ai peut‑être une grande '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: '. Ainsi, je peux faire suffisamment confiance en Dieu pour déplacer des montagnes. Mais je ne suis rien, si je n’aime pas Dieu et les autres. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je peux donner toutes mes choses pour aider les pauvres. Je peux laisser d’autres personnes prendre mon corps pour le brûler. Mais cela ne m’aidera pas, si je n’aime pas les autres.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si j’aime Dieu et les gens, je serai patient. Je serai gentil. Je ne serai pas jaloux des autres. Je ne serai pas vantard et je ne dirai pas que je suis grand. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si j’aime Dieu et les gens, je serai poli. Je ne veux pas seulement me plaire. Je ne me mettrai pas rapidement en colère. Si quelqu’un fait une mauvaise chose contre moi, je ne la garderai pas dans mes pensées. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si j’aime Dieu et les gens, je ne serai pas heureux quand de mauvaises choses se produisent. Mais, je serai heureux lorsque des choses justes et vraies se produisent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si j’aime Dieu et les gens, j’accepterai toujours leurs problèmes. J’aurai toujours confiance en eux. J’espérerai toujours ce qui est mieux. Je serai toujours patient dans les problèmes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’amour continuera toujours. Le don de parler des messages de Dieu ne sera pas toujours nécessaire. Le don de parler dans différentes langues s’arrêtera un jour. Le don de connaître des choses spéciales ne sera pas toujours nécessaire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'À l’heure actuelle, nous ne connaissons qu’une partie de tout. Nous ne pouvons parler qu’une partie de tout le message de Dieu. '
