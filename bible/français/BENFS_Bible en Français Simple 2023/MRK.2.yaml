document_id: MRK.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Jésus fait marcher un homme qui ne pouvait pas marcher
  - type: text
    content: 'Jésus est revenu à '
  - type: text
    content: Capernaüm
  - type: text
    content: ' quelques jours après. Les gens ont entendu qu’il est venu à la maison. '
  '10':
  - type: text
    content: 'Mais je veux que vous sachiez cela. Moi, le Fils de l’homme, j’ai le pouvoir sur la terre. Je peux pardonner aux gens les mauvaises choses qu’ils font. Puis il a dit à l’homme qui ne pouvait pas marcher. '
  '11':
  - type: text
    content: 'Je te dis : Lève‑toi ! Prends ton petit lit et va à ta maison. '
  '12':
  - type: text
    content: 'L’homme s’est levé. Immédiatement, il a pris le petit lit. Tout le monde le regardait sortir de la maison. Cela a beaucoup surpris tout le peuple. Les gens disaient que Dieu a fait cette chose puissante. Ils disaient : Nous n’avons jamais vu une telle chose avant.'
  - type: heading
    content: Jésus demande à Lévi d’être son disciple
  '13':
  - type: text
    content: 'Jésus est retourné au bord de la mer de Galilée. Beaucoup de gens venaient auprès de lui, il les enseignait. '
  '14':
  - type: text
    content: 'Pendant que Jésus marchait le long de la mer, il a vu Lévi. Lévi était le fils d’Alphée. Son travail était de percevoir l’argent des taxes pour l’État. Il était assis dans son bureau. Jésus lui a dit : Suis‑moi. Lévi s’est levé et il est allé avec Jésus. '
  '15':
  - type: text
    content: 'Alors Jésus est allé manger un repas à la maison de Lévi. Beaucoup de gens suivaient Jésus et ils mangeaient avec lui et ses '
  - type: text
    content: disciples
  - type: text
    content: '. Certaines de ces personnes percevaient l’argent des taxes. Certaines personnes faisaient beaucoup de mauvaises choses. '
  '16':
  - type: text
    content: 'Certains enseignants de la loi de Dieu ont vu Jésus. Il mangeait avec tous ces gens. Ils ont dit à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Jésus ne doit pas manger avec les hommes qui perçoivent de l’argent des taxes pour l’État. Et il ne doit pas manger avec d’autres mauvaises personnes. '
  '17':
  - type: text
    content: 'Jésus a entendu ce que les enseignants de la loi de Dieu disaient. Il leur a répondu : Les gens qui sont bien n’ont pas besoin d’un médecin. Mais ce sont les malades qui ont besoin d’un médecin. Je ne suis pas venu pour aider de bonnes personnes. Mais je suis venu pour aider de mauvaises personnes. '
  '18':
  - type: text
    content: 'Les disciples de Jean‐Baptiste ne mangeaient pas parfois la nourriture (jeûne). Ceux des Pharisiens faisaient cela aussi. Des gens sont venus auprès de Jésus. Ils lui ont dit : Les disciples de Jean ne mangent pas parfois de nourriture. Ceux des Pharisiens font cela aussi. Alors, pourquoi tes disciples mangent‐ils toujours la nourriture ? '
  '19':
  - type: text
    content: 'Jésus leur a dit : Quand un homme se marie, ses amis ne peuvent pas refuser de manger. Ils ne peuvent pas refuser la nourriture pendant qu’il est avec eux. '
  '2':
  - type: text
    content: 'Beaucoup de personnes sont entrées dans la maison. La maison était très pleine de gens. Alors il n’y avait plus de place vide, même pas devant la porte. Jésus enseignait les gens. '
  '20':
  - type: text
    content: 'Mais il y aura un moment où l’homme marié ne sera plus avec eux. Alors ses amis vont aussi refuser la nourriture. '
  '21':
  - type: text
    content: 'Jésus a dit : Personne n’utilise une pièce d’un drap neuf pour réparer un vieil habit. Sinon, la pièce de drap neuf emportera une partie du vieil habit. Alors la déchirure sera pire qu’avant. '
  '22':
  - type: text
    content: Et personne ne met du vin nouveau dans les vieilles outres. Sinon, le vin nouveau va faire éclater les vieilles outres. Alors le vin et les outres ne seront plus utiles. Au lieu de cela, vous devez mettre le vin nouveau dans des outres neuves.
  - type: heading
    content: Jésus répond aux questions sur le jour où les Juifs doivent se reposer
  '23':
  - type: text
    content: 'Le jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: ', Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' marchaient à travers les champs de blé. Ses '
  - type: text
    content: disciples
  - type: text
    content: ' arrachaient des épis. '
  '24':
  - type: text
    content: 'Certains '
  - type: text
    content: Pharisiens
  - type: text
    content: ' ont dit à Jésus : Regarde tes '
  - type: text
    content: disciples
  - type: text
    content: '  ! Ils font ce qu’ils ne devraient pas faire le jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: '. C’est contre la loi de Dieu. '
  '25':
  - type: text
    content: 'Jésus a répondu : Rappelez‑vous ce que David avait fait, quand lui et les hommes avec lui avaient faim. Vous avez lu à ce sujet. '
  '26':
  - type: text
    content: 'David était entré dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Il a mangé le pain que le peuple avait offert à Dieu. Et il en avait donné aussi aux hommes qui étaient avec lui. Cela est arrivé au cours de la vie d’Abiathar. Il était le '
  - type: text
    content: grand prêtre
  - type: text
    content: '. La loi de Dieu permettait seulement aux '
  - type: text
    content: prêtres
  - type: text
    content: ' de manger ce pain. '
  '27':
  - type: text
    content: 'Alors Jésus a dit aux '
  - type: text
    content: Pharisiens
  - type: text
    content: '  : Dieu a voulu aider les gens. Donc, il a fait le jour où ils doivent se reposer. Il n’a pas fait les gens pour le jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '28':
  - type: text
    content: Ainsi, le Fils de l’homme a le pouvoir même sur le jour où les gens doivent se reposer.
  '3':
  - type: text
    content: 4 hommes sont venus.
  - type: text
    content: 'Ils portaient un autre homme. Cet homme ne pouvait pas marcher. '
  '4':
  - type: text
    content: 'Les 4 hommes ne pouvaient pas atteindre Jésus à cause de la foule. Donc, ils ont fait un trou dans le toit au‑dessus du lieu où Jésus était. Ils ont aidé l’homme à descendre par ce trou. L’homme était toujours couché sur le petit lit. '
  '5':
  - type: text
    content: 'Jésus a vu l’homme et ses amis. Et Jésus savait qu’ils croyaient en lui. Alors Jésus a dit à l’homme : Mon fils, je pardonne tes péchés. '
  '6':
  - type: text
    content: 'Mais certains enseignants de la loi de Dieu étaient assis là. Ils pensaient aux paroles que Jésus venait de dire à l’homme. '
  '7':
  - type: text
    content: 'Ils pensaient : Cet homme (Jésus) ne devrait pas dire cela. Il parle comme Dieu seul peut parler. Dieu seul peut pardonner aux gens leurs péchés. '
  '8':
  - type: text
    content: 'Immédiatement, Jésus savait ce que ces enseignants pensaient. Il leur a dit : Vous ne devriez pas avoir de telles idées. '
  '9':
  - type: text
    content: 'Je dis à cet homme : Je pardonne tes péchés. Au lieu de cela, je peux lui dire : Lève‑toi ! Prends ton petit lit et marche. Vous savez ce qui est plus facile à dire. '
