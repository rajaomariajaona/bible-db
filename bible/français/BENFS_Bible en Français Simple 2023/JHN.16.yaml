document_id: JHN.16,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 16
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai dit tout cela, de sorte que rien ne vous arrête de croire en moi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont tort sur la façon d’être justes avec Dieu, parce que je vais au Père. Et vous ne me verrez plus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ont tort à ce sujet parce que Dieu a déjà décidé de punir le prince de ce monde.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai beaucoup plus de choses à vous dire. Mais vous n’êtes pas assez forts pour les savoir maintenant. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' qui vous montrera de vraies choses, va venir. Et quand il viendra, il sera un guide pour vous. Il vous fera savoir toute la vérité. Il ne vous dira que ce qu’il entendra. Il ne dira pas ses propres mots. Il vous dira des choses qui vont arriver après cette heure.'
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il recevra ce que je dois dire. Et il vous le dira. De cette façon, il montrera à quel point je suis grand et bon. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tout ce que le Père a, est à moi. Voilà pourquoi je dis : L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' recevra ce que je dois dire. Et puis il va vous le dire.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' seront tristes d’abord. Après, ils seront heureux'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après un court temps, vous ne me verrez plus. Mais peu après, vous me verrez. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains de ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' se sont dit ceci l’un à l’autre : Que veut‑il dire ? Il a dit : Après un court temps, vous ne me verrez plus. Mais peu après, vous me verrez. Et, il a dit : Parce que je vais au Père. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qu’est‑ce qu’il veut dire par un court temps ? Nous ne savons pas de quoi il parle !
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus savait qu’ils voulaient l’interroger à ce sujet. Alors, il leur a dit. Je dis : Après un court temps, vous ne me verrez plus. Mais peu après, vous me verrez. Peut‑être vous vous demandez à ce sujet. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens vont vous chasser des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: '. Il y aura un moment où les gens vont vous tuer. Et ils vont même penser que Dieu leur a donné le devoir de vous tuer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis la vérité. Vous pleurerez et vous serez tristes. Mais les gens qui appartiennent à ce monde seront heureux. Tout d’abord, vous serez tristes, mais peu de temps après, vous deviendrez heureux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une femme qui donne naissance à un bébé est triste. Elle est triste à ce moment‑là, car c’est douloureux. Mais après que le bébé est né, elle est heureuse. Elle oublie la douleur, parce que maintenant elle est si heureuse. Elle est si heureuse, parce qu’une personne est née dans le monde.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est comme ça pour vous. Vous êtes tristes maintenant. Mais je vous reverrai, et vous serez heureux. Vous serez tellement heureux. Et personne ne pourra vous prendre ce bonheur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour‑là, vous ne me demanderez pas quoi que ce soit. Je vous dis la vérité. Le Père vous donnera tout ce que vous demanderez en mon nom (parce que vous êtes les miens). '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jusqu’à présent, vous n’avez rien demandé en mon nom. Demandez, et vous recevrez. Ainsi donc, vous serez complètement heureux.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai parlé par un langage obscur. Mais il y aura un moment où je ne parlerai plus comme ça. Au lieu de cela, je vais vous parler clairement de Dieu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour‑là, vous demanderez en mon nom (parce que vous êtes les miens). Je ne dis pas que je prierai le Père en votre nom. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, parce que le Père lui‑même vous aime. Il vous aime parce que vous m’aimez. Il vous aime parce que vous croyez. Vous croyez que je suis venu de Dieu. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je suis venu du Père, et je suis venu dans le monde. Et maintenant, je vais quitter le monde, et je vais retourner au Père.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' lui ont dit : Maintenant, tu parles clairement. Tu ne parles pas par des histoires ou exemples obscurs ! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils vont faire ces choses, parce qu’ils n’ont jamais connu ni le Père ni moi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, nous savons que tu sais tout. Tu n’es pas obligé de demander aux gens ce qu’ils pensent. À cause de cela, nous pensons que tu es venu de Dieu. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur a répondu : Vous dites que vous croyez maintenant. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais très vite, vous allez tous fuir dans vos propres maisons. Oui, c’est déjà le temps. Vous me laisserez seul. Mais je ne suis pas vraiment seul, car le Père est avec moi. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai dit ces choses, afin que vous soyez tranquilles dans vos cœurs et vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: . Vous serez comme ça parce que vous êtes unis avec moi. Dans ce monde, vous aurez du mal. Mais soyez forts ! J’ai gagné ! J’ai détruit le pouvoir de ce monde.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais je vous ai dit cela pour que vous vous en souveniez. Quand ils commencent à faire ces choses, vous vous souviendrez. Vous vous souviendrez ce que je vous ai dit à leur sujet. Je ne vous ai pas dit cela avant, parce que je suis avec vous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le travail de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je vais aller à celui qui m’a envoyé. Mais aucun de vous ne me demande : Où veux‑tu aller ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, vous êtes très tristes, à cause des choses que je vous ai dites. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais je vous dis la vérité. Je pars parce que ce sera mieux pour vous. Si je ne pars pas, le consolateur ne viendra pas à vous. Mais si je vais, je vais vous l’envoyer. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il viendra, il montrera des choses sur les gens de ce monde. Il montrera qu’ils ont tort. Ils ont tort sur le péché. Ils se trompent sur la façon d’être avec Dieu. Ils ont tort sur la façon dont Dieu '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' les gens. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont tort sur le péché, parce qu’ils ne me croient pas. '
