document_id: HEB.1,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 1
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: En Jésus, Dieu nous a montré qui il est
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il y a plusieurs années, Dieu a parlé à nos ancêtres par ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: '. Il a parlé plusieurs fois et de différentes manières. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'La Bible dit également ceci :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', au début tu as fait la terre.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec ta propre puissance, tu as également tout fait au‑dessus de la terre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Toutes ces choses se détruiront et prendront fin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu continueras pour toujours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les vêtements, ces choses deviendront toutes vieilles.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors tu les rangeras comme un vieux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu vas les changer, comme les gens changent des vêtements.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu resteras toujours le même.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta vie ne prendra jamais fin.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'De plus, Dieu n’a jamais dit ceci à aucun des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assieds‑toi à ma droite jusqu’à ce que je gagne complètement contre tes ennemis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu pourras alors mettre les pieds sur tes ennemis.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ainsi, nous voyons que tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' sont des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' qui servent Dieu. Dieu les envoie comme ses serviteurs pour aider le peuple qu’il sauvera.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais dans ces derniers jours, il nous a parlé par son Fils. Au commencement, Dieu a créé le monde entier et tout ce qu’il y a. Il a décidé que tout devait appartenir à son Fils. C’est le Fils lui‑même qui a fait toutes choses, au nom de Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le Fils nous montre complètement ce que Dieu est. Il brille de la grande lumière de Dieu lui‑même. Sa nature et celle de Dieu sont les mêmes. La parole puissante du Fils fait que tout continue. Lui‑même nous a permis d’être purifiés de nos péchés. Après avoir fait cela, il est retourné au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Il est allé et il s’est assis du côté droit de Dieu, qui règne avec toute autorité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le Fils de Dieu est plus grand que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Cela nous montre que le Fils de Dieu est beaucoup plus grand que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '. Dieu lui a donné un nom qui montre qu’il est plus important qu’eux. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dieu n’a jamais dit ceci à aucun '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon Fils.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aujourd’hui, je suis devenu ton Père.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans un autre endroit de la Bible, Dieu dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il sera mon Fils.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'De plus, lorsque Dieu était prêt à amener son plus grand Fils au monde, il a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu doivent l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dieu parle des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' comme ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu fait de ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' des vents.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils le servent comme des feux qui brûlent avec éclat.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais voici ce que Dieu a dit à son Fils :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es Dieu et tu dirigeras pour toujours comme Roi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu dirigeras ton Royaume d’une manière complètement bonne.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu aimes tout ce qui est juste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu détestes tout ce qui ne va pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour cette raison, tu seras complètement heureux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis ton Dieu et je t’ai béni. Je t’ai choisi pour être plus grand que les autres qui sont avec toi.
