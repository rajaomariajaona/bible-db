document_id: HEB.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: En Jésus, Dieu nous a montré qui il est
  - type: text
    content: 'Il y a plusieurs années, Dieu a parlé à nos ancêtres par ses '
  - type: text
    content: prophètes
  - type: text
    content: '. Il a parlé plusieurs fois et de différentes manières. '
  '10':
  - type: text
    content: 'La Bible dit également ceci :'
  - type: text
    content: Seigneur
  - type: text
    content: ', au début tu as fait la terre.'
  - type: text
    content: Avec ta propre puissance, tu as également tout fait au‑dessus de la terre.
  '11':
  - type: text
    content: Toutes ces choses se détruiront et prendront fin.
  - type: text
    content: Mais toi, tu continueras pour toujours.
  - type: text
    content: Comme les vêtements, ces choses deviendront toutes vieilles.
  '12':
  - type: text
    content: 'Alors tu les rangeras comme un vieux '
  - type: text
    content: manteau
  - type: text
    content: .
  - type: text
    content: Tu vas les changer, comme les gens changent des vêtements.
  - type: text
    content: Mais tu resteras toujours le même.
  - type: text
    content: Ta vie ne prendra jamais fin.
  '13':
  - type: text
    content: 'De plus, Dieu n’a jamais dit ceci à aucun des '
  - type: text
    content: anges
  - type: text
    content: '  :'
  - type: text
    content: Assieds‑toi à ma droite jusqu’à ce que je gagne complètement contre tes ennemis.
  - type: text
    content: Tu pourras alors mettre les pieds sur tes ennemis.
  '14':
  - type: text
    content: 'Ainsi, nous voyons que tous les '
  - type: text
    content: anges
  - type: text
    content: ' sont des '
  - type: text
    content: esprits
  - type: text
    content: ' qui servent Dieu. Dieu les envoie comme ses serviteurs pour aider le peuple qu’il sauvera.'
  '2':
  - type: text
    content: 'Mais dans ces derniers jours, il nous a parlé par son Fils. Au commencement, Dieu a créé le monde entier et tout ce qu’il y a. Il a décidé que tout devait appartenir à son Fils. C’est le Fils lui‑même qui a fait toutes choses, au nom de Dieu. '
  '3':
  - type: text
    content: 'Le Fils nous montre complètement ce que Dieu est. Il brille de la grande lumière de Dieu lui‑même. Sa nature et celle de Dieu sont les mêmes. La parole puissante du Fils fait que tout continue. Lui‑même nous a permis d’être purifiés de nos péchés. Après avoir fait cela, il est retourné au '
  - type: text
    content: ciel
  - type: text
    content: . Il est allé et il s’est assis du côté droit de Dieu, qui règne avec toute autorité.
  - type: heading
    content: Le Fils de Dieu est plus grand que les anges
  '4':
  - type: text
    content: 'Cela nous montre que le Fils de Dieu est beaucoup plus grand que les '
  - type: text
    content: anges
  - type: text
    content: '. Dieu lui a donné un nom qui montre qu’il est plus important qu’eux. '
  '5':
  - type: text
    content: 'Dieu n’a jamais dit ceci à aucun '
  - type: text
    content: ange
  - type: text
    content: '  :'
  - type: text
    content: Tu es mon Fils.
  - type: text
    content: Aujourd’hui, je suis devenu ton Père.
  - type: text
    content: 'Dans un autre endroit de la Bible, Dieu dit :'
  - type: text
    content: Je serai son père,
  - type: text
    content: Et il sera mon Fils.
  '6':
  - type: text
    content: 'De plus, lorsque Dieu était prêt à amener son plus grand Fils au monde, il a dit :'
  - type: text
    content: 'Tous les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu doivent l’'
  - type: text
    content: adorer
  - type: text
    content: .
  '7':
  - type: text
    content: 'Dieu parle des '
  - type: text
    content: anges
  - type: text
    content: ' comme ceci :'
  - type: text
    content: 'Dieu fait de ses '
  - type: text
    content: anges
  - type: text
    content: ' des vents.'
  - type: text
    content: Ils le servent comme des feux qui brûlent avec éclat.
  '8':
  - type: text
    content: 'Mais voici ce que Dieu a dit à son Fils :'
  - type: text
    content: Tu es Dieu et tu dirigeras pour toujours comme Roi !
  - type: text
    content: Tu dirigeras ton Royaume d’une manière complètement bonne.
  '9':
  - type: text
    content: Tu aimes tout ce qui est juste.
  - type: text
    content: Et tu détestes tout ce qui ne va pas.
  - type: text
    content: Pour cette raison, tu seras complètement heureux.
  - type: text
    content: Je suis ton Dieu et je t’ai béni. Je t’ai choisi pour être plus grand que les autres qui sont avec toi.
