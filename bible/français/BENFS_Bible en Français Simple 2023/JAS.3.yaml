document_id: JAS.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faites attention à la façon dont vous parlez
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mes amis chrétiens, peu d’entre vous doivent devenir enseignants. Nous, les gens qui enseignons le message de Dieu, nous devons être très prudents. Quand Dieu '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' tout le monde, il exigera plus de nous que des autres.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cela montre que nous utilisons la même bouche pour louer Dieu et aussi pour dire de mauvaises choses. Mes amis chrétiens, nous ne devons pas faire cela.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’eau amère et l’eau douce ne proviennent jamais du même puits.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: figuier
    - type: text
      text: ' ne peut pas donner des olives, mes amis. Une '
    - type: usfm
      marker: w
      children:
      - type: text
        text: vigne
    - type: text
      text: ' pour le raisin ne peut pas donner des figues. Et un puits salé ne peut pas donner d’eau douce.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment être sage
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains d’entre vous pensent que vous êtes sages ? Penses‑tu que tu es intelligent ? Je te dis : Montre que tu es sage par la façon dont tu vis. Sois gentil avec les autres. Fais des choses qui sont bonnes. Voilà ce que signifie être sage.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si vous vivez mal, ne pensez pas que vous êtes sages. Êtes‑vous jaloux des autres et pensez‑vous de mauvaises choses contre eux ? Voulez‑vous vous rendre importants ? Si vous vivez comme ça, ne dites pas que vous êtes grands et sages. Vous ne dites pas ce qui est vrai.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous n’êtes pas sages comme Dieu veut que vous soyez sages. Mais, vous pensez comme des gens qui ne connaissent pas Dieu. Vos pensées ne viennent pas de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Elles viennent de démons.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous êtes jaloux des autres et que vous voulez vous rendre importants, cela vous causera des problèmes. Les gens se disputeront et se battront. Ils feront toutes sortes de mauvaises choses.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si Dieu vous rend vraiment sages, vous vivrez d’une manière complètement bonne. C’est la chose la plus importante. De plus, vous vivrez d’une manière qui apporte la paix. Vous serez gentils avec les autres, afin qu’ils deviennent vos amis. Vous les écouterez et vous ne vous disputerez pas. Vous leur pardonnerez et vous ferez beaucoup de bonnes choses pour les aider. Vous ne ferez pas d’injustice entre les gens. Et vous ne serez pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hypocrites
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceux qui apportent la paix aux autres les aident à vivre ensemble en paix. Par conséquent, les gens choisissent de faire ce qui est bien et juste.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous commettons tous de nombreuses erreurs. Donc, si quelqu’un ne dit jamais rien de mal, cette personne est complètement bonne. Cela montre qu’elle a le pouvoir sur tout son corps.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par exemple, réfléchissez à la façon dont nous faisons marcher un cheval dans le bon sens. Nous mettons un petit morceau de métal dans sa bouche pour pouvoir le faire tourner. Ensuite, nous pouvons faire en sorte que tout le corps du cheval aille où nous voulons qu’il aille.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pensez également aux bateaux qui naviguent sur la mer. Ils sont très grands. Des vents forts les poussent avec une grande puissance. Mais nous fixons un morceau de bois à l’arrière du bateau. Avec ce petit morceau de bois, le capitaine peut faire en sorte que le bateau aille partout où il veut qu’il aille.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De la même manière, notre langue est une très petite partie de notre corps. Mais elle parle comme si elle était très grande.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comprenez qu’un petit feu peut même brûler complètement une grande forêt.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et notre langue est comme ce feu. Elle a le pouvoir de tout ce qui est mauvais dans le monde. C’est une petite partie du corps, mais cela peut détruire la personne entière. Comme un incendie, elle peut détruire toute la vie d’une personne. C’est un feu qui vient du feu de l’enfer lui‑même.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Souvenez‑vous de ceci : Les gens peuvent faire de toutes sortes de choses ce qu’ils veulent qu’elles fassent. Ils ont fait ceci avec des animaux, des oiseaux, des serpents et des poissons.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais personne ne peut régner sur la langue. Elle continue de dire de mauvaises choses. C’est comme un mauvais poison qui peut provoquer la mort.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous utilisons notre langue pour louer le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu qui est notre Père. Mais ensuite nous l’utilisons pour dire de mauvaises choses contre les autres. C’est faux, parce que Dieu a fait que ces gens soient comme lui.'
