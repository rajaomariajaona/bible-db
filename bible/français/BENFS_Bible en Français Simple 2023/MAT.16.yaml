document_id: MAT.16
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 16
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' demandent à nouveau de voir un miracle'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelques '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadducéens
  - type: text
    text: ' sont allés voir Jésus. Ils voulaient que Jésus fasse quelque chose de mal. Ils lui ont dit : Fais un miracle. Nous verrons. Alors, nous saurons que Dieu t’a envoyé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus leur a répondu : Parfois, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' est rouge le soir. Ensuite, vous dites que demain le temps sera bon. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Parfois, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' est rouge le matin et le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' a des nuages sombres. Ensuite, vous dites qu’aujourd’hui, il y aura une tempête. Vous pouvez regarder le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Et puis, vous savez ce que le temps fera. Mais des choses spéciales se passent maintenant. Et vous ne comprenez pas ce qu’elles signifient. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les gens qui sont encore en vie aujourd’hui sont très mauvais. Ils ne respectent pas Dieu. Ils veulent que Dieu leur montre un miracle. Non ! Dieu ne vous montrera pas quoi que ce soit. Vous ne verrez que le miracle que Dieu avait fait à Jonas. Alors Jésus est allé, et les a laissés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus parle du levain des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadducéens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus et ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont passés de l’autre côté de la mer. Ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont oublié de prendre du pain avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus leur a dit : Attention, vous devez être prudents et veillez sur le levain des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadducéens
  - type: text
    text: ' et des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont commencé à parler les uns aux autres à ce sujet. Ils disaient : Jésus dit cela parce que nous n’avons pas apporté de pains avec nous. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus savait ce dont ils parlaient. Alors il leur a dit : Vous ne croyez toujours pas beaucoup en moi. Ne vous dites pas que vous n’avez pas de pains. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous ne me comprenez toujours pas. Rappelez‑vous les 5 pains qui ont nourri 5 000 hommes. Rappelez‑vous combien de paniers vous avez emportés. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rappelez‑vous les 7 pains qui ont nourri 4 000 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comprenez maintenant que je ne parlais pas de pains. Mais attention au levain des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadducéens
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont compris de quoi Jésus parlait. Jésus ne leur disait pas de faire attention au levain des pains. Ils devaient plutôt faire attention aux enseignements des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: ' et des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadducéens
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre dit qui est Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus est allé à un endroit appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' de Philippe. Pendant qu’il était là, il a posé une question à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il a dit : Dites‑moi. Quand les gens parlent du Fils de l’homme, que disent‑ils ? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils ont répondu : Certaines personnes disent que tu es Jean‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: '. D’autres personnes disent que tu es Élie. Et d’autres personnes disent que tu es Jérémie, ou un autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il leur a demandé : Que pensez‑vous. Qui suis‑je ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Simon Pierre lui a répondu : Tu es le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Dieu t’a envoyé. Tu es le Fils de Dieu qui est vivant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus a dit à Simon Pierre : Simon, fils de Jonas, Dieu t’a aidé. Aucune personne sur terre ne t’a appris cela. C’est Dieu, mon Père qui t’a appris cela. Il règne dans les cieux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je te dis ceci : Tu es Pierre, ce qui signifie un roc. Et je bâtirai mon Église sur ce roc. Même le pouvoir de la mort ne peut pas détruire mon Église. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je vais te donner les clés du Royaume où Dieu règne. Dieu acceptera tout ce que tu lieras et délieras au monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Ne dites à personne que je suis le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' comment il mourra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A partir de ce temps‑là, Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ceci : Je dois aller à Jérusalem. Là, les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ', les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ', et les enseignants de la loi de Dieu vont me faire du mal. Et ils me feront mourir. Mais 3 jours plus tard, Dieu me rendra encore vivant.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Pierre a conduit Jésus à l’écart d’autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Pierre n’a pas été d’accord avec ce que Jésus venait de dire. Il a sérieusement parlé à Jésus : Non, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Cela ne t’arrivera jamais !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus s’est tourné vers Pierre et lui a dit : Va loin de moi, Satan. Je dois obéir à Dieu. Mais tu essaies de m’arrêter. Tes pensées ne viennent pas de Dieu. Mais tu penses comme les hommes pensent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Jésus a dit à ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Quelqu’un peut vouloir me suivre. Alors, il doit laisser ce qu’il veut faire. Il doit porter une croix et il doit être prêt à mourir avec moi.  '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si une personne veut garder sa vie en toute sécurité, elle la perdra. Mais une personne peut mourir parce qu’elle croit en moi. Et alors elle aura la vraie vie, qui n’a pas de fin. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Quelqu’un peut avoir le monde entier pour lui‑même. Mais ce n’est pas bien s’il perd sa vie. Une personne ne peut rien donner en échange pour son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: âme
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le Fils de l’homme reviendra bientôt. Il reviendra de son père avec une grande gloire. Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' viendront avec lui. Il paiera chaque personne selon ses œuvres sur terre. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je vous dis la vérité : Je vais vous dire quelque chose sur les gens qui sont ici. Certains d’entre eux ne mourront pas avant de voir Jésus venir dans son règne.'
