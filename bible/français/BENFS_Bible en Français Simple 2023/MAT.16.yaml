verses:
  '1':
  - type: heading
    content: Chapitre 16
  - type: heading
    content: Les  Pharisiens demandent à nouveau de voir un miracle
  - type: text
    content: 'Quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et  '
  - type: text
    content: Sadducéens
  - type: text
    content: ' sont allés voir Jésus. Ils voulaient que Jésus fasse quelque chose de mal. Ils lui ont dit : Fais un miracle. Nous verrons. Alors, nous saurons que Dieu t’a envoyé.'
  '10':
  - type: text
    content: Rappelez‑vous les 7 pains qui ont nourri 4 000 hommes.
  '11':
  - type: text
    content: 'Comprenez maintenant que je ne parlais pas de pains. Mais attention au levain des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et des '
  - type: text
    content: Sadducéens
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Alors les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont compris de quoi Jésus parlait. Jésus ne leur disait pas de faire attention au levain des pains. Ils devaient plutôt faire attention aux enseignements des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et des '
  - type: text
    content: Sadducéens
  - type: text
    content: .
  - type: heading
    content: Pierre dit qui est Jésus
  '13':
  - type: text
    content: 'Jésus est allé à un endroit appelé '
  - type: text
    content: Césarée
  - type: text
    content: ' de Philippe. Pendant qu’il était là, il a posé une question à ses  '
  - type: text
    content: disciples
  - type: text
    content: '. Il a dit : Dites‑moi. Quand les gens parlent du Fils de l’homme, que disent‑ils ? '
  '14':
  - type: text
    content: 'Ils ont répondu : Certaines personnes disent que tu es Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: '. D’autres personnes disent que tu es Élie. Et d’autres personnes disent que tu es Jérémie, ou un autre '
  - type: text
    content: prophète
  - type: text
    content: .
  '15':
  - type: text
    content: 'Il leur a demandé : Que pensez‑vous. Qui suis‑je ?'
  '16':
  - type: text
    content: 'Simon Pierre lui a répondu : Tu es le  '
  - type: text
    content: Christ
  - type: text
    content: . Dieu t’a envoyé. Tu es le Fils de Dieu qui est vivant.
  '17':
  - type: text
    content: 'Jésus a dit à Simon Pierre : Simon, fils de Jonas, Dieu t’a aidé. Aucune personne sur terre ne t’a appris cela. C’est Dieu, mon Père qui t’a appris cela. Il règne dans les cieux. '
  '18':
  - type: text
    content: 'Je te dis ceci : Tu es Pierre, ce qui signifie un roc. Et je bâtirai mon Église sur ce roc. Même le pouvoir de la mort ne peut pas détruire mon Église. '
  '19':
  - type: text
    content: Je vais te donner les clés du Royaume où Dieu règne. Dieu acceptera tout ce que tu lieras et délieras au monde.
  '2':
  - type: text
    content: 'Jésus leur a répondu : Parfois, le  '
  - type: text
    content: ciel
  - type: text
    content: ' est rouge le soir. Ensuite, vous dites que demain le temps sera bon. '
  '20':
  - type: text
    content: 'Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Ne dites à personne que je suis le  '
  - type: text
    content: Christ
  - type: text
    content: .
  - type: heading
    content: Jésus dit à ses  disciples comment il mourra
  '21':
  - type: text
    content: 'A partir de ce temps‑là, Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: ' ceci : Je dois aller à Jérusalem. Là, les  '
  - type: text
    content: anciens
  - type: text
    content: ', les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ', et les enseignants de la loi de Dieu vont me faire du mal. Et ils me feront mourir. Mais 3 jours plus tard, Dieu me rendra encore vivant.'
  '22':
  - type: text
    content: 'Alors Pierre a conduit Jésus à l’écart d’autres '
  - type: text
    content: disciples
  - type: text
    content: '. Pierre n’a pas été d’accord avec ce que Jésus venait de dire. Il a sérieusement parlé à Jésus : Non, '
  - type: text
    content: Seigneur
  - type: text
    content: . Cela ne t’arrivera jamais !
  '23':
  - type: text
    content: 'Jésus s’est tourné vers Pierre et lui a dit : Va loin de moi, Satan. Je dois obéir à Dieu. Mais tu essaies de m’arrêter. Tes pensées ne viennent pas de Dieu. Mais tu penses comme les hommes pensent.'
  '24':
  - type: text
    content: 'Alors Jésus a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Quelqu’un peut vouloir me suivre. Alors, il doit laisser ce qu’il veut faire. Il doit porter une croix et il doit être prêt à mourir avec moi.  '
  '25':
  - type: text
    content: 'Si une personne veut garder sa vie en toute sécurité, elle la perdra. Mais une personne peut mourir parce qu’elle croit en moi. Et alors elle aura la vraie vie, qui n’a pas de fin. '
  '26':
  - type: text
    content: 'Quelqu’un peut avoir le monde entier pour lui‑même. Mais ce n’est pas bien s’il perd sa vie. Une personne ne peut rien donner en échange pour son  '
  - type: text
    content: âme
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Le Fils de l’homme reviendra bientôt. Il reviendra de son père avec une grande gloire. Les  '
  - type: text
    content: anges
  - type: text
    content: ' viendront avec lui. Il paiera chaque personne selon ses œuvres sur terre. '
  '28':
  - type: text
    content: 'Je vous dis la vérité : Je vais vous dire quelque chose sur les gens qui sont ici. Certains d’entre eux ne mourront pas avant de voir Jésus venir dans son règne.'
  '3':
  - type: text
    content: 'Parfois, le  '
  - type: text
    content: ciel
  - type: text
    content: ' est rouge le matin et le  '
  - type: text
    content: ciel
  - type: text
    content: ' a des nuages sombres. Ensuite, vous dites qu’aujourd’hui, il y aura une tempête. Vous pouvez regarder le  '
  - type: text
    content: ciel
  - type: text
    content: '. Et puis, vous savez ce que le temps fera. Mais des choses spéciales se passent maintenant. Et vous ne comprenez pas ce qu’elles signifient. '
  '4':
  - type: text
    content: Les gens qui sont encore en vie aujourd’hui sont très mauvais. Ils ne respectent pas Dieu. Ils veulent que Dieu leur montre un miracle. Non ! Dieu ne vous montrera pas quoi que ce soit. Vous ne verrez que le miracle que Dieu avait fait à Jonas. Alors Jésus est allé, et les a laissés.
  - type: heading
    content: Jésus parle du levain des Pharisiens et des Sadducéens
  '5':
  - type: text
    content: 'Jésus et ses  '
  - type: text
    content: disciples
  - type: text
    content: ' sont passés de l’autre côté de la mer. Ses  '
  - type: text
    content: disciples
  - type: text
    content: ' ont oublié de prendre du pain avec eux. '
  '6':
  - type: text
    content: 'Jésus leur a dit : Attention, vous devez être prudents et veillez sur le levain des '
  - type: text
    content: Sadducéens
  - type: text
    content: ' et des '
  - type: text
    content: Pharisiens
  - type: text
    content: .
  '7':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' ont commencé à parler les uns aux autres à ce sujet. Ils disaient : Jésus dit cela parce que nous n’avons pas apporté de pains avec nous. '
  '8':
  - type: text
    content: 'Jésus savait ce dont ils parlaient. Alors il leur a dit : Vous ne croyez toujours pas beaucoup en moi. Ne vous dites pas que vous n’avez pas de pains. '
  '9':
  - type: text
    content: 'Vous ne me comprenez toujours pas. Rappelez‑vous les 5 pains qui ont nourri 5 000 hommes. Rappelez‑vous combien de paniers vous avez emportés. '
