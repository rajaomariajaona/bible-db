document_id: ROM.13,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 13
  - type: heading
    content: Obéissez aux autorités
  - type: text
    content: 'Chacun doit obéir aux autorités. C’est Dieu qui donne l’autorité de régner. Les gens qui gouvernent ont reçu leur autorité de Dieu. '
  '10':
  - type: text
    content: Si vous aimez les autres, vous ne leur ferez jamais rien de mal. Ainsi, toute personne qui aime les autres a complètement obéi à la loi de Dieu.
  '11':
  - type: text
    content: 'Vivez de cette façon, parce que vous savez ce qui se passe dans ce temps. Il est temps d’arrêter de dormir. Il est maintenant temps de se réveiller. Le temps où Dieu nous sauvera complètement est proche. Ce moment est plus proche maintenant que lorsque nous avons cru en lui pour la première fois. '
  '12':
  - type: text
    content: La nuit est presque terminée et le jour est presque là. Donc, nous devons laisser de faire les mauvaises choses qui appartiennent à l’obscurité. Au lieu de cela, nous devons prendre des armes comme des soldats prêts à combattre dans la lumière.
  '13':
  - type: text
    content: 'Nous devons bien vivre, parce que nous vivons à la lumière du jour. Nous ne devons pas aller à des fêtes sauvages. Nous ne devons pas être ivres. Nous ne devons pas avoir de relations sexuelles avec quelqu’un qui n’est pas notre propre femme ou mari. Nous ne devons pas faire de mauvaises choses avec nos corps. Nous ne devons pas nous quereller. Nous ne devons pas être jaloux des autres. '
  '14':
  - type: text
    content: 'Au lieu de cela, vous devez vivre avec le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' comme votre guide. Ne pensez même pas aux mauvaises choses que vous voudrez peut‑être faire pour vous rendre heureux.'
  '2':
  - type: text
    content: Ainsi, quiconque refuse d’obéir à cette autorité refuse d’obéir à Dieu. Cette personne recevra la punition appropriée.
  '3':
  - type: text
    content: Les gens qui font de bonnes choses n’ont pas besoin d’avoir peur des dirigeants. Seules les personnes qui font de mauvaises choses auront peur des dirigeants. Voulez‑vous vivre et ne pas avoir peur des dirigeants ? Alors, vous devez faire de bonnes choses et les dirigeants vous respecteront.
  '4':
  - type: text
    content: 'Les dirigeants sont les serviteurs de Dieu. Ils vous aident à faire de bonnes choses. Mais si vous faites de mauvaises choses, vous devez avoir peur d’eux. Ils ont vraiment le pouvoir de punir les gens. Au nom de Dieu, ils punissent les gens qui font de mauvaises choses. '
  '5':
  - type: text
    content: Donc, vous devez obéir à ceux qui dirigent. Vous devez leur obéir non seulement pour qu’ils ne vous punissent pas. Mais vous devez également leur obéir, parce qu’il est juste de leur obéir. Et vous savez vous‑mêmes que c’est juste.
  '6':
  - type: text
    content: 'C’est aussi la raison pour laquelle vous payez des '
  - type: text
    content: impôts
  - type: text
    content: ' au gouvernement. Vous devez les payer, car les '
  - type: text
    content: officiers
  - type: text
    content: ' sont les serviteurs de Dieu. Ils font le travail que Dieu leur a donné. '
  '7':
  - type: text
    content: 'Vous devez donc donner à chacun ce que vous devez lui donner. Payez les '
  - type: text
    content: impôts
  - type: text
    content: ' aux personnes qui reçoivent l’argent des '
  - type: text
    content: impôts
  - type: text
    content: . Faites‑le pour chaque type de taxe. Respectez les personnes que vous devez respecter. Louez les gens que vous devez louer.
  - type: heading
    content: Les chrétiens doivent aimer d’autres personnes
  '8':
  - type: text
    content: Payez toujours vos dettes aux gens. La seule dette que vous devez avoir est de vous aimer les uns les autres. Toute personne qui aime les autres a complètement obéi à la loi de Dieu.
  '9':
  - type: text
    content: 'Les commandements de Dieu disent ceci : N’aie pas de relations sexuelles avec une personne qui n’est pas ta propre femme ou ton propre mari. Ne tue personne. Ne vole personne. Ne désire pas de choses qui appartiennent à d’autres personnes. Tous ces commandements font un seul : Ce seul commandement est : Aime les autres comme tu t’aimes toi‑même. '
