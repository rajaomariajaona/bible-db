document_id: ROM.13
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obéissez aux autorités
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Chacun doit obéir aux autorités. C’est Dieu qui donne l’autorité de régner. Les gens qui gouvernent ont reçu leur autorité de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ainsi, quiconque refuse d’obéir à cette autorité refuse d’obéir à Dieu. Cette personne recevra la punition appropriée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les gens qui font de bonnes choses n’ont pas besoin d’avoir peur des dirigeants. Seules les personnes qui font de mauvaises choses auront peur des dirigeants. Voulez‑vous vivre et ne pas avoir peur des dirigeants ? Alors, vous devez faire de bonnes choses et les dirigeants vous respecteront.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les dirigeants sont les serviteurs de Dieu. Ils vous aident à faire de bonnes choses. Mais si vous faites de mauvaises choses, vous devez avoir peur d’eux. Ils ont vraiment le pouvoir de punir les gens. Au nom de Dieu, ils punissent les gens qui font de mauvaises choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Donc, vous devez obéir à ceux qui dirigent. Vous devez leur obéir non seulement pour qu’ils ne vous punissent pas. Mais vous devez également leur obéir, parce qu’il est juste de leur obéir. Et vous savez vous‑mêmes que c’est juste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est aussi la raison pour laquelle vous payez des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: impôts
  - type: text
    text: ' au gouvernement. Vous devez les payer, car les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' sont les serviteurs de Dieu. Ils font le travail que Dieu leur a donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous devez donc donner à chacun ce que vous devez lui donner. Payez les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: impôts
  - type: text
    text: ' aux personnes qui reçoivent l’argent des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: impôts
  - type: text
    text: . Faites‑le pour chaque type de taxe. Respectez les personnes que vous devez respecter. Louez les gens que vous devez louer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens doivent aimer d’autres personnes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Payez toujours vos dettes aux gens. La seule dette que vous devez avoir est de vous aimer les uns les autres. Toute personne qui aime les autres a complètement obéi à la loi de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les commandements de Dieu disent ceci : N’aie pas de relations sexuelles avec une personne qui n’est pas ta propre femme ou ton propre mari. Ne tue personne. Ne vole personne. Ne désire pas de choses qui appartiennent à d’autres personnes. Tous ces commandements font un seul : Ce seul commandement est : Aime les autres comme tu t’aimes toi‑même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si vous aimez les autres, vous ne leur ferez jamais rien de mal. Ainsi, toute personne qui aime les autres a complètement obéi à la loi de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vivez de cette façon, parce que vous savez ce qui se passe dans ce temps. Il est temps d’arrêter de dormir. Il est maintenant temps de se réveiller. Le temps où Dieu nous sauvera complètement est proche. Ce moment est plus proche maintenant que lorsque nous avons cru en lui pour la première fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La nuit est presque terminée et le jour est presque là. Donc, nous devons laisser de faire les mauvaises choses qui appartiennent à l’obscurité. Au lieu de cela, nous devons prendre des armes comme des soldats prêts à combattre dans la lumière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous devons bien vivre, parce que nous vivons à la lumière du jour. Nous ne devons pas aller à des fêtes sauvages. Nous ne devons pas être ivres. Nous ne devons pas avoir de relations sexuelles avec quelqu’un qui n’est pas notre propre femme ou mari. Nous ne devons pas faire de mauvaises choses avec nos corps. Nous ne devons pas nous quereller. Nous ne devons pas être jaloux des autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Au lieu de cela, vous devez vivre avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' comme votre guide. Ne pensez même pas aux mauvaises choses que vous voudrez peut‑être faire pour vous rendre heureux.'
