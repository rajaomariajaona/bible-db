document_id: 1CO.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu veut que son peuple grandisse en croyant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mes amis chrétiens, je ne pouvais pas vous enseigner comme les gens qui ont l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. J’ai dû vous enseigner comme des personnes qui n’appartiennent qu’à ce monde. Vous étiez comme de petits enfants qui ne comprenaient pas très bien le message concernant Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis comme un bon constructeur. Dieu m’a donné ce travail et il m’a aidé à bien le faire. Moi, j’ai construit la fondation. Maintenant, d’autres personnes s’appuient sur cette fondation. Mais chaque personne doit faire attention à la façon dont elle construit. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a déjà placé Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' comme la seule fondation de ce bâtiment. Donc, personne ne peut y mettre d’autre fondation.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens peuvent construire sur cette fondation avec de l’or, de l’argent ou des pierres précieuses. Ou ils peuvent construire dessus avec du bois, de l’herbe sèche ou des feuilles. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Dieu montrera clairement à quel point le travail de chaque constructeur est bon. Dieu mettra le travail de chaque personne dans un feu ce jour‑là. Le feu montrera si leur travail est bon ou mauvais. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le feu ne détruit pas le travail d’un constructeur, ce bâtisseur recevra de Dieu de bonnes choses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si le feu détruit le travail d’un constructeur, cette personne perdra tout. La personne elle‑même sera en sécurité. Mais elle sera comme quelqu’un qui a traversé le feu vers un endroit sûr.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous savez sûrement que vous êtes comme la maison spéciale de Dieu. En tant que peuple de Dieu, l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu vit en vous. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un détruit la maison spéciale de Dieu, alors Dieu détruira cette personne. Et vous êtes comme cette maison. Vous appartenez à Dieu d’une manière spéciale.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soyez prudents ! Ne pensez pas que vous êtes meilleurs, mais vous ne l’êtes vraiment pas. Peut‑être, pensez‑vous que vous êtes sages, comme les gens d’aujourd’hui veulent être sages. Mais si vous voulez devenir vraiment sages, acceptez que les autres pensent que vous êtes des imbéciles. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens dans ce monde pensent que certaines personnes sont sages. Mais Dieu pense que ces sages sont des fous. Il est dit dans la Bible :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu fait que les pensées intelligentes des sages les confondent.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai dû vous enseigner des choses faciles à comprendre, comme une mère donne du lait à un bébé. Vous n’étiez pas encore prêts à recevoir une nourriture forte. Et vous n’êtes toujours pas prêts à recevoir le message complet de Dieu ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans un autre endroit, la Bible dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sait que les pensées des sages n’ont aucune valeur.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour cette raison, vous ne devez pas glorifier un dirigeant humain. Tous les dirigeants sont là pour vous servir, en tant que peuple de Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne vous glorifiez pas de Paul, Apollos ou de Pierre. Nous vous appartenons. Tout ce monde, et la vie et la mort vous appartiennent. Les choses d’aujourd’hui et de demain vous appartiennent. Tout vous appartient, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vous appartenez à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', et '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' appartient à Dieu.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous faites toujours ce que votre nature humaine veut faire. Vous êtes jaloux les uns des autres et vous vous disputez. Oui ! Cela montre que vous faites ce que votre nature humaine veut faire. Vous vivez comme des gens qui ne connaissent pas Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains d’entre vous disent : Paul est mon chef. Et d’autres personnes disent : Apollos est mon chef. Quand vous parlez comme ça, vous parlez comme des gens qui appartiennent à ce monde.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Apollos est‑il important ? Paul est‑il important ? Non ! Nous sommes les serviteurs de Dieu. Nous vous avons dit la Bonne Nouvelle de Dieu et vous avez cru à cela. Chacun de nous fait le travail que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous a donné. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand je vous ai dit la Bonne Nouvelle de Dieu, j’étais comme quelqu’un qui a planté des graines. Ensuite, Apollos était comme quelqu’un qui donnait de l’eau aux jeunes plantes. Mais c’est Dieu qui a tout fait grandir. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La personne qui plante les graines n’est pas importante. La personne qui donne de l’eau aux plantes n’est pas importante. La personne importante est Dieu, car il fait tout grandir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La personne qui plante et la personne qui donne de l’eau ont toutes 2 le même but. Dieu paiera à chacun ce qui convient à son travail. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Apollos et moi travaillons ensemble comme serviteurs de Dieu. Vous êtes comme le champ de Dieu dans lequel nous travaillons.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous êtes aussi comme un bâtiment qui appartient à Dieu.
