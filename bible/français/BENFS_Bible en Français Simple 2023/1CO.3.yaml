document_id: 1CO.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Dieu veut que son peuple grandisse en croyant
  - type: text
    content: Mes amis chrétiens, je ne pouvais pas vous enseigner comme les gens qui ont l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. J’ai dû vous enseigner comme des personnes qui n’appartiennent qu’à ce monde. Vous étiez comme de petits enfants qui ne comprenaient pas très bien le message concernant Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Je suis comme un bon constructeur. Dieu m’a donné ce travail et il m’a aidé à bien le faire. Moi, j’ai construit la fondation. Maintenant, d’autres personnes s’appuient sur cette fondation. Mais chaque personne doit faire attention à la façon dont elle construit. '
  '11':
  - type: text
    content: Dieu a déjà placé Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' comme la seule fondation de ce bâtiment. Donc, personne ne peut y mettre d’autre fondation.'
  '12':
  - type: text
    content: 'Les gens peuvent construire sur cette fondation avec de l’or, de l’argent ou des pierres précieuses. Ou ils peuvent construire dessus avec du bois, de l’herbe sèche ou des feuilles. '
  '13':
  - type: text
    content: 'Un jour, Dieu montrera clairement à quel point le travail de chaque constructeur est bon. Dieu mettra le travail de chaque personne dans un feu ce jour‑là. Le feu montrera si leur travail est bon ou mauvais. '
  '14':
  - type: text
    content: 'Si le feu ne détruit pas le travail d’un constructeur, ce bâtisseur recevra de Dieu de bonnes choses. '
  '15':
  - type: text
    content: Mais si le feu détruit le travail d’un constructeur, cette personne perdra tout. La personne elle‑même sera en sécurité. Mais elle sera comme quelqu’un qui a traversé le feu vers un endroit sûr.
  '16':
  - type: text
    content: Vous savez sûrement que vous êtes comme la maison spéciale de Dieu. En tant que peuple de Dieu, l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vit en vous. '
  '17':
  - type: text
    content: Si quelqu’un détruit la maison spéciale de Dieu, alors Dieu détruira cette personne. Et vous êtes comme cette maison. Vous appartenez à Dieu d’une manière spéciale.
  '18':
  - type: text
    content: 'Soyez prudents ! Ne pensez pas que vous êtes meilleurs, mais vous ne l’êtes vraiment pas. Peut‑être, pensez‑vous que vous êtes sages, comme les gens d’aujourd’hui veulent être sages. Mais si vous voulez devenir vraiment sages, acceptez que les autres pensent que vous êtes des imbéciles. '
  '19':
  - type: text
    content: 'Les gens dans ce monde pensent que certaines personnes sont sages. Mais Dieu pense que ces sages sont des fous. Il est dit dans la Bible :'
  - type: text
    content: Dieu fait que les pensées intelligentes des sages les confondent.
  '2':
  - type: text
    content: 'J’ai dû vous enseigner des choses faciles à comprendre, comme une mère donne du lait à un bébé. Vous n’étiez pas encore prêts à recevoir une nourriture forte. Et vous n’êtes toujours pas prêts à recevoir le message complet de Dieu ! '
  '20':
  - type: text
    content: 'Dans un autre endroit, la Bible dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sait que les pensées des sages n’ont aucune valeur.'
  '21':
  - type: text
    content: 'Pour cette raison, vous ne devez pas glorifier un dirigeant humain. Tous les dirigeants sont là pour vous servir, en tant que peuple de Dieu. '
  '22':
  - type: text
    content: 'Ne vous glorifiez pas de Paul, Apollos ou de Pierre. Nous vous appartenons. Tout ce monde, et la vie et la mort vous appartiennent. Les choses d’aujourd’hui et de demain vous appartiennent. Tout vous appartient, '
  '23':
  - type: text
    content: 'vous appartenez à '
  - type: text
    content: Christ
  - type: text
    content: ', et '
  - type: text
    content: Christ
  - type: text
    content: ' appartient à Dieu.'
  '3':
  - type: text
    content: 'Vous faites toujours ce que votre nature humaine veut faire. Vous êtes jaloux les uns des autres et vous vous disputez. Oui ! Cela montre que vous faites ce que votre nature humaine veut faire. Vous vivez comme des gens qui ne connaissent pas Dieu. '
  '4':
  - type: text
    content: 'Certains d’entre vous disent : Paul est mon chef. Et d’autres personnes disent : Apollos est mon chef. Quand vous parlez comme ça, vous parlez comme des gens qui appartiennent à ce monde.'
  '5':
  - type: text
    content: 'Apollos est‑il important ? Paul est‑il important ? Non ! Nous sommes les serviteurs de Dieu. Nous vous avons dit la Bonne Nouvelle de Dieu et vous avez cru à cela. Chacun de nous fait le travail que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a donné. '
  '6':
  - type: text
    content: 'Quand je vous ai dit la Bonne Nouvelle de Dieu, j’étais comme quelqu’un qui a planté des graines. Ensuite, Apollos était comme quelqu’un qui donnait de l’eau aux jeunes plantes. Mais c’est Dieu qui a tout fait grandir. '
  '7':
  - type: text
    content: 'La personne qui plante les graines n’est pas importante. La personne qui donne de l’eau aux plantes n’est pas importante. La personne importante est Dieu, car il fait tout grandir. '
  '8':
  - type: text
    content: 'La personne qui plante et la personne qui donne de l’eau ont toutes 2 le même but. Dieu paiera à chacun ce qui convient à son travail. '
  '9':
  - type: text
    content: Apollos et moi travaillons ensemble comme serviteurs de Dieu. Vous êtes comme le champ de Dieu dans lequel nous travaillons.
  - type: text
    content: Vous êtes aussi comme un bâtiment qui appartient à Dieu.
