document_id: LUK.23
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 23
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pilate interroge Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tous les gens à la réunion se sont levés. Ils ont conduit Jésus devant Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ensuite, ils disaient à Pilate ceci : Jésus avait fait de mauvaises choses. Ils disaient : Nous avons trouvé cet homme dire à nos gens de mauvaises choses. Il disait que nous ne devons pas payer l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: impôt
  - type: text
    text: ' pour l’État. Il disait également que lui‑même est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ', un Roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pilate a demandé à Jésus : Es‑tu le Roi des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '  ? Jésus a répondu :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ce que tu dis est vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate a ensuite parlé aux chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et à tous ceux qui étaient là. Je ne trouve aucun mal que cet homme a fait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils ont continué de parler fortement contre Jésus : Il rend les gens en colère et prêts à se battre. Il enseignait ces choses partout en Judée. Il a commencé en Galilée et maintenant il est venu à Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pilate a entendu parler de la Galilée. Ainsi, il a demandé si Jésus venait de la Galilée. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils ont répondu : Oui. Hérode était à Jérusalem en ce moment‑là. Il dirigeait aussi la Galilée. Alors, Pilate a envoyé Jésus chez Hérode.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hérode pose des questions Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hérode était très heureux de voir Jésus. Il entendait parler de lui et il voulait le rencontrer pendant une longue période. Il espérait qu’il allait voir Jésus faire quelque chose de puissant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il lui posait beaucoup de questions, mais Jésus ne lui répondait pas. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient là tout le temps. Ils criaient que Jésus avait fait beaucoup de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Hérode et ses soldats ont commencé à se moquer de Jésus. Ils lui disaient des choses qui faisaient mal au cœur. Ils ont mis un beau '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: ' sur lui. Puis Hérode l’a renvoyé chez Pilate. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hérode et Pilate sont devenus amis le même jour. Ils ne s’aimaient pas avant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Pilate et les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' se disputent au sujet de Jésus'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pilate a alors appelé tous les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les dirigeants des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il leur a dit ceci : Amenez‑moi cet homme. Vous avez dit qu’il disait aux gens d’être contre leurs dirigeants. Écoutez ! Je lui ai posé quelques questions en face de vous. Mais je n’ai trouvé aucune faute contre lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hérode n’a pas non plus trouvé de faute contre lui. Après tout, il l’a renvoyé ici. Donc, vous pouvez voir que cet homme n’a rien fait de mal. Il n’y a aucune raison pour moi de dire : Tuez‑le. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Donc, je vais commander à un soldat de le fouetter. Ensuite, je vais le laisser rentrer à la maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '(Pilate devait laisser une personne sortir de la prison au moment de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: .)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors, la foule criait ensemble : Fais mourir Jésus sur la croix. Nous voulons que Barabbas sorte de la prison.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Barabbas avait dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' de lutter contre les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: '. Il avait également tué quelqu’un dans la lutte. Ainsi, les dirigeants l’avaient mis en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pilate voulait encore relâcher Jésus. Donc, il a de nouveau parlé à la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais les gens criaient encore : Qu’on le tue sur la croix, qu’on le tue sur la croix.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilate leur a posé la même question pour la troisième fois : Pourquoi voulez‑vous que je le fasse mourir sur une croix ? Quelles mauvaises choses il a faites ? Vous voulez que je dise qu’il doit mourir ? Je n’ai trouvé en lui aucune faute pour le tuer. Donc, je vais commander à mes soldats de le fouetter. Ensuite, je vais le laisser partir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais ils ont continué à crier. Qu’on le tue sur la croix ! Ils criaient beaucoup. Ainsi, ils ont obtenu ce qu’ils voulaient. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Finalement Pilate a dit : Tuez‑le sur une croix comme vous voulez. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils ont demandé à Pilate de laisser Barabbas sortir de la prison. Barabbas avait poussé les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à être contre les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: . Il avait également tué quelqu’un quand il combattait les dirigeants. C’était l’homme que Pilate a laissé libre. Quant à Jésus, Pilate a ordonné à ses soldats de l’emmener. Et il leur a ordonné de faire ce que la foule voulait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors ils ont commencé à emmener Jésus à l’endroit où ils allaient le tuer. Sur le chemin, ils se sont emparés d’un homme appelé Simon. Cet homme était de la ville appelée Cyrène. Il venait de l’extérieur de la ville. Les soldats ont pris la croix que Jésus portait sur ses épaules. Ils ont dit à Simon : Porte cette croix pour Jésus. Alors, Simon a porté la croix et il marchait derrière Jésus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus dit ce qui va arriver à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Une très grande foule de gens suivait Jésus. Il y avait beaucoup de femmes parmi eux. Elles pleuraient à grands cris. Elles frappaient leur propre corps, car elles étaient très tristes. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Jésus s’est retourné et il leur a dit : Vous les femmes qui vivez à Jérusalem, ne pleurez pas pour moi. Pleurez pour vous et pour vos enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Écoutez ! Les jours viendront où l’on dira : Les femmes qui ne pouvaient pas avoir des bébés sont heureuses. Les femmes qui n’ont pas de bébés à nourrir sont heureuses. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ensuite, les gens vont commencer à dire : Ce serait mieux si nous étions morts. Ils demanderont aux montagnes de tomber sur eux. Ils demanderont aux collines de les couvrir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Je suis comme un bois vert, mais les hommes font cela pour moi. Comment sera alors pour un bois sec !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les soldats mettent Jésus sur une croix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les soldats ont emmené 2 autres hommes de la prison. Ces hommes avaient fait de mauvaises choses. C’était pour les tuer avec Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ils les ont amenés à l’endroit qui est appelé le crâne. Là, ils ont mis Jésus sur une croix. Ils ont également mis les 2 hommes mauvais, chacun sur une croix. L’un de ces hommes était sur le côté droit de Jésus. L’autre était sur le côté gauche de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus a dit : Père, ils ne savent pas ce qu’ils font. Alors s’il te plaît, pardonne‑leur. Les soldats ont ensuite ramassé les vêtements que Jésus portait. Chaque soldat avait une partie. Donc, ils ont fait un jeu entre eux. C’était pour savoir qui allait gagner chaque pièce. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les gens se tenaient là. Ils regardaient, mais les chefs du peuple se moquaient de Jésus. Ils disaient : Il a sauvé les autres. Il doit sauver sa propre vie. Alors nous saurons qu’il est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: '. Nous saurons que Dieu l’a choisi. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les soldats aussi se moquaient de lui. Ils sont venus auprès de lui. Ils lui ont donné du vinaigre. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ils disaient : Si tu es le Roi des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', sauve ta propre vie. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il y avait aussi une note au sommet de la croix. Elle disait ceci : Celui‑ci est le Roi des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'L’un des hommes sur une croix à côté de Jésus a commencé à parler mal contre lui. Il a dit : Si tu es le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ', sauve ta propre vie et nos vies aussi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Mais l’autre mauvais homme lui a dit : tu es condamné à mort comme lui. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Nous 2, nous avons fait de très mauvaises choses. Donc, il est juste que nous mourions. Mais cet homme n’a rien fait de mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Alors l’homme a parlé à Jésus. Il a dit : Souviens‑toi de moi quand tu deviendras Roi. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus lui a répondu : Je te promets, aujourd’hui, tu seras avec moi dans le Paradis.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus meurt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Il était environ midi, mais le soleil a arrêté de briller. Donc, tout le pays était dans l’obscurité jusqu’à 15 heures.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Puis le rideau dans la salle spéciale à l’intérieur du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' de Dieu s’est déchiré par le milieu en 2 parties. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Et Jésus a crié à haute voix : Père, je remets mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' à toi. Après avoir crié cela, il est mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il y avait un chef des soldats là. Il regardait les soldats faire leur travail. Il a vu ce qui était arrivé. Il a dit : Dieu est grand et puissant. Je suis sûr que cet homme n’avait rien fait de mal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Une très grande foule de gens est venue. Ces gens sont venus pour voir ces hommes mourir sur des croix. Ils ont vu ce qui était arrivé. Ensuite, ils ont commencé à rentrer chez eux. Ils étaient très tristes. Ils frappaient leur propre corps avec leurs mains. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Les amis de Jésus se tenaient bien loin. Les femmes qui les suivaient depuis la Galilée étaient là aussi. Toutes ces personnes voyaient aussi ce qui lui est arrivé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph enterre Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Un homme appelé Joseph était là aussi. Il faisait partie d’un groupe spécial des dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' importants. C’était un homme bon qui voulait bien faire les choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Joseph n’était pas d’accord avec eux pour tuer Jésus. Il était originaire de la ville juive appelée Arimathée. Il attendait que Dieu commence à gouverner son peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Alors, il est allé voir Pilate. Il a demandé le corps de Jésus. Pilate a accepté. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Joseph s’est rendu ensuite à l’endroit où Jésus est mort. Il a pris le corps mort de la croix. Il l’a couvert dans un long morceau de bon drap. Il a mis le corps dans le trou du roc. Il avait fait creuser ce trou dans le roc. C’était un endroit pour enterrer un corps mort. C’était la première fois que quelqu’un l’avait utilisé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Tout cela est arrivé le jour où les gens préparaient les repas pour le jour de repos. Le temps approchait pour commencer ce jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Ainsi, les femmes qui étaient venues avec Jésus depuis la Galilée ont suivi Joseph. Elles ont vu l’endroit où était le trou dans la roche. Elles ont également vu Joseph mettre le corps de Jésus dans le trou vide.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Alors elles sont retournées à la maison où elles restaient à Jérusalem. Là, elles avaient préparé des épices et des parfums. Ensuite, elles ont arrêté le travail, parce que le jour de repos commençait. Elles devaient obéir à cette loi de Dieu.
