document_id: LUK.23,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 23
  - type: heading
    content: Pilate interroge Jésus
  - type: text
    content: Tous les gens à la réunion se sont levés. Ils ont conduit Jésus devant Pilate.
  '10':
  - type: text
    content: 'Les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient là tout le temps. Ils criaient que Jésus avait fait beaucoup de mauvaises choses. '
  '11':
  - type: text
    content: 'Alors Hérode et ses soldats ont commencé à se moquer de Jésus. Ils lui disaient des choses qui faisaient mal au cœur. Ils ont mis un beau '
  - type: text
    content: manteau
  - type: text
    content: ' sur lui. Puis Hérode l’a renvoyé chez Pilate. '
  '12':
  - type: text
    content: Hérode et Pilate sont devenus amis le même jour. Ils ne s’aimaient pas avant.
  - type: heading
    content: Pilate et les dirigeants des Juifs se disputent au sujet de Jésus
  '13':
  - type: text
    content: 'Pilate a alors appelé tous les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les dirigeants des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Il leur a dit ceci : Amenez‑moi cet homme. Vous avez dit qu’il disait aux gens d’être contre leurs dirigeants. Écoutez ! Je lui ai posé quelques questions en face de vous. Mais je n’ai trouvé aucune faute contre lui.'
  '15':
  - type: text
    content: 'Hérode n’a pas non plus trouvé de faute contre lui. Après tout, il l’a renvoyé ici. Donc, vous pouvez voir que cet homme n’a rien fait de mal. Il n’y a aucune raison pour moi de dire : Tuez‑le. '
  '16':
  - type: text
    content: Donc, je vais commander à un soldat de le fouetter. Ensuite, je vais le laisser rentrer à la maison.
  '17':
  - type: text
    content: '(Pilate devait laisser une personne sortir de la prison au moment de la '
  - type: text
    content: Pâque
  - type: text
    content: .)
  '18':
  - type: text
    content: 'Alors, la foule criait ensemble : Fais mourir Jésus sur la croix. Nous voulons que Barabbas sorte de la prison.'
  '19':
  - type: text
    content: 'Barabbas avait dit aux '
  - type: text
    content: Juifs
  - type: text
    content: ' de lutter contre les dirigeants '
  - type: text
    content: romains
  - type: text
    content: '. Il avait également tué quelqu’un dans la lutte. Ainsi, les dirigeants l’avaient mis en prison. '
  '2':
  - type: text
    content: 'Ensuite, ils disaient à Pilate ceci : Jésus avait fait de mauvaises choses. Ils disaient : Nous avons trouvé cet homme dire à nos gens de mauvaises choses. Il disait que nous ne devons pas payer l’'
  - type: text
    content: impôt
  - type: text
    content: ' pour l’État. Il disait également que lui‑même est le '
  - type: text
    content: Messie
  - type: text
    content: ', un Roi.'
  '20':
  - type: text
    content: 'Pilate voulait encore relâcher Jésus. Donc, il a de nouveau parlé à la foule. '
  '21':
  - type: text
    content: 'Mais les gens criaient encore : Qu’on le tue sur la croix, qu’on le tue sur la croix.'
  '22':
  - type: text
    content: 'Pilate leur a posé la même question pour la troisième fois : Pourquoi voulez‑vous que je le fasse mourir sur une croix ? Quelles mauvaises choses il a faites ? Vous voulez que je dise qu’il doit mourir ? Je n’ai trouvé en lui aucune faute pour le tuer. Donc, je vais commander à mes soldats de le fouetter. Ensuite, je vais le laisser partir.'
  '23':
  - type: text
    content: 'Mais ils ont continué à crier. Qu’on le tue sur la croix ! Ils criaient beaucoup. Ainsi, ils ont obtenu ce qu’ils voulaient. '
  '24':
  - type: text
    content: 'Finalement Pilate a dit : Tuez‑le sur une croix comme vous voulez. '
  '25':
  - type: text
    content: 'Ils ont demandé à Pilate de laisser Barabbas sortir de la prison. Barabbas avait poussé les '
  - type: text
    content: Juifs
  - type: text
    content: ' à être contre les dirigeants '
  - type: text
    content: romains
  - type: text
    content: . Il avait également tué quelqu’un quand il combattait les dirigeants. C’était l’homme que Pilate a laissé libre. Quant à Jésus, Pilate a ordonné à ses soldats de l’emmener. Et il leur a ordonné de faire ce que la foule voulait.
  '26':
  - type: text
    content: 'Alors ils ont commencé à emmener Jésus à l’endroit où ils allaient le tuer. Sur le chemin, ils se sont emparés d’un homme appelé Simon. Cet homme était de la ville appelée Cyrène. Il venait de l’extérieur de la ville. Les soldats ont pris la croix que Jésus portait sur ses épaules. Ils ont dit à Simon : Porte cette croix pour Jésus. Alors, Simon a porté la croix et il marchait derrière Jésus.'
  - type: heading
    content: Jésus dit ce qui va arriver à Jérusalem
  '27':
  - type: text
    content: 'Une très grande foule de gens suivait Jésus. Il y avait beaucoup de femmes parmi eux. Elles pleuraient à grands cris. Elles frappaient leur propre corps, car elles étaient très tristes. '
  '28':
  - type: text
    content: 'Alors Jésus s’est retourné et il leur a dit : Vous les femmes qui vivez à Jérusalem, ne pleurez pas pour moi. Pleurez pour vous et pour vos enfants. '
  '29':
  - type: text
    content: 'Écoutez ! Les jours viendront où l’on dira : Les femmes qui ne pouvaient pas avoir des bébés sont heureuses. Les femmes qui n’ont pas de bébés à nourrir sont heureuses. '
  '3':
  - type: text
    content: 'Pilate a demandé à Jésus : Es‑tu le Roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ? Jésus a répondu :'
  - type: text
    content: 'Ce que tu dis est vrai. '
  '30':
  - type: text
    content: 'Ensuite, les gens vont commencer à dire : Ce serait mieux si nous étions morts. Ils demanderont aux montagnes de tomber sur eux. Ils demanderont aux collines de les couvrir.'
  '31':
  - type: text
    content: Je suis comme un bois vert, mais les hommes font cela pour moi. Comment sera alors pour un bois sec !
  - type: heading
    content: Les soldats mettent Jésus sur une croix
  '32':
  - type: text
    content: 'Les soldats ont emmené 2 autres hommes de la prison. Ces hommes avaient fait de mauvaises choses. C’était pour les tuer avec Jésus. '
  '33':
  - type: text
    content: Ils les ont amenés à l’endroit qui est appelé le crâne. Là, ils ont mis Jésus sur une croix. Ils ont également mis les 2 hommes mauvais, chacun sur une croix. L’un de ces hommes était sur le côté droit de Jésus. L’autre était sur le côté gauche de Jésus.
  '34':
  - type: text
    content: 'Jésus a dit : Père, ils ne savent pas ce qu’ils font. Alors s’il te plaît, pardonne‑leur. Les soldats ont ensuite ramassé les vêtements que Jésus portait. Chaque soldat avait une partie. Donc, ils ont fait un jeu entre eux. C’était pour savoir qui allait gagner chaque pièce. '
  '35':
  - type: text
    content: 'Les gens se tenaient là. Ils regardaient, mais les chefs du peuple se moquaient de Jésus. Ils disaient : Il a sauvé les autres. Il doit sauver sa propre vie. Alors nous saurons qu’il est le '
  - type: text
    content: Messie
  - type: text
    content: '. Nous saurons que Dieu l’a choisi. '
  '36':
  - type: text
    content: 'Les soldats aussi se moquaient de lui. Ils sont venus auprès de lui. Ils lui ont donné du vinaigre. '
  '37':
  - type: text
    content: 'Ils disaient : Si tu es le Roi des '
  - type: text
    content: Juifs
  - type: text
    content: ', sauve ta propre vie. '
  '38':
  - type: text
    content: 'Il y avait aussi une note au sommet de la croix. Elle disait ceci : Celui‑ci est le Roi des '
  - type: text
    content: Juifs
  - type: text
    content: .
  '39':
  - type: text
    content: 'L’un des hommes sur une croix à côté de Jésus a commencé à parler mal contre lui. Il a dit : Si tu es le '
  - type: text
    content: Messie
  - type: text
    content: ', sauve ta propre vie et nos vies aussi.'
  '4':
  - type: text
    content: 'Pilate a ensuite parlé aux chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et à tous ceux qui étaient là. Je ne trouve aucun mal que cet homme a fait.'
  '40':
  - type: text
    content: 'Mais l’autre mauvais homme lui a dit : tu es condamné à mort comme lui. '
  '41':
  - type: text
    content: Nous 2, nous avons fait de très mauvaises choses. Donc, il est juste que nous mourions. Mais cet homme n’a rien fait de mal.
  '42':
  - type: text
    content: 'Alors l’homme a parlé à Jésus. Il a dit : Souviens‑toi de moi quand tu deviendras Roi. '
  '43':
  - type: text
    content: 'Jésus lui a répondu : Je te promets, aujourd’hui, tu seras avec moi dans le Paradis.'
  - type: heading
    content: Jésus meurt
  '44':
  - type: text
    content: Il était environ midi, mais le soleil a arrêté de briller. Donc, tout le pays était dans l’obscurité jusqu’à 15 heures.
  '45':
  - type: text
    content: 'Puis le rideau dans la salle spéciale à l’intérieur du '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu s’est déchiré par le milieu en 2 parties. '
  '46':
  - type: text
    content: 'Et Jésus a crié à haute voix : Père, je remets mon '
  - type: text
    content: esprit
  - type: text
    content: ' à toi. Après avoir crié cela, il est mort.'
  '47':
  - type: text
    content: 'Il y avait un chef des soldats là. Il regardait les soldats faire leur travail. Il a vu ce qui était arrivé. Il a dit : Dieu est grand et puissant. Je suis sûr que cet homme n’avait rien fait de mal.'
  '48':
  - type: text
    content: 'Une très grande foule de gens est venue. Ces gens sont venus pour voir ces hommes mourir sur des croix. Ils ont vu ce qui était arrivé. Ensuite, ils ont commencé à rentrer chez eux. Ils étaient très tristes. Ils frappaient leur propre corps avec leurs mains. '
  '49':
  - type: text
    content: Les amis de Jésus se tenaient bien loin. Les femmes qui les suivaient depuis la Galilée étaient là aussi. Toutes ces personnes voyaient aussi ce qui lui est arrivé.
  - type: heading
    content: Joseph enterre Jésus
  '5':
  - type: text
    content: 'Mais ils ont continué de parler fortement contre Jésus : Il rend les gens en colère et prêts à se battre. Il enseignait ces choses partout en Judée. Il a commencé en Galilée et maintenant il est venu à Jérusalem.'
  '50':
  - type: text
    content: 'Un homme appelé Joseph était là aussi. Il faisait partie d’un groupe spécial des dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' importants. C’était un homme bon qui voulait bien faire les choses.'
  '51':
  - type: text
    content: Joseph n’était pas d’accord avec eux pour tuer Jésus. Il était originaire de la ville juive appelée Arimathée. Il attendait que Dieu commence à gouverner son peuple.
  '52':
  - type: text
    content: 'Alors, il est allé voir Pilate. Il a demandé le corps de Jésus. Pilate a accepté. '
  '53':
  - type: text
    content: Joseph s’est rendu ensuite à l’endroit où Jésus est mort. Il a pris le corps mort de la croix. Il l’a couvert dans un long morceau de bon drap. Il a mis le corps dans le trou du roc. Il avait fait creuser ce trou dans le roc. C’était un endroit pour enterrer un corps mort. C’était la première fois que quelqu’un l’avait utilisé.
  '54':
  - type: text
    content: Tout cela est arrivé le jour où les gens préparaient les repas pour le jour de repos. Le temps approchait pour commencer ce jour.
  '55':
  - type: text
    content: Ainsi, les femmes qui étaient venues avec Jésus depuis la Galilée ont suivi Joseph. Elles ont vu l’endroit où était le trou dans la roche. Elles ont également vu Joseph mettre le corps de Jésus dans le trou vide.
  '56':
  - type: text
    content: Alors elles sont retournées à la maison où elles restaient à Jérusalem. Là, elles avaient préparé des épices et des parfums. Ensuite, elles ont arrêté le travail, parce que le jour de repos commençait. Elles devaient obéir à cette loi de Dieu.
  '6':
  - type: text
    content: 'Pilate a entendu parler de la Galilée. Ainsi, il a demandé si Jésus venait de la Galilée. '
  '7':
  - type: text
    content: 'Ils ont répondu : Oui. Hérode était à Jérusalem en ce moment‑là. Il dirigeait aussi la Galilée. Alors, Pilate a envoyé Jésus chez Hérode.'
  - type: heading
    content: Hérode pose des questions Jésus
  '8':
  - type: text
    content: 'Hérode était très heureux de voir Jésus. Il entendait parler de lui et il voulait le rencontrer pendant une longue période. Il espérait qu’il allait voir Jésus faire quelque chose de puissant. '
  '9':
  - type: text
    content: 'Il lui posait beaucoup de questions, mais Jésus ne lui répondait pas. '
