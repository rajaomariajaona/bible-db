document_id: MRK.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Jésus raconte une histoire sur les graines d’un agriculteur
  - type: text
    content: 'Encore une fois, Jésus s’est mis à enseigner au bord de la mer. La foule qui s’est réunie, était très grande. Donc, Jésus est monté dans un petit bateau et il s’est assis là. Le petit bateau était sur l’eau, et le peuple est resté au bord de la mer. '
  '10':
  - type: text
    content: 'Quand Jésus était seul, les gens qui étaient autour de lui et les 12 '
  - type: text
    content: Apôtres
  - type: text
    content: ' lui ont demandé la signification de cet exemple. '
  '11':
  - type: text
    content: 'Jésus a répondu : Dieu vous a permis de comprendre comment il dirige son peuple. Mais j’utilise des exemples pour parler aux autres. '
  '12':
  - type: text
    content: De la même façon, ils regarderont. Mais ils ne sauront jamais ce qu’ils voient. Ils entendront. Mais ils ne comprendront pas. S’ils pouvaient changer leurs voies, Dieu pourrait pardonner leurs fautes.
  - type: heading
    content: Jésus explique l’exemple sur les semences
  '13':
  - type: text
    content: 'Alors Jésus leur a répondu : Vous devez comprendre cet exemple. Si vous ne comprenez pas, vous ne comprendrez pas tous les autres exemples. '
  '14':
  - type: text
    content: 'Les graines signifient le message de Dieu. L’agriculteur est comme une personne qui enseigne aux gens ce message. '
  '15':
  - type: text
    content: 'Certaines graines sont tombées sur le chemin. Le chemin est comme certaines personnes qui écoutent le message. Mais Satan vient rapidement à elles. Et il enlève le message de leurs '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Certaines graines sont tombées au milieu des pierres. Cela ressemble à certaines personnes qui écoutent le message de Dieu. Elles sont heureuses de croire au message pour un temps. '
  '17':
  - type: text
    content: 'Mais ces gens sont comme des plantes qui ne sont pas cultivées dans le sol. Donc, ils vont croire seulement pendant une courte période. Ils peuvent avoir des problèmes. Ou d’autres personnes peuvent leur faire de mauvaises choses à cause de la Parole de Dieu. Le résultat est que ces gens vont laisser de croire. '
  '18':
  - type: text
    content: 'Certaines graines sont tombées sur les épines. Cela ressemble à d’autres gens qui entendent le message de Dieu. '
  '19':
  - type: text
    content: 'Mais ils ont beaucoup de problèmes dans leurs '
  - type: text
    content: esprits
  - type: text
    content: '. Ils pensent que plus d’argent et d’autres objets de valeur les rendront heureux. Donc, ils ne laissent pas le message de Dieu les changer. Ils sont comme des plantes qui ne produisent pas de nouveaux grains. '
  '2':
  - type: text
    content: 'Jésus a utilisé un exemple pour leur enseigner beaucoup de choses. '
  '20':
  - type: text
    content: Mais certaines graines sont tombées sur la bonne terre. Ce sol est comme les autres gens qui entendent le message de Dieu. Ils comprennent et ils obéissent à Dieu. Ces gens sont comme de bonnes plantes. A partir d’une graine, les bonnes plantes font 30 grains. D’autres 60 nouveaux grains, et 100 nouveaux grains.
  - type: heading
    content: Les gens mettent une lampe sur un haut lieu
  '21':
  - type: text
    content: 'Alors Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Personne ne met une lampe dans une maison et la met sous un vase ou un lit. Vous ne faites pas cela. Vous la mettez sur un endroit haut. '
  '22':
  - type: text
    content: 'Dieu cache certaines choses maintenant. Mais il y aura un moment où les gens les verront. Dieu couvre certaines choses maintenant, parce qu’il ne veut pas que les gens les voient. Mais il y aura un moment où les gens vont voir toutes ces choses. '
  '23':
  - type: text
    content: 'Alors Jésus a dit : Vous avez entendu mes paroles. Donc, faites ce que je dis. '
  '24':
  - type: text
    content: 'Jésus a dit : Vous devez être prudents sur la façon dont vous écoutez. Dieu vous donnera comme vous donnez à d’autres personnes. Et vous recevrez encore plus. '
  '25':
  - type: text
    content: Une personne qui a quelque chose recevra plus. Mais une autre personne n’a rien. Elle perdra même le peu qu’elle a.
  - type: heading
    content: Jésus raconte une histoire sur les semences
  '26':
  - type: text
    content: 'Alors Jésus a dit : Je vais vous expliquer comment Dieu dirige son peuple. Un homme jette des graines dans son champ. '
  '27':
  - type: text
    content: 'Puis il dort chaque nuit et il se réveille chaque jour. Les graines commencent à pousser en plantes. Elles continuent à pousser, mais l’homme ne sait pas comment. '
  '28':
  - type: text
    content: 'Les plantes poussent du sol. Les feuilles de la plante poussent en premier. Ensuite, la fleur apparaît, puis les grains apparaissent. '
  '29':
  - type: text
    content: Lorsque les plantes ont complètement poussé, l’homme les coupe immédiatement. C’est le temps pour lui de récolter les grains à utiliser pour la nourriture.
  - type: heading
    content: Jésus raconte une histoire sur une très petite graine
  '3':
  - type: text
    content: 'Jésus a dit : Écoutez‑moi, un semeur est sorti pour semer les graines. '
  '30':
  - type: text
    content: 'Jésus a dit : Avec quoi allons‑nous comparer la manière dont Dieu dirige son peuple ? Et par quelle histoire ou quel exemple expliquer cela ? '
  '31':
  - type: text
    content: 'C’est comme un homme qui prend une graine d’une plante appelée '
  - type: text
    content: moutarde
  - type: text
    content: '. Il la met dans le sol. Elle est plus petite que toute autre graine qui se trouve dans le sol. '
  '32':
  - type: text
    content: 'Mais quand elle commence à pousser, elle devient plus grande que toutes les plantes du champ. Elle aura de grosses branches. Et les oiseaux viendront du '
  - type: text
    content: ciel
  - type: text
    content: ' et vont vivre sur ces branches. Ils construiront leurs nids sous son ombre. '
  '33':
  - type: text
    content: 'Jésus enseignait le message de Dieu au peuple. Il utilisait beaucoup d’exemples comme ceux‑ci. Il disait aux gens autant qu’ils pouvaient comprendre. '
  '34':
  - type: text
    content: 'Il utilisait toujours des histoires ou des exemples pour enseigner le peuple. Puis, il expliquait le tout à ses '
  - type: text
    content: disciples
  - type: text
    content: ' quand il était seul avec eux.'
  - type: heading
    content: Jésus arrête un vent fort
  '35':
  - type: text
    content: 'Le même jour le soir, Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Allons de l’autre côté de la mer. '
  '36':
  - type: text
    content: 'Ils ont laissé la foule. Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' ont emmené Jésus dans le petit bateau. Jésus était dans ce petit bateau à l’avant. D’autres petits bateaux sont allés avec eux. '
  '37':
  - type: text
    content: 'Puis un vent fort a commencé à souffler sur la mer. L’eau a commencé à remplir le petit bateau. Quelque temps après, le petit bateau commençait à être presque sous l’eau. '
  '38':
  - type: text
    content: 'Jésus était dans la partie arrière du petit bateau. Il dormait sur un coussin. Les '
  - type: text
    content: disciples
  - type: text
    content: ' le réveillaient. Ils lui disaient : Maître, tu ne te soucies pas que nous risquons de mourir dans l’eau ? '
  '39':
  - type: text
    content: 'Jésus s’est réveillé et il a dit au vent : Sois en silence ! Puis il a dit à la mer : Tais‑toi et le vent est devenu moins fort, et tout est devenu calme. '
  '4':
  - type: text
    content: 'Pendant qu’il semait les graines, certaines graines sont tombées sur le chemin. Les oiseaux sont venus et ils ont mangé ces graines. '
  '40':
  - type: text
    content: 'Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Vous ne devriez pas avoir peur comme ça, vous devez croire. '
  '41':
  - type: text
    content: 'Puis ils avaient très peur. Ils disaient l’un à l’autre : Nous ne savons pas qui Jésus est vraiment, même le vent et l’eau lui obéissent.'
  '5':
  - type: text
    content: 'Une autre partie est tombée parmi les pierres. Il y avait peu de terre à cet endroit. Les graines ont rapidement commencé à pousser, parce que le sol n’était pas profond. '
  '6':
  - type: text
    content: 'Mais quand le soleil s’est levé, il a brûlé les jeunes plantes. Elles sont vite mortes, parce qu’elles n’avaient pas poussé dans le sol. '
  '7':
  - type: text
    content: 'Une autre partie est tombée parmi les épines. Elles ont poussé avec les jeunes plantes. Les épines étaient plus fortes que les plantes de l’agriculteur. Ainsi, les plantes ne pouvaient pas faire de fruits. '
  '8':
  - type: text
    content: 'Mais d’autres graines sont tombées sur la bonne terre. Elles ont poussé et grandi. Elles ont fait des fruits. Une semence a donné 30 grains. Une autre a donné 60 grains et 100 grains. '
  '9':
  - type: text
    content: 'Alors Jésus a dit : Vous avez entendu mes paroles. Donc, faites ce que je dis. '
