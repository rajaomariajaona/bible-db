document_id: MRK.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire sur les graines d’un agriculteur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Encore une fois, Jésus s’est mis à enseigner au bord de la mer. La foule qui s’est réunie, était très grande. Donc, Jésus est monté dans un petit bateau et il s’est assis là. Le petit bateau était sur l’eau, et le peuple est resté au bord de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus a utilisé un exemple pour leur enseigner beaucoup de choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a dit : Écoutez‑moi, un semeur est sorti pour semer les graines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant qu’il semait les graines, certaines graines sont tombées sur le chemin. Les oiseaux sont venus et ils ont mangé ces graines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Une autre partie est tombée parmi les pierres. Il y avait peu de terre à cet endroit. Les graines ont rapidement commencé à pousser, parce que le sol n’était pas profond. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais quand le soleil s’est levé, il a brûlé les jeunes plantes. Elles sont vite mortes, parce qu’elles n’avaient pas poussé dans le sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une autre partie est tombée parmi les épines. Elles ont poussé avec les jeunes plantes. Les épines étaient plus fortes que les plantes de l’agriculteur. Ainsi, les plantes ne pouvaient pas faire de fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais d’autres graines sont tombées sur la bonne terre. Elles ont poussé et grandi. Elles ont fait des fruits. Une semence a donné 30 grains. Une autre a donné 60 grains et 100 grains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Jésus a dit : Vous avez entendu mes paroles. Donc, faites ce que je dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quand Jésus était seul, les gens qui étaient autour de lui et les 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtres
  - type: text
    text: ' lui ont demandé la signification de cet exemple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus a répondu : Dieu vous a permis de comprendre comment il dirige son peuple. Mais j’utilise des exemples pour parler aux autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: De la même façon, ils regarderont. Mais ils ne sauront jamais ce qu’ils voient. Ils entendront. Mais ils ne comprendront pas. S’ils pouvaient changer leurs voies, Dieu pourrait pardonner leurs fautes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus explique l’exemple sur les semences
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Jésus leur a répondu : Vous devez comprendre cet exemple. Si vous ne comprenez pas, vous ne comprendrez pas tous les autres exemples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les graines signifient le message de Dieu. L’agriculteur est comme une personne qui enseigne aux gens ce message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Certaines graines sont tombées sur le chemin. Le chemin est comme certaines personnes qui écoutent le message. Mais Satan vient rapidement à elles. Et il enlève le message de leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Certaines graines sont tombées au milieu des pierres. Cela ressemble à certaines personnes qui écoutent le message de Dieu. Elles sont heureuses de croire au message pour un temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais ces gens sont comme des plantes qui ne sont pas cultivées dans le sol. Donc, ils vont croire seulement pendant une courte période. Ils peuvent avoir des problèmes. Ou d’autres personnes peuvent leur faire de mauvaises choses à cause de la Parole de Dieu. Le résultat est que ces gens vont laisser de croire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Certaines graines sont tombées sur les épines. Cela ressemble à d’autres gens qui entendent le message de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais ils ont beaucoup de problèmes dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Ils pensent que plus d’argent et d’autres objets de valeur les rendront heureux. Donc, ils ne laissent pas le message de Dieu les changer. Ils sont comme des plantes qui ne produisent pas de nouveaux grains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais certaines graines sont tombées sur la bonne terre. Ce sol est comme les autres gens qui entendent le message de Dieu. Ils comprennent et ils obéissent à Dieu. Ces gens sont comme de bonnes plantes. A partir d’une graine, les bonnes plantes font 30 grains. D’autres 60 nouveaux grains, et 100 nouveaux grains.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les gens mettent une lampe sur un haut lieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Jésus a dit à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Personne ne met une lampe dans une maison et la met sous un vase ou un lit. Vous ne faites pas cela. Vous la mettez sur un endroit haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dieu cache certaines choses maintenant. Mais il y aura un moment où les gens les verront. Dieu couvre certaines choses maintenant, parce qu’il ne veut pas que les gens les voient. Mais il y aura un moment où les gens vont voir toutes ces choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Jésus a dit : Vous avez entendu mes paroles. Donc, faites ce que je dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus a dit : Vous devez être prudents sur la façon dont vous écoutez. Dieu vous donnera comme vous donnez à d’autres personnes. Et vous recevrez encore plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Une personne qui a quelque chose recevra plus. Mais une autre personne n’a rien. Elle perdra même le peu qu’elle a.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire sur les semences
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Jésus a dit : Je vais vous expliquer comment Dieu dirige son peuple. Un homme jette des graines dans son champ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis il dort chaque nuit et il se réveille chaque jour. Les graines commencent à pousser en plantes. Elles continuent à pousser, mais l’homme ne sait pas comment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les plantes poussent du sol. Les feuilles de la plante poussent en premier. Ensuite, la fleur apparaît, puis les grains apparaissent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lorsque les plantes ont complètement poussé, l’homme les coupe immédiatement. C’est le temps pour lui de récolter les grains à utiliser pour la nourriture.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire sur une très petite graine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus a dit : Avec quoi allons‑nous comparer la manière dont Dieu dirige son peuple ? Et par quelle histoire ou quel exemple expliquer cela ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'C’est comme un homme qui prend une graine d’une plante appelée '
  - type: usfm
    marker: w
    children:
    - type: text
      text: moutarde
  - type: text
    text: '. Il la met dans le sol. Elle est plus petite que toute autre graine qui se trouve dans le sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais quand elle commence à pousser, elle devient plus grande que toutes les plantes du champ. Elle aura de grosses branches. Et les oiseaux viendront du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et vont vivre sur ces branches. Ils construiront leurs nids sous son ombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus enseignait le message de Dieu au peuple. Il utilisait beaucoup d’exemples comme ceux‑ci. Il disait aux gens autant qu’ils pouvaient comprendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il utilisait toujours des histoires ou des exemples pour enseigner le peuple. Puis, il expliquait le tout à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' quand il était seul avec eux.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus arrête un vent fort
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le même jour le soir, Jésus a dit à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Allons de l’autre côté de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ils ont laissé la foule. Alors les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont emmené Jésus dans le petit bateau. Jésus était dans ce petit bateau à l’avant. D’autres petits bateaux sont allés avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Puis un vent fort a commencé à souffler sur la mer. L’eau a commencé à remplir le petit bateau. Quelque temps après, le petit bateau commençait à être presque sous l’eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus était dans la partie arrière du petit bateau. Il dormait sur un coussin. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' le réveillaient. Ils lui disaient : Maître, tu ne te soucies pas que nous risquons de mourir dans l’eau ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus s’est réveillé et il a dit au vent : Sois en silence ! Puis il a dit à la mer : Tais‑toi et le vent est devenu moins fort, et tout est devenu calme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus a dit à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Vous ne devriez pas avoir peur comme ça, vous devez croire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Puis ils avaient très peur. Ils disaient l’un à l’autre : Nous ne savons pas qui Jésus est vraiment, même le vent et l’eau lui obéissent.'
