document_id: 2CO.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: text
    content: 'Alors, en travaillant avec Dieu, nous vous disons de faire attention. N’oubliez pas que Dieu a été très gentil et qu’il vous a pardonné. Ne perdez pas cela ! '
  '10':
  - type: text
    content: Nous semblons être tristes, mais vraiment nous sommes toujours heureux. Nous semblons être pauvres, mais nous enrichissons beaucoup de gens. Nous semblons n’avoir rien, mais vraiment nous avons tout.
  '11':
  - type: text
    content: 'Nos amis de Corinthe, nous vous avons parlé très honnêtement. Nous vous avons montré combien nous vous aimons. '
  '12':
  - type: text
    content: 'Nous n’avons rien fait pour vous empêcher d’être nos amis. Mais vous n’avez pas vraiment voulu devenir nos amis. '
  '13':
  - type: text
    content: Je vous parle comme si je parlais à mes propres enfants. Soyez justes envers nous ! Acceptez‑nous comme vos amis, tout comme nous vous avons acceptés.
  - type: heading
    content: Les croyants appartiennent à Dieu
  '14':
  - type: text
    content: Ne soyez pas unis avec des gens qui ne croient pas en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Dieu vous a remis en ordre avec lui‑même. Le bien et le mal ne peuvent pas fonctionner ensemble. La lumière et l’obscurité ne peuvent pas être ensemble.
  '15':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' ne sera jamais d’accord avec le '
  - type: text
    content: diable
  - type: text
    content: . Les gens qui croient en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' sont complètement différents des gens qui ne croient pas.'
  '16':
  - type: text
    content: 'Les idoles n’appartiennent pas à la maison de Dieu. N’oubliez pas que nous, les croyants, nous sommes la maison du Dieu vivant (temple). Voici ce que Dieu a dit :'
  - type: text
    content: Je ferai ma maison avec eux et je vivrai parmi eux.
  - type: text
    content: Je serai leur Dieu et ils seront mon peuple.
  '17':
  - type: text
    content: 'Et ainsi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit :'
  - type: text
    content: Sortez du milieu d’eux et soyez séparés.
  - type: text
    content: Ne touchez à rien d’impur et de mal.
  - type: text
    content: Alors je vous accepterai.
  '18':
  - type: text
    content: 'Il a dit également :'
  - type: text
    content: Je serai un père pour vous.
  - type: text
    content: Vous serez mes fils et mes filles.
  - type: text
    content: 'C’est ce que dit le puissant '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu.'
  '2':
  - type: text
    content: 'Dans la Bible, Dieu dit :'
  - type: text
    content: J’ai écouté ta prière au bon moment pour que je t’aide.
  - type: text
    content: Je t’ai aidé le bon jour pour que je te sauve.
  - type: text
    content: Ecoutez ! Le bon moment est maintenant ! Le jour où Dieu vous sauve est maintenant !
  '3':
  - type: text
    content: 'Nous ne voulons pas que quiconque pense du mal de notre travail. Nous ne faisons donc rien qui puisse causer des problèmes à personne. '
  '4':
  - type: text
    content: 'Mais, dans tout ce que nous faisons, nous voulons montrer que nous sommes les serviteurs de Dieu. Lorsque les gens veulent nous faire du mal, nous sommes patients et courageux. Nous avons beaucoup de problèmes. Nous devenons tristes et troublés. '
  '5':
  - type: text
    content: 'Parfois, les gens nous frappent. Ils nous mettent en prison. Ils nous attaquent. Mais nous travaillons dur. Nous ne pouvons pas toujours dormir la nuit. Nous avons souvent faim. '
  '6':
  - type: text
    content: 'Nous servons Dieu honnêtement et avec des pensées pures. Nous savons ce qui est vrai. Nous sommes patients et gentils. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu nous aide. Nous aimons les gens d’une manière honnête. '
  '7':
  - type: text
    content: 'Nous parlons d’un vrai message. La puissance de Dieu nous donne de la force. Nous faisons ce qui est bien, alors nous combattons comme des soldats au nom de Dieu. C’est comme si nous avions les armes de Dieu dans les 2 mains ! '
  '8':
  - type: text
    content: 'Parfois, les gens nous respectent comme des gens importants. Parfois, ils pensent que nous ne valons rien. Les gens peuvent nous insulter ou nous glorifier. Nous disons seulement des choses vraies, mais certaines personnes pensent toujours que nous trompons les autres. '
  '9':
  - type: text
    content: 'Certaines personnes ne veulent pas nous connaître. D’autres personnes nous acceptent comme serviteurs de Dieu. Nous semblons mourir. Mais regardez, nous sommes toujours en vie ! Les gens nous punissent, mais ils ne nous tuent pas. '
