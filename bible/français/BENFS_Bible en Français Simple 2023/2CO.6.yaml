document_id: 2CO.6
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 6
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors, en travaillant avec Dieu, nous vous disons de faire attention. N’oubliez pas que Dieu a été très gentil et qu’il vous a pardonné. Ne perdez pas cela ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dans la Bible, Dieu dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai écouté ta prière au bon moment pour que je t’aide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai aidé le bon jour pour que je te sauve.
- type: usfm
  marker: p
  children:
  - type: text
    text: Ecoutez ! Le bon moment est maintenant ! Le jour où Dieu vous sauve est maintenant !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous ne voulons pas que quiconque pense du mal de notre travail. Nous ne faisons donc rien qui puisse causer des problèmes à personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais, dans tout ce que nous faisons, nous voulons montrer que nous sommes les serviteurs de Dieu. Lorsque les gens veulent nous faire du mal, nous sommes patients et courageux. Nous avons beaucoup de problèmes. Nous devenons tristes et troublés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Parfois, les gens nous frappent. Ils nous mettent en prison. Ils nous attaquent. Mais nous travaillons dur. Nous ne pouvons pas toujours dormir la nuit. Nous avons souvent faim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous servons Dieu honnêtement et avec des pensées pures. Nous savons ce qui est vrai. Nous sommes patients et gentils. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu nous aide. Nous aimons les gens d’une manière honnête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous parlons d’un vrai message. La puissance de Dieu nous donne de la force. Nous faisons ce qui est bien, alors nous combattons comme des soldats au nom de Dieu. C’est comme si nous avions les armes de Dieu dans les 2 mains ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Parfois, les gens nous respectent comme des gens importants. Parfois, ils pensent que nous ne valons rien. Les gens peuvent nous insulter ou nous glorifier. Nous disons seulement des choses vraies, mais certaines personnes pensent toujours que nous trompons les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Certaines personnes ne veulent pas nous connaître. D’autres personnes nous acceptent comme serviteurs de Dieu. Nous semblons mourir. Mais regardez, nous sommes toujours en vie ! Les gens nous punissent, mais ils ne nous tuent pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous semblons être tristes, mais vraiment nous sommes toujours heureux. Nous semblons être pauvres, mais nous enrichissons beaucoup de gens. Nous semblons n’avoir rien, mais vraiment nous avons tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nos amis de Corinthe, nous vous avons parlé très honnêtement. Nous vous avons montré combien nous vous aimons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous n’avons rien fait pour vous empêcher d’être nos amis. Mais vous n’avez pas vraiment voulu devenir nos amis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je vous parle comme si je parlais à mes propres enfants. Soyez justes envers nous ! Acceptez‑nous comme vos amis, tout comme nous vous avons acceptés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les croyants appartiennent à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ne soyez pas unis avec des gens qui ne croient pas en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Dieu vous a remis en ordre avec lui‑même. Le bien et le mal ne peuvent pas fonctionner ensemble. La lumière et l’obscurité ne peuvent pas être ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' ne sera jamais d’accord avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: . Les gens qui croient en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sont complètement différents des gens qui ne croient pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les idoles n’appartiennent pas à la maison de Dieu. N’oubliez pas que nous, les croyants, nous sommes la maison du Dieu vivant (temple). Voici ce que Dieu a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai ma maison avec eux et je vivrai parmi eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai leur Dieu et ils seront mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et ainsi, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sortez du milieu d’eux et soyez séparés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne touchez à rien d’impur et de mal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je vous accepterai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il a dit également :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai un père pour vous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous serez mes fils et mes filles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est ce que dit le puissant '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu.'
