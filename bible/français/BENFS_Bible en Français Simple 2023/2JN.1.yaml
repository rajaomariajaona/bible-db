document_id: 2JN.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: La deuxième lettre de Jean
  - type: text
    content: 'Cette lettre vient de moi, le chef des croyants. J’écris à toi, dame spéciale que Dieu a choisie, et à tes enfants. Je vous aime tous, car vous avez cru au vrai message de Dieu. Ce n’est pas seulement moi qui vous aime. Tous ceux qui connaissent le vrai message de Dieu vous aiment vraiment. '
  '10':
  - type: text
    content: 'Quelqu’un peut venir à vous et vous enseigner quelque chose de différent. Ne le recevez pas dans votre maison. Ne le recevez pas comme chrétien. '
  '11':
  - type: text
    content: Si vous recevez des gens comme cela en tant que peuple chrétien, vous vous faites comme eux. Vous faites également le même genre de mauvais travail.
  '12':
  - type: text
    content: Je veux vous dire beaucoup plus de choses, mais je ne veux pas en parler dans une lettre. Mais, j’espère venir vous rendre visite. Ainsi, je vous verrai et nous pourrons parler ensemble. Ensuite, nous serons complètement heureux.
  '13':
  - type: text
    content: Les croyants ici te disent bonjour. Ce sont les enfants de ta soeur que Dieu a choisis.
  '2':
  - type: text
    content: Je vous aime, parce que nous avons tous compris ce qui est vrai. Cette vérité restera avec nous pour toujours.
  '3':
  - type: text
    content: Je prie que Dieu notre Père et son Fils Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' nous aident. Je prie pour qu’il soit gentil avec nous tous. Je prie pour qu’il nous donne la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: . Cela se fera, parce que Dieu nous aime et parce que nous croyons en son vrai message.
  '4':
  - type: text
    content: J’ai été très heureux d’entendre parler de certains de tes enfants. Je suis content car ils vivent bien. Ils obéissent au vrai message sur Dieu. Ils font ce que Dieu notre Père nous a dit de faire.
  - type: heading
    content: Ne crois pas aux faux enseignants
  '5':
  - type: text
    content: 'Alors maintenant, madame, je veux que tu fasses quelque chose. Je veux que nous nous aimions tous. Je ne te dis pas une nouvelle règle à laquelle tu dois obéir. C’est une règle que nous avions depuis le début. '
  '6':
  - type: text
    content: Comment montrons‑nous un véritable amour ? Nous le montrons lorsque nous vivons d’une manière qui rend Dieu heureux. Nous obéissons à ses règles. Il nous dit de nous aimer et c’est de cette façon que vous devez vivre. Vous avez entendu cette règle depuis le début.
  '7':
  - type: text
    content: Je dis cela parce que de nombreux faux enseignants voyagent partout. Ils ne sont pas d’accord pour dire que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est né comme un bébé. Des gens comme ça disent des mensonges. Ce sont des ennemis du '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Alors, faites attention ! Ne croyez pas à leurs mensonges. Ne perdez pas les bonnes choses pour lesquelles nous avons travaillé. Assurez‑vous que vous recevez toutes les bonnes choses que Dieu a promises de vous donner. '
  '9':
  - type: text
    content: 'Souvenez‑vous du message que '
  - type: text
    content: Christ
  - type: text
    content: ' a enseigné. Toute personne qui enseigne ses propres idées au lieu du vrai message de '
  - type: text
    content: Christ
  - type: text
    content: ' n’appartient pas à Dieu. Continuez de croire à ce que '
  - type: text
    content: Christ
  - type: text
    content: ' a enseigné. Toute personne qui fait cela appartient à Dieu le Père et à son Fils, Jésus. '
