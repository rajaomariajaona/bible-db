document_id: 1JN.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Dieu pardonne nos péchés à cause de la mort de Jésus
  - type: text
    content: Je vous écris cette lettre, mes amis qui êtes comme mes petits enfants. Je vous écris parce que je ne veux pas que vous fassiez de mauvaises choses. Mais si quelqu’un parmi vous fait quelque chose de mal, il y a quelqu’un qui parlera à Dieu pour nous. Cet homme est Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', qui ne fait que ce qui est bien. Il demandera à notre Père Dieu de vous pardonner. '
  '10':
  - type: text
    content: 'Quiconque aime les autres croyants montre qu’il vit dans la lumière. Il n’y a rien qui le fera détourner de Dieu. '
  '11':
  - type: text
    content: Mais si quelqu’un déteste d’autres croyants, il vit toujours mal. Il est comme quelqu’un qui marche dans le noir. Il ne peut pas voir où il va. Il est comme un aveugle. Parce qu’il est dans le noir, il ne peut pas comprendre le vrai message de Dieu.
  '12':
  - type: text
    content: 'Mes petits enfants, je vous écris parce que Dieu a pardonné vos péchés. Il l’a fait à cause de '
  - type: text
    content: Christ
  - type: text
    content: .
  '13':
  - type: text
    content: Vous qui êtes plus âgés, comme des pères, je vous écris parce que vous connaissez Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Il était déjà là avant que le monde commence.
  - type: text
    content: Vous qui êtes jeunes, je vous écris parce que vous avez gagné contre Satan.
  '14':
  - type: text
    content: Oui, mes enfants, je vous ai écrit parce que vous connaissez Dieu, notre Père.
  - type: text
    content: Pères, je vous ai écrit parce que vous connaissez Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Il était déjà là avant que le monde commence.
  - type: text
    content: Jeunes hommes, je vous ai écrit parce que vous êtes forts. Vous continuez d’obéir au message de Dieu et vous avez gagné contre Satan.
  '15':
  - type: text
    content: 'Ne vivez pas comme des gens qui ne connaissent pas Dieu. N’aimez pas les mauvaises choses qui appartiennent à ce monde. Si quelqu’un aime ces choses, cela montre qu’il n’aime pas Dieu, son Père. '
  '16':
  - type: text
    content: 'Quelles sont les mauvaises choses qui appartiennent à ce monde ? Les gens veulent faire de mauvaises choses pour être heureux. Les gens veulent avoir des choses qu’ils voient, même de mauvaises choses. Les gens veulent montrer aux autres à quel point ils sont riches. Ces idées ne viennent pas de Dieu, notre Père. Ce sont les pensées de personnes qui appartiennent au monde. '
  '17':
  - type: text
    content: Un jour, ces gens et les choses qu’ils voudront ne seront plus là. Mais ceux qui continuent de faire ce que Dieu veut, vivront éternellement.
  - type: heading
    content: Les gens qui sont contre le Christ
  '18':
  - type: text
    content: Mes enfants, le monde finira bientôt. Vous avez entendu que l’ennemi de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' apparaîtra. Vous pouvez voir que de nombreux ennemis de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' sont déjà apparus. Cela nous montre que le monde va vraiment se terminer bientôt. '
  '19':
  - type: text
    content: Ces gens faisaient partie de notre groupe de croyants. Mais ils nous ont quittés. Ils n’ont jamais vraiment appartenu à notre groupe. S’ils étaient vraiment de vrais croyants, ils allaient rester avec nous. Quand ils nous ont quittés, cela a clairement montré qu’aucun d’entre eux ne nous appartenait vraiment.
  '2':
  - type: text
    content: 'Jésus est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nos péchés. Dieu allait nous punir. Alors grâce à Jésus, Dieu a pardonné nos péchés et il ne peut plus nous punir. Jésus n’a pas fait cela seulement pour nous. Il l’a fait aussi pour toutes les personnes dans le monde, afin que Dieu puisse pardonner leurs péchés aussi.'
  '20':
  - type: text
    content: Mais Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', le Saint, vous a donné le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Par conséquent, vous savez tous ce qui est vrai. '
  '21':
  - type: text
    content: C’est pourquoi je vous écris. Ce n’est pas parce que vous ne connaissez pas encore le vrai message de Dieu. Je vous écris parce que vous connaissez ce vrai message. Et vous pouvez être sûrs qu’il n’y a aucun mensonge.
  '22':
  - type: text
    content: 'Qui sont les gens qui disent les pires mensonges ? C’est toute personne qui dit que Jésus n’est pas le '
  - type: text
    content: Messie
  - type: text
    content: . Une personne comme ça est l’ennemie de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Elle parle contre Dieu, le Père, et contre Jésus, son Fils. '
  '23':
  - type: text
    content: Toute personne qui dit que Jésus n’est pas le Fils de Dieu, n’appartient pas au Père. Mais toute personne qui accepte Jésus comme Fils de Dieu, appartient également au Père.
  '24':
  - type: text
    content: 'Quant à vous, souvenez‑vous toujours du vrai message que vous avez entendu au début. Si vous continuez de croire à ce message, vous resterez unis avec le Fils et avec le Père. '
  '25':
  - type: text
    content: C’est la vraie vie qui continue pour toujours. Et c’est ce que Dieu a promis de nous donner.
  '26':
  - type: text
    content: 'Certaines personnes essaient de vous éloigner du vrai message de Dieu. Je vous écris ces choses pour que vous connaissiez ces gens. '
  '27':
  - type: text
    content: 'Mais '
  - type: text
    content: Christ
  - type: text
    content: ' vous a donné le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' et il continue de vous aider. Donc, vous n’avez pas besoin que les gens vous apprennent ce qui est vrai. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' lui‑même vous enseigne tout sur le message de Dieu. Il vous aide à savoir ce qui est vraiment vrai. Il ne vous dit aucun mensonge. Donc, vous devez vous rappeler ce qu’il vous a enseigné : Restez unis avec '
  - type: text
    content: Christ
  - type: text
    content: .
  '28':
  - type: text
    content: 'Oui, mes enfants, continuez d’être unis au '
  - type: text
    content: Christ
  - type: text
    content: . Ensuite, nous n’aurons pas honte lorsqu’il reviendra dans ce monde. Nous n’aurons pas peur de le rencontrer.
  '29':
  - type: text
    content: 'Vous savez que '
  - type: text
    content: Christ
  - type: text
    content: ' ne fait que ce qui est bien. Vous devez donc savoir ceci : Quiconque continue de faire ce qui est bien, est devenu un enfant de Dieu.'
  '3':
  - type: text
    content: 'Comment pouvons‑nous être sûrs que nous connaissons vraiment Dieu et que nous lui appartenons ? Nous pouvons en être sûrs si nous obéissons aux règles de Dieu. '
  '4':
  - type: text
    content: 'Quelqu’un peut dire : J’appartiens à Dieu. Mais s’il n’obéit pas aux règles de Dieu, cette personne ment. Elle ne vit pas comme le vrai message de Dieu nous enseigne. '
  '5':
  - type: text
    content: 'Mais quiconque obéit au message de Dieu montre qu’il aime vraiment Dieu complètement. C’est ainsi que nous savons que nous appartenons à Dieu. '
  '6':
  - type: text
    content: Si nous disons que nous vivons comme Dieu veut, alors nous devons vivre comme Jésus a vécu.
  - type: heading
    content: Dieu nous dit de nous aimer les uns les autres
  '7':
  - type: text
    content: 'Mes amis, je vous dis de vous aimer les uns les autres. Quand je vous écris ceci, je ne vous donne pas de nouvelle règle. C’est une vieille règle que vous avez depuis longtemps. Nous vous l’avons donnée lorsque vous avez commencé à obéir à '
  - type: text
    content: Christ
  - type: text
    content: '. C’est le même message que vous avez déjà entendu. '
  '8':
  - type: text
    content: 'Mais il y a quelque chose de nouveau à ce sujet. Cette règle est devenue vraie dans la façon dont '
  - type: text
    content: Christ
  - type: text
    content: ' a vécu. Maintenant, cela est également devenu réalité dans vos vies. Le vrai message de Dieu a fait briller la lumière dans vos vies. Vous ne vivez plus dans le noir où vous faites de mauvaises choses. '
  '9':
  - type: text
    content: 'Une personne peut dire qu’elle vit dans la lumière. Mais, si cette personne déteste un autre croyant, alors elle ment. Cette personne vit vraiment toujours dans le noir. '
