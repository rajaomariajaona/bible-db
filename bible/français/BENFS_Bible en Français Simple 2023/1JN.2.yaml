document_id: 1JN.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu pardonne nos péchés à cause de la mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je vous écris cette lettre, mes amis qui êtes comme mes petits enfants. Je vous écris parce que je ne veux pas que vous fassiez de mauvaises choses. Mais si quelqu’un parmi vous fait quelque chose de mal, il y a quelqu’un qui parlera à Dieu pour nous. Cet homme est Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui ne fait que ce qui est bien. Il demandera à notre Père Dieu de vous pardonner. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus est mort en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour nos péchés. Dieu allait nous punir. Alors grâce à Jésus, Dieu a pardonné nos péchés et il ne peut plus nous punir. Jésus n’a pas fait cela seulement pour nous. Il l’a fait aussi pour toutes les personnes dans le monde, afin que Dieu puisse pardonner leurs péchés aussi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Comment pouvons‑nous être sûrs que nous connaissons vraiment Dieu et que nous lui appartenons ? Nous pouvons en être sûrs si nous obéissons aux règles de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quelqu’un peut dire : J’appartiens à Dieu. Mais s’il n’obéit pas aux règles de Dieu, cette personne ment. Elle ne vit pas comme le vrai message de Dieu nous enseigne. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais quiconque obéit au message de Dieu montre qu’il aime vraiment Dieu complètement. C’est ainsi que nous savons que nous appartenons à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Si nous disons que nous vivons comme Dieu veut, alors nous devons vivre comme Jésus a vécu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu nous dit de nous aimer les uns les autres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mes amis, je vous dis de vous aimer les uns les autres. Quand je vous écris ceci, je ne vous donne pas de nouvelle règle. C’est une vieille règle que vous avez depuis longtemps. Nous vous l’avons donnée lorsque vous avez commencé à obéir à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. C’est le même message que vous avez déjà entendu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais il y a quelque chose de nouveau à ce sujet. Cette règle est devenue vraie dans la façon dont '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a vécu. Maintenant, cela est également devenu réalité dans vos vies. Le vrai message de Dieu a fait briller la lumière dans vos vies. Vous ne vivez plus dans le noir où vous faites de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Une personne peut dire qu’elle vit dans la lumière. Mais, si cette personne déteste un autre croyant, alors elle ment. Cette personne vit vraiment toujours dans le noir. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quiconque aime les autres croyants montre qu’il vit dans la lumière. Il n’y a rien qui le fera détourner de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais si quelqu’un déteste d’autres croyants, il vit toujours mal. Il est comme quelqu’un qui marche dans le noir. Il ne peut pas voir où il va. Il est comme un aveugle. Parce qu’il est dans le noir, il ne peut pas comprendre le vrai message de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mes petits enfants, je vous écris parce que Dieu a pardonné vos péchés. Il l’a fait à cause de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous qui êtes plus âgés, comme des pères, je vous écris parce que vous connaissez Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il était déjà là avant que le monde commence.
- type: usfm
  marker: p
  children:
  - type: text
    text: Vous qui êtes jeunes, je vous écris parce que vous avez gagné contre Satan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oui, mes enfants, je vous ai écrit parce que vous connaissez Dieu, notre Père.
- type: usfm
  marker: p
  children:
  - type: text
    text: Pères, je vous ai écrit parce que vous connaissez Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il était déjà là avant que le monde commence.
- type: usfm
  marker: p
  children:
  - type: text
    text: Jeunes hommes, je vous ai écrit parce que vous êtes forts. Vous continuez d’obéir au message de Dieu et vous avez gagné contre Satan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ne vivez pas comme des gens qui ne connaissent pas Dieu. N’aimez pas les mauvaises choses qui appartiennent à ce monde. Si quelqu’un aime ces choses, cela montre qu’il n’aime pas Dieu, son Père. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quelles sont les mauvaises choses qui appartiennent à ce monde ? Les gens veulent faire de mauvaises choses pour être heureux. Les gens veulent avoir des choses qu’ils voient, même de mauvaises choses. Les gens veulent montrer aux autres à quel point ils sont riches. Ces idées ne viennent pas de Dieu, notre Père. Ce sont les pensées de personnes qui appartiennent au monde. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un jour, ces gens et les choses qu’ils voudront ne seront plus là. Mais ceux qui continuent de faire ce que Dieu veut, vivront éternellement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les gens qui sont contre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mes enfants, le monde finira bientôt. Vous avez entendu que l’ennemi de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' apparaîtra. Vous pouvez voir que de nombreux ennemis de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sont déjà apparus. Cela nous montre que le monde va vraiment se terminer bientôt. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ces gens faisaient partie de notre groupe de croyants. Mais ils nous ont quittés. Ils n’ont jamais vraiment appartenu à notre groupe. S’ils étaient vraiment de vrais croyants, ils allaient rester avec nous. Quand ils nous ont quittés, cela a clairement montré qu’aucun d’entre eux ne nous appartenait vraiment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', le Saint, vous a donné le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: '. Par conséquent, vous savez tous ce qui est vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C’est pourquoi je vous écris. Ce n’est pas parce que vous ne connaissez pas encore le vrai message de Dieu. Je vous écris parce que vous connaissez ce vrai message. Et vous pouvez être sûrs qu’il n’y a aucun mensonge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Qui sont les gens qui disent les pires mensonges ? C’est toute personne qui dit que Jésus n’est pas le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: . Une personne comme ça est l’ennemie de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Elle parle contre Dieu, le Père, et contre Jésus, son Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toute personne qui dit que Jésus n’est pas le Fils de Dieu, n’appartient pas au Père. Mais toute personne qui accepte Jésus comme Fils de Dieu, appartient également au Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quant à vous, souvenez‑vous toujours du vrai message que vous avez entendu au début. Si vous continuez de croire à ce message, vous resterez unis avec le Fils et avec le Père. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C’est la vraie vie qui continue pour toujours. Et c’est ce que Dieu a promis de nous donner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Certaines personnes essaient de vous éloigner du vrai message de Dieu. Je vous écris ces choses pour que vous connaissiez ces gens. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vous a donné le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' et il continue de vous aider. Donc, vous n’avez pas besoin que les gens vous apprennent ce qui est vrai. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' lui‑même vous enseigne tout sur le message de Dieu. Il vous aide à savoir ce qui est vraiment vrai. Il ne vous dit aucun mensonge. Donc, vous devez vous rappeler ce qu’il vous a enseigné : Restez unis avec '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Oui, mes enfants, continuez d’être unis au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Ensuite, nous n’aurons pas honte lorsqu’il reviendra dans ce monde. Nous n’aurons pas peur de le rencontrer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Vous savez que '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' ne fait que ce qui est bien. Vous devez donc savoir ceci : Quiconque continue de faire ce qui est bien, est devenu un enfant de Dieu.'
