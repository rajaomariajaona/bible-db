document_id: 2CO.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: heading
    content: Paul parle de son travail en tant que serviteur de Jésus‑Christ
  - type: text
    content: Moi, Paul, je dois vous demander quelque chose. Vous pensez peut‑être que je suis humble seulement lorsque je suis là avec vous. Vous pensez que je vous parle fortement seulement lorsque je suis loin ! Maintenant je suis loin de vous. Mais je suis toujours humble et bon, comme Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Certaines personnes disent : Les lettres de Paul sont puissantes et elles disent des choses fortes. Mais quand il est ici avec nous, il semble faible. Et les mots qu’il dit n’ont aucune valeur. '
  '11':
  - type: text
    content: 'Toute personne qui dit des choses comme cela devrait comprendre ceci : Il n’y a pas de différence entre ce que nous écrivons et ce que nous faisons. Lorsque nous viendrons à vous, nous ferons ce que nous avons écrit dans nos lettres.'
  '12':
  - type: text
    content: 'Certaines personnes se vantent. Elles disent à quel point elles sont intelligentes. Mais nous ne pouvions jamais faire ça. Nous ne pouvions même pas essayer d’être comme ces gens. Mais ces gens ne comprennent rien. Ils décident entre eux de leur qualité. Ils se regardent pour voir s’ils sont meilleurs ou pires. '
  '13':
  - type: text
    content: 'Quant à nous, nous ne serons fiers que du travail que Dieu nous a confié. Nous ne serons fiers de rien de plus. Et cela concerne aussi notre travail parmi vous. '
  '14':
  - type: text
    content: Nous avons été les premiers à venir jusqu’à Corinthe pour vous dire la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Cela faisait partie du travail que Dieu nous a confié. Il est donc juste pour nous de vous dire à quel point nous sommes fiers.
  '15':
  - type: text
    content: 'Nous ne nous glorifions pas pour le travail que d’autres ont accompli. Ce n’est pas juste. Mais nous espérons que vous continuerez de croire de plus en plus fermement. De cette façon, notre travail parmi vous deviendra encore plus grand. Mais ce sera toujours le travail que Dieu nous a donné, et rien de plus. '
  '16':
  - type: text
    content: 'Ensuite, nous voulons dire la Bonne Nouvelle de Dieu aux gens dans des endroits au‑delà de l’endroit où vous êtes. Ce ne sont pas les endroits où Dieu a envoyé d’autres personnes travailler. Alors, nous ne nous glorifierons pas nous‑mêmes pour le travail que quelqu’un d’autre a fait. '
  '17':
  - type: text
    content: 'La Bible dit ceci :'
  - type: text
    content: Si vous voulez être fiers de quelque chose,
  - type: text
    content: 'Soyez fiers de ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait.'
  '18':
  - type: text
    content: 'Qui est vraiment bon ? Ce n’est pas la personne qui se vante. C’est la personne qui, selon le '
  - type: text
    content: Seigneur
  - type: text
    content: ', est une bonne personne.'
  '2':
  - type: text
    content: Ecoutez donc ce que je vous demande. Certains parmi vous pensent que nous vivons comme des gens qui appartiennent à ce monde. Quand je viendrai vous rendre visite, je suis sûr que je serai assez courageux pour parler contre ces gens. Mais je ne veux pas parler fermement comme cela contre vous tous.
  '3':
  - type: text
    content: 'Il est vrai que nous vivons dans ce monde en tant qu’êtres humains. Mais nous n’utilisons pas nos idées humaines pour lutter contre ce qui ne va pas. '
  '4':
  - type: text
    content: 'C’est comme si nous combattions dans une guerre, mais nous n’utilisons pas d’armes humaines. Mais, nous utilisons les armes de Dieu. Ces armes sont suffisamment puissantes pour détruire les points forts de l’ennemi. Nous utilisons ces armes pour détruire les fausses idées des gens. '
  '5':
  - type: text
    content: Les gens peuvent exprimer des idées orgueilleuses qui empêchent les autres de connaître Dieu. Nous montrons que ces idées sont complètement fausses. Nous changeons la façon dont les gens pensent, afin qu’ils obéissent à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '6':
  - type: text
    content: Vous devez montrer que vous êtes prêts à obéir complètement. Ensuite, nous serons prêts à punir quiconque refuse d’obéir de quelque façon que ce soit.
  '7':
  - type: text
    content: Regardez attentivement ce qui se passe parmi vous. Si quelqu’un est sûr d’appartenir à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', il doit se souvenir de cela : Nous appartenons également à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', tout comme lui. '
  '8':
  - type: text
    content: 'Vous pensez peut‑être que je me glorifie un peu trop de mon pouvoir. Mais c’est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui nous a donné ce pouvoir d’'
  - type: text
    content: apôtres
  - type: text
    content: . Nous avons ce pouvoir, afin que nous puissions vous aider à devenir des croyants plus forts. Nous ne l’avons pas pour que nous puissions vous détruire ! Je n’ai donc pas honte de me glorifier de cela.
  '9':
  - type: text
    content: 'Lorsque je vous écris des lettres, je n’essaie pas de vous faire peur. Je vous en prie, ne vous inquiétez pas. '
