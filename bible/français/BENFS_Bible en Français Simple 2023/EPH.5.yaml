document_id: EPH.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Vivez comme les enfants de Dieu
  - type: text
    content: Vous êtes les enfants de Dieu qu’il aime. Donc, vous devez essayer d’être comme lui.
  '10':
  - type: text
    content: 'Essayez d’apprendre ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pense être juste. '
  '11':
  - type: text
    content: 'Les personnes qui appartiennent à l’obscurité font des choses mauvaises. Ne vous intéressez jamais aux mauvaises choses comme ça. Ces choses n’ont pas de bon résultat. Mais, montrez comment ces choses sont vraiment mauvaises. '
  '12':
  - type: text
    content: 'Les gens devraient avoir honte même de parler de mauvaises choses que les gens font en secret. '
  '13':
  - type: text
    content: 'Mais quand quelque chose sort de l’obscurité, la lumière de Dieu brille sur elle. '
  '14':
  - type: text
    content: 'Tout ce sur quoi la lumière de Dieu brille, devient lumière. Voilà pourquoi il est dit :'
  - type: text
    content: Levez‑vous, vous qui dormez.
  - type: text
    content: Levez‑vous parmi les morts,
  - type: text
    content: 'Et le '
  - type: text
    content: Christ
  - type: text
    content: ' brillera sur vous.'
  '15':
  - type: text
    content: 'Donc, vous devez être très prudents de votre façon de vivre. Vivez comme les gens qui comprennent ce qui est juste et bon. Ne vivez pas comme des gens qui ne comprennent rien. '
  '16':
  - type: text
    content: 'Ce sont les mauvais moments, donc utilisez bien chaque moment. '
  '17':
  - type: text
    content: 'Ne vous laissez pas tomber dans le mal. Mais, comprenez ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' veut.'
  '18':
  - type: text
    content: Ne buvez pas trop de vin, parce que cela va causer de mauvaises choses. Ça ne vous permettra pas à bien vous comporter. Mais, que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous remplisse.'
  '19':
  - type: text
    content: 'Parlez les uns aux autres avec toutes sortes de chansons spirituelles. Chantez et faites de la musique au '
  - type: text
    content: Seigneur
  - type: text
    content: ' dans vos cœurs.'
  '2':
  - type: text
    content: 'Continuez toujours d’aimer les autres, comme '
  - type: text
    content: Christ
  - type: text
    content: ' vous a aimés. Il nous aimait tellement qu’il se donnait pour nous. Il s’est donné lui‑même comme un '
  - type: text
    content: sacrifice
  - type: text
    content: ' à Dieu. Son '
  - type: text
    content: sacrifice
  - type: text
    content: ' avait une belle odeur qui fait Dieu très heureux.'
  '20':
  - type: text
    content: 'Remerciez toujours Dieu, le Père, pour toute chose par le nom de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  - type: heading
    content: Les épouses et les maris
  '21':
  - type: text
    content: 'Soyez des serviteurs des uns aux autres, parce que le '
  - type: text
    content: Christ
  - type: text
    content: ' est votre maître.'
  '22':
  - type: text
    content: 'Femmes, obéissez à vos propres maris comme vous obéissez au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Parce que le mari est le chef de sa femme, tout comme '
  - type: text
    content: Christ
  - type: text
    content: ' est le chef de l’Église (son peuple). L’Église est le corps de '
  - type: text
    content: Christ
  - type: text
    content: ' et il la sauve. '
  '24':
  - type: text
    content: 'Comme l’Église met le '
  - type: text
    content: Christ
  - type: text
    content: ' en première position, ainsi les femmes doivent mettre leurs maris en première position pour toute chose.'
  '25':
  - type: text
    content: 'Maris, aimez vos femmes comme le '
  - type: text
    content: Christ
  - type: text
    content: ' a aimé l’Église (son peuple). '
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même s’est donné pour l’Église, '
  '26':
  - type: text
    content: 'afin qu’il puisse la rendre complètement bonne et propre. Il l’a lavée avec de l’eau par sa Parole. '
  '27':
  - type: text
    content: Alors il peut l’amener à lui‑même comme une belle Église, sans rien de mauvais ou une marque sale sur elle. Il peut l’amener à lui‑même comme une toute bonne Église, avec rien de mal.
  '28':
  - type: text
    content: 'Les maris doivent aimer leurs femmes tout comme ils aiment leur propre corps. Un homme qui aime sa femme s’aime lui‑même. '
  '29':
  - type: text
    content: 'Aucun homme n’a jamais haï sa propre chair. Non, au contraire, il la nourrit et prend soin de cela. Il se soucie de son corps comme le '
  - type: text
    content: Christ
  - type: text
    content: ' prend soin de l’Église (son peuple). '
  '3':
  - type: text
    content: Donc, vous ne devez jamais avoir de relations sexuelles avec quelqu’un qui n’est pas votre propre femme ou mari. Vous ne devez même pas envier de faire quelque chose comme ça. N’enviez pas trop quoi que ce soit pour vous‑mêmes. Le peuple de Dieu ne doit jamais même penser à tout ce qui est mauvais ou impur. Le peuple de Dieu ne doit pas vivre comme cela.
  '30':
  - type: text
    content: Christ
  - type: text
    content: ' prend soin de nous, parce que nous faisons partie de son propre corps. '
  '31':
  - type: text
    content: 'Comme l’Ancien Testament dit : Pour cette raison, l’homme quittera son père et sa mère et il deviendra uni avec sa femme. Ensuite, ces 2 personnes vont devenir un corps. '
  '32':
  - type: text
    content: 'Ces paroles nous montrent des choses importantes qui sont difficiles à comprendre. Je dis qu’elles nous montrent sur le '
  - type: text
    content: Christ
  - type: text
    content: ' et l’Église.'
  '33':
  - type: text
    content: Mais elles sont également importantes pour vous. Chacun d’entre vous les maris doit aimer sa propre femme comme lui‑même. Et chaque femme doit être prête à obéir à son mari.
  '4':
  - type: text
    content: Vous ne devez pas parler de mauvaises choses ou stupides, comme des imbéciles font. Ce n’est pas bon pour le peuple de Dieu de parler comme ça. Au lieu de cela, vous devriez remercier Dieu.
  '5':
  - type: text
    content: 'Une personne qui a des relations sexuelles avec quelqu’un d’autre que sa propre femme ou son propre mari ne peut pas appartenir au peuple de Dieu. Une personne qui fait du mal, des choses impures ne peut pas appartenir au peuple de Dieu. Une personne qui veut s’approprier trop de choses ne peut pas appartenir au peuple de Dieu. Cette personne adore vraiment quelque chose d’autre plus que Dieu. Aucune de ces sortes de gens ne recevra jamais ce que Dieu avait préparé pour son propre peuple. Ces types de gens ne peuvent pas appartenir à ceux qui acceptent '
  - type: text
    content: Christ
  - type: text
    content: ', et à Dieu comme leur Roi. Vous pouvez être sûrs de cela.'
  '6':
  - type: text
    content: Ne laissez personne vous faire croire aux fausses idées par des paroles vaines qu’elle dit. Dieu sera certainement en colère contre les gens qui font ces mauvaises choses. Il punira des gens qui ne lui obéissent pas.
  '7':
  - type: text
    content: 'Donc, ne répondez pas à ces types de gens. '
  '8':
  - type: text
    content: 'Vous étiez dans l’obscurité une fois. Mais maintenant que vous êtes dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous êtes lumière. Donc, vivez comme les gens qui appartiennent à la lumière.'
  '9':
  - type: text
    content: La lumière amène les gens à être bons. Elle pousse les gens à faire ce qui est juste. Et elle leur fait dire ce qui est vrai.
