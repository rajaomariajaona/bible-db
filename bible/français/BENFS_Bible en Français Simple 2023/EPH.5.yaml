document_id: EPH.5,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 5
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vivez comme les enfants de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vous êtes les enfants de Dieu qu’il aime. Donc, vous devez essayer d’être comme lui.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Essayez d’apprendre ce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pense être juste. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les personnes qui appartiennent à l’obscurité font des choses mauvaises. Ne vous intéressez jamais aux mauvaises choses comme ça. Ces choses n’ont pas de bon résultat. Mais, montrez comment ces choses sont vraiment mauvaises. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les gens devraient avoir honte même de parler de mauvaises choses que les gens font en secret. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais quand quelque chose sort de l’obscurité, la lumière de Dieu brille sur elle. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tout ce sur quoi la lumière de Dieu brille, devient lumière. Voilà pourquoi il est dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez‑vous, vous qui dormez.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez‑vous parmi les morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' brillera sur vous.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Donc, vous devez être très prudents de votre façon de vivre. Vivez comme les gens qui comprennent ce qui est juste et bon. Ne vivez pas comme des gens qui ne comprennent rien. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ce sont les mauvais moments, donc utilisez bien chaque moment. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ne vous laissez pas tomber dans le mal. Mais, comprenez ce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' veut.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ne buvez pas trop de vin, parce que cela va causer de mauvaises choses. Ça ne vous permettra pas à bien vous comporter. Mais, que l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu vous remplisse.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Parlez les uns aux autres avec toutes sortes de chansons spirituelles. Chantez et faites de la musique au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dans vos cœurs.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Continuez toujours d’aimer les autres, comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' vous a aimés. Il nous aimait tellement qu’il se donnait pour nous. Il s’est donné lui‑même comme un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' à Dieu. Son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' avait une belle odeur qui fait Dieu très heureux.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Remerciez toujours Dieu, le Père, pour toute chose par le nom de notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les épouses et les maris
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Soyez des serviteurs des uns aux autres, parce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est votre maître.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Femmes, obéissez à vos propres maris comme vous obéissez au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Parce que le mari est le chef de sa femme, tout comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est le chef de l’Église (son peuple). L’Église est le corps de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et il la sauve. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Comme l’Église met le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' en première position, ainsi les femmes doivent mettre leurs maris en première position pour toute chose.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Maris, aimez vos femmes comme le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a aimé l’Église (son peuple). '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même s’est donné pour l’Église, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'afin qu’il puisse la rendre complètement bonne et propre. Il l’a lavée avec de l’eau par sa Parole. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Alors il peut l’amener à lui‑même comme une belle Église, sans rien de mauvais ou une marque sale sur elle. Il peut l’amener à lui‑même comme une toute bonne Église, avec rien de mal.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Les maris doivent aimer leurs femmes tout comme ils aiment leur propre corps. Un homme qui aime sa femme s’aime lui‑même. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Aucun homme n’a jamais haï sa propre chair. Non, au contraire, il la nourrit et prend soin de cela. Il se soucie de son corps comme le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' prend soin de l’Église (son peuple). '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Donc, vous ne devez jamais avoir de relations sexuelles avec quelqu’un qui n’est pas votre propre femme ou mari. Vous ne devez même pas envier de faire quelque chose comme ça. N’enviez pas trop quoi que ce soit pour vous‑mêmes. Le peuple de Dieu ne doit jamais même penser à tout ce qui est mauvais ou impur. Le peuple de Dieu ne doit pas vivre comme cela.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' prend soin de nous, parce que nous faisons partie de son propre corps. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Comme l’Ancien Testament dit : Pour cette raison, l’homme quittera son père et sa mère et il deviendra uni avec sa femme. Ensuite, ces 2 personnes vont devenir un corps. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ces paroles nous montrent des choses importantes qui sont difficiles à comprendre. Je dis qu’elles nous montrent sur le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et l’Église.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Mais elles sont également importantes pour vous. Chacun d’entre vous les maris doit aimer sa propre femme comme lui‑même. Et chaque femme doit être prête à obéir à son mari.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vous ne devez pas parler de mauvaises choses ou stupides, comme des imbéciles font. Ce n’est pas bon pour le peuple de Dieu de parler comme ça. Au lieu de cela, vous devriez remercier Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Une personne qui a des relations sexuelles avec quelqu’un d’autre que sa propre femme ou son propre mari ne peut pas appartenir au peuple de Dieu. Une personne qui fait du mal, des choses impures ne peut pas appartenir au peuple de Dieu. Une personne qui veut s’approprier trop de choses ne peut pas appartenir au peuple de Dieu. Cette personne adore vraiment quelque chose d’autre plus que Dieu. Aucune de ces sortes de gens ne recevra jamais ce que Dieu avait préparé pour son propre peuple. Ces types de gens ne peuvent pas appartenir à ceux qui acceptent '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', et à Dieu comme leur Roi. Vous pouvez être sûrs de cela.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ne laissez personne vous faire croire aux fausses idées par des paroles vaines qu’elle dit. Dieu sera certainement en colère contre les gens qui font ces mauvaises choses. Il punira des gens qui ne lui obéissent pas.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Donc, ne répondez pas à ces types de gens. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous étiez dans l’obscurité une fois. Mais maintenant que vous êtes dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', vous êtes lumière. Donc, vivez comme les gens qui appartiennent à la lumière.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La lumière amène les gens à être bons. Elle pousse les gens à faire ce qui est juste. Et elle leur fait dire ce qui est vrai.
