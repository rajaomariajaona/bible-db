document_id: MAT.8,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 8
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Un homme malade de la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lèpre
    - type: text
      text: ' vient rencontrer Jésus'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jésus est descendu de la montagne. Alors une grande foule le suivait.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus a entendu ce que cet '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' a dit. Et Jésus était très surpris. Il a dit à la foule qui le suivait : Je vous dis la vérité. Je n’ai trouvé personne comme cet homme en Israël. Personne d’autre ne croit si bien en moi que lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je vous dis la vérité : Beaucoup de gens viendront de partout dans le monde. Ils prendront leurs places dans le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: '. Ils vont s’asseoir pour manger avec Abraham, Isaac et Jacob. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Certaines personnes sont nées pour appartenir au Royaume. Mais les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu les jetteront dans les endroits sombres en dehors de son Royaume. Là, les gens vont pleurer. Et ils vont grincer leurs dents ensemble, parce qu’ils seront en colère.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Alors Jésus a dit à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: '  : Rentre à la maison. Tu as cru que je guérirai ton serviteur. Donc, je vais le faire. Et au même moment‑là, le serviteur était guéri.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit beaucoup de gens
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jésus est entré dans la maison de Pierre. Là, il a vu la mère de l’épouse de Pierre. Elle était malade sur son lit. Elle souffrait de la fièvre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Jésus a touché sa main et aussitôt la fièvre est terminée. Elle s’est levée et elle a servi Jésus.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ce soir‑là, des gens ont amené des malades auprès de Jésus. Les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' vivaient dans un grand nombre de ces malades. Jésus a parlé aux mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Et ils sont sortis des gens. Il a guéri tous les malades. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors ces paroles de Dieu au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Ésaïe se sont accomplies : Il a pris nos infirmités. Il a porté nos maladies.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Un jour, Jésus a vu une grande foule autour de lui. Alors il a dit à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Allons de l’autre côté de la mer. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Un enseignant de la loi est venu auprès de Jésus. Il lui a dit ceci : Maître, je veux devenir un de tes  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: . Je vais aller avec toi partout où tu iras.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ensuite, un homme était malade de la  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: lèpre
    - type: text
      text: '. Il est venu auprès de Jésus. L’homme s’est mis à genoux devant lui. Il disait : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', si tu le veux, guéris‑moi. S’il te plaît, fais‑le.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jésus lui a dit : Les renards (animaux) ont un endroit pour vivre. Les oiseaux sauvages ont également leurs propres lieux de vie. Mais le Fils de l’homme n’a pas de place fixe pour se coucher et dormir.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Un autre homme qui était déjà un  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' de Jésus lui a dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je vais venir avec toi. Mais d’abord, permets‑moi de rentrer à la maison pour enterrer mon père. Après cela, je viendrai avec toi.  '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus lui a dit : Laisse ceux qui sont morts enterrer leurs morts.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus arrête une tempête
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors Jésus est monté dans un petit bateau. Ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' l’ont suivi dans ce petit bateau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Brusquement, il y a eu une grande tempête sur la mer. L’eau a commencé à remplir le petit bateau. Il était presque sous l’eau. Mais Jésus dormait. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont allés auprès de Jésus. Ils le réveillaient. Ils disaient : Sauve‑nous, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', nous allons bientôt mourir dans l’eau.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus a dit : Vous ne devriez pas avoir très peur. Vous ne croyez pas beaucoup en moi ! Puis Jésus s’est levé et il a parlé au vent et à l’eau. Il a dit : Silence, arrêtez de bouger ! Puis le vent a cessé. Les eaux de la mer sont devenues encore calmes.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient très surpris. Ils se demandaient l’un à l’autre : Ils est quel genre d’homme? Même le vent et l’eau lui obéissent !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit 2 hommes
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jésus est arrivé de l’autre côté de la mer de Galilée. Il était dans le pays de Gadara. Les habitants de Gadara étaient les Gadaréniens. Jésus est arrivé près du lieu où ils enterraient les morts. 2 hommes sont venus rencontrer Jésus. Les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' vivaient dans ces 2 hommes. Les hommes étaient très dangereux. Tout le monde avait trop peur de marcher près de cet endroit à cause d’eux. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Les 2 hommes ont vu Jésus. A ce moment‑là, ils ont immédiatement crié à lui : Qu’est‑ce que tu vas faire avec nous ? Tu es le Fils de Dieu. Es‑tu venu pour nous punir avant le bon moment ?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus a étendu la main vers lui et l’a touché. Il a dit : Je veux t’aider, sois bien. Immédiatement, il était guéri.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Beaucoup de porcs se nourrissaient près de cet endroit. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' ont demandé à Jésus : S’il te plaît, tu peux nous sortir de ces hommes. Tu peux alors nous envoyer dans ces porcs. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jésus a dit aux mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '  : Allez, alors les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' sont sortis des hommes. Ils sont donc entrés dans les porcs. Tous les porcs se sont précipités du haut des pentes. Ils ont couru dans la mer. Ils sont tous morts dans l’eau. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il y avait des hommes là‑bas. Ces hommes prenaient soin des porcs. Quand ceci est arrivé, ces hommes se sont enfuis dans la ville. Ils disaient aux gens tout ce qui est arrivé aux hommes délivrés par Jésus. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Tous les gens sont alors sortis de la ville. Ils sont allés rencontrer Jésus. Et quand ils l’ont vu, ils lui ont dit : S’il te plaît, quitte notre territoire.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jésus lui a dit : Ne dis à personne ceci. Au lieu de cela, va te montrer au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtre
    - type: text
      text: '. Apporte‑lui une offrande à Dieu, comme Moïse avait dit : Fais cela pour remercier Dieu de ce qui est arrivé. Et ce sera aussi pour montrer à tous que tu es maintenant bien.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' de l’armée croit que Jésus peut l’aider'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus est entré à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. Alors un  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: ' est venu à sa rencontre.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il a demandé à Jésus : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mon serviteur est couché sur son lit à la maison. Il ne peut pas bouger. Il se sent très mal.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jésus a dit à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: '  : Je vais aller avec toi à ta maison. Je vais guérir ton serviteur.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' a dit à Jésus : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tu es très grand. Je ne mérite pas que tu entres dans ma maison. Tu as le pouvoir. Tu peux dire un seul mot : Il sera bien. Et je sais que mon serviteur guérira. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Quelqu’un a le pouvoir sur moi. J’ai aussi le pouvoir sur les autres soldats. Je dis à un soldat : Va et il va. Je dis à un autre soldat, viens et il vient. Je dis à mon serviteur : Fais ceci, et il le fait.'
