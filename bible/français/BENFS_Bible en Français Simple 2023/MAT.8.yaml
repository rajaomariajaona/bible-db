document_id: MAT.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: heading
    content: Un homme malade de la  lèpre vient rencontrer Jésus
  - type: text
    content: Jésus est descendu de la montagne. Alors une grande foule le suivait.
  '10':
  - type: text
    content: 'Jésus a entendu ce que cet '
  - type: text
    content: officier
  - type: text
    content: ' a dit. Et Jésus était très surpris. Il a dit à la foule qui le suivait : Je vous dis la vérité. Je n’ai trouvé personne comme cet homme en Israël. Personne d’autre ne croit si bien en moi que lui. '
  '11':
  - type: text
    content: 'Je vous dis la vérité : Beaucoup de gens viendront de partout dans le monde. Ils prendront leurs places dans le  '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. Ils vont s’asseoir pour manger avec Abraham, Isaac et Jacob. '
  '12':
  - type: text
    content: 'Certaines personnes sont nées pour appartenir au Royaume. Mais les  '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu les jetteront dans les endroits sombres en dehors de son Royaume. Là, les gens vont pleurer. Et ils vont grincer leurs dents ensemble, parce qu’ils seront en colère.'
  '13':
  - type: text
    content: Alors Jésus a dit à l’
  - type: text
    content: officier
  - type: text
    content: '  : Rentre à la maison. Tu as cru que je guérirai ton serviteur. Donc, je vais le faire. Et au même moment‑là, le serviteur était guéri.'
  - type: heading
    content: Jésus guérit beaucoup de gens
  '14':
  - type: text
    content: 'Jésus est entré dans la maison de Pierre. Là, il a vu la mère de l’épouse de Pierre. Elle était malade sur son lit. Elle souffrait de la fièvre. '
  '15':
  - type: text
    content: Jésus a touché sa main et aussitôt la fièvre est terminée. Elle s’est levée et elle a servi Jésus.
  '16':
  - type: text
    content: 'Ce soir‑là, des gens ont amené des malades auprès de Jésus. Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' vivaient dans un grand nombre de ces malades. Jésus a parlé aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. Et ils sont sortis des gens. Il a guéri tous les malades. '
  '17':
  - type: text
    content: 'Alors ces paroles de Dieu au '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe se sont accomplies : Il a pris nos infirmités. Il a porté nos maladies.'
  '18':
  - type: text
    content: 'Un jour, Jésus a vu une grande foule autour de lui. Alors il a dit à ses  '
  - type: text
    content: disciples
  - type: text
    content: '  : Allons de l’autre côté de la mer. '
  '19':
  - type: text
    content: 'Un enseignant de la loi est venu auprès de Jésus. Il lui a dit ceci : Maître, je veux devenir un de tes  '
  - type: text
    content: disciples
  - type: text
    content: . Je vais aller avec toi partout où tu iras.
  '2':
  - type: text
    content: 'Ensuite, un homme était malade de la  '
  - type: text
    content: lèpre
  - type: text
    content: '. Il est venu auprès de Jésus. L’homme s’est mis à genoux devant lui. Il disait : '
  - type: text
    content: Seigneur
  - type: text
    content: ', si tu le veux, guéris‑moi. S’il te plaît, fais‑le.'
  '20':
  - type: text
    content: 'Jésus lui a dit : Les renards (animaux) ont un endroit pour vivre. Les oiseaux sauvages ont également leurs propres lieux de vie. Mais le Fils de l’homme n’a pas de place fixe pour se coucher et dormir.'
  '21':
  - type: text
    content: 'Un autre homme qui était déjà un  '
  - type: text
    content: disciple
  - type: text
    content: ' de Jésus lui a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je vais venir avec toi. Mais d’abord, permets‑moi de rentrer à la maison pour enterrer mon père. Après cela, je viendrai avec toi.  '
  '22':
  - type: text
    content: 'Jésus lui a dit : Laisse ceux qui sont morts enterrer leurs morts.'
  - type: heading
    content: Jésus arrête une tempête
  '23':
  - type: text
    content: 'Alors Jésus est monté dans un petit bateau. Ses  '
  - type: text
    content: disciples
  - type: text
    content: ' l’ont suivi dans ce petit bateau. '
  '24':
  - type: text
    content: 'Brusquement, il y a eu une grande tempête sur la mer. L’eau a commencé à remplir le petit bateau. Il était presque sous l’eau. Mais Jésus dormait. '
  '25':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés auprès de Jésus. Ils le réveillaient. Ils disaient : Sauve‑nous, '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous allons bientôt mourir dans l’eau.'
  '26':
  - type: text
    content: 'Jésus a dit : Vous ne devriez pas avoir très peur. Vous ne croyez pas beaucoup en moi ! Puis Jésus s’est levé et il a parlé au vent et à l’eau. Il a dit : Silence, arrêtez de bouger ! Puis le vent a cessé. Les eaux de la mer sont devenues encore calmes.'
  '27':
  - type: text
    content: 'Les  '
  - type: text
    content: disciples
  - type: text
    content: ' étaient très surpris. Ils se demandaient l’un à l’autre : Ils est quel genre d’homme? Même le vent et l’eau lui obéissent !'
  - type: heading
    content: Jésus guérit 2 hommes
  '28':
  - type: text
    content: 'Jésus est arrivé de l’autre côté de la mer de Galilée. Il était dans le pays de Gadara. Les habitants de Gadara étaient les Gadaréniens. Jésus est arrivé près du lieu où ils enterraient les morts. 2 hommes sont venus rencontrer Jésus. Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' vivaient dans ces 2 hommes. Les hommes étaient très dangereux. Tout le monde avait trop peur de marcher près de cet endroit à cause d’eux. '
  '29':
  - type: text
    content: 'Les 2 hommes ont vu Jésus. A ce moment‑là, ils ont immédiatement crié à lui : Qu’est‑ce que tu vas faire avec nous ? Tu es le Fils de Dieu. Es‑tu venu pour nous punir avant le bon moment ?'
  '3':
  - type: text
    content: 'Jésus a étendu la main vers lui et l’a touché. Il a dit : Je veux t’aider, sois bien. Immédiatement, il était guéri.'
  '30':
  - type: text
    content: 'Beaucoup de porcs se nourrissaient près de cet endroit. '
  '31':
  - type: text
    content: 'Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' ont demandé à Jésus : S’il te plaît, tu peux nous sortir de ces hommes. Tu peux alors nous envoyer dans ces porcs. '
  '32':
  - type: text
    content: 'Jésus a dit aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: '  : Allez, alors les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' sont sortis des hommes. Ils sont donc entrés dans les porcs. Tous les porcs se sont précipités du haut des pentes. Ils ont couru dans la mer. Ils sont tous morts dans l’eau. '
  '33':
  - type: text
    content: 'Il y avait des hommes là‑bas. Ces hommes prenaient soin des porcs. Quand ceci est arrivé, ces hommes se sont enfuis dans la ville. Ils disaient aux gens tout ce qui est arrivé aux hommes délivrés par Jésus. '
  '34':
  - type: text
    content: 'Tous les gens sont alors sortis de la ville. Ils sont allés rencontrer Jésus. Et quand ils l’ont vu, ils lui ont dit : S’il te plaît, quitte notre territoire.'
  '4':
  - type: text
    content: 'Jésus lui a dit : Ne dis à personne ceci. Au lieu de cela, va te montrer au '
  - type: text
    content: prêtre
  - type: text
    content: '. Apporte‑lui une offrande à Dieu, comme Moïse avait dit : Fais cela pour remercier Dieu de ce qui est arrivé. Et ce sera aussi pour montrer à tous que tu es maintenant bien.'
  - type: heading
    content: Un officier de l’armée croit que Jésus peut l’aider
  '5':
  - type: text
    content: 'Jésus est entré à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Alors un  '
  - type: text
    content: officier
  - type: text
    content: ' '
  - type: text
    content: romain
  - type: text
    content: ' est venu à sa rencontre.'
  '6':
  - type: text
    content: 'Il a demandé à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon serviteur est couché sur son lit à la maison. Il ne peut pas bouger. Il se sent très mal.'
  '7':
  - type: text
    content: Jésus a dit à l’
  - type: text
    content: officier
  - type: text
    content: '  : Je vais aller avec toi à ta maison. Je vais guérir ton serviteur.'
  '8':
  - type: text
    content: Mais l’
  - type: text
    content: officier
  - type: text
    content: ' a dit à Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es très grand. Je ne mérite pas que tu entres dans ma maison. Tu as le pouvoir. Tu peux dire un seul mot : Il sera bien. Et je sais que mon serviteur guérira. '
  '9':
  - type: text
    content: 'Quelqu’un a le pouvoir sur moi. J’ai aussi le pouvoir sur les autres soldats. Je dis à un soldat : Va et il va. Je dis à un autre soldat, viens et il vient. Je dis à mon serviteur : Fais ceci, et il le fait.'
