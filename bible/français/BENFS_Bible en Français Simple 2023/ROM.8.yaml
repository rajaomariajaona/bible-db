document_id: ROM.8
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 8
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous pouvons vivre par l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous savons maintenant ceci : Dieu a pardonné à ceux qui sont unis à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dieu ne dira jamais qu’ils sont fautifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si vous appartenez à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous donne une nouvelle vie. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu règne maintenant dans vos vies et il vous rend libres. Le péché et la mort n’ont plus de pouvoir sur vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La loi que Dieu a donnée à Moïse ne pouvait pas nous libérer ainsi. Nous étions trop faibles pour obéir à ses lois, parce que nous sommes humains. Mais Dieu a fait ce que la loi de Moïse ne pouvait pas faire. Il a envoyé son propre Fils pour devenir une personne comme nous. Son corps humain était comme le corps de gens qui font de mauvaises choses. Le Fils de Dieu est mort en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour enlever la punition pour nos péchés. De cette façon, Dieu a détruit la puissance du péché sur les gens qui sont faibles et humains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dieu a fait cela afin que nous puissions devenir justes avec lui. La loi de Dieu nous a montré comment être juste avec lui. Et maintenant, nous pouvons être justes avec Dieu, si nous vivons avec l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu comme guide. Nous ne faisons pas ce que nos faibles pensées humaines veulent que nous fassions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Certaines personnes font ce que leurs faibles pensées humaines veulent qu’elles fassent. Ces gens pensent aux choses qui feront leur bonheur. Mais les gens qui vivent avec l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu comme guide réfléchissent à ce qui rendra l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les gens qui laissent leurs pensées humaines les dominer mourront. Mais les gens qui pensent à ce que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu veut, auront la vie avec Dieu. Ils auront la paix en eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si nos faibles pensées humaines nous dominent, nous devenons les ennemis de Dieu. Des gens comme ceux‑là ne veulent pas obéir à la loi de Dieu. Ils ne sont même pas capables d’obéir à cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les gens qui laissent leurs pensées humaines les diriger ne peuvent pas rendre Dieu heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais vous n’êtes pas comme cela. Vous n’obéissez plus à vos faibles pensées humaines. Mais, vous obéissez à l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu comme votre guide. C’est vrai si l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vit vraiment en vous. Mais si quelqu’un n’a pas l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' en lui, cette personne n’appartient pas à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais, si Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vit en vous, vous avez une nouvelle vie à cause de son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: '. Votre corps mourra un jour à cause de la puissance du péché. Mais votre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' vit, parce que Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vous a rétablis avec Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dieu a réveillé Jésus pour le faire revivre après sa mort. Maintenant, l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vit en vous. Ainsi, Dieu, qui a réveillé Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de la mort, fera revivre aussi vos corps humains. Il le fera par son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' qui vit en vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi, mes amis chrétiens, nous ne devons pas obéir à ce que nos faibles pensées humaines nous disent de faire. Nous n’avons plus à vivre comme cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si vous acceptez de vivre ainsi, vous mourrez. Mais, vous devez laisser l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous aider avec sa puissance. Ensuite, vous pouvez arrêter de faire les mauvaises choses que vos corps veulent faire. En conséquence, vous aurez la vie avec Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toutes ces personnes qui vivent avec l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu comme guide sont des enfants de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' que vous avez reçu de Dieu ne vous amène pas à le servir comme des esclaves. Cela vous fera de nouveau peur. Non. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' que Dieu vous a donné vous rend enfants de Dieu. Maintenant, il prend soin de vous. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu nous fait appeler Dieu : Abba, notre Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu lui‑même nous fait savoir que nous sommes les enfants de Dieu. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu et nos propres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' conviennent que cela est vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Parce que nous sommes les enfants de Dieu, nous savons aussi que nous recevrons de lui de bonnes choses. Ce sont les choses qu’il a promises de donner à ses enfants. Ensemble avec Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', nous recevrons les choses que Dieu a gardées pour lui. C’est vrai si nous acceptons d’avoir des problèmes comme Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' l’a fait. Ensuite, nous profiterons également de la vie au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' comme le fait Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu a préparé de grandes choses pour son peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pendant ce temps maintenant, nous avons des souffrances. Mais je suis sûr que ces problèmes ne sont pas vraiment très importants. Un jour, Dieu nous montrera toutes les grandes choses qu’il a préparées pour nous. Cela rendra les problèmes que nous avons maintenant très petits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le monde entier que Dieu a créé attend maintenant que quelque chose de grand se produise. Toute la création de Dieu attend donc avec espoir de découvrir qui sont vraiment les enfants de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dieu a fait que tout dans le monde perde son but. Cela n’était pas la volonté de ce que Dieu a créé. C’est plutôt Dieu qui a décidé que cela soit ainsi. Alors, la création de Dieu pourra espérer quelque chose de mieux dans le futur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: À ce moment‑là, le monde ne continuera pas d’être mauvais, comme maintenant. Il sera libéré de cette puissance. Il sera libéré pour profiter des grandes choses de Dieu, car les enfants de Dieu sont également libres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nous savons que tout dans le monde souffre encore beaucoup maintenant. La création entière pleure de douleur, comme une femme prête à avoir un bébé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il en est de même pour nous qui sommes croyants. Nous avons reçu l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu comme le premier de ses dons pour nous, mais nous pleurons aussi en nous‑mêmes. Nous attendons le moment où Dieu achèvera son grand travail. Ensuite, nous lui appartiendrons complètement comme ses enfants. Nos corps seront libérés de la puissance du péché.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Depuis que Dieu nous a sauvés, nous avons continué d’attendre que cela se produise. Un jour, nous recevrons ce que nous espérions. Nous n’aurons alors plus besoin d’espérer. Personne ne continue d’espérer quelque chose qu’il a déjà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais nous continuons d’espérer ce que nous ne voyons pas encore. Et donc, nous l’attendons patiemment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu nous aide également à le faire. Parce que nous sommes faibles, nous ne savons pas comment prier. Mais l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu lui‑même prie pour nous. Il crie à Dieu pour nous d’une manière que personne ne pourrait dire avec des mots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dieu voit au plus profond de nous, et il connaît nos pensées. Il comprend ce qui est dans la pensée de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Lorsque le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' prie pour le peuple de Dieu, il prie comme Dieu veut qu’il prie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nous savons que Dieu travaille pour aider ceux qui l’aiment. Il utilise tout ce qui leur arrive pour apporter quelque chose de bien. Il le fait pour les personnes qu’il a choisies de le servir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dieu avait déjà ces gens dans ses pensées depuis le début. Il a décidé qu’ils deviendront comme son Fils. Alors, son Fils pourra avoir beaucoup de jeunes frères et sœurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dieu avait déjà choisi ces gens pour être ses enfants. Pour cette raison, il les a appelés à venir à lui. Il a accepté ces gens comme lui‑même. Et ceux qu’il a acceptés, il les a aussi fait devenir grands.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu nous aime beaucoup
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ainsi, à cause de tout ce que Dieu fait pour nous, nous pouvons dire ceci : Si Dieu travaille pour nous, personne ne peut vraiment rien faire contre nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dieu n’a même pas gardé son propre Fils en sécurité. Au lieu de cela, il a donné son Fils pour mourir pour nous tous. Alors certainement, Dieu continuera d’être bon avec nous. En plus de son Fils, il nous donnera tout ce dont nous avons besoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Personne ne peut dire que le peuple de Dieu est fautif. Dieu lui‑même nous a acceptés comme étant justes avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ainsi, personne ne peut dire que Dieu nous punira encore. Personne ne peut dire cela, parce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même est mort pour nous. Et Dieu l’a réveillé pour qu’il redevienne vivant après sa mort. Maintenant, Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est assis à droite de Dieu dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Lui‑même prie Dieu pour nous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continuera toujours de nous aimer. Rien ne peut arrêter cela ! Nous pouvons avoir des problèmes. Les choses peuvent nous rendre tristes ou peureux. Les gens peuvent nous faire du mal. Nous ne pouvons avoir ni nourriture ni vêtements. Il peut y avoir un grand danger. Les gens peuvent même essayer de nous tuer. Mais aucune de ces choses ne peut empêcher Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de nous aimer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Comme il est dit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que nous sommes ton peuple, Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gens essaient de nous tuer tout le temps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils pensent que nous sommes comme des brebis
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous sommes prêts à être tués.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Parce que Dieu nous aime, aucun de ces problèmes ne pourra jamais nous vaincre. Il nous fait gagner contre eux.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: text
    text: 'J’en suis sûr. Rien ne peut empêcher Dieu de nous aimer. La mort ne peut pas faire cela. La vie ne peut pas faire cela. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' ne peuvent pas faire cela. Les démons ne peuvent pas le faire non plus. Rien de ce qui nous arrive maintenant ou de ce qui arrivera dans le futur ne peut le faire. Aucun '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' puissant ne peut le faire. Rien de ce qui est au‑dessus du monde ne peut faire cela, ni rien qui soit au fond du sol. Rien d’autre dans le monde entier ne peut empêcher Dieu de nous aimer. Grâce à notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', nous savons combien Dieu nous aime.'
