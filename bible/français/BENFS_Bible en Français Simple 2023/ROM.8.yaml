document_id: ROM.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: heading
    content: Nous pouvons vivre par l’Esprit de Dieu
  - type: text
    content: 'Nous savons maintenant ceci : Dieu a pardonné à ceux qui sont unis à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Dieu ne dira jamais qu’ils sont fautifs. '
  '10':
  - type: text
    content: Mais, si Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' vit en vous, vous avez une nouvelle vie à cause de son '
  - type: text
    content: Esprit
  - type: text
    content: '. Votre corps mourra un jour à cause de la puissance du péché. Mais votre '
  - type: text
    content: esprit
  - type: text
    content: ' vit, parce que Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' vous a rétablis avec Dieu. '
  '11':
  - type: text
    content: Dieu a réveillé Jésus pour le faire revivre après sa mort. Maintenant, l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vit en vous. Ainsi, Dieu, qui a réveillé Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' de la mort, fera revivre aussi vos corps humains. Il le fera par son '
  - type: text
    content: Esprit
  - type: text
    content: ' qui vit en vous.'
  '12':
  - type: text
    content: 'Ainsi, mes amis chrétiens, nous ne devons pas obéir à ce que nos faibles pensées humaines nous disent de faire. Nous n’avons plus à vivre comme cela. '
  '13':
  - type: text
    content: Si vous acceptez de vivre ainsi, vous mourrez. Mais, vous devez laisser l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous aider avec sa puissance. Ensuite, vous pouvez arrêter de faire les mauvaises choses que vos corps veulent faire. En conséquence, vous aurez la vie avec Dieu.'
  '14':
  - type: text
    content: Toutes ces personnes qui vivent avec l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu comme guide sont des enfants de Dieu. '
  '15':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' que vous avez reçu de Dieu ne vous amène pas à le servir comme des esclaves. Cela vous fera de nouveau peur. Non. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' que Dieu vous a donné vous rend enfants de Dieu. Maintenant, il prend soin de vous. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu nous fait appeler Dieu : Abba, notre Père. '
  '16':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu lui‑même nous fait savoir que nous sommes les enfants de Dieu. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu et nos propres '
  - type: text
    content: esprits
  - type: text
    content: ' conviennent que cela est vrai. '
  '17':
  - type: text
    content: Parce que nous sommes les enfants de Dieu, nous savons aussi que nous recevrons de lui de bonnes choses. Ce sont les choses qu’il a promises de donner à ses enfants. Ensemble avec Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', nous recevrons les choses que Dieu a gardées pour lui. C’est vrai si nous acceptons d’avoir des problèmes comme Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' l’a fait. Ensuite, nous profiterons également de la vie au '
  - type: text
    content: ciel
  - type: text
    content: ' comme le fait Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  - type: heading
    content: Dieu a préparé de grandes choses pour son peuple
  '18':
  - type: text
    content: 'Pendant ce temps maintenant, nous avons des souffrances. Mais je suis sûr que ces problèmes ne sont pas vraiment très importants. Un jour, Dieu nous montrera toutes les grandes choses qu’il a préparées pour nous. Cela rendra les problèmes que nous avons maintenant très petits. '
  '19':
  - type: text
    content: Le monde entier que Dieu a créé attend maintenant que quelque chose de grand se produise. Toute la création de Dieu attend donc avec espoir de découvrir qui sont vraiment les enfants de Dieu.
  '2':
  - type: text
    content: Si vous appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous donne une nouvelle vie. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu règne maintenant dans vos vies et il vous rend libres. Le péché et la mort n’ont plus de pouvoir sur vous.'
  '20':
  - type: text
    content: 'Dieu a fait que tout dans le monde perde son but. Cela n’était pas la volonté de ce que Dieu a créé. C’est plutôt Dieu qui a décidé que cela soit ainsi. Alors, la création de Dieu pourra espérer quelque chose de mieux dans le futur. '
  '21':
  - type: text
    content: À ce moment‑là, le monde ne continuera pas d’être mauvais, comme maintenant. Il sera libéré de cette puissance. Il sera libéré pour profiter des grandes choses de Dieu, car les enfants de Dieu sont également libres.
  '22':
  - type: text
    content: 'Nous savons que tout dans le monde souffre encore beaucoup maintenant. La création entière pleure de douleur, comme une femme prête à avoir un bébé. '
  '23':
  - type: text
    content: Il en est de même pour nous qui sommes croyants. Nous avons reçu l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu comme le premier de ses dons pour nous, mais nous pleurons aussi en nous‑mêmes. Nous attendons le moment où Dieu achèvera son grand travail. Ensuite, nous lui appartiendrons complètement comme ses enfants. Nos corps seront libérés de la puissance du péché.'
  '24':
  - type: text
    content: 'Depuis que Dieu nous a sauvés, nous avons continué d’attendre que cela se produise. Un jour, nous recevrons ce que nous espérions. Nous n’aurons alors plus besoin d’espérer. Personne ne continue d’espérer quelque chose qu’il a déjà. '
  '25':
  - type: text
    content: Mais nous continuons d’espérer ce que nous ne voyons pas encore. Et donc, nous l’attendons patiemment.
  '26':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu nous aide également à le faire. Parce que nous sommes faibles, nous ne savons pas comment prier. Mais l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu lui‑même prie pour nous. Il crie à Dieu pour nous d’une manière que personne ne pourrait dire avec des mots. '
  '27':
  - type: text
    content: Dieu voit au plus profond de nous, et il connaît nos pensées. Il comprend ce qui est dans la pensée de l’
  - type: text
    content: esprit
  - type: text
    content: '. Lorsque le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' prie pour le peuple de Dieu, il prie comme Dieu veut qu’il prie.'
  '28':
  - type: text
    content: 'Nous savons que Dieu travaille pour aider ceux qui l’aiment. Il utilise tout ce qui leur arrive pour apporter quelque chose de bien. Il le fait pour les personnes qu’il a choisies de le servir. '
  '29':
  - type: text
    content: 'Dieu avait déjà ces gens dans ses pensées depuis le début. Il a décidé qu’ils deviendront comme son Fils. Alors, son Fils pourra avoir beaucoup de jeunes frères et sœurs. '
  '3':
  - type: text
    content: 'La loi que Dieu a donnée à Moïse ne pouvait pas nous libérer ainsi. Nous étions trop faibles pour obéir à ses lois, parce que nous sommes humains. Mais Dieu a fait ce que la loi de Moïse ne pouvait pas faire. Il a envoyé son propre Fils pour devenir une personne comme nous. Son corps humain était comme le corps de gens qui font de mauvaises choses. Le Fils de Dieu est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour enlever la punition pour nos péchés. De cette façon, Dieu a détruit la puissance du péché sur les gens qui sont faibles et humains. '
  '30':
  - type: text
    content: Dieu avait déjà choisi ces gens pour être ses enfants. Pour cette raison, il les a appelés à venir à lui. Il a accepté ces gens comme lui‑même. Et ceux qu’il a acceptés, il les a aussi fait devenir grands.
  - type: heading
    content: Dieu nous aime beaucoup
  '31':
  - type: text
    content: 'Ainsi, à cause de tout ce que Dieu fait pour nous, nous pouvons dire ceci : Si Dieu travaille pour nous, personne ne peut vraiment rien faire contre nous. '
  '32':
  - type: text
    content: 'Dieu n’a même pas gardé son propre Fils en sécurité. Au lieu de cela, il a donné son Fils pour mourir pour nous tous. Alors certainement, Dieu continuera d’être bon avec nous. En plus de son Fils, il nous donnera tout ce dont nous avons besoin. '
  '33':
  - type: text
    content: 'Personne ne peut dire que le peuple de Dieu est fautif. Dieu lui‑même nous a acceptés comme étant justes avec lui. '
  '34':
  - type: text
    content: Ainsi, personne ne peut dire que Dieu nous punira encore. Personne ne peut dire cela, parce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même est mort pour nous. Et Dieu l’a réveillé pour qu’il redevienne vivant après sa mort. Maintenant, Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est assis à droite de Dieu dans le '
  - type: text
    content: ciel
  - type: text
    content: . Lui‑même prie Dieu pour nous.
  '35':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' continuera toujours de nous aimer. Rien ne peut arrêter cela ! Nous pouvons avoir des problèmes. Les choses peuvent nous rendre tristes ou peureux. Les gens peuvent nous faire du mal. Nous ne pouvons avoir ni nourriture ni vêtements. Il peut y avoir un grand danger. Les gens peuvent même essayer de nous tuer. Mais aucune de ces choses ne peut empêcher Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' de nous aimer. '
  '36':
  - type: text
    content: 'Comme il est dit dans la Bible :'
  - type: text
    content: Parce que nous sommes ton peuple, Dieu,
  - type: text
    content: Les gens essaient de nous tuer tout le temps.
  - type: text
    content: Ils pensent que nous sommes comme des brebis
  - type: text
    content: Et nous sommes prêts à être tués.
  '37':
  - type: text
    content: Parce que Dieu nous aime, aucun de ces problèmes ne pourra jamais nous vaincre. Il nous fait gagner contre eux.
  '38':
  - type: text
    content: 'J’en suis sûr. Rien ne peut empêcher Dieu de nous aimer. La mort ne peut pas faire cela. La vie ne peut pas faire cela. Les '
  - type: text
    content: anges
  - type: text
    content: ' ne peuvent pas faire cela. Les démons ne peuvent pas le faire non plus. Rien de ce qui nous arrive maintenant ou de ce qui arrivera dans le futur ne peut le faire. Aucun '
  - type: text
    content: esprit
  - type: text
    content: ' puissant ne peut le faire. Rien de ce qui est au‑dessus du monde ne peut faire cela, ni rien qui soit au fond du sol. Rien d’autre dans le monde entier ne peut empêcher Dieu de nous aimer. Grâce à notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', nous savons combien Dieu nous aime.'
  '4':
  - type: text
    content: Dieu a fait cela afin que nous puissions devenir justes avec lui. La loi de Dieu nous a montré comment être juste avec lui. Et maintenant, nous pouvons être justes avec Dieu, si nous vivons avec l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu comme guide. Nous ne faisons pas ce que nos faibles pensées humaines veulent que nous fassions.'
  '5':
  - type: text
    content: Certaines personnes font ce que leurs faibles pensées humaines veulent qu’elles fassent. Ces gens pensent aux choses qui feront leur bonheur. Mais les gens qui vivent avec l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu comme guide réfléchissent à ce qui rendra l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu heureux. '
  '6':
  - type: text
    content: Les gens qui laissent leurs pensées humaines les dominer mourront. Mais les gens qui pensent à ce que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu veut, auront la vie avec Dieu. Ils auront la paix en eux. '
  '7':
  - type: text
    content: 'Si nos faibles pensées humaines nous dominent, nous devenons les ennemis de Dieu. Des gens comme ceux‑là ne veulent pas obéir à la loi de Dieu. Ils ne sont même pas capables d’obéir à cela. '
  '8':
  - type: text
    content: Les gens qui laissent leurs pensées humaines les diriger ne peuvent pas rendre Dieu heureux.
  '9':
  - type: text
    content: Mais vous n’êtes pas comme cela. Vous n’obéissez plus à vos faibles pensées humaines. Mais, vous obéissez à l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu comme votre guide. C’est vrai si l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vit vraiment en vous. Mais si quelqu’un n’a pas l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de '
  - type: text
    content: Christ
  - type: text
    content: ' en lui, cette personne n’appartient pas à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
