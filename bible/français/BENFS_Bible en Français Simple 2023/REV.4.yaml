document_id: REV.4,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 4
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu sur son trône
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, j’ai regardé. Il y avait devant moi une porte ouverte dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. J’ai entendu la même voix que j’avais entendue auparavant. Cette voix me parlait comme une trompette et elle me disait : Viens ici. Je vais te montrer les choses qui doivent arriver après cela.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils font cela, les 24 anciens se penchent sur le sol. Ils adorent également le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu, qui est assis sur le trône et est vivant pour toujours. Ils placent leurs couronnes devant le trône de Dieu et ils le louent. Ils disent :'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et notre Dieu, tu mérites que les gens te disent ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le monde doit dire que tu es grand et puissant !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le monde doit t’
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: ', car tu as fait toutes choses.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as décidé de les faire et tu les as donc faites !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a donc fait exister tout au monde.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immédiatement, l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu m’a fait voir et entendre plus de choses. C’était comme un rêve. Je voyais un trône dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ', avec quelqu’un assis dessus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La personne qui était assise là brillait d’une lumière rouge et blanche brillante. C’était comme de belles pierres appelées jaspe et sardoine. Autour du trône, il y avait un arc‑en‑ciel qui brillait d’une lumière verte brillante comme une pierre d’émeraude. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout autour du trône, il y avait 24 autres trônes. 24 anciens étaient assis sur ces trônes. Ils portaient des vêtements blancs et ils avaient des couronnes d’or sur les têtes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était comme une tempête avec un éclair brillant autour du trône. Le bruit et les sons du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tonnerre
    - type: text
      text: ' venaient de là. Devant le trône, 7 lampes de feu brûlaient avec éclat. Ces lumières sont les 7 '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' de Dieu. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toujours devant le trône, il y avait quelque chose comme une mer de verre. Cette mer brillait de lumière comme un miroir.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au milieu, autour du trône, il y avait 4 autres êtres vivants. Ils avaient des yeux partout sur eux, sur leurs fronts et sur leurs dos. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le premier de ces êtres était comme un lion. Le deuxième être était comme un bœuf. Le troisième être avait un visage comme celui d’un homme. Et le quatrième être était comme un aigle qui volait. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chacun de ces 4 êtres avait 6 ailes. Ils avaient des yeux sur eux, même sous leurs ailes. Toute la journée et toute la nuit, ils n’arrêtent pas de dire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu a toute puissance et tout pouvoir.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’a rien de mauvais en lui. Il est complètement bon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a toujours été vivant. Il est vivant maintenant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il continuera d’être vivant pour toujours.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu est assis sur le trône et il est vivant pour toujours. Les 4 êtres vivants l’adorent et le remercient. '
