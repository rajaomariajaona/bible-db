document_id: LUK.12,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 12
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus a dit aux gens d être prudents dans la vie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tout cela se passait, plusieurs milliers de personnes étaient présentes. Il y avait tellement de gens qu’ils marchaient presque les uns sur les autres. Jésus a d’abord dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ceci : Ne devenez pas comme les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: . Ils veulent que d’autres gens pensent qu’ils sont bons. Mais ils ne sont pas bons.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un peut parler contre le Fils de l’homme, et Dieu lui pardonnera. Mais quelqu’un peut parler contre le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: '. Et il peut dire que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' est mauvais. Dieu ne pardonnera jamais à cette personne.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens vont vous emmener dans des lieux de réunions. Ils vous tiendront debout devant des dirigeants et d’autres personnes qui ont le pouvoir. Ces hommes vous poseront des questions. Mais n’ayez pas peur d’eux. Ne pensez pas : Nous ne savons pas comment leur répondre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le temps viendra, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' vous enseignera. Il vous dira quoi dire.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire d’un riche insensé
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu’un dans la foule a parlé à Jésus. Il a dit : Maître, j’ai un problème avec mon frère. Notre père est mort. Dis à mon frère de me donner ma part de ce que notre père nous a laissé.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a répondu : Ce n’est pas à moi de dire lequel de vous a raison ou tort. Et ce n’est pas mon travail de dire ce que chacun d’entre vous devrait avoir. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il a parlé à tout le peuple : Pensez bien et soyez très prudents ! Ne désirez pas plus que ce qui vous est nécessaire. La vie d’une personne vaut plus que les choses qu’il a. Cela est vrai, même si une personne est très riche.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur a dit alors cette histoire : Un homme avait un très bon champ, où il a semé des graines. Les plantes poussaient très bien. Et il avait beaucoup plus qu’il avait semées. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il pensait à combien il aurait bientôt. Il s’est dit : Je n’ai nulle part pour stocker toutes les graines de mes plantes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ensuite, il a décidé quoi faire. Il s’est dit : Je vais démolir le bâtiment, où je stocke maintenant ma semence. Ensuite, je vais construire un bâtiment plus grand pour stocker tout cela. Là, je vais aussi garder tout ce qui est à moi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je vais dire à mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âme
    - type: text
      text: '  : Tu as gardé beaucoup de choses en réserve. Elles seront assez pour toi pendant de nombreuses années. Maintenant, tu peux avoir une vie facile. Mange et bois. Amuse‑toi bien.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens font des choses en secret, mais tout le monde va savoir ces choses. Et les gens disent des choses en secret, mais tout le monde va savoir ces choses. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Dieu a dit à l’homme : Tu es un imbécile. Ce soir, tu vas mourir. Tu laisseras tout derrière. Pense à toutes les choses que tu avais mises en réserve. Pense à ce qui va arriver à tes choses. Pense à qui les aura.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines personnes ne pensent qu’à avoir beaucoup de choses pour elles‑mêmes. Jésus a poursuivi en disant : Cette histoire est pour ces gens. Mais Dieu a dit à leur sujet : Ils n’ont rien de valeur du tout.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'N’ayez pas de soucis dans votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit alors à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Alors je vous dis que vous ne devriez pas toujours penser aux choses. Ne pensez pas toujours à la nourriture dont vous avez besoin pour rester en vie. Ne pensez pas non plus aux vêtements que vous devez porter. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après tout, votre vie est plus importante que votre nourriture. Votre corps est plus important que vos vêtements. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pensez aux oiseaux. Ils ne sèment pas de graines dans le sol. Ils ne récoltent pas. Ils n’ont pas de bâtiments pour stocker la nourriture. Mais ils ne restent pas affamés. Dieu leur donne de la nourriture. Vous avez beaucoup plus de valeur que les oiseaux.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Votre vie est la même. Même si vous pensez toujours à votre vie, vous ne pouvez pas l’allonger. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, vous ne pouvez pas faire une petite chose comme ça. Donc, ne pensez pas toujours à des choses dont vous avez besoin. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pensez à la façon dont les fleurs sauvages poussent. Elles ne travaillent pas. Elles ne font pas leurs vêtements. Mais je vous dis cela à leur sujet. Il est vrai que le roi Salomon portait de très beaux vêtements. Mais même une fleur sauvage est plus belle que lui.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est Dieu qui donne de beaux vêtements aux fleurs sauvages et à l’herbe. Et ils sont vivants dans le champ pendant un temps très court. Après cela, les gens les brûlent. Oui, Dieu donne des vêtements à ces fleurs. Donc il va faire beaucoup plus pour vous. Il vous donnera tout ce dont vous avez besoin. Vous ne croyez pas encore en lui très bien.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La nourriture et les boissons sont les mêmes. Ne pensez pas toujours à la nourriture et aux boissons dont vous avez besoin. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous avez dit des choses dans l’obscurité de la nuit. Mais les gens vont entendre ces choses à la lumière du jour. Vous avez dit des choses à l’oreille de quelqu’un derrière une porte que vous avez fermée. Mais les gens vont crier toutes ces choses du sommet des maisons.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens qui ne connaissent pas Dieu pensent toujours à ces choses. C’est vrai. Mais votre Père, Dieu, sait ce dont vous avez besoin. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au lieu de cela, pensez toujours à des choses qui sont importantes pour lui. Laissez Dieu vous diriger. Alors il vous donnera également des choses dont vous avez besoin. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, vous êtes seulement un petit groupe de personnes, mais n’ayez pas peur. Après tout, votre Père, Dieu, vous a choisis pour diriger avec lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vendez ce que vous avez et donnez l’argent aux pauvres. Faites de bonnes choses. Donc, vous aurez des choses de grande valeur lorsque vous vivrez dans la maison de Dieu (au ciel). Vos choses ne vont jamais s’abîmer là. Leur valeur ne diminuera jamais. Personne ne peut les prendre de vous. Aucun insecte ne peut les détruire là.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après tout, vous voudrez être au même endroit que les choses qui ont de la valeur pour vous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Soyez prêts pour le retour de Jésus
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Soyez toujours prêts pour mon retour. Soyez comme ceux qui sont prêts à commencer à travailler. Ils portent leurs vêtements, afin qu’ils soient prêts pour le travail. Et ils allument leurs lampes.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous devez être comme des serviteurs qui attendent leur maître à arriver. Quand il rentre à la maison venant de la fête de mariage, il va frapper à la porte. Ses serviteurs devront être prêts à lui ouvrir la porte immédiatement. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces serviteurs seront très heureux si leur maître les trouve éveillés. Si cela arrive, il fera ceci : Il portera la tenue de service. Il leur dira : Asseyez‑vous à la table. Je viendrai et je vais vous donner un peu de nourriture. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le maître peut arriver au milieu de la nuit. Il peut même arriver juste avant que le soleil se lève. Mais, si le maître trouve les travailleurs prêts et éveillés, ils seront heureux.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous devez également comprendre ceci : le maître de la maison ne sait pas quand un voleur va essayer d’entrer dans sa maison. S’il savait, il allait rester éveillé. Il ne laisserait pas le voleur venir et enlever ses affaires.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes mes amis, je vous dis cela. N’ayez pas peur de ces gens qui peuvent tuer votre corps. Après cela, ils ne peuvent rien faire de pire pour vous. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous devez également être prêts. Le Fils de l’homme viendra à un moment où vous ne penserez pas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Soyez de bons serviteurs
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre a alors demandé à Jésus : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', parles‑tu seulement à nous qui te suivons ? Ou est‑ce que cette histoire est pour que tout le monde l’entende ?'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Sois sage. Et sois un homme en qui le maître peut faire confiance. Le maître choisira un homme comme ça. Il lui dira : Je veux que tu gouvernes ma maison et les autres serviteurs. Donne‑leur la nourriture au bon moment. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce serviteur sera très heureux quand son maître rentrera à la maison. Son maître voit qu’il a bien fait tout. Donc, il sera heureux. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vais vous dire ce qui se passera. Le maître laissera le serviteur gouverner sur tout ce qu’il a. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais peut‑être que le serviteur s’est dit : Mon maître ne sera pas encore venu. Alors, il commence à frapper les autres serviteurs. Il frappe à la fois les hommes et les femmes. Il mange trop. Il boit aussi trop et il devient un ivrogne.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le maître de ce serviteur viendra chez lui et il va surprendre le serviteur. Il ne pensait pas que son maître rentrerait à la maison ce jour‑là ou à ce temps‑là. Alors le maître le punira beaucoup. Il mettra le serviteur avec des gens qui ne lui obéissent pas.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le travailleur peut savoir ce que son maître veut qu’il fasse. Il doit se préparer et obéir. S’il ne le fait pas, son maître le punira. Il le frappera beaucoup. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais peut‑être un autre serviteur ne savait pas ce que son maître voulait qu’il fasse. Donc, il a fait de mauvaises choses. Le maître l’a frappé, parce qu’il a fait de mauvaises choses. Mais il ne le frappera pas autant. Il ne savait pas que ces choses étaient fausses. Si les maîtres donnent beaucoup à leurs serviteurs, ils voudront beaucoup en retour. Et Dieu veut beaucoup de la personne à qui il a donné beaucoup.
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis venu pour allumer un feu sur la terre. Je serais heureux si ce feu était en train de brûler. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous dis que vous devriez avoir peur de Dieu. Il a le pouvoir de tuer et de jeter les gens en enfer. Une fois de plus, je vous dis d’avoir peur de lui.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême
    - type: text
      text: ' de douleur à recevoir. Je ne peux pas me reposer jusqu’à ce que cela se produise.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne suis pas venu pour que tout le monde soit d’accord. Ne pensez pas que je suis venu pour cela. Non, ce n’est pas vrai. Au lieu de cela, je suis venu mettre les gens en groupes séparés. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A partir de maintenant, à cause de moi, 5 personnes dans une famille deviendront 2 groupes distincts. 2 seront contre les 3 autres. 3 d’entre elles seront contre les 2 autres. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le père sera contre son fils et le fils sera contre son père. La mère sera contre sa fille et la fille sera contre sa mère. La mère sera contre la femme de son fils. Et la femme du fils sera contre sa mère. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a alors dit à la foule : Vous voyez un nuage qui se lève à l’ouest. Immédiatement, vous dites : Il va pleuvoir. Et la pluie vient.'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parfois, vous savez que le vent du sud souffle. Donc, vous dites : Il fera chaud. Et ça sera comme cela. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous voulez que d’autres gens pensent que vous comprenez beaucoup de choses. Donc, vous regardez la terre et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Et vous dites que ce temps viendra. Oui, vous savez comment faire cela. Alors regardez les choses qui se passent près de chez vous. Elles vous montrent ce qui va arriver bientôt. Mais vous ne comprenez pas ce qu’elles vous montrent. Et vous devriez le savoir.
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En outre, vous devez savoir ce que cela signifie pour vous. Vous devez faire ce qui est juste. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après tout, quelque chose comme cela peut vous arriver. Quelqu’un dit : Vous avez une dette et vous avez fait quelque chose de mal. Alors, il vous emmène au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: '. Avant votre arrivée au bureau du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ', essayez de vous mettre d’accord avec cet homme. Si vous n’êtes pas d’accord ensemble sur le sujet, il peut être mauvais envers vous. Il dira au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ', cet homme ne m’a pas remboursé mon argent. Ainsi, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juge
    - type: text
      text: ' dira à son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: officier
    - type: text
      text: ' de vous mettre en prison. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis ce qui se passera ensuite : vous ne quitterez pas la prison jusqu’à ce que vous ayez remboursé toutes les dettes.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens vendent 5 petits oiseaux pour 2 pièces de monnaie de peu de valeur. Mais chaque petit oiseau est précieux pour Dieu. Il prend soin de tous. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fait la même chose pour vous. Il sait même combien de cheveux il y a sur votre tête. Donc, n’ayez pas peur des gens. Vous avez plus de valeur pour Dieu que de très nombreux petits oiseaux.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous le dis aussi. Dites à d’autres personnes : J’obéis à Jésus. Si vous le faites, moi, le Fils de l’homme, je dirai aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu : Cette personne est quelqu’un qui m’obéit. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais une autre personne qui me connaît dira : Je ne connais pas Jésus. Je ne lui obéis pas. S’il le fait, je vais dire aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu : Je ne connais pas cette personne. Elle ne me respecte pas.'
