document_id: ACT.25,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 25
  - type: heading
    content: Festus voyage à Jérusalem pour parler aux chefs des Juifs
  - type: text
    content: 'Festus a commencé à régner. 3 jours après cela, il a voyagé de '
  - type: text
    content: Césarée
  - type: text
    content: ' à Jérusalem. '
  '10':
  - type: text
    content: 'Je suis à l’endroit où les '
  - type: text
    content: officiers
  - type: text
    content: ' de '
  - type: text
    content: César
  - type: text
    content: ' jugent des gens. Paul a répondu : Ici est l’endroit correct pour décider si ces choses au sujet de moi sont vraies. Je n’ai rien fait de mauvais contre les '
  - type: text
    content: Juifs
  - type: text
    content: '. Et tu sais toi‑même cela. '
  '11':
  - type: text
    content: 'Si je n’ai pas obéi à la loi romaine, alors je ne refuse pas de mourir. Ai‑je fait quelque chose de mauvais pour laquelle tu peux me tuer ? Si c’est vrai, alors j’accepte aussi cela. Je dois mourir. Mais si les '
  - type: text
    content: Juifs
  - type: text
    content: ' m’accusent faussement, alors tu ne devrais pas me livrer à eux. Ainsi je te demande de m’envoyer à '
  - type: text
    content: César
  - type: text
    content: . Je veux qu’il écoute mes paroles.
  '12':
  - type: text
    content: 'Alors Festus a parlé à ses amis dans le gouvernement au sujet de ce que Paul avait dit. Et après cela, Festus a répondu à Paul :'
  - type: text
    content: 'Tu as demandé d’aller et de parler à '
  - type: text
    content: César
  - type: text
    content: ' au sujet de toi‑même.'
  - type: text
    content: 'Il a dit : C’est bien que tu ailles.'
  - type: heading
    content: Le Roi Agrippa et Bérénice visitent Festus
  '13':
  - type: text
    content: 'Pendant plusieurs semaines après ceci, le Roi Agrippa et Bérénice sont venus à '
  - type: text
    content: Césarée
  - type: text
    content: ' pour visiter Festus. Ils ont voulu lui souhaiter la bienvenue maintenant qu’il est devenu gouverneur. '
  '14':
  - type: text
    content: 'Ils ont fait beaucoup de jours à '
  - type: text
    content: Césarée
  - type: text
    content: '. Après cela, Festus a expliqué à Agrippa le problème au sujet de Paul. Festus a dit : Il y a un homme ici que Félix avait laissé en prison. '
  '15':
  - type: text
    content: 'Quand je suis allé à Jérusalem, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: anciens
  - type: text
    content: ' m’ont parlé au sujet de lui. Ils ont dit : Cet homme a fait quelque chose de très mauvais et tu devrais le tuer.'
  '16':
  - type: text
    content: 'Voici comment je leur ai répondu : Les '
  - type: text
    content: Romains
  - type: text
    content: ' n’agissent pas de cette façon. Ils ne livrent pas quelqu’un à ceux qui l’accusent directement. L’homme accusé doit d’abord se mettre devant ses accusateurs. Il doit alors se défendre contre ses accusateurs. '
  '17':
  - type: text
    content: 'Ainsi les chefs des '
  - type: text
    content: Juifs
  - type: text
    content: ' et les chefs de leurs '
  - type: text
    content: prêtres
  - type: text
    content: ' sont venus ici. Je n’ai pas attendu. Le jour suivant, je me suis assis dans la salle à juger des personnes. Et j’ai demandé à mes soldats de m’amener cet homme. '
  '18':
  - type: text
    content: 'Les hommes qui ont dit de mauvaises choses au sujet de lui, se sont levés. Mais ils n’ont pas dit ce que j’avais pensé. Ils n’ont parlé d’aucune chose très mauvaise qu’il avait faite. '
  '19':
  - type: text
    content: Ils se disputaient avec cet homme au sujet de ce qu’ils croient au sujet de Dieu. Ils se disputaient également au sujet d’un homme appelé Jésus. Ils ont dit que Jésus était mort. Mais Paul dit qu’il est vivant.
  '2':
  - type: text
    content: 'A Jérusalem, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: anciens
  - type: text
    content: ' lui ont dit ce que Paul avait fait. '
  '20':
  - type: text
    content: 'Je ne savais pas comment savoir plus au sujet de toutes ces choses. Ainsi j’ai demandé à Paul : Puis‐je t’amener à Jérusalem ? Là tu peux répondre à ces hommes devant moi. Tu peux expliquer ce qu’ils disent contre toi. '
  '21':
  - type: text
    content: 'Mais Paul n’a pas voulu aller à Jérusalem. Il m’a dit : Garde‑moi ici. Je veux que les soldats continuent de me garder. Je veux aller chez '
  - type: text
    content: César
  - type: text
    content: .
  - type: text
    content: 'Il peut décider quoi faire avec moi. Ainsi j’ai dit à mes soldats : Gardez Paul jusqu’à ce que je l’envoie à '
  - type: text
    content: César
  - type: text
    content: '  !'
  '22':
  - type: text
    content: 'Agrippa a dit à Festus : Je voudrais entendre cet homme moi‑même. Festus a répondu : Tu l’entendras demain. '
  '23':
  - type: text
    content: 'Le jour suivant, Agrippa et Bérénice sont venus à la grande salle où Festus a parlé aux gens. Ils ont porté de beaux vêtements et ils avaient beaucoup de serviteurs avec eux. Les '
  - type: text
    content: officiers
  - type: text
    content: ' '
  - type: text
    content: romains
  - type: text
    content: ' et les hommes importants dans la ville sont également entrés dans la salle avec eux. Festus a dit à ses soldats : Amenez‑nous Paul ici ! Ainsi ils ont introduit Paul dans la salle.'
  '24':
  - type: text
    content: 'Festus a dit : Roi Agrippa et chacun présent ici maintenant, écoutez. Vous voyez l’homme qui se tient devant vous. Beaucoup de '
  - type: text
    content: Juifs
  - type: text
    content: ' ici m’ont parlé de lui. En plus, les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui sont à Jérusalem m’ont dit au sujet de lui. Ils criaient fort : Cet homme a fait de mauvaises choses. Cet homme ne devrait pas continuer à vivre ! '
  '25':
  - type: text
    content: 'Mais moi, je n’ai pas pu trouver une raison de le tuer. Il n’a rien fait contre notre loi. Il a demandé lui‑même de parler à '
  - type: text
    content: César
  - type: text
    content: '. Ainsi j’ai décidé de l’envoyer à '
  - type: text
    content: César
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Mais moi je n’ai pas su quoi écrire à '
  - type: text
    content: César
  - type: text
    content: ' au sujet de lui. Ainsi je l’ai amené ici se tenir devant toi, Roi Agrippa. Écoute ce que Paul dit. Alors j’aurai quelque chose à écrire à '
  - type: text
    content: César
  - type: text
    content: ' sur cet homme. '
  '27':
  - type: text
    content: 'Je peux envoyer une personne de la prison à '
  - type: text
    content: César
  - type: text
    content: . Mais je dois lui dire les mauvaises choses que la personne a faites.
  '3':
  - type: text
    content: 'Ils ont dit à Festus : Écoute‑nous. Nous voulons vraiment que tu amènes Paul à Jérusalem. Alors nous serons très heureux. Ils ont voulu tuer Paul quand il voyageait à Jérusalem. '
  '4':
  - type: text
    content: 'Festus a répondu : Paul restera en prison à '
  - type: text
    content: Césarée
  - type: text
    content: '. Je retournerai moi‑même là bientôt. '
  '5':
  - type: text
    content: 'Vos chefs doivent aller à '
  - type: text
    content: Césarée
  - type: text
    content: ' avec moi. Alors si cet homme a fait quelque chose de mal, ils pourront le lui dire devant moi.'
  '6':
  - type: text
    content: 'Festus est resté pendant encore 8 à 10 jours avec ces chefs. Alors il est revenu à '
  - type: text
    content: Césarée
  - type: text
    content: . Le jour suivant, il s’est assis dans la grande salle à juger des personnes.
  - type: text
    content: 'Il a dit à ses soldats : Amenez Paul ici dedans ! '
  '7':
  - type: text
    content: 'Quand Paul est arrivé dans la salle, tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' de Jérusalem se sont tenus près de lui. Et ils ont commencé à parler contre Paul. Ils disaient qu’il avait fait un grand nombre de mauvaises choses. Mais ils ne pouvaient pas prouver à Festus que c’était vrai.'
  '8':
  - type: text
    content: 'Et puis Paul a parlé de lui‑même : J’ai obéi à la loi des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il a dit : Je n’ai pas causé de troubles dans le '
  - type: text
    content: Temple
  - type: text
    content: ' et je n’ai rien dit de mauvais au sujet de '
  - type: text
    content: César
  - type: text
    content: .
  '9':
  - type: text
    content: 'Festus a voulu que les '
  - type: text
    content: Juifs
  - type: text
    content: ' disent : Festus est un bon gouverneur. Ainsi il a demandé à Paul : Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ici disent que tu as fait de mauvaises choses. Serais‑tu heureux d’aller à Jérusalem ? Je peux décider là si ce qu’ils disent est vrai.'
