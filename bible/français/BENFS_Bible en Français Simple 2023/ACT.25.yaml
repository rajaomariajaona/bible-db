document_id: ACT.25
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 25
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Festus voyage à Jérusalem pour parler aux chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Festus a commencé à régner. 3 jours après cela, il a voyagé de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A Jérusalem, les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' lui ont dit ce que Paul avait fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils ont dit à Festus : Écoute‑nous. Nous voulons vraiment que tu amènes Paul à Jérusalem. Alors nous serons très heureux. Ils ont voulu tuer Paul quand il voyageait à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Festus a répondu : Paul restera en prison à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: '. Je retournerai moi‑même là bientôt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vos chefs doivent aller à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' avec moi. Alors si cet homme a fait quelque chose de mal, ils pourront le lui dire devant moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Festus est resté pendant encore 8 à 10 jours avec ces chefs. Alors il est revenu à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: . Le jour suivant, il s’est assis dans la grande salle à juger des personnes.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il a dit à ses soldats : Amenez Paul ici dedans ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand Paul est arrivé dans la salle, tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' de Jérusalem se sont tenus près de lui. Et ils ont commencé à parler contre Paul. Ils disaient qu’il avait fait un grand nombre de mauvaises choses. Mais ils ne pouvaient pas prouver à Festus que c’était vrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et puis Paul a parlé de lui‑même : J’ai obéi à la loi des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Il a dit : Je n’ai pas causé de troubles dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' et je n’ai rien dit de mauvais au sujet de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Festus a voulu que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' disent : Festus est un bon gouverneur. Ainsi il a demandé à Paul : Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ici disent que tu as fait de mauvaises choses. Serais‑tu heureux d’aller à Jérusalem ? Je peux décider là si ce qu’ils disent est vrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je suis à l’endroit où les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: ' jugent des gens. Paul a répondu : Ici est l’endroit correct pour décider si ces choses au sujet de moi sont vraies. Je n’ai rien fait de mauvais contre les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Et tu sais toi‑même cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si je n’ai pas obéi à la loi romaine, alors je ne refuse pas de mourir. Ai‑je fait quelque chose de mauvais pour laquelle tu peux me tuer ? Si c’est vrai, alors j’accepte aussi cela. Je dois mourir. Mais si les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' m’accusent faussement, alors tu ne devrais pas me livrer à eux. Ainsi je te demande de m’envoyer à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: . Je veux qu’il écoute mes paroles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors Festus a parlé à ses amis dans le gouvernement au sujet de ce que Paul avait dit. Et après cela, Festus a répondu à Paul :'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Tu as demandé d’aller et de parler à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: ' au sujet de toi‑même.'
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il a dit : C’est bien que tu ailles.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Roi Agrippa et Bérénice visitent Festus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pendant plusieurs semaines après ceci, le Roi Agrippa et Bérénice sont venus à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: ' pour visiter Festus. Ils ont voulu lui souhaiter la bienvenue maintenant qu’il est devenu gouverneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils ont fait beaucoup de jours à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Césarée
  - type: text
    text: '. Après cela, Festus a expliqué à Agrippa le problème au sujet de Paul. Festus a dit : Il y a un homme ici que Félix avait laissé en prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand je suis allé à Jérusalem, les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' m’ont parlé au sujet de lui. Ils ont dit : Cet homme a fait quelque chose de très mauvais et tu devrais le tuer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici comment je leur ai répondu : Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: ' n’agissent pas de cette façon. Ils ne livrent pas quelqu’un à ceux qui l’accusent directement. L’homme accusé doit d’abord se mettre devant ses accusateurs. Il doit alors se défendre contre ses accusateurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ainsi les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et les chefs de leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' sont venus ici. Je n’ai pas attendu. Le jour suivant, je me suis assis dans la salle à juger des personnes. Et j’ai demandé à mes soldats de m’amener cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les hommes qui ont dit de mauvaises choses au sujet de lui, se sont levés. Mais ils n’ont pas dit ce que j’avais pensé. Ils n’ont parlé d’aucune chose très mauvaise qu’il avait faite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils se disputaient avec cet homme au sujet de ce qu’ils croient au sujet de Dieu. Ils se disputaient également au sujet d’un homme appelé Jésus. Ils ont dit que Jésus était mort. Mais Paul dit qu’il est vivant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je ne savais pas comment savoir plus au sujet de toutes ces choses. Ainsi j’ai demandé à Paul : Puis‐je t’amener à Jérusalem ? Là tu peux répondre à ces hommes devant moi. Tu peux expliquer ce qu’ils disent contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais Paul n’a pas voulu aller à Jérusalem. Il m’a dit : Garde‑moi ici. Je veux que les soldats continuent de me garder. Je veux aller chez '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il peut décider quoi faire avec moi. Ainsi j’ai dit à mes soldats : Gardez Paul jusqu’à ce que je l’envoie à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Agrippa a dit à Festus : Je voudrais entendre cet homme moi‑même. Festus a répondu : Tu l’entendras demain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le jour suivant, Agrippa et Bérénice sont venus à la grande salle où Festus a parlé aux gens. Ils ont porté de beaux vêtements et ils avaient beaucoup de serviteurs avec eux. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: ' et les hommes importants dans la ville sont également entrés dans la salle avec eux. Festus a dit à ses soldats : Amenez‑nous Paul ici ! Ainsi ils ont introduit Paul dans la salle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Festus a dit : Roi Agrippa et chacun présent ici maintenant, écoutez. Vous voyez l’homme qui se tient devant vous. Beaucoup de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ici m’ont parlé de lui. En plus, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui sont à Jérusalem m’ont dit au sujet de lui. Ils criaient fort : Cet homme a fait de mauvaises choses. Cet homme ne devrait pas continuer à vivre ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais moi, je n’ai pas pu trouver une raison de le tuer. Il n’a rien fait contre notre loi. Il a demandé lui‑même de parler à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: '. Ainsi j’ai décidé de l’envoyer à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais moi je n’ai pas su quoi écrire à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: ' au sujet de lui. Ainsi je l’ai amené ici se tenir devant toi, Roi Agrippa. Écoute ce que Paul dit. Alors j’aurai quelque chose à écrire à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: ' sur cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je peux envoyer une personne de la prison à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: . Mais je dois lui dire les mauvaises choses que la personne a faites.
