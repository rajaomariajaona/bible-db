document_id: ROM.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Dieu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' tout le monde justement'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je dis donc à chacun de vous : Ne jugez pas les autres. Si vous décidez que quelqu’un d’autre a fait une mauvaise chose, souvenez‑vous que vous faites également les mêmes mauvaises choses. Vous dites vraiment que Dieu doit aussi vous punir ! Lorsque vous jugez quelqu’un, Dieu ne le punira pas et ne vous pardonnera pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque Dieu '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' les gens, il le fait d’une bonne et juste manière. Il punit les gens qui font ce genre de mauvaises choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je demande de nouveau à chacun de vous : Parlez‑vous contre les gens qui font de mauvaises choses, mais vous faites vous‑mêmes ces mêmes mauvaises choses ? Alors Dieu vous punira certainement et vous ne serez pas libérés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: N’oubliez pas que Dieu est très gentil et patient avec nous. Il attend longtemps avant de nous punir. Ne pensez‑vous pas que c’est important ? Vous devez comprendre que Dieu vous donne une chance de changer. Il attend patiemment, afin que vous puissiez laisser de mauvaises choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais vous refusez de changer votre façon de vivre. Vous n’êtes pas tristes de mauvaises choses que vous avez faites. Par conséquent, vous rendez Dieu encore plus en colère contre vous. Ainsi, il vous punira encore plus le jour où il jugera tout le monde. Ce jour‑là, il montrera à quel point il est en colère contre les gens qui font de mauvaises choses. Tout le monde saura qu’il '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' les gens de manière juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il donnera à chacun ce qu’il doit avoir à cause des choses qu’il a faites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Certaines personnes continuent patiemment de faire de bonnes choses. Ces gens veulent faire ce qui est bien pour que Dieu les glorifie. Ils veulent mener le genre de vie que la mort ne détruira pas. Dieu fera que des gens comme ceux‑ci vivent toujours avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais les autres ne pensent qu’à eux‑mêmes. Ils refusent d’obéir au vrai message de Dieu. Au lieu de cela, ils continuent à faire de mauvaises choses. Dieu sera très en colère contre des gens comme ceux‑ci, et il les punira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu punira toute personne qui fait de mauvaises choses. Il le fera d’abord aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', et il le fera aussi aux non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Il y aura beaucoup de problèmes pour chaque personne qui fait de mauvaises choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais Dieu glorifiera tous les gens qui font de bonnes choses. Il les rendra grands et ils auront la paix dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Il le fera d’abord pour les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', et il le fera aussi pour les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dieu est toujours juste quand il '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' les gens, quels qu’ils soient.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' n’ont pas la loi de Dieu qu’il a donnée à Moïse. Si les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' font de mauvaises choses, Dieu les punira. Mais il n’utilisera pas la loi donnée à Moïse quand il jugera les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Mais les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont les lois de Moïse. Donc, si les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' font de mauvaises choses, Dieu utilisera ces lois pour les juger. La loi montrera qu’ils ont fait de mauvaises choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dieu accepte qui comme juste avec lui‑même ? Ce sont des gens qui obéissent à cette loi. Ce ne sont pas les gens qui connaissent seulement cette loi, mais ne la mettent pas en pratique.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' n’ont pas la loi de Dieu. Mais ils peuvent toujours faire de bonnes choses que cette loi dit. Ils font de bonnes choses à cause de ce qu’ils pensent être justes. De cette façon, ils montrent qu’ils ont une certaine loi dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ', même s’ils ne connaissent pas la loi de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ces gens montrent qu’ils savent ce qui est juste. C’est comme si Dieu avait écrit ses lois dans leurs cœurs. Leurs pensées leur montrent la différence entre ce qui est bien et ce qui est mal. Parfois, leurs pensées disent : Vous avez fait quelque chose de mal. Et parfois, leurs pensées disent : Vous avez fait ce qui est bien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C’est le message que je dis aux gens. Dieu sait tout ce que les gens pensent secrètement. Un jour, il jugera tout le monde. Il a donné à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' le pouvoir de le faire.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et la loi de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dis‑tu que tu es '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: '  ? Tu connais peut‑être les lois que Dieu a données à Moïse. Tu penses que cette loi t’aidera. Tu te vantes d’appartenir à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu sais ce que Dieu veut que les gens fassent. Sa loi t’enseigne ce qui est bien et juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu es sûr que tu peux toi‑même enseigner Dieu à d’autres personnes. Tu penses que tu peux être comme un guide des aveugles. Tu penses que tu peux être comme une lumière aux gens qui sont dans le noir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu es sûr que tu peux enseigner les imbéciles et les gens qui ne savent pas grand‑chose. Tu sais que la loi de Dieu te dit tout sur ce qui est vrai. Parce que cela t’aide à en savoir beaucoup de choses, tu penses que tu peux être un excellent enseignant !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors, tu enseignes à d’autres personnes, n’est‑ce pas ? Mais tu apprends toi‑même ? Tu dis à d’autres personnes : Ne vole personne. Mais peut‑être que tu voles toi‑même d’autres personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu dis : Les gens ne doivent pas avoir de relations sexuelles avec quelqu’un qui n’est ni leur femme ni leur mari. Mais peut‑être que tu as toi‑même des relations sexuelles d’une mauvaise façon. Tu dis que tu détestes les idoles. Mais pourquoi tu voles dans des endroits où les gens adorent les idoles ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu te vantes de connaître les lois de Dieu. Mais tu n’obéis pas à ces lois. A cause de toi, d’autres personnes parlent mal contre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ceci est écrit dans la Bible :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'À cause de vous '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' disent de mauvaises choses contre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En tant qu’homme '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juif
  - type: text
    text: ', tu es fier d’être circoncis. C’est une bonne chose, si tu obéis aux lois de Dieu dans ta vie. Mais si tu n’obéis pas à la loi de Dieu, cela ne vaut rien. Tu deviens comme un païen que personne n’a jamais circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mais un païen peut obéir à ce que la loi de Dieu dit. Alors, il montre qu’il appartient à Dieu même si personne ne l’a jamais circoncis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'De cette façon, même les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' montreront que vous qui êtes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', vous avez tort. La loi de Dieu a été écrite pour vous aider, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Les gens vous ont circoncis pour montrer que vous appartenez à Dieu. Mais si vous refusez d’obéir aux lois de Dieu, alors Dieu vous punira. Les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui obéissent à la loi de Dieu montreront que Dieu a raison de vous punir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tous ceux qui semblent être des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ne sont pas vraiment des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui appartiennent à Dieu. Dieu n’accepte pas un homme simplement parce que quelqu’un a circoncis le corps de cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Non ! Un vrai '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: ' est quelqu’un qui appartient à Dieu dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Il appartient à Dieu, parce que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu a changé sa vie. C’est comme si Dieu l’avait circoncis dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ', pas dans son corps. Les règles de la loi de Dieu ne peuvent pas faire ce travail chez une personne. D’autres personnes peuvent ne pas glorifier une telle personne, mais Dieu la glorifiera.'
