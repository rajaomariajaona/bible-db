document_id: ROM.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Dieu juge tout le monde justement
  - type: text
    content: 'Je dis donc à chacun de vous : Ne jugez pas les autres. Si vous décidez que quelqu’un d’autre a fait une mauvaise chose, souvenez‑vous que vous faites également les mêmes mauvaises choses. Vous dites vraiment que Dieu doit aussi vous punir ! Lorsque vous jugez quelqu’un, Dieu ne le punira pas et ne vous pardonnera pas. '
  '10':
  - type: text
    content: 'Mais Dieu glorifiera tous les gens qui font de bonnes choses. Il les rendra grands et ils auront la paix dans leurs '
  - type: text
    content: esprits
  - type: text
    content: '. Il le fera d’abord pour les '
  - type: text
    content: Juifs
  - type: text
    content: ', et il le fera aussi pour les non '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Dieu est toujours juste quand il '
  - type: text
    content: juge
  - type: text
    content: ' les gens, quels qu’ils soient.'
  '12':
  - type: text
    content: 'Les non '
  - type: text
    content: Juifs
  - type: text
    content: ' n’ont pas la loi de Dieu qu’il a donnée à Moïse. Si les non '
  - type: text
    content: Juifs
  - type: text
    content: ' font de mauvaises choses, Dieu les punira. Mais il n’utilisera pas la loi donnée à Moïse quand il jugera les non '
  - type: text
    content: Juifs
  - type: text
    content: '. Mais les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont les lois de Moïse. Donc, si les '
  - type: text
    content: Juifs
  - type: text
    content: ' font de mauvaises choses, Dieu utilisera ces lois pour les juger. La loi montrera qu’ils ont fait de mauvaises choses. '
  '13':
  - type: text
    content: Dieu accepte qui comme juste avec lui‑même ? Ce sont des gens qui obéissent à cette loi. Ce ne sont pas les gens qui connaissent seulement cette loi, mais ne la mettent pas en pratique.
  '14':
  - type: text
    content: 'Les non '
  - type: text
    content: Juifs
  - type: text
    content: ' n’ont pas la loi de Dieu. Mais ils peuvent toujours faire de bonnes choses que cette loi dit. Ils font de bonnes choses à cause de ce qu’ils pensent être justes. De cette façon, ils montrent qu’ils ont une certaine loi dans leurs '
  - type: text
    content: esprits
  - type: text
    content: ', même s’ils ne connaissent pas la loi de Moïse. '
  '15':
  - type: text
    content: 'Ces gens montrent qu’ils savent ce qui est juste. C’est comme si Dieu avait écrit ses lois dans leurs cœurs. Leurs pensées leur montrent la différence entre ce qui est bien et ce qui est mal. Parfois, leurs pensées disent : Vous avez fait quelque chose de mal. Et parfois, leurs pensées disent : Vous avez fait ce qui est bien.'
  '16':
  - type: text
    content: C’est le message que je dis aux gens. Dieu sait tout ce que les gens pensent secrètement. Un jour, il jugera tout le monde. Il a donné à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' le pouvoir de le faire.'
  - type: heading
    content: Les Juifs et la loi de Dieu
  '17':
  - type: text
    content: 'Dis‑tu que tu es '
  - type: text
    content: Juif
  - type: text
    content: '  ? Tu connais peut‑être les lois que Dieu a données à Moïse. Tu penses que cette loi t’aidera. Tu te vantes d’appartenir à Dieu. '
  '18':
  - type: text
    content: 'Tu sais ce que Dieu veut que les gens fassent. Sa loi t’enseigne ce qui est bien et juste. '
  '19':
  - type: text
    content: 'Tu es sûr que tu peux toi‑même enseigner Dieu à d’autres personnes. Tu penses que tu peux être comme un guide des aveugles. Tu penses que tu peux être comme une lumière aux gens qui sont dans le noir. '
  '2':
  - type: text
    content: 'Lorsque Dieu '
  - type: text
    content: juge
  - type: text
    content: ' les gens, il le fait d’une bonne et juste manière. Il punit les gens qui font ce genre de mauvaises choses.'
  '20':
  - type: text
    content: Tu es sûr que tu peux enseigner les imbéciles et les gens qui ne savent pas grand‑chose. Tu sais que la loi de Dieu te dit tout sur ce qui est vrai. Parce que cela t’aide à en savoir beaucoup de choses, tu penses que tu peux être un excellent enseignant !
  '21':
  - type: text
    content: 'Alors, tu enseignes à d’autres personnes, n’est‑ce pas ? Mais tu apprends toi‑même ? Tu dis à d’autres personnes : Ne vole personne. Mais peut‑être que tu voles toi‑même d’autres personnes. '
  '22':
  - type: text
    content: 'Tu dis : Les gens ne doivent pas avoir de relations sexuelles avec quelqu’un qui n’est ni leur femme ni leur mari. Mais peut‑être que tu as toi‑même des relations sexuelles d’une mauvaise façon. Tu dis que tu détestes les idoles. Mais pourquoi tu voles dans des endroits où les gens adorent les idoles ? '
  '23':
  - type: text
    content: 'Tu te vantes de connaître les lois de Dieu. Mais tu n’obéis pas à ces lois. A cause de toi, d’autres personnes parlent mal contre Dieu. '
  '24':
  - type: text
    content: 'Ceci est écrit dans la Bible :'
  - type: text
    content: 'À cause de vous '
  - type: text
    content: Juifs
  - type: text
    content: ', les non '
  - type: text
    content: Juifs
  - type: text
    content: ' disent de mauvaises choses contre Dieu.'
  '25':
  - type: text
    content: 'En tant qu’homme '
  - type: text
    content: juif
  - type: text
    content: ', tu es fier d’être circoncis. C’est une bonne chose, si tu obéis aux lois de Dieu dans ta vie. Mais si tu n’obéis pas à la loi de Dieu, cela ne vaut rien. Tu deviens comme un païen que personne n’a jamais circoncis. '
  '26':
  - type: text
    content: Mais un païen peut obéir à ce que la loi de Dieu dit. Alors, il montre qu’il appartient à Dieu même si personne ne l’a jamais circoncis.
  '27':
  - type: text
    content: 'De cette façon, même les non '
  - type: text
    content: Juifs
  - type: text
    content: ' montreront que vous qui êtes '
  - type: text
    content: Juifs
  - type: text
    content: ', vous avez tort. La loi de Dieu a été écrite pour vous aider, '
  - type: text
    content: Juifs
  - type: text
    content: '. Les gens vous ont circoncis pour montrer que vous appartenez à Dieu. Mais si vous refusez d’obéir aux lois de Dieu, alors Dieu vous punira. Les non '
  - type: text
    content: Juifs
  - type: text
    content: ' qui obéissent à la loi de Dieu montreront que Dieu a raison de vous punir. '
  '28':
  - type: text
    content: 'Tous ceux qui semblent être des '
  - type: text
    content: Juifs
  - type: text
    content: ' ne sont pas vraiment des '
  - type: text
    content: Juifs
  - type: text
    content: ' qui appartiennent à Dieu. Dieu n’accepte pas un homme simplement parce que quelqu’un a circoncis le corps de cet homme. '
  '29':
  - type: text
    content: 'Non ! Un vrai '
  - type: text
    content: Juif
  - type: text
    content: ' est quelqu’un qui appartient à Dieu dans son '
  - type: text
    content: esprit
  - type: text
    content: . Il appartient à Dieu, parce que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu a changé sa vie. C’est comme si Dieu l’avait circoncis dans son '
  - type: text
    content: esprit
  - type: text
    content: ', pas dans son corps. Les règles de la loi de Dieu ne peuvent pas faire ce travail chez une personne. D’autres personnes peuvent ne pas glorifier une telle personne, mais Dieu la glorifiera.'
  '3':
  - type: text
    content: 'Je demande de nouveau à chacun de vous : Parlez‑vous contre les gens qui font de mauvaises choses, mais vous faites vous‑mêmes ces mêmes mauvaises choses ? Alors Dieu vous punira certainement et vous ne serez pas libérés. '
  '4':
  - type: text
    content: N’oubliez pas que Dieu est très gentil et patient avec nous. Il attend longtemps avant de nous punir. Ne pensez‑vous pas que c’est important ? Vous devez comprendre que Dieu vous donne une chance de changer. Il attend patiemment, afin que vous puissiez laisser de mauvaises choses.
  '5':
  - type: text
    content: 'Mais vous refusez de changer votre façon de vivre. Vous n’êtes pas tristes de mauvaises choses que vous avez faites. Par conséquent, vous rendez Dieu encore plus en colère contre vous. Ainsi, il vous punira encore plus le jour où il jugera tout le monde. Ce jour‑là, il montrera à quel point il est en colère contre les gens qui font de mauvaises choses. Tout le monde saura qu’il '
  - type: text
    content: juge
  - type: text
    content: ' les gens de manière juste. '
  '6':
  - type: text
    content: 'Il donnera à chacun ce qu’il doit avoir à cause des choses qu’il a faites. '
  '7':
  - type: text
    content: 'Certaines personnes continuent patiemment de faire de bonnes choses. Ces gens veulent faire ce qui est bien pour que Dieu les glorifie. Ils veulent mener le genre de vie que la mort ne détruira pas. Dieu fera que des gens comme ceux‑ci vivent toujours avec lui. '
  '8':
  - type: text
    content: 'Mais les autres ne pensent qu’à eux‑mêmes. Ils refusent d’obéir au vrai message de Dieu. Au lieu de cela, ils continuent à faire de mauvaises choses. Dieu sera très en colère contre des gens comme ceux‑ci, et il les punira. '
  '9':
  - type: text
    content: 'Dieu punira toute personne qui fait de mauvaises choses. Il le fera d’abord aux '
  - type: text
    content: Juifs
  - type: text
    content: ', et il le fera aussi aux non '
  - type: text
    content: Juifs
  - type: text
    content: '. Il y aura beaucoup de problèmes pour chaque personne qui fait de mauvaises choses. '
