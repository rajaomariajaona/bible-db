document_id: ACT.20,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 20
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul visite la Macédoine et la Grèce encore
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, la foule est allée à la maison. Alors Paul a demandé à tous les croyants de se réunir avec lui. Il leur a dit : Soyez forts ! Continuez de croire en Jésus. Je pars maintenant. Alors Paul a voyagé en Macédoine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Paul est descendu tous les escaliers jusqu’à eux. Il s’étendait sur le jeune homme et le tenait pendant un moment. Alors Paul a dit : N’ayez pas peur. Il est encore vivant.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Paul est retourné en haut et il a mangé avec les croyants. Paul leur parlait jusqu’au lever du soleil. Alors il a quitté Troas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les autres croyants ont emmené Eutychus à sa maison. Il était vivant et ils étaient heureux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul voyage de Troas à Milet
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons continué devant Paul en bateau. Et nous avons navigué là‑dessus à Assos. Paul a décidé de nous rencontrer sur le bateau à Assos. Il voyageait vers Assos à pied. Il nous a dit que nous devrions l’attendre là. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il nous a rencontrés à Assos, il est venu dans le bateau avec nous. Alors nous avons tous navigué vers Mitylène. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons navigué de là et nous sommes arrivés le jour suivant à la côte près de Chios. Le jour après cela, nous sommes venus à Samos et le jour suivant, nous sommes arrivés à Milet. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul a décidé de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: naviguer
    - type: text
      text: ' au‑delà d’Éphèse. Il n’a plus voulu rester en Asie. Il a voulu voyager vers Jérusalem rapidement. C’était pour qu’il arrive là avant le jour appelé '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentecôte
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul envoie un message aux chefs des croyants à Éphèse
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Paul était à Milet, il a envoyé quelqu’un à Éphèse avec un message. Ce message était pour les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' d’Éphèse. Paul a écrit : Venez à Milet et réunissons‑nous ensemble. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul a parlé aux croyants d’Éphèse quand ils sont arrivés à Milet. Il a dit : Vous connaissez tout ce que j’ai fait en Asie. Vous m’avez vu le premier jour quand je suis arrivé en Asie. J’étais avec vous à temps plein. Vous avez su tout ce que j’ai fait. Et vous avez su tout ce que j’ai dit. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne disais pas au peuple que j’étais un homme important. J’ai travaillé comme un serviteur de Dieu et je pleurais souvent. Ma vie était difficile, parce que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont voulu me tuer. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il voyageait à travers la Macédoine et il parlait aux personnes dans différents endroits encore. Il leur parlait de Jésus. Alors il est venu en Grèce. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous enseignais dans les rues et dans vos maisons. Vous savez que je vous disais toutes les choses importantes. Je vous disais tout ce qui vous aidera.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’enseignais les mêmes choses aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et aux étrangers ou non‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. J’étais sérieux quand j’enseignais cela à tout le monde. Je leur disais tous : Vous devez laisser de faire de mauvaises choses. Vous devez également dire à Dieu que vous êtes tristes, parce que vous faisiez ces mauvaises choses. Alors vous devez obéir à Dieu et vous devez croire en notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant je vais à Jérusalem, parce que le Saint‑Esprit me conduit là. Je ne sais pas ce que les gens me feront là. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Saint‑Esprit m’a dit dans chaque ville au sujet des dangers. Il m’a dit : Les gens te mettront en prison et ils te feront beaucoup de troubles. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je peux vivre ou je peux mourir. Mais ce n’est pas important pour moi. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus m’a donné un certain travail à faire. Ainsi il est important que je finisse ce travail. Je dois dire aux gens comment Dieu est bon et gentil.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vivais parmi vous tous et je vous enseignais tout sur le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume de Dieu
    - type: text
      text: '. Maintenant je sais qu’aucun de vous ne me reverra plus. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi je suis sérieux avec vous aujourd’hui.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Je vous dis ceci : Si quelqu’un se perd devant Dieu, ce n’est pas à cause de moi. '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Je vous ai dit tout ce que Dieu veut que vous sachiez. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Vous devez faire attention vous‑mêmes, et à ce que vous faites. Gardez bien les gens que le Saint‑Esprit vous a demandé d’aider. Guidez tous les groupes de croyants. Quelques hommes ont leurs propres moutons. Ils nourrissent les moutons et ils les gardent bien. Soyez comme ces hommes gentils. Tous les croyants appartiennent à Dieu, parce que Jésus est mort pour eux. Il a donné son sang de la vie pour eux. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Je sais ce qui se produira. Quand je vais vous quitter, d’autres viendront parmi vous. Ils seront comme des loups qui attaquent des moutons. Ces hommes feront des troubles aux croyants. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Paul est arrivé en Grèce, il est resté là pendant 3 mois. Un jour, il se préparait à voyager en Syrie. Mais alors il a entendu des nouvelles que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' voulaient le tuer. Ainsi il a décidé de retourner à Jérusalem par la Macédoine. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Les hommes de votre propre groupe de croyants vous enseigneront également des choses qui ne sont pas vraies. Ces hommes voudront que d’autres croyants les suivent. Ainsi les croyants ne suivront plus Jésus. Ainsi ils diront des choses qui ne sont pas vraies. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Faites très attention ! Je pleurais souvent au sujet de mon travail quand je suis resté avec vous. Je veux que vous vous rappeliez cela. Je vous ai tout enseigné pendant 3 années, jour et nuit.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, je vous confie dans les mains de Dieu et sa parole de grâce. Vous serez ainsi forts dans la foi. Par conséquent, Dieu vous donnera les bonnes choses qu’il a pour son propre peuple. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne voulais pas prendre de l’argent ou des vêtements des personnes quand je restais avec vous. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous savez vous‑mêmes que je travaillais beaucoup. Puis mes amis et moi, nous avions tout ce dont nous avions besoin. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous ai montré comment vivre.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et je vous ai montré comment travailler. Maintenant vous savez comment être aimables envers des malades ou faibles. Rappelez‑vous que Jésus lui‑même a dit : Vous deviendrez heureux quand vous recevrez des choses. Vous serez plus heureux quand vous donnez des choses aux autres.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et puis, Paul a fini de parler. Il s’est mis à genoux ainsi que tous les chefs des croyants d’Éphèse. Et ils ont tous prié. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis chacun lui montrait le grand amour. Tous les chefs pleuraient quand ils disaient au revoir à Paul. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul avait dit : Je ne vous reverrai plus jamais. Et ceci les a rendus plus tristes que toute autre chose. Alors ils ont marché avec Paul vers le bateau.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sopater, le fils de Pyrrhus de Bérée est allé avec Paul. Aristarque et Second de Thessalonique sont aussi allés avec lui. Gaïus de Derbe, Timothée, Tychique et Trophime d’Asie sont aussi allés avec lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont tous voyagé avant nous et ils nous ont attendus à Troas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous avons navigué en bateau de Philippes après le repas spécial des pains sans levain. 5 jours après cela, nous les avons rencontrés tous à Troas. Nous sommes restés ensemble pendant 7 jours là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul rend visite aux croyants à Troas pour la dernière fois
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samedi soir, nous nous sommes tous réunis pour couper le pain ensemble. Paul enseignait le peuple. Il a quitté Troas le jour suivant et ainsi il a enseigné jusqu’à minuit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de lumières brûlaient dans la chambre haute où nous nous sommes réunis ensemble. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jeune homme appelé Eutychus était à cette rencontre. Il s’asseyait à côté de la fenêtre. Paul parlait pendant longtemps et Eutychus a voulu dormir. Alors Eutychus a vraiment dormi. Il est tombé hors de la fenêtre à terre, du troisième étage. Les autres croyants l’ont relevé de la terre, mais il était mort. '
