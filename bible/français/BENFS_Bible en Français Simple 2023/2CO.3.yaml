document_id: 2CO.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu nous donne une nouvelle vie'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous n’avons plus besoin de montrer que notre travail est bon. Certaines personnes ont besoin de lettres d’autres personnes pour dire qu’elles font du bon travail. Nous n’avons pas besoin de vous montrer de telles lettres. Nous n’avons pas non plus besoin que vous écriviez une telle lettre pour nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous montrez vous‑mêmes que nous avons fait du bon travail. Vous êtes comme une lettre écrite sur nos vies. Tout le monde peut lire cette lettre et la comprendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il est clair que vous êtes comme une lettre que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même a écrite. Nous sommes les gens qui vous avons apporté le message de Dieu. Maintenant, les gens voient ce que Dieu a fait dans vos vies. C’est comme une lettre qu’ils ont lue. Mais ce n’est pas une lettre écrite sur papier avec de l’encre. C’est l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vivant qui l’a écrite. Il ne l’a pas écrite sur des morceaux de pierre. Mais, il l’a écrite sur vos cœurs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nous savons que ces choses sont vraies. À cause de ce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait, nous avons confiance en Dieu pour nous aider. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous savons que nous ne pouvons pas faire ce travail par nous‑mêmes. Nous ne pensons jamais à cela. Mais Dieu nous rend capables de le faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu a fait de nous ses serviteurs. Nous pouvons donc dire aux gens le message de son nouvel accord. Ce nouvel accord ne concerne pas la loi. La loi dit aux gens ce qu’ils doivent faire et elle apporte la mort. Mais le nouvel accord de Dieu vient de son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: . Et l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' nous apporte une nouvelle vie, pas la mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse a écrit les paroles de l’ancien accord sur les morceaux de pierre. Cela montrait combien Dieu était grand et puissant. Le visage de Moïse a beaucoup brillé après que Dieu lui a parlé. Le visage de Moïse n’a pas continué de briller, mais le peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israélite
  - type: text
    text: ' ne pouvait toujours pas regarder le visage de Moïse. L’ancien accord qui a causé la mort était puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ainsi, le nouvel accord, qui vient de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu, montrera encore plus la puissance de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’ancien accord montrait aux gens qu’ils étaient fautifs. Le nouvel accord de Dieu rend les gens d’accord avec lui. Ainsi, le nouvel accord montre certainement la puissance de Dieu encore plus que l’ancien !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’ancien accord était à la fois grand et puissant. Mais maintenant, le nouvel accord de Dieu est venu à sa place. La grande puissance du nouvel accord montre que l’ancien accord n’est plus puissant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’ancien accord était puissant, mais il a pris fin. Le nouvel accord de Dieu continuera toujours. Cela montre donc encore plus la puissance de Dieu !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi, parce que nous savons tout cela, nous disons courageusement le message de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous ne sommes pas comme Moïse. Son visage ne continuait pas d’être brillant avec la lumière de Dieu. Alors il s’est couvert le visage avec un tissu. Il ne voulait pas que le peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israélite
  - type: text
    text: ' voie la fin de la lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais ce peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israélite
  - type: text
    text: ' ne pouvait pas penser correctement. Aujourd’hui encore, ils ne comprennent toujours pas le message de l’ancien accord de Dieu. Quand ils le lisent, ils sont comme des gens qui ont un tissu qui couvre leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Cela continue comme cela, à moins qu’ils croient en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Ensuite, Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' retire le tissu pour qu’ils comprennent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Même aujourd’hui, lorsque le peuple '
  - type: usfm
    marker: w
    children:
    - type: text
      text: israélite
  - type: text
    text: ' a lu les livres de Moïse, un tissu couvrait toujours leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais quand une personne se tourne pour croire au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu enlève le tissu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est le même que l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: . Et quand l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est avec quelqu’un, cette personne est libre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nous montrons la puissance du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à d’autres personnes. C’est comme si Dieu avait enlevé un tissu de nos visages. Il nous change pour que nous devenions de plus en plus comme lui. Nous montrons combien Dieu est de plus en plus clair. C’est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' qui fait tout cela, par le travail de son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: .
