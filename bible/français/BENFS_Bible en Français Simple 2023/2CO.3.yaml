document_id: 2CO.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Le Saint‑Esprit de Dieu nous donne une nouvelle vie
  - type: text
    content: 'Nous n’avons plus besoin de montrer que notre travail est bon. Certaines personnes ont besoin de lettres d’autres personnes pour dire qu’elles font du bon travail. Nous n’avons pas besoin de vous montrer de telles lettres. Nous n’avons pas non plus besoin que vous écriviez une telle lettre pour nous. '
  '10':
  - type: text
    content: 'L’ancien accord était à la fois grand et puissant. Mais maintenant, le nouvel accord de Dieu est venu à sa place. La grande puissance du nouvel accord montre que l’ancien accord n’est plus puissant. '
  '11':
  - type: text
    content: L’ancien accord était puissant, mais il a pris fin. Le nouvel accord de Dieu continuera toujours. Cela montre donc encore plus la puissance de Dieu !
  '12':
  - type: text
    content: 'Ainsi, parce que nous savons tout cela, nous disons courageusement le message de Dieu. '
  '13':
  - type: text
    content: 'Nous ne sommes pas comme Moïse. Son visage ne continuait pas d’être brillant avec la lumière de Dieu. Alors il s’est couvert le visage avec un tissu. Il ne voulait pas que le peuple '
  - type: text
    content: israélite
  - type: text
    content: ' voie la fin de la lumière. '
  '14':
  - type: text
    content: 'Mais ce peuple '
  - type: text
    content: israélite
  - type: text
    content: ' ne pouvait pas penser correctement. Aujourd’hui encore, ils ne comprennent toujours pas le message de l’ancien accord de Dieu. Quand ils le lisent, ils sont comme des gens qui ont un tissu qui couvre leurs '
  - type: text
    content: esprits
  - type: text
    content: . Cela continue comme cela, à moins qu’ils croient en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Ensuite, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' retire le tissu pour qu’ils comprennent. '
  '15':
  - type: text
    content: 'Même aujourd’hui, lorsque le peuple '
  - type: text
    content: israélite
  - type: text
    content: ' a lu les livres de Moïse, un tissu couvrait toujours leurs '
  - type: text
    content: esprits
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Mais quand une personne se tourne pour croire au '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu enlève le tissu.'
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est le même que l’'
  - type: text
    content: Esprit
  - type: text
    content: . Et quand l’
  - type: text
    content: Esprit
  - type: text
    content: ' du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec quelqu’un, cette personne est libre. '
  '18':
  - type: text
    content: 'Nous montrons la puissance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à d’autres personnes. C’est comme si Dieu avait enlevé un tissu de nos visages. Il nous change pour que nous devenions de plus en plus comme lui. Nous montrons combien Dieu est de plus en plus clair. C’est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui fait tout cela, par le travail de son '
  - type: text
    content: Esprit
  - type: text
    content: .
  '2':
  - type: text
    content: 'Vous montrez vous‑mêmes que nous avons fait du bon travail. Vous êtes comme une lettre écrite sur nos vies. Tout le monde peut lire cette lettre et la comprendre. '
  '3':
  - type: text
    content: Il est clair que vous êtes comme une lettre que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même a écrite. Nous sommes les gens qui vous avons apporté le message de Dieu. Maintenant, les gens voient ce que Dieu a fait dans vos vies. C’est comme une lettre qu’ils ont lue. Mais ce n’est pas une lettre écrite sur papier avec de l’encre. C’est l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vivant qui l’a écrite. Il ne l’a pas écrite sur des morceaux de pierre. Mais, il l’a écrite sur vos cœurs.'
  '4':
  - type: text
    content: Nous savons que ces choses sont vraies. À cause de ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait, nous avons confiance en Dieu pour nous aider. '
  '5':
  - type: text
    content: 'Nous savons que nous ne pouvons pas faire ce travail par nous‑mêmes. Nous ne pensons jamais à cela. Mais Dieu nous rend capables de le faire. '
  '6':
  - type: text
    content: 'Dieu a fait de nous ses serviteurs. Nous pouvons donc dire aux gens le message de son nouvel accord. Ce nouvel accord ne concerne pas la loi. La loi dit aux gens ce qu’ils doivent faire et elle apporte la mort. Mais le nouvel accord de Dieu vient de son '
  - type: text
    content: Esprit
  - type: text
    content: . Et l’
  - type: text
    content: Esprit
  - type: text
    content: ' nous apporte une nouvelle vie, pas la mort.'
  '7':
  - type: text
    content: 'Moïse a écrit les paroles de l’ancien accord sur les morceaux de pierre. Cela montrait combien Dieu était grand et puissant. Le visage de Moïse a beaucoup brillé après que Dieu lui a parlé. Le visage de Moïse n’a pas continué de briller, mais le peuple '
  - type: text
    content: israélite
  - type: text
    content: ' ne pouvait toujours pas regarder le visage de Moïse. L’ancien accord qui a causé la mort était puissant. '
  '8':
  - type: text
    content: Ainsi, le nouvel accord, qui vient de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu, montrera encore plus la puissance de Dieu. '
  '9':
  - type: text
    content: L’ancien accord montrait aux gens qu’ils étaient fautifs. Le nouvel accord de Dieu rend les gens d’accord avec lui. Ainsi, le nouvel accord montre certainement la puissance de Dieu encore plus que l’ancien !
