document_id: 2CO.12,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 12
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment Dieu a aidé Paul
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dois continuer de me glorifier. Cela ne vous aidera pas vraiment, mais je vous le dirai quand même. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m’a montré des choses spéciales, comme dans un rêve. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi je suis heureux même quand je suis faible. Les gens peuvent m’insulter. Ils peuvent me causer des problèmes. Ils voudront peut‑être me faire du mal. Je peux avoir plusieurs sortes de difficultés. Mais je suis toujours heureux, parce que je sers Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Oui, chaque fois que je suis faible, alors je suis fort.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Paul est un vrai '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je parle comme un fou, mais vous m’avez fait faire cela. Vous devez vous‑mêmes dire de bonnes choses à mon sujet. Je ne suis peut‑être pas important. Mais je suis aussi bon que ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' très spéciaux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque j’étais là avec vous, j’ai montré que j’étais un vrai '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: '. J’ai travaillé patiemment parmi vous. J’ai fait beaucoup de miracles et de grandes choses qui ont montré la puissance de Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai travaillé parmi vous comme je l’ai fait pour les autres Églises. Vous n’étiez jamais moins importants pour moi qu’eux. La seule différence est que je ne vous ai pas demandé de m’aider avec de l’argent. Alors je devrais peut‑être vous demander de me pardonner pour cela !
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Écoutez‑moi ! C’est la troisième fois que je suis prêt à vous rendre visite. Je ne vous demanderai rien. Je ne veux aucune de vos choses. Mais j’ai besoin de vous‑mêmes. Vous êtes comme mes enfants. Les enfants ne doivent pas donner aux parents ce dont ils ont besoin. Ce sont les parents qui doivent fournir ce dont leurs enfants ont besoin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donc, je serai heureux de vous donner tout ce que j’ai. Je serai heureux de me donner aussi, car je veux vous aider. Je vous aime peut‑être trop ! Mais cela ne signifie pas que vous m’aimerez moins que vous ne devriez m’aimer.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne vous ai pas dérangés. Vous le savez sûrement. Mais certains d’entre vous disent que je vous ai trompés. Vous pensez que j’étais intelligent et que j’ai eu de l’argent de votre part. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n’est pas vrai ! Quand je vous ai envoyé des gens, ils ne vous ont jamais trompés en mon nom. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai demandé à Tite de venir vous rendre visite, et j’ai envoyé avec lui un autre ami chrétien. Mais Tite ne vous a certainement pas trompé pour obtenir quoi que ce soit de vous. Lui et moi, nous avons toujours été complètement honnêtes avec vous. Nous pensons tous les 2 de la même manière.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que pensez‑vous lorsque vous lisez tout cela ? Pensez‑vous que nous voulons vous montrer à quel point nous sommes bons ? Non, nous parlons en tant que des personnes qui appartiennent à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Dieu nous connaît. Tout ce que nous faisons est de vous aider. Nous vous aimons et nous voulons vous rendre des croyants plus forts.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je connais un certain homme qui appartient à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Il y a 14 ans, Dieu a rapidement emmené cet homme au troisième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Peut‑être que cet homme était toujours dans son corps. Peut‑être, il s’était éloigné de son corps. Je ne sais pas. Dieu seul le sait.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand je viendrai vous rendre visite, j’espère que vous vivrez bien. Mais j’ai peur de ne pas voir ce que je veux voir. Ensuite, vous verrez que je suis différent de ce que vous voulez que je sois ! Je crains que vous ne vous disputiez. Vous pouvez être jaloux les uns des autres. Vous pouvez être très en colère les uns contre les autres. Certains d’entre vous voudront peut‑être simplement vous faire plaisir. Vous pouvez vous insulter ou vous mentir les uns les autres. Vous pouvez être fiers de vos qualités. Vous vous causez peut‑être des problèmes. Oui, j’ai peur que toutes ces choses se produisent parmi vous.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai peur d’être très triste quand je reviens vers vous. Mon Dieu peut m’abaisser de honte à propos de vous. Certains d’entre vous font encore de mauvaises choses et impures. Vous pouvez encore avoir des relations sexuelles avec des personnes qui ne sont pas vos maris ou épouses. Ce sont de mauvaises choses que beaucoup d’entre vous ont faites en même temps. Si vous ne laissez pas ces mauvaises choses, cela me fera pleurer.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je sais que Dieu a emmené cet homme au paradis. Je ne sais pas si cet homme était toujours dans son corps ou non. Dieu seul le sait. Lorsque cet homme était au paradis, il a entendu parler de choses secrètes. Ce sont des choses qu’aucun mot ne peut décrire. Dieu ne laissera personne parler de ces choses. Elles sont trop spéciales.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dirai des choses qui glorifient un homme comme cela. Mais je ne serai fier de rien de bon en moi. Je ne serai fier que des choses qui montrent ma faiblesse. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si je voulais me glorifier, cela ne fera pas de moi un idiot. Non, parce que je dirais de vraies choses. Mais je ne dirai pas de bonnes choses de moi. Je veux que tout le monde pense bien de moi. Les gens devraient regarder comment je vis. Ils devraient penser à ce que je dis. Cela leur suffit pour décider de moi.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, Dieu m’a montré beaucoup de choses qui étaient très spéciales. Mais il ne voulait pas que je sois orgueilleux à cause de cela. Alors, il m’a fait mal au corps, comme une épine pointue. Satan utilise cette douleur pour me causer beaucoup de problèmes. C’est comme l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de Satan qu’il envoie pour me faire du mal. Cela m’empêche certainement d’être fier de moi ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai demandé 3 fois au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' de me retirer cette douleur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il m’a dit : Je suis bon avec toi et je t’aide. Cela te suffit. Quand tu seras faible, je montrerai que je suis complètement puissant pour t’aider. Je suis donc heureux d’être fier de ma faiblesse. Alors je sais que la puissance de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' sera avec moi. '
