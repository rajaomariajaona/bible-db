document_id: HEB.9,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 9
  - type: heading
    content: L’ancien accord et le tabernacle
  - type: text
    content: 'Le premier accord comprenait des règles sur la façon dont les gens doivent '
  - type: text
    content: adorer
  - type: text
    content: ' Dieu. Cet accord parlait également d’un endroit spécial pour que les gens adorent Dieu sur cette terre. '
  '10':
  - type: text
    content: Les anciennes règles enseignaient aux gens différents types d’aliments et de boissons. Elles enseignaient comment les gens devraient se laver de manière spéciale. Ces règles concernaient le corps des gens. Ces règles n’avaient de pouvoir que jusqu’au moment où Dieu rendait les choses nouvelles et meilleures.
  - type: heading
    content: Nouvel accord de Dieu
  '11':
  - type: text
    content: Mais maintenant, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est venu comme notre '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial. Il nous apporte les bonnes choses qui sont maintenant ici. Il est allé dans la propre place de Dieu au '
  - type: text
    content: ciel
  - type: text
    content: '. C’est une tente plus grande et bien meilleure que l’ancien tabernacle. Personne n’a fabriqué cette tente. Elle n’appartient pas du tout à ce monde. '
  '12':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est entré dans la Très Sainte Salle pour nous. Il l’a fait une fois pour toujours. Il n’a pas emporté avec lui le sang de chèvres ou de jeunes vaches lorsqu’il est entré. Au lieu de cela, il a pris le sang de sa propre mort pour l’offrir à Dieu. De cette façon, il nous a libérés du péché pour toujours. '
  '13':
  - type: text
    content: 'Les anciennes règles disaient que le '
  - type: text
    content: prêtre
  - type: text
    content: ' devait utiliser le sang des animaux pour purifier les gens. C’était le sang des boucs ou des taureaux. Ou il brûlait une jeune vache et mélangeait les cendres avec de l’eau. Il jetait du sang ou des cendres sur les corps de gens impurs. Ensuite, ces gens redevenaient purs dans leurs corps et ils pouvaient '
  - type: text
    content: adorer
  - type: text
    content: ' Dieu.'
  '14':
  - type: text
    content: 'Mais le sang du '
  - type: text
    content: sacrifice
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' fera bien plus que cela ! Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' s’est offert à Dieu, dans la puissance de son '
  - type: text
    content: Esprit
  - type: text
    content: ', qui vit pour toujours. Ce '
  - type: text
    content: sacrifice
  - type: text
    content: ' était tout à fait bon. Il n’y avait rien de mal en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Il a offert son propre sang pour nous rendre complètement purifiés à l’intérieur de nous‑mêmes. Nous n’avons plus à faire des choses qui mènent à la mort. Au lieu de cela, nous pouvons servir notre Dieu, qui vit pour toujours. '
  '15':
  - type: text
    content: Ainsi, par la mort de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', Dieu apporte un nouvel accord entre lui et son peuple. Le peuple de Dieu reçoit de lui les bonnes choses qui seront avec lui pour toujours. Dieu a promis de donner ces choses au peuple qu’il a choisi. La mort de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' les a libérés de leurs péchés. Dieu ne les punira plus comme cela devrait arriver avec le premier accord.'
  '16':
  - type: text
    content: 'Une personne peut désigner la personne qui recevra ses choses après sa mort. Mais personne ne reçoit rien tant qu’il n’est pas clair que la personne est vraiment décédée. '
  '17':
  - type: text
    content: L’accord n’a de pouvoir qu’après le décès de la personne qui l’a conclu. Il n’a aucun pouvoir tant que cette personne est encore en vie.
  '18':
  - type: text
    content: 'Ainsi, même le premier accord de Dieu avec son peuple avait besoin du sang d’un animal. L’accord n’avait de pouvoir qu’après un décès. '
  '19':
  - type: text
    content: 'C’était comme ça. Moïse a lu à haute voix les commandements de la loi à tout le peuple d’Israël. Il leur a dit chaque règle que Dieu leur avait donnée. Après cela, Moïse a tué quelques jeunes vaches et boucs. Il a pris un peu de leur sang et l’a mélangé avec de l’eau. Il a jeté une partie du sang pour tomber sur le livre des lois de Dieu. Il a aussi fait tomber du sang sur tout le monde. Il a utilisé les poils rouges du mouton et quelques petites branches d’une plante appelée hysope pour jeter le sang et l’eau. '
  '2':
  - type: text
    content: 'Le peuple d’Israël a fait une tente spéciale pour Dieu. La première pièce de cette tente s’appelait la Salle Sainte. Le '
  - type: text
    content: chandelier
  - type: text
    content: ' spécial était dans cette pièce. La table spéciale avec le pain qu’ils offraient à Dieu était là aussi.'
  '20':
  - type: text
    content: 'Lorsque Moïse a fait cela, il a dit au peuple : Ce sang montre que l’accord de Dieu avec vous a le pouvoir. '
  '21':
  - type: text
    content: 'De la même manière, Moïse a jeté une partie du sang sur le tabernacle. Il a également fait couler du sang sur toutes les choses que les '
  - type: text
    content: prêtres
  - type: text
    content: ' utilisaient pour servir Dieu là‑bas. '
  '22':
  - type: text
    content: La loi de Dieu enseignait que le sang était nécessaire pour que tout soit pur. Nous voyons que Dieu ne pardonne pas les péchés des gens sans que le sang soit versé.
  - type: heading
    content: Le sacrifice de Jésus‑Christ sur la croix
  '23':
  - type: text
    content: 'Le tabernacle et les choses qui s’y trouvaient avaient besoin de sang d’animaux pour les purifier. C’était une image du véritable endroit au '
  - type: text
    content: ciel
  - type: text
    content: ' où les gens adorent Dieu. Mais les vraies choses dans le '
  - type: text
    content: ciel
  - type: text
    content: ' ont besoin de meilleurs '
  - type: text
    content: sacrifices
  - type: text
    content: ' pour les rendre plus purifiés que les '
  - type: text
    content: sacrifices
  - type: text
    content: ' d’animaux.'
  '24':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' n’est pas entré dans une salle sainte que les gens avaient faite sur terre. Un endroit comme ceci n’est qu’une image de la vraie place au '
  - type: text
    content: ciel
  - type: text
    content: . Non, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est allé au '
  - type: text
    content: ciel
  - type: text
    content: ', où Dieu est. Maintenant, il est là avec Dieu et il parle à Dieu pour nous.'
  '25':
  - type: text
    content: 'Le chef des '
  - type: text
    content: prêtres
  - type: text
    content: ' ici sur terre entre chaque année dans la Très Sainte Salle. Chaque fois, il emporte avec lui le sang d’un animal et il l’offre à Dieu. Mais quand Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est allé au '
  - type: text
    content: ciel
  - type: text
    content: ' pour s’offrir à Dieu, il n’a plus fait cela. '
  '26':
  - type: text
    content: Pour ce faire, il devrait mourir encore et encore, plusieurs fois depuis le début du monde. Non ! Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' n’est apparu qu’une seule fois. Il est apparu maintenant, alors que le temps approche. Il est venu et il est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: '. De cette façon, il a supprimé le pouvoir du péché. '
  '27':
  - type: text
    content: 'Toute personne doit mourir une fois. Après la mort, Dieu jugera chaque personne. '
  '28':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est également mort une seule fois en '
  - type: text
    content: sacrifice
  - type: text
    content: . De cette façon, il a pris la punition de Dieu pour les péchés de beaucoup de gens. Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' reviendra sur terre une deuxième fois, mais ce ne sera pas comme un '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour les péchés. Cette fois, il viendra pour sauver les gens qui l’attendent patiemment.'
  '3':
  - type: text
    content: 'Derrière le second rideau, il y avait une salle très spéciale. Le nom de cette salle très spéciale était la Très Sainte Salle. '
  '4':
  - type: text
    content: L’autel d’or où ils brûlaient de l’
  - type: text
    content: encens
  - type: text
    content: ' était à l’intérieur de cette pièce. La boîte qui contenait l’accord de Dieu avec son peuple était là aussi. La boîte avait de l’or sur tous ses côtés. À l’intérieur de la boîte se trouvait le pot en or qui contenait la nourriture spéciale appelée manne. La boîte contenait également le bâton d’Aaron. Il a fait pousser des fleurs. Elle contenait également les 2 pierres plates sur lesquelles Dieu avait écrit les règles de son accord avec son peuple. '
  '5':
  - type: text
    content: 'Les formes de 2 '
  - type: text
    content: anges
  - type: text
    content: ' spéciaux se tenaient au‑dessus de la boîte spéciale. Ces formes étaient faites d’or et elles montraient que Dieu était là avec une grande puissance. Les '
  - type: text
    content: anges
  - type: text
    content: ' avaient des ailes ouvertes sur le couvercle de la boîte. Ce couvercle était l’endroit où Dieu pardonnait les péchés du peuple. Mais nous ne pouvons pas tout expliquer sur ces choses maintenant.'
  '6':
  - type: text
    content: 'Donc, c’était la façon dont ils préparaient la tente spéciale. Ensuite, les '
  - type: text
    content: prêtres
  - type: text
    content: ' entraient chaque jour dans la première pièce de la tente. Ils allaient là‑bas pour servir Dieu, comme ses règles l’enseignaient. '
  '7':
  - type: text
    content: 'Mais seul le chef spécial des '
  - type: text
    content: prêtres
  - type: text
    content: ' pouvait entrer dans la seconde salle. Il n’y entrait qu’une fois par an. Il devait emporter avec lui le sang d’un animal qu’ils avaient tué. Il offrait le sang à Dieu en son propre nom, afin que Dieu lui pardonne ses péchés. Il l’offrait également au nom du peuple. C’était pour que Dieu pardonne leurs péchés. '
  '8':
  - type: text
    content: 'Ainsi, le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' montrait que la Très Sainte Salle n’était pas encore ouverte à tout le monde. L’ancien tabernacle était encore là. '
  '9':
  - type: text
    content: 'C’est comme une image qui signifie quelque chose pour nous aujourd’hui. Cette image nous enseigne les dons et les '
  - type: text
    content: sacrifices
  - type: text
    content: ' que les gens ont offerts à Dieu pour l’'
  - type: text
    content: adorer
  - type: text
    content: '. Quand quelqu’un a donné ces choses à Dieu, cela ne pouvait pas le purifier dans son '
  - type: text
    content: esprit
  - type: text
    content: '. '
