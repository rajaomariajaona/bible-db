document_id: MAT.13,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte l’histoire d’un agriculteur qui a semé les graines
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Encore une fois, Jésus a quitté la maison. Il est allé au bord de la mer de Galilée. Il s’est mis à enseigner. La foule qui s’est réunie, était très grande. Donc, Jésus est monté dans un petit bateau et il s’est assis là. Le petit bateau était sur l’eau. Mais le peuple était debout au bord de la mer.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus sont venus auprès de lui. Ils ont demandé : Pourquoi parles‑tu à la foule avec des histoires ou exemples ?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu : Dieu vous a aidés à comprendre ce que ces histoires ou exemples sur le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' signifient. Mais Dieu n’a pas aidé ces gens à comprendre ces choses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ecoutez bien. Dieu aidera la personne qui veut comprendre mes paroles. Elle comprendra alors vraiment beaucoup plus. Une autre personne comprend très peu. Dieu retranchera le peu qu’elle a. Alors elle ne comprendra rien du tout. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La raison pour laquelle j’utilise des histoires ou exemples pour parler à d’autres personnes est la suivante :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces gens regardent. Mais ils ne voient pas vraiment clairement.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils entendent. Mais ils ne comprennent pas vraiment.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ésaïe, le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' avait écrit un message de Dieu à ce sujet. Et maintenant, ce message s’est réalisé :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous les gens, vous entendrez, mais vous ne comprendrez jamais.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous regarderez et vous verrez, mais vous ne saurez jamais ce que vous verrez.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces gens ne veulent pas comprendre dans leurs cœurs.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donc, Ils ont bouché leurs oreilles, et ils ont fermé leurs yeux.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sinon, ils pourraient voir avec leurs yeux,
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ils pourraient entendre avec leurs oreilles.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils pourraient réellement comprendre.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils pourraient alors se tourner vers moi, et je pourrais les guérir.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous êtes heureux. C’est parce que vous avez des yeux qui voient. Et vous avez des oreilles qui entendent. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous dis la vérité : Beaucoup de  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' et de bonnes personnes ont voulu voir ces choses il y a longtemps. Mais ils n’ont pas vu les choses que vous voyez. Ils voulaient entendre les choses que vous entendez. Mais ils ne les ont pas entendues.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus explique l’histoire d’un agriculteur qui a semé ses graines
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ecoutez‑moi maintenant. Je vais vous expliquer ce que cette histoire de l’agriculteur signifie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines graines sont tombées sur le chemin. Le chemin est comme les gens qui ne comprennent pas le message. Ils entendent, mais ils ne le comprennent pas. Alors le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: ' vient rapidement à eux. Et il enlève ce qu’ils ont entendu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a utilisé un exemple pour leur enseigner beaucoup de choses. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines graines sont tombées sur le sol avec des pierres en lui. Ce sol est comme des gens qui entendent le message de Dieu. Ils sont heureux d’y croire pendant un certain temps. Mais il ne va pas dans leurs vies et leurs pensées. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils croient en Dieu pendant un certain temps. Mais ils sont comme des plantes qui ne poussent pas dans le sol. Parce qu’ils obéissent à la parole de Dieu, d’autres personnes leur causent des problèmes. Alors quand ils rencontrent des problèmes ou des difficultés, ils cessent de croire en moi.  '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines graines sont tombées parmi les épines. Ce sol est comme d’autres personnes qui entendent le message de Dieu. Mais ils ont beaucoup de soucis. Ils pensent que plus d’argent et d’autres objets de valeur peuvent les amener à être heureux. Ces pensées ne leur permettent pas d’obéir à Dieu. Donc le message de Dieu ne peut pas produire de bonnes choses dans leurs vies. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais certaines graines sont tombées dans le bon sol. Ce sol est comme d’autres personnes qui entendent le message de Dieu. Elles comprennent et obéissent à Dieu. Ces gens sont comme de bonnes plantes. D’une graine, certaines plantes ont produit 100 grains. D’autres ont produit 60 grains. D’autres encore ont produit 30 grains.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire à propos de certaines mauvaises herbes
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a dit aux gens une autre histoire. Il a dit : Voici ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble : Un agriculteur a semé de bonnes graines dans son champ. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais une nuit, quand tout le monde dormait, une mauvaise personne est venue au champ de l’agriculteur. Cette personne n’a pas aimé l’agriculteur. Cette mauvaise personne a semé de mauvaises herbes parmi les bonnes graines. Et puis, cette mauvaise personne est partie. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les bonnes semences ont poussé et les plantes ont commencé à produire des grains. Mais les mauvaises herbes ont également poussé.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs de l’agriculteur sont venus lui parler. Ils lui ont demandé : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tu as semé une bonne semence dans ton champ. D’où sont venues ces mauvaises herbes ?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’agriculteur a dit à ses serviteurs : Une mauvaise personne ne m’aime pas. C’est cette personne qui a fait cela. Les serviteurs ont alors demandé à l’agriculteur : Est‑ce que vous voulez que nous allions arracher les mauvaises herbes ?'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’agriculteur a répondu : Non, je ne veux pas que vous fassiez cela. Si vous arrachez les mauvaises herbes, il y a risque que vous arrachiez également une partie des plantes de blé. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Écoute‑moi, un semeur est sorti pour semer les graines dans son champ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que les 2 poussent ensemble jusqu’à la récolte. A ce temps‑là, je dirai aux serviteurs quoi faire. Je dirai : Arrachez d’abord les mauvaises herbes. Liez‑les ensemble pour les brûler. Ensuite, coupez le blé. Après, amassez le blé dans mon grenier.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire sur une petite graine
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit aux gens une autre histoire : Je vais vous dire encore une fois ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Il est comme une très petite graine. Un homme a pris cette semence et il l’a semée dans son champ. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle est la plus petite graine dans le monde. Mais quand elle commencera à pousser, elle deviendra la plus grande des plantes de votre champ. Elle deviendra un arbre. Alors les oiseaux viendront. Ils se mettront sur ses branches.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire à propos du levain
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit aux gens une autre histoire. Il a dit : Je vais vous raconter une autre histoire à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Une femme voulait faire du pain. Alors elle a mélangé du levain avec 3 mesures de farine. Après cela, le levain a fait gonfler la pâte. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit à la foule toutes ces choses. Mais il utilisait seulement des histoires et des exemples pour les enseigner. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donc ce que le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' avait dit, s’est réalisé :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je parlerai des choses aux gens par des histoires.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je parlerai des choses que les gens ne savaient pas.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces choses étaient secrètes depuis que le monde a commencé.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a fait partir les gens. Il est entré dans la maison où il restait. Et ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont aussi entrés dans la maison avec lui. Ils ont dit à Jésus : Explique‑nous l’histoire de mauvaises herbes dans le champ.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus explique l’histoire de mauvaises herbes
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a répondu à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Le Fils de l’homme est la personne qui a semé les graines. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le champ est comme le monde. Les bonnes graines sont comme les gens qui suivent Dieu. Les mauvaises herbes sont comme les gens qui appartiennent à Satan. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Satan est la mauvaise personne qui a semé les mauvaises herbes. La récolte signifie le jour du jugement.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’agriculteur jetait alors les graines. Certaines graines sont tombées sur le chemin. Les oiseaux sauvages sont venus. Ils ont mangé ces graines.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la récolte, les travailleurs arracheront les mauvaises herbes. Ils les brûleront dans le feu. Et ce sera la même chose le jour du jugement. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Fils de l’homme enverra ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '. Ils ne laisseront personne ou rien qui cause le péché. Ils détruiront tous ceux qui font de mauvaises choses. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' vont jeter les mauvaises personnes dans le grand feu. Là, les gens vont pleurer. Et ils grinceront leurs dents ensemble, parce qu’ils seront en colère. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les personnes qui ont obéi à Dieu brilleront comme le soleil. Elles seront dans le Royaume de leur Père. Si vous avez des oreilles, alors écoutez bien ce que je dis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte l’histoire d’un homme qui a trouvé des choses précieuses dans le sol
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Je peux vous dire encore une fois ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' est comme quelque chose de valeur. Quelqu’un l’a caché dans un champ. Et puis quelqu’un d’autre l’a trouvé. Il était très content. Il l’a aussi caché et il est allé chez lui. Alors, il a vendu tout ce qu’il avait. Puis il a acheté ce champ avec les choses de valeur en lui. '
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus raconte une histoire sur des pierres précieuses
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Je vais vous dire encore une fois ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble : Un homme a une entreprise. Il cherche de belles pierres précieuses qu’il peut acheter. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un jour, il a trouvé une très belle pierre précieuse que quelqu’un voulait vendre. Alors il est parti. Et il a vendu tout ce qu’il avait. Puis il est allé et il a acheté cette très belle et précieuse pierre.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a dit : Je peux vous dire encore une fois ce à quoi le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: ' ressemble. Certains hommes avaient des filets pour attraper les poissons. Ils jetaient leurs filets dans la mer. Ils ont alors attrapé beaucoup de différents types de poissons. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le filet était plein de poissons, les hommes l’ont tiré sur le  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: rivage
    - type: text
      text: '. Puis ils se sont assis. Certains de ces poissons étaient bons à manger, et ils ont mis ces poissons dans des paniers. Certains de ces poissons n’étaient pas bons à manger. Ils ont jeté les mauvais poissons. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les choses qui se passeront à la fin des temps. Dieu enverra ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: '. Ils vont mettre les gens qui ne respectent pas Dieu en un seul endroit. Et ils vont mettre les gens qui obéissent à Dieu à un autre endroit. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines graines sont tombées sur le sol avec des pierres en lui. Il n’y avait pas beaucoup de terre. Les graines ont rapidement commencé à pousser, parce que le sol n’était pas profond. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' vont jeter les gens qui ne respectent pas Dieu dans le grand feu. Là, les gens vont pleurer. Ils vont également grincer leurs dents ensemble, parce qu’ils seront en colère.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus a demandé à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Avez‑vous compris toutes ces choses ? Ils ont répondu : Oui, nous avons compris.'
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus leur a encore dit : Certains enseignants de la loi ont appris sur les choses du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Royaume des cieux
    - type: text
      text: '. Ils sont comme le maître d’une maison. Il a de nouvelles et des anciennes choses qu’il a gardées dans sa maison. Il tire ce qui est utile de ces choses. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus a fini de raconter ces histoires. Il est allé loin de cet endroit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus va à Nazareth
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus est allé à la ville appelée Nazareth. Il avait vécu à Nazareth quand il était un garçon. Il enseignait les gens dans le bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Les gens étaient très surpris de ses enseignements. Ils se demandaient : Cet homme a appris toutes ces choses d’où ? Ils disaient : Comment sait‑il beaucoup de choses ? Comment peut‑il faire tous ces miracles ? '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous connaissons bien cet homme. Il est le fils d’un charpentier. Et Marie est sa mère. Nous connaissons aussi ses frères, Jacques, Joseph, Simon et Jude. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutes ses sœurs vivent aussi ici dans cette ville parmi nous. Alors, où a‑t‑il appris à faire toutes ces choses ? Qui l’a fait très puissant ?
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils n’étaient pas contents de Jésus. Jésus leur a alors dit : Les serviteurs de Dieu sont respectés partout. Mais ils ne sont pas respectés dans leurs villes d’origine ou leurs maisons. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus n’a pas fait beaucoup de miracles à Nazareth, parce que les gens ne croyaient pas en lui. 
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais quand le soleil s’est levé, il a brûlé les jeunes plantes. Elles ont vite séché parce que le sol n’était pas assez profond. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certaines graines sont tombées dans les épines. Ces épines ont poussé avec les jeunes plantes. Les épines ont alors bloqué les plantes à pousser. Ainsi, les plantes ne pouvaient plus faire de nouvelles semences. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certaines graines sont tombées sur la bonne terre et de bonnes plantes fortes ont poussé à partir de ces graines. Certaines plantes ont produit 100 grains. D’autres ont produit 60 grains. D’autres encore ont produit 30 grains.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus a fini de parler. Il a dit à la foule : Si vous avez des oreilles, alors écoutez bien ce que je dis !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus explique à ses  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' pourquoi il enseigne par des histoires ou exemples'
    marker-yv: yv-h
