document_id: LUK.22,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 22
  - type: heading
    content: Judas accepte de trahir Jésus
  - type: text
    content: 'Le jour où les '
  - type: text
    content: Juifs
  - type: text
    content: ' mangent un repas spécial de '
  - type: text
    content: pain sans levain
  - type: text
    content: ' approchait. Ce temps est appelé la '
  - type: text
    content: Pâque
  - type: text
    content: .
  '10':
  - type: text
    content: 'Jésus a répondu : Ecoutez, lorsque vous commencez à entrer dans la ville, un homme vous rencontrera. Il sera avec une cruche d’eau. Suivez‑le jusqu’à ce qu’il entre dans une maison.'
  '11':
  - type: text
    content: 'Vous devez ensuite dire au maître de cette maison ceci : Notre Maître t’envoie ce message : Où est la salle pour les visiteurs ? Je veux manger le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' là avec mes '
  - type: text
    content: disciples
  - type: text
    content: .
  '12':
  - type: text
    content: 'Un homme vous montrera une grande salle à l’étage. Elle aura tout ce dont vous avez besoin en elle. Préparez le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' là pour nous tous.'
  '13':
  - type: text
    content: 'Alors Pierre et Jean sont entrés dans la ville. Ils ont trouvé tout ce que Jésus leur avait dit. Ils ont préparé le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: .
  '14':
  - type: text
    content: 'Quand il était temps de manger, Jésus est arrivé. Il s’est assis. Les hommes qu’il avait choisis étaient assis avec lui. '
  '15':
  - type: text
    content: 'Jésus leur a dit : Je voulais beaucoup manger ce repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' avec vous. Cela doit se réaliser avant que je meure. '
  '16':
  - type: text
    content: 'Oui, je ne vais pas manger un autre repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' après celui‑ci. Je ne vais pas manger de nouveau jusqu’à ce que Dieu commence à régner.'
  '17':
  - type: text
    content: 'Puis il a pris une coupe et il a remercié Dieu pour le vin. Il leur a dit : Prenez cette coupe. Chacun de vous boit un peu de vin. '
  '18':
  - type: text
    content: 'Permettez‑moi de vous dire ceci : A partir de maintenant, je ne vais plus boire du vin jusqu’à ce que Dieu commence à régner.'
  '19':
  - type: text
    content: 'Puis il a pris du pain et il a remercié Dieu pour cela. Il a coupé le pain en petits morceaux et il les a donnés à chacun d’eux. Il a dit : Ceci est mon corps. Je l’offre à Dieu pour chacun de vous. Lorsque vous faites cela à partir de maintenant, souvenez‑vous de moi.'
  '2':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi de Dieu voulaient tuer Jésus. Ils pensaient à la façon dont ils pourraient le faire. C’était difficile, parce qu’ils avaient peur du peuple. Ils voulaient le tuer en secret.'
  '20':
  - type: text
    content: 'Jésus a fait la même chose après le repas. Il a pris une coupe de vin et l’a donnée à ses '
  - type: text
    content: disciples
  - type: text
    content: '. Il a dit : Ceci est à propos de la nouvelle promesse. Elle est entre Dieu et son peuple. Je vais laisser les gens me tuer et verser mon sang. Ensuite, cette promesse se réalisera.'
  '21':
  - type: text
    content: 'Mais regardez ! La main de la personne qui va me livrer aux dirigeants est sur la table avec moi. '
  '22':
  - type: text
    content: Je vais mourir, comme Dieu le veut. C’est vrai. Mais ce sera très mauvais pour l’homme qui amène cela à se réaliser.
  '23':
  - type: text
    content: 'Ils se demandaient comme ceci : Qui est l’homme qui fera cela ?'
  - type: heading
    content: Jésus dit qui est le plus important
  '24':
  - type: text
    content: 'Puis ils ont commencé à se disputer entre eux. Ils se disputaient au sujet de qui d’entre eux était le plus important. '
  '25':
  - type: text
    content: 'Jésus leur a dit : Les rois des pays ont une grande autorité sur leur peuple. Les rois veulent que les gens disent de bonnes choses à leur sujet. Et les rois veulent que les gens disent qu’ils sont leurs amis. '
  '26':
  - type: text
    content: 'Vous devez être différents. La personne la plus importante parmi vous doit être comme la moins importante. L’homme qui est le maître doit être comme un serviteur. '
  '27':
  - type: text
    content: Après tout, quelle est la personne la plus importante ? Est‑ce la personne qui se trouve à la table ? Ou est‑ce le serviteur qui met le repas ? Oui, c’est la personne qui se trouve à la table. Mais je suis ici pour être votre serviteur.
  '28':
  - type: text
    content: 'Vous ne m’avez jamais quitté. Vous avez été à mes côtés quand j’avais des moments difficiles. '
  '29':
  - type: text
    content: 'Et maintenant, je dis que vous allez gouverner avec moi. Mon père a dit que je vais gouverner avec lui. Donc, je vous dis aussi que vous gouvernerez avec moi. '
  '3':
  - type: text
    content: Alors l’
  - type: text
    content: esprit
  - type: text
    content: ' du '
  - type: text
    content: diable
  - type: text
    content: ' a commencé à vivre à l’intérieur de Judas Iscariote. Il était l’un des 12 hommes que Jésus avait choisis. '
  '30':
  - type: text
    content: Vous serez à ma table où je dirige. Vous allez manger et boire avec moi. Vous serez assis sur les chaises des gouvernants. Vous jugerez les gens des 12 familles d’Israël.
  - type: heading
    content: Jésus dit à Pierre ce qui se passera
  '31':
  - type: text
    content: 'Jésus a dit ceci : Simon, Simon, écoute‑moi attentivement ! Le '
  - type: text
    content: diable
  - type: text
    content: ' a demandé de vous avoir tous. Il veut que vous puissiez tous arrêter de m’obéir. Il vous secoue comme un agriculteur secoue les graines.'
  '32':
  - type: text
    content: Mais j’ai prié pour toi, Simon, que tu vas continuer à croire en moi. Et toi, quand tu retourneras à moi, tu devras aider tes frères à être forts de nouveau.
  '33':
  - type: text
    content: 'Simon a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je suis même prêt à aller en prison avec toi. Je suis prêt à mourir avec toi ! '
  '34':
  - type: text
    content: 'Jésus a répondu : Pierre, laisse‑moi te dire ceci : Aujourd’hui, tu diras 3 fois que tu ne me connais pas. Tu vas dire cela avant que le coq fasse un cri tôt le matin. '
  '35':
  - type: text
    content: 'Jésus a ensuite posé aux hommes qu’il avait choisis une question : Quand je vous ai envoyés sans argent, un sac ou des souliers, aviez‑vous besoin de quelque chose ? Ils ont répondu : Non, de rien.'
  '36':
  - type: text
    content: 'Jésus a dit : Maintenant, c’est différent. Si vous avez une somme d’argent, prenez‑la avec vous. Si vous avez un porte‑monnaie ou un sac, prenez‑le avec vous. Si vous ne disposez pas d’un long couteau pointu, vendez votre '
  - type: text
    content: manteau
  - type: text
    content: '. Utilisez l’argent pour acheter un couteau. '
  '37':
  - type: text
    content: 'Permettez‑moi de vous dire pourquoi. Dans le livre de Dieu, les gens avaient écrit tout ce qui se passera à propos de moi. Ils avaient dit : Les gens vont me mélanger avec d’autres hommes mauvais. Et cela doit m’arriver bientôt.'
  '38':
  - type: text
    content: 'Ils ont dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', regardez, nous avons 2 longs couteaux tranchants ici. Il a répondu : C’est suffisant.'
  - type: heading
    content: Jésus prie sur la colline appelée la montagne des Oliviers
  '39':
  - type: text
    content: 'Jésus a quitté la ville. Et il est allé à la colline appelée la '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: '. C’est ce qu’il faisait habituellement. Ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés avec lui. '
  '4':
  - type: text
    content: 'Judas est allé et il a parlé aux chefs des '
  - type: text
    content: prêtres
  - type: text
    content: '. La police qui travaillait au '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu était là aussi. Ils ont parlé de la façon dont Judas pouvait leur livrer Jésus en secret. '
  '40':
  - type: text
    content: 'Jésus est arrivé à l’endroit où il voulait aller. Puis il leur a dit : Demandez à Dieu de vous empêcher de vouloir faire de mauvaises choses.'
  '41':
  - type: text
    content: 'Il est allé loin d’eux à peu près une distance, où on peut jeter une pierre. Il a plié les genoux au sol et il a prié. '
  '42':
  - type: text
    content: 'Il a dit : Père, si tu veux, tu peux emporter cette douleur de moi. Mais ne me laisse pas faire ce que je veux. Je veux faire ce que tu veux.'
  '43':
  - type: text
    content: 'Un '
  - type: text
    content: ange
  - type: text
    content: ' est alors venu de Dieu. L’'
  - type: text
    content: ange
  - type: text
    content: ' l’a rendu fort. '
  '44':
  - type: text
    content: 'Jésus a commencé à avoir des troubles dans son '
  - type: text
    content: esprit
  - type: text
    content: . Il a prié de nouveau encore plus fortement. La sueur sur sa tête devenait comme de grandes quantités de sang qui tombaient à terre.
  '45':
  - type: text
    content: 'Il a arrêté de prier. Puis il s’est levé de nouveau. Il est retourné auprès des 11 hommes. Et il a trouvé qu’ils dormaient. Ils étaient très fatigués, parce qu’ils étaient très tristes. '
  '46':
  - type: text
    content: 'Jésus a dit : Vous ne devriez pas dormir. Levez‑vous et priez ! Demandez à Dieu de vous garder à ne pas faire de mauvaises choses.'
  - type: heading
    content: Les soldats attrapent Jésus
  '47':
  - type: text
    content: 'Pendant que Jésus parlait encore, beaucoup de gens et de soldats sont allés auprès de lui. Judas conduisait la foule. Il était l’un des 12 hommes que Jésus avait choisis. Il est venu près de Jésus pour le baiser. '
  '48':
  - type: text
    content: 'Jésus lui a dit : Tu me baises, Judas pour montrer aux soldats de m’attraper !'
  '49':
  - type: text
    content: 'Alors ceux qui suivaient Jésus ont vu ce qui se passait. Ils lui ont demandé : '
  - type: text
    content: Seigneur
  - type: text
    content: ', faut‑il utiliser nos longs couteaux tranchants ?'
  '5':
  - type: text
    content: 'Ils étaient très heureux et ils ont promis de lui donner de l’argent pour cela. '
  '50':
  - type: text
    content: 'L’un d’eux a frappé le serviteur du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Il lui a coupé l’oreille droite. '
  '51':
  - type: text
    content: 'Jésus a dit : Assez ! Arrête de faire ça ! Il a ensuite touché l’homme et a fait son oreille bien de nouveau.'
  '52':
  - type: text
    content: 'Alors Jésus a parlé aux gens qui étaient venus pour l’attraper. Il y avait les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les chefs de la police dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. D’autres dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' importants étaient là aussi.'
  - type: text
    content: 'Jésus leur a dit : Vous venez ici avec des couteaux tranchants et de lourds bâtons. Vous venez m’attraper comme un voleur dangereux.'
  '53':
  - type: text
    content: 'J’étais avec vous tous les jours dans le '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Vous n’avez pas essayé de m’attraper. Oui, c’est vraiment le temps et l’endroit pour vous de travailler. Maintenant, il est sombre et le '
  - type: text
    content: diable
  - type: text
    content: ' règne dans l’obscurité.'
  - type: heading
    content: Pierre dit qu’il ne connaît pas Jésus
  '54':
  - type: text
    content: 'Ensuite, ils ont attrapé Jésus. Ils ont emmené Jésus. Ils sont allés avec lui à la maison du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Pierre suivait, mais il n’était pas près d’eux. '
  '55':
  - type: text
    content: 'Les gens ont allumé un feu à l’extérieur de la maison (au milieu de la cour). Ils se sont assis autour du feu. Pierre est allé et il était assis parmi eux. '
  '56':
  - type: text
    content: 'Une servante a alors vu Pierre. Il était assis autour du feu. Elle regardait Pierre attentivement. Elle a dit : Cet homme était aussi de ceux qui suivaient Jésus.'
  '57':
  - type: text
    content: 'Pierre a répondu : Femme, je ne le connais pas.'
  '58':
  - type: text
    content: 'Après un court temps, un homme l’a regardé. Il a dit : Tu es aussi de leur groupe. Pierre a répondu : Homme, je ne suis pas l’un d’entre eux.'
  '59':
  - type: text
    content: 'Après environ une heure, quelqu’un d’autre a parlé : Je suis sûr que cet homme était aussi avec Jésus. Il est également de la Galilée.'
  '6':
  - type: text
    content: Alors Judas a dit qu’il le fera. Il a ensuite commencé à surveiller le bon moment pour attraper Jésus. Il voulait le faire quand la foule n’était pas autour de Jésus.
  - type: heading
    content: Jésus mange son dernier repas avec ceux qu’il avait choisis
  '60':
  - type: text
    content: 'Pierre a dit : Homme, je ne sais pas de quoi tu parles. Quand Pierre parlait encore, un coq fait un cri. '
  '61':
  - type: text
    content: 'Alors Jésus s’est retourné et il a regardé Pierre. Pierre s’est souvenu de ce que Jésus lui avait dit : 3 fois, tu diras ce soir que tu ne me connais pas. Tu diras 3 fois avant que le coq fasse un cri aujourd’hui (le matin). '
  '62':
  - type: text
    content: Pierre est allé et il a beaucoup pleuré.
  - type: heading
    content: Les soldats se moquent de Jésus et ils le frappent
  '63':
  - type: text
    content: Les hommes qui tenaient Jésus se moquaient de lui. Ils le frappaient.
  '64':
  - type: text
    content: 'Ils ont attaché un tissu à son visage, afin qu’il ne puisse pas voir. Ils disaient : Tu dis que tu reçois les messages de Dieu ! Dis‑nous, qui est en train de te frapper maintenant ? '
  '65':
  - type: text
    content: Et ils lui disaient beaucoup d’autres mauvaises choses.
  - type: heading
    content: Les dirigeants des Juifs posent des questions à Jésus
  '66':
  - type: text
    content: 'Quand c’était le jour, les '
  - type: text
    content: anciens
  - type: text
    content: ' se sont réunis. Les chefs de '
  - type: text
    content: prêtres
  - type: text
    content: ' étaient à la réunion. Les enseignants de la loi de Dieu étaient là aussi. Puis d’autres hommes y ont emmené Jésus. '
  '67':
  - type: text
    content: 'Ils lui ont demandé : Es‑tu le '
  - type: text
    content: Messie
  - type: text
    content: '  ? Si tu l’es, dis‑nous.'
  - type: text
    content: 'Jésus a répondu : Si je vous le dis, vous ne me croirez pas. '
  '68':
  - type: text
    content: 'Je pourrais vous demander : Qui suis‑je selon vous ? Mais vous ne me répondrez pas si je fais ça. '
  '69':
  - type: text
    content: Mais à partir de maintenant, je serai assis dans le lieu le plus important. Je serai assis sur le côté droit de Dieu. Il est tout puissant.
  '7':
  - type: text
    content: 'Le jour est venu pour manger le repas des '
  - type: text
    content: pain sans levain
  - type: text
    content: '. Les gens devaient tuer les jeunes moutons pour le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' ce jour.'
  '70':
  - type: text
    content: 'Ils ont tous dit : Alors, tu es le Fils de Dieu ? Il a répondu : Vous dites ce que je suis. Et vous avez raison.'
  '71':
  - type: text
    content: 'Ils disaient : Il ne faut pas que quelqu’un d’autre nous dise ce que cet homme dit. Nous avons entendu ce qu’il a dit à propos de lui‑même.'
  '8':
  - type: text
    content: 'Alors Jésus a envoyé Pierre et Jean. Il leur a dit : Allez préparer le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ', ensuite, nous pouvons tous venir manger.'
  '9':
  - type: text
    content: 'Ils lui ont demandé : Où veux‑tu que nous préparions ce repas ?'
