document_id: LUK.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Jésus demande à certains hommes de le suivre
  - type: text
    content: Un jour, Jésus était au bord du lac de Génésareth. Et une foule de gens poussait pour se rapprocher de Jésus. Ils écoutaient Jésus. Jésus leur disait le message de Dieu.
  '10':
  - type: text
    content: 'Jacques et Jean étaient également très surpris. Ils étaient les fils de Zébédée, et ils travaillaient toujours avec Simon. Jésus a alors dit à Simon : N’aie pas peur de moi. A partir de maintenant, tu pêcheras des hommes. '
  '11':
  - type: text
    content: Après cela, ils sont allés et ils ont remonté leurs petits bateaux au bord du lac. Ensuite, ils ont laissé tout derrière eux et ils sont allés avec Jésus.
  - type: heading
    content: Un homme malade de la lèpre
  '12':
  - type: text
    content: 'Un jour, Jésus était dans une certaine ville. Un homme malade de la '
  - type: text
    content: lèpre
  - type: text
    content: ' était là. Quand l’homme a vu Jésus, il s’est jeté à genoux devant lui. Il a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', si tu veux, tu peux me guérir. S’il te plaît, fais‑le.'
  '13':
  - type: text
    content: 'Jésus l’a touché avec sa main. Il a dit : Je le veux. Sois bien. Immédiatement, la maladie a disparu. '
  '14':
  - type: text
    content: 'Jésus lui a dit : Ne dis à personne ceci. Au lieu de cela, va te montrer au '
  - type: text
    content: prêtre
  - type: text
    content: '. Donne‑lui une offrande pour Dieu. Moïse avait dit aux gens : Vous devez faire cela quand vous êtes guéris de cette maladie. Donc, donne une offrande à Dieu. Cela montrera à tous que tu es maintenant bien.'
  '15':
  - type: text
    content: 'Après cela, de plus en plus de gens entendaient les nouvelles à propos de Jésus. Les foules venaient entendre Jésus enseigner. Ces malades voulaient également que Jésus les guérisse. '
  '16':
  - type: text
    content: Mais Jésus est allé loin de la foule prier dans des endroits déserts.
  - type: heading
    content: Jésus guérit un homme qui ne peut pas marcher
  '17':
  - type: text
    content: 'Un jour, alors que Jésus enseignait dans une maison, beaucoup de gens étaient assis là. Certains étaient des '
  - type: text
    content: Pharisiens
  - type: text
    content: . D’autres étaient des enseignants de la loi de Dieu. Ils étaient venus de nombreux villages de la Galilée, de Judée et de Jérusalem. Jésus avait la puissance de Dieu pour guérir ces malades.
  '18':
  - type: text
    content: 'Alors certains hommes sont arrivés. Ils ont emmené un homme sur un petit lit. L’homme ne pouvait pas bouger ses jambes. Ils ont essayé d’entrer dans la maison, parce qu’ils voulaient emmener l’homme à Jésus. '
  '19':
  - type: text
    content: 'Mais la maison était pleine de gens, et ils ne pouvaient pas entrer. Alors, ils ont soulevé le petit lit avec l’homme sur le toit de la maison. Ensuite, ils ont fait un trou dans le toit. Après cela, ils ont mis le petit lit à travers le trou. L’homme était toujours couché sur le petit lit. Et puis, ils l’ont fait descendre au milieu de la foule, devant Jésus. '
  '2':
  - type: text
    content: Jésus a vu 2 petits bateaux de pêche au bord du lac. Les pêcheurs avaient laissé les petits bateaux là. Ils lavaient maintenant leurs filets.
  '20':
  - type: text
    content: 'Jésus a vu cela. Il s’est dit : Ces hommes croient vraiment en moi. Ainsi, il a parlé à l’homme malade. Il a dit : Mon ami. Je pardonne toutes les mauvaises choses que tu faisais.'
  '21':
  - type: text
    content: 'Les '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et les enseignants de la loi de Dieu étaient là. Ils ont entendu ce que Jésus a dit. Alors, ils ont commencé à parler les uns aux autres à ce sujet : Ce que Jésus dit est faux. Il ne peut pas pardonner aux gens les mauvaises choses qu’ils ont faites. Seul Dieu peut le faire. Et il est seulement un homme. '
  '22':
  - type: text
    content: 'Jésus savait ce que ces hommes disaient. Il leur a dit : N’ayez pas de telles pensées.'
  '23':
  - type: text
    content: 'Je dis à cet homme : Je te pardonne toutes les mauvaises choses que tu avais faites. Mais je pouvais lui dire, lève‑toi et marche. Je veux vous montrer que mes paroles sont vraies. Qu’est‑ce qui est mieux à dire ?'
  '24':
  - type: text
    content: Maintenant, je vais vous montrer que moi, le Fils de l’homme, j’ai le pouvoir sur la terre. Je peux pardonner aux gens les mauvaises choses qu’ils ont faites. Je vais vous montrer que je peux leur pardonner. Puis il s’est tourné vers l’homme qui ne pouvait pas bouger ses jambes.
  - type: text
    content: 'Il a dit : Lève‑toi. Prends ton petit lit et rentre à la maison !'
  '25':
  - type: text
    content: 'Immédiatement, l’homme s’est levé devant eux. Il a pris le petit lit qu’il avait utilisé pour se coucher. Il est allé à la maison. Il disait : Dieu est grand et puissant ! '
  '26':
  - type: text
    content: 'Cela a surpris tout le monde. Les gens avaient très peur. Ils se disaient : Dieu est grand et puissant. Nous avons vu des choses très étranges et spéciales se produire aujourd’hui.'
  - type: heading
    content: Jésus demande à Lévi de le suivre
  '27':
  - type: text
    content: 'Après cela, Jésus est allé en promenade. Il a vu un homme qui percevait l’argent des taxes pour l’État. Son nom était Lévi. Il travaillait dans son bureau. Jésus lui a dit : Suis‑moi. '
  '28':
  - type: text
    content: Lévi s’est levé et l’a suivi. Il a tout laissé derrière.
  '29':
  - type: text
    content: 'Peu après, Lévi a offert un grand repas à Jésus dans sa maison. Beaucoup de gens sont aussi venus. Ils mangeaient avec eux. Beaucoup de ces gens avaient le travail de percevoir l’argent des taxes pour l’État. '
  '3':
  - type: text
    content: L’un de petits bateaux appartenait à Simon. Alors Jésus est monté dans le petit bateau de Simon. Il a ensuite demandé à Simon d’éloigner un peu son petit bateau au bord du lac. Quand Jésus était assis dans le petit bateau, il a commencé à enseigner de nouveau le peuple.
  '30':
  - type: text
    content: 'Certains '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et enseignants de la loi de Dieu les ont vus. Ils n’aimaient pas ces gens. Donc, ils ont parlé aux hommes qui suivaient Jésus : Vous mangez et vous buvez avec ce mauvais peuple. Ce n’est pas correct. Certains d’entre eux perçoivent même l’argent des taxes.'
  '31':
  - type: text
    content: 'Jésus leur a répondu : Les gens qui sont bien n’ont pas besoin d’un médecin. Ce sont des gens malades qui ont besoin d’un médecin. '
  '32':
  - type: text
    content: Je ne suis pas venu pour de bonnes personnes. Certaines personnes savent qu’elles avaient fait de mauvaises choses. Je demande à ces gens de venir à moi. Je veux qu’ils cessent de faire de mauvaises choses. Je veux qu’ils commencent à faire les choses correctement.
  '33':
  - type: text
    content: 'Quand ils ont entendu cela, ils ont demandé à Jésus une autre chose. Ils ont dit : Certaines personnes obéissent à ce que Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: ' enseigne. Ces gens arrêtent souvent de manger des aliments pour mieux prier. Les gens qui obéissent aux '
  - type: text
    content: Pharisiens
  - type: text
    content: ' font la même chose. Pourquoi ceux qui t’obéissent ne mangent pas parfois pour mieux prier ?'
  '34':
  - type: text
    content: 'Jésus a utilisé une histoire pour répondre à leur question. Quand un homme se marie, il offre un grand repas. Alors ses amis mangent. '
  '35':
  - type: text
    content: Mais le temps viendra où les gens vont l’éloigner de ses amis. Alors, ses amis ne vont pas non plus manger.
  '36':
  - type: text
    content: 'Alors Jésus leur a dit cet autre exemple : Vous ne déchirez pas un morceau de tissu à partir d’un nouveau vêtement pour réparer un vieux. Si vous faites cela, vous allez déchirer le nouveau vêtement. En plus, le nouveau morceau de tissu ne semble pas être le même que le tissu de l’ancien vêtement.'
  '37':
  - type: text
    content: 'Personne ne verse un nouveau vin dans une vieille '
  - type: text
    content: outre
  - type: text
    content: '. Si les gens font cela, le vin nouveau va casser la vieille '
  - type: text
    content: outre
  - type: text
    content: '. Le vin va se répandre et ils vont le perdre. Et ils vont détruire la bouteille. '
  '38':
  - type: text
    content: 'Au lieu de cela, les gens doivent mettre du vin nouveau dans une nouvelle '
  - type: text
    content: outre
  - type: text
    content: .
  '39':
  - type: text
    content: 'Et puis, personne ne veut le vin nouveau après avoir bu du vin vieux. Il dit : Le vieux vin est beaucoup mieux.'
  '4':
  - type: text
    content: 'Quand il a fini de les enseigner, il a dit à Simon : Amène maintenant le petit bateau dans les eaux profondes. Ensuite, jette les filets dans l’eau pour attraper des poissons.'
  '5':
  - type: text
    content: 'Simon a répondu : '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous avons travaillé toute la nuit dernière et nous n’avons rien eu. Mais parce que tu le dis, je vais jeter les filets.'
  '6':
  - type: text
    content: 'Alors ils sont allés et ils ont jeté les filets dans l’eau. Quand ils l’ont fait, ils ont pris beaucoup de poissons. Il y avait tellement de poissons que les filets commençaient à s’abîmer. '
  '7':
  - type: text
    content: 'Alors Simon criait aux autres pêcheurs qui travaillaient toujours avec lui. Il disait : Venez, nous avons besoin de vous. Quand les autres ont vu cela, ils sont venus dans leur petit bateau. Alors, ils ont rempli les 2 petits bateaux avec des poissons. Il y avait tellement de poissons que les petits bateaux descendaient dans l’eau. '
  '8':
  - type: text
    content: 'Lorsque Simon a vu tous les poissons, il s’est mis à genoux devant Jésus. Il avait peur. Il a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', je suis un homme mauvais. Alors s’il te plaît, laisse‑moi. '
  '9':
  - type: text
    content: 'Simon disait cela, parce qu’il était très surpris. Il était très surpris parce qu’ils avaient pris beaucoup de poissons. Ses amis de l’autre petit bateau étaient aussi très surpris. '
