document_id: LUK.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Jean‑Baptiste prépare les gens à accueillir Jésus
  - type: text
    content: 'Ce récit sur Jean, fils de Zacharie a commencé quand Tibère '
  - type: text
    content: César
  - type: text
    content: ' dirigeait le monde '
  - type: text
    content: romain
  - type: text
    content: '. Il avait régné pendant près de 15 ans. Ponce Pilate dirigeait la Judée. Et Hérode dirigeait la Galilée. Philippe était le frère d’Hérode. Il dirigeait l’Iturée et la Trachonite. Lysanias dirigeait l’Abilène. '
  '10':
  - type: text
    content: 'La foule a demandé : Alors, que devons‑nous faire ?'
  '11':
  - type: text
    content: 'Jean leur a dit : Si vous avez 2 chemises, gardez une à part. Donnez une à un homme qui n’a pas de chemise.'
  - type: text
    content: Si vous avez un peu de nourriture, mettez une partie à part. Donnez un peu à une personne qui n’a pas de nourriture.
  '12':
  - type: text
    content: 'Dans la foule, certains hommes avaient le travail de percevoir l’argent des taxes pour l’État. Ces hommes voulaient aussi que Jean les baptise. Ils ont demandé : Maître, que devons‑nous faire ? '
  '13':
  - type: text
    content: 'Jean leur a dit ceci : Vous devez prendre l’argent du peuple normalement. Vous ne devez pas prendre plus que ce que les règles disent.'
  '14':
  - type: text
    content: 'Alors quelques soldats parlaient : Et nous ? Que devrions‑nous faire ? Jean a répondu : Ne privez pas les gens de leur argent. Ne dites pas qu’une personne a fait quelque chose de mal, si elle n’a pas fait. Il est faux de gagner de l’argent en faisant cela. Et vous devez être heureux seulement de l’argent que vous obtenez de votre travail.'
  '15':
  - type: text
    content: 'Les gens pensaient : Est‑ce que Jean est le '
  - type: text
    content: Messie
  - type: text
    content: '  ? Est‑il l’homme que Dieu envoie pour sauver Israël ? Ils espéraient tous qu’il pourrait être comme ils pensaient. '
  '16':
  - type: text
    content: 'Jean savait ce qu’ils pensaient. Il a dit : Je vous ai baptisés avec de l’eau seulement. Mais quelqu’un d’autre vient baptiser les gens. Il est beaucoup plus grand et plus important que moi. Il est tellement important que je ne suis même pas assez bon pour défaire ses souliers. Il baptisera certains d’entre vous avec le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' et le feu. '
  '17':
  - type: text
    content: Pensez à un agriculteur qui apporte du blé dans la maison. Puis il utilise un outil pour séparer les graines de ce qui reste. Il stocke toutes les graines. Mais il brûle tout ce qui reste. Cet homme sera comme cela. Il viendra très bientôt. Il gardera bien de bonnes personnes. Mais il va punir de mauvaises personnes dans le feu que personne ne peut éteindre.
  '18':
  - type: text
    content: 'Jean disait beaucoup d’autres choses aux gens. Il leur disait la Bonne Nouvelle sur la façon dont Dieu pourra changer leurs vies. '
  '19':
  - type: text
    content: 'Mais le chef Hérode avait arrêté Jean. Jean disait à Hérode qu’il avait mal fait d’épouser Hérodias. Elle était l’épouse de son frère. Jean disait aussi : Hérode avait fait beaucoup d’autres mauvaises choses.'
  '2':
  - type: text
    content: 'Bien que ces hommes étaient au pouvoir, les grands '
  - type: text
    content: prêtres
  - type: text
    content: ' étaient Anne et Caïphe. A cette époque, Jean, fils de Zacharie vivait dans le '
  - type: text
    content: désert
  - type: text
    content: . Il entendait Dieu lui parler.
  '20':
  - type: text
    content: Alors Hérode a fait une chose encore pire. Il a mis Jean en prison.
  - type: heading
    content: Jean baptise Jésus
  '21':
  - type: text
    content: 'Alors que Jean baptisait tout le peuple, il a aussi baptisé Jésus. Quand Jésus était en prière, le '
  - type: text
    content: ciel
  - type: text
    content: ' s’est ouvert. '
  '22':
  - type: text
    content: 'Puis le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' est descendu. Il semblait être comme un oiseau qu’on appelle colombe. Cet oiseau est venu et il s’est posé sur Jésus. Les gens ont entendu une voix du '
  - type: text
    content: ciel
  - type: text
    content: '. Cette voix disait ceci : Tu es mon Fils. Je t’aime. Tu me rends vraiment heureux.'
  - type: heading
    content: La famille de Jésus
  '23':
  - type: text
    content: Jésus avait environ 30 ans quand il a commencé à dire la Bonne Nouvelle. Les gens pensaient qu’il était le fils de Joseph.
  - type: text
    content: Joseph était le fils d’Héli,
  '24':
  - type: text
    content: Héli était le fils de Matthat,
  - type: text
    content: Matthat était le fils de Lévi,
  - type: text
    content: Lévi était le fils de Melchi,
  - type: text
    content: Melchi était le fils de Jannaï,
  - type: text
    content: Jannaï était le fils de Joseph,
  '25':
  - type: text
    content: Joseph était le fils de Mattathias,
  - type: text
    content: Mattathias était le fils d’Amos,
  - type: text
    content: Amos était le fils de Nahum,
  - type: text
    content: Nahum était le fils d’Esli,
  - type: text
    content: Esli était le fils de Naggaï,
  '26':
  - type: text
    content: Naggaï était le fils de Maath,
  - type: text
    content: Maath était le fils de Mattathias,
  - type: text
    content: Mattathias était le fils de Sémeï,
  - type: text
    content: Sémeï était le fils de Josech,
  - type: text
    content: Josech était le fils de Joda,
  '27':
  - type: text
    content: Joda était le fils de Joanan,
  - type: text
    content: Joanan était le fils de Rhésa,
  - type: text
    content: Rhésa était le fils de Zorobabel,
  - type: text
    content: Zorobabel était le fils de Salathiel,
  - type: text
    content: Salathiel était le fils de Néri,
  '28':
  - type: text
    content: Néri était le fils de Melchi,
  - type: text
    content: Melchi était le fils d’Addi,
  - type: text
    content: Addi était le fils de Kosam,
  - type: text
    content: Kosam était le fils d’Elmadam,
  - type: text
    content: Elmadam était le fils d’Er,
  '29':
  - type: text
    content: Er était le fils de Jésus,
  - type: text
    content: Jésus était le fils d’Eliézer,
  - type: text
    content: Eliézer était le fils de Jorim,
  - type: text
    content: Jorim était le fils de Matthat,
  - type: text
    content: Matthat était le fils de Lévi,
  '3':
  - type: text
    content: Jean‑
  - type: text
    content: Baptiste
  - type: text
    content: ' allait dans de nombreux endroits près du fleuve Jourdain. Il disait aux gens ceci : Vous avez fait beaucoup de mauvaises choses, soyez tristes et laissez vos mauvais comportements. Ensuite, Dieu vous pardonnera et je vais vous baptiser avec de l’eau.'
  '30':
  - type: text
    content: Lévi était le fils de Siméon,
  - type: text
    content: Siméon était le fils de Juda,
  - type: text
    content: Juda était le fils de Joseph,
  - type: text
    content: Joseph était le fils de Jonam,
  - type: text
    content: Jonam était le fils d’Éliakim,
  '31':
  - type: text
    content: Éliakim était le fils de Méléa,
  - type: text
    content: Méléa était le fils de Menna,
  - type: text
    content: Menna était le fils de Mattatha,
  - type: text
    content: Mattatha était le fils de Nathan,
  - type: text
    content: Nathan était le fils de David,
  '32':
  - type: text
    content: David était le fils d’Isaï,
  - type: text
    content: Isaï était le fils de Jobed,
  - type: text
    content: Jobed était le fils de Booz,
  - type: text
    content: Booz était le fils de Salmon,
  - type: text
    content: Salmon était le fils de Naasson,
  '33':
  - type: text
    content: Naasson était le fils d’Aminadab,
  - type: text
    content: Aminadab était le fils d’Admin,
  - type: text
    content: Admin était le fils d’Arni,
  - type: text
    content: Arni était le fils d’Esrom,
  - type: text
    content: Esrom était le fils de Pérets,
  '34':
  - type: text
    content: Pérets était le fils de Jacob,
  - type: text
    content: Jacob était le fils d’Isaac,
  - type: text
    content: Isaac était le fils d’Abraham,
  - type: text
    content: Abraham était le fils de Thara,
  - type: text
    content: Thara était le fils de Nachor,
  '35':
  - type: text
    content: Nachor était le fils de Seruch,
  - type: text
    content: Seruch était le fils de Ragau,
  - type: text
    content: Ragau était le fils de Phalek,
  - type: text
    content: Phalek était le fils d’Eber,
  - type: text
    content: Eber était le fils de Sala,
  '36':
  - type: text
    content: Sala était le fils de Kaïnan,
  - type: text
    content: Kaïnan était le fils d’Arpacschad,
  - type: text
    content: Arpacschad était le fils de Sem,
  - type: text
    content: Sem était le fils de Noé,
  - type: text
    content: Noé était le fils de Lamech,
  '37':
  - type: text
    content: Lamech était le fils de Mathusala,
  - type: text
    content: Mathusala était le fils d’Hénoc,
  - type: text
    content: Hénoc était le fils de Jared,
  - type: text
    content: Jared était le fils de Maléléel,
  - type: text
    content: Maléléel était le fils de Kaïnan,
  '38':
  - type: text
    content: Kaïnan était le fils d’Enos,
  - type: text
    content: Enos était le fils de Seth,
  - type: text
    content: Seth était le fils d’Adam,
  - type: text
    content: Adam, le fils de Dieu.
  '4':
  - type: text
    content: 'Jean disait aux gens ce message de Dieu que le prophète Ésaïe avait écrit dans son livre : Le Seigneur viendra bientôt. Donc, préparez le chemin sur lequel il va passer. Arrangez bien ses sentiers.'
  '5':
  - type: text
    content: Remplissez chaque vallée et faites toutes les montagnes plates.
  - type: text
    content: Ôtez chaque courbe de sorte que le chemin soit droit.
  - type: text
    content: 'Enlevez tous les '
  - type: text
    content: rochers
  - type: text
    content: ' de sorte que le chemin soit droit.'
  '6':
  - type: text
    content: Ensuite, toute personne verra comment Dieu la sauvera.
  '7':
  - type: text
    content: 'Des foules de gens allaient au '
  - type: text
    content: désert
  - type: text
    content: ' pour entendre les paroles de Jean. Ils voulaient que Jean les baptise. Il disait : Dieu va bientôt punir les gens qui font de mauvaises choses. Mais vous êtes aussi dangereux que les serpents. '
  '8':
  - type: text
    content: 'Vous devez montrer que vous êtes tristes. Vous devez le montrer par la façon dont vous vivez. Arrêtez de faire les choses que Dieu n’aime pas. Ne commencez pas à dire à vous‑mêmes : Dieu ne nous punira pas. Après tout, nous faisons partie de la famille d’Abraham. Ecoutez ! Dieu peut faire de ces pierres des enfants à Abraham ! '
  '9':
  - type: text
    content: Vous êtes comme des arbres qui ont de mauvais fruits. Les gens coupent de mauvais arbres et ils les jettent dans le feu. De la même façon, Dieu punira de mauvaises personnes. Et il va le faire très bientôt.
