  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' allait dans de nombreux endroits près du fleuve Jourdain. Il disait aux gens ceci : Vous avez fait beaucoup de mauvaises choses, soyez tristes et laissez vos mauvais comportements. Ensuite, Dieu vous pardonnera et je vais vous baptiser avec de l’eau.'
