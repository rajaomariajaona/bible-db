document_id: LUK.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jean‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: ' prépare les gens à accueillir Jésus'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce récit sur Jean, fils de Zacharie a commencé quand Tibère '
    - type: usfm
      marker: w
      children:
      - type: text
        text: César
    - type: text
      text: ' dirigeait le monde '
    - type: usfm
      marker: w
      children:
      - type: text
        text: romain
    - type: text
      text: '. Il avait régné pendant près de 15 ans. Ponce Pilate dirigeait la Judée. Et Hérode dirigeait la Galilée. Philippe était le frère d’Hérode. Il dirigeait l’Iturée et la Trachonite. Lysanias dirigeait l’Abilène. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule a demandé : Alors, que devons‑nous faire ?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean leur a dit : Si vous avez 2 chemises, gardez une à part. Donnez une à un homme qui n’a pas de chemise.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous avez un peu de nourriture, mettez une partie à part. Donnez un peu à une personne qui n’a pas de nourriture.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la foule, certains hommes avaient le travail de percevoir l’argent des taxes pour l’État. Ces hommes voulaient aussi que Jean les baptise. Ils ont demandé : Maître, que devons‑nous faire ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean leur a dit ceci : Vous devez prendre l’argent du peuple normalement. Vous ne devez pas prendre plus que ce que les règles disent.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors quelques soldats parlaient : Et nous ? Que devrions‑nous faire ? Jean a répondu : Ne privez pas les gens de leur argent. Ne dites pas qu’une personne a fait quelque chose de mal, si elle n’a pas fait. Il est faux de gagner de l’argent en faisant cela. Et vous devez être heureux seulement de l’argent que vous obtenez de votre travail.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens pensaient : Est‑ce que Jean est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: '  ? Est‑il l’homme que Dieu envoie pour sauver Israël ? Ils espéraient tous qu’il pourrait être comme ils pensaient. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean savait ce qu’ils pensaient. Il a dit : Je vous ai baptisés avec de l’eau seulement. Mais quelqu’un d’autre vient baptiser les gens. Il est beaucoup plus grand et plus important que moi. Il est tellement important que je ne suis même pas assez bon pour défaire ses souliers. Il baptisera certains d’entre vous avec le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' et le feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pensez à un agriculteur qui apporte du blé dans la maison. Puis il utilise un outil pour séparer les graines de ce qui reste. Il stocke toutes les graines. Mais il brûle tout ce qui reste. Cet homme sera comme cela. Il viendra très bientôt. Il gardera bien de bonnes personnes. Mais il va punir de mauvaises personnes dans le feu que personne ne peut éteindre.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean disait beaucoup d’autres choses aux gens. Il leur disait la Bonne Nouvelle sur la façon dont Dieu pourra changer leurs vies. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le chef Hérode avait arrêté Jean. Jean disait à Hérode qu’il avait mal fait d’épouser Hérodias. Elle était l’épouse de son frère. Jean disait aussi : Hérode avait fait beaucoup d’autres mauvaises choses.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien que ces hommes étaient au pouvoir, les grands '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' étaient Anne et Caïphe. A cette époque, Jean, fils de Zacharie vivait dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: . Il entendait Dieu lui parler.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Hérode a fait une chose encore pire. Il a mis Jean en prison.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jean baptise Jésus
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors que Jean baptisait tout le peuple, il a aussi baptisé Jésus. Quand Jésus était en prière, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' s’est ouvert. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' est descendu. Il semblait être comme un oiseau qu’on appelle colombe. Cet oiseau est venu et il s’est posé sur Jésus. Les gens ont entendu une voix du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Cette voix disait ceci : Tu es mon Fils. Je t’aime. Tu me rends vraiment heureux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La famille de Jésus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus avait environ 30 ans quand il a commencé à dire la Bonne Nouvelle. Les gens pensaient qu’il était le fils de Joseph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joseph était le fils d’Héli,
