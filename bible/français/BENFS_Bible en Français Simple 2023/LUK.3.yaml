  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean disait aux gens ce message de Dieu que le prophète Ésaïe avait écrit dans son livre : Le Seigneur viendra bientôt. Donc, préparez le chemin sur lequel il va passer. Arrangez bien ses sentiers.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remplissez chaque vallée et faites toutes les montagnes plates.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ôtez chaque courbe de sorte que le chemin soit droit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Enlevez tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: rochers
    - type: text
      text: ' de sorte que le chemin soit droit.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ensuite, toute personne verra comment Dieu la sauvera.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des foules de gens allaient au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' pour entendre les paroles de Jean. Ils voulaient que Jean les baptise. Il disait : Dieu va bientôt punir les gens qui font de mauvaises choses. Mais vous êtes aussi dangereux que les serpents. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous devez montrer que vous êtes tristes. Vous devez le montrer par la façon dont vous vivez. Arrêtez de faire les choses que Dieu n’aime pas. Ne commencez pas à dire à vous‑mêmes : Dieu ne nous punira pas. Après tout, nous faisons partie de la famille d’Abraham. Ecoutez ! Dieu peut faire de ces pierres des enfants à Abraham ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous êtes comme des arbres qui ont de mauvais fruits. Les gens coupent de mauvais arbres et ils les jettent dans le feu. De la même façon, Dieu punira de mauvaises personnes. Et il va le faire très bientôt.
