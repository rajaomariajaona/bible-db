document_id: ACT.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce qui est arrivé à l’homme avec les jambes faibles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour, Pierre et Jean sont allés au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' à Jérusalem. C’était à 15 heures. C’était le temps que chacun allait là prier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y avait un homme qui ne pouvait pas marcher. Il n’avait jamais marché. Chaque jour, on le mettait devant la porte du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. On l’appelait la belle porte. Pendant que les gens passaient par la porte du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ', l’homme leur demandait de l’argent. Pierre et Jean venaient entrer au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Pendant ce temps, l’homme était assis devant la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis l’homme a vu Pierre et Jean. Ils venaient à la porte. Ainsi il leur a demandé de lui donner une certaine somme d’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pierre et Jean ont regardé le visage de l’homme. Et Pierre lui a dit : Regarde‑nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ainsi l’homme regardait Pierre et Jean. Il pensait qu’ils allaient lui donner une certaine somme d’argent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors Pierre a dit à l’homme : Je n’ai rien comme argent ni or. Mais j’ai autre chose que je te donnerai. Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de Nazareth m’a donné le pouvoir de faire ceci. Ainsi je te commande de marcher ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pierre a alors tenu la main droite de cet homme pour l’aider à se lever. Immédiatement les pieds et les chevilles de l’homme sont devenus forts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi l’homme a sauté et il s’est tenu debout. Alors il a commencé à marcher. Il est entré dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Il était avec Pierre et Jean. Il marchait et sautait. Et il disait à Dieu : Toi Dieu, tu es très puissant et bon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Beaucoup de gens étaient avec Pierre et Jean. Ils voyaient l’homme marcher. Et ils l’entendaient dire de bonnes choses au sujet de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils disaient : Nous connaissons cet homme. Il s’asseyait habituellement à la belle porte. Il avait des jambes faibles. Il demandait de l’argent aux gens. Ils se disaient les uns aux autres : Qu’est‑ce qui s’est produit ? Cet homme peut maintenant marcher ! Les gens étaient tous très étonnés.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Pierre parle à la foule dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’homme tenait toujours Pierre et Jean pendant qu’ils allaient au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: portique de Salomon
  - type: text
    text: '. Et les gens étaient très étonnés au sujet de ce qu’ils voyaient. Ainsi ils couraient vers eux là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Pierre les a vus, il leur a dit : Hommes d’Israël, ceci ne doit pas vous surprendre. Ne nous regardez pas. Ne pensez pas que nous avons fait marcher cet homme par notre propre puissance et bonté !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus était le serviteur spécial de Dieu. Nos ancêtres Abraham, Isaac, Jacob et d’autres personnes priaient ce même Dieu, il y a bien longtemps. Dieu a donné son pouvoir à Jésus et l’a rendu puissant. Il a prouvé aux gens que Jésus était une personne très grande et importante. Vous avez livré Jésus à Pilate. Vous avez aussi dit du mal contre lui devant Pilate. Vous lui avez demandé de faire tuer Jésus. Pilate n’a trouvé aucun mal en Jésus. Il voulait le libérer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Oui, il était saint et bon. Mais vous l’avez rejeté. Il y avait un homme qui avait tué quelqu’un. Vous avez demandé à Pilate de libérer cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors vous avez demandé à Pilate de tuer Jésus. Mais Dieu a fait devenir Jésus vivant encore. Il est la personne qui mène des personnes à la vraie vie. Nous avons revu nous‑mêmes Jésus vivant après sa mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maintenant, vous savez que cet homme ici avait les jambes faibles. Mais Jésus est puissant. Le pouvoir de Jésus a fait devenir les jambes de l’homme fortes. Ceci s’est vraiment réalisé, parce que Jésus est puissant. Vous pouvez voir cela. Cet homme a cru que Jésus pourra faire devenir ses jambes fortes. Ainsi Jésus l’a guéri. Et vous voyez vous‑mêmes qu’il marche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Frères, écoutez ce que je dis maintenant : A ce moment‑là, vous et vos chefs, vous n’avez pas compris ce que vous faisiez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', la personne spéciale que Dieu avait envoyée au monde. Il y a longtemps, beaucoup d’hommes disaient les paroles de Dieu au sujet de lui. Ils disaient aux gens ce qui arrivera à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. De mauvaises personnes feront du mal à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', et il aura beaucoup de douleur. Dieu a accompli ceci. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi vous devez vous montrer tristes à Dieu pour toutes les mauvaises choses que vous faisiez. Vous devez dire que vous obéirez à Dieu. Alors Dieu pardonnera toutes vos mauvaises choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sera près de vous et il rendra vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' forts. Dieu a déjà choisi Jésus pour vous. Il est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', le serviteur spécial de Dieu, et Dieu l’enverra de nouveau à vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus doit rester au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' jusqu’à un certain moment. Alors Dieu remettra toutes les choses comme elles devraient être. Dieu avait promis ceci depuis longtemps. Dieu l’avait promis par ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse avait dit au peuple ceci : Dieu m’a envoyé à vous. Il enverra également un autre homme plus tard. Cet homme sera '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' comme moi. Il viendra de votre propre peuple. Vous devez écouter tout ce qu’il vous dira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toute personne qui n’écoute pas ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' doit quitter le peuple de Dieu pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dieu a donné ce même message à Samuel, il y a beaucoup d’années. Dieu l’a alors donné à beaucoup d’autres hommes qui sont venus après Samuel. Et ils nous ont tous dit ce qui se réalisera en ce temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les hommes disaient aux gens les paroles de Dieu. Ils disaient au sujet des promesses de Dieu. Dieu a promis ces choses à vos ancêtres, mais vous êtes également inclus dans ses promesses. Dieu a dit à Abraham : Par ta famille, je ferai une bonne chose pour tous les gens sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dieu a choisi son serviteur. Dieu vous l’a envoyé d’abord. Il l’a envoyé pour vous bénir. Il vous bénira comme ceci : il aidera chacun de vous à laisser les mauvaises choses.'
