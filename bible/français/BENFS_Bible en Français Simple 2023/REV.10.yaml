document_id: REV.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: heading
    content: L’ange fort et le petit livre
  - type: text
    content: 'Puis j’ai vu un autre '
  - type: text
    content: ange
  - type: text
    content: ' fort. Il descendait du '
  - type: text
    content: ciel
  - type: text
    content: '. Il avait un nuage tout autour de lui, comme ses vêtements. Il y avait un arc‑en‑ciel au‑dessus de sa tête. Son visage était comme le soleil et ses jambes brillaient comme le feu. '
  '10':
  - type: text
    content: J’ai donc pris le petit livre de la main de l’
  - type: text
    content: ange
  - type: text
    content: ' et je l’ai mangé. C’était aussi doux que du miel dans ma bouche. Mais quand j’ai mangé le livre, ça m’a fait mal au ventre. '
  '11':
  - type: text
    content: 'Puis on m’a dit : Tu dois continuer à dire le message de Dieu aux gens. Tu dois dire ce qui arrivera aux gens de partout dans le monde. Ce sont les gens de nombreux pays, et ceux qui parlent plusieurs langues, et aussi leurs rois.'
  '2':
  - type: text
    content: 'Il avait un petit livre à la main et il était ouvert. Il a mis son pied droit sur la mer et il a mis son pied gauche sur la terre. '
  '3':
  - type: text
    content: 'Puis il criait d’une voix forte comme le son d’un lion. Quand il criait, 7 voix fortes lui ont répondu. Elles étaient comme le bruit du '
  - type: text
    content: tonnerre
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Lorsque les 7 voix du '
  - type: text
    content: tonnerre
  - type: text
    content: ' ont parlé, j’étais prêt à écrire. Mais j’ai entendu une voix venir du '
  - type: text
    content: ciel
  - type: text
    content: '. La voix m’a dit : Garde secret ce que les 7 voix du '
  - type: text
    content: tonnerre
  - type: text
    content: ' ont dit. Ne l’écris pas.'
  '5':
  - type: text
    content: Puis j’ai regardé de nouveau l’
  - type: text
    content: ange
  - type: text
    content: ' qui se tenait avec un pied sur la mer et son autre pied sur la terre. Il a levé sa main droite vers le '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Il a fait une forte promesse par le nom de Dieu. C’est lui qui vit pour toujours. Il a fait le '
  - type: text
    content: ciel
  - type: text
    content: ' et la terre et la mer et il a fait tout ce qui est en eux. L’'
  - type: text
    content: ange
  - type: text
    content: ' a promis que Dieu n’attendra plus. '
  '7':
  - type: text
    content: 'Il a dit : Le temps viendra bientôt où le septième '
  - type: text
    content: ange
  - type: text
    content: ' va sonner la trompette. Alors Dieu finira rapidement ce qu’il veut faire. Cela a été un secret, mais il l’a dit il y a longtemps aux '
  - type: text
    content: prophètes
  - type: text
    content: ' qui étaient ses serviteurs.'
  '8':
  - type: text
    content: 'Puis j’ai entendu de nouveau la voix qui me parlait du '
  - type: text
    content: ciel
  - type: text
    content: '. Elle disait : Va vers l’'
  - type: text
    content: ange
  - type: text
    content: ' qui se tient avec un pied sur la mer et son autre pied sur la terre. Va prendre le livre qui est ouvert dans sa main. '
  '9':
  - type: text
    content: Je suis donc allé vers l’
  - type: text
    content: ange
  - type: text
    content: '. Je lui ai demandé de me donner le petit livre. Il m’a dit : Prends le livre et mange‑le. Il sera très doux comme du miel dans la bouche. Mais ça te fera mal à l’estomac comme de la mauvaise nourriture. '
