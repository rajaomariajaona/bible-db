document_id: REV.10,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 10
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' fort et le petit livre'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Puis j’ai vu un autre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' fort. Il descendait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il avait un nuage tout autour de lui, comme ses vêtements. Il y avait un arc‑en‑ciel au‑dessus de sa tête. Son visage était comme le soleil et ses jambes brillaient comme le feu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: J’ai donc pris le petit livre de la main de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' et je l’ai mangé. C’était aussi doux que du miel dans ma bouche. Mais quand j’ai mangé le livre, ça m’a fait mal au ventre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis on m’a dit : Tu dois continuer à dire le message de Dieu aux gens. Tu dois dire ce qui arrivera aux gens de partout dans le monde. Ce sont les gens de nombreux pays, et ceux qui parlent plusieurs langues, et aussi leurs rois.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il avait un petit livre à la main et il était ouvert. Il a mis son pied droit sur la mer et il a mis son pied gauche sur la terre. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Puis il criait d’une voix forte comme le son d’un lion. Quand il criait, 7 voix fortes lui ont répondu. Elles étaient comme le bruit du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tonnerre
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsque les 7 voix du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tonnerre
    - type: text
      text: ' ont parlé, j’étais prêt à écrire. Mais j’ai entendu une voix venir du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. La voix m’a dit : Garde secret ce que les 7 voix du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: tonnerre
    - type: text
      text: ' ont dit. Ne l’écris pas.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Puis j’ai regardé de nouveau l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui se tenait avec un pied sur la mer et son autre pied sur la terre. Il a levé sa main droite vers le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il a fait une forte promesse par le nom de Dieu. C’est lui qui vit pour toujours. Il a fait le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et la terre et la mer et il a fait tout ce qui est en eux. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' a promis que Dieu n’attendra plus. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il a dit : Le temps viendra bientôt où le septième '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' va sonner la trompette. Alors Dieu finira rapidement ce qu’il veut faire. Cela a été un secret, mais il l’a dit il y a longtemps aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' qui étaient ses serviteurs.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Puis j’ai entendu de nouveau la voix qui me parlait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Elle disait : Va vers l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui se tient avec un pied sur la mer et son autre pied sur la terre. Va prendre le livre qui est ouvert dans sa main. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Je suis donc allé vers l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: '. Je lui ai demandé de me donner le petit livre. Il m’a dit : Prends le livre et mange‑le. Il sera très doux comme du miel dans la bouche. Mais ça te fera mal à l’estomac comme de la mauvaise nourriture. '
