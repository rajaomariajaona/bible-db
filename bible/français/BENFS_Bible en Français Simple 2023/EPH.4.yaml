document_id: EPH.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Le peuple de Dieu doit continuer d’être uni
  - type: text
    content: 'Donc, moi, je suis en prison pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Je vous demande quelque chose de fort. Dieu vous a choisis d’être son propre peuple. Donc, je vous demande de vivre comme le peuple de Dieu devrait vivre. '
  '10':
  - type: text
    content: Ainsi, l’homme qui est descendu est aussi monté. Le même homme est monté au‑dessus de tous les cieux, afin qu’il soit en mesure de remplir toutes choses.
  '11':
  - type: text
    content: 'C’était le '
  - type: text
    content: Christ
  - type: text
    content: ' qui a donné à une partie de son peuple le don d’être des '
  - type: text
    content: apôtres
  - type: text
    content: ' et les dirigeants en son nom. Il a donné à certaines personnes le don de parler des messages de lui. Il a donné à certaines personnes le don d’amener d’autres personnes à lui‑même. Il a donné à certaines personnes le don d’être pasteurs (responsables qui aident les gens de '
  - type: text
    content: Christ
  - type: text
    content: ' à le suivre) et les enseignants. '
  '12':
  - type: text
    content: 'Il a donné tous ces dons pour préparer le peuple de Dieu. La raison est qu’il puisse travailler ensemble comme ses serviteurs. Ainsi donc, le corps de '
  - type: text
    content: Christ
  - type: text
    content: ' grandira et deviendra plus fort. '
  '13':
  - type: text
    content: 'De cette façon, nous allons tous devenir complètement unis parce que nous croyons au Fils de Dieu. Ainsi, nous serons comme un homme qui a grandi à l’image de '
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même.'
  '14':
  - type: text
    content: 'Alors nous ne serons plus des enfants. Des gens intelligents peuvent essayer de nous faire croire aux choses qui ne sont pas vraies. Ils peuvent enseigner différentes sortes d’idées, de nous troubler. Mais nous ne serons pas comme des enfants, qui sont faciles à troubler. Nous ne laisserons pas ces différentes idées changer notre '
  - type: text
    content: foi
  - type: text
    content: .
  '15':
  - type: text
    content: 'Mais, il faut dire le vrai message, parce que nous aimons les gens. Et, en conséquence, nous allons grandir en toutes choses dans le '
  - type: text
    content: Christ
  - type: text
    content: ', qui est le chef. '
  '16':
  - type: text
    content: Il détient tout le corps ensemble. Il unit toutes les parties ensemble pour rendre le corps solide. Alors chaque partie séparée peut fonctionner comme elle devrait fonctionner. Et, par conséquent, l’ensemble du corps se développe et se fait plus fort par l’amour.
  - type: heading
    content: Ayez une vie nouvelle en Christ
  '17':
  - type: text
    content: 'Alors, je dis cela pour vous. Je suis sûr que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' veut que je le dise. Vous ne devez plus vivre comme les gens qui ne connaissent pas Dieu. Ils font des choses comme ils veulent, selon leurs propres mauvaises pensées.'
  '18':
  - type: text
    content: 'Ils ne peuvent pas comprendre, parce que leurs '
  - type: text
    content: esprits
  - type: text
    content: ' sont dans l’obscurité. Ils sont étrangers à la vie que Dieu donne. Ils ne le connaissent pas, parce qu’ils ont des cœurs durs. Donc, ils refusent Dieu. '
  '19':
  - type: text
    content: Ils ne savent pas la différence entre ce qui est bon ou mauvais. Ils se sont donnés à faire toutes sortes de choses mauvaises et sales. Et ils veulent beaucoup faire ces choses de plus en plus.
  '2':
  - type: text
    content: 'Ne pensez pas que vous êtes meilleurs ou plus importants que d’autres personnes. Soyez toujours gentils et patients. Aimez‑vous, et ne devenez pas en colère les uns contre les autres rapidement. '
  '20':
  - type: text
    content: 'Mais vous n’avez pas appris de telles choses de '
  - type: text
    content: Christ
  - type: text
    content: '  !'
  '21':
  - type: text
    content: 'Et je suis sûr que vous avez entendu parler de lui. Je suis sûr que les gens vous ont appris le vrai message. Ils vous ont appris le vrai message qui est en Jésus. '
  '22':
  - type: text
    content: 'Donc, vous devez mettre de côté la personne que vous étiez. Cette vieille personne appartient à la façon dont vous viviez auparavant. Elle veut faire des choses qui ne sont pas vraiment bonnes. Et ces choses la détruisent. '
  '23':
  - type: text
    content: Que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous fasse penser à une vie complètement nouvelle.'
  '24':
  - type: text
    content: Vous devez vous revêtir de la nouvelle personne. Dieu l’a faite pour lui ressembler. Cette personne fait seulement ce qui est juste. Cette personne est vraiment et complètement bonne, comme Dieu.
  '25':
  - type: text
    content: Donc, vous devez arrêter de dire des choses qui ne sont pas vraies. Tout le monde doit parler seulement des choses vraies à toute autre personne. En effet, nous faisons tous partie du même corps.
  '26':
  - type: text
    content: 'Même si vous êtes en colère, évitez de faire quelque chose de mal. Ne continuez pas d’être en colère après le coucher du soleil. '
  '27':
  - type: text
    content: 'Ne donnez pas de place au '
  - type: text
    content: diable
  - type: text
    content: '. '
  '28':
  - type: text
    content: Toute personne qui volait les gens avant doit cesser de voler. Au lieu de cela, elle doit commencer à faire un travail honnête avec ses propres mains. Alors cette personne aura quelque chose à donner à toute personne qui est dans le besoin.
  '29':
  - type: text
    content: 'Ne dites pas tout ce qui est mauvais. Dites seulement de bonnes choses qui aideront les gens. Ainsi, vous les aiderez à être forts. Vous contribuerez à leur donner ce dont ils ont besoin. Et donc, vos paroles seront bonnes pour ceux qui les entendent. '
  '3':
  - type: text
    content: Faites de votre mieux pour laisser l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu vous garder unis comme des amis, sans aucun problème entre vous. '
  '30':
  - type: text
    content: Ne rendez pas l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu complètement triste. Il est comme une marque pour montrer certainement que vous appartenez à Dieu. Il montre que Dieu vous rendra complètement libre un jour. '
  '31':
  - type: text
    content: Ne vous mettez pas en colère contre les gens facilement. Ne devenez pas tellement en colère. Vous ne pourrez pas être bons envers les gens. Ne vous querellez pas. Ne vous battez pas. Ne criez pas à quelqu’un ou ne dites pas de mauvaises choses à leur sujet. Arrêtez de penser de mauvaises choses sur une personne.
  '32':
  - type: text
    content: 'Au contraire, soyez bons les uns envers les autres. Essayez de vous comprendre les uns les autres. Pardonnez‑vous les uns aux autres, tout comme Dieu vous a pardonné. Il vous a pardonné, parce que vous êtes unis avec le '
  - type: text
    content: Christ
  - type: text
    content: .
  '4':
  - type: text
    content: 'Il y a un corps et il y a un '
  - type: text
    content: Esprit
  - type: text
    content: . Dieu vous a choisis d’être son propre peuple. Chacun d’entre nous attend certainement pour les mêmes bonnes choses.
  '5':
  - type: text
    content: 'Il y a un '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il y a un véritable message auquel nous devons croire. Il y a un '
  - type: text
    content: baptême
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Il y a un Dieu, qui est le Père de nous tous. Il est au‑dessus de tous. Il travaille par tous, et il est en tout. '
  '7':
  - type: text
    content: Christ
  - type: text
    content: ' a donné des cadeaux spéciaux à chacun de nous, comme il l’a choisi. Il a fait chacun de nous capable de bien faire certaines choses. '
  '8':
  - type: text
    content: 'C’est la raison pour laquelle il est dit dans l’Ancien Testament :'
  - type: text
    content: Quand il est monté au plus haut endroit,
  - type: text
    content: Il a dirigé de nombreux prisonniers avec lui.
  - type: text
    content: Et il a fait des dons aux hommes.
  '9':
  - type: text
    content: 'Il dit : Il est monté. Donc, il faut dire que '
  - type: text
    content: Christ
  - type: text
    content: ' est venu d’abord en bas, vers les parties inférieures de la terre. '
