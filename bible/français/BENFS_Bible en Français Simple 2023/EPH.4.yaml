document_id: EPH.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le peuple de Dieu doit continuer d’être uni
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Donc, moi, je suis en prison pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Je vous demande quelque chose de fort. Dieu vous a choisis d’être son propre peuple. Donc, je vous demande de vivre comme le peuple de Dieu devrait vivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ne pensez pas que vous êtes meilleurs ou plus importants que d’autres personnes. Soyez toujours gentils et patients. Aimez‑vous, et ne devenez pas en colère les uns contre les autres rapidement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Faites de votre mieux pour laisser l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous garder unis comme des amis, sans aucun problème entre vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il y a un corps et il y a un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: . Dieu vous a choisis d’être son propre peuple. Chacun d’entre nous attend certainement pour les mêmes bonnes choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il y a un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il y a un véritable message auquel nous devons croire. Il y a un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: baptême
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il y a un Dieu, qui est le Père de nous tous. Il est au‑dessus de tous. Il travaille par tous, et il est en tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a donné des cadeaux spéciaux à chacun de nous, comme il l’a choisi. Il a fait chacun de nous capable de bien faire certaines choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est la raison pour laquelle il est dit dans l’Ancien Testament :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il est monté au plus haut endroit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a dirigé de nombreux prisonniers avec lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il a fait des dons aux hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit : Il est monté. Donc, il faut dire que '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est venu d’abord en bas, vers les parties inférieures de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ainsi, l’homme qui est descendu est aussi monté. Le même homme est monté au‑dessus de tous les cieux, afin qu’il soit en mesure de remplir toutes choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' qui a donné à une partie de son peuple le don d’être des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' et les dirigeants en son nom. Il a donné à certaines personnes le don de parler des messages de lui. Il a donné à certaines personnes le don d’amener d’autres personnes à lui‑même. Il a donné à certaines personnes le don d’être pasteurs (responsables qui aident les gens de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à le suivre) et les enseignants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il a donné tous ces dons pour préparer le peuple de Dieu. La raison est qu’il puisse travailler ensemble comme ses serviteurs. Ainsi donc, le corps de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' grandira et deviendra plus fort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De cette façon, nous allons tous devenir complètement unis parce que nous croyons au Fils de Dieu. Ainsi, nous serons comme un homme qui a grandi à l’image de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors nous ne serons plus des enfants. Des gens intelligents peuvent essayer de nous faire croire aux choses qui ne sont pas vraies. Ils peuvent enseigner différentes sortes d’idées, de nous troubler. Mais nous ne serons pas comme des enfants, qui sont faciles à troubler. Nous ne laisserons pas ces différentes idées changer notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais, il faut dire le vrai message, parce que nous aimons les gens. Et, en conséquence, nous allons grandir en toutes choses dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui est le chef. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il détient tout le corps ensemble. Il unit toutes les parties ensemble pour rendre le corps solide. Alors chaque partie séparée peut fonctionner comme elle devrait fonctionner. Et, par conséquent, l’ensemble du corps se développe et se fait plus fort par l’amour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Ayez une vie nouvelle en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors, je dis cela pour vous. Je suis sûr que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' veut que je le dise. Vous ne devez plus vivre comme les gens qui ne connaissent pas Dieu. Ils font des choses comme ils veulent, selon leurs propres mauvaises pensées.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils ne peuvent pas comprendre, parce que leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' sont dans l’obscurité. Ils sont étrangers à la vie que Dieu donne. Ils ne le connaissent pas, parce qu’ils ont des cœurs durs. Donc, ils refusent Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils ne savent pas la différence entre ce qui est bon ou mauvais. Ils se sont donnés à faire toutes sortes de choses mauvaises et sales. Et ils veulent beaucoup faire ces choses de plus en plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais vous n’avez pas appris de telles choses de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et je suis sûr que vous avez entendu parler de lui. Je suis sûr que les gens vous ont appris le vrai message. Ils vous ont appris le vrai message qui est en Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Donc, vous devez mettre de côté la personne que vous étiez. Cette vieille personne appartient à la façon dont vous viviez auparavant. Elle veut faire des choses qui ne sont pas vraiment bonnes. Et ces choses la détruisent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Que l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu vous fasse penser à une vie complètement nouvelle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Vous devez vous revêtir de la nouvelle personne. Dieu l’a faite pour lui ressembler. Cette personne fait seulement ce qui est juste. Cette personne est vraiment et complètement bonne, comme Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Donc, vous devez arrêter de dire des choses qui ne sont pas vraies. Tout le monde doit parler seulement des choses vraies à toute autre personne. En effet, nous faisons tous partie du même corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Même si vous êtes en colère, évitez de faire quelque chose de mal. Ne continuez pas d’être en colère après le coucher du soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ne donnez pas de place au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Toute personne qui volait les gens avant doit cesser de voler. Au lieu de cela, elle doit commencer à faire un travail honnête avec ses propres mains. Alors cette personne aura quelque chose à donner à toute personne qui est dans le besoin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ne dites pas tout ce qui est mauvais. Dites seulement de bonnes choses qui aideront les gens. Ainsi, vous les aiderez à être forts. Vous contribuerez à leur donner ce dont ils ont besoin. Et donc, vos paroles seront bonnes pour ceux qui les entendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ne rendez pas l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu complètement triste. Il est comme une marque pour montrer certainement que vous appartenez à Dieu. Il montre que Dieu vous rendra complètement libre un jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ne vous mettez pas en colère contre les gens facilement. Ne devenez pas tellement en colère. Vous ne pourrez pas être bons envers les gens. Ne vous querellez pas. Ne vous battez pas. Ne criez pas à quelqu’un ou ne dites pas de mauvaises choses à leur sujet. Arrêtez de penser de mauvaises choses sur une personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Au contraire, soyez bons les uns envers les autres. Essayez de vous comprendre les uns les autres. Pardonnez‑vous les uns aux autres, tout comme Dieu vous a pardonné. Il vous a pardonné, parce que vous êtes unis avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
