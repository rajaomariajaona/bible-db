document_id: JHN.13,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 13
  - type: heading
    content: Jésus lave les pieds de ses disciples
  - type: text
    content: 'C’était le temps près de la fête de la '
  - type: text
    content: Pâque
  - type: text
    content: '. Jésus savait qu’il était presque temps pour lui de quitter ce monde. Il était presque temps pour lui d’aller au Père. Il aimait toujours les gens dans le monde. Ils étaient les siens. Et il les aimait jusqu’au bout. '
  '10':
  - type: text
    content: 'Jésus a dit : une personne qui a lavé l’ensemble de son corps est complètement pure. Elle a besoin de se laver seulement les pieds. Vous êtes tous purifiés, sauf une personne. '
  '11':
  - type: text
    content: 'Jésus savait déjà qui le livrera à ses ennemis. Voilà pourquoi il a dit : Vous êtes tous purs, sauf un.'
  '12':
  - type: text
    content: 'Jésus a fini de laver les pieds de ses disciples. Après cela, il a porté son '
  - type: text
    content: manteau
  - type: text
    content: '. Il est retourné à sa place au repas. Il leur a dit : Je veux que vous compreniez ce que je viens de faire pour vous. '
  '13':
  - type: text
    content: 'Vous m’appelez Maître et '
  - type: text
    content: Seigneur
  - type: text
    content: '. Et vous avez raison quand vous dites cela. Vous avez raison, parce que je suis votre Maître et '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '14':
  - type: text
    content: 'Je suis votre Maître et '
  - type: text
    content: Seigneur
  - type: text
    content: ', et je vous ai lavé les pieds. Donc, vous devez vous laver les pieds les uns les autres aussi. '
  '15':
  - type: text
    content: 'Je vous ai donné un exemple. Donc, vous devriez faire la même chose comme je l’ai fait pour vous. '
  '16':
  - type: text
    content: 'Je vous dis la vérité. Aucun esclave n’est plus important que son maître. Et aucun messager n’est plus important que la personne qui l’a envoyé. '
  '17':
  - type: text
    content: 'Maintenant vous savez ces choses. Alors, vous serez heureux si vous les faites. '
  '18':
  - type: text
    content: 'Je ne parle pas de vous tous. Je connais les gens que j’ai choisis. L’Ancien Testament dit : Quelqu’un qui a mangé la nourriture avec moi est devenu mon ennemi. Voilà donc ce qui doit arriver. '
  '19':
  - type: text
    content: 'Je vous dis cela maintenant, avant que cela arrive. Alors, quand cela arrive, vous croirez. Vous croyez ce que je suis. '
  '2':
  - type: text
    content: 'Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' prenaient le repas du soir. Alors le '
  - type: text
    content: diable
  - type: text
    content: ' avait déjà mis une idée dans l’'
  - type: text
    content: esprit
  - type: text
    content: ' de Judas Iscariote, fils de Simon. L’idée était de livrer Jésus à ses ennemis. '
  '20':
  - type: text
    content: Je vous dis la vérité. Certaines personnes vont accepter les gens que j’envoie. Et toutes les personnes qui les acceptent, m’acceptent également. Et certaines personnes vont m’accepter. Ainsi, elles acceptent aussi celui qui m’a envoyé.
  - type: heading
    content: Jésus dit aux disciples que l’un d’entre eux le livrera à ses ennemis
  '21':
  - type: text
    content: 'Jésus a dit cela. Il se sentait très triste. Et il a eu du mal dans son '
  - type: text
    content: esprit
  - type: text
    content: '. Il leur a dit très au sérieux, je vous dis la vérité. L’un de vous me livrera à mes ennemis. '
  '22':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' se regardaient les uns les autres. Ils ne savaient pas de qui d’entre eux Jésus parlait. '
  '23':
  - type: text
    content: 'L’un d’eux, le '
  - type: text
    content: disciple
  - type: text
    content: ' que Jésus aimait, était assis tout près de Jésus. '
  '24':
  - type: text
    content: 'Simon Pierre a dit à ce '
  - type: text
    content: disciple
  - type: text
    content: ' : Demande à Jésus de qui il parle. '
  '25':
  - type: text
    content: 'Alors, le '
  - type: text
    content: disciple
  - type: text
    content: ' s’est mis plus près de Jésus et il a demandé : Qui est‑il, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '26':
  - type: text
    content: 'Jésus a répondu : Je vais mettre un morceau de pain dans le plat. Ensuite, je vais lui donner du pain. Voilà l’homme. Donc, il a mis un morceau de pain dans le plat. Puis il l’a donné à Judas, fils de Simon Iscariote.'
  '27':
  - type: text
    content: 'Puis, quand Judas a pris le pain, Satan est entré en lui. Alors Jésus a dit à Judas : Fais rapidement ce que tu veux faire. '
  '28':
  - type: text
    content: 'Aucun des autres hommes qui étaient assis au repas n’a compris. Ils ne savaient pas pourquoi Jésus a dit cela à Judas. '
  '29':
  - type: text
    content: 'Certains d’entre eux pensaient que Jésus a demandé à Judas d’acheter des choses. Judas allait sortir pour acheter ce dont ils avaient besoin pour la fête. C’était ce que certains d’entre eux pensaient. Certains d’entre eux pensaient que Jésus avait demandé à Judas de donner de l’argent aux pauvres. C’était parce que Judas gardait le sac d’argent au nom de chacun d’eux. '
  '3':
  - type: text
    content: 'Jésus savait que le Père lui avait donné son pouvoir sur tout. Il savait qu’il était venu de Dieu. Et il savait qu’il ira bientôt à Dieu. '
  '30':
  - type: text
    content: Judas a pris le pain, puis il est sorti immédiatement. Et il faisait nuit.
  - type: heading
    content: La nouvelle règle
  '31':
  - type: text
    content: 'Lorsque Judas est sorti, Jésus a dit : Maintenant, les gens vont voir à quel point le Fils de l’homme est grand et bon. Et en lui, ils verront à quel point Dieu est grand et bon. '
  '32':
  - type: text
    content: 'Le Fils montrera combien Dieu est grand. Ensuite, Dieu prendra le Fils à lui. Et Dieu montrera à quel point le Fils est grand. Et il le fera immédiatement. '
  '33':
  - type: text
    content: 'Mes enfants, je serai avec vous pour seulement une courte période. Vous me chercherez. Mais je vous dis maintenant ce que j’ai dit aux '
  - type: text
    content: Juifs
  - type: text
    content: '. Vous ne pouvez pas aller là où je vais maintenant. '
  '34':
  - type: text
    content: 'Je vous donne une nouvelle règle : Vous devez vous aimer les uns les autres comme je vous ai aimés. '
  '35':
  - type: text
    content: 'A ceci, tous reconnaîtront que vous êtes mes '
  - type: text
    content: disciples
  - type: text
    content: . Ils sauront cela si vous vous aimez vraiment les uns les autres.
  '36':
  - type: text
    content: 'Simon Pierre lui a demandé : Où iras‑tu, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Jésus a répondu : Vous ne pouvez pas me suivre maintenant où je vais. Mais vous allez me suivre quelque temps après. '
  '37':
  - type: text
    content: 'Pierre lui a dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', pourquoi ne puis‑je pas te suivre maintenant ? Je mourrais pour toi. '
  '38':
  - type: text
    content: 'Jésus a répondu : Tu dis que tu vas mourir pour moi. Mais je te dis la vérité. Tu vas dire trois fois que tu ne me connais pas. Ce sera avant le premier chant du coq.'
  '4':
  - type: text
    content: 'Donc, pendant le repas, il s’est levé. Il a enlevé le '
  - type: text
    content: manteau
  - type: text
    content: ' qu’il portait sur ses autres vêtements. Il a porté un tissu épais autour de son corps. '
  '5':
  - type: text
    content: 'Puis il a versé de l’eau dans un bol. Il a commencé à laver les pieds des '
  - type: text
    content: disciples
  - type: text
    content: '. Après, Jésus a essuyé les pieds de ses '
  - type: text
    content: disciples
  - type: text
    content: . Il a fait cela avec un tissu. Ce tissu était autour de sa hanche.
  '6':
  - type: text
    content: 'Jésus est venu auprès de Simon Pierre. Pierre lui a demandé : '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu me laves les pieds ? '
  '7':
  - type: text
    content: 'Jésus lui a répondu : Tu ne comprends pas maintenant ce que je fais. Mais tu le comprendras quelque temps après. '
  '8':
  - type: text
    content: 'Pierre lui a dit : Tu ne peux jamais me laver les pieds ! Jésus a répondu : Si je ne te lave pas, tu ne m’appartiens pas. '
  '9':
  - type: text
    content: 'Simon Pierre a répondu : Alors '
  - type: text
    content: Seigneur
  - type: text
    content: ', ne me lave pas les pieds seulement ! Lave mes mains et ma tête aussi ! '
