document_id: JHN.13
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus lave les pieds de ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’était le temps près de la fête de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. Jésus savait qu’il était presque temps pour lui de quitter ce monde. Il était presque temps pour lui d’aller au Père. Il aimait toujours les gens dans le monde. Ils étaient les siens. Et il les aimait jusqu’au bout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' prenaient le repas du soir. Alors le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' avait déjà mis une idée dans l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' de Judas Iscariote, fils de Simon. L’idée était de livrer Jésus à ses ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus savait que le Père lui avait donné son pouvoir sur tout. Il savait qu’il était venu de Dieu. Et il savait qu’il ira bientôt à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Donc, pendant le repas, il s’est levé. Il a enlevé le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: ' qu’il portait sur ses autres vêtements. Il a porté un tissu épais autour de son corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis il a versé de l’eau dans un bol. Il a commencé à laver les pieds des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Après, Jésus a essuyé les pieds de ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: . Il a fait cela avec un tissu. Ce tissu était autour de sa hanche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus est venu auprès de Simon Pierre. Pierre lui a demandé : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tu me laves les pieds ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui a répondu : Tu ne comprends pas maintenant ce que je fais. Mais tu le comprendras quelque temps après. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pierre lui a dit : Tu ne peux jamais me laver les pieds ! Jésus a répondu : Si je ne te lave pas, tu ne m’appartiens pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Simon Pierre a répondu : Alors '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ne me lave pas les pieds seulement ! Lave mes mains et ma tête aussi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus a dit : une personne qui a lavé l’ensemble de son corps est complètement pure. Elle a besoin de se laver seulement les pieds. Vous êtes tous purifiés, sauf une personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus savait déjà qui le livrera à ses ennemis. Voilà pourquoi il a dit : Vous êtes tous purs, sauf un.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus a fini de laver les pieds de ses disciples. Après cela, il a porté son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: '. Il est retourné à sa place au repas. Il leur a dit : Je veux que vous compreniez ce que je viens de faire pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous m’appelez Maître et '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Et vous avez raison quand vous dites cela. Vous avez raison, parce que je suis votre Maître et '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je suis votre Maître et '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et je vous ai lavé les pieds. Donc, vous devez vous laver les pieds les uns les autres aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je vous ai donné un exemple. Donc, vous devriez faire la même chose comme je l’ai fait pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je vous dis la vérité. Aucun esclave n’est plus important que son maître. Et aucun messager n’est plus important que la personne qui l’a envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Maintenant vous savez ces choses. Alors, vous serez heureux si vous les faites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je ne parle pas de vous tous. Je connais les gens que j’ai choisis. L’Ancien Testament dit : Quelqu’un qui a mangé la nourriture avec moi est devenu mon ennemi. Voilà donc ce qui doit arriver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je vous dis cela maintenant, avant que cela arrive. Alors, quand cela arrive, vous croirez. Vous croyez ce que je suis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je vous dis la vérité. Certaines personnes vont accepter les gens que j’envoie. Et toutes les personnes qui les acceptent, m’acceptent également. Et certaines personnes vont m’accepter. Ainsi, elles acceptent aussi celui qui m’a envoyé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' que l’un d’entre eux le livrera à ses ennemis'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus a dit cela. Il se sentait très triste. Et il a eu du mal dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Il leur a dit très au sérieux, je vous dis la vérité. L’un de vous me livrera à mes ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' se regardaient les uns les autres. Ils ne savaient pas de qui d’entre eux Jésus parlait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’un d’eux, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' que Jésus aimait, était assis tout près de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Simon Pierre a dit à ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' : Demande à Jésus de qui il parle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciple
  - type: text
    text: ' s’est mis plus près de Jésus et il a demandé : Qui est‑il, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus a répondu : Je vais mettre un morceau de pain dans le plat. Ensuite, je vais lui donner du pain. Voilà l’homme. Donc, il a mis un morceau de pain dans le plat. Puis il l’a donné à Judas, fils de Simon Iscariote.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis, quand Judas a pris le pain, Satan est entré en lui. Alors Jésus a dit à Judas : Fais rapidement ce que tu veux faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aucun des autres hommes qui étaient assis au repas n’a compris. Ils ne savaient pas pourquoi Jésus a dit cela à Judas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Certains d’entre eux pensaient que Jésus a demandé à Judas d’acheter des choses. Judas allait sortir pour acheter ce dont ils avaient besoin pour la fête. C’était ce que certains d’entre eux pensaient. Certains d’entre eux pensaient que Jésus avait demandé à Judas de donner de l’argent aux pauvres. C’était parce que Judas gardait le sac d’argent au nom de chacun d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Judas a pris le pain, puis il est sorti immédiatement. Et il faisait nuit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La nouvelle règle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Lorsque Judas est sorti, Jésus a dit : Maintenant, les gens vont voir à quel point le Fils de l’homme est grand et bon. Et en lui, ils verront à quel point Dieu est grand et bon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le Fils montrera combien Dieu est grand. Ensuite, Dieu prendra le Fils à lui. Et Dieu montrera à quel point le Fils est grand. Et il le fera immédiatement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mes enfants, je serai avec vous pour seulement une courte période. Vous me chercherez. Mais je vous dis maintenant ce que j’ai dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Vous ne pouvez pas aller là où je vais maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous donne une nouvelle règle : Vous devez vous aimer les uns les autres comme je vous ai aimés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'A ceci, tous reconnaîtront que vous êtes mes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: . Ils sauront cela si vous vous aimez vraiment les uns les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Simon Pierre lui a demandé : Où iras‑tu, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? Jésus a répondu : Vous ne pouvez pas me suivre maintenant où je vais. Mais vous allez me suivre quelque temps après. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Pierre lui a dit : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', pourquoi ne puis‑je pas te suivre maintenant ? Je mourrais pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus a répondu : Tu dis que tu vas mourir pour moi. Mais je te dis la vérité. Tu vas dire trois fois que tu ne me connais pas. Ce sera avant le premier chant du coq.'
