verses:
  '1':
  - type: heading
    content: Chapitre 18
  - type: heading
    content: La fin de Babylone
  - type: text
    content: 'Après ces choses, j’ai vu un autre '
  - type: text
    content: ange
  - type: text
    content: '. Il descendait du '
  - type: text
    content: ciel
  - type: text
    content: '. Il avait un grand pouvoir. Il était beau et il brillait beaucoup. Il a éclairé le monde entier. '
  '10':
  - type: text
    content: 'Ils se tiendront loin de la ville, parce qu’ils auront peur. Ils ne voudront pas avoir eux‑mêmes les mêmes problèmes. Ils diront :'
  - type: text
    content: De grandes souffrances te sont venues, Babylone !
  - type: text
    content: Grande ville ! Ville puissante ! C’est très mauvais pour toi !
  - type: text
    content: En une seule heure, Dieu t’a détruite !
  '11':
  - type: text
    content: 'Les gens sur la terre qui vendent des choses seront également très tristes. Ils pleureront, parce que personne n’achètera plus leurs choses. '
  '12':
  - type: text
    content: 'Ils ont vendu beaucoup de choses chères comme celles‑ci : Choses faites d’or et d’argent, pierres précieuses et perles, types spéciaux de tissu qui comprenaient un tissu rouge cher et un tissu violet, les choses en bois qui ont une bonne odeur, beaucoup de choses différentes qui sont faites d’ivoire, beaucoup de choses que les gens avaient fabriquées à partir de bois coûteux, de différents métaux et de pierre, '
  '13':
  - type: text
    content: différentes sortes d’épices et d’
  - type: text
    content: encens
  - type: text
    content: ', comme la myrrhe et l’'
  - type: text
    content: encens
  - type: text
    content: ', du vin, de huile d’olive, de la farine chère et du blé, des vaches et des brebis, des chevaux et leurs charrettes, des esclaves humains.'
  '14':
  - type: text
    content: 'Les gens qui ont vendu ces choses diront à la ville : Tu as maintenant perdu toutes les bonnes choses que tu voulais tant. Tu as perdu toutes ces choses chères qui te rendaient belle. Tu ne les auras plus jamais.'
  '15':
  - type: text
    content: 'Ces gens étaient devenus riches à cause de la ville. Mais maintenant, ils se tiendront loin de la ville, parce qu’ils auront peur. Ils ne voudront pas avoir eux‑mêmes les mêmes problèmes. Ils pleureront et seront très tristes. '
  '16':
  - type: text
    content: 'Ils diront :'
  - type: text
    content: De grandes souffrances te sont venues, Babylone !
  - type: text
    content: Grande ville ! C’est très mauvais pour toi !
  - type: text
    content: Tu portais de beaux vêtements en tissu coûteux.
  - type: text
    content: Tu portais également des choses brillantes qui te rendaient belles.
  - type: text
    content: Tu brillais d’or, des pierres précieuses et des perles.
  '17':
  - type: text
    content: Mais en une seule heure, Dieu a détruit toutes ces choses précieuses.
  - type: text
    content: 'Tous les marins et les gens qui voyagent sur des navires seront également tristes. Ils comprennent le capitaine de chaque navire et tous ceux qui travaillent sur des navires en mer. Ils se tiendront loin de la ville. '
  '18':
  - type: text
    content: 'Ils verront la fumée du feu qui brûle la ville. Puis ils crieront : Il n’y a pas d’autre ville comme cette grande ville ! '
  '19':
  - type: text
    content: Ils jetteront de la poussière sur leurs têtes, parce qu’ils seront très tristes. Ils pleureront et ils crieront,
  - type: text
    content: De grands malheurs viendront à toi, Babylone !
  - type: text
    content: Grande ville ! C’est très mauvais pour toi !
  - type: text
    content: Tous ceux qui avaient des navires sur la mer sont devenus riches grâce à toi.
  - type: text
    content: Tu as utilisé ton argent pour acheter leurs objets chers.
  - type: text
    content: Mais en une seule heure, Dieu a détruit cette ville.
  '2':
  - type: text
    content: 'Il a crié d’une voix très forte :'
  - type: text
    content: Dieu a détruit Babylone !
  - type: text
    content: Ce n’est plus une grande ville !
  - type: text
    content: Elle est devenue un endroit où vivent les démons.
  - type: text
    content: 'Elle est une maison pour chaque sale '
  - type: text
    content: esprit
  - type: text
    content: .
  - type: text
    content: Elle est une maison pour chaque oiseau sale.
  - type: text
    content: Elle est une maison pour chaque animal sale que les gens détestent.
  '20':
  - type: text
    content: 'Oui, vous qui vivez au '
  - type: text
    content: ciel
  - type: text
    content: ', soyez heureux !'
  - type: text
    content: Soyez heureux parce que Dieu a puni Babylone !
  - type: text
    content: 'Les saints, les '
  - type: text
    content: apôtres
  - type: text
    content: ' et les '
  - type: text
    content: prophètes
  - type: text
    content: ' de Dieu, soyez heureux !'
  - type: text
    content: Dieu a puni la ville à cause de ce qu’elle t’a fait.
  '21':
  - type: text
    content: 'Puis un '
  - type: text
    content: ange
  - type: text
    content: ' puissant a ramassé une très grosse pierre lourde. Il l’a jetée dans la mer. Il a dit :'
  - type: text
    content: Dieu va te jeter, Babylone !
  - type: text
    content: Tu es une grande ville, mais Dieu te jettera comme cette pierre.
  - type: text
    content: Personne ne te reverra plus jamais !
  '22':
  - type: text
    content: Personne n’entendra plus jamais de musique dans la ville.
  - type: text
    content: Personne ne chantera là‑bas.
  - type: text
    content: Personne ne fera de la musique avec des harpes, des flûtes ou des trompettes.
  - type: text
    content: Il n’y aura jamais de travailleurs qui font des choses dans la ville.
  - type: text
    content: Personne n’entendra plus jamais le bruit des gens qui font de la farine.
  '23':
  - type: text
    content: Aucune lumière des lampes des gens n’éclairera plus jamais dans la ville.
  - type: text
    content: Personne n’entendra jamais les voix heureuses d’un homme et d’une femme lorsqu’ils se marient.
  - type: text
    content: Ton peuple qui a vendu des choses était le peuple le plus puissant de la terre.
  - type: text
    content: Tu as utilisé ta magie.
  - type: text
    content: Tu as fait croire aux gens de tous les pays de mauvaises choses.
  '24':
  - type: text
    content: 'Ton peuple a tué le peuple de Dieu et ses '
  - type: text
    content: prophètes
  - type: text
    content: .
  - type: text
    content: Leur sang est dans vos rues.
  - type: text
    content: Le sang de tout le monde sur terre que les gens ont tué est également là.
  - type: text
    content: Cela montre que tu es coupable de leur mort.
  '3':
  - type: text
    content: Elle a été comme une prostituée qui rend les hommes ivres.
  - type: text
    content: Ensuite, elle les conduit à avoir des relations sexuelles d’une mauvaise façon.
  - type: text
    content: Comme ça, elle a poussé les gens de tous les pays à laisser Dieu.
  - type: text
    content: C’est comme si les rois qui dirigent sur la terre avaient couché avec cette mauvaise femme.
  - type: text
    content: Elle a acheté beaucoup de choses chères aux gens sur terre qui achètent et vendent des choses.
  - type: text
    content: En conséquence, elle les a fait devenir riches.
  '4':
  - type: text
    content: 'Puis j’ai entendu une autre voix qui parlait du '
  - type: text
    content: ciel
  - type: text
    content: '. Elle disait :'
  - type: text
    content: Mon peuple, quittez la ville ! Sortez !
  - type: text
    content: Ne faites pas les mauvaises choses que les habitants de cette ville ont faites.
  - type: text
    content: Ensuite, vous n’aurez aucun des problèmes que Dieu leur envoie.
  '5':
  - type: text
    content: Ils ont fait beaucoup de mauvaises choses.
  - type: text
    content: 'Leurs péchés ont atteint le '
  - type: text
    content: ciel
  - type: text
    content: .
  - type: text
    content: Dieu sait toutes les mauvaises choses qu’ils ont faites.
  '6':
  - type: text
    content: Oui, punissez les habitants de cette ville.
  - type: text
    content: Faites‑leur les mêmes choses qu’ils ont faites aux autres.
  - type: text
    content: Punissez‑les de 2 fois le mal qu’ils ont fait.
  - type: text
    content: Elle a amené les gens à boire de nombreux malheurs dans sa coupe.
  - type: text
    content: Maintenant, faites‑lui boire 2 fois plus de malheurs pour elle‑même !
  '7':
  - type: text
    content: Elle s’est faite grande.
  - type: text
    content: Elle s’est faite plaisir avec beaucoup de choses chères.
  - type: text
    content: Alors maintenant, donnez‑lui des malheurs au lieu de son bonheur.
  - type: text
    content: 'Elle s’est dite : Je dirige les gens comme une reine.'
  - type: text
    content: Je ne vis pas comme une veuve qui est triste.
  - type: text
    content: Je n’aurai jamais de problème. Je ne serai jamais triste.
  '8':
  - type: text
    content: Parce qu’elle a parlé comme ça,
  - type: text
    content: Elle aura de nombreux malheurs en un seul jour.
  - type: text
    content: Son peuple tombera malade.
  - type: text
    content: Il sera triste.
  - type: text
    content: Il n’aura pas de nourriture.
  - type: text
    content: Le feu détruira la ville,
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu est puissant.'
  - type: text
    content: Il va donc la punir avec ces malheurs.
  '9':
  - type: text
    content: 'Quand tout cela arrivera, les rois sur la terre seront très tristes. Ils appréciaient les mauvaises choses que les gens faisaient dans cette ville. Ils avaient beaucoup de choses chères pour être heureux. Maintenant, ils verront la fumée du feu qui brûle la ville. En conséquence, ils pleureront et pleureront. '
