document_id: REV.18
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 18
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de Babylone
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces choses, j’ai vu un autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: '. Il descendait du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Il avait un grand pouvoir. Il était beau et il brillait beaucoup. Il a éclairé le monde entier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il a crié d’une voix très forte :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu a détruit Babylone !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n’est plus une grande ville !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est devenue un endroit où vivent les démons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle est une maison pour chaque sale '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est une maison pour chaque oiseau sale.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est une maison pour chaque animal sale que les gens détestent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle a été comme une prostituée qui rend les hommes ivres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ensuite, elle les conduit à avoir des relations sexuelles d’une mauvaise façon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme ça, elle a poussé les gens de tous les pays à laisser Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est comme si les rois qui dirigent sur la terre avaient couché avec cette mauvaise femme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a acheté beaucoup de choses chères aux gens sur terre qui achètent et vendent des choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En conséquence, elle les a fait devenir riches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis j’ai entendu une autre voix qui parlait du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Elle disait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple, quittez la ville ! Sortez !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne faites pas les mauvaises choses que les habitants de cette ville ont faites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ensuite, vous n’aurez aucun des problèmes que Dieu leur envoie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ont fait beaucoup de mauvaises choses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leurs péchés ont atteint le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu sait toutes les mauvaises choses qu’ils ont faites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, punissez les habitants de cette ville.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites‑leur les mêmes choses qu’ils ont faites aux autres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Punissez‑les de 2 fois le mal qu’ils ont fait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a amené les gens à boire de nombreux malheurs dans sa coupe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, faites‑lui boire 2 fois plus de malheurs pour elle‑même !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elle s’est faite grande.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle s’est faite plaisir avec beaucoup de choses chères.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors maintenant, donnez‑lui des malheurs au lieu de son bonheur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle s’est dite : Je dirige les gens comme une reine.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne vis pas comme une veuve qui est triste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’aurai jamais de problème. Je ne serai jamais triste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Parce qu’elle a parlé comme ça,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle aura de nombreux malheurs en un seul jour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son peuple tombera malade.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera triste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’aura pas de nourriture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le feu détruira la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu est puissant.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il va donc la punir avec ces malheurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand tout cela arrivera, les rois sur la terre seront très tristes. Ils appréciaient les mauvaises choses que les gens faisaient dans cette ville. Ils avaient beaucoup de choses chères pour être heureux. Maintenant, ils verront la fumée du feu qui brûle la ville. En conséquence, ils pleureront et pleureront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils se tiendront loin de la ville, parce qu’ils auront peur. Ils ne voudront pas avoir eux‑mêmes les mêmes problèmes. Ils diront :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De grandes souffrances te sont venues, Babylone !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grande ville ! Ville puissante ! C’est très mauvais pour toi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: En une seule heure, Dieu t’a détruite !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les gens sur la terre qui vendent des choses seront également très tristes. Ils pleureront, parce que personne n’achètera plus leurs choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils ont vendu beaucoup de choses chères comme celles‑ci : Choses faites d’or et d’argent, pierres précieuses et perles, types spéciaux de tissu qui comprenaient un tissu rouge cher et un tissu violet, les choses en bois qui ont une bonne odeur, beaucoup de choses différentes qui sont faites d’ivoire, beaucoup de choses que les gens avaient fabriquées à partir de bois coûteux, de différents métaux et de pierre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: différentes sortes d’épices et d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: ', comme la myrrhe et l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: ', du vin, de huile d’olive, de la farine chère et du blé, des vaches et des brebis, des chevaux et leurs charrettes, des esclaves humains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les gens qui ont vendu ces choses diront à la ville : Tu as maintenant perdu toutes les bonnes choses que tu voulais tant. Tu as perdu toutes ces choses chères qui te rendaient belle. Tu ne les auras plus jamais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ces gens étaient devenus riches à cause de la ville. Mais maintenant, ils se tiendront loin de la ville, parce qu’ils auront peur. Ils ne voudront pas avoir eux‑mêmes les mêmes problèmes. Ils pleureront et seront très tristes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils diront :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De grandes souffrances te sont venues, Babylone !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grande ville ! C’est très mauvais pour toi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu portais de beaux vêtements en tissu coûteux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu portais également des choses brillantes qui te rendaient belles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu brillais d’or, des pierres précieuses et des perles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais en une seule heure, Dieu a détruit toutes ces choses précieuses.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tous les marins et les gens qui voyagent sur des navires seront également tristes. Ils comprennent le capitaine de chaque navire et tous ceux qui travaillent sur des navires en mer. Ils se tiendront loin de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils verront la fumée du feu qui brûle la ville. Puis ils crieront : Il n’y a pas d’autre ville comme cette grande ville ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils jetteront de la poussière sur leurs têtes, parce qu’ils seront très tristes. Ils pleureront et ils crieront,
- type: usfm
  marker: p
  children:
  - type: text
    text: De grands malheurs viendront à toi, Babylone !
- type: usfm
  marker: m
  children:
  - type: text
    text: Grande ville ! C’est très mauvais pour toi !
- type: usfm
  marker: m
  children:
  - type: text
    text: Tous ceux qui avaient des navires sur la mer sont devenus riches grâce à toi.
- type: usfm
  marker: m
  children:
  - type: text
    text: Tu as utilisé ton argent pour acheter leurs objets chers.
- type: usfm
  marker: m
  children:
  - type: text
    text: Mais en une seule heure, Dieu a détruit cette ville.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Oui, vous qui vivez au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ', soyez heureux !'
- type: usfm
  marker: m
  children:
  - type: text
    text: Soyez heureux parce que Dieu a puni Babylone !
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Les saints, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' de Dieu, soyez heureux !'
- type: usfm
  marker: m
  children:
  - type: text
    text: Dieu a puni la ville à cause de ce qu’elle t’a fait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' puissant a ramassé une très grosse pierre lourde. Il l’a jetée dans la mer. Il a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu va te jeter, Babylone !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es une grande ville, mais Dieu te jettera comme cette pierre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne te reverra plus jamais !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Personne n’entendra plus jamais de musique dans la ville.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne chantera là‑bas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne fera de la musique avec des harpes, des flûtes ou des trompettes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y aura jamais de travailleurs qui font des choses dans la ville.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne n’entendra plus jamais le bruit des gens qui font de la farine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aucune lumière des lampes des gens n’éclairera plus jamais dans la ville.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne n’entendra jamais les voix heureuses d’un homme et d’une femme lorsqu’ils se marient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton peuple qui a vendu des choses était le peuple le plus puissant de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as utilisé ta magie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as fait croire aux gens de tous les pays de mauvaises choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ton peuple a tué le peuple de Dieu et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur sang est dans vos rues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sang de tout le monde sur terre que les gens ont tué est également là.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela montre que tu es coupable de leur mort.
