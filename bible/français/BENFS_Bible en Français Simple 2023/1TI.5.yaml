document_id: 1TI.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Aider les gens dans l’Église
  - type: text
    content: 'Ne parle pas contre un homme plus âgé pour lui dire ce qu’il doit faire. Mais, demande‑lui d’une manière aimable. Fais comme si tu parlais à ton père. Parle à des hommes plus jeunes comme s’ils étaient tes frères. '
  '10':
  - type: text
    content: Les gens doivent savoir qu’elle a fait de bonnes choses. Par exemple, elle doit avoir été une bonne mère pour ses enfants. Elle doit avoir reçu des visiteurs chez elle. Elle a aidé le peuple de Dieu comme leur servante. Elle a pris soin des personnes qui avaient des problèmes. Elle a continué de faire toutes sortes de bonnes choses comme ça.
  '11':
  - type: text
    content: 'Mais refuse d’inscrire les noms des jeunes veuves sur la liste. Elles peuvent décider de se marier à nouveau, car elles veulent fortement avoir des relations sexuelles. Ensuite, elles ne choisiront plus de servir le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '12':
  - type: text
    content: En conséquence, elles ne feront plus ce qu’elles avaient promis de faire avant pour l’Église. Cela les rendra fautives.
  '13':
  - type: text
    content: 'Les jeunes veuves peuvent aussi devenir paresseuses. Elles peuvent aller de maison en maison. Non seulement elles deviennent paresseuses, mais elles disent aussi des bêtises. Elles parlent mal des autres et de ce qu’elles font. Elles disent des choses qu’elles ne devraient pas dire. '
  '14':
  - type: text
    content: 'Donc, je pense que les veuves qui sont encore de jeunes femmes devraient se marier à nouveau. Elles peuvent alors avoir des enfants et prendre soin de leurs propres maisons. Si elles vivent bien comme ça, aucun ennemi ne pourra dire du mal contre nous. '
  '15':
  - type: text
    content: 'Mais certaines des jeunes veuves se sont déjà détournées de '
  - type: text
    content: Christ
  - type: text
    content: ', afin qu’elles puissent obéir à Satan.'
  '16':
  - type: text
    content: 'Une femme qui croit en '
  - type: text
    content: Christ
  - type: text
    content: ' doit prendre soin de toutes les veuves de sa propre famille. Ensuite, l’Église n’aura pas la peine de faire ce travail. Mais, l’Église pourra aider ces veuves qui sont vraiment seules.'
  - type: heading
    content: Les responsables dans l’Église
  '17':
  - type: text
    content: 'Chacun doit respecter les dirigeants des croyants qui dirigent bien l’Église. L’Église doit également les payer correctement pour leur travail. Cela est certainement vrai pour les dirigeants qui enseignent au peuple de Dieu et lui transmettent le message de Dieu. '
  '18':
  - type: text
    content: 'La Bible dit : Ne ferme pas la bouche d’un taureau pendant qu’il marche sur tes graines de blé. La Bible dit également : Tu dois payer à un travailleur ce que vaut son travail.'
  '19':
  - type: text
    content: 'Quelqu’un peut te dire qu’un responsable des croyants a fait quelque chose de mal. Mais n’accepte pas cela comme vrai, à moins que 2 ou 3 personnes disent la même chose. '
  '2':
  - type: text
    content: Parle aux femmes plus âgées comme si tu le ferais avec ta mère. Parle aux jeunes femmes comme si elles étaient tes sœurs et respectez‑les toujours correctement.
  - type: heading
    content: Les veuves
  '20':
  - type: text
    content: 'Si un responsable est vraiment fautif et continue de faire de mauvaises choses, fais ceci : Parle contre lui quand tout le monde dans l’Église est là. Ils vont entendre ce que tu dis et ils auront peur de faire de mauvaises choses eux‑mêmes.'
  '21':
  - type: text
    content: 'Je te dis très fortement ceci : Obéis à ce que je te dis de faire. N’oublie pas que Dieu lui‑même et Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', avec leurs '
  - type: text
    content: anges
  - type: text
    content: ' spéciaux, regardent tout ce que tu fais. Ne décide pas rapidement si un responsable a fait du bien ou du mal. Sois juste et '
  - type: text
    content: juge
  - type: text
    content: ' tout le monde de la même manière. '
  '22':
  - type: text
    content: 'Ne te précipite pas d’imposer les mains sur quiconque à choisir comme responsable de l’Église. Peut‑être que cet homme a fait quelque chose de mal. Ensuite, les gens pourraient penser que tu es d’accord avec ses péchés. Tu dois toi‑même faire attention de toujours faire ce qui est bien. '
  '23':
  - type: text
    content: (Je sais que tu tombes souvent malade. Alors ne bois pas seulement de l’eau, mais bois un peu de vin. Cela aidera ton estomac à être bien).
  '24':
  - type: text
    content: Certaines gens font de mauvaises choses que tout le monde peut voir clairement. Lorsque ces gens sont jugés, tout le monde sait déjà qu’ils sont fautifs. Donc, tout le monde sait déjà qu’il est juste de punir ces gens. Mais pour d’autres personnes, les gens ne sauront leur mal que plus tard.
  '25':
  - type: text
    content: C’est la même chose avec les bonnes choses que les gens font. Tout le monde voit clairement de bonnes choses. De même, les gens sauront un jour les bonnes choses que d’autres gens font secrètement. Rien ne restera toujours secret.
  '3':
  - type: text
    content: Respecte les veuves de l’Église qui sont vraiment seules.
  '4':
  - type: text
    content: 'Si une veuve a des enfants ou des petits‑enfants, ils doivent prendre soin d’elle. Les enfants doivent aider leurs parents ou grands‑parents, car ils appartiennent à la même famille. Leurs parents les ont aidés, ils ont donc besoin de donner quelque chose en retour. Les enfants doivent apprendre cette importante leçon. C’est ce que le message de Dieu leur enseigne à faire, et cela rend Dieu heureux. '
  '5':
  - type: text
    content: 'Certaines veuves sont vraiment seules et n’ont personne pour s’occuper d’elles. Une veuve comme ça fait confiance en Dieu qu’il l’aidera. En conséquence, elle prie beaucoup, la nuit et le jour, et elle demande à Dieu de l’aider. '
  '6':
  - type: text
    content: 'Mais certaines veuves veulent seulement s’amuser. Pour une veuve comme ça, son '
  - type: text
    content: esprit
  - type: text
    content: ' est déjà mort, même si elle est encore en vie.'
  '7':
  - type: text
    content: 'Enseigne à chacun clairement à faire ces choses. Alors personne ne peut dire que les croyants font quelque chose de mal. '
  '8':
  - type: text
    content: 'Chaque croyant doit prendre soin de sa propre famille. Vraiment, il doit le faire pour les personnes qui vivent avec lui dans sa maison. Si quelqu’un ne fait pas cela, cela montre qu’il a refusé le vrai message de Dieu. Cette personne est pire que quelqu’un qui ne croit pas en '
  - type: text
    content: Christ
  - type: text
    content: .
  '9':
  - type: text
    content: 'Si tu veux mettre le nom d’une veuve sur la liste des veuves, voici ce qu’une veuve doit être : Elle doit avoir plus de 60 ans. Elle doit avoir été l’épouse d’un seul mari. '
