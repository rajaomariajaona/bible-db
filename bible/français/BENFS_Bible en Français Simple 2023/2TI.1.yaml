document_id: 2TI.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul remercie Dieu pour Timothée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cette lettre vient de moi, Paul. Dieu m’a choisi pour être '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Dieu m’a envoyé pour parler aux gens de la vraie vie qu’il nous a promise. Nous recevons cette vie lorsque nous appartenons à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je t’écris, Timothée. Tu es comme mon propre enfant et je t’aime beaucoup.
- type: usfm
  marker: p
  children:
  - type: text
    text: Je prie pour que Dieu le Père et Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' continuent de t’aider et d’être gentils avec toi. Je prie pour qu’ils te donnent la paix dans ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Comme mes ancêtres, je sers Dieu d’une bonne manière. Quand je prie Dieu la nuit et le jour, je me souviens toujours de prier pour toi. Et je remercie Dieu pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me souviens comment tu as pleuré quand je t’ai dit au revoir. Je veux te revoir beaucoup, pour que je sois complètement heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je me souviens de la façon dont tu crois vraiment en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Ta grand‑mère, Loïs, et ta mère, Eunice, croyaient déjà en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' avant toi. Maintenant, je suis sûr que tu lui fais aussi vraiment confiance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pour cette raison, je veux que tu te souviennes du don que Dieu t’a fait lorsque je t’ai imposé les mains. Utilise de plus en plus ce don pour bien servir Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sois fort comme ça, parce que Dieu nous a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: '. Et son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' ne nous fait pas peur. Mais, il nous rend forts pour servir Dieu. Il nous aide à aimer Dieu et les autres. Et il nous aide à nous diriger correctement.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Paul dit à Timothée d’être un enseignant courageux pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'N’aie donc pas honte du message concernant notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' que nous disons aux gens. Et n’aie pas honte de moi, parce que je suis en prison. Je suis prisonnier, parce que je sers le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Tu dois comprendre que tu auras des problèmes, parce que tu dis aux gens la Bonne Nouvelle de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Alors, sois prêt à avoir le même genre de problème que moi. Laisse Dieu te fortifier lorsque tu as des problèmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dieu est celui qui nous a sauvés. Il nous a choisis pour une vie qui lui plaît. Il ne nous a pas sauvés à cause de bonnes choses que nous avons faites. Il a choisi de le faire parce qu’il est très gentil. Il a décidé de le faire avant que les temps commencent, à cause de ce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est venu faire pour nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant, Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est venu pour nous sauver, et nous avons vu combien Dieu est bon. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a détruit le pouvoir de la mort sur nous. Nous avons entendu la Bonne Nouvelle qu’il nous a apportée. Alors maintenant, nous comprenons la vie avec Dieu pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dieu m’a choisi de dire aux gens la même Bonne Nouvelle. Il m’a envoyé comme son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: ' pour enseigner son message aux gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pourquoi j’ai ces problèmes. Mais je n’ai pas honte d’être en prison. J’ai cru en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' et je le connais bien. Je sais que je peux lui faire confiance pour bien garder son message. Dieu m’a donné le pouvoir de transmettre ce message aux gens en ce moment. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a le pouvoir de bien garder ce message, jusqu’au grand jour de son retour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu as le vrai message de Dieu de moi. Que ces mots soient un exemple pour toi, afin que tu enseignes également ce qui est vrai. Fais cela parce que tu appartiens à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Continue de croire en lui et d’aimer son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dieu t’a donné son bon message pour te protéger. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu, qui vit en nous, t’aidera à bien le garder.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Onésiphore
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu sais que presque tous les croyants d’Asie se sont retournés contre moi. Ils comprennent Phygelle et Hermogène.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais Onésiphore est resté pour m’aider. Je prie pour que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' soit gentil avec sa famille. Il venait souvent m’aider à ne pas être triste. Il n’avait pas honte de m’aider, même quand j’étais en prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsqu’il est venu ici à Rome, il m’a recherché attentivement jusqu’à ce qu’il me trouve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je prie pour que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' soit bon envers Onésiphore en ce grand jour où il jugera les gens. Tu sais très bien combien Onésiphore m’a aidé là‑bas à Éphèse.'
