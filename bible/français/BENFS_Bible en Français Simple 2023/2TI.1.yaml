document_id: 2TI.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Paul remercie Dieu pour Timothée
  - type: text
    content: 'Cette lettre vient de moi, Paul. Dieu m’a choisi pour être '
  - type: text
    content: apôtre
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Dieu m’a envoyé pour parler aux gens de la vraie vie qu’il nous a promise. Nous recevons cette vie lorsque nous appartenons à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '10':
  - type: text
    content: Maintenant, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est venu pour nous sauver, et nous avons vu combien Dieu est bon. Le '
  - type: text
    content: Christ
  - type: text
    content: ' a détruit le pouvoir de la mort sur nous. Nous avons entendu la Bonne Nouvelle qu’il nous a apportée. Alors maintenant, nous comprenons la vie avec Dieu pour toujours.'
  '11':
  - type: text
    content: 'Dieu m’a choisi de dire aux gens la même Bonne Nouvelle. Il m’a envoyé comme son '
  - type: text
    content: apôtre
  - type: text
    content: ' pour enseigner son message aux gens. '
  '12':
  - type: text
    content: 'C’est pourquoi j’ai ces problèmes. Mais je n’ai pas honte d’être en prison. J’ai cru en '
  - type: text
    content: Christ
  - type: text
    content: ' et je le connais bien. Je sais que je peux lui faire confiance pour bien garder son message. Dieu m’a donné le pouvoir de transmettre ce message aux gens en ce moment. '
  - type: text
    content: Christ
  - type: text
    content: ' a le pouvoir de bien garder ce message, jusqu’au grand jour de son retour.'
  '13':
  - type: text
    content: Tu as le vrai message de Dieu de moi. Que ces mots soient un exemple pour toi, afin que tu enseignes également ce qui est vrai. Fais cela parce que tu appartiens à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Continue de croire en lui et d’aimer son peuple. '
  '14':
  - type: text
    content: 'Dieu t’a donné son bon message pour te protéger. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu, qui vit en nous, t’aidera à bien le garder.'
  - type: heading
    content: Onésiphore
  '15':
  - type: text
    content: Tu sais que presque tous les croyants d’Asie se sont retournés contre moi. Ils comprennent Phygelle et Hermogène.
  '16':
  - type: text
    content: 'Mais Onésiphore est resté pour m’aider. Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit gentil avec sa famille. Il venait souvent m’aider à ne pas être triste. Il n’avait pas honte de m’aider, même quand j’étais en prison. '
  '17':
  - type: text
    content: 'Lorsqu’il est venu ici à Rome, il m’a recherché attentivement jusqu’à ce qu’il me trouve. '
  '18':
  - type: text
    content: 'Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit bon envers Onésiphore en ce grand jour où il jugera les gens. Tu sais très bien combien Onésiphore m’a aidé là‑bas à Éphèse.'
  '2':
  - type: text
    content: Je t’écris, Timothée. Tu es comme mon propre enfant et je t’aime beaucoup.
  - type: text
    content: Je prie pour que Dieu le Père et Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' continuent de t’aider et d’être gentils avec toi. Je prie pour qu’ils te donnent la paix dans ton '
  - type: text
    content: esprit
  - type: text
    content: .
  '3':
  - type: text
    content: 'Comme mes ancêtres, je sers Dieu d’une bonne manière. Quand je prie Dieu la nuit et le jour, je me souviens toujours de prier pour toi. Et je remercie Dieu pour toi. '
  '4':
  - type: text
    content: 'Je me souviens comment tu as pleuré quand je t’ai dit au revoir. Je veux te revoir beaucoup, pour que je sois complètement heureux. '
  '5':
  - type: text
    content: 'Je me souviens de la façon dont tu crois vraiment en '
  - type: text
    content: Christ
  - type: text
    content: '. Ta grand‑mère, Loïs, et ta mère, Eunice, croyaient déjà en '
  - type: text
    content: Christ
  - type: text
    content: ' avant toi. Maintenant, je suis sûr que tu lui fais aussi vraiment confiance. '
  '6':
  - type: text
    content: 'Pour cette raison, je veux que tu te souviennes du don que Dieu t’a fait lorsque je t’ai imposé les mains. Utilise de plus en plus ce don pour bien servir Dieu. '
  '7':
  - type: text
    content: 'Sois fort comme ça, parce que Dieu nous a donné son '
  - type: text
    content: Esprit
  - type: text
    content: '. Et son '
  - type: text
    content: Esprit
  - type: text
    content: ' ne nous fait pas peur. Mais, il nous rend forts pour servir Dieu. Il nous aide à aimer Dieu et les autres. Et il nous aide à nous diriger correctement.'
  - type: heading
    content: Paul dit à Timothée d’être un enseignant courageux pour le Christ
  '8':
  - type: text
    content: 'N’aie donc pas honte du message concernant notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' que nous disons aux gens. Et n’aie pas honte de moi, parce que je suis en prison. Je suis prisonnier, parce que je sers le '
  - type: text
    content: Christ
  - type: text
    content: . Tu dois comprendre que tu auras des problèmes, parce que tu dis aux gens la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Alors, sois prêt à avoir le même genre de problème que moi. Laisse Dieu te fortifier lorsque tu as des problèmes. '
  '9':
  - type: text
    content: Dieu est celui qui nous a sauvés. Il nous a choisis pour une vie qui lui plaît. Il ne nous a pas sauvés à cause de bonnes choses que nous avons faites. Il a choisi de le faire parce qu’il est très gentil. Il a décidé de le faire avant que les temps commencent, à cause de ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est venu faire pour nous.'
