document_id: ACT.22
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 22
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul parle à la foule à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ecoutez‑moi, vous les hommes qui êtes également '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Vous, nos chefs, écoutez‑moi ! Je veux vous expliquer tout ce que j’ai fait. Je n’ai rien fait de mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La foule a entendu Paul leur parler dans la langue hébraïque. Ainsi ils sont devenus encore plus silencieux.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Paul a continué de parler. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il a dit : Je suis un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: . Je suis né à Tarse en Cilicie. J’habitais ici à Jérusalem quand j’étais un garçon. Gamaliel était mon Maître. J’ai appris comment obéir aux lois de nos ancêtres. J’ai attentivement essayé d’obéir à Dieu comme vous le faites. J’étais comme vous qui êtes ici aujourd’hui.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je causais beaucoup de troubles aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus. Je causais la mort de certains d’entre eux. Et je tenais des hommes et des femmes et je les mettais en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' et tous les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' peuvent dire que mes paroles sont vraies. Les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' me donnaient des lettres pour les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à Damas. Ainsi je commençais mon voyage à Damas pour attraper les croyants dans cette ville. Je voulais mettre des chaînes sur eux et je voulais les amener de nouveau à Jérusalem. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: officiers
  - type: text
    text: ' ici dans la ville ont voulu les punir.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul dit à la foule comment il a commencé à croire en Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais pendant que je voyageais le long de la route, j’étais près de Damas. Vers midi, une grande lumière venant du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' est soudainement apparue autour de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je suis tombé à terre. Alors j’ai entendu une voix qui me parlait : Saul, Saul, pourquoi me fais‑tu souffrir ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J’ai demandé : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui es‐tu ? Il m’a dit : Je suis Jésus de Nazareth. Il m’a dit : Tu me fais du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les hommes avec moi voyaient la lumière, mais ils n’entendaient pas la voix. Ils n’entendaient pas ce qu’il me disait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J’ai demandé : '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', que dois‑je faire ? Il m’a dit : Maintenant tu devras te lever et tu devras entrer à Damas. Quand tu arriveras dans la ville, quelqu’un viendra chez toi. Il te dira ce que Dieu veut que tu fasses. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La grande lumière a abîmé mes yeux. Alors je ne pouvais plus voir. Ainsi les hommes qui étaient avec moi tenaient ma main. Alors ils m’ont mené à Damas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A Damas, il y avait un homme appelé Ananias. Il connaît Dieu. Il obéit à Dieu et à la loi des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Tous les gens de Damas disaient de bonnes choses à son sujet. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ananias est venu pour me voir. Il s’est tenu près de moi et il a dit : Revois, Saul mon ami ! Et immédiatement, je pouvais encore voir. Ainsi, je le regardais.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Ananias m’a dit : Dieu à qui nos ancêtres obéissaient, t’a choisi. Il te dira ce qu’il veut que tu fasses. Il a voulu que tu puisses voir le serviteur spécial de Dieu, qui est complètement bon. Et Dieu a voulu que tu entendes la propre voix de ce serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu travailleras pour Jésus. Tu diras à tout le monde tout ce que tu as vu et entendu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et maintenant tu n’as plus besoin d’attendre. Lève‑toi et je te baptiserai. Crois en Jésus. Demande à Dieu et il pardonnera les mauvaises choses que tu faisais.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les personnes dans la foule deviennent très fâchées contre Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après mon retour à Jérusalem, je suis entré dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Je priais. J’étais éveillé, mais j’ai fait un rêve. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dans le rêve, j’ai vu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il me parlait : Hâte‑toi. Quitte Jérusalem rapidement. Le peuple ici ne croira pas ce que tu leur dis au sujet de moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'J’ai dit : Le peuple ici me connaît très bien. Il sait que j’allais dans les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: synagogues
  - type: text
    text: '. Et j’attrapais des personnes là qui croient en toi. Je les frappais également. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les gens parlaient d’Étienne au sujet de toi. J’ai moi‑même été là quand le peuple l’a tué. J’ai dit au peuple qu’il faisait une bonne chose. Et j’ai tenu les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteaux
  - type: text
    text: ' du peuple quand ils le tuaient.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m’a dit : Je t’envoie au loin aux étrangers ou non‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le peuple écoutait Paul. C’était jusqu’à ce qu’il parle des étrangers ou non‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Mais alors ils ont commencé à crier fort : Enlevez‑le ! Tuez‑le ! Il n’est pas exact qu’il puisse vivre plus longtemps !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils criaient. Ils enlevaient leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteaux
  - type: text
    text: ' et ils les jetaient. Ils jetaient également la saleté de la terre dans l’air.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le chef des soldats a dit à ses hommes : Prenez cet homme dans le bâtiment fort. Frappez‑le alors avec un fouet. Nous saurons alors ce qu’il a fait. Il nous dira pourquoi les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' crient tellement fort au sujet de lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ainsi les soldats ont lié Paul avec des cordes. Ils étaient prêts à le frapper. Mais Paul a parlé à l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: officier
  - type: text
    text: ' qui se tenait près de lui. Il a dit : Tu n’obéiras pas à vos lois si tu me frappes. Je suis un citoyen de Rome. Je ne me suis pas encore tenu devant un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '. Aucun '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' n’a dit que j’ai fait n’importe quel mal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: officier
  - type: text
    text: ' a entendu ce que Paul a dit. Ainsi il est allé au chef des soldats et il a dit : Ne fais pas ce que tu veux faire ! Cet homme est un citoyen de Rome !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ainsi le chef des soldats est allé demander à Paul : Est‐ce vrai que tu es un citoyen de Rome ? Il a répondu : Oui. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le chef des soldats a dit : J’ai payé beaucoup d’argent au gouvernement de sorte que je puisse devenir un citoyen de Rome. Paul a répondu : Mais moi, je suis un citoyen de Rome, parce que mes parents étaient '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Romains
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Immédiatement, les hommes qui devaient lui poser des questions se sont éloignés de lui. Le chef des soldats avait peur, parce qu’il avait mis des chaînes sur les bras et les jambes de Paul. Et il a su qu’il ne devrait pas faire cela à un citoyen de Rome.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le chef des soldats a voulu trouver la raison pour laquelle les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' disaient de mauvaises choses contre Paul. Il a voulu être sûr de cela. Ainsi le jour suivant, il a demandé à ses soldats d’enlever les chaînes de Paul. Et il a envoyé un message au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' et à tous les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '. Il a dit : Venez vous réunir avec moi aujourd’hui. Alors il a pris Paul et il a fait tenir Paul devant eux.'
