document_id: ACT.22,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 22
  - type: heading
    content: Paul parle à la foule à Jérusalem
  - type: text
    content: 'Ecoutez‑moi, vous les hommes qui êtes également '
  - type: text
    content: Juifs
  - type: text
    content: . Vous, nos chefs, écoutez‑moi ! Je veux vous expliquer tout ce que j’ai fait. Je n’ai rien fait de mal.
  '10':
  - type: text
    content: 'J’ai demandé : '
  - type: text
    content: Seigneur
  - type: text
    content: ', que dois‑je faire ? Il m’a dit : Maintenant tu devras te lever et tu devras entrer à Damas. Quand tu arriveras dans la ville, quelqu’un viendra chez toi. Il te dira ce que Dieu veut que tu fasses. '
  '11':
  - type: text
    content: La grande lumière a abîmé mes yeux. Alors je ne pouvais plus voir. Ainsi les hommes qui étaient avec moi tenaient ma main. Alors ils m’ont mené à Damas.
  '12':
  - type: text
    content: 'A Damas, il y avait un homme appelé Ananias. Il connaît Dieu. Il obéit à Dieu et à la loi des '
  - type: text
    content: Juifs
  - type: text
    content: '. Tous les gens de Damas disaient de bonnes choses à son sujet. '
  '13':
  - type: text
    content: 'Ananias est venu pour me voir. Il s’est tenu près de moi et il a dit : Revois, Saul mon ami ! Et immédiatement, je pouvais encore voir. Ainsi, je le regardais.'
  '14':
  - type: text
    content: 'Alors Ananias m’a dit : Dieu à qui nos ancêtres obéissaient, t’a choisi. Il te dira ce qu’il veut que tu fasses. Il a voulu que tu puisses voir le serviteur spécial de Dieu, qui est complètement bon. Et Dieu a voulu que tu entendes la propre voix de ce serviteur. '
  '15':
  - type: text
    content: 'Tu travailleras pour Jésus. Tu diras à tout le monde tout ce que tu as vu et entendu. '
  '16':
  - type: text
    content: Et maintenant tu n’as plus besoin d’attendre. Lève‑toi et je te baptiserai. Crois en Jésus. Demande à Dieu et il pardonnera les mauvaises choses que tu faisais.
  - type: heading
    content: Les personnes dans la foule deviennent très fâchées contre Paul
  '17':
  - type: text
    content: 'Après mon retour à Jérusalem, je suis entré dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Je priais. J’étais éveillé, mais j’ai fait un rêve. '
  '18':
  - type: text
    content: 'Dans le rêve, j’ai vu le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il me parlait : Hâte‑toi. Quitte Jérusalem rapidement. Le peuple ici ne croira pas ce que tu leur dis au sujet de moi.'
  '19':
  - type: text
    content: 'J’ai dit : Le peuple ici me connaît très bien. Il sait que j’allais dans les '
  - type: text
    content: synagogues
  - type: text
    content: '. Et j’attrapais des personnes là qui croient en toi. Je les frappais également. '
  '2':
  - type: text
    content: La foule a entendu Paul leur parler dans la langue hébraïque. Ainsi ils sont devenus encore plus silencieux.
  - type: text
    content: 'Paul a continué de parler. '
  '20':
  - type: text
    content: 'Les gens parlaient d’Étienne au sujet de toi. J’ai moi‑même été là quand le peuple l’a tué. J’ai dit au peuple qu’il faisait une bonne chose. Et j’ai tenu les '
  - type: text
    content: manteaux
  - type: text
    content: ' du peuple quand ils le tuaient.'
  '21':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m’a dit : Je t’envoie au loin aux étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: .
  '22':
  - type: text
    content: Le peuple écoutait Paul. C’était jusqu’à ce qu’il parle des étrangers ou non‑
  - type: text
    content: Juifs
  - type: text
    content: '. Mais alors ils ont commencé à crier fort : Enlevez‑le ! Tuez‑le ! Il n’est pas exact qu’il puisse vivre plus longtemps !'
  '23':
  - type: text
    content: 'Ils criaient. Ils enlevaient leurs '
  - type: text
    content: manteaux
  - type: text
    content: ' et ils les jetaient. Ils jetaient également la saleté de la terre dans l’air.'
  '24':
  - type: text
    content: 'Le chef des soldats a dit à ses hommes : Prenez cet homme dans le bâtiment fort. Frappez‑le alors avec un fouet. Nous saurons alors ce qu’il a fait. Il nous dira pourquoi les '
  - type: text
    content: Juifs
  - type: text
    content: ' crient tellement fort au sujet de lui.'
  '25':
  - type: text
    content: Ainsi les soldats ont lié Paul avec des cordes. Ils étaient prêts à le frapper. Mais Paul a parlé à l’
  - type: text
    content: officier
  - type: text
    content: ' qui se tenait près de lui. Il a dit : Tu n’obéiras pas à vos lois si tu me frappes. Je suis un citoyen de Rome. Je ne me suis pas encore tenu devant un '
  - type: text
    content: juge
  - type: text
    content: '. Aucun '
  - type: text
    content: juge
  - type: text
    content: ' n’a dit que j’ai fait n’importe quel mal.'
  '26':
  - type: text
    content: L’
  - type: text
    content: officier
  - type: text
    content: ' a entendu ce que Paul a dit. Ainsi il est allé au chef des soldats et il a dit : Ne fais pas ce que tu veux faire ! Cet homme est un citoyen de Rome !'
  '27':
  - type: text
    content: 'Ainsi le chef des soldats est allé demander à Paul : Est‐ce vrai que tu es un citoyen de Rome ? Il a répondu : Oui. '
  '28':
  - type: text
    content: 'Le chef des soldats a dit : J’ai payé beaucoup d’argent au gouvernement de sorte que je puisse devenir un citoyen de Rome. Paul a répondu : Mais moi, je suis un citoyen de Rome, parce que mes parents étaient '
  - type: text
    content: Romains
  - type: text
    content: .
  '29':
  - type: text
    content: Immédiatement, les hommes qui devaient lui poser des questions se sont éloignés de lui. Le chef des soldats avait peur, parce qu’il avait mis des chaînes sur les bras et les jambes de Paul. Et il a su qu’il ne devrait pas faire cela à un citoyen de Rome.
  '3':
  - type: text
    content: 'Il a dit : Je suis un '
  - type: text
    content: Juif
  - type: text
    content: . Je suis né à Tarse en Cilicie. J’habitais ici à Jérusalem quand j’étais un garçon. Gamaliel était mon Maître. J’ai appris comment obéir aux lois de nos ancêtres. J’ai attentivement essayé d’obéir à Dieu comme vous le faites. J’étais comme vous qui êtes ici aujourd’hui.
  '30':
  - type: text
    content: 'Le chef des soldats a voulu trouver la raison pour laquelle les '
  - type: text
    content: Juifs
  - type: text
    content: ' disaient de mauvaises choses contre Paul. Il a voulu être sûr de cela. Ainsi le jour suivant, il a demandé à ses soldats d’enlever les chaînes de Paul. Et il a envoyé un message au '
  - type: text
    content: grand prêtre
  - type: text
    content: ' et à tous les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. Il a dit : Venez vous réunir avec moi aujourd’hui. Alors il a pris Paul et il a fait tenir Paul devant eux.'
  '4':
  - type: text
    content: 'Je causais beaucoup de troubles aux '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus. Je causais la mort de certains d’entre eux. Et je tenais des hommes et des femmes et je les mettais en prison. '
  '5':
  - type: text
    content: 'Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' et tous les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' peuvent dire que mes paroles sont vraies. Les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' me donnaient des lettres pour les '
  - type: text
    content: Juifs
  - type: text
    content: ' à Damas. Ainsi je commençais mon voyage à Damas pour attraper les croyants dans cette ville. Je voulais mettre des chaînes sur eux et je voulais les amener de nouveau à Jérusalem. Les '
  - type: text
    content: officiers
  - type: text
    content: ' ici dans la ville ont voulu les punir.'
  - type: heading
    content: Paul dit à la foule comment il a commencé à croire en Jésus
  '6':
  - type: text
    content: 'Mais pendant que je voyageais le long de la route, j’étais près de Damas. Vers midi, une grande lumière venant du '
  - type: text
    content: ciel
  - type: text
    content: ' est soudainement apparue autour de moi. '
  '7':
  - type: text
    content: 'Je suis tombé à terre. Alors j’ai entendu une voix qui me parlait : Saul, Saul, pourquoi me fais‑tu souffrir ?'
  '8':
  - type: text
    content: 'J’ai demandé : '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui es‐tu ? Il m’a dit : Je suis Jésus de Nazareth. Il m’a dit : Tu me fais du mal. '
  '9':
  - type: text
    content: Les hommes avec moi voyaient la lumière, mais ils n’entendaient pas la voix. Ils n’entendaient pas ce qu’il me disait.
