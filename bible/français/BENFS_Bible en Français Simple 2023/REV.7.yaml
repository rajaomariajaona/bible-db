document_id: REV.7
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 7
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu met un signe sur son peuple d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, j’ai vu 4 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. Ils se tenaient aux 4 coins du monde. Ils arrêtaient les 4 vents de la terre. En conséquence, aucun vent ne pouvait souffler sur la terre, ni sur la mer, ni sur aucun arbre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis j’ai vu un autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' qui venait de l’est. Il portait le sceau de Dieu qui vit pour toujours. Il a crié fort aux 4 autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: '. Ils avaient reçu le pouvoir de détruire la terre et la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais il leur a crié : Ne détruisez pas encore la terre, la mer ou les arbres. Attendez que nous mettions un sceau devant les têtes des serviteurs de Dieu. Le sceau de Dieu sur le devant de leurs têtes les gardera en sécurité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Puis j’ai entendu combien de gens ont reçu le sceau de Dieu. Le nombre de personnes était de 144 000. Ils venaient de tous les groupes familiaux du peuple d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: 'Il y avait 12 000 de chaque groupe familial : Celui de Juda, de Ruben, de Gad, d’Aser, de Nephthali, de Manassé, de Siméon, de Lévi, d’Issachar, de Zabulon, de Joseph, de Benjamin.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La grande foule qui portait des vêtements blancs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Après cela, j’ai regardé à nouveau. J’ai vu une très grande foule de gens. Il y avait tellement de gens que personne ne pouvait compter. Ils venaient de tous les pays, de tous les groupes familiaux et de toutes les langues. Ils se tenaient devant le trône et devant l’Agneau. Ils portaient de longs vêtements blancs et tenaient des branches de palmiers aux mains.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils criaient fort :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous adorons notre Dieu qui est assis sur le trône.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous adorons l’Agneau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils nous ont sauvés du pouvoir de Satan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' se tenaient autour du trône, et autour des anciens, et autour des 4 êtres. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' se penchaient tous pour que leurs visages touchent le sol. Ils adoraient Dieu qui était sur le trône devant eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils disaient :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est vrai !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous adorons notre Dieu et nous disons qu’il est grand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est complètement sage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous le remercions et nous le louons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a toute puissance et tout pouvoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen ! C’est vrai !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors l’un des anciens m’a demandé : Qui sont ces gens en vêtements blancs ? D’où viennent‑ils ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’ai répondu : C’est toi seul qui sais qui ils sont, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il m’a dit : Ce sont les gens qui ont eu des moments très difficiles. Maintenant, ils en sont sortis. Ils ont lavé leurs vêtements dans le sang de l’Agneau. Maintenant, leurs vêtements sont blancs et propres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'À cause de cela, ils se tiennent maintenant devant le trône de Dieu. Ils servent Dieu dans sa maison tout le temps, jour et nuit. Et Dieu les gardera en sécurité, parce qu’il est avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils n’auront plus jamais faim. Ils n’auront jamais soif. Le soleil ne les brûlera pas et aucune autre chaleur intense ne les brûlera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’Agneau est là avec eux, près du trône de Dieu. Il prendra soin d’eux, comme un berger avec ses moutons. Il les emmènera boire de l’eau fraîche qui donne la vie aux gens. Ils ne seront plus tristes. Dieu enlèvera toutes les larmes de leurs yeux.
