document_id: REV.7,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 7
  - type: heading
    content: Dieu met un signe sur son peuple d’Israël
  - type: text
    content: 'Après cela, j’ai vu 4 '
  - type: text
    content: anges
  - type: text
    content: '. Ils se tenaient aux 4 coins du monde. Ils arrêtaient les 4 vents de la terre. En conséquence, aucun vent ne pouvait souffler sur la terre, ni sur la mer, ni sur aucun arbre. '
  '10':
  - type: text
    content: 'Ils criaient fort :'
  - type: text
    content: Nous adorons notre Dieu qui est assis sur le trône.
  - type: text
    content: Et nous adorons l’Agneau.
  - type: text
    content: Ils nous ont sauvés du pouvoir de Satan.
  '11':
  - type: text
    content: 'Tous les '
  - type: text
    content: anges
  - type: text
    content: ' se tenaient autour du trône, et autour des anciens, et autour des 4 êtres. Les '
  - type: text
    content: anges
  - type: text
    content: ' se penchaient tous pour que leurs visages touchent le sol. Ils adoraient Dieu qui était sur le trône devant eux. '
  '12':
  - type: text
    content: 'Ils disaient :'
  - type: text
    content: C’est vrai !
  - type: text
    content: Nous adorons notre Dieu et nous disons qu’il est grand.
  - type: text
    content: Il est complètement sage.
  - type: text
    content: Nous le remercions et nous le louons.
  - type: text
    content: Il a toute puissance et tout pouvoir.
  - type: text
    content: Amen ! C’est vrai !
  '13':
  - type: text
    content: 'Alors l’un des anciens m’a demandé : Qui sont ces gens en vêtements blancs ? D’où viennent‑ils ?'
  '14':
  - type: text
    content: 'J’ai répondu : C’est toi seul qui sais qui ils sont, '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: 'Il m’a dit : Ce sont les gens qui ont eu des moments très difficiles. Maintenant, ils en sont sortis. Ils ont lavé leurs vêtements dans le sang de l’Agneau. Maintenant, leurs vêtements sont blancs et propres. '
  '15':
  - type: text
    content: 'À cause de cela, ils se tiennent maintenant devant le trône de Dieu. Ils servent Dieu dans sa maison tout le temps, jour et nuit. Et Dieu les gardera en sécurité, parce qu’il est avec eux. '
  '16':
  - type: text
    content: Ils n’auront plus jamais faim. Ils n’auront jamais soif. Le soleil ne les brûlera pas et aucune autre chaleur intense ne les brûlera.
  '17':
  - type: text
    content: L’Agneau est là avec eux, près du trône de Dieu. Il prendra soin d’eux, comme un berger avec ses moutons. Il les emmènera boire de l’eau fraîche qui donne la vie aux gens. Ils ne seront plus tristes. Dieu enlèvera toutes les larmes de leurs yeux.
  '2':
  - type: text
    content: 'Puis j’ai vu un autre '
  - type: text
    content: ange
  - type: text
    content: ' qui venait de l’est. Il portait le sceau de Dieu qui vit pour toujours. Il a crié fort aux 4 autres '
  - type: text
    content: anges
  - type: text
    content: '. Ils avaient reçu le pouvoir de détruire la terre et la mer. '
  '3':
  - type: text
    content: 'Mais il leur a crié : Ne détruisez pas encore la terre, la mer ou les arbres. Attendez que nous mettions un sceau devant les têtes des serviteurs de Dieu. Le sceau de Dieu sur le devant de leurs têtes les gardera en sécurité.'
  '4':
  - type: text
    content: Puis j’ai entendu combien de gens ont reçu le sceau de Dieu. Le nombre de personnes était de 144 000. Ils venaient de tous les groupes familiaux du peuple d’Israël.
  '5':
  - type: text
    content: 'Il y avait 12 000 de chaque groupe familial : Celui de Juda, de Ruben, de Gad, d’Aser, de Nephthali, de Manassé, de Siméon, de Lévi, d’Issachar, de Zabulon, de Joseph, de Benjamin.'
  - type: heading
    content: La grande foule qui portait des vêtements blancs
  '9':
  - type: text
    content: Après cela, j’ai regardé à nouveau. J’ai vu une très grande foule de gens. Il y avait tellement de gens que personne ne pouvait compter. Ils venaient de tous les pays, de tous les groupes familiaux et de toutes les langues. Ils se tenaient devant le trône et devant l’Agneau. Ils portaient de longs vêtements blancs et tenaient des branches de palmiers aux mains.
