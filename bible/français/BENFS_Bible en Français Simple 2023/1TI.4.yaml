  - type: text
    content: ' de Dieu nous dit clairement ceci : Plus tard, certaines gens laisseront de croire au message concernant Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Mais, ils écouteront les mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. Ils voudront que les gens croient aux mauvaises choses. Ils écouteront le message qui vient des démons. '
  '10':
  - type: text
    content: C’est pourquoi nous travaillons pour bien servir Dieu. Nous continuons de travailler, même lorsque nous avons des problèmes. Nous le faisons, parce que nous croyons que Dieu nous aidera. Il est celui qui vit pour toujours et qui sauve tout le monde. Vraiment, il sauve ceux qui croient en lui.
  '11':
  - type: text
    content: 'Apprends aux gens à faire ces choses. '
  '12':
  - type: text
    content: Tu es encore un jeune homme, mais tout le monde doit te respecter en tant que responsable dans l’Église. Montre aux croyants comment vivre. Sois un bon exemple pour eux. Fais‑le dans tes paroles, tes actes. Sois aussi leur bon exemple d’amour et de foi. Et en évitant le péché.
  '13':
  - type: text
    content: 'Fais attention à ceci jusqu’à ce que je vienne : Lis la Bible à haute voix aux gens. Enseignez‑leur à comprendre et à obéir au message concernant '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Souviens‑toi du don que le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu t’a offert. Tu as reçu ce don quand l’ensemble des responsables de l’Église t’ont imposé les mains. Ils ont dit les messages de Dieu sur la façon dont tu le serviras. Alors n’arrête pas d’utiliser ce don de Dieu. '
  '15':
  - type: text
    content: 'Sois prudent, fais bien toutes ces choses. Alors tout le monde verra que tu sers de mieux en mieux Dieu. '
  '16':
  - type: text
    content: Réfléchis bien à la façon dont tu vis et au message que tu enseignes. Continue d’enseigner le vrai message de Dieu. Alors Dieu te sauvera non seulement toi, mais aussi ces gens qui t’écoutent.
  '2':
  - type: text
    content: 'Les gens qui enseignent ces fausses choses sont des '
  - type: text
    content: hypocrites
  - type: text
    content: '. Ils ne comprennent plus que ce qu’ils enseignent est faux. '
  '3':
  - type: text
    content: 'Ils disent qu’il est mauvais pour quiconque de se marier. Ils disent aux gens de ne pas manger certains types de nourriture. Mais Dieu a fait ces aliments comme de la nourriture aux gens ! Nous devons comprendre le vrai message de Dieu et lui faire confiance. Ensuite, nous recevrons la nourriture qu’il nous a donnée et nous l’en remercierons. '
  '4':
  - type: text
    content: 'Tout ce que Dieu a fait est bon. Donc, nous ne devons rien refuser de ce qu’il a fait. Mais, nous devrons le recevoir et remercier Dieu pour cela. '
  '5':
  - type: text
    content: Dieu a dit que c’était bon. Nous devons prier pour qu’il bénisse cela. Alors, cela devient bon et propre pour notre nourriture.
  - type: heading
    content: Comment Timothée peut être un bon serviteur de Christ
  '6':
  - type: text
    content: Tu dois expliquer ces choses aux croyants et leur enseigner le vrai message de Dieu. Si tu fais cela, tu seras un bon serviteur de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Continue d’étudier le message sur Jésus que tu as déjà appris. Cela t’aidera à être fort. '
  '7':
  - type: text
    content: 'Mais tu dois refuser d’écouter de faux enseignements. De telles histoires ne viennent pas de Dieu. Ce sont seulement des personnes idiotes qui croient à cela. Mais, apprends à bien vivre d’une manière qui rend Dieu heureux. '
  '8':
  - type: text
    content: 'Les gens disent ceci : Si une personne travaille pour rendre son corps fort et sain, cela l’aidera un peu. Mais si une personne travaille à vivre d’une manière qui rend Dieu heureux, cela l’aidera beaucoup plus. Cela aidera cette personne dans sa vie actuelle sur terre, et cela l’aidera également dans sa vie future avec Dieu dans le '
  - type: text
    content: ciel
  - type: text
    content: .
  '9':
  - type: text
    content: 'Nous savons que ces paroles sont vraies. Tout le monde devrait être d’accord avec elles. '
