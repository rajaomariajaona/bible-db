document_id: ROM.6,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 6
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le péché ne nous domine plus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quelqu’un pourrait dire : Peut‑être devons‑nous continuer de faire de mauvaises choses ? Alors Dieu peut être bon avec nous de plusieurs manières.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quand Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort, il est mort une fois afin de détruire pour toujours la puissance du péché. Maintenant qu’il est de nouveau vivant, il vit pour servir Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ainsi, pensez aussi de la même manière. Le péché n’a aucun pouvoir sur vous, comme si vous étiez morts. Dans votre nouvelle vie, vous vivez pour servir Dieu, parce que vous appartenez à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ne laissez donc pas le péché dominer vos vies dans ce monde. Ne faites pas de mauvaises choses que vos corps veulent faire. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le péché peut utiliser vos corps pour faire des choses qui sont mauvaises. Alors, ne laissez aucune partie de votre corps servir le péché comme maître. Au lieu de cela, soyez prêts à servir Dieu comme votre Maître. Vous pouvez le faire, parce que vous avez maintenant une nouvelle vie. Votre ancienne vie est morte. Alors, donnez chaque partie de votre corps à Dieu. Ensuite, il vous utilisera pour faire de bonnes choses. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le péché n’aura plus de pouvoir sur vous. Vous n’avez pas de nouvelle vie parce que vous obéissez à la loi que Dieu a donnée à Moïse. Vous avez une nouvelle vie parce que Dieu est très gentil avec vous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chrétiens doivent faire attention à faire ce qui est bien
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quelqu’un peut dire : Ainsi, nous avons une nouvelle vie, parce que Dieu est bon pour nous. La loi de Moïse n’a plus de pouvoir sur nous. Alors, peut‑être que nous devrions continuer à faire de mauvaises choses. Cela ne fera aucune différence. Non, ce n’est pas vrai ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Rappelez‑vous ceci : Lorsque vous acceptez de servir quelqu’un comme esclave, vous devez obéir à cet homme comme votre maître. Vous pouvez choisir de servir le péché comme votre maître. Si vous faites cela, vous mourrez. Ou vous pouvez choisir d’obéir à Dieu. Si vous faites cela, vous vivrez de la bonne façon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'À un certain temps, vous étiez esclaves du péché. Mais alors vous avez reçu le vrai message de Dieu, et vous étiez heureux de lui obéir. Je remercie Dieu à cause de cela ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En conséquence, Dieu vous a libérés de la puissance du péché. Vous êtes maintenant comme des esclaves qui méritent tout ce qui est bien et bon.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il vous est difficile de comprendre ces choses, car vous êtes encore faibles. J’utilise donc une image humaine d’esclaves pour vous aider à mieux comprendre. À un moment donné, le mal vous dominait. Vous laissez votre corps faire de mauvaises choses et sales. Comme des esclaves qui servent le péché, vous avez continué de faire de plus en plus de mauvaises choses. Alors maintenant, vous devez utiliser votre corps pour servir ce qui est bon et juste. Ensuite, vous ferez de plus en plus de bonnes choses qui montrent que vous appartenez à Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Non ! Nous ne devons certainement pas faire cela ! Le péché ne domine plus nos vies. Cette vieille vie est morte ! Il n’est donc pas juste que nous continuions de faire de mauvaises choses. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Quand vous étiez esclaves du péché, vous n’aviez même pas pensé à ce qui était bon et juste. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Vous faisiez des choses dont vous avez honte maintenant. Rien de bon ne venait de ces choses. Enfin, le résultat de ces choses est la mort. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mais maintenant, Dieu vous a libérés de la puissance du péché. Vous êtes devenus les esclaves de Dieu. Alors, beaucoup de bonnes choses vont se produire, parce que Dieu vous aide à vivre dans le bon sens. Enfin, le résultat sera que vous vivrez avec lui pour toujours.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Si vous servez le péché comme votre maître, il vous paiera la mort. Mais si vous appartenez à notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', Dieu vous donnera un cadeau ! Ce cadeau est la vie avec Dieu pour toujours.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Souvenez‑vous de ce que montre votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême
    - type: text
      text: '  : Quand on vous a baptisés, cela montre que vous êtes maintenant unis à Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Cela montre également que, parce que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort, votre ancienne vie est également morte. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Votre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: baptême
    - type: text
      text: ' montre qu’ils vous ont enterrés, tout comme ils ont enterré Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' après sa mort. C’est comme si vous étiez morts avec lui et ils vous ont enterrés avec lui. À cause de cela, Dieu nous réveillera également de la mort, tout comme il a réveillé Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' de la mort. Dieu, le Père, est très grand et puissant. Il a élevé Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' à une nouvelle vie. Cela signifie que nous pouvons également mener notre vie d’une manière nouvelle.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nous nous sommes unis à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' et nous sommes morts comme lui. Pour cette raison, nous serons également unis avec lui dans sa nouvelle vie. Tout comme Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' s’est réveillé de la mort, nous allons aussi nous réveiller pour une nouvelle vie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nous savons que Dieu a fait mourir notre ancienne nature avec Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' sur la croix. Cela s’est produit, afin que Dieu puisse nous libérer de la puissance du péché dans nos vies. Nous ne sommes plus comme des esclaves qui avons le péché pour maître.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le péché n’a plus de pouvoir sur quelqu’un qui est mort.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ainsi, si nous sommes morts avec Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', nous croyons que nous vivrons aussi avec lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dieu a réveillé Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', afin qu’il redevienne vivant après sa mort. Pour cette raison, nous savons qu’il ne mourra plus jamais. La mort n’a plus de pouvoir sur lui. '
