document_id: MAT.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des hommes sages viennent visiter Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jésus est né à Bethléem en Judée. A ce temps‑là, Hérode était roi de Judée. Peu après la naissance de Jésus, des hommes sages sont venus à Jérusalem. Ils venaient de l’est.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ces hommes ont demandé aux gens : Où est l’enfant qui est né comme roi des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '  ? Nous avons vu son étoile à l’est. Alors nous sommes venus plier nos genoux devant lui. Nous voulons lui dire combien il est grand et important.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand Hérode a appris cela, il était inquiet. Tous les gens de Jérusalem étaient aussi inquiets. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors Hérode a appelé tous les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les enseignants de la loi de Dieu. Il leur a demandé : Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' naîtra où ? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils ont répondu : Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' naîtra à Bethléem en Judée. Voici ce que le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' a écrit à propos de Bethléem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu a dit :'
- type: usfm
  marker: m
  children:
  - type: text
    text: Mais toi, Bethléem sur la terre de Juda, tu n’es certainement pas la plus petite ville parmi les villes de Juda. Un dirigeant viendra de toi. Il guidera mon peuple Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Hérode a secrètement appelé les hommes sages. Il s’est renseigné auprès d’eux. Hérode voulait savoir le temps exact où l’étoile leur était apparue. Ainsi il les a envoyés à Bethléem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il leur a dit : Allez vous renseigner sérieusement sur l’enfant. Et si vous le trouvez, venez me dire. Ensuite, j’irai aussi l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les hommes sages ont écouté le roi Hérode. Après cela, ils ont quitté. L’étoile qu’ils avaient vue à l’est, allait devant eux. L’étoile s’est arrêtée au‑dessus du lieu où l’enfant était. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quand ils ont vu encore l’étoile, ils étaient très contents. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les hommes sages sont entrés dans la maison. Ils ont vu l’enfant Jésus avec sa mère Marie. Ils se sont alors baissés devant l’enfant Jésus. Ils l’ont adoré. Ensuite, ils ont ouvert leurs sacs. Ils ont pris des cadeaux précieux. Ils les ont donnés à l’enfant Jésus. Les cadeaux étaient de l’or, de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: encens
  - type: text
    text: ' et de la myrrhe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu leur a dit dans un rêve : Ne retournez pas voir Hérode. Les hommes sont alors retournés dans leur pays par un autre chemin.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marie, Joseph et Jésus vont en Égypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand les hommes sages sont partis, un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' de Dieu est apparu à Joseph dans un rêve. Il lui a dit ceci : Hérode cherchera l’enfant. Il le fera tuer. Lève‑toi, prends l’enfant et sa mère avec toi. Fuis en Égypte. Je te dirai quand quitter l’Égypte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Joseph s’est levé. Il a pris l’enfant et sa mère. Il est parti avec eux en Égypte cette même nuit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils sont tous restés en Égypte jusqu’à la mort d’Hérode. Ce qui est arrivé a confirmé cette parole du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '  : J’ai appelé mon fils d’Égypte.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les soldats d’Hérode tuent les bébés garçons à Bethléem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hérode a compris que les hommes sages l’avaient trompé. Il était très fâché. Il a envoyé ses soldats à Bethléem. Il leur a dit : Tuez tous les bébés garçons à Bethléem. Tuez aussi ceux qui vivent près de là. Tuez tous ceux qui ne sont pas âgés de plus de 2 ans. Hérode s’est souvenu du temps où ces hommes avaient d’abord vu l’étoile. Donc, Hérode a décidé de tuer les bébés garçons de cet âge. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De cette façon, les paroles que le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' Jérémie avait dites, se sont réalisées.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il avait dit :'
- type: usfm
  marker: m
  children:
  - type: text
    text: Les gens entendent une voix à Rama.
- type: usfm
  marker: p
  children:
  - type: text
    text: Une personne pleure. Elle est triste.
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est Rachel qui pleure ses enfants.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elle refuse d’être consolée :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Ses enfants sont morts.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph, Marie et Jésus retournent en Israël en provenance de l’Égypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après la mort d’Hérode, Joseph a fait un rêve. Un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' de Dieu lui est apparu en Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' lui a dit : Lève‑toi, prends l’enfant et sa mère. Rentre en Israël. Les gens qui voulaient tuer l’enfant sont maintenant morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Joseph s’est levé. Il a pris l’enfant et sa mère. Il est retourné avec eux en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Joseph a entendu dire qu’Archélaüs dirigeait maintenant la Judée. Archélaüs était le fils d’Hérode. Ainsi Joseph avait peur d’aller en Judée. Dieu lui a parlé de cela dans un autre rêve. Alors Joseph est allé rester avec eux dans la région de Galilée. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joseph est allé rester dans une ville appelée Nazareth. Donc, ce que les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' avaient dit, s’est réalisé : Il sera appelé une personne de Nazareth.'
