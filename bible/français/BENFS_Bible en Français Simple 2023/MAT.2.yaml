document_id: MAT.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Des hommes sages viennent visiter Jésus
  - type: text
    content: Jésus est né à Bethléem en Judée. A ce temps‑là, Hérode était roi de Judée. Peu après la naissance de Jésus, des hommes sages sont venus à Jérusalem. Ils venaient de l’est.
  '10':
  - type: text
    content: 'Quand ils ont vu encore l’étoile, ils étaient très contents. '
  '11':
  - type: text
    content: Les hommes sages sont entrés dans la maison. Ils ont vu l’enfant Jésus avec sa mère Marie. Ils se sont alors baissés devant l’enfant Jésus. Ils l’ont adoré. Ensuite, ils ont ouvert leurs sacs. Ils ont pris des cadeaux précieux. Ils les ont donnés à l’enfant Jésus. Les cadeaux étaient de l’or, de l’
  - type: text
    content: encens
  - type: text
    content: ' et de la myrrhe.'
  '12':
  - type: text
    content: 'Dieu leur a dit dans un rêve : Ne retournez pas voir Hérode. Les hommes sont alors retournés dans leur pays par un autre chemin.'
  - type: heading
    content: Marie, Joseph et Jésus vont en Égypte
  '13':
  - type: text
    content: 'Quand les hommes sages sont partis, un  '
  - type: text
    content: ange
  - type: text
    content: ' de Dieu est apparu à Joseph dans un rêve. Il lui a dit ceci : Hérode cherchera l’enfant. Il le fera tuer. Lève‑toi, prends l’enfant et sa mère avec toi. Fuis en Égypte. Je te dirai quand quitter l’Égypte.'
  '14':
  - type: text
    content: Joseph s’est levé. Il a pris l’enfant et sa mère. Il est parti avec eux en Égypte cette même nuit.
  '15':
  - type: text
    content: 'Ils sont tous restés en Égypte jusqu’à la mort d’Hérode. Ce qui est arrivé a confirmé cette parole du '
  - type: text
    content: prophète
  - type: text
    content: '  : J’ai appelé mon fils d’Égypte.'
  - type: heading
    content: Les soldats d’Hérode tuent les bébés garçons à Bethléem
  '16':
  - type: text
    content: 'Hérode a compris que les hommes sages l’avaient trompé. Il était très fâché. Il a envoyé ses soldats à Bethléem. Il leur a dit : Tuez tous les bébés garçons à Bethléem. Tuez aussi ceux qui vivent près de là. Tuez tous ceux qui ne sont pas âgés de plus de 2 ans. Hérode s’est souvenu du temps où ces hommes avaient d’abord vu l’étoile. Donc, Hérode a décidé de tuer les bébés garçons de cet âge. '
  '17':
  - type: text
    content: 'De cette façon, les paroles que le  '
  - type: text
    content: prophète
  - type: text
    content: ' Jérémie avait dites, se sont réalisées.'
  '18':
  - type: text
    content: 'Il avait dit :'
  - type: text
    content: Les gens entendent une voix à Rama.
  - type: text
    content: Une personne pleure. Elle est triste.
  - type: text
    content: C’est Rachel qui pleure ses enfants.
  - type: text
    content: 'Elle refuse d’être consolée :'
  - type: text
    content: Ses enfants sont morts.
  - type: heading
    content: Joseph, Marie et Jésus retournent en Israël en provenance de l’Égypte
  '19':
  - type: text
    content: 'Après la mort d’Hérode, Joseph a fait un rêve. Un '
  - type: text
    content: ange
  - type: text
    content: ' de Dieu lui est apparu en Égypte. '
  '2':
  - type: text
    content: 'Ces hommes ont demandé aux gens : Où est l’enfant qui est né comme roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ? Nous avons vu son étoile à l’est. Alors nous sommes venus plier nos genoux devant lui. Nous voulons lui dire combien il est grand et important.'
  '20':
  - type: text
    content: L’
  - type: text
    content: ange
  - type: text
    content: ' lui a dit : Lève‑toi, prends l’enfant et sa mère. Rentre en Israël. Les gens qui voulaient tuer l’enfant sont maintenant morts.'
  '21':
  - type: text
    content: 'Joseph s’est levé. Il a pris l’enfant et sa mère. Il est retourné avec eux en Israël. '
  '22':
  - type: text
    content: 'Mais Joseph a entendu dire qu’Archélaüs dirigeait maintenant la Judée. Archélaüs était le fils d’Hérode. Ainsi Joseph avait peur d’aller en Judée. Dieu lui a parlé de cela dans un autre rêve. Alors Joseph est allé rester avec eux dans la région de Galilée. '
  '23':
  - type: text
    content: 'Joseph est allé rester dans une ville appelée Nazareth. Donc, ce que les  '
  - type: text
    content: prophètes
  - type: text
    content: ' avaient dit, s’est réalisé : Il sera appelé une personne de Nazareth.'
  '3':
  - type: text
    content: 'Quand Hérode a appris cela, il était inquiet. Tous les gens de Jérusalem étaient aussi inquiets. '
  '4':
  - type: text
    content: 'Alors Hérode a appelé tous les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi de Dieu. Il leur a demandé : Le  '
  - type: text
    content: Christ
  - type: text
    content: ' naîtra où ? '
  '5':
  - type: text
    content: 'Ils ont répondu : Le  '
  - type: text
    content: Christ
  - type: text
    content: ' naîtra à Bethléem en Judée. Voici ce que le  '
  - type: text
    content: prophète
  - type: text
    content: ' a écrit à propos de Bethléem.'
  '6':
  - type: text
    content: 'Dieu a dit :'
  - type: text
    content: Mais toi, Bethléem sur la terre de Juda, tu n’es certainement pas la plus petite ville parmi les villes de Juda. Un dirigeant viendra de toi. Il guidera mon peuple Israël.
  '7':
  - type: text
    content: 'Alors Hérode a secrètement appelé les hommes sages. Il s’est renseigné auprès d’eux. Hérode voulait savoir le temps exact où l’étoile leur était apparue. Ainsi il les a envoyés à Bethléem. '
  '8':
  - type: text
    content: 'Il leur a dit : Allez vous renseigner sérieusement sur l’enfant. Et si vous le trouvez, venez me dire. Ensuite, j’irai aussi l’'
  - type: text
    content: adorer
  - type: text
    content: .
  '9':
  - type: text
    content: 'Les hommes sages ont écouté le roi Hérode. Après cela, ils ont quitté. L’étoile qu’ils avaient vue à l’est, allait devant eux. L’étoile s’est arrêtée au‑dessus du lieu où l’enfant était. '
