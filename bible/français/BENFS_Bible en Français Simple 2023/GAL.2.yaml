document_id: GAL.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: D’autres apôtres acceptent Paul
  - type: text
    content: 'Je suis allé de nouveau à Jérusalem après 14 ans. Cette fois‑ci, je suis allé avec Barnabas. J’ai aussi pris Tite avec moi. '
  '10':
  - type: text
    content: 'La seule chose qu’ils nous ont demandée de nous rappeler était ceci : Ils voulaient que nous nous souvenions d’aider les pauvres.'
  - type: text
    content: Et c’était la même chose que je tenais beaucoup à faire.
  - type: heading
    content: Paul est en colère contre Pierre à Antioche
  '11':
  - type: text
    content: 'Quand Pierre est venu à Antioche, j’étais en colère contre lui. Je me tenais devant lui. Je lui ai dit : Tu fais quelque chose de mal. '
  '12':
  - type: text
    content: Certains hommes étaient arrivés à Antioche avant. Pierre avait mangé des repas avec les croyants païens là‑bas. Puis Jacques a envoyé quelques hommes (Juifs) de Jérusalem à Antioche. Ces hommes sont arrivés. Mais Pierre a commencé à se séparer des païens.
  - type: text
    content: 'Il a arrêté de manger des repas avec eux, parce qu’il avait peur. Il avait peur de ces Juifs qui voulaient '
  - type: text
    content: circoncire
  - type: text
    content: ' tous les païens. '
  '13':
  - type: text
    content: Tous les autres Juifs croyants à Antioche avaient peur aussi. Donc, ils ont fait la même chose. Par conséquent, même Barnabas a fait cela.
  '14':
  - type: text
    content: 'Mais ils ne faisaient pas ce qui est vraiment bien. Et j’ai vu que ce n’était pas juste. Ils n’obéissaient pas au vrai message de la Bonne Nouvelle. Puis j’ai dit à Pierre en face de chacun d’eux ceci : Tu es un Juif. Tu te comportes comme un païen. Mais tu ne te comportes pas comme un '
  - type: text
    content: Juif
  - type: text
    content: '. Ne force donc pas les païens à obéir à la loi des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '15':
  - type: text
    content: Nous sommes nés Juifs. Nous ne sommes pas païens sans la loi.
  '16':
  - type: text
    content: Mais nous savons que ces règles ne peuvent pas faire une personne juste devant Dieu. Une personne devient juste devant Dieu quand elle croit vraiment en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Donc, nous aussi, nous sommes devenus croyants en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Cela nous permet d’être justes devant Dieu. Dieu nous accepte comme justes avec lui‑même, parce que nous croyons en '
  - type: text
    content: Christ
  - type: text
    content: '. Il ne nous accepte pas parce que nous obéissons aux règles des Juifs. Une personne peut seulement obéir aux règles des Juifs. Mais cela ne rend pas une personne juste devant Dieu. '
  '17':
  - type: text
    content: 'Alors, nous croyons que nous devenons justes devant Dieu par le '
  - type: text
    content: Christ
  - type: text
    content: '. Mais, en même temps, d’autres personnes peuvent voir que nous faisons de mauvaises choses. Mais cela ne signifie pas que le '
  - type: text
    content: Christ
  - type: text
    content: ' pousse les gens à faire de mauvaises choses. Vraiment, ça ne signifie pas cela !'
  '18':
  - type: text
    content: 'Je pourrais commencer à construire à nouveau les choses (les règles juives) que j’ai détruites. Mais cela allait montrer que j’obéis encore à toutes ces règles. '
  '19':
  - type: text
    content: Mais, par la suite, je suis mort de ces règles. Je suis mort d’elles. Par conséquent, je vis maintenant pour Dieu.
  '2':
  - type: text
    content: Je suis allé, parce que Dieu m’a commandé d’aller là. J’expliquais aux dirigeants chrétiens là‑bas la Bonne Nouvelle. Celle que j’enseignais aux païens.
  - type: text
    content: 'Mais je l’expliquais seulement aux hommes qui semblaient être des responsables. Je voulais leur faire comprendre le message que j’enseignais. Je voulais qu’ils l’acceptent. Je craignais ceci : Peut‑être, ils ne pourraient pas accepter cela. Je craignais que mon travail, à la fois dans le passé et maintenant, devienne sans importance. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: Christ
  - type: text
    content: ' est mort sur la croix, et je suis mort avec lui. Je ne vis plus, mais c’est '
  - type: text
    content: Christ
  - type: text
    content: ' qui vit en moi. La vie que je mène maintenant dans mon corps, je la vis par le Fils de Dieu. Je vis parce que le Fils de Dieu me fait croire en lui. Il m’aime et il s’est donné pour moi. '
  '21':
  - type: text
    content: 'Dieu a beaucoup fait pour nous, parce qu’il est très gentil. Et je ne refuse pas cela. Si les règles des Juifs m’ont fait juste avec Dieu, alors '
  - type: text
    content: Christ
  - type: text
    content: ' est mort pour rien !'
  '3':
  - type: text
    content: 'Tite était avec moi. Il était un homme grec (du pays appelé la Grèce). Mais les dirigeants de Jérusalem n’ont pas obligé de '
  - type: text
    content: circoncire
  - type: text
    content: ' Tite.'
  '4':
  - type: text
    content: 'Certains hommes sont venus secrètement à notre rencontre. Ils ne voulaient pas '
  - type: text
    content: circoncire
  - type: text
    content: ' Tite. Ces hommes disaient qu’ils étaient de croyants. Mais ils n’étaient pas vraiment de croyants. Ils cherchaient à savoir en qui nous croyions. Nous n’étions plus esclaves des règles juives. Alors ils voulaient voir cela. Nous sommes maintenant unis au '
  - type: text
    content: Christ
  - type: text
    content: . Ils voulaient nous faire esclaves de ces règles.
  '5':
  - type: text
    content: Mais nous n’étions pas d’accord avec ce qu’ils disaient. Même pas pour un moment. Nous voulions que les gens continuent à croire en la vraie Bonne Nouvelle.
  '6':
  - type: text
    content: 'Ces gens qui semblaient être les dirigeants ne se sont pas opposés à moi. Ils pouvaient être importants ou non, cela n’avait aucune importance pour moi. Dieu ne regarde pas l’extérieur comme les gens. Ces dirigeants ne m’obligeaient pas de dire plus. '
  '7':
  - type: text
    content: 'Non, au contraire, ils ont vu que Dieu m’avait donné un travail spécial, comme il l’avait fait à Pierre. Dieu voulait que je dise la Bonne Nouvelle au sujet de '
  - type: text
    content: Christ
  - type: text
    content: ' aux païens. Et il avait dit à Pierre de dire la Bonne Nouvelle aux Juifs. '
  '8':
  - type: text
    content: Dieu travaillait dans Pierre pour le faire un enseignant spécial des Juifs. Et Dieu travaillait aussi en moi pour me faire un enseignant spécial des païens.
  '9':
  - type: text
    content: Jacques, Pierre et Jean étaient des dirigeants importants. Ils étaient à Jérusalem. Ils ont compris que Dieu m’avait donné ce travail spécial. Donc, ils étaient heureux d’être amis avec Barnabas et moi. Nous étions tous apôtres. Ils ont accepté que nous devions aller vers les païens.
  - type: text
    content: 'Et eux‑mêmes devaient aller auprès des Juifs. '
