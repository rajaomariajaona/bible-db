document_id: GAL.2
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 2
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: D’autres apôtres acceptent Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je suis allé de nouveau à Jérusalem après 14 ans. Cette fois‑ci, je suis allé avec Barnabas. J’ai aussi pris Tite avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je suis allé, parce que Dieu m’a commandé d’aller là. J’expliquais aux dirigeants chrétiens là‑bas la Bonne Nouvelle. Celle que j’enseignais aux païens.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais je l’expliquais seulement aux hommes qui semblaient être des responsables. Je voulais leur faire comprendre le message que j’enseignais. Je voulais qu’ils l’acceptent. Je craignais ceci : Peut‑être, ils ne pourraient pas accepter cela. Je craignais que mon travail, à la fois dans le passé et maintenant, devienne sans importance. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tite était avec moi. Il était un homme grec (du pays appelé la Grèce). Mais les dirigeants de Jérusalem n’ont pas obligé de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: ' Tite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Certains hommes sont venus secrètement à notre rencontre. Ils ne voulaient pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: ' Tite. Ces hommes disaient qu’ils étaient de croyants. Mais ils n’étaient pas vraiment de croyants. Ils cherchaient à savoir en qui nous croyions. Nous n’étions plus esclaves des règles juives. Alors ils voulaient voir cela. Nous sommes maintenant unis au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Ils voulaient nous faire esclaves de ces règles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais nous n’étions pas d’accord avec ce qu’ils disaient. Même pas pour un moment. Nous voulions que les gens continuent à croire en la vraie Bonne Nouvelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ces gens qui semblaient être les dirigeants ne se sont pas opposés à moi. Ils pouvaient être importants ou non, cela n’avait aucune importance pour moi. Dieu ne regarde pas l’extérieur comme les gens. Ces dirigeants ne m’obligeaient pas de dire plus. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Non, au contraire, ils ont vu que Dieu m’avait donné un travail spécial, comme il l’avait fait à Pierre. Dieu voulait que je dise la Bonne Nouvelle au sujet de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' aux païens. Et il avait dit à Pierre de dire la Bonne Nouvelle aux Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu travaillait dans Pierre pour le faire un enseignant spécial des Juifs. Et Dieu travaillait aussi en moi pour me faire un enseignant spécial des païens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jacques, Pierre et Jean étaient des dirigeants importants. Ils étaient à Jérusalem. Ils ont compris que Dieu m’avait donné ce travail spécial. Donc, ils étaient heureux d’être amis avec Barnabas et moi. Nous étions tous apôtres. Ils ont accepté que nous devions aller vers les païens.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Et eux‑mêmes devaient aller auprès des Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La seule chose qu’ils nous ont demandée de nous rappeler était ceci : Ils voulaient que nous nous souvenions d’aider les pauvres.'
- type: usfm
  marker: m
  children:
  - type: text
    text: Et c’était la même chose que je tenais beaucoup à faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul est en colère contre Pierre à Antioche
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand Pierre est venu à Antioche, j’étais en colère contre lui. Je me tenais devant lui. Je lui ai dit : Tu fais quelque chose de mal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Certains hommes étaient arrivés à Antioche avant. Pierre avait mangé des repas avec les croyants païens là‑bas. Puis Jacques a envoyé quelques hommes (Juifs) de Jérusalem à Antioche. Ces hommes sont arrivés. Mais Pierre a commencé à se séparer des païens.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il a arrêté de manger des repas avec eux, parce qu’il avait peur. Il avait peur de ces Juifs qui voulaient '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: ' tous les païens. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tous les autres Juifs croyants à Antioche avaient peur aussi. Donc, ils ont fait la même chose. Par conséquent, même Barnabas a fait cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais ils ne faisaient pas ce qui est vraiment bien. Et j’ai vu que ce n’était pas juste. Ils n’obéissaient pas au vrai message de la Bonne Nouvelle. Puis j’ai dit à Pierre en face de chacun d’eux ceci : Tu es un Juif. Tu te comportes comme un païen. Mais tu ne te comportes pas comme un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: '. Ne force donc pas les païens à obéir à la loi des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nous sommes nés Juifs. Nous ne sommes pas païens sans la loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais nous savons que ces règles ne peuvent pas faire une personne juste devant Dieu. Une personne devient juste devant Dieu quand elle croit vraiment en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Donc, nous aussi, nous sommes devenus croyants en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Cela nous permet d’être justes devant Dieu. Dieu nous accepte comme justes avec lui‑même, parce que nous croyons en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il ne nous accepte pas parce que nous obéissons aux règles des Juifs. Une personne peut seulement obéir aux règles des Juifs. Mais cela ne rend pas une personne juste devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors, nous croyons que nous devenons justes devant Dieu par le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Mais, en même temps, d’autres personnes peuvent voir que nous faisons de mauvaises choses. Mais cela ne signifie pas que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' pousse les gens à faire de mauvaises choses. Vraiment, ça ne signifie pas cela !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je pourrais commencer à construire à nouveau les choses (les règles juives) que j’ai détruites. Mais cela allait montrer que j’obéis encore à toutes ces règles. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mais, par la suite, je suis mort de ces règles. Je suis mort d’elles. Par conséquent, je vis maintenant pour Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort sur la croix, et je suis mort avec lui. Je ne vis plus, mais c’est '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' qui vit en moi. La vie que je mène maintenant dans mon corps, je la vis par le Fils de Dieu. Je vis parce que le Fils de Dieu me fait croire en lui. Il m’aime et il s’est donné pour moi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dieu a beaucoup fait pour nous, parce qu’il est très gentil. Et je ne refuse pas cela. Si les règles des Juifs m’ont fait juste avec Dieu, alors '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort pour rien !'
