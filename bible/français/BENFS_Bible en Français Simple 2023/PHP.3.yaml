document_id: PHP.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Christ est plus important que tout
  - type: text
    content: 'Maintenant, mes frères, je veux vous dire ceci. Soyez heureux, parce que vous êtes unis au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il n’y a aucun problème pour moi de vous écrire les mêmes choses. Et ce sera plus sûr pour vous. '
  '10':
  - type: text
    content: 'La seule chose que je veux, est de connaître le '
  - type: text
    content: Christ
  - type: text
    content: . Il s’est levé, pour devenir de nouveau vivant, après sa mort. Et je veux savoir en moi‑même la puissance de sa nouvelle vie. Ainsi, je veux avoir des troubles et de la douleur, comme il l’a fait. Je veux devenir comme lui dans sa mort.
  '11':
  - type: text
    content: J’espère passer à la mort moi‑même. J’espère devenir de nouveau vivant après la mort, de sorte que je vive avec Dieu toujours.
  - type: heading
    content: Les chrétiens ne font pas partie de ce monde
  '12':
  - type: text
    content: Je ne dis pas que j’ai déjà obtenu toutes ces choses. Je ne suis pas encore devenu complètement comme Dieu veut que je sois. Je ne dis pas que je suis devenu comme ça déjà. Mais Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait de moi le sien. Et il est tout mon objectif. Je veux devenir complètement ce qu’il veut que je sois. Je suis comme quelqu’un qui court pour atteindre un certain point.'
  '13':
  - type: text
    content: 'Mes frères, je ne pense pas que je sois encore là. Mais une chose est ce que je fais. J’oublie les choses passées, qui sont derrière moi. Et je fais beaucoup de choses pour atteindre les choses qui sont en face de moi. '
  '14':
  - type: text
    content: 'Je cours tout droit vers ce point, de sorte que je puisse gagner le cadeau de Dieu. Dieu a choisi que je devrai vivre dans le '
  - type: text
    content: ciel
  - type: text
    content: . Ensuite, je serai uni à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Voilà son cadeau pour moi.
  '15':
  - type: text
    content: 'Donc, tous ceux qui ont appris à vivre correctement pour le '
  - type: text
    content: Christ
  - type: text
    content: ' doivent penser comme cela. Et si vous pensez différemment sur quoi que ce soit, Dieu le fera clair pour vous. '
  '16':
  - type: text
    content: Mais nous devons continuer de vivre comme nous avons vécu jusqu’à présent. Je veux dire que nous devons continuer d’obéir à Dieu. Nous devons continuer de faire ce que Dieu veut.
  '17':
  - type: text
    content: 'Mes frères, vous devez tous essayer de faire ce que je fais. Aussi, regardez tous les autres qui, comme moi, obéissent à Dieu. Et essayez de faire ce qu’ils font. Essayez d’être comme nous. '
  '18':
  - type: text
    content: 'Beaucoup de gens vivent comme des ennemis de la mort de '
  - type: text
    content: Christ
  - type: text
    content: ' sur la croix. Je vous ai dit à propos de ces gens plusieurs fois avant. Et je pleure quand je vous parle de cela. '
  '19':
  - type: text
    content: 'Dieu doit les détruire. Leur dieu est leur estomac. Ils font de mauvaises choses qui devraient leur faire honte. Mais ils n’ont pas honte. Au lieu de cela, ils sont heureux parce qu’ils font ces mauvaises choses. Ils font de mauvaises choses comme ça. Et ils pensent qu’ils sont intelligents à cause de cela. Ils ne pensent qu’aux choses qui appartiennent à ce monde. '
  '2':
  - type: text
    content: 'Certaines personnes enseignent de mauvaises choses. Ils disent que vous devez couper vos corps. Ils sont comme des chiens dangereux. Soyez très prudents, ne croyez pas en eux. '
  '20':
  - type: text
    content: 'Mais nous appartenons au '
  - type: text
    content: ciel
  - type: text
    content: '. Notre maison n’est pas vraiment dans ce monde. Nous attendons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', qui nous sauve des conséquences du péché, de venir du '
  - type: text
    content: ciel
  - type: text
    content: '. Nous voulons vraiment qu’il vienne. '
  '21':
  - type: text
    content: 'Il va changer ces pauvres corps que nous avons maintenant sur cette terre. Il fera notre corps comme son beau corps dans le '
  - type: text
    content: ciel
  - type: text
    content: '. '
  - type: text
    content: Christ
  - type: text
    content: ' peut le faire, parce qu’il est si puissant. Il est si puissant qu’il peut régner sur tout.'
  '3':
  - type: text
    content: 'Ils ne sont pas vraiment le peuple de Dieu. Mais nous sommes le peuple de Dieu, parce que Dieu lui‑même nous a circoncis. Nous sommes vraiment son peuple, parce que nous l’adorons par son '
  - type: text
    content: Esprit
  - type: text
    content: . Nous remercions Dieu à cause de ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait pour nous. Nous ne mettons pas notre confiance en la chair.'
  '4':
  - type: text
    content: 'Je pouvais penser que je suis bon. Je ne pouvais pas penser que je pourrais me sauver des résultats du péché à cause de cela. J’ai de bonnes raisons de penser comme ça. J’ai de meilleures raisons de penser comme ça que quelqu’un d’autre. '
  '5':
  - type: text
    content: 'Je fais partie du peuple d’Israël, du groupe de la famille de Benjamin. Je suis tout à fait un '
  - type: text
    content: Juif
  - type: text
    content: '. Ils m’avaient circoncis quand j’avais 8 jours. Dieu avait donné ses règles au peuple d’Israël. Elles étaient très importantes pour moi. J’étais un '
  - type: text
    content: Pharisien
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Je voulais vraiment être un bon '
  - type: text
    content: Juif
  - type: text
    content: . Alors je faisais beaucoup de problèmes aux chrétiens. J’obéissais très attentivement à toutes les règles de Dieu. Je faisais tout ce qui est juste selon les règles.
  '7':
  - type: text
    content: 'Mais toutes ces choses étaient très importantes pour moi. Mais elles ne valent plus rien pour moi maintenant, à cause de '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Et ce ne sont pas seulement ces choses qui ne valent rien pour moi. Maintenant, je pense que toutes les choses ne valent rien, à cause du '
  - type: text
    content: Christ
  - type: text
    content: . La seule chose vraiment importante pour moi est de connaître Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', mon '
  - type: text
    content: Seigneur
  - type: text
    content: '. C’est la chose la plus importante. J’ai tout perdu pour lui. Mais toutes les choses que j’ai perdues sont comme de la saleté pour moi. Je les ai laissées pour avoir '
  - type: text
    content: Christ
  - type: text
    content: .
  '9':
  - type: text
    content: 'Je peux être uni à lui. Ainsi, je serai complètement en accord avec Dieu. Si j’obéis à toutes les règles de Dieu, je ne pourrais jamais devenir juste avec Dieu. Seul Dieu peut me faire juste avec lui‑même, parce que je crois en '
  - type: text
    content: Christ
  - type: text
    content: .
