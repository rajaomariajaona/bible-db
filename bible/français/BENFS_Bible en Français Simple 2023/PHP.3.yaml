document_id: PHP.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est plus important que tout'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Maintenant, mes frères, je veux vous dire ceci. Soyez heureux, parce que vous êtes unis au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il n’y a aucun problème pour moi de vous écrire les mêmes choses. Et ce sera plus sûr pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Certaines personnes enseignent de mauvaises choses. Ils disent que vous devez couper vos corps. Ils sont comme des chiens dangereux. Soyez très prudents, ne croyez pas en eux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils ne sont pas vraiment le peuple de Dieu. Mais nous sommes le peuple de Dieu, parce que Dieu lui‑même nous a circoncis. Nous sommes vraiment son peuple, parce que nous l’adorons par son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: . Nous remercions Dieu à cause de ce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait pour nous. Nous ne mettons pas notre confiance en la chair.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je pouvais penser que je suis bon. Je ne pouvais pas penser que je pourrais me sauver des résultats du péché à cause de cela. J’ai de bonnes raisons de penser comme ça. J’ai de meilleures raisons de penser comme ça que quelqu’un d’autre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je fais partie du peuple d’Israël, du groupe de la famille de Benjamin. Je suis tout à fait un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: '. Ils m’avaient circoncis quand j’avais 8 jours. Dieu avait donné ses règles au peuple d’Israël. Elles étaient très importantes pour moi. J’étais un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisien
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je voulais vraiment être un bon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: . Alors je faisais beaucoup de problèmes aux chrétiens. J’obéissais très attentivement à toutes les règles de Dieu. Je faisais tout ce qui est juste selon les règles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais toutes ces choses étaient très importantes pour moi. Mais elles ne valent plus rien pour moi maintenant, à cause de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et ce ne sont pas seulement ces choses qui ne valent rien pour moi. Maintenant, je pense que toutes les choses ne valent rien, à cause du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . La seule chose vraiment importante pour moi est de connaître Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. C’est la chose la plus importante. J’ai tout perdu pour lui. Mais toutes les choses que j’ai perdues sont comme de la saleté pour moi. Je les ai laissées pour avoir '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je peux être uni à lui. Ainsi, je serai complètement en accord avec Dieu. Si j’obéis à toutes les règles de Dieu, je ne pourrais jamais devenir juste avec Dieu. Seul Dieu peut me faire juste avec lui‑même, parce que je crois en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La seule chose que je veux, est de connaître le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il s’est levé, pour devenir de nouveau vivant, après sa mort. Et je veux savoir en moi‑même la puissance de sa nouvelle vie. Ainsi, je veux avoir des troubles et de la douleur, comme il l’a fait. Je veux devenir comme lui dans sa mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J’espère passer à la mort moi‑même. J’espère devenir de nouveau vivant après la mort, de sorte que je vive avec Dieu toujours.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens ne font pas partie de ce monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je ne dis pas que j’ai déjà obtenu toutes ces choses. Je ne suis pas encore devenu complètement comme Dieu veut que je sois. Je ne dis pas que je suis devenu comme ça déjà. Mais Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait de moi le sien. Et il est tout mon objectif. Je veux devenir complètement ce qu’il veut que je sois. Je suis comme quelqu’un qui court pour atteindre un certain point.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mes frères, je ne pense pas que je sois encore là. Mais une chose est ce que je fais. J’oublie les choses passées, qui sont derrière moi. Et je fais beaucoup de choses pour atteindre les choses qui sont en face de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je cours tout droit vers ce point, de sorte que je puisse gagner le cadeau de Dieu. Dieu a choisi que je devrai vivre dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Ensuite, je serai uni à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Voilà son cadeau pour moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Donc, tous ceux qui ont appris à vivre correctement pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' doivent penser comme cela. Et si vous pensez différemment sur quoi que ce soit, Dieu le fera clair pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais nous devons continuer de vivre comme nous avons vécu jusqu’à présent. Je veux dire que nous devons continuer d’obéir à Dieu. Nous devons continuer de faire ce que Dieu veut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mes frères, vous devez tous essayer de faire ce que je fais. Aussi, regardez tous les autres qui, comme moi, obéissent à Dieu. Et essayez de faire ce qu’ils font. Essayez d’être comme nous. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Beaucoup de gens vivent comme des ennemis de la mort de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur la croix. Je vous ai dit à propos de ces gens plusieurs fois avant. Et je pleure quand je vous parle de cela. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dieu doit les détruire. Leur dieu est leur estomac. Ils font de mauvaises choses qui devraient leur faire honte. Mais ils n’ont pas honte. Au lieu de cela, ils sont heureux parce qu’ils font ces mauvaises choses. Ils font de mauvaises choses comme ça. Et ils pensent qu’ils sont intelligents à cause de cela. Ils ne pensent qu’aux choses qui appartiennent à ce monde. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais nous appartenons au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Notre maison n’est pas vraiment dans ce monde. Nous attendons le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', qui nous sauve des conséquences du péché, de venir du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Nous voulons vraiment qu’il vienne. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il va changer ces pauvres corps que nous avons maintenant sur cette terre. Il fera notre corps comme son beau corps dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' peut le faire, parce qu’il est si puissant. Il est si puissant qu’il peut régner sur tout.'
