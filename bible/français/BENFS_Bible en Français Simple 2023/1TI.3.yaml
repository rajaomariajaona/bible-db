  '8':
  - type: text
    content: 'De la même manière, les diacres doivent mener une bonne vie, afin que les gens les respectent. Ils ne doivent pas être '
  - type: text
    content: hypocrites
  - type: text
    content: '. Ils ne doivent pas boire trop de vin. Ils ne doivent pas vouloir gagner beaucoup d’argent pour eux‑mêmes. '
  '9':
  - type: text
    content: 'Ils doivent croire complètement au message de Dieu qu’il nous a montré à propos de '
  - type: text
    content: Christ
  - type: text
    content: '. Ils ne doivent pas avoir honte de ce vrai message. '
