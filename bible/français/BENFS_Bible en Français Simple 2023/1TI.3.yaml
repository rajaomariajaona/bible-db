  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Les dirigeants de l’Église
  - type: text
    content: 'Ces paroles sont vraies : Si quelqu’un veut devenir un responsable du peuple de Dieu, c’est un travail important qu’il veut faire. '
  '10':
  - type: text
    content: Avant que quiconque devienne diacre, vous devez d’abord vérifier qu’il est apte à servir Dieu de cette manière. S’il est capable, alors laissez‑le travailler comme diacre.
  '11':
  - type: text
    content: Les épouses des diacres doivent mener une bonne vie, afin que les gens les respectent. Elles ne doivent pas dire de mauvaises choses contre les gens. Elles doivent bien réfléchir à la façon dont elles vivent. Les gens doivent savoir qu’elles sont honnêtes dans tout ce qu’elles font.
  '12':
  - type: text
    content: 'Un diacre doit être le mari d’une seule femme. Il doit bien prendre soin de ses enfants et de toute sa famille. '
  '13':
  - type: text
    content: 'Si un diacre sert bien le peuple de Dieu, alors les gens le respecteront comme une bonne personne. Il deviendra fort pour parler aux gens de sa '
  - type: text
    content: foi
  - type: text
    content: ' en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '14':
  - type: text
    content: 'J’espère venir bientôt te rendre visite. Mais de toute façon, je veux t’écrire ces choses maintenant. '
  '15':
  - type: text
    content: Alors, même si je ne peux pas venir bientôt, tu sauras comment les gens de la famille de Dieu doivent vivre. Cette famille est l’Église de Dieu, qui vit pour toujours. La famille de Dieu, l’Église, enseigne le vrai message de Dieu et le garde en sécurité.
  '16':
  - type: text
    content: Oui, le message que Dieu nous a montré sur Jésus‑
  - type: text
