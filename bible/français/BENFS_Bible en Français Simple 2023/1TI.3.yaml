verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dirigeants de l’Église
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces paroles sont vraies : Si quelqu’un veut devenir un responsable du peuple de Dieu, c’est un travail important qu’il veut faire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avant que quiconque devienne diacre, vous devez d’abord vérifier qu’il est apte à servir Dieu de cette manière. S’il est capable, alors laissez‑le travailler comme diacre.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les épouses des diacres doivent mener une bonne vie, afin que les gens les respectent. Elles ne doivent pas dire de mauvaises choses contre les gens. Elles doivent bien réfléchir à la façon dont elles vivent. Les gens doivent savoir qu’elles sont honnêtes dans tout ce qu’elles font.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un diacre doit être le mari d’une seule femme. Il doit bien prendre soin de ses enfants et de toute sa famille. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un diacre sert bien le peuple de Dieu, alors les gens le respecteront comme une bonne personne. Il deviendra fort pour parler aux gens de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’espère venir bientôt te rendre visite. Mais de toute façon, je veux t’écrire ces choses maintenant. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, même si je ne peux pas venir bientôt, tu sauras comment les gens de la famille de Dieu doivent vivre. Cette famille est l’Église de Dieu, qui vit pour toujours. La famille de Dieu, l’Église, enseigne le vrai message de Dieu et le garde en sécurité.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, le message que Dieu nous a montré sur Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est très grand. Personne ne peut contester cela. Nous sommes tous d’accord sur ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu nous l’a montré en tant qu’homme.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu a montré qu’il faisait toujours ce qui était bien.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' l’ont vu.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens ont enseigné son message dans de nombreux pays du monde.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens du monde croyaient en lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu l’a amené à être avec lui‑même dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour cette raison, un responsable de l’Église doit mener une vie que tout le monde sait bonne. Il doit être le mari d’une femme. Il doit réfléchir sérieusement à la façon dont il vit et il doit bien se diriger. Il doit être quelqu’un qui respecte les gens. Il doit être content d’avoir des visiteurs chez lui. Il doit être un bon enseignant.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne doit pas boire trop de vin. Il ne doit pas se mettre rapidement en colère ou se quereller avec les gens. Mais, il doit être gentil avec les gens. Il ne doit pas vouloir beaucoup d’argent. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il doit prendre soin de sa propre famille. Ses enfants doivent lui obéir et le respecter. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il doit savoir comment prendre soin de sa propre famille. S’il ne peut pas faire cela, il ne pourra pas prendre soin du peuple de Dieu dans l’Église.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un dirigeant de l’Église ne doit pas être quelqu’un qui n’a cru au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' que pendant une courte période. Quelqu’un comme ça pourrait penser qu’il est devenu grand et important. Ensuite, il sera puni, comme le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, les gens en dehors de l’Église doivent accepter que le dirigeant est une bonne personne. Alors personne ne peut rien dire de mal contre lui. Et donc, il ne sera pas soumis au pouvoir du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: diable
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les aides dans l’Église
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De la même manière, les diacres doivent mener une bonne vie, afin que les gens les respectent. Ils ne doivent pas être '
    - type: usfm
      marker: w
      children:
      - type: text
        text: hypocrites
    - type: text
      text: '. Ils ne doivent pas boire trop de vin. Ils ne doivent pas vouloir gagner beaucoup d’argent pour eux‑mêmes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils doivent croire complètement au message de Dieu qu’il nous a montré à propos de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Ils ne doivent pas avoir honte de ce vrai message. '
