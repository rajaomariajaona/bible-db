  '2':
  - type: text
    content: Pour cette raison, un responsable de l’Église doit mener une vie que tout le monde sait bonne. Il doit être le mari d’une femme. Il doit réfléchir sérieusement à la façon dont il vit et il doit bien se diriger. Il doit être quelqu’un qui respecte les gens. Il doit être content d’avoir des visiteurs chez lui. Il doit être un bon enseignant.
  '3':
  - type: text
    content: 'Il ne doit pas boire trop de vin. Il ne doit pas se mettre rapidement en colère ou se quereller avec les gens. Mais, il doit être gentil avec les gens. Il ne doit pas vouloir beaucoup d’argent. '
  '4':
  - type: text
    content: 'Il doit prendre soin de sa propre famille. Ses enfants doivent lui obéir et le respecter. '
  '5':
  - type: text
    content: Il doit savoir comment prendre soin de sa propre famille. S’il ne peut pas faire cela, il ne pourra pas prendre soin du peuple de Dieu dans l’Église.
  '6':
  - type: text
    content: 'Un dirigeant de l’Église ne doit pas être quelqu’un qui n’a cru au '
  - type: text
    content: Christ
  - type: text
    content: ' que pendant une courte période. Quelqu’un comme ça pourrait penser qu’il est devenu grand et important. Ensuite, il sera puni, comme le '
  - type: text
    content: diable
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'De plus, les gens en dehors de l’Église doivent accepter que le dirigeant est une bonne personne. Alors personne ne peut rien dire de mal contre lui. Et donc, il ne sera pas soumis au pouvoir du '
  - type: text
    content: diable
  - type: text
    content: .
