document_id: 2CO.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A cause de cela, j’ai décidé de ne plus vous rendre visite à ce moment‑là. Je ne voulais pas vous rendre triste. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quand vous pardonnez à quelqu’un, je pardonne aussi à cette personne. Quelle que soit la mauvaise chose que quelqu’un a faite, j’ai le pouvoir de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' pour lui pardonner. Et je le fais pour vous aider. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nous ne voulons pas que Satan gagne contre nous. Il est très intelligent. Nous savons à quel point il aime nous causer des problèmes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Bonne Nouvelle de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je suis allé à Troas pour dire aux gens la Bonne Nouvelle de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Quand je suis arrivé là‑bas, j’ai découvert que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait déjà préparé les gens à écouter. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mais je n’étais pas content dans mes pensées, parce que je n’ai pas trouvé mon ami Tite là. Alors, j’ai dit au revoir à ces gens et je suis allé en Macédoine.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais je remercie Dieu ! Il a gagné contre le péché, grâce à ce que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' avait fait. Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est notre dirigeant et nous montrons qu’il est le vainqueur. Nous aidons également les gens à connaître Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Cette connaissance est comme une bonne odeur qui vient partout dans le monde. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lorsque nous parlons de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' aux gens, nous sommes comme une bonne odeur qui monte vers Dieu. Nous sommes comme cela parmi les gens que Dieu sauve. Nous sommes aussi comme cela parmi les gens qui meurent, parce qu’ils sont loin de Dieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Pour les gens qui meurent, nous sommes comme une mauvaise odeur qui apporte un message de mort. Mais pour les gens que Dieu sauve, nous sommes comme une bonne odeur qui apporte un message de vie nouvelle.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne n’est vraiment assez bon pour dire un message aussi important ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Certaines personnes disent même le message de Dieu, parce qu’elles veulent obtenir beaucoup d’argent pour elles‑mêmes. Mais nous ne sommes pas comme ces gens. Non, Dieu lui‑même nous a envoyés pour faire ce travail. Et il voit ce que nous faisons. Donc, nous sommes honnêtes et nous exprimons clairement le message de Dieu, comme les serviteurs de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' devraient le faire.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Vous êtes les seules personnes à me rendre heureux. Donc, si je vous rends tristes, il n’y aura personne pour me rendre heureux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est pourquoi je ne vous ai pas visités. Je vous ai plutôt écrit cette lettre. Vous êtes le peuple qui devrait me rendre heureux. Je ne voulais pas que vous me rendiez triste, quand je vous ai rendu visite. Je me sentais sûr de vous tous. Je savais que si j’étais heureux, vous serez tous heureux aussi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Lorsque j’ai écrit cette lettre, j’étais très triste et troublé. J’ai beaucoup pleuré. Je ne voulais pas vous rendre tristes. Mais, je voulais que vous sachiez que je vous aime beaucoup.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Quelqu’un parmi vous a fait des choses qui ont rendu les autres tristes. Il m’a rendu triste. Mais vraiment, il vous a tous rendus beaucoup plus tristes que moi. Je veux dire seulement ce qui est nécessaire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'La plupart d’entre vous ont accepté de le punir. Cela devrait suffire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Maintenant, vous devez lui pardonner. Vous devez l’encourager. Si vous ne le faites pas, il peut devenir trop triste. Il peut ne pas être capable de penser correctement. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Donc, je vous dis ceci : Veuillez lui montrer que vous l’aimez vraiment.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lorsque je vous ai écrit cette lettre, je voulais savoir ce que vous devrez faire. Je voulais voir si vous ferez tout ce que je vous ai dit. '
