document_id: 2CO.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: text
    content: 'A cause de cela, j’ai décidé de ne plus vous rendre visite à ce moment‑là. Je ne voulais pas vous rendre triste. '
  '10':
  - type: text
    content: Quand vous pardonnez à quelqu’un, je pardonne aussi à cette personne. Quelle que soit la mauvaise chose que quelqu’un a faite, j’ai le pouvoir de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' pour lui pardonner. Et je le fais pour vous aider. '
  '11':
  - type: text
    content: Nous ne voulons pas que Satan gagne contre nous. Il est très intelligent. Nous savons à quel point il aime nous causer des problèmes.
  - type: heading
    content: La Bonne Nouvelle de Jésus‑Christ
  '12':
  - type: text
    content: Je suis allé à Troas pour dire aux gens la Bonne Nouvelle de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Quand je suis arrivé là‑bas, j’ai découvert que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait déjà préparé les gens à écouter. '
  '13':
  - type: text
    content: Mais je n’étais pas content dans mes pensées, parce que je n’ai pas trouvé mon ami Tite là. Alors, j’ai dit au revoir à ces gens et je suis allé en Macédoine.
  '14':
  - type: text
    content: Mais je remercie Dieu ! Il a gagné contre le péché, grâce à ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' avait fait. Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est notre dirigeant et nous montrons qu’il est le vainqueur. Nous aidons également les gens à connaître Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. Cette connaissance est comme une bonne odeur qui vient partout dans le monde. '
  '15':
  - type: text
    content: Lorsque nous parlons de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' aux gens, nous sommes comme une bonne odeur qui monte vers Dieu. Nous sommes comme cela parmi les gens que Dieu sauve. Nous sommes aussi comme cela parmi les gens qui meurent, parce qu’ils sont loin de Dieu. '
  '16':
  - type: text
    content: Pour les gens qui meurent, nous sommes comme une mauvaise odeur qui apporte un message de mort. Mais pour les gens que Dieu sauve, nous sommes comme une bonne odeur qui apporte un message de vie nouvelle.
  - type: text
    content: 'Personne n’est vraiment assez bon pour dire un message aussi important ! '
  '17':
  - type: text
    content: Certaines personnes disent même le message de Dieu, parce qu’elles veulent obtenir beaucoup d’argent pour elles‑mêmes. Mais nous ne sommes pas comme ces gens. Non, Dieu lui‑même nous a envoyés pour faire ce travail. Et il voit ce que nous faisons. Donc, nous sommes honnêtes et nous exprimons clairement le message de Dieu, comme les serviteurs de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' devraient le faire.'
  '2':
  - type: text
    content: 'Vous êtes les seules personnes à me rendre heureux. Donc, si je vous rends tristes, il n’y aura personne pour me rendre heureux. '
  '3':
  - type: text
    content: C’est pourquoi je ne vous ai pas visités. Je vous ai plutôt écrit cette lettre. Vous êtes le peuple qui devrait me rendre heureux. Je ne voulais pas que vous me rendiez triste, quand je vous ai rendu visite. Je me sentais sûr de vous tous. Je savais que si j’étais heureux, vous serez tous heureux aussi.
  '4':
  - type: text
    content: Lorsque j’ai écrit cette lettre, j’étais très triste et troublé. J’ai beaucoup pleuré. Je ne voulais pas vous rendre tristes. Mais, je voulais que vous sachiez que je vous aime beaucoup.
  '5':
  - type: text
    content: 'Quelqu’un parmi vous a fait des choses qui ont rendu les autres tristes. Il m’a rendu triste. Mais vraiment, il vous a tous rendus beaucoup plus tristes que moi. Je veux dire seulement ce qui est nécessaire. '
  '6':
  - type: text
    content: 'La plupart d’entre vous ont accepté de le punir. Cela devrait suffire. '
  '7':
  - type: text
    content: 'Maintenant, vous devez lui pardonner. Vous devez l’encourager. Si vous ne le faites pas, il peut devenir trop triste. Il peut ne pas être capable de penser correctement. '
  '8':
  - type: text
    content: 'Donc, je vous dis ceci : Veuillez lui montrer que vous l’aimez vraiment.'
  '9':
  - type: text
    content: 'Lorsque je vous ai écrit cette lettre, je voulais savoir ce que vous devrez faire. Je voulais voir si vous ferez tout ce que je vous ai dit. '
