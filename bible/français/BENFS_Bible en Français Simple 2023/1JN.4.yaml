document_id: 1JN.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' et les faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes amis, ne croyez pas à tous ceux qui disent le message de Dieu. Il y a beaucoup de faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' qui voyagent partout. Ils se disent avoir un message de l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu, mais c’est vraiment un faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Alors, vérifiez attentivement leur message pour voir s’il vient vraiment de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comment savez‑vous si une personne a l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu en elle ? Elle doit accepter que Jésus est le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' spécial de Dieu qui est né comme un bébé. Si quelqu’un dit cela, alors il a l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais si quelqu’un refuse de dire cela sur Jésus, il n’a pas l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. Cette personne a un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' qui vient de l’ennemi de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Vous avez entendu que cet ennemi de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' viendra parmi nous. Maintenant, il est déjà ici dans le monde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mes petits enfants, vous appartenez à Dieu. Vous avez gagné contre ces gens qui ont un faux message. Vous avez pu faire cela, parce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu est en vous. Il est plus puissant que l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' qui appartient à ce monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ces faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' appartiennent à ce monde. Leur message vient de la façon dont les gens de ce monde pensent. Ainsi, les gens de ce monde croient à ce qu’ils enseignent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais nous, nous appartenons à Dieu. Toute personne qui connaît Dieu croit à notre message. Mais toute personne qui n’appartient pas à Dieu, ne croit pas à notre message.
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est ainsi que nous savons si le message de quelqu’un vient de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu ou non. L’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu nous apporte un vrai message, mais les faux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' disent des mensonges.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aimons‑nous les uns les autres, parce que Dieu nous a aimés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mes amis, nous devons tous nous aimer. C’est Dieu qui nous rend capables d’aimer les autres. Toute personne qui aime les autres devient enfant de Dieu. Cette personne connaît Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Toute personne qui n’aime pas les autres ne connaît pas Dieu. Nous le savons parce que l’amour est la propre nature de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu a montré qu’il nous aime ainsi : Il a envoyé son Fils unique pour venir vivre dans le monde. Il l’a fait pour que nous puissions avoir une vraie vie avec Dieu, parce que nous croyons en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela montre ce que l’amour est vraiment : Ce n’est pas que nous avons aimé Dieu, mais qu’il nous a aimés. Il nous aime beaucoup. Alors, il a envoyé son Fils pour nous sauver du péché. Il a envoyé Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' mourir en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour nos péchés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mes amis, cela montre combien Dieu nous a aimés. Alors, nous devons tous nous aimer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Personne n’a jamais vu Dieu. Mais, si nous nous aimons, cela montre que Dieu vit vraiment en nous. Ensuite, nous pouvons aimer les gens complètement, comme Dieu nous aime. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dieu nous a donné son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' pour vivre en nous. Pour cette raison, nous savons que nous sommes unis à Dieu. Et nous savons qu’il est uni à nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dieu le Père a envoyé son Fils pour venir dans le monde. Dieu l’a envoyé pour sauver les peuples du monde de leurs péchés. Nous, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ', nous avons vu que c’est vrai, et maintenant nous en parlons aux gens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si quelqu’un dit clairement que Jésus est le Fils de Dieu, il est uni à Dieu. Dieu est également uni à cette personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous connaissons vraiment le genre d’amour que Dieu a pour nous. Nous croyons que Dieu a mis cet amour en nous. La nature de Dieu est amour. Donc, si quelqu’un continue d’aimer les autres, il est uni à Dieu. Et Dieu est uni à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est ainsi que nous pouvons aimer complètement les autres. Ensuite, nous n’aurons pas peur le jour où Dieu jugera tout le monde. Nous pouvons être sûrs que Dieu ne nous punira pas. Nous le savons parce que nous avons vécu dans ce monde comme Jésus a vécu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si nous aimons vraiment Dieu, nous n’aurons pas peur de lui. Nous ne pouvons pas l’aimer complètement et avoir aussi peur. Nous pourrions avoir peur de Dieu, seulement si nous pensions qu’il nous punira. Donc, si quelqu’un a peur que Dieu le punisse, cela montre qu’il ne connaît pas complètement l’amour de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nous pouvons aimer Dieu et les autres, parce que Dieu nous a aimés le premier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quelqu’un peut dire : J’aime Dieu. Mais s’il dit cela et qu’il déteste les autres chrétiens, il ment. Il peut voir d’autres croyants, mais il ne les aime pas. Il ne peut donc pas aimer Dieu qu’il n’a pas vu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C’est la règle que Dieu nous a donnée. Il nous a dit que toute personne qui l’aime, doit aussi aimer les autres chrétiens.
