verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Le Saint‑Esprit et les faux esprits
  - type: text
    content: 'Mes amis, ne croyez pas à tous ceux qui disent le message de Dieu. Il y a beaucoup de faux '
  - type: text
    content: prophètes
  - type: text
    content: ' qui voyagent partout. Ils se disent avoir un message de l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu, mais c’est vraiment un faux '
  - type: text
    content: esprit
  - type: text
    content: . Alors, vérifiez attentivement leur message pour voir s’il vient vraiment de Dieu.
  '10':
  - type: text
    content: 'Cela montre ce que l’amour est vraiment : Ce n’est pas que nous avons aimé Dieu, mais qu’il nous a aimés. Il nous aime beaucoup. Alors, il a envoyé son Fils pour nous sauver du péché. Il a envoyé Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' mourir en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nos péchés.'
  '11':
  - type: text
    content: Mes amis, cela montre combien Dieu nous a aimés. Alors, nous devons tous nous aimer.
  '12':
  - type: text
    content: 'Personne n’a jamais vu Dieu. Mais, si nous nous aimons, cela montre que Dieu vit vraiment en nous. Ensuite, nous pouvons aimer les gens complètement, comme Dieu nous aime. '
  '13':
  - type: text
    content: 'Dieu nous a donné son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' pour vivre en nous. Pour cette raison, nous savons que nous sommes unis à Dieu. Et nous savons qu’il est uni à nous. '
  '14':
  - type: text
    content: 'Dieu le Père a envoyé son Fils pour venir dans le monde. Dieu l’a envoyé pour sauver les peuples du monde de leurs péchés. Nous, les '
  - type: text
    content: apôtres
  - type: text
    content: ', nous avons vu que c’est vrai, et maintenant nous en parlons aux gens.'
  '15':
  - type: text
    content: 'Si quelqu’un dit clairement que Jésus est le Fils de Dieu, il est uni à Dieu. Dieu est également uni à cette personne. '
  '16':
  - type: text
    content: 'Nous connaissons vraiment le genre d’amour que Dieu a pour nous. Nous croyons que Dieu a mis cet amour en nous. La nature de Dieu est amour. Donc, si quelqu’un continue d’aimer les autres, il est uni à Dieu. Et Dieu est uni à lui. '
  '17':
  - type: text
    content: C’est ainsi que nous pouvons aimer complètement les autres. Ensuite, nous n’aurons pas peur le jour où Dieu jugera tout le monde. Nous pouvons être sûrs que Dieu ne nous punira pas. Nous le savons parce que nous avons vécu dans ce monde comme Jésus a vécu.
  '18':
  - type: text
    content: Si nous aimons vraiment Dieu, nous n’aurons pas peur de lui. Nous ne pouvons pas l’aimer complètement et avoir aussi peur. Nous pourrions avoir peur de Dieu, seulement si nous pensions qu’il nous punira. Donc, si quelqu’un a peur que Dieu le punisse, cela montre qu’il ne connaît pas complètement l’amour de Dieu.
  '19':
  - type: text
    content: 'Nous pouvons aimer Dieu et les autres, parce que Dieu nous a aimés le premier. '
  '2':
  - type: text
    content: Comment savez‑vous si une personne a l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu en elle ? Elle doit accepter que Jésus est le '
  - type: text
    content: Messie
  - type: text
    content: ' spécial de Dieu qui est né comme un bébé. Si quelqu’un dit cela, alors il a l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. '
  '20':
  - type: text
    content: 'Quelqu’un peut dire : J’aime Dieu. Mais s’il dit cela et qu’il déteste les autres chrétiens, il ment. Il peut voir d’autres croyants, mais il ne les aime pas. Il ne peut donc pas aimer Dieu qu’il n’a pas vu. '
  '21':
  - type: text
    content: C’est la règle que Dieu nous a donnée. Il nous a dit que toute personne qui l’aime, doit aussi aimer les autres chrétiens.
  '3':
  - type: text
    content: Mais si quelqu’un refuse de dire cela sur Jésus, il n’a pas l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Cette personne a un '
  - type: text
    content: esprit
  - type: text
    content: ' qui vient de l’ennemi de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Vous avez entendu que cet ennemi de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' viendra parmi nous. Maintenant, il est déjà ici dans le monde.'
  '4':
  - type: text
    content: 'Mes petits enfants, vous appartenez à Dieu. Vous avez gagné contre ces gens qui ont un faux message. Vous avez pu faire cela, parce que le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu est en vous. Il est plus puissant que l’'
  - type: text
    content: esprit
  - type: text
    content: ' qui appartient à ce monde. '
  '5':
  - type: text
    content: 'Ces faux '
  - type: text
    content: prophètes
  - type: text
    content: ' appartiennent à ce monde. Leur message vient de la façon dont les gens de ce monde pensent. Ainsi, les gens de ce monde croient à ce qu’ils enseignent. '
  '6':
  - type: text
    content: Mais nous, nous appartenons à Dieu. Toute personne qui connaît Dieu croit à notre message. Mais toute personne qui n’appartient pas à Dieu, ne croit pas à notre message.
  - type: text
    content: C’est ainsi que nous savons si le message de quelqu’un vient de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu ou non. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu nous apporte un vrai message, mais les faux '
  - type: text
    content: esprits
  - type: text
    content: ' disent des mensonges.'
  - type: heading
    content: Aimons‑nous les uns les autres, parce que Dieu nous a aimés
  '7':
  - type: text
    content: 'Mes amis, nous devons tous nous aimer. C’est Dieu qui nous rend capables d’aimer les autres. Toute personne qui aime les autres devient enfant de Dieu. Cette personne connaît Dieu. '
  '8':
  - type: text
    content: 'Toute personne qui n’aime pas les autres ne connaît pas Dieu. Nous le savons parce que l’amour est la propre nature de Dieu. '
  '9':
  - type: text
    content: 'Dieu a montré qu’il nous aime ainsi : Il a envoyé son Fils unique pour venir vivre dans le monde. Il l’a fait pour que nous puissions avoir une vraie vie avec Dieu, parce que nous croyons en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
