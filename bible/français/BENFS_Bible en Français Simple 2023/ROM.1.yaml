document_id: ROM.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: text
    content: C’est moi Paul qui écris cette lettre. Je suis un serviteur de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Dieu m’a choisi pour être son '
  - type: text
    content: apôtre
  - type: text
    content: '. Il m’a envoyé pour annoncer sa Bonne Nouvelle aux gens. '
  '10':
  - type: text
    content: Chaque fois que je prie pour vous, je demande à Dieu que je puisse vous rendre visite bientôt. Je prie pour qu’il le permette, s’il le veut.
  '11':
  - type: text
    content: Je veux beaucoup venir vous voir. Ensuite, je peux partager avec vous quelques dons de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Cela vous aidera à être forts lorsque vous servez Dieu. '
  '12':
  - type: text
    content: Nous pouvons nous entraider à être forts comme cela, parce que vous et moi croyons en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Mes amis chrétiens, je veux que vous sachiez que j’ai souvent essayé de vous rendre visite. Mais jusqu’à présent, quelque chose m’a toujours bloqué. Je veux vous aider à bien servir Dieu, comme j’ai déjà aidé d’autres non '
  - type: text
    content: Juifs
  - type: text
    content: .
  '14':
  - type: text
    content: Parce que Dieu a été bon envers moi, je dois dire son message à tout le monde. Je dois dire sa Bonne Nouvelle à ceux qui ont appris beaucoup de choses et à ceux qui n’ont jamais été à l’école. Je dois la dire aux gens sages.
  - type: text
    content: 'Je dois la dire aussi à ceux qui ne sont pas très intelligents. '
  '15':
  - type: text
    content: Pour cette raison, je veux beaucoup aussi dire la Bonne Nouvelle de Dieu à vous qui vivez à Rome.
  '16':
  - type: text
    content: Je n’ai pas honte de dire aux gens la Bonne Nouvelle. Dieu utilise cette Bonne Nouvelle pour montrer sa grande puissance. Il l’utilise pour sauver tous ceux qui croient en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Premièrement, Dieu sauve tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui sont croyants. Et il sauve également tous les non '
  - type: text
    content: Juifs
  - type: text
    content: ' qui sont croyants. '
  '17':
  - type: text
    content: La Bonne Nouvelle explique comment Dieu accepte les gens comme justes avec lui‑même. Dieu fait cela quand ils croient en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. C’est seulement à cause de leur '
  - type: text
    content: foi
  - type: text
    content: '. Rien d’autre. Voici ce qui est écrit dans la Bible : Les justes vivront, puisqu’ils croient en Dieu.'
  - type: heading
    content: Les gens sont fautifs
  '18':
  - type: text
    content: 'Du '
  - type: text
    content: ciel
  - type: text
    content: ', Dieu montre qu’il est en colère contre les gens. Il est en colère parce que les gens ne le respectent pas et ils font de mauvaises choses. Parce qu’ils continuent à faire ces mauvaises choses, ils choisissent de ne pas accepter le vrai message de Dieu. '
  '19':
  - type: text
    content: 'Ils doivent comprendre ce que Dieu est, parce que Dieu lui‑même l’a clairement montré. '
  '2':
  - type: text
    content: 'Dieu a promis cette Bonne Nouvelle, il y a longtemps, avant qu’elle ne devienne vraie. Ses '
  - type: text
    content: prophètes
  - type: text
    content: ' ont écrit à ce sujet dans la Bible. '
  '20':
  - type: text
    content: 'Depuis que Dieu a créé le monde, il a montré clairement aux gens ce qu’il est. Nous ne pouvons pas voir Dieu. Mais les choses qu’il a faites nous montrent clairement ce qu’il est. Nous pouvons comprendre sa grande puissance qui dure toujours. Nous pouvons savoir qu’il est le vrai Dieu. Il n’y a donc aucune raison pour toute personne de dire : Nous ne connaissions pas Dieu.'
  '21':
  - type: text
    content: 'Ces gens connaissaient vraiment Dieu. Mais ils ne le respectaient pas comme un grand Dieu et ils ne le remerciaient pas. Ils ne pensaient même plus clairement. Leurs '
  - type: text
    content: esprits
  - type: text
    content: ' sont devenus troublés et ils n’ont pas compris le message de Dieu. '
  '22':
  - type: text
    content: 'Ils ont dit qu’ils étaient sages, mais en réalité ils sont devenus fous. '
  '23':
  - type: text
    content: Ils ont refusé d’
  - type: text
    content: adorer
  - type: text
    content: ' le grand Dieu qui ne peut jamais mourir. Au lieu de cela, ils se sont fait de faux dieux. Ils adoraient des idoles qui étaient comme des gens qui devaient mourir. Ils ont également fait des idoles qui ressemblaient à des oiseaux, des animaux et des serpents, et ils les adoraient.'
  '24':
  - type: text
    content: 'Alors Dieu a laissé ces gens faire toutes les mauvaises choses qu’ils voulaient faire. Dieu a laissé ces choses sales diriger leur vie. En conséquence, ils ont fait de mauvaises choses avec leurs propres corps. Ils ont fait des choses dont les gens doivent avoir honte de faire. '
  '25':
  - type: text
    content: Ils ont refusé de croire aux vraies choses sur Dieu. Mais, ils ont choisi de croire au mensonge. Ils adoraient les choses que Dieu avait faites. Ils sont devenus des serviteurs de ces choses. Mais ils ont refusé d’
  - type: text
    content: adorer
  - type: text
    content: ' Dieu lui‑même. C’est lui qui a fait toutes ces choses !'
  - type: text
    content: Tout le monde doit le glorifier pour toujours ! Amen. C’est vrai.
  '26':
  - type: text
    content: 'Parce que ces gens ont abandonné Dieu, il a laissé ces mauvaises choses dominer leur vie. Ils voulaient fortement faire des choses dont ils devraient avoir honte. Même les femmes ont laissé d’avoir des relations sexuelles d’une bonne manière. Mais, elles ont commencé à avoir des relations sexuelles avec d’autres femmes, ce qui n’est pas bien. '
  '27':
  - type: text
    content: De plus, les hommes ont laissé d’avoir des relations sexuelles avec des femmes. Au contraire, ils voulaient fortement avoir des relations sexuelles avec d’autres hommes. Les hommes ont fait de mauvaises choses avec d’autres hommes. Ils devraient avoir honte de cela. Parce qu’ils ont fait de telles mauvaises choses, ils ont reçu dans leurs propres corps la punition qui était juste.
  '28':
  - type: text
    content: 'Ces gens ont décidé qu’ils n’avaient pas besoin de comprendre le message de Dieu. Alors Dieu a laissé leurs '
  - type: text
    content: esprits
  - type: text
    content: ' se perdre. Par conséquent, ils font de mauvaises choses que les gens ne devraient pas faire. '
  '29':
  - type: text
    content: 'Ils ne pensent qu’aux fausses et mauvaises choses qu’ils veulent faire. Ils veulent beaucoup de choses pour eux‑mêmes. Ils veulent faire du mal à d’autres personnes. Ils sont toujours jaloux des autres. Ils tuent des gens. Ils se querellent et se battent avec les gens. Ils ne sont ni honnêtes ni gentils. Ils disent des bêtises sur les autres. '
  '3':
  - type: text
    content: Cette Bonne Nouvelle concerne le Fils de Dieu, qui est Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', notre '
  - type: text
    content: Seigneur
  - type: text
    content: '. Jésus est né comme un bébé de la famille du roi David. Mais après la mort de Jésus sur la croix, le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu l’a réveillé pour le faire revivre. De cette façon, Dieu a clairement montré que Jésus était son Fils puissant. '
  '30':
  - type: text
    content: 'Ils disent des mensonges sur les gens. Ils détestent Dieu. Ils insultent les autres. Ils se vantent et disent à quel point ils sont importants. Ils pensent à de nombreuses façons de faire de mauvaises choses. Ils n’obéissent pas à leurs parents. '
  '31':
  - type: text
    content: 'Ils ne comprennent pas ce qui est juste. Ils ne font pas ce qu’ils ont promis de faire. Ils n’aiment personne et ne sont gentils avec personne. '
  '32':
  - type: text
    content: Ces gens savent le message de Dieu sur ce qui est juste. Ils savent que les gens qui font de telles choses devraient mourir. Mais ils continuent de faire ces mauvaises choses. De plus, ils sont même heureux quand d’autres personnes font aussi ces mauvaises choses.
  '5':
  - type: text
    content: À cause de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', Dieu a été très gentil avec nous. Il m’a choisi pour le servir d’'
  - type: text
    content: apôtre
  - type: text
    content: . Il m’a envoyé pour dire son message aux gens de tous les pays. Ils sauront ainsi que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est grand. Ils croiront en lui et lui obéiront. '
  '6':
  - type: text
    content: Chrétiens de Rome, vous faites aussi partie de ces gens ! Dieu vous a choisis pour appartenir à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '7':
  - type: text
    content: Je vous écris donc, vous tous chrétiens qui êtes à Rome. Dieu vous aime et il vous a choisis pour être son propre peuple.
  - type: text
    content: 'Je prie pour que Dieu, notre Père, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continuent de vous aider. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: .
  - type: heading
    content: Paul veut visiter Rome
  '8':
  - type: text
    content: Premièrement, je remercie mon Dieu pour vous tous à cause de ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait pour nous. Partout dans le monde, les gens parlent de votre croyance en Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Dieu est celui que je sers de tout mon '
  - type: text
    content: esprit
  - type: text
    content: '. Je dis aux gens le message de son Fils, ce qui est la Bonne Nouvelle. Dieu lui‑même sait que je prie pour vous tout le temps. '
