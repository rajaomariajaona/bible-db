document_id: ROM.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C’est moi Paul qui écris cette lettre. Je suis un serviteur de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dieu m’a choisi pour être son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: '. Il m’a envoyé pour annoncer sa Bonne Nouvelle aux gens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dieu a promis cette Bonne Nouvelle, il y a longtemps, avant qu’elle ne devienne vraie. Ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' ont écrit à ce sujet dans la Bible. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Cette Bonne Nouvelle concerne le Fils de Dieu, qui est Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Jésus est né comme un bébé de la famille du roi David. Mais après la mort de Jésus sur la croix, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu l’a réveillé pour le faire revivre. De cette façon, Dieu a clairement montré que Jésus était son Fils puissant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: À cause de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', Dieu a été très gentil avec nous. Il m’a choisi pour le servir d’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtre
  - type: text
    text: . Il m’a envoyé pour dire son message aux gens de tous les pays. Ils sauront ainsi que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est grand. Ils croiront en lui et lui obéiront. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Chrétiens de Rome, vous faites aussi partie de ces gens ! Dieu vous a choisis pour appartenir à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je vous écris donc, vous tous chrétiens qui êtes à Rome. Dieu vous aime et il vous a choisis pour être son propre peuple.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je prie pour que Dieu, notre Père, et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continuent de vous aider. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul veut visiter Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Premièrement, je remercie mon Dieu pour vous tous à cause de ce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait pour nous. Partout dans le monde, les gens parlent de votre croyance en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu est celui que je sers de tout mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Je dis aux gens le message de son Fils, ce qui est la Bonne Nouvelle. Dieu lui‑même sait que je prie pour vous tout le temps. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Chaque fois que je prie pour vous, je demande à Dieu que je puisse vous rendre visite bientôt. Je prie pour qu’il le permette, s’il le veut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je veux beaucoup venir vous voir. Ensuite, je peux partager avec vous quelques dons de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. Cela vous aidera à être forts lorsque vous servez Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nous pouvons nous entraider à être forts comme cela, parce que vous et moi croyons en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mes amis chrétiens, je veux que vous sachiez que j’ai souvent essayé de vous rendre visite. Mais jusqu’à présent, quelque chose m’a toujours bloqué. Je veux vous aider à bien servir Dieu, comme j’ai déjà aidé d’autres non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Parce que Dieu a été bon envers moi, je dois dire son message à tout le monde. Je dois dire sa Bonne Nouvelle à ceux qui ont appris beaucoup de choses et à ceux qui n’ont jamais été à l’école. Je dois la dire aux gens sages.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je dois la dire aussi à ceux qui ne sont pas très intelligents. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pour cette raison, je veux beaucoup aussi dire la Bonne Nouvelle de Dieu à vous qui vivez à Rome.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je n’ai pas honte de dire aux gens la Bonne Nouvelle. Dieu utilise cette Bonne Nouvelle pour montrer sa grande puissance. Il l’utilise pour sauver tous ceux qui croient en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Premièrement, Dieu sauve tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui sont croyants. Et il sauve également tous les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui sont croyants. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La Bonne Nouvelle explique comment Dieu accepte les gens comme justes avec lui‑même. Dieu fait cela quand ils croient en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. C’est seulement à cause de leur '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: '. Rien d’autre. Voici ce qui est écrit dans la Bible : Les justes vivront, puisqu’ils croient en Dieu.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les gens sont fautifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ', Dieu montre qu’il est en colère contre les gens. Il est en colère parce que les gens ne le respectent pas et ils font de mauvaises choses. Parce qu’ils continuent à faire ces mauvaises choses, ils choisissent de ne pas accepter le vrai message de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils doivent comprendre ce que Dieu est, parce que Dieu lui‑même l’a clairement montré. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Depuis que Dieu a créé le monde, il a montré clairement aux gens ce qu’il est. Nous ne pouvons pas voir Dieu. Mais les choses qu’il a faites nous montrent clairement ce qu’il est. Nous pouvons comprendre sa grande puissance qui dure toujours. Nous pouvons savoir qu’il est le vrai Dieu. Il n’y a donc aucune raison pour toute personne de dire : Nous ne connaissions pas Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces gens connaissaient vraiment Dieu. Mais ils ne le respectaient pas comme un grand Dieu et ils ne le remerciaient pas. Ils ne pensaient même plus clairement. Leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' sont devenus troublés et ils n’ont pas compris le message de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils ont dit qu’ils étaient sages, mais en réalité ils sont devenus fous. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils ont refusé d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' le grand Dieu qui ne peut jamais mourir. Au lieu de cela, ils se sont fait de faux dieux. Ils adoraient des idoles qui étaient comme des gens qui devaient mourir. Ils ont également fait des idoles qui ressemblaient à des oiseaux, des animaux et des serpents, et ils les adoraient.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Dieu a laissé ces gens faire toutes les mauvaises choses qu’ils voulaient faire. Dieu a laissé ces choses sales diriger leur vie. En conséquence, ils ont fait de mauvaises choses avec leurs propres corps. Ils ont fait des choses dont les gens doivent avoir honte de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils ont refusé de croire aux vraies choses sur Dieu. Mais, ils ont choisi de croire au mensonge. Ils adoraient les choses que Dieu avait faites. Ils sont devenus des serviteurs de ces choses. Mais ils ont refusé d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' Dieu lui‑même. C’est lui qui a fait toutes ces choses !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Tout le monde doit le glorifier pour toujours ! Amen. C’est vrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Parce que ces gens ont abandonné Dieu, il a laissé ces mauvaises choses dominer leur vie. Ils voulaient fortement faire des choses dont ils devraient avoir honte. Même les femmes ont laissé d’avoir des relations sexuelles d’une bonne manière. Mais, elles ont commencé à avoir des relations sexuelles avec d’autres femmes, ce qui n’est pas bien. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: De plus, les hommes ont laissé d’avoir des relations sexuelles avec des femmes. Au contraire, ils voulaient fortement avoir des relations sexuelles avec d’autres hommes. Les hommes ont fait de mauvaises choses avec d’autres hommes. Ils devraient avoir honte de cela. Parce qu’ils ont fait de telles mauvaises choses, ils ont reçu dans leurs propres corps la punition qui était juste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ces gens ont décidé qu’ils n’avaient pas besoin de comprendre le message de Dieu. Alors Dieu a laissé leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' se perdre. Par conséquent, ils font de mauvaises choses que les gens ne devraient pas faire. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils ne pensent qu’aux fausses et mauvaises choses qu’ils veulent faire. Ils veulent beaucoup de choses pour eux‑mêmes. Ils veulent faire du mal à d’autres personnes. Ils sont toujours jaloux des autres. Ils tuent des gens. Ils se querellent et se battent avec les gens. Ils ne sont ni honnêtes ni gentils. Ils disent des bêtises sur les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils disent des mensonges sur les gens. Ils détestent Dieu. Ils insultent les autres. Ils se vantent et disent à quel point ils sont importants. Ils pensent à de nombreuses façons de faire de mauvaises choses. Ils n’obéissent pas à leurs parents. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils ne comprennent pas ce qui est juste. Ils ne font pas ce qu’ils ont promis de faire. Ils n’aiment personne et ne sont gentils avec personne. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ces gens savent le message de Dieu sur ce qui est juste. Ils savent que les gens qui font de telles choses devraient mourir. Mais ils continuent de faire ces mauvaises choses. De plus, ils sont même heureux quand d’autres personnes font aussi ces mauvaises choses.
