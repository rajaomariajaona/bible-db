document_id: JHN.6,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 6
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus nourrit 5 000 hommes et leurs familles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Quelque temps après, Jésus est allé de l’autre coté de la mer de Galilée. Elle est aussi appelée mer de Tibériade. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus a dit : Faites asseoir ces gens. Il y avait beaucoup d’herbes à cet endroit. Les gens se sont assis là. Il y avait environ 5 000 hommes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jésus a pris les pains. Il a remercié Dieu. Il les a donnés à toutes les personnes qui étaient assises là. Tout le monde a eu le pain qu’il voulait manger. Jésus a fait la même chose avec les poissons. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tous les gens ont mangé assez de nourriture. Après, Jésus a dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Ne perdez pas quoi que ce soit. Ramassez tout le reste que le peuple n’a pas mangé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont ramassé tout le reste. Ils ont rempli 12 paniers avec les morceaux des pains restants.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les gens ont vu ce miracle de Jésus. Alors ils disaient : Certainement, cet homme est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' qui doit venir dans le monde. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les gens voulaient prendre Jésus pour le faire Roi. Mais Jésus le savait. Donc, il est encore allé sur la colline.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus marche sur l’eau
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le soir venu, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont allés au bord de la mer.'
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ils sont entrés dans un petit bateau. Ils ont commencé à voyager vers '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: '. Il faisait sombre. Alors Jésus n’était toujours pas avec eux. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Un vent très fort soufflait. L’eau se déplaçait puissamment. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' avançaient déjà avec leur petit bateau en ramant. Ils étaient déjà à 5 ou 6 kilomètres. Ils ont vu Jésus. Il venait près du petit bateau. Il marchait sur l’eau. Et ils avaient très peur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Une grande foule le suivait à cause des miracles qu’il faisait. Il guérissait des personnes malades. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais Jésus leur a dit : C’est moi, n’ayez pas peur. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ainsi, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' étaient heureux de voir Jésus entrer dans le petit bateau avec eux. Immédiatement le petit bateau a atteint le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: rivage
    - type: text
      text: ' où ils allaient.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La foule cherche Jésus
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'La foule était restée de l’autre côté de la mer. Le lendemain, ils ont fait le tour. Ils ont vu que le seul petit bateau avait disparu. Ils savaient que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' l’avaient pris. Et ils savaient que Jésus n’était pas allé avec ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mais d’autres petits bateaux de Tibériade étaient arrivés près de l’endroit où tous les gens avaient mangé le pain. Ils avaient mangé le pain après que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait remercié Dieu pour cela. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'La foule a vu que ni Jésus ni ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' n’étaient là. Donc, ils sont entrés dans les petits bateaux. Ils sont allés à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Capernaüm
    - type: text
      text: . Ils cherchaient Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus est le pain qui nous donne la vie
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Des gens ont trouvé Jésus de l’autre côté de la mer. Ils lui ont demandé : Maître, quand es‑tu arrivé ici ? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus a répondu : Je vous dis la vérité. Vous m’avez vu faire des miracles. Mais vous ne me cherchez pas à cause de cela. Non, vous me cherchez, parce que vous avez mangé des pains. Vous avez mangé tous les pains selon votre faim. Ainsi donc, vous étiez pleins. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ne travaillez pas pour obtenir la nourriture qui ne continue pas. Au lieu de cela, travaillez pour obtenir la nourriture qui continue. Travaillez pour obtenir la nourriture qui vous fait vivre toujours. Dieu, le Père, a mis sa marque d’autorité sur le Fils. Voilà pourquoi le Fils de l’homme va vous donner cette nourriture.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors les gens lui ont demandé : Comment pouvons‑nous faire le travail que Dieu veut que nous fassions ? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus a répondu : Croyez en celui que Dieu vous a envoyé. Voilà le travail que Dieu veut que vous fassiez. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus est monté sur une colline. Il s’est assis là‑bas avec ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Alors le peuple lui a demandé : Quel miracle fais‑tu ? Si nous voyons un miracle, nous allons croire en toi. Que vas‑tu faire ? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nos ancêtres ont mangé la manne au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. Comme il est dit dans l’Ancien Testament : Dieu leur a donné du pain, afin qu’ils puissent manger. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jésus leur a dit : Je vous dis la vérité. Ce n’est pas Moïse qui vous a donné le pain du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Non, mais c’est mon Père qui vous donne vraiment le pain du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Le pain de Dieu est celui qui descend du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il permet aux gens dans le monde de vivre. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ils lui ont dit : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', donne‑nous toujours ce pain.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Alors Jésus leur a dit : Je suis le pain qui permet aux gens de vivre. Celui qui vient à moi n’aura jamais faim. Toute personne qui croit en moi n’aura jamais soif. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Mais vous m’avez vu et encore vous ne me croyez pas. Je vous ai dit ça avant. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tout le monde que le Père me donne, viendra à moi. Lorsque quelqu’un vient à moi, je ne vais jamais le renvoyer. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Je ne suis pas venu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' pour faire ce que je veux faire. Non, au contraire, je suis venu pour obéir à celui qui m’a envoyé. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Celui qui m’a envoyé ne veut pas que je perde une seule personne qu’il m’a donnée. Il veut que je les ressuscite toutes au dernier jour, de sorte qu’elles vivent toujours avec moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'C’était presque le temps pour la fête de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: ' Juive. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Voici les personnes qui seront en vie pour toujours : tout le monde qui voit le Fils et croit en lui. Et je le ressusciterai au dernier jour. Voilà ce que mon Père veut.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jésus avait dit : Je suis le pain qui est descendu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Quand il a dit cela, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' étaient contre lui. Alors, ils ont commencé à parler mal contre Jésus. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ils disaient : Mais celui‑ci est Jésus, le fils de Joseph. Nous connaissons son père et sa mère. Donc, il ne devrait pas dire qu’il est descendu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: .
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Jésus a répondu : Arrêtez de dire ces choses mauvaises les uns aux autres. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Le Père m’a envoyé. Personne ne peut venir à moi si le Père ne l’attire à moi. Et je le ressusciterai au dernier jour. Ainsi il vivra toujours avec moi. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' ont écrit dans l’Ancien Testament : Dieu enseignera toutes les personnes. Voici les gens qui viennent à moi : Toute personne qui entend le Père et apprend de lui. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Je ne veux pas dire que tout le monde a vu le Père. Personne n’a vu le Père, seulement celui qui vient de Dieu. Il est celui qui a vu le Père. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Je vous dis la vérité. La personne qui croit à cela, est vivante pour toujours. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Je suis le pain qui vous fait vivre. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Vos pères ont mangé la manne au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ', mais ils sont morts. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus a levé les yeux. Il a vu une grande foule de gens. Ils venaient vers lui. Puis il a dit à Philippe : Où pouvons‑nous acheter du pain pour nourrir tous ces gens ? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ce pain qui descend du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' est différent. Toute personne qui mange ce pain ne mourra pas. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Je suis le pain vivant. Ce pain est descendu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Si quelqu’un mange ce pain, il vivra toujours. Le pain que je donnerai est mon corps. Je vais le donner, afin que toutes les personnes dans le monde puissent vivre.
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Alors les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' étaient en colère. Ils discutaient entre eux encore plus. Ils disaient : Cet homme ne peut pas nous donner son corps pour que nous le mangions ! '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Jésus leur a dit : Je vous dis la vérité. Vous devez manger le corps du Fils de l’homme et vous devez boire son sang. Si vous faites ces choses, vous serez vraiment vivants. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Tous les gens ont besoin de manger mon corps et de boire mon sang. S’ils font ces choses, ils seront vivants pour toujours. Et je les ressusciterai au dernier jour. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Mon corps est la vraie nourriture et mon sang est la vraie boisson. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Toute personne a besoin de manger mon corps et de boire mon sang. Si une personne fait cela, cette personne vit en moi. Et je vis en elle. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Le Père, qui est vivant, m’a envoyé. Et je vis à cause de lui. De la même façon, tous ceux qui me mangent vivront par moi. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Voici le pain qui est descendu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il ne ressemble pas à la manne que vos pères ont mangée. Ils ont mangé, mais ils sont morts. Mais la personne qui mange ce pain vivra toujours. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
