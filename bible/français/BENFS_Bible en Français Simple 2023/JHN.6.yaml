document_id: JHN.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: Jésus nourrit 5 000 hommes et leurs familles
  - type: text
    content: 'Quelque temps après, Jésus est allé de l’autre coté de la mer de Galilée. Elle est aussi appelée mer de Tibériade. '
  '10':
  - type: text
    content: 'Jésus a dit : Faites asseoir ces gens. Il y avait beaucoup d’herbes à cet endroit. Les gens se sont assis là. Il y avait environ 5 000 hommes. '
  '11':
  - type: text
    content: 'Jésus a pris les pains. Il a remercié Dieu. Il les a donnés à toutes les personnes qui étaient assises là. Tout le monde a eu le pain qu’il voulait manger. Jésus a fait la même chose avec les poissons. '
  '12':
  - type: text
    content: 'Tous les gens ont mangé assez de nourriture. Après, Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Ne perdez pas quoi que ce soit. Ramassez tout le reste que le peuple n’a pas mangé. '
  '13':
  - type: text
    content: 'Alors les '
  - type: text
    content: disciples
  - type: text
    content: ' ont ramassé tout le reste. Ils ont rempli 12 paniers avec les morceaux des pains restants.'
  '14':
  - type: text
    content: 'Les gens ont vu ce miracle de Jésus. Alors ils disaient : Certainement, cet homme est le '
  - type: text
    content: prophète
  - type: text
    content: ' qui doit venir dans le monde. '
  '15':
  - type: text
    content: Les gens voulaient prendre Jésus pour le faire Roi. Mais Jésus le savait. Donc, il est encore allé sur la colline.
  - type: heading
    content: Jésus marche sur l’eau
  '16':
  - type: text
    content: 'Le soir venu, les '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés au bord de la mer.'
  '17':
  - type: text
    content: 'Ils sont entrés dans un petit bateau. Ils ont commencé à voyager vers '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Il faisait sombre. Alors Jésus n’était toujours pas avec eux. '
  '18':
  - type: text
    content: 'Un vent très fort soufflait. L’eau se déplaçait puissamment. '
  '19':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' avançaient déjà avec leur petit bateau en ramant. Ils étaient déjà à 5 ou 6 kilomètres. Ils ont vu Jésus. Il venait près du petit bateau. Il marchait sur l’eau. Et ils avaient très peur. '
  '2':
  - type: text
    content: 'Une grande foule le suivait à cause des miracles qu’il faisait. Il guérissait des personnes malades. '
  '20':
  - type: text
    content: 'Mais Jésus leur a dit : C’est moi, n’ayez pas peur. '
  '21':
  - type: text
    content: 'Ainsi, les '
  - type: text
    content: disciples
  - type: text
    content: ' étaient heureux de voir Jésus entrer dans le petit bateau avec eux. Immédiatement le petit bateau a atteint le '
  - type: text
    content: rivage
  - type: text
    content: ' où ils allaient.'
  - type: heading
    content: La foule cherche Jésus
  '22':
  - type: text
    content: 'La foule était restée de l’autre côté de la mer. Le lendemain, ils ont fait le tour. Ils ont vu que le seul petit bateau avait disparu. Ils savaient que les '
  - type: text
    content: disciples
  - type: text
    content: ' l’avaient pris. Et ils savaient que Jésus n’était pas allé avec ses '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Mais d’autres petits bateaux de Tibériade étaient arrivés près de l’endroit où tous les gens avaient mangé le pain. Ils avaient mangé le pain après que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait remercié Dieu pour cela. '
  '24':
  - type: text
    content: 'La foule a vu que ni Jésus ni ses '
  - type: text
    content: disciples
  - type: text
    content: ' n’étaient là. Donc, ils sont entrés dans les petits bateaux. Ils sont allés à '
  - type: text
    content: Capernaüm
  - type: text
    content: . Ils cherchaient Jésus.
  - type: heading
    content: Jésus est le pain qui nous donne la vie
  '25':
  - type: text
    content: 'Des gens ont trouvé Jésus de l’autre côté de la mer. Ils lui ont demandé : Maître, quand es‑tu arrivé ici ? '
  '26':
  - type: text
    content: 'Jésus a répondu : Je vous dis la vérité. Vous m’avez vu faire des miracles. Mais vous ne me cherchez pas à cause de cela. Non, vous me cherchez, parce que vous avez mangé des pains. Vous avez mangé tous les pains selon votre faim. Ainsi donc, vous étiez pleins. '
  '27':
  - type: text
    content: Ne travaillez pas pour obtenir la nourriture qui ne continue pas. Au lieu de cela, travaillez pour obtenir la nourriture qui continue. Travaillez pour obtenir la nourriture qui vous fait vivre toujours. Dieu, le Père, a mis sa marque d’autorité sur le Fils. Voilà pourquoi le Fils de l’homme va vous donner cette nourriture.
  '28':
  - type: text
    content: 'Alors les gens lui ont demandé : Comment pouvons‑nous faire le travail que Dieu veut que nous fassions ? '
  '29':
  - type: text
    content: 'Jésus a répondu : Croyez en celui que Dieu vous a envoyé. Voilà le travail que Dieu veut que vous fassiez. '
  '3':
  - type: text
    content: 'Jésus est monté sur une colline. Il s’est assis là‑bas avec ses '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Alors le peuple lui a demandé : Quel miracle fais‑tu ? Si nous voyons un miracle, nous allons croire en toi. Que vas‑tu faire ? '
  '31':
  - type: text
    content: 'Nos ancêtres ont mangé la manne au '
  - type: text
    content: désert
  - type: text
    content: '. Comme il est dit dans l’Ancien Testament : Dieu leur a donné du pain, afin qu’ils puissent manger. '
  '32':
  - type: text
    content: 'Jésus leur a dit : Je vous dis la vérité. Ce n’est pas Moïse qui vous a donné le pain du '
  - type: text
    content: ciel
  - type: text
    content: '. Non, mais c’est mon Père qui vous donne vraiment le pain du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Le pain de Dieu est celui qui descend du '
  - type: text
    content: ciel
  - type: text
    content: '. Il permet aux gens dans le monde de vivre. '
  '34':
  - type: text
    content: 'Ils lui ont dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', donne‑nous toujours ce pain.'
  '35':
  - type: text
    content: 'Alors Jésus leur a dit : Je suis le pain qui permet aux gens de vivre. Celui qui vient à moi n’aura jamais faim. Toute personne qui croit en moi n’aura jamais soif. '
  '36':
  - type: text
    content: 'Mais vous m’avez vu et encore vous ne me croyez pas. Je vous ai dit ça avant. '
  '37':
  - type: text
    content: 'Tout le monde que le Père me donne, viendra à moi. Lorsque quelqu’un vient à moi, je ne vais jamais le renvoyer. '
  '38':
  - type: text
    content: 'Je ne suis pas venu du '
  - type: text
    content: ciel
  - type: text
    content: ' pour faire ce que je veux faire. Non, au contraire, je suis venu pour obéir à celui qui m’a envoyé. '
  '39':
  - type: text
    content: 'Celui qui m’a envoyé ne veut pas que je perde une seule personne qu’il m’a donnée. Il veut que je les ressuscite toutes au dernier jour, de sorte qu’elles vivent toujours avec moi. '
  '4':
  - type: text
    content: 'C’était presque le temps pour la fête de la '
  - type: text
    content: Pâque
  - type: text
    content: ' Juive. '
  '40':
  - type: text
    content: 'Voici les personnes qui seront en vie pour toujours : tout le monde qui voit le Fils et croit en lui. Et je le ressusciterai au dernier jour. Voilà ce que mon Père veut.'
  '41':
  - type: text
    content: 'Jésus avait dit : Je suis le pain qui est descendu du '
  - type: text
    content: ciel
  - type: text
    content: '. Quand il a dit cela, les '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient contre lui. Alors, ils ont commencé à parler mal contre Jésus. '
  '42':
  - type: text
    content: 'Ils disaient : Mais celui‑ci est Jésus, le fils de Joseph. Nous connaissons son père et sa mère. Donc, il ne devrait pas dire qu’il est descendu du '
  - type: text
    content: ciel
  - type: text
    content: .
  '43':
  - type: text
    content: 'Jésus a répondu : Arrêtez de dire ces choses mauvaises les uns aux autres. '
  '44':
  - type: text
    content: 'Le Père m’a envoyé. Personne ne peut venir à moi si le Père ne l’attire à moi. Et je le ressusciterai au dernier jour. Ainsi il vivra toujours avec moi. '
  '45':
  - type: text
    content: 'Les '
  - type: text
    content: prophètes
  - type: text
    content: ' ont écrit dans l’Ancien Testament : Dieu enseignera toutes les personnes. Voici les gens qui viennent à moi : Toute personne qui entend le Père et apprend de lui. '
  '46':
  - type: text
    content: 'Je ne veux pas dire que tout le monde a vu le Père. Personne n’a vu le Père, seulement celui qui vient de Dieu. Il est celui qui a vu le Père. '
  '47':
  - type: text
    content: 'Je vous dis la vérité. La personne qui croit à cela, est vivante pour toujours. '
  '48':
  - type: text
    content: 'Je suis le pain qui vous fait vivre. '
  '49':
  - type: text
    content: 'Vos pères ont mangé la manne au '
  - type: text
    content: désert
  - type: text
    content: ', mais ils sont morts. '
  '5':
  - type: text
    content: 'Jésus a levé les yeux. Il a vu une grande foule de gens. Ils venaient vers lui. Puis il a dit à Philippe : Où pouvons‑nous acheter du pain pour nourrir tous ces gens ? '
  '50':
  - type: text
    content: 'Ce pain qui descend du '
  - type: text
    content: ciel
  - type: text
    content: ' est différent. Toute personne qui mange ce pain ne mourra pas. '
  '51':
  - type: text
    content: 'Je suis le pain vivant. Ce pain est descendu du '
  - type: text
    content: ciel
  - type: text
    content: . Si quelqu’un mange ce pain, il vivra toujours. Le pain que je donnerai est mon corps. Je vais le donner, afin que toutes les personnes dans le monde puissent vivre.
  '52':
  - type: text
    content: 'Alors les '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient en colère. Ils discutaient entre eux encore plus. Ils disaient : Cet homme ne peut pas nous donner son corps pour que nous le mangions ! '
  '53':
  - type: text
    content: 'Jésus leur a dit : Je vous dis la vérité. Vous devez manger le corps du Fils de l’homme et vous devez boire son sang. Si vous faites ces choses, vous serez vraiment vivants. '
  '54':
  - type: text
    content: 'Tous les gens ont besoin de manger mon corps et de boire mon sang. S’ils font ces choses, ils seront vivants pour toujours. Et je les ressusciterai au dernier jour. '
  '55':
  - type: text
    content: 'Mon corps est la vraie nourriture et mon sang est la vraie boisson. '
  '56':
  - type: text
    content: 'Toute personne a besoin de manger mon corps et de boire mon sang. Si une personne fait cela, cette personne vit en moi. Et je vis en elle. '
  '57':
  - type: text
    content: 'Le Père, qui est vivant, m’a envoyé. Et je vis à cause de lui. De la même façon, tous ceux qui me mangent vivront par moi. '
  '58':
  - type: text
    content: 'Voici le pain qui est descendu du '
  - type: text
    content: ciel
  - type: text
    content: '. Il ne ressemble pas à la manne que vos pères ont mangée. Ils ont mangé, mais ils sont morts. Mais la personne qui mange ce pain vivra toujours. '
  '59':
  - type: text
    content: 'Jésus a dit ces choses, alors qu’il enseignait dans la '
  - type: text
    content: synagogue
  - type: text
    content: ' de '
  - type: text
    content: Capernaüm
  - type: text
    content: .
  - type: heading
    content: Beaucoup de disciples fuient Jésus
  '6':
  - type: text
    content: 'Jésus lui‑même savait déjà ce qu’il allait faire. Mais il a posé cette question à Philippe pour une raison. Il voulait savoir ce que Philippe allait dire. '
  '60':
  - type: text
    content: 'Beaucoup de '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus n’ont pas aimé ces paroles. Ils ont dit : Cette chose qu’il enseigne est trop difficile. Personne ne peut l’accepter. '
  '61':
  - type: text
    content: 'Jésus lui‑même savait que les '
  - type: text
    content: disciples
  - type: text
    content: ' discutaient. Il n’avait pas besoin de personne pour le lui dire. Il leur a dit : Cela semble vous surprendre et vous mettre en colère. '
  '62':
  - type: text
    content: 'Alors pensez à ceci : Le Fils de l’homme remonte à l’endroit où il était auparavant. Et vous voyez qu’il monte. Pensez à ce que vous pourriez sentir. '
  '63':
  - type: text
    content: C’est l’
  - type: text
    content: esprit
  - type: text
    content: ' qui vous fait vivre. Le corps seul ne vaut rien. Les paroles que je vous ai dites, sont '
  - type: text
    content: esprit
  - type: text
    content: '. Elles vous font vivre. '
  '64':
  - type: text
    content: Mais certains d’entre vous ne croient pas. Jésus savait depuis le début lequel d’entre eux ne croit pas.
  - type: text
    content: 'En plus, il savait toujours qui allait le livrer à ses ennemis. '
  '65':
  - type: text
    content: 'Ensuite Jésus a dit ces paroles : Je vous ai dit que seul le Père peut attirer les gens à moi.'
  '66':
  - type: text
    content: 'A partir de ce temps‑là, beaucoup de '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus l’ont laissé. Ils ne le suivaient plus. '
  '67':
  - type: text
    content: 'Alors Jésus a demandé aux 12 '
  - type: text
    content: apôtres
  - type: text
    content: '  : Voulez‑vous aller aussi ? '
  '68':
  - type: text
    content: 'Simon Pierre lui a répondu : '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous ne savons pas auprès de qui aller. Tu as les paroles qui amènent les gens à vivre toujours. '
  '69':
  - type: text
    content: 'Et nous croyons que tu es le Saint. Nous croyons que tu es venu de Dieu. Nous sommes sûrs de cela. '
  '7':
  - type: text
    content: 'Philippe lui a répondu : Il nous faut au moins 200 pièces d’argent. Les pains qu’on aura de cet argent ne suffiront pas à tous ces gens. '
  '70':
  - type: text
    content: 'Jésus lui a répondu : Je vous ai choisis les douze. Mais l’un de vous est un démon ! '
  '71':
  - type: text
    content: 'Il parlait de Judas, fils de Simon. Judas était l’un des 12 '
  - type: text
    content: apôtres
  - type: text
    content: . Mais après ce temps, il a livré Jésus à ses ennemis.
  '8':
  - type: text
    content: 'André, un autre '
  - type: text
    content: disciple
  - type: text
    content: ' de Jésus, était le frère de Simon Pierre. Il a dit à Jésus : '
  '9':
  - type: text
    content: Voici un garçon qui a 5 petits pains et 2 petits poissons. Mais certainement, ce n’est pas assez pour nourrir beaucoup de gens.
