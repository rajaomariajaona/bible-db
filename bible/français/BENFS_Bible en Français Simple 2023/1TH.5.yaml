document_id: 1TH.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Nous devons être prêts pour le retour de Jésus
  - type: text
    content: 'Amis, nous n’avons pas besoin de vous écrire quoi que ce soit sur les dates et heures auxquelles ces choses se produiront. '
  '10':
  - type: text
    content: 'Jésus est mort pour nous. C’était pour que nous puissions vivre avec lui. Peu importe que nous soyons vivants ou morts à son retour. Nous irons tous vivre avec lui. '
  '11':
  - type: text
    content: À cause de cela, vous devez vous entraider pour devenir plus forts en tant que croyants. Je sais que vous le faites déjà.
  - type: heading
    content: Paul termine sa lettre
  '12':
  - type: text
    content: 'Nos amis, nous vous demandons de respecter vos dirigeants qui travaillent beaucoup parmi vous. Ils vous guident et vous enseignent ce qui est juste au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: text
    content: Montrez‑leur à quel point ils sont importants pour vous. Et je les aime beaucoup à cause du travail qu’ils font. Vivez en paix entre vous.
  '14':
  - type: text
    content: Amis, vous devez avertir les gens paresseux qu’ils doivent travailler. Si les gens ont peur, aidez‑les à être courageux. Si les gens sont faibles, prenez soin d’eux. Soyez patients avec tout le monde.
  '15':
  - type: text
    content: Si quelqu’un fait quelque chose de mal contre vous, ne faites rien de mal contre lui en retour. Ne faites jamais cela. Mais, essayez toujours de faire de bonnes choses qui vous aideront les uns les autres. Elles aideront aussi tous les autres.
  '16':
  - type: text
    content: 'Soyez toujours heureux. '
  '17':
  - type: text
    content: 'Priez en tout temps. '
  '18':
  - type: text
    content: Quoi qui vous arrive, continuez de remercier Dieu. Dieu veut que vous fassiez cela, parce que vous appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '19':
  - type: text
    content: N’arrêtez pas l’œuvre de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. '
  '2':
  - type: text
    content: 'Vous savez très bien comment se déroulera le grand jour du retour du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ce jour‑là surprendra beaucoup les gens. C’est comme quand un voleur vient dans la nuit. '
  '20':
  - type: text
    content: 'Lorsque les gens disent des messages au nom de Dieu, ne refusez pas de les écouter. '
  '21':
  - type: text
    content: 'Mais, réfléchissez bien à tout, pour voir si c’est vrai. N’oubliez pas d’obéir à tout ce qui est bon. '
  '22':
  - type: text
    content: Mais éloignez‑vous de toute sorte de mauvaise chose.
  '23':
  - type: text
    content: 'Je prie que Dieu vous aide à être complètement bons, comme doit l’être son peuple. C’est lui qui nous donne la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: '. Je prie pour qu’il prenne soin de vous de toutes les manières, dans vos '
  - type: text
    content: esprits
  - type: text
    content: ', dans vos âmes et dans vos corps. Vous ne serez pas alors fautifs d’aucun mal lorsque notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' reviendra. '
  '24':
  - type: text
    content: Dieu vous a choisis pour être son peuple. Nous pouvons croire en lui pour faire ce qu’il a promis de faire. Alors, il fera tout cela pour vous.
  '25':
  - type: text
    content: 'Nos amis chrétiens, veuillez prier pour nous. '
  '26':
  - type: text
    content: Dites bonjour à tous les croyants en notre nom et embrassez‑les en tant que frères et sœurs chrétiens.
  '27':
  - type: text
    content: 'Je vous le dis très sérieusement au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', veuillez lire cette lettre à tous les croyants. '
  '28':
  - type: text
    content: 'Je prie pour que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continue d’être très gentil avec vous.'
  '3':
  - type: text
    content: 'À ce moment‑là, les gens diront : Nous sommes en sécurité et il n’y a aucun problème pour nous. Mais alors, quand ils ne sont pas prêts pour cela, une grande punition leur arrivera brusquement. Il leur sera impossible de s’enfuir. Ils ressentiront une douleur brusque, comme une femme qui accouche d’un bébé.'
  '4':
  - type: text
    content: 'Mais vous, nos amis chrétiens, vous connaissez ces choses. Vous n’êtes pas comme des gens qui vivent dans le noir. Ainsi, lorsque le grand jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' arrivera, il ne devra pas vous surprendre, comme un voleur pourrait vous surprendre. '
  '5':
  - type: text
    content: 'Vous êtes tous des gens qui appartiennent à la lumière et au jour. Nous qui sommes croyants n’appartenons ni à la nuit ni à l’obscurité. '
  '6':
  - type: text
    content: 'Donc, nous devons rester attentifs. Nous devons être comme des gens qui restent éveillés. Nous ne devons pas rester endormis comme les autres personnes. '
  '7':
  - type: text
    content: Les gens dorment la nuit. C’est pendant la nuit que les gens s’enivrent.
  '8':
  - type: text
    content: 'Mais nous appartenons au jour, non à la nuit. Nous devons donc penser clairement. Nous devons nous préparer comme un soldat qui porte sa '
  - type: text
    content: cuirasse
  - type: text
    content: . Nous devons continuer de croire en Dieu et de l’aimer. Ce sera comme une chemise en métal qui protège nos corps. Nous devons également continuer d’espérer que Dieu nous sauvera. Ce sera comme un chapeau solide qui protège nos têtes.
  '9':
  - type: text
    content: 'Dieu ne nous a pas choisis comme son peuple pour qu’il soit en colère contre nous. Il nous a choisis pour qu’il puisse nous sauver à cause de ce que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' a fait. '
