document_id: 1TH.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous devons être prêts pour le retour de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Amis, nous n’avons pas besoin de vous écrire quoi que ce soit sur les dates et heures auxquelles ces choses se produiront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous savez très bien comment se déroulera le grand jour du retour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ce jour‑là surprendra beaucoup les gens. C’est comme quand un voleur vient dans la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'À ce moment‑là, les gens diront : Nous sommes en sécurité et il n’y a aucun problème pour nous. Mais alors, quand ils ne sont pas prêts pour cela, une grande punition leur arrivera brusquement. Il leur sera impossible de s’enfuir. Ils ressentiront une douleur brusque, comme une femme qui accouche d’un bébé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais vous, nos amis chrétiens, vous connaissez ces choses. Vous n’êtes pas comme des gens qui vivent dans le noir. Ainsi, lorsque le grand jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' arrivera, il ne devra pas vous surprendre, comme un voleur pourrait vous surprendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous êtes tous des gens qui appartiennent à la lumière et au jour. Nous qui sommes croyants n’appartenons ni à la nuit ni à l’obscurité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Donc, nous devons rester attentifs. Nous devons être comme des gens qui restent éveillés. Nous ne devons pas rester endormis comme les autres personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les gens dorment la nuit. C’est pendant la nuit que les gens s’enivrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais nous appartenons au jour, non à la nuit. Nous devons donc penser clairement. Nous devons nous préparer comme un soldat qui porte sa '
  - type: usfm
    marker: w
    children:
    - type: text
      text: cuirasse
  - type: text
    text: . Nous devons continuer de croire en Dieu et de l’aimer. Ce sera comme une chemise en métal qui protège nos corps. Nous devons également continuer d’espérer que Dieu nous sauvera. Ce sera comme un chapeau solide qui protège nos têtes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu ne nous a pas choisis comme son peuple pour qu’il soit en colère contre nous. Il nous a choisis pour qu’il puisse nous sauver à cause de ce que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus est mort pour nous. C’était pour que nous puissions vivre avec lui. Peu importe que nous soyons vivants ou morts à son retour. Nous irons tous vivre avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: À cause de cela, vous devez vous entraider pour devenir plus forts en tant que croyants. Je sais que vous le faites déjà.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul termine sa lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nos amis, nous vous demandons de respecter vos dirigeants qui travaillent beaucoup parmi vous. Ils vous guident et vous enseignent ce qui est juste au nom du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Montrez‑leur à quel point ils sont importants pour vous. Et je les aime beaucoup à cause du travail qu’ils font. Vivez en paix entre vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amis, vous devez avertir les gens paresseux qu’ils doivent travailler. Si les gens ont peur, aidez‑les à être courageux. Si les gens sont faibles, prenez soin d’eux. Soyez patients avec tout le monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si quelqu’un fait quelque chose de mal contre vous, ne faites rien de mal contre lui en retour. Ne faites jamais cela. Mais, essayez toujours de faire de bonnes choses qui vous aideront les uns les autres. Elles aideront aussi tous les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Soyez toujours heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Priez en tout temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quoi qui vous arrive, continuez de remercier Dieu. Dieu veut que vous fassiez cela, parce que vous appartenez à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: N’arrêtez pas l’œuvre de l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsque les gens disent des messages au nom de Dieu, ne refusez pas de les écouter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais, réfléchissez bien à tout, pour voir si c’est vrai. N’oubliez pas d’obéir à tout ce qui est bon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais éloignez‑vous de toute sorte de mauvaise chose.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je prie que Dieu vous aide à être complètement bons, comme doit l’être son peuple. C’est lui qui nous donne la paix dans nos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Je prie pour qu’il prenne soin de vous de toutes les manières, dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ', dans vos âmes et dans vos corps. Vous ne serez pas alors fautifs d’aucun mal lorsque notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' reviendra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dieu vous a choisis pour être son peuple. Nous pouvons croire en lui pour faire ce qu’il a promis de faire. Alors, il fera tout cela pour vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nos amis chrétiens, veuillez prier pour nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dites bonjour à tous les croyants en notre nom et embrassez‑les en tant que frères et sœurs chrétiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je vous le dis très sérieusement au nom du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', veuillez lire cette lettre à tous les croyants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je prie pour que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continue d’être très gentil avec vous.'
