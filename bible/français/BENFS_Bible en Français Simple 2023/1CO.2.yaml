document_id: 1CO.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Comment Paul a enseigné le message de Dieu
  - type: text
    content: Amis chrétiens, je suis venu vous dire le vrai message de Dieu. Je n’ai pas utilisé de mots sages lorsque je vous ai parlé.
  - type: text
    content: 'Je n’ai pas essayé de vous faire croire que j’étais très sage. '
  '10':
  - type: text
    content: 'Mais Dieu a envoyé son '
  - type: text
    content: Esprit
  - type: text
    content: ' pour nous faire savoir ces secrets. L’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu regarde attentivement tout. Il connaît même les pensées cachées de Dieu. '
  '11':
  - type: text
    content: Seul l’
  - type: text
    content: esprit
  - type: text
    content: ' d’une personne peut savoir tout ce qui est dans ses pensées. Et c’est la même chose avec Dieu. Seul l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu sait tout ce qui est dans les pensées de Dieu. '
  '12':
  - type: text
    content: 'Nous avons reçu le propre '
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu, pas un '
  - type: text
    content: esprit
  - type: text
    content: ' qui appartient à ce monde. En conséquence, nous pouvons comprendre toutes les bonnes choses que Dieu nous a données. '
  '13':
  - type: text
    content: Ce sont des choses que nous disons. Nous n’utilisons pas de mots sages pour parler des idées humaines. Mais, nous disons le message que l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu nous a enseigné. De cette façon, nous expliquons un message spirituel aux personnes qui ont l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu.'
  '14':
  - type: text
    content: Si quelqu’un ne croit pas en Dieu, il ne peut accepter le message qui vient de l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Il pense que le message de Dieu est bête. Il ne peut même pas comprendre ces choses. Seul l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu peut l’expliquer aux gens. '
  '15':
  - type: text
    content: Mais nous avons l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu avec nous. Ainsi, nous pouvons comprendre la vraie valeur de toutes choses. Mais d’autres personnes ne peuvent pas vraiment nous comprendre, nous qui appartenons à Dieu. '
  '16':
  - type: text
    content: 'Comme il est dit dans la Bible :'
  - type: text
    content: 'Personne ne peut savoir ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu pense.'
  - type: text
    content: Personne ne peut lui dire ce qu’il doit faire.
  - type: text
    content: Mais nous pensons à ces choses de la même manière que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' y pense.'
  '2':
  - type: text
    content: Pendant que j’étais avec vous, j’ai décidé de vous enseigner seulement sur Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Je vous ai appris sa mort sur une croix. Je voulais oublier tout le reste.
  '3':
  - type: text
    content: J’ai vécu parmi vous comme quelqu’un qui se sentait faible.
  - type: text
    content: J’avais très peur.
  '4':
  - type: text
    content: 'Quand je vous ai parlé et quand je vous ai enseigné le message de Dieu, je n’ai pas utilisé de mots sages. Je ne voulais pas que vous croyiez en moi parce que vous pensiez que j’étais sage. Mais, c’est la puissance du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu qui vous a montré que mon message était vrai.'
  '5':
  - type: text
    content: Par conséquent, vous croyez maintenant à cause de la puissance de Dieu. Vous ne croyez pas à cause des idées humaines.
  '6':
  - type: text
    content: Mais nous parlons de pensées sages à ceux d’entre vous qui connaissent très bien Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Mais ces pensées sages n’appartiennent pas à ce monde. Ce ne sont pas les idées que les dirigeants de ce monde jugent importantes. Ces dirigeants ne seront plus puissants. '
  '7':
  - type: text
    content: 'Non, la sagesse dont nous parlons appartient à Dieu. Il l’a cachée aux gens jusqu’à présent. Mais avant que Dieu crée le monde, il a décidé de nous révéler ses secrets. Il voulait que nous vivions avec lui dans son Royaume. '
  '8':
  - type: text
    content: 'Aucun des dirigeants de ce monde n’a compris le plan sage de Dieu. S’ils avaient compris, ils n’allaient pas tuer Jésus sur une croix. Il est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui dirige le '
  - type: text
    content: ciel
  - type: text
    content: ' et la terre. '
  '9':
  - type: text
    content: 'Ceci est écrit dans la Bible :'
  - type: text
    content: Personne n’a jamais vu ou entendu quoi que ce soit à ce sujet.
  - type: text
    content: Personne n’a jamais pensé que cela pourrait arriver.
  - type: text
    content: Mais ce sont les choses que Dieu a préparées pour son peuple qui l’aime.
