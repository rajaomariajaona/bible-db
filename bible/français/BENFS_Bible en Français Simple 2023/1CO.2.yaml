document_id: 1CO.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment Paul a enseigné le message de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Amis chrétiens, je suis venu vous dire le vrai message de Dieu. Je n’ai pas utilisé de mots sages lorsque je vous ai parlé.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n’ai pas essayé de vous faire croire que j’étais très sage. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais Dieu a envoyé son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' pour nous faire savoir ces secrets. L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu regarde attentivement tout. Il connaît même les pensées cachées de Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Seul l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' d’une personne peut savoir tout ce qui est dans ses pensées. Et c’est la même chose avec Dieu. Seul l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu sait tout ce qui est dans les pensées de Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nous avons reçu le propre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu, pas un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' qui appartient à ce monde. En conséquence, nous pouvons comprendre toutes les bonnes choses que Dieu nous a données. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ce sont des choses que nous disons. Nous n’utilisons pas de mots sages pour parler des idées humaines. Mais, nous disons le message que l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu nous a enseigné. De cette façon, nous expliquons un message spirituel aux personnes qui ont l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Si quelqu’un ne croit pas en Dieu, il ne peut accepter le message qui vient de l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu. Il pense que le message de Dieu est bête. Il ne peut même pas comprendre ces choses. Seul l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu peut l’expliquer aux gens. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mais nous avons l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu avec nous. Ainsi, nous pouvons comprendre la vraie valeur de toutes choses. Mais d’autres personnes ne peuvent pas vraiment nous comprendre, nous qui appartenons à Dieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Comme il est dit dans la Bible :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Personne ne peut savoir ce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu pense.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne ne peut lui dire ce qu’il doit faire.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais nous pensons à ces choses de la même manière que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' y pense.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Pendant que j’étais avec vous, j’ai décidé de vous enseigner seulement sur Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Je vous ai appris sa mort sur une croix. Je voulais oublier tout le reste.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’ai vécu parmi vous comme quelqu’un qui se sentait faible.
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’avais très peur.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quand je vous ai parlé et quand je vous ai enseigné le message de Dieu, je n’ai pas utilisé de mots sages. Je ne voulais pas que vous croyiez en moi parce que vous pensiez que j’étais sage. Mais, c’est la puissance du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' de Dieu qui vous a montré que mon message était vrai.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Par conséquent, vous croyez maintenant à cause de la puissance de Dieu. Vous ne croyez pas à cause des idées humaines.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mais nous parlons de pensées sages à ceux d’entre vous qui connaissent très bien Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Mais ces pensées sages n’appartiennent pas à ce monde. Ce ne sont pas les idées que les dirigeants de ce monde jugent importantes. Ces dirigeants ne seront plus puissants. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Non, la sagesse dont nous parlons appartient à Dieu. Il l’a cachée aux gens jusqu’à présent. Mais avant que Dieu crée le monde, il a décidé de nous révéler ses secrets. Il voulait que nous vivions avec lui dans son Royaume. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aucun des dirigeants de ce monde n’a compris le plan sage de Dieu. S’ils avaient compris, ils n’allaient pas tuer Jésus sur une croix. Il est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui dirige le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' et la terre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ceci est écrit dans la Bible :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne n’a jamais vu ou entendu quoi que ce soit à ce sujet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne n’a jamais pensé que cela pourrait arriver.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ce sont les choses que Dieu a préparées pour son peuple qui l’aime.
