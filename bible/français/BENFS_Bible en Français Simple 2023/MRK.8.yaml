document_id: MRK.8,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 8
  - type: heading
    content: Jésus donne de la nourriture à 4 000 personnes
  - type: text
    content: 'A ce temps‑là, une autre grande foule est venue pour entendre Jésus. Les gens n’avaient rien à manger. Jésus a demandé à ses '
  - type: text
    content: disciples
  - type: text
    content: ' de venir à lui. Puis il leur a parlé. '
  '10':
  - type: text
    content: 'Immédiatement, il est monté dans le petit bateau avec ses '
  - type: text
    content: disciples
  - type: text
    content: '. Ensuite, ils sont tous retournés à la partie du pays appelé Dalmanutha. '
  '11':
  - type: text
    content: 'Quelques '
  - type: text
    content: Pharisiens
  - type: text
    content: ' sont venus. Ils ont commencé à discuter avec Jésus. Ils voulaient que Jésus fasse quelque chose de puissant. Ils ont voulu que Jésus prouve que Dieu l’a réellement envoyé. '
  '12':
  - type: text
    content: 'Jésus était très triste. Il a dit : Aujourd’hui, les gens demandent de voir quelque chose d’extraordinaire. Je vous dis la vérité. Ces gens ne verront aucune chose extraordinaire qu’ils veulent. '
  '13':
  - type: text
    content: Alors Jésus a quitté ces gens. Il est remonté dans le petit bateau pour aller de l’autre côté de la mer.
  - type: heading
    content: Jésus parle du levain des Pharisiens et du levain d’Hérode
  '14':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont oublié de prendre du pain avec eux. Ils avaient seulement un pain dans le petit bateau. '
  '15':
  - type: text
    content: 'Jésus leur a dit : Attention au levain des '
  - type: text
    content: Pharisiens
  - type: text
    content: ' et d’Hérode. '
  '16':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' ont commencé à parler les uns aux autres à ce sujet. Ils disaient : Jésus a dit cela parce que nous n’avons pas de pains. '
  '17':
  - type: text
    content: 'Jésus savait cela. Alors il leur a dit : Vous ne devriez pas parler du fait que vous n’avez pas de pains.'
  - type: text
    content: 'Vous ne semblez toujours pas voir ni comprendre. Vos '
  - type: text
    content: esprits
  - type: text
    content: ' semblent être si peu disposés à changer. '
  '18':
  - type: text
    content: 'Vous êtes comme des gens qui ne peuvent pas voir avec leurs yeux. Vous êtes comme des gens qui ne peuvent pas entendre avec leurs oreilles. Rappelez‑vous ceci : '
  '19':
  - type: text
    content: J’ai coupé 5 pains pour 5 000 hommes. Combien de paniers remplis des morceaux avez‑vous pris ?
  - type: text
    content: 'Ils ont répondu : Il y avait 12 paniers. '
  '2':
  - type: text
    content: 'Je suis triste pour ces gens. Ils ont été avec moi pendant 3 jours et ils n’ont pas de nourriture. '
  '20':
  - type: text
    content: 'Jésus a demandé : Et puis j’ai coupé 7 pains pour 4 000 personnes. Combien de paniers remplis des morceaux avez‑vous pris ? Ils ont répondu : Il y avait 7 paniers. '
  '21':
  - type: text
    content: 'Jésus leur a dit : Alors vous devez comprendre maintenant.'
  - type: heading
    content: Jésus aide un homme aveugle à voir
  '22':
  - type: text
    content: 'Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés à un village appelé '
  - type: text
    content: Bethsaïda
  - type: text
    content: '. Certains hommes ont conduit un aveugle à Jésus. Ils ont demandé à Jésus de toucher l’homme. '
  '23':
  - type: text
    content: 'Jésus a tenu la main de l’aveugle et il a conduit l’homme en dehors du village. Jésus a mis de la salive sur les yeux de l’homme. Et Jésus a posé ses mains sur l’homme. Jésus a demandé : Vois‑tu quelque chose ? '
  '24':
  - type: text
    content: 'L’homme a levé les yeux. Il a répondu : Je vois des gens. Mais ces gens semblent comme des arbres qui marchent. '
  '25':
  - type: text
    content: 'Alors Jésus a encore posé ses mains sur les yeux de l’homme. L’homme regardait attentivement et ses yeux sont devenus bien. Maintenant, il pouvait voir clairement tout. '
  '26':
  - type: text
    content: 'Jésus a dit à l’homme de rentrer à sa maison. Jésus lui a dit : N’entre pas dans le village.'
  - type: heading
    content: Pierre dit qui est Jésus
  '27':
  - type: text
    content: 'Alors Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés visiter quelques villages. C’étaient les villages de '
  - type: text
    content: Césarée
  - type: text
    content: ' de Philippe. Sur le chemin, Jésus a demandé à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Qui suis‑je selon les gens ? '
  '28':
  - type: text
    content: 'Ils ont répondu : Certaines personnes disent que tu es Jean‑'
  - type: text
    content: Baptiste
  - type: text
    content: '. D’autres personnes disent que tu es Élie. Et d’autres personnes disent que tu es l’un des serviteurs de Dieu. '
  '29':
  - type: text
    content: 'Jésus leur a demandé : Mais que pensez‑vous ? Qui suis‑je selon vous ? Pierre lui a répondu : Tu es le '
  - type: text
    content: Messie
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Je ne veux pas les renvoyer chez eux, alors qu’ils ont faim. Ils peuvent tomber pendant leur voyage à cause de la faiblesse. Certains d’entre eux ont parcouru un long chemin. '
  '30':
  - type: text
    content: 'Alors Jésus a parlé avec autorité à ses '
  - type: text
    content: disciples
  - type: text
    content: . Il leur a dit de ne pas dire cela aux gens.
  - type: heading
    content: Jésus dit à ses disciples comment il va mourir
  '31':
  - type: text
    content: 'Alors Jésus a commencé à enseigner ses '
  - type: text
    content: disciples
  - type: text
    content: ' sur les choses qui vont lui arriver. De mauvaises personnes lui feront beaucoup de mal. Les  '
  - type: text
    content: anciens
  - type: text
    content: ' seront contre lui. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi de Dieu seront aussi contre lui. Les mauvaises personnes le tueront. Mais au bout de 3 jours, il deviendra de nouveau vivant. '
  '32':
  - type: text
    content: 'Ce que Jésus a dit, était très clair. Alors Pierre a amené Jésus loin des autres '
  - type: text
    content: disciples
  - type: text
    content: '. Et Pierre s’est mis à dire à Jésus de ne pas dire ces choses. '
  '33':
  - type: text
    content: 'Mais Jésus s’est retourné et il a vu ses '
  - type: text
    content: disciples
  - type: text
    content: '. Et il a dit que Pierre venait de parler mal. Jésus a dit à Pierre : Satan, va loin de moi ! Tes pensées ne viennent pas de Dieu. Tu penses comme les hommes pensent. '
  '34':
  - type: text
    content: 'Alors Jésus a demandé à la foule et à ses '
  - type: text
    content: disciples
  - type: text
    content: ' de venir à lui. Il leur a dit : Quelqu’un qui veut être mon '
  - type: text
    content: disciple
  - type: text
    content: ' ne doit pas penser à lui‑même. Et il ne doit pas penser à ce qu’il veut faire. Il doit décider que sa propre vie n’a pas d’importance. Et il doit être comme quelqu’un qui porte sa propre croix. Ainsi, cet homme sera mon '
  - type: text
    content: disciple
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'La personne qui veut sauver sa vie, va mourir. Mais une autre personne peut mourir à cause de moi et à cause de la Bonne Nouvelle. Même si cette personne meurt, elle sauvera sa vie. '
  '36':
  - type: text
    content: 'Pensez à une personne qui obtient le monde entier. Si cette personne perd sa vie, cela lui sert à quoi ? '
  '37':
  - type: text
    content: 'Il n’y a rien qu’il peut échanger pour son '
  - type: text
    content: âme
  - type: text
    content: '. Et tout l’argent dans le monde ne peut pas garder quelqu’un en vie. '
  '38':
  - type: text
    content: 'Aujourd’hui, les gens ne respectent pas Dieu. Ils sont très mauvais. Mais il ne faut pas avoir honte de moi ni de mes paroles. Si vous avez honte, le Fils de l’homme aura aussi honte de vous. Il aura honte de vous quand il reviendra. Ce jour‑là, le Fils de l’homme va briller, parce que son père est si beau. Et les saints '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu seront avec lui.'
  '4':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' ont répondu : Nous sommes dans un lieu '
  - type: text
    content: désert
  - type: text
    content: '. Nous ne pouvons pas obtenir assez de pains pour nourrir ces gens. '
  '5':
  - type: text
    content: 'Jésus a demandé : Combien de pains vous avez ? Ils ont répondu : Nous avons 7 pains. '
  '6':
  - type: text
    content: 'Jésus a dit à la foule de s’asseoir. Puis il a pris les 7 pains. Il a remercié Dieu pour cela. Puis il a coupé les pains et il les a donnés à ses '
  - type: text
    content: disciples
  - type: text
    content: '. Les '
  - type: text
    content: disciples
  - type: text
    content: ' les ont distribués au peuple. '
  '7':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' avaient aussi quelques petits poissons, Jésus a remercié Dieu pour cela. Puis Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: ' de donner quelques petits poissons au peuple aussi. '
  '8':
  - type: text
    content: 'Les gens ont mangé, et ils avaient tous assez de nourriture. Après cela, les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus ont rempli 7 paniers des morceaux restés. '
  '9':
  - type: text
    content: 'Il y avait environ 4 000 personnes. Et Jésus a fait partir les gens. '
