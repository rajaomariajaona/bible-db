document_id: MRK.8,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 8
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus donne de la nourriture à 4 000 personnes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A ce temps‑là, une autre grande foule est venue pour entendre Jésus. Les gens n’avaient rien à manger. Jésus a demandé à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de venir à lui. Puis il leur a parlé. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Immédiatement, il est monté dans le petit bateau avec ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Ensuite, ils sont tous retournés à la partie du pays appelé Dalmanutha. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Quelques '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' sont venus. Ils ont commencé à discuter avec Jésus. Ils voulaient que Jésus fasse quelque chose de puissant. Ils ont voulu que Jésus prouve que Dieu l’a réellement envoyé. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jésus était très triste. Il a dit : Aujourd’hui, les gens demandent de voir quelque chose d’extraordinaire. Je vous dis la vérité. Ces gens ne verront aucune chose extraordinaire qu’ils veulent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Alors Jésus a quitté ces gens. Il est remonté dans le petit bateau pour aller de l’autre côté de la mer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus parle du levain des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' et du levain d’Hérode'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus ont oublié de prendre du pain avec eux. Ils avaient seulement un pain dans le petit bateau. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jésus leur a dit : Attention au levain des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pharisiens
    - type: text
      text: ' et d’Hérode. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont commencé à parler les uns aux autres à ce sujet. Ils disaient : Jésus a dit cela parce que nous n’avons pas de pains. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus savait cela. Alors il leur a dit : Vous ne devriez pas parler du fait que vous n’avez pas de pains.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne semblez toujours pas voir ni comprendre. Vos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' semblent être si peu disposés à changer. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Vous êtes comme des gens qui ne peuvent pas voir avec leurs yeux. Vous êtes comme des gens qui ne peuvent pas entendre avec leurs oreilles. Rappelez‑vous ceci : '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: J’ai coupé 5 pains pour 5 000 hommes. Combien de paniers remplis des morceaux avez‑vous pris ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont répondu : Il y avait 12 paniers. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je suis triste pour ces gens. Ils ont été avec moi pendant 3 jours et ils n’ont pas de nourriture. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jésus a demandé : Et puis j’ai coupé 7 pains pour 4 000 personnes. Combien de paniers remplis des morceaux avez‑vous pris ? Ils ont répondu : Il y avait 7 paniers. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus leur a dit : Alors vous devez comprendre maintenant.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus aide un homme aveugle à voir
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont allés à un village appelé '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Bethsaïda
    - type: text
      text: '. Certains hommes ont conduit un aveugle à Jésus. Ils ont demandé à Jésus de toucher l’homme. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus a tenu la main de l’aveugle et il a conduit l’homme en dehors du village. Jésus a mis de la salive sur les yeux de l’homme. Et Jésus a posé ses mains sur l’homme. Jésus a demandé : Vois‑tu quelque chose ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L’homme a levé les yeux. Il a répondu : Je vois des gens. Mais ces gens semblent comme des arbres qui marchent. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Alors Jésus a encore posé ses mains sur les yeux de l’homme. L’homme regardait attentivement et ses yeux sont devenus bien. Maintenant, il pouvait voir clairement tout. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus a dit à l’homme de rentrer à sa maison. Jésus lui a dit : N’entre pas dans le village.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre dit qui est Jésus
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Alors Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont allés visiter quelques villages. C’étaient les villages de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: ' de Philippe. Sur le chemin, Jésus a demandé à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '  : Qui suis‑je selon les gens ? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils ont répondu : Certaines personnes disent que tu es Jean‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Baptiste
    - type: text
      text: '. D’autres personnes disent que tu es Élie. Et d’autres personnes disent que tu es l’un des serviteurs de Dieu. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus leur a demandé : Mais que pensez‑vous ? Qui suis‑je selon vous ? Pierre lui a répondu : Tu es le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je ne veux pas les renvoyer chez eux, alors qu’ils ont faim. Ils peuvent tomber pendant leur voyage à cause de la faiblesse. Certains d’entre eux ont parcouru un long chemin. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Alors Jésus a parlé avec autorité à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: . Il leur a dit de ne pas dire cela aux gens.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' comment il va mourir'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Alors Jésus a commencé à enseigner ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sur les choses qui vont lui arriver. De mauvaises personnes lui feront beaucoup de mal. Les  '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ' seront contre lui. Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les enseignants de la loi de Dieu seront aussi contre lui. Les mauvaises personnes le tueront. Mais au bout de 3 jours, il deviendra de nouveau vivant. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ce que Jésus a dit, était très clair. Alors Pierre a amené Jésus loin des autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Et Pierre s’est mis à dire à Jésus de ne pas dire ces choses. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Mais Jésus s’est retourné et il a vu ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Et il a dit que Pierre venait de parler mal. Jésus a dit à Pierre : Satan, va loin de moi ! Tes pensées ne viennent pas de Dieu. Tu penses comme les hommes pensent. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Alors Jésus a demandé à la foule et à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de venir à lui. Il leur a dit : Quelqu’un qui veut être mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' ne doit pas penser à lui‑même. Et il ne doit pas penser à ce qu’il veut faire. Il doit décider que sa propre vie n’a pas d’importance. Et il doit être comme quelqu’un qui porte sa propre croix. Ainsi, cet homme sera mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: '. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'La personne qui veut sauver sa vie, va mourir. Mais une autre personne peut mourir à cause de moi et à cause de la Bonne Nouvelle. Même si cette personne meurt, elle sauvera sa vie. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Pensez à une personne qui obtient le monde entier. Si cette personne perd sa vie, cela lui sert à quoi ? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Il n’y a rien qu’il peut échanger pour son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âme
    - type: text
      text: '. Et tout l’argent dans le monde ne peut pas garder quelqu’un en vie. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Aujourd’hui, les gens ne respectent pas Dieu. Ils sont très mauvais. Mais il ne faut pas avoir honte de moi ni de mes paroles. Si vous avez honte, le Fils de l’homme aura aussi honte de vous. Il aura honte de vous quand il reviendra. Ce jour‑là, le Fils de l’homme va briller, parce que son père est si beau. Et les saints '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu seront avec lui.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont répondu : Nous sommes dans un lieu '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: '. Nous ne pouvons pas obtenir assez de pains pour nourrir ces gens. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus a demandé : Combien de pains vous avez ? Ils ont répondu : Nous avons 7 pains. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jésus a dit à la foule de s’asseoir. Puis il a pris les 7 pains. Il a remercié Dieu pour cela. Puis il a coupé les pains et il les a donnés à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' les ont distribués au peuple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' avaient aussi quelques petits poissons, Jésus a remercié Dieu pour cela. Puis Jésus a dit à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de donner quelques petits poissons au peuple aussi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les gens ont mangé, et ils avaient tous assez de nourriture. Après cela, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus ont rempli 7 paniers des morceaux restés. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il y avait environ 4 000 personnes. Et Jésus a fait partir les gens. '
