document_id: PHP.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Paul est heureux des chrétiens de Philippes
  - type: text
    content: 'Mes frères, je vous aime beaucoup. Et je veux beaucoup vous rencontrer à nouveau. Vous me rendez vraiment heureux. Vous montrez que mon travail parmi vous a de bons résultats. Je suis donc très heureux à cause de vous. Mes bons amis, s’il vous plaît, rappelez‑vous ce que je vous ai dit. Si vous vous souvenez de cela, vous allez continuer à croire fermement en '
  - type: text
    content: Christ
  - type: text
    content: '. Vous allez continuer à vivre pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce que vous êtes unis à lui.'
  - type: heading
    content: Soyez d’accord les uns avec les autres
  '10':
  - type: text
    content: 'Je suis très heureux que maintenant vous voulez m’aider à nouveau. Je remercie le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que vous voulez m’aider. Je sais que vous m’avez aidé auparavant. Mais c’est longtemps que vous avez eu la chance de m’aider.'
  '11':
  - type: text
    content: Je ne dis pas cela parce que j’ai besoin de quelque chose. J’ai appris à être heureux, quelles que soient les choses qui peuvent se passer pour moi.
  '12':
  - type: text
    content: 'Je sais ce que c’est d’avoir besoin de choses. Je sais ce que c’est d’avoir beaucoup de choses. J’ai appris à être heureux à tout moment et pendant toutes choses. J’ai appris ce secret. Je peux être heureux si j’ai assez de nourriture ou non. Je peux être heureux si j’ai beaucoup de choses ou rien. '
  '13':
  - type: text
    content: 'Je peux tout faire, parce que '
  - type: text
    content: Christ
  - type: text
    content: ' me rend fort.'
  '14':
  - type: text
    content: 'Mais certainement, vous avez été très gentils envers moi. Vous m’avez aidé à ce moment, quand j’étais dans la souffrance. '
  '15':
  - type: text
    content: Aussi, vous m’avez aidé plus tôt. C’était quand je commençais à dire aux gens la Bonne Nouvelle.
  - type: text
    content: 'Quand je partais de la Macédoine, vous m’avez aidé. Vous étiez le seul groupe de chrétiens qui m’avez alors aidé. Vous les gens qui vivez à Philippes, vous savez cela. Aucun autre groupe de chrétiens ne m’a offert de dons comme vous l’avez fait. '
  '16':
  - type: text
    content: Même quand j’étais à Thessalonique, vous m’avez aidé. Plus d’une fois, vous m’avez envoyé des cadeaux. J’étais vraiment dans le besoin.
  '17':
  - type: text
    content: Ce ne sont pas vos cadeaux que je veux. Mais, je veux que vous fassiez de bonnes choses, afin que Dieu soit content de vous. Il va donc être bon pour vous encore plus, parce que vous m’avez aidé.
  '18':
  - type: text
    content: 'Épaphrodite a apporté les cadeaux que vous m’avez envoyés. J’ai reçu ces dons, et maintenant je n’ai pas besoin de quoi que ce soit. Vous m’avez envoyé beaucoup. C’est plus que suffisant. Vos dons sont comme un '
  - type: text
    content: sacrifice
  - type: text
    content: ' avec une odeur agréable, que les gens offrent à Dieu. Dieu accepte un '
  - type: text
    content: sacrifice
  - type: text
    content: ' comme ça, parce que cela le rend heureux. '
  '19':
  - type: text
    content: Mon Dieu a beaucoup de très bonnes choses pour nous à cause de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Il nous donnera tout. Dieu vous donnera tout ce dont vous avez besoin en '
  - type: text
    content: Christ
  - type: text
    content: .
  '2':
  - type: text
    content: 'Je dis cela à Évodie et je le dis à Syntyche : Vous êtes comme des sœurs, parce que vous êtes unies au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Je demande donc très fortement que vous soyez d’accord l’une avec l’autre. '
  '20':
  - type: text
    content: Tout le monde doit toujours dire que notre Dieu, notre Père, est très grand ! Ils ne doivent jamais arrêter de dire ça ! C’est vrai.
  '21':
  - type: text
    content: Dites bonjour à tous les gens qui appartiennent à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Les chrétiens qui sont ici avec moi, vous disent bonjour.
  '22':
  - type: text
    content: 'Tous les gens de Dieu qui sont ici, vous disent bonjour. Et les chrétiens qui vivent dans la maison du Roi '
  - type: text
    content: César
  - type: text
    content: ', vous disent un spécial bonjour.'
  '23':
  - type: text
    content: 'Nous prions pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continue d’être très gentil envers vous tous.'
  '3':
  - type: text
    content: Je vous demande aussi, mes bien‑aimés, d’aider ces femmes. Vous avez travaillé avec moi pour dire la Bonne Nouvelle aux gens. Et ces femmes ont travaillé avec moi aussi. Elles ont beaucoup travaillé pour que les gens croient à la Bonne Nouvelle. Elles ont travaillé avec Clément, et elles ont travaillé avec tous mes autres compagnons. Tous ces noms des compagnons sont dans le livre de Dieu. Ce livre dit qui vivra toujours avec lui.
  - type: heading
    content: Soyez heureux et ayez de bonnes pensées
  '4':
  - type: text
    content: 'Soyez toujours heureux, parce que vous vivez unis au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Je vais le dire encore, soyez heureux ! '
  '5':
  - type: text
    content: 'Soyez toujours gentils et patients. Donc, tout le monde va voir que vous êtes très gentils et bons. Rappelez‑vous que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche '
  '6':
  - type: text
    content: N’ayez peur de rien. Ne laissez rien vous causer des problèmes dans vos cœurs. Au lieu de cela, dites tout à Dieu. Priez‑le. Demandez‑lui tout ce dont vous avez besoin. Et quand vous priez, remerciez‑le toujours.
  '7':
  - type: text
    content: 'Si vous faites cela, Dieu vous dirigera. Il dirigera vos '
  - type: text
    content: esprits
  - type: text
    content: ' par Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Il dirigera ce que vous sentez. Il vous donnera la paix dans vos cœurs. Dieu est très grand. Il peut tout faire pour nous. Mais nous ne pouvons pas comprendre comment il le fait.
  '8':
  - type: text
    content: Maintenant frères, je veux vous dire ceci. Pensez aux choses qui sont vraies et honnêtes. Pensez aux choses qui sont justes, pures, bonnes, agréables. Tout le monde peut voir que certaines choses sont tout à fait bonnes. Pensez à ces choses.
  '9':
  - type: text
    content: Faites ces choses que vous avez apprises de moi. Rappelez‑vous les choses que je disais. Rappelez‑vous les choses que je faisais. Vous devez faire ces choses aussi. Et le Dieu qui nous donne la paix du cœur sera avec vous.
  - type: heading
    content: Paul remercie les croyants de Philippes pour leurs dons à lui
