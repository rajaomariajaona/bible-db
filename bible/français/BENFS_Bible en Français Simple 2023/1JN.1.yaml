document_id: 1JN.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Jésus est le message de Dieu aux gens
  - type: text
    content: Nous avons un message important à vous dire. Nous voulons vous parler de l’homme qui était déjà là avant le début du monde. Nous l’avons entendu parler. Nous l’avons vu de nos propres yeux. Nous l’avons observé et nous l’avons touché. Il est la Parole qui nous donne la vie avec Dieu.
  '10':
  - type: text
    content: Donc, si nous disons que nous n’avons rien fait de mal, nous disons que Dieu ment. Cela montre que nous n’avons pas du tout accepté son message.
  '2':
  - type: text
    content: 'Il s’est montré clairement quand il a vécu sur cette terre. Depuis longtemps, il était avec Dieu le Père et il vit éternellement. Nous l’avons vu et nous vous disons ce qui est vrai. C’est lui qui s’est montré à nous. '
  '3':
  - type: text
    content: Nous voulons que vous partagiez aussi cette nouvelle vie avec nous. Nous partageons vraiment cette vie avec Dieu le Père et Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' son Fils. C’est pourquoi nous vous racontons tout ce que nous avons vu et entendu. '
  '4':
  - type: text
    content: Nous vous écrivons pour qu’ensemble nous soyons tous heureux.
  - type: heading
    content: Dieu est lumière
  '5':
  - type: text
    content: Nous vous annonçons la Bonne Nouvelle que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' nous a annoncée. Le message est : Dieu est complètement bon et pur. Il est comme la lumière. Il n’y a rien de sombre en lui. '
  '6':
  - type: text
    content: 'Dites‑vous que vous partagez la vie que Dieu donne ? Si vous dites cela, mais si vous vivez toujours dans le noir, vous mentez. Vous ne vivez pas comme Dieu vraiment. '
  '7':
  - type: text
    content: 'Mais quand nous vivons correctement, c’est comme vivre dans la lumière. Dieu est toujours dans la lumière. Donc, si nous vivons dans la lumière, nous partageons ensemble la vie que Dieu donne. Et quand Jésus, le Fils de Dieu, est mort sur la croix, il nous a sauvés de tous nos péchés. Le sang de son '
  - type: text
    content: sacrifice
  - type: text
    content: ' nous purifie devant Dieu.'
  '8':
  - type: text
    content: 'Si nous disons que nous ne faisons jamais de mal, nous nous trompons. Même si nous pensons que c’est vrai, c’est un mensonge. '
  '9':
  - type: text
    content: 'Par contre, nous devons accepter que nous avons fait de mauvaises choses et les dire à Dieu. Alors Dieu nous pardonnera nos péchés. Il fait toujours ce qu’il a promis de faire. Il fait toujours ce qui est bien. Il nous pardonnera et il nous rendra purs, quelles que soient les mauvaises choses que nous avons faites. Dieu dit que tout le monde a fait de mauvaises choses. '
