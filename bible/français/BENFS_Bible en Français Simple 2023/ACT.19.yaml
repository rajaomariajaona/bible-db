document_id: ACT.19,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 19
  - type: heading
    content: Paul parle de Jésus à Éphèse
  - type: text
    content: 'Quand Apollos était à Corinthe, Paul a voyagé vers la Phrygie et la Galatie. Il est alors arrivé à Éphèse et il a trouvé quelques croyants là. '
  '10':
  - type: text
    content: 'Paul enseignait les gens à Éphèse pendant 2 années. En ce temps‑là, tous les gens qui habitaient en Asie entendaient le message au sujet de Jésus. Paul enseignait les '
  - type: text
    content: Juifs
  - type: text
    content: ' et ceux qui n’étaient pas '
  - type: text
    content: Juifs
  - type: text
    content: '. Les fils de Scéva ordonnaient aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' de quitter des gens.'
  '11':
  - type: text
    content: 'Dieu travaillait avec Paul et Dieu faisait beaucoup de choses puissantes. C’étaient des choses que personne n’avait faites avant. '
  '12':
  - type: text
    content: 'Des gens prenaient des morceaux de tissu et de vêtements que Paul leur avait donnés. Paul avait utilisé ces choses. Les gens amenaient ces tissus aux malades. Après qu’ils les ont reçus, les malades devenaient encore bien. Et les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' les quittaient également. '
  '13':
  - type: text
    content: 'Il y avait quelques '
  - type: text
    content: Juifs
  - type: text
    content: ' qui ont voyagé. Ils faisaient aussi sortir de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' des gens. Maintenant ils voulaient utiliser le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus quand ils faisaient ceci. Ces '
  - type: text
    content: Juifs
  - type: text
    content: ' disaient aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: '  : Paul enseignait le peuple au sujet de Jésus. Ainsi, nous utilisons le pouvoir de Jésus pour vous dire : Mauvais '
  - type: text
    content: esprits
  - type: text
    content: ', sortez de ces personnes. '
  '14':
  - type: text
    content: 'Scéva était l’un de grands '
  - type: text
    content: prêtres
  - type: text
    content: ' à Éphèse. Il avait 7 fils qui ordonnaient aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' de sortir de quelqu’un de cette façon. '
  '15':
  - type: text
    content: 'Mais le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' disait aux fils de Scéva : Je connais qui est Jésus. Et je connais également Paul. Mais je ne te connais pas. '
  '16':
  - type: text
    content: 'Un homme avait le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' et il vivait à l’intérieur de lui. Il a combattu fortement les 7 fils et il a gagné le combat. Il a blessé les fils et a déchiré leurs vêtements. Ainsi les fils ont fui nus de la maison de l’homme.'
  '17':
  - type: text
    content: 'Tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' et les étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: ' qui habitaient à Éphèse, entendaient parler de ceci. Ils avaient peur et ils disaient : Cet homme appelé le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus est très puissant. Il est beaucoup plus puissant que nous pensions. Il est une personne très importante. '
  '18':
  - type: text
    content: 'Plusieurs des croyants disaient chacun toutes les mauvaises choses qu’ils avaient également faites. '
  '19':
  - type: text
    content: 'Ceux qui avaient utilisé de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' puissants apportaient tous leurs livres de la magie. Alors ils brûlaient les livres, de sorte que chacun puisse les voir. Ils ont compté que ces livres avaient coûté 50 000 pièces d’argent. '
  '2':
  - type: text
    content: 'Paul leur a demandé : Quand vous avez cru au message à propos de Jésus, vous a‑t‑il donné son Saint‑Esprit ? Les croyants ont répondu : Nous ne savions même pas qu’il y a un Saint‑Esprit.'
  '20':
  - type: text
    content: Quand ces choses puissantes se sont produites, de plus en plus de gens entendaient la Bonne Nouvelle au sujet de Jésus. Et ils croyaient fortement à tout sur Jésus.
  - type: heading
    content: Des troubles à Éphèse
  '21':
  - type: text
    content: 'Après ces choses, Paul a décidé de voyager en Macédoine et en Grèce. De là, il a décidé de voyager vers Jérusalem. Il a dit : Après mon départ de là, je dois aller voir Rome. '
  '22':
  - type: text
    content: Timothée et Eraste aidaient Paul dans son travail. Paul les a envoyés en Macédoine quand il restait plus longtemps dans les villes en Asie.
  '23':
  - type: text
    content: 'C’était à ce temps‑là qu’il y avait des troubles à Éphèse. Ces troubles se sont produits à cause des choses que Paul enseignait. Il les enseignait comment suivre Jésus. '
  '24':
  - type: text
    content: 'A Éphèse, il y avait un homme appelé Démétrius. Il faisait de très petites choses. Ces choses ressemblaient à la maison du dieu féminin appelé Diane. Il les fabriquait à partir du métal de valeur et il versait beaucoup d’argent à ses ouvriers. '
  '25':
  - type: text
    content: 'Ainsi il demandait à tous ses ouvriers de le rencontrer. Et il demandait également à d’autres hommes de venir. Ces hommes faisaient tous le même genre de travail que Démétrius. Il disait à tous ces hommes : Vous savez que notre travail nous a fait devenir riches ? '
  '26':
  - type: text
    content: 'Et vous pouvez voir ce que cet homme Paul fait. Vous pouvez également entendre vous‑mêmes ce qu’il dit. Paul a dit : Les dieux que les hommes ont faits ne sont pas vraiment de dieux. Ici à Éphèse, et en toute l’Asie, beaucoup de gens croient en ce qu’il dit. '
  '27':
  - type: text
    content: 'Ça pourrait arriver que les gens disent de mauvaises choses au sujet de notre travail. Ça pourrait également arriver que la maison de la déesse Diane ne continue pas d’être importante au peuple. Et les gens penseront que la déesse Diane elle‑même n’est pas importante. Actuellement, chacun en Asie et le monde '
  - type: text
    content: romain
  - type: text
    content: ' pensent que Diane est très grande et importante.'
  '28':
  - type: text
    content: 'Quand la foule a entendu Démétrius, elle est devenue très fâchée. Elle criait : Diane d’Éphèse est vraiment très grande. '
  '29':
  - type: text
    content: 'De plus en plus de personnes dans toute la ville commençaient à crier. Gaïus et Aristarque étaient de Macédoine et ils voyageaient avec Paul. Certains dans la foule tenaient ces 2 hommes. Ils les ont rapidement amenés à l’endroit ouvert au milieu de la ville. C’est là que tous se réunissaient ensemble. '
  '3':
  - type: text
    content: 'Ainsi Paul leur a demandé : Quand quelqu’un vous avait baptisés, qu’est‑ce que vous avez compris ? Ils ont répondu : Nous avons reçu le '
  - type: text
    content: baptême
  - type: text
    content: ' dont Jean avait parlé.'
  '30':
  - type: text
    content: 'Paul lui‑même voulait se tenir devant la foule. Mais les autres croyants ne le laissaient pas. '
  '31':
  - type: text
    content: 'Quelques hommes '
  - type: text
    content: romains
  - type: text
    content: ' importants d’Éphèse étaient les amis de Paul et ils lui ont envoyé un message. Ils ont dit : Ne te tiens pas devant la foule.'
  '32':
  - type: text
    content: La foule faisait bien plus de bruits. Certains criaient d’une façon et d’autres criaient d’une autre façon. Plusieurs personnes ne savaient pas pourquoi ces gens s’étaient réunis ensemble.
  '33':
  - type: text
    content: 'Il y avait un homme appelé Alexandre dans la foule. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' l’ont fait tenir devant la foule. Ils pensaient que c’est lui qui avait causé ce désordre. Il a fait un signe de mains. Il a voulu expliquer à la foule que lui et ses amis n’avaient pas causé ce trouble. '
  '34':
  - type: text
    content: 'Mais la foule a su qu’Alexandre était un '
  - type: text
    content: Juif
  - type: text
    content: '. Ainsi elle a continué à crier les mêmes mots pendant 2 heures. Ils criaient : Diane d’Éphèse est vraiment très grande !'
  '35':
  - type: text
    content: 'Après les 2 heures, un homme important de la ville s’est fait écouter par la foule. Les gens d’Éphèse disaient : La maison de la déesse Diane est ici à Éphèse. La pierre spéciale qui est tombée du '
  - type: text
    content: ciel
  - type: text
    content: ' est également ici à Éphèse. Le peuple sait ces 2 choses et il les garde bien. '
  '36':
  - type: text
    content: 'Personne ne peut dire que ceci n’est pas vrai. Ainsi vous ne devez rien faire sans penser d’abord à cela attentivement. '
  '37':
  - type: text
    content: 'Gaïus et Aristarque n’ont rien pris de la maison de notre déesse. Ils n’ont rien dit de mauvais au sujet de la déesse. Mais vous les amenez toujours ici. '
  '38':
  - type: text
    content: 'Peut‑être Démétrius et ses ouvriers pensent que quelqu’un a fait une mauvaise chose. S’ils ont fait, laissez‑les parler à un magistrat. La cour est ouverte certains jours pour ceci. Le gouverneur '
  - type: text
    content: romain
  - type: text
    content: ' jugera ce qu’il dit. Le chef dira si c’est correct ou incorrect. Démétrius et ses ouvriers peuvent discuter devant lui au sujet de ce que Paul dit. '
  '39':
  - type: text
    content: 'Si vous voulez discuter de ces problèmes davantage, allez à la réunion des personnes importantes de la ville. Ces personnes règnent dans notre ville. '
  '4':
  - type: text
    content: 'Alors Paul a dit : Jean baptisait les gens qui écoutaient son message. Ces gens ont su qu’ils faisaient de mauvaises choses. Ils ont voulu laisser de faire ces choses. Ils ont alors voulu obéir à Dieu. Jean disait aussi au peuple : Vous devez croire en la personne qui viendra bientôt. Cette personne est Jésus. '
  '40':
  - type: text
    content: 'Les gens ont fait beaucoup de troubles aujourd’hui. Il y a risque qu’on nous accuse de provoquer ces troubles. Nous ne pourrions pas expliquer cela. Il n’y a aucune bonne raison de tous ces troubles. '
  '41':
  - type: text
    content: 'Il a fini de dire toutes ces choses, puis il a dit : Chacun de vous tous doit aller à la maison maintenant.'
  '5':
  - type: text
    content: 'Quand les croyants d’Éphèse ont entendu ceci, ils ont dit à Paul : Baptise‑nous au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. '
  '6':
  - type: text
    content: 'Alors Paul a touché chaque personne avec sa main. Alors Dieu leur a donné son Saint‑Esprit et ils parlaient dans différentes langues. Ils disaient également les messages de Dieu. '
  '7':
  - type: text
    content: Il y avait 12 hommes là.
  '8':
  - type: text
    content: 'Pendant 3 mois, Paul allait souvent à la '
  - type: text
    content: synagogue
  - type: text
    content: ' d’Éphèse. Il n’avait pas peur de parler aux gens là. Il discutait avec eux. Paul voulait qu’ils puissent croire aux choses vraies au sujet du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Mais certains parmi eux n’ont pas accepté ce que Paul disait. Ils ne croyaient pas en Jésus. D’autres disaient de mauvaises choses contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' devant le groupe entier. Ainsi Paul a laissé de parler à ces personnes dans cette rencontre. Il a quitté là. Il a alors pris certains croyants. Chaque jour, il parlait avec des gens dans un autre endroit. C’était une grande salle. C’était l’endroit où Tyrannus enseignait. '
