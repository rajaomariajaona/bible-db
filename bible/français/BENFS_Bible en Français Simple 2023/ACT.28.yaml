document_id: ACT.28,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 28
  - type: heading
    content: Ce qui est arrivé à Paul sur l’île appelée Malte
  - type: text
    content: 'Nous sommes arrivés au '
  - type: text
    content: rivage
  - type: text
    content: '. Nous avons découvert que le nom de l’île était Malte. '
  '10':
  - type: text
    content: Les gens nous ont donné beaucoup de cadeaux. Plus tard, ils ont mis tout ce dont nous avions besoin sur un autre bateau pour nous. Et alors nous avons quitté l’île.
  '11':
  - type: text
    content: Nous étions restés à Malte pendant 3 mois. Nous avons alors quitté l’île à bord d’un autre bateau. Ce bateau s’appelait «Les dieux jumeaux» et il était venu d’Alexandrie. Il était resté à Malte pendant l’
  - type: text
    content: hiver
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Nous sommes arrivés au port de la ville appelée Syracuse. Nous sommes restés là pendant 3 jours. '
  '13':
  - type: text
    content: De Syracuse, nous avons navigué à la côte. Et nous sommes arrivés à la ville appelée Reggio. Le jour suivant, le vent a commencé à souffler du sud. 2 jours après cela, nous sommes arrivés à la ville appelée Pouzzoles. C’était un autre port.
  - type: heading
    content: Paul arrive à Rome
  '14':
  - type: text
    content: 'Nous avons trouvé certains là qui avaient cru en Jésus. Ils nous ont demandé de rester avec eux une semaine. Après ceci, nous avons voyagé vers Rome. '
  '15':
  - type: text
    content: 'Les croyants de Rome avaient entendu parler de nous. Ainsi ils sont venus jusqu’au marché d’Appius et aux 3 Hôtels pour nous rencontrer. Quand Paul les a vus, il a remercié Dieu pour eux. Paul était très heureux comme ils sont venus le rencontrer. '
  '16':
  - type: text
    content: 'Quand nous sommes arrivés à Rome, les autorités ont dit à Paul : Tu peux vivre toi‑même dans ta propre maison. Mais un soldat te gardera de sorte que tu ne puisses pas aller ailleurs.'
  - type: heading
    content: Paul parle de Jésus‑Christ à Rome
  '17':
  - type: text
    content: 'Après 3 jours, Paul a demandé aux chefs des '
  - type: text
    content: Juifs
  - type: text
    content: ' à Rome de le rencontrer. Quand ils se sont réunis ensemble, Paul leur a dit : Frères, vous êtes des '
  - type: text
    content: Juifs
  - type: text
    content: ' comme moi. Je veux que vous sachiez que je n’ai jamais rien fait de mauvais à notre peuple. Nos pères nous ont beaucoup appris comment vivre. J’ai toujours obéi à ces règles. Mais les '
  - type: text
    content: Juifs
  - type: text
    content: ' m’ont mis dans la prison à Jérusalem et alors ils m’ont confié aux chefs '
  - type: text
    content: romains
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Les dirigeants '
  - type: text
    content: romains
  - type: text
    content: ' m’ont posé des questions sur ce que j’avais fait. Ils ont constaté que je n’avais rien fait de mal. Il n’y avait aucune raison pour laquelle ils disaient : Il doit mourir. Ainsi ils n’ont plus voulu me garder. '
  '19':
  - type: text
    content: 'Mais les '
  - type: text
    content: Juifs
  - type: text
    content: ' n’étaient pas d’accord avec les chefs '
  - type: text
    content: romains
  - type: text
    content: '. Alors j’ai demandé aux chefs '
  - type: text
    content: romains
  - type: text
    content: ' si je pouvais parler à '
  - type: text
    content: César
  - type: text
    content: '. Je n’avais rien dit de mauvais contre mon propre peuple. '
  '2':
  - type: text
    content: 'Les gens qui vivaient sur l’île étaient très aimables avec nous. La pluie tombait. Il faisait maintenant froid. Alors le peuple a fait un feu pour nous accueillir. '
  '20':
  - type: text
    content: 'A cause de tout ce qui s’est produit, j’ai voulu parler avec vous. Je crois à la même promesse que tous les '
  - type: text
    content: Juifs
  - type: text
    content: . Et c’est pourquoi je suis en prison ici.
  '21':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: Juifs
  - type: text
    content: ' à Rome ont dit : Nous n’avons reçu aucune lettre de Judée sur toi. Aucun '
  - type: text
    content: Juif
  - type: text
    content: ' n’est venu ici de Judée nous donner des nouvelles. Et aucun '
  - type: text
    content: Juif
  - type: text
    content: ' n’a rien dit de mauvais sur toi. '
  '22':
  - type: text
    content: Nous savons que les gens partout disent de mauvaises choses contre votre groupe. Ainsi nous voudrions que tu nous dises tes idées sur cela.
  '23':
  - type: text
    content: 'Ainsi, les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont décidé un jour pour se réunir encore avec Paul. Et ce jour, beaucoup de '
  - type: text
    content: Juifs
  - type: text
    content: ' sont arrivés. Ils sont venus à la maison où Paul restait. Paul leur a parlé du '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. Il a parlé du matin jusqu’à la nuit. Il leur expliquait son message. Il parlait de tout ce qui est écrit dans la loi de Moïse et des livres des '
  - type: text
    content: prophètes
  - type: text
    content: '. Et il a prouvé aux '
  - type: text
    content: Juifs
  - type: text
    content: ' que son message au sujet de Jésus était vrai.'
  '24':
  - type: text
    content: 'Certains d’entre eux ont cru que son message était vrai. Mais d’autres '
  - type: text
    content: Juifs
  - type: text
    content: ' qui étaient là ne l’ont pas cru. '
  '25':
  - type: text
    content: 'A la fin de la journée, tous les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont quitté sa maison. Mais ils n’étaient pas d’accord les uns les autres au sujet des paroles de Paul. Avant qu’ils quittent la maison, Paul avait dit : Le Saint‑Esprit a parlé correctement par le '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe. Il a parlé à vos ancêtres. Le Saint‑'
  - type: text
    content: Esprit
  - type: text
    content: ' disait à Ésaïe :'
  '26':
  - type: text
    content: Va et parle à ce peuple,
  - type: text
    content: Vous écouterez et écouterez. Mais jamais, vous ne comprendrez rien.
  - type: text
    content: Vous regarderez et regarderez. Mais jamais, vous ne verrez rien.
  '27':
  - type: text
    content: 'Ces gens ne veulent rien comprendre avec leurs '
  - type: text
    content: esprits
  - type: text
    content: .
  - type: text
    content: Ils ne veulent écouter personne.
  - type: text
    content: S’ils voulaient regarder, ils pourraient voir.
  - type: text
    content: S’ils voulaient écouter, ils pourraient entendre.
  - type: text
    content: Alors ils comprendraient également.
  - type: text
    content: Et alors ils m’obéiraient.
  - type: text
    content: Et je leur pardonnerais et je les ferais bien.
  '28':
  - type: text
    content: 'Paul a alors dit : Je veux que vous sachiez que Dieu a envoyé son message sur Jésus aux étrangers ou non‑'
  - type: text
    content: Juifs
  - type: text
    content: '. Et ils écouteront ! '
  '29':
  - type: text
    content: 'Paul a fini de dire toutes ces choses. Après cela, les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont quitté. Ils discutaient l’un l’autre.'
  '3':
  - type: text
    content: 'Paul a ramassé quelques bâtons. Il les a mis sur le feu. Mais un serpent s’est attaché à sa main. Le serpent a senti la chaleur. C’est pourquoi il est sorti de là où il était. '
  '30':
  - type: text
    content: Paul a vécu pendant 2 années à Rome dans sa propre maison. Il payait l’argent pour vivre dans la maison. Beaucoup de gens venaient chez lui et il était aimable avec eux tous.
  '31':
  - type: text
    content: 'Il enseignait les gens sur le '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: ' et au sujet du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Paul disait son message fortement.
  - type: text
    content: Il pouvait parler à chacun qui lui rendait visite. Personne n’essayait de l’arrêter.
  '4':
  - type: text
    content: 'Les gens qui vivaient là ont vu le serpent. Il tenait la main de Paul. Ainsi ils se sont dit ceci : Nous connaissons maintenant que cet homme a tué quelqu’un. Il n’est pas mort en mer, mais il ne mérite pas de vivre. Le serpent le tuera. '
  '5':
  - type: text
    content: 'Alors Paul a fait tomber le serpent de sa main. Il est tombé dans le feu. Mais il n’a fait aucun mal à Paul. '
  '6':
  - type: text
    content: 'Les gens observaient Paul attentivement. Ils attendaient que sa main gonfle. Ils pensaient qu’il allait mourir immédiatement. Ils ont attendu pendant longtemps. Mais ils n’ont rien vu de mauvais arriver à Paul. Alors ils ont maintenant dit autre chose. Ils ont dit : Cet homme (Paul) est un dieu.'
  '7':
  - type: text
    content: 'Le chef du peuple qui vivait sur l’île s’appelait Publius. Il y avait certains de ses champs pas loin du '
  - type: text
    content: rivage
  - type: text
    content: '. Publius nous a salués et il a été aimable avec nous. Nous sommes restés dans sa maison pendant 3 jours. '
  '8':
  - type: text
    content: 'Le père de Publius était malade au lit. Il était malade et son corps était chaud. Il souffrait aussi de la dysenterie. Paul est entré dans sa salle et a prié pour lui. Il a posé ses mains sur la tête du père de Publius. Il l’a guéri encore. '
  '9':
  - type: text
    content: 'Alors tous les autres malades sur l’île sont venus chez lui. Et Paul les a guéris. '
