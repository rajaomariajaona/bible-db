document_id: ACT.28
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 28
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce qui est arrivé à Paul sur l’île appelée Malte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous sommes arrivés au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rivage
  - type: text
    text: '. Nous avons découvert que le nom de l’île était Malte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les gens qui vivaient sur l’île étaient très aimables avec nous. La pluie tombait. Il faisait maintenant froid. Alors le peuple a fait un feu pour nous accueillir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul a ramassé quelques bâtons. Il les a mis sur le feu. Mais un serpent s’est attaché à sa main. Le serpent a senti la chaleur. C’est pourquoi il est sorti de là où il était. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les gens qui vivaient là ont vu le serpent. Il tenait la main de Paul. Ainsi ils se sont dit ceci : Nous connaissons maintenant que cet homme a tué quelqu’un. Il n’est pas mort en mer, mais il ne mérite pas de vivre. Le serpent le tuera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors Paul a fait tomber le serpent de sa main. Il est tombé dans le feu. Mais il n’a fait aucun mal à Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les gens observaient Paul attentivement. Ils attendaient que sa main gonfle. Ils pensaient qu’il allait mourir immédiatement. Ils ont attendu pendant longtemps. Mais ils n’ont rien vu de mauvais arriver à Paul. Alors ils ont maintenant dit autre chose. Ils ont dit : Cet homme (Paul) est un dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le chef du peuple qui vivait sur l’île s’appelait Publius. Il y avait certains de ses champs pas loin du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: rivage
  - type: text
    text: '. Publius nous a salués et il a été aimable avec nous. Nous sommes restés dans sa maison pendant 3 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le père de Publius était malade au lit. Il était malade et son corps était chaud. Il souffrait aussi de la dysenterie. Paul est entré dans sa salle et a prié pour lui. Il a posé ses mains sur la tête du père de Publius. Il l’a guéri encore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors tous les autres malades sur l’île sont venus chez lui. Et Paul les a guéris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les gens nous ont donné beaucoup de cadeaux. Plus tard, ils ont mis tout ce dont nous avions besoin sur un autre bateau pour nous. Et alors nous avons quitté l’île.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous étions restés à Malte pendant 3 mois. Nous avons alors quitté l’île à bord d’un autre bateau. Ce bateau s’appelait «Les dieux jumeaux» et il était venu d’Alexandrie. Il était resté à Malte pendant l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: hiver
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous sommes arrivés au port de la ville appelée Syracuse. Nous sommes restés là pendant 3 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De Syracuse, nous avons navigué à la côte. Et nous sommes arrivés à la ville appelée Reggio. Le jour suivant, le vent a commencé à souffler du sud. 2 jours après cela, nous sommes arrivés à la ville appelée Pouzzoles. C’était un autre port.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul arrive à Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous avons trouvé certains là qui avaient cru en Jésus. Ils nous ont demandé de rester avec eux une semaine. Après ceci, nous avons voyagé vers Rome. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les croyants de Rome avaient entendu parler de nous. Ainsi ils sont venus jusqu’au marché d’Appius et aux 3 Hôtels pour nous rencontrer. Quand Paul les a vus, il a remercié Dieu pour eux. Paul était très heureux comme ils sont venus le rencontrer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quand nous sommes arrivés à Rome, les autorités ont dit à Paul : Tu peux vivre toi‑même dans ta propre maison. Mais un soldat te gardera de sorte que tu ne puisses pas aller ailleurs.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul parle de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à Rome'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après 3 jours, Paul a demandé aux chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à Rome de le rencontrer. Quand ils se sont réunis ensemble, Paul leur a dit : Frères, vous êtes des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' comme moi. Je veux que vous sachiez que je n’ai jamais rien fait de mauvais à notre peuple. Nos pères nous ont beaucoup appris comment vivre. J’ai toujours obéi à ces règles. Mais les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' m’ont mis dans la prison à Jérusalem et alors ils m’ont confié aux chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: ' m’ont posé des questions sur ce que j’avais fait. Ils ont constaté que je n’avais rien fait de mal. Il n’y avait aucune raison pour laquelle ils disaient : Il doit mourir. Ainsi ils n’ont plus voulu me garder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' n’étaient pas d’accord avec les chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: '. Alors j’ai demandé aux chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: ' si je pouvais parler à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: César
  - type: text
    text: '. Je n’avais rien dit de mauvais contre mon propre peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A cause de tout ce qui s’est produit, j’ai voulu parler avec vous. Je crois à la même promesse que tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: . Et c’est pourquoi je suis en prison ici.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' à Rome ont dit : Nous n’avons reçu aucune lettre de Judée sur toi. Aucun '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: ' n’est venu ici de Judée nous donner des nouvelles. Et aucun '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: ' n’a rien dit de mauvais sur toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nous savons que les gens partout disent de mauvaises choses contre votre groupe. Ainsi nous voudrions que tu nous dises tes idées sur cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont décidé un jour pour se réunir encore avec Paul. Et ce jour, beaucoup de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' sont arrivés. Ils sont venus à la maison où Paul restait. Paul leur a parlé du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: '. Il a parlé du matin jusqu’à la nuit. Il leur expliquait son message. Il parlait de tout ce qui est écrit dans la loi de Moïse et des livres des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. Et il a prouvé aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' que son message au sujet de Jésus était vrai.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Certains d’entre eux ont cru que son message était vrai. Mais d’autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui étaient là ne l’ont pas cru. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A la fin de la journée, tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont quitté sa maison. Mais ils n’étaient pas d’accord les uns les autres au sujet des paroles de Paul. Avant qu’ils quittent la maison, Paul avait dit : Le Saint‑Esprit a parlé correctement par le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' Ésaïe. Il a parlé à vos ancêtres. Le Saint‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' disait à Ésaïe :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Va et parle à ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous écouterez et écouterez. Mais jamais, vous ne comprendrez rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous regarderez et regarderez. Mais jamais, vous ne verrez rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ces gens ne veulent rien comprendre avec leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne veulent écouter personne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’ils voulaient regarder, ils pourraient voir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’ils voulaient écouter, ils pourraient entendre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors ils comprendraient également.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et alors ils m’obéiraient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je leur pardonnerais et je les ferais bien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Paul a alors dit : Je veux que vous sachiez que Dieu a envoyé son message sur Jésus aux étrangers ou non‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Et ils écouteront ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Paul a fini de dire toutes ces choses. Après cela, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' ont quitté. Ils discutaient l’un l’autre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Paul a vécu pendant 2 années à Rome dans sa propre maison. Il payait l’argent pour vivre dans la maison. Beaucoup de gens venaient chez lui et il était aimable avec eux tous.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il enseignait les gens sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: ' et au sujet du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Paul disait son message fortement.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il pouvait parler à chacun qui lui rendait visite. Personne n’essayait de l’arrêter.
