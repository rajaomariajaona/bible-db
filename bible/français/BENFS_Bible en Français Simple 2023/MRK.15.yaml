document_id: MRK.15,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 15
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pilate pose des questions à Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Très tôt le matin, tous les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont tenu une réunion. Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont rencontré les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anciens
    - type: text
      text: ', les enseignants de la loi de Dieu et d’autres personnes importantes. Ils ont lié Jésus. Ils sont allés avec lui chez Pilate. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Pilate savait pourquoi les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' avaient emmené Jésus auprès de lui. Les gens semblaient aimer Jésus plus que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: '. Et cela a donné la colère aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mais les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' parlaient fortement au peuple. Au lieu de Jésus, ils ont dit aux gens de demander à Pilate de leur libérer Barabbas. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors Pilate a encore demandé à la foule : Que dois‑je faire pour Jésus ? L’homme que vous appelez le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les gens criaient à nouveau. Ils criaient : Tuez‑le sur une croix ! '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Pilate a demandé : Pourquoi le tuer sur une croix ? Il a fait quel mal ? Mais les gens criaient encore plus fort : Tuez‑le sur une croix ! '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pilate a décidé de faire ce que la foule voulait. Ainsi il leur a libéré Barabbas. Il a dit à ses soldats de prendre Jésus. C’était pour le frapper beaucoup de fois avec un fouet. Alors ils pourront le faire mourir sur une croix.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Alors les soldats ont emmené Jésus. Ils l’ont emmené à la cour intérieure du palais (
    - type: usfm
      marker: w
      children:
      - type: text
        text: prétoire
    - type: text
      text: '). Et ils ont assemblé tous les soldats de leur groupe. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Puis ils ont mis un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: ' rouge foncé sur Jésus. Ils ont fait une couronne d’épines et ils l’ont mise sur sa tête. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors les soldats ont commencé à le saluer. Ils disaient : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: salut
    - type: text
      text: ', Roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les soldats ont pris un bâton et ils frappaient Jésus sur la tête avec ça. Ils crachaient sur lui. Puis ils sont allés à genoux devant lui. Ils lui ont dit combien il était grand.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Pilate a demandé à Jésus : Es‑tu le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  ? Jésus a répondu : Oui, c’est comme tu dis. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais ils se moquaient de lui. Puis ils ont enlevé le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: manteau
    - type: text
      text: ' rouge foncé. Ils ont remis sur Jésus ses propres vêtements. Ensuite, ils l’ont conduit vers l’endroit pour le mettre à mort sur la croix.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les soldats mettent Jésus sur une croix
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Un homme appelé Simon passait devant Jésus et les soldats.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Il venait de l’extérieur de la ville. Les soldats ont obligé Simon de porter la croix de Jésus. Simon était de la ville appelée Cyrène.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il était le père d’Alexandre et de Rufus. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les soldats ont amené Jésus à l’endroit appelé '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Golgotha
    - type: text
      text: ' ('
    - type: usfm
      marker: w
      children:
      - type: text
        text: Golgotha
    - type: text
      text: ' signifie le lieu du crâne). '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils ont donné à Jésus du vin à boire. Ils ont mis un médicament appelé myrrhe dans le vin. Mais Jésus n’a pas bu ce vin. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors les soldats ont mis Jésus sur la croix. Ils ont pris ses vêtements. Ils ont fait un jeu pour partager ses vêtements entre les soldats. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il était 9 heures quand les soldats ont mis Jésus à la croix. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Au‑dessus de sa tête, ils ont mis des écrits pour dire pourquoi ils le faisaient mourir. Ces écrits étaient : LE ROI DES '
    - type: usfm
      marker: w
      children:
      - type: text
        text: JUIFS
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ils ont également mis 2 voleurs sur des croix. Un voleur était sur le côté droit de Jésus. Et l’autre voleur était sur son côté gauche. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '(La Bible dit que cela arrivera. Et cela s’est réalisé. La Bible dit : Les gens l’ont mis avec des gens qui ne respectaient pas la loi de Dieu.) '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Les gens qui passaient, bougeaient leurs têtes d’un côté à l’autre. Et ils disaient de mauvaises choses à Jésus. Ils lui disaient : Oh ! Tu as dit que tu vas détruire le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Et tu as dit que dans 3 jours, tu vas le construire encore. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont dit à Pilate que Jésus faisait beaucoup de mauvaises choses. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Si tu peux vraiment faire cela, sauve‑toi toi‑même. Descends de la croix ! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' et les enseignants de la loi de Dieu se moquaient de lui. Ils disaient : Cet homme a sauvé d’autres personnes. Mais il ne peut pas se sauver. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'S’il est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Messie
    - type: text
      text: ', le roi d’Israël, il devrait descendre maintenant de la croix. Nous verrons et alors nous croirons. Les 2 hommes qui étaient sur les croix aux côtés de Jésus disaient aussi de mauvaises choses contre lui.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus meurt
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'A midi, tout le pays est devenu sombre. Il a continué d’être sombre jusqu’à 15 heures. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'A 15 heures, Jésus a crié à haute voix : Éloï, Éloï, lama sabachthani. Cela signifie : Mon Dieu, mon Dieu, je veux savoir pourquoi tu m’as laissé seul ! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Quelques gens étaient tout près de la croix où Jésus était. Ils ont entendu Jésus crier. Ils ont dit : Regardez ! Il demande à Élie de venir. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Un homme a couru pour prendre un tissu doux. Il a versé du mauvais vin sur ça. Et il l’a mis sur le bout d’un bâton. Puis il l’a donné à Jésus pour qu’il puisse boire. Il a dit : Attendez. Nous allons voir si Élie viendra descendre Jésus de la croix. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Alors Jésus a crié encore plus fort et après cela, il est mort. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Le rideau à l’intérieur du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' s’est déchiré complètement en 2 parties à partir du haut jusqu’en bas.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Le chef des soldats se tenait en face de Jésus. Il a vu comment Jésus est mort. Il a dit : C’est vrai. Cet homme était le Fils de Dieu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors Pilate a encore demandé à Jésus : Quelle est ta réponse ? Tu devrais dire quelque chose ! Écoute ! Ils disent que tu as fait beaucoup de mauvaises choses. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Certaines femmes étaient là aussi. Elles n’étaient pas très près de la croix. Mais elles regardaient tout cela. Marie, de la ville appelée Magdala, était parmi ces femmes. Une autre femme nommée Marie était là aussi. Elle était la mère de Jacques et de Joseph. Salomé était là aussi. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ces femmes étaient les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' de Jésus quand il était en Galilée. Là, elles l’aidaient. Et beaucoup d’autres femmes étaient là. Elles étaient venues avec lui à Jérusalem.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph enterre le corps de Jésus
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Le vendredi soir approchait. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' se préparaient pour le samedi, jour du repos. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Un homme appelé Joseph est allé voir Pilate. Joseph était d’une ville appelée Arimathée. Il était un homme bon et il était un grand chef des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Il attendait le moment où Dieu commencera à diriger son peuple. Joseph a courageusement demandé à Pilate le corps de Jésus. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Pilate était surpris que Jésus soit déjà mort. Il a demandé au chef des soldats de venir à lui. Puis il lui a demandé si Jésus est déjà mort. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Le chef a dit à Pilate que Jésus est déjà mort. Alors Pilate a autorisé Joseph de prendre le corps mort de Jésus. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Joseph a acheté un nouveau morceau de tissu blanc. Il a descendu Jésus de la croix. Il a mis le tissu autour de lui. Et il l’a enterré dans un grand trou que les travailleurs de Joseph avaient taillé dans la roche. Après cela, il a placé une très grosse pierre devant le trou. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Marie de la ville appelée Magdala et Marie, mère de Joses, regardaient. Elles ont vu l’endroit où Joseph avait mis le corps mort de Jésus.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus n’a pas répondu. Et Pilate a été très surpris de cela. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Chaque année, pendant la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: ', Pilate libérait une personne de la prison. Les gens devaient lui demander la personne qu’ils voulaient. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Un homme nommé Barabbas était en prison à ce moment‑là. Lui et quelques autres hommes avaient lutté contre le gouvernement. Et ils avaient tué quelqu’un quand ils se battaient. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'La foule est venue auprès de Pilate. Et elle a demandé à Pilate de faire ce qu’il fait habituellement. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Pilate a répondu au peuple :'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Voulez‑vous que je vous libère le roi des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '  ? '
