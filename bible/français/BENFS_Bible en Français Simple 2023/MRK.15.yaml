document_id: MRK.15,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 15
  - type: heading
    content: Pilate pose des questions à Jésus
  - type: text
    content: 'Très tôt le matin, tous les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont tenu une réunion. Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont rencontré les '
  - type: text
    content: anciens
  - type: text
    content: ', les enseignants de la loi de Dieu et d’autres personnes importantes. Ils ont lié Jésus. Ils sont allés avec lui chez Pilate. '
  '10':
  - type: text
    content: 'Pilate savait pourquoi les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' avaient emmené Jésus auprès de lui. Les gens semblaient aimer Jésus plus que les '
  - type: text
    content: prêtres
  - type: text
    content: '. Et cela a donné la colère aux '
  - type: text
    content: prêtres
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Mais les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' parlaient fortement au peuple. Au lieu de Jésus, ils ont dit aux gens de demander à Pilate de leur libérer Barabbas. '
  '12':
  - type: text
    content: 'Alors Pilate a encore demandé à la foule : Que dois‑je faire pour Jésus ? L’homme que vous appelez le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Les gens criaient à nouveau. Ils criaient : Tuez‑le sur une croix ! '
  '14':
  - type: text
    content: 'Pilate a demandé : Pourquoi le tuer sur une croix ? Il a fait quel mal ? Mais les gens criaient encore plus fort : Tuez‑le sur une croix ! '
  '15':
  - type: text
    content: Pilate a décidé de faire ce que la foule voulait. Ainsi il leur a libéré Barabbas. Il a dit à ses soldats de prendre Jésus. C’était pour le frapper beaucoup de fois avec un fouet. Alors ils pourront le faire mourir sur une croix.
  '16':
  - type: text
    content: Alors les soldats ont emmené Jésus. Ils l’ont emmené à la cour intérieure du palais (
  - type: text
    content: prétoire
  - type: text
    content: '). Et ils ont assemblé tous les soldats de leur groupe. '
  '17':
  - type: text
    content: 'Puis ils ont mis un '
  - type: text
    content: manteau
  - type: text
    content: ' rouge foncé sur Jésus. Ils ont fait une couronne d’épines et ils l’ont mise sur sa tête. '
  '18':
  - type: text
    content: 'Alors les soldats ont commencé à le saluer. Ils disaient : '
  - type: text
    content: salut
  - type: text
    content: ', Roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ! '
  '19':
  - type: text
    content: Les soldats ont pris un bâton et ils frappaient Jésus sur la tête avec ça. Ils crachaient sur lui. Puis ils sont allés à genoux devant lui. Ils lui ont dit combien il était grand.
  '2':
  - type: text
    content: 'Pilate a demandé à Jésus : Es‑tu le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ? Jésus a répondu : Oui, c’est comme tu dis. '
  '20':
  - type: text
    content: 'Mais ils se moquaient de lui. Puis ils ont enlevé le '
  - type: text
    content: manteau
  - type: text
    content: ' rouge foncé. Ils ont remis sur Jésus ses propres vêtements. Ensuite, ils l’ont conduit vers l’endroit pour le mettre à mort sur la croix.'
  - type: heading
    content: Les soldats mettent Jésus sur une croix
  '21':
  - type: text
    content: Un homme appelé Simon passait devant Jésus et les soldats.
  - type: text
    content: Il venait de l’extérieur de la ville. Les soldats ont obligé Simon de porter la croix de Jésus. Simon était de la ville appelée Cyrène.
  - type: text
    content: 'Il était le père d’Alexandre et de Rufus. '
  '22':
  - type: text
    content: 'Les soldats ont amené Jésus à l’endroit appelé '
  - type: text
    content: Golgotha
  - type: text
    content: ' ('
  - type: text
    content: Golgotha
  - type: text
    content: ' signifie le lieu du crâne). '
  '23':
  - type: text
    content: 'Ils ont donné à Jésus du vin à boire. Ils ont mis un médicament appelé myrrhe dans le vin. Mais Jésus n’a pas bu ce vin. '
  '24':
  - type: text
    content: 'Alors les soldats ont mis Jésus sur la croix. Ils ont pris ses vêtements. Ils ont fait un jeu pour partager ses vêtements entre les soldats. '
  '25':
  - type: text
    content: 'Il était 9 heures quand les soldats ont mis Jésus à la croix. '
  '26':
  - type: text
    content: 'Au‑dessus de sa tête, ils ont mis des écrits pour dire pourquoi ils le faisaient mourir. Ces écrits étaient : LE ROI DES '
  - type: text
    content: JUIFS
  - type: text
    content: .
  '27':
  - type: text
    content: 'Ils ont également mis 2 voleurs sur des croix. Un voleur était sur le côté droit de Jésus. Et l’autre voleur était sur son côté gauche. '
  '28':
  - type: text
    content: '(La Bible dit que cela arrivera. Et cela s’est réalisé. La Bible dit : Les gens l’ont mis avec des gens qui ne respectaient pas la loi de Dieu.) '
  '29':
  - type: text
    content: 'Les gens qui passaient, bougeaient leurs têtes d’un côté à l’autre. Et ils disaient de mauvaises choses à Jésus. Ils lui disaient : Oh ! Tu as dit que tu vas détruire le '
  - type: text
    content: Temple
  - type: text
    content: '. Et tu as dit que dans 3 jours, tu vas le construire encore. '
  '3':
  - type: text
    content: 'Alors les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' ont dit à Pilate que Jésus faisait beaucoup de mauvaises choses. '
  '30':
  - type: text
    content: 'Si tu peux vraiment faire cela, sauve‑toi toi‑même. Descends de la croix ! '
  '31':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi de Dieu se moquaient de lui. Ils disaient : Cet homme a sauvé d’autres personnes. Mais il ne peut pas se sauver. '
  '32':
  - type: text
    content: 'S’il est le '
  - type: text
    content: Messie
  - type: text
    content: ', le roi d’Israël, il devrait descendre maintenant de la croix. Nous verrons et alors nous croirons. Les 2 hommes qui étaient sur les croix aux côtés de Jésus disaient aussi de mauvaises choses contre lui.'
  - type: heading
    content: Jésus meurt
  '33':
  - type: text
    content: 'A midi, tout le pays est devenu sombre. Il a continué d’être sombre jusqu’à 15 heures. '
  '34':
  - type: text
    content: 'A 15 heures, Jésus a crié à haute voix : Éloï, Éloï, lama sabachthani. Cela signifie : Mon Dieu, mon Dieu, je veux savoir pourquoi tu m’as laissé seul ! '
  '35':
  - type: text
    content: 'Quelques gens étaient tout près de la croix où Jésus était. Ils ont entendu Jésus crier. Ils ont dit : Regardez ! Il demande à Élie de venir. '
  '36':
  - type: text
    content: 'Un homme a couru pour prendre un tissu doux. Il a versé du mauvais vin sur ça. Et il l’a mis sur le bout d’un bâton. Puis il l’a donné à Jésus pour qu’il puisse boire. Il a dit : Attendez. Nous allons voir si Élie viendra descendre Jésus de la croix. '
  '37':
  - type: text
    content: 'Alors Jésus a crié encore plus fort et après cela, il est mort. '
  '38':
  - type: text
    content: 'Le rideau à l’intérieur du '
  - type: text
    content: Temple
  - type: text
    content: ' s’est déchiré complètement en 2 parties à partir du haut jusqu’en bas.'
  '39':
  - type: text
    content: 'Le chef des soldats se tenait en face de Jésus. Il a vu comment Jésus est mort. Il a dit : C’est vrai. Cet homme était le Fils de Dieu. '
  '4':
  - type: text
    content: 'Alors Pilate a encore demandé à Jésus : Quelle est ta réponse ? Tu devrais dire quelque chose ! Écoute ! Ils disent que tu as fait beaucoup de mauvaises choses. '
  '40':
  - type: text
    content: 'Certaines femmes étaient là aussi. Elles n’étaient pas très près de la croix. Mais elles regardaient tout cela. Marie, de la ville appelée Magdala, était parmi ces femmes. Une autre femme nommée Marie était là aussi. Elle était la mère de Jacques et de Joseph. Salomé était là aussi. '
  '41':
  - type: text
    content: 'Ces femmes étaient les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus quand il était en Galilée. Là, elles l’aidaient. Et beaucoup d’autres femmes étaient là. Elles étaient venues avec lui à Jérusalem.'
  - type: heading
    content: Joseph enterre le corps de Jésus
  '42':
  - type: text
    content: 'Le vendredi soir approchait. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' se préparaient pour le samedi, jour du repos. '
  '43':
  - type: text
    content: 'Un homme appelé Joseph est allé voir Pilate. Joseph était d’une ville appelée Arimathée. Il était un homme bon et il était un grand chef des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il attendait le moment où Dieu commencera à diriger son peuple. Joseph a courageusement demandé à Pilate le corps de Jésus. '
  '44':
  - type: text
    content: 'Pilate était surpris que Jésus soit déjà mort. Il a demandé au chef des soldats de venir à lui. Puis il lui a demandé si Jésus est déjà mort. '
  '45':
  - type: text
    content: 'Le chef a dit à Pilate que Jésus est déjà mort. Alors Pilate a autorisé Joseph de prendre le corps mort de Jésus. '
  '46':
  - type: text
    content: 'Joseph a acheté un nouveau morceau de tissu blanc. Il a descendu Jésus de la croix. Il a mis le tissu autour de lui. Et il l’a enterré dans un grand trou que les travailleurs de Joseph avaient taillé dans la roche. Après cela, il a placé une très grosse pierre devant le trou. '
  '47':
  - type: text
    content: Marie de la ville appelée Magdala et Marie, mère de Joses, regardaient. Elles ont vu l’endroit où Joseph avait mis le corps mort de Jésus.
  '5':
  - type: text
    content: 'Jésus n’a pas répondu. Et Pilate a été très surpris de cela. '
  '6':
  - type: text
    content: 'Chaque année, pendant la '
  - type: text
    content: Pâque
  - type: text
    content: ', Pilate libérait une personne de la prison. Les gens devaient lui demander la personne qu’ils voulaient. '
  '7':
  - type: text
    content: 'Un homme nommé Barabbas était en prison à ce moment‑là. Lui et quelques autres hommes avaient lutté contre le gouvernement. Et ils avaient tué quelqu’un quand ils se battaient. '
  '8':
  - type: text
    content: 'La foule est venue auprès de Pilate. Et elle a demandé à Pilate de faire ce qu’il fait habituellement. '
  '9':
  - type: text
    content: 'Pilate a répondu au peuple :'
  - type: text
    content: 'Voulez‑vous que je vous libère le roi des '
  - type: text
    content: Juifs
  - type: text
    content: '  ? '
