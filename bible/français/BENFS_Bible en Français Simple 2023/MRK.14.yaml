document_id: MRK.14,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 14
  - type: heading
    content: Les chefs des prêtres et les enseignants de la loi de Dieu veulent tuer Jésus
  - type: text
    content: 'C’était alors 2 jours avant la fête de '
  - type: text
    content: Pâque
  - type: text
    content: ' et celle des pains sans levain. En ce temps‑là, les '
  - type: text
    content: prêtres
  - type: text
    content: ' et les enseignants de la loi cherchaient comment attraper Jésus secrètement. Ils voulaient le faire mourir. '
  '10':
  - type: text
    content: 'Alors Judas Iscariote est allé auprès des chefs '
  - type: text
    content: prêtres
  - type: text
    content: '. C’était pour les aider à attraper Jésus. (Judas était l’un des 12 '
  - type: text
    content: Apôtres
  - type: text
    content: '). '
  '11':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' étaient très heureux de cela. Et ils ont promis de lui donner de l’argent. Alors Judas cherchait un bon moment pour leur livrer Jésus.'
  - type: heading
    content: Jésus mange son dernier repas avec ses 12 disciples
  '12':
  - type: text
    content: 'Le premier jour des pains sans levain, chaque famille devait tuer un jeune mouton pour le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: '. Les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus lui ont dit : Nous allons préparer le repas pascal pour toi. Où veux‑tu que nous fassions cela ? '
  '13':
  - type: text
    content: 'Alors Jésus a envoyé 2 '
  - type: text
    content: disciples
  - type: text
    content: '. Il leur a dit : Allez à la ville, vous rencontrerez un homme qui porte une cruche d’eau. Suivez‑le. '
  '14':
  - type: text
    content: 'Il ira à une maison. Dites‑lui ceci de ma part : Quelle est la place où je peux manger le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' avec mes '
  - type: text
    content: disciples
  - type: text
    content: '  ? '
  '15':
  - type: text
    content: 'Alors l’homme vous montrera une grande chambre à l’étage. La chambre aura en elle toutes les choses dont vous aurez besoin. Vous devez préparer le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' pour nous là. '
  '16':
  - type: text
    content: 'Alors les 2 '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés et sont entrés dans la ville. Ils ont trouvé tout ce que Jésus leur avait dit. Donc, ils ont préparé le repas de la '
  - type: text
    content: Pâque
  - type: text
    content: ' là. '
  '17':
  - type: text
    content: 'Le soir, Jésus est arrivé avec les 12 '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Pendant qu’ils mangeaient le repas, Jésus a dit : Je vous dis la vérité. L’un de vous aidera les dirigeants '
  - type: text
    content: juifs
  - type: text
    content: ' à m’arrêter. C’est quelqu’un qui mange ce repas avec moi. '
  '19':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' sont devenus très tristes. Chacun d’eux disait à Jésus : J’espère que ce n’est pas moi ! '
  '2':
  - type: text
    content: 'Ils se disaient les uns aux autres : Nous ne voulons pas le faire pendant la '
  - type: text
    content: Pâque
  - type: text
    content: . Les gens vont être en colère. Et ils peuvent se battre contre nous si nous faisons cela.
  - type: heading
    content: Une femme verse du parfum cher sur la tête de Jésus
  '20':
  - type: text
    content: 'Jésus leur a dit : C’est l’un des 12 '
  - type: text
    content: disciples
  - type: text
    content: '. Cet homme plonge son pain dans le même plat que moi. '
  '21':
  - type: text
    content: 'Jésus a dit : Le Fils de l’homme doit être livré aux ennemis comme la Bible dit. Mais ce sera très mauvais pour l’homme qui aide à livrer le Fils de l’homme aux ennemis. Il serait mieux pour cet homme de ne pas être né.'
  - type: heading
    content: Le repas de la Pâque
  '22':
  - type: text
    content: 'Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' mangeaient. Alors Jésus a pris un pain. Il a remercié Dieu pour cela. Puis il a coupé le pain et il l’a donné à ses '
  - type: text
    content: disciples
  - type: text
    content: '. Il leur a dit : Prenez ce pain. Ceci est mon corps. '
  '23':
  - type: text
    content: 'Alors Jésus a pris une coupe. Il a remercié Dieu. Puis il la leur a donnée, et ils en ont bu tous. '
  '24':
  - type: text
    content: 'Il leur a dit : Ceci est mon sang, ça montre qu’il y a une promesse de Dieu. Quand je mourrai, mon sang sortira de mon corps. Et Dieu sauvera beaucoup de gens. '
  '25':
  - type: text
    content: 'Je vous dis la vérité. Je ne boirai plus ce vin de la '
  - type: text
    content: vigne
  - type: text
    content: '. Mais j’en boirai encore seulement quand Dieu commencera à diriger son peuple. '
  '26':
  - type: text
    content: 'Alors Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' ont chanté un cantique à Dieu. Puis ils sont sortis. Ils sont allés à la '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: .
  - type: heading
    content: Jésus dit aux disciples ce qui se passera
  '27':
  - type: text
    content: 'Alors Jésus leur a dit : Les choses qui se passeront ce soir diminueront votre '
  - type: text
    content: foi
  - type: text
    content: '. Les Saintes Écritures disent : Je vais tuer l’homme qui conduit les brebis. Et les brebis s’enfuiront dans des directions différentes. '
  '28':
  - type: text
    content: 'Mais je vais devenir encore vivant. Ensuite, je vais vous précéder en Galilée. '
  '29':
  - type: text
    content: 'Pierre a dit à Jésus : Même si la '
  - type: text
    content: foi
  - type: text
    content: ' de tous diminue, moi je ne te laisserai pas. '
  '3':
  - type: text
    content: 'Pendant que Jésus était à '
  - type: text
    content: Béthanie
  - type: text
    content: ', il est allé à la maison de Simon. Les gens appelaient cet homme, Simon malade de la '
  - type: text
    content: lèpre
  - type: text
    content: '. Jésus mangeait un repas. Pendant ce temps, une femme est entrée dans la maison. Elle a apporté un petit vase en pierre qui contenait du parfum. Ce parfum était très cher et d’une bonne odeur. La personne qui a fait ce parfum, avait utilisé une seule plante. C’était la plante appelée nard. La femme a cassé le vase pour l’ouvrir. Et puis elle a versé du parfum sur la tête de Jésus. '
  '30':
  - type: text
    content: 'Jésus a répondu à Pierre : Je te dis la vérité. Ce soir, tu diras 3 fois que tu ne me connais pas. Tu vas le faire avant que le coq chante pour la seconde fois. '
  '31':
  - type: text
    content: 'Mais Pierre a répondu à Jésus vivement : Si nécessaire, je vais mourir avec toi. Mais je ne dirai jamais à personne que je ne te connais pas. Tous les autres '
  - type: text
    content: disciples
  - type: text
    content: ' disaient la même chose.'
  - type: heading
    content: Jésus prie dans le jardin appelé Gethsémané
  '32':
  - type: text
    content: 'Ensuite, ils sont arrivés à un jardin appelé '
  - type: text
    content: Gethsémané
  - type: text
    content: '. Jésus a dit à ses '
  - type: text
    content: disciples
  - type: text
    content: '  : Asseyez‑vous ici pendant que je vais prier. '
  '33':
  - type: text
    content: Alors Jésus a pris Pierre, Jacques et Jean avec lui. L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Jésus n’était plus tranquille. '
  '34':
  - type: text
    content: 'Jésus leur a dit : Je suis très triste. Je sens comme si je vais mourir. Attendez ici et restez éveillés. '
  '35':
  - type: text
    content: 'Jésus est allé à une courte distance en face d’eux. Il s’est agenouillé au sol. Il a prié pour que, si possible, Dieu puisse le sauver des choses de ce temps. '
  '36':
  - type: text
    content: 'Il a dit : Abba, (mon père), tu peux faire quoi que ce soit. S’il te plaît, écarte cette douleur de moi. Mais je ne te demande pas de faire ce que je veux. Je choisis ce que tu veux. '
  '37':
  - type: text
    content: 'Jésus est retourné et il a trouvé Pierre, Jacques et Jean. Ils dormaient. Il a dit à Pierre : Simon, vous dormez ! Vous ne pouvez pas rester éveillés, même pour une heure ! '
  '38':
  - type: text
    content: 'Vous devez rester éveillés et vous devez prier. Sinon, vous risquez de pécher. Vous voulez vraiment faire une bonne chose, mais il est trop difficile pour vous. '
  '39':
  - type: text
    content: 'Jésus est allé encore et il a prié de nouveau. Il a dit les mêmes paroles à Dieu. '
  '4':
  - type: text
    content: 'Mais certaines personnes se sont mises en colère. Ces gens se disaient les uns aux autres : Cette femme ne devrait pas gaspiller ce parfum. '
  '40':
  - type: text
    content: 'Jésus est revenu auprès de Pierre, Jacques et Jean. Il a vu qu’ils étaient endormis. Ils ne pouvaient pas garder les yeux ouverts. Ils ne savaient pas quoi lui dire. '
  '41':
  - type: text
    content: 'Lorsque Jésus est retourné pour la troisième fois, il leur a dit : Vous dormez encore et vous vous reposez ? Vous avez assez dormi. Voici l’heure. Regardez ! Voyez l’homme qui aide les hommes mauvais à arrêter le Fils de l’homme. '
  '42':
  - type: text
    content: Levez‑vous, allons. Regardez ! Voici l’homme qui va les aider à m’attraper.
  - type: heading
    content: Judas conduit les hommes qui vont arrêter Jésus
  '43':
  - type: text
    content: 'Quand Jésus parlait, Judas est arrivé immédiatement. Il était l’un des 12 '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus. Une foule de gens est venue avec lui. Ils portaient de longs couteaux tranchants, de lourds bâtons. C’étaient les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ', les enseignants de la loi de Dieu et les  '
  - type: text
    content: anciens
  - type: text
    content: ' qui avaient envoyé ces hommes. '
  '44':
  - type: text
    content: 'Avant cela, Judas avait dit à ces hommes : Je vais baiser l’un des hommes. Voilà l’homme que vous devez arrêter. Allez avec lui. '
  '45':
  - type: text
    content: 'Quand ils sont arrivés, Judas est allé immédiatement auprès de Jésus. Il a dit à Jésus : Maître. Et puis il a baisé Jésus. '
  '46':
  - type: text
    content: 'Ainsi, les hommes ont attrapé Jésus. '
  '47':
  - type: text
    content: 'Mais un des hommes qui étaient là, a pris son long couteau tranchant. Et il a frappé le serviteur du '
  - type: text
    content: grand prêtre
  - type: text
    content: ' avec ça. Il a coupé l’oreille du serviteur. '
  '48':
  - type: text
    content: 'Alors Jésus a parlé à la foule. Il a dit : Vous êtes venus avec de longs couteaux tranchants et de lourds bâtons pour m’attraper. Vous faites comme si j’étais voleur. Mais vous savez que je ne suis pas un voleur. '
  '49':
  - type: text
    content: 'J’étais avec vous tous les jours dans le '
  - type: text
    content: Temple
  - type: text
    content: ', quand j’enseignais le peuple. Vous ne m’avez pas arrêté. Mais les choses qui sont dans la Bible doivent se réaliser. '
  '5':
  - type: text
    content: 'C’était mieux de vendre ce parfum et de donner l’argent aux pauvres. On pouvait vendre cela à plus de 300 pièces d’argent. Un homme devrait travailler pendant plus d’un an pour obtenir beaucoup d’argent pour cela. Donc, ils parlaient avec colère contre cette femme. '
  '50':
  - type: text
    content: 'Alors tous les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus l’ont laissé et ils ont fui. '
  '51':
  - type: text
    content: 'Un jeune homme suivait Jésus. Il portait un morceau de tissu sur tout son corps. Les hommes ont essayé de saisir la main de ce jeune homme. '
  '52':
  - type: text
    content: Mais le jeune homme a laissé le morceau de tissu derrière, et il a fui. Quand il est parti, il ne portait pas d’habits.
  - type: heading
    content: Le grand prêtre pose des questions à Jésus
  '53':
  - type: text
    content: 'Les hommes ont conduit Jésus auprès du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Tous les '
  - type: text
    content: prêtres
  - type: text
    content: ' se sont réunis avec les '
  - type: text
    content: anciens
  - type: text
    content: '. Il y avait aussi les enseignants de la loi de Dieu. '
  '54':
  - type: text
    content: 'Pierre suivait Jésus. Mais il n’est pas allé près de Jésus. Alors Pierre s’est arrêté à l’intérieur de la cour devant la maison du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Il s’est assis avec les gardes. Pierre se chauffait au feu. '
  '55':
  - type: text
    content: 'Les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et tout le monde à la réunion voulaient faire mourir Jésus. Donc, ils ont essayé de trouver des hommes qui pouvaient dire des choses contre Jésus. Mais ils ne trouvaient personne qui pourrait les aider. '
  '56':
  - type: text
    content: 'Beaucoup de gens disaient des choses au sujet de Jésus. Mais ils disaient des choses qui n’étaient pas vraies. Et ils n’étaient pas d’accord les uns avec les autres. '
  '57':
  - type: text
    content: 'Alors certains hommes se sont levés. Ils ont commencé à parler contre Jésus. Mais leurs paroles n’étaient pas vraies. '
  '58':
  - type: text
    content: 'Ils disaient : Nous avons entendu Jésus dire : Je détruirai le '
  - type: text
    content: Temple
  - type: text
    content: ' que les hommes avaient construit. En 3 jours, je vais construire un autre '
  - type: text
    content: Temple
  - type: text
    content: ' pour Dieu. Ce ne sont pas les hommes qui construiront un autre '
  - type: text
    content: Temple
  - type: text
    content: '. '
  '59':
  - type: text
    content: 'Même alors, ces gens qui parlaient contre Jésus, ne disaient pas la même chose. '
  '6':
  - type: text
    content: 'Mais Jésus a dit : Ne lui parlez pas comme ça ! Ne la dérangez pas. Elle a fait une bonne chose pour moi. '
  '60':
  - type: text
    content: 'Alors le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' s’est levé au milieu et il a parlé à Jésus : Tu ne réponds pas ? Ces personnes ont dit que tu avais fait de mauvaises choses. Que dis‑tu à ce sujet ? '
  '61':
  - type: text
    content: 'Mais Jésus n’a rien répondu. Il n’a rien dit. Encore une fois, le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' a demandé à Jésus : Es‑tu le '
  - type: text
    content: Messie
  - type: text
    content: '  ? Es‑tu le Fils de Dieu ? '
  '62':
  - type: text
    content: 'Jésus a répondu : Je le suis et vous allez tous voir le Fils de l’homme. Il sera assis à la droite de la puissance de Dieu. Et il viendra sur les nuages de la maison de Dieu, qui est appelée le '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '63':
  - type: text
    content: 'Le '
  - type: text
    content: grand prêtre
  - type: text
    content: ' a déchiré ses vêtements. Il a dit : Nous n’avons plus besoin que quelqu’un d’autre nous parle de Jésus. '
  '64':
  - type: text
    content: 'Vous avez entendu les mauvaises paroles qu’il a dites contre Dieu. Que décidez‑vous ? Tout le monde était d’accord de faire mourir Jésus. '
  '65':
  - type: text
    content: 'Alors quelques‑uns des hommes se sont mis à cracher sur Jésus. Ils ont couvert les yeux de Jésus et ils le frappaient. Ils disaient : Dis celui qui te frappe, si tu peux ! Puis les gardes giflaient Jésus pendant qu’ils l’emmenaient.'
  - type: heading
    content: Pierre dit 3 fois qu’il ne connaît pas Jésus
  '66':
  - type: text
    content: 'Pierre était toujours en bas dans la cour intérieure. Une fille est venue près de Pierre. Cette fille était l’une des servantes du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. '
  '67':
  - type: text
    content: 'Elle a vu Pierre qui se chauffait au feu. Elle l’a regardé et elle a dit : Tu étais aussi avec Jésus, l’homme de Nazareth. '
  '68':
  - type: text
    content: 'Il a répondu : Ce n’est pas vrai ! Je ne sais pas de quoi tu parles ! Je ne comprends pas ce que tu veux dire ! Alors Pierre s’est dirigé vers la porte de la maison. '
  '69':
  - type: text
    content: 'La jeune femme l’a vu, et encore une fois, elle a commencé à dire à d’autres personnes là‑bas : Cet homme est l’un des hommes qui étaient avec Jésus. '
  '7':
  - type: text
    content: 'Vous aurez toujours les pauvres avec vous. Vous pouvez les aider à tout moment que vous souhaitez. Mais vous ne serez pas toujours avec moi. '
  '70':
  - type: text
    content: 'Mais Pierre a dit encore que ce n’était pas vrai. Après un certain temps, les autres personnes qui étaient là, ont dit à Pierre : Tu es certainement l’un de ces gens. Tu es de Galilée. Donc, nous sommes sûrs que tu étais avec Jésus. '
  '71':
  - type: text
    content: 'Pierre s’est mis à leur parler. Il disait : Je ne connais pas cet homme dont vous parlez. Et Pierre a demandé à Dieu de le punir si ses paroles ne sont pas vraies. '
  '72':
  - type: text
    content: Immédiatement, le coq a chanté pour la seconde fois.
  - type: text
    content: 'Alors Pierre s’est souvenu de ce que Jésus lui avait dit : Tu diras 3 fois que tu ne me connais pas. Tu vas le faire avant que le coq chante pour la seconde fois. Lorsque Pierre a pensé à cela, il a pleuré.'
  '8':
  - type: text
    content: 'Elle a fait ce qu’elle a pu faire. Elle a versé du parfum sur mon corps pour le préparer. Alors maintenant, mon corps est prêt pour l’enterrement. '
  '9':
  - type: text
    content: 'Je vous dis la vérité : Les gens diront la Bonne Nouvelle de Dieu aux gens partout. En même temps, ils diront aussi aux gens la chose que cette femme a faite. Et ils se souviendront d’elle.'
  - type: heading
    content: Judas accepte de livrer Jésus aux chefs des prêtres
