document_id: MRK.14
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 14
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les enseignants de la loi de Dieu veulent tuer Jésus'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’était alors 2 jours avant la fête de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' et celle des pains sans levain. En ce temps‑là, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les enseignants de la loi cherchaient comment attraper Jésus secrètement. Ils voulaient le faire mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils se disaient les uns aux autres : Nous ne voulons pas le faire pendant la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: . Les gens vont être en colère. Et ils peuvent se battre contre nous si nous faisons cela.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une femme verse du parfum cher sur la tête de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pendant que Jésus était à '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: ', il est allé à la maison de Simon. Les gens appelaient cet homme, Simon malade de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: lèpre
  - type: text
    text: '. Jésus mangeait un repas. Pendant ce temps, une femme est entrée dans la maison. Elle a apporté un petit vase en pierre qui contenait du parfum. Ce parfum était très cher et d’une bonne odeur. La personne qui a fait ce parfum, avait utilisé une seule plante. C’était la plante appelée nard. La femme a cassé le vase pour l’ouvrir. Et puis elle a versé du parfum sur la tête de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais certaines personnes se sont mises en colère. Ces gens se disaient les uns aux autres : Cette femme ne devrait pas gaspiller ce parfum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’était mieux de vendre ce parfum et de donner l’argent aux pauvres. On pouvait vendre cela à plus de 300 pièces d’argent. Un homme devrait travailler pendant plus d’un an pour obtenir beaucoup d’argent pour cela. Donc, ils parlaient avec colère contre cette femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Jésus a dit : Ne lui parlez pas comme ça ! Ne la dérangez pas. Elle a fait une bonne chose pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous aurez toujours les pauvres avec vous. Vous pouvez les aider à tout moment que vous souhaitez. Mais vous ne serez pas toujours avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elle a fait ce qu’elle a pu faire. Elle a versé du parfum sur mon corps pour le préparer. Alors maintenant, mon corps est prêt pour l’enterrement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je vous dis la vérité : Les gens diront la Bonne Nouvelle de Dieu aux gens partout. En même temps, ils diront aussi aux gens la chose que cette femme a faite. Et ils se souviendront d’elle.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Judas accepte de livrer Jésus aux chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Judas Iscariote est allé auprès des chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: '. C’était pour les aider à attraper Jésus. (Judas était l’un des 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Apôtres
  - type: text
    text: '). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' étaient très heureux de cela. Et ils ont promis de lui donner de l’argent. Alors Judas cherchait un bon moment pour leur livrer Jésus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus mange son dernier repas avec ses 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le premier jour des pains sans levain, chaque famille devait tuer un jeune mouton pour le repas de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: '. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus lui ont dit : Nous allons préparer le repas pascal pour toi. Où veux‑tu que nous fassions cela ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Jésus a envoyé 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il leur a dit : Allez à la ville, vous rencontrerez un homme qui porte une cruche d’eau. Suivez‑le. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il ira à une maison. Dites‑lui ceci de ma part : Quelle est la place où je peux manger le repas de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' avec mes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors l’homme vous montrera une grande chambre à l’étage. La chambre aura en elle toutes les choses dont vous aurez besoin. Vous devez préparer le repas de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' pour nous là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors les 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés et sont entrés dans la ville. Ils ont trouvé tout ce que Jésus leur avait dit. Donc, ils ont préparé le repas de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le soir, Jésus est arrivé avec les 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pendant qu’ils mangeaient le repas, Jésus a dit : Je vous dis la vérité. L’un de vous aidera les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' à m’arrêter. C’est quelqu’un qui mange ce repas avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont devenus très tristes. Chacun d’eux disait à Jésus : J’espère que ce n’est pas moi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus leur a dit : C’est l’un des 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Cet homme plonge son pain dans le même plat que moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus a dit : Le Fils de l’homme doit être livré aux ennemis comme la Bible dit. Mais ce sera très mauvais pour l’homme qui aide à livrer le Fils de l’homme aux ennemis. Il serait mieux pour cet homme de ne pas être né.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le repas de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' mangeaient. Alors Jésus a pris un pain. Il a remercié Dieu pour cela. Puis il a coupé le pain et il l’a donné à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. Il leur a dit : Prenez ce pain. Ceci est mon corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Jésus a pris une coupe. Il a remercié Dieu. Puis il la leur a donnée, et ils en ont bu tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur a dit : Ceci est mon sang, ça montre qu’il y a une promesse de Dieu. Quand je mourrai, mon sang sortira de mon corps. Et Dieu sauvera beaucoup de gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je vous dis la vérité. Je ne boirai plus ce vin de la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: vigne
  - type: text
    text: '. Mais j’en boirai encore seulement quand Dieu commencera à diriger son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont chanté un cantique à Dieu. Puis ils sont sortis. Ils sont allés à la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus dit aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ce qui se passera'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors Jésus leur a dit : Les choses qui se passeront ce soir diminueront votre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: '. Les Saintes Écritures disent : Je vais tuer l’homme qui conduit les brebis. Et les brebis s’enfuiront dans des directions différentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais je vais devenir encore vivant. Ensuite, je vais vous précéder en Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pierre a dit à Jésus : Même si la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' de tous diminue, moi je ne te laisserai pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus a répondu à Pierre : Je te dis la vérité. Ce soir, tu diras 3 fois que tu ne me connais pas. Tu vas le faire avant que le coq chante pour la seconde fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais Pierre a répondu à Jésus vivement : Si nécessaire, je vais mourir avec toi. Mais je ne dirai jamais à personne que je ne te connais pas. Tous les autres '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' disaient la même chose.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus prie dans le jardin appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Gethsémané
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ensuite, ils sont arrivés à un jardin appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Gethsémané
  - type: text
    text: '. Jésus a dit à ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '  : Asseyez‑vous ici pendant que je vais prier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Alors Jésus a pris Pierre, Jacques et Jean avec lui. L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Jésus n’était plus tranquille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur a dit : Je suis très triste. Je sens comme si je vais mourir. Attendez ici et restez éveillés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus est allé à une courte distance en face d’eux. Il s’est agenouillé au sol. Il a prié pour que, si possible, Dieu puisse le sauver des choses de ce temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il a dit : Abba, (mon père), tu peux faire quoi que ce soit. S’il te plaît, écarte cette douleur de moi. Mais je ne te demande pas de faire ce que je veux. Je choisis ce que tu veux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus est retourné et il a trouvé Pierre, Jacques et Jean. Ils dormaient. Il a dit à Pierre : Simon, vous dormez ! Vous ne pouvez pas rester éveillés, même pour une heure ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Vous devez rester éveillés et vous devez prier. Sinon, vous risquez de pécher. Vous voulez vraiment faire une bonne chose, mais il est trop difficile pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus est allé encore et il a prié de nouveau. Il a dit les mêmes paroles à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus est revenu auprès de Pierre, Jacques et Jean. Il a vu qu’ils étaient endormis. Ils ne pouvaient pas garder les yeux ouverts. Ils ne savaient pas quoi lui dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Lorsque Jésus est retourné pour la troisième fois, il leur a dit : Vous dormez encore et vous vous reposez ? Vous avez assez dormi. Voici l’heure. Regardez ! Voyez l’homme qui aide les hommes mauvais à arrêter le Fils de l’homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Levez‑vous, allons. Regardez ! Voici l’homme qui va les aider à m’attraper.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas conduit les hommes qui vont arrêter Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Quand Jésus parlait, Judas est arrivé immédiatement. Il était l’un des 12 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus. Une foule de gens est venue avec lui. Ils portaient de longs couteaux tranchants, de lourds bâtons. C’étaient les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ', les enseignants de la loi de Dieu et les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' qui avaient envoyé ces hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Avant cela, Judas avait dit à ces hommes : Je vais baiser l’un des hommes. Voilà l’homme que vous devez arrêter. Allez avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Quand ils sont arrivés, Judas est allé immédiatement auprès de Jésus. Il a dit à Jésus : Maître. Et puis il a baisé Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ainsi, les hommes ont attrapé Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Mais un des hommes qui étaient là, a pris son long couteau tranchant. Et il a frappé le serviteur du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' avec ça. Il a coupé l’oreille du serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Alors Jésus a parlé à la foule. Il a dit : Vous êtes venus avec de longs couteaux tranchants et de lourds bâtons pour m’attraper. Vous faites comme si j’étais voleur. Mais vous savez que je ne suis pas un voleur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'J’étais avec vous tous les jours dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ', quand j’enseignais le peuple. Vous ne m’avez pas arrêté. Mais les choses qui sont dans la Bible doivent se réaliser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Alors tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus l’ont laissé et ils ont fui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Un jeune homme suivait Jésus. Il portait un morceau de tissu sur tout son corps. Les hommes ont essayé de saisir la main de ce jeune homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Mais le jeune homme a laissé le morceau de tissu derrière, et il a fui. Quand il est parti, il ne portait pas d’habits.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' pose des questions à Jésus'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Les hommes ont conduit Jésus auprès du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: '. Tous les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' se sont réunis avec les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: '. Il y avait aussi les enseignants de la loi de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Pierre suivait Jésus. Mais il n’est pas allé près de Jésus. Alors Pierre s’est arrêté à l’intérieur de la cour devant la maison du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: '. Il s’est assis avec les gardes. Pierre se chauffait au feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et tout le monde à la réunion voulaient faire mourir Jésus. Donc, ils ont essayé de trouver des hommes qui pouvaient dire des choses contre Jésus. Mais ils ne trouvaient personne qui pourrait les aider. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Beaucoup de gens disaient des choses au sujet de Jésus. Mais ils disaient des choses qui n’étaient pas vraies. Et ils n’étaient pas d’accord les uns avec les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Alors certains hommes se sont levés. Ils ont commencé à parler contre Jésus. Mais leurs paroles n’étaient pas vraies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ils disaient : Nous avons entendu Jésus dire : Je détruirai le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' que les hommes avaient construit. En 3 jours, je vais construire un autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' pour Dieu. Ce ne sont pas les hommes qui construiront un autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Même alors, ces gens qui parlaient contre Jésus, ne disaient pas la même chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' s’est levé au milieu et il a parlé à Jésus : Tu ne réponds pas ? Ces personnes ont dit que tu avais fait de mauvaises choses. Que dis‑tu à ce sujet ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Mais Jésus n’a rien répondu. Il n’a rien dit. Encore une fois, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' a demandé à Jésus : Es‑tu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: '  ? Es‑tu le Fils de Dieu ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Jésus a répondu : Je le suis et vous allez tous voir le Fils de l’homme. Il sera assis à la droite de la puissance de Dieu. Et il viendra sur les nuages de la maison de Dieu, qui est appelée le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' a déchiré ses vêtements. Il a dit : Nous n’avons plus besoin que quelqu’un d’autre nous parle de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Vous avez entendu les mauvaises paroles qu’il a dites contre Dieu. Que décidez‑vous ? Tout le monde était d’accord de faire mourir Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Alors quelques‑uns des hommes se sont mis à cracher sur Jésus. Ils ont couvert les yeux de Jésus et ils le frappaient. Ils disaient : Dis celui qui te frappe, si tu peux ! Puis les gardes giflaient Jésus pendant qu’ils l’emmenaient.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre dit 3 fois qu’il ne connaît pas Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Pierre était toujours en bas dans la cour intérieure. Une fille est venue près de Pierre. Cette fille était l’une des servantes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Elle a vu Pierre qui se chauffait au feu. Elle l’a regardé et elle a dit : Tu étais aussi avec Jésus, l’homme de Nazareth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Il a répondu : Ce n’est pas vrai ! Je ne sais pas de quoi tu parles ! Je ne comprends pas ce que tu veux dire ! Alors Pierre s’est dirigé vers la porte de la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'La jeune femme l’a vu, et encore une fois, elle a commencé à dire à d’autres personnes là‑bas : Cet homme est l’un des hommes qui étaient avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Mais Pierre a dit encore que ce n’était pas vrai. Après un certain temps, les autres personnes qui étaient là, ont dit à Pierre : Tu es certainement l’un de ces gens. Tu es de Galilée. Donc, nous sommes sûrs que tu étais avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Pierre s’est mis à leur parler. Il disait : Je ne connais pas cet homme dont vous parlez. Et Pierre a demandé à Dieu de le punir si ses paroles ne sont pas vraies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Immédiatement, le coq a chanté pour la seconde fois.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Alors Pierre s’est souvenu de ce que Jésus lui avait dit : Tu diras 3 fois que tu ne me connais pas. Tu vas le faire avant que le coq chante pour la seconde fois. Lorsque Pierre a pensé à cela, il a pleuré.'
