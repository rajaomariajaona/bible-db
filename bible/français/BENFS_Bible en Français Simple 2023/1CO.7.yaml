document_id: 1CO.7
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 7
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Questions sur le mariage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous avez écrit pour me poser des questions sur certaines choses. Vous dites : C’est une bonne chose quand un homme ne se marie pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’est peut‑être vrai, mais alors les gens peuvent avoir des relations sexuelles de mauvaises manières. Ainsi, chaque homme doit avoir sa propre femme et chaque femme doit avoir son propre mari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors, ils peuvent avoir des relations sexuelles de la bonne manière. Un mari doit accepter d’avoir des relations sexuelles avec sa femme. Et la femme doit faire la même chose pour son mari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La femme ne contrôle pas son propre corps pour décider quand avoir des relations sexuelles. Elle appartient à son mari. De la même manière, le mari ne règne pas sur son propre corps. Il appartient à sa femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne vous refusez pas d’avoir de relations sexuelles entre vous, sauf si vous acceptez tous les 2 de vous arrêter brièvement. Ensuite, vous pouvez utiliser plus de temps pour prier. Mais vous devez vous retrouver bientôt, en tant que mari et femme. Sinon, Satan peut essayer de vous faire faire quelque chose de mal. Vous voudrez peut‑être trop avoir de relations sexuelles avec quelqu’un d’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je dis ces choses pour vous aider. Je ne vous dis pas ce que vous devez faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce serait bien si vous pouviez tous vivre comme moi. Mais chaque personne a son propre don de Dieu. Dieu aide une personne à vivre d’une certaine manière. Dieu aide une autre personne avec un don différent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je dirai ceci à ceux d’entre vous qui ne se sont pas encore mariés et à celles qui sont veuves. Il vaut mieux pour vous de rester seuls. C’est comme ça que je vis moi‑même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais si vous sentez fortement le désir des relations sexuelles, vous devez vous marier. Il vaut mieux faire cela que de vouloir avoir des relations sexuelles tout le temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je dirai ceci aux personnes qui se sont mariées. (Ce n’est pas ma règle. C’est une règle qui vient du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui‑même.) Une femme ne doit pas quitter son mari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais si elle le quitte, elle ne doit pas épouser un autre homme. Ou elle doit retourner vivre avec son mari. De la même manière, un mari ne doit pas renvoyer sa femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'À vous tous, je le dis. (C’est ce que je pense. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' n’en a pas parlé.) Un chrétien peut avoir une femme qui ne croit pas en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Si la femme accepte de continuer à vivre avec lui, il ne doit pas la renvoyer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De plus, une chrétienne peut avoir un mari qui ne croit pas en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Si le mari accepte de continuer de vivre avec elle, elle ne doit pas le quitter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dieu accepte un mari qui ne croit pas en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à cause de sa femme chrétienne. Et Dieu accepte une femme qui ne croit pas en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à cause de son mari chrétien. Si ce n’était pas vrai, les enfants n’allaient pas appartenir à Dieu. Mais Dieu les accepte, car pour lui, ils sont maintenant purs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais le mari ou la femme qui ne croit pas en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' voudra peut‑être partir. S’ils veulent se séparer, laissez‑les faire. Si cela se fait, l’homme ou la femme (chrétiens) sont désormais libres. Dieu veut que vous viviez en paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si vous êtes une femme chrétienne, vous pourriez sauver votre mari. Si vous êtes un mari chrétien, vous pourriez sauver votre femme. Mais vous ne pouvez pas être sûrs de ce qui va se passer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais chacun de vous doit continuer à vivre comme Dieu l’a choisi. Restez comme vous étiez au moment où Dieu vous a appelés à lui. J’enseigne cette règle aux gens de toutes les Églises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Certains d’entre vous sont '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', donc les gens vous ont circoncis. Cela s’est produit avant que vous ne croyiez en Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Alors n’essayez pas de changer cela. Certains d’entre vous ne sont pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Personne ne vous a circoncis. Alors continuez comme cela. Ne demandez à personne de vous '
  - type: usfm
    marker: w
    children:
    - type: text
      text: circoncire
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ce n’est pas important si quelqu’un vous a circoncis ou non. La chose importante est la suivante : Obéissez à ce que Dieu dit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Chacun de vous doit continuer comme vous étiez lorsque Dieu vous a appelés à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu as peut‑être été un esclave quand Dieu t’a appelé. Cela ne fait rien. Mais si tu as la chance de devenir une personne libre, accepte cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' peut appeler un esclave à lui. Ensuite, cet esclave devient libre, car il appartient au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . De la même manière, lorsque Dieu appelle une personne libre à appartenir à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', cette personne devient l’esclave de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dieu vous a rachetés pour lui‑même. Il a payé le prix pour vous. Alors, ne laissez personne d’autre faire de vous ses esclaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mes amis chrétiens, chacun de vous doit continuer comme vous étiez lorsque Dieu vous a appelés pour la première fois à lui. N’oubliez pas que vous servez Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous m’avez posé une question sur les gens qui ne se sont pas encore mariés. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne m’a pas dit de règle spéciale à ce sujet. Mais je vais vous dire ce que j’en pense moi‑même. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a été très gentil avec moi. Vous savez que vous pouvez croire à ce que je dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voici ce que je pense : Il y a beaucoup de problèmes dans le monde aujourd’hui. Donc, il vaut mieux que tout homme continue comme il est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si vous avez une femme, n’essayez pas de la renvoyer. Si vous n’avez pas de femme, n’essayez pas de vous marier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais si vous vous mariez, ce n’est pas mauvais. Et si une jeune femme se marie, ce n’est pas faux. Mais les gens qui se marient auront de nombreux problèmes au cours de leur vie ensemble. Je veux vous sauver de tels problèmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mes amis chrétiens, voici ce que je veux dire : Le temps qui reste est très court. Ainsi, les hommes qui ont des femmes vivront comme s’ils n’avaient pas de femmes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les gens tristes devraient vivre comme s’ils n’étaient pas tristes. Les gens heureux devraient vivre comme s’ils n’avaient pas de quoi rire. Les gens qui achètent des choses devraient vivre comme si ces choses ne leur appartenaient pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Si vous aimez les choses de ce monde, ne vivez pas comme si ces choses étaient importantes. Ce monde, tel qu’il est maintenant, va bientôt finir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Je ne veux pas que vous vous inquiétiez des problèmes. Un homme qui ne s’est pas marié veut servir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il veut vivre d’une manière qui rend le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mais un homme qui s’est marié pense beaucoup aux choses de ce monde. Il veut vivre d’une manière qui rend sa femme heureuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: En conséquence, il pense de 2 manières opposées.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'C’est la même chose pour une femme qui n’a pas de mari ou une jeune fille qui ne s’est pas mariée. Elle veut très bien servir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Elle veut être complètement pure, à la fois dans son corps et dans son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: . Mais une femme qui a un mari pense aux choses de ce monde. Elle veut vivre d’une manière qui rend son mari heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Je dis cela parce que je veux vous aider. Je ne fais pas de règles auxquelles vous devez obéir. Mais, je veux que vous viviez correctement. Je ne veux pas que vous vous inquiétiez des problèmes. Vous pourrez alors très bien servir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Un homme peut penser que c’est une honte que sa fille dépasse l’âge de se marier. Il peut donc trouver important de la marier à son fiancé. Il ne pèche pas, s’il fait cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais un autre homme peut décider de garder sa fille vierge. Il fait bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ainsi, l’homme qui épouse sa jeune femme fait une bonne chose. Mais l’homme qui ne se marie pas fait mieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Si une femme s’est mariée, elle ne peut pas quitter son mari tant qu’il vit. Mais s’il meurt, elle est libre de se marier à nouveau. Elle peut épouser n’importe quel homme qu’elle veut. Mais il doit être quelqu’un qui appartient au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Je pense qu’elle sera plus heureuse si elle restait sans mari. C’est ce que je pense, et l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu m’aide aussi avec cela.'
