document_id: ROM.15,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 15
  - type: heading
    content: Les chrétiens forts doivent aider les chrétiens plus faibles
  - type: text
    content: 'Certains d’entre nous font confiance en Dieu avec une '
  - type: text
    content: foi
  - type: text
    content: ' forte. Nous devons aider les croyants dont la '
  - type: text
    content: foi
  - type: text
    content: ' est faible. Nous devons être patients avec eux. Nous ne devons pas seulement faire des choses qui nous rendront heureux nous‑mêmes. '
  '10':
  - type: text
    content: 'Il est également dit dans la Bible :'
  - type: text
    content: 'Soyez très heureux, vous les non '
  - type: text
    content: Juifs
  - type: text
    content: '  !'
  - type: text
    content: Louez Dieu avec son peuple.
  '11':
  - type: text
    content: 'Il dit également ceci :'
  - type: text
    content: 'Dites à quel point le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand, vous tous, non '
  - type: text
    content: Juifs
  - type: text
    content: .
  - type: text
    content: Tout le monde, de tous les pays, doit dire à quel point il est grand.
  '12':
  - type: text
    content: 'Le '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe dit ceci :'
  - type: text
    content: Un fils d’Isaï va arriver.
  - type: text
    content: 'Il viendra pour diriger les non '
  - type: text
    content: Juifs
  - type: text
    content: .
  - type: text
    content: 'Les non '
  - type: text
    content: Juifs
  - type: text
    content: ' lui feront confiance pour les sauver.'
  '13':
  - type: text
    content: Dieu est celui qui nous fait espérer de bonnes choses. Je prie que Dieu vous bénisse beaucoup. Je prie pour qu’il vous rende heureux et que vous ayez la paix dans l’
  - type: text
    content: esprit
  - type: text
    content: '. Il le fera parce que vous croyez en lui. En conséquence, le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu vous rendra forts avec sa puissance. Alors vous pourrez espérer encore plus certainement.'
  - type: heading
    content: La raison pour laquelle Paul a écrit cette lettre
  '14':
  - type: text
    content: 'Mes amis chrétiens, je suis moi‑même absolument sûr que vous êtes toujours bons. Vous savez tout sur le message de Dieu, afin que vous puissiez vous enseigner les uns aux autres ce qui est juste. '
  '15':
  - type: text
    content: 'Je sais que c’est vrai, mais j’avais encore besoin de vous écrire cette lettre. Je vous ai écrit fortement pour que vous vous souveniez de certaines choses. Parce que Dieu est bon, il m’a choisi pour le servir de cette façon. '
  '16':
  - type: text
    content: Je suis un serviteur de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' parmi les non '
  - type: text
    content: Juifs
  - type: text
    content: '. Je dis aux gens la Bonne Nouvelle de Dieu. Je travaille comme un '
  - type: text
    content: prêtre
  - type: text
    content: ' pour que Dieu accepte les non '
  - type: text
    content: Juifs
  - type: text
    content: '. Je les offre à Dieu. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' les a sanctifiés et donc, Dieu les accepte.'
  '17':
  - type: text
    content: Je peux donc être fier de mon travail. Je peux bien servir Dieu, parce que j’appartiens à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Mais je parlerai seulement du travail que Jésus m’a permis de faire. J’ai vécu parmi les non '
  - type: text
    content: Juifs
  - type: text
    content: ' et je leur ai dit le message de Dieu. Ils ont obéi à Dieu grâce au travail de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' à travers moi. '
  '19':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu a utilisé son pouvoir pour accomplir de nombreux miracles. Il a causé de nombreuses choses grandes et puissantes. En conséquence, j’ai dit toute la Bonne Nouvelle de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' à beaucoup de gens. Je l’ai dit pendant que je voyageais de Jérusalem à Illyrie.'
  '2':
  - type: text
    content: 'Mais, chacun de nous doit faire des choses qui feront d’autres croyants heureux. Nous devons les aider à avoir davantage confiance en Dieu. '
  '20':
  - type: text
    content: Je veux aller dans des endroits où personne n’a jamais parlé de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' aux gens auparavant. Je veux annoncer la Bonne Nouvelle aux gens de ces endroits. C’est ce que j’ai toujours voulu faire. Je ne veux pas travailler dans un endroit où quelqu’un d’autre a déjà commencé à enseigner le message de Dieu. '
  '21':
  - type: text
    content: 'Ceci est écrit dans la Bible sur le '
  - type: text
    content: Messie
  - type: text
    content: ' de Dieu :'
  - type: text
    content: Ces gens à qui rien n’a été dit avant, verront maintenant.
  - type: text
    content: Ces gens qui n’ont jamais entendu parler de lui vont maintenant comprendre.
  - type: heading
    content: Paul espère visiter bientôt Rome
  '22':
  - type: text
    content: 'C’est pourquoi, bien souvent, je n’ai pas eu l’occasion de vous rendre visite. '
  '23':
  - type: text
    content: 'Depuis de nombreuses années, j’attends l’occasion de venir. Mais maintenant, j’ai terminé mon travail dans ces endroits ici. '
  '24':
  - type: text
    content: J’espère donc vous rendre visite pendant mon voyage en Espagne. Je resterai avec vous à Rome pendant une courte période. Je serai vraiment content d’avoir un peu de temps avec vous là‑bas. Alors, vous pourrez m’aider à poursuivre mon voyage.
  '25':
  - type: text
    content: 'Mais maintenant, je suis prêt à aller à Jérusalem pour y aider le peuple de Dieu. '
  '26':
  - type: text
    content: 'Certains d’entre eux sont pauvres et les chrétiens de Macédoine et d’Achaïe voulaient les aider. Ils ont donc reçu de l’argent à envoyer à ces gens. '
  '27':
  - type: text
    content: 'Les chrétiens de Macédoine et d’Achaïe étaient heureux de partager ce qu’ils avaient. Mais vraiment, ils ont le devoir d’aider les chrétiens '
  - type: text
    content: juifs
  - type: text
    content: ' de Jérusalem. Ce sont les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui ont partagé de bonnes choses de Dieu pour aider les non '
  - type: text
    content: Juifs
  - type: text
    content: ' dans leurs '
  - type: text
    content: esprits
  - type: text
    content: '. Alors maintenant, les non '
  - type: text
    content: Juifs
  - type: text
    content: ' doivent aider les chrétiens '
  - type: text
    content: juifs
  - type: text
    content: ' avec les choses dont ils ont besoin pour leur corps.'
  '28':
  - type: text
    content: 'Je dois donc apporter leurs dons aux chrétiens de Jérusalem. Lorsque j’aurai terminé ce travail, je viendrai vous rendre visite. Ensuite, je continuerai mon voyage en Espagne. '
  '29':
  - type: text
    content: Quand je vous rends visite, je sais que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' nous bénira beaucoup pendant que nous serons ensemble.'
  '3':
  - type: text
    content: Même Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' n’a pas seulement fait des choses qui lui feront plaisir. Il est écrit dans la Bible qu’il a dit ceci :'
  - type: text
    content: Les gens t’ont insulté, Dieu. De cette façon, ils m’ont aussi insulté.
  '30':
  - type: text
    content: 'Mes amis chrétiens, veuillez prier pour moi pendant que je fais ce travail difficile. Ensemble, nous appartenons à notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu nous a donné de l’amour les uns pour les autres. Je vous demande donc de m’aider et de prier avec moi. '
  '31':
  - type: text
    content: Priez que Dieu me garde de ces gens de Judée qui ont refusé de croire en Jésus. Priez aussi que le peuple de Dieu à Jérusalem accepte avec joie les cadeaux que je lui apporte.
  '32':
  - type: text
    content: 'Si Dieu est d’accord, je pourrai alors venir vers vous et nous serons heureux ensemble. Je serai content de me reposer pendant que je serai avec vous. '
  '33':
  - type: text
    content: 'Je prie pour que Dieu vous donne la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: . Je prie pour qu’il soit avec vous tous et vous aide. Amen.
  '4':
  - type: text
    content: Tout ce que les gens ont écrit dans la Bible dans le passé est là pour nous apprendre quelque chose. Ces mots nous aident à être patients et forts. En conséquence, nous pouvons faire confiance en Dieu pour faire ce qu’il a promis.
  '5':
  - type: text
    content: C’est Dieu lui‑même qui nous aide à être patients et forts. Je prie donc pour qu’il vous aide à vous mettre d’accord et à être amis. C’est ainsi que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' veut que vous viviez. '
  '6':
  - type: text
    content: 'En conséquence, vous louerez tous Dieu avec les mêmes pensées. Vous conviendrez tous que Dieu, le Père de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', est très grand.'
  - type: heading
    content: Le Christ sauve les Juifs et les non Juifs
  '7':
  - type: text
    content: ' '
  - type: text
    content: Christ
  - type: text
    content: ' vous a acceptés, vous devez donc vous accepter les uns les autres. De cette façon, vous glorifierez Dieu. '
  '8':
  - type: text
    content: 'Rappelez‑vous ceci : Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' est devenu un serviteur des '
  - type: text
    content: Juifs
  - type: text
    content: ', afin qu’ils puissent comprendre le vrai message de Dieu. Il leur a montré que Dieu a maintenant fait ce qu’il avait promis à leurs ancêtres. '
  '9':
  - type: text
    content: 'Les non '
  - type: text
    content: Juifs
  - type: text
    content: ' glorifient aussi Dieu parce qu’il a été bon envers eux. Ceci est écrit dans la Bible :'
  - type: text
    content: 'Je parlerai de toi aux non '
  - type: text
    content: Juifs
  - type: text
    content: ', Dieu.'
  - type: text
    content: Je te louerai avec des chansons pour montrer à quel point tu es très grand.
