document_id: ROM.15
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 15
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les chrétiens forts doivent aider les chrétiens plus faibles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Certains d’entre nous font confiance en Dieu avec une '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' forte. Nous devons aider les croyants dont la '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: ' est faible. Nous devons être patients avec eux. Nous ne devons pas seulement faire des choses qui nous rendront heureux nous‑mêmes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais, chacun de nous doit faire des choses qui feront d’autres croyants heureux. Nous devons les aider à avoir davantage confiance en Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Même Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' n’a pas seulement fait des choses qui lui feront plaisir. Il est écrit dans la Bible qu’il a dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gens t’ont insulté, Dieu. De cette façon, ils m’ont aussi insulté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tout ce que les gens ont écrit dans la Bible dans le passé est là pour nous apprendre quelque chose. Ces mots nous aident à être patients et forts. En conséquence, nous pouvons faire confiance en Dieu pour faire ce qu’il a promis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est Dieu lui‑même qui nous aide à être patients et forts. Je prie donc pour qu’il vous aide à vous mettre d’accord et à être amis. C’est ainsi que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' veut que vous viviez. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En conséquence, vous louerez tous Dieu avec les mêmes pensées. Vous conviendrez tous que Dieu, le Père de notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', est très grand.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sauve les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vous a acceptés, vous devez donc vous accepter les uns les autres. De cette façon, vous glorifierez Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rappelez‑vous ceci : Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est devenu un serviteur des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', afin qu’ils puissent comprendre le vrai message de Dieu. Il leur a montré que Dieu a maintenant fait ce qu’il avait promis à leurs ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' glorifient aussi Dieu parce qu’il a été bon envers eux. Ceci est écrit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je parlerai de toi aux non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ', Dieu.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te louerai avec des chansons pour montrer à quel point tu es très grand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il est également dit dans la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Soyez très heureux, vous les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez Dieu avec son peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il dit également ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites à quel point le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est grand, vous tous, non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le monde, de tous les pays, doit dire à quel point il est grand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' Ésaïe dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un fils d’Isaï va arriver.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il viendra pour diriger les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' lui feront confiance pour les sauver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dieu est celui qui nous fait espérer de bonnes choses. Je prie que Dieu vous bénisse beaucoup. Je prie pour qu’il vous rende heureux et que vous ayez la paix dans l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Il le fera parce que vous croyez en lui. En conséquence, le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu vous rendra forts avec sa puissance. Alors vous pourrez espérer encore plus certainement.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La raison pour laquelle Paul a écrit cette lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mes amis chrétiens, je suis moi‑même absolument sûr que vous êtes toujours bons. Vous savez tout sur le message de Dieu, afin que vous puissiez vous enseigner les uns aux autres ce qui est juste. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je sais que c’est vrai, mais j’avais encore besoin de vous écrire cette lettre. Je vous ai écrit fortement pour que vous vous souveniez de certaines choses. Parce que Dieu est bon, il m’a choisi pour le servir de cette façon. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je suis un serviteur de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' parmi les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Je dis aux gens la Bonne Nouvelle de Dieu. Je travaille comme un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' pour que Dieu accepte les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Je les offre à Dieu. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' les a sanctifiés et donc, Dieu les accepte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je peux donc être fier de mon travail. Je peux bien servir Dieu, parce que j’appartiens à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais je parlerai seulement du travail que Jésus m’a permis de faire. J’ai vécu parmi les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' et je leur ai dit le message de Dieu. Ils ont obéi à Dieu grâce au travail de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à travers moi. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu a utilisé son pouvoir pour accomplir de nombreux miracles. Il a causé de nombreuses choses grandes et puissantes. En conséquence, j’ai dit toute la Bonne Nouvelle de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à beaucoup de gens. Je l’ai dit pendant que je voyageais de Jérusalem à Illyrie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je veux aller dans des endroits où personne n’a jamais parlé de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' aux gens auparavant. Je veux annoncer la Bonne Nouvelle aux gens de ces endroits. C’est ce que j’ai toujours voulu faire. Je ne veux pas travailler dans un endroit où quelqu’un d’autre a déjà commencé à enseigner le message de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ceci est écrit dans la Bible sur le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' de Dieu :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces gens à qui rien n’a été dit avant, verront maintenant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces gens qui n’ont jamais entendu parler de lui vont maintenant comprendre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul espère visiter bientôt Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C’est pourquoi, bien souvent, je n’ai pas eu l’occasion de vous rendre visite. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Depuis de nombreuses années, j’attends l’occasion de venir. Mais maintenant, j’ai terminé mon travail dans ces endroits ici. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: J’espère donc vous rendre visite pendant mon voyage en Espagne. Je resterai avec vous à Rome pendant une courte période. Je serai vraiment content d’avoir un peu de temps avec vous là‑bas. Alors, vous pourrez m’aider à poursuivre mon voyage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais maintenant, je suis prêt à aller à Jérusalem pour y aider le peuple de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Certains d’entre eux sont pauvres et les chrétiens de Macédoine et d’Achaïe voulaient les aider. Ils ont donc reçu de l’argent à envoyer à ces gens. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les chrétiens de Macédoine et d’Achaïe étaient heureux de partager ce qu’ils avaient. Mais vraiment, ils ont le devoir d’aider les chrétiens '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' de Jérusalem. Ce sont les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' qui ont partagé de bonnes choses de Dieu pour aider les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: '. Alors maintenant, les non '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' doivent aider les chrétiens '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' avec les choses dont ils ont besoin pour leur corps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je dois donc apporter leurs dons aux chrétiens de Jérusalem. Lorsque j’aurai terminé ce travail, je viendrai vous rendre visite. Ensuite, je continuerai mon voyage en Espagne. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Quand je vous rends visite, je sais que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' nous bénira beaucoup pendant que nous serons ensemble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mes amis chrétiens, veuillez prier pour moi pendant que je fais ce travail difficile. Ensemble, nous appartenons à notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu nous a donné de l’amour les uns pour les autres. Je vous demande donc de m’aider et de prier avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Priez que Dieu me garde de ces gens de Judée qui ont refusé de croire en Jésus. Priez aussi que le peuple de Dieu à Jérusalem accepte avec joie les cadeaux que je lui apporte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Si Dieu est d’accord, je pourrai alors venir vers vous et nous serons heureux ensemble. Je serai content de me reposer pendant que je serai avec vous. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je prie pour que Dieu vous donne la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Je prie pour qu’il soit avec vous tous et vous aide. Amen.
