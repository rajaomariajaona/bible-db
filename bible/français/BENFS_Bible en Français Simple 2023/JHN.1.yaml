document_id: JHN.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: La Parole est devenue un être humain
  - type: text
    content: La Parole était déjà là au commencement de tout ce qui existe. La Parole était avec Dieu et elle était Dieu. (Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est la Parole de Dieu. Dieu se montre à nous en Jésus. Donc Jésus est comme le message de Dieu à nous. Dieu nous parle de manière à le comprendre, parce que Jésus a vécu comme une personne réelle.)'
  '10':
  - type: text
    content: 'La Parole était dans le monde. Dieu a fait le monde par elle. Mais le monde ne savait pas qui était cette Parole. '
  '11':
  - type: text
    content: 'Elle est venue auprès de son peuple. Mais son propre peuple ne l’a pas acceptée. '
  '12':
  - type: text
    content: 'Mais certaines personnes l’ont acceptée. Ainsi, elle a donné le pouvoir à ces gens de devenir des enfants de Dieu. '
  '13':
  - type: text
    content: 'Ces enfants ne sont pas nés de la manière humaine habituelle. Ils ne sont pas nés à cause de ce que les hommes voulaient, ni de leur décision. Non ! Ils sont nés de Dieu. '
  '14':
  - type: text
    content: La Parole est devenue un homme. Cet homme a vécu sur terre avec nous. Nous avons vu sa grande gloire. Il a la gloire du vrai fils du Père. Il est plein de grâce et de vérité.
  '15':
  - type: text
    content: 'Jean disait aux gens au sujet de la Parole (Jésus) : Celui‑ci est l’homme dont je vous ai parlé. Il vient après moi. Mais il est plus grand que moi. Il était là avant ma naissance. '
  '16':
  - type: text
    content: 'La Parole est pleine de tout ce dont nous avons besoin. Nous avons reçu d’elle une bonne chose après une autre bonne chose. '
  '17':
  - type: text
    content: Dieu a donné sa loi par Moïse. Mais Dieu a été bon pour nous par Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Dieu nous a apporté son véritable message par Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. '
  '18':
  - type: text
    content: Personne n’a jamais vu Dieu. Mais seul le vrai Fils de Dieu nous a montré Dieu. Il est très près de Dieu.
  - type: heading
    content: Jean‑Baptiste n’était pas Christ
  '19':
  - type: text
    content: 'Les chefs '
  - type: text
    content: juifs
  - type: text
    content: ' ont envoyé des '
  - type: text
    content: prêtres
  - type: text
    content: ' et des '
  - type: text
    content: Lévites
  - type: text
    content: ' de Jérusalem pour demander à Jean : Qui es‑tu ? Voici ce qu’il a dit. '
  '2':
  - type: text
    content: 'La Parole était présente avec Dieu au commencement de tout ce qui existe. '
  '20':
  - type: text
    content: 'Jean n’a pas refusé de répondre. Il a dit : Je ne suis pas le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Ils lui ont demandé : Qui es‑tu ? Es‑tu Élie ? Jean a dit : Non, je ne le suis pas. Ils ont demandé : Es‑tu le '
  - type: text
    content: prophète
  - type: text
    content: '  ? Jean a répondu : Non. '
  '22':
  - type: text
    content: 'Et ils ont dit : Dis‑nous qui tu es. Nous devons dire quelque chose aux gens qui nous ont envoyés. Que dis‑tu sur toi‑même ? '
  '23':
  - type: text
    content: 'Il a dit : Je suis la voix de celui qui crie dans le '
  - type: text
    content: désert
  - type: text
    content: '  : Arrangez le chemin du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Voilà ce que le '
  - type: text
    content: prophète
  - type: text
    content: ' Ésaïe a dit. '
  '24':
  - type: text
    content: 'Les hommes qui sont venus poser ces questions étaient des '
  - type: text
    content: Pharisiens
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Ils ont dit à Jean : Pourquoi baptises‑tu les gens, si tu n’es ni le '
  - type: text
    content: Christ
  - type: text
    content: ', ni Élie, ni le '
  - type: text
    content: prophète
  - type: text
    content: '  ?'
  '26':
  - type: text
    content: 'Jean a répondu : Je baptise les gens avec de l’eau. Mais il y a quelqu’un parmi vous que vous ne connaissez pas. '
  '27':
  - type: text
    content: 'Il est celui qui vient après moi. Je ne suis même pas assez bon pour ouvrir ses souliers. '
  '28':
  - type: text
    content: 'Toutes ces choses se sont produites à un endroit à l’est du '
  - type: text
    content: Jourdain
  - type: text
    content: '. C’était un village appelé '
  - type: text
    content: Béthanie
  - type: text
    content: . Jean baptisait les gens là‑bas.
  '29':
  - type: text
    content: 'Le lendemain, Jean a vu Jésus. Il est allé auprès de lui. Jean a dit : Voici l’Agneau de Dieu, qui enlève le péché du monde. '
  '3':
  - type: text
    content: 'Dieu a fait toutes choses par le moyen de la Parole. Dieu n’a rien fait sans la Parole. '
  '30':
  - type: text
    content: 'Celui‑ci est l’homme dont je vous ai parlé : Il est celui qui vient après moi. Mais il est plus grand que moi. Il était déjà là avant ma naissance. '
  '31':
  - type: text
    content: 'Je ne le connaissais pas. Mais je devais montrer au peuple d’Israël qui il était. Voilà pourquoi je suis venu baptiser les gens avec de l’eau. '
  '32':
  - type: text
    content: 'Jean leur a dit : J’ai vu l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu descendre du '
  - type: text
    content: ciel
  - type: text
    content: '. Il est venu comme une colombe. Il est descendu sur Jésus. '
  '33':
  - type: text
    content: 'Je ne savais pas qui il était. Mais Dieu m’a envoyé baptiser les gens dans l’eau. Il m’a dit : Tu verras l’'
  - type: text
    content: Esprit
  - type: text
    content: ' descendre. Il descendra sur quelqu’un. C’est la personne qui va baptiser les gens avec le Saint‑'
  - type: text
    content: Esprit
  - type: text
    content: '. '
  '34':
  - type: text
    content: Maintenant, j’ai vu cela. Donc, je peux vous dire que c’est lui le Fils de Dieu.
  - type: heading
    content: Les premiers disciples de Jésus
  '35':
  - type: text
    content: 'Jean et 2 de ses '
  - type: text
    content: disciples
  - type: text
    content: ' étaient là le lendemain. '
  '36':
  - type: text
    content: 'Jean a vu Jésus. Il marchait devant eux. Jean a dit : Voici l’Agneau de Dieu. '
  '37':
  - type: text
    content: 'Les 2 '
  - type: text
    content: disciples
  - type: text
    content: ' ont entendu cela. Ils suivaient Jésus. '
  '38':
  - type: text
    content: 'Alors Jésus s’est retourné. Il a vu qu’ils le suivaient. Il leur a demandé : Que voulez‑vous ? Ils ont dit : Rabbi, où restes‑tu ? '
  '39':
  - type: text
    content: 'Jésus leur a répondu : Venez et voyez. Donc, ils sont allés avec lui. Et ils ont vu l’endroit où il restait. Il était environ 10 heures du matin. Et ils sont restés avec lui ce jour‑là.'
  '4':
  - type: text
    content: 'C’est la Parole qui a fait vivre tout. À cause de ceci, elle a donné la lumière à tous les gens. '
  '40':
  - type: text
    content: 'André était l’un des 2 '
  - type: text
    content: disciples
  - type: text
    content: ' qui avaient suivi Jésus. Ils ont entendu ce que Jean avait dit à propos de Jésus. André était le frère de Simon Pierre. '
  '41':
  - type: text
    content: 'La première chose qu’André a faite, était de trouver son frère Simon. André a dit à Simon : Nous avons trouvé le '
  - type: text
    content: Messie
  - type: text
    content: '. '
  '42':
  - type: text
    content: 'Puis il a conduit Simon à Jésus. Jésus a regardé Simon et il a dit : Tu es Simon, fils de Jean. Ton nom sera Céphas (Céphas=Pierre).'
  '43':
  - type: text
    content: 'Le lendemain, Jésus a décidé d’aller en Galilée. Il a rencontré Philippe. Jésus a dit à Philippe : Suis‑moi. '
  '44':
  - type: text
    content: 'Philippe est venu de '
  - type: text
    content: Bethsaïda
  - type: text
    content: '. C’était la ville d’André et Pierre aussi. '
  '45':
  - type: text
    content: 'Philippe a vu Nathanaël. Il a dit à Nathanaël : Nous avons trouvé l’homme sur qui Moïse avait écrit dans le livre des règles de Dieu. Les '
  - type: text
    content: prophètes
  - type: text
    content: ' avaient aussi écrit sur lui. C’est Jésus, fils de Joseph, de Nazareth. '
  '46':
  - type: text
    content: 'Nathanaël a dit : Je ne pensais pas que quelque chose de bon pourrait venir de Nazareth ! Philippe a répondu : Viens et vois.'
  '47':
  - type: text
    content: 'Jésus a vu Nathanaël qui venait vers lui. Jésus a dit : Voici un homme tout à fait honnête. Voilà ce qu’une personne d’Israël devrait vraiment être. '
  '48':
  - type: text
    content: 'Nathanaël a demandé : Comment me connais‑tu ? Jésus a répondu : Je t’avais vu avant que Philippe te demande de venir. Je t’ai vu quand tu étais sous le '
  - type: text
    content: figuier
  - type: text
    content: '. '
  '49':
  - type: text
    content: 'Nathanaël a dit : Maître, tu es le Fils de Dieu. Tu es le roi d’Israël. '
  '5':
  - type: text
    content: La lumière éclaire dans l’obscurité. Mais l’obscurité ne peut pas faire disparaître la lumière. (La Parole, Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est comme une lumière. Il nous montre ce qui est vrai. L’obscurité signifie la puissance de l’ennemi de Dieu, Satan. Il essaie de cacher ce qui est vrai. La lumière de Dieu éclaire dans les endroits de Satan. Satan ne peut pas arrêter la lumière).'
  '50':
  - type: text
    content: 'Jésus lui a dit : Je t’ai dit que je t’avais vu sous le '
  - type: text
    content: figuier
  - type: text
    content: '. Et tu crois parce que je t’ai dit cela. Tu vas voir beaucoup plus de choses que cela. '
  '51':
  - type: text
    content: 'Et Jésus lui a dit : Je te dis la vérité. Vous verrez le '
  - type: text
    content: ciel
  - type: text
    content: ' ouvert. Vous verrez les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu. Ils vont monter et descendre au‑dessus du Fils de l’homme.'
  '6':
  - type: text
    content: 'Dieu a envoyé un homme. Son nom était Jean. '
  '7':
  - type: text
    content: Il est venu parler aux gens de la lumière.
  - type: text
    content: 'Dieu voulait que tout le monde puisse croire à ce que Jean disait. '
  '8':
  - type: text
    content: 'Jean lui‑même n’était pas la lumière. Dieu l’a envoyé parler de la lumière aux gens. '
  '9':
  - type: text
    content: C’était la vraie lumière qui éclaire chaque personne. Elle est venue au monde.
