document_id: JHN.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La Parole est devenue un être humain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La Parole était déjà là au commencement de tout ce qui existe. La Parole était avec Dieu et elle était Dieu. (Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est la Parole de Dieu. Dieu se montre à nous en Jésus. Donc Jésus est comme le message de Dieu à nous. Dieu nous parle de manière à le comprendre, parce que Jésus a vécu comme une personne réelle.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La Parole était présente avec Dieu au commencement de tout ce qui existe. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dieu a fait toutes choses par le moyen de la Parole. Dieu n’a rien fait sans la Parole. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C’est la Parole qui a fait vivre tout. À cause de ceci, elle a donné la lumière à tous les gens. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La lumière éclaire dans l’obscurité. Mais l’obscurité ne peut pas faire disparaître la lumière. (La Parole, Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est comme une lumière. Il nous montre ce qui est vrai. L’obscurité signifie la puissance de l’ennemi de Dieu, Satan. Il essaie de cacher ce qui est vrai. La lumière de Dieu éclaire dans les endroits de Satan. Satan ne peut pas arrêter la lumière).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu a envoyé un homme. Son nom était Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il est venu parler aux gens de la lumière.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Dieu voulait que tout le monde puisse croire à ce que Jean disait. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jean lui‑même n’était pas la lumière. Dieu l’a envoyé parler de la lumière aux gens. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’était la vraie lumière qui éclaire chaque personne. Elle est venue au monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La Parole était dans le monde. Dieu a fait le monde par elle. Mais le monde ne savait pas qui était cette Parole. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle est venue auprès de son peuple. Mais son propre peuple ne l’a pas acceptée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais certaines personnes l’ont acceptée. Ainsi, elle a donné le pouvoir à ces gens de devenir des enfants de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ces enfants ne sont pas nés de la manière humaine habituelle. Ils ne sont pas nés à cause de ce que les hommes voulaient, ni de leur décision. Non ! Ils sont nés de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La Parole est devenue un homme. Cet homme a vécu sur terre avec nous. Nous avons vu sa grande gloire. Il a la gloire du vrai fils du Père. Il est plein de grâce et de vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jean disait aux gens au sujet de la Parole (Jésus) : Celui‑ci est l’homme dont je vous ai parlé. Il vient après moi. Mais il est plus grand que moi. Il était là avant ma naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La Parole est pleine de tout ce dont nous avons besoin. Nous avons reçu d’elle une bonne chose après une autre bonne chose. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dieu a donné sa loi par Moïse. Mais Dieu a été bon pour nous par Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Dieu nous a apporté son véritable message par Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Personne n’a jamais vu Dieu. Mais seul le vrai Fils de Dieu nous a montré Dieu. Il est très près de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  - type: text
    text: ' n’était pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: ' ont envoyé des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Lévites
  - type: text
    text: ' de Jérusalem pour demander à Jean : Qui es‑tu ? Voici ce qu’il a dit. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jean n’a pas refusé de répondre. Il a dit : Je ne suis pas le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils lui ont demandé : Qui es‑tu ? Es‑tu Élie ? Jean a dit : Non, je ne le suis pas. Ils ont demandé : Es‑tu le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '  ? Jean a répondu : Non. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et ils ont dit : Dis‑nous qui tu es. Nous devons dire quelque chose aux gens qui nous ont envoyés. Que dis‑tu sur toi‑même ? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il a dit : Je suis la voix de celui qui crie dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '  : Arrangez le chemin du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Voilà ce que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' Ésaïe a dit. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les hommes qui sont venus poser ces questions étaient des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils ont dit à Jean : Pourquoi baptises‑tu les gens, si tu n’es ni le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', ni Élie, ni le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jean a répondu : Je baptise les gens avec de l’eau. Mais il y a quelqu’un parmi vous que vous ne connaissez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il est celui qui vient après moi. Je ne suis même pas assez bon pour ouvrir ses souliers. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Toutes ces choses se sont produites à un endroit à l’est du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jourdain
  - type: text
    text: '. C’était un village appelé '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Béthanie
  - type: text
    text: . Jean baptisait les gens là‑bas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le lendemain, Jean a vu Jésus. Il est allé auprès de lui. Jean a dit : Voici l’Agneau de Dieu, qui enlève le péché du monde. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Celui‑ci est l’homme dont je vous ai parlé : Il est celui qui vient après moi. Mais il est plus grand que moi. Il était déjà là avant ma naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Je ne le connaissais pas. Mais je devais montrer au peuple d’Israël qui il était. Voilà pourquoi je suis venu baptiser les gens avec de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jean leur a dit : J’ai vu l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu descendre du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Il est venu comme une colombe. Il est descendu sur Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je ne savais pas qui il était. Mais Dieu m’a envoyé baptiser les gens dans l’eau. Il m’a dit : Tu verras l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' descendre. Il descendra sur quelqu’un. C’est la personne qui va baptiser les gens avec le Saint‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Maintenant, j’ai vu cela. Donc, je peux vous dire que c’est lui le Fils de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les premiers '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jean et 2 de ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' étaient là le lendemain. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jean a vu Jésus. Il marchait devant eux. Jean a dit : Voici l’Agneau de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' ont entendu cela. Ils suivaient Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors Jésus s’est retourné. Il a vu qu’ils le suivaient. Il leur a demandé : Que voulez‑vous ? Ils ont dit : Rabbi, où restes‑tu ? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus leur a répondu : Venez et voyez. Donc, ils sont allés avec lui. Et ils ont vu l’endroit où il restait. Il était environ 10 heures du matin. Et ils sont restés avec lui ce jour‑là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'André était l’un des 2 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' qui avaient suivi Jésus. Ils ont entendu ce que Jean avait dit à propos de Jésus. André était le frère de Simon Pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'La première chose qu’André a faite, était de trouver son frère Simon. André a dit à Simon : Nous avons trouvé le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Puis il a conduit Simon à Jésus. Jésus a regardé Simon et il a dit : Tu es Simon, fils de Jean. Ton nom sera Céphas (Céphas=Pierre).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Le lendemain, Jésus a décidé d’aller en Galilée. Il a rencontré Philippe. Jésus a dit à Philippe : Suis‑moi. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Philippe est venu de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Bethsaïda
  - type: text
    text: '. C’était la ville d’André et Pierre aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Philippe a vu Nathanaël. Il a dit à Nathanaël : Nous avons trouvé l’homme sur qui Moïse avait écrit dans le livre des règles de Dieu. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' avaient aussi écrit sur lui. C’est Jésus, fils de Joseph, de Nazareth. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Nathanaël a dit : Je ne pensais pas que quelque chose de bon pourrait venir de Nazareth ! Philippe a répondu : Viens et vois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Jésus a vu Nathanaël qui venait vers lui. Jésus a dit : Voici un homme tout à fait honnête. Voilà ce qu’une personne d’Israël devrait vraiment être. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Nathanaël a demandé : Comment me connais‑tu ? Jésus a répondu : Je t’avais vu avant que Philippe te demande de venir. Je t’ai vu quand tu étais sous le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Nathanaël a dit : Maître, tu es le Fils de Dieu. Tu es le roi d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jésus lui a dit : Je t’ai dit que je t’avais vu sous le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: '. Et tu crois parce que je t’ai dit cela. Tu vas voir beaucoup plus de choses que cela. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Et Jésus lui a dit : Je te dis la vérité. Vous verrez le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' ouvert. Vous verrez les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
