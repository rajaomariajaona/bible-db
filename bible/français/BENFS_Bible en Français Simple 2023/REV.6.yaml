document_id: REV.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: L’Agneau ouvre les sceaux
  - type: text
    content: 'Alors j’ai regardé pendant que l’Agneau ouvrait l’un des 7 sceaux du livre. J’ai entendu l’un des 4 êtres dire : Viens ! Il parlait très fort avec une voix comme le '
  - type: text
    content: tonnerre
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ces croyants ont parlé fort à Dieu. Ils ont crié : '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu as tout le pouvoir. Tu es complètement bon. Tu fais toujours ce qui est bien. Quand décideras‑tu de juger les gens qui vivent sur la terre ? N’attends pas ! Tu dois punir rapidement les gens qui nous ont tués !'
  '11':
  - type: text
    content: Puis chaque croyant a reçu des vêtements blancs. Dieu leur a dit d’attendre encore un peu. Ils devaient attendre la mort d’autres croyants qui étaient encore sur la terre. Ils étaient aussi serviteurs de Dieu et frères. Il fallait que leur nombre soit d’abord complet. Les gens devaient donc les tuer aussi.
  '12':
  - type: text
    content: 'J’ai regardé à nouveau. J’ai vu l’Agneau ouvrir le sixième sceau. Ensuite, la terre a tremblé fortement et tout sur la terre a bougé. Le soleil est devenu noir comme un tissu noir épais. La lune entière est devenue rouge comme du sang. '
  '13':
  - type: text
    content: 'Les étoiles dans le '
  - type: text
    content: ciel
  - type: text
    content: ' sont tombées sur la terre. Elles sont tombées comme des fruits tombent d’un arbre quand un vent fort souffle. '
  '14':
  - type: text
    content: 'Le '
  - type: text
    content: ciel
  - type: text
    content: ' s’est divisé en 2 parties. Il s’est enroulé comme un morceau de papier. Toutes les montagnes et toutes les îles ont été déplacées de leurs endroits.'
  '15':
  - type: text
    content: 'Alors tous les gens sur la terre se sont cachés. Ils sont allés sur les montagnes et se sont cachés dans les '
  - type: text
    content: rochers
  - type: text
    content: ' et dans les trous des '
  - type: text
    content: rochers
  - type: text
    content: '. Tout le monde a essayé de se cacher, même les rois et grands chefs. Les chefs des soldats, les riches et d’autres personnes puissantes se sont tous cachés. Tous les gens se sont cachés, qu’ils soient esclaves ou hommes libres. '
  '16':
  - type: text
    content: 'Ils criaient aux montagnes et aux '
  - type: text
    content: rochers
  - type: text
    content: '  : Tombez sur nous et couvrez‑nous. Cachez‑nous, pour que celui qui est assis sur le trône ne puisse pas nous voir. Cachez‑nous aussi de l’Agneau qui est très en colère contre nous. '
  '17':
  - type: text
    content: Leur grand jour est venu. Ils vont nous punir, parce qu’ils sont tellement en colère. Personne ne pourra s’enfuir.
  '2':
  - type: text
    content: J’ai regardé et j’ai vu un cheval blanc. La personne qui montait à cheval tenait un arc. Quelqu’un lui a donné une couronne. Il avait combattu beaucoup de gens et il avait gagné. Maintenant, il est monté sur son cheval pour gagner contre beaucoup plus de gens.
  '3':
  - type: text
    content: 'L’Agneau a ouvert alors le second sceau. J’ai entendu un autre être vivant dire : Viens ! '
  '4':
  - type: text
    content: Puis un autre cheval est sorti. Ce cheval était rouge vif, comme le feu. La personne qui montait sur le cheval a reçu le pouvoir. Elle pouvait retirer la paix de la terre, afin que les gens s’entretuent. Quelqu’un lui a donné une grande épée.
  '5':
  - type: text
    content: 'Alors l’Agneau a ouvert le troisième sceau. J’ai entendu le troisième être vivant dire : Viens ! J’ai regardé et j’ai vu un cheval noir. La personne qui montait sur le cheval tenait quelque chose dans sa main. Cette personne l’a utilisé pour peser les choses. '
  '6':
  - type: text
    content: 'Alors j’ai entendu un bruit comme quelqu’un qui parlait parmi les 4 êtres. La voix disait : Un litre de blé vaut un jour de travail. Et 3 litres d’orge valent également un jour de travail. Mais ne détruisez pas l’huile d’olive et le vin.'
  '7':
  - type: text
    content: 'Alors l’Agneau a ouvert le quatrième sceau. J’ai entendu le dernier être dire : Viens ! '
  '8':
  - type: text
    content: 'J’ai regardé et j’ai vu un cheval gris. Le nom de la personne qui montait sur le cheval était Mort. Le lieu des morts, appelé '
  - type: text
    content: Hadès
  - type: text
    content: ', le suivait près de lui. Ils ont reçu le pouvoir de tuer des gens dans un quart de la terre. Ils pouvaient tuer des gens de différentes manières. Ils pouvaient les tuer dans des guerres. Ils pouvaient faire mourir des gens faute de nourriture. Ils pouvaient rendre les gens très malades et les faire mourir. Ils pouvaient également provoquer des animaux sauvages pour tuer des gens.'
  '9':
  - type: text
    content: 'L’Agneau a ouvert le cinquième sceau. J’ai vu un autel où les gens donnaient des offrandes à Dieu. J’ai vu les '
  - type: text
    content: esprits
  - type: text
    content: ' de certains membres du peuple de Dieu sous l’autel. Ces gens étaient morts parce qu’ils avaient cru au message de Dieu. Ils avaient continué à dire le vrai message de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: '. C’est pourquoi les gens les avaient tués. '
