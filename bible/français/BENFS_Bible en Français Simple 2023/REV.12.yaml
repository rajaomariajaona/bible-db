document_id: REV.12
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 12
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La femme et le grand serpent rouge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Une chose très surprenante est apparue dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. J’ai vu une femme qui portait le soleil comme des vêtements. La lune était sous ses pieds. Une couronne de 12 étoiles était sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle allait bientôt avoir un bébé. Elle a crié parce que la douleur lui faisait très mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis une autre chose surprenante est apparue dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. C’était un très gros dragon rouge. Il avait 7 têtes et 10 cornes. Il y avait une couronne sur chaque tête. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sa queue a frappé un tiers des étoiles dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et il les a jetées sur la terre. Puis le dragon se tenait devant la femme qui allait bientôt accoucher du bébé. Il attendait là pour manger son enfant dès sa naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La femme a donné naissance à un fils. C’était un homme qui dirigera tous les pays du monde avec un bâton de fer et avec une grande puissance. Puis quelqu’un a rapidement emmené son enfant. Il est monté vers Dieu et vers son trône. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La femme s’est enfuie dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: . Dieu avait préparé un endroit spécial pour la garder en sécurité pendant 1 260 jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis une guerre a commencé dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Michel et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' se sont battus contre le dragon. Le dragon et son armée d’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' les ont combattus aussi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais le dragon et son armée n’étaient pas assez forts pour gagner. Ils ont perdu leur place au paradis. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Michel et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' ont jeté le grand dragon du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Ce dragon s’appelle vraiment le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' ou Satan. C’est le serpent qui est là depuis longtemps. Il raconte toujours des mensonges pour que le monde entier croie aux mauvaises choses. Ils l’ont jeté ainsi que tous ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' sur la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors j’ai entendu une voix forte dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' qui disait :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, Dieu a sauvé son peuple de la puissance de Satan !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu a montré sa grande puissance en tant que roi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Messie
  - type: text
    text: ' spécial a montré sa puissance.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Satan a dit de mauvaises choses contre notre peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jour et nuit, il a continué à dire de mauvaises choses contre les croyants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais maintenant, ils l’ont jeté du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais nos frères et sœurs se sont battus contre lui et ils ont gagné.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils ont fait confiance en l’Agneau qui est mort en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont continué à dire que le message de Dieu est vraiment vrai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils étaient prêts à mourir en tant que serviteurs de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Soyez donc heureux, vous tous qui vivez au ciel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la terre et la mer auront de grands problèmes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' est descendu vers vous maintenant.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est très en colère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sait qu’il n’a que peu de temps pour faire du mal aux gens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le dragon a vu qu’ils l’ont jeté à terre. Il a donc couru vers la femme qui avait donné naissance au petit garçon. Il voulait lui faire du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais la femme a reçu 2 ailes, comme les ailes d’un très grand aigle. Ensuite, elle a volé vers l’endroit dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: ' que Dieu avait préparé pour elle. À cet endroit, Dieu la protégera du gros serpent. Dieu prendra soin d’elle là‑bas pendant un temps, des temps et la moitié d’un temps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le dragon a versé alors beaucoup d’eau de sa bouche comme un fleuve. Il voulait que le fleuve d’eau emporte la femme. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais un grand trou s’est ouvert dans le sol. Puis le fleuve qui coulait de la bouche du dragon est descendu dans le trou. Cela a aidé la femme à se libérer. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En conséquence, le dragon était très en colère contre la femme. Alors il est donc parti pour mener une guerre contre ses autres descendants. Ce sont les gens qui obéissent aux règles de Dieu. Ils continuent de faire confiance à Jésus et de dire son message.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Après cela, le dragon se tenait au bord de la mer.
