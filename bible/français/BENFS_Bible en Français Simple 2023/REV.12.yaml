document_id: REV.12,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 12
  - type: heading
    content: La femme et le grand serpent rouge
  - type: text
    content: 'Une chose très surprenante est apparue dans le '
  - type: text
    content: ciel
  - type: text
    content: '. J’ai vu une femme qui portait le soleil comme des vêtements. La lune était sous ses pieds. Une couronne de 12 étoiles était sur sa tête. '
  '10':
  - type: text
    content: 'Alors j’ai entendu une voix forte dans le '
  - type: text
    content: ciel
  - type: text
    content: ' qui disait :'
  - type: text
    content: Maintenant, Dieu a sauvé son peuple de la puissance de Satan !
  - type: text
    content: Dieu a montré sa grande puissance en tant que roi.
  - type: text
    content: 'Son '
  - type: text
    content: Messie
  - type: text
    content: ' spécial a montré sa puissance.'
  - type: text
    content: Satan a dit de mauvaises choses contre notre peuple.
  - type: text
    content: Jour et nuit, il a continué à dire de mauvaises choses contre les croyants.
  - type: text
    content: 'Mais maintenant, ils l’ont jeté du '
  - type: text
    content: ciel
  - type: text
    content: .
  '11':
  - type: text
    content: Mais nos frères et sœurs se sont battus contre lui et ils ont gagné.
  - type: text
    content: 'Ils ont fait confiance en l’Agneau qui est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: .
  - type: text
    content: Ils ont continué à dire que le message de Dieu est vraiment vrai.
  - type: text
    content: Ils étaient prêts à mourir en tant que serviteurs de Dieu.
  '12':
  - type: text
    content: Soyez donc heureux, vous tous qui vivez au ciel !
  - type: text
    content: Mais la terre et la mer auront de grands problèmes.
  - type: text
    content: 'Le '
  - type: text
    content: diable
  - type: text
    content: ' est descendu vers vous maintenant.'
  - type: text
    content: Il est très en colère.
  - type: text
    content: Il sait qu’il n’a que peu de temps pour faire du mal aux gens.
  '13':
  - type: text
    content: 'Le dragon a vu qu’ils l’ont jeté à terre. Il a donc couru vers la femme qui avait donné naissance au petit garçon. Il voulait lui faire du mal. '
  '14':
  - type: text
    content: 'Mais la femme a reçu 2 ailes, comme les ailes d’un très grand aigle. Ensuite, elle a volé vers l’endroit dans le '
  - type: text
    content: désert
  - type: text
    content: ' que Dieu avait préparé pour elle. À cet endroit, Dieu la protégera du gros serpent. Dieu prendra soin d’elle là‑bas pendant un temps, des temps et la moitié d’un temps.'
  '15':
  - type: text
    content: 'Le dragon a versé alors beaucoup d’eau de sa bouche comme un fleuve. Il voulait que le fleuve d’eau emporte la femme. '
  '16':
  - type: text
    content: 'Mais un grand trou s’est ouvert dans le sol. Puis le fleuve qui coulait de la bouche du dragon est descendu dans le trou. Cela a aidé la femme à se libérer. '
  '17':
  - type: text
    content: En conséquence, le dragon était très en colère contre la femme. Alors il est donc parti pour mener une guerre contre ses autres descendants. Ce sont les gens qui obéissent aux règles de Dieu. Ils continuent de faire confiance à Jésus et de dire son message.
  '18':
  - type: text
    content: Après cela, le dragon se tenait au bord de la mer.
  '2':
  - type: text
    content: Elle allait bientôt avoir un bébé. Elle a crié parce que la douleur lui faisait très mal.
  '3':
  - type: text
    content: 'Puis une autre chose surprenante est apparue dans le '
  - type: text
    content: ciel
  - type: text
    content: '. C’était un très gros dragon rouge. Il avait 7 têtes et 10 cornes. Il y avait une couronne sur chaque tête. '
  '4':
  - type: text
    content: 'Sa queue a frappé un tiers des étoiles dans le '
  - type: text
    content: ciel
  - type: text
    content: ' et il les a jetées sur la terre. Puis le dragon se tenait devant la femme qui allait bientôt accoucher du bébé. Il attendait là pour manger son enfant dès sa naissance. '
  '5':
  - type: text
    content: 'La femme a donné naissance à un fils. C’était un homme qui dirigera tous les pays du monde avec un bâton de fer et avec une grande puissance. Puis quelqu’un a rapidement emmené son enfant. Il est monté vers Dieu et vers son trône. '
  '6':
  - type: text
    content: 'La femme s’est enfuie dans le '
  - type: text
    content: désert
  - type: text
    content: . Dieu avait préparé un endroit spécial pour la garder en sécurité pendant 1 260 jours.
  '7':
  - type: text
    content: 'Puis une guerre a commencé dans le '
  - type: text
    content: ciel
  - type: text
    content: '. Michel et ses '
  - type: text
    content: anges
  - type: text
    content: ' se sont battus contre le dragon. Le dragon et son armée d’'
  - type: text
    content: anges
  - type: text
    content: ' les ont combattus aussi.'
  '8':
  - type: text
    content: 'Mais le dragon et son armée n’étaient pas assez forts pour gagner. Ils ont perdu leur place au paradis. '
  '9':
  - type: text
    content: 'Michel et ses '
  - type: text
    content: anges
  - type: text
    content: ' ont jeté le grand dragon du '
  - type: text
    content: ciel
  - type: text
    content: '. Ce dragon s’appelle vraiment le '
  - type: text
    content: diable
  - type: text
    content: ' ou Satan. C’est le serpent qui est là depuis longtemps. Il raconte toujours des mensonges pour que le monde entier croie aux mauvaises choses. Ils l’ont jeté ainsi que tous ses '
  - type: text
    content: anges
  - type: text
    content: ' sur la terre.'
