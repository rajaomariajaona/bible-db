document_id: ROM.7,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 7
  - type: heading
    content: Le pouvoir de la loi
  - type: text
    content: 'Mes amis chrétiens, vous connaissez les lois. Vous savez que nous devons obéir à cela. Les lois ont pouvoir sur quelqu’un de son vivant. '
  '10':
  - type: text
    content: 'Ainsi, je suis mort. Dieu a donné cette règle aux gens, afin qu’ils puissent vivre d’une bonne façon. Mais, cette règle m’a apporté la mort. '
  '11':
  - type: text
    content: 'Cette loi a donné au péché une occasion de me tromper. Donc, je suis mort à cause de cette loi. '
  '12':
  - type: text
    content: Ainsi donc, nous comprenons que la loi de Dieu elle‑même est complètement bonne. Dieu a donné toutes ces règles et elles sont bonnes et justes.
  '13':
  - type: text
    content: 'Ainsi, quelqu’un pourrait dire : Cela signifie que quelque chose de bien vous a apporté la mort. Non ! La loi de Dieu n’a pas fait cela ! C’est le péché qui m’a apporté la mort. Le péché a utilisé la bonne loi de Dieu pour montrer que j’étais fautif. Pour cette raison, nous pouvons voir que le péché est vraiment très mauvais. Les commandements dans la loi de Dieu montrent que le péché devient encore pire.'
  - type: heading
    content: Le pouvoir du péché dans nos vies
  '14':
  - type: text
    content: 'Nous comprenons que la loi que Dieu avait donnée à Moïse était spirituelle. Mais je suis faible et humain. Je suis comme un esclave qui a le péché comme maître. '
  '15':
  - type: text
    content: 'Je ne comprends pas les choses que je fais. Je ne fais pas les bonnes choses que je veux faire. Mais, je fais les choses que je déteste. '
  '16':
  - type: text
    content: 'Mais je ne veux pas faire ces mauvaises choses. Alors je suis d’accord pour dire que la loi de Dieu est bonne. '
  '17':
  - type: text
    content: Donc, ce n’est pas vraiment moi‑même qui fais ces mauvaises choses. Au lieu de cela, le péché a le pouvoir dans ma vie. C’est le péché qui me fait faire de mauvaises choses.
  '18':
  - type: text
    content: 'Je sais qu’il n’y a rien de bon en moi. Je suis faible et humain. Je veux faire ce qui est bien. Mais je suis incapable de le faire. '
  '19':
  - type: text
    content: 'Je ne fais pas les bonnes choses que je veux faire. Au lieu de cela, je continue de faire de mauvaises choses que je ne veux pas faire. '
  '2':
  - type: text
    content: 'Alors, pensez à ce sujet. Une femme qui a un mari doit rester avec lui aussi longtemps qu’il vit. C’est ce que la loi dit. Mais si son mari décède, elle est libérée de cette loi concernant son mari. '
  '20':
  - type: text
    content: Alors, quand je fais de mauvaises choses que je ne veux pas faire, qu’est‑ce que cela montre ? Cela montre que ce n’est pas vraiment moi qui fais ces mauvaises choses. C’est le péché qui me fait faire de mauvaises choses parce qu’il a le pouvoir dans ma vie.
  '21':
  - type: text
    content: Je comprends donc ce qui se passe en moi. Chaque fois que je veux faire quelque chose de bien, je ne peux que choisir quelque chose de mauvais.
  '22':
  - type: text
    content: 'J’aime vraiment la loi de Dieu dans mon cœur et je veux obéir à ses règles. '
  '23':
  - type: text
    content: 'Ainsi, mon '
  - type: text
    content: esprit
  - type: text
    content: ' me dit d’obéir aux règles de Dieu. Mais mon corps veut me faire faire autre chose. Chaque partie de moi se bat contre ce que mon '
  - type: text
    content: esprit
  - type: text
    content: ' me dit de faire. Le péché a le pouvoir sur mon corps, donc je suis comme un prisonnier. '
  '24':
  - type: text
    content: 'Cela me rend très triste ! Mon corps me mène à la mort. J’ai besoin de quelqu’un pour me libérer du pouvoir du péché sur mon corps. '
  '25':
  - type: text
    content: Je remercie Dieu ! Il m’a rendu libre, à cause de ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a fait.'
  - type: text
    content: 'Alors, avec mon '
  - type: text
    content: esprit
  - type: text
    content: ', je veux obéir à la loi de Dieu. Mais, en même temps, je sers le péché comme mon maître, parce que je suis faible et humain.'
  '3':
  - type: text
    content: Tant que son mari est vivant, la loi a le pouvoir sur elle. Si elle part vivre avec un autre homme, la loi dit qu’elle a fait quelque chose de mal. Mais si son mari décède, elle devient libérée de cette loi. Si elle épouse ensuite un autre homme, elle ne fera rien de mal.
  '4':
  - type: text
    content: Mes amis, c’est comme cela pour vous aussi. Lorsque le corps de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort sur la croix, vous avez été réunis avec lui. C’est comme si vous étiez morts. Ainsi vous n’êtes plus sous le pouvoir de la loi de Moïse. Maintenant, vous êtes libres d’appartenir à quelqu’un d’autre. Vous appartenez à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', que Dieu a ressuscité après sa mort. En conséquence, nous pouvons vivre d’une bonne manière qui rendra Dieu heureux. '
  '5':
  - type: text
    content: 'Dans nos anciennes vies, nous faisions de mauvaises choses que nous voulions faire. Les lois de Dieu nous ont amenés à penser beaucoup plus au péché. En conséquence, nos corps ont fait beaucoup de mauvaises choses. Enfin, ces mauvaises choses entraînent la mort. '
  '6':
  - type: text
    content: Mais maintenant, nous sommes devenus libres de la loi que Dieu a donnée à Moïse. Cette loi n’a plus de pouvoir sur nous, parce que nous sommes morts. Nous n’essayons toujours pas d’obéir aux règles que quelqu’un a écrites. Ce n’est pas ainsi que nous servons Dieu. Au lieu de cela, nous servons Dieu d’une nouvelle manière. L’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu nous aide à lui plaire.'
  - type: heading
    content: La loi de Dieu nous enseigne sur le péché
  '7':
  - type: text
    content: 'Alors, quelqu’un pourrait dire : La loi que Dieu a donnée à Moïse doit être mauvaise. Non ! Vraiment, la loi n’est pas mauvaise ! Sans cette loi, je n’aurais pas su ce qu’est vraiment le péché. Une règle dit : N’enviez pas de choses qui appartiennent à d’autres personnes.'
  - type: text
    content: 'Sans cette loi, je n’aurais pas su qu’il était mauvais de vouloir les choses des autres. '
  '8':
  - type: text
    content: Mais cette règle a donné au péché une occasion d’entrer dans mes pensées. En conséquence, j’ai commencé à vouloir toutes sortes de mauvaises choses. S’il n’y a pas de loi pour nous dire ce qui ne va pas, alors le péché n’a aucun pouvoir.
  '9':
  - type: text
    content: 'Quant à moi, il y avait un temps où je ne connaissais pas les lois de Moïse. Je vivais sans aucune loi à obéir. Mais plus tard, j’ai appris ce que cette règle enseignait. Le péché avait maintenant la puissance dans ma vie. '
