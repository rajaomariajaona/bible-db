document_id: ROM.7
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 7
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pouvoir de la loi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes amis chrétiens, vous connaissez les lois. Vous savez que nous devons obéir à cela. Les lois ont pouvoir sur quelqu’un de son vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors, pensez à ce sujet. Une femme qui a un mari doit rester avec lui aussi longtemps qu’il vit. C’est ce que la loi dit. Mais si son mari décède, elle est libérée de cette loi concernant son mari. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tant que son mari est vivant, la loi a le pouvoir sur elle. Si elle part vivre avec un autre homme, la loi dit qu’elle a fait quelque chose de mal. Mais si son mari décède, elle devient libérée de cette loi. Si elle épouse ensuite un autre homme, elle ne fera rien de mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mes amis, c’est comme cela pour vous aussi. Lorsque le corps de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est mort sur la croix, vous avez été réunis avec lui. C’est comme si vous étiez morts. Ainsi vous n’êtes plus sous le pouvoir de la loi de Moïse. Maintenant, vous êtes libres d’appartenir à quelqu’un d’autre. Vous appartenez à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', que Dieu a ressuscité après sa mort. En conséquence, nous pouvons vivre d’une bonne manière qui rendra Dieu heureux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dans nos anciennes vies, nous faisions de mauvaises choses que nous voulions faire. Les lois de Dieu nous ont amenés à penser beaucoup plus au péché. En conséquence, nos corps ont fait beaucoup de mauvaises choses. Enfin, ces mauvaises choses entraînent la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais maintenant, nous sommes devenus libres de la loi que Dieu a donnée à Moïse. Cette loi n’a plus de pouvoir sur nous, parce que nous sommes morts. Nous n’essayons toujours pas d’obéir aux règles que quelqu’un a écrites. Ce n’est pas ainsi que nous servons Dieu. Au lieu de cela, nous servons Dieu d’une nouvelle manière. L’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu nous aide à lui plaire.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi de Dieu nous enseigne sur le péché
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors, quelqu’un pourrait dire : La loi que Dieu a donnée à Moïse doit être mauvaise. Non ! Vraiment, la loi n’est pas mauvaise ! Sans cette loi, je n’aurais pas su ce qu’est vraiment le péché. Une règle dit : N’enviez pas de choses qui appartiennent à d’autres personnes.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Sans cette loi, je n’aurais pas su qu’il était mauvais de vouloir les choses des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais cette règle a donné au péché une occasion d’entrer dans mes pensées. En conséquence, j’ai commencé à vouloir toutes sortes de mauvaises choses. S’il n’y a pas de loi pour nous dire ce qui ne va pas, alors le péché n’a aucun pouvoir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quant à moi, il y avait un temps où je ne connaissais pas les lois de Moïse. Je vivais sans aucune loi à obéir. Mais plus tard, j’ai appris ce que cette règle enseignait. Le péché avait maintenant la puissance dans ma vie. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ainsi, je suis mort. Dieu a donné cette règle aux gens, afin qu’ils puissent vivre d’une bonne façon. Mais, cette règle m’a apporté la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cette loi a donné au péché une occasion de me tromper. Donc, je suis mort à cause de cette loi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi donc, nous comprenons que la loi de Dieu elle‑même est complètement bonne. Dieu a donné toutes ces règles et elles sont bonnes et justes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ainsi, quelqu’un pourrait dire : Cela signifie que quelque chose de bien vous a apporté la mort. Non ! La loi de Dieu n’a pas fait cela ! C’est le péché qui m’a apporté la mort. Le péché a utilisé la bonne loi de Dieu pour montrer que j’étais fautif. Pour cette raison, nous pouvons voir que le péché est vraiment très mauvais. Les commandements dans la loi de Dieu montrent que le péché devient encore pire.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pouvoir du péché dans nos vies
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous comprenons que la loi que Dieu avait donnée à Moïse était spirituelle. Mais je suis faible et humain. Je suis comme un esclave qui a le péché comme maître. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je ne comprends pas les choses que je fais. Je ne fais pas les bonnes choses que je veux faire. Mais, je fais les choses que je déteste. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais je ne veux pas faire ces mauvaises choses. Alors je suis d’accord pour dire que la loi de Dieu est bonne. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Donc, ce n’est pas vraiment moi‑même qui fais ces mauvaises choses. Au lieu de cela, le péché a le pouvoir dans ma vie. C’est le péché qui me fait faire de mauvaises choses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je sais qu’il n’y a rien de bon en moi. Je suis faible et humain. Je veux faire ce qui est bien. Mais je suis incapable de le faire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je ne fais pas les bonnes choses que je veux faire. Au lieu de cela, je continue de faire de mauvaises choses que je ne veux pas faire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Alors, quand je fais de mauvaises choses que je ne veux pas faire, qu’est‑ce que cela montre ? Cela montre que ce n’est pas vraiment moi qui fais ces mauvaises choses. C’est le péché qui me fait faire de mauvaises choses parce qu’il a le pouvoir dans ma vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je comprends donc ce qui se passe en moi. Chaque fois que je veux faire quelque chose de bien, je ne peux que choisir quelque chose de mauvais.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'J’aime vraiment la loi de Dieu dans mon cœur et je veux obéir à ses règles. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi, mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' me dit d’obéir aux règles de Dieu. Mais mon corps veut me faire faire autre chose. Chaque partie de moi se bat contre ce que mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ' me dit de faire. Le péché a le pouvoir sur mon corps, donc je suis comme un prisonnier. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Cela me rend très triste ! Mon corps me mène à la mort. J’ai besoin de quelqu’un pour me libérer du pouvoir du péché sur mon corps. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je remercie Dieu ! Il m’a rendu libre, à cause de ce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a fait.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors, avec mon '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ', je veux obéir à la loi de Dieu. Mais, en même temps, je sers le péché comme mon maître, parce que je suis faible et humain.'
