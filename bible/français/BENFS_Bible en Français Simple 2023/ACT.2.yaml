document_id: ACT.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Saint‑Esprit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Puis le jour de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentecôte
    - type: text
      text: ' est arrivé. Tous les croyants étaient rassemblés dans une maison à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Certains d’entre nous sont de Phrygie et de Pamphylie. Certains d’entre nous sont d’Égypte. Certains d’entre nous sont de la Libye. Cyrène est près de la Libye. Certains d’entre nous sont de Rome. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Certains d’entre nous sont des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Certains d’entre nous n’ont pas de parents '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ', mais maintenant ils croient au Dieu des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Certains d’entre nous sont de Crète et certains d’entre nous sont de l’Arabie. Mais nous les entendons tous parler dans nos propres langues. Ils parlent de toutes les grandes choses que Dieu a faites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tous les gens étaient très étonnés. Ils ne comprenaient pas ce qui se passait. Ils se demandaient : Comment pouvons‑nous expliquer tout ceci ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'D’autres gens se moquaient des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Ils disaient entre eux : Ces personnes sont ivres !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre parle à la foule
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Pierre était avec les 11 autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Il s’est levé. Il a commencé à parler à la foule par une voix forte. Il leur expliquait ce qui se passait : Vous peuples qui êtes également des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' comme nous, écoutez‐moi. Et tous les gens qui vivent ici à Jérusalem, écoutez‐moi. Je vais vous expliquer tout ce qui se passe. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Certains d’entre vous pensent que ces gens sont ivres. Mais ils ne sont pas ivres, parce qu’il est seulement 9 heures du matin. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Quelque chose de différent s’est produit ici. Joël était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' et il a dit les paroles de Dieu à ce sujet, il y a longtemps.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dieu a dit : Je ferai ceci dans les derniers jours :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je donnerai mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' à toutes les personnes.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos fils et filles diront mon message aux gens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vos jeunes hommes verront des images de moi dans leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos vieux hommes verront des choses dans leurs rêves.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'A ce moment‑là, je donnerai mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, je donnerai mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' même aux hommes et aux femmes qui sont mes serviteurs.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors ils diront mon message aux gens.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je ferai apparaître des choses spéciales dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai également apparaître des choses spéciales sur la terre. Elles seront des choses puissantes que je peux, moi seul faire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura du sang, du feu et de la fumée foncée épaisse.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Brusquement, ils ont entendu un bruit. Ce bruit venait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. C’était comme le bruit d’un vent fort. Ils entendaient ce bruit partout dans la maison. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Et le soleil sera sombre, et il ne brillera plus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La lune deviendra rouge foncée comme la couleur du sang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ces choses se produiront avant que le jour très important du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' arrive. Ce jour, ma lumière brillera partout.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dieu a dit : Il y aura des gens qui me demanderont de les sauver et je leur donnerai une nouvelle vie.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Maintenant, peuple d’Israël, écoutez ce que je dis ! Pierre a dit : Dieu a envoyé Jésus de Nazareth sur la terre pour travailler pour lui. Dieu travaillait avec Jésus. Il faisait beaucoup de choses puissantes et spéciales. Pour cette raison, les gens ont su que Dieu avait envoyé Jésus. Vous savez ceci. Ces choses se sont produites ici, et vous les avez vues.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dieu savait que quelqu’un livrera Jésus. Dieu avait décidé que ceci devra arriver. Ainsi vous avez tué Jésus. Vous avez laissé de mauvais hommes le mettre à la croix.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Et ainsi Jésus est mort. Mais Dieu l’a fait devenir vivant encore. Dieu a sauvé Jésus de la puissance de la mort. Il était impossible que Jésus reste mort. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il y a longtemps, le roi David a parlé de Jésus. Il disait :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je voyais le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' devant moi tout le temps, parce qu’il est à ma droite, afin que je ne sois pas inquiet.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je suis heureux pour cette raison. Ainsi je dois parler de lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais que je suis un homme.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je sais que tu m’as promis ces choses. Ainsi elles se réaliseront certainement.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ainsi tu ne laisseras pas mon âme avec toutes les personnes mortes. Ton serviteur t’aime. Et ainsi tu ne laisseras rien détruire son corps quand il mourra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tu m’as montré les bons chemins qui mènent à la vraie vie. Tu es à côté de moi, ainsi je suis complètement heureux.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Pierre a alors dit : Peuples d’Israël. Je dois vous parler clairement du roi David. Il y a bien longtemps, il était notre ancêtre et roi. David est mort et les gens ont enterré son corps dans la terre. L’endroit où les gens l’ont enterré est toujours ici aujourd’hui. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors ils ont vu quelque chose se déplacer. C’était comme beaucoup de petits feux séparés. Les petits feux se déplaçaient dans la chambre et ils se mettaient sur chaque personne. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'David a dit les paroles de Dieu. Il a su ce que Dieu lui avait promis. Dieu a promis à David qu’un homme spécial de sa famille sera un roi. Cet homme sera un roi comme David. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Et David a compris ce que Dieu fera dans les jours à venir. Alors il a parlé de la résurrection de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . David a dit que Dieu ne laissera pas Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' parmi les morts. Il a dit que rien ne détruira son corps. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Cet homme dont David parlait, était Jésus. Jésus est mort. Mais Dieu l’a ressuscité. Nous avons vu nous‑mêmes ceci.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dieu a pris Jésus au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il l’a placé à son côté droit. Jésus a reçu de son père Dieu le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: '. Il a alors pu nous le donner aussi. Dieu avait promis de faire cela. Dieu a déversé son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' sur nous. Maintenant, vous voyez et vous entendez le résultat du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: .
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'David n’est pas allé au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ' comme Jésus. Mais David a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu a dit à mon '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Assieds‑toi ici près de moi à mon côté droit. '
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Pendant que tu t’assieds ici, je battrai tes ennemis. Ils seront sous toi, comme un endroit pour mettre tes pieds.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Tout le peuple d’Israël doit être sûr de savoir ceci. Vous avez tué Jésus sur une croix. Mais c’est ce même Jésus que Dieu a choisi comme une personne spéciale. Dieu a fait de lui '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premières personnes à croire en Jésus
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Les gens ont entendu ce que Pierre leur disait. Alors Ils étaient très inquiets. Ainsi ils ont demandé de l’aide à Pierre et aux autres '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Ils ont dit : Frères, que devons‑nous faire ?'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Pierre leur a dit : Chacun de vous a fait de mauvaises choses. Vous devez dire à Dieu que vous êtes tristes à ce sujet. Alors vous devez laisser de faire ces mauvaises choses. Vous devez obéir à Dieu et vous devez faire de bonnes choses.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis quelqu’un qui a le pouvoir de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' vous baptisera. Et Dieu vous pardonnera toutes les mauvaises choses que vous avez faites. Alors Dieu vous offrira le don du Saint‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Dieu a promis de vous pardonner, vous et vos enfants. Il a également promis de vous donner le Saint‑Esprit et à vos enfants. Il a également promis de le donner aux peuples qui habitent dans d’autres pays. Dieu a choisi beaucoup de gens pour croire en lui. Il les a tous inclus dans sa promesse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dieu a rempli chaque personne du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: . Alors les croyants ont commencé à parler dans des langues étrangères. Ils ne les avaient jamais apprises. Ils parlaient comme le Saint‑Esprit les aidait.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ainsi Pierre a dit aux gens ce qu’ils devraient faire. Il leur disait aussi beaucoup d’autres choses. Il a continué à leur parler avec des paroles sérieuses. Il disait : Évitez la punition que Dieu enverra. Dieu l’enverra aux mauvaises personnes qui sont vivantes maintenant. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Plusieurs personnes écoutaient Pierre. Elles croyaient en ses paroles. Ainsi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' les baptisaient. Environ 3 000 personnes se sont ajoutées au groupe ce même jour. Elles ont toutes cru en Jésus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voici comment les croyants vivaient
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ces nouveaux croyants restaient avec les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. C’était pour apprendre plus au sujet de Jésus. Et ils sont tous devenus de bons amis avec d’autres dans le groupe. Ils priaient ensemble et ils mangeaient des repas ensemble. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Le Saint‑Esprit travaillait avec les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Il les rendait puissants. Ainsi ils pouvaient guérir les malades. Et ils faisaient beaucoup d’autres choses spéciales. Tous les gens étaient très étonnés. Ils avaient aussi peur de voir ces choses spéciales. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Tous les croyants continuaient d’être de bons amis, les uns les autres. Ils mangeaient des repas ensemble, et ils apprenaient plus au sujet de Jésus. Ils continuaient de prier ensemble. Ils se donnaient certaines des choses qu’ils avaient. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ils vendaient certaines de leurs propres choses. Alors ils donnaient cet argent à d’autres croyants selon leurs besoins. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Le groupe entier des croyants se rencontrait ensemble chaque jour dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: '. Ils mangeaient leurs repas ensemble dans la maison de chacun. Ils étaient tous très heureux ensemble. Ils remerciaient Dieu de tout. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Les croyants montraient souvent aux autres à quel point Dieu est grand et important. Toutes les autres personnes aimaient les croyants. Et elles pensaient que les croyants étaient les gens très bons. Chaque jour, plusieurs personnes demandaient au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' de les sauver. Ainsi le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' augmentait beaucoup plus le groupe de ceux qui croyaient en lui.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'A ce moment, certains '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' étaient là. Ils priaient Dieu chaque jour. Ils habitaient à Jérusalem. Ils sont venus de beaucoup de différents pays dans le monde. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils ont entendu ce bruit fort. Ils sont venus ensemble dans une grande foule.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque personne entendait les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' parler dans sa propre langue. Ils étaient dans la confusion. Ils ne comprenaient pas ce qui est arrivé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils étaient très étonnés. Ils disaient : Ces hommes qui parlent comme ceci, sont de la Galilée. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nous ne savons pas ce qui se produit. Chacun de nous les entend parler dans sa langue d’origine. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Certains d’entre nous sont des peuples Parthes, Mèdes et Élamites. Certains d’entre nous sont de Mésopotamie, de Judée et de Cappadoce. Certains d’entre nous sont du Pont et d’Asie. '
