document_id: ACT.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Le Saint‑Esprit
  - type: text
    content: 'Puis le jour de la '
  - type: text
    content: Pentecôte
  - type: text
    content: ' est arrivé. Tous les croyants étaient rassemblés dans une maison à Jérusalem. '
  '10':
  - type: text
    content: 'Certains d’entre nous sont de Phrygie et de Pamphylie. Certains d’entre nous sont d’Égypte. Certains d’entre nous sont de la Libye. Cyrène est près de la Libye. Certains d’entre nous sont de Rome. '
  '11':
  - type: text
    content: 'Certains d’entre nous sont des '
  - type: text
    content: Juifs
  - type: text
    content: '. Certains d’entre nous n’ont pas de parents '
  - type: text
    content: juifs
  - type: text
    content: ', mais maintenant ils croient au Dieu des '
  - type: text
    content: Juifs
  - type: text
    content: '. Certains d’entre nous sont de Crète et certains d’entre nous sont de l’Arabie. Mais nous les entendons tous parler dans nos propres langues. Ils parlent de toutes les grandes choses que Dieu a faites. '
  '12':
  - type: text
    content: 'Tous les gens étaient très étonnés. Ils ne comprenaient pas ce qui se passait. Ils se demandaient : Comment pouvons‑nous expliquer tout ceci ? '
  '13':
  - type: text
    content: 'D’autres gens se moquaient des '
  - type: text
    content: disciples
  - type: text
    content: '. Ils disaient entre eux : Ces personnes sont ivres !'
  - type: heading
    content: Pierre parle à la foule
  '14':
  - type: text
    content: 'Pierre était avec les 11 autres '
  - type: text
    content: apôtres
  - type: text
    content: '. Il s’est levé. Il a commencé à parler à la foule par une voix forte. Il leur expliquait ce qui se passait : Vous peuples qui êtes également des '
  - type: text
    content: Juifs
  - type: text
    content: ' comme nous, écoutez‐moi. Et tous les gens qui vivent ici à Jérusalem, écoutez‐moi. Je vais vous expliquer tout ce qui se passe. '
  '15':
  - type: text
    content: 'Certains d’entre vous pensent que ces gens sont ivres. Mais ils ne sont pas ivres, parce qu’il est seulement 9 heures du matin. '
  '16':
  - type: text
    content: 'Quelque chose de différent s’est produit ici. Joël était un '
  - type: text
    content: prophète
  - type: text
    content: ' et il a dit les paroles de Dieu à ce sujet, il y a longtemps.'
  '17':
  - type: text
    content: 'Dieu a dit : Je ferai ceci dans les derniers jours :'
  - type: text
    content: 'Je donnerai mon '
  - type: text
    content: Esprit
  - type: text
    content: ' à toutes les personnes.'
  - type: text
    content: Vos fils et filles diront mon message aux gens.
  - type: text
    content: 'Vos jeunes hommes verront des images de moi dans leurs '
  - type: text
    content: esprits
  - type: text
    content: .
  - type: text
    content: Et vos vieux hommes verront des choses dans leurs rêves.
  '18':
  - type: text
    content: 'A ce moment‑là, je donnerai mon '
  - type: text
    content: Esprit
  - type: text
    content: .
  - type: text
    content: 'Oui, je donnerai mon '
  - type: text
    content: Esprit
  - type: text
    content: ' même aux hommes et aux femmes qui sont mes serviteurs.'
  - type: text
    content: Alors ils diront mon message aux gens.
  '19':
  - type: text
    content: 'Je ferai apparaître des choses spéciales dans le '
  - type: text
    content: ciel
  - type: text
    content: .
  - type: text
    content: Je ferai également apparaître des choses spéciales sur la terre. Elles seront des choses puissantes que je peux, moi seul faire.
  - type: text
    content: Il y aura du sang, du feu et de la fumée foncée épaisse.
  '2':
  - type: text
    content: 'Brusquement, ils ont entendu un bruit. Ce bruit venait du '
  - type: text
    content: ciel
  - type: text
    content: '. C’était comme le bruit d’un vent fort. Ils entendaient ce bruit partout dans la maison. '
  '20':
  - type: text
    content: Et le soleil sera sombre, et il ne brillera plus.
  - type: text
    content: La lune deviendra rouge foncée comme la couleur du sang.
  - type: text
    content: 'Ces choses se produiront avant que le jour très important du '
  - type: text
    content: Seigneur
  - type: text
    content: ' arrive. Ce jour, ma lumière brillera partout.'
  '21':
  - type: text
    content: 'Dieu a dit : Il y aura des gens qui me demanderont de les sauver et je leur donnerai une nouvelle vie.'
  '22':
  - type: text
    content: 'Maintenant, peuple d’Israël, écoutez ce que je dis ! Pierre a dit : Dieu a envoyé Jésus de Nazareth sur la terre pour travailler pour lui. Dieu travaillait avec Jésus. Il faisait beaucoup de choses puissantes et spéciales. Pour cette raison, les gens ont su que Dieu avait envoyé Jésus. Vous savez ceci. Ces choses se sont produites ici, et vous les avez vues.'
  '23':
  - type: text
    content: Dieu savait que quelqu’un livrera Jésus. Dieu avait décidé que ceci devra arriver. Ainsi vous avez tué Jésus. Vous avez laissé de mauvais hommes le mettre à la croix.
  '24':
  - type: text
    content: 'Et ainsi Jésus est mort. Mais Dieu l’a fait devenir vivant encore. Dieu a sauvé Jésus de la puissance de la mort. Il était impossible que Jésus reste mort. '
  '25':
  - type: text
    content: 'Il y a longtemps, le roi David a parlé de Jésus. Il disait :'
  - type: text
    content: 'Je voyais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' devant moi tout le temps, parce qu’il est à ma droite, afin que je ne sois pas inquiet.'
  '26':
  - type: text
    content: Je suis heureux pour cette raison. Ainsi je dois parler de lui.
  - type: text
    content: Je sais que je suis un homme.
  - type: text
    content: Mais je sais que tu m’as promis ces choses. Ainsi elles se réaliseront certainement.
  '27':
  - type: text
    content: Ainsi tu ne laisseras pas mon âme avec toutes les personnes mortes. Ton serviteur t’aime. Et ainsi tu ne laisseras rien détruire son corps quand il mourra.
  '28':
  - type: text
    content: Tu m’as montré les bons chemins qui mènent à la vraie vie. Tu es à côté de moi, ainsi je suis complètement heureux.
  '29':
  - type: text
    content: 'Pierre a alors dit : Peuples d’Israël. Je dois vous parler clairement du roi David. Il y a bien longtemps, il était notre ancêtre et roi. David est mort et les gens ont enterré son corps dans la terre. L’endroit où les gens l’ont enterré est toujours ici aujourd’hui. '
  '3':
  - type: text
    content: 'Alors ils ont vu quelque chose se déplacer. C’était comme beaucoup de petits feux séparés. Les petits feux se déplaçaient dans la chambre et ils se mettaient sur chaque personne. '
  '30':
  - type: text
    content: 'David a dit les paroles de Dieu. Il a su ce que Dieu lui avait promis. Dieu a promis à David qu’un homme spécial de sa famille sera un roi. Cet homme sera un roi comme David. '
  '31':
  - type: text
    content: Et David a compris ce que Dieu fera dans les jours à venir. Alors il a parlé de la résurrection de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . David a dit que Dieu ne laissera pas Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' parmi les morts. Il a dit que rien ne détruira son corps. '
  '32':
  - type: text
    content: Cet homme dont David parlait, était Jésus. Jésus est mort. Mais Dieu l’a ressuscité. Nous avons vu nous‑mêmes ceci.
  '33':
  - type: text
    content: 'Dieu a pris Jésus au '
  - type: text
    content: ciel
  - type: text
    content: '. Il l’a placé à son côté droit. Jésus a reçu de son père Dieu le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Il a alors pu nous le donner aussi. Dieu avait promis de faire cela. Dieu a déversé son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' sur nous. Maintenant, vous voyez et vous entendez le résultat du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: .
  '34':
  - type: text
    content: 'David n’est pas allé au '
  - type: text
    content: ciel
  - type: text
    content: ' comme Jésus. Mais David a dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu a dit à mon '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Assieds‑toi ici près de moi à mon côté droit. '
  '35':
  - type: text
    content: Pendant que tu t’assieds ici, je battrai tes ennemis. Ils seront sous toi, comme un endroit pour mettre tes pieds.
  '36':
  - type: text
    content: 'Tout le peuple d’Israël doit être sûr de savoir ceci. Vous avez tué Jésus sur une croix. Mais c’est ce même Jésus que Dieu a choisi comme une personne spéciale. Dieu a fait de lui '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les premières personnes à croire en Jésus
  '37':
  - type: text
    content: 'Les gens ont entendu ce que Pierre leur disait. Alors Ils étaient très inquiets. Ainsi ils ont demandé de l’aide à Pierre et aux autres '
  - type: text
    content: apôtres
  - type: text
    content: '. Ils ont dit : Frères, que devons‑nous faire ?'
  '38':
  - type: text
    content: 'Pierre leur a dit : Chacun de vous a fait de mauvaises choses. Vous devez dire à Dieu que vous êtes tristes à ce sujet. Alors vous devez laisser de faire ces mauvaises choses. Vous devez obéir à Dieu et vous devez faire de bonnes choses.'
  - type: text
    content: Puis quelqu’un qui a le pouvoir de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' vous baptisera. Et Dieu vous pardonnera toutes les mauvaises choses que vous avez faites. Alors Dieu vous offrira le don du Saint‑'
  - type: text
    content: Esprit
  - type: text
    content: '. '
  '39':
  - type: text
    content: Dieu a promis de vous pardonner, vous et vos enfants. Il a également promis de vous donner le Saint‑Esprit et à vos enfants. Il a également promis de le donner aux peuples qui habitent dans d’autres pays. Dieu a choisi beaucoup de gens pour croire en lui. Il les a tous inclus dans sa promesse.
  '4':
  - type: text
    content: 'Dieu a rempli chaque personne du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: . Alors les croyants ont commencé à parler dans des langues étrangères. Ils ne les avaient jamais apprises. Ils parlaient comme le Saint‑Esprit les aidait.
  '40':
  - type: text
    content: 'Ainsi Pierre a dit aux gens ce qu’ils devraient faire. Il leur disait aussi beaucoup d’autres choses. Il a continué à leur parler avec des paroles sérieuses. Il disait : Évitez la punition que Dieu enverra. Dieu l’enverra aux mauvaises personnes qui sont vivantes maintenant. '
  '41':
  - type: text
    content: 'Plusieurs personnes écoutaient Pierre. Elles croyaient en ses paroles. Ainsi les '
  - type: text
    content: apôtres
  - type: text
    content: ' les baptisaient. Environ 3 000 personnes se sont ajoutées au groupe ce même jour. Elles ont toutes cru en Jésus.'
  - type: heading
    content: Voici comment les croyants vivaient
  '42':
  - type: text
    content: 'Ces nouveaux croyants restaient avec les '
  - type: text
    content: apôtres
  - type: text
    content: '. C’était pour apprendre plus au sujet de Jésus. Et ils sont tous devenus de bons amis avec d’autres dans le groupe. Ils priaient ensemble et ils mangeaient des repas ensemble. '
  '43':
  - type: text
    content: 'Le Saint‑Esprit travaillait avec les '
  - type: text
    content: apôtres
  - type: text
    content: '. Il les rendait puissants. Ainsi ils pouvaient guérir les malades. Et ils faisaient beaucoup d’autres choses spéciales. Tous les gens étaient très étonnés. Ils avaient aussi peur de voir ces choses spéciales. '
  '44':
  - type: text
    content: 'Tous les croyants continuaient d’être de bons amis, les uns les autres. Ils mangeaient des repas ensemble, et ils apprenaient plus au sujet de Jésus. Ils continuaient de prier ensemble. Ils se donnaient certaines des choses qu’ils avaient. '
  '45':
  - type: text
    content: 'Ils vendaient certaines de leurs propres choses. Alors ils donnaient cet argent à d’autres croyants selon leurs besoins. '
  '46':
  - type: text
    content: 'Le groupe entier des croyants se rencontrait ensemble chaque jour dans le '
  - type: text
    content: Temple
  - type: text
    content: '. Ils mangeaient leurs repas ensemble dans la maison de chacun. Ils étaient tous très heureux ensemble. Ils remerciaient Dieu de tout. '
  '47':
  - type: text
    content: 'Les croyants montraient souvent aux autres à quel point Dieu est grand et important. Toutes les autres personnes aimaient les croyants. Et elles pensaient que les croyants étaient les gens très bons. Chaque jour, plusieurs personnes demandaient au '
  - type: text
    content: Seigneur
  - type: text
    content: ' de les sauver. Ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' augmentait beaucoup plus le groupe de ceux qui croyaient en lui.'
  '5':
  - type: text
    content: 'A ce moment, certains '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient là. Ils priaient Dieu chaque jour. Ils habitaient à Jérusalem. Ils sont venus de beaucoup de différents pays dans le monde. '
  '6':
  - type: text
    content: Ils ont entendu ce bruit fort. Ils sont venus ensemble dans une grande foule.
  - type: text
    content: 'Chaque personne entendait les '
  - type: text
    content: disciples
  - type: text
    content: ' parler dans sa propre langue. Ils étaient dans la confusion. Ils ne comprenaient pas ce qui est arrivé. '
  '7':
  - type: text
    content: 'Ils étaient très étonnés. Ils disaient : Ces hommes qui parlent comme ceci, sont de la Galilée. '
  '8':
  - type: text
    content: 'Nous ne savons pas ce qui se produit. Chacun de nous les entend parler dans sa langue d’origine. '
  '9':
  - type: text
    content: 'Certains d’entre nous sont des peuples Parthes, Mèdes et Élamites. Certains d’entre nous sont de Mésopotamie, de Judée et de Cappadoce. Certains d’entre nous sont du Pont et d’Asie. '
