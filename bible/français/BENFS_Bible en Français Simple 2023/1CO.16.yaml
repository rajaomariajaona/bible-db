document_id: 1CO.16,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 16
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aide au peuple de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Vous m’avez interrogé sur l’argent que vous voulez donner au peuple de Dieu à Jérusalem. Vous devez le faire de la même manière que je l’ai dit aux Églises de Galatie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si Timothée vient auprès de vous, prenez soin de lui. Assurez‑vous qu’il n’a aucun problème. Il fait le travail du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme moi aussi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Donc, vous devez tous le respecter correctement. Lorsqu’il est prêt à partir, aidez‑le avec les choses dont il a besoin. Ensuite, il peut continuer son voyage et venir me voir ici. J’attends qu’il vienne avec les autres croyants.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quant à notre ami chrétien Apollos, je voulais qu’il vous rende visite. Je lui ai souvent dit de venir vous voir avec les autres croyants. Mais il pense que ce n’est pas le bon moment. Il viendra à vous quand il en aura l’occasion.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul termine sa lettre
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Soyez attentifs au danger. N’arrêtez jamais de faire confiance en Dieu. Continuez d’être courageux et forts. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Quoi que vous fassiez, faites‑le avec amour.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mes amis chrétiens, vous connaissez Stéphanas et sa famille. Ils ont été les premiers habitants d’Achaïe à devenir chrétiens. Ils ont travaillé dur en tant que serviteurs de Dieu pour aider son peuple. Alors, je vous le dis. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Vous devez respecter les gens comme eux. Faites ce qu’ils disent. Et respectez également tous ceux qui travaillent dur pour servir Dieu avec eux.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'J’étais très heureux quand Stéphanas, Fortunatus et Archaïcus sont arrivés ici. Vous ne pouviez pas être ici vous‑mêmes, mais ils ont comblé votre absence. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils m’ont aidé à me sentir plus fort, comme ils l’ont aussi fait pour vous. Vous devez reconnaître la valeur de gens comme eux.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les Églises ici en Asie vous disent bonjour. Aquilas et Priscille, ainsi que le groupe de croyants qui se rencontrent dans leur maison, vous disent également bonjour. Ils vous aiment parce que vous appartenez au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme eux. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le premier jour de chaque semaine, chacun de vous devra mettre une partie de son argent en un lieu sûr. Pensez à combien Dieu vous a donné. Décidez ensuite combien vous pouvez donner chaque semaine. Si vous faites cela, l’offrande sera prête lorsque je viendrai à vous. Nous n’aurons pas besoin de commencer à le faire après mon arrivée. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tous les chrétiens ici vous disent bonjour.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque vous vous rencontrez, embrassez‑vous en frères et sœurs chrétiens.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Moi, Paul, j’écris ces mots à la fin de cette lettre de ma propre main. Je vous dis bonjour.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Si quelqu’un parmi vous n’aime pas vraiment le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je prie que Dieu maudisse cette personne.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', viens maintenant ! Nous t’attendons !'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Je prie pour que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus continue d’être bon envers vous tous.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Je vous aime tous, vous qui appartenez à Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', comme moi.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Lorsque j’arriverai là, vous devrez choisir des gens de votre groupe qui apporteront vos offrandes à Jérusalem. J’écrirai quelques lettres qu’ils emporteront avec eux. Les lettres expliqueront vos offrandes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je peux aussi aller là moi‑même, s’il me faut faire cela. Ensuite, ils pourront voyager avec moi.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais je dois d’abord traverser la Macédoine. Après la Macédoine, je reviendrai vers vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je vais probablement rester avec vous pendant un certain temps. Je peux même rester tout l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: hiver
    - type: text
      text: ' (saison de froid). Ensuite, vous pouvez m’aider à poursuivre mon voyage vers le prochain endroit. Je ne sais pas encore où cela peut être. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si je viens maintenant, j’aurai seulement peu de temps avec vous. Mais je veux rester avec vous plus longtemps, si le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me le permet. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Je resterai donc ici dans la ville d’Éphèse jusqu’à la fête de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pentecôte
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dieu m’a donné l’occasion de faire un grand travail ici. Mais beaucoup de gens sont contre ce que je fais.
