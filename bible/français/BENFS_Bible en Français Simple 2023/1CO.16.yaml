document_id: 1CO.16,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 16
  - type: heading
    content: Aide au peuple de Dieu
  - type: text
    content: 'Vous m’avez interrogé sur l’argent que vous voulez donner au peuple de Dieu à Jérusalem. Vous devez le faire de la même manière que je l’ai dit aux Églises de Galatie. '
  '10':
  - type: text
    content: 'Si Timothée vient auprès de vous, prenez soin de lui. Assurez‑vous qu’il n’a aucun problème. Il fait le travail du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme moi aussi. '
  '11':
  - type: text
    content: Donc, vous devez tous le respecter correctement. Lorsqu’il est prêt à partir, aidez‑le avec les choses dont il a besoin. Ensuite, il peut continuer son voyage et venir me voir ici. J’attends qu’il vienne avec les autres croyants.
  '12':
  - type: text
    content: Quant à notre ami chrétien Apollos, je voulais qu’il vous rende visite. Je lui ai souvent dit de venir vous voir avec les autres croyants. Mais il pense que ce n’est pas le bon moment. Il viendra à vous quand il en aura l’occasion.
  - type: heading
    content: Paul termine sa lettre
  '13':
  - type: text
    content: 'Soyez attentifs au danger. N’arrêtez jamais de faire confiance en Dieu. Continuez d’être courageux et forts. '
  '14':
  - type: text
    content: Quoi que vous fassiez, faites‑le avec amour.
  '15':
  - type: text
    content: 'Mes amis chrétiens, vous connaissez Stéphanas et sa famille. Ils ont été les premiers habitants d’Achaïe à devenir chrétiens. Ils ont travaillé dur en tant que serviteurs de Dieu pour aider son peuple. Alors, je vous le dis. '
  '16':
  - type: text
    content: Vous devez respecter les gens comme eux. Faites ce qu’ils disent. Et respectez également tous ceux qui travaillent dur pour servir Dieu avec eux.
  '17':
  - type: text
    content: 'J’étais très heureux quand Stéphanas, Fortunatus et Archaïcus sont arrivés ici. Vous ne pouviez pas être ici vous‑mêmes, mais ils ont comblé votre absence. '
  '18':
  - type: text
    content: Ils m’ont aidé à me sentir plus fort, comme ils l’ont aussi fait pour vous. Vous devez reconnaître la valeur de gens comme eux.
  '19':
  - type: text
    content: 'Les Églises ici en Asie vous disent bonjour. Aquilas et Priscille, ainsi que le groupe de croyants qui se rencontrent dans leur maison, vous disent également bonjour. Ils vous aiment parce que vous appartenez au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme eux. '
  '2':
  - type: text
    content: 'Le premier jour de chaque semaine, chacun de vous devra mettre une partie de son argent en un lieu sûr. Pensez à combien Dieu vous a donné. Décidez ensuite combien vous pouvez donner chaque semaine. Si vous faites cela, l’offrande sera prête lorsque je viendrai à vous. Nous n’aurons pas besoin de commencer à le faire après mon arrivée. '
  '20':
  - type: text
    content: Tous les chrétiens ici vous disent bonjour.
  - type: text
    content: Lorsque vous vous rencontrez, embrassez‑vous en frères et sœurs chrétiens.
  '21':
  - type: text
    content: Moi, Paul, j’écris ces mots à la fin de cette lettre de ma propre main. Je vous dis bonjour.
  '22':
  - type: text
    content: 'Si quelqu’un parmi vous n’aime pas vraiment le '
  - type: text
    content: Seigneur
  - type: text
    content: ', je prie que Dieu maudisse cette personne.'
  - type: text
    content: 'Notre '
  - type: text
    content: Seigneur
  - type: text
    content: ', viens maintenant ! Nous t’attendons !'
  '23':
  - type: text
    content: 'Je prie pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus continue d’être bon envers vous tous.'
  '24':
  - type: text
    content: Je vous aime tous, vous qui appartenez à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', comme moi.'
  '3':
  - type: text
    content: 'Lorsque j’arriverai là, vous devrez choisir des gens de votre groupe qui apporteront vos offrandes à Jérusalem. J’écrirai quelques lettres qu’ils emporteront avec eux. Les lettres expliqueront vos offrandes. '
  '4':
  - type: text
    content: Je peux aussi aller là moi‑même, s’il me faut faire cela. Ensuite, ils pourront voyager avec moi.
  '5':
  - type: text
    content: 'Mais je dois d’abord traverser la Macédoine. Après la Macédoine, je reviendrai vers vous. '
  '6':
  - type: text
    content: Je vais probablement rester avec vous pendant un certain temps. Je peux même rester tout l’
  - type: text
    content: hiver
  - type: text
    content: ' (saison de froid). Ensuite, vous pouvez m’aider à poursuivre mon voyage vers le prochain endroit. Je ne sais pas encore où cela peut être. '
  '7':
  - type: text
    content: 'Si je viens maintenant, j’aurai seulement peu de temps avec vous. Mais je veux rester avec vous plus longtemps, si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me le permet. '
  '8':
  - type: text
    content: 'Je resterai donc ici dans la ville d’Éphèse jusqu’à la fête de '
  - type: text
    content: Pentecôte
  - type: text
    content: '. '
  '9':
  - type: text
    content: Dieu m’a donné l’occasion de faire un grand travail ici. Mais beaucoup de gens sont contre ce que je fais.
