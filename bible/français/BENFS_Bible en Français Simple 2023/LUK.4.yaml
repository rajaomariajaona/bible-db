document_id: LUK.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Le diable essaie de pousser Jésus à faire de mauvaises choses
  - type: text
    content: 'Jésus était maintenant plein du '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: '. Quand il est revenu du fleuve '
  - type: text
    content: Jourdain
  - type: text
    content: ', le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' l’a conduit dans le '
  - type: text
    content: désert
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Tu sais que la Bible dit :'
  - type: text
    content: 'Dieu ordonnera à ses '
  - type: text
    content: anges
  - type: text
    content: ' de bien te garder.'
  '11':
  - type: text
    content: 'Il dit aussi : Ils vont bien te tenir dans leurs mains. Ils ne laisseront pas ton pied se cogner contre une pierre.'
  '12':
  - type: text
    content: 'Jésus a répondu : Non ! Ce n’est pas ce que Dieu veut. Son livre dit :'
  - type: text
    content: Tu ne tenteras pas le Seigneur, ton Dieu.
  '13':
  - type: text
    content: 'Le '
  - type: text
    content: diable
  - type: text
    content: ' a essayé de pousser Jésus à faire beaucoup de choses que Dieu n’aime pas. Quand le '
  - type: text
    content: diable
  - type: text
    content: ' a fini, il a laissé Jésus seul pour attendre une autre occasion.'
  - type: heading
    content: Jésus va à Nazareth
  '14':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' a continué à donner la puissance à Jésus quand il est revenu en Galilée. Tout le monde qui vivait en Galilée et près de Galilée entendait les nouvelles de lui. '
  '15':
  - type: text
    content: 'Il enseignait dans les lieux de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Tout le monde disait de bonnes choses sur lui.
  '16':
  - type: text
    content: 'Jésus est venu à Nazareth, la ville où il avait grandi. Le jour de repos des '
  - type: text
    content: Juifs
  - type: text
    content: ', Jésus est entré dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Il faisait toujours cela. Puis il s’est levé pour lire à haute voix dans l’Ancien Testament.
  '17':
  - type: text
    content: Ils lui ont donné le livre des messages que Dieu avait donnés à Ésaïe. Jésus a ouvert le livre. Il a trouvé l’endroit où Ésaïe avait écrit.
  '18':
  - type: text
    content: L’
  - type: text
    content: Esprit
  - type: text
    content: ' du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sur moi.'
  - type: text
    content: Il m’a choisi pour dire la Bonne Nouvelle aux pauvres.
  - type: text
    content: 'Il m’a envoyé dire aux gens qui sont en prison : Vous pouvez aller librement !'
  - type: text
    content: 'Je dois dire aux gens qui ne peuvent pas voir : Voyez à nouveau !'
  - type: text
    content: Je dois rendre libres les gens qui sont comme des esclaves.
  '19':
  - type: text
    content: 'Je dois dire à tout le monde : Ceci est l’année où Dieu sauvera son peuple.'
  '2':
  - type: text
    content: 'Il est resté là pendant 40 jours et il n’a rien mangé. Pendant ce temps, le '
  - type: text
    content: diable
  - type: text
    content: ' a essayé de pousser Jésus à faire du mal. À la fin des 40 jours, Jésus avait très faim.'
  '20':
  - type: text
    content: 'Jésus a fermé le livre et il l’a remis à un responsable du bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Puis il s’est mis à enseigner le peuple. Tout le monde le regardait.
  '21':
  - type: text
    content: 'Jésus leur a dit : Aujourd’hui, ce message est devenu vrai. Il est arrivé pendant que vous écoutiez.'
  '22':
  - type: text
    content: 'Tous les gens disaient de bonnes choses au sujet de Jésus. Ils étaient surpris. Ils se demandaient : Comment il a bien parlé ! N’est‑ce pas qu’il est seulement le fils de Joseph ? Ne l’est‑il pas ?'
  '23':
  - type: text
    content: 'Jésus a répondu : Après, vous allez me répéter le proverbe : Médecin, fais de bonnes choses aux gens de ta propre ville. Nous avons entendu dire que tu avais fait beaucoup de choses surprenantes à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Ici est ta ville natale, donc fais les mêmes choses ici ! '
  '24':
  - type: text
    content: Les gens n’acceptent pas une personne qui vient de leur ville natale. C’est vrai. Ils ne croient pas qu’il reçoit les messages de Dieu.
  '25':
  - type: text
    content: 'Ce que je vais vous dire maintenant est vrai. Élie a reçu les messages de Dieu. Élie a dit qu’il cessera de pleuvoir. Et il n’a pas plu pendant 3 ans et demi. Il n’y avait donc pas de nourriture ni de l’eau à boire dans tout le pays. Il y avait beaucoup de veuves dans le pays d’Israël à ce moment‑là. '
  '26':
  - type: text
    content: Mais Dieu n’a pas envoyé Élie rester avec une veuve en Israël. Au lieu de cela, Dieu a envoyé Élie à un endroit appelé Sidon. Une veuve est restée avec Élie dans un endroit appelé Sarepta.
  '27':
  - type: text
    content: Voici un autre exemple. Il y avait beaucoup de gens en Israël avec de mauvaises maladies de la peau. C’était lorsque le serviteur de Dieu Élisée était vivant. Mais Dieu n’a guéri aucun d’eux. Au lieu de cela, il a guéri un homme du pays appelé Syrie. L’homme s’appelait Naaman.
  '28':
  - type: text
    content: 'Les gens étaient dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Ils entendaient ce que Jésus disait.
  - type: text
    content: 'Ils étaient très en colère. '
  '29':
  - type: text
    content: 'Ils se sont levés et ils l’ont poussé à quitter la ville. La ville était sur le sommet d’une colline. Alors, ils l’ont emmené au sommet et ils voulaient le jeter. '
  '3':
  - type: text
    content: 'Le '
  - type: text
    content: diable
  - type: text
    content: ' a dit à Jésus : Si tu es le Fils de Dieu, change cette pierre en pain.'
  '30':
  - type: text
    content: Mais Jésus est passé au milieu de la foule et il est parti.
  - type: heading
    content: Jésus chasse un mauvais esprit d’un homme
  '31':
  - type: text
    content: 'Jésus est descendu dans une ville de Galilée, appelée '
  - type: text
    content: Capernaüm
  - type: text
    content: '. Le jour de repos pour les '
  - type: text
    content: Juifs
  - type: text
    content: ' est arrivé. Alors Jésus a commencé à enseigner dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Les gens étaient vraiment surpris, parce que ses paroles avaient de l’autorité. '
  '33':
  - type: text
    content: 'Il y avait un homme malade dans le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Il avait un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' qui vivait en lui. Alors le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' criait fortement. '
  '34':
  - type: text
    content: L’
  - type: text
    content: esprit
  - type: text
    content: ' disait : Jésus de Nazareth, que veux‑tu de nous ? Es‑tu venu pour nous détruire ? Je sais qui tu es. Tu es le Saint. Tu viens de Dieu.'
  '35':
  - type: text
    content: 'Jésus lui a répondu : Sois tranquille ! Sors de cet homme. A cela, le mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' a fait tomber l’homme sur le sol en face du peuple. Puis il est sorti sans le blesser.'
  '36':
  - type: text
    content: 'Tous les gens étaient très surpris et ils disaient entre eux : Comment cet homme peut parler de cette façon ? Il a la puissance et le pouvoir.'
  - type: text
    content: 'Quand il ordonne aux mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' de sortir des gens, ils sortent. '
  '37':
  - type: text
    content: 'Ensuite, les gens ont commencé à parler de Jésus à tous les autres. En conséquence, les gens dans tous les endroits près de '
  - type: text
    content: Capernaüm
  - type: text
    content: ' entendaient les nouvelles au sujet de Jésus.'
  - type: heading
    content: Jésus guérit beaucoup de gens
  '38':
  - type: text
    content: 'Jésus a ensuite quitté le bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Il est allé dans la maison de Simon. La mère de la femme de Simon était malade d’une très mauvaise fièvre. Ainsi, ils ont demandé à Jésus de la guérir.
  '39':
  - type: text
    content: Jésus est venu, et il s’est approché d’elle. Il a alors ordonné à la fièvre de quitter. Et la fièvre l’a quittée. Alors, elle s’est levée immédiatement et elle a commencé à servir ses visiteurs.
  '4':
  - type: text
    content: 'Jésus a répondu : Non, le livre de Dieu dit que le pain seul ne peut pas amener les gens à vivre.'
  '40':
  - type: text
    content: Quand le soleil a commencé à se coucher, les gens amenaient beaucoup de gens malades pour voir Jésus. Ils avaient de nombreuses maladies différentes. Jésus mettait ses mains sur chaque malade et tous devenaient bien.
  '41':
  - type: text
    content: 'Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' aussi sortaient de beaucoup de gens. Les '
  - type: text
    content: esprits
  - type: text
    content: ' savaient qu’il était le '
  - type: text
    content: Messie
  - type: text
    content: '. Donc, quand ils sortaient, ils criaient : Jésus, tu es le Fils de Dieu. Mais Jésus les arrêtait de crier. Il ne voulait pas les laisser parler.'
  '42':
  - type: text
    content: 'Tôt le lendemain matin, Jésus est allé seul dans un endroit calme. Les gens sont allés le chercher. Quand ils l’ont trouvé, ils ont dit : Ne nous laisse pas ! S’il te plaît, reste avec nous à '
  - type: text
    content: Capernaüm
  - type: text
    content: '. '
  '43':
  - type: text
    content: 'Jésus a répondu : Je ne peux pas rester avec vous. Je dois aller dans d’autres villes enseigner à tous la Bonne Nouvelle. Je vais leur dire comment Dieu règne dans la vie de son peuple. C’est pour cela que Dieu m’a envoyé.'
  '44':
  - type: text
    content: 'Alors il partait à plusieurs endroits en Judée. Il entrait dans les bâtiments de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: . Il enseignait là.
  '5':
  - type: text
    content: 'Après cela, le '
  - type: text
    content: diable
  - type: text
    content: ' a conduit Jésus à un endroit élevé. En un instant, il lui a montré tous les pays dans le monde entier. '
  '6':
  - type: text
    content: 'Le '
  - type: text
    content: diable
  - type: text
    content: ' lui a dit : Je vais te laisser gouverner le monde entier et je vais te donner le pouvoir sur tout le monde. Tout est à moi. Donc, je peux le donner à toute personne que je choisis. '
  '7':
  - type: text
    content: Plie seulement les genoux devant moi. Et dis que je suis grand et important. Ensuite, je te donnerai le monde entier pour le gouverner.
  '8':
  - type: text
    content: 'Jésus lui a répondu : Non ! Voici ce que Dieu dit dans son livre (la Bible) :'
  - type: text
    content: 'Plie tes genoux devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu. Dis‑lui combien il est grand et puissant. Tu le serviras lui seul.'
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: diable
  - type: text
    content: ' a maintenant amené Jésus à Jérusalem. Il l’a conduit à la plus haute partie du '
  - type: text
    content: Temple
  - type: text
    content: ' de Dieu. Puis il lui a dit : Si tu es le Fils de Dieu, saute d’ici en bas. '
