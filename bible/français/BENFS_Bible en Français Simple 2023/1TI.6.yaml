document_id: 1TI.6
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 6
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: À propos des esclaves
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tous les esclaves croyants doivent respecter correctement leurs maîtres. Ensuite, d’autres personnes ne diront pas de mauvaises choses contre le nom de Dieu ou contre le message que nous enseignons. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les esclaves qui ont des maîtres qui sont aussi des croyants doivent toujours les respecter. En tant que croyants, l’esclave et son maître sont comme des frères ensemble. Mais cet esclave ne doit pas refuser d’obéir correctement à son maître à cause de cela. Mais, il doit travailler encore mieux pour son maître parce qu’ils croient tous les 2 en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Dieu aime le maître et l’esclave doit bien travailler pour l’aider.
- type: usfm
  marker: s1
  children:
  - type: text
    text: À propos de mauvais enseignants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Enseigne ces choses et dis aux gens d’y obéir. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Certaines gens enseignent un faux message. Leur message ne correspond pas au vrai message que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a enseigné. Ils n’enseignent pas aux gens de vivre d’une manière qui rend Dieu heureux. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les gens comme ça pensent qu’ils sont très intelligents. Mais ils ne comprennent vraiment rien. Ils aiment discuter des choses qui ne sont pas importantes. Ils aiment se quereller sur les mots. En conséquence, les gens deviennent jaloux les uns des autres et se mettent en colère les uns contre les autres. Ils insultent les autres et pensent de mauvaises choses à leur sujet. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' sont devenus confus et ils se disputent tout le temps. Ils refusent de croire au vrai message de Dieu. Ils pensent qu’ils deviendront riches s’ils disent qu’ils servent Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si nous servons Dieu et lui faisons confiance, alors notre vie est vraiment riche. Mais nous devons être satisfaits des choses que nous avons. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand nous sommes nés, nous n’avons rien apporté avec nous dans ce monde. Quand nous mourons, nous ne pouvons rien emporter avec nous du monde. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Donc, si nous avons assez de nourriture et de vêtements, nous devons en être satisfaits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais certaines gens veulent avoir beaucoup d’argent. Cela les amène à faire de mauvaises choses. Ils sont comme des imbéciles quand ils veulent des choses pour eux‑mêmes. Ils ne peuvent pas se libérer de leurs mauvaises voies, ce qui leur fait seulement mal. Enfin, les mauvaises pensées de ces personnes détruisent leurs vies. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque les gens aiment avoir beaucoup d’argent, cela provoque toutes sortes de mauvaises choses. Certaines gens ont laissé de croire au message concernant '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', parce qu’ils veulent juste obtenir plus d’argent. En conséquence, ils se sont montrés très tristes, car ils ont de nombreux problèmes.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Continuer de vivre pour Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais toi, Timothée, tu es un serviteur de Dieu. Donc, tu dois t’éloigner de toutes les mauvaises choses comme ça. Essaie plutôt de faire ce qui est bien. Sers Dieu d’une manière qui le rend heureux. Choisis de faire confiance en Dieu et d’aimer les autres. Reste fort lorsque tu as des problèmes. Sois gentil avec les gens. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Continue de croire au vrai message de Dieu. Sois comme quelqu’un qui se bat bien pour le garder en sécurité. Dieu t’a choisi pour vivre avec lui pour toujours. Tu t’es tenu devant de nombreuses personnes et tu as dit clairement que tu crois en Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Alors, vis d’une manière qui montre que tu lui appartiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même a clairement exprimé le vrai message de Dieu lorsqu’il s’est tenu devant Ponce Pilate. Je te le dis maintenant, devant Dieu qui fait vivre toutes choses et devant Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je te dis fortement d’obéir au vrai message. Obéis complètement sans aucune erreur jusqu’à ce que notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' revienne. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dieu fera paraître clairement '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' au bon moment. Dieu est grand, et lui seul dirige avec toute puissance. Il est le plus grand roi et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' le plus puissant. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dieu seul ne peut jamais mourir. Il vit dans une lumière très vive que personne ne peut approcher. Personne n’a jamais vu Dieu. Personne ne peut le voir. Alors, louons‑le ! Il doit régner pour toujours avec un grand pouvoir ! Amen ! C’est vrai.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les riches doivent faire attention à leur façon de vivre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avertis les gens qui sont riches de beaucoup de choses qui appartiennent à ce monde. Dis‑leur de ne pas penser qu’ils sont plus importants que les autres. Ils ne doivent pas penser que leur argent les protégera. Ils pourraient facilement tout perdre. Mais, ils doivent faire confiance en Dieu. Il nous donne beaucoup de choses, afin que nous puissions nous réjouir de toutes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dis à ces riches de faire beaucoup de bonnes choses pour aider les autres. C’est ainsi qu’ils devraient être riches. Ils devraient être très gentils avec les autres et partager leurs affaires avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'De cette façon, ils auront des choses précieuses pour eux‑mêmes dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Ces choses leur seront d’une grande aide à l’avenir. En conséquence, ils auront une vraie vie avec Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Timothée doit continuer d’enseigner le vrai message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Timothée, Dieu t’a donné son vrai message à dire aux gens. Tu dois garder ce message en sécurité. N’écoute pas les gens qui disent beaucoup de mauvaises choses qui ne sont pas importantes pour Dieu. Ces gens pensent qu’ils connaissent des choses spéciales. Mais leurs idées sont contre le vrai message de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Certaines personnes ont cru à ces mauvaises idées et maintenant elles ne font plus confiance en Dieu.
- type: usfm
  marker: p
  children:
  - type: text
    text: Je prie pour que Dieu continue d’être très gentil avec vous tous là‑bas.
