document_id: 1TI.6,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 6
  - type: heading
    content: À propos des esclaves
  - type: text
    content: 'Tous les esclaves croyants doivent respecter correctement leurs maîtres. Ensuite, d’autres personnes ne diront pas de mauvaises choses contre le nom de Dieu ou contre le message que nous enseignons. '
  '10':
  - type: text
    content: 'Lorsque les gens aiment avoir beaucoup d’argent, cela provoque toutes sortes de mauvaises choses. Certaines gens ont laissé de croire au message concernant '
  - type: text
    content: Christ
  - type: text
    content: ', parce qu’ils veulent juste obtenir plus d’argent. En conséquence, ils se sont montrés très tristes, car ils ont de nombreux problèmes.'
  - type: heading
    content: Continuer de vivre pour Dieu
  '11':
  - type: text
    content: 'Mais toi, Timothée, tu es un serviteur de Dieu. Donc, tu dois t’éloigner de toutes les mauvaises choses comme ça. Essaie plutôt de faire ce qui est bien. Sers Dieu d’une manière qui le rend heureux. Choisis de faire confiance en Dieu et d’aimer les autres. Reste fort lorsque tu as des problèmes. Sois gentil avec les gens. '
  '12':
  - type: text
    content: Continue de croire au vrai message de Dieu. Sois comme quelqu’un qui se bat bien pour le garder en sécurité. Dieu t’a choisi pour vivre avec lui pour toujours. Tu t’es tenu devant de nombreuses personnes et tu as dit clairement que tu crois en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Alors, vis d’une manière qui montre que tu lui appartiens.
  '13':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même a clairement exprimé le vrai message de Dieu lorsqu’il s’est tenu devant Ponce Pilate. Je te le dis maintenant, devant Dieu qui fait vivre toutes choses et devant Jésus. '
  '14':
  - type: text
    content: 'Je te dis fortement d’obéir au vrai message. Obéis complètement sans aucune erreur jusqu’à ce que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' revienne. '
  '15':
  - type: text
    content: 'Dieu fera paraître clairement '
  - type: text
    content: Christ
  - type: text
    content: ' au bon moment. Dieu est grand, et lui seul dirige avec toute puissance. Il est le plus grand roi et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le plus puissant. '
  '16':
  - type: text
    content: Dieu seul ne peut jamais mourir. Il vit dans une lumière très vive que personne ne peut approcher. Personne n’a jamais vu Dieu. Personne ne peut le voir. Alors, louons‑le ! Il doit régner pour toujours avec un grand pouvoir ! Amen ! C’est vrai.
  - type: heading
    content: Les riches doivent faire attention à leur façon de vivre
  '17':
  - type: text
    content: Avertis les gens qui sont riches de beaucoup de choses qui appartiennent à ce monde. Dis‑leur de ne pas penser qu’ils sont plus importants que les autres. Ils ne doivent pas penser que leur argent les protégera. Ils pourraient facilement tout perdre. Mais, ils doivent faire confiance en Dieu. Il nous donne beaucoup de choses, afin que nous puissions nous réjouir de toutes.
  '18':
  - type: text
    content: 'Dis à ces riches de faire beaucoup de bonnes choses pour aider les autres. C’est ainsi qu’ils devraient être riches. Ils devraient être très gentils avec les autres et partager leurs affaires avec eux. '
  '19':
  - type: text
    content: 'De cette façon, ils auront des choses précieuses pour eux‑mêmes dans le '
  - type: text
    content: ciel
  - type: text
    content: . Ces choses leur seront d’une grande aide à l’avenir. En conséquence, ils auront une vraie vie avec Dieu.
  - type: heading
    content: Timothée doit continuer d’enseigner le vrai message
  '2':
  - type: text
    content: 'Les esclaves qui ont des maîtres qui sont aussi des croyants doivent toujours les respecter. En tant que croyants, l’esclave et son maître sont comme des frères ensemble. Mais cet esclave ne doit pas refuser d’obéir correctement à son maître à cause de cela. Mais, il doit travailler encore mieux pour son maître parce qu’ils croient tous les 2 en '
  - type: text
    content: Christ
  - type: text
    content: . Dieu aime le maître et l’esclave doit bien travailler pour l’aider.
  - type: heading
    content: À propos de mauvais enseignants
  - type: text
    content: 'Enseigne ces choses et dis aux gens d’y obéir. '
  '20':
  - type: text
    content: 'Timothée, Dieu t’a donné son vrai message à dire aux gens. Tu dois garder ce message en sécurité. N’écoute pas les gens qui disent beaucoup de mauvaises choses qui ne sont pas importantes pour Dieu. Ces gens pensent qu’ils connaissent des choses spéciales. Mais leurs idées sont contre le vrai message de Dieu. '
  '21':
  - type: text
    content: Certaines personnes ont cru à ces mauvaises idées et maintenant elles ne font plus confiance en Dieu.
  - type: text
    content: Je prie pour que Dieu continue d’être très gentil avec vous tous là‑bas.
  '3':
  - type: text
    content: 'Certaines gens enseignent un faux message. Leur message ne correspond pas au vrai message que notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' a enseigné. Ils n’enseignent pas aux gens de vivre d’une manière qui rend Dieu heureux. '
  '4':
  - type: text
    content: 'Les gens comme ça pensent qu’ils sont très intelligents. Mais ils ne comprennent vraiment rien. Ils aiment discuter des choses qui ne sont pas importantes. Ils aiment se quereller sur les mots. En conséquence, les gens deviennent jaloux les uns des autres et se mettent en colère les uns contre les autres. Ils insultent les autres et pensent de mauvaises choses à leur sujet. '
  '5':
  - type: text
    content: 'Leurs '
  - type: text
    content: esprits
  - type: text
    content: ' sont devenus confus et ils se disputent tout le temps. Ils refusent de croire au vrai message de Dieu. Ils pensent qu’ils deviendront riches s’ils disent qu’ils servent Dieu.'
  '6':
  - type: text
    content: 'Si nous servons Dieu et lui faisons confiance, alors notre vie est vraiment riche. Mais nous devons être satisfaits des choses que nous avons. '
  '7':
  - type: text
    content: 'Quand nous sommes nés, nous n’avons rien apporté avec nous dans ce monde. Quand nous mourons, nous ne pouvons rien emporter avec nous du monde. '
  '8':
  - type: text
    content: Donc, si nous avons assez de nourriture et de vêtements, nous devons en être satisfaits.
  '9':
  - type: text
    content: 'Mais certaines gens veulent avoir beaucoup d’argent. Cela les amène à faire de mauvaises choses. Ils sont comme des imbéciles quand ils veulent des choses pour eux‑mêmes. Ils ne peuvent pas se libérer de leurs mauvaises voies, ce qui leur fait seulement mal. Enfin, les mauvaises pensées de ces personnes détruisent leurs vies. '
