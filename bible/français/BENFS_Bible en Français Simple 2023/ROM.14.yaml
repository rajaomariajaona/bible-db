document_id: ROM.14,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 14
  - type: heading
    content: Acceptez d’autres chrétiens qui sont différents de vous
  - type: text
    content: 'Il est difficile pour certains chrétiens de croire entièrement en Dieu pour tout. Vous devez accepter de tels gens comme vos amis. Ne discutez pas avec eux de ce qu’ils pensent être bien ou mal. '
  '10':
  - type: text
    content: 'Ainsi donc, si vous ne mangez que des légumes, vous ne devez pas juger les autres croyants. De plus, si vous mangez quelque chose, vous ne devez pas penser que vous êtes meilleurs que les autres croyants. N’oubliez pas que nous devrons tous nous tenir devant Dieu. Il décidera si nous avons fait ce qui est bien ou mal. '
  '11':
  - type: text
    content: 'Ceci est écrit dans la Bible :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu a dit :'
  - type: text
    content: 'Aussi certainement que je vivrai, cela se produira certainement :'
  - type: text
    content: Tout le monde va se mettre à genoux devant moi.
  - type: text
    content: Tout le monde me glorifiera que je suis Dieu.
  '12':
  - type: text
    content: Ainsi, chacun de nous devra expliquer à Dieu ce qu’il a fait.
  - type: heading
    content: Ne causez pas de problèmes aux autres chrétiens
  '13':
  - type: text
    content: 'Ainsi, nous ne devons plus juger les autres croyants. Mais, vous devez décider de ne jamais causer de problèmes à un autre croyant. Ne lui faites pas faire quelque chose de mal. '
  '14':
  - type: text
    content: 'Quant à moi, je suis sûr que nous pouvons manger toute sorte de nourriture. Dieu ne pense pas que la nourriture soit impure. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus m’a montré que c’est vrai. Mais quelqu’un d’autre peut croire qu’il est mal de manger certains aliments. Pour cette personne, ce serait mal de manger ce genre de nourriture.'
  '15':
  - type: text
    content: 'Ne rends pas un autre croyant triste à cause de ce que tu manges. Si tu le rends triste, tu ne l’aimes pas vraiment. N’oublie pas que '
  - type: text
    content: Christ
  - type: text
    content: ' est mort pour cette personne. Alors, ne cause pas ta nourriture de détourner cette personne de Dieu. '
  '16':
  - type: text
    content: Vous pensez peut‑être que quelque chose est bon. Mais vous ne devez toujours pas le faire, si d’autres personnes disent que c’est mauvais.
  '17':
  - type: text
    content: 'Nous appartenons au peuple de Dieu et il est notre roi. Les choses que nous mangeons et buvons ne sont pas vraiment importantes pour lui. Voici ce qui est important : Nous devons faire ce qui est bien. Nous devons avoir la paix dans nos '
  - type: text
    content: esprits
  - type: text
    content: '. Et nous devons être vraiment heureux. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu nous aide à vivre comme cela. '
  '18':
  - type: text
    content: 'Si quelqu’un sert '
  - type: text
    content: Christ
  - type: text
    content: ' de cette manière, il rendra Dieu heureux. Et les autres le respecteront.'
  '19':
  - type: text
    content: 'Alors, nous devons essayer de vivre d’une manière qui apporte la paix. Nous devons essayer de nous entraider pour devenir plus forts en tant que peuple de Dieu. '
  '2':
  - type: text
    content: 'Certaines personnes croient qu’elles peuvent manger toutes sortes d’aliments. Mais d’autres personnes ne sont pas très sûres, donc elles mangent seulement des légumes. '
  '20':
  - type: text
    content: 'Ne fais pas de problèmes à quelqu’un à cause de la nourriture que tu manges. Ne détruis pas ce que Dieu a fait dans la vie d’un autre croyant. Dieu nous laisse manger toutes sortes de nourriture. Mais ne mange rien qui amène un autre croyant à faire quelque chose de mal. '
  '21':
  - type: text
    content: Il est bon de ne rien faire qui amène un autre croyant à faire quelque chose de mal. Et cela, si tu manges de la viande ou si tu bois du vin.
  '22':
  - type: text
    content: 'Ce que tu penses de ces choses doit être un secret entre toi et Dieu. Fais ce que tu trouves juste. Ne te sens pas fautif de ce que tu manges. Alors Dieu te bénira. '
  '23':
  - type: text
    content: Mais quelqu’un d’autre peut ne pas être sûr s’il est juste de manger certains types de nourriture. Si cette personne mange ce genre de nourriture, alors elle montre qu’elle est fautive. Elle n’a pas cru en Dieu qu’il est juste pour lui de faire cela. Quelles que soient les choses que nous faisons, nous devons faire confiance en Dieu pour cela. Si nous ne faisons pas confiance en Dieu que quelque chose est bien, alors c’est un péché.
  '3':
  - type: text
    content: Les personnes qui mangent quelque chose ne doivent pas penser qu’elles sont meilleures que celles qui ne mangent que des légumes. De plus, les personnes qui ne mangent que des légumes ne doivent pas juger les autres personnes qui mangent quoi que ce soit. Elles ne font rien de mal, car Dieu lui‑même les a acceptées.
  '4':
  - type: text
    content: 'Dieu est le maître de tous les croyants et ils sont ses serviteurs. Vous n’avez pas le pouvoir de juger le serviteur de quelqu’un d’autre. Le maître du serviteur décidera s’il a bien fait ou s’il a fait quelque chose de mal. Et il servira bien son maître, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' peut l’aider à faire cela.'
  '5':
  - type: text
    content: 'Certaines personnes pensent que certains jours sont spéciaux et plus importants que d’autres jours. D’autres pensent que tous les jours sont les mêmes. Chaque personne doit décider de ce qui lui semble juste. '
  '6':
  - type: text
    content: 'Une personne qui fait un certain jour spécial le fait pour respecter le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Une personne qui mange toutes sortes de nourriture le fait pour respecter le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Elle remercie Dieu pour la nourriture qu’elle mange. Quelqu’un qui refuse de manger certains aliments le fait également, afin de respecter le '
  - type: text
    content: Seigneur
  - type: text
    content: . Et il remercie aussi Dieu.
  '7':
  - type: text
    content: 'Aucun de nous ne vit uniquement pour nous plaire. Et nous ne mourons pas pour nous faire plaisir. '
  '8':
  - type: text
    content: 'Pendant que nous vivons, nous voulons plaire au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Et quand nous mourons, nous voulons que cela plaise aussi au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ainsi, pendant que nous vivons, ou si nous mourons, nous continuons d’appartenir au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: text
    content: Christ
  - type: text
    content: ' est mort et il est revenu à la vie. Cela s’est fait pour qu’il soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de tous, de ceux qui sont morts et de ceux qui sont encore en vie.'
