document_id: ROM.14,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 14
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Acceptez d’autres chrétiens qui sont différents de vous
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il est difficile pour certains chrétiens de croire entièrement en Dieu pour tout. Vous devez accepter de tels gens comme vos amis. Ne discutez pas avec eux de ce qu’ils pensent être bien ou mal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ainsi donc, si vous ne mangez que des légumes, vous ne devez pas juger les autres croyants. De plus, si vous mangez quelque chose, vous ne devez pas penser que vous êtes meilleurs que les autres croyants. N’oubliez pas que nous devrons tous nous tenir devant Dieu. Il décidera si nous avons fait ce qui est bien ou mal. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ceci est écrit dans la Bible :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu a dit :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi certainement que je vivrai, cela se produira certainement :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le monde va se mettre à genoux devant moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le monde me glorifiera que je suis Dieu.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ainsi, chacun de nous devra expliquer à Dieu ce qu’il a fait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ne causez pas de problèmes aux autres chrétiens
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ainsi, nous ne devons plus juger les autres croyants. Mais, vous devez décider de ne jamais causer de problèmes à un autre croyant. Ne lui faites pas faire quelque chose de mal. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quant à moi, je suis sûr que nous pouvons manger toute sorte de nourriture. Dieu ne pense pas que la nourriture soit impure. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus m’a montré que c’est vrai. Mais quelqu’un d’autre peut croire qu’il est mal de manger certains aliments. Pour cette personne, ce serait mal de manger ce genre de nourriture.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ne rends pas un autre croyant triste à cause de ce que tu manges. Si tu le rends triste, tu ne l’aimes pas vraiment. N’oublie pas que '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort pour cette personne. Alors, ne cause pas ta nourriture de détourner cette personne de Dieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Vous pensez peut‑être que quelque chose est bon. Mais vous ne devez toujours pas le faire, si d’autres personnes disent que c’est mauvais.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Nous appartenons au peuple de Dieu et il est notre roi. Les choses que nous mangeons et buvons ne sont pas vraiment importantes pour lui. Voici ce qui est important : Nous devons faire ce qui est bien. Nous devons avoir la paix dans nos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Et nous devons être vraiment heureux. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' de Dieu nous aide à vivre comme cela. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Si quelqu’un sert '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' de cette manière, il rendra Dieu heureux. Et les autres le respecteront.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Alors, nous devons essayer de vivre d’une manière qui apporte la paix. Nous devons essayer de nous entraider pour devenir plus forts en tant que peuple de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Certaines personnes croient qu’elles peuvent manger toutes sortes d’aliments. Mais d’autres personnes ne sont pas très sûres, donc elles mangent seulement des légumes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ne fais pas de problèmes à quelqu’un à cause de la nourriture que tu manges. Ne détruis pas ce que Dieu a fait dans la vie d’un autre croyant. Dieu nous laisse manger toutes sortes de nourriture. Mais ne mange rien qui amène un autre croyant à faire quelque chose de mal. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il est bon de ne rien faire qui amène un autre croyant à faire quelque chose de mal. Et cela, si tu manges de la viande ou si tu bois du vin.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ce que tu penses de ces choses doit être un secret entre toi et Dieu. Fais ce que tu trouves juste. Ne te sens pas fautif de ce que tu manges. Alors Dieu te bénira. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mais quelqu’un d’autre peut ne pas être sûr s’il est juste de manger certains types de nourriture. Si cette personne mange ce genre de nourriture, alors elle montre qu’elle est fautive. Elle n’a pas cru en Dieu qu’il est juste pour lui de faire cela. Quelles que soient les choses que nous faisons, nous devons faire confiance en Dieu pour cela. Si nous ne faisons pas confiance en Dieu que quelque chose est bien, alors c’est un péché.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les personnes qui mangent quelque chose ne doivent pas penser qu’elles sont meilleures que celles qui ne mangent que des légumes. De plus, les personnes qui ne mangent que des légumes ne doivent pas juger les autres personnes qui mangent quoi que ce soit. Elles ne font rien de mal, car Dieu lui‑même les a acceptées.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dieu est le maître de tous les croyants et ils sont ses serviteurs. Vous n’avez pas le pouvoir de juger le serviteur de quelqu’un d’autre. Le maître du serviteur décidera s’il a bien fait ou s’il a fait quelque chose de mal. Et il servira bien son maître, parce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' peut l’aider à faire cela.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Certaines personnes pensent que certains jours sont spéciaux et plus importants que d’autres jours. D’autres pensent que tous les jours sont les mêmes. Chaque personne doit décider de ce qui lui semble juste. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Une personne qui fait un certain jour spécial le fait pour respecter le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Une personne qui mange toutes sortes de nourriture le fait pour respecter le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Elle remercie Dieu pour la nourriture qu’elle mange. Quelqu’un qui refuse de manger certains aliments le fait également, afin de respecter le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . Et il remercie aussi Dieu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aucun de nous ne vit uniquement pour nous plaire. Et nous ne mourons pas pour nous faire plaisir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Pendant que nous vivons, nous voulons plaire au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Et quand nous mourons, nous voulons que cela plaise aussi au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Ainsi, pendant que nous vivons, ou si nous mourons, nous continuons d’appartenir au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort et il est revenu à la vie. Cela s’est fait pour qu’il soit le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' de tous, de ceux qui sont morts et de ceux qui sont encore en vie.'
