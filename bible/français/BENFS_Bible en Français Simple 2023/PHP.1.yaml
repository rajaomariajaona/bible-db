document_id: PHP.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul et Timothée écrivent une lettre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paul et Timothée, qui sont serviteurs de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', écrivent cette lettre. Nous vous écrivons, vous les gens de Dieu à Philippes. Vous êtes unis à Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Nous vous écrivons pour vous tous. Cela concerne aussi vos dirigeants et ceux qui les aident.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul prie pour les croyants de Philippes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous prions pour que Dieu notre Père et le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' continuent d’être très gentils envers vous. Nous prions aussi qu’ils vous donnent la paix dans vos cœurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Chaque fois que je pense à vous, je remercie mon Dieu à cause de vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je prie toujours pour vous. Chaque fois que je prie pour vous, je me sens heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je suis heureux, parce que vous aidez les gens à connaître la Bonne Nouvelle au sujet de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Vous m’avez aidé dans ce travail. C’était depuis le premier jour que quelqu’un vous avait dit la Bonne Nouvelle. Vous le faites même maintenant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je sais que Dieu a commencé à faire de bonnes choses en vous. Et il continuera de travailler en vous jusqu’au jour où Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' reviendra. Alors Dieu finira ce travail en vous. Je suis sûr de cela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il est bon pour moi de me sentir comme ça pour vous, parce que je vous aime beaucoup. Vous êtes des amis très spéciaux pour moi. Et, comme moi, continuez tous de savoir combien Dieu est très gentil envers nous. Vous le savez maintenant, alors que je suis dans cette prison. Et vous le saviez avant que je sois en prison. Ensuite, je suis libre et je pourrai enseigner la Bonne Nouvelle. J’ai expliqué aux gens pourquoi la Bonne Nouvelle est certainement vraie. Et tout cela, c’est la raison pour laquelle je vous aime. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu lui‑même sait que je veux beaucoup être avec vous tous. Je vous aime comme Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' lui‑même vous aime.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voici ce que je prie pour vous. Je prie pour que vous ayez l’amour de plus en plus. Je prie pour que vous continuiez à connaître Dieu de plus en plus. Si vous faites cela, vous comprendrez les choses plus complètement. Vous comprendrez pourquoi les choses sont bonnes ou mauvaises.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors, vous pouvez choisir de faire ce qui est mieux. Donc, vous pouvez garder vos cœurs bien jusqu’au jour où le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' reviendra. Donc, ce jour‑là, vous ne ferez rien de mal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vous rendra complètement bons et justes avec Dieu. Jésus vous aidera également à faire beaucoup de bonnes choses. Ensuite, vous allez montrer à tous les grandes choses que Dieu a faites en vous. Alors, les gens diront que Dieu est très grand.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu a fait de bonnes choses à Paul dans une prison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Frères, je veux que vous sachiez ceci. Les choses qui me sont arrivées ont aidé plus de gens à connaître la Bonne Nouvelle de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je suis dans une prison, parce que je suis le serviteur de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Tous les soldats dans la maison du Roi le savent. Et tout le monde le sait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En plus, parce que je suis dans une prison, presque tous les autres chrétiens ici font confiance dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Donc, ils sont devenus beaucoup plus courageux. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' les a rendus courageux. C’est pour qu’ils n’aient pas peur de parler du message de Dieu aux gens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il est vrai que certains de ces chrétiens ne me plaisent pas. Donc, ils parlent de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' aux gens, parce qu’ils veulent me mettre en colère. Ces chrétiens veulent que les gens pensent de grandes choses à leur sujet. Ils veulent être mieux que moi. Mais d’autres chrétiens sont bien avec moi. Ils parlent de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', parce qu’ils veulent m’aider. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils parlent de lui, parce qu’ils m’aiment. Ils savent que je suis ici dans cette prison à cause de Dieu. Et il veut de moi ceci : Que j’explique aux gens pourquoi la Bonne Nouvelle est vraie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ces autres chrétiens ne me plaisent pas. Ils parlent de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' à cause de mauvaises raisons. Ils parlent de lui, parce qu’ils veulent sembler importants. Ils ne veulent pas vraiment que les gens connaissent '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Ils veulent me donner des soucis pendant que je suis ici dans cette prison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais cela n’a pas d’importance ! Ils parlent tous de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' aux gens. C’est la chose la plus importante. Qu’ils parlent pour de bonnes ou mauvaises raisons, ils parlent de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '  ! Donc, à cause de cela, je suis heureux.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Oui, et je vais continuer d’être heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous priez pour moi et l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' m’aide. Donc, ce qui m’est arrivé aura de bons résultats pour moi. Dieu me sauvera. Donc, je sais que je vais continuer d’être heureux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je ne veux jamais faire quelque chose qui me fera honte. Je souhaite beaucoup ne jamais faire cela. J’espère que maintenant, comme toujours, je vais être courageux. Dans mon corps, je veux montrer que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est très grand. Je veux faire cela si je vis. Et je veux faire cela si je meurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est toute ma vie. Et si je meurs, ce sera encore mieux pour moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais si je continue de vivre dans ce corps, je serai capable de faire plus de bon travail. Ce travail aura de bons résultats. Alors peut‑être que je devrais continuer de vivre. Je ne sais pas si je vais vivre ou mourir. Je ne sais pas lequel choisir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je veux faire ces 2 choses : Je veux quitter ce monde et être avec le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Voilà une meilleure chose.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais comme vous avez besoin de moi, je pense que c’est mieux que je continue de vivre dans mon corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je suis sûr que vous avez besoin de moi. Donc, je sais que je vais continuer de vivre. Je vais continuer de vous aider tous. Je vais vous aider à croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de plus en plus. Alors, vous deviendrez plus heureux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Et, quand je serai avec vous, vous aurez une raison encore meilleure pour remercier Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Vous direz qu’il est très grand. Vous direz cela à cause de ce qu’il a fait pour moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous avez cru en la Bonne Nouvelle au sujet de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Vous devez continuer de vivre pour le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Vous devez faire tout ce que le peuple de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' devrait faire. Donc, si je viens vous rendre visite ou non, les gens vont me dire de bonnes choses sur vous. Je sais que vous continuez à croire fermement en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Vous serez comme une personne avec un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: ', parce que vous avez tous le même but. Vous allez travailler ensemble, afin que plus de gens croient en la Bonne Nouvelle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Vous n’aurez pas peur de vos ennemis. Mais, soyez courageux. Cela montrera à vos ennemis que Dieu va certainement les détruire. Mais il montrera aussi que Dieu va certainement vous sauver des conséquences du péché.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dieu vous a donné un travail spécial à faire comme les serviteurs de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Il veut vous faire croire en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Mais aussi, il a permis que vous ayez des difficultés au nom de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Vous faites le même combat que moi. Quand j’étais avec vous, je faisais ce combat. Vous avez vu cela. Et maintenant, les gens vous disent que je fais toujours ce combat.
