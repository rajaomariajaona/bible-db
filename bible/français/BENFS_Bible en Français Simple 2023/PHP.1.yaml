document_id: PHP.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Paul et Timothée écrivent une lettre
  - type: text
    content: Paul et Timothée, qui sont serviteurs de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', écrivent cette lettre. Nous vous écrivons, vous les gens de Dieu à Philippes. Vous êtes unis à Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Nous vous écrivons pour vous tous. Cela concerne aussi vos dirigeants et ceux qui les aident.
  - type: heading
    content: Paul prie pour les croyants de Philippes
  '10':
  - type: text
    content: 'Alors, vous pouvez choisir de faire ce qui est mieux. Donc, vous pouvez garder vos cœurs bien jusqu’au jour où le '
  - type: text
    content: Christ
  - type: text
    content: ' reviendra. Donc, ce jour‑là, vous ne ferez rien de mal.'
  '11':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' vous rendra complètement bons et justes avec Dieu. Jésus vous aidera également à faire beaucoup de bonnes choses. Ensuite, vous allez montrer à tous les grandes choses que Dieu a faites en vous. Alors, les gens diront que Dieu est très grand.'
  - type: heading
    content: Dieu a fait de bonnes choses à Paul dans une prison
  '12':
  - type: text
    content: 'Frères, je veux que vous sachiez ceci. Les choses qui me sont arrivées ont aidé plus de gens à connaître la Bonne Nouvelle de Dieu. '
  '13':
  - type: text
    content: 'Je suis dans une prison, parce que je suis le serviteur de '
  - type: text
    content: Christ
  - type: text
    content: '. Tous les soldats dans la maison du Roi le savent. Et tout le monde le sait. '
  '14':
  - type: text
    content: 'En plus, parce que je suis dans une prison, presque tous les autres chrétiens ici font confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Donc, ils sont devenus beaucoup plus courageux. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les a rendus courageux. C’est pour qu’ils n’aient pas peur de parler du message de Dieu aux gens.'
  '15':
  - type: text
    content: 'Il est vrai que certains de ces chrétiens ne me plaisent pas. Donc, ils parlent de '
  - type: text
    content: Christ
  - type: text
    content: ' aux gens, parce qu’ils veulent me mettre en colère. Ces chrétiens veulent que les gens pensent de grandes choses à leur sujet. Ils veulent être mieux que moi. Mais d’autres chrétiens sont bien avec moi. Ils parlent de '
  - type: text
    content: Christ
  - type: text
    content: ', parce qu’ils veulent m’aider. '
  '16':
  - type: text
    content: 'Ils parlent de lui, parce qu’ils m’aiment. Ils savent que je suis ici dans cette prison à cause de Dieu. Et il veut de moi ceci : Que j’explique aux gens pourquoi la Bonne Nouvelle est vraie.'
  '17':
  - type: text
    content: 'Ces autres chrétiens ne me plaisent pas. Ils parlent de '
  - type: text
    content: Christ
  - type: text
    content: ' à cause de mauvaises raisons. Ils parlent de lui, parce qu’ils veulent sembler importants. Ils ne veulent pas vraiment que les gens connaissent '
  - type: text
    content: Christ
  - type: text
    content: . Ils veulent me donner des soucis pendant que je suis ici dans cette prison.
  '18':
  - type: text
    content: Mais cela n’a pas d’importance ! Ils parlent tous de Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' aux gens. C’est la chose la plus importante. Qu’ils parlent pour de bonnes ou mauvaises raisons, ils parlent de '
  - type: text
    content: Christ
  - type: text
    content: '  ! Donc, à cause de cela, je suis heureux.'
  - type: text
    content: 'Oui, et je vais continuer d’être heureux. '
  '19':
  - type: text
    content: Vous priez pour moi et l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' m’aide. Donc, ce qui m’est arrivé aura de bons résultats pour moi. Dieu me sauvera. Donc, je sais que je vais continuer d’être heureux.'
  '2':
  - type: text
    content: 'Nous prions pour que Dieu notre Père et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' continuent d’être très gentils envers vous. Nous prions aussi qu’ils vous donnent la paix dans vos cœurs. '
  '20':
  - type: text
    content: 'Je ne veux jamais faire quelque chose qui me fera honte. Je souhaite beaucoup ne jamais faire cela. J’espère que maintenant, comme toujours, je vais être courageux. Dans mon corps, je veux montrer que le '
  - type: text
    content: Christ
  - type: text
    content: ' est très grand. Je veux faire cela si je vis. Et je veux faire cela si je meurs. '
  '21':
  - type: text
    content: Christ
  - type: text
    content: ' est toute ma vie. Et si je meurs, ce sera encore mieux pour moi.'
  '22':
  - type: text
    content: 'Mais si je continue de vivre dans ce corps, je serai capable de faire plus de bon travail. Ce travail aura de bons résultats. Alors peut‑être que je devrais continuer de vivre. Je ne sais pas si je vais vivre ou mourir. Je ne sais pas lequel choisir. '
  '23':
  - type: text
    content: 'Je veux faire ces 2 choses : Je veux quitter ce monde et être avec le '
  - type: text
    content: Christ
  - type: text
    content: . Voilà une meilleure chose.
  '24':
  - type: text
    content: Mais comme vous avez besoin de moi, je pense que c’est mieux que je continue de vivre dans mon corps.
  '25':
  - type: text
    content: 'Je suis sûr que vous avez besoin de moi. Donc, je sais que je vais continuer de vivre. Je vais continuer de vous aider tous. Je vais vous aider à croire en '
  - type: text
    content: Christ
  - type: text
    content: ' de plus en plus. Alors, vous deviendrez plus heureux.'
  '26':
  - type: text
    content: Et, quand je serai avec vous, vous aurez une raison encore meilleure pour remercier Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Vous direz qu’il est très grand. Vous direz cela à cause de ce qu’il a fait pour moi.
  '27':
  - type: text
    content: 'Vous avez cru en la Bonne Nouvelle au sujet de '
  - type: text
    content: Christ
  - type: text
    content: '. Vous devez continuer de vivre pour le '
  - type: text
    content: Christ
  - type: text
    content: '. Vous devez faire tout ce que le peuple de '
  - type: text
    content: Christ
  - type: text
    content: ' devrait faire. Donc, si je viens vous rendre visite ou non, les gens vont me dire de bonnes choses sur vous. Je sais que vous continuez à croire fermement en '
  - type: text
    content: Christ
  - type: text
    content: '. Vous serez comme une personne avec un '
  - type: text
    content: esprit
  - type: text
    content: ', parce que vous avez tous le même but. Vous allez travailler ensemble, afin que plus de gens croient en la Bonne Nouvelle.'
  '28':
  - type: text
    content: Vous n’aurez pas peur de vos ennemis. Mais, soyez courageux. Cela montrera à vos ennemis que Dieu va certainement les détruire. Mais il montrera aussi que Dieu va certainement vous sauver des conséquences du péché.
  '29':
  - type: text
    content: 'Dieu vous a donné un travail spécial à faire comme les serviteurs de '
  - type: text
    content: Christ
  - type: text
    content: '. Il veut vous faire croire en '
  - type: text
    content: Christ
  - type: text
    content: '. Mais aussi, il a permis que vous ayez des difficultés au nom de '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '3':
  - type: text
    content: Chaque fois que je pense à vous, je remercie mon Dieu à cause de vous.
  '30':
  - type: text
    content: Vous faites le même combat que moi. Quand j’étais avec vous, je faisais ce combat. Vous avez vu cela. Et maintenant, les gens vous disent que je fais toujours ce combat.
  '4':
  - type: text
    content: 'Je prie toujours pour vous. Chaque fois que je prie pour vous, je me sens heureux. '
  '5':
  - type: text
    content: 'Je suis heureux, parce que vous aidez les gens à connaître la Bonne Nouvelle au sujet de '
  - type: text
    content: Christ
  - type: text
    content: . Vous m’avez aidé dans ce travail. C’était depuis le premier jour que quelqu’un vous avait dit la Bonne Nouvelle. Vous le faites même maintenant.
  '6':
  - type: text
    content: Je sais que Dieu a commencé à faire de bonnes choses en vous. Et il continuera de travailler en vous jusqu’au jour où Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' reviendra. Alors Dieu finira ce travail en vous. Je suis sûr de cela.'
  '7':
  - type: text
    content: 'Il est bon pour moi de me sentir comme ça pour vous, parce que je vous aime beaucoup. Vous êtes des amis très spéciaux pour moi. Et, comme moi, continuez tous de savoir combien Dieu est très gentil envers nous. Vous le savez maintenant, alors que je suis dans cette prison. Et vous le saviez avant que je sois en prison. Ensuite, je suis libre et je pourrai enseigner la Bonne Nouvelle. J’ai expliqué aux gens pourquoi la Bonne Nouvelle est certainement vraie. Et tout cela, c’est la raison pour laquelle je vous aime. '
  '8':
  - type: text
    content: Dieu lui‑même sait que je veux beaucoup être avec vous tous. Je vous aime comme Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même vous aime.'
  '9':
  - type: text
    content: Voici ce que je prie pour vous. Je prie pour que vous ayez l’amour de plus en plus. Je prie pour que vous continuiez à connaître Dieu de plus en plus. Si vous faites cela, vous comprendrez les choses plus complètement. Vous comprendrez pourquoi les choses sont bonnes ou mauvaises.
