document_id: 1CO.11,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 11
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Copiez mon exemple, de la même manière que je copie l’exemple de Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rencontres chrétiennes
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi une femme doit se couvrir la tête. Cela montre qu’elle a un pouvoir sur sa tête. Cela rend les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' heureux.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais souvenez‑vous de ceci : Nous appartenons tous au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Les hommes et les femmes doivent s’entraider. Ils ne peuvent pas rester séparés. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il est vrai que Dieu a utilisé une partie de l’homme pour faire la première femme. Mais il est également vrai que les femmes donnent naissance aux hommes. N’oubliez pas que tout vient de Dieu lui‑même.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Réfléchissez à ceci : Si une femme prie Dieu mais qu’elle ne s’est pas couvert la tête, est‑ce correct ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme a les cheveux longs, cela lui fera honte. C’est clair. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si une femme a de longs cheveux, elle peut en être fière. Dieu a donné de beaux cheveux aux femmes pour se couvrir la tête. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certaines personnes voudront peut‑être discuter de cela. Mais je vous ai dit ce que nous faisons. Et tout le peuple de Dieu dans les différentes Églises fait la même chose.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: repas du Seigneur
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je dois vous enseigner autre chose sur vos réunions. Je ne vais pas vous louer, car il y a plus de mauvaises choses que de bonnes choses quand vous vous rencontrez. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Premièrement, j’entends qu’il y a des groupes séparés lorsque vous vous réunissez en tant que peuple de Dieu. Je crois qu’une partie de ce que j’ai entendu à votre sujet est vraie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peut‑être qu’il doit y avoir des groupes distincts parmi vous. Alors, tout le monde peut voir clairement quel groupe Dieu accepte comme étant juste !
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous loue, car vous vous souvenez de moi et de tout ce que je vous ai enseigné. Vous continuez d’obéir au message que je vous ai donné. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous vous réunissez, le repas que vous mangez n’est pas vraiment le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: repas du Seigneur
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous êtes prêts à manger, chacun de vous mange son propre repas. Vous n’attendez personne d’autre. Par conséquent, l’un d’entre vous peut avoir faim, tandis qu’une autre personne s’enivre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous voulez manger comme ça, vous avez vos propres maisons où vous pouvez manger et boire ! Mais, vous insultez le peuple de l’Église de Dieu. Vous rendez honteux les gens qui n’ont rien. Je ne peux pas vous louer pour ce que vous faites. Quoi que je puisse vous dire à ce sujet, je ne peux certainement pas vous louer.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici le message que j’ai reçu du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Je vous l’ai aussi dit. C’est ce qui s’est passé la nuit où les ennemis de Jésus l’ont saisi. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus a pris du pain à manger avec ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a remercié Dieu pour le pain, puis il l’a coupé en morceaux. Il a dit : Voici mon corps que je donne pour vous sauver. Mangez ce pain, pour que vous vous souveniez de moi.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir soupé, Jésus a pris une coupe de vin. Il a de nouveau parlé à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: '. Il a dit : Cette coupe montre mon sang qui coulera quand je mourrai. Dieu fait maintenant un nouvel accord pour sauver les gens à cause de ma mort. Chaque fois que vous buvez de la coupe de cette façon, faites‑le pour vous souvenir de moi.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque fois que vous mangez du pain et que vous buvez dans la coupe comme celle‑ci, vous montrez quelque chose. Vous montrez aux gens ce que signifie la mort du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . Vous devez continuer de le faire jusqu’à son retour.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisque c’est vrai, vous devez être prudents. Mangez le pain et buvez dans la coupe de la bonne façon. Dieu condamnera toute personne qui ne fait pas cela. Cette personne montre qu’elle ne respecte pas le corps du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et son sang qu’il a offert en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, chacun doit réfléchir sérieusement à la façon dont il mange le pain et qu’il boit dans la coupe. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute personne qui mange et boit, doit comprendre l’importance du corps de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Si quelqu’un ne le reconnaît pas, Dieu le punira. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quelque chose que je veux que vous sachiez : Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' a le pouvoir sur chaque homme, comme sa tête. De plus, le chef d’une femme est son mari. Et le chef de Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est Dieu.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi beaucoup d’entre vous sont faibles et malades. Certains d’entre vous sont même morts à cause de cela. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si nous réfléchissons bien à nous‑mêmes, alors Dieu ne nous punira pas.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a parfois besoin de nous punir. Quand il fait cela, il nous apprend à ne pas faire de mauvaises choses. Alors nous ne serons pas fautifs, comme d’autres personnes qui ne connaissent pas Dieu.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, mes amis chrétiens, soyez patients lorsque vous vous réunissez pour manger le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: repas du Seigneur
    - type: text
      text: '. Ne commencez pas à manger avant que tout le monde soit prêt. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous avez faim, vous devez manger à la maison avant de venir. Alors, lorsque vous vous rencontrerez, Dieu n’aura aucune raison de vous punir. Je parlerai d’autres choses quand je viendrai vous rendre visite.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, lorsque vous vous réunissez pour '
    - type: usfm
      marker: w
      children:
      - type: text
        text: adorer
    - type: text
      text: ' Dieu, souvenez‑vous de cela. Lorsqu’un homme prie Dieu ou dit un message de Dieu, il ne devra pas se couvrir la tête. S’il le fait, il ne respecte pas celui qui est son chef. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais lorsqu’une femme prie ou qu’elle dit un message de Dieu, elle doit se couvrir la tête. Si elle ne se couvre pas la tête, elle ne respecte pas celui qui est son chef. Ce serait aussi mauvais que si elle coupait tous les cheveux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si une femme refuse de se couvrir la tête, elle doit couper les cheveux. Mais si une femme n’a pas de cheveux ou si elle a les cheveux très courts, elle a très honte. Il vaut donc mieux qu’elle se couvre la tête lors de vos réunions.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes montrent ce que Dieu est, et ils montrent combien Dieu est grand. Donc, un homme ne doit pas se couvrir la tête lors de vos réunions. Mais une femme montre à quel point les hommes sont grands. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Dieu a fait des gens, il n’a pas utilisé une partie de la femme pour faire un homme. Dieu a créé l’homme d’abord. Puis il a fait une femme d’une partie de l’homme. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu n’a pas non plus fait l’homme pour aider la femme. Non, Dieu a fait que la femme aide l’homme. '
