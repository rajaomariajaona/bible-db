document_id: MAT.24,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 24
  - type: heading
    content: Jésus parle des choses qui se passeront bientôt
  - type: text
    content: 'Jésus a quitté le  '
  - type: text
    content: Temple
  - type: text
    content: ', et ses  '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés auprès de lui. Ils ont commencé à parler à Jésus sur les constructions du '
  - type: text
    content: Temple
  - type: text
    content: .
  '10':
  - type: text
    content: 'À ce moment‑là, beaucoup de gens abandonneront la  '
  - type: text
    content: foi
  - type: text
    content: '. Ils se livreront les uns les autres aux ennemis. Et ils se détesteront les uns les autres. '
  '11':
  - type: text
    content: 'Toujours à ce moment‑là, beaucoup de gens diront qu’ils sont des '
  - type: text
    content: prophètes
  - type: text
    content: '. Ce ne sera pas vrai, mais beaucoup de gens vont les croire. '
  '12':
  - type: text
    content: 'Beaucoup plus de gens feront des choses très mauvaises. Ce sera partout dans le monde. En raison de cela, beaucoup de gens ne s’aimeront plus les uns les autres. '
  '13':
  - type: text
    content: 'Mais vous devez toujours croire en moi. Alors Dieu vous sauvera. '
  '14':
  - type: text
    content: Les gens vont dire la Bonne Nouvelle du Royaume aux gens partout dans le monde. Les gens sauront que le message de Dieu est vrai. Et ils le diront à d’autres personnes dans tous les pays du monde. Alors seulement Dieu amènera le monde à une fin.
  '15':
  - type: text
    content: 'Il y a longtemps Daniel, le  '
  - type: text
    content: prophète
  - type: text
    content: ' avait écrit dans le livre de Dieu. Il avait dit qu’un jour, les gens mettront quelque chose de très mauvais dans le  '
  - type: text
    content: Temple
  - type: text
    content: '. Ils le mettront à la place spéciale de Dieu. Cela arrivera alors (quand vous lisez ceci, comprenez ce que ça signifie). '
  '16':
  - type: text
    content: Quand vous verrez cette très mauvaise chose, les gens en Judée fuiront vers les montagnes. Ils feront de telle sorte que leurs ennemis ne les attrapent pas.
  '17':
  - type: text
    content: Un homme qui sera sur le toit de sa maison ne descendra pas dans sa maison. Il ne perdra pas de temps pour aller chercher quoi que ce soit dans sa maison.
  '18':
  - type: text
    content: 'Les gens qui seront en dehors de la ville dans leurs champs ne rentreront pas à la maison. Ils ne perdront pas de temps. Donc, ils n’iront même pas chercher leurs '
  - type: text
    content: manteaux
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Ces jours seront mauvais pour les femmes qui auront des bébés en elles ! Et ces jours seront mauvais pour les femmes qui auront de petits bébés ! '
  '2':
  - type: text
    content: 'Alors Jésus leur a dit : Oui, vous pouvez voir toutes ces belles constructions maintenant. Mais je vous dis la vérité. Le jour viendra bientôt où les ennemis vont les détruire complètement. Ils ne laisseront pas une pierre sur une autre pierre. '
  '20':
  - type: text
    content: 'Vous devez prier Dieu et dire : S’il te plaît, ne laisse pas ces choses arriver en  '
  - type: text
    content: hiver
  - type: text
    content: '. S’il te plaît, ne laisse pas ces choses arriver le jour où nous nous reposons. '
  '21':
  - type: text
    content: 'Les gens auront de grands troubles. Depuis le temps que Dieu a fait le monde, rien de si mauvais n’est jamais arrivé. Après ce mauvais temps, de tels troubles n’arriveront plus jamais. '
  '22':
  - type: text
    content: 'Dieu rendra court ce temps de grands troubles. S’il ne fait pas cela, il n’y aurait plus personne encore en vie. Dieu rendra court ce temps des troubles. Ce sera pour aider le peuple qu’il avait choisi. '
  '23':
  - type: text
    content: 'Quelqu’un pourra vous dire : Regardez, voici le  '
  - type: text
    content: Christ
  - type: text
    content: '. Ou ils pourront dire : Regardez, le  '
  - type: text
    content: Christ
  - type: text
    content: ' est ici. Quand ils diront cela, ne les croyez pas. '
  '24':
  - type: text
    content: 'Certaines personnes vous diront : Je suis '
  - type: text
    content: Christ
  - type: text
    content: '. Dieu m’a envoyé. D’autres gens viendront et ils diront : Je suis un  '
  - type: text
    content: prophète
  - type: text
    content: ' de Dieu. Aucune des choses que ces gens diront ne sera vraie. Ils vont faire des choses puissantes que les gens ne peuvent pas faire habituellement. Ils vont essayer d’amener les gens à croire que leurs paroles sont vraies. Ils vont même essayer d’influencer le peuple que Dieu avait choisi. '
  '25':
  - type: text
    content: Donc soyez prudents ! Je vous ai dit toutes ces choses avant qu’elles n’arrivent.
  '26':
  - type: text
    content: 'Certaines personnes pourront vous dire : Regardez, le  '
  - type: text
    content: Christ
  - type: text
    content: ' est là‑bas dans le  '
  - type: text
    content: désert
  - type: text
    content: '. Mais il ne faut pas aller voir qui est là. Certaines personnes pourront vous dire : Regardez, le  '
  - type: text
    content: Christ
  - type: text
    content: ' est dans cette chambre secrète. Il ne faut pas les croire. '
  '27':
  - type: text
    content: 'L’éclair brille rapidement et il éclaire l’ensemble du '
  - type: text
    content: ciel
  - type: text
    content: '. Ce sera comme ça quand le Fils de l’homme retournera. '
  '28':
  - type: text
    content: Les grands oiseaux qui mangent de la viande arrivent ensemble. Ils arrivent tous là où il y a un corps mort.
  '29':
  - type: text
    content: Puis, après toutes ces mauvaises choses,
  - type: text
    content: le soleil deviendra sombre.
  - type: text
    content: La lune arrêtera de briller.
  - type: text
    content: 'Les étoiles tomberont du '
  - type: text
    content: ciel
  - type: text
    content: ', et Dieu détruira les puissances qui sont dans le  '
  - type: text
    content: ciel
  - type: text
    content: .
  '3':
  - type: text
    content: 'Jésus s’est alors assis sur la  '
  - type: text
    content: montagne des Oliviers
  - type: text
    content: '. Pendant que Jésus était seul, ses  '
  - type: text
    content: disciples
  - type: text
    content: ' sont allés auprès de lui. Ils lui ont dit : Dis‑nous quand cela arrivera. Qu’est‑ce que nous verrons juste avant ton retour ? Qu’est‑ce qui va montrer que Dieu finira bientôt le monde ?'
  '30':
  - type: text
    content: 'Alors les gens vont voir quelque chose de puissant dans le  '
  - type: text
    content: ciel
  - type: text
    content: '. Cela leur montrera que le Fils de l’homme viendra. Tous les gens dans le monde entier pleureront, parce qu’ils seront très tristes. Ensuite, les gens verront le Fils de l’homme venir sur les nuages. Il sera très puissant. Il sera grand et très beau. '
  '31':
  - type: text
    content: 'Le son d’une grande trompette se fera entendre. Le Fils de l’homme enverra les  '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu dans toutes les directions. Ils rassembleront tout le peuple que Dieu a choisi de toutes les parties du monde.'
  - type: heading
    content: Jésus raconte une histoire sur un  figuier
  '32':
  - type: text
    content: 'Je vais vous raconter une histoire sur un  '
  - type: text
    content: figuier
  - type: text
    content: '. Vous pouvez apprendre quelque chose de ce que l’arbre fait. Lorsque les nouvelles branches sur l’arbre commencent à pousser, les feuilles apparaissent. Alors, vous savez que l’été arrive bientôt. '
  '33':
  - type: text
    content: 'De la même façon, vous verrez toutes ces choses arriver. Ensuite, vous saurez que le Fils de l’homme viendra bientôt. Il est comme quelqu’un qui est à la porte. Il est prêt à venir. '
  '34':
  - type: text
    content: 'Les choses que je vous dis, sont vraies. Les gens qui vivent alors verront toutes ces choses. Ils ne vont pas mourir avant que toutes ces choses arrivent. '
  '35':
  - type: text
    content: 'Un jour, la terre et le  '
  - type: text
    content: ciel
  - type: text
    content: ' finiront. Mais mes paroles ne finiront jamais.'
  - type: heading
    content: Personne ne saura quand le Fils de l’homme reviendra au monde
  '36':
  - type: text
    content: 'Personne ne sait le jour ni le moment où toutes ces choses vont arriver. Même les  '
  - type: text
    content: anges
  - type: text
    content: ' dans le  '
  - type: text
    content: ciel
  - type: text
    content: ' ne savent pas. Même le Fils de Dieu ne sait pas. Seul Dieu le Père sait quand ces choses vont arriver. '
  '37':
  - type: text
    content: 'Ce sera comme au temps où Noé était vivant. Et ce sera la même chose lorsque le Fils de l’homme retournera. '
  '38':
  - type: text
    content: 'Dans les jours précédant la grande pluie, les gens mangeaient. Les gens buvaient. Les hommes mariaient les femmes et les femmes mariaient les hommes. Ils faisaient toutes ces choses jusqu’au jour où Noé est entré dans le grand bateau. '
  '39':
  - type: text
    content: 'Les gens ne savaient pas ce qui se passerait. Puis la pluie est tombée pendant une longue période et toutes ces personnes sont mortes dans les eaux profondes. Quand le Fils de l’homme reviendra, ce sera la même chose. '
  '4':
  - type: text
    content: 'Jésus a dit : Soyez prudents et regardez. Certaines personnes vous diront des choses qui ne sont pas vraies. Mais ne les croyez pas.'
  '40':
  - type: text
    content: 'Ce moment‑là sera comme au temps de Noé. 2 hommes vont travailler dans un champ. Dieu prendra un homme, mais il laissera l’autre homme derrière. '
  '41':
  - type: text
    content: 2 femmes travailleront ensemble dans le même lieu. Dieu prendra une femme, mais il laissera l’autre femme derrière.
  '42':
  - type: text
    content: 'Soyez prudents et regardez ! Vous ne connaissez pas le jour ou l’heure que votre  '
  - type: text
    content: Seigneur
  - type: text
    content: ' viendra. '
  '43':
  - type: text
    content: Vous pouvez être sûrs de cela. Le maître de la maison ne savait pas à quelle heure de la nuit un homme viendrait lui voler des choses. Si le maître savait le temps, il pourrait garder sa maison plus attentivement. Alors, l’homme ne pourrait pas voler sa maison.
  '44':
  - type: text
    content: Donc, vous devez également être prêts. Ce sera une surprise pour vous, quand le Fils de l’homme retournera.
  - type: heading
    content: Jésus raconte une histoire sur 2 serviteurs
  '45':
  - type: text
    content: 'Jésus a fini de les enseigner. Il leur a ensuite parlé d’un bon serviteur. Son maître sait qu’il va lui obéir. Il sait comment faire toute chose bien. Le maître le choisit pour diriger tous ses autres serviteurs. Il donnera à chacun la nourriture dont il a besoin chaque jour. '
  '46':
  - type: text
    content: 'Le maître reviendra à la maison. Et il verra ce serviteur obéissant à tout ce qu’il lui a dit de faire. Ainsi, le maître sera gentil avec son serviteur. '
  '47':
  - type: text
    content: 'Je vous dis la vérité. Le maître va alors demander au serviteur de régner sur tout dans sa maison. '
  '48':
  - type: text
    content: 'Mais peut‑être le serviteur est mauvais et il se dit : Mon maître traîne à venir.'
  '49':
  - type: text
    content: Alors, il commence à frapper les autres serviteurs. Il frappe à la fois les hommes et les femmes. Il mange trop. Il boit aussi avec des ivrognes.
  '5':
  - type: text
    content: 'Beaucoup de gens vont venir et dire : Je suis le  '
  - type: text
    content: Christ
  - type: text
    content: '. Beaucoup d’autres personnes croiront que cela est vrai. '
  '50':
  - type: text
    content: 'Alors le maître de ce serviteur viendra chez lui et il va surprendre le serviteur. Il ne pensait pas que son maître pourrait rentrer à la maison ce jour‑là ou à cette heure‑là. '
  '51':
  - type: text
    content: Alors le maître va le punir beaucoup. Il mettra le serviteur avec ceux qui ne lui obéissent pas. Les gens de cet endroit vont pleurer. Et ils vont grincer leurs dents ensemble, parce qu’ils seront en colère.
  '6':
  - type: text
    content: 'Vous entendrez les bruits des guerres près de là où vous êtes. Vous entendrez parler des gens se battre dans des endroits très éloignés. N’ayez pas peur. Ces choses doivent se réaliser en premier lieu, mais ce ne sera pas encore la fin de tout. '
  '7':
  - type: text
    content: 'Les gens d’un pays vont attaquer les gens d’un autre pays. Des rois et leur peuple vont se battre contre les autres rois et leur peuple. Le sol tremblera dans de nombreux endroits différents. Certaines personnes n’auront pas de nourriture à manger. '
  '8':
  - type: text
    content: Ces choses seront comme les premières douleurs qui commencent avant la naissance du bébé.
  '9':
  - type: text
    content: 'Ensuite, les gens vous arrêteront, parce que vous croyez en moi. Ils puniront certains d’entre vous. Ils vont aussi tuer certains d’entre vous. Certaines personnes dans chaque pays vous détesteront, parce que vous m’obéissez. '
