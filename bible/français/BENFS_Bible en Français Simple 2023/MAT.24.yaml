document_id: MAT.24
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 24
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle des choses qui se passeront bientôt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus a quitté le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ', et ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés auprès de lui. Ils ont commencé à parler à Jésus sur les constructions du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Jésus leur a dit : Oui, vous pouvez voir toutes ces belles constructions maintenant. Mais je vous dis la vérité. Le jour viendra bientôt où les ennemis vont les détruire complètement. Ils ne laisseront pas une pierre sur une autre pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus s’est alors assis sur la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: montagne des Oliviers
  - type: text
    text: '. Pendant que Jésus était seul, ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont allés auprès de lui. Ils lui ont dit : Dis‑nous quand cela arrivera. Qu’est‑ce que nous verrons juste avant ton retour ? Qu’est‑ce qui va montrer que Dieu finira bientôt le monde ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus a dit : Soyez prudents et regardez. Certaines personnes vous diront des choses qui ne sont pas vraies. Mais ne les croyez pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Beaucoup de gens vont venir et dire : Je suis le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Beaucoup d’autres personnes croiront que cela est vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous entendrez les bruits des guerres près de là où vous êtes. Vous entendrez parler des gens se battre dans des endroits très éloignés. N’ayez pas peur. Ces choses doivent se réaliser en premier lieu, mais ce ne sera pas encore la fin de tout. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les gens d’un pays vont attaquer les gens d’un autre pays. Des rois et leur peuple vont se battre contre les autres rois et leur peuple. Le sol tremblera dans de nombreux endroits différents. Certaines personnes n’auront pas de nourriture à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ces choses seront comme les premières douleurs qui commencent avant la naissance du bébé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ensuite, les gens vous arrêteront, parce que vous croyez en moi. Ils puniront certains d’entre vous. Ils vont aussi tuer certains d’entre vous. Certaines personnes dans chaque pays vous détesteront, parce que vous m’obéissez. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'À ce moment‑là, beaucoup de gens abandonneront la  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: foi
  - type: text
    text: '. Ils se livreront les uns les autres aux ennemis. Et ils se détesteront les uns les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Toujours à ce moment‑là, beaucoup de gens diront qu’ils sont des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: '. Ce ne sera pas vrai, mais beaucoup de gens vont les croire. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Beaucoup plus de gens feront des choses très mauvaises. Ce sera partout dans le monde. En raison de cela, beaucoup de gens ne s’aimeront plus les uns les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais vous devez toujours croire en moi. Alors Dieu vous sauvera. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les gens vont dire la Bonne Nouvelle du Royaume aux gens partout dans le monde. Les gens sauront que le message de Dieu est vrai. Et ils le diront à d’autres personnes dans tous les pays du monde. Alors seulement Dieu amènera le monde à une fin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il y a longtemps Daniel, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' avait écrit dans le livre de Dieu. Il avait dit qu’un jour, les gens mettront quelque chose de très mauvais dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Ils le mettront à la place spéciale de Dieu. Cela arrivera alors (quand vous lisez ceci, comprenez ce que ça signifie). '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand vous verrez cette très mauvaise chose, les gens en Judée fuiront vers les montagnes. Ils feront de telle sorte que leurs ennemis ne les attrapent pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un homme qui sera sur le toit de sa maison ne descendra pas dans sa maison. Il ne perdra pas de temps pour aller chercher quoi que ce soit dans sa maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les gens qui seront en dehors de la ville dans leurs champs ne rentreront pas à la maison. Ils ne perdront pas de temps. Donc, ils n’iront même pas chercher leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteaux
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ces jours seront mauvais pour les femmes qui auront des bébés en elles ! Et ces jours seront mauvais pour les femmes qui auront de petits bébés ! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous devez prier Dieu et dire : S’il te plaît, ne laisse pas ces choses arriver en  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: hiver
  - type: text
    text: '. S’il te plaît, ne laisse pas ces choses arriver le jour où nous nous reposons. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les gens auront de grands troubles. Depuis le temps que Dieu a fait le monde, rien de si mauvais n’est jamais arrivé. Après ce mauvais temps, de tels troubles n’arriveront plus jamais. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dieu rendra court ce temps de grands troubles. S’il ne fait pas cela, il n’y aurait plus personne encore en vie. Dieu rendra court ce temps des troubles. Ce sera pour aider le peuple qu’il avait choisi. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quelqu’un pourra vous dire : Regardez, voici le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Ou ils pourront dire : Regardez, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est ici. Quand ils diront cela, ne les croyez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Certaines personnes vous diront : Je suis '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dieu m’a envoyé. D’autres gens viendront et ils diront : Je suis un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophète
  - type: text
    text: ' de Dieu. Aucune des choses que ces gens diront ne sera vraie. Ils vont faire des choses puissantes que les gens ne peuvent pas faire habituellement. Ils vont essayer d’amener les gens à croire que leurs paroles sont vraies. Ils vont même essayer d’influencer le peuple que Dieu avait choisi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Donc soyez prudents ! Je vous ai dit toutes ces choses avant qu’elles n’arrivent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Certaines personnes pourront vous dire : Regardez, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est là‑bas dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. Mais il ne faut pas aller voir qui est là. Certaines personnes pourront vous dire : Regardez, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est dans cette chambre secrète. Il ne faut pas les croire. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’éclair brille rapidement et il éclaire l’ensemble du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Ce sera comme ça quand le Fils de l’homme retournera. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les grands oiseaux qui mangent de la viande arrivent ensemble. Ils arrivent tous là où il y a un corps mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Puis, après toutes ces mauvaises choses,
- type: usfm
  marker: p
  children:
  - type: text
    text: le soleil deviendra sombre.
- type: usfm
  marker: p
  children:
  - type: text
    text: La lune arrêtera de briller.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les étoiles tomberont du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ', et Dieu détruira les puissances qui sont dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Alors les gens vont voir quelque chose de puissant dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Cela leur montrera que le Fils de l’homme viendra. Tous les gens dans le monde entier pleureront, parce qu’ils seront très tristes. Ensuite, les gens verront le Fils de l’homme venir sur les nuages. Il sera très puissant. Il sera grand et très beau. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le son d’une grande trompette se fera entendre. Le Fils de l’homme enverra les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' de Dieu dans toutes les directions. Ils rassembleront tout le peuple que Dieu a choisi de toutes les parties du monde.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus raconte une histoire sur un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Je vais vous raconter une histoire sur un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: figuier
  - type: text
    text: '. Vous pouvez apprendre quelque chose de ce que l’arbre fait. Lorsque les nouvelles branches sur l’arbre commencent à pousser, les feuilles apparaissent. Alors, vous savez que l’été arrive bientôt. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'De la même façon, vous verrez toutes ces choses arriver. Ensuite, vous saurez que le Fils de l’homme viendra bientôt. Il est comme quelqu’un qui est à la porte. Il est prêt à venir. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les choses que je vous dis, sont vraies. Les gens qui vivent alors verront toutes ces choses. Ils ne vont pas mourir avant que toutes ces choses arrivent. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Un jour, la terre et le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' finiront. Mais mes paroles ne finiront jamais.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Personne ne saura quand le Fils de l’homme reviendra au monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Personne ne sait le jour ni le moment où toutes ces choses vont arriver. Même les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' ne savent pas. Même le Fils de Dieu ne sait pas. Seul Dieu le Père sait quand ces choses vont arriver. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ce sera comme au temps où Noé était vivant. Et ce sera la même chose lorsque le Fils de l’homme retournera. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dans les jours précédant la grande pluie, les gens mangeaient. Les gens buvaient. Les hommes mariaient les femmes et les femmes mariaient les hommes. Ils faisaient toutes ces choses jusqu’au jour où Noé est entré dans le grand bateau. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Les gens ne savaient pas ce qui se passerait. Puis la pluie est tombée pendant une longue période et toutes ces personnes sont mortes dans les eaux profondes. Quand le Fils de l’homme reviendra, ce sera la même chose. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ce moment‑là sera comme au temps de Noé. 2 hommes vont travailler dans un champ. Dieu prendra un homme, mais il laissera l’autre homme derrière. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 2 femmes travailleront ensemble dans le même lieu. Dieu prendra une femme, mais il laissera l’autre femme derrière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Soyez prudents et regardez ! Vous ne connaissez pas le jour ou l’heure que votre  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' viendra. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Vous pouvez être sûrs de cela. Le maître de la maison ne savait pas à quelle heure de la nuit un homme viendrait lui voler des choses. Si le maître savait le temps, il pourrait garder sa maison plus attentivement. Alors, l’homme ne pourrait pas voler sa maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Donc, vous devez également être prêts. Ce sera une surprise pour vous, quand le Fils de l’homme retournera.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus raconte une histoire sur 2 serviteurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jésus a fini de les enseigner. Il leur a ensuite parlé d’un bon serviteur. Son maître sait qu’il va lui obéir. Il sait comment faire toute chose bien. Le maître le choisit pour diriger tous ses autres serviteurs. Il donnera à chacun la nourriture dont il a besoin chaque jour. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Le maître reviendra à la maison. Et il verra ce serviteur obéissant à tout ce qu’il lui a dit de faire. Ainsi, le maître sera gentil avec son serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Je vous dis la vérité. Le maître va alors demander au serviteur de régner sur tout dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Mais peut‑être le serviteur est mauvais et il se dit : Mon maître traîne à venir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Alors, il commence à frapper les autres serviteurs. Il frappe à la fois les hommes et les femmes. Il mange trop. Il boit aussi avec des ivrognes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Alors le maître de ce serviteur viendra chez lui et il va surprendre le serviteur. Il ne pensait pas que son maître pourrait rentrer à la maison ce jour‑là ou à cette heure‑là. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Alors le maître va le punir beaucoup. Il mettra le serviteur avec ceux qui ne lui obéissent pas. Les gens de cet endroit vont pleurer. Et ils vont grincer leurs dents ensemble, parce qu’ils seront en colère.
