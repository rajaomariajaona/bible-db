document_id: 1TI.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Les chrétiens doivent prier pour tout le monde
  - type: text
    content: 'Voici donc ce que je veux te demander d’abord. Merci de prier pour tous. Demande à Dieu de fournir ce dont ils ont besoin. Demande à Dieu de les aider. Remercie Dieu pour ce qu’il fait pour tout le monde. '
  '10':
  - type: text
    content: Les femmes chrétiennes ne doivent pas s’habiller comme ça. Mais, leur vie doit montrer qu’elles font de bonnes choses. C’est la bonne façon pour elles de vivre, car elles disent qu’elles respectent Dieu.
  '11':
  - type: text
    content: 'Lorsque vous vous réunissez, une femme doit apprendre tranquillement. Elle doit respecter les dirigeants qui enseignent dans l’Église. '
  '12':
  - type: text
    content: 'Une femme ne peut pas enseigner des hommes. Une femme ne peut pas avoir le pouvoir sur les hommes. Mais, elle doit écouter tranquillement. '
  '13':
  - type: text
    content: 'Je dis cela parce que Dieu a créé Adam d’abord. Puis il a fait Ève. '
  '14':
  - type: text
    content: C’est Ève, et non Adam, qui a cru aux mensonges que Satan lui a dits. Parce qu’elle a cru complètement à Satan, elle a fait ce que Dieu avait interdit.
  '15':
  - type: text
    content: Mais comme les femmes donnent naissance à des enfants, Dieu les sauvera. Elles doivent continuer de faire confiance en Dieu. Elles doivent continuer d’aimer les autres. Elles doivent vivre d’une manière qui montre qu’elles appartiennent à Dieu. Elles doivent bien réfléchir à la façon dont elles vivent. Alors Dieu les sauvera.
  '2':
  - type: text
    content: 'Prie de cette manière pour les rois et pour tous les dirigeants. Prie aussi pour les personnes qui ont le pouvoir. Prie pour que Dieu les aide. Alors, nous pourrons ainsi mener notre vie sans problème ni danger. Ensuite, nous pouvons vivre d’une bonne manière qui respecte Dieu et les autres. '
  '3':
  - type: text
    content: 'Il est bon que nous priions comme ça. Cela rend Dieu heureux. C’est lui qui nous sauve. '
  '4':
  - type: text
    content: Et il veut sauver tout le monde. Il veut que tout le monde sache son message et l’accepte comme vrai.
  '5':
  - type: text
    content: Il n’y a qu’un seul Dieu. Il n’y a aussi qu’une seule personne qui rassemble Dieu et les gens. Cette personne est Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', qui est devenu lui‑même un homme. '
  '6':
  - type: text
    content: 'Il est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' au nom de tous. Il a payé la dette de leurs péchés pour les libérer. Il est mort au bon moment pour que Dieu montre clairement son but. '
  '7':
  - type: text
    content: 'Dieu m’a choisi comme '
  - type: text
    content: apôtre
  - type: text
    content: ' pour transmettre ce même message aux gens. Je te dis ce qui est vrai. Je ne dis pas de mensonges ! Oui, il m’a envoyé pour enseigner son vrai message aux païens, afin qu’ils croient en lui.'
  '8':
  - type: text
    content: Ainsi donc, dans tous les lieux où vous vous réunissez, je veux que les hommes prient. Les hommes qui lèvent les mains et prient doivent être ceux qui mènent une bonne vie. Ils ne doivent pas être des gens en colère ou qui se querellent avec les autres.
  - type: heading
    content: Les femmes chrétiennes doivent également vivre dans le bon sens
  '9':
  - type: text
    content: 'Quant aux femmes, je veux qu’elles aussi s’habillent correctement. Elles doivent réfléchir attentivement aux vêtements qu’elles portent. Elles ne doivent pas faire honte. Qu’est‑ce qui rend une femme belle ? Ce n’est pas la façon particulière dont elle prépare ses cheveux. Ce ne sont pas les objets en or qu’elle porte, ni les belles pierres. Ce ne sont pas ses vêtements coûteux. '
