document_id: 1TI.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chrétiens doivent prier pour tout le monde
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici donc ce que je veux te demander d’abord. Merci de prier pour tous. Demande à Dieu de fournir ce dont ils ont besoin. Demande à Dieu de les aider. Remercie Dieu pour ce qu’il fait pour tout le monde. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les femmes chrétiennes ne doivent pas s’habiller comme ça. Mais, leur vie doit montrer qu’elles font de bonnes choses. C’est la bonne façon pour elles de vivre, car elles disent qu’elles respectent Dieu.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous vous réunissez, une femme doit apprendre tranquillement. Elle doit respecter les dirigeants qui enseignent dans l’Église. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une femme ne peut pas enseigner des hommes. Une femme ne peut pas avoir le pouvoir sur les hommes. Mais, elle doit écouter tranquillement. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dis cela parce que Dieu a créé Adam d’abord. Puis il a fait Ève. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est Ève, et non Adam, qui a cru aux mensonges que Satan lui a dits. Parce qu’elle a cru complètement à Satan, elle a fait ce que Dieu avait interdit.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais comme les femmes donnent naissance à des enfants, Dieu les sauvera. Elles doivent continuer de faire confiance en Dieu. Elles doivent continuer d’aimer les autres. Elles doivent vivre d’une manière qui montre qu’elles appartiennent à Dieu. Elles doivent bien réfléchir à la façon dont elles vivent. Alors Dieu les sauvera.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prie de cette manière pour les rois et pour tous les dirigeants. Prie aussi pour les personnes qui ont le pouvoir. Prie pour que Dieu les aide. Alors, nous pourrons ainsi mener notre vie sans problème ni danger. Ensuite, nous pouvons vivre d’une bonne manière qui respecte Dieu et les autres. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est bon que nous priions comme ça. Cela rend Dieu heureux. C’est lui qui nous sauve. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il veut sauver tout le monde. Il veut que tout le monde sache son message et l’accepte comme vrai.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’y a qu’un seul Dieu. Il n’y a aussi qu’une seule personne qui rassemble Dieu et les gens. Cette personne est Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', qui est devenu lui‑même un homme. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est mort en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' au nom de tous. Il a payé la dette de leurs péchés pour les libérer. Il est mort au bon moment pour que Dieu montre clairement son but. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu m’a choisi comme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtre
    - type: text
      text: ' pour transmettre ce même message aux gens. Je te dis ce qui est vrai. Je ne dis pas de mensonges ! Oui, il m’a envoyé pour enseigner son vrai message aux païens, afin qu’ils croient en lui.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi donc, dans tous les lieux où vous vous réunissez, je veux que les hommes prient. Les hommes qui lèvent les mains et prient doivent être ceux qui mènent une bonne vie. Ils ne doivent pas être des gens en colère ou qui se querellent avec les autres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les femmes chrétiennes doivent également vivre dans le bon sens
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux femmes, je veux qu’elles aussi s’habillent correctement. Elles doivent réfléchir attentivement aux vêtements qu’elles portent. Elles ne doivent pas faire honte. Qu’est‑ce qui rend une femme belle ? Ce n’est pas la façon particulière dont elle prépare ses cheveux. Ce ne sont pas les objets en or qu’elle porte, ni les belles pierres. Ce ne sont pas ses vêtements coûteux. '
