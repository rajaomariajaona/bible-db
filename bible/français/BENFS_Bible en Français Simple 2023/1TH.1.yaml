document_id: 1TH.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: text
    content: Cette lettre vient de Paul, Sylvain et Timothée.
  - type: text
    content: 'Nous écrivons aux gens de l’Église de Thessalonique. Vous appartenez à Dieu le Père et au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  - type: text
    content: 'Nous prions pour que Dieu continue de vous aider. Nous prions pour qu’il vous donne la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: .
  '10':
  - type: text
    content: 'Ils nous disent aussi que vous attendez patiemment le retour du Fils de Dieu du '
  - type: text
    content: ciel
  - type: text
    content: . Dieu l’a ressuscité après sa mort sur la croix. C’est Jésus. Il nous sauve de la punition de Dieu qui viendra un jour.
  '2':
  - type: text
    content: 'Nous remercions toujours Dieu pour vous tous. Chaque fois que nous prions, nous prions pour vous. '
  '3':
  - type: text
    content: 'Lorsque nous prions notre Père Dieu, nous nous souvenons de la façon dont vous vivez. Vous faites de bonnes choses, parce que vous croyez en '
  - type: text
    content: Christ
  - type: text
    content: '. Vous travaillez beaucoup pour aider les autres, parce que vous les aimez et vous aimez Dieu. Vous êtes aussi forts et patients, parce que vous croyez beaucoup en notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: .
  '4':
  - type: text
    content: 'Nos amis chrétiens, Dieu vous aime. Nous savons qu’il vous a choisis pour lui appartenir. '
  '5':
  - type: text
    content: 'Lorsque nous vous avons annoncé la Bonne Nouvelle de Dieu, nous ne vous avons pas dit seulement les paroles. Dieu nous a aidés par sa puissance et par le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: . En conséquence, vous étiez sûrs que notre message était vrai. Vous savez aussi que nous avons bien vécu parmi vous. Nous étions venus pour vous aider.
  '6':
  - type: text
    content: 'Dans votre vie aussi, vous avez copié notre exemple et l’exemple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. Lorsque vous avez cru à notre message, les gens vous ont causé beaucoup de problèmes. Mais grâce au '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu, vous êtes très heureux. '
  '7':
  - type: text
    content: En conséquence, vous êtes devenus un exemple pour tous les croyants de Macédoine et d’Achaïe.
  '8':
  - type: text
    content: 'Grâce à vous, les gens dans de nombreux endroits ont clairement entendu le message concernant le '
  - type: text
    content: Seigneur
  - type: text
    content: . Ce ne sont pas seulement les Macédoniens et les Achaïens qui l’ont entendu. Partout, les gens savent maintenant comment vous faites confiance en Dieu. Ainsi, lorsque nous avons voyagé dans des endroits différents, nous n’avons rien à dire aux gens.
  '9':
  - type: text
    content: Ces gens parlent eux‑mêmes de la façon dont vous nous avez acceptés. Ils nous disent comment vous avez laissé d’
  - type: text
    content: adorer
  - type: text
    content: ' de faux dieux. Ils savent que vous servez maintenant le vrai Dieu qui vit toujours. '
