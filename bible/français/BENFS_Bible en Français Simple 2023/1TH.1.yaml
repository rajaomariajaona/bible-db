document_id: 1TH.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cette lettre vient de Paul, Sylvain et Timothée.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nous écrivons aux gens de l’Église de Thessalonique. Vous appartenez à Dieu le Père et au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Nous prions pour que Dieu continue de vous aider. Nous prions pour qu’il vous donne la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous remercions toujours Dieu pour vous tous. Chaque fois que nous prions, nous prions pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lorsque nous prions notre Père Dieu, nous nous souvenons de la façon dont vous vivez. Vous faites de bonnes choses, parce que vous croyez en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Vous travaillez beaucoup pour aider les autres, parce que vous les aimez et vous aimez Dieu. Vous êtes aussi forts et patients, parce que vous croyez beaucoup en notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nos amis chrétiens, Dieu vous aime. Nous savons qu’il vous a choisis pour lui appartenir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque nous vous avons annoncé la Bonne Nouvelle de Dieu, nous ne vous avons pas dit seulement les paroles. Dieu nous a aidés par sa puissance et par le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: . En conséquence, vous étiez sûrs que notre message était vrai. Vous savez aussi que nous avons bien vécu parmi vous. Nous étions venus pour vous aider.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dans votre vie aussi, vous avez copié notre exemple et l’exemple du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Jésus. Lorsque vous avez cru à notre message, les gens vous ont causé beaucoup de problèmes. Mais grâce au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu, vous êtes très heureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En conséquence, vous êtes devenus un exemple pour tous les croyants de Macédoine et d’Achaïe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Grâce à vous, les gens dans de nombreux endroits ont clairement entendu le message concernant le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Ce ne sont pas seulement les Macédoniens et les Achaïens qui l’ont entendu. Partout, les gens savent maintenant comment vous faites confiance en Dieu. Ainsi, lorsque nous avons voyagé dans des endroits différents, nous n’avons rien à dire aux gens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ces gens parlent eux‑mêmes de la façon dont vous nous avez acceptés. Ils nous disent comment vous avez laissé d’
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' de faux dieux. Ils savent que vous servez maintenant le vrai Dieu qui vit toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils nous disent aussi que vous attendez patiemment le retour du Fils de Dieu du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: . Dieu l’a ressuscité après sa mort sur la croix. C’est Jésus. Il nous sauve de la punition de Dieu qui viendra un jour.
