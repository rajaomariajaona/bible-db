document_id: MAT.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Jésus enseigne ses  disciples
  - type: text
    content: 'Jésus a vu beaucoup de gens. Ils le suivaient. Alors, Jésus est monté sur une montagne. Il s’est assis là‑bas. Après cela, les  '
  - type: text
    content: disciples
  - type: text
    content: ' de Jésus sont allés près de lui.  '
  '10':
  - type: text
    content: 'Certaines personnes seront maltraitées, parce qu’elles obéissent à Dieu. Ces personnes seront heureuses, parce qu’elles font partie du '
  - type: text
    content: Royaume des cieux
  - type: text
    content: .
  '11':
  - type: text
    content: 'Vous serez heureux quand les gens diront de mauvaises choses contre vous. Parfois, les gens vous feront du mal. Parfois, les gens vont dire des choses contre vous. Et pourtant, ces choses ne seront pas vraies. Les gens diront ces choses contre vous, parce que vous êtes mes  '
  - type: text
    content: disciples
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Soyez contents et heureux de cela. Dieu vous récompensera grandement au '
  - type: text
    content: ciel
  - type: text
    content: '. De la même façon, de mauvaises personnes avaient maltraité les  '
  - type: text
    content: prophètes
  - type: text
    content: ' avant vous. '
  - type: heading
    content: Les  disciples de Jésus sont comme du sel et la lumière
  '13':
  - type: text
    content: Vous êtes comme le sel parmi tous les gens qui vivent sur terre. Le sel est bon. Mais parfois, il perd le goût du sel. Alors ce sel ne peut plus être bon. Par conséquent, les gens ne peuvent plus l’utiliser. Ils vont le jeter à l’extérieur et marcher dessus.
  '14':
  - type: text
    content: 'Vous êtes comme la lumière au monde. Tout le monde peut voir une ville que les gens ont construite sur une colline. '
  '15':
  - type: text
    content: 'Personne n’allume une lampe pour la mettre sous un bol. Mais il va mettre la lampe sur un endroit haut. Alors elle va éclairer tout le monde dans la maison. '
  '16':
  - type: text
    content: De la même façon, votre lumière brille pour que les gens la voient. Ils glorifieront ainsi votre Père qui est aux cieux.
  - type: heading
    content: Jésus parle des lois que Moïse avait données aux Juifs
  '17':
  - type: text
    content: 'Je ne suis pas venu supprimer la loi. Je ne suis pas venu pour supprimer ce que les  '
  - type: text
    content: prophètes
  - type: text
    content: ' avaient écrit. Mais je suis venu accomplir tout cela. '
  '18':
  - type: text
    content: 'Je vous dis la vérité : Le  '
  - type: text
    content: ciel
  - type: text
    content: ' et la terre resteront pendant longtemps. Mais tout le temps qu’ils seront là, la loi restera également. Il n’y aura même pas un petit changement dans la loi. Tout ce qui est écrit dans la loi se réalisera. '
  '19':
  - type: text
    content: 'Quelqu’un peut enlever quelque chose des commandements de Dieu. Il peut aussi enseigner cela à d’autres gens. Alors il sera le plus petit dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: '. Mais quelqu’un peut obéir à tous les commandements de Dieu. Il peut aussi enseigner cela à d’autres gens. Alors il sera le plus grand dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: '. '
  '2':
  - type: text
    content: Et Jésus commençait à les enseigner.
  '20':
  - type: text
    content: 'Je vous dis ceci : Vous devez être mieux que les  '
  - type: text
    content: Pharisiens
  - type: text
    content: '. Vous devez être mieux que les enseignants de la loi de Dieu. Sinon, vous n’entrerez pas dans le  '
  - type: text
    content: Royaume des cieux
  - type: text
    content: .
  - type: heading
    content: Jésus parle des gens en colère
  '21':
  - type: text
    content: 'Vous avez entendu qu’on avait dit à vos ancêtres : Ne tue pas une personne. Et toute personne qui tue sera devant un  '
  - type: text
    content: juge
  - type: text
    content: '. Ce '
  - type: text
    content: juge
  - type: text
    content: ' dira qu’elle a fait quelque chose de mal. Et il la punira. '
  '22':
  - type: text
    content: 'Mais voici ce que moi, je vous dis : Toute personne qui se met en colère contre son frère sera jugée. Le  '
  - type: text
    content: juge
  - type: text
    content: ' pourra condamner cette personne. Quelqu’un peut appeler son frère imbécile. Alors les dirigeants '
  - type: text
    content: Juifs
  - type: text
    content: ' le jugeront. Ils pourront dire qu’il doit être puni. Quelqu’un peut dire à son frère : Tu es fou. Alors Dieu le jugera. Dieu lui dira : Tu devras aller dans le feu de l’enfer.'
  '23':
  - type: text
    content: 'Peut‑être que tu vas donner une offrande à Dieu. Alors tu l’apportes à l’autel dans le  '
  - type: text
    content: Temple
  - type: text
    content: '. Mais tu te souviens que ton frère a quelque chose contre toi.  '
  '24':
  - type: text
    content: Tu dois laisser ton offrande là devant l’autel. Et tu dois d’abord aller chercher ton frère. Dis‑lui que tu es triste. Ensuite, tu peux aussi devenir ami avec lui à nouveau. Après cela, tu peux revenir donner ton offrande à Dieu.
  '25':
  - type: text
    content: 'Une personne peut dire que tu as fait quelque chose de mal. Elle va donc t’amener au '
  - type: text
    content: juge
  - type: text
    content: '. Fais tout pour t’entendre immédiatement avec cette personne. Fais‑le, même si tu vas avec elle au '
  - type: text
    content: juge
  - type: text
    content: '. Fais‑le pour qu’elle ne parle pas contre toi au '
  - type: text
    content: juge
  - type: text
    content: '. Le  '
  - type: text
    content: juge
  - type: text
    content: ' peut convenir avec cette personne que tu as fait une mauvaise chose. Ensuite, le  '
  - type: text
    content: juge
  - type: text
    content: ' va te livrer au policier. Il te mettra en prison. '
  '26':
  - type: text
    content: 'Je te dis la vérité : Tu resteras en prison. Et pour te libérer, tu paieras jusqu’au dernier centime.'
  - type: heading
    content: Jésus enseigne les gens à ne pas faire de mauvaises choses
  '27':
  - type: text
    content: 'Vous avez entendu ce que Dieu avait dit il y a longtemps : Ne couche pas avec la femme d’un autre homme. '
  '28':
  - type: text
    content: 'Mais je vous dis ceci : Un homme peut regarder une femme qui n’est pas sa femme. Et il veut coucher avec elle. Alors cet homme a déjà couché avec cette femme. Il a fait ce mal dans son  '
  - type: text
    content: esprit
  - type: text
    content: .
  '29':
  - type: text
    content: 'Ton œil droit peut t’amener à faire du mal. Alors tu devras l’enlever. Tu devras le jeter. Tu vas perdre un œil. C’est mieux. Mais il est bien pire si Dieu te jette avec tes 2 yeux dans l’enfer. '
  '3':
  - type: text
    content: 'Jésus disait ceci : Certaines personnes savent qu’elles ont beaucoup besoin de Dieu. Dieu les rendra heureuses, parce qu’elles feront partie du '
  - type: text
    content: Royaume des cieux
  - type: text
    content: .
  '30':
  - type: text
    content: Ta main droite peut t’amener à faire du mal. Tu devras la couper. Tu devras la jeter. Tu vas perdre une main. C’est mieux. Mais il est bien pire si Dieu t’envoie avec tes 2 mains dans l’enfer.
  - type: heading
    content: Un homme peut‑il renvoyer sa femme du mariage ?
  '31':
  - type: text
    content: 'Vous avez entendu dire ceci : Tout homme qui veut renvoyer sa femme doit lui donner un papier. Ce document montre qu’ils sont maintenant séparés. '
  '32':
  - type: text
    content: 'Mais maintenant, je vous dis ceci : Un homme peut être séparé de sa femme. Il peut avoir raison si sa femme a couché avec un autre homme. Si sa femme n’a pas fait cela, alors elle est toujours sa femme. Dans ce cas, le papier ne servira à rien. Maintenant si la femme épouse un autre homme, elle fait du mal contre Dieu. Et un autre homme peut épouser cette femme. Alors cet homme fait aussi du mal contre Dieu.'
  - type: heading
    content: Jésus enseigne les gens sur les promesses à Dieu
  '33':
  - type: text
    content: 'Vous avez entendu ce que Dieu avait dit il y a longtemps : Si tu as fait une promesse à Dieu, tu dois faire ce que tu as dit. '
  '34':
  - type: text
    content: 'Mais je vous dis ceci : Ne faites pas de promesses comme cela. N’utilisez pas les mots par le  '
  - type: text
    content: ciel
  - type: text
    content: ' pour faire une promesse. Le  '
  - type: text
    content: ciel
  - type: text
    content: ' est le lieu où Dieu règne. N’utilisez pas les mots par la terre pour faire une promesse. La terre est le lieu où Dieu repose ses pieds. '
  '35':
  - type: text
    content: 'N’utilisez pas les mots par Jérusalem pour faire une promesse. Jérusalem est la ville de Dieu. Il est le grand roi là‑bas. '
  '36':
  - type: text
    content: 'N’utilisez pas les mots par ma tête pour faire une promesse. Vous ne pouvez pas changer un seul cheveu être blanc ou noir. '
  '37':
  - type: text
    content: 'Vous devriez dire oui si vous voulez dire : Oui. Et vous devriez dire non si vous voulez dire : Non. Si vous dites plus, cela vient du '
  - type: text
    content: diable
  - type: text
    content: .
  - type: heading
    content: Jésus enseigne sur la façon d’aimer les gens
  '38':
  - type: text
    content: 'Dans la loi, Dieu a dit aussi : Quelqu’un peut faire du mal à l’œil d’une autre personne. Alors on devra lui faire la même chose. Quelqu’un peut faire du mal à la dent d’une autre personne. Alors on devra lui faire la même chose. '
  '39':
  - type: text
    content: 'Mais moi, je vous dis ceci : Ne vous opposez pas à quelqu’un qui vous a fait du mal. Quelqu’un peut te gifler sur ta joue droite. Laisse‑le te gifler aussi sur l’autre joue.'
  '4':
  - type: text
    content: Certaines personnes sont tristes maintenant. Dieu va les aider à se sentir mieux. Elles seront heureuses.
  '40':
  - type: text
    content: 'Peut‑être que quelqu’un veut t’amener au '
  - type: text
    content: juge
  - type: text
    content: '. Il dit au '
  - type: text
    content: juge
  - type: text
    content: '  : Cet homme a fait du mal contre moi. Donc, je veux qu’il me donne sa chemise : Donne à l’homme ta chemise. Donne‑lui aussi ton  '
  - type: text
    content: manteau
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'Quelqu’un peut te dire : Porte mon fardeau sur un kilomètre, fais le double avec lui. '
  '42':
  - type: text
    content: 'Quand quelqu’un te demande quelque chose, donne‑lui. Si quelqu’un te demande de lui prêter quelque chose, ne refuse pas. '
  '43':
  - type: text
    content: 'Vous avez entendu les gens dire : Aime les gens qui sont tes amis. N’aime pas ceux qui veulent te faire du mal. '
  '44':
  - type: text
    content: 'Mais moi, je vous dis ceci : Aimez les gens qui veulent vous faire du mal. Certaines personnes vous font du mal, parce que vous obéissez à Dieu. Priez Dieu qu’il les aide. '
  '45':
  - type: text
    content: 'Si vous faites cela, vous serez les fils et les filles de votre Père qui est aux cieux. Il fait briller le soleil sur le peuple qui lui obéit. Il fait aussi briller le soleil sur les païens. Dieu fait tomber la pluie sur le peuple qui lui obéit. Il fait aussi tomber la pluie sur les païens. '
  '46':
  - type: text
    content: N’aimez pas seulement les gens qui vous aiment. Mais alors, Dieu ne vous paiera pas pour cela. Les païens aussi font cela. 
  '47':
  - type: text
    content: 'Vous parlez seulement à vos amis. Alors vous ne faites rien de spécial. Les païens aussi font cela.  '
  '48':
  - type: text
    content: 'Donc, soyez bons en tout comme votre Père qui est au '
  - type: text
    content: ciel
  - type: text
    content: .
  '5':
  - type: text
    content: Certaines personnes savent qu’elles sont douces. Elles seront heureuses. La terre leur appartiendra, parce qu’elles recevront ce que Dieu avait promis.
  '6':
  - type: text
    content: Certaines personnes veulent obéir à Dieu plus que ce qu’elles veulent faire d’autre. Dieu leur donnera tout ce dont elles ont besoin.
  '7':
  - type: text
    content: Certaines personnes sont gentilles et elles pardonnent à d’autres personnes. Elles seront heureuses. Dieu sera bon envers elles et leur pardonnera.
  '8':
  - type: text
    content: Certaines personnes ne veulent pas faire de mauvaises choses. Ces personnes seront heureuses, car elles verront Dieu.
  '9':
  - type: text
    content: Certaines personnes aident d’autres personnes à être amies et de convenir ensemble. Ces personnes seront heureuses, parce que Dieu les appellera ses enfants.
