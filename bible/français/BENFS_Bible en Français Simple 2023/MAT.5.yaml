document_id: MAT.5
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus enseigne ses  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus a vu beaucoup de gens. Ils le suivaient. Alors, Jésus est monté sur une montagne. Il s’est assis là‑bas. Après cela, les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus sont allés près de lui.  '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et Jésus commençait à les enseigner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus disait ceci : Certaines personnes savent qu’elles ont beaucoup besoin de Dieu. Dieu les rendra heureuses, parce qu’elles feront partie du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Certaines personnes sont tristes maintenant. Dieu va les aider à se sentir mieux. Elles seront heureuses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Certaines personnes savent qu’elles sont douces. Elles seront heureuses. La terre leur appartiendra, parce qu’elles recevront ce que Dieu avait promis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Certaines personnes veulent obéir à Dieu plus que ce qu’elles veulent faire d’autre. Dieu leur donnera tout ce dont elles ont besoin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Certaines personnes sont gentilles et elles pardonnent à d’autres personnes. Elles seront heureuses. Dieu sera bon envers elles et leur pardonnera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Certaines personnes ne veulent pas faire de mauvaises choses. Ces personnes seront heureuses, car elles verront Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Certaines personnes aident d’autres personnes à être amies et de convenir ensemble. Ces personnes seront heureuses, parce que Dieu les appellera ses enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Certaines personnes seront maltraitées, parce qu’elles obéissent à Dieu. Ces personnes seront heureuses, parce qu’elles font partie du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous serez heureux quand les gens diront de mauvaises choses contre vous. Parfois, les gens vous feront du mal. Parfois, les gens vont dire des choses contre vous. Et pourtant, ces choses ne seront pas vraies. Les gens diront ces choses contre vous, parce que vous êtes mes  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Soyez contents et heureux de cela. Dieu vous récompensera grandement au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. De la même façon, de mauvaises personnes avaient maltraité les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' avant vous. '
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jésus sont comme du sel et la lumière'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous êtes comme le sel parmi tous les gens qui vivent sur terre. Le sel est bon. Mais parfois, il perd le goût du sel. Alors ce sel ne peut plus être bon. Par conséquent, les gens ne peuvent plus l’utiliser. Ils vont le jeter à l’extérieur et marcher dessus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous êtes comme la lumière au monde. Tout le monde peut voir une ville que les gens ont construite sur une colline. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Personne n’allume une lampe pour la mettre sous un bol. Mais il va mettre la lampe sur un endroit haut. Alors elle va éclairer tout le monde dans la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: De la même façon, votre lumière brille pour que les gens la voient. Ils glorifieront ainsi votre Père qui est aux cieux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus parle des lois que Moïse avait données aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je ne suis pas venu supprimer la loi. Je ne suis pas venu pour supprimer ce que les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prophètes
  - type: text
    text: ' avaient écrit. Mais je suis venu accomplir tout cela. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je vous dis la vérité : Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' et la terre resteront pendant longtemps. Mais tout le temps qu’ils seront là, la loi restera également. Il n’y aura même pas un petit changement dans la loi. Tout ce qui est écrit dans la loi se réalisera. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quelqu’un peut enlever quelque chose des commandements de Dieu. Il peut aussi enseigner cela à d’autres gens. Alors il sera le plus petit dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: '. Mais quelqu’un peut obéir à tous les commandements de Dieu. Il peut aussi enseigner cela à d’autres gens. Alors il sera le plus grand dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je vous dis ceci : Vous devez être mieux que les  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisiens
  - type: text
    text: '. Vous devez être mieux que les enseignants de la loi de Dieu. Sinon, vous n’entrerez pas dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume des cieux
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle des gens en colère
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous avez entendu qu’on avait dit à vos ancêtres : Ne tue pas une personne. Et toute personne qui tue sera devant un  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '. Ce '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' dira qu’elle a fait quelque chose de mal. Et il la punira. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais voici ce que moi, je vous dis : Toute personne qui se met en colère contre son frère sera jugée. Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' pourra condamner cette personne. Quelqu’un peut appeler son frère imbécile. Alors les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' le jugeront. Ils pourront dire qu’il doit être puni. Quelqu’un peut dire à son frère : Tu es fou. Alors Dieu le jugera. Dieu lui dira : Tu devras aller dans le feu de l’enfer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Peut‑être que tu vas donner une offrande à Dieu. Alors tu l’apportes à l’autel dans le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: '. Mais tu te souviens que ton frère a quelque chose contre toi.  '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tu dois laisser ton offrande là devant l’autel. Et tu dois d’abord aller chercher ton frère. Dis‑lui que tu es triste. Ensuite, tu peux aussi devenir ami avec lui à nouveau. Après cela, tu peux revenir donner ton offrande à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Une personne peut dire que tu as fait quelque chose de mal. Elle va donc t’amener au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '. Fais tout pour t’entendre immédiatement avec cette personne. Fais‑le, même si tu vas avec elle au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '. Fais‑le pour qu’elle ne parle pas contre toi au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '. Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' peut convenir avec cette personne que tu as fait une mauvaise chose. Ensuite, le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: ' va te livrer au policier. Il te mettra en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je te dis la vérité : Tu resteras en prison. Et pour te libérer, tu paieras jusqu’au dernier centime.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne les gens à ne pas faire de mauvaises choses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous avez entendu ce que Dieu avait dit il y a longtemps : Ne couche pas avec la femme d’un autre homme. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais je vous dis ceci : Un homme peut regarder une femme qui n’est pas sa femme. Et il veut coucher avec elle. Alors cet homme a déjà couché avec cette femme. Il a fait ce mal dans son  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ton œil droit peut t’amener à faire du mal. Alors tu devras l’enlever. Tu devras le jeter. Tu vas perdre un œil. C’est mieux. Mais il est bien pire si Dieu te jette avec tes 2 yeux dans l’enfer. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ta main droite peut t’amener à faire du mal. Tu devras la couper. Tu devras la jeter. Tu vas perdre une main. C’est mieux. Mais il est bien pire si Dieu t’envoie avec tes 2 mains dans l’enfer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un homme peut‑il renvoyer sa femme du mariage ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous avez entendu dire ceci : Tout homme qui veut renvoyer sa femme doit lui donner un papier. Ce document montre qu’ils sont maintenant séparés. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais maintenant, je vous dis ceci : Un homme peut être séparé de sa femme. Il peut avoir raison si sa femme a couché avec un autre homme. Si sa femme n’a pas fait cela, alors elle est toujours sa femme. Dans ce cas, le papier ne servira à rien. Maintenant si la femme épouse un autre homme, elle fait du mal contre Dieu. Et un autre homme peut épouser cette femme. Alors cet homme fait aussi du mal contre Dieu.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne les gens sur les promesses à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Vous avez entendu ce que Dieu avait dit il y a longtemps : Si tu as fait une promesse à Dieu, tu dois faire ce que tu as dit. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais je vous dis ceci : Ne faites pas de promesses comme cela. N’utilisez pas les mots par le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' pour faire une promesse. Le  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' est le lieu où Dieu règne. N’utilisez pas les mots par la terre pour faire une promesse. La terre est le lieu où Dieu repose ses pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'N’utilisez pas les mots par Jérusalem pour faire une promesse. Jérusalem est la ville de Dieu. Il est le grand roi là‑bas. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'N’utilisez pas les mots par ma tête pour faire une promesse. Vous ne pouvez pas changer un seul cheveu être blanc ou noir. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Vous devriez dire oui si vous voulez dire : Oui. Et vous devriez dire non si vous voulez dire : Non. Si vous dites plus, cela vient du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus enseigne sur la façon d’aimer les gens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dans la loi, Dieu a dit aussi : Quelqu’un peut faire du mal à l’œil d’une autre personne. Alors on devra lui faire la même chose. Quelqu’un peut faire du mal à la dent d’une autre personne. Alors on devra lui faire la même chose. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mais moi, je vous dis ceci : Ne vous opposez pas à quelqu’un qui vous a fait du mal. Quelqu’un peut te gifler sur ta joue droite. Laisse‑le te gifler aussi sur l’autre joue.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Peut‑être que quelqu’un veut t’amener au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '. Il dit au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juge
  - type: text
    text: '  : Cet homme a fait du mal contre moi. Donc, je veux qu’il me donne sa chemise : Donne à l’homme ta chemise. Donne‑lui aussi ton  '
  - type: usfm
    marker: w
    children:
    - type: text
      text: manteau
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Quelqu’un peut te dire : Porte mon fardeau sur un kilomètre, fais le double avec lui. '
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Quand quelqu’un te demande quelque chose, donne‑lui. Si quelqu’un te demande de lui prêter quelque chose, ne refuse pas. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Vous avez entendu les gens dire : Aime les gens qui sont tes amis. N’aime pas ceux qui veulent te faire du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Mais moi, je vous dis ceci : Aimez les gens qui veulent vous faire du mal. Certaines personnes vous font du mal, parce que vous obéissez à Dieu. Priez Dieu qu’il les aide. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Si vous faites cela, vous serez les fils et les filles de votre Père qui est aux cieux. Il fait briller le soleil sur le peuple qui lui obéit. Il fait aussi briller le soleil sur les païens. Dieu fait tomber la pluie sur le peuple qui lui obéit. Il fait aussi tomber la pluie sur les païens. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: N’aimez pas seulement les gens qui vous aiment. Mais alors, Dieu ne vous paiera pas pour cela. Les païens aussi font cela. 
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Vous parlez seulement à vos amis. Alors vous ne faites rien de spécial. Les païens aussi font cela.  '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Donc, soyez bons en tout comme votre Père qui est au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: .
