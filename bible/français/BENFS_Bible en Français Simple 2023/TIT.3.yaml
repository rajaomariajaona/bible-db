document_id: TIT.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chrétiens doivent obéir aux personnes qui ont le pouvoir
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dis aux croyants là‑bas de respecter l’État et les chefs. Ils doivent se rappeler d’obéir à leurs dirigeants. Ils doivent toujours être prêts à aider les autres. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si quelqu’un enseigne un faux message qui cause des problèmes, avertis‑le. Si tu l’avertis 2 fois et qu’il ne s’arrête toujours pas, éloigne‑toi de lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu sais qu’une personne comme celle‑là a choisi de ne pas croire au vrai message. Cette personne sait qu’elle fait une mauvaise chose, mais elle continue de faire cela.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul termine sa lettre
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je vais t’envoyer soit Artémas, soit Tychique. Si l’un d’eux arrive, viens vite me rencontrer dans la ville de Nicopolis. J’ai décidé de rester à Nicopolis pendant l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: hiver
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Pense à aider Zénas (avocat ou spécialiste de la loi de Moïse) et Apollos autant que tu peux. Ils veulent voyager bientôt. Assure‑toi qu’ils ont tout ce dont ils ont besoin pour leur voyage. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nos amis chrétiens doivent apprendre à faire de bonnes choses. Ils doivent donner des choses aux personnes qui ont besoin d’aide. Cela montrera que leur vie aide vraiment les gens.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tous ceux qui sont ici avec moi te disent bonjour. Dis bonjour de notre part aux croyants qui nous aiment. Je prie pour que Dieu continue d’être très gentil avec vous tous.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ils ne doivent pas dire du mal contre personne. Ils ne doivent pas se quereller avec les gens. Mais, ils doivent être gentils et polis avec tout le monde.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Avant de croire en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', nous avions aussi de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: '. Nous n’obéissions pas à Dieu. Nous croyions à un faux message. Nous voulions faire toutes sortes de mauvaises choses et nous ne pouvions pas arrêter de les faire. Chaque jour, nous faisions de mauvaises choses. Nous étions jaloux des autres. Les gens nous détestaient et nous nous détestions les uns les autres. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais alors Dieu nous a sauvés de nos péchés. Il a clairement montré qu’il était très gentil. Il a montré qu’il aime tout le monde. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dieu ne nous a pas sauvés à cause de bonnes choses que nous avions faites nous‑mêmes. Il nous a sauvés, parce qu’il a choisi de nous pardonner. Dieu nous a lavés pour que nous soyons purs à l’intérieur. Nous sommes nés de nouveau, pour mener une nouvelle vie. Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' de Dieu a fait cela pour nous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est mort en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' pour nous sauver. Alors maintenant, Dieu a déversé son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: ' en nous, pour nous remplir. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Parce que Dieu est très bon, il nous a acceptés comme bons avec lui‑même. En conséquence, nous savons que nous recevrons les bonnes choses que Dieu a préparées pour nous. Nous savons que nous vivrons avec Dieu pour toujours. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ce message est certainement vrai. Je veux que tu enseignes clairement les choses que j’ai dites dans cette lettre. Assure‑toi que les gens les comprennent bien. Ensuite, les gens qui ont cru en Dieu veilleront à faire de bonnes choses. De bonnes choses comme ça aideront tout le monde.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais éloigne‑toi des gens qui discutent de mauvaises choses. Ils étudient de longues listes de noms de famille, d’il y a des années. Refuse de te quereller avec des gens comme ça. Refuse de discuter sur la loi de Dieu. Toutes ces sortes de choses n’ont aucune valeur et elles n’aident personne. '
