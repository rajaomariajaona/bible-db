document_id: TIT.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Les chrétiens doivent obéir aux personnes qui ont le pouvoir
  - type: text
    content: 'Dis aux croyants là‑bas de respecter l’État et les chefs. Ils doivent se rappeler d’obéir à leurs dirigeants. Ils doivent toujours être prêts à aider les autres. '
  '10':
  - type: text
    content: 'Si quelqu’un enseigne un faux message qui cause des problèmes, avertis‑le. Si tu l’avertis 2 fois et qu’il ne s’arrête toujours pas, éloigne‑toi de lui. '
  '11':
  - type: text
    content: Tu sais qu’une personne comme celle‑là a choisi de ne pas croire au vrai message. Cette personne sait qu’elle fait une mauvaise chose, mais elle continue de faire cela.
  - type: heading
    content: Paul termine sa lettre
  '12':
  - type: text
    content: Je vais t’envoyer soit Artémas, soit Tychique. Si l’un d’eux arrive, viens vite me rencontrer dans la ville de Nicopolis. J’ai décidé de rester à Nicopolis pendant l’
  - type: text
    content: hiver
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Pense à aider Zénas (avocat ou spécialiste de la loi de Moïse) et Apollos autant que tu peux. Ils veulent voyager bientôt. Assure‑toi qu’ils ont tout ce dont ils ont besoin pour leur voyage. '
  '14':
  - type: text
    content: Nos amis chrétiens doivent apprendre à faire de bonnes choses. Ils doivent donner des choses aux personnes qui ont besoin d’aide. Cela montrera que leur vie aide vraiment les gens.
  '15':
  - type: text
    content: Tous ceux qui sont ici avec moi te disent bonjour. Dis bonjour de notre part aux croyants qui nous aiment. Je prie pour que Dieu continue d’être très gentil avec vous tous.
  '2':
  - type: text
    content: Ils ne doivent pas dire du mal contre personne. Ils ne doivent pas se quereller avec les gens. Mais, ils doivent être gentils et polis avec tout le monde.
  '3':
  - type: text
    content: 'Avant de croire en '
  - type: text
    content: Christ
  - type: text
    content: ', nous avions aussi de mauvais '
  - type: text
    content: esprits
  - type: text
    content: '. Nous n’obéissions pas à Dieu. Nous croyions à un faux message. Nous voulions faire toutes sortes de mauvaises choses et nous ne pouvions pas arrêter de les faire. Chaque jour, nous faisions de mauvaises choses. Nous étions jaloux des autres. Les gens nous détestaient et nous nous détestions les uns les autres. '
  '4':
  - type: text
    content: 'Mais alors Dieu nous a sauvés de nos péchés. Il a clairement montré qu’il était très gentil. Il a montré qu’il aime tout le monde. '
  '5':
  - type: text
    content: 'Dieu ne nous a pas sauvés à cause de bonnes choses que nous avions faites nous‑mêmes. Il nous a sauvés, parce qu’il a choisi de nous pardonner. Dieu nous a lavés pour que nous soyons purs à l’intérieur. Nous sommes nés de nouveau, pour mener une nouvelle vie. Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu a fait cela pour nous. '
  '6':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nous sauver. Alors maintenant, Dieu a déversé son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' en nous, pour nous remplir. '
  '7':
  - type: text
    content: 'Parce que Dieu est très bon, il nous a acceptés comme bons avec lui‑même. En conséquence, nous savons que nous recevrons les bonnes choses que Dieu a préparées pour nous. Nous savons que nous vivrons avec Dieu pour toujours. '
  '8':
  - type: text
    content: Ce message est certainement vrai. Je veux que tu enseignes clairement les choses que j’ai dites dans cette lettre. Assure‑toi que les gens les comprennent bien. Ensuite, les gens qui ont cru en Dieu veilleront à faire de bonnes choses. De bonnes choses comme ça aideront tout le monde.
  '9':
  - type: text
    content: 'Mais éloigne‑toi des gens qui discutent de mauvaises choses. Ils étudient de longues listes de noms de famille, d’il y a des années. Refuse de te quereller avec des gens comme ça. Refuse de discuter sur la loi de Dieu. Toutes ces sortes de choses n’ont aucune valeur et elles n’aident personne. '
