document_id: MRK.5,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 5
  - type: heading
    content: Jésus rencontre un homme qui avait beaucoup de mauvais esprits en lui
  - type: text
    content: 'Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' sont arrivés de l’autre côté de la mer. Ils sont arrivés à un endroit où les Géraséniens vivaient. '
  '10':
  - type: text
    content: 'Il disait à Jésus plusieurs fois : S’il te plaît, ne nous envoie pas en dehors de ce pays. '
  '11':
  - type: text
    content: 'Un grand groupe de porcs se nourrissaient sur la colline. '
  '12':
  - type: text
    content: 'Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' ont dit à Jésus ceci : Envoie‑nous dans les porcs. Entrons en eux. '
  '13':
  - type: text
    content: 'Jésus les a laissés. Ainsi, les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' sont sortis de l’homme. Ils sont entrés dans les porcs. Tous les porcs se sont précipités ensemble du haut des pentes dans la mer. Environ 2 000 porcs sont morts dans la mer. '
  '14':
  - type: text
    content: 'Les hommes qui nourrissaient ces porcs se sont enfuis. Ils disaient ce qui s’était passé aux gens de la ville et dans les campagnes. Ces gens sont venus voir ce qui était arrivé. '
  '15':
  - type: text
    content: 'Quand ils sont allés auprès de Jésus, ils ont vu l’homme. L’homme était assis tranquillement. Les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' sont sortis de lui.'
  - type: text
    content: 'Il portait des vêtements et son '
  - type: text
    content: esprit
  - type: text
    content: ' était encore bien. C’était l’homme qui avait un groupe de mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' en lui. Tous les gens avaient peur. '
  '16':
  - type: text
    content: 'Les hommes qui ont vu ces choses parlaient de cela. Ils disaient aux autres ce qui était arrivé à l’homme et aux porcs. '
  '17':
  - type: text
    content: 'Alors les gens qui vivaient là, ont dit à Jésus : S’il te plaît, quitte notre pays. '
  '18':
  - type: text
    content: 'Jésus est remonté dans le petit bateau. Mais l’homme qui avait les mauvais '
  - type: text
    content: esprits
  - type: text
    content: ' en lui, a parlé. Il a dit à Jésus qu’il voulait vraiment aller avec lui. '
  '19':
  - type: text
    content: 'Mais Jésus ne l’a pas laissé être avec lui. Au lieu de cela, Jésus lui a dit : Va à ta maison et à tes amis. Dis‑leur ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait pour toi. Dis‑leur comment il a été bon envers toi. '
  '2':
  - type: text
    content: 'Jésus est sorti du petit bateau. Et aussitôt un homme l’a rencontré. Un mauvais '
  - type: text
    content: esprit
  - type: text
    content: ' vivait à l’intérieur de cet homme. '
  '20':
  - type: text
    content: Donc, l’homme est allé. Il a commencé à parler à beaucoup de gens dans les 10 villes là‑bas. Il leur disait toutes les choses que Jésus avait faites pour lui. Et tous les gens étaient très surpris.
  - type: heading
    content: Jésus aide une fille à vivre encore
  '21':
  - type: text
    content: 'Alors Jésus est retourné dans le petit bateau. Il est venu de l’autre côté de la mer. Une grande foule est venue auprès de lui là‑bas. Et Jésus était au bord de la mer. '
  '22':
  - type: text
    content: 'Un homme appelé Jaïrus est venu auprès de Jésus. Il était un responsable du bâtiment de rencontre des '
  - type: text
    content: Juifs
  - type: text
    content: '. Quand il a vu Jésus, il s’est mis à genoux. '
  '23':
  - type: text
    content: 'Il a dit à Jésus : S’il te plaît, viens à ma maison et mets tes mains sur ma fille. Elle est très malade et elle va bientôt mourir. Mais si tu fais cela, elle va vivre. '
  '24':
  - type: text
    content: 'Alors Jésus a commencé à aller avec Jaïrus. Une grande foule suivait Jésus. Et beaucoup de gens le suivaient de plus près. '
  '25':
  - type: text
    content: 'Il y avait une femme malade. Du sang coulait de son corps depuis maintenant 12 ans. '
  '26':
  - type: text
    content: 'Elle payait beaucoup de médecins pour l’aider, mais ils ne pouvaient rien faire. Mais, ils lui faisaient plus de douleur. Maintenant, cette femme a dépensé tout son argent, mais sa santé était toujours mauvaise. '
  '27':
  - type: text
    content: 'Les gens lui ont parlé des choses que Jésus faisait. Donc, elle est venue dans la foule derrière Jésus et elle a touché son vêtement. '
  '28':
  - type: text
    content: 'Elle a dit : Si je touche seulement le vêtement de Jésus, ma maladie va finir. '
  '29':
  - type: text
    content: 'Et aussitôt, le sang s’est arrêté. Et elle savait qu’elle était de nouveau bien. '
  '3':
  - type: text
    content: 'Donc, l’homme vivait dans un endroit où on enterre les gens. Personne ne pouvait plus le lier, même avec une chaîne. '
  '30':
  - type: text
    content: 'Jésus a immédiatement senti qu’une force est sortie de lui. Alors il s’est retourné dans la foule et il a demandé : Qui a touché mon vêtement ? '
  '31':
  - type: text
    content: 'Ses '
  - type: text
    content: disciples
  - type: text
    content: ' ont dit : Tu vois que la foule te suit de plus près. Tu ne peux pas demander qui t’a touché ! '
  '32':
  - type: text
    content: 'Mais Jésus a regardé autour de lui. Il voulait voir qui l’a touché. '
  '33':
  - type: text
    content: 'La femme savait ce qui lui était arrivé. Et elle avait très peur. Mais elle est venue auprès de Jésus. Elle s’est mise à genoux. Puis elle lui a dit tout ce qui lui était arrivé. '
  '34':
  - type: text
    content: 'Jésus a dit : Jeune femme, ta '
  - type: text
    content: foi
  - type: text
    content: ' t’a sauvée. Va en paix. Ta maladie est finie. '
  '35':
  - type: text
    content: 'Pendant que Jésus parlait encore, certains hommes sont venus de la maison de Jaïrus. Ils ont dit à Jaïrus : Ta fille est morte, ne demande plus à Jésus de venir. '
  '36':
  - type: text
    content: 'Jésus a entendu ce que les hommes disaient à Jaïrus. Alors Jésus lui a dit : N’aie pas peur. Au lieu de cela, crois. '
  '37':
  - type: text
    content: 'Jésus a pris seulement Pierre, Jacques et Jean (le frère de Jacques) pour aller avec lui. Il n’a pas pris une autre personne pour aller avec lui. '
  '38':
  - type: text
    content: 'Ensuite, ils sont venus à la maison de Jaïrus. Et Jésus a vu qu’il y avait beaucoup de gens là‑bas. Ils pleuraient tous. Ils faisaient un grand bruit. '
  '39':
  - type: text
    content: 'Jésus est entré dans la maison et il a dit au peuple :'
  - type: text
    content: 'Vous ne devriez pas pleurer et faire un grand bruit. L’enfant n’est pas morte. Elle dort. '
  '4':
  - type: text
    content: 'Les gens le liaient souvent avec des chaînes et le fer à ses mains et ses pieds. Mais il se détachait des chaînes et brisait le fer. Il était très fort et personne ne pouvait le maîtriser. '
  '40':
  - type: text
    content: 'Les gens se moquaient de Jésus. Alors Jésus a fait sortir tout le monde. Il est entré à l’endroit où l’enfant était couchée. Le père et la mère de l’enfant étaient avec lui. Jésus a également pris Pierre, Jacques et Jean avec lui. '
  '41':
  - type: text
    content: 'Alors Jésus a tenu la main de la petite fille. Il lui a dit : Talitha koum. Cela signifie, petite fille, je te demande de te lever. '
  '42':
  - type: text
    content: 'La petite fille s’est levée immédiatement et elle marchait. Elle avait 12 ans. Les gens étaient très surpris. '
  '43':
  - type: text
    content: 'Jésus leur a dit : Ne dites à personne ce qui est arrivé. Donnez maintenant quelque chose à manger à la petite fille.'
  '5':
  - type: text
    content: 'L’homme était toujours soit à l’endroit où on enterre les gens ou sur les collines. Il criait chaque jour et chaque nuit. Et il utilisait des pierres pour se couper. '
  '6':
  - type: text
    content: 'A un moment, l’homme a vu Jésus très loin. Il a couru à sa rencontre. Il s’est mis à genoux devant Jésus. '
  '7':
  - type: text
    content: 'Il criait haut et fort comme ceci : Jésus, nous n’avons rien en commun. Tu es le Fils de Dieu puissant qui est aux cieux. S’il te plaît, promets à Dieu que tu ne vas pas me faire du mal. '
  '8':
  - type: text
    content: 'Il a dit cela parce que Jésus avait déjà dit au mauvais '
  - type: text
    content: esprit
  - type: text
    content: '  : Sors de cet homme. '
  '9':
  - type: text
    content: 'Alors Jésus a demandé à l’homme : Quel est ton nom ? L’'
  - type: text
    content: esprit
  - type: text
    content: ' mauvais a répondu : Je m’appelle légion, parce que nous sommes nombreux. '
