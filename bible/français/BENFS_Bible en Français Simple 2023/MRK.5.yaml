document_id: MRK.5,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 5
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jésus rencontre un homme qui avait beaucoup de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' en lui'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus et ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' sont arrivés de l’autre côté de la mer. Ils sont arrivés à un endroit où les Géraséniens vivaient. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il disait à Jésus plusieurs fois : S’il te plaît, ne nous envoie pas en dehors de ce pays. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Un grand groupe de porcs se nourrissaient sur la colline. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' ont dit à Jésus ceci : Envoie‑nous dans les porcs. Entrons en eux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jésus les a laissés. Ainsi, les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' sont sortis de l’homme. Ils sont entrés dans les porcs. Tous les porcs se sont précipités ensemble du haut des pentes dans la mer. Environ 2 000 porcs sont morts dans la mer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les hommes qui nourrissaient ces porcs se sont enfuis. Ils disaient ce qui s’était passé aux gens de la ville et dans les campagnes. Ces gens sont venus voir ce qui était arrivé. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quand ils sont allés auprès de Jésus, ils ont vu l’homme. L’homme était assis tranquillement. Les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' sont sortis de lui.'
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il portait des vêtements et son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' était encore bien. C’était l’homme qui avait un groupe de mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' en lui. Tous les gens avaient peur. '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les hommes qui ont vu ces choses parlaient de cela. Ils disaient aux autres ce qui était arrivé à l’homme et aux porcs. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors les gens qui vivaient là, ont dit à Jésus : S’il te plaît, quitte notre pays. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jésus est remonté dans le petit bateau. Mais l’homme qui avait les mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' en lui, a parlé. Il a dit à Jésus qu’il voulait vraiment aller avec lui. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mais Jésus ne l’a pas laissé être avec lui. Au lieu de cela, Jésus lui a dit : Va à ta maison et à tes amis. Dis‑leur ce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a fait pour toi. Dis‑leur comment il a été bon envers toi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jésus est sorti du petit bateau. Et aussitôt un homme l’a rencontré. Un mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' vivait à l’intérieur de cet homme. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Donc, l’homme est allé. Il a commencé à parler à beaucoup de gens dans les 10 villes là‑bas. Il leur disait toutes les choses que Jésus avait faites pour lui. Et tous les gens étaient très surpris.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus aide une fille à vivre encore
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Alors Jésus est retourné dans le petit bateau. Il est venu de l’autre côté de la mer. Une grande foule est venue auprès de lui là‑bas. Et Jésus était au bord de la mer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Un homme appelé Jaïrus est venu auprès de Jésus. Il était un responsable du bâtiment de rencontre des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Quand il a vu Jésus, il s’est mis à genoux. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il a dit à Jésus : S’il te plaît, viens à ma maison et mets tes mains sur ma fille. Elle est très malade et elle va bientôt mourir. Mais si tu fais cela, elle va vivre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Alors Jésus a commencé à aller avec Jaïrus. Une grande foule suivait Jésus. Et beaucoup de gens le suivaient de plus près. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il y avait une femme malade. Du sang coulait de son corps depuis maintenant 12 ans. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Elle payait beaucoup de médecins pour l’aider, mais ils ne pouvaient rien faire. Mais, ils lui faisaient plus de douleur. Maintenant, cette femme a dépensé tout son argent, mais sa santé était toujours mauvaise. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les gens lui ont parlé des choses que Jésus faisait. Donc, elle est venue dans la foule derrière Jésus et elle a touché son vêtement. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Elle a dit : Si je touche seulement le vêtement de Jésus, ma maladie va finir. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Et aussitôt, le sang s’est arrêté. Et elle savait qu’elle était de nouveau bien. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Donc, l’homme vivait dans un endroit où on enterre les gens. Personne ne pouvait plus le lier, même avec une chaîne. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jésus a immédiatement senti qu’une force est sortie de lui. Alors il s’est retourné dans la foule et il a demandé : Qui a touché mon vêtement ? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' ont dit : Tu vois que la foule te suit de plus près. Tu ne peux pas demander qui t’a touché ! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Mais Jésus a regardé autour de lui. Il voulait voir qui l’a touché. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'La femme savait ce qui lui était arrivé. Et elle avait très peur. Mais elle est venue auprès de Jésus. Elle s’est mise à genoux. Puis elle lui a dit tout ce qui lui était arrivé. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jésus a dit : Jeune femme, ta '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' t’a sauvée. Va en paix. Ta maladie est finie. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Pendant que Jésus parlait encore, certains hommes sont venus de la maison de Jaïrus. Ils ont dit à Jaïrus : Ta fille est morte, ne demande plus à Jésus de venir. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Jésus a entendu ce que les hommes disaient à Jaïrus. Alors Jésus lui a dit : N’aie pas peur. Au lieu de cela, crois. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Jésus a pris seulement Pierre, Jacques et Jean (le frère de Jacques) pour aller avec lui. Il n’a pas pris une autre personne pour aller avec lui. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ensuite, ils sont venus à la maison de Jaïrus. Et Jésus a vu qu’il y avait beaucoup de gens là‑bas. Ils pleuraient tous. Ils faisaient un grand bruit. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Jésus est entré dans la maison et il a dit au peuple :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne devriez pas pleurer et faire un grand bruit. L’enfant n’est pas morte. Elle dort. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les gens le liaient souvent avec des chaînes et le fer à ses mains et ses pieds. Mais il se détachait des chaînes et brisait le fer. Il était très fort et personne ne pouvait le maîtriser. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Les gens se moquaient de Jésus. Alors Jésus a fait sortir tout le monde. Il est entré à l’endroit où l’enfant était couchée. Le père et la mère de l’enfant étaient avec lui. Jésus a également pris Pierre, Jacques et Jean avec lui. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Alors Jésus a tenu la main de la petite fille. Il lui a dit : Talitha koum. Cela signifie, petite fille, je te demande de te lever. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'La petite fille s’est levée immédiatement et elle marchait. Elle avait 12 ans. Les gens étaient très surpris. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Jésus leur a dit : Ne dites à personne ce qui est arrivé. Donnez maintenant quelque chose à manger à la petite fille.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’homme était toujours soit à l’endroit où on enterre les gens ou sur les collines. Il criait chaque jour et chaque nuit. Et il utilisait des pierres pour se couper. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'A un moment, l’homme a vu Jésus très loin. Il a couru à sa rencontre. Il s’est mis à genoux devant Jésus. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il criait haut et fort comme ceci : Jésus, nous n’avons rien en commun. Tu es le Fils de Dieu puissant qui est aux cieux. S’il te plaît, promets à Dieu que tu ne vas pas me faire du mal. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il a dit cela parce que Jésus avait déjà dit au mauvais '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: '  : Sors de cet homme. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors Jésus a demandé à l’homme : Quel est ton nom ? L’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' mauvais a répondu : Je m’appelle légion, parce que nous sommes nombreux. '
