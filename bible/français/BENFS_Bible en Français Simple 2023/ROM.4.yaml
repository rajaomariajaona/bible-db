document_id: ROM.4,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 4
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham a cru en Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Abraham était l’ancêtre de nous tous qui sommes '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Pensez à ce qu’il a découvert. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quelqu’un a circoncis Abraham pour montrer qu’il était '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juif
    - type: text
      text: '. Pensez au moment où Dieu a accepté Abraham. Est‑ce que cela s’est produit avant de le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: ' ou après ? Nous savons que c’était avant de le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: '  ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Quelque temps après cela, Dieu a dit à Abraham que quelqu’un devait le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: '. Ce serait une marque sur son corps pour montrer que Dieu l’avait accepté. Dieu avait déjà accepté Abraham, parce qu’Abraham croyait en lui. Dieu n’a pas accepté Abraham parce que quelqu’un l’avait circoncis en tant qu’homme '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juif
    - type: text
      text: '. Cela montre qu’Abraham est comme un père pour tous les gens que Dieu a acceptés. Comme Abraham, Dieu les a acceptés parce qu’ils ont cru en lui. Ce n’est pas important que personne ne les ait circoncis. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais Abraham est aussi comme le père de tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui croient en Dieu. Quelqu’un a circoncis ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', mais ils ont copié l’exemple d’Abraham. Ils ont cru en Dieu, comme Abraham croyait en lui avant que quiconque puisse le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: circoncire
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dieu a promis à Abraham et à ses descendants que le monde leur appartiendra un jour. Dieu n’a pas promis cela parce qu’Abraham n’a obéi à aucune règle. Dieu l’a promis parce qu’Abraham a cru en lui. C’est pourquoi Dieu a accepté Abraham comme étant juste avec lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les gens ne peuvent pas obtenir ce que Dieu a promis parce qu’ils obéissent à la loi. S’ils pouvaient l’obtenir comme cela, alors la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu ne vaut rien. Et ce que Dieu a promis ne vaut rien. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les commandements de la loi de Moïse disent que Dieu punira les personnes qui n’obéissent pas à ses commandements. Mais sans aucune loi, il n’y a rien à obéir.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ainsi, Dieu nous donne sa promesse comme un don, car il est très bon. Nous le recevons lorsque nous croyons en lui. Si nous croyons en Dieu comme Abraham, alors Dieu nous accepte. C’est la promesse de Dieu à toute la famille d’Abraham. Si nous croyons en Dieu, nous pouvons appeler Abraham notre ancêtre. Nous pouvons tous recevoir ce que Dieu a promis. Ce n’est pas seulement pour ceux qui ont la loi de Moïse d’obéir. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dans la Bible, Dieu a dit à Abraham : Je t’ai choisi pour devenir l’ancêtre de nombreuses personnes différentes. C’est ce que Dieu lui‑même promet, car Abraham a cru en lui. Dieu est celui qui fait revivre les morts. Il parle des choses qui ne sont pas encore là comme si elles étaient déjà là.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Abraham a continué de faire confiance en Dieu. Il espérait recevoir ce que Dieu avait promis. Il a continué d’espérer même s’il n’avait aucune bonne raison d’espérer. C’est pourquoi il est devenu l’ancêtre de nombreuses personnes différentes. Cela s’est produit exactement comme Dieu l’avait dit : Tu auras beaucoup de descendants.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Abraham avait environ 100 ans. Son corps était déjà très vieux. Il était presque mort. Sa femme, Sara, n’a pas pu avoir d’enfants. Abraham a compris tout cela, mais il n’a pas laissé de faire confiance à Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dieu n’a pas accepté Abraham juste avec lui à cause de bonnes choses qu’il faisait. Si Dieu avait fait cela, alors Abraham allait dire de grandes choses sur lui‑même. Mais il ne pouvait pas dire cela à Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il n’a jamais laissé de croire à ce que Dieu avait promis. Au lieu de cela, il croyait plus fermement en Dieu. Il faisait confiance en la grande puissance de Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Abraham était sûr que Dieu était capable de faire ce qu’il avait promis de faire. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nous voyons donc que c’est vrai : Parce qu’Abraham a cru en Dieu, Dieu a accepté Abraham comme étant juste avec lui.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pensez à ces mots : Dieu l’a accepté comme étant juste. Ces mots ne parlent pas seulement d’Abraham. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils sont écrits dans la Bible pour nous aider aussi. Si nous croyons en Dieu, il nous acceptera comme étant justes avec lui. Dieu a réveillé notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus, afin qu’il redevienne vivant après sa mort. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dieu a laissé les gens tuer Jésus sur la croix. C’était à cause de mauvaises choses que nous avons faites. Puis Dieu a réveillé Jésus de la mort, pour montrer qu’il nous acceptera comme étant justes avec lui.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Rappelez‑vous ce que la Bible nous dit. Il dit : Abraham a cru en Dieu. En conséquence, Dieu a accepté Abraham comme étant juste avec lui.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsqu’une personne travaille pour obtenir de l’argent, il est normal qu’elle reçoive son argent. Cet argent n’est pas un cadeau. C’est ce que cette personne devra recevoir à la suite de son travail. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais personne ne peut faire aucun travail qui le rendra juste avec Dieu. Au lieu de cela, s’il croit en Dieu, alors Dieu l’acceptera. En raison de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' de cette personne, Dieu dit que cette personne est juste avec lui. C’est le don de Dieu même à ceux qui ne lui ont pas obéi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'David a également écrit sur la même chose. Il a décrit ces gens que Dieu a acceptés comme étant justes avec lui. Il ne les a pas acceptés parce qu’ils ont fait de bonnes choses, mais comme son cadeau pour eux. David nous dit à quel point les gens comme ça sont heureux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'David a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens que Dieu a pardonnés sont vraiment heureux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont fait de mauvaises choses, mais il leur a pardonné.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Une personne est vraiment heureuse quand le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l’accepte.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ne pense plus au péché de cette personne.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieu fait cela pour tout le monde, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et non '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: '. Tous les gens peuvent être vraiment heureux comme ça, quand Dieu les accepte. Comme nous l’avons dit, Abraham a cru en Dieu. En conséquence, Dieu a accepté Abraham comme étant juste avec lui. '
