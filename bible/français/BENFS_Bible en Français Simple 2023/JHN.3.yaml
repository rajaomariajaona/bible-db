document_id: JHN.3
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et Nicodème
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Pharisien
  - type: text
    text: ' appelé Nicodème. Il était l’un des chefs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: juifs
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il est venu auprès de Jésus la nuit. Il a dit à Jésus : Rabbi, nous savons que Dieu t’a envoyé pour nous. Nous avons vu les miracles que tu fais. Personne ne peut faire ces choses à moins que Dieu soit avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus a répondu : Je te dis la vérité. Sauf si une personne est née d’en haut, sinon elle ne peut pas voir le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nicodème a demandé : Comment un homme peut‑il naître quand il est vieux ? Il ne peut pas retourner dans le corps de sa mère. Il ne peut pas être né une seconde fois. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus lui a expliqué : Je te dis la vérité. Une personne doit être née d’eau et d’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprit
  - type: text
    text: '. Sinon, elle ne peut pas entrer dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les humains donnent naissance à ce qui est humain. Mais l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu donne naissance à ce qui est '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je t’ai dit : Tu dois être né d’en haut. Ce que je dis ne devrait pas te surprendre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est comme le vent pour tout le monde qui est né par l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. Le vent souffle où il veut. Tu peux l’entendre. Mais tu ne peux pas dire d’où il vient. Et tu ne peux pas dire où il va.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nicodème a demandé : Comment cela peut‑il arriver ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus a répondu : Tu es un enseignant en Israël. Tu devais comprendre ces choses ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je te dis la vérité. Nous parlons des choses que nous connaissons. Nous vous disons ce que nous avons vu. Mais même alors, vous les gens, vous ne croyez pas à nos paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je vous ai parlé des choses qui arrivent dans ce monde. Et vous ne me croyez pas. Il y a aussi des choses au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Vous n’allez pas croire à cela, si je vous en parle. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le Fils de l’homme est descendu du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: '. Personne d’autre n’est monté au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' sauf lui. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et les gens vont élever le Fils de l’homme. Moïse avait aussi élevé le serpent dans le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: désert
  - type: text
    text: '. Moïse avait fait un serpent de métal. Il l’avait élevé pour le montrer au peuple d’Israël. De la même façon, les gens vont élever le Fils de l’homme. Ils vont le montrer à tout le monde. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Donc, tout le monde qui croit en lui, vivra toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dieu aime beaucoup les gens. Il leur a donné son Fils unique. Ainsi, tous les gens qui croient au Fils ne mourront pas. Mais, ils vont vivre toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dieu n’a pas envoyé son Fils dans le monde pour punir les gens. Non, Dieu l’a envoyé pour sauver les gens dans le monde. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dieu ne punira pas toute personne qui croit au Fils. Mais Dieu punira certaines personnes. Dieu punira toute personne qui refuse de croire en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dieu a déjà décidé de punir certaines personnes. C’est parce que la lumière est venue dans le monde. Mais les gens n’aimaient pas la lumière. Ils aimaient plutôt l’obscurité. Ils faisaient de mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout le monde qui fait de mauvaises choses déteste la lumière. Une telle personne ne viendra pas à la lumière parce qu’elle a peur. Elle ne veut pas que les gens voient ses mauvaises choses. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais toute personne qui obéit à la vérité, vient à la lumière. Alors la lumière va montrer qu’elle fait le travail de Dieu. Tout le monde peut voir que cette personne obéit à Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et Jean‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après cela, Jésus et ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' se sont rendus en Judée. Jésus est resté là avec ses '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' un certain temps. Il baptisait les gens là‑bas. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jean baptisait les gens aussi. C’était à Enon, près de Salim. Il y avait beaucoup d’eau là‑bas. Les gens venaient auprès de Jean. Il les baptisait. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En ce temps‑là, Jean n’était pas encore mis en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Un certain '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juif
  - type: text
    text: ' a commencé à discuter avec les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' de Jean. Ils discutaient au sujet de certaines règles. Ces règles disaient aux gens quand et comment ils devaient se purifier. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: disciples
  - type: text
    text: ' sont venus auprès de Jean.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils lui ont dit : Maître, souviens‑toi de l’homme, Jésus, dont tu nous parlais. Il était avec toi de l’autre côté du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Jourdain
  - type: text
    text: . Il baptisait les gens et tout le monde allait à lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jean a répondu : Un homme ne peut recevoir que ce que Dieu lui donne. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Souvenez‑vous de ce que je disais : Je ne suis pas le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', mais Dieu m’a envoyé avant le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'La mariée est l’épouse de l’époux. Mais l’ami de l’époux se tient près de lui et il écoute. Cet ami est très heureux quand il entend la voix de l’époux. Je suis comme cet ami. Donc je suis complètement heureux maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il doit devenir plus grand. Mais je dois devenir moins important.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Celui qui vient d’en haut est plus grand que tout. Une personne qui vient de la terre appartient à la terre. Une telle personne ne parle que des choses de la terre. Celui qui vient du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ' est plus grand que tout. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il raconte ce qu’il a vu. Il raconte ce qu’il a entendu. Mais personne ne croit à ce qu’il dit. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Toute personne qui accepte son message dit : Oui, Dieu est vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: La personne que Dieu a envoyée dit les paroles de Dieu. Dieu la remplit complètement avec l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le Père aime le Fils. Il a donné le pouvoir au Fils sur toutes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Celui qui croit au Fils est vivant pour toujours. Mais tous ceux qui ne veulent pas obéir au Fils ne vivront jamais vraiment. Dieu continuera d’être en colère contre une personne qui refuse d’obéir au Fils.
