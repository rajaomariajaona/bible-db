document_id: JHN.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Jésus et Nicodème
  - type: text
    content: 'Il y avait un '
  - type: text
    content: Pharisien
  - type: text
    content: ' appelé Nicodème. Il était l’un des chefs '
  - type: text
    content: juifs
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Jésus a répondu : Tu es un enseignant en Israël. Tu devais comprendre ces choses ! '
  '11':
  - type: text
    content: 'Je te dis la vérité. Nous parlons des choses que nous connaissons. Nous vous disons ce que nous avons vu. Mais même alors, vous les gens, vous ne croyez pas à nos paroles. '
  '12':
  - type: text
    content: 'Je vous ai parlé des choses qui arrivent dans ce monde. Et vous ne me croyez pas. Il y a aussi des choses au '
  - type: text
    content: ciel
  - type: text
    content: '. Vous n’allez pas croire à cela, si je vous en parle. '
  '13':
  - type: text
    content: 'Le Fils de l’homme est descendu du '
  - type: text
    content: ciel
  - type: text
    content: '. Personne d’autre n’est monté au '
  - type: text
    content: ciel
  - type: text
    content: ' sauf lui. '
  '14':
  - type: text
    content: 'Et les gens vont élever le Fils de l’homme. Moïse avait aussi élevé le serpent dans le '
  - type: text
    content: désert
  - type: text
    content: '. Moïse avait fait un serpent de métal. Il l’avait élevé pour le montrer au peuple d’Israël. De la même façon, les gens vont élever le Fils de l’homme. Ils vont le montrer à tout le monde. '
  '15':
  - type: text
    content: 'Donc, tout le monde qui croit en lui, vivra toujours. '
  '16':
  - type: text
    content: Dieu aime beaucoup les gens. Il leur a donné son Fils unique. Ainsi, tous les gens qui croient au Fils ne mourront pas. Mais, ils vont vivre toujours.
  '17':
  - type: text
    content: 'Dieu n’a pas envoyé son Fils dans le monde pour punir les gens. Non, Dieu l’a envoyé pour sauver les gens dans le monde. '
  '18':
  - type: text
    content: 'Dieu ne punira pas toute personne qui croit au Fils. Mais Dieu punira certaines personnes. Dieu punira toute personne qui refuse de croire en lui. '
  '19':
  - type: text
    content: 'Dieu a déjà décidé de punir certaines personnes. C’est parce que la lumière est venue dans le monde. Mais les gens n’aimaient pas la lumière. Ils aimaient plutôt l’obscurité. Ils faisaient de mauvaises choses. '
  '2':
  - type: text
    content: 'Il est venu auprès de Jésus la nuit. Il a dit à Jésus : Rabbi, nous savons que Dieu t’a envoyé pour nous. Nous avons vu les miracles que tu fais. Personne ne peut faire ces choses à moins que Dieu soit avec lui. '
  '20':
  - type: text
    content: 'Tout le monde qui fait de mauvaises choses déteste la lumière. Une telle personne ne viendra pas à la lumière parce qu’elle a peur. Elle ne veut pas que les gens voient ses mauvaises choses. '
  '21':
  - type: text
    content: Mais toute personne qui obéit à la vérité, vient à la lumière. Alors la lumière va montrer qu’elle fait le travail de Dieu. Tout le monde peut voir que cette personne obéit à Dieu.
  - type: heading
    content: Jésus et Jean‑Baptiste
  '22':
  - type: text
    content: 'Après cela, Jésus et ses '
  - type: text
    content: disciples
  - type: text
    content: ' se sont rendus en Judée. Jésus est resté là avec ses '
  - type: text
    content: disciples
  - type: text
    content: ' un certain temps. Il baptisait les gens là‑bas. '
  '23':
  - type: text
    content: 'Jean baptisait les gens aussi. C’était à Enon, près de Salim. Il y avait beaucoup d’eau là‑bas. Les gens venaient auprès de Jean. Il les baptisait. '
  '24':
  - type: text
    content: 'En ce temps‑là, Jean n’était pas encore mis en prison. '
  '25':
  - type: text
    content: 'Un certain '
  - type: text
    content: Juif
  - type: text
    content: ' a commencé à discuter avec les '
  - type: text
    content: disciples
  - type: text
    content: ' de Jean. Ils discutaient au sujet de certaines règles. Ces règles disaient aux gens quand et comment ils devaient se purifier. '
  '26':
  - type: text
    content: 'Les '
  - type: text
    content: disciples
  - type: text
    content: ' sont venus auprès de Jean.'
  - type: text
    content: 'Ils lui ont dit : Maître, souviens‑toi de l’homme, Jésus, dont tu nous parlais. Il était avec toi de l’autre côté du '
  - type: text
    content: Jourdain
  - type: text
    content: . Il baptisait les gens et tout le monde allait à lui.
  '27':
  - type: text
    content: 'Jean a répondu : Un homme ne peut recevoir que ce que Dieu lui donne. '
  '28':
  - type: text
    content: 'Souvenez‑vous de ce que je disais : Je ne suis pas le '
  - type: text
    content: Christ
  - type: text
    content: ', mais Dieu m’a envoyé avant le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'La mariée est l’épouse de l’époux. Mais l’ami de l’époux se tient près de lui et il écoute. Cet ami est très heureux quand il entend la voix de l’époux. Je suis comme cet ami. Donc je suis complètement heureux maintenant. '
  '3':
  - type: text
    content: 'Jésus a répondu : Je te dis la vérité. Sauf si une personne est née d’en haut, sinon elle ne peut pas voir le '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. '
  '30':
  - type: text
    content: Il doit devenir plus grand. Mais je dois devenir moins important.
  '31':
  - type: text
    content: 'Celui qui vient d’en haut est plus grand que tout. Une personne qui vient de la terre appartient à la terre. Une telle personne ne parle que des choses de la terre. Celui qui vient du '
  - type: text
    content: ciel
  - type: text
    content: ' est plus grand que tout. '
  '32':
  - type: text
    content: 'Il raconte ce qu’il a vu. Il raconte ce qu’il a entendu. Mais personne ne croit à ce qu’il dit. '
  '33':
  - type: text
    content: 'Toute personne qui accepte son message dit : Oui, Dieu est vrai. '
  '34':
  - type: text
    content: La personne que Dieu a envoyée dit les paroles de Dieu. Dieu la remplit complètement avec l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. '
  '35':
  - type: text
    content: 'Le Père aime le Fils. Il a donné le pouvoir au Fils sur toutes choses. '
  '36':
  - type: text
    content: Celui qui croit au Fils est vivant pour toujours. Mais tous ceux qui ne veulent pas obéir au Fils ne vivront jamais vraiment. Dieu continuera d’être en colère contre une personne qui refuse d’obéir au Fils.
  '4':
  - type: text
    content: 'Nicodème a demandé : Comment un homme peut‑il naître quand il est vieux ? Il ne peut pas retourner dans le corps de sa mère. Il ne peut pas être né une seconde fois. '
  '5':
  - type: text
    content: 'Jésus lui a expliqué : Je te dis la vérité. Une personne doit être née d’eau et d’'
  - type: text
    content: esprit
  - type: text
    content: '. Sinon, elle ne peut pas entrer dans le '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. '
  '6':
  - type: text
    content: Les humains donnent naissance à ce qui est humain. Mais l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu donne naissance à ce qui est '
  - type: text
    content: Esprit
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Je t’ai dit : Tu dois être né d’en haut. Ce que je dis ne devrait pas te surprendre. '
  '8':
  - type: text
    content: C’est comme le vent pour tout le monde qui est né par l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu. Le vent souffle où il veut. Tu peux l’entendre. Mais tu ne peux pas dire d’où il vient. Et tu ne peux pas dire où il va.'
  '9':
  - type: text
    content: 'Nicodème a demandé : Comment cela peut‑il arriver ? '
