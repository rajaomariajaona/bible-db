document_id: ACT.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Les chefs des Juifs arrêtent Pierre et Jean
  - type: text
    content: 'Pierre et Jean parlaient au peuple. Puis certains '
  - type: text
    content: prêtres
  - type: text
    content: ', certains '
  - type: text
    content: Sadducéens
  - type: text
    content: ' et le commandant du '
  - type: text
    content: Temple
  - type: text
    content: ' sont venus vers eux. '
  '10':
  - type: text
    content: Maintenant je dois vous dire quelque chose et à tout le peuple d’Israël. Alors vous saurez tous comment ceci s’est produit. Cet homme se tient avec nous devant vous. Ses jambes sont fortes, parce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' de Nazareth est puissant. Jésus a le pouvoir de faire ceci. Vous avez tué Jésus sur une croix. Il est mort, mais après cela, Dieu l’a fait devenir vivant encore. '
  '11':
  - type: text
    content: 'Dans les Saintes Écritures, nous lisons que Jésus est comme une pierre. Il est comme la pierre que vous les constructeurs avaient rejetée. Cette pierre est maintenant devenue la plus importante pierre du coin. '
  '12':
  - type: text
    content: 'Alors Pierre a dit : C’est seulement Jésus qui peut sauver les gens. Il n’y a jamais eu une autre personne dans le monde qui puisse faire ceci. Dieu n’a pas donné à un autre homme le pouvoir de nous sauver.'
  '13':
  - type: text
    content: 'Alors les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' ont su que Pierre et Jean étaient très courageux. Ils ont également su que Pierre et Jean étaient de simples hommes. Ils n’avaient jamais été à une école. Ainsi les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' étaient totalement étonnés. Ils ont également compris que Pierre et Jean avaient été avec Jésus. '
  '14':
  - type: text
    content: 'Ces hommes ont vu l’homme qui avait les jambes faibles. Et ils ont vu que ses jambes étaient maintenant fortes. Ainsi ils ne pouvaient rien faire ni dire à Pierre et à Jean. '
  '15':
  - type: text
    content: 'Ils ont commandé à Pierre et Jean de quitter la salle du '
  - type: text
    content: Sanhédrin
  - type: text
    content: '. Alors ces hommes ont parlé entre eux : '
  '16':
  - type: text
    content: 'Que devons‑nous faire de ces hommes ? Tous les gens qui habitent à Jérusalem savent ces choses. Ils savent que Pierre et Jean ont fait une chose très spéciale pour cet homme. Ainsi nous ne pouvons pas dire qu’ils ne l’ont pas faite. '
  '17':
  - type: text
    content: 'Nous ne voulons pas que plusieurs personnes sachent ceci. Ainsi nous devons dire à ces hommes : Vous devez laisser d’utiliser le nom de Jésus. Vous devez laisser de parler aux gens de Jésus.'
  '18':
  - type: text
    content: 'Alors ils ont demandé à Pierre et à Jean de revenir dans la salle. Ils ont dit à Pierre et à Jean : Vous ne devez plus parler aux gens ni les enseigner au sujet de Jésus. Vous n’avez aucun pouvoir. '
  '19':
  - type: text
    content: 'Puis Pierre et Jean leur ont répondu : Vous devez vous décider lesquelles de ces choses Dieu veut que nous fassions. Ou nous devrons vous obéir, ou nous devrons obéir à Dieu. '
  '2':
  - type: text
    content: 'Ces personnes étaient fâchées à cause des choses que Pierre et Jean disaient à la foule. Ils disaient ceci : Jésus est devenu vivant encore après sa mort. Ceci a prouvé à chacun que les morts pouvaient ressusciter. '
  '20':
  - type: text
    content: Nous devons continuer à parler de ces choses. Et nous devons dire aux gens tout ce que nous avons vu et entendu.
  '21':
  - type: text
    content: 'Les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' les ont menacés encore. Ensuite, ils les ont laissés partir. Les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' ont vu qu’il était impossible de punir Pierre et Jean. Tous les gens glorifiaient Dieu à cause de ce qui est arrivé. '
  '22':
  - type: text
    content: L’homme que Dieu avait fait devenir bien, avait plus de 40 ans.
  - type: heading
    content: Tous les croyants prient Dieu
  '23':
  - type: text
    content: 'Après un temps, les hommes du '
  - type: text
    content: Sanhédrin
  - type: text
    content: ' ont libéré Pierre et Jean. Alors Pierre et Jean sont retournés au groupe des croyants. Ils leur ont dit tout ce que les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: anciens
  - type: text
    content: ' leur avaient dit. '
  '24':
  - type: text
    content: 'Et les croyants écoutaient ce que Pierre et Jean leur disaient. Alors ils priaient ensemble : Tu es Dieu et tu règnes au‑dessus de tout. Tu as fait le '
  - type: text
    content: ciel
  - type: text
    content: ', la terre et la mer. Tu as également fait tout ce qui est en eux. '
  '25':
  - type: text
    content: 'Le roi David, notre ancêtre était également ton serviteur. Tu as envoyé ton Saint‑Esprit pour l’aider. Et ton '
  - type: text
    content: Esprit
  - type: text
    content: ' a dit au roi David de dire :'
  - type: text
    content: 'Les gens qui n’étaient pas '
  - type: text
    content: Juifs
  - type: text
    content: ' étaient très fâchés. Le peuple a fait les plans qui ne se réaliseront pas.'
  '26':
  - type: text
    content: 'Les rois sur la terre se sont préparés à combattre. Les chefs du monde se sont réunis ensemble. Ils ont voulu lutter contre le '
  - type: text
    content: Seigneur
  - type: text
    content: . Ils vont aussi lutter contre le serviteur spécial que Dieu a choisi.
  '27':
  - type: text
    content: 'Les croyants ont continué à prier : Hérode et Ponce Pilate se sont rencontrés. Ils ont aussi rencontré d’autres gens qui n’étaient pas '
  - type: text
    content: Juifs
  - type: text
    content: '. Ils ont également rencontré le peuple d’Israël qui était à Jérusalem. Ensemble, ils ont parlé contre Jésus. Jésus était ton serviteur spécial et ils ont tous voulu le tuer. Tu l’avais choisi pour être le '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Oui, Dieu, tu es puissant. Et tu avais déjà décidé ce que ces hommes feront à Jésus. Ainsi ils se sont réunis ensemble. Et ils ont fait ce que tu as voulu faire arriver à Jésus. '
  '29':
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', écoute ce qu’ils disent. Ils feront de mauvaises choses contre nous. Mais nous sommes tes serviteurs. Rends‑nous courageux quand nous disons ton message au peuple. '
  '3':
  - type: text
    content: 'Ainsi, ils ont arrêté Pierre et Jean. Ils les ont mis en prison jusqu’au lendemain. C’était déjà le soir. '
  '30':
  - type: text
    content: Et étends ta main pour guérir. Fais des choses extraordinaires par le nom de ton saint serviteur Jésus.
  '31':
  - type: text
    content: Ils ont fini de prier. Puis, la maison où ils se réunissaient ensemble a tremblé. Dieu les a tous remplis de son Saint‑
  - type: text
    content: Esprit
  - type: text
    content: . Et le Saint‑
  - type: text
    content: Esprit
  - type: text
    content: ' les a rendus très courageux. Ils parlaient encore de Jésus au peuple.'
  - type: heading
    content: Les croyants se partagent des choses
  '32':
  - type: text
    content: 'Tous les croyants pensaient tous de la même manière. Ils ne gardaient aucune de leurs propres choses pour eux‑mêmes. Ils se partageaient les choses qu’ils avaient. '
  '33':
  - type: text
    content: 'Les paroles des '
  - type: text
    content: apôtres
  - type: text
    content: ' étaient puissantes. Les '
  - type: text
    content: apôtres
  - type: text
    content: ' parlaient de Jésus aux gens. Ils disaient : Après la mort de Jésus, Dieu l’a fait vivre encore. Ils disaient aux gens ce qu’ils avaient vu. Dieu aidait les croyants de beaucoup de différentes manières. '
  '34':
  - type: text
    content: 'Ils avaient tout ce dont ils avaient besoin. Certains croyants avaient des terres ou des maisons. Ils les vendaient. Ils prenaient de l’argent qu’ils recevaient pour ces choses. Ils l’apportaient aux '
  - type: text
    content: apôtres
  - type: text
    content: '. '
  '35':
  - type: text
    content: 'Ensuite, les '
  - type: text
    content: apôtres
  - type: text
    content: ' le distribuaient aux croyants selon les besoins de chacun.'
  '36':
  - type: text
    content: 'Il y avait un croyant appelé Joseph. Il était de la famille de Lévi. Il était de l’île appelée Chypre. Il encourageait les autres croyants à bien travailler. C’est pourquoi les '
  - type: text
    content: apôtres
  - type: text
    content: ' l’ont appelé Barnabas. '
  '37':
  - type: text
    content: 'Barnabas a vendu un champ. Et il a apporté l’argent aux '
  - type: text
    content: apôtres
  - type: text
    content: .
  '4':
  - type: text
    content: Mais plusieurs personnes dans la foule ont cru au message de Pierre. Il y avait environ 5 000 hommes qui ont cru en Jésus.
  '5':
  - type: text
    content: 'Le jour suivant, les chefs du peuple se sont réunis ensemble à Jérusalem. Les '
  - type: text
    content: anciens
  - type: text
    content: ' et les enseignants de la loi se sont réunis avec eux. '
  '6':
  - type: text
    content: 'Ils ont rencontré Anne qui était le '
  - type: text
    content: grand prêtre
  - type: text
    content: '. Caïphe, Jean et Alexandre étaient également là. Ils faisaient partie de la famille du '
  - type: text
    content: grand prêtre
  - type: text
    content: '. D’autres hommes de leur famille étaient avec eux. '
  '7':
  - type: text
    content: 'Ils ont dit à Pierre et à Jean : Mettez‑vous devant nous ! Ils ont demandé à Pierre et à Jean comment ils ont rendu les jambes de l’homme fortes. Qui vous a donné la puissance et le pouvoir de le faire ?'
  '8':
  - type: text
    content: 'Alors le Saint‑Esprit a dit à Pierre quoi dire à ces hommes. Ainsi Pierre leur a répondu : Vous tous hommes, vous êtes les chefs du peuple et vous êtes les '
  - type: text
    content: anciens
  - type: text
    content: ' d’Israël. '
  '9':
  - type: text
    content: 'Aujourd’hui, vous nous posez des questions sur la bonne chose que nous avons faite à cet homme. Vous nous demandez comment nous avons fait devenir ses jambes fortes. '
