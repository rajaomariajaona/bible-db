document_id: ACT.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' arrêtent Pierre et Jean'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pierre et Jean parlaient au peuple. Puis certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ', certains '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sadducéens
  - type: text
    text: ' et le commandant du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Temple
  - type: text
    text: ' sont venus vers eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ces personnes étaient fâchées à cause des choses que Pierre et Jean disaient à la foule. Ils disaient ceci : Jésus est devenu vivant encore après sa mort. Ceci a prouvé à chacun que les morts pouvaient ressusciter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi, ils ont arrêté Pierre et Jean. Ils les ont mis en prison jusqu’au lendemain. C’était déjà le soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mais plusieurs personnes dans la foule ont cru au message de Pierre. Il y avait environ 5 000 hommes qui ont cru en Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le jour suivant, les chefs du peuple se sont réunis ensemble à Jérusalem. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' et les enseignants de la loi se sont réunis avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils ont rencontré Anne qui était le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: '. Caïphe, Jean et Alexandre étaient également là. Ils faisaient partie de la famille du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: '. D’autres hommes de leur famille étaient avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils ont dit à Pierre et à Jean : Mettez‑vous devant nous ! Ils ont demandé à Pierre et à Jean comment ils ont rendu les jambes de l’homme fortes. Qui vous a donné la puissance et le pouvoir de le faire ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors le Saint‑Esprit a dit à Pierre quoi dire à ces hommes. Ainsi Pierre leur a répondu : Vous tous hommes, vous êtes les chefs du peuple et vous êtes les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aujourd’hui, vous nous posez des questions sur la bonne chose que nous avons faite à cet homme. Vous nous demandez comment nous avons fait devenir ses jambes fortes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant je dois vous dire quelque chose et à tout le peuple d’Israël. Alors vous saurez tous comment ceci s’est produit. Cet homme se tient avec nous devant vous. Ses jambes sont fortes, parce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de Nazareth est puissant. Jésus a le pouvoir de faire ceci. Vous avez tué Jésus sur une croix. Il est mort, mais après cela, Dieu l’a fait devenir vivant encore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dans les Saintes Écritures, nous lisons que Jésus est comme une pierre. Il est comme la pierre que vous les constructeurs avaient rejetée. Cette pierre est maintenant devenue la plus importante pierre du coin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors Pierre a dit : C’est seulement Jésus qui peut sauver les gens. Il n’y a jamais eu une autre personne dans le monde qui puisse faire ceci. Dieu n’a pas donné à un autre homme le pouvoir de nous sauver.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' ont su que Pierre et Jean étaient très courageux. Ils ont également su que Pierre et Jean étaient de simples hommes. Ils n’avaient jamais été à une école. Ainsi les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' étaient totalement étonnés. Ils ont également compris que Pierre et Jean avaient été avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ces hommes ont vu l’homme qui avait les jambes faibles. Et ils ont vu que ses jambes étaient maintenant fortes. Ainsi ils ne pouvaient rien faire ni dire à Pierre et à Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils ont commandé à Pierre et Jean de quitter la salle du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: '. Alors ces hommes ont parlé entre eux : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que devons‑nous faire de ces hommes ? Tous les gens qui habitent à Jérusalem savent ces choses. Ils savent que Pierre et Jean ont fait une chose très spéciale pour cet homme. Ainsi nous ne pouvons pas dire qu’ils ne l’ont pas faite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nous ne voulons pas que plusieurs personnes sachent ceci. Ainsi nous devons dire à ces hommes : Vous devez laisser d’utiliser le nom de Jésus. Vous devez laisser de parler aux gens de Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors ils ont demandé à Pierre et à Jean de revenir dans la salle. Ils ont dit à Pierre et à Jean : Vous ne devez plus parler aux gens ni les enseigner au sujet de Jésus. Vous n’avez aucun pouvoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis Pierre et Jean leur ont répondu : Vous devez vous décider lesquelles de ces choses Dieu veut que nous fassions. Ou nous devrons vous obéir, ou nous devrons obéir à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nous devons continuer à parler de ces choses. Et nous devons dire aux gens tout ce que nous avons vu et entendu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' les ont menacés encore. Ensuite, ils les ont laissés partir. Les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' ont vu qu’il était impossible de punir Pierre et Jean. Tous les gens glorifiaient Dieu à cause de ce qui est arrivé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L’homme que Dieu avait fait devenir bien, avait plus de 40 ans.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tous les croyants prient Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Après un temps, les hommes du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Sanhédrin
  - type: text
    text: ' ont libéré Pierre et Jean. Alors Pierre et Jean sont retournés au groupe des croyants. Ils leur ont dit tout ce que les chefs des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' et les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anciens
  - type: text
    text: ' leur avaient dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et les croyants écoutaient ce que Pierre et Jean leur disaient. Alors ils priaient ensemble : Tu es Dieu et tu règnes au‑dessus de tout. Tu as fait le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ciel
  - type: text
    text: ', la terre et la mer. Tu as également fait tout ce qui est en eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le roi David, notre ancêtre était également ton serviteur. Tu as envoyé ton Saint‑Esprit pour l’aider. Et ton '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' a dit au roi David de dire :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les gens qui n’étaient pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: ' étaient très fâchés. Le peuple a fait les plans qui ne se réaliseront pas.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les rois sur la terre se sont préparés à combattre. Les chefs du monde se sont réunis ensemble. Ils ont voulu lutter contre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Ils vont aussi lutter contre le serviteur spécial que Dieu a choisi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les croyants ont continué à prier : Hérode et Ponce Pilate se sont rencontrés. Ils ont aussi rencontré d’autres gens qui n’étaient pas '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Juifs
  - type: text
    text: '. Ils ont également rencontré le peuple d’Israël qui était à Jérusalem. Ensemble, ils ont parlé contre Jésus. Jésus était ton serviteur spécial et ils ont tous voulu le tuer. Tu l’avais choisi pour être le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Oui, Dieu, tu es puissant. Et tu avais déjà décidé ce que ces hommes feront à Jésus. Ainsi ils se sont réunis ensemble. Et ils ont fait ce que tu as voulu faire arriver à Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Maintenant, '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', écoute ce qu’ils disent. Ils feront de mauvaises choses contre nous. Mais nous sommes tes serviteurs. Rends‑nous courageux quand nous disons ton message au peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et étends ta main pour guérir. Fais des choses extraordinaires par le nom de ton saint serviteur Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ils ont fini de prier. Puis, la maison où ils se réunissaient ensemble a tremblé. Dieu les a tous remplis de son Saint‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: . Et le Saint‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' les a rendus très courageux. Ils parlaient encore de Jésus au peuple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les croyants se partagent des choses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tous les croyants pensaient tous de la même manière. Ils ne gardaient aucune de leurs propres choses pour eux‑mêmes. Ils se partageaient les choses qu’ils avaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les paroles des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' étaient puissantes. Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' parlaient de Jésus aux gens. Ils disaient : Après la mort de Jésus, Dieu l’a fait vivre encore. Ils disaient aux gens ce qu’ils avaient vu. Dieu aidait les croyants de beaucoup de différentes manières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils avaient tout ce dont ils avaient besoin. Certains croyants avaient des terres ou des maisons. Ils les vendaient. Ils prenaient de l’argent qu’ils recevaient pour ces choses. Ils l’apportaient aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ensuite, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' le distribuaient aux croyants selon les besoins de chacun.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il y avait un croyant appelé Joseph. Il était de la famille de Lévi. Il était de l’île appelée Chypre. Il encourageait les autres croyants à bien travailler. C’est pourquoi les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' l’ont appelé Barnabas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Barnabas a vendu un champ. Et il a apporté l’argent aux '
  - type: usfm
    marker: w
    children:
    - type: text
      text: apôtres
  - type: text
    text: .
