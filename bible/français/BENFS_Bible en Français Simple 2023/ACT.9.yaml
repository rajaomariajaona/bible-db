document_id: ACT.9,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 9
  - type: heading
    content: Saul sait que Jésus est son Seigneur
  - type: text
    content: 'Tout ce temps, Saul disait qu’il voulait tuer tous les croyants. Ainsi il est allé voir le '
  - type: text
    content: grand prêtre
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ananias était un croyant qui habitait à Damas. Saul est arrivé à Damas. Après, Ananias a fait un rêve. Mais Ananias n’était pas endormi. Dans le rêve, Jésus a parlé à Ananias. Jésus a dit : Ananias ! Ananias lui a répondu. Il a dit : Maître : Je suis ici.'
  '11':
  - type: text
    content: 'Jésus a dit : Prépare‑toi et va dans la rue. Un homme appelé Judas vit dans cette rue. Va à sa maison. Et demande un homme qui vient de Tarse. Son nom est Saul. Il prie Dieu. '
  '12':
  - type: text
    content: Saul a également fait un rêve quand il n’était pas endormi. Dans son rêve, Saul t’a vu, Ananias. Tu es venu pour le voir. Tu as mis tes mains sur Saul, pour qu’il puisse voir encore.
  '13':
  - type: text
    content: 'Ananias a dit au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus : '
  - type: text
    content: Seigneur
  - type: text
    content: ', beaucoup de gens m’ont parlé de cet homme. Ils m’ont parlé du mal qu’il faisait à ton peuple à Jérusalem. '
  '14':
  - type: text
    content: 'Maintenant il est venu à Damas. Et je sais qu’il a apporté des lettres avec lui des chefs des '
  - type: text
    content: prêtres
  - type: text
    content: '. Ils lui ont donné le pouvoir contre ton peuple. Saul devait les arrêter et les lier. '
  '15':
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit à Ananias : Va et fais cela pour moi. J’ai choisi Saul pour travailler pour moi. Il parlera de moi à ceux qui ne sont pas '
  - type: text
    content: Juifs
  - type: text
    content: ' et à leurs chefs. Il parlera également de moi au peuple d’Israël. '
  '16':
  - type: text
    content: Saul aura beaucoup de difficultés, parce qu’il travaillera pour moi. Je lui parlerai de ces choses moi‑même.
  '17':
  - type: text
    content: 'Ainsi Ananias est allé à la maison de Judas. Il est entré dans la maison, et il a posé ses mains sur Saul. Alors il lui a dit : Frère Saul, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus lui‑même m’a envoyé ici pour te voir. C’était Jésus que tu avais vu sur la route à Damas. Tu l’as vu quand tu venais ici. Il m’a envoyé à toi pour que tu puisses revoir. Dieu te donnera également son '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: .
  '18':
  - type: text
    content: 'Alors immédiatement, quelque chose est tombé des yeux de Saul. C’était comme des écailles. Alors Saul a pu voir encore. Ainsi il s’est levé et Ananias l’a baptisé. '
  '19':
  - type: text
    content: Alors Saul a mangé de la nourriture et il s’est senti fort encore. Saul enseignait aux habitants de Damas la Bonne Nouvelle au sujet de Jésus.
  - type: text
    content: 'Saul est resté avec les croyants à Damas pendant quelques jours. '
  '2':
  - type: text
    content: 'Il a demandé au '
  - type: text
    content: grand prêtre
  - type: text
    content: ' des lettres disant : Je peux donner une de ces lettres à chaque chef de chaque '
  - type: text
    content: synagogue
  - type: text
    content: ' de Damas. Peut‑être que certains là croient en ce que Jésus a enseigné. Et si je trouve de telles personnes, je peux les arrêter. Je peux les lier avec des cordes. Et je peux les amener tous, des hommes et des femmes, ici à Jérusalem. '
  '20':
  - type: text
    content: 'Il est immédiatement allé dans les '
  - type: text
    content: synagogues
  - type: text
    content: '. Là, il enseignait les gens sur Jésus. Il leur disait : Jésus est le fils de Dieu. '
  '21':
  - type: text
    content: 'Beaucoup de personnes entendaient ce que Saul disait. Elles étaient toutes très étonnantes et elles se sont dites : C’est le même homme qui était à Jérusalem. Nous sommes sûrs de cela. À Jérusalem, il tuait les gens qui croyaient en Jésus. Alors il est venu ici à Damas pour attraper des croyants. Il a voulu les ramener à Jérusalem. Là ils devraient être devant les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' pour jugement. '
  '22':
  - type: text
    content: 'Mais alors Saul était bien puissant quand il enseignait le peuple. Il disait : Jésus est le '
  - type: text
    content: Christ
  - type: text
    content: ', la personne spéciale que Dieu nous a envoyée. Saul disait toutes les bonnes choses au sujet de Jésus. Ainsi les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui habitaient à Damas ne pouvaient pas lui répondre. '
  '23':
  - type: text
    content: 'Après beaucoup de jours, les '
  - type: text
    content: Juifs
  - type: text
    content: ' se sont réunis ensemble. Et ils ont décidé de tuer Saul. '
  '24':
  - type: text
    content: 'Mais quelqu’un a dit cela à Paul. Les '
  - type: text
    content: Juifs
  - type: text
    content: ' ont gardé les portes de la ville le jour entier et toute la nuit. Ils ont voulu attraper Saul et le tuer.'
  '25':
  - type: text
    content: Mais une nuit, les amis de Saul l’ont aidé à partir de la ville. Ils ont mis Saul dans un panier, et alors ils ont mis le panier à travers un trou du mur de la ville. Alors ils ont laissé le panier aller lentement vers le bas sur la terre.
  - type: heading
    content: Saul revient à Jérusalem
  '26':
  - type: text
    content: 'Quand Saul est revenu à Jérusalem, il a voulu se joindre aux croyants là. Mais ils avaient peur de lui. Ils n’ont pas cru qu’il était maintenant un '
  - type: text
    content: disciple
  - type: text
    content: ' de Jésus.'
  '27':
  - type: text
    content: 'Un croyant appelé Barnabas a aidé Saul. Il a amené Saul pour parler avec les '
  - type: text
    content: apôtres
  - type: text
    content: '. Et Barnabas a alors expliqué aux '
  - type: text
    content: apôtres
  - type: text
    content: ' ce qui était arrivé à Saul. Barnabas leur a dit : Saul a vu le '
  - type: text
    content: Seigneur
  - type: text
    content: ' quand il était sur la route à Damas. Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui a parlé. Quand Saul était à Damas, il parlait courageusement au peuple avec le pouvoir de Jésus.'
  '28':
  - type: text
    content: 'Ainsi après cela, Saul est resté avec les '
  - type: text
    content: apôtres
  - type: text
    content: '. Il allait autour de tout Jérusalem et enseignait le peuple dans des paroles claires, avec le pouvoir de Jésus. '
  '29':
  - type: text
    content: 'Saul parlait aussi avec les '
  - type: text
    content: Juifs
  - type: text
    content: ' qui parlaient la langue grecque. Il discutait avec eux au sujet de Jésus. Ainsi ils ont essayé de le tuer.'
  '3':
  - type: text
    content: 'Saul a voyagé vers Damas. Il était presque à la ville. Alors il a brusquement vu une très grande lumière. La lumière venait du '
  - type: text
    content: ciel
  - type: text
    content: ', et elle a éclairé toute la partie autour. '
  '30':
  - type: text
    content: 'Les autres croyants ont entendu parler de ceci. Ainsi ils ont amené Saul à '
  - type: text
    content: Césarée
  - type: text
    content: ', et de là, Saul est parti à Tarse. '
  '31':
  - type: text
    content: Maintenant il y avait des croyants en Judée, en Galilée et Samarie, et pendant un certain temps ils n’ont eu aucune difficulté. Le Saint‑Esprit les aidait à devenir forts. Beaucoup plus de gens sont devenus des croyants. Et ils obéissaient à Dieu dans tout ce qu’ils faisaient.
  - type: heading
    content: Pierre voyage à Lydde et à Joppé
  '32':
  - type: text
    content: Maintenant, Pierre voyageait souvent à différents endroits. Un jour, il a voyagé à Lydde. Quelques croyants vivaient là, et Pierre est allé les voir.
  '33':
  - type: text
    content: 'A Lydde, Pierre a rencontré un homme appelé Énée. Énée ne pouvait pas bouger ses bras et jambes. Ainsi il se couchait sur son lit à tout moment. Il était ainsi pendant 8 années. '
  '34':
  - type: text
    content: 'Pierre a dit à Énée : Jésus te fera devenir bien encore. Lève‑toi et prends tes choses. Immédiatement Énée s’est levé. '
  '35':
  - type: text
    content: 'Beaucoup de gens qui habitaient dans Lydde et Saron ont vu Énée. Et ils ont commencé à obéir au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Tabitha devient encore vivante
  '36':
  - type: text
    content: 'Une femme appelée Tabitha habitait à '
  - type: text
    content: Joppé
  - type: text
    content: '. Elle était une croyante. Tabitha est un nom dans la langue '
  - type: text
    content: araméen
  - type: text
    content: 'ne. Dans en grec, son nom était Dorcas. Dorcas signifie gazelle. Dorcas faisait de bonnes choses et elle aidait des pauvres à tout moment. '
  '37':
  - type: text
    content: 'Dorcas est devenue très malade et alors elle est morte. Les femmes ont lavé son corps mort et elles l’ont mis dans la haute chambre. '
  '38':
  - type: text
    content: Joppé
  - type: text
    content: ' n’était pas très loin de Lydde. Et les croyants de '
  - type: text
    content: Joppé
  - type: text
    content: ' ont entendu que Pierre était à Lydde. Ainsi ils lui ont envoyé 2 hommes avec un message. Ils ont écrit dans le message : Dépêche‑toi et viens à '
  - type: text
    content: Joppé
  - type: text
    content: .
  '39':
  - type: text
    content: 'Pierre s’est préparé et il est revenu à '
  - type: text
    content: Joppé
  - type: text
    content: ' avec les 2 hommes. Quand il est arrivé à la maison de Dorcas, les femmes l’ont emmené en haut. Beaucoup d’autres femmes étaient là. Leurs maris étaient morts. Elles pleuraient et elles sont toutes venues près de Pierre. Elles lui montraient des habits. Elle les a faits quand elle était encore avec elles.'
  '4':
  - type: text
    content: 'Saul est tombé à terre. Il entendait quelqu’un lui dire : Saul, Saul, pourquoi es‑tu en train de me faire souffrir ?'
  '40':
  - type: text
    content: 'Pierre a mis toutes ces femmes hors de la salle. Il s’est mis à genoux et il a prié Dieu. Alors il a tourné sa tête vers le corps mort. Il a dit : Tabitha, lève‑toi ! Elle a ouvert les yeux. Et quand elle a vu Pierre, elle s’est mise assise. '
  '41':
  - type: text
    content: 'Pierre l’a prise par la main et il l’a fait lever. Alors il a demandé à tous les croyants et aux autres femmes de venir dans la salle. Et il leur a prouvé qu’elle était encore vivante. '
  '42':
  - type: text
    content: 'Les croyants disaient à d’autres ce qui s’était passé. Alors partout à '
  - type: text
    content: Joppé
  - type: text
    content: ', les gens ont entendu ce qui s’était passé. Et beaucoup plus de personnes ont cru au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus. '
  '43':
  - type: text
    content: 'Pierre est resté à '
  - type: text
    content: Joppé
  - type: text
    content: ' pendant beaucoup de jours. Il est resté avec un homme appelé Simon. Simon était un '
  - type: text
    content: corroyeur
  - type: text
    content: .
  '5':
  - type: text
    content: 'Saul a demandé : '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui es‑tu ? La voix a dit : Je suis Jésus. Et tu es en train de me faire souffrir. '
  '6':
  - type: text
    content: Maintenant lève‑toi et entre à Damas. Quelqu’un viendra chez toi quand tu arriveras dans la ville. Il te dira quoi faire.
  '7':
  - type: text
    content: 'Les hommes qui étaient avec Saul étaient calmes. Ils n’ont pas parlé. Ils entendaient la voix. Mais ils ne voyaient personne. '
  '8':
  - type: text
    content: 'Saul s’est levé et il a ouvert ses yeux. Mais il ne pouvait rien voir. Les hommes qui étaient avec Saul ont tenu sa main. Et ils l’ont conduit à Damas. '
  '9':
  - type: text
    content: Pendant 3 jours, Saul ne pouvait rien voir. Et pendant ces 3 jours, il n’a rien mangé ni bu.
