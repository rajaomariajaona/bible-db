document_id: ACT.9,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 9
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Saul sait que Jésus est son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tout ce temps, Saul disait qu’il voulait tuer tous les croyants. Ainsi il est allé voir le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ananias était un croyant qui habitait à Damas. Saul est arrivé à Damas. Après, Ananias a fait un rêve. Mais Ananias n’était pas endormi. Dans le rêve, Jésus a parlé à Ananias. Jésus a dit : Ananias ! Ananias lui a répondu. Il a dit : Maître : Je suis ici.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jésus a dit : Prépare‑toi et va dans la rue. Un homme appelé Judas vit dans cette rue. Va à sa maison. Et demande un homme qui vient de Tarse. Son nom est Saul. Il prie Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Saul a également fait un rêve quand il n’était pas endormi. Dans son rêve, Saul t’a vu, Ananias. Tu es venu pour le voir. Tu as mis tes mains sur Saul, pour qu’il puisse voir encore.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ananias a dit au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', beaucoup de gens m’ont parlé de cet homme. Ils m’ont parlé du mal qu’il faisait à ton peuple à Jérusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Maintenant il est venu à Damas. Et je sais qu’il a apporté des lettres avec lui des chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: '. Ils lui ont donné le pouvoir contre ton peuple. Saul devait les arrêter et les lier. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit à Ananias : Va et fais cela pour moi. J’ai choisi Saul pour travailler pour moi. Il parlera de moi à ceux qui ne sont pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' et à leurs chefs. Il parlera également de moi au peuple d’Israël. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Saul aura beaucoup de difficultés, parce qu’il travaillera pour moi. Je lui parlerai de ces choses moi‑même.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ainsi Ananias est allé à la maison de Judas. Il est entré dans la maison, et il a posé ses mains sur Saul. Alors il lui a dit : Frère Saul, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus lui‑même m’a envoyé ici pour te voir. C’était Jésus que tu avais vu sur la route à Damas. Tu l’as vu quand tu venais ici. Il m’a envoyé à toi pour que tu puisses revoir. Dieu te donnera également son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Saint‑Esprit
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors immédiatement, quelque chose est tombé des yeux de Saul. C’était comme des écailles. Alors Saul a pu voir encore. Ainsi il s’est levé et Ananias l’a baptisé. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Alors Saul a mangé de la nourriture et il s’est senti fort encore. Saul enseignait aux habitants de Damas la Bonne Nouvelle au sujet de Jésus.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul est resté avec les croyants à Damas pendant quelques jours. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il a demandé au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: grand prêtre
    - type: text
      text: ' des lettres disant : Je peux donner une de ces lettres à chaque chef de chaque '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' de Damas. Peut‑être que certains là croient en ce que Jésus a enseigné. Et si je trouve de telles personnes, je peux les arrêter. Je peux les lier avec des cordes. Et je peux les amener tous, des hommes et des femmes, ici à Jérusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il est immédiatement allé dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: '. Là, il enseignait les gens sur Jésus. Il leur disait : Jésus est le fils de Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Beaucoup de personnes entendaient ce que Saul disait. Elles étaient toutes très étonnantes et elles se sont dites : C’est le même homme qui était à Jérusalem. Nous sommes sûrs de cela. À Jérusalem, il tuait les gens qui croyaient en Jésus. Alors il est venu ici à Damas pour attraper des croyants. Il a voulu les ramener à Jérusalem. Là ils devraient être devant les chefs des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' pour jugement. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais alors Saul était bien puissant quand il enseignait le peuple. Il disait : Jésus est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', la personne spéciale que Dieu nous a envoyée. Saul disait toutes les bonnes choses au sujet de Jésus. Ainsi les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui habitaient à Damas ne pouvaient pas lui répondre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Après beaucoup de jours, les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' se sont réunis ensemble. Et ils ont décidé de tuer Saul. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais quelqu’un a dit cela à Paul. Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' ont gardé les portes de la ville le jour entier et toute la nuit. Ils ont voulu attraper Saul et le tuer.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mais une nuit, les amis de Saul l’ont aidé à partir de la ville. Ils ont mis Saul dans un panier, et alors ils ont mis le panier à travers un trou du mur de la ville. Alors ils ont laissé le panier aller lentement vers le bas sur la terre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul revient à Jérusalem
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Quand Saul est revenu à Jérusalem, il a voulu se joindre aux croyants là. Mais ils avaient peur de lui. Ils n’ont pas cru qu’il était maintenant un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' de Jésus.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Un croyant appelé Barnabas a aidé Saul. Il a amené Saul pour parler avec les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Et Barnabas a alors expliqué aux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' ce qui était arrivé à Saul. Barnabas leur a dit : Saul a vu le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' quand il était sur la route à Damas. Et le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui a parlé. Quand Saul était à Damas, il parlait courageusement au peuple avec le pouvoir de Jésus.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ainsi après cela, Saul est resté avec les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: '. Il allait autour de tout Jérusalem et enseignait le peuple dans des paroles claires, avec le pouvoir de Jésus. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Saul parlait aussi avec les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ' qui parlaient la langue grecque. Il discutait avec eux au sujet de Jésus. Ainsi ils ont essayé de le tuer.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Saul a voyagé vers Damas. Il était presque à la ville. Alors il a brusquement vu une très grande lumière. La lumière venait du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: ', et elle a éclairé toute la partie autour. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Les autres croyants ont entendu parler de ceci. Ainsi ils ont amené Saul à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Césarée
    - type: text
      text: ', et de là, Saul est parti à Tarse. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Maintenant il y avait des croyants en Judée, en Galilée et Samarie, et pendant un certain temps ils n’ont eu aucune difficulté. Le Saint‑Esprit les aidait à devenir forts. Beaucoup plus de gens sont devenus des croyants. Et ils obéissaient à Dieu dans tout ce qu’ils faisaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Pierre voyage à Lydde et à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Maintenant, Pierre voyageait souvent à différents endroits. Un jour, il a voyagé à Lydde. Quelques croyants vivaient là, et Pierre est allé les voir.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'A Lydde, Pierre a rencontré un homme appelé Énée. Énée ne pouvait pas bouger ses bras et jambes. Ainsi il se couchait sur son lit à tout moment. Il était ainsi pendant 8 années. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Pierre a dit à Énée : Jésus te fera devenir bien encore. Lève‑toi et prends tes choses. Immédiatement Énée s’est levé. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Beaucoup de gens qui habitaient dans Lydde et Saron ont vu Énée. Et ils ont commencé à obéir au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tabitha devient encore vivante
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Une femme appelée Tabitha habitait à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: '. Elle était une croyante. Tabitha est un nom dans la langue '
    - type: usfm
      marker: w
      children:
      - type: text
        text: araméen
    - type: text
      text: 'ne. Dans en grec, son nom était Dorcas. Dorcas signifie gazelle. Dorcas faisait de bonnes choses et elle aidait des pauvres à tout moment. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Dorcas est devenue très malade et alors elle est morte. Les femmes ont lavé son corps mort et elles l’ont mis dans la haute chambre. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: ' n’était pas très loin de Lydde. Et les croyants de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: ' ont entendu que Pierre était à Lydde. Ainsi ils lui ont envoyé 2 hommes avec un message. Ils ont écrit dans le message : Dépêche‑toi et viens à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: .
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Pierre s’est préparé et il est revenu à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: ' avec les 2 hommes. Quand il est arrivé à la maison de Dorcas, les femmes l’ont emmené en haut. Beaucoup d’autres femmes étaient là. Leurs maris étaient morts. Elles pleuraient et elles sont toutes venues près de Pierre. Elles lui montraient des habits. Elle les a faits quand elle était encore avec elles.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Saul est tombé à terre. Il entendait quelqu’un lui dire : Saul, Saul, pourquoi es‑tu en train de me faire souffrir ?'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Pierre a mis toutes ces femmes hors de la salle. Il s’est mis à genoux et il a prié Dieu. Alors il a tourné sa tête vers le corps mort. Il a dit : Tabitha, lève‑toi ! Elle a ouvert les yeux. Et quand elle a vu Pierre, elle s’est mise assise. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Pierre l’a prise par la main et il l’a fait lever. Alors il a demandé à tous les croyants et aux autres femmes de venir dans la salle. Et il leur a prouvé qu’elle était encore vivante. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Les croyants disaient à d’autres ce qui s’était passé. Alors partout à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: ', les gens ont entendu ce qui s’était passé. Et beaucoup plus de personnes ont cru au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Pierre est resté à '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Joppé
    - type: text
      text: ' pendant beaucoup de jours. Il est resté avec un homme appelé Simon. Simon était un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: corroyeur
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Saul a demandé : '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui es‑tu ? La voix a dit : Je suis Jésus. Et tu es en train de me faire souffrir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Maintenant lève‑toi et entre à Damas. Quelqu’un viendra chez toi quand tu arriveras dans la ville. Il te dira quoi faire.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les hommes qui étaient avec Saul étaient calmes. Ils n’ont pas parlé. Ils entendaient la voix. Mais ils ne voyaient personne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Saul s’est levé et il a ouvert ses yeux. Mais il ne pouvait rien voir. Les hommes qui étaient avec Saul ont tenu sa main. Et ils l’ont conduit à Damas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Pendant 3 jours, Saul ne pouvait rien voir. Et pendant ces 3 jours, il n’a rien mangé ni bu.
