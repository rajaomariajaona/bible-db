document_id: HEB.10,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 10
  - type: text
    content: 'Les commandements qu’il avait donnés à Moïse sont comme l’ombre des bonnes choses qui viendront plus tard. Mais ces lois ne montrent pas exactement à quoi ressemblent ces bonnes choses. Ces lois disent que les '
  - type: text
    content: prêtres
  - type: text
    content: ' doivent continuer d’offrir les mêmes '
  - type: text
    content: sacrifices
  - type: text
    content: ' pour le peuple, année après année. Ces '
  - type: text
    content: sacrifices
  - type: text
    content: ' ne peuvent donc jamais rendre les gens complètement purs lorsqu’ils viennent '
  - type: text
    content: adorer
  - type: text
    content: ' Dieu. '
  '10':
  - type: text
    content: Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' était prêt à faire ce que Dieu voulait. Il a offert son propre corps à Dieu une fois pour toujours. Grâce au '
  - type: text
    content: sacrifice
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', Dieu nous a rendus purs, afin que nous lui appartenions.'
  '11':
  - type: text
    content: 'Chaque jour, les '
  - type: text
    content: prêtres
  - type: text
    content: ' font leur travail pour servir Dieu. Ils offrent encore et encore les mêmes '
  - type: text
    content: sacrifices
  - type: text
    content: ' à Dieu. Mais ces '
  - type: text
    content: sacrifices
  - type: text
    content: ' ne peuvent jamais enlever les péchés des gens. '
  '12':
  - type: text
    content: Mais Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', notre '
  - type: text
    content: prêtre
  - type: text
    content: ' spécial, a offert un '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour enlever nos péchés. Il l’a fait une fois pour toujours. Après cela, il s’est assis à la droite de Dieu pour régner avec lui. '
  '13':
  - type: text
    content: 'Depuis lors, il attend que Dieu gagne contre ses ennemis complètement. Ils deviendront comme un endroit pour poser ses pieds. '
  '14':
  - type: text
    content: 'Ainsi, à la suite de son unique '
  - type: text
    content: sacrifice
  - type: text
    content: ', Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' a rendu le peuple de Dieu complètement sanctifié pour toujours.'
  '15':
  - type: text
    content: 'Le '
  - type: text
    content: Saint‑Esprit
  - type: text
    content: ' de Dieu nous montre également que ces choses sont vraies. Il dit ceci d’abord :'
  '16':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu a dit :'
  - type: text
    content: Après le temps de l’ancien accord,
  - type: text
    content: Je vais conclure un nouvel accord avec mon peuple.
  - type: text
    content: 'Ce sera comme ceci :'
  - type: text
    content: Je mettrai mes lois au fond d’eux.
  - type: text
    content: Je vais les écrire dans leurs pensées.
  '17':
  - type: text
    content: 'Puis il a dit ceci :'
  - type: text
    content: Je ne continuerai pas de me souvenir de leurs péchés
  - type: text
    content: Quand ils n’obéissent pas à mes lois.
  '18':
  - type: text
    content: 'C’est ainsi que Dieu pardonne nos péchés. Lorsque Dieu a fait cela, nous n’avons besoin d’aucun autre '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nous enlever nos péchés.'
  - type: heading
    content: Nous devons continuer à faire confiance en Dieu
  '19':
  - type: text
    content: 'Ainsi donc, mes amis chrétiens, nous voyons que Jésus est mort en '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour nous. Pour cette raison, nous pouvons aller dans le lieu Très Saint de Dieu. Nous n’avons pas peur de le faire. '
  '2':
  - type: text
    content: 'Si les anciennes règles disaient cela, les '
  - type: text
    content: prêtres
  - type: text
    content: ' allaient arrêter d’offrir des '
  - type: text
    content: sacrifices
  - type: text
    content: '. Les gens qui sont venus '
  - type: text
    content: adorer
  - type: text
    content: ' Dieu allaient devenir complètement purs une fois pour toujours. Ils n’auraient plus de soucis dans leurs pensées à propos de leurs péchés. '
  '20':
  - type: text
    content: 'Jésus nous a ouvert une nouvelle voie pour nous rapprocher de Dieu. Cette voie nous donne la vie avec Dieu. Il nous conduit à travers le rideau vers le lieu Très Saint de Dieu. Jésus nous a ouvert ce rideau lorsqu’il a offert son propre corps à Dieu en '
  - type: text
    content: sacrifice
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Nous avons un '
  - type: text
    content: grand prêtre
  - type: text
    content: ' qui dirige le peuple de la maison de Dieu. '
  '22':
  - type: text
    content: Nous devons donc nous approcher de Dieu. Nous ne devons pas avoir peur non plus. Mais nous devons être honnêtes et nous devons continuer à lui faire confiance. Il nous a purifiés en nettoyant nos saletés. Nos pensées ne nous causent plus de problèmes au sujet de nos péchés. Nous sommes devenus propres. C’est comme s’il avait lavé nos corps avec de l’eau propre.
  '23':
  - type: text
    content: 'Nous savons que nous pouvons faire confiance en Dieu pour faire les choses qu’il avait promises. Donc, nous devons continuer d’attendre ces choses. Nous devons dire aux autres que nous avons confiance en Dieu. Nous ne devons pas arrêter de faire cela. '
  '24':
  - type: text
    content: 'Nous devons réfléchir à la manière dont nous pouvons nous entraider. Nous voulons que chacun montre de l’amour l’un envers l’autre. Nous voulons que chacun fasse de bonnes choses pour s’entraider. '
  '25':
  - type: text
    content: 'Certaines personnes ont laissé de rencontrer le groupe de chrétiens. Mais ce n’est pas bon. Nous devons tous continuer à nous rencontrer. Nous devons nous entraider pour être forts et courageux. C’est maintenant encore plus important, car le grand jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' approche. Vous savez que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' reviendra bientôt.'
  - type: heading
    content: Nous ne devons pas nous détourner de Jésus‑Christ
  '26':
  - type: text
    content: 'Maintenant que nous avons appris ce qui est vrai, nous devons continuer à croire en Jésus. Si nous connaissons le vrai message de Dieu, mais nous choisissons toujours de faire de mauvaises choses, Dieu ne nous pardonnera pas. Il n’y a aucun autre '
  - type: text
    content: sacrifice
  - type: text
    content: ' qui enlèvera nos péchés. '
  '27':
  - type: text
    content: 'Nous savons que Dieu nous jugera et cela nous fera très peur. Parce que nous savons que Dieu punira tous ceux qui sont contre lui. Cette punition sera un feu très chaud qui détruit les gens. '
  '28':
  - type: text
    content: Dans l’ancien accord, toute personne qui refusait d’obéir aux règles de Moïse devait mourir. Si 2 ou 3 personnes disaient que telle personne a fait une mauvaise chose, cette personne devait mourir. On ne pouvait pas lui pardonner cela.
  '29':
  - type: text
    content: 'Pensez donc à quelqu’un qui s’est retourné contre le Fils de Dieu. La punition de cette personne sera sûrement bien pire ! Cette personne dit que le '
  - type: text
    content: sacrifice
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' n’a aucune valeur pour lui. Elle fait paraître le nouvel accord de Dieu comme quelque chose de sale. C’est la mort de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' sur la croix qui a rendu cette personne propre, afin qu’elle appartienne à Dieu. Mais maintenant, cette personne a insulté l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu, qui nous apporte la merveilleuse aide de Dieu. '
  '3':
  - type: text
    content: 'Mais, ces '
  - type: text
    content: sacrifices
  - type: text
    content: ' font que les gens se souviennent de leurs péchés chaque année. '
  '30':
  - type: text
    content: 'Nous connaissons Dieu et son message. Et Dieu a dit ceci : Je suis celui qui punira les gens pour leurs péchés. Je leur donnerai la punition qu’ils doivent avoir. Dieu a aussi dit ceci : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' va juger son peuple. '
  '31':
  - type: text
    content: Oui, si Dieu tient à vous punir, cela vous fera très peur ! Il est le Dieu qui vit éternellement avec une grande puissance.
  '32':
  - type: text
    content: Souvenez‑vous de ce qui vous est arrivé à ces débuts. Lorsque vous avez compris le message sur Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' pour la première fois, vous avez eu beaucoup de problèmes. Mais vous avez continué d’être forts. '
  '33':
  - type: text
    content: 'Parfois, les gens vous insultaient. Ils vous faisaient honte devant les autres. Parfois, vous choisissiez d’aider d’autres chrétiens qui avaient des problèmes comme ça. Leurs souffrances sont devenues vos souffrances. '
  '34':
  - type: text
    content: Vous avez été gentils avec les chrétiens qui étaient en prison. Quand les gens vous ont enlevé vos choses, vous avez quand même choisi d’être heureux. Vous saviez que vous aviez quelque chose de mieux qui vous appartiendra pour toujours.
  '35':
  - type: text
    content: 'Continuez donc d’être forts dans vos pensées. Si vous continuez de faire confiance en Dieu, vous recevrez de grandes choses. '
  '36':
  - type: text
    content: 'Vous devez être patients et forts. Ensuite, vous continuerez de faire ce que Dieu veut. En conséquence, vous recevrez ce que Dieu a promis. '
  '37':
  - type: text
    content: 'Voici ce que dit la Bible :'
  - type: text
    content: En très peu de temps,
  - type: text
    content: Mon serviteur spécial viendra.
  - type: text
    content: C’est celui que je vous ai promis de vous envoyer.
  - type: text
    content: Il ne sera pas en retard.
  '38':
  - type: text
    content: La personne que j’ai acceptée comme vivante, vivra.
  - type: text
    content: Cette personne vivra parce qu’elle fait confiance en moi.
  - type: text
    content: Mais si l’une d’elles a peur et qu’elle se détourne de moi,
  - type: text
    content: Je ne serai pas content de cette personne.
  '39':
  - type: text
    content: Mais nous ne sommes pas comme ces gens qui ont peur et qui se détournent de Dieu. Si nous l’étions, Dieu pourrait nous détruire. Mais nous sommes des gens qui continuons à faire confiance en Dieu. Et donc, nos vies sont en sécurité avec Dieu.
  '4':
  - type: text
    content: 'Nous savons que le sang des taureaux et des boucs ne peut pas supprimer la punition des péchés. '
  '5':
  - type: text
    content: Ainsi, lorsque Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' est venu dans le monde, il a dit à son Père :'
  - type: text
    content: 'Tu n’as pas voulu que les gens t’offrent des '
  - type: text
    content: sacrifices
  - type: text
    content: ' et d’autres cadeaux.'
  - type: text
    content: Au lieu de cela, tu m’as préparé un corps à t’offrir.
  '6':
  - type: text
    content: 'Les '
  - type: text
    content: sacrifices
  - type: text
    content: ' ne te rendent pas heureux.'
  - type: text
    content: 'Si les gens brûlent des animaux entiers en '
  - type: text
    content: sacrifice
  - type: text
    content: ','
  - type: text
    content: 'Ou s’ils offrent un '
  - type: text
    content: sacrifice
  - type: text
    content: ' pour les purifier de leurs péchés,'
  - type: text
    content: Cela ne te rend pas heureux.
  '7':
  - type: text
    content: 'Alors j’ai dit : Me voici, mon Dieu.'
  - type: text
    content: Je suis venu faire ce que tu veux.
  - type: text
    content: C’est cela qui est dit sur moi dans la Bible.
  '8':
  - type: text
    content: Pensez donc à ce que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a dit là. Il a d’abord dit à Dieu : Tu n’as pas voulu des offrandes et de '
  - type: text
    content: sacrifices
  - type: text
    content: ' d’animaux. Tout '
  - type: text
    content: sacrifice
  - type: text
    content: ' de ce genre ne te rend pas heureux. Mais nous savons que les règles de Moïse enseignaient ces '
  - type: text
    content: sacrifices
  - type: text
    content: . La loi de Dieu a dit qu’ils étaient nécessaires.
  '9':
  - type: text
    content: Alors Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' a dit : Me voici. Je suis venu faire ce que tu veux. De cette façon, Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' a enlevé le premier accord et ses règles concernant les '
  - type: text
    content: sacrifices
  - type: text
    content: '. Le '
  - type: text
    content: sacrifice
  - type: text
    content: ' de Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ' de son propre corps est la nouvelle façon dont Dieu pardonne nos péchés. '
