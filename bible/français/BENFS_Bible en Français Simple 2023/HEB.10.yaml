document_id: HEB.10
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les commandements qu’il avait donnés à Moïse sont comme l’ombre des bonnes choses qui viendront plus tard. Mais ces lois ne montrent pas exactement à quoi ressemblent ces bonnes choses. Ces lois disent que les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' doivent continuer d’offrir les mêmes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' pour le peuple, année après année. Ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' ne peuvent donc jamais rendre les gens complètement purs lorsqu’ils viennent '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si les anciennes règles disaient cela, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' allaient arrêter d’offrir des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: '. Les gens qui sont venus '
  - type: usfm
    marker: w
    children:
    - type: text
      text: adorer
  - type: text
    text: ' Dieu allaient devenir complètement purs une fois pour toujours. Ils n’auraient plus de soucis dans leurs pensées à propos de leurs péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais, ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' font que les gens se souviennent de leurs péchés chaque année. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nous savons que le sang des taureaux et des boucs ne peut pas supprimer la punition des péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ainsi, lorsque Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' est venu dans le monde, il a dit à son Père :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu n’as pas voulu que les gens t’offrent des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' et d’autres cadeaux.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au lieu de cela, tu m’as préparé un corps à t’offrir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' ne te rendent pas heureux.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Si les gens brûlent des animaux entiers en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ou s’ils offrent un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour les purifier de leurs péchés,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela ne te rend pas heureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors j’ai dit : Me voici, mon Dieu.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis venu faire ce que tu veux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est cela qui est dit sur moi dans la Bible.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pensez donc à ce que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a dit là. Il a d’abord dit à Dieu : Tu n’as pas voulu des offrandes et de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' d’animaux. Tout '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' de ce genre ne te rend pas heureux. Mais nous savons que les règles de Moïse enseignaient ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: . La loi de Dieu a dit qu’ils étaient nécessaires.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a dit : Me voici. Je suis venu faire ce que tu veux. De cette façon, Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a enlevé le premier accord et ses règles concernant les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: '. Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' de son propre corps est la nouvelle façon dont Dieu pardonne nos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' était prêt à faire ce que Dieu voulait. Il a offert son propre corps à Dieu une fois pour toujours. Grâce au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', Dieu nous a rendus purs, afin que nous lui appartenions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Chaque jour, les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ' font leur travail pour servir Dieu. Ils offrent encore et encore les mêmes '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' à Dieu. Mais ces '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifices
  - type: text
    text: ' ne peuvent jamais enlever les péchés des gens. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ', notre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtre
  - type: text
    text: ' spécial, a offert un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour enlever nos péchés. Il l’a fait une fois pour toujours. Après cela, il s’est assis à la droite de Dieu pour régner avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Depuis lors, il attend que Dieu gagne contre ses ennemis complètement. Ils deviendront comme un endroit pour poser ses pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi, à la suite de son unique '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ', Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' a rendu le peuple de Dieu complètement sanctifié pour toujours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Saint‑Esprit
  - type: text
    text: ' de Dieu nous montre également que ces choses sont vraies. Il dit ceci d’abord :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu a dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Après le temps de l’ancien accord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais conclure un nouvel accord avec mon peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ce sera comme ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai mes lois au fond d’eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais les écrire dans leurs pensées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis il a dit ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne continuerai pas de me souvenir de leurs péchés
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils n’obéissent pas à mes lois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C’est ainsi que Dieu pardonne nos péchés. Lorsque Dieu a fait cela, nous n’avons besoin d’aucun autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour nous enlever nos péchés.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous devons continuer à faire confiance en Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi donc, mes amis chrétiens, nous voyons que Jésus est mort en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' pour nous. Pour cette raison, nous pouvons aller dans le lieu Très Saint de Dieu. Nous n’avons pas peur de le faire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus nous a ouvert une nouvelle voie pour nous rapprocher de Dieu. Cette voie nous donne la vie avec Dieu. Il nous conduit à travers le rideau vers le lieu Très Saint de Dieu. Jésus nous a ouvert ce rideau lorsqu’il a offert son propre corps à Dieu en '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nous avons un '
  - type: usfm
    marker: w
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: ' qui dirige le peuple de la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nous devons donc nous approcher de Dieu. Nous ne devons pas avoir peur non plus. Mais nous devons être honnêtes et nous devons continuer à lui faire confiance. Il nous a purifiés en nettoyant nos saletés. Nos pensées ne nous causent plus de problèmes au sujet de nos péchés. Nous sommes devenus propres. C’est comme s’il avait lavé nos corps avec de l’eau propre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nous savons que nous pouvons faire confiance en Dieu pour faire les choses qu’il avait promises. Donc, nous devons continuer d’attendre ces choses. Nous devons dire aux autres que nous avons confiance en Dieu. Nous ne devons pas arrêter de faire cela. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nous devons réfléchir à la manière dont nous pouvons nous entraider. Nous voulons que chacun montre de l’amour l’un envers l’autre. Nous voulons que chacun fasse de bonnes choses pour s’entraider. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Certaines personnes ont laissé de rencontrer le groupe de chrétiens. Mais ce n’est pas bon. Nous devons tous continuer à nous rencontrer. Nous devons nous entraider pour être forts et courageux. C’est maintenant encore plus important, car le grand jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' approche. Vous savez que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' reviendra bientôt.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nous ne devons pas nous détourner de Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Maintenant que nous avons appris ce qui est vrai, nous devons continuer à croire en Jésus. Si nous connaissons le vrai message de Dieu, mais nous choisissons toujours de faire de mauvaises choses, Dieu ne nous pardonnera pas. Il n’y a aucun autre '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' qui enlèvera nos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nous savons que Dieu nous jugera et cela nous fera très peur. Parce que nous savons que Dieu punira tous ceux qui sont contre lui. Cette punition sera un feu très chaud qui détruit les gens. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dans l’ancien accord, toute personne qui refusait d’obéir aux règles de Moïse devait mourir. Si 2 ou 3 personnes disaient que telle personne a fait une mauvaise chose, cette personne devait mourir. On ne pouvait pas lui pardonner cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pensez donc à quelqu’un qui s’est retourné contre le Fils de Dieu. La punition de cette personne sera sûrement bien pire ! Cette personne dit que le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: sacrifice
  - type: text
    text: ' de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' n’a aucune valeur pour lui. Elle fait paraître le nouvel accord de Dieu comme quelque chose de sale. C’est la mort de Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' sur la croix qui a rendu cette personne propre, afin qu’elle appartienne à Dieu. Mais maintenant, cette personne a insulté l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu, qui nous apporte la merveilleuse aide de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nous connaissons Dieu et son message. Et Dieu a dit ceci : Je suis celui qui punira les gens pour leurs péchés. Je leur donnerai la punition qu’ils doivent avoir. Dieu a aussi dit ceci : Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' va juger son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Oui, si Dieu tient à vous punir, cela vous fera très peur ! Il est le Dieu qui vit éternellement avec une grande puissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Souvenez‑vous de ce qui vous est arrivé à ces débuts. Lorsque vous avez compris le message sur Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' pour la première fois, vous avez eu beaucoup de problèmes. Mais vous avez continué d’être forts. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Parfois, les gens vous insultaient. Ils vous faisaient honte devant les autres. Parfois, vous choisissiez d’aider d’autres chrétiens qui avaient des problèmes comme ça. Leurs souffrances sont devenues vos souffrances. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Vous avez été gentils avec les chrétiens qui étaient en prison. Quand les gens vous ont enlevé vos choses, vous avez quand même choisi d’être heureux. Vous saviez que vous aviez quelque chose de mieux qui vous appartiendra pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Continuez donc d’être forts dans vos pensées. Si vous continuez de faire confiance en Dieu, vous recevrez de grandes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Vous devez être patients et forts. Ensuite, vous continuerez de faire ce que Dieu veut. En conséquence, vous recevrez ce que Dieu a promis. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Voici ce que dit la Bible :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: En très peu de temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon serviteur spécial viendra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est celui que je vous ai promis de vous envoyer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne sera pas en retard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: La personne que j’ai acceptée comme vivante, vivra.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette personne vivra parce qu’elle fait confiance en moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais si l’une d’elles a peur et qu’elle se détourne de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne serai pas content de cette personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mais nous ne sommes pas comme ces gens qui ont peur et qui se détournent de Dieu. Si nous l’étions, Dieu pourrait nous détruire. Mais nous sommes des gens qui continuons à faire confiance en Dieu. Et donc, nos vies sont en sécurité avec Dieu.
