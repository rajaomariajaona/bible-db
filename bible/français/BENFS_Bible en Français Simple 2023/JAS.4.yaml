document_id: JAS.4,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 4
  - type: heading
    content: Ne vous détournez pas de Dieu
  - type: text
    content: Vous vous battez et vous vous querellez très souvent entre vous. Savez‑vous pourquoi cela se produit ? C’est à cause des problèmes dans vos pensées. Vous voulez faire de mauvaises choses qui, selon vous, vous rendront heureux.
  '10':
  - type: text
    content: 'Considérez‑vous comme petits devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu. Ensuite, il vous élèvera à un bon moment.'
  '11':
  - type: text
    content: Mes amis chrétiens, ne vous dites pas de mauvaises choses les uns contre les autres. Si vous parlez contre un autre croyant, vous parlez vraiment contre la loi de Dieu. Si vous jugez un autre croyant, vous jugez aussi la loi. Lorsque vous faites cela, vous n’obéissez pas à la loi. Vous vous donnez le pouvoir de décider sur ce que la loi dit.
  '12':
  - type: text
    content: Dieu est celui qui a donné sa loi au peuple. Lui seul a le pouvoir de juger si les gens ont fait ce qui est bien. Lui seul peut décider de sauver des gens ou de les détruire. Donc, vous ne devez pas juger vos amis. Vous n’avez pas ce pouvoir.
  - type: heading
    content: Faites confiance en Dieu chaque jour
  '13':
  - type: text
    content: 'Certains d’entre vous disent : Aujourd’hui ou demain, nous irons dans une certaine ville. Nous y resterons un an. Nous allons acheter et vendre des choses, et nous deviendrons riches. Si vous dites des choses comme ça, écoutez‑moi.'
  '14':
  - type: text
    content: Vous ne savez pas vraiment ce qui se passera demain. Votre vie est comme un nuage qui apparaît pendant une courte période, puis disparaît rapidement.
  '15':
  - type: text
    content: 'Donc, ce que vous devez dire, c’est : Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est d’accord et que nous sommes encore en vie, alors nous ferons ceci ou cela.'
  '16':
  - type: text
    content: Mais, vous parlez de ce que vous avez décidé de faire. Vous parlez comme si vous aviez le pouvoir de le réaliser. C’est mauvais de parler comme ça.
  '17':
  - type: text
    content: Donc, vous savez ce que vous devez faire. Mais si vous le savez et que vous ne faites pas une bonne chose, alors vous faites une mauvaise chose.
  '2':
  - type: text
    content: Vous voulez avoir quelque chose pour vous, mais vous n’obtenez pas ce que vous voulez. Vous tuez même d’autres personnes. Vous essayez de prendre des choses qui ne vous appartiennent pas. Mais vous ne pouvez pas les obtenir. Donc, vous vous battez et vous vous disputez. Mais vous n’avez pas ces choses, parce que vous ne les demandez pas à Dieu.
  '3':
  - type: text
    content: Même lorsque vous demandez à Dieu, vous ne recevez rien. C’est parce que vous demandez pour une mauvaise raison. Vous voulez juste utiliser ces choses pour vous rendre heureux.
  '4':
  - type: text
    content: 'Vous vous détournez de Dieu, comme une femme qui a des relations sexuelles avec d’autres hommes. Vous choisissez d’être amis avec des gens qui sont contre Dieu. Ainsi, vous devenez vous‑mêmes ennemis de Dieu. Vous devez savoir ça ! '
  '5':
  - type: text
    content: 'Avec raison, la Bible nous dit : Dieu a fait vivre son '
  - type: text
    content: Esprit
  - type: text
    content: ' en nous. Il veut beaucoup nous garder pour lui.'
  '6':
  - type: text
    content: 'Mais Dieu sera très bon envers nous et il nous aidera. C’est pourquoi la Bible dit : Dieu est contre ces gens qui pensent qu’ils sont importants. Mais il est gentil avec les gens qui ne se sentent pas importants.'
  '7':
  - type: text
    content: 'Obéissez donc à l’autorité de Dieu. Soyez forts contre le '
  - type: text
    content: diable
  - type: text
    content: ' et il fuira loin de vous.'
  '8':
  - type: text
    content: 'Approchez‑vous de Dieu et il s’approchera de vous. Soyez purifiés dans votre façon de vivre. Arrêtez de faire de mauvaises choses. Rendez vos '
  - type: text
    content: esprits
  - type: text
    content: ' propres. Vous ne pouvez pas aimer le péché et aimer Dieu en même temps.'
  '9':
  - type: text
    content: Soyez tristes pour vos péchés et pleurez. Arrêtez de rire et soyez plutôt tristes. Ne soyez pas heureux, mais soyez très tristes.
