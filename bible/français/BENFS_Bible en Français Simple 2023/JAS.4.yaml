document_id: JAS.4
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 4
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ne vous détournez pas de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vous vous battez et vous vous querellez très souvent entre vous. Savez‑vous pourquoi cela se produit ? C’est à cause des problèmes dans vos pensées. Vous voulez faire de mauvaises choses qui, selon vous, vous rendront heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vous voulez avoir quelque chose pour vous, mais vous n’obtenez pas ce que vous voulez. Vous tuez même d’autres personnes. Vous essayez de prendre des choses qui ne vous appartiennent pas. Mais vous ne pouvez pas les obtenir. Donc, vous vous battez et vous vous disputez. Mais vous n’avez pas ces choses, parce que vous ne les demandez pas à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Même lorsque vous demandez à Dieu, vous ne recevez rien. C’est parce que vous demandez pour une mauvaise raison. Vous voulez juste utiliser ces choses pour vous rendre heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous vous détournez de Dieu, comme une femme qui a des relations sexuelles avec d’autres hommes. Vous choisissez d’être amis avec des gens qui sont contre Dieu. Ainsi, vous devenez vous‑mêmes ennemis de Dieu. Vous devez savoir ça ! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avec raison, la Bible nous dit : Dieu a fait vivre son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' en nous. Il veut beaucoup nous garder pour lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Dieu sera très bon envers nous et il nous aidera. C’est pourquoi la Bible dit : Dieu est contre ces gens qui pensent qu’ils sont importants. Mais il est gentil avec les gens qui ne se sentent pas importants.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Obéissez donc à l’autorité de Dieu. Soyez forts contre le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: diable
  - type: text
    text: ' et il fuira loin de vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Approchez‑vous de Dieu et il s’approchera de vous. Soyez purifiés dans votre façon de vivre. Arrêtez de faire de mauvaises choses. Rendez vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' propres. Vous ne pouvez pas aimer le péché et aimer Dieu en même temps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Soyez tristes pour vos péchés et pleurez. Arrêtez de rire et soyez plutôt tristes. Ne soyez pas heureux, mais soyez très tristes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Considérez‑vous comme petits devant le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu. Ensuite, il vous élèvera à un bon moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mes amis chrétiens, ne vous dites pas de mauvaises choses les uns contre les autres. Si vous parlez contre un autre croyant, vous parlez vraiment contre la loi de Dieu. Si vous jugez un autre croyant, vous jugez aussi la loi. Lorsque vous faites cela, vous n’obéissez pas à la loi. Vous vous donnez le pouvoir de décider sur ce que la loi dit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu est celui qui a donné sa loi au peuple. Lui seul a le pouvoir de juger si les gens ont fait ce qui est bien. Lui seul peut décider de sauver des gens ou de les détruire. Donc, vous ne devez pas juger vos amis. Vous n’avez pas ce pouvoir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faites confiance en Dieu chaque jour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Certains d’entre vous disent : Aujourd’hui ou demain, nous irons dans une certaine ville. Nous y resterons un an. Nous allons acheter et vendre des choses, et nous deviendrons riches. Si vous dites des choses comme ça, écoutez‑moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous ne savez pas vraiment ce qui se passera demain. Votre vie est comme un nuage qui apparaît pendant une courte période, puis disparaît rapidement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Donc, ce que vous devez dire, c’est : Si le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est d’accord et que nous sommes encore en vie, alors nous ferons ceci ou cela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais, vous parlez de ce que vous avez décidé de faire. Vous parlez comme si vous aviez le pouvoir de le réaliser. C’est mauvais de parler comme ça.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Donc, vous savez ce que vous devez faire. Mais si vous le savez et que vous ne faites pas une bonne chose, alors vous faites une mauvaise chose.
