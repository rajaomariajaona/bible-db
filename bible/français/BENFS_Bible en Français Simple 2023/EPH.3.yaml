document_id: EPH.3,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu a choisi Paul pour aider les païens
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Moi Paul, je suis en prison. La raison est que Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' m’a envoyé pour vous aider, vous les païens. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Son but était de montrer maintenant, à ce moment, à quel point il comprend tout. Il voulait que les dirigeants spirituels, qui ont le pouvoir dans les cieux, sachent cela. Ils le sauraient par l’Église (peuple de Dieu).
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Cela a toujours été le but de Dieu. Et il l’a fait arriver par Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Parce que nous sommes unis avec le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', nous sommes assez sûrs de venir près de Dieu. Nous ne devons pas avoir peur, mais nous pouvons être sûrs. Nous pouvons venir à Dieu, parce que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' lui‑même nous a fait croire en lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: J’ai des difficultés pour vous. Mais n’ayez pas peur à cause de cela. Ne soyez pas faibles à cause de cela. Non, mais soyez plutôt heureux, parce que mes difficultés vous aideront.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul prie pour les chrétiens d’Éphèse d’être forts
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Pour cette raison, alors, je plie mes genoux pour prier le Père. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Chaque famille, dans les cieux et sur la terre, reçoit son vrai nom de lui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Je prie qu’il travaille puissamment par son '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: . La raison est de vous rendre forts. Je lui demande de le faire, parce qu’il est très grand et riche.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je prie que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' vive en vous, parce que vous croyez en lui. Je prie pour que vos racines soient profondément dans l’amour de Dieu. Alors vous serez forts. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Vous serez forts pour comprendre comment Dieu vous aime beaucoup. Vous comprendrez cela avec tout le peuple de Dieu. Vous pourrez comprendre comment l’amour de Dieu est très grand.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous saurez très bien que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' nous aime. Il nous aime plus que quiconque ne peut jamais vraiment savoir. Et puis, parce que vous savez cela, Dieu vous remplira complètement avec lui‑même.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Certainement, vous devez avoir entendu dire que Dieu m’a choisi pour vous aider. Il m’a choisi de travailler pour vous, car il est très gentil. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dieu est capable de faire ceci : Il peut faire beaucoup plus que nous ne pourrions jamais demander. Il peut faire beaucoup plus que nous ne pourrions même pas imaginer. Il fait de grandes choses, parce qu’il agit puissamment en nous.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Alors, bien sûr, l’Église (le peuple de Dieu) doit montrer toujours comment Dieu est très grand et bon. L’Église doit le montrer, par Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: . Elle n’arrêtera jamais de montrer cela.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dieu m’a fait savoir son secret, parce qu’il me l’a montré. J’ai déjà écrit quelques mots à ce sujet.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Quand vous lirez ces mots, vous serez en mesure de comprendre que je connais le secret au sujet de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dieu n’a jamais montré ce secret aux gens qui ont vécu avant. Mais maintenant, l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Esprit
    - type: text
      text: ' de Dieu l’a montré aux travailleurs spéciaux et les enseignants que Dieu avait choisis. Il a montré ce secret aussi aux gens qui disent les messages de Dieu.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ce secret est que les païens, ainsi que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: ', recevront de bonnes choses de Dieu. Les païens peuvent appartenir au même corps que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Juifs
    - type: text
      text: . Par la Bonne Nouvelle, les païens peuvent recevoir ce que Dieu avait promis en Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je suis un serviteur pour dire la Bonne Nouvelle. La raison est que Dieu m’a donné ce travail spécial. Dieu lui‑même a travaillé puissamment en moi, parce qu’il est très bon.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Je suis le moins important de tout le peuple de Dieu. Mais encore, Dieu m’a donné ce travail spécial, parce qu’il est très bon. Il m’a envoyé parler aux païens de grandes choses qui sont les nôtres à cause de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: '. Dieu nous donne ces bonnes choses en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', car le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' est donc très riche. Ces choses sont plus précieuses que personne ne pourrait jamais savoir.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieu m’a envoyé aussi faire comprendre à tout le monde ceci : comment il allait faire connaître son secret. Dieu, qui a fait toutes choses. Il a caché ce secret pendant des temps passés. '
