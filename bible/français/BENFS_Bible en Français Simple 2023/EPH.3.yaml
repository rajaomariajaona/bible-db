document_id: EPH.3,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 3
  - type: heading
    content: Dieu a choisi Paul pour aider les païens
  - type: text
    content: Moi Paul, je suis en prison. La raison est que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' m’a envoyé pour vous aider, vous les païens. '
  '10':
  - type: text
    content: Son but était de montrer maintenant, à ce moment, à quel point il comprend tout. Il voulait que les dirigeants spirituels, qui ont le pouvoir dans les cieux, sachent cela. Ils le sauraient par l’Église (peuple de Dieu).
  '11':
  - type: text
    content: Cela a toujours été le but de Dieu. Et il l’a fait arriver par Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ', notre '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Parce que nous sommes unis avec le '
  - type: text
    content: Christ
  - type: text
    content: ', nous sommes assez sûrs de venir près de Dieu. Nous ne devons pas avoir peur, mais nous pouvons être sûrs. Nous pouvons venir à Dieu, parce que le '
  - type: text
    content: Christ
  - type: text
    content: ' lui‑même nous a fait croire en lui. '
  '13':
  - type: text
    content: J’ai des difficultés pour vous. Mais n’ayez pas peur à cause de cela. Ne soyez pas faibles à cause de cela. Non, mais soyez plutôt heureux, parce que mes difficultés vous aideront.
  - type: heading
    content: Paul prie pour les chrétiens d’Éphèse d’être forts
  '14':
  - type: text
    content: 'Pour cette raison, alors, je plie mes genoux pour prier le Père. '
  '15':
  - type: text
    content: 'Chaque famille, dans les cieux et sur la terre, reçoit son vrai nom de lui. '
  '16':
  - type: text
    content: 'Je prie qu’il travaille puissamment par son '
  - type: text
    content: Esprit
  - type: text
    content: . La raison est de vous rendre forts. Je lui demande de le faire, parce qu’il est très grand et riche.
  '17':
  - type: text
    content: 'Je prie que le '
  - type: text
    content: Christ
  - type: text
    content: ' vive en vous, parce que vous croyez en lui. Je prie pour que vos racines soient profondément dans l’amour de Dieu. Alors vous serez forts. '
  '18':
  - type: text
    content: Vous serez forts pour comprendre comment Dieu vous aime beaucoup. Vous comprendrez cela avec tout le peuple de Dieu. Vous pourrez comprendre comment l’amour de Dieu est très grand.
  '19':
  - type: text
    content: 'Vous saurez très bien que le '
  - type: text
    content: Christ
  - type: text
    content: ' nous aime. Il nous aime plus que quiconque ne peut jamais vraiment savoir. Et puis, parce que vous savez cela, Dieu vous remplira complètement avec lui‑même.'
  '2':
  - type: text
    content: 'Certainement, vous devez avoir entendu dire que Dieu m’a choisi pour vous aider. Il m’a choisi de travailler pour vous, car il est très gentil. '
  '20':
  - type: text
    content: 'Dieu est capable de faire ceci : Il peut faire beaucoup plus que nous ne pourrions jamais demander. Il peut faire beaucoup plus que nous ne pourrions même pas imaginer. Il fait de grandes choses, parce qu’il agit puissamment en nous.'
  '21':
  - type: text
    content: Alors, bien sûr, l’Église (le peuple de Dieu) doit montrer toujours comment Dieu est très grand et bon. L’Église doit le montrer, par Jésus‑
  - type: text
    content: Christ
  - type: text
    content: . Elle n’arrêtera jamais de montrer cela.
  '3':
  - type: text
    content: Dieu m’a fait savoir son secret, parce qu’il me l’a montré. J’ai déjà écrit quelques mots à ce sujet.
  '4':
  - type: text
    content: 'Quand vous lirez ces mots, vous serez en mesure de comprendre que je connais le secret au sujet de '
  - type: text
    content: Christ
  - type: text
    content: '. '
  '5':
  - type: text
    content: Dieu n’a jamais montré ce secret aux gens qui ont vécu avant. Mais maintenant, l’
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu l’a montré aux travailleurs spéciaux et les enseignants que Dieu avait choisis. Il a montré ce secret aussi aux gens qui disent les messages de Dieu.'
  '6':
  - type: text
    content: 'Ce secret est que les païens, ainsi que les '
  - type: text
    content: Juifs
  - type: text
    content: ', recevront de bonnes choses de Dieu. Les païens peuvent appartenir au même corps que les '
  - type: text
    content: Juifs
  - type: text
    content: . Par la Bonne Nouvelle, les païens peuvent recevoir ce que Dieu avait promis en Jésus‑
  - type: text
    content: Christ
  - type: text
    content: .
  '7':
  - type: text
    content: Je suis un serviteur pour dire la Bonne Nouvelle. La raison est que Dieu m’a donné ce travail spécial. Dieu lui‑même a travaillé puissamment en moi, parce qu’il est très bon.
  '8':
  - type: text
    content: 'Je suis le moins important de tout le peuple de Dieu. Mais encore, Dieu m’a donné ce travail spécial, parce qu’il est très bon. Il m’a envoyé parler aux païens de grandes choses qui sont les nôtres à cause de '
  - type: text
    content: Christ
  - type: text
    content: '. Dieu nous donne ces bonnes choses en '
  - type: text
    content: Christ
  - type: text
    content: ', car le '
  - type: text
    content: Christ
  - type: text
    content: ' est donc très riche. Ces choses sont plus précieuses que personne ne pourrait jamais savoir.'
  '9':
  - type: text
    content: 'Dieu m’a envoyé aussi faire comprendre à tout le monde ceci : comment il allait faire connaître son secret. Dieu, qui a fait toutes choses. Il a caché ce secret pendant des temps passés. '
