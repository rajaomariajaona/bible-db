document_id: HEB.11,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 11
  - type: heading
    content: Ce que signifie avoir foi en Dieu
  - type: text
    content: 'Voici ce que signifie avoir '
  - type: text
    content: foi
  - type: text
    content: ' en Dieu : Nous sommes sûrs des choses que nous espérons. Nous sommes sûrs dans nos '
  - type: text
    content: esprits
  - type: text
    content: ' de choses que nous ne pouvons même pas voir. '
  '10':
  - type: text
    content: Nous voyons qu’Abraham attendait de vivre à la place spéciale de Dieu. C’est la ville que Dieu lui‑même a bâtie. Dieu l’a rendu très fort pour qu’il soit là pour toujours.
  '11':
  - type: text
    content: 'Abraham et sa femme, Sara, étaient trop vieux pour avoir des enfants. Mais Abraham croyait à la promesse de Dieu qu’ils auront des enfants. Il avait confiance en Dieu pour faire ce qu’il avait promis. Grâce à sa '
  - type: text
    content: foi
  - type: text
    content: ', Dieu a permis à Sara et à lui d’avoir un bébé. '
  '12':
  - type: text
    content: 'Abraham était si vieux qu’il était presque comme un mort. Mais de très nombreux petits‑enfants sont venus de ce seul homme. Sa famille est devenue si grande que personne ne pouvait la compter. Ils étaient comme le nombre d’étoiles dans le '
  - type: text
    content: ciel
  - type: text
    content: . Ils étaient autant que les morceaux de sable au bord de la mer.
  '13':
  - type: text
    content: 'Tous ces gens ont continué de croire en Dieu jusqu’à leur mort. Mais ils n’ont pas reçu tout ce que Dieu avait promis de leur donner. Ils étaient comme des gens qui voyaient ces choses au loin. Cela les a rendus heureux. Ces gens ont compris qu’ils vivaient comme des étrangers et des voyageurs sur la terre. '
  '14':
  - type: text
    content: 'Les gens qui vivent de cette façon montrent qu’ils s’attendent à vivre ailleurs un jour. C’est l’endroit où ils seront vraiment comme chez eux. '
  '15':
  - type: text
    content: 'Ils ne pensaient pas au pays qu’ils avaient quitté. Ils pouvaient retourner là s’ils avaient vraiment voulu. '
  '16':
  - type: text
    content: 'Non, ils voulaient beaucoup aller dans un meilleur endroit, au '
  - type: text
    content: ciel
  - type: text
    content: . Pour cette raison, Dieu n’a pas honte que ces gens l’appellent leur Dieu. Il a déjà préparé une ville où vivre.
  '17':
  - type: text
    content: 'Voici un autre exemple de la '
  - type: text
    content: foi
  - type: text
    content: ' d’Abraham. Dieu voulait voir si Abraham lui faisait vraiment confiance. Parce qu’Abraham a cru en Dieu, il a offert son fils, Isaac, en '
  - type: text
    content: sacrifice
  - type: text
    content: '. Dieu avait promis à Abraham qu’il aura de nombreux petits‑enfants. Mais Abraham était toujours prêt à offrir son fils unique en '
  - type: text
    content: sacrifice
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Dieu avait dit à Abraham : C’est par Isaac que ta famille continuera. '
  '19':
  - type: text
    content: Mais Abraham était sûr que, si Isaac mourrait, Dieu pourra ressusciter Isaac. On pourrait même dire que c’est une image de ce qui s’est réellement passé. C’était comme si Abraham avait récupéré Isaac de la mort.
  '2':
  - type: text
    content: 'C’est à cause de leur '
  - type: text
    content: foi
  - type: text
    content: ' que Dieu a dit du bien des gens avant. '
  '20':
  - type: text
    content: 'Isaac lui‑même croyait aussi en Dieu. En raison de sa '
  - type: text
    content: foi
  - type: text
    content: ', il a demandé à Dieu de bénir ses fils, Jacob et Ésaü. Il espérait que Dieu les aidera à l’avenir.'
  '21':
  - type: text
    content: 'Jacob a cru en Dieu. Suite à sa '
  - type: text
    content: foi
  - type: text
    content: ', il a demandé à Dieu de bénir chacun des fils de Joseph. Jacob a fait cela quand il était en train de mourir. En ce temps‑là, il a utilisé son bâton pour se tenir debout pendant qu’il adorait Dieu.'
  '22':
  - type: text
    content: 'Joseph croyait aussi en Dieu. À la fin de sa vie, il a parlé de ce qui arrivera à la famille du peuple d’Israël après sa mort. Il a compris qu’ils quitteront l’Égypte un jour. En raison de sa '
  - type: text
    content: foi
  - type: text
    content: ', il a dit à sa famille l’endroit où ils devront enterrer ses os.'
  '23':
  - type: text
    content: 'Les parents de Moïse ont cru en Dieu. À la naissance de Moïse, ils l’ont caché pendant 3 mois. Ils ont vu que c’était un enfant très spécial. En raison de leur '
  - type: text
    content: foi
  - type: text
    content: ', ils n’ont pas obéi au roi d’Égypte. Ils n’avaient pas peur de faire ça.'
  '24':
  - type: text
    content: 'Moïse lui‑même croyait aussi en Dieu. Devenu homme, il a refusé d’être appelé le fils de la fille du roi. '
  '25':
  - type: text
    content: Au lieu de cela, Moïse a choisi de se joindre au peuple de Dieu. Il a choisi d’avoir des souffrances avec eux. Il ne voulait pas vivre dans la maison du roi et faire de mauvaises choses. Il serait heureux pendant un petit temps seulement là‑bas.
  '26':
  - type: text
    content: Moïse pouvait être très riche en Égypte. Mais, il a voulu être humilié comme Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' devait être humilié. Il a estimé que cela était une richesse plus grande que celles de l’Égypte. Il pensait à la récompense que Dieu lui donnera dans les temps à venir. '
  '27':
  - type: text
    content: 'A cause de sa '
  - type: text
    content: foi
  - type: text
    content: ', Moïse a quitté l’Égypte. Il savait que le roi sera en colère, mais Moïse n’avait pas peur de lui. Au lieu de cela, il a continué à avoir grandement '
  - type: text
    content: foi
  - type: text
    content: ' en Dieu.'
  - type: text
    content: Personne ne peut voir Dieu, mais Moïse a vécu comme quelqu’un qui pouvait voir Dieu.
  '28':
  - type: text
    content: 'A cause de sa '
  - type: text
    content: foi
  - type: text
    content: ', Moïse a dit au peuple d’Israël de préparer le premier repas de la '
  - type: text
    content: Pâque
  - type: text
    content: '. Il leur a dit de mettre du sang de '
  - type: text
    content: sacrifice
  - type: text
    content: ' autour de leurs portes. Puis l’'
  - type: text
    content: ange
  - type: text
    content: ' qui a détruit les gens est venu devant chaque maison. Lorsqu’il a vu le sang, il n’a pas tué les fils aînés des familles du peuple d’Israël.'
  '29':
  - type: text
    content: 'A cause de la '
  - type: text
    content: foi
  - type: text
    content: ', le peuple d’Israël a traversé la mer Rouge. Ils ont marché là comme s’ils marchaient sur la terre ferme. Mais lorsque les soldats égyptiens ont tenté de traverser le même endroit, ils sont morts dans la mer.'
  '3':
  - type: text
    content: 'À cause de la '
  - type: text
    content: foi
  - type: text
    content: ', nous comprenons comment Dieu a créé le monde. Il a fait cela par sa Parole. De cette façon, Dieu a créé toutes les choses que nous pouvons voir. Il les a faites à partir de choses que personne ne pouvait voir.'
  '30':
  - type: text
    content: 'A cause de la '
  - type: text
    content: foi
  - type: text
    content: ', le peuple d’Israël a marché autour de la ville de Jéricho pendant 7 jours. Puis les murs de la ville sont tombés.'
  '31':
  - type: text
    content: 'Rahab, qui avait été prostituée à Jéricho, avait également confiance en Dieu. Elle a aidé les hommes d’Israël qui étaient venus plus tôt dans cette ville. Ils voulaient découvrir comment attaquer la ville. Rahab était gentille avec eux. A cause de sa '
  - type: text
    content: foi
  - type: text
    content: ', elle n’est pas morte avec tous les gens qui n’obéissaient pas à Dieu.'
  '32':
  - type: text
    content: 'Je pourrais en dire plus sur les autres personnes qui ont fait confiance en Dieu. Mais il n’y a pas assez de temps pour parler de chacun d’eux. Je pourrais vous parler de Gédéon, Barak, Samson, Jephté, David, Samuel et tous les '
  - type: text
    content: prophètes
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'A cause de leur '
  - type: text
    content: foi
  - type: text
    content: ', ils ont fait de grandes choses. Certains d’entre eux ont remporté des guerres contre d’autres pays. D’autres ont dirigé d’une bonne et juste manière. Ils ont reçu les bonnes choses que Dieu avait promises. Certains d’entre eux ont fait fermer la bouche aux lions. '
  '34':
  - type: text
    content: Certains d’entre eux ont éteint les feux qui brûlaient très fortement. Certains d’entre eux se sont éloignés des gens qui voulaient les tuer avec une épée. D’autres personnes faibles étaient devenues fortes. Elles sont devenues puissantes pour combattre des guerres. Ces personnes ont gagné contre des armées étrangères et les ont fait fuir.
  '35':
  - type: text
    content: 'Certaines femmes qui avaient '
  - type: text
    content: foi
  - type: text
    content: ' en Dieu ont récupéré leurs morts. Ils ont ressuscité. Dieu a réveillé ces gens qui étaient morts pour redevenir vivants. D’autres personnes ont refusé de se retourner contre Dieu, afin que leurs ennemis ne leur fassent pas de mal. En conséquence, leurs ennemis les ont tués. Ces gens ont accepté de mourir, parce qu’ils étaient sûrs qu’ils revivront avec Dieu. Ils savaient que ce serait mieux pour eux.'
  '36':
  - type: text
    content: 'D’autres gens qui avaient '
  - type: text
    content: foi
  - type: text
    content: ' en Dieu étaient insultés. Certains d’entre eux ont été frappés des fouets. Les ennemis de Dieu ont lié ces gens et ils les ont mis en prison. '
  '37':
  - type: text
    content: 'Certains d’entre eux sont morts lorsque des gens les ont tués avec des pierres. Certains d’entre eux sont morts lorsque les gens les ont coupés en 2. Certains d’entre eux sont morts lorsque des gens les ont tués avec des épées. Certains de ces gens portaient des peaux de brebis et de chèvres lors de leurs déplacements. Ils étaient très pauvres et avaient beaucoup de mal. Les gens leur ont fait du mal. '
  '38':
  - type: text
    content: 'Ces gens qui avaient confiance en Dieu étaient trop bons pour ce monde. Certains d’entre eux ont voyagé dans le '
  - type: text
    content: désert
  - type: text
    content: ' et sur les collines. Certains ont vécu dans des trous dans les '
  - type: text
    content: rochers
  - type: text
    content: ' et dans le sol.'
  '39':
  - type: text
    content: 'Dieu a dit du bien de tous ces gens, parce qu’ils lui faisaient confiance. Mais ils n’ont toujours pas reçu tout ce que Dieu avait promis de leur donner. '
  '4':
  - type: text
    content: 'Abel a cru en Dieu. Il a donc offert un meilleur '
  - type: text
    content: sacrifice
  - type: text
    content: ' à Dieu que Caïn. Et à cause de la '
  - type: text
    content: foi
  - type: text
    content: ' d’Abel, Dieu l’a accepté comme étant juste avec lui. Dieu a dit qu’il était content des dons d’Abel. Parce qu’Abel a fait confiance en Dieu, nous pouvons encore apprendre de sa '
  - type: text
    content: foi
  - type: text
    content: . Abel est mort il y a longtemps, mais c’est comme s’il nous parlait encore.
  '40':
  - type: text
    content: Dieu avait déjà décidé de préparer quelque chose de mieux pour nous tous. C’était pour qu’ils n’arrivent pas à la perfection sans nous.
  '5':
  - type: text
    content: 'Hénoc croyait aussi en Dieu. En raison de la '
  - type: text
    content: foi
  - type: text
    content: ' d’Hénoc, Dieu l’a emmené au '
  - type: text
    content: ciel
  - type: text
    content: '. Il n’est pas mort comme les autres. En conséquence, personne ne pouvait jamais le trouver, car Dieu l’avait emmené au '
  - type: text
    content: ciel
  - type: text
    content: . Avant que Dieu ne l’emmène, il était clair qu’Hénoc avait rendu Dieu heureux.
  '6':
  - type: text
    content: Si nous ne faisons pas confiance en Dieu, il nous est impossible de rendre Dieu heureux. Toute personne qui vient à Dieu, doit croire que Dieu est là. Elle doit également croire que Dieu aide tous ceux qui veulent le connaître.
  '7':
  - type: text
    content: 'Noé croyait aussi en Dieu. Dieu a parlé à Noé de mauvaises choses à venir. Personne ne pouvait voir ce qui allait se passer, mais Noé a cru au message de Dieu. Il a pris soin de faire exactement ce que Dieu lui avait dit. Il a construit un grand bateau pour sauver sa famille. Suite à sa '
  - type: text
    content: foi
  - type: text
    content: ', Noé a montré que tout le monde avait tort. Noé lui‑même est devenu l’une de ces personnes que Dieu a acceptées comme justes avec lui. Ces personnes sont justes avec Dieu, parce qu’elles lui font confiance.'
  '8':
  - type: text
    content: 'Abraham croyait aussi en Dieu. Quand Dieu lui a dit de quitter sa maison, il a obéi à Dieu. Il a quitté sa maison pour se rendre dans un autre pays, mais il ne savait pas où il allait. C’était l’endroit que Dieu avait promis de donner à Abraham. '
  '9':
  - type: text
    content: 'À cause de sa '
  - type: text
    content: foi
  - type: text
    content: ', Abraham est allé vivre comme un étranger dans ce pays étranger. Dieu avait promis de lui donner ce pays, mais Abraham vivait dans des tentes. Isaac et Jacob vivaient également dans des tentes comme des étrangers. Dieu leur avait également promis que la terre leur appartiendra un jour. '
