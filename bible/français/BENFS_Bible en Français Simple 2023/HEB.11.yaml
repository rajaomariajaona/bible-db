document_id: HEB.11,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 11
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ce que signifie avoir '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici ce que signifie avoir '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu : Nous sommes sûrs des choses que nous espérons. Nous sommes sûrs dans nos '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' de choses que nous ne pouvons même pas voir. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nous voyons qu’Abraham attendait de vivre à la place spéciale de Dieu. C’est la ville que Dieu lui‑même a bâtie. Dieu l’a rendu très fort pour qu’il soit là pour toujours.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Abraham et sa femme, Sara, étaient trop vieux pour avoir des enfants. Mais Abraham croyait à la promesse de Dieu qu’ils auront des enfants. Il avait confiance en Dieu pour faire ce qu’il avait promis. Grâce à sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', Dieu a permis à Sara et à lui d’avoir un bébé. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Abraham était si vieux qu’il était presque comme un mort. Mais de très nombreux petits‑enfants sont venus de ce seul homme. Sa famille est devenue si grande que personne ne pouvait la compter. Ils étaient comme le nombre d’étoiles dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Ils étaient autant que les morceaux de sable au bord de la mer.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tous ces gens ont continué de croire en Dieu jusqu’à leur mort. Mais ils n’ont pas reçu tout ce que Dieu avait promis de leur donner. Ils étaient comme des gens qui voyaient ces choses au loin. Cela les a rendus heureux. Ces gens ont compris qu’ils vivaient comme des étrangers et des voyageurs sur la terre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les gens qui vivent de cette façon montrent qu’ils s’attendent à vivre ailleurs un jour. C’est l’endroit où ils seront vraiment comme chez eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils ne pensaient pas au pays qu’ils avaient quitté. Ils pouvaient retourner là s’ils avaient vraiment voulu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Non, ils voulaient beaucoup aller dans un meilleur endroit, au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Pour cette raison, Dieu n’a pas honte que ces gens l’appellent leur Dieu. Il a déjà préparé une ville où vivre.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici un autre exemple de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' d’Abraham. Dieu voulait voir si Abraham lui faisait vraiment confiance. Parce qu’Abraham a cru en Dieu, il a offert son fils, Isaac, en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: '. Dieu avait promis à Abraham qu’il aura de nombreux petits‑enfants. Mais Abraham était toujours prêt à offrir son fils unique en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dieu avait dit à Abraham : C’est par Isaac que ta famille continuera. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mais Abraham était sûr que, si Isaac mourrait, Dieu pourra ressusciter Isaac. On pourrait même dire que c’est une image de ce qui s’est réellement passé. C’était comme si Abraham avait récupéré Isaac de la mort.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'C’est à cause de leur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' que Dieu a dit du bien des gens avant. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Isaac lui‑même croyait aussi en Dieu. En raison de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', il a demandé à Dieu de bénir ses fils, Jacob et Ésaü. Il espérait que Dieu les aidera à l’avenir.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jacob a cru en Dieu. Suite à sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', il a demandé à Dieu de bénir chacun des fils de Joseph. Jacob a fait cela quand il était en train de mourir. En ce temps‑là, il a utilisé son bâton pour se tenir debout pendant qu’il adorait Dieu.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Joseph croyait aussi en Dieu. À la fin de sa vie, il a parlé de ce qui arrivera à la famille du peuple d’Israël après sa mort. Il a compris qu’ils quitteront l’Égypte un jour. En raison de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', il a dit à sa famille l’endroit où ils devront enterrer ses os.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Les parents de Moïse ont cru en Dieu. À la naissance de Moïse, ils l’ont caché pendant 3 mois. Ils ont vu que c’était un enfant très spécial. En raison de leur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', ils n’ont pas obéi au roi d’Égypte. Ils n’avaient pas peur de faire ça.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Moïse lui‑même croyait aussi en Dieu. Devenu homme, il a refusé d’être appelé le fils de la fille du roi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Au lieu de cela, Moïse a choisi de se joindre au peuple de Dieu. Il a choisi d’avoir des souffrances avec eux. Il ne voulait pas vivre dans la maison du roi et faire de mauvaises choses. Il serait heureux pendant un petit temps seulement là‑bas.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Moïse pouvait être très riche en Égypte. Mais, il a voulu être humilié comme Jésus‑
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ' devait être humilié. Il a estimé que cela était une richesse plus grande que celles de l’Égypte. Il pensait à la récompense que Dieu lui donnera dans les temps à venir. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'A cause de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', Moïse a quitté l’Égypte. Il savait que le roi sera en colère, mais Moïse n’avait pas peur de lui. Au lieu de cela, il a continué à avoir grandement '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne ne peut voir Dieu, mais Moïse a vécu comme quelqu’un qui pouvait voir Dieu.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'A cause de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', Moïse a dit au peuple d’Israël de préparer le premier repas de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: '. Il leur a dit de mettre du sang de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' autour de leurs portes. Puis l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' qui a détruit les gens est venu devant chaque maison. Lorsqu’il a vu le sang, il n’a pas tué les fils aînés des familles du peuple d’Israël.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A cause de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', le peuple d’Israël a traversé la mer Rouge. Ils ont marché là comme s’ils marchaient sur la terre ferme. Mais lorsque les soldats égyptiens ont tenté de traverser le même endroit, ils sont morts dans la mer.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'À cause de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', nous comprenons comment Dieu a créé le monde. Il a fait cela par sa Parole. De cette façon, Dieu a créé toutes les choses que nous pouvons voir. Il les a faites à partir de choses que personne ne pouvait voir.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'A cause de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', le peuple d’Israël a marché autour de la ville de Jéricho pendant 7 jours. Puis les murs de la ville sont tombés.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Rahab, qui avait été prostituée à Jéricho, avait également confiance en Dieu. Elle a aidé les hommes d’Israël qui étaient venus plus tôt dans cette ville. Ils voulaient découvrir comment attaquer la ville. Rahab était gentille avec eux. A cause de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', elle n’est pas morte avec tous les gens qui n’obéissaient pas à Dieu.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Je pourrais en dire plus sur les autres personnes qui ont fait confiance en Dieu. Mais il n’y a pas assez de temps pour parler de chacun d’eux. Je pourrais vous parler de Gédéon, Barak, Samson, Jephté, David, Samuel et tous les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'A cause de leur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', ils ont fait de grandes choses. Certains d’entre eux ont remporté des guerres contre d’autres pays. D’autres ont dirigé d’une bonne et juste manière. Ils ont reçu les bonnes choses que Dieu avait promises. Certains d’entre eux ont fait fermer la bouche aux lions. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Certains d’entre eux ont éteint les feux qui brûlaient très fortement. Certains d’entre eux se sont éloignés des gens qui voulaient les tuer avec une épée. D’autres personnes faibles étaient devenues fortes. Elles sont devenues puissantes pour combattre des guerres. Ces personnes ont gagné contre des armées étrangères et les ont fait fuir.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Certaines femmes qui avaient '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu ont récupéré leurs morts. Ils ont ressuscité. Dieu a réveillé ces gens qui étaient morts pour redevenir vivants. D’autres personnes ont refusé de se retourner contre Dieu, afin que leurs ennemis ne leur fassent pas de mal. En conséquence, leurs ennemis les ont tués. Ces gens ont accepté de mourir, parce qu’ils étaient sûrs qu’ils revivront avec Dieu. Ils savaient que ce serait mieux pour eux.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'D’autres gens qui avaient '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' en Dieu étaient insultés. Certains d’entre eux ont été frappés des fouets. Les ennemis de Dieu ont lié ces gens et ils les ont mis en prison. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Certains d’entre eux sont morts lorsque des gens les ont tués avec des pierres. Certains d’entre eux sont morts lorsque les gens les ont coupés en 2. Certains d’entre eux sont morts lorsque des gens les ont tués avec des épées. Certains de ces gens portaient des peaux de brebis et de chèvres lors de leurs déplacements. Ils étaient très pauvres et avaient beaucoup de mal. Les gens leur ont fait du mal. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ces gens qui avaient confiance en Dieu étaient trop bons pour ce monde. Certains d’entre eux ont voyagé dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: désert
    - type: text
      text: ' et sur les collines. Certains ont vécu dans des trous dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: rochers
    - type: text
      text: ' et dans le sol.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Dieu a dit du bien de tous ces gens, parce qu’ils lui faisaient confiance. Mais ils n’ont toujours pas reçu tout ce que Dieu avait promis de leur donner. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Abel a cru en Dieu. Il a donc offert un meilleur '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' à Dieu que Caïn. Et à cause de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' d’Abel, Dieu l’a accepté comme étant juste avec lui. Dieu a dit qu’il était content des dons d’Abel. Parce qu’Abel a fait confiance en Dieu, nous pouvons encore apprendre de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: . Abel est mort il y a longtemps, mais c’est comme s’il nous parlait encore.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Dieu avait déjà décidé de préparer quelque chose de mieux pour nous tous. C’était pour qu’ils n’arrivent pas à la perfection sans nous.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hénoc croyait aussi en Dieu. En raison de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ' d’Hénoc, Dieu l’a emmené au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. Il n’est pas mort comme les autres. En conséquence, personne ne pouvait jamais le trouver, car Dieu l’avait emmené au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: . Avant que Dieu ne l’emmène, il était clair qu’Hénoc avait rendu Dieu heureux.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Si nous ne faisons pas confiance en Dieu, il nous est impossible de rendre Dieu heureux. Toute personne qui vient à Dieu, doit croire que Dieu est là. Elle doit également croire que Dieu aide tous ceux qui veulent le connaître.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Noé croyait aussi en Dieu. Dieu a parlé à Noé de mauvaises choses à venir. Personne ne pouvait voir ce qui allait se passer, mais Noé a cru au message de Dieu. Il a pris soin de faire exactement ce que Dieu lui avait dit. Il a construit un grand bateau pour sauver sa famille. Suite à sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', Noé a montré que tout le monde avait tort. Noé lui‑même est devenu l’une de ces personnes que Dieu a acceptées comme justes avec lui. Ces personnes sont justes avec Dieu, parce qu’elles lui font confiance.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Abraham croyait aussi en Dieu. Quand Dieu lui a dit de quitter sa maison, il a obéi à Dieu. Il a quitté sa maison pour se rendre dans un autre pays, mais il ne savait pas où il allait. C’était l’endroit que Dieu avait promis de donner à Abraham. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'À cause de sa '
    - type: usfm
      marker: w
      children:
      - type: text
        text: foi
    - type: text
      text: ', Abraham est allé vivre comme un étranger dans ce pays étranger. Dieu avait promis de lui donner ce pays, mais Abraham vivait dans des tentes. Isaac et Jacob vivaient également dans des tentes comme des étrangers. Dieu leur avait également promis que la terre leur appartiendra un jour. '
