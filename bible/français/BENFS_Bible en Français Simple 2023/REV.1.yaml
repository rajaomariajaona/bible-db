document_id: REV.1
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 1
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Message de Jean
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ce livre décrit les choses que Dieu a montrées à Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: '. Dieu voulait que Jésus montre ces choses à ses serviteurs. Ce sont des choses qui doivent arriver bientôt. Jésus a envoyé son '
  - type: usfm
    marker: w
    children:
    - type: text
      text: ange
  - type: text
    text: ' pour me les montrer, moi son serviteur Jean.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Moi, Jean, j’ai écrit sur tout ce que Dieu m’a montré. Ces choses sont un vrai message de Dieu. Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' dit que ces choses sont vraiment réelles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si quelqu’un lit les paroles de cette prophétie, Dieu bénira cette personne. Dieu bénira également les gens qui écoutent ces paroles. S’ils obéissent au message de Dieu, tous ces gens seront vraiment heureux. Ces choses sont très importantes et elles arriveront bientôt.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jean écrit aux 7 Églises
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je suis Jean. J’écris aux 7 Églises qui se trouvent dans la région appelée Asie. Je prie que Dieu et les 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' devant son trône vous soient très gentils. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Dieu est vivant maintenant. Il a toujours été vivant. Il continuera à être vivant pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je prie que Jésus‑
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: ' vous soit très gentil. Je prie qu’il vous donne aussi la paix dans vos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: . Il dit toujours les vrais messages de Dieu. Il est la première personne qui est revenue à la vie après sa mort. Il règne sur les rois de la terre.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jésus nous aime et il est mort pour nous. C’est ainsi qu’il nous a rendus libres. À cause de Jésus, Dieu ne nous punira pas pour les mauvaises choses que nous avons faites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus nous a fait entrer dans sa famille, afin que nous appartenions au '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Royaume de Dieu
  - type: text
    text: '. Il a fait de nous des '
  - type: usfm
    marker: w
    children:
    - type: text
      text: prêtres
  - type: text
    text: ', pour que nous servions son Dieu et Père. Pour cette raison, nous glorifions Jésus‑'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Christ
  - type: text
    text: . Il sera toujours très grand ! Il a la puissance pour toujours. C’est vrai !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Regardez, il viendra sur les nuages !
- type: usfm
  marker: q1
  children:
  - type: text
    text: À ce moment‑là, tout le monde le verra !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les gens qui ont introduit une lance dans son corps le verront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gens de tous les pays du monde seront tristes quand ils le verront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, cela arrivera vraiment. C’est vrai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu a dit : Je suis le commencement et la fin de toute chose. J’ai toute puissance et tout pouvoir. Je suis vivant. J’ai toujours été en vie. Je continuerai à vivre pour toujours.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus apparaît à Jean
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je suis Jean. Je suis croyant, comme vous. Je suis donc comme votre frère et votre ami. Parce que nous appartenons au Royaume de Jésus, nous avons des souffrances. Donc, nous devons tous être forts et patients, comme Jésus nous aide. Les dirigeants '
  - type: usfm
    marker: w
    children:
    - type: text
      text: romains
  - type: text
    text: ' m’ont puni, parce que j’ai enseigné le message de Dieu. J’ai dit aux gens le vrai message de Jésus. C’est pourquoi ils m’ont envoyé sur l’île de '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Patmos
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le jour du '
  - type: usfm
    marker: w
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', l’'
  - type: usfm
    marker: w
    children:
    - type: text
      text: Esprit
  - type: text
    text: ' de Dieu m’a fait voir et entendre des choses. J’ai entendu une voix parler derrière moi. Le son était aussi fort que celui d’une trompette. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La voix disait ceci : Les choses que tu vois, écris‑les dans un livre. Ensuite, envoie le livre aux 7 Églises de ces villes : Éphèse, Smyrne, Pergame, Thyatire, Sardes, Philadelphie et Laodicée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je me suis retourné pour voir la personne qui me parlait. Quand je me suis retourné, j’ai vu 7 '
  - type: usfm
    marker: w
    children:
    - type: text
      text: chandeliers
  - type: text
    text: ' en or avec leurs lumières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au milieu des lumières, j’ai vu quelqu’un comme un fils d’homme. Il portait de longs vêtements qui descendaient jusqu’à ses pieds. Il portait une ceinture en or autour de la partie supérieure de son corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sa tête et ses cheveux étaient blancs comme des poils du mouton. Ils étaient très blancs, comme de la neige. Ses yeux étaient comme des feux qui brûlaient fortement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ses pieds brillaient comme un métal jaune qui brille fortement dans un feu très chaud. Quand il parlait, sa voix était très forte. C’était comme le bruit de nombreuses rivières qui se déplacent très rapidement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il tenait 7 étoiles dans sa main droite. Une épée aiguë à 2 tranchants sortait de sa bouche. Son visage était comme le soleil quand il brille fortement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quand je l’ai vu, je suis tombé à ses pieds comme un mort. Puis il a posé sa main droite sur moi et il m’a dit : N’aie pas peur ! Je suis celui qui est le premier et aussi le dernier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je suis celui qui vit toujours. Je suis mort une fois. Mais regarde ! Maintenant, je suis vivant et je serai vivant pour toujours. J’ai le pouvoir sur la mort et sur l’
  - type: usfm
    marker: w
    children:
    - type: text
      text: Hadès
  - type: text
    text: ', le lieu des morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Note donc les choses que tu as vues. Écris ce que tu vois, ce qui se passe maintenant. Écris aussi sur les choses qui arriveront plus tard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu as vu 7 étoiles que je tenais dans ma main droite. Tu as vu 7 lumières dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: chandeliers
  - type: text
    text: ' en or. Maintenant, je vais te dire ce qu’elles signifient. Les 7 étoiles montrent les '
  - type: usfm
    marker: w
    children:
    - type: text
      text: anges
  - type: text
    text: ' des 7 Églises. Les 7 lumières dans leurs chandeliers montrent les 7 Églises elles‑mêmes.'
