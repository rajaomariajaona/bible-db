document_id: REV.1,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 1
  - type: heading
    content: Message de Jean
  - type: text
    content: Ce livre décrit les choses que Dieu a montrées à Jésus‑
  - type: text
    content: Christ
  - type: text
    content: '. Dieu voulait que Jésus montre ces choses à ses serviteurs. Ce sont des choses qui doivent arriver bientôt. Jésus a envoyé son '
  - type: text
    content: ange
  - type: text
    content: ' pour me les montrer, moi son serviteur Jean.'
  '10':
  - type: text
    content: 'Le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ', l’'
  - type: text
    content: Esprit
  - type: text
    content: ' de Dieu m’a fait voir et entendre des choses. J’ai entendu une voix parler derrière moi. Le son était aussi fort que celui d’une trompette. '
  '11':
  - type: text
    content: 'La voix disait ceci : Les choses que tu vois, écris‑les dans un livre. Ensuite, envoie le livre aux 7 Églises de ces villes : Éphèse, Smyrne, Pergame, Thyatire, Sardes, Philadelphie et Laodicée.'
  '12':
  - type: text
    content: 'Je me suis retourné pour voir la personne qui me parlait. Quand je me suis retourné, j’ai vu 7 '
  - type: text
    content: chandeliers
  - type: text
    content: ' en or avec leurs lumières. '
  '13':
  - type: text
    content: 'Au milieu des lumières, j’ai vu quelqu’un comme un fils d’homme. Il portait de longs vêtements qui descendaient jusqu’à ses pieds. Il portait une ceinture en or autour de la partie supérieure de son corps. '
  '14':
  - type: text
    content: 'Sa tête et ses cheveux étaient blancs comme des poils du mouton. Ils étaient très blancs, comme de la neige. Ses yeux étaient comme des feux qui brûlaient fortement. '
  '15':
  - type: text
    content: 'Ses pieds brillaient comme un métal jaune qui brille fortement dans un feu très chaud. Quand il parlait, sa voix était très forte. C’était comme le bruit de nombreuses rivières qui se déplacent très rapidement. '
  '16':
  - type: text
    content: Il tenait 7 étoiles dans sa main droite. Une épée aiguë à 2 tranchants sortait de sa bouche. Son visage était comme le soleil quand il brille fortement.
  '17':
  - type: text
    content: 'Quand je l’ai vu, je suis tombé à ses pieds comme un mort. Puis il a posé sa main droite sur moi et il m’a dit : N’aie pas peur ! Je suis celui qui est le premier et aussi le dernier. '
  '18':
  - type: text
    content: Je suis celui qui vit toujours. Je suis mort une fois. Mais regarde ! Maintenant, je suis vivant et je serai vivant pour toujours. J’ai le pouvoir sur la mort et sur l’
  - type: text
    content: Hadès
  - type: text
    content: ', le lieu des morts. '
  '19':
  - type: text
    content: Note donc les choses que tu as vues. Écris ce que tu vois, ce qui se passe maintenant. Écris aussi sur les choses qui arriveront plus tard.
  '2':
  - type: text
    content: Moi, Jean, j’ai écrit sur tout ce que Dieu m’a montré. Ces choses sont un vrai message de Dieu. Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' dit que ces choses sont vraiment réelles. '
  '20':
  - type: text
    content: 'Tu as vu 7 étoiles que je tenais dans ma main droite. Tu as vu 7 lumières dans leurs '
  - type: text
    content: chandeliers
  - type: text
    content: ' en or. Maintenant, je vais te dire ce qu’elles signifient. Les 7 étoiles montrent les '
  - type: text
    content: anges
  - type: text
    content: ' des 7 Églises. Les 7 lumières dans leurs chandeliers montrent les 7 Églises elles‑mêmes.'
  '3':
  - type: text
    content: Si quelqu’un lit les paroles de cette prophétie, Dieu bénira cette personne. Dieu bénira également les gens qui écoutent ces paroles. S’ils obéissent au message de Dieu, tous ces gens seront vraiment heureux. Ces choses sont très importantes et elles arriveront bientôt.
  - type: heading
    content: Jean écrit aux 7 Églises
  '4':
  - type: text
    content: 'Je suis Jean. J’écris aux 7 Églises qui se trouvent dans la région appelée Asie. Je prie que Dieu et les 7 '
  - type: text
    content: esprits
  - type: text
    content: ' devant son trône vous soient très gentils. Je prie pour qu’ils vous donnent la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: . Dieu est vivant maintenant. Il a toujours été vivant. Il continuera à être vivant pour toujours.
  '5':
  - type: text
    content: Je prie que Jésus‑
  - type: text
    content: Christ
  - type: text
    content: ' vous soit très gentil. Je prie qu’il vous donne aussi la paix dans vos '
  - type: text
    content: esprits
  - type: text
    content: . Il dit toujours les vrais messages de Dieu. Il est la première personne qui est revenue à la vie après sa mort. Il règne sur les rois de la terre.
  - type: text
    content: 'Jésus nous aime et il est mort pour nous. C’est ainsi qu’il nous a rendus libres. À cause de Jésus, Dieu ne nous punira pas pour les mauvaises choses que nous avons faites. '
  '6':
  - type: text
    content: 'Jésus nous a fait entrer dans sa famille, afin que nous appartenions au '
  - type: text
    content: Royaume de Dieu
  - type: text
    content: '. Il a fait de nous des '
  - type: text
    content: prêtres
  - type: text
    content: ', pour que nous servions son Dieu et Père. Pour cette raison, nous glorifions Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: . Il sera toujours très grand ! Il a la puissance pour toujours. C’est vrai !
  '7':
  - type: text
    content: Regardez, il viendra sur les nuages !
  - type: text
    content: À ce moment‑là, tout le monde le verra !
  - type: text
    content: Même les gens qui ont introduit une lance dans son corps le verront.
  - type: text
    content: Les gens de tous les pays du monde seront tristes quand ils le verront.
  - type: text
    content: Oui, cela arrivera vraiment. C’est vrai.
  '8':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu a dit : Je suis le commencement et la fin de toute chose. J’ai toute puissance et tout pouvoir. Je suis vivant. J’ai toujours été en vie. Je continuerai à vivre pour toujours.'
  - type: heading
    content: Jésus apparaît à Jean
  '9':
  - type: text
    content: 'Je suis Jean. Je suis croyant, comme vous. Je suis donc comme votre frère et votre ami. Parce que nous appartenons au Royaume de Jésus, nous avons des souffrances. Donc, nous devons tous être forts et patients, comme Jésus nous aide. Les dirigeants '
  - type: text
    content: romains
  - type: text
    content: ' m’ont puni, parce que j’ai enseigné le message de Dieu. J’ai dit aux gens le vrai message de Jésus. C’est pourquoi ils m’ont envoyé sur l’île de '
  - type: text
    content: Patmos
  - type: text
    content: .
