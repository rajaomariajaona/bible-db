document_id: 2PE.2,4410
type_code: fra
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Chapitre 2
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu punira de faux enseignants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a de nombreuses années, il y avait de faux '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ' parmi le peuple de Dieu. Ils ne disaient pas les vrais messages de Dieu. De la même manière, il y aura également de faux enseignants parmi vous. Ils viendront et vous apprendront des choses qui ne sont pas vraies. Leurs mauvaises idées feront mal aux gens. Ces faux enseignants parleront même contre le Maître, qui a payé le prix de leurs péchés. Par conséquent, ils amèneront Dieu à les détruire rapidement. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu va certainement punir ceux qui veulent de mauvaises choses. Ils font de mauvaises choses que leurs corps veulent faire. Ils ne veulent pas obéir à l’autorité de personne.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces faux enseignants n’ont pas peur de ce que les autres pensent d’eux. Ils pensent qu’ils sont eux‑mêmes très importants. Ils n’ont pas peur de dire beaucoup de mauvaises choses contre les grands '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anges
    - type: text
      text: ' du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ciel
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anges
    - type: text
      text: ' sont plus puissants que les faux enseignants. Mais même ces '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anges
    - type: text
      text: ' ne diront pas de mauvaises choses contre eux devant le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ces faux enseignants parlent contre des choses qu’ils ne comprennent pas. Ils sont comme des animaux sauvages. Leurs '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprits
    - type: text
      text: ' ne peuvent pas penser correctement. Ils ne font que ce que leur nature leur fait faire. Les animaux sauvages naissent pour que les gens puissent les attraper et les tuer. De la même manière, Dieu détruira les faux enseignants. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont causé beaucoup de problèmes à d’autres personnes. En retour, Dieu leur causera des problèmes. Ils font juste des choses qui rendront leur corps heureux. Ils ont des fêtes sauvages, même pendant la journée. Ils mangent et boivent trop lorsqu’ils mangent avec vous. Ils aiment toutes ces mauvaises manières d’être heureux. En conséquence, les gens pensent aussi de mauvaises choses à votre sujet. Ils font que les gens aient honte de vous. Donc, ce sont comme des marques sales qui abîment quelque chose de propre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le temps, ils recherchent des femmes qui auront des relations sexuelles avec eux. Ils veulent toujours faire de mauvaises choses. Ils enseignent aux gens qui ont un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ' faible à croire aux mauvaises choses. Ils veulent juste de plus en plus de choses pour se faire plaisir. Dieu punira certainement ces gens, car ils sont très mauvais.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces faux enseignants ont laissé le bon et juste chemin. Comme Balaam, le fils de Beor, ils ont pris une fausse route. Balaam voulait tellement d’argent qu’il a fait de mauvaises choses pour l’obtenir. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais un '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âne
    - type: text
      text: ' lui a dit qu’il n’obéissait pas à Dieu. Nous savons que les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: ânes
    - type: text
      text: ' ne peuvent pas parler. Mais cet '
    - type: usfm
      marker: w
      children:
      - type: text
        text: âne
    - type: text
      text: ' a parlé d’une voix humaine. De cette façon, cela a empêché le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophète
    - type: text
      text: ' Balaam à faire de mauvaises choses.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces faux enseignants promettent de bonnes choses qui n’arriveront jamais. Ils sont comme un puits sec sans eau. Ils sont comme des nuages dans une tempête que le vent emporte pour qu’aucune pluie ne vienne. Dieu les enverra certainement dans les endroits les plus sombres de l’enfer. Il a gardé cet endroit prêt pour eux.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les messages que ces enseignants disent, semblent être très importants. Mais leurs mots ne signifient vraiment rien. De cette façon, ils éloignent les gens de Dieu. Certaines gens ne croyaient pas en Dieu depuis très longtemps. Ils viennent juste de laisser de mauvaises choses que les gens font. Mais les faux enseignants disent à ces gens de faire de mauvaises choses qui les rendent heureux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les faux enseignants leur disent de faire tout ce qu’ils veulent. Ils promettent que cela rendra ces gens vraiment libres. Mais les faux enseignants eux‑mêmes ne sont pas libres. Au contraire, ils sont comme des esclaves. Ils ne peuvent pas arrêter de faire de mauvaises choses qui les détruiront. Nous savons que si quelque chose a le pouvoir sur une personne, alors cette personne est esclave de cette chose.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beaucoup de gens croiront à ces faux enseignants. Ils vivront mal, comme les faux enseignants. Alors, beaucoup de gens diront de mauvaises choses contre la vraie façon de vivre de Dieu.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces faux enseignants ont appris l’existence de notre '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus‑'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Christ
    - type: text
      text: ', qui nous sauve. Alors, ils ont laissé de faire de mauvaises choses qui appartiennent à ce monde. Ils sont devenus libres du pouvoir de ces choses. Mais maintenant, ils ont recommencé à faire ces mauvaises choses. Ces choses ont un pouvoir sur eux et ils ne peuvent pas arrêter de les faire. Alors maintenant, ces faux enseignants sont pires qu’ils ne l’étaient au début, avant de croire au '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Jésus.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela pourrait être mieux pour eux s’ils n’avaient jamais connu la bonne voie de Dieu. Mais ils ont compris les bonnes choses que Dieu veut que nous fassions. Et puis ils se sont détournés de ce mode de vie. Ils ont laissé d’obéir aux bonnes règles de Dieu, que les gens leur avaient enseignées. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous connaissez ces vrais proverbes : Après qu’un chien a vomi, il revient manger ce qu’il a vomi. Aussi : Après avoir lavé un cochon, il retourne rapidement dans la saleté. Ces mots décrivent comment vivent les faux enseignants.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les faux enseignants veulent que vous leur donniez de l’argent. Ainsi, ils enseigneront des choses qui ne sont pas vraies. Il y a longtemps, Dieu avait déjà décidé qu’il devait les punir. Dieu est prêt à le faire maintenant. Vraiment, il les détruira bientôt.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu a même puni les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Anges
    - type: text
      text: ' qui refusaient de lui obéir. Il les a jetés dans le trou profond de l’enfer. Il les a attachés et il les a gardés dans cette prison complètement sombre. Ils y resteront jusqu’au jour où Dieu les jugera.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussi, il y a longtemps, Dieu a puni toutes les mauvaises personnes qui vivaient dans le monde. Dieu a envoyé de l’eau pour couvrir toute la terre. Toutes les personnes qui ont refusé de lui obéir sont mortes dans l’eau. Mais Dieu a gardé Noé en sécurité. Noé avait dit aux gens le message de Dieu qu’ils devaient faire de bonnes choses. Alors Dieu a sauvé Noé et 7 autres personnes de l’eau.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu a également puni les gens qui vivaient dans les villes appelées Sodome et Gomorrhe. Parce qu’ils ont fait de mauvaises choses, Dieu a décidé de les détruire. Il a brûlé complètement ces villes. Après, il ne restait que des cendres. Quand Dieu a fait cela, il a montré ce qui arrivera à tous ceux qui refusent de lui obéir.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En plus, Dieu a sauvé Lot du danger. Lot était un homme bon. Il était très triste parce que les habitants de Sodome n’ont pas obéi à la loi de Dieu. Ils vivaient très mal. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lot vivait parmi ces méchants. Chaque jour, il voyait les mauvaises choses qu’ils faisaient. Chaque jour, il entendait les mauvaises choses qu’ils disaient. Alors, Lot avait beaucoup de mal à l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: esprit
    - type: text
      text: ', car il était un homme bon.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu a fait toutes ces choses dans le passé. Nous comprenons donc qu’il sait comment sauver son propre peuple du danger. Mais il continuera de punir les gens qui refusent de lui obéir. Il les gardera jusqu’au jour où il les jugera. '
