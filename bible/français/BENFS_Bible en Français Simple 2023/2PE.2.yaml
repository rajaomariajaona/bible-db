document_id: 2PE.2,4410
type_code: fra
verses:
  '1':
  - type: heading
    content: Chapitre 2
  - type: heading
    content: Dieu punira de faux enseignants
  - type: text
    content: 'Il y a de nombreuses années, il y avait de faux '
  - type: text
    content: prophètes
  - type: text
    content: ' parmi le peuple de Dieu. Ils ne disaient pas les vrais messages de Dieu. De la même manière, il y aura également de faux enseignants parmi vous. Ils viendront et vous apprendront des choses qui ne sont pas vraies. Leurs mauvaises idées feront mal aux gens. Ces faux enseignants parleront même contre le Maître, qui a payé le prix de leurs péchés. Par conséquent, ils amèneront Dieu à les détruire rapidement. '
  '10':
  - type: text
    content: Dieu va certainement punir ceux qui veulent de mauvaises choses. Ils font de mauvaises choses que leurs corps veulent faire. Ils ne veulent pas obéir à l’autorité de personne.
  - type: text
    content: 'Ces faux enseignants n’ont pas peur de ce que les autres pensent d’eux. Ils pensent qu’ils sont eux‑mêmes très importants. Ils n’ont pas peur de dire beaucoup de mauvaises choses contre les grands '
  - type: text
    content: Anges
  - type: text
    content: ' du '
  - type: text
    content: ciel
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Les '
  - type: text
    content: Anges
  - type: text
    content: ' sont plus puissants que les faux enseignants. Mais même ces '
  - type: text
    content: Anges
  - type: text
    content: ' ne diront pas de mauvaises choses contre eux devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Mais ces faux enseignants parlent contre des choses qu’ils ne comprennent pas. Ils sont comme des animaux sauvages. Leurs '
  - type: text
    content: esprits
  - type: text
    content: ' ne peuvent pas penser correctement. Ils ne font que ce que leur nature leur fait faire. Les animaux sauvages naissent pour que les gens puissent les attraper et les tuer. De la même manière, Dieu détruira les faux enseignants. '
  '13':
  - type: text
    content: 'Ils ont causé beaucoup de problèmes à d’autres personnes. En retour, Dieu leur causera des problèmes. Ils font juste des choses qui rendront leur corps heureux. Ils ont des fêtes sauvages, même pendant la journée. Ils mangent et boivent trop lorsqu’ils mangent avec vous. Ils aiment toutes ces mauvaises manières d’être heureux. En conséquence, les gens pensent aussi de mauvaises choses à votre sujet. Ils font que les gens aient honte de vous. Donc, ce sont comme des marques sales qui abîment quelque chose de propre. '
  '14':
  - type: text
    content: 'Tout le temps, ils recherchent des femmes qui auront des relations sexuelles avec eux. Ils veulent toujours faire de mauvaises choses. Ils enseignent aux gens qui ont un '
  - type: text
    content: esprit
  - type: text
    content: ' faible à croire aux mauvaises choses. Ils veulent juste de plus en plus de choses pour se faire plaisir. Dieu punira certainement ces gens, car ils sont très mauvais.'
  '15':
  - type: text
    content: 'Ces faux enseignants ont laissé le bon et juste chemin. Comme Balaam, le fils de Beor, ils ont pris une fausse route. Balaam voulait tellement d’argent qu’il a fait de mauvaises choses pour l’obtenir. '
  '16':
  - type: text
    content: 'Mais un '
  - type: text
    content: âne
  - type: text
    content: ' lui a dit qu’il n’obéissait pas à Dieu. Nous savons que les '
  - type: text
    content: ânes
  - type: text
    content: ' ne peuvent pas parler. Mais cet '
  - type: text
    content: âne
  - type: text
    content: ' a parlé d’une voix humaine. De cette façon, cela a empêché le '
  - type: text
    content: prophète
  - type: text
    content: ' Balaam à faire de mauvaises choses.'
  '17':
  - type: text
    content: Ces faux enseignants promettent de bonnes choses qui n’arriveront jamais. Ils sont comme un puits sec sans eau. Ils sont comme des nuages dans une tempête que le vent emporte pour qu’aucune pluie ne vienne. Dieu les enverra certainement dans les endroits les plus sombres de l’enfer. Il a gardé cet endroit prêt pour eux.
  '18':
  - type: text
    content: 'Les messages que ces enseignants disent, semblent être très importants. Mais leurs mots ne signifient vraiment rien. De cette façon, ils éloignent les gens de Dieu. Certaines gens ne croyaient pas en Dieu depuis très longtemps. Ils viennent juste de laisser de mauvaises choses que les gens font. Mais les faux enseignants disent à ces gens de faire de mauvaises choses qui les rendent heureux. '
  '19':
  - type: text
    content: Les faux enseignants leur disent de faire tout ce qu’ils veulent. Ils promettent que cela rendra ces gens vraiment libres. Mais les faux enseignants eux‑mêmes ne sont pas libres. Au contraire, ils sont comme des esclaves. Ils ne peuvent pas arrêter de faire de mauvaises choses qui les détruiront. Nous savons que si quelque chose a le pouvoir sur une personne, alors cette personne est esclave de cette chose.
  '2':
  - type: text
    content: Beaucoup de gens croiront à ces faux enseignants. Ils vivront mal, comme les faux enseignants. Alors, beaucoup de gens diront de mauvaises choses contre la vraie façon de vivre de Dieu.
  '20':
  - type: text
    content: 'Ces faux enseignants ont appris l’existence de notre '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus‑'
  - type: text
    content: Christ
  - type: text
    content: ', qui nous sauve. Alors, ils ont laissé de faire de mauvaises choses qui appartiennent à ce monde. Ils sont devenus libres du pouvoir de ces choses. Mais maintenant, ils ont recommencé à faire ces mauvaises choses. Ces choses ont un pouvoir sur eux et ils ne peuvent pas arrêter de les faire. Alors maintenant, ces faux enseignants sont pires qu’ils ne l’étaient au début, avant de croire au '
  - type: text
    content: Seigneur
  - type: text
    content: ' Jésus.'
  '21':
  - type: text
    content: 'Cela pourrait être mieux pour eux s’ils n’avaient jamais connu la bonne voie de Dieu. Mais ils ont compris les bonnes choses que Dieu veut que nous fassions. Et puis ils se sont détournés de ce mode de vie. Ils ont laissé d’obéir aux bonnes règles de Dieu, que les gens leur avaient enseignées. '
  '22':
  - type: text
    content: 'Vous connaissez ces vrais proverbes : Après qu’un chien a vomi, il revient manger ce qu’il a vomi. Aussi : Après avoir lavé un cochon, il retourne rapidement dans la saleté. Ces mots décrivent comment vivent les faux enseignants.'
  '3':
  - type: text
    content: Les faux enseignants veulent que vous leur donniez de l’argent. Ainsi, ils enseigneront des choses qui ne sont pas vraies. Il y a longtemps, Dieu avait déjà décidé qu’il devait les punir. Dieu est prêt à le faire maintenant. Vraiment, il les détruira bientôt.
  '4':
  - type: text
    content: 'Dieu a même puni les '
  - type: text
    content: Anges
  - type: text
    content: ' qui refusaient de lui obéir. Il les a jetés dans le trou profond de l’enfer. Il les a attachés et il les a gardés dans cette prison complètement sombre. Ils y resteront jusqu’au jour où Dieu les jugera.'
  '5':
  - type: text
    content: Aussi, il y a longtemps, Dieu a puni toutes les mauvaises personnes qui vivaient dans le monde. Dieu a envoyé de l’eau pour couvrir toute la terre. Toutes les personnes qui ont refusé de lui obéir sont mortes dans l’eau. Mais Dieu a gardé Noé en sécurité. Noé avait dit aux gens le message de Dieu qu’ils devaient faire de bonnes choses. Alors Dieu a sauvé Noé et 7 autres personnes de l’eau.
  '6':
  - type: text
    content: Dieu a également puni les gens qui vivaient dans les villes appelées Sodome et Gomorrhe. Parce qu’ils ont fait de mauvaises choses, Dieu a décidé de les détruire. Il a brûlé complètement ces villes. Après, il ne restait que des cendres. Quand Dieu a fait cela, il a montré ce qui arrivera à tous ceux qui refusent de lui obéir.
  '7':
  - type: text
    content: 'En plus, Dieu a sauvé Lot du danger. Lot était un homme bon. Il était très triste parce que les habitants de Sodome n’ont pas obéi à la loi de Dieu. Ils vivaient très mal. '
  '8':
  - type: text
    content: Lot vivait parmi ces méchants. Chaque jour, il voyait les mauvaises choses qu’ils faisaient. Chaque jour, il entendait les mauvaises choses qu’ils disaient. Alors, Lot avait beaucoup de mal à l’
  - type: text
    content: esprit
  - type: text
    content: ', car il était un homme bon.'
  '9':
  - type: text
    content: 'Nous savons que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu a fait toutes ces choses dans le passé. Nous comprenons donc qu’il sait comment sauver son propre peuple du danger. Mais il continuera de punir les gens qui refusent de lui obéir. Il les gardera jusqu’au jour où il les jugera. '
