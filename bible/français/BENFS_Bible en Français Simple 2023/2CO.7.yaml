document_id: 2CO.7
type_code: fra
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Chapitre 7
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul aime les croyants de Corinthe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi, mes amis, Dieu nous a promis ces choses. Nous devons donc nous garder loin de tout ce qui rend nos corps ou nos '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: ' impurs. Nous devons respecter Dieu et lui obéir. Alors, nous deviendrons de plus en plus comme lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Soyez amis avec nous. Nous n’avons rien fait de mal à aucun d’entre vous. Nous n’avons fait du mal à personne. Nous n’avons trompé personne. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je ne dis pas cela pour vous faire honte. Comme je vous l’ai déjà dit, vous êtes nos amis spéciaux. Nous continuerons à vous aimer, que nous vivions ensemble ou que nous mourions ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je vous connais et je vous fais confiance. Je suis fier de vous. Vous m’avez aidé à être fort. Donc, même quand nous avons beaucoup de problèmes, je suis toujours très heureux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque nous sommes arrivés en Macédoine, nos corps ne se sont pas reposés du tout. Nous avons eu beaucoup de problèmes. Tout autour de nous, les gens se sont disputés avec nous. À l’intérieur de nous, nous avions peur. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais quand les gens se sentent troublés, Dieu les aide à être forts. Et Dieu nous a rendus heureux quand Tite est arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dieu nous a encouragés non seulement parce que Tite est venu vers nous. Il nous a également encouragés par ce que Tite nous a parlé de vous. Il a dit que vous l’avez aidé à être fort. Il nous a dit que vous vouliez me voir. Il nous a dit que vous étiez très tristes de ce qui s’était passé. Il nous a également dit que vous êtes prêts à m’aider. J’étais très heureux à cause de ce que Tite nous a dit sur vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais même si je vous ai rendus tristes par ma lettre, je ne regrette pas cela. À un moment donné, j’étais triste de l’avoir écrite. J’ai vu que ma lettre vous avait rendus tristes. Mais vous étiez tristes pendant une courte période seulement. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Donc, maintenant je suis heureux, mais pas parce que ma lettre vous a rendus tristes. Non, je suis heureux car cela vous a détourné de mauvaises choses. Vous êtes devenus tristes, car Dieu voulait que vous soyez tristes. Donc, quand la lettre vous a rendus tristes, nous ne vous avons pas vraiment fait de mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les gens doivent devenir tristes comme Dieu le veut. Quand ils sont tristes de cette façon, cela les amène à laisser de mauvaises choses. Alors Dieu les sauve de leurs péchés. Ils ne le regretteront jamais ! Mais quand les gens deviennent tristes comme le monde le veut, cela ne les aide pas. Ils ne se tournent pas vers Dieu et ils meurent dans leurs '
  - type: usfm
    marker: w
    children:
    - type: text
      text: esprits
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous êtes devenus tristes comme Dieu l’a voulu. Et voyez quels bons résultats cela a donnés ! Cela vous a fait travailler dur pour faire de bonnes choses. Vous voulez montrer aux gens que vous faites ce qui est bien. Vous êtes en colère contre le péché. Vous voulez obéir à Dieu. Vous voulez remettre les choses en ordre. Vous voulez plaire à Dieu. Vous voulez punir toute personne qui fait de mauvaises choses. De toutes ces manières, vous avez montré que vous êtes justes. Vous avez fait tout ce qui était nécessaire dans ce cas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors pourquoi vous ai‑je écrit cette lettre ? Ce n’est pas à cause de la personne qui a fait la mauvaise chose. Ce n’était pas non plus pour aider la personne qui lui avait fait du mal. Non. J’ai écrit la lettre pour vous montrer quelque chose sur vous‑mêmes. Je voulais que Dieu vous montre que vous nous aimez vraiment et que vous nous respectez. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est ainsi que Dieu nous a encouragés.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ce n’est pas seulement nous que Dieu a encouragés. Quand Tite est venu, nous étions très heureux de voir à quel point il était heureux aussi. Il était heureux parce que vous aviez tous pris soin de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’ai dit à Tite que j’étais très fier de vous. Quand il est venu vers vous, vous avez montré que j’étais juste à votre sujet. Nous vous avons toujours dit des choses vraies seulement. Et quand nous avons dit de bonnes choses à votre sujet à Tite, vous avez montré que ces choses étaient également vraies. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maintenant, quand Tite pense à vous, il vous aime encore plus. Il se souvient que vous étiez prêts à lui obéir. Vous avez respecté son pouvoir et vous l’avez reçu chez vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors maintenant, je suis très heureux, parce que je vous fais confiance pour faire ce qui est bien.
