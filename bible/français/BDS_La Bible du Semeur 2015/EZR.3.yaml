document_id: EZR.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autel est reconstruit et le culte rétabli
  - type: text
    content: Quand arriva le septième mois
  - type: note
    content: C’est-à-dire le mois de Tishri, en septembre-octobre 537 av. J.-C.
  - type: text
    content: ', les Israélites étaient installés dans leurs villes. Alors le peuple se rassembla à Jérusalem comme un seul homme'
  - type: note
    content: Voir Lv 23.23-43.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Lorsque les maçons posèrent les fondations du temple de l’Eternel
  - type: note
    content: 'Autre traduction : commencèrent les travaux de réparation du Temple.'
  - type: text
    content: ', on mit en place les prêtres revêtus de leurs habits de cérémonie, avec les trompettes en mains, et les lévites descendants d’Asaph avec les cymbales, afin de louer l’Eternel, selon les prescriptions de David, roi d’Israël'
  - type: note
    content: Voir 1 Ch 25.1.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Ils entonnèrent des hymnes de louange et des cantiques de remerciement pour célébrer l’Eternel en chantant à tour de rôle
  - type: note
    content: C’est-à-dire de manière antiphonée où deux chœurs se répondaient.
  - type: text
    content: '  :'
  - type: text
    content: Oui, il est bon,
  - type: text
    content: et son amour pour Israël
  - type: text
    content: dure à toujours
  - type: note
    content: Voir 1 Ch 16.34 ; 2 Ch 5.13 ; Ps 106.1 ; 107.1 ; 118.1 ; 136 ; Jr 33.11.
  - type: text
    content: .
  - type: text
    content: Tout le peuple fit aussi retentir de grandes acclamations pour louer l’Eternel, parce qu’on posait les fondations de son temple
  - type: note
    content: 'Autre traduction : parce qu’on commençait les travaux de réparation de son temple.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: Beaucoup, parmi les prêtres, les lévites, et les chefs de groupes familiaux parmi les plus âgés, qui avaient encore vu l’ancien temple, pleuraient à haute voix pendant que l’on posait sous leurs yeux les fondations du nouveau temple
  - type: note
    content: 'Autre traduction : commençait sous leurs yeux les travaux de réparation du Temple pour le rénover.'
  - type: text
    content: ', alors que beaucoup d’autres gens exprimaient leur joie par des acclamations bruyantes, '
  '13':
  - type: text
    content: de sorte qu’on ne pouvait pas distinguer les ovations joyeuses des pleurs ; le peuple poussait de grands cris dont l’écho retentissait au loin.
  '2':
  - type: text
    content: Josué, fils de Yotsadaq, avec ses collègues les prêtres, et Zorobabel, fils de Shealtiel, avec les gens de sa parenté, se mirent à l’œuvre et reconstruisirent l’autel du Dieu d’Israël pour y offrir des holocaustes, selon ce qui est écrit dans la Loi de Moïse, l’homme de Dieu
  - type: note
    content: Voir Ex 27.1-2 ; 2 Ch 4.1.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Malgré leur peur des populations locales, ils rétablirent l’autel sur ses anciennes fondations et ils y offrirent des holocaustes à l’Eternel, ceux du matin et du soir
  - type: note
    content: Voir Ex 29.38-39 ; Nb 28.3-4.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Puis ils célébrèrent la fête des Cabanes suivant les prescriptions, et ils offrirent quotidiennement des holocaustes selon le nombre fixé pour chaque jour
  - type: note
    content: Voir Nb 29.12-38.
  - type: text
    content: '. '
  '5':
  - type: text
    content: Après cela, ils offrirent l’holocauste perpétuel et ceux des nouvelles lunes et de toutes les solennités consacrées à l’Eternel, et pour tous ceux qui faisaient des offrandes volontaires à l’Eternel
  - type: note
    content: Voir Nb 28.11 à 29.39.
  - type: text
    content: .
  '6':
  - type: text
    content: Dès le premier jour du septième mois
  - type: note
    content: C’est-à-dire vers la mi-septembre.
  - type: text
    content: ', ils commencèrent à offrir des holocaustes à l’Eternel, bien que les fondations du temple de l’Eternel n’aient pas encore été posées'
  - type: note
    content: 'Autre traduction : bien que le temple de l’Eternel n’ait pas encore été réparé.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: On remit de l’argent aux tailleurs de pierre et aux charpentiers, ainsi que des vivres, des boissons et de l’huile aux Sidoniens et aux Tyriens pour qu’ils acheminent par mer jusqu’à Jaffa du bois de cèdre depuis le Liban
  - type: note
    content: Voir 1 R 5.15-25.
  - type: text
    content: . Tout cela fut fait en vertu de l’autorisation accordée par Cyrus, roi de Perse.
  - type: heading
    content: Les fondations du nouveau temple
  '8':
  - type: text
    content: Dans la deuxième année après l’arrivée des exilés au temple de Dieu à Jérusalem, au deuxième mois
  - type: note
    content: Avril-mai 536 av. J.-C.
  - type: text
    content: ', Zorobabel, fils de Shealtiel, Josué, fils de Yotsadaq, et le reste de leurs compatriotes, les prêtres et les lévites et tous ceux qui étaient revenus de captivité à Jérusalem, commencèrent le travail. Les lévites âgés de vingt ans et plus furent chargés de superviser les travaux du temple de l’Eternel. '
  '9':
  - type: text
    content: 'Josué, avec ses fils et ses frères, Qadmiel avec ses fils qui étaient des descendants de Juda eurent pour fonction de superviser tous ensemble ceux qui travaillaient au chantier. Ils étaient assistés des descendants de Hénadad, avec leurs fils et leurs parents les lévites. '
