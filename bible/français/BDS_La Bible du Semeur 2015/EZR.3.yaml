document_id: EZR.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’autel est reconstruit et le culte rétabli
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Quand arriva le septième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire le mois de Tishri, en septembre-octobre 537 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', les Israélites étaient installés dans leurs villes. Alors le peuple se rassembla à Jérusalem comme un seul homme'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 23.23-43
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Lorsque les maçons posèrent les fondations du temple de l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: commencèrent les travaux de réparation du Temple.
      marker-yv: yv-n
    - type: text
      text: ', on mit en place les prêtres revêtus de leurs habits de cérémonie, avec les trompettes en mains, et les lévites descendants d’Asaph avec les cymbales, afin de louer l’Eternel, selon les prescriptions de David, roi d’Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 25.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ils entonnèrent des hymnes de louange et des cantiques de remerciement pour célébrer l’Eternel en chantant à tour de rôle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire de manière antiphonée où deux chœurs se répondaient.
      marker-yv: yv-n
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son amour pour Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dure à toujours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 1 Ch 16.34 ; 2 Ch 5.13 ; Ps 106.1 ; 107.1 ; 118.1 ; 136 ; Jr 33.11.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout le peuple fit aussi retentir de grandes acclamations pour louer l’Eternel, parce qu’on posait les fondations de son temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parce qu’on commençait les travaux de réparation de son temple.
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Beaucoup, parmi les prêtres, les lévites, et les chefs de groupes familiaux parmi les plus âgés, qui avaient encore vu l’ancien temple, pleuraient à haute voix pendant que l’on posait sous leurs yeux les fondations du nouveau temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: commençait sous leurs yeux les travaux de réparation du Temple pour le rénover.
      marker-yv: yv-n
    - type: text
      text: ', alors que beaucoup d’autres gens exprimaient leur joie par des acclamations bruyantes, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: de sorte qu’on ne pouvait pas distinguer les ovations joyeuses des pleurs ; le peuple poussait de grands cris dont l’écho retentissait au loin.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Josué, fils de Yotsadaq, avec ses collègues les prêtres, et Zorobabel, fils de Shealtiel, avec les gens de sa parenté, se mirent à l’œuvre et reconstruisirent l’autel du Dieu d’Israël pour y offrir des holocaustes, selon ce qui est écrit dans la Loi de Moïse, l’homme de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 27.1-2 ; 2 Ch 4.1.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Malgré leur peur des populations locales, ils rétablirent l’autel sur ses anciennes fondations et ils y offrirent des holocaustes à l’Eternel, ceux du matin et du soir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 29.38-39 ; Nb 28.3-4.
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Puis ils célébrèrent la fête des Cabanes suivant les prescriptions, et ils offrirent quotidiennement des holocaustes selon le nombre fixé pour chaque jour
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 29.12-38
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Après cela, ils offrirent l’holocauste perpétuel et ceux des nouvelles lunes et de toutes les solennités consacrées à l’Eternel, et pour tous ceux qui faisaient des offrandes volontaires à l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Nb 28.11 à 29.39.
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dès le premier jour du septième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire vers la mi-septembre.
      marker-yv: yv-n
    - type: text
      text: ', ils commencèrent à offrir des holocaustes à l’Eternel, bien que les fondations du temple de l’Eternel n’aient pas encore été posées'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bien que le temple de l’Eternel n’ait pas encore été réparé.
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: On remit de l’argent aux tailleurs de pierre et aux charpentiers, ainsi que des vivres, des boissons et de l’huile aux Sidoniens et aux Tyriens pour qu’ils acheminent par mer jusqu’à Jaffa du bois de cèdre depuis le Liban
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 5.15-25
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Tout cela fut fait en vertu de l’autorisation accordée par Cyrus, roi de Perse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fondations du nouveau temple
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dans la deuxième année après l’arrivée des exilés au temple de Dieu à Jérusalem, au deuxième mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Avril-mai 536 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', Zorobabel, fils de Shealtiel, Josué, fils de Yotsadaq, et le reste de leurs compatriotes, les prêtres et les lévites et tous ceux qui étaient revenus de captivité à Jérusalem, commencèrent le travail. Les lévites âgés de vingt ans et plus furent chargés de superviser les travaux du temple de l’Eternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Josué, avec ses fils et ses frères, Qadmiel avec ses fils qui étaient des descendants de Juda eurent pour fonction de superviser tous ensemble ceux qui travaillaient au chantier. Ils étaient assistés des descendants de Hénadad, avec leurs fils et leurs parents les lévites. '
