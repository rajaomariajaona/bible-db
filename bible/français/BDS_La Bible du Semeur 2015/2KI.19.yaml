document_id: 2KI.19,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezéchias consulte le prophète Esaïe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque le roi Ezéchias eut entendu leur rapport, il déchira ses vêtements, se couvrit d’un vêtement d’étoffe grossière et se rendit au temple de l’Eternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous direz à Ezéchias, roi de Juda : « Ne te laisse pas tromper par ton Dieu en qui tu te confies s’il te dit que Jérusalem ne tombera pas aux mains du roi d’Assyrie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu as toi-même appris comment les rois d’Assyrie ont traité tous les pays, comment ils les ont voués à la destruction complète. Crois-tu que toi seul tu y échapperais ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mes ancêtres ont détruit les villes de Gozân, Harân et Retseph, ils ont exterminé les descendants d’Eden qui vivaient à Telassar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Localités situées en Mésopotamie (voir Gn 11.31 ; 12.5 ; 2 R 17.6, 24 ; 18.11, 34).
      marker-yv: yv-n
    - type: text
      text: '. Les dieux de ces pays ont-ils délivré ces gens ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Que sont devenus les rois de Hamath, d’Arpad, de la ville de Sepharvaïm, de Héna et de Ivva ? »
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ezéchias prit la lettre de la main des messagers ; il la lut et se rendit au temple de l’Eternel. Il la déroula devant l’Eternel '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et il pria : Eternel, Dieu d’Israël, qui sièges au-dessus des chérubins'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 25.22 ; Nb 21.8-9 ; 1 S 4.4.
      marker-yv: yv-n
    - type: text
      text: ', c’est toi qui es le seul Dieu pour tous les royaumes de la terre, c’est toi qui as fait le ciel et la terre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Eternel, prête l’oreille et écoute ! Eternel, ouvre les yeux et regarde ! Entends les paroles que Sennachérib a envoyé dire pour insulter le Dieu vivant. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il est vrai, ô Eternel, que les rois d’Assyrie ont massacré les gens de ces autres peuples et ravagé leurs pays, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'et qu’ils ont jeté au feu leurs dieux, parce que ce n’étaient pas des dieux. Ils ont pu les détruire parce que ce n’étaient que des objets en bois ou en pierre fabriqués par des hommes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mais toi, Eternel, notre Dieu, délivre-nous maintenant de Sennachérib, pour que tous les royaumes de la terre sachent que toi seul, Eternel, tu es Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La réponse de l’Eternel
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En même temps, il envoya Eliaqim, qui avait la charge du palais, Shebna le secrétaire et les plus anciens des prêtres, tous vêtus de vêtements d’étoffe grossière, chez le prophète Esaïe, fils d’Amots, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Alors Esaïe, fils d’Amots, envoya à Ezéchias le message suivant : Voici ce que déclare l’Eternel, le Dieu d’Israël, que tu as prié au sujet de Sennachérib, roi d’Assyrie : Je t’ai entendu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Voici la parole que l’Eternel prononce contre lui :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dame Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n’a que mépris pour toi ╵et se moque de toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dame Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoche la tête à ton sujet.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Qui as-tu insulté ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui as-tu outragé ╵de ta voix arrogante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ton regard hautain ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, le Saint d’Israël !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Car par tes messagers ╵tu as insulté le Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu as dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Grâce à mes nombreux chars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi j’ai gravi ╵les sommets des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai pénétré ╵jusqu’au cœur du Liban ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour y couper ╵les cèdres les plus hauts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les plus beaux cyprès
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et parvenir ╵jusqu’au dernier sommet
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans sa forêt la plus touffue.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J’ai fait creuser des puits ╵et j’ai bu l’eau de pays étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai asséché ╵sur mon passage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le delta du Nil. »
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mais ne sais-tu donc pas ╵que, moi, j’ai décidé ╵depuis longtemps ╵tous ces événements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que, depuis les temps anciens, ╵j’en ai formé le plan ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à présent je les fais survenir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en sorte que tu réduises en tas de ruines ╵des villes fortifiées.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Leurs habitants sont impuissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: terrifiés, ils ont honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont comme l’herbe des champs, ╵comme la verdure des prés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’herbe sur les toits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: flétrie avant d’avoir poussé.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Mais moi je sais quand tu t’assieds, ╵quand tu sors, quand tu rentres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu t’emportes contre moi.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Oui, tu t’emportes contre moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes discours arrogants ╵sont parvenus à mes oreilles ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est pourquoi je te passerai ╵mon anneau dans le nez
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De la façon dont les Assyriens traitaient leurs prisonniers de guerre.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te riverai ╵mon mors entre les lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis je te ferai retourner ╵par où tu es venu.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Quant à toi, Ezéchias, ╵ceci te servira de signe :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cette année-ci, on mangera ╵ce qu’a produit le grain tombé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’année prochaine, ╵ce qui aura poussé tout seul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la troisième année, ╵vous sèmerez, vous ferez des récoltes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous planterez des vignes, ╵et vous en mangerez les fruits.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'avec ce message : Voici ce que te fait dire Ezéchias : « Ce jour est un jour de détresse, de châtiment et de honte. Nous sommes comme des femmes sur le point d’accoucher qui n’auraient pas la force de mettre leur enfant au monde. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Alors les survivants, ╵ceux qui seront restés ╵du peuple de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront de nouveau comme un arbre ╵qui plonge dans le sol ╵de nouvelles racines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui porte des fruits.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Oui, à Jérusalem, ╵un reste surgira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le mont de Sion, ╵se lèveront des rescapés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ab 17 ; Jl 3.5.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, voilà ce que fera ╵le Seigneur des armées célestes ╵dans son ardent amour pour vous.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'C’est pourquoi, voici ce que l’Eternel déclare au sujet du roi d’Assyrie :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’entrera pas dans la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun de ses archers ╵n’y lancera de flèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne s’en approchera pas ╵à l’abri de ses boucliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne dressera ╵aucun terrassement contre elle.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il s’en retournera ╵par où il est venu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans entrer dans la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel le déclare.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Je protégerai cette ville, ╵je la délivrerai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par égard pour moi-même ╵et pour mon serviteur David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La délivrance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 32.21 ; Es 37.36-38)
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Cette nuit-là, l’ange de l’Eternel intervint dans le camp assyrien et y fit périr cent quatre-vingt-cinq mille hommes. Le matin, au réveil, le camp était rempli de tous ces cadavres. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Alors Sennachérib, roi d’Assyrie, leva le camp et repartit pour Ninive, où il resta.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Un jour, pendant qu’il se prosternait dans le temple de son dieu Nisrok, ses fils Adrammélek et Sarétser l’assassinèrent de leur épée, puis s’enfuirent dans le pays d’Ararat. Un autre de ses fils, Esar-Haddôn, lui succéda sur le trône
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 681 à 669 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Peut-être l’Eternel, ton Dieu, prêtera-t-il attention à toutes ces paroles que l’aide de camp du roi d’Assyrie a prononcées de la part de son maître pour insulter le Dieu vivant. Peut-être l’Eternel ton Dieu le punira-t-il à cause des paroles qu’il a entendues. Intercède donc en faveur du reste de ce peuple qui subsiste encore. »
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les ministres du roi Ezéchias se rendirent donc auprès d’Esaïe, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'qui leur dit : Voici ce que vous direz à votre souverain : « Ainsi parle l’Eternel : Ne te laisse pas effrayer par les paroles que tu as entendues et par lesquelles les officiers du roi d’Assyrie m’ont outragé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ce roi va recevoir une certaine nouvelle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Selon certains, la nouvelle de l’avance de l’armée égyptienne (v. 9), selon d’autres, celle du soulèvement de la Babylonie. Cette nouvelle l’amènera à quitter prématurément le pays d’Israël (v. 36).
      marker-yv: yv-n
    - type: text
      text: '  ; là-dessus, je lui ferai prendre la décision de retourner dans son pays, où je le ferai mourir assassiné. »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezéchias reçoit une lettre de Sennachérib
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’aide de camp apprit que le roi d’Assyrie était parti de Lakish et qu’il était en train d’attaquer Libna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 18.17 ; 8.22.
      marker-yv: yv-n
    - type: text
      text: '. Il s’en retourna donc pour le rejoindre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Peu après, le roi d’Assyrie reçut la nouvelle que Tirhaqa, le roi d’Ethiopie, s’était mis en campagne pour l’attaquer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En 701 av. J.-C., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tirhaqa, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: frère du pharaon Shebitko, n’était que prince en Egypte. Il a régné de 690 à 660 av. J.-C. mais a dû participer à l’expédition envoyée au secours d’Ezéchias.
      marker-yv: yv-n
    - type: text
      text: '. Alors il envoya de nouveau des messagers à Ezéchias, avec ces instructions : '
