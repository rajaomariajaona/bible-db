document_id: 2KI.19,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias consulte le prophète Esaïe
  - type: text
    content: 'Lorsque le roi Ezéchias eut entendu leur rapport, il déchira ses vêtements, se couvrit d’un vêtement d’étoffe grossière et se rendit au temple de l’Eternel. '
  '10':
  - type: text
    content: 'Vous direz à Ezéchias, roi de Juda : « Ne te laisse pas tromper par ton Dieu en qui tu te confies s’il te dit que Jérusalem ne tombera pas aux mains du roi d’Assyrie. '
  '11':
  - type: text
    content: 'Tu as toi-même appris comment les rois d’Assyrie ont traité tous les pays, comment ils les ont voués à la destruction complète. Crois-tu que toi seul tu y échapperais ? '
  '12':
  - type: text
    content: Mes ancêtres ont détruit les villes de Gozân, Harân et Retseph, ils ont exterminé les descendants d’Eden qui vivaient à Telassar
  - type: note
    content: Localités situées en Mésopotamie (voir Gn 11.31 ; 12.5 ; 2 R 17.6, 24 ; 18.11, 34).
  - type: text
    content: '. Les dieux de ces pays ont-ils délivré ces gens ? '
  '13':
  - type: text
    content: Que sont devenus les rois de Hamath, d’Arpad, de la ville de Sepharvaïm, de Héna et de Ivva ? »
  '14':
  - type: text
    content: 'Ezéchias prit la lettre de la main des messagers ; il la lut et se rendit au temple de l’Eternel. Il la déroula devant l’Eternel '
  '15':
  - type: text
    content: 'et il pria : Eternel, Dieu d’Israël, qui sièges au-dessus des chérubins'
  - type: note
    content: Voir Ex 25.22 ; Nb 21.8-9 ; 1 S 4.4.
  - type: text
    content: ', c’est toi qui es le seul Dieu pour tous les royaumes de la terre, c’est toi qui as fait le ciel et la terre. '
  '16':
  - type: text
    content: 'Eternel, prête l’oreille et écoute ! Eternel, ouvre les yeux et regarde ! Entends les paroles que Sennachérib a envoyé dire pour insulter le Dieu vivant. '
  '17':
  - type: text
    content: 'Il est vrai, ô Eternel, que les rois d’Assyrie ont massacré les gens de ces autres peuples et ravagé leurs pays, '
  '18':
  - type: text
    content: 'et qu’ils ont jeté au feu leurs dieux, parce que ce n’étaient pas des dieux. Ils ont pu les détruire parce que ce n’étaient que des objets en bois ou en pierre fabriqués par des hommes. '
  '19':
  - type: text
    content: Mais toi, Eternel, notre Dieu, délivre-nous maintenant de Sennachérib, pour que tous les royaumes de la terre sachent que toi seul, Eternel, tu es Dieu.
  - type: heading
    content: La réponse de l’Eternel
  '2':
  - type: text
    content: 'En même temps, il envoya Eliaqim, qui avait la charge du palais, Shebna le secrétaire et les plus anciens des prêtres, tous vêtus de vêtements d’étoffe grossière, chez le prophète Esaïe, fils d’Amots, '
  '20':
  - type: text
    content: 'Alors Esaïe, fils d’Amots, envoya à Ezéchias le message suivant : Voici ce que déclare l’Eternel, le Dieu d’Israël, que tu as prié au sujet de Sennachérib, roi d’Assyrie : Je t’ai entendu. '
  '21':
  - type: text
    content: 'Voici la parole que l’Eternel prononce contre lui :'
  - type: text
    content: Dame Sion
  - type: text
    content: n’a que mépris pour toi ╵et se moque de toi.
  - type: text
    content: Dame Jérusalem
  - type: text
    content: hoche la tête à ton sujet.
  '22':
  - type: text
    content: Qui as-tu insulté ?
  - type: text
    content: Qui as-tu outragé ╵de ta voix arrogante,
  - type: text
    content: de ton regard hautain ?
  - type: text
    content: Moi, le Saint d’Israël !
  '23':
  - type: text
    content: Car par tes messagers ╵tu as insulté le Seigneur,
  - type: text
    content: 'et tu as dit :'
  - type: text
    content: « Grâce à mes nombreux chars,
  - type: text
    content: moi j’ai gravi ╵les sommets des montagnes,
  - type: text
    content: j’ai pénétré ╵jusqu’au cœur du Liban ;
  - type: text
    content: pour y couper ╵les cèdres les plus hauts
  - type: text
    content: et les plus beaux cyprès
  - type: text
    content: et parvenir ╵jusqu’au dernier sommet
  - type: text
    content: dans sa forêt la plus touffue.
  '24':
  - type: text
    content: J’ai fait creuser des puits ╵et j’ai bu l’eau de pays étrangers,
  - type: text
    content: j’ai asséché ╵sur mon passage
  - type: text
    content: tout le delta du Nil. »
  '25':
  - type: text
    content: Mais ne sais-tu donc pas ╵que, moi, j’ai décidé ╵depuis longtemps ╵tous ces événements,
  - type: text
    content: et que, depuis les temps anciens, ╵j’en ai formé le plan ?
  - type: text
    content: Et à présent je les fais survenir,
  - type: text
    content: en sorte que tu réduises en tas de ruines ╵des villes fortifiées.
  '26':
  - type: text
    content: Leurs habitants sont impuissants,
  - type: text
    content: terrifiés, ils ont honte,
  - type: text
    content: ils sont comme l’herbe des champs, ╵comme la verdure des prés
  - type: text
    content: et l’herbe sur les toits,
  - type: text
    content: flétrie avant d’avoir poussé.
  '27':
  - type: text
    content: Mais moi je sais quand tu t’assieds, ╵quand tu sors, quand tu rentres,
  - type: text
    content: quand tu t’emportes contre moi.
  '28':
  - type: text
    content: Oui, tu t’emportes contre moi !
  - type: text
    content: Tes discours arrogants ╵sont parvenus à mes oreilles ;
  - type: text
    content: c’est pourquoi je te passerai ╵mon anneau dans le nez
  - type: note
    content: De la façon dont les Assyriens traitaient leurs prisonniers de guerre.
  - type: text
    content: et je te riverai ╵mon mors entre les lèvres,
  - type: text
    content: puis je te ferai retourner ╵par où tu es venu.
  '29':
  - type: text
    content: 'Quant à toi, Ezéchias, ╵ceci te servira de signe :'
  - type: text
    content: Cette année-ci, on mangera ╵ce qu’a produit le grain tombé,
  - type: text
    content: l’année prochaine, ╵ce qui aura poussé tout seul,
  - type: text
    content: mais la troisième année, ╵vous sèmerez, vous ferez des récoltes,
  - type: text
    content: vous planterez des vignes, ╵et vous en mangerez les fruits.
  '3':
  - type: text
    content: 'avec ce message : Voici ce que te fait dire Ezéchias : « Ce jour est un jour de détresse, de châtiment et de honte. Nous sommes comme des femmes sur le point d’accoucher qui n’auraient pas la force de mettre leur enfant au monde. '
  '30':
  - type: text
    content: Alors les survivants, ╵ceux qui seront restés ╵du peuple de Juda,
  - type: text
    content: seront de nouveau comme un arbre ╵qui plonge dans le sol ╵de nouvelles racines
  - type: text
    content: et qui porte des fruits.
  '31':
  - type: text
    content: Oui, à Jérusalem, ╵un reste surgira,
  - type: text
    content: sur le mont de Sion, ╵se lèveront des rescapés
  - type: note
    content: Voir Ab 17 ; Jl 3.5.
  - type: text
    content: .
  - type: text
    content: Oui, voilà ce que fera ╵le Seigneur des armées célestes ╵dans son ardent amour pour vous.
  '32':
  - type: text
    content: 'C’est pourquoi, voici ce que l’Eternel déclare au sujet du roi d’Assyrie :'
  - type: text
    content: Il n’entrera pas dans la ville,
  - type: text
    content: aucun de ses archers ╵n’y lancera de flèches,
  - type: text
    content: il ne s’en approchera pas ╵à l’abri de ses boucliers,
  - type: text
    content: et il ne dressera ╵aucun terrassement contre elle.
  '33':
  - type: text
    content: Il s’en retournera ╵par où il est venu,
  - type: text
    content: sans entrer dans la ville,
  - type: text
    content: l’Eternel le déclare.
  '34':
  - type: text
    content: Je protégerai cette ville, ╵je la délivrerai
  - type: text
    content: par égard pour moi-même ╵et pour mon serviteur David.
  - type: heading
    content: La délivrance
  - type: heading
    content: (2 Ch 32.21 ; Es 37.36-38)
  '35':
  - type: text
    content: 'Cette nuit-là, l’ange de l’Eternel intervint dans le camp assyrien et y fit périr cent quatre-vingt-cinq mille hommes. Le matin, au réveil, le camp était rempli de tous ces cadavres. '
  '36':
  - type: text
    content: Alors Sennachérib, roi d’Assyrie, leva le camp et repartit pour Ninive, où il resta.
  '37':
  - type: text
    content: Un jour, pendant qu’il se prosternait dans le temple de son dieu Nisrok, ses fils Adrammélek et Sarétser l’assassinèrent de leur épée, puis s’enfuirent dans le pays d’Ararat. Un autre de ses fils, Esar-Haddôn, lui succéda sur le trône
  - type: note
    content: De 681 à 669 av. J.-C.
  - type: text
    content: .
  '4':
  - type: text
    content: Peut-être l’Eternel, ton Dieu, prêtera-t-il attention à toutes ces paroles que l’aide de camp du roi d’Assyrie a prononcées de la part de son maître pour insulter le Dieu vivant. Peut-être l’Eternel ton Dieu le punira-t-il à cause des paroles qu’il a entendues. Intercède donc en faveur du reste de ce peuple qui subsiste encore. »
  '5':
  - type: text
    content: 'Les ministres du roi Ezéchias se rendirent donc auprès d’Esaïe, '
  '6':
  - type: text
    content: 'qui leur dit : Voici ce que vous direz à votre souverain : « Ainsi parle l’Eternel : Ne te laisse pas effrayer par les paroles que tu as entendues et par lesquelles les officiers du roi d’Assyrie m’ont outragé. '
  '7':
  - type: text
    content: Ce roi va recevoir une certaine nouvelle
  - type: note
    content: Selon certains, la nouvelle de l’avance de l’armée égyptienne (v. 9), selon d’autres, celle du soulèvement de la Babylonie. Cette nouvelle l’amènera à quitter prématurément le pays d’Israël (v. 36).
  - type: text
    content: '  ; là-dessus, je lui ferai prendre la décision de retourner dans son pays, où je le ferai mourir assassiné. »'
  - type: heading
    content: Ezéchias reçoit une lettre de Sennachérib
  '8':
  - type: text
    content: L’aide de camp apprit que le roi d’Assyrie était parti de Lakish et qu’il était en train d’attaquer Libna
  - type: note
    content: Voir 18.17 ; 8.22.
  - type: text
    content: '. Il s’en retourna donc pour le rejoindre. '
  '9':
  - type: text
    content: Peu après, le roi d’Assyrie reçut la nouvelle que Tirhaqa, le roi d’Ethiopie, s’était mis en campagne pour l’attaquer
  - type: note
    content: En 701 av. J.-C., Tirhaqa, frère du pharaon Shebitko, n’était que prince en Egypte. Il a régné de 690 à 660 av. J.-C. mais a dû participer à l’expédition envoyée au secours d’Ezéchias.
  - type: text
    content: '. Alors il envoya de nouveau des messagers à Ezéchias, avec ces instructions : '
