document_id: NEH.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tentatives d’intimidation
  - type: text
    content: 'Lorsque Sanballat, Tobiya, Guéshem l’Arabe et le reste de nos ennemis apprirent que j’avais fini de rebâtir la muraille et qu’il n’y restait plus de brèche – sauf les portes dont je n’avais pas encore posé les battants à cette époque – '
  '10':
  - type: text
    content: 'Je me rendis chez Shemaya, fils de Delaya et petit-fils de Mehétabéel, qui s’était barricadé chez lui. Il s’écria : Allons tenir conseil dans le temple de Dieu, au fond du sanctuaire, et verrouillons-en les portes, car ils veulent te tuer : ils vont venir pendant la nuit pour t’assassiner.'
  '11':
  - type: text
    content: 'Mais je lui répondis : Comment un homme dans ma position prendrait-il la fuite ? D’ailleurs, quel homme comme moi pourrait pénétrer dans le Temple sans perdre la vie'
  - type: note
    content: Nb 18.7 interdit à ceux qui n’étaient pas prêtres de pénétrer à l’intérieur du tabernacle et du Temple (voir 2 Ch 26.16-21).
  - type: text
    content: '  ? Non, je n’irai pas !'
  '12':
  - type: text
    content: 'J’avais bien compris que ce n’était pas Dieu qui l’envoyait. Mais il avait prononcé cette prophétie pour moi parce que Sanballat et Tobiya l’avaient soudoyé. '
  '13':
  - type: text
    content: Ils avaient agi ainsi pour me faire peur, et pour qu’en suivant son conseil, je commette un péché. Alors ils auraient pu me faire une mauvaise réputation et me discréditer.
  '14':
  - type: text
    content: Mon Dieu, ne laisse pas Sanballat et Tobiya impunis pour leurs actes, ni Noadia la prophétesse, ni les autres prophètes qui ont cherché à me faire peur.
  - type: heading
    content: La confusion des ennemis
  '15':
  - type: text
    content: La muraille fut achevée en cinquante-deux jours, le vingt-cinq du mois d’Eloul
  - type: note
    content: Le 3 octobre 445 av. J.-C. (ou fin septembre selon certains). L’assemblée solennelle du peuple fut tenue cinq jours plus tard (8.1-2). La dédicace de la muraille est décrite en 12.27-47.
  - type: text
    content: '. '
  '16':
  - type: text
    content: Lorsque tous nos ennemis l’apprirent, tous les peuples étrangers qui nous entouraient furent saisis de crainte et profondément humiliés à leurs propres yeux, car ils reconnurent qu’un tel ouvrage n’avait pu être mené à bonne fin qu’avec l’aide de notre Dieu.
  '17':
  - type: text
    content: 'Durant toute cette période, des notables de Juda entretenaient une abondante correspondance avec Tobiya. '
  '18':
  - type: text
    content: 'En effet, beaucoup de Judéens étaient liés à lui par serment parce qu’il était le gendre de Shekania, fils d’Arah, et que son propre fils Yohanân avait épousé la fille de Meshoullam, fils de Bérékia. '
  '19':
  - type: text
    content: Ils avaient même l’audace de vanter ses mérites en ma présence, et ils lui rapportaient mes paroles. C’était ce Tobiya qui envoyait des lettres pour m’intimider.
  '2':
  - type: text
    content: 'Sanballat et Guéshem m’envoyèrent un message pour me dire : Viens et ayons ensemble une entrevue à Kefirim, dans la vallée d’Ono'
  - type: note
    content: 'Kefirim: localité inconnue, dans la plaine de Saron, au nord de Lydda, dans la partie la plus à l’ouest de la région occupée par les rapatriés (Né 7.37 ; 11.35).'
  - type: text
    content: .
  - type: text
    content: Ils avaient l’intention de me faire du mal.
  '3':
  - type: text
    content: 'Je leur envoyai des messagers pour leur répondre : J’ai un grand travail à exécuter et il m’est impossible de me rendre auprès de vous. Je n’ai pas de raison d’interrompre l’ouvrage en l’abandonnant pour aller vous rencontrer.'
  '4':
  - type: text
    content: 'A quatre reprises, ils me firent transmettre la même proposition, et je leur retournai la même réponse. '
  '5':
  - type: text
    content: 'Une cinquième fois, Sanballat m’envoya ce même message par son serviteur qui tenait à la main une lettre ouverte. '
  '6':
  - type: text
    content: 'Il y était écrit :'
  - type: text
    content: '« Le bruit se répand parmi les peuples des régions environnantes que toi et les Juifs, vous projetez une révolte. Guéshem me l’a d’ailleurs confirmé. Ce serait pour cela que tu reconstruis la muraille. On dit même que tu veux devenir leur roi '
  '7':
  - type: text
    content: et que tu as déjà désigné des prophètes chargés de proclamer à Jérusalem que tu es devenu roi de Juda. Maintenant, des rumeurs de ce genre arriveront certainement aux oreilles de l’empereur. Viens donc en discuter avec nous ! »
  '8':
  - type: text
    content: 'Je lui fis répondre : Rien de ce que tu affirmes n’est exact. Tout ceci est une pure invention de ta part !'
  '9':
  - type: text
    content: Tous ces gens, en effet, ne cherchaient qu’à nous faire peur ; ils espéraient que nous nous découragerions et que nous abandonnerions l’ouvrage !
  - type: text
    content: Maintenant, ô Dieu, fortifie-moi pour ma tâche
  - type: note
    content: 'Les mots : ô Dieu ne sont pas dans l’hébreu. Mais il semble bien s’agir d’une courte prière. Les anciennes versions ont : Maintenant, je fortifierai mes mains.'
  - type: text
    content: '  !'
  - type: heading
    content: L’intervention d’un faux prophète
