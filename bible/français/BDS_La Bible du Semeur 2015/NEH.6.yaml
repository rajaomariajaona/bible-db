document_id: NEH.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tentatives d’intimidation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Sanballat, Tobiya, Guéshem l’Arabe et le reste de nos ennemis apprirent que j’avais fini de rebâtir la muraille et qu’il n’y restait plus de brèche – sauf les portes dont je n’avais pas encore posé les battants à cette époque – '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sanballat et Guéshem m’envoyèrent un message pour me dire : Viens et ayons ensemble une entrevue à Kefirim, dans la vallée d’Ono'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Kefirim
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: localité inconnue, dans la plaine de Saron, au nord de Lydda, dans la partie la plus à l’ouest de la région occupée par les rapatriés (Né 7.37 ; 11.35).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: Ils avaient l’intention de me faire du mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je leur envoyai des messagers pour leur répondre : J’ai un grand travail à exécuter et il m’est impossible de me rendre auprès de vous. Je n’ai pas de raison d’interrompre l’ouvrage en l’abandonnant pour aller vous rencontrer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A quatre reprises, ils me firent transmettre la même proposition, et je leur retournai la même réponse. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Une cinquième fois, Sanballat m’envoya ce même message par son serviteur qui tenait à la main une lettre ouverte. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il y était écrit :'
- type: usfm
  marker: pm
  children:
  - type: text
    text: '« Le bruit se répand parmi les peuples des régions environnantes que toi et les Juifs, vous projetez une révolte. Guéshem me l’a d’ailleurs confirmé. Ce serait pour cela que tu reconstruis la muraille. On dit même que tu veux devenir leur roi '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: et que tu as déjà désigné des prophètes chargés de proclamer à Jérusalem que tu es devenu roi de Juda. Maintenant, des rumeurs de ce genre arriveront certainement aux oreilles de l’empereur. Viens donc en discuter avec nous ! »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je lui fis répondre : Rien de ce que tu affirmes n’est exact. Tout ceci est une pure invention de ta part !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tous ces gens, en effet, ne cherchaient qu’à nous faire peur ; ils espéraient que nous nous découragerions et que nous abandonnerions l’ouvrage !
- type: usfm
  marker: p
  children:
  - type: text
    text: Maintenant, ô Dieu, fortifie-moi pour ma tâche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ô Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ne sont pas dans l’hébreu. Mais il semble bien s’agir d’une courte prière. Les anciennes versions ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Maintenant, je fortifierai mes mains.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’intervention d’un faux prophète
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je me rendis chez Shemaya, fils de Delaya et petit-fils de Mehétabéel, qui s’était barricadé chez lui. Il s’écria : Allons tenir conseil dans le temple de Dieu, au fond du sanctuaire, et verrouillons-en les portes, car ils veulent te tuer : ils vont venir pendant la nuit pour t’assassiner.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais je lui répondis : Comment un homme dans ma position prendrait-il la fuite ? D’ailleurs, quel homme comme moi pourrait pénétrer dans le Temple sans perdre la vie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 18.7
        metadata:
          usfm: NUM.18.7
      - type: text
        text: ' interdit à ceux qui n’étaient pas prêtres de pénétrer à l’intérieur du tabernacle et du Temple (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 26.16-21
        metadata:
          usfm: 2CH.26.16+2CH.26.17+2CH.26.18+2CH.26.19+2CH.26.20+2CH.26.21
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ? Non, je n’irai pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J’avais bien compris que ce n’était pas Dieu qui l’envoyait. Mais il avait prononcé cette prophétie pour moi parce que Sanballat et Tobiya l’avaient soudoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils avaient agi ainsi pour me faire peur, et pour qu’en suivant son conseil, je commette un péché. Alors ils auraient pu me faire une mauvaise réputation et me discréditer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mon Dieu, ne laisse pas Sanballat et Tobiya impunis pour leurs actes, ni Noadia la prophétesse, ni les autres prophètes qui ont cherché à me faire peur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La confusion des ennemis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La muraille fut achevée en cinquante-deux jours, le vingt-cinq du mois d’Eloul
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le 3 octobre 445 av. J.-C. (ou fin septembre selon certains). L’assemblée solennelle du peuple fut tenue cinq jours plus tard (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8.1-2
        metadata:
          usfm: NEH.8.1+NEH.8.2
      - type: text
        text: '). La dédicace de la muraille est décrite en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12.27-47
        metadata:
          usfm: NEH.12.27+NEH.12.28+NEH.12.29+NEH.12.30+NEH.12.31+NEH.12.32+NEH.12.33+NEH.12.34+NEH.12.35+NEH.12.36+NEH.12.37+NEH.12.38+NEH.12.39+NEH.12.40+NEH.12.41+NEH.12.42+NEH.12.43+NEH.12.44+NEH.12.45+NEH.12.46+NEH.12.47
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lorsque tous nos ennemis l’apprirent, tous les peuples étrangers qui nous entouraient furent saisis de crainte et profondément humiliés à leurs propres yeux, car ils reconnurent qu’un tel ouvrage n’avait pu être mené à bonne fin qu’avec l’aide de notre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Durant toute cette période, des notables de Juda entretenaient une abondante correspondance avec Tobiya. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, beaucoup de Judéens étaient liés à lui par serment parce qu’il était le gendre de Shekania, fils d’Arah, et que son propre fils Yohanân avait épousé la fille de Meshoullam, fils de Bérékia. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils avaient même l’audace de vanter ses mérites en ma présence, et ils lui rapportaient mes paroles. C’était ce Tobiya qui envoyait des lettres pour m’intimider.
