document_id: PSA.102,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d’un malheureux
  - type: text
    content: Prière d’une personne dans l’affliction qui se sent défaillir et qui expose sa plainte devant l’Eternel
  - type: note
    content: Le titre de ce psaume est unique en ce qu’il indique la circonstance de la composition mais non l’auteur du psaume.
  - type: text
    content: .
  '10':
  - type: text
    content: Je me nourris de cendre ╵au lieu de pain,
  - type: text
    content: et ma boisson ╵est mêlée de mes larmes
  - type: note
    content: Voir 42.4 ; 80.6.
  - type: text
    content: .
  '11':
  - type: text
    content: Dans ton indignation ╵et ta colère,
  - type: text
    content: tu m’as saisi, ╵et m’as jeté au loin
  - type: note
    content: Comme un tourbillon saisit des feuilles et les jette au loin.
  - type: text
    content: .
  '12':
  - type: text
    content: Tout comme l’ombre
  - type: note
    content: 'Une ombre qui s’allonge le soir : allusion au soir de la vie.'
  - type: text
    content: ' qui s’étire, ╵mes jours déclinent,'
  - type: text
    content: et moi, je me dessèche comme l’herbe.
  '13':
  - type: text
    content: Mais toi, tu sièges pour toujours, ╵ô Eternel,
  - type: text
    content: et tu interviendras
  - type: note
    content: 'Ou : ton culte persistera. Litt. souvenir…'
  - type: text
    content: ' ╵tout au long des générations.'
  '14':
  - type: text
    content: Oui, tu te lèveras, ╵et de Sion ╵tu auras compassion !
  - type: text
    content: L’heure est là de lui faire grâce,
  - type: text
    content: 'le moment est venu :'
  '15':
  - type: text
    content: tes serviteurs ╵ont ses pierres en affection,
  - type: text
    content: ils restent attachés ╵à cette ville réduite en poussière
  - type: note
    content: Il s’agit des ruines de Jérusalem.
  - type: text
    content: .
  '16':
  - type: text
    content: Alors les autres peuples craindront l’Eternel,
  - type: text
    content: tous les rois de la terre ╵reconnaîtront sa gloire.
  '17':
  - type: text
    content: L’Eternel rebâtit Sion
  - type: text
    content: pour y paraître dans sa gloire.
  '18':
  - type: text
    content: Il a égard à la prière ╵de ceux qui sont dépossédés,
  - type: text
    content: il ne méprisera pas leur requête.
  '19':
  - type: text
    content: Que cela soit mis par écrit ╵pour la génération future,
  - type: text
    content: et le peuple qui sera créé louera Eternel.
  '2':
  - type: text
    content: O Eternel, ╵écoute ma prière
  - type: text
    content: et que mon appel au secours ╵parvienne jusqu’à toi !
  '20':
  - type: text
    content: Du haut de sa demeure sainte, ╵l’Eternel s’est penché vers nous.
  - type: text
    content: Du ciel, il regarde la terre,
  '21':
  - type: text
    content: et il entend les plaintes des captifs ;
  - type: text
    content: et il rendra la liberté ╵aux condamnés à mort,
  '22':
  - type: text
    content: pour que l’on publie en Sion ╵la renommée de l’Eternel,
  - type: text
    content: sa louange à Jérusalem,
  '23':
  - type: text
    content: quand se rassembleront les peuples
  - type: text
    content: et les royaumes tous ensemble, ╵afin d’adorer l’Eternel.
  '24':
  - type: text
    content: Il a réduit ma force ╵au milieu de ma course,
  - type: text
    content: et abrégé mes jours ;
  '25':
  - type: text
    content: 'c’est pourquoi je m’écrie : ╵« Mon Dieu, ne me fais pas mourir ╵au milieu de mes jours,'
  - type: text
    content: toi qui subsistes d’âge en âge !
  '26':
  - type: text
    content: Tu as jadis fondé la terre,
  - type: text
    content: le ciel est l’œuvre de tes mains.
  '27':
  - type: text
    content: Ils périront, mais tu subsisteras ;
  - type: text
    content: tous s’useront comme un habit ;
  - type: text
    content: comme on remplace un vêtement, ╵tu les remplaceras ╵et ils disparaîtront.
  '28':
  - type: text
    content: Mais toi, tu es toujours le même,
  - type: text
    content: tes années ne finiront pas
  - type: note
    content: Les v. 26-28 sont cités en Hé 1.10-12.
  - type: text
    content: .
  '29':
  - type: text
    content: Les enfants de tes serviteurs ╵auront une demeure ;
  - type: text
    content: sous ton regard, leur descendance ╵sera fermement établie. »
  '3':
  - type: text
    content: Ne te détourne pas de moi ╵en ce jour où je suis dans la détresse,
  - type: text
    content: tends vers moi ton oreille ╵au jour où je t’appelle.
  - type: text
    content: Hâte-toi de répondre !
  '4':
  - type: text
    content: Comme une fumée, mes jours passent.
  - type: text
    content: J’ai comme un brasier dans les os.
  '5':
  - type: text
    content: Mon cœur est brisé, desséché, ╵comme l’herbe fauchée.
  - type: text
    content: J’en oublie de manger ma nourriture.
  '6':
  - type: text
    content: A force de gémir,
  - type: text
    content: je n’ai que la peau sur les os.
  '7':
  - type: text
    content: Je suis devenu comparable ╵à la corneille du désert,
  - type: text
    content: je suis pareil au chat-huant ╵qui hante les lieux désolés.
  '8':
  - type: text
    content: Je reste privé de sommeil,
  - type: text
    content: je ressemble à un oisillon ╵resté seul sur un toit.
  '9':
  - type: text
    content: Mes ennemis ne cessent ╵de m’insulter,
  - type: text
    content: ils se moquent de moi ╵et maudissent les gens ╵en leur souhaitant mon sort.
