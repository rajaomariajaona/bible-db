document_id: PSA.102,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière d’un malheureux
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Prière d’une personne dans l’affliction qui se sent défaillir et qui expose sa plainte devant l’Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le titre de ce psaume est unique en ce qu’il indique la circonstance de la composition mais non l’auteur du psaume.
      marker-yv: yv-n
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me nourris de cendre ╵au lieu de pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma boisson ╵est mêlée de mes larmes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 42.4 ; 80.6.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ton indignation ╵et ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m’as saisi, ╵et m’as jeté au loin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Comme un tourbillon saisit des feuilles et les jette au loin.
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout comme l’ombre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Une ombre qui s’allonge le soir : allusion au soir de la vie.'
      marker-yv: yv-n
    - type: text
      text: ' qui s’étire, ╵mes jours déclinent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi, je me dessèche comme l’herbe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu sièges pour toujours, ╵ô Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu interviendras
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ton culte persistera. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Litt. souvenir…
      marker-yv: yv-n
    - type: text
      text: ' ╵tout au long des générations.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu te lèveras, ╵et de Sion ╵tu auras compassion !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’heure est là de lui faire grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le moment est venu :'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes serviteurs ╵ont ses pierres en affection,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils restent attachés ╵à cette ville réduite en poussière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit des ruines de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors les autres peuples craindront l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les rois de la terre ╵reconnaîtront sa gloire.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel rebâtit Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour y paraître dans sa gloire.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a égard à la prière ╵de ceux qui sont dépossédés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne méprisera pas leur requête.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que cela soit mis par écrit ╵pour la génération future,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le peuple qui sera créé louera Eternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Eternel, ╵écoute ma prière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que mon appel au secours ╵parvienne jusqu’à toi !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du haut de sa demeure sainte, ╵l’Eternel s’est penché vers nous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du ciel, il regarde la terre,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il entend les plaintes des captifs ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il rendra la liberté ╵aux condamnés à mort,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que l’on publie en Sion ╵la renommée de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa louange à Jérusalem,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand se rassembleront les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les royaumes tous ensemble, ╵afin d’adorer l’Eternel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a réduit ma force ╵au milieu de ma course,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et abrégé mes jours ;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'c’est pourquoi je m’écrie : ╵« Mon Dieu, ne me fais pas mourir ╵au milieu de mes jours,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui subsistes d’âge en âge !
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as jadis fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le ciel est l’œuvre de tes mains.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils périront, mais tu subsisteras ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous s’useront comme un habit ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme on remplace un vêtement, ╵tu les remplaceras ╵et ils disparaîtront.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu es toujours le même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes années ne finiront pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 26-28 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Hé 1.10-12
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les enfants de tes serviteurs ╵auront une demeure ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous ton regard, leur descendance ╵sera fermement établie. »
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te détourne pas de moi ╵en ce jour où je suis dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tends vers moi ton oreille ╵au jour où je t’appelle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hâte-toi de répondre !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une fumée, mes jours passent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai comme un brasier dans les os.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur est brisé, desséché, ╵comme l’herbe fauchée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’en oublie de manger ma nourriture.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A force de gémir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n’ai que la peau sur les os.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis devenu comparable ╵à la corneille du désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis pareil au chat-huant ╵qui hante les lieux désolés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je reste privé de sommeil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ressemble à un oisillon ╵resté seul sur un toit.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes ennemis ne cessent ╵de m’insulter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se moquent de moi ╵et maudissent les gens ╵en leur souhaitant mon sort.
