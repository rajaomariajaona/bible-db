document_id: PSA.107
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Cinquième livre
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique des rachetés
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Célébrez l’Eternel, car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car son amour ╵dure à toujours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '107.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 100.5 ; 106.1 ; 118.1, 29 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qu’ils le proclament, ╵tous ceux que l’Eternel a délivrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il a sauvés des mains de l’oppresseur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et qu’il a rassemblés de tous pays :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’est, de l’ouest, du nord et du midi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '107.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après la version syriaque. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la mer.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les uns erraient dans le désert ╵où il n’y a personne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans trouver le chemin ╵d’une ville habitée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils étaient affamés, ils avaient soif,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils étaient tout près de défaillir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dans leur détresse, ╵ils crièrent à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les délivra de leurs angoisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il les mena par un chemin tout droit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les dirigea vers une ville habitable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’ils louent donc l’Eternel ╵pour son amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ses merveilles ╵en faveur des humains !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a désaltéré les assoiffés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a comblé de biens les affamés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: D’autres se trouvaient dans des lieux, ╵où régnaient d’épaisses ténèbres ╵et l’obscurité la plus noire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: enchaînés dans la misère et les fers
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: pour avoir bravé les commandements de Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et méprisé les desseins du Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il les humilia ╵en les astreignant à un dur labeur :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils succombaient, privés de tout secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dans leur détresse, ╵ils crièrent à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les délivra de leurs angoisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il les fit sortir des lieux sombres ╵et ténébreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rompit les liens qui les retenaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qu’ils louent donc l’Eternel pour son amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ses merveilles ╵en faveur des humains !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car il a brisé les portes de bronze
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a rompu les verrous de fer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Des insensés, vivant dans le péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’étaient rendus malheureux par leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tout aliment répugnait à leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils approchaient des portes de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dans leur détresse, ╵ils crièrent à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les délivra de leurs angoisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il dit un mot et les guérit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les fit échapper à la tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Qu’ils louent donc l’Eternel pour son amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ses merveilles ╵en faveur des humains !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Et qu’ils lui offrent ╵des sacrifices de reconnaissance ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’avec des cris de joie, ╵ils racontent ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: D’autres s’étaient embarqués sur la mer, ╵dans des bateaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils vaquaient à leurs occupations ╵sur de profondes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ceux-là ont vu les œuvres ╵de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses prodiges sur la haute mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A sa parole, ╵il fit lever un vent impétueux
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui souleva les flots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tantôt ils étaient portés jusqu’au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tantôt ils retombaient dans les abîmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ainsi mis à mal, ils défaillaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Pris de vertige, ils titubaient comme ivres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout leur savoir-faire ╵s’était évanoui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dans leur détresse, ╵ils crièrent à l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il les délivra de leurs angoisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il calma la tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fit taire les flots ╵qui s’étaient soulevés contre eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ce calme fut pour eux cause de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Dieu les guida au port désiré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Qu’ils louent donc l’Eternel pour son amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ses merveilles ╵en faveur des humains !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Qu’ils disent sa grandeur ╵dans l’assemblée du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’ils le louent ╵au conseil des autorités
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '107.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’assemblée du peuple pour le culte et le conseil des responsables réunis aux portes de la ville où se traitaient les affaires publiques étaient les lieux où celui qui avait été délivré pouvait rendre témoignage à Dieu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il peut faire tarir les fleuves ╵et les transformer en désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou changer les sources d’eau en lieux secs ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: d’un sol fertile, il fait une saline
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '107.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le sel rend le sol stérile (Gn 13.10 ; 14.3 ; 19.24-26 ; Dt 29.22).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ses habitants pratiquent le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Mais il change aussi le désert en lac
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terre aride en sources d’eau vive,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: et il y établit ╵ceux qui ont faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’ils y fondent ╵une ville habitable,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: qu’ils ensemencent des champs et plantent des vignes
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui porteront des fruits en abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Il les bénit en sorte qu’ils se multiplient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne laisse pas ╵décroître leur bétail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: D’autres sont réduits à un petit nombre, ╵écrasés sous le poids
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’oppression, ╵du malheur et de la souffrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dieu répand le mépris sur les puissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fait errer dans un désert sans route.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Mais il délivre le pauvre de la détresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et rend les familles fécondes ╵comme le petit bétail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Les hommes droits le voient et ils s’en réjouissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais toute méchanceté a la bouche close.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Que celui qui est sage ╵prête attention à tout cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il médite sur l’amour ╵de l’Eternel.
