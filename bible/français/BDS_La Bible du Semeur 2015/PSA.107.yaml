document_id: PSA.107,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Cinquième livre
  - type: heading
    content: Cantique des rachetés
  - type: text
    content: Célébrez l’Eternel, car il est bon,
  - type: text
    content: car son amour ╵dure à toujours
  - type: note
    content: Voir 100.5 ; 106.1 ; 118.1, 29 ; 136 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
  - type: text
    content: .
  '10':
  - type: text
    content: D’autres se trouvaient dans des lieux, ╵où régnaient d’épaisses ténèbres ╵et l’obscurité la plus noire,
  - type: text
    content: enchaînés dans la misère et les fers
  '11':
  - type: text
    content: pour avoir bravé les commandements de Dieu
  - type: text
    content: et méprisé les desseins du Très-Haut.
  '12':
  - type: text
    content: 'Il les humilia ╵en les astreignant à un dur labeur :'
  - type: text
    content: ils succombaient, privés de tout secours.
  '13':
  - type: text
    content: Dans leur détresse, ╵ils crièrent à l’Eternel,
  - type: text
    content: et il les délivra de leurs angoisses.
  '14':
  - type: text
    content: Il les fit sortir des lieux sombres ╵et ténébreux,
  - type: text
    content: il rompit les liens qui les retenaient.
  '15':
  - type: text
    content: Qu’ils louent donc l’Eternel pour son amour,
  - type: text
    content: pour ses merveilles ╵en faveur des humains !
  '16':
  - type: text
    content: Car il a brisé les portes de bronze
  - type: text
    content: et il a rompu les verrous de fer.
  '17':
  - type: text
    content: Des insensés, vivant dans le péché,
  - type: text
    content: s’étaient rendus malheureux par leurs fautes.
  '18':
  - type: text
    content: Tout aliment répugnait à leur bouche,
  - type: text
    content: ils approchaient des portes de la mort.
  '19':
  - type: text
    content: Dans leur détresse, ╵ils crièrent à l’Eternel,
  - type: text
    content: et il les délivra de leurs angoisses.
  '2':
  - type: text
    content: Qu’ils le proclament, ╵tous ceux que l’Eternel a délivrés,
  - type: text
    content: qu’il a sauvés des mains de l’oppresseur,
  '20':
  - type: text
    content: Il dit un mot et les guérit,
  - type: text
    content: et il les fit échapper à la tombe.
  '21':
  - type: text
    content: Qu’ils louent donc l’Eternel pour son amour,
  - type: text
    content: pour ses merveilles ╵en faveur des humains !
  '22':
  - type: text
    content: Et qu’ils lui offrent ╵des sacrifices de reconnaissance ;
  - type: text
    content: qu’avec des cris de joie, ╵ils racontent ses œuvres.
  '23':
  - type: text
    content: D’autres s’étaient embarqués sur la mer, ╵dans des bateaux
  - type: text
    content: et ils vaquaient à leurs occupations ╵sur de profondes eaux.
  '24':
  - type: text
    content: Ceux-là ont vu les œuvres ╵de l’Eternel,
  - type: text
    content: et ses prodiges sur la haute mer.
  '25':
  - type: text
    content: A sa parole, ╵il fit lever un vent impétueux
  - type: text
    content: qui souleva les flots.
  '26':
  - type: text
    content: Tantôt ils étaient portés jusqu’au ciel,
  - type: text
    content: tantôt ils retombaient dans les abîmes,
  - type: text
    content: et ainsi mis à mal, ils défaillaient.
  '27':
  - type: text
    content: Pris de vertige, ils titubaient comme ivres,
  - type: text
    content: et tout leur savoir-faire ╵s’était évanoui.
  '28':
  - type: text
    content: Dans leur détresse, ╵ils crièrent à l’Eternel,
  - type: text
    content: et il les délivra de leurs angoisses.
  '29':
  - type: text
    content: Il calma la tempête,
  - type: text
    content: et fit taire les flots ╵qui s’étaient soulevés contre eux.
  '3':
  - type: text
    content: 'et qu’il a rassemblés de tous pays :'
  - type: text
    content: de l’est, de l’ouest, du nord et du midi
  - type: note
    content: 'D’après la version syriaque. Texte hébreu traditionnel : la mer.'
  - type: text
    content: .
  '30':
  - type: text
    content: Ce calme fut pour eux cause de joie
  - type: text
    content: et Dieu les guida au port désiré.
  '31':
  - type: text
    content: Qu’ils louent donc l’Eternel pour son amour,
  - type: text
    content: pour ses merveilles ╵en faveur des humains !
  '32':
  - type: text
    content: Qu’ils disent sa grandeur ╵dans l’assemblée du peuple,
  - type: text
    content: et qu’ils le louent ╵au conseil des autorités
  - type: note
    content: L’assemblée du peuple pour le culte et le conseil des responsables réunis aux portes de la ville où se traitaient les affaires publiques étaient les lieux où celui qui avait été délivré pouvait rendre témoignage à Dieu.
  - type: text
    content: .
  '33':
  - type: text
    content: Il peut faire tarir les fleuves ╵et les transformer en désert,
  - type: text
    content: ou changer les sources d’eau en lieux secs ;
  '34':
  - type: text
    content: d’un sol fertile, il fait une saline
  - type: note
    content: Le sel rend le sol stérile (Gn 13.10 ; 14.3 ; 19.24-26 ; Dt 29.22).
  - type: text
    content: quand ses habitants pratiquent le mal.
  '35':
  - type: text
    content: Mais il change aussi le désert en lac
  - type: text
    content: et la terre aride en sources d’eau vive,
  '36':
  - type: text
    content: et il y établit ╵ceux qui ont faim,
  - type: text
    content: pour qu’ils y fondent ╵une ville habitable,
  '37':
  - type: text
    content: qu’ils ensemencent des champs et plantent des vignes
  - type: text
    content: qui porteront des fruits en abondance.
  '38':
  - type: text
    content: Il les bénit en sorte qu’ils se multiplient,
  - type: text
    content: et il ne laisse pas ╵décroître leur bétail.
  '39':
  - type: text
    content: D’autres sont réduits à un petit nombre, ╵écrasés sous le poids
  - type: text
    content: de l’oppression, ╵du malheur et de la souffrance.
  '4':
  - type: text
    content: Les uns erraient dans le désert ╵où il n’y a personne,
  - type: text
    content: sans trouver le chemin ╵d’une ville habitée.
  '40':
  - type: text
    content: Dieu répand le mépris sur les puissants,
  - type: text
    content: les fait errer dans un désert sans route.
  '41':
  - type: text
    content: Mais il délivre le pauvre de la détresse
  - type: text
    content: et rend les familles fécondes ╵comme le petit bétail.
  '42':
  - type: text
    content: Les hommes droits le voient et ils s’en réjouissent,
  - type: text
    content: mais toute méchanceté a la bouche close.
  '43':
  - type: text
    content: Que celui qui est sage ╵prête attention à tout cela,
  - type: text
    content: et qu’il médite sur l’amour ╵de l’Eternel.
  '5':
  - type: text
    content: Ils étaient affamés, ils avaient soif,
  - type: text
    content: et ils étaient tout près de défaillir.
  '6':
  - type: text
    content: Dans leur détresse, ╵ils crièrent à l’Eternel,
  - type: text
    content: et il les délivra de leurs angoisses.
  '7':
  - type: text
    content: Il les mena par un chemin tout droit
  - type: text
    content: et les dirigea vers une ville habitable.
  '8':
  - type: text
    content: Qu’ils louent donc l’Eternel ╵pour son amour,
  - type: text
    content: pour ses merveilles ╵en faveur des humains !
  '9':
  - type: text
    content: Il a désaltéré les assoiffés,
  - type: text
    content: il a comblé de biens les affamés.
