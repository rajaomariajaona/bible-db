document_id: EZK.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le départ de la gloire
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’idolâtrie dans le Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le cinquième jour du sixième mois de la sixième année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire en septembre 592 av. J.-C.
    marker-yv: yv-n
  - type: text
    text: ', j’étais assis chez moi et les responsables du peuple de Juda étaient assis devant moi. Soudain, la main du Seigneur, l’Eternel, tomba sur moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je regardai et je vis un être qui ressemblait à un homme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à un homme
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’après l’ancienne version grecque et le contexte. Le texte hébreu traditionnel a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à un feu. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les mots '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: se ressemblent en hébreu.
    marker-yv: yv-n
  - type: text
    text: . En dessous de ce qui semblait être ses reins, c’était comme du feu, et au-dessus, il y avait comme l’éclat d’un métal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Cet être tendit une forme de main et me saisit par une mèche de mes cheveux, et l’Esprit me souleva entre ciel et terre et me transporta dans une vision divine à Jérusalem, à l’entrée de la porte du parvis intérieur du Temple, celle qui est tournée vers le nord, où se trouve la statue de la provocation, celle qui provoque l’Eternel qui ne tolère aucun rival
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La statue de quelque idole étrangère (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20.5
        metadata:
          usfm: EXO.20.5
      - type: text
        text: ), peut-être celle de Tammouz (v. 14) ou d’Ashéra que Manassé avait dressée dans le Temple (2 Ch 33.7 ; 2 R 21.7).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et voici que la gloire du Dieu d’Israël m’apparut là, exactement comme je l’avais vue dans la plaine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3.22-23
        metadata:
          usfm: EZK.3.22+EZK.3.23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.1'
        metadata:
          usfm: EZK.8.1
      - type: text
        text: ' à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.25'
        metadata:
          usfm: EZK.11.25
      - type: text
        text: ' décrit le départ de la gloire de l’Eternel du Temple et de Jérusalem (9.3 ; 10.18-19 ; 11.23). Pour son retour, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43.2'
        metadata:
          usfm: EZK.43.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et il me dit : Fils d’homme, lève les yeux du côté du nord.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Je levai les yeux du côté du nord, et voici qu’au nord de la porte de l’autel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Celle qui conduisait à l’autel des holocaustes et par laquelle on amenait les victimes dans le parvis.
    marker-yv: yv-n
  - type: text
    text: ', cette statue de la provocation se dressait dans l’entrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il me dit encore : Fils d’homme, vois-tu ce qu’ils font ? Regarde les pratiques si abominables que les Israélites commettent en ce lieu pour m’éloigner de mon sanctuaire. Mais tu verras encore d’autres abominations très graves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il me conduisit à l’entrée du parvis, et je vis qu’il y avait un trou dans le mur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et il me dit : Fils d’homme, perce la muraille.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je la perçai, et une ouverture apparut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il me dit : Entre et regarde les horreurs abominables qu’ils commettent ici !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J’entrai et je regardai, et voici que je vis, dessinées sur la paroi tout autour, toutes sortes de représentations de reptiles et de bêtes répugnantes et toutes les idoles de la communauté d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 20.4 ; Dt 4.16-18 ; Nb 16.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Soixante-dix hommes, responsables de la communauté d’Israël, se tenaient debout devant les idoles, chacun d’eux avait en mains son encensoir d’où s’élevait le parfum d’un nuage d’encens, et Yaazania
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yaazania
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'il ne s’agit pas de la même personne que dans '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11.1'
        metadata:
          usfm: EZK.11.1
      - type: text
        text: '. Ironiquement, son nom signifie : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l’Eternel entend, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ironie soulignée au v. 12.
    marker-yv: yv-n
  - type: text
    text: ', le fils de Shaphân, se trouvait au milieu d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le Seigneur me demanda : As-tu vu, fils d’homme, ce que les responsables du peuple d’Israël font en cachette, chacun dans l’obscurité, chacun dans la chambre de son idole ? Car ils se disent : « L’Eternel ne nous voit pas, l’Eternel a quitté le pays. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et il ajouta : Tu vas voir qu’ils commettent encore d’autres abominations aussi graves.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il m’emmena à l’entrée de la porte nord du temple de l’Eternel, et je vis des femmes assises là, qui pleuraient la mort du dieu Tammouz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Divinité babylonienne dont on pleurait la mort et dont on célébrait la renaissance selon le cycle de la végétation, par des fêtes joyeuses et licencieuses.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il me dit : As-tu vu, fils d’homme ? Tu verras encore d’autres abominations plus graves que celles-ci.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il m’entraîna vers le parvis intérieur du temple de l’Eternel et voici qu’à l’entrée de ce temple de l’Eternel, entre le portique et l’autel, j’aperçus environ vingt-cinq hommes qui avaient le dos tourné au sanctuaire et se tenaient face à l’orient : ils se prosternaient en direction de l’orient pour adorer le soleil'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Culte mentionné en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23.5-11
        metadata:
          usfm: 2KI.23.5+2KI.23.6+2KI.23.7+2KI.23.8+2KI.23.9+2KI.23.10+2KI.23.11
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il me demanda : As-tu vu, fils d’homme ? La communauté de Juda estime-t-elle donc qu’il n’est pas suffisant de commettre toutes ces abominations auxquelles ils se livrent en ce lieu ? Faut-il encore qu’ils remplissent le pays de leurs actes de violence et qu’ils reviennent sans cesse m’irriter ? Regarde ! Les voilà qui élèvent le rameau jusqu’au nez'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rite païen.
    marker-yv: yv-n
  - type: text
    text: '  ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A mon tour d’agir avec colère ! Je n’aurai pas un regard de pitié et je serai sans merci. Ils auront beau crier à tue-tête vers moi, je ne les écouterai pas.
