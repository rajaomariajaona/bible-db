document_id: EXO.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Moïse objecta :'
  - type: text
    content: 'Et s’ils ne me croient pas et ne m’écoutent pas, s’ils me disent : « L’Eternel ne t’est pas apparu » ?'
  '10':
  - type: text
    content: '– De grâce, Seigneur, dit Moïse, je n’ai pas la parole facile. Cela ne date ni d’hier, ni d’avant-hier, ni du moment où tu as commencé à parler à ton serviteur : j’ai la bouche et la langue embarrassées.'
  '11':
  - type: text
    content: 'L’Eternel lui répondit : Qui a doté l’homme d’une bouche ? Qui le rend muet ou sourd, voyant ou aveugle ? N’est-ce pas moi, l’Eternel ? '
  '12':
  - type: text
    content: Maintenant donc, vas-y ; je serai moi-même avec ta bouche et je t’indiquerai ce que tu devras dire.
  '13':
  - type: text
    content: 'Mais Moïse rétorqua : De grâce, Seigneur ! Je t’en prie ! Envoie qui tu voudras !'
  '14':
  - type: text
    content: 'Alors l’Eternel se mit en colère contre Moïse et lui dit : Eh bien ! il y a ton frère Aaron, le lévite'
  - type: note
    content: 'Signifie sans doute : le chef de la tribu de Lévi. Par droit de naissance, il était de la seconde branche des lévites.'
  - type: text
    content: '. Je sais qu’il parlera facilement. D’ailleurs, il est déjà en chemin pour venir te trouver ; il sera tout heureux de te voir. '
  '15':
  - type: text
    content: 'Tu lui parleras, tu lui mettras des paroles dans la bouche, et moi, je vous assisterai tous deux dans ce que vous direz et je vous indiquerai ce que vous aurez à faire. '
  '16':
  - type: text
    content: 'Il sera ton porte-parole devant le peuple, il te servira de bouche, et tu seras pour lui comme le dieu qui parle à son prophète. '
  '17':
  - type: text
    content: Tu prendras ce bâton en main, et c’est avec cela que tu accompliras les signes miraculeux.
  - type: heading
    content: Moïse retourne en Egypte
  '18':
  - type: text
    content: 'Moïse s’en alla et rentra chez Jéthro son beau-père. Il lui dit : Je voudrais partir pour retourner auprès de mes frères de race en Egypte et voir s’ils sont encore en vie.'
  - type: text
    content: 'Jéthro lui répondit : Va en paix !'
  '19':
  - type: text
    content: 'L’Eternel dit à Moïse lorsqu’il était encore à Madian : Mets-toi en route, retourne en Egypte, car tous ceux qui voulaient te faire périr sont morts.'
  '2':
  - type: text
    content: – Qu’as-tu dans la main ? lui demanda l’Eternel.
  - type: text
    content: – Un bâton.
  '20':
  - type: text
    content: Alors Moïse emmena sa femme et ses fils, il les installa sur un âne et prit le chemin de l’Egypte, tenant en main le bâton de Dieu.
  '21':
  - type: text
    content: 'L’Eternel dit à Moïse : Maintenant que tu es en route pour retourner en Egypte, considère tous les miracles que je t’ai donné le pouvoir d’accomplir. Tu les feras devant le pharaon. Moi, je lui donnerai un cœur obstiné, de sorte qu’il ne permettra pas au peuple de s’en aller. '
  '22':
  - type: text
    content: 'Tu diras au pharaon : « Voici ce que dit l’Eternel : Israël est mon fils aîné. '
  '23':
  - type: text
    content: 'Je te l’ordonne : Laisse aller mon fils pour qu’il me rende un culte. Puisque tu refuses, je ferai périr ton fils aîné. »'
  '24':
  - type: text
    content: 'Pendant le voyage, au campement où ils passaient la nuit, l’Eternel attaqua Moïse, cherchant à le faire mourir. '
  '25':
  - type: text
    content: 'Alors Séphora saisit une pierre tranchante, coupa le prépuce de son fils et en toucha les pieds de Moïse en disant : Tu es pour moi un époux de sang.'
  '26':
  - type: text
    content: 'Alors l’Eternel laissa Moïse. C’est à cette occasion que Séphora dit à Moïse à cause de la circoncision : Tu es un époux de sang !'
  '27':
  - type: text
    content: 'Entre-temps, l’Eternel avait ordonné à Aaron d’aller à la rencontre de Moïse dans le désert et Aaron partit. Il rencontra son frère à la montagne de Dieu et l’embrassa. '
  '28':
  - type: text
    content: 'Moïse l’informa de toutes les paroles que l’Eternel l’avait chargé de dire et des signes miraculeux qu’il lui avait ordonné d’accomplir. '
  '29':
  - type: text
    content: 'Ils partirent donc. Une fois arrivés, ils convoquèrent tous les responsables du peuple d’Israël. '
  '3':
  - type: text
    content: – Jette-le par terre.
  - type: text
    content: 'Moïse jeta le bâton par terre et celui-ci se transforma en serpent. Moïse s’enfuit devant lui, '
  '30':
  - type: text
    content: 'Aaron leur répéta tout ce que l’Eternel avait dit à Moïse et il accomplit les signes miraculeux aux yeux du peuple. '
  '31':
  - type: text
    content: Le peuple fut convaincu. En apprenant que l’Eternel intervenait en faveur des Israélites et qu’il avait pris leur détresse en considération, ils se prosternèrent et l’adorèrent.
  '4':
  - type: text
    content: 'mais l’Eternel lui dit : Tends la main et attrape-le par la queue !'
  - type: text
    content: Moïse avança la main et saisit le serpent, qui redevint un bâton dans sa main.
  '5':
  - type: text
    content: – C’est pour qu’ils croient que l’Eternel, le Dieu de leurs ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob t’est réellement apparu.
  '6':
  - type: text
    content: 'Puis l’Eternel continua : Mets ta main sur ta poitrine.'
  - type: text
    content: 'Moïse mit sa main sur sa poitrine puis la ressortit : elle était couverte d’une lèpre blanche comme la neige.'
  '7':
  - type: text
    content: – Remets ta main sur ta poitrine, lui dit Dieu.
  - type: text
    content: Il la remit. Quand il la ressortit, elle était redevenue saine.
  '8':
  - type: text
    content: '– Si donc ils ne te croient pas, lui dit l’Eternel, et s’ils ne sont pas convaincus par le premier signe miraculeux, ils croiront après le deuxième. '
  '9':
  - type: text
    content: Si, toutefois, ils n’ont pas confiance, même après avoir vu ces deux signes et s’ils ne t’écoutent pas, alors tu puiseras de l’eau dans le Nil, tu la répandras par terre, et, dès qu’elle touchera le sol, elle se transformera en sang.
