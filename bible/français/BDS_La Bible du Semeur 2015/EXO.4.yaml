document_id: EXO.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse objecta :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Et s’ils ne me croient pas et ne m’écoutent pas, s’ils me disent : « L’Eternel ne t’est pas apparu » ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: – Qu’as-tu dans la main ? lui demanda l’Eternel.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Un bâton.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: – Jette-le par terre.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Moïse jeta le bâton par terre et celui-ci se transforma en serpent. Moïse s’enfuit devant lui, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mais l’Eternel lui dit : Tends la main et attrape-le par la queue !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Moïse avança la main et saisit le serpent, qui redevint un bâton dans sa main.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: – C’est pour qu’ils croient que l’Eternel, le Dieu de leurs ancêtres, le Dieu d’Abraham, d’Isaac et de Jacob t’est réellement apparu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis l’Eternel continua : Mets ta main sur ta poitrine.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Moïse mit sa main sur sa poitrine puis la ressortit : elle était couverte d’une lèpre blanche comme la neige.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: – Remets ta main sur ta poitrine, lui dit Dieu.
- type: usfm
  marker: p
  children:
  - type: text
    text: Il la remit. Quand il la ressortit, elle était redevenue saine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '– Si donc ils ne te croient pas, lui dit l’Eternel, et s’ils ne sont pas convaincus par le premier signe miraculeux, ils croiront après le deuxième. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si, toutefois, ils n’ont pas confiance, même après avoir vu ces deux signes et s’ils ne t’écoutent pas, alors tu puiseras de l’eau dans le Nil, tu la répandras par terre, et, dès qu’elle touchera le sol, elle se transformera en sang.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '– De grâce, Seigneur, dit Moïse, je n’ai pas la parole facile. Cela ne date ni d’hier, ni d’avant-hier, ni du moment où tu as commencé à parler à ton serviteur : j’ai la bouche et la langue embarrassées.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Eternel lui répondit : Qui a doté l’homme d’une bouche ? Qui le rend muet ou sourd, voyant ou aveugle ? N’est-ce pas moi, l’Eternel ? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maintenant donc, vas-y ; je serai moi-même avec ta bouche et je t’indiquerai ce que tu devras dire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais Moïse rétorqua : De grâce, Seigneur ! Je t’en prie ! Envoie qui tu voudras !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors l’Eternel se mit en colère contre Moïse et lui dit : Eh bien ! il y a ton frère Aaron, le lévite'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Signifie sans doute : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le chef de la tribu de Lévi. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Par droit de naissance, il était de la seconde branche des lévites.
    marker-yv: yv-n
  - type: text
    text: '. Je sais qu’il parlera facilement. D’ailleurs, il est déjà en chemin pour venir te trouver ; il sera tout heureux de te voir. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu lui parleras, tu lui mettras des paroles dans la bouche, et moi, je vous assisterai tous deux dans ce que vous direz et je vous indiquerai ce que vous aurez à faire. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il sera ton porte-parole devant le peuple, il te servira de bouche, et tu seras pour lui comme le dieu qui parle à son prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu prendras ce bâton en main, et c’est avec cela que tu accompliras les signes miraculeux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse retourne en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse s’en alla et rentra chez Jéthro son beau-père. Il lui dit : Je voudrais partir pour retourner auprès de mes frères de race en Egypte et voir s’ils sont encore en vie.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jéthro lui répondit : Va en paix !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Eternel dit à Moïse lorsqu’il était encore à Madian : Mets-toi en route, retourne en Egypte, car tous ceux qui voulaient te faire périr sont morts.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Alors Moïse emmena sa femme et ses fils, il les installa sur un âne et prit le chemin de l’Egypte, tenant en main le bâton de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Eternel dit à Moïse : Maintenant que tu es en route pour retourner en Egypte, considère tous les miracles que je t’ai donné le pouvoir d’accomplir. Tu les feras devant le pharaon. Moi, je lui donnerai un cœur obstiné, de sorte qu’il ne permettra pas au peuple de s’en aller. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu diras au pharaon : « Voici ce que dit l’Eternel : Israël est mon fils aîné. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je te l’ordonne : Laisse aller mon fils pour qu’il me rende un culte. Puisque tu refuses, je ferai périr ton fils aîné. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pendant le voyage, au campement où ils passaient la nuit, l’Eternel attaqua Moïse, cherchant à le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors Séphora saisit une pierre tranchante, coupa le prépuce de son fils et en toucha les pieds de Moïse en disant : Tu es pour moi un époux de sang.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors l’Eternel laissa Moïse. C’est à cette occasion que Séphora dit à Moïse à cause de la circoncision : Tu es un époux de sang !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Entre-temps, l’Eternel avait ordonné à Aaron d’aller à la rencontre de Moïse dans le désert et Aaron partit. Il rencontra son frère à la montagne de Dieu et l’embrassa. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moïse l’informa de toutes les paroles que l’Eternel l’avait chargé de dire et des signes miraculeux qu’il lui avait ordonné d’accomplir. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils partirent donc. Une fois arrivés, ils convoquèrent tous les responsables du peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Aaron leur répéta tout ce que l’Eternel avait dit à Moïse et il accomplit les signes miraculeux aux yeux du peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Le peuple fut convaincu. En apprenant que l’Eternel intervenait en faveur des Israélites et qu’il avait pris leur détresse en considération, ils se prosternèrent et l’adorèrent.
