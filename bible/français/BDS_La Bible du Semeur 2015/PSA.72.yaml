document_id: PSA.72,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour le roi
  - type: text
    content: De Salomon
  - type: note
    content: De même que le Ps 127.
  - type: text
    content: .
  - type: text
    content: O Dieu, accorde au roi ╵de juger comme toi,
  - type: text
    content: et donne au fils du roi ╵ton esprit de justice !
  '10':
  - type: text
    content: Et les rois de Tarsis
  - type: note
    content: Tarsis, située en Espagne, représentait le « bout du monde ».
  - type: text
    content: ' ╵des îles, des régions côtières ╵lui apporteront des présents.'
  - type: text
    content: Et les rois de Saba ╵et de Seba
  - type: note
    content: Saba en Arabie (1 R 10.1) et Seba en Afrique (Gn 10.7 ; Es 43.3).
  - type: text
    content: ' ╵lui présenteront leurs offrandes.'
  '11':
  - type: text
    content: Tous les rois lui rendront hommage,
  - type: text
    content: et tous les peuples lui seront assujettis.
  '12':
  - type: text
    content: Car il délivrera le pauvre ╵qui implorera son secours,
  - type: text
    content: le défavorisé qui n’a point d’aide.
  '13':
  - type: text
    content: Il aura compassion ╵des faibles et des pauvres,
  - type: text
    content: il sauvera la vie des pauvres.
  '14':
  - type: text
    content: Il les arrachera ╵à la violence, ╵à l’oppression,
  - type: text
    content: car à ses yeux, ╵leur vie sera précieuse.
  '15':
  - type: text
    content: Que notre roi vive longtemps ! ╵Il recevra l’or de Saba.
  - type: text
    content: Que l’on prie pour lui sans relâche ! ╵Qu’on le bénisse tous les jours !
  '16':
  - type: text
    content: Qu’il y ait abondance ╵de blé dans le pays,
  - type: text
    content: que sur les crêtes des montagnes, ╵les épis lourds ondulent,
  - type: text
    content: que leur produit soit florissant ╵comme les arbres du Liban,
  - type: text
    content: et que les humains fleurissent en ville ╵autant que l’herbe dans les prés.
  '17':
  - type: text
    content: Que son nom subsiste à jamais !
  - type: text
    content: Que son renom se perpétue ╵aussi longtemps que le soleil !
  - type: text
    content: Alors, pour se bénir ╵les uns les autres, ╵les gens citeront son exemple.
  - type: text
    content: Que tous les peuples ╵le disent bienheureux !
  '18':
  - type: text
    content: Que soit béni l’Eternel Dieu, ╵Dieu d’Israël,
  - type: text
    content: qui seul accomplit des prodiges !
  '19':
  - type: text
    content: Béni soit, pour l’éternité, ╵le Dieu glorieux,
  - type: text
    content: et que toute la terre ╵soit remplie de sa gloire !
  - type: text
    content: Amen, Amen !
  '2':
  - type: text
    content: Qu’il rende la justice ╵à l’égard de ton peuple ╵selon ce qui est juste,
  - type: text
    content: à l’égard de tes pauvres ╵selon ce qui est droit ;
  '20':
  - type: text
    content: Ici s’achève le recueil des prières de David, fils d’Isaï.
  '3':
  - type: text
    content: que la paix descende des montagnes
  - type: text
    content: et la justice des collines ╵pour tout le peuple !
  '4':
  - type: text
    content: Qu’il fasse droit aux gens pauvres du peuple !
  - type: text
    content: Qu’il sauve les enfants des indigents
  - type: text
    content: et qu’il écrase l’oppresseur !
  '5':
  - type: text
    content: Alors ils te craindront
  - type: note
    content: 'L’ancienne version grecque a : il subsistera.'
  - type: text
    content: ' ╵tant que durera le soleil,'
  - type: text
    content: tant que la lune apparaîtra, ╵d’une génération à l’autre.
  '6':
  - type: text
    content: Le roi sera comme une pluie ╵qui descend sur un pré fauché,
  - type: text
    content: et comme des ondées ╵désaltérant la terre.
  '7':
  - type: text
    content: Que tous les justes soient prospères ╵tant que son règne durera,
  - type: text
    content: et qu’on connaisse un grand bien-être ╵tant que la lune brillera !
  '8':
  - type: text
    content: Qu’il règne d’une mer à l’autre
  - type: note
    content: C’est-à-dire de la Méditerranée à la mer Morte ou au golfe d’Aqaba.
  - type: text
    content: ','
  - type: text
    content: depuis le fleuve de l’Euphrate ╵jusqu’aux confins du monde
  - type: note
    content: Sous Salomon, l’Euphrate était la limite orientale d’Israël, celle qui lui avait été promise depuis le temps de l’Exode (Ex 23.31 ; Dt 11.24).
  - type: text
    content: '  !'
  '9':
  - type: text
    content: Devant lui, les habitants du désert ╵s’inclineront
  - type: note
    content: Soit les peuples nomades des bords du golfe d’Arabie, soit les animaux du désert ou même les démons (voir Es 13.21).
  - type: text
    content: ','
  - type: text
    content: et tous ses ennemis ╵lécheront la poussière.
