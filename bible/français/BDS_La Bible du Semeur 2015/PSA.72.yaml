document_id: PSA.72
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière pour le roi
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De Salomon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De même que le '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 127
        metadata:
          usfm: PSA.127
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, accorde au roi ╵de juger comme toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et donne au fils du roi ╵ton esprit de justice !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qu’il rende la justice ╵à l’égard de ton peuple ╵selon ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l’égard de tes pauvres ╵selon ce qui est droit ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: que la paix descende des montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice des collines ╵pour tout le peuple !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu’il fasse droit aux gens pauvres du peuple !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il sauve les enfants des indigents
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il écrase l’oppresseur !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors ils te craindront
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il subsistera.
    marker-yv: yv-n
  - type: text
    text: ' ╵tant que durera le soleil,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant que la lune apparaîtra, ╵d’une génération à l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le roi sera comme une pluie ╵qui descend sur un pré fauché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme des ondées ╵désaltérant la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que tous les justes soient prospères ╵tant que son règne durera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on connaisse un grand bien-être ╵tant que la lune brillera !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’il règne d’une mer à l’autre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire de la Méditerranée à la mer Morte ou au golfe d’Aqaba.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis le fleuve de l’Euphrate ╵jusqu’aux confins du monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sous Salomon, l’Euphrate était la limite orientale d’Israël, celle qui lui avait été promise depuis le temps de l’Exode (Ex 23.31 ; Dt 11.24).
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Devant lui, les habitants du désert ╵s’inclineront
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Soit les peuples nomades des bords du golfe d’Arabie, soit les animaux du désert ou même les démons (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 13.21
        metadata:
          usfm: ISA.13.21
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses ennemis ╵lécheront la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et les rois de Tarsis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tarsis
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: située en Espagne, représentait le « bout du monde ».
    marker-yv: yv-n
  - type: text
    text: ' ╵des îles, des régions côtières ╵lui apporteront des présents.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les rois de Saba ╵et de Seba
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Arabie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10.1
        metadata:
          usfm: 1KI.10.1
      - type: text
        text: ') et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Seba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Afrique (Gn 10.7 ; Es 43.3).
    marker-yv: yv-n
  - type: text
    text: ' ╵lui présenteront leurs offrandes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les rois lui rendront hommage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les peuples lui seront assujettis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car il délivrera le pauvre ╵qui implorera son secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le défavorisé qui n’a point d’aide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il aura compassion ╵des faibles et des pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sauvera la vie des pauvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il les arrachera ╵à la violence, ╵à l’oppression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car à ses yeux, ╵leur vie sera précieuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que notre roi vive longtemps ! ╵Il recevra l’or de Saba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’on prie pour lui sans relâche ! ╵Qu’on le bénisse tous les jours !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qu’il y ait abondance ╵de blé dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que sur les crêtes des montagnes, ╵les épis lourds ondulent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leur produit soit florissant ╵comme les arbres du Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les humains fleurissent en ville ╵autant que l’herbe dans les prés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que son nom subsiste à jamais !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que son renom se perpétue ╵aussi longtemps que le soleil !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors, pour se bénir ╵les uns les autres, ╵les gens citeront son exemple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tous les peuples ╵le disent bienheureux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que soit béni l’Eternel Dieu, ╵Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui seul accomplit des prodiges !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Béni soit, pour l’éternité, ╵le Dieu glorieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que toute la terre ╵soit remplie de sa gloire !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen, Amen !
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ici s’achève le recueil des prières de David, fils d’Isaï.
