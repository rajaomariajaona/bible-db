document_id: LUK.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’envoi des Douze
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 10.1-9, 11-14 ; Mc 6.7-13)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus réunit les Douze et leur donna le pouvoir et l’autorité de chasser tous les démons et de guérir les maladies. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les apôtres revinrent et racontèrent à Jésus tout ce qu’ils avaient fait. Il les prit alors avec lui et se retira à l’écart, du côté de la ville de Bethsaïda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Localité de la rive nord du lac de Galilée.
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les foules s’en aperçurent et le suivirent. Jésus leur fit bon accueil, il leur parla du royaume de Dieu et guérit ceux qui en avaient besoin.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour commençait à baisser. Alors les Douze s’approchèrent de lui et lui dirent : Renvoie ces gens pour qu’ils aillent dans les villages et les hameaux des environs, où ils trouveront de quoi se loger et se ravitailler, car nous sommes ici dans un endroit désert.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Donnez-leur vous-mêmes à manger !
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Mais, répondirent-ils, nous n’avons pas plus de cinq pains et deux poissons. Ou alors faut-il que nous allions acheter de la nourriture pour tout ce monde ?
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car il y avait bien là cinq mille hommes.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à ses disciples : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Faites-les asseoir par groupes d’une cinquantaine de personnes.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est ce qu’ils firent, et ils installèrent ainsi tout le monde. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus prit les cinq pains et les deux poissons, il leva les yeux vers le ciel et prononça la prière de bénédiction ; puis il les partagea et donna les morceaux à ses disciples pour qu’ils les distribuent à la foule. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout le monde mangea à satiété. On ramassa les morceaux qui restaient ; cela faisait douze paniers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qui est vraiment Jésus ?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 16.13-21 ; Mc 8.27-31)
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jésus priait à l’écart, et ses disciples étaient avec lui. Alors il les interrogea : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que disent les foules à mon sujet ? Qui suis-je d’après elles ?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent : Pour les uns, tu es Jean-Baptiste ; pour d’autres, Elie ; pour d’autres encore, l’un des prophètes d’autrefois qui serait ressuscité.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite il les envoya proclamer le royaume de Dieu et opérer des guérisons. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Et vous,
    - type: text
      text: ' leur demanda-t-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: qui dites-vous que je suis ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre prit la parole et dit : Le Messie, envoyé par Dieu.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus leur ordonna formellement de ne le dire à personne.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il ajouta : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Il faut que le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' souffre beaucoup et soit rejeté par les responsables du peuple, les chefs des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: spécialistes de la Loi
      - type: text
        text: '  ; il doit être mis à mort et ressusciter le troisième jour.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment suivre Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 16.24-28 ; Mc 8.34 à 9.1)
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, s’adressant à tous, il dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un veut me suivre, qu’il renonce à lui-même, qu’il se charge chaque jour de sa croix, et qu’il me suive.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'En effet, celui qui est préoccupé de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sauver
      - type: text
        text: ' sa vie, la perdra ; mais celui qui perdra sa vie à cause de moi la sauvera.'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si un homme parvient à posséder le monde entier, à quoi cela lui sert-il s’il se perd ou se détruit lui-même ?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Si quelqu’un a honte de moi et de mes paroles, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ', à son tour, aura honte de lui quand il viendra dans sa gloire, dans celle du Père et des saints '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anges
      - type: text
        text: .
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous l’assure, quelques-uns de ceux qui sont ici présents ne mourront pas avant d’avoir vu le règne de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La révélation du royaume
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 17.1-8 ; Mc 9.2-8)
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Environ huit jours après cet entretien, Jésus prit avec lui Pierre, Jean et Jacques et monta sur une montagne pour aller prier.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu’il priait, son visage changea d’aspect et ses vêtements devinrent d’une blancheur éblouissante. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur donna les instructions suivantes : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne prenez rien pour le voyage : ni bâton, ni sac, ni provisions, ni argent. N’emportez pas de tunique de rechange.'
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Deux hommes s’entretenaient avec lui : Moïse et Elie'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moïse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a donné la Loi au peuple. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Elie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était considéré comme le prophète par excellence. Ces deux hommes représentent toute l’ancienne alliance.
      marker-yv: yv-n
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: qui resplendissaient de gloire. Ils parlaient de la manière dont Jésus allait achever sa mission
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le grec parle du prochain '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'exode '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Jésus qui allait s’accomplir à Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' en mourant à Jérusalem.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pierre et ses compagnons étaient profondément endormis, mais quand ils s’éveillèrent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils étaient accablés de sommeil mais se tinrent éveillés.
      marker-yv: yv-n
    - type: text
      text: ', ils virent la gloire de Jésus et les deux hommes qui étaient avec lui.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où ces hommes se séparaient de Jésus, Pierre lui dit : Maître, il est bon que nous soyons ici. Nous allons dresser trois tentes, une pour toi, une pour Moïse et une pour Elie.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En fait, il ne savait pas ce qu’il disait. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant qu’il parlait encore, une nuée se forma et les enveloppa, et les disciples furent saisis de crainte lorsqu’ils entrèrent dans la nuée.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une voix sortit de la nuée, qui disait : Celui-ci est mon Fils, celui que j’ai choisi. Ecoutez-le !'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand cette voix eut retenti, ils ne trouvèrent plus que Jésus. Quant à eux, à cette époque, ils gardèrent le silence sur cet événement et ne racontèrent à personne ce qu’ils avaient vu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La guérison d’un enfant habité par un démon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 17.14-18 ; Mc 9.14-27)
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, comme ils descendaient de la montagne, une grande foule vint à la rencontre de Jésus. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du milieu de cette foule, un homme s’écria : Maître, je t’en supplie : regarde mon fils ! C’est mon enfant unique. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un esprit s’empare de lui, le fait crier tout à coup, l’agite convulsivement et le fait baver ; et il ne le quitte que difficilement, en le laissant tout meurtri. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si vous entrez dans une maison, restez-y jusqu’à ce que vous quittiez la localité.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai prié tes disciples de le chasser, mais ils n’y ont pas réussi.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus s’exclama alors : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Gens incrédules et infidèles à Dieu ! Jusqu’à quand devrai-je encore rester avec vous et vous supporter ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, s’adressant à l’homme : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Amène ton fils ici !
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant que l’enfant s’approchait, le démon le jeta par terre et l’agita de convulsions. Jésus commanda avec sévérité à l’esprit mauvais de sortir, il guérit le jeune garçon et le rendit à son père. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous furent bouleversés devant la grandeur de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’annonce de la mort de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 17.22-23 ; Mc 9.30-32)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors que chacun s’émerveillait encore de tout ce que Jésus faisait, il dit à ses disciples : '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Retenez bien ce que je vais vous dire maintenant : le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' va être livré aux mains des hommes.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les disciples ne comprenaient pas cette parole. Son sens leur était caché pour qu’ils ne la saisissent pas. Et ils avaient peur de demander des explications à Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’accueil des « petits »
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 18.1-5 ; Mc 9.33-37)
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s’éleva entre eux une discussion : il s’agissait de savoir lequel était le plus grand parmi eux. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, qui connaissait les pensées qu’ils avaient dans leur cœur, prit un petit enfant par la main, le plaça à côté de lui '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et leur dit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui accueille cet enfant en mon nom m’accueille moi-même, et celui qui m’accueille, accueille aussi celui qui m’a envoyé. Car celui qui est le plus petit parmi vous, c’est celui-là qui est grand.
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mc 9.38-40)
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean prit la parole et dit : Maître, nous avons vu quelqu’un qui chassait les démons en ton nom, et nous lui avons dit de ne plus le faire, parce qu’il ne te suit pas avec nous.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si personne ne veut vous recevoir, quittez la ville en secouant la poussière de vos pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Secouer la poussière des pieds était un geste symbolique signifiant qu’on ne voulait plus avoir affaire avec les gens chez lesquels on avait séjourné.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ': cela constituera un témoignage contre eux.'
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Ne l’en empêchez pas,
    - type: text
      text: ' lui répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car celui qui n’est pas contre vous est pour vous.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Jésus se dirige vers Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’opposition en Samarie
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le temps approcha où Jésus devait être enlevé de ce monde, il décida de manière résolue de se rendre à Jérusalem. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya devant lui des messagers. En cours de route, ils entrèrent dans un village de la Samarie pour lui préparer un logement. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les Samaritains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Samaritains, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: qui étaient ennemis des Juifs depuis des siècles, ne voulaient pas que les pèlerins de Galilée qui se rendaient à Jérusalem traversent leur territoire.
      marker-yv: yv-n
    - type: text
      text: ' lui refusèrent l’hospitalité, parce qu’il se rendait à Jérusalem. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En voyant cela, ses disciples Jacques et Jean s’écrièrent : Seigneur, veux-tu que nous commandions à la foudre de tomber du ciel sur ces gens-là, pour les réduire en cendres'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Après '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour les réduire en cendres, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains manuscrits ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme le fit Elie.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus, se tournant vers eux, les reprit sévèrement : [Vous ne savez pas quel esprit vous inspire de telles pensées ! '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le Fils de l’homme n’est pas venu pour faire mourir les hommes, mais pour les sauver
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.56 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Vous ne savez pas… '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mais pour les sauver '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont absents de certains manuscrits.
      marker-yv: yv-n
    - type: text
      text: .]
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils se rendirent alors à un autre village.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’engagement total du disciple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 8.19-22)
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu’ils étaient en chemin, un homme vint dire à Jésus : Je te suivrai partout où tu iras.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les renards ont des tanières et les oiseaux du ciel ont des nids ; mais le Fils de l’homme n’a pas d’endroit où reposer sa tête.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à un autre : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suis-moi !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais cet homme lui dit : Seigneur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.59 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce terme est absent de nombreux manuscrits.
      marker-yv: yv-n
    - type: text
      text: ', permets que j’aille d’abord enterrer mon père.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi les disciples partirent. Ils allaient de village en village. Partout, ils annonçaient la Bonne Nouvelle de l’Evangile et guérissaient les malades.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hérode est intrigué
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.1-2 ; Mc 6.14-16)
    marker-yv: yv-h
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laisse à ceux qui sont morts le soin d’enterrer leurs morts. Quant à toi, va proclamer le royaume de Dieu !
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un autre encore lui dit : Je te suivrai, Seigneur, mais permets-moi d’abord de faire mes adieux à ma famille.'
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui regarde derrière lui au moment où il se met à labourer avec sa charrue n’est pas prêt pour le royaume de Dieu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hérode, le gouverneur de la province, apprit tout ce qui se passait. Il était embarrassé. En effet, certains disaient : C’est Jean-Baptiste qui est ressuscité ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’autres disaient : C’est Elie qui a reparu. D’autres encore : C’est un des prophètes d’autrefois qui est revenu à la vie.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Hérode se disait : Jean ? Je l’ai moi-même fait décapiter. Mais alors, qui est cet homme dont j’entends dire de si grandes choses ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il cherchait à le rencontrer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avec cinq pains et deux poissons
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 14.13-21 ; Mc 6.33-44 ; Jn 6.1-15)
    marker-yv: yv-h
