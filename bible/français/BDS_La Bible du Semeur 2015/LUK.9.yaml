document_id: LUK.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’envoi des Douze
  - type: heading
    content: (Mt 10.1-9, 11-14 ; Mc 6.7-13)
  - type: text
    content: 'Jésus réunit les Douze et leur donna le pouvoir et l’autorité de chasser tous les démons et de guérir les maladies. '
  '10':
  - type: text
    content: Les apôtres revinrent et racontèrent à Jésus tout ce qu’ils avaient fait. Il les prit alors avec lui et se retira à l’écart, du côté de la ville de Bethsaïda
  - type: note
    content: Localité de la rive nord du lac de Galilée.
  - type: text
    content: '. '
  '11':
  - type: text
    content: Mais les foules s’en aperçurent et le suivirent. Jésus leur fit bon accueil, il leur parla du royaume de Dieu et guérit ceux qui en avaient besoin.
  '12':
  - type: text
    content: 'Le jour commençait à baisser. Alors les Douze s’approchèrent de lui et lui dirent : Renvoie ces gens pour qu’ils aillent dans les villages et les hameaux des environs, où ils trouveront de quoi se loger et se ravitailler, car nous sommes ici dans un endroit désert.'
  '13':
  - type: text
    content: 'Mais Jésus leur dit : '
  - type: text
    content: Donnez-leur vous-mêmes à manger !
  - type: text
    content: – Mais, répondirent-ils, nous n’avons pas plus de cinq pains et deux poissons. Ou alors faut-il que nous allions acheter de la nourriture pour tout ce monde ?
  '14':
  - type: text
    content: Car il y avait bien là cinq mille hommes.
  - type: text
    content: 'Jésus dit à ses disciples : '
  - type: text
    content: Faites-les asseoir par groupes d’une cinquantaine de personnes.
  '15':
  - type: text
    content: 'C’est ce qu’ils firent, et ils installèrent ainsi tout le monde. '
  '16':
  - type: text
    content: 'Alors Jésus prit les cinq pains et les deux poissons, il leva les yeux vers le ciel et prononça la prière de bénédiction ; puis il les partagea et donna les morceaux à ses disciples pour qu’ils les distribuent à la foule. '
  '17':
  - type: text
    content: Tout le monde mangea à satiété. On ramassa les morceaux qui restaient ; cela faisait douze paniers.
  - type: heading
    content: Qui est vraiment Jésus ?
  - type: heading
    content: (Mt 16.13-21 ; Mc 8.27-31)
  '18':
  - type: text
    content: 'Un jour, Jésus priait à l’écart, et ses disciples étaient avec lui. Alors il les interrogea : '
  - type: text
    content: Que disent les foules à mon sujet ? Qui suis-je d’après elles ?
  '19':
  - type: text
    content: 'Ils lui répondirent : Pour les uns, tu es Jean-Baptiste ; pour d’autres, Elie ; pour d’autres encore, l’un des prophètes d’autrefois qui serait ressuscité.'
  '2':
  - type: text
    content: 'Ensuite il les envoya proclamer le royaume de Dieu et opérer des guérisons. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: – Et vous,
  - type: text
    content: ' leur demanda-t-il, '
  - type: text
    content: qui dites-vous que je suis ?
  - type: text
    content: 'Pierre prit la parole et dit : Le Messie, envoyé par Dieu.'
  '21':
  - type: text
    content: Jésus leur ordonna formellement de ne le dire à personne.
  '22':
  - type: text
    content: 'Et il ajouta : '
  - type: text
    content: 'Il faut que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' souffre beaucoup et soit rejeté par les responsables du peuple, les chefs des '
  - type: text
    content: prêtres
  - type: text
    content: ' et les '
  - type: text
    content: spécialistes de la Loi
  - type: text
    content: '  ; il doit être mis à mort et ressusciter le troisième jour.'
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: (Mt 16.24-28 ; Mc 8.34 à 9.1)
  '23':
  - type: text
    content: 'Puis, s’adressant à tous, il dit : '
  - type: text
    content: Si quelqu’un veut me suivre, qu’il renonce à lui-même, qu’il se charge chaque jour de sa croix, et qu’il me suive.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'En effet, celui qui est préoccupé de '
  - type: text
    content: sauver
  - type: text
    content: ' sa vie, la perdra ; mais celui qui perdra sa vie à cause de moi la sauvera.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Si un homme parvient à posséder le monde entier, à quoi cela lui sert-il s’il se perd ou se détruit lui-même ?
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Si quelqu’un a honte de moi et de mes paroles, le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ', à son tour, aura honte de lui quand il viendra dans sa gloire, dans celle du Père et des saints '
  - type: text
    content: anges
  - type: text
    content: .
  - type: text
    content: ' '
  '27':
  - type: text
    content: Je vous l’assure, quelques-uns de ceux qui sont ici présents ne mourront pas avant d’avoir vu le règne de Dieu.
  - type: heading
    content: La révélation du royaume
  - type: heading
    content: (Mt 17.1-8 ; Mc 9.2-8)
  '28':
  - type: text
    content: Environ huit jours après cet entretien, Jésus prit avec lui Pierre, Jean et Jacques et monta sur une montagne pour aller prier.
  '29':
  - type: text
    content: 'Pendant qu’il priait, son visage changea d’aspect et ses vêtements devinrent d’une blancheur éblouissante. '
  '3':
  - type: text
    content: 'Il leur donna les instructions suivantes : '
  - type: text
    content: 'Ne prenez rien pour le voyage : ni bâton, ni sac, ni provisions, ni argent. N’emportez pas de tunique de rechange.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Deux hommes s’entretenaient avec lui : Moïse et Elie'
  - type: note
    content: Moïse a donné la Loi au peuple. Elie était considéré comme le prophète par excellence. Ces deux hommes représentent toute l’ancienne alliance.
  - type: text
    content: ' '
  '31':
  - type: text
    content: qui resplendissaient de gloire. Ils parlaient de la manière dont Jésus allait achever sa mission
  - type: note
    content: Le grec parle du prochain exode de Jésus qui allait s’accomplir à Jérusalem.
  - type: text
    content: ' en mourant à Jérusalem.'
  '32':
  - type: text
    content: Pierre et ses compagnons étaient profondément endormis, mais quand ils s’éveillèrent
  - type: note
    content: 'Autre traduction : ils étaient accablés de sommeil mais se tinrent éveillés.'
  - type: text
    content: ', ils virent la gloire de Jésus et les deux hommes qui étaient avec lui.'
  '33':
  - type: text
    content: 'Au moment où ces hommes se séparaient de Jésus, Pierre lui dit : Maître, il est bon que nous soyons ici. Nous allons dresser trois tentes, une pour toi, une pour Moïse et une pour Elie.'
  - type: text
    content: 'En fait, il ne savait pas ce qu’il disait. '
  '34':
  - type: text
    content: Pendant qu’il parlait encore, une nuée se forma et les enveloppa, et les disciples furent saisis de crainte lorsqu’ils entrèrent dans la nuée.
  '35':
  - type: text
    content: 'Une voix sortit de la nuée, qui disait : Celui-ci est mon Fils, celui que j’ai choisi. Ecoutez-le !'
  '36':
  - type: text
    content: Quand cette voix eut retenti, ils ne trouvèrent plus que Jésus. Quant à eux, à cette époque, ils gardèrent le silence sur cet événement et ne racontèrent à personne ce qu’ils avaient vu.
  - type: heading
    content: La guérison d’un enfant habité par un démon
  - type: heading
    content: (Mt 17.14-18 ; Mc 9.14-27)
  '37':
  - type: text
    content: 'Le lendemain, comme ils descendaient de la montagne, une grande foule vint à la rencontre de Jésus. '
  '38':
  - type: text
    content: 'Du milieu de cette foule, un homme s’écria : Maître, je t’en supplie : regarde mon fils ! C’est mon enfant unique. '
  '39':
  - type: text
    content: 'Un esprit s’empare de lui, le fait crier tout à coup, l’agite convulsivement et le fait baver ; et il ne le quitte que difficilement, en le laissant tout meurtri. '
  '4':
  - type: text
    content: Si vous entrez dans une maison, restez-y jusqu’à ce que vous quittiez la localité.
  - type: text
    content: ' '
  '40':
  - type: text
    content: J’ai prié tes disciples de le chasser, mais ils n’y ont pas réussi.
  '41':
  - type: text
    content: 'Jésus s’exclama alors : '
  - type: text
    content: Gens incrédules et infidèles à Dieu ! Jusqu’à quand devrai-je encore rester avec vous et vous supporter ?
  - type: text
    content: 'Puis, s’adressant à l’homme : '
  - type: text
    content: Amène ton fils ici !
  '42':
  - type: text
    content: 'Pendant que l’enfant s’approchait, le démon le jeta par terre et l’agita de convulsions. Jésus commanda avec sévérité à l’esprit mauvais de sortir, il guérit le jeune garçon et le rendit à son père. '
  '43':
  - type: text
    content: Tous furent bouleversés devant la grandeur de Dieu.
  - type: heading
    content: L’annonce de la mort de Jésus
  - type: heading
    content: (Mt 17.22-23 ; Mc 9.30-32)
  - type: text
    content: 'Alors que chacun s’émerveillait encore de tout ce que Jésus faisait, il dit à ses disciples : '
  '44':
  - type: text
    content: 'Retenez bien ce que je vais vous dire maintenant : le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' va être livré aux mains des hommes.'
  '45':
  - type: text
    content: Mais les disciples ne comprenaient pas cette parole. Son sens leur était caché pour qu’ils ne la saisissent pas. Et ils avaient peur de demander des explications à Jésus.
  - type: heading
    content: L’accueil des « petits »
  - type: heading
    content: (Mt 18.1-5 ; Mc 9.33-37)
  '46':
  - type: text
    content: 'Il s’éleva entre eux une discussion : il s’agissait de savoir lequel était le plus grand parmi eux. '
  '47':
  - type: text
    content: 'Jésus, qui connaissait les pensées qu’ils avaient dans leur cœur, prit un petit enfant par la main, le plaça à côté de lui '
  '48':
  - type: text
    content: 'et leur dit : '
  - type: text
    content: Celui qui accueille cet enfant en mon nom m’accueille moi-même, et celui qui m’accueille, accueille aussi celui qui m’a envoyé. Car celui qui est le plus petit parmi vous, c’est celui-là qui est grand.
  - type: heading
    content: (Mc 9.38-40)
  '49':
  - type: text
    content: 'Jean prit la parole et dit : Maître, nous avons vu quelqu’un qui chassait les démons en ton nom, et nous lui avons dit de ne plus le faire, parce qu’il ne te suit pas avec nous.'
  '5':
  - type: text
    content: Si personne ne veut vous recevoir, quittez la ville en secouant la poussière de vos pieds
  - type: note
    content: Secouer la poussière des pieds était un geste symbolique signifiant qu’on ne voulait plus avoir affaire avec les gens chez lesquels on avait séjourné.
  - type: text
    content: ': cela constituera un témoignage contre eux.'
  '50':
  - type: text
    content: ' '
  - type: text
    content: – Ne l’en empêchez pas,
  - type: text
    content: ' lui répondit Jésus, '
  - type: text
    content: car celui qui n’est pas contre vous est pour vous.
  - type: heading
    content: Jésus se dirige vers Jérusalem
  - type: heading
    content: L’opposition en Samarie
  '51':
  - type: text
    content: 'Lorsque le temps approcha où Jésus devait être enlevé de ce monde, il décida de manière résolue de se rendre à Jérusalem. '
  '52':
  - type: text
    content: 'Il envoya devant lui des messagers. En cours de route, ils entrèrent dans un village de la Samarie pour lui préparer un logement. '
  '53':
  - type: text
    content: Mais les Samaritains
  - type: note
    content: Les Samaritains, qui étaient ennemis des Juifs depuis des siècles, ne voulaient pas que les pèlerins de Galilée qui se rendaient à Jérusalem traversent leur territoire.
  - type: text
    content: ' lui refusèrent l’hospitalité, parce qu’il se rendait à Jérusalem. '
  '54':
  - type: text
    content: 'En voyant cela, ses disciples Jacques et Jean s’écrièrent : Seigneur, veux-tu que nous commandions à la foudre de tomber du ciel sur ces gens-là, pour les réduire en cendres'
  - type: note
    content: 'Après pour les réduire en cendres, certains manuscrits ajoutent : comme le fit Elie.'
  - type: text
    content: '  ?'
  '55':
  - type: text
    content: 'Mais Jésus, se tournant vers eux, les reprit sévèrement : [Vous ne savez pas quel esprit vous inspire de telles pensées ! '
  '56':
  - type: text
    content: Le Fils de l’homme n’est pas venu pour faire mourir les hommes, mais pour les sauver
  - type: note
    content: 'Les mots : Vous ne savez pas… mais pour les sauver sont absents de certains manuscrits.'
  - type: text
    content: .]
  - type: text
    content: Ils se rendirent alors à un autre village.
  - type: heading
    content: L’engagement total du disciple
  - type: heading
    content: (Mt 8.19-22)
  '57':
  - type: text
    content: 'Pendant qu’ils étaient en chemin, un homme vint dire à Jésus : Je te suivrai partout où tu iras.'
  '58':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Les renards ont des tanières et les oiseaux du ciel ont des nids ; mais le Fils de l’homme n’a pas d’endroit où reposer sa tête.
  '59':
  - type: text
    content: 'Jésus dit à un autre : '
  - type: text
    content: Suis-moi !
  - type: text
    content: 'Mais cet homme lui dit : Seigneur'
  - type: note
    content: Ce terme est absent de nombreux manuscrits.
  - type: text
    content: ', permets que j’aille d’abord enterrer mon père.'
  '6':
  - type: text
    content: Ainsi les disciples partirent. Ils allaient de village en village. Partout, ils annonçaient la Bonne Nouvelle de l’Evangile et guérissaient les malades.
  - type: heading
    content: Hérode est intrigué
  - type: heading
    content: (Mt 14.1-2 ; Mc 6.14-16)
  '60':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Laisse à ceux qui sont morts le soin d’enterrer leurs morts. Quant à toi, va proclamer le royaume de Dieu !
  '61':
  - type: text
    content: 'Un autre encore lui dit : Je te suivrai, Seigneur, mais permets-moi d’abord de faire mes adieux à ma famille.'
  '62':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Celui qui regarde derrière lui au moment où il se met à labourer avec sa charrue n’est pas prêt pour le royaume de Dieu.
  '7':
  - type: text
    content: 'Hérode, le gouverneur de la province, apprit tout ce qui se passait. Il était embarrassé. En effet, certains disaient : C’est Jean-Baptiste qui est ressuscité ! '
  '8':
  - type: text
    content: 'D’autres disaient : C’est Elie qui a reparu. D’autres encore : C’est un des prophètes d’autrefois qui est revenu à la vie.'
  '9':
  - type: text
    content: 'Mais Hérode se disait : Jean ? Je l’ai moi-même fait décapiter. Mais alors, qui est cet homme dont j’entends dire de si grandes choses ?'
  - type: text
    content: Et il cherchait à le rencontrer.
  - type: heading
    content: Avec cinq pains et deux poissons
  - type: heading
    content: (Mt 14.13-21 ; Mc 6.33-44 ; Jn 6.1-15)
