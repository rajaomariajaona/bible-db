document_id: PSA.148
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dans le ciel et sur la terre
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: louez l’Eternel du haut des cieux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le, dans les hauteurs !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Louez-le, vous tous ses anges !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le, vous toutes ses armées !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Louez-le, soleil et lune !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, louez-le tous, ╵astres lumineux !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Louez-le, ô cieux des cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous aussi, nuages chargés d’eau ╵là-haut dans le ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '148.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 1.6-8
        metadata:
          usfm: GEN.1.6+GEN.1.7+GEN.1.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que tous ces êtres louent l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il a donné ses ordres ╵et ils ont été créés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il les a tous établis ╵pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il leur a fixé ╵des lois immuables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Louez l’Eternel ╵vous qui êtes sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous, monstres marins, ╵et vous tous, abîmes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: foudre, grêle, neige, brume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vents impétueux ╵qui exécutez ses ordres !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous, montagnes et collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: arbres fruitiers, tous les cèdres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: animaux sauvages ╵et tout le bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce qui rampe ou qui vole,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: rois du monde et tous les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les chefs et tous les dirigeants de la terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: jeunes gens et jeunes filles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vieillards et enfants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: qu’ils louent l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car lui seul est admirable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa majesté domine ╵la terre et le ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il a préparé ╵un puissant libérateur ╵pour son peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '148.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a rendu son peuple puissant.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un sujet de louange ╵pour tous ceux qui lui sont attachés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tous les Israélites, ╵peuple qui vit près de lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Eternel !
