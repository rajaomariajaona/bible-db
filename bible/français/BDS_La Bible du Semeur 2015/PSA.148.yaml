document_id: PSA.148,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dans le ciel et sur la terre
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: louez l’Eternel du haut des cieux !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, dans les hauteurs !
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: animaux sauvages ╵et tout le bétail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce qui rampe ou qui vole,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rois du monde et tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les chefs et tous les dirigeants de la terre,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jeunes gens et jeunes filles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vieillards et enfants,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’ils louent l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car lui seul est admirable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa majesté domine ╵la terre et le ciel.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a préparé ╵un puissant libérateur ╵pour son peuple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '148.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a rendu son peuple puissant.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un sujet de louange ╵pour tous ceux qui lui sont attachés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tous les Israélites, ╵peuple qui vit près de lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, vous tous ses anges !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, vous toutes ses armées !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, soleil et lune !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, louez-le tous, ╵astres lumineux !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, ô cieux des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous aussi, nuages chargés d’eau ╵là-haut dans le ciel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '148.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 1.6-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  !'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous ces êtres louent l’Eternel !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a donné ses ordres ╵et ils ont été créés.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les a tous établis ╵pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il leur a fixé ╵des lois immuables.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Eternel ╵vous qui êtes sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous, monstres marins, ╵et vous tous, abîmes,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foudre, grêle, neige, brume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vents impétueux ╵qui exécutez ses ordres !
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous, montagnes et collines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arbres fruitiers, tous les cèdres,
