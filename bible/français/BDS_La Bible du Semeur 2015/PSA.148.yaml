document_id: PSA.148,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dans le ciel et sur la terre
  - type: text
    content: Louez l’Eternel,
  - type: text
    content: louez l’Eternel du haut des cieux !
  - type: text
    content: Louez-le, dans les hauteurs !
  '10':
  - type: text
    content: animaux sauvages ╵et tout le bétail,
  - type: text
    content: tout ce qui rampe ou qui vole,
  '11':
  - type: text
    content: rois du monde et tous les peuples,
  - type: text
    content: les chefs et tous les dirigeants de la terre,
  '12':
  - type: text
    content: jeunes gens et jeunes filles,
  - type: text
    content: vieillards et enfants,
  '13':
  - type: text
    content: qu’ils louent l’Eternel !
  - type: text
    content: Car lui seul est admirable,
  - type: text
    content: et sa majesté domine ╵la terre et le ciel.
  '14':
  - type: text
    content: Il a préparé ╵un puissant libérateur ╵pour son peuple
  - type: note
    content: 'Autre traduction : il a rendu son peuple puissant.'
  - type: text
    content: .
  - type: text
    content: C’est un sujet de louange ╵pour tous ceux qui lui sont attachés,
  - type: text
    content: pour tous les Israélites, ╵peuple qui vit près de lui.
  - type: text
    content: Louez l’Eternel !
  '2':
  - type: text
    content: Louez-le, vous tous ses anges !
  - type: text
    content: Louez-le, vous toutes ses armées !
  '3':
  - type: text
    content: Louez-le, soleil et lune !
  - type: text
    content: Oui, louez-le tous, ╵astres lumineux !
  '4':
  - type: text
    content: Louez-le, ô cieux des cieux,
  - type: text
    content: vous aussi, nuages chargés d’eau ╵là-haut dans le ciel
  - type: note
    content: Voir Gn 1.6-8.
  - type: text
    content: '  !'
  '5':
  - type: text
    content: Que tous ces êtres louent l’Eternel !
  - type: text
    content: Car il a donné ses ordres ╵et ils ont été créés.
  '6':
  - type: text
    content: Il les a tous établis ╵pour toujours,
  - type: text
    content: il leur a fixé ╵des lois immuables.
  '7':
  - type: text
    content: Louez l’Eternel ╵vous qui êtes sur la terre,
  - type: text
    content: vous, monstres marins, ╵et vous tous, abîmes,
  '8':
  - type: text
    content: foudre, grêle, neige, brume,
  - type: text
    content: vents impétueux ╵qui exécutez ses ordres !
  '9':
  - type: text
    content: Vous, montagnes et collines,
  - type: text
    content: arbres fruitiers, tous les cèdres,
