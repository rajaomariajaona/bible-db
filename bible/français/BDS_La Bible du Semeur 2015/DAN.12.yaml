document_id: DAN.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Détresse et résurrection
  - type: text
    content: En ce temps-là, se lèvera Michel
  - type: note
    content: Voir 10.13 et note.
  - type: text
    content: ', le grand chef qui a pour mission d’aider ton peuple. Ce sera un temps de détresse tel qu’il n’y en a jamais eu depuis que des nations existent jusqu’à ce moment-là. En ce temps-là seront sauvés ceux de ton peuple dont le nom est inscrit dans le livre. '
  '10':
  - type: text
    content: 'Beaucoup seront purifiés, blanchis et éprouvés comme par le feu. Les méchants se conduiront avec perversité et aucun d’eux ne comprendra, mais ceux qui auront de la sagesse comprendront. '
  '11':
  - type: text
    content: Depuis le moment où l’on fera cesser le sacrifice perpétuel et où l’on installera l’abominable profanation
  - type: note
    content: Voir 9.27 ; 11.31.
  - type: text
    content: ' s’écouleront 1 290 jours.'
  '12':
  - type: text
    content: Heureux celui qui attendra et qui parviendra jusqu’au 1 335
  - type: text
    content: e
  - type: text
    content: ' jour ! '
  '13':
  - type: text
    content: Quant à toi, va jusqu’à la fin et tu entreras dans le repos. Puis, à la fin des temps, tu te relèveras pour recevoir la part qui t’est échue.
  '2':
  - type: text
    content: 'Les nombreux humains qui dorment dans la poussière de la terre se réveilleront, les uns pour la vie éternelle, les autres pour la honte et l’horreur éternelles. '
  '3':
  - type: text
    content: Les hommes qui auront eu de la sagesse resplendiront alors comme le firmament, ceux qui auront amené un grand nombre à être justes brilleront comme les étoiles, à toujours et à jamais.
  '4':
  - type: text
    content: Quant à toi, Daniel, tiens caché le sens de ces paroles et conserve le livre scellé jusqu’au temps de la fin. Alors, beaucoup l’étudieront et verront leur connaissance s’accroître.
  - type: heading
    content: La prophétie scellée
  '5':
  - type: text
    content: 'Moi, Daniel, je continuai à regarder et je vis deux autres personnages qui se tenaient là, chacun sur une rive du fleuve. '
  '6':
  - type: text
    content: 'L’un d’eux demanda à l’homme vêtu de lin qui se tenait au-dessus des eaux du fleuve : Quand donc viendra la fin de ces choses inouïes ?'
  '7':
  - type: text
    content: 'Alors l’homme vêtu de lin qui se tenait au-dessus des eaux du fleuve leva sa main droite et sa main gauche vers le ciel et je l’entendis déclarer : Je le jure par celui qui vit à jamais : ce sera dans un temps, deux temps et la moitié d’un temps'
  - type: note
    content: C’est-à-dire trois ans et demi. Voir 7.25 ; Ap 10.5-6 ; 12.14 ; 13.5-6.
  - type: text
    content: . Quand la force du peuple saint sera entièrement brisée, alors toutes ces choses s’achèveront.
  '8':
  - type: text
    content: 'J’entendis ces réponses sans les comprendre. C’est pourquoi je redemandai : Mon seigneur, quelle sera l’issue de tous ces événements ?'
  '9':
  - type: text
    content: 'Il me répondit : Va, Daniel, car le sens de ces paroles sera caché, elles seront scellées jusqu’au temps de la fin. '
