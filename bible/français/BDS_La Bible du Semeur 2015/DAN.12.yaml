document_id: DAN.12,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Détresse et résurrection
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: En ce temps-là, se lèvera Michel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '10.13'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ', le grand chef qui a pour mission d’aider ton peuple. Ce sera un temps de détresse tel qu’il n’y en a jamais eu depuis que des nations existent jusqu’à ce moment-là. En ce temps-là seront sauvés ceux de ton peuple dont le nom est inscrit dans le livre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Beaucoup seront purifiés, blanchis et éprouvés comme par le feu. Les méchants se conduiront avec perversité et aucun d’eux ne comprendra, mais ceux qui auront de la sagesse comprendront. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Depuis le moment où l’on fera cesser le sacrifice perpétuel et où l’on installera l’abominable profanation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 9.27 ; 11.31.
      marker-yv: yv-n
    - type: text
      text: ' s’écouleront 1 290 jours.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Heureux celui qui attendra et qui parviendra jusqu’au 1 335
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' jour ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Quant à toi, va jusqu’à la fin et tu entreras dans le repos. Puis, à la fin des temps, tu te relèveras pour recevoir la part qui t’est échue.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Les nombreux humains qui dorment dans la poussière de la terre se réveilleront, les uns pour la vie éternelle, les autres pour la honte et l’horreur éternelles. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les hommes qui auront eu de la sagesse resplendiront alors comme le firmament, ceux qui auront amené un grand nombre à être justes brilleront comme les étoiles, à toujours et à jamais.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Quant à toi, Daniel, tiens caché le sens de ces paroles et conserve le livre scellé jusqu’au temps de la fin. Alors, beaucoup l’étudieront et verront leur connaissance s’accroître.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La prophétie scellée
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moi, Daniel, je continuai à regarder et je vis deux autres personnages qui se tenaient là, chacun sur une rive du fleuve. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L’un d’eux demanda à l’homme vêtu de lin qui se tenait au-dessus des eaux du fleuve : Quand donc viendra la fin de ces choses inouïes ?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors l’homme vêtu de lin qui se tenait au-dessus des eaux du fleuve leva sa main droite et sa main gauche vers le ciel et je l’entendis déclarer : Je le jure par celui qui vit à jamais : ce sera dans un temps, deux temps et la moitié d’un temps'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire trois ans et demi. Voir 7.25 ; Ap 10.5-6 ; 12.14 ; 13.5-6.
      marker-yv: yv-n
    - type: text
      text: . Quand la force du peuple saint sera entièrement brisée, alors toutes ces choses s’achèveront.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'J’entendis ces réponses sans les comprendre. C’est pourquoi je redemandai : Mon seigneur, quelle sera l’issue de tous ces événements ?'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il me répondit : Va, Daniel, car le sens de ces paroles sera caché, elles seront scellées jusqu’au temps de la fin. '
