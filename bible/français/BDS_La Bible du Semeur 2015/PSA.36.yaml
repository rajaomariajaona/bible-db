document_id: PSA.36,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La bonté du Seigneur
  - type: text
    content: Au chef de chœur, de David, serviteur de l’Eternel.
  '10':
  - type: text
    content: Car chez toi ╵est la source de la vie.
  - type: text
    content: C’est dans ta lumière ╵que nous voyons la lumière.
  '11':
  - type: text
    content: Maintiens ton amour ╵à tous ceux qui te connaissent,
  - type: text
    content: manifeste ta justice ╵à ceux qui sont droits de cœur !
  '12':
  - type: text
    content: Que les orgueilleux ╵ne m’approchent pas,
  - type: text
    content: et que les méchants ╵ne me chassent pas !
  '13':
  - type: text
    content: 'Voici : déjà ils succombent, ╵ceux qui font le mal,'
  - type: text
    content: ils sont renversés, ╵sans pouvoir se relever.
  '2':
  - type: text
    content: En moi-même, je médite ╵sur ce que déclare ╵le méchant
  - type: note
    content: 'En moi-même, je médite: d’après le texte hébreu traditionnel. Certains manuscrits hébreux et de l’ancienne version grecque, la version syriaque ont : au fond de son cœur. Il faut alors comprendre : Ce que déclare le méchant dans son péché est au fond de son cœur.'
  - type: text
    content: ' dans son péché ;'
  - type: text
    content: lui, il n’a même pas peur de Dieu
  - type: note
    content: Cité en Rm 3.18.
  - type: text
    content: .
  '3':
  - type: text
    content: Il se considère ╵d’un œil trop flatteur
  - type: text
    content: pour reconnaître sa faute, ╵et la détester.
  '4':
  - type: text
    content: Les paroles de sa bouche ╵sont mensonge et tromperie ;
  - type: text
    content: il ne veut pas réfléchir ╵en vue de faire le bien.
  '5':
  - type: text
    content: La nuit, sur son lit, ╵il projette un mauvais coup.
  - type: text
    content: 'Il persiste dans la voie ╵qui n’est pas la bonne :'
  - type: text
    content: il ne veut pas rejeter le mal.
  '6':
  - type: text
    content: Jusqu’au ciel va ton amour, ╵Eternel,
  - type: text
    content: et jusqu’aux nuages ╵monte ta fidélité.
  '7':
  - type: text
    content: Ta justice est aussi haute ╵que les plus hautes montagnes.
  - type: text
    content: Tes jugements sont profonds ╵comme l’immense océan !
  - type: text
    content: Tu secours, ô Eternel, ╵et les hommes, et les bêtes.
  '8':
  - type: text
    content: Que ton amour est précieux, ô Dieu !
  - type: text
    content: Sous tes ailes, ╵les humains se réfugient.
  '9':
  - type: text
    content: Ils se restaurent de mets ╵généreux de ta maison.
  - type: text
    content: Au torrent de tes délices, ╵tu leur donnes à boire.
