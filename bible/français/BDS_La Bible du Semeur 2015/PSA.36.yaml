document_id: PSA.36,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La bonté du Seigneur
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur, de David, serviteur de l’Eternel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car chez toi ╵est la source de la vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est dans ta lumière ╵que nous voyons la lumière.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintiens ton amour ╵à tous ceux qui te connaissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: manifeste ta justice ╵à ceux qui sont droits de cœur !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les orgueilleux ╵ne m’approchent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les méchants ╵ne me chassent pas !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici : déjà ils succombent, ╵ceux qui font le mal,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont renversés, ╵sans pouvoir se relever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En moi-même, je médite ╵sur ce que déclare ╵le méchant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En moi-même, je médite
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après le texte hébreu traditionnel. Certains manuscrits hébreux et de l’ancienne version grecque, la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au fond de son cœur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il faut alors comprendre : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ce que déclare le méchant dans son péché est au fond de son cœur.
      marker-yv: yv-n
    - type: text
      text: ' dans son péché ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui, il n’a même pas peur de Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Rm 3.18
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se considère ╵d’un œil trop flatteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour reconnaître sa faute, ╵et la détester.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les paroles de sa bouche ╵sont mensonge et tromperie ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne veut pas réfléchir ╵en vue de faire le bien.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nuit, sur son lit, ╵il projette un mauvais coup.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il persiste dans la voie ╵qui n’est pas la bonne :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne veut pas rejeter le mal.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’au ciel va ton amour, ╵Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et jusqu’aux nuages ╵monte ta fidélité.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta justice est aussi haute ╵que les plus hautes montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes jugements sont profonds ╵comme l’immense océan !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu secours, ô Eternel, ╵et les hommes, et les bêtes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ton amour est précieux, ô Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous tes ailes, ╵les humains se réfugient.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se restaurent de mets ╵généreux de ta maison.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au torrent de tes délices, ╵tu leur donnes à boire.
