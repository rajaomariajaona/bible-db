document_id: DEU.12,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les clauses de l’alliance
  - type: heading
    content: Un seul sanctuaire
  - type: text
    content: Voici les ordonnances et les lois auxquelles vous obéirez et que vous appliquerez dans le pays que l’Eternel, le Dieu de vos ancêtres, vous donne en possession, aussi longtemps que vous y vivrez.
  '10':
  - type: text
    content: 'Vous allez traverser le Jourdain et vous habiterez le pays que l’Eternel votre Dieu vous donne comme patrimoine ; il vous fera connaître une existence paisible en vous délivrant de tous les ennemis qui vous entourent, et vous habiterez en toute sécurité dans le pays. '
  '11':
  - type: text
    content: 'Alors l’Eternel votre Dieu choisira un lieu pour y faire habiter son nom ; c’est là que vous apporterez tout ce que je vous ordonne : vos holocaustes, vos sacrifices, vos dîmes et vos offrandes prélevées sur le produit de votre travail et toutes les choses excellentes que vous offrirez à l’Eternel pour accomplir vos vœux. '
  '12':
  - type: text
    content: Vous vous réjouirez en présence de l’Eternel votre Dieu, vous, vos fils et vos filles, vos serviteurs et vos servantes et les lévites habitant dans vos villes, car ils n’ont reçu ni part, ni patrimoine foncier comme vous.
  '13':
  - type: text
    content: 'Gardez-vous d’offrir vos holocaustes dans n’importe quel lieu que vous trouverez. '
  '14':
  - type: text
    content: 'C’est uniquement dans le lieu que l’Eternel choisira dans l’une de vos tribus que vous offrirez vos holocaustes ; c’est là seulement que vous ferez tout ce que je vous prescris. '
  '15':
  - type: text
    content: 'Néanmoins vous pourrez à votre gré abattre des bêtes et en manger la viande dans toutes vos villes, selon les bénédictions que l’Eternel votre Dieu vous accordera. Celui qui sera rituellement pur comme celui qui ne le sera pas pourra en manger comme dans le cas de la gazelle ou du cerf. '
  '16':
  - type: text
    content: Seulement, vous ne mangerez pas le sang ; vous le répandrez sur la terre comme de l’eau
  - type: note
    content: Voir Gn 9.4 ; Lv 7.26-27 ; 17.10-14 ; Dt 15.23.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Par contre, vous ne pourrez pas consommer dans vos villes la dîme de votre blé, de votre vin nouveau et de votre huile, ni les premiers-nés de votre gros et de votre petit bétail, ni rien de ce que vous avez fait vœu d’offrir, ni vos dons spontanés, ni vos offrandes prélevées sur le fruit de votre travail. '
  '18':
  - type: text
    content: 'C’est seulement en présence de l’Eternel votre Dieu, dans le lieu qu’il choisira, que vous les mangerez, vous, vos fils, vos filles, vos serviteurs, vos servantes et les lévites qui résident dans vos villes, et vous vous réjouirez devant l’Eternel votre Dieu, de tous les produits de votre travail. '
  '19':
  - type: text
    content: Gardez-vous bien d’oublier les lévites, aussi longtemps que vous habiterez dans votre pays.
  '2':
  - type: text
    content: 'Vous ferez totalement disparaître tous les lieux où les gens des peuples que vous allez chasser ont adoré leurs dieux, sur les sommets des hautes montagnes et des collines et sous tout arbre verdoyant. '
  '20':
  - type: text
    content: 'Lorsque l’Eternel votre Dieu aura agrandi votre territoire comme il vous l’a promis et que vous aurez envie de manger de la viande, vous pourrez manger tout ce qui vous plaira. '
  '21':
  - type: text
    content: 'Si le lieu que l’Eternel votre Dieu choisira pour y établir sa présence est trop loin de chez vous, vous abattrez des bêtes de votre gros ou de votre petit bétail que vous aura donné l’Eternel, en faisant comme je vous l’ai ordonné, et vous pourrez manger tout ce qui vous plaira là où vous habiterez. '
  '22':
  - type: text
    content: 'Mais vous en mangerez comme on mange de la gazelle et du cerf ; ceux qui seront rituellement purs et ceux qui seront impurs, pourront en manger ensemble. '
  '23':
  - type: text
    content: Seulement, évitez avec soin d’en manger le sang, car le sang c’est la vie
  - type: note
    content: Voir Lv 17.10-14.
  - type: text
    content: ', et vous ne mangerez pas la vie avec la viande. '
  '24':
  - type: text
    content: 'Vous n’en mangerez pas, vous le répandrez sur la terre comme de l’eau. '
  '25':
  - type: text
    content: Vous n’en consommerez pas afin d’être heureux, vous et vos descendants après vous, pour avoir fait ce que l’Eternel considère comme juste.
  '26':
  - type: text
    content: 'Cependant, vous prendrez les animaux consacrés qui sont à vous et ce que vous avez fait vœu d’offrir, et vous les amènerez au lieu que l’Eternel choisira. '
  '27':
  - type: text
    content: Vous offrirez vos holocaustes avec la viande et le sang sur l’autel de l’Eternel votre Dieu ; le sang de vos autres sacrifices sera répandu sur l’autel de l’Eternel votre Dieu, et vous pourrez en manger la viande.
  '28':
  - type: text
    content: Retenez tous ces commandements que je vous donne et obéissez-y. Alors vous serez heureux, vous et vos descendants après vous pour toujours, parce que vous aurez fait ce que l’Eternel votre Dieu juge bon et juste.
  - type: heading
    content: Contre l’idolâtrie
  - type: heading
    content: N’imitez pas les peuples cananéens !
  '29':
  - type: text
    content: 'Lorsque l’Eternel votre Dieu aura fait disparaître les peuples chez qui vous vous rendez pour les déposséder, lorsque vous les aurez chassés et que vous serez installés dans leur pays, '
  '3':
  - type: text
    content: Vous démolirez leurs autels, vous briserez leurs stèles sacrées, vous brûlerez leurs pieux sacrés, vous mettrez en pièces les idoles de leurs dieux et vous effacerez leur souvenir de cette contrée
  - type: note
    content: Voir Dt 7.5.
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'gardez-vous bien de vous laisser prendre au piège en les imitant après leur extermination, et n’allez pas vous rallier à leurs divinités en disant : « Comment ces peuples adoraient-ils leurs dieux ? Nous voulons nous aussi faire comme eux. » '
  '31':
  - type: text
    content: Non, vous n’agirez pas ainsi envers l’Eternel votre Dieu. Car ces gens faisaient pour leurs dieux toutes sortes de choses que l’Eternel a en abomination et qu’il déteste ; ils allaient même jusqu’à brûler leurs fils et leurs filles en sacrifice à leurs dieux
  - type: note
    content: Voir Lv 18.21 et note.
  - type: text
    content: .
  '4':
  - type: text
    content: 'Vous agirez tout autrement à l’égard de l’Eternel votre Dieu. '
  '5':
  - type: text
    content: 'L’Eternel votre Dieu choisira un lieu au milieu des territoires de toutes vos tribus pour y établir sa présence et pour en faire sa demeure ; c’est là seulement que vous irez l’invoquer. '
  '6':
  - type: text
    content: 'Là, vous apporterez vos holocaustes et vos sacrifices, vos dîmes et vos offrandes prélevées sur le fruit de votre travail, celles que vous ferez pour accomplir un vœu, vos dons spontanés et les premiers-nés de votre gros et de votre petit bétail. '
  '7':
  - type: text
    content: Là aussi, vous prendrez vos repas cultuels en présence de l’Eternel votre Dieu, et vous vous réjouirez, vous et vos familles, de tous les produits de votre travail par lesquels l’Eternel votre Dieu vous aura bénis.
  '8':
  - type: text
    content: 'Vous n’agirez donc plus comme nous agissons ici aujourd’hui, où chacun fait ce qui lui semble bon. '
  '9':
  - type: text
    content: 'Car jusqu’à présent vous ne connaissez pas encore une existence paisible et vous n’avez pas encore reçu le patrimoine que l’Eternel votre Dieu va vous donner pour que vous meniez une existence paisible. '
