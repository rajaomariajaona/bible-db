document_id: JHN.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Du pain pour tous
  - type: heading
    content: (Mt 14.13-21 ; Mc 6.30-44 ; Lc 9.10-17)
  - type: text
    content: 'Après cela, Jésus passa sur l’autre rive du lac de Galilée (appelé aussi lac de Tibériade). '
  '10':
  - type: text
    content: ' '
  - type: text
    content: – Dites-leur à tous de s’asseoir,
  - type: text
    content: ' leur ordonna Jésus.'
  - type: text
    content: 'L’herbe était abondante à cet endroit et la foule s’installa donc par terre. Il y avait là environ cinq mille hommes. '
  '11':
  - type: text
    content: 'Jésus prit alors les pains, remercia Dieu, puis les fit distribuer à ceux qui avaient pris place sur l’herbe. Il leur donna aussi autant de poisson qu’ils en désiraient. '
  '12':
  - type: text
    content: 'Quand ils eurent tous mangé à leur faim, Jésus dit à ses disciples : '
  - type: text
    content: Ramassez les morceaux qui restent, pour que rien ne soit gaspillé.
  '13':
  - type: text
    content: Ils les ramassèrent donc et remplirent douze paniers avec ce qui restait des cinq pains d’orge qu’on avait mangés.
  '14':
  - type: text
    content: 'Lorsque tous ces gens-là virent le signe miraculeux de Jésus, ils s’écrièrent : Pas de doute : cet homme est vraiment le Prophète qui devait venir dans le monde.'
  '15':
  - type: text
    content: Mais Jésus, sachant qu’ils allaient l’enlever de force pour le proclamer roi, se retira de nouveau, tout seul, dans la montagne.
  - type: heading
    content: Jésus marche sur les eaux
  - type: heading
    content: (Mt 14.22-27 ; Mc 6.45-52)
  '16':
  - type: text
    content: 'A la tombée de la nuit, ses disciples redescendirent au bord du lac. '
  '17':
  - type: text
    content: 'Ils montèrent dans un bateau et se dirigèrent vers Capernaüm, sur l’autre rive. Il faisait déjà nuit et Jésus ne les avait pas encore rejoints. '
  '18':
  - type: text
    content: 'Un vent violent se mit à souffler, et le lac était très agité. '
  '19':
  - type: text
    content: 'Les disciples avaient déjà parcouru cinq ou six kilomètres, quand ils virent Jésus marcher sur l’eau et s’approcher de leur bateau. L’épouvante les saisit. '
  '2':
  - type: text
    content: 'Une foule immense le suivait, attirée par les guérisons miraculeuses dont elle avait été témoin. '
  '20':
  - type: text
    content: 'Mais Jésus leur dit : '
  - type: text
    content: C’est moi, n’ayez pas peur !
  '21':
  - type: text
    content: Ils voulurent alors le faire monter dans le bateau, et au même moment, ils touchèrent terre à l’endroit où ils voulaient aller.
  - type: heading
    content: Le pain qui fait vivre
  '22':
  - type: text
    content: 'Le lendemain, ceux qui étaient restés sur l’autre rive se rendirent compte qu’il n’y avait eu là qu’un seul bateau et que Jésus n’avait pas accompagné ses disciples ; ceux-ci étaient repartis seuls. '
  '23':
  - type: text
    content: 'Entre-temps, d’autres bateaux étaient arrivés de Tibériade, près de l’endroit où toute cette foule avait été nourrie après que le Seigneur eut remercié Dieu. '
  '24':
  - type: text
    content: Quand les gens virent que Jésus n’était pas là, et ses disciples non plus, ils montèrent dans ces bateaux pour aller à Capernaüm, à la recherche de Jésus.
  '25':
  - type: text
    content: 'Ils le trouvèrent de l’autre côté du lac et lui demandèrent : Maître, quand es-tu venu ici ?'
  '26':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Vraiment, je vous l’assure, si vous me cherchez, ce n’est pas parce que vous avez compris le sens de mes signes miraculeux. Non ! C’est parce que vous avez mangé du pain et que vous avez été rassasiés.
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Travaillez, non pour la nourriture périssable, mais pour celle qui dure pour la vie éternelle. Cette nourriture, c’est le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' qui vous la donnera, car Dieu le Père lui en a accordé le pouvoir en le marquant de son sceau'
  - type: text
    content: ' '
  - type: note
    content: Le sceau est une marque d’authenticité. Les miracles accomplis par Jésus authentifiaient l’origine divine de son ministère.
  - type: text
    content: .
  '28':
  - type: text
    content: – Et que devons-nous faire pour accomplir les œuvres que Dieu attend de nous ? lui demandèrent-ils encore.
  '29':
  - type: text
    content: ' '
  - type: text
    content: – L’œuvre de Dieu,
  - type: text
    content: ' leur répondit Jésus, '
  - type: text
    content: c’est que vous croyiez en celui qu’il a envoyé.
  '3':
  - type: text
    content: 'C’est pourquoi Jésus s’en alla dans la montagne et s’assit là avec ses disciples. '
  '30':
  - type: text
    content: 'Sur quoi, ils lui dirent : Quel signe miraculeux nous feras-tu voir pour que nous puissions croire en toi ? Que vas-tu faire ? '
  '31':
  - type: text
    content: Pendant qu’ils traversaient le désert, nos ancêtres ont mangé la manne
  - type: note
    content: Nourriture donnée par Dieu aux Israélites durant leur séjour dans le désert après la sortie d’Egypte. Voir Ex 16.15.
  - type: text
    content: ', comme le dit ce texte de l’Ecriture : '
  - type: text
    content: Il leur donna à manger un pain qui venait du ciel
  - type: note
    content: Ps 78.24.
  - type: text
    content: .
  '32':
  - type: text
    content: 'Mais Jésus leur répondit : Vraiment, je vous l’assure : '
  - type: text
    content: 'ce n’est pas '
  - type: text
    content: Moïse
  - type: text
    content: ' qui vous a donné le pain venu du ciel, c’est mon Père qui vous donne le pain du ciel, le vrai pain.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: Car le pain qui vient de Dieu, c’est celui qui descend du ciel et qui donne la vie au monde.
  '34':
  - type: text
    content: – Seigneur, dirent-ils alors, donne-nous toujours de ce pain-là.
  '35':
  - type: text
    content: 'Et Jésus répondit : '
  - type: text
    content: Moi, je suis le pain qui donne la vie. Celui qui vient à moi n’aura plus jamais faim, celui qui croit en moi n’aura plus jamais soif.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Mais je vous l’ai déjà dit : vous avez vu, et vous ne croyez pas.'
  '37':
  - type: text
    content: ' '
  - type: text
    content: Tous ceux que le Père me donne viendront à moi, et je ne repousserai pas celui qui vient à moi.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Car si je suis descendu du ciel, ce n’est pas pour faire ce qui me plaît, mais pour accomplir la volonté de celui qui m’a envoyé.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Or, celui qui m’a envoyé veut que je ne perde aucun de ceux qu’il m’a donnés, mais que je les ressuscite au dernier jour.
  - type: text
    content: ' '
  '4':
  - type: text
    content: La Pâque, la fête des Juifs était proche.
  '40':
  - type: text
    content: 'Oui, telle est la volonté de mon Père : que tous ceux qui tournent leurs regards vers le Fils et qui croient en lui, possèdent la vie éternelle, et moi, je les ressusciterai au dernier jour.'
  '41':
  - type: text
    content: 'Alors les gens se mirent à murmurer contre lui, parce qu’il avait dit : '
  - type: text
    content: « C’est moi qui suis le pain descendu du ciel. »
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Ils disaient : Voyons, n’est-ce pas Jésus, le fils de Joseph ? Nous connaissons bien son père et sa mère ! Comment peut-il prétendre qu’il est descendu du ciel ?'
  '43':
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Cessez donc de murmurer ainsi entre vous !
  - type: text
    content: ' '
  '44':
  - type: text
    content: Personne ne peut venir à moi si le Père qui m’a envoyé ne l’attire, et moi, je le ressusciterai au dernier jour.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Dans les écrits des '
  - type: text
    content: prophètes
  - type: text
    content: ', vous pouvez lire cette parole : '
  - type: text
    content: Dieu les instruira tous
  - type: note
    content: Es 54.13.
  - type: text
    content: . Tout homme qui écoute la voix du Père et qui est instruit par lui vient à moi.
  '46':
  - type: text
    content: ' '
  - type: text
    content: Personne n’a jamais vu le Père, sauf celui qui est venu d’auprès de Dieu. Lui, il a vu le Père.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Vraiment, je vous l’assure : celui qui croit a la vie éternelle,'
  - type: text
    content: ' '
  '48':
  - type: text
    content: car je suis le pain qui donne la vie.
  - type: text
    content: ' '
  '49':
  - type: text
    content: Vos ancêtres ont bien mangé la manne dans le désert et cela ne les a pas empêchés de mourir.
  '5':
  - type: text
    content: 'Jésus regarda autour de lui et vit une foule nombreuse venir à lui. Alors il demanda à Philippe : '
  - type: text
    content: Où pourrions-nous acheter assez de pains pour nourrir tout ce monde ?
  '50':
  - type: text
    content: ' '
  - type: text
    content: 'Mais c’est ici le pain qui descend du ciel : celui qui en mange ne mourra pas.'
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Moi, je suis le pain vivant descendu du ciel : si quelqu’un mange de ce pain-là, il vivra éternellement. Le pain que je donnerai pour que le monde vive, c’est mon propre corps'
  - type: note
    content: Jésus parle de sa mort ; il allait s’offrir en sacrifice pour le péché des hommes.
  - type: text
    content: .
  '52':
  - type: text
    content: 'A ces mots, les Juifs se mirent à discuter vivement entre eux, disant : Comment cet homme pourrait-il nous donner son corps à manger ?'
  '53':
  - type: text
    content: 'Alors Jésus leur dit : '
  - type: text
    content: 'Oui, vraiment, je vous l’assure : si vous ne mangez pas la chair du Fils de l’homme et si vous ne buvez pas son sang, vous n’aurez pas la vie en vous.'
  - type: text
    content: ' '
  '54':
  - type: text
    content: Celui qui se nourrit de ma chair et qui boit mon sang a la vie éternelle, et moi je le ressusciterai au dernier jour.
  - type: text
    content: ' '
  '55':
  - type: text
    content: Car ma chair est vraiment une nourriture et mon sang est vraiment un breuvage.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Celui qui mange ma chair et boit mon sang demeure en moi, et moi je demeure en lui.
  - type: text
    content: ' '
  '57':
  - type: text
    content: Le Père qui m’a envoyé a la vie en lui-même, et c’est lui qui me fait vivre ; ainsi, celui qui se nourrit de moi vivra lui aussi par moi.
  - type: text
    content: ' '
  '58':
  - type: text
    content: C’est ici le pain descendu du ciel. Il n’est pas comme celui que vos ancêtres ont mangé ; eux, ils sont morts ; mais celui qui mange ce pain-ci vivra pour toujours.
  '59':
  - type: text
    content: Voilà ce que déclara Jésus lorsqu’il enseigna dans la synagogue de Capernaüm.
  '6':
  - type: text
    content: Il ne lui posait cette question que pour voir ce qu’il allait répondre car, en réalité, il savait déjà ce qu’il allait faire.
  '60':
  - type: text
    content: 'Après l’avoir entendu, plusieurs de ses disciples dirent : Ce langage est bien difficile à accepter ! Qui peut continuer à l’écouter ?'
  '61':
  - type: text
    content: 'Jésus savait fort bien quels murmures ses paroles avaient soulevés parmi eux. C’est pourquoi il leur dit : '
  - type: text
    content: Cela vous choque-t-il ?
  - type: text
    content: ' '
  '62':
  - type: text
    content: Et si vous voyez le Fils de l’homme remonter là où il était auparavant ?
  - type: text
    content: ' '
  '63':
  - type: text
    content: C’est l’Esprit qui donne la vie ; la chair à elle seule ne sert à rien. Les paroles que je vous ai dites sont Esprit et vie
  - type: note
    content: 'D’autres comprennent : sont esprit et vie c’est-à-dire ont une signification spirituelle.'
  - type: text
    content: .
  - type: text
    content: ' '
  '64':
  - type: text
    content: Hélas, il y en a parmi vous qui ne croient pas.
  - type: text
    content: En effet, dès le début Jésus savait quels étaient ceux qui ne croyaient pas, et qui était celui qui allait le trahir.
  '65':
  - type: text
    content: 'Aussi ajouta-t-il : '
  - type: text
    content: 'C’est bien pour cela que je vous ai dit : Personne ne peut venir à moi si cela ne lui est accordé par le Père.'
  '66':
  - type: text
    content: A partir de ce moment-là, beaucoup de ses disciples l’abandonnèrent et cessèrent de l’accompagner.
  '67':
  - type: text
    content: 'Alors Jésus, se tournant vers les Douze, leur demanda : '
  - type: text
    content: Et vous, ne voulez-vous pas aussi partir ?
  '68':
  - type: text
    content: 'Mais Simon Pierre lui répondit : Seigneur, vers qui irions-nous ? Tu as les paroles de la vie éternelle. '
  '69':
  - type: text
    content: Nous, nous avons mis toute notre confiance en toi et nous savons que tu es le Saint, envoyé de Dieu.
  '7':
  - type: text
    content: – Rien que pour donner à chacun un petit morceau de pain, il faudrait au moins deux cents pièces d’argent
  - type: note
    content: Il s’agit de 200 deniers. Le denier équivalait au salaire d’une journée de travail (Mt 20.2).
  - type: text
    content: ', lui répondit Philippe.'
  '70':
  - type: text
    content: ' '
  - type: text
    content: – N’est-ce pas moi qui vous ai choisis tous les douze ?
  - type: text
    content: ' reprit Jésus. '
  - type: text
    content: Et pourtant, l’un de vous est un diable.
  '71':
  - type: text
    content: Par ces mots, il désignait Judas, fils de Simon Iscariot, l’un des Douze, qui allait le trahir.
  '8':
  - type: text
    content: 'Un autre disciple, André, frère de Simon Pierre, lui dit : '
  '9':
  - type: text
    content: Il y a ici un jeune garçon qui a cinq pains d’orge et deux poissons. Mais qu’est-ce que cela pour tant de monde ?
