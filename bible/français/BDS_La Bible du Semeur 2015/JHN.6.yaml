document_id: JHN.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Du pain pour tous
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 14.13-21 ; Mc 6.30-44 ; Lc 9.10-17)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus passa sur l’autre rive du lac de Galilée (appelé aussi lac de Tibériade). '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Une foule immense le suivait, attirée par les guérisons miraculeuses dont elle avait été témoin. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est pourquoi Jésus s’en alla dans la montagne et s’assit là avec ses disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La Pâque, la fête des Juifs était proche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus regarda autour de lui et vit une foule nombreuse venir à lui. Alors il demanda à Philippe : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Où pourrions-nous acheter assez de pains pour nourrir tout ce monde ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il ne lui posait cette question que pour voir ce qu’il allait répondre car, en réalité, il savait déjà ce qu’il allait faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: – Rien que pour donner à chacun un petit morceau de pain, il faudrait au moins deux cents pièces d’argent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '200 deniers. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'denier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: équivalait au salaire d’une journée de travail (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20.2
        metadata:
          usfm: MAT.20.2
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', lui répondit Philippe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un autre disciple, André, frère de Simon Pierre, lui dit : '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il y a ici un jeune garçon qui a cinq pains d’orge et deux poissons. Mais qu’est-ce que cela pour tant de monde ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Dites-leur à tous de s’asseoir,
  - type: text
    text: ' leur ordonna Jésus.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’herbe était abondante à cet endroit et la foule s’installa donc par terre. Il y avait là environ cinq mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus prit alors les pains, remercia Dieu, puis les fit distribuer à ceux qui avaient pris place sur l’herbe. Il leur donna aussi autant de poisson qu’ils en désiraient. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand ils eurent tous mangé à leur faim, Jésus dit à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ramassez les morceaux qui restent, pour que rien ne soit gaspillé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils les ramassèrent donc et remplirent douze paniers avec ce qui restait des cinq pains d’orge qu’on avait mangés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque tous ces gens-là virent le signe miraculeux de Jésus, ils s’écrièrent : Pas de doute : cet homme est vraiment le Prophète qui devait venir dans le monde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais Jésus, sachant qu’ils allaient l’enlever de force pour le proclamer roi, se retira de nouveau, tout seul, dans la montagne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur les eaux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 14.22-27 ; Mc 6.45-52)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A la tombée de la nuit, ses disciples redescendirent au bord du lac. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils montèrent dans un bateau et se dirigèrent vers Capernaüm, sur l’autre rive. Il faisait déjà nuit et Jésus ne les avait pas encore rejoints. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un vent violent se mit à souffler, et le lac était très agité. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les disciples avaient déjà parcouru cinq ou six kilomètres, quand ils virent Jésus marcher sur l’eau et s’approcher de leur bateau. L’épouvante les saisit. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est moi, n’ayez pas peur !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils voulurent alors le faire monter dans le bateau, et au même moment, ils touchèrent terre à l’endroit où ils voulaient aller.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pain qui fait vivre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le lendemain, ceux qui étaient restés sur l’autre rive se rendirent compte qu’il n’y avait eu là qu’un seul bateau et que Jésus n’avait pas accompagné ses disciples ; ceux-ci étaient repartis seuls. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Entre-temps, d’autres bateaux étaient arrivés de Tibériade, près de l’endroit où toute cette foule avait été nourrie après que le Seigneur eut remercié Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Quand les gens virent que Jésus n’était pas là, et ses disciples non plus, ils montèrent dans ces bateaux pour aller à Capernaüm, à la recherche de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils le trouvèrent de l’autre côté du lac et lui demandèrent : Maître, quand es-tu venu ici ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, si vous me cherchez, ce n’est pas parce que vous avez compris le sens de mes signes miraculeux. Non ! C’est parce que vous avez mangé du pain et que vous avez été rassasiés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Travaillez, non pour la nourriture périssable, mais pour celle qui dure pour la vie éternelle. Cette nourriture, c’est le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' qui vous la donnera, car Dieu le Père lui en a accordé le pouvoir en le marquant de son sceau'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sceau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est une marque d’authenticité. Les miracles accomplis par Jésus authentifiaient l’origine divine de son ministère.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: – Et que devons-nous faire pour accomplir les œuvres que Dieu attend de nous ? lui demandèrent-ils encore.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – L’œuvre de Dieu,
  - type: text
    text: ' leur répondit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: c’est que vous croyiez en celui qu’il a envoyé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Sur quoi, ils lui dirent : Quel signe miraculeux nous feras-tu voir pour que nous puissions croire en toi ? Que vas-tu faire ? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Pendant qu’ils traversaient le désert, nos ancêtres ont mangé la manne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nourriture donnée par Dieu aux Israélites durant leur séjour dans le désert après la sortie d’Egypte. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16.15
        metadata:
          usfm: EXO.16.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', comme le dit ce texte de l’Ecriture : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il leur donna à manger un pain qui venait du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78.24
        metadata:
          usfm: PSA.78.24
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais Jésus leur répondit : Vraiment, je vous l’assure : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'ce n’est pas '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Moïse
    - type: text
      text: ' qui vous a donné le pain venu du ciel, c’est mon Père qui vous donne le pain du ciel, le vrai pain.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car le pain qui vient de Dieu, c’est celui qui descend du ciel et qui donne la vie au monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: – Seigneur, dirent-ils alors, donne-nous toujours de ce pain-là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Et Jésus répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moi, je suis le pain qui donne la vie. Celui qui vient à moi n’aura plus jamais faim, celui qui croit en moi n’aura plus jamais soif.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais je vous l’ai déjà dit : vous avez vu, et vous ne croyez pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tous ceux que le Père me donne viendront à moi, et je ne repousserai pas celui qui vient à moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car si je suis descendu du ciel, ce n’est pas pour faire ce qui me plaît, mais pour accomplir la volonté de celui qui m’a envoyé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or, celui qui m’a envoyé veut que je ne perde aucun de ceux qu’il m’a donnés, mais que je les ressuscite au dernier jour.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Oui, telle est la volonté de mon Père : que tous ceux qui tournent leurs regards vers le Fils et qui croient en lui, possèdent la vie éternelle, et moi, je les ressusciterai au dernier jour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Alors les gens se mirent à murmurer contre lui, parce qu’il avait dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « C’est moi qui suis le pain descendu du ciel. »
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ils disaient : Voyons, n’est-ce pas Jésus, le fils de Joseph ? Nous connaissons bien son père et sa mère ! Comment peut-il prétendre qu’il est descendu du ciel ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cessez donc de murmurer ainsi entre vous !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne ne peut venir à moi si le Père qui m’a envoyé ne l’attire, et moi, je le ressusciterai au dernier jour.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Dans les écrits des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: ', vous pouvez lire cette parole : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu les instruira tous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.45 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 54.13
        metadata:
          usfm: ISA.54.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Tout homme qui écoute la voix du Père et qui est instruit par lui vient à moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne n’a jamais vu le Père, sauf celui qui est venu d’auprès de Dieu. Lui, il a vu le Père.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : celui qui croit a la vie éternelle,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car je suis le pain qui donne la vie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vos ancêtres ont bien mangé la manne dans le désert et cela ne les a pas empêchés de mourir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais c’est ici le pain qui descend du ciel : celui qui en mange ne mourra pas.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Moi, je suis le pain vivant descendu du ciel : si quelqu’un mange de ce pain-là, il vivra éternellement. Le pain que je donnerai pour que le monde vive, c’est mon propre corps'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jésus parle de sa mort ; il allait s’offrir en sacrifice pour le péché des hommes.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'A ces mots, les Juifs se mirent à discuter vivement entre eux, disant : Comment cet homme pourrait-il nous donner son corps à manger ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Alors Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Oui, vraiment, je vous l’assure : si vous ne mangez pas la chair du Fils de l’homme et si vous ne buvez pas son sang, vous n’aurez pas la vie en vous.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui se nourrit de ma chair et qui boit mon sang a la vie éternelle, et moi je le ressusciterai au dernier jour.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car ma chair est vraiment une nourriture et mon sang est vraiment un breuvage.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui mange ma chair et boit mon sang demeure en moi, et moi je demeure en lui.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le Père qui m’a envoyé a la vie en lui-même, et c’est lui qui me fait vivre ; ainsi, celui qui se nourrit de moi vivra lui aussi par moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est ici le pain descendu du ciel. Il n’est pas comme celui que vos ancêtres ont mangé ; eux, ils sont morts ; mais celui qui mange ce pain-ci vivra pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Voilà ce que déclara Jésus lorsqu’il enseigna dans la synagogue de Capernaüm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Après l’avoir entendu, plusieurs de ses disciples dirent : Ce langage est bien difficile à accepter ! Qui peut continuer à l’écouter ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Jésus savait fort bien quels murmures ses paroles avaient soulevés parmi eux. C’est pourquoi il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cela vous choque-t-il ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et si vous voyez le Fils de l’homme remonter là où il était auparavant ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est l’Esprit qui donne la vie ; la chair à elle seule ne sert à rien. Les paroles que je vous ai dites sont Esprit et vie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.63 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sont esprit et vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c’est-à-dire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ont une signification spirituelle.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hélas, il y en a parmi vous qui ne croient pas.
- type: usfm
  marker: p
  children:
  - type: text
    text: En effet, dès le début Jésus savait quels étaient ceux qui ne croyaient pas, et qui était celui qui allait le trahir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Aussi ajouta-t-il : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est bien pour cela que je vous ai dit : Personne ne peut venir à moi si cela ne lui est accordé par le Père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: A partir de ce moment-là, beaucoup de ses disciples l’abandonnèrent et cessèrent de l’accompagner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Alors Jésus, se tournant vers les Douze, leur demanda : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et vous, ne voulez-vous pas aussi partir ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Mais Simon Pierre lui répondit : Seigneur, vers qui irions-nous ? Tu as les paroles de la vie éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Nous, nous avons mis toute notre confiance en toi et nous savons que tu es le Saint, envoyé de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – N’est-ce pas moi qui vous ai choisis tous les douze ?
  - type: text
    text: ' reprit Jésus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et pourtant, l’un de vous est un diable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Par ces mots, il désignait Judas, fils de Simon Iscariot, l’un des Douze, qui allait le trahir.
