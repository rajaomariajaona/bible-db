document_id: LUK.INTRO1,21
type_code: fra
verses:
  '1':
  - type: text
    content: Introduction
  - type: text
    content: Cet évangile est la première partie d’un « ouvrage en deux volumes » qui comprend l’évangile et le livre des Actes. Luc l’a écrit, après enquête auprès des témoins oculaires, pour que son lecteur puisse « reconnaître l’entière véracité des enseignements reçus » (1.1-4). Ces deux récits sont adressés à un certain Théophile qui nous demeure inconnu.
  - type: text
    content: 'En revanche, d’autres textes nous renseignent sur l’identité de Luc : c’est un médecin de culture grecque, collaborateur de Paul, qu’il accompagna jusqu’à Rome (Col 4.14 ; Phm 24 ; 2 Tm 4.11). C’est probablement là qu’il écrivit cet évangile vers 62-65. Non-Juif, il s’adresse à des non-Juifs.'
  - type: text
    content: 'Comme Matthieu, Luc s’intéresse à la naissance miraculeuse de Jésus (chap. 1 et 2) : « Aujourd’hui est né votre Sauveur, dans la ville de David… » dit l’ange aux bergers (2.11), dévoilant déjà le sens de la venue de Jésus. Et, de fait, Jésus commence son ministère à Nazareth, en révélant qu’il accomplit la prophétie d’Esaïe qu’un Sauveur viendrait (Lc 4.16-21) !'
  - type: text
    content: 'Par de multiples guérisons du corps et de l’âme, Jésus authentifie sa mission : il « est venu chercher et sauver ce qui était perdu » (19.10). Encore faut-il que les hommes se reconnaissent malades ! C’est pourquoi on trouve dans la bouche de Jésus de nombreux avertissements aux riches de ce monde – « Si un homme parvient à posséder le monde entier, à quoi cela lui sert-il s’il se perd ou se détruit lui-même ? » (9.25) – et des encouragements aux petits de ce monde – « Heureux, vous qui êtes pauvres, car le royaume de Dieu vous appartient ! » (6.20).'
  - type: text
    content: 'Mais le salut passe par la croix ! En même temps qu’il proclame le salut, Jésus se prépare à l’accomplir : il monte à Jérusalem où il va mourir. Dès le chapitre 9, on voit croître l’opposition à son égard, qui culmine dans sa mise à mort (chap. 22 et 23).'
  - type: text
    content: 'Le chapitre 24 relate le dernier et le principal événement parmi tous ceux que les témoins oculaires ont transmis à Luc : la résurrection. Jésus ressuscité apparaît aux apôtres, à des femmes et à des disciples qui pleuraient sa mort, et il leur explique tout ce qui le concernait dans les Ecritures. Il les envoie annoncer à tous les hommes qu’il est le Sauveur !'
