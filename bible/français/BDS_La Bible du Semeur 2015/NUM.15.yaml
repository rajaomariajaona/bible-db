document_id: NUM.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les lois rituelles diverses
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les offrandes et les libations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux Israélites, et dis-leur : Lorsque vous serez arrivés dans le pays que je vais vous donner pour que vous y fassiez votre demeure, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et que vous voudrez m’offrir un sacrifice de gros ou de petit bétail consumé par le feu dont l’odeur apaisera l’Eternel – que ce soit un holocauste ou un sacrifice destiné à accomplir un vœu, un sacrifice volontaire, ou encore un sacrifice offert à l’occasion de l’une de vos fêtes religieuses – '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'vous y joindrez une offrande de trois kilogrammes de fleur de farine pétrie avec deux litres d’huile '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et une libation de deux litres de vin. Cette offrande de céréales et cette libation accompagneront chaque agneau offert en holocauste ou en sacrifice. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pour un bélier, vous ferez une offrande de six kilogrammes de fleur de farine pétrie avec deux litres et demi d’huile d’olive '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et une libation de deux litres et demi de vin. L’odeur de ces sacrifices que tu offriras ainsi apaisera l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si c’est un veau que vous offrez à l’Eternel soit en holocauste, soit comme sacrifice destiné à accomplir un vœu, soit comme sacrifice de communion, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'vous y adjoindrez une offrande de neuf kilogrammes de fleur de farine pétrie avec quatre litres d’huile '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: et une libation de quatre litres de vin. L’odeur de ces sacrifices consumés par le feu apaisera l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Chaque bœuf, chaque bélier, chaque agneau ou chevreau sera offert de cette manière. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quel que soit le nombre des victimes que vous offrirez, vous accompagnerez chacune d’elles de l’offrande de céréales et de la libation correspondantes. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Israélite de naissance suivra ces prescriptions pour offrir les sacrifices consumés par le feu dont l’odeur apaise l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et l’étranger séjournant parmi vous ou établi depuis plusieurs générations au milieu de vous procédera de la même manière que vous pour offrir un sacrifice consumé par le feu dont l’odeur apaise l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 14-16, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 24.22
        metadata:
          usfm: LEV.24.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La communauté aura un seul et même rituel, qui s’appliquera aux uns comme aux autres. Ce sera un rituel immuable pour les générations à venir, et il en sera de même pour vous et pour l’immigré, devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Une même loi et une même ordonnance vous régiront, vous et l’étranger qui réside parmi vous.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’offrande des premiers pains
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Eternel s’adressa à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dis aux Israélites : Lorsque vous serez arrivés au pays vers lequel je vous conduis, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et que vous mangerez du pain du pays, vous en prélèverez une offrande pour l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Offrandes qui revenaient aux prêtres et constituaient un apport important (comparer '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18.12'
        metadata:
          usfm: NUM.18.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quand vous cuirez votre pain, vous prélèverez la première miche que vous m’offrirez comme ce qu’on prélève sur la nouvelle récolte de blé. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Vous ferez ainsi une offrande à l’Eternel des premiers produits de vos fournées, de génération en génération.
- type: usfm
  marker: s2
  children:
  - type: text
    text: L’expiation de fautes commises par inadvertance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Supposons que vous négligiez par inadvertance d’obéir à l’un de ces commandements que j’ai communiqués à Moïse, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'à l’un de ces ordres que je vous ai transmis par son intermédiaire, à partir du jour où je les ai prescrits et par la suite, de génération en génération. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Si donc cette faute a été commise par inadvertance et qu’elle a échappé à la communauté, toute la communauté offrira un jeune taureau comme holocauste dont l’odeur apaisera l’Eternel – avec l’offrande et la libation prescrites – ainsi qu’un bouc en sacrifice pour le péché. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le prêtre fera le rite d’expiation pour toute la communauté des Israélites, et il leur sera pardonné, puisque c’est une faute commise par mégarde. Quand ils auront apporté leur sacrifice, un sacrifice consumé par le feu pour l’Eternel, et présenté leur sacrifice pour le péché devant moi, pour leur faute commise par inadvertance, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: il sera pardonné à toute la communauté des Israélites et à l’immigré installé au milieu d’eux, car c’est par inadvertance que tout le peuple aura commis cette faute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Si c’est une seule personne qui a commis une faute par inadvertance, elle offrira un chevreau dans sa première année en sacrifice pour le péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 27-28, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 4.27-31
        metadata:
          usfm: LEV.4.27+LEV.4.28+LEV.4.29+LEV.4.30+LEV.4.31
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le prêtre accomplira devant l’Eternel le rite d’expiation pour la personne qui a commis une faute par inadvertance. Une fois que le rite d’expiation sera accompli pour elle, il lui sera pardonné. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Une seule et même loi régira les Israélites nés dans le pays qui commettent une faute par inadvertance et les immigrés installés parmi eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais si quelqu’un commet délibérément une faute – qu’il soit autochtone ou immigré – il fait injure à l’Eternel et il sera retranché du milieu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Pour avoir méprisé la parole de l’Eternel et violé son commandement, il doit être retranché car il porte la responsabilité de sa faute.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le respect du sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Pendant leur séjour au désert, les Israélites trouvèrent un homme qui ramassait du bois le jour du sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ceux qui l’avaient surpris ainsi l’amenèrent devant Moïse, Aaron et toute la communauté. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils le tinrent sous bonne garde, car rien n’avait encore été prescrit quant à la peine qu’il fallait lui infliger. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’Eternel dit à Moïse : Cet homme doit être mis à mort, toute la communauté le lapidera à l’extérieur du camp.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Alors toute la communauté le fit sortir du camp et le lapida jusqu’à ce que mort s’ensuive comme l’Eternel l’avait ordonné à Moïse.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les prescriptions vestimentaires
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'L’Eternel dit à Moïse : '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Parle aux Israélites pour leur dire de se faire, eux et tous leurs descendants, des franges sur les bords de leurs vêtements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 22.12
        metadata:
          usfm: DEU.22.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' en passant dans chacune un cordon de pourpre violette. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ainsi, lorsque vous verrez ces franges, vous penserez à tous les commandements de l’Eternel pour les appliquer et vous ne vous égarerez pas en suivant les désirs de votre cœur et de vos yeux qui vous incitent à l’infidélité. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ainsi vous vous souviendrez de tous mes commandements, vous y obéirez, et vous serez saints pour votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Je suis l’Eternel, votre Dieu, qui vous ai fait sortir d’Egypte pour être votre Dieu. Oui, je suis l’Eternel, votre Dieu.
