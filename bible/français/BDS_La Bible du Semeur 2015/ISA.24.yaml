document_id: ISA.24,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur les bouleversements à venir
  - type: heading
    content: L’Eternel dévaste la terre
  - type: text
    content: Oui, l’Eternel ╵va dévaster la terre, ╵il va la ravager,
  - type: text
    content: en bouleverser la surface ; ╵il en dispersera ╵les habitants.
  '10':
  - type: text
    content: Elle est détruite, ╵la cité du néant.
  - type: text
    content: Toute demeure est close,
  - type: text
    content: on n’y peut plus entrer.
  '11':
  - type: text
    content: Dans les rues, on se plaint
  - type: text
    content: qu’il n’y ait plus de vin ;
  - type: text
    content: il n’y a plus de joie,
  - type: text
    content: toute allégresse ╵est bannie de la terre.
  '12':
  - type: text
    content: Il ne reste plus dans la ville ╵que la désolation ;
  - type: text
    content: sa porte est fracassée, ╵elle est en ruine.
  '13':
  - type: text
    content: Il en sera sur terre ╵parmi les peuples
  - type: text
    content: comme au gaulage des olives
  - type: text
    content: ou comme au grappillage des raisins ╵quand la vendange est terminée.
  - type: heading
    content: Louanges
  '14':
  - type: text
    content: Alors les survivants ╵élèveront la voix,
  - type: text
    content: ils pousseront des cris de joie
  - type: text
    content: pour acclamer ╵la majesté de l’Eternel ;
  - type: text
    content: ils chanteront de joie ╵à l’occident,
  '15':
  - type: text
    content: à l’orient, ╵ils proclameront la gloire de l’Eternel.
  - type: text
    content: La renommée de l’Eternel, ╵Dieu d’Israël,
  - type: text
    content: s’étendra jusqu’aux îles ╵et aux régions côtières.
  '16':
  - type: text
    content: Des confins de la terre,
  - type: text
    content: 'nous entendrons chanter :'
  - type: text
    content: « Honneur au Juste ».
  - type: heading
    content: Intervention divine contre les tyrans
  - type: text
    content: 'Mais moi je dis : ╵Je suis à bout, je suis à bout. ╵Malheur à moi !'
  - type: text
    content: Car les traîtres trahissent,
  - type: text
    content: oui, les traîtres trahissent ╵traîtreusement.
  '17':
  - type: text
    content: L’effroi, la fosse et le filet
  - type: text
    content: vous atteindront, ╵habitants de la terre
  - type: note
    content: Pour les v. 17-18, voir Jr 48.43-44.
  - type: text
    content: '  !'
  '18':
  - type: text
    content: Et il arrivera ╵que celui qui fuira ╵devant les cris d’effroi
  - type: text
    content: tombera dans la fosse.
  - type: text
    content: Qui remontera de la fosse
  - type: text
    content: sera pris au filet.
  - type: text
    content: Les écluses du ciel en haut ╵se sont ouvertes
  - type: note
    content: Allusion au déluge (voir Gn 7.11 ; 8.2) pour évoquer un jugement universel comparable.
  - type: text
    content: .
  - type: text
    content: Et les fondements de la terre ╵ont été ébranlés.
  '19':
  - type: text
    content: La terre se déchire
  - type: text
    content: et se fissure,
  - type: text
    content: elle vacille,
  '2':
  - type: text
    content: Un même sort atteint ╵le prêtre et le commun du peuple,
  - type: text
    content: le maître et son esclave,
  - type: text
    content: la dame et sa servante,
  - type: text
    content: vendeur et acheteur,
  - type: text
    content: emprunteur et prêteur,
  - type: text
    content: débiteur, créancier.
  '20':
  - type: text
    content: elle oscille et titube, ╵pareille à un ivrogne,
  - type: text
    content: et elle est ébranlée ╵tout comme une cabane,
  - type: text
    content: car le poids de son crime ╵pèse sur elle.
  - type: text
    content: Elle tombe et jamais ╵ne se relèvera.
  '21':
  - type: text
    content: Il adviendra, en ce jour-là, ╵que l’Eternel interviendra
  - type: text
    content: là-haut, contre l’armée d’en haut
  - type: text
    content: et contre les rois de ce monde ╵ici-bas sur la terre.
  '22':
  - type: text
    content: On les rassemblera
  - type: text
    content: captifs, tous dans la fosse ;
  - type: text
    content: ils seront enfermés ╵à l’intérieur d’une prison ;
  - type: text
    content: après un temps très long
  - type: text
    content: ils seront tous châtiés
  - type: note
    content: Allusion en Ap 20.3.
  - type: text
    content: .
  '23':
  - type: text
    content: La lune sera humiliée,
  - type: text
    content: et le soleil couvert de honte,
  - type: text
    content: car l’Eternel, ╵le Seigneur des armées célestes, règne
  - type: text
    content: sur le mont de Sion ╵et à Jérusalem.
  - type: text
    content: Il fera resplendir sa gloire ╵devant les responsables de son peuple
  - type: note
    content: Voir Ex 24.9-11 et Ap 4.2-4.
  - type: text
    content: .
  '3':
  - type: text
    content: La terre sera dévastée ╵totalement, ╵pillée de fond en comble,
  - type: text
    content: car l’Eternel lui-même ╵a prononcé cette sentence.
  '4':
  - type: text
    content: La terre se dessèche et se dégrade,
  - type: text
    content: le monde dépérit et se dégrade,
  - type: text
    content: les gens haut placés de la terre ╵dépérissent aussi.
  '5':
  - type: text
    content: La terre a été profanée ╵par ceux qui y habitent,
  - type: text
    content: car ils ont transgressé les lois,
  - type: text
    content: altéré les commandements
  - type: text
    content: et violé l’alliance éternelle
  - type: note
    content: Soit l’alliance conclue avec Noé (v. 1,18 ; voir Gn 7.10-11 ; 9.1-17), soit plutôt l’alliance créationnelle conclue avec Adam pour tous ses descendants (Gn 2 ; Os 6.7).
  - type: text
    content: .
  '6':
  - type: text
    content: A cause de cela, ╵la terre se consume ╵par la malédiction,
  - type: text
    content: ceux qui l’habitent ╵en portent la condamnation
  - type: text
    content: et c’est pourquoi ils se consument ;
  - type: text
    content: il n’en subsiste ╵qu’un petit nombre.
  '7':
  - type: text
    content: Le vin nouveau est triste,
  - type: text
    content: la vigne est languissante
  - type: text
    content: et tous les bons vivants ╵gémissent maintenant.
  '8':
  - type: text
    content: On n’entend plus le son ╵des joyeux tambourins,
  - type: text
    content: le bruit tumultueux ╵des gens en liesse a disparu
  - type: text
    content: et la musique allègre ╵de la lyre a cessé.
  '9':
  - type: text
    content: On ne boit plus de vin ╵en chantant des chansons,
  - type: text
    content: les boissons enivrantes ╵sont devenues amères ╵pour tous ceux qui les boivent.
