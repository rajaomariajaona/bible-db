document_id: ISA.24
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Sur les bouleversements à venir
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’Eternel dévaste la terre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oui, l’Eternel ╵va dévaster la terre, ╵il va la ravager,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en bouleverser la surface ; ╵il en dispersera ╵les habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Un même sort atteint ╵le prêtre et le commun du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le maître et son esclave,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la dame et sa servante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vendeur et acheteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: emprunteur et prêteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: débiteur, créancier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La terre sera dévastée ╵totalement, ╵pillée de fond en comble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel lui-même ╵a prononcé cette sentence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La terre se dessèche et se dégrade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le monde dépérit et se dégrade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les gens haut placés de la terre ╵dépérissent aussi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La terre a été profanée ╵par ceux qui y habitent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ont transgressé les lois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: altéré les commandements
- type: usfm
  marker: q1
  children:
  - type: text
    text: et violé l’alliance éternelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Soit l’alliance conclue avec Noé (v. 1,18 ; voir Gn 7.10-11 ; 9.1-17), soit plutôt l’alliance créationnelle conclue avec Adam pour tous ses descendants (Gn 2 ; Os 6.7).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A cause de cela, ╵la terre se consume ╵par la malédiction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui l’habitent ╵en portent la condamnation
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c’est pourquoi ils se consument ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’en subsiste ╵qu’un petit nombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le vin nouveau est triste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la vigne est languissante
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les bons vivants ╵gémissent maintenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: On n’entend plus le son ╵des joyeux tambourins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le bruit tumultueux ╵des gens en liesse a disparu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la musique allègre ╵de la lyre a cessé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On ne boit plus de vin ╵en chantant des chansons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les boissons enivrantes ╵sont devenues amères ╵pour tous ceux qui les boivent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Elle est détruite, ╵la cité du néant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute demeure est close,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on n’y peut plus entrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dans les rues, on se plaint
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu’il n’y ait plus de vin ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’y a plus de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute allégresse ╵est bannie de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il ne reste plus dans la ville ╵que la désolation ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa porte est fracassée, ╵elle est en ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il en sera sur terre ╵parmi les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme au gaulage des olives
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme au grappillage des raisins ╵quand la vendange est terminée.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Louanges
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors les survivants ╵élèveront la voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils pousseront des cris de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour acclamer ╵la majesté de l’Eternel ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils chanteront de joie ╵à l’occident,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: à l’orient, ╵ils proclameront la gloire de l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La renommée de l’Eternel, ╵Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’étendra jusqu’aux îles ╵et aux régions côtières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Des confins de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nous entendrons chanter :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Honneur au Juste ».
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention divine contre les tyrans
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais moi je dis : ╵Je suis à bout, je suis à bout. ╵Malheur à moi !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les traîtres trahissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, les traîtres trahissent ╵traîtreusement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’effroi, la fosse et le filet
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous atteindront, ╵habitants de la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 17-18, voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 48.43-44
        metadata:
          usfm: JER.48.43+JER.48.44
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et il arrivera ╵que celui qui fuira ╵devant les cris d’effroi
- type: usfm
  marker: q1
  children:
  - type: text
    text: tombera dans la fosse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui remontera de la fosse
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera pris au filet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les écluses du ciel en haut ╵se sont ouvertes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion au déluge (voir Gn 7.11 ; 8.2) pour évoquer un jugement universel comparable.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les fondements de la terre ╵ont été ébranlés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La terre se déchire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se fissure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle vacille,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: elle oscille et titube, ╵pareille à un ivrogne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle est ébranlée ╵tout comme une cabane,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le poids de son crime ╵pèse sur elle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle tombe et jamais ╵ne se relèvera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il adviendra, en ce jour-là, ╵que l’Eternel interviendra
- type: usfm
  marker: q1
  children:
  - type: text
    text: là-haut, contre l’armée d’en haut
- type: usfm
  marker: q1
  children:
  - type: text
    text: et contre les rois de ce monde ╵ici-bas sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: On les rassemblera
- type: usfm
  marker: q1
  children:
  - type: text
    text: captifs, tous dans la fosse ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront enfermés ╵à l’intérieur d’une prison ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: après un temps très long
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront tous châtiés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 20.3
        metadata:
          usfm: REV.20.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La lune sera humiliée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le soleil couvert de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l’Eternel, ╵le Seigneur des armées célestes, règne
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le mont de Sion ╵et à Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fera resplendir sa gloire ╵devant les responsables de son peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 24.9-11
        metadata:
          usfm: EXO.24.9+EXO.24.10+EXO.24.11
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 4.2-4
        metadata:
          usfm: REV.4.2+REV.4.3+REV.4.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
