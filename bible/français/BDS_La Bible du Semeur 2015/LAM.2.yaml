document_id: LAM.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Deuxième élégie : la colère de l’Éternel'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu a déversé sa colère sur Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Comment
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hélas !
      marker-yv: yv-n
    - type: text
      text: '  ! Dans sa colère, ╵le Seigneur a couvert'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les ténèbres ╵Dame Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a précipité ╵du ciel jusque sur terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la splendeur d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a même oublié ╵son marchepied
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 99.5 ; Mt 5.35.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de sa colère.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les responsables ╵du peuple de Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont assis sur le sol ╵et gardent le silence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont revêtu des habits ╵faits de toile de sac,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se sont jeté ╵de la poussière sur la tête
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gestes habituels du deuil ou de la tristesse (Ps 30.12 ; Jr 7.29).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jeunes filles de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: courbent la tête vers la terre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mes yeux s’épuisent à verser des larmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je suis tout bouleversé ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout courage me quitte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause du désastre ╵qui a atteint ╵la communauté de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause des petits enfants ╵et des nourrissons qui défaillent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les rues de la ville.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils disent à leur mère :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Où y a-t-il du pain ? ╵Où y a-t-il du vin ? »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voilà qui défaillent ╵comme blessés à mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les rues de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: perdant leur dernier souffle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le sein de leur mère.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Que te dirai-je ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui te comparer, ╵Dame Jérusalem ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourrais-je citer, ╵pour ta consolation, ╵qui te serait semblable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jeune femme Sion ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton désastre est immense ╵comme la grande mer ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui donc te guérira ?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tes prophètes ont eu pour toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des révélations mensongères ╵et insipides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n’ont pas dénoncé tes fautes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour t’éviter l’exil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Jr 2.8 ; 5.31 ; 23.9-40 ; Ez 13.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ils ont eu pour toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des révélations mensongères ╵et illusoires.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les passants, sur la route,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: battent des mains à ton sujet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils sifflent d’horreur ╵en hochant la tête à ta vue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dame Jérusalem :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'est-ce là cette ville ╵qu’on appelait jadis :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Beauté parfaite », ╵« Joie de toute la terre » ?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Vois : tous tes ennemis'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont ouvert largement ╵leur bouche contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sifflent, ils grincent des dents
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ils s’exclament : ╵« Nous l’avons engloutie,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est le jour que nous attendions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous y sommes, le voici enfin ! »
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L’Eternel a réalisé ╵tout ce qu’il avait résolu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a accompli sa parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce qu’il avait ordonné ╵depuis des temps anciens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire les menaces prévues par la Loi pour sanctionner les désobéissances du peuple de Dieu (Ex 20.5 ; Lv 26 ; Dt 28).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a tout démoli ╵sans aucune pitié.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a réjoui tes ennemis ╵à tes dépens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a accru leur puissance.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le cœur du peuple crie vers le Seigneur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Muraille de Dame Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: laisse couler tes larmes ╵jour et nuit comme un fleuve !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’accorde aucun relâche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ton œil n’ait pas de repos !
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Lève-toi donc ╵crie dans la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au début de toutes les veilles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Israélites partageaient la nuit en trois veilles.
      marker-yv: yv-n
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Epanche ton cœur comme l’eau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant la face du Seigneur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève les mains vers lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour la vie de tes nourrissons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui défaillent de faim
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tous les coins de rues.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le Seigneur, sans pitié, ╵a englouti
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les habitats de Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans son indignation, ╵il a démantelé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les villes fortifiées ╵du peuple de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a jeté à terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a profané ╵le royaume et ses princes.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Vois, Eternel, et considère :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui as-tu traité de la sorte ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se peut-il que des femmes ╵dévorent les enfants ╵qu’elles ont mis au monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les bébés qu’elles ont choyés ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se peut-il que l’on tue ╵les prêtres, les prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’au sein même ╵du sanctuaire du Seigneur ?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Les jeunes, les vieillards
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gisent à terre dans les rues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes jeunes filles et mes jeunes gens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont tombés par l’épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les as abattus au jour ╵où tu as fait éclater ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les as égorgés ╵sans aucune pitié.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Comme en un jour de fête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as convoqué contre moi ╵des gens qui sèment la terreur ╵de toutes parts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette expression rappelle celle du livre de Jérémie : « de toutes parts, c’est la terreur » (Jr 6.25 ; 20.3, 10 ; 46.5 ; 49.29).'
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour où la colère ╵de l’Eternel a éclaté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’y a eu ni rescapé ╵ni survivant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux que j’avais choyés, ╵que j’avais élevés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon ennemi ╵les a exterminés.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dans sa colère ardente, ╵il a brisé entièrement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la force d’Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il lui a retiré ╵le secours de sa droite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand venait l’ennemi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a allumé en Jacob ╵comme un brasier ardent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui consume tout à l’entour.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il a bandé son arc ╵tout comme un ennemi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a brandi sa droite ╵tout comme un assaillant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a massacré ╵tout ce qui charmait le regard.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a déversé son courroux ╵comme un feu sur la tente
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans laquelle vivait ╵la population de Sion.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le Seigneur a agi ╵en ennemi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a englouti Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a englouti tous ses palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et a détruit ses forteresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour le peuple de Juda, ╵il a multiplié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les douleurs et les plaintes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il a forcé sa haie ╵tout comme celle d’un jardin ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a détruit le lieu de la Rencontre ╵qui lui appartenait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En Sion, l’Eternel ╵a livré à l’oubli
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les jours de fête et de sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans sa colère indignée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a méprisé les rois et les prêtres.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le Seigneur a rejeté son autel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a dédaigné ╵son sanctuaire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a livré à l’ennemi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les murs des palais de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs voix ont retenti ╵dans le temple de l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme en un jour de fête.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’Eternel a résolu de détruire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les remparts de Dame Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour les niveler, ╵il a étendu le cordeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’a pas retiré sa main ╵avant de les avoir détruits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il fait mener le deuil ╵aux remparts et aux murs :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les voilà délabrés, ╵les uns comme les autres.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ses portes se sont effondrées à terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a détruit tous leurs verrous, ╵il les a fracassés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son roi et ses ministres ╵sont en exil ╵au sein de peuples étrangers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a plus de Loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
