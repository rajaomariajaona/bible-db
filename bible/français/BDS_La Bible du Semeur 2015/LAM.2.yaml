document_id: LAM.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Deuxième élégie : la colère de l’Éternel'
  - type: heading
    content: Dieu a déversé sa colère sur Israël
  - type: text
    content: Comment
  - type: note
    content: 'Autre traduction : hélas !'
  - type: text
    content: '  ! Dans sa colère, ╵le Seigneur a couvert'
  - type: text
    content: par les ténèbres ╵Dame Sion.
  - type: text
    content: Il a précipité ╵du ciel jusque sur terre
  - type: text
    content: la splendeur d’Israël.
  - type: text
    content: Il a même oublié ╵son marchepied
  - type: note
    content: Voir Ps 99.5 ; Mt 5.35.
  - type: text
    content: au jour de sa colère.
  '10':
  - type: text
    content: Les responsables ╵du peuple de Sion
  - type: text
    content: sont assis sur le sol ╵et gardent le silence.
  - type: text
    content: Ils ont revêtu des habits ╵faits de toile de sac,
  - type: text
    content: et ils se sont jeté ╵de la poussière sur la tête
  - type: note
    content: Gestes habituels du deuil ou de la tristesse (Ps 30.12 ; Jr 7.29).
  - type: text
    content: .
  - type: text
    content: Les jeunes filles de Jérusalem
  - type: text
    content: courbent la tête vers la terre.
  '11':
  - type: text
    content: Mes yeux s’épuisent à verser des larmes
  - type: text
    content: et je suis tout bouleversé ;
  - type: text
    content: tout courage me quitte
  - type: text
    content: à cause du désastre ╵qui a atteint ╵la communauté de mon peuple,
  - type: text
    content: à cause des petits enfants ╵et des nourrissons qui défaillent
  - type: text
    content: dans les rues de la ville.
  '12':
  - type: text
    content: 'Ils disent à leur mère :'
  - type: text
    content: « Où y a-t-il du pain ? ╵Où y a-t-il du vin ? »
  - type: text
    content: Les voilà qui défaillent ╵comme blessés à mort
  - type: text
    content: dans les rues de la ville,
  - type: text
    content: perdant leur dernier souffle
  - type: text
    content: sur le sein de leur mère.
  '13':
  - type: text
    content: Que te dirai-je ?
  - type: text
    content: A qui te comparer, ╵Dame Jérusalem ?
  - type: text
    content: Qui pourrais-je citer, ╵pour ta consolation, ╵qui te serait semblable,
  - type: text
    content: jeune femme Sion ?
  - type: text
    content: Ton désastre est immense ╵comme la grande mer ;
  - type: text
    content: qui donc te guérira ?
  '14':
  - type: text
    content: Tes prophètes ont eu pour toi
  - type: text
    content: des révélations mensongères ╵et insipides,
  - type: text
    content: ils n’ont pas dénoncé tes fautes
  - type: text
    content: pour t’éviter l’exil
  - type: note
    content: Voir Jr 2.8 ; 5.31 ; 23.9-40 ; Ez 13.
  - type: text
    content: .
  - type: text
    content: Oui, ils ont eu pour toi
  - type: text
    content: des révélations mensongères ╵et illusoires.
  '15':
  - type: text
    content: Les passants, sur la route,
  - type: text
    content: battent des mains à ton sujet,
  - type: text
    content: et ils sifflent d’horreur ╵en hochant la tête à ta vue,
  - type: text
    content: 'Dame Jérusalem :'
  - type: text
    content: 'est-ce là cette ville ╵qu’on appelait jadis :'
  - type: text
    content: « Beauté parfaite », ╵« Joie de toute la terre » ?
  '16':
  - type: text
    content: 'Vois : tous tes ennemis'
  - type: text
    content: ont ouvert largement ╵leur bouche contre toi,
  - type: text
    content: ils sifflent, ils grincent des dents
  - type: text
    content: 'et ils s’exclament : ╵« Nous l’avons engloutie,'
  - type: text
    content: c’est le jour que nous attendions,
  - type: text
    content: nous y sommes, le voici enfin ! »
  '17':
  - type: text
    content: L’Eternel a réalisé ╵tout ce qu’il avait résolu,
  - type: text
    content: il a accompli sa parole,
  - type: text
    content: tout ce qu’il avait ordonné ╵depuis des temps anciens
  - type: note
    content: C’est-à-dire les menaces prévues par la Loi pour sanctionner les désobéissances du peuple de Dieu (Ex 20.5 ; Lv 26 ; Dt 28).
  - type: text
    content: .
  - type: text
    content: Il a tout démoli ╵sans aucune pitié.
  - type: text
    content: Il a réjoui tes ennemis ╵à tes dépens,
  - type: text
    content: et il a accru leur puissance.
  '18':
  - type: text
    content: Le cœur du peuple crie vers le Seigneur.
  - type: text
    content: Muraille de Dame Sion,
  - type: text
    content: laisse couler tes larmes ╵jour et nuit comme un fleuve !
  - type: text
    content: Ne t’accorde aucun relâche.
  - type: text
    content: Que ton œil n’ait pas de repos !
  '19':
  - type: text
    content: Lève-toi donc ╵crie dans la nuit,
  - type: text
    content: au début de toutes les veilles
  - type: note
    content: Les Israélites partageaient la nuit en trois veilles.
  - type: text
    content: '  !'
  - type: text
    content: Epanche ton cœur comme l’eau
  - type: text
    content: devant la face du Seigneur !
  - type: text
    content: Lève les mains vers lui
  - type: text
    content: pour la vie de tes nourrissons
  - type: text
    content: qui défaillent de faim
  - type: text
    content: à tous les coins de rues.
  '2':
  - type: text
    content: Le Seigneur, sans pitié, ╵a englouti
  - type: text
    content: tous les habitats de Jacob.
  - type: text
    content: Dans son indignation, ╵il a démantelé
  - type: text
    content: les villes fortifiées ╵du peuple de Juda,
  - type: text
    content: il a jeté à terre
  - type: text
    content: et il a profané ╵le royaume et ses princes.
  '20':
  - type: text
    content: 'Vois, Eternel, et considère :'
  - type: text
    content: qui as-tu traité de la sorte ?
  - type: text
    content: Se peut-il que des femmes ╵dévorent les enfants ╵qu’elles ont mis au monde,
  - type: text
    content: les bébés qu’elles ont choyés ?
  - type: text
    content: Se peut-il que l’on tue ╵les prêtres, les prophètes
  - type: text
    content: jusqu’au sein même ╵du sanctuaire du Seigneur ?
  '21':
  - type: text
    content: Les jeunes, les vieillards
  - type: text
    content: gisent à terre dans les rues.
  - type: text
    content: Mes jeunes filles et mes jeunes gens
  - type: text
    content: sont tombés par l’épée.
  - type: text
    content: Tu les as abattus au jour ╵où tu as fait éclater ta colère,
  - type: text
    content: tu les as égorgés ╵sans aucune pitié.
  '22':
  - type: text
    content: Comme en un jour de fête,
  - type: text
    content: tu as convoqué contre moi ╵des gens qui sèment la terreur ╵de toutes parts
  - type: note
    content: 'Cette expression rappelle celle du livre de Jérémie : « de toutes parts, c’est la terreur » (Jr 6.25 ; 20.3, 10 ; 46.5 ; 49.29).'
  - type: text
    content: .
  - type: text
    content: Au jour où la colère ╵de l’Eternel a éclaté,
  - type: text
    content: il n’y a eu ni rescapé ╵ni survivant.
  - type: text
    content: Ceux que j’avais choyés, ╵que j’avais élevés,
  - type: text
    content: mon ennemi ╵les a exterminés.
  '3':
  - type: text
    content: Dans sa colère ardente, ╵il a brisé entièrement
  - type: text
    content: la force d’Israël.
  - type: text
    content: Il lui a retiré ╵le secours de sa droite
  - type: text
    content: quand venait l’ennemi.
  - type: text
    content: Il a allumé en Jacob ╵comme un brasier ardent
  - type: text
    content: qui consume tout à l’entour.
  '4':
  - type: text
    content: Il a bandé son arc ╵tout comme un ennemi.
  - type: text
    content: Il a brandi sa droite ╵tout comme un assaillant
  - type: text
    content: et il a massacré ╵tout ce qui charmait le regard.
  - type: text
    content: Il a déversé son courroux ╵comme un feu sur la tente
  - type: text
    content: dans laquelle vivait ╵la population de Sion.
  '5':
  - type: text
    content: Le Seigneur a agi ╵en ennemi.
  - type: text
    content: Il a englouti Israël,
  - type: text
    content: a englouti tous ses palais,
  - type: text
    content: et a détruit ses forteresses.
  - type: text
    content: Et pour le peuple de Juda, ╵il a multiplié
  - type: text
    content: les douleurs et les plaintes.
  '6':
  - type: text
    content: Il a forcé sa haie ╵tout comme celle d’un jardin ;
  - type: text
    content: il a détruit le lieu de la Rencontre ╵qui lui appartenait.
  - type: text
    content: En Sion, l’Eternel ╵a livré à l’oubli
  - type: text
    content: les jours de fête et de sabbat,
  - type: text
    content: et dans sa colère indignée,
  - type: text
    content: il a méprisé les rois et les prêtres.
  '7':
  - type: text
    content: Le Seigneur a rejeté son autel,
  - type: text
    content: et il a dédaigné ╵son sanctuaire.
  - type: text
    content: Il a livré à l’ennemi
  - type: text
    content: les murs des palais de Sion,
  - type: text
    content: leurs voix ont retenti ╵dans le temple de l’Eternel
  - type: text
    content: comme en un jour de fête.
  '8':
  - type: text
    content: L’Eternel a résolu de détruire
  - type: text
    content: les remparts de Dame Sion.
  - type: text
    content: Et pour les niveler, ╵il a étendu le cordeau,
  - type: text
    content: il n’a pas retiré sa main ╵avant de les avoir détruits.
  - type: text
    content: 'Il fait mener le deuil ╵aux remparts et aux murs :'
  - type: text
    content: les voilà délabrés, ╵les uns comme les autres.
  '9':
  - type: text
    content: Ses portes se sont effondrées à terre.
  - type: text
    content: Il a détruit tous leurs verrous, ╵il les a fracassés.
  - type: text
    content: Son roi et ses ministres ╵sont en exil ╵au sein de peuples étrangers.
  - type: text
    content: Il n’y a plus de Loi,
  - type: text
    content: et ses prophètes
  - type: text
    content: ne reçoivent plus de révélations ╵de l’Eternel.
