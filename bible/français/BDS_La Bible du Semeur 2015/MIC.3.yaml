document_id: MIC.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les chefs du peuple
  - type: text
    content: 'Je dis : ╵Ecoutez donc, chefs de Jacob,'
  - type: text
    content: et vous qui gouvernez ╵le peuple d’Israël.
  - type: text
    content: Ne devriez-vous pas ╵bien connaître le droit ?
  '10':
  - type: text
    content: vous qui bâtissez Sion ╵en répandant le sang, ╵et Jérusalem par l’iniquité.
  '11':
  - type: text
    content: Ses chefs rendent leurs jugements ╵contre des pots-de-vin,
  - type: text
    content: et ses prêtres se font payer ╵pour dispenser l’enseignement,
  - type: text
    content: et ses prophètes ╵prédisent l’avenir ╵pour de l’argent.
  - type: text
    content: Et ils s’appuient sur l’Eternel
  - type: text
    content: 'en disant : « L’Eternel, ╵n’est-il pas au milieu de nous ?'
  - type: text
    content: Par conséquent, aucun malheur ╵ne pourra nous atteindre. »
  '12':
  - type: text
    content: Aussi, par votre faute,
  - type: text
    content: Sion sera ╵labourée comme un champ,
  - type: text
    content: et Jérusalem deviendra ╵un tas de ruines ;
  - type: text
    content: le mont du Temple ╵sera une colline ╵couverte de broussailles
  - type: note
    content: Cité en Jr 26.18.
  - type: text
    content: .
  '2':
  - type: text
    content: Vous détestez le bien
  - type: text
    content: et vous aimez le mal.
  - type: text
    content: Vous arrachez la peau ╵des membres de mon peuple, ╵vous arrachez la chair ╵qui leur couvre les os.
  '3':
  - type: text
    content: Vous dévorez leur chair,
  - type: text
    content: et vous les dépecez,
  - type: text
    content: vous leur brisez les os
  - type: text
    content: et les mettez en pièces,
  - type: text
    content: tout comme des morceaux ╵qu’on met dans la marmite,
  - type: text
    content: oui, comme de la viande ╵qu’on met dans le chaudron.
  '4':
  - type: text
    content: Voilà pourquoi, ╵quand ils crieront vers l’Eternel,
  - type: text
    content: lui, il ne leur répondra pas.
  - type: text
    content: Mais il se détournera d’eux
  - type: text
    content: à cause du mal qu’ils ont fait.
  - type: heading
    content: Contre les faux prophètes
  '5':
  - type: text
    content: Voici ce que dit l’Eternel ╵des faux prophètes
  - type: text
    content: 'qui égarent mon peuple :'
  - type: text
    content: Ils prédisent la paix
  - type: text
    content: à qui met sous leurs dents ╵un bon morceau à mordre,
  - type: text
    content: et annoncent la guerre
  - type: text
    content: à qui ne remplit pas leur bouche.
  '6':
  - type: text
    content: A cause de cela, ╵vous serez dans la nuit ╵sans avoir de visions ;
  - type: text
    content: 'ce seront les ténèbres : ╵finies les prédictions.'
  - type: text
    content: Oui, le soleil se couchera ╵sur ces prophètes,
  - type: text
    content: le jour s’obscurcira pour eux.
  '7':
  - type: text
    content: Ceux qui ont des révélations ╵seront couverts de honte,
  - type: text
    content: et les devins perdront la face.
  - type: text
    content: Ils se couvriront le visage,
  - type: text
    content: car Dieu ne leur répondra pas.
  '8':
  - type: text
    content: Mais moi, ╵grâce à l’Esprit de l’Eternel,
  - type: text
    content: je suis rempli de force,
  - type: text
    content: d’équité, de vaillance
  - type: text
    content: pour dénoncer ╵sa révolte à Jacob
  - type: text
    content: et à Israël son péché.
  '9':
  - type: text
    content: Ecoutez donc ceci,
  - type: text
    content: chefs du peuple issu de Jacob
  - type: text
    content: et vous qui gouvernez ╵le peuple d’Israël,
  - type: text
    content: qui détestez le droit, ╵qui corrompez toute justice ;
