document_id: MIC.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les chefs du peuple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je dis : ╵Ecoutez donc, chefs de Jacob,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous qui gouvernez ╵le peuple d’Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne devriez-vous pas ╵bien connaître le droit ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vous détestez le bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous aimez le mal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous arrachez la peau ╵des membres de mon peuple, ╵vous arrachez la chair ╵qui leur couvre les os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous dévorez leur chair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous les dépecez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous leur brisez les os
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les mettez en pièces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme des morceaux ╵qu’on met dans la marmite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, comme de la viande ╵qu’on met dans le chaudron.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voilà pourquoi, ╵quand ils crieront vers l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui, il ne leur répondra pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il se détournera d’eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du mal qu’ils ont fait.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Contre les faux prophètes
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voici ce que dit l’Eternel ╵des faux prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui égarent mon peuple :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils prédisent la paix
- type: usfm
  marker: q1
  children:
  - type: text
    text: à qui met sous leurs dents ╵un bon morceau à mordre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et annoncent la guerre
- type: usfm
  marker: q1
  children:
  - type: text
    text: à qui ne remplit pas leur bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A cause de cela, ╵vous serez dans la nuit ╵sans avoir de visions ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce seront les ténèbres : ╵finies les prédictions.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, le soleil se couchera ╵sur ces prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour s’obscurcira pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ceux qui ont des révélations ╵seront couverts de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les devins perdront la face.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se couvriront le visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu ne leur répondra pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais moi, ╵grâce à l’Esprit de l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis rempli de force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d’équité, de vaillance
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour dénoncer ╵sa révolte à Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à Israël son péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ecoutez donc ceci,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chefs du peuple issu de Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous qui gouvernez ╵le peuple d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui détestez le droit, ╵qui corrompez toute justice ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: vous qui bâtissez Sion ╵en répandant le sang, ╵et Jérusalem par l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ses chefs rendent leurs jugements ╵contre des pots-de-vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses prêtres se font payer ╵pour dispenser l’enseignement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses prophètes ╵prédisent l’avenir ╵pour de l’argent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils s’appuient sur l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en disant : « L’Eternel, ╵n’est-il pas au milieu de nous ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par conséquent, aucun malheur ╵ne pourra nous atteindre. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aussi, par votre faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sion sera ╵labourée comme un champ,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Jérusalem deviendra ╵un tas de ruines ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le mont du Temple ╵sera une colline ╵couverte de broussailles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 26.18
        metadata:
          usfm: JER.26.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
