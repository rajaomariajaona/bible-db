document_id: 1CH.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Ruben
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ruben était le premier-né d’Israël, mais parce qu’il avait eu des relations sexuelles avec l’une des femmes de son père, son droit d’aînesse fut donné aux fils de Joseph, fils d’Israël ; ainsi Ruben ne fut pas recensé comme l’aîné
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ruben '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et sa faute, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 35.22
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Du temps de Saül, ils firent la guerre aux Agaréniens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir v. 19-22. Soit les descendants d’Ismaël, fils de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Agar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l’esclave d’Abraham (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 16
        - type: text
          text: ), l’ancêtre des Arabes, soit un groupe composé d’Araméens, mentionné dans des inscriptions assyriennes (27.31 ; Ps 83.5-8).
      marker-yv: yv-n
    - type: text
      text: ', qui furent vaincus par eux ; ils s’installèrent dans leurs habitations dans la partie orientale de Galaad.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Gad
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les descendants de Gad habitaient sur le plateau du Basan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Région montagneuse à l’est du lac de Galilée.
      marker-yv: yv-n
    - type: text
      text: ' et jusqu’à Salka. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le groupe familial le plus important fut celui de Joël, puis, en deuxième, celui de Shapham, puis celui de Yaenaï et celui de Shaphath. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il y avait à côté d’eux sept groupes familiaux : ceux de Michaël, Meshoullam, Shéba, Yoraï, Yaekan, Zia et Eber. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ils étaient les fils d’Abihaïl, fils de Houri, dont les ascendants en ligne directe étaient Yaroah, Galaad, Michaël, Yeshishaï, Yahdo et Bouz. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ahi, fils d’Abdiel et petit-fils de Gouni, était le chef de leurs groupes familiaux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ils habitaient en Galaad, en Basan et dans les localités qui en dépendent, ainsi que dans tous les pâturages du Sarôn jusqu’à leur extrême limite. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ils furent tous recensés dans les généalogies, du temps de Yotam, roi de Juda, et du temps de Jéroboam, roi d’Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il s’agit de Jéroboam II (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 14.23-29
        - type: text
          text: '). Sur Yotam de Juda, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.32-38
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Les membres des tribus de Ruben, de Gad et de la demi-tribu de Manassé avaient 44 760 hommes valeureux capables de manier le bouclier et l’épée, ou tirant à l’arc. Ils étaient exercés à la guerre et prêts à combattre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils firent la guerre aux Agaréniens et à Yetour, Naphish et Nodab. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Juda fut puissant parmi ses frères, et de lui est issu le prince d’Israël, mais le droit d’aînesse appartenait à Joseph
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 49.8-10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dieu les secourut et leur donna la victoire sur les Agaréniens et tous leurs alliés, parce qu’ils l’en avaient imploré pendant la bataille. Il les exauça parce qu’ils lui avaient fait confiance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ils s’emparèrent de tout leur bétail, à savoir : 50 000 chameaux, 250 000 moutons et chèvres et 2 000 ânes ; de plus, ils firent 100 000 prisonniers. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Beaucoup d’ennemis furent aussi tués, car ce combat était entre les mains de Dieu. Ils s’installèrent à leur place et y demeurèrent jusqu’à l’exil.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Manassé
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Les descendants de la demi-tribu de Manassé habitaient dans le pays qui allait du Basan à Baal-Hermon, Senir et la montagne de l’Hermon ; ils étaient nombreux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Voici les noms des chefs de leurs groupes familiaux : Epher, Yisheï, Eliel, Azriel, Jérémie, Hodavia et Yahdiel ; ces chefs de leurs groupes familiaux étaient tous des hommes de guerre valeureux, des gens renommés.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mais, par la suite, les descendants de ces tribus furent infidèles au Dieu de leurs ancêtres et se prostituèrent aux dieux des peuples du pays, que Dieu avait détruits devant eux.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: C’est pourquoi le Dieu d’Israël incita le roi d’Assyrie Poul, c’est-à-dire Tiglath-Piléser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tiglath-Pilnéser. Poul '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est le nom d’intronisation à Babylone de ce même roi.
      marker-yv: yv-n
    - type: text
      text: ' roi d’Assyrie, à déporter les membres des tribus de Ruben, de Gad et de la demi-tribu de Manassé : il les exila à Halah, Habor et Hara, et sur les rives du fleuve de Gozân, où ils sont demeurés jusqu’à ce jour'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2 R 15.19 ; 17.6.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les descendants de Lévi
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fils de Lévi : Guershôn, Qehath et Merari. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fils de Qehath : Amram, Yitsehar, Hébron et Ouzziel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Enfants d’Amram : Aaron, Moïse et Miryam. Fils d’Aaron : Nadab, Abihou, Eléazar et Itamar. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fils de Ruben, premier-né d’Israël : Hénok, Pallou, Hetsrôn et Karmi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Eléazar eut pour fils Phinéas dont les descendants en ligne directe de père en fils furent Abishoua, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Bouqqi, Ouzzi, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Zerahya, Merayoth, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Amaria, Ahitoub, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Tsadoq, Ahimaats, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Azaria, Yohanân, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Azaria qui exerça le sacerdoce dans le temple que Salomon avait bâti à Jérusalem. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Puis, toujours de père en fils : Amaria, Ahitoub, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Tsadoq, Shalloum, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Hilqiya, Azaria, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Descendants de Joël, de père en fils : Shemaya, Gog, Shimeï ; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Seraya, Yehotsadaq. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Ce dernier partit en exil quand l’Eternel fit déporter la population de Juda et de Jérusalem par Nabuchodonosor.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Michée, Reaya, Baal, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Beéra, un chef des Rubénites que Tiglath-Piléser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après le livre des Rois, certains manuscrits hébreux et versions anciennes. Texte hébreu traditionnel : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tilgath-Pilnéser.
      marker-yv: yv-n
    - type: text
      text: ', roi d’Assyrie, emmena en captivité'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.29
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les hommes apparentés à Beéra, cités par familles selon leurs listes généalogiques sont : le chef Yeïel, Zacharie, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Béla, fils d’Azaz, petit-fils de Shéma, le fils de Joël. Ces hommes habitaient à Aroër et dans le territoire qui va jusqu’au mont Nébo et Baal-Meôn. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A l’est, ils s’étaient implantés jusqu’à l’entrée du désert qui s’étend jusqu’à l’Euphrate, car leur cheptel était nombreux dans le pays de Galaad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A l’est du Jourdain (voir note '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.22'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
