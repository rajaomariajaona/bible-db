document_id: 1CH.5,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants de Ruben
  - type: text
    content: Ruben était le premier-né d’Israël, mais parce qu’il avait eu des relations sexuelles avec l’une des femmes de son père, son droit d’aînesse fut donné aux fils de Joseph, fils d’Israël ; ainsi Ruben ne fut pas recensé comme l’aîné
  - type: note
    content: Sur Ruben et sa faute, voir Gn 35.22.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Du temps de Saül, ils firent la guerre aux Agaréniens
  - type: note
    content: Voir v. 19-22. Soit les descendants d’Ismaël, fils de Agar, l’esclave d’Abraham (Gn 16), l’ancêtre des Arabes, soit un groupe composé d’Araméens, mentionné dans des inscriptions assyriennes (27.31 ; Ps 83.5-8).
  - type: text
    content: ', qui furent vaincus par eux ; ils s’installèrent dans leurs habitations dans la partie orientale de Galaad.'
  - type: heading
    content: Les descendants de Gad
  '11':
  - type: text
    content: Les descendants de Gad habitaient sur le plateau du Basan
  - type: note
    content: Région montagneuse à l’est du lac de Galilée.
  - type: text
    content: ' et jusqu’à Salka. '
  '12':
  - type: text
    content: 'Le groupe familial le plus important fut celui de Joël, puis, en deuxième, celui de Shapham, puis celui de Yaenaï et celui de Shaphath. '
  '13':
  - type: text
    content: 'Il y avait à côté d’eux sept groupes familiaux : ceux de Michaël, Meshoullam, Shéba, Yoraï, Yaekan, Zia et Eber. '
  '14':
  - type: text
    content: 'Ils étaient les fils d’Abihaïl, fils de Houri, dont les ascendants en ligne directe étaient Yaroah, Galaad, Michaël, Yeshishaï, Yahdo et Bouz. '
  '15':
  - type: text
    content: 'Ahi, fils d’Abdiel et petit-fils de Gouni, était le chef de leurs groupes familiaux. '
  '16':
  - type: text
    content: 'Ils habitaient en Galaad, en Basan et dans les localités qui en dépendent, ainsi que dans tous les pâturages du Sarôn jusqu’à leur extrême limite. '
  '17':
  - type: text
    content: Ils furent tous recensés dans les généalogies, du temps de Yotam, roi de Juda, et du temps de Jéroboam, roi d’Israël
  - type: note
    content: Il s’agit de Jéroboam II (2 R 14.23-29). Sur Yotam de Juda, voir 2 R 15.32-38.
  - type: text
    content: .
  '18':
  - type: text
    content: 'Les membres des tribus de Ruben, de Gad et de la demi-tribu de Manassé avaient 44 760 hommes valeureux capables de manier le bouclier et l’épée, ou tirant à l’arc. Ils étaient exercés à la guerre et prêts à combattre. '
  '19':
  - type: text
    content: 'Ils firent la guerre aux Agaréniens et à Yetour, Naphish et Nodab. '
  '2':
  - type: text
    content: Juda fut puissant parmi ses frères, et de lui est issu le prince d’Israël, mais le droit d’aînesse appartenait à Joseph
  - type: note
    content: Voir Gn 49.8-10.
  - type: text
    content: .
  '20':
  - type: text
    content: 'Dieu les secourut et leur donna la victoire sur les Agaréniens et tous leurs alliés, parce qu’ils l’en avaient imploré pendant la bataille. Il les exauça parce qu’ils lui avaient fait confiance. '
  '21':
  - type: text
    content: 'Ils s’emparèrent de tout leur bétail, à savoir : 50 000 chameaux, 250 000 moutons et chèvres et 2 000 ânes ; de plus, ils firent 100 000 prisonniers. '
  '22':
  - type: text
    content: Beaucoup d’ennemis furent aussi tués, car ce combat était entre les mains de Dieu. Ils s’installèrent à leur place et y demeurèrent jusqu’à l’exil.
  - type: heading
    content: Les descendants de Manassé
  '23':
  - type: text
    content: 'Les descendants de la demi-tribu de Manassé habitaient dans le pays qui allait du Basan à Baal-Hermon, Senir et la montagne de l’Hermon ; ils étaient nombreux. '
  '24':
  - type: text
    content: 'Voici les noms des chefs de leurs groupes familiaux : Epher, Yisheï, Eliel, Azriel, Jérémie, Hodavia et Yahdiel ; ces chefs de leurs groupes familiaux étaient tous des hommes de guerre valeureux, des gens renommés.'
  '25':
  - type: text
    content: Mais, par la suite, les descendants de ces tribus furent infidèles au Dieu de leurs ancêtres et se prostituèrent aux dieux des peuples du pays, que Dieu avait détruits devant eux.
  '26':
  - type: text
    content: C’est pourquoi le Dieu d’Israël incita le roi d’Assyrie Poul, c’est-à-dire Tiglath-Piléser
  - type: note
    content: 'L’hébreu a : Tiglath-Pilnéser. Poul est le nom d’intronisation à Babylone de ce même roi.'
  - type: text
    content: ' roi d’Assyrie, à déporter les membres des tribus de Ruben, de Gad et de la demi-tribu de Manassé : il les exila à Halah, Habor et Hara, et sur les rives du fleuve de Gozân, où ils sont demeurés jusqu’à ce jour'
  - type: note
    content: Voir 2 R 15.19 ; 17.6.
  - type: text
    content: .
  - type: heading
    content: Les descendants de Lévi
  '27':
  - type: text
    content: 'Fils de Lévi : Guershôn, Qehath et Merari. '
  '28':
  - type: text
    content: 'Fils de Qehath : Amram, Yitsehar, Hébron et Ouzziel. '
  '29':
  - type: text
    content: 'Enfants d’Amram : Aaron, Moïse et Miryam. Fils d’Aaron : Nadab, Abihou, Eléazar et Itamar. '
  '3':
  - type: text
    content: 'Fils de Ruben, premier-né d’Israël : Hénok, Pallou, Hetsrôn et Karmi. '
  '30':
  - type: text
    content: 'Eléazar eut pour fils Phinéas dont les descendants en ligne directe de père en fils furent Abishoua, '
  '31':
  - type: text
    content: 'Bouqqi, Ouzzi, '
  '32':
  - type: text
    content: 'Zerahya, Merayoth, '
  '33':
  - type: text
    content: 'Amaria, Ahitoub, '
  '34':
  - type: text
    content: 'Tsadoq, Ahimaats, '
  '35':
  - type: text
    content: 'Azaria, Yohanân, '
  '36':
  - type: text
    content: 'Azaria qui exerça le sacerdoce dans le temple que Salomon avait bâti à Jérusalem. '
  '37':
  - type: text
    content: 'Puis, toujours de père en fils : Amaria, Ahitoub, '
  '38':
  - type: text
    content: 'Tsadoq, Shalloum, '
  '39':
  - type: text
    content: 'Hilqiya, Azaria, '
  '4':
  - type: text
    content: 'Descendants de Joël, de père en fils : Shemaya, Gog, Shimeï ; '
  '40':
  - type: text
    content: 'Seraya, Yehotsadaq. '
  '41':
  - type: text
    content: Ce dernier partit en exil quand l’Eternel fit déporter la population de Juda et de Jérusalem par Nabuchodonosor.
  '5':
  - type: text
    content: 'Michée, Reaya, Baal, '
  '6':
  - type: text
    content: Beéra, un chef des Rubénites que Tiglath-Piléser
  - type: note
    content: 'D’après le livre des Rois, certains manuscrits hébreux et versions anciennes. Texte hébreu traditionnel : Tilgath-Pilnéser.'
  - type: text
    content: ', roi d’Assyrie, emmena en captivité'
  - type: note
    content: Voir 2 R 15.29.
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Les hommes apparentés à Beéra, cités par familles selon leurs listes généalogiques sont : le chef Yeïel, Zacharie, '
  '8':
  - type: text
    content: 'Béla, fils d’Azaz, petit-fils de Shéma, le fils de Joël. Ces hommes habitaient à Aroër et dans le territoire qui va jusqu’au mont Nébo et Baal-Meôn. '
  '9':
  - type: text
    content: A l’est, ils s’étaient implantés jusqu’à l’entrée du désert qui s’étend jusqu’à l’Euphrate, car leur cheptel était nombreux dans le pays de Galaad
  - type: note
    content: A l’est du Jourdain (voir note 2.22).
  - type: text
    content: '. '
