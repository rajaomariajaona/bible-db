document_id: 1TH.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Quant à l’époque et au moment de ces événements, vous n’avez pas besoin, frères et sœurs, qu’on vous écrive à ce sujet : '
  '10':
  - type: text
    content: 'il est mort pour nous afin que, vivants ou morts, nous entrions ensemble, avec lui, dans la vie. '
  '11':
  - type: text
    content: C’est pourquoi encouragez-vous les uns les autres et aidez-vous mutuellement à grandir dans la foi, comme vous le faites déjà.
  - type: heading
    content: Recommandations
  '12':
  - type: text
    content: 'Nous vous demandons, frères et sœurs, d’apprécier ceux qui travaillent parmi vous, qui vous dirigent au nom du Seigneur et qui vous avertissent. '
  '13':
  - type: text
    content: Témoignez-leur une grande estime et de l’affection à cause de leur travail. Vivez en paix entre vous.
  '14':
  - type: text
    content: 'Nous vous le recommandons, frères et sœurs : avertissez ceux qui mènent une vie déréglée, réconfortez ceux qui sont découragés, soutenez les faibles, soyez patients envers tous. '
  '15':
  - type: text
    content: Veillez à ce que personne ne rende le mal pour le mal mais, en toute occasion, recherchez le bien, dans vos rapports mutuels comme envers tous les hommes.
  '16':
  - type: text
    content: 'Soyez toujours dans la joie. '
  '17':
  - type: text
    content: 'Priez sans cesse. '
  '18':
  - type: text
    content: 'Remerciez Dieu en toute circonstance : telle est pour vous la volonté que Dieu a exprimée en Jésus-Christ.'
  '19':
  - type: text
    content: 'N’éteignez pas l’action de l’Esprit : '
  '2':
  - type: text
    content: vous savez fort bien vous-mêmes que le jour du Seigneur viendra de façon aussi inattendue qu’un voleur en pleine nuit
  - type: note
    content: Voir Mt 24.43 et Lc 12.39.
  - type: text
    content: .
  '20':
  - type: text
    content: 'ne méprisez pas les prophéties ; '
  '21':
  - type: text
    content: 'au contraire, examinez toutes choses, retenez ce qui est bon, '
  '22':
  - type: text
    content: et gardez-vous de ce qui est mauvais, sous quelque forme que ce soit.
  - type: heading
    content: Prière et salutation
  '23':
  - type: text
    content: Que le Dieu de paix vous rende lui-même entièrement saints et qu’il vous garde parfaitement esprit, âme et corps
  - type: note
    content: 'D’autres comprennent : et qu’il garde votre être entier, c’est-à-dire l’esprit, l’âme et le corps…'
  - type: text
    content: ' pour que vous soyez irréprochables lors de la venue de notre Seigneur Jésus-Christ.'
  '24':
  - type: text
    content: Celui qui vous appelle est fidèle et c’est lui qui accomplira tout cela.
  '25':
  - type: text
    content: Frères et sœurs, priez aussi pour nous.
  '26':
  - type: text
    content: Saluez-vous entre vous par un baiser fraternel.
  '27':
  - type: text
    content: 'Je vous en conjure par le Seigneur : que cette lettre soit lue à tous les frères et sœurs.'
  '28':
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec vous.
  '3':
  - type: text
    content: 'Lorsque les gens diront : « Paix et sécurité ! », alors la ruine fondra subitement sur eux, comme les douleurs saisissent la femme enceinte, et aucun n’échappera.'
  '4':
  - type: text
    content: 'Mais vous, frères et sœurs, vous n’êtes pas dans les ténèbres pour que le jour du Seigneur vous surprenne comme un voleur. '
  '5':
  - type: text
    content: 'Car vous êtes tous enfants de la lumière, enfants du jour. Nous n’appartenons ni à la nuit ni aux ténèbres. '
  '6':
  - type: text
    content: Ne dormons donc pas comme le reste des hommes, mais restons vigilants et faisons preuve de modération.
  '7':
  - type: text
    content: 'Ceux qui dorment, dorment la nuit, et ceux qui s’enivrent, s’enivrent la nuit. '
  '8':
  - type: text
    content: 'Mais nous qui sommes enfants du jour, faisons preuve de modération : '
  - type: text
    content: revêtons-nous de la cuirasse
  - type: text
    content: ' de la foi et de l’amour, et mettons '
  - type: text
    content: le casque
  - type: text
    content: ' de l’espérance '
  - type: text
    content: du salut
  - type: note
    content: Es 59.17.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Car Dieu ne nous a pas destinés à connaître sa colère, mais à posséder le salut par notre Seigneur Jésus-Christ : '
