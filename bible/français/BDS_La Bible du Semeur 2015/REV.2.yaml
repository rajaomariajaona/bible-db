document_id: REV.2
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les lettres aux sept Églises
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: A l’Eglise qui est à Ephèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce terme signifie aussi : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: messager, envoyé.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'de l’Eglise qui est à Ephèse, écris : « Voici ce que dit celui qui tient les sept étoiles dans sa main droite et qui marche au milieu des sept chandeliers d’or :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je connais ta conduite, la peine que tu prends et ta persévérance. Je sais que tu ne peux pas supporter les méchants : tu as mis à l’épreuve ceux qui se prétendent '
    - type: usfm
      marker: w
      children:
      - type: text
        text: apôtres
    - type: text
      text: ' et qui ne le sont pas, et tu as décelé qu’ils mentaient.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu as de la persévérance, tu as souffert à cause de moi et tu ne t’es pas lassé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'J’ai cependant un reproche à te faire : tu as abandonné l’amour que tu avais au début.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allons ! Rappelle-toi d’où tu es tombé ! Change et reviens à ta conduite première ! Sinon, je viendrai à toi, et je déplacerai ton chandelier si tu ne changes pas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici pourtant une chose que tu as en ta faveur : tu détestes les œuvres des Nicolaïtes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cette secte ne nous est connue que par ce que Jean en dit ici ; leur doctrine et leur morale se déduisent des versets 2, 14, 20, 24.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', tout comme moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. Au vainqueur, je donnerai à manger du fruit de '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l’arbre de vie
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 2.9
        metadata:
          usfm: GEN.2.9
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui est dans le paradis de Dieu. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: A l’Eglise qui est à Smyrne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de l’Eglise qui est à Smyrne, écris : « Voici ce que dit celui qui est '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le premier et le dernier
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.17'
        metadata:
          usfm: REV.1.17
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', celui qui était mort et qui est à nouveau vivant :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je connais ta détresse et ta pauvreté – et pourtant tu es riche. Je sais les calomnies de ceux qui se disent '
    - type: usfm
      marker: w
      children:
      - type: text
        text: juifs
    - type: text
      text: ' mais qui ne le sont pas : c’est une '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogue
    - type: text
      text: ' de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: N’aie pas peur des souffrances qui t’attendent. Voici, le diable va jeter plusieurs d’entre vous en prison, pour vous tenter, et vous connaîtrez dix jours
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire pendant une période relativement brève.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: de détresse. Sois fidèle jusqu’à la mort, et je te donnerai la vie pour couronne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. Au vainqueur, la seconde mort
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire la mort éternelle, la mort physique étant la première (voir 20.6, 14 ; 21.8).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ne causera pas de mal. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: A l’Eglise qui est à Pergame
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de l’Eglise qui est à Pergame, écris : « Voici ce que dit celui qui tient l’épée aiguisée à double tranchant :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je sais que là où tu habites, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: ' a son trône'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire y règne en maître. Pergame était célèbre pour ses temples d’idoles et pour la ferveur avec laquelle on y adorait l’empereur romain.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . Mais tu me restes fermement attaché, tu n’as pas renié ta foi en moi, même aux jours où Antipas, mon témoin fidèle, a été mis à mort chez vous, là où habite Satan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'J’ai pourtant quelques reproches à te faire : tu as chez toi des gens attachés à la doctrine de Balaam'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à un devin, Balaam, que le roi Balaq a payé pour maudire les Israélites (Nb 22 à 24). N’ayant pas réussi, il eut recours à un autre moyen pour les décimer (Nb 25.1-2 ; 31.16).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui avait appris au roi Balaq à tendre un piège aux Israélites pour les amener à pécher en mangeant des viandes provenant des sacrifices offerts aux idoles et en se livrant à la débauche.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De même, tu as, toi aussi, des gens attachés à la doctrine des Nicolaïtes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Change donc, sinon je viens à toi sans tarder et je vais combattre ces gens-là avec l’épée qui sort de ma bouche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. Au vainqueur, je donnerai la manne cachée et une pierre blanche ; sur cette pierre est gravé un nom nouveau
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les vainqueurs des jeux olympiques recevaient de telles pierres sur lesquelles était gravé leur nom.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', que personne ne connaît sauf celui qui le reçoit. »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A l’Eglise qui est à Thyatire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A l’
    - type: usfm
      marker: w
      children:
      - type: text
        text: ange
    - type: text
      text: ' de l’Eglise qui est à Thyatire, écris : « Voici ce que dit le Fils de Dieu, dont '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les yeux sont comme une flamme ardente et les pieds comme du bronze
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 10.6
        metadata:
          usfm: DAN.10.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ':'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je connais tes œuvres, ton amour, ta fidélité, ton service et ta persévérance. Je sais que tes dernières œuvres sont plus nombreuses que les premières.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pourtant, j’ai un reproche à te faire : tu laisses cette femme, cette Jézabel'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1 R 16.31 ; 2 R 9.22.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qui se dit prophétesse, égarer mes serviteurs en leur enseignant à participer au culte des idoles, en se livrant à la débauche et en mangeant les viandes des sacrifices.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je lui ai laissé du temps pour qu’elle change, mais elle ne veut pas renoncer à son immoralité.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici : je la jette, elle et ses compagnons de débauche, sur un lit de grande détresse, à moins qu’ils changent en renonçant à agir selon son enseignement.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je livrerai ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciples
    - type: text
      text: ' à la mort. Ainsi, toutes les Eglises reconnaîtront que je suis celui qui sonde les pensées et les désirs secrets. Je rétribuerai chacun de vous selon ses actes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quant à vous, les autres membres de l’Eglise qui est à Thyatire, vous qui ne suivez pas cet enseignement et qui n’avez pas voulu connaître ce qu’ils appellent “les profondeurs de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit certainement d’un enseignement secret, réservé aux initiés de cette secte, qui s’accompagnait de pratiques immorales (v. 20-21).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '”, je vous le déclare : je ne vous impose pas d’autre fardeau.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais tenez fermement ce que vous avez jusqu’à ce que je vienne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Au vainqueur, à celui qui continue à agir jusqu’à la fin selon mon enseignement, je donnerai autorité sur tous les peuples :'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il les dirigera avec un sceptre de fer, comme on brise les poteries d’argile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2.8-9
        metadata:
          usfm: PSA.2.8+PSA.2.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ','
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
