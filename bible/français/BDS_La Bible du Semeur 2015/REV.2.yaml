document_id: REV.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les lettres aux sept Églises
  - type: heading
    content: A l’Eglise qui est à Ephèse
  - type: text
    content: ' '
  - type: text
    content: A l’
  - type: text
    content: ange
  - type: text
    content: ' '
  - type: note
    content: 'Ce terme signifie aussi : messager, envoyé.'
  - type: text
    content: 'de l’Eglise qui est à Ephèse, écris : « Voici ce que dit celui qui tient les sept étoiles dans sa main droite et qui marche au milieu des sept chandeliers d’or :'
  '10':
  - type: text
    content: N’aie pas peur des souffrances qui t’attendent. Voici, le diable va jeter plusieurs d’entre vous en prison, pour vous tenter, et vous connaîtrez dix jours
  - type: note
    content: C’est-à-dire pendant une période relativement brève.
  - type: text
    content: ' '
  - type: text
    content: de détresse. Sois fidèle jusqu’à la mort, et je te donnerai la vie pour couronne.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. Au vainqueur, la seconde mort
  - type: text
    content: ' '
  - type: note
    content: C’est-à-dire la mort éternelle, la mort physique étant la première (voir 20.6, 14 ; 21.8).
  - type: text
    content: ne causera pas de mal. »
  - type: heading
    content: A l’Eglise qui est à Pergame
  '12':
  - type: text
    content: ' '
  - type: text
    content: A l’
  - type: text
    content: ange
  - type: text
    content: ' de l’Eglise qui est à Pergame, écris : « Voici ce que dit celui qui tient l’épée aiguisée à double tranchant :'
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Je sais que là où tu habites, '
  - type: text
    content: Satan
  - type: text
    content: ' a son trône'
  - type: text
    content: ' '
  - type: note
    content: C’est-à-dire y règne en maître. Pergame était célèbre pour ses temples d’idoles et pour la ferveur avec laquelle on y adorait l’empereur romain.
  - type: text
    content: . Mais tu me restes fermement attaché, tu n’as pas renié ta foi en moi, même aux jours où Antipas, mon témoin fidèle, a été mis à mort chez vous, là où habite Satan.
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'J’ai pourtant quelques reproches à te faire : tu as chez toi des gens attachés à la doctrine de Balaam'
  - type: text
    content: ' '
  - type: note
    content: Allusion à un devin, Balaam, que le roi Balaq a payé pour maudire les Israélites (Nb 22 à 24). N’ayant pas réussi, il eut recours à un autre moyen pour les décimer (Nb 25.1-2 ; 31.16).
  - type: text
    content: qui avait appris au roi Balaq à tendre un piège aux Israélites pour les amener à pécher en mangeant des viandes provenant des sacrifices offerts aux idoles et en se livrant à la débauche.
  - type: text
    content: ' '
  '15':
  - type: text
    content: De même, tu as, toi aussi, des gens attachés à la doctrine des Nicolaïtes.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Change donc, sinon je viens à toi sans tarder et je vais combattre ces gens-là avec l’épée qui sort de ma bouche.
  '17':
  - type: text
    content: ' '
  - type: text
    content: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. Au vainqueur, je donnerai la manne cachée et une pierre blanche ; sur cette pierre est gravé un nom nouveau
  - type: text
    content: ' '
  - type: note
    content: Les vainqueurs des jeux olympiques recevaient de telles pierres sur lesquelles était gravé leur nom.
  - type: text
    content: ', que personne ne connaît sauf celui qui le reçoit. »'
  - type: heading
    content: A l’Eglise qui est à Thyatire
  '18':
  - type: text
    content: ' '
  - type: text
    content: A l’
  - type: text
    content: ange
  - type: text
    content: ' de l’Eglise qui est à Thyatire, écris : « Voici ce que dit le Fils de Dieu, dont '
  - type: text
    content: les yeux sont comme une flamme ardente et les pieds comme du bronze
  - type: text
    content: ' '
  - type: note
    content: Voir Dn 10.6.
  - type: text
    content: ':'
  '19':
  - type: text
    content: ' '
  - type: text
    content: Je connais tes œuvres, ton amour, ta fidélité, ton service et ta persévérance. Je sais que tes dernières œuvres sont plus nombreuses que les premières.
  '2':
  - type: text
    content: ' '
  - type: text
    content: 'Je connais ta conduite, la peine que tu prends et ta persévérance. Je sais que tu ne peux pas supporter les méchants : tu as mis à l’épreuve ceux qui se prétendent '
  - type: text
    content: apôtres
  - type: text
    content: ' et qui ne le sont pas, et tu as décelé qu’ils mentaient.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'Pourtant, j’ai un reproche à te faire : tu laisses cette femme, cette Jézabel'
  - type: text
    content: ' '
  - type: note
    content: Voir 1 R 16.31 ; 2 R 9.22.
  - type: text
    content: qui se dit prophétesse, égarer mes serviteurs en leur enseignant à participer au culte des idoles, en se livrant à la débauche et en mangeant les viandes des sacrifices.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Je lui ai laissé du temps pour qu’elle change, mais elle ne veut pas renoncer à son immoralité.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Voici : je la jette, elle et ses compagnons de débauche, sur un lit de grande détresse, à moins qu’ils changent en renonçant à agir selon son enseignement.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Je livrerai ses '
  - type: text
    content: disciples
  - type: text
    content: ' à la mort. Ainsi, toutes les Eglises reconnaîtront que je suis celui qui sonde les pensées et les désirs secrets. Je rétribuerai chacun de vous selon ses actes.'
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Quant à vous, les autres membres de l’Eglise qui est à Thyatire, vous qui ne suivez pas cet enseignement et qui n’avez pas voulu connaître ce qu’ils appellent “les profondeurs de '
  - type: text
    content: Satan
  - type: text
    content: ' '
  - type: note
    content: Il s’agit certainement d’un enseignement secret, réservé aux initiés de cette secte, qui s’accompagnait de pratiques immorales (v. 20-21).
  - type: text
    content: '”, je vous le déclare : je ne vous impose pas d’autre fardeau.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Mais tenez fermement ce que vous avez jusqu’à ce que je vienne.
  '26':
  - type: text
    content: ' '
  - type: text
    content: 'Au vainqueur, à celui qui continue à agir jusqu’à la fin selon mon enseignement, je donnerai autorité sur tous les peuples :'
  - type: text
    content: ' '
  '27':
  - type: text
    content: il les dirigera avec un sceptre de fer, comme on brise les poteries d’argile
  - type: note
    content: Ps 2.8-9.
  - type: text
    content: ','
  - type: text
    content: ' '
  '28':
  - type: text
    content: ainsi que j’en ai reçu, moi aussi, le pouvoir de mon Père. Et je lui donnerai l’étoile du matin.
  '29':
  - type: text
    content: ' '
  - type: text
    content: Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. »
  '3':
  - type: text
    content: Tu as de la persévérance, tu as souffert à cause de moi et tu ne t’es pas lassé.
  '4':
  - type: text
    content: ' '
  - type: text
    content: 'J’ai cependant un reproche à te faire : tu as abandonné l’amour que tu avais au début.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Allons ! Rappelle-toi d’où tu es tombé ! Change et reviens à ta conduite première ! Sinon, je viendrai à toi, et je déplacerai ton chandelier si tu ne changes pas.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Voici pourtant une chose que tu as en ta faveur : tu détestes les œuvres des Nicolaïtes'
  - type: note
    content: Cette secte ne nous est connue que par ce que Jean en dit ici ; leur doctrine et leur morale se déduisent des versets 2, 14, 20, 24.
  - type: text
    content: ', tout comme moi.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Que celui qui a des oreilles écoute ce que l’Esprit dit aux Eglises. Au vainqueur, je donnerai à manger du fruit de '
  - type: text
    content: l’arbre de vie
  - type: text
    content: ' '
  - type: note
    content: Gn 2.9 .
  - type: text
    content: qui est dans le paradis de Dieu. »
  - type: heading
    content: A l’Eglise qui est à Smyrne
  '8':
  - type: text
    content: ' '
  - type: text
    content: A l’
  - type: text
    content: ange
  - type: text
    content: ' de l’Eglise qui est à Smyrne, écris : « Voici ce que dit celui qui est '
  - type: text
    content: le premier et le dernier
  - type: text
    content: ' '
  - type: note
    content: Voir note 1.17.
  - type: text
    content: ', celui qui était mort et qui est à nouveau vivant :'
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Je connais ta détresse et ta pauvreté – et pourtant tu es riche. Je sais les calomnies de ceux qui se disent '
  - type: text
    content: juifs
  - type: text
    content: ' mais qui ne le sont pas : c’est une '
  - type: text
    content: synagogue
  - type: text
    content: ' de '
  - type: text
    content: Satan
  - type: text
    content: .
  - type: text
    content: ' '
