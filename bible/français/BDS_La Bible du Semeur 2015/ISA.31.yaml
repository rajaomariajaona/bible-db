document_id: ISA.31,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur à ceux qui font confiance à l’Egypte
  - type: text
    content: Malheur à ceux ╵qui s’en vont en Egypte ╵pour avoir du secours,
  - type: text
    content: et qui comptent sur les chevaux,
  - type: text
    content: qui mettent leur confiance ╵dans le nombre des chars
  - type: text
    content: et dans la grande force ╵des équipages,
  - type: text
    content: mais ne regardent pas ╵vers le Saint d’Israël
  - type: text
    content: et ne se soucient pas ╵de l’Eternel !
  '2':
  - type: text
    content: Et pourtant, lui aussi ╵agit avec habileté
  - type: text
    content: pour faire venir le malheur,
  - type: text
    content: il ne révoque pas ╵ce qu’il a décrété
  - type: text
    content: et il se dressera ╵contre le parti des méchants
  - type: text
    content: et contre les appuis ╵de ceux qui font le mal.
  '3':
  - type: text
    content: L’Egyptien est un homme, ╵il n’est pas Dieu,
  - type: text
    content: et ses chevaux ╵sont des créatures terrestres, ╵et non pas des esprits.
  - type: text
    content: Quand l’Eternel ╵abaissera sa main,
  - type: text
    content: le protecteur chancellera
  - type: text
    content: et le protégé tombera.
  - type: text
    content: Ils périront tous deux ensemble.
  - type: heading
    content: C’est l’Eternel qui délivre
  '4':
  - type: text
    content: 'Car l’Eternel m’a dit :'
  - type: text
    content: Lorsque le lion ╵ou le petit du lion ╵défend sa proie en rugissant,
  - type: text
    content: la foule des bergers ╵appelés contre lui
  - type: text
    content: a beau pousser des cris, ╵ils ne l’effrayeront pas.
  - type: text
    content: Et leur tapage ╵ne le troublera pas.
  - type: text
    content: Ainsi le Seigneur des armées célestes descendra
  - type: text
    content: pour combattre sur le mont de Sion, ╵sur sa colline.
  '5':
  - type: text
    content: Comme un oiseau déploie ses ailes ╵pour couvrir sa couvée,
  - type: text
    content: ainsi le Seigneur des armées célestes ╵protégera Jérusalem,
  - type: text
    content: oui, il la défendra ╵et la délivrera.
  - type: text
    content: Il passera au-dessus d’elle ╵et il l’épargnera.
  '6':
  - type: text
    content: Revenez donc à l’Eternel ╵dont vous vous êtes ╵tout à fait détournés,
  - type: text
    content: Israélites.
  '7':
  - type: text
    content: En ce jour-là, ╵chacun rejettera
  - type: text
    content: ses idoles d’argent ╵et ses idoles d’or
  - type: text
    content: qu’il s’était fabriquées ╵avec des mains coupables.
  '8':
  - type: text
    content: L’Assyrie tombera
  - type: text
    content: sous les coups de l’épée, ╵pas de l’épée d’un homme ;
  - type: text
    content: une épée surhumaine ╵fera d’elle sa proie.
  - type: text
    content: Les Assyriens fuiront ╵devant cette épée-là.
  - type: text
    content: Alors leurs jeunes gens ╵seront astreints à la corvée.
  '9':
  - type: text
    content: Ceux qui étaient solides ╵comme un rocher ╵fuiront épouvantés,
  - type: text
    content: et devant l’étendard, ╵leurs chefs seront terrorisés.
  - type: text
    content: C’est là ce que déclare l’Eternel ╵dont le feu brûle dans Sion
  - type: text
    content: et qui a sa fournaise ╵au milieu de Jérusalem.
