document_id: ISA.31,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Malheur à ceux qui font confiance à l’Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à ceux ╵qui s’en vont en Egypte ╵pour avoir du secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui comptent sur les chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui mettent leur confiance ╵dans le nombre des chars
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans la grande force ╵des équipages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ne regardent pas ╵vers le Saint d’Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne se soucient pas ╵de l’Eternel !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Et pourtant, lui aussi ╵agit avec habileté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire venir le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne révoque pas ╵ce qu’il a décrété
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il se dressera ╵contre le parti des méchants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre les appuis ╵de ceux qui font le mal.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’Egyptien est un homme, ╵il n’est pas Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses chevaux ╵sont des créatures terrestres, ╵et non pas des esprits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand l’Eternel ╵abaissera sa main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le protecteur chancellera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le protégé tombera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils périront tous deux ensemble.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: C’est l’Eternel qui délivre
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Car l’Eternel m’a dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque le lion ╵ou le petit du lion ╵défend sa proie en rugissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la foule des bergers ╵appelés contre lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a beau pousser des cris, ╵ils ne l’effrayeront pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur tapage ╵ne le troublera pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi le Seigneur des armées célestes descendra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour combattre sur le mont de Sion, ╵sur sa colline.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Comme un oiseau déploie ses ailes ╵pour couvrir sa couvée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi le Seigneur des armées célestes ╵protégera Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, il la défendra ╵et la délivrera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il passera au-dessus d’elle ╵et il l’épargnera.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Revenez donc à l’Eternel ╵dont vous vous êtes ╵tout à fait détournés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israélites.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: En ce jour-là, ╵chacun rejettera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses idoles d’argent ╵et ses idoles d’or
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu’il s’était fabriquées ╵avec des mains coupables.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L’Assyrie tombera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous les coups de l’épée, ╵pas de l’épée d’un homme ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une épée surhumaine ╵fera d’elle sa proie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Assyriens fuiront ╵devant cette épée-là.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors leurs jeunes gens ╵seront astreints à la corvée.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ceux qui étaient solides ╵comme un rocher ╵fuiront épouvantés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et devant l’étendard, ╵leurs chefs seront terrorisés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce que déclare l’Eternel ╵dont le feu brûle dans Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui a sa fournaise ╵au milieu de Jérusalem.
