document_id: PHP.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aimer, à l’aide de Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: N’avez-vous pas trouvé en Christ un réconfort, dans l’amour un encouragement, par l’Esprit une communion entre vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Christ ne vous y invite-t-il pas ? L’amour ne vous y encourage-t-il pas ? L’Esprit ne vous rend-il pas solidaires ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n’êtes-vous pas en communion avec l’Esprit ?
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '  ? N’avez-vous pas de l’affection et de la bonté les uns pour les autres ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rendez donc ma joie complète : tendez à vivre en accord les uns avec les autres. Et pour cela, ayez le même amour, une même pensée, et tendez au même but. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne faites donc rien par esprit de rivalité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par égoïsme.
    marker-yv: yv-n
  - type: text
    text: ', ou par un vain désir de vous mettre en avant ; au contraire, par humilité, considérez les autres comme plus importants que vous-mêmes ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et que chacun regarde, non ses propres qualités
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: intérêts.
    marker-yv: yv-n
  - type: text
    text: ', mais celles des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tendez à vivre ainsi entre vous, car c’est ce qui convient quand on est uni à Jésus-Christ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tendez en vous-mêmes à cette attitude qui est '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: était
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aussi en Jésus-Christ. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ou : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ayez entre vous les sentiments qui viennent de Jésus-Christ.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lui qui était de condition divine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains pensent que Paul citerait ici un hymne de l’Eglise primitive, mais il est possible qu’il l’ait composé lui-même.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne chercha pas à profiter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne chercha pas à rester de force l’égal de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à se faire de force l’égal de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l’égalité avec Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mais il s’est dépouillé lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a pris
- type: usfm
  marker: q1
  children:
  - type: text
    text: la condition d’un serviteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en se rendant semblable aux hommes :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: se trouvant ainsi reconnu
- type: usfm
  marker: q1
  children:
  - type: text
    text: à son aspect, comme un simple homme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: il s’abaissa lui-même
- type: usfm
  marker: q1
  children:
  - type: text
    text: en devenant obéissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à subir la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, la mort sur la croix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est pourquoi Dieu l’a élevé
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la plus haute place
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il lui a donné le nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui est au-dessus de tout nom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: pour qu’au nom de Jésus
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tout être s’agenouille
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les cieux, sur la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et jusque sous la terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et que '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'chacun déclare :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jésus-Christ est '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans le paganisme, ce titre s’appliquait à la divinité suprême. Plus tard, les empereurs le revendiqueront. L’Ancien Testament rendait par ce titre le nom de Dieu (l’Eternel). Paul applique à Jésus ce qu’
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 45.23-24
        metadata:
          usfm: ISA.45.23+ISA.45.24
      - type: text
        text: ' disait de Dieu.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la gloire de Dieu le Père.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faire fructifier son salut
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mes chers amis, vous avez toujours été obéissants : faites donc fructifier votre salut, avec toute la crainte qui s’impose, non seulement quand je suis présent, mais bien plus maintenant que je suis absent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car c’est Dieu lui-même qui agit en vous, pour produire à la fois le vouloir et le faire conformément à son projet bienveillant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car c’est Dieu lui-même qui agit parmi vous pour susciter le vouloir et le faire en vue de la bonne entente.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Faites tout sans vous plaindre et sans discuter, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pour être irréprochables et purs, des enfants de Dieu sans tache au sein d’une humanité corrompue et perverse. Dans cette humanité, vous brillez comme des flambeaux dans le monde, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: en portant
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en présentant aux hommes.
    marker-yv: yv-n
  - type: text
    text: ' la Parole de vie. Ainsi, lorsque viendra le jour de Christ, vous serez mon titre de gloire : je n’aurai pas couru'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’apôtre compare ses efforts et ses luttes à ceux des athlètes qui courent dans le stade (comparer 3.12-13 ; 1 Co 9.24-26 ; Ga 2.2).
    marker-yv: yv-n
  - type: text
    text: ' pour rien et ma peine n’aura pas été inutile. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et même si je dois m’offrir comme une libation pour accompagner le sacrifice que vous offrez à Dieu, c’est-à-dire le service de votre foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tm 4.6
        metadata:
          usfm: 2TI.4.6
      - type: text
        text: . La foi des Philippiens est comparée à un sacrifice offert à Dieu, sur lequel le sang de l’apôtre serait versé comme les libations de vin sur les offrandes de fleur de farine accompagnant certains sacrifices (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29.38-41
        metadata:
          usfm: EXO.29.38+EXO.29.39+EXO.29.40+EXO.29.41
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', je m’en réjouis et je me réjouis avec vous tous. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vous aussi, de la même manière, réjouissez-vous, et réjouissez-vous avec moi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’envoi de Timothée et d’Epaphrodite
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: J’espère, en comptant sur le Seigneur Jésus, vous envoyer bientôt Timothée pour être moi-même encouragé par les nouvelles qu’il me donnera de vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il n’y a personne ici, en dehors de lui, pour partager mes sentiments et se soucier sincèrement de ce qui vous concerne. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car tous ne s’intéressent qu’à leurs propres affaires et non à la cause de Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais vous savez que Timothée a fait ses preuves : comme un enfant aux côtés de son père, il s’est consacré avec moi au service de l’Evangile. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’est donc lui que j’espère pouvoir vous envoyer dès que je verrai quelle tournure prennent les événements pour moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et j’ai cette confiance dans le Seigneur que je viendrai bientôt moi-même chez vous. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Par ailleurs, j’ai estimé nécessaire de vous renvoyer Epaphrodite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Délégué de l’Eglise de Philippes auprès de Paul pour l’aider pendant son emprisonnement (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.18'
        metadata:
          usfm: PHP.4.18
      - type: text
        text: ). Les Philippiens avaient envoyé à Paul un don matériel avec ce frère, mais celui-ci était tombé malade peu après son arrivée (v. 27).
    marker-yv: yv-n
  - type: text
    text: ', mon frère, mon collaborateur et mon compagnon d’armes, votre délégué auquel vous avez donné la charge de subvenir à mes besoins. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il avait, en effet, un grand désir de vous revoir et il était préoccupé parce que vous avez appris qu’il était malade. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il a été malade, c’est vrai, et il a frôlé la mort, mais Dieu a eu pitié de lui, et pas seulement de lui, mais aussi de moi, pour m’éviter d’avoir peine sur peine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je me suis donc hâté de vous le renvoyer pour que vous vous réjouissiez de le revoir : cela adoucira ma peine. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Réservez-lui donc un accueil digne de votre union commune au Seigneur ; recevez-le avec une grande joie. Ayez de l’estime pour de tels hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: car c’est en travaillant au service de Christ qu’il a failli mourir. Il a exposé sa vie pour s’acquitter, à votre place, du service que vous ne pouviez me rendre vous-mêmes.
