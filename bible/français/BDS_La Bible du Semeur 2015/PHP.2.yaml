document_id: PHP.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Aimer, à l’aide de Christ
  - type: text
    content: N’avez-vous pas trouvé en Christ un réconfort, dans l’amour un encouragement, par l’Esprit une communion entre vous
  - type: note
    content: 'Autres traductions : Christ ne vous y invite-t-il pas ? L’amour ne vous y encourage-t-il pas ? L’Esprit ne vous rend-il pas solidaires ? (ou : n’êtes-vous pas en communion avec l’Esprit ?).'
  - type: text
    content: '  ? N’avez-vous pas de l’affection et de la bonté les uns pour les autres ? '
  '10':
  - type: text
    content: pour qu’au nom de Jésus
  - type: text
    content: tout être s’agenouille
  - type: text
    content: dans les cieux, sur la terre
  - type: text
    content: et jusque sous la terre,
  '11':
  - type: text
    content: 'et que '
  - type: text
    content: 'chacun déclare :'
  - type: text
    content: 'Jésus-Christ est '
  - type: text
    content: Seigneur
  - type: note
    content: Dans le paganisme, ce titre s’appliquait à la divinité suprême. Plus tard, les empereurs le revendiqueront. L’Ancien Testament rendait par ce titre le nom de Dieu (l’Eternel). Paul applique à Jésus ce qu’Es 45.23-24 disait de Dieu.
  - type: text
    content: à la gloire de Dieu le Père.
  - type: heading
    content: Faire fructifier son salut
  '12':
  - type: text
    content: 'Mes chers amis, vous avez toujours été obéissants : faites donc fructifier votre salut, avec toute la crainte qui s’impose, non seulement quand je suis présent, mais bien plus maintenant que je suis absent. '
  '13':
  - type: text
    content: Car c’est Dieu lui-même qui agit en vous, pour produire à la fois le vouloir et le faire conformément à son projet bienveillant
  - type: note
    content: 'Autre traduction : car c’est Dieu lui-même qui agit parmi vous pour susciter le vouloir et le faire en vue de la bonne entente.'
  - type: text
    content: .
  '14':
  - type: text
    content: 'Faites tout sans vous plaindre et sans discuter, '
  '15':
  - type: text
    content: 'pour être irréprochables et purs, des enfants de Dieu sans tache au sein d’une humanité corrompue et perverse. Dans cette humanité, vous brillez comme des flambeaux dans le monde, '
  '16':
  - type: text
    content: en portant
  - type: note
    content: 'Autre traduction : en présentant aux hommes.'
  - type: text
    content: ' la Parole de vie. Ainsi, lorsque viendra le jour de Christ, vous serez mon titre de gloire : je n’aurai pas couru'
  - type: note
    content: L’apôtre compare ses efforts et ses luttes à ceux des athlètes qui courent dans le stade (comparer 3.12-13 ; 1 Co 9.24-26 ; Ga 2.2).
  - type: text
    content: ' pour rien et ma peine n’aura pas été inutile. '
  '17':
  - type: text
    content: Et même si je dois m’offrir comme une libation pour accompagner le sacrifice que vous offrez à Dieu, c’est-à-dire le service de votre foi
  - type: note
    content: Voir 2 Tm 4.6. La foi des Philippiens est comparée à un sacrifice offert à Dieu, sur lequel le sang de l’apôtre serait versé comme les libations de vin sur les offrandes de fleur de farine accompagnant certains sacrifices (Ex 29.38-41).
  - type: text
    content: ', je m’en réjouis et je me réjouis avec vous tous. '
  '18':
  - type: text
    content: Vous aussi, de la même manière, réjouissez-vous, et réjouissez-vous avec moi.
  - type: heading
    content: L’envoi de Timothée et d’Epaphrodite
  '19':
  - type: text
    content: J’espère, en comptant sur le Seigneur Jésus, vous envoyer bientôt Timothée pour être moi-même encouragé par les nouvelles qu’il me donnera de vous.
  '2':
  - type: text
    content: 'Rendez donc ma joie complète : tendez à vivre en accord les uns avec les autres. Et pour cela, ayez le même amour, une même pensée, et tendez au même but. '
  '20':
  - type: text
    content: 'Il n’y a personne ici, en dehors de lui, pour partager mes sentiments et se soucier sincèrement de ce qui vous concerne. '
  '21':
  - type: text
    content: 'Car tous ne s’intéressent qu’à leurs propres affaires et non à la cause de Jésus-Christ. '
  '22':
  - type: text
    content: 'Mais vous savez que Timothée a fait ses preuves : comme un enfant aux côtés de son père, il s’est consacré avec moi au service de l’Evangile. '
  '23':
  - type: text
    content: C’est donc lui que j’espère pouvoir vous envoyer dès que je verrai quelle tournure prennent les événements pour moi.
  '24':
  - type: text
    content: 'Et j’ai cette confiance dans le Seigneur que je viendrai bientôt moi-même chez vous. '
  '25':
  - type: text
    content: Par ailleurs, j’ai estimé nécessaire de vous renvoyer Epaphrodite
  - type: note
    content: Délégué de l’Eglise de Philippes auprès de Paul pour l’aider pendant son emprisonnement (4.18). Les Philippiens avaient envoyé à Paul un don matériel avec ce frère, mais celui-ci était tombé malade peu après son arrivée (v. 27).
  - type: text
    content: ', mon frère, mon collaborateur et mon compagnon d’armes, votre délégué auquel vous avez donné la charge de subvenir à mes besoins. '
  '26':
  - type: text
    content: 'Il avait, en effet, un grand désir de vous revoir et il était préoccupé parce que vous avez appris qu’il était malade. '
  '27':
  - type: text
    content: Il a été malade, c’est vrai, et il a frôlé la mort, mais Dieu a eu pitié de lui, et pas seulement de lui, mais aussi de moi, pour m’éviter d’avoir peine sur peine.
  '28':
  - type: text
    content: 'Je me suis donc hâté de vous le renvoyer pour que vous vous réjouissiez de le revoir : cela adoucira ma peine. '
  '29':
  - type: text
    content: 'Réservez-lui donc un accueil digne de votre union commune au Seigneur ; recevez-le avec une grande joie. Ayez de l’estime pour de tels hommes, '
  '3':
  - type: text
    content: Ne faites donc rien par esprit de rivalité
  - type: note
    content: 'Autre traduction : par égoïsme.'
  - type: text
    content: ', ou par un vain désir de vous mettre en avant ; au contraire, par humilité, considérez les autres comme plus importants que vous-mêmes ; '
  '30':
  - type: text
    content: car c’est en travaillant au service de Christ qu’il a failli mourir. Il a exposé sa vie pour s’acquitter, à votre place, du service que vous ne pouviez me rendre vous-mêmes.
  '4':
  - type: text
    content: et que chacun regarde, non ses propres qualités
  - type: note
    content: 'Autre traduction : intérêts.'
  - type: text
    content: ', mais celles des autres. '
  '5':
  - type: text
    content: Tendez à vivre ainsi entre vous, car c’est ce qui convient quand on est uni à Jésus-Christ
  - type: note
    content: 'Autre traduction : tendez en vous-mêmes à cette attitude qui est (ou était) aussi en Jésus-Christ. Ou : Ayez entre vous les sentiments qui viennent de Jésus-Christ.'
  - type: text
    content: .
  '6':
  - type: text
    content: Lui qui était de condition divine
  - type: note
    content: Certains pensent que Paul citerait ici un hymne de l’Eglise primitive, mais il est possible qu’il l’ait composé lui-même.
  - type: text
    content: ','
  - type: text
    content: ne chercha pas à profiter
  - type: note
    content: 'D’autres comprennent : ne chercha pas à rester de force l’égal de Dieu (ou à se faire de force l’égal de Dieu).'
  - type: text
    content: de l’égalité avec Dieu,
  '7':
  - type: text
    content: mais il s’est dépouillé lui-même,
  - type: text
    content: et il a pris
  - type: text
    content: la condition d’un serviteur
  - type: text
    content: 'en se rendant semblable aux hommes :'
  - type: text
    content: se trouvant ainsi reconnu
  - type: text
    content: à son aspect, comme un simple homme,
  '8':
  - type: text
    content: il s’abaissa lui-même
  - type: text
    content: en devenant obéissant,
  - type: text
    content: jusqu’à subir la mort,
  - type: text
    content: oui, la mort sur la croix.
  '9':
  - type: text
    content: C’est pourquoi Dieu l’a élevé
  - type: text
    content: à la plus haute place
  - type: text
    content: et il lui a donné le nom
  - type: text
    content: qui est au-dessus de tout nom,
