document_id: JER.42
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fuite en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Alors tous les chefs des troupes ainsi que Yohanân, fils de Qaréah, Yezania
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yezania
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Azaria, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'comme en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43.2'
        metadata:
          usfm: JER.43.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', fils de Hoshaya, et tout le peuple, au grand complet, se rendirent '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'auprès du prophète Jérémie et lui dirent : Veuille accéder à notre requête : prie l’Eternel ton Dieu pour ce reste que nous sommes ! Car nous étions nombreux et nous sommes réduits à bien peu de chose, comme tu peux le constater toi-même. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que l’Eternel, ton Dieu, nous fasse savoir quel chemin nous devons suivre et ce que nous avons à faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le prophète Jérémie leur répondit : C’est entendu, je vais prier l’Eternel votre Dieu pour vous, comme vous me l’avez demandé, et je vous communiquerai tout ce que l’Eternel vous répondra, sans rien vous en cacher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De leur côté, ils dirent à Jérémie : Que l’Eternel soit contre nous un témoin véridique et fidèle si nous n’obéissons pas à tout ce que l’Eternel ton Dieu te chargera de nous dire. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que cela nous plaise ou non, nous obéirons à l’Eternel que nous te chargeons de consulter. Car nous nous en trouverons bien si nous obéissons à l’Eternel notre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dix jours plus tard, l’Eternel adressa la parole au prophète Jérémie. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui-ci fit venir Yohanân, fils de Qaréah, et tous les chefs de troupes qui étaient avec lui et tout le peuple au grand complet, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et il leur dit : Voici ce que déclare l’Eternel, Dieu d’Israël, à qui vous m’avez envoyé pour présenter votre requête : '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si vous restez dans ce pays, je construirai en votre faveur et ne vous y détruirai pas ; je vous y implanterai et ne vous en arracherai pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 1.10 ; 24.6 ; 31.28 ; 45.4.
    marker-yv: yv-n
  - type: text
    text: '. Car je renoncerai à vous faire du mal comme je vous en ai fait. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ne craignez plus le roi de Babylone dont vous avez peur ! Non, n’ayez pas peur de lui, l’Eternel le déclare, car je suis avec vous : je vous sauverai et je vous délivrerai de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je vous témoignerai de la compassion afin qu’il vous traite avec compassion et qu’il vous laisse retourner sur vos terres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais si vous dites : « Nous ne resterons pas dans ce pays », et si vous désobéissez ainsi à l’Eternel votre Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'si vous dites : « Non, nous irons plutôt en Egypte, où nous ne connaîtrons plus la guerre, où nous n’entendrons plus le cor sonner l’alerte, où nous ne souffrirons plus de la faim, c’est là que nous nous établirons », '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'alors, écoutez bien ce que l’Eternel vous dit, à vous, le reste de Juda : Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Si vous vous obstinez à vouloir émigrer en Egypte et si vous allez vous y établir, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'l’épée que vous redoutez vous atteindra là-bas, en Egypte, la famine que vous craignez s’attachera à vos pas jusqu’en Egypte et vous y périrez. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tous ceux qui décideront d’émigrer en Egypte, périront par l’épée, par la famine ou la peste : il n’y aura ni rescapé ni survivant à ces fléaux que je déchaînerai contre eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici ce que déclare le Seigneur des armées célestes, Dieu d’Israël : Comme ma colère et ma fureur se sont déversées sur les habitants de Jérusalem, ainsi mon courroux se déversera sur vous quand vous vous rendrez en Egypte. La dévastation fondra sur vous et vous serez en proie à la malédiction, aux imprécations et à l’opprobre, et vous ne reverrez plus jamais ce pays.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'A vous, le reste de Juda, l’Eternel dit : N’allez pas en Egypte, sachez bien que je vous ai avertis aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Car vous vous êtes fourvoyés, lorsque vous m’avez délégué vers l’Eternel votre Dieu en me disant : « Prie l’Eternel, notre Dieu, pour nous, puis fais-nous savoir tout ce que l’Eternel te dira, et nous le ferons. » '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je vous l’ai fait savoir aujourd’hui, mais vous n’écoutez pas l’Eternel votre Dieu, vous ne tenez pas compte de tout ce qu’il m’a chargé de vous dire. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Maintenant donc, sachez-le bien : vous mourrez par l’épée, la famine ou la peste dans ce pays où vous désirez émigrer.'
