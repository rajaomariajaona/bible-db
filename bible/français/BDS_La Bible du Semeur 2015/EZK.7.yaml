document_id: EZK.7,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le jour de la fin arrive
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Eternel m’adressa la parole et me dit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Voici le jour ! ╵Elle arrive la ruine !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, elle se prépare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le bâton qui va frapper fleurit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’arrogance s’épanouit,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: la violence se dresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour servir de bâton ╵à la méchanceté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne restera rien ╵ni de ce peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ces multitudes bruyantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni de tout son tumulte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tumulte
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sens incertain.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni de sa gloire.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le temps arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le jour approche :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que celui qui achète ╵ne se réjouisse pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que celui qui vend ╵ne se désole pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la colère plane
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur toute cette multitude,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: parce que le vendeur ╵ne retrouvera pas ╵ce qu’il avait vendu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même s’il demeurait ╵au nombre des vivants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, la révélation ╵concernant cette multitude ╵ne sera jamais révoquée :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de ses fautes, ╵aucun d’eux ne pourra ╵sauver sa vie.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: On sonnera du cor, ╵et l’on se tiendra prêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais aucun n’ira au combat
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ma colère plane ╵sur toute cette multitude.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pas d’échappatoire
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Au dehors de la ville, ╵c’est l’épée qui sévit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au dedans, c’est la peste ╵et la famine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est aux champs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: périra par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui est dans la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la peste et la famine ╵le feront succomber.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Si quelque rescapé ╵parvient à s’échapper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s’enfuira vers les montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme les colombes des vallées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils gémiront tous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et je les ferai mourir.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun pour son péché.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Leurs mains pendront sans force
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs genoux flageoleront.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils porteront ╵des habits de toile de sac
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la frayeur les saisira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la honte se lira ╵sur chacun des visages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les têtes ╵seront rasées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Marques de deuil et de tristesse.
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils jetteront ╵leur argent dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et considéreront ╵leur or comme souillé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ni l’argent ni l’or ╵ne pourront les sauver
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de la colère ╵de l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni apaiser leur faim ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne satisferont ╵aucun de leurs désirs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est l’argent et l’or ╵qui les ont fait tomber
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le péché.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O toi, fils d’homme, ╵voici ce que déclare ╵le Seigneur, l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'au pays d’Israël : ╵La fin est arrivée !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux quatre extrémités ╵du pays, c’est la fin !
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ils ont mis leur orgueil ╵dans leurs parures magnifiques
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils s’en sont servis ╵pour fabriquer ╵des idoles abominables ╵et exécrables.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi tout cela ╵je le rendrai souillé pour eux :'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: je le livrerai à des étrangers ╵pour qu’ils le pillent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme butin ╵aux méchants de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui viendront souiller tout cela.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Je détournerai d’eux ma face
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’on profanera ╵le lieu que je chéris.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des brigands y pénétreront ╵et le profaneront.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Fabriquez-vous des chaînes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les crimes font loi ╵dans ce pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la ville est remplie de violence.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J’amènerai ici ╵les pires des peuples païens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu’ils prennent possession ╵de leurs maisons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’abattrai l’orgueil des puissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs sanctuaires
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs sanctuaires
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon l’ancienne version grecque. Le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui les sanctifient.
      marker-yv: yv-n
    - type: text
      text: ' seront profanés.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Voici : la ruine vient,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils chercheront la paix ╵sans pouvoir la trouver.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Désastre sur désastre ╵viendront les submerger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y aura un afflux incessant ╵de mauvaises nouvelles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils solliciteront ╵en vain quelque révélation ╵de la part du prophète,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la loi fera défaut au prêtre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les responsables du peuple ╵seront dépourvus de conseil.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Le roi prendra le deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le prince sera vêtu ╵des habits des temps de malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le peuple du pays ╵aura les mains tremblantes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est d’après leur conduite ╵que je les traiterai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je les jugerai ╵selon leurs propres règles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils reconnaîtront ╵que je suis l’Eternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Oui, maintenant, ╵c’en est fini de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je vais déchaîner ╵contre toi ma colère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et je vais te juger ╵pour ta conduite :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te ferai payer ╵toutes tes abominations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je n’aurai pas pour toi ╵un regard de pitié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je serai sans merci,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te rétribuerai ╵pour ta conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de tes abominations, ╵tu resteras coupable ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous reconnaîtrez ╵que je suis l’Eternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici ce que vous dit ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un malheur, oui un malheur sans pareil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: va survenir !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: La fin arrive. ╵C’est vrai, elle arrive la fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’en est fini de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la voilà qui arrive.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La ruine vient pour toi, ╵habitant du pays !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le moment arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour est proche
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 13.5 ; 22.21-22 ; Es 2.12 ; Jl 1.15 ; 2.1 ; 4.14 ; Am 5.18 ; Ab 15 ; So 1.7.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici : sur les montagnes, ╵c’est la consternation ╵au lieu des cris de joie.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Maintenant, sans tarder, ╵moi, je vais déverser ╵ma colère sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’irai jusqu’au bout ╵de tout mon courroux contre toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je te jugerai ╵pour ta conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te ferai payer ╵toutes tes abominations.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Je n’aurai pas pour toi ╵un regard de pitié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je serai sans merci,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te rétribuerai ╵pour ta conduite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de tes abominations, ╵tu resteras coupable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous reconnaîtrez ╵que c’est moi, l’Eternel, ╵qui vous aurai frappés.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La ruine se prépare
    marker-yv: yv-h
