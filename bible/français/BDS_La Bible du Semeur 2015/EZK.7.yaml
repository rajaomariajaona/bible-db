document_id: EZK.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour de la fin arrive
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '10':
  - type: text
    content: Voici le jour ! ╵Elle arrive la ruine !
  - type: text
    content: Oui, elle se prépare,
  - type: text
    content: et le bâton qui va frapper fleurit,
  - type: text
    content: l’arrogance s’épanouit,
  '11':
  - type: text
    content: la violence se dresse
  - type: text
    content: pour servir de bâton ╵à la méchanceté.
  - type: text
    content: Il ne restera rien ╵ni de ce peuple,
  - type: text
    content: de ces multitudes bruyantes,
  - type: text
    content: ni de tout son tumulte
  - type: note
    content: 'tumulte: sens incertain.'
  - type: text
    content: ','
  - type: text
    content: ni de sa gloire.
  '12':
  - type: text
    content: Le temps arrive,
  - type: text
    content: 'le jour approche :'
  - type: text
    content: que celui qui achète ╵ne se réjouisse pas,
  - type: text
    content: et que celui qui vend ╵ne se désole pas,
  - type: text
    content: car la colère plane
  - type: text
    content: sur toute cette multitude,
  '13':
  - type: text
    content: parce que le vendeur ╵ne retrouvera pas ╵ce qu’il avait vendu,
  - type: text
    content: même s’il demeurait ╵au nombre des vivants.
  - type: text
    content: 'En effet, la révélation ╵concernant cette multitude ╵ne sera jamais révoquée :'
  - type: text
    content: à cause de ses fautes, ╵aucun d’eux ne pourra ╵sauver sa vie.
  '14':
  - type: text
    content: On sonnera du cor, ╵et l’on se tiendra prêt,
  - type: text
    content: mais aucun n’ira au combat
  - type: text
    content: car ma colère plane ╵sur toute cette multitude.
  - type: heading
    content: Pas d’échappatoire
  '15':
  - type: text
    content: Au dehors de la ville, ╵c’est l’épée qui sévit,
  - type: text
    content: au dedans, c’est la peste ╵et la famine.
  - type: text
    content: Celui qui est aux champs
  - type: text
    content: périra par l’épée,
  - type: text
    content: et celui qui est dans la ville,
  - type: text
    content: la peste et la famine ╵le feront succomber.
  '16':
  - type: text
    content: Si quelque rescapé ╵parvient à s’échapper,
  - type: text
    content: il s’enfuira vers les montagnes
  - type: text
    content: tout comme les colombes des vallées.
  - type: text
    content: Et ils gémiront tous
  - type: note
    content: 'L’ancienne version grecque a : et je les ferai mourir.'
  - type: text
    content: ','
  - type: text
    content: chacun pour son péché.
  '17':
  - type: text
    content: Leurs mains pendront sans force
  - type: text
    content: et leurs genoux flageoleront.
  '18':
  - type: text
    content: Ils porteront ╵des habits de toile de sac
  - type: text
    content: et la frayeur les saisira,
  - type: text
    content: la honte se lira ╵sur chacun des visages,
  - type: text
    content: toutes les têtes ╵seront rasées
  - type: note
    content: Marques de deuil et de tristesse.
  - type: text
    content: .
  '19':
  - type: text
    content: Ils jetteront ╵leur argent dans les rues,
  - type: text
    content: et considéreront ╵leur or comme souillé,
  - type: text
    content: car ni l’argent ni l’or ╵ne pourront les sauver
  - type: text
    content: au jour de la colère ╵de l’Eternel,
  - type: text
    content: ni apaiser leur faim ;
  - type: text
    content: ils ne satisferont ╵aucun de leurs désirs,
  - type: text
    content: car c’est l’argent et l’or ╵qui les ont fait tomber
  - type: text
    content: dans le péché.
  '2':
  - type: text
    content: O toi, fils d’homme, ╵voici ce que déclare ╵le Seigneur, l’Eternel,
  - type: text
    content: 'au pays d’Israël : ╵La fin est arrivée !'
  - type: text
    content: Aux quatre extrémités ╵du pays, c’est la fin !
  '20':
  - type: text
    content: Ils ont mis leur orgueil ╵dans leurs parures magnifiques
  - type: text
    content: et ils s’en sont servis ╵pour fabriquer ╵des idoles abominables ╵et exécrables.
  - type: text
    content: 'C’est pourquoi tout cela ╵je le rendrai souillé pour eux :'
  '21':
  - type: text
    content: je le livrerai à des étrangers ╵pour qu’ils le pillent,
  - type: text
    content: comme butin ╵aux méchants de la terre
  - type: text
    content: qui viendront souiller tout cela.
  '22':
  - type: text
    content: Je détournerai d’eux ma face
  - type: text
    content: et l’on profanera ╵le lieu que je chéris.
  - type: text
    content: Des brigands y pénétreront ╵et le profaneront.
  '23':
  - type: text
    content: Fabriquez-vous des chaînes,
  - type: text
    content: car les crimes font loi ╵dans ce pays,
  - type: text
    content: et la ville est remplie de violence.
  '24':
  - type: text
    content: J’amènerai ici ╵les pires des peuples païens
  - type: text
    content: afin qu’ils prennent possession ╵de leurs maisons.
  - type: text
    content: J’abattrai l’orgueil des puissants,
  - type: text
    content: leurs sanctuaires
  - type: note
    content: 'leurs sanctuaires: selon l’ancienne version grecque. Le texte hébreu traditionnel a : ceux qui les sanctifient.'
  - type: text
    content: ' seront profanés.'
  '25':
  - type: text
    content: 'Voici : la ruine vient,'
  - type: text
    content: ils chercheront la paix ╵sans pouvoir la trouver.
  '26':
  - type: text
    content: Désastre sur désastre ╵viendront les submerger,
  - type: text
    content: il y aura un afflux incessant ╵de mauvaises nouvelles.
  - type: text
    content: Ils solliciteront ╵en vain quelque révélation ╵de la part du prophète,
  - type: text
    content: la loi fera défaut au prêtre
  - type: text
    content: et les responsables du peuple ╵seront dépourvus de conseil.
  '27':
  - type: text
    content: Le roi prendra le deuil,
  - type: text
    content: et le prince sera vêtu ╵des habits des temps de malheur,
  - type: text
    content: le peuple du pays ╵aura les mains tremblantes.
  - type: text
    content: C’est d’après leur conduite ╵que je les traiterai
  - type: text
    content: et je les jugerai ╵selon leurs propres règles,
  - type: text
    content: et ils reconnaîtront ╵que je suis l’Eternel.
  '3':
  - type: text
    content: Oui, maintenant, ╵c’en est fini de toi,
  - type: text
    content: car je vais déchaîner ╵contre toi ma colère
  - type: text
    content: 'et je vais te juger ╵pour ta conduite :'
  - type: text
    content: je te ferai payer ╵toutes tes abominations.
  '4':
  - type: text
    content: Je n’aurai pas pour toi ╵un regard de pitié,
  - type: text
    content: je serai sans merci,
  - type: text
    content: je te rétribuerai ╵pour ta conduite,
  - type: text
    content: et, de tes abominations, ╵tu resteras coupable ;
  - type: text
    content: et vous reconnaîtrez ╵que je suis l’Eternel.
  '5':
  - type: text
    content: 'Voici ce que vous dit ╵le Seigneur, l’Eternel :'
  - type: text
    content: Un malheur, oui un malheur sans pareil
  - type: text
    content: va survenir !
  '6':
  - type: text
    content: La fin arrive. ╵C’est vrai, elle arrive la fin,
  - type: text
    content: c’en est fini de toi,
  - type: text
    content: la voilà qui arrive.
  '7':
  - type: text
    content: La ruine vient pour toi, ╵habitant du pays !
  - type: text
    content: Oui, le moment arrive,
  - type: text
    content: le jour est proche
  - type: note
    content: Voir 13.5 ; 22.21-22 ; Es 2.12 ; Jl 1.15 ; 2.1 ; 4.14 ; Am 5.18 ; Ab 15 ; So 1.7.
  - type: text
    content: .
  - type: text
    content: 'Voici : sur les montagnes, ╵c’est la consternation ╵au lieu des cris de joie.'
  '8':
  - type: text
    content: Maintenant, sans tarder, ╵moi, je vais déverser ╵ma colère sur toi,
  - type: text
    content: et j’irai jusqu’au bout ╵de tout mon courroux contre toi.
  - type: text
    content: Oui, je te jugerai ╵pour ta conduite,
  - type: text
    content: je te ferai payer ╵toutes tes abominations.
  '9':
  - type: text
    content: Je n’aurai pas pour toi ╵un regard de pitié,
  - type: text
    content: je serai sans merci,
  - type: text
    content: je te rétribuerai ╵pour ta conduite
  - type: text
    content: et, de tes abominations, ╵tu resteras coupable,
  - type: text
    content: et vous reconnaîtrez ╵que c’est moi, l’Eternel, ╵qui vous aurai frappés.
  - type: heading
    content: La ruine se prépare
