document_id: EZR.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le décret de Cyrus
  - type: text
    content: La première année du règne de Cyrus de Perse
  - type: note
    content: En 538 av. J.-C. Il s’agit de la première année du règne de Cyrus sur Babylone, après la conquête de la ville en 539. Fondateur de l’Empire perse, Cyrus a gouverné cet empire de 559 à 530 av. J.-C. Es 44.28 et 45.1 avaient annoncé son œuvre de libération en le nommant le « berger » et l’« oint » de l’Eternel.
  - type: text
    content: ', l’Eternel, pour accomplir la parole qu’il avait prononcée par le prophète Jérémie'
  - type: note
    content: Voir Jr 25.11-12 ; 29.10.
  - type: text
    content: ', agit sur l’esprit de Cyrus, empereur de Perse. Alors Cyrus fit faire, oralement et par écrit, la proclamation suivante à travers tout son empire'
  - type: note
    content: Voir 6.3-5.
  - type: text
    content: '  :'
  '10':
  - type: text
    content: 30 coupes en or, 410 coupes doubles
  - type: note
    content: Sens incertain.
  - type: text
    content: ' en argent et 1 000 autres ustensiles. '
  '11':
  - type: text
    content: En tout, il y avait 5 400 ustensiles d’or et d’argent. Sheshbatsar rapporta le tout lorsque les exilés quittèrent Babylone pour retourner à Jérusalem.
  '2':
  - type: text
    content: 'Voici ce que déclare Cyrus, empereur de Perse : « L’Eternel, le Dieu du ciel, m’a donné tous les royaumes de la terre'
  - type: note
    content: L’empire de Cyrus allait de l’Indus à l’Egypte et à Chypre, de la mer Noire au golfe Persique et à l’Ethiopie.
  - type: text
    content: ', et il m’a chargé de lui construire un temple à Jérusalem en Juda'
  - type: note
    content: Voir Es 44.28.
  - type: text
    content: '. '
  '3':
  - type: text
    content: Quels sont ceux d’entre vous qui font partie de son peuple ? Que leur Dieu soit avec eux, et qu’ils partent à Jérusalem, en Juda, pour reconstruire le temple de l’Eternel, le Dieu d’Israël. C’est le Dieu qui réside à Jérusalem
  - type: note
    content: Les v. 1-3 ont leur parallèle en 2 Ch 36.22-23.
  - type: text
    content: '. '
  '4':
  - type: text
    content: Que partout où résident ceux qui restent de son peuple, les gens de l’endroit leur apportent des dons d’argent et d’or, de divers biens, du bétail ainsi que des offrandes volontaires pour le temple du Dieu qui est à Jérusalem. »
  - type: heading
    content: Les préparatifs de départ
  '5':
  - type: text
    content: Alors les chefs des groupes familiaux de Juda et de Benjamin, les prêtres et les lévites, et tous ceux en qui Dieu avait agi, se préparèrent à partir afin de reconstruire le temple de l’Eternel à Jérusalem
  - type: note
    content: 'Distante de quelque 900 à 1 000 kilomètres de la Babylonie : un voyage de 2 à 3 mois pour une caravane chargée.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Tous leurs voisins leur vinrent en aide en leur donnant des objets d’argent et d’or, divers biens, du bétail et des objets précieux, sans compter leurs offrandes volontaires. '
  '7':
  - type: text
    content: De son côté, l’empereur Cyrus fit chercher les ustensiles du Temple que Nabuchodonosor avait emportés de Jérusalem pour les placer dans le sanctuaire de son dieu
  - type: note
    content: Voir 2 R 25.13-15 ; Dn 1.2 ; 5.2.
  - type: text
    content: '. '
  '8':
  - type: text
    content: Sur ordre de l’empereur perse, Mitredath le trésorier alla les chercher et les remit, après les avoir comptés, à Sheshbatsar, le chef de Juda
  - type: note
    content: Nom d’origine babylonienne du gouverneur qui conduira la première caravane de rapatriés et les gouvernera sous l’égide du satrape de Samarie (5.14). Certains l’ont identifié avec le gouverneur juif Zorobabel (Ag 1.1  ; voir Esd 2.2 ; 3.8 ; 4.2-3 ; 5.2) en suggérant que Sheshbatsar était son nom officiel (voir Dn 1.7), mais cette identification tend aujourd’hui à être abandonnée.
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'En voici la liste : 30 plats'
  - type: note
    content: 'plats: ou soucoupes, bols, bassines ?'
  - type: text
    content: ' en or, 1 000 en argent, 29 couteaux'
  - type: note
    content: Pour les sacrifices.
  - type: text
    content: ', '
