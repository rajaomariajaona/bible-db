document_id: EZR.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le décret de Cyrus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La première année du règne de Cyrus de Perse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En 538 av. J.-C. Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la première année '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'du règne de Cyrus sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Babylone, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'après la conquête de la ville en 539. Fondateur de l’Empire perse, Cyrus a gouverné cet empire de 559 à 530 av. J.-C. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 44.28
        metadata:
          usfm: ISA.44.28
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '45.1'
        metadata:
          usfm: ISA.45.1
      - type: text
        text: ' avaient annoncé son œuvre de libération en le nommant le « berger » et l’« oint » de l’Eternel.'
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel, pour accomplir la parole qu’il avait prononcée par le prophète Jérémie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jr 25.11-12 ; 29.10.
    marker-yv: yv-n
  - type: text
    text: ', agit sur l’esprit de Cyrus, empereur de Perse. Alors Cyrus fit faire, oralement et par écrit, la proclamation suivante à travers tout son empire'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6.3-5
        metadata:
          usfm: EZR.6.3+EZR.6.4+EZR.6.5
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que déclare Cyrus, empereur de Perse : « L’Eternel, le Dieu du ciel, m’a donné tous les royaumes de la terre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’empire de Cyrus allait de l’Indus à l’Egypte et à Chypre, de la mer Noire au golfe Persique et à l’Ethiopie.
    marker-yv: yv-n
  - type: text
    text: ', et il m’a chargé de lui construire un temple à Jérusalem en Juda'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 44.28
        metadata:
          usfm: ISA.44.28
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quels sont ceux d’entre vous qui font partie de son peuple ? Que leur Dieu soit avec eux, et qu’ils partent à Jérusalem, en Juda, pour reconstruire le temple de l’Eternel, le Dieu d’Israël. C’est le Dieu qui réside à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 1-3 ont leur parallèle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 36.22-23
        metadata:
          usfm: 2CH.36.22+2CH.36.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que partout où résident ceux qui restent de son peuple, les gens de l’endroit leur apportent des dons d’argent et d’or, de divers biens, du bétail ainsi que des offrandes volontaires pour le temple du Dieu qui est à Jérusalem. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les préparatifs de départ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors les chefs des groupes familiaux de Juda et de Benjamin, les prêtres et les lévites, et tous ceux en qui Dieu avait agi, se préparèrent à partir afin de reconstruire le temple de l’Eternel à Jérusalem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Distante de quelque 900 à 1 000 kilomètres de la Babylonie : un voyage de 2 à 3 mois pour une caravane chargée.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous leurs voisins leur vinrent en aide en leur donnant des objets d’argent et d’or, divers biens, du bétail et des objets précieux, sans compter leurs offrandes volontaires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: De son côté, l’empereur Cyrus fit chercher les ustensiles du Temple que Nabuchodonosor avait emportés de Jérusalem pour les placer dans le sanctuaire de son dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 R 25.13-15 ; Dn 1.2 ; 5.2.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sur ordre de l’empereur perse, Mitredath le trésorier alla les chercher et les remit, après les avoir comptés, à Sheshbatsar, le chef de Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nom d’origine babylonienne du gouverneur qui conduira la première caravane de rapatriés et les gouvernera sous l’égide du satrape de Samarie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.14'
        metadata:
          usfm: EZR.5.14
      - type: text
        text: ). Certains l’ont identifié avec le gouverneur juif Zorobabel (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ag 1.1
        metadata:
          usfm: HAG.1.1
      - type: text
        text: '  ; voir Esd 2.2 ; 3.8 ; 4.2-3 ; 5.2) en suggérant que '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sheshbatsar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était son nom officiel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 1.7
        metadata:
          usfm: DAN.1.7
      - type: text
        text: ), mais cette identification tend aujourd’hui à être abandonnée.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En voici la liste : 30 plats'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plats
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soucoupes, bols, bassines ?
    marker-yv: yv-n
  - type: text
    text: ' en or, 1 000 en argent, 29 couteaux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour les sacrifices.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 30 coupes en or, 410 coupes doubles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sens incertain.
    marker-yv: yv-n
  - type: text
    text: ' en argent et 1 000 autres ustensiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En tout, il y avait 5 400 ustensiles d’or et d’argent. Sheshbatsar rapporta le tout lorsque les exilés quittèrent Babylone pour retourner à Jérusalem.
