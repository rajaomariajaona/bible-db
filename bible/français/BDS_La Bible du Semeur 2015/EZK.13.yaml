document_id: EZK.13,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les faux prophètes, marchands de paix illusoire
  - type: text
    content: 'L’Eternel m’adressa la parole et me dit :'
  '10':
  - type: text
    content: Car ils égarent mon peuple en annonçant la paix quand il n’y a pas la paix. Ils se contentent de crépir le mur que mon peuple a bâti
  - type: note
    content: Pour les v. 10-16, voir 22.28 ; Jr 6.12-15 ; 8.10-12.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Dis à ces gens qui mettent du crépi, que le mur tombera. Une pluie torrentielle s’abattra soudain, les grêlons tomberont, un vent d’ouragan éclatera, '
  '12':
  - type: text
    content: 'et le mur tombera. Ne vous dira-t-on pas alors : “A quoi servait l’enduit dont vous l’avez crépi ?” '
  '13':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, parle ainsi : Dans mon indignation, je ferai déchaîner le vent de l’ouragan, une pluie torrentielle éclatera par ma colère. J’enverrai contre vous, dans mon irritation, des grêlons destructeurs. '
  '14':
  - type: text
    content: 'Et j’abattrai le mur enduit par vous de crépi ; oui, je le raserai jusqu’en ses fondements qui seront mis à nu. Il tombera, vous périrez au milieu des décombres, et vous reconnaîtrez que je suis l’Eternel. '
  '15':
  - type: text
    content: 'J’assouvirai ainsi la fureur qui m’anime contre ce mur et contre ceux qui l’ont crépi. Je vous dirai alors : Où est-il donc le mur et où sont tous ces gens qui l’enduisaient pour le crépir ? '
  '16':
  - type: text
    content: Où sont-ils maintenant, tous ces prophètes d’Israël qui ont prophétisé au sujet de Jérusalem, et qui ont eu pour elles des visions annonçant la paix quand il n’y avait pas de paix ? C’est là ce que déclare le Seigneur, l’Eternel. »
  - type: heading
    content: Malheur aux voyantes aveugles
  '17':
  - type: text
    content: 'Et toi, fils d’homme, tourne-toi vers les filles de ton peuple qui font les prophétesses, proclamant des prophéties de leur propre cru ; proclame une prophétie à leur sujet '
  '18':
  - type: text
    content: 'et dis : « Voici ce que déclare le Seigneur, l’Eternel : Malheur à celles qui cousent des rubans pour les poignets et fabriquent des voiles de toutes tailles pour les têtes, pour capturer les vies. Vous capturez les vies des membres de mon peuple, et votre vie à vous, vous la préserveriez ? '
  '19':
  - type: text
    content: 'Vous m’avez profané devant mon peuple pour quelques poignées d’orge et des morceaux de pain, en donnant la mort à des gens qui n’ont pas à mourir, et en laissant vivre d’autres qui ne devraient pas vivre, en mentant à mon peuple qui croit à ces mensonges. '
  '2':
  - type: text
    content: 'Fils d’homme, prophétise sur les prophètes d’Israël qui prétendent prophétiser, mais qui n’apportent que des prophéties de leur propre cru. Dis-leur : « Ecoutez donc la parole de l’Eternel : '
  '20':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, vous déclare : Voici, j’en veux à vos rubans avec lesquels vous capturez les vies humaines comme des oiseaux. Je les déchirerai en les arrachant de vos bras, et je relâcherai ces gens dont vous capturez les vies comme des oiseaux. '
  '21':
  - type: text
    content: 'Je déchire vos voiles et je vais délivrer mon peuple de vos griffes, oui, vous ne pourrez plus vous servir de vos voiles pour prendre les gens au piège, et vous reconnaîtrez que je suis l’Eternel. '
  '22':
  - type: text
    content: 'Parce que vous découragez les hommes justes par des mensonges quand je ne voulais pas qu’ils soient découragés, et qu’aussi vous encouragez les œuvres des méchants, les empêchant ainsi d’abandonner leur mauvaise conduite pour conserver la vie, '
  '23':
  - type: text
    content: 'à cause de cela, voici : vous n’aurez plus de visions mensongères et vous ne ferez plus de prédictions, car je vais délivrer mon peuple de vos griffes, et vous reconnaîtrez que je suis l’Eternel. »'
  '3':
  - type: text
    content: 'Voici ce que vous dit le Seigneur, l’Eternel : Malheur à vous, prophètes insensés, car vous suivez votre propre inspiration et vous n’avez reçu aucune révélation. '
  '4':
  - type: text
    content: 'O peuple d’Israël, tes prophètes ressemblent aux chacals dans les ruines. '
  '5':
  - type: text
    content: Vous, prophètes, vous n’êtes pas montés sur les brèches pour les colmater et entourer la communauté d’Israël d’un rempart pour qu’elle puisse résister dans la bataille au jour de l’Eternel
  - type: note
    content: Voir 7.7-14, 19 ; 22.21-22 ; Es 2.12 ; Jl 1.15 ; 2.1 ; 4.4 ; Am 5.18 ; Ab 15 ; So 1.7.
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Ils ont des visions fausses, des prédictions trompeuses, eux qui disent : “L’Eternel le déclare”, alors que l’Eternel ne les a pas envoyés, et ils espèrent voir leur parole confirmée. '
  '7':
  - type: text
    content: 'Elles sont fausses, les révélations que vous avez ! Elles sont trompeuses, les prédictions que vous proférez lorsque vous prétendez : “L’Eternel le déclare”, quand je n’ai pas parlé ! '
  '8':
  - type: text
    content: 'C’est pourquoi le Seigneur, l’Eternel, parle ainsi : Parce que vous proclamez des faussetés et que vous avez des visions mensongères, je m’en prendrai à vous. Voilà ce que déclare le Seigneur, l’Eternel ! '
  '9':
  - type: text
    content: 'Je vais faire peser ma main sur les prophètes qui ont des révélations fausses et qui prononcent des prédictions trompeuses. Ils ne siégeront pas au conseil de mon peuple, ni ne seront inscrits sur la liste des membres de la communauté israélite, ils ne rentreront pas au pays d’Israël. Et vous reconnaîtrez que je suis, moi, le Seigneur, l’Eternel. '
