document_id: REV.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux témoinsScène inspirée d’Ez 40.1-5 et Za 2.5-7 ; 4.
  - type: text
    content: 'Je reçus un roseau, une sorte de baguette d’arpenteur, avec cet ordre :'
  - type: text
    content: Debout, prends les mesures du temple de Dieu, de l’autel et de ceux qui se prosternent là dans l’adoration
  - type: note
    content: Cette formule suggère que ce sont les adorateurs qui constituent le temple à mesurer.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Tous les habitants de la terre seront dans la joie à cause de leur mort, ils s’en réjouiront et échangeront des cadeaux, car ces deux prophètes leur auront causé bien des tourments.
  '11':
  - type: text
    content: 'Mais au bout de ces trois jours et demi, un esprit de vie venu de Dieu entra en eux, et ils se dressèrent sur leurs pieds. La terreur s’empara de tous les assistants. '
  '12':
  - type: text
    content: 'Une voix puissante venant du ciel cria aux deux témoins : « Montez ici ! » ; ils montèrent au ciel dans la nuée sous les regards de leurs ennemis. '
  '13':
  - type: text
    content: Au même instant se produisit un grand tremblement de terre qui fit s’effondrer la dixième partie de la ville et, dans ce tremblement de terre, sept mille personnes périrent. Les survivants furent saisis d’effroi, et rendirent hommage au Dieu du ciel.
  '14':
  - type: text
    content: Le deuxième malheur est passé ; voici, le troisième malheur vient rapidement.
  - type: heading
    content: 'La septième trompette : la venue du royaume de Christ'
  '15':
  - type: text
    content: 'Le septième ange sonna de la trompette, et des voix retentirent dans le ciel : Le royaume du monde a passé maintenant aux mains de notre Seigneur et de son Messie. Il régnera éternellement.'
  '16':
  - type: text
    content: 'Et les vingt-quatre représentants du peuple de Dieu qui siègent devant Dieu sur leurs trônes se prosternèrent la face contre terre, et adorèrent Dieu '
  '17':
  - type: text
    content: 'en disant :'
  - type: text
    content: Seigneur Dieu tout-puissant
  - type: text
    content: qui es et qui étais,
  - type: text
    content: nous te disons
  - type: text
    content: notre reconnaissance
  - type: text
    content: car tu as mis en œuvre
  - type: text
    content: ton immense puissance
  - type: text
    content: pour établir ton règne.
  '18':
  - type: text
    content: Les autres peuples s’étaient soulevés
  - type: text
    content: dans leur fureur,
  - type: text
    content: mais ta colère est arrivée.
  - type: text
    content: L’heure est venue
  - type: text
    content: où tous les morts seront jugés,
  - type: text
    content: et où tes serviteurs les prophètes,
  - type: text
    content: et les membres du peuple saint,
  - type: text
    content: eux qui te craignent,
  - type: text
    content: petits et grands,
  - type: text
    content: seront récompensés.
  - type: text
    content: C’est aussi le moment
  - type: text
    content: où ceux qui détruisent la terre
  - type: text
    content: seront détruits.
  - type: heading
    content: Les sept signes ou visions
  '19':
  - type: text
    content: Alors s’ouvrit le temple de Dieu qui est dans le ciel, et le coffre de son alliance y apparut. Il y eut des éclairs, des voix, des coups de tonnerre, un tremblement de terre et une forte grêle.
  '2':
  - type: text
    content: 'Mais laisse de côté le parvis extérieur du Temple, ne le mesure donc pas, car il a été abandonné aux peuples étrangers. Ils fouleront aux pieds la ville sainte pendant quarante-deux mois. '
  '3':
  - type: text
    content: 'Je confierai à mes deux témoins la mission de prophétiser, habillés de vêtements de deuil, pendant mille deux cent soixante jours. '
  '4':
  - type: text
    content: 'Ces deux témoins sont les deux oliviers et les deux chandeliers qui se tiennent devant le Seigneur de la Terre. '
  '5':
  - type: text
    content: Si quelqu’un veut leur faire du mal, un feu jaillit de leur bouche et consume leurs ennemis. Oui, si quelqu’un veut leur faire du mal, c’est ainsi qu’il lui faudra mourir
  - type: note
    content: Voir 2 R 1.
  - type: text
    content: .
  '6':
  - type: text
    content: Ces deux témoins ont le pouvoir de fermer le ciel pour empêcher la pluie de tomber durant tout le temps où ils prophétiseront. Ils ont aussi le pouvoir de changer les eaux en sang et de frapper la terre de toutes sortes de plaies, aussi souvent qu’ils le voudront
  - type: note
    content: Allusion à Elie (1 R 17.1) et à Moïse (Ex 7.17-21).
  - type: text
    content: .
  '7':
  - type: text
    content: 'Mais lorsqu’ils auront achevé de rendre leur témoignage, la bête qui monte de l’abîme combattra contre eux, elle les vaincra et les tuera. '
  '8':
  - type: text
    content: Leurs cadavres resteront exposés sur la place de la grande ville qui s’appelle symboliquement Sodome et Egypte
  - type: note
    content: Sodome, ville connue pour son immoralité ; Egypte, pays de l’esclavage dont Dieu a libéré son peuple sous la conduite de Moïse.
  - type: text
    content: ', c’est la ville où leur Seigneur a été crucifié. '
  '9':
  - type: text
    content: 'Des gens de tout peuple, de toute tribu, de toute langue et de toute nation regarderont leurs cadavres pendant trois jours et demi et s’opposeront à leur ensevelissement. '
