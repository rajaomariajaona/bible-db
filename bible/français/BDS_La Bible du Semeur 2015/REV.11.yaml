document_id: REV.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les deux témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Scène inspirée d’
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 40.1-5
        - type: text
          text: ' et Za 2.5-7 ; 4.'
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je reçus un roseau, une sorte de baguette d’arpenteur, avec cet ordre :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Debout, prends les mesures du temple de Dieu, de l’autel et de ceux qui se prosternent là dans l’adoration
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette formule suggère que ce sont les adorateurs qui constituent le temple à mesurer.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous les habitants de la terre seront dans la joie à cause de leur mort, ils s’en réjouiront et échangeront des cadeaux, car ces deux prophètes leur auront causé bien des tourments.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais au bout de ces trois jours et demi, un esprit de vie venu de Dieu entra en eux, et ils se dressèrent sur leurs pieds. La terreur s’empara de tous les assistants. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une voix puissante venant du ciel cria aux deux témoins : « Montez ici ! » ; ils montèrent au ciel dans la nuée sous les regards de leurs ennemis. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au même instant se produisit un grand tremblement de terre qui fit s’effondrer la dixième partie de la ville et, dans ce tremblement de terre, sept mille personnes périrent. Les survivants furent saisis d’effroi, et rendirent hommage au Dieu du ciel.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le deuxième malheur est passé ; voici, le troisième malheur vient rapidement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'La septième trompette : la venue du royaume de Christ'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le septième ange sonna de la trompette, et des voix retentirent dans le ciel : Le royaume du monde a passé maintenant aux mains de notre Seigneur et de son Messie. Il régnera éternellement.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les vingt-quatre représentants du peuple de Dieu qui siègent devant Dieu sur leurs trônes se prosternèrent la face contre terre, et adorèrent Dieu '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en disant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur Dieu tout-puissant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui es et qui étais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous te disons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre reconnaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu as mis en œuvre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton immense puissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour établir ton règne.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les autres peuples s’étaient soulevés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans leur fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ta colère est arrivée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’heure est venue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où tous les morts seront jugés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où tes serviteurs les prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les membres du peuple saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui te craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: petits et grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront récompensés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est aussi le moment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où ceux qui détruisent la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront détruits.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les sept signes ou visions
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors s’ouvrit le temple de Dieu qui est dans le ciel, et le coffre de son alliance y apparut. Il y eut des éclairs, des voix, des coups de tonnerre, un tremblement de terre et une forte grêle.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais laisse de côté le parvis extérieur du Temple, ne le mesure donc pas, car il a été abandonné aux peuples étrangers. Ils fouleront aux pieds la ville sainte pendant quarante-deux mois. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je confierai à mes deux témoins la mission de prophétiser, habillés de vêtements de deuil, pendant mille deux cent soixante jours. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces deux témoins sont les deux oliviers et les deux chandeliers qui se tiennent devant le Seigneur de la Terre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un veut leur faire du mal, un feu jaillit de leur bouche et consume leurs ennemis. Oui, si quelqu’un veut leur faire du mal, c’est ainsi qu’il lui faudra mourir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces deux témoins ont le pouvoir de fermer le ciel pour empêcher la pluie de tomber durant tout le temps où ils prophétiseront. Ils ont aussi le pouvoir de changer les eaux en sang et de frapper la terre de toutes sortes de plaies, aussi souvent qu’ils le voudront
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à Elie (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 17.1
        - type: text
          text: ) et à Moïse (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 7.17-21
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais lorsqu’ils auront achevé de rendre leur témoignage, la bête qui monte de l’abîme combattra contre eux, elle les vaincra et les tuera. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Leurs cadavres resteront exposés sur la place de la grande ville qui s’appelle symboliquement Sodome et Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sodome
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ville connue pour son immoralité ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Egypte
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pays de l’esclavage dont Dieu a libéré son peuple sous la conduite de Moïse.
      marker-yv: yv-n
    - type: text
      text: ', c’est la ville où leur Seigneur a été crucifié. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des gens de tout peuple, de toute tribu, de toute langue et de toute nation regarderont leurs cadavres pendant trois jours et demi et s’opposeront à leur ensevelissement. '
