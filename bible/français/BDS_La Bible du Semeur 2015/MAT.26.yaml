document_id: MAT.26,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort et résurrection de Jésus
  - type: heading
    content: Le complot
  - type: heading
    content: (Mc 14.1-2 ; Lc 22.1-2 ; Jn 11.47-53)
  - type: text
    content: 'Quand Jésus eut fini de donner toutes ces instructions, il dit à ses disciples : '
  '10':
  - type: text
    content: 'Mais, se rendant compte de cela, Jésus leur dit : '
  - type: text
    content: Pourquoi faites-vous de la peine à cette femme ? Ce qu’elle vient d’accomplir pour moi est vraiment une belle action.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Des pauvres, vous en aurez toujours autour de vous ; mais moi, vous ne m’aurez pas toujours avec vous.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Si elle a répandu cette myrrhe sur moi, c’est pour préparer mon enterrement.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Vraiment, je vous l’assure, dans le monde entier, partout où cette Bonne Nouvelle qu’est l’Evangile sera annoncée, on racontera aussi, en souvenir d’elle, ce qu’elle vient de faire.
  - type: heading
    content: La trahison
  - type: heading
    content: (Mc 14.10-11 ; Lc 22.3-6)
  '14':
  - type: text
    content: 'Alors, l’un des Douze, celui qui s’appelait Judas Iscariot, se rendit auprès des chefs des prêtres '
  '15':
  - type: text
    content: 'pour leur demander : Si je me charge de vous livrer Jésus, quelle somme me donnerez-vous ?'
  - type: text
    content: 'Ils lui versèrent trente pièces d’argent. '
  '16':
  - type: text
    content: A partir de ce moment-là, il chercha une occasion favorable pour leur livrer Jésus.
  - type: heading
    content: Jésus célèbre la Pâque avec ses disciples
  - type: heading
    content: (Mc 14.12-16 ; Lc 22.7-13)
  '17':
  - type: text
    content: 'Le premier jour de la fête des Pains sans levain, les disciples vinrent trouver Jésus pour lui demander : Où veux-tu que nous fassions les préparatifs pour le repas de la Pâque ?'
  '18':
  - type: text
    content: 'Il leur répondit : '
  - type: text
    content: 'Allez à la ville, chez un tel, et parlez-lui ainsi : « Le Maître te fait dire : Mon heure est arrivée. C’est chez toi que je prendrai le repas de la Pâque avec mes disciples. »'
  '19':
  - type: text
    content: Les disciples se conformèrent aux ordres de Jésus et préparèrent le repas de la Pâque.
  - type: heading
    content: (Mc 14.17-21 ; Lc 22.14, 21-23 ; Jn 13.21-30)
  '2':
  - type: text
    content: 'Vous savez que la fête de la '
  - type: text
    content: Pâque
  - type: text
    content: ' aura lieu dans deux jours. C’est alors que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' sera livré pour être crucifié.'
  '20':
  - type: text
    content: 'Le soir, Jésus se mit à table avec les Douze et, '
  '21':
  - type: text
    content: 'pendant qu’ils mangeaient, il dit : '
  - type: text
    content: 'Vraiment, je vous l’assure : l’un de vous me trahira.'
  '22':
  - type: text
    content: 'Les disciples en furent consternés. Ils se mirent, l’un après l’autre, à lui demander : Seigneur, ce n’est pas moi, n’est-ce pas ?'
  '23':
  - type: text
    content: 'En réponse, il leur dit : '
  - type: text
    content: C’est un qui a trempé son pain dans le plat avec moi, lui, il me trahira.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Certes, le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' s’en va conformément à ce que les Ecritures annoncent à son sujet. Mais malheur à celui qui le trahit ! Il aurait mieux valu pour lui n’être jamais né !'
  '25':
  - type: text
    content: 'A son tour, Judas, qui le trahissait, lui demanda : Maître, ce n’est pas moi, n’est-ce pas ?'
  - type: text
    content: – Tu le dis toi-même,
  - type: text
    content: ' lui répondit Jésus.'
  - type: heading
    content: (Mc 14.22-25 ; Lc 22.15-20 ; voir 1 Co 11.23-25)
  '26':
  - type: text
    content: 'Au cours du repas, Jésus prit du pain puis, après avoir prononcé la prière de reconnaissance, il le partagea en morceaux, puis il les donna à ses disciples, en disant : '
  - type: text
    content: Prenez, mangez, ceci est mon corps.
  '27':
  - type: text
    content: 'Ensuite il prit une coupe et, après avoir remercié Dieu, il la leur donna en disant : '
  - type: text
    content: Buvez-en tous ;
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'ceci est mon sang, par lequel est '
  - type: text
    content: scellée
  - type: text
    content: ' l’'
  - type: text
    content: alliance
  - type: text
    content: . Il va être versé pour beaucoup d’hommes, afin que leurs péchés soient pardonnés.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Je vous le déclare : désormais, je ne boirai plus du fruit de la vigne jusqu’au jour où je boirai le vin nouveau avec vous dans le '
  - type: text
    content: royaume de mon Père
  - type: text
    content: .
  - type: heading
    content: Jésus annonce le reniement de Pierre
  - type: heading
    content: (Mc 14.26-31 ; Lc 22.33-34 ; Jn 13.37-38)
  '3':
  - type: text
    content: 'Alors, les chefs des prêtres et les responsables du peuple se rassemblèrent dans la cour du grand-prêtre Caïphe ; '
  '30':
  - type: text
    content: Après cela, ils chantèrent les psaumes de la Pâque
  - type: note
    content: Pendant le repas de la Pâque, on chantait les Ps 113 à 118.
  - type: text
    content: . Ensuite, ils sortirent pour se rendre au mont des Oliviers.
  '31':
  - type: text
    content: 'Jésus leur dit alors : '
  - type: text
    content: 'Cette nuit, ce qui m’arrivera vous ébranlera tous dans votre foi. En effet, il est écrit :'
  - type: text
    content: Je frapperai le berger,
  - type: text
    content: et les brebis du troupeau seront dispersées
  - type: text
    content: ' '
  - type: note
    content: Za 13.7 .
  - type: text
    content: .
  '32':
  - type: text
    content: ' '
  - type: text
    content: 'Néanmoins, quand je serai ressuscité, je vous précéderai en '
  - type: text
    content: Galilée
  - type: text
    content: .
  '33':
  - type: text
    content: 'Pierre prit la parole et lui dit : Même si tous les autres sont ébranlés à cause de ce qui t’arrivera, moi je ne le serai pas !'
  '34':
  - type: text
    content: 'Jésus reprit : '
  - type: text
    content: 'Vraiment, je te l’assure : cette nuit même, avant que le coq ait chanté, tu m’auras renié trois fois.'
  '35':
  - type: text
    content: 'Pierre réaffirma : Même s’il me fallait mourir avec toi, je ne te renierai pas.'
  - type: text
    content: Et tous les disciples dirent la même chose.
  - type: heading
    content: Sur le mont des Oliviers
  - type: heading
    content: (Mc 14.32-42 ; Lc 22.39-46)
  '36':
  - type: text
    content: 'Là-dessus, Jésus arriva avec eux en un lieu appelé Gethsémané. Il dit à ses disciples : '
  - type: text
    content: Asseyez-vous ici pendant que je vais prier là-bas.
  '37':
  - type: text
    content: 'Il prit avec lui Pierre et les deux fils de Zébédée. Il commença à être envahi d’une profonde tristesse, et l’angoisse le saisit. '
  '38':
  - type: text
    content: 'Alors il leur dit : '
  - type: text
    content: Je suis accablé de tristesse, à en mourir. Restez ici et veillez avec moi !
  '39':
  - type: text
    content: 'Puis il fit quelques pas, se laissa tomber la face contre terre, et pria ainsi : '
  - type: text
    content: O Père, si tu le veux, écarte de moi cette coupe
  - type: note
    content: 'Autre traduction : cette coupe du jugement. Allusion à la coupe du vin de la colère de Dieu, jugement contre le péché (Es 51.17, 22 ; Jr 25.15 ; Ap 15.7).'
  - type: text
    content: '! Toutefois, que les choses se passent, non pas comme moi je le veux, mais comme toi tu le veux.'
  '4':
  - type: text
    content: ils décidèrent d’un commun accord de s’emparer de Jésus par ruse pour le faire mourir.
  '40':
  - type: text
    content: 'Ensuite, il revint auprès des disciples et les trouva endormis. Il dit à Pierre : '
  - type: text
    content: Ainsi, vous n’avez pas été capables de veiller une seule heure avec moi !
  - type: text
    content: ' '
  '41':
  - type: text
    content: Veillez et priez, pour ne pas céder à la tentation
  - type: note
    content: 'Autre traduction : pour ne pas entrer en tentation.'
  - type: text
    content: . L’esprit de l’homme est plein de bonne volonté, mais la nature humaine est bien faible.
  '42':
  - type: text
    content: 'Puis il s’éloigna une deuxième fois, et se remit à prier en disant : '
  - type: text
    content: O mon Père, s’il n’est pas possible que cette coupe me soit épargnée, s’il faut que je la boive, alors, que ta volonté soit faite.
  '43':
  - type: text
    content: Il revint encore vers ses disciples et les trouva de nouveau endormis, car ils avaient tellement sommeil qu’ils n’arrivaient pas à garder les yeux ouverts.
  '44':
  - type: text
    content: 'Il les laissa donc, et s’éloigna de nouveau. Pour la troisième fois, il pria en répétant les mêmes paroles. '
  '45':
  - type: text
    content: 'Lorsqu’il revint auprès de ses disciples, il leur dit : '
  - type: text
    content: Vous dormez encore et vous vous reposez
  - type: note
    content: 'Autre traduction : dormez maintenant et reposez-vous !'
  - type: text
    content: '! L’heure est venue où le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' est livré entre les mains des pécheurs.'
  - type: text
    content: ' '
  '46':
  - type: text
    content: Levez-vous et allons-y. Car celui qui me trahit est là.
  - type: heading
    content: L’arrestation de Jésus
  - type: heading
    content: (Mc 14.43-50 ; Lc 22.47-53 ; Jn 18.2-11)
  '47':
  - type: text
    content: Il n’avait pas fini de parler que Judas, l’un des Douze, survint, accompagné d’une troupe nombreuse armée d’épées et de gourdins. Cette troupe était envoyée par les chefs des prêtres et les responsables du peuple.
  '48':
  - type: text
    content: 'Le traître avait convenu avec eux d’un signe en disant : Celui que j’embrasserai, c’est lui, saisissez-vous de lui.'
  '49':
  - type: text
    content: 'Aussitôt, il se dirigea vers Jésus et lui dit : Bonsoir, Maître !'
  - type: text
    content: Et il l’embrassa.
  '5':
  - type: text
    content: 'Cependant ils se disaient : Il ne faut pas agir pendant la fête, pour ne pas provoquer d’émeute parmi le peuple.'
  - type: heading
    content: L’onction à Béthanie
  - type: heading
    content: (Mc 14.3-9 ; Jn 12.1-8)
  '50':
  - type: text
    content: ' '
  - type: text
    content: – Mon ami,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: ce que tu es venu faire ici, fais-le !
  - type: text
    content: Alors les autres s’avancèrent et, mettant la main sur Jésus, ils se saisirent de lui.
  '51':
  - type: text
    content: A ce moment, l’un des compagnons de Jésus porta la main à son épée, la dégaina, en frappa le serviteur du grand-prêtre et lui emporta l’oreille.
  '52':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: Remets ton épée à sa place, car tous ceux qui se serviront de l’épée mourront par l’épée.
  - type: text
    content: ' '
  '53':
  - type: text
    content: Penses-tu donc que je ne pourrais pas faire appel à mon Père ? A l’instant même, il enverrait des dizaines de milliers d’
  - type: text
    content: anges
  - type: text
    content: ' à mon secours.'
  - type: text
    content: ' '
  '54':
  - type: text
    content: Mais alors, comment les Ecritures, qui annoncent que tout doit se passer ainsi, s’accompliraient-elles ?
  '55':
  - type: text
    content: 'Là-dessus, Jésus dit à la troupe : '
  - type: text
    content: 'Me prenez-vous pour un bandit, pour que vous soyez venus en force avec épées et gourdins afin de vous emparer de moi ? J’étais assis chaque jour dans la cour du '
  - type: text
    content: Temple
  - type: text
    content: ' pour donner mon enseignement et vous ne m’avez pas arrêté !'
  - type: text
    content: ' '
  '56':
  - type: text
    content: Mais tout ceci est arrivé pour que les écrits des prophètes s’accomplissent.
  - type: text
    content: Alors tous les disciples l’abandonnèrent et prirent la fuite.
  - type: heading
    content: Jésus devant le Grand-Conseil
  - type: heading
    content: (Mc 14.53-65 ; Lc 22.54-55, 63-71 ; Jn 18.12-14, 19-23)
  '57':
  - type: text
    content: 'Ceux qui avaient arrêté Jésus le conduisirent devant Caïphe, le grand-prêtre, chez qui les spécialistes de la Loi et les responsables du peuple s’étaient déjà rassemblés. '
  '58':
  - type: text
    content: Pierre le suivit à distance jusqu’au palais du grand-prêtre et il entra dans la cour où il s’assit au milieu des gardes pour voir comment tout cela finirait.
  '59':
  - type: text
    content: 'Les chefs des prêtres et le Grand-Conseil au complet cherchaient un faux témoignage contre Jésus pour pouvoir le condamner à mort. '
  '6':
  - type: text
    content: 'Jésus se trouvait à Béthanie, dans la maison de Simon, le lépreux. '
  '60':
  - type: text
    content: Mais, bien qu’un bon nombre de faux témoins se soient présentés, ils ne parvenaient pas à trouver de motif valable.
  - type: text
    content: 'Finalement, il en vint tout de même deux '
  '61':
  - type: text
    content: 'qui déclarèrent : Cet homme a dit : « Je peux démolir le temple de Dieu et le rebâtir en trois jours. »'
  '62':
  - type: text
    content: 'Alors le grand-prêtre se leva et demanda à Jésus : Tu n’as rien à répondre aux témoignages qu’on vient de porter contre toi ?'
  '63':
  - type: text
    content: Jésus garda le silence.
  - type: text
    content: 'Alors le grand-prêtre reprit en disant : Je t’adjure, par le Dieu vivant, de nous déclarer si tu es le Messie, le Fils de Dieu.'
  '64':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Tu l’as dit toi-même. De plus, je vous le déclare : A partir de maintenant, vous verrez '
  - type: text
    content: 'le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' siéger à la droite du Tout-Puissant'
  - type: note
    content: Ps 110.1.
  - type: text
    content: ' '
  - type: text
    content: 'et '
  - type: text
    content: venir en gloire sur les nuées du ciel
  - type: note
    content: Dn 7.13.
  - type: text
    content: .
  '65':
  - type: text
    content: 'A ces mots, le grand-prêtre déchira ses vêtements en signe de consternation et s’écria : Il vient de prononcer des paroles blasphématoires ! Qu’avons-nous encore besoin de témoins ? Vous venez vous-mêmes d’entendre le blasphème. '
  '66':
  - type: text
    content: Quel est votre verdict ?
  - type: text
    content: 'Ils répondirent : Il est passible de mort.'
  '67':
  - type: text
    content: 'Alors, ils lui crachèrent au visage et le frappèrent. D’autres le giflèrent '
  '68':
  - type: text
    content: 'en disant : Hé, Messie, fais le prophète ! Dis-nous qui vient de te frapper !'
  - type: heading
    content: Pierre renie son Maître
  - type: heading
    content: (Mc 14.66-72 ; Lc 22.56-62 ; Jn 18.15-18, 25-27)
  '69':
  - type: text
    content: Pendant ce temps, Pierre était resté assis dehors, dans la cour intérieure.
  - type: text
    content: 'Une servante s’approcha de lui et dit : Toi aussi, tu étais avec Jésus le Galiléen.'
  '7':
  - type: text
    content: Une femme s’approcha de lui, tenant un flacon d’albâtre rempli d’un parfum de myrrhe de grande valeur
  - type: note
    content: Les parfums de grand prix étaient conservés dans des vases taillés dans une pierre blanche, l’albâtre.
  - type: text
    content: . Pendant que Jésus était à table, elle répandit ce parfum sur sa tête.
  '70':
  - type: text
    content: 'Mais Pierre le nia en disant devant tout le monde : Je ne vois pas ce que tu veux dire.'
  '71':
  - type: text
    content: 'Comme il se dirigeait vers le porche pour sortir, une autre servante l’aperçut et dit à ceux qui étaient là : En voilà un qui était avec ce Jésus de Nazareth.'
  '72':
  - type: text
    content: 'Il le nia de nouveau et il jura : Je ne connais pas cet homme !'
  '73':
  - type: text
    content: 'Après un petit moment, ceux qui se tenaient dans la cour s’approchèrent de Pierre et lui dirent : C’est sûr, toi aussi, tu fais partie de ces gens ! C’est évident : il suffit d’entendre ton accent !'
  '74':
  - type: text
    content: 'Alors Pierre se mit à dire : Je le jure ! Et que je sois maudit si ce n’est pas vrai : je ne connais pas cet homme.'
  - type: text
    content: Et aussitôt, un coq chanta.
  '75':
  - type: text
    content: 'Alors Pierre se souvint de ce que Jésus lui avait dit : '
  - type: text
    content: « Avant que le coq chante, tu m’auras renié trois fois. »
  - type: text
    content: ' Il se glissa dehors et se mit à pleurer amèrement.'
  '8':
  - type: text
    content: 'En voyant cela, les disciples s’indignèrent et dirent : Pourquoi un tel gaspillage ? '
  '9':
  - type: text
    content: On aurait pu vendre ce parfum pour un bon prix et donner l’argent aux pauvres !
