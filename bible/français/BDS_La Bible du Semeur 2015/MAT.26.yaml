document_id: MAT.26
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Mort et résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le complot
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.1-2 ; Lc 22.1-2 ; Jn 11.47-53)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand Jésus eut fini de donner toutes ces instructions, il dit à ses disciples : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous savez que la fête de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Pâque
    - type: text
      text: ' aura lieu dans deux jours. C’est alors que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' sera livré pour être crucifié.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors, les chefs des prêtres et les responsables du peuple se rassemblèrent dans la cour du grand-prêtre Caïphe ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ils décidèrent d’un commun accord de s’emparer de Jésus par ruse pour le faire mourir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cependant ils se disaient : Il ne faut pas agir pendant la fête, pour ne pas provoquer d’émeute parmi le peuple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’onction à Béthanie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.3-9 ; Jn 12.1-8)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus se trouvait à Béthanie, dans la maison de Simon, le lépreux. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Une femme s’approcha de lui, tenant un flacon d’albâtre rempli d’un parfum de myrrhe de grande valeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les parfums de grand prix étaient conservés dans des vases taillés dans une pierre blanche, l’albâtre.
    marker-yv: yv-n
  - type: text
    text: . Pendant que Jésus était à table, elle répandit ce parfum sur sa tête.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En voyant cela, les disciples s’indignèrent et dirent : Pourquoi un tel gaspillage ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On aurait pu vendre ce parfum pour un bon prix et donner l’argent aux pauvres !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais, se rendant compte de cela, Jésus leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi faites-vous de la peine à cette femme ? Ce qu’elle vient d’accomplir pour moi est vraiment une belle action.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Des pauvres, vous en aurez toujours autour de vous ; mais moi, vous ne m’aurez pas toujours avec vous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si elle a répandu cette myrrhe sur moi, c’est pour préparer mon enterrement.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vraiment, je vous l’assure, dans le monde entier, partout où cette Bonne Nouvelle qu’est l’Evangile sera annoncée, on racontera aussi, en souvenir d’elle, ce qu’elle vient de faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La trahison
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.10-11 ; Lc 22.3-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors, l’un des Douze, celui qui s’appelait Judas Iscariot, se rendit auprès des chefs des prêtres '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pour leur demander : Si je me charge de vous livrer Jésus, quelle somme me donnerez-vous ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils lui versèrent trente pièces d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A partir de ce moment-là, il chercha une occasion favorable pour leur livrer Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus célèbre la Pâque avec ses disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.12-16 ; Lc 22.7-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le premier jour de la fête des Pains sans levain, les disciples vinrent trouver Jésus pour lui demander : Où veux-tu que nous fassions les préparatifs pour le repas de la Pâque ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Allez à la ville, chez un tel, et parlez-lui ainsi : « Le Maître te fait dire : Mon heure est arrivée. C’est chez toi que je prendrai le repas de la Pâque avec mes disciples. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les disciples se conformèrent aux ordres de Jésus et préparèrent le repas de la Pâque.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.17-21 ; Lc 22.14, 21-23 ; Jn 13.21-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le soir, Jésus se mit à table avec les Douze et, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'pendant qu’ils mangeaient, il dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je vous l’assure : l’un de vous me trahira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les disciples en furent consternés. Ils se mirent, l’un après l’autre, à lui demander : Seigneur, ce n’est pas moi, n’est-ce pas ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En réponse, il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est un qui a trempé son pain dans le plat avec moi, lui, il me trahira.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Certes, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' s’en va conformément à ce que les Ecritures annoncent à son sujet. Mais malheur à celui qui le trahit ! Il aurait mieux valu pour lui n’être jamais né !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A son tour, Judas, qui le trahissait, lui demanda : Maître, ce n’est pas moi, n’est-ce pas ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Tu le dis toi-même,
  - type: text
    text: ' lui répondit Jésus.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.22-25 ; Lc 22.15-20 ; voir 1 Co 11.23-25)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Au cours du repas, Jésus prit du pain puis, après avoir prononcé la prière de reconnaissance, il le partagea en morceaux, puis il les donna à ses disciples, en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez, mangez, ceci est mon corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ensuite il prit une coupe et, après avoir remercié Dieu, il la leur donna en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Buvez-en tous ;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'ceci est mon sang, par lequel est '
    - type: usfm
      marker: w
      children:
      - type: text
        text: scellée
    - type: text
      text: ' l’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: alliance
    - type: text
      text: . Il va être versé pour beaucoup d’hommes, afin que leurs péchés soient pardonnés.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous le déclare : désormais, je ne boirai plus du fruit de la vigne jusqu’au jour où je boirai le vin nouveau avec vous dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de mon Père
    - type: text
      text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus annonce le reniement de Pierre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.26-31 ; Lc 22.33-34 ; Jn 13.37-38)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Après cela, ils chantèrent les psaumes de la Pâque
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pendant le repas de la Pâque, on chantait les Ps 113 à 118.
    marker-yv: yv-n
  - type: text
    text: . Ensuite, ils sortirent pour se rendre au mont des Oliviers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus leur dit alors : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Cette nuit, ce qui m’arrivera vous ébranlera tous dans votre foi. En effet, il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je frapperai le berger,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et les brebis du troupeau seront dispersées
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.31 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 13.7
        metadata:
          usfm: ZEC.13.7
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Néanmoins, quand je serai ressuscité, je vous précéderai en '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Galilée
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Pierre prit la parole et lui dit : Même si tous les autres sont ébranlés à cause de ce qui t’arrivera, moi je ne le serai pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus reprit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vraiment, je te l’assure : cette nuit même, avant que le coq ait chanté, tu m’auras renié trois fois.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Pierre réaffirma : Même s’il me fallait mourir avec toi, je ne te renierai pas.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et tous les disciples dirent la même chose.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur le mont des Oliviers
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.32-42 ; Lc 22.39-46)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Là-dessus, Jésus arriva avec eux en un lieu appelé Gethsémané. Il dit à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Asseyez-vous ici pendant que je vais prier là-bas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il prit avec lui Pierre et les deux fils de Zébédée. Il commença à être envahi d’une profonde tristesse, et l’angoisse le saisit. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis accablé de tristesse, à en mourir. Restez ici et veillez avec moi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Puis il fit quelques pas, se laissa tomber la face contre terre, et pria ainsi : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O Père, si tu le veux, écarte de moi cette coupe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cette coupe du jugement. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion à la coupe du vin de la colère de Dieu, jugement contre le péché (Es 51.17, 22 ; Jr 25.15 ; Ap 15.7).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '! Toutefois, que les choses se passent, non pas comme moi je le veux, mais comme toi tu le veux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ensuite, il revint auprès des disciples et les trouva endormis. Il dit à Pierre : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ainsi, vous n’avez pas été capables de veiller une seule heure avec moi !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Veillez et priez, pour ne pas céder à la tentation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour ne pas entrer en tentation.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . L’esprit de l’homme est plein de bonne volonté, mais la nature humaine est bien faible.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Puis il s’éloigna une deuxième fois, et se remit à prier en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O mon Père, s’il n’est pas possible que cette coupe me soit épargnée, s’il faut que je la boive, alors, que ta volonté soit faite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Il revint encore vers ses disciples et les trouva de nouveau endormis, car ils avaient tellement sommeil qu’ils n’arrivaient pas à garder les yeux ouverts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Il les laissa donc, et s’éloigna de nouveau. Pour la troisième fois, il pria en répétant les mêmes paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Lorsqu’il revint auprès de ses disciples, il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous dormez encore et vous vous reposez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dormez maintenant et reposez-vous !
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '! L’heure est venue où le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' est livré entre les mains des pécheurs.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Levez-vous et allons-y. Car celui qui me trahit est là.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arrestation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.43-50 ; Lc 22.47-53 ; Jn 18.2-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Il n’avait pas fini de parler que Judas, l’un des Douze, survint, accompagné d’une troupe nombreuse armée d’épées et de gourdins. Cette troupe était envoyée par les chefs des prêtres et les responsables du peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Le traître avait convenu avec eux d’un signe en disant : Celui que j’embrasserai, c’est lui, saisissez-vous de lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Aussitôt, il se dirigea vers Jésus et lui dit : Bonsoir, Maître !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et il l’embrassa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Mon ami,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ce que tu es venu faire ici, fais-le !
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors les autres s’avancèrent et, mettant la main sur Jésus, ils se saisirent de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: A ce moment, l’un des compagnons de Jésus porta la main à son épée, la dégaina, en frappa le serviteur du grand-prêtre et lui emporta l’oreille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Remets ton épée à sa place, car tous ceux qui se serviront de l’épée mourront par l’épée.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Penses-tu donc que je ne pourrais pas faire appel à mon Père ? A l’instant même, il enverrait des dizaines de milliers d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' à mon secours.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais alors, comment les Ecritures, qui annoncent que tout doit se passer ainsi, s’accompliraient-elles ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Là-dessus, Jésus dit à la troupe : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Me prenez-vous pour un bandit, pour que vous soyez venus en force avec épées et gourdins afin de vous emparer de moi ? J’étais assis chaque jour dans la cour du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Temple
    - type: text
      text: ' pour donner mon enseignement et vous ne m’avez pas arrêté !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais tout ceci est arrivé pour que les écrits des prophètes s’accomplissent.
- type: usfm
  marker: p
  children:
  - type: text
    text: Alors tous les disciples l’abandonnèrent et prirent la fuite.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le Grand-Conseil
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.53-65 ; Lc 22.54-55, 63-71 ; Jn 18.12-14, 19-23)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ceux qui avaient arrêté Jésus le conduisirent devant Caïphe, le grand-prêtre, chez qui les spécialistes de la Loi et les responsables du peuple s’étaient déjà rassemblés. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Pierre le suivit à distance jusqu’au palais du grand-prêtre et il entra dans la cour où il s’assit au milieu des gardes pour voir comment tout cela finirait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Les chefs des prêtres et le Grand-Conseil au complet cherchaient un faux témoignage contre Jésus pour pouvoir le condamner à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Mais, bien qu’un bon nombre de faux témoins se soient présentés, ils ne parvenaient pas à trouver de motif valable.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Finalement, il en vint tout de même deux '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'qui déclarèrent : Cet homme a dit : « Je peux démolir le temple de Dieu et le rebâtir en trois jours. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Alors le grand-prêtre se leva et demanda à Jésus : Tu n’as rien à répondre aux témoignages qu’on vient de porter contre toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Jésus garda le silence.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors le grand-prêtre reprit en disant : Je t’adjure, par le Dieu vivant, de nous déclarer si tu es le Messie, le Fils de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tu l’as dit toi-même. De plus, je vous le déclare : A partir de maintenant, vous verrez '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
      - type: text
        text: ' siéger à la droite du Tout-Puissant'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.64 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110.1
        metadata:
          usfm: PSA.110.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: venir en gloire sur les nuées du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.64 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dn 7.13
        metadata:
          usfm: DAN.7.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'A ces mots, le grand-prêtre déchira ses vêtements en signe de consternation et s’écria : Il vient de prononcer des paroles blasphématoires ! Qu’avons-nous encore besoin de témoins ? Vous venez vous-mêmes d’entendre le blasphème. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Quel est votre verdict ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ils répondirent : Il est passible de mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Alors, ils lui crachèrent au visage et le frappèrent. D’autres le giflèrent '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'en disant : Hé, Messie, fais le prophète ! Dis-nous qui vient de te frapper !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre renie son Maître
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 14.66-72 ; Lc 22.56-62 ; Jn 18.15-18, 25-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Pendant ce temps, Pierre était resté assis dehors, dans la cour intérieure.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Une servante s’approcha de lui et dit : Toi aussi, tu étais avec Jésus le Galiléen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Mais Pierre le nia en disant devant tout le monde : Je ne vois pas ce que tu veux dire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Comme il se dirigeait vers le porche pour sortir, une autre servante l’aperçut et dit à ceux qui étaient là : En voilà un qui était avec ce Jésus de Nazareth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Il le nia de nouveau et il jura : Je ne connais pas cet homme !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Après un petit moment, ceux qui se tenaient dans la cour s’approchèrent de Pierre et lui dirent : C’est sûr, toi aussi, tu fais partie de ces gens ! C’est évident : il suffit d’entendre ton accent !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Alors Pierre se mit à dire : Je le jure ! Et que je sois maudit si ce n’est pas vrai : je ne connais pas cet homme.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et aussitôt, un coq chanta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Alors Pierre se souvint de ce que Jésus lui avait dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: « Avant que le coq chante, tu m’auras renié trois fois. »
  - type: text
    text: ' Il se glissa dehors et se mit à pleurer amèrement.'
