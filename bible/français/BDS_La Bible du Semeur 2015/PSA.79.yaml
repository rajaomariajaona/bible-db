document_id: PSA.79
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérusalem est en ruine
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d’Asaph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '79.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '50.1'
        metadata:
          usfm: PSA.50.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu ! Des peuples étrangers ╵ont pénétré dans ton domaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont rendu impur ton temple saint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont fait de Jérusalem ╵un tas de ruines
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '79.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 R 25.8-10 ; 2 Ch 36.17-19 ; Jr 52.12-14.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils ont livré
- type: usfm
  marker: q1
  children:
  - type: text
    text: les corps de tes serviteurs aux rapaces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la chair de ceux qui te sont attachés
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux animaux sauvages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils ont versé des flots de sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout autour de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu’il y ait personne ╵pour enterrer les morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nos voisins nous insultent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui nous entourent ╵se moquent de nous et nous raillent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jusques à quand, ô Eternel, ╵seras-tu sans cesse irrité ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton ardente indignation ╵brûlera-t-elle comme un feu ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Déverse ta fureur ╵sur les peuples païens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui ne te connaissent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les royaumes
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne t’invoquent pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: car ils ont dévoré Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '79.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob est mis ici pour le peuple d’Israël (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 32.28
        metadata:
          usfm: GEN.32.28
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont ravagé ╵le lieu de sa demeure
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '79.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 10.25
        metadata:
          usfm: JER.10.25
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne tiens plus compte de nos fautes du passé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes compassions ╵sans tarder nous assistent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nous sommes tombés bien bas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Accorde-nous ton aide, ╵ô Dieu, notre Sauveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour l’honneur de ton nom !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-nous, pardonne nos péchés
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de ce que tu es !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pourquoi les autres peuples diraient-ils :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Où est leur Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '79.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 42.4, 11 ; Jr 2.17 ; Mi 7.10 ; Ml 2.17.
    marker-yv: yv-n
  - type: text
    text: '  ? »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montre-leur sous nos yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu demandes compte ╵du meurtre de tes serviteurs !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que les plaintes des prisonniers ╵parviennent jusqu’à toi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les condamnés à mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: soient sauvés par ton bras puissant !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rends en plein cœur à nos voisins, ╵et au septuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '79.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sept est le nombre exprimant la plénitude, donc ici la rétribution complète (Gn 4.15 ; Pr 6.31).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’insulte qu’ils t’ont infligée, ╵ô Eternel !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et nous, ton peuple, le troupeau ╵dont tu es le berger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous te célébrerons toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous publierons tes louanges ╵au cours de tous les âges.
