document_id: PSA.79,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem est en ruine
  - type: text
    content: Psaume d’Asaph
  - type: note
    content: Voir note 50.1.
  - type: text
    content: .
  - type: text
    content: O Dieu ! Des peuples étrangers ╵ont pénétré dans ton domaine,
  - type: text
    content: ils ont rendu impur ton temple saint,
  - type: text
    content: ils ont fait de Jérusalem ╵un tas de ruines
  - type: note
    content: Voir 2 R 25.8-10 ; 2 Ch 36.17-19 ; Jr 52.12-14.
  - type: text
    content: .
  '10':
  - type: text
    content: 'Pourquoi les autres peuples diraient-ils :'
  - type: text
    content: « Où est leur Dieu
  - type: note
    content: Voir 42.4, 11 ; Jr 2.17 ; Mi 7.10 ; Ml 2.17.
  - type: text
    content: '  ? »'
  - type: text
    content: Montre-leur sous nos yeux,
  - type: text
    content: que tu demandes compte ╵du meurtre de tes serviteurs !
  '11':
  - type: text
    content: Que les plaintes des prisonniers ╵parviennent jusqu’à toi !
  - type: text
    content: Et que les condamnés à mort
  - type: text
    content: soient sauvés par ton bras puissant !
  '12':
  - type: text
    content: Rends en plein cœur à nos voisins, ╵et au septuple
  - type: note
    content: Sept est le nombre exprimant la plénitude, donc ici la rétribution complète (Gn 4.15 ; Pr 6.31).
  - type: text
    content: ','
  - type: text
    content: l’insulte qu’ils t’ont infligée, ╵ô Eternel !
  '13':
  - type: text
    content: Et nous, ton peuple, le troupeau ╵dont tu es le berger,
  - type: text
    content: nous te célébrerons toujours,
  - type: text
    content: et nous publierons tes louanges ╵au cours de tous les âges.
  '2':
  - type: text
    content: Ils ont livré
  - type: text
    content: les corps de tes serviteurs aux rapaces,
  - type: text
    content: la chair de ceux qui te sont attachés
  - type: text
    content: aux animaux sauvages.
  '3':
  - type: text
    content: Ils ont versé des flots de sang
  - type: text
    content: tout autour de Jérusalem
  - type: text
    content: sans qu’il y ait personne ╵pour enterrer les morts.
  '4':
  - type: text
    content: Nos voisins nous insultent,
  - type: text
    content: et ceux qui nous entourent ╵se moquent de nous et nous raillent.
  '5':
  - type: text
    content: Jusques à quand, ô Eternel, ╵seras-tu sans cesse irrité ?
  - type: text
    content: Et ton ardente indignation ╵brûlera-t-elle comme un feu ?
  '6':
  - type: text
    content: Déverse ta fureur ╵sur les peuples païens,
  - type: text
    content: ceux qui ne te connaissent pas,
  - type: text
    content: sur les royaumes
  - type: text
    content: qui ne t’invoquent pas,
  '7':
  - type: text
    content: car ils ont dévoré Jacob
  - type: note
    content: Jacob est mis ici pour le peuple d’Israël (Gn 32.28).
  - type: text
    content: ','
  - type: text
    content: et ils ont ravagé ╵le lieu de sa demeure
  - type: note
    content: Voir Jr 10.25.
  - type: text
    content: .
  '8':
  - type: text
    content: Ne tiens plus compte de nos fautes du passé !
  - type: text
    content: Que tes compassions ╵sans tarder nous assistent,
  - type: text
    content: car nous sommes tombés bien bas.
  '9':
  - type: text
    content: Accorde-nous ton aide, ╵ô Dieu, notre Sauveur,
  - type: text
    content: pour l’honneur de ton nom !
  - type: text
    content: Délivre-nous, pardonne nos péchés
  - type: text
    content: à cause de ce que tu es !
