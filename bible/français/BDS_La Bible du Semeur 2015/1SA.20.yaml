document_id: 1SA.20,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David demande à Jonathan de sonder les intentions de Saül
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David s’enfuit de la communauté des prophètes à Rama et il alla trouver Jonathan pour lui demander : Qu’ai-je donc fait à ton père ? En quoi suis-je coupable à son égard ? Quel tort lui ai-je fait pour qu’il veuille me faire mourir ?'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais David lui demanda : Comment me préviendras-tu si ton père te répond durement à mon sujet ?'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan proposa à David : Viens, sortons dans la campagne.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sortirent tous deux dans la campagne. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan dit : Par l’Eternel, le Dieu d’Israël, je te promets que demain ou après-demain, à cette heure-ci, j’essaierai de savoir quelles sont les dispositions de mon père à ton égard. Si elles te sont favorables, je te le ferai savoir. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si mon père veut te nuire, alors que l’Eternel me punisse très sévèrement si je ne t’en informe pas ! Dans ce cas, je te ferai partir et tu iras en paix. Puisse alors l’Eternel être avec toi comme il a été avec mon père ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plus tard, si je suis encore en vie, agis envers moi avec la bienveillance à laquelle tu t’es engagé devant l’Eternel. Et si je viens à mourir, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tu ne cesseras jamais d’agir avec bienveillance envers les membres de ma famille – même lorsque l’Eternel aura fait disparaître tous tes ennemis sans exception de la surface de la terre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 9.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Jonathan conclut un pacte avec David et sa famille en déclarant : Que l’Eternel fasse payer les ennemis de David !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il lui fit encore une fois prêter serment au nom de l’affection qu’il lui portait, car il l’aimait comme sa propre personne.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan reprit : Demain, c’est la fête de la nouvelle lune, on remarquera ton absence à table, car ta place restera vide. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après-demain, tu descendras vite jusqu’à l’endroit où tu t’étais caché le jour où tout cela a commencé ; tu te tiendras près de la pierre d’Ezel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan lui répondit : Dieu te garde de cette pensée ! Il n’est pas question que tu meures. Mon père n’entreprend rien sans m’en parler, qu’il s’agisse d’une affaire importante ou d’une petite chose. Pourquoi me cacherait-il ce projet-là ? Certainement, il n’en est rien.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je viendrai et je tirerai trois flèches dans cette direction, sur une cible que j’aurai choisie, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puis j’enverrai mon jeune serviteur les chercher. Si je lui crie : « Regarde, les flèches sont derrière toi, reviens les ramasser ! » alors tu peux revenir, car tout va bien pour toi. Aussi vrai que l’Eternel est vivant, tu n’auras rien à craindre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si je crie au jeune homme : « Va plus loin, les flèches sont plus loin que toi ! » alors pars, car l’Eternel te fait partir. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais l’Eternel restera à jamais le garant pour moi et toi de notre engagement l’un envers l’autre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül est résolu à faire mourir David
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David alla donc se cacher dans la campagne. Le soir de la célébration de la nouvelle lune, le roi se mit à table pour le repas. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il s’assit comme d’habitude sur le siège adossé au mur qui lui était réservé. Jonathan se mit en face
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après l’ancienne version grecque ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se leva.
      marker-yv: yv-n
    - type: text
      text: ', et Abner'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cousin et général en chef de Saül (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '14.50'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' à côté de lui. La place de David resta vide. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saül ne fit aucune remarque ce jour-là. Il pensait qu’il avait dû contracter accidentellement quelque impureté rituelle.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Certainement il n’est pas pur, se disait-il
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 7.21
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le second jour de la nouvelle lune, comme la place de David restait encore inoccupée, Saül demanda à son fils Jonathan : Pourquoi le fils d’Isaï n’est-il pas venu au repas ni hier, ni aujourd’hui ?'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan répondit à Saül : David m’a demandé avec insistance la permission d’aller jusqu’à Bethléhem. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il m’a dit : « Laisse-moi partir, je te prie, car nous devons célébrer un sacrifice de famille à la ville, et mon frère m’a ordonné d’y assister. Veuille donc m’accorder la faveur de pouvoir m’absenter pour voir mes frères. » C’est pour cela qu’il n’est pas venu à la table du roi.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais David insista : Je te jure pourtant qu’il en est bien ainsi. Seulement ton père sait très bien que je jouis de ta faveur. Il a dû se dire : « Il ne faut pas que Jonathan l’apprenne, il en serait trop affligé ! » Mais aussi vrai que l’Eternel est vivant, aussi vrai que tu es toi-même en vie, je ne suis qu’à deux doigts de la mort.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül se mit en colère contre Jonathan et lui cria : Fils de chienne, fils de rebelle ! Crois-tu que je ne sais pas que tu as pris parti pour le fils d’Isaï, à ta honte et à celle de ta mère ? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussi longtemps que le fils d’Isaï sera en vie, tu ne pourras pas t’imposer ni établir ta royauté. C’est pourquoi, fais-le chercher et ordonne qu’on me l’amène sans retard, car il mérite la mort.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan répliqua à Saül son père : Pourquoi devrait-il mourir ? Qu’a-t-il fait ?'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Saül brandit sa lance contre lui pour le frapper. Jonathan comprit que son père avait fermement décidé de faire mourir David. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il se leva de table dans une grande colère et ne mangea rien ce jour-là, car il était trop affligé à cause de la manière injurieuse dont son père avait traité David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonathan prévient David des intentions hostiles de son père
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain matin, Jonathan se rendit dans la campagne à l’endroit convenu avec David. Un jeune serviteur l’accompagnait. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui dit : Cours ramasser les flèches que je vais tirer !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le garçon courut en avant et Jonathan tira une flèche au-delà du garçon. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le serviteur s’approcha de l’endroit où la flèche s’était plantée, Jonathan lui cria : La flèche n’est-elle pas plus loin que toi ? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vite, dépêche-toi ! Ne reste pas là !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le serviteur de Jonathan ramassa la flèche et revint vers son maître '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sans se douter de rien. Seuls Jonathan et David comprenaient la chose. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jonathan demanda à David : Que voudrais-tu que je fasse pour toi ? Je ferai ce que tu désires.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan remit son arc et ses flèches à son serviteur et lui dit : Va les rapporter dans la ville !'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après son départ, David sortit de sa cachette du côté du sud et se prosterna trois fois devant Jonathan, le visage contre terre, puis ils s’embrassèrent longuement en pleurant, David encore plus que Jonathan. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jonathan lui dit : Va en paix, puisque nous nous sommes engagés l’un envers l’autre par serment au nom de l’Eternel en disant : Que l’Eternel soit garant entre toi et moi, entre tes descendants et les miens, à tout jamais.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui répondit : Ecoute : demain c’est la fête de la nouvelle lune'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les mois israélites commençaient avec la nouvelle lune. A ce moment-là on cessait tout travail, on faisait retentir des sonneries de trompettes (Nb 10.10 ; Ps 81.4), on offrait des sacrifices spéciaux (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Nb 28.11-15
        - type: text
          text: ) et c’était l’occasion d’un repas de fête, surtout au début du septième mois (voir Lv 23.24-25 ; Nb 29.1-6 ; 2 R 4.23 ; Es 1.13 ; Ez 46.1-7 ; Am 8.5).
      marker-yv: yv-n
    - type: text
      text: ', je devrais normalement dîner à la table royale. Permets-moi de m’absenter ! Je me cacherai dans la campagne jusqu’à après-demain soir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ton père s’enquiert à mon sujet, tu lui diras : « David m’a instamment demandé la permission d’aller à Bethléhem, sa ville natale, pour y participer au sacrifice annuel avec toute sa famille. » '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il répond : « C’est bien ! », alors moi, ton serviteur, je n’ai rien à craindre. Mais s’il se met en colère, tu sauras qu’il a résolu ma perte. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisque tu t’es lié à moi, ton serviteur, par un pacte d’amitié au nom de l’Eternel, agis envers moi avec bienveillance. Et si je suis coupable de quoi que ce soit, ce n’est pas la peine de me livrer à ton père : mets-moi toi-même à mort.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Jamais de la vie, s’exclama Jonathan. Si je constate que mon père a véritablement résolu ta perte, je te jure que je t’en informerai.
