document_id: HEB.1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La personne du Fils de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La révélation de Dieu par le Fils
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A bien des reprises et de bien des manières, Dieu a parlé autrefois à nos ancêtres par les prophètes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit aussi :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C’est toi, Seigneur,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qui, au commencement,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: as posé les fondations de la terre.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le ciel est l’œuvre de tes mains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils périront, mais tu subsistes,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tous s’useront comme un habit,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comme un manteau, tu les enrouleras,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: comme un vêtement, tu les changeras.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mais toi, tu es toujours le même,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tes années ne finiront pas
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 102.26-28
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, auquel des anges Dieu a-t-il jamais dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Viens siéger à ma droite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: jusqu’à ce que j’aie mis
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tes ennemis
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: à terre sous tes pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 110.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, que sont les anges ? Des esprits au service de Dieu, qui sont envoyés pour exercer un ministère en faveur de ceux qui vont hériter le salut.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et maintenant, dans ces jours qui sont les derniers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire la période finale de l’histoire qu’a inaugurée la venue de Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: ', il nous a parlé par le Fils. Il a fait de lui l’héritier de toutes choses et c’est aussi par lui qu’il a créé l’univers. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce Fils est le rayonnement de la gloire de Dieu et l’expression parfaite de son être. Il soutient toutes choses par sa parole puissante et, après avoir accompli la purification des péchés, il s’est assis dans les cieux à la droite du Dieu majestueux.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il a ainsi acquis un rang bien plus éminent que celui des anges, dans la mesure où le titre que Dieu lui a donné est incomparablement supérieur au leur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Fils de Dieu supérieur aux anges
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, auquel des anges Dieu a-t-il jamais dit ceci :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu es mon Fils ; aujourd’hui,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je fais de toi mon enfant
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 2.7
        - type: text
          text: ' . Il s’agit de la formule d’intronisation du Messie-Roi.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et encore :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je serai pour lui un Père
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et lui sera pour moi un Fils
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 7.14
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais lorsqu’il introduit de nouveau le Premier-né dans le monde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il doit s’agir de l’entrée de Jésus dans le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'monde à venir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dont parle '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.5'
        - type: text
          text: '. Certains identifient le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'monde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'avec le monde actuel et pensent qu’il s’agit de la résurrection. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lorsqu’il introduit le Premier-né dans le monde, il dit encore ; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: certains pensent alors que le texte vise l’incarnation du Fils.
      marker-yv: yv-n
    - type: text
      text: ', il dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Que tous les anges de Dieu
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: se prosternent devant lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 97.7 ; Dt 32.43 cité selon l’ancienne version grecque.
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au sujet des anges, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il utilise ses anges comme des vents,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et ses serviteurs comme des flammes de feu
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 104.4
        - type: text
          text: ' cité selon l’ancienne version grecque.'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais au sujet du Fils, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ton trône, ô Dieu, subsiste
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: pour toute éternité,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le sceptre de ton règne
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son règne.
      marker-yv: yv-n
    - type: text
      text: ╵
    - type: usfm
      marker: qt
      children:
      - type: text
        text: est sceptre d’équité.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimes la justice,
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et tu détestes la méchanceté.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aussi, ô Dieu, ton Dieu
    - type: text
      text: ' ╵'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: t’a oint d’une huile d’allégresse
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et t’a ainsi fait roi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: de préférence à tous tes compagnons
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 45.7-8
        - type: text
          text: ' .'
      marker-yv: yv-n
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
