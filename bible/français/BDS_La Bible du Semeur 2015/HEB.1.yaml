document_id: HEB.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La personne du Fils de Dieu
  - type: heading
    content: La révélation de Dieu par le Fils
  - type: text
    content: 'A bien des reprises et de bien des manières, Dieu a parlé autrefois à nos ancêtres par les prophètes. '
  '10':
  - type: text
    content: 'Il dit aussi :'
  - type: text
    content: C’est toi, Seigneur,
  - type: text
    content: ' ╵'
  - type: text
    content: qui, au commencement,
  - type: text
    content: ' ╵'
  - type: text
    content: as posé les fondations de la terre.
  - type: text
    content: Le ciel est l’œuvre de tes mains.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Ils périront, mais tu subsistes,
  - type: text
    content: tous s’useront comme un habit,
  '12':
  - type: text
    content: ' '
  - type: text
    content: comme un manteau, tu les enrouleras,
  - type: text
    content: comme un vêtement, tu les changeras.
  - type: text
    content: Mais toi, tu es toujours le même,
  - type: text
    content: tes années ne finiront pas
  - type: text
    content: ' '
  - type: note
    content: Ps 102.26-28 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Or, auquel des anges Dieu a-t-il jamais dit :'
  - type: text
    content: Viens siéger à ma droite
  - type: note
    content: La droite du roi est la place d’honneur (Ps 45.10 ; 1 R 2.19).
  - type: text
    content: jusqu’à ce que j’aie mis
  - type: text
    content: ' ╵'
  - type: text
    content: tes ennemis
  - type: text
    content: ' ╵'
  - type: text
    content: à terre sous tes pieds
  - type: note
    content: Ps 110.1.
  - type: text
    content: .
  '14':
  - type: text
    content: En effet, que sont les anges ? Des esprits au service de Dieu, qui sont envoyés pour exercer un ministère en faveur de ceux qui vont hériter le salut.
  '2':
  - type: text
    content: Et maintenant, dans ces jours qui sont les derniers
  - type: note
    content: C’est-à-dire la période finale de l’histoire qu’a inaugurée la venue de Jésus-Christ.
  - type: text
    content: ', il nous a parlé par le Fils. Il a fait de lui l’héritier de toutes choses et c’est aussi par lui qu’il a créé l’univers. '
  '3':
  - type: text
    content: Ce Fils est le rayonnement de la gloire de Dieu et l’expression parfaite de son être. Il soutient toutes choses par sa parole puissante et, après avoir accompli la purification des péchés, il s’est assis dans les cieux à la droite du Dieu majestueux.
  '4':
  - type: text
    content: Il a ainsi acquis un rang bien plus éminent que celui des anges, dans la mesure où le titre que Dieu lui a donné est incomparablement supérieur au leur.
  - type: heading
    content: Le Fils de Dieu supérieur aux anges
  '5':
  - type: text
    content: 'En effet, auquel des anges Dieu a-t-il jamais dit ceci :'
  - type: text
    content: Tu es mon Fils ; aujourd’hui,
  - type: text
    content: je fais de toi mon enfant
  - type: text
    content: ' '
  - type: note
    content: Ps 2.7 . Il s’agit de la formule d’intronisation du Messie-Roi.
  - type: text
    content: .
  - type: text
    content: 'Et encore :'
  - type: text
    content: Je serai pour lui un Père
  - type: text
    content: et lui sera pour moi un Fils
  - type: text
    content: ' '
  - type: note
    content: 2 S 7.14 .
  - type: text
    content: .
  '6':
  - type: text
    content: Mais lorsqu’il introduit de nouveau le Premier-né dans le monde
  - type: note
    content: 'Il doit s’agir de l’entrée de Jésus dans le monde à venir dont parle 2.5. Certains identifient le monde avec le monde actuel et pensent qu’il s’agit de la résurrection. Autre traduction : lorsqu’il introduit le Premier-né dans le monde, il dit encore ; certains pensent alors que le texte vise l’incarnation du Fils.'
  - type: text
    content: ', il dit :'
  - type: text
    content: Que tous les anges de Dieu
  - type: text
    content: ' ╵'
  - type: text
    content: se prosternent devant lui
  - type: note
    content: Ps 97.7 ; Dt 32.43 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '7':
  - type: text
    content: 'Au sujet des anges, il dit :'
  - type: text
    content: Il utilise ses anges comme des vents,
  - type: text
    content: et ses serviteurs comme des flammes de feu
  - type: text
    content: ' '
  - type: note
    content: Ps 104.4 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Mais au sujet du Fils, il dit :'
  - type: text
    content: Ton trône, ô Dieu, subsiste
  - type: text
    content: ' ╵'
  - type: text
    content: pour toute éternité,
  - type: text
    content: le sceptre de ton règne
  - type: text
    content: ' '
  - type: note
    content: 'Certains manuscrits ont : son règne.'
  - type: text
    content: ╵
  - type: text
    content: est sceptre d’équité.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Tu aimes la justice,
  - type: text
    content: ' ╵'
  - type: text
    content: et tu détestes la méchanceté.
  - type: text
    content: Aussi, ô Dieu, ton Dieu
  - type: text
    content: ' ╵'
  - type: text
    content: t’a oint d’une huile d’allégresse
  - type: text
    content: et t’a ainsi fait roi,
  - type: text
    content: de préférence à tous tes compagnons
  - type: text
    content: ' '
  - type: note
    content: Ps 45.7-8 .
  - type: text
    content: .
