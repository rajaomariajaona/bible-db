document_id: JON.2,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de Jonas au fond des mers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel fit venir un grand poisson pour avaler Jonas. Durant trois jours et trois nuits, Jonas resta dans le ventre du poisson
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mentionné en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 12.40
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi je t’offrirai ╵un sacrifice ╵en disant ma reconnaissance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 42.5 ; 50.14, 23 ; 66.13 ; 116.17-18.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je m’acquitterai ╵des vœux que j’ai formés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c’est de l’Eternel ╵que vient la délivrance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 3.9
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L’Eternel parla au poisson qui rejeta Jonas sur la terre ferme.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans le ventre du poisson, il adressa cette prière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prière de reconnaissance de Jonas, dans le ventre du poisson, pour la délivrance de la noyade (voir v. 4, 6-7).
      marker-yv: yv-n
    - type: text
      text: ' à l’Eternel son Dieu :'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ma détresse, ╵moi, j’ai crié à l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il m’a répondu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 18.7 ; 30.3 ; 118.5 ; 120.1.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, du cœur du séjour des morts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’ai crié au secours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu m’as entendu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 130.1-2
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’avais jeté dans l’abîme ╵au fond des mers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les courants m’ont encerclé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous tes flots et tes vagues ╵ont déferlé sur moi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 42.8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me disais :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis chassé de devant toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 31.23
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, je reverrai ╵ton temple saint.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les eaux m’environnaient ╵et menaçaient ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’abîme m’enserrait
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 18.5 ; 69.2-3.
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout autour de ma tête, ╵les algues s’enlaçaient.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je suis descendu ╵jusqu’au tréfonds des mers ╵où naissent les montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre avait déjà ╵tiré derrière moi ╵ses verrous pour toujours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais du fond de la fosse ╵tu m’as fait remonter vivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô Eternel, mon Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 30.4 ; 71.20.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je désespérais ╵de conserver la vie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: alors que la vie me quittait.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis souvenu ╵de toi, ô Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 142.4 ; 143.4.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma prière ╵est montée jusqu’à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’à ton temple saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ps 18.7 ; 88.3.
      marker-yv: yv-n
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui s’attachent ╵à de vaines idoles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se privent de la grâce
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 31.7
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se privent de la grâce
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduction incertaine. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: abandonnent l’amour pour l’Eternel.
      marker-yv: yv-n
    - type: text
      text: .
