document_id: JON.2,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de Jonas au fond des mers
  - type: text
    content: L’Eternel fit venir un grand poisson pour avaler Jonas. Durant trois jours et trois nuits, Jonas resta dans le ventre du poisson
  - type: note
    content: Mentionné en Mt 12.40.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Mais moi je t’offrirai ╵un sacrifice ╵en disant ma reconnaissance
  - type: note
    content: Voir Ps 42.5 ; 50.14, 23 ; 66.13 ; 116.17-18.
  - type: text
    content: ','
  - type: text
    content: et je m’acquitterai ╵des vœux que j’ai formés,
  - type: text
    content: car c’est de l’Eternel ╵que vient la délivrance
  - type: note
    content: Voir Ps 3.9.
  - type: text
    content: .
  '11':
  - type: text
    content: L’Eternel parla au poisson qui rejeta Jonas sur la terre ferme.
  '2':
  - type: text
    content: Dans le ventre du poisson, il adressa cette prière
  - type: note
    content: Prière de reconnaissance de Jonas, dans le ventre du poisson, pour la délivrance de la noyade (voir v. 4, 6-7).
  - type: text
    content: ' à l’Eternel son Dieu :'
  '3':
  - type: text
    content: Dans ma détresse, ╵moi, j’ai crié à l’Eternel
  - type: text
    content: et il m’a répondu
  - type: note
    content: Voir Ps 18.7 ; 30.3 ; 118.5 ; 120.1.
  - type: text
    content: .
  - type: text
    content: Oui, du cœur du séjour des morts
  - type: text
    content: j’ai crié au secours
  - type: text
    content: et tu m’as entendu
  - type: note
    content: Voir Ps 130.1-2.
  - type: text
    content: .
  '4':
  - type: text
    content: Tu m’avais jeté dans l’abîme ╵au fond des mers
  - type: text
    content: et les courants m’ont encerclé,
  - type: text
    content: tous tes flots et tes vagues ╵ont déferlé sur moi
  - type: note
    content: Voir Ps 42.8.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Je me disais :'
  - type: text
    content: Je suis chassé de devant toi
  - type: note
    content: Voir Ps 31.23.
  - type: text
    content: .
  - type: text
    content: Pourtant, je reverrai ╵ton temple saint.
  '6':
  - type: text
    content: Les eaux m’environnaient ╵et menaçaient ma vie,
  - type: text
    content: l’abîme m’enserrait
  - type: note
    content: Voir Ps 18.5 ; 69.2-3.
  - type: text
    content: '  ;'
  - type: text
    content: tout autour de ma tête, ╵les algues s’enlaçaient.
  '7':
  - type: text
    content: Et je suis descendu ╵jusqu’au tréfonds des mers ╵où naissent les montagnes.
  - type: text
    content: La terre avait déjà ╵tiré derrière moi ╵ses verrous pour toujours.
  - type: text
    content: Mais du fond de la fosse ╵tu m’as fait remonter vivant,
  - type: text
    content: ô Eternel, mon Dieu
  - type: note
    content: Voir Ps 30.4 ; 71.20.
  - type: text
    content: '  !'
  '8':
  - type: text
    content: Quand je désespérais ╵de conserver la vie
  - type: note
    content: 'Autre traduction : alors que la vie me quittait.'
  - type: text
    content: ','
  - type: text
    content: je me suis souvenu ╵de toi, ô Eternel
  - type: note
    content: Voir Ps 142.4 ; 143.4.
  - type: text
    content: ','
  - type: text
    content: et ma prière ╵est montée jusqu’à toi,
  - type: text
    content: jusqu’à ton temple saint
  - type: note
    content: Voir Ps 18.7 ; 88.3.
  - type: text
    content: .
  '9':
  - type: text
    content: Ceux qui s’attachent ╵à de vaines idoles
  - type: text
    content: se privent de la grâce
  - type: note
    content: 'Voir Ps 31.7. se privent de la grâce: traduction incertaine. Autre traduction : abandonnent l’amour pour l’Eternel.'
  - type: text
    content: .
