document_id: JOB.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job demande à Dieu d’abréger ses souffrances
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L’homme né de la femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses jours sont limités ╵et pleins de troubles !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il est comme une fleur ╵qui sort de terre et que l’on coupe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fuit comme une ombre furtive, ╵et il ne dure pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et c’est cet homme ╵que tu épies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, devant toi, ╵tu me traînes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’ancienne version grecque, la version syriaque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faut-il que tu le traînes.
    marker-yv: yv-n
  - type: text
    text: ' en justice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Peut-on tirer le pur ╵de ce qui est impur ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne le peut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Puisque tu as fixé ╵le nombre de ses jours, ╵et que toi, tu connais ╵le nombre de ses ans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque tu as fixé ╵le terme de sa vie ╵qu’il ne franchira pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: détourne tes regards de lui, ╵accorde-lui quelque répit
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’il jouisse de son repos ╵comme le salarié
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour qu’il tire satisfaction de sa journée.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car un arbre, du moins, ╵conserve une espérance :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’il est coupé, ╵il peut renaître encore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne cesse d’avoir ╵de nouveaux rejetons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sa racine peut bien ╵vieillir dans le terrain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa souche périr, ╵enfouie dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dès qu’il flaire de l’eau, ╵voilà qu’il reverdit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et produit des rameaux ╵comme une jeune plante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais lorsque l’homme meurt, ╵il reste inanimé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l’être humain expire, ╵où donc est-il alors ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’eau disparaît des mers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les rivières tarissent ╵et restent desséchées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: et l’homme, quand il meurt, ╵ne se relève plus ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce que le ciel s’éclipse ╵il ne se réveillera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne sortira pas ╵de son dernier sommeil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si seulement, ô Dieu, ╵tu voulais me tenir caché ╵dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: m’y abriter ╵jusqu’au jour où, enfin, ╵ta colère sera passée !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si seulement tu me fixais ╵un terme après lequel ╵tu penserais à moi !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais l’homme une fois mort, ╵va-t-il revivre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors, tous les jours de service ╵que je dois accomplir
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’attendrais que le temps ╵de ma relève arrive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toi, tu m’appellerais ╵et je te répondrais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu soupirerais ╵après ta créature.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors que maintenant ╵tu comptes tous mes pas !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne resterais plus ╵à l’affût de mes fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ainsi mon crime ╵serait scellé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Donc oublié, il ne pourrait plus être évoqué.
    marker-yv: yv-n
  - type: text
    text: ' dans un sachet,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu couvrirais mes fautes ╵d’une couche de plâtre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La montagne s’écroule ╵et se disloque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le rocher se détache ╵du lieu qu’il occupait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L’eau érode les pierres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son ruissellement ╵entraîne le terreau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De même, tu anéantis ╵l’espoir de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu le terrasses sans retour, ╵et il s’en va.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tu le défigures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Par la maladie.
    marker-yv: yv-n
  - type: text
    text: ', ╵puis tu le congédies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que ses enfants soient honorés, ╵lui, il n’en saura rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou qu’ils soient abaissés, ╵lui, il l’ignorera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il ne peut que souffrir ╵du mal qui l’atteint en son corps
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s’affliger ╵du malheur qu’il ressent.
