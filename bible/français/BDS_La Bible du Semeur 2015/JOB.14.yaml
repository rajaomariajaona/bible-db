document_id: JOB.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Job demande à Dieu d’abréger ses souffrances
  - type: text
    content: L’homme né de la femme,
  - type: text
    content: ses jours sont limités ╵et pleins de troubles !
  '10':
  - type: text
    content: Mais lorsque l’homme meurt, ╵il reste inanimé.
  - type: text
    content: Quand l’être humain expire, ╵où donc est-il alors ?
  '11':
  - type: text
    content: L’eau disparaît des mers,
  - type: text
    content: les rivières tarissent ╵et restent desséchées,
  '12':
  - type: text
    content: et l’homme, quand il meurt, ╵ne se relève plus ;
  - type: text
    content: jusqu’à ce que le ciel s’éclipse ╵il ne se réveillera pas,
  - type: text
    content: il ne sortira pas ╵de son dernier sommeil.
  '13':
  - type: text
    content: Si seulement, ô Dieu, ╵tu voulais me tenir caché ╵dans le séjour des morts,
  - type: text
    content: m’y abriter ╵jusqu’au jour où, enfin, ╵ta colère sera passée !
  - type: text
    content: Si seulement tu me fixais ╵un terme après lequel ╵tu penserais à moi !
  '14':
  - type: text
    content: Mais l’homme une fois mort, ╵va-t-il revivre ?
  - type: text
    content: Alors, tous les jours de service ╵que je dois accomplir
  - type: text
    content: j’attendrais que le temps ╵de ma relève arrive.
  '15':
  - type: text
    content: Toi, tu m’appellerais ╵et je te répondrais,
  - type: text
    content: et tu soupirerais ╵après ta créature.
  '16':
  - type: text
    content: Alors que maintenant ╵tu comptes tous mes pas !
  - type: text
    content: Tu ne resterais plus ╵à l’affût de mes fautes.
  '17':
  - type: text
    content: Ainsi mon crime ╵serait scellé
  - type: note
    content: Donc oublié, il ne pourrait plus être évoqué.
  - type: text
    content: ' dans un sachet,'
  - type: text
    content: tu couvrirais mes fautes ╵d’une couche de plâtre.
  '18':
  - type: text
    content: La montagne s’écroule ╵et se disloque,
  - type: text
    content: le rocher se détache ╵du lieu qu’il occupait.
  '19':
  - type: text
    content: L’eau érode les pierres
  - type: text
    content: et son ruissellement ╵entraîne le terreau.
  - type: text
    content: De même, tu anéantis ╵l’espoir de l’homme.
  '2':
  - type: text
    content: Il est comme une fleur ╵qui sort de terre et que l’on coupe.
  - type: text
    content: Il fuit comme une ombre furtive, ╵et il ne dure pas.
  '20':
  - type: text
    content: Tu le terrasses sans retour, ╵et il s’en va.
  - type: text
    content: Oui, tu le défigures
  - type: note
    content: Par la maladie.
  - type: text
    content: ', ╵puis tu le congédies.'
  '21':
  - type: text
    content: Que ses enfants soient honorés, ╵lui, il n’en saura rien.
  - type: text
    content: Ou qu’ils soient abaissés, ╵lui, il l’ignorera.
  '22':
  - type: text
    content: Il ne peut que souffrir ╵du mal qui l’atteint en son corps
  - type: text
    content: et s’affliger ╵du malheur qu’il ressent.
  '3':
  - type: text
    content: Et c’est cet homme ╵que tu épies,
  - type: text
    content: et, devant toi, ╵tu me traînes
  - type: note
    content: 'L’ancienne version grecque, la version syriaque et la Vulgate ont : faut-il que tu le traînes.'
  - type: text
    content: ' en justice.'
  '4':
  - type: text
    content: Peut-on tirer le pur ╵de ce qui est impur ?
  - type: text
    content: Personne ne le peut.
  '5':
  - type: text
    content: Puisque tu as fixé ╵le nombre de ses jours, ╵et que toi, tu connais ╵le nombre de ses ans,
  - type: text
    content: puisque tu as fixé ╵le terme de sa vie ╵qu’il ne franchira pas,
  '6':
  - type: text
    content: détourne tes regards de lui, ╵accorde-lui quelque répit
  - type: text
    content: pour qu’il jouisse de son repos ╵comme le salarié
  - type: note
    content: 'Autre traduction : pour qu’il tire satisfaction de sa journée.'
  - type: text
    content: .
  '7':
  - type: text
    content: 'Car un arbre, du moins, ╵conserve une espérance :'
  - type: text
    content: s’il est coupé, ╵il peut renaître encore,
  - type: text
    content: il ne cesse d’avoir ╵de nouveaux rejetons.
  '8':
  - type: text
    content: Sa racine peut bien ╵vieillir dans le terrain
  - type: text
    content: et sa souche périr, ╵enfouie dans la poussière,
  '9':
  - type: text
    content: dès qu’il flaire de l’eau, ╵voilà qu’il reverdit
  - type: text
    content: et produit des rameaux ╵comme une jeune plante.
