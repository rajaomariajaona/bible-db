document_id: JOS.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les derniers actes de Josué
  - type: heading
    content: Josué renvoie chez eux les guerriers des tribus installées en Transjordanie
  - type: text
    content: 'Alors Josué réunit les hommes de Ruben, de Gad et de la demi-tribu de Manassé '
  '10':
  - type: text
    content: Lorsqu’ils arrivèrent à Gueliloth aux environs du Jourdain qui se trouve dans le pays de Canaan, ils érigèrent là un autel monumental au bord du fleuve
  - type: note
    content: Du côté occidental. Les tribus orientales voulaient signifier par là qu’elles avaient leur part dans le pays de Canaan et dans son culte.
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'La nouvelle en parvint aux autres Israélites car on racontait : Voilà que les hommes de Ruben, de Gad et de la demi-tribu de Manassé ont construit un autel face au pays de Canaan près de Gueliloth sur les bords du Jourdain, du côté des Israélites.'
  '12':
  - type: text
    content: 'Dès que les Israélites l’apprirent, ils se rassemblèrent tous à Silo, pour aller attaquer les hommes des tribus transjordaniennes. '
  '13':
  - type: text
    content: 'Ils envoyèrent aux hommes des tribus de Ruben, de Gad et de la demi-tribu de Manassé en Galaad, Phinéas, fils du prêtre Eléazar, '
  '14':
  - type: text
    content: 'dix responsables, chefs de groupe familial parmi les familles d’Israël, un par tribu. '
  '15':
  - type: text
    content: 'Ils se rendirent auprès des hommes de Ruben, de Gad et de la demi-tribu de Manassé en Galaad et leur parlèrent en ces termes : '
  '16':
  - type: text
    content: 'Voici ce que vous fait dire toute la communauté de l’Eternel : « Pourquoi vous révoltez-vous contre le Dieu d’Israël ? Pourquoi vous détournez-vous maintenant de l’Eternel ? Car, en construisant un autel pour vous-mêmes, vous vous révoltez contre lui. '
  '17':
  - type: text
    content: Nous avons déjà commis une faute grave à Peor, et nous n’en sommes pas encore purifiés à ce jour, malgré le fléau qui nous a tous frappés. Cela ne suffit-il pas
  - type: note
    content: Voir Nb 25.1-9.
  - type: text
    content: '  ? '
  '18':
  - type: text
    content: 'Faut-il donc maintenant que vous vous détourniez de l’Eternel ? Si, aujourd’hui, vous vous révoltez contre lui, demain, il s’irritera contre toute l’assemblée d’Israël. '
  '19':
  - type: text
    content: 'Si le pays qui vous a été donné en propriété vous paraît impur, venez donc dans le territoire qui appartient à l’Eternel, et où il a établi sa demeure, et installez-vous au milieu de nous ; mais ne vous révoltez pas contre l’Eternel et ne vous opposez pas à nous en vous construisant un autel rival de celui de l’Eternel notre Dieu ! '
  '2':
  - type: text
    content: 'et leur dit : Vous avez fait tout ce que Moïse, serviteur de l’Eternel, vous a ordonné et vous avez obéi à tout ce que je vous ai commandé. '
  '20':
  - type: text
    content: Lorsque Akân, fils de Zérah, a commis une faute grave en dérobant un objet voué à l’Eternel, tout le peuple d’Israël a subi le contrecoup de la colère divine
  - type: note
    content: Voir 7.1-26.
  - type: text
    content: . Il n’a pas été le seul à périr à cause de sa faute. »
  - type: heading
    content: La réconciliation est-ouest
  '21':
  - type: text
    content: 'Les hommes de Ruben, de Gad et de la demi-tribu de Manassé répondirent aux responsables d’Israël : '
  '22':
  - type: text
    content: 'Le Dieu suprême, l’Eternel, oui, le Dieu suprême, l’Eternel sait ce qu’il en est ; qu’Israël aussi le sache. Si c’est pour nous révolter et être infidèles à l’Eternel que nous avons construit cet autel, alors qu’il ne nous épargne pas. '
  '23':
  - type: text
    content: 'Si c’est pour nous détourner de l’Eternel que nous l’avons érigé, pour y offrir des holocaustes et des offrandes ou des sacrifices de communion, que l’Eternel lui-même nous en demande compte. '
  '24':
  - type: text
    content: 'Mais ce n’est pas le cas ! Nous l’avons fait parce que nous avions peur qu’un jour vos descendants ne disent aux nôtres : « Qu’avez-vous à faire avec l’Eternel, le Dieu d’Israël ? '
  '25':
  - type: text
    content: 'N’a-t-il pas lui-même placé le Jourdain comme frontière entre nous et vous, descendants de Ruben et de Gad ? Vous n’avez donc rien à faire avec lui ! » Ainsi vos descendants pourraient empêcher les nôtres de craindre l’Eternel. '
  '26':
  - type: text
    content: 'C’est alors que nous avons pensé à construire cet autel, non pour y offrir des holocaustes et des sacrifices, '
  '27':
  - type: text
    content: 'mais pour servir de témoin entre nous et vous, et pour les générations qui nous succéderont, attestant que nous aussi nous rendons notre culte à l’Eternel devant lui, par nos holocaustes, nos sacrifices de communion et nos autres sacrifices. Nous voulions éviter qu’un jour vos descendants ne disent aux nôtres : « Vous n’avez rien à faire avec l’Eternel ! » '
  '28':
  - type: text
    content: 'Nous nous sommes dit : S’ils venaient un jour à parler ainsi, à nous ou à nos descendants, nous pourrons leur répondre : Regardez l’autel que nos ancêtres ont construit et qui est une réplique de l’autel de l’Eternel. Ils l’ont fait non pour y offrir des holocaustes et des sacrifices, mais pour servir de témoin entre nous et vous ! '
  '29':
  - type: text
    content: Ainsi nous n’avons jamais eu l’idée de nous révolter contre l’Eternel et d’abandonner son culte en érigeant un autel servant à offrir des holocaustes, des offrandes et autres sacrifices, un autel rival de l’autel de l’Eternel notre Dieu qui est dressé devant son tabernacle.
  '3':
  - type: text
    content: 'Durant toutes ces années jusqu’à ce jour, vous n’avez pas abandonné vos compatriotes et vous avez obéi fidèlement à l’ordre que l’Eternel vous avait donné. '
  '30':
  - type: text
    content: 'Lorsque le prêtre Phinéas, les responsables et les chefs des familles d’Israël eurent entendu les explications des hommes de Ruben, de Gad et de Manassé, ils furent satisfaits. '
  '31':
  - type: text
    content: 'Phinéas, le fils du prêtre Eléazar, leur dit : Aujourd’hui nous reconnaissons que l’Eternel est au milieu de nous, puisque vous ne vous êtes pas révoltés contre lui. Vous avez préservé les Israélites d’une intervention de l’Eternel.'
  '32':
  - type: text
    content: 'Après cela, Phinéas, le fils du prêtre Eléazar, et les responsables de tous les hommes de Ruben et de Gad revinrent de Galaad en terre de Canaan, auprès des autres Israélites, et leur rendirent compte de ce qui s’était passé. '
  '33':
  - type: text
    content: 'Les Israélites furent satisfaits et ils bénirent Dieu. Plus personne ne parla de partir en guerre contre les descendants de Ruben et de Gad pour dévaster leur pays. '
  '34':
  - type: text
    content: 'Ceux-ci appelèrent l’autel qu’ils avaient construit : Ed (Témoin) en disant : Il est témoin entre nous que l’Eternel seul est Dieu.'
  '4':
  - type: text
    content: 'Maintenant, l’Eternel votre Dieu a accordé à vos compatriotes une existence paisible dans le pays, comme il le leur avait promis. Vous pouvez donc maintenant partir et rentrer dans le pays qui vous appartient et que Moïse, serviteur de l’Eternel, vous a donné en propriété de l’autre côté du Jourdain. '
  '5':
  - type: text
    content: 'Seulement, veillez bien à appliquer le commandement et la Loi que Moïse, serviteur de l’Eternel, vous a transmis : aimez l’Eternel, votre Dieu ! Suivez tous les chemins qu’il a prescrits pour vous, obéissez à ses commandements, attachez-vous à lui et servez-le de tout votre cœur et de tout votre être !'
  '6':
  - type: text
    content: 'Puis Josué les bénit et les renvoya, et ils rentrèrent chez eux. '
  '7':
  - type: text
    content: Moïse avait donné un territoire dans le Basan à la moitié de la tribu de Manassé
  - type: note
    content: La moitié de la tribu de Manassé était installée dans la région du Basan à l’est du Jourdain (13.29-31), l’autre moitié à l’ouest du Jourdain (sur un territoire s’étendant jusqu’à la côte de la Méditerranée, 5.1 ; 12.7).
  - type: text
    content: '. L’autre moitié fut installée par Josué à l’ouest du Jourdain avec leurs compatriotes israélites. Lorsque Josué les renvoya chez eux, il leur donna sa bénédiction '
  '8':
  - type: text
    content: 'et ajouta : Vous vous en retournez chez vous avec de grandes richesses, avec des troupeaux très nombreux, avec une quantité considérable d’argent, d’or, de bronze et de fer, ainsi que des vêtements en abondance. Vous partagerez ce butin pris sur vos ennemis avec vos compatriotes'
  - type: note
    content: Voir Nb 31.25-27.
  - type: text
    content: .
  '9':
  - type: text
    content: Les descendants de Ruben, de Gad et la demi-tribu de Manassé partirent donc et quittèrent les autres Israélites à Silo dans le pays de Canaan pour retourner au pays de Galaad
  - type: note
    content: Expression désignant ici tout le territoire à l’est du Jourdain.
  - type: text
    content: ', le territoire que Moïse leur avait donné en propriété sur l’ordre de l’Eternel.'
  - type: heading
    content: L’autel des Israélites installés en Transjordanie
