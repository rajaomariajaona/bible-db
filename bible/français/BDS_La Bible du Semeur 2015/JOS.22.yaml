document_id: JOS.22
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les derniers actes de Josué
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué renvoie chez eux les guerriers des tribus installées en Transjordanie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Josué réunit les hommes de Ruben, de Gad et de la demi-tribu de Manassé '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et leur dit : Vous avez fait tout ce que Moïse, serviteur de l’Eternel, vous a ordonné et vous avez obéi à tout ce que je vous ai commandé. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Durant toutes ces années jusqu’à ce jour, vous n’avez pas abandonné vos compatriotes et vous avez obéi fidèlement à l’ordre que l’Eternel vous avait donné. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maintenant, l’Eternel votre Dieu a accordé à vos compatriotes une existence paisible dans le pays, comme il le leur avait promis. Vous pouvez donc maintenant partir et rentrer dans le pays qui vous appartient et que Moïse, serviteur de l’Eternel, vous a donné en propriété de l’autre côté du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Seulement, veillez bien à appliquer le commandement et la Loi que Moïse, serviteur de l’Eternel, vous a transmis : aimez l’Eternel, votre Dieu ! Suivez tous les chemins qu’il a prescrits pour vous, obéissez à ses commandements, attachez-vous à lui et servez-le de tout votre cœur et de tout votre être !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis Josué les bénit et les renvoya, et ils rentrèrent chez eux. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moïse avait donné un territoire dans le Basan à la moitié de la tribu de Manassé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La moitié de la tribu de Manassé était installée dans la région du Basan à l’est du Jourdain (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13.29-31
        metadata:
          usfm: JOS.13.29+JOS.13.30+JOS.13.31
      - type: text
        text: ), l’autre moitié à l’ouest du Jourdain (sur un territoire s’étendant jusqu’à la côte de la Méditerranée, 5.1 ; 12.7).
    marker-yv: yv-n
  - type: text
    text: '. L’autre moitié fut installée par Josué à l’ouest du Jourdain avec leurs compatriotes israélites. Lorsque Josué les renvoya chez eux, il leur donna sa bénédiction '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et ajouta : Vous vous en retournez chez vous avec de grandes richesses, avec des troupeaux très nombreux, avec une quantité considérable d’argent, d’or, de bronze et de fer, ainsi que des vêtements en abondance. Vous partagerez ce butin pris sur vos ennemis avec vos compatriotes'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 31.25-27
        metadata:
          usfm: NUM.31.25+NUM.31.26+NUM.31.27
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les descendants de Ruben, de Gad et la demi-tribu de Manassé partirent donc et quittèrent les autres Israélites à Silo dans le pays de Canaan pour retourner au pays de Galaad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Expression désignant ici tout le territoire à l’est du Jourdain.
    marker-yv: yv-n
  - type: text
    text: ', le territoire que Moïse leur avait donné en propriété sur l’ordre de l’Eternel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autel des Israélites installés en Transjordanie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lorsqu’ils arrivèrent à Gueliloth aux environs du Jourdain qui se trouve dans le pays de Canaan, ils érigèrent là un autel monumental au bord du fleuve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Du côté occidental. Les tribus orientales voulaient signifier par là qu’elles avaient leur part dans le pays de Canaan et dans son culte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La nouvelle en parvint aux autres Israélites car on racontait : Voilà que les hommes de Ruben, de Gad et de la demi-tribu de Manassé ont construit un autel face au pays de Canaan près de Gueliloth sur les bords du Jourdain, du côté des Israélites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dès que les Israélites l’apprirent, ils se rassemblèrent tous à Silo, pour aller attaquer les hommes des tribus transjordaniennes. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils envoyèrent aux hommes des tribus de Ruben, de Gad et de la demi-tribu de Manassé en Galaad, Phinéas, fils du prêtre Eléazar, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dix responsables, chefs de groupe familial parmi les familles d’Israël, un par tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils se rendirent auprès des hommes de Ruben, de Gad et de la demi-tribu de Manassé en Galaad et leur parlèrent en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce que vous fait dire toute la communauté de l’Eternel : « Pourquoi vous révoltez-vous contre le Dieu d’Israël ? Pourquoi vous détournez-vous maintenant de l’Eternel ? Car, en construisant un autel pour vous-mêmes, vous vous révoltez contre lui. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nous avons déjà commis une faute grave à Peor, et nous n’en sommes pas encore purifiés à ce jour, malgré le fléau qui nous a tous frappés. Cela ne suffit-il pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 25.1-9
        metadata:
          usfm: NUM.25.1+NUM.25.2+NUM.25.3+NUM.25.4+NUM.25.5+NUM.25.6+NUM.25.7+NUM.25.8+NUM.25.9
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Faut-il donc maintenant que vous vous détourniez de l’Eternel ? Si, aujourd’hui, vous vous révoltez contre lui, demain, il s’irritera contre toute l’assemblée d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si le pays qui vous a été donné en propriété vous paraît impur, venez donc dans le territoire qui appartient à l’Eternel, et où il a établi sa demeure, et installez-vous au milieu de nous ; mais ne vous révoltez pas contre l’Eternel et ne vous opposez pas à nous en vous construisant un autel rival de celui de l’Eternel notre Dieu ! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lorsque Akân, fils de Zérah, a commis une faute grave en dérobant un objet voué à l’Eternel, tout le peuple d’Israël a subi le contrecoup de la colère divine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7.1-26
        metadata:
          usfm: JOS.7.1+JOS.7.2+JOS.7.3+JOS.7.4+JOS.7.5+JOS.7.6+JOS.7.7+JOS.7.8+JOS.7.9+JOS.7.10+JOS.7.11+JOS.7.12+JOS.7.13+JOS.7.14+JOS.7.15+JOS.7.16+JOS.7.17+JOS.7.18+JOS.7.19+JOS.7.20+JOS.7.21+JOS.7.22+JOS.7.23+JOS.7.24+JOS.7.25+JOS.7.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Il n’a pas été le seul à périr à cause de sa faute. »
- type: usfm
  marker: s1
  children:
  - type: text
    text: La réconciliation est-ouest
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les hommes de Ruben, de Gad et de la demi-tribu de Manassé répondirent aux responsables d’Israël : '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le Dieu suprême, l’Eternel, oui, le Dieu suprême, l’Eternel sait ce qu’il en est ; qu’Israël aussi le sache. Si c’est pour nous révolter et être infidèles à l’Eternel que nous avons construit cet autel, alors qu’il ne nous épargne pas. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si c’est pour nous détourner de l’Eternel que nous l’avons érigé, pour y offrir des holocaustes et des offrandes ou des sacrifices de communion, que l’Eternel lui-même nous en demande compte. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais ce n’est pas le cas ! Nous l’avons fait parce que nous avions peur qu’un jour vos descendants ne disent aux nôtres : « Qu’avez-vous à faire avec l’Eternel, le Dieu d’Israël ? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'N’a-t-il pas lui-même placé le Jourdain comme frontière entre nous et vous, descendants de Ruben et de Gad ? Vous n’avez donc rien à faire avec lui ! » Ainsi vos descendants pourraient empêcher les nôtres de craindre l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est alors que nous avons pensé à construire cet autel, non pour y offrir des holocaustes et des sacrifices, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mais pour servir de témoin entre nous et vous, et pour les générations qui nous succéderont, attestant que nous aussi nous rendons notre culte à l’Eternel devant lui, par nos holocaustes, nos sacrifices de communion et nos autres sacrifices. Nous voulions éviter qu’un jour vos descendants ne disent aux nôtres : « Vous n’avez rien à faire avec l’Eternel ! » '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nous nous sommes dit : S’ils venaient un jour à parler ainsi, à nous ou à nos descendants, nous pourrons leur répondre : Regardez l’autel que nos ancêtres ont construit et qui est une réplique de l’autel de l’Eternel. Ils l’ont fait non pour y offrir des holocaustes et des sacrifices, mais pour servir de témoin entre nous et vous ! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ainsi nous n’avons jamais eu l’idée de nous révolter contre l’Eternel et d’abandonner son culte en érigeant un autel servant à offrir des holocaustes, des offrandes et autres sacrifices, un autel rival de l’autel de l’Eternel notre Dieu qui est dressé devant son tabernacle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lorsque le prêtre Phinéas, les responsables et les chefs des familles d’Israël eurent entendu les explications des hommes de Ruben, de Gad et de Manassé, ils furent satisfaits. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Phinéas, le fils du prêtre Eléazar, leur dit : Aujourd’hui nous reconnaissons que l’Eternel est au milieu de nous, puisque vous ne vous êtes pas révoltés contre lui. Vous avez préservé les Israélites d’une intervention de l’Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Après cela, Phinéas, le fils du prêtre Eléazar, et les responsables de tous les hommes de Ruben et de Gad revinrent de Galaad en terre de Canaan, auprès des autres Israélites, et leur rendirent compte de ce qui s’était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les Israélites furent satisfaits et ils bénirent Dieu. Plus personne ne parla de partir en guerre contre les descendants de Ruben et de Gad pour dévaster leur pays. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ceux-ci appelèrent l’autel qu’ils avaient construit : Ed (Témoin) en disant : Il est témoin entre nous que l’Eternel seul est Dieu.'
