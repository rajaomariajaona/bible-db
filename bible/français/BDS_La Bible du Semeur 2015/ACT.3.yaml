document_id: ACT.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guérison d’un paralysé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un jour, Pierre et Jean montaient au Temple pour la prière à trois heures de l’après-midi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On était juste en train d’y porter un infirme : c’était un homme paralysé depuis sa naissance. On l’installait tous les jours à l’entrée de la cour du Temple, près de la porte appelée la « Belle Porte »'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'porte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: se trouvait entre le parvis extérieur (parvis des non-Juifs) et les différents parvis réservés aux seuls Juifs.
    marker-yv: yv-n
  - type: text
    text: ', pour qu’il puisse demander l’aumône à ceux qui se rendaient au sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand il vit Pierre et Jean qui allaient pénétrer dans la cour du Temple, il leur demanda l’aumône.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les deux apôtres fixèrent les yeux sur lui.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Regarde-nous ! lui dit Pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’infirme les regarda attentivement : il pensait qu’il allait recevoir d’eux quelque chose.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Pierre lui dit : Je n’ai ni argent ni or, mais ce que j’ai je te le donne : au nom de Jésus-Christ de Nazareth, lève-toi et marche'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs manuscrits omettent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lève-toi et.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et, en même temps, il le prit par la main droite et le fit lever. Aussitôt, ses pieds et ses chevilles se raffermirent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'd’un saut il fut debout et se mit à marcher. Il entra avec eux dans la cour du Temple : il marchait, il sautait de joie et louait Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tout le monde le vit ainsi marcher et louer Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On le reconnaissait : c’était bien lui qui était toujours assis à mendier près de la « Belle Porte » du Temple.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En voyant ce qui venait de lui arriver, les gens étaient remplis de stupeur et de crainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quant à lui, il ne quittait plus Pierre et Jean. Tout le peuple accourut et se rassembla autour d’eux dans la cour du Temple, sous le portique de Salomon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'portique, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: du côté est, clôturait la partie de la cour du Temple où les non-Juifs pouvaient entrer (voir Jn 10.23 ; Ac 5.12).
    marker-yv: yv-n
  - type: text
    text: ', et ils étaient stupéfaits.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre explique le miracle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Pierre vit cela, il s’adressa à la foule :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Hommes israélites, qu’avez-vous à vous étonner ainsi de ce qui vient de se passer ? Pourquoi nous fixez-vous avec tant d’insistance comme si c’était nous qui, par notre propre pouvoir ou notre piété, avions fait marcher cet homme ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Non, c’est le '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu d’
    - type: usfm
      marker: w
      children:
      - type: text
        text: Abraham
    - type: text
      text: ', d’'
    - type: usfm
      marker: w
      children:
      - type: text
        text: Isaac
    - type: text
      text: ' et de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.6
        metadata:
          usfm: EXO.3.6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
        metadata:
          usfm: EXO.3.15
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', le Dieu de nos ancêtres, qui vient ici de manifester la gloire de son serviteur Jésus – ce Jésus que vous avez livré à Pilate et renié devant lui alors qu’il était décidé de le remettre en liberté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Oui, vous avez renié celui qui est saint et juste. A sa place, vous avez demandé comme faveur la libération d’un meurtrier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi vous avez fait mourir l’auteur de la vie. Mais Dieu l’a ressuscité : nous en sommes témoins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et c’est parce que nous croyons en Jésus, que la puissance de ce Jésus que nous avons invoqué a rendu à cet homme que vous voyez et que vous connaissez, la force de se tenir debout. Oui, cette foi qui est efficace par Jésus a donné à cet homme une parfaite guérison, comme vous pouvez tous vous en rendre compte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A présent, mes frères, je sais bien que vous avez agi sans savoir ce que vous faisiez, aussi bien vous que vos chefs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais Dieu a accompli de cette manière ce qu’il avait annoncé d’avance par tous ses prophètes : le Messie qu’il avait promis d’envoyer devait souffrir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maintenant donc, changez et tournez-vous vers Dieu pour qu’il efface vos péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors le Seigneur vous accordera des temps de repos, et il vous enverra celui qu’il vous a destiné comme Messie : Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En attendant, il doit demeurer au ciel jusqu’au jour où l’univers entier sera restauré, comme Dieu l’a annoncé depuis des siècles par la bouche de ses saints prophètes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ainsi Moïse a dit :'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Le Seigneur votre Dieu suscitera pour vous, du milieu de vos compatriotes, un prophète qui sera comme moi : vous écouterez tout ce qu’il vous dira'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 18.15-16
        metadata:
          usfm: DEU.18.15+DEU.18.16
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Celui qui refusera d’obéir à ce prophète
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 18.19
        metadata:
          usfm: DEU.18.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sera exclu de mon peuple par la mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 23.29
        metadata:
          usfm: LEV.23.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tous les prophètes qui ont parlé, depuis Samuel et ses successeurs, ont annoncé aussi d’avance les temps que nous vivons aujourd’hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous êtes les héritiers de ces prophètes, les bénéficiaires de l’alliance que Dieu a conclue avec nos ancêtres lorsqu’il a promis à Abraham : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Toutes les familles de la terre seront bénies à travers ta descendance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 22.18
        metadata:
          usfm: GEN.22.18
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26.4'
        metadata:
          usfm: GEN.26.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: C’est pour vous, en premier lieu, que Dieu a ressuscité son serviteur ; et il vous l’a envoyé pour vous bénir, en détournant chacun de vous de ses mauvaises actions.
