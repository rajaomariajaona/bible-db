document_id: ACT.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La guérison d’un paralysé
  - type: text
    content: 'Un jour, Pierre et Jean montaient au Temple pour la prière à trois heures de l’après-midi. '
  '10':
  - type: text
    content: 'On le reconnaissait : c’était bien lui qui était toujours assis à mendier près de la « Belle Porte » du Temple.'
  - type: text
    content: 'En voyant ce qui venait de lui arriver, les gens étaient remplis de stupeur et de crainte. '
  '11':
  - type: text
    content: Quant à lui, il ne quittait plus Pierre et Jean. Tout le peuple accourut et se rassembla autour d’eux dans la cour du Temple, sous le portique de Salomon
  - type: note
    content: Ce portique, du côté est, clôturait la partie de la cour du Temple où les non-Juifs pouvaient entrer (voir Jn 10.23 ; Ac 5.12).
  - type: text
    content: ', et ils étaient stupéfaits.'
  - type: heading
    content: Pierre explique le miracle
  '12':
  - type: text
    content: 'Quand Pierre vit cela, il s’adressa à la foule :'
  - type: text
    content: 'Hommes israélites, qu’avez-vous à vous étonner ainsi de ce qui vient de se passer ? Pourquoi nous fixez-vous avec tant d’insistance comme si c’était nous qui, par notre propre pouvoir ou notre piété, avions fait marcher cet homme ? '
  '13':
  - type: text
    content: 'Non, c’est le '
  - type: text
    content: Dieu d’
  - type: text
    content: Abraham
  - type: text
    content: ', d’'
  - type: text
    content: Isaac
  - type: text
    content: ' et de '
  - type: text
    content: Jacob
  - type: note
    content: Ex 3.6, 15.
  - type: text
    content: ', le Dieu de nos ancêtres, qui vient ici de manifester la gloire de son serviteur Jésus – ce Jésus que vous avez livré à Pilate et renié devant lui alors qu’il était décidé de le remettre en liberté. '
  '14':
  - type: text
    content: 'Oui, vous avez renié celui qui est saint et juste. A sa place, vous avez demandé comme faveur la libération d’un meurtrier. '
  '15':
  - type: text
    content: 'Ainsi vous avez fait mourir l’auteur de la vie. Mais Dieu l’a ressuscité : nous en sommes témoins.'
  '16':
  - type: text
    content: Et c’est parce que nous croyons en Jésus, que la puissance de ce Jésus que nous avons invoqué a rendu à cet homme que vous voyez et que vous connaissez, la force de se tenir debout. Oui, cette foi qui est efficace par Jésus a donné à cet homme une parfaite guérison, comme vous pouvez tous vous en rendre compte.
  '17':
  - type: text
    content: 'A présent, mes frères, je sais bien que vous avez agi sans savoir ce que vous faisiez, aussi bien vous que vos chefs. '
  '18':
  - type: text
    content: 'Mais Dieu a accompli de cette manière ce qu’il avait annoncé d’avance par tous ses prophètes : le Messie qu’il avait promis d’envoyer devait souffrir. '
  '19':
  - type: text
    content: 'Maintenant donc, changez et tournez-vous vers Dieu pour qu’il efface vos péchés. '
  '2':
  - type: text
    content: 'On était juste en train d’y porter un infirme : c’était un homme paralysé depuis sa naissance. On l’installait tous les jours à l’entrée de la cour du Temple, près de la porte appelée la « Belle Porte »'
  - type: note
    content: Cette porte se trouvait entre le parvis extérieur (parvis des non-Juifs) et les différents parvis réservés aux seuls Juifs.
  - type: text
    content: ', pour qu’il puisse demander l’aumône à ceux qui se rendaient au sanctuaire. '
  '20':
  - type: text
    content: 'Alors le Seigneur vous accordera des temps de repos, et il vous enverra celui qu’il vous a destiné comme Messie : Jésus.'
  '21':
  - type: text
    content: En attendant, il doit demeurer au ciel jusqu’au jour où l’univers entier sera restauré, comme Dieu l’a annoncé depuis des siècles par la bouche de ses saints prophètes.
  '22':
  - type: text
    content: 'Ainsi Moïse a dit :'
  - type: text
    content: 'Le Seigneur votre Dieu suscitera pour vous, du milieu de vos compatriotes, un prophète qui sera comme moi : vous écouterez tout ce qu’il vous dira'
  - type: text
    content: ' '
  - type: note
    content: Dt 18.15-16 .
  - type: text
    content: .
  - type: text
    content: ' '
  '23':
  - type: text
    content: Celui qui refusera d’obéir à ce prophète
  - type: note
    content: Dt 18.19.
  - type: text
    content: ' '
  - type: text
    content: sera exclu de mon peuple par la mort
  - type: note
    content: Lv 23.29.
  - type: text
    content: .
  '24':
  - type: text
    content: Tous les prophètes qui ont parlé, depuis Samuel et ses successeurs, ont annoncé aussi d’avance les temps que nous vivons aujourd’hui.
  '25':
  - type: text
    content: 'Vous êtes les héritiers de ces prophètes, les bénéficiaires de l’alliance que Dieu a conclue avec nos ancêtres lorsqu’il a promis à Abraham : '
  - type: text
    content: Toutes les familles de la terre seront bénies à travers ta descendance
  - type: note
    content: Gn 22.18 et 26.4.
  - type: text
    content: .
  - type: text
    content: ' '
  '26':
  - type: text
    content: C’est pour vous, en premier lieu, que Dieu a ressuscité son serviteur ; et il vous l’a envoyé pour vous bénir, en détournant chacun de vous de ses mauvaises actions.
  '3':
  - type: text
    content: Quand il vit Pierre et Jean qui allaient pénétrer dans la cour du Temple, il leur demanda l’aumône.
  '4':
  - type: text
    content: Les deux apôtres fixèrent les yeux sur lui.
  - type: text
    content: – Regarde-nous ! lui dit Pierre.
  '5':
  - type: text
    content: 'L’infirme les regarda attentivement : il pensait qu’il allait recevoir d’eux quelque chose.'
  '6':
  - type: text
    content: 'Mais Pierre lui dit : Je n’ai ni argent ni or, mais ce que j’ai je te le donne : au nom de Jésus-Christ de Nazareth, lève-toi et marche'
  - type: note
    content: Plusieurs manuscrits omettent lève-toi et.
  - type: text
    content: '  !'
  '7':
  - type: text
    content: 'Et, en même temps, il le prit par la main droite et le fit lever. Aussitôt, ses pieds et ses chevilles se raffermirent, '
  '8':
  - type: text
    content: 'd’un saut il fut debout et se mit à marcher. Il entra avec eux dans la cour du Temple : il marchait, il sautait de joie et louait Dieu.'
  '9':
  - type: text
    content: 'Tout le monde le vit ainsi marcher et louer Dieu. '
