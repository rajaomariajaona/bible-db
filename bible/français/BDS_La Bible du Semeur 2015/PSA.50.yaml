document_id: PSA.50
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu va juger son peuple
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d’Asaph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur Asaph, voir 1 Ch 6.16-17, 24 ; 25.1 ; 2 Ch 35.15. Asaph était l’un des trois chefs de chœur de David ; il nous a laissé douze psaumes.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Dieu suprême, ╵l’Eternel a parlé ╵et il a convoqué la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: du levant du soleil ╵à son couchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: De Sion, parfaite en beauté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu resplendit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu’il vienne notre Dieu ! ╵Qu’il ne garde pas le silence !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant lui, un feu dévorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autour de lui, c’est l’ouragan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le ciel en haut, il le convoque,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il convoque aussi la terre : ╵il vient pour gouverner son peuple.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: « Rassemblez ceux qui me sont attachés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui ont conclu avec moi ╵l’alliance par le sacrifice. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le ciel publiera sa justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est Dieu qui gouverne le monde.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mon peuple, écoute, je te parle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, je témoigne contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi qui suis Dieu, ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ce n’est pas pour tes sacrifices ╵que je t’adresse des reproches :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’ai constamment ╵tes holocaustes sous les yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ne prendrai ╵ni des taureaux dans ton étable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni des boucs dans tes fermes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: car tous les animaux ╵des forêts sont à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à moi, les bêtes par milliers ╵dans les montagnes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je connais tous les oiseaux des montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les animaux des champs ╵me sont à portée de la main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si j’avais faim, te le dirais-je ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’univers est à moi ╵et tout ce qu’il renferme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vais-je manger ╵la viande des taureaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou m’abreuver ╵du sang des boucs ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En sacrifice à Dieu ╵offre donc ta reconnaissance !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accomplis envers le Très-Haut ╵les vœux que tu as faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors tu pourras m’appeler ╵au jour de la détresse :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te délivrerai, ╵et tu me rendras gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Au méchant aussi, Dieu s’adresse :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Pourquoi rabâches-tu mes lois ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as mon alliance à la bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mais tu détestes l’instruction
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu rejettes mes paroles ╵au loin, derrière toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A peine as-tu vu un voleur, ╵tu deviens son complice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et puis, tu fais cause commune ╵avec les adultères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ta bouche forge la malice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta langue tisse le mensonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lorsque tu t’assieds avec d’autres, ╵tu calomnies ton frère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu jettes le déshonneur ╵sur le fils de ta mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lorsque tu agissais ainsi ╵et que je n’ai rien dit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as-tu vraiment imaginé ╵que je te ressemblais ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi je vais te corriger, ╵tout mettre sous tes yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Comprenez donc cela, ╵vous qui ignorez Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sinon je vous déchirerai ╵et nul ne vous délivrera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Qui, en guise de sacrifice, ╵m’offre de la reconnaissance, ╵celui-là me rend gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à celui qui règle son chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai voir ╵le salut que Dieu donne. »
