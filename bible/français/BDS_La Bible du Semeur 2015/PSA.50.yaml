document_id: PSA.50,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu va juger son peuple
  - type: text
    content: Psaume d’Asaph
  - type: note
    content: Sur Asaph, voir 1 Ch 6.16-17, 24 ; 25.1 ; 2 Ch 35.15. Asaph était l’un des trois chefs de chœur de David ; il nous a laissé douze psaumes.
  - type: text
    content: .
  - type: text
    content: Le Dieu suprême, ╵l’Eternel a parlé ╵et il a convoqué la terre
  - type: text
    content: du levant du soleil ╵à son couchant.
  '10':
  - type: text
    content: car tous les animaux ╵des forêts sont à moi,
  - type: text
    content: à moi, les bêtes par milliers ╵dans les montagnes !
  '11':
  - type: text
    content: Je connais tous les oiseaux des montagnes
  - type: text
    content: et tous les animaux des champs ╵me sont à portée de la main.
  '12':
  - type: text
    content: Si j’avais faim, te le dirais-je ?
  - type: text
    content: L’univers est à moi ╵et tout ce qu’il renferme.
  '13':
  - type: text
    content: Vais-je manger ╵la viande des taureaux,
  - type: text
    content: ou m’abreuver ╵du sang des boucs ?
  '14':
  - type: text
    content: En sacrifice à Dieu ╵offre donc ta reconnaissance !
  - type: text
    content: Accomplis envers le Très-Haut ╵les vœux que tu as faits.
  '15':
  - type: text
    content: 'Alors tu pourras m’appeler ╵au jour de la détresse :'
  - type: text
    content: je te délivrerai, ╵et tu me rendras gloire.
  '16':
  - type: text
    content: 'Au méchant aussi, Dieu s’adresse :'
  - type: text
    content: « Pourquoi rabâches-tu mes lois ?
  - type: text
    content: Tu as mon alliance à la bouche,
  '17':
  - type: text
    content: mais tu détestes l’instruction
  - type: text
    content: et tu rejettes mes paroles ╵au loin, derrière toi.
  '18':
  - type: text
    content: A peine as-tu vu un voleur, ╵tu deviens son complice,
  - type: text
    content: et puis, tu fais cause commune ╵avec les adultères.
  '19':
  - type: text
    content: Ta bouche forge la malice.
  - type: text
    content: Ta langue tisse le mensonge.
  '2':
  - type: text
    content: De Sion, parfaite en beauté,
  - type: text
    content: Dieu resplendit.
  '20':
  - type: text
    content: Lorsque tu t’assieds avec d’autres, ╵tu calomnies ton frère,
  - type: text
    content: et tu jettes le déshonneur ╵sur le fils de ta mère.
  '21':
  - type: text
    content: Lorsque tu agissais ainsi ╵et que je n’ai rien dit,
  - type: text
    content: as-tu vraiment imaginé ╵que je te ressemblais ?
  - type: text
    content: Aussi je vais te corriger, ╵tout mettre sous tes yeux.
  '22':
  - type: text
    content: Comprenez donc cela, ╵vous qui ignorez Dieu,
  - type: text
    content: sinon je vous déchirerai ╵et nul ne vous délivrera.
  '23':
  - type: text
    content: Qui, en guise de sacrifice, ╵m’offre de la reconnaissance, ╵celui-là me rend gloire,
  - type: text
    content: et à celui qui règle son chemin,
  - type: text
    content: je ferai voir ╵le salut que Dieu donne. »
  '3':
  - type: text
    content: Qu’il vienne notre Dieu ! ╵Qu’il ne garde pas le silence !
  - type: text
    content: Devant lui, un feu dévorant,
  - type: text
    content: autour de lui, c’est l’ouragan.
  '4':
  - type: text
    content: Le ciel en haut, il le convoque,
  - type: text
    content: 'et il convoque aussi la terre : ╵il vient pour gouverner son peuple.'
  '5':
  - type: text
    content: « Rassemblez ceux qui me sont attachés,
  - type: text
    content: ceux qui ont conclu avec moi ╵l’alliance par le sacrifice. »
  '6':
  - type: text
    content: Le ciel publiera sa justice,
  - type: text
    content: c’est Dieu qui gouverne le monde.
  - type: text
    content: Pause
  '7':
  - type: text
    content: Mon peuple, écoute, je te parle,
  - type: text
    content: Israël, je témoigne contre toi,
  - type: text
    content: moi qui suis Dieu, ton Dieu.
  '8':
  - type: text
    content: 'Ce n’est pas pour tes sacrifices ╵que je t’adresse des reproches :'
  - type: text
    content: j’ai constamment ╵tes holocaustes sous les yeux.
  '9':
  - type: text
    content: Je ne prendrai ╵ni des taureaux dans ton étable,
  - type: text
    content: ni des boucs dans tes fermes,
