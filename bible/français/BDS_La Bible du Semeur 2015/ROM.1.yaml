document_id: ROM.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cette lettre vous est adressée par Paul, serviteur de Jésus-Christ, qui a été appelé à être apôtre et choisi pour proclamer l’Evangile de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'la Bonne Nouvelle que Dieu avait promise par ses prophètes dans les Saintes Ecritures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elle parle de son Fils qui, dans son humanité, descend de David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et qui a été institué Fils de Dieu avec puissance lorsque le Saint-Esprit l’a ressuscité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et qui a été déclaré Fils de Dieu.
    marker-yv: yv-n
  - type: text
    text: ', Jésus-Christ, notre Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Par lui, j’ai reçu la grâce d’être apôtre pour amener, en son nom, des hommes de tous les peuples à lui obéir en croyant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous êtes de ceux-là, vous que Jésus-Christ a appelés à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je vous écris, à vous tous qui êtes à Rome les bien-aimés de Dieu, et qui ont été appelés à faire partie du peuple saint.
- type: usfm
  marker: p
  children:
  - type: text
    text: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul et les chrétiens de Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tout d’abord, je remercie mon Dieu par Jésus-Christ au sujet de vous tous parce qu’on parle de votre foi dans le monde entier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Dieu m’en est témoin, lui que je sers de tout mon être en proclamant l’Evangile qui concerne son Fils : dans toutes mes prières, je ne cesse de faire mention de vous à toute occasion et je lui demande de me donner enfin l’occasion de vous rendre visite si telle est sa volonté.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car j’ai le vif désir d’aller vous voir pour vous transmettre quelque don de la grâce, par l’Esprit, en vue d’affermir votre foi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ou mieux : pour que, lorsque je serai parmi vous, nous nous encouragions mutuellement, vous et moi, par la foi qui nous est commune.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je tiens à ce que vous le sachiez, frères et sœurs : j’ai souvent formé le projet de me rendre chez vous, afin de récolter quelques fruits parmi vous comme je l’ai fait parmi bien d’autres peuples ; mais j’en ai été empêché jusqu’à présent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je me dois à tous les non-Juifs, civilisés ou non, instruits ou ignorants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà pourquoi je désire aussi vous annoncer l’Evangile, à vous qui êtes à Rome.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le résumé de l’Evangile
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car je n’ai pas honte de l’Evangile : c’est la puissance de Dieu par laquelle il sauve tous ceux qui croient, les Juifs en premier lieu et aussi les non-Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, cet Evangile nous révèle en quoi consiste la justice que Dieu accorde : elle est reçue par la foi et rien que par la foi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle est reçue par la foi et vécue dans la foi, comme il est dit…
    marker-yv: yv-n
  - type: text
    text: ', comme il est dit dans l’Ecriture : '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le juste vivra grâce à la foi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ha 2.4
        metadata:
          usfm: HAB.2.4
      - type: text
        text: '. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui est juste par la foi, vivra.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Tous sont coupables devant Dieu
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ceux qui rejettent Dieu et sa Loi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, du haut du ciel, Dieu révèle sa colère contre les hommes qui ne l’honorent pas et ne respectent pas sa volonté. Ils étouffent ainsi malhonnêtement la vérité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ils étouffent la vérité au profit de leur désobéissance à la Loi de Dieu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, ce qu’on peut connaître de Dieu est clair pour eux, Dieu lui-même le leur ayant fait connaître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Car, depuis la création du monde, les perfections invisibles de Dieu, sa puissance éternelle et sa divinité se voient dans ses œuvres quand on y réfléchit. Ils n’ont donc aucune excuse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: car alors qu’ils connaissent Dieu, ils ne lui rendent pas l’honneur que l’on doit à Dieu et ne lui expriment pas leur reconnaissance. Ils se sont égarés dans des raisonnements absurdes et leur pensée dépourvue d’intelligence s’est trouvée obscurcie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils se prétendent sages, mais ils sont devenus fous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi, au lieu d’adorer le Dieu immortel et glorieux, ils adorent des idoles, images d’hommes mortels, d’oiseaux, de quadrupèdes ou de reptiles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est pourquoi Dieu les a abandonnés aux passions de leur cœur qui les portent à des pratiques dégradantes, de sorte qu’ils ont avili leur propre corps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Oui, ils ont délibérément échangé la vérité concernant Dieu contre le mensonge, ils ont adoré la créature et lui ont rendu un culte, au lieu du Créateur, lui qui est béni éternellement. Amen !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voilà pourquoi Dieu les a abandonnés à des passions avilissantes : leurs femmes ont renoncé aux relations sexuelles naturelles pour se livrer à des pratiques contre nature.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les hommes, de même, délaissant les rapports naturels avec le sexe féminin, se sont enflammés de désir les uns pour les autres ; ils ont commis entre hommes des actes honteux et ont reçu en leur personne le salaire que méritaient leurs égarements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils n’ont pas jugé bon de connaître Dieu, c’est pourquoi Dieu les a abandonnés à leur pensée faussée, si bien qu’ils font ce qu’on ne doit pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils accumulent toutes sortes d’injustices et de méchancetés, d’envies et de vices ; ils sont pleins de jalousie, de meurtres, de querelles, de trahisons, de perversités. Ce sont des médisants, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'des calomniateurs, des ennemis de Dieu, arrogants, orgueilleux, fanfarons, ingénieux à faire le mal ; ils manquent à leurs devoirs envers leurs parents ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ils sont dépourvus d’intelligence et de loyauté, insensibles, impitoyables.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils connaissent très bien la sentence de Dieu qui déclare passibles de mort ceux qui agissent ainsi. Malgré cela, non seulement ils commettent de telles actions, mais encore ils approuvent ceux qui les font.
