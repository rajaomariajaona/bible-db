document_id: ROM.1,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: 'Cette lettre vous est adressée par Paul, serviteur de Jésus-Christ, qui a été appelé à être apôtre et choisi pour proclamer l’Evangile de Dieu, '
  '11':
  - type: text
    content: 'Car j’ai le vif désir d’aller vous voir pour vous transmettre quelque don de la grâce, par l’Esprit, en vue d’affermir votre foi, '
  '12':
  - type: text
    content: 'ou mieux : pour que, lorsque je serai parmi vous, nous nous encouragions mutuellement, vous et moi, par la foi qui nous est commune.'
  '13':
  - type: text
    content: 'Je tiens à ce que vous le sachiez, frères et sœurs : j’ai souvent formé le projet de me rendre chez vous, afin de récolter quelques fruits parmi vous comme je l’ai fait parmi bien d’autres peuples ; mais j’en ai été empêché jusqu’à présent. '
  '14':
  - type: text
    content: 'Je me dois à tous les non-Juifs, civilisés ou non, instruits ou ignorants. '
  '15':
  - type: text
    content: Voilà pourquoi je désire aussi vous annoncer l’Evangile, à vous qui êtes à Rome.
  - type: heading
    content: Le résumé de l’Evangile
  '16':
  - type: text
    content: 'Car je n’ai pas honte de l’Evangile : c’est la puissance de Dieu par laquelle il sauve tous ceux qui croient, les Juifs en premier lieu et aussi les non-Juifs. '
  '17':
  - type: text
    content: 'En effet, cet Evangile nous révèle en quoi consiste la justice que Dieu accorde : elle est reçue par la foi et rien que par la foi'
  - type: note
    content: 'D’autres comprennent : elle est reçue par la foi et vécue dans la foi, comme il est dit…'
  - type: text
    content: ', comme il est dit dans l’Ecriture : '
  - type: text
    content: Le juste vivra grâce à la foi
  - type: note
    content: 'Ha 2.4. Autre traduction : celui qui est juste par la foi, vivra.'
  - type: text
    content: .
  - type: heading
    content: Tous sont coupables devant Dieu
  - type: heading
    content: Ceux qui rejettent Dieu et sa Loi
  '18':
  - type: text
    content: En effet, du haut du ciel, Dieu révèle sa colère contre les hommes qui ne l’honorent pas et ne respectent pas sa volonté. Ils étouffent ainsi malhonnêtement la vérité
  - type: note
    content: 'Autre traduction : Ils étouffent la vérité au profit de leur désobéissance à la Loi de Dieu.'
  - type: text
    content: .
  '19':
  - type: text
    content: 'En effet, ce qu’on peut connaître de Dieu est clair pour eux, Dieu lui-même le leur ayant fait connaître. '
  '2':
  - type: text
    content: 'la Bonne Nouvelle que Dieu avait promise par ses prophètes dans les Saintes Ecritures. '
  '20':
  - type: text
    content: 'Car, depuis la création du monde, les perfections invisibles de Dieu, sa puissance éternelle et sa divinité se voient dans ses œuvres quand on y réfléchit. Ils n’ont donc aucune excuse, '
  '21':
  - type: text
    content: car alors qu’ils connaissent Dieu, ils ne lui rendent pas l’honneur que l’on doit à Dieu et ne lui expriment pas leur reconnaissance. Ils se sont égarés dans des raisonnements absurdes et leur pensée dépourvue d’intelligence s’est trouvée obscurcie.
  '22':
  - type: text
    content: 'Ils se prétendent sages, mais ils sont devenus fous. '
  '23':
  - type: text
    content: 'Ainsi, au lieu d’adorer le Dieu immortel et glorieux, ils adorent des idoles, images d’hommes mortels, d’oiseaux, de quadrupèdes ou de reptiles. '
  '24':
  - type: text
    content: C’est pourquoi Dieu les a abandonnés aux passions de leur cœur qui les portent à des pratiques dégradantes, de sorte qu’ils ont avili leur propre corps.
  '25':
  - type: text
    content: Oui, ils ont délibérément échangé la vérité concernant Dieu contre le mensonge, ils ont adoré la créature et lui ont rendu un culte, au lieu du Créateur, lui qui est béni éternellement. Amen !
  '26':
  - type: text
    content: 'Voilà pourquoi Dieu les a abandonnés à des passions avilissantes : leurs femmes ont renoncé aux relations sexuelles naturelles pour se livrer à des pratiques contre nature.'
  '27':
  - type: text
    content: 'Les hommes, de même, délaissant les rapports naturels avec le sexe féminin, se sont enflammés de désir les uns pour les autres ; ils ont commis entre hommes des actes honteux et ont reçu en leur personne le salaire que méritaient leurs égarements. '
  '28':
  - type: text
    content: Ils n’ont pas jugé bon de connaître Dieu, c’est pourquoi Dieu les a abandonnés à leur pensée faussée, si bien qu’ils font ce qu’on ne doit pas.
  '29':
  - type: text
    content: 'Ils accumulent toutes sortes d’injustices et de méchancetés, d’envies et de vices ; ils sont pleins de jalousie, de meurtres, de querelles, de trahisons, de perversités. Ce sont des médisants, '
  '3':
  - type: text
    content: 'Elle parle de son Fils qui, dans son humanité, descend de David, '
  '30':
  - type: text
    content: 'des calomniateurs, des ennemis de Dieu, arrogants, orgueilleux, fanfarons, ingénieux à faire le mal ; ils manquent à leurs devoirs envers leurs parents ; '
  '31':
  - type: text
    content: ils sont dépourvus d’intelligence et de loyauté, insensibles, impitoyables.
  '32':
  - type: text
    content: Ils connaissent très bien la sentence de Dieu qui déclare passibles de mort ceux qui agissent ainsi. Malgré cela, non seulement ils commettent de telles actions, mais encore ils approuvent ceux qui les font.
  '4':
  - type: text
    content: et qui a été institué Fils de Dieu avec puissance lorsque le Saint-Esprit l’a ressuscité
  - type: note
    content: 'Certains comprennent : et qui a été déclaré Fils de Dieu.'
  - type: text
    content: ', Jésus-Christ, notre Seigneur. '
  '5':
  - type: text
    content: 'Par lui, j’ai reçu la grâce d’être apôtre pour amener, en son nom, des hommes de tous les peuples à lui obéir en croyant. '
  '6':
  - type: text
    content: 'Vous êtes de ceux-là, vous que Jésus-Christ a appelés à lui. '
  '7':
  - type: text
    content: Je vous écris, à vous tous qui êtes à Rome les bien-aimés de Dieu, et qui ont été appelés à faire partie du peuple saint.
  - type: text
    content: Que la grâce et la paix vous soient accordées par Dieu notre Père et par le Seigneur Jésus-Christ.
  - type: heading
    content: Paul et les chrétiens de Rome
  '8':
  - type: text
    content: Tout d’abord, je remercie mon Dieu par Jésus-Christ au sujet de vous tous parce qu’on parle de votre foi dans le monde entier.
  '9':
  - type: text
    content: 'Dieu m’en est témoin, lui que je sers de tout mon être en proclamant l’Evangile qui concerne son Fils : dans toutes mes prières, je ne cesse de faire mention de vous à toute occasion et je lui demande de me donner enfin l’occasion de vous rendre visite si telle est sa volonté.'
