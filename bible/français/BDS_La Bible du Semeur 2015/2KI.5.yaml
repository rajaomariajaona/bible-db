document_id: 2KI.5,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La guérison de Naaman
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naaman, le général en chef de l’armée du roi de Syrie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce roi était sans doute Ben-Hadad II (8.7 ; 13.3 ; voir 1 R 20.1 et note).
      marker-yv: yv-n
    - type: text
      text: ', était un homme que son maître, le roi de Syrie, tenait en haute estime et auquel il accordait toute sa faveur, car, par lui, l’Eternel avait accordé la victoire aux Syriens. Hélas, ce valeureux guerrier était atteint d’une maladie de peau rendant impur'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lv 13.2
        - type: text
          text: '. Versets 1-14 : allusion en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Lc 4.27
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci lui fit dire par un envoyé : Va te laver sept fois dans le Jourdain et tu seras complètement purifié.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman se mit en colère et il s’en alla en disant : Je pensais que cet homme viendrait en personne vers moi, qu’il se tiendrait là pour invoquer l’Eternel, son Dieu, puis qu’il passerait sa main sur la partie malade et me guérirait de ma maladie de la peau. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les fleuves de Damas, l’Amana et le Parpar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou Abana) correspond au Barada actuel venant de l’Anti-Liban et traversant Damas, le « fleuve d’or » des Grecs, célèbre pour la pureté de ses eaux. Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Parpar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jaillit de l’Hermon et se jette dans un lac au sud-est de Damas.
      marker-yv: yv-n
    - type: text
      text: ', ne valent-ils pas mieux que tous les cours d’eau d’Israël ? Ne pourrais-je pas m’y baigner pour être purifié ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit donc demi-tour et partit furieux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ses serviteurs s’approchèrent de lui pour lui dire : Maître, si ce prophète t’avait ordonné quelque chose de difficile, ne le ferais-tu pas ? A plus forte raison devrais-tu faire ce qu’il t’a dit, s’il ne te demande que de te laver dans l’eau, pour être purifié.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Naaman descendit dans le Jourdain et s’y trempa sept fois, comme l’homme de Dieu le lui avait ordonné, et sa chair redevint nette comme celle d’un jeune enfant : il était complètement purifié.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il retourna vers l’homme de Dieu avec toute son escorte. Lorsqu’il fut arrivé, il se présenta à lui en disant : Voici : je reconnais qu’il n’y a pas d’autre Dieu sur toute la terre que celui d’Israël. Maintenant, accepte, je te prie, un cadeau de la part de ton serviteur.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisée répondit : Aussi vrai que l’Eternel que je sers est vivant, je n’accepterai rien.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman insista, mais Elisée persista dans son refus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Naaman dit : Puisque tu refuses tout cadeau, permets-moi du moins d’emporter un peu de terre de ton pays, juste autant que deux mulets peuvent en porter, car dorénavant ton serviteur ne veut plus offrir ni holocauste ni sacrifice de communion à d’autre dieu qu’à l’Eternel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, que l’Eternel veuille me pardonner la chose suivante : quand mon souverain se rend dans le temple du dieu Rimmôn pour s’y prosterner, je dois me prosterner en même temps que lui car il s’appuie sur mon bras. Que l’Eternel pardonne donc ce geste à ton serviteur.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisée lui dit : Va en paix !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Naaman le quitta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La faute et le châtiment de Guéhazi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Naaman eut parcouru une certaine distance, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, au cours d’une incursion dans le territoire d’Israël, des troupes de pillards syriens avaient enlevé une petite fille. A présent, elle était au service de la femme de Naaman. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Guéhazi, le serviteur d’Elisée l’homme de Dieu, se dit : Mon maître a voulu ménager ce Syrien, Naaman, et il l’a laissé partir sans accepter aucun des cadeaux qu’il lui avait apportés. Aussi vrai que l’Eternel est vivant, je vais le rattraper et j’obtiendrai certainement quelque chose de lui.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Guéhazi se mit donc à courir après Naaman. Lorsque celui-ci le vit accourir, il sauta de son char et se précipita vers lui.
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Est-ce que tout va bien, lui demanda-t-il ?
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Oui, tout va bien, répondit Guéhazi. Mon maître m’envoie te dire : « A l’instant, deux jeunes disciples des prophètes viennent d’arriver chez moi de la région montagneuse d’Ephraïm. Peux-tu me donner pour eux trente-cinq kilos d’argent, je te prie, et deux vêtements de rechange ? »'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman lui dit : Fais-moi le plaisir d’accepter soixante-dix kilos d’argent !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il insista auprès de lui pour qu’il accepte et mit lui-même les soixante-dix kilos d’argent dans deux sacs qu’il lui donna. Il lui remit aussi deux vêtements d’apparat que deux de ses serviteurs portèrent devant Guéhazi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Guéhazi fut arrivé à la colline située près de l’entrée de la ville, il prit les objets de leurs mains, les déposa chez lui, et renvoya les deux serviteurs qui s’en allèrent. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il alla lui-même se présenter à son maître. Elisée lui demanda : D’où viens-tu, Guéhazi ?'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit : Ton serviteur n’est allé nulle part.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Elisée lui dit : Crois-tu que mon esprit n’était pas avec toi lorsque cet homme a sauté de son char pour aller à ta rencontre ? Penses-tu que c’est le moment de prendre de l’argent et d’acquérir des vêtements, puis des oliviers, des vignes, des brebis et des bœufs, des serviteurs et des servantes ? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puisque tu as fait cela, la maladie de la peau de Naaman s’attachera à toi et à tes descendants pour toujours.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Guéhazi quitta Elisée ; il y avait sur sa peau des taches blanches comme neige
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’apparition de taches blanches signalait une maladie de peau rendant rituellement impur (cf. Ex 4.6 ; Lv 13.3 ; Nb 12.10).
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, elle dit à sa maîtresse : Si seulement mon maître pouvait aller auprès du prophète qui habite à Samarie ! Cet homme le guérirait de sa maladie.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman répéta au roi les propos de la jeune fille du pays d’Israël. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi de Syrie lui dit : C’est bien ! Rends-toi là-bas. Je vais te donner une lettre pour le roi d’Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yoram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 1.17 ; 3.1 ; 9.24). Les troubles frontaliers n’avaient pas anéanti la paix officielle établie par traité entre les deux royaumes.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi Naaman se mit en route, emportant trois cent cinquante kilos d’argent, soixante-dix kilos d’or et dix vêtements de rechange. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivé à Samarie, il remit au roi d’Israël la lettre dans laquelle il était dit : « Tu recevras ce message par l’intermédiaire de mon général Naaman que je t’envoie pour que tu le guérisses de sa maladie de la peau. »'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand le roi d’Israël eut pris connaissance du contenu de cette lettre, il déchira ses vêtements
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En signe de consternation.
      marker-yv: yv-n
    - type: text
      text: ' et s’écria : Est-ce que je suis Dieu, moi ? Est-ce que je suis le maître de la vie et de la mort pour que cet homme me demande de guérir quelqu’un de sa maladie de la peau ? Reconnaissez donc et voyez qu’il me cherche querelle.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Elisée, l’homme de Dieu, apprit que le roi d’Israël avait déchiré ses vêtements, il lui fit dire : Pourquoi as-tu déchiré tes vêtements ? Que cet homme vienne donc me voir et il saura qu’il y a un prophète en Israël.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman vint donc avec ses chevaux et son char, et attendit devant la porte de la maison d’Elisée. '
