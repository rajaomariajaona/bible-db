  - type: text
    text: Mets ton espoir en Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans plusieurs manuscrits hébreux, les '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 42
        metadata:
          usfm: PSA.42
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43'
        metadata:
          usfm: PSA.43
      - type: text
        text: ' constituent un seul psaume.'
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fais-moi justice, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prends en main ma cause ╵contre un peuple d’impies !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve-moi de ces gens ╵menteurs et criminels !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, tu es ma forteresse, ╵pourquoi donc me rejettes-tu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pourquoi me faut-il ╵vivre dans la tristesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: subissant l’oppression ╵de l’ennemi ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fais-moi voir ta lumière, ╵avec ta vérité
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu’elles me conduisent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’elles soient mes guides ╵vers ta montagne sainte ╵jusque dans ta demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors j’avancerai ╵jusqu’à l’autel de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers toi, Dieu de ma joie ╵et de mon allégresse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Alors je te louerai ╵en m’accompagnant de la lyre. ╵O Dieu : tu es mon Dieu !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pourquoi donc, ô mon âme, ╵es-tu si abattue ╵et gémis-tu sur moi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mets ton espoir en Dieu ! ╵Je le louerai encore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Sauveur et mon Dieu.
