document_id: NUM.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La célébration de la Pâque
  - type: heading
    content: Célébration
  - type: text
    content: Le premier mois de la deuxième année après la sortie d’Egypte
  - type: note
    content: Cette directive fut donnée avant les événements racontés au début de ce livre (voir 1.1-2). Elle est mentionnée pour introduire les v. 6-14.
  - type: text
    content: ', l’Eternel s’adressa à Moïse dans le désert du Sinaï. Il lui dit : '
  '10':
  - type: text
    content: 'Dis aux Israélites : Si quelqu’un d’entre vous – maintenant ou dans les générations à venir – se trouve en état d’impureté rituelle par son contact avec un mort, ou s’il est en voyage au loin, il pourra quand même célébrer la Pâque en l’honneur de l’Eternel'
  - type: note
    content: La purification après le contact avec un mort exigeait sept jours (19.11).
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'C’est le soir du quatorzième jour du second mois qu’ils la célébreront, à la nuit tombante, en mangeant l’agneau avec des pains sans levain et des herbes amères. '
  '12':
  - type: text
    content: Ils n’en laisseront rien jusqu’au matin et n’en briseront aucun os. Ils se conformeront à toutes les ordonnances relatives à la Pâque
  - type: note
    content: Voir Ex 12.46 ; Jn 19.36.
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Mais si quelqu’un qui est rituellement pur et qui n’est pas en voyage néglige de célébrer la Pâque, il sera retranché de la communauté de son peuple : il portera la responsabilité de sa faute parce qu’il n’a pas présenté l’offrande à l’Eternel à la date fixée. '
  '14':
  - type: text
    content: Si un étranger installé chez vous veut célébrer la Pâque de l’Eternel, il se conformera au rituel de la Pâque et aux ordonnances qui s’y rapportent. Il y aura un seul et même rituel pour l’immigré et pour l’autochtone.
  - type: heading
    content: 'La nuée : signe de la présence de Dieu'
  '15':
  - type: text
    content: Le jour où l’on érigea le tabernacle, qui sert de tente aux tablettes de l’acte de l’alliance, la nuée
  - type: note
    content: Voir Ex 13.21.
  - type: text
    content: ' le couvrit ; le soir, cette nuée au-dessus du tabernacle devint comme du feu et resta là jusqu’au matin. '
  '16':
  - type: text
    content: 'Il en fut continuellement ainsi : le jour, la nuée couvrait le tabernacle, et pendant la nuit, elle avait l’apparence d’un feu. '
  '17':
  - type: text
    content: 'Chaque fois que la nuée s’élevait au-dessus de la tente, les Israélites levaient le camp ; et là où elle s’arrêtait, ils dressaient leurs campements. '
  '18':
  - type: text
    content: 'Ainsi, c’est au signal de l’Eternel que les Israélites levaient le camp et à son signal qu’ils le réinstallaient. Aussi longtemps que la nuée restait sur le tabernacle, ils ne bougeaient pas de l’endroit. '
  '19':
  - type: text
    content: 'Même si elle s’attardait longtemps sur le tabernacle, ils observaient fidèlement les indications de l’Eternel et ne partaient pas. '
  '2':
  - type: text
    content: 'Que les Israélites célèbrent la Pâque à la date fixée, '
  '20':
  - type: text
    content: 'Parfois la nuée ne s’arrêtait que quelques jours sur le tabernacle ; c’était toujours au signal de l’Eternel qu’ils dressaient le camp, et qu’ils le levaient. '
  '21':
  - type: text
    content: 'Il arrivait même qu’elle ne s’arrête que durant une nuit : lorsqu’elle s’élevait le matin, ils levaient le camp ; ou bien elle s’élevait après un jour et une nuit, aussitôt ils partaient. '
  '22':
  - type: text
    content: 'Qu’elle demeure deux jours ou un mois ou plus longtemps encore sur le tabernacle, les Israélites restaient campés sans partir ; ils levaient seulement le camp lorsqu’elle s’élevait. '
  '23':
  - type: text
    content: C’est sur l’ordre de l’Eternel qu’ils dressaient le camp et le levaient. Ainsi ils observaient ce que l’Eternel indiquait, conformément aux instructions qu’il leur avait données par l’intermédiaire de Moïse.
  '3':
  - type: text
    content: c’est-à-dire le soir du quatorzième jour de ce mois à la nuit tombante ; vous la célébrerez en vous conformant exactement à toutes les ordonnances et les lois qui la concernent.
  '4':
  - type: text
    content: 'Moïse demanda donc aux Israélites de célébrer la Pâque, '
  '5':
  - type: text
    content: et ils la célébrèrent dans le désert du Sinaï le soir du quatorzième jour du premier mois à la nuit tombante, en se conformant à tout ce que l’Eternel avait ordonné à Moïse
  - type: note
    content: Voir Ex 12.1-13.
  - type: text
    content: .
  - type: heading
    content: Les personnes en état d’impureté rituelle
  '6':
  - type: text
    content: 'Or, il arriva que des hommes qui s’étaient rendus rituellement impurs par le contact avec un mort, ne purent célébrer la Pâque ce jour-là. Ils allèrent trouver Moïse et Aaron ce même jour '
  '7':
  - type: text
    content: 'et leur dirent : Nous sommes en état d’impureté rituelle parce que nous avons été en contact avec un mort, pourquoi n’avons-nous pas le droit d’apporter notre offrande à l’Eternel à la date fixée, avec les autres Israélites ?'
  '8':
  - type: text
    content: 'Moïse leur répondit : Attendez là pendant que j’écouterai ce que l’Eternel ordonne à votre sujet.'
  '9':
  - type: text
    content: 'L’Eternel dit à Moïse : '
