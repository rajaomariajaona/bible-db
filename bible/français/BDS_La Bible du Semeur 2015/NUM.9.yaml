document_id: NUM.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La célébration de la Pâque
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Célébration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le premier mois de la deuxième année après la sortie d’Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette directive fut donnée avant les événements racontés au début de ce livre (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1.1-2
        metadata:
          usfm: NUM.1.1+NUM.1.2
      - type: text
        text: ). Elle est mentionnée pour introduire les v. 6-14.
    marker-yv: yv-n
  - type: text
    text: ', l’Eternel s’adressa à Moïse dans le désert du Sinaï. Il lui dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Que les Israélites célèbrent la Pâque à la date fixée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: c’est-à-dire le soir du quatorzième jour de ce mois à la nuit tombante ; vous la célébrerez en vous conformant exactement à toutes les ordonnances et les lois qui la concernent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse demanda donc aux Israélites de célébrer la Pâque, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et ils la célébrèrent dans le désert du Sinaï le soir du quatorzième jour du premier mois à la nuit tombante, en se conformant à tout ce que l’Eternel avait ordonné à Moïse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.1-13
        metadata:
          usfm: EXO.12.1+EXO.12.2+EXO.12.3+EXO.12.4+EXO.12.5+EXO.12.6+EXO.12.7+EXO.12.8+EXO.12.9+EXO.12.10+EXO.12.11+EXO.12.12+EXO.12.13
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s2
  children:
  - type: text
    text: Les personnes en état d’impureté rituelle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, il arriva que des hommes qui s’étaient rendus rituellement impurs par le contact avec un mort, ne purent célébrer la Pâque ce jour-là. Ils allèrent trouver Moïse et Aaron ce même jour '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et leur dirent : Nous sommes en état d’impureté rituelle parce que nous avons été en contact avec un mort, pourquoi n’avons-nous pas le droit d’apporter notre offrande à l’Eternel à la date fixée, avec les autres Israélites ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse leur répondit : Attendez là pendant que j’écouterai ce que l’Eternel ordonne à votre sujet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Eternel dit à Moïse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dis aux Israélites : Si quelqu’un d’entre vous – maintenant ou dans les générations à venir – se trouve en état d’impureté rituelle par son contact avec un mort, ou s’il est en voyage au loin, il pourra quand même célébrer la Pâque en l’honneur de l’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La purification après le contact avec un mort exigeait sept jours (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19.11'
        metadata:
          usfm: NUM.19.11
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est le soir du quatorzième jour du second mois qu’ils la célébreront, à la nuit tombante, en mangeant l’agneau avec des pains sans levain et des herbes amères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils n’en laisseront rien jusqu’au matin et n’en briseront aucun os. Ils se conformeront à toutes les ordonnances relatives à la Pâque
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 12.46 ; Jn 19.36.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais si quelqu’un qui est rituellement pur et qui n’est pas en voyage néglige de célébrer la Pâque, il sera retranché de la communauté de son peuple : il portera la responsabilité de sa faute parce qu’il n’a pas présenté l’offrande à l’Eternel à la date fixée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si un étranger installé chez vous veut célébrer la Pâque de l’Eternel, il se conformera au rituel de la Pâque et aux ordonnances qui s’y rapportent. Il y aura un seul et même rituel pour l’immigré et pour l’autochtone.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'La nuée : signe de la présence de Dieu'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le jour où l’on érigea le tabernacle, qui sert de tente aux tablettes de l’acte de l’alliance, la nuée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13.21
        metadata:
          usfm: EXO.13.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' le couvrit ; le soir, cette nuée au-dessus du tabernacle devint comme du feu et resta là jusqu’au matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il en fut continuellement ainsi : le jour, la nuée couvrait le tabernacle, et pendant la nuit, elle avait l’apparence d’un feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Chaque fois que la nuée s’élevait au-dessus de la tente, les Israélites levaient le camp ; et là où elle s’arrêtait, ils dressaient leurs campements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ainsi, c’est au signal de l’Eternel que les Israélites levaient le camp et à son signal qu’ils le réinstallaient. Aussi longtemps que la nuée restait sur le tabernacle, ils ne bougeaient pas de l’endroit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Même si elle s’attardait longtemps sur le tabernacle, ils observaient fidèlement les indications de l’Eternel et ne partaient pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Parfois la nuée ne s’arrêtait que quelques jours sur le tabernacle ; c’était toujours au signal de l’Eternel qu’ils dressaient le camp, et qu’ils le levaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il arrivait même qu’elle ne s’arrête que durant une nuit : lorsqu’elle s’élevait le matin, ils levaient le camp ; ou bien elle s’élevait après un jour et une nuit, aussitôt ils partaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Qu’elle demeure deux jours ou un mois ou plus longtemps encore sur le tabernacle, les Israélites restaient campés sans partir ; ils levaient seulement le camp lorsqu’elle s’élevait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C’est sur l’ordre de l’Eternel qu’ils dressaient le camp et le levaient. Ainsi ils observaient ce que l’Eternel indiquait, conformément aux instructions qu’il leur avait données par l’intermédiaire de Moïse.
