document_id: 2CH.22,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahazia, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 8.25-29)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les habitants de Jérusalem proclamèrent roi son plus jeune fils Ahazia pour lui succéder, car la horde qui avait pénétré dans le camp des Judéens avec les Arabes avait assassiné tous les aînés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 21.16-17
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. C’est ainsi que commença le règne d’Ahazia, fils de Yoram, roi de Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Athalie, la mère d’Ahazia, vit que son fils était mort, elle entreprit de faire mourir toute la descendance royale de Juda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais au moment du massacre, Yehoshabeath, une fille de roi, parvint à soustraire Joas, un fils d’Ahazia, du milieu de ses frères, pour l’installer avec sa nourrice dans le dortoir du Temple. Yehoshabeath, qui était une fille du roi Yoram, la femme du prêtre Yehoyada, et la sœur d’Ahazia, cacha ainsi Joas d’Athalie, dans le dortoir du Temple, et on ne le fit pas mourir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant six ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: De 841 à 835 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', il resta caché avec les deux femmes dans le Temple, tandis qu’Athalie régnait sur le pays.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il était âgé de vingt-deux ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après certains manuscrits de l’ancienne version grecque et la version syriaque (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 8.26
        - type: text
          text: ') ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quarante-deux, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ce qu’exclut l’âge auquel est décédé le père de Yoram (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 Ch 21.20
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' à son avènement et il régna un an à Jérusalem'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 841 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: . Sa mère s’appelait Athalie, elle était une petite-fille d’Omri
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Athalie était une fille d’Achab, le fils d’Omri, fondateur de la nouvelle dynastie du royaume du Nord (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 16.23-27
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lui aussi suivit l’exemple de la dynastie d’Achab, car sa mère l’incitait au mal par ses conseils. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce que l’Eternel considère comme mal, comme la maison d’Achab, car, après la mort de son père, ces gens furent ses conseillers et l’entraînèrent vers sa perte. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sur leur conseil, il partit avec Yoram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A ne pas confondre avec Yoram, roi de Juda, père d’Ahazia.
      marker-yv: yv-n
    - type: text
      text: ', fils d’Achab, roi d’Israël, pour une expédition militaire contre Hazaël, roi de Syrie, à Ramoth en Galaad. Yoram fut blessé par les Syriens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors, il retourna à Jizréel pour se faire soigner des blessures qui lui avaient été infligées à Rama pendant le combat contre Hazaël, roi de Syrie. Ahazia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’après certains manuscrits hébreux, l’ancienne version grecque, la version syriaque et la Vulgate (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 8.29
        - type: text
          text: ') ; le texte hébreu traditionnel a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Azaria '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 R 15.1-7
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', fils de Yoram, roi de Juda, y alla pour lui rendre visite au cours de sa maladie.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 9.21-29)
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu fit en sorte qu’ait lieu cette visite qui fut fatale pour Ahazia. En effet, dès son arrivée, il sortit avec Yoram pour aller à la rencontre de Jéhu, fils de Nimshi, à qui l’Eternel avait conféré l’onction pour exterminer la famille d’Achab. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme Jéhu exécutait le jugement sur la famille d’Achab, il surprit les dirigeants de Juda et les neveux d’Ahazia attachés au service de leur oncle et il les tua. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il se mit à la recherche d’Ahazia. On le captura dans Samarie où il s’était caché et on l’amena auprès de Jéhu qui le fit mourir. Puis on l’enterra, par égard pour son grand-père Josaphat qui s’était attaché de tout son cœur à l’Eternel. Dès lors, il ne restait plus personne de la famille d’Ahazia qui fût en état de régner.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joas échappe au massacre des princes de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 R 11.1-20)
    marker-yv: yv-h
