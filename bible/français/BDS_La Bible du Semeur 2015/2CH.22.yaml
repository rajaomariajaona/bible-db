document_id: 2CH.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Ahazia, roi de Juda
  - type: heading
    content: (2 R 8.25-29)
  - type: text
    content: Les habitants de Jérusalem proclamèrent roi son plus jeune fils Ahazia pour lui succéder, car la horde qui avait pénétré dans le camp des Judéens avec les Arabes avait assassiné tous les aînés
  - type: note
    content: Voir 21.16-17.
  - type: text
    content: '. C’est ainsi que commença le règne d’Ahazia, fils de Yoram, roi de Juda. '
  '10':
  - type: text
    content: 'Lorsque Athalie, la mère d’Ahazia, vit que son fils était mort, elle entreprit de faire mourir toute la descendance royale de Juda. '
  '11':
  - type: text
    content: 'Mais au moment du massacre, Yehoshabeath, une fille de roi, parvint à soustraire Joas, un fils d’Ahazia, du milieu de ses frères, pour l’installer avec sa nourrice dans le dortoir du Temple. Yehoshabeath, qui était une fille du roi Yoram, la femme du prêtre Yehoyada, et la sœur d’Ahazia, cacha ainsi Joas d’Athalie, dans le dortoir du Temple, et on ne le fit pas mourir. '
  '12':
  - type: text
    content: Pendant six ans
  - type: note
    content: De 841 à 835 av. J.-C.
  - type: text
    content: ', il resta caché avec les deux femmes dans le Temple, tandis qu’Athalie régnait sur le pays.'
  '2':
  - type: text
    content: Il était âgé de vingt-deux ans
  - type: note
    content: 'D’après certains manuscrits de l’ancienne version grecque et la version syriaque (voir 2 R 8.26) ; le texte hébreu traditionnel a : quarante-deux, ce qu’exclut l’âge auquel est décédé le père de Yoram (2 Ch 21.20).'
  - type: text
    content: ' à son avènement et il régna un an à Jérusalem'
  - type: note
    content: En 841 av. J.-C.
  - type: text
    content: . Sa mère s’appelait Athalie, elle était une petite-fille d’Omri
  - type: note
    content: Athalie était une fille d’Achab, le fils d’Omri, fondateur de la nouvelle dynastie du royaume du Nord (1 R 16.23-27).
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Lui aussi suivit l’exemple de la dynastie d’Achab, car sa mère l’incitait au mal par ses conseils. '
  '4':
  - type: text
    content: 'Il fit ce que l’Eternel considère comme mal, comme la maison d’Achab, car, après la mort de son père, ces gens furent ses conseillers et l’entraînèrent vers sa perte. '
  '5':
  - type: text
    content: Sur leur conseil, il partit avec Yoram
  - type: note
    content: A ne pas confondre avec Yoram, roi de Juda, père d’Ahazia.
  - type: text
    content: ', fils d’Achab, roi d’Israël, pour une expédition militaire contre Hazaël, roi de Syrie, à Ramoth en Galaad. Yoram fut blessé par les Syriens. '
  '6':
  - type: text
    content: Alors, il retourna à Jizréel pour se faire soigner des blessures qui lui avaient été infligées à Rama pendant le combat contre Hazaël, roi de Syrie. Ahazia
  - type: note
    content: 'D’après certains manuscrits hébreux, l’ancienne version grecque, la version syriaque et la Vulgate (voir 2 R 8.29) ; le texte hébreu traditionnel a : Azaria (cf. 2 R 15.1-7).'
  - type: text
    content: ', fils de Yoram, roi de Juda, y alla pour lui rendre visite au cours de sa maladie.'
  - type: heading
    content: (2 R 9.21-29)
  '7':
  - type: text
    content: 'Dieu fit en sorte qu’ait lieu cette visite qui fut fatale pour Ahazia. En effet, dès son arrivée, il sortit avec Yoram pour aller à la rencontre de Jéhu, fils de Nimshi, à qui l’Eternel avait conféré l’onction pour exterminer la famille d’Achab. '
  '8':
  - type: text
    content: 'Comme Jéhu exécutait le jugement sur la famille d’Achab, il surprit les dirigeants de Juda et les neveux d’Ahazia attachés au service de leur oncle et il les tua. '
  '9':
  - type: text
    content: Puis il se mit à la recherche d’Ahazia. On le captura dans Samarie où il s’était caché et on l’amena auprès de Jéhu qui le fit mourir. Puis on l’enterra, par égard pour son grand-père Josaphat qui s’était attaché de tout son cœur à l’Eternel. Dès lors, il ne restait plus personne de la famille d’Ahazia qui fût en état de régner.
  - type: heading
    content: Joas échappe au massacre des princes de Juda
  - type: heading
    content: (2 R 11.1-20)
