document_id: ISA.43,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un seul Sauveur pour Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, l’Eternel ╵qui t’a créé, ╵ô peuple de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui t’a façonné, ╵ô Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'te déclare ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sois pas effrayé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je t’ai délivré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t’ai appelé par ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es à moi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais mes témoins, c’est vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: votre peuple est le serviteur, ╵que je me suis choisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que vous le sachiez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que vous croyiez en moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous compreniez ╵que moi seul, je suis Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant moi aucun dieu ╵ne fut jamais formé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et après moi, jamais ╵il n’en existera.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je suis l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, en dehors de moi, ╵il n’est pas de Sauveur.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi qui ai prédit, ╵c’est moi qui ai sauvé, ╵je me suis fait entendre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pas un dieu étranger ╵ne l’a fait parmi vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous, déclare l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous êtes mes témoins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c’est moi qui suis Dieu.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je le suis depuis toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne ne peut ╵délivrer de ma main.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que je réalise, ╵qui pourrait l’annuler ?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu intervient
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici ce que déclare l’Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'votre Libérateur, ╵moi le Saint d’Israël :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à cause de vous ╵que j’envoie une armée ╵combattre Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je fais descendre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et que je fais descendre
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: ' ╵tous les Chaldéens qui s’enfuient'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les navires mêmes ╵où ils criaient de joie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Eternel, ╵je suis votre Dieu saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Créateur d’Israël, votre Roi.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un chemin à travers le désert
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi dit l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui, à travers la mer, ╵a ouvert un chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans les grosses eaux, ╵a frayé un sentier
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Allusion à la traversée de la mer des Roseaux où les chars et les cavaliers du pharaon furent détruits quand Dieu a combattu contre eux (voir 51.10 ; Ex 14.28 ; 15.4).
      marker-yv: yv-n
    - type: text
      text: ','
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fit sortir ╵les chars et les chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’armée et ses guerriers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont tous couchés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne se relèveront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se sont consumés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se sont éteints ╵comme la mèche d’une lampe.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne vous rappelez plus ╵les événements du passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne considérez plus ╵les choses d’autrefois ;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais réaliser ╵une chose nouvelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle germe dès à présent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne la reconnaîtrez-vous pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ouvrirai un chemin ╵à travers le désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai jaillir ╵des fleuves dans la steppe ;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu passeras par les eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je serai avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu traverseras les fleuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne te submergeront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu marcheras dans le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne te fera pas de mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par les flammes tu ne seras pas brûlé,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les animaux sauvages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les chacals, les autruches, ╵célébreront ma gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je ferai jaillir ╵de l’eau dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des fleuves dans la steppe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour abreuver mon peuple, ╵celui que j’ai élu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je l’ai formé pour moi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il proclamera ma louange.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu accuse
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pourtant, ô Jacob, ╵tu n’as pas fait appel à moi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’es lassé de moi, ╵ô Israël !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne m’as pas offert ╵d’agneaux en holocaustes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes sacrifices ╵n’étaient pas à ma gloire ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne t’ai pas importuné ╵pour avoir des offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne t’ai pas lassé ╵pour avoir de l’encens.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as pas dépensé d’argent pour moi, ╵pour du roseau aromatique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu ne m’as pas rassasié ╵de la graisse des sacrifices.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu m’as importuné ╵par tes péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m’as lassé ╵par tes forfaits !
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu pardonne
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est moi, et moi seul, ╵qui efface tes transgressions ╵par égard pour moi-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne tiendrai plus compte ╵de tes péchés.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rappelle-moi ce qu’il en est, ╵entrons ensemble en jugement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, pour te justifier, ╵expose donc ton cas.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déjà, ton premier père
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob très certainement (voir Gn 25.26 ; 27.36 ; Os 12.4).
      marker-yv: yv-n
    - type: text
      text: ' ╵a péché envers moi'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux des tiens qui ont la charge ╵d’interpréter la Loi ╵m’ont été infidèles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi ai-je déshonoré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les chefs du sanctuaire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’ai livré Jacob ╵à l’extermination,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël aux outrages.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque moi, l’Eternel, ╵je suis ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Saint d’Israël, ton Sauveur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je donnerai l’Egypte ╵comme rançon pour toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Ethiopie et Seba ╵en échange de toi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, parce que tu m’es précieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu as du prix pour moi, ╵et que je t’aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je donnerai des hommes ╵en échange de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des peuples contre ta vie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois donc sans crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai revenir ╵tes enfants de l’orient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te rassemblerai ╵de l’occident.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dirai au septentrion : ╵« Rends-les ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et au midi : ╵« Ne les retiens donc pas !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais revenir mes fils ╵des pays éloignés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais revenir mes filles ╵des confins de la terre,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, tous ceux qui portent mon nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que j’ai créés pour ma gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j’ai formés, oui, que j’ai faits !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laisse sortir le peuple ╵qui est aveugle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout en ayant des yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui est sourd
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien qu’il ait des oreilles ! »
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un peuple de témoins
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toutes les nations s’assemblent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les peuples se regroupent !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui, parmi eux, ╵avait prédit ces choses ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui avait annoncé ╵les événements antérieurs ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils citent leurs témoins ╵et qu’ils se justifient !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’on les écoute bien ╵afin de pouvoir dire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Oui, c’est la vérité ! »
