document_id: ISA.43,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un seul Sauveur pour Israël
  - type: text
    content: Maintenant, l’Eternel ╵qui t’a créé, ╵ô peuple de Jacob,
  - type: text
    content: et qui t’a façonné, ╵ô Israël,
  - type: text
    content: 'te déclare ceci :'
  - type: text
    content: Ne sois pas effrayé
  - type: text
    content: car je t’ai délivré,
  - type: text
    content: je t’ai appelé par ton nom,
  - type: text
    content: tu es à moi.
  '10':
  - type: text
    content: Mais mes témoins, c’est vous,
  - type: text
    content: déclare l’Eternel,
  - type: text
    content: votre peuple est le serviteur, ╵que je me suis choisi,
  - type: text
    content: pour que vous le sachiez,
  - type: text
    content: que vous croyiez en moi
  - type: text
    content: et que vous compreniez ╵que moi seul, je suis Dieu.
  - type: text
    content: Avant moi aucun dieu ╵ne fut jamais formé,
  - type: text
    content: et après moi, jamais ╵il n’en existera.
  '11':
  - type: text
    content: Moi, je suis l’Eternel
  - type: text
    content: et, en dehors de moi, ╵il n’est pas de Sauveur.
  '12':
  - type: text
    content: C’est moi qui ai prédit, ╵c’est moi qui ai sauvé, ╵je me suis fait entendre.
  - type: text
    content: Pas un dieu étranger ╵ne l’a fait parmi vous,
  - type: text
    content: et vous, déclare l’Eternel,
  - type: text
    content: vous êtes mes témoins,
  - type: text
    content: et c’est moi qui suis Dieu.
  '13':
  - type: text
    content: Oui, je le suis depuis toujours
  - type: text
    content: et personne ne peut ╵délivrer de ma main.
  - type: text
    content: Ce que je réalise, ╵qui pourrait l’annuler ?
  - type: heading
    content: Dieu intervient
  '14':
  - type: text
    content: Voici ce que déclare l’Eternel
  - type: text
    content: 'votre Libérateur, ╵moi le Saint d’Israël :'
  - type: text
    content: C’est à cause de vous ╵que j’envoie une armée ╵combattre Babylone,
  - type: text
    content: et que je fais descendre
  - type: note
    content: 'et que je fais descendre: traduction incertaine.'
  - type: text
    content: ' ╵tous les Chaldéens qui s’enfuient'
  - type: text
    content: sur les navires mêmes ╵où ils criaient de joie.
  '15':
  - type: text
    content: Moi, l’Eternel, ╵je suis votre Dieu saint,
  - type: text
    content: le Créateur d’Israël, votre Roi.
  - type: heading
    content: Un chemin à travers le désert
  '16':
  - type: text
    content: Ainsi dit l’Eternel,
  - type: text
    content: qui, à travers la mer, ╵a ouvert un chemin
  - type: text
    content: et, dans les grosses eaux, ╵a frayé un sentier
  - type: note
    content: Allusion à la traversée de la mer des Roseaux où les chars et les cavaliers du pharaon furent détruits quand Dieu a combattu contre eux (voir 51.10 ; Ex 14.28 ; 15.4).
  - type: text
    content: ','
  '17':
  - type: text
    content: qui fit sortir ╵les chars et les chevaux,
  - type: text
    content: l’armée et ses guerriers.
  - type: text
    content: Ils se sont tous couchés
  - type: text
    content: et ne se relèveront pas,
  - type: text
    content: ils se sont consumés
  - type: text
    content: et ils se sont éteints ╵comme la mèche d’une lampe.
  '18':
  - type: text
    content: Ne vous rappelez plus ╵les événements du passé,
  - type: text
    content: ne considérez plus ╵les choses d’autrefois ;
  '19':
  - type: text
    content: je vais réaliser ╵une chose nouvelle,
  - type: text
    content: elle germe dès à présent,
  - type: text
    content: ne la reconnaîtrez-vous pas ?
  - type: text
    content: J’ouvrirai un chemin ╵à travers le désert
  - type: text
    content: et je ferai jaillir ╵des fleuves dans la steppe ;
  '2':
  - type: text
    content: Quand tu passeras par les eaux,
  - type: text
    content: je serai avec toi,
  - type: text
    content: quand tu traverseras les fleuves,
  - type: text
    content: ils ne te submergeront pas,
  - type: text
    content: quand tu marcheras dans le feu,
  - type: text
    content: il ne te fera pas de mal
  - type: text
    content: et par les flammes tu ne seras pas brûlé,
  '20':
  - type: text
    content: les animaux sauvages,
  - type: text
    content: les chacals, les autruches, ╵célébreront ma gloire,
  - type: text
    content: car je ferai jaillir ╵de l’eau dans le désert,
  - type: text
    content: des fleuves dans la steppe,
  - type: text
    content: pour abreuver mon peuple, ╵celui que j’ai élu.
  '21':
  - type: text
    content: 'Je l’ai formé pour moi :'
  - type: text
    content: il proclamera ma louange.
  - type: heading
    content: Dieu accuse
  '22':
  - type: text
    content: Et pourtant, ô Jacob, ╵tu n’as pas fait appel à moi !
  - type: text
    content: Tu t’es lassé de moi, ╵ô Israël !
  '23':
  - type: text
    content: Tu ne m’as pas offert ╵d’agneaux en holocaustes,
  - type: text
    content: tes sacrifices ╵n’étaient pas à ma gloire ;
  - type: text
    content: je ne t’ai pas importuné ╵pour avoir des offrandes,
  - type: text
    content: je ne t’ai pas lassé ╵pour avoir de l’encens.
  '24':
  - type: text
    content: Tu n’as pas dépensé d’argent pour moi, ╵pour du roseau aromatique,
  - type: text
    content: et tu ne m’as pas rassasié ╵de la graisse des sacrifices.
  - type: text
    content: Mais toi, tu m’as importuné ╵par tes péchés,
  - type: text
    content: tu m’as lassé ╵par tes forfaits !
  - type: heading
    content: Dieu pardonne
  '25':
  - type: text
    content: Mais c’est moi, et moi seul, ╵qui efface tes transgressions ╵par égard pour moi-même,
  - type: text
    content: je ne tiendrai plus compte ╵de tes péchés.
  '26':
  - type: text
    content: Rappelle-moi ce qu’il en est, ╵entrons ensemble en jugement
  - type: text
    content: et, pour te justifier, ╵expose donc ton cas.
  '27':
  - type: text
    content: Déjà, ton premier père
  - type: note
    content: Jacob très certainement (voir Gn 25.26 ; 27.36 ; Os 12.4).
  - type: text
    content: ' ╵a péché envers moi'
  - type: text
    content: et ceux des tiens qui ont la charge ╵d’interpréter la Loi ╵m’ont été infidèles.
  '28':
  - type: text
    content: Aussi ai-je déshonoré
  - type: text
    content: les chefs du sanctuaire
  - type: text
    content: et j’ai livré Jacob ╵à l’extermination,
  - type: text
    content: Israël aux outrages.
  '3':
  - type: text
    content: puisque moi, l’Eternel, ╵je suis ton Dieu,
  - type: text
    content: le Saint d’Israël, ton Sauveur.
  - type: text
    content: Je donnerai l’Egypte ╵comme rançon pour toi,
  - type: text
    content: l’Ethiopie et Seba ╵en échange de toi.
  '4':
  - type: text
    content: Oui, parce que tu m’es précieux,
  - type: text
    content: et que tu as du prix pour moi, ╵et que je t’aime,
  - type: text
    content: je donnerai des hommes ╵en échange de toi,
  - type: text
    content: et des peuples contre ta vie.
  '5':
  - type: text
    content: Sois donc sans crainte,
  - type: text
    content: car je suis avec toi,
  - type: text
    content: je ferai revenir ╵tes enfants de l’orient
  - type: text
    content: je te rassemblerai ╵de l’occident.
  '6':
  - type: text
    content: 'Je dirai au septentrion : ╵« Rends-les ! »'
  - type: text
    content: 'Et au midi : ╵« Ne les retiens donc pas !'
  - type: text
    content: Fais revenir mes fils ╵des pays éloignés,
  - type: text
    content: fais revenir mes filles ╵des confins de la terre,
  '7':
  - type: text
    content: oui, tous ceux qui portent mon nom
  - type: text
    content: et que j’ai créés pour ma gloire,
  - type: text
    content: que j’ai formés, oui, que j’ai faits !
  '8':
  - type: text
    content: Laisse sortir le peuple ╵qui est aveugle
  - type: text
    content: tout en ayant des yeux,
  - type: text
    content: et qui est sourd
  - type: text
    content: bien qu’il ait des oreilles ! »
  - type: heading
    content: Un peuple de témoins
  '9':
  - type: text
    content: Que toutes les nations s’assemblent
  - type: text
    content: et que les peuples se regroupent !
  - type: text
    content: Qui, parmi eux, ╵avait prédit ces choses ?
  - type: text
    content: Qui avait annoncé ╵les événements antérieurs ?
  - type: text
    content: Qu’ils citent leurs témoins ╵et qu’ils se justifient !
  - type: text
    content: 'Qu’on les écoute bien ╵afin de pouvoir dire :'
  - type: text
    content: « Oui, c’est la vérité ! »
