    content: Prendre parti pour Jésus
  - type: heading
    content: (Mt 10.26-33 ; 10.19-20)
  - type: text
    content: 'Pendant ce temps, des milliers de gens s’étaient rassemblés, au point qu’ils se marchaient sur les pieds les uns les autres. Jésus commença par s’adresser à ses disciples : '
  - type: text
    content: Gardez-vous,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: 'de ce '
  - type: text
    content: levain
  - type: text
    content: '  : l’hypocrisie des '
  - type: text
    content: pharisiens
  - type: text
    content: .
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Si quelqu’un dit du mal du Fils de l’homme, il lui sera pardonné ; mais pour celui qui aura '
  - type: text
    content: blasphémé
  - type: text
    content: ' contre l’Esprit Saint il n’y aura pas de pardon.'
  '11':
  - type: text
    content: ' '
  - type: text
    content: 'Quand on vous traînera dans les '
  - type: text
    content: synagogues
  - type: text
    content: ' devant les dirigeants et les autorités, ne vous inquiétez pas au sujet de ce que vous aurez à dire pour votre défense, ni de la manière dont vous la présenterez.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Car le Saint-Esprit vous enseignera à l’instant même ce que vous devrez dire.
  - type: heading
    content: Vraies et fausses richesses
  '13':
  - type: text
    content: 'Du milieu de la foule, un homme dit à Jésus : Maître, dis à mon frère de partager avec moi l’héritage que notre père nous a laissé !'
  '14':
  - type: text
    content: 'Mais Jésus lui répondit : '
  - type: text
    content: Mon ami, qui m’a établi pour être votre juge ou votre arbitre en matière d’héritage ?
  '15':
  - type: text
    content: 'Puis il dit à tous : '
  - type: text
    content: Gardez-vous avec soin du désir de posséder, sous toutes ses formes, car la vie d’un homme, si riche soit-il, ne dépend pas de ses biens.
  '16':
  - type: text
    content: 'Il leur raconta alors cette parabole : '
  - type: text
    content: Le domaine d’un riche propriétaire avait rapporté de façon exceptionnelle.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'L’homme se mit à réfléchir : « Que faire ? se demandait-il. Je n’ai pas assez de place pour engranger toute ma récolte !'
  - type: text
    content: ' '
  '18':
  - type: text
    content: Ah, se dit-il enfin, je sais ce que je vais faire ! Je vais démolir mes greniers pour en construire de plus grands, et j’y entasserai tout mon blé et tous mes autres biens.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Après quoi, je pourrai me dire : Mon ami, te voilà pourvu de biens en réserve pour de nombreuses années. Repose-toi, mange, bois et jouis de la vie ! »'
  - type: text
    content: ' '
  '2':
  - type: text
    content: Car tout ce qui est tenu secret sera dévoilé, et tout ce qui est caché finira par être connu.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Mais Dieu lui dit : « Pauvre fou que tu es ! Cette nuit même, tu vas mourir. Et tout ce que tu as préparé pour toi, qui va en profiter ? »'
  '21':
  - type: text
    content: ' '
  - type: text
    content: Voilà quel sera le sort de tout homme qui amasse des richesses pour lui-même, au lieu de chercher à être riche auprès de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions : pour Dieu ou au regard de Dieu.'
  - type: text
    content: .
  - type: heading
    content: (Mt 6.25-34)
  '22':
  - type: text
    content: 'Jésus ajouta, en s’adressant à ses disciples : '
  - type: text
    content: 'C’est pourquoi je vous dis : ne vous inquiétez pas en vous demandant : Qu’allons-nous manger ? Avec quoi allons-nous nous habiller ?'
  - type: text
    content: ' '
  '23':
  - type: text
    content: La vie vaut bien plus que la nourriture. Le corps vaut bien plus que le vêtement.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Considérez les corbeaux, ils ne sèment ni ne moissonnent ; ils n’ont ni cave, ni grenier et Dieu les nourrit. Vous valez bien plus qu’eux !
  - type: text
    content: ' '
  '25':
  - type: text
    content: D’ailleurs, qui de vous peut, à force d’inquiétude, prolonger son existence, ne serait-ce que de quelques instants
  - type: note
    content: 'Autre traduction : augmenter sa taille, ne serait-ce que de quelques centimètres.'
  - type: text
    content: '?'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Si donc vous n’avez aucun pouvoir sur ces petites choses, pourquoi vous inquiétez-vous au sujet des autres ?
  - type: text
    content: ' '
  '27':
  - type: text
    content: Considérez les lis ! Ils poussent sans se fatiguer à tisser
  - type: note
    content: 'Certains manuscrits ont : ne filent pas.'
  - type: text
    content: ' '
  - type: text
    content: 'des vêtements. Et pourtant, je vous l’assure, le roi '
  - type: text
    content: Salomon
  - type: text
    content: ' lui-même, dans toute sa gloire, n’a jamais été aussi bien vêtu que l’un d’eux !'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Si Dieu habille ainsi cette petite plante dans les champs, qui est là aujourd’hui et qui demain déjà sera jetée au feu, à combien plus forte raison vous vêtira-t-il vous-mêmes ! Ah, votre foi est bien petite !
  '29':
  - type: text
    content: ' '
  - type: text
    content: Ne vous faites donc pas de soucis au sujet du manger et du boire, et ne vous tourmentez pas pour cela.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Ainsi, tout ce que vous aurez dit dans l’obscurité sera entendu ouvertement en plein jour, et tout ce que vous aurez chuchoté dans le creux de l’oreille, derrière des portes bien closes, sera crié du haut des toits en terrasses.
  '30':
  - type: text
    content: Toutes ces choses, les païens de ce monde s’en préoccupent sans cesse. Mais votre Père sait que vous en avez besoin.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Faites donc plutôt du royaume de Dieu votre préoccupation première, et ces choses vous seront données en plus.
  '32':
  - type: text
    content: ' '
  - type: text
    content: 'N’aie pas peur, petit troupeau ! Car il a plu à votre Père de vous donner le '
  - type: text
    content: royaume
  - type: text
    content: .
  - type: heading
    content: (Mt 6.19-21)
  '33':
  - type: text
    content: ' '
  - type: text
    content: Vendez ce que vous possédez, et distribuez-en le produit aux pauvres. Fabriquez-vous des bourses inusables et constituez-vous un trésor inaltérable dans le ciel où aucun cambrioleur ne peut l’atteindre, ni aucune mite l’entamer.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Car là où est votre trésor, là aussi sera votre cœur.
  - type: heading
    content: Rester actif dans l’attente
  - type: heading
    content: (Mt 24.45-51)
  '35':
  - type: text
    content: ' '
  - type: text
    content: Restez en tenue de travail. Gardez vos lampes allumées.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Soyez comme des serviteurs qui attendent le retour de leur maître parti pour une noce. Dès qu’il arrive et qu’il frappe à la porte, ils lui ouvrent.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Heureux ces serviteurs que le maître, en arrivant, trouvera en train de veiller ! Vraiment, je vous l’assure, c’est lui qui se mettra en tenue de travail, les fera asseoir à table et passera de l’un à l’autre pour les servir.
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'Peu importe qu’il rentre à minuit ou vers trois heures du matin : Heureux ces serviteurs qu’il trouvera ainsi vigilants !'
  '39':
  - type: text
    content: ' '
  - type: text
    content: 'Vous le savez bien : si le maître de maison savait à quel moment le voleur va venir, il ne le laisserait pas pénétrer dans sa maison.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: 'Mes chers amis, je vous le dis : ne craignez pas ceux qui peuvent tuer le corps, mais qui n’ont pas le pouvoir de faire davantage.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Vous aussi, tenez-vous prêts, car c’est à un moment que vous n’auriez pas imaginé que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' viendra.'
  '41':
  - type: text
    content: 'Pierre lui demanda : Seigneur, cette parabole s’applique-t-elle seulement à nous, ou bien concerne-t-elle tout le monde ?'
  '42':
  - type: text
    content: 'Le Seigneur répondit : '
  - type: text
    content: Quel est le gérant fidèle et sensé à qui le maître confiera le soin de veiller sur son personnel pour qu’il donne à chacun, au moment voulu, la ration de blé qui lui revient ?
  - type: text
    content: ' '
  '43':
  - type: text
    content: Heureux ce serviteur que le maître, à son retour, trouvera en train d’agir comme il le lui a demandé !
  - type: text
    content: ' '
  '44':
  - type: text
    content: En vérité, je vous l’assure, son maître lui confiera l’administration de tout ce qu’il possède.
  '45':
  - type: text
    content: ' '
  - type: text
    content: 'Mais si ce serviteur se dit : « Mon maître n’est pas près de venir », et s’il se met à maltraiter les autres serviteurs et servantes, à manger, à boire et à s’enivrer,'
  - type: text
    content: ' '
  '46':
  - type: text
    content: son maître arrivera un jour où il ne s’y attendra pas, et à un moment qu’il ne connaît pas. Alors le maître le punira très sévèrement, et le traitera comme on traite les esclaves infidèles.
  '47':
  - type: text
    content: ' '
  - type: text
    content: Le serviteur qui sait ce que son maître veut de lui, mais qui n’aura rien préparé ou qui n’aura pas agi selon la volonté de son maître, sera sévèrement puni.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Mais celui qui n’aura pas su ce que son maître voulait, et qui aura commis des actes méritant une punition, celui-là subira un châtiment peu rigoureux. Si quelqu’un a beaucoup reçu, on exigera beaucoup de lui ; et plus on vous aura confié, plus on demandera de vous.
  - type: heading
    content: La division et le jugement
  '49':
  - type: text
    content: ' '
  - type: text
    content: Je suis venu jeter un feu sur la terre ; comme je voudrais qu’il soit déjà allumé !
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Savez-vous qui vous devez craindre ? Je vais vous le dire : c’est celui qui, après la mort, a le pouvoir de vous jeter en enfer. Oui, je vous l’assure, c’est lui que vous devez craindre.'
  '50':
  - type: text
    content: Mais il y a un baptême que je dois recevoir, et quelle angoisse est la mienne, tant que je ne l’ai pas reçu !
  - type: heading
    content: (Mt 10.34-36)
  '51':
  - type: text
    content: ' '
  - type: text
    content: Pensez-vous que je sois venu pour apporter la paix sur la terre ? Non, mais la division.
  - type: text
    content: ' '
  '52':
  - type: text
    content: En effet, à partir de maintenant, s’il y a cinq personnes dans une famille, elles seront divisées trois contre deux, et deux contre trois.
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'Le père sera contre le fils et le fils contre son père ; la mère contre sa fille, et la fille contre sa mère : la belle-mère contre sa belle-fille, et la belle-fille contre sa belle-mère.'
  - type: heading
    content: Le discernement nécessaire
  - type: heading
    content: (Mt 16.2-3)
  '54':
  - type: text
    content: 'Puis, s’adressant de nouveau à la foule, Jésus reprit : '
  - type: text
    content: 'Quand vous voyez apparaître un nuage du côté de l’ouest, vous dites aussitôt : « Il va pleuvoir », et c’est ce qui arrive.'
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'Quand le vent du sud se met à souffler, vous dites : « Il va faire très chaud », et c’est ce qui arrive.'
  '56':
  - type: text
    content: ' '
  - type: text
    content: Hypocrites ! Vous êtes capables d’interpréter correctement les phénomènes de la terre et les aspects du ciel, et vous ne pouvez pas comprendre en quel temps vous vivez ?
  - type: heading
    content: (Mt 5.25-26)
  '57':
  - type: text
    content: ' '
  - type: text
    content: Pourquoi aussi ne discernez-vous pas par vous-mêmes ce qui est juste ?
  - type: text
    content: ' '
  '58':
  - type: text
    content: Ainsi, quand tu vas en justice avec ton adversaire, fais tous tes efforts pour t’arranger à l’amiable avec lui pendant que vous êtes encore en chemin. Sinon, il te traînera devant le juge, celui-ci te remettra entre les mains des forces de l’ordre qui te jetteront en prison.
  - type: text
    content: ' '
  '59':
  - type: text
    content: 'Or, je te l’assure : tu n’en sortiras pas avant d’avoir remboursé jusqu’à la dernière petite pièce.'
  '6':
  - type: text
    content: ' '
  - type: text
    content: Ne vend-on pas cinq moineaux pour deux sous ? Et pourtant, Dieu prend soin de chacun d’eux.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Bien plus : même les cheveux de votre tête sont comptés. N’ayez aucune crainte, car vous avez plus de valeur que toute une volée de moineaux.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Je vous l’assure, tous ceux qui se déclareront pour moi devant les hommes, le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' aussi se déclarera pour eux devant les '
  - type: text
    content: anges
  - type: text
    content: ' de Dieu.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Mais celui qui aura prétendu devant les hommes qu’il ne me connaît pas, je ne le reconnaîtrai pas non plus devant les anges de Dieu.
  - type: text
    content: ' '
