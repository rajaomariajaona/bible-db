document_id: LUK.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prendre parti pour Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 10.26-33 ; 10.19-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pendant ce temps, des milliers de gens s’étaient rassemblés, au point qu’ils se marchaient sur les pieds les uns les autres. Jésus commença par s’adresser à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gardez-vous,
  - type: text
    text: ' leur dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'de ce '
    - type: usfm
      marker: w
      children:
      - type: text
        text: levain
    - type: text
      text: '  : l’hypocrisie des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: pharisiens
    - type: text
      text: .
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car tout ce qui est tenu secret sera dévoilé, et tout ce qui est caché finira par être connu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ainsi, tout ce que vous aurez dit dans l’obscurité sera entendu ouvertement en plein jour, et tout ce que vous aurez chuchoté dans le creux de l’oreille, derrière des portes bien closes, sera crié du haut des toits en terrasses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mes chers amis, je vous le dis : ne craignez pas ceux qui peuvent tuer le corps, mais qui n’ont pas le pouvoir de faire davantage.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Savez-vous qui vous devez craindre ? Je vais vous le dire : c’est celui qui, après la mort, a le pouvoir de vous jeter en enfer. Oui, je vous l’assure, c’est lui que vous devez craindre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne vend-on pas cinq moineaux pour deux sous ? Et pourtant, Dieu prend soin de chacun d’eux.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Bien plus : même les cheveux de votre tête sont comptés. N’ayez aucune crainte, car vous avez plus de valeur que toute une volée de moineaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je vous l’assure, tous ceux qui se déclareront pour moi devant les hommes, le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' aussi se déclarera pour eux devant les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' de Dieu.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais celui qui aura prétendu devant les hommes qu’il ne me connaît pas, je ne le reconnaîtrai pas non plus devant les anges de Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un dit du mal du Fils de l’homme, il lui sera pardonné ; mais pour celui qui aura '
    - type: usfm
      marker: w
      children:
      - type: text
        text: blasphémé
    - type: text
      text: ' contre l’Esprit Saint il n’y aura pas de pardon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand on vous traînera dans les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: synagogues
    - type: text
      text: ' devant les dirigeants et les autorités, ne vous inquiétez pas au sujet de ce que vous aurez à dire pour votre défense, ni de la manière dont vous la présenterez.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car le Saint-Esprit vous enseignera à l’instant même ce que vous devrez dire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vraies et fausses richesses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Du milieu de la foule, un homme dit à Jésus : Maître, dis à mon frère de partager avec moi l’héritage que notre père nous a laissé !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais Jésus lui répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon ami, qui m’a établi pour être votre juge ou votre arbitre en matière d’héritage ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis il dit à tous : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gardez-vous avec soin du désir de posséder, sous toutes ses formes, car la vie d’un homme, si riche soit-il, ne dépend pas de ses biens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il leur raconta alors cette parabole : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le domaine d’un riche propriétaire avait rapporté de façon exceptionnelle.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'L’homme se mit à réfléchir : « Que faire ? se demandait-il. Je n’ai pas assez de place pour engranger toute ma récolte !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ah, se dit-il enfin, je sais ce que je vais faire ! Je vais démolir mes greniers pour en construire de plus grands, et j’y entasserai tout mon blé et tous mes autres biens.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Après quoi, je pourrai me dire : Mon ami, te voilà pourvu de biens en réserve pour de nombreuses années. Repose-toi, mange, bois et jouis de la vie ! »'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais Dieu lui dit : « Pauvre fou que tu es ! Cette nuit même, tu vas mourir. Et tout ce que tu as préparé pour toi, qui va en profiter ? »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voilà quel sera le sort de tout homme qui amasse des richesses pour lui-même, au lieu de chercher à être riche auprès de Dieu
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au regard de Dieu.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 6.25-34)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus ajouta, en s’adressant à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'C’est pourquoi je vous dis : ne vous inquiétez pas en vous demandant : Qu’allons-nous manger ? Avec quoi allons-nous nous habiller ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La vie vaut bien plus que la nourriture. Le corps vaut bien plus que le vêtement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Considérez les corbeaux, ils ne sèment ni ne moissonnent ; ils n’ont ni cave, ni grenier et Dieu les nourrit. Vous valez bien plus qu’eux !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’ailleurs, qui de vous peut, à force d’inquiétude, prolonger son existence, ne serait-ce que de quelques instants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: augmenter sa taille, ne serait-ce que de quelques centimètres.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si donc vous n’avez aucun pouvoir sur ces petites choses, pourquoi vous inquiétez-vous au sujet des autres ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Considérez les lis ! Ils poussent sans se fatiguer à tisser
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne filent pas.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'des vêtements. Et pourtant, je vous l’assure, le roi '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Salomon
    - type: text
      text: ' lui-même, dans toute sa gloire, n’a jamais été aussi bien vêtu que l’un d’eux !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si Dieu habille ainsi cette petite plante dans les champs, qui est là aujourd’hui et qui demain déjà sera jetée au feu, à combien plus forte raison vous vêtira-t-il vous-mêmes ! Ah, votre foi est bien petite !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne vous faites donc pas de soucis au sujet du manger et du boire, et ne vous tourmentez pas pour cela.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Toutes ces choses, les païens de ce monde s’en préoccupent sans cesse. Mais votre Père sait que vous en avez besoin.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Faites donc plutôt du royaume de Dieu votre préoccupation première, et ces choses vous seront données en plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’aie pas peur, petit troupeau ! Car il a plu à votre Père de vous donner le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume
    - type: text
      text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 6.19-21)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vendez ce que vous possédez, et distribuez-en le produit aux pauvres. Fabriquez-vous des bourses inusables et constituez-vous un trésor inaltérable dans le ciel où aucun cambrioleur ne peut l’atteindre, ni aucune mite l’entamer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car là où est votre trésor, là aussi sera votre cœur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rester actif dans l’attente
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 24.45-51)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Restez en tenue de travail. Gardez vos lampes allumées.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Soyez comme des serviteurs qui attendent le retour de leur maître parti pour une noce. Dès qu’il arrive et qu’il frappe à la porte, ils lui ouvrent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux ces serviteurs que le maître, en arrivant, trouvera en train de veiller ! Vraiment, je vous l’assure, c’est lui qui se mettra en tenue de travail, les fera asseoir à table et passera de l’un à l’autre pour les servir.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Peu importe qu’il rentre à minuit ou vers trois heures du matin : Heureux ces serviteurs qu’il trouvera ainsi vigilants !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous le savez bien : si le maître de maison savait à quel moment le voleur va venir, il ne le laisserait pas pénétrer dans sa maison.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous aussi, tenez-vous prêts, car c’est à un moment que vous n’auriez pas imaginé que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' viendra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Pierre lui demanda : Seigneur, cette parabole s’applique-t-elle seulement à nous, ou bien concerne-t-elle tout le monde ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le Seigneur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quel est le gérant fidèle et sensé à qui le maître confiera le soin de veiller sur son personnel pour qu’il donne à chacun, au moment voulu, la ration de blé qui lui revient ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux ce serviteur que le maître, à son retour, trouvera en train d’agir comme il le lui a demandé !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, je vous l’assure, son maître lui confiera l’administration de tout ce qu’il possède.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais si ce serviteur se dit : « Mon maître n’est pas près de venir », et s’il se met à maltraiter les autres serviteurs et servantes, à manger, à boire et à s’enivrer,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: son maître arrivera un jour où il ne s’y attendra pas, et à un moment qu’il ne connaît pas. Alors le maître le punira très sévèrement, et le traitera comme on traite les esclaves infidèles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le serviteur qui sait ce que son maître veut de lui, mais qui n’aura rien préparé ou qui n’aura pas agi selon la volonté de son maître, sera sévèrement puni.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais celui qui n’aura pas su ce que son maître voulait, et qui aura commis des actes méritant une punition, celui-là subira un châtiment peu rigoureux. Si quelqu’un a beaucoup reçu, on exigera beaucoup de lui ; et plus on vous aura confié, plus on demandera de vous.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La division et le jugement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis venu jeter un feu sur la terre ; comme je voudrais qu’il soit déjà allumé !
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais il y a un baptême que je dois recevoir, et quelle angoisse est la mienne, tant que je ne l’ai pas reçu !
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 10.34-36)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pensez-vous que je sois venu pour apporter la paix sur la terre ? Non, mais la division.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En effet, à partir de maintenant, s’il y a cinq personnes dans une famille, elles seront divisées trois contre deux, et deux contre trois.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le père sera contre le fils et le fils contre son père ; la mère contre sa fille, et la fille contre sa mère : la belle-mère contre sa belle-fille, et la belle-fille contre sa belle-mère.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le discernement nécessaire
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 16.2-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Puis, s’adressant de nouveau à la foule, Jésus reprit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand vous voyez apparaître un nuage du côté de l’ouest, vous dites aussitôt : « Il va pleuvoir », et c’est ce qui arrive.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand le vent du sud se met à souffler, vous dites : « Il va faire très chaud », et c’est ce qui arrive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hypocrites ! Vous êtes capables d’interpréter correctement les phénomènes de la terre et les aspects du ciel, et vous ne pouvez pas comprendre en quel temps vous vivez ?
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 5.25-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi aussi ne discernez-vous pas par vous-mêmes ce qui est juste ?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ainsi, quand tu vas en justice avec ton adversaire, fais tous tes efforts pour t’arranger à l’amiable avec lui pendant que vous êtes encore en chemin. Sinon, il te traînera devant le juge, celui-ci te remettra entre les mains des forces de l’ordre qui te jetteront en prison.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or, je te l’assure : tu n’en sortiras pas avant d’avoir remboursé jusqu’à la dernière petite pièce.'
