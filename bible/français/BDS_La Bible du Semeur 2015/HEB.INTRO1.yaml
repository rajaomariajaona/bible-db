document_id: HEB.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La lettre aux Hébreux est l’une des plus longues et des plus importantes du Nouveau Testament.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: De son auteur, qui ne se nomme pas, on peut seulement dire que c’est un chrétien d’origine juive (« nos ancêtres » 1.1) versé dans la connaissance de l’Ancien Testament et, en particulier, du rituel décrit dans le livre du Lévitique. L’Evangile lui est peut-être parvenu par l’intermédiaire des premiers témoins (2.3).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Il s’adresse à des Juifs convertis, comme lui, membres d’une Eglise qui lui est familière, à laquelle il espère rendre bientôt visite (13.19 et 23). La plupart des exégètes proposent Rome comme lieu de destination de la lettre (cf. 13.24). C’est là en tout cas que l’on trouve les premières traces de cette lettre (dans la lettre de Clément de Rome en 95-96). La mention de la persécution en 10.33-34 pourrait se rapporter à l’édit de l’empereur Claude en 49, qui chassa, pour quelques années, les Juifs de Rome. La lettre pourrait dater de 60-64.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’auteur définit son écrit comme une « lettre d’encouragement » (13.22) ; de fait, recommandations et avertissements entrecoupent le développement doctrinal. Il semble en effet que ses interlocuteurs soient en butte à une opposition croissante. Les nombreuses mises en garde contre l’abandon de la foi (2.1-4 ; 4.1-11 ; 6.4-6 ; 10.26-31) qui s’insèrent dans une démonstration suivie de la supériorité de Christ sur les anges (chap. 1 et 2), sur Moïse et Josué (3.1 à 4.13) et sur les grands-prêtres de l’ancienne alliance (4.14 à 8.13) laissent à penser que ses destinataires étaient tentés de retourner au judaïsme. L’auteur leur montre la supériorité du sacrifice de Christ, accompli une fois pour toutes, sur ceux de l’ancien Israël (9.1 à 10.18).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Pour les encourager, il leur donne en exemple les hommes de l’ancienne alliance qui avaient déjà la foi (chap. 11). Il les invite à garder « les yeux fixés sur Jésus » (12.2), modèle de persévérance dans l’adversité.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Cette lettre est fondamentale pour la compréhension du sens des institutions cultuelles de l’ancienne alliance, en particulier des sacrifices, qui préfiguraient le sacrifice de Christ, accompli une fois pour toutes.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Elle contient aussi des encouragements précieux qui gardent toute leur force pour les hommes de notre temps : « Nous n’avons pas un grand-prêtre qui serait incapable de compatir à nos faiblesses. Au contraire, il a été tenté en tout point comme nous le sommes, mais sans commettre de péché. Approchons-nous donc du trône du Dieu de grâce avec une pleine assurance… » (4.1 et 16).'
