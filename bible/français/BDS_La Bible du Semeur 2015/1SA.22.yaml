document_id: 1SA.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David, chef de bande
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Là-dessus David quitta la ville de Gath et alla se réfugier dans la grotte d’Adoullam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'La grotte d’Adoullam '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est située à une vingtaine de kilomètres de Bethléhem, au sud-ouest de Jérusalem. Elle était d’accès difficile, donc facile à défendre. Voir les '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 57
        metadata:
          usfm: PSA.57
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '142'
        metadata:
          usfm: PSA.142
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Lorsque ses frères et tous les membres de sa famille l’apprirent, ils allèrent l’y rejoindre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et tous les gens qui étaient dans la détresse, tous ceux qui avaient des dettes et tous les mécontents se rallièrent à lui, et il devint leur chef. Il y eut ainsi quelque quatre cents hommes qui se regroupèrent autour de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Plus tard, David se rendit de là à Mitspé de Moab et il dit au roi de Moab
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’aïeule de David était moabite (Rt 1.22 ; 4.17-22).
    marker-yv: yv-n
  - type: text
    text: '  : Permets, je te prie, à mon père et à ma mère de venir se réfugier chez vous jusqu’à ce que je sache ce que Dieu fera pour moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il amena donc ses parents auprès du roi de Moab, et ils restèrent chez lui tout le temps que David passa dans son refuge fortifié.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Un jour, le prophète Gad dit à David : Ne reste pas dans cette forteresse. Pars et rentre au pays de Juda.'
- type: usfm
  marker: p
  children:
  - type: text
    text: David s’en alla et s’enfonça dans la forêt de Héreth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül se venge sur Ahimélek et sa famille
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saül apprit qu’on avait repéré David et ses hommes. Il siégeait à Guibéa sur la colline, à l’ombre d’un tamaris, sa lance à la main. Tous ses familiers se tenaient autour de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saül leur dit : Ecoutez bien, hommes de Benjamin : croyez-vous que le fils d’Isaï donnera à chacun de vous des champs et des vignes ? Est-ce qu’il fera de vous tous des chefs de « milliers » et de « centaines » ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors pourquoi avez-vous tous comploté contre moi de sorte que personne ne m’a averti que mon fils a conclu un pacte avec le fils d’Isaï. Aucun de vous ne se soucie de moi et personne ne m’a prévenu que mon fils a dressé mon serviteur contre moi pour me tendre des pièges, comme cela apparaît aujourd’hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Doëg l’Edomite, qui était à la tête des fonctionnaires de Saül, répondit : J’ai vu le fils d’Isaï arriver à Nob, chez Ahimélek, le fils d’Ahitoub. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui-ci a consulté l’Eternel pour lui et lui a fourni des vivres. Il lui a aussi remis l’épée de Goliath le Philistin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 52.2
        metadata:
          usfm: PSA.52.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors le roi envoya chercher le prêtre Ahimélek, fils d’Ahitoub, ainsi que tous les prêtres, membres de son groupe familial qui étaient à Nob. Tous vinrent se présenter devant le roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: – Ecoute bien, fils d’Ahitoub ! lui dit Saül quand celui-ci fut devant lui.
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, mon seigneur, j’écoute, lui répondit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: – Pourquoi avez-vous comploté contre moi, toi et le fils d’Isaï ? lui dit Saül. Tu lui as donné du pain et une épée, et tu as consulté Dieu pour lui, pour qu’il se révolte contre moi et me tende des pièges, comme c’est le cas aujourd’hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahimélek répondit au roi en disant : Y a-t-il parmi tous tes fonctionnaires quelqu’un d’aussi fidèle que David ? De plus, c’est le gendre du roi. Et n’est-il pas le chef de ta garde personnelle ? N’est-il pas hautement honoré à la cour royale ? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et si j’ai consulté Dieu pour lui, était-ce la première fois ? Je n’ai jamais eu l’idée de comploter contre toi. Que le roi ne mette pas sur mon compte ni sur celui d’aucun membre de mon groupe familial une telle chose, car ton serviteur ignorait absolument tout de cette affaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi dit : Ahimélek, tu mourras, toi et tout ton groupe familial, c’est décidé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Puis il ordonna à ses gardes qui se tenaient près de lui : Allez, mettez à mort ces prêtres de l’Eternel, parce qu’eux aussi ont soutenu David. Ils savaient qu’il était en fuite et ils ne m’en ont pas averti.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais les gardes refusèrent de porter la main sur les prêtres de l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors le roi ordonna à Doëg : Vas-y, toi, exécute ces prêtres.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Doëg l’Edomite s’avança et ce fut lui qui tua les prêtres. Il mit à mort en ce jour quatre-vingt-cinq hommes portant le vêtement sacerdotal en lin. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Saül fit aussi massacrer par l’épée tous les autres habitants de Nob, la ville des prêtres ; tous y passèrent : hommes, femmes, enfants, nourrissons, bœufs, ânes, brebis.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Un fils d’Ahimélek, fils d’Ahitoub, nommé Abiatar réussit cependant à s’échapper et il s’enfuit auprès de David. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il lui annonça que Saül avait fait tuer les prêtres de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David s’exclama : Je m’étais bien douté, l’autre jour, que Doëg l’Edomite, qui était aussi à Nob, ne manquerait pas d’informer Saül de tout ce qui s’est passé. C’est donc moi qui suis la cause de la mort de toutes les personnes de ton groupe familial. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maintenant, reste avec moi et ne crains rien. Nous avons un ennemi commun, toi et moi, qui en veut à notre vie, mais auprès de moi tu seras en sécurité.
