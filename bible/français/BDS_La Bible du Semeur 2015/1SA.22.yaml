document_id: 1SA.22,21
type_code: fra
verses:
  '1':
  - type: heading
    content: David, chef de bande
  - type: text
    content: Là-dessus David quitta la ville de Gath et alla se réfugier dans la grotte d’Adoullam
  - type: note
    content: La grotte d’Adoullam est située à une vingtaine de kilomètres de Bethléhem, au sud-ouest de Jérusalem. Elle était d’accès difficile, donc facile à défendre. Voir les Ps 57 et 142.
  - type: text
    content: '. Lorsque ses frères et tous les membres de sa famille l’apprirent, ils allèrent l’y rejoindre. '
  '10':
  - type: text
    content: Celui-ci a consulté l’Eternel pour lui et lui a fourni des vivres. Il lui a aussi remis l’épée de Goliath le Philistin
  - type: note
    content: Voir Ps 52.2.
  - type: text
    content: .
  '11':
  - type: text
    content: Alors le roi envoya chercher le prêtre Ahimélek, fils d’Ahitoub, ainsi que tous les prêtres, membres de son groupe familial qui étaient à Nob. Tous vinrent se présenter devant le roi.
  '12':
  - type: text
    content: – Ecoute bien, fils d’Ahitoub ! lui dit Saül quand celui-ci fut devant lui.
  - type: text
    content: – Oui, mon seigneur, j’écoute, lui répondit-il.
  '13':
  - type: text
    content: – Pourquoi avez-vous comploté contre moi, toi et le fils d’Isaï ? lui dit Saül. Tu lui as donné du pain et une épée, et tu as consulté Dieu pour lui, pour qu’il se révolte contre moi et me tende des pièges, comme c’est le cas aujourd’hui.
  '14':
  - type: text
    content: 'Ahimélek répondit au roi en disant : Y a-t-il parmi tous tes fonctionnaires quelqu’un d’aussi fidèle que David ? De plus, c’est le gendre du roi. Et n’est-il pas le chef de ta garde personnelle ? N’est-il pas hautement honoré à la cour royale ? '
  '15':
  - type: text
    content: Et si j’ai consulté Dieu pour lui, était-ce la première fois ? Je n’ai jamais eu l’idée de comploter contre toi. Que le roi ne mette pas sur mon compte ni sur celui d’aucun membre de mon groupe familial une telle chose, car ton serviteur ignorait absolument tout de cette affaire.
  '16':
  - type: text
    content: 'Le roi dit : Ahimélek, tu mourras, toi et tout ton groupe familial, c’est décidé.'
  '17':
  - type: text
    content: 'Puis il ordonna à ses gardes qui se tenaient près de lui : Allez, mettez à mort ces prêtres de l’Eternel, parce qu’eux aussi ont soutenu David. Ils savaient qu’il était en fuite et ils ne m’en ont pas averti.'
  - type: text
    content: Mais les gardes refusèrent de porter la main sur les prêtres de l’Eternel.
  '18':
  - type: text
    content: 'Alors le roi ordonna à Doëg : Vas-y, toi, exécute ces prêtres.'
  - type: text
    content: 'Doëg l’Edomite s’avança et ce fut lui qui tua les prêtres. Il mit à mort en ce jour quatre-vingt-cinq hommes portant le vêtement sacerdotal en lin. '
  '19':
  - type: text
    content: 'Saül fit aussi massacrer par l’épée tous les autres habitants de Nob, la ville des prêtres ; tous y passèrent : hommes, femmes, enfants, nourrissons, bœufs, ânes, brebis.'
  '2':
  - type: text
    content: Et tous les gens qui étaient dans la détresse, tous ceux qui avaient des dettes et tous les mécontents se rallièrent à lui, et il devint leur chef. Il y eut ainsi quelque quatre cents hommes qui se regroupèrent autour de lui.
  '20':
  - type: text
    content: 'Un fils d’Ahimélek, fils d’Ahitoub, nommé Abiatar réussit cependant à s’échapper et il s’enfuit auprès de David. '
  '21':
  - type: text
    content: 'Il lui annonça que Saül avait fait tuer les prêtres de l’Eternel. '
  '22':
  - type: text
    content: 'David s’exclama : Je m’étais bien douté, l’autre jour, que Doëg l’Edomite, qui était aussi à Nob, ne manquerait pas d’informer Saül de tout ce qui s’est passé. C’est donc moi qui suis la cause de la mort de toutes les personnes de ton groupe familial. '
  '23':
  - type: text
    content: Maintenant, reste avec moi et ne crains rien. Nous avons un ennemi commun, toi et moi, qui en veut à notre vie, mais auprès de moi tu seras en sécurité.
  '3':
  - type: text
    content: Plus tard, David se rendit de là à Mitspé de Moab et il dit au roi de Moab
  - type: note
    content: L’aïeule de David était moabite (Rt 1.22 ; 4.17-22).
  - type: text
    content: '  : Permets, je te prie, à mon père et à ma mère de venir se réfugier chez vous jusqu’à ce que je sache ce que Dieu fera pour moi.'
  '4':
  - type: text
    content: Il amena donc ses parents auprès du roi de Moab, et ils restèrent chez lui tout le temps que David passa dans son refuge fortifié.
  '5':
  - type: text
    content: 'Un jour, le prophète Gad dit à David : Ne reste pas dans cette forteresse. Pars et rentre au pays de Juda.'
  - type: text
    content: David s’en alla et s’enfonça dans la forêt de Héreth.
  - type: heading
    content: Saül se venge sur Ahimélek et sa famille
  '6':
  - type: text
    content: 'Saül apprit qu’on avait repéré David et ses hommes. Il siégeait à Guibéa sur la colline, à l’ombre d’un tamaris, sa lance à la main. Tous ses familiers se tenaient autour de lui. '
  '7':
  - type: text
    content: 'Saül leur dit : Ecoutez bien, hommes de Benjamin : croyez-vous que le fils d’Isaï donnera à chacun de vous des champs et des vignes ? Est-ce qu’il fera de vous tous des chefs de « milliers » et de « centaines » ? '
  '8':
  - type: text
    content: Alors pourquoi avez-vous tous comploté contre moi de sorte que personne ne m’a averti que mon fils a conclu un pacte avec le fils d’Isaï. Aucun de vous ne se soucie de moi et personne ne m’a prévenu que mon fils a dressé mon serviteur contre moi pour me tendre des pièges, comme cela apparaît aujourd’hui.
  '9':
  - type: text
    content: 'Doëg l’Edomite, qui était à la tête des fonctionnaires de Saül, répondit : J’ai vu le fils d’Isaï arriver à Nob, chez Ahimélek, le fils d’Ahitoub. '
