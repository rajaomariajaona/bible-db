document_id: 2SA.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joab convainc David de faire revenir Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joab, fils de Tserouya, remarqua que le roi était de nouveau disposé favorablement envers Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il fit venir de Teqoa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A une quinzaine de kilomètres au sud de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: ' une femme habile à laquelle il dit : Fais semblant d’être en deuil, je te prie, revêts-toi d’habits de deuil, ne te parfume pas d’huile odorante, aie bien l’air d’une femme qui depuis longtemps porte le deuil d’un mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Puis tu te présenteras devant le roi et tu lui répéteras ce que je vais te dire.
- type: usfm
  marker: p
  children:
  - type: text
    text: Joab lui indiqua exactement ce qu’elle devait dire au roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La femme de Teqoa alla parler au roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'De nombreux manuscrits hébreux, l’ancienne version grecque et la Vulgate ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se rendit chez le roi.
    marker-yv: yv-n
  - type: text
    text: '  ; elle s’inclina face contre terre, pour se prosterner, et s’écria : Viens à mon secours, ô roi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: – Que veux-tu ? lui demanda le roi.
- type: usfm
  marker: p
  children:
  - type: text
    text: '– Hélas ! dit-elle, je suis veuve ; mon mari est mort, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et ta servante avait deux fils. Ils se sont disputés dans les champs, il n’y avait personne pour les séparer, si bien que l’un a frappé l’autre et l’a tué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maintenant, toute ma famille a pris parti contre ta servante, et ils m’ont demandé : « Livre celui qui a frappé son frère. Nous le mettrons à mort pour le meurtre de son frère. Ainsi, nous supprimerons du même coup l’héritier ! » De cette manière, ils éteindraient la dernière lueur d’espoir qui me reste, et le nom et la postérité de mon mari disparaîtraient de la terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi dit à la femme : Retourne chez toi ; je donnerai des ordres à ton sujet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La femme de Teqoa lui répondit : Mon seigneur le roi ! Que la faute retombe sur moi et sur mon groupe familial et que le roi et son trône soient hors de cause.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi lui dit : Si quelqu’un te fait des remarques à ce sujet, amène-le vers moi et il te laissera tranquille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La femme répliqua : Que sa majesté veuille prendre cet engagement au nom de l’Eternel son Dieu, pour que l’homme chargé de punir la mort'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Nb 35.9-29 ; Dt 19.4-13 ; Jos 20.
    marker-yv: yv-n
  - type: text
    text: ' de mon fils n’aggrave pas encore le malheur en faisant mourir celui qui me reste.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le roi dit : Aussi vrai que l’Eternel est vivant, il ne tombera pas à terre un cheveu de la tête de ton fils !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La femme reprit : Permettras-tu à ta servante de dire encore quelque chose à mon seigneur le roi ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: – Parle ! lui dit-il.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et la femme ajouta : Pourquoi alors as-tu de telles pensées à l’égard du peuple de Dieu ? Car en prononçant cette sentence tout à l’heure, le roi a reconnu qu’il avait tort de ne pas faire revenir celui qu’il a exilé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nous devons tous mourir, notre vie est comme de l’eau répandue sur le sol et qu’on ne peut plus recueillir si Dieu n’en assure l’être
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mais Dieu ne conserve pas d’animosité.
    marker-yv: yv-n
  - type: text
    text: '. Mais son dessein n’est pas de tenir loin de lui l’exilé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maintenant, si je suis venue parler ainsi au roi mon seigneur, c’est parce que l’état du peuple m’a fait peur. Alors ta servante s’est dit : « Je vais parler au roi. Peut-être le roi suivra-t-il le conseil de son humble servante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Peut-être consentira-t-il à protéger sa servante contre l’homme qui voudrait nous supprimer, moi et mon fils, du peuple que Dieu s’est choisi pour qu’il lui appartienne. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, je me suis dit que la parole du roi mon seigneur serait une parole d’apaisement, car mon seigneur le roi est comme un ange de Dieu pour discerner le bien et le mal. Que l’Eternel ton Dieu soit donc avec toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le roi dit alors à la femme : Je vais te poser à mon tour une question. Promets-moi de me répondre sans rien me cacher.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'La femme lui dit : Que le roi mon seigneur parle !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le roi reprit : Ne serait-ce pas Joab qui est derrière tout cela ?'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'La femme répondit : Aussi vrai que tu es vivant, ô roi mon seigneur, on ne peut s’écarter ni à droite ni à gauche de tout ce que dit mon seigneur le roi. C’est bien ton serviteur Joab qui m’a chargée de te parler, c’est lui qui a indiqué à ta servante tout ce qu’elle devait dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si ton serviteur Joab a agi ainsi, c’est pour donner à cette affaire une autre tournure. Mais mon seigneur possède la sagesse d’un ange de Dieu pour connaître tout ce qui se passe dans le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi alla donc parler à Joab et lui dit : J’ai décidé d’agir comme tu me l’as suggéré : Va chercher le jeune homme Absalom et ramène-le ici !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joab s’inclina face contre terre pour se prosterner et dit au roi : Dieu te bénisse, Majesté. Maintenant, je sais que tu es bien disposé à mon égard, ô roi, mon seigneur, puisque le roi accepte de faire ce que son serviteur lui a suggéré.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joab se releva et partit pour Gueshour d’où il ramena Absalom à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Le roi ordonna qu’il se retire dans sa maison et ne paraisse pas en sa présence. Absalom se confina donc chez lui et il ne parut pas en présence du roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David accepte de recevoir Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dans tout Israël il n’y avait personne qui fût autant admiré pour sa beauté qu’Absalom ; de la plante du pied au sommet de la tête, il était sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Chaque année, il se rasait la tête, car sa chevelure devenait trop pesante. Lorsqu’on lui coupait les cheveux, on les pesait : il y en avait près de deux kilos et demi selon les poids officiels du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Absalom eut trois fils et une fille nommée Tamar qui devint une très belle femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Absalom resta deux ans à Jérusalem sans paraître en présence du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Après ce temps, il fit appeler Joab pour lui demander de parler au roi ; mais Joab refusa de venir chez lui. Absalom revint à la charge une seconde fois, mais Joab refusa de nouveau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Alors Absalom dit à ses serviteurs : Vous voyez le champ de Joab à côté du mien, il y a de l’orge ; allez y mettre le feu !'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les serviteurs d’Absalom exécutèrent ses ordres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors, Joab se rendit chez Absalom et lui demanda pourquoi ses serviteurs avaient mis le feu à son champ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Absalom lui répondit : Je t’avais demandé de venir et tu as refusé. Je voulais t’envoyer chez le roi pour lui demander : « Pourquoi m’as-tu fait revenir de Gueshour ? J’aurais mieux fait d’y rester. » Maintenant, je voudrais être reçu par le roi ; et si je suis coupable, eh bien, qu’il me fasse mourir !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Joab se rendit chez le roi et lui rapporta les paroles de son fils. Alors le roi fit appeler Absalom. Celui-ci se rendit auprès de lui et se prosterna la face contre terre devant lui et le roi l’embrassa.
