document_id: 2SA.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Joab convainc David de faire revenir Absalom
  - type: text
    content: 'Joab, fils de Tserouya, remarqua que le roi était de nouveau disposé favorablement envers Absalom. '
  '10':
  - type: text
    content: 'Le roi lui dit : Si quelqu’un te fait des remarques à ce sujet, amène-le vers moi et il te laissera tranquille.'
  '11':
  - type: text
    content: 'La femme répliqua : Que sa majesté veuille prendre cet engagement au nom de l’Eternel son Dieu, pour que l’homme chargé de punir la mort'
  - type: note
    content: Voir Nb 35.9-29 ; Dt 19.4-13 ; Jos 20.
  - type: text
    content: ' de mon fils n’aggrave pas encore le malheur en faisant mourir celui qui me reste.'
  - type: text
    content: 'Le roi dit : Aussi vrai que l’Eternel est vivant, il ne tombera pas à terre un cheveu de la tête de ton fils !'
  '12':
  - type: text
    content: 'La femme reprit : Permettras-tu à ta servante de dire encore quelque chose à mon seigneur le roi ?'
  - type: text
    content: – Parle ! lui dit-il.
  '13':
  - type: text
    content: 'Et la femme ajouta : Pourquoi alors as-tu de telles pensées à l’égard du peuple de Dieu ? Car en prononçant cette sentence tout à l’heure, le roi a reconnu qu’il avait tort de ne pas faire revenir celui qu’il a exilé. '
  '14':
  - type: text
    content: Nous devons tous mourir, notre vie est comme de l’eau répandue sur le sol et qu’on ne peut plus recueillir si Dieu n’en assure l’être
  - type: note
    content: 'Autre traduction : mais Dieu ne conserve pas d’animosité.'
  - type: text
    content: '. Mais son dessein n’est pas de tenir loin de lui l’exilé. '
  '15':
  - type: text
    content: 'Maintenant, si je suis venue parler ainsi au roi mon seigneur, c’est parce que l’état du peuple m’a fait peur. Alors ta servante s’est dit : « Je vais parler au roi. Peut-être le roi suivra-t-il le conseil de son humble servante. '
  '16':
  - type: text
    content: 'Peut-être consentira-t-il à protéger sa servante contre l’homme qui voudrait nous supprimer, moi et mon fils, du peuple que Dieu s’est choisi pour qu’il lui appartienne. » '
  '17':
  - type: text
    content: Oui, je me suis dit que la parole du roi mon seigneur serait une parole d’apaisement, car mon seigneur le roi est comme un ange de Dieu pour discerner le bien et le mal. Que l’Eternel ton Dieu soit donc avec toi.
  '18':
  - type: text
    content: 'Le roi dit alors à la femme : Je vais te poser à mon tour une question. Promets-moi de me répondre sans rien me cacher.'
  - type: text
    content: 'La femme lui dit : Que le roi mon seigneur parle !'
  '19':
  - type: text
    content: 'Le roi reprit : Ne serait-ce pas Joab qui est derrière tout cela ?'
  - type: text
    content: 'La femme répondit : Aussi vrai que tu es vivant, ô roi mon seigneur, on ne peut s’écarter ni à droite ni à gauche de tout ce que dit mon seigneur le roi. C’est bien ton serviteur Joab qui m’a chargée de te parler, c’est lui qui a indiqué à ta servante tout ce qu’elle devait dire. '
  '2':
  - type: text
    content: Il fit venir de Teqoa
  - type: note
    content: A une quinzaine de kilomètres au sud de Jérusalem.
  - type: text
    content: ' une femme habile à laquelle il dit : Fais semblant d’être en deuil, je te prie, revêts-toi d’habits de deuil, ne te parfume pas d’huile odorante, aie bien l’air d’une femme qui depuis longtemps porte le deuil d’un mort. '
  '20':
  - type: text
    content: Si ton serviteur Joab a agi ainsi, c’est pour donner à cette affaire une autre tournure. Mais mon seigneur possède la sagesse d’un ange de Dieu pour connaître tout ce qui se passe dans le pays.
  '21':
  - type: text
    content: 'Le roi alla donc parler à Joab et lui dit : J’ai décidé d’agir comme tu me l’as suggéré : Va chercher le jeune homme Absalom et ramène-le ici !'
  '22':
  - type: text
    content: 'Joab s’inclina face contre terre pour se prosterner et dit au roi : Dieu te bénisse, Majesté. Maintenant, je sais que tu es bien disposé à mon égard, ô roi, mon seigneur, puisque le roi accepte de faire ce que son serviteur lui a suggéré.'
  '23':
  - type: text
    content: 'Joab se releva et partit pour Gueshour d’où il ramena Absalom à Jérusalem. '
  '24':
  - type: text
    content: Le roi ordonna qu’il se retire dans sa maison et ne paraisse pas en sa présence. Absalom se confina donc chez lui et il ne parut pas en présence du roi.
  - type: heading
    content: David accepte de recevoir Absalom
  '25':
  - type: text
    content: 'Dans tout Israël il n’y avait personne qui fût autant admiré pour sa beauté qu’Absalom ; de la plante du pied au sommet de la tête, il était sans défaut. '
  '26':
  - type: text
    content: 'Chaque année, il se rasait la tête, car sa chevelure devenait trop pesante. Lorsqu’on lui coupait les cheveux, on les pesait : il y en avait près de deux kilos et demi selon les poids officiels du roi. '
  '27':
  - type: text
    content: Absalom eut trois fils et une fille nommée Tamar qui devint une très belle femme.
  '28':
  - type: text
    content: 'Absalom resta deux ans à Jérusalem sans paraître en présence du roi. '
  '29':
  - type: text
    content: 'Après ce temps, il fit appeler Joab pour lui demander de parler au roi ; mais Joab refusa de venir chez lui. Absalom revint à la charge une seconde fois, mais Joab refusa de nouveau. '
  '3':
  - type: text
    content: Puis tu te présenteras devant le roi et tu lui répéteras ce que je vais te dire.
  - type: text
    content: Joab lui indiqua exactement ce qu’elle devait dire au roi.
  '30':
  - type: text
    content: 'Alors Absalom dit à ses serviteurs : Vous voyez le champ de Joab à côté du mien, il y a de l’orge ; allez y mettre le feu !'
  - type: text
    content: 'Les serviteurs d’Absalom exécutèrent ses ordres. '
  '31':
  - type: text
    content: 'Alors, Joab se rendit chez Absalom et lui demanda pourquoi ses serviteurs avaient mis le feu à son champ. '
  '32':
  - type: text
    content: 'Absalom lui répondit : Je t’avais demandé de venir et tu as refusé. Je voulais t’envoyer chez le roi pour lui demander : « Pourquoi m’as-tu fait revenir de Gueshour ? J’aurais mieux fait d’y rester. » Maintenant, je voudrais être reçu par le roi ; et si je suis coupable, eh bien, qu’il me fasse mourir !'
  '33':
  - type: text
    content: Joab se rendit chez le roi et lui rapporta les paroles de son fils. Alors le roi fit appeler Absalom. Celui-ci se rendit auprès de lui et se prosterna la face contre terre devant lui et le roi l’embrassa.
  '4':
  - type: text
    content: La femme de Teqoa alla parler au roi
  - type: note
    content: 'De nombreux manuscrits hébreux, l’ancienne version grecque et la Vulgate ont : se rendit chez le roi.'
  - type: text
    content: '  ; elle s’inclina face contre terre, pour se prosterner, et s’écria : Viens à mon secours, ô roi !'
  '5':
  - type: text
    content: – Que veux-tu ? lui demanda le roi.
  - type: text
    content: '– Hélas ! dit-elle, je suis veuve ; mon mari est mort, '
  '6':
  - type: text
    content: 'et ta servante avait deux fils. Ils se sont disputés dans les champs, il n’y avait personne pour les séparer, si bien que l’un a frappé l’autre et l’a tué. '
  '7':
  - type: text
    content: 'Maintenant, toute ma famille a pris parti contre ta servante, et ils m’ont demandé : « Livre celui qui a frappé son frère. Nous le mettrons à mort pour le meurtre de son frère. Ainsi, nous supprimerons du même coup l’héritier ! » De cette manière, ils éteindraient la dernière lueur d’espoir qui me reste, et le nom et la postérité de mon mari disparaîtraient de la terre.'
  '8':
  - type: text
    content: 'Le roi dit à la femme : Retourne chez toi ; je donnerai des ordres à ton sujet.'
  '9':
  - type: text
    content: 'La femme de Teqoa lui répondit : Mon seigneur le roi ! Que la faute retombe sur moi et sur mon groupe familial et que le roi et son trône soient hors de cause.'
