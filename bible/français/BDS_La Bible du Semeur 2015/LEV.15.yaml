document_id: LEV.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les impuretés sexuelles de l’homme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel s’adressa à Moïse et à Aaron en ces termes : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parlez aux Israélites et dites-leur : Si un homme est atteint d’une gonorrhée, l’écoulement qu’elle provoque le rend impur – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'qu’il y ait écoulement ou obstruction des organes – il y a impureté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tout lit sur lequel cet homme couchera et tout meuble sur lequel il s’assiéra seront impurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Celui qui touchera son lit nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Celui qui s’assiéra sur le siège utilisé par cet homme nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Celui qui touchera le malade nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si le malade crache sur quelqu’un qui est pur, ce dernier nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Toute selle sur laquelle aura voyagé le malade sera impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quiconque touchera à un objet quelconque placé sous lui sera impur jusqu’au soir ; et quiconque prendra un tel objet nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Celui que le malade aura touché, sans s’être rincé les mains à l’eau, nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tout récipient de terre cuite que le malade aura touché sera brisé et tout objet en bois sera lavé à l’eau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand le malade sera guéri de sa gonorrhée, il comptera sept jours comme temps de purification, puis il nettoiera ses vêtements, se lavera à l’eau de source, et il sera pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le huitième jour, il prendra deux tourterelles ou deux pigeonneaux, il se présentera devant l’Eternel, à l’entrée de la tente de la Rencontre, et donnera les oiseaux au prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui-ci les offrira, l’un comme sacrifice pour le péché, l’autre comme holocauste. Il accomplira ainsi pour lui le rite d’expiation de son écoulement devant l’Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quand un homme aura un épanchement séminal, il lavera tout son corps à l’eau et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tout vêtement ou cuir qui en aura été atteint sera lavé à l’eau et sera impur jusqu’au soir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand un homme et une femme ont eu des relations sexuelles, ils se laveront tous deux à l’eau et seront impurs jusqu’au soir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les impuretés sexuelles de la femme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand une femme perd du sang parce qu’elle a ses règles, sa période d’impureté durera sept jours, quiconque la touchera sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout lit sur lequel elle s’étendra pendant ce temps sera impur, ainsi que tout objet sur lequel elle s’assiéra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quiconque touchera son lit nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Celui qui touchera un meuble quelconque sur lequel elle se sera assise nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'S’il y a un objet sur le lit ou sur le meuble qu’elle occupe, celui qui y touche sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Si un homme a des relations sexuelles avec elle, elle lui communique son état menstruel : il sera impur'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 18.19 ; 20.18.
    marker-yv: yv-n
  - type: text
    text: ' pendant sept jours, et tout lit sur lequel il couchera sera souillé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si une femme a des pertes de sang pendant plusieurs jours en dehors de la période de ses règles ou au-delà, elle sera impure tout le temps que durent ses pertes, comme au temps de ses règles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tout lit sur lequel elle se couchera pendant le temps que durent ses pertes, et tout meuble sur lequel elle s’assiéra seront impurs comme dans le cas de ses règles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quiconque les touchera sera impur ; il nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsque ses pertes cesseront, elle comptera sept jours, après quoi elle sera pure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le huitième jour, elle prendra deux tourterelles ou deux pigeonneaux et les apportera au prêtre, à l’entrée de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le prêtre offrira l’un d’eux comme sacrifice pour le péché et l’autre comme holocauste, il fera ainsi pour elle devant l’Eternel l’expiation des pertes qui la rendaient impure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C’est ainsi que vous tiendrez les Israélites à l’écart de ce qui pourrait les rendre rituellement impurs et les exposerait à être frappés de mort s’ils venaient à rendre impure ma demeure qui est au milieu d’eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Telle est la loi concernant celui qui a une gonorrhée ou un épanchement séminal et qui est ainsi rendu impur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: concernant la femme durant ses règles, toute personne, homme ou femme, atteinte d’un écoulement, et l’homme qui partage la couche d’une femme en état d’impureté.
