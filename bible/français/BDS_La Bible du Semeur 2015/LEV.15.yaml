document_id: LEV.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les impuretés sexuelles de l’homme
  - type: text
    content: 'L’Eternel s’adressa à Moïse et à Aaron en ces termes : '
  '10':
  - type: text
    content: 'Quiconque touchera à un objet quelconque placé sous lui sera impur jusqu’au soir ; et quiconque prendra un tel objet nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  '11':
  - type: text
    content: 'Celui que le malade aura touché, sans s’être rincé les mains à l’eau, nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  '12':
  - type: text
    content: Tout récipient de terre cuite que le malade aura touché sera brisé et tout objet en bois sera lavé à l’eau.
  '13':
  - type: text
    content: 'Quand le malade sera guéri de sa gonorrhée, il comptera sept jours comme temps de purification, puis il nettoiera ses vêtements, se lavera à l’eau de source, et il sera pur. '
  '14':
  - type: text
    content: 'Le huitième jour, il prendra deux tourterelles ou deux pigeonneaux, il se présentera devant l’Eternel, à l’entrée de la tente de la Rencontre, et donnera les oiseaux au prêtre. '
  '15':
  - type: text
    content: Celui-ci les offrira, l’un comme sacrifice pour le péché, l’autre comme holocauste. Il accomplira ainsi pour lui le rite d’expiation de son écoulement devant l’Eternel.
  '16':
  - type: text
    content: 'Quand un homme aura un épanchement séminal, il lavera tout son corps à l’eau et sera impur jusqu’au soir. '
  '17':
  - type: text
    content: Tout vêtement ou cuir qui en aura été atteint sera lavé à l’eau et sera impur jusqu’au soir.
  '18':
  - type: text
    content: Quand un homme et une femme ont eu des relations sexuelles, ils se laveront tous deux à l’eau et seront impurs jusqu’au soir.
  - type: heading
    content: Les impuretés sexuelles de la femme
  '19':
  - type: text
    content: 'Quand une femme perd du sang parce qu’elle a ses règles, sa période d’impureté durera sept jours, quiconque la touchera sera impur jusqu’au soir. '
  '2':
  - type: text
    content: 'Parlez aux Israélites et dites-leur : Si un homme est atteint d’une gonorrhée, l’écoulement qu’elle provoque le rend impur – '
  '20':
  - type: text
    content: 'Tout lit sur lequel elle s’étendra pendant ce temps sera impur, ainsi que tout objet sur lequel elle s’assiéra. '
  '21':
  - type: text
    content: 'Quiconque touchera son lit nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  '22':
  - type: text
    content: 'Celui qui touchera un meuble quelconque sur lequel elle se sera assise nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  '23':
  - type: text
    content: 'S’il y a un objet sur le lit ou sur le meuble qu’elle occupe, celui qui y touche sera impur jusqu’au soir. '
  '24':
  - type: text
    content: 'Si un homme a des relations sexuelles avec elle, elle lui communique son état menstruel : il sera impur'
  - type: note
    content: Voir 18.19 ; 20.18.
  - type: text
    content: ' pendant sept jours, et tout lit sur lequel il couchera sera souillé.'
  '25':
  - type: text
    content: 'Si une femme a des pertes de sang pendant plusieurs jours en dehors de la période de ses règles ou au-delà, elle sera impure tout le temps que durent ses pertes, comme au temps de ses règles. '
  '26':
  - type: text
    content: 'Tout lit sur lequel elle se couchera pendant le temps que durent ses pertes, et tout meuble sur lequel elle s’assiéra seront impurs comme dans le cas de ses règles. '
  '27':
  - type: text
    content: Quiconque les touchera sera impur ; il nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir.
  '28':
  - type: text
    content: 'Lorsque ses pertes cesseront, elle comptera sept jours, après quoi elle sera pure. '
  '29':
  - type: text
    content: 'Le huitième jour, elle prendra deux tourterelles ou deux pigeonneaux et les apportera au prêtre, à l’entrée de la tente de la Rencontre. '
  '3':
  - type: text
    content: 'qu’il y ait écoulement ou obstruction des organes – il y a impureté. '
  '30':
  - type: text
    content: 'Le prêtre offrira l’un d’eux comme sacrifice pour le péché et l’autre comme holocauste, il fera ainsi pour elle devant l’Eternel l’expiation des pertes qui la rendaient impure. '
  '31':
  - type: text
    content: C’est ainsi que vous tiendrez les Israélites à l’écart de ce qui pourrait les rendre rituellement impurs et les exposerait à être frappés de mort s’ils venaient à rendre impure ma demeure qui est au milieu d’eux.
  '32':
  - type: text
    content: 'Telle est la loi concernant celui qui a une gonorrhée ou un épanchement séminal et qui est ainsi rendu impur, '
  '33':
  - type: text
    content: concernant la femme durant ses règles, toute personne, homme ou femme, atteinte d’un écoulement, et l’homme qui partage la couche d’une femme en état d’impureté.
  '4':
  - type: text
    content: 'Tout lit sur lequel cet homme couchera et tout meuble sur lequel il s’assiéra seront impurs. '
  '5':
  - type: text
    content: 'Celui qui touchera son lit nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  '6':
  - type: text
    content: 'Celui qui s’assiéra sur le siège utilisé par cet homme nettoiera ses vêtements, se lavera à l’eau et sera impur jusqu’au soir. '
  '7':
  - type: text
    content: 'Celui qui touchera le malade nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  '8':
  - type: text
    content: 'Si le malade crache sur quelqu’un qui est pur, ce dernier nettoiera ses vêtements, se lavera et sera impur jusqu’au soir. '
  '9':
  - type: text
    content: 'Toute selle sur laquelle aura voyagé le malade sera impure. '
