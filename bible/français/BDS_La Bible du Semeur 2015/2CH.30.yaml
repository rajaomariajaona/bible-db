document_id: 2CH.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les préparatifs de la Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ezéchias envoya des messagers dans tout Israël et Juda, et écrivit même des lettres à Ephraïm et Manassé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Principales tribus du royaume du Nord qu’elles représentent. Ces messagers furent envoyés dans tout Israël.
    marker-yv: yv-n
  - type: text
    text: ', pour les inviter à venir au temple de l’Eternel à Jérusalem afin de célébrer la Pâque en l’honneur de l’Eternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le roi, ses ministres et toute la communauté avaient tenu conseil à Jérusalem et ils avaient convenu de célébrer la Pâque au second mois de l’année
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon la Loi, la Pâque devait être célébrée le 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' jour du premier mois (Nisân ; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12.1-12
        metadata:
          usfm: EXO.12.1+EXO.12.2+EXO.12.3+EXO.12.4+EXO.12.5+EXO.12.6+EXO.12.7+EXO.12.8+EXO.12.9+EXO.12.10+EXO.12.11+EXO.12.12
      - type: text
        text: ). Mais si quelqu’un était impur ce jour-là, il pouvait la fêter le second mois (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 9.2
        metadata:
          usfm: NUM.9.2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
        metadata:
          usfm: NUM.9.3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10-11
        metadata:
          usfm: NUM.9.10+NUM.9.11
      - type: text
        text: ). Ici, un nombre insuffisant de prêtres était en état de pureté rituelle et le peuple n’avait pas eu le temps de venir à Jérusalem (v. 3). D’autre part, ce report a peut-être également été motivé par la volonté de donner le temps aux émissaires du roi de parcourir le territoire des tribus du Nord et aux Israélites qui y subsistaient de se rendre à Jérusalem.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils n’avaient pas pu la célébrer à la date prescrite, car il n’y avait pas suffisamment de prêtres qui se soient purifiés et le peuple ne s’était pas rassemblé à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ce projet parut bon au roi et à toute l’assemblée '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et, comme beaucoup d’Israélites ne célébraient plus la Pâque selon ce qui est écrit, ils décidèrent de faire une annonce dans tout Israël depuis Beer-Sheva jusqu’à Dan pour inviter tout le monde à se rendre à Jérusalem afin de célébrer la Pâque en l’honneur de l’Eternel, le Dieu d’Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les coureurs s’en allèrent dans tout Israël et Juda porter les lettres signées par le roi et ses ministres. Le roi leur avait ordonné de proclamer : Israélites, revenez à l’Eternel, le Dieu d’Abraham, d’Isaac et d’Israël, et il reviendra à vous, vous, les rescapés, qui avez échappé à l’emprise du roi d’Assyrie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion à la déportation d’une partie des Israélites par Sargon en 722 av. J.-C. (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17.5-41
        metadata:
          usfm: 2KI.17.5+2KI.17.6+2KI.17.7+2KI.17.8+2KI.17.9+2KI.17.10+2KI.17.11+2KI.17.12+2KI.17.13+2KI.17.14+2KI.17.15+2KI.17.16+2KI.17.17+2KI.17.18+2KI.17.19+2KI.17.20+2KI.17.21+2KI.17.22+2KI.17.23+2KI.17.24+2KI.17.25+2KI.17.26+2KI.17.27+2KI.17.28+2KI.17.29+2KI.17.30+2KI.17.31+2KI.17.32+2KI.17.33+2KI.17.34+2KI.17.35+2KI.17.36+2KI.17.37+2KI.17.38+2KI.17.39+2KI.17.40+2KI.17.41
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'N’imitez pas vos pères et vos frères qui ont été infidèles à l’Eternel, le Dieu de leurs ancêtres. C’est pour cela que Dieu a fait venir la dévastation sur leur pays comme vous le constatez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maintenant, ne soyez donc pas rebelles comme vos ancêtres, engagez-vous solennellement envers l’Eternel, revenez à son sanctuaire qu’il a consacré pour toujours ! Servez l’Eternel, votre Dieu, pour que sa colère ardente se détourne de vous ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si vous revenez vraiment à l’Eternel, vos compatriotes et vos fils qui ont été déportés trouveront de la compassion auprès de leurs conquérants qui les laisseront revenir dans ce pays ; car l’Eternel est plein de compassion et de grâce, et si vous revenez à lui, il ne vous rejettera pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les coureurs passèrent ainsi de ville en ville dans le territoire d’Ephraïm et de Manassé. Ils poussèrent au nord jusqu’au territoire de Zabulon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire dans les territoires des tribus du Nord. Au-delà de Zabulon, les territoires étaient sous la domination du roi d’Assyrie.
    marker-yv: yv-n
  - type: text
    text: '. Mais on se moquait d’eux et on les tournait en dérision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cependant, quelques membres des tribus d’Aser, de Manassé et de Zabulon s’humilièrent et se rendirent à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Au pays de Juda, Dieu agit puissamment sur la population et la rendit unanime pour obéir à l’ordre du roi et des ministres qui était conforme à la parole de l’Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une Pâque mémorable
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un peuple nombreux afflua donc à Jérusalem pour célébrer la fête des Pains sans levain au second mois. Ils formèrent une immense assemblée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils se mirent à détruire les autels qui se trouvaient dans la ville et ils firent disparaître tous les encensoirs en les jetant dans le ravin du Cédron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis on immola les agneaux pour la Pâque le quatorzième jour du second mois. Les prêtres et les lévites, saisis de honte, s’étaient purifiés et ils offrirent des holocaustes dans le temple de l’Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Chacun prit son poste attitré comme le prescrit la Loi de Moïse, homme de Dieu. Les lévites remettaient le sang des sacrifices aux prêtres qui le répandaient sur l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Comme il y avait dans l’assemblée beaucoup de gens qui ne s’étaient pas purifiés rituellement, les lévites eurent à immoler les agneaux de la Pâque
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Normalement, c’était le chef de famille qui devait immoler l’agneau pascal (Ex 12.3-6 ; Dt 16.1-6).
    marker-yv: yv-n
  - type: text
    text: ' pour toutes ces personnes qui n’étaient pas rituellement pures et donc aptes à accomplir ce geste cultuel pour le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Beaucoup de gens, en effet, et surtout parmi ceux qui étaient venus d’Ephraïm, de Manassé, d’Issacar et de Zabulon, n’avaient pas accompli les rites de purification ; mais ils mangèrent quand même l’agneau de la Pâque, contrairement à ce qui est écrit. C’est pourquoi Ezéchias pria pour eux en ces termes : Eternel, toi qui es bon, veuille pardonner '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: à tous ceux qui se sont efforcés de tout leur cœur de se tourner vers Dieu, l’Eternel, le Dieu de leurs ancêtres, même s’ils ne se sont pas purifiés comme cela est requis pour un acte cultuel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Eternel écouta la prière d’Ezéchias et il laissa le peuple indemne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi les Israélites qui se trouvaient présents à Jérusalem célébrèrent la fête des Pains sans levain pendant sept jours et dans une grande joie. Chaque jour, les lévites et les prêtres chantèrent les louanges de l’Eternel en faisant retentir leurs instruments avec force en son honneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ezéchias adressa des encouragements à tous les lévites qui avaient fait preuve de considération envers l’Eternel.
- type: usfm
  marker: p
  children:
  - type: text
    text: Pendant les sept jours de la fête, ils mangèrent la viande des sacrifices, offrirent des sacrifices de communion, et célébrèrent l’Eternel, le Dieu de leurs ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toute l’assemblée décida de prolonger la fête de sept jours, et ces sept jours supplémentaires furent célébrés dans la joie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: car Ezéchias, roi de Juda, avait donné pour le ravitaillement de l’assemblée mille taureaux et sept mille moutons, et les ministres avaient offert mille taureaux et dix mille moutons. De nombreux prêtres s’étaient rituellement purifiés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour pouvoir accomplir leur service et pour ne plus se trouver dans le cas signalé en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29.34'
        metadata:
          usfm: 2CH.29.34
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Toute l’assemblée, Judéens, prêtres et lévites, tous ceux qui étaient venus d’Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 11.16-17 ; 15.9.
    marker-yv: yv-n
  - type: text
    text: ', ainsi que les immigrés venus d’Israël ou habitant dans le royaume de Juda, tous étaient dans la joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Une grande joie régnait dans toute la ville de Jérusalem. Depuis l’époque de Salomon, fils de David, roi d’Israël, rien de semblable ne s’était produit dans la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Finalement, les prêtres-lévites se levèrent pour bénir le peuple. Leur voix fut entendue et leur prière parvint jusqu’à sa sainte demeure dans le ciel.
