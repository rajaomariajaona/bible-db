document_id: HOS.10
type_code: fra
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le peuple au cœur partagé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Israël est semblable ╵à une vigne ╵qui dégénère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui dégénère
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: luxuriante.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne produit du fruit ╵que pour lui-même.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus il a eu de fruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus il a édifié d’autels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus sa terre était belle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus il embellissait les stèles ╵pour ses divinités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Leur cœur est faux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils vont maintenant ╵devoir payer leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui, l’Eternel, ╵brisera leurs autels
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il renversera leurs stèles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et alors ils diront :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nous n’avons pas de roi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est parce que nous n’avons pas ╵craint l’Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et puis si nous avions un roi, ╵que ferait-il pour nous ? »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils donnent leur parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils font de faux serments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils concluent des alliances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les procès se multiplient
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et les procès se multiplient. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et le droit prospère comme une plante vénéneuse dans les sillons des champs, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ce qui serait une dénonciation de la perversion du droit.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une plante vénéneuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les sillons des champs.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La fin de l’idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ont peur pour le veau ╵de Beth-Aven
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.15'
        metadata:
          usfm: HOS.4.15
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: ', ╵les habitants de Samarie.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à cause de lui, ╵ses prêtres et son peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: prendront le deuil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils se réjouissent donc ╵maintenant de sa gloire ╵qui s’en va loin d’eux en exil !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lui aussi sera emporté ╵bientôt en Assyrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sera offert au roi batailleur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.13'
        metadata:
          usfm: HOS.5.13
      - type: text
        text: ' et note.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Ephraïm ╵récoltera la honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël rougira ╵de ses desseins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Samarie est détruite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son roi est comme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Samarie et son roi sont semblables à.
    marker-yv: yv-n
  - type: text
    text: ' une écorce'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: écorce
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l’écume.
    marker-yv: yv-n
  - type: text
    text: ' ╵emportée par les eaux.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les hauts lieux criminels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 5.
    marker-yv: yv-n
  - type: text
    text: ' ╵où péchait Israël ╵seront détruits.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les chardons et les ronces ╵croîtront sur leurs autels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Alors ils diront aux montagnes : ╵« Recouvrez-nous ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et aux collines : ╵« Tombez sur nous'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Repris en Lc 23.30 ; Ap 6.16.
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: s2
  children:
  - type: text
    text: Menace et appel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: « Depuis le temps de Guibéa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 9.9 ; Jg 19 à 21.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as péché, ô Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu n’as pas changé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La guerre est déclarée ╵aux gens injustes. ╵Ne les atteindra-t-elle pas ╵précisément à Guibéa ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je les corrigerai ╵quand je voudrai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les armées d’autres peuples ╵se ligueront contre eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront enchaînés ╵pour leurs deux crimes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Or, Ephraïm était ╵une génisse bien dressée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle aimait à fouler le grain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je ferai passer ╵son beau cou sous le joug.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais atteler Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Juda labourera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Jacob traînera la herse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pour certains, l’image évoque le passage d’une vie libre, où Ephraïm jouit du fruit de son labeur, à une vie d’esclave où Israël travaille sans pouvoir jouir du fruit de son travail. Pour d’autres, l’image soulignerait plutôt la légèreté d’Israël semblable à une génisse n’acceptant que le travail facile et rechignant devant un travail plus difficile.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Semez pour la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous moissonnerez ╵le fruit de la bonté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Défrichez-vous un champ nouveau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 4.3
        metadata:
          usfm: JER.4.3
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: car voici qu’il est temps ╵de se tourner vers l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: en attendant qu’il vienne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il fasse pleuvoir ╵la justice pour vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous avez labouré, ╵préparé le terrain ╵pour la méchanceté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous avez moissonné ╵de l’injustice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du mensonge, ╵vous en avez mangé le fruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car vous avez placé
- type: usfm
  marker: q1
  children:
  - type: text
    text: votre confiance ╵dans votre politique
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'politique. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction possible, d’après l’ougaritique : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: puissance.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans la multitude ╵de vos guerriers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est pourquoi, chez ton peuple, ╵on entendra ╵un bruit tumultueux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes vos forteresses ╵seront détruites
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme Beth-Arbel ╵l’a été par Salman
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Allusion à un événement inconnu par ailleurs. Selon certains, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth-Arbel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'serait une ville de Transjordanie et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Salman '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le roi moabite nommé Salamana, mentionné sur les tablettes du roi assyrien Tiglath-Piléser III (747 à 727 av. J.-C.). D’autres l’identifient au roi assyrien Salmanasar III (859-824), ou à Salmanasar V (727-722).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: en ce jour de combat
- type: usfm
  marker: q1
  children:
  - type: text
    text: où l’on a renversé la ville ╵sur sa population
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la ville '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sur sa population. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la ville, les villages qui en dépendent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les mères, leurs enfants.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà le triste sort ╵que vous vaudra Béthel
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de l’excès ╵de la méchanceté ╵qui est la vôtre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi d’Israël, dès l’aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne sera plus.
