document_id: HOS.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le peuple au cœur partagé
  - type: text
    content: Israël est semblable ╵à une vigne ╵qui dégénère
  - type: note
    content: 'qui dégénère: d’autres comprennent : luxuriante.'
  - type: text
    content: ','
  - type: text
    content: il ne produit du fruit ╵que pour lui-même.
  - type: text
    content: Plus il a eu de fruit,
  - type: text
    content: plus il a édifié d’autels.
  - type: text
    content: Plus sa terre était belle,
  - type: text
    content: plus il embellissait les stèles ╵pour ses divinités.
  '10':
  - type: text
    content: Je les corrigerai ╵quand je voudrai.
  - type: text
    content: Les armées d’autres peuples ╵se ligueront contre eux,
  - type: text
    content: ils seront enchaînés ╵pour leurs deux crimes.
  '11':
  - type: text
    content: Or, Ephraïm était ╵une génisse bien dressée.
  - type: text
    content: Elle aimait à fouler le grain,
  - type: text
    content: mais je ferai passer ╵son beau cou sous le joug.
  - type: text
    content: Je vais atteler Ephraïm,
  - type: text
    content: Juda labourera,
  - type: text
    content: et Jacob traînera la herse
  - type: note
    content: Pour certains, l’image évoque le passage d’une vie libre, où Ephraïm jouit du fruit de son labeur, à une vie d’esclave où Israël travaille sans pouvoir jouir du fruit de son travail. Pour d’autres, l’image soulignerait plutôt la légèreté d’Israël semblable à une génisse n’acceptant que le travail facile et rechignant devant un travail plus difficile.
  - type: text
    content: .
  '12':
  - type: text
    content: Semez pour la justice
  - type: text
    content: et vous moissonnerez ╵le fruit de la bonté.
  - type: text
    content: Défrichez-vous un champ nouveau
  - type: note
    content: Repris en Jr 4.3.
  - type: text
    content: car voici qu’il est temps ╵de se tourner vers l’Eternel
  - type: text
    content: en attendant qu’il vienne
  - type: text
    content: et qu’il fasse pleuvoir ╵la justice pour vous.
  '13':
  - type: text
    content: Vous avez labouré, ╵préparé le terrain ╵pour la méchanceté.
  - type: text
    content: Vous avez moissonné ╵de l’injustice
  - type: text
    content: et du mensonge, ╵vous en avez mangé le fruit,
  - type: text
    content: car vous avez placé
  - type: text
    content: votre confiance ╵dans votre politique
  - type: note
    content: 'politique. Autre traduction possible, d’après l’ougaritique : puissance.'
  - type: text
    content: et dans la multitude ╵de vos guerriers.
  '14':
  - type: text
    content: C’est pourquoi, chez ton peuple, ╵on entendra ╵un bruit tumultueux.
  - type: text
    content: Toutes vos forteresses ╵seront détruites
  - type: text
    content: tout comme Beth-Arbel ╵l’a été par Salman
  - type: note
    content: Allusion à un événement inconnu par ailleurs. Selon certains, Beth-Arbel serait une ville de Transjordanie et Salman le roi moabite nommé Salamana, mentionné sur les tablettes du roi assyrien Tiglath-Piléser III (747 à 727 av. J.-C.). D’autres l’identifient au roi assyrien Salmanasar III (859-824), ou à Salmanasar V (727-722).
  - type: text
    content: en ce jour de combat
  - type: text
    content: où l’on a renversé la ville ╵sur sa population
  - type: note
    content: 'la ville sur sa population. Autres traductions : la ville, les villages qui en dépendent ou les mères, leurs enfants.'
  - type: text
    content: .
  '15':
  - type: text
    content: Voilà le triste sort ╵que vous vaudra Béthel
  - type: text
    content: à cause de l’excès ╵de la méchanceté ╵qui est la vôtre.
  - type: text
    content: Le roi d’Israël, dès l’aurore,
  - type: text
    content: ne sera plus.
  '2':
  - type: text
    content: Leur cœur est faux,
  - type: text
    content: mais ils vont maintenant ╵devoir payer leurs fautes.
  - type: text
    content: Lui, l’Eternel, ╵brisera leurs autels
  - type: text
    content: et il renversera leurs stèles.
  '3':
  - type: text
    content: 'Et alors ils diront :'
  - type: text
    content: « Nous n’avons pas de roi !
  - type: text
    content: C’est parce que nous n’avons pas ╵craint l’Eternel.
  - type: text
    content: Et puis si nous avions un roi, ╵que ferait-il pour nous ? »
  '4':
  - type: text
    content: Ils donnent leur parole,
  - type: text
    content: ils font de faux serments,
  - type: text
    content: ils concluent des alliances,
  - type: text
    content: et les procès se multiplient
  - type: note
    content: 'et les procès se multiplient. Autre traduction : et le droit prospère comme une plante vénéneuse dans les sillons des champs, ce qui serait une dénonciation de la perversion du droit.'
  - type: text
    content: comme une plante vénéneuse
  - type: text
    content: dans les sillons des champs.
  - type: heading
    content: La fin de l’idolâtrie
  '5':
  - type: text
    content: Ils ont peur pour le veau ╵de Beth-Aven
  - type: note
    content: Voir 4.15 et note.
  - type: text
    content: ', ╵les habitants de Samarie.'
  - type: text
    content: Et à cause de lui, ╵ses prêtres et son peuple
  - type: text
    content: prendront le deuil.
  - type: text
    content: Qu’ils se réjouissent donc ╵maintenant de sa gloire ╵qui s’en va loin d’eux en exil !
  '6':
  - type: text
    content: Lui aussi sera emporté ╵bientôt en Assyrie
  - type: text
    content: et sera offert au roi batailleur
  - type: note
    content: Voir 5.13 et note.
  - type: text
    content: et Ephraïm ╵récoltera la honte,
  - type: text
    content: Israël rougira ╵de ses desseins.
  '7':
  - type: text
    content: Samarie est détruite,
  - type: text
    content: et son roi est comme
  - type: note
    content: 'Autre traduction : Samarie et son roi sont semblables à.'
  - type: text
    content: ' une écorce'
  - type: note
    content: 'écorce: autre traduction : de l’écume.'
  - type: text
    content: ' ╵emportée par les eaux.'
  '8':
  - type: text
    content: Les hauts lieux criminels
  - type: note
    content: Voir v. 5.
  - type: text
    content: ' ╵où péchait Israël ╵seront détruits.'
  - type: text
    content: Les chardons et les ronces ╵croîtront sur leurs autels.
  - type: text
    content: 'Alors ils diront aux montagnes : ╵« Recouvrez-nous ! »'
  - type: text
    content: 'Et aux collines : ╵« Tombez sur nous'
  - type: note
    content: Repris en Lc 23.30 ; Ap 6.16.
  - type: text
    content: '  ! »'
  - type: heading
    content: Menace et appel
  '9':
  - type: text
    content: « Depuis le temps de Guibéa
  - type: note
    content: Voir 9.9 ; Jg 19 à 21.
  - type: text
    content: ','
  - type: text
    content: tu as péché, ô Israël,
  - type: text
    content: et tu n’as pas changé.
  - type: text
    content: La guerre est déclarée ╵aux gens injustes. ╵Ne les atteindra-t-elle pas ╵précisément à Guibéa ?
