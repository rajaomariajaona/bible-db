document_id: JER.18,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le signe du potier
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dans la maison du potier
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel parla à Jérémie en ces termes : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais que ce peuple fait ce que je considère comme mal, et ne m’écoute pas, je renoncerai au bien que j’avais parlé de lui faire.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis donc maintenant aux Judéens et aux habitants de Jérusalem : Voici ce que déclare l’Eternel : Moi je façonne votre malheur, et j’ai des projets contre vous. Que chacun de vous abandonne donc sa conduite mauvaise, qu’il se comporte et qu’il agisse d’une bonne manière. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils te répondront : « C’est peine perdue, nous ferons à notre tête et chacun agira selon les penchants de son cœur obstiné et mauvais. »'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Un oubli coupable
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et c’est pourquoi ╵voici ce que déclare l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Demandez donc aux autres peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si l’on a entendu ╵pareille chose !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La communauté d’Israël ╵a vraiment perpétré ╵un horrible forfait !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avez-vous jamais vu la neige
  - type: usfm
    marker: q1
    children:
    - type: text
      text: abandonner les rochers du Liban ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avez-vous vu tarir ╵les eaux qui en descendent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces eaux qui coulent, fraîches
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Avez-vous vu tarir… fraîches ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hébreu obscur, traduction conjecturale.
      marker-yv: yv-n
    - type: text
      text: '  ?'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais mon peuple m’oublie :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il offre des parfums ╵à des faux dieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui, sur sa route, le font chanceler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui lui font quitter ╵les chemins de toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour marcher sur des sentiers et des routes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne sont pas frayés.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il expose ainsi son pays ╵à la dévastation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour lui attirer pour toujours ╵des sifflements d’horreur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quiconque y passera ╵en sera atterré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et hochera la tête.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le vent d’orient, ╵je les disperserai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant leurs ennemis ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour de leur désastre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur présenterai mon dos
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et non ma face.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Complot contre Jérémie
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors certains se mirent à dire : Allons : formons un plan contre ce Jérémie ! On trouvera toujours des prêtres pour enseigner la Loi, des sages pour nous donner des conseils ainsi que des prophètes pour proclamer une parole. Venez, attaquons-le avec des calomnies ! Et ne prêtons plus attention à tout ce qu’il nous dit !'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, ô Eternel, ╵prête-moi attention,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écoute ce que disent ╵ces gens qui me cherchent querelle.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Va, rends-toi chez le potier et là, je te ferai entendre ma parole.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendront-ils le mal pour le bien ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils creusent une fosse ╵pour m’y faire tomber.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considère, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que, pour plaider ╵en faveur de ces gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis tenu devant toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en vue de détourner ╵ta colère loin d’eux !
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de cela, ╵livre leurs fils à la famine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et précipite-les ╵sur le fil de l’épée !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prive leurs femmes ╵de leurs enfants, ╵qu’elles deviennent veuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que leurs maris ╵soient frappés par la peste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que leurs jeunes gens ╵soient frappés par l’épée ╵dans le combat !
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on entende des cris ╵sortir de leurs demeures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu feras venir ╵subitement sur eux ╵des bandes ennemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu’ils ont creusé ╵des fosses pour me prendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et caché des filets ╵pour m’attraper les pieds !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, ô Eternel, ╵tu connais bien leurs plans
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour me faire mourir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne pardonne pas leur forfait !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’efface pas leur faute ! ╵Ne l’oublie pas !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient terrassés devant toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au temps où ta colère éclate, ╵agis contre eux !
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me rendis donc chez le potier, qui était en train de travailler sur son tour. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le récipient qu’il façonnait avec l’argile ne fut pas réussi. Alors le potier en refit un autre, comme il le jugea bon. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là-dessus, l’Eternel me parla en ces termes : '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: O peuple d’Israël, ne puis-je pas agir à votre égard comme a fait ce potier ? demande l’Eternel. Vous êtes entre mes mains, comme l’argile entre les mains du potier, communauté d’Israël !
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois, je décrète de déraciner un peuple ou un royaume, de le renverser et d’amener sa ruine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour les v. 7-9, voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '1.10'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si ce peuple que j’ai menacé cesse de mal agir, je renoncerai à lui envoyer le malheur que j’avais projeté contre lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si, par contre, je parle de construire et de planter tel peuple, ou tel royaume, '
