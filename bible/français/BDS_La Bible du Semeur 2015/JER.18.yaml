document_id: JER.18,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le signe du potier
  - type: heading
    content: Dans la maison du potier
  - type: text
    content: 'L’Eternel parla à Jérémie en ces termes : '
  '10':
  - type: text
    content: mais que ce peuple fait ce que je considère comme mal, et ne m’écoute pas, je renoncerai au bien que j’avais parlé de lui faire.
  '11':
  - type: text
    content: 'Dis donc maintenant aux Judéens et aux habitants de Jérusalem : Voici ce que déclare l’Eternel : Moi je façonne votre malheur, et j’ai des projets contre vous. Que chacun de vous abandonne donc sa conduite mauvaise, qu’il se comporte et qu’il agisse d’une bonne manière. '
  '12':
  - type: text
    content: 'Mais ils te répondront : « C’est peine perdue, nous ferons à notre tête et chacun agira selon les penchants de son cœur obstiné et mauvais. »'
  - type: heading
    content: Un oubli coupable
  '13':
  - type: text
    content: 'Et c’est pourquoi ╵voici ce que déclare l’Eternel :'
  - type: text
    content: Demandez donc aux autres peuples
  - type: text
    content: si l’on a entendu ╵pareille chose !
  - type: text
    content: La communauté d’Israël ╵a vraiment perpétré ╵un horrible forfait !
  '14':
  - type: text
    content: Avez-vous jamais vu la neige
  - type: text
    content: abandonner les rochers du Liban ?
  - type: text
    content: Avez-vous vu tarir ╵les eaux qui en descendent,
  - type: text
    content: ces eaux qui coulent, fraîches
  - type: note
    content: Avez-vous vu tarir… fraîches ? Hébreu obscur, traduction conjecturale.
  - type: text
    content: '  ?'
  '15':
  - type: text
    content: 'Mais mon peuple m’oublie :'
  - type: text
    content: il offre des parfums ╵à des faux dieux
  - type: text
    content: qui, sur sa route, le font chanceler,
  - type: text
    content: et qui lui font quitter ╵les chemins de toujours
  - type: text
    content: pour marcher sur des sentiers et des routes
  - type: text
    content: qui ne sont pas frayés.
  '16':
  - type: text
    content: Il expose ainsi son pays ╵à la dévastation
  - type: text
    content: pour lui attirer pour toujours ╵des sifflements d’horreur.
  - type: text
    content: Quiconque y passera ╵en sera atterré
  - type: text
    content: et hochera la tête.
  '17':
  - type: text
    content: Comme le vent d’orient, ╵je les disperserai
  - type: text
    content: devant leurs ennemis ;
  - type: text
    content: au jour de leur désastre,
  - type: text
    content: je leur présenterai mon dos
  - type: text
    content: et non ma face.
  - type: heading
    content: Complot contre Jérémie
  '18':
  - type: text
    content: 'Alors certains se mirent à dire : Allons : formons un plan contre ce Jérémie ! On trouvera toujours des prêtres pour enseigner la Loi, des sages pour nous donner des conseils ainsi que des prophètes pour proclamer une parole. Venez, attaquons-le avec des calomnies ! Et ne prêtons plus attention à tout ce qu’il nous dit !'
  '19':
  - type: text
    content: Mais toi, ô Eternel, ╵prête-moi attention,
  - type: text
    content: écoute ce que disent ╵ces gens qui me cherchent querelle.
  '2':
  - type: text
    content: Va, rends-toi chez le potier et là, je te ferai entendre ma parole.
  '20':
  - type: text
    content: Rendront-ils le mal pour le bien ?
  - type: text
    content: Ils creusent une fosse ╵pour m’y faire tomber.
  - type: text
    content: Considère, Eternel,
  - type: text
    content: que, pour plaider ╵en faveur de ces gens,
  - type: text
    content: je me suis tenu devant toi
  - type: text
    content: en vue de détourner ╵ta colère loin d’eux !
  '21':
  - type: text
    content: A cause de cela, ╵livre leurs fils à la famine
  - type: text
    content: et précipite-les ╵sur le fil de l’épée !
  - type: text
    content: Prive leurs femmes ╵de leurs enfants, ╵qu’elles deviennent veuves,
  - type: text
    content: que leurs maris ╵soient frappés par la peste,
  - type: text
    content: et que leurs jeunes gens ╵soient frappés par l’épée ╵dans le combat !
  '22':
  - type: text
    content: Qu’on entende des cris ╵sortir de leurs demeures,
  - type: text
    content: quand tu feras venir ╵subitement sur eux ╵des bandes ennemies,
  - type: text
    content: parce qu’ils ont creusé ╵des fosses pour me prendre
  - type: text
    content: et caché des filets ╵pour m’attraper les pieds !
  '23':
  - type: text
    content: Mais toi, ô Eternel, ╵tu connais bien leurs plans
  - type: text
    content: pour me faire mourir.
  - type: text
    content: Ne pardonne pas leur forfait !
  - type: text
    content: N’efface pas leur faute ! ╵Ne l’oublie pas !
  - type: text
    content: Qu’ils soient terrassés devant toi !
  - type: text
    content: Au temps où ta colère éclate, ╵agis contre eux !
  '3':
  - type: text
    content: 'Je me rendis donc chez le potier, qui était en train de travailler sur son tour. '
  '4':
  - type: text
    content: 'Mais le récipient qu’il façonnait avec l’argile ne fut pas réussi. Alors le potier en refit un autre, comme il le jugea bon. '
  '5':
  - type: text
    content: 'Là-dessus, l’Eternel me parla en ces termes : '
  '6':
  - type: text
    content: O peuple d’Israël, ne puis-je pas agir à votre égard comme a fait ce potier ? demande l’Eternel. Vous êtes entre mes mains, comme l’argile entre les mains du potier, communauté d’Israël !
  '7':
  - type: text
    content: Une fois, je décrète de déraciner un peuple ou un royaume, de le renverser et d’amener sa ruine
  - type: note
    content: Pour les v. 7-9, voir 1.10.
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Mais si ce peuple que j’ai menacé cesse de mal agir, je renoncerai à lui envoyer le malheur que j’avais projeté contre lui. '
  '9':
  - type: text
    content: 'Et si, par contre, je parle de construire et de planter tel peuple, ou tel royaume, '
