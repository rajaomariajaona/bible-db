document_id: MAT.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vraie religion
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 6.37-42)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne condamnez pas les autres, pour ne pas être vous-mêmes condamnés.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car vous serez condamnés vous-mêmes de la manière dont vous aurez condamné autrui, et on vous appliquera la mesure dont vous vous serez servis pour mesurer les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi vois-tu les grains de sciure dans l’œil de ton frère, alors que tu ne remarques pas la poutre qui est dans le tien ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Comment oses-tu dire à ton frère : « Laisse-moi enlever cette sciure de ton œil », alors qu’il y a une poutre dans le tien ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hypocrite ! Commence donc par retirer la poutre de ton œil ; alors tu y verras assez clair pour ôter la sciure de l’œil de ton frère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gardez-vous de donner aux chiens ce qui est sacré, et ne jetez pas vos perles devant les porcs, de peur qu’ils piétinent vos perles et que les chiens se retournent contre vous pour vous déchirer.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 11.9-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Demandez, et vous recevrez ; cherchez, et vous trouverez ; frappez, et l’on vous ouvrira.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car celui qui demande reçoit ; celui qui cherche trouve ; et l’on ouvre à celui qui frappe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui de vous donnera un caillou à son fils quand celui-ci lui demande du pain ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ou bien, s’il lui demande un poisson, lui donnera-t-il un serpent ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si donc, tout mauvais que vous êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison votre Père céleste donnera-t-il de bonnes choses à ceux qui les lui demandent.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 6.31)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Faites pour les autres tout ce que vous voudriez qu’ils fassent pour vous, car c’est là tout l’enseignement de la '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Loi
    - type: text
      text: ' et des '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 13.24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Entrez par la porte étroite ; en effet, large est la porte et spacieuse la route qui mènent à la perdition. Nombreux sont ceux qui s’y engagent.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais étroite est la porte et resserré le sentier qui mènent à la vie ! Qu’ils sont peu nombreux ceux qui les trouvent !
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 6.43-44)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Gardez-vous des faux prophètes ! Lorsqu’ils vous abordent, ils se donnent l’apparence d’agneaux mais, en réalité, ce sont des loups féroces.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous les reconnaîtrez à leurs fruits. Est-ce que l’on cueille des raisins sur des buissons d’épines ou des figues sur des ronces ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ainsi, un bon arbre porte de bons fruits, un mauvais arbre produit de mauvais fruits.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un bon arbre ne peut pas porter de mauvais fruits, ni un mauvais arbre de bons fruits.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout arbre qui ne donne pas de bons fruits est arraché et jeté au feu.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ainsi donc, c’est à leurs fruits que vous les reconnaîtrez.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appliquer l’enseignement reçu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 13.25-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pour entrer dans le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume des cieux
    - type: text
      text: ', il ne suffit pas de me dire : « Seigneur ! Seigneur ! », il faut accomplir la volonté de mon Père céleste.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Au jour du jugement, nombreux sont ceux qui me diront : « Seigneur ! Seigneur ! Nous avons '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophétisé
    - type: text
      text: ' en ton nom, nous avons chassé des démons en ton nom, nous avons fait beaucoup de miracles en ton nom. »'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je leur déclarerai alors : « Je ne vous ai jamais connus ! Allez-vous-en, vous qui pratiquez le mal ! »'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Lc 6.47-49)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi, celui qui écoute ce que je dis et qui l’applique, ressemble à un homme sensé qui a bâti sa maison sur le roc.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il a plu à verse, les fleuves ont débordé, les vents ont soufflé avec violence, ils se sont déchaînés contre cette maison : elle ne s’est pas effondrée, car ses fondations reposaient sur le roc.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais celui qui écoute mes paroles sans faire ce que je dis, ressemble à un homme assez fou pour construire sa maison sur le sable.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il a plu à verse, les fleuves ont débordé, les vents ont soufflé avec violence, ils se sont déchaînés contre cette maison : elle s’est effondrée et sa ruine a été complète.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 1.22 ; Lc 4.32)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand Jésus eut fini de parler, les foules étaient profondément impressionnées par son enseignement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Car il parlait avec une autorité que n’avaient pas leurs spécialistes de la Loi.
