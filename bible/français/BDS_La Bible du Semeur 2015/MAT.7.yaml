document_id: MAT.7,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La vraie religion
  - type: heading
    content: (Lc 6.37-42)
  - type: text
    content: ' '
  - type: text
    content: Ne condamnez pas les autres, pour ne pas être vous-mêmes condamnés.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Ou bien, s’il lui demande un poisson, lui donnera-t-il un serpent ?
  - type: text
    content: ' '
  '11':
  - type: text
    content: Si donc, tout mauvais que vous êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison votre Père céleste donnera-t-il de bonnes choses à ceux qui les lui demandent.
  - type: heading
    content: (Lc 6.31)
  '12':
  - type: text
    content: ' '
  - type: text
    content: 'Faites pour les autres tout ce que vous voudriez qu’ils fassent pour vous, car c’est là tout l’enseignement de la '
  - type: text
    content: Loi
  - type: text
    content: ' et des '
  - type: text
    content: prophètes
  - type: text
    content: .
  - type: heading
    content: (Lc 13.24)
  '13':
  - type: text
    content: ' '
  - type: text
    content: Entrez par la porte étroite ; en effet, large est la porte et spacieuse la route qui mènent à la perdition. Nombreux sont ceux qui s’y engagent.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Mais étroite est la porte et resserré le sentier qui mènent à la vie ! Qu’ils sont peu nombreux ceux qui les trouvent !
  - type: heading
    content: (Lc 6.43-44)
  '15':
  - type: text
    content: ' '
  - type: text
    content: Gardez-vous des faux prophètes ! Lorsqu’ils vous abordent, ils se donnent l’apparence d’agneaux mais, en réalité, ce sont des loups féroces.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Vous les reconnaîtrez à leurs fruits. Est-ce que l’on cueille des raisins sur des buissons d’épines ou des figues sur des ronces ?
  '17':
  - type: text
    content: ' '
  - type: text
    content: Ainsi, un bon arbre porte de bons fruits, un mauvais arbre produit de mauvais fruits.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Un bon arbre ne peut pas porter de mauvais fruits, ni un mauvais arbre de bons fruits.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Tout arbre qui ne donne pas de bons fruits est arraché et jeté au feu.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Car vous serez condamnés vous-mêmes de la manière dont vous aurez condamné autrui, et on vous appliquera la mesure dont vous vous serez servis pour mesurer les autres.
  '20':
  - type: text
    content: Ainsi donc, c’est à leurs fruits que vous les reconnaîtrez.
  - type: heading
    content: Appliquer l’enseignement reçu
  - type: heading
    content: (Lc 13.25-27)
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Pour entrer dans le '
  - type: text
    content: royaume des cieux
  - type: text
    content: ', il ne suffit pas de me dire : « Seigneur ! Seigneur ! », il faut accomplir la volonté de mon Père céleste.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Au jour du jugement, nombreux sont ceux qui me diront : « Seigneur ! Seigneur ! Nous avons '
  - type: text
    content: prophétisé
  - type: text
    content: ' en ton nom, nous avons chassé des démons en ton nom, nous avons fait beaucoup de miracles en ton nom. »'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Je leur déclarerai alors : « Je ne vous ai jamais connus ! Allez-vous-en, vous qui pratiquez le mal ! »'
  - type: heading
    content: (Lc 6.47-49)
  '24':
  - type: text
    content: ' '
  - type: text
    content: C’est pourquoi, celui qui écoute ce que je dis et qui l’applique, ressemble à un homme sensé qui a bâti sa maison sur le roc.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Il a plu à verse, les fleuves ont débordé, les vents ont soufflé avec violence, ils se sont déchaînés contre cette maison : elle ne s’est pas effondrée, car ses fondations reposaient sur le roc.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Mais celui qui écoute mes paroles sans faire ce que je dis, ressemble à un homme assez fou pour construire sa maison sur le sable.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Il a plu à verse, les fleuves ont débordé, les vents ont soufflé avec violence, ils se sont déchaînés contre cette maison : elle s’est effondrée et sa ruine a été complète.'
  - type: heading
    content: (Mc 1.22 ; Lc 4.32)
  '28':
  - type: text
    content: 'Quand Jésus eut fini de parler, les foules étaient profondément impressionnées par son enseignement. '
  '29':
  - type: text
    content: Car il parlait avec une autorité que n’avaient pas leurs spécialistes de la Loi.
  '3':
  - type: text
    content: ' '
  - type: text
    content: Pourquoi vois-tu les grains de sciure dans l’œil de ton frère, alors que tu ne remarques pas la poutre qui est dans le tien ?
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Comment oses-tu dire à ton frère : « Laisse-moi enlever cette sciure de ton œil », alors qu’il y a une poutre dans le tien ?'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Hypocrite ! Commence donc par retirer la poutre de ton œil ; alors tu y verras assez clair pour ôter la sciure de l’œil de ton frère.
  '6':
  - type: text
    content: ' '
  - type: text
    content: Gardez-vous de donner aux chiens ce qui est sacré, et ne jetez pas vos perles devant les porcs, de peur qu’ils piétinent vos perles et que les chiens se retournent contre vous pour vous déchirer.
  - type: heading
    content: (Lc 11.9-13)
  '7':
  - type: text
    content: ' '
  - type: text
    content: Demandez, et vous recevrez ; cherchez, et vous trouverez ; frappez, et l’on vous ouvrira.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Car celui qui demande reçoit ; celui qui cherche trouve ; et l’on ouvre à celui qui frappe.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Qui de vous donnera un caillou à son fils quand celui-ci lui demande du pain ?
  - type: text
    content: ' '
