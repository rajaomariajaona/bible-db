document_id: EZK.32,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La complainte sur le pharaon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Le premier jour du douzième mois de la douzième année
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire en mars 585 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: ', l’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je plongerai beaucoup de peuples dans la consternation à ton sujet et, à cause de toi, leurs rois seront pris d’épouvante lorsque je brandirai mon épée devant eux et, au jour de ta chute, chacun d’eux, sans arrêt, tremblera pour sa vie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Car voici ce que dit ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée du roi de Babylone t’atteindra
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: et je ferai tomber ╵la multitude de ton peuple ╵sous l’épée des guerriers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'du plus brutal des peuples :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils viendront ravager ╵ce qui fait l’orgueil de l’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses habitants ╵seront exterminés.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Et je ferai périr ╵tout son bétail
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du bord des eaux profondes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ne seront plus troublées ╵ni par le pied de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni par le sabot des bestiaux.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je rendrai leurs eaux calmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai couler ╵leurs fleuves comme l’huile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce que déclare ╵le Seigneur, l’Eternel.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lorsque j’aurai réduit l’Egypte ╵à une terre dévastée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand le pays sera vidé ╵de tout ce qu’il contient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque j’aurai frappé ╵tous ceux qui y habitent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ce moment-là, on reconnaîtra ╵que je suis l’Eternel. »
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voilà la complainte que l’on chantera ; ce sont les filles des autres peuples qui la chanteront ; elles la chanteront sur l’Egypte et sur toute sa nombreuse population, le Seigneur, l’Eternel, le déclare.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Le pharaon aux enfers
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: La douzième année, le quinzième jour du mois
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute du douzième mois comme au v. 1.
      marker-yv: yv-n
    - type: text
      text: ', l’Eternel m’adressa la parole en ces termes :'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fils d’homme, entonne un chant funèbre sur la population nombreuse de l’Egypte, fais-la descendre, elle et les peuples des puissantes nations, dans le séjour des morts, avec ceux qui descendent dans la fosse.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Qui surpasses-tu en beauté ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Descends et couche-toi ╵à côté des incirconcis !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fils d’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prononce une complainte ╵sur le pharaon, roi d’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dis-lui :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Tu ressemblais ╵à un jeune lion ╵parmi les peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ressemblais, jadis, ╵au crocodile dans les flots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu te soulevais dans tes fleuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de tes pattes, ╵tu en troublais les eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu salissais tous leurs canaux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire les canaux d’irrigation et les bras du Nil qui parcouraient toute l’Egypte.
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Voici qu’ils tomberont ╵au milieu des victimes ╵transpercées par l’épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée est déjà prête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on emporte l’Egypte ╵avec ses multitudes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Les plus vaillants héros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec ceux qui, jadis, ╵lui donnaient leur soutien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui diront, ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dans le séjour des morts :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Les voilà descendus ╵et les voilà couchés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux, ces incirconcis ╵transpercés par l’épée ! »
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Car là est couchée l’Assyrie ╵et toute sa population,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses tombes sont tout autour d’elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous sont tombés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: blessés à mort ╵sous les coups de l’épée.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ses tombes, on les a mises
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout au fond de la fosse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa population ╵est assemblée ╵autour de son tombeau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont tombés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: blessés à mort ╵sous les coups de l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui répandaient la terreur ╵dedans le monde des vivants.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Là est couché Elam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elam
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à l’est de la Babylonie sur le versant de la chaîne bordant la Mésopotamie.
      marker-yv: yv-n
    - type: text
      text: ' ╵et toute sa population,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses tombes sont tout autour d’elle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont tombés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: blessés à mort ╵sous les coups de l’épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voilà descendus, ╵peuple d’incirconcis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au séjour souterrain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui répandaient la terreur ╵dedans le monde des vivants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils portent sur eux ╵leur déshonneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec tous ceux ╵qui sont descendus dans la fosse.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: On a placé sa couche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de tous ceux ╵qui ont été tués,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec toute sa population ; ╵ses tombes sont tout autour d’elle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ces incirconcis ╵ont péri par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui répandaient la terreur ╵dedans le monde des vivants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils portent sur eux ╵leur déshonneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec tous ceux ╵qui sont descendus dans la fosse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont leur place ╵parmi les victimes.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Là sont Méshek, Toubal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Peuples du Nord, peuplant l’Asie Mineure (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '27.13'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' ╵et toute leur population,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs tombes sont tout autour d’eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ces incirconcis ╵ont péri par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui répandaient la terreur ╵dedans le monde des vivants.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ils ne reposent pas ╵à côté des guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux des incirconcis ╵qui sont tombés ╵sur le champ de bataille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui sont descendus ╵dans le séjour des morts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: revêtus de l’armure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous la tête desquels ╵on a mis leur épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais le poids de leurs crimes ╵repose sur leurs os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ces guerriers répandaient la terreur ╵dedans le monde des vivants.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Toi aussi, pharaon, ╵te voilà abattu ╵au milieu des incirconcis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, te voilà couché ╵avec ceux qui ont péri par l’épée.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Là sont Edom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Edom
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peuple issu d’Esaü installé sur « la montagne de Séir » (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 32.4
        - type: text
          text: ) au sud de Moab près de la mer Morte.
      marker-yv: yv-n
    - type: text
      text: ', ses rois et tous ses princes qui, malgré leur vaillance, se trouvent avec ceux que l’épée a tués. Eux aussi sont couchés à côté des incirconcis et de tous ceux qui sont descendus dans la fosse. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Voici ce que déclare ╵le Seigneur, l’Eternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étendrai sur toi mon filet
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lors d’un rassemblement ╵d’un grand nombre de peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils te tireront dehors ╵avec ma nasse.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Là sont couchés aussi tous les seigneurs du septentrion, et tous les Sidoniens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.30 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Les seigneurs du septentrion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désignent sans doute les chefs phéniciens de Tyr et de Sidon.
      marker-yv: yv-n
    - type: text
      text: ', ils sont descendus là, au milieu des tués. Malgré la terreur qu’inspirait leur vaillance, ils sont couverts de honte. Ils sont couchés, ces incirconcis, avec ceux que l’épée a fait périr et ils portent sur eux leur déshonneur, avec tous ceux qui sont descendus dans la fosse. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'En les voyant, le pharaon pourra se consoler du sort de son peuple nombreux. Le pharaon et son armée périront par l’épée. C’est là ce que déclare le Seigneur, l’Eternel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Car pour ma part, je répandrai la terreur dans le monde des vivants, et on le fera coucher au milieu des incirconcis avec ceux que l’épée a fait périr, oui, lui, le pharaon et tout son nombreux peuple. C’est là ce que déclare le Seigneur, l’Eternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je t’abandonnerai par terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te jetterai ╵par terre dans les champs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai se poser sur toi ╵tous les oiseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te donnerai en pâture ╵à toutes les bêtes sauvages,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: j’exposerai ton corps ╵sur les montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je remplirai les vallées des restes ╵de ta dépouille.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’abreuverai ╵le pays de ton sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’aux montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il remplira les lits des torrents.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Lorsque tu t’éteindras, ╵je voilerai le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’obscurcirai ses astres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je recouvrirai ╵le soleil de nuages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la lune cessera ╵de donner sa clarté.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: J’obscurcirai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de toi tous les astres ╵qui luisent dans le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j’envelopperai ╵ton pays de ténèbres.
  - type: usfm
    marker: q1
