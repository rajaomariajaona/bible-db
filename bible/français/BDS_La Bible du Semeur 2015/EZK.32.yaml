document_id: EZK.32,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La complainte sur le pharaon
  - type: text
    content: Le premier jour du douzième mois de la douzième année
  - type: note
    content: C’est-à-dire en mars 585 av. J.-C.
  - type: text
    content: ', l’Eternel m’adressa la parole en ces termes :'
  '10':
  - type: text
    content: Je plongerai beaucoup de peuples dans la consternation à ton sujet et, à cause de toi, leurs rois seront pris d’épouvante lorsque je brandirai mon épée devant eux et, au jour de ta chute, chacun d’eux, sans arrêt, tremblera pour sa vie.
  '11':
  - type: text
    content: 'Car voici ce que dit ╵le Seigneur, l’Eternel :'
  - type: text
    content: L’épée du roi de Babylone t’atteindra
  '12':
  - type: text
    content: et je ferai tomber ╵la multitude de ton peuple ╵sous l’épée des guerriers
  - type: text
    content: 'du plus brutal des peuples :'
  - type: text
    content: ils viendront ravager ╵ce qui fait l’orgueil de l’Egypte,
  - type: text
    content: et tous ses habitants ╵seront exterminés.
  '13':
  - type: text
    content: Et je ferai périr ╵tout son bétail
  - type: text
    content: du bord des eaux profondes.
  - type: text
    content: Elles ne seront plus troublées ╵ni par le pied de l’homme,
  - type: text
    content: ni par le sabot des bestiaux.
  '14':
  - type: text
    content: Je rendrai leurs eaux calmes
  - type: text
    content: et je ferai couler ╵leurs fleuves comme l’huile.
  - type: text
    content: C’est là ce que déclare ╵le Seigneur, l’Eternel.
  '15':
  - type: text
    content: Lorsque j’aurai réduit l’Egypte ╵à une terre dévastée,
  - type: text
    content: quand le pays sera vidé ╵de tout ce qu’il contient,
  - type: text
    content: lorsque j’aurai frappé ╵tous ceux qui y habitent,
  - type: text
    content: à ce moment-là, on reconnaîtra ╵que je suis l’Eternel. »
  '16':
  - type: text
    content: Voilà la complainte que l’on chantera ; ce sont les filles des autres peuples qui la chanteront ; elles la chanteront sur l’Egypte et sur toute sa nombreuse population, le Seigneur, l’Eternel, le déclare.
  - type: heading
    content: Le pharaon aux enfers
  '17':
  - type: text
    content: La douzième année, le quinzième jour du mois
  - type: note
    content: Sans doute du douzième mois comme au v. 1.
  - type: text
    content: ', l’Eternel m’adressa la parole en ces termes :'
  '18':
  - type: text
    content: Fils d’homme, entonne un chant funèbre sur la population nombreuse de l’Egypte, fais-la descendre, elle et les peuples des puissantes nations, dans le séjour des morts, avec ceux qui descendent dans la fosse.
  '19':
  - type: text
    content: Qui surpasses-tu en beauté ?
  - type: text
    content: Descends et couche-toi ╵à côté des incirconcis !
  '2':
  - type: text
    content: Fils d’homme,
  - type: text
    content: prononce une complainte ╵sur le pharaon, roi d’Egypte,
  - type: text
    content: 'dis-lui :'
  - type: text
    content: « Tu ressemblais ╵à un jeune lion ╵parmi les peuples.
  - type: text
    content: Tu ressemblais, jadis, ╵au crocodile dans les flots,
  - type: text
    content: tu te soulevais dans tes fleuves,
  - type: text
    content: et, de tes pattes, ╵tu en troublais les eaux,
  - type: text
    content: tu salissais tous leurs canaux
  - type: note
    content: C’est-à-dire les canaux d’irrigation et les bras du Nil qui parcouraient toute l’Egypte.
  - type: text
    content: .
  '20':
  - type: text
    content: Voici qu’ils tomberont ╵au milieu des victimes ╵transpercées par l’épée.
  - type: text
    content: L’épée est déjà prête.
  - type: text
    content: Qu’on emporte l’Egypte ╵avec ses multitudes.
  '21':
  - type: text
    content: Les plus vaillants héros,
  - type: text
    content: avec ceux qui, jadis, ╵lui donnaient leur soutien,
  - type: text
    content: lui diront, ce jour-là,
  - type: text
    content: 'dans le séjour des morts :'
  - type: text
    content: « Les voilà descendus ╵et les voilà couchés
  - type: text
    content: eux, ces incirconcis ╵transpercés par l’épée ! »
  '22':
  - type: text
    content: Car là est couchée l’Assyrie ╵et toute sa population,
  - type: text
    content: ses tombes sont tout autour d’elle,
  - type: text
    content: tous sont tombés
  - type: text
    content: blessés à mort ╵sous les coups de l’épée.
  '23':
  - type: text
    content: Ses tombes, on les a mises
  - type: text
    content: tout au fond de la fosse
  - type: text
    content: et sa population ╵est assemblée ╵autour de son tombeau.
  - type: text
    content: Tous sont tombés,
  - type: text
    content: blessés à mort ╵sous les coups de l’épée,
  - type: text
    content: eux qui répandaient la terreur ╵dedans le monde des vivants.
  '24':
  - type: text
    content: Là est couché Elam
  - type: note
    content: 'Elam: à l’est de la Babylonie sur le versant de la chaîne bordant la Mésopotamie.'
  - type: text
    content: ' ╵et toute sa population,'
  - type: text
    content: ses tombes sont tout autour d’elle.
  - type: text
    content: Tous sont tombés
  - type: text
    content: blessés à mort ╵sous les coups de l’épée.
  - type: text
    content: Les voilà descendus, ╵peuple d’incirconcis,
  - type: text
    content: au séjour souterrain,
  - type: text
    content: eux qui répandaient la terreur ╵dedans le monde des vivants,
  - type: text
    content: et ils portent sur eux ╵leur déshonneur
  - type: text
    content: avec tous ceux ╵qui sont descendus dans la fosse.
  '25':
  - type: text
    content: On a placé sa couche
  - type: text
    content: au milieu de tous ceux ╵qui ont été tués,
  - type: text
    content: et avec toute sa population ; ╵ses tombes sont tout autour d’elle.
  - type: text
    content: Tous ces incirconcis ╵ont péri par l’épée,
  - type: text
    content: eux qui répandaient la terreur ╵dedans le monde des vivants.
  - type: text
    content: Et ils portent sur eux ╵leur déshonneur
  - type: text
    content: avec tous ceux ╵qui sont descendus dans la fosse.
  - type: text
    content: Ils ont leur place ╵parmi les victimes.
  '26':
  - type: text
    content: Là sont Méshek, Toubal
  - type: note
    content: Peuples du Nord, peuplant l’Asie Mineure (voir 27.13).
  - type: text
    content: ' ╵et toute leur population,'
  - type: text
    content: leurs tombes sont tout autour d’eux.
  - type: text
    content: Tous ces incirconcis ╵ont péri par l’épée,
  - type: text
    content: eux qui répandaient la terreur ╵dedans le monde des vivants.
  '27':
  - type: text
    content: Ils ne reposent pas ╵à côté des guerriers,
  - type: text
    content: ceux des incirconcis ╵qui sont tombés ╵sur le champ de bataille
  - type: text
    content: et qui sont descendus ╵dans le séjour des morts
  - type: text
    content: revêtus de l’armure,
  - type: text
    content: sous la tête desquels ╵on a mis leur épée.
  - type: text
    content: Mais le poids de leurs crimes ╵repose sur leurs os,
  - type: text
    content: car ces guerriers répandaient la terreur ╵dedans le monde des vivants.
  '28':
  - type: text
    content: Toi aussi, pharaon, ╵te voilà abattu ╵au milieu des incirconcis.
  - type: text
    content: Oui, te voilà couché ╵avec ceux qui ont péri par l’épée.
  '29':
  - type: text
    content: Là sont Edom
  - type: note
    content: 'Edom: peuple issu d’Esaü installé sur « la montagne de Séir » (Gn 32.4) au sud de Moab près de la mer Morte.'
  - type: text
    content: ', ses rois et tous ses princes qui, malgré leur vaillance, se trouvent avec ceux que l’épée a tués. Eux aussi sont couchés à côté des incirconcis et de tous ceux qui sont descendus dans la fosse. '
  '3':
  - type: text
    content: 'Voici ce que déclare ╵le Seigneur, l’Eternel :'
  - type: text
    content: J’étendrai sur toi mon filet
  - type: text
    content: lors d’un rassemblement ╵d’un grand nombre de peuples,
  - type: text
    content: et ils te tireront dehors ╵avec ma nasse.
  '30':
  - type: text
    content: Là sont couchés aussi tous les seigneurs du septentrion, et tous les Sidoniens
  - type: note
    content: Les seigneurs du septentrion désignent sans doute les chefs phéniciens de Tyr et de Sidon.
  - type: text
    content: ', ils sont descendus là, au milieu des tués. Malgré la terreur qu’inspirait leur vaillance, ils sont couverts de honte. Ils sont couchés, ces incirconcis, avec ceux que l’épée a fait périr et ils portent sur eux leur déshonneur, avec tous ceux qui sont descendus dans la fosse. '
  '31':
  - type: text
    content: 'En les voyant, le pharaon pourra se consoler du sort de son peuple nombreux. Le pharaon et son armée périront par l’épée. C’est là ce que déclare le Seigneur, l’Eternel. '
  '32':
  - type: text
    content: Car pour ma part, je répandrai la terreur dans le monde des vivants, et on le fera coucher au milieu des incirconcis avec ceux que l’épée a fait périr, oui, lui, le pharaon et tout son nombreux peuple. C’est là ce que déclare le Seigneur, l’Eternel.
  '4':
  - type: text
    content: Je t’abandonnerai par terre
  - type: text
    content: et je te jetterai ╵par terre dans les champs.
  - type: text
    content: Je ferai se poser sur toi ╵tous les oiseaux,
  - type: text
    content: je te donnerai en pâture ╵à toutes les bêtes sauvages,
  '5':
  - type: text
    content: j’exposerai ton corps ╵sur les montagnes
  - type: text
    content: et je remplirai les vallées des restes ╵de ta dépouille.
  '6':
  - type: text
    content: J’abreuverai ╵le pays de ton sang
  - type: text
    content: jusqu’aux montagnes
  - type: text
    content: et il remplira les lits des torrents.
  '7':
  - type: text
    content: Lorsque tu t’éteindras, ╵je voilerai le ciel,
  - type: text
    content: j’obscurcirai ses astres
  - type: text
    content: et je recouvrirai ╵le soleil de nuages,
  - type: text
    content: la lune cessera ╵de donner sa clarté.
  '8':
  - type: text
    content: J’obscurcirai
  - type: text
    content: à cause de toi tous les astres ╵qui luisent dans le ciel,
  - type: text
    content: et j’envelopperai ╵ton pays de ténèbres.
  - type: text
    content: C’est là ce que déclare ╵le Seigneur, l’Eternel.
  '9':
  - type: text
    content: 'J’affligerai le cœur d’un grand nombre de peuples car je ferai subir les répercussions de ta ruine à diverses nations, à travers des pays que tu ne connais pas. '
