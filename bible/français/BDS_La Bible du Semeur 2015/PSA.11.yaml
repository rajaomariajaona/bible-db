document_id: PSA.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un abri sûr
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Un psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, j’ai fait mon refuge ╵de l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi alors me répéter :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Prends ton vol, comme un passereau, ╵afin de fuir dans les montagnes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les montagnes de Judée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: qui ont servi de refuge à David et à ses amis lorsqu’ils étaient persécutés par Saül. Ce sont peut-être les amis de David qui lui donnent ce conseil assorti de sa justification (v. 2).
      marker-yv: yv-n
    - type: text
      text: '  » ?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois les méchants bander leur arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poser leur flèche sur la corde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tirer dans l’obscurité ╵sur ceux dont le cœur est intègre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque les fondements vacillent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que peut bien faire l’homme droit ?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel est dans son saint temple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel a son trône au ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de ses yeux il observe :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sonde les humains,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’Eternel sonde ╵ceux qui sont justes, ╵mais il déteste le méchant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’homme épris de violence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait pleuvoir sur les méchants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du charbon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon une version grecque. Le texte hébreu a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: filets.
      marker-yv: yv-n
    - type: text
      text: ', du feu et du soufre.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les expose au vent brûlant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: simoun, vent chaud et violent du désert.
      marker-yv: yv-n
    - type: text
      text: '  : ╵voilà la part qu’il leur réserve.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Eternel est un Dieu juste, ╵et il aime les actes ╵accomplis selon la justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes droits verront sa face.
