document_id: PSA.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Un abri sûr
  - type: text
    content: Au chef de chœur. Un psaume de David.
  - type: text
    content: Oui, j’ai fait mon refuge ╵de l’Eternel.
  - type: text
    content: 'Pourquoi alors me répéter :'
  - type: text
    content: « Prends ton vol, comme un passereau, ╵afin de fuir dans les montagnes
  - type: note
    content: C’est-à-dire les montagnes de Judée qui ont servi de refuge à David et à ses amis lorsqu’ils étaient persécutés par Saül. Ce sont peut-être les amis de David qui lui donnent ce conseil assorti de sa justification (v. 2).
  - type: text
    content: '  » ?'
  '2':
  - type: text
    content: Vois les méchants bander leur arc,
  - type: text
    content: poser leur flèche sur la corde
  - type: text
    content: pour tirer dans l’obscurité ╵sur ceux dont le cœur est intègre.
  '3':
  - type: text
    content: Lorsque les fondements vacillent,
  - type: text
    content: que peut bien faire l’homme droit ?
  '4':
  - type: text
    content: L’Eternel est dans son saint temple,
  - type: text
    content: l’Eternel a son trône au ciel,
  - type: text
    content: 'de ses yeux il observe :'
  - type: text
    content: il sonde les humains,
  '5':
  - type: text
    content: l’Eternel sonde ╵ceux qui sont justes, ╵mais il déteste le méchant
  - type: text
    content: et l’homme épris de violence.
  '6':
  - type: text
    content: Il fait pleuvoir sur les méchants
  - type: text
    content: du charbon
  - type: note
    content: 'Selon une version grecque. Le texte hébreu a : filets.'
  - type: text
    content: ', du feu et du soufre.'
  - type: text
    content: Il les expose au vent brûlant
  - type: note
    content: Le simoun, vent chaud et violent du désert.
  - type: text
    content: '  : ╵voilà la part qu’il leur réserve.'
  '7':
  - type: text
    content: Car l’Eternel est un Dieu juste, ╵et il aime les actes ╵accomplis selon la justice.
  - type: text
    content: Les hommes droits verront sa face.
