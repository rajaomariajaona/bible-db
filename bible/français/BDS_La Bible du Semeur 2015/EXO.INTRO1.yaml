document_id: EXO.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre de l’Exode raconte comment Dieu, après quatre siècles de « silence » (Gn 15.13), « s’est souvenu de son alliance avec Abraham, Isaac et Jacob (Ex 2.24) » : il est intervenu en faveur des Israélites en Egypte pour établir une alliance avec eux.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A cause d’un changement de dynastie dans le pays (1.8), la situation se détériore pour les Hébreux : le pharaon, inquiet de leur grand nombre, les réduit en esclavage, comme l’avait annoncé l’Eternel (Gn 15.13). Alors Dieu suscite un homme, Moïse, secondé par son frère Aaron, à qui il confie la mission de faire sortir les Israélites d’Egypte (chap. 2 à 13), puis de les guider dans le désert (chap. 14 à 18). Cet « exode », mot qui signifie « sortie », a eu lieu, selon les spécialistes, vers 1445 ou vers 1290 av. J.-C.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Les chapitres 19 à 40 décrivent les étapes de l’établissement de l’alliance entre l’Eternel, le Suzerain, et Israël, le peuple vassal. Celles-ci sont comme rythmées par les montées de Moïse vers Dieu sur le mont Sinaï et par ses retours vers le peuple au pied de la montagne (19.3, 7, 8, 14, etc.).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La charte de l’alliance, les dix commandements (20.1-17), est proclamée, introduite par cette déclaration fondamentale du Suzerain de l’alliance : « Je suis l’Eternel ton Dieu qui t’ai fait sortir d’Egypte, du pays où tu étais esclave » (20.2). Après l’énoncé du contenu du « livre de l’alliance » (24.7), de 20.22 à 23.32, l’alliance est ratifiée par le peuple et par Dieu (24.1-18). Puis l’Eternel donne à Moïse des instructions pour la construction et le service du tabernacle, lieu où va se manifester la présence du Suzerain au milieu de son peuple (chap. 25 à 31). C’est alors qu’éclate la crise du veau d’or, avec l’arrêt des procédures de l’alliance (32.1 à 34.3). Mais dans son amour, l’Eternel réaffirme sa volonté de faire alliance avec Israël (34.4-35), et après la construction du tabernacle, son sanctuaire (35.1 à 40.33), « la nuée enveloppa la tente de la Rencontre et la gloire de l’Eternel remplit le tabernacle » (40.34).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’Exode, avec l’alliance du Sinaï, est l’événement fondateur par lequel un peuple opprimé, Israël, est devenu pour l’Eternel « un royaume de prêtres, une nation sainte » (19.6). Tout au long de leur histoire, les Israélites se souviendront de cette délivrance miraculeuse, rappelée dans l’année « liturgique » par la fête de la Pâque et la fête des Cabanes. Jusqu’au jour où s’accomplira le grand Exode hors du péché grâce au sacrifice de Jésus, l’« agneau pascal » (1 Co 5.7), qui s’est donné lui-même pour fonder, par l’Esprit, « une communauté de rois-prêtres » et « une nation sainte » : l’Eglise (1 P 2.9).'
