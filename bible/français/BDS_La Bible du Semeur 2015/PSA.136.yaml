document_id: PSA.136,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Son amour est éternel
  - type: text
    content: Célébrez l’Eternel, ╵car il est bon,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir 100.5 ; 106.1 ; 107.1 ; 118.1, 29 ; 1 Ch 16.34 ; 2 Ch 5.13 ; 7.3 ; Esd 3.11 ; Jr 33.11.
  - type: text
    content: .
  '10':
  - type: text
    content: Il frappa les premiers-nés de l’Egypte,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir Ex 12.29.
  - type: text
    content: .
  '11':
  - type: text
    content: Il en fit sortir Israël,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir Ex 12.51.
  - type: text
    content: ','
  '12':
  - type: text
    content: par sa grande puissance, ╵en déployant sa force,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Pour les v. 12-15, voir Ex 14.15-29.
  - type: text
    content: .
  '13':
  - type: text
    content: Il fendit en deux la mer des Roseaux,
  - type: text
    content: car son amour dure à toujours.
  '14':
  - type: text
    content: Il y fit passer Israël,
  - type: text
    content: car son amour dure à toujours.
  '15':
  - type: text
    content: Et il précipita ╵le pharaon et son armée ╵dans la mer des Roseaux,
  - type: text
    content: car son amour dure à toujours.
  '16':
  - type: text
    content: Il conduisit son peuple ╵à travers le désert,
  - type: text
    content: car son amour dure à toujours.
  '17':
  - type: text
    content: Il frappa de grands rois
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir 135.10-12.
  - type: text
    content: .
  '18':
  - type: text
    content: Il fit périr ╵de puissants souverains,
  - type: text
    content: car son amour dure à toujours.
  '19':
  - type: text
    content: Il fit périr Sihôn, ╵roi des Amoréens,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir Nb 21.21-30.
  - type: text
    content: .
  '2':
  - type: text
    content: Oui, célébrez le Dieu des dieux,
  - type: text
    content: car son amour dure à toujours.
  '20':
  - type: text
    content: Et Og, roi du Basan,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir Nb 21.31-35.
  - type: text
    content: .
  '21':
  - type: text
    content: Il donna leur pays ╵en possession,
  - type: text
    content: car son amour dure à toujours,
  '22':
  - type: text
    content: en possession ╵à Israël, son serviteur,
  - type: text
    content: car son amour dure à toujours.
  '23':
  - type: text
    content: Dans notre humiliation, ╵il est intervenu pour nous,
  - type: text
    content: car son amour dure à toujours.
  '24':
  - type: text
    content: Il nous a délivrés ╵de tous nos ennemis,
  - type: text
    content: car son amour dure à toujours.
  '25':
  - type: text
    content: Il donne à toute créature ╵sa nourriture,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir 104.27-28.
  - type: text
    content: .
  '26':
  - type: text
    content: Louez le Dieu des cieux,
  - type: text
    content: car son amour dure à toujours.
  '3':
  - type: text
    content: Célébrez tous le Seigneur des seigneurs,
  - type: text
    content: car son amour dure à toujours.
  '4':
  - type: text
    content: Lui seul a opéré de merveilleux prodiges,
  - type: text
    content: car son amour dure à toujours.
  '5':
  - type: text
    content: Il a créé le ciel par son intelligence,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir Gn 1.1, 6-8.
  - type: text
    content: .
  '6':
  - type: text
    content: Et il a étendu la terre sur les eaux,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Voir Gn 1.2, 9-10  ; cf. Ps 24.2.
  - type: text
    content: .
  '7':
  - type: text
    content: Il a fait les grands astres,
  - type: text
    content: car son amour dure à toujours
  - type: note
    content: Pour les v. 7-9, voir Gn 1.14-18.
  - type: text
    content: .
  '8':
  - type: text
    content: Il a fait le soleil pour présider au jour,
  - type: text
    content: car son amour dure à toujours,
  '9':
  - type: text
    content: la lune et les étoiles pour présider à la nuit,
  - type: text
    content: car son amour dure à toujours.
