  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fendit en deux la mer des Roseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car son amour dure à toujours.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y fit passer Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car son amour dure à toujours.
  '15':
  - type: usfm
    marker: q1
    children:
