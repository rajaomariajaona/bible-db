document_id: 1CH.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de David
  - type: heading
    content: La fin de Saül
  - type: heading
    content: (1 S 31.1-13 ; 2 S 1.4-12)
  - type: text
    content: Les Philistins attaquèrent Israël. Les soldats israélites s’enfuirent devant eux et beaucoup d’entre eux furent tués sur le mont Guilboa
  - type: note
    content: Mont situé au nord-est de la Samarie, en bordure de la plaine de Jizréel, à environ 80 kilomètres de Jérusalem.
  - type: text
    content: '. '
  '10':
  - type: text
    content: Ils déposèrent les armes dans le temple de leurs dieux et suspendirent son crâne dans le temple de Dagôn
  - type: note
    content: Voir note Jg 16.23.
  - type: text
    content: .
  '11':
  - type: text
    content: Lorsque tous les habitants de Yabesh en Galaad
  - type: note
    content: Localité située à quelque 70 kilomètres de Jérusalem, à l’est du Jourdain (voir Jg 21.8 et note).
  - type: text
    content: ' apprirent tout ce que les Philistins avaient fait à Saül, '
  '12':
  - type: text
    content: les hommes les plus vaillants se mirent en route, ils enlevèrent le corps de Saül et celui de ses fils et les ramenèrent à Yabesh. Ils enterrèrent leurs ossements
  - type: note
    content: Après avoir incinéré les corps (voir 1 S 31.12).
  - type: text
    content: ' sous le tamaris de Yabesh, puis ils jeûnèrent pendant sept jours.'
  '13':
  - type: text
    content: Saül mourut à cause de la désobéissance dont il s’était rendu coupable envers l’Eternel. Il n’avait pas respecté la parole de l’Eternel et, de plus, il avait interrogé et consulté quelqu’un qui évoque les morts
  - type: note
    content: Ce verset fait allusion aux épisodes rapportés en 1 S 13.8-14 ; 15.1-24 ; 28.
  - type: text
    content: ' '
  '14':
  - type: text
    content: au lieu de consulter l’Eternel. L’Eternel le fit mourir et transféra la royauté à David, fils d’Isaï.
  '2':
  - type: text
    content: 'Les Philistins s’acharnèrent à poursuivre Saül et ses fils et ils tuèrent Jonathan, Abinadab et Malkishoua, fils de Saül. '
  '3':
  - type: text
    content: 'Dès lors, tout le combat se concentra sur Saül. Les archers le découvrirent, et il en fut terrifié. '
  '4':
  - type: text
    content: 'Alors il ordonna à celui qui portait ses armes : Dégaine ton épée et tue-moi, pour que ces incirconcis ne viennent pas me faire subir leurs outrages.'
  - type: text
    content: 'Mais celui-ci refusa car il tremblait de peur. Alors Saül prit lui-même l’épée et se jeta dessus. '
  '5':
  - type: text
    content: Quand l’écuyer vit que Saül était mort, il se jeta lui aussi sur l’arme et mourut.
  '6':
  - type: text
    content: 'Ainsi périrent ensemble, le même jour, Saül, ses trois fils et toute sa famille. '
  '7':
  - type: text
    content: Quand tous les hommes d’Israël qui habitaient la vallée virent que l’armée était en déroute et que Saül et ses fils étaient morts, ils abandonnèrent leurs villes et prirent la fuite. Les Philistins allèrent s’y établir.
  '8':
  - type: text
    content: 'Le lendemain, les Philistins vinrent sur le champ de bataille pour détrousser les cadavres. Ils découvrirent Saül et ses fils qui étaient tombés sur le mont Guilboa. '
  '9':
  - type: text
    content: 'Alors ils dépouillèrent Saül de son armure, emportèrent sa tête et ses armes. Puis ils firent annoncer la nouvelle de leur triomphe à travers tout le pays des Philistins, à leurs idoles et parmi la population. '
