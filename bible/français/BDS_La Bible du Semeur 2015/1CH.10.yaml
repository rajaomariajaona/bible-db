document_id: 1CH.10
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le règne de David
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fin de Saül
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 S 31.1-13 ; 2 S 1.4-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les Philistins attaquèrent Israël. Les soldats israélites s’enfuirent devant eux et beaucoup d’entre eux furent tués sur le mont Guilboa
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mont situé au nord-est de la Samarie, en bordure de la plaine de Jizréel, à environ 80 kilomètres de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les Philistins s’acharnèrent à poursuivre Saül et ses fils et ils tuèrent Jonathan, Abinadab et Malkishoua, fils de Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dès lors, tout le combat se concentra sur Saül. Les archers le découvrirent, et il en fut terrifié. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors il ordonna à celui qui portait ses armes : Dégaine ton épée et tue-moi, pour que ces incirconcis ne viennent pas me faire subir leurs outrages.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais celui-ci refusa car il tremblait de peur. Alors Saül prit lui-même l’épée et se jeta dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quand l’écuyer vit que Saül était mort, il se jeta lui aussi sur l’arme et mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ainsi périrent ensemble, le même jour, Saül, ses trois fils et toute sa famille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand tous les hommes d’Israël qui habitaient la vallée virent que l’armée était en déroute et que Saül et ses fils étaient morts, ils abandonnèrent leurs villes et prirent la fuite. Les Philistins allèrent s’y établir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le lendemain, les Philistins vinrent sur le champ de bataille pour détrousser les cadavres. Ils découvrirent Saül et ses fils qui étaient tombés sur le mont Guilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors ils dépouillèrent Saül de son armure, emportèrent sa tête et ses armes. Puis ils firent annoncer la nouvelle de leur triomphe à travers tout le pays des Philistins, à leurs idoles et parmi la population. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils déposèrent les armes dans le temple de leurs dieux et suspendirent son crâne dans le temple de Dagôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 16.23
        metadata:
          usfm: JDG.16.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lorsque tous les habitants de Yabesh en Galaad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Localité située à quelque 70 kilomètres de Jérusalem, à l’est du Jourdain (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 21.8
        metadata:
          usfm: JDG.21.8
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: ' apprirent tout ce que les Philistins avaient fait à Saül, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: les hommes les plus vaillants se mirent en route, ils enlevèrent le corps de Saül et celui de ses fils et les ramenèrent à Yabesh. Ils enterrèrent leurs ossements
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Après avoir incinéré les corps (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 31.12
        metadata:
          usfm: 1SA.31.12
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' sous le tamaris de Yabesh, puis ils jeûnèrent pendant sept jours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Saül mourut à cause de la désobéissance dont il s’était rendu coupable envers l’Eternel. Il n’avait pas respecté la parole de l’Eternel et, de plus, il avait interrogé et consulté quelqu’un qui évoque les morts
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset fait allusion aux épisodes rapportés en 1 S 13.8-14 ; 15.1-24 ; 28.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: au lieu de consulter l’Eternel. L’Eternel le fit mourir et transféra la royauté à David, fils d’Isaï.
