document_id: NUM.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deux trompettes d’argent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Eternel parla à Moïse en ces termes : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fais fabriquer deux trompettes d’argent martelé. Elles te serviront pour convoquer la communauté et donner le signal du départ aux camps
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 2
        metadata:
          usfm: NUM.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dès que ces deux trompettes sonneront ensemble, toute la communauté se rassemblera auprès de toi à l’entrée de la tente de la Rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si on ne sonne que d’une trompette, seuls les chefs des corps d’armée d’Israël se réuniront auprès de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand vous ferez retentir un signal éclatant, les camps stationnés à l’est partiront. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque ce signal éclatant retentira pour la deuxième fois, les tribus campant au sud se mettront en marche. La sonnerie éclatante sera le signal des départs. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais pour convoquer l’assemblée, vous sonnerez de la trompette sans faire entendre un son éclatant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Seuls les prêtres descendants d’Aaron sonneront des trompettes. Ce sera une ordonnance en vigueur à perpétuité pour vous et vos descendants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque vous serez installés dans votre pays et que vous partirez en guerre contre un agresseur, vous ferez retentir un signal éclatant de vos trompettes, ainsi vous vous rappellerez à l’attention de l’Eternel votre Dieu, et vous serez délivrés de vos ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous sonnerez aussi de ces trompettes dans vos jours de joie, lors de vos fêtes religieuses et au commencement des mois, lorsque vous offrirez vos holocaustes et vos sacrifices de communion. Ce sera un moyen de vous rappeler au souvenir de votre Dieu. Je suis l’Eternel, votre Dieu.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Du Sinaï aux steppes de Moab
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’ordre de départ des troupes d’Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le vingtième jour du deuxième mois de la deuxième année, la nuée s’éleva au-dessus du tabernacle de l’acte de l’alliance. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les Israélites partirent du désert du Sinaï, marchant d’étape en étape. La nuée s’arrêta dans le désert de Parân. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’était la première fois qu’ils levaient le camp sur l’ordre de l’Eternel transmis par Moïse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 2
        metadata:
          usfm: NUM.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le camp des descendants de Juda précédé de sa bannière se mit d’abord en marche avec ses troupes, comprenant les troupes de Juda, sous les ordres de Nahshôn, fils d’Amminadab, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les troupes de la tribu des descendants d’Issacar, sous les ordres de Netanéel, fils de Tsouar, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: et celles de la tribu des descendants de Zabulon, sous les ordres d’Eliab, fils de Hélôn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après cela, le tabernacle fut démonté, et les Guershonites ainsi que les Merarites se mirent en marche, en le portant. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis le camp de Ruben se mit en marche précédé de sa bannière, avec ses troupes comprenant les troupes de Ruben, sous les ordres d’Elitsour, fils de Shedéour, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'les troupes de la tribu des descendants de Siméon, sous les ordres de Sheloumiel descendant de Tsourishaddaï, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: et celles de la tribu des descendants de Gad, sous les ordres d’Eliasaph, fils de Déouel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ensuite les Qehatites se mirent en marche portant les objets sacrés. On devait monter le tabernacle avant l’arrivée des Qehatites à l’étape suivante. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ensuite le camp des descendants d’Ephraïm se mit en marche précédé de sa bannière avec ses troupes comprenant les troupes d’Ephraïm, sous les ordres d’Elishama, fils d’Ammihoud, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'les troupes de la tribu des descendants de Manassé, sous les ordres de Gamliel, fils de Pédahtsour, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: et celles de la tribu des descendants de Benjamin, sous les ordres d’Abidân, fils de Guideoni.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A l’arrière-garde de toutes les troupes le camp des descendants de Dan partit précédé de sa bannière avec ses troupes comprenant les troupes de Dan, sous les ordres d’Ahiézer, fils d’Ammishaddaï, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'les troupes de la tribu des descendants d’Aser sous les ordres de Paguiel, fils d’Okrân, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'et celles de la tribu de Nephtali, sous les ordres d’Ahira, fils d’Enân. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tel était l’ordre de départ des Israélites répartis en corps d’armée lorsqu’ils levaient le camp.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le départ du Sinaï
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse dit à Hobab, fils de son beau-père Reouel le Madianite : Nous partons pour la contrée que l’Eternel a promis de nous donner. Viens donc avec nous ; tu t’en trouveras bien car l’Eternel a promis de faire du bien à Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hobab lui répondit : Je ne te suivrai pas, je préfère retourner dans mon pays auprès de ma famille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse insista : Ne nous quitte pas, je te prie ; car tu connais bien ce désert et les endroits où nous pourrons y installer notre camp, et tu pourras nous servir de guide. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Si tu nous accompagnes, nous te ferons participer au bonheur que l’Eternel va nous accorder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les Israélites partirent de la montagne de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3.1
        metadata:
          usfm: EXO.3.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et marchèrent durant trois jours. Durant ces trois jours, le coffre de l’alliance de l’Eternel les précéda pour leur chercher un lieu d’étape. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Lorsqu’ils quittaient le campement, la nuée de l’Eternel les couvrait pendant le jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Chaque fois que le coffre sacré partait, Moïse priait :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Lève-toi, Eternel, et que tes ennemis soient dispersés ; que ceux qui te haïssent fuient devant toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 68.2
        metadata:
          usfm: PSA.68.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et lorsqu’on le déposait, il disait :'
- type: usfm
  marker: p
  children:
  - type: text
    text: Reviens, Eternel, auprès des multitudes des troupes d’Israël !
