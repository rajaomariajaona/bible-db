document_id: NUM.10,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux trompettes d’argent
  - type: text
    content: 'L’Eternel parla à Moïse en ces termes : '
  '10':
  - type: text
    content: Vous sonnerez aussi de ces trompettes dans vos jours de joie, lors de vos fêtes religieuses et au commencement des mois, lorsque vous offrirez vos holocaustes et vos sacrifices de communion. Ce sera un moyen de vous rappeler au souvenir de votre Dieu. Je suis l’Eternel, votre Dieu.
  - type: heading
    content: Du Sinaï aux steppes de Moab
  - type: heading
    content: L’ordre de départ des troupes d’Israël
  '11':
  - type: text
    content: 'Le vingtième jour du deuxième mois de la deuxième année, la nuée s’éleva au-dessus du tabernacle de l’acte de l’alliance. '
  '12':
  - type: text
    content: 'Les Israélites partirent du désert du Sinaï, marchant d’étape en étape. La nuée s’arrêta dans le désert de Parân. '
  '13':
  - type: text
    content: C’était la première fois qu’ils levaient le camp sur l’ordre de l’Eternel transmis par Moïse
  - type: note
    content: Voir Nb 2.
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Le camp des descendants de Juda précédé de sa bannière se mit d’abord en marche avec ses troupes, comprenant les troupes de Juda, sous les ordres de Nahshôn, fils d’Amminadab, '
  '15':
  - type: text
    content: 'les troupes de la tribu des descendants d’Issacar, sous les ordres de Netanéel, fils de Tsouar, '
  '16':
  - type: text
    content: et celles de la tribu des descendants de Zabulon, sous les ordres d’Eliab, fils de Hélôn.
  '17':
  - type: text
    content: 'Après cela, le tabernacle fut démonté, et les Guershonites ainsi que les Merarites se mirent en marche, en le portant. '
  '18':
  - type: text
    content: 'Puis le camp de Ruben se mit en marche précédé de sa bannière, avec ses troupes comprenant les troupes de Ruben, sous les ordres d’Elitsour, fils de Shedéour, '
  '19':
  - type: text
    content: 'les troupes de la tribu des descendants de Siméon, sous les ordres de Sheloumiel descendant de Tsourishaddaï, '
  '2':
  - type: text
    content: Fais fabriquer deux trompettes d’argent martelé. Elles te serviront pour convoquer la communauté et donner le signal du départ aux camps
  - type: note
    content: Voir Nb 2.
  - type: text
    content: '. '
  '20':
  - type: text
    content: et celles de la tribu des descendants de Gad, sous les ordres d’Eliasaph, fils de Déouel.
  '21':
  - type: text
    content: 'Ensuite les Qehatites se mirent en marche portant les objets sacrés. On devait monter le tabernacle avant l’arrivée des Qehatites à l’étape suivante. '
  '22':
  - type: text
    content: 'Ensuite le camp des descendants d’Ephraïm se mit en marche précédé de sa bannière avec ses troupes comprenant les troupes d’Ephraïm, sous les ordres d’Elishama, fils d’Ammihoud, '
  '23':
  - type: text
    content: 'les troupes de la tribu des descendants de Manassé, sous les ordres de Gamliel, fils de Pédahtsour, '
  '24':
  - type: text
    content: et celles de la tribu des descendants de Benjamin, sous les ordres d’Abidân, fils de Guideoni.
  '25':
  - type: text
    content: 'A l’arrière-garde de toutes les troupes le camp des descendants de Dan partit précédé de sa bannière avec ses troupes comprenant les troupes de Dan, sous les ordres d’Ahiézer, fils d’Ammishaddaï, '
  '26':
  - type: text
    content: 'les troupes de la tribu des descendants d’Aser sous les ordres de Paguiel, fils d’Okrân, '
  '27':
  - type: text
    content: 'et celles de la tribu de Nephtali, sous les ordres d’Ahira, fils d’Enân. '
  '28':
  - type: text
    content: Tel était l’ordre de départ des Israélites répartis en corps d’armée lorsqu’ils levaient le camp.
  - type: heading
    content: Le départ du Sinaï
  '29':
  - type: text
    content: 'Moïse dit à Hobab, fils de son beau-père Reouel le Madianite : Nous partons pour la contrée que l’Eternel a promis de nous donner. Viens donc avec nous ; tu t’en trouveras bien car l’Eternel a promis de faire du bien à Israël.'
  '3':
  - type: text
    content: 'Dès que ces deux trompettes sonneront ensemble, toute la communauté se rassemblera auprès de toi à l’entrée de la tente de la Rencontre. '
  '30':
  - type: text
    content: 'Hobab lui répondit : Je ne te suivrai pas, je préfère retourner dans mon pays auprès de ma famille.'
  '31':
  - type: text
    content: 'Moïse insista : Ne nous quitte pas, je te prie ; car tu connais bien ce désert et les endroits où nous pourrons y installer notre camp, et tu pourras nous servir de guide. '
  '32':
  - type: text
    content: Si tu nous accompagnes, nous te ferons participer au bonheur que l’Eternel va nous accorder.
  '33':
  - type: text
    content: Les Israélites partirent de la montagne de l’Eternel
  - type: note
    content: Voir Ex 3.1.
  - type: text
    content: ' et marchèrent durant trois jours. Durant ces trois jours, le coffre de l’alliance de l’Eternel les précéda pour leur chercher un lieu d’étape. '
  '34':
  - type: text
    content: Lorsqu’ils quittaient le campement, la nuée de l’Eternel les couvrait pendant le jour.
  '35':
  - type: text
    content: 'Chaque fois que le coffre sacré partait, Moïse priait :'
  - type: text
    content: Lève-toi, Eternel, et que tes ennemis soient dispersés ; que ceux qui te haïssent fuient devant toi
  - type: note
    content: Voir Ps 68.2.
  - type: text
    content: '  !'
  '36':
  - type: text
    content: 'Et lorsqu’on le déposait, il disait :'
  - type: text
    content: Reviens, Eternel, auprès des multitudes des troupes d’Israël !
  '4':
  - type: text
    content: 'Si on ne sonne que d’une trompette, seuls les chefs des corps d’armée d’Israël se réuniront auprès de toi. '
  '5':
  - type: text
    content: 'Quand vous ferez retentir un signal éclatant, les camps stationnés à l’est partiront. '
  '6':
  - type: text
    content: 'Lorsque ce signal éclatant retentira pour la deuxième fois, les tribus campant au sud se mettront en marche. La sonnerie éclatante sera le signal des départs. '
  '7':
  - type: text
    content: Mais pour convoquer l’assemblée, vous sonnerez de la trompette sans faire entendre un son éclatant.
  '8':
  - type: text
    content: Seuls les prêtres descendants d’Aaron sonneront des trompettes. Ce sera une ordonnance en vigueur à perpétuité pour vous et vos descendants.
  '9':
  - type: text
    content: 'Lorsque vous serez installés dans votre pays et que vous partirez en guerre contre un agresseur, vous ferez retentir un signal éclatant de vos trompettes, ainsi vous vous rappellerez à l’attention de l’Eternel votre Dieu, et vous serez délivrés de vos ennemis. '
