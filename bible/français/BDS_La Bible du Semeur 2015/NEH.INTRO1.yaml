      text: 432 Retour de Néhémie à Jérusalem (13.6-7)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En 445, Néhémie, haut fonctionnaire de l’empereur Artaxerxès I
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ', attristé par les nouvelles qu’il reçoit de Jérusalem, obtient de l’empereur l’autorisation de se rendre à Jérusalem pour relever les murailles de la ville. Les craintes de Néhémie (2.2) se comprennent fort bien à la lumière du refus de l’empereur, quinze ou vingt ans auparavant (Esd 4.7-23), d’autoriser ces travaux.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Lors de son premier séjour de douze ans à Jérusalem (chap. 1 à 12), Néhémie, homme d’une grande piété (1.4-11 ; 2.4 ; 4.3 ; 6.9-14), entreprend une œuvre d’envergure. Elle sera politique : la réfection des murailles de Jérusalem est réalisée en cinquante-deux jours (6.5) malgré l’opposition et les tentatives d’assassinat des ennemis des Israélites (chap. 4 et 6). Néhémie réorganise le peuplement de toute la région (chap. 11). Son œuvre sera aussi sociale : il s’élève contre les injustices, donnant lui-même l’exemple du désintéressement (chap. 5). Les chapitres 8 à 10 livrent la clé de la motivation de Néhémie : la volonté de se conformer aux clauses de l’alliance de l’Eternel avec le peuple. Avant la dédicace solennelle de la muraille de Jérusalem (12.27-43), Esdras, avec Néhémie à ses côtés (8.9), lit publiquement la Loi de Moïse (8.1-8), ce qui conduit le peuple à prendre l’engagement par écrit d’obéir aux commandements de l’Eternel (chap. 10).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Néhémie parti, la situation se dégrade rapidement parmi les Judéens. Contrairement aux engagements pris (10.30-40), nombreux sont ceux qui ne respectent pas la Loi de l’alliance : des non-Israélites sont accueillis jusque dans les annexes du Temple, on retient les dîmes destinées aux lévites, le sabbat n’est pas respecté et l’on se marie avec des non-Israélites. Lors de son retour, à l’exemple d’Esdras vingt-cinq ans auparavant, Néhémie tentera de régler ces problèmes.'
