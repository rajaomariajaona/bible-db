    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ce livre est la suite de celui d’Esdras avec lequel il ne forme qu’un seul volume dans les anciens manuscrits hébreux et grecs. Comme le livre d’Esdras, celui de Néhémie contient plusieurs listes qui proviennent de documents officiels (chap. 3 ; 10.1-28 ; 11.3-36 ; 12.1-26). La liste des hommes revenus d’exil de 7.6-72 reproduit, à quelques détails près, celle d’Esdras 2. Les passages écrits à la première personne constituent les « mémoires » de Néhémie (chap. 1 à 7 ; 10 ; 12.27 à 13.31). D’autres appartiennent encore aux « mémoires » d’Esdras (chap. 8 à 9, voir introduction au livre d’Esdras). Les repères chronologiques essentiels pour le livre sont les suivants :'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 445 av. J.-C Vingtième année du règne d’Artaxerxès (1.1)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: mars-avril Demande de Néhémie à l’empereur (2.1)
  - type: usfm
