document_id: JOS.17,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le territoire de la demi-tribu de Manassé (domaine occidental)
  - type: text
    content: 'Puis le tirage au sort attribua un patrimoine à la tribu de Manassé, fils premier-né de Joseph. Makir, le fils aîné de Manassé, le père de Galaad qui fut un homme de guerre, avait déjà reçu les régions de Galaad et du Basan. '
  '10':
  - type: text
    content: Ainsi le territoire d’Ephraïm s’étendait vers le sud, celui de Manassé, vers le nord. La mer servait de frontière à l’ouest. Du côté nord, ils touchaient à Aser, du côté est à Issacar.
  '11':
  - type: text
    content: 'Manassé reçut encore plusieurs villes dans les territoires d’Aser et d’Issacar : Beth-Sheân'
  - type: note
    content: Une ville importante au sud du lac de Galilée conquise plus tard (voir 1 S 31.10 où elle est encore aux mains des alliés des Philistins).
  - type: text
    content: ' et les villes qui en dépendent, Yibleam et les villes qui en dépendent, ainsi que Dor, Eyn-Dor, Taanak, Meguiddo avec leurs habitants et les villes qui en dépendent, c’est-à-dire trois contrées. '
  '12':
  - type: text
    content: 'Cependant les gens de Manassé ne réussirent pas à déposséder les habitants de ces villes et les Cananéens se maintinrent dans le pays. '
  '13':
  - type: text
    content: Même lorsque les Israélites eurent accru leur puissance, ils leur imposèrent des corvées, mais ne les dépossédèrent pas.
  - type: heading
    content: Les descendants de Joseph veulent s’étendre
  '14':
  - type: text
    content: Les descendants de Joseph
  - type: note
    content: C’est-à-dire les deux tribus d’Ephraïm et de Manassé.
  - type: text
    content: ' vinrent se plaindre à Josué en disant : Pourquoi nous as-tu attribué par le sort seulement une part du pays, alors que l’Eternel nous a tellement bénis jusqu’à présent que nous sommes devenus très nombreux ?'
  '15':
  - type: text
    content: 'Josué leur répondit : Si vous êtes tellement nombreux, et si la région montagneuse d’Ephraïm ne vous suffit pas, allez donc vous défricher du terrain dans les forêts appartenant aux Phéréziens et aux Rephaïm.'
  '16':
  - type: text
    content: 'Les fils de Joseph répliquèrent : Il est vrai que la région montagneuse ne nous suffit pas, mais tous les Cananéens qui habitent dans les plaines de Beth-Sheân et des villes voisines, ainsi que ceux de la vallée de Jizréel'
  - type: note
    content: Vallée fertile de la Galilée appelée plus tard vallée d’Esdrelon.
  - type: text
    content: ', possèdent des chars bardés de fer pour combattre'
  - type: note
    content: Chars de combat à deux roues, bardés de plaques de fer, donnant l’avantage dans les batailles en plaine.
  - type: text
    content: .
  '17':
  - type: text
    content: 'Alors Josué dit aux gens d’Ephraïm et de Manassé, descendants de Joseph : Vous êtes un peuple nombreux et fort, vous ne serez pas réduits à un lot unique. '
  '18':
  - type: text
    content: Vous posséderez toute la région montagneuse couverte de forêts, vous la défricherez et vous l’occuperez jusqu’à ses limites extrêmes. Vous en déposséderez les Cananéens malgré leurs chars bardés de fer et malgré leur puissance.
  '2':
  - type: text
    content: Les autres descendants de Manassé, c’est-à-dire ceux d’Abiézer, de Héleq, d’Asriel, de Sichem, de Hépher et de Shemida, les fils de Manassé, fils de Joseph, reçurent aussi une part pour leurs familles.
  '3':
  - type: text
    content: 'Tselophhad, descendant de Manassé par Makir, Galaad et Hépher, n’eut pas de fils ; il n’eut que des filles qui s’appelaient : Mahla, Noa, Hogla, Milka et Tirtsa ; '
  '4':
  - type: text
    content: 'elles allèrent trouver le prêtre Eléazar, Josué, fils de Noun, et les responsables du peuple. Elles leur dirent : L’Eternel a ordonné à Moïse de nous donner un patrimoine comme aux hommes de notre tribu.'
  - type: text
    content: 'On leur attribua donc un patrimoine comme aux frères de leur père, conformément à l’ordre de l’Eternel. '
  '5':
  - type: text
    content: 'La tribu de Manassé reçut par conséquent dix parts – sans compter les régions de Galaad et du Basan situées à l’est du Jourdain. '
  '6':
  - type: text
    content: En effet, des descendantes de Manassé reçurent une propriété, tout comme les hommes de cette tribu, et le pays de Galaad appartint aux autres descendants de Manassé.
  '7':
  - type: text
    content: 'Le territoire de Manassé s’étendait d’Aser à Mikmetath, en face de Sichem. Puis leur frontière descendait vers Yamîn chez les habitants d’Eyn-Tappouah. '
  '8':
  - type: text
    content: 'Le territoire de Tappouah appartenait à Manassé, mais la ville elle-même, située à la limite de Manassé, était aux descendants d’Ephraïm. '
  '9':
  - type: text
    content: 'Ensuite, la frontière descendait au torrent de Qana, qu’elle rejoignait sur la rive sud. Les villes de cette région, enclavées parmi celles de Manassé, étaient à Ephraïm. La frontière de Manassé passait au nord du torrent et débouchait sur la mer. '
