document_id: JOS.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire de la demi-tribu de Manassé (domaine occidental)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis le tirage au sort attribua un patrimoine à la tribu de Manassé, fils premier-né de Joseph. Makir, le fils aîné de Manassé, le père de Galaad qui fut un homme de guerre, avait déjà reçu les régions de Galaad et du Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les autres descendants de Manassé, c’est-à-dire ceux d’Abiézer, de Héleq, d’Asriel, de Sichem, de Hépher et de Shemida, les fils de Manassé, fils de Joseph, reçurent aussi une part pour leurs familles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tselophhad, descendant de Manassé par Makir, Galaad et Hépher, n’eut pas de fils ; il n’eut que des filles qui s’appelaient : Mahla, Noa, Hogla, Milka et Tirtsa ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'elles allèrent trouver le prêtre Eléazar, Josué, fils de Noun, et les responsables du peuple. Elles leur dirent : L’Eternel a ordonné à Moïse de nous donner un patrimoine comme aux hommes de notre tribu.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'On leur attribua donc un patrimoine comme aux frères de leur père, conformément à l’ordre de l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La tribu de Manassé reçut par conséquent dix parts – sans compter les régions de Galaad et du Basan situées à l’est du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, des descendantes de Manassé reçurent une propriété, tout comme les hommes de cette tribu, et le pays de Galaad appartint aux autres descendants de Manassé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le territoire de Manassé s’étendait d’Aser à Mikmetath, en face de Sichem. Puis leur frontière descendait vers Yamîn chez les habitants d’Eyn-Tappouah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le territoire de Tappouah appartenait à Manassé, mais la ville elle-même, située à la limite de Manassé, était aux descendants d’Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ensuite, la frontière descendait au torrent de Qana, qu’elle rejoignait sur la rive sud. Les villes de cette région, enclavées parmi celles de Manassé, étaient à Ephraïm. La frontière de Manassé passait au nord du torrent et débouchait sur la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ainsi le territoire d’Ephraïm s’étendait vers le sud, celui de Manassé, vers le nord. La mer servait de frontière à l’ouest. Du côté nord, ils touchaient à Aser, du côté est à Issacar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Manassé reçut encore plusieurs villes dans les territoires d’Aser et d’Issacar : Beth-Sheân'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Une ville importante au sud du lac de Galilée conquise plus tard (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 31.10
        metadata:
          usfm: 1SA.31.10
      - type: text
        text: ' où elle est encore aux mains des alliés des Philistins).'
    marker-yv: yv-n
  - type: text
    text: ' et les villes qui en dépendent, Yibleam et les villes qui en dépendent, ainsi que Dor, Eyn-Dor, Taanak, Meguiddo avec leurs habitants et les villes qui en dépendent, c’est-à-dire trois contrées. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cependant les gens de Manassé ne réussirent pas à déposséder les habitants de ces villes et les Cananéens se maintinrent dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Même lorsque les Israélites eurent accru leur puissance, ils leur imposèrent des corvées, mais ne les dépossédèrent pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les descendants de Joseph veulent s’étendre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les descendants de Joseph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire les deux tribus d’Ephraïm et de Manassé.
    marker-yv: yv-n
  - type: text
    text: ' vinrent se plaindre à Josué en disant : Pourquoi nous as-tu attribué par le sort seulement une part du pays, alors que l’Eternel nous a tellement bénis jusqu’à présent que nous sommes devenus très nombreux ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Josué leur répondit : Si vous êtes tellement nombreux, et si la région montagneuse d’Ephraïm ne vous suffit pas, allez donc vous défricher du terrain dans les forêts appartenant aux Phéréziens et aux Rephaïm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les fils de Joseph répliquèrent : Il est vrai que la région montagneuse ne nous suffit pas, mais tous les Cananéens qui habitent dans les plaines de Beth-Sheân et des villes voisines, ainsi que ceux de la vallée de Jizréel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Vallée fertile de la Galilée appelée plus tard vallée d’Esdrelon.
    marker-yv: yv-n
  - type: text
    text: ', possèdent des chars bardés de fer pour combattre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chars de combat à deux roues, bardés de plaques de fer, donnant l’avantage dans les batailles en plaine.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Josué dit aux gens d’Ephraïm et de Manassé, descendants de Joseph : Vous êtes un peuple nombreux et fort, vous ne serez pas réduits à un lot unique. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vous posséderez toute la région montagneuse couverte de forêts, vous la défricherez et vous l’occuperez jusqu’à ses limites extrêmes. Vous en déposséderez les Cananéens malgré leurs chars bardés de fer et malgré leur puissance.
