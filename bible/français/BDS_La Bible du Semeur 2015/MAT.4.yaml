document_id: MAT.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La tentation de Jésus
  - type: heading
    content: (Mc 1.12-13 ; Lc 4.1-13)
  - type: text
    content: 'Alors l’Esprit conduisit Jésus dans le désert pour qu’il y soit tenté par le diable. '
  '10':
  - type: text
    content: 'Alors Jésus lui dit : '
  - type: text
    content: 'Va-t’en, '
  - type: text
    content: Satan
  - type: text
    content: '  ! Car il est écrit :'
  - type: text
    content: Tu adoreras le Seigneur, ton Dieu,
  - type: text
    content: et c’est à lui seul que tu rendras un culte
  - type: text
    content: ' '
  - type: note
    content: Dt 6.13 .
  - type: text
    content: .
  '11':
  - type: text
    content: Là-dessus, le diable le laissa. Et voici que des anges vinrent et se mirent à le servir.
  - type: heading
    content: Jésus à Capernaüm et en Galilée
  - type: heading
    content: (Mc 1.14-15 ; Lc 4.14-15)
  '12':
  - type: text
    content: 'Quand Jésus apprit que Jean avait été emprisonné, il se retira en Galilée, '
  '13':
  - type: text
    content: 'mais il ne resta pas à Nazareth. Il alla s’établir à Capernaüm, une ville située au bord du lac, dans les territoires de Zabulon et de Nephtali. '
  '14':
  - type: text
    content: 'Ainsi s’accomplit cette parole du prophète Esaïe qui avait annoncé :'
  '15':
  - type: text
    content: ' '
  - type: text
    content: Ecoute, ô toi, terre de Zabulon
  - type: text
    content: ' ╵'
  - type: text
    content: et toi, terre de Nephtali,
  - type: text
    content: route de la mer,
  - type: text
    content: ' ╵'
  - type: text
    content: 'située au-delà du '
  - type: text
    content: Jourdain
  - type: text
    content: ','
  - type: text
    content: 'ô toi, Galilée des populations étrangères :'
  '16':
  - type: text
    content: ' '
  - type: text
    content: Le peuple qui vivait dans les ténèbres
  - type: text
    content: a vu briller une grande lumière,
  - type: text
    content: et sur ceux qui habitaient dans le pays
  - type: text
    content: sur lequel planait l’ombre de la mort,
  - type: text
    content: une lumière s’est levée
  - type: text
    content: ' '
  - type: note
    content: Es 8.23 ; 9.1.
  - type: text
    content: .
  '17':
  - type: text
    content: 'A partir de ce moment, Jésus commença à prêcher en public en disant : '
  - type: text
    content: Changez
  - type: note
    content: 'Autres traductions : repentez-vous ou changez d’attitude ou changez de comportement.'
  - type: text
    content: ', car le royaume'
  - type: note
    content: Voir note 3.2.
  - type: text
    content: ' '
  - type: text
    content: des cieux est proche.
  - type: heading
    content: (Mc 1.16-20 ; Lc 5.1-11)
  '18':
  - type: text
    content: 'Un jour qu’il marchait au bord du lac de Galilée, il vit deux frères : Simon (qu’on appelle aussi Pierre), et André, son frère, qui lançaient un filet dans le lac, car ils étaient pêcheurs. '
  '19':
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: Suivez-moi et je ferai de vous des pêcheurs d’hommes.
  '2':
  - type: text
    content: 'Après avoir jeûné pendant quarante jours et quarante nuits, il eut faim. '
  '20':
  - type: text
    content: Ils abandonnèrent aussitôt leurs filets et le suivirent.
  '21':
  - type: text
    content: 'Poursuivant son chemin, il vit deux autres frères : Jacques, fils de Zébédée, et Jean, son frère. Ils étaient dans leur bateau avec Zébédée, leur père, et ils réparaient leurs filets. Il les appela '
  '22':
  - type: text
    content: et, aussitôt, ils laissèrent leur bateau, quittèrent leur père, et le suivirent.
  - type: heading
    content: (Mc 3.7-12 ; Lc 6.17-19)
  '23':
  - type: text
    content: Jésus parcourait toute la Galilée, il enseignait dans les synagogues, proclamait la bonne nouvelle du royaume
  - type: note
    content: Voir note 3.2.
  - type: text
    content: ' des cieux et guérissait les gens de toutes maladies et de toutes infirmités. '
  '24':
  - type: text
    content: 'Bientôt, on entendit parler de lui dans toute la Syrie. On lui amena tous ceux qui étaient atteints de diverses maladies et souffraient de divers maux : ceux qui étaient sous l’emprise de démons ainsi que des épileptiques'
  - type: note
    content: L’épilepsie est une maladie provoquant des convulsions et des évanouissements.
  - type: text
    content: ' et des paralysés, et il les guérit tous. '
  '25':
  - type: text
    content: Des foules nombreuses se mirent à le suivre ; elles étaient venues de la Galilée, de la région des « Dix Villes »
  - type: note
    content: La région des « Dix Villes » se trouvait au sud-est du lac de Galilée.
  - type: text
    content: ', de Jérusalem, de la Judée et du territoire transjordanien.'
  '3':
  - type: text
    content: 'Le tentateur s’approcha et lui dit : Si tu es le Fils de Dieu, ordonne que ces pierres se changent en pains.'
  '4':
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: 'Il est écrit :'
  - type: text
    content: L’homme ne vivra pas seulement de pain,
  - type: text
    content: mais aussi de toute parole que Dieu prononce
  - type: text
    content: ' '
  - type: note
    content: Dt 8.3 .
  - type: text
    content: .
  '5':
  - type: text
    content: 'Alors le diable l’emmena dans la cité sainte, le plaça tout en haut du Temple '
  '6':
  - type: text
    content: 'et lui dit : Si tu es le Fils de Dieu, jette-toi en bas, car il est écrit :'
  - type: text
    content: Il donnera des ordres
  - type: text
    content: ' ╵'
  - type: text
    content: 'à ses '
  - type: text
    content: anges
  - type: text
    content: ' à ton sujet'
  - type: text
    content: 'et '
  - type: text
    content: ils te porteront sur leurs mains
  - type: text
    content: pour que ton pied ne heurte pas de pierre
  - type: text
    content: ' '
  - type: note
    content: Ps 91.11-12 .
  - type: text
    content: .
  '7':
  - type: text
    content: 'Jésus lui dit : '
  - type: text
    content: 'Il est aussi écrit : '
  - type: text
    content: Tu ne forceras pas la main au Seigneur, ton Dieu
  - type: note
    content: Dt 6.16.
  - type: text
    content: .
  '8':
  - type: text
    content: 'Le diable l’emmena encore sur une très haute montagne. Là, il lui montra tous les royaumes du monde et leur magnificence. '
  '9':
  - type: text
    content: 'Puis il lui dit : Tout cela, je te le donnerai si tu te prosternes devant moi pour m’adorer.'
