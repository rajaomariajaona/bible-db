document_id: MAT.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tentation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 1.12-13 ; Lc 4.1-13)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors l’Esprit conduisit Jésus dans le désert pour qu’il y soit tenté par le diable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Après avoir jeûné pendant quarante jours et quarante nuits, il eut faim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le tentateur s’approcha et lui dit : Si tu es le Fils de Dieu, ordonne que ces pierres se changent en pains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: L’homme ne vivra pas seulement de pain,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mais aussi de toute parole que Dieu prononce
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 8.3
        metadata:
          usfm: DEU.8.3
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors le diable l’emmena dans la cité sainte, le plaça tout en haut du Temple '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et lui dit : Si tu es le Fils de Dieu, jette-toi en bas, car il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il donnera des ordres
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'à ses '
    - type: usfm
      marker: w
      children:
      - type: text
        text: anges
    - type: text
      text: ' à ton sujet'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ils te porteront sur leurs mains
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour que ton pied ne heurte pas de pierre
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 91.11-12
        metadata:
          usfm: PSA.91.11+PSA.91.12
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il est aussi écrit : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne forceras pas la main au Seigneur, ton Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.16
        metadata:
          usfm: DEU.6.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le diable l’emmena encore sur une très haute montagne. Là, il lui montra tous les royaumes du monde et leur magnificence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis il lui dit : Tout cela, je te le donnerai si tu te prosternes devant moi pour m’adorer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Jésus lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Va-t’en, '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Satan
    - type: text
      text: '  ! Car il est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu adoreras le Seigneur, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et c’est à lui seul que tu rendras un culte
    - type: text
      text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 6.13
        metadata:
          usfm: DEU.6.13
      - type: text
        text: ' .'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Là-dessus, le diable le laissa. Et voici que des anges vinrent et se mirent à le servir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Capernaüm et en Galilée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 1.14-15 ; Lc 4.14-15)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Jésus apprit que Jean avait été emprisonné, il se retira en Galilée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mais il ne resta pas à Nazareth. Il alla s’établir à Capernaüm, une ville située au bord du lac, dans les territoires de Zabulon et de Nephtali. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi s’accomplit cette parole du prophète Esaïe qui avait annoncé :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ecoute, ô toi, terre de Zabulon
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et toi, terre de Nephtali,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: route de la mer,
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'située au-delà du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Jourdain
    - type: text
      text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'ô toi, Galilée des populations étrangères :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le peuple qui vivait dans les ténèbres
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: a vu briller une grande lumière,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et sur ceux qui habitaient dans le pays
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sur lequel planait l’ombre de la mort,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: une lumière s’est levée
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 8.23 ; 9.1.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A partir de ce moment, Jésus commença à prêcher en public en disant : '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: w
      children:
      - type: text
        text: Changez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'repentez-vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'changez d’attitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: changez de comportement.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', car le royaume'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.2'
        metadata:
          usfm: MAT.3.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: des cieux est proche.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 1.16-20 ; Lc 5.1-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un jour qu’il marchait au bord du lac de Galilée, il vit deux frères : Simon (qu’on appelle aussi Pierre), et André, son frère, qui lançaient un filet dans le lac, car ils étaient pêcheurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suivez-moi et je ferai de vous des pêcheurs d’hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils abandonnèrent aussitôt leurs filets et le suivirent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Poursuivant son chemin, il vit deux autres frères : Jacques, fils de Zébédée, et Jean, son frère. Ils étaient dans leur bateau avec Zébédée, leur père, et ils réparaient leurs filets. Il les appela '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: et, aussitôt, ils laissèrent leur bateau, quittèrent leur père, et le suivirent.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 3.7-12 ; Lc 6.17-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jésus parcourait toute la Galilée, il enseignait dans les synagogues, proclamait la bonne nouvelle du royaume
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.2'
        metadata:
          usfm: MAT.3.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' des cieux et guérissait les gens de toutes maladies et de toutes infirmités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Bientôt, on entendit parler de lui dans toute la Syrie. On lui amena tous ceux qui étaient atteints de diverses maladies et souffraient de divers maux : ceux qui étaient sous l’emprise de démons ainsi que des épileptiques'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’épilepsie est une maladie provoquant des convulsions et des évanouissements.
    marker-yv: yv-n
  - type: text
    text: ' et des paralysés, et il les guérit tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Des foules nombreuses se mirent à le suivre ; elles étaient venues de la Galilée, de la région des « Dix Villes »
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La région des « Dix Villes » se trouvait au sud-est du lac de Galilée.
    marker-yv: yv-n
  - type: text
    text: ', de Jérusalem, de la Judée et du territoire transjordanien.'
