document_id: 1JN.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Distinguer les vrais prophètes des prophètes de mensonge
  - type: text
    content: 'Mais attention, mes chers amis, ne vous fiez pas à n’importe quel esprit ; mettez les esprits à l’épreuve pour voir s’ils viennent de Dieu, car bien des prophètes de mensonge se sont répandus à travers le monde. '
  '10':
  - type: text
    content: 'Voici en quoi consiste l’amour : ce n’est pas nous qui avons aimé Dieu, mais c’est lui qui nous a aimés ; aussi a-t-il envoyé son Fils pour expier nos péchés'
  - type: note
    content: 'Autre traduction : pour apaiser sa colère causée par nos péchés. Cf. 2.2.'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Mes chers amis, puisque Dieu nous a tant aimés, nous devons, nous aussi, nous aimer les uns les autres. '
  '12':
  - type: text
    content: Dieu, personne ne l’a jamais vu. Mais si nous nous aimons les uns les autres, Dieu demeure en nous et son amour se manifeste pleinement parmi nous.
  '13':
  - type: text
    content: 'Voici comment nous savons que nous demeurons en lui et qu’il demeure en nous : c’est par son Esprit qu’il nous a donné. '
  '14':
  - type: text
    content: 'Nous l’avons vu de nos yeux et nous en parlons en témoins : le Père a envoyé son Fils pour être le Sauveur du monde.'
  '15':
  - type: text
    content: 'Si quelqu’un reconnaît que Jésus est le Fils de Dieu, Dieu demeure en lui et lui en Dieu. '
  '16':
  - type: text
    content: 'Et nous, nous avons connu l’amour que Dieu nous porte et nous y avons cru. Dieu est amour : celui qui demeure dans l’amour demeure en Dieu, et Dieu demeure en lui. '
  '17':
  - type: text
    content: 'Et voici pourquoi l’amour se manifeste pleinement parmi nous : c’est pour que nous ayons une entière assurance au jour du jugement, d’autant plus que notre situation dans ce monde est celle que Christ a connue lui-même'
  - type: note
    content: 'Autre traduction : car ce qui est vrai pour Christ est vrai pour nous dans ce monde.'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Dans l’amour, il n’y a pas de place pour la crainte, car l’amour parvenu à une pleine maturité chasse toute crainte. En effet, la crainte suppose la perspective d’un châtiment. L’amour de celui qui vit dans la crainte n’est pas encore parvenu à sa pleine maturité. '
  '19':
  - type: text
    content: Quant à nous, nous aimons parce que Dieu nous a aimés le premier.
  '2':
  - type: text
    content: 'Voici comment savoir s’il s’agit de l’Esprit de Dieu : tout esprit qui reconnaît que c’est pleinement humain que Jésus est venu, vient de Dieu. '
  '20':
  - type: text
    content: Si quelqu’un prétend aimer Dieu tout en détestant son frère, c’est un menteur. Car s’il n’aime pas son frère qu’il voit, il ne peut pas aimer Dieu qu’il ne voit pas.
  '21':
  - type: text
    content: 'D’ailleurs, Christ lui-même nous a donné ce commandement : que celui qui aime Dieu aime aussi son frère.'
  '3':
  - type: text
    content: Tout esprit, au contraire, qui ne reconnaît pas ce Jésus-là
  - type: note
    content: 'Quelques manuscrits ont : qui divise Jésus. Les erreurs combattues par Jean séparaient l’homme Jésus de Christ, Fils de Dieu. Christ ne serait venu en Jésus qu’au moment de son baptême et il l’aurait de nouveau quitté avant sa mort sur la croix.'
  - type: text
    content: ' ne vient pas de Dieu. C’est là l’esprit de « l’anti-Christ » dont vous avez entendu annoncer la venue. Eh bien, dès à présent, cet esprit est dans le monde. '
  '4':
  - type: text
    content: 'Vous, mes enfants, vous êtes de Dieu et vous avez la victoire sur ces prophètes de mensonge, car celui qui est en vous est plus puissant que celui qui inspire ce monde. '
  '5':
  - type: text
    content: 'Eux, ils font partie du monde. C’est pourquoi ils tiennent le langage du monde, et le monde les écoute. '
  '6':
  - type: text
    content: Nous, nous sommes de Dieu. Celui qui connaît Dieu nous écoute, mais celui qui n’est pas de Dieu ne nous écoute pas. De cette manière, nous pouvons distinguer l’Esprit de la vérité de l’esprit de l’erreur.
  - type: heading
    content: Dieu est amour
  - type: heading
    content: Aimer parce que Dieu nous a aimés le premier
  '7':
  - type: text
    content: 'Mes chers amis, aimons-nous les uns les autres, car l’amour vient de Dieu. Celui qui aime est né de Dieu et il connaît Dieu. '
  '8':
  - type: text
    content: Qui n’aime pas n’a pas connu Dieu, car Dieu est amour.
  '9':
  - type: text
    content: 'Voici comment Dieu a manifesté son amour pour nous : il a envoyé son Fils unique dans le monde pour que, par lui, nous ayons la vie. '
