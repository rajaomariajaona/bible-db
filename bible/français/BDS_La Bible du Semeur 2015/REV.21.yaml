document_id: REV.21,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Septième vision : le nouveau ciel et la nouvelle terre'
  - type: text
    content: 'Puis je vis '
  - type: text
    content: un ciel nouveau et une terre nouvelle
  - type: note
    content: Voir Es 65.17 ; 66.22.
  - type: text
    content: ', car le premier ciel et la première terre avaient disparu, et la mer n’existait plus.'
  '10':
  - type: text
    content: 'Il me transporta en esprit sur une grande et haute montagne, d’où il me fit voir la ville sainte, Jérusalem, qui descendait du ciel, d’auprès de Dieu. '
  '11':
  - type: text
    content: 'Elle rayonnait de la gloire divine. Son éclat rappelait celui d’une pierre très précieuse, celui d’un jaspe d’une transparence cristalline. '
  '12':
  - type: text
    content: 'Elle était entourée d’une grande et haute muraille, percée de douze portes gardées par douze anges, et sur ces portes étaient gravés les noms des douze tribus d’Israël. '
  '13':
  - type: text
    content: 'Les portes étaient orientées trois vers l’est, trois vers le nord, trois vers le sud et trois vers l’ouest. '
  '14':
  - type: text
    content: La muraille reposait sur douze fondements qui portaient les noms des douze apôtres de l’Agneau.
  '15':
  - type: text
    content: 'Mon interlocuteur tenait, en guise de mesure, un roseau d’or pour mesurer la ville, ses portes et sa muraille. '
  '16':
  - type: text
    content: La ville était bâtie en carré, sa longueur égalait sa largeur. L’ange mesura donc la ville avec son roseau et trouva douze mille stades, sa longueur, sa largeur et sa hauteur étant d’égale dimension
  - type: note
    content: Les mesures de ce chapitre ne sont pas converties en mètres ou en kilomètres pour conserver le symbolisme des nombres bibliques.
  - type: text
    content: '. '
  '17':
  - type: text
    content: Il mesura aussi la muraille et trouva cent quarante-quatre coudées, d’après la mesure humaine employée par l’ange.
  '18':
  - type: text
    content: 'La muraille était construite en jaspe, la ville elle-même était d’or pur, transparent comme du cristal pur. '
  '19':
  - type: text
    content: 'Les fondements de la muraille de la ville étaient ornés de toutes sortes de pierres précieuses, le premier de jaspe, le second de saphir, le troisième de chalcédoine, le quatrième d’émeraude, '
  '2':
  - type: text
    content: 'Je vis la ville sainte, la nouvelle Jérusalem, descendre du ciel, d’auprès de Dieu, belle comme une mariée qui s’est parée pour son époux. '
  '20':
  - type: text
    content: 'le cinquième de sardoine, le sixième de cornaline, le septième de chrysolithe, le huitième de béryl, le neuvième de topaze, le dixième de chrysoprase, le onzième de turquoise, le douzième d’améthyste. '
  '21':
  - type: text
    content: Les douze portes étaient douze perles ; chaque porte était faite d’une seule perle. L’avenue principale de la ville était d’or pur, transparent comme du cristal.
  '22':
  - type: text
    content: 'Je ne vis aucun temple dans la ville : son temple, c’est le Seigneur, le Dieu tout-puissant, ainsi que l’Agneau. '
  '23':
  - type: text
    content: 'La ville n’a besoin ni du soleil, ni de la lune pour l’éclairer, car la gloire de Dieu l’illumine et l’Agneau lui tient lieu de lampe. '
  '24':
  - type: text
    content: 'Les peuples marcheront à sa lumière et les rois de la terre viendront lui apporter leur gloire. '
  '25':
  - type: text
    content: 'Tout au long du jour, les portes de la ville resteront ouvertes, car il n’y aura plus de nuit. '
  '26':
  - type: text
    content: 'On y apportera tout ce qui fait la gloire et l’honneur des peuples. '
  '27':
  - type: text
    content: Rien d’impur ne pourra y pénétrer. Nul homme qui se livre à des pratiques abominables et au mensonge n’y entrera. Seuls y auront accès ceux qui sont inscrits dans le livre de vie de l’Agneau.
  '3':
  - type: text
    content: 'Et j’entendis une forte voix, venant du trône, qui disait :'
  - type: text
    content: Voici la Tente de Dieu avec les hommes. Il habitera avec eux ; ils seront ses peuples et lui, Dieu avec eux
  - type: text
    content: ' '
  - type: note
    content: Voir Ex 6.7 ; Lv 26.12.
  - type: text
    content: ', sera leur Dieu.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: Il essuiera toute larme de leurs yeux. La mort ne sera plus et il n’y aura plus ni deuil, ni plainte, ni souffrance. Car ce qui était autrefois a définitivement disparu
  - type: note
    content: Ex 6.7 ; 25.8 ; 29.45 ; Lv 26.12 ; Ez 37.27.
  - type: text
    content: .
  '5':
  - type: text
    content: 'Alors celui qui siège sur le trône déclara : Voici : je renouvelle toutes choses.'
  - type: text
    content: 'Il ajouta : Ecris que ces paroles sont vraies et entièrement dignes de confiance.'
  '6':
  - type: text
    content: 'Puis il me dit : C’en est fait ! Je suis l’Alpha et l’Oméga'
  - type: note
    content: Voir note 1.8.
  - type: text
    content: ', le commencement et la fin. A celui qui a soif, je donnerai, moi, à boire gratuitement à la source d’où coule l’eau de la vie.'
  '7':
  - type: text
    content: 'Tel sera l’héritage du vainqueur. Je serai son Dieu et il sera mon fils. '
  '8':
  - type: text
    content: Quant aux lâches, aux infidèles, aux dépravés, meurtriers et débauchés, aux magiciens, aux idolâtres et à tous les menteurs, leur part sera l’étang ardent de feu et de soufre, c’est-à-dire la seconde mort.
  - type: heading
    content: La nouvelle Jérusalem, Épouse de l’AgneauLa description de la nouvelle Jérusalem rappelle la vision de la Jérusalem restaurée d’Ez 40 à 48 et d’Es 60.
  '9':
  - type: text
    content: 'Alors l’un des sept anges qui tenaient les sept coupes pleines des sept derniers fléaux vint me parler : Viens, me dit-il, je te montrerai la Mariée, l’Epouse de l’Agneau.'
