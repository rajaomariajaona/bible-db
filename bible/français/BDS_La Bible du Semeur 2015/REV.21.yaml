document_id: REV.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Septième vision : le nouveau ciel et la nouvelle terre'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je vis '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: un ciel nouveau et une terre nouvelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 65.17 ; 66.22.
    marker-yv: yv-n
  - type: text
    text: ', car le premier ciel et la première terre avaient disparu, et la mer n’existait plus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je vis la ville sainte, la nouvelle Jérusalem, descendre du ciel, d’auprès de Dieu, belle comme une mariée qui s’est parée pour son époux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et j’entendis une forte voix, venant du trône, qui disait :'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici la Tente de Dieu avec les hommes. Il habitera avec eux ; ils seront ses peuples et lui, Dieu avec eux
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 6.7 ; Lv 26.12.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ', sera leur Dieu.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il essuiera toute larme de leurs yeux. La mort ne sera plus et il n’y aura plus ni deuil, ni plainte, ni souffrance. Car ce qui était autrefois a définitivement disparu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 6.7 ; 25.8 ; 29.45 ; Lv 26.12 ; Ez 37.27.
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors celui qui siège sur le trône déclara : Voici : je renouvelle toutes choses.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Il ajouta : Ecris que ces paroles sont vraies et entièrement dignes de confiance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis il me dit : C’en est fait ! Je suis l’Alpha et l’Oméga'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.8'
        metadata:
          usfm: REV.1.8
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', le commencement et la fin. A celui qui a soif, je donnerai, moi, à boire gratuitement à la source d’où coule l’eau de la vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tel sera l’héritage du vainqueur. Je serai son Dieu et il sera mon fils. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quant aux lâches, aux infidèles, aux dépravés, meurtriers et débauchés, aux magiciens, aux idolâtres et à tous les menteurs, leur part sera l’étang ardent de feu et de soufre, c’est-à-dire la seconde mort.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La nouvelle Jérusalem, Épouse de l’Agneau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La description de la nouvelle Jérusalem rappelle la vision de la Jérusalem restaurée d’Ez 40 à 48 et d’
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 60
        metadata:
          usfm: ISA.60
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors l’un des sept anges qui tenaient les sept coupes pleines des sept derniers fléaux vint me parler : Viens, me dit-il, je te montrerai la Mariée, l’Epouse de l’Agneau.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il me transporta en esprit sur une grande et haute montagne, d’où il me fit voir la ville sainte, Jérusalem, qui descendait du ciel, d’auprès de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle rayonnait de la gloire divine. Son éclat rappelait celui d’une pierre très précieuse, celui d’un jaspe d’une transparence cristalline. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle était entourée d’une grande et haute muraille, percée de douze portes gardées par douze anges, et sur ces portes étaient gravés les noms des douze tribus d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les portes étaient orientées trois vers l’est, trois vers le nord, trois vers le sud et trois vers l’ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La muraille reposait sur douze fondements qui portaient les noms des douze apôtres de l’Agneau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mon interlocuteur tenait, en guise de mesure, un roseau d’or pour mesurer la ville, ses portes et sa muraille. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La ville était bâtie en carré, sa longueur égalait sa largeur. L’ange mesura donc la ville avec son roseau et trouva douze mille stades, sa longueur, sa largeur et sa hauteur étant d’égale dimension
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les mesures de ce chapitre ne sont pas converties en mètres ou en kilomètres pour conserver le symbolisme des nombres bibliques.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il mesura aussi la muraille et trouva cent quarante-quatre coudées, d’après la mesure humaine employée par l’ange.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La muraille était construite en jaspe, la ville elle-même était d’or pur, transparent comme du cristal pur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les fondements de la muraille de la ville étaient ornés de toutes sortes de pierres précieuses, le premier de jaspe, le second de saphir, le troisième de chalcédoine, le quatrième d’émeraude, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'le cinquième de sardoine, le sixième de cornaline, le septième de chrysolithe, le huitième de béryl, le neuvième de topaze, le dixième de chrysoprase, le onzième de turquoise, le douzième d’améthyste. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les douze portes étaient douze perles ; chaque porte était faite d’une seule perle. L’avenue principale de la ville était d’or pur, transparent comme du cristal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je ne vis aucun temple dans la ville : son temple, c’est le Seigneur, le Dieu tout-puissant, ainsi que l’Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La ville n’a besoin ni du soleil, ni de la lune pour l’éclairer, car la gloire de Dieu l’illumine et l’Agneau lui tient lieu de lampe. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les peuples marcheront à sa lumière et les rois de la terre viendront lui apporter leur gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tout au long du jour, les portes de la ville resteront ouvertes, car il n’y aura plus de nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On y apportera tout ce qui fait la gloire et l’honneur des peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Rien d’impur ne pourra y pénétrer. Nul homme qui se livre à des pratiques abominables et au mensonge n’y entrera. Seuls y auront accès ceux qui sont inscrits dans le livre de vie de l’Agneau.
