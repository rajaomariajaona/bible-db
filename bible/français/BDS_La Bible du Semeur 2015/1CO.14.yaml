document_id: 1CO.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le parler en langues et la prophétie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ainsi, recherchez avant tout l’amour ; aspirez en outre aux manifestations de l’Esprit, et surtout à prophétiser.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Celui qui parle dans une langue inconnue s’adresse à Dieu et non aux hommes : personne ne comprend les paroles mystérieuses qu’il prononce sous l’inspiration de l’Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais celui qui prophétise aide les autres à grandir dans la foi, les encourage et les réconforte. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Celui qui parle dans une langue inconnue ne se fait du bien qu’à lui-même ; mais celui qui prophétise permet à toute l’assemblée de grandir dans la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je veux bien que vous sachiez tous parler dans des langues inconnues, mais je préférerais que vous prophétisiez. Celui qui prophétise est plus utile que celui qui s’exprime dans une langue inconnue – sauf si quelqu’un traduit ce dernier pour que l’Eglise puisse grandir dans la foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Supposez, frères et sœurs, que je vienne chez vous et que je m’exprime exclusivement dans ces langues inconnues, sans vous apporter aucune révélation, aucune connaissance nouvelle, aucune prophétie, aucun enseignement. Quel profit tireriez-vous de ma présence ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voyez ce qui se passe pour des instruments de musique comme la flûte ou la harpe. Comment reconnaîtra-t-on la mélodie jouée sur l’un ou l’autre de ces instruments s’ils ne rendent pas de sons distincts ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et qui se préparera pour la bataille si le signal que donne la trompette n’est pas parfaitement clair ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il en va de même pour vous : comment saura-t-on ce que vous voulez dire si, en utilisant ces langues inconnues, vous ne prononcez que des paroles inintelligibles ? Vous parlerez en l’air !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il existe, dans le monde, un grand nombre de langues différentes, dont aucune n’est dépourvue de sens. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais si j’ignore le sens des mots utilisés par mon interlocuteur, je serai un étranger pour lui, et lui de même le sera pour moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous donc, puisque vous aspirez si ardemment aux manifestations de l’Esprit, recherchez avant tout à posséder en abondance celles qui contribuent à faire grandir l’Eglise dans la foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi, celui qui parle en langues inconnues doit demander à Dieu de lui donner de traduire ce qu’il dit en langage compréhensible. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car si je prie en langues inconnues, mon esprit est en prière, mais mon intelligence n’intervient pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mais mon intelligence ne porte aucun fruit pour les autres.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que ferai-je donc ? Je prierai avec mon esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par l’Esprit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: De même dans la suite du verset et au verset 16.
    marker-yv: yv-n
  - type: text
    text: ', mais je prierai aussi avec mon intelligence. Je chanterai les louanges de Dieu avec mon esprit, mais je chanterai aussi avec mon intelligence. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Autrement, si tu remercies le Seigneur uniquement avec ton esprit, comment l’auditeur non averti, assis dans l’assemblée, pourra-t-il répondre « Amen » à ta prière de reconnaissance, puisqu’il ne comprend pas ce que tu dis ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ta prière de reconnaissance a beau être sublime, l’autre ne grandit pas dans sa foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je remercie Dieu de ce que je parle en langues inconnues plus que vous tous. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Cependant, lors des réunions de l’Eglise, je préfère dire seulement cinq paroles compréhensibles pour instruire aussi les autres, plutôt que dix mille mots dans une langue inconnue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Frères et sœurs, ne soyez pas des enfants dans votre façon de juger des choses. Pour le mal, soyez des petits enfants, mais dans le domaine du jugement, montrez-vous adultes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il est dit dans l’Ecriture :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je parlerai à ce peuple
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: dans une langue étrangère
  - type: text
    text: ' ╵'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: par des lèvres d’étrangers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et même alors, ils ne m’écouteront pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: dit le Seigneur
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.21 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 28.11-12
        metadata:
          usfm: ISA.28.11+ISA.28.12
      - type: text
        text: ' . Dans ce texte, Esaïe avertit les Israélites que, puisqu’ils ne veulent pas écouter la parole de Dieu qu’il leur annonce dans leur langue, Dieu va leur parler en une langue étrangère, celle des Assyriens qui envahiront leur pays et leur imposeront leur domination. L’apôtre en conclut que, lorsque Dieu parle une langue étrangère, c’est un signe de jugement. Le langage du salut est au contraire celui qui est compréhensible.'
    marker-yv: yv-n
  - type: usfm
    marker: qt
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ainsi, les paroles en langues inconnues sont un signe de Dieu, non pour les croyants, mais ceux qui ne croient pas ; les prophéties, elles, sont un signe, non pour les incroyants, mais pour ceux qui croient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En effet, imaginez que l’Eglise se réunisse tout entière, et que tous parlent en des langues inconnues : si des personnes non averties ou des incroyants surviennent, ne diront-ils pas que vous avez perdu la raison ? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Si, au contraire, tous prophétisent et qu’il entre un visiteur incroyant ou un homme quelconque, ne se trouvera-t-il pas repris par tous et exposé au jugement de tous ? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les secrets de son cœur seront mis à nu. Alors, il tombera sur sa face en adorant Dieu et s’écriera : « Certainement, Dieu est présent au milieu de vous. »'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’ordre dans le culte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Comment donc agir, frères et sœurs ? Lorsque vous vous réunissez, l’un chantera un cantique, l’autre aura une parole d’enseignement, un autre une révélation ; celui-ci s’exprimera dans une langue inconnue, celui-là en donnera l’interprétation ; que tout cela serve à faire grandir l’Eglise dans la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si l’on parle dans des langues inconnues, que deux le fassent, ou tout au plus trois, et l’un après l’autre ; et qu’il y ait quelqu’un pour traduire. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'S’il n’y a pas d’interprète, qu’on se taise plutôt que de parler dans une langue inconnue dans l’assemblée, et qu’on se contente de parler à soi-même et à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Quant à ceux qui prophétisent, que deux ou trois prennent la parole et que les autres jugent ce qu’ils disent : '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'si l’un des assistants reçoit une révélation pendant qu’un autre parle, celui qui a la parole doit se taire. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ainsi vous pouvez tous prophétiser à tour de rôle afin que tous soient instruits et stimulés dans leur foi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Car les prophètes restent maîtres d’eux-mêmes. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dieu, en effet, n’est pas un Dieu de désordre, mais de paix.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Comme dans toutes les Eglises des membres du peuple saint, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: que les femmes gardent le silence dans les assemblées ; car il ne leur est pas permis de parler
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certains pensent que Paul vise ici le bavardage et le fait de poser des questions de manière intempestive pendant que quelqu’un prophétise ou enseigne (cf. v. 27-28, 30). D’autres pensent que Paul demande aux femmes de s’abstenir de se prononcer lors de l’évaluation des prophéties (voir v. 29).
    marker-yv: yv-n
  - type: text
    text: '. Qu’elles sachent se tenir dans la soumission comme le recommande aussi la Loi. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Si elles veulent s’instruire sur quelque point, qu’elles interrogent leur mari à la maison. En effet, il est inconvenant pour une femme de parler dans une assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Car enfin, est-ce de chez vous que la Parole de Dieu est sortie ? Est-ce chez vous seulement qu’elle est parvenue ? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Si quelqu’un estime être un prophète ou pense bénéficier d’une manifestation spirituelle, il doit reconnaître, dans ce que je vous écris, un commandement du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Et si quelqu’un refuse de reconnaître cela, c’est la preuve qu’il n’a pas été lui-même reconnu par Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'En résumé, mes frères et sœurs, recherchez ardemment à prophétiser et ne vous opposez pas à ce qu’on parle en des langues inconnues. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mais veillez à ce que tout se passe convenablement et non dans le désordre.
