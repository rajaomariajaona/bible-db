document_id: ISA.48
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’annonce de choses nouvelles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoutez bien ceci, ╵ô communauté de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui vous réclamez ╵de ce nom d’Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui êtes issus ╵des sources de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui prêtez serment ╵au nom de l’Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui avez ╵le Dieu d’Israël à la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais sans sincérité ╵et sans droiture !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car vous vous dénommez : ╵« Ceux de la ville sainte » !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous vous appuyez ╵sur le Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur celui qui s’appelle ╵le Seigneur des armées célestes !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’ai annoncé depuis longtemps ╵les événements du passé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j’en ai parlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les ai fait entendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis, soudain, j’ai agi, ╵et cela s’est produit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Parce que je savais ╵que tu es obstiné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ton cou est semblable ╵à un tendon de fer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tu as un front de bronze,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: je t’ai annoncé ces événements ╵bien longtemps à l’avance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t’en ai informé ╵avant qu’ils se produisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour que tu ne puisses pas dire :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « C’est mon idole qui a fait ╵toutes ces choses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est ma statue de bois, ╵mon image en métal fondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui en a donné l’ordre ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu as bien entendu, ╵considère bien tout cela.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’allez-vous pas ╵l’annoncer vous aussi ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant je t’annonce des choses nouvelles, ╵des choses tenues en réserve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu ne connais pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elles sont créées maintenant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et non depuis longtemps ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu’à ce jour, ╵tu n’en avais pas entendu parler
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour que tu ne puisses pas dire :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Je le savais déjà ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Non, tu n’en savais rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne l’avais pas entendu ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: jamais auparavant, ╵ce n’était parvenu ╵à tes oreilles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je te connaissais, ╵et je te savais traître.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Oui, tu t’appelles : ╵« Révolté de naissance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43.27'
        metadata:
          usfm: ISA.43.27
      - type: text
        text: ' et note.'
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Par égard pour ma renommée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je retiens ma colère ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour que la louange ╵retentisse pour moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me réfrène,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ne pas te détruire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je t’ai fait fondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais non pour en retirer de l’argent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je t’ai éprouvé ╵dans le creuset de l’affliction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est par égard pour moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: uniquement pour moi, ╵que j’agirai ainsi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment me laisserais-je ╵déshonorer ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne donnerai pas ╵ma gloire à quelqu’un d’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ecoute-moi, Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, que j’appelle !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voilà ce que je suis : ╵moi, je suis le premier'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis aussi le dernier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 44.6 ; Ap 1.17 ; 22.13.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est de mes propres mains ╵que j’ai fondé la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et déployé le ciel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès que je les appelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ensemble, ils se présentent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous tous, rassemblez-vous ╵et écoutez-moi bien !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui donc parmi les autres dieux ╵a annoncé ces choses ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cet homme que l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement Cyrus.
    marker-yv: yv-n
  - type: text
    text: ' aime'
- type: usfm
  marker: q1
  children:
  - type: text
    text: accomplira ce qu’il désire ╵à l’encontre de Babylone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son bras se lèvera ╵contre les Chaldéens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C’est moi, c’est moi qui ai parlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi qui l’ai appelé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui l’ai fait venir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai réussir ╵ses entreprises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Approchez-vous de moi, ╵écoutez bien ceci :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès le commencement ╵je n’ai jamais parlé ╵dans le secret.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les événements ╵se sont produits, ╵j’étais présent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et maintenant ╵le Seigneur, l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: m’a envoyé ╵et son Esprit est avec moi.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Ce que Dieu désire
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ainsi dit l’Eternel, ╵celui qui te délivre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et le Saint d’Israël :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je suis l’Eternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je t’instruis pour ton profit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te fais cheminer ╵dans la voie où tu marches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si toi, tu avais tenu compte ╵de mes commandements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta paix coulerait comme un fleuve
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice qui te serait faite ╵déferlerait comme les vagues de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lors ta postérité ╵serait pareille au sable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta descendance ╵serait aussi nombreuse ╵que les grains de sable des plages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton nom ne sombrerait pas dans l’oubli,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jamais tu ne disparaîtrais ╵de devant moi.
- type: usfm
  marker: s2
  children:
  - type: text
    text: La sortie de Babylone
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Sortez de Babylone
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18.4
        metadata:
          usfm: REV.18.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fuyez les Chaldéens !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: publiez la nouvelle ! ╵Proclamez-la,
- type: usfm
  marker: q1
  children:
  - type: text
    text: répandez-la au loin, ╵jusqu’au bout de la terre !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dites que l’Eternel a délivré ╵son serviteur Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quand il les a conduits ╵à travers le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n’ont pas souffert de la soif
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il a fait couler ╵pour eux l’eau du rocher ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fendu le roc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les eaux ont jailli.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais, a dit l’Eternel, ╵il n’y a pas de paix
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les méchants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '57.21'
        metadata:
          usfm: ISA.57.21
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  !'
