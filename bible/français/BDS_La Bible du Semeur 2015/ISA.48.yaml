document_id: ISA.48,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’annonce de choses nouvelles
  - type: text
    content: Ecoutez bien ceci, ╵ô communauté de Jacob,
  - type: text
    content: vous qui vous réclamez ╵de ce nom d’Israël
  - type: text
    content: et qui êtes issus ╵des sources de Juda,
  - type: text
    content: vous qui prêtez serment ╵au nom de l’Eternel
  - type: text
    content: et qui avez ╵le Dieu d’Israël à la bouche,
  - type: text
    content: mais sans sincérité ╵et sans droiture !
  '10':
  - type: text
    content: Je t’ai fait fondre,
  - type: text
    content: mais non pour en retirer de l’argent.
  - type: text
    content: Oui, je t’ai éprouvé ╵dans le creuset de l’affliction.
  '11':
  - type: text
    content: C’est par égard pour moi,
  - type: text
    content: uniquement pour moi, ╵que j’agirai ainsi.
  - type: text
    content: Comment me laisserais-je ╵déshonorer ?
  - type: text
    content: Je ne donnerai pas ╵ma gloire à quelqu’un d’autre.
  '12':
  - type: text
    content: Ecoute-moi, Jacob,
  - type: text
    content: Israël, que j’appelle !
  - type: text
    content: 'Voilà ce que je suis : ╵moi, je suis le premier'
  - type: text
    content: et je suis aussi le dernier
  - type: note
    content: Voir 44.6 ; Ap 1.17 ; 22.13.
  - type: text
    content: .
  '13':
  - type: text
    content: C’est de mes propres mains ╵que j’ai fondé la terre
  - type: text
    content: et déployé le ciel.
  - type: text
    content: Dès que je les appelle,
  - type: text
    content: ensemble, ils se présentent.
  '14':
  - type: text
    content: Vous tous, rassemblez-vous ╵et écoutez-moi bien !
  - type: text
    content: Qui donc parmi les autres dieux ╵a annoncé ces choses ?
  - type: text
    content: Cet homme que l’Eternel
  - type: note
    content: Probablement Cyrus.
  - type: text
    content: ' aime'
  - type: text
    content: accomplira ce qu’il désire ╵à l’encontre de Babylone,
  - type: text
    content: son bras se lèvera ╵contre les Chaldéens.
  '15':
  - type: text
    content: C’est moi, c’est moi qui ai parlé,
  - type: text
    content: moi qui l’ai appelé
  - type: text
    content: et qui l’ai fait venir.
  - type: text
    content: Je ferai réussir ╵ses entreprises.
  '16':
  - type: text
    content: 'Approchez-vous de moi, ╵écoutez bien ceci :'
  - type: text
    content: Dès le commencement ╵je n’ai jamais parlé ╵dans le secret.
  - type: text
    content: Quand les événements ╵se sont produits, ╵j’étais présent.
  - type: text
    content: Et maintenant ╵le Seigneur, l’Eternel,
  - type: text
    content: m’a envoyé ╵et son Esprit est avec moi.
  - type: heading
    content: Ce que Dieu désire
  '17':
  - type: text
    content: Ainsi dit l’Eternel, ╵celui qui te délivre
  - type: text
    content: 'et le Saint d’Israël :'
  - type: text
    content: Moi, je suis l’Eternel, ton Dieu,
  - type: text
    content: et je t’instruis pour ton profit,
  - type: text
    content: je te fais cheminer ╵dans la voie où tu marches.
  '18':
  - type: text
    content: Si toi, tu avais tenu compte ╵de mes commandements,
  - type: text
    content: ta paix coulerait comme un fleuve
  - type: text
    content: et la justice qui te serait faite ╵déferlerait comme les vagues de la mer.
  '19':
  - type: text
    content: Lors ta postérité ╵serait pareille au sable,
  - type: text
    content: ta descendance ╵serait aussi nombreuse ╵que les grains de sable des plages,
  - type: text
    content: ton nom ne sombrerait pas dans l’oubli,
  - type: text
    content: jamais tu ne disparaîtrais ╵de devant moi.
  - type: heading
    content: La sortie de Babylone
  '2':
  - type: text
    content: 'Car vous vous dénommez : ╵« Ceux de la ville sainte » !'
  - type: text
    content: Et vous vous appuyez ╵sur le Dieu d’Israël,
  - type: text
    content: sur celui qui s’appelle ╵le Seigneur des armées célestes !
  '20':
  - type: text
    content: Sortez de Babylone
  - type: note
    content: Repris en Ap 18.4.
  - type: text
    content: '  !'
  - type: text
    content: Fuyez les Chaldéens !
  - type: text
    content: Avec des cris de joie,
  - type: text
    content: publiez la nouvelle ! ╵Proclamez-la,
  - type: text
    content: répandez-la au loin, ╵jusqu’au bout de la terre !
  - type: text
    content: Dites que l’Eternel a délivré ╵son serviteur Jacob.
  '21':
  - type: text
    content: Quand il les a conduits ╵à travers le désert,
  - type: text
    content: ils n’ont pas souffert de la soif
  - type: text
    content: car il a fait couler ╵pour eux l’eau du rocher ;
  - type: text
    content: il a fendu le roc,
  - type: text
    content: et les eaux ont jailli.
  '22':
  - type: text
    content: Mais, a dit l’Eternel, ╵il n’y a pas de paix
  - type: text
    content: pour les méchants
  - type: note
    content: Voir 57.21.
  - type: text
    content: '  !'
  '3':
  - type: text
    content: J’ai annoncé depuis longtemps ╵les événements du passé,
  - type: text
    content: j’en ai parlé,
  - type: text
    content: je les ai fait entendre,
  - type: text
    content: puis, soudain, j’ai agi, ╵et cela s’est produit.
  '4':
  - type: text
    content: Parce que je savais ╵que tu es obstiné,
  - type: text
    content: que ton cou est semblable ╵à un tendon de fer,
  - type: text
    content: et que tu as un front de bronze,
  '5':
  - type: text
    content: je t’ai annoncé ces événements ╵bien longtemps à l’avance,
  - type: text
    content: je t’en ai informé ╵avant qu’ils se produisent,
  - type: text
    content: 'pour que tu ne puisses pas dire :'
  - type: text
    content: « C’est mon idole qui a fait ╵toutes ces choses,
  - type: text
    content: c’est ma statue de bois, ╵mon image en métal fondu,
  - type: text
    content: qui en a donné l’ordre ! »
  '6':
  - type: text
    content: Tu as bien entendu, ╵considère bien tout cela.
  - type: text
    content: N’allez-vous pas ╵l’annoncer vous aussi ?
  - type: text
    content: Maintenant je t’annonce des choses nouvelles, ╵des choses tenues en réserve,
  - type: text
    content: que tu ne connais pas.
  '7':
  - type: text
    content: Elles sont créées maintenant
  - type: text
    content: et non depuis longtemps ;
  - type: text
    content: jusqu’à ce jour, ╵tu n’en avais pas entendu parler
  - type: text
    content: 'pour que tu ne puisses pas dire :'
  - type: text
    content: « Je le savais déjà ! »
  '8':
  - type: text
    content: Non, tu n’en savais rien,
  - type: text
    content: tu ne l’avais pas entendu ;
  - type: text
    content: jamais auparavant, ╵ce n’était parvenu ╵à tes oreilles.
  - type: text
    content: Car je te connaissais, ╵et je te savais traître.
  - type: text
    content: 'Oui, tu t’appelles : ╵« Révolté de naissance'
  - type: note
    content: Voir 43.27 et note.
  - type: text
    content: '  ! »'
  '9':
  - type: text
    content: Par égard pour ma renommée,
  - type: text
    content: je retiens ma colère ;
  - type: text
    content: et pour que la louange ╵retentisse pour moi,
  - type: text
    content: je me réfrène,
  - type: text
    content: pour ne pas te détruire.
