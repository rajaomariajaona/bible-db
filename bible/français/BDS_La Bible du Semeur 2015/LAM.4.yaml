document_id: LAM.4,21
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Quatrième élégie : la déchéance de Sion'
  - type: heading
    content: Le peuple est brisé
  - type: text
    content: Comment
  - type: note
    content: 'Autre traduction : hélas !'
  - type: text
    content: '  ! L’or s’est terni !'
  - type: text
    content: L’or pur s’est altéré !
  - type: text
    content: Les pierres saintes
  - type: note
    content: Selon certains, des pierres précieuses qui avaient fait partie du trésor du Temple. Pour d’autres, un symbole du peuple de Dieu (voir v. 2).
  - type: text
    content: ' ╵ont été dispersées'
  - type: text
    content: à tous les coins de rues !
  '10':
  - type: text
    content: De tendres femmes, ╵de leurs mains ont fait cuire
  - type: text
    content: la chair de leurs enfants
  - type: text
    content: pour s’en nourrir,
  - type: text
    content: à cause du désastre ╵qui a atteint ╵la communauté de mon peuple
  - type: note
    content: Voir 2 R 6.28-29.
  - type: text
    content: .
  - type: heading
    content: Le juste jugement de Dieu
  '11':
  - type: text
    content: L’Eternel a assouvi son courroux.
  - type: text
    content: Oui, il a déversé ╵son ardente colère,
  - type: text
    content: il a allumé un feu dans Sion
  - type: text
    content: qui en a consumé les fondations.
  '12':
  - type: text
    content: Aucun roi de la terre
  - type: text
    content: ni aucun habitant du monde ╵n’a cru que l’adversaire,
  - type: text
    content: que l’ennemi, ╵pourrait franchir
  - type: text
    content: les portes de Jérusalem.
  '13':
  - type: text
    content: Cela est arrivé ╵à cause des péchés ╵de ses prophètes
  - type: text
    content: et des fautes des prêtres
  - type: text
    content: qui répandaient au milieu d’elle
  - type: text
    content: le sang des justes.
  '14':
  - type: text
    content: Mais maintenant, ╵ils errent dans les rues ╵tout comme des aveugles,
  - type: text
    content: ils sont souillés de sang
  - type: text
    content: si bien que l’on ne peut
  - type: text
    content: toucher leurs vêtements.
  '15':
  - type: text
    content: « Allez-vous en, impurs, ╵voilà ce qu’on leur crie.
  - type: text
    content: Hors d’ici, hors d’ici, ╵et ne nous touchez pas ! »
  - type: text
    content: 'Et lorsqu’ils fuient ainsi ╵en errant çà et là, ╵les gens des autres peuples disent :'
  - type: text
    content: « Qu’ils ne restent pas en ce lieu
  - type: note
    content: Voir Lv 13.45.
  - type: text
    content: '  ! »'
  '16':
  - type: text
    content: L’Eternel en personne ╵les a disséminés,
  - type: text
    content: il ne veut plus les voir.
  - type: text
    content: On n’a pas respecté les prêtres
  - type: text
    content: ni eu d’égards ╵pour les responsables du peuple
  - type: note
    content: 'Autre traduction : les vieillards.'
  - type: text
    content: .
  - type: heading
    content: L’heure de l’abandon
  '17':
  - type: text
    content: Nos yeux se consument encore
  - type: text
    content: dans l’attente d’une aide, ╵mais c’est en vain.
  - type: text
    content: De nos postes de guet ╵nous attendions une nation
  - type: text
    content: qui ne nous a pas secourus
  - type: note
    content: Probablement l’Egypte (voir Jr 29.16 ; 37.5-10).
  - type: text
    content: .
  '18':
  - type: text
    content: Nos ennemis épient ╵la trace de nos pas,
  - type: text
    content: et nous ne pouvons plus ╵circuler dans nos rues,
  - type: text
    content: notre fin est prochaine, ╵nos jours sont à leur terme.
  - type: text
    content: Oui, notre fin arrive.
  '19':
  - type: text
    content: Ceux qui nous poursuivaient ╵ont été plus rapides
  - type: text
    content: que l’aigle dans le ciel.
  - type: text
    content: Ils nous ont pourchassés ╵avec acharnement ╵sur les montagnes,
  - type: text
    content: ils se sont embusqués ╵contre nous au désert.
  '2':
  - type: text
    content: Comment se fait-il donc ╵que les précieux fils de Sion
  - type: text
    content: estimés comme de l’or fin
  - type: text
    content: soient maintenant considérés ╵comme des pots d’argile,
  - type: text
    content: ouvrages d’un potier
  - type: note
    content: Voir Jr 18 et 19.
  - type: text
    content: '  ?'
  '20':
  - type: text
    content: Le roi qui de la part de l’Eternel ╵avait reçu l’onction
  - type: note
    content: Il s’agit de Sédécias (2 R 25.1-6 ; Jr 39.4-7 ; 52.6-11).
  - type: text
    content: ', ╵et dont dépendait notre vie,'
  - type: text
    content: a été capturé ╵grâce à leurs pièges,
  - type: text
    content: 'alors que nous disions :'
  - type: text
    content: « Nous vivrons sous sa protection ╵au milieu des nations. »
  '21':
  - type: text
    content: Tu peux être ravie, ╵communauté d’Edom, ╵et exulter
  - type: note
    content: Lorsque Jérusalem est tombée, les Edomites ont participé à son pillage (Ez 25.12-14).
  - type: text
    content: ','
  - type: text
    content: toi qui habites ╵au pays d’Outs
  - type: note
    content: 'Outs: pays à l’est du Jourdain, peut-être Edom, au sud-est de la mer Morte (Gn 36.28  ; voir Jb 1.1 et note).'
  - type: text
    content: '  :'
  - type: text
    content: à toi aussi, ╵on passera la coupe,
  - type: text
    content: tu seras enivrée ╵et tu te mettras toute nue.
  '22':
  - type: text
    content: Ton châtiment aura sa fin, ╵ô communauté de Sion,
  - type: text
    content: Dieu ne te déportera plus.
  - type: text
    content: Communauté d’Edom, ╵il te fera payer tes fautes,
  - type: text
    content: et il fera paraître ╵tes péchés au grand jour.
  '3':
  - type: text
    content: 'Regardez les chacals : ╵voyez comment les mères'
  - type: text
    content: allaitent leurs petits ╵en tendant leur mamelle.
  - type: text
    content: La communauté de mon peuple ╵est devenue aussi cruelle
  - type: text
    content: que les autruches du désert
  - type: note
    content: Sur l’autruche cruelle, voir Jb 39.14-16.
  - type: text
    content: .
  '4':
  - type: text
    content: La langue du bébé
  - type: text
    content: s’attache à son palais, ╵tellement il a soif.
  - type: text
    content: Les tout petits enfants ╵réclament quelque nourriture
  - type: text
    content: et nul ne leur en donne.
  '5':
  - type: text
    content: Ceux qui, auparavant, ╵mangeaient des mets exquis,
  - type: text
    content: expirent dans les rues,
  - type: text
    content: et ceux qui ont été ╵élevés dans la pourpre
  - type: text
    content: se couchent maintenant ╵sur un tas de fumier.
  '6':
  - type: text
    content: La communauté de mon peuple ╵a commis un péché
  - type: text
    content: plus grand que celui de Sodome
  - type: note
    content: Sur Sodome, voir Gn 19.24-25 et Jr 23.14 ; 49.18 ; 50.40.
  - type: text
    content: qui a été anéantie ╵en un instant,
  - type: text
    content: et sans qu’un homme ╵porte la main contre elle
  - type: note
    content: 'Autre traduction : sans que quelqu’un se donne la peine de la secourir.'
  - type: text
    content: .
  '7':
  - type: text
    content: Les princes de Sion, ╵ils étaient plus purs que la neige
  - type: text
    content: et plus blancs que du lait,
  - type: text
    content: leurs corps étaient vermeils ╵bien plus que le corail,
  - type: text
    content: leurs veines de saphir.
  '8':
  - type: text
    content: Leur aspect est plus sombre, ╵à présent, que la suie,
  - type: text
    content: nul ne les reconnaît ╵maintenant dans les rues.
  - type: text
    content: La peau leur colle aux os,
  - type: text
    content: elle est devenue sèche ╵comme du bois.
  '9':
  - type: text
    content: Les victimes du glaive ╵sont plus heureuses
  - type: text
    content: 'que les victimes ╵de la famine :'
  - type: text
    content: celles-ci dépérissent, ╵tenaillées par la faim,
  - type: text
    content: car les produits des champs ╵leur font défaut.
