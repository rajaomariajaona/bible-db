document_id: LAM.4
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'Quatrième élégie : la déchéance de Sion'
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le peuple est brisé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Comment
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hélas !
    marker-yv: yv-n
  - type: text
    text: '  ! L’or s’est terni !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’or pur s’est altéré !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les pierres saintes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon certains, des pierres précieuses qui avaient fait partie du trésor du Temple. Pour d’autres, un symbole du peuple de Dieu (voir v. 2).
    marker-yv: yv-n
  - type: text
    text: ' ╵ont été dispersées'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à tous les coins de rues !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comment se fait-il donc ╵que les précieux fils de Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: estimés comme de l’or fin
- type: usfm
  marker: q1
  children:
  - type: text
    text: soient maintenant considérés ╵comme des pots d’argile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ouvrages d’un potier
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jr 18
        metadata:
          usfm: JER.18
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
        metadata:
          usfm: JER.19
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Regardez les chacals : ╵voyez comment les mères'
- type: usfm
  marker: q1
  children:
  - type: text
    text: allaitent leurs petits ╵en tendant leur mamelle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La communauté de mon peuple ╵est devenue aussi cruelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les autruches du désert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'autruche cruelle, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jb 39.14-16
        metadata:
          usfm: JOB.39.14+JOB.39.15+JOB.39.16
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La langue du bébé
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’attache à son palais, ╵tellement il a soif.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les tout petits enfants ╵réclament quelque nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nul ne leur en donne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui, auparavant, ╵mangeaient des mets exquis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: expirent dans les rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui ont été ╵élevés dans la pourpre
- type: usfm
  marker: q1
  children:
  - type: text
    text: se couchent maintenant ╵sur un tas de fumier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La communauté de mon peuple ╵a commis un péché
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus grand que celui de Sodome
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sodome, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 19.24-25
        metadata:
          usfm: GEN.19.24+GEN.19.25
      - type: text
        text: ' et Jr 23.14 ; 49.18 ; 50.40.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a été anéantie ╵en un instant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sans qu’un homme ╵porte la main contre elle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sans que quelqu’un se donne la peine de la secourir.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les princes de Sion, ╵ils étaient plus purs que la neige
- type: usfm
  marker: q1
  children:
  - type: text
    text: et plus blancs que du lait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs corps étaient vermeils ╵bien plus que le corail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs veines de saphir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Leur aspect est plus sombre, ╵à présent, que la suie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nul ne les reconnaît ╵maintenant dans les rues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La peau leur colle aux os,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est devenue sèche ╵comme du bois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les victimes du glaive ╵sont plus heureuses
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'que les victimes ╵de la famine :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: celles-ci dépérissent, ╵tenaillées par la faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les produits des champs ╵leur font défaut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De tendres femmes, ╵de leurs mains ont fait cuire
- type: usfm
  marker: q1
  children:
  - type: text
    text: la chair de leurs enfants
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour s’en nourrir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du désastre ╵qui a atteint ╵la communauté de mon peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 6.28-29
        metadata:
          usfm: 2KI.6.28+2KI.6.29
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le juste jugement de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Eternel a assouvi son courroux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il a déversé ╵son ardente colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a allumé un feu dans Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui en a consumé les fondations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aucun roi de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni aucun habitant du monde ╵n’a cru que l’adversaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’ennemi, ╵pourrait franchir
- type: usfm
  marker: q1
  children:
  - type: text
    text: les portes de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cela est arrivé ╵à cause des péchés ╵de ses prophètes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des fautes des prêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui répandaient au milieu d’elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sang des justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais maintenant, ╵ils errent dans les rues ╵tout comme des aveugles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont souillés de sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: si bien que l’on ne peut
- type: usfm
  marker: q1
  children:
  - type: text
    text: toucher leurs vêtements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: « Allez-vous en, impurs, ╵voilà ce qu’on leur crie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hors d’ici, hors d’ici, ╵et ne nous touchez pas ! »
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et lorsqu’ils fuient ainsi ╵en errant çà et là, ╵les gens des autres peuples disent :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Qu’ils ne restent pas en ce lieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lv 13.45
        metadata:
          usfm: LEV.13.45
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ! »'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’Eternel en personne ╵les a disséminés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne veut plus les voir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On n’a pas respecté les prêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni eu d’égards ╵pour les responsables du peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les vieillards.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’heure de l’abandon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Nos yeux se consument encore
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans l’attente d’une aide, ╵mais c’est en vain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De nos postes de guet ╵nous attendions une nation
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne nous a pas secourus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probablement l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Jr 29.16 ; 37.5-10).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nos ennemis épient ╵la trace de nos pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous ne pouvons plus ╵circuler dans nos rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: notre fin est prochaine, ╵nos jours sont à leur terme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, notre fin arrive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ceux qui nous poursuivaient ╵ont été plus rapides
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’aigle dans le ciel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils nous ont pourchassés ╵avec acharnement ╵sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont embusqués ╵contre nous au désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le roi qui de la part de l’Eternel ╵avait reçu l’onction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s’agit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sédécias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (2 R 25.1-6 ; Jr 39.4-7 ; 52.6-11).
    marker-yv: yv-n
  - type: text
    text: ', ╵et dont dépendait notre vie,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: a été capturé ╵grâce à leurs pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'alors que nous disions :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Nous vivrons sous sa protection ╵au milieu des nations. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu peux être ravie, ╵communauté d’Edom, ╵et exulter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lorsque Jérusalem est tombée, les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Edomites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ont participé à son pillage (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 25.12-14
        metadata:
          usfm: EZK.25.12+EZK.25.13+EZK.25.14
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui habites ╵au pays d’Outs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Outs
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pays à l’est du Jourdain, peut-être '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Edom, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud-est de la mer Morte (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 36.28
        metadata:
          usfm: GEN.36.28
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jb 1.1
        metadata:
          usfm: JOB.1.1
      - type: text
        text: ' et note).'
    marker-yv: yv-n
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à toi aussi, ╵on passera la coupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu seras enivrée ╵et tu te mettras toute nue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ton châtiment aura sa fin, ╵ô communauté de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu ne te déportera plus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Communauté d’Edom, ╵il te fera payer tes fautes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il fera paraître ╵tes péchés au grand jour.
