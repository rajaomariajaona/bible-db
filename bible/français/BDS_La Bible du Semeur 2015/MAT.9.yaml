document_id: MAT.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus guérit un malade et pardonne ses péchés
  - type: heading
    content: (Mc 2.1-12 ; Lc 5.17-26)
  - type: text
    content: Jésus monta dans un bateau, traversa le lac et se rendit dans sa ville
  - type: note
    content: D’après Mc 2.1, Capernaüm était considérée comme étant la ville de Jésus.
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Un jour, Jésus était à table chez Matthieu. Or, beaucoup de collecteurs d’impôts et de pécheurs notoires étaient venus et avaient pris place à table avec lui et ses disciples. '
  '11':
  - type: text
    content: 'En voyant cela, les pharisiens interpellèrent ses disciples : Comment votre maître peut-il manger de la sorte avec des collecteurs d’impôts et des pécheurs notoires ?'
  '12':
  - type: text
    content: 'Mais Jésus, qui les avait entendus, leur dit : '
  - type: text
    content: Les bien-portants n’ont pas besoin de médecin ; ce sont les malades qui en ont besoin.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Allez donc apprendre quel est le sens de cette parole : '
  - type: text
    content: Ce que je veux, c’est la compassion bien plus que les sacrifices
  - type: note
    content: Os 6.6.
  - type: text
    content: .
  - type: text
    content: ' Car je ne suis pas venu appeler des justes, mais des pécheurs.'
  '14':
  - type: text
    content: 'Alors les disciples de Jean vinrent trouver Jésus et lui demandèrent : Comment se fait-il que tes disciples ne jeûnent pas, alors que nous, comme les pharisiens, nous le faisons souvent ?'
  '15':
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Comment les invités d’une noce pourraient-ils être tristes tant que le marié est avec eux ? Le temps viendra où celui-ci leur sera enlevé. Alors ils jeûneront.
  '16':
  - type: text
    content: ' '
  - type: text
    content: Personne ne rapièce un vieux vêtement avec un morceau d’étoffe neuve, car la pièce rapportée arracherait une partie du vieux manteau et la déchirure serait pire qu’avant.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'De même, on ne verse pas dans de vieilles '
  - type: text
    content: outres
  - type: text
    content: ' du vin nouveau, sinon celles-ci éclatent, le vin se répand et les outres sont perdues. Non, on met le vin nouveau dans des outres neuves. Ainsi le vin et les outres se conservent.'
  - type: heading
    content: Plus fort que la maladie et la mort
  - type: heading
    content: (Mc 5.21-43 ; Lc 8.40-56)
  '18':
  - type: text
    content: 'Pendant que Jésus leur disait cela, un responsable juif arriva, se prosterna devant lui et lui dit : Ma fille vient de mourir : mais viens lui imposer les mains, et elle revivra.'
  '19':
  - type: text
    content: Jésus se leva et le suivit avec ses disciples.
  '2':
  - type: text
    content: 'On lui amena un paralysé couché sur un brancard. Lorsqu’il vit la foi de ces gens, Jésus dit au paralysé : '
  - type: text
    content: Prends courage, mon enfant, tes péchés te sont pardonnés.
  '20':
  - type: text
    content: 'A ce moment, une femme qui souffrait d’hémorragies depuis douze ans, s’approcha de lui par-derrière et toucha la frange de son vêtement. '
  '21':
  - type: text
    content: 'Elle se disait : « Si seulement j’arrive à toucher son vêtement, je serai guérie. »'
  '22':
  - type: text
    content: 'Jésus se retourna et, quand il l’aperçut, il lui dit : '
  - type: text
    content: 'Prends courage, ma fille : parce que tu as eu foi en moi, tu es guérie'
  - type: note
    content: 'Autre traduction : tu es sauvée. L’auteur joue sans doute sur les deux sens. De même à la fin du v. 22 et au v. 20.'
  - type: text
    content: .
  - type: text
    content: A l’instant même, la femme fut guérie.
  '23':
  - type: text
    content: Lorsque Jésus arriva à la maison du responsable juif, il vit des joueurs de flûtes et toute une foule agitée
  - type: note
    content: Lors des enterrements, on engageait des joueurs de flûte et des pleureuses pour exprimer le deuil.
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Alors il leur dit : '
  - type: text
    content: Retirez-vous, la fillette n’est pas morte, elle est seulement endormie.
  - type: text
    content: Mais les gens se moquaient de lui.
  '25':
  - type: text
    content: Lorsqu’il eut fait mettre tout le monde dehors, il entra dans la chambre, prit la main de la jeune fille, et elle se leva.
  '26':
  - type: text
    content: La nouvelle de ce qui s’était passé fit le tour de toute la contrée.
  '27':
  - type: text
    content: 'Lorsque Jésus partit de là, deux aveugles le suivirent en criant : Fils de David, aie pitié de nous !'
  '28':
  - type: text
    content: 'Lorsqu’il fut arrivé à la maison, les aveugles s’approchèrent de lui. Il leur dit : '
  - type: text
    content: Croyez-vous que je peux faire ce que vous me demandez ?
  - type: text
    content: – Oui, Seigneur, lui répondirent-ils.
  '29':
  - type: text
    content: 'Alors il leur toucha les yeux en disant : '
  - type: text
    content: Qu’il vous soit fait selon votre foi !
  '3':
  - type: text
    content: 'Là-dessus, quelques spécialistes de la Loi pensèrent en eux-mêmes : « Cet homme blasphème ! »'
  '30':
  - type: text
    content: Et aussitôt, leurs yeux s’ouvrirent. Jésus ajouta d’un ton sévère
  - type: note
    content: 'D’autres traduisent : Jésus, indigné, leur dit. L’indignation de Jésus viendrait de ce que les aveugles l’ont appelé publiquement : « fils de David ».'
  - type: text
    content: '  : '
  - type: text
    content: Veillez à ce que personne n’apprenne ce qui vous est arrivé.
  '31':
  - type: text
    content: Mais, une fois dehors, ils se mirent à raconter dans toute la région ce que Jésus avait fait.
  - type: heading
    content: Par quel pouvoir ?
  '32':
  - type: text
    content: 'Mais alors que les deux hommes sortaient, on amena à Jésus un homme muet qui était sous l’emprise d’un démon. '
  '33':
  - type: text
    content: 'Jésus chassa le démon et le muet se mit à parler. La foule était émerveillée et disait : Jamais on n’a rien vu de pareil en Israël !'
  '34':
  - type: text
    content: 'Mais les pharisiens, eux, déclaraient : C’est par le pouvoir du chef des démons qu’il chasse les démons.'
  - type: heading
    content: La moisson et le choix des Douze
  - type: heading
    content: (Mc 6.34 ; Lc 10.2)
  '35':
  - type: text
    content: 'Jésus parcourait toutes les villes et tous les villages pour enseigner dans leurs synagogues. Il proclamait la Bonne Nouvelle du royaume de Dieu et guérissait toute maladie et toute infirmité. '
  '36':
  - type: text
    content: 'En voyant les foules, il fut pris de pitié pour elles, car ces gens étaient inquiets et abattus, comme des brebis qui n’ont pas de berger. '
  '37':
  - type: text
    content: 'Alors il dit à ses disciples : '
  - type: text
    content: La moisson est abondante, mais les ouvriers peu nombreux.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Priez donc le Seigneur à qui appartient la moisson d’envoyer des ouvriers pour moissonner.
  '4':
  - type: text
    content: 'Mais Jésus connaissait leurs pensées. Il leur dit : '
  - type: text
    content: Pourquoi avez-vous ces mauvaises pensées en vous-mêmes ?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Qu’est-ce qui est le plus facile ? Dire : « Tes péchés te sont pardonnés », ou dire : « Lève-toi et marche » ?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Eh bien, vous saurez que le '
  - type: text
    content: Fils de l’homme
  - type: text
    content: ' a, sur la terre, le pouvoir de pardonner les péchés.'
  - type: text
    content: 'Alors il dit au paralysé : '
  - type: text
    content: 'Je te l’ordonne : lève-toi, prends ton brancard, et rentre chez toi !'
  '7':
  - type: text
    content: Le paralysé se leva et s’en alla chez lui.
  '8':
  - type: text
    content: En voyant cela, les foules furent saisies de frayeur et rendirent gloire à Dieu qui avait donné aux hommes un si grand pouvoir.
  - type: heading
    content: Jésus est contesté
  - type: heading
    content: (Mc 2.13-22 ; Lc 5.27-39)
  '9':
  - type: text
    content: 'Jésus s’en alla. En passant, il vit un homme installé au poste de péage. Son nom était Matthieu. Il lui dit : '
  - type: text
    content: Suis-moi !
  - type: text
    content: Matthieu se leva et le suivit.
