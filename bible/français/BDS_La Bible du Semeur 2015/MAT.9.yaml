document_id: MAT.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit un malade et pardonne ses péchés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 2.1-12 ; Lc 5.17-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jésus monta dans un bateau, traversa le lac et se rendit dans sa ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 2.1
        metadata:
          usfm: MRK.2.1
      - type: text
        text: ', Capernaüm était considérée comme étant la ville de Jésus.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On lui amena un paralysé couché sur un brancard. Lorsqu’il vit la foi de ces gens, Jésus dit au paralysé : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prends courage, mon enfant, tes péchés te sont pardonnés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Là-dessus, quelques spécialistes de la Loi pensèrent en eux-mêmes : « Cet homme blasphème ! »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais Jésus connaissait leurs pensées. Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi avez-vous ces mauvaises pensées en vous-mêmes ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Qu’est-ce qui est le plus facile ? Dire : « Tes péchés te sont pardonnés », ou dire : « Lève-toi et marche » ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Eh bien, vous saurez que le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' a, sur la terre, le pouvoir de pardonner les péchés.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors il dit au paralysé : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je te l’ordonne : lève-toi, prends ton brancard, et rentre chez toi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le paralysé se leva et s’en alla chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En voyant cela, les foules furent saisies de frayeur et rendirent gloire à Dieu qui avait donné aux hommes un si grand pouvoir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est contesté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 2.13-22 ; Lc 5.27-39)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus s’en alla. En passant, il vit un homme installé au poste de péage. Son nom était Matthieu. Il lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi !
- type: usfm
  marker: p
  children:
  - type: text
    text: Matthieu se leva et le suivit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un jour, Jésus était à table chez Matthieu. Or, beaucoup de collecteurs d’impôts et de pécheurs notoires étaient venus et avaient pris place à table avec lui et ses disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En voyant cela, les pharisiens interpellèrent ses disciples : Comment votre maître peut-il manger de la sorte avec des collecteurs d’impôts et des pécheurs notoires ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais Jésus, qui les avait entendus, leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les bien-portants n’ont pas besoin de médecin ; ce sont les malades qui en ont besoin.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Allez donc apprendre quel est le sens de cette parole : '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ce que je veux, c’est la compassion bien plus que les sacrifices
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 6.6
        metadata:
          usfm: HOS.6.6
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: .
    - type: text
      text: ' Car je ne suis pas venu appeler des justes, mais des pécheurs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors les disciples de Jean vinrent trouver Jésus et lui demandèrent : Comment se fait-il que tes disciples ne jeûnent pas, alors que nous, comme les pharisiens, nous le faisons souvent ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus leur répondit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Comment les invités d’une noce pourraient-ils être tristes tant que le marié est avec eux ? Le temps viendra où celui-ci leur sera enlevé. Alors ils jeûneront.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne ne rapièce un vieux vêtement avec un morceau d’étoffe neuve, car la pièce rapportée arracherait une partie du vieux manteau et la déchirure serait pire qu’avant.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'De même, on ne verse pas dans de vieilles '
    - type: usfm
      marker: w
      children:
      - type: text
        text: outres
    - type: text
      text: ' du vin nouveau, sinon celles-ci éclatent, le vin se répand et les outres sont perdues. Non, on met le vin nouveau dans des outres neuves. Ainsi le vin et les outres se conservent.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plus fort que la maladie et la mort
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 5.21-43 ; Lc 8.40-56)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pendant que Jésus leur disait cela, un responsable juif arriva, se prosterna devant lui et lui dit : Ma fille vient de mourir : mais viens lui imposer les mains, et elle revivra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jésus se leva et le suivit avec ses disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A ce moment, une femme qui souffrait d’hémorragies depuis douze ans, s’approcha de lui par-derrière et toucha la frange de son vêtement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elle se disait : « Si seulement j’arrive à toucher son vêtement, je serai guérie. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus se retourna et, quand il l’aperçut, il lui dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Prends courage, ma fille : parce que tu as eu foi en moi, tu es guérie'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu es sauvée. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: L’auteur joue sans doute sur les deux sens. De même à la fin du v. 22 et au v. 20.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: A l’instant même, la femme fut guérie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lorsque Jésus arriva à la maison du responsable juif, il vit des joueurs de flûtes et toute une foule agitée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lors des enterrements, on engageait des joueurs de flûte et des pleureuses pour exprimer le deuil.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Retirez-vous, la fillette n’est pas morte, elle est seulement endormie.
- type: usfm
  marker: p
  children:
  - type: text
    text: Mais les gens se moquaient de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Lorsqu’il eut fait mettre tout le monde dehors, il entra dans la chambre, prit la main de la jeune fille, et elle se leva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: La nouvelle de ce qui s’était passé fit le tour de toute la contrée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque Jésus partit de là, deux aveugles le suivirent en criant : Fils de David, aie pitié de nous !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu’il fut arrivé à la maison, les aveugles s’approchèrent de lui. Il leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Croyez-vous que je peux faire ce que vous me demandez ?
- type: usfm
  marker: p
  children:
  - type: text
    text: – Oui, Seigneur, lui répondirent-ils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors il leur toucha les yeux en disant : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’il vous soit fait selon votre foi !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et aussitôt, leurs yeux s’ouvrirent. Jésus ajouta d’un ton sévère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres traduisent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jésus, indigné, leur dit. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’indignation de Jésus viendrait de ce que les aveugles l’ont appelé publiquement : « fils de David ».'
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Veillez à ce que personne n’apprenne ce qui vous est arrivé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Mais, une fois dehors, ils se mirent à raconter dans toute la région ce que Jésus avait fait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Par quel pouvoir ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais alors que les deux hommes sortaient, on amena à Jésus un homme muet qui était sous l’emprise d’un démon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jésus chassa le démon et le muet se mit à parler. La foule était émerveillée et disait : Jamais on n’a rien vu de pareil en Israël !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais les pharisiens, eux, déclaraient : C’est par le pouvoir du chef des démons qu’il chasse les démons.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La moisson et le choix des Douze
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mc 6.34 ; Lc 10.2)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus parcourait toutes les villes et tous les villages pour enseigner dans leurs synagogues. Il proclamait la Bonne Nouvelle du royaume de Dieu et guérissait toute maladie et toute infirmité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'En voyant les foules, il fut pris de pitié pour elles, car ces gens étaient inquiets et abattus, comme des brebis qui n’ont pas de berger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors il dit à ses disciples : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La moisson est abondante, mais les ouvriers peu nombreux.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Priez donc le Seigneur à qui appartient la moisson d’envoyer des ouvriers pour moissonner.
