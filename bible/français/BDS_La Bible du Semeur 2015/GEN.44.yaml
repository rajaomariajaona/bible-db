document_id: GEN.44
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Benjamin est accusé de vol
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph ordonna à l’intendant de sa maison : Remplis les sacs de ces hommes d’autant de vivres qu’ils peuvent en contenir, et remets l’argent de chacun à l’entrée de son sac. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu mettras ma coupe, la coupe d’argent, à l’ouverture du sac du plus jeune, avec l’argent de son blé.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'L’intendant exécuta les ordres de Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le lendemain matin, dès qu’il fit jour, on laissa partir ces gens avec leurs ânes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils venaient de quitter la ville, et n’en étaient pas encore bien loin, quand Joseph dit à son intendant : Va, poursuis ces gens ! Quand tu les auras rejoints, tu leur demanderas : « Pourquoi avez-vous rendu le mal pour le bien ? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pourquoi avez-vous volé la coupe dont mon maître se sert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque. Texte hébreu traditionnel : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: N’est-ce pas ce dont mon maître se sert…
    marker-yv: yv-n
  - type: text
    text: ' pour boire et pour lire les présages ? Vous avez mal agi. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’intendant les rattrapa donc et leur parla comme son maître le lui avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils lui répondirent : Pourquoi mon seigneur dit-il pareille chose ? Tes serviteurs n’ont jamais eu la pensée de commettre une telle action ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous t’avons rapporté du pays de Canaan l’argent que nous avons trouvé à l’ouverture de nos sacs. Pourquoi aurions-nous donc volé de l’argent ou de l’or dans la maison de ton maître ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que celui de tes serviteurs chez qui on trouvera cette coupe soit mis à mort et que nous-mêmes nous devenions esclaves de mon seigneur !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’intendant répondit : Bien ! Je vous prends au mot ! Celui sur qui on la trouvera sera mon esclave, mais les autres seront innocentés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils se hâtèrent de déposer chacun son sac par terre et de l’ouvrir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’intendant fouilla leurs sacs en commençant par celui de l’aîné et en finissant par celui du plus jeune. Et la coupe fut trouvée dans le sac de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils déchirèrent leurs vêtements, chacun rechargea son âne, et ils retournèrent à la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Juda se rendit avec ses frères à la maison de Joseph ; celui-ci s’y trouvait encore ; ils se prosternèrent à terre devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Joseph leur dit : Qu’est-ce que vous avez fait là ? Ne saviez-vous pas qu’un homme tel que moi a un pouvoir de divination ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Juda dit : Que répondrons-nous à mon seigneur ? Que dirions-nous ? Comment nous justifier ? Dieu a mis à découvert la faute de tes serviteurs. Nous voici donc les esclaves de mon seigneur, nous, ainsi que celui qui avait la coupe dans son sac.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais Joseph déclara : Il ne me viendrait pas à l’idée d’agir ainsi ! L’homme dans le sac duquel on a trouvé la coupe sera mon esclave ; mais vous, retournez tranquillement chez votre père.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Juda s’offre à la place de Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors Juda s’avança et dit : De grâce, mon seigneur, permets à ton serviteur de dire une parole à mon seigneur, sans que ta colère s’enflamme contre ton serviteur, car tu es l’égal du pharaon. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La première fois, mon seigneur a questionné ses serviteurs en leur demandant : « Avez-vous un père ou un autre frère ? » '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et nous avons répondu à notre seigneur : « Nous avons un père âgé et un jeune frère qui lui est né dans sa vieillesse et dont le frère est mort, celui-ci est le seul fils qui soit resté de sa mère, et son père l’aime. » '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu as commandé à tes serviteurs : « Amenez-le-moi pour que je le voie de mes propres yeux. » '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nous avons répondu à mon seigneur : « Le jeune garçon ne peut pas quitter son père ; sinon celui-ci en mourra. » '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors tu as déclaré à tes serviteurs : « Si votre jeune frère ne vient pas avec vous, vous ne serez plus admis en ma présence. » '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque nous sommes revenus auprès de ton serviteur, mon père, nous lui avons rapporté les paroles de mon seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et lorsque notre père a dit : « Retournez là-bas pour nous acheter quelques vivres », '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'nous lui avons répondu : « Nous ne pouvons y retourner qu’à la condition d’emmener notre jeune frère, car s’il n’est pas avec nous, nous ne serons pas admis auprès de cet homme. » '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Alors ton serviteur, mon père, nous a dit : « Vous savez vous-mêmes que ma femme m’a donné deux fils. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le premier, parti de chez moi, a été, je pense, dévoré par une bête sauvage, et jusqu’à ce jour, je ne l’ai plus revu. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Vous prenez encore celui-ci pour l’emmener loin de moi ; s’il lui arrive malheur, vous me ferez mourir de douleur à mon grand âge. » '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Maintenant donc, si je retourne auprès de ton serviteur, mon père, sans ramener avec nous le jeune homme auquel il est tellement attaché, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'quand il verra que le garçon n’est pas là, il mourra, et tes serviteurs seront responsables de l’avoir fait mourir de douleur dans son grand âge. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Car moi, ton serviteur, j’ai pris la responsabilité du jeune homme devant mon père ; je lui ai dit : « Si je ne te le ramène pas, je serai pour toujours coupable envers mon père. » '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Maintenant donc, je te prie, permets à ton serviteur de rester comme esclave de mon seigneur à la place du jeune homme, et qu’il reparte avec ses frères. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Comment pourrais-je retourner chez mon père sans le garçon ? Ah, que je ne sois pas témoin du malheur qui frapperait mon père !
