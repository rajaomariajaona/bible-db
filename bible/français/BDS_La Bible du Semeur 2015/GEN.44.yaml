document_id: GEN.44,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Benjamin est accusé de vol
  - type: text
    content: 'Joseph ordonna à l’intendant de sa maison : Remplis les sacs de ces hommes d’autant de vivres qu’ils peuvent en contenir, et remets l’argent de chacun à l’entrée de son sac. '
  '10':
  - type: text
    content: 'L’intendant répondit : Bien ! Je vous prends au mot ! Celui sur qui on la trouvera sera mon esclave, mais les autres seront innocentés.'
  '11':
  - type: text
    content: 'Ils se hâtèrent de déposer chacun son sac par terre et de l’ouvrir. '
  '12':
  - type: text
    content: 'L’intendant fouilla leurs sacs en commençant par celui de l’aîné et en finissant par celui du plus jeune. Et la coupe fut trouvée dans le sac de Benjamin. '
  '13':
  - type: text
    content: Ils déchirèrent leurs vêtements, chacun rechargea son âne, et ils retournèrent à la ville.
  '14':
  - type: text
    content: 'Juda se rendit avec ses frères à la maison de Joseph ; celui-ci s’y trouvait encore ; ils se prosternèrent à terre devant lui. '
  '15':
  - type: text
    content: 'Joseph leur dit : Qu’est-ce que vous avez fait là ? Ne saviez-vous pas qu’un homme tel que moi a un pouvoir de divination ?'
  '16':
  - type: text
    content: 'Juda dit : Que répondrons-nous à mon seigneur ? Que dirions-nous ? Comment nous justifier ? Dieu a mis à découvert la faute de tes serviteurs. Nous voici donc les esclaves de mon seigneur, nous, ainsi que celui qui avait la coupe dans son sac.'
  '17':
  - type: text
    content: 'Mais Joseph déclara : Il ne me viendrait pas à l’idée d’agir ainsi ! L’homme dans le sac duquel on a trouvé la coupe sera mon esclave ; mais vous, retournez tranquillement chez votre père.'
  - type: heading
    content: Juda s’offre à la place de Benjamin
  '18':
  - type: text
    content: 'Alors Juda s’avança et dit : De grâce, mon seigneur, permets à ton serviteur de dire une parole à mon seigneur, sans que ta colère s’enflamme contre ton serviteur, car tu es l’égal du pharaon. '
  '19':
  - type: text
    content: 'La première fois, mon seigneur a questionné ses serviteurs en leur demandant : « Avez-vous un père ou un autre frère ? » '
  '2':
  - type: text
    content: Tu mettras ma coupe, la coupe d’argent, à l’ouverture du sac du plus jeune, avec l’argent de son blé.
  - type: text
    content: 'L’intendant exécuta les ordres de Joseph. '
  '20':
  - type: text
    content: 'Et nous avons répondu à notre seigneur : « Nous avons un père âgé et un jeune frère qui lui est né dans sa vieillesse et dont le frère est mort, celui-ci est le seul fils qui soit resté de sa mère, et son père l’aime. » '
  '21':
  - type: text
    content: 'Tu as commandé à tes serviteurs : « Amenez-le-moi pour que je le voie de mes propres yeux. » '
  '22':
  - type: text
    content: 'Nous avons répondu à mon seigneur : « Le jeune garçon ne peut pas quitter son père ; sinon celui-ci en mourra. » '
  '23':
  - type: text
    content: 'Alors tu as déclaré à tes serviteurs : « Si votre jeune frère ne vient pas avec vous, vous ne serez plus admis en ma présence. » '
  '24':
  - type: text
    content: 'Lorsque nous sommes revenus auprès de ton serviteur, mon père, nous lui avons rapporté les paroles de mon seigneur. '
  '25':
  - type: text
    content: 'Et lorsque notre père a dit : « Retournez là-bas pour nous acheter quelques vivres », '
  '26':
  - type: text
    content: 'nous lui avons répondu : « Nous ne pouvons y retourner qu’à la condition d’emmener notre jeune frère, car s’il n’est pas avec nous, nous ne serons pas admis auprès de cet homme. » '
  '27':
  - type: text
    content: 'Alors ton serviteur, mon père, nous a dit : « Vous savez vous-mêmes que ma femme m’a donné deux fils. '
  '28':
  - type: text
    content: 'Le premier, parti de chez moi, a été, je pense, dévoré par une bête sauvage, et jusqu’à ce jour, je ne l’ai plus revu. '
  '29':
  - type: text
    content: 'Vous prenez encore celui-ci pour l’emmener loin de moi ; s’il lui arrive malheur, vous me ferez mourir de douleur à mon grand âge. » '
  '3':
  - type: text
    content: 'Le lendemain matin, dès qu’il fit jour, on laissa partir ces gens avec leurs ânes. '
  '30':
  - type: text
    content: 'Maintenant donc, si je retourne auprès de ton serviteur, mon père, sans ramener avec nous le jeune homme auquel il est tellement attaché, '
  '31':
  - type: text
    content: 'quand il verra que le garçon n’est pas là, il mourra, et tes serviteurs seront responsables de l’avoir fait mourir de douleur dans son grand âge. '
  '32':
  - type: text
    content: 'Car moi, ton serviteur, j’ai pris la responsabilité du jeune homme devant mon père ; je lui ai dit : « Si je ne te le ramène pas, je serai pour toujours coupable envers mon père. » '
  '33':
  - type: text
    content: 'Maintenant donc, je te prie, permets à ton serviteur de rester comme esclave de mon seigneur à la place du jeune homme, et qu’il reparte avec ses frères. '
  '34':
  - type: text
    content: Comment pourrais-je retourner chez mon père sans le garçon ? Ah, que je ne sois pas témoin du malheur qui frapperait mon père !
  '4':
  - type: text
    content: 'Ils venaient de quitter la ville, et n’en étaient pas encore bien loin, quand Joseph dit à son intendant : Va, poursuis ces gens ! Quand tu les auras rejoints, tu leur demanderas : « Pourquoi avez-vous rendu le mal pour le bien ? '
  '5':
  - type: text
    content: Pourquoi avez-vous volé la coupe dont mon maître se sert
  - type: note
    content: 'D’après l’ancienne version grecque. Texte hébreu traditionnel : N’est-ce pas ce dont mon maître se sert…'
  - type: text
    content: ' pour boire et pour lire les présages ? Vous avez mal agi. »'
  '6':
  - type: text
    content: 'L’intendant les rattrapa donc et leur parla comme son maître le lui avait dit. '
  '7':
  - type: text
    content: 'Ils lui répondirent : Pourquoi mon seigneur dit-il pareille chose ? Tes serviteurs n’ont jamais eu la pensée de commettre une telle action ! '
  '8':
  - type: text
    content: 'Nous t’avons rapporté du pays de Canaan l’argent que nous avons trouvé à l’ouverture de nos sacs. Pourquoi aurions-nous donc volé de l’argent ou de l’or dans la maison de ton maître ? '
  '9':
  - type: text
    content: Que celui de tes serviteurs chez qui on trouvera cette coupe soit mis à mort et que nous-mêmes nous devenions esclaves de mon seigneur !
