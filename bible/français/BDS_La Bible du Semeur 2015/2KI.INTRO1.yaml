- type: usfm
  marker: imt1
  children:
  - type: text
    text: Introduction
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le deuxième livre des Rois poursuit le récit de l’histoire des royaumes de Juda, au sud, et d’Israël, au nord, jusqu’à leur destruction : en 722​721 a lieu la chute de Samarie, capitale du royaume du Nord, et en 587 avant Jésus-Christ celle de Jérusalem, capitale du royaume du Sud. Le livre couvre ainsi deux cent cinquante ans d’histoire. Comme dans 1 Rois, l’auteur fait alterner les règnes des souverains d’Israël et de Juda en suivant l’ordre chronologique et évalue leurs faits et gestes selon leur respect de l’alliance de l’Eternel avec son peuple (voir l’introduction à 1 Rois).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Israël et Juda, royaumes parmi les autres, ont été largement impliqués dans les luttes d’influence et les guerres des peuples du Moyen-Orient ancien. Durant les premiers règnes mentionnés par 2 Rois, à l’époque des prophètes Elie et Elisée, au neuvième siècle avant Jésus-Christ, les ennemis d’Israël furent souvent les Syriens de Damas. Vers la fin du siècle, les campagnes d’Hazaël et de son fils Ben-Hadad menacèrent même, pendant un temps, l’indépendance d’Israël (10.32-33 ; 13.1-7).
- type: usfm
  marker: ip
  children:
  - type: text
    text: En 743 avant Jésus-Christ, Tiglath-Piléser, roi d’Assyrie, envahit la région. Il impose un tribut à Azaria, roi de Juda et à Menahem, roi d’Israël (15.19). En 722​721, Samarie tombe ; elle est détruite par les Assyriens qui déportent sa population (17.3-6). En 701, Sennachérib envahit Juda et assiège Jérusalem (18.13-25), mais la ville est sauvée de façon miraculeuse (19.35-36).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Sous le roi Manassé, Juda demeure le vassal de l’Assyrie, mais lorsque Josias arrive au pouvoir, il parvient à assurer l’indépendance du pays, l’Assyrie étant de plus en plus menacée par les Babyloniens. Pris en étau entre l’Egypte, alliée de l’Assyrie, et Babylone, Juda se verra envahi par l’une puis par l’autre de ces deux grandes puissances à la fin du septième siècle avant Jésus-Christ (23.29-30 ; 24.1-7). Cette situation dura jusqu’en 587, année où Nabuchodonosor met fin à toute tentative de révolte contre lui en détruisant Jérusalem et en déportant sa population (chap. 25).
- type: usfm
  marker: ip
  children:
  - type: text
    text: La destruction des deux royaumes d’Israël et de Juda est le juste châtiment d’un peuple infidèle qui s’est détourné de l’Eternel, son Suzerain, pour adorer de faux dieux. Pourtant, jamais l’Eternel n’a cessé d’avertir les Israélites du jugement qui les attendait, conformément aux sanctions de l’alliance du Sinaï (Lv 26 ; Dt 28). C’est, en effet, pendant la période couverte par 2 Rois que les prophètes d’avant l’exil, auteurs des livres prophétiques contenus dans la Bible, ont exercé leur ministère.
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’auteur, probablement en exil à Babylone, désire que le peuple tire les leçons de son histoire et il invite son lecteur à rejeter, lui aussi, les péchés qui ont entraîné le jugement d’Israël.
