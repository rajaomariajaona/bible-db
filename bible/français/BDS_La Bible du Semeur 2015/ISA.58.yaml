document_id: ISA.58
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire de Sion rachetée
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Le vrai jeûne
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Crie de toutes tes forces
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne te retiens pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais retentir ta voix ╵comme le son du cor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était utilisé pour rassembler les guerriers pour le combat ou les fidèles pour les fêtes religieuses.
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A mon peuple dénonce sa révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aux descendants de Jacob leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils me recherchent chaque jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils disent qu’ils se plaisent ╵à connaître mes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme ferait un peuple ╵qui accomplit ce qui est juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’a pas délaissé ╵le droit que son Dieu a prescrit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils exigent de moi ╵de justes jugements
- type: usfm
  marker: q1
  children:
  - type: text
    text: et veulent être près de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: « Que nous sert de jeûner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu ne le vois pas ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi nous humilier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu n’y prends pas garde ? »
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour où vous jeûnez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous traitez vos affaires
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous faites ce que vous voulez.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous exploitez tous vos ouvriers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: vous passez votre jeûne ╵en procès et querelles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en donnant des coups de poing ╵avec méchanceté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n’est pas par des jeûnes, ╵comme ceux d’aujourd’hui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vous ferez entendre ╵vos prières là-haut !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Est-ce cela le jeûne ╵auquel je prends plaisir ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce cela un jour ╵où l’homme s’humilie ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’agit-il de courber ╵la tête comme un jonc
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de vous étaler ╵sur le sac et la cendre ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pouvez-vous appeler ╵cela un jour de jeûne
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’Eternel agrée ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le jeûne qui me plaît
- type: usfm
  marker: q1
  children:
  - type: text
    text: est celui qui consiste ╵à détacher les liens ╵de la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à délier les courroies ╵de toute servitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à mettre en liberté ╵tous ceux que l’on opprime
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à briser ╵toute espèce de joug.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C’est partager ton pain ╵avec ceux qui ont faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et offrir l’hospitalité ╵aux pauvres sans abri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c’est donner des habits ╵à celui qu’on voit nu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne pas te détourner ╵de ton prochain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Mt 25.35-36 ; Jc 2.15-16.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors, comme l’aurore, ╵jaillira ta lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton rétablissement ╵s’opérera bien vite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, alors la justice ╵marchera devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la gloire de l’Eternel ╵sera l’arrière-garde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '52.12'
        metadata:
          usfm: ISA.52.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Quand tu appelleras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel répondra ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu crieras à l’aide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il dira : « Je suis là ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si, du milieu de toi, ╵tu supprimes le joug de l’oppression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les gestes menaçants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les propos méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: si tu donnes ton pain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après quelques manuscrits hébreux, les versions syriaque et grecque. Le texte hébreu traditionnel porte : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Si tu te donnes.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: à celui qui a faim
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu pourvois aux besoins ╵de l’opprimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lumière luira pour toi ╵au milieu des ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton obscurité ╵se changera pour toi ╵en clarté de midi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Eternel te conduira constamment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il pourvoira à tes besoins ╵dans les déserts arides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il te fortifiera physiquement
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ressembleras ╵à un jardin bien arrosé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à une source vive ╵aux eaux intarissables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les tiens rebâtiront ╵les ruines d’autrefois
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu relèveras ╵les fondements posés ╵dans les siècles passés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu seras appelé : ╵« Réparateur des brèches »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « le restaurateur des chemins » ╵qui rend le pays habitable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si, le jour du sabbat, ╵tu te retiens de travailler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu t’abstiens ╵de traiter tes affaires ╵en ce jour qui m’est consacré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si pour toi le jour du sabbat ╵est un temps de délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si ce saint jour de l’Eternel, ╵tu le tiens en estime
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu le respectes
- type: usfm
  marker: q1
  children:
  - type: text
    text: en t’abstenant de faire ╵ce qui te plaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de traiter tes affaires
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de tenir de longs discours,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: alors tu trouveras ╵ta joie en l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur les hauteurs du pays ╵je te ferai passer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te donnerai ╵la pleine jouissance ╵du patrimoine ╵de Jacob, ton ancêtre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel a parlé.
