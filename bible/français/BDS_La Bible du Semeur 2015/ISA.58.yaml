document_id: ISA.58,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire de Sion rachetée
  - type: heading
    content: Le vrai jeûne
  - type: text
    content: Crie de toutes tes forces
  - type: text
    content: et ne te retiens pas.
  - type: text
    content: Fais retentir ta voix ╵comme le son du cor
  - type: note
    content: Le cor était utilisé pour rassembler les guerriers pour le combat ou les fidèles pour les fêtes religieuses.
  - type: text
    content: '  !'
  - type: text
    content: A mon peuple dénonce sa révolte,
  - type: text
    content: et aux descendants de Jacob leurs fautes.
  '10':
  - type: text
    content: si tu donnes ton pain
  - type: note
    content: 'D’après quelques manuscrits hébreux, les versions syriaque et grecque. Le texte hébreu traditionnel porte : Si tu te donnes.'
  - type: text
    content: à celui qui a faim
  - type: text
    content: et si tu pourvois aux besoins ╵de l’opprimé,
  - type: text
    content: la lumière luira pour toi ╵au milieu des ténèbres,
  - type: text
    content: et ton obscurité ╵se changera pour toi ╵en clarté de midi,
  '11':
  - type: text
    content: L’Eternel te conduira constamment.
  - type: text
    content: Il pourvoira à tes besoins ╵dans les déserts arides,
  - type: text
    content: il te fortifiera physiquement
  - type: text
    content: et tu ressembleras ╵à un jardin bien arrosé,
  - type: text
    content: à une source vive ╵aux eaux intarissables.
  '12':
  - type: text
    content: Les tiens rebâtiront ╵les ruines d’autrefois
  - type: text
    content: et tu relèveras ╵les fondements posés ╵dans les siècles passés.
  - type: text
    content: 'Tu seras appelé : ╵« Réparateur des brèches »,'
  - type: text
    content: « le restaurateur des chemins » ╵qui rend le pays habitable.
  '13':
  - type: text
    content: Si, le jour du sabbat, ╵tu te retiens de travailler,
  - type: text
    content: si tu t’abstiens ╵de traiter tes affaires ╵en ce jour qui m’est consacré,
  - type: text
    content: si pour toi le jour du sabbat ╵est un temps de délices,
  - type: text
    content: si ce saint jour de l’Eternel, ╵tu le tiens en estime
  - type: text
    content: et si tu le respectes
  - type: text
    content: en t’abstenant de faire ╵ce qui te plaît,
  - type: text
    content: de traiter tes affaires
  - type: text
    content: et de tenir de longs discours,
  '14':
  - type: text
    content: alors tu trouveras ╵ta joie en l’Eternel,
  - type: text
    content: et sur les hauteurs du pays ╵je te ferai passer
  - type: text
    content: et je te donnerai ╵la pleine jouissance ╵du patrimoine ╵de Jacob, ton ancêtre.
  - type: text
    content: L’Eternel a parlé.
  '2':
  - type: text
    content: Ils me recherchent chaque jour,
  - type: text
    content: ils disent qu’ils se plaisent ╵à connaître mes voies,
  - type: text
    content: comme ferait un peuple ╵qui accomplit ce qui est juste
  - type: text
    content: et n’a pas délaissé ╵le droit que son Dieu a prescrit.
  - type: text
    content: Ils exigent de moi ╵de justes jugements
  - type: text
    content: et veulent être près de Dieu.
  '3':
  - type: text
    content: « Que nous sert de jeûner,
  - type: text
    content: si tu ne le vois pas ?
  - type: text
    content: Pourquoi nous humilier,
  - type: text
    content: si tu n’y prends pas garde ? »
  - type: text
    content: Au jour où vous jeûnez,
  - type: text
    content: vous traitez vos affaires
  - type: note
    content: 'Autre traduction : vous faites ce que vous voulez.'
  - type: text
    content: et vous exploitez tous vos ouvriers,
  '4':
  - type: text
    content: vous passez votre jeûne ╵en procès et querelles
  - type: text
    content: et en donnant des coups de poing ╵avec méchanceté.
  - type: text
    content: Ce n’est pas par des jeûnes, ╵comme ceux d’aujourd’hui,
  - type: text
    content: que vous ferez entendre ╵vos prières là-haut !
  '5':
  - type: text
    content: Est-ce cela le jeûne ╵auquel je prends plaisir ?
  - type: text
    content: Est-ce cela un jour ╵où l’homme s’humilie ?
  - type: text
    content: S’agit-il de courber ╵la tête comme un jonc
  - type: text
    content: et de vous étaler ╵sur le sac et la cendre ?
  - type: text
    content: Pouvez-vous appeler ╵cela un jour de jeûne
  - type: text
    content: que l’Eternel agrée ?
  '6':
  - type: text
    content: Le jeûne qui me plaît
  - type: text
    content: est celui qui consiste ╵à détacher les liens ╵de la méchanceté,
  - type: text
    content: à délier les courroies ╵de toute servitude,
  - type: text
    content: à mettre en liberté ╵tous ceux que l’on opprime
  - type: text
    content: et à briser ╵toute espèce de joug.
  '7':
  - type: text
    content: C’est partager ton pain ╵avec ceux qui ont faim,
  - type: text
    content: et offrir l’hospitalité ╵aux pauvres sans abri,
  - type: text
    content: c’est donner des habits ╵à celui qu’on voit nu,
  - type: text
    content: ne pas te détourner ╵de ton prochain
  - type: note
    content: Voir Mt 25.35-36 ; Jc 2.15-16.
  - type: text
    content: .
  '8':
  - type: text
    content: Alors, comme l’aurore, ╵jaillira ta lumière,
  - type: text
    content: ton rétablissement ╵s’opérera bien vite.
  - type: text
    content: Oui, alors la justice ╵marchera devant toi,
  - type: text
    content: et la gloire de l’Eternel ╵sera l’arrière-garde
  - type: note
    content: Voir 52.12.
  - type: text
    content: .
  '9':
  - type: text
    content: Quand tu appelleras,
  - type: text
    content: l’Eternel répondra ;
  - type: text
    content: quand tu crieras à l’aide,
  - type: text
    content: 'il dira : « Je suis là ! »'
  - type: text
    content: Si, du milieu de toi, ╵tu supprimes le joug de l’oppression,
  - type: text
    content: les gestes menaçants
  - type: text
    content: et les propos méchants,
