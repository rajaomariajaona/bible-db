document_id: JER.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Si tu reviens, ô Israël, ╵si tu reviens à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu ôtes de devant moi ╵tes abominations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans plus errer de çà, de là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'si tu prêtes serment, disant : ╵« L’Eternel est vivant »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu le fais ╵en respectant la vérité ╵dans la droiture et la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors les autres peuples ╵seront bénis par l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 12.2-3
        metadata:
          usfm: GEN.12.2+GEN.12.3
      - type: text
        text: '. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se béniront par l’Eternel.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tireront de lui leur gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car voici ce que l’Eternel déclare ╵aux hommes de Juda ╵et à Jérusalem :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Défrichez-vous un champ nouveau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 10.12
        metadata:
          usfm: HOS.10.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne semez plus parmi les ronces !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Purifiez-vous pour l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: circoncisez vos cœurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ô hommes de Juda, ╵habitants de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car sinon ma colère ╵jaillira comme un feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle brûlera
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que nul ne l’éteigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de la perfidie ╵de vos agissements.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’invasion qui vient
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Alarme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Adressez un appel ╵au peuple de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’on le fasse entendre ╵dans tout Jérusalem !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sonnez du cor ╵à travers le pays !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Criez à pleine voix et dites :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Rassemblez-vous, ╵rallions les villes fortifiées ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dressez un étendard ╵du côté de Sion !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mettez-vous à l’abri, ╵et ne restez pas là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je fais venir du nord un malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une grande catastrophe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Un lion surgit de son fourré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui détruit les nations ╵s’est mis en route,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sort de son repaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ravager votre pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour dévaster vos villes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les laisser sans habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est pourquoi, revêtez ╵des habits de toile de sac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pleurez, lamentez-vous !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la colère ardente ╵de l’Eternel ╵ne se détourne pas de nous.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Désarroi
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et il arrivera en ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le roi perdra tout courage ╵et les ministres avec lui ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prêtres seront consternés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les prophètes stupéfaits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit des faux prophètes qui ont annoncé la paix.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors je répondis : ╵Ah, Seigneur Eternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as vraiment trompé ce peuple ╵et tout Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'quand tu leur as promis : ╵« Vous vivrez dans la paix »,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que maintenant ╵l’épée attente à notre vie.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Jugement
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En ce temps-là, ╵on dira à ce peuple ╵et à Jérusalem :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Des hauteurs du désert, ╵arrive un vent torride,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il vient en direction ╵des membres de mon peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce vent n’est destiné ╵ni à vanner le blé ╵ni à le nettoyer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est un vent violent
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui vient de tout là-bas ╵et il est à mes ordres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, maintenant, c’est moi, ╵qui prononce sur eux ╵le jugement. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’ennemi vient ╵pareil à des nuées d’orage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses chars sont comme l’ouragan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses chevaux ╵plus légers que les aigles !
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Malheur à nous : ╵nous sommes dévastés !'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nettoie ton cœur ╵de sa méchanceté, Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu seras sauvée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand ╵seras-tu habitée
- type: usfm
  marker: q1
  children:
  - type: text
    text: de projets malveillants ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Une proclamation ╵se fait entendre depuis Dan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dan
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tribu installée au nord d’Israël (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 19.47
        metadata:
          usfm: JOS.19.47
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’on annonce le malheur ╵sur les monts d’Ephraïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zone montagneuse au centre du pays d’Israël, à une vingtaine de kilomètres de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Annoncez-le aux peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'avertissez Jérusalem :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des assiégeants arrivent ╵d’un pays éloigné
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils poussent leurs cris ╵contre les villes de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tels des gardiens d’un champ,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont postés ╵tout autour de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elle s’est révoltée contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l’Eternel le déclare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Voilà ce que te valent ╵ta conduite et tes actes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel sera ton malheur !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, cela est amer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cela pénétrera ╵jusqu’en ton cœur.
- type: usfm
  marker: s2
  children:
  - type: text
    text: J’en suis malade
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je suis bouleversé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me tords de douleur, ╵et mon cœur bat très fort !
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le tumulte en moi, ╵je ne peux pas me taire
- type: usfm
  marker: q1
  children:
  - type: text
    text: car j’ai bien entendu ╵le son du cor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le cri de guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On crie : « Désastre sur désastre ! »'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le pays est ravagé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soudain, mes tentes sont détruites
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes abris en un instant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Jusques à quand verrai-je ╵des étendards dressés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et entendrai-je ╵le son du cor ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ah ! Mon peuple est stupide !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne me connaît pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont des enfants insensés
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne comprennent rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont d’habileté ╵que pour faire du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils ne savent pas ╵faire ce qui est bien.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Désolation
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je regarde la terre :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle m’apparaît chaotique et vide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gn 1.2
        metadata:
          usfm: GEN.1.2
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je regarde le ciel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n’a plus de lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je regarde les monts :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont bien secoués
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les collines ╵sont ébranlées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je regarde, et voici
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l’homme a disparu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les oiseaux se sont enfuis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je regarde, et voici :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la campagne fertile ╵n’est plus qu’un grand désert !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les villes ╵sont démolies ╵par-devant l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de son ardente colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car ainsi parle l’Eternel :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le pays est dévasté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je ne le détruirai pas ╵entièrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A cause de cela, ╵la terre sera dans le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le ciel tout là-haut ╵s’obscurcira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je l’ai annoncé. ╵Je l’ai bien résolu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n’y renonce pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne reviendrai pas dessus.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Angoisse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Au bruit des cavaliers ╵et des archers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute la ville prend la fuite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On se réfugie dans les bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on escalade les rochers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La ville est tout abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n’a plus d’habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Que fais-tu, ville dévastée ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu te vêts d’écarlate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu mets des bijoux d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fardes tes paupières ╵avec de l’antimoine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'c’est en vain que tu te fais belle :'
