document_id: JER.4,21
type_code: fra
verses:
  '1':
  - type: text
    content: Si tu reviens, ô Israël, ╵si tu reviens à moi,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: si tu ôtes de devant moi ╵tes abominations,
  - type: text
    content: sans plus errer de çà, de là,
  '10':
  - type: text
    content: 'Alors je répondis : ╵Ah, Seigneur Eternel,'
  - type: text
    content: tu as vraiment trompé ce peuple ╵et tout Jérusalem
  - type: text
    content: 'quand tu leur as promis : ╵« Vous vivrez dans la paix »,'
  - type: text
    content: alors que maintenant ╵l’épée attente à notre vie.
  - type: heading
    content: Jugement
  '11':
  - type: text
    content: 'En ce temps-là, ╵on dira à ce peuple ╵et à Jérusalem :'
  - type: text
    content: « Des hauteurs du désert, ╵arrive un vent torride,
  - type: text
    content: il vient en direction ╵des membres de mon peuple.
  - type: text
    content: Ce vent n’est destiné ╵ni à vanner le blé ╵ni à le nettoyer.
  '12':
  - type: text
    content: C’est un vent violent
  - type: text
    content: qui vient de tout là-bas ╵et il est à mes ordres.
  - type: text
    content: Et, maintenant, c’est moi, ╵qui prononce sur eux ╵le jugement. »
  '13':
  - type: text
    content: L’ennemi vient ╵pareil à des nuées d’orage,
  - type: text
    content: ses chars sont comme l’ouragan,
  - type: text
    content: et ses chevaux ╵plus légers que les aigles !
  - type: text
    content: 'Malheur à nous : ╵nous sommes dévastés !'
  '14':
  - type: text
    content: Nettoie ton cœur ╵de sa méchanceté, Jérusalem,
  - type: text
    content: et tu seras sauvée.
  - type: text
    content: Jusques à quand ╵seras-tu habitée
  - type: text
    content: de projets malveillants ?
  '15':
  - type: text
    content: Une proclamation ╵se fait entendre depuis Dan
  - type: note
    content: 'Dan: tribu installée au nord d’Israël (Jos 19.47).'
  - type: text
    content: ','
  - type: text
    content: et l’on annonce le malheur ╵sur les monts d’Ephraïm
  - type: note
    content: Zone montagneuse au centre du pays d’Israël, à une vingtaine de kilomètres de Jérusalem.
  - type: text
    content: .
  '16':
  - type: text
    content: Annoncez-le aux peuples,
  - type: text
    content: 'avertissez Jérusalem :'
  - type: text
    content: Des assiégeants arrivent ╵d’un pays éloigné
  - type: text
    content: et ils poussent leurs cris ╵contre les villes de Juda.
  '17':
  - type: text
    content: Tels des gardiens d’un champ,
  - type: text
    content: ils sont postés ╵tout autour de Jérusalem,
  - type: text
    content: car elle s’est révoltée contre moi,
  - type: text
    content: l’Eternel le déclare.
  '18':
  - type: text
    content: Voilà ce que te valent ╵ta conduite et tes actes ;
  - type: text
    content: tel sera ton malheur !
  - type: text
    content: Oui, cela est amer,
  - type: text
    content: cela pénétrera ╵jusqu’en ton cœur.
  - type: heading
    content: J’en suis malade
  '19':
  - type: text
    content: Je suis bouleversé,
  - type: text
    content: je me tords de douleur, ╵et mon cœur bat très fort !
  - type: text
    content: C’est le tumulte en moi, ╵je ne peux pas me taire
  - type: text
    content: car j’ai bien entendu ╵le son du cor,
  - type: text
    content: le cri de guerre.
  '2':
  - type: text
    content: 'si tu prêtes serment, disant : ╵« L’Eternel est vivant »,'
  - type: text
    content: si tu le fais ╵en respectant la vérité ╵dans la droiture et la justice,
  - type: text
    content: alors les autres peuples ╵seront bénis par l’Eternel
  - type: note
    content: 'Voir Gn 12.2-3. Autre traduction : se béniront par l’Eternel.'
  - type: text
    content: et tireront de lui leur gloire.
  '20':
  - type: text
    content: 'On crie : « Désastre sur désastre ! »'
  - type: text
    content: Tout le pays est ravagé !
  - type: text
    content: Soudain, mes tentes sont détruites
  - type: text
    content: et mes abris en un instant.
  '21':
  - type: text
    content: Jusques à quand verrai-je ╵des étendards dressés
  - type: text
    content: et entendrai-je ╵le son du cor ?
  '22':
  - type: text
    content: Ah ! Mon peuple est stupide !
  - type: text
    content: Il ne me connaît pas,
  - type: text
    content: ce sont des enfants insensés
  - type: text
    content: qui ne comprennent rien.
  - type: text
    content: Ils n’ont d’habileté ╵que pour faire du mal,
  - type: text
    content: mais ils ne savent pas ╵faire ce qui est bien.
  - type: heading
    content: Désolation
  '23':
  - type: text
    content: 'Je regarde la terre :'
  - type: text
    content: elle m’apparaît chaotique et vide
  - type: note
    content: Voir Gn 1.2.
  - type: text
    content: '  ;'
  - type: text
    content: 'je regarde le ciel :'
  - type: text
    content: il n’a plus de lumière.
  '24':
  - type: text
    content: 'Je regarde les monts :'
  - type: text
    content: ils sont bien secoués
  - type: text
    content: et toutes les collines ╵sont ébranlées.
  '25':
  - type: text
    content: Je regarde, et voici
  - type: text
    content: que l’homme a disparu
  - type: text
    content: et les oiseaux se sont enfuis.
  '26':
  - type: text
    content: 'Je regarde, et voici :'
  - type: text
    content: la campagne fertile ╵n’est plus qu’un grand désert !
  - type: text
    content: Toutes les villes ╵sont démolies ╵par-devant l’Eternel,
  - type: text
    content: à cause de son ardente colère.
  '27':
  - type: text
    content: 'Car ainsi parle l’Eternel :'
  - type: text
    content: Tout le pays est dévasté,
  - type: text
    content: mais je ne le détruirai pas ╵entièrement.
  '28':
  - type: text
    content: A cause de cela, ╵la terre sera dans le deuil,
  - type: text
    content: et le ciel tout là-haut ╵s’obscurcira,
  - type: text
    content: car je l’ai annoncé. ╵Je l’ai bien résolu,
  - type: text
    content: je n’y renonce pas,
  - type: text
    content: je ne reviendrai pas dessus.
  - type: heading
    content: Angoisse
  '29':
  - type: text
    content: Au bruit des cavaliers ╵et des archers,
  - type: text
    content: toute la ville prend la fuite.
  - type: text
    content: On se réfugie dans les bois,
  - type: text
    content: on escalade les rochers.
  - type: text
    content: La ville est tout abandonnée,
  - type: text
    content: et n’a plus d’habitants.
  '3':
  - type: text
    content: 'Car voici ce que l’Eternel déclare ╵aux hommes de Juda ╵et à Jérusalem :'
  - type: text
    content: Défrichez-vous un champ nouveau
  - type: note
    content: Voir Os 10.12.
  - type: text
    content: ','
  - type: text
    content: ne semez plus parmi les ronces !
  '30':
  - type: text
    content: Que fais-tu, ville dévastée ?
  - type: text
    content: Tu te vêts d’écarlate,
  - type: text
    content: tu mets des bijoux d’or,
  - type: text
    content: tu fardes tes paupières ╵avec de l’antimoine,
  - type: text
    content: 'c’est en vain que tu te fais belle :'
  - type: text
    content: tes amants
  - type: note
    content: 'tes amants: les nations avec lesquelles Juda cherche à s’allier (voir 2.18, 36).'
  - type: text
    content: ' te méprisent,'
  - type: text
    content: ils veulent te tuer.
  '31':
  - type: text
    content: J’entends comme la plainte ╵d’une femme en travail,
  - type: text
    content: 'comme des cris d’angoisse ╵d’une mère accouchant ╵de son premier enfant :'
  - type: text
    content: 'ce sont les cris que pousse ╵Dame Sion :'
  - type: text
    content: elle suffoque
  - type: text
    content: 'et elle tend les mains :'
  - type: text
    content: « Malheur à moi !
  - type: text
    content: Je suis à bout de souffle ╵face aux tueurs. »
  '4':
  - type: text
    content: Purifiez-vous pour l’Eternel,
  - type: text
    content: circoncisez vos cœurs,
  - type: text
    content: ô hommes de Juda, ╵habitants de Jérusalem,
  - type: text
    content: car sinon ma colère ╵jaillira comme un feu,
  - type: text
    content: et elle brûlera
  - type: text
    content: sans que nul ne l’éteigne
  - type: text
    content: à cause de la perfidie ╵de vos agissements.
  - type: heading
    content: L’invasion qui vient
  - type: heading
    content: Alarme
  '5':
  - type: text
    content: Adressez un appel ╵au peuple de Juda,
  - type: text
    content: et qu’on le fasse entendre ╵dans tout Jérusalem !
  - type: text
    content: Sonnez du cor ╵à travers le pays !
  - type: text
    content: 'Criez à pleine voix et dites :'
  - type: text
    content: « Rassemblez-vous, ╵rallions les villes fortifiées ! »
  '6':
  - type: text
    content: Dressez un étendard ╵du côté de Sion !
  - type: text
    content: Mettez-vous à l’abri, ╵et ne restez pas là,
  - type: text
    content: car je fais venir du nord un malheur,
  - type: text
    content: et une grande catastrophe.
  '7':
  - type: text
    content: Un lion surgit de son fourré,
  - type: text
    content: celui qui détruit les nations ╵s’est mis en route,
  - type: text
    content: il sort de son repaire
  - type: text
    content: pour ravager votre pays,
  - type: text
    content: pour dévaster vos villes
  - type: text
    content: et les laisser sans habitants.
  '8':
  - type: text
    content: C’est pourquoi, revêtez ╵des habits de toile de sac,
  - type: text
    content: pleurez, lamentez-vous !
  - type: text
    content: Car la colère ardente ╵de l’Eternel ╵ne se détourne pas de nous.
  - type: heading
    content: Désarroi
  '9':
  - type: text
    content: Et il arrivera en ce jour-là,
  - type: text
    content: l’Eternel le déclare,
  - type: text
    content: que le roi perdra tout courage ╵et les ministres avec lui ;
  - type: text
    content: les prêtres seront consternés
  - type: text
    content: et les prophètes stupéfaits
  - type: note
    content: Il s’agit des faux prophètes qui ont annoncé la paix.
  - type: text
    content: .
