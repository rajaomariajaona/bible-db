document_id: ZEC.11,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Dieu abat les puissants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Liban, ouvre tes portes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu’un feu dévore tes cèdres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pour les v. 1-3, voir Es 10.33-34 ; Ez 31 ; Es 2.13 ; Jr 49.19.
      marker-yv: yv-n
    - type: text
      text: '  !'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis je pris ma houlette que j’avais nommée Grâce et je la brisai pour annuler l’alliance que j’avais conclue avec tous les peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il doit s’agir d’une alliance avec les peuples pour qu’ils laissent Israël en paix.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle fut donc annulée ce jour-là. Alors les brebis les plus misérables
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les plus misérables
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les marchands.
      marker-yv: yv-n
    - type: text
      text: ' du troupeau qui m’observaient comprirent que c’était la volonté de l’Eternel.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je leur déclarai : Si vous le jugez bon, donnez-moi mon salaire, sinon, n’en faites rien.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils me donnèrent pour salaire trente sicles d’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le prix d’un esclave (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 21.32
        - type: text
          text: '). Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 26.15
        - type: text
          text: '. Les v. 12-13 sont cités en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 27.9-10
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Eternel me dit : Jette-le au potier, ce joli prix auquel j’ai été estimé !'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je pris les trente sicles d’argent et je les jetai dans le temple de l’Eternel pour le potier
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le potier
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’après la plupart des manuscrits du texte hébreu traditionnel et '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 27.10
        - type: text
          text: '. Certains manuscrits hébreux et la version syriaque ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le trésor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Mt 27.6
        - type: text
          text: '). L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la fournaise. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains traduisent par : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le fondeur.
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis je brisai ma seconde houlette, celle que j’avais nommée Union, pour signifier la rupture de la fraternité entre Juda et Israël.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel me dit encore : Procure-toi maintenant l’attirail d’un berger qui sera insensé, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car je vais susciter dans le pays un berger qui ne s’inquiétera pas des brebis qui disparaissent, il n’ira pas à la recherche de celles qui sont égarées, il ne soignera pas celles qui sont blessées, ne pourvoira pas aux besoins de celles qui se portent bien ; mais il mangera la chair de celles qui sont grasses et il leur brisera les sabots.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur au berger vaurien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui abandonne son troupeau !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’épée lacère son bras
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et lui crève l’œil droit !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que son bras se dessèche, ╵oui, se dessèche !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que son œil droit s’éteigne, ╵s’éteigne bel et bien !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lamente-toi, cyprès, ╵car le cèdre est tombé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les arbres majestueux ╵ont été abattus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gémissez, chênes du Basan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la forêt si dense ╵a été abattue.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend les bergers gémir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ce qui faisait leur orgueil ╵a été dévasté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entend les lionceaux rugir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les forêts touffues ╵faisant la fierté du Jourdain ╵ont été abattues.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les bons et les mauvais bergers
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Eternel mon Dieu dit : Sois le berger du troupeau voué au carnage. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui achètent les brebis les tuent impunément, ceux qui les vendent s’écrient : « Béni soit l’Eternel ! Je me suis enrichi ! », tandis que leurs propres bergers n’ont aucune pitié pour elles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Désormais, moi aussi, je n’aurai plus pitié des habitants de ce pays, l’Eternel le déclare. Je livrerai les hommes aux mains les uns des autres et entre les mains de leur roi. Ils saccageront le pays et je ne délivrerai personne de leur oppression.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je me mis donc à faire paître les brebis destinées au carnage, et surtout les plus misérables du troupeau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et surtout… du troupeau
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon le texte hébreu traditionnel. L’ancienne version grecque a : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour les marchands.
      marker-yv: yv-n
    - type: text
      text: '. Je pris deux houlettes, je nommai l’une Grâce, et l’autre Union. Puis je me mis à faire paître les brebis du troupeau. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’éliminai en un mois leurs trois bergers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’identification de ces trois bergers est problématique.
      marker-yv: yv-n
    - type: text
      text: . Mais je perdis patience avec elles, et elles, de leur côté, s’étaient lassées de moi.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et je dis au troupeau : Je ne vous ferai plus paître. Celle qui doit périr, eh bien qu’elle périsse ! Celle qui doit disparaître, eh bien qu’elle disparaisse ! Quant à celles qui resteront, qu’elles se dévorent entre elles !'
