document_id: ZEC.11,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu abat les puissants
  - type: text
    content: Liban, ouvre tes portes,
  - type: text
    content: et qu’un feu dévore tes cèdres
  - type: note
    content: Pour les v. 1-3, voir Es 10.33-34 ; Ez 31 ; Es 2.13 ; Jr 49.19.
  - type: text
    content: '  !'
  '10':
  - type: text
    content: Puis je pris ma houlette que j’avais nommée Grâce et je la brisai pour annuler l’alliance que j’avais conclue avec tous les peuples
  - type: note
    content: Il doit s’agir d’une alliance avec les peuples pour qu’ils laissent Israël en paix.
  - type: text
    content: .
  '11':
  - type: text
    content: Elle fut donc annulée ce jour-là. Alors les brebis les plus misérables
  - type: note
    content: 'les plus misérables: selon le texte hébreu traditionnel. L’ancienne version grecque a : les marchands.'
  - type: text
    content: ' du troupeau qui m’observaient comprirent que c’était la volonté de l’Eternel.'
  '12':
  - type: text
    content: 'Et je leur déclarai : Si vous le jugez bon, donnez-moi mon salaire, sinon, n’en faites rien.'
  - type: text
    content: Ils me donnèrent pour salaire trente sicles d’argent
  - type: note
    content: Le prix d’un esclave (Ex 21.32). Voir Mt 26.15. Les v. 12-13 sont cités en Mt 27.9-10.
  - type: text
    content: .
  '13':
  - type: text
    content: 'Et l’Eternel me dit : Jette-le au potier, ce joli prix auquel j’ai été estimé !'
  - type: text
    content: Je pris les trente sicles d’argent et je les jetai dans le temple de l’Eternel pour le potier
  - type: note
    content: 'le potier: d’après la plupart des manuscrits du texte hébreu traditionnel et Mt 27.10. Certains manuscrits hébreux et la version syriaque ont : le trésor (voir Mt 27.6). L’ancienne version grecque a : la fournaise. Certains traduisent par : le fondeur.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Puis je brisai ma seconde houlette, celle que j’avais nommée Union, pour signifier la rupture de la fraternité entre Juda et Israël.
  '15':
  - type: text
    content: 'L’Eternel me dit encore : Procure-toi maintenant l’attirail d’un berger qui sera insensé, '
  '16':
  - type: text
    content: car je vais susciter dans le pays un berger qui ne s’inquiétera pas des brebis qui disparaissent, il n’ira pas à la recherche de celles qui sont égarées, il ne soignera pas celles qui sont blessées, ne pourvoira pas aux besoins de celles qui se portent bien ; mais il mangera la chair de celles qui sont grasses et il leur brisera les sabots.
  '17':
  - type: text
    content: Malheur au berger vaurien
  - type: text
    content: qui abandonne son troupeau !
  - type: text
    content: Que l’épée lacère son bras
  - type: text
    content: et lui crève l’œil droit !
  - type: text
    content: Que son bras se dessèche, ╵oui, se dessèche !
  - type: text
    content: Que son œil droit s’éteigne, ╵s’éteigne bel et bien !
  '2':
  - type: text
    content: Lamente-toi, cyprès, ╵car le cèdre est tombé,
  - type: text
    content: et les arbres majestueux ╵ont été abattus.
  - type: text
    content: Gémissez, chênes du Basan,
  - type: text
    content: car la forêt si dense ╵a été abattue.
  '3':
  - type: text
    content: On entend les bergers gémir,
  - type: text
    content: car ce qui faisait leur orgueil ╵a été dévasté.
  - type: text
    content: On entend les lionceaux rugir,
  - type: text
    content: car les forêts touffues ╵faisant la fierté du Jourdain ╵ont été abattues.
  - type: heading
    content: Les bons et les mauvais bergers
  '4':
  - type: text
    content: 'L’Eternel mon Dieu dit : Sois le berger du troupeau voué au carnage. '
  '5':
  - type: text
    content: 'Ceux qui achètent les brebis les tuent impunément, ceux qui les vendent s’écrient : « Béni soit l’Eternel ! Je me suis enrichi ! », tandis que leurs propres bergers n’ont aucune pitié pour elles. '
  '6':
  - type: text
    content: Désormais, moi aussi, je n’aurai plus pitié des habitants de ce pays, l’Eternel le déclare. Je livrerai les hommes aux mains les uns des autres et entre les mains de leur roi. Ils saccageront le pays et je ne délivrerai personne de leur oppression.
  '7':
  - type: text
    content: Je me mis donc à faire paître les brebis destinées au carnage, et surtout les plus misérables du troupeau
  - type: note
    content: 'et surtout… du troupeau: selon le texte hébreu traditionnel. L’ancienne version grecque a : pour les marchands.'
  - type: text
    content: '. Je pris deux houlettes, je nommai l’une Grâce, et l’autre Union. Puis je me mis à faire paître les brebis du troupeau. '
  '8':
  - type: text
    content: J’éliminai en un mois leurs trois bergers
  - type: note
    content: L’identification de ces trois bergers est problématique.
  - type: text
    content: . Mais je perdis patience avec elles, et elles, de leur côté, s’étaient lassées de moi.
  '9':
  - type: text
    content: 'Et je dis au troupeau : Je ne vous ferai plus paître. Celle qui doit périr, eh bien qu’elle périsse ! Celle qui doit disparaître, eh bien qu’elle disparaisse ! Quant à celles qui resteront, qu’elles se dévorent entre elles !'
