document_id: ROM.10,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Frères et sœurs, je souhaite de tout cœur que les Israélites soient sauvés, et c’est ce que je demande instamment à Dieu dans mes prières. '
  '10':
  - type: text
    content: car celui qui croit dans son cœur, Dieu le déclare juste ; celui qui affirme de sa bouche, Dieu le sauve.
  '11':
  - type: text
    content: 'En effet, l’Ecriture dit :'
  - type: text
    content: 'Celui qui met en lui sa '
  - type: text
    content: confiance
  - type: text
    content: ' ╵'
  - type: text
    content: ne connaîtra jamais le déshonneur
  - type: note
    content: Es 28.16 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '12':
  - type: text
    content: 'Ainsi, il n’y a pas de différence entre Juifs et non-Juifs. Car tous ont le même Seigneur qui donne généreusement à tous ceux qui font appel à lui. En effet, il est écrit : '
  '13':
  - type: text
    content: Tous ceux qui invoqueront le Seigneur seront sauvés
  - type: note
    content: Jl 3.5.
  - type: text
    content: .
  - type: heading
    content: Israël n’a pas eu la foi
  '14':
  - type: text
    content: Mais comment feront-ils appel à lui s’ils n’ont pas cru en lui ? Et comment croiront-ils en lui s’ils ne l’ont pas entendu
  - type: note
    content: 'Autre traduction : s’ils ne l’entendent pas ?'
  - type: text
    content: '  ? Et comment entendront-ils s’il n’y a personne pour le leur annoncer ? '
  '15':
  - type: text
    content: 'Et comment y aura-t-il des gens pour l’annoncer s’ils ne sont pas envoyés ? Aussi est-il dit dans l’Ecriture :'
  - type: text
    content: Qu’ils sont beaux
  - type: text
    content: ' ╵'
  - type: text
    content: les pas de ceux qui annoncent
  - type: text
    content: ' ╵'
  - type: text
    content: de bonnes nouvelles
  - type: note
    content: Es 52.7.
  - type: text
    content: '!'
  '16':
  - type: text
    content: 'Mais, malheureusement, tous n’ont pas obéi à cette Bonne Nouvelle. Esaïe déjà demandait : '
  - type: text
    content: Seigneur, qui a cru à notre message
  - type: note
    content: Es 53.1 cité selon l’ancienne version grecque.
  - type: text
    content: '?'
  '17':
  - type: text
    content: Donc, la foi naît du message que l’on entend, et ce message vient par la parole de Christ.
  '18':
  - type: text
    content: 'Maintenant donc je dis : Ne l’ont-ils pas entendu ? Mais si ! N’est-il pas écrit :'
  - type: text
    content: Leur voix a retenti par toute la terre.
  - type: text
    content: Leurs paroles sont parvenues
  - type: text
    content: ' ╵'
  - type: text
    content: jusqu’aux confins du monde
  - type: note
    content: Ps 19.5 cité selon l’ancienne version grecque.
  - type: text
    content: '  ?'
  '19':
  - type: text
    content: 'Je demande alors : Le peuple d’Israël ne l’a-t-il pas su ? Moïse a été le premier à le leur dire :'
  - type: text
    content: Je vous rendrai jaloux
  - type: text
    content: ' ╵'
  - type: text
    content: de ceux qui ne sont pas un peuple.
  - type: text
    content: Je vous irriterai
  - type: text
    content: ' ╵'
  - type: text
    content: par une nation dépourvue d’intelligence
  - type: note
    content: Dt 32.21.
  - type: text
    content: .
  '2':
  - type: text
    content: 'Car je leur rends ce témoignage : ils ont un zèle ardent pour Dieu, mais il leur manque le discernement. '
  '20':
  - type: text
    content: 'Esaïe pousse même la hardiesse jusqu’à dire :'
  - type: text
    content: J’ai été trouvé
  - type: text
    content: ' ╵'
  - type: text
    content: par ceux qui ne me cherchaient pas,
  - type: text
    content: Je me suis révélé
  - type: text
    content: ' ╵'
  - type: text
    content: à ceux qui ne se souciaient pas de moi
  - type: note
    content: Es 65.1 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '21':
  - type: text
    content: 'Mais parlant d’Israël, il dit :'
  - type: text
    content: A longueur de journée,
  - type: text
    content: ' ╵'
  - type: text
    content: j’ai tendu les mains
  - type: text
    content: ' ╵'
  - type: text
    content: vers un peuple désobéissant et rebelle
  - type: note
    content: Es 65.2 cité selon l’ancienne version grecque.
  - type: text
    content: .
  '3':
  - type: text
    content: 'En méconnaissant la manière dont Dieu déclare les hommes justes et en cherchant à être déclarés justes par leurs propres moyens, ils ne se sont pas soumis à Dieu en acceptant le moyen par lequel il nous déclare justes. '
  '4':
  - type: text
    content: Car Christ a mis fin au régime de la Loi pour que tous ceux qui croient soient déclarés justes.
  '5':
  - type: text
    content: 'Voici, en effet, comment Moïse définit la justice qui procède de la Loi : '
  - type: text
    content: Celui qui appliquera ces commandements vivra grâce à cela
  - type: note
    content: Lv 18.5.
  - type: text
    content: .
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Mais voici comment s’exprime la justice reçue par la foi : '
  - type: text
    content: Ne dis pas en toi-même
  - type: note
    content: Dt 8.17 ; 9.4.
  - type: text
    content: '  : '
  - type: text
    content: Qui montera au ciel ?
  - type: text
    content: ' C’est en faire descendre Christ ? '
  '7':
  - type: text
    content: 'Ou bien : '
  - type: text
    content: Qui descendra dans l’abîme ?
  - type: text
    content: ' C’est faire remonter Christ d’entre les morts ? '
  '8':
  - type: text
    content: Que dit-elle donc ?
  - type: text
    content: La parole est toute proche de toi, elle est dans ta bouche et dans ton cœur
  - type: text
    content: ' '
  - type: note
    content: Dt 30.12-14 .
  - type: text
    content: .
  - type: text
    content: Cette parole est celle de la foi, et c’est celle que nous annonçons.
  '9':
  - type: text
    content: 'En effet, si de '
  - type: text
    content: ta bouche
  - type: text
    content: ', tu déclares que Jésus est Seigneur et si '
  - type: text
    content: dans ton cœur
  - type: text
    content: ', tu crois que Dieu l’a ressuscité, tu seras sauvé, '
