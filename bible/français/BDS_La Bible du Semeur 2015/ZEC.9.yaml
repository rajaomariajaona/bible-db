document_id: ZEC.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’avenir du peuple de Dieu
  - type: heading
    content: Châtiment et salut des peuples voisins
  - type: text
    content: Proclamation.
  - type: text
    content: La parole de l’Eternel ╵a atteint le pays de Hadrak.
  - type: text
    content: Elle s’arrête sur Damas
  - type: note
    content: 'Hadrak: ville au nord de la Syrie dont Damas était la capitale.'
  - type: text
    content: ','
  - type: text
    content: car là, les hommes portent les regards
  - type: note
    content: 'L’ancienne version grecque, la version syriaque et le targoum ont compris : l’Eternel a l’œil sur tous les hommes. D’autres modifient légèrement le texte hébreu traditionnel pour lire : l’œil (c’est-à-dire la capitale) de la Syrie appartient à l’Eternel.'
  - type: text
    content: ' ╵vers l’Eternel'
  - type: text
    content: comme le font ╵toutes les tribus d’Israël.
  '10':
  - type: text
    content: Je ferai disparaître ╵du pays d’Ephraïm ╵tous les chariots de guerre
  - type: text
    content: et, de Jérusalem, ╵les chevaux de combat ;
  - type: text
    content: l’arc qui sert pour la guerre ╵sera brisé.
  - type: text
    content: Ce roi établira ╵la paix parmi les peuples,
  - type: text
    content: sa domination s’étendra
  - type: text
    content: d’une mer jusqu’à l’autre,
  - type: text
    content: et depuis le grand fleuve
  - type: note
    content: L’Euphrate. Les deux mers sont la Méditerranée et la mer Morte (voir Ps 72.8).
  - type: text
    content: jusqu’aux confins du monde.
  - type: heading
    content: La libération des captifs
  '11':
  - type: text
    content: Pour ce qui te concerne, ╵à cause de l’alliance ╵conclue avec toi par le sang
  - type: note
    content: Voir Ex 24.3-8.
  - type: text
    content: ','
  - type: text
    content: je vais faire sortir ╵tes captifs de la fosse
  - type: text
    content: où il n’y a pas d’eau.
  '12':
  - type: text
    content: Revenez à la place forte
  - type: note
    content: Jérusalem. Selon d’autres, Dieu lui-même (2.9).
  - type: text
    content: ','
  - type: text
    content: pleins d’espérance, ╵vous les captifs,
  - type: text
    content: 'car aujourd’hui encore, ╵je le déclare :'
  - type: text
    content: Je vous rendrai au double.
  '13':
  - type: text
    content: 'Car je tends mon arc : c’est Juda ;'
  - type: text
    content: 'j’y place une flèche : Ephraïm'
  - type: note
    content: Les royaumes du Sud (Juda) et du Nord (Ephraïm).
  - type: text
    content: .
  - type: text
    content: J’exciterai tes fils, ╵ô peuple de Sion,
  - type: text
    content: contre tes fils, Yavân
  - type: note
    content: Voir Gn 10.2-5 et note.
  - type: text
    content: ','
  - type: text
    content: et je ferai de toi ╵une épée de guerrier.
  '14':
  - type: text
    content: L’Eternel paraîtra ╵au-dessus d’eux
  - type: text
    content: et ses traits jailliront ╵comme l’éclair.
  - type: text
    content: Le Seigneur, l’Eternel, ╵sonnant du cor,
  - type: text
    content: s’avancera ╵dans l’ouragan du sud,
  '15':
  - type: text
    content: le Seigneur des armées célestes ╵protégera les siens.
  - type: text
    content: Ils mangeront ╵et ils écraseront ╵les pierres de la fronde.
  - type: text
    content: Ils boiront et feront du bruit ╵comme s’ils étaient ivres,
  - type: text
    content: ils seront pleins ╵comme la coupe d’aspersion
  - type: note
    content: Voir 1 R 7.45.
  - type: text
    content: que l’on répand ╵aux angles de l’autel
  - type: note
    content: Voir Ex 27.2 ; 29.12.
  - type: text
    content: .
  '16':
  - type: text
    content: Et l’Eternel leur Dieu, ╵en ce temps-là, les sauvera,
  - type: text
    content: il sauvera son peuple ╵tout comme un berger son troupeau,
  - type: text
    content: et ils resplendiront ╵dans son pays,
  - type: text
    content: tels des joyaux.
  '17':
  - type: text
    content: Comme ils seront heureux ! ╵Et comme ils seront beaux !
  - type: text
    content: Le froment donnera ╵vigueur aux jeunes gens,
  - type: text
    content: le vin nouveau aux jeunes filles.
  '2':
  - type: text
    content: La parole de l’Eternel ╵est aussi pour Hamath,
  - type: text
    content: à la frontière de Damas,
  - type: text
    content: pour Tyr et pour Sidon
  - type: note
    content: Hamath est une ville de Syrie. Tyr et Sidon étaient les deux principales villes de la côte phénicienne, deux ports importants et riches, puissamment fortifiés.
  - type: text
    content: où l’on est très habile.
  '3':
  - type: text
    content: Tyr s’est construit pour elle ╵sa forteresse ;
  - type: text
    content: elle a accumulé l’argent ╵comme de la poussière,
  - type: text
    content: ainsi que l’or ╵comme la boue des rues.
  '4':
  - type: text
    content: 'Mais voici : le Seigneur ╵en prendra possession,'
  - type: text
    content: il précipitera ╵ses remparts dans la mer
  - type: text
    content: et la ville sera ╵consumée par le feu
  - type: note
    content: En 333 av. J.-C, après sept mois de siège et grâce à la construction d’une digue dans la mer, Alexandre le Grand s’emparera de la ville.
  - type: text
    content: .
  '5':
  - type: text
    content: Ashkelôn le verra
  - type: text
    content: et elle prendra peur,
  - type: text
    content: Gaza aussi.
  - type: text
    content: Elle se tordra de douleurs,
  - type: text
    content: et Eqrôn se verra
  - type: text
    content: privée de son soutien
  - type: note
    content: Ashkelôn, Gaza et Eqrôn étaient des villes importantes de la Philistie.
  - type: text
    content: .
  - type: text
    content: Plus de roi à Gaza,
  - type: text
    content: et Ashkelôn ╵n’aura plus d’habitants.
  '6':
  - type: text
    content: A Ashdod
  - type: note
    content: Autre ville philistine.
  - type: text
    content: ', des bâtards ╵habiteront,'
  - type: text
    content: et je retrancherai ╵l’orgueil des Philistins.
  '7':
  - type: text
    content: J’ôterai le sang de sa bouche,
  - type: text
    content: j’arracherai d’entre ses dents ╵ses mets abominables,
  - type: text
    content: et ce qui restera ╵des Philistins ╵appartiendra aussi ╵à notre Dieu,
  - type: text
    content: et ils seront semblables ╵à un clan de Juda,
  - type: text
    content: tandis qu’Eqrôn aura ╵le sort des Yebousiens
  - type: note
    content: Avant que David ait pris Jérusalem, la ville s’appelait Yebous. Il laissa habiter les Yebousiens parmi les Israélites (voir Jos 15.63 ; Jg 1.21 ; 2 S 5.6-9).
  - type: text
    content: .
  '8':
  - type: text
    content: Je monterai la garde ╵autour de mon pays
  - type: text
    content: et je le défendrai ╵contre les gens de guerre
  - type: text
    content: qui passent et repassent.
  - type: text
    content: Aucun tyran ╵ne l’opprimera plus,
  - type: text
    content: car maintenant ╵j’y veille de mes propres yeux.
  - type: heading
    content: La venue du roi de paix
  '9':
  - type: text
    content: Tressaille d’allégresse,
  - type: text
    content: ô communauté de Sion !
  - type: text
    content: Pousse des cris de joie,
  - type: text
    content: ô communauté de Jérusalem !
  - type: text
    content: Car ton roi vient vers toi,
  - type: text
    content: il est juste et sauvé
  - type: note
    content: 'sauvé: d’autres comprennent : victorieux.'
  - type: text
    content: ','
  - type: text
    content: humilié
  - type: note
    content: Le Messie est décrit sous les traits du roi opprimé par ses ennemis et sauvé par Dieu (voir Ps 33.16), une figure que l’on rencontre dans les récits de la vie de David et dans les Psaumes. La présence de la racine humilié conduit encore à l’identifier au Serviteur de l’Eternel d’Es 53 où cette racine apparaît en 53.4, 7. Au lieu de humilié, certains traduisent humble.
  - type: text
    content: ', monté sur un âne,'
  - type: text
    content: sur un ânon, ╵le petit d’une ânesse
  - type: note
    content: Cité en Mt 21.5 ; Jn 12.15.
  - type: text
    content: .
