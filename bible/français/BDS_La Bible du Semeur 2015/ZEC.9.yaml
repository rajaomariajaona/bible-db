document_id: ZEC.9,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L’avenir du peuple de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Châtiment et salut des peuples voisins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Proclamation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole de l’Eternel ╵a atteint le pays de Hadrak.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle s’arrête sur Damas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hadrak
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ville au nord de la Syrie dont '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Damas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était la capitale.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car là, les hommes portent les regards
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque, la version syriaque et le targoum ont compris : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’Eternel a l’œil sur tous les hommes. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D’autres modifient légèrement le texte hébreu traditionnel pour lire : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l’œil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c’est-à-dire la capitale) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la Syrie appartient à l’Eternel.
      marker-yv: yv-n
    - type: text
      text: ' ╵vers l’Eternel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le font ╵toutes les tribus d’Israël.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai disparaître ╵du pays d’Ephraïm ╵tous les chariots de guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de Jérusalem, ╵les chevaux de combat ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l’arc qui sert pour la guerre ╵sera brisé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce roi établira ╵la paix parmi les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa domination s’étendra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d’une mer jusqu’à l’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et depuis le grand fleuve
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’Euphrate. Les deux '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont la Méditerranée et la mer Morte (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 72.8
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu’aux confins du monde.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La libération des captifs
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ce qui te concerne, ╵à cause de l’alliance ╵conclue avec toi par le sang
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 24.3-8
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais faire sortir ╵tes captifs de la fosse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où il n’y a pas d’eau.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revenez à la place forte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jérusalem. Selon d’autres, Dieu lui-même (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.9'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pleins d’espérance, ╵vous les captifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car aujourd’hui encore, ╵je le déclare :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous rendrai au double.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je tends mon arc : c’est Juda ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'j’y place une flèche : Ephraïm'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les royaumes du Sud (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) et du Nord (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ephraïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exciterai tes fils, ╵ô peuple de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre tes fils, Yavân
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.2-5
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai de toi ╵une épée de guerrier.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel paraîtra ╵au-dessus d’eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses traits jailliront ╵comme l’éclair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l’Eternel, ╵sonnant du cor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s’avancera ╵dans l’ouragan du sud,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur des armées célestes ╵protégera les siens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils mangeront ╵et ils écraseront ╵les pierres de la fronde.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils boiront et feront du bruit ╵comme s’ils étaient ivres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront pleins ╵comme la coupe d’aspersion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 R 7.45
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l’on répand ╵aux angles de l’autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir Ex 27.2 ; 29.12.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Eternel leur Dieu, ╵en ce temps-là, les sauvera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sauvera son peuple ╵tout comme un berger son troupeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils resplendiront ╵dans son pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tels des joyaux.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme ils seront heureux ! ╵Et comme ils seront beaux !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le froment donnera ╵vigueur aux jeunes gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le vin nouveau aux jeunes filles.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole de l’Eternel ╵est aussi pour Hamath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la frontière de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour Tyr et pour Sidon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hamath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est une ville de Syrie. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tyr '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sidon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient les deux principales villes de la côte phénicienne, deux ports importants et riches, puissamment fortifiés.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où l’on est très habile.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tyr s’est construit pour elle ╵sa forteresse ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a accumulé l’argent ╵comme de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que l’or ╵comme la boue des rues.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais voici : le Seigneur ╵en prendra possession,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il précipitera ╵ses remparts dans la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la ville sera ╵consumée par le feu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: En 333 av. J.-C, après sept mois de siège et grâce à la construction d’une digue dans la mer, Alexandre le Grand s’emparera de la ville.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ashkelôn le verra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle prendra peur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaza aussi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se tordra de douleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Eqrôn se verra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: privée de son soutien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ashkelôn, Gaza '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Eqrôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient des villes importantes de la Philistie.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus de roi à Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Ashkelôn ╵n’aura plus d’habitants.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Ashdod
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Autre ville philistine.
      marker-yv: yv-n
    - type: text
      text: ', des bâtards ╵habiteront,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je retrancherai ╵l’orgueil des Philistins.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ôterai le sang de sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j’arracherai d’entre ses dents ╵ses mets abominables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce qui restera ╵des Philistins ╵appartiendra aussi ╵à notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils seront semblables ╵à un clan de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis qu’Eqrôn aura ╵le sort des Yebousiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Avant que David ait pris Jérusalem, la ville s’appelait Yebous. Il laissa habiter les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yebousiens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: parmi les Israélites (voir Jos 15.63 ; Jg 1.21 ; 2 S 5.6-9).
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je monterai la garde ╵autour de mon pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je le défendrai ╵contre les gens de guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui passent et repassent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun tyran ╵ne l’opprimera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car maintenant ╵j’y veille de mes propres yeux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La venue du roi de paix
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tressaille d’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô communauté de Sion !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pousse des cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô communauté de Jérusalem !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ton roi vient vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est juste et sauvé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sauvé
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ': '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd’autres comprennent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: victorieux.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: humilié
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le Messie est décrit sous les traits du roi opprimé par ses ennemis et sauvé par Dieu (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 33.16
        - type: text
          text: '), une figure que l’on rencontre dans les récits de la vie de David et dans les Psaumes. La présence de la racine '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'humilié '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: conduit encore à l’identifier au Serviteur de l’Eternel d’
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Es 53
        - type: text
          text: ' où cette racine apparaît en 53.4, 7. Au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'humilié, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: humble.
      marker-yv: yv-n
    - type: text
      text: ', monté sur un âne,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur un ânon, ╵le petit d’une ânesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cité en Mt 21.5 ; Jn 12.15.
      marker-yv: yv-n
    - type: text
      text: .
