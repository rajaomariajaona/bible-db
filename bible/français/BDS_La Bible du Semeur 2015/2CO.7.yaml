document_id: 2CO.7
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mes amis, puisque nous possédons ce qui nous a été promis en ces termes, purifions-nous de tout ce qui corrompt le corps et l’esprit, pour mener ainsi une vie pleinement sainte, dans la crainte de Dieu.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Paul et les Corinthiens réconciliés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Faites-nous une place dans votre cœur ! Nous n’avons causé de tort à personne, nous n’avons ruiné personne, nous n’avons exploité personne. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En parlant ainsi, je n’entends nullement vous condamner. Je vous l’ai déjà dit : nous vous portons dans notre cœur à la vie et à la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Grande est mon assurance quand je parle de vous, grande est ma fierté à votre sujet. J’ai été pleinement réconforté, je déborde de joie dans toutes nos détresses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, à notre arrivée en Macédoine, nous n’avons pas eu un instant de repos, nous avons connu toutes sortes de détresses : conflits au-dehors, craintes au-dedans. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Dieu, qui réconforte ceux qui sont abattus, nous a réconfortés par l’arrivée de Tite. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce n’est pas seulement sa venue qui nous a réconfortés, mais aussi le réconfort qu’il avait reçu de vous. Il nous a fait part de votre ardent désir de me revoir, de votre profonde tristesse, de votre dévouement à mon égard. Et tout cela n’a fait qu’augmenter ma joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est pourquoi, si je vous ai causé de la peine par ma précédente lettre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.3'
        metadata:
          usfm: 2CO.2.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', je ne le regrette pas. Certes, je l’ai d’abord regretté en voyant combien elle vous a attristés sur le moment. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais maintenant je me réjouis, non pas de votre tristesse, mais de ce que cette tristesse vous ait amenés à changer d’attitude
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autres traductions : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à la repentance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à changer de comportement.
    marker-yv: yv-n
  - type: text
    text: . Car la tristesse que vous avez éprouvée était bonne aux yeux de Dieu, si bien qu’en fait nous ne vous avons causé aucun tort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, la tristesse qui est bonne aux yeux de Dieu produit un changement d’attitude qui conduit au salut et qu’on ne regrette pas. La tristesse du monde, elle, produit la mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cette tristesse qui est bonne aux yeux de Dieu, voyez quel empressement elle a produit en vous : quelles excuses vous avez présentées, quelle indignation vous avez manifestée, et quelle crainte, quel ardent désir de me revoir, quel zèle, quelle détermination à punir le mal ! Par toute votre attitude, vous avez prouvé que vous étiez innocents en cette affaire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Bref, si je vous ai écrit, ce n’était pas à cause de celui qui a commis l’offense ni à cause de celui qui l’a subie, mais c’était pour que votre empressement pour nous soit manifesté devant Dieu parmi vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi votre réaction nous a réconfortés. A ce réconfort s’est ajoutée une joie bien plus vive encore en voyant combien Tite était heureux à cause de la manière dont vous avez apaisé ses craintes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi, si je lui ai parlé de vous avec quelque fierté, je n’ai pas eu à en rougir, car l’éloge que je lui ai fait de vous s’est révélé conforme à la vérité, exactement comme tout ce que nous avons pu vous dire. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aussi redouble-t-il d’affection pour vous quand il se rappelle votre obéissance à vous tous, et avec quels égards et quel respect vous l’avez accueilli.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je suis heureux de pouvoir compter sur vous en toutes choses.
