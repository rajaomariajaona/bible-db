document_id: JHN.3,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un homme qui s’appelait Nicodème ; membre du parti des pharisiens, c’était un chef des Juifs. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Toi qui enseignes le peuple d’
      - type: usfm
        marker: w
        children:
        - type: text
          text: Israël
      - type: text
        text: ', tu ignores cela ?'
    - type: text
      text: ' lui répondit Jésus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je te l’assure : nous parlons de ce que nous connaissons réellement, et nous témoignons de ce que nous avons vu ; et pourtant, vous ne prenez pas notre témoignage au sérieux.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si vous ne croyez pas quand je vous parle des réalités terrestres, comment pourrez-vous croire quand je vous parlerai des réalités célestes ?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Car personne n’est monté au ciel, sauf celui qui en est descendu : le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils de l’homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ajoutent : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui est dans le ciel.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Dans le désert, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: ' a élevé sur un poteau le serpent de bronze. De la même manière, le Fils de l’homme doit, lui aussi, être élevé'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'pour que tous ceux qui placent leur '
      - type: usfm
        marker: w
        children:
        - type: text
          text: confiance
      - type: text
        text: ' en lui aient la vie éternelle.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, Dieu a tant aimé le monde qu’il a donné son Fils, son unique, pour que tous ceux qui placent leur confiance en lui échappent à la perdition et qu’ils aient la vie éternelle.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, Dieu n’a pas envoyé son Fils dans le monde pour condamner le monde, mais pour que celui-ci soit sauvé par lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui met sa confiance en lui n’est pas condamné, mais celui qui n’a pas foi en lui est déjà condamné, car il n’a pas mis sa confiance en la personne du Fils unique de Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici en quoi consiste sa condamnation : c’est que la lumière est venue dans le monde, mais les hommes lui ont préféré les ténèbres, parce que leurs actes sont mauvais. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vint trouver Jésus de nuit et le salua en ces termes : Maître, nous savons que c’est Dieu qui t’a envoyé pour nous enseigner car personne ne saurait accomplir les signes miraculeux que tu fais si Dieu n’était pas avec lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, celui qui fait le mal déteste la lumière ; il se garde bien de venir à la lumière de peur que ses actes soient révélés. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais celui qui a une conduite conforme à la vérité vient à la lumière pour qu’on voie clairement qu’il accomplit ses actes dans la communion avec Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le témoin s’efface
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Jésus se rendit en Judée avec ses disciples ; il y resta quelque temps avec eux et y baptisait. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jean, de son côté, baptisait à Enon, près de Salim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deux localités de la vallée du Jourdain.
      marker-yv: yv-n
    - type: text
      text: '  : il y avait là beaucoup d’eau, et de nombreuses personnes y venaient pour être baptisées. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, à cette époque, Jean n’avait pas encore été jeté en prison. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, un jour, quelques-uns de ses disciples eurent une discussion avec un Juif
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains manuscrits ont : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec des Juifs.
      marker-yv: yv-n
    - type: text
      text: ' au sujet de la purification. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils allèrent trouver Jean et lui dirent : Maître, tu te souviens de cet homme qui était avec toi de l’autre côté du Jourdain et pour qui tu as témoigné. Eh bien, le voilà qui baptise à son tour, et tout le monde se rend auprès de lui.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean répondit : Nul ne peut s’attribuer une autre mission'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quoi que ce soit.
      marker-yv: yv-n
    - type: text
      text: ' que celle qu’il a reçue de Dieu. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous en êtes vous-mêmes témoins ; j’ai toujours dit : je ne suis pas le Messie, mais j’ai été envoyé comme son Précurseur.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A qui appartient la mariée ? Au marié. Quant à l’ami du marié, c’est celui qui se tient à côté de lui et qui l’écoute : entendre sa voix le remplit de joie. Telle est ma joie, et, à présent, elle est complète. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit : '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Vraiment, je te l’assure : à moins de renaître d’en haut'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’expression de Jean, volontairement ambiguë, peut vouloir dire « naître d’en haut » ou « naître de nouveau ».
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', personne ne peut voir le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: royaume de Dieu
      - type: text
        text: .
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lui doit devenir de plus en plus grand, et moi de plus en plus petit.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qui vient d’en haut est au-dessus de tout. Qui est de la terre reste lié à la terre et parle des choses terrestres. Celui qui vient du ciel est [au-dessus de tout
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les mots entre crochets sont absents de nombreux manuscrits.
      marker-yv: yv-n
    - type: text
      text: ']. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il témoigne de ce qu’il a vu et entendu. Mais personne ne prend son témoignage au sérieux. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui accepte son témoignage certifie que Dieu dit la vérité. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, l’envoyé de Dieu dit les paroles mêmes de Dieu, car Dieu lui donne son Esprit sans aucune restriction. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Père aime le Fils et a tout remis entre ses mains. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qui place sa confiance dans le Fils possède la vie éternelle. Qui ne met pas sa confiance dans le Fils ne connaît pas la vie ; il reste sous le coup de la colère de Dieu.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – Comment un homme peut-il naître une fois vieux ? s’exclama Nicodème. Il ne peut tout de même pas retourner dans le ventre de sa mère pour renaître ?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: – Vraiment, je te l’assure,
    - type: text
      text: ' reprit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: à moins de naître d’eau, c’est-à-dire d’Esprit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En grec, la conjonction traduite habituellement par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut aussi avoir le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c’est-à-dire. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jésus semble se référer à la prophétie d’
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 36.25-27
        - type: text
          text: ' où la purification par l’eau est une image de l’œuvre de l’Esprit. Autre traduction : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: naître d’eau et d’Esprit.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', personne ne peut entrer dans le royaume de Dieu.'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce qui naît d’une naissance naturelle, c’est la vie humaine naturelle. Ce qui naît de l’Esprit est animé par l’Esprit.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ne sois donc pas surpris si je t’ai dit : Il vous faut renaître d’en haut'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 3 et note.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le vent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le même mot grec désigne le vent et l’Esprit (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ez 37.7-10
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: souffle où il veut, tu en entends le bruit, mais tu ne sais ni d’où il vient ni où il va. Il en est ainsi pour quiconque est né de l’Esprit.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nicodème reprit : Comment cela peut-il se réaliser ?'
