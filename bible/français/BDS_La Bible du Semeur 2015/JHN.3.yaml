document_id: JHN.3,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Il y avait un homme qui s’appelait Nicodème ; membre du parti des pharisiens, c’était un chef des Juifs. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: – Toi qui enseignes le peuple d’
  - type: text
    content: Israël
  - type: text
    content: ', tu ignores cela ?'
  - type: text
    content: ' lui répondit Jésus. '
  '11':
  - type: text
    content: 'Vraiment, je te l’assure : nous parlons de ce que nous connaissons réellement, et nous témoignons de ce que nous avons vu ; et pourtant, vous ne prenez pas notre témoignage au sérieux.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Si vous ne croyez pas quand je vous parle des réalités terrestres, comment pourrez-vous croire quand je vous parlerai des réalités célestes ?
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Car personne n’est monté au ciel, sauf celui qui en est descendu : le '
  - type: text
    content: Fils de l’homme
  - type: note
    content: 'Certains manuscrits ajoutent : qui est dans le ciel.'
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Dans le désert, '
  - type: text
    content: Moïse
  - type: text
    content: ' a élevé sur un poteau le serpent de bronze. De la même manière, le Fils de l’homme doit, lui aussi, être élevé'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'pour que tous ceux qui placent leur '
  - type: text
    content: confiance
  - type: text
    content: ' en lui aient la vie éternelle.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: Oui, Dieu a tant aimé le monde qu’il a donné son Fils, son unique, pour que tous ceux qui placent leur confiance en lui échappent à la perdition et qu’ils aient la vie éternelle.
  '17':
  - type: text
    content: 'En effet, Dieu n’a pas envoyé son Fils dans le monde pour condamner le monde, mais pour que celui-ci soit sauvé par lui. '
  '18':
  - type: text
    content: 'Celui qui met sa confiance en lui n’est pas condamné, mais celui qui n’a pas foi en lui est déjà condamné, car il n’a pas mis sa confiance en la personne du Fils unique de Dieu. '
  '19':
  - type: text
    content: 'Et voici en quoi consiste sa condamnation : c’est que la lumière est venue dans le monde, mais les hommes lui ont préféré les ténèbres, parce que leurs actes sont mauvais. '
  '2':
  - type: text
    content: 'Il vint trouver Jésus de nuit et le salua en ces termes : Maître, nous savons que c’est Dieu qui t’a envoyé pour nous enseigner car personne ne saurait accomplir les signes miraculeux que tu fais si Dieu n’était pas avec lui. '
  '20':
  - type: text
    content: 'En effet, celui qui fait le mal déteste la lumière ; il se garde bien de venir à la lumière de peur que ses actes soient révélés. '
  '21':
  - type: text
    content: Mais celui qui a une conduite conforme à la vérité vient à la lumière pour qu’on voie clairement qu’il accomplit ses actes dans la communion avec Dieu.
  - type: heading
    content: Le témoin s’efface
  '22':
  - type: text
    content: 'Après cela, Jésus se rendit en Judée avec ses disciples ; il y resta quelque temps avec eux et y baptisait. '
  '23':
  - type: text
    content: Jean, de son côté, baptisait à Enon, près de Salim
  - type: note
    content: Deux localités de la vallée du Jourdain.
  - type: text
    content: '  : il y avait là beaucoup d’eau, et de nombreuses personnes y venaient pour être baptisées. '
  '24':
  - type: text
    content: 'En effet, à cette époque, Jean n’avait pas encore été jeté en prison. '
  '25':
  - type: text
    content: Or, un jour, quelques-uns de ses disciples eurent une discussion avec un Juif
  - type: note
    content: 'Certains manuscrits ont : avec des Juifs.'
  - type: text
    content: ' au sujet de la purification. '
  '26':
  - type: text
    content: 'Ils allèrent trouver Jean et lui dirent : Maître, tu te souviens de cet homme qui était avec toi de l’autre côté du Jourdain et pour qui tu as témoigné. Eh bien, le voilà qui baptise à son tour, et tout le monde se rend auprès de lui.'
  '27':
  - type: text
    content: 'Jean répondit : Nul ne peut s’attribuer une autre mission'
  - type: note
    content: 'Autre traduction : quoi que ce soit.'
  - type: text
    content: ' que celle qu’il a reçue de Dieu. '
  '28':
  - type: text
    content: 'Vous en êtes vous-mêmes témoins ; j’ai toujours dit : je ne suis pas le Messie, mais j’ai été envoyé comme son Précurseur.'
  '29':
  - type: text
    content: 'A qui appartient la mariée ? Au marié. Quant à l’ami du marié, c’est celui qui se tient à côté de lui et qui l’écoute : entendre sa voix le remplit de joie. Telle est ma joie, et, à présent, elle est complète. '
  '3':
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: 'Vraiment, je te l’assure : à moins de renaître d’en haut'
  - type: note
    content: L’expression de Jean, volontairement ambiguë, peut vouloir dire « naître d’en haut » ou « naître de nouveau ».
  - type: text
    content: ', personne ne peut voir le '
  - type: text
    content: royaume de Dieu
  - type: text
    content: .
  '30':
  - type: text
    content: Lui doit devenir de plus en plus grand, et moi de plus en plus petit.
  '31':
  - type: text
    content: Qui vient d’en haut est au-dessus de tout. Qui est de la terre reste lié à la terre et parle des choses terrestres. Celui qui vient du ciel est [au-dessus de tout
  - type: note
    content: Les mots entre crochets sont absents de nombreux manuscrits.
  - type: text
    content: ']. '
  '32':
  - type: text
    content: 'Il témoigne de ce qu’il a vu et entendu. Mais personne ne prend son témoignage au sérieux. '
  '33':
  - type: text
    content: 'Celui qui accepte son témoignage certifie que Dieu dit la vérité. '
  '34':
  - type: text
    content: 'En effet, l’envoyé de Dieu dit les paroles mêmes de Dieu, car Dieu lui donne son Esprit sans aucune restriction. '
  '35':
  - type: text
    content: 'Le Père aime le Fils et a tout remis entre ses mains. '
  '36':
  - type: text
    content: Qui place sa confiance dans le Fils possède la vie éternelle. Qui ne met pas sa confiance dans le Fils ne connaît pas la vie ; il reste sous le coup de la colère de Dieu.
  '4':
  - type: text
    content: – Comment un homme peut-il naître une fois vieux ? s’exclama Nicodème. Il ne peut tout de même pas retourner dans le ventre de sa mère pour renaître ?
  '5':
  - type: text
    content: ' '
  - type: text
    content: – Vraiment, je te l’assure,
  - type: text
    content: ' reprit Jésus, '
  - type: text
    content: à moins de naître d’eau, c’est-à-dire d’Esprit
  - type: note
    content: 'En grec, la conjonction traduite habituellement par et peut aussi avoir le sens de c’est-à-dire. Jésus semble se référer à la prophétie d’Ez 36.25-27 où la purification par l’eau est une image de l’œuvre de l’Esprit. Autre traduction : naître d’eau et d’Esprit.'
  - type: text
    content: ', personne ne peut entrer dans le royaume de Dieu.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: Ce qui naît d’une naissance naturelle, c’est la vie humaine naturelle. Ce qui naît de l’Esprit est animé par l’Esprit.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Ne sois donc pas surpris si je t’ai dit : Il vous faut renaître d’en haut'
  - type: note
    content: Voir v. 3 et note.
  - type: text
    content: .
  - type: text
    content: ' '
  '8':
  - type: text
    content: Le vent
  - type: note
    content: Le même mot grec désigne le vent et l’Esprit (voir Ez 37.7-10).
  - type: text
    content: ' '
  - type: text
    content: souffle où il veut, tu en entends le bruit, mais tu ne sais ni d’où il vient ni où il va. Il en est ainsi pour quiconque est né de l’Esprit.
  '9':
  - type: text
    content: 'Nicodème reprit : Comment cela peut-il se réaliser ?'
