document_id: PSA.147,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu dans la nature et dans l’histoire
  - type: text
    content: Loué soit l’Eternel !
  - type: text
    content: Oui, qu’il est bon de célébrer ╵notre Dieu en musique
  - type: text
    content: et qu’il est agréable ╵et bienvenu ╵de le louer.
  '10':
  - type: text
    content: La vigueur du cheval ╵n’est pas ce qui compte à ses yeux,
  - type: text
    content: ni la force de l’homme, ╵ce qu’il agrée.
  '11':
  - type: text
    content: Mais l’Eternel agrée ╵ceux qui le craignent,
  - type: text
    content: et ceux qui comptent ╵sur son amour.
  '12':
  - type: text
    content: O toi, Jérusalem, ╵célèbre l’Eternel,
  - type: text
    content: loue ton Dieu, ô Sion !
  '13':
  - type: text
    content: Car il a renforcé ╵les verrous de tes portes,
  - type: text
    content: il a béni tes fils chez toi,
  '14':
  - type: text
    content: il fait régner la paix ╵sur tout ton territoire,
  - type: text
    content: et il te rassasie ╵de la fleur du froment.
  '15':
  - type: text
    content: A la terre, il envoie ses ordres
  - type: text
    content: et promptement court sa parole.
  '16':
  - type: text
    content: 'Il fait tomber la neige : ╵on dirait de la laine,'
  - type: text
    content: 'et il répand le givre : ╵on dirait de la cendre.'
  '17':
  - type: text
    content: Il lance sa glace en grêlons.
  - type: text
    content: Qui peut supporter sa froidure ?
  '18':
  - type: text
    content: Dès qu’il en donne l’ordre, ╵c’est le dégel.
  - type: text
    content: S’il fait souffler son vent, ╵voici, les eaux ruissellent.
  '19':
  - type: text
    content: C’est lui qui communique ╵sa parole à Jacob
  - type: text
    content: et ses commandements, ╵ses lois à Israël.
  '2':
  - type: text
    content: L’Eternel rebâtit ╵Jérusalem,
  - type: text
    content: il y rassemblera ╵les déportés ╵du peuple d’Israël.
  '20':
  - type: text
    content: Il n’a agi ainsi ╵pour aucun autre peuple,
  - type: text
    content: aussi ses lois ╵leur restent inconnues.
  - type: text
    content: Loué soit l’Eternel !
  '3':
  - type: text
    content: Ceux qui sont abattus, ╵il les guérit.
  - type: text
    content: Il panse leurs blessures !
  '4':
  - type: text
    content: C’est lui qui détermine ╵le nombre des étoiles,
  - type: text
    content: et, à chacune d’elles, ╵il donne un nom.
  '5':
  - type: text
    content: Notre Seigneur est grand, ╵son pouvoir est immense,
  - type: text
    content: son savoir-faire est sans limite.
  '6':
  - type: text
    content: L’Eternel soutient les petits,
  - type: text
    content: mais il renverse les méchants ╵et les abaisse jusqu’à terre.
  '7':
  - type: text
    content: Chantez pour l’Eternel ╵d’un cœur reconnaissant !
  - type: text
    content: Célébrez notre Dieu ╵en jouant de la lyre !
  '8':
  - type: text
    content: Il couvre les cieux de nuages,
  - type: text
    content: prépare la pluie pour la terre,
  - type: text
    content: fait germer l’herbe sur les monts.
  '9':
  - type: text
    content: Il donne leur pâture ╵aux animaux,
  - type: text
    content: aux petits du corbeau ╵que la faim fait crier.
