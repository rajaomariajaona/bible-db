document_id: PSA.147
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu dans la nature et dans l’histoire
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Loué soit l’Eternel !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, qu’il est bon de célébrer ╵notre Dieu en musique
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu’il est agréable ╵et bienvenu ╵de le louer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Eternel rebâtit ╵Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y rassemblera ╵les déportés ╵du peuple d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ceux qui sont abattus, ╵il les guérit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il panse leurs blessures !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est lui qui détermine ╵le nombre des étoiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, à chacune d’elles, ╵il donne un nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Notre Seigneur est grand, ╵son pouvoir est immense,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son savoir-faire est sans limite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’Eternel soutient les petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il renverse les méchants ╵et les abaisse jusqu’à terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Chantez pour l’Eternel ╵d’un cœur reconnaissant !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez notre Dieu ╵en jouant de la lyre !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il couvre les cieux de nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prépare la pluie pour la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fait germer l’herbe sur les monts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il donne leur pâture ╵aux animaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux petits du corbeau ╵que la faim fait crier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La vigueur du cheval ╵n’est pas ce qui compte à ses yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni la force de l’homme, ╵ce qu’il agrée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais l’Eternel agrée ╵ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui comptent ╵sur son amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O toi, Jérusalem, ╵célèbre l’Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: loue ton Dieu, ô Sion !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car il a renforcé ╵les verrous de tes portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a béni tes fils chez toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: il fait régner la paix ╵sur tout ton territoire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il te rassasie ╵de la fleur du froment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A la terre, il envoie ses ordres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et promptement court sa parole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il fait tomber la neige : ╵on dirait de la laine,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il répand le givre : ╵on dirait de la cendre.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il lance sa glace en grêlons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui peut supporter sa froidure ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dès qu’il en donne l’ordre, ╵c’est le dégel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il fait souffler son vent, ╵voici, les eaux ruissellent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est lui qui communique ╵sa parole à Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses commandements, ╵ses lois à Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il n’a agi ainsi ╵pour aucun autre peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi ses lois ╵leur restent inconnues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loué soit l’Eternel !
