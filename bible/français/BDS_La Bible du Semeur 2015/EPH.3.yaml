document_id: EPH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mission de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C’est pourquoi moi Paul, le prisonnier de Jésus-Christ pour vous, les non-Juifs…
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul interrompt ici sa phrase pour ouvrir jusqu’au v. 14 une parenthèse dans laquelle il explique quelle est sa mission et la nature du secret qu’il a été chargé d’annoncer.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vous avez très certainement appris quelle responsabilité Dieu, dans sa grâce, m’a confiée à votre égard
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ces paroles prouvent que la lettre ne s’adressait pas à la seule Eglise d’Ephèse. Paul, en effet, avait séjourné pendant trois ans à Ephèse (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20.31
        metadata:
          usfm: ACT.20.31
      - type: text
        text: ). Les Ephésiens n’ignoraient donc pas la responsabilité que Dieu avait confiée à Paul.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Par révélation, il m’a fait connaître le secret de son plan que je viens de résumer en quelques mots. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En me lisant, vous pouvez vous rendre compte de la compréhension que j’ai de ce secret, qui concerne Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, Dieu ne l’a pas fait connaître aux hommes des générations passées comme il l’a révélé maintenant, par le Saint-Esprit, à ses apôtres, ses prophètes qu’il a consacrés à son service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et ce secret c’est que, par leur union avec Jésus-Christ, les non-Juifs reçoivent le même héritage que nous, les Juifs, ils font partie du même corps et ont part à la même promesse, par le moyen de l’Evangile. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est de cet Evangile que je suis devenu le serviteur : tel est le don que Dieu m’a accordé dans sa grâce, par l’action de sa puissance. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Oui, c’est à moi, le plus petit de tous les membres du peuple saint, que Dieu a fait cette grâce d’annoncer aux non-Juifs les richesses insondables de Christ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et de mettre en pleine lumière, pour tout homme, la façon dont Dieu mène ce plan à sa complète réalisation. Ce plan, le Dieu qui a créé toutes choses l’avait tenu caché en lui-même de toute éternité. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Par cette mise en lumière, les Autorités et les Puissances dans le monde céleste peuvent connaître, par le moyen de l’Eglise, les aspects infiniment variés de sa sagesse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cela s’accomplit conformément à ce qui a été fixé de toute éternité et qui s’est réalisé par Jésus-Christ notre Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Etant unis à lui, nous avons, par la foi en lui, la liberté de nous approcher de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le mot grec traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'approcher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était utilisé pour le droit de venir dans la présence d’un souverain ou d’un dieu (voir 2.18 ; Rm 5.2 ; Hé 4.16 ; 10.19 ; 1 P 3.18).
    marker-yv: yv-n
  - type: text
    text: ' avec assurance. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aussi je vous demande de ne pas perdre courage en pensant aux détresses que je connais dans mon service pour vous : elles contribuent à la gloire qui vous est destinée.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Connaître l’amour de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi je me mets à genoux devant le Père, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'de qui dépendent, comme d’un modèle, toutes les familles des cieux et de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je lui demande qu’il vous accorde, à la mesure de ses glorieuses richesses, d’être fortifiés avec puissance par son Esprit dans votre être intérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Que Christ habite dans votre cœur par la foi. Enracinés et solidement fondés dans l’amour, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'vous serez ainsi à même de comprendre, avec tous ceux qui font partie du peuple saint, combien l’amour de Christ est large, long, élevé et profond. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, vous serez à même de connaître cet amour qui surpasse tout ce qu’on peut en connaître, et vous serez ainsi remplis de toute la plénitude de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A celui qui, par la puissance qui agit en nous, peut réaliser bien au-delà de tout ce que nous demandons ou même pensons, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: à lui soit la gloire dans l’Eglise et en Jésus-Christ pour toutes les générations et pour l’éternité. Amen !
