document_id: EPH.3,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La mission de Paul
  - type: text
    content: C’est pourquoi moi Paul, le prisonnier de Jésus-Christ pour vous, les non-Juifs…
  - type: note
    content: Paul interrompt ici sa phrase pour ouvrir jusqu’au v. 14 une parenthèse dans laquelle il explique quelle est sa mission et la nature du secret qu’il a été chargé d’annoncer.
  '10':
  - type: text
    content: Par cette mise en lumière, les Autorités et les Puissances dans le monde céleste peuvent connaître, par le moyen de l’Eglise, les aspects infiniment variés de sa sagesse.
  '11':
  - type: text
    content: 'Cela s’accomplit conformément à ce qui a été fixé de toute éternité et qui s’est réalisé par Jésus-Christ notre Seigneur. '
  '12':
  - type: text
    content: Etant unis à lui, nous avons, par la foi en lui, la liberté de nous approcher de Dieu
  - type: note
    content: Le mot grec traduit par approcher était utilisé pour le droit de venir dans la présence d’un souverain ou d’un dieu (voir 2.18 ; Rm 5.2 ; Hé 4.16 ; 10.19 ; 1 P 3.18).
  - type: text
    content: ' avec assurance. '
  '13':
  - type: text
    content: 'Aussi je vous demande de ne pas perdre courage en pensant aux détresses que je connais dans mon service pour vous : elles contribuent à la gloire qui vous est destinée.'
  - type: heading
    content: Connaître l’amour de Dieu
  '14':
  - type: text
    content: 'C’est pourquoi je me mets à genoux devant le Père, '
  '15':
  - type: text
    content: 'de qui dépendent, comme d’un modèle, toutes les familles des cieux et de la terre. '
  '16':
  - type: text
    content: 'Je lui demande qu’il vous accorde, à la mesure de ses glorieuses richesses, d’être fortifiés avec puissance par son Esprit dans votre être intérieur. '
  '17':
  - type: text
    content: 'Que Christ habite dans votre cœur par la foi. Enracinés et solidement fondés dans l’amour, '
  '18':
  - type: text
    content: 'vous serez ainsi à même de comprendre, avec tous ceux qui font partie du peuple saint, combien l’amour de Christ est large, long, élevé et profond. '
  '19':
  - type: text
    content: Oui, vous serez à même de connaître cet amour qui surpasse tout ce qu’on peut en connaître, et vous serez ainsi remplis de toute la plénitude de Dieu.
  '2':
  - type: text
    content: Vous avez très certainement appris quelle responsabilité Dieu, dans sa grâce, m’a confiée à votre égard
  - type: note
    content: Ces paroles prouvent que la lettre ne s’adressait pas à la seule Eglise d’Ephèse. Paul, en effet, avait séjourné pendant trois ans à Ephèse (Ac 20.31). Les Ephésiens n’ignoraient donc pas la responsabilité que Dieu avait confiée à Paul.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'A celui qui, par la puissance qui agit en nous, peut réaliser bien au-delà de tout ce que nous demandons ou même pensons, '
  '21':
  - type: text
    content: à lui soit la gloire dans l’Eglise et en Jésus-Christ pour toutes les générations et pour l’éternité. Amen !
  '3':
  - type: text
    content: 'Par révélation, il m’a fait connaître le secret de son plan que je viens de résumer en quelques mots. '
  '4':
  - type: text
    content: 'En me lisant, vous pouvez vous rendre compte de la compréhension que j’ai de ce secret, qui concerne Christ. '
  '5':
  - type: text
    content: En effet, Dieu ne l’a pas fait connaître aux hommes des générations passées comme il l’a révélé maintenant, par le Saint-Esprit, à ses apôtres, ses prophètes qu’il a consacrés à son service.
  '6':
  - type: text
    content: 'Et ce secret c’est que, par leur union avec Jésus-Christ, les non-Juifs reçoivent le même héritage que nous, les Juifs, ils font partie du même corps et ont part à la même promesse, par le moyen de l’Evangile. '
  '7':
  - type: text
    content: 'C’est de cet Evangile que je suis devenu le serviteur : tel est le don que Dieu m’a accordé dans sa grâce, par l’action de sa puissance. '
  '8':
  - type: text
    content: 'Oui, c’est à moi, le plus petit de tous les membres du peuple saint, que Dieu a fait cette grâce d’annoncer aux non-Juifs les richesses insondables de Christ '
  '9':
  - type: text
    content: 'et de mettre en pleine lumière, pour tout homme, la façon dont Dieu mène ce plan à sa complète réalisation. Ce plan, le Dieu qui a créé toutes choses l’avait tenu caché en lui-même de toute éternité. '
