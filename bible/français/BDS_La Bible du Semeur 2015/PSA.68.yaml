document_id: PSA.68,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le triomphe du Dieu victorieux
  - type: text
    content: Au chef de chœur. Psaume de David. A chanter. Cantique.
  '10':
  - type: text
    content: Tu répandis, ô Dieu, ╵une pluie bienfaisante
  - type: text
    content: pour affermir le peuple
  - type: note
    content: 'D’autres comprennent : le pays.'
  - type: text
    content: ' ╵qui t’appartient ╵alors qu’il était épuisé.'
  '11':
  - type: text
    content: Ton peuple habite dans le lieu
  - type: text
    content: que tu as préparé, ╵ô Dieu, dans ta bonté,
  - type: text
    content: pour que les pauvres s’y installent.
  '12':
  - type: text
    content: Le Seigneur dit un mot,
  - type: text
    content: et aussitôt les messagères ╵d’une bonne nouvelle ╵font une armée nombreuse
  - type: note
    content: Il s’agit de la foule des femmes annonçant la bonne nouvelle de la victoire de Dieu sur les habitants de Canaan (voir Ex 23.22-23, 27-28, 31 ; Dt 7.10-24  ; etc.).
  - type: text
    content: .
  '13':
  - type: text
    content: Les rois des armées ennemies
  - type: text
    content: s’enfuient et c’est la débandade.
  - type: text
    content: Celles qui sont restées ╵à la maison
  - type: text
    content: partagent le butin.
  '14':
  - type: text
    content: Allez-vous rester au repos ╵auprès des bergeries
  - type: note
    content: 'auprès des bergeries: autre traduction : dans vos foyers.'
  - type: text
    content: '  ?'
  - type: text
    content: Les ailes de la colombe sont argentées
  - type: text
    content: et son plumage est jaune d’or
  - type: note
    content: Il s’agit, selon certains, des enseignes des armées au combat, selon d’autres, du butin dont on dresse l’inventaire. Selon d’autres encore, il pourrait s’agir de l’oiseau voyageur qui apporte la nouvelle de la victoire.
  - type: text
    content: .
  '15':
  - type: text
    content: Lorsque le Tout-Puissant ╵y dispersa les rois,
  - type: text
    content: il neigeait sur le mont Tsalmôn
  - type: note
    content: Selon certains, une montagne près de Sichem (Jg 9.46-48), selon d’autres, le djebel Druze, un mont volcanique à l’est du Basan, au nord-est du lac de Galilée.
  - type: text
    content: .
  '16':
  - type: text
    content: Vous, montagnes sublimes, ╵monts du Basan
  - type: note
    content: Situé à l’est de la mer de Galilée, avec ses montagnes imposantes aux parois de basalte et aux nombreux sommets.
  - type: text
    content: ','
  - type: text
    content: monts aux cimes nombreuses, ╵monts du Basan,
  '17':
  - type: text
    content: pourquoi jalousez-vous, ╵monts aux cimes nombreuses,
  - type: text
    content: le mont choisi par Dieu ╵pour résidence
  - type: note
    content: C’est-à-dire le mont Sion.
  - type: text
    content: '  ?'
  - type: text
    content: Néanmoins l’Eternel ╵y habitera pour toujours.
  '18':
  - type: text
    content: Les chars de Dieu ╵sont innombrables,
  - type: text
    content: il y en a des milliers ╵et des milliers
  - type: note
    content: Voir 2 R 6.17 ; Ha 3.8, 15.
  - type: text
    content: ','
  - type: text
    content: et l’Eternel ╵est parmi eux.
  - type: text
    content: Il est venu ╵du Sinaï ╵jusqu’à son sanctuaire
  - type: note
    content: 'Texte difficile. Autre traduction : le Seigneur est parmi eux et le Sinaï dans le sanctuaire.'
  - type: text
    content: .
  '19':
  - type: text
    content: Tu es monté sur la hauteur, ╵tu as emmené des captifs.
  - type: text
    content: Et tu as prélevé des dons
  - type: note
    content: 'La version syriaque a : tu as fait des dons aux hommes. La citation de ce verset en Ep 4.8 contient la même idée.'
  - type: text
    content: ' ╵parmi les hommes,'
  - type: text
    content: et même parmi les rebelles, ╵pour ta demeure, ╵Eternel Dieu.
  '2':
  - type: text
    content: 'Que Dieu se lève ! ╵Et voici : ses adversaires ╵sont dispersés !'
  - type: text
    content: Ses ennemis ╵fuient devant lui
  - type: note
    content: Voir Nb 10.35.
  - type: text
    content: .
  '20':
  - type: text
    content: Béni soit le Seigneur ╵jour après jour,
  - type: text
    content: car il nous prend en charge, ╵ce Dieu qui est notre sauveur.
  - type: text
    content: Pause
  '21':
  - type: text
    content: Dieu est pour nous ╵un Dieu qui sauve !
  - type: text
    content: L’Eternel, le Seigneur, ╵peut nous délivrer de la mort.
  '22':
  - type: text
    content: Mais Dieu fracassera ╵le crâne de ses ennemis,
  - type: text
    content: la tête chevelue ╵des hommes dont la conduite est coupable.
  '23':
  - type: text
    content: 'Le Seigneur a déclaré : des monts du Basan, ╵je les ramènerai,'
  - type: text
    content: je les ramènerai ╵des profondeurs marines,
  '24':
  - type: text
    content: afin que tu baignes tes pieds ╵dans le sang de ses ennemis,
  - type: text
    content: et que tes chiens ╵prennent leur part à la curée.
  '25':
  - type: text
    content: On voit arriver ton cortège, ô Dieu,
  - type: text
    content: oui, le cortège ╵de mon Dieu, mon Roi, ╵dans le lieu saint
  - type: note
    content: 'Autre traduction : parmi le peuple saint.'
  - type: text
    content: .
  '26':
  - type: text
    content: Les chanteurs sont en tête, ╵les musiciens en queue,
  - type: text
    content: ils viennent au milieu ╵de jeunes filles, ╵battant du tambourin.
  '27':
  - type: text
    content: Bénissez Dieu ╵dans vos rassemblements,
  - type: text
    content: bénissez le Seigneur, ╵vous, issus d’Israël
  - type: note
    content: 'L’hébreu a : la source d’Israël, ce qui pourrait aussi s’appliquer au sanctuaire (voir Za 13.1).'
  - type: text
    content: '  !'
  '28':
  - type: text
    content: En tête marche Benjamin, ╵le plus petit,
  - type: text
    content: puis les chefs de Juda, ╵avec leurs grandes troupes,
  - type: text
    content: les chefs de Zabulon ╵et ceux de Nephtali
  - type: note
    content: Selon un manuscrit hébreu. Le sens du texte hébreu traditionnel est obscur.
  - type: text
    content: .
  '29':
  - type: text
    content: Ton Dieu a décidé ╵de te prodiguer de la force
  - type: note
    content: 'Certains traduisent d’après quelques manuscrits hébreux, l’ancienne version grecque et la version syriaque : manifeste ta force, ô Dieu.'
  - type: text
    content: .
  - type: text
    content: Veuille accomplir avec puissance, ╵ô Dieu, ╵tes œuvres envers nous,
  '3':
  - type: text
    content: Tu les dissipes
  - type: note
    content: 'Les versions anciennes ont : ils se dissipent.'
  - type: text
    content: ' ╵comme une fumée se dissipe,'
  - type: text
    content: comme la cire ╵qui fond au feu !
  - type: text
    content: Ainsi périssent devant Dieu ╵tous les méchants.
  '30':
  - type: text
    content: depuis ton sanctuaire ╵qui domine Jérusalem !
  - type: text
    content: Des rois t’y apporteront leurs présents.
  '31':
  - type: text
    content: Menace-le, ╵le crocodile ╵qui se tapit parmi les joncs,
  - type: text
    content: de même que le troupeau des taureaux, ╵avec les veaux des peuples,
  - type: text
    content: et qu’ils viennent se prosterner ╵en offrant leurs lingots d’argent.
  - type: text
    content: Disperse-les, ces peuples ╵aimant la guerre !
  '32':
  - type: text
    content: De nobles messagers
  - type: note
    content: D’après les versions anciennes. Hébreu de sens incertain.
  - type: text
    content: ' ╵arrivent de l’Egypte,'
  - type: text
    content: les Ethiopiens accourent, ╵les mains tendues vers Dieu.
  '33':
  - type: text
    content: Royaumes de la terre, ╵chantez à Dieu !
  - type: text
    content: Louez le Seigneur par vos chants !
  - type: text
    content: Pause
  '34':
  - type: text
    content: Oui, chantez en l’honneur ╵de celui qui chevauche dans les cieux, ╵les cieux antiques,
  - type: text
    content: et qui fait résonner sa voix, ╵une voix éclatante.
  '35':
  - type: text
    content: Proclamez de Dieu la puissance !
  - type: text
    content: Il est majestueux ╵au-dessus d’Israël,
  - type: text
    content: et sa puissance éclate ╵dans les nuées.
  '36':
  - type: text
    content: Que tu es redoutable, ô Dieu, ╵depuis ton sanctuaire !
  - type: text
    content: Lui, il est le Dieu d’Israël ╵et il donne à son peuple ╵force et puissance.
  - type: text
    content: Béni soit Dieu !
  '4':
  - type: text
    content: Alors les justes ╵se réjouiront,
  - type: text
    content: et ils seront ╵dans l’allégresse devant Dieu.
  - type: text
    content: Oui, ils seront remplis de joie.
  '5':
  - type: text
    content: Chantez à Dieu ! ╵Louez-le par vos chants !
  - type: text
    content: Frayez la voie ╵de celui qui chevauche les nuées
  - type: note
    content: Le mot hébreu qui signifie plaines peut être rapproché d’un terme assyro-babylonien qui signifie nuages. L’expression celui qui chevauche les nuées se retrouve à Ougarit. Dieu est comparé à un chef d’armée qui chevauche à la tête de ses troupes et auquel, selon l’habitude antique, on prépare le chemin pour en ôter tout obstacle (Es 40.3). Les v. 1-18 décrivent la marche triomphale de Dieu, du Sinaï (sous Moïse) au mont Sion (sous David).
  - type: text
    content: '  !'
  - type: text
    content: Son nom est « l’Eternel ».
  - type: text
    content: Exultez de joie devant lui !
  '6':
  - type: text
    content: Il est le père ╵des orphelins, ╵le défenseur des veuves.
  - type: text
    content: Oui, tel est Dieu ╵dans sa sainte demeure.
  '7':
  - type: text
    content: Dieu accorde aux gens seuls ╵une famille.
  - type: text
    content: Il donne aux prisonniers ╵de sortir libres, dans la joie.
  - type: text
    content: Seuls les rebelles ╵sont confinés ╵dans un désert aride.
  '8':
  - type: text
    content: O notre Dieu, ╵quand tu sortis ╵en tête de ton peuple
  - type: note
    content: Les v. 8-9 reprennent en partie le cantique de Débora (Jg 5.4-5).
  - type: text
    content: ','
  - type: text
    content: quand tu marchas ╵dans le désert,
  - type: text
    content: Pause
  '9':
  - type: text
    content: la terre alors trembla
  - type: note
    content: Voir Ex 19.18.
  - type: text
    content: ', ╵le ciel fondit en eau, ╵devant Dieu, le Dieu du mont Sinaï,'
  - type: text
    content: devant Dieu, le Dieu d’Israël.
