document_id: PSA.68
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le triomphe du Dieu victorieux
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David. A chanter. Cantique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Que Dieu se lève ! ╵Et voici : ses adversaires ╵sont dispersés !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses ennemis ╵fuient devant lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nb 10.35
        metadata:
          usfm: NUM.10.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu les dissipes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les versions anciennes ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils se dissipent.
    marker-yv: yv-n
  - type: text
    text: ' ╵comme une fumée se dissipe,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la cire ╵qui fond au feu !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi périssent devant Dieu ╵tous les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors les justes ╵se réjouiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils seront ╵dans l’allégresse devant Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, ils seront remplis de joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Chantez à Dieu ! ╵Louez-le par vos chants !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Frayez la voie ╵de celui qui chevauche les nuées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le mot hébreu qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plaines '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'peut être rapproché d’un terme assyro-babylonien qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nuages. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L’expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui qui chevauche les nuées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: se retrouve à Ougarit. Dieu est comparé à un chef d’armée qui chevauche à la tête de ses troupes et auquel, selon l’habitude antique, on prépare le chemin pour en ôter tout obstacle (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Es 40.3
        metadata:
          usfm: ISA.40.3
      - type: text
        text: ). Les v. 1-18 décrivent la marche triomphale de Dieu, du Sinaï (sous Moïse) au mont Sion (sous David).
    marker-yv: yv-n
  - type: text
    text: '  !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son nom est « l’Eternel ».
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exultez de joie devant lui !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il est le père ╵des orphelins, ╵le défenseur des veuves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tel est Dieu ╵dans sa sainte demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dieu accorde aux gens seuls ╵une famille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il donne aux prisonniers ╵de sortir libres, dans la joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seuls les rebelles ╵sont confinés ╵dans un désert aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O notre Dieu, ╵quand tu sortis ╵en tête de ton peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 8-9 reprennent en partie le cantique de Débora (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 5.4-5
        metadata:
          usfm: JDG.5.4+JDG.5.5
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu marchas ╵dans le désert,
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: la terre alors trembla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19.18
        metadata:
          usfm: EXO.19.18
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', ╵le ciel fondit en eau, ╵devant Dieu, le Dieu du mont Sinaï,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant Dieu, le Dieu d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu répandis, ô Dieu, ╵une pluie bienfaisante
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour affermir le peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’autres comprennent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays.
    marker-yv: yv-n
  - type: text
    text: ' ╵qui t’appartient ╵alors qu’il était épuisé.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ton peuple habite dans le lieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu as préparé, ╵ô Dieu, dans ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que les pauvres s’y installent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le Seigneur dit un mot,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aussitôt les messagères ╵d’une bonne nouvelle ╵font une armée nombreuse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit de la foule des femmes annonçant la bonne nouvelle de la victoire de Dieu sur les habitants de Canaan (voir Ex 23.22-23, 27-28, 31 ; Dt 7.10-24  ; etc.).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les rois des armées ennemies
- type: usfm
  marker: q1
  children:
  - type: text
    text: s’enfuient et c’est la débandade.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celles qui sont restées ╵à la maison
- type: usfm
  marker: q1
  children:
  - type: text
    text: partagent le butin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Allez-vous rester au repos ╵auprès des bergeries
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: auprès des bergeries
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans vos foyers.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les ailes de la colombe sont argentées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son plumage est jaune d’or
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il s’agit, selon certains, des enseignes des armées au combat, selon d’autres, du butin dont on dresse l’inventaire. Selon d’autres encore, il pourrait s’agir de l’oiseau voyageur qui apporte la nouvelle de la victoire.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lorsque le Tout-Puissant ╵y dispersa les rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il neigeait sur le mont Tsalmôn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Selon certains, une montagne près de Sichem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 9.46-48
        metadata:
          usfm: JDG.9.46+JDG.9.47+JDG.9.48
      - type: text
        text: ), selon d’autres, le djebel Druze, un mont volcanique à l’est du Basan, au nord-est du lac de Galilée.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Vous, montagnes sublimes, ╵monts du Basan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Situé à l’est de la mer de Galilée, avec ses montagnes imposantes aux parois de basalte et aux nombreux sommets.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: monts aux cimes nombreuses, ╵monts du Basan,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: pourquoi jalousez-vous, ╵monts aux cimes nombreuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le mont choisi par Dieu ╵pour résidence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C’est-à-dire le mont Sion.
    marker-yv: yv-n
  - type: text
    text: '  ?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Néanmoins l’Eternel ╵y habitera pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les chars de Dieu ╵sont innombrables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y en a des milliers ╵et des milliers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 2 R 6.17 ; Ha 3.8, 15.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l’Eternel ╵est parmi eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est venu ╵du Sinaï ╵jusqu’à son sanctuaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte difficile. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Seigneur est parmi eux et le Sinaï dans le sanctuaire.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu es monté sur la hauteur, ╵tu as emmené des captifs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu as prélevé des dons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La version syriaque a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu as fait des dons aux hommes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La citation de ce verset en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ep 4.8
        metadata:
          usfm: EPH.4.8
      - type: text
        text: ' contient la même idée.'
    marker-yv: yv-n
  - type: text
    text: ' ╵parmi les hommes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même parmi les rebelles, ╵pour ta demeure, ╵Eternel Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Béni soit le Seigneur ╵jour après jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il nous prend en charge, ╵ce Dieu qui est notre sauveur.
- type: usfm
  marker: q4
  children:
  - type: text
    text: Pause
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dieu est pour nous ╵un Dieu qui sauve !
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Eternel, le Seigneur, ╵peut nous délivrer de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mais Dieu fracassera ╵le crâne de ses ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la tête chevelue ╵des hommes dont la conduite est coupable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le Seigneur a déclaré : des monts du Basan, ╵je les ramènerai,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les ramènerai ╵des profondeurs marines,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: afin que tu baignes tes pieds ╵dans le sang de ses ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes chiens ╵prennent leur part à la curée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: On voit arriver ton cortège, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, le cortège ╵de mon Dieu, mon Roi, ╵dans le lieu saint
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '68.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parmi le peuple saint.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les chanteurs sont en tête, ╵les musiciens en queue,
- type: usfm
  marker: q1
  children:
  - type: text
