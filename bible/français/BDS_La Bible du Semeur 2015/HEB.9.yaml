document_id: HEB.9,21
type_code: fra
verses:
  '1':
  - type: heading
    content: L’imperfection du rituel de l’ancienne alliance
  - type: text
    content: 'Certes, la première alliance avait un rituel pour le culte, ainsi qu’un sanctuaire qui était terrestre. '
  '10':
  - type: text
    content: En effet, il n’y a là que des prescriptions portant sur des rites d’ordre matériel, concernant des aliments, des boissons et des ablutions diverses. Elles ne devaient rester en vigueur que jusqu’au temps où Dieu instituerait un ordre nouveau.
  - type: heading
    content: Christ, grand-prêtre des biens qu’il nous a acquis
  '11':
  - type: text
    content: Or, Christ est venu en tant que grand-prêtre pour nous procurer les biens qu’il nous a désormais acquis
  - type: note
    content: 'Certains manuscrits ont : les biens à venir.'
  - type: text
    content: '. Il a traversé un tabernacle plus grand et plus parfait que le sanctuaire terrestre, un tabernacle qui n’a pas été fabriqué par des mains humaines, c’est-à-dire qui n’appartient pas à ce monde créé. '
  '12':
  - type: text
    content: 'Il a pénétré une fois pour toutes dans le sanctuaire ; il y a offert, non le sang de boucs ou de veaux, mais son propre sang. Il nous a ainsi acquis un salut éternel. '
  '13':
  - type: text
    content: 'En effet, le sang des boucs et des taureaux et les cendres d’une vache que l’on répand sur des personnes rituellement impures '
  '14':
  - type: text
    content: leur rendent la pureté extérieure. Mais Christ s’est offert lui-même à Dieu, sous la conduite de l’Esprit éternel, comme une victime sans défaut. A combien plus forte raison, par conséquent, son sang purifiera-t-il notre conscience des œuvres qui mènent à la mort afin que nous servions le Dieu vivant.
  - type: heading
    content: La nouvelle alliance, conclue par le sacrifice de Christ
  '15':
  - type: text
    content: Voilà pourquoi il est le médiateur d’une alliance nouvelle, afin que ceux qui sont appelés reçoivent l’héritage éternel que Dieu leur avait promis. Car une mort est intervenue pour libérer de leur culpabilité les hommes qui avaient péché sous la première alliance.
  '16':
  - type: text
    content: 'En effet, là où il y a alliance, il est nécessaire que la mort de celui qui conclut l’alliance soit produite, '
  '17':
  - type: text
    content: car une alliance est établie par la mise à mort d’animaux
  - type: note
    content: La mise à mort d’animaux représentait le sort auquel s’exposait celui qui, après avoir conclu l’alliance, la transgressait.
  - type: text
    content: . Elle n’entre pas en vigueur tant que celui qui la conclut est encore en vie
  - type: note
    content: 'C’est-à-dire tant que la mort de celui qui conclut l’alliance n’a pas été symboliquement représentée par la mise à mort d’animaux au cours de la procédure de conclusion d’alliance. Autre traduction, v. 16-17 : 16 En effet, lorsqu’il est question de testament, il faut que la mort du testateur soit constatée, 17 car un testament n’entre en vigueur qu’après le décès de celui qui l’a établi : il est sans effet tant qu’il est en vie. Une telle compréhension s’appuie sur le fait qu’en grec, le même mot signifie testament et alliance.'
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'C’est pourquoi la première alliance non plus n’est pas entrée en vigueur sans aspersion de sang. '
  '19':
  - type: text
    content: 'En effet, Moïse a d’abord exposé au peuple entier tous les commandements tels qu’ils se trouvent consignés dans la Loi. Puis il a pris le sang des veaux et des boucs avec de l’eau, de la laine rouge et une branche d’hysope, et il en a aspergé le livre ainsi que tout le peuple, '
  '2':
  - type: text
    content: 'On avait, en effet, installé une tente – le tabernacle – partagée en deux : dans la première partie se trouvaient le chandelier et la table avec les pains offerts à Dieu. On l’appelait le « lieu saint ». '
  '20':
  - type: text
    content: 'en disant : '
  - type: text
    content: Ceci est le sang de l’alliance que Dieu a conclue avec vous
  - type: note
    content: Ex 24.8.
  - type: text
    content: .
  '21':
  - type: text
    content: 'Puis il a aspergé aussi, avec le sang, le tabernacle et tous les ustensiles du culte. '
  '22':
  - type: text
    content: 'En fait, selon la Loi, presque tout est purifié avec du sang, et il n’y a pas de pardon des péchés sans que du sang soit versé. '
  '23':
  - type: text
    content: Ces objets, qui représentaient des réalités célestes, devaient donc être purifiés de cette manière-là. Il fallait de même que les réalités célestes le soient, elles, par des sacrifices bien meilleurs.
  - type: heading
    content: Une fois pour toutes
  '24':
  - type: text
    content: 'Car ce n’est pas dans un sanctuaire construit par des hommes, simple image du véritable, que Christ est entré : c’est dans le ciel même, afin de se présenter maintenant devant Dieu pour nous.'
  '25':
  - type: text
    content: 'De plus, c’est chaque année que le grand-prêtre de l’ancienne alliance pénètre dans le sanctuaire avec du sang qui n’est pas le sien ; mais Christ, lui, n’y est pas entré pour s’offrir plusieurs fois en sacrifice. '
  '26':
  - type: text
    content: Autrement, il aurait dû souffrir la mort à plusieurs reprises depuis le commencement du monde. Non, il est apparu une seule fois, à la fin des temps, pour ôter les péchés par son sacrifice.
  '27':
  - type: text
    content: 'Et comme le sort de tout homme est de mourir une seule fois – après quoi vient son jugement par Dieu – '
  '28':
  - type: text
    content: de même, Christ s’est offert une seule fois en sacrifice pour porter les péchés de beaucoup d’hommes. Et il viendra une seconde fois, non plus pour ôter les péchés, mais pour sauver ceux qui attendent de lui leur salut.
  '3':
  - type: text
    content: 'Derrière le second rideau venait la partie de la tente qu’on appelait le « lieu très saint ». '
  '4':
  - type: text
    content: Là étaient placés un brûle-parfum en or et le coffre de l’alliance, entièrement plaqué d’or. Ce coffre contenait un vase d’or avec de la manne, le bâton d’Aaron qui avait fleuri et les tablettes de pierre sur lesquelles étaient gravées les paroles de l’alliance.
  '5':
  - type: text
    content: 'Au-dessus du coffre, les chérubins glorieux couvraient le propitiatoire de l’ombre de leurs ailes. Mais ce n’est pas le moment de parler de chacun de ces objets en détail. '
  '6':
  - type: text
    content: 'Cet ensemble étant ainsi installé, les prêtres entrent en tout temps dans la première partie du tabernacle pour accomplir leur service. '
  '7':
  - type: text
    content: Dans la seconde, le grand-prêtre est le seul à pénétrer, et cela une seule fois par an. Or, il ne peut y entrer sans apporter le sang de sacrifices qu’il offre pour lui-même et pour les fautes que le peuple a commises par ignorance.
  '8':
  - type: text
    content: 'Le Saint-Esprit montre par là que l’accès au lieu très saint n’est pas ouvert tant que subsiste le premier tabernacle. '
  '9':
  - type: text
    content: Nous avons là une représentation symbolique en vue de l’époque actuelle. Elle signifie que les offrandes et les sacrifices qu’on présente ainsi à Dieu sont incapables de donner une conscience parfaitement nette à celui qui rend un tel culte.
