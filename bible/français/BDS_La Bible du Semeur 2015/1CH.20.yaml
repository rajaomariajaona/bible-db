document_id: 1CH.20,21
type_code: fra
verses:
  '1':
  - type: heading
    content: La défaite complète des Ammonites
  - type: heading
    content: (2 S 11.1 ; 12.29-31)
  - type: text
    content: Au printemps suivant, à l’époque où les rois ont coutume de partir en guerre, Joab mena une forte armée ravager le pays des Ammonites. Il alla mettre le siège devant Rabba. David était resté à Jérusalem. Joab conquit Rabba et la détruisit
  - type: note
    content: 2 S 12.26-29 précise que Joab se contenta de ravager la ville basse, laissant à David l’honneur de s’emparer de la citadelle.
  - type: text
    content: '. '
  '2':
  - type: text
    content: David prit la couronne qui se trouvait sur la tête de leur roi
  - type: note
    content: 'L’ancienne version grecque a compris : leur dieu Milkom.'
  - type: text
    content: '. Il trouva que cette couronne, qui était en or, pesait une trentaine de kilos. De plus, elle était garnie d’une pierre précieuse. Elle vint orner la tête de David. Le roi emporta de la ville un immense butin. '
  '3':
  - type: text
    content: Quant aux habitants, il les emmena et les affecta à diverses corvées pour manier la scie, les herses de fer et la hache. David agit de même avec les populations de toutes les villes des Ammonites. Après cela, David et toute son armée rentrèrent à Jérusalem.
  - type: heading
    content: La lutte contre les Philistins
  - type: heading
    content: (2 S 21.15-22)
  '4':
  - type: text
    content: Plus tard, lorsqu’eut lieu une nouvelle bataille avec les Philistins, à Guézer, Sibbekaï le Houshatite tua Sippaï, l’un des géants descendant de Rapha
  - type: note
    content: Les Rephaïm étaient des hommes de haute taille installés déjà avant Abraham dans ce qui devait devenir le pays d’Israël et dans les pays environnants (Gn 14.5 ; 15.20 ; Dt 2.11, 20 ; 3.11 ; Jos 17.15). Lors de la conquête par les Israélites, ils se réfugièrent chez les Philistins (2 S 21.16, 18, 20, 21).
  - type: text
    content: ', et les Philistins furent humiliés.'
  '5':
  - type: text
    content: 'Lors d’un autre combat contre les Philistins, Elhanân, fils de Yaïr, tua Lahmi le frère de Goliath, de Gath, qui avait une lance dont le bois était aussi gros que le cylindre d’un métier à tisser. '
  '6':
  - type: text
    content: 'Dans une autre bataille à Gath, un homme de haute stature, lui aussi descendant de Rapha et qui avait six doigts à chaque main et à chaque pied, c’est-à-dire vingt-quatre en tout, '
  '7':
  - type: text
    content: 'lança un défi à Israël. Jonathan, fils de Shimea, le frère de David, le tua. '
  '8':
  - type: text
    content: Ces descendants de Rapha, nés à Gath, succombèrent devant David et ses hommes.
