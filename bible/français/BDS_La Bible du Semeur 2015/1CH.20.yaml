document_id: 1CH.20,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La défaite complète des Ammonites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 11.1 ; 12.29-31)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au printemps suivant, à l’époque où les rois ont coutume de partir en guerre, Joab mena une forte armée ravager le pays des Ammonites. Il alla mettre le siège devant Rabba. David était resté à Jérusalem. Joab conquit Rabba et la détruisit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 12.26-29
        - type: text
          text: ' précise que Joab se contenta de ravager la ville basse, laissant à David l’honneur de s’emparer de la citadelle.'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David prit la couronne qui se trouvait sur la tête de leur roi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L’ancienne version grecque a compris : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur dieu Milkom.
      marker-yv: yv-n
    - type: text
      text: '. Il trouva que cette couronne, qui était en or, pesait une trentaine de kilos. De plus, elle était garnie d’une pierre précieuse. Elle vint orner la tête de David. Le roi emporta de la ville un immense butin. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant aux habitants, il les emmena et les affecta à diverses corvées pour manier la scie, les herses de fer et la hache. David agit de même avec les populations de toutes les villes des Ammonites. Après cela, David et toute son armée rentrèrent à Jérusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La lutte contre les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 S 21.15-22)
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Plus tard, lorsqu’eut lieu une nouvelle bataille avec les Philistins, à Guézer, Sibbekaï le Houshatite tua Sippaï, l’un des géants descendant de Rapha
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les Rephaïm étaient des hommes de haute taille installés déjà avant Abraham dans ce qui devait devenir le pays d’Israël et dans les pays environnants (Gn 14.5 ; 15.20 ; Dt 2.11, 20 ; 3.11 ; Jos 17.15). Lors de la conquête par les Israélites, ils se réfugièrent chez les Philistins (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 2 S 21.16
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '18'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '20'
        - type: text
          text: ', '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '21'
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', et les Philistins furent humiliés.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lors d’un autre combat contre les Philistins, Elhanân, fils de Yaïr, tua Lahmi le frère de Goliath, de Gath, qui avait une lance dont le bois était aussi gros que le cylindre d’un métier à tisser. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans une autre bataille à Gath, un homme de haute stature, lui aussi descendant de Rapha et qui avait six doigts à chaque main et à chaque pied, c’est-à-dire vingt-quatre en tout, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lança un défi à Israël. Jonathan, fils de Shimea, le frère de David, le tua. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces descendants de Rapha, nés à Gath, succombèrent devant David et ses hommes.
