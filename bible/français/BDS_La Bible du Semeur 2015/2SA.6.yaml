document_id: 2SA.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le transport du coffre de l’alliance à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 13.5-14)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: David rassembla les trente « milliers »
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'millier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était sans doute un régiment de quelques centaines d’hommes.
    marker-yv: yv-n
  - type: text
    text: ' des meilleurs guerriers d’Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: puis il se mit en route avec toute cette armée et partit de Baalé-Juda
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sans doute un autre nom de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qiryath-Yearim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Jos 15.60 ; 18.14 ; 1 S 6.21 ; 1 Ch 13.1-6) où le coffre de Dieu avait été laissé (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 7.1
        metadata:
          usfm: 1SA.7.1
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' pour en ramener le coffre de Dieu sur lequel a été invoqué l’Eternel, le Seigneur des armées célestes qui siège entre les chérubins'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25.22
        metadata:
          usfm: EXO.25.22
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On chargea le coffre de Dieu sur un chariot neuf et on l’emporta de la maison d’Abinadab située sur la colline. Ouzza et Ahyo, fils d’Abinadab, conduisaient le chariot neuf. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On fit partir le chariot, sur lequel on avait posé le coffre, de la maison d’Abinadab située sur la colline. Ahyo marchait devant le coffre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: David et toute la communauté d’Israël exprimaient leur joie devant l’Eternel en jouant sur toutes sortes d’instruments de bois de cyprès, sur des lyres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Au lieu de : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en jouant sur toutes sortes d’instruments de bois de cyprès, sur des lyres… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'le manuscrit hébreu de Qumrân, l’ancienne version grecque et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 13.8
        metadata:
          usfm: 1CH.13.8
      - type: text
        text: ' ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par des chants en jouant sur des lyres…
    marker-yv: yv-n
  - type: text
    text: ', des luths, des tambourins, des sistres et des cymbales.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu’ils furent arrivés près de l’aire de Nakôn, les bœufs firent un écart et Ouzza tendit la main et saisit le coffre de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors l’Eternel se mit en colère contre Ouzza et Dieu le frappa sur place à cause de sa faute. Ouzza mourut là, à côté du coffre de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David s’irrita de ce que l’Eternel avait ouvert une brèche en frappant Ouzza, et il appela ce lieu Pérets-Ouzza (brèche d’Ouzza), nom qu’il porte encore aujourd’hui. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce jour-là, David prit peur de l’Eternel et il se demanda : Comment oserais-je faire venir le coffre de l’Eternel chez moi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il renonça donc à transporter le coffre de l’Eternel chez lui dans la Cité de David, et il le fit déposer dans la maison d’Obed-Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après 1 Ch 13.13 ; 15.18, 24 ; 16.5 ; 26.4-8, 15 ; 2 Ch 25.24, c’était un lévite. Il semble avoir été originaire de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Philistie, à moins que ce nom ne renvoie à la ville lévitique de Gath-Rimmôn, dans la tribu de Dan (Jos 19.45 ; 21.24-25).
    marker-yv: yv-n
  - type: text
    text: ', un homme originaire de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le coffre y resta trois mois et l’Eternel bénit Obed-Edom et toute sa famille.
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 Ch 15.25 à 16.3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On fit savoir au roi David que l’Eternel avait béni la famille d’Obed-Edom et qu’il avait fait prospérer tous ses biens à cause du coffre de Dieu. Alors David fit transporter le coffre de Dieu depuis la maison d’Obed-Edom jusque dans la Cité de David, au milieu des réjouissances. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand ceux qui portaient le coffre de l’Eternel eurent avancé de six pas, ils s’arrêtèrent et l’on offrit en sacrifice un taureau et un veau gras. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David dansait de toutes ses forces devant l’Eternel, vêtu seulement d’un vêtement de lin semblable à celui des prêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ainsi David et tout le peuple d’Israël transportèrent le coffre de l’Eternel en poussant des cris de joie et en faisant résonner les cors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque le coffre de l’Eternel arriva dans la Cité de David, Mikal, la fille de Saül, regardait par la fenêtre. Elle vit le roi David sauter et danser devant l’Eternel ; alors elle conçut du mépris pour lui dans son cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On amena le coffre de l’Eternel et on le déposa au milieu de la tente que David avait fait dresser pour lui. David offrit des holocaustes et des sacrifices de communion devant l’Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand David eut achevé d’offrir ces sacrifices, il bénit le peuple au nom de l’Eternel, le Seigneur des armées célestes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Puis il fit distribuer des vivres à tout le peuple, c’est-à-dire à toute la foule des Israélites, hommes et femmes ; chacun reçut une miche de pain, une portion de viande rôtie et une masse de raisins secs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Traduction incertaine. Autre traduction : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un gâteau de dattes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de figues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et un gâteau de raisins secs.
    marker-yv: yv-n
  - type: text
    text: . Après cela, chacun retourna chez soi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'David rentra chez lui pour bénir sa maisonnée. Alors Mikal, fille de Saül, sortit à sa rencontre et s’exclama : Ah, vraiment, le roi d’Israël s’est couvert d’honneur aujourd’hui ! Il s’est exhibé à demi nu aux servantes de ses serviteurs, comme aurait pu le faire un homme de rien !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'David répondit à Mikal : C’est devant l’Eternel que j’ai manifesté ma joie, lui qui m’a choisi de préférence à ton père et à toute sa famille, pour m’établir comme chef d’Israël, son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je m’abaisserais volontiers encore davantage pour m’humilier. Néanmoins, je serai honoré par les servantes dont tu as parlé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A la suite de cela, Mikal n’eut jamais d’enfant jusqu’à sa mort.
