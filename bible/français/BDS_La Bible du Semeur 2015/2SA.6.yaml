document_id: 2SA.6,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le transport du coffre de l’alliance à Jérusalem
  - type: heading
    content: (1 Ch 13.5-14)
  - type: text
    content: David rassembla les trente « milliers »
  - type: note
    content: Un millier était sans doute un régiment de quelques centaines d’hommes.
  - type: text
    content: ' des meilleurs guerriers d’Israël, '
  '10':
  - type: text
    content: Il renonça donc à transporter le coffre de l’Eternel chez lui dans la Cité de David, et il le fit déposer dans la maison d’Obed-Edom
  - type: note
    content: D’après 1 Ch 13.13 ; 15.18, 24 ; 16.5 ; 26.4-8, 15 ; 2 Ch 25.24, c’était un lévite. Il semble avoir été originaire de Gath en Philistie, à moins que ce nom ne renvoie à la ville lévitique de Gath-Rimmôn, dans la tribu de Dan (Jos 19.45 ; 21.24-25).
  - type: text
    content: ', un homme originaire de Gath. '
  '11':
  - type: text
    content: Le coffre y resta trois mois et l’Eternel bénit Obed-Edom et toute sa famille.
  - type: heading
    content: (1 Ch 15.25 à 16.3)
  '12':
  - type: text
    content: 'On fit savoir au roi David que l’Eternel avait béni la famille d’Obed-Edom et qu’il avait fait prospérer tous ses biens à cause du coffre de Dieu. Alors David fit transporter le coffre de Dieu depuis la maison d’Obed-Edom jusque dans la Cité de David, au milieu des réjouissances. '
  '13':
  - type: text
    content: 'Quand ceux qui portaient le coffre de l’Eternel eurent avancé de six pas, ils s’arrêtèrent et l’on offrit en sacrifice un taureau et un veau gras. '
  '14':
  - type: text
    content: 'David dansait de toutes ses forces devant l’Eternel, vêtu seulement d’un vêtement de lin semblable à celui des prêtres. '
  '15':
  - type: text
    content: Ainsi David et tout le peuple d’Israël transportèrent le coffre de l’Eternel en poussant des cris de joie et en faisant résonner les cors.
  '16':
  - type: text
    content: 'Lorsque le coffre de l’Eternel arriva dans la Cité de David, Mikal, la fille de Saül, regardait par la fenêtre. Elle vit le roi David sauter et danser devant l’Eternel ; alors elle conçut du mépris pour lui dans son cœur. '
  '17':
  - type: text
    content: 'On amena le coffre de l’Eternel et on le déposa au milieu de la tente que David avait fait dresser pour lui. David offrit des holocaustes et des sacrifices de communion devant l’Eternel. '
  '18':
  - type: text
    content: 'Quand David eut achevé d’offrir ces sacrifices, il bénit le peuple au nom de l’Eternel, le Seigneur des armées célestes. '
  '19':
  - type: text
    content: Puis il fit distribuer des vivres à tout le peuple, c’est-à-dire à toute la foule des Israélites, hommes et femmes ; chacun reçut une miche de pain, une portion de viande rôtie et une masse de raisins secs
  - type: note
    content: 'Traduction incertaine. Autre traduction : un gâteau de dattes (ou de figues) et un gâteau de raisins secs.'
  - type: text
    content: . Après cela, chacun retourna chez soi.
  '2':
  - type: text
    content: puis il se mit en route avec toute cette armée et partit de Baalé-Juda
  - type: note
    content: Sans doute un autre nom de Qiryath-Yearim (voir Jos 15.60 ; 18.14 ; 1 S 6.21 ; 1 Ch 13.1-6) où le coffre de Dieu avait été laissé (1 S 7.1).
  - type: text
    content: ' pour en ramener le coffre de Dieu sur lequel a été invoqué l’Eternel, le Seigneur des armées célestes qui siège entre les chérubins'
  - type: note
    content: Voir Ex 25.22.
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'David rentra chez lui pour bénir sa maisonnée. Alors Mikal, fille de Saül, sortit à sa rencontre et s’exclama : Ah, vraiment, le roi d’Israël s’est couvert d’honneur aujourd’hui ! Il s’est exhibé à demi nu aux servantes de ses serviteurs, comme aurait pu le faire un homme de rien !'
  '21':
  - type: text
    content: 'David répondit à Mikal : C’est devant l’Eternel que j’ai manifesté ma joie, lui qui m’a choisi de préférence à ton père et à toute sa famille, pour m’établir comme chef d’Israël, son peuple. '
  '22':
  - type: text
    content: Je m’abaisserais volontiers encore davantage pour m’humilier. Néanmoins, je serai honoré par les servantes dont tu as parlé.
  '23':
  - type: text
    content: A la suite de cela, Mikal n’eut jamais d’enfant jusqu’à sa mort.
  '3':
  - type: text
    content: 'On chargea le coffre de Dieu sur un chariot neuf et on l’emporta de la maison d’Abinadab située sur la colline. Ouzza et Ahyo, fils d’Abinadab, conduisaient le chariot neuf. '
  '4':
  - type: text
    content: 'On fit partir le chariot, sur lequel on avait posé le coffre, de la maison d’Abinadab située sur la colline. Ahyo marchait devant le coffre. '
  '5':
  - type: text
    content: David et toute la communauté d’Israël exprimaient leur joie devant l’Eternel en jouant sur toutes sortes d’instruments de bois de cyprès, sur des lyres
  - type: note
    content: 'Au lieu de : en jouant sur toutes sortes d’instruments de bois de cyprès, sur des lyres… le manuscrit hébreu de Qumrân, l’ancienne version grecque et 1 Ch 13.8 ont : par des chants en jouant sur des lyres…'
  - type: text
    content: ', des luths, des tambourins, des sistres et des cymbales.'
  '6':
  - type: text
    content: 'Lorsqu’ils furent arrivés près de l’aire de Nakôn, les bœufs firent un écart et Ouzza tendit la main et saisit le coffre de Dieu. '
  '7':
  - type: text
    content: Alors l’Eternel se mit en colère contre Ouzza et Dieu le frappa sur place à cause de sa faute. Ouzza mourut là, à côté du coffre de Dieu.
  '8':
  - type: text
    content: 'David s’irrita de ce que l’Eternel avait ouvert une brèche en frappant Ouzza, et il appela ce lieu Pérets-Ouzza (brèche d’Ouzza), nom qu’il porte encore aujourd’hui. '
  '9':
  - type: text
    content: 'Ce jour-là, David prit peur de l’Eternel et il se demanda : Comment oserais-je faire venir le coffre de l’Eternel chez moi ?'
