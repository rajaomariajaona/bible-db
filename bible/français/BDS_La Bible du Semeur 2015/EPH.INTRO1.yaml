document_id: EPH.INTRO1,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Introduction
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La lettre de Paul dite « aux Ephésiens » n’est probablement pas adressée aux seuls chrétiens de la ville d’Ephèse. En effet, les meilleurs manuscrits ont un blanc à l’endroit de l’adresse : « ceux qui… font partie du peuple saint et croient en Jésus-Christ » (1.1). Par ailleurs, Paul connaissait bien l’Eglise d’Ephèse où il avait passé près de trois ans (Ac 19 et 20). Or cette lettre est une des moins personnelles de l’apôtre. La plupart des spécialistes voient donc en elle une lettre circulaire adressée à un groupe d’Eglises d’Asie Mineure, que l’on identifie parfois à la lettre à laquelle Colossiens 4.16 fait allusion.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ecrite de prison, à Rome, vers l’été 62, elle fut portée dans la province romaine d’Asie par Tychique.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La lettre est célèbre pour sa bénédiction introductive (1.3-14) dans laquelle Paul, en une longue phrase dans l’original, expose le plan du salut en Jésus-Christ. Ce « secret » (1.9), Dieu l’avait conçu en lui-même « bien avant de poser les fondations du monde » (1.4) mais il l’a révélé en Jésus-Christ et Paul en est le messager.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le thème majeur que développe l’apôtre est celui de l’unité et de la diversité de l’Eglise :'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: – unité et diversité d’origine (2.1 à 3.20), Juifs et non-Juifs sauvés, les uns comme les autres, par grâce pour former « un seul corps » ;
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: – unité de l’Eglise et diversité de services (4.1-16) ;
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: – unité et diversité sociale (5.21 à 6.9).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ces développements sont émaillés de recommandations pratiques sur le comportement du chrétien rempli de l’Esprit Saint, que Paul oppose, par un violent contraste, à celui de ceux qui ne connaissent pas Dieu (4.17 à 5.20). Le développement final décrit les armes du chrétien dont celui-ci devra user dans le combat spirituel (6.10-17).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ainsi les destinataires de Paul seront-ils armés pour résister aux faux docteurs qui essaient de séduire les Eglises voisines de Colosses.
