document_id: NUM.24,21
type_code: fra
verses:
  '1':
  - type: text
    content: 'Balaam, voyant bien que l’Eternel trouvait bon de bénir Israël, n’alla pas, comme les autres fois, à la recherche d’augures. Il se tourna vers le désert et '
  '10':
  - type: text
    content: 'Alors Balaq se mit en colère contre Balaam, frappa des mains et lui dit : C’est pour maudire mes ennemis que je t’ai appelé ; et voici la troisième fois que tu les combles de bénédictions ! '
  '11':
  - type: text
    content: Puisqu’il en est ainsi, retourne chez toi ! Je voulais te combler d’honneurs, mais voici que l’Eternel te frustre de ces honneurs.
  '12':
  - type: text
    content: 'Balaam lui répondit : N’ai-je pas expressément dit aux messagers que tu m’as envoyés : '
  '13':
  - type: text
    content: '« Même si Balaq me donnait son palais rempli d’argent et d’or, je ne pourrais pas transgresser l’ordre de l’Eternel pour faire quoi que ce soit en bien ou en mal » ? Je ne pourrai dire que ce que l’Eternel dira. '
  '14':
  - type: text
    content: Maintenant, je m’en retourne chez les miens. Mais auparavant, viens, je vais t’annoncer ce que ce peuple-ci fera au tien dans les temps à venir.
  '15':
  - type: text
    content: 'Et il prononça son oracle :'
  - type: text
    content: C’est là ce que déclare ╵Balaam, le fils de Béor,
  - type: text
    content: voici ce que proclame l’homme ╵au regard pénétrant,
  '16':
  - type: text
    content: oui, celui qui entend ╵les paroles de Dieu,
  - type: text
    content: qui a accès ╵à la science du Très-Haut,
  - type: text
    content: qui perçoit la révélation ╵du Tout-Puissant,
  - type: text
    content: dont les yeux se dessillent
  - type: text
    content: 'alors qu’il est tombé à terre :'
  '17':
  - type: text
    content: Je le vois bien, ╵mais ce n’est pas pour maintenant,
  - type: text
    content: je le contemple, ╵mais non de près ;
  - type: text
    content: un astre
  - type: note
    content: Dans les textes orientaux et les hiéroglyphes, l’étoile désigne un roi, ce que confirme la mention du sceptre. Voir Ap 22.16.
  - type: text
    content: ' monte de Jacob,'
  - type: text
    content: un sceptre surgit d’Israël ;
  - type: text
    content: il brise les flancs de Moab,
  - type: text
    content: il abat
  - type: note
    content: 'Le Pentateuque samaritain : il frappe à la tête.'
  - type: text
    content: ' tous les fils de Seth.'
  '18':
  - type: text
    content: Edom sera conquis ;
  - type: text
    content: Séir, son ennemi
  - type: note
    content: Les Edomites, descendants d’Esaü, habitaient la région montagneuse de Séir (voir Abd 19).
  - type: text
    content: ', ╵tombera en sa possession.'
  - type: text
    content: Le peuple d’Israël ╵accomplit des exploits.
  '19':
  - type: text
    content: Celui qui surgira ╵de Jacob régnera,
  - type: text
    content: et il fera périr des villes ╵les derniers survivants.
  - type: heading
    content: Les prophéties sur d’autres peuples
  '2':
  - type: text
    content: 'regarda Israël campé par tribus. Alors l’Esprit de Dieu vint sur lui. '
  '20':
  - type: text
    content: 'Balaam aperçut Amalec et il prononça son oracle :'
  - type: text
    content: Amalec était à la tête ╵de tous les peuples
  - type: note
    content: Les Amalécites étaient des nomades de la partie sud de Canaan (voir Gn 14.7 ; Ex 17.8-16 ; Nb 13.29). Ils furent les premiers à attaquer Israël (Ex 17.8-13). Saül et David exécuteront cette menace (1 S 15.32).
  - type: text
    content: ','
  - type: text
    content: mais sa postérité ╵en fin de compte ╵disparaîtra.
  '21':
  - type: text
    content: 'Puis il vit les Qéniens et prononça son oracle :'
  - type: text
    content: Ta demeure est solide,
  - type: text
    content: ton nid
  - type: note
    content: En hébreu, il y a assonance entre les noms Qénien et nid.
  - type: text
    content: ' est juché sur le roc,'
  '22':
  - type: text
    content: mais finalement le Qénien ╵sera exterminé
  - type: text
    content: quand, en captivité, ╵Assour
  - type: note
    content: C’est-à-dire l’Assyrie (voir Gn 10.11) qui emmènera les Qéniens en exil.
  - type: text
    content: ' t’emmènera captif.'
  '23':
  - type: text
    content: 'Enfin il prononça encore un oracle :'
  - type: text
    content: 'Hélas : Qui survivra'
  - type: note
    content: 'Selon le texte hébreu traditionnel. En coupant différemment les mots de l’hébreu, on obtient : un peuple se rassemblera du nord.'
  - type: text
    content: ' ╵lorsque Dieu agira ?'
  '24':
  - type: text
    content: Des bateaux viennent de Kittim
  - type: note
    content: Kittim désigne l’île de Chypre, puis, par extension, les côtes d’Asie Mineure et toutes les côtes méditerranéennes (Gn 10.4).
  - type: text
    content: ','
  - type: text
    content: ils soumettront Assour, ╵ils soumettront Héber
  - type: note
    content: Héber était l’ancêtre des Hébreux (1 Ch 1.25-27) et d’autres peuplades désignées sans doute ici (voir Gn 10.25).
  - type: text
    content: ','
  - type: text
    content: et même ce dernier ╵court à sa ruine.
  '25':
  - type: text
    content: Puis Balaam se mit en route et s’en retourna chez lui. Balaq, lui aussi, s’en alla de son côté.
  '3':
  - type: text
    content: 'Et il prononça son oracle :'
  - type: text
    content: C’est là ce que déclare ╵Balaam, le fils de Béor,
  - type: text
    content: voici ce que proclame l’homme ╵au regard pénétrant,
  '4':
  - type: text
    content: oui, celui qui entend ╵les paroles de Dieu,
  - type: text
    content: qui perçoit la révélation ╵du Tout-Puissant,
  - type: text
    content: 'dont les yeux se dessillent ╵alors qu’il est tombé à terre :'
  '5':
  - type: text
    content: Que tes tentes sont belles, ╵ô peuple de Jacob !
  - type: text
    content: Et tes demeures, ╵ô Israël !
  '6':
  - type: text
    content: Comme des torrents, elles se répandent,
  - type: text
    content: c’est comme des jardins ╵alignés près d’un fleuve,
  - type: text
    content: comme des aloès ╵plantés par l’Eternel,
  - type: text
    content: ou bien comme des cèdres ╵croissant au bord des eaux.
  '7':
  - type: text
    content: De ses réservoirs l’eau déborde,
  - type: text
    content: la semence est plantée ╵dans des champs irrigués.
  - type: text
    content: Son roi est grand, ╵plus que le roi Agag
  - type: note
    content: Voir 1 S 15.
  - type: text
    content: '  ;'
  - type: text
    content: et son royaume ╵gagnera en puissance.
  '8':
  - type: text
    content: Quand Dieu le fit sortir d’Egypte,
  - type: text
    content: avec une puissance ╵semblable à la force du buffle,
  - type: text
    content: il dévora les peuples ╵qui lui étaient hostiles,
  - type: text
    content: il leur brisa les os
  - type: text
    content: et les cribla de flèches.
  '9':
  - type: text
    content: Le voici couché comme un lion,
  - type: text
    content: au repos comme un lion. ╵Qui le fera lever ?
  - type: text
    content: Il est béni
  - type: note
    content: Voir Gn 12.3.
  - type: text
    content: ' ╵celui qui te bénit,'
  - type: text
    content: il est maudit ╵celui qui te maudit !
  - type: heading
    content: La prophétie sur l’avenir d’Israël
