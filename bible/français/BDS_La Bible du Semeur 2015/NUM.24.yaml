document_id: NUM.24,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Balaam, voyant bien que l’Eternel trouvait bon de bénir Israël, n’alla pas, comme les autres fois, à la recherche d’augures. Il se tourna vers le désert et '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors Balaq se mit en colère contre Balaam, frappa des mains et lui dit : C’est pour maudire mes ennemis que je t’ai appelé ; et voici la troisième fois que tu les combles de bénédictions ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Puisqu’il en est ainsi, retourne chez toi ! Je voulais te combler d’honneurs, mais voici que l’Eternel te frustre de ces honneurs.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Balaam lui répondit : N’ai-je pas expressément dit aux messagers que tu m’as envoyés : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '« Même si Balaq me donnait son palais rempli d’argent et d’or, je ne pourrais pas transgresser l’ordre de l’Eternel pour faire quoi que ce soit en bien ou en mal » ? Je ne pourrai dire que ce que l’Eternel dira. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Maintenant, je m’en retourne chez les miens. Mais auparavant, viens, je vais t’annoncer ce que ce peuple-ci fera au tien dans les temps à venir.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et il prononça son oracle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce que déclare ╵Balaam, le fils de Béor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voici ce que proclame l’homme ╵au regard pénétrant,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: oui, celui qui entend ╵les paroles de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a accès ╵à la science du Très-Haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui perçoit la révélation ╵du Tout-Puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont les yeux se dessillent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'alors qu’il est tombé à terre :'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je le vois bien, ╵mais ce n’est pas pour maintenant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le contemple, ╵mais non de près ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un astre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans les textes orientaux et les hiéroglyphes, l’étoile désigne un roi, ce que confirme la mention du sceptre. Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ap 22.16
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' monte de Jacob,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un sceptre surgit d’Israël ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il brise les flancs de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il abat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le Pentateuque samaritain : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il frappe à la tête.
      marker-yv: yv-n
    - type: text
      text: ' tous les fils de Seth.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Edom sera conquis ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Séir, son ennemi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Edomites, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: descendants d’Esaü, habitaient la région montagneuse de Séir (voir Abd 19).
      marker-yv: yv-n
    - type: text
      text: ', ╵tombera en sa possession.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple d’Israël ╵accomplit des exploits.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Celui qui surgira ╵de Jacob régnera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il fera périr des villes ╵les derniers survivants.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Les prophéties sur d’autres peuples
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'regarda Israël campé par tribus. Alors l’Esprit de Dieu vint sur lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Balaam aperçut Amalec et il prononça son oracle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amalec était à la tête ╵de tous les peuples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amalécites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient des nomades de la partie sud de Canaan (voir Gn 14.7 ; Ex 17.8-16 ; Nb 13.29). Ils furent les premiers à attaquer Israël (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 17.8-13
        - type: text
          text: ). Saül et David exécuteront cette menace (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 15.32
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais sa postérité ╵en fin de compte ╵disparaîtra.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Puis il vit les Qéniens et prononça son oracle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta demeure est solide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton nid
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, il y a assonance entre les noms '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qénien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nid.
      marker-yv: yv-n
    - type: text
      text: ' est juché sur le roc,'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: mais finalement le Qénien ╵sera exterminé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand, en captivité, ╵Assour
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'C’est-à-dire l’Assyrie (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.11
        - type: text
          text: ) qui emmènera les Qéniens en exil.
      marker-yv: yv-n
    - type: text
      text: ' t’emmènera captif.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Enfin il prononça encore un oracle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hélas : Qui survivra'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon le texte hébreu traditionnel. En coupant différemment les mots de l’hébreu, on obtient : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un peuple se rassemblera du nord.
      marker-yv: yv-n
    - type: text
      text: ' ╵lorsque Dieu agira ?'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Des bateaux viennent de Kittim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kittim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne l’île de Chypre, puis, par extension, les côtes d’Asie Mineure et toutes les côtes méditerranéennes (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.4
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils soumettront Assour, ╵ils soumettront Héber
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Héber était l’ancêtre des Hébreux (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 Ch 1.25-27
        - type: text
          text: ') et d’autres peuplades désignées sans doute ici (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 10.25
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et même ce dernier ╵court à sa ruine.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Puis Balaam se mit en route et s’en retourna chez lui. Balaq, lui aussi, s’en alla de son côté.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et il prononça son oracle :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce que déclare ╵Balaam, le fils de Béor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voici ce que proclame l’homme ╵au regard pénétrant,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: oui, celui qui entend ╵les paroles de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui perçoit la révélation ╵du Tout-Puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dont les yeux se dessillent ╵alors qu’il est tombé à terre :'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Que tes tentes sont belles, ╵ô peuple de Jacob !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes demeures, ╵ô Israël !
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Comme des torrents, elles se répandent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c’est comme des jardins ╵alignés près d’un fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des aloès ╵plantés par l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou bien comme des cèdres ╵croissant au bord des eaux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: De ses réservoirs l’eau déborde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la semence est plantée ╵dans des champs irrigués.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son roi est grand, ╵plus que le roi Agag
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: 1 S 15
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '  ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son royaume ╵gagnera en puissance.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Quand Dieu le fit sortir d’Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec une puissance ╵semblable à la force du buffle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il dévora les peuples ╵qui lui étaient hostiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il leur brisa les os
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les cribla de flèches.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le voici couché comme un lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au repos comme un lion. ╵Qui le fera lever ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est béni
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Gn 12.3
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ╵celui qui te bénit,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est maudit ╵celui qui te maudit !
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La prophétie sur l’avenir d’Israël
    marker-yv: yv-h
