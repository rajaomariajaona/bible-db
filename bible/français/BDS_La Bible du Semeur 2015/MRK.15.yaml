document_id: MRK.15,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant Pilate
  - type: heading
    content: (Mt 27.1-2, 11-26 ; Lc 23.1-5, 13-25 ; Jn 18.28-40 ; 19.4-16)
  - type: text
    content: Dès l’aube, les chefs des prêtres tinrent conseil avec les responsables du peuple, les spécialistes de la Loi, et tout le Grand-Conseil
  - type: note
    content: Le gouverneur romain devait ratifier les condamnations à mort prononcées par le Grand-Conseil juif.
  - type: text
    content: . Ils firent enchaîner Jésus, l’emmenèrent et le remirent entre les mains de Pilate.
  '10':
  - type: text
    content: 'Il s’était rendu compte, en effet, que les chefs des prêtres lui avaient livré Jésus par jalousie. '
  '11':
  - type: text
    content: Mais les chefs des prêtres persuadèrent la foule de demander qu’il libère plutôt Barabbas.
  '12':
  - type: text
    content: – Mais alors, insista Pilate, que voulez-vous donc que je fasse de celui que vous appelez le roi des Juifs ?
  '13':
  - type: text
    content: 'De nouveau, ils crièrent : Crucifie-le !'
  '14':
  - type: text
    content: – Qu’a-t-il fait de mal ?
  - type: text
    content: 'Eux, cependant, crièrent de plus en plus fort : Crucifie-le !'
  '15':
  - type: text
    content: Alors Pilate, voulant donner satisfaction à la foule, leur relâcha Barabbas et, après avoir fait battre Jésus à coups de fouet, il le livra pour qu’on le crucifie.
  - type: heading
    content: Jésus condamné à mort et crucifié
  - type: heading
    content: (Mt 27.27-31 ; Jn 19.2-3)
  '16':
  - type: text
    content: 'Les soldats emmenèrent Jésus dans la cour intérieure du palais et firent venir toute la cohorte. '
  '17':
  - type: text
    content: Alors ils le revêtirent d’un manteau de couleur pourpre
  - type: note
    content: Ces manteaux, teints avec la pourpre, une substance colorante extraite d’un coquillage, étaient très chers.
  - type: text
    content: ' et lui posèrent une couronne tressée de rameaux épineux. '
  '18':
  - type: text
    content: 'Puis ils le saluèrent en disant : Salut, roi des Juifs !'
  '19':
  - type: text
    content: Ils le frappaient à la tête avec un roseau et crachaient sur lui, s’agenouillaient et se prosternaient devant lui.
  '2':
  - type: text
    content: 'Pilate l’interrogea : Es-tu le roi des Juifs ?'
  - type: text
    content: – Tu le dis toi-même,
  - type: text
    content: ' lui répondit Jésus.'
  '20':
  - type: text
    content: Quand ils eurent fini de se moquer de lui, ils lui arrachèrent le manteau de couleur pourpre, lui remirent ses vêtements et l’emmenèrent hors de la ville pour le crucifier.
  - type: heading
    content: (Mt 27.32-44 ; Lc 23.26-43 ; Jn 19.16-24)
  '21':
  - type: text
    content: 'Ils obligèrent un passant qui revenait des champs, Simon de Cyrène, le père d’Alexandre et de Rufus, à porter la croix de Jésus. '
  '22':
  - type: text
    content: 'Et ils amenèrent Jésus au lieu appelé Golgotha (ce qui signifie « le lieu du crâne »). '
  '23':
  - type: text
    content: Ils lui donnèrent du vin additionné de myrrhe
  - type: note
    content: Breuvage anesthésiant (voir note Mt 27.34).
  - type: text
    content: ', mais il n’en prit pas. '
  '24':
  - type: text
    content: Ils le clouèrent sur la croix. Puis ils se partagèrent ses vêtements, en tirant au sort ce qui reviendrait à chacun.
  '25':
  - type: text
    content: Il était environ neuf heures du matin quand ils le crucifièrent.
  '26':
  - type: text
    content: 'L’écriteau sur lequel était inscrit le motif de sa condamnation portait ces mots : « Le roi des Juifs ».'
  '27':
  - type: text
    content: Avec Jésus, ils crucifièrent deux brigands, l’un à sa droite, l’autre à sa gauche
  - type: note
    content: 'Certains manuscrits ajoutent : 28 C’est ainsi que s’accomplit ce que disait l’Ecriture : « Il a été mis au nombre des criminels. » Voir Lc 22.37.'
  - type: text
    content: .
  '29':
  - type: text
    content: 'Ceux qui passaient par là lui lançaient des insultes en secouant la tête, et criaient : Hé ! toi qui démolis le Temple et qui le reconstruis en trois jours, '
  '3':
  - type: text
    content: Les chefs des prêtres portèrent contre lui de nombreuses accusations.
  '30':
  - type: text
    content: 'sauve-toi toi-même : descends de la croix !'
  '31':
  - type: text
    content: 'De même aussi, les chefs des prêtres se moquaient de lui avec les spécialistes de la Loi ; ils se disaient entre eux : Dire qu’il a sauvé les autres, et qu’il est incapable de se sauver lui-même ! '
  '32':
  - type: text
    content: Lui ! Le Messie ! Le roi d’Israël ! Qu’il descende donc de la croix ; alors nous verrons, et nous croirons !
  - type: text
    content: Ceux qui étaient crucifiés avec lui l’insultaient aussi.
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: (Mt 27.45-56 ; Lc 23.44-49 ; Jn 19.25-30)
  '33':
  - type: text
    content: A midi, le pays tout entier fut plongé dans l’obscurité, et cela dura jusqu’à trois heures de l’après-midi.
  '34':
  - type: text
    content: 'Vers trois heures, Jésus cria d’une voix forte : '
  - type: text
    content: Eloï, Eloï, lama sabachthani ?
  - type: text
    content: ' ce qui signifie : '
  - type: text
    content: Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné
  - type: note
    content: Ps 22.1.
  - type: text
    content: '?'
  '35':
  - type: text
    content: 'En entendant ces paroles, quelques-uns de ceux qui étaient là disaient : Voilà qu’il appelle Elie !'
  '36':
  - type: text
    content: 'Un homme courut imbiber une éponge de vinaigre, la piqua au bout d’un roseau et la présenta à Jésus pour qu’il boive, en disant : Laissez-moi faire ! On va bien voir si Elie vient le tirer de là.'
  '37':
  - type: text
    content: Mais Jésus poussa un grand cri et expira.
  '38':
  - type: text
    content: Alors, le rideau du Temple se déchira en deux, de haut en bas.
  '39':
  - type: text
    content: Voyant de quelle manière il était mort
  - type: note
    content: 'Certains manuscrits ajoutent : en criant ainsi.'
  - type: text
    content: ', l’officier romain, qui se tenait en face de Jésus, dit : Cet homme était vraiment le Fils de Dieu !'
  '4':
  - type: text
    content: 'Pilate l’interrogea de nouveau et lui dit : Eh bien ! Tu ne réponds rien ? Tu as entendu toutes les accusations qu’ils portent contre toi ?'
  '40':
  - type: text
    content: 'Il y avait aussi là quelques femmes qui regardaient de loin. Parmi elles, Marie de Magdala, Marie la mère de Jacques le Jeune et de Joses, ainsi que Salomé. '
  '41':
  - type: text
    content: Quand il était en Galilée, c’étaient elles qui l’avaient suivi en étant à son service. Il y avait aussi beaucoup d’autres femmes qui étaient montées avec lui à Jérusalem.
  - type: heading
    content: Jésus mis au tombeau
  - type: heading
    content: (Mt 27.57-61 ; Lc 23.50-56 ; Jn 19.38-42)
  '42':
  - type: text
    content: 'Le soir venu – c’était le jour de la préparation, c’est-à-dire la veille du sabbat – '
  '43':
  - type: text
    content: 'Joseph d’Arimathée arriva. C’était un membre éminent du Grand-Conseil qui, lui aussi, vivait dans l’attente du royaume de Dieu. Il eut le courage de se rendre chez Pilate pour lui demander le corps de Jésus. '
  '44':
  - type: text
    content: 'Pilate fut surpris d’apprendre que Jésus était déjà mort. Il fit appeler l’officier de service et lui demanda s’il était mort depuis longtemps. '
  '45':
  - type: text
    content: 'Renseigné par le centurion, il autorisa Joseph à disposer du corps. '
  '46':
  - type: text
    content: Celui-ci, après avoir acheté un drap de lin, descendit le corps de la croix, l’enveloppa dans le drap et le déposa dans un tombeau taillé dans le roc. Puis il roula un bloc de pierre devant l’entrée du tombeau.
  '47':
  - type: text
    content: Marie de Magdala et Marie, mère de Joses, regardaient où il le mettait.
  '5':
  - type: text
    content: 'Mais, au grand étonnement de Pilate, Jésus ne répondit plus rien. '
  '6':
  - type: text
    content: 'A chaque fête de la Pâque, Pilate relâchait un prisonnier, celui que le peuple réclamait. '
  '7':
  - type: text
    content: 'Or, à ce moment-là, il y avait sous les verrous le nommé Barabbas avec les agitateurs qui avaient commis un meurtre au cours d’une émeute. '
  '8':
  - type: text
    content: La foule monta donc au prétoire et se mit à réclamer la faveur que le gouverneur lui accordait d’habitude.
  '9':
  - type: text
    content: 'Pilate répondit : Voulez-vous que je vous relâche le roi des Juifs ?'
