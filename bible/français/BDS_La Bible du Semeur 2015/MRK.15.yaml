document_id: MRK.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant Pilate
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.1-2, 11-26 ; Lc 23.1-5, 13-25 ; Jn 18.28-40 ; 19.4-16)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dès l’aube, les chefs des prêtres tinrent conseil avec les responsables du peuple, les spécialistes de la Loi, et tout le Grand-Conseil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le gouverneur romain devait ratifier les condamnations à mort prononcées par le Grand-Conseil juif.
    marker-yv: yv-n
  - type: text
    text: . Ils firent enchaîner Jésus, l’emmenèrent et le remirent entre les mains de Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pilate l’interrogea : Es-tu le roi des Juifs ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: – Tu le dis toi-même,
  - type: text
    text: ' lui répondit Jésus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les chefs des prêtres portèrent contre lui de nombreuses accusations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate l’interrogea de nouveau et lui dit : Eh bien ! Tu ne réponds rien ? Tu as entendu toutes les accusations qu’ils portent contre toi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais, au grand étonnement de Pilate, Jésus ne répondit plus rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A chaque fête de la Pâque, Pilate relâchait un prisonnier, celui que le peuple réclamait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or, à ce moment-là, il y avait sous les verrous le nommé Barabbas avec les agitateurs qui avaient commis un meurtre au cours d’une émeute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La foule monta donc au prétoire et se mit à réclamer la faveur que le gouverneur lui accordait d’habitude.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pilate répondit : Voulez-vous que je vous relâche le roi des Juifs ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il s’était rendu compte, en effet, que les chefs des prêtres lui avaient livré Jésus par jalousie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais les chefs des prêtres persuadèrent la foule de demander qu’il libère plutôt Barabbas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: – Mais alors, insista Pilate, que voulez-vous donc que je fasse de celui que vous appelez le roi des Juifs ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De nouveau, ils crièrent : Crucifie-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: – Qu’a-t-il fait de mal ?
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Eux, cependant, crièrent de plus en plus fort : Crucifie-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Alors Pilate, voulant donner satisfaction à la foule, leur relâcha Barabbas et, après avoir fait battre Jésus à coups de fouet, il le livra pour qu’on le crucifie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus condamné à mort et crucifié
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.27-31 ; Jn 19.2-3)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les soldats emmenèrent Jésus dans la cour intérieure du palais et firent venir toute la cohorte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alors ils le revêtirent d’un manteau de couleur pourpre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ces manteaux, teints avec la pourpre, une substance colorante extraite d’un coquillage, étaient très chers.
    marker-yv: yv-n
  - type: text
    text: ' et lui posèrent une couronne tressée de rameaux épineux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis ils le saluèrent en disant : Salut, roi des Juifs !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils le frappaient à la tête avec un roseau et crachaient sur lui, s’agenouillaient et se prosternaient devant lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quand ils eurent fini de se moquer de lui, ils lui arrachèrent le manteau de couleur pourpre, lui remirent ses vêtements et l’emmenèrent hors de la ville pour le crucifier.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.32-44 ; Lc 23.26-43 ; Jn 19.16-24)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils obligèrent un passant qui revenait des champs, Simon de Cyrène, le père d’Alexandre et de Rufus, à porter la croix de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et ils amenèrent Jésus au lieu appelé Golgotha (ce qui signifie « le lieu du crâne »). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils lui donnèrent du vin additionné de myrrhe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Breuvage anesthésiant (voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27.34
        metadata:
          usfm: MAT.27.34
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', mais il n’en prit pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils le clouèrent sur la croix. Puis ils se partagèrent ses vêtements, en tirant au sort ce qui reviendrait à chacun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il était environ neuf heures du matin quand ils le crucifièrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L’écriteau sur lequel était inscrit le motif de sa condamnation portait ces mots : « Le roi des Juifs ».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Avec Jésus, ils crucifièrent deux brigands, l’un à sa droite, l’autre à sa gauche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ajoutent : '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '28 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'C’est ainsi que s’accomplit ce que disait l’Ecriture : « Il a été mis au nombre des criminels. » '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lc 22.37
        metadata:
          usfm: LUK.22.37
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ceux qui passaient par là lui lançaient des insultes en secouant la tête, et criaient : Hé ! toi qui démolis le Temple et qui le reconstruis en trois jours, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'sauve-toi toi-même : descends de la croix !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'De même aussi, les chefs des prêtres se moquaient de lui avec les spécialistes de la Loi ; ils se disaient entre eux : Dire qu’il a sauvé les autres, et qu’il est incapable de se sauver lui-même ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Lui ! Le Messie ! Le roi d’Israël ! Qu’il descende donc de la croix ; alors nous verrons, et nous croirons !
- type: usfm
  marker: p
  children:
  - type: text
    text: Ceux qui étaient crucifiés avec lui l’insultaient aussi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.45-56 ; Lc 23.44-49 ; Jn 19.25-30)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: A midi, le pays tout entier fut plongé dans l’obscurité, et cela dura jusqu’à trois heures de l’après-midi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vers trois heures, Jésus cria d’une voix forte : '
  - type: usfm
    marker: tl
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Eloï, Eloï, lama sabachthani ?
  - type: text
    text: ' ce qui signifie : '
  - type: usfm
    marker: qt
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.34 '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22.1
        metadata:
          usfm: PSA.22.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'En entendant ces paroles, quelques-uns de ceux qui étaient là disaient : Voilà qu’il appelle Elie !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Un homme courut imbiber une éponge de vinaigre, la piqua au bout d’un roseau et la présenta à Jésus pour qu’il boive, en disant : Laissez-moi faire ! On va bien voir si Elie vient le tirer de là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mais Jésus poussa un grand cri et expira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Alors, le rideau du Temple se déchira en deux, de haut en bas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Voyant de quelle manière il était mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ajoutent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en criant ainsi.
    marker-yv: yv-n
  - type: text
    text: ', l’officier romain, qui se tenait en face de Jésus, dit : Cet homme était vraiment le Fils de Dieu !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il y avait aussi là quelques femmes qui regardaient de loin. Parmi elles, Marie de Magdala, Marie la mère de Jacques le Jeune et de Joses, ainsi que Salomé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Quand il était en Galilée, c’étaient elles qui l’avaient suivi en étant à son service. Il y avait aussi beaucoup d’autres femmes qui étaient montées avec lui à Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus mis au tombeau
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 27.57-61 ; Lc 23.50-56 ; Jn 19.38-42)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le soir venu – c’était le jour de la préparation, c’est-à-dire la veille du sabbat – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Joseph d’Arimathée arriva. C’était un membre éminent du Grand-Conseil qui, lui aussi, vivait dans l’attente du royaume de Dieu. Il eut le courage de se rendre chez Pilate pour lui demander le corps de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Pilate fut surpris d’apprendre que Jésus était déjà mort. Il fit appeler l’officier de service et lui demanda s’il était mort depuis longtemps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Renseigné par le centurion, il autorisa Joseph à disposer du corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Celui-ci, après avoir acheté un drap de lin, descendit le corps de la croix, l’enveloppa dans le drap et le déposa dans un tombeau taillé dans le roc. Puis il roula un bloc de pierre devant l’entrée du tombeau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Marie de Magdala et Marie, mère de Joses, regardaient où il le mettait.
