document_id: PRO.16,21
type_code: fra
verses:
  '1':
  - type: text
    content: L’homme fait des projets,
  - type: text
    content: mais celui qui a le dernier mot, c’est l’Eternel.
  '10':
  - type: text
    content: 'Quand le roi se prononce, ses paroles ont valeur de déclaration divine :'
  - type: text
    content: que sa bouche n’aille donc pas à l’encontre du droit.
  '11':
  - type: text
    content: L’Eternel veut des balances et des plateaux justes,
  - type: text
    content: et les poids, il en fait son affaire
  - type: note
    content: Voir 11.1 et note.
  - type: text
    content: .
  '12':
  - type: text
    content: Faire le mal est une chose abominable pour un roi,
  - type: text
    content: car le pouvoir ne devient fort que s’il est juste.
  '13':
  - type: text
    content: Ceux dont les paroles sont justes obtiennent la faveur du roi,
  - type: text
    content: et il aime ceux qui parlent avec droiture.
  '14':
  - type: text
    content: Quand un roi se met en colère, sa fureur est comme une messagère de mort,
  - type: text
    content: mais l’homme sage saura l’apaiser.
  '15':
  - type: text
    content: Quand le visage du roi s’éclaire, c’est un gage de vie,
  - type: text
    content: et sa faveur est comme un nuage annonçant l’ondée printanière
  - type: note
    content: Les pluies de printemps marquent le retour de la végétation, elles sont signes de prospérité et de joie (Dt 11.14).
  - type: text
    content: .
  '16':
  - type: text
    content: Acquérir la sagesse vaut bien mieux que l’or pur,
  - type: text
    content: et gagner en discernement est bien préférable à l’argent
  - type: note
    content: Voir 2.4.
  - type: text
    content: .
  '17':
  - type: text
    content: Les hommes droits cheminent sur des routes qui évitent le mal,
  - type: text
    content: qui surveille sa conduite préserve sa vie.
  '18':
  - type: text
    content: L’orgueil précède la ruine ;
  - type: text
    content: un esprit fier annonce la chute.
  '19':
  - type: text
    content: Mieux vaut avoir un esprit humble et frayer avec les gens de condition modeste
  - type: text
    content: que de partager le butin avec les orgueilleux.
  '2':
  - type: text
    content: Vous pouvez penser que tout ce que vous faites est bien,
  - type: text
    content: mais c’est l’Eternel qui apprécie vos motivations.
  '20':
  - type: text
    content: Qui agit prudemment dans une affaire s’en trouvera bien
  - type: note
    content: 'Autres traductions : qui agit intelligemment dans une affaire s’en trouvera bien, ou : qui a l’intelligence de ce qu’on dit trouvera le bonheur, ou : qui parle avec intelligence obtiendra le bonheur.'
  - type: text
    content: .
  - type: text
    content: Heureux celui qui met sa confiance en l’Eternel !
  '21':
  - type: text
    content: Qui a le cœur sage sera reconnu comme intelligent,
  - type: text
    content: et les paroles aimables sont d’autant plus persuasives.
  '22':
  - type: text
    content: Le discernement est une source de vie pour celui qui en est pourvu ;
  - type: text
    content: les sots trouvent leur châtiment dans leur sottise même.
  '23':
  - type: text
    content: Si le cœur d’un homme est pénétré de sagesse,
  - type: text
    content: il parlera de façon avisée, et ses paroles seront d’autant plus persuasives.
  '24':
  - type: text
    content: 'D’aimables paroles sont comme un rayon de miel :'
  - type: text
    content: douces pour l’âme et bienfaisantes pour le corps.
  '25':
  - type: text
    content: Bien des hommes pensent être sur le bon chemin,
  - type: text
    content: et pourtant, ils se trouvent sur une voie qui, finalement, mène à la mort.
  '26':
  - type: text
    content: 'La faim du travailleur est une bonne collaboratrice :'
  - type: text
    content: sa bouche le pousse à travailler.
  '27':
  - type: text
    content: Le vaurien projette le malheur,
  - type: text
    content: et ses paroles sont comme un feu dévorant.
  '28':
  - type: text
    content: Le fourbe sème la discorde,
  - type: text
    content: et qui colporte des rumeurs jette la brouille entre des amis.
  '29':
  - type: text
    content: L’homme violent circonvient son prochain
  - type: text
    content: et l’entraîne sur une mauvaise voie.
  '3':
  - type: text
    content: Recommande tes œuvres à l’Eternel,
  - type: text
    content: et tes projets se réaliseront.
  '30':
  - type: text
    content: Qui ferme les yeux pour méditer des desseins pervers
  - type: text
    content: et qui serre les lèvres a déjà commis le mal.
  '31':
  - type: text
    content: 'Les cheveux blancs sont une couronne honorifique :'
  - type: text
    content: elle s’obtient par une vie droite.
  '32':
  - type: text
    content: Mieux vaut un homme lent à la colère qu’un bon guerrier,
  - type: text
    content: mieux vaut savoir se dominer que de conquérir des villes.
  '33':
  - type: text
    content: On jette le sort dans les pans du vêtement du prêtre
  - type: note
    content: Il s’agit de l’ourim et du toummim dont on se servait pour connaître la volonté de Dieu (voir Ex 28.30 et note).
  - type: text
    content: ','
  - type: text
    content: mais c’est de l’Eternel que dépend toute décision.
  '4':
  - type: text
    content: L’Eternel a tout fait pour un but,
  - type: text
    content: même le méchant pour le jour du malheur.
  '5':
  - type: text
    content: Tout homme orgueilleux est en horreur à l’Eternel ;
  - type: text
    content: 'soyez-en certain : il ne restera pas impuni.'
  '6':
  - type: text
    content: La faute est expiée par la bonté et la fidélité
  - type: text
    content: et, par crainte de l’Eternel, on se détourne du mal.
  '7':
  - type: text
    content: Quand la conduite d’un homme est agréable à l’Eternel,
  - type: text
    content: il lui concilie même ses ennemis.
  '8':
  - type: text
    content: Mieux vaut le peu honnêtement obtenu
  - type: text
    content: que de gros revenus mal acquis.
  '9':
  - type: text
    content: L’homme projette de suivre tel chemin,
  - type: text
    content: et Dieu dirige ses pas.
