document_id: PRO.16,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme fait des projets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui a le dernier mot, c’est l’Eternel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand le roi se prononce, ses paroles ont valeur de déclaration divine :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que sa bouche n’aille donc pas à l’encontre du droit.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel veut des balances et des plateaux justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les poids, il en fait son affaire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '11.1'
        - type: text
          text: ' et note.'
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faire le mal est une chose abominable pour un roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le pouvoir ne devient fort que s’il est juste.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux dont les paroles sont justes obtiennent la faveur du roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il aime ceux qui parlent avec droiture.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand un roi se met en colère, sa fureur est comme une messagère de mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l’homme sage saura l’apaiser.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le visage du roi s’éclaire, c’est un gage de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa faveur est comme un nuage annonçant l’ondée printanière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les pluies de printemps marquent le retour de la végétation, elles sont signes de prospérité et de joie (
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Dt 11.14
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Acquérir la sagesse vaut bien mieux que l’or pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et gagner en discernement est bien préférable à l’argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: '2.4'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes droits cheminent sur des routes qui évitent le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui surveille sa conduite préserve sa vie.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’orgueil précède la ruine ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un esprit fier annonce la chute.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut avoir un esprit humble et frayer avec les gens de condition modeste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que de partager le butin avec les orgueilleux.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous pouvez penser que tout ce que vous faites est bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c’est l’Eternel qui apprécie vos motivations.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui agit prudemment dans une affaire s’en trouvera bien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autres traductions : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui agit intelligemment dans une affaire s’en trouvera bien, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui a l’intelligence de ce qu’on dit trouvera le bonheur, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui parle avec intelligence obtiendra le bonheur.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux celui qui met sa confiance en l’Eternel !
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a le cœur sage sera reconnu comme intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les paroles aimables sont d’autant plus persuasives.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le discernement est une source de vie pour celui qui en est pourvu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sots trouvent leur châtiment dans leur sottise même.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si le cœur d’un homme est pénétré de sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il parlera de façon avisée, et ses paroles seront d’autant plus persuasives.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'D’aimables paroles sont comme un rayon de miel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: douces pour l’âme et bienfaisantes pour le corps.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien des hommes pensent être sur le bon chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pourtant, ils se trouvent sur une voie qui, finalement, mène à la mort.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La faim du travailleur est une bonne collaboratrice :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa bouche le pousse à travailler.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vaurien projette le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses paroles sont comme un feu dévorant.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fourbe sème la discorde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui colporte des rumeurs jette la brouille entre des amis.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme violent circonvient son prochain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l’entraîne sur une mauvaise voie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Recommande tes œuvres à l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes projets se réaliseront.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ferme les yeux pour méditer des desseins pervers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui serre les lèvres a déjà commis le mal.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les cheveux blancs sont une couronne honorifique :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle s’obtient par une vie droite.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut un homme lent à la colère qu’un bon guerrier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mieux vaut savoir se dominer que de conquérir des villes.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On jette le sort dans les pans du vêtement du prêtre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s’agit de l’ourim et du toummim dont on se servait pour connaître la volonté de Dieu (voir '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ex 28.30
        - type: text
          text: ' et note).'
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c’est de l’Eternel que dépend toute décision.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Eternel a tout fait pour un but,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même le méchant pour le jour du malheur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout homme orgueilleux est en horreur à l’Eternel ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'soyez-en certain : il ne restera pas impuni.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La faute est expiée par la bonté et la fidélité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, par crainte de l’Eternel, on se détourne du mal.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand la conduite d’un homme est agréable à l’Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lui concilie même ses ennemis.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut le peu honnêtement obtenu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que de gros revenus mal acquis.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme projette de suivre tel chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Dieu dirige ses pas.
