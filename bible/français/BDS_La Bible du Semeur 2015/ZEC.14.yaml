document_id: ZEC.14,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Le combat final
  - type: text
    content: Voici venir le jour de l’Eternel
  - type: note
    content: Voir Es 13.6-9 ; Ez 20.2-3 ; Am 5.18 ; Ab 15 ; Jl 1.15 ; 2.1-2, 10-11 ; 3.3-4 ; 4.14-16 ; So 1.7.
  - type: text
    content: ', où l’on partagera dans tes murs mêmes le butin pris chez toi. '
  '10':
  - type: text
    content: Le pays tout entier depuis Guéba jusqu’à Rimmôn, qui se trouve au sud
  - type: note
    content: Tout le pays depuis la frontière nord (2 R 23.8) jusqu’à celle du sud (Jos 15.32) sera nivelé et abaissé pour que Jérusalem puisse apparaître exaltée. Voir Es 2.2 ; Mi 4.1 ; Ap 21.9.
  - type: text
    content: ' de Jérusalem, sera changé en plaine. Jérusalem sera surélevée sur place, de la porte de Benjamin jusqu’à l’emplacement de la Première Porte, jusqu’à celle de l’Angle, de la tour de Hananéel jusqu’aux pressoirs du roi. '
  '11':
  - type: text
    content: On y habitera, il n’y aura plus d’anathème
  - type: note
    content: Voir Ap 22.3.
  - type: text
    content: ', Jérusalem vivra dans la sécurité.'
  '12':
  - type: text
    content: 'Et voici de quel fléau l’Eternel frappera tous les peuples qui auront combattu contre Jérusalem : la chair de tous les hommes se décomposera tandis qu’ils seront sur pieds, et leurs yeux pourriront dans leurs orbites, et, dans leur bouche, leur langue pourrira. '
  '13':
  - type: text
    content: 'En ce jour-là, une immense panique causée par l’Eternel s’emparera d’eux tous. Ils s’empoigneront les uns les autres par le bras et chacun lèvera la main contre son compagnon. '
  '14':
  - type: text
    content: 'Les hommes de Juda se joindront au combat au milieu de Jérusalem, et l’on amassera les richesses de tous les peuples de partout : de l’or et de l’argent avec des vêtements en quantité énorme. '
  '15':
  - type: text
    content: Un fléau identique frappera les chevaux, les mulets, les chameaux et les ânes, et tout animal parqué dans leur camp. Oui, tous les animaux seront frappés du même fléau.
  '16':
  - type: text
    content: Et il arrivera que tous ceux qui subsisteront de tous les peuples qui seront venus attaquer Jérusalem, monteront tous les ans pour se prosterner devant le Roi, le Seigneur des armées célestes, et pour célébrer la fête des Cabanes
  - type: note
    content: Voir Lv 23.24 ; Dt 16.13  ; en même temps que la fête des Récoltes (Ex 23.16).
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Si l’un des clans familiaux de la terre refuse de monter jusqu’à Jérusalem pour adorer le Roi, le Seigneur des armées célestes, il ne recevra pas de pluie. '
  '18':
  - type: text
    content: 'Et si les Egyptiens ne montent pas, oui, s’ils refusent de venir, ils subiront aussi la plaie dont l’Eternel frappera tous les peuples qui ne monteront pas pour célébrer la fête des Cabanes. '
  '19':
  - type: text
    content: Ce sera la sanction du péché de l’Egypte et celle de toute nation qui ne montera pas pour célébrer la fête des Cabanes.
  '2':
  - type: text
    content: J’assemblerai alors l’ensemble des peuples étrangers devant Jérusalem pour la combattre. La ville sera prise, les maisons saccagées et les femmes violées, la moitié de la ville partira en exil, mais le reste du peuple ne sera pas éliminé de la ville.
  '20':
  - type: text
    content: 'En ce jour-là, les grelots des chevaux porteront l’inscription : « Consacré à l’Eternel'
  - type: note
    content: Voir Ex 28.36-38.
  - type: text
    content: '  ». Et même les marmites dans le temple de l’Eternel seront tout aussi saintes que les coupes placées devant l’autel.'
  '21':
  - type: text
    content: Et dans Jérusalem, et partout en Juda, les marmites seront toutes consacrées à l’Eternel, le Seigneur des armées célestes, et tous ceux qui viendront offrir des sacrifices les utiliseront pour y cuire la viande, et il n’y aura plus de marchands dans le temple du Seigneur des armées célestes, en ce jour-là.
  '3':
  - type: text
    content: 'Puis l’Eternel viendra combattre ces peuples comme il le fait quand il combat au jour de la bataille. '
  '4':
  - type: text
    content: En ce jour-là, il posera ses pieds sur le mont des Oliviers
  - type: note
    content: Voir Ac 1.11-12.
  - type: text
    content: ', près de Jérusalem, du côté du levant. Le mont des Oliviers se fendra d’est en ouest en deux parties ; une immense vallée se creusera entre les deux. Une moitié du mont reculera au nord, l’autre moitié au sud. '
  '5':
  - type: text
    content: Et la vallée de mes montagnes sera comblée
  - type: note
    content: 'D’après l’ancienne version grecque et le targoum, en adoptant une autre vocalisation que le texte hébreu traditionnel qui a : et vous fuirez alors par la vallée de mes montagnes.'
  - type: text
    content: ', car elle s’étendra jusqu’à Atsal'
  - type: note
    content: 'Atsal: site inconnu d’une localité à l’est de Jérusalem.'
  - type: text
    content: . Elle sera comblée, ce jour-là, comme elle a été comblée lors du
  - type: note
    content: 'Elle sera comblée… comme elle a été comblée lors du: en adoptant une autre vocalisation du texte hébreu traditionnel qui a : vous fuirez… comme vous avez fui.'
  - type: text
    content: ' tremblement de terre au temps d’Ozias, roi de Juda. Puis l’Eternel mon Dieu viendra, avec tous les saints anges.'
  '6':
  - type: text
    content: En ce jour-là, il n’y aura plus de luminaire
  - type: note
    content: Voir Ap 21.23.
  - type: text
    content: ', plus de froid, plus de gel'
  - type: note
    content: 'plus de froid, plus de gel: selon la lecture proposée en marge par les copistes juifs. Le texte hébreu contient une expression traduite diversement : car les luminaires se condenseront ou que des choses précieuses en condensation.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Ce jour sera unique, il est connu de l’Eternel, il n’y aura ni jour ni nuit, et même le soir, la lumière brillera. '
  '8':
  - type: text
    content: En ce jour-là, des eaux vives jailliront de Jérusalem et couleront, moitié vers la mer Morte, et moitié vers la Méditerranée
  - type: note
    content: Voir Ez 47.1-12.
  - type: text
    content: . Il en sera ainsi l’été comme l’hiver.
  '9':
  - type: text
    content: 'En ce jour-là, l’Eternel sera roi de toute la terre. En ce jour-là, l’Eternel sera le seul Dieu et on le priera lui seul. '
