document_id: ZEC.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le combat final
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici venir le jour de l’Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Es 13.6-9 ; Ez 20.2-3 ; Am 5.18 ; Ab 15 ; Jl 1.15 ; 2.1-2, 10-11 ; 3.3-4 ; 4.14-16 ; So 1.7.
    marker-yv: yv-n
  - type: text
    text: ', où l’on partagera dans tes murs mêmes le butin pris chez toi. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J’assemblerai alors l’ensemble des peuples étrangers devant Jérusalem pour la combattre. La ville sera prise, les maisons saccagées et les femmes violées, la moitié de la ville partira en exil, mais le reste du peuple ne sera pas éliminé de la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis l’Eternel viendra combattre ces peuples comme il le fait quand il combat au jour de la bataille. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En ce jour-là, il posera ses pieds sur le mont des Oliviers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1.11-12
        metadata:
          usfm: ACT.1.11+ACT.1.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', près de Jérusalem, du côté du levant. Le mont des Oliviers se fendra d’est en ouest en deux parties ; une immense vallée se creusera entre les deux. Une moitié du mont reculera au nord, l’autre moitié au sud. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et la vallée de mes montagnes sera comblée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D’après l’ancienne version grecque et le targoum, en adoptant une autre vocalisation que le texte hébreu traditionnel qui a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et vous fuirez alors par la vallée de mes montagnes.
    marker-yv: yv-n
  - type: text
    text: ', car elle s’étendra jusqu’à Atsal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Atsal
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: site inconnu d’une localité à l’est de Jérusalem.
    marker-yv: yv-n
  - type: text
    text: . Elle sera comblée, ce jour-là, comme elle a été comblée lors du
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elle sera comblée… comme elle a été comblée lors du
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en adoptant une autre vocalisation du texte hébreu traditionnel qui a : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous fuirez… comme vous avez fui.
    marker-yv: yv-n
  - type: text
    text: ' tremblement de terre au temps d’Ozias, roi de Juda. Puis l’Eternel mon Dieu viendra, avec tous les saints anges.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En ce jour-là, il n’y aura plus de luminaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21.23
        metadata:
          usfm: REV.21.23
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', plus de froid, plus de gel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plus de froid, plus de gel
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ': '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'selon la lecture proposée en marge par les copistes juifs. Le texte hébreu contient une expression traduite diversement : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'car les luminaires se condenseront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que des choses précieuses en condensation.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ce jour sera unique, il est connu de l’Eternel, il n’y aura ni jour ni nuit, et même le soir, la lumière brillera. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En ce jour-là, des eaux vives jailliront de Jérusalem et couleront, moitié vers la mer Morte, et moitié vers la Méditerranée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ez 47.1-12
        metadata:
          usfm: EZK.47.1+EZK.47.2+EZK.47.3+EZK.47.4+EZK.47.5+EZK.47.6+EZK.47.7+EZK.47.8+EZK.47.9+EZK.47.10+EZK.47.11+EZK.47.12
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Il en sera ainsi l’été comme l’hiver.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En ce jour-là, l’Eternel sera roi de toute la terre. En ce jour-là, l’Eternel sera le seul Dieu et on le priera lui seul. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le pays tout entier depuis Guéba jusqu’à Rimmôn, qui se trouve au sud
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tout le pays depuis la frontière nord (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23.8
        metadata:
          usfm: 2KI.23.8
      - type: text
        text: ) jusqu’à celle du sud (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15.32
        metadata:
          usfm: JOS.15.32
      - type: text
        text: ) sera nivelé et abaissé pour que Jérusalem puisse apparaître exaltée. Voir Es 2.2 ; Mi 4.1 ; Ap 21.9.
    marker-yv: yv-n
  - type: text
    text: ' de Jérusalem, sera changé en plaine. Jérusalem sera surélevée sur place, de la porte de Benjamin jusqu’à l’emplacement de la Première Porte, jusqu’à celle de l’Angle, de la tour de Hananéel jusqu’aux pressoirs du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On y habitera, il n’y aura plus d’anathème
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 22.3
        metadata:
          usfm: REV.22.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', Jérusalem vivra dans la sécurité.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et voici de quel fléau l’Eternel frappera tous les peuples qui auront combattu contre Jérusalem : la chair de tous les hommes se décomposera tandis qu’ils seront sur pieds, et leurs yeux pourriront dans leurs orbites, et, dans leur bouche, leur langue pourrira. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En ce jour-là, une immense panique causée par l’Eternel s’emparera d’eux tous. Ils s’empoigneront les uns les autres par le bras et chacun lèvera la main contre son compagnon. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les hommes de Juda se joindront au combat au milieu de Jérusalem, et l’on amassera les richesses de tous les peuples de partout : de l’or et de l’argent avec des vêtements en quantité énorme. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Un fléau identique frappera les chevaux, les mulets, les chameaux et les ânes, et tout animal parqué dans leur camp. Oui, tous les animaux seront frappés du même fléau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et il arrivera que tous ceux qui subsisteront de tous les peuples qui seront venus attaquer Jérusalem, monteront tous les ans pour se prosterner devant le Roi, le Seigneur des armées célestes, et pour célébrer la fête des Cabanes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 23.24 ; Dt 16.13  ; en même temps que la fête des Récoltes (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23.16
        metadata:
          usfm: EXO.23.16
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si l’un des clans familiaux de la terre refuse de monter jusqu’à Jérusalem pour adorer le Roi, le Seigneur des armées célestes, il ne recevra pas de pluie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et si les Egyptiens ne montent pas, oui, s’ils refusent de venir, ils subiront aussi la plaie dont l’Eternel frappera tous les peuples qui ne monteront pas pour célébrer la fête des Cabanes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce sera la sanction du péché de l’Egypte et celle de toute nation qui ne montera pas pour célébrer la fête des Cabanes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En ce jour-là, les grelots des chevaux porteront l’inscription : « Consacré à l’Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28.36-38
        metadata:
          usfm: EXO.28.36+EXO.28.37+EXO.28.38
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '  ». Et même les marmites dans le temple de l’Eternel seront tout aussi saintes que les coupes placées devant l’autel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et dans Jérusalem, et partout en Juda, les marmites seront toutes consacrées à l’Eternel, le Seigneur des armées célestes, et tous ceux qui viendront offrir des sacrifices les utiliseront pour y cuire la viande, et il n’y aura plus de marchands dans le temple du Seigneur des armées célestes, en ce jour-là.
