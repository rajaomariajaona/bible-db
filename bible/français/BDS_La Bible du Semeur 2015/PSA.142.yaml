document_id: PSA.142,21
type_code: fra
verses:
  '1':
  - type: heading
    content: Tu es mon seul abri
  - type: text
    content: Méditation
  - type: note
    content: Signification incertaine.
  - type: text
    content: ' de David. Prière qu’il prononça quand il était dans la caverne'
  - type: note
    content: Voir 1 S 22.1-2 ; 24.1-9  ; cf. Ps 57.1.
  - type: text
    content: .
  '2':
  - type: text
    content: A pleine voix, ╵je crie vers l’Eternel.
  - type: text
    content: A pleine voix, ╵je supplie l’Eternel,
  '3':
  - type: text
    content: et, devant lui, ╵je me répands en plaintes.
  - type: text
    content: En sa présence, ╵j’expose ma détresse.
  '4':
  - type: text
    content: Quand mon esprit ╵est abattu,
  - type: text
    content: toi tu connais ╵par quel chemin je passe.
  - type: text
    content: Sur la route où je marche,
  - type: text
    content: ils m’ont tendu un piège.
  '5':
  - type: text
    content: Regarde à droite
  - type: note
    content: C’est-à-dire du côté où se tient le défenseur (16.8 ; 109.31 ; 110.5).
  - type: text
    content: ' et vois :'
  - type: text
    content: il n’y a plus personne ╵qui veuille me connaître !
  - type: text
    content: Je ne sais plus ╵où chercher un refuge
  - type: text
    content: et nul ne veut ╵s’inquiéter de ma vie.
  '6':
  - type: text
    content: O Eternel, ╵je fais appel à toi,
  - type: text
    content: 'et je m’écrie : ╵« Tu es mon seul abri !'
  - type: text
    content: Tu es mon bien ╵au pays des vivants ! »
  '7':
  - type: text
    content: Sois attentif ╵à mes supplications
  - type: text
    content: car j’ai touché ╵le fond de la misère.
  - type: text
    content: Délivre-moi ╵de mes persécuteurs !
  - type: text
    content: Ils sont bien plus puissants que moi.
  '8':
  - type: text
    content: Libère-moi ╵de ma prison
  - type: text
    content: pour que je puisse te louer !
  - type: text
    content: Autour de moi, ╵les justes feront cercle
  - type: text
    content: quand tu m’auras ╵comblé de tes bienfaits.
