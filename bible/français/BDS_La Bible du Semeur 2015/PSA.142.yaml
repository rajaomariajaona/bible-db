document_id: PSA.142,21
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tu es mon seul abri
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Méditation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '142.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Signification incertaine.
      marker-yv: yv-n
    - type: text
      text: ' de David. Prière qu’il prononça quand il était dans la caverne'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '142.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir 1 S 22.1-2 ; 24.1-9  ; cf. '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ps 57.1
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A pleine voix, ╵je crie vers l’Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A pleine voix, ╵je supplie l’Eternel,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et, devant lui, ╵je me répands en plaintes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En sa présence, ╵j’expose ma détresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Quand mon esprit ╵est abattu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi tu connais ╵par quel chemin je passe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la route où je marche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils m’ont tendu un piège.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Regarde à droite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '142.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C’est-à-dire du côté où se tient le défenseur (16.8 ; 109.31 ; 110.5).
      marker-yv: yv-n
    - type: text
      text: ' et vois :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n’y a plus personne ╵qui veuille me connaître !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne sais plus ╵où chercher un refuge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nul ne veut ╵s’inquiéter de ma vie.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: O Eternel, ╵je fais appel à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et je m’écrie : ╵« Tu es mon seul abri !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon bien ╵au pays des vivants ! »
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Sois attentif ╵à mes supplications
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j’ai touché ╵le fond de la misère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi ╵de mes persécuteurs !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont bien plus puissants que moi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Libère-moi ╵de ma prison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que je puisse te louer !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autour de moi, ╵les justes feront cercle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu m’auras ╵comblé de tes bienfaits.
