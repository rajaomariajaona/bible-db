document_id: LUK.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus, maître du sabbat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 12.1-8 ; Mc 2.23-28)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un jour de sabbat
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits ont : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un second sabbat du premier mois, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sabbat qui est proche de la moisson.
    marker-yv: yv-n
  - type: text
    text: ', Jésus traversait des champs de blé. Ses disciples cueillaient des épis et, après les avoir frottés dans leurs mains, en mangeaient les grains'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dt 23.26
        metadata:
          usfm: DEU.23.26
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des pharisiens dirent : Pourquoi faites-vous ce qui est interdit le jour du sabbat ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus prit la parole et leur dit : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’avez-vous pas lu ce qu’a fait '
    - type: usfm
      marker: w
      children:
      - type: text
        text: David
    - type: text
      text: ' lorsque lui et ses compagnons eurent faim ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il est entré dans le sanctuaire de Dieu, a pris les pains exposés devant Dieu et en a mangé, puis il en a donné à ses hommes, alors que seuls les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prêtres
    - type: text
      text: ' ont le droit d’en manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et il ajouta : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: ' est maître du sabbat.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 12.9-14 ; Mc 3.1-6)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Un autre jour de sabbat, Jésus entra dans la synagogue et commença à enseigner. Or, il y avait là un homme dont la main droite était paralysée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les spécialistes de la Loi et les pharisiens surveillaient attentivement Jésus pour voir s’il ferait une guérison le jour du sabbat : ils espéraient ainsi trouver un motif d’accusation contre lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Jésus, sachant ce qu’ils méditaient, dit à l’homme qui avait la main infirme : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lève-toi et tiens-toi là, au milieu !
- type: usfm
  marker: p
  children:
  - type: text
    text: L’homme se leva et se tint debout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Jésus s’adressa aux autres : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'J’ai une question à vous poser : Est-il permis, le jour du sabbat, de faire du bien, ou de faire du mal ? Est-il permis de '
    - type: usfm
      marker: w
      children:
      - type: text
        text: sauver
    - type: text
      text: ' une vie ou bien faut-il la laisser périr ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il balaya alors l’assistance du regard, puis il dit à cet homme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains manuscrits portent : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: puis il dit avec colère à cet homme.
    marker-yv: yv-n
  - type: text
    text: '  : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Etends la main !
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ce qu’il fit. Et sa main fut guérie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les spécialistes de la Loi et les pharisiens furent remplis de fureur et se mirent à discuter entre eux sur ce qu’ils pourraient entreprendre contre Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le choix des apôtres
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 10.1-4 ; Mc 3.13-19)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vers cette même époque, Jésus se retira sur une colline pour prier. Il passa toute la nuit à prier Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A l’aube, il appela ses disciples auprès de lui et choisit douze d’entre eux, qu’il nomma apôtres : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Simon, qu’il appela Pierre, André, son frère, Jacques, Jean, Philippe, Barthélemy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Matthieu, Thomas, Jacques, fils d’Alphée, Simon le Zélé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10.4
        metadata:
          usfm: MAT.10.4
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Jude, fils de Jacques, et Judas l’Iscariot qui finit par le trahir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parmi la foule
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 4.23-25 ; Mc 3.7-11)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En descendant avec eux de la colline, Jésus s’arrêta sur un plateau où se trouvaient un grand nombre de ses disciples, ainsi qu’une foule immense venue de toute la Judée, de Jérusalem et de la région littorale de Tyr et de Sidon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tyr '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sidon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: étaient deux ports phéniciens des bords de la Méditerranée, au nord-ouest du pays d’Israël.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tous étaient venus pour l’entendre et pour être guéris de leurs maladies. Ceux qui étaient tourmentés par des esprits mauvais étaient délivrés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tout le monde cherchait à le toucher, parce qu’une puissance sortait de lui et guérissait tous les malades.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bonheur ou malheur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 5.1-12)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors Jésus, regardant ses disciples, dit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux vous qui êtes pauvres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'car le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: royaume de Dieu
    - type: text
      text: ' vous appartient.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux êtes-vous, vous qui maintenant avez faim,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car vous serez rassasiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux vous qui maintenant pleurez,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car vous rirez.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux serez-vous quand les hommes vous haïront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous rejetteront, vous insulteront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: vous chasseront en vous accusant de toutes sortes de maux
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'à cause du '
    - type: usfm
      marker: w
      children:
      - type: text
        text: Fils de l’homme
    - type: text
      text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quand cela arrivera, réjouissez-vous et sautez de joie, car une magnifique récompense vous attend dans le ciel. En effet, c’est bien de la même manière que leurs ancêtres ont traité les '
    - type: usfm
      marker: w
      children:
      - type: text
        text: prophètes
    - type: text
      text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais malheur à vous qui possédez des richesses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car vous avez déjà reçu toute la consolation que vous pouvez attendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur à vous qui, maintenant, avez tout à satiété,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car vous aurez faim !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur à vous qui maintenant riez,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car vous connaîtrez le deuil et les larmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur à vous quand tous les hommes diront du bien de vous,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car c’est de la même manière que leurs ancêtres ont traité les faux prophètes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’amour pour les autres
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 5.38-48)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quant à vous tous qui m’écoutez, voici ce que je vous dis : Aimez vos ennemis ; faites du bien à ceux qui vous haïssent ;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: appelez la bénédiction divine sur ceux qui vous maudissent ; priez pour ceux qui vous calomnient.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si quelqu’un te gifle sur une joue, présente-lui aussi l’autre. Si quelqu’un te prend ton manteau, ne l’empêche pas de prendre aussi ta chemise.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Donne à tous ceux qui te demandent, et si quelqu’un te prend ce qui t’appartient, n’exige pas qu’il te le rende.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Faites pour les autres ce que vous voudriez qu’ils fassent pour vous.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous aimez seulement ceux qui vous aiment, pensez-vous avoir droit à une reconnaissance particulière ? Les pécheurs aiment aussi leurs amis.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et si vous faites du bien seulement à ceux qui vous en font, pourquoi vous attendriez-vous à de la reconnaissance ? Les pécheurs n’agissent-ils pas de même ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si vous prêtez seulement à ceux dont vous espérez être remboursés, quelle reconnaissance vous doit-on ? Les pécheurs aussi se prêtent entre eux pour être remboursés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous, au contraire, aimez vos ennemis, faites-leur du bien et prêtez sans espoir de retour. Alors votre récompense sera grande, vous serez les fils du Très-Haut, parce qu’il est lui-même bon pour les ingrats et les méchants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Votre Père est plein de bonté. Soyez donc bons comme lui.
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 7.1-5)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne vous posez pas en juges d’autrui, et vous ne serez pas vous-mêmes jugés. Gardez-vous de condamner les autres, et, à votre tour, vous ne serez pas condamnés. Pardonnez, et vous serez vous-mêmes pardonnés.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Donnez, et l’on vous donnera, on versera dans le pan de votre vêtement une bonne mesure bien tassée, secouée et débordante ; car on emploiera, à votre égard, la mesure dont vous vous serez servis pour mesurer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il ajouta cette comparaison : '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un aveugle peut-il guider un autre aveugle ? Ne vont-ils pas tous les deux tomber dans le fossé ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: w
      children:
      - type: text
        text: disciple
    - type: text
      text: ' n’est pas plus grand que celui qui l’enseigne ; mais tout disciple bien formé sera comme son maître.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi vois-tu les grains de sciure dans l’œil de ton frère, alors que tu ne remarques pas la poutre qui est dans le tien ?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Comment peux-tu dire à ton frère : « Frère, laisse-moi enlever cette sciure que tu as dans l’œil », alors que tu ne remarques pas la poutre qui est dans le tien ? Hypocrite ! Commence donc par retirer la poutre de ton œil ; alors tu y verras assez clair pour ôter la sciure de l’œil de ton frère.'
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 7.16-20)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un bon arbre ne peut pas porter de mauvais fruits, ni un mauvais arbre de bons fruits.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En effet, chaque arbre se reconnaît à ses fruits. On ne cueille pas de figues sur des chardons, et on ne récolte pas non plus du raisin sur des ronces.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: L’homme qui est bon tire le bien du bon trésor de son cœur ; celui qui est mauvais tire le mal de son mauvais fonds. Ce qu’on dit vient de ce qui remplit le cœur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vrai et faux disciple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: (Mt 7.24-27)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi m’appelez-vous « Seigneur ! Seigneur ! » alors que vous n’accomplissez pas ce que je vous commande ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Savez-vous à qui ressemble celui qui vient à moi, qui écoute mes paroles et les applique ? C’est ce que je vais vous montrer.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il ressemble à un homme qui a bâti une maison : il a creusé, il est allé profond et il a assis les fondations sur le roc. Quand le fleuve a débordé, les eaux se sont jetées avec violence contre la maison, mais elles n’ont pas pu l’ébranler, parce qu’elle était construite selon les règles de l’art.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais celui qui écoute mes paroles sans les appliquer ressemble à un homme qui a construit sa maison directement sur la terre meuble, sans fondations ; dès que les eaux du fleuve se sont jetées contre elle, la maison s’est effondrée, et il n’en est resté qu’un grand tas de ruines.
