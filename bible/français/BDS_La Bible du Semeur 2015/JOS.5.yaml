document_id: JOS.5,21
type_code: fra
verses:
  '1':
  - type: text
    content: Tous les rois des Amoréens établis sur la rive occidentale du Jourdain et tous les rois des Cananéens établis sur le littoral de la mer Méditerranée apprirent que l’Eternel avait asséché le Jourdain devant les Israélites jusqu’à ce qu’ils l’aient traversé. Alors le courage leur manqua et ils perdirent tous leurs moyens en face des Israélites.
  - type: heading
    content: La circoncision de la nouvelle génération
  '10':
  - type: text
    content: 'Pendant que les Israélites campaient à Guilgal, ils célébrèrent la Pâque le soir du quatorzième jour du mois, dans les plaines de Jéricho. '
  '11':
  - type: text
    content: 'Le lendemain, ils mangèrent des produits du pays : des pains sans levain et des épis grillés. '
  '12':
  - type: text
    content: A partir du lendemain de ce jour-là, la manne
  - type: note
    content: Voir Ex 16.13-35.
  - type: text
    content: ' cessa de tomber puisqu’ils pouvaient se nourrir des produits du pays ; il n’y eut plus de manne pour les Israélites qui vécurent des productions du pays de Canaan cette année-là.'
  - type: heading
    content: L’arrivée du chef de l’armée de l’Eternel
  '13':
  - type: text
    content: 'Un jour où Josué se trouvait près de Jéricho, il vit soudain un individu qui se tenait debout devant lui, avec son épée dégainée à la main. Josué s’avança vers lui et lui demanda : Es-tu des nôtres ou de nos ennemis ?'
  '14':
  - type: text
    content: – Non, répondit l’homme. Je suis le chef de l’armée de l’Eternel et je viens maintenant.
  - type: text
    content: 'Alors Josué se prosterna, le visage contre terre, et lui dit : Seigneur, je suis ton serviteur, quels sont tes ordres ?'
  '15':
  - type: text
    content: 'Le chef de l’armée de l’Eternel lui répondit : Ote tes sandales de tes pieds, car l’endroit où tu te tiens est un lieu saint.'
  - type: text
    content: Et Josué obéit.
  '2':
  - type: text
    content: 'A cette même époque, l’Eternel dit à Josué : Fais-toi des couteaux de silex et circoncis cette deuxième génération d’Israélites.'
  '3':
  - type: text
    content: Josué se munit de couteaux de silex et circoncit les Israélites sur la colline d’Araloth.
  '4':
  - type: text
    content: 'Voici pourquoi Josué les circoncit : tous les hommes en âge de porter les armes qui étaient sortis d’Egypte étaient morts en chemin dans le désert après avoir quitté l’Egypte. '
  '5':
  - type: text
    content: 'Ils étaient tous circoncis. Mais les garçons nés pendant la traversée du désert, après la sortie d’Egypte, ne l’avaient pas été. '
  '6':
  - type: text
    content: 'Pendant quarante ans, les Israélites avaient marché dans le désert jusqu’à l’extinction de toute la génération des hommes en âge de porter les armes au moment de la sortie d’Egypte. En effet, parce qu’ils n’avaient pas obéi à l’Eternel, l’Eternel avait juré de ne pas leur laisser voir le pays qu’il avait promis par serment à leurs ancêtres de nous donner, ce pays ruisselant de lait et de miel. '
  '7':
  - type: text
    content: 'Mais il leur substitua leurs fils : ce sont eux que Josué circoncit puisqu’ils ne l’avaient pas été pendant la marche dans le désert.'
  '8':
  - type: text
    content: 'Après que tout le peuple eut été circoncis, ils restèrent sur place dans le camp jusqu’à leur guérison. '
  '9':
  - type: text
    content: 'Puis l’Eternel dit à Josué : Aujourd’hui, j’ai fait rouler loin de vous l’opprobre de l’Egypte.'
  - type: text
    content: C’est pourquoi cet endroit fut appelé Guilgal (Le roulement), nom qu’il a conservé jusqu’à ce jour.
  - type: heading
    content: La célébration de la Pâque – fin de la manne
