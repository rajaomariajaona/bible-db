document_id: JOS.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tous les rois des Amoréens établis sur la rive occidentale du Jourdain et tous les rois des Cananéens établis sur le littoral de la mer Méditerranée apprirent que l’Eternel avait asséché le Jourdain devant les Israélites jusqu’à ce qu’ils l’aient traversé. Alors le courage leur manqua et ils perdirent tous leurs moyens en face des Israélites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La circoncision de la nouvelle génération
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A cette même époque, l’Eternel dit à Josué : Fais-toi des couteaux de silex et circoncis cette deuxième génération d’Israélites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Josué se munit de couteaux de silex et circoncit les Israélites sur la colline d’Araloth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici pourquoi Josué les circoncit : tous les hommes en âge de porter les armes qui étaient sortis d’Egypte étaient morts en chemin dans le désert après avoir quitté l’Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils étaient tous circoncis. Mais les garçons nés pendant la traversée du désert, après la sortie d’Egypte, ne l’avaient pas été. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant quarante ans, les Israélites avaient marché dans le désert jusqu’à l’extinction de toute la génération des hommes en âge de porter les armes au moment de la sortie d’Egypte. En effet, parce qu’ils n’avaient pas obéi à l’Eternel, l’Eternel avait juré de ne pas leur laisser voir le pays qu’il avait promis par serment à leurs ancêtres de nous donner, ce pays ruisselant de lait et de miel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais il leur substitua leurs fils : ce sont eux que Josué circoncit puisqu’ils ne l’avaient pas été pendant la marche dans le désert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Après que tout le peuple eut été circoncis, ils restèrent sur place dans le camp jusqu’à leur guérison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis l’Eternel dit à Josué : Aujourd’hui, j’ai fait rouler loin de vous l’opprobre de l’Egypte.'
- type: usfm
  marker: p
  children:
  - type: text
    text: C’est pourquoi cet endroit fut appelé Guilgal (Le roulement), nom qu’il a conservé jusqu’à ce jour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La célébration de la Pâque – fin de la manne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pendant que les Israélites campaient à Guilgal, ils célébrèrent la Pâque le soir du quatorzième jour du mois, dans les plaines de Jéricho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le lendemain, ils mangèrent des produits du pays : des pains sans levain et des épis grillés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A partir du lendemain de ce jour-là, la manne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16.13-35
        metadata:
          usfm: EXO.16.13+EXO.16.14+EXO.16.15+EXO.16.16+EXO.16.17+EXO.16.18+EXO.16.19+EXO.16.20+EXO.16.21+EXO.16.22+EXO.16.23+EXO.16.24+EXO.16.25+EXO.16.26+EXO.16.27+EXO.16.28+EXO.16.29+EXO.16.30+EXO.16.31+EXO.16.32+EXO.16.33+EXO.16.34+EXO.16.35
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' cessa de tomber puisqu’ils pouvaient se nourrir des produits du pays ; il n’y eut plus de manne pour les Israélites qui vécurent des productions du pays de Canaan cette année-là.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arrivée du chef de l’armée de l’Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un jour où Josué se trouvait près de Jéricho, il vit soudain un individu qui se tenait debout devant lui, avec son épée dégainée à la main. Josué s’avança vers lui et lui demanda : Es-tu des nôtres ou de nos ennemis ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: – Non, répondit l’homme. Je suis le chef de l’armée de l’Eternel et je viens maintenant.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Alors Josué se prosterna, le visage contre terre, et lui dit : Seigneur, je suis ton serviteur, quels sont tes ordres ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le chef de l’armée de l’Eternel lui répondit : Ote tes sandales de tes pieds, car l’endroit où tu te tiens est un lieu saint.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et Josué obéit.
